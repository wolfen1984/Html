            async function generateNewCrossroadsStory() {
                const system =
                    `You are Marlon Cross, the world-weary host of The Crossroads — an anthology series about strangers who meet at life's turning points. You narrate grounded, brutal stories of human connection and consequence.`;
                const prompt = `Write a 500 to 750 word short story for The Crossroads. Set in the 1980s. Two strangers meet in a believable way (flat tyre, diner, missed bus, broken-down car, road closure, motel, truck stop, etc.). Their conversation starts naturally. One offers something — a lift, a drink, a deal, a favour, a place to stay. The story revolves around one dominant human motive: Greed, Revenge, Guilt, Fear, Desperation, Obsession, Pride, Jealousy, Betrayal, or Ambition. There must be a clear moment where one character can still walk away — but doesn't. That's the crossroads. The ending should be earned and varied: one might die, go to prison, escape, live with guilt, get away with it, or learn the truth too late. STRICT RULES: No supernatural elements. No ghosts, curses, magic, or dreams. The horror must be purely human — psychological, visceral, grounded. Style: Stephen King meets Hitchcock. Brutal, unflinching, no easy escapes. Frame the story with Marlon Cross's weary intro and a cold, knowing closing remark. Return ONLY valid JSON: title, story (use \\n for line breaks), closing_remark. Output raw JSON only.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user',
                    content: prompt }], 2000, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) { throw new Error(
                        'Invalid story structure'); }
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Film still for an episode titled "${story.title}", 1980s roadside Americana, neon-lit diner or highway, cinematic, grainy 35mm, two strangers`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate poster:', e); }
                gameState.currentPerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system = `You are a sound designer for an 80s film soundtrack. Given a short story, return JSON with THREE keys:
- "sections": array of 5-6 sections dividing the story into emotional acts. Each has "theme" (one of: intro, meeting, connection, the_offer, crossroads, consequences, closing), "start_char" (inclusive), "end_char" (exclusive). Cover entire story from 0 to ${length}.
- "cues": array of sound events using types: "sting", "pulse", "thunder", "bell", "climax". No "pad" type. Each cue has "position" (char index), "type", optional "intensity" (0-1). At least 35 cues, spread evenly.
- "score": object with keys matching theme names. Each key: "bpm" (60-110), "bass" (8 semitone intervals from root 0), "arp" (8 intervals, higher), "kick" (8 x 1/0), "snare" (8 x 1/0). Make it melodic and 80s — think Vangelis, Tangerine Dream, Giorgio Moroder. intro sparse, crossroads driving, consequences melancholic.
Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and 80s film score patterns.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user',
                    content: userPrompt }], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try { data = JSON.parse(cleaned); } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) { const candidate = match[0].replace(/,\s*([}\]])/g, '$1'); try { data = JSON.parse(
                            candidate); } catch (e2) { throw new Error(
                            'Failed to parse AI soundtrack JSON.'); } } else { throw new Error(
                            'No JSON found in AI response.'); }
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !==
                    'object') { throw new Error('Missing sections, cues, or score in AI response'); }
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char <
                    length) { sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length; }
                const cues = data.cues.map(c => ({ type: c.type, position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7 }));
                const requiredThemes = ['intro', 'meeting', 'connection', 'the_offer', 'crossroads',
                    'consequences', 'closing'
                ];
                const score = {};
                for (const theme of requiredThemes) {
                    score[theme] = data.score[theme] ? {
                        bpm: data.score[theme].bpm || 80,
                        bass: data.score[theme].bass || [0, 0, 7, 7, 0, 0, 7, 7],
                        arp: data.score[theme].arp || [12, 15, 12, 19, 12, 15, 12, 19],
                        kick: data.score[theme].kick || [1, 0, 1, 0, 1, 0, 1, 0],
                        snare: data.score[theme].snare || [0, 0, 0, 1, 0, 0, 0, 1]
                    } : { bpm: 80, bass: [0, 0, 7, 7, 0, 0, 7, 7], arp: [12, 15, 12, 19, 12, 15, 12, 19],
                        kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] };
                }
                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {
                await generateNewCrossroadsStory();
                if (!gameState.currentPerformance) throw new Error('Failed to generate story');
                const soundtrack = await generateSoundCueSheet(gameState.currentPerformance.rawStoryText);
                gameState.currentPerformance.soundCues = soundtrack;
                saveState();
                await startCrossroadsPerformance();
            }

            function createNote(ctx, frequency, startTime, duration, gainValue, type = 'sawtooth') {
                const now = startTime;
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.006;
                const sub = ctx.createOscillator();
                sub.type = 'triangle';
                sub.frequency.value = frequency / 2;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                filter.Q.value = 1.6;
                const filterEnv = ctx.createGain();
                filterEnv.gain.setValueAtTime(900, now);
                filterEnv.gain.exponentialRampToValueAtTime(220, now + 0.1);
                filterEnv.gain.exponentialRampToValueAtTime(60, now + duration * 0.8);
                filterEnv.connect(filter.frequency);
                const mainGain = ctx.createGain();
                mainGain.gain.setValueAtTime(0, now);
                mainGain.gain.linearRampToValueAtTime(gainValue * 0.28, now + 0.02);
                mainGain.gain.setValueAtTime(gainValue * 0.28, now + duration * 0.6);
                mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.1);
                osc1.connect(filter);
                osc2.connect(filter);
                sub.connect(filter);
                filter.connect(mainGain);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.75;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.45;
                mainGain.connect(drySend);
                mainGain.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);
                osc1.start(now);
                osc2.start(now);
                sub.start(now);
                osc1.stop(now + duration + 0.2);
                osc2.stop(now + duration + 0.2);
                sub.stop(now + duration + 0.2);
            }

            function createKick(ctx, time) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(140, time);
                osc.frequency.exponentialRampToValueAtTime(28, time + 0.08);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.02, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) { noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (
                        ctx.sampleRate * 0.003)); }
                const click = ctx.createBufferSource();
                click.buffer = noiseBuffer;
                const clickFilter = ctx.createBiquadFilter();
                clickFilter.type = 'highpass';
                clickFilter.frequency.value = 2000;
                click.connect(clickFilter);
                const gainClick = ctx.createGain();
                gainClick.gain.setValueAtTime(0.45, time);
                gainClick.gain.exponentialRampToValueAtTime(0.001, time + 0.02);
                clickFilter.connect(gainClick);
                const gainBody = ctx.createGain();
                gainBody.gain.setValueAtTime(0.65, time);
                gainBody.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
                osc.connect(gainBody);
                gainBody.connect(dryGain);
                gainClick.connect(dryGain);
                osc.start(time);
                click.start(time);
                osc.stop(time + 0.2);
                click.stop(time + 0.02);
            }

            function createSnare(ctx, time) {
                const body = ctx.createOscillator();
                body.type = 'triangle';
                body.frequency.setValueAtTime(180, time);
                body.frequency.exponentialRampToValueAtTime(70, time + 0.08);
                const bodyGain = ctx.createGain();
                bodyGain.gain.setValueAtTime(0.55, time);
                bodyGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                body.connect(bodyGain);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) { noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (
                        ctx.sampleRate * 0.03)); }
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1200;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.6, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.14);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                bodyGain.connect(dryGain);
                noiseGain.connect(dryGain);
                body.start(time);
                noise.start(time);
                body.stop(time + 0.1);
                noise.stop(time + 0.15);
            }

            const SCORE_PATTERNS = {
                intro: { bpm: 55, bass: [0, 0, 5, 5, 0, 0, 5, 5], arp: [12, 14, 12, 17, 12, 14, 12, 17],
                    kick: [1, 0, 0, 0, 1, 0, 0, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] },
                meeting: { bpm: 60, bass: [0, 5, 3, 2, 0, 5, 3, 2], arp: [12, 14, 17, 14, 12, 14, 17, 14],
                    kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] },
                connection: { bpm: 65, bass: [0, 2, 3, 5, 7, 5, 3, 2], arp: [12, 14, 17, 21, 24, 21, 17, 14],
                    kick: [1, 0, 1, 1, 1, 0, 1, 0], snare: [0, 0, 1, 0, 0, 0, 1, 0] },
                the_offer: { bpm: 70, bass: [0, 5, 0, 5, 2, 5, 2, 5], arp: [12, 17, 14, 17, 12, 17, 14, 17],
                    kick: [1, 1, 1, 1, 1, 1, 1, 1], snare: [0, 1, 0, 1, 0, 1, 0, 1] },
                crossroads: { bpm: 78, bass: [0, 2, 4, 6, 0, 2, 4, 6], arp: [12, 15, 18, 22, 12, 15, 18, 22],
                    kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [1, 1, 1, 1, 1, 1, 1, 1] },
                consequences: { bpm: 50, bass: [0, 5, 3, 0, 5, 3, 0, 5], arp: [12, 14, 12, 17, 12, 14, 12, 17],
                    kick: [1, 0, 0, 0, 1, 0, 0, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] },
                closing: { bpm: 45, bass: [0, 5, 3, 0, 5, 3, 0, 5], arp: [12, 14, 12, 17, 12, 14, 12, 17],
                    kick: [1, 0, 0, 0, 1, 0, 0, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] }
            };

            function startSectionScore(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                const perf = gameState.currentPerformance;
                let customScore = null;
                if (perf && perf.soundCues && perf.soundCues.score) { customScore = perf.soundCues.score; }
                const fallbackTheme = SCORE_PATTERNS[themeName] || SCORE_PATTERNS.intro;
                const theme = (customScore && customScore[themeName]) ? customScore[themeName] : fallbackTheme;
                const rootFreq = 65;
                const beatDuration = 60 / theme.bpm;
                const patternLength = theme.bass.length;
                const ctx = audioCtx;
                let step = 0;
                let nextStepTime = ctx.currentTime;
                const padGain = ctx.createGain();
                padGain.gain.value = 0.08;
                const padOsc1 = ctx.createOscillator();
                padOsc1.type = 'sawtooth';
                padOsc1.frequency.value = rootFreq;
                const padOsc2 = ctx.createOscillator();
                padOsc2.type = 'sawtooth';
                padOsc2.frequency.value = rootFreq * 1.5;
                const padOsc3 = ctx.createOscillator();
                padOsc3.type = 'triangle';
                padOsc3.frequency.value = rootFreq / 2;
                const padFilter = ctx.createBiquadFilter();
                padFilter.type = 'lowpass';
                padFilter.frequency.value = 350;
                padFilter.Q.value = 1.2;
                padOsc1.connect(padFilter);
                padOsc2.connect(padFilter);
                padOsc3.connect(padFilter);
                padFilter.connect(padGain);
                const padDry = ctx.createGain();
                padDry.gain.value = 0.5;
                const padWet = ctx.createGain();
                padWet.gain.value = 0.35;
                padGain.connect(padDry);
                padGain.connect(padWet);
                padDry.connect(dryGain);
                padWet.connect(wetGain);
                padOsc1.start();
                padOsc2.start();
                padOsc3.start();
                const stopSources = [padOsc1, padOsc2, padOsc3];
                let timeoutId;

                function scheduleStep() {
                    if (!sectionAmbientActive) return;
                    const now = nextStepTime;
                    const bassSemitone = theme.bass[step % patternLength];
                    const bassFreq = rootFreq * Math.pow(2, bassSemitone / 12);
                    createNote(ctx, bassFreq, now, beatDuration * 0.85, 0.7, 'sawtooth');
                    const arpSemitone = theme.arp[step % patternLength];
                    const arpFreq = rootFreq * Math.pow(2, arpSemitone / 12);
                    createNote(ctx, arpFreq, now, beatDuration * 0.45, 0.5, 'square');
                    if (theme.kick[step % patternLength]) createKick(ctx, now);
                    if (theme.snare[step % patternLength]) createSnare(ctx, now);
                    step++;
                    nextStepTime += beatDuration;
                    timeoutId = setTimeout(scheduleStep, (nextStepTime - ctx.currentTime) * 1000);
                }
                nextStepTime = ctx.currentTime + 0.05;
                timeoutId = setTimeout(scheduleStep, 50);
                sectionAmbientActive = {
                    stop: () => {
                        clearTimeout(timeoutId);
                        padGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                        stopSources.forEach(s => { try { s.stop(ctx.currentTime + 0.3); } catch (
                        e) {} });
                        sectionAmbientActive = null;
                    }
                };
            }
            const transitionSectionTheme = startSectionScore;

            function stopSectionAmbient() {
                if (sectionAmbientActive) { sectionAmbientActive.stop();
                    sectionAmbientActive = null; }
                clearTimeout(crossfadeTimeout);
            }

            async function startCrossroadsPerformance() {
                speechSynthesis.cancel();
                if (window.crTimeout) clearTimeout(window.crTimeout);
                const storyData = gameState.currentPerformance;
                if (!storyData || !storyData.story) { await generateNewCrossroadsStory(); return startCrossroadsPerformance(); }
                let sectionList = null;
                let cueList = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) { cueList = storyData.soundCues.filter(c => c.type && c
                            .position !== undefined); } else if (storyData.soundCues.sections && storyData.soundCues
                        .cues) { sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined); }
                }
                const bubble = document.getElementById('crSpeechBubble');
                const dialogue = document.getElementById('crDialogue');
                const imageEl = document.getElementById('crSegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('crGuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#00ccf044';
                bubble.style.boxShadow = '0 0 30px #00ccf030, 0 0 50px #ff338815';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('crBackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('crAddEpisodeBtn');
                if (oldAdd) oldAdd.remove();
                const posterContainer = document.getElementById('crPosterContainer');
                const posterTitle = document.getElementById('crPosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) { posterTitle.textContent = storyData.title || ''; }
                } else if (posterContainer) { posterContainer.classList.add('no-image'); }
                const intro = `"Every road leads somewhere. Some lead to someone. I'm Marlon Cross. Tonight's story: '${storyData.title}'. Two strangers. One meeting. And everything that follows."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 48);
                await new Promise(r => setTimeout(r, 1500));
                if (sectionList && sectionList.length > 0) { transitionSectionTheme(sectionList[0].theme); }
                const storyText = storyData.rawStoryText || storyData.story;
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b.start_char) :
                        [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) { currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme); }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) { triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity); }
                            cueIdx++;
                        }
                    };
                }
                dialogue.textContent = '';
                if (cueChecker) { await speakAndTypeSynced(dialogue, storyText, { rate: 0.62, pitch: 0.9 }, (idx) =>
                        cueChecker(idx)); } else { await speakAndTypeSynced(dialogue, storyText, { rate: 0.62,
                        pitch: 0.9 }); }
                await new Promise(r => setTimeout(r, 1200));
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#c8d8e8';
                dialogue.appendChild(closingLine);
                speakTextMale(closing);
                await typewriterEffect(closingLine, closing, 42);
                await new Promise(r => setTimeout(r, 1000));
                const curtainText = document.createElement('p');
                curtainText.textContent = '— End of the road —';
                stopSectionAmbient();
                curtainText.style.color = '#6a6a80';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();
                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Back to Crossroads';
                leaveBtn.addEventListener('click', () => { leaveCrossroads(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'crAddEpisodeBtn';
                addBtn.textContent = '➕ Save Episode';
                addBtn.addEventListener('click', () => { addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Saved'; });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.currentPerformance;
                if (!perf) return;
                gameState.episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
                saveState();
                setTimeout(() => leaveCrossroads(), 600);
            }

            function leaveCrossroads() {
                stopAmbient();
                stopSectionAmbient();
                renderCrossroadsPanel();
            }

            function init() {
                loadState();
                renderCrossroadsPanel();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) { apiKey = key;
                        localStorage.setItem('crossroads_key', key); }
                });
                document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e
                        .currentTarget) closeModal(); });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) { showModal(HOST_BIO); }
                });
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
                if (!apiKey) { setTimeout(() => document.getElementById('resetApiBtn').click(), 800); }
            }
            init();
        })();
    </script>
</body>
</html>
