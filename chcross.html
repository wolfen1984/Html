<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>THE CROSSROADS · 1987</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Audiowide&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020205;
            --screen-bg: #06060c;
            --panel-bg: #080812;
            --text: #d8d8e8;
            --text-dim: #6a6a80;
            --text-bright: #f0f0f8;
            --accent: #00ccf0;
            --accent-dim: #004455;
            --accent2: #ff3388;
            --accent2-dim: #330018;
            --border: #1a1a30;
            --border-glow: 0 0 10px #00ccf044, 0 0 24px #00ccf022;
            --border-glow2: 0 0 10px #ff338844, 0 0 24px #ff338822;
            --neon-white: #e8e8f8;
            --neon-white-glow: 0 0 8px #ffffff66, 0 0 20px #ffffff22;
            --danger: #ff3366;
            --danger-glow: 0 0 12px #ff336644;
            --amber: #ffaa22;
            --amber-dim: #442200;
            --gold: #ffcc44;
            --gold-dim: #332200;
            --green: #22cc66;
            --input-bg: #0c0c18;
            --button-bg: #0e0e1a;
            --button-hover: #14142a;
            --button-active: #0c0c16;
            --bevel-light: #1e1e34;
            --bevel-dark: #020208;
            --font-display: 'Orbitron', 'Audiowide', sans-serif;
            --font-title: 'Audiowide', 'Orbitron', sans-serif;
            --font-mono: 'Share Tech Mono', 'Rajdhani', 'Courier New', monospace;
            --font-body: 'VT323', 'Rajdhani', 'Courier New', monospace;
            --scanline-opacity: 0.04;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 24px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #080816 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #0c0c16;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #1a1a2a, 0 0 0 4px #080810, 0 0 0 8px #040406, 0 8px 48px #000000dd, 0 0 40px #00ccf018, 0 0 80px #ff338810;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #1a1a2e;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #04040a;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #00ccf0;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ccf0cc, 0 0 22px #00ccf055, 0 0 40px #00ccf022;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 10px #00ccf0cc, 0 0 22px #00ccf055;
            }
            50% {
                box-shadow: 0 0 18px #00ccf0ee, 0 0 36px #00ccf088, 0 0 50px #00ccf033;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #3a3a50;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #1a1a30;
            box-shadow: var(--border-glow), var(--border-glow2), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.7), inset 0 0 12px rgba(0, 0, 0, 0.45);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.65) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.6;
            }
            99.5% {
                opacity: 0.9;
            }
            99.6% {
                opacity: 0.45;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #04040c;
            border-bottom: 2px solid #00ccf044;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #0a0a18;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #1a1a30;
            border-radius: 2px;
            padding: 10px 14px;
            background: #020208;
            position: relative;
            box-shadow: inset 0 0 24px #00ccf010, 0 0 16px #00ccf018;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #00ccf0;
            box-shadow: 0 0 14px #00ccf0aa, 0 0 30px #00ccf044;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #ff338844;
            box-shadow: 0 0 8px #ff338844;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #e8e8f8;
            text-shadow: 0 0 20px #ffffff88, 0 0 40px #00ccf066, 0 2px 4px #000, 0 0 60px #00ccf033;
            letter-spacing: 3px;
            font-family: var(--font-title);
            line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #8899aa;
            letter-spacing: 5px;
            margin-top: 3px;
            text-shadow: 0 0 6px #00ccf044;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 18px;
                letter-spacing: 1px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #1a1a30 #06060c;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #06060c;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #1a1a30;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #1e1e34;
            border-top-color: #282844;
            border-left-color: #24243c;
            border-right-color: #161628;
            border-bottom-color: #0c0c18;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
            text-shadow: 0 0 4px #ffffff33;
        }
        .btn:active {
            border-top-color: #161628;
            border-left-color: #161628;
            border-bottom-color: #282844;
            border-right-color: #24243c;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #0c0c16;
        }
        .btn.accent {
            background: #0a0a1a;
            border-color: #1a3a50;
            border-top-color: #225577;
            border-left-color: #1e4a66;
            border-right-color: #122838;
            border-bottom-color: #081420;
            color: #cceeff;
            box-shadow: 0 2px 0 #00000044, 0 0 12px #00ccf033;
            text-shadow: 0 0 8px #00ccf088;
        }
        .btn.accent:active {
            border-top-color: #122838;
            border-left-color: #122838;
            border-bottom-color: #225577;
            border-right-color: #1e4a66;
            box-shadow: 0 0px 0 #00000044, 0 0 20px #00ccf066;
        }
        .btn.accent2 {
            background: #1a0a14;
            border-color: #3a1a2e;
            border-top-color: #552244;
            border-left-color: #441d38;
            border-right-color: #281020;
            border-bottom-color: #140818;
            color: #ffccee;
            box-shadow: 0 2px 0 #00000044, 0 0 12px #ff338833;
            text-shadow: 0 0 8px #ff338888;
        }
        .btn.accent2:active {
            border-top-color: #281020;
            border-left-color: #281020;
            border-bottom-color: #552244;
            border-right-color: #441d38;
            box-shadow: 0 0px 0 #00000044, 0 0 20px #ff338866;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .crossroads-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #060610;
            border: 2px solid #1a1a30;
            padding: 15px;
            border-radius: 3px;
            box-shadow: 0 0 20px #00ccf015, 0 0 40px #ff338810;
            position: relative;
        }
        .crossroads-stage::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00ccf066, #00ccf0aa, #00ccf066, transparent);
            z-index: 2;
            pointer-events: none;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #1a1a30;
            box-shadow: 0 0 22px #00ccf044, 0 0 40px #00ccf018, 0 0 0 2px #0a0a18;
            object-fit: cover;
            flex-shrink: 0;
            background: #080812;
        }
        .speech-bubble {
            flex: 1;
            background: #0a0a16;
            border: 2px solid #1a1a30;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #d0d0e0;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: inset 0 0 20px #00000055, 0 0 12px #00ccf015;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #1a1a3088 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #080812;
            border: 1px solid #1a1a30;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #0e0e1a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6a6a80;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #1a1a30;
            box-shadow: 0 0 20px #00ccf033, 0 0 30px #ff338818, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #080812;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(2, 2, 6, 0.8) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 13px;
            letter-spacing: 3px;
            color: #e8e8f8;
            text-shadow: 0 0 10px #ffffffcc, 0 0 30px #00ccf088, 0 2px 4px #000000, 0 0 60px #00ccf033;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom, rgba(4, 4, 10, 0.9) 0%, rgba(4, 4, 10, 0.7) 40%, transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 14px;
            letter-spacing: 1.5px;
            color: #ffccaa;
            text-shadow: 0 0 8px #ffcc4488, 0 0 20px #ff338844, 0 2px 4px #000000;
            background: linear-gradient(to top, rgba(2, 2, 6, 0.9) 0%, rgba(2, 2, 6, 0.6) 50%, transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6a6a80;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 10px;
                letter-spacing: 2px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 11px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #1a1a30;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #c8d8e8;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 16px;
            text-shadow: 0 0 10px #00ccf044;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #080814;
            border: 1px solid #1a1a30;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #00ccf0;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #d0d8e8;
        }
        .guide-desc {
            font-size: 14px;
            color: #6a6a80;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0a0a16;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #1a1a30;
            box-shadow: var(--border-glow), var(--border-glow2), 0 0 80px #000000dd;
            color: #c8c8d8;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #0e0e1a;
            border: 2px solid #1a1a3088;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #c8c8d8;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #00ccf0;
            box-shadow: 0 0 14px #00ccf044;
        }
        .loading-text {
            color: #ffaa22;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #030308;
            border-top: 1px solid #1a1a3044;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #3a3a50;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #4a4a60;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #141420;
            color: #4a4a60;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #3a3a50;
            color: #6a6a80;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #d0d0e0;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">THE CROSSROADS · VHS-87</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE CROSSROADS</div>
                    <div class="marquee-sub">⏤ EVERY ROAD LEADS TO SOMEONE ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="crossroadsPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🛣️ THE CROSSROADS · NOW PLAYING · 1987</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('crossroads_key') || '';

            const DEFAULT_STATE = {
                episodes: [],
                currentPerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>🛣️ Marlon Cross</h2>
        <p style="text-align:left;">
            <strong>Show:</strong> <em>The Crossroads</em><br>
            <strong>Bio:</strong> A former investigative journalist who spent two decades chasing stories along America's back roads. Cross now hosts this anthology series from a neon-lit studio, introducing tales of strangers whose paths collide at life's turning points. He's seen every kind of desperation, every shade of human motive — and he knows that every road leads to someone.
        </p>
    `;

            // ── 80s FILM SOUNDTRACK ENGINE ──
            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let crossfadeTimeout = null;

            const SECTION_THEMES = {
                intro: { root: 65, fifth: 98, filterStart: 400, filterEnd: 350, lfoFreq: 0.08, intensity: 0.25 },
                meeting: { root: 65, fifth: 98, filterStart: 500, filterEnd: 300, lfoFreq: 0.12, intensity: 0.3 },
                connection: { root: 65, fifth: 99, filterStart: 600, filterEnd: 250, lfoFreq: 0.16,
                intensity: 0.35 },
                the_offer: { root: 65, fifth: 100, filterStart: 700, filterEnd: 200, lfoFreq: 0.2,
                intensity: 0.4 },
                crossroads: { root: 65, fifth: 104, filterStart: 900, filterEnd: 150, lfoFreq: 0.28,
                    intensity: 0.55 },
                consequences: { root: 65, fifth: 98, filterStart: 300, filterEnd: 250, lfoFreq: 0.09,
                intensity: 0.22 },
                closing: { root: 65, fifth: 98, filterStart: 250, filterEnd: 200, lfoFreq: 0.07,
                intensity: 0.2 }
            };

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.18;
                    reverbNode.connect(masterGain);
                    masterGain.connect(audioCtx.destination);
                    const compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.value = -24;
                    compressor.knee.value = 30;
                    compressor.ratio.value = 12;
                    compressor.attack.value = 0.003;
                    compressor.release.value = 0.25;
                    masterGain.connect(compressor);
                    compressor.connect(audioCtx.destination);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 1.0;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.35;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                    reverbNode.connect(masterGain);
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 2.5;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.5));
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            function createSynthPad(ctx, frequency, duration, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.16, now + 0.6);
                gainNode.gain.setValueAtTime(intensity * 0.16, now + duration - 1.2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.3);
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.004;
                const osc3 = ctx.createOscillator();
                osc3.type = 'triangle';
                osc3.frequency.value = frequency / 2;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 1.8;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.15 + Math.random() * 0.2;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 180 + Math.random() * 180;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);
                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            function createSting(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.22, now + 0.03);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(130, now);
                osc.frequency.exponentialRampToValueAtTime(440, now + 0.25);
                osc.frequency.exponentialRampToValueAtTime(90, now + 1.4);
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(260, now);
                osc2.frequency.exponentialRampToValueAtTime(880, now + 0.25);
                osc2.frequency.exponentialRampToValueAtTime(180, now + 1.4);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 700;
                filter.Q.value = 1.2;
                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);
                osc.start(now);
                osc2.start(now);
                osc.stop(now + 1.8);
                osc2.stop(now + 1.8);
            }

            function createClimax(ctx, intensity = 0.7) {
                const now = ctx.currentTime;
                const duration = 10 + Math.random() * 6;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.45, now + 2.5);
                gainNode.gain.setValueAtTime(intensity * 0.5, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(100, now);
                osc1.frequency.exponentialRampToValueAtTime(200, now + duration * 0.5);
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(200, now);
                osc2.frequency.exponentialRampToValueAtTime(400, now + duration * 0.5);
                const osc3 = ctx.createOscillator();
                osc3.type = 'square';
                osc3.frequency.setValueAtTime(100, now);
                osc3.frequency.exponentialRampToValueAtTime(300, now + duration * 0.7);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(350, now);
                filter.frequency.exponentialRampToValueAtTime(1400, now + duration);
                filter.Q.value = 2.2;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.12;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 220;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);
                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    switch (type) {
                        case 'pad':
                            const freq = 100 + Math.random() * 50;
                            createSynthPad(ctx, freq, 18 + Math.random() * 18, gainValue);
                            break;
                        case 'sting':
                            createSting(ctx, gainValue);
                            break;
                        case 'pulse':
                            playPulse(ctx, now, 0.7 * gainValue);
                            setTimeout(() => playPulse(ctx, now + 0.2, 0.7 * gainValue), 200);
                            break;
                        case 'thunder': {
                            const bufferSize = ctx.sampleRate * 0.5;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.3));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(gainValue * 0.55, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 140;
                            filter.Q.value = 0.5;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(now);
                            source.stop(now + 0.8);
                            break;
                        }
                        case 'bell': {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 70 + Math.random() * 40;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0, now);
                            gain.gain.linearRampToValueAtTime(gainValue * 0.35, now + 0.12);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 3.5);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 450;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(now);
                            osc.stop(now + 3.5);
                            break;
                        }
                        case 'climax':
                            createClimax(ctx, gainValue);
                            break;
                        default:
                            console.warn(`Unknown sound type: ${type}`);
                    }
                } catch (err) {
                    console.error(`Error in playSound("${type}"):`, err);
                }
            }

            function playPulse(ctx, time, intensity) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(55, time);
                osc.frequency.exponentialRampToValueAtTime(28, time + 0.12);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.7, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(time);
                osc.stop(time + 0.12);
            }

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(gainValue * 0.25, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'ambient_drone' || type === 'wind_howl') {
                        const bufferSize = ctx.sampleRate * 1;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.4;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'ambient_drone' ? 180 : 500;
                        filter.Q.value = 0.5;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'ambient_drone' ? 70 : 100;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.18 * gainValue;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 90;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) {
                    console.error(`Error in playAmbient("${type}"):`, err);
                }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 300);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            function saveState() { try { localStorage.setItem('crossroads_state', JSON.stringify(
                gameState)); } catch (e) {} }

            function loadState() {
                try {
                    const saved = localStorage.getItem('crossroads_state');
                    if (saved) gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
                    gameState.episodes = gameState.episodes || [];
                    gameState.currentPerformance = gameState.currentPerformance || null;
                } catch (e) {}
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 28000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' +
                                apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) { const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`); }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') { throw new Error(
                            'Request timed out. Please try again.'); }
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', 1980s film still, neon-lit, cinematic, grainy 35mm film')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) { try { return await generateImage(
                    prompt); } catch (e) { lastError = e;
                        await new Promise(r => setTimeout(r, 20)); } }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) { element.textContent += text.charAt(i); if (onChar) onChar(
                            i);
                            i++; } else { clearInterval(timer);
                            resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                    'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                ];
                let voice = null;
                for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice)
                    break; }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.62;
                utterance.pitch = 0.9;
                speechSynthesis.speak(utterance);
            }

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (
                        voice) break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[
                    0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.62;
                    utterance.pitch = voiceConfig.pitch || 0.9;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) { currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar); if (cueChecker)
                            cueChecker(currentChar); }
                    };
                    utterance.onend = () => { element.textContent = text; if (cueChecker) cueChecker(text
                            .length);
                        resolve(); };
                    utterance.onerror = (e) => { console.warn('TTS error:', e);
                        element.textContent = text;
                        resolve(); };
                    speechSynthesis.speak(utterance);
                });
            }

            function showModal(html) {
                document.getElementById('genericModalContent').innerHTML = html;
                document.getElementById('genericModal').style.display = 'flex';
            }

            function closeModal() {
                document.getElementById('genericModal').style.display = 'none';
                speechSynthesis.cancel();
            }
            window.closeModal = closeModal;

            function renderCrossroadsPanel() {
                const panel = document.getElementById('crossroadsPanel');
                if (!panel) return;
                panel.innerHTML = `
        <div class="crossroads-stage">
            <div class="tv-stage-row">
                <img class="host-portrait" src="marlon.jpg" alt="Marlon Cross" style="object-fit:cover;">
                <div class="speech-bubble" id="crSpeechBubble">
                    <div class="story-poster-container no-image" id="crPosterContainer">
                        <img id="crSegmentImage" class="segment-image" alt="Episode Poster">
                        <div class="poster-overlay-theater">THE CROSSROADS</div>
                        <div class="poster-overlay-title" id="crPosterTitle"></div>
                    </div>
                    <div class="segment-text" id="crDialogue">
                        "Every road leads somewhere. Some lead to someone. I'm Marlon Cross. Tonight, two strangers are about to meet — and neither of them will ever be the same."
                    </div>
                </div>
            </div>
        </div>
        <div class="tv-guide">
            <h3>🛣️ THE CROSSROADS · EPISODES</h3>
            <div id="crGuideList"></div>
        </div>
        `;
                const guideList = document.getElementById('crGuideList');
                const episodes = gameState.episodes || [];
                episodes.forEach((ep, index) => {
                    const entry = document.createElement('div');
                    entry.className = 'guide-entry';
                    const hasCues = ep.soundCues && (Array.isArray(ep.soundCues) ? ep.soundCues.length >
                        0 : (ep.soundCues.cues && ep.soundCues.cues.length > 0));
                    entry.innerHTML = `
                <span class="guide-time">SAVED</span>
                ${ep.imageUrl ? `
    <div style="position:relative; width:50px; height:50px; flex-shrink:0; margin-right:8px; border-radius:2px; overflow:hidden; border:1px solid #1a1a30;">
        <img src="${esc(ep.imageUrl)}" style="width:100%; height:100%; object-fit:cover;" alt="Poster">
        <div style="position:absolute; top:0; left:0; right:0; font-family:${esc('--font-title')}; font-size:4px; text-align:center; color:#e8e8f8; text-shadow:0 0 3px #00ccf0; background:rgba(2,2,8,0.7); padding:1px 2px; letter-spacing:0.5px; line-height:1.1; pointer-events:none;">CROSSROADS</div>
        <div style="position:absolute; bottom:0; left:0; right:0; font-family:${esc('--font-display')}; font-size:3.5px; text-align:center; color:#d0d8e8; text-shadow:0 0 2px #000; background:rgba(2,2,8,0.65); padding:1px 2px; line-height:1.2; pointer-events:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(ep.title)}</div>
    </div>` : ''}
                <div class="guide-info">
                    <div class="guide-title">"${esc(ep.title)}"</div>
                    <div class="guide-desc">${hasCues ? '🎧 Soundtrack ready' : 'Two strangers. One fateful encounter.'}</div>
