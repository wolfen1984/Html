<!DOCTYPE html>
<html lang="en">
<head>

    <style>

        .footer-strip { display:flex; justify-content:space-between; align-items:center; padding:6px 12px; background:#030308; border-top:1px solid #1a1a3044; z-index:10; font-family:var(--font-mono); font-size:11px; color:#3a3a50; flex-shrink:0; }

<body>
    <div class="monitor-bezel">
        <div class="brand-label">THE CROSSROADS · VHS-87</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE CROSSROADS</div>
                    <div class="marquee-sub">⏤ EVERY ROAD LEADS TO SOMEONE ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="crossroadsPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🛣️ THE CROSSROADS · NOW PLAYING · 1987</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
    (function() {
        const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
        const MODEL = 'mistral-small-latest';
        let apiKey = localStorage.getItem('crossroads_key') || '';

        const DEFAULT_STATE = { episodes: [], currentPerformance: null, imageCooldownUntil: 0 };
        let gameState = { ...DEFAULT_STATE };

        const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;', "'":'&#39;', '"':'&quot;' })[m]);

        const HOST_BIO = `
            <h2>🛣️ Marlon Cross</h2>
            <p style="text-align:left;">
                <strong>Show:</strong> <em>The Crossroads</em><br>
                <strong>Bio:</strong> A former investigative journalist who spent two decades chasing stories along America's back roads. Cross now hosts this anthology series from a neon-lit studio, introducing tales of strangers whose paths collide at life's turning points.
            </p>
        `;

        // ─── AUDIO ENGINE ──────────────────────────────────────────────
        let audioCtx = null;
        let ambientSource = null, ambientGain = null, ambientTimeout = null;
        let keepAliveNode = null;
        let reverbNode = null, masterGain = null, dryGain = null, wetGain = null;
        let sectionAmbientActive = null, stringAmbientActive = null;
        let crossfadeTimeout = null, tapeWarbleNode = null, masterCompressor = null;

        let patternPlayerActive = null, patternPlayerTimeout = null;
        let patternStep = 0, patternBPM = 50;
        let currentSectionPatterns = [];
        let currentVariationIdx = 0, barsInVariation = 0;
        let fillActive = false;
        let sectionThemeScore = null;

        // ─── Robust expandPattern ──────────────────────────────────────
        function expandPattern(arr) {
            if (!Array.isArray(arr)) {
                console.warn('expandPattern received non-array, using default:', arr);
                arr = [0,0,0,0,0,0,0,0];
            }
            // Ensure all elements are numbers
            arr = arr.map(x => typeof x === 'number' ? x : 0);
            return arr.flatMap(x => [x, x]);
        }

        function createKeepAlive(ctx) {
            if (keepAliveNode) return;
            const osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = 30;
            const gain = ctx.createGain();
            gain.gain.value = 0.0005;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(0);
            keepAliveNode = { source: osc, gain };
        }

        function ensureAudioNodes(ctx) {
            if (!masterGain) {
                masterGain = ctx.createGain();
                masterGain.gain.value = 0.22;
                masterCompressor = ctx.createDynamicsCompressor();
                masterCompressor.threshold.value = -26;
                masterCompressor.knee.value = 28;
                masterCompressor.ratio.value = 10;
                masterCompressor.attack.value = 0.004;
                masterCompressor.release.value = 0.3;
                masterGain.connect(masterCompressor);
                masterCompressor.connect(ctx.destination);
            }
            if (!dryGain) {
                dryGain = ctx.createGain();
                dryGain.gain.value = 0.85;
                dryGain.connect(masterGain);
            }
            if (!wetGain) {
                wetGain = ctx.createGain();
                wetGain.gain.value = 0.55;
                if (reverbNode) wetGain.connect(reverbNode);
                else wetGain.connect(masterGain);
            }
            if (!reverbNode) {
                initReverb(ctx);
                if (reverbNode) wetGain.connect(reverbNode);
            }
            if (tapeWarbleNode) tapeWarbleNode.connect(masterGain.gain);
        }

        async function getAudioContext() {
            try {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    initTapeWarble(audioCtx);
                    ensureAudioNodes(audioCtx);
                }
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                ensureAudioNodes(audioCtx);
                return audioCtx;
            } catch(err) { console.error('Audio context error:', err); throw err; }
        }

        function initReverb(ctx) {
            if (reverbNode) return;
            try {
                const sampleRate = ctx.sampleRate;
                const length = sampleRate * 4.2;
                const impulse = ctx.createBuffer(2, length, sampleRate);
                const left = impulse.getChannelData(0);
                const right = impulse.getChannelData(1);
                for (let i=0; i<length; i++) {
                    const decay = Math.exp(-i/(sampleRate*0.9));
                    const lateDecay = Math.exp(-i/(sampleRate*2.5))*0.3;
                    left[i] = (Math.random()*2-1)*(decay+lateDecay);
                    right[i] = (Math.random()*2-1)*(decay+lateDecay);
                }
                reverbNode = ctx.createConvolver();
                reverbNode.buffer = impulse;
                reverbNode.normalize = true;
                if (masterGain) reverbNode.connect(masterGain);
            } catch(err) {
                console.warn('Reverb init error:', err);
                reverbNode = ctx.createGain();
                reverbNode.gain.value = 0.5;
                if (masterGain) reverbNode.connect(masterGain);
            }
        }

        function initTapeWarble(ctx) {
            if (tapeWarbleNode) return;
            try {
                tapeWarbleNode = ctx.createGain();
                tapeWarbleNode.gain.value = 0;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.15;

                lfoGain.gain.value = 0.012;

        // ─── String / Pad / Drum synths ──────────────────────────────
        function createStringPad(ctx, rootFreq, duration, intensity=0.5, voiceCount=8) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity*0.16, now+2.5);
                gainNode.gain.setValueAtTime(intensity*0.16, now+duration-3);
                gainNode.gain.exponentialRampToValueAtTime(0.0005, now+duration+1.5);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500 + intensity*400;
                filter.Q.value = 1.8;
                const filterLfo = ctx.createOscillator();
                filterLfo.type = 'sine';
                filterLfo.frequency.value = 0.04;
                const filterLfoGain = ctx.createGain();
                filterLfoGain.gain.value = 80;
                filterLfo.connect(filterLfoGain);
                filterLfoGain.connect(filter.frequency);
                const allOscs = [];
                const harmonics = [1,1.002,1.997,2.003,0.998,1.005,2.001,0.996];
                for (let i=0; i<voiceCount; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i<4 ? 'sawtooth' : 'triangle';
                    const harmMult = harmonics[i] || (1+(Math.random()-0.5)*0.012);
                    osc.frequency.value = rootFreq * harmMult;
                    const vibrato = ctx.createOscillator();
                    vibrato.type = 'sine';
                    vibrato.frequency.value = 4.5 + Math.random()*3.5;
                    const vibratoGain = ctx.createGain();
                    vibratoGain.gain.value = 1.5 + Math.random()*4;
                    vibrato.connect(vibratoGain);
                    vibratoGain.connect(osc.frequency);
                    allOscs.push(osc, vibrato);
                    osc.connect(filter);
                }
                filter.connect(gainNode);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.35;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.7;
                gainNode.connect(drySend);
                gainNode.connect(wetSend);
                drySend.connect(dryGain || ctx.destination);
                wetSend.connect(wetGain || ctx.destination);
                allOscs.forEach(o => { o.start(now); o.stop(now+duration+2); });
                filterLfo.start(now);
                filterLfo.stop(now+duration+2);
            } catch(err) { console.warn('String pad error:', err); }
        }

        function createCelloDrone(ctx, frequency, duration, intensity=0.5) {

                    osc.frequency.value = frequency * Math.pow(2, detune/1200);

            try {
                const now = ctx.currentTime;

                gainNode.gain.setValueAtTime(0.001, now);

                    osc.frequency.exponentialRampToValueAtTime(targetFreq*Math.pow(2, interval/12), now+duration);
                    oscs.push(osc);
                    osc.connect(filter);

                filter.connect(gainNode);

            } catch(err) { console.warn('String swell error:', err); }
        }

        function createLynchPad(ctx, frequency, duration, intensity=0.5, detuneSpread=8) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity*0.12, now+1.2);
                gainNode.gain.setValueAtTime(intensity*0.12, now+duration-2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration+0.8);
                const oscs = [];
                for (let i=0; i<4; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i<2 ? 'sawtooth' : 'triangle';
                    const detune = (i-1.5)*detuneSpread;
                    osc.frequency.value = frequency * Math.pow(2, detune/1200);
                    oscs.push(osc);
                }
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 180;
                filter.Q.value = 3;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.08 + Math.random()*0.12;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 100 + Math.random()*150;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                oscs.forEach(o => o.connect(filter));
                filter.connect(gainNode);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.45;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.55;
                gainNode.connect(drySend);
                gainNode.connect(wetSend);
                drySend.connect(dryGain || ctx.destination);
                wetSend.connect(wetGain || ctx.destination);
                oscs.forEach(o => { o.start(now); o.stop(now+duration+1); });
                lfo.start(now);
                lfo.stop(now+duration+1);
            } catch(err) { console.warn('Lynch pad error:', err); }
        }

        function createIndustrialTexture(ctx, duration, intensity=0.4) {
            try {
                const now = ctx.currentTime;
                const bufferSize = ctx.sampleRate * 2;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i=0; i<bufferSize; i++) {
                    const t = i/ctx.sampleRate;
                    data[i] = (Math.random()*2-1) * Math.sin(t*120 + Math.sin(t*3)*40) * Math.exp(-t/8);
                }
                const source = ctx.createBufferSource();
                source.buffer = buffer;
                source.loop = true;
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 200;
                filter.Q.value = 0.4;
                const gainNode = ctx.createGain();

                gainNode.gain.setValueAtTime(intensity*0.08, now+duration-1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration);
                source.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.7;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                source.start(now);
                source.stop(now+duration);
            } catch(err) { console.warn('Industrial texture error:', err); }
        }

        function createHat(ctx, intensity=0.3) {

                noise.start(now);

            } catch(err) { console.warn('Hat error:', err); }
        }

        // ─── AI‑ONLY PATTERN PLAYER ────────────────────────────────────
        function startEvolvingPatternPlayer(themeName, rootFreq=40, scoreData=null) {
            stopPatternPlayer();

            if (!scoreData || !scoreData[themeName]) {
                console.warn('No AI score data for theme:', themeName);
                return;
            }
            const theme = scoreData[themeName];
            const bpm = theme.bpm || 60;

            // Ensure we have arrays; expandPattern handles non-array gracefully
            const bass = expandPattern(theme.bass);
            const kick = expandPattern(theme.kick);
            const snare = expandPattern(theme.snare);
            const hat   = expandPattern(theme.hat);

            const variations = [{
                name: 'AI',
                bars: 8,
                bass: bass,
                kick: kick,
                snare: snare,
                hat: hat
            }];

            currentSectionPatterns = variations;
            currentVariationIdx = 0;
            barsInVariation = 0;
            patternStep = 0;
            patternBPM = bpm;
            fillActive = false;

            const stepDuration = 60 / bpm / 4;
            patternPlayerActive = { active: true, theme: themeName };

            function getCurrentPattern() {
                return currentSectionPatterns[0];
            }

            function playStep() {
                if (!patternPlayerActive || !patternPlayerActive.active) return;
                const ctx = audioCtx;
                if (!ctx) { patternPlayerTimeout = setTimeout(playStep, 100); return; }

                const step = patternStep % 16;
                const current = getCurrentPattern();
                const isFillStep = fillActive;

                // Bass
                let bassSemitone = 0;
                if (isFillStep) {
                    bassSemitone = (step % 4 === 0) ? 0 : (step % 8 === 4 ? 7 : 0);
                } else {
                    bassSemitone = current.bass[step] || 0;
                }
                if (bassSemitone !== 0 || (isFillStep && step % 4 === 0)) {
                    const dur = isFillStep ? 0.25 : 1.8;
                    const inten = isFillStep ? 0.3 : 0.5 + (bassSemitone / 30);
                    createBassNote(ctx, bassSemitone, inten, dur, rootFreq);
                }

                let kickVal = isFillStep ? (step % 4 === 0 ? 1 : 0) : (current.kick[step] || 0);
                if (kickVal === 1) createKick(ctx, isFillStep ? 0.7 : 0.6);

                let snareVal = isFillStep ? (step % 8 === 4 ? 1 : 0) : (current.snare[step] || 0);
                if (snareVal === 1) createSnare(ctx, isFillStep ? 0.7 : 0.5);

                let hatVal = isFillStep ? (step % 2 === 0 ? 1 : 0) : (current.hat[step] || 0);
                if (hatVal === 1 && Math.random() < 0.7) createHat(ctx, isFillStep ? 0.4 : 0.2);

                patternStep++;
                if (patternStep % 16 === 0) {
                    barsInVariation++;
                    if (barsInVariation >= current.bars) barsInVariation = 0;
                }

                patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
            }

            patternPlayerTimeout = setTimeout(playStep, 50);
        }

        function stopPatternPlayer() {
            if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout); patternPlayerTimeout = null; }
            if (patternPlayerActive) { patternPlayerActive.active = false; patternPlayerActive = null; }
            patternStep = 0; currentSectionPatterns = []; currentVariationIdx = 0; barsInVariation = 0; fillActive = false;
        }

        // ─── Master playSound ──────────────────────────────────────────
        async function playSound(type, intensity=0.7) {
            try {
                const ctx = await getAudioContext();
                if (!ctx) return;
                const now = ctx.currentTime;
                switch(type) {
                    case 'pad': createLynchPad(ctx, 55+Math.random()*25, 18+Math.random()*18, intensity); break;
                    case 'sting': createLynchSting(ctx, intensity); break;
                    case 'pulse':
                    case 'heartbeat':
                        createKick(ctx, 0.7*intensity);
                        setTimeout(() => createKick(ctx, 0.7*intensity), 200);
                        break;
                    case 'thunder': {
                        const bufferSize = ctx.sampleRate * 0.8;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i=0; i<bufferSize; i++) {
                            data[i] = (Math.random()*2-1) * Math.exp(-i/(ctx.sampleRate*0.5));
                        }
                        const source = ctx.createBufferSource();
                        source.buffer = buffer;
                        const gain = ctx.createGain();
                        gain.gain.setValueAtTime(intensity*0.5, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now+1.2);
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = 100;
                        filter.Q.value = 0.5;
                        source.connect(filter);
                        filter.connect(gain);
                        gain.connect(ctx.destination);
                        source.start(now);
                        source.stop(now+1.2);
                        break;
                    }
                    case 'bell': {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 60 + Math.random()*25;
                        const gain = ctx.createGain();
                        gain.gain.setValueAtTime(0, now);
                        gain.gain.linearRampToValueAtTime(intensity*0.35, now+0.15);
                        gain.gain.exponentialRampToValueAtTime(0.001, now+4);
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = 350;
                        osc.connect(filter);
                        filter.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now+4);
                        break;
                    }
                    case 'climax': createLynchClimax(ctx, intensity); break;
                    case 'industrial_hum': createIndustrialTexture(ctx, 12+Math.random()*10, intensity); break;
                    case 'string_pad': createStringPad(ctx, 55+Math.random()*30, 14+Math.random()*16, intensity); break;
                    case 'cello_drone': createCelloDrone(ctx, 40+Math.random()*25, 12+Math.random()*14, intensity); break;
                    case 'string_swell': createStringSwell(ctx, 50+Math.random()*40, 6+Math.random()*8, intensity); break;
                    case 'violin_texture': createViolinHarmonics(ctx, 80+Math.random()*60, 10+Math.random()*12, intensity); break;
                    case 'pizzicato':
                        createPizzicato(ctx, 60+Math.random()*50, intensity);
                        setTimeout(() => createPizzicato(ctx, 55+Math.random()*45, intensity*0.7), 180+Math.random()*250);
                        break;
                    case 'string_cluster': {
                        const clusterFreqs = [];
                        const root = 45 + Math.random()*35;
                        for (let i=0; i<5; i++) clusterFreqs.push(root*(1+(Math.random()-0.5)*0.25));
                        createStringCluster(ctx, clusterFreqs, 8+Math.random()*10, intensity);
                        break;
                    }
                    case 'bass': {
                        const semitone = Math.floor(Math.random()*12);
                        createBassNote(ctx, semitone, intensity, 1.5+Math.random()*1.5, 40);
                        break;
                    }
                    case 'kick': createKick(ctx, intensity); break;
                    case 'snare': createSnare(ctx, intensity); break;
                    case 'hat': createHat(ctx, intensity*0.5); break;
                    default: console.warn('Unknown sound type:', type);
                }
            } catch(err) { console.warn('playSound error:', err); }
        }

        // ─── Ambient ──────────────────────────────────────────────────
        async function playAmbient(type, durationSeconds, intensity=0.5) {
            try {
                stopAmbient();
                const ctx = await getAudioContext();
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity*0.22, now);
                gainNode.connect(ctx.destination);
                ambientGain = gainNode;
                let source = null;
                if (type === 'ambient_drone' || type === 'wind_howl' || type === 'industrial_drone') {
                    const bufferSize = ctx.sampleRate * 1.5;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i=0; i<bufferSize; i++) data[i] = (Math.random()*2-1)*0.4;
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    noise.loop = true;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = type === 'industrial_drone' ? 120 : type === 'ambient_drone' ? 160 : 500;
                    filter.Q.value = 0.4;
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = type === 'industrial_drone' ? 50 : type === 'ambient_drone' ? 70 : 100;
                    const gainOsc = ctx.createGain();
                    gainOsc.gain.value = 0.15*intensity;
                    osc.connect(gainOsc);
                    gainOsc.connect(filter);
                    noise.connect(filter);
                    filter.connect(gainNode);
                    osc.start(now);
                    noise.start(now);
                    source = { osc, noise };
                    ambientSource = source;
                } else {
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = 80;
                    osc.connect(gainNode);
                    osc.start(now);
                    source = { osc };
                    ambientSource = source;
                }
                if (ambientTimeout) clearTimeout(ambientTimeout);
                ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds*1000);
            } catch(err) { console.warn('playAmbient error:', err); }
        }

        function stopAmbient() {
            if (ambientGain) {
                const now = audioCtx ? audioCtx.currentTime : 0;
                ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                ambientGain.gain.exponentialRampToValueAtTime(0.001, now+0.5);
                setTimeout(() => {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                    if (ambientGain) { ambientGain.disconnect(); ambientGain = null; }
                }, 500);
            } else {
                if (ambientSource) {
                    if (ambientSource.osc) ambientSource.osc.stop();
                    if (ambientSource.noise) ambientSource.noise.stop();
                    ambientSource = null;
                }
            }
            if (ambientTimeout) { clearTimeout(ambientTimeout); ambientTimeout = null; }
        }

        // ─── Lynch Ambient Themes ─────────────────────────────────────
        const LYNCH_AMBIENT = {
            intro:       { rootFreq:45, detuneSpread:12, filterBase:120, lfoRate:0.05, noiseMix:0.15, intensity:0.25, stringLayer:'soft_pad', stringFreq:55, stringIntensity:0.18 },
            meeting:     { rootFreq:50, detuneSpread:10, filterBase:150, lfoRate:0.07, noiseMix:0.20, intensity:0.30, stringLayer:'cello', stringFreq:42, stringIntensity:0.22 },
            connection:  { rootFreq:55, detuneSpread:15, filterBase:130, lfoRate:0.09, noiseMix:0.30, intensity:0.35, stringLayer:'tension_pad', stringFreq:58, stringIntensity:0.28 },
            the_offer:   { rootFreq:48, detuneSpread:18, filterBase:100, lfoRate:0.11, noiseMix:0.45, intensity:0.45, stringLayer:'cluster', stringFreq:44, stringIntensity:0.35 },
            crossroads:  { rootFreq:52, detuneSpread:20, filterBase:90,  lfoRate:0.13, noiseMix:0.50, intensity:0.55, stringLayer:'swell', stringFreq:50, stringIntensity:0.42 },
            consequences:{ rootFreq:44, detuneSpread:8,  filterBase:140, lfoRate:0.04, noiseMix:0.10, intensity:0.20, stringLayer:'soft_pad', stringFreq:48, stringIntensity:0.14 },
            closing:     { rootFreq:40, detuneSpread:6,  filterBase:150, lfoRate:0.03, noiseMix:0.05, intensity:0.15, stringLayer:'soft_pad', stringFreq:42, stringIntensity:0.10 }
        };

        function startStringLayer(theme) {
            if (!audioCtx) return;
            stopStringAmbient();
            const ctx = audioCtx;
            const now = ctx.currentTime;
            const stringType = theme.stringLayer || 'soft_pad';
            const freq = theme.stringFreq || 50;
            const intensity = theme.stringIntensity || 0.2;
            const duration = 999;
            const allNodes = [];

            const gainNode = ctx.createGain();
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(intensity*0.2, now+2);

            if (stringType === 'cello') {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 280;
                filter.Q.value = 3;
                for (let i=0; i<3; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = freq * (1 + (i-1)*0.006);
                    const vib = ctx.createOscillator();
                    vib.type = 'sine';
                    vib.frequency.value = 2 + i;
                    const vibG = ctx.createGain();
                    vibG.gain.value = 2.5;
                    vib.connect(vibG);
                    vibG.connect(osc.frequency);
                    allNodes.push(osc, vib);
                    osc.connect(filter);
                }
                filter.connect(gainNode);
            } else if (stringType === 'cluster') {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                filter.Q.value = 1.5;
                const clusterFreqs = [freq*0.98, freq, freq*1.015, freq*1.03, freq*1.05];
                clusterFreqs.forEach(f => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = f;
                    const mlfo = ctx.createOscillator();
                    mlfo.type = 'sine';
                    mlfo.frequency.value = 0.25 + Math.random()*0.5;
                    const mg = ctx.createGain();
                    mg.gain.value = 1.5;
                    mlfo.connect(mg);
                    mg.connect(osc.frequency);
                    allNodes.push(osc, mlfo);
                    osc.connect(filter);
                });
                filter.connect(gainNode);
            } else if (stringType === 'swell') {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 350;
                filter.Q.value = 2;
                const intervals = [0,4,7,12,19];
                intervals.forEach(interval => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = freq * Math.pow(2, interval/12);
                    allNodes.push(osc);
                    osc.connect(filter);
                });
                filter.connect(gainNode);
            } else {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 550;
                filter.Q.value = 2;
                for (let i=0; i<6; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i<3 ? 'triangle' : 'sawtooth';
                    osc.frequency.value = freq * (1 + (i-2.5)*0.007);
                    const vib = ctx.createOscillator();
                    vib.type = 'sine';
                    vib.frequency.value = 3.5 + i*0.8;
                    const vibG = ctx.createGain();
                    vibG.gain.value = 2 + i*0.5;
                    vib.connect(vibG);
                    vibG.connect(osc.frequency);
                    allNodes.push(osc, vib);
                    osc.connect(filter);
                }
                filter.connect(gainNode);
            }

            const wetSend = ctx.createGain();
            wetSend.gain.value = 0.6;
            gainNode.connect(wetSend);
            wetSend.connect(wetGain || ctx.destination);
            gainNode.connect(dryGain || ctx.destination);

            allNodes.forEach(n => n.start(now));
            stringAmbientActive = {
                nodes: allNodes, gainNode, wetSend,
                stop: () => {
                    gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime+1);
                    allNodes.forEach(n => { try { n.stop(ctx.currentTime+1.2); } catch(e) {} });
                }
            };
        }

        function stopStringAmbient() {
            if (stringAmbientActive) { stringAmbientActive.stop(); stringAmbientActive = null; }
        }

        function startCrossroadsAmbient(themeName) {
            if (!audioCtx) return;
            stopSectionAmbient();
            const theme = LYNCH_AMBIENT[themeName] || LYNCH_AMBIENT.intro;
            const ctx = audioCtx;
            const now = ctx.currentTime;
            const gainNode = ctx.createGain();
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(theme.intensity*0.2, now+1.5);
            const oscs = [];
            for (let i=0; i<3; i++) {
                const osc = ctx.createOscillator();
                osc.type = i===0 ? 'sawtooth' : i===1 ? 'triangle' : 'sawtooth';
                const detune = (i-1)*theme.detuneSpread;
                osc.frequency.value = theme.rootFreq * Math.pow(2, detune/1200);
                oscs.push(osc);
            }
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = theme.filterBase;
            filter.Q.value = 2.5;
            const lfo = ctx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = theme.lfoRate;
            const lfoGain = ctx.createGain();
            lfoGain.gain.value = 80;
            lfo.connect(lfoGain);
            lfoGain.connect(filter.frequency);
            oscs.forEach(o => o.connect(filter));
            filter.connect(gainNode);
            const wetSend = ctx.createGain();
            wetSend.gain.value = 0.55;
            gainNode.connect(wetSend);
            wetSend.connect(wetGain || ctx.destination);
            gainNode.connect(dryGain || ctx.destination);
            oscs.forEach(o => o.start(now));
            lfo.start(now);
            if (theme.noiseMix > 0) {
                const bufferSize = ctx.sampleRate * 2;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i=0; i<bufferSize; i++) data[i] = (Math.random()*2-1)*theme.noiseMix;
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                noise.loop = true;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'lowpass';
                noiseFilter.frequency.value = theme.filterBase*0.7;
                noiseFilter.Q.value = 0.3;
                const noiseGain = ctx.createGain();
                noiseGain.gain.value = theme.noiseMix*0.3;
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(gainNode);
                noise.start(now);
                oscs.push(noise);
            }
            sectionAmbientActive = {
                stop: () => {
                    gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime+0.6);
                    oscs.forEach(s => { try { s.stop(ctx.currentTime+0.8); } catch(e) {} });
                    try { lfo.stop(ctx.currentTime+0.8); } catch(e) {}
                    sectionAmbientActive = null;
                }
            };
            startStringLayer(theme);
            startEvolvingPatternPlayer(themeName, 40, sectionThemeScore);
        }

        function transitionSectionTheme(themeName, scoreData) {
            if (scoreData) sectionThemeScore = scoreData;
            startCrossroadsAmbient(themeName);

        function stopSectionAmbient() {
            if (sectionAmbientActive) { sectionAmbientActive.stop(); sectionAmbientActive = null; }

        async function mistralChat(msgs, maxTok=500, timeoutMs=28000) {
            if (!apiKey) throw new Error('API key missing');
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const res = await fetch(MISTRAL_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
                    body: JSON.stringify({ model:MODEL, messages:msgs, temperature:0.9, max_tokens:maxTok }),
                    signal: controller.signal
                });
                if (!res.ok) { const errText = await res.text(); throw new Error(`API error ${res.status}: ${errText}`); }
                const data = await res.json();
                return data.choices[0].message.content.trim();
            } catch(e) {
                if (e.name === 'AbortError') throw new Error('Request timed out. Please try again.');
                throw e;
            } finally { clearTimeout(timeout); }
        }

        async function generateImage(prompt) {
            const now = Date.now();
            if (now < gameState.imageCooldownUntil) {
                await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
            }
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', 1980s film still, neon-lit, cinematic, grainy 35mm film')}?width=512&height=640&seed=${Date.now()}`;
            return new Promise((resolve, reject) => {
                const img = new Image();
                let resolved = false;
                const timeout = setTimeout(() => { if (!resolved) { resolved = true; reject(new Error('Image load timeout')); } }, 15000);
                img.onload = () => { if (!resolved) { resolved = true; clearTimeout(timeout); resolve(url); } };
                img.onerror = () => { if (!resolved) { resolved = true; clearTimeout(timeout); reject(new Error('Image load error')); } };
                img.src = url;
            });
        }

        async function generateImageWithRetry(prompt, retries=2) {
            let lastError = null;
            for (let i=0; i<retries; i++) {
                try { return await generateImage(prompt); }
                catch(e) { lastError = e; await new Promise(r => setTimeout(r, 20)); }
            }
            throw lastError || new Error('Image generation failed');
        }

        function typewriterEffect(element, text, speed, onChar=null) {
            return new Promise((resolve) => {
                let i=0;
                element.textContent = '';
                const timer = setInterval(() => {
                    if (i < text.length) { 
                        element.textContent += text.charAt(i); 
                        if (onChar) onChar(i); 
                        i++; 
                    } else { 
                        clearInterval(timer); 
                        resolve(); 
                    }
                }, speed);
            });
        }

        function speakTextMale(text) {
            if (!text) return;
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = speechSynthesis.getVoices();
            const maleNames = ['Google UK English Male','Google US English Male','Daniel','Microsoft David','Fred','Alex','Thomas','James'];
            let voice = null;
            for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
            if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
            if (voice) utterance.voice = voice;
            utterance.rate = 0.62;
            utterance.pitch = 0.9;
            speechSynthesis.speak(utterance);
        }

                                <span class="dim">🎵</span> <span id="scoreThemeLabel">intro</span>
                                <span class="dim">·</span> <span id="scoreVariationLabel">A</span>
                                <span class="dim">·</span> <span id="scoreBarLabel">bar 1</span>
                                <div class="progress-bar"><div class="fill" id="scoreProgressFill" style="width:0%;"></div></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tv-guide">
                    <h3>🛣️ THE CROSSROADS · EPISODES</h3>
                    <div id="crGuideList"></div>
                </div>
            `;
            const guideList = document.getElementById('crGuideList');
            const episodes = gameState.episodes || [];
            episodes.forEach((ep, index) => {
                const entry = document.createElement('div');
                entry.className = 'guide-entry';
                const hasCues = ep.soundCues && (Array.isArray(ep.soundCues) ? ep.soundCues.length > 0 : (ep.soundCues.cues && ep.soundCues.cues.length > 0));
                entry.innerHTML = `
                    <span class="guide-time">SAVED</span>
                    ${ep.imageUrl ? `
                        <div style="position:relative; width:50px; height:50px; flex-shrink:0; margin-right:8px; border-radius:2px; overflow:hidden; border:1px solid #1a1a30;">
                            <img src="${esc(ep.imageUrl)}" style="width:100%; height:100%; object-fit:cover;" alt="Poster">
                            <div style="position:absolute; top:0; left:0; right:0; font-family:${esc('--font-title')}; font-size:4px; text-align:center; color:#e8e8f8; text-shadow:0 0 3px #00ccf0; background:rgba(2,2,8,0.7); padding:1px 2px; letter-spacing:0.5px; line-height:1.1; pointer-events:none;">CROSSROADS</div>
                            <div style="position:absolute; bottom:0; left:0; right:0; font-family:${esc('--font-display')}; font-size:3.5px; text-align:center; color:#d0d8e8; text-shadow:0 0 2px #000; background:rgba(2,2,8,0.65); padding:1px 2px; line-height:1.2; pointer-events:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(ep.title)}</div>
                        </div>
                    ` : ''}
                    <div class="guide-info">
                        <div class="guide-title">"${esc(ep.title)}"</div>
                        <div class="guide-desc">${hasCues ? '🎧 Soundtrack ready' : 'Two strangers. One fateful encounter.'}</div>
                    </div>
                    <div class="guide-actions">
                        <button class="btn guide-btn perform-saved-btn" data-index="${index}">▶ Play</button>
                        ${!hasCues ? `<button class="btn guide-btn produce-episode-btn" data-index="${index}">🎬 Produce Score</button>` : '<span style="color:#00ccf0; font-size:12px;">✅</span>'}
                    </div>
                `;
                guideList.appendChild(entry);
            });

            const newBtn = document.createElement('button');
            newBtn.className = 'btn accent';
            newBtn.style.marginTop = '12px';
            newBtn.style.width = '100%';
            newBtn.textContent = '🛣️ New Episode';
            newBtn.addEventListener('click', async () => {
                newBtn.disabled = true;
                newBtn.textContent = '⏳ Finding a story…';
                try {
                    await getAudioContext();
                    await generateAndPerform();
                    newBtn.disabled = false;
                    newBtn.textContent = '🛣️ New Episode';
                } catch(e) {
                    showModal(`<h2>🛣️ Road Closed</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
                    newBtn.disabled = false;
                    newBtn.textContent = '🛣️ New Episode';
                }
            });
            guideList.appendChild(newBtn);

            if (gameState.currentPerformance && gameState.currentPerformance.rawStoryText && !gameState.currentPerformance.soundCues) {
                const produceBtn = document.createElement('button');
                produceBtn.className = 'btn accent2';
                produceBtn.style.marginTop = '6px';
                produceBtn.style.width = '100%';
                produceBtn.textContent = '🎬 Produce Soundtrack';
                produceBtn.addEventListener('click', async () => {
                    produceBtn.disabled = true;
                    produceBtn.textContent = '🎚️ Composing…';
                    try {
                        const cues = await generateSoundCueSheet(gameState.currentPerformance.rawStoryText);
                        gameState.currentPerformance.soundCues = cues;
                        saveState();
                        produceBtn.textContent = '✅ Soundtrack Ready';
                        renderCrossroadsPanel();
                    } catch(e) {
                        showModal(`<h2>Score Failed</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
                        produceBtn.disabled = false;
                        produceBtn.textContent = '🎬 Produce Soundtrack';
                    }
                });
                guideList.appendChild(produceBtn);
            }

            document.querySelectorAll('.perform-saved-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const index = parseInt(btn.dataset.index);
                    const ep = gameState.episodes[index];
                    if (!ep) return;
                    gameState.currentPerformance = { ...ep, soundCues: ep.soundCues || null, rawStoryText: ep.rawStoryText || ep.story };
                    saveState();
                    await getAudioContext();
                    await startCrossroadsPerformance();
                });
            });
            document.querySelectorAll('.produce-episode-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const index = parseInt(btn.dataset.index);
                    const ep = gameState.episodes[index];
                    if (!ep || !ep.rawStoryText) return;
                    btn.disabled = true;
                    btn.textContent = '🎚️...';
                    try {
                        const soundtrack = await generateSoundCueSheet(ep.rawStoryText);
                        ep.soundCues = soundtrack;
                        saveState();
                        renderCrossroadsPanel();
                    } catch(err) {
                        showModal(`<h2>Score Failed</h2><p>${esc(err.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
                        btn.disabled = false;
                        btn.textContent = '🎬 Produce';
                    }
                });
            });
        }

        // ─── Story & Score Generation ────────────────────────────────
        async function generateNewCrossroadsStory() {
            const system = `You are Marlon Cross, the world-weary host of The Crossroads — an anthology series about strangers who meet at life's turning points. You narrate grounded, brutal stories of human connection and consequence.`;
            const prompt = `Write a 900 to 1100 word short story for The Crossroads. Set in the 1980s. Two strangers meet in a believable way (flat tyre, diner, missed bus, broken-down car, road closure, motel, truck stop, etc.). Their conversation starts naturally. One offers something — a lift, a drink, a deal, a favour, a place to stay. The story revolves around one dominant human motive: Greed, Revenge, Guilt, Fear, Desperation, Obsession, Pride, Jealousy, Betrayal, or Ambition. There must be a clear moment where one character can still walk away — but doesn't. That's the crossroads. The ending should be earned and varied: one might die, go to prison, escape, live with guilt, get away with it, or learn the truth too late. STRICT RULES: No supernatural elements. No ghosts, curses, magic, or dreams. The horror must be purely human — psychological, visceral, grounded. Style: Stephen King meets Hitchcock. Brutal, unflinching, no easy escapes. Frame the story with Marlon Cross's weary intro and a cold, knowing closing remark. Return ONLY valid JSON: title, story (use \\n for line breaks), closing_remark. Output raw JSON only.`;
            const resp = await mistralChat([{ role:'system', content:system }, { role:'user', content:prompt }], 3500, 45000);
            let jsonStr = resp.replace(/```json|```/g,'').replace(/`/g,'').trim();
            const story = JSON.parse(jsonStr);
            story.story = story.story.replace(/\\n/g, '\n');
            if (!story.title || !story.story || !story.closing_remark) throw new Error('Invalid story structure');
            let imageUrl = null;
            try {
                const imagePrompt = `Film still for an episode titled "${story.title}", 1980s roadside Americana, neon-lit diner or highway, cinematic, grainy 35mm, two strangers`;
                imageUrl = await generateImageWithRetry(imagePrompt, 2);
            } catch(e) { console.warn('Could not generate poster:', e); }
            gameState.currentPerformance = {
                title: story.title,
                story: story.story,
                closing_remark: story.closing_remark,
                imageUrl: imageUrl || '',
                rawStoryText: story.story,
                soundCues: null
            };
            saveState();
        }

       async function generateSoundCueSheet(storyText) {
    const length = storyText.length;
    const system = `You are a sound designer for an 80s film soundtrack with a full orchestra.
Given a short story, return JSON with THREE keys:
- "sections": array of 5-7 sections dividing the story into emotional acts. Each has "theme" (one of: intro, meeting, connection, the_offer, crossroads, consequences, closing), "start_char" (inclusive), "end_char" (exclusive). Cover entire story from 0 to ${length}.
- "cues": array of sound events using types: "sting", "pulse", "thunder", "bell", "climax", "industrial_hum", "pad", "string_pad", "cello_drone", "string_swell", "violin_texture", "pizzicato", "string_cluster", "bass", "kick", "snare". Include at least 40 cues spread evenly. Use string instruments generously.
- "score": object with keys matching theme names. Each key: "bpm" (40-80), "bass" (array of 8 integers 0-24), "kick" (array of 8 integers 0/1), "snare" (array of 8 integers 0/1), "hat" (array of 8 integers 0/1).
Return ONLY raw JSON.`;
    const userPrompt = `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and 80s film score patterns.`;
    const resp = await mistralChat([{ role:'system', content:system }, { role:'user', content:userPrompt }], 4000, 35000);
    const cleaned = resp.replace(/```json|```/g,'').trim();
    let data;
    try { data = JSON.parse(cleaned); } catch(parseErr) {
        const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
        if (match) { const candidate = match[0].replace(/,\s*([}\]])/g,'$1'); try { data = JSON.parse(candidate); } catch(e2) { throw new Error('Failed to parse AI soundtrack JSON.'); } }
        else throw new Error('No JSON found in AI response.');
    }
    
    console.log('🔍 Raw AI response (score):', data.score); // Log to see what AI returned

    if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object') 
        throw new Error('Missing sections, cues, or score in AI response');
    
    const sortedSections = data.sections.sort((a,b) => a.start_char - b.start_char);
    if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length-1].end_char < length) {
        sortedSections[0].start_char = 0;
        sortedSections[sortedSections.length-1].end_char = length;
    }
    const cues = data.cues.map(c => ({ 
        type: c.type, 
        position: Math.min(c.position, length - 1), 
        intensity: c.intensity || 0.7 
    }));

    const requiredThemes = ['intro','meeting','connection','the_offer','crossroads','consequences','closing'];
    const score = {};

    // Helper: normalize an array to exactly 8 numbers
    function normalizeArray(arr, maxVal = 24) {
        if (!Array.isArray(arr)) {
            throw new Error('Expected array, got ' + typeof arr);
        }
        // Convert all elements to numbers, treat null/undefined as 0
        let clean = arr.map(v => {
            const num = Number(v);
            return isNaN(num) ? 0 : Math.min(maxVal, Math.max(0, Math.round(num)));
        });
        // Pad or slice to length 8
        if (clean.length < 8) {
            while (clean.length < 8) clean.push(0);
        } else if (clean.length > 8) {
            clean = clean.slice(0, 8);
        }
        return clean;
    }

    for (const theme of requiredThemes) {
        if (!data.score[theme]) {
            throw new Error(`AI did not provide a score for theme "${theme}". Cannot continue.`);
        }
        const s = data.score[theme];
        if (typeof s.bpm !== 'number' || s.bpm < 30 || s.bpm > 120) {
            throw new Error(`Invalid bpm for theme "${theme}": ${s.bpm}`);
        }
        // Normalize arrays – this is cleaning, not fallback
        const bass = normalizeArray(s.bass, 24);
        const kick = normalizeArray(s.kick, 1);
        const snare = normalizeArray(s.snare, 1);
        const hat   = normalizeArray(s.hat, 1);

        score[theme] = { bpm: s.bpm, bass, kick, snare, hat };
    }

    console.log('✅ Normalized AI score:', score);

    return { sections: sortedSections, cues, score };
}

        async function generateAndPerform() {
            await generateNewCrossroadsStory();
            if (!gameState.currentPerformance) throw new Error('Failed to generate story');
            const soundtrack = await generateSoundCueSheet(gameState.currentPerformance.rawStoryText);
            gameState.currentPerformance.soundCues = soundtrack;
            saveState();
            await startCrossroadsPerformance();
        }

        // ─── Performance ──────────────────────────────────────────────
        async function startCrossroadsPerformance() {
            speechSynthesis.cancel();
            if (window.crTimeout) clearTimeout(window.crTimeout);
            const storyData = gameState.currentPerformance;
            if (!storyData || !storyData.story) { await generateNewCrossroadsStory(); return startCrossroadsPerformance(); }

            await getAudioContext();

            let sectionList = null, cueList = null, scoreData = null;
            if (storyData.soundCues) {
                if (Array.isArray(storyData.soundCues)) {
                    cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                    sectionList = storyData.soundCues.sections;
                    cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                    scoreData = storyData.soundCues.score;
                }
            }
            const bubble = document.getElementById('crSpeechBubble');
            const dialogue = document.getElementById('crDialogue');
            const imageEl = document.getElementById('crSegmentImage');
            if (!bubble || !dialogue) return;
            const guideList = document.getElementById('crGuideList');
            if (guideList) guideList.style.display = 'none';
            bubble.style.borderColor = '#00ccf044';
            bubble.style.boxShadow = '0 0 30px #00ccf030, 0 0 50px #ff338815';
            dialogue.innerHTML = '';
            const oldBack = document.getElementById('crBackBtn');
            if (oldBack) oldBack.remove();
            const oldAdd = document.getElementById('crAddEpisodeBtn');
            if (oldAdd) oldAdd.remove();
            const posterContainer = document.getElementById('crPosterContainer');
            const posterTitle = document.getElementById('crPosterTitle');
            if (posterContainer && imageEl && storyData.imageUrl) {
                imageEl.src = storyData.imageUrl;
                imageEl.classList.add('visible');
                imageEl.style.display = 'block';
                posterContainer.classList.remove('no-image', 'loading');
                posterContainer.classList.add('visible');
                if (posterTitle) posterTitle.textContent = storyData.title || '';
            } else if (posterContainer) posterContainer.classList.add('no-image');

            const intro = `"Every road leads somewhere. Some lead to someone. I'm Marlon Cross. Tonight's story: '${storyData.title}'. Two strangers. One meeting. And everything that follows."`;
            dialogue.textContent = '';
            speakTextMale(intro);
            await typewriterEffect(dialogue, intro, 48);
            await new Promise(r => setTimeout(r, 1500));

            let indicatorInterval = setInterval(() => {
                if (patternPlayerActive) {
                    const theme = patternPlayerActive.theme || 'intro';
                    const varIdx = currentVariationIdx;
                    const varName = currentSectionPatterns[varIdx] ? currentSectionPatterns[varIdx].name : 'A';
                    const bar = barsInVariation + 1;
                    updateScoreIndicator(theme, varName, bar);
                } else {
                    updateScoreIndicator('...', '—', 0);
                }
            }, 1000);

            if (sectionList && sectionList.length > 0) {
                transitionSectionTheme(sectionList[0].theme, scoreData);
            } else if (scoreData) {
                transitionSectionTheme('intro', scoreData);
            } else {
                // no score – pattern player will warn and exit
            }

            const storyText = storyData.rawStoryText || storyData.story;
            if (!storyText) {
                console.warn('No story text to speak/type');
                await showClosingAndFinish(storyData, dialogue, indicatorInterval);
                return;
            }

            // ----- TTS + typing decoupled -----
            speakTextMale(storyText);

            let cueChecker = null;
            if (cueList && cueList.length > 0) {
                const sortedCues = [...cueList].sort((a,b) => a.position - b.position);
                let cueIdx = 0;
                const triggered = new Set();
                let lastLog = 0;
                const sortedSections = sectionList ? [...sectionList].sort((a,b) => a.start_char - b.start_char) : [];
                let sectionIdx = 0;
                let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                cueChecker = function check(idx) {
                    if (idx - lastLog > 500) { lastLog = idx; }
                    while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                        const sec = sortedSections[sectionIdx];
                        if (sec.theme !== currentTheme) {
                            currentTheme = sec.theme;
                            transitionSectionTheme(currentTheme, scoreData);
                        }
                        sectionIdx++;
                    }
                    while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                        const cue = sortedCues[cueIdx];
                        if (!triggered.has(cueIdx)) {
                            triggered.add(cueIdx);
                            playSound(cue.type, cue.intensity);
                        }
                        cueIdx++;
                    }
                };
            }

            dialogue.textContent = '';
            if (cueChecker) {
                await typewriterEffect(dialogue, storyText, 30, (idx) => cueChecker(idx));
            } else {
                await typewriterEffect(dialogue, storyText, 30);
            }

            // Wait for TTS to finish roughly
            await new Promise(r => setTimeout(r, Math.max(2000, storyText.length * 18)));

            await showClosingAndFinish(storyData, dialogue, indicatorInterval);
        }

        async function showClosingAndFinish(storyData, dialogue, indicatorInterval) {
            const closing = `"${storyData.closing_remark}"`;
            const closingLine = document.createElement('p');
            closingLine.style.marginTop = '16px';
            closingLine.style.fontStyle = 'italic';
            closingLine.style.color = '#c8d8e8';
            dialogue.appendChild(closingLine);
            speakTextMale(closing);
            await typewriterEffect(closingLine, closing, 42);
            await new Promise(r => setTimeout(r, 1000));

            const curtainText = document.createElement('p');
            curtainText.textContent = '— End of the road —';
            stopSectionAmbient();
            stopPatternPlayer();
            clearInterval(indicatorInterval);
            const indicator = document.getElementById('scoreIndicator');
            if (indicator) indicator.style.display = 'none';
            curtainText.style.color = '#6a6a80';
            curtainText.style.fontSize = '14px';
            dialogue.appendChild(curtainText);
            stopAmbient();

            const btnRow = document.createElement('div');
            btnRow.style.marginTop = '12px';
            btnRow.style.display = 'flex';
            btnRow.style.gap = '8px';
            btnRow.style.justifyContent = 'flex-end';
            const leaveBtn = document.createElement('button');
            leaveBtn.className = 'btn back-btn';
            leaveBtn.textContent = '← Back to Crossroads';
            leaveBtn.addEventListener('click', () => { leaveCrossroads(); });
            btnRow.appendChild(leaveBtn);
            const addBtn = document.createElement('button');
            addBtn.className = 'btn accent';
            addBtn.id = 'crAddEpisodeBtn';
            addBtn.textContent = '➕ Save Episode';
            addBtn.addEventListener('click', () => { addCurrentEpisode(); addBtn.disabled = true; addBtn.textContent = '✓ Saved'; });
            btnRow.appendChild(addBtn);
            dialogue.appendChild(btnRow);
        }

        function addCurrentEpisode() {
            const perf = gameState.currentPerformance;
            if (!perf) return;
            gameState.episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
            saveState();
            setTimeout(() => leaveCrossroads(), 600);
        }

        function leaveCrossroads() {
            stopAmbient();
            stopSectionAmbient();
            stopPatternPlayer();
            const indicator = document.getElementById('scoreIndicator');
            if (indicator) indicator.style.display = 'none';
            renderCrossroadsPanel();
        }

        // ─── Init ──────────────────────────────────────────────────────
        function init() {
            loadState();
            renderCrossroadsPanel();
            document.getElementById('resetApiBtn').addEventListener('click', () => {
                const key = prompt('Enter your Mistral API key:');
                if (key && key.length > 10) { apiKey = key; localStorage.setItem('crossroads_key', key); }
            });
            document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
            document.querySelector('.game-area').addEventListener('click', (e) => {
                const portrait = e.target.closest('.host-portrait');
                if (portrait && HOST_BIO) showModal(HOST_BIO);
            });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
            if (!apiKey) setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
            document.addEventListener('click', () => { getAudioContext().catch(()=>{}); }, { once: true });
        }
        init();
    })();
    </script>
