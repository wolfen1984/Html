<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>THE NOCTURNE THEATER · 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #040308;
            --screen-bg: #08060c;
            --panel-bg: #0a0810;
            --text: #c4bab0;
            --text-dim: #6e5a58;
            --text-bright: #e6d8c4;
            --accent: #8b1a2b;
            --accent-dim: #3e0f18;
            --border: #6b1522;
            --border-glow: 0 0 14px #7b1a2b55, 0 0 32px #3a0a1422;
            --danger: #7b1a2b;
            --danger-glow: 0 0 12px #7b1a2b44;
            --amber: #c4a44a;
            --amber-dim: #5c3d18;
            --gold: #c4a44a;
            --gold-dim: #4a3010;
            --green: #4a7a3a;
            --input-bg: #100e18;
            --button-bg: #14121c;
            --button-hover: #1c1828;
            --button-active: #18101c;
            --bevel-light: #282230;
            --bevel-dark: #040206;
            --font-display: 'Creepster', 'Nosifer', cursive;
            --font-title: 'Nosifer', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.06;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 30px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0f0a14 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #141114;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2a2028, 0 0 0 4px #0d0a10, 0 0 0 8px #060408, 0 8px 48px #000000dd, 0 0 60px #3a0a1422;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid red;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #0a060c;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #c4a44a;
            border-radius: 50%;
            box-shadow: 0 0 8px #c4a44a88, 0 0 18px #c4a44a33;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #c4a44a88, 0 0 18px #c4a44a33;
            }
            50% {
                box-shadow: 0 0 14px #c4a44abb, 0 0 28px #c4a44a55;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #3a2a28;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid red;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #0a0408;
            border-bottom: 3px solid #6b1522;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #1a0810;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid red;
            border-radius: 2px;
            padding: 10px 14px;
            background: #060208;
            position: relative;
            box-shadow: inset 0 0 24px #5c001111;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #8b1a2b;
            box-shadow: 0 0 12px #7b1a2b88;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #c4a44a44;
            box-shadow: 0 0 8px #c4a44a33;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: red;
            text-shadow: 0 0 16px #8b1a2b88, 0 2px 4px #000, 0 0 40px #5c101888;
            letter-spacing: 3px;
            font-family: var(--font-title);
            line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #7a5a4a;
            letter-spacing: 5px;
            margin-top: 3px;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 20px;
                letter-spacing: 1px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #2a0f18 #08060c;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #08060c;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #2a0f18;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #282230;
            border-top-color: #342c3c;
            border-left-color: #302834;
            border-right-color: #1c1824;
            border-bottom-color: #100e18;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #1c1824;
            border-left-color: #1c1824;
            border-bottom-color: #342c3c;
            border-right-color: #302834;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #100e18;
        }
        .btn.accent {
            background: #140a10;
            border-color: #4a1522;
            border-top-color: #6a1a2e;
            border-left-color: #5a1628;
            border-right-color: #2e0f18;
            border-bottom-color: #1a0810;
            color: #d4a898;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #7b1a2b22;
        }
        .btn.accent:active {
            border-top-color: #2e0f18;
            border-left-color: #2e0f18;
            border-bottom-color: #6a1a2e;
            border-right-color: #5a1628;
            box-shadow: 0 0px 0 #00000044, 0 0 16px #7b1a2b44;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .theater-mask {
            position: relative;
            background: #0a0812;
            border: 2px solid #6b152266;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.8);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #080610;
            border: 2px solid red;
            padding: 15px;
            border-radius: 3px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid red;
            box-shadow: 0 0 22px #7b1a2b66, 0 0 0 2px #1a0a10;
            object-fit: cover;
            flex-shrink: 0;
            background: #0a0610;
        }
        .speech-bubble {
            flex: 1;
            background: #100e1a;
            border: 2px solid red;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #d4bfa8;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #8b1a2b88 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #080610;
            border: 1px solid #2a0f18;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #12101a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6e5a58;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
/* ── Story Poster Overlay ── */
.story-poster-container {
    position: relative;
    display: block;
    width: 100%;
    max-height: 240px;
    overflow: hidden;
    border-radius: 3px;
    border: 2px solid #6b1522;
    box-shadow: 0 0 20px #7b1a2b44, inset 0 0 30px rgba(0,0,0,0.5);
    flex-shrink: 0;
    background: #080610;
}
.story-poster-container .segment-image {
    display: block;
    width: 100%;
    max-height: 240px;
    object-fit: cover;
    border: none;
    border-radius: 1px;
}
/* Dark gradient vignette over the image */
.story-poster-container::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(4,3,8,0.85) 100%);
    z-index: 2;
}
/* "THE NOCTURNE THEATER" – top banner */
.poster-overlay-theater {
    position: absolute;
    top: 8px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 5;
    pointer-events: none;
    font-family: var(--font-title);
    font-size: 14px;
    letter-spacing: 3px;
    color: red;
    text-shadow:
        0 0 10px #8b1a2bcc,
        0 0 30px #8b1a2b88,
        0 2px 4px #000000,
        0 0 60px #3a0a14;
    text-transform: uppercase;
    line-height: 1.2;
    background: linear-gradient(
        to bottom,
        rgba(10,4,8,0.9) 0%,
        rgba(10,4,8,0.7) 40%,
        transparent 100%
    );
    padding: 6px 12px 10px;
}
/* Story title – positioned below the theater name */
.poster-overlay-title {
    position: absolute;
    bottom: 10px;
    left: 8px;
    right: 8px;
    text-align: center;
    z-index: 5;
    pointer-events: none;
    font-family: var(--font-display);
    font-size: 16px;
    letter-spacing: 1.5px;
    color: yellow;
    text-shadow:
        0 0 8px #c4a44a88,
        0 0 20px #5c3d1844,
        0 2px 4px #000000;
    background: linear-gradient(
        to top,
        rgba(4,3,8,0.9) 0%,
        rgba(4,3,8,0.6) 50%,
        transparent 100%
    );
    padding: 10px 8px 6px;
    line-height: 1.3;
}
/* Hide overlay container when no image */
.story-poster-container.no-image {
    display: none;
}
/* Loading state */
.story-poster-container.loading {
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6e5a58;
    font-size: 14px;
    animation: pulse 1.5s ease-in-out infinite;
}
.story-poster-container.loading .segment-image,
.story-poster-container.loading .poster-overlay-theater,
.story-poster-container.loading .poster-overlay-title {
    display: none;
}
/* Responsive adjustments */
@media (max-width: 480px) {
    .story-poster-container {
        max-height: 180px;
    }
    .poster-overlay-theater {
        font-size: 11px;
        letter-spacing: 2px;
        top: 4px;
        padding: 4px 8px 8px;
    }
    .poster-overlay-title {
        font-size: 13px;
        bottom: 6px;
        padding: 8px 6px 4px;
    }
}

        </p>
    `;

            // ── SOUND ENGINE (Web Audio API) ──

            function createKeepAlive(ctx) {

           async function getAudioContext() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        console.log(`🎛️ AudioContext created, initial state: ${audioCtx.state}`);
        createKeepAlive(audioCtx);
        initReverb(audioCtx);

        // Create master gain and route reverb through it
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.2;   // adjust this to taste – lower = quieter soundtrack
        reverbNode.connect(masterGain);
        masterGain.connect(audioCtx.destination);
const compressor = audioCtx.createDynamicsCompressor();
compressor.threshold.value = -24;
compressor.knee.value = 30;
compressor.ratio.value = 12;
compressor.attack.value = 0.003;
compressor.release.value = 0.25;
masterGain.connect(compressor);
compressor.connect(audioCtx.destination);
// ── Dry/wet mix for all sounds ──
dryGain = audioCtx.createGain();    // no const – now it sets the global variable
dryGain.gain.value = 1.0;
wetGain = audioCtx.createGain();    // no const
wetGain.gain.value = 0.3;
dryGain.connect(masterGain);
wetGain.connect(reverbNode);
reverbNode.connect(masterGain);    }
    if (audioCtx.state === 'suspended') {
        await audioCtx.resume();
    }
    return audioCtx;

function initReverb(ctx) {
    if (!reverbNode) {
        const sampleRate = ctx.sampleRate;
        const length = sampleRate * 2;
        const impulse = ctx.createBuffer(2, length, sampleRate);
        const left = impulse.getChannelData(0);
        const right = impulse.getChannelData(1);
        for (let i = 0; i < length; i++) {
            const decay = Math.exp(-i / (sampleRate * 0.4));
            left[i] = (Math.random() * 2 - 1) * decay;
            right[i] = (Math.random() * 2 - 1) * decay;
        }
        reverbNode = ctx.createConvolver();
        reverbNode.buffer = impulse;
        reverbNode.normalize = true;
        // DO NOT connect to destination here – we'll do that via masterGain
    }
    return reverbNode;
}
function createSynthPad(ctx, frequency, duration, intensity = 0.6) {
    const now = ctx.currentTime;
    const gainNode = ctx.createGain();
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(intensity * 0.18, now + 0.5);
    gainNode.gain.setValueAtTime(intensity * 0.18, now + duration - 1);
    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.2);

    // 3 detuned sawtooth oscillators
    const osc1 = ctx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.value = frequency;

    const osc2 = ctx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.value = frequency * 1.003;

    const osc3 = ctx.createOscillator();
    osc3.type = 'sawtooth';
    osc3.frequency.value = frequency * 0.997;

    // Low‑pass filter with LFO for movement
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 800;
    filter.Q.value = 2;

    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.2 + Math.random() * 0.2;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 200 + Math.random() * 200;
    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);

    // Connect everything
    osc1.connect(filter);
    osc2.connect(filter);
    osc3.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(reverbNode || ctx.destination);

    // Start
    osc1.start(now);
    osc2.start(now);
    osc3.start(now);
    lfo.start(now);
    osc1.stop(now + duration + 0.5);
    osc2.stop(now + duration + 0.5);
    osc3.stop(now + duration + 0.5);
    lfo.stop(now + duration + 0.5);
}


function createSting(ctx, intensity = 0.5) {
    const now = ctx.currentTime;
    const gainNode = ctx.createGain();
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 0.03);
    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.5);

    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(500, now + 0.2);
    osc.frequency.exponentialRampToValueAtTime(100, now + 1.2);

    const osc2 = ctx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.setValueAtTime(300, now);
    osc2.frequency.exponentialRampToValueAtTime(1000, now + 0.2);
    osc2.frequency.exponentialRampToValueAtTime(200, now + 1.2);

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 800;
    filter.Q.value = 1;

    osc.connect(filter);
    osc2.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(reverbNode || ctx.destination);

    osc.start(now);
    osc2.start(now);
    osc.stop(now + 1.5);
    osc2.stop(now + 1.5);
}

function createClimax(ctx, intensity = 0.8) {
    const now = ctx.currentTime;
    const duration = 8 + Math.random() * 6; // 8‑14 seconds

    // Main pad – low, growing
    const gainNode = ctx.createGain();
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(intensity * 0.5, now + 2);
    gainNode.gain.setValueAtTime(intensity * 0.6, now + duration - 1);
    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

    // Two oscillators: one low, one high for the "strings"
    const osc1 = ctx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.setValueAtTime(110, now);
    osc1.frequency.exponentialRampToValueAtTime(220, now + duration * 0.6);

    const osc2 = ctx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.setValueAtTime(220, now);
    osc2.frequency.exponentialRampToValueAtTime(440, now + duration * 0.6);

    // Add a third oscillator with a different waveform for brass/choir
    const osc3 = ctx.createOscillator();
    osc3.type = 'square'; // gives a richer, brass-like tone
    osc3.frequency.setValueAtTime(110, now);
    osc3.frequency.exponentialRampToValueAtTime(330, now + duration * 0.8);

    // Low‑pass filter with LFO that opens up over time
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(300, now);
    filter.frequency.exponentialRampToValueAtTime(1200, now + duration);
    filter.Q.value = 2;

    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.15;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 200;
    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);

    // Connect everything
    osc1.connect(filter);
    osc2.connect(filter);
    osc3.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(reverbNode || ctx.destination);

    // Start
    osc1.start(now);
    osc2.start(now);
    osc3.start(now);
    lfo.start(now);
    osc1.stop(now + duration + 0.5);
    osc2.stop(now + duration + 0.5);
    osc3.stop(now + duration + 0.5);
    lfo.stop(now + duration + 0.5);
}
            async function playSound(type, intensity = 0.7) {
    try {
        const ctx = await getAudioContext();
        const now = ctx.currentTime;
        const gainValue = Math.min(1, intensity);

        switch (type) {
            case 'pad':
                // Deep drone – you can vary the frequency for different moods
                const freq = 110 + Math.random() * 40; // between 110–150 Hz
                createSynthPad(ctx, freq, 20 + Math.random() * 20, gainValue);
                break;

            case 'sting':
                createSting(ctx, gainValue);
                break;

            case 'heartbeat':
                playThump(ctx, now, 0.8 * gainValue);
                // second thump for "lub‑dub"
                setTimeout(() => playThump(ctx, now + 0.15, 0.8 * gainValue), 150);
                break;

            case 'thunder': {
                // keep your existing thunder – it's good
                const bufferSize = ctx.sampleRate * 0.5;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.3));
                }
                const source = ctx.createBufferSource();
                source.buffer = buffer;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(gainValue * 0.6, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 150;
                filter.Q.value = 0.5;
                source.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                source.start(now);
                source.stop(now + 0.8);
                break;
            }

            case 'bell': {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 80 + Math.random() * 30; // low, dark
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(gainValue * 0.4, now + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 3);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 3);
                break;
            }
case 'climax':
    createClimax(ctx, gainValue);
    break;
            default:
                console.warn(`Unknown sound type: ${type}`);
        }
    } catch (err) {
        console.error(`❌ Error in playSound("${type}"):`, err);
    }
}


           function playThump(ctx, time, intensity) {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(60, time);
    osc.frequency.exponentialRampToValueAtTime(30, time + 0.1);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(intensity * 0.8, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(time);
    osc.stop(time + 0.1);
}

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
    try {
        stopAmbient();
        const ctx = await getAudioContext();
        const now = ctx.currentTime;
        const gainValue = Math.min(1, intensity);
        console.log(`🌫️ Starting ambient: ${type} for ${durationSeconds}s (ctx state: ${ctx.state})`);

        const gainNode = ctx.createGain();
        gainNode.gain.setValueAtTime(gainValue * 0.3, now);
        gainNode.connect(ctx.destination);
        ambientGain = gainNode;

        let source = null;
        if (type === 'ambient_drone' || type === 'wind_howl') {
            const bufferSize = ctx.sampleRate * 1;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.5;
            }
            const noise = ctx.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = type === 'ambient_drone' ? 200 : 600;
            filter.Q.value = 0.5;
            const osc = ctx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.value = type === 'ambient_drone' ? 80 : 120;
            const gainOsc = ctx.createGain();
            gainOsc.gain.value = 0.2 * gainValue;
            osc.connect(gainOsc);
            gainOsc.connect(filter);
            noise.connect(filter);
            filter.connect(gainNode);
            osc.start(now);
            noise.start(now);
            source = { osc, noise };
            ambientSource = source;
        } else {
            // fallback or static burst handled here? Actually static is handled in playSound, but we keep for completeness
            const osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = 100;
            osc.connect(gainNode);
            osc.start(now);
            source = { osc };
            ambientSource = source;
        }

        if (ambientTimeout) clearTimeout(ambientTimeout);
        ambientTimeout = setTimeout(() => {
            stopAmbient();
        }, durationSeconds * 1000);
    } catch (err) {
        console.error(`❌ Error in playAmbient("${type}"):`, err);
    }
}

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) {
                            ambientGain.disconnect();
                            ambientGain = null;
                        }
                    }, 300);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) {
                    clearTimeout(ambientTimeout);
                    ambientTimeout = null;
                }
            }


            function createCueChecker(cues, storyLength) {
                const sorted = [...cues].sort((a, b) => a.position - b.position);
                let cueIndex = 0;
                const triggered = new Set();
                let lastLog = 0;
                return function check(currentCharIndex) {
                    if (currentCharIndex - lastLog > 500) {
                        console.log(
                            `⏳ Cue checker at index ${currentCharIndex} (${Math.round(currentCharIndex / storyLength * 100)}%)`
                            );
                        lastLog = currentCharIndex;
                    }
                    while (cueIndex < sorted.length && sorted[cueIndex].position <= currentCharIndex) {
                        const cue = sorted[cueIndex];
                        if (!triggered.has(cueIndex)) {
                            triggered.add(cueIndex);
                            const isAmbient = ['ambient_drone', 'wind_howl', 'static'].includes(cue.type);
                            console.log(
                                `🔊 FIRING ${cue.type} at position ${cue.position} (current index ${currentCharIndex})`);
                            if (isAmbient) {
                                playAmbient(cue.type, cue.duration || 10, cue.intensity);
                            } else {
                                playSound(cue.type, cue.intensity);
                            }
                        }
                        cueIndex++;
                    }
                };
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s horror VHS, dark theatrical style, grainy film')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {

                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
    return new Promise((resolve) => {
        const utterance = new SpeechSynthesisUtterance(text);
        // Apply male voice settings (same logic as speakTextMale)
        const voices = speechSynthesis.getVoices();
        const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David',
            'Fred', 'Alex', 'Thomas', 'James'];
        let voice = null;
        for (const name of maleNames) {
            voice = voices.find(v => v.name.includes(name));
            if (voice) break;
        }
        if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
        if (voice) utterance.voice = voice;
        utterance.rate = voiceConfig.rate || 0.65;
        utterance.pitch = voiceConfig.pitch || 0.92;

        let currentChar = 0;
        element.textContent = '';

        utterance.onboundary = (event) => {
            // event.charIndex is the character position after the word
            const nextChar = event.charIndex + event.charLength;
            if (nextChar > currentChar) {
                currentChar = nextChar;
                element.textContent = text.substring(0, currentChar);
                if (cueChecker) cueChecker(currentChar);
            }
        };

        utterance.onend = () => {
            // Finish any remaining text
            element.textContent = text;
            if (cueChecker) cueChecker(text.length);
            resolve();
        };

        utterance.onerror = (e) => {
            console.warn('TTS error:', e);
            element.textContent = text; // show full text on error
            resolve();
        };

        speechSynthesis.speak(utterance);
    });
}

            async function generateSoundCueSheet(storyText) {
    const length = storyText.length;

    const system = `You are a sound designer for a horror radio drama.
Given a short story, return a JSON object with THREE keys:
- "sections": an array of 5‑6 sections that divide the story into emotional acts.
  Each section must have: "theme" (one of: intro, setup, scheme, execution, twist, closing), "start_char" (inclusive) and "end_char" (exclusive). The sections must cover the entire story from 0 to ${length}.
- "cues": an array of sound events using only these types: "sting", "heartbeat", "thunder", "bell", "climax".
  No "pad" type – the ambient drone will be handled separately.
  Each cue must have "position" (character index), "type", optional "intensity" (0‑1).
  Include at least 40 cues, spread evenly.
- "score": an object with keys matching the same theme names used in "sections".
  Each key must contain:
    "bpm" (integer between 60‑120),
    "bass" (array of 8 semitone intervals from a root of 0, e.g. [0,7,5,3,0,7,5,3]),
    "arp" (array of 8 semitone intervals for an arpeggio, usually higher pitch, e.g. [12,19,15,19,12,19,15,19]),
    "kick" (array of 8 numbers, 1 = hit, 0 = rest),
    "snare" (same as kick).
  Make the music tense and fitting for each theme. intro should be sparse and slow, execution fast and driving, twist dissonant.

Return ONLY raw JSON.`;

    const userPrompt = `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and score patterns.`;

    const resp = await mistralChat([
        { role: 'system', content: system },
        { role: 'user', content: userPrompt }
    ], 4000, 35000);  // increased tokens for extra data

    const cleaned = resp.replace(/```json|```/g, '').trim();
    let data;
try {
    // attempt direct parse
    data = JSON.parse(cleaned);
} catch (parseErr) {
    console.warn('AI JSON was malformed, trying to repair…', parseErr);
    // Extract the first valid JSON object/array
    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
    if (match) {
        const candidate = match[0].replace(/,\s*([}\]])/g, '$1'); // remove trailing commas
        try {
            data = JSON.parse(candidate);
        } catch (e2) {
            throw new Error('Failed to parse AI soundtrack JSON even after repair.');
        }
    } else {
        throw new Error('No JSON found in AI response.');
    }
}

    // Validate mandatory keys
    if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object') {
        throw new Error('Missing sections, cues, or score in AI response');
    }

    // Ensure sections cover the whole story
    const sortedSections = data.sections.sort((a,b) => a.start_char - b.start_char);
    if (sortedSections[0].start_char !== 0 ||
        sortedSections[sortedSections.length-1].end_char < length) {
        console.warn('Sections may not fully cover the story – adjusting');
        sortedSections[0].start_char = 0;
        sortedSections[sortedSections.length-1].end_char = length;
    }

    // Process cues
    const cues = data.cues.map(c => ({
        type: c.type,
        position: Math.min(c.position, length-1),
        intensity: c.intensity || 0.7
    }));

    // Validate score patterns (ensure all needed themes exist, or fallback)
    const requiredThemes = ['intro','setup','scheme','execution','twist','closing'];
    const score = {};
    for (const theme of requiredThemes) {
        if (data.score[theme]) {
            score[theme] = {
                bpm: data.score[theme].bpm || 85,
                bass: data.score[theme].bass || [0,0,7,7,0,0,7,7],
                arp: data.score[theme].arp || [12,15,12,19,12,15,12,19],
                kick: data.score[theme].kick || [1,0,1,0,1,0,1,0],
                snare: data.score[theme].snare || [0,0,0,1,0,0,0,1]
            };
        } else {
            // fallback to hardcoded default (you can also copy from your old SCORE_PATTERNS)
            score[theme] = {
                bpm: 85,
                bass: [0,0,7,7,0,0,7,7],
                arp: [12,15,12,19,12,15,12,19],
                kick: [1,0,1,0,1,0,1,0],
                snare: [0,0,0,1,0,0,0,1]
            };
        }
    }

    return { sections: sortedSections, cues, score };
}

// ── SCORE ENGINE (John Carpenter style) ──
function createNote(ctx, frequency, startTime, duration, gainValue, type = 'sawtooth') {
    const now = startTime;

    // Main oscillator pair – slightly detuned for thickness
    const osc1 = ctx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.value = frequency;
    const osc2 = ctx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.value = frequency * 1.007;  // 7 cents sharp

    // Sub oscillator – one octave down, triangle wave
    const sub = ctx.createOscillator();
    sub.type = 'triangle';
    sub.frequency.value = frequency / 2;

    // Filter (lowpass) with a quick envelope sweep for punch
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;               // starting frequency
    filter.Q.value = 1.5;

    // Envelope modulator for the filter
    const filterEnv = ctx.createGain();
    filterEnv.gain.setValueAtTime(800, now);    // open filter instantly
    filterEnv.gain.exponentialRampToValueAtTime(200, now + 0.1); // close slightly
    filterEnv.gain.exponentialRampToValueAtTime(50, now + duration * 0.8);
    filterEnv.connect(filter.frequency);

    // Main volume envelope
    const mainGain = ctx.createGain();
    mainGain.gain.setValueAtTime(0, now);
    mainGain.gain.linearRampToValueAtTime(gainValue * 0.3, now + 0.02); // attack
    mainGain.gain.setValueAtTime(gainValue * 0.3, now + duration * 0.6); // sustain
    mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.1); // release

    // Connect the oscillators → filter → mainGain
    osc1.connect(filter);
    osc2.connect(filter);
    sub.connect(filter);
    filter.connect(mainGain);

    // Split the output: dry (direct) and wet (reverb)
    const drySend = ctx.createGain();
    drySend.gain.value = 0.8;          // dry level
    const wetSend = ctx.createGain();
    wetSend.gain.value = 0.4;          // reverb send level

    mainGain.connect(drySend);
    mainGain.connect(wetSend);

    // Connect to the global mix buses (must be accessible – we'll store them globally)
    drySend.connect(dryGain);
    wetSend.connect(wetGain);

    // Start/stop all oscillators
    osc1.start(now);
    osc2.start(now);
    sub.start(now);
    osc1.stop(now + duration + 0.2);
    osc2.stop(now + duration + 0.2);
    sub.stop(now + duration + 0.2);
}

function createKick(ctx, time) {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(30, time + 0.08);

    // Click layer – very short noise burst
    const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.02, ctx.sampleRate);
    const noiseData = noiseBuffer.getChannelData(0);
    for (let i = 0; i < noiseData.length; i++) {
        noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.003));
    }
    const click = ctx.createBufferSource();
    click.buffer = noiseBuffer;
    const clickFilter = ctx.createBiquadFilter();
    clickFilter.type = 'highpass';
    clickFilter.frequency.value = 2000;
    click.connect(clickFilter);

    const gainClick = ctx.createGain();
    gainClick.gain.setValueAtTime(0.5, time);
    gainClick.gain.exponentialRampToValueAtTime(0.001, time + 0.02);
    clickFilter.connect(gainClick);

    const gainBody = ctx.createGain();
    gainBody.gain.setValueAtTime(0.7, time);
    gainBody.gain.exponentialRampToValueAtTime(0.001, time + 0.2);

    osc.connect(gainBody);

    // Dry send only (or a tiny bit of wet for air)
    gainBody.connect(dryGain);
    gainClick.connect(dryGain);
    // Very slight reverb for kick can be nice – uncomment if you want
    // let wetKick = ctx.createGain(); wetKick.gain.value = 0.1; gainBody.connect(wetKick); wetKick.connect(wetGain);

    osc.start(time);
    click.start(time);
    osc.stop(time + 0.2);
    click.stop(time + 0.02);
}

function createSnare(ctx, time) {
    // Tonal body (low sine sweep)
    const body = ctx.createOscillator();
    body.type = 'triangle';
    body.frequency.setValueAtTime(200, time);
    body.frequency.exponentialRampToValueAtTime(80, time + 0.08);
    const bodyGain = ctx.createGain();
    bodyGain.gain.setValueAtTime(0.6, time);
    bodyGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    body.connect(bodyGain);

    // Noise for rattle
    const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
    const noiseData = noiseBuffer.getChannelData(0);
    for (let i = 0; i < noiseData.length; i++) {
        noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.03));
    }
    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuffer;
    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'highpass';
    noiseFilter.frequency.value = 1200;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.7, time);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);

    // Dry output
    bodyGain.connect(dryGain);
    noiseGain.connect(dryGain);
    // optional tiny reverb
    // let wetSnare = ctx.createGain(); wetSnare.gain.value = 0.05; bodyGain.connect(wetSnare); wetSnare.connect(wetGain);

    body.start(time);
    noise.start(time);
    body.stop(time + 0.1);
    noise.stop(time + 0.15);
}

   // Persistent pad (drone) – rich and slow
const padGain = ctx.createGain();

padOsc2.connect(padFilter);

padFilter.connect(padGain);

const padDry = ctx.createGain(); padDry.gain.value = 0.6;
const padWet = ctx.createGain(); padWet.gain.value = 0.3;
padGain.connect(padDry);
padGain.connect(padWet);
padDry.connect(dryGain);
padWet.connect(wetGain);

padOsc1.start(); padOsc2.start(); padOsc3.start();
const stopSources = [padOsc1, padOsc2, padOsc3];

   
    function scheduleStep() {
        if (!sectionAmbientActive) return; // stopped
        const now = nextStepTime;

        // Bass
        const bassSemitone = theme.bass[step % patternLength];
        const bassFreq = rootFreq * Math.pow(2, bassSemitone / 12);
        createNote(ctx, bassFreq, now, beatDuration * 0.9, 0.8, 'sawtooth');

        // Arpeggio
        const arpSemitone = theme.arp[step % patternLength];
        const arpFreq = rootFreq * Math.pow(2, arpSemitone / 12);
        createNote(ctx, arpFreq, now, beatDuration * 0.5, 0.6, 'square');

        // Drums
        if (theme.kick[step % patternLength]) createKick(ctx, now);
        if (theme.snare[step % patternLength]) createSnare(ctx, now);

        step++;
        nextStepTime += beatDuration;
        timeoutId = setTimeout(scheduleStep, (nextStepTime - ctx.currentTime) * 1000);
    }

    // Start a few milliseconds ahead to allow scheduling
    nextStepTime = ctx.currentTime + 0.05;
    timeoutId = setTimeout(scheduleStep, 50);

    sectionAmbientActive = {
        stop: () => {
            clearTimeout(timeoutId);
            padGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
            stopSources.forEach(s => {
                try { s.stop(ctx.currentTime + 0.3); } catch(e) {}
            });
            sectionAmbientActive = null;
        }
    };
}

}
async function startNocturnePerformance() {
    speechSynthesis.cancel();
    if (window.ch3Timeout) clearTimeout(window.ch3Timeout);
    const storyData = gameState.nocturnePerformance;
    if (!storyData || !storyData.story) {
        await generateNewNocturneStory();
        return startNocturnePerformance();
    }

    // Extract sections and cues
    let sectionList = null;
    let cueList = null;

    if (storyData.soundCues) {
        if (Array.isArray(storyData.soundCues)) {
            cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
        } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
            sectionList = storyData.soundCues.sections;
            cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
            console.log('🎼 Sections loaded:', sectionList.length, 'themes');
        }
    }

    if (cueList && cueList.length === 0) {
        console.warn('⚠️ No valid cues after filtering');
    }

    const bubble = document.getElementById('ch3SpeechBubble');
    const dialogue = document.getElementById('ch3Dialogue');
    const imageEl = document.getElementById('ch3SegmentImage');
    if (!bubble || !dialogue) return;

    const guideList = document.getElementById('ch3GuideList');
    if (guideList) guideList.style.display = 'none';

    bubble.style.borderColor = '#8b1a2b';
    bubble.style.boxShadow = '0 0 30px #7b1a2b88';
    dialogue.innerHTML = '';

    const oldBack = document.getElementById('ch3BackBtn');
    if (oldBack) oldBack.remove();
    const oldAdd = document.getElementById('ch3AddEpisodeBtn');
    if (oldAdd) oldAdd.remove();

    const posterContainer = document.getElementById('ch3PosterContainer');
const posterTitle = document.getElementById('ch3PosterTitle');
if (posterContainer && imageEl && storyData.imageUrl) {
    imageEl.src = storyData.imageUrl;
    imageEl.classList.add('visible');
    imageEl.style.display = 'block';
    posterContainer.classList.remove('no-image', 'loading');
    posterContainer.classList.add('visible');
    // Set the story title on the overlay
    if (posterTitle) {
        posterTitle.textContent = storyData.title || '';
    }
} else if (posterContainer) {
    posterContainer.classList.add('no-image');
}

    // Intro
    const intro = `"Good evening… I am Vincent Crowe. Tonight, I invite you to draw closer to the footlights. Let the dark shadows embrace you. I present to you… '${storyData.title}'."`;
    dialogue.textContent = '';
    speakTextMale(intro);
    await typewriterEffect(dialogue, intro, 50);
    await new Promise(r => setTimeout(r, 1500));

    // Start the first section's ambient drone
    if (sectionList && sectionList.length > 0) {
        transitionSectionTheme(sectionList[0].theme);
    }

    const storyText = storyData.rawStoryText || storyData.story;

    // Combined cue checker with section transitions
    let cueChecker = null;
    if (cueList && cueList.length > 0) {
        const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
        let cueIdx = 0;
        const triggered = new Set();
        let lastLog = 0;

        const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b.start_char) : [];
        let sectionIdx = 0;
        let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;

        cueChecker = function check(idx) {
            if (idx - lastLog > 500) {
                console.log(`⏳ at index ${idx} (${Math.round(idx / storyText.length * 100)}%)`);
                lastLog = idx;
            }

            // Section transitions
            while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                const sec = sortedSections[sectionIdx];
                if (sec.theme !== currentTheme) {
                    currentTheme = sec.theme;
                    transitionSectionTheme(currentTheme);
                }
                sectionIdx++;
            }

            // Sound cues
            while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                const cue = sortedCues[cueIdx];
                if (!triggered.has(cueIdx)) {
                    triggered.add(cueIdx);
                    console.log(`🔊 FIRING ${cue.type} at ${cue.position}`);
                    playSound(cue.type, cue.intensity);
                }
                cueIdx++;
            }
        };
    }

    // Speak and type synced
    dialogue.textContent = '';
    if (cueChecker) {
        await speakAndTypeSynced(dialogue, storyText, { rate: 0.65, pitch: 0.92 }, (idx) => cueChecker(idx));
    } else {
        await speakAndTypeSynced(dialogue, storyText, { rate: 0.65, pitch: 0.92 });
    }

    await new Promise(r => setTimeout(r, 1200));

    // Closing remark
    const closing = `"${storyData.closing_remark}"`;
    const closingLine = document.createElement('p');
    closingLine.style.marginTop = '16px';
    closingLine.style.fontStyle = 'italic';
    closingLine.style.color = '#d4bfa8';
    dialogue.appendChild(closingLine);
    speakTextMale(closing);
    await typewriterEffect(closingLine, closing, 45);

    await new Promise(r => setTimeout(r, 1000));

    const curtainText = document.createElement('p');
    curtainText.textContent = '— Curtain falls —';
    stopSectionAmbient();
    curtainText.style.color = '#6e5a58';
    curtainText.style.fontSize = '14px';
    dialogue.appendChild(curtainText);
    stopAmbient();

    // Buttons
    const btnRow = document.createElement('div');
    btnRow.style.marginTop = '12px';
    btnRow.style.display = 'flex';
    btnRow.style.gap = '8px';
    btnRow.style.justifyContent = 'flex-end';

    const leaveBtn = document.createElement('button');
    leaveBtn.className = 'btn back-btn';
    leaveBtn.textContent = '← Leave the Theater';
    leaveBtn.addEventListener('click', () => { leaveTheater(); });
    btnRow.appendChild(leaveBtn);

    const addBtn = document.createElement('button');
    addBtn.className = 'btn accent';
    addBtn.id = 'ch3AddEpisodeBtn';
    addBtn.textContent = '➕ Add Episode';
    addBtn.addEventListener('click', () => {
        addCurrentEpisode();
        addBtn.disabled = true;
        addBtn.textContent = '✓ Added';
    });
    btnRow.appendChild(addBtn);

    dialogue.appendChild(btnRow);
}

            function addCurrentEpisode() {
                const perf = gameState.nocturnePerformance;
                if (!perf) return;
                gameState.ch3Episodes.push({
                    ...perf,
                    rawStoryText: perf.rawStoryText,
                    soundCues: perf.soundCues
                });
                saveState();
                setTimeout(() => leaveTheater(), 600);
            }

            function leaveTheater() {
                stopAmbient();
stopSectionAmbient();
                renderChannel3();
            }

            function init() {
                loadState();
                renderChannel3();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('nocturne_theater_key', key);
                    }
                });
                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) {
                        showModal(HOST_BIO);
                    }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeModal();
                });
                if (!apiKey) {
                    setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                }
            }
            init();
        })();
    </script>
