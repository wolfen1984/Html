<!DOCTYPE html>

        /* ─── Score Indicator (Elm Street style) ─── */

<body>
    <div class="monitor-bezel">
        <div class="brand-label">THE NOCTURNE THEATER · CRT-84</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE NOCTURNE<br>THEATER</div>
                    <div class="marquee-sub">⏤ 1984 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channel3Panel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🎭 THE NOCTURNE THEATER · NOW PLAYING</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('nocturne_theater_key') || '';

            const DEFAULT_STATE = { ch3Episodes: [], nocturnePerformance: null, imageCooldownUntil: 0 };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>🎭 Vincent Crowe</h2>
        <p style="text-align:left;">
            <strong>Show:</strong> <em>The Nocturne Theater</em><br>
            <strong>Bio:</strong> A classically trained Shakespearean actor who never quite made it, Crowe found his true calling hosting horror anthologies from a crumbling 19th‑century playhouse. Rumour has it the theatre itself is alive – and hungry. Crowe's baritone and unnerving smile make even the stage curtains seem sinister.
        </p>
    `;

            // ─── SOUND ENGINE · ELM STREET 1984 ──────────────────────
            let audioCtx = null;
            let ambientSource = null,
                ambientGain = null,
                ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null,
                masterGain = null,
                dryGain = null,
                wetGain = null;
            let sectionAmbientActive = null,
                stringAmbientActive = null;
            let crossfadeTimeout = null;
            let patternPlayerActive = null,
                patternPlayerTimeout = null;
            let patternStep = 0,
                patternBPM = 50;
            let currentSectionPatterns = [];
            let currentVariationIdx = 0,
                barsInVariation = 0;
            let sectionThemeScore = null;

            function expandPattern(arr) {
                if (!Array.isArray(arr)) arr = [0, 0, 0, 0, 0, 0, 0, 0];
                arr = arr.map(x => typeof x === 'number' ? x : 0);
                return arr.flatMap(x => [x, x]);
            }

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.0005;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            function initReverb(ctx) {
                if (reverbNode) return;
                try {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 3.2;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.7));
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                    if (masterGain) reverbNode.connect(masterGain);
                } catch (err) {
                    console.warn('Reverb init error:', err);
                    reverbNode = ctx.createGain();
                    reverbNode.gain.value = 0.5;
                    if (masterGain) reverbNode.connect(masterGain);
                }
            }

            async function getAudioContext() {
                try {
                    if (!audioCtx) {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                        createKeepAlive(audioCtx);
                        initReverb(audioCtx);
                        if (!masterGain) {
                            masterGain = audioCtx.createGain();
                            masterGain.gain.value = 0.20;
                            const comp = audioCtx.createDynamicsCompressor();
                            comp.threshold.value = -26;
                            comp.knee.value = 28;
                            comp.ratio.value = 10;
                            comp.attack.value = 0.004;
                            comp.release.value = 0.3;
                            masterGain.connect(comp);
                            comp.connect(audioCtx.destination);
                        }
                        if (!dryGain) {
                            dryGain = audioCtx.createGain();
                            dryGain.gain.value = 0.85;
                            dryGain.connect(masterGain);
                        }
                        if (!wetGain) {
                            wetGain = audioCtx.createGain();
                            wetGain.gain.value = 0.50;
                            wetGain.connect(reverbNode || masterGain);
                        }
                    }
                    if (audioCtx.state === 'suspended') await audioCtx.resume();
                    return audioCtx;
                } catch (err) { console.error('Audio context error:', err); throw err; }
            }

            // ─── ELM STREET 1984 SYNTHS ──────────────────────────────

            function createElmPad(ctx, frequency, duration, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.18, now + 0.8);
                gainNode.gain.setValueAtTime(intensity * 0.18, now + duration - 1.5);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.5);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(600, now);
                filter.frequency.exponentialRampToValueAtTime(200, now + duration * 0.5);
                filter.Q.value = 1.8;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.06 + Math.random() * 0.08;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 180 + Math.random() * 120;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                const oscs = [];
                for (let i = 0; i < 4; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i < 2 ? 'sawtooth' : 'square';
                    const detune = (i - 1.5) * 8 + (Math.random() - 0.5) * 2;
                    osc.frequency.value = frequency * Math.pow(2, detune / 1200);
                    osc.connect(filter);
                    oscs.push(osc);
                }
                filter.connect(gainNode);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.4;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.5;
                gainNode.connect(drySend);
                gainNode.connect(wetSend);
                drySend.connect(dryGain || ctx.destination);
                wetSend.connect(wetGain || ctx.destination);
                oscs.forEach(o => { o.start(now);
                    o.stop(now + duration + 0.8); });
                lfo.start(now);
                lfo.stop(now + duration + 0.8);
            }

            function createElmSting(ctx, intensity = 0.6) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.4, now + 0.04);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.8);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.25);
                osc.frequency.exponentialRampToValueAtTime(80, now + 1.4);

                const osc2 = ctx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(180, now);
                osc2.frequency.exponentialRampToValueAtTime(600, now + 0.2);
                osc2.frequency.exponentialRampToValueAtTime(100, now + 1.4);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(800, now);
                filter.frequency.exponentialRampToValueAtTime(200, now + 1.2);
                filter.Q.value = 2;

                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.5;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                osc.start(now);
                osc2.start(now);
                osc.stop(now + 1.9);
                osc2.stop(now + 1.9);
            }

            function createElmClimax(ctx, intensity = 0.7) {
                const now = ctx.currentTime;
                const duration = 10 + Math.random() * 8;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.3, now + 2);
                gainNode.gain.setValueAtTime(intensity * 0.35, now + duration - 2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(180, now);
                filter.frequency.exponentialRampToValueAtTime(600, now + duration * 0.7);
                filter.Q.value = 2.5;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.04;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 200;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                const oscs = [];
                const freqs = [55, 82.5, 110, 165];
                freqs.forEach(f => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(f, now);
                    osc.frequency.exponentialRampToValueAtTime(f * 1.4, now + duration * 0.6);
                    oscs.push(osc);
                    osc.connect(filter);
                });
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.55;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                oscs.forEach(o => { o.start(now);
                    o.stop(now + duration + 0.8); });
                lfo.start(now);
                lfo.stop(now + duration + 0.8);
            }

            function createElmBass(ctx, semitone, intensity = 0.5, duration = 1.8, rootFreq = 40) {
                const now = ctx.currentTime;
                const freq = rootFreq * Math.pow(2, semitone / 12);
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.25, now + 0.05);
                gainNode.gain.setValueAtTime(intensity * 0.2, now + duration - 0.4);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.3);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq * 0.97, now);
                osc.frequency.exponentialRampToValueAtTime(freq, now + 0.1);

                const osc2 = ctx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.value = freq * 2;
                const osc2Gain = ctx.createGain();
                osc2Gain.gain.value = 0.06 * intensity;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(150 + semitone * 3, now);
                filter.frequency.exponentialRampToValueAtTime(80 + semitone * 2, now + duration);
                filter.Q.value = 2.5;

                osc.connect(filter);
                osc2.connect(osc2Gain);
                osc2Gain.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.4;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                osc.start(now);
                osc2.start(now);
                osc.stop(now + duration + 0.4);
                osc2.stop(now + duration + 0.4);
            }

            function createElmKick(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 0.9, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(130, now);
                osc.frequency.exponentialRampToValueAtTime(35, now + 0.12);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 160;
                filter.Q.value = 1.2;
                osc.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 0.25);
            }

            function createElmSnare(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 0.7, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                const bufSize = ctx.sampleRate * 0.06;
                const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) {
                    const env = Math.exp(-i / (ctx.sampleRate * 0.02));
                    data[i] = (Math.random() * 2 - 1) * env * 0.6;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buf;
                const osc = ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(70, now + 0.06);
                const oscGain = ctx.createGain();
                oscGain.gain.value = 0.25 * intensity;
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 280;
                filter.Q.value = 0.8;
                noise.connect(filter);
                osc.connect(oscGain);
                oscGain.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);
                noise.start(now);
                osc.start(now);
                noise.stop(now + 0.1);
                osc.stop(now + 0.1);
            }

            function createElmHat(ctx, intensity = 0.3) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                const bufSize = ctx.sampleRate * 0.02;
                const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) {
                    const env = Math.exp(-i / (ctx.sampleRate * 0.008));
                    data[i] = (Math.random() * 2 - 1) * env * 0.4;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buf;
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 4000;
                filter.Q.value = 0.5;
                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);
                noise.start(now);
                noise.stop(now + 0.06);
            }

            function createElmPulse(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.25);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 120;
                filter.Q.value = 1.5;
                osc.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 0.35);
            }

            function createElmThunder(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const bufSize = ctx.sampleRate * 0.6;
                const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.35));
                }
                const source = ctx.createBufferSource();
                source.buffer = buf;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 120;
                filter.Q.value = 0.5;
                source.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                source.start(now);
                source.stop(now + 0.9);
            }

            function createElmBell(ctx, intensity = 0.4) {
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 70 + Math.random() * 30;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(intensity * 0.3, now + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 3.5);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 300;
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 3.8);
            }

            // ─── PATTERN PLAYER (AI-Driven, no hardcoded fallback) ───

            function startPatternPlayer(themeName, rootFreq = 40, scoreData = null) {
                stopPatternPlayer();
                if (!scoreData || !scoreData[themeName]) {
                    console.warn('No AI score data for theme:', themeName);
                    return;
                }
                const theme = scoreData[themeName];
                const bpm = theme.bpm || 60;
                const bass = expandPattern(theme.bass);
                const kick = expandPattern(theme.kick);
                const snare = expandPattern(theme.snare);
                const hat = expandPattern(theme.hat);

                const variations = [{ name: 'AI', bars: 8, bass, kick, snare, hat }];
                currentSectionPatterns = variations;
                currentVariationIdx = 0;
                barsInVariation = 0;
                patternStep = 0;
                patternBPM = bpm;
                patternPlayerActive = { active: true, theme: themeName };

                const stepDuration = 60 / bpm / 4;

                function playStep() {
                    if (!patternPlayerActive || !patternPlayerActive.active) return;
                    const ctx = audioCtx;
                    if (!ctx) { patternPlayerTimeout = setTimeout(playStep, 100); return; }
                    const step = patternStep % 16;
                    const current = variations[0];

                    const bassSemitone = current.bass[step] || 0;
                    if (bassSemitone !== 0) {
                        createElmBass(ctx, bassSemitone, 0.5 + (bassSemitone / 30), 1.6, rootFreq);
                    }
                    if ((current.kick[step] || 0) === 1) createElmKick(ctx, 0.6);
                    if ((current.snare[step] || 0) === 1) createElmSnare(ctx, 0.5);
                    if ((current.hat[step] || 0) === 1 && Math.random() < 0.65) createElmHat(ctx, 0.3);

                    patternStep++;
                    if (patternStep % 16 === 0) {
                        barsInVariation++;
                        if (barsInVariation >= current.bars) barsInVariation = 0;
                    }
                    patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
                }
                patternPlayerTimeout = setTimeout(playStep, 50);
            }

            function stopPatternPlayer() {
                if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout);
                    patternPlayerTimeout = null; }
                if (patternPlayerActive) { patternPlayerActive.active = false;
                    patternPlayerActive = null; }
                patternStep = 0;
                currentSectionPatterns = [];
                currentVariationIdx = 0;
                barsInVariation = 0;
            }

            // ─── AMBIENT DRONE (Elm Street style) ─────────────────────

            function startSectionAmbient(themeName, scoreData = null) {
                stopSectionAmbient();
                if (!audioCtx) return;
                const ctx = audioCtx;
                const now = ctx.currentTime;

                // Use AI score data if available, otherwise build a simple drone
                let rootFreq = 45,
                    filterFreq = 180,
                    intensity = 0.25;
                if (scoreData && scoreData[themeName]) {
                    const s = scoreData[themeName];
                    const bpm = s.bpm || 60;
                    intensity = Math.min(0.45, 0.15 + (bpm - 40) / 160);
                    rootFreq = 40 + Math.floor(Math.random() * 20);
                    filterFreq = 120 + Math.floor(Math.random() * 100);
                }

                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.25, now + 1.5);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = filterFreq;
                filter.Q.value = 2;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.04 + Math.random() * 0.06;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 100 + Math.random() * 80;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                const oscs = [];
                for (let i = 0; i < 3; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i === 0 ? 'sawtooth' : i === 1 ? 'square' : 'sawtooth';
                    const detune = (i - 1) * 10 + (Math.random() - 0.5) * 4;
                    osc.frequency.value = rootFreq * Math.pow(2, detune / 1200);
                    osc.connect(filter);
                    oscs.push(osc);
                }
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.6;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);

                oscs.forEach(o => o.start(now));
                lfo.start(now);

                // Add a subtle noise layer
                const bufSize = ctx.sampleRate * 1.5;
                const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * 0.08;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buf;
                noise.loop = true;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'lowpass';
                noiseFilter.frequency.value = filterFreq * 0.5;
                noiseFilter.Q.value = 0.3;
                const noiseGain = ctx.createGain();
                noiseGain.gain.value = 0.15;
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(gainNode);
                noise.start(now);
                oscs.push(noise);

                sectionAmbientActive = {
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
                        oscs.forEach(s => { try { s.stop(ctx.currentTime + 0.7); } catch (e) {} });
                        try { lfo.stop(ctx.currentTime + 0.7); } catch (e) {}
                        sectionAmbientActive = null;
                    }
                };
            }

            function stopSectionAmbient() {
                if (sectionAmbientActive) { sectionAmbientActive.stop();
                    sectionAmbientActive = null; }
                stopPatternPlayer();
                clearTimeout(crossfadeTimeout);
            }

            function transitionSectionTheme(themeName, scoreData) {
                startSectionAmbient(themeName, scoreData);
                startPatternPlayer(themeName, 40, scoreData);
            }

            // ─── playSound dispatcher ──────────────────────────────────

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    if (!ctx) return;
                    const now = ctx.currentTime;
                    switch (type) {
                        case 'pad':
                            createElmPad(ctx, 55 + Math.random() * 30, 18 + Math.random() * 18, intensity);
                            break;
                        case 'sting':
                            createElmSting(ctx, intensity);
                            break;
                        case 'pulse':
                        case 'heartbeat':
                            createElmPulse(ctx, intensity);
                            setTimeout(() => createElmPulse(ctx, intensity * 0.7), 180);
                            break;
                        case 'thunder':
                            createElmThunder(ctx, intensity);
                            break;
                        case 'bell':
                            createElmBell(ctx, intensity);
                            break;
                        case 'climax':
                            createElmClimax(ctx, intensity);
                            break;
                        case 'bass':
                            createElmBass(ctx, Math.floor(Math.random() * 12), intensity, 1.6 + Math.random() * 1.2, 40);
                            break;
                        case 'kick':
                            createElmKick(ctx, intensity);
                            break;
                        case 'snare':
                            createElmSnare(ctx, intensity);
                            break;
                        case 'hat':
                            createElmHat(ctx, intensity * 0.5);
                            break;
                        default:
                            console.warn('Unknown sound type:', type);
                    }
                } catch (err) { console.warn('playSound error:', err); }
            }

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.2, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'ambient_drone' || type === 'wind_howl') {
                        const bufSize = ctx.sampleRate * 1.5;
                        const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                        const data = buf.getChannelData(0);
                        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.4;
                        const noise = ctx.createBufferSource();
                        noise.buffer = buf;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'ambient_drone' ? 160 : 450;
                        filter.Q.value = 0.4;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'ambient_drone' ? 70 : 100;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.15 * intensity;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 80;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) { console.warn('playAmbient error:', err); }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 500);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            // ─── Score Indicator ──────────────────────────────────────

            function updateScoreIndicator(theme, variation, bar) {
                const indicator = document.getElementById('scoreIndicator');
                const themeLabel = document.getElementById('scoreThemeLabel');
                const variationLabel = document.getElementById('scoreVariationLabel');
                const barLabel = document.getElementById('scoreBarLabel');
                const progressFill = document.getElementById('scoreProgressFill');
                if (!indicator) return;
                indicator.style.display = 'block';
                if (themeLabel) themeLabel.textContent = theme || 'intro';
                if (variationLabel) variationLabel.textContent = variation || 'A';
                if (barLabel) barLabel.textContent = `bar ${bar || 1}`;
                if (progressFill) {
                    const pct = Math.min(100, ((bar || 1) / 12) * 100);
                    progressFill.style.width = pct + '%';
                }
            }

            // ─── State / API ───────────────────────────────────────────

            function saveState() {
                try { localStorage.setItem('nocturne_theater_state', JSON.stringify(gameState)); } catch (e) {}
            }

            function loadState() {
                try {
                    const saved = localStorage.getItem('nocturne_theater_state');
                    if (saved) gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
                    gameState.ch3Episodes = gameState.ch3Episodes || [];
                    gameState.nocturnePerformance = gameState.nocturnePerformance || null;
                } catch (e) {}
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 28000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) { const errText = await res.text(); throw new Error(`API error ${res.status}: ${errText}`); }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') throw new Error('Request timed out. Please try again.');
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s horror VHS, dark theatrical style, grainy film, Elm Street style')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e;
                        await new Promise(r => setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else {
                            clearInterval(timer);
                            resolve();
                        }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                return new Promise((resolve, reject) => {
                    if (!text) { resolve(); return; }
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David',
                        'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = 0.62;
                    utterance.pitch = 0.9;
                    utterance.onend = () => resolve();
                    utterance.onerror = (e) => { console.warn('TTS error:', e);
                        resolve(); };
                    speechSynthesis.speak(utterance);
                });
            }

                    produceBtn.addEventListener('click', async () => {

            // ─── Story & Score Generation ─────────────────────────────

            async function generateNewNocturneStory() {
                const system =
                    `You are Vincent Crowe, the sardonic, cynical host of The Nocturne Theater. You narrate grim, literary horror stories to your listeners, unflinching, visceral, and grounded in human depravity.`;
                const prompt =
                    `Write a 900 to 1100 word short horror story set in the 1980s in a rural town for tonight's performance. Use tight third-person prose. No sound cues, no radio script, just pure narrative. Strict rules: no supernatural elements like ghosts, curses, magic, or dreams. The horror must be purely human, focusing on sadism, graphic violence, and psychosexual obsession. Pick one sin: Greed, Pride, Vanity, or Envy. Follow this exact structure: a mundane setup, then a grounded non-magical scheme, then a brutal unflinching execution, and finally an ironic visceral twist where the protagonist's victory becomes a physical or psychological prison such as rot, mutilation, or paranoid collapse. The twist must be realistic and earned. No dream cop-outs or easy escapes. Frame the story with Vincent's sardonic intro addressing the chosen sin, and close with his cold cynical punchline. Make it sick, twisted, and unflinching. X-rated themes are allowed. Return ONLY a valid JSON object with these fields: title (string), story (full narration string, use backslash n for line breaks), closing_remark (the chilling sign-off phrase). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: prompt }
                ], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) throw new Error('Invalid story structure');
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Horror movie poster for a story titled "${story.title}", 1980s VHS style, dark and moody, cinematic, grainy, Elm Street style`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate story poster:', e); }
                gameState.nocturnePerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system =
                    `You are a sound designer for a 1984 horror film score in the style of Charles Bernstein's A Nightmare On Elm Street. Heavy synth, pulsing bass, horror stings, dramatic hits. Given a short story, return JSON with THREE keys:
- "sections": array of 5-7 sections dividing the story into emotional acts. Each has "theme" (one of: intro, setup, scheme, execution, twist, closing), "start_char" (inclusive), "end_char" (exclusive). Cover entire story from 0 to ${length}.
- "cues": array of sound events using types: "sting", "pulse", "thunder", "bell", "climax", "pad", "bass", "kick", "snare", "hat". Include at least 40 cues spread evenly.
- "score": object with keys matching theme names. Each key: "bpm" (60-100), "bass" (array of 8 integers 0-24), "kick" (array of 8 integers 0/1), "snare" (array of 8 integers 0/1), "hat" (array of 8 integers 0/1).
Return ONLY raw JSON.`;

                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and 80s synth-horror score patterns.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: userPrompt }
                ], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try { data = JSON.parse(cleaned); } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try { data = JSON.parse(candidate); } catch (e2) { throw new Error(
                                'Failed to parse AI soundtrack JSON.'); }
                    } else throw new Error('No JSON found in AI response.');
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                    throw new Error('Missing sections, cues, or score in AI response');

                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char < length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({
                    type: c.type,
                    position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7
                }));

                const requiredThemes = ['intro', 'setup', 'scheme', 'execution', 'twist', 'closing'];
                const score = {};

                function normalizeArray(arr, maxVal = 24) {
                    if (!Array.isArray(arr)) throw new Error('Expected array, got ' + typeof arr);
                    let clean = arr.map(v => {
                        const num = Number(v);
                        return isNaN(num) ? 0 : Math.min(maxVal, Math.max(0, Math.round(num)));
                    });
                    if (clean.length < 8) { while (clean.length < 8) clean.push(0); } else if (clean.length > 8) { clean =
                            clean.slice(0, 8); }
                    return clean;
                }

                for (const theme of requiredThemes) {
                    if (!data.score[theme]) throw new Error(`AI did not provide a score for theme "${theme}".`);
                    const s = data.score[theme];
                    if (typeof s.bpm !== 'number' || s.bpm < 40 || s.bpm > 120) throw new Error(
                        `Invalid bpm for theme "${theme}": ${s.bpm}`);
                    const bass = normalizeArray(s.bass, 24);
                    const kick = normalizeArray(s.kick, 1);
                    const snare = normalizeArray(s.snare, 1);
                    const hat = normalizeArray(s.hat, 1);
                    score[theme] = { bpm: s.bpm, bass, kick, snare, hat };
                }
                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {
                await generateNewNocturneStory();
                if (!gameState.nocturnePerformance) throw new Error('Failed to generate story');
                const soundtrack = await generateSoundCueSheet(gameState.nocturnePerformance.rawStoryText);
                gameState.nocturnePerformance.soundCues = soundtrack;
                saveState();
                await startNocturnePerformance();
            }

            // ─── Start Performance ─────────────────────────────────────

            async function startNocturnePerformance() {
                speechSynthesis.cancel();
                if (window.ch3Timeout) clearTimeout(window.ch3Timeout);
                const storyData = gameState.nocturnePerformance;
                if (!storyData || !storyData.story) {
                    await generateNewNocturneStory();
                    return startNocturnePerformance();
                }

                await getAudioContext();

                let sectionList = null,
                    cueList = null,
                    scoreData = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) {
                        cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                    } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                        sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                        scoreData = storyData.soundCues.score;
                    }
                }

                const bubble = document.getElementById('ch3SpeechBubble');
                const dialogue = document.getElementById('ch3Dialogue');
                const imageEl = document.getElementById('ch3SegmentImage');
                if (!bubble || !dialogue) return;

                const guideList = document.getElementById('ch3GuideList');
                if (guideList) guideList.style.display = 'none';

                bubble.style.borderColor = '#8b1a2b';
                bubble.style.boxShadow = '0 0 30px #7b1a2b88';
                dialogue.innerHTML = '';

                const oldBack = document.getElementById('ch3BackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('ch3AddEpisodeBtn');
                if (oldAdd) oldAdd.remove();

                const posterContainer = document.getElementById('ch3PosterContainer');
                const posterTitle = document.getElementById('ch3PosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) posterTitle.textContent = storyData.title || '';
                } else if (posterContainer) {
                    posterContainer.classList.add('no-image');
                }

                // Intro
                const intro = `"Good evening… I am Vincent Crowe. Tonight, I invite you to draw closer to the footlights. Let the dark shadows embrace you. I present to you… '${storyData.title}'."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 48);
                await new Promise(r => setTimeout(r, 1500));

                // Score indicator
                let indicatorInterval = setInterval(() => {
                    if (patternPlayerActive) {
                        const theme = patternPlayerActive.theme || 'intro';
                        const varIdx = currentVariationIdx;
                        const varName = currentSectionPatterns[varIdx] ? currentSectionPatterns[varIdx].name : 'A';
                        const bar = barsInVariation + 1;
                        updateScoreIndicator(theme, varName, bar);
                    } else {
                        updateScoreIndicator('...', '—', 0);
                    }
                }, 1000);

                // Start section music
                if (sectionList && sectionList.length > 0) {
                    transitionSectionTheme(sectionList[0].theme, scoreData);
                } else if (scoreData) {
                    transitionSectionTheme('intro', scoreData);
                }

                const storyText = storyData.rawStoryText || storyData.story;
                if (!storyText) {
                    await finishPerformance(storyData, dialogue, indicatorInterval);
                    return;
                }

                // Build cue checker
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b.start_char) : [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;

                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) {
                                currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme, scoreData);
                            }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) {
                                triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity);
                            }
                            cueIdx++;
                        }
                    };
                }

                // Speak and type in parallel
                dialogue.textContent = '';
                const typingPromise = typewriterEffect(dialogue, storyText, 30, cueChecker);
                const speechPromise = speakTextMale(storyText);
                await speechPromise;
                await typingPromise;

                await finishPerformance(storyData, dialogue, indicatorInterval);
            }

            async function finishPerformance(storyData, dialogue, indicatorInterval) {
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#d4bfa8';
                dialogue.appendChild(closingLine);

                const closingSpeech = speakTextMale(closing);
                const closingTyping = typewriterEffect(closingLine, closing, 42);
                await Promise.all([closingSpeech, closingTyping]);

                await new Promise(r => setTimeout(r, 1000));

                const curtainText = document.createElement('p');
                curtainText.textContent = '— Curtain falls —';
                stopSectionAmbient();
                stopPatternPlayer();
                clearInterval(indicatorInterval);
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                curtainText.style.color = '#6e5a58';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();

                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';

                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Leave the Theater';
                leaveBtn.addEventListener('click', () => { leaveTheater(); });
                btnRow.appendChild(leaveBtn);

                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'ch3AddEpisodeBtn';
                addBtn.textContent = '➕ Add Episode';
                addBtn.addEventListener('click', () => {
                    addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Added';
                });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.nocturnePerformance;
                if (!perf) return;
                gameState.ch3Episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
                saveState();
                setTimeout(() => leaveTheater(), 600);
            }

            function leaveTheater() {
                stopAmbient();
                stopSectionAmbient();
                stopPatternPlayer();
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                renderChannel3();
            }

            // ─── Init ──────────────────────────────────────────────────

            function init() {
                loadState();
                renderChannel3();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('nocturne_theater_key', key);
                    }
                });
                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) showModal(HOST_BIO);
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeModal();
                });
                if (!apiKey) {
                    setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                }
                document.addEventListener('click', () => { getAudioContext().catch(() => {}); }, { once: true });
            }
            init();
        })();
    </script>
