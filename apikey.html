<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚔️ GAME MASTER CONFIGURATOR | SAVE & LOAD | DOS TEXT MODE</title>
    <!-- Press Start 2P Font - 80s retro gaming style -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            padding: 20px;
        }

        /* CRT SCANLINE EFFECT */
        .crt::before {
            content: "";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 0, 0.03) 0px,
                rgba(0, 255, 0, 0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 999;
        }

        .dos-container {
            width: 100%;
            max-width: 1100px;
            background: #000000;
            border: 3px solid #ffffff;
            box-shadow: 0 0 0 2px #000000, 0 0 0 5px #ffffff;
            position: relative;
        }

        .dos-header {
            background: #000000;
            border-bottom: 2px solid #ffffff;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .dos-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .dos-title span {
            color: #ffffff;
            animation: blink 1.2s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .dos-status {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #aaaaaa;
            background: #111111;
            padding: 8px 12px;
            border: 1px solid #ffffff;
        }

        /* MODAL / CONFIG WINDOW */
        .dos-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border: none;
        }

        .dos-window {
            background: #000000;
            border: 3px solid #ffffff;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 8px 8px 0 rgba(255,255,255,0.2);
        }

        .dos-window-titlebar {
            background: #000000;
            border-bottom: 2px solid #ffffff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dos-window-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            color: #ffffff;
        }

        .dos-window-content {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            color: #ffffff;
        }

        .dos-window-content::-webkit-scrollbar {
            width: 12px;
            background: #000000;
        }
        .dos-window-content::-webkit-scrollbar-track {
            background: #000000;
            border-left: 1px solid #ffffff;
        }
        .dos-window-content::-webkit-scrollbar-thumb {
            background: #ffffff;
            border: 1px solid #000000;
        }

        .dos-label {
            display: block;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            color: #ffffff;
            margin-bottom: 12px;
            margin-top: 20px;
        }

        .dos-label:first-of-type {
            margin-top: 0;
        }

        .dos-input, .dos-select, .dos-textarea {
            width: 100%;
            background: #000000;
            border: 2px solid #ffffff;
            padding: 12px 14px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #ffffff;
            outline: none;
        }

        .dos-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .dos-input:focus, .dos-select:focus, .dos-textarea:focus {
            background: #111111;
        }

        .dos-button {
            background: #000000;
            border: 2px solid #ffffff;
            color: #ffffff;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.1s linear;
            text-transform: uppercase;
        }

        .dos-button:hover {
            background: #ffffff;
            color: #000000;
        }

        .dos-button-primary {
            background: #000000;
            border: 2px solid #ffffff;
        }

        .dos-game-log {
            background: #000000;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            line-height: 1.8;
            color: #ffffff;
        }

        .dos-game-log::-webkit-scrollbar {
            width: 12px;
            background: #000000;
        }
        .dos-game-log::-webkit-scrollbar-track {
            background: #000000;
            border-left: 1px solid #ffffff;
        }
        .dos-game-log::-webkit-scrollbar-thumb {
            background: #ffffff;
        }

        .gm-message-dos {
            margin-bottom: 24px;
            border-left: 3px solid #ffffff;
            padding-left: 16px;
        }

        .player-message-dos {
            margin-bottom: 24px;
            border-right: 3px solid #ffffff;
            padding-right: 16px;
            text-align: right;
        }

        .gm-prefix, .player-prefix {
            font-size: 9px;
            color: #cccccc;
            margin-bottom: 8px;
        }

        .gm-text, .player-text {
            font-size: 10px;
            line-height: 1.7;
            color: #ffffff;
            word-break: break-word;
        }

        .info-message-dos {
            text-align: center;
            margin: 20px 0;
            color: #aaaaaa;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            padding: 12px;
            font-size: 9px;
        }

        .loading-dos {
            margin: 20px 0;
            padding: 12px;
            border: 1px solid #ffffff;
            text-align: center;
            font-size: 9px;
        }

        .dos-input-area {
            background: #000000;
            border-top: 2px solid #ffffff;
            padding: 20px;
        }

        .dos-input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .dos-action-input {
            flex: 1;
            background: #000000;
            border: 2px solid #ffffff;
            padding: 14px 16px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #ffffff;
            outline: none;
        }

        .dos-divider {
            border-top: 1px solid #ffffff;
            margin: 20px 0;
        }

        .dos-additional-info {
            background: #0a0a0a;
            border: 1px solid #ffffff;
            padding: 15px;
            margin-top: 20px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
            justify-content: space-between;
        }

        @media (max-width: 768px) {
            .dos-window-content { padding: 15px; }
            .dos-title { font-size: 10px; }
            .dos-input, .dos-select, .dos-button { font-size: 8px; }
        }
    </style>
</head>
<body class="crt">
    <!-- CONFIGURATION MODAL with IMPORT/EXPORT buttons -->
    <div id="configModal" class="dos-modal">
        <div class="dos-window">
            <div class="dos-window-titlebar">
                <div class="dos-window-title">&gt; GAME_MASTER.EXE v2.0 [SAVE/LOAD]</div>
                <div class="dos-window-control">[CONFIG]</div>
            </div>
            <div class="dos-window-content">
                <div class="dos-label">[GAME_TITLE]</div>
                <input type="text" id="gameNameInput" placeholder="> ENTER_ADVENTURE_NAME" class="dos-input" value="THE_CROWN_OF_ELDORIA">
                
                <div class="dos-label">[REALM_SETTING]</div>
                <select id="areaSelect" class="dos-select">
                    <option value="Mountain">MOUNTAIN_PEAKS</option>
                    <option value="Forest" selected>ENCHANTED_FOREST</option>
                    <option value="Village">RUSTIC_VILLAGE</option>
                    <option value="Lake">MISTY_LAKE</option>
                    <option value="Sea">OPEN_SEA</option>
                    <option value="Castle">CURSED_CASTLE</option>
                    <option value="Swamp">VENOMOUS_SWAMP</option>
                </select>
                
                <div class="dos-label">[STARTER_WEAPON]</div>
                <select id="itemSelect" class="dos-select">
                    <option value="sword">LONGSWORD</option>
                    <option value="crossbow">HEAVY_CROSSBOW</option>
                    <option value="axe">GREATAXE</option>
                    <option value="staff">OAK_STAFF</option>
                </select>
                
                <div class="dos-label">[INITIAL_SPELL]</div>
                <select id="spellSelect" class="dos-select">
                    <option value="fireball">FIREBALL</option>
                    <option value="heal">HEALING_LIGHT</option>
                    <option value="frost">FROST_NOVA</option>
                    <option value="telekinetic">MAGE_HAND</option>
                    <option value="lightning">CHAIN_LIGHTNING</option>
                </select>
                
                <div class="dos-additional-info">
                    <div class="dos-label" style="margin-top:0;">[OPTIONAL_WORLD_DETAILS]</div>
                    <textarea id="optionalGameDetails" rows="3" class="dos-textarea" placeholder="Example: Ancient dragon cults, political intrigue, rare magic..."></textarea>
                </div>
                
                <div class="dos-label">[OPENROUTER_API_KEY]</div>
                <input type="password" id="apiKeyModalInput" placeholder="> sk-or-XXXXXXXXXXXXXXXX" class="dos-input">
                
                <div class="dos-label">[AI_MODEL]</div>
                <select id="modelSelectModal" class="dos-select">
                    <option value="google/gemini-2.0-flash-lite-001">GEMINI_2.0_FLASH_LITE (FREE)</option>
                    <option value="qwen/qwen2.5-72b-instruct:free">QWEN_2.5_72B (FREE)</option>
                    <option value="meta-llama/llama-3.1-8b-instruct:free">LLAMA_3.1_8B (FREE)</option>
                </select>
                
                <div class="dos-divider"></div>
                
                <!-- IMPORT / EXPORT BUTTONS SECTION -->
                <div class="button-group">
                    <button id="exportSaveBtn" class="dos-button">[EXPORT_SAVE.JSON]</button>
                    <button id="importSaveBtn" class="dos-button">[IMPORT_SAVE.JSON]</button>
                    <input type="file" id="importFileInput" accept=".json" style="display: none;">
                    <button id="resetDefaultsBtn" class="dos-button">[RESET_DEFAULTS]</button>
                    <button id="startAdventureBtn" class="dos-button dos-button-primary">[START_ADVENTURE]</button>
                </div>
                <div class="info-message-dos" style="margin-top: 15px; font-size: 8px;">
                    > EXPORT saves full game state (config + history) for AI continuation. IMPORT to restore any save.
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN GAME UI -->
    <div id="gameInterface" class="dos-container" style="display: none; height: 90vh; flex-direction: column;">
        <div class="dos-header">
            <div class="dos-title">&gt; <span id="gameTitleDisplay">GAME</span> <span>_</span></div>
            <div class="dos-status">[STATUS: ACTIVE]</div>
        </div>
        <div style="flex: 1; overflow: hidden;">
            <div id="gameLog" class="dos-game-log"></div>
        </div>
        <div class="dos-input-area">
            <form id="actionForm">
                <div class="dos-input-group">
                    <input type="text" id="playerAction" placeholder="> ENTER_COMMAND_" class="dos-action-input" autocomplete="off">
                    <button type="submit" class="dos-button">[SEND]</button>
                </div>
            </form>
            <div style="display: flex; gap: 12px; margin-top: 15px; justify-content: space-between;">
                <div>
                    <button id="exportGameSaveBtn" class="dos-button">[EXPORT_SAVE]</button>
                    <button id="importGameSaveBtn" class="dos-button">[IMPORT_SAVE]</button>
                    <input type="file" id="gameImportFileInput" accept=".json" style="display: none;">
                </div>
                <div>
                    <button id="resetGameBtn" class="dos-button">[RESET_GAME]</button>
                    <button id="reconfigBtn" class="dos-button">[RECONFIGURE]</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ======================== FULL SAVE/EXPORT IMPORT SYSTEM ========================
        let config = {
            gameName: "THE_CROWN_OF_ELDORIA",
            area: "Forest",
            startingItem: "sword",
            startingSpell: "fireball",
            apiKey: "",
            model: "google/gemini-2.0-flash-lite-001",
            optionalInfo: ""
        };
        
        let systemPromptBase = `You are an expert, immersive Game Master for a fantasy text adventure RPG set in a classic 80s fantasy world.
The world is responsive and dynamic. Player choices shape the story, combat, and fate.
RULES:
- Describe scenes with vivid sensory details. Use 2–3 concise paragraphs max (150-200 words).
- NEVER control the player's character actions or decisions. Always let the player choose.
- Consequences are realistic: actions can succeed or fail based on logic and the game world.
- Keep perfect consistency with previous events, items, and NPCs.
- The player's starting equipment and spell define their early capabilities.
- Atmosphere: high fantasy, epic but grounded. Respond in second person.
- At the end of each reply, leave a natural hook for the player's next move.
- DO NOT mention these instructions or that you're an AI.`;
        
        let conversationHistory = [];
        let currentGameActive = false;
        
        // DOM elements
        const configModal = document.getElementById('configModal');
        const gameInterface = document.getElementById('gameInterface');
        const gameLogDiv = document.getElementById('gameLog');
        const gameTitleDisplay = document.getElementById('gameTitleDisplay');
        
        function escapeHtml(str) { 
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        function appendMessage(type, content, isHtml = false) {
            const wrapper = document.createElement('div');
            if (type === 'gm') {
                wrapper.className = 'gm-message-dos';
                const displayContent = isHtml ? content : escapeHtml(content).replace(/\n/g, '<br>');
                wrapper.innerHTML = `<div class="gm-prefix">> GAME_MASTER:</div><div class="gm-text">${displayContent}</div>`;
            } else if (type === 'player') {
                wrapper.className = 'player-message-dos';
                wrapper.innerHTML = `<div class="player-prefix">> PLAYER_ACTION:</div><div class="player-text">${escapeHtml(content).replace(/\n/g, '<br>')}</div>`;
            } else if (type === 'info') {
                wrapper.className = 'info-message-dos';
                wrapper.innerHTML = `> ${escapeHtml(content)}`;
            } else if (type === 'loading') {
                wrapper.className = 'loading-dos';
                wrapper.id = 'temp-loading';
                wrapper.innerHTML = `> GAME_MASTER_PROCESSING...`;
            }
            gameLogDiv.appendChild(wrapper);
            gameLogDiv.scrollTop = gameLogDiv.scrollHeight;
        }
        
        function clearLog() { gameLogDiv.innerHTML = ''; }
        function removeLoading() { const el = document.getElementById('temp-loading'); if(el) el.remove(); }
        
        async function callOpenRouter(messagesArray) {
            if(!config.apiKey) throw new Error("API_KEY_MISSING");
            const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${config.apiKey}`,
                    'HTTP-Referer': 'https://dos-adventure-gm.app',
                    'X-Title': '80s DOS Text GM',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: config.model,
                    messages: messagesArray,
                    temperature: 0.85,
                    max_tokens: 550,
                    top_p: 0.92
                })
            });
            if(!response.ok) {
                let errMsg = `HTTP ${response.status}`;
                try { const errJson = await response.json(); errMsg += `: ${errJson.error?.message || JSON.stringify(errJson)}`; } catch(e) { errMsg += `: ${response.statusText}`; }
                throw new Error(errMsg);
            }
            const data = await response.json();
            return data.choices[0].message.content.trim();
        }
        
        function buildGameMasterContext() {
            const itemMap = { sword: "Longsword", crossbow: "Heavy Crossbow", axe: "Greataxe", staff: "Oak Staff" };
            const spellMap = { fireball: "Fireball spell", heal: "Healing Light", frost: "Frost Nova", telekinetic: "Mage Hand", lightning: "Chain Lightning" };
            const chosenItem = itemMap[config.startingItem] || "Longsword";
            const chosenSpell = spellMap[config.startingSpell] || "Fireball";
            const locationDesc = { Mountain: "jagged mountain peaks", Forest: "dense ancient forest", Village: "rustic village", Lake: "misty lake", Sea: "coastal town", Castle: "cursed castle", Swamp: "fetid swamp" };
            const areaText = locationDesc[config.area] || "mysterious frontier";
            const optionalDetails = config.optionalInfo && config.optionalInfo.trim() !== "" ? `\nADDITIONAL WORLD DETAILS (must be incorporated):\n${config.optionalInfo}\n` : "";
            return `${systemPromptBase}
            PLAYER LEGEND CONFIGURATION:
            - Game Title: "${config.gameName}"
            - Starting Region: ${config.area}. ${areaText}
            - Starting Equipment: ${chosenItem}
            - Known Spell: ${chosenSpell}
            ${optionalDetails}
            Begin the adventure with an immersive introduction at the ${config.area}. Present tense, second person.`;
        }
        
        async function startGameWithConfig() {
            const gameNameRaw = document.getElementById('gameNameInput').value.trim();
            const area = document.getElementById('areaSelect').value;
            const startingItem = document.getElementById('itemSelect').value;
            const startingSpell = document.getElementById('spellSelect').value;
            const apiKeyRaw = document.getElementById('apiKeyModalInput').value.trim();
            const modelSelected = document.getElementById('modelSelectModal').value;
            const optionalInfoRaw = document.getElementById('optionalGameDetails').value;
            if(!apiKeyRaw) { appendMessage('info', "ERROR: API_KEY_REQUIRED."); return false; }
            
            config.gameName = gameNameRaw || "UNTOLD_LEGEND";
            config.area = area;
            config.startingItem = startingItem;
            config.startingSpell = startingSpell;
            config.apiKey = apiKeyRaw;
            config.model = modelSelected;
            config.optionalInfo = optionalInfoRaw;
            
            conversationHistory = [];
            currentGameActive = true;
            const dynamicSystem = buildGameMasterContext();
            conversationHistory.push({ role: "system", content: dynamicSystem });
            gameTitleDisplay.innerText = config.gameName.toUpperCase();
            clearLog();
            appendMessage('info', `SYSTEM: INITIALIZING "${config.gameName}"...`);
            if(config.optionalInfo.trim()) appendMessage('info', `> OPTIONAL_DATA_LOADED`);
            appendMessage('loading', '');
            try {
                const openingRequest = { role: "user", content: `Begin the adventure now. I am in the ${config.area} with my ${config.startingItem} and ${config.startingSpell}. Set the scene according to all details.` };
                const messagesToSend = [...conversationHistory, openingRequest];
                const gmOpening = await callOpenRouter(messagesToSend);
                removeLoading();
                conversationHistory.push(openingRequest);
                conversationHistory.push({ role: "assistant", content: gmOpening });
                appendMessage('gm', gmOpening);
                configModal.style.display = 'none';
                gameInterface.style.display = 'flex';
                saveFullGameState();
            } catch(err) {
                removeLoading();
                appendMessage('info', `ERROR: ${err.message}`);
                return false;
            }
            return true;
        }
        
        async function handlePlayerAction(action) {
            if(!currentGameActive || !config.apiKey) { appendMessage('info', "> GAME_NOT_ACTIVE."); return; }
            if(!action.trim()) return;
            appendMessage('player', action);
            conversationHistory.push({ role: "user", content: action });
            appendMessage('loading', '');
            try {
                const aiResponse = await callOpenRouter(conversationHistory);
                removeLoading();
                appendMessage('gm', aiResponse);
                conversationHistory.push({ role: "assistant", content: aiResponse });
                saveFullGameState();
            } catch(err) {
                removeLoading();
                appendMessage('info', `GM_ERROR: ${err.message}`);
            }
        }
        
        // ==================== FULL EXPORT FUNCTION ====================
        function exportFullSave() {
            const saveData = {
                version: "1.0",
                exportedAt: new Date().toISOString(),
                config: {
                    gameName: config.gameName,
                    area: config.area,
                    startingItem: config.startingItem,
                    startingSpell: config.startingSpell,
                    apiKey: config.apiKey,      // includes API key for full restoration
                    model: config.model,
                    optionalInfo: config.optionalInfo
                },
                conversationHistory: conversationHistory,
                currentGameActive: currentGameActive
            };
            const jsonStr = JSON.stringify(saveData, null, 2);
            const blob = new Blob([jsonStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `dos_save_${config.gameName || "adventure"}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            appendMessage('info', "> GAME SAVED TO JSON FILE. AI CAN READ THIS FOR CONTINUATION.");
        }
        
        // ==================== FULL IMPORT FUNCTION ====================
        function importFullSave(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const saveData = JSON.parse(e.target.result);
                    if(!saveData.config || !saveData.conversationHistory) throw new Error("Invalid save file format");
                    // Restore config
                    config.gameName = saveData.config.gameName || "RESTORED_GAME";
                    config.area = saveData.config.area || "Forest";
                    config.startingItem = saveData.config.startingItem || "sword";
                    config.startingSpell = saveData.config.startingSpell || "fireball";
                    config.apiKey = saveData.config.apiKey || "";
                    config.model = saveData.config.model || "google/gemini-2.0-flash-lite-001";
                    config.optionalInfo = saveData.config.optionalInfo || "";
                    // Restore conversation
                    conversationHistory = saveData.conversationHistory;
                    currentGameActive = saveData.currentGameActive === true;
                    
                    // Update UI fields if modal visible
                    document.getElementById('gameNameInput').value = config.gameName;
                    document.getElementById('areaSelect').value = config.area;
                    document.getElementById('itemSelect').value = config.startingItem;
                    document.getElementById('spellSelect').value = config.startingSpell;
                    document.getElementById('apiKeyModalInput').value = config.apiKey;
                    document.getElementById('modelSelectModal').value = config.model;
                    document.getElementById('optionalGameDetails').value = config.optionalInfo;
                    
                    if(currentGameActive && conversationHistory.length > 0) {
                        // Restore game interface
                        gameTitleDisplay.innerText = config.gameName.toUpperCase();
                        clearLog();
                        // Replay conversation log (skip system message)
                        for(let i = 0; i < conversationHistory.length; i++) {
                            const msg = conversationHistory[i];
                            if(msg.role === 'user') appendMessage('player', msg.content);
                            if(msg.role === 'assistant') appendMessage('gm', msg.content);
                        }
                        configModal.style.display = 'none';
                        gameInterface.style.display = 'flex';
                        appendMessage('info', `> SAVE RESTORED SUCCESSFULLY. CONTINUE YOUR ADVENTURE.`);
                        saveFullGameState();
                    } else {
                        // No active game, just update config modal
                        configModal.style.display = 'flex';
                        gameInterface.style.display = 'none';
                        appendMessage('info', `> SAVE IMPORTED. CONFIGURATION UPDATED. PRESS START ADVENTURE.`);
                    }
                } catch(err) {
                    alert("IMPORT ERROR: Invalid JSON file. " + err.message);
                    appendMessage('info', `IMPORT FAILED: ${err.message}`);
                }
            };
            reader.readAsText(file);
        }
        
        function saveFullGameState() {
            localStorage.setItem('dos_history', JSON.stringify(conversationHistory));
            localStorage.setItem('dos_config_active', JSON.stringify(config));
            localStorage.setItem('dos_active_flag', currentGameActive ? 'true' : 'false');
        }
        
        function loadSavedGameFromLocal() {
            const savedConfig = localStorage.getItem('dos_config_active');
            if(savedConfig) { try { const parsed = JSON.parse(savedConfig); config = { ...config, ...parsed }; } catch(e) {} }
            const savedHistory = localStorage.getItem('dos_history');
            if(savedHistory && localStorage.getItem('dos_active_flag') === 'true') {
                try {
                    conversationHistory = JSON.parse(savedHistory);
                    if(conversationHistory.length && conversationHistory[0]?.role === 'system') {
                        currentGameActive = true;
                        gameTitleDisplay.innerText = config.gameName.toUpperCase();
                        clearLog();
                        for(let i = 0; i < conversationHistory.length; i++) {
                            const msg = conversationHistory[i];
                            if(msg.role === 'user') appendMessage('player', msg.content);
                            if(msg.role === 'assistant') appendMessage('gm', msg.content);
                        }
                        configModal.style.display = 'none';
                        gameInterface.style.display = 'flex';
                        return true;
                    }
                } catch(e) {}
            }
            return false;
        }
        
        function resetGame() {
            if(confirm("RESET CURRENT ADVENTURE? ALL PROGRESS LOST.")) {
                conversationHistory = [];
                currentGameActive = false;
                localStorage.removeItem('dos_history');
                localStorage.removeItem('dos_active_flag');
                gameInterface.style.display = 'none';
                configModal.style.display = 'flex';
                setModalDefaults();
            }
        }
        
        function reconfigFromGame() { if(confirm("RETURN TO CONFIGURATION? PROGRESS LOST.")) resetGame(); }
        
        function setModalDefaults() {
            document.getElementById('gameNameInput').value = config.gameName;
            document.getElementById('areaSelect').value = config.area;
            document.getElementById('itemSelect').value = config.startingItem;
            document.getElementById('spellSelect').value = config.startingSpell;
            document.getElementById('apiKeyModalInput').value = config.apiKey;
            document.getElementById('modelSelectModal').value = config.model;
            document.getElementById('optionalGameDetails').value = config.optionalInfo || "";
        }
        
        // Event wiring
        document.getElementById('startAdventureBtn').addEventListener('click', () => startGameWithConfig());
        document.getElementById('resetDefaultsBtn').addEventListener('click', () => {
            config = { gameName: "THE_CROWN_OF_ELDORIA", area: "Forest", startingItem: "sword", startingSpell: "fireball", apiKey: config.apiKey || "", model: "google/gemini-2.0-flash-lite-001", optionalInfo: "" };
            setModalDefaults();
        });
        document.getElementById('resetGameBtn')?.addEventListener('click', () => resetGame());
        document.getElementById('reconfigBtn')?.addEventListener('click', () => reconfigFromGame());
        document.getElementById('actionForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('playerAction');
            const val = input.value.trim();
            if(val) handlePlayerAction(val);
            input.value = '';
        });
        
        // EXPORT / IMPORT HANDLERS for both modal and game interface
        function setupImportExport() {
            const exportModalBtn = document.getElementById('exportSaveBtn');
            const importModalBtn = document.getElementById('importSaveBtn');
            const importFileInput = document.getElementById('importFileInput');
            const exportGameBtn = document.getElementById('exportGameSaveBtn');
            const importGameBtn = document.getElementById('importGameSaveBtn');
            const gameImportInput = document.getElementById('gameImportFileInput');
            
            if(exportModalBtn) exportModalBtn.addEventListener('click', () => exportFullSave());
            if(exportGameBtn) exportGameBtn.addEventListener('click', () => exportFullSave());
            
            if(importModalBtn) importModalBtn.addEventListener('click', () => importFileInput.click());
            if(importGameBtn) importGameBtn.addEventListener('click', () => gameImportInput.click());
            
            if(importFileInput) importFileInput.addEventListener('change', (e) => { if(e.target.files[0]) importFullSave(e.target.files[0]); importFileInput.value = ''; });
            if(gameImportInput) gameImportInput.addEventListener('change', (e) => { if(e.target.files[0]) importFullSave(e.target.files[0]); gameImportInput.value = ''; });
        }
        
        (function init() {
            const storedConfig = localStorage.getItem('dos_config_active');
            if(storedConfig) { try { const savedCfg = JSON.parse(storedConfig); config = { ...config, ...savedCfg }; } catch(e) {} }
            setModalDefaults();
            const loaded = loadSavedGameFromLocal();
            if(!loaded) { configModal.style.display = 'flex'; gameInterface.style.display = 'none'; } 
            else { configModal.style.display = 'none'; gameInterface.style.display = 'flex'; }
            setupImportExport();
        })();
    </script>
</body>
</html>
