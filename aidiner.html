<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ALL‑NIGHT DINER · ROUTE 17 · 1984</title>
    <!-- Retro 80s terminal font (Press Start 2P) -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 12px;
            background-image: radial-gradient(circle at 10% 20%, #3a1f1f 0%, #0f0606 90%);
        }

        .diner {
            background: black;
            color: #ffb347;
            border: 4px solid red;
            box-shadow: 0 0 30px red, inset 0 0 20px red;
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 16px 18px 12px 18px;
            position: relative;
            z-index: 1;
        }

        .neon-sign {
            border-bottom: 3px solid red;
            padding-bottom: 12px;
            margin-bottom: 16px;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            text-transform: uppercase;
            color: yellow;
            text-shadow: 0 0 8px #ff9900, 0 0 16px #ff6600;
            letter-spacing: 3px;
        }

        .neon-sign .right {
            color: yellow;
            font-size: 10px;
            align-self: flex-end;
            text-shadow: 0 0 5px white;
        }

        .counter-panel {
            flex: 1;
            overflow-y: auto;
            border: 3px ridge red;
            padding: 16px;
            background: red;
            box-shadow: inset 0 0 30px #00000099, 0 0 10px #ffb34733;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
            background-image: repeating-linear-gradient(45deg, #2a1e18 0px, #2a1e18 2px, #221712 2px, #221712 8px);
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 100%;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.npc {
            align-items: flex-start;
        }

        .message .speaker {
            font-size: 9px;
            color: white;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 3px #ffaa33;
            background: red;
            padding: 3px 8px;
            border: 1px solid yellow;
            border-radius: 12px;
        }

        .message.user .speaker {
            background: red;
            color: yellow;
            border-color: orange;
        }

        .message .content {
            background: transparent;
            border: none;
            padding: 6px 0 2px 8px;
            font-size: 12px;
            line-height: 1.8;
            color: yellow;
            text-shadow: 0 0 4px #cc8800;
            max-width: 90%;
            word-break: break-word;
            white-space: pre-wrap;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            border-left: 4px solid red;
        }

        .message.user .content {
            color: white;
            text-shadow: 0 0 3px white;
            border-left-color: red;
        }

        .cursor {
            display: inline-block;
            width: 18px;
            height: 3px;
            background-color: yellow;
            vertical-align: middle;
            margin-left: 4px;
            animation: blink 1s step-end infinite;
            box-shadow: 0 0 8px #ffaa00;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .input-line {
            display: flex;
            align-items: center;
            border-top: 3px double red;
            padding-top: 14px;
        }

        .prompt {
            color: white;
            margin-right: 14px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 8px #ffb347;
        }

        #userInput {
            flex: 1;
            background: black;
            border: 3px solid white;
            color: white;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 14px;
            padding: 14px 14px;
            outline: none;
            box-shadow: 0 0 15px #ff880044, inset 0 0 8px #442b1a;
            caret-color: #ffb850;
        }

        #userInput::placeholder {
            color: white;
            font-size: 9px;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9px;
            margin-top: 10px;
            color: white;
            text-transform: uppercase;
        }

        .clickable {
            color: red;
            text-decoration: underline dotted;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid transparent;
            padding: 4px 8px;
            text-shadow: 0 0 5px #ffaa33;
        }

        .clickable:hover {
;
            color: red;
            background: black;
            border-color: white;
        }

        #timeStatus {
            color: red;
            font-size: 10px;
            text-align: right;
            text-shadow: 0 0 4px #ff9900;
            background: black;
            padding: 6px 12px;
            border: 1px black;
        }

        .temp-message {
            background: transparent;
            border: none;
            padding: 8px 0;
            font-size: 12px;
            color: white;
            font-style: italic;
            text-shadow: none;
            border-left-color: white;
        }

        .counter-panel::-webkit-scrollbar {
            width: 10px;
        }
        .counter-panel::-webkit-scrollbar-track {
            background: white;
            border: 1px solid #8b5a2b;
        }
        .counter-panel::-webkit-scrollbar-thumb {
            background: black;
            border: 1px solid red;
        }
    </style>
</head>
<body>
    <div class="diner">
        <div class="neon-sign">
            <span>🍽️ ALL‑NIGHT DINER 🍽️</span>
            <span class="right">OCT 1984</span>
        </div>

        <div id="convPanel" class="counter-panel"></div>

        <div class="input-line">
            <span class="prompt">☕❯</span>
            <input type="text" id="userInput" placeholder="ASK, ORDER, OR JUST LISTEN ..." autofocus>
        </div>

        <div class="footer">
            <span class="clickable" id="resetBtn">[ ✦ RESET COUNTER ✦ ]</span>
            <span id="timeStatus" class="status">🕰️ 2:47 AM</span>
        </div>
    </div>

    <script>
        (function() {
            // --- DOM elements ---
            const convPanel = document.getElementById('convPanel');
            const userInput = document.getElementById('userInput');
            const timeStatus = document.getElementById('timeStatus');
            const resetBtn = document.getElementById('resetBtn');

            // --- Conversation history ---
            let messages = [];

            // --- Game time (advances every few messages) ---
            const timeSlots = ["2:47 AM", "3:20 AM", "4:05 AM", "4:55 AM", "5:30 AM"];
            let timeIndex = 0;        // current slot
            let messageCount = 0;      // counter to trigger time progress (every 5 messages)

            // --- API base ---
            const API_URL = 'https://text.pollinations.ai/';

            // --- Flag to prevent concurrent API calls ---
            let isWaitingForAI = false;

            // --- Web Audio ---
            let audioContext = null;
            // function to stop the continuous processing sound
            let stopProcessingSound = null;

            function initAudio() {
                if (audioContext) return;
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            // Soft coffee‑pour / typewriter click
            function playDinerClick() {
                if (!audioContext) initAudio();
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.type = 'sine';
                osc.frequency.value = 300 + Math.random() * 100;
                gain.gain.value = 0.03;
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.start(now);
                osc.stop(now + 0.02);
            }

            // --- Authentic old disc drive loading sound (continuous motor hum + seeking clicks) ---
            function startProcessingSound() {
                if (!audioContext) initAudio();
                if (audioContext.state === 'suspended') audioContext.resume();

                // ------ Continuous drive motor hum ------
                // Main spinning tone (like a spindle motor)
                const motorOsc = audioContext.createOscillator();
                motorOsc.type = 'triangle'; // smoother than saw
                motorOsc.frequency.value = 115; // base hum

                // Add a slight wobble (LFO) to simulate motor speed variation
                const lfo = audioContext.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 3.1; // slow wobble
                const lfoGain = audioContext.createGain();
                lfoGain.gain.value = 6; // frequency modulation depth
                lfo.connect(lfoGain);
                lfoGain.connect(motorOsc.frequency);

                // Noise for aerodynamic "whoosh" (air movement)
                const bufferSize = 4096;
                const noiseNode = audioContext.createScriptProcessor(bufferSize, 1, 1);
                noiseNode.onaudioprocess = function(e) {
                    const output = e.outputBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        // Brownish noise (emphasize low frequencies)
                        output[i] = (Math.random() * 2 - 1) * 0.025;
                    }
                };

                // Filter to shape the hum and noise into a "drive" sound
                const filter = audioContext.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 320;
                filter.Q.value = 1.8;

                // Mixer gain (master)
                const masterGain = audioContext.createGain();
                masterGain.gain.value = 0.1; // quiet background

                // Connect continuous sources
                motorOsc.connect(filter);
                noiseNode.connect(filter);
                filter.connect(masterGain);
                masterGain.connect(audioContext.destination);

                // Start oscillators
                motorOsc.start();
                lfo.start();

                // ------ Seek sounds (intermittent clicks & chirps) ------
                // We'll schedule them using timeouts, and keep a list to cancel on stop
                let seekTimeouts = [];

                function scheduleSeek() {
                    if (!stopProcessingSound) return; // stopped
                    const nextDelay = 300 + Math.random() * 500; // 300–800 ms

                    const timeoutId = setTimeout(() => {
                        // Create a short seek sound (a filtered click or chirp)
                        const now = audioContext.currentTime;

                        // Option A: quick filtered noise burst
                        const seekGain = audioContext.createGain();
                        seekGain.gain.setValueAtTime(0.12, now);
                        seekGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);

                        const seekNoise = audioContext.createBufferSource();
                        const buffer = audioContext.createBuffer(1, 256, audioContext.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < 256; i++) {
                            data[i] = Math.random() * 2 - 1;
                        }
                        seekNoise.buffer = buffer;

                        const seekFilter = audioContext.createBiquadFilter();
                        seekFilter.type = 'bandpass';
                        seekFilter.frequency.value = 600 + Math.random() * 400;
                        seekFilter.Q.value = 2.5;

                        seekNoise.connect(seekFilter);
                        seekFilter.connect(seekGain);
                        seekGain.connect(audioContext.destination);

                        seekNoise.start(now);
                        seekNoise.stop(now + 0.08);

                        // Also sometimes add a tiny sine beep (like data chirp)
                        if (Math.random() > 0.6) {
                            const chirpOsc = audioContext.createOscillator();
                            chirpOsc.type = 'sine';
                            chirpOsc.frequency.value = 1200 + Math.random() * 600;
                            const chirpGain = audioContext.createGain();
                            chirpGain.gain.setValueAtTime(0.03, now);
                            chirpGain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
                            chirpOsc.connect(chirpGain);
                            chirpGain.connect(audioContext.destination);
                            chirpOsc.start(now);
                            chirpOsc.stop(now + 0.04);
                        }

                        // Schedule next seek if still running
                        if (stopProcessingSound) {
                            scheduleSeek();
                        }
                    }, nextDelay);

                    seekTimeouts.push(timeoutId);
                }

                // Start the first seek
                scheduleSeek();

                // Return a stop function that kills all sound and cancels seeks
                return function() {
                    // Stop continuous sources
                    try {
                        motorOsc.stop();
                        lfo.stop();
                        noiseNode.disconnect();
                        filter.disconnect();
                        masterGain.disconnect();
                    } catch (e) {}

                    // Cancel all pending seek timeouts
                    seekTimeouts.forEach(id => clearTimeout(id));
                    seekTimeouts = [];
                    stopProcessingSound = null; // allow redefinition
                };
            }

            // --- Helper: add message to UI (with speaker parsing) ---
            function addMessageToUI(role, rawContent, isTemp = false) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${role}`; // 'user' or 'npc'

                let speaker = role === 'user' ? 'YOU' : 'DINER';
                let displayContent = rawContent;

                // For NPC messages, try to extract speaker from "Name: message" format
                if (role === 'npc' && !isTemp) {
                    const colonIndex = rawContent.indexOf(':');
                    if (colonIndex > 0 && colonIndex < 20) {
                        const possibleSpeaker = rawContent.substring(0, colonIndex).trim();
                        if (possibleSpeaker.length > 0 && possibleSpeaker.length < 20) {
                            speaker = possibleSpeaker.toUpperCase();
                            displayContent = rawContent.substring(colonIndex + 1).trim();
                        }
                    }
                }

                const speakerSpan = document.createElement('span');
                speakerSpan.className = 'speaker';
                speakerSpan.textContent = speaker;

                const contentDiv = document.createElement('div');
                contentDiv.className = 'content';
                if (isTemp) {
                    contentDiv.classList.add('temp-message');
                }
                contentDiv.textContent = displayContent;

                messageDiv.appendChild(speakerSpan);
                messageDiv.appendChild(contentDiv);
                convPanel.appendChild(messageDiv);
                convPanel.scrollTop = convPanel.scrollHeight;
                return contentDiv;
            }

            // --- typewriter effect for AI response with sound ---
            async function typewriterEffect(element, fullText, speed = 25) {
                element.textContent = '';
                for (let i = 0; i < fullText.length; i++) {
                    element.textContent += fullText[i];
                    playDinerClick();
                    convPanel.scrollTop = convPanel.scrollHeight;
                    await new Promise(resolve => setTimeout(resolve, speed));
                }
                // blinking cursor after message
                const existingCursor = convPanel.querySelector('.cursor');
                if (existingCursor) existingCursor.remove();
                const cursorSpan = document.createElement('span');
                cursorSpan.className = 'cursor';
                cursorSpan.setAttribute('aria-label', 'blinking cursor');
                element.parentNode.appendChild(cursorSpan);
                convPanel.scrollTop = convPanel.scrollHeight;
            }

            // --- remove temporary "thinking..." message ---
            function removeTempMessage() {
                const tempDiv = document.getElementById('temp-message');
                if (tempDiv) tempDiv.remove();
            }

            // --- Advance time based on message count ---
            function advanceTime() {
                messageCount++;
                if (messageCount % 5 === 0 && timeIndex < timeSlots.length - 1) {
                    timeIndex++;
                    timeStatus.textContent = `🕰️ ${timeSlots[timeIndex]}`;
                }
            }

            // --- Reset time ---
            function resetTime() {
                timeIndex = 0;
                messageCount = 0;
                timeStatus.textContent = `🕰️ ${timeSlots[0]}`;
            }

            // --- Construct system prompt with full character details and current time ---
            function buildSystemPrompt() {
                const currentTime = timeSlots[timeIndex];
                return `You are the soul of the All‑Night Diner, a truck stop on Route 17 in October 1984. It's ${currentTime}. Several regulars are here, each with a hidden wound. You respond as these characters or as the diner's atmosphere.

CHARACTERS (with hidden backstories – reveal slowly based on keywords and the time):

1. JIMMY (trucker, 40s) – Worn CAT cap, flannel. Talks about his run (Des Moines to Pittsburgh), but mentions places that don't exist. SURFACE: "I got a schedule." REAL: Killed another driver in an accident 18 months ago. Lost license, wife left, kids don't call. Comes here because Marie calls him by name. TRIGGERS: "accident", "brakes", "rain" make him defensive; after 4am he may admit he hasn't driven in a year.

2. MARIE (waitress, 50s) – Blue uniform, comfortable shoes. Refills coffee, offers pie. SURFACE: Cheerful, efficient. REAL: Son Danny is in prison (8-12 years). Works double shifts to avoid empty apartment. Keeps his photo in her apron. TRIGGERS: "son", "prison", "Danny" crack her smile. At 3:30am she sometimes stares out window.

3. RICK (runaway, 17) – Thin denim jacket, backpack. Nursing coffee for hours. SURFACE: "Waiting for my ride to California." REAL: Rick is a serial killer who is responsible for all the hitchhiker deaths in the last few years along this area of the highway. Sleeps behind diner. TRIGGERS: "death", "hitchhiker", "murderer", make him defensive; after 4am he might ask for a quarter for the pay phone.

4. HENDERSON (businessman, 60s) – Wrinkled suit, stopped watch. SURFACE: "Traveling salesmen. spent most my life on the road." REAL: He is a conman, a drifter, a thief and an alcoholic. Carries a briefcase containing photos of naked ex girlfriends. Comes because he doesn't have a home and lives in his car. TRIGGERS: "girlfriend", "selling", "business". At 4:15am he sometimes opens the briefcase.

5. TERRY (cook, 30) – Greasy apron, crossed‑out tattoo on forearm. SURFACE: Short order, never sits. REAL: Former line cook at The Blue Moon, which burned down three years ago. His girlfriend died in the fire. He got out. Works here, sleeps in back. TRIGGERS: "fire", "smoke", "Blue Moon". He'll walk to the freezer. Might show you her photo near closing.

8. DEPUTY MILLER (law enforcement, 40s)
Appearance: Still in his crisp county deputy uniform. He looks tired, the kind of tired that sleep can't fix. He always sits at the counter, never in a booth, and keeps his back to the wall.

Surface: "Just my late-night coffee run. Got to keep an eye on things. Quiet night?" He asks routine questions, but his eyes are always moving, cataloging everyone.

Hidden Reality: Miller knows about the hitchhiker murders. He knows the bodies are found within a 50-mile radius of this diner. He has a file folder in his patrol car full of evidence he's never logged, theories he can't prove. He's been coming here for six months, watching, waiting for a pattern, for a flicker of guilt on someone's face. He's obsessed, and the obsession is consuming him. He's stopped trusting his own department.

Triggers:

"murder," "hitchhiker," "investigation" – He'll go very still. He'll ask you pointed, quiet questions about why you're interested, his gaze unnervingly direct.

3:15 AM: He'll start sketching on a napkin. It's a crude map of the area, with small 'x's marking the body dump sites. He doesn't realize he's doing it.

Mentions of Rick: If Rick says anything about the road or needing a ride, Miller's attention will lock onto him like a heat-seeking missile.

Here is another character to add to the diner's dark ecosystem.

---

### 11. CHLOE (sex worker, late 20s)
- **Appearance:** Too-thin beneath a cheap faux-fur coat that might have been white once. Wears heavy makeup that's been carefully applied but is starting to crack at the corners of her mouth. Fingernails are bitten to the quick, with traces of old chipped polish. She clutches a small beat-up purse like it contains her entire life (it basically does).
- **Surface:** "Just waiting for my boyfriend. He's finishing up a job. He'll be here any minute. Can I just... sit for a while? I'll order something in a minute." She'll order the cheapest thing on the menu and make it last for hours, jumping at every set of headlights that sweep across the windows.
- **Hidden Reality:** Chloe has been working the truck stops along this highway for three years, ever since she aged out of foster care with nowhere to go. Her "boyfriend" is Dwight, her pimp, who drops her off here on slow nights while he works the larger truck plaza five miles up the road. He's "finishing a job" meaning he's collecting from the girls he trusts more than her. She's been using for two years—pills when she can get them, heroin when she can't. The diner is her shelter from the cold, from the johns, from the occasional violence of her life. She's terrified of Rick without knowing why—something animal in her recognizes something wrong in him.
- **Triggers:**
    - **"Boyfriend," "Dwight," "ride"** – She'll become defensive, insisting he's coming, he's a good man, he takes care of her. Her eyes dart to the window more frequently.
    - **"Truck stop," "highway," "working"** – She'll clam up, pull her coat tighter, and might suddenly move to a different booth.
    - **2:45 AM:** If a truck pulls into the lot, she'll sit up straighter, hopeful. If it's not Dwight, she deflates visibly. If it's a potential john who mistakes her for working (some truckers know the diner is a pickup spot), she has a quiet, terrified way of saying "I'm waiting for my boyfriend" that suggests this boundary isn't always respected.
    - **"Need a fix," "dope," "withdrawal"** – If you hit the right keyword, you'll see her start to sweat despite the cold. She'll excuse herself to the bathroom for too long. When she comes back, she's either slightly calmer (if she had something stashed in her purse) or visibly shaking (if she didn't).
    - **3:50 AM:** The hour when she usually gives up waiting. If Dwight hasn't come by now, he's not coming tonight. She'll gather herself, check her reflection with grim resignation, and walk back out into the dark toward the highway shoulder to flag down a truck herself. She'll pause at the door, hand on the frame, and for just a moment you see the girl she was before all of this—then she's gone.
    - **Genuine kindness without strings:** This disorients her completely. If Marie gives her a piece of pie "on the house, honey," or if someone just asks her name without wanting anything, her eyes might fill with tears she'll furiously blink away. She doesn't know how to process kindness anymore.

**Connection Potential:**
- With **JIMMY**: She might recognize him—or a truck like his. "You ever run the night shift on 80? Thought I might've seen you around." She's looking for a ride, or a twenty, or just someone who won't hurt her.
- With **RICK**: She's the only one in the diner who might instinctively clock him for what he is. Not consciously—but she'll avoid making eye contact, and if he approaches her, she'll make an excuse and move closer to Marie or Deputy Miller.
- With **DEPUTY MILLER**: He knows what she is, and she knows he knows. They have a silent truce: he doesn't hassle her if she's not openly working, and she doesn't cause trouble. But he also represents the law, and the law has never helped her.

RULES:
- Respond in character, starting with the speaker's name and a colon (e.g., "Marie: More coffee, hon?"). If you describe the scene, use "Narrator:".
- Keep responses concise (1-3 sentences), atmospheric, melancholic, and realistic. No supernatural, no sci‑fi.
- Time affects openness: earlier (2-3am) characters are guarded; later (after 4am) they may reveal fragments.
- If the user asks something off-topic or too direct, characters deflect or fall silent.
- Use the conversation history to maintain continuity. If a character has already revealed something, they won't repeat it exactly, but may reference it.
- No out‑of‑character remarks. Never mention AI or the simulation.

Current time: ${currentTime}. Write the next response as the diner or one of its patrons.`;
            }

            // --- API call with full prompt ---
            async function callAIPrompt(userMessage) {
                const systemPrompt = buildSystemPrompt();

                // Build conversation history (last 12 messages to save tokens)
                let historyText = '';
                const recentMessages = messages.slice(-12);
                for (let msg of recentMessages) {
                    if (msg.role === 'user') {
                        historyText += `Customer: ${msg.content}\n`;
                    } else {
                        // msg.content already includes speaker prefix
                        historyText += `${msg.content}\n`;
                    }
                }

                const fullPrompt = `${systemPrompt}\n\nRecent conversation:\n${historyText}\nCustomer: ${userMessage}\n\nRespond in character, starting with name:`;

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: fullPrompt }],
                        model: 'openai',
                        seed: Math.floor(Math.random() * 1000000),
                        json: false
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                let aiText = await response.text();

                // Remove possible Pollinations ads
                aiText = aiText.split('\n').filter(line => {
                    return !line.includes('Support Pollinations.AI') &&
                           !line.includes('Powered by Pollinations.AI') &&
                           !line.includes('to keep AI accessible');
                }).join('\n').trim();

                // Ensure it starts with a name (fallback)
                if (!aiText.includes(':')) {
                    aiText = 'Narrator: ' + aiText;
                }

                return aiText;
            }

            // --- handle user input and get AI response ---
            async function handleUserInput(inputText) {
                if (isWaitingForAI) return;
                if (!inputText.trim()) return;

                // Add user message to UI and history
                addMessageToUI('user', inputText);
                messages.push({ role: 'user', content: inputText });

                // Temporary "thinking" message
                const tempDiv = document.createElement('div');
                tempDiv.id = 'temp-message';
                tempDiv.className = 'message npc';
                const tempSpeaker = document.createElement('span');
                tempSpeaker.className = 'speaker';
                tempSpeaker.textContent = 'DINER';
                const tempContent = document.createElement('div');
                tempContent.className = 'content temp-message';
                tempContent.textContent = '☕ ... waiting on a reply ...';
                tempDiv.appendChild(tempSpeaker);
                tempDiv.appendChild(tempContent);
                convPanel.appendChild(tempDiv);
                convPanel.scrollTop = convPanel.scrollHeight;

                // Start disc drive loading sound
                if (stopProcessingSound) stopProcessingSound(); // just in case
                stopProcessingSound = startProcessingSound();

                isWaitingForAI = true;
                userInput.disabled = true;

                try {
                    const aiResponse = await callAIPrompt(inputText);
                    
                    // Stop processing sound immediately
                    if (stopProcessingSound) {
                        stopProcessingSound();
                        stopProcessingSound = null;
                    }

                    removeTempMessage();

                    // Add AI response to UI
                    const aiContentDiv = addMessageToUI('npc', aiResponse, false);
                    // Typewriter effect
                    const lastMessage = convPanel.lastChild.querySelector('.content');
                    if (lastMessage) {
                        await typewriterEffect(lastMessage, lastMessage.textContent, 20);
                    }

                    messages.push({ role: 'assistant', content: aiResponse });

                    // Advance game time
                    advanceTime();

                } catch (error) {
                    console.error(error);
                    if (stopProcessingSound) {
                        stopProcessingSound();
                        stopProcessingSound = null;
                    }
                    removeTempMessage();
                    addMessageToUI('npc', `[ask again...]`);
                    messages.push({ role: 'assistant', content: '[Error]' });
                } finally {
                    userInput.disabled = false;
                    userInput.focus();
                    isWaitingForAI = false;
                }
            }

            // --- reset everything, now with NPC list at start ---
            function resetDiner() {
                convPanel.innerHTML = '';
                messages = [];
                resetTime();
                isWaitingForAI = false;
                if (stopProcessingSound) {
                    stopProcessingSound();
                    stopProcessingSound = null;
                }
                userInput.disabled = false;

                // Opening narration: list everyone inside
                const opening = "Narrator: 2:47 AM. The diner glows along Route 17. The usual crowd is here tonight: Jimmy at the counter, Marie wiping cups, Rick in the corner booth, Henderson nursing a drink, Terry in the kitchen, Deputy Miller by the door, and Chloe near the window. The door swings shut behind you. Marie looks up from the counter.";
                
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message npc';
                const sp = document.createElement('span');
                sp.className = 'speaker';
                sp.textContent = 'NARRATOR';
                const cnt = document.createElement('div');
                cnt.className = 'content';
                const contentText = opening.replace('Narrator: ','');
                cnt.textContent = contentText;
                msgDiv.appendChild(sp);
                msgDiv.appendChild(cnt);
                convPanel.appendChild(msgDiv);
                // Typewrite the opening message
                typewriterEffect(cnt, contentText, 30);
                messages.push({ role: 'assistant', content: opening });

                timeStatus.textContent = `🕰️ ${timeSlots[0]}`;
                userInput.focus();
            }

            // --- Event listeners ---
            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (userInput.disabled || isWaitingForAI) return;
                    const msg = userInput.value.trim();
                    if (msg === '') return;
                    userInput.value = '';
                    handleUserInput(msg);
                }
            });

            resetBtn.addEventListener('click', () => {
                resetDiner();
            });

            // Enable audio on first interaction
            function enableAudio() {
                initAudio();
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                }
            }
            document.addEventListener('keydown', enableAudio, { once: true });
            document.addEventListener('click', enableAudio, { once: true });

            // Start the night with full NPC list
            resetDiner();
        })();
    </script>
</body>
</html>
