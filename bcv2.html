<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NEON HUNTER • Nightfall Games 1984</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;      /* small padding on mobile, but image stays centered */
            overflow: auto;
        }

        /* ----- PERFECT RESPONSIVE CONTAINER (no aspect-ratio issues) ----- */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 840px;           /* original width, but scales down */
            /* Padding-bottom = (height / width) * 100% → 520/640 = 0.8125 = 81.25% */
            padding-bottom: 100%;     /* creates exact 640:520 aspect ratio */
            height: 0;                  /* height is derived from padding */
            background-image: url('bcbk1.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            /* remove any possible border or outline */
            border: none;
            outline: none;
            box-shadow: none;
            overflow: hidden;
            margin: 0 auto;
        }

        /* All absolute positioned elements now sit inside the responsive container */
        #gameplay-window {
            position: absolute;
            top: 25.8462%;      /* 150 / 520 */
            left: 25.78125%;    /* 165 / 640 */
            width: 46.875%;     /* 300 / 640 */
            height: 46.1538%;   /* 240 / 520 */
            background: #001100;
            color: #00ccff;
            font-family: 'VT323', monospace;
            font-size: 18px;
            line-height: 1.35;
            padding: 18px 22px;
            overflow-y: auto;
            border: 3px solid #003366;
            box-shadow: 
                inset 0 0 30px rgba(0, 200, 255, 0.6),
                0 0 15px rgba(0, 200, 255, 0.4);
            text-shadow: 0 0 8px #00ccff;
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: break-word;
        }

        /* scrollbar styling (unchanged) */
        #gameplay-window::-webkit-scrollbar {
            width: 10px;
        }
        #gameplay-window::-webkit-scrollbar-track {
            background: #001122;
            border-radius: 0px;
        }
        #gameplay-window::-webkit-scrollbar-thumb {
            background: #44ccff;
            box-shadow: 0 0 8px #44ccff;
        }
        #gameplay-window::-webkit-scrollbar-thumb:hover {
            background: #88ddff;
        }

        /* Retro CRT scanline effect */
        #gameplay-window::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0, 255, 0, 0.08) 3px,
                rgba(0, 255, 0, 0.08) 6px
            );
            pointer-events: none;
            z-index: 2;
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        /* OVERLAY BUTTONS — positions in % (converted from original pixels) */
        .ui-button {
            position: absolute;
            background: transparent;
            border: none;
            color: #ff0000;
            font-family: 'VT323', monospace;
            font-size: 19px;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 0 12px red;
            cursor: pointer;
            transition: all 0.1s ease;
            letter-spacing: 2px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }

        .ui-button:hover {
            color: #ff4444;
            text-shadow: 0 0 20px #ff0000;
            transform: scale(1.05);
        }

        /* Exact button positions (relative to container) */
        #btn-view-map  { top: 75%; left: 28%; width: 23.125%; height: 8.84615%; }
        #btn-bio-link  { top: 75%; left: 48%;   width: 23.125%; height: 8.84615%; }
        #btn-data-chip { top: 81%; left: 28%; width: 23.125%; height: 8.84615%; }
        #btn-action    { top: 81%; left: 48%;   width: 23.125%; height: 8.84615%; }

        /* NEW BUTTONS BELOW THE ORIGINAL FOUR (positions calculated to sit directly under without overlapping) */
        #btn-inventory { top: 87%; left: 28%; width: 23.125%; height: 8.84615%; }
        #btn-travel    { top: 87%; left: 48%;   width: 23.125%; height: 8.84615%; }

        /* Text wrapping inside gameplay window (original) */
        #gameplay-window pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            max-width: 100%;
            font-size: 14px;
        }

        #gameplay-window {
            text-align: left;
        }

        /* small screens: slightly reduce font size inside window for better fit */
        @media (max-width: 500px) {
            #gameplay-window {
                font-size: 15px;
                padding: 12px 16px;
            }
            .ui-button {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- GAMEPLAY TEXT WINDOW (over the black screen in your PNG) -->
    <div id="gameplay-window">
        <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">NEON HUNTER v1.0 [1984]</div>SYSTEM STATUS: TERMINAL ONLINE<br>DETECTIVE UNIT ACTIVE<br>CASE FILE OPEN<br>LOCATION: APARTMENT 47<br><br>Rain hammers the window. Your terminal flickers with the latest murder file.<br><br><span style="color:#ff8800;">Caution: Stamina is at 88%.</span><br><br><span style="color:#00ccff;">► Click any button below to interact...</span>
    </div>

    <!-- FOUR ORIGINAL BUTTONS (positions and IDs unchanged) -->
    <button id="btn-view-map"  class="ui-button">MAIN</button>
    <button id="btn-bio-link"  class="ui-button">STATUS</button>
    <button id="btn-data-chip" class="ui-button">CLUES</button>
    <button id="btn-action"    class="ui-button">PDA</button>

    <!-- TWO NEW BUTTONS ADDED BELOW -->
    <button id="btn-inventory" class="ui-button">INVENTORY</button>
    <button id="btn-travel"    class="ui-button">TRAVEL</button>
</div>

<script>
    // ********** BLADE-RUNNER STYLE DETECTIVE ADVENTURE – EXPANDED WITH INVENTORY + TRAVEL + PDA **********
    const windowEl = document.getElementById('gameplay-window');
    let investigation = 22;
    let stamina = 88;
    let credits = 320;
    let currentLocIndex = 0;
    let storyStage = 0;

    const locations = [
        {
            name: "APARTMENT 47",
            desc: "Dimly lit apartment. Rain hammers the window. Terminal flickers with case files.",
            options: "EXAMINE terminal • READ case file • TALK to mirror"
        },
        {
            name: "NEON STRIP",
            desc: "Vibrant neon streets. Hovercars hiss past. Dealers whisper in the shadows.",
            options: "TALK informant • EXAMINE alley • ATTACK suspect"
        },
        {
            name: "UNDERCITY",
            desc: "Black-market stalls glow under flickering lights. Replicants trade secrets.",
            options: "TALK vendor • TAKE data-shard • READ graffiti"
        }
    ];

    let inventory = ["REPLICANT SCANNER", "DETECTIVE BADGE", "HOLO-PHOTO"];

    const storyMessages = [
        "You scan the holo-photo. Replicant eye signature confirmed...",
        "Street informant slips you coordinates in the pouring rain.",
        "A black-market vendor whispers about the Tyrell prototype.",
        "The chase intensifies — your target disappears into the undercity..."
    ];

    function updateWindow(html) {
        windowEl.innerHTML = html;
        windowEl.scrollTop = 0;
    }

    // MAIN — shows current location + adventure options (talk/take/use/read/give/attack/examine)
    document.getElementById('btn-view-map').addEventListener('click', () => {
        const loc = locations[currentLocIndex];
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">LOCATION: ${loc.name}</div>
            <p style="color:#00ffcc;">${loc.desc}</p>
            <pre style="font-size:17px; line-height:1.3; color:#ffff00; margin-top:12px;">
AVAILABLE COMMANDS:
${loc.options}
            </pre>
            <p style="color:#ff8800; margin-top:12px;">Investigation: ${investigation}% • Stamina: ${stamina}%</p>
        `);
    });

    // STATUS
    document.getElementById('btn-bio-link').addEventListener('click', () => {
        const loc = locations[currentLocIndex];
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">DETECTIVE STATUS</div><pre style="font-size:17px; line-height:1.3; color:#00ff00;">
BADGE: ACTIVE
REPLICANT SCANNER: ONLINE
STAMINA: ${stamina}%
INVESTIGATION: ${investigation}%
LOCATION: ${loc.name}
CREDITS: ${credits}
            </pre>
            <p style="color:#ff8800;">The city never sleeps. Neither do you.</p>
        `);
    });

    // CLUES
    document.getElementById('btn-data-chip').addEventListener('click', () => {
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">COLLECTED CLUES</div><pre style="font-size:16px; color:#00ccff;">
1. HOLO-PHOTO → replicant eye pattern
2. DATA SHARD → undercity coordinates
3. TERMINAL LOG → victim was ex-corporate
4. INFORMANT TIP → Tyrell prototype active
            </pre>
        `);
    });

    // PDA — shows contacts + bank details AND advances the case (contacting a lead)
    document.getElementById('btn-action').addEventListener('click', () => {
        investigation = Math.min(100, investigation + Math.floor(Math.random() * 19) + 11);
        stamina = Math.max(35, stamina - (Math.random() * 8 + 4));
        storyStage = Math.min(storyStage + 1, storyMessages.length - 1);

        let html = `
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">PDA v1.0 [DETECTIVE LINK]</div>
            <pre style="font-size:17px; line-height:1.3; color:#00ff00;">
CONTACTS:
• JAX — street informant
• VENDOR K — undercity fixer
• DR. ELDON — black-market surgeon

BANK ACCOUNT:
NAME: DETECTIVE UNIT-9
LICENSE: #394872
BALANCE: ${credits} CR
            </pre>
            <p style="color:#ffff00; margin-top:8px;">CONTACTING LEAD...</p>
            <p>Investigation: <span style="color:#00ff00;">${investigation}%</span></p>
            <p>Stamina: <span style="color:#ff8800;">${Math.floor(stamina)}%</span></p>
            <p style="margin-top:12px;">${storyMessages[storyStage]}</p>
        `;

        if (investigation >= 100) {
            html += `<p style="color:#ffff00; font-size:22px; text-align:center; margin-top:20px;">
                    CASE SOLVED!<br>
                    THE TRUTH IS IN THE NEON.
                </p>`;
            setTimeout(() => alert("🎉 CASE CLOSED 🎉\n\nYou tracked the last replicant through the rain-soaked streets.\n\nThe city owes you another night."), 600);
        } else if (stamina <= 45) {
            html += `<p style="color:#ff0000; font-size:18px; text-align:center; margin-top:10px;">STAMINA CRITICAL — FIND A SAFEHOUSE SOON</p>`;
        }

        updateWindow(html);
    });

    // INVENTORY — shows player's inventory
    document.getElementById('btn-inventory').addEventListener('click', () => {
        const items = inventory.length ? inventory.join('\n• ') : "EMPTY";
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">INVENTORY</div><pre style="font-size:17px; line-height:1.3; color:#00ffcc;">
• ${items}
            </pre>
            <p style="color:#ff8800; margin-top:12px;">Use items with MAIN commands in different locations.</p>
        `);
    });

    // TRAVEL — shows places you can go to and lets you select by cycling through destinations
    document.getElementById('btn-travel').addEventListener('click', () => {
        // Cycle to next location (this is how you "select" in this button-driven interface)
        currentLocIndex = (currentLocIndex + 1) % locations.length;
        stamina = Math.max(30, stamina - (Math.random() * 6 + 4)); // travel cost

        const locList = locations.map((l, i) => 
            i === currentLocIndex ? `→ ${l.name} (CURRENT)` : `   ${l.name}`
        ).join('\n');

        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">TRAVEL — SELECT DESTINATION</div><pre style="font-size:17px; line-height:1.2; color:#00ffcc;">
${locList}
            </pre>
            <p style="color:#ffff00; margin-top:8px;">Traveling to ${locations[currentLocIndex].name}...</p>
            <p style="color:#ff8800;">Stamina: ${Math.floor(stamina)}% (travel cost applied)</p>
            <p style="color:#00ccff; margin-top:12px;">Click MAIN to see new location details.</p>
        `);
    });

    // Clicking the gameplay window returns to default status (with current location)
    windowEl.addEventListener('click', () => {
        const loc = locations[currentLocIndex];
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">
                NEON HUNTER v1.0 [1984]
            </div>
            SYSTEM STATUS: TERMINAL ONLINE<br>
            DETECTIVE UNIT ACTIVE<br>
            CASE FILE OPEN<br>
            LOCATION: ${loc.name}<br><br>
            ${loc.desc}<br><br>
            <span style="color:#ff8800;">Caution: Stamina is at ${Math.floor(stamina)}%.</span><br><br>
            <span style="color:#00ccff;">► Click any button below...</span>
        `);
    });
</script>
</body>
</html>
