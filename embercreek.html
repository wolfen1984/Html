<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EMBER CREEK · OPEN WORLD 1987</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a08;
            --panel-bg: #0d0f0d;
            --text: #33ff44;
            --text-dim: #1a7a22;
            --text-bright: #66ff77;
            --accent: #ff8833;
            --accent-dim: #aa5522;
            --border: #33ff44;
            --border-glow: 0 0 6px #33ff4466;
            --danger: #ff4444;
            --danger-glow: 0 0 6px #ff444466;
            --input-bg: #111511;
            --button-bg: #1a2a1a;
            --button-hover: #1f3520;
            --font-display: 'VT323', 'Courier New', monospace;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --scanline-opacity: 0.06;
        }
        .pda[data-theme="amber"] {
            --text: #ffb000;
            --text-dim: #aa7700;
            --text-bright: #ffcc44;
            --accent: #ff6600;
            --accent-dim: #884400;
            --border: #ffb000;
            --border-glow: 0 0 6px #ffb00066;
            --danger: #ff6644;
            --input-bg: #1a1300;
            --button-bg: #2a2000;
            --button-hover: #332800;
        }
        .pda[data-theme="pink"] {
            --text: #ff66aa;
            --text-dim: #aa3377;
            --text-bright: #ff88cc;
            --accent: #ff3388;
            --accent-dim: #882244;
            --border: #ff66aa;
            --border-glow: 0 0 6px #ff66aa66;
            --danger: #ff4466;
            --input-bg: #1a0a14;
            --button-bg: #2a1420;
            --button-hover: #331a28;
        }
        .pda[data-theme="blue"] {
            --text: #44aaff;
            --text-dim: #2266aa;
            --text-bright: #77ccff;
            --accent: #0088ff;
            --accent-dim: #004488;
            --border: #44aaff;
            --border-glow: 0 0 6px #44aaff66;
            --danger: #ff4466;
            --input-bg: #0a1020;
            --button-bg: #14202a;
            --button-hover: #1a2833;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: var(--font-display);
            padding: 12px;
            background-image: radial-gradient(ellipse at center, #0a0f0a 0%, #020302 100%);
        }
        .pda {
            max-width: 700px;
            width: 100%;
            height: 90vh;
            max-height: 850px;
            background: #0b0d0b;
            border-radius: 18px;
            border: 3px solid #2a3a2a;
            box-shadow: 0 0 30px #33ff4422, 0 0 80px #000000aa, 0 8px 32px #000000cc, inset 0 1px 0 #ffffff08, inset 0 0 60px #00000044;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 15px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.45) 100%);
            border-radius: 15px;
            pointer-events: none;
        }
        .status-bar {
            padding: 10px 16px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text);
            text-shadow: 0 0 4px var(--text-dim);
            border-bottom: 1px solid #1a2a1a;
            background: #0a0d0a;
            letter-spacing: 1px;
            z-index: 10;
            position: relative;
        }
        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: var(--text);
            border-radius: 50%;
            margin-right: 6px;
            animation: blinkDot 1.6s infinite;
            box-shadow: 0 0 6px var(--text);
        }
        @keyframes blinkDot {
            0%,
            70%,
            100% {
                opacity: 1;
            }
            80%,
            90% {
                opacity: 0.2;
            }
        }
        .title-bar {
            text-align: center;
            padding: 8px 16px 4px;
            font-family: var(--font-display);
            font-size: 28px;
            letter-spacing: 4px;
            color: var(--text);
            text-shadow: 0 0 12px var(--text), 0 0 24px var(--text-dim), 0 0 40px #33ff4433;
            background: #0a0d0a;
            border-bottom: 1px solid #1a2a1a;
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .title-bar span {
            font-size: 11px;
            letter-spacing: 2px;
            color: #1a5a1a;
            display: block;
        }
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            z-index: 5;
        }
        .sidebar {
            width: 150px;
            background: #0a0d0a;
            border-right: 1px solid #1a2a1a;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 8px;
            scrollbar-width: thin;
            scrollbar-color: #1a2a1a #0a0d0a;
        }
        .sidebar h3 {
            font-size: 16px;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .loc-btn {
            background: var(--button-bg);
            border: 1px solid #1a2a1a;
            color: var(--text);
            padding: 8px 6px;
            margin: 2px 0;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 14px;
            text-align: left;
            transition: all 0.15s;
            text-shadow: 0 0 3px var(--text-dim);
        }
        .loc-btn:hover {
            background: var(--button-hover);
            border-color: var(--text);
            box-shadow: var(--border-glow);
        }
        .loc-btn.here {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 8px var(--accent-dim);
        }
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
        }
        .game-log {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: var(--font-mono);
            font-size: 13px;
            color: #ccffcc;
            line-height: 1.5;
            scrollbar-width: thin;
            scrollbar-color: #1a2a1a #0a0d0a;
        }
        .log-entry {
            margin-bottom: 8px;
            border-bottom: 1px solid #1a2a1a;
            padding-bottom: 6px;
        }
        .log-entry.system {
            color: var(--text-dim);
        }
        .log-entry.player {
            color: var(--text-bright);
        }
        .log-entry.npc {
            color: #ccddff;
        }
        .location-desc {
            font-style: italic;
            color: #88aa88;
            margin-bottom: 8px;
            display: block;
        }
        .npcs-present {
            background: #0f140f;
            border: 1px solid #1a2a1a;
            padding: 8px;
            margin: 8px 0;
            border-radius: 6px;
            display: block;
        }
        .npc-tag {
            display: inline-block;
            margin: 2px 4px;
            cursor: pointer;
            color: var(--accent);
            text-decoration: underline;
        }
        .npc-tag.transient {
            color: #ff9944;
            font-style: italic;
        }
        .input-area {
            padding: 10px 12px;
            background: #0a0d0a;
            border-top: 1px solid #1a2a1a;
            display: flex;
            gap: 8px;
        }
        .action-input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid #1a2a1a;
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 14px;
            outline: none;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #1a3a1a;
            padding: 8px 16px;
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 16px;
            letter-spacing: 2px;
            text-align: center;
            transition: all 0.2s;
            text-shadow: 0 0 4px var(--text-dim);
            text-transform: uppercase;
            position: relative;
        }
        .btn:hover {
            background: var(--button-hover);
            border-color: var(--text);
            box-shadow: var(--border-glow);
        }
        .btn:active {
            transform: scale(0.95);
            transition: transform 0.05s;
        }
        .btn.inbox-btn {
            background: #1a2a2f;
            border-color: #2a4a5a;
            color: #77ccff;
            position: relative;
        }
        .btn.inbox-btn:hover {
            background: #1f3038;
            box-shadow: 0 0 10px #4488aa88;
        }
        .btn.inbox-btn.has-unread {
            animation: inboxPulse 1.5s infinite;
        }
        @keyframes inboxPulse {
            0%,
            100% {
                box-shadow: 0 0 4px #4488aa44;
            }
            50% {
                box-shadow: 0 0 16px #ff8833aa, 0 0 24px #ff883366;
            }
        }
        .unread-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--accent);
            color: #000;
            font-size: 10px;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            animation: badgeGlow 1s infinite;
        }
        @keyframes badgeGlow {
            0%,
            100% {
                box-shadow: 0 0 4px var(--accent);
            }
            50% {
                box-shadow: 0 0 12px var(--accent), 0 0 20px var(--accent-dim);
            }
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #0d110d;
            border-radius: 16px;
            width: 380px;
            padding: 24px;
            text-align: center;
            border: 2px solid #2a3a2a;
            box-shadow: 0 0 40px #33ff4422;
            font-family: var(--font-display);
            color: #33ff44;
            max-height: 80vh;
            overflow-y: auto;
        }
        .chat-modal-content {
            background: #0d110d;
            border-radius: 16px;
            width: 400px;
            max-width: 90vw;
            padding: 16px;
            border: 2px solid #2a3a2a;
            box-shadow: 0 0 40px #33ff4422;
            font-family: var(--font-mono);
            color: var(--text);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            font-family: var(--font-display);
            font-size: 20px;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: var(--text-bright);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            background: #0a0d0a;
            border: 1px solid #1a2a1a;
            border-radius: 8px;
            margin-bottom: 8px;
            max-height: 300px;
        }
        .chat-msg {
            margin-bottom: 8px;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .chat-msg.player {
            text-align: right;
            color: var(--text-bright);
            background: #111511;
        }
        .chat-msg.npc {
            text-align: left;
            color: #ccddff;
            background: #0f140f;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
        }
        .chat-input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid #1a2a1a;
            border-radius: 16px;
            padding: 8px 12px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 13px;
            outline: none;
        }
        .modal-btn {
            background: #1a2f1a;
            border: 2px solid #1a3a1a;
            padding: 8px 18px;
            border-radius: 6px;
            margin: 4px;
            cursor: pointer;
            color: var(--text);
            font-family: var(--font-display);
            font-size: 16px;
            transition: all 0.15s;
        }
        .modal-btn:hover {
            background: #1f3520;
            border-color: var(--text);
            box-shadow: var(--border-glow);
        }
        .modal-btn:active {
            transform: scale(0.95);
        }
        .silhouette {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #1a2a1a;
            border: 2px solid #2a3a2a;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }
        .silhouette::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 50%;
            background: #0f140f;
            border-radius: 50% 50% 0 0;
        }
        .silhouette::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 30%;
            height: 30%;
            background: #0f140f;
            border-radius: 50%;
        }
        .unread-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-left: 4px;
            animation: blinkDot 0.8s infinite;
        }
        .transient-badge {
            display: inline-block;
            font-size: 10px;
            background: #332200;
            color: #ff9944;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 4px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="pda" data-theme="default">
        <div class="crt-overlay"></div>
        <div class="status-bar"><span><span class="status-dot"></span>ONLINE</span><span id="statusTime">12:00</span><span>EMBER CREEK</span></div>
        <div class="title-bar">🌲 EMBER CREEK <span style="display:block;font-size:9px;letter-spacing:2px;color:#1a5a1a;">OPEN WORLD · 1987</span></div>
        <div class="main-layout">
            <div class="sidebar" id="sidebar"></div>
            <div class="content-area">
                <div class="game-log" id="gameLog"></div>
                <div class="input-area">
                    <input type="text" class="action-input" id="actionInput" placeholder="What do you do?">
                    <button class="btn" id="sendActionBtn">▶</button>
                    <button class="btn" id="lookBtn">👁</button>
                    <button class="btn" id="invBtn">🎒</button>
                    <button class="btn inbox-btn" id="inboxBtn">📬</button>
<button class="btn" id="gossipBtn">💬</button>
                </div>
            </div>
        </div>
    </div>

    <div id="apiModal" class="modal">
        <div class="modal-content">
            <h2>🔑 Mistral AI API Key</h2>
            <p>Get yours at <span style="color:#ff8833;">console.mistral.ai</span></p>
            <input type="password" id="apiKeyInput" placeholder="Enter your Mistral API key...">
            <button class="modal-btn" id="saveApiKeyBtn">Save</button>
            <button class="modal-btn" id="closeApiModalBtn">Cancel</button>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>
    <div id="chatModal" class="modal"><div class="chat-modal-content" id="chatModalContent"></div></div>
    <div id="inboxListModal" class="modal"><div class="modal-content" id="inboxListContent"></div></div>
<div id="gossipListModal" class="modal"><div class="modal-content" id="gossipListContent"></div></div>
<div id="gossipThreadModal" class="modal"><div class="chat-modal-content" id="gossipThreadContent"></div></div>

    <script>
        const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
        const MODEL = 'mistral-small-latest';
        let apiKey = localStorage.getItem('mistral_api_key') || '';
        let world = null;
        let currentTheme = localStorage.getItem('ember_theme') || 'default';
        let isUpdating = false;

        // ─────────────────────────────────────
        // 🎵 SOUND SYSTEM
        // ─────────────────────────────────────
        let audioCtx = null;

        function ensureAudio() {
            if (!audioCtx) {
                try { audioCtx = new(window.AudioContext || window.webkitAudioContext)(); } catch (e) { return false; }
            }
            if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
            return audioCtx.state !== 'closed';
        }

        function playClick() {
            if (!ensureAudio()) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator(),
                gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(700, t);
            osc.frequency.exponentialRampToValueAtTime(500, t + 0.06);
            gain.gain.setValueAtTime(0.08, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
            osc.start(t);
            osc.stop(t + 0.08);
        }

        function playNotification() {
            if (!ensureAudio()) return;
            const t = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator(),
                gain1 = audioCtx.createGain();
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(880, t);
            gain1.gain.setValueAtTime(0.1, t);
            gain1.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
            osc1.start(t);
            osc1.stop(t + 0.12);
            const osc2 = audioCtx.createOscillator(),
                gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(1100, t + 0.1);
            gain2.gain.setValueAtTime(0.001, t + 0.1);
            gain2.gain.linearRampToValueAtTime(0.1, t + 0.14);
            gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
            osc2.start(t + 0.1);
            osc2.stop(t + 0.28);
        }

        function playSend() {
            if (!ensureAudio()) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator(),
                gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, t);
            osc.frequency.exponentialRampToValueAtTime(900, t + 0.05);
            osc.frequency.exponentialRampToValueAtTime(400, t + 0.12);
            gain.gain.setValueAtTime(0.07, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
            osc.start(t);
            osc.stop(t + 0.14);
        }

        // ─────────────────────────────────────
        // 🚶 TRANSIENT NPC TEMPLATES
        // ─────────────────────────────────────
        const TRANSIENT_TEMPLATES = [
            { type: 'hitchhiker', names: ['Dusty', 'Rusty', 'Lone Wolf', 'Ace', 'Slim'], ages: [19, 35],
                sexes: ['Male', 'Female'],
                personalities: ['restless wanderer', 'quiet dreamer', 'talkative storyteller', 'cautious survivor',
                    'free spirit'
                ],
                bios: [
                    'Thumbing rides across the state, looking for the next adventure.',
                    'A soul on the move, carrying only a battered backpack and a head full of stories.',
                    'Left everything behind to find something real on the open road.'
                ],
                validLocations: ['Gas Station', 'Main Street', 'Motel', 'Diner'] },
            { type: 'drifter', names: ['Shade', 'Walker', 'Nomad', 'Raven', 'Sky'], ages: [22, 50],
                sexes: ['Male', 'Female'],
                personalities: ['mysterious loner', 'philosophical wanderer', 'weathered veteran', 'quiet observer',
                    'enigmatic stranger'
                ],
                bios: [
                    'No fixed address, no fixed plans. Just passing through towns like tumbleweed.',
                    'Seen too much to settle down. Every town is the same, yet every town is different.',
                    'A face you might remember but a name you never caught.'
                ],
                validLocations: ['Park', 'Lake', 'Library', 'Church'] },
            { type: 'homeless', names: ['Old Pete', 'Mama Jo', 'River', 'Patch', 'Sunny'], ages: [35, 68],
                sexes: ['Male', 'Female'],
                personalities: ['kind-hearted soul', 'gruff survivor', 'gentle spirit', 'streetwise philosopher',
                    'warm-hearted outcast'
                ],
                bios: [
                    'Life dealt a rough hand, but still finds reasons to smile. Knows every corner of Ember Creek.',
                    'Lost their home but not their dignity. Has a keen eye for the town\'s hidden truths.',
                    'Once had a regular life; now finds freedom in having nothing left to lose.'
                ],
                validLocations: ['Church', 'Park', 'Main Street', 'Library'] },
            { type: 'salesman', names: ['Chuck', 'Vince', 'Darlene', 'Mickey', 'Pat'], ages: [28, 55],
                sexes: ['Male', 'Female'], personalities: ['smooth talker', 'earnest hustler', 'tired road warrior',
                    'charismatic charmer', 'desperate dreamer'
                ],
                bios: [
                    'Traveling sales rep with a trunk full of samples and a pocket full of business cards.',
                    'On the road 300 days a year. Every diner is an office, every handshake a potential deal.',
                    'Sells hope in a briefcase. Some call it junk; others call it opportunity.'
                ],
                validLocations: ['Motel', 'Diner', 'General Store', 'Gas Station'] },
            { type: 'runaway', names: ['Kid', 'Joey', 'Sam', 'Alex', 'Casey'], ages: [15, 20], sexes: ['Male', 'Female'
                ],
                personalities: ['scared but brave', 'rebellious youth', 'quiet runaway', 'tough on the outside',
                    'lost soul'
                ],
                bios: [
                    'Too young to be alone but old enough to make bad decisions. Looking for a way forward.',
                    'Ran from something back home. Not ready to talk about it, but needs a friendly face.',
                    'A kid with a duffel bag and a story they\'re not telling. Just passing through, or so they say.'
                ],
                validLocations: ['Park', 'Library', 'Diner', 'Gas Station'] },
            { type: 'biker', names: ['Hawk', 'Spike', 'Raven', 'Torch', 'Crash'], ages: [25, 45], sexes: ['Male',
                    'Female'],
                personalities: ['gruff but fair', 'loud and proud', 'quiet power', 'road-hardened', 'surprisingly gentle'],
                bios: [

        function spawnTransientNpc() {
            if (!world.transientNpcs) world.transientNpcs = [];
            const now = getTotalGameMinutes();
            world.transientNpcs = world.transientNpcs.filter(tn => tn.departureGameMinute > now);
            if (world.transientNpcs.length >= 3) return null;
            const tpl = TRANSIENT_TEMPLATES[Math.floor(Math.random() * TRANSIENT_TEMPLATES.length)];

            const loc = tpl.validLocations[Math.floor(Math.random() * tpl.validLocations.length)];

        function cleanupTransientNpcs() {

        function getNpcById(id) {
            let found = world.npcs.find(n => n.id === id);
            if (found) return found;

        // ─────────────────────────────────────
        // 📬 PROACTIVE MESSAGING (FIXED: CHAT-HISTORY ONLY)

        function getTotalGameMinutes() {
            return world.time.day * 1440 + world.time.hour * 60 + world.time.minute;
        }

        async function checkForProactiveMessages() {
            if (!world.inbox || world.inbox.length === 0) return;
            if (!apiKey) return;
            const now = getTotalGameMinutes();
            if (!world.lastProactiveCheck) world.lastProactiveCheck = now;
            // check every ~25 game minutes
            if (now - world.lastProactiveCheck < 25) return;
            world.lastProactiveCheck = now;

            // Eligible threads: NPC has at least 1 message from each side, not in same location as player
            const eligible = world.inbox.filter(thread => {
                const npc = getNpcById(thread.npcId);
                if (!npc) return false;
                if (npc.currentLocation === world.player.location) return false;
                const playerMsgs = thread.messages.filter(m => m.sender === 'player').length;
                const npcMsgs = thread.messages.filter(m => m.sender === 'npc').length;
                return playerMsgs >= 1 && npcMsgs >= 1;
            });
            if (eligible.length === 0) return;

            // Weight by trust + affection
            const weighted = eligible.map(thread => {
                const npc = getNpcById(thread.npcId);
                const score = Math.max(1, (npc.trust || 0) + (npc.affection || 0) + 5);
                return { thread, npc, score };
            });
            const totalScore = weighted.reduce((s, w) => s + w.score, 0);
            let roll = Math.random() * totalScore;
            let selected = weighted[0];
            for (const w of weighted) {
                roll -= w.score;
                if (roll <= 0) { selected = w; break; }
            }

            const { thread, npc } = selected;
            // Cooldown: don't send if last proactive message was within 60 game minutes
            if (!thread.lastProactiveSent) thread.lastProactiveSent = 0;
            if (now - thread.lastProactiveSent < 60) return;

            try {
                // Strong system prompt that forces reference to chat history
                const systemPrompt = `You are ${npc.name}, a ${npc.isTransient ? npc.type+' passing through' : 'resident of'} Ember Creek in 1987.
        Personality: ${npc.personality}. Bio: ${npc.bio}. Age: ${npc.age}, Sex: ${npc.sex}.
        Relationship with player: Trust ${npc.trust||0}, Affection ${npc.affection||0}.

        You have previously chatted with the player. Now some time has passed and you are reaching out with a NEW message.
        CRITICAL INSTRUCTION: This message MUST be a DIRECT follow-up or reference to something you actually talked about in the previous conversation. It could be:
        - Continuing a topic that was left unfinished.
        - Asking a question that stems from your last exchange.
        - Sharing a thought or development related to what you discussed.
        - Reminding the player of something you said or promised.
        Do NOT send generic town news, random gossip about other people, or start a completely new topic unrelated to your chat history.
        Keep it concise (1-2 sentences). Output ONLY the message text, no quotes, no JSON.`;

                const history = thread.messages.slice(-10).map(m => ({
                    role: m.sender === 'player' ? 'user' : 'assistant',
                    content: m.text
                }));
                const messages = [
                    { role: "system", content: systemPrompt },
                    ...history,
                    { role: "user", content: "Write your natural follow-up message now. It must relate directly to our last conversation." }
                ];

                const reply = await mistralChat(messages, 130, false);
                const clean = reply.replace(/^["']|["']$/g, '').trim();
                if (clean && clean.length > 3) {
                    addMessageToThread(npc.id, 'npc', clean, true);
                    thread.lastProactiveSent = now;
                    saveWorld();
                    updateInboxIndicator();
                }
            } catch (e) {
                console.log('Proactive message failed:', e.message);
            }
        }

        // ─────────────────────────────────────

        const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
            "'": '&#39;', '"': '&quot;' })[m]);

        // --- Mistral Chat ---
        async function mistralChat(messages, maxTok = 400, jsonMode = true) {
            if (!apiKey) throw new Error('No API key');
            const body = {
                model: MODEL,
                messages,
                temperature: 0.9,
                max_tokens: maxTok
            };
            if (jsonMode) body.response_format = { type: "json_object" };
            const res = await fetch(MISTRAL_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                body: JSON.stringify(body)
            });
            if (!res.ok) throw new Error('API ' + res.status);
            const data = await res.json();
            let content = data.choices[0].message.content.trim();
            if (jsonMode) {
                content = content.replace(/^```json\s*/, '').replace(/```\s*$/, '').trim();
                try { return JSON.parse(content); } catch (e) {
                    console.error('JSON parse error:', content.substring(0, 200));
                    throw new Error('Invalid JSON from AI');
                }
            }
            return content;
        }

// ──────────────── GOSSIP (NPC‑TO‑NPC) ────────────────
function getGossipThread(npcIdA, npcIdB) {
    const sorted = [npcIdA, npcIdB].sort();
    let thread = world.gossipThreads.find(
        t => t.participants[0] === sorted[0] && t.participants[1] === sorted[1]
    );
    if (!thread) {
        thread = {
            id: uid(),
            participants: sorted,
            messages: []
        };
        world.gossipThreads.push(thread);
    }
    return thread;
}

function addGossipMessage(senderId, receiverId, text, triggeredByPlayer = false) {
    const thread = getGossipThread(senderId, receiverId);
    thread.messages.push({
        senderId,
        text,
        timestamp: Date.now(),
        triggeredByPlayer,
        read: false
    });
    thread.lastGameMinute = getTotalGameMinutes();   // ← add this
    saveWorld();
    updateGossipIndicator();
}

async function generateGossipReply(fromNpc, toNpc, initialMessage) {
    if (!apiKey) return;
    const systemPrompt = `You are ${toNpc.name}, a ${toNpc.isTransient ? toNpc.type+' passing through' : 'resident of'} Ember Creek in 1987.
Personality: ${toNpc.personality}. Bio: ${toNpc.bio}. Age: ${toNpc.age}, Sex: ${toNpc.sex}.

${fromNpc.name} just sent you this private message:
"${initialMessage}"

Write your natural reply. Keep it 1-3 sentences. Stay in character.
Output ONLY the reply text, no quotes, no JSON.`;

    try {
        const reply = await mistralChat([
            { role: "system", content: systemPrompt },
            { role: "user", content: "What do you say?" }
        ], 150, false);
        const clean = reply.replace(/^["']|["']$/g, '').trim();
        if (clean) {
            addGossipMessage(toNpc.id, fromNpc.id, clean, true);
        }
    } catch (e) {
        // fail silently
    }
}

async function continueGossipThreads() {
    if (!world.gossipThreads || world.gossipThreads.length === 0) return;
    if (!apiKey) return;

    const now = getTotalGameMinutes();
    for (const thread of world.gossipThreads) {
        // How long since the last message?
        const since = now - (thread.lastGameMinute || 0);
        if (since < 45) continue;                    // at least 45 game minutes must have passed
        if (Math.random() > 0.3) continue;            // 30% chance to reply

        const npcA = getNpcById(thread.participants[0]);
        const npcB = getNpcById(thread.participants[1]);
        if (!npcA || !npcB) continue;

        // Determine who speaks next: the one who did NOT send the last message
        const lastMsg = thread.messages[thread.messages.length - 1];
        const nextSpeaker = (lastMsg.senderId === npcA.id) ? npcB : npcA;
        const other = (nextSpeaker === npcA) ? npcB : npcA;

        // Build a prompt using the last 4 messages as context
        const recent = thread.messages.slice(-4).map(m => {
            const sender = m.senderId === npcA.id ? npcA.name : npcB.name;
            return `${sender}: ${m.text}`;
        }).join('\n');

        const systemPrompt = `You are ${nextSpeaker.name}, a ${nextSpeaker.isTransient ? nextSpeaker.type+' passing through' : 'resident of'} Ember Creek in 1987.
Personality: ${nextSpeaker.personality}. Bio: ${nextSpeaker.bio}. Age: ${nextSpeaker.age}, Sex: ${nextSpeaker.sex}.
You are having a private conversation with ${other.name}.

Recent messages:
${recent}

Write your next message in the conversation. Keep it 1-3 sentences. Stay in character.
Output ONLY the message text, no quotes, no JSON.`;

        try {
            const reply = await mistralChat([
                { role: "system", content: systemPrompt },
                { role: "user", content: "Continue the conversation." }
            ], 150, false);

            const clean = reply.replace(/^["']|["']$/g, '').trim();
            if (clean) {
                addGossipMessage(nextSpeaker.id, other.id, clean, false);  // not triggered by player
            }
        } catch (e) {
            // fail silently
        }

        // Small delay to respect API rate limits (optional)
        await new Promise(r => setTimeout(r, 500));
    }
}

    const mentioned = [];

    allNpcs.forEach(n => {
        // Escape special regex characters in name just in case
        const nameRegex = new RegExp('\\b' + n.name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
        if (playerMessage.match(nameRegex) && n.id !== fromNpc.id) {
            mentioned.push(n);
        }
    });
    if (mentioned.length === 0) return;  // nobody else mentioned

    // Pick the first mentioned NPC (or you could handle multiple)
    const toNpc = mentioned[0];

    // 2. Generate a short message from fromNpc to toNpc about what the player said
    const systemPrompt = `You are ${fromNpc.name}, a ${fromNpc.isTransient ? fromNpc.type+' passing through' : 'resident of'} Ember Creek in 1987.
Personality: ${fromNpc.personality}. Bio: ${fromNpc.bio}. Age: ${fromNpc.age}, Sex: ${fromNpc.sex}.
The player just told you this in private:
"${playerMessage}"

You now want to send a private message to ${toNpc.name} about this information.
Write your message (1-2 sentences, in character). Output ONLY the message text, no quotes.`;

    try {
        const messageText = await mistralChat([
            { role: "system", content: systemPrompt },
            { role: "user", content: "Write your message." }
        ], 150, false);

        const clean = messageText.replace(/^["']|["']$/g, '').trim();
        if (clean) {
            addGossipMessage(fromNpc.id, toNpc.id, clean, true);
            // Get target's reply
            await generateGossipReply(fromNpc, toNpc, clean);
        }
    } catch (e) {
        // Silently fail
    }
}
        async function sendChatMessage(npcId) {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            const npc = getNpcById(npcId);
            const thread = getThread(npcId);
            addMessageToThread(npcId, 'player', text);
            const msgDiv = document.getElementById('chatMessages');
            msgDiv.innerHTML += `<div class="chat-msg player">${esc(text)}</div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
            try {
                const systemPrompt = `You are ${npc.name}, a ${npc.isTransient?npc.type+' passing through':'resident of'} Ember Creek in 1987.
        Personality: ${npc.personality}. Bio: ${npc.bio}. Age: ${npc.age}, Sex: ${npc.sex}.
        Relationship: Trust ${npc.trust||0}, Affection ${npc.affection||0}. Stay in character. Keep replies 1-3 sentences.`;
                const history = thread.messages.slice(-10).map(m => ({ role: m.sender === 'player' ? 'user' :
                        'assistant', content: m.text }));
                const reply = await mistralChat([{ role: "system", content: systemPrompt }, ...history], 150, false);
                addMessageToThread(npcId, 'npc', reply);
                msgDiv.innerHTML += `<div class="chat-msg npc">${esc(reply)}</div>`;
                msgDiv.scrollTop = msgDiv.scrollHeight;
                saveWorld();
                updateInboxIndicator();
maybeGenerateGossip(npc, text).catch(() => {});
            } catch (e) {
                logMessage(`Chat error: ${e.message}`, 'system');
                addMessageToThread(npcId, 'npc', "*static*...");
            }
        }

        function showInboxList() {
            if (!world.inbox || world.inbox.length === 0) {
                modal(
                    `<h2>📬 Inbox</h2><p>No messages yet.</p><button class="modal-btn" onclick="playClick();window._closeModal()">Close</button>`
                    );
                return;
            }
            const sorted = [...world.inbox].sort((a, b) => {
                const aT = a.messages.length ? a.messages[a.messages.length - 1].timestamp : 0;
                const bT = b.messages.length ? b.messages[b.messages.length - 1].timestamp : 0;
                return bT - aT;
            });
            let html = `<h2>📬 Inbox</h2>`;
            sorted.forEach(t => {
                const npc = getNpcById(t.npcId);
                if (!npc) return;
                const last = t.messages[t.messages.length - 1];
                const unread = t.messages.filter(m => m.sender === 'npc' && !m.read).length;
                const tl = npc.isTransient ? ` <span class="transient-badge">${esc(npc.type)}</span>` : '';
                html += `<div style="background:#0f140f; margin:8px 0; padding:10px; border-radius:6px; cursor:pointer; border:1px solid #1a2a1a;" onclick="playClick();closeInboxAndChat('${t.npcId}')">
            <strong>${esc(npc.name)}${tl}</strong> ${unread ? `<span class="unread-dot"></span> (${unread} new)` : ''}
            <div style="font-size:12px; color:var(--text-dim); margin-top:4px;">${last ? esc(last.text.substring(0, 50))+(last.text.length>50?'...':'') : 'No messages'}</div>
            ${last && last.proactive ? '<div style="font-size:10px;color:#ff9944;">📨 Sent on their own</div>' : ''}
          </div>`;
            });
            html +=
                `<button class="modal-btn" onclick="playClick();document.getElementById('inboxListModal').style.display='none'">Close</button>`;
            document.getElementById('inboxListContent').innerHTML = html;
            document.getElementById('inboxListModal').style.display = 'flex';
            document.getElementById('inboxListModal').onclick = e => {
                if (e.target === document.getElementById('inboxListModal')) {
                    playClick();
                    document.getElementById('inboxListModal').style.display = 'none';
                }
            };
        }

function showGossipList() {
    if (!world.gossipThreads || world.gossipThreads.length === 0) {
        modal(`<h2>💬 Gossip</h2><p>No gossip yet.</p><button class="modal-btn" onclick="playClick();window._closeModal()">Close</button>`);
        return;
    }
    const sorted = [...world.gossipThreads].sort((a, b) => {
        const aT = a.messages.length ? a.messages[a.messages.length - 1].timestamp : 0;
        const bT = b.messages.length ? b.messages[b.messages.length - 1].timestamp : 0;
        return bT - aT;
    });
    let html = `<h2>💬 Gossip</h2>`;
    sorted.forEach(t => {
        const npcA = getNpcById(t.participants[0]);
        const npcB = getNpcById(t.participants[1]);
        if (!npcA || !npcB) return;
        const last = t.messages[t.messages.length - 1];
        const unread = t.messages.filter(m => !m.read).length;
        const prefix = last?.triggeredByPlayer ? '👂 You started this' : '';
        html += `<div style="background:#0f140f; margin:8px 0; padding:10px; border-radius:6px; cursor:pointer; border:1px solid #1a2a1a;"
                    onclick="playClick();closeGossipListAndOpen('${t.id}')">
            <strong>${esc(npcA.name)}</strong> ↔️ <strong>${esc(npcB.name)}</strong>
            ${unread ? `<span class="unread-dot"></span> (${unread} new)` : ''}
            <div style="font-size:12px; color:var(--text-dim); margin-top:4px;">
                ${last ? esc(last.text.substring(0, 50)) + (last.text.length > 50 ? '...' : '') : 'No messages'}
            </div>
            ${prefix ? `<div style="font-size:10px; color:#ff9944;">${prefix}</div>` : ''}
        </div>`;
    });
    html += `<button class="modal-btn" onclick="playClick();document.getElementById('gossipListModal').style.display='none'">Close</button>`;
    document.getElementById('gossipListContent').innerHTML = html;
    const gossipListModal = document.getElementById('gossipListModal');
gossipListModal.style.display = 'flex';
gossipListModal.onclick = e => { if (e.target === gossipListModal) { playClick(); gossipListModal.style.display = 'none'; } };
}

function closeGossipListAndOpen(threadId) {
    document.getElementById('gossipListModal').style.display = 'none';
    openGossipThread(threadId);
}

function openGossipThread(threadId) {
    const thread = world.gossipThreads.find(t => t.id === threadId);
    if (!thread) return;
    // Mark all as read
    thread.messages.forEach(m => m.read = true);
    saveWorld();
    updateGossipIndicator();

    const npcA = getNpcById(thread.participants[0]);
    const npcB = getNpcById(thread.participants[1]);
    const content = document.getElementById('gossipThreadContent');
    content.innerHTML = `
        <div class="chat-header">💬 ${esc(npcA.name)} ↔️ ${esc(npcB.name)}</div>
        <div class="chat-messages" id="gossipMessages">
            ${thread.messages.map(m => {
                const sender = m.senderId === thread.participants[0] ? npcA : npcB;
                return `<div class="chat-msg npc"><strong>${esc(sender.name)}:</strong> ${esc(m.text)}</div>`;
            }).join('')}
        </div>
        <button class="modal-btn" id="closeGossipThreadBtn" style="margin-top:8px;">Close</button>
    `;
    const modal = document.getElementById('gossipThreadModal');
    modal.style.display = 'flex';
    const msgDiv = document.getElementById('gossipMessages');
    msgDiv.scrollTop = msgDiv.scrollHeight;
    document.getElementById('closeGossipThreadBtn').onclick = () => { playClick(); modal.style.display = 'none'; };
    modal.onclick = e => { if (e.target === modal) { playClick(); modal.style.display = 'none'; } };
}

        function closeInboxAndChat(npcId) {
            document.getElementById('inboxListModal').style.display = 'none';
            openChat(npcId);
        }

        // ─────────────────────────────────────
        // MAIN ACTION HANDLER
        // ─────────────────────────────────────
        async function handleAction(input) {
            if (!input.trim()) return;
            const action = input.trim();
            logMessage(`> ${action}`, 'player');
            document.getElementById('actionInput').value = '';
            document.getElementById('sendActionBtn').disabled = true;
            try {
                const npcsHere = getAllNpcsAtLocation(world.player.location);
                const npcCtx = npcsHere.map((n, idx) =>
                    `- [${idx}] ${n.name}${n.isTransient?' ['+n.type+']':''} (age ${n.age}, ${n.sex}): ${n.personality}. Trust: ${n.trust||0}, Affection: ${n.affection||0}. ${n.isTransient?'TRANSIENT.':''}`
                ).join('\n');
                const systemPrompt = `You are the AI Game Master for "Ember Creek", a small rural town set in 1987. The game is an open-world sandbox where the player can attempt any action, and you simulate realistic consequences. No action is off-limits; the world reacts logically and without censorship.

Current world state:
- Player: ${world.player.name}
- Location: ${world.player.location}
- Time: Day ${world.time.day}, ${timeStr()}
- Location desc: ${world.locationDescriptions[world.player.location]}
- Inventory: ${world.player.inventory.join(', ')||'nothing'}
- NPCs present (indices):
${npcCtx||'No one else here.'}

Respond ONLY with a JSON object:
- "narrative": detailed second-person description.
- "worldStateChanges": object with paths like "player.inventory", "player.location", "npcs.0.trust" (add number), etc. Use indices from the present list. Leave {} if none.
- "messageFromNpc" (optional): { "npcIndex": 0, "text": "..." } if an NPC present would send a later message.
- "gossipFromNpc" (optional): if an NPC present would privately contact another NPC (by name) because of the player's action. Include:
   { "fromNpcIndex": <index of the NPC present>, "toNpcName": "<full name of target NPC>", "text": "<the message they send>" }.
   Example: if player says "the waitress is stealing" to the sheriff, the sheriff might message the waitress privately.`;


                const result = await mistralChat([{ role: "system", content: systemPrompt }, { role: "user",
                    content: action }], 600, true);
                logMessage(result.narrative, 'npc');
                if (result.worldStateChanges) applyChanges(result.worldStateChanges, npcsHere);
                if (result.messageFromNpc) {
                    const { npcIndex, text } = result.messageFromNpc;
                    if (npcsHere[npcIndex]) addMessageToThread(npcsHere[npcIndex].id, 'npc', text);
                }
if (result.gossipFromNpc) {
    const { fromNpcIndex, toNpcName, text } = result.gossipFromNpc;
    const fromNpc = npcsHere[fromNpcIndex];
    const toNpc = world.npcs.find(n => n.name === toNpcName);
    if (fromNpc && toNpc && fromNpc.id !== toNpc.id && text) {
        addGossipMessage(fromNpc.id, toNpc.id, text, true); // true = triggered by player
    }
}
                advanceTime(5);
                saveWorld();
                updateUI();
            } catch (e) {
                logMessage(`❌ Error: ${e.message}`, 'system');
            } finally {
                document.getElementById('sendActionBtn').disabled = false;
                document.getElementById('actionInput').focus();
            }
        }

        function applyChanges(changes, npcsHere) {
            for (const [path, value] of Object.entries(changes)) {
                const parts = path.split('.');
                let obj = world;
                for (let i = 0; i < parts.length - 1; i++) {
                    const key = parts[i];
                    if (key === 'npcs' && obj.npcs && parts[i + 1]) {
                        const idx = parseInt(parts[i + 1], 10);
                        if (npcsHere && npcsHere[idx]) {
                            const actual = npcsHere[idx];
                            if (actual.isTransient) {
                                const tIdx = world.transientNpcs.findIndex(n => n.id === actual.id);
                                if (tIdx >= 0) { obj = world.transientNpcs[tIdx];
                                    i++; } else break;
                            } else {
                                const rIdx = world.npcs.findIndex(n => n.id === actual.id);
                                if (rIdx >= 0) { obj = world.npcs[rIdx];
                                    i++; } else break;
                            }
                        } else break;
                    } else if (obj[key] !== undefined) {
                        obj = obj[key];
                    } else break;
                }
                const lastKey = parts[parts.length - 1];
                if (obj && lastKey in obj) {
                    if (typeof obj[lastKey] === 'number' && typeof value === 'number') {
                        obj[lastKey] += value;
                    } else if (Array.isArray(obj[lastKey]) && Array.isArray(value)) {
                        obj[lastKey] = value;
                    } else {
                        obj[lastKey] = value;
                    }
                }
            }
        }

        async function startNewGame() {
            document.getElementById('gameLog').innerHTML =
                '<div class="loading">🌄 Generating Ember Creek...</div>';
            try {
                const genPrompt = `Create a small American town called Ember Creek in 1987. Generate JSON with:
        - "npcs": array of 8 residents. Each: name, age (18-65), sex (Male/Female/Non-binary), bio (1 sentence), personality (3 words), homeLocation (one of: ${LOCATIONS.join(', ')}), workLocation, schedule (array of {time:"HH:00", location:"..."} for 8am-8pm).
        - "locationDescriptions": object mapping each location to a 1-sentence atmospheric description.
        Output only JSON.`;
                const townData = await mistralChat([{ role: "user", content: genPrompt }], 4000, true);
                world = {
                    player: { name: "You", location: "Your House", inventory: [] },
                    npcs: townData.npcs.map(n => ({ ...n, id: uid(), trust: 0, affection: 0,
                        currentLocation: n.homeLocation, inventory: [] })),
                    locationDescriptions: townData.locationDescriptions,
                    time: { day: 1, hour: 8, minute: 0 },
                    inbox: [],
gossipThreads: [],
                    transientNpcs: [],
                    lastProactiveCheck: 1 * 1440 + 8 * 60,
                    lastTransientSpawn: 1 * 1440 + 8 * 60,
lastGossipContinuationCheck: 1 * 1440 + 8 * 60
                };
                updateNpcLocations();
                spawnTransientNpc();
                saveWorld();
                updateUI();
                logMessage("☀️ A new day begins in Ember Creek. You wake up in your house. What do you do?", 'system');
            } catch (e) {
                document.getElementById('gameLog').innerHTML = '';
                logMessage(`Failed to create town: ${e.message}`, 'system');
            }
        }

        // ─────────────────────────────────────
        // INITIALIZATION
        // ─────────────────────────────────────
        async function init() {
            if (!apiKey) document.getElementById('apiModal').style.display = 'flex';
            document.getElementById('saveApiKeyBtn').addEventListener('click', async () => {
                playClick();
                const key = document.getElementById('apiKeyInput').value.trim();
                if (key.length > 10) {
                    apiKey = key;
                    localStorage.setItem('mistral_api_key', key);
                    document.getElementById('apiModal').style.display = 'none';
                    init();
                } else await alertModal('Invalid key');
            });
            document.getElementById('closeApiModalBtn').addEventListener('click', () => { playClick();
                document.getElementById('apiModal').style.display = 'none'; });

            if (!apiKey) return;

            const loaded = loadWorld();
            if (loaded) {
                if (!world.inbox) world.inbox = [];
                if (!world.transientNpcs) world.transientNpcs = [];
                if (!world.lastProactiveCheck) world.lastProactiveCheck = getTotalGameMinutes();
                if (!world.lastTransientSpawn) world.lastTransientSpawn = getTotalGameMinutes();
                cleanupTransientNpcs();
                updateUI();
                logMessage("🌲 Welcome back to Ember Creek.", 'system');
                updateInboxIndicator();
updateGossipIndicator();
            } else await startNewGame();

            document.getElementById('sendActionBtn').addEventListener('click', () => {
                playSend();
                handleAction(document.getElementById('actionInput').value);
            });
            document.getElementById('lookBtn').addEventListener('click', () => { playClick();
                showCurrentLocation(); });
            document.getElementById('invBtn').addEventListener('click', () => {
                playClick();
                logMessage(
                    `🎒 Inventory: ${world.player.inventory.length ? world.player.inventory.join(', ') : 'empty'}`,
                    'system');
            });
            document.getElementById('inboxBtn').addEventListener('click', () => { playClick();
                showInboxList(); });
document.getElementById('gossipBtn').addEventListener('click', () => { playClick(); showGossipList(); });
            document.getElementById('actionInput').addEventListener('keypress', e => { if (e.key === 'Enter') {
                    playSend();
                    handleAction(e.target.value); } });

            document.addEventListener('click', () => { ensureAudio(); }, { once: true });
            document.addEventListener('keypress', () => { ensureAudio(); }, { once: true });
        }

        applyTheme(currentTheme);
        init();
    </script>
