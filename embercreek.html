<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>EMBER CREEK · OPEN WORLD 1987</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a08; --panel-bg: #0d0f0d; --text: #33ff44; --text-dim: #1a7a22;
      --text-bright: #66ff77; --accent: #ff8833; --accent-dim: #aa5522;
      --border: #33ff44; --border-glow: 0 0 6px #33ff4466;
      --danger: #ff4444; --danger-glow: 0 0 6px #ff444466;
      --input-bg: #111511; --button-bg: #1a2a1a; --button-hover: #1f3520;
      --font-display: 'VT323', 'Courier New', monospace;
      --font-mono: 'Share Tech Mono', 'Courier New', monospace;
      --scanline-opacity: 0.06;
    }
    .pda[data-theme="amber"] {
      --text: #ffb000; --text-dim: #aa7700; --text-bright: #ffcc44; --accent: #ff6600; --accent-dim: #884400;
      --border: #ffb000; --border-glow: 0 0 6px #ffb00066; --danger: #ff6644;
      --input-bg: #1a1300; --button-bg: #2a2000; --button-hover: #332800;
    }
    .pda[data-theme="pink"] {
      --text: #ff66aa; --text-dim: #aa3377; --text-bright: #ff88cc; --accent: #ff3388; --accent-dim: #882244;
      --border: #ff66aa; --border-glow: 0 0 6px #ff66aa66; --danger: #ff4466;
      --input-bg: #1a0a14; --button-bg: #2a1420; --button-hover: #331a28;
    }
    .pda[data-theme="blue"] {
      --text: #44aaff; --text-dim: #2266aa; --text-bright: #77ccff; --accent: #0088ff; --accent-dim: #004488;
      --border: #44aaff; --border-glow: 0 0 6px #44aaff66; --danger: #ff4466;
      --input-bg: #0a1020; --button-bg: #14202a; --button-hover: #1a2833;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050505; display: flex; justify-content: center; align-items: center;
      min-height: 100vh; font-family: var(--font-display); padding: 12px;
      background-image: radial-gradient(ellipse at center, #0a0f0a 0%, #020302 100%);
    }
    .pda {
      max-width: 700px; width: 100%; height: 90vh; max-height: 850px;
      background: #0b0d0b; border-radius: 18px; border: 3px solid #2a3a2a;
      box-shadow: 0 0 30px #33ff4422, 0 0 80px #000000aa, 0 8px 32px #000000cc, inset 0 1px 0 #ffffff08, inset 0 0 60px #00000044;
      display: flex; flex-direction: column; overflow: hidden; position: relative;
    }
    .crt-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 900;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,var(--scanline-opacity)) 0px, rgba(0,0,0,var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
      border-radius: 15px;
    }
    .crt-overlay::after {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
      border-radius: 15px; pointer-events: none;
    }
    .status-bar {
      padding: 10px 16px 8px; display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font-mono); font-size: 11px; color: var(--text);
      text-shadow: 0 0 4px var(--text-dim); border-bottom: 1px solid #1a2a1a;
      background: #0a0d0a; letter-spacing: 1px; z-index: 10; position: relative;
    }
    .status-dot {
      display: inline-block; width: 7px; height: 7px; background: var(--text);
      border-radius: 50%; margin-right: 6px; animation: blinkDot 1.6s infinite;
      box-shadow: 0 0 6px var(--text);
    }
    @keyframes blinkDot { 0%,70%,100%{opacity:1;} 80%,90%{opacity:0.2;} }
    .title-bar {
      text-align: center; padding: 8px 16px 4px; font-family: var(--font-display);
      font-size: 28px; letter-spacing: 4px; color: var(--text);
      text-shadow: 0 0 12px var(--text), 0 0 24px var(--text-dim), 0 0 40px #33ff4433;
      background: #0a0d0a; border-bottom: 1px solid #1a2a1a; position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .title-bar span { font-size: 11px; letter-spacing: 2px; color: #1a5a1a; display: block; }
    .main-layout {
      display: flex; flex: 1; overflow: hidden; position: relative; z-index: 5;
    }
    .sidebar {
      width: 150px; background: #0a0d0a; border-right: 1px solid #1a2a1a;
      overflow-y: auto; display: flex; flex-direction: column; padding: 8px;
      scrollbar-width: thin; scrollbar-color: #1a2a1a #0a0d0a;
    }
    .sidebar h3 {
      font-size: 16px; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 6px;
      text-transform: uppercase; text-shadow: 0 0 4px var(--text-dim);
    }
    .loc-btn {
      background: var(--button-bg); border: 1px solid #1a2a1a; color: var(--text);
      padding: 8px 6px; margin: 2px 0; border-radius: 4px; cursor: pointer;
      font-family: var(--font-display); font-size: 14px; text-align: left;
      transition: all 0.15s; text-shadow: 0 0 3px var(--text-dim);
    }
    .loc-btn:hover { background: var(--button-hover); border-color: var(--text); box-shadow: var(--border-glow); }
    .loc-btn.here { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 8px var(--accent-dim); }
    .content-area {
      flex: 1; display: flex; flex-direction: column; background: var(--panel-bg);
    }
    .game-log {
      flex: 1; overflow-y: auto; padding: 12px; font-family: var(--font-mono);
      font-size: 13px; color: #ccffcc; line-height: 1.5;
      scrollbar-width: thin; scrollbar-color: #1a2a1a #0a0d0a;
    }
    .log-entry {
      margin-bottom: 8px; border-bottom: 1px solid #1a2a1a; padding-bottom: 6px;
    }
    .log-entry.system { color: var(--text-dim); }
    .log-entry.player { color: var(--text-bright); }
    .log-entry.npc { color: #ccddff; }
    .location-desc { font-style: italic; color: #88aa88; margin-bottom: 8px; display:block; }
    .npcs-present {
      background: #0f140f; border: 1px solid #1a2a1a; padding: 8px; margin: 8px 0;
      border-radius: 6px; display:block;
    }
    .npc-tag {
      display: inline-block; margin: 2px 4px; cursor: pointer; color: var(--accent);
      text-decoration: underline;
    }
    .input-area {
      padding: 10px 12px; background: #0a0d0a; border-top: 1px solid #1a2a1a;
      display: flex; gap: 8px;
    }
    .action-input {
      flex: 1; background: var(--input-bg); border: 1px solid #1a2a1a; border-radius: 20px;
      padding: 10px 16px; color: var(--text); font-family: var(--font-mono); font-size: 14px; outline: none;
    }
    .btn {
      background: var(--button-bg); border: 2px solid #1a3a1a; padding: 8px 16px; border-radius: 6px;
      color: var(--text); cursor: pointer; font-family: var(--font-display); font-size: 16px;
      letter-spacing: 2px; text-align: center; transition: all 0.2s; text-shadow: 0 0 4px var(--text-dim); text-transform: uppercase;
    }
    .btn:hover { background: var(--button-hover); border-color: var(--text); box-shadow: var(--border-glow); }
    .modal {
      display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
    }
    .modal-content {
      background: #0d110d; border-radius: 16px; width: 380px; padding: 24px; text-align: center;
      border: 2px solid #2a3a2a; box-shadow: 0 0 40px #33ff4422; font-family: var(--font-display); color: #33ff44;
      max-height: 80vh; overflow-y: auto;
    }
    .modal-content h2 { color: var(--text); letter-spacing: 2px; margin-bottom: 8px; }
    .modal-content input, .modal-content select {
      width: 100%; padding: 10px; margin: 10px 0; background: var(--input-bg);
      border: 1px solid #1a2a1a; border-radius: 8px; color: var(--text); font-family: var(--font-mono); outline: none;
    }
    .modal-btn {
      background: #1a2f1a; border: 2px solid #1a3a1a; padding: 8px 18px; border-radius: 6px;
      margin: 4px; cursor: pointer; color: var(--text); font-family: var(--font-display); font-size: 16px;
    }
    .loading {
      text-align: center; padding: 40px; font-size: 18px; color: var(--text-dim);
    }
  </style>
</head>
<body>
<div class="pda" data-theme="default">
  <div class="crt-overlay"></div>
  <div class="status-bar"><span><span class="status-dot"></span>ONLINE</span><span id="statusTime">12:00</span><span>EMBER CREEK</span></div>
  <div class="title-bar">🌲 EMBER CREEK <span style="display:block;font-size:9px;letter-spacing:2px;color:#1a5a1a;">OPEN WORLD · 1987</span></div>
  <div class="main-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content-area">
      <div class="game-log" id="gameLog"></div>
      <div class="input-area">
        <input type="text" class="action-input" id="actionInput" placeholder="What do you do?">
        <button class="btn" id="sendActionBtn">▶</button>
        <button class="btn" id="lookBtn">👁</button>
        <button class="btn" id="invBtn">🎒</button>
      </div>
    </div>
  </div>
</div>

<div id="apiModal" class="modal">
  <div class="modal-content">
    <h2>🔑 Mistral AI API Key</h2>
    <p>Get yours at <span style="color:#ff8833;">console.mistral.ai</span></p>
    <input type="password" id="apiKeyInput" placeholder="Enter your Mistral API key...">
    <button class="modal-btn" id="saveApiKeyBtn">Save</button>
    <button class="modal-btn" id="closeApiModalBtn">Cancel</button>
  </div>
</div>
<div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

<script>
  const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
  const MODEL = 'mistral-small-latest';
  let apiKey = localStorage.getItem('mistral_api_key') || '';
  let world = null;
  let currentTheme = localStorage.getItem('ember_theme') || 'default';
  let isUpdating = false;

  const LOCATIONS = [
    "Your House", "Main Street", "Diner", "General Store", "Sheriff's Office",
    "Library", "Park", "Lake", "Gas Station", "Church", "Motel", "School"
  ];

  const uid = () => Date.now().toString(36)+'-'+Math.random().toString(36).substr(2,10);
  // SAFE escape function (handles numbers, null, etc.)
  const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[m]);
  const timeStr = () => `${String(world.time.hour).padStart(2,'0')}:${String(world.time.minute).padStart(2,'0')}`;

  function saveWorld() { localStorage.setItem('ember_creek_world', JSON.stringify(world)); }
  function loadWorld() {
    const saved = localStorage.getItem('ember_creek_world');
    if (saved) { world = JSON.parse(saved); return true; }
    return false;
  }
  function applyTheme(t) { document.querySelector('.pda').setAttribute('data-theme', t); }

  function modal(html) {
    const m = document.getElementById('genericModal');
    document.getElementById('genericModalContent').innerHTML = html;
    m.style.display='flex';
    window._closeModal = () => { m.style.display='none'; };
    m.onclick = e => { if(e.target===m) window._closeModal(); };
  }
  const alertModal = msg => new Promise(r => {
    modal(`<h2>⚠️ Notice</h2><p style="margin:16px 0;color:var(--text);">${esc(msg)}</p><button class="modal-btn" id="alertOkBtn">OK</button>`, r);
    document.getElementById('alertOkBtn').onclick = () => window._closeModal();
  });

  // FIXED image generation with fetch (handles Pollinations correctly)
async function generateImage(prompt, attempt = 0) {
  const MAX_ATTEMPTS = 2;
  const TIMEOUT_MS = 60000;

  // Clean the prompt: remove trailing punctuation and extra spaces
  let cleanPrompt = prompt.trim().replace(/[.,;:!?]+$/g, '').trim();
  // Append the desired suffix only once
  cleanPrompt += ', vintage 1987 small town portrait';

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), TIMEOUT_MS);
  const seed = Date.now();
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(cleanPrompt)}?width=256&height=256&seed=${seed}&nologo=true`;

  try {
    const response = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);

    if (!response.ok) {
      console.warn(`Pollinations status ${response.status} (attempt ${attempt + 1})`);
      if (attempt < MAX_ATTEMPTS && (response.status === 429 || response.status >= 500)) {
        const delay = response.status === 429 ? 5000 : 3000;
        await new Promise(r => setTimeout(r, delay));
        return generateImage(prompt, attempt + 1); // retry with same original prompt, cleaning again
      }
      return null;
    }

    const blob = await response.blob();
    if (blob.type.startsWith('image/') && blob.size > 500) {
      return URL.createObjectURL(blob);
    }
    return null;
  } catch (err) {
    clearTimeout(timeout);
    console.warn('Fetch error:', err.message);
    if (attempt < MAX_ATTEMPTS) {
      await new Promise(r => setTimeout(r, 2000));
      return generateImage(prompt, attempt + 1);
    }
    return null;
  }
}
  async function mistralChat(messages, maxTok=400) {
    if (!apiKey) throw new Error('No API key');
    const res = await fetch(MISTRAL_ENDPOINT, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body: JSON.stringify({ model:MODEL, messages, temperature:0.9, max_tokens:maxTok, response_format:{type:"json_object"} })
    });
    if (!res.ok) throw new Error('API '+res.status);
    const data = await res.json();
    let content = data.choices[0].message.content.trim();
    content = content.replace(/^```json\s*/, '').replace(/```\s*$/, '').trim();
    try {
      return JSON.parse(content);
    } catch (parseErr) {
      console.error('Failed to parse Mistral response:', content.substring(0, 200));
      throw new Error('AI response was not valid JSON. It may have been truncated. Increase max_tokens.');
    }
  }

  function logMessage(text, type='system') {
    const log = document.getElementById('gameLog');
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    entry.textContent = text;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
  }

  function logHTML(html, type='system') {
    const log = document.getElementById('gameLog');
    const entry = document.createElement('div');
    entry.className = `log-entry ${type} html`;
    entry.innerHTML = html;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
    entry.querySelectorAll('.npc-tag').forEach(el => {
      el.addEventListener('click', () => viewNpcProfile(el.dataset.id));
    });
  }

  function updateUI() {
    if (isUpdating) return;
    isUpdating = true;
    document.getElementById('statusTime').textContent = `Day ${world.time.day} ${timeStr()}`;
    renderSidebar();
    showCurrentLocation();
    isUpdating = false;
  }

  function renderSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = `<h3>📍 LOCATIONS</h3>${LOCATIONS.map(loc =>
      `<button class="loc-btn${world.player.location===loc?' here':''}" data-loc="${loc}">${loc}</button>`
    ).join('')}<hr style="border-color:#1a2a1a;margin:10px 0;"><h3>⚙️</h3>
    <button class="loc-btn" id="saveBtn">💾 Save</button>
    <button class="loc-btn" id="newGameBtn">🔄 New Game</button>
    <button class="loc-btn" id="themeBtn">🎨 Theme</button>`;
    document.querySelectorAll('.loc-btn[data-loc]').forEach(b => b.addEventListener('click', () => moveToLocation(b.dataset.loc)));
    document.getElementById('saveBtn').addEventListener('click', () => { saveWorld(); logMessage('Game saved.', 'system'); });
    document.getElementById('newGameBtn').addEventListener('click', () => { if(confirm('Start a completely new town? All progress lost.')) startNewGame(); });
    document.getElementById('themeBtn').addEventListener('click', () => {
      const themes = ['default','amber','pink','blue']; const idx = themes.indexOf(currentTheme);
      currentTheme = themes[(idx+1)%themes.length]; applyTheme(currentTheme);
      localStorage.setItem('ember_theme', currentTheme);
    });
  }

  function showCurrentLocation() {
    const loc = world.player.location;
    const desc = world.locationDescriptions[loc] || "A nondescript place.";
    const npcsHere = world.npcs.filter(n => n.currentLocation === loc);
    let html = `<span class="location-desc">📍 ${esc(loc)}</span><div>${esc(desc)}</div>`;
    if (npcsHere.length) {
      const npcStr = npcsHere.map(n => `<span class="npc-tag" data-id="${n.id}">${esc(n.name)}</span>`).join(', ');
      html += `<div class="npcs-present">👥 Present: ${npcStr}</div>`;
    }
    logHTML(html, 'system');
  }

  function moveToLocation(loc) {
    if (world.player.location === loc) return;
    advanceTime(10);
    world.player.location = loc;
    logMessage(`🚶 You walk to ${loc}.`, 'player');
    updateNpcLocations();
    saveWorld();
    updateUI();
  }

  function advanceTime(minutes) {
    world.time.minute += minutes;
    while (world.time.minute >= 60) { world.time.minute -= 60; world.time.hour++; }
    if (world.time.hour >= 24) { world.time.hour -= 24; world.time.day++; }
    let prevHour = world.time.hour - Math.floor(minutes/60);
    if (prevHour < 0) prevHour += 24;
    if (world.time.hour !== prevHour) updateNpcLocations();
  }

  function updateNpcLocations() {
    const hourStr = `${String(world.time.hour).padStart(2,'0')}:00`;
    world.npcs.forEach(npc => {
      const schedule = npc.schedule || [];
      const entry = schedule.find(s => s.time === hourStr);
      if (entry) npc.currentLocation = entry.location;
      else npc.currentLocation = npc.homeLocation || 'Your House';
    });
  }

  function getNpcById(id) { return world.npcs.find(n => n.id === id); }

  function viewNpcProfile(id) {
    const npc = getNpcById(id); if (!npc) return;
    const html = `
      <h2>👤 ${esc(npc.name)}</h2>
      ${npc.portraitUrl ? `<img src="${esc(npc.portraitUrl)}" style="width:100px;height:100px;border-radius:50%;border:2px solid #1a3a1a;margin:10px;">` : '<div style="width:100px;height:100px;border-radius:50%;background:#0f140f;display:inline-block;line-height:100px;">?</div>'}
      <p><strong>Age:</strong> ${esc(npc.age)} | <strong>Sex:</strong> ${esc(npc.sex)}</p>
      <p><strong>Bio:</strong> ${esc(npc.bio)}</p>
      <p><strong>Personality:</strong> ${esc(npc.personality)}</p>
      <p><strong>Trust:</strong> ${npc.trust||0} | <strong>Affection:</strong> ${npc.affection||0}</p>
      <p><strong>Currently at:</strong> ${esc(npc.currentLocation)}</p>
      <button class="modal-btn" onclick="window._closeModal()">Close</button>
    `;
    modal(html);
  }

  async function handleAction(input) {
    if (!input.trim()) return;
    const action = input.trim();
    logMessage(`> ${action}`, 'player');
    document.getElementById('actionInput').value = '';
    document.getElementById('sendActionBtn').disabled = true;

    try {
      const npcsHere = world.npcs.filter(n => n.currentLocation === world.player.location);
      const npcContext = npcsHere.map((n,idx) => {
        return `- ${n.name} (age ${n.age}, ${n.sex}): ${n.personality}. Trust: ${n.trust||0}, Affection: ${n.affection||0}.`;
      }).join('\n');

      const systemPrompt = `You are the AI Game Master for "Ember Creek", a small rural town set in 1987. The game is an open-world sandbox where the player can attempt any action, and you simulate realistic consequences. No action is off-limits; the world reacts logically and without censorship.

Current world state:
- Player name: ${world.player.name}
- Location: ${world.player.location}
- Time: Day ${world.time.day}, ${timeStr()}
- Location description: ${world.locationDescriptions[world.player.location]}
- Player inventory: ${world.player.inventory.join(', ') || 'nothing'}
- NPCs present:
${npcContext || 'No one else here.'}

The player types an action. You must respond ONLY with a valid JSON object (no extra text) with the following fields:
- "narrative": A detailed, second-person description of what happens, including any dialogue. Use atmospheric, retro prose.
- "worldStateChanges": An object describing changes to the world state. Use paths like "player.inventory" (array of items, replace entirely), "player.location" (string), "npcs.0.trust" (number to add), "npcs.0.affection" (number to add), "npcs.0.currentLocation" (string), etc. Leave empty {} if nothing changes.
If an NPC gives an item, remove it from their inventory and add to player's, or vice versa. Trust and affection are numbers that increase/decrease.
Do not include any text outside the JSON.`;

      const messages = [
        { role: "system", content: systemPrompt },
        { role: "user", content: action }
      ];

      const result = await mistralChat(messages, 500);
      logMessage(result.narrative, 'npc');

      if (result.worldStateChanges) {
        applyChanges(result.worldStateChanges);
      }

      advanceTime(5);
      saveWorld();
      updateUI();
    } catch (e) {
      logMessage(`❌ Error: ${e.message}. The town seems fuzzy... try again.`, 'system');
    } finally {
      document.getElementById('sendActionBtn').disabled = false;
      document.getElementById('actionInput').focus();
    }
  }

  function applyChanges(changes) {
    for (const [path, value] of Object.entries(changes)) {
      const parts = path.split('.');
      let obj = world;
      for (let i = 0; i < parts.length - 1; i++) {
        const key = parts[i];
        if (key.startsWith('npcs.') && obj.npcs) {
          const idx = parseInt(key.replace('npcs.',''),10);
          obj = obj.npcs[idx];
        } else if (obj[key] !== undefined) {
          obj = obj[key];
        } else break;
      }
      const lastKey = parts[parts.length-1];
      if (obj && lastKey in obj) {
        if (typeof obj[lastKey] === 'number' && typeof value === 'number') {
          obj[lastKey] += value;
        } else if (Array.isArray(obj[lastKey]) && Array.isArray(value)) {
          obj[lastKey] = value;
        } else {
          obj[lastKey] = value;
        }
      }
    }
  }

  function generatePortraits(index = 0) {
  if (index >= world.npcs.length) {
    logMessage('📸 All portraits have been processed.', 'system');
    return;
  }
  const npc = world.npcs[index];
  if (npc.portraitUrl) {
    setTimeout(() => generatePortraits(index + 1), 200);
    return;
  }

  const tryGenerate = async (attempt = 0) => {
    logMessage(`🎞 Portrait for ${npc.name} (attempt ${attempt + 1})...`, 'system');
    const url = await generateImage(npc.appearancePrompt);
    if (url) {
      npc.portraitUrl = url;
      logMessage(`📷 ${npc.name} ready.`, 'system');
      saveWorld();
      // move to next NPC after 35s
      setTimeout(() => generatePortraits(index + 1), 35000);
    } else {
      if (attempt < 1) { // one immediate retry before giving up
        logMessage(`⚠️ Retrying ${npc.name} immediately...`, 'system');
        setTimeout(() => tryGenerate(attempt + 1), 2000);
      } else {
        logMessage(`❌ Failed to get portrait for ${npc.name}. Skipping.`, 'system');
        saveWorld();
        setTimeout(() => generatePortraits(index + 1), 2000);
      }
    }
  };
  tryGenerate();
}

  async function startNewGame() {
    document.getElementById('gameLog').innerHTML = '<div class="loading">🌄 Generating Ember Creek... please wait.</div>';
    try {
      const genPrompt = `Create a small American town called Ember Creek in 1987. Generate a JSON with:
- "npcs": array of 8 residents. Each: name, age (18-65), sex (Male/Female/Non-binary), bio (1 sentence), personality (3 words), appearancePrompt (short physical description for portrait), homeLocation (one of: ${LOCATIONS.join(', ')}), workLocation (one of those), schedule (array of {time:"HH:00", location:"..."} for 8am-8pm).
- "locationDescriptions": object mapping each of these locations to a 1-sentence atmospheric description: ${LOCATIONS.join(', ')}.
Output only JSON.`;

      const townData = await mistralChat([{role:"user",content:genPrompt}], 4000);
      world = {
        player: { name: "You", location: "Your House", inventory: [] },
        npcs: townData.npcs.map(n => ({
          ...n, id: uid(), trust: 0, affection: 0, currentLocation: n.homeLocation, portraitUrl: null, inventory: []
        })),
        locationDescriptions: townData.locationDescriptions,
        time: { day: 1, hour: 8, minute: 0 }
      };

      updateNpcLocations();
      saveWorld();
      updateUI();
      logMessage("☀️ A new day begins in Ember Creek. You wake up in your house. What do you do?", 'system');
      logMessage("📸 Polaroid camera warming up... portraits will appear shortly.", 'system');

      setTimeout(() => generatePortraits(0), 500);
    } catch (e) {
      document.getElementById('gameLog').innerHTML = '';
      logMessage(`Failed to create town: ${e.message}. Please check API key and try again.`, 'system');
    }
  }

  async function init() {
    if (!apiKey) {
      document.getElementById('apiModal').style.display='flex';
    }
    document.getElementById('saveApiKeyBtn').addEventListener('click', async () => {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (key.length>10) { apiKey=key; localStorage.setItem('mistral_api_key',key); document.getElementById('apiModal').style.display='none'; init(); }
      else await alertModal('Invalid key');
    });
    document.getElementById('closeApiModalBtn').addEventListener('click', () => document.getElementById('apiModal').style.display='none');

    if (!apiKey) return;
    const loaded = loadWorld();
    if (loaded) {
      updateUI();
      logMessage("🌲 Welcome back to Ember Creek.", 'system');
    } else {
      await startNewGame();
    }
    document.getElementById('sendActionBtn').addEventListener('click', () => handleAction(document.getElementById('actionInput').value));
    document.getElementById('lookBtn').addEventListener('click', () => { showCurrentLocation(); });
    document.getElementById('invBtn').addEventListener('click', () => {
      logMessage(`🎒 Inventory: ${world.player.inventory.length ? world.player.inventory.join(', ') : 'empty'}`, 'system');
    });
    document.getElementById('actionInput').addEventListener('keypress', e => { if(e.key==='Enter') handleAction(e.target.value); });
  }

  applyTheme(currentTheme);
  init();
</script>
