<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>NIGHTFALLS VHS · Horror Tape Collection · 1985</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080c;
            --screen-bg: #0c0c10;
            --panel-bg: #0e0e16;
            --text: #c8c8c8;
            --text-dim: #7a7a7a;
            --text-bright: #f0ece4;
            --accent: #ff2a4a;
            --accent-dim: #99111f;
            --border: #ff2a4a;
            --border-glow: 0 0 12px #ff003c66, 0 0 28px #ff003c22;
            --danger: #e82233;
            --danger-glow: 0 0 10px #e8223344;
            --amber: #ffaa22;
            --amber-dim: #885500;
            --green: #33cc55;
            --input-bg: #16161e;
            --button-bg: #1a1a20;
            --button-hover: #24202c;
            --button-active: #2a1018;
            --bevel-light: #2a2a35;
            --bevel-dark: #060608;
            --font-display: 'Creepster', 'Nosifer', cursive;
            --font-title: 'Nosifer', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --font-body: 'VT323', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 32px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0d0d18 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }

        .monitor-bezel {
            width: 100%;
            max-width: 520px;
            height: 100vh;
            height: 100dvh;
            max-height: 900px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2a2a2a, 0 0 0 4px #111111, 0 0 0 8px #0a0a0a, 0 8px 40px #000000cc;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (max-width: 520px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                max-height: 100dvh;
                box-shadow: none;
                background: #0a0a0a;
            }
        }

        .power-led {
            position: absolute;
            bottom: 16px;
            right: 20px;
            width: 8px;
            height: 8px;
            background: #33ff44;
            border-radius: 50%;
            box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433;
            animation: powerGlow 2s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433;
            }
            50% {
                box-shadow: 0 0 14px #33ff44aa, 0 0 24px #33ff4455;
            }
        }

        .brand-label {
            position: absolute;
            bottom: 14px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #333;
            letter-spacing: 2px;
            z-index: 20;
            text-transform: uppercase;
        }

        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 4px;
            border: 3px solid #ff2a4a;
            box-shadow: var(--border-glow), inset 0 0 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 520px) { .game-shell { border-radius: 0; border-width: 2px; } }

        .screen-curve {
            position: absolute; inset: 0; pointer-events: none; z-index: 899;
            border-radius: 2px; box-shadow: inset 0 0 60px rgba(0,0,0,0.7), inset 0 0 10px rgba(0,0,0,0.5);
        }

        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,var(--scanline-opacity)) 0px, rgba(0,0,0,var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 2px;
        }
        .crt-overlay::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%); border-radius: 2px;
        }

        .screen-flicker { animation: crtFlicker 8s ease-in-out infinite; }
        @keyframes crtFlicker { 0%,99.4%,100%{opacity:1;} 99.5%{opacity:0.6;} 99.6%{opacity:0.9;} 99.7%{opacity:0.5;} 99.8%{opacity:1;} }

        .marquee {
            position: relative; z-index: 10; background: #0c0406; border-bottom: 3px solid #ff2a4a;
            padding: 10px 16px; text-align: center; font-family: var(--font-display); letter-spacing: 2px;
            box-shadow: 0 2px 16px #00000088, inset 0 1px 0 #2a0c0c; flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #ff2a4a; border-radius: 3px; padding: 10px 14px; background: #080206;
            position: relative; box-shadow: inset 0 0 20px #ff003c11;
        }
        .marquee-inner::before {
            content: ''; position: absolute; top: -2px; left: 20px; right: 20px; height: 2px;
            background: #ff2a4a; box-shadow: 0 0 10px #c41e3a66;
        }
        .marquee-title {
            font-size: var(--text-size-title); color: #e8c5b0; text-shadow: 0 0 14px #c41e3a88, 0 2px 4px #000;
            letter-spacing: 3px; font-family: var(--font-title); line-height: 1.2;
        }
        @media (max-width: 400px) { .marquee-title { font-size: 22px; letter-spacing: 1px; } }
        .blinking-cursor {
            display: inline-block; width: 10px; height: 20px; background: #ff2a4a; margin-left: 4px;
            vertical-align: middle; animation: blink 0.7s step-end infinite; box-shadow: 0 0 6px #ff2a4a88;
        }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

        .status-strip {
            display: flex; justify-content: space-around; padding: 8px 10px; background: #08080e;
            border-bottom: 1px solid #ff2a4a66; z-index: 10; font-family: var(--font-mono);
            font-size: var(--text-size-sm); color: var(--text-dim); letter-spacing: 1px; flex-shrink: 0; flex-wrap: wrap; gap: 4px;
        }
        .status-item { display: flex; align-items: center; gap: 4px; white-space: nowrap; padding: 2px 6px; background: #0e0e16; border: 1px solid #1a1a25; border-radius: 2px; min-height: var(--touch-target); align-items: center; }
        .status-val { color: var(--text-bright); font-weight: bold; font-size: var(--text-size-base); }
        .status-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }

        .tabs-row {
            display: flex; background: #08080e; border-bottom: 2px solid #ff2a4a; z-index: 10;
            flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; gap: 0;
        }
        .tabs-row::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 1 0 auto; min-width: 60px; text-align: center; padding: 12px 8px; font-family: var(--font-body);
            font-size: 15px; color: #5a3a3a; cursor: pointer; border-bottom: 4px solid transparent; background: transparent;
            white-space: nowrap; letter-spacing: 1px; transition: all 0.15s; min-height: var(--btn-min-height);
            display: flex; align-items: center; justify-content: center; gap: 3px;
        }
        .tab-btn.active { color: #f0ddd0; border-bottom-color: #ff2a4a; text-shadow: 0 0 10px #c41e3a88; background: #0c0610; box-shadow: inset 0 -4px 12px #ff003c18; }
        .tab-btn:hover { color: #d4b8a8; background: #0a0810; }

        .game-area {
            flex: 1; overflow-y: auto; overflow-x: hidden; z-index: 5; scrollbar-width: thin;
            scrollbar-color: #2a0f15 #08080e; display: flex; flex-direction: column; padding: 4px 0;
        }
        .game-area::-webkit-scrollbar { width: 5px; } .game-area::-webkit-scrollbar-track { background: #08080e; } .game-area::-webkit-scrollbar-thumb { background: #2a0f15; border-radius: 3px; }

        .panel { display: none; flex-direction: column; padding: 10px; gap: 10px; flex: 1; }
        .panel.active { display: flex; }

        .btn {
            background: var(--button-bg); border: 2px solid #2a2a35; border-top-color: #3a3a48; border-left-color: #353540;
            border-right-color: #1a1a25; border-bottom-color: #111118; padding: 12px 18px; border-radius: 3px;
            color: var(--text); cursor: pointer; font-family: var(--font-body); font-size: var(--text-size-base);
            letter-spacing: 1px; text-transform: uppercase; transition: all 0.1s; min-height: var(--btn-min-height);
            display: inline-flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 2px 0 #00000044; white-space: nowrap;
        }
        .btn:active { border-top-color: #1a1a25; border-left-color: #1a1a25; border-bottom-color: #3a3a48; border-right-color: #353540; box-shadow: 0 0px 0 #00000044; transform: translateY(1px); background: #14141c; }
        .btn.accent { background: #180a10; border-color: #5c1525; border-top-color: #7a2035; border-left-color: #6a1a2a; border-right-color: #3a0f18; border-bottom-color: #200810; color: #e8a090; box-shadow: 0 2px 0 #00000044, 0 0 8px #c41e3a22; }
        .btn.accent:active { border-top-color: #3a0f18; border-left-color: #3a0f18; border-bottom-color: #7a2035; border-right-color: #6a1a2a; box-shadow: 0 0px 0 #00000044, 0 0 14px #c41e3a44; }
        .btn.danger { background: #180a0c; border-color: #441111; border-top-color: #5a1a1a; border-left-color: #4a1515; border-right-color: #2a0a0a; border-bottom-color: #150505; color: #ff7777; box-shadow: 0 2px 0 #00000044; }
        .btn.danger:active { border-top-color: #2a0a0a; border-left-color: #2a0a0a; border-bottom-color: #5a1a1a; border-right-color: #4a1515; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

        .movie-card {
            background: #0e0e16; border: 2px solid #1a1a25; border-radius: 4px; padding: 12px; display: flex;
            gap: 12px; align-items: flex-start; flex-shrink: 0;
        }
        .poster-thumb { width: 65px; height: 88px; border-radius: 3px; background: #0a0a14; border: 2px solid #1a1a28; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #c41e3a; }
        .poster-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .movie-info { flex: 1; min-width: 0; }
        .movie-title { font-family: var(--font-display); font-size: 17px; color: #e8c5b0; text-shadow: 0 0 6px #c41e3a22; letter-spacing: 1px; line-height: 1.2; }
        .movie-meta { font-size: 12px; color: #7a6a6a; font-family: var(--font-mono); margin-top: 2px; }
        .star-rating { color: #c41e3a; letter-spacing: 2px; font-size: 14px; }
        .movie-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; min-width: 80px; }
        .movie-actions .btn { font-size: 14px; padding: 8px 10px; min-height: 36px; }

        .empty-state { color: #4a3a3a; text-align: center; padding: 20px; font-size: var(--text-size-base); border: 1px dashed #1a1520; border-radius: 4px; margin: 8px 0; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.94); align-items: center; justify-content: center; padding: 12px; }
        .modal-content { background: #0e0e16; border-radius: 6px; width: 100%; max-width: 420px; padding: 20px; text-align: center; border: 3px solid #ff2a4a; box-shadow: var(--border-glow), 0 0 80px #000000dd; color: #d4c5b2; max-height: 85vh; overflow-y: auto; font-size: var(--text-size-base); }
        .modal-btn { background: #1a1a20; border: 2px solid #ff2a4a66; padding: 10px 18px; border-radius: 3px; margin: 5px; cursor: pointer; color: #d4c5b2; font-family: var(--font-body); font-size: var(--text-size-base); letter-spacing: 1px; min-height: var(--btn-min-height); }
        .modal-btn:active { border-color: #ff003c; box-shadow: 0 0 12px #c41e3a44; }

        .chat-log { max-height: 200px; overflow-y: auto; text-align: left; margin-bottom: 10px; border: 1px solid #1a1520; border-radius: 4px; padding: 10px; background: #0a0a12; font-size: var(--text-size-base); line-height: 1.5; }
        .chat-msg { margin: 8px 0; font-size: 16px; line-height: 1.4; }
        .chat-msg.user { color: #e8a090; } .chat-msg.assistant { color: #d4c5b2; }
        .chat-input-row { display: flex; gap: 8px; }
        .chat-input-row input { flex: 1; background: var(--input-bg); border: 2px solid #2a2a35; border-radius: 3px; padding: 10px 12px; color: var(--text); font-family: var(--font-body); font-size: var(--text-size-base); min-height: var(--btn-min-height); -webkit-user-select: text; user-select: text; }
    </style>
</head>
<body>
<div class="monitor-bezel">
    <div class="brand-label">NIGHTFALLS VHS · CRT-85</div>
    <div class="power-led"></div>
    <div class="game-shell screen-flicker">
        <div class="screen-curve"></div>
        <div class="crt-overlay"></div>
        <div class="marquee"><div class="marquee-inner"><div class="marquee-title" id="marqueeTitle">NIGHTFALLS VHS<span class="blinking-cursor"></span></div></div></div>
        <div class="status-strip">
            <span class="status-item">💰 <span class="status-val" id="statCash">$500</span></span>
            <span class="status-item">📼 <span class="status-val" id="statTapes">0</span></span>
        </div>
        <div class="tabs-row">
            <div class="tab-btn active" data-tab="collection">📼 COLLECTION</div>
            <div class="tab-btn" data-tab="collectors">📇 COLLECTORS</div>
            <div class="tab-btn" data-tab="messages">💬 MESSAGES</div>
            <div class="tab-btn" data-tab="dub">🎞️ DUB TAPE</div>
        </div>
        <div class="game-area">
            <div id="collectionPanel" class="panel active"></div>
            <div id="collectorsPanel" class="panel"></div>
            <div id="messagesPanel" class="panel"></div>
            <div id="dubPanel" class="panel"></div>
        </div>
        <div class="footer-strip" style="display:flex; justify-content:space-between; align-items:center; padding:6px 12px; background:#08080e; border-top:1px solid #ff2a4a66; z-index:10; font-family:var(--font-mono); font-size:11px; color:#444; flex-shrink:0;">
            <span id="footerMsg">📼 NIGHTFALLS VHS · COLLECT THE DARKNESS</span>
            <button id="resetApiBtn" style="background:none; border:1px solid #222; color:#555; font-size:10px; cursor:pointer; padding:4px 8px;">🔑 API KEY</button>
        </div>
    </div>
</div>
<div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

<script>
(function() {
    const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
    const MODEL = 'mistral-small-latest';
    let apiKey = localStorage.getItem('nightfalls_vhs_key') || '';

    const DEFAULT_STATE = {
        cash: 500,
        collection: [],
        npcs: [],
        messages: [],
        imageCooldownUntil: 0,
        npcGenCooldown: 0
    };
    let gameState = { ...DEFAULT_STATE };

    const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[m]);

    function saveState() { try { localStorage.setItem('nightfalls_vhs_state', JSON.stringify(gameState)); } catch(e){} }
    function loadState() {
        try {
            const saved = localStorage.getItem('nightfalls_vhs_state');
            if (saved) gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
        } catch(e){}
    }

    async function mistralChat(msgs, maxTok=500) {
        if (!apiKey) throw new Error('API key missing');
        const res = await fetch(MISTRAL_ENDPOINT, {
            method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
            body: JSON.stringify({model:MODEL, messages:msgs, temperature:0.9, max_tokens:maxTok})
        });
        if (!res.ok) throw new Error('API '+res.status);
        const data = await res.json();
        return data.choices[0].message.content.trim();
    }

    async function generateImage(prompt) {
        const now = Date.now();
        if (now < gameState.imageCooldownUntil) {
            await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
        }
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt+', vintage 80s horror VHS cover art')}?width=512&height=640&seed=${Date.now()}`;
        const img = new Image();
        const result = await new Promise(resolve => {
            let done = false;
            img.onload = ()=> { if(!done){done=true; resolve(url);} };
            img.onerror = ()=> { if(!done){done=true; resolve(null);} };
            img.src = url;
            setTimeout(()=> { if(!done){done=true; resolve(null);} }, 30000);
        });
        gameState.imageCooldownUntil = Date.now() + 30000;
        saveState();
        return result;
    }

    async function generateImageWithRetry(prompt, retries=2) {
        for (let i=0; i<retries; i++) {
            const url = await generateImage(prompt);
            if (url) return url;
            await new Promise(r => setTimeout(r, 5000));
        }
        return null;
    }

    async function generateMovie() {
        const resp = await mistralChat([{role:'user', content:'Generate a terrifying 80s cult horror movie concept as valid JSON. Fields: title, genre, tagline, synopsis, quality(1-5). JSON only.'}], 1500);
        return JSON.parse(resp.replace(/```json|```/g,'').trim());
    }

    function addToCollection(movie) {
        movie.id = 'm_'+Date.now()+'_'+Math.random().toString(36);
        movie.posterUrl = null;
        gameState.collection.push(movie);
        saveState();
    }

    function removeFromCollection(id) {
        gameState.collection = gameState.collection.filter(m => m.id !== id);
        saveState();
    }

    // Cover queue (respects cooldown)
    // ── Cover queue (recursive, like trailers – no long‑loop warning) ──
const coverQueue = [];
let coverQueueRunning = false;

function processNextCover() {
    if (coverQueue.length === 0) {
        coverQueueRunning = false;
        return;
    }
    const { tape } = coverQueue.shift();

    // Schedule the heavy work after a small delay to yield to the browser
    setTimeout(async () => {
        try {
            const url = await generateImageWithRetry(`Horror VHS cover for "${tape.title}", ${tape.genre}`);
            if (url) {
                tape.posterUrl = url;
                tape._coverPending = false;
                saveState();
                refreshAll();
            }
        } catch (e) {
            // Image generation failed; tape stays pending
        }
        // Process the next item after another tiny delay
        setTimeout(() => processNextCover(), 20);
    }, 20);
}

function requestCover(tape) {
    coverQueue.push({ tape });
    tape._coverPending = true;
    refreshAll();                 // shows the spinner immediately
    if (!coverQueueRunning) {
        coverQueueRunning = true;
        processNextCover();       // start the recursive chain
    }
}

    async function generateNPC() {
        const prompt = `Create a quirky 1980s horror VHS collector. Return JSON: name, personality (one sentence), and an array "tapes" of 2-4 horror movies they own. Each tape must have title, genre, tagline, synopsis, quality(1-5). JSON only.`;
        const resp = await mistralChat([{role:'user', content:prompt}], 800);
        const data = JSON.parse(resp.replace(/```json|```/g,'').trim());
        const npc = {
            id: 'npc_'+Date.now()+'_'+Math.random().toString(36),
            name: data.name,
            personality: data.personality,
            tapes: (data.tapes||[]).map(t => ({...t, id:'t_'+Date.now()+'_'+Math.random().toString(36), posterUrl:null}))
        };
        gameState.npcs.push(npc);
        saveState();
        return npc;
    }

    function addMessage(msg) {
        msg.id = 'msg_'+Date.now();
        msg.timestamp = Date.now();
        gameState.messages.push(msg);
        saveState();
    }

    function sellTape(tape) {
        const price = tape.quality * 50;
        gameState.cash += price;
        removeFromCollection(tape.id);
        refreshAll();
        showModal(`<h2>💰 Tape Sold</h2><p>You sold "${esc(tape.title)}" for $${price}.</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
    }

    // Trade functions
    async function initiateTrade(npc, npcTape) {
        if (gameState.collection.length === 0) {
            showModal('<h2>📼 No Tapes</h2><p>You have nothing to offer.</p><button class="modal-btn" onclick="closeModal()">OK</button>');
            return;
        }
        let html = `<h2>🤝 Offer Trade to ${esc(npc.name)}</h2><p>Select one of your tapes to trade for "${esc(npcTape.title)}":</p>`;
        gameState.collection.forEach(m => {
            html += `<button class="modal-btn" style="display:block;width:100%;text-align:left;" data-player-tape="${m.id}">${esc(m.title)} (💀${m.quality})</button>`;
        });
        html += '<button class="modal-btn" onclick="closeModal()">Cancel</button>';
        showModal(html);
        document.getElementById('genericModalContent').querySelectorAll('button[data-player-tape]').forEach(btn => {
            btn.addEventListener('click', function() {
                const playerTapeId = this.dataset.playerTape;
                closeModal();
                selectPlayerTapeForTrade(npc.id, npcTape.id, playerTapeId);
            });
        });
    }

    async function selectPlayerTapeForTrade(npcId, npcTapeId, playerTapeId) {
        const npc = gameState.npcs.find(n => n.id === npcId);
        const npcTape = npc?.tapes.find(t => t.id === npcTapeId);
        const playerTape = gameState.collection.find(m => m.id === playerTapeId);
        if (!npc || !npcTape || !playerTape) return;
        const sysPrompt = `You are ${npc.name}, a VHS collector. Personality: ${npc.personality}. You own "${npcTape.title}" (quality ${npcTape.quality}). You are offered "${playerTape.title}" (quality ${playerTape.quality}) in a 1-for-1 trade. Reply with JSON: {decision:"accept"|"reject"|"counter", message:"...", counterAmount:0 (if counter)}.`;
        try {
            const resp = await mistralChat([{role:'system',content:sysPrompt},{role:'user',content:`I offer my "${playerTape.title}" for your "${npcTape.title}".`}], 300);
            const res = JSON.parse(resp.replace(/```json|```/g,'').trim());
            handleTradeDecision(npc, npcTape, playerTape, res);
        } catch(e) { showModal('<h2>Error</h2><p>Trade negotiation failed.</p><button class="modal-btn" onclick="closeModal()">OK</button>'); }
    }

    function handleTradeDecision(npc, npcTape, playerTape, decision) {
        if (decision.decision === 'accept') {
            const newTape = {...npcTape, id: playerTape.id, posterUrl: null};
            const oldTape = {...playerTape, id: npcTape.id, posterUrl: null};
            gameState.collection = gameState.collection.filter(m => m.id !== playerTape.id);
            npc.tapes = npc.tapes.filter(t => t.id !== npcTape.id);
            gameState.collection.push(newTape);
            npc.tapes.push(oldTape);
            saveState();
            refreshAll();
            showModal(`<h2>✅ Trade Accepted</h2><p>${esc(npc.name)}: "${esc(decision.message)}"</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
            requestCover(newTape);
            maybePassiveOffer(npc);
        } else if (decision.decision === 'counter' && decision.counterAmount && gameState.cash >= decision.counterAmount) {
            showModal(`<h2>💵 Counter Offer</h2><p>${esc(npc.name)} wants an extra $${decision.counterAmount} for "${esc(npcTape.title)}".</p><p>${esc(decision.message)}</p>
                <button class="modal-btn" id="acceptCounter">Pay $${decision.counterAmount}</button><button class="modal-btn" onclick="closeModal()">Decline</button>`);
            document.getElementById('acceptCounter').onclick = ()=>{
                gameState.cash -= decision.counterAmount;
                const newTape = {...npcTape, id: playerTape.id, posterUrl: null};
                const oldTape = {...playerTape, id: npcTape.id, posterUrl: null};
                gameState.collection = gameState.collection.filter(m => m.id !== playerTape.id);
                npc.tapes = npc.tapes.filter(t => t.id !== npcTape.id);
                gameState.collection.push(newTape);
                npc.tapes.push(oldTape);
                saveState();
                closeModal();
                refreshAll();
                requestCover(newTape);
                maybePassiveOffer(npc);
            };
        } else {
            showModal(`<h2>❌ Trade Rejected</h2><p>${esc(npc.name)}: "${esc(decision.message)}"</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
        }
    }

    function maybePassiveOffer(npc) {
        if (Math.random() < 0.5 && gameState.collection.length > 0) {
            const randomTape = gameState.collection[Math.floor(Math.random()*gameState.collection.length)];
            const offerPrice = randomTape.quality * 40 + Math.floor(Math.random()*50);
            addMessage({
                from: npc.name, npcId: npc.id, type: 'buy_offer', tapeId: randomTape.id,
                tapeTitle: randomTape.title, offerPrice,
                text: `Hey, I'd love to add "${randomTape.title}" to my collection. Would you sell it for $${offerPrice}?`
            });
        }
    }

    function generatePassiveOfferRandom() {
        if (gameState.npcs.length === 0 || gameState.collection.length === 0) return;
        const npc = gameState.npcs[Math.floor(Math.random()*gameState.npcs.length)];
        maybePassiveOffer(npc);
    }

    function acceptBuyOffer(msgId) {
        const msg = gameState.messages.find(m => m.id === msgId);
        if (!msg) return;
        const tape = gameState.collection.find(m => m.id === msg.tapeId);
        if (!tape) return;
        gameState.cash += msg.offerPrice;
        removeFromCollection(tape.id);
        gameState.messages = gameState.messages.filter(m => m.id !== msgId);
        saveState();
        refreshAll();
        showModal(`<h2>💰 Sold!</h2><p>You sold "${esc(tape.title)}" to ${esc(msg.from)} for $${msg.offerPrice}.</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
    }

    function declineMessage(msgId) {
        gameState.messages = gameState.messages.filter(m => m.id !== msgId);
        saveState();
        refreshAll();
    }

    // ── Audio Trailer (EXACT ORIGINAL PATTERN) ──
    async function generateTrailerScript(movie) {
        const prompt = `Create a short 3-scene terrifying audio trailer for the 80s horror movie "${movie.title}". Genre: ${movie.genre}. Tagline: "${movie.tagline}". Synopsis: ${movie.synopsis}. Return a JSON array of 3 objects, each with "narration" and "imagePrompt". JSON only.`;
        const resp = await mistralChat([{role:'user', content:prompt}], 500);
        return JSON.parse(resp.replace(/```json|```/g,'').trim());
    }

    function playAudioTrailer(movie) {
        speechSynthesis.cancel();
        if (movie.trailerScript && movie.trailerImages && movie.trailerImages.length >= movie.trailerScript.length) {
            startAudioTrailerPlayback(movie);
            return;
        }
        const modalContent = document.getElementById('genericModalContent');
        modalContent.innerHTML = `
            <div class="please-stand-by" style="text-align:center; padding:20px;">
                <div style="font-family:'VT323'; font-size:24px; color:#c41e3a; letter-spacing:4px;">SIGNAL INTERRUPTED</div>
                <div class="test-pattern-bars" style="display:flex; height:50px; margin:16px 0; border-radius:3px; overflow:hidden; opacity:0.75;">
                    <span style="flex:1; background:#bbb;"></span><span style="flex:1; background:#cc4;"></span><span style="flex:1; background:#4aa;"></span>
                    <span style="flex:1; background:#4a4;"></span><span style="flex:1; background:#a4a;"></span><span style="flex:1; background:#a33;"></span><span style="flex:1; background:#228;"></span>
                </div>
                <div class="hype-bar" style="width:80%; margin: 0 auto;">
                    <div class="hype-fill" id="trailerLoadBar" style="width:0%; transition:width 0.3s;"></div>
                </div>
                <p id="trailerStatusText" style="color:#e8a090; font-family:'Share Tech Mono'; margin-top:12px; font-size:14px;">🎞️ DEVELOPING FOOTAGE...</p>
                <p style="color:#4a2828; font-size:11px; margin-top:8px;">DO NOT ADJUST YOUR SET</p>
            </div>`;
        document.getElementById('genericModal').style.display = 'flex';

        // Recursive image loader (original setTimeout pattern)
        function loadImagesRecursive(script, index, collected, callback) {
            if (index >= script.length) {
                callback(collected);
                return;
            }
            document.getElementById('trailerStatusText').textContent = `Developing scene ${index + 1} of ${script.length}…`;
            setTimeout(async () => {
                let url = null;
                try {
                    url = await generateImageWithRetry(script[index].imagePrompt);
                } catch (e) {}
                collected.push(url || movie.posterUrl || '');
                const loadBar = document.getElementById('trailerLoadBar');
                if (loadBar) loadBar.style.width = Math.round((collected.length / script.length) * 100) + '%';
                loadImagesRecursive(script, index + 1, collected, callback);
            }, 20);
        }

        (async () => {
            let script;
            try {
                script = await generateTrailerScript(movie);
                movie.trailerScript = script;
            } catch (e) {
                const sentences = movie.synopsis.split(/[.!?]+/).filter(s => s.trim().length > 0);
                script = [];
                for (let i = 0; i < 3; i++) {
                    script.push({
                        narration: sentences[i] ? sentences[i].trim() : "Coming soon to Nightfalls Cinema...",
                        imagePrompt: `horror scene from ${movie.title}, 80s VHS style, dark`
                    });
                }
                movie.trailerScript = script;
            }
            loadImagesRecursive(script, 0, [], (images) => {
                movie.trailerImages = images;
                saveState();
                startAudioTrailerPlayback(movie);
            });
        })();
    }

    function startAudioTrailerPlayback(movie) {
        const scenes = movie.trailerScript;
        const images = movie.trailerImages;
        let currentScene = 0;
        let isPaused = false;
        let projectorNodes = null;
        let projectorAudioCtx = null;

        const modalContent = document.getElementById('genericModalContent');
        modalContent.innerHTML = `
            <div class="trailer-theater trailer-projector-flicker" style="position:relative; background:#000; border:6px solid #ff2a4a; border-radius:3px; box-shadow:inset 0 0 120px rgba(0,0,0,0.9), 0 0 50px #c41e3a22, 0 0 0 3px #200;">
                <div class="trailer-curtain-top" style="position:absolute; top:-6px; left:-10px; right:-10px; height:55px; background:linear-gradient(180deg, #2a0808 0%, #4a1212 40%, #6b1a1a 70%, transparent 100%); z-index:5; box-shadow:0 8px 30px rgba(0,0,0,0.75);"></div>
                <div class="trailer-curtain-bottom" style="position:absolute; bottom:-6px; left:-10px; right:-10px; height:55px; background:linear-gradient(0deg, #2a0808 0%, #4a1212 40%, #6b1a1a 70%, transparent 100%); z-index:5; box-shadow:0 -8px 30px rgba(0,0,0,0.75);"></div>
                <div class="trailer-screen-vignette" style="position:absolute; top:0; left:0; right:0; bottom:0; background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.9) 100%); pointer-events:none; z-index:2;"></div>
                <div class="trailer-film-grain" style="position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:3; opacity:0.18; background-image:url('data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E'); animation:grainShift 0.15s steps(3) infinite;"></div>
                <div id="trailerImgContainer" style="position:relative; z-index:1;">
                    <img id="trailerImg" class="trailer-scene-img" src="${images[0]}" alt="" style="width:100%; max-height:50vh; object-fit:contain; display:block;">
                </div>
                <div style="position:relative; z-index:4; padding:12px; background:linear-gradient(180deg, transparent, rgba(0,0,0,0.85));">
                    <p id="trailerSub" style="color:#e8c5b0; font-size:17px; min-height:2.5em; margin:0 0 8px;"></p>
                    <div class="trailer-scene-dots" id="trailerDots" style="display:flex; justify-content:center; gap:10px; margin:8px 0;">
                        ${scenes.map((_, i) => `<span class="trailer-scene-dot ${i===0?'active':''}" style="width:12px; height:12px; border-radius:50%; background:#2a0f15; border:1px solid #3a1515; transition:all 0.3s;"></span>`).join('')}
                    </div>
                    <small style="color:#7a6a6a;">Scene <span id="trailerNum">1</span>/${scenes.length}</small>
                </div>
                <div style="text-align:center; padding:8px; position:relative; z-index:4; display:flex; gap:6px; flex-wrap:wrap; justify-content:center;">
                    <button class="btn" id="trailerPause">⏯️ Pause</button>
                    <button class="btn" id="trailerSkip">⏭ Skip</button>
                    <button class="modal-btn" id="trailerClose">✕ Close</button>
                </div>
            </div>`;
        document.getElementById('genericModal').style.display = 'flex';

        function startProjectorHum() {
            projectorAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = projectorAudioCtx.createOscillator();
            const gain = projectorAudioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 55;
            const lfo = projectorAudioCtx.createOscillator();
            const lfoGain = projectorAudioCtx.createGain();
            lfo.frequency.value = 8;
            lfoGain.gain.value = 3;
            lfo.connect(lfoGain);
            lfoGain.connect(osc.frequency);
            gain.gain.value = 0.02;
            osc.connect(gain);
            gain.connect(projectorAudioCtx.destination);
            osc.start();
            lfo.start();
            return { osc, lfo, gain };
        }

        function stopProjectorHum(nodes) {
            if (nodes) { nodes.osc.stop(); nodes.lfo.stop(); }
            if (projectorAudioCtx) { projectorAudioCtx.close(); projectorAudioCtx = null; }
        }

        projectorNodes = startProjectorHum();

        function getVoice() {
            const voices = speechSynthesis.getVoices();
            return voices.find(v => v.name.includes('Google UK English Male') || v.name.includes('Daniel') || v.lang.startsWith('en')) || voices[0];
        }

        function playScene(index) {
            if (index >= scenes.length) {
                stopProjectorHum(projectorNodes);
                showModal(`
                    <div class="trailer-end-card" style="animation:endCardReveal 0.8s ease-out forwards; background:linear-gradient(180deg, #0e0e16 0%, #0a0a12 100%); border:3px solid #ff2a4a; padding:20px; border-radius:4px; box-shadow:0 0 40px #c41e3a44;">
                        <div style="font-size:40px;">📼</div>
                        <h2 style="font-family:var(--font-display); color:#e8c5b0;">${esc(movie.title)}</h2>
                        <p style="color:#c41e3a;font-size:17px;">"${esc(movie.tagline || '')}"</p>
                        <div class="star-rating" style="font-size:24px;">${'💀'.repeat(movie.quality)}${'🦴'.repeat(5 - movie.quality)}</div>
                        <p style="color:#d4c5b2; margin-top:12px;font-size:16px;">NOW SCREAMING AT NIGHTFALLS VHS</p>
                        <button class="modal-btn" onclick="closeModal()">Close</button>
                    </div>`);
                return;
            }
            const img = document.getElementById('trailerImg');
            if (img) img.src = images[index] || '';
            const sub = document.getElementById('trailerSub');
            if (sub) sub.textContent = scenes[index].narration;
            document.querySelectorAll('.trailer-scene-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
                dot.classList.toggle('done', i < index);
            });
            document.getElementById('trailerNum').textContent = index + 1;

            if (!isPaused) {
                const utterance = new SpeechSynthesisUtterance(scenes[index].narration);
                utterance.voice = getVoice();
                utterance.rate = 0.85;
                utterance.pitch = 1.0;
                utterance.onend = () => {
                    currentScene++;
                    setTimeout(() => playScene(currentScene), 500);
                };
                speechSynthesis.speak(utterance);
            }
        }
        playScene(0);

        document.getElementById('trailerPause').onclick = () => {
            isPaused = !isPaused;
            document.getElementById('trailerPause').textContent = isPaused ? '▶️ Play' : '⏯️ Pause';
            if (isPaused) speechSynthesis.pause();
            else speechSynthesis.resume();
        };
        document.getElementById('trailerSkip').onclick = () => {
            speechSynthesis.cancel();
            stopProjectorHum(projectorNodes);
            showModal(`<h2>🔪 ${esc(movie.title)}</h2><p>Skipped.</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
        };
        document.getElementById('trailerClose').onclick = () => {
            speechSynthesis.cancel();
            stopProjectorHum(projectorNodes);
            closeModal();
        };
    }

        directorMessages.forEach(m => {
            if (m.role==='user') html += `<div class="chat-msg user"><strong>You:</strong> ${esc(m.content)}</div>`;
            else if (m.role==='assistant') html += `<div class="chat-msg assistant"><strong>Director:</strong> ${esc(m.content)}</div>`;
        });
        html += `</div><div class="chat-input-row"><input type="text" id="directorInput" placeholder="Describe your nightmare..."><button class="btn" id="directorSendBtn">Send</button></div>
        <button class="btn accent" id="finalizeScriptBtn" style="width:100%;margin-top:6px;">📝 Finalize & Fund ($200-800)</button>
        <button class="modal-btn" onclick="closeModal()">Leave</button>`;
        document.getElementById('genericModalContent').innerHTML = html;
        document.getElementById('genericModal').style.display = 'flex';
        document.getElementById('directorSendBtn').addEventListener('click', ()=>{
            const input = document.getElementById('directorInput');
            if(input.value.trim()){ sendDirectorMessage(input.value.trim()); input.value=''; }
        });
        document.getElementById('finalizeScriptBtn').addEventListener('click', finalizeDub);
    }
    async function sendDirectorMessage(text) {
        directorMessages.push({role:"user", content:text});
        renderDirectorChat();
        try {
            const reply = await mistralChat(directorMessages, 300);
            directorMessages.push({role:"assistant", content:reply});
        } catch(e) {
            directorMessages.push({role:"assistant", content:"(The director fades into static...)"});
        }
        renderDirectorChat();
    }
    async function finalizeDub() {
        const prompt = "Based on our conversation, output ONLY a valid JSON object representing the final horror VHS tape. Include: title, genre, tagline, synopsis, quality(1-5), budget(int).";
        directorMessages.push({role:"user", content:prompt});
        renderDirectorChat();
        try {
            const reply = await mistralChat(directorMessages, 500);
            const json = JSON.parse(reply.replace(/```json|```/g,'').trim());
            if (!json.title || !json.budget) throw new Error('Incomplete');
            if (gameState.cash < json.budget) {
                showModal(`<h2>💸 Not Enough Cash</h2><p>Need $${json.budget}, you have $${gameState.cash}.</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
                return;
            }
            gameState.cash -= json.budget;
            const newTape = {...json, id:'m_'+Date.now(), posterUrl:null};
            addToCollection(newTape);
            closeModal();
            refreshAll();
            requestCover(newTape);
        } catch(e) {
            directorMessages.push({role:"assistant", content:"Hmm, the tape jammed. Let's try finalizing again."});
            renderDirectorChat();
        }
    }

    function refreshAll() {
        document.getElementById('statCash').textContent = '$'+gameState.cash;
        document.getElementById('statTapes').textContent = gameState.collection.length;
        const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab || 'collection';
        switchTab(activeTab);
    }
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        const tabBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
        if (tabBtn) tabBtn.classList.add('active');
        const panel = document.getElementById(tab+'Panel');
        if (panel) panel.classList.add('active');
        if (tab==='collection') renderCollection();
        else if (tab==='collectors') renderCollectors();
        else if (tab==='messages') renderMessages();
        else if (tab==='dub') renderDub();
    }
    function showModal(html) { document.getElementById('genericModalContent').innerHTML = html; document.getElementById('genericModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('genericModal').style.display = 'none'; speechSynthesis.cancel(); }
    window.closeModal = closeModal;

    loadState();
    refreshAll();
    document.querySelectorAll('.tab-btn').forEach(t => t.addEventListener('click', ()=> switchTab(t.dataset.tab)));
    document.getElementById('resetApiBtn').addEventListener('click', ()=>{
        const key = prompt('Enter your Mistral API key:');
        if (key && key.length > 10) { apiKey = key; localStorage.setItem('nightfalls_vhs_key', key); }
    });
    if (!apiKey) setTimeout(()=> document.getElementById('resetApiBtn').click(), 500);
    setInterval(() => { if (Math.random() < 0.3) generatePassiveOfferRandom(); }, 30000);
    document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
})();
</script>
</body>
</html>
