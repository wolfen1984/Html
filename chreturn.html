<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover" />
    <title>THE RETURN · 1987 · AI SOUNDTRACK</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Special+Elite&family=Playfair+Display+SC:wght@400;700&family=Cinzel:wght@400;600&family=Oswald:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #060404;
            --screen-bg: #0a0606;
            --panel-bg: #100808;
            --text: #e8d8d8;
            --text-dim: #8a6a6a;
            --text-bright: #fff0f0;
            --accent: #f0e0e0;
            --accent-dim: #3a1a1a;
            --border: #661111;
            --border-glow: 0 0 14px #ff000044, 0 0 32px #cc000022;
            --danger: #cc3333;
            --danger-glow: 0 0 12px #ff333366;
            --amber: #ccaaaa;
            --amber-dim: #553333;
            --gold: #d0a0a0;
            --gold-dim: #603030;
            --green: #8a4a4a;
            --input-bg: #150a0a;
            --button-bg: #180808;
            --button-hover: #221010;
            --button-active: #1a0a0a;
            --bevel-light: #2a1111;
            --bevel-dark: #060202;
            --font-display: 'Cinzel', 'Playfair Display SC', serif;
            --font-title: 'Playfair Display SC', 'Cinzel', serif;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.06;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 28px;
            --btn-min-height: 46px;
            --touch-target: 44px;
            --neon-red: #ff1a1a;
            --neon-red-glow: 0 0 8px #ff0000aa, 0 0 20px #ff333366, 0 0 40px #cc000044, 0 0 60px #ff000022;
            --neon-white: #fefefe;
            --neon-white-glow: 0 0 6px #ffffff55, 0 0 16px #ffcccc33;
            --blood-red: #cc0000;
            --crimson: #990011;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #1a0808 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #1a0a0a;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2a1111, 0 0 0 4px #140808, 0 0 0 8px #0a0202, 0 8px 48px #000000dd, 0 0 60px #ff000008, 0 0 80px #ff000005;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #441111;
        }
        @media (max-width:540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #0e0404;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #ff1a1a;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff0000aa, 0 0 18px #ff333366, var(--neon-red-glow);
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #ff0000aa, 0 0 18px #ff333366;
            }
            50% {
                box-shadow: 0 0 16px #ff0000dd, 0 0 30px #ff444488;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #8a4444;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #551111;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(20, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width:540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(10, 0, 0, 0.7), inset 0 0 12px rgba(20, 0, 0, 0.45);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(255, 40, 40, var(--scanline-opacity)) 0px, rgba(255, 40, 40, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(10, 0, 0, 0.65) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.88;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #0e0404;
            border-bottom: 3px solid #881111;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #1a0808;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #992222;
            border-radius: 2px;
            padding: 10px 14px;
            background: #0a0202;
            position: relative;
            box-shadow: inset 0 0 24px #ff000010;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #cc3333;
            box-shadow: 0 0 12px #ff0000aa;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #99111144;
            box-shadow: 0 0 8px #cc000033;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #ffcccc;
            text-shadow: 0 0 16px #ff0000aa, 0 2px 4px #000, 0 0 40px #cc333355, var(--neon-red-glow);
            letter-spacing: 4px;
            font-family: var(--font-title);
            line-height: 1.2;
            text-transform: uppercase;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #cc8888;
            letter-spacing: 5px;
            margin-top: 3px;
            text-transform: uppercase;
        }
        @media (max-width:400px) {
            .marquee-title {
                font-size: 20px;
                letter-spacing: 2px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #3a1a1a #0a0606;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #0a0606;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #3a1a1a;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #441111;
            border-top-color: #552222;
            border-left-color: #4a1a1a;
            border-right-color: #330d0d;
            border-bottom-color: #1a0404;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #330d0d;
            border-left-color: #330d0d;
            border-bottom-color: #552222;
            border-right-color: #4a1a1a;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #1a0808;
        }
        .btn.accent {
            background: #1a0808;
            border-color: #881111;
            border-top-color: #aa2222;
            border-left-color: #991a1a;
            border-right-color: #660d0d;
            border-bottom-color: #330404;
            color: #ffdddd;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #ff000033;
        }
        .btn.accent:active {
            border-top-color: #660d0d;
            border-left-color: #660d0d;
            border-bottom-color: #aa2222;
            border-right-color: #991a1a;
            box-shadow: 0 0px 0 #00000044, 0 0 16px #ff000066;
        }
        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .theater-mask {
            position: relative;
            background: #100808;
            border: 2px solid #66111166;
            box-shadow: inset 0 0 36px rgba(20, 0, 0, 0.8);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0e0404;
            border: 2px solid #992222;
            padding: 15px;
            border-radius: 3px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #aa3333;
            box-shadow: 0 0 22px #ff000055, 0 0 0 2px #1a0808, var(--neon-red-glow);
            object-fit: cover;
            flex-shrink: 0;
            background: #100808;
        }
        .speech-bubble {
            flex: 1;
            background: #150a0a;
            border: 2px solid #992222;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #e8d0d0;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #99222288 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #0e0404;
            border: 1px solid #551111;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #180808;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8a5a5a;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #881111;
            box-shadow: 0 0 20px #ff000033, inset 0 0 30px rgba(20, 0, 0, 0.5);
            flex-shrink: 0;
            background: #0e0404;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(10, 2, 2, 0.85) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 13px;
            letter-spacing: 3px;
            color: #ffcccc;
            text-shadow: 0 0 10px #ff0000cc, 0 0 30px #cc333388, 0 2px 4px #000000, 0 0 60px #ff000044;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom, rgba(10, 2, 2, 0.9) 0%, rgba(10, 2, 2, 0.7) 40%, transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 15px;
            letter-spacing: 1.5px;
            color: #ffe0e0;
            text-shadow: 0 0 8px #ff000088, 0 0 20px #aa333355, 0 2px 4px #000000;
            background: linear-gradient(to top, rgba(8, 1, 1, 0.9) 0%, rgba(8, 1, 1, 0.6) 50%, transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8a5a5a;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width:480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 10px;
                letter-spacing: 2px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 12px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #881111;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #ffcccc;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 10px #ff000055;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #140808;
            border: 1px solid #772222;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #cc9999;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #e8c8c8;
        }
        .guide-desc {
            font-size: 15px;
            color: #8a5a5a;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #140808;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #aa3333;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #d8c8c8;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #1a0808;
            border: 2px solid #77222266;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #d8c8c8;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #cc4444;
            box-shadow: 0 0 14px #ff000066;
        }
        .loading-text {
            color: #cc9999;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #0a0202;
            border-top: 1px solid #55111144;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #5a2a2a;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #6a3333;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #2a1111;
            color: #6a3333;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #5a2222;
            color: #aa5555;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #ff8888;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width:480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
        .score-indicator {
            font-family: var(--font-mono);
            font-size: 10px;
            color: #cc6666;
            letter-spacing: 1px;
            padding: 3px 8px;
            border: 1px solid #441111;
            border-radius: 2px;
            display: inline-block;
            background: #0a0202;
            margin-top: 4px;
        }
        .score-indicator .active {
            color: #ffaaaa;
        }
        .score-indicator .dim {
            color: #552222;
        }
        .progress-bar {
            width: 100%;
            height: 2px;
            background: #1a0808;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #cc3333;
            border-radius: 2px;
            transition: width 0.3s;
            box-shadow: 0 0 10px #ff000066;
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">THE RETURN · CRT-87</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE<br />RETURN</div>
                    <div class="marquee-sub">⏤ 1987 · MIDNIGHT BROADCAST ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channelPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🔴 THE RETURN · YOU CAN LEAVE YOUR PAST BEHIND... BUT IT NEVER STOPS WAITING</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('the_return_key') || '';

            const DEFAULT_STATE = {
                episodes: [],
                currentPerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>📺 The Night Host</h2>
        <p style="text-align:left;">
            <strong>Station:</strong> <em>Channel 13 · Midnight Broadcast</em><br>
            <strong>Bio:</strong> Every night at midnight, the signal flickers to life across forgotten towns. A man in a worn suit sits behind a desk. He tells stories of people who came back — and the blood that followed. The broadcast reaches places that don't appear on any map. No one knows who runs the station. But everyone who's ever left a town behind... listens.
        </p>
    `;

            // ═══════════════════════════════════════
            // 🎹 80s FILM SOUNDTRACK ENGINE
            // ═══════════════════════════════════════
            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let stringAmbientActive = null;
            let crossfadeTimeout = null;
            let tapeWarbleNode = null;
            let masterCompressor = null;

            let patternPlayerActive = null;
            let patternPlayerTimeout = null;
            let patternStep = 0;
            let patternBPM = 55;
            let currentScorePattern = null;
            let fillActive = false;
            let barsInPattern = 0;
            let barsBeforeFill = 6;

            let sectionThemeScore = null;

            // ── AUDIO HELPERS ──
            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.0005;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    initTapeWarble(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.32;
                    masterCompressor = audioCtx.createDynamicsCompressor();
                    masterCompressor.threshold.value = -24;
                    masterCompressor.knee.value = 28;
                    masterCompressor.ratio.value = 10;
                    masterCompressor.attack.value = 0.004;
                    masterCompressor.release.value = 0.3;
                    reverbNode.connect(masterGain);
                    masterGain.connect(masterCompressor);
                    masterCompressor.connect(audioCtx.destination);
                    if (tapeWarbleNode) tapeWarbleNode.connect(masterGain.gain);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 0.8;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.5;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                }
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 3.5;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 1.2));
                        const lateDecay = Math.exp(-i / (sampleRate * 3.0)) * 0.25;
                        left[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                        right[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            function initTapeWarble(ctx) {
                if (tapeWarbleNode) return;
                tapeWarbleNode = ctx.createGain();
                tapeWarbleNode.gain.value = 0;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.18;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 0.01;
                const lfo2 = ctx.createOscillator();
                lfo2.type = 'sine';
                lfo2.frequency.value = 0.27;
                const lfo2Gain = ctx.createGain();
                lfo2Gain.gain.value = 0.007;
                lfo.connect(lfoGain);
                lfo2.connect(lfo2Gain);
                lfoGain.connect(tapeWarbleNode.gain);
                lfo2Gain.connect(tapeWarbleNode.gain);
                lfo.start(0);
                lfo2.start(0);
                tapeWarbleNode._lfos = [lfo, lfo2];
            }

            // ── 80s SYNTH FUNCTIONS ──
            function create80sPad(ctx, rootFreq, duration, intensity = 0.5, voiceCount = 6) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.14, now + 2.0);
                gainNode.gain.setValueAtTime(intensity * 0.14, now + duration - 2.5);
                gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1.5);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600 + intensity * 500;
                filter.Q.value = 1.5;
                const filterLfo = ctx.createOscillator();
                filterLfo.type = 'sine';
                filterLfo.frequency.value = 0.06;
                const filterLfoGain = ctx.createGain();
                filterLfoGain.gain.value = 120;
                filterLfo.connect(filterLfoGain);
                filterLfoGain.connect(filter.frequency);

                const allOscs = [];
                const detunes = [0.997, 1.0, 1.003, 1.006, 0.994, 1.008];
                for (let i = 0; i < voiceCount; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i < 3 ? 'sawtooth' : 'triangle';
                    osc.frequency.value = rootFreq * detunes[i];
                    const vibrato = ctx.createOscillator();
                    vibrato.type = 'sine';
                    vibrato.frequency.value = 3.5 + Math.random() * 4;
                    const vibratoGain = ctx.createGain();
                    vibratoGain.gain.value = 1.2 + Math.random() * 3;
                    vibrato.connect(vibratoGain);
                    vibratoGain.connect(osc.frequency);
                    allOscs.push(osc, vibrato);
                    osc.connect(filter);
                }

                filter.connect(gainNode);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.4;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.65;
                gainNode.connect(drySend);
                gainNode.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);

                allOscs.forEach(o => { o.start(now);
                    o.stop(now + duration + 2); });
                filterLfo.start(now);
                filterLfo.stop(now + duration + 2);
            }

            function create80sBass(ctx, semitone, intensity = 0.5, duration = 2.0, rootFreq = 40) {
                const now = ctx.currentTime;
                const freq = rootFreq * Math.pow(2, semitone / 12);
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.5, now + 0.06);
                gainNode.gain.setValueAtTime(intensity * 0.45, now + duration - 0.4);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.5);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq * 0.97, now);
                osc.frequency.exponentialRampToValueAtTime(freq, now + 0.12);

                const subOsc = ctx.createOscillator();
                subOsc.type = 'sine';
                subOsc.frequency.value = freq * 0.5;
                const subGain = ctx.createGain();
                subGain.gain.value = 0.18 * intensity;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(200 + semitone * 8, now);
                filter.frequency.exponentialRampToValueAtTime(100 + semitone * 4, now + duration);
                filter.Q.value = 3.0;

                osc.connect(filter);
                subOsc.connect(subGain);
                subGain.connect(filter);
                filter.connect(gainNode);

                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.5;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);

                osc.start(now);
                subOsc.start(now);
                osc.stop(now + duration + 0.6);
                subOsc.stop(now + duration + 0.6);
            }

            function create80sKick(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 1.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.18);
                const clickOsc = ctx.createOscillator();
                clickOsc.type = 'square';
                clickOsc.frequency.value = 800;
                const clickGain = ctx.createGain();
                clickGain.gain.setValueAtTime(intensity * 0.08, now);
                clickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.015);
                clickOsc.connect(clickGain);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 200;
                filter.Q.value = 1.0;
                osc.connect(filter);
                clickGain.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start(now);
                clickOsc.start(now);
                osc.stop(now + 0.35);
                clickOsc.stop(now + 0.02);
            }

            function create80sSnare(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 0.9, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
                const bufferSize = ctx.sampleRate * 0.12;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    const env = Math.exp(-i / (ctx.sampleRate * 0.04));
                    data[i] = (Math.random() * 2 - 1) * env * 0.7;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const osc = ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                const oscGain = ctx.createGain();
                oscGain.gain.value = 0.3 * intensity;
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 350;
                filter.Q.value = 0.7;
                noise.connect(filter);
                osc.connect(oscGain);
                oscGain.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);
                noise.start(now);
                osc.start(now);
                noise.stop(now + 0.15);
                osc.stop(now + 0.15);
            }

            function create80sHat(ctx, intensity = 0.3) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 0.55, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.07);
                const bufferSize = ctx.sampleRate * 0.03;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    const env = Math.exp(-i / (ctx.sampleRate * 0.012));
                    data[i] = (Math.random() * 2 - 1) * env * 0.45;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 6000;
                filter.Q.value = 0.4;
                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);
                noise.start(now);
                noise.stop(now + 0.09);
            }

            function create80sStab(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.35, now + 0.04);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
                const oscs = [];
                const freqs = [110, 165, 220, 330];
                freqs.forEach(f => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = f;
                    oscs.push(osc);
                });
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(400, now);
                filter.frequency.exponentialRampToValueAtTime(1200, now + 0.6);
                filter.frequency.exponentialRampToValueAtTime(200, now + 1.5);
                filter.Q.value = 2;
                oscs.forEach(o => o.connect(filter));
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.5;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);
                oscs.forEach(o => { o.start(now);
                    o.stop(now + 2); });
            }

            function create80sSwell(ctx, targetFreq, duration, intensity = 0.55) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0.001, now);
                gainNode.gain.exponentialRampToValueAtTime(intensity * 0.3, now + duration * 0.5);
                gainNode.gain.setValueAtTime(intensity * 0.3, now + duration * 0.65);
                gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(100, now);
                filter.frequency.exponentialRampToValueAtTime(2000, now + duration * 0.55);
                filter.Q.value = 2.5;
                const oscs = [];
                const intervals = [0, 7, 12, 19];
                intervals.forEach(interval => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = targetFreq * Math.pow(2, interval / 12);
                    osc.frequency.setValueAtTime(targetFreq * Math.pow(2, interval / 12) * 0.96, now);
                    osc.frequency.exponentialRampToValueAtTime(targetFreq * Math.pow(2, interval / 12),
                        now + duration);
                    oscs.push(osc);
                    osc.connect(filter);
                });
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.65;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);
                oscs.forEach(o => { o.start(now);
                    o.stop(now + duration + 1.5); });
            }

            function create80sArpeggio(ctx, rootFreq, pattern, intensity = 0.4, stepDuration = 0.15) {
                const now = ctx.currentTime;
                const totalDuration = pattern.length * stepDuration;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 0.2, now);
                gainNode.gain.setValueAtTime(intensity * 0.2, now + totalDuration - 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + totalDuration + 0.2);
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 800;
                filter.Q.value = 3;
                const osc = ctx.createOscillator();
                osc.type = 'square';
                osc.frequency.value = rootFreq;
                const freqSeq = pattern.map(s => rootFreq * Math.pow(2, s / 12));
                let stepIdx = 0;
                const stepInterval = setInterval(() => {
                    if (stepIdx < freqSeq.length && gainNode.gain.value > 0.001) {
                        osc.frequency.setValueAtTime(freqSeq[stepIdx], audioCtx.currentTime);
                        stepIdx++;
                    } else { clearInterval(stepInterval); }
                }, stepDuration * 1000);
                osc.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.55;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);
                osc.start(now);
                osc.stop(now + totalDuration + 0.3);
            }

            function create80sBell(ctx, frequency, intensity = 0.4) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.35, now + 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 3.5);
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sine';
                osc2.frequency.value = frequency * 2.76;
                const osc2Gain = ctx.createGain();
                osc2Gain.gain.value = 0.2;
                osc2.connect(osc2Gain);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 2;
                osc.connect(filter);
                osc2Gain.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.6;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);
                osc.start(now);
                osc2.start(now);
                osc.stop(now + 3.5);
                osc2.stop(now + 3.5);
            }

            function create80sLeadWhine(ctx, frequency, duration, intensity = 0.45) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 0.6);
                gainNode.gain.setValueAtTime(intensity * 0.2, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 0.8);
                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(frequency * 0.95, now);
                osc.frequency.exponentialRampToValueAtTime(frequency, now + 0.5);
                const vibrato = ctx.createOscillator();
                vibrato.type = 'sine';
                vibrato.frequency.value = 5.5;
                const vibratoGain = ctx.createGain();
                vibratoGain.gain.value = 8;
                vibrato.connect(vibratoGain);
                vibratoGain.connect(osc.frequency);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 900;
                filter.Q.value = 3;
                osc.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.55;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);
                osc.start(now);
                vibrato.start(now);
                osc.stop(now + duration + 1);
                vibrato.stop(now + duration + 1);
            }

            function create80sHeartbeat(ctx, intensity = 0.5) {
                create80sKick(ctx, 0.6 * intensity);
                setTimeout(() => create80sKick(ctx, 0.6 * intensity), 220);
            }

            // ── PATTERN PLAYER (AI-DRIVEN ONLY, NO FALLBACKS) ──
            function startPatternPlayer(scorePattern, bpm, rootFreq = 40) {
                stopPatternPlayer();
                if (!scorePattern || !scorePattern.bass || !scorePattern.kick) {
                    console.warn('No AI score pattern available — pattern player silent.');
                    return;
                }
                currentScorePattern = scorePattern;
                patternBPM = bpm || 55;
                patternStep = 0;
                barsInPattern = 0;
                barsBeforeFill = 5 + Math.floor(Math.random() * 5);
                fillActive = false;
                patternPlayerActive = { active: true };

                const stepDuration = 60 / patternBPM / 4;

                function playStep() {
                    if (!patternPlayerActive || !patternPlayerActive.active || !currentScorePattern) return;
                    const step = patternStep % 16;
                    const pat = currentScorePattern;
                    const isFillStep = fillActive;

                    let bassSemitone = 0;
                    if (isFillStep) {
                        bassSemitone = (step % 4 === 0) ? 0 : (step % 8 === 4 ? 7 : (step % 4 === 2 ? 5 : 0));
                    } else {
                        bassSemitone = (pat.bass && pat.bass[step]) ? pat.bass[step] : 0;
                    }
                    if (bassSemitone !== 0) {
                        const dur = isFillStep ? 0.2 : 1.6;
                        const inten = isFillStep ? 0.35 : 0.5;
                        create80sBass(audioCtx, bassSemitone, inten, dur, rootFreq);
                    }

                    let kickVal = 0;
                    if (isFillStep) kickVal = (step % 4 === 0) ? 1 : 0;
                    else kickVal = (pat.kick && pat.kick[step]) ? pat.kick[step] : 0;
                    if (kickVal === 1) create80sKick(audioCtx, isFillStep ? 0.75 : 0.6);

                    let snareVal = 0;
                    if (isFillStep) snareVal = (step % 8 === 4) ? 1 : 0;
                    else snareVal = (pat.snare && pat.snare[step]) ? pat.snare[step] : 0;
                    if (snareVal === 1) create80sSnare(audioCtx, isFillStep ? 0.7 : 0.5);

                    let hatVal = 0;
                    if (isFillStep) hatVal = (step % 2 === 0) ? 1 : 0;
                    else hatVal = (pat.hat && pat.hat[step]) ? pat.hat[step] : 0;
                    if (hatVal === 1 && Math.random() < 0.65) create80sHat(audioCtx, isFillStep ? 0.35 : 0.18);

                    patternStep++;
                    if (patternStep % 16 === 0) {
                        barsInPattern++;
                        if (barsInPattern >= barsBeforeFill && !fillActive && Math.random() < 0.5) {
                            fillActive = true;
                            const fillSteps = 8;
                            let fillCount = 0;
                            const fillInterval = setInterval(() => {
                                if (!patternPlayerActive || !patternPlayerActive.active) { clearInterval(
                                        fillInterval); return; }
                                const fStep = fillCount % 16;
                                if (fStep % 4 === 0) create80sKick(audioCtx, 0.7);
                                if (fStep % 8 === 4) create80sSnare(audioCtx, 0.65);
                                if (fStep % 2 === 0) create80sHat(audioCtx, 0.25);
                                fillCount++;
                                if (fillCount >= fillSteps) {
                                    clearInterval(fillInterval);
                                    fillActive = false;
                                    barsInPattern = 0;
                                    barsBeforeFill = 5 + Math.floor(Math.random() * 6);
                                    create80sStab(audioCtx, 0.25);
                                }
                            }, stepDuration * 1000);
                            const nextTime = stepDuration * 1000 * fillSteps;
                            setTimeout(() => {
                                if (patternPlayerActive && patternPlayerActive.active) {
                                    patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
                                }
                            }, nextTime);
                            return;
                        }
                        if (barsInPattern >= barsBeforeFill + 2) {
                            barsInPattern = 0;
                            barsBeforeFill = 5 + Math.floor(Math.random() * 5);
                        }
                    }
                    patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
                }
                patternPlayerTimeout = setTimeout(playStep, 60);
            }

            function stopPatternPlayer() {
                if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout);
                    patternPlayerTimeout = null; }
                if (patternPlayerActive) { patternPlayerActive.active = false;
                    patternPlayerActive = null; }
                patternStep = 0;
                currentScorePattern = null;
                barsInPattern = 0;
                fillActive = false;
            }

            // ── MAIN PLAY SOUND ──
            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    switch (type) {
                        case 'synth_pad':
                            create80sPad(ctx, 50 + Math.random() * 40, 14 + Math.random() * 18, intensity);
                            break;
                        case 'synth_stab':
                            create80sStab(ctx, intensity);
                            break;
                        case 'bass_pulse':
                            create80sBass(ctx, Math.floor(Math.random() * 12), intensity, 1.5 + Math.random() * 2,
                                40);
                            break;
                        case 'arp_rise': {
                            const risingPattern = [0, 4, 7, 12, 16, 19, 24];
                            create80sArpeggio(ctx, 45 + Math.random() * 30, risingPattern, intensity, 0.12 + Math
                                .random() * 0.1);
                            break;
                        }
                        case 'arp_fall': {
                            const fallingPattern = [24, 19, 16, 12, 7, 4, 0];
                            create80sArpeggio(ctx, 40 + Math.random() * 25, fallingPattern, intensity, 0.12 + Math
                                .random() * 0.1);
                            break;
                        }
                        case 'kick':
                            create80sKick(ctx, intensity);
                            break;
                        case 'snare':
                            create80sSnare(ctx, intensity);
                            break;
                        case 'hat':
                            create80sHat(ctx, intensity * 0.5);
                            break;
                        case 'bell':
                            create80sBell(ctx, 55 + Math.random() * 50, intensity);
                            break;
                        case 'swell':
                            create80sSwell(ctx, 45 + Math.random() * 45, 6 + Math.random() * 10, intensity);
                            break;
                        case 'sting':
                            create80sStab(ctx, intensity);
                            break;
                        case 'heartbeat':
                            create80sHeartbeat(ctx, intensity);
                            break;
                        case 'lead_whine':
                            create80sLeadWhine(ctx, 60 + Math.random() * 80, 4 + Math.random() * 8, intensity);
                            break;
                        case 'thump':
                            create80sKick(ctx, intensity);
                            setTimeout(() => create80sKick(ctx, intensity * 0.75), 200);
                            break;
                        default:
                            console.warn(`Unknown sound type: ${type}`);
                    }
                } catch (err) {
                    console.error(`❌ Error in playSound("${type}"):`, err);
                }
            }

            // ── AMBIENT ──
            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.18, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'night_drone' || type === 'highway_hum' || type === 'ambient_drone') {
                        const bufferSize = ctx.sampleRate * 1.5;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.35;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'night_drone' ? 180 : 450;
                        filter.Q.value = 0.35;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'night_drone' ? 65 : 90;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.12 * intensity;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 75;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) {
                    console.error(`❌ Error in playAmbient("${type}"):`, err);
                }
            }

            function stopAmbient() {
                if (ambientGain && audioCtx) {
                    const now = audioCtx.currentTime;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 500);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            // ── 80s AMBIENT THEMES (PROCEDURAL, NOT HARDCODED MUSICAL PATTERNS) ──
            const AMBIENT_80S_THEMES = {
                intro: { rootFreq: 48, detuneSpread: 10, filterBase: 140, intensity: 0.22, padType: 'warm' },
                arrival: { rootFreq: 52, detuneSpread: 12, filterBase: 160, intensity: 0.28, padType: 'warm' },
                memories: { rootFreq: 55, detuneSpread: 14, filterBase: 150, intensity: 0.32, padType: 'lush' },
                confrontation: { rootFreq: 50, detuneSpread: 16, filterBase: 120, intensity: 0.38, padType: 'tense' },
                reckoning: { rootFreq: 54, detuneSpread: 18, filterBase: 110, intensity: 0.45, padType: 'dark' },
                departure: { rootFreq: 46, detuneSpread: 8, filterBase: 160, intensity: 0.20, padType: 'warm' },
            };

            function start80sAmbient(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                const theme = AMBIENT_80S_THEMES[themeName] || AMBIENT_80S_THEMES.intro;
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(theme.intensity * 0.16, now + 1.5);

                const oscs = [];
                for (let i = 0; i < 4; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i < 2 ? 'sawtooth' : 'triangle';
                    const detune = (i - 1.5) * theme.detuneSpread;
                    osc.frequency.value = theme.rootFreq * Math.pow(2, detune / 1200);
                    oscs.push(osc);
                }
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = theme.filterBase;
                filter.Q.value = 2.2;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.07;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 70;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                oscs.forEach(o => o.connect(filter));
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.55;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);
                oscs.forEach(o => o.start(now));
                lfo.start(now);
                sectionAmbientActive = {
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.6);
                        oscs.forEach(s => { try { s.stop(ctx.currentTime + 0.8); } catch (e) {} });
                        try { lfo.stop(ctx.currentTime + 0.8); } catch (e) {}
                        sectionAmbientActive = null;
                    }
                };
                startStringLayer80s(theme);
                if (sectionThemeScore && sectionThemeScore[themeName]) {
                    const sc = sectionThemeScore[themeName];
                    startPatternPlayer(sc, sc.bpm || 55, 40);
                }
            }

            function startStringLayer80s(theme) {
                if (!audioCtx) return;
                stopStringAmbient();
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const freq = theme.rootFreq || 50;
                const intensity = theme.intensity || 0.2;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.16, now + 1.8);
                const allNodes = [];
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                filter.Q.value = 1.8;
                const padType = theme.padType || 'warm';
                const voiceCount = padType === 'dark' ? 8 : 6;
                const detunes = padType === 'dark' ?
                    [0.995, 1.0, 1.004, 1.007, 0.993, 1.009, 1.002, 0.997] :
                    [0.997, 1.0, 1.003, 1.006, 0.994, 1.008];
                for (let i = 0; i < voiceCount; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i < Math.floor(voiceCount / 2) ? 'sawtooth' : 'triangle';
                    osc.frequency.value = freq * detunes[i];
                    const vib = ctx.createOscillator();
                    vib.type = 'sine';
                    vib.frequency.value = 3 + i * 0.7;
                    const vibG = ctx.createGain();
                    vibG.gain.value = 1.5 + i * 0.4;
                    vib.connect(vibG);
                    vibG.connect(osc.frequency);
                    allNodes.push(osc, vib);
                    osc.connect(filter);
                }
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.6;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);
                allNodes.forEach(n => { n.start(now); });
                stringAmbientActive = {
                    nodes: allNodes,
                    gainNode: gainNode,
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.8);
                        allNodes.forEach(n => { try { n.stop(ctx.currentTime + 1); } catch (e) {} });
                    }
                };
            }

            function stopStringAmbient() {
                if (stringAmbientActive) {
                    stringAmbientActive.stop();
                    stringAmbientActive = null;
                }
            }

            function transitionSectionTheme(themeName, scoreData) {
                if (scoreData) sectionThemeScore = scoreData;

            function stopSectionAmbient() {

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 35000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) { const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`); }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') throw new Error('Request timed out.');
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', 1980s small town america, neon red accents, cinematic film grain, stephen king aesthetic, retro thriller poster')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) { element.textContent += text.charAt(i); if (onChar) onChar(
                            i);
                            i++; } else { clearInterval(timer);
                            resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David',
                    'Fred', 'Alex', 'Thomas', 'James'
                ];
                let voice = null;
                for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.58;
                utterance.pitch = 0.88;
                speechSynthesis.speak(utterance);
            }

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice)
                            break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.58;
                    utterance.pitch = voiceConfig.pitch || 0.88;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) { currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar); if (cueChecker)
                            cueChecker(currentChar); }
                    };
                    utterance.onend = () => { element.textContent = text; if (cueChecker) cueChecker(text
                            .length);
                        resolve(); };
                    utterance.onerror = (e) => { console.warn('TTS error:', e);
                        element.textContent = text;
                        resolve(); };
                    speechSynthesis.speak(utterance);
                });
            }
