            async function generateNewStory() {
                const system =
                    `You are the Night Host of Channel 13's "The Return" — a midnight broadcast telling brutal revenge stories set in isolated 1980s American towns. No supernatural elements. Pure human darkness.`;
                const prompt =
                    `Write a 900-1100 word brutal revenge thriller set in a small isolated American town during the 1980s. Structure: Someone returns to town after years (or decades) away. They left because of a terrible betrayal, crime, or injustice. They came back for an ordinary reason (funeral, inheritance, reunion, legal matter, selling property). But they discover the person who destroyed their life is still here — respected, comfortable, untouched. The return becomes about revenge. By sunrise, someone is dead.

        Rules:
        - NO supernatural elements whatsoever. The horror is entirely human.
        - Pick ONE reason they left: framed for a crime, served prison time, escaped abuse, betrayed by family, lost everything in a deal, left after a mysterious death, driven out by rumors, publicly humiliated, abandoned town after tragedy, disappeared after violent incident.
        - Pick ONE reason they returned: funeral, dying parent, selling family home, inheritance, class reunion, legal matter, letter that arrived, property dispute, family obligation, old promise.
        - The antagonist: the person who ruined their life, now thriving in the same town.
        - The protagonist type: burned-out ex-con, former soldier, betrayed spouse, disowned sibling, ruined business owner, framed innocent, escaped victim.
        - The ending must be brutal: the protagonist confronts the antagonist. Someone dies. The revenge may succeed but brings no peace — or the protagonist becomes worse than the person they hated.
        - Final scene: next morning, the town goes about its business. Someone notices the protagonist is gone. A local shrugs — "Guess they finally moved on." The audience knows the truth.

        Return ONLY valid JSON:
        {"title": string, "story": string (use \\n for line breaks), "closing_remark": string (a chilling final line from a townsperson)}.
        No markdown.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: prompt }
                ], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) throw new Error(
                    'Invalid story structure.');
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Retro thriller movie poster titled "${story.title}", 1980s small town america, neon red, cinematic, stephen king aesthetic, revenge thriller`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate poster:', e); }
                gameState.currentPerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            // ── SOUND CUE SHEET GENERATION (80s STYLE, AI-DRIVEN) ──
            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system = `You are a sound designer for an 80s film soundtrack — think John Carpenter, Vangelis, Tangerine Dream, Giorgio Moroder.
        Given a short story, return a JSON object with THREE keys:
        - "sections": an array of 5-6 sections dividing the story into emotional acts. Each section: "theme" (one of: intro, arrival, memories, confrontation, reckoning, departure), "start_char" (inclusive), "end_char" (exclusive). Cover the entire story from 0 to ${length}.
        - "cues": an array of sound events using ONLY these types: "synth_pad", "synth_stab", "bass_pulse", "arp_rise", "arp_fall", "kick", "snare", "hat", "bell", "swell", "sting", "heartbeat", "lead_whine". Include at least 40 cues spread evenly across the story. Use synth_pad for atmosphere, arp_rise/arp_fall for tension building, bass_pulse for weight, synth_stab for shock moments, swell for reveals, bell for poignant moments, lead_whine for emotional peaks. Use kick, snare, hat sparingly for punctuation. Each cue: "position" (char index), "type", optional "intensity" (0-1).
        - "score": an object with keys matching the theme names. Each key: "bpm" (50-80), "bass" (array of 8 integers representing semitone offsets from root 0 — use 0 for rest, 5, 7, 12 for notes), "kick" (array of 8, 1 for hit, 0 for rest), "snare" (array of 8, mostly 0s with occasional 1), "hat" (array of 8, 1 or 0). Create driving 80s patterns — more active than ambient, with pulsing bass and sparse but punchy drums.
        Return ONLY raw JSON. No markdown.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, 80s-style cues, and score patterns with driving synth bass and punchy drums.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user',
                    content: userPrompt }], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try { data = JSON.parse(cleaned); } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try { data = JSON.parse(candidate); } catch (e2) { throw new Error(
                                'Failed to parse AI soundtrack JSON even after repair.'); }
                    } else throw new Error('No JSON found in AI response.');
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                    throw new Error('Missing sections, cues, or score in AI response');
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char <
                    length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({ type: c.type, position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7 }));
                const requiredThemes = ['intro', 'arrival', 'memories', 'confrontation', 'reckoning', 'departure'];
                const score = {};
                for (const theme of requiredThemes) {
                    if (data.score[theme]) {
                        score[theme] = {
                            bpm: data.score[theme].bpm || 55,
                            bass: data.score[theme].bass || [0, 0, 7, 0, 0, 0, 7, 0],
                            kick: data.score[theme].kick || [1, 0, 0, 0, 0, 0, 0, 0],
                            snare: data.score[theme].snare || [0, 0, 0, 0, 0, 0, 0, 0],
                            hat: data.score[theme].hat || [0, 1, 0, 0, 0, 1, 0, 0]
                        };
                    }
                }
                if (Object.keys(score).length === 0) throw new Error(
                    'AI generated no valid score data — all themes missing.');
                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {
                await generateNewStory();
                if (!gameState.currentPerformance) throw new Error('Failed to generate story.');
                const soundtrack = await generateSoundCueSheet(gameState.currentPerformance.rawStoryText);
                gameState.currentPerformance.soundCues = soundtrack;
                saveState();
                await startPerformance();
            }

            // ── PERFORMANCE ──
            async function startPerformance() {
                speechSynthesis.cancel();
                if (window.chTimeout) clearTimeout(window.chTimeout);
                const storyData = gameState.currentPerformance;
                if (!storyData || !storyData.story) {
                    await generateNewStory();
                    return startPerformance();
                }
                let sectionList = null;
                let cueList = null;
                let scoreData = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) {
                        cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                    } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                        sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                        scoreData = storyData.soundCues.score;
                    }
                }
                if (!scoreData || Object.keys(scoreData).length === 0) {
                    console.warn(
                        '⚠️ No AI score data available. Pattern player will be silent. Only cues and ambient will play.'
                        );
                }
                const bubble = document.getElementById('chSpeechBubble');
                const dialogue = document.getElementById('chDialogue');
                const imageEl = document.getElementById('chSegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('chGuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#cc4444';
                bubble.style.boxShadow = '0 0 30px #ff000066, 0 0 60px #cc000044';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('chBackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('chAddEpisodeBtn');
                if (oldAdd) oldAdd.remove();
                const posterContainer = document.getElementById('chPosterContainer');
                const posterTitle = document.getElementById('chPosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    if (posterTitle) posterTitle.textContent = storyData.title || '';
                } else if (posterContainer) { posterContainer.classList.add('no-image'); }

                const intro =
                    `"Midnight. The signal finds you. Tonight on The Return — a story of someone who came back. '${storyData.title}'. You can leave your past behind... but it never stops waiting."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 45);
                await new Promise(r => setTimeout(r, 1500));

                let indicatorInterval = setInterval(() => {
                    if (patternPlayerActive && currentScorePattern) {
                        const theme = sectionThemeScore ? Object.keys(sectionThemeScore).find(k =>
                            sectionThemeScore[k] === currentScorePattern) || 'playing' : 'playing';
                        const bar = barsInPattern + 1;
                        updateScoreIndicator(theme, bar);
                    } else {
                        updateScoreIndicator('ambient', 0);
                    }
                }, 1000);

                if (sectionList && sectionList.length > 0 && scoreData) {
                    const firstTheme = sectionList[0].theme;
                    if (scoreData[firstTheme]) {
                        transitionSectionTheme(firstTheme, scoreData);
                    } else {
                        start80sAmbient(firstTheme);
                    }
                } else if (scoreData) {
                    const firstKey = Object.keys(scoreData)[0];
                    if (firstKey && scoreData[firstKey]) {
                        transitionSectionTheme(firstKey, scoreData);
                    } else {
                        start80sAmbient('intro');
                    }
                } else {
                    start80sAmbient('intro');
                }

                const storyText = storyData.rawStoryText || storyData.story;
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b.start_char) :
                        [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <=
                            idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) {
                                currentTheme = sec.theme;
                                if (scoreData && scoreData[currentTheme]) {
                                    transitionSectionTheme(currentTheme, scoreData);
                                } else {
                                    start80sAmbient(currentTheme);
                                }
                            }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) {
                                triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity);
                            }
                            cueIdx++;
                        }
                    };
                }

                dialogue.textContent = '';
                if (cueChecker) {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.58, pitch: 0.88 }, (idx) => cueChecker(
                        idx));
                } else {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.58, pitch: 0.88 });
                }
                await new Promise(r => setTimeout(r, 1200));

                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#ffcccc';
                dialogue.appendChild(closingLine);
                speakTextMale(closing);
                await typewriterEffect(closingLine, closing, 40);
                await new Promise(r => setTimeout(r, 1000));

                const curtainText = document.createElement('p');
                curtainText.textContent = '— The screen fades to black. The broadcast ends. —';
                stopSectionAmbient();
                stopPatternPlayer();
                clearInterval(indicatorInterval);
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                curtainText.style.color = '#8a5a5a';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();

                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Leave Broadcast';
                leaveBtn.addEventListener('click', () => { leaveChannel(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'chAddEpisodeBtn';
                addBtn.textContent = '➕ Add to Episodes';
                addBtn.addEventListener('click', () => { addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Added'; });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.currentPerformance;
                if (!perf) return;
                gameState.episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
                saveState();
                setTimeout(() => leaveChannel(), 600);
            }

            function leaveChannel() {
                stopAmbient();
                stopSectionAmbient();
                stopPatternPlayer();
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                renderChannel();
            }

            function init() {
                loadState();
                renderChannel();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('the_return_key', key);
                    }
                });
                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) showModal(HOST_BIO);
                });
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
                if (!apiKey) setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
            }
            init();
        })();
    </script>
</body>
