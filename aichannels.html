<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>NIGHTFALLS AM 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080c;
            --screen-bg: #0c0c10;
            --panel-bg: #0e0e16;
            --text: #c8c8c8;
            --text-dim: #7a7a7a;
            --text-bright: #f0ece4;
            --accent: #ff2a4a;
            --accent-dim: #99111f;
            --border: #ff2a4a;
            --border-glow: 0 0 12px #ff003c66, 0 0 28px #ff003c22;
            --danger: #e82233;
            --danger-glow: 0 0 10px #e8223344;
            --amber: #ffaa22;
            --amber-dim: #885500;
            --green: #33cc55;
            --input-bg: #16161e;
            --button-bg: #1a1a20;
            --button-hover: #24202c;
            --button-active: #2a1018;
            --bevel-light: #2a2a35;
            --bevel-dark: #060608;
            --font-display: 'Creepster', 'Nosifer', cursive;
            --font-title: 'Nosifer', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --font-body: 'VT323', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 32px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0d0d18 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }

        .monitor-bezel {
            width: 100%;
            max-width: 520px;
            height: 100vh;
            height: 100dvh;
            max-height: 900px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2a2a2a, 0 0 0 4px #111111, 0 0 0 8px #0a0a0a, 0 8px 40px #000000cc;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (max-width: 520px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                max-height: 100dvh;
                box-shadow: none;
                background: #0a0a0a;
            }
        }

        .power-led {
            position: absolute;
            bottom: 16px;
            right: 20px;
            width: 8px;
            height: 8px;
            background: #33ff44;
            border-radius: 50%;
            box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433;
            animation: powerGlow 2s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%, 100% { box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433; }
            50% { box-shadow: 0 0 14px #33ff44aa, 0 0 24px #33ff4455; }
        }

        .brand-label {
            position: absolute;
            bottom: 14px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #333;
            letter-spacing: 2px;
            z-index: 20;
            text-transform: uppercase;
        }

        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 4px;
            border: 3px solid #ff2a4a;
            box-shadow: var(--border-glow), inset 0 0 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 520px) { .game-shell { border-radius: 0; border-width: 2px; } }

        .screen-curve {
            position: absolute; inset: 0; pointer-events: none; z-index: 899;
            border-radius: 2px; box-shadow: inset 0 0 60px rgba(0,0,0,0.7), inset 0 0 10px rgba(0,0,0,0.5);
        }

        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,var(--scanline-opacity)) 0px, rgba(0,0,0,var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 2px;
        }
        .crt-overlay::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%); border-radius: 2px;
        }

        .screen-flicker { animation: crtFlicker 8s ease-in-out infinite; }
        @keyframes crtFlicker { 0%,99.4%,100%{opacity:1;} 99.5%{opacity:0.6;} 99.6%{opacity:0.9;} 99.7%{opacity:0.5;} 99.8%{opacity:1;} }

        .marquee {
            position: relative; z-index: 10; background: #0c0406; border-bottom: 3px solid #ff2a4a;
            padding: 10px 16px; text-align: center; font-family: var(--font-display); letter-spacing: 2px;
            box-shadow: 0 2px 16px #00000088, inset 0 1px 0 #2a0c0c; flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #ff2a4a; border-radius: 3px; padding: 10px 14px; background: #080206;
            position: relative; box-shadow: inset 0 0 20px #ff003c11;
        }
        .marquee-inner::before {
            content: ''; position: absolute; top: -2px; left: 20px; right: 20px; height: 2px;
            background: #ff2a4a; box-shadow: 0 0 10px #c41e3a66;
        }
        .marquee-title {
            font-size: var(--text-size-title); color: #e8c5b0; text-shadow: 0 0 14px #c41e3a88, 0 2px 4px #000;
            letter-spacing: 3px; font-family: var(--font-title); line-height: 1.2;
        }
        @media (max-width: 400px) { .marquee-title { font-size: 22px; letter-spacing: 1px; } }

        .tabs-row {
            display: flex; background: #08080e; border-bottom: 2px solid #ff2a4a; z-index: 10;
            flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; gap: 0;
        }
        .tabs-row::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 1 0 auto; min-width: 50px; text-align: center; padding: 6px 3px;
            font-family: var(--font-body); font-size: 12px; color: #b08080; cursor: pointer;
            border-bottom: 4px solid transparent; background: transparent; white-space: nowrap;
            letter-spacing: 0.5px; transition: all 0.15s; min-height: var(--btn-min-height);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 1px; line-height: 1.2;
        }
        .tab-btn.active { color: #f0ddd0; border-bottom-color: #ff2a4a; text-shadow: 0 0 10px #c41e3a88; background: #0c0610; box-shadow: inset 0 -4px 12px #ff003c18; }
        .tab-btn:hover { color: #d4b8a8; background: #0a0810; }
        .tab-emoji { font-size: 15px; line-height: 1; }
        .tab-label { font-size: 10px; line-height: 1.2; }

        .game-area {
            flex: 1; overflow-y: auto; overflow-x: hidden; z-index: 5; scrollbar-width: thin;
            scrollbar-color: #2a0f15 #08080e; display: flex; flex-direction: column; padding: 4px 0;
        }
        .game-area::-webkit-scrollbar { width: 5px; } .game-area::-webkit-scrollbar-track { background: #08080e; } .game-area::-webkit-scrollbar-thumb { background: #2a0f15; border-radius: 3px; }

        .panel { display: none; flex-direction: column; padding: 10px; gap: 10px; flex: 1; }
        .panel.active { display: flex; }

        .btn {
            background: var(--button-bg); border: 2px solid #2a2a35; border-top-color: #3a3a48; border-left-color: #353540;
            border-right-color: #1a1a25; border-bottom-color: #111118; padding: 12px 18px; border-radius: 3px;
            color: var(--text); cursor: pointer; font-family: var(--font-body); font-size: var(--text-size-base);
            letter-spacing: 1px; text-transform: uppercase; transition: all 0.1s; min-height: var(--btn-min-height);
            display: inline-flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 2px 0 #00000044; white-space: nowrap;
        }
        .btn:active { border-top-color: #1a1a25; border-left-color: #1a1a25; border-bottom-color: #3a3a48; border-right-color: #353540; box-shadow: 0 0px 0 #00000044; transform: translateY(1px); background: #14141c; }
        .btn.accent { background: #180a10; border-color: #5c1525; border-top-color: #7a2035; border-left-color: #6a1a2a; border-right-color: #3a0f18; border-bottom-color: #200810; color: #e8a090; box-shadow: 0 2px 0 #00000044, 0 0 8px #c41e3a22; }
        .btn.accent:active { border-top-color: #3a0f18; border-left-color: #3a0f18; border-bottom-color: #7a2035; border-right-color: #6a1a2a; box-shadow: 0 0px 0 #00000044, 0 0 14px #c41e3a44; }
        .btn.danger { background: #180a0c; border-color: #441111; border-top-color: #5a1a1a; border-left-color: #4a1515; border-right-color: #2a0a0a; border-bottom-color: #150505; color: #ff7777; box-shadow: 0 2px 0 #00000044; }
        .btn.danger:active { border-top-color: #2a0a0a; border-left-color: #2a0a0a; border-bottom-color: #5a1a1a; border-right-color: #4a1515; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.94); align-items: center; justify-content: center; padding: 12px;
        }
        .modal-content {
            background: #0e0e16; border-radius: 6px; width: 100%; max-width: 420px; padding: 20px;
            text-align: center; border: 3px solid #ff2a4a; box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #d4c5b2; max-height: 85vh; overflow-y: auto; font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #1a1a20; border: 2px solid #ff2a4a66; padding: 10px 18px; border-radius: 3px;
            margin: 5px; cursor: pointer; color: #d4c5b2; font-family: var(--font-body);
            font-size: var(--text-size-base); letter-spacing: 1px; min-height: var(--btn-min-height);
        }
        .modal-btn:active { border-color: #ff003c; box-shadow: 0 0 12px #c41e3a44; }

        .chat-log { max-height: 200px; overflow-y: auto; text-align: left; margin-bottom: 10px; border: 1px solid #1a1520; border-radius: 4px; padding: 10px; background: #0a0a12; font-size: var(--text-size-base); line-height: 1.5; }
        .chat-msg { margin: 8px 0; font-size: 16px; line-height: 1.4; }
        .chat-msg.user { color: #e8a090; } .chat-msg.assistant { color: #d4c5b2; }
        .chat-input-row { display: flex; gap: 8px; }
        .chat-input-row input { flex: 1; background: var(--input-bg); border: 2px solid #2a2a35; border-radius: 3px; padding: 10px 12px; color: var(--text); font-family: var(--font-body); font-size: var(--text-size-base); min-height: var(--btn-min-height); -webkit-user-select: text; user-select: text; }

        .tv-stage { display: flex; align-items: flex-start; gap: 15px; background: #0a0a14; border: 2px solid #2a0f15; padding: 15px; border-radius: 4px; }
        .host-avatar {
            width: 100px; height: 100px; border-radius: 50%; border: 3px solid #ff2a4a;
            box-shadow: 0 0 20px #c41e3a66; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; font-size: 48px; background: #0a0a12;
        }
        .speech-bubble {
            flex: 1; background: #12121c; border: 2px solid #ff2a4a88; border-radius: 8px;
            padding: 12px; position: relative; color: #e8c5b0; font-size: 17px; min-height: 80px;
        }
        .speech-bubble::before {
            content: ''; position: absolute; left: -12px; top: 20px;
            border-width: 8px 12px 8px 0; border-style: solid;
            border-color: transparent #ff2a4a88 transparent transparent;
        }
        .tv-guide { margin-top: 15px; border-top: 2px solid #ff2a4a44; padding-top: 10px; }
        .tv-guide h3 { font-family: var(--font-display); color: #e8c5b0; letter-spacing: 2px; margin-bottom: 8px; }
        .guide-entry {
            display: flex; justify-content: space-between; align-items: center;
            background: #0e0e16; border: 1px solid #1a1520; padding: 10px;
            margin-bottom: 6px; border-radius: 3px;
        }
        .guide-time { font-family: var(--font-mono); font-size: 14px; color: #c41e3a; min-width: 50px; }
        .guide-info { flex: 1; margin: 0 10px; }
        .guide-title { font-size: 16px; color: #e8c5b0; }
        .guide-desc { font-size: 18px; color: #7a6a6a; }
        .guide-btn { padding: 6px 12px; font-size: 14px; min-height: 32px; }

        .loading-text { color: var(--amber); font-style: italic; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .footer-strip {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 12px; background: #08080e; border-top: 1px solid #ff2a4a66;
            z-index: 10; font-family: var(--font-mono); font-size: 11px; color: #444; flex-shrink: 0;
        }
        .api-warning {
            color: #ff6644; font-size: 10px; cursor: pointer;
            border: 1px solid #441111; padding: 2px 8px; border-radius: 3px;
        }
        .api-warning:hover { background: #1a0a08; }
    </style>
</head>
<body>
<div class="monitor-bezel">
    <div class="brand-label">NIGHTFALLS AM · CRT-84</div>
    <div class="power-led"></div>
    <div class="game-shell screen-flicker">
        <div class="screen-curve"></div>
        <div class="crt-overlay"></div>
        <div class="marquee"><div class="marquee-inner"><div class="marquee-title">NIGHTFALLS AM 1984</div></div></div>

        <div class="tabs-row">
            <div class="tab-btn active" data-tab="channel6"><span class="tab-emoji">🛸</span><span class="tab-label">CH 6</span></div>
            <div class="tab-btn" data-tab="channel7"><span class="tab-emoji">🦕</span><span class="tab-label">CH 7</span></div>
            <div class="tab-btn" data-tab="channel8"><span class="tab-emoji">📖</span><span class="tab-label">CH 8</span></div>
            <div class="tab-btn" data-tab="channel9"><span class="tab-emoji">⚖️</span><span class="tab-label">CH 9</span></div>
            <div class="tab-btn" data-tab="channel10"><span class="tab-emoji">🕯️</span><span class="tab-label">CH 10</span></div>
            <div class="tab-btn" data-tab="channel11"><span class="tab-emoji">🎥</span><span class="tab-label">CH 11</span></div>
            <div class="tab-btn" data-tab="channel12"><span class="tab-emoji">📻</span><span class="tab-label">CH 12</span></div>
            <div class="tab-btn" data-tab="channel13"><span class="tab-emoji">📺</span><span class="tab-label">CH 13</span></div>
        </div>

        <div class="game-area">
            <div id="channel6Panel" class="panel active"></div>
            <div id="channel7Panel" class="panel"></div>
            <div id="channel8Panel" class="panel"></div>
            <div id="channel9Panel" class="panel"></div>
            <div id="channel10Panel" class="panel"></div>
            <div id="channel11Panel" class="panel"></div>
            <div id="channel12Panel" class="panel"></div>
            <div id="channel13Panel" class="panel"></div>
        </div>

        <div class="footer-strip">
            <span id="footerMsg">📡 NIGHTFALLS AM · TUNE IN</span>
            <button id="resetApiBtn" class="api-warning">🔑 SET API KEY</button>
        </div>
    </div>
</div>
<div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

<script>
(function() {
    const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
    const MODEL = 'mistral-small-latest';
    let apiKey = localStorage.getItem('nightfalls_am_key') || '';

    const DEFAULT_STATE = {
        ch6Episodes: [], geheimeWaffenTopic: null,
        ch7Episodes: [], currentSullyCase: null,
        ch8Episodes: [], currentBook: null,
        ch9Episodes: [], currentCase: null, currentVerdictOptions: null, currentVerdictChosen: null, activeCourtVerdict: null,
        ch10Episodes: [], activePenance: null,
        ch11Episodes: [], currentDoubleFeature: null,
        ch12Episodes: [],
        tvGuideEpisodes: []
    };
    let gameState = { ...DEFAULT_STATE };

    const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[m]);

    function saveState() { try { localStorage.setItem('nightfalls_am_state', JSON.stringify(gameState)); } catch(e){} }
    function loadState() {
        try {
            const saved = localStorage.getItem('nightfalls_am_state');
            if (saved) gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
        } catch(e){}
    }

    async function mistralChat(msgs, maxTok=500) {
        if (!apiKey || apiKey.length < 10) {
            throw new Error('API key missing or invalid. Click "SET API KEY" in the footer.');
        }
        const res = await fetch(MISTRAL_ENDPOINT, {
            method:'POST',
            headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
            body: JSON.stringify({model:MODEL, messages:msgs, temperature:0.9, max_tokens:maxTok})
        });
        if (!res.ok) {
            const err = await res.text();
            throw new Error('API error '+res.status+': '+err.slice(0,100));
        }
        const data = await res.json();
        return data.choices[0].message.content.trim();
    }

    function showModal(html) {
        document.getElementById('genericModalContent').innerHTML = html;
        document.getElementById('genericModal').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('genericModal').style.display = 'none';
        speechSynthesis.cancel();
    }
    window.closeModal = closeModal;

    function speakTextMale(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = speechSynthesis.getVoices();
        const maleNames = ['Google UK English Male','Google US English Male','Daniel','Microsoft David','Fred','Alex','Thomas','James'];
        let voice = null;
        for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
        if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
        if (voice) utterance.voice = voice;
        utterance.rate = 0.9; utterance.pitch = 0.95;
        speechSynthesis.speak(utterance);
    }

    function speakTextFemale(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = speechSynthesis.getVoices();
        const femaleNames = ['Samantha','Google UK English Female','Google US English Female','Microsoft Zira','Karen','Moira','Fiona','Veena','Victoria','Alice','Linda','Amy','Emma','Ava','Isabella'];
        let voice = null;
        for (const name of femaleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
        if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('female')) || voices[0];
        if (voice) utterance.voice = voice;
        utterance.rate = 0.95; utterance.pitch = 1.2;
        speechSynthesis.speak(utterance);
    }

    function typewriterEffect(element, text, speed) {
        let i = 0; element.textContent = '';
        const timer = setInterval(() => {
            if (i < text.length) { element.textContent += text.charAt(i); i++; }
            else clearInterval(timer);
        }, speed);
    }

    // ─── HOST AVATAR HELPER ───
    function hostAvatar(emoji, label) {
        return `<div class="host-avatar" style="background:#0a0a14; border-color:#ff2a4a;" title="${esc(label)}">${emoji}</div>`;
    }

    // ─── CHANNEL 6 ───
    function generateGeheimeWaffenEpisodes() {
        return [
            { id: 'gw_dossier', time: '11:00 PM', title: 'Tonight’s Dossier', desc: 'Oberst Schreiber unveils a classified Nazi secret.', type: 'dossier' },
            { id: 'gw_footage', time: '11:30 PM', title: 'Archival Footage', desc: 'Rare film and documents are presented.', type: 'footage' },
            { id: 'gw_expert', time: '12:00 AM', title: 'Expert Testimony', desc: 'A witness or scientist gives harrowing evidence.', type: 'expert' },
            { id: 'gw_blueprint', time: '12:30 AM', title: 'The Blueprint', desc: 'Diagrams and technical details are analysed.', type: 'blueprint' },
            { id: 'gw_questions', time: '1:00 AM', title: 'Viewer Questions', desc: 'You may ask Oberst Schreiber anything.', type: 'questions' },
            { id: 'gw_closing', time: '1:30 AM', title: 'Closing the Dossier', desc: 'A final warning about the cover‑up.', type: 'closing' }
        ];
    }

    function renderChannel6() {
        const panel = document.getElementById('channel6Panel');
        if (!panel) return;
        if (!gameState.ch6Episodes || !gameState.ch6Episodes.length) {
            gameState.ch6Episodes = generateGeheimeWaffenEpisodes();
            saveState();
        }
        panel.innerHTML = `
            <div class="tv-stage">
                ${hostAvatar('🛸', 'Oberst Klaus Schreiber')}
                <div class="speech-bubble" id="ch6SpeechBubble">
                    <p id="ch6Dialogue">"Good evening. I am Oberst Klaus Schreiber. For decades, the truth has been hidden. Tonight, we open the files that they want you to forget. The secret weapons of the Reich are real. Stay vigilant."</p>
                </div>
            </div>
            <div class="tv-guide">
                <h3>🛸 THE HIDDEN REICH · TONIGHT’S SECRET</h3>
                <div id="ch6GuideList"></div>
            </div>
            <button class="btn accent" id="ch6NewDossierBtn" style="margin-top:12px; width:100%;">🛸 New Dossier</button>
        `;
        const guideList = document.getElementById('ch6GuideList');
        gameState.ch6Episodes.forEach(ep => {
            const entry = document.createElement('div'); entry.className = 'guide-entry';
            entry.innerHTML = `<span class="guide-time">${ep.time}</span><div class="guide-info"><div class="guide-title">${ep.title}</div><div class="guide-desc">${ep.desc}</div></div><button class="btn guide-btn" data-episode-id="${ep.id}">Uncover</button>`;
            guideList.appendChild(entry);
        });
        guideList.querySelectorAll('.guide-btn').forEach(btn => {

        t.options.forEach((o,i) => { html += `<button class="btn trivia-opt" data-index="${i}" data-correct="${i===t.correct}">${esc(o)}</button> `; });
        d.innerHTML = html;
        d.querySelectorAll('.trivia-opt').forEach(btn => {
            btn.addEventListener('click', function() {
                d.innerHTML = this.dataset.correct === 'true' ? `<p>💀 Correct, my darkling!</p>` : `<p>❌ Wrong! The crypt claims another soul.</p>`;
                speechSynthesis.cancel();
            });
        });
    }
    async function playFanMail(d) {
        const r = await mistralChat([{role:'system',content:'You are Elvira.'},{role:'user',content:`Read a funny fan letter (2-3 sentences) and respond.`}], 250);
        d.textContent = ''; typewriterEffect(d, r.trim(), 30); speakTextFemale(r.trim());
    }
    async function playSpecialTrade(d) {
        const r = await mistralChat([{role:'system',content:'You are Elvira.'},{role:'user',content:`Offer a special trade: a new tape for one of the viewer's tapes. 2-3 sentences.`}], 250);
        d.textContent = ''; typewriterEffect(d, r.trim(), 30); speakTextFemale(r.trim());
    }
    async function playElviraSignOff(d) {
        const r = await mistralChat([{role:'system',content:'You are Elvira.'},{role:'user',content:`Give a sassy sign-off. 2 sentences. End with "Stay sick, darlings."`}], 150);
        d.textContent = ''; typewriterEffect(d, r.trim(), 30); speakTextFemale(r.trim());
    }

    // ─── SWITCH TAB ───
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
        if (btn) btn.classList.add('active');
        const panel = document.getElementById(tab+'Panel');
        if (panel) panel.classList.add('active');

        if (tab === 'channel6') renderChannel6();
        else if (tab === 'channel7') renderChannel7();
        else if (tab === 'channel8') renderChannel8();
        else if (tab === 'channel9') renderChannel9();
        else if (tab === 'channel10') renderChannel10();
        else if (tab === 'channel11') renderChannel11();
        else if (tab === 'channel12') renderChannel12();
        else if (tab === 'channel13') renderChannel13();
        updateFooter();
    }

    function updateFooter() {
        const footer = document.getElementById('footerMsg');
        if (!footer) return;
        let parts = [];
        if (gameState.activePenance) parts.push(`🪪 Penance: ${gameState.activePenance.description}`);
        if (gameState.activeCourtVerdict) parts.push(`⚖️ Verdict: ${gameState.activeCourtVerdict.description}`);
        footer.textContent = parts.length > 0 ? parts.join('  |  ') : '📡 NIGHTFALLS AM · TUNE IN';
    }

    // ─── INIT ───
    loadState();
    switchTab('channel6');

    document.querySelectorAll('.tab-btn').forEach(t => {
        t.addEventListener('click', () => switchTab(t.dataset.tab));
    });

    document.getElementById('resetApiBtn').addEventListener('click', () => {
        const key = prompt('Enter your Mistral API key:');
        if (key && key.length > 10) {
            apiKey = key;
            localStorage.setItem('nightfalls_am_key', key);
            showModal('<h2>✅ API Key Set</h2><p>You\'re ready to tune in!</p><button class="modal-btn" onclick="closeModal()">OK</button>');
        } else if (key !== null) {
            showModal('<h2>⚠️ Invalid Key</h2><p>Please enter a valid Mistral API key.</p><button class="modal-btn" onclick="closeModal()">OK</button>');
        }
    });

    // If no API key on load, prompt after a moment
    if (!apiKey || apiKey.length < 10) {
        setTimeout(() => {
            showModal(`
                <h2>🔑 API Key Required</h2>
                <p>This game uses Mistral AI for all channel content. Please enter your API key to continue.</p>
                <p style="font-size:14px; color:#7a6a6a;">Get one at <a href="https://mistral.ai" target="_blank" style="color:#ff2a4a;">mistral.ai</a></p>
                <button class="modal-btn" id="modalApiBtn">Enter API Key</button>
                <button class="modal-btn" onclick="closeModal()">I\'ll do it later</button>
            `);
            document.getElementById('modalApiBtn').addEventListener('click', () => {
                closeModal();
                document.getElementById('resetApiBtn').click();
            });
        }, 600);
    }

    // Auto-refresh footer periodically
    setInterval(updateFooter, 5000);
})();
</script>
</body>
</html>
