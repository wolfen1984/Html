        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioContext.createGain(); 
                masterGain.gain.value = 0.75; // higher nominal level, then compressed
                masterCompressor = audioContext.createDynamicsCompressor();
                masterCompressor.threshold.setValueAtTime(-18, audioContext.currentTime);
                masterCompressor.knee.setValueAtTime(8, audioContext.currentTime);
                masterCompressor.ratio.setValueAtTime(4, audioContext.currentTime);
                masterCompressor.attack.setValueAtTime(0.005, audioContext.currentTime);
                masterCompressor.release.setValueAtTime(0.1, audioContext.currentTime);
                masterFilter = audioContext.createBiquadFilter(); 
                masterFilter.type = 'lowpass'; 
                masterFilter.frequency.value = 8000; 
                masterFilter.Q.value = 0.5;

                masterGain.connect(masterCompressor);
                masterCompressor.connect(masterFilter);
                masterFilter.connect(audioContext.destination);
            }
        }

        // Realistic reverb (smoother)
        function createCleanReverb() {
            const input = audioContext.createGain();
            const output = audioContext.createGain();
            const preDelay = audioContext.createDelay(0.03);
            const delay1 = audioContext.createDelay(0.35); delay1.delayTime.value = 0.35;
            const delay2 = audioContext.createDelay(0.19); delay2.delayTime.value = 0.19;
            const fb1 = audioContext.createGain(); fb1.gain.value = 0.14;
            const fb2 = audioContext.createGain(); fb2.gain.value = 0.09;
            const lp1 = audioContext.createBiquadFilter(); lp1.type = 'lowpass'; lp1.frequency.value = 3500;
            const lp2 = audioContext.createBiquadFilter(); lp2.type = 'lowpass'; lp2.frequency.value = 2500;
            const dry = audioContext.createGain(); dry.gain.value = 1.0;
            const wet = audioContext.createGain(); wet.gain.value = 0.35;

            input.connect(dry);
            input.connect(preDelay);
            preDelay.connect(delay1);
            delay1.connect(fb1).connect(lp1).connect(delay1);
            delay1.connect(delay2);
            delay2.connect(fb2).connect(lp2).connect(delay2);
            delay2.connect(wet);
            dry.connect(output);
            wet.connect(output);
            return { input, output };
        }

        function connectWithPan(source, outputNode, pan) {
            if (audioContext.createStereoPanner) {
                const panner = new StereoPannerNode(audioContext, { pan: pan });
                source.connect(panner).connect(outputNode);
                return panner;
            } else {
                const splitter = audioContext.createChannelSplitter(2);
                const merger = audioContext.createChannelMerger(2);
                const leftGain = audioContext.createGain(); leftGain.gain.value = pan <=0 ? 1 : Math.max(0, 1 - pan);
                const rightGain = audioContext.createGain(); rightGain.gain.value = pan >=0 ? 1 : Math.max(0, 1 + pan);
                source.connect(splitter);
                splitter.connect(leftGain, 0).connect(merger, 0, 0);
                splitter.connect(rightGain, 0).connect(merger, 0, 1);
                merger.connect(outputNode);
                return null;
            }
        }

        // ---- IMPROVED BASS (REAL BASS GUITAR) ----
        function playBassNote(freq, time, outputNode, pan = 0) {
            // Dual osc: saw + triangle, slightly detuned
            const osc1 = audioContext.createOscillator(); osc1.type = 'sawtooth'; osc1.frequency.value = freq;
            const osc2 = audioContext.createOscillator(); osc2.type = 'triangle'; osc2.frequency.value = freq * 1.007; // detune
            const gain = audioContext.createGain();
            const filter = audioContext.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 900;
            
            // Pluck envelope
            gain.gain.setValueAtTime(0.0, time);
            gain.gain.linearRampToValueAtTime(0.45, time + 0.015);
            gain.gain.exponentialRampToValueAtTime(0.22, time + 0.12);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 1.4);
            
            // Slight drive
            const waveshaper = audioContext.createWaveShaper();
            waveshaper.curve = new Float32Array([0,0.2,0.5,0.8,0.9,1.0,0.9,0.8,0.5,0.2,0,-0.2,-0.5,-0.8,-0.9,-1.0,-0.9,-0.8,-0.5,-0.2,0]);
            
            osc1.connect(filter);
            osc2.connect(filter);
            filter.connect(waveshaper);
            waveshaper.connect(gain);
            
            const panner = connectWithPan(gain, outputNode, pan);
            
            osc1.start(time); osc2.start(time);
            osc1.stop(time + 1.5); osc2.stop(time + 1.5);
        }

        // ---- IMPROVED DRUMS (ACOUSTIC STYLE) ----
        function playKick(time, out, pan=0) {
            const osc = audioContext.createOscillator(); osc.type='sine'; osc.frequency.setValueAtTime(140, time); osc.frequency.exponentialRampToValueAtTime(40, time+0.2);
            const click = audioContext.createOscillator(); click.type='triangle'; click.frequency.value=80;
            const gain = audioContext.createGain(); gain.gain.setValueAtTime(0.75, time); gain.gain.exponentialRampToValueAtTime(0.001, time+0.25);
            const clickGain = audioContext.createGain(); clickGain.gain.setValueAtTime(0.2, time); clickGain.gain.exponentialRampToValueAtTime(0.001, time+0.02);
            const panner = connectWithPan(gain, out, pan);
            osc.connect(gain); click.connect(clickGain); clickGain.connect(gain);
            osc.start(time); click.start(time); osc.stop(time+0.3); click.stop(time+0.03);
        }

        function playSnare(time, out, pan=0) {
            const noise = audioContext.createBufferSource();
            const buf = audioContext.createBuffer(1, audioContext.sampleRate*0.2, audioContext.sampleRate);
            const data = buf.getChannelData(0); for(let i=0;i<buf.length;i++) data[i]=(Math.random()*2-1);
            noise.buffer=buf;
            const tone = audioContext.createOscillator(); tone.type='triangle'; tone.frequency.value=180;
            const filter = audioContext.createBiquadFilter(); filter.type='bandpass'; filter.frequency.value=2000; filter.Q.value=1.0;
            const gain = audioContext.createGain(); gain.gain.setValueAtTime(0.5, time); gain.gain.exponentialRampToValueAtTime(0.001, time+0.18);
            const toneGain = audioContext.createGain(); toneGain.gain.setValueAtTime(0.15, time); toneGain.gain.exponentialRampToValueAtTime(0.001, time+0.1);
            noise.connect(filter); filter.connect(gain);
            tone.connect(toneGain); toneGain.connect(gain);
            const panner = connectWithPan(gain, out, pan);
            noise.start(time); tone.start(time); noise.stop(time+0.2); tone.stop(time+0.12);
        }

        function playHat(time, out, pan=0) {
            const noise = audioContext.createBufferSource();
            const buf = audioContext.createBuffer(1, audioContext.sampleRate*0.1, audioContext.sampleRate);
            const data = buf.getChannelData(0); for(let i=0;i<buf.length;i++) data[i]=(Math.random()*2-1)*0.7;
            noise.buffer=buf;
            const filter = audioContext.createBiquadFilter(); filter.type='highpass'; filter.frequency.value=8000;
            const gain = audioContext.createGain(); gain.gain.setValueAtTime(0.18, time); gain.gain.exponentialRampToValueAtTime(0.001, time+0.07);
            noise.connect(filter); filter.connect(gain);
            const panner = connectWithPan(gain, out, pan);
            noise.start(time); noise.stop(time+0.09);
        }

        // Layer starters (scheduling)
        function startDrums(out, int, pan=0) {
            let s=0;
            return setInterval(()=>{ if(!isPlaying)return; const t=audioContext.currentTime;
                if(s%4===0||s%4===2) playKick(t,out,pan);
                if(s%4===1||s%4===3) playSnare(t,out,pan*0.8);
                playHat(t,out,pan*0.5); s++; }, int);
        }

        function startBassLayer(out, notes, int, pan=0) {
            let s=0;
            return setInterval(()=>{ if(!isPlaying)return; playBassNote(notes[s%notes.length], audioContext.currentTime, out, pan); s++; }, int);
        }

        function startSubBass(out, notes, int, pan=0) {
            let s=0;
            return setInterval(()=>{ if(!isPlaying)return;
                const o=audioContext.createOscillator(); o.type='sine'; o.frequency.value=notes[s%notes.length];
                const g=audioContext.createGain(); g.gain.setValueAtTime(0.3, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime+1.6);
                const p=connectWithPan(o,out,pan); o.connect(g).connect(p||out); o.start(); o.stop(audioContext.currentTime+1.8); s++;
            }, int);
        }

        function startPadLayer(out, freqs, pan=0) {
            const oscs = freqs.map(f=>{ const o=audioContext.createOscillator(); o.type='sine'; o.frequency.value=f; return o; });
            const g=audioContext.createGain(); g.gain.value=0.0;
            const f=audioContext.createBiquadFilter(); f.type='lowpass'; f.frequency.value=2000;
            oscs.forEach(o=>o.connect(f)); f.connect(g);
            const p=connectWithPan(g,out,pan); g.connect(p||out);
            oscs.forEach(o=>o.start());
            return {oscs,gain:g,filter:f};
        }

        function startArpeggioLayer(out, notes, speed, pan=0) {
            let s=0;
            return setInterval(()=>{ if(!isPlaying)return;
                const o=audioContext.createOscillator(); o.type='triangle'; o.frequency.value=notes[s%notes.length];
                const g=audioContext.createGain(); g.gain.setValueAtTime(0.1, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime+0.25);
                const p=connectWithPan(o,out,pan); o.connect(g).connect(p||out); o.start(); o.stop(audioContext.currentTime+0.3); s++;
            }, speed);
        }

        function startLeadMelody(out, melody, step, pan=0) {
            let i=0;
            return setInterval(()=>{ if(!isPlaying)return; if(melody[i]>0){
                const o=audioContext.createOscillator(); o.type='sine'; o.frequency.value=melody[i];
                const g=audioContext.createGain(); g.gain.setValueAtTime(0.25, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime+0.7);
                const p=connectWithPan(o,out,pan); o.connect(g).connect(p||out); o.start(); o.stop(audioContext.currentTime+0.8);
            } i=(i+1)%melody.length; }, step);
        }

        function startClimaxStabs(out) {
            return setInterval(()=>{ if(!isPlaying)return;
                const o=audioContext.createOscillator(); o.type='triangle'; o.frequency.value=200+Math.random()*200;
                const g=audioContext.createGain(); g.gain.setValueAtTime(0.18, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime+0.15);
                o.connect(g).connect(out); o.start(); o.stop(audioContext.currentTime+0.18);
            }, 400);
        }

        function resolveTheme(out) {
            return setInterval(()=>{ if(!isPlaying)return;
                const o=audioContext.createOscillator(); o.type='sine'; o.frequency.value=40;
                const g=audioContext.createGain(); g.gain.setValueAtTime(0.4, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime+1.0);
                o.connect(g).connect(out); o.start(); o.stop(audioContext.currentTime+1.1);
            }, 800);
        }

        function stopAllLayers() {
            [activeBassInt,activeSubInt,activeArpInt,activeLeadInt,activeClimaxInt,activeDrumsInt,activeResolveInt].forEach(i=>{ if(i)clearInterval(i); });
            activeBassInt=activeSubInt=activeArpInt=activeLeadInt=activeClimaxInt=activeDrumsInt=activeResolveInt=null;
            if(activePadNodes){ activePadNodes.oscs.forEach(o=>{ try{o.stop()}catch(e){} }); activePadNodes=null; }
        }

        function stopCurrentSong() {
            if(!currentSongKey)return;
            isPlaying = false;
            // Fade out
            masterGain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1.5);
            clearTimeout(fadeTimeout); clearTimeout(endFadeTimeout);
            endFadeTimeout = setTimeout(() => {
                stopAllLayers();
                const btn=document.querySelector(`.play-btn[data-song="${currentSongKey}"]`);
                if(btn)btn.innerHTML='▶';
                document.querySelector(`.song-item[data-song="${currentSongKey}"]`)?.classList.remove('playing');
                currentSongKey=null;
                if(updateTimer)clearInterval(updateTimer);
            }, 1600);
        }

        function updateProgress() {
            if(!currentSongKey)return;
            const cfg=themeConfigs[currentSongKey];
            const elapsed=Math.min(Math.floor((Date.now()-songStartTime)/1000), cfg.totalDuration);
            const fill=document.getElementById(`fill-${currentSongKey}`);
            const timeEl=document.getElementById(`time-${currentSongKey}`);
            if(fill)fill.style.width=`${(elapsed/cfg.totalDuration)*100}%`;
            if(timeEl){ const m=Math.floor(elapsed/60), s=elapsed%60, tm=Math.floor(cfg.totalDuration/60), ts=cfg.totalDuration%60;
                timeEl.textContent=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')} / ${tm}:${ts.toString().padStart(2,'0')}`; }
        }

        function startSong(key) {
            const cfg=themeConfigs[key]; if(!cfg)return;
            stopCurrentSong(); initAudio(); if(audioContext.state==='suspended') audioContext.resume();
            isPlaying=true; currentSongKey=key; songStartTime=Date.now();
            
            // Fade in
            masterGain.gain.cancelScheduledValues(audioContext.currentTime);
            masterGain.gain.setValueAtTime(0.001, audioContext.currentTime);
            masterGain.gain.exponentialRampToValueAtTime(0.75, audioContext.currentTime + 0.8);
            
            const rev = createCleanReverb(); rev.output.connect(masterGain);
            const pan=cfg.panMap;
            
            activeBassInt = startBassLayer(rev.input, cfg.bassNotes, cfg.bassInterval, pan.bass);
            activeSubInt = startSubBass(rev.input, cfg.subBassNotes, cfg.subBassInterval, pan.sub);
            activePadNodes = startPadLayer(rev.input, cfg.padFreqs, pan.pad);
            
            cfg.sections.forEach(s=>{ setTimeout(()=>{ if(currentSongKey!==key||!isPlaying)return;
                if(s.filter) masterFilter.frequency.setTargetAtTime(s.filter, audioContext.currentTime, 2.5);
                if(activePadNodes?.gain) activePadNodes.gain.gain.setTargetAtTime(s.padGain, audioContext.currentTime, 2.8);
                if(s.action.includes('verse')){
                    if(activeLeadInt){clearInterval(activeLeadInt);activeLeadInt=null;}
                    if(activeDrumsInt){clearInterval(activeDrumsInt);activeDrumsInt=null;}
                    if(activeClimaxInt){clearInterval(activeClimaxInt);activeClimaxInt=null;}
                    if(activeArpInt)clearInterval(activeArpInt);
                    activeArpInt=startArpeggioLayer(rev.input, cfg.arpNotes, s.arpSpeed||cfg.arpSpeed, pan.arp);
                } else if(s.action.includes('chorus')){
                    if(activeClimaxInt){clearInterval(activeClimaxInt);activeClimaxInt=null;}
                    if(activeLeadInt)clearInterval(activeLeadInt);
                    activeLeadInt=startLeadMelody(rev.input, cfg.leadMelody, cfg.leadStepTime, pan.lead);
                    if(!activeDrumsInt)activeDrumsInt=startDrums(rev.input, cfg.drumInterval, pan.drums);
                    if(!activeArpInt)activeArpInt=startArpeggioLayer(rev.input, cfg.arpNotes, cfg.arpSpeed, pan.arp);
                } else if(s.action==='bridge'){
                    if(activeArpInt){clearInterval(activeArpInt);activeArpInt=null;}
                    if(activeLeadInt){clearInterval(activeLeadInt);activeLeadInt=null;}
                    if(activeDrumsInt){clearInterval(activeDrumsInt);activeDrumsInt=null;}
                    if(s.startClimax)activeClimaxInt=startClimaxStabs(rev.input);
                } else if(s.action==='outro'){
                    stopAllLayers();
                    activeResolveInt=resolveTheme(rev.input);
                }
            }, s.time); });
            
            // Auto-stop + fade out at end
            fadeTimeout = setTimeout(()=> {
                if(currentSongKey===key) {
                    masterGain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 2);
                    setTimeout(()=> stopCurrentSong(), 2100);
                }
            }, cfg.totalDuration*1000 - 2000);
            
            updateTimer=setInterval(updateProgress, 300);
            const btn=document.querySelector(`.play-btn[data-song="${key}"]`); if(btn)btn.innerHTML='❚❚';
            document.querySelector(`.song-item[data-song="${key}"]`)?.classList.add('playing');
        }

        function buildUI() {
            const cont=document.getElementById('song-list');
            const songs=[
                {key:'harvest-moon',title:'SCREAM OF THE HARVEST MOON',tag:'FOLK HORROR'}, 
                {key:'radioactive-hookers',title:'RADIOACTIVE HOOKERS FROM HELL',tag:'PUNK INDUSTRIAL'}, 
                {key:'devils-drivein',title:"THE DEVIL'S DRIVE-IN",tag:'ROCKABILLY TERROR'}, 
                {key:'dead-mans-peak',title:'POSSESSION AT DEAD MAN\'S PEAK',tag:'ATMOSPHERIC DREAD'},
                {key:'psycho-hookers-planet-x',title:'PSYCHO HOOKERS FROM PLANET X',tag:'SCI-FI SEXPLOITATION'},
                {key:'driller-killers-day-off',title:"DRILLER KILLER'S DAY OFF",tag:'POWER TOOL MASSACRE'},
                {key:'hitlers-hellhounds-third-reich',title:"HITLER'S HELLHOUNDS OF THE THIRD REICH",tag:'REICH OF TERROR'},
                {key:'slaughterhouse-at-the-edge-of-town',title:'SLAUGHTERHOUSE AT THE EDGE OF TOWN',tag:'MEATPACKER MASSACRE'},
                {key:'the-last-video-store-in-town',title:'THE LAST VIDEO STORE IN TOWN',tag:'VHS NIGHTMARE'},
                {key:'the-lawn-gnome-of-death',title:'THE LAWN GNOME OF DEATH',tag:'GARDEN OF EVIL'},
                {key:'killer-tax-return-from-beyond',title:'KILLER TAX RETURN FROM BEYOND',tag:'DEMONIC AUDIT'},
                {key:'cable-guy-from-the-grave',title:'CABLE GUY FROM THE GRAVE',tag:'HAUNTED SERVICE'}
            ];
            cont.innerHTML='';
            songs.forEach(s=>{ 
                const cfg=themeConfigs[s.key]; 
                const total=`${Math.floor(cfg.totalDuration/60)}:${(cfg.totalDuration%60).toString().padStart(2,'0')}`;
                const div=document.createElement('div'); 
                div.className='song-item'; 
                div.dataset.song=s.key;
                div.innerHTML=`<div class="now-playing">🎵 NOW PLAYING 🎵</div><button class="play-btn" data-song="${s.key}">▶</button><div style="flex:1;"><div class="song-name">${cfg.name} <span class="badge">${s.tag}</span></div></div><div class="progress-container"><div class="progress-bar"><div class="progress-fill" id="fill-${s.key}"></div></div><div class="time-display" id="time-${s.key}">00:00 / ${total}</div></div>`;
                cont.appendChild(div); 
            });
            document.querySelectorAll('.play-btn').forEach(b=>b.addEventListener('click',function(){ const k=this.dataset.song; if(currentSongKey===k)stopCurrentSong(); else startSong(k); }));
        }
        window.onload=buildUI;
    })();
