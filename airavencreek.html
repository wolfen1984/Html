<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAST STOP · NIGHTFALL 1982</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0c0c0c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 16px;
        }
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(180, 140, 100, 0.03) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2;
        }
        .crt {
            animation: textflicker 0.01s infinite;
        }
        @keyframes textflicker {
            0% { text-shadow: 0 0 3px #b87c4b; }
            50% { text-shadow: 0 0 1px #b87c4b; }
            100% { text-shadow: 0 0 3px #b87c4b; }
        }
        .terminal {
            background: #000;
            color: white;
            border: 4px solid white;
            box-shadow: 0 0 15px grey, inset 0 0 10px white;
            width: 100%;
            max-width: 950px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 20px 20px 15px 20px;
            position: relative;
            z-index: 1;
        }
        .header {
            border-bottom: 2px solid white;
            padding-bottom: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            line-height: 1.8;
            text-transform: uppercase;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            text-shadow: 0 0 5px grey;
            letter-spacing: 1px;
        }
        .header-left, .header-right { color: white; }
        .header-center {
            text-align: center;
            width: 100%;
            margin-top: 8px;
            font-size: 14px;
            background: #000;
            color: white;
            padding: 6px 0;
            border: 2px solid white;
            letter-spacing: 4px;
            box-shadow: inset 0 0 10px grey;
        }
        .output {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 8px;
            border: 2px solid white;
            padding: 18px 14px;
            background: #000;
            scroll-behavior: auto;
            word-break: break-word;
            box-shadow: inset 0 0 20px grey;
        }
        .output p {
            margin: 0 0 14px 0;
            color: white;
            text-shadow: 0 0 5px grey;
        }
        .output p:last-child { margin-bottom: 0; }

        /* HUD – diegetic tape‑reel style */
        .hud {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border: 2px solid white;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 11px;
            text-transform: uppercase;
            background: #000;
            box-shadow: inset 0 0 10px grey;
            font-family: 'Press Start 2P', monospace;
            color: white;
            text-shadow: 0 0 5px grey;
            gap: 8px;
        }
        .hud-section {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .health-bar {
            display: inline-block;
            letter-spacing: 2px;
            font-size: 14px;
        }
        .reputation-bar {
            display: inline-block;
            letter-spacing: 2px;
            font-size: 14px;
        }
        .hud-label {
            opacity: 0.8;
            font-size: 9px;
        }

        .input-line {
            display: flex;
            align-items: center;
            border-top: 2px solid white;
            padding-top: 12px;
            font-size: 16px;
        }
        .prompt { 
            color: white; 
            margin-right: 10px; 
            font-size: 18px;
            text-shadow: 0 0 8px grey;
        }
        #userInput {
            flex: 1;
            background: #000;
            border: 2px solid red;
            color: white;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 16px;
            padding: 12px 12px;
            outline: none;
            text-transform: uppercase;
            box-shadow: 0 0 8px red;
        }
        #userInput::placeholder { 
            color: red; 
            font-size: 11px; 
            text-transform: none; 
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            color: white;
            margin-top: 10px;
            border-top: 1px solid white;
            padding-top: 8px;
            text-shadow: 0 0 5px grey;
        }
        .footer-left, .footer-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .clickable {
            color: red;
            text-decoration: underline;
            cursor: pointer;
            text-shadow: 0 0 5px red;
            transition: all 0.1s ease;
        }
        .clickable:hover {
            color: white;
            text-shadow: 0 0 10px red, 0 0 20px red;
            background: red;
        }
        .status {
            color: white;
            font-size: 15px;
            margin-top: 8px;
            letter-spacing: 1px;
            text-align: right;
            text-shadow: 0 0 5px grey;
        }
        #fileInput { display: none; }
    </style>
</head>
<body class="crt">
    <div class="terminal">
        <div class="header">
            <div class="header-left">LAST STOP<br>NIGHTFALL 1982</div>
            <div class="header-right">RAVEN'S CREEK<br> SHERIFF LOG</div>
            <div class="header-center">⏣ RAVEN'S CREEK ⏣</div>
        </div>

        <!-- Diegetic HUD – updated for small town horror -->
        <div id="hudContainer" class="hud">
            <div class="hud-section"><span class="hud-label">LOC:</span> <span id="hudLocation">BROKEN CAR</span></div>
            <div class="hud-section"><span class="hud-label">HP:</span> <span id="hudHealthBar" class="health-bar">[██████░░]</span></div>
            <div class="hud-section"><span class="hud-label">TIME:</span> <span id="hudTime">22:00</span></div>
            <div class="hud-section"><span class="hud-label">WX:</span> <span id="hudWeather">FOG</span></div>
            <!-- three new reputation bars: locals trust, sheriff trust, eerie knowledge -->
            <div class="hud-section"><span class="hud-label">LOC:</span> <span id="hudRepCorp" class="reputation-bar">[··]</span></div>
            <div class="hud-section"><span class="hud-label">SHR:</span> <span id="hudRepUnder" class="reputation-bar">[··]</span></div>
            <div class="hud-section"><span class="hud-label">EER:</span> <span id="hudRepPolice" class="reputation-bar">[··]</span></div>
        </div>

        <div id="outputArea" class="output">
            <!-- boot / narrative appears here -->
        </div>

        <div class="input-line">
            <span class="prompt">❯</span>
            <input type="text" id="userInput" placeholder="ENTER COMMAND..." autofocus disabled>
        </div>
        <div class="status" id="aiStatus">⚡ ENGINE DIED... ⚡</div>
        
        <div class="footer">
            <div class="footer-left">
                <span class="clickable" id="saveBtn">[SAVE]</span>
                <span class="clickable" id="loadBtn">[LOAD]</span>
            </div>
            <div class="footer-right">
                <span class="clickable" id="resetBtn">[RESET]</span>
                <span>LAST STOP 1982</span>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".json,application/json">

    <script>
        (function() {
            // DOM elements
            const outputDiv = document.getElementById('outputArea');
            const inputField = document.getElementById('userInput');
            const aiStatus = document.getElementById('aiStatus');
            const resetBtn = document.getElementById('resetBtn');
            const saveBtn = document.getElementById('saveBtn');
            const loadBtn = document.getElementById('loadBtn');
            const fileInput = document.getElementById('fileInput');
            const hudLocation = document.getElementById('hudLocation');
            const hudHealthBar = document.getElementById('hudHealthBar');
            const hudTime = document.getElementById('hudTime');
            const hudWeather = document.getElementById('hudWeather');
            const hudRepCorp = document.getElementById('hudRepCorp');   // now locals trust
            const hudRepUnder = document.getElementById('hudRepUnder'); // sheriff trust
            const hudRepPolice = document.getElementById('hudRepPolice'); // eerie knowledge

            // ========== NEW SYSTEM PROMPT – LAST STOP / NIGHTFALL 1982 ==========
            const systemPrompt = `You are the game master for a horror mystery interactive fiction game called LAST STOP, created by Nightfall Games in 1982. The player's car has broken down at night in a small isolated town called Raven's Creek. The locals are creepy, suspicious of outsiders, and something is not right — think Twin Peaks or a Stephen King novel. The player can roam the town, investigate, and try to survive the night while uncovering secrets.

You MUST track the following variables and include them at the END of each response in the exact format:
##STATE## location|health|time|weather|trust_locals|trust_sheriff|eerie_knowledge|mystery_active

- location: one of [Broken Down Car, Main Street, Diner, Gas Station, Motel, Sheriff's Office, Church, Woods, Lake, Abandoned Mill, Cemetery]
- health: 0-10
- time: 24h format (e.g., 22:30). Advance time slowly (15-30 minutes per action, but night should progress)
- weather: Fog, Rain, Clear, Overcast, Mist
- trust_locals: -5 to 5 (how much the townsfolk trust you — low means hostile)
- trust_sheriff: -5 to 5 (the sheriff's attitude toward you)
- eerie_knowledge: -5 to 5 (how much you've learned about the town's dark secrets; higher means closer to the truth)
- mystery_active: 0 or 1 (whether the main mystery is still active — always 1 until resolved)

The narrative should be atmospheric, eerie, with a sense of dread and paranoia. Responses should be 1-3 sentences. End with a clear prompt for the player's next action.

IMPORTANT: Inject occasional random encounters based on location and trust levels. 
**Include clickable action suggestions in brackets**, like [EXAMINE CAR] or [ENTER DINER] or [TALK TO SHERIFF]. Use them sparingly — about one per response, sometimes two.`;

            const introMessage = `THE ENGINE SPUTTERS AND DIES. YOU ROLL TO A STOP ON THE EDGE OF A SMALL TOWN. FOG CREEPS ACROSS THE TWO-LANE HIGHWAY. A FEW LIGHTS GLIMMER THROUGH THE TREES. YOU'RE MILES FROM ANYWHERE. THE ONLY SOUND IS THE WIND AND YOUR OWN HEARTBEAT.\n\nWHAT DO YOU DO? [CHECK THE CAR] [WALK TOWARD TOWN]`;

            const initialState = "##STATE## Broken Down Car|10|22:00|Fog|0|0|0|1";

            let messages = [
                { role: 'assistant', content: introMessage + "\n" + initialState }
            ];

            // Audio context
            let audioCtx = null;
            let rainNode = null;
            let humNode = null;
            let currentLocation = "Broken Down Car";

            // Floppy / static sound (kept for retro unease)
            let floppySource = null;
            let floppyGain = null;
            let floppyLooping = false;

            // Initialize audio and ambient
            function initAudio() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                // low rumble / wind
                const bufferSize = 2 * audioCtx.sampleRate;
                const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = noiseBuffer;
                noise.loop = true;

                const filter = audioCtx.createBiquadFilter();
                filter.type = "lowpass";
                filter.frequency.value = 400; // darker

                const gain = audioCtx.createGain();
                gain.gain.value = 0.15;

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                rainNode = { noise, filter, gain };

                // distant hum / wind
                const humOsc = audioCtx.createOscillator();
                humOsc.type = "sine";
                humOsc.frequency.value = 80;
                const humGain = audioCtx.createGain();
                humGain.gain.value = 0.03;
                humOsc.connect(humGain);
                humGain.connect(audioCtx.destination);
                humNode = { osc: humOsc, gain: humGain };

                noise.start();
                humOsc.start();
            }

            // ========== FLOPPY / STATIC GRIND (now like distant radio interference) ==========
            function createFloppyBuffer(ctx) {
                const duration = 3.0;
                const sampleRate = ctx.sampleRate;
                const buffer = ctx.createBuffer(1, sampleRate * duration, sampleRate);
                const data = buffer.getChannelData(0);
                
                const motorBaseFreq = 70; // lower, more ominous
                let time = 0;
                const dt = 1 / sampleRate;
                
                for (let i = 0; i < buffer.length; i++) {
                    time = i * dt;
                    
                    let humAmp = 0.1 + 0.03 * Math.sin(2 * Math.PI * 1.2 * time);
                    let motor = humAmp * Math.sin(2 * Math.PI * motorBaseFreq * time);
                    motor += 0.04 * Math.sin(2 * Math.PI * motorBaseFreq * 2.5 * time);
                    
                    // random crackle
                    let crackle = 0;
                    if (Math.random() < 0.01) {
                        crackle = (Math.random() * 2 - 1) * 0.4;
                    }
                    
                    let hiss = (Math.random() * 2 - 1) * 0.04;
                    
                    let sample = motor + crackle + hiss;
                    
                    if (sample > 0.8) sample = 0.8;
                    if (sample < -0.8) sample = -0.8;
                    
                    data[i] = sample;
                }
                
                // a couple of louder thumps
                for (let clickTime of [0.5, 1.5, 2.3]) {
                    let idx = Math.floor(clickTime * sampleRate);
                    if (idx < buffer.length) {
                        for (let j = 0; j < sampleRate * 0.02; j++) {
                            if (idx + j < buffer.length) {
                                data[idx + j] += (Math.random() * 2 - 1) * 0.5 * (1 - j/(sampleRate*0.02));
                            }
                        }
                    }
                }
                
                return buffer;
            }

            function startFloppySound() {
                if (!audioCtx) {
                    initAudio();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                stopFloppySound();

                floppyGain = audioCtx.createGain();
                floppyGain.gain.value = 0.08;
                floppyGain.connect(audioCtx.destination);

                const buffer = createFloppyBuffer(audioCtx);
                floppySource = audioCtx.createBufferSource();
                floppySource.buffer = buffer;
                floppySource.loop = true;
                floppySource.connect(floppyGain);
                floppySource.start();
                floppyLooping = true;
            }

            function stopFloppySound() {
                if (floppySource) {
                    try {
                        floppySource.stop();
                    } catch (e) {}
                    floppySource.disconnect();
                    floppySource = null;
                }
                if (floppyGain) {
                    floppyGain.disconnect();
                    floppyGain = null;
                }
                floppyLooping = false;
            }

            function updateAmbientSound(location) {
                if (!audioCtx || !rainNode || !humNode) return;
                let rainVol = 0.15;
                let humFreq = 70;
                let humVol = 0.04;
                switch(location) {
                    case "Woods":
                    case "Cemetery":
                    case "Lake":
                        rainVol = 0.3;
                        humFreq = 45;
                        humVol = 0.06;
                        break;
                    case "Diner":
                    case "Gas Station":
                    case "Motel":
                        rainVol = 0.1;
                        humFreq = 130;
                        humVol = 0.02;
                        break;
                    case "Sheriff's Office":
                        rainVol = 0.1;
                        humFreq = 180;
                        break;
                    case "Church":
                        rainVol = 0.15;
                        humFreq = 90;
                        break;
                    default:
                        rainVol = 0.2;
                        humFreq = 60;
                }
                rainNode.gain.gain.setValueAtTime(rainVol, audioCtx.currentTime);
                humNode.osc.frequency.setValueAtTime(humFreq, audioCtx.currentTime);
                humNode.gain.gain.setValueAtTime(humVol, audioCtx.currentTime);
            }

            function updateHUDFromState(stateLine) {
                const parts = stateLine.replace('##STATE##', '').trim().split('|');
                if (parts.length < 8) return;
                const [loc, health, time, weather, trustLoc, trustShr, eerie, mystery] = parts;
                hudLocation.textContent = loc.toUpperCase();
                const healthNum = parseInt(health) || 10;
                const filled = '█'.repeat(healthNum);
                const empty = '░'.repeat(10 - healthNum);
                hudHealthBar.textContent = `[${filled}${empty}]`;
                hudTime.textContent = time;
                hudWeather.textContent = weather;
                // these are now locals (repCorp), sheriff (repUnder), eerie (repPolice)
                hudRepCorp.textContent = formatRep(parseInt(trustLoc));
                hudRepUnder.textContent = formatRep(parseInt(trustShr));
                hudRepPolice.textContent = formatRep(parseInt(eerie));
                if (currentLocation !== loc) {
                    currentLocation = loc;
                    updateAmbientSound(loc);
                }
            }

            function formatRep(val) {
                if (val > 0) return `+${val}`;
                return `${val}`;
            }

            function filterStateFromContent(content) {
                const idx = content.indexOf('##STATE##');
                if (idx === -1) return content;
                return content.substring(0, idx).trim();
            }

            function appendOutput(text) {
                const p = document.createElement('p');
                p.textContent = text;
                outputDiv.appendChild(p);
                outputDiv.scrollTop = outputDiv.scrollHeight;
            }

            function rebuildOutputFromMessages() {
                outputDiv.innerHTML = '';
                for (let msg of messages) {
                    if (msg.role === 'user') {
                        appendOutput('> ' + msg.content.toUpperCase());
                    } else if (msg.role === 'assistant') {
                        const displayContent = filterStateFromContent(msg.content);
                        if (displayContent) {
                            appendOutput(displayContent);
                        }
                    }
                }
                const lastAssistant = [...messages].reverse().find(m => m.role === 'assistant');
                if (lastAssistant) {
                    const stateLine = lastAssistant.content.split('##STATE##')[1];
                    if (stateLine) {
                        updateHUDFromState('##STATE##' + stateLine);
                    }
                }
            }

            function makeClickable(paragraphElement) {
                const originalText = paragraphElement.textContent;
                const html = originalText.replace(/\[([^\]]+)\]/g, '<span class="clickable" data-command="$1">[$1]</span>');
                paragraphElement.innerHTML = html;
                paragraphElement.querySelectorAll('.clickable').forEach(span => {
                    span.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const command = span.dataset.command;
                        inputField.value = command;
                        handleCommand();
                    });
                });
            }

            async function typewriterEffect(text, container) {
                const p = document.createElement('p');
                container.appendChild(p);
                const chars = text.split('');
                let fullText = '';
                for (let char of chars) {
                    fullText += char;
                    p.textContent = fullText;
                    playKeySound();
                    await new Promise(resolve => setTimeout(resolve, 45));
                    container.scrollTop = container.scrollHeight;
                }
                makeClickable(p);
                return p;
            }

            async function bootSequence() {
                inputField.disabled = true;
                aiStatus.textContent = '⚡ ENGINE COUGH... DIES... ⚡';
                outputDiv.innerHTML = '';

                // New eerie boot messages
                const bootMessages = [
                    '> ENGINE COUGHS... THEN DIES.',
                    '> BATTERY: 0%',
                    '> RADIO: STATIC ONLY...',
                    '> NO CELL SIGNAL.',
                    '> YOU STEP OUT INTO THE FOG.'
                ];

                for (let msg of bootMessages) {
                    appendOutput(msg);
                    await new Promise(r => setTimeout(r, 400));
                }

                appendOutput('> WALKING TOWARD THE LIGHTS...');
                const barContainer = document.createElement('p');
                outputDiv.appendChild(barContainer);
                for (let i = 0; i <= 20; i++) {
                    barContainer.textContent = '> WALKING TOWARD THE LIGHTS: [' + '█'.repeat(i) + '░'.repeat(20-i) + ']';
                    outputDiv.scrollTop = outputDiv.scrollHeight;
                    await new Promise(r => setTimeout(r, 80));
                }
                await new Promise(r => setTimeout(r, 300));
                outputDiv.innerHTML = '';
                const introWithoutState = filterStateFromContent(introMessage);
                await typewriterEffect(introWithoutState, outputDiv);
                aiStatus.textContent = '⚡ NIGHT PRESSES IN... AWAITING COMMAND ⚡';
                inputField.disabled = false;
                inputField.focus();
                updateHUDFromState(initialState);
            }

            function resetGame() {
                messages = [
                    { role: 'assistant', content: introMessage + "\n" + initialState }
                ];
                bootSequence();
            }

            function saveGame() {
                const dataStr = JSON.stringify(messages, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `last_stop_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                aiStatus.textContent = '💾 JOURNAL ENTRY SAVED';
                setTimeout(() => aiStatus.textContent = '⚡ NIGHT PRESSES IN... ⚡', 1500);
            }

            function loadGameFromFile(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const loaded = JSON.parse(e.target.result);
                        if (!Array.isArray(loaded) || loaded.length === 0) {
                            throw new Error('Invalid save file');
                        }
                        messages = loaded;
                        rebuildOutputFromMessages();
                        aiStatus.textContent = '📂 CASE NOTES LOADED';
                        inputField.disabled = false;
                        inputField.focus();
                        setTimeout(() => aiStatus.textContent = '⚡ NIGHT PRESSES IN... ⚡', 1500);
                    } catch (err) {
                        aiStatus.textContent = `❌ ERROR: ${err.message}`;
                    }
                };
                reader.readAsText(file);
            }

            function playKeySound() {
                try {
                    if (!audioCtx) {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 500;
                    gain.gain.setValueAtTime(0.02, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 0.05);
                } catch (e) {}
            }

            async function callFreeAI(userInput) {
                messages.push({ role: 'user', content: userInput });
                appendOutput('> ' + userInput.toUpperCase());

                aiStatus.textContent = '⏳ PROCESSNG... ⏳';
                inputField.disabled = true;

                // Start eerie floppy sound (like interference)
                startFloppySound();

                try {
                    let fullPrompt = systemPrompt + "\n\n";
                    for (let msg of messages) {
                        if (msg.role === 'user') {
                            fullPrompt += "Player: " + msg.content + "\n";
                        } else {
                            fullPrompt += "Game Master: " + msg.content + "\n";
                        }
                    }
                    fullPrompt += "Game Master:";

                    const url = `https://text.pollinations.ai/${encodeURIComponent(fullPrompt)}?model=openai&json=false&seed=${Math.floor(Math.random()*1000000)}`;
                    
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    let aiMessage = await response.text();

                    stopFloppySound();

                    if (!aiMessage.includes('##STATE##')) {
                        const lastAssistant = [...messages].reverse().find(m => m.role === 'assistant');
                        let lastState = '';
                        if (lastAssistant) {
                            const parts = lastAssistant.content.split('##STATE##');
                            if (parts.length > 1) lastState = '##STATE##' + parts[1];
                        }
                        if (!lastState) lastState = initialState;
                        aiMessage += '\n' + lastState;
                    }

                    const stateLineIndex = aiMessage.indexOf('##STATE##');
                    const displayText = stateLineIndex >= 0 ? aiMessage.substring(0, stateLineIndex).trim() : aiMessage;
                    const stateLine = stateLineIndex >= 0 ? aiMessage.substring(stateLineIndex) : '';

                    aiStatus.textContent = '⏳ OUTPUT... ⏳';
                    await typewriterEffect(displayText, outputDiv);

                    messages.push({ role: 'assistant', content: displayText + (stateLine ? '\n' + stateLine : '') });

                    if (stateLine) {
                        updateHUDFromState(stateLine);
                    }

                    aiStatus.textContent = '⚡ WAITING... ⚡';
                    inputField.disabled = false;
                    inputField.focus();
                } catch (err) {
                    stopFloppySound();
                    console.error(err);
                    aiStatus.textContent = `❌ STATIC OVERLOAD: ${err.message} ❌`;
                    messages.pop();
                    inputField.disabled = false;
                    inputField.focus();
                }
            }

            function handleCommand() {
                const cmd = inputField.value.trim();
                if (cmd === '') return;
                callFreeAI(cmd);
                inputField.value = '';
            }

            inputField.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleCommand();
                }
            });

            resetBtn.addEventListener('click', resetGame);
            saveBtn.addEventListener('click', saveGame);
            loadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) loadGameFromFile(e.target.files[0]);
                fileInput.value = '';
            });

            window.addEventListener('load', () => {
                bootSequence();
                document.body.addEventListener('click', function init() {
                    initAudio();
                    updateAmbientSound(currentLocation);
                }, { once: true });
            });
        })();
    </script>
</body>
</html>
