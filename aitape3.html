<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <title>VIDEO NASTY EXCHANGE</title>
    <style>
        :root {
            --red: #ff3333;
            --red-glow: #ff5555;
            --red-dim: #801111;
            --text-shadow-red: 0 0 8px rgba(255, 51, 51, 0.7), 0 0 20px rgba(255, 51, 51, 0.3);
            --button-bg: linear-gradient(180deg, #2a0a0a 0%, #0f0202 100%);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0606;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            background-image: radial-gradient(ellipse at center, #1a0e0e 0%, #050000 70%);
            padding: 10px;
            overflow: hidden;
            user-select: text;
        }
        .crt-monitor {
            background: #2e1b1b;
            border-radius: 20px;
            padding: 15px 12px 12px;
            box-shadow: 0 0 0 3px #111, 0 0 0 6px #2a1515, 0 0 0 8px #0a0908, 0 20px 40px rgba(0, 0, 0, 0.9);
            width: 100%;
            height: 100vh;
            max-height: 100%;
            display: flex;
            flex-direction: column;
        }
        .monitor-frame {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .screen-area {
            flex: 1;
            background: #0b0505;
            border-radius: 12px;
            padding: 8px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }
        .screen-glow {
            flex: 1;
            background: #080000;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.95), 0 0 15px rgba(255, 51, 51, 0.1);
            min-height: 0;
        }
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0, 0, 0, 0.08) 3px, rgba(0, 0, 0, 0.08) 4px);
            pointer-events: none;
            z-index: 10;
        }
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 8;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.8);
            border-radius: 6px;
        }
        .screen-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 12;
            padding: 6px;
            min-height: 0;
            overflow: hidden;
        }
        .title-bar {
            text-align: center;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 51, 51, 0.5);
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .title-bar .game-title {
            font-size: 14px;
            color: var(--red);
            text-shadow: var(--text-shadow-red);
            letter-spacing: 2px;
        }
        .title-bar .subtitle {
            font-size: 9px;
            color: #aa5555;
            margin-top: 2px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            background: rgba(15, 5, 5, 0.8);
            border: 1px solid var(--red-dim);
            margin-bottom: 4px;
            font-size: 11px;
            color: #ff5555;
            text-shadow: 0 0 6px rgba(255, 51, 51, 0.5);
            flex-shrink: 0;
        }
        .wallet-display {
            color: #ffaa00;
            text-shadow: 0 0 6px rgba(255, 170, 0, 0.6);
        }
        .game-output {
            flex: 1 1 0;
            overflow-y: auto;
            padding: 6px;
            color: var(--red);
            font-size: 20px;
            line-height: 1.5;
            text-shadow: var(--text-shadow-red);
            min-height: 0;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 51, 51, 0.2);
            margin-bottom: 4px;
            font-family: 'VT323', 'Press Start 2P', monospace;
            letter-spacing: 0.5px;
        }
        .game-output::-webkit-scrollbar {
            width: 5px;
        }
        .game-output::-webkit-scrollbar-track {
            background: #020101;
        }
        .game-output::-webkit-scrollbar-thumb {
            background: #661111;
            border-radius: 3px;
        }
        .crypt-keeper-text {
            color: #ccff00 !important;
            text-shadow: 0 0 10px #33ff00, 0 0 20px #006600 !important;
        }
        .input-area {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 4px 6px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 51, 51, 0.4);
            border-radius: 4px;
            margin-bottom: 4px;
        }
        .prompt-symbol {
            color: var(--red-glow);
            font-size: 18px;
        }
        .cmd-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #ff4444;
            font-family: 'VT323', 'Press Start 2P', monospace;
            font-size: 20px;
            padding: 6px;
            outline: none;
            caret-color: #ff0000;
            text-shadow: var(--text-shadow-red);
            letter-spacing: 0.5px;
        }
        .cmd-input::placeholder {
            color: #601111;
        }
        .actions-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 4px 0;
            flex-shrink: 0;
            justify-content: center;
        }
        .actions-bar button {
            background: var(--button-bg);
            border: 2px solid #4a1a1a;
            color: #ff4444;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            padding: 5px 6px;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 3px 0 #111;
            text-shadow: 0 0 6px rgba(255, 51, 51, 0.5);
            transition: all 0.1s;
            flex: 1 0 auto;
            min-width: 45px;
        }
        .actions-bar button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #111;
        }
        .actions-bar button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .monitor-brand {
            text-align: center;
            font-size: 8px;
            color: #3a2020;
            letter-spacing: 2px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .power-led {
            width: 8px;
            height: 8px;
            background: #ff3333;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff3333;
            animation: ledPulse 2s infinite;
        }
        @keyframes ledPulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 60;
            border-radius: 6px;
            flex-direction: column;
            gap: 10px;
        }
        .overlay.hidden {
            display: none !important;
        }
        .overlay-content {
            background: #0a0000;
            border: 2px solid #800;
            padding: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 80%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px #500;
            color: #ff4444;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }
        .overlay-content h3 {
            text-align: center;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--red);
            text-shadow: var(--text-shadow-red);
        }
        .overlay-close {
            background: var(--button-bg);
            border: 1px solid var(--red);
            color: var(--red);
            font-family: 'Press Start 2P';
            font-size: 10px;
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 8px;
            align-self: center;
        }
        #help-overlay .help-text {
            overflow-y: auto;
            flex: 1;
            font-size: 12px;
            line-height: 1.8;
            white-space: pre-wrap;
            color: #ff5555;
        }
        #talk-overlay .chat-area {
            flex: 1;
            overflow-y: auto;
            background: #050000;
            border: 1px solid #600;
            padding: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.6;
            min-height: 150px;
        }
        #talk-overlay .chat-input-line {
            display: flex;
            gap: 4px;
        }
        #talk-overlay .chat-input {
            flex: 1;
            background: transparent;
            border: 1px solid #800;
            color: #ff4444;
            font-family: 'Press Start 2P';
            font-size: 14px;
            padding: 6px;
            outline: none;
        }
        #talk-overlay .chat-send {
            background: var(--button-bg);
            border: 1px solid var(--red);
            color: var(--red);
            font-family: 'Press Start 2P';
            font-size: 10px;
            padding: 6px 12px;
            cursor: pointer;
        }
        #watch-overlay .overlay-content {
            max-width: 650px;
            height: 80vh;
        }
        .watch-tape-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            overflow-y: auto;
            flex: 1;
            min-height: 200px;
        }
        .tape-select-card {
            background: #0d0000;
            border: 1px solid #600;
            padding: 8px;
            cursor: pointer;
            width: 160px;
            text-align: center;
            font-size: 9px;
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .tape-select-card:hover {
            transform: scale(1.03);
            border-color: #900;
        }
        .tape-select-card .tape-thumb {
            width: 140px;
            height: 110px;
            object-fit: cover;
            border: 1px solid #500;
            background: #111;
            margin-bottom: 4px;
        }
        .tape-select-card .tape-title {
            color: #ff5555;
            margin-bottom: 2px;
        }
        .tape-select-card .tape-info {
            color: #aa5555;
            font-size: 7px;
        }
        #watch-playback {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }
        #watch-playback .movie-output {
            flex: 1;
            overflow-y: auto;
            background: #050000;
            border: 1px solid #600;
            padding: 8px;
            font-family: 'VT323', monospace;
            font-size: 16px;
            line-height: 1.5;
            color: #ff5555;
            text-shadow: 0 0 4px rgba(255, 0, 0, 0.5);
            margin-bottom: 8px;
            min-height: 0;
        }
        #watch-playback .movie-controls {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: auto;
        }
        #watch-playback .movie-controls button {
            background: var(--button-bg);
            border: 1px solid #800;
            color: #ff4444;
            font-family: 'Press Start 2P';
            font-size: 9px;
            padding: 6px 10px;
            cursor: pointer;
        }
        #binder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 220px);
            gap: 14px;
            overflow-y: auto;
            padding: 16px;
            background: #0a0000;
            border: 1px solid #800;
        }
        .card-slot {
            background: #0d0000;
            border: 1px solid #600;
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 10px #300;
        }
        .card-img {
            width: 200px;
            height: 160px;
            object-fit: cover;
            border: 1px solid #500;
            background: #111;
        }
        .card-placeholder {
            background: #111;
            border: 1px dashed #600;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            color: #600;
        }
        .card-info {
            margin-top: 6px;
            font-size: 0.5em;
            text-align: center;
            line-height: 1.5;
        }
        .card-name {
            color: #ff5555;
        }
        .card-rarity {
            color: #ffaa00;
        }
        .card-cond {
            color: #aa5555;
        }
        @media (orientation: landscape) {
            .crt-monitor {
                max-width: 800px;
                height: 95vh;
            }
            .game-output {
                font-size: 16px;
            }
            .cmd-input {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="crt-monitor">
        <div class="monitor-frame">
            <div class="screen-area">
                <div class="screen-glow">
                    <div class="scanlines"></div>
                    <div class="vignette"></div>
                    <div class="screen-content">
                        <div class="title-bar">
                            <span class="game-title">█▓▒░ VIDEO NASTY EXCHANGE ░▒▓█</span>
                            <span class="subtitle">A Horror Collector's BBS [1985]</span>
                        </div>
                        <div class="status-bar" id="statusBar">
                            <span>📼 <span id="tapeCount">0</span></span>
                            <span class="wallet-display">💰 $<span id="walletDisplay">20</span></span>
                            <span id="movieStatus">⏹️ IDLE</span>
                        </div>
                        <div class="game-output" id="output"></div>
                        <div class="input-area">
                            <span class="prompt-symbol">&gt;</span>
                            <input type="text" class="cmd-input" id="cmd" placeholder="TYPE COMMAND..." autofocus>
                            <button id="btnSend" style="background:var(--button-bg);border:2px solid #4a1a1a;color:#ff4444;font-family:'Press Start 2P';font-size:12px;padding:6px 10px;cursor:pointer;border-radius:4px;">SEND</button>
                        </div>
                        <div class="actions-bar">
                            <button id="btnCrate">📦 CRATE</button>
                            <button id="btnSearch">🔍 SEARCH</button>
                            <button id="btnTrade">🤝 TRADE</button>
                            <button id="btnBinder">📚 BINDER</button>
                            <button id="btnCasket" style="display:none;">⚰️ CASKET</button>
                            <button id="btnHelp">❓ HELP</button>
                            <button id="btnTalk">💬 TALK</button>
                            <button id="btnWatch">▶ WATCH</button>
                        </div>
                    </div>
                </div>

                <!-- HELP OVERLAY -->
                <div class="overlay hidden" id="help-overlay">
                    <div class="overlay-content">
                        <h3>📖 COMMANDS</h3>
                        <div class="help-text" id="helpText"></div>
                        <button class="overlay-close" id="closeHelp">CLOSE</button>
                    </div>
                </div>

                <!-- TALK OVERLAY -->
                <div class="overlay hidden" id="talk-overlay">
                    <div class="overlay-content">
                        <h3>💬 CRYPT KEEPER</h3>
                        <div class="chat-area" id="chatArea"></div>
                        <div class="chat-input-line">
                            <input type="text" class="chat-input" id="chatInput" placeholder="Speak...">
                            <button class="chat-send" id="chatSend">SEND</button>
                        </div>
                        <button class="overlay-close" id="closeTalk">LEAVE</button>
                    </div>
                </div>

                <!-- WATCH OVERLAY -->
                <div class="overlay hidden" id="watch-overlay">
                    <div class="overlay-content">
                        <h3>▶ WATCH TAPE</h3>
                        <div class="watch-tape-list" id="watchTapeList"></div>
                        <div id="watch-playback">
                            <div class="movie-output" id="movieOutput"></div>
                            <div class="movie-controls">
                                <button id="movieContinue">CONTINUE</button>
                                <button id="movieStop">STOP</button>
                                <button id="movieExport">EXPORT</button>
                            </div>
                        </div>
                        <button class="overlay-close" id="closeWatch">CLOSE</button>
                    </div>
                </div>

                <!-- KEY OVERLAY -->
                <div class="overlay hidden" id="key-overlay">
                    <div class="overlay-content" style="text-align:center;">
                        <h3>ENTER MISTRAL API KEY</h3>
                        <input type="text" id="api-key-input" placeholder="Paste your key here..." autocomplete="off" spellcheck="false" style="width:100%;padding:10px;background:#000;border:1px solid #800;color:#ff4444;font-family:'Press Start 2P';font-size:12px;margin-bottom:15px;">
                        <button id="save-key-btn" style="background:#200;border:1px solid #b00;color:#ff4444;font-family:'Press Start 2P';font-size:14px;padding:10px 24px;cursor:pointer;">SAVE KEY</button>
                        <p style="font-size:0.7em;margin-top:15px;color:#a00;">Key stored locally in your browser.</p>
                    </div>
                </div>

                <!-- BINDER OVERLAY -->
                <div class="overlay hidden" id="binder-overlay">
                    <div class="overlay-content" style="max-width:90vw;max-height:80vh;">
                        <h3>📚 COLLECTION BINDER</h3>
                        <div id="binder-grid"></div>
                        <div style="font-size:0.7em;color:#aa5555;margin-top:8px;">Press ESC or click CLOSE to return</div>
                        <button class="overlay-close" id="closeBinder">CLOSE</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="monitor-brand"><span class="power-led"></span> VNE TERMINAL v1.985</div>
    </div>

    <script>
        // ──────────────────────────────────────────────
        // VIDEO NASTY EXCHANGE – Complete working version
        // ──────────────────────────────────────────────
        let MISTRAL_KEY = '';
        const MODEL = 'mistral-small-latest';
        const API_URL = 'https://api.mistral.ai/v1/chat/completions';
        let imageCache = JSON.parse(localStorage.getItem('vn_imageCache') || '{}');

        function saveImageCache() { localStorage.setItem('vn_imageCache', JSON.stringify(imageCache)); }

        // DOM elements
        const keyOverlay = document.getElementById('key-overlay');
        const binderOverlay = document.getElementById('binder-overlay');
        const helpOverlay = document.getElementById('help-overlay');
        const talkOverlay = document.getElementById('talk-overlay');
        const watchOverlay = document.getElementById('watch-overlay');
        const outputEl = document.getElementById('output');
        const cmdInput = document.getElementById('cmd');
        const btnSend = document.getElementById('btnSend');
        const tapeCountDisplay = document.getElementById('tapeCount');
        const walletDisplay = document.getElementById('walletDisplay');
        const movieStatus = document.getElementById('movieStatus');
        const btnCasket = document.getElementById('btnCasket');

        // ═══════════════════════════════════════════
        // 🎵 ENHANCED SOUND SYSTEM
        // ═══════════════════════════════════════════
        let audioCtx = null;
        let soundEnabled = true;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function ensureAudio() {
            initAudio();
            return audioCtx && audioCtx.state !== 'suspended';
        }

        // Soft typewriter tick – fires per character during print()
        function playTypeTick() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = 500 + Math.random() * 300;
                gain.gain.setValueAtTime(0.012, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.012);
                osc.start(t);
                osc.stop(t + 0.012);
            } catch (e) {}
        }

        // UI button click – crisp, satisfying
        function playClick() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, t);
                osc.frequency.exponentialRampToValueAtTime(200, t + 0.05);
                gain.gain.setValueAtTime(0.06, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
                osc.start(t);
                osc.stop(t + 0.05);
            } catch (e) {}
        }

        // Success chime – ascending happy beeps
        function playSuccess() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                const freqs = [523, 659, 784]; // C5, E5, G5
                freqs.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    const startT = t + i * 0.08;
                    gain.gain.setValueAtTime(0.07, startT);
                    gain.gain.exponentialRampToValueAtTime(0.0001, startT + 0.12);
                    osc.start(startT);
                    osc.stop(startT + 0.12);
                });
            } catch (e) {}
        }

        // Error buzz – low, menacing
        function playError() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.value = 80;
                gain.gain.setValueAtTime(0.05, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
                osc.start(t);
                osc.stop(t + 0.2);
            } catch (e) {}
        }

        // Cash register – two quick ascending tones
        function playCash() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                [800, 1200].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    const startT = t + i * 0.06;
                    gain.gain.setValueAtTime(0.08, startT);
                    gain.gain.exponentialRampToValueAtTime(0.0001, startT + 0.08);
                    osc.start(startT);
                    osc.stop(startT + 0.08);
                });
            } catch (e) {}
        }

        // Creepy sound – descending minor interval
        function playCreepy() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, t);

        function playStatic() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                const duration = 0.3;
                const steps = 20;
                for (let i = 0; i < steps; i++) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'square';
                    osc.frequency.value = 200 + Math.random() * 3000;
                    const startT = t + (i / steps) * duration;
                    const len = duration / steps + 0.01;
                    gain.gain.setValueAtTime(0.03, startT);
                    gain.gain.exponentialRampToValueAtTime(0.0001, startT + len);
                    osc.start(startT);
                    osc.stop(startT + len);
                }
            } catch (e) {}
        }

                osc.frequency.exponentialRampToValueAtTime(800, t + 0.25);
                gain.gain.setValueAtTime(0.05, t);

        function openTalk() {

                    `<div style="color:#ff5555;">> ${msg.content}</div>`;

        }
        const CRYPT_KEEPER_SYS =
    `You are the Crypt Keeper, pun-loving horror host. Talk in groaning puns.
Sometimes ask a riddle, but NEVER reveal the answer in the chat.
Instead, put the answer inside a hidden tag: [ANSWER:the answer]
Always end a riddle message with that tag. Keep under 200 chars.`;

function extractRiddle(reply) {
    const match = reply.match(/\[ANSWER:(.+?)\]/i);
    if (match) {
        const answer = match[1].trim();
        // Remove the whole [ANSWER:...] tag from the visible message
        const display = reply.replace(/\[ANSWER:.+?\]/i, '').trim();
        return { display, answer };
    }
    return { display: reply, answer: null };
}

        async function sendTalkMessage() {
            const msg = chatInput.value.trim();

                   chatArea.innerHTML += '<div class="crypt-keeper-text">🔪 "Heh heh! Correct!"</div>';

    } else {

        // WATCH overlay
        const watchTapeList = document.getElementById('watchTapeList');
        const watchPlayback = document.getElementById('watch-playback');
        const movieOutput = document.getElementById('movieOutput');

        async function generateTapeThumbnail(tape) {
            const key = tape.title;
            if (imageCache[key]) return imageCache[key];
            try {
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(`VHS cover for banned horror film "${tape.title}", ${tape.coverDescription}`)}?width=140&height=110&nologo=true`;
                imageCache[key] = url;
                saveImageCache();
                return url;
            } catch (e) { return null; }
        }

        function openWatch() {
            if (!collection.length) { printInstant('No tapes.');
                playError(); return; }
            watchTapeList.innerHTML = '';
            watchTapeList.style.display = 'flex';
            watchPlayback.style.display = 'none';
            collection.forEach((tape, idx) => {
                const card = document.createElement('div');
                card.className = 'tape-select-card';
                const img = document.createElement('img');
                img.className = 'tape-thumb';
                img.src = imageCache[tape.title] || '';
                if (!img.src) {
                    img.style.display = 'none';
                    generateTapeThumbnail(tape).then(url => {
                        if (url) { img.src = url;
                            img.style.display = ''; }
                    });
                }
                card.innerHTML =
                    `<div class="tape-title">${tape.title}</div><div class="tape-info">${tape.rarity||'?'} | ${tape.condition||''}</div>`;
                card.prepend(img);
                card.addEventListener('click', () => startWatchMovie(idx));
                watchTapeList.appendChild(card);
            });
            showOverlay(watchOverlay);
        }
        async function startWatchMovie(idx) {
            const tape = collection[idx];
            watchActiveMovie = { tapeObj: tape, scenes: [], sceneIndex: 0 };
            watchTapeList.style.display = 'none';
            watchPlayback.style.display = 'flex';
            movieOutput.innerHTML = '';
            playCreepy();
            if (tape.script && tape.script.length > 0) {
                movieOutput.innerHTML += `▶ Re-watching "${tape.title}"...\n`;
                tape.script.forEach(s => { movieOutput.innerHTML += s + '\n'; });
                movieOutput.innerHTML += '\nThe film ends.';
            } else {
                movieOutput.innerHTML += `▶ Loading "${tape.title}"...\n`;
                const seg = await generateMovieSegment(tape, 'start');
                if (!seg) { movieOutput.innerHTML += '*** Blank tape.';
                    playStatic(); return; }
                if (seg.trim().toUpperCase() === '[STATIC]') {
                    movieOutput.innerHTML += '[STATIC]\nTape ends.';
                    watchActiveMovie.tapeObj.script = watchActiveMovie.scenes;
                    saveCollection();
                    watchActiveMovie = null;
                    playStatic();
                    return;
                }
                watchActiveMovie.scenes.push(seg);
                watchActiveMovie.sceneIndex = 1;
                movieOutput.innerHTML += seg + '\n[SCENE 1]\n';
            }
            movieOutput.scrollTop = 0;
        }
        async function continueWatchMovie() {
            if (!watchActiveMovie) return;
            const tape = watchActiveMovie.tapeObj;
            const seg = await generateMovieSegment(tape, 'continue');
            if (!seg) { movieOutput.innerHTML += '*** Static...';
                playStatic(); return; }
            if (seg.trim().toUpperCase() === '[STATIC]') {
                movieOutput.innerHTML += '[STATIC]\nThe film has ended.';
                watchActiveMovie.tapeObj.script = watchActiveMovie.scenes;
                saveCollection();
                watchActiveMovie = null;
                playStatic();
                return;
            }
            watchActiveMovie.scenes.push(seg);
            watchActiveMovie.sceneIndex++;
            movieOutput.innerHTML += seg + `\n[SCENE ${watchActiveMovie.sceneIndex}]\n`;
            movieOutput.scrollTop = movieOutput.scrollHeight;
            playClick();
        }

        function stopWatchMovie() {
            if (!watchActiveMovie) return;
            watchActiveMovie.tapeObj.script = watchActiveMovie.scenes;
            saveCollection();
            movieOutput.innerHTML += '\nEjected.';
            watchActiveMovie = null;
            playClose();
        }

        function exportWatchMovie() {
            if (!watchActiveMovie || !watchActiveMovie.tapeObj.script) return;
            const tape = watchActiveMovie.tapeObj;
            const scenesHtml = tape.script.map((s, i) =>
                `<div><strong>SCENE ${i+1}</strong><br>${s.replace(/\n/g,'<br>')}</div>`).join('');
            const html =
                `<html><head><title>${tape.title}</title></head><body><h1>${tape.title}</h1>${scenesHtml}</body></html>`;
            const w = window.open('', '_blank');
            w.document.write(html);
            w.document.close();
            w.print();
            playClick();
        }

        // BINDER
        async function generateCardImage(tape) {
            return `https://image.pollinations.ai/prompt/${encodeURIComponent(`VHS cover art for "${tape.title}", ${tape.coverDescription}`)}?width=200&height=160&nologo=true`;
        }
        async function loadCardImage(key, tape, imgElement) {
            if (imageCache[key]) { imgElement.src = imageCache[key];
                imgElement.classList.remove('card-placeholder'); return; }
            const url = await generateCardImage(tape);
            imageCache[key] = url;
            saveImageCache();
            imgElement.src = url;
            imgElement.classList.remove('card-placeholder');
        }

        function showVisualBinder() {
            if (!collection.length) { printInstant('Collection empty.');
                playError(); return; }
            const grouped = {};
            collection.forEach(tape => {
                const k = tape.title;
                if (!grouped[k]) grouped[k] = { tape, copies: [] };
                grouped[k].copies.push(tape.condition || '?');
            });
            const binderGrid = document.getElementById('binder-grid');
            binderGrid.innerHTML = '';
            Object.values(grouped).forEach(entry => {
                const tape = entry.tape;
                const condStr = entry.copies.join(', ');
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                const img = document.createElement('img');
                img.className = 'card-img card-placeholder';
                img.alt = tape.title;
                loadCardImage(tape.title, tape, img);
                const info = document.createElement('div');
                info.className = 'card-info';
                info.innerHTML =
                    `<div class="card-name">${tape.title}</div><div class="card-rarity">[${tape.rarity}]</div><div class="card-cond">${condStr}</div>`;
                slot.appendChild(img);
                slot.appendChild(info);
                binderGrid.appendChild(slot);
            });
            showOverlay(binderOverlay);
        }

        function hideVisualBinder() { hideOverlay(binderOverlay); }

        // Main command handler
        async function handleCommand(raw) {
            if (!raw) return;
            const upper = raw.toUpperCase();
            printInstant(`> ${raw}`);
            playClick();
            if (activeMovie) {
                if (upper === 'CONTINUE') printInstant('Use overlay to continue.');
                else if (upper === 'STOP') printInstant('Use overlay to stop.');
                else if (upper === 'MUTE') { soundEnabled = false;
                    printInstant('Muted.'); } else if (upper === 'UNMUTE') { soundEnabled = true;
                    printInstant('Unmuted.');
                    playClick(); } else if (upper === 'HELP') openHelp();
                return;
            }
            if (upper === 'CRATE') await cmdCrate();
            else if (upper.startsWith('BUY ')) {
                const n = parseInt(raw.slice(4));
                if (isNaN(n)) printInstant('BUY [number]');
                else await cmdBuy(n);
            } else if (upper.startsWith('SELL ')) {
                const t = raw.slice(5).trim();
                if (!t) printInstant('SELL [title]');
                else await cmdSell(t);
            } else if (upper === 'SEARCH') await cmdSearch();
            else if (upper === 'TRADE') await cmdTrade();
            else if (upper.startsWith('REVIEW ')) {
                const t = raw.slice(7).trim();
                if (!t) printInstant('REVIEW [title]');
                else await cmdReview(t);
            } else if (upper === 'WANTED') await cmdWanted();
            else if (upper === 'SHOW') cmdShowCollection();
            else if (upper === 'BINDER') showVisualBinder();
            else if (upper === 'WATCH') openWatch();
            else if (upper === 'HELP') openHelp();
            else if (upper === 'TALK') openTalk();
            else if (upper === 'ACCEPT' || upper === 'Y') acceptTrade();
            else if (upper === 'DECLINE' || upper === 'N') declineTrade();
            else if (upper === 'SETKEY') {
                MISTRAL_KEY = '';
                localStorage.removeItem('vn_api_key');
                keyOverlay.classList.remove('hidden');
                keyOverlay.style.display = 'flex';
                playOpen();
            } else if (upper === 'MUTE') { soundEnabled = false;
                printInstant('Muted.'); } else if (upper === 'UNMUTE') { soundEnabled = true;
                printInstant('Unmuted.');
                playClick(); } else if (upper === 'CLEAR') { outputEl.innerHTML = '';
                playStatic(); } else if (upper === 'RANK') cmdRank();
            else if (upper === 'WALLET') cmdWallet();
            else if (upper === 'CASKET') await cmdCasket();
            else if (upper.startsWith('EMBALM ')) {
                const t = raw.slice(7).trim();
                if (!t) printInstant('EMBALM [title]');
                else await cmdEmbalm(t);
            } else { printInstant('Unknown command. Type HELP.');
                playError(); }
        }

        // Event listeners
        cmdInput.addEventListener('keydown', async e => {
            if (e.key === 'Enter') {
                initAudio();
                const raw = cmdInput.value.trim();
                cmdInput.value = '';
                await handleCommand(raw);
            }
        });
        btnSend.addEventListener('click', async () => {
            initAudio();
            playClick();
            const raw = cmdInput.value.trim();
            cmdInput.value = '';
            await handleCommand(raw);
        });
        document.getElementById('btnCrate').addEventListener('click', () => { initAudio();
            handleCommand('CRATE'); });
        document.getElementById('btnSearch').addEventListener('click', () => { initAudio();
            handleCommand('SEARCH'); });
        document.getElementById('btnTrade').addEventListener('click', () => { initAudio();
            handleCommand('TRADE'); });
        document.getElementById('btnBinder').addEventListener('click', () => { initAudio();
            handleCommand('BINDER'); });
        btnCasket.addEventListener('click', () => { initAudio();
            handleCommand('CASKET'); });
        document.getElementById('btnHelp').addEventListener('click', () => { initAudio();
            openHelp(); });
        document.getElementById('btnTalk').addEventListener('click', () => { initAudio();
            openTalk(); });
        document.getElementById('btnWatch').addEventListener('click', () => { initAudio();
            openWatch(); });
        document.getElementById('closeHelp').addEventListener('click', () => hideOverlay(helpOverlay));
        document.getElementById('closeTalk').addEventListener('click', () => hideOverlay(talkOverlay));
        document.getElementById('closeWatch').addEventListener('click', () => { stopWatchMovie();
            hideOverlay(watchOverlay); });
        document.getElementById('closeBinder').addEventListener('click', hideVisualBinder);
        chatSend.addEventListener('click', () => { initAudio();
            sendTalkMessage(); });
        chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') { initAudio();
                sendTalkMessage(); } });
        document.getElementById('movieContinue').addEventListener('click', () => { initAudio();
            continueWatchMovie(); });
        document.getElementById('movieStop').addEventListener('click', () => { initAudio();
            stopWatchMovie(); });
        document.getElementById('movieExport').addEventListener('click', () => { initAudio();

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && !binderOverlay.classList.contains('hidden')) hideVisualBinder();

        // Key init
        let savedKey = localStorage.getItem('vn_api_key');
        if (!savedKey) {
            keyOverlay.classList.remove('hidden');
            keyOverlay.style.display = 'flex';
        } else {
            MISTRAL_KEY = savedKey;

        document.getElementById('save-key-btn').addEventListener('click', () => {
            initAudio();
            playClick();
            const key = document.getElementById('api-key-input').value.trim();
            if (key) {
                MISTRAL_KEY = key;
                localStorage.setItem('vn_api_key', key);
                keyOverlay.classList.add('hidden');
                keyOverlay.style.display = '';
                playSuccess();
                if (!window.booted) { window.booted = true;
                    boot(); }

            await print("   N A S T Y   E X C H A N G E\n");
            printInstant('Type HELP for commands.\n');
