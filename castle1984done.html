<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Castle of the Undead 1984 — DEEP REALMS</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
    <style>
        /* ---------- CCS RETRO TERMINAL – DEEP EDITION ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            line-height: 1.5;
            padding: 12px;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .game-header {
            text-align: center;
            margin-bottom: 12px;
            border-bottom: 1px dashed #fff;
            padding-bottom: 8px;
        }
        .game-title {
            font-size: 20px;
            margin-bottom: 6px;
            text-shadow: 0 0 5px #fff;
        }
        .game-subtitle {
            font-size: 9px;
            color: #ccc;
            margin-bottom: 3px;
        }

        /* ---------- CLASS SELECTOR (initially visible) ---------- */
        .class-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: #222;
            border: 2px solid #fff;
            padding: 12px;
            margin-bottom: 12px;
            justify-content: center;
        }
        .class-btn {
            background: #000;
            border: 2px solid #fff;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 10px;
            flex: 1 0 100px;
            cursor: pointer;
        }
        .class-btn:active { background: #0f0; color: #000; }

        /* ---------- STATUS BAR – with mute toggle ---------- */
        .status-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background-color: #222;
            border: 1px solid #444;
            padding: 8px 10px;
            margin-bottom: 12px;
            font-size: 10px;
            row-gap: 6px;
        }
        .status-item {
            display: flex;
            align-items: center;
            margin-right: 8px;
        }
        .health-bar, .mp-bar {
            width: 70px;
            height: 10px;
            background-color: #333;
            margin-left: 5px;
            border: 1px solid #555;
        }
        .health-fill { height: 100%; background-color: #ff5555; transition: width 0.2s; }
        .mp-fill { height: 100%; background-color: #55aaff; transition: width 0.2s; }

        .mute-btn {
            background: #000;
            border: 1px solid #fff;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 4px 8px;
            cursor: pointer;
            margin-left: auto;
        }
        .mute-btn.active { background-color: #ff0000; border-color: #ff0000; }

        /* ---------- GAME OUTPUT ---------- */
        .game-container {
            border: 2px solid #fff;
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex: 1 1 auto;
            min-height: 0;
            margin-bottom: 12px;
        }
        .game-output {
            flex: 1 1 auto;
            overflow-y: auto;
            padding: 12px;
            background-color: #111;
            border: 1px solid #333;
            font-size: 12px;
            line-height: 1.5;
            max-height: 35vh;
        }
        .game-output p { margin-bottom: 8px; animation: fadeIn 0.2s; }
        .game-output .location { color: #ffff00; }
        .game-output .hint { color: #888; font-size: 10px; }
        .game-output .victory { color: #ffff55; }
        .game-output .gold { color: #ffd700; }
        .game-output .damage { color: #ff9966; }
        .game-output .skill { color: #55aaff; }
        .game-output .stat { color: #88ddff; }
        .game-output .magic { color: #ff66ff; }
        .game-output .rare { color: #ff66aa; }
        .game-output .epic { color: #aa66ff; }
        .game-output .burn { color: #ff5500; }
        .game-output .stun { color: #ffff00; }
        .game-output .poison { color: #88ff88; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ---------- TOUCH BUTTON GRID ---------- */
        .button-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 5px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            background: #1a1a1a;
            padding: 10px;
            border: 1px solid #444;
        }
        .btn-label {
            color: #aaa;
            font-size: 10px;
            width: 100%;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .cmd-btn {
            background-color: #000;
            border: 2px solid #fff;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            padding: 12px 10px;
            cursor: pointer;
            transition: 0.05s;
            text-shadow: 0 0 2px #fff;
            flex: 1 0 calc(33.33% - 8px);
            min-width: 90px;
            text-align: center;
            line-height: 1.2;
            word-break: break-word;
            -webkit-tap-highlight-color: transparent;
        }
        .cmd-btn:active { background-color: #0f0; color: #000; border-color: #0f0; }
        #skills-container .cmd-btn { flex: 1 0 calc(50% - 8px); }
        #stat-points-container .cmd-btn { flex: 1 0 calc(25% - 8px); min-width: 70px; font-size: 10px; }

        /* ---------- EQUIPMENT PANEL ---------- */
        .equipment-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 5px;
            background: #1a1a1a;
            padding: 12px;
            border: 2px solid #fff;
        }
        .equipment-slots, .inventory-equipment {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            background: #111;
            padding: 10px;
            border: 1px solid #444;
        }
        .slot-btn, .inv-item-btn {
            background-color: #000;
            border: 2px solid #aaa;
            color: #ddd;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            padding: 8px 5px;
            cursor: pointer;
            flex: 1 0 calc(25% - 6px);
            min-width: 70px;
            text-align: center;
            word-break: break-word;
        }
        .slot-btn.equipped { border-color: #0f0; background: #030; }
        .inv-item-btn { border-color: #88f; background: #112; }

        @media (max-width: 450px) {
            body { padding: 8px; }
            .game-title { font-size: 18px; }
            .cmd-btn { font-size: 10px; padding: 10px 6px; min-width: 70px; }
            .status-bar { font-size: 9px; }
            .health-bar, .mp-bar { width: 60px; }
        }
    </style>
</head>
<body>

            <!-- SHOP & UPGRADES -->

                <button class="cmd-btn" id="btn-buy-potion">BUY POTION</button>

                <button class="cmd-btn" id="btn-buy-antidote">BUY ANTIDOTE</button>

            </div>
            <!-- GEAR & META -->
            <div class="btn-group">
                <span class="btn-label">⚙️ GEAR</span>
                <button class="cmd-btn" id="btn-toggle-equip">EQUIP</button>
                <button class="cmd-btn" id="btn-quest-log">QUEST</button>
                <button class="cmd-btn" id="btn-achievements">ACHIEVE</button>

    <script>
        (function() {
            // ---------- WEB AUDIO ENGINE (extended) ----------
            const AudioManager = (function() {
                let audioCtx = null;
                let muted = false;

                function initContext() {
                    if (!audioCtx) {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    return audioCtx;
                }

                function playSound(type, pitch = 800, duration = 0.1, vol = 0.2) {
                    if (muted) return;
                    try {
                        const ctx = initContext();
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = type;
                        osc.frequency.value = pitch;
                        gain.gain.setValueAtTime(vol, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start();
                        osc.stop(ctx.currentTime + duration);
                    } catch (e) {}
                }

                return {
                    init: function() { initContext(); },
                    toggleMute: function() { muted = !muted; return muted; },
                    isMuted: () => muted,
                    click: function() { playSound('square', 880, 0.05, 0.1); },
                    encounter: function() {
                        if (muted) return;
                        try { const ctx = initContext();
                            const noise = ctx.createBufferSource();
                            const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
                            noise.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0.15, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                            noise.connect(gain);
                            gain.connect(ctx.destination);
                            noise.start();
                            noise.stop(ctx.currentTime + 0.3);
                        } catch(e) {}
                    },
                    attack: function() { playSound('sawtooth', 220, 0.15, 0.15); },
                    enemyHit: function() { playSound('square', 180, 0.1, 0.12); },
                    playerHit: function() { playSound('sawtooth', 120, 0.2, 0.18); },
                    victory: function() {
                        if (muted) return;
                        try { const ctx = initContext(); const now = ctx.currentTime;
                            [523.25, 659.25, 783.99].forEach((freq, i) => {
                                const osc = ctx.createOscillator();
                                const gain = ctx.createGain();
                                osc.frequency.value = freq; osc.type = 'square';
                                gain.gain.setValueAtTime(0.1, now + i * 0.08);
                                gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.2);
                                osc.connect(gain); gain.connect(ctx.destination);
                                osc.start(now + i * 0.08); osc.stop(now + i * 0.08 + 0.2);
                            });
                        } catch(e) {}
                    },
                    levelUp: function() {
                        if (muted) return;
                        try { const ctx = initContext(); const now = ctx.currentTime;
                            [392, 523.25, 659.25, 783.99, 1046.5].forEach((freq,i) => {
                                const osc = ctx.createOscillator();
                                const gain = ctx.createGain();
                                osc.frequency.value = freq; osc.type = 'triangle';
                                gain.gain.setValueAtTime(0.12, now + i * 0.1);
                                gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.25);
                                osc.connect(gain); gain.connect(ctx.destination);
                                osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.25);
                            });
                        } catch(e) {}
                    },
                    heal: function() { playSound('sine', 740, 0.25, 0.2); },
                    error: function() { playSound('square', 180, 0.2, 0.12); },
                    item: function() { playSound('sine', 1200, 0.08, 0.1); },
                    purchase: function() { playSound('square', 600, 0.1, 0.12); },
                    flee: function() { playSound('sawtooth', 300, 0.2, 0.1); },
                    rest: function() { playSound('sine', 500, 0.3, 0.15); },
                    equip: function() { playSound('square', 1100, 0.06, 0.1); },
                    poison: function() { playSound('sawtooth', 90, 0.4, 0.12); },
                    burn: function() { playSound('sawtooth', 300, 0.3, 0.15); },
                    stun: function() { playSound('square', 150, 0.2, 0.1); }
                };
            })();

            // ---------- ITEM DATABASE (expanded) ----------
            const ItemDB = {
                "Rusty Sword": { name: "Rusty Sword", slot: "mainHand", type: "sword", bonusAtk: 5, bonusStr: 1, value: 30, rarity: "common", req: { str: 5 } },
                "Iron Sword": { name: "Iron Sword", slot: "mainHand", type: "sword", bonusAtk: 10, bonusStr: 2, value: 80, rarity: "uncommon", req: { str: 8 } },

                "Wooden Shield": { name: "Wooden Shield", slot: "offHand", type: "shield", bonusDef: 6, bonusVit: 1, block: 0.15, value: 25, rarity: "common" },
                "Iron Shield": { name: "Iron Shield", slot: "offHand", type: "shield", bonusDef: 12, bonusVit: 2, block: 0.2, value: 70, rarity: "uncommon", req: { str: 10 } },
                "Battle Axe": { name: "Battle Axe", slot: "mainHand", type: "axe", bonusAtk: 15, bonusStr: 3, value: 110, rarity: "rare", req: { str: 14 } },
                "Staff": { name: "Staff", slot: "mainHand", type: "staff", bonusInt: 4, bonusMP: 10, magicPower: 8, value: 45, rarity: "common", req: { int: 8 } },
                "Leather Armor": { name: "Leather Armor", slot: "chest", type: "light", bonusDef: 4, bonusVit: 1, value: 25, rarity: "common" },

                "Iron Helm": { name: "Iron Helm", slot: "head", type: "heavy", bonusDef: 5, bonusVit: 1, value: 40, rarity: "common", req: { str: 8 } },
                "Leather Cap": { name: "Leather Cap", slot: "head", type: "light", bonusDef: 2, bonusDex: 1, value: 18, rarity: "common" },
                "Gauntlets": { name: "Gauntlets", slot: "hands", type: "heavy", bonusDef: 3, bonusAtk: 2, value: 35, rarity: "common", req: { str: 8 } },

                // New elemental resistance items
                "Ring of Fire Resist": { name: "Ring of Fire Resist", slot: "accessory1", type: "ring", bonusResist: { fire: 25 }, value: 70, rarity: "rare" },
                "Amulet of Frost": { name: "Amulet of Frost", slot: "accessory2", type: "amulet", bonusResist: { ice: 25 }, value: 70, rarity: "rare" }
            };

            // ---------- EXPANDED SET BONUSES ----------
            const SetBonuses = {
                "Iron Set": { pieces: ["Iron Helm", "Chainmail", "Gauntlets", "Greaves", "Iron Boots"], 
                    bonuses: { 2: { bonusDef: 5, bonusStr: 2 }, 4: { bonusDef: 8, bonusVit: 2 } } },
                "Leather Set": { pieces: ["Leather Cap", "Leather Armor", "Leather Gloves", "Leather Boots"], 
                    bonuses: { 2: { bonusDex: 3, bonusCrit: 0.05 }, 4: { bonusDodge: 0.08 } } },
                "Cultist Set": { pieces: ["Staff", "Ring of Strength", "Amulet of Health"], // simplified
                    bonuses: { 2: { bonusInt: 4, bonusMP: 15 }, 3: { magicPower: 10, fireResist: 20 } } },
                "Berserker Set": { pieces: ["Battle Axe", "Iron Helm", "Iron Boots"],
                    bonuses: { 2: { bonusStr: 5, bonusAtk: 8 }, 3: { bonusCrit: 0.1, bonusDef: -5 } } },
                "Assassin Set": { pieces: ["Dagger", "Leather Gloves", "Leather Boots", "Ring of Dexterity"],
                    bonuses: { 2: { bonusDex: 4, bonusCrit: 0.08 }, 4: { bonusDodge: 0.1, backstab: true } } }
            };

            // ---------- ACHIEVEMENTS ----------
            const AchievementDefs = [
                { id: "firstBlood", name: "First Blood", desc: "Kill your first enemy", condition: (p) => p.achievementCounts.kills >= 1, reward: "Title: Novice Slayer" },
                { id: "skeletonSlayer", name: "Skeleton Slayer", desc: "Kill 10 skeletons", condition: (p) => (p.achievementCounts.killTypes?.Skeleton || 0) >= 10, reward: "Title: Bone Breaker" },
                { id: "rich", name: "Filthy Rich", desc: "Accumulate 500 gold", condition: (p) => p.base.gold >= 500, reward: "Title: Gilded" },
                { id: "collector", name: "Collector", desc: "Own 10 equipment pieces", condition: (p) => p.inventory.equipment.length >= 10, reward: "Title: Pack Rat" },
                { id: "setMaster", name: "Set Master", desc: "Activate a 4-piece set bonus", condition: (p) => p.setBonuses.some(s => s.includes("(4)")), reward: "Title: Synergist" },
                { id: "classMaster", name: "Class Master", desc: "Reach level 10", condition: (p) => p.level >= 10, reward: "Title: Legend" }
            ];

            // ---------- QUEST SYSTEM ----------
            let quest = {
                active: { type: "kill", target: "Skeleton", current: 0, required: 3, rewardXP: 150, rewardGold: 50, rewardItem: "Iron Sword" },
                completed: false
            };

            // ---------- PLAYER OBJECT (expanded) ----------
            const player = {
                class: null, // initially null, must choose
                level: 1, xp: 0, xpNext: 100,
                base: { str: 10, dex: 10, int: 10, vit: 10, gold: 30 },
                // currentHP/MP will be set after recalc
                statPoints: 0,
                skills: ["Slash"],
                equipment: {
                    head: null, chest: { ...ItemDB["Leather Armor"] }, hands: null, legs: null, feet: null,
                    mainHand: { ...ItemDB["Rusty Sword"] }, offHand: null, accessory1: null, accessory2: null
                },
                inventory: {
                    consumables: { healthPotion: 2, ether: 1, bomb: 0, antidote: 0, elixir: 0, fireScroll: 0 },
                    equipment: [ { ...ItemDB["Dagger"] }, { ...ItemDB["Wooden Shield"] }, { ...ItemDB["Leather Cap"] } ]
                },
                // Achievements
                achievements: [],
                achievementCounts: { kills: 0, killTypes: {}, goldEarned: 0 },
                titles: [],

                statusEffects: [],
                // Resistances (percentage)
                resistances: { fire: 0, ice: 0, lightning: 0, holy: 0, dark: 0, poison: 0 },
                // computed stats (filled by recalcStats)
                finalAttack: 0, finalDefense: 0, finalCrit: 0.05, finalDodge: 0.05, finalBlock: 0,
                setBonuses: [],
                defending: false,
                focusBuff: null,
                classPassive: null,
                maxHP: 0,   // will be set by recalcStats
                maxMP: 0
            };

            // ---------- ENEMIES (expanded with status effects & resistances) ----------
            const enemies = [
                { name: "Zombie", level:1, maxHP:38, minDamage:6, maxDamage:11, xpReward:45, goldReward:8, armor:2, resistances: ["cold"], weaknesses: ["fire"], poisonAttack: true },
                { name: "Skeleton", level:2, maxHP:45, minDamage:8, maxDamage:14, xpReward:60, goldReward:12, armor:4, resistances: ["pierce"], weaknesses: ["blunt","lightning"] },
                { name: "Ghoul", level:2, maxHP:52, minDamage:9, maxDamage:16, xpReward:70, goldReward:15, armor:3, resistances: ["dark"], weaknesses: ["holy","fire"], poisonAttack: true },
                { name: "Vampire Spawn", level:3, maxHP:70, minDamage:12, maxDamage:19, xpReward:100, goldReward:25, armor:5, resistances: ["cold"], weaknesses: ["holy","fire"] },
                { name: "Wraith", level:4, maxHP:64, minDamage:14, maxDamage:22, xpReward:130, goldReward:30, armor:2, ethereal:true, resistances: ["physical"], weaknesses: ["magic","holy"] },
                { name: "Flame Elemental", level:4, maxHP:60, minDamage:15, maxDamage:24, xpReward:140, goldReward:28, armor:3, resistances: ["fire"], weaknesses: ["ice"], burnAttack: true },
                { name: "Death Knight", level:5, maxHP:95, minDamage:16, maxDamage:25, xpReward:180, goldReward:45, armor:8, resistances: ["pierce","fire"], weaknesses: ["holy","lightning"] },
                { name: "Necromancer", level:6, maxHP:110, minDamage:18, maxDamage:28, xpReward:250, goldReward:60, armor:4, weaknesses: ["holy"], resistances: ["dark","cold"] }
            ];

            // ---------- GAME STATE ----------
            let inCombat = false;
            let currentEnemy = null;
            let gameEnded = false;
            let equipmentPanelVisible = false;

            // ---------- UI ----------
            const gameOutput = document.getElementById('game-output');
            function addToOutput(text, className = '') {
                const p = document.createElement('p');
                p.textContent = text;
                if (className) p.className = className;
                gameOutput.appendChild(p);
                gameOutput.scrollTop = gameOutput.scrollHeight;
            }

            // ---------- RECALC STATS (with resistances & sets) ----------
            function recalcStats() {
                // Reset base stats to raw (without equipment)
                let baseStr = player.base.str, baseDex = player.base.dex, baseInt = player.base.int, baseVit = player.base.vit;
                let atk = 10 + baseStr * 1.5 + baseDex * 0.5;
                let def = 5 + baseVit * 1.2 + baseDex * 0.3;
                let maxHP = 100 + (baseVit - 10) * 10;
                let maxMP = 50 + (baseInt - 10) * 5;
                let crit = 0.05 + baseDex * 0.005;
                let dodge = 0.05 + baseDex * 0.003;
                let block = 0;
                let resistances = { fire:0, ice:0, lightning:0, holy:0, dark:0, poison:0 };

                // Accumulate stat bonuses from gear
                let tempStr = baseStr, tempDex = baseDex, tempInt = baseInt, tempVit = baseVit;
                for (let slot in player.equipment) {
                    const item = player.equipment[slot];
                    if (item) {
                        atk += item.bonusAtk || 0;
                        def += item.bonusDef || 0;
                        maxHP += item.bonusHP || 0;
                        maxMP += item.bonusMP || 0;
                        crit += item.bonusCrit || 0;
                        dodge += item.bonusDodge || 0;
                        block += item.block || 0;
                        if (item.bonusResist) {
                            for (let r in item.bonusResist) resistances[r] = (resistances[r]||0) + item.bonusResist[r];
                        }
                        tempStr += item.bonusStr || 0;
                        tempDex += item.bonusDex || 0;
                        tempInt += item.bonusInt || 0;
                        tempVit += item.bonusVit || 0;
                    }
                }

                // Recompute with temp stats for derived values
                atk = 10 + tempStr * 1.5 + tempDex * 0.5;
                def = 5 + tempVit * 1.2 + tempDex * 0.3;
                maxHP = 100 + (tempVit - 10) * 10;
                maxMP = 50 + (tempInt - 10) * 5;

                // Set bonuses
                player.setBonuses = [];
                const equippedNames = Object.values(player.equipment).filter(i => i).map(i => i.name);
                for (let setName in SetBonuses) {
                    const set = SetBonuses[setName];
                    let count = set.pieces.filter(p => equippedNames.includes(p)).length;
                    for (let threshold in set.bonuses) {
                        if (count >= parseInt(threshold)) {
                            let bonus = set.bonuses[threshold];
                            if (bonus.bonusDef) def += bonus.bonusDef;
                            if (bonus.bonusStr) tempStr += bonus.bonusStr;
                            if (bonus.bonusDex) tempDex += bonus.bonusDex;
                            if (bonus.bonusInt) tempInt += bonus.bonusInt;
                            if (bonus.bonusVit) tempVit += bonus.bonusVit;
                            if (bonus.bonusCrit) crit += bonus.bonusCrit;
                            if (bonus.bonusDodge) dodge += bonus.bonusDodge;
                            if (bonus.bonusAtk) atk += bonus.bonusAtk;
                            if (bonus.fireResist) resistances.fire += bonus.fireResist;
                            player.setBonuses.push(`${setName} (${threshold})`);
                        }
                    }
                }

                // Apply class passives
                if (player.class === "Warrior") {
                    maxHP = Math.floor(maxHP * 1.1);
                } else if (player.class === "Rogue") {
                    crit += 0.05;
                } else if (player.class === "Mage") {
                    maxMP = Math.floor(maxMP * 1.1);
                }

                player.finalAttack = Math.floor(atk);
                player.finalDefense = Math.floor(def);
                player.finalCrit = Math.min(0.8, crit);
                player.finalDodge = Math.min(0.5, dodge);
                player.finalBlock = Math.min(0.6, block);
                player.maxHP = Math.floor(maxHP);
                player.maxMP = Math.floor(maxMP);
                player.resistances = resistances;

                // Ensure current HP/MP are within bounds (if they exist)
                if (player.base.currentHP === undefined) player.base.currentHP = player.maxHP;
                if (player.base.currentMP === undefined) player.base.currentMP = player.maxMP;
                if (player.base.currentHP > player.maxHP) player.base.currentHP = player.maxHP;
                if (player.base.currentMP > player.maxMP) player.base.currentMP = player.maxMP;
                if (player.base.currentHP < 0) player.base.currentHP = 0;
            }

            // ---------- UPDATE UI ----------
            function updateStatus() {
                document.getElementById('player-hp-text').textContent = `${player.base.currentHP || 0}/${player.maxHP || 0}`;
                document.getElementById('player-health-fill').style.width = player.maxHP ? `${((player.base.currentHP || 0)/player.maxHP)*100}%` : '0%';
                document.getElementById('player-mp-text').textContent = `${player.base.currentMP || 0}/${player.maxMP || 0}`;
                document.getElementById('player-mp-fill').style.width = player.maxMP ? `${((player.base.currentMP || 0)/player.maxMP)*100}%` : '0%';
                document.getElementById('player-level').textContent = player.level;
                document.getElementById('player-xp').textContent = `${player.xp}/${player.xpNext}`;
                document.getElementById('player-atk').textContent = player.finalAttack;
                document.getElementById('player-def').textContent = player.finalDefense;
                document.getElementById('player-gold').textContent = player.base.gold;
                let invCount = (player.inventory.consumables.healthPotion||0)+(player.inventory.consumables.ether||0)+(player.inventory.consumables.bomb||0)+(player.inventory.consumables.antidote||0)+(player.inventory.consumables.elixir||0)+(player.inventory.consumables.fireScroll||0)+player.inventory.equipment.length;
                document.getElementById('inventory-count').textContent = invCount;
                document.getElementById('stat-points-container').style.display = player.statPoints > 0 ? 'flex' : 'none';
                renderSkillButtons();
                if (equipmentPanelVisible) renderEquipmentPanel();
            }

            // ---------- SKILL BUTTONS (unlock with level) ----------
            function renderSkillButtons() {
                const container = document.getElementById('skills-container');
                container.innerHTML = '<span class="btn-label">✨ SKILLS</span>';
                player.skills.forEach(skill => {
                    if (skill === 'Slash') return;
                    const btn = document.createElement('button');
                    btn.className = 'cmd-btn';
                    btn.textContent = skill.toUpperCase();
                    btn.onclick = (e) => { AudioManager.click(); useSkill(skill); };
                    container.appendChild(btn);
                });
            }

            // ---------- ACHIEVEMENT CHECK ----------
            function checkAchievements() {
                AchievementDefs.forEach(def => {
                    if (!player.achievements.includes(def.id) && def.condition(player)) {
                        player.achievements.push(def.id);
                        player.titles.push(def.reward.replace("Title: ", ""));
                        addToOutput(`🏆 ACHIEVEMENT: ${def.name} — ${def.reward}`, "victory");
                        AudioManager.levelUp();
                    }
                });
            }

            // ---------- LEVEL UP & SKILL UNLOCK ----------
            function checkLevelUp() {
                while (player.xp >= player.xpNext) {
                    player.level++;
                    player.xp -= player.xpNext;
                    player.xpNext = Math.floor(player.xpNext * 1.6);
                    player.base.maxHP += 12 + Math.floor(player.base.vit * 0.5);
                    player.base.maxMP += 6 + Math.floor(player.base.int * 0.4);
                    player.base.currentHP = player.maxHP;
                    player.base.currentMP = player.maxMP;
                    player.statPoints += 3;
                    AudioManager.levelUp();

                    // Unlock skills
                    if (player.level === 2 && !player.skills.includes("Fireball")) player.skills.push("Fireball");
                    if (player.level === 3 && !player.skills.includes("Heal")) player.skills.push("Heal");
                    if (player.level === 4 && !player.skills.includes("ShieldBash")) player.skills.push("ShieldBash");
                    if (player.level === 5 && !player.skills.includes("Lightning")) player.skills.push("Lightning");
                    if (player.level === 6 && !player.skills.includes("Focus")) player.skills.push("Focus");
                    if (player.level === 7 && !player.skills.includes("PoisonStrike")) player.skills.push("PoisonStrike");
                    if (player.level === 8 && !player.skills.includes("DualStrike") && player.equipment.mainHand && player.equipment.offHand && player.equipment.offHand.type !== "shield") {
                        player.skills.push("DualStrike");
                    }

                    addToOutput(`█ LV UP! LV ${player.level} █`, "victory");
                }
                recalcStats();
                updateStatus();
                checkAchievements();
            }

            // ---------- SKILL DATABASE (extended with status effects) ----------
            const skillDB = {
                Slash: { name: "Slash", mpCost: 0, baseDmg: 8, type: "physical" },
                Fireball: { name: "Fireball", mpCost: 4, baseDmg: 14, type: "fire", status: "burn", statusChance: 0.4, statusDuration: 3 },
                Heal: { name: "Heal", mpCost: 5, baseDmg: 0, type: "heal", healAmount: 25 },
                ShieldBash: { name: "ShieldBash", mpCost: 2, baseDmg: 10, type: "physical", status: "stun", statusChance: 0.3, statusDuration: 1 },
                Lightning: { name: "Lightning", mpCost: 7, baseDmg: 22, type: "lightning", status: "slow", statusChance: 0.5, statusDuration: 2 },
                Focus: { name: "Focus", mpCost: 3, type: "buff" },
                PoisonStrike: { name: "PoisonStrike", mpCost: 3, baseDmg: 8, type: "poison", status: "poison", statusChance: 1, statusDuration: 4 },
                DualStrike: { name: "DualStrike", mpCost: 5, baseDmg: 12, type: "physical", dual: true }
            };

            // ---------- ENEMY GENERATION (scaled) ----------
            function generateEnemy() {
                let pool = enemies.filter(e => e.level <= player.level+1 && e.level >= player.level-1);
                if (!pool.length) pool = enemies.slice(0,3);
                const base = pool[Math.floor(Math.random() * pool.length)];
                // Scale HP and damage based on player level (more aggressive scaling)
                let scale = 1 + (player.level - base.level) * 0.25;
                scale = Math.min(2.2, Math.max(0.8, scale));
                let enemy = {
                    ...base,
                    maxHP: Math.floor(base.maxHP * scale),
                    currentHP: Math.floor(base.maxHP * scale),
                    minDamage: Math.floor(base.minDamage * (0.9 + player.level*0.1)),
                    maxDamage: Math.floor(base.maxDamage * (0.9 + player.level*0.1)),
                    xpReward: Math.floor(base.xpReward * (0.7 + player.level*0.15)),
                    goldReward: Math.floor(base.goldReward * (0.6 + player.level*0.1)),
                    statusEffects: [] // for enemy status effects
                };
                return enemy;
            }

            // ---------- APPLY STATUS EFFECTS (player) ----------
            function processPlayerStatusEffects() {
                if (!player.statusEffects) player.statusEffects = [];
                let newEffects = [];
                for (let eff of player.statusEffects) {
                    if (eff.type === 'poison') {
                        let dmg = Math.floor(player.maxHP * 0.05);
                        player.base.currentHP -= dmg;
                        addToOutput(`Poison deals ${dmg}`, "poison");
                        AudioManager.poison();
                    } else if (eff.type === 'burn') {
                        let dmg = Math.floor(player.maxHP * 0.04);
                        player.base.currentHP -= dmg;
                        addToOutput(`Burn deals ${dmg}`, "burn");
                        AudioManager.burn();
                    } else if (eff.type === 'stun') {
                        // Stun prevents action, but we handle in combat flow
                    } else if (eff.type === 'slow') {
                        // Reduce dodge/block? For now, just duration
                    }
                    eff.duration--;
                    if (eff.duration > 0) newEffects.push(eff);
                }
                player.statusEffects = newEffects;
                if (player.base.currentHP < 0) player.base.currentHP = 0;
            }

            // ---------- APPLY STATUS EFFECTS (enemy) ----------
            function processEnemyStatusEffects() {
                if (!currentEnemy || !currentEnemy.statusEffects) return;
                let newEffects = [];
                for (let eff of currentEnemy.statusEffects) {
                    if (eff.type === 'poison') {
                        let dmg = Math.floor(currentEnemy.maxHP * 0.05);
                        currentEnemy.currentHP -= dmg;
                        addToOutput(`Enemy poisoned for ${dmg}`, "poison");
                    } else if (eff.type === 'burn') {
                        let dmg = Math.floor(currentEnemy.maxHP * 0.04);
                        currentEnemy.currentHP -= dmg;
                        addToOutput(`Enemy burns for ${dmg}`, "burn");
                    } else if (eff.type === 'stun') {
                        // Stun will skip enemy turn
                    } else if (eff.type === 'slow') {
                        // Reduce enemy damage output
                    }
                    eff.duration--;
                    if (eff.duration > 0) newEffects.push(eff);
                }
                currentEnemy.statusEffects = newEffects;
            }

            // ---------- COMBAT ----------
            function startCombat() {
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                if (gameEnded) return;
                if (inCombat) { addToOutput("Already in combat!", "combat"); AudioManager.error(); return; }
                currentEnemy = generateEnemy();
                inCombat = true;
                AudioManager.encounter();
                addToOutput(`⚔ ${currentEnemy.name} Lv.${currentEnemy.level}`, "location");
                addToOutput(`HP: ${currentEnemy.currentHP}/${currentEnemy.maxHP}`, "combat");
                if (currentEnemy.weaknesses) addToOutput(`Weak: ${currentEnemy.weaknesses.join('/')}`, "hint");
            }

            function enemyTurn() {
                if (!inCombat || !currentEnemy) return;

                // Process enemy status effects (burn/poison before attack)
                processEnemyStatusEffects();
                if (currentEnemy.currentHP <= 0) { endCombat(true); return; }

                // Check stun
                let stunned = currentEnemy.statusEffects && currentEnemy.statusEffects.some(e => e.type === 'stun');
                if (stunned) {
                    addToOutput(`${currentEnemy.name} is stunned!`, "stun");
                    currentEnemy.statusEffects = currentEnemy.statusEffects.filter(e => e.type !== 'stun');
                    return;
                }

                let dmg = Math.floor(Math.random()*(currentEnemy.maxDamage-currentEnemy.minDamage+1)+currentEnemy.minDamage);
                // Slow reduces damage
                if (currentEnemy.statusEffects && currentEnemy.statusEffects.some(e => e.type === 'slow')) {
                    dmg = Math.floor(dmg * 0.7);
                    addToOutput(`${currentEnemy.name} is slowed!`, "hint");
                }

                // Player dodge
                if (Math.random() < player.finalDodge) {
                    addToOutput(`Dodged!`, "skill");
                    AudioManager.click();
                    return;
                }
                // Player block (shield)
                if (Math.random() < player.finalBlock) {
                    dmg = Math.floor(dmg * 0.3);
                    addToOutput(`Blocked!`, "skill");
                }

                // Armor reduction (percentage)
                let armorReduction = 1 - (player.finalDefense / (player.finalDefense + 50)); // soft cap
                dmg = Math.floor(dmg * armorReduction);
                if (dmg < 2) dmg = 2;
                if (player.defending) { dmg = Math.floor(dmg*0.5); player.defending = false; }

                player.base.currentHP -= dmg;
                if (player.base.currentHP < 0) player.base.currentHP = 0;
                AudioManager.playerHit();
                addToOutput(`${currentEnemy.name} hits for ${dmg}!`, "damage");

                // Enemy special attacks (poison, burn)
                if (currentEnemy.poisonAttack && Math.random() < 0.3) {
                    player.statusEffects.push({ type: 'poison', duration: 3 });
                    addToOutput(`Poisoned!`, "poison");
                }
                if (currentEnemy.burnAttack && Math.random() < 0.3) {
                    player.statusEffects.push({ type: 'burn', duration: 3 });
                    addToOutput(`Burned!`, "burn");
                }

                updateStatus();
                if (player.base.currentHP <= 0) {
                    addToOutput("☠ DEFEAT ☠", "combat"); gameEnded = true; inCombat = false; AudioManager.error();
                }
            }

            function endCombat(win) {
                if (win && currentEnemy) {
                    player.xp += currentEnemy.xpReward;
                    player.base.gold += currentEnemy.goldReward;
                    player.achievementCounts.kills++;
                    let enemyName = currentEnemy.name;
                    player.achievementCounts.killTypes[enemyName] = (player.achievementCounts.killTypes[enemyName] || 0) + 1;
                    player.achievementCounts.goldEarned += currentEnemy.goldReward;
                    checkAchievements();

                    AudioManager.victory();
                    addToOutput(`VICTORY! +${currentEnemy.xpReward}XP +${currentEnemy.goldReward}G`, "victory");

                    // Quest progress
                    if (quest.active && !quest.completed && quest.active.type === "kill" && quest.active.target === currentEnemy.name) {
                        quest.active.current++;
                        addToOutput(`Quest: ${quest.active.current}/${quest.active.required} ${quest.active.target}s`, "hint");
                        if (quest.active.current >= quest.active.required) {
                            player.xp += quest.active.rewardXP;
                            player.base.gold += quest.active.rewardGold;
                            addToOutput(`Quest complete! +${quest.active.rewardXP}XP +${quest.active.rewardGold}G`, "victory");
                            if (quest.active.rewardItem) {
                                let item = { ...ItemDB[quest.active.rewardItem] };
                                player.inventory.equipment.push(item);
                                addToOutput(`Reward: ${item.name}`, "rare");
                            }
                            quest.completed = true;
                        }
                    }

                    // Loot drop
                    if (Math.random() < 0.4) {
                        let possibleItems = Object.values(ItemDB).filter(i => i.value < 80 && i.rarity !== "rare");
                        let drop = possibleItems[Math.floor(Math.random() * possibleItems.length)];
                        player.inventory.equipment.push({ ...drop });
                        addToOutput(`Found: ${drop.name}`, drop.rarity === "rare" ? "epic" : "rare");
                        AudioManager.item();
                    }
                    if (Math.random() < 0.3) { player.inventory.consumables.healthPotion = (player.inventory.consumables.healthPotion||0)+1; addToOutput("Potion drop!", "loot"); AudioManager.item(); }
                    if (Math.random() < 0.2) { player.inventory.consumables.ether = (player.inventory.consumables.ether||0)+1; addToOutput("Ether drop!", "loot"); AudioManager.item(); }
                    if (Math.random() < 0.1) { player.inventory.consumables.bomb = (player.inventory.consumables.bomb||0)+1; addToOutput("Bomb found!", "loot"); AudioManager.item(); }

                    checkLevelUp();
                }
                inCombat = false; currentEnemy = null; updateStatus();
                // Process player status effects after combat (poison ticks)
                processPlayerStatusEffects();
            }

            // ---------- PLAYER ACTIONS (expanded) ----------
            function playerAttack() {
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                if (!inCombat) { addToOutput("No enemy! SEARCH", "hint"); AudioManager.error(); return; }
                let dmg = Math.floor(player.finalAttack * (Math.random()*0.4+0.8));
                if (Math.random() < player.finalCrit) { dmg = Math.floor(dmg*1.8); addToOutput("CRIT!", "victory"); }
                // Armor reduction (percentage)
                let enemyArmor = currentEnemy.armor || 0;
                dmg = Math.floor(dmg * (100 / (100 + enemyArmor)));
                if (dmg < 2) dmg = 2;
                currentEnemy.currentHP -= dmg;
                AudioManager.attack();
                addToOutput(`Attack: ${dmg} dmg`, "damage");
                if (currentEnemy.currentHP <= 0) endCombat(true);
                else enemyTurn();
                updateStatus();
            }

            function useSkill(skillName) {
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                if (!inCombat && skillName !== 'Heal' && skillName !== 'Focus') { addToOutput("No enemy.", "hint"); AudioManager.error(); return; }
                const skill = skillDB[skillName];
                if (!skill || !player.skills.includes(skillName)) return;
                if (player.base.currentMP < skill.mpCost) { addToOutput("No MP!", "magic"); AudioManager.error(); return; }
                player.base.currentMP -= skill.mpCost;

                if (skill.type === 'heal') {
                    let heal = skill.healAmount + Math.floor(player.base.int * 0.5);
                    player.base.currentHP = Math.min(player.maxHP, player.base.currentHP+heal);
                    addToOutput(`Heal +${heal} HP`, "magic");
                    AudioManager.heal();
                    if (inCombat) enemyTurn();
                    updateStatus(); return;
                }
                if (skill.name === 'Focus') {
                    player.focusBuff = 1.2; addToOutput("Focus +20%", "skill");
                    AudioManager.click();
                    if (inCombat) enemyTurn(); updateStatus(); return;
                }
                if (!inCombat) { addToOutput("No enemy", "hint"); AudioManager.error(); return; }

                let dmg = skill.baseDmg;
                // Magic scaling
                if (['fire','lightning','poison','magic'].includes(skill.type)) dmg += Math.floor((player.base.int*1.8 + (player.equipment.mainHand?.magicPower||0)) *0.6);
                else dmg += Math.floor(player.finalAttack*0.5);
                if (player.focusBuff) { dmg = Math.floor(dmg*player.focusBuff); player.focusBuff = null; }

                // Check enemy weaknesses/resistances
                let multiplier = 1.0;
                if (currentEnemy.weaknesses && currentEnemy.weaknesses.includes(skill.type)) multiplier *= 1.6;
                if (currentEnemy.resistances && currentEnemy.resistances.includes(skill.type)) multiplier *= 0.6;
                // Player elemental resistances don't affect enemy damage here

                dmg = Math.floor(dmg * multiplier);
                if (dmg < 3) dmg = 3;

                // Apply status effects from skill
                if (skill.status && Math.random() < (skill.statusChance || 0.5)) {
                    if (!currentEnemy.statusEffects) currentEnemy.statusEffects = [];
                    currentEnemy.statusEffects.push({ type: skill.status, duration: skill.statusDuration });
                    addToOutput(`${currentEnemy.name} is ${skill.status}!`, skill.status);
                }

                if (skill.name === 'ShieldBash' && Math.random()<0.3) { addToOutput("Stunned!", "victory"); }
                if (skill.name === 'DualStrike') {
                    let dmg2 = Math.floor(dmg * 0.6);
                    currentEnemy.currentHP -= dmg2;
                    addToOutput(`Dual Strike +${dmg2}`, "skill");
                }

                currentEnemy.currentHP -= dmg;
                AudioManager.attack();
                addToOutput(`${skillName}: ${dmg} dmg`, "skill");
                if (currentEnemy.currentHP <= 0) endCombat(true);
                else enemyTurn();
                updateStatus();
            }

            // ---------- NEW CONSUMABLES ----------
            function useBomb() {
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                if (player.inventory.consumables.bomb > 0) {
                    if (!inCombat) { addToOutput("No enemy", "hint"); AudioManager.error(); return; }
                    player.inventory.consumables.bomb--;
                    let dmg = 30 + Math.floor(player.base.int * 0.5);
                    currentEnemy.currentHP -= dmg;
                    addToOutput(`Bomb deals ${dmg} damage!`, "damage");
                    AudioManager.attack();
                    if (currentEnemy.currentHP <= 0) endCombat(true);
                    else enemyTurn();
                } else { addToOutput("No bomb", "hint"); AudioManager.error(); }
            }
            function useAntidote() {
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                if (player.inventory.consumables.antidote > 0) {
                    player.inventory.consumables.antidote--;
                    let hadPoison = player.statusEffects.some(e => e.type === 'poison');
                    player.statusEffects = player.statusEffects.filter(e => e.type !== 'poison');
                    addToOutput(hadPoison ? "Cured poison!" : "No poison, but used.", "item");
                    AudioManager.heal();
                } else { addToOutput("No antidote", "hint"); AudioManager.error(); }
            }
            function useElixir() {
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                if (player.inventory.consumables.elixir > 0) {
                    player.inventory.consumables.elixir--;
                    // Temporary buff for one battle
                    player.focusBuff = 1.5; // stronger
                    addToOutput("Elixir: +50% damage next attack!", "magic");
                    AudioManager.item();
                } else { addToOutput("No elixir", "hint"); AudioManager.error(); }
            }
            function useFireScroll() {
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                if (player.inventory.consumables.fireScroll > 0) {
                    if (!inCombat) { addToOutput("No enemy", "hint"); AudioManager.error(); return; }
                    player.inventory.consumables.fireScroll--;
                    let dmg = 40 + Math.floor(player.base.int * 0.8);
                    if (currentEnemy.weaknesses && currentEnemy.weaknesses.includes('fire')) dmg = Math.floor(dmg*1.5);
                    currentEnemy.currentHP -= dmg;
                    addToOutput(`Fire Scroll: ${dmg} damage!`, "magic");
                    AudioManager.attack();
                    if (currentEnemy.currentHP <= 0) endCombat(true);
                    else enemyTurn();
                } else { addToOutput("No scroll", "hint"); AudioManager.error(); }
            }

            // ---------- SHOP (updated) ----------
            function shopInfo() { 
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                addToOutput("🏪 SHOP: Potion 15g, Ether 20g, Bomb 25g, Antidote 18g, Elixir 40g, Fire Scroll 35g. Also: Iron Helm 40g, Dagger 35g, etc.", "gold"); 
                AudioManager.click(); 
            }
            function buyHealthPotion() { if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; } if (player.base.gold>=15) { player.base.gold-=15; player.inventory.consumables.healthPotion=(player.inventory.consumables.healthPotion||0)+1; addToOutput("Bought Potion", "item"); AudioManager.purchase(); } else { addToOutput("Not enough gold", "hint"); AudioManager.error(); } updateStatus(); }
            function buyEther() { if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; } if (player.base.gold>=20) { player.base.gold-=20; player.inventory.consumables.ether=(player.inventory.consumables.ether||0)+1; addToOutput("Bought Ether", "item"); AudioManager.purchase(); } else { addToOutput("Not enough gold", "hint"); AudioManager.error(); } updateStatus(); }
            function buyBomb() { if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; } if (player.base.gold>=25) { player.base.gold-=25; player.inventory.consumables.bomb=(player.inventory.consumables.bomb||0)+1; addToOutput("Bought Bomb", "item"); AudioManager.purchase(); } else { addToOutput("Not enough gold", "hint"); AudioManager.error(); } updateStatus(); }
            function buyAntidote() { if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; } if (player.base.gold>=18) { player.base.gold-=18; player.inventory.consumables.antidote=(player.inventory.consumables.antidote||0)+1; addToOutput("Bought Antidote", "item"); AudioManager.purchase(); } else { addToOutput("Not enough gold", "hint"); AudioManager.error(); } updateStatus(); }

            // ---------- ACHIEVEMENTS PANEL ----------
            function showAchievements() {
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                addToOutput("🏆 ACHIEVEMENTS", "location");
                AchievementDefs.forEach(def => {
                    let earned = player.achievements.includes(def.id) ? "✔" : "✖";
                    addToOutput(`${earned} ${def.name}: ${def.desc}`, player.achievements.includes(def.id) ? "victory" : "hint");
                });
                if (player.titles.length) addToOutput(`Titles: ${player.titles.join(', ')}`, "stat");
                AudioManager.click();
            }

            // ---------- CLASS SELECTION ----------
            function selectClass(className) {
                player.class = className;
                if (className === "Warrior") {
                    player.base.str += 2; player.base.vit += 2;
                } else if (className === "Rogue") {
                    player.base.dex += 4; player.base.str += 1;
                } else if (className === "Mage") {
                    player.base.int += 4; player.base.vit += 1;
                }
                document.getElementById('class-selector').style.display = 'none';
                recalcStats();
                // Set current HP/MP to full after class selection
                player.base.currentHP = player.maxHP;
                player.base.currentMP = player.maxMP;
                updateStatus();
                addToOutput(`Class: ${className} selected!`, "victory");
                AudioManager.click();
            }

            // ---------- EQUIPMENT MANAGEMENT ----------
            function equipItem(item, slot) {
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return false; }
                // check requirements
                if (item.req) {
                    if (item.req.str && player.base.str < item.req.str) { addToOutput(`Requires STR ${item.req.str}`, "hint"); AudioManager.error(); return false; }
                    if (item.req.dex && player.base.dex < item.req.dex) { addToOutput(`Requires DEX ${item.req.dex}`, "hint"); AudioManager.error(); return false; }
                    if (item.req.int && player.base.int < item.req.int) { addToOutput(`Requires INT ${item.req.int}`, "hint"); AudioManager.error(); return false; }
                    if (item.req.vit && player.base.vit < item.req.vit) { addToOutput(`Requires VIT ${item.req.vit}`, "hint"); AudioManager.error(); return false; }
                }
                if (player.equipment[slot]) {
                    let oldItem = player.equipment[slot];
                    player.inventory.equipment.push(oldItem);
                    player.equipment[slot] = null;
                }
                player.equipment[slot] = item;
                let index = player.inventory.equipment.findIndex(i => i === item);
                if (index > -1) player.inventory.equipment.splice(index, 1);
                recalcStats();
                AudioManager.equip();
                addToOutput(`Equipped ${item.name} [${slot}]`, "stat");
                updateStatus();
                return true;
            }

            function unequipSlot(slot) {
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                if (player.equipment[slot]) {
                    let item = player.equipment[slot];
                    player.inventory.equipment.push(item);
                    player.equipment[slot] = null;
                    recalcStats();
                    AudioManager.equip();
                    addToOutput(`Unequipped ${item.name}`, "hint");
                    updateStatus();
                }
            }

            function renderEquipmentPanel() {
                const slotsContainer = document.getElementById('equipment-slots-container');
                slotsContainer.innerHTML = '';
                const slots = ['head', 'chest', 'hands', 'legs', 'feet', 'mainHand', 'offHand', 'accessory1', 'accessory2'];
                slots.forEach(slot => {
                    const item = player.equipment[slot];
                    const btn = document.createElement('button');
                    btn.className = 'slot-btn' + (item ? ' equipped' : '');
                    btn.textContent = (item ? item.name : `-${slot.toUpperCase()}-`).substring(0, 12);
                    btn.onclick = (e) => { AudioManager.click(); unequipSlot(slot); renderEquipmentPanel(); };
                    slotsContainer.appendChild(btn);
                });

                const invContainer = document.getElementById('inventory-equipment-container');
                invContainer.innerHTML = '';
                player.inventory.equipment.forEach((item, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'inv-item-btn';
                    btn.textContent = `${item.name} (${item.slot})`.substring(0, 14);
                    btn.onclick = (e) => {
                        AudioManager.click();
                        if (equipItem(item, item.slot)) {
                            renderEquipmentPanel();
                        }
                    };
                    invContainer.appendChild(btn);
                });
            }

            function toggleEquipmentPanel() {
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                equipmentPanelVisible = !equipmentPanelVisible;
                document.getElementById('equipment-panel').style.display = equipmentPanelVisible ? 'flex' : 'none';
                if (equipmentPanelVisible) renderEquipmentPanel();
            }

            // ---------- OTHER EXISTING FUNCTIONS (useHealthPotion, useEther, showInventory, upgradeWeapon, upgradeArmor, incStat, save, load, restart, questLog) ----------
            function useHealthPotion() { if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; } if (player.inventory.consumables.healthPotion>0) { player.inventory.consumables.healthPotion--; let heal = 30+Math.floor(player.base.vit*0.5); player.base.currentHP = Math.min(player.maxHP, player.base.currentHP+heal); addToOutput(`Potion +${heal} HP`, "item"); AudioManager.heal(); updateStatus(); } else { addToOutput("None", "hint"); AudioManager.error(); } }
            function useEther() { if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; } if (player.inventory.consumables.ether>0) { player.inventory.consumables.ether--; let mp = 20+Math.floor(player.base.int*0.4); player.base.currentMP = Math.min(player.maxMP, player.base.currentMP+mp); addToOutput(`Ether +${mp} MP`, "magic"); AudioManager.item(); updateStatus(); } else { addToOutput("None", "hint"); AudioManager.error(); } }
            function showInventory() {
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                addToOutput("🎒 INVENTORY", "location");
                addToOutput(`Potions: ${player.inventory.consumables.healthPotion||0}  Ether: ${player.inventory.consumables.ether||0}`, "item");
                addToOutput(`Bombs: ${player.inventory.consumables.bomb||0}  Antidotes: ${player.inventory.consumables.antidote||0}`, "item");
                addToOutput(`Elixirs: ${player.inventory.consumables.elixir||0}  Fire Scrolls: ${player.inventory.consumables.fireScroll||0}`, "item");
                addToOutput(`Equipment pieces: ${player.inventory.equipment.length}`, "stat");
                AudioManager.click();
            }
            function upgradeWeapon() { 
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                if (player.base.gold>=50) { 
                    player.base.gold-=50; 
                    if (player.equipment.mainHand) {
                        player.equipment.mainHand.bonusAtk += 3;
                        player.equipment.mainHand.name += '+';
                        addToOutput(`Weapon +3 ATK`, "victory");
                    } else { addToOutput("No weapon equipped", "hint"); }
                    AudioManager.levelUp(); 
                } else { addToOutput(`Need 50g`, "hint"); AudioManager.error(); } 
                recalcStats(); updateStatus(); 
            }
            function upgradeArmor() { 
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                if (player.base.gold>=40) { 
                    player.base.gold-=40; 
                    if (player.equipment.chest) {
                        player.equipment.chest.bonusDef += 2;
                        player.equipment.chest.name += '+';
                        addToOutput(`Armor +2 DEF`, "victory");
                    } else { addToOutput("No chest equipped", "hint"); }
                    AudioManager.levelUp(); 
                } else { addToOutput(`Need 40g`, "hint"); AudioManager.error(); } 
                recalcStats(); updateStatus(); 
            }
            function incStat(stat) {
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                if (player.statPoints<=0) { AudioManager.error(); return; }
                if (stat==='str') { player.base.str++; player.statPoints--; addToOutput("STR +1","stat"); AudioManager.click(); }
                if (stat==='dex') { player.base.dex++; player.statPoints--; addToOutput("DEX +1","stat"); AudioManager.click(); }
                if (stat==='int') { player.base.int++; player.statPoints--; addToOutput("INT +1","stat"); AudioManager.click(); }
                if (stat==='vit') { player.base.vit++; player.statPoints--; player.maxHP += 10; player.base.currentHP += 10; addToOutput("VIT +1 HP+10","stat"); AudioManager.click(); }
                recalcStats();
                updateStatus();
            }
            function saveGame() { 
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                let save = { player, inCombat, currentEnemy, gameEnded, quest };
                localStorage.setItem('ccsDeepSave', JSON.stringify(save)); 
                addToOutput("Saved","victory"); AudioManager.click(); 
            }
            function loadGame() { 
                let s=localStorage.getItem('ccsDeepSave'); 
                if(s) { 
                    let d=JSON.parse(s); 
                    Object.assign(player, d.player);
                    inCombat=d.inCombat; currentEnemy=d.currentEnemy; gameEnded=d.gameEnded; quest=d.quest;
                    recalcStats();
                    addToOutput("Loaded","victory"); AudioManager.click(); updateStatus(); renderSkillButtons(); 
                    document.getElementById('class-selector').style.display = player.class ? 'none' : 'flex';
                } else { addToOutput("No save","hint"); AudioManager.error(); } 
            }
            function restartGame() { location.reload(); }
            function questLog() {
                if (!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                if (quest.completed) addToOutput("Quest completed! Talk to adventurer.", "victory");
                else addToOutput(`QUEST: Kill ${quest.active.current}/${quest.active.required} ${quest.active.target}s. Reward: ${quest.active.rewardXP}XP, ${quest.active.rewardGold}G, ${quest.active.rewardItem}`, "hint");
                AudioManager.click();
            }

            // ---------- BIND BUTTONS ----------
            function bindButtons() {
                document.querySelectorAll('.cmd-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => { if (!e.target.closest('#mute-toggle')) AudioManager.click(); });
                });

                document.getElementById('btn-search').onclick = startCombat;
                document.getElementById('btn-attack').onclick = playerAttack;
                document.getElementById('btn-defend').onclick = ()=>{ if(!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; } if(inCombat){ player.defending=true; addToOutput("Defend stance","skill"); AudioManager.click(); enemyTurn(); } else { addToOutput("Not in combat","hint"); AudioManager.error(); } };
                document.getElementById('btn-flee').onclick = ()=>{ if(!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; } if(inCombat){ if(Math.random()<0.45+player.base.dex*0.02){ addToOutput("Fled","item"); AudioManager.flee(); inCombat=false; currentEnemy=null; } else { addToOutput("Escape failed","damage"); AudioManager.error(); enemyTurn(); }} else { addToOutput("No combat","hint"); AudioManager.error(); } };
                document.getElementById('btn-rest').onclick = ()=>{ if(!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; } if(!inCombat){ let rec = Math.floor(player.maxMP*0.2); player.base.currentMP = Math.min(player.maxMP, player.base.currentMP+rec); addToOutput(`Rest +${rec} MP`,"magic"); AudioManager.rest(); updateStatus(); } else { addToOutput("Not now","hint"); AudioManager.error(); } };
                document.getElementById('btn-stats').onclick = ()=>{ 
                    if(!player.class) { addToOutput("Choose a class first!"); AudioManager.error(); return; }
                    addToOutput(`══ STATS ══`,"location"); 
                    addToOutput(`LV${player.level} XP:${player.xp}/${player.xpNext}`,"stat"); 
                    addToOutput(`STR:${player.base.str} DEX:${player.base.dex} INT:${player.base.int} VIT:${player.base.vit}`,"stat"); 
                    addToOutput(`ATK:${player.finalAttack} DEF:${player.finalDefense} CRIT:${Math.floor(player.finalCrit*100)}% DODGE:${Math.floor(player.finalDodge*100)}%`,"stat");
                    addToOutput(`Points: ${player.statPoints}`,"victory");
                    if (player.setBonuses.length) addToOutput(`Sets: ${player.setBonuses.join(', ')}`, "magic");
                    AudioManager.click(); 
                };
                document.getElementById('btn-use-hpotion').onclick = useHealthPotion;
                document.getElementById('btn-use-ether').onclick = useEther;
                document.getElementById('btn-use-bomb').onclick = useBomb;
                document.getElementById('btn-use-antidote').onclick = useAntidote;
                document.getElementById('btn-use-elixir').onclick = useElixir;
                document.getElementById('btn-use-scroll').onclick = useFireScroll;
                document.getElementById('btn-inventory').onclick = showInventory;
                document.getElementById('btn-shop').onclick = shopInfo;
                document.getElementById('btn-buy-potion').onclick = buyHealthPotion;
                document.getElementById('btn-buy-ether').onclick = buyEther;
                document.getElementById('btn-buy-bomb').onclick = buyBomb;
                document.getElementById('btn-buy-antidote').onclick = buyAntidote;
                document.getElementById('btn-upgrade-weapon').onclick = upgradeWeapon;
                document.getElementById('btn-upgrade-armor').onclick = upgradeArmor;
                document.getElementById('btn-toggle-equip').onclick = toggleEquipmentPanel;
                document.getElementById('btn-quest-log').onclick = questLog;
                document.getElementById('btn-achievements').onclick = showAchievements;
                document.getElementById('btn-close-equip').onclick = toggleEquipmentPanel;
                document.getElementById('btn-save').onclick = saveGame;
                document.getElementById('btn-load').onclick = loadGame;
                document.getElementById('btn-restart').onclick = restartGame;
                document.getElementById('btn-inc-str').onclick = ()=>incStat('str');
                document.getElementById('btn-inc-dex').onclick = ()=>incStat('dex');
                document.getElementById('btn-inc-int').onclick = ()=>incStat('int');
                document.getElementById('btn-inc-vit').onclick = ()=>incStat('vit');

                document.getElementById('class-warrior').onclick = ()=>selectClass("Warrior");
                document.getElementById('class-rogue').onclick = ()=>selectClass("Rogue");
                document.getElementById('class-mage').onclick = ()=>selectClass("Mage");

                const muteBtn = document.getElementById('mute-toggle');
                muteBtn.onclick = () => {
                    const muted = AudioManager.toggleMute();
                    muteBtn.textContent = muted ? '🔇' : '🔊';
                    muteBtn.classList.toggle('active', muted);
                    AudioManager.click();
                };
            }

            // ---------- INIT ----------
            function initGame() {
                AudioManager.init();
                gameOutput.innerHTML = '';
                addToOutput("CASTLE UNDEAD 1984 — DEEP REALMS", "location");
                addToOutput("Choose your class above. Then explore!", "hint");
                addToOutput("------------------------------------------------");
                // Initial recalc to set maxHP/MP based on base stats, but class not chosen yet
                recalcStats();
                // Set current HP/MP to max, but player hasn't chosen class, so they'll be overwritten on class select.
                // This ensures status bar shows something, but buttons are blocked.
                player.base.currentHP = player.maxHP;
                player.base.currentMP = player.maxMP;
                updateStatus();
                renderSkillButtons();
                bindButtons();
            }

            window.onload = initGame;
        })();
    </script>
</body>
</html>
