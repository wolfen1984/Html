                if(step===0) sc.noiseSweep(t,0.08,280);
                if(bar===35&&step>=12){ const sd=60/72/4; sc.deepKick(t,0.72); sc.snare(t+sd*0.3,0.48); sc.snare(t+sd*0.65,0.40); }
            }
            return;
        }
        if (isOutro) {
            if(bar===56&&step===0){sc.deepKick(t,0.86);sc.crashWash(t,0.38);return;}
            if(bar===57&&step===0) sc.kick(t,0.42);
            if(bar===57&&step===8) sc.snare(t,0.24);
            if(bar===58&&step===0) sc.kick(t,0.30);
            if(bar===58&&step===6) sc.reverseSnareSwell(t-0.05,0.28);
            if(bar===59&&step===0){sc.deepKick(t,0.42);sc.industrialNoise(t,0.22);}
            if(bar===60&&step===0) sc.kick(t,0.26);
            if(bar===60&&step===8) sc.industrialNoise(t,0.18);
            if(bar===61&&step===0) sc.deepKick(t,0.34);
            if(bar===62&&step===0) sc.reverseSnareSwell(t,0.22);
            if(bar===63&&step===0) sc.noiseSweep(t,0.10,150);
            return;
        }
    }
}
];

// ---------- AUDIO ENGINE (unchanged) ----------
function createDistortionCurve(amount = 50) { if (amount <= 0.001) return null; const samples = 44100, curve = new Float32Array(samples); const k = amount * 8; for (let i = 0; i < samples; ++i) { const x = i * 2 / samples - 1; curve[i] = (3 + k) * x * 20 * (Math.PI / 180) / (Math.PI + k * Math.abs(x)); } return curve; }

function scheduleNote(ctx, time, freqVal, dur, gainVal, pan, outputNode) {
    const o1 = ctx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = freqVal; o1.detune.value = -18;
    const g1 = ctx.createGain(); g1.gain.setValueAtTime(0.001, time); g1.gain.exponentialRampToValueAtTime(gainVal * 0.78, time + 0.01); g1.gain.exponentialRampToValueAtTime(gainVal * 0.32, time + dur * 0.6); g1.gain.setValueAtTime(0.001, time + dur - 0.02);
    const o2 = ctx.createOscillator(); o2.type = 'square'; o2.frequency.value = freqVal; o2.detune.value = 12;
    const g2 = ctx.createGain(); g2.gain.setValueAtTime(0.001, time); g2.gain.exponentialRampToValueAtTime(gainVal * 0.42, time + 0.01); g2.gain.exponentialRampToValueAtTime(gainVal * 0.18, time + dur * 0.65); g2.gain.setValueAtTime(0.001, time + dur - 0.02);
    const nb = ctx.createBuffer(1, ctx.sampleRate * 0.6, ctx.sampleRate); const nd = nb.getChannelData(0); for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource(); noise.buffer = nb; const ng = ctx.createGain(); ng.gain.setValueAtTime(0.001, time); ng.gain.exponentialRampToValueAtTime(gainVal * 0.18, time + 0.03); ng.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.4);
    const panNode = ctx.createStereoPanner(); panNode.pan.value = pan;
    o1.connect(g1); o2.connect(g2); noise.connect(ng); g1.connect(panNode); g2.connect(panNode); ng.connect(panNode); panNode.connect(outputNode);
    o1.start(time); o2.start(time); noise.start(time); o1.stop(time + dur); o2.stop(time + dur); noise.stop(time + dur * 0.35);
}

function createDrumSchedulers(ctx, outputNode) {
    const humanize = () => (Math.random() - 0.5) * 0.003;
    return {
        kick: (t, v) => { const ht = t + humanize(); const o = ctx.createOscillator(); o.type = 'triangle'; o.frequency.setValueAtTime(140, ht); o.frequency.exponentialRampToValueAtTime(45, ht + 0.12); const g = ctx.createGain(); g.gain.setValueAtTime(0.92 * v, ht); g.gain.exponentialRampToValueAtTime(0.001, ht + 0.18); o.connect(g); g.connect(outputNode); o.start(ht); o.stop(ht + 0.18); },
        deepKick: (t, v) => { const ht = t + humanize(); const o = ctx.createOscillator(); o.type = 'triangle'; o.frequency.setValueAtTime(80, ht); o.frequency.exponentialRampToValueAtTime(30, ht + 0.35); const g = ctx.createGain(); g.gain.setValueAtTime(0.95 * v, ht); g.gain.exponentialRampToValueAtTime(0.001, ht + 0.5); o.connect(g); g.connect(outputNode); o.start(ht); o.stop(ht + 0.5); },
        snare: (t, v) => { const ht = t + humanize(); const buf = ctx.createBuffer(1, ctx.sampleRate * 0.25, ctx.sampleRate); const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1; const src = ctx.createBufferSource(); src.buffer = buf; const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2800; const g = ctx.createGain(); g.gain.setValueAtTime(0.82 * v, ht); g.gain.exponentialRampToValueAtTime(0.001, ht + 0.22); src.connect(bp).connect(g).connect(outputNode); src.start(ht); src.stop(ht + 0.22); },
        hat: (t, v) => { const ht = t + humanize(); const buf = ctx.createBuffer(1, ctx.sampleRate * 0.06, ctx.sampleRate); const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1; const src = ctx.createBufferSource(); src.buffer = buf; const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 9000; const g = ctx.createGain(); g.gain.setValueAtTime(0.48 * v, ht); g.gain.exponentialRampToValueAtTime(0.001, ht + 0.06); src.connect(hp).connect(g).connect(outputNode); src.start(ht); src.stop(ht + 0.06); },
        noiseSweep: (t, v, freq) => { const ht = t + humanize(); const buf = ctx.createBuffer(1, ctx.sampleRate * 0.5, ctx.sampleRate); const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1; const src = ctx.createBufferSource(); src.buffer = buf; const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = 0.5; const g = ctx.createGain(); g.gain.setValueAtTime(0.35 * v, ht); g.gain.exponentialRampToValueAtTime(0.001, ht + 0.5); src.connect(bp).connect(g).connect(outputNode); src.start(ht); src.stop(ht + 0.5); },
        reverseSnareSwell: (t, v) => { const ht = t + humanize(); const buf = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate); const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1; const src = ctx.createBufferSource(); src.buffer = buf; const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 3200; const g = ctx.createGain(); g.gain.setValueAtTime(0.001, ht); g.gain.exponentialRampToValueAtTime(0.7 * v, ht + 0.08); g.gain.exponentialRampToValueAtTime(0.001, ht + 0.18); src.connect(bp).connect(g).connect(outputNode); src.start(ht); src.stop(ht + 0.18); },
        crashWash: (t, v) => { const ht = t + humanize(); const buf = ctx.createBuffer(1, ctx.sampleRate * 0.8, ctx.sampleRate); const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1; const src = ctx.createBufferSource(); src.buffer = buf; const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1800; const g = ctx.createGain(); g.gain.setValueAtTime(0.45 * v, ht); g.gain.exponentialRampToValueAtTime(0.001, ht + 0.7); src.connect(lp).connect(g).connect(outputNode); src.start(ht); src.stop(ht + 0.7); },
        industrialNoise: (t, v) => { const ht = t + humanize(); const buf = ctx.createBuffer(1, ctx.sampleRate * 1.5, ctx.sampleRate); const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1; const src = ctx.createBufferSource(); src.buffer = buf; const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 500; lp.Q.value = 0.6; const g = ctx.createGain(); g.gain.setValueAtTime(0.4 * v, ht); g.gain.exponentialRampToValueAtTime(0.001, ht + 1.2); src.connect(lp).connect(g).connect(outputNode); src.start(ht); src.stop(ht + 1.2); }
    };
}

function getDefaultParams() {
    return { gtrVol: 0.72, bassVol: 0.88, drumVol: 0.82, gtrDist: 0.45, gtrRev: 0.38, gtrChor: 0.28, gtrDelay: 0.52, bassDist: 0.22, bassRev: 0.25, bassChor: 0.08, bassDelay: 0.30, drumDist: 0.15, drumRev: 0.32, drumChor: 0.15, drumDelay: 0.30, masterDist: 0.18, gtrEqLow: 0, gtrEqMid: 0, gtrEqHigh: 0, bassEqLow: 0, bassEqMid: 0, bassEqHigh: 0, drumEqLow: 0, drumEqMid: 0, drumEqHigh: 0, masterEqLow: 0, masterEqMid: 0, masterEqHigh: 0 };
}

function buildAudioGraph(ctx, params) {
    const master = ctx.createGain(); master.gain.value = 0.85;
    const comp = ctx.createDynamicsCompressor(); comp.threshold.value = -24; comp.ratio.value = 6;
    const reverbBus = ctx.createGain(); reverbBus.gain.value = 0.65;
    const delayBus = ctx.createDelay(3); delayBus.delayTime.value = 0.42;
    const delayFB = ctx.createGain(); delayFB.gain.value = 0.62; delayBus.connect(delayFB); delayFB.connect(delayBus);
    const slap = ctx.createDelay(2); slap.delayTime.value = 0.135;
    const slapFB = ctx.createGain(); slapFB.gain.value = 0.32; slap.connect(slapFB); slapFB.connect(slap);
    const chorusDelay = ctx.createDelay(0.03);
    const chorusLFO = ctx.createOscillator(); chorusLFO.type = 'sine'; chorusLFO.frequency.value = 0.8;
    const chorusDepth = ctx.createGain(); chorusDepth.gain.value = 0.002; chorusLFO.connect(chorusDepth).connect(chorusDelay.delayTime); chorusLFO.start();
    const chorusGain = ctx.createGain(); chorusGain.gain.value = 0.5;
    const createChain = (vol, distAmt, revSend, chorSend, delaySend, eqLowDb, eqMidDb, eqHighDb) => {
        const inputGain = ctx.createGain(); inputGain.gain.value = vol;
        const eqLow = ctx.createBiquadFilter(); eqLow.type = 'lowshelf'; eqLow.frequency.value = 250; eqLow.gain.value = eqLowDb;
        const eqMid = ctx.createBiquadFilter(); eqMid.type = 'peaking'; eqMid.frequency.value = 1000; eqMid.Q.value = 0.7; eqMid.gain.value = eqMidDb;
        const eqHigh = ctx.createBiquadFilter(); eqHigh.type = 'highshelf'; eqHigh.frequency.value = 4000; eqHigh.gain.value = eqHighDb;
        const dryGain = ctx.createGain(); dryGain.gain.value = 1.0;
        const revSendGain = ctx.createGain(); revSendGain.gain.value = revSend;
        const chorSendGain = ctx.createGain(); chorSendGain.gain.value = chorSend;
        const delaySendGain = ctx.createGain(); delaySendGain.gain.value = delaySend;
        const distCurve = createDistortionCurve(distAmt * 2.5);
        if (distCurve) { const dist = ctx.createWaveShaper(); dist.curve = distCurve; dist.oversample = '4x'; inputGain.connect(dist); dist.connect(eqLow); } else { inputGain.connect(eqLow); }
        eqLow.connect(eqMid).connect(eqHigh).connect(dryGain);
        dryGain.connect(revSendGain); dryGain.connect(chorSendGain); dryGain.connect(delaySendGain);
        revSendGain.connect(reverbBus); chorSendGain.connect(chorusDelay).connect(chorusGain); delaySendGain.connect(delayBus); delaySendGain.connect(slap);
        return { input: inputGain, dry: dryGain };
    };
    const gtr = createChain(params.gtrVol, params.gtrDist, params.gtrRev, params.gtrChor, params.gtrDelay, params.gtrEqLow, params.gtrEqMid, params.gtrEqHigh);
    const bass = createChain(params.bassVol, params.bassDist, params.bassRev, params.bassChor, params.bassDelay, params.bassEqLow, params.bassEqMid, params.bassEqHigh);
    const drum = createChain(params.drumVol, params.drumDist, params.drumRev, params.drumChor, params.drumDelay, params.drumEqLow, params.drumEqMid, params.drumEqHigh);
    [gtr.dry, bass.dry, drum.dry].forEach(n => n.connect(comp));
    reverbBus.connect(comp); delayBus.connect(comp); slap.connect(comp); chorusGain.connect(comp);
    const masterEqLow = ctx.createBiquadFilter(); masterEqLow.type = 'lowshelf'; masterEqLow.frequency.value = 200; masterEqLow.gain.value = params.masterEqLow;
    const masterEqMid = ctx.createBiquadFilter(); masterEqMid.type = 'peaking'; masterEqMid.frequency.value = 800; masterEqMid.Q.value = 0.6; masterEqMid.gain.value = params.masterEqMid;
    const masterEqHigh = ctx.createBiquadFilter(); masterEqHigh.type = 'highshelf'; masterEqHigh.frequency.value = 5000; masterEqHigh.gain.value = params.masterEqHigh;
    const lowpass = ctx.createBiquadFilter(); lowpass.type = 'lowpass'; lowpass.frequency.value = 7800;
    comp.connect(masterEqLow); masterEqLow.connect(masterEqMid).connect(masterEqHigh).connect(lowpass);
    const masterDistCurve = createDistortionCurve(params.masterDist * 2.5);
    if (masterDistCurve) { const masterDistNode = ctx.createWaveShaper(); masterDistNode.curve = masterDistCurve; masterDistNode.oversample = '2x'; lowpass.connect(masterDistNode); masterDistNode.connect(master); } else { lowpass.connect(master); }
    return { gtrIn: gtr.input, bassIn: bass.input, drumIn: drum.input, master, ctx };
}

// ---------- PLAYBACK STATE (simple Play/Stop, no running time) ----------
let audioCtx = null;
let graphNodes = null;
let schedulerInterval = null;
let isPlaying = false;
let currentTrackId = null;
let currentTrack = null;

const trackListEl = document.getElementById('trackList');
const modalOverlay = document.getElementById('modalOverlay');
const modalTrackName = document.getElementById('modalTrackName');
const modalTrackDesc = document.getElementById('modalTrackDesc');
const btnPlayStop = document.getElementById('btnPlayStop');
const modalCloseBtn = document.getElementById('modalCloseBtn');

function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
}

function getTrackDuration(track) {
    return track.totalSteps * (60 / track.bpm / 4);
}

function stopScheduler() {
    if (schedulerInterval) { clearInterval(schedulerInterval); schedulerInterval = null; }
}

function stopAudio() {
    if (!audioCtx) return;
    stopScheduler();
    if (audioCtx.state !== 'closed') {
        try { audioCtx.close(); } catch(e) {}
    }
    audioCtx = null;
    graphNodes = null;
    isPlaying = false;
    updateUIForStop();
}

function updateUIForStop() {
    btnPlayStop.textContent = '▶ PLAY';
    btnPlayStop.classList.remove('playing');
    updateAllTrackCards();
}

function startLookaheadScheduler(track, ctx, gtrIn, bassIn, drumIn) {
    stopScheduler();
    const stepDur = 60 / track.bpm / 4;
    const totalSteps = track.totalSteps;
    const totalDur = totalSteps * stepDur;
    const lookahead = 0.15;
    let nextStep = 0, loopCount = 0;
    const drumSched = createDrumSchedulers(ctx, drumIn);
    const leadNotes = track.leadSeq();
    const bassNotes = track.bassSeq();
    function scheduleRange(startTime, fromStep, toStep) {
        for (let i=fromStep; i<toStep; i++) {
            const stepInLoop = i % totalSteps;
            const noteTime = startTime + (i - fromStep) * stepDur;
            leadNotes.forEach(([step,note,durSteps,vel])=>{ if(step===stepInLoop && freq[note]) scheduleNote(ctx, noteTime, freq[note], durSteps*stepDur, vel*0.45, -0.3, gtrIn); });
            bassNotes.forEach(([step,note,durSteps,vel])=>{ if(step===stepInLoop && freq[note]) scheduleNote(ctx, noteTime, freq[note], durSteps*stepDur, vel*0.58, 0.2, bassIn); });
            track.drumPattern(stepInLoop, noteTime, drumSched);
        }
    }
    function tick() {
        if (!audioCtx || audioCtx.state==='closed') return;
        const currentTime = audioCtx.currentTime;
        while (nextStep * stepDur < currentTime + lookahead) {
            scheduleRange(loopCount*totalDur + nextStep*stepDur, nextStep, nextStep+1);
            nextStep++;
            if (nextStep >= totalSteps) {
                // Track finished – auto-stop
                stopAudio();
                return;
            }
        }
    }
    schedulerInterval = setInterval(tick, 25);
    tick();
}

async function initAudio() {
    if (audioCtx && audioCtx.state !== 'closed') return true;
    if (audioCtx) { try { audioCtx.close(); } catch(e) {} }
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const params = getDefaultParams();
    graphNodes = buildAudioGraph(audioCtx, params);
    graphNodes.master.connect(audioCtx.destination);
    return true;
}

async function playTrack(trackId) {
    const track = tracks.find(t => t.id === trackId);
    if (!track) return;
    if (currentTrackId === trackId && isPlaying) {
        stopAudio();
        return;
    }
    stopAudio();
    await initAudio();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    currentTrack = track;
    currentTrackId = trackId;
    isPlaying = true;
    startLookaheadScheduler(track, audioCtx, graphNodes.gtrIn, graphNodes.bassIn, graphNodes.drumIn);
    btnPlayStop.textContent = '■ STOP';
    btnPlayStop.classList.add('playing');
    modalTrackName.textContent = track.name;
    modalTrackDesc.textContent = track.desc;
    updateAllTrackCards();
    modalOverlay.classList.add('active');
}

function updateAllTrackCards() {
    document.querySelectorAll('.track-card').forEach(card => {
        const tid = card.dataset.trackId;
        if (tid === currentTrackId && isPlaying) {
            card.classList.add('playing');
        } else {
            card.classList.remove('playing');
        }
    });
}

function closeModal() {
    stopAudio();
    modalOverlay.classList.remove('active');
    modalTrackName.textContent = '—';
    modalTrackDesc.textContent = '';
    updateAllTrackCards();
}

// Render track list with durations
function renderTrackList() {
    trackListEl.innerHTML = '';
    tracks.forEach((t, i) => {
        const totalDur = getTrackDuration(t);
        const card = document.createElement('div');
        card.className = 'track-card';
        card.dataset.trackId = t.id;
        card.innerHTML = `
            <div class="track-num">${i+1}</div>
            <div class="track-info">
                <div class="track-name">${t.name}</div>
                <div class="track-desc">${t.desc}</div>
            </div>
            <div class="track-duration">${formatTime(totalDur)}</div>
            <div class="play-indicator">▶</div>
        `;
        card.addEventListener('click', () => {
            playTrack(t.id);
            modalOverlay.classList.add('active');
            modalTrackName.textContent = t.name;
            modalTrackDesc.textContent = t.desc;
        });
        trackListEl.appendChild(card);
    });
}

btnPlayStop.addEventListener('click', () => {
    if (isPlaying && currentTrackId) {
        stopAudio();
    } else if (currentTrackId) {
        playTrack(currentTrackId);
    }
});

modalCloseBtn.addEventListener('click', () => closeModal());
modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal();
    if (e.key === ' ' && modalOverlay.classList.contains('active')) {
        e.preventDefault();
        if (isPlaying) stopAudio();
        else if (currentTrackId) playTrack(currentTrackId);
    }
});

renderTrackList();
updateAllTrackCards();
console.log('◈ NIGHT CRAWLER · WATCHING YOU SLEEP ◈');
})();
</script>
