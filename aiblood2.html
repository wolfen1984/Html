<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOOD CIRCUIT · ENHANCED TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0c0c0c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 16px;
        }
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(255, 30, 80, 0.03) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2;
        }
        .crt {
            animation: textflicker 0.01s infinite;
        }
        @keyframes textflicker {
            0% { text-shadow: 0 0 3px #1eff6c; }
            50% { text-shadow: 0 0 1px #1eff6c; }
            100% { text-shadow: 0 0 3px #1eff6c; }
        }
        .terminal {
            background: #000;
            color: #1eff6c;
            border: 4px solid #1eff6c;
            box-shadow: 0 0 15px #1eff6c, inset 0 0 10px #1eff6c;
            width: 100%;
            max-width: 950px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 20px 20px 15px 20px;
            position: relative;
            z-index: 1;
        }
        .header {
            border-bottom: 2px solid #1eff6c;
            padding-bottom: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            line-height: 1.8;
            text-transform: uppercase;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            text-shadow: 0 0 5px #1eff6c;
            letter-spacing: 1px;
        }
        .header-left, .header-right { color: #1eff6c; }
        .header-center {
            text-align: center;
            width: 100%;
            margin-top: 8px;
            font-size: 14px;
            background: #000;
            color: #1eff6c;
            padding: 6px 0;
            border: 2px solid #1eff6c;
            letter-spacing: 4px;
            box-shadow: inset 0 0 10px #1eff6c;
        }
        .output {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 8px;
            border: 2px solid #1eff6c;
            padding: 18px 14px;
            background: #000;
            scroll-behavior: auto;
            word-break: break-word;
            box-shadow: inset 0 0 20px #1eff6c;
        }
        .output p {
            margin: 0 0 14px 0;
            color: #1eff6c;
            text-shadow: 0 0 5px #1eff6c;
        }
        .output p:last-child { margin-bottom: 0; }

        .hud {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #1eff6c;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 10px;
            text-transform: uppercase;
            background: #000;
            box-shadow: inset 0 0 10px #1eff6c;
            font-family: 'Press Start 2P', monospace;
            color: #1eff6c;
            text-shadow: 0 0 5px #1eff6c;
            gap: 8px;
        }
        .hud-section {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .health-bar, .reputation-bar {
            display: inline-block;
            letter-spacing: 2px;
            font-size: 12px;
        }
        .hud-label {
            opacity: 0.8;
            font-size: 8px;
        }
        .inventory-text {
            font-size: 9px;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .input-line {
            display: flex;
            align-items: center;
            border-top: 2px solid #1eff6c;
            padding-top: 12px;
            font-size: 16px;
        }
        .prompt { 
            color: #1eff6c; 
            margin-right: 10px; 
            font-size: 18px;
            text-shadow: 0 0 8px #1eff6c;
        }
        #userInput {
            flex: 1;
            background: #000;
            border: 2px solid #1eff6c;
            color: #1eff6c;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 16px;
            padding: 12px 12px;
            outline: none;
            text-transform: uppercase;
            box-shadow: 0 0 8px #1eff6c;
        }
        #userInput::placeholder { 
            color: #1eff6c; 
            font-size: 11px; 
            text-transform: none; 
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            color: #1eff6c;
            margin-top: 10px;
            border-top: 1px solid #1eff6c;
            padding-top: 8px;
            text-shadow: 0 0 5px #1eff6c;
        }
        .footer-left, .footer-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .clickable {
            color: #ff1e4f;
            text-decoration: underline;
            cursor: pointer;
            text-shadow: 0 0 5px #ff1e4f;
            transition: all 0.1s ease;
        }
        .clickable:hover {
            color: #1eff6c;
            text-shadow: 0 0 10px #1eff6c, 0 0 20px #1eff6c;
            background: #ff1e4f20;
        }
        .status {
            color: red;
            font-size: 15px;
            margin-top: 8px;
            letter-spacing: 1px;
            text-align: right;
            text-shadow: 0 0 5px red;
        }
        #fileInput { display: none; }
    </style>
</head>
<body class="crt">
    <div class="terminal">
        <div class="header">
            <div class="header-left">BLOOD CIRCUIT<br>BOUNTY DIVISION</div>
            <div class="header-right">CASE FILE: #BC-2147<br>CLASSIFIED</div>
            <div class="header-center">⏣ THE CIRCUIT ⏣</div>
        </div>

        <!-- Enhanced HUD with inventory -->
        <div id="hudContainer" class="hud">
            <div class="hud-section"><span class="hud-label">LOC:</span> <span id="hudLocation">LOFT</span></div>
            <div class="hud-section"><span class="hud-label">HP:</span> <span id="hudHealthBar" class="health-bar">[██████░░]</span></div>
            <div class="hud-section"><span class="hud-label">TIME:</span> <span id="hudTime">21:00</span></div>
            <div class="hud-section"><span class="hud-label">WX:</span> <span id="hudWeather">RAIN</span></div>
            <div class="hud-section"><span class="hud-label">CORP:</span> <span id="hudRepCorp" class="reputation-bar">[··]</span></div>
            <div class="hud-section"><span class="hud-label">UND:</span> <span id="hudRepUnder" class="reputation-bar">[··]</span></div>
            <div class="hud-section"><span class="hud-label">PD:</span> <span id="hudRepPolice" class="reputation-bar">[··]</span></div>
            <div class="hud-section"><span class="hud-label">INV:</span> <span id="hudInventory" class="inventory-text">—</span></div>
            <div class="hud-section"><span class="hud-label">QUEST:</span> <span id="hudQuest" class="inventory-text">—</span></div>
        </div>

        <div id="outputArea" class="output"></div>

        <div class="input-line">
            <span class="prompt">❯</span>
            <input type="text" id="userInput" placeholder="ENTER COMMAND..." autofocus disabled>
        </div>
        <div class="status" id="aiStatus">⚡ SYSTEM BOOTING... ⚡</div>
        
        <div class="footer">
            <div class="footer-left">
                <span class="clickable" id="saveBtn">[SAVE]</span>
                <span class="clickable" id="loadBtn">[LOAD]</span>
                <span class="clickable" id="muteBtn">[MUTE]</span>
            </div>
            <div class="footer-right">
                <span class="clickable" id="resetBtn">[RESET]</span>
                <span>BLOOD CIRCUIT 2147</span>
            </div>
        </div>
    </div>
    <input type="file" id="fileInput" accept=".json,application/json">

    <script>
        (function() {
            // DOM elements
            const outputDiv = document.getElementById('outputArea');
            const inputField = document.getElementById('userInput');
            const aiStatus = document.getElementById('aiStatus');
            const resetBtn = document.getElementById('resetBtn');
            const saveBtn = document.getElementById('saveBtn');
            const loadBtn = document.getElementById('loadBtn');
            const muteBtn = document.getElementById('muteBtn');
            const fileInput = document.getElementById('fileInput');
            const hudLocation = document.getElementById('hudLocation');
            const hudHealthBar = document.getElementById('hudHealthBar');
            const hudTime = document.getElementById('hudTime');
            const hudWeather = document.getElementById('hudWeather');
            const hudRepCorp = document.getElementById('hudRepCorp');
            const hudRepUnder = document.getElementById('hudRepUnder');
            const hudRepPolice = document.getElementById('hudRepPolice');
            const hudInventory = document.getElementById('hudInventory');
            const hudQuest = document.getElementById('hudQuest');

            // ========== ENHANCED SYSTEM PROMPT (Lore + Mechanics) ==========
            const systemPrompt = `You are the game master for BLOOD CIRCUIT, a dystopian cyberpunk interactive fiction game. The player is a bounty hunter in a sprawling metropolis hunting rogue synthetics.

**WORLD LORE:**
- The city is divided into zones: Your Loft, Central Precinct, Neon Bazaar, SynthCorp Tower, The Docks, Rustyard, Circuit Arena, Red Light Sector.
- Factions: SynthCorp (corporate), The Underworld (criminals), Central Precinct (police). Reputation with each ranges -5 to +5.
- Common NPCs: Vex (data broker, Neon Bazaar), Officer Kael (Central Precinct), Mama Rose (Rustyard fixer), Jax (SynthCorp security).
- Main quest: Track down a rogue synthetic designated "ECHO-7". It has multiple stages: locate clues, confront, capture/eliminate.

**GAME MECHANICS:**
- Track variables: location|health|time|weather|rep_corp|rep_underworld|rep_police|inventory|quest
- **Health**: 0-10. If health reaches 0, the game ends. Include an immediate game over message and do not continue.
- **Time**: Advance slowly (1-2 hours per major action). Use 24h format.
- **Weather**: Rain, Mist, Clear, Smog.
- **Reputation**: Affects NPC reactions. High corp rep = discounts at SynthCorp. Low police rep = patrols harass player. Low underworld rep = fixers refuse service.
- **Inventory**: Comma-separated list of items (e.g., "medkit,keycard,scrambler"). Players can acquire items through actions and use them by typing "USE [ITEM]". When they use an item, update inventory accordingly.
- **Quest**: Format "main:stage" where stage is 0 (inactive), 1 (active), 2 (clue found), 3 (confrontation), 4 (completed). Once stage reaches 4, trigger an end-game epilogue and ask if they want to reset.

**RESPONSE RULES:**
- Narrate in gritty noir style, 2-4 sentences. Always include at least one named NPC interaction when possible.
- At the end, provide 3-5 distinct clickable actions in brackets, e.g., [SEARCH THE TERMINAL] [TALK TO VEX] [USE MEDKIT].
- Always include the current state line at the end in the exact format: ##STATE## location|health|time|weather|rep_corp|rep_underworld|rep_police|inventory|quest
- When the player uses an item like "medkit", increase health by 2 (max 10) and remove the item from inventory.
- When the player asks about inventory, show the list.
- If health reaches 0, stop the game and include a message like "GAME OVER. Type RESET to restart."

**CONSEQUENCES:**
- Low health affects narrative descriptions (e.g., "you limp, clutching a wound").
- Reputation changes should be clearly shown in the narrative (e.g., "Officer Kael scowls at your bad rep with the precinct").
- The main quest must progress based on player actions. Provide clues that lead to the next stage.
- End the game when quest stage reaches 4, then offer a reset.`;

            const introMessage = `RAIN SLASHES ACROSS THE NEON-DRENCHED STREETS OF THE METROPOLIS. YOU SIT IN YOUR LOFT, A HALF-EMPTY BOTTLE OF SYNTHWHISKEY ON THE TABLE. YOUR AIRCAR IS PARKED ON THE ROOF. THE TERMINAL BLINKS: A NEW BOUNTY FROM CENTRAL PRECINCT.\n\nWHAT DO YOU DO? [CHECK TERMINAL] [EXIT LOFT]`;

            const initialState = "##STATE## Your Loft|10|21:00|Rain|0|0|0|medkit|main:1";

            let messages = [
                { role: 'assistant', content: introMessage + "\n" + initialState }
            ];

            // Audio context (muted by default)
            let audioCtx = null;
            let rainNode = null;
            let humNode = null;
            let currentLocation = "Your Loft";
            let isMuted = false;

            // Floppy sound nodes
            let floppySource = null;
            let floppyGain = null;
            let floppyLooping = false;

            // Typewriter skip flag
            let skipAnimation = false;
            let currentTypingPromise = null;

            // Auto-save flag
            let autoSaveEnabled = true;

            // Helper: parse state from string
            function parseState(stateLine) {
                if (!stateLine.startsWith('##STATE##')) return null;
                const parts = stateLine.replace('##STATE##', '').trim().split('|');
                if (parts.length < 9) return null;
                return {
                    location: parts[0],
                    health: parseInt(parts[1]),
                    time: parts[2],
                    weather: parts[3],
                    rep_corp: parseInt(parts[4]),
                    rep_underworld: parseInt(parts[5]),
                    rep_police: parseInt(parts[6]),
                    inventory: parts[7],
                    quest: parts[8]
                };
            }

            // Validate and clamp state values
            function validateState(stateObj) {
                let changed = false;
                if (isNaN(stateObj.health)) stateObj.health = 10;
                stateObj.health = Math.min(10, Math.max(0, stateObj.health));
                if (stateObj.health < 0) stateObj.health = 0;
                if (stateObj.health > 10) stateObj.health = 10;

                ['rep_corp', 'rep_underworld', 'rep_police'].forEach(rep => {
                    if (isNaN(stateObj[rep])) stateObj[rep] = 0;
                    stateObj[rep] = Math.min(5, Math.max(-5, stateObj[rep]));
                    if (stateObj[rep] !== stateObj[rep]) changed = true;
                });

                if (!stateObj.inventory) stateObj.inventory = '';
                // Ensure inventory is a clean comma list
                stateObj.inventory = stateObj.inventory.split(',').map(i => i.trim()).filter(i => i).join(',');

                if (!stateObj.quest || !stateObj.quest.includes(':')) stateObj.quest = 'main:1';
                return stateObj;
            }

            // Update HUD from state line
            function updateHUDFromState(stateLine) {
                let state = parseState(stateLine);
                if (!state) return;
                state = validateState(state);

                hudLocation.textContent = state.location.toUpperCase();
                const filled = '█'.repeat(state.health);
                const empty = '░'.repeat(10 - state.health);
                hudHealthBar.textContent = `[${filled}${empty}]`;
                hudTime.textContent = state.time;
                hudWeather.textContent = state.weather;
                hudRepCorp.textContent = formatRep(state.rep_corp);
                hudRepUnder.textContent = formatRep(state.rep_underworld);
                hudRepPolice.textContent = formatRep(state.rep_police);
                hudInventory.textContent = state.inventory || '—';
                // Show quest name and stage
                const [qName, qStage] = state.quest.split(':');
                hudQuest.textContent = `${qName.toUpperCase()} (${qStage}/4)`;

                if (currentLocation !== state.location) {
                    currentLocation = state.location;
                    updateAmbientSound(state.location);
                }

                // Auto-save after HUD update
                if (autoSaveEnabled) {
                    saveToLocalStorage();
                }
            }

            function formatRep(val) {
                if (val > 0) return `+${val}`;
                return `${val}`;
            }

            function filterStateFromContent(content) {
                const idx = content.indexOf('##STATE##');
                if (idx === -1) return content;
                return content.substring(0, idx).trim();
            }

            function appendOutput(text) {
                const p = document.createElement('p');
                p.textContent = text;
                outputDiv.appendChild(p);
                outputDiv.scrollTop = outputDiv.scrollHeight;
            }

            function rebuildOutputFromMessages() {
                outputDiv.innerHTML = '';
                for (let msg of messages) {
                    if (msg.role === 'user') {
                        appendOutput('> ' + msg.content.toUpperCase());
                    } else if (msg.role === 'assistant') {
                        const displayContent = filterStateFromContent(msg.content);
                        if (displayContent) {
                            appendOutput(displayContent);
                        }
                    }
                }
                const lastAssistant = [...messages].reverse().find(m => m.role === 'assistant');
                if (lastAssistant) {
                    const stateLine = lastAssistant.content.split('##STATE##')[1];
                    if (stateLine) {
                        updateHUDFromState('##STATE##' + stateLine);
                    }
                }
            }

            function makeClickable(paragraphElement) {
                const originalText = paragraphElement.textContent;
                const html = originalText.replace(/\[([^\]]+)\]/g, '<span class="clickable" data-command="$1">[$1]</span>');
                paragraphElement.innerHTML = html;
                paragraphElement.querySelectorAll('.clickable').forEach(span => {
                    span.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const command = span.dataset.command;
                        inputField.value = command;
                        handleCommand();
                    });
                });
            }

            // Typewriter effect with skip support
            async function typewriterEffect(text, container) {
                if (currentTypingPromise) {
                    // If already typing, skip current
                    skipAnimation = true;
                    try { await currentTypingPromise; } catch(e) {}
                }
                skipAnimation = false;
                const p = document.createElement('p');
                container.appendChild(p);
                let fullText = '';
                const chars = text.split('');
                for (let i = 0; i < chars.length; i++) {
                    if (skipAnimation) {
                        // Skip the rest of animation
                        p.textContent = text;
                        fullText = text;
                        skipAnimation = false;
                        break;
                    }
                    fullText += chars[i];
                    p.textContent = fullText;
                    playKeySound();
                    await new Promise(resolve => setTimeout(resolve, 30));
                    container.scrollTop = container.scrollHeight;
                }
                makeClickable(p);
                return p;
            }

            // Boot sequence (unchanged but with skip)
            async function bootSequence() {
                inputField.disabled = true;
                aiStatus.textContent = '⚡ SYSTEM BOOTING... ⚡';
                outputDiv.innerHTML = '';

                const bootMessages = [
                    '> BLOOD CIRCUIT OS v4.0 (ENHANCED)',
                    '> 256K MEMORY CHECK... OK',
                    '> AIRCAR INTERFACE... ONLINE',
                    '> SYNTH SCAN MODULE... ONLINE',
                    '> INVENTORY MANAGER... ONLINE',
                    '> LOADING CASE FILE #BC-2147...'
                ];

                for (let msg of bootMessages) {
                    appendOutput(msg);
                    await new Promise(r => setTimeout(r, 300));
                }

                appendOutput('> BOOT SEQUENCE: ');
                const barContainer = document.createElement('p');
                outputDiv.appendChild(barContainer);
                for (let i = 0; i <= 20; i++) {
                    barContainer.textContent = '> BOOT SEQUENCE: [' + '█'.repeat(i) + '░'.repeat(20-i) + ']';
                    outputDiv.scrollTop = outputDiv.scrollHeight;
                    await new Promise(r => setTimeout(r, 60));
                }
                await new Promise(r => setTimeout(r, 200));
                outputDiv.innerHTML = '';
                const introWithoutState = filterStateFromContent(introMessage);
                await typewriterEffect(introWithoutState, outputDiv);
                aiStatus.textContent = '⚡ SYSTEM WAITING // AWAITING INPUT ⚡';
                inputField.disabled = false;
                inputField.focus();
                updateHUDFromState(initialState);
            }

            // Save/Load functions
            function saveToLocalStorage() {
                try {
                    const lastAssistant = [...messages].reverse().find(m => m.role === 'assistant');
                    if (lastAssistant && lastAssistant.content.includes('##STATE##')) {
                        localStorage.setItem('bloodCircuitSave', JSON.stringify(messages));
                    }
                } catch(e) {}
            }

            function loadFromLocalStorage() {
                const saved = localStorage.getItem('bloodCircuitSave');
                if (saved) {
                    try {
                        const loaded = JSON.parse(saved);
                        if (Array.isArray(loaded) && loaded.length > 0) {
                            messages = loaded;
                            rebuildOutputFromMessages();
                            aiStatus.textContent = '📀 SAVED GAME RESTORED';
                            setTimeout(() => aiStatus.textContent = '⚡ SYSTEM WAITING // READY ⚡', 2000);
                            return true;
                        }
                    } catch(e) {}
                }
                return false;
            }

            function resetGame() {
                messages = [
                    { role: 'assistant', content: introMessage + "\n" + initialState }
                ];
                bootSequence();
            }

            function saveGame() {
                const dataStr = JSON.stringify(messages, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `blood_circuit_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                aiStatus.textContent = '💾 CASE SAVED';
                setTimeout(() => aiStatus.textContent = '⚡ SYSTEM WAITING // READY ⚡', 1500);
            }

            function loadGameFromFile(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const loaded = JSON.parse(e.target.result);
                        if (!Array.isArray(loaded) || loaded.length === 0) throw new Error('Invalid save');
                        messages = loaded;
                        rebuildOutputFromMessages();
                        aiStatus.textContent = '📂 CASE LOADED';
                        inputField.disabled = false;
                        inputField.focus();
                        setTimeout(() => aiStatus.textContent = '⚡ SYSTEM WAITING // READY ⚡', 1500);
                    } catch (err) {
                        aiStatus.textContent = `❌ LOAD ERROR: ${err.message}`;
                    }
                };
                reader.readAsText(file);
            }

            // Audio functions
            function initAudio() {
                if (audioCtx || isMuted) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                // Rain noise
                const bufferSize = 2 * audioCtx.sampleRate;
                const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
                const noise = audioCtx.createBufferSource();
                noise.buffer = noiseBuffer;
                noise.loop = true;
                const filter = audioCtx.createBiquadFilter();
                filter.type = "lowpass";
                filter.frequency.value = 1000;
                const gain = audioCtx.createGain();
                gain.gain.value = 0.1;
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                rainNode = { noise, filter, gain };
                const humOsc = audioCtx.createOscillator();
                humOsc.type = "sine";
                humOsc.frequency.value = 120;
                const humGain = audioCtx.createGain();
                humGain.gain.value = 0.02;
                humOsc.connect(humGain);
                humGain.connect(audioCtx.destination);
                humNode = { osc: humOsc, gain: humGain };
                noise.start();
                humOsc.start();
            }

            function updateAmbientSound(location) {
                if (!audioCtx || !rainNode || !humNode || isMuted) return;
                let rainVol = 0.1, humFreq = 120, humVol = 0.02;
                switch(location) {
                    case "The Docks": rainVol = 0.25; humFreq = 80; break;
                    case "SynthCorp Tower": rainVol = 0.05; humFreq = 200; humVol = 0.05; break;
                    case "Neon Bazaar": rainVol = 0.15; humFreq = 150; break;
                    default: rainVol = 0.1; humFreq = 100;
                }
                rainNode.gain.gain.setValueAtTime(rainVol, audioCtx.currentTime);
                humNode.osc.frequency.setValueAtTime(humFreq, audioCtx.currentTime);
                humNode.gain.gain.setValueAtTime(humVol, audioCtx.currentTime);
            }

            function playKeySound() {
                if (!audioCtx || isMuted) return;
                try {
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 800;
                    gain.gain.setValueAtTime(0.03, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 0.05);
                } catch(e) {}
            }

            function startFloppySound() {
                if (!audioCtx || isMuted) return;
                if (audioCtx.state === 'suspended') audioCtx.resume();
                stopFloppySound();
                floppyGain = audioCtx.createGain();
                floppyGain.gain.value = 0.1;
                floppyGain.connect(audioCtx.destination);
                const buffer = createFloppyBuffer(audioCtx);
                floppySource = audioCtx.createBufferSource();
                floppySource.buffer = buffer;
                floppySource.loop = true;
                floppySource.connect(floppyGain);
                floppySource.start();
                floppyLooping = true;
            }

            function stopFloppySound() {
                if (floppySource) {
                    try { floppySource.stop(); } catch(e) {}
                    floppySource.disconnect();
                    floppySource = null;
                }
                if (floppyGain) {
                    floppyGain.disconnect();
                    floppyGain = null;
                }
                floppyLooping = false;
            }

            function createFloppyBuffer(ctx) {
                const duration = 3.0;
                const sampleRate = ctx.sampleRate;
                const buffer = ctx.createBuffer(1, sampleRate * duration, sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < buffer.length; i++) {
                    let t = i / sampleRate;
                    let motor = 0.1 * Math.sin(2 * Math.PI * 110 * t);
                    let click = (Math.random() < 0.008) ? (Math.random() * 2 - 1) * 0.3 : 0;
                    let hiss = (Math.random() * 2 - 1) * 0.03;
                    let sample = motor + click + hiss;
                    if (sample > 0.8) sample = 0.8;
                    if (sample < -0.8) sample = -0.8;
                    data[i] = sample;
                }
                return buffer;
            }

            function toggleMute() {
                isMuted = !isMuted;
                if (isMuted) {
                    if (rainNode) rainNode.gain.gain.value = 0;
                    if (humNode) humNode.gain.gain.value = 0;
                    stopFloppySound();
                } else {
                    if (audioCtx && rainNode && humNode) {
                        updateAmbientSound(currentLocation);
                    }
                }
                muteBtn.textContent = isMuted ? '[UNMUTE]' : '[MUTE]';
            }

            // Client-side help command
            function showHelp() {
                const helpText = `AVAILABLE COMMANDS:
- [go to <location>] – Move to another district.
- [talk to <npc>] – Speak with characters.
- [use <item>] – Use an item from inventory.
- [check inventory] – Show items you carry.
- [save] / [load] – Save/load game manually.
- [reset] – Restart the game.
- [help] – Show this message.

LOCATIONS: Your Loft, Central Precinct, Neon Bazaar, SynthCorp Tower, The Docks, Rustyard, Circuit Arena, Red Light Sector.
ITEMS: medkit (heals 2), keycard, scrambler, etc.`;
                appendOutput(helpText);
            }

            // API call
            async function callFreeAI(userInput) {
                if (userInput.toLowerCase() === 'help') {
                    showHelp();
                    return;
                }

                messages.push({ role: 'user', content: userInput });
                appendOutput('> ' + userInput.toUpperCase());

                aiStatus.textContent = '⏳ SYSTEM PROCESSING... ⏳';
                inputField.disabled = true;
                startFloppySound();

                try {
                    let fullPrompt = systemPrompt + "\n\n";
                    for (let msg of messages.slice(-12)) { // keep last 12 for context
                        if (msg.role === 'user') fullPrompt += "Player: " + msg.content + "\n";
                        else fullPrompt += "Game Master: " + msg.content + "\n";
                    }
                    fullPrompt += "Game Master:";

                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer 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`
                        },
                        body: JSON.stringify({
                            model: 'llama-3.3-70b-versatile',
                            messages: [{ role: "user", content: fullPrompt }],
                            temperature: 0.8,
                            max_tokens: 700,
                            top_p: 0.95
                        })
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`HTTP ${response.status}: ${errorText}`);
                    }

                    const data = await response.json();
                    let aiMessage = data.choices[0].message.content;

                    stopFloppySound();

                    // Ensure state line exists
                    if (!aiMessage.includes('##STATE##')) {
                        const lastAssistant = [...messages].reverse().find(m => m.role === 'assistant');
                        let lastState = '';
                        if (lastAssistant) {
                            const parts = lastAssistant.content.split('##STATE##');
                            if (parts.length > 1) lastState = '##STATE##' + parts[1];
                        }
                        if (!lastState) lastState = initialState;
                        aiMessage += '\n' + lastState;
                    }

                    const stateLineIndex = aiMessage.indexOf('##STATE##');
                    const displayText = stateLineIndex >= 0 ? aiMessage.substring(0, stateLineIndex).trim() : aiMessage;
                    const stateLine = stateLineIndex >= 0 ? aiMessage.substring(stateLineIndex) : '';

                    // Validate state line
                    let stateObj = parseState(stateLine);
                    if (stateObj) {
                        stateObj = validateState(stateObj);
                        const newStateLine = `##STATE## ${stateObj.location}|${stateObj.health}|${stateObj.time}|${stateObj.weather}|${stateObj.rep_corp}|${stateObj.rep_underworld}|${stateObj.rep_police}|${stateObj.inventory}|${stateObj.quest}`;
                        aiMessage = displayText + '\n' + newStateLine;
                    }

                    aiStatus.textContent = '⏳ SYSTEM TYPING... ⏳';
                    await typewriterEffect(displayText, outputDiv);

                    messages.push({ role: 'assistant', content: aiMessage });
                    const finalStateLine = aiMessage.split('##STATE##')[1];
                    if (finalStateLine) updateHUDFromState('##STATE##' + finalStateLine);

                    aiStatus.textContent = '⚡ SYSTEM WAITING // READY ⚡';
                    inputField.disabled = false;
                    inputField.focus();

                } catch (err) {
                    stopFloppySound();
                    console.error(err);
                    aiStatus.textContent = `❌ ERROR: ${err.message} ❌`;
                    messages.pop();
                    inputField.disabled = false;
                    inputField.focus();
                }
            }

            function handleCommand() {
                const cmd = inputField.value.trim();
                if (cmd === '') return;
                callFreeAI(cmd);
                inputField.value = '';
            }

            // Event listeners
            inputField.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleCommand();
                } else if (e.key === 'Escape') {
                    skipAnimation = true;
                }
            });

            resetBtn.addEventListener('click', resetGame);
            saveBtn.addEventListener('click', saveGame);
            loadBtn.addEventListener('click', () => fileInput.click());
            muteBtn.addEventListener('click', toggleMute);
            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) loadGameFromFile(e.target.files[0]);
                fileInput.value = '';
            });

            window.addEventListener('load', () => {
                // Try to load saved game from localStorage
                if (!loadFromLocalStorage()) {
                    bootSequence();
                }
                document.body.addEventListener('click', function init() {
                    initAudio();
                    updateAmbientSound(currentLocation);
                }, { once: true });
            });
        })();
    </script>
</body>
</html>
