<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Maker © 1984 Nightfall Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Press Start 2P', 'Courier New', Courier, monospace;
        }
        body {
            background: #0c0c0c;
            color: #0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #terminal {
            max-width: 1200px;
            width: 100%;
            border: 4px solid #0f0;
            padding: 20px;
            background: #000;
            box-shadow: 0 0 20px #0f0;
        }
        h1, h2 {
            text-align: center;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: normal;
            border-bottom: 2px solid #0f0;
            padding-bottom: 10px;
        }
        .toolbar {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .toolbar button {
            background: #000;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 10px 25px;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 8px #0f0;
            transition: 0.2s;
        }
        .toolbar button:hover {
            background: #0f0;
            color: #000;
            border-color: #000;
        }
        .mode-section {
            border: 2px solid #0f0;
            padding: 15px;
            margin-top: 10px;
        }
        .tabs {
            display: flex;
            gap: 5px;
            border-bottom: 2px solid #0f0;
            padding-bottom: 5px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .tab-button {
            background: #111;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 1rem;
        }
        .tab-button.active {
            background: #0f0;
            color: #000;
            font-weight: bold;
        }
        .entity-list {
            background: #111;
            border: 1px solid #0f0;
            padding: 10px;
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        .entity-item {
            border-bottom: 1px dashed #0f0;
            padding: 8px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .entity-item span {
            font-size: 0.95rem;
        }
        .entity-item button {
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            margin-left: 5px;
            cursor: pointer;
            padding: 4px 8px;
        }
        .entity-item button.edit-btn {
            border-color: #ff0;
            color: #ff0;
        }
        .entity-item button.edit-btn:hover {
            background: #ff0;
            color: #000;
        }
        .entity-item button.delete-btn {
            border-color: #f00;
            color: #f00;
        }
        .entity-item button.delete-btn:hover {
            background: #f00;
            color: #000;
        }
        .edit-form {
            background: #111;
            border: 1px solid #0f0;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 10px;
            align-items: center;
        }
        .edit-form label {
            color: #0f0;
            font-weight: bold;
        }
        .edit-form input, .edit-form select, .edit-form textarea {
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 6px;
            font-family: inherit;
        }
        .edit-form textarea {
            resize: vertical;
            min-height: 50px;
        }
        .edit-form button {
            grid-column: span 2;
            background: #0f0;
            border: none;
            color: #000;
            font-weight: bold;
            padding: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            margin-top: 10px;
        }
        .extra-field {
            grid-column: span 2;
            display: contents;
        }
        #play-area {
            display: flex;
            flex-direction: column;
        }
        #output {
            background: #111;
            border: 2px solid #0f0;
            height: 300px;
            overflow-y: scroll;
            padding: 10px;
            white-space: pre-wrap;
            font-size: 1rem;
            line-height: 1.4;
            margin-bottom: 15px;
        }
        .command-line {
            display: flex;
            gap: 10px;
        }
        #command-input {
            flex: 1;
            background: #000;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 12px;
            font-size: 1.2rem;
            outline: none;
        }
        #send-command, #restart-play {
            background: #000;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
        }
        #send-command:hover, #restart-play:hover {
            background: #0f0;
            color: #000;
        }
        .status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #0f0;
            font-weight: bold;
        }
        .hidden {
            display: none !important;
        }
        hr {
            border-color: #0f0;
        }
        .small-input {
            width: 70px;
        }
        .help-text {
            font-size: 0.7rem;
            color: #0f0;
            grid-column: span 2;
        }
    </style>
</head>
<body>
<div id="terminal">
    <h1>⚡ ADVENTURE MAKER ⚡</h1>
    <h2>Nightfall Games · 1984</h2>

    <div class="toolbar">
        <button id="btn-edit">📝 EDIT MODE</button>
        <button id="btn-play">🎮 PLAY MODE</button>
        <button id="btn-save">💾 SAVE PROJECT</button>
        <button id="btn-load">📂 LOAD PROJECT</button>
        <button id="btn-export">💾 EXPORT GAME</button>
    </div>
    <input type="file" id="file-loader" accept=".json,application/json" style="display:none;">

    <!-- EDIT MODE PANEL -->
    <div id="edit-mode">
        <div class="tabs">
            <button class="tab-button active" data-tab="rooms">ROOMS</button>
            <button class="tab-button" data-tab="items">ITEMS</button>
            <button class="tab-button" data-tab="npcs">NPCS</button>
            <button class="tab-button" data-tab="enemies">ENEMIES</button>
            <button class="tab-button" data-tab="variables">VARIABLES</button>
        </div>

        <!-- Rooms tab -->
        <div id="tab-rooms" class="mode-section">
            <h3>📦 ROOMS</h3>
            <div id="rooms-list" class="entity-list"></div>
            <div class="edit-form" id="room-form">
                <input type="hidden" id="room-id" value="">
                <label>Name:</label><input type="text" id="room-name" placeholder="e.g. Dungeon">
                <label>Description:</label><textarea id="room-desc" placeholder="You are in a dark cell..."></textarea>
                <label>North exit (room):</label>
                <select id="room-north"><option value="">-- none --</option></select>
                <label>North condition:</label><input type="text" id="room-north-cond" placeholder="e.g. hasKey == true">
                <label>South exit:</label>
                <select id="room-south"><option value="">-- none --</option></select>
                <label>South condition:</label><input type="text" id="room-south-cond" placeholder="condition">
                <label>East exit:</label>
                <select id="room-east"><option value="">-- none --</option></select>
                <label>East condition:</label><input type="text" id="room-east-cond" placeholder="condition">
                <label>West exit:</label>
                <select id="room-west"><option value="">-- none --</option></select>
                <label>West condition:</label><input type="text" id="room-west-cond" placeholder="condition">
                <button id="add-room">➕ ADD ROOM</button>
            </div>
        </div>

        <!-- Items tab -->
        <div id="tab-items" class="mode-section hidden">
            <h3>⚔️ ITEMS</h3>
            <div id="items-list" class="entity-list"></div>
            <div class="edit-form" id="item-form">
                <input type="hidden" id="item-id" value="">
                <label>Name:</label><input type="text" id="item-name" placeholder="e.g. Rusty sword">
                <label>Description:</label><textarea id="item-desc" placeholder="An old blade..."></textarea>
                <label>Takable?</label><input type="checkbox" id="item-takable" checked>
                <label>Item Type:</label>
                <select id="item-type">
                    <option value="normal">Normal</option>
                    <option value="container">Container</option>
                    <option value="readable">Readable</option>
                    <option value="edible">Edible</option>
                    <option value="wearable">Wearable</option>
                    <option value="light">Light Source</option>
                </select>
                <!-- extra fields (shown/hidden based on type) -->
                <div id="extra-container" class="extra-field hidden">
                    <label>Capacity:</label><input type="number" id="item-capacity" value="5" min="1" class="small-input">
                    <label class="help-text">Contains (item names, comma):</label>
                    <input type="text" id="item-contains" placeholder="gold coin, key">
                </div>
                <div id="extra-readable" class="extra-field hidden">
                    <label>Text:</label><textarea id="item-readable-text" placeholder="Pages of text..."></textarea>
                </div>
                <div id="extra-edible" class="extra-field hidden">
                    <label>Food value (heal):</label><input type="number" id="item-food-value" value="2" min="1" max="10" class="small-input">
                </div>
                <div id="extra-wearable" class="extra-field hidden">
                    <label>Armor bonus:</label><input type="number" id="item-armor-bonus" value="1" min="0" class="small-input">
                </div>
                <div id="extra-light" class="extra-field hidden">
                    <label>Duration (turns):</label><input type="number" id="item-light-duration" value="10" min="1" class="small-input">
                </div>
                <label>Usable?</label><input type="checkbox" id="item-usable">
                <label>Use effect:</label><input type="text" id="item-use-effect" placeholder="e.g. A magical glow appears.">
                <label>Stackable?</label><input type="checkbox" id="item-stackable">
                <label>Quantity (if stackable):</label><input type="number" id="item-quantity" value="1" min="1" class="small-input">
                <label>Weapon?</label><input type="checkbox" id="item-weapon">
                <label>Damage (if weapon):</label><input type="number" id="item-damage" value="2" min="1" max="10" class="small-input">
                <label>Location (room):</label>
                <select id="item-location"><option value="">-- none (floating) --</option></select>
                <button id="add-item">➕ ADD ITEM</button>
            </div>
        </div>

        <!-- NPCs tab (enhanced) -->
        <div id="tab-npcs" class="mode-section hidden">
            <h3>💬 NPCS</h3>
            <div id="npcs-list" class="entity-list"></div>
            <div class="edit-form" id="npc-form">
                <input type="hidden" id="npc-id" value="">
                <label>Name:</label><input type="text" id="npc-name" placeholder="e.g. Gandalf">
                <label>Description:</label><textarea id="npc-desc" placeholder="A bearded wizard..."></textarea>
                <label>Dialogue (simple):</label><textarea id="npc-dialogue" placeholder="You shall not pass!"></textarea>
                
                <!-- Dialogue Tree -->
                <label class="help-text" style="grid-column: span 2;">--- Dialogue Tree (JSON) ---</label>
                <label>Dialogue Options:</label>
                <textarea id="npc-dialogue-options" rows="4" placeholder='[{"text":"Who are you?","condition":"","response":"I am Gandalf.","setVariable":"","giveItem":"","takeItem":""}]'></textarea>
                
                <!-- Movement -->
                <label class="help-text" style="grid-column: span 2;">--- Movement ---</label>
                <label>Movement Type:</label>
                <select id="npc-movement-type">
                    <option value="none">None</option>
                    <option value="random">Random</option>
                    <option value="conditional">Conditional</option>
                </select>
                <label>Movement Condition:</label>
                <input type="text" id="npc-movement-condition" placeholder="e.g. time > 5">
                <label>Target Room (if conditional):</label>
                <select id="npc-movement-target"><option value="">-- none --</option></select>
                
                <!-- Shop -->
                <label class="help-text" style="grid-column: span 2;">--- Shop ---</label>
                <label>Shop Enabled?</label><input type="checkbox" id="npc-shop-enabled">
                <label>Currency Item Name:</label><input type="text" id="npc-currency" value="gold coin">
                <label>Shop Inventory (JSON):</label>
                <textarea id="npc-shop-inventory" rows="3" placeholder='[{"itemName":"sword","price":10,"quantity":1}]'></textarea>
                
                <label>Location (room):</label>
                <select id="npc-location"><option value="">-- none --</option></select>
                <button id="add-npc">➕ ADD NPC</button>
            </div>
        </div>

        <!-- Enemies tab -->
        <div id="tab-enemies" class="mode-section hidden">
            <h3>👾 ENEMIES</h3>
            <div id="enemies-list" class="entity-list"></div>
            <div class="edit-form" id="enemy-form">
                <input type="hidden" id="enemy-id" value="">
                <label>Name:</label><input type="text" id="enemy-name" placeholder="e.g. Orc">
                <label>Description:</label><textarea id="enemy-desc" placeholder="A foul creature..."></textarea>
                <label>Attack power:</label><input type="number" id="enemy-attack" value="3" min="1" max="20" class="small-input">
                <label>Health:</label><input type="number" id="enemy-health" value="8" min="1" max="50" class="small-input">
                <label>Armor class:</label><input type="number" id="enemy-armor" value="0" min="0" class="small-input">
                <label>Abilities:</label><input type="text" id="enemy-abilities" placeholder="e.g. fire breath, flying">
                <label>Resistances:</label><input type="text" id="enemy-resist" placeholder="e.g. fire, ice">
                <label>Loot (item names, comma):</label><input type="text" id="enemy-loot" placeholder="gold coin, rusty sword">
                <label>Loot chance % (0-100):</label><input type="number" id="enemy-loot-chance" value="50" min="0" max="100" class="small-input">
                <label>Location (room):</label>
                <select id="enemy-location"><option value="">-- none --</option></select>
                <button id="add-enemy">➕ ADD ENEMY</button>
            </div>
        </div>

        <!-- Variables tab -->
        <div id="tab-variables" class="mode-section hidden">
            <h3>📊 GLOBAL VARIABLES</h3>
            <div id="variables-list" class="entity-list"></div>
            <div class="edit-form" id="variable-form">
                <input type="hidden" id="variable-id" value="">
                <label>Name:</label><input type="text" id="variable-name" placeholder="e.g. bridgeFixed">
                <label>Type:</label>
                <select id="variable-type">
                    <option value="boolean">Boolean</option>
                    <option value="number">Number</option>
                    <option value="string">String</option>
                </select>
                <label>Initial value:</label><input type="text" id="variable-initial" value="false">
                <button id="add-variable">➕ ADD VARIABLE</button>
            </div>
        </div>
    </div>

    <!-- PLAY MODE PANEL -->
    <div id="play-mode" class="hidden">
        <div class="status">
            <span id="player-health">❤️ HEALTH: 10</span>
            <span id="player-loc">📍 LOC: -</span>
        </div>
        <div id="output">Welcome, adventurer! Type 'help' for commands.<br></div>
        <div class="command-line">
            <input type="text" id="command-input" placeholder="> ">
            <button id="send-command">ENTER</button>
            <button id="restart-play">RESTART</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- MASTER DATA (editable) ----------
        let rooms = [];
        let items = [];
        let npcs = [];
        let enemies = [];
        let variables = [];

        // Simple ID counters
        let nextRoomId = 1, nextItemId = 1, nextNpcId = 1, nextEnemyId = 1, nextVariableId = 1;

        // ---------- HELPER: populate room dropdowns everywhere ----------
        function refreshAllRoomDropdowns() {
            const roomSelects = [
                'room-north', 'room-south', 'room-east', 'room-west',
                'item-location', 'npc-location', 'enemy-location', 'npc-movement-target'
            ];
            const options = rooms.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
            const empty = '<option value="">-- none --</option>';
            roomSelects.forEach(id => {
                const sel = document.getElementById(id);
                if (sel) {
                    const currentVal = sel.value;
                    sel.innerHTML = empty + options;
                    if (currentVal && Array.from(sel.options).some(opt => opt.value === currentVal)) {
                        sel.value = currentVal;
                    } else {
                        sel.value = '';
                    }
                }
            });
        }

        // ---------- RENDER FUNCTIONS (with Edit buttons) ----------
        function renderRooms() {
            const container = document.getElementById('rooms-list');
            container.innerHTML = '';
            rooms.forEach(r => {
                const exitText = [];
                if (r.exits.north) exitText.push(`N:${rooms.find(rm=>rm.id==r.exits.north)?.name || '?'}`);
                if (r.exits.south) exitText.push(`S:${rooms.find(rm=>rm.id==r.exits.south)?.name || '?'}`);
                if (r.exits.east) exitText.push(`E:${rooms.find(rm=>rm.id==r.exits.east)?.name || '?'}`);
                if (r.exits.west) exitText.push(`W:${rooms.find(rm=>rm.id==r.exits.west)?.name || '?'}`);
                const div = document.createElement('div');
                div.className = 'entity-item';
                div.innerHTML = `<span><b>${r.name}</b> ${exitText.length? ' ['+exitText.join(', ')+']' : ''}<br>${r.description.substring(0,30)}...</span>
                    <div>
                        <button class="edit-btn" data-id="${r.id}" data-type="room">EDIT</button>
                        <button class="delete-btn" data-id="${r.id}" data-type="room">DEL</button>
                    </div>`;
                container.appendChild(div);
            });
            attachEditDelete('room');
        }

        function editRoomById(id) {
            const room = rooms.find(r => r.id === id);
            if (!room) return;
            document.getElementById('room-id').value = room.id;
            document.getElementById('room-name').value = room.name;
            document.getElementById('room-desc').value = room.description;
            document.getElementById('room-north').value = room.exits.north || '';
            document.getElementById('room-north-cond').value = room.conditions?.north || '';
            document.getElementById('room-south').value = room.exits.south || '';
            document.getElementById('room-south-cond').value = room.conditions?.south || '';
            document.getElementById('room-east').value = room.exits.east || '';
            document.getElementById('room-east-cond').value = room.conditions?.east || '';
            document.getElementById('room-west').value = room.exits.west || '';
            document.getElementById('room-west-cond').value = room.conditions?.west || '';
            document.getElementById('add-room').textContent = 'UPDATE ROOM';
        }

        function renderItems() {
            const container = document.getElementById('items-list');
            container.innerHTML = '';
            items.forEach(it => {
                const locName = rooms.find(r => r.id === it.location)?.name || 'None';
                const containsInfo = it.contains && it.contains.length ? ` (contains ${it.contains.length} items)` : '';
                const div = document.createElement('div');
                div.className = 'entity-item';
                div.innerHTML = `<span><b>${it.name}</b> (loc:${locName}) type:${it.type}${containsInfo}</span>
                    <div>
                        <button class="edit-btn" data-id="${it.id}" data-type="item">EDIT</button>
                        <button class="delete-btn" data-id="${it.id}" data-type="item">DEL</button>
                    </div>`;
                container.appendChild(div);
            });
            attachEditDelete('item');
        }

        function editItemById(id) {
            const item = items.find(i => i.id === id);
            if (!item) return;
            document.getElementById('item-id').value = item.id;
            document.getElementById('item-name').value = item.name;
            document.getElementById('item-desc').value = item.description;
            document.getElementById('item-takable').checked = item.takable;
            document.getElementById('item-type').value = item.type || 'normal';
            document.getElementById('item-usable').checked = item.usable || false;
            document.getElementById('item-use-effect').value = item.useEffect || '';
            document.getElementById('item-stackable').checked = item.stackable || false;
            document.getElementById('item-quantity').value = item.quantity || 1;
            document.getElementById('item-weapon').checked = item.isWeapon || false;
            document.getElementById('item-damage').value = item.damage || 2;
            document.getElementById('item-location').value = item.location || '';

            // extra fields
            document.getElementById('item-capacity').value = item.capacity || 5;
            document.getElementById('item-contains').value = item.contains ? item.contains.map(id => {
                let it = items.find(i => i.id === id);
                return it ? it.name : '';
            }).filter(name => name).join(', ') : '';
            document.getElementById('item-readable-text').value = item.readableText || '';
            document.getElementById('item-food-value').value = item.foodValue || 2;
            document.getElementById('item-armor-bonus').value = item.armorBonus || 1;
            document.getElementById('item-light-duration').value = item.lightDuration || 10;
            showExtraFields(item.type || 'normal');
            document.getElementById('add-item').textContent = 'UPDATE ITEM';
        }

        function renderNpcs() {
            const container = document.getElementById('npcs-list');
            container.innerHTML = '';
            npcs.forEach(n => {
                const locName = rooms.find(r => r.id === n.location)?.name || 'None';
                const shop = n.shopEnabled ? ' 🛒' : '';
                const move = n.movementType !== 'none' ? ' 🚶' : '';
                const div = document.createElement('div');
                div.className = 'entity-item';
                div.innerHTML = `<span><b>${n.name}</b> (loc:${locName})${shop}${move}</span>
                    <div>
                        <button class="edit-btn" data-id="${n.id}" data-type="npc">EDIT</button>
                        <button class="delete-btn" data-id="${n.id}" data-type="npc">DEL</button>
                    </div>`;
                container.appendChild(div);
            });
            attachEditDelete('npc');
        }

        function editNpcById(id) {
            const npc = npcs.find(n => n.id === id);
            if (!npc) return;
            document.getElementById('npc-id').value = npc.id;
            document.getElementById('npc-name').value = npc.name;
            document.getElementById('npc-desc').value = npc.description;
            document.getElementById('npc-dialogue').value = npc.dialogue || '';
            document.getElementById('npc-dialogue-options').value = npc.dialogueOptions || '[]';
            document.getElementById('npc-movement-type').value = npc.movementType || 'none';
            document.getElementById('npc-movement-condition').value = npc.movementCondition || '';
            document.getElementById('npc-movement-target').value = npc.movementTarget || '';
            document.getElementById('npc-shop-enabled').checked = npc.shopEnabled || false;
            document.getElementById('npc-currency').value = npc.currency || 'gold coin';
            document.getElementById('npc-shop-inventory').value = npc.shopInventory || '[]';
            document.getElementById('npc-location').value = npc.location || '';
            document.getElementById('add-npc').textContent = 'UPDATE NPC';
        }

        function renderEnemies() {
            const container = document.getElementById('enemies-list');
            container.innerHTML = '';
            enemies.forEach(e => {
                const locName = rooms.find(r => r.id === e.location)?.name || 'None';
                const div = document.createElement('div');
                div.className = 'entity-item';
                div.innerHTML = `<span><b>${e.name}</b> (loc:${locName}) ATK:${e.attack} HP:${e.health}</span>
                    <div>
                        <button class="edit-btn" data-id="${e.id}" data-type="enemy">EDIT</button>
                        <button class="delete-btn" data-id="${e.id}" data-type="enemy">DEL</button>
                    </div>`;
                container.appendChild(div);
            });
            attachEditDelete('enemy');
        }

        function editEnemyById(id) {
            const enemy = enemies.find(e => e.id === id);
            if (!enemy) return;

        // ---------- PLAY MODE STATE ----------
        let gameState = null;

        function cloneMasterForPlay() {
    // Initialize variables
    let vars = {};
    variables.forEach(v => {
        vars[v.name] = v.initial;
    });

    // Deep copy all entities
    let clonedRooms = JSON.parse(JSON.stringify(rooms));
    let clonedItems = JSON.parse(JSON.stringify(items)).map(it => ({
        ...it,
        taken: false,
        containerId: null,   // will be set for items inside containers
    }));
    let clonedNpcs = JSON.parse(JSON.stringify(npcs)).map(n => ({
        ...n,
        dialogueOptions: JSON.parse(n.dialogueOptions || '[]'),
        shopInventory: JSON.parse(n.shopInventory || '[]'),
    }));
    let clonedEnemies = JSON.parse(JSON.stringify(enemies)).map(e => ({...e, alive: true}));

    // Process container relationships
    clonedItems.forEach(container => {
        if (container.type === 'container' && container.contains && container.contains.length) {
            container.contains.forEach(childId => {
                let child = clonedItems.find(it => it.id === childId);
                if (child) {
                    child.containerId = container.id;
                    child.location = null;      // item is inside container, not in a room
                    // If the child was previously takable, it still is, but now it's inside
                }
            });
        }
    });

    return {
        rooms: clonedRooms,
        items: clonedItems,
        npcs: clonedNpcs,
        enemies: clonedEnemies,
        player: {
            location: rooms.length > 0 ? rooms[0].id : null,
            health: 10,
            inventory: []
        },
        variables: vars,
        turn: 0
    };
}
                
    

        function startPlayMode() {
            if (rooms.length === 0) {
                appendOutput("No rooms defined! Use Edit mode to create a world.\n");
                return;
            }
            gameState = cloneMasterForPlay();
            updatePlayerStatus();
            appendOutput("\n--- GAME STARTED ---\n");
            look();
        }

        function appendOutput(text) {
            const out = document.getElementById('output');
            out.innerHTML += text + '<br>';
            out.scrollTop = out.scrollHeight;
        }

        function updatePlayerStatus() {
            if (!gameState) return;
            document.getElementById('player-health').innerText = `❤️ HEALTH: ${gameState.player.health}`;
            const room = gameState.rooms.find(r => r.id === gameState.player.location);
            document.getElementById('player-loc').innerText = `📍 LOC: ${room ? room.name : '???'}`;
        }

        function look() {
            if (!gameState) return;
            const room = gameState.rooms.find(r => r.id === gameState.player.location);
            if (!room) { appendOutput("You are in a void."); return; }
            let desc = `> ${room.name}\n${room.description}\n`;
            const exits = [];
            if (room.exits.north) exits.push('north');
            if (room.exits.south) exits.push('south');
            if (room.exits.east) exits.push('east');
            if (room.exits.west) exits.push('west');
            desc += `Exits: ${exits.length ? exits.join(', ') : 'none'}\n`;

            // Items: only those not in containers and not taken
            const itemsHere = gameState.items.filter(it => it.location === room.id && !it.taken && !it.containerId);
            if (itemsHere.length) {
                let itemList = itemsHere.map(i => {
                    if (i.stackable && i.quantity > 1) return `${i.name} (${i.quantity})`;
                    else return i.name;
                }).join(', ');
                desc += `You see: ${itemList}\n`;
            }

            const npcsHere = gameState.npcs.filter(n => n.location === room.id);
            if (npcsHere.length) desc += `Characters here: ${npcsHere.map(n => n.name).join(', ')}\n`;

            const enemiesHere = gameState.enemies.filter(e => e.location === room.id && e.alive);
            if (enemiesHere.length) desc += `Enemies: ${enemiesHere.map(e => e.name).join(', ')}\n`;

            appendOutput(desc);
        }

        // Helper to evaluate condition string
        function evaluateCondition(cond) {
            if (!cond) return true;
            // Check for inventory condition: has:item name
            if (cond.trim().startsWith('has:')) {
                let itemName = cond.trim().substring(4).trim().toLowerCase();
                for (let entry of gameState.player.inventory) {
                    let item = gameState.items.find(i => i.id === entry.itemId);
                    if (item && item.name.toLowerCase() === itemName) {
                        return true;
                    }
                }
                return false;
            }
            try {
                let expr = cond;
                for (let [name, val] of Object.entries(gameState.variables)) {
                    let v = val;
                    if (typeof v === 'string') v = '"' + v + '"';
                    expr = expr.replace(new RegExp('\\b' + name + '\\b', 'g'), v);
                }
                return !!eval(expr);
            } catch (e) {
                return false;
            }
        }

        // Apply effects from dialogue option
        function applyEffects(effects) {
            if (effects.setVariable) {
                let parts = effects.setVariable.split('=');
                if (parts.length === 2) {
                    let varName = parts[0].trim();
                    let value = parts[1].trim();
                    if (value === 'true') gameState.variables[varName] = true;
                    else if (value === 'false') gameState.variables[varName] = false;
                    else if (!isNaN(value)) gameState.variables[varName] = Number(value);
                    else gameState.variables[varName] = value;
                }
            }
            if (effects.giveItem) {
                let itemName = effects.giveItem.trim();
                let proto = items.find(i => i.name.toLowerCase() === itemName.toLowerCase());
                if (proto) {
                    // create a new item instance and give to player
                    let newItem = JSON.parse(JSON.stringify(proto));
                    newItem.id = nextItemId++;
                    newItem.taken = true;
                    newItem.location = null;
                    newItem.quantity = newItem.stackable ? newItem.quantity : 1;
                    gameState.items.push(newItem);
                    let invEntry = gameState.player.inventory.find(e => e.itemId === newItem.id);
                    if (invEntry) invEntry.quantity += newItem.quantity;
                    else gameState.player.inventory.push({itemId: newItem.id, quantity: newItem.quantity});
                    appendOutput(`You receive: ${newItem.name}`);
                }
            }
            if (effects.takeItem) {
                let itemName = effects.takeItem.trim();
                let invEntry = gameState.player.inventory.find(e => {
                    let it = gameState.items.find(i => i.id === e.itemId);
                    return it && it.name.toLowerCase() === itemName.toLowerCase();
                });
                if (invEntry) {
                    let item = gameState.items.find(i => i.id === invEntry.itemId);
                    if (item.stackable && invEntry.quantity > 1) {
                        invEntry.quantity -= 1;
                    } else {
                        gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== item.id);
                        item.taken = false; // not removed from world, but it's taken from player
                    }
                    appendOutput(`You lose: ${item.name}`);
                }
            }
        }

        // Process NPC movement after each command
        function processNPCMovement() {
            gameState.turn++;
            for (let npc of gameState.npcs) {
                if (npc.movementType === 'random') {
                    let currentRoom = gameState.rooms.find(r => r.id === npc.location);
                    if (!currentRoom) continue;
                    let possibleExits = [];
                    for (let dir in currentRoom.exits) {
                        if (currentRoom.exits[dir]) possibleExits.push(currentRoom.exits[dir]);
                    }
                    if (possibleExits.length > 0) {
                        let newRoomId = possibleExits[Math.floor(Math.random() * possibleExits.length)];
                        npc.location = newRoomId;
                    }
                } else if (npc.movementType === 'conditional') {
                    if (npc.movementCondition && evaluateCondition(npc.movementCondition)) {
                        if (npc.movementTarget) {
                            npc.location = npc.movementTarget;
                        }
                    }
                }
            }
        }

        // Find an item by name in the current room (including inside containers?)
        function findItemInRoom(itemName, roomId, includeContainers = false) {
            let candidates = gameState.items.filter(it => it.location === roomId && !it.taken);
            if (!includeContainers) {
                candidates = candidates.filter(it => !it.containerId); // not inside a container
            }
            return candidates.find(it => it.name.toLowerCase() === itemName.toLowerCase());
        }

        function processCommand(cmd) {
            if (!gameState) { appendOutput("No active game. Restart."); return; }
            if (gameState.player.health <= 0) { appendOutput("You are dead. Type 'restart'."); return; }

            cmd = cmd.trim().toLowerCase();
            if (cmd === '') return;

            if (cmd === 'look' || cmd === 'l') { look(); return; }
            if (cmd === 'inventory' || cmd === 'i') {
                if (gameState.player.inventory.length === 0) appendOutput("You are carrying nothing.");
                else {
                    let invList = [];
                    gameState.player.inventory.forEach(entry => {
                        const item = gameState.items.find(it => it.id === entry.itemId);
                        if (item) {
                            if (item.stackable) invList.push(`${item.name} (${entry.quantity})`);
                            else invList.push(item.name);
                        }
                    });
                    appendOutput(`You carry: ${invList.join(', ')}`);
                }
                return;
            }
            if (cmd === 'help') {
                appendOutput("Commands: look, inventory, go [dir], take [item] [num], drop [item] [num], read [item], eat [item], use [item], talk [npc], attack [enemy], open [container], put [item] in [container], take [item] from [container], list (shop), buy [item] from [npc], sell [item] to [npc], restart");
                return;
            }
            if (cmd === 'restart') { startPlayMode(); return; }

            if (cmd.startsWith('go ')) {
                const dir = cmd.substring(3).trim();
                const room = gameState.rooms.find(r => r.id === gameState.player.location);
                const targetId = room.exits[dir];
                const condition = room.conditions ? room.conditions[dir] : '';
                if (!evaluateCondition(condition)) {
                    appendOutput("You can't go that way (condition not met).");
                    return;
                }
                if (targetId && gameState.rooms.find(r => r.id === targetId)) {
                    gameState.player.location = targetId;
                    updatePlayerStatus();
                    look();
                    processNPCMovement(); // NPCs move after player moves
                } else {
                    appendOutput("You can't go that way.");
                }
                return;
            }

            // take command with optional quantity
            if (cmd.startsWith('take ')) {
                let rest = cmd.substring(5).trim();
                let num = 1;
                let itemName = rest;
                let parts = rest.split(' ');
                let lastPart = parts[parts.length-1];
                if (!isNaN(lastPart) && parts.length > 1) {
                    num = parseInt(lastPart);
                    itemName = parts.slice(0, -1).join(' ');
                }
                const room = gameState.rooms.find(r => r.id === gameState.player.location);
                // Find item not in container
                const itemCandidates = gameState.items.filter(it => it.location === room.id && !it.taken && !it.containerId && it.name.toLowerCase() === itemName);
                if (itemCandidates.length === 0) { appendOutput("No such item here."); return; }
                let item = itemCandidates[0];
                if (!item.takable) { appendOutput("You can't take that."); return; }
                if (item.stackable) {
                    let available = item.quantity;
                    if (num > available) { appendOutput(`There are only ${available} ${item.name}(s).`); return; }
                    if (num === available) {
                        item.taken = true;
                        item.location = null;
                    } else {
                        item.quantity -= num;
                    }
                    let invEntry = gameState.player.inventory.find(e => e.itemId === item.id);
                    if (invEntry) {
                        invEntry.quantity += num;
                    } else {
                        gameState.player.inventory.push({ itemId: item.id, quantity: num });
                    }
                    appendOutput(`Taken: ${num} x ${item.name}`);
                } else {
                    item.taken = true;
                    item.location = null;
                    gameState.player.inventory.push({ itemId: item.id, quantity: 1 });
                    appendOutput(`Taken: ${item.name}`);
                }
                processNPCMovement();
                return;
            }

            if (cmd.startsWith('drop ')) {
                let rest = cmd.substring(5).trim();
                let num = 1;
                let itemName = rest;
                let parts = rest.split(' ');
                let lastPart = parts[parts.length-1];
                if (!isNaN(lastPart) && parts.length > 1) {
                    num = parseInt(lastPart);
                    itemName = parts.slice(0, -1).join(' ');
                }
                let invEntry = null;
                let item = null;
                for (let entry of gameState.player.inventory) {
                    let it = gameState.items.find(i => i.id === entry.itemId);
                    if (it && it.name.toLowerCase() === itemName) {
                        invEntry = entry;
                        item = it;
                        break;
                    }
                }
                if (!invEntry) { appendOutput("You don't have that."); return; }
                if (item.stackable) {
                    if (num > invEntry.quantity) { appendOutput(`You only have ${invEntry.quantity} ${item.name}(s).`); return; }
                    invEntry.quantity -= num;
                    if (invEntry.quantity === 0) {
                        gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== item.id);
                    }
                    let worldItem = gameState.items.find(i => i.id === item.id);
                    if (worldItem.taken) {
                        worldItem.taken = false;
                        worldItem.location = gameState.player.location;
                        worldItem.quantity = num;
                    } else {
                        let existing = gameState.items.find(i => i.id === item.id && i.location === gameState.player.location && !i.taken);
                        if (existing) {
                            existing.quantity += num;
                        } else {
                            worldItem.taken = false;
                            worldItem.location = gameState.player.location;
                            worldItem.quantity = num;
                        }
                    }
                    appendOutput(`Dropped: ${num} x ${item.name}`);
                } else {
                    gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== item.id);
                    item.taken = false;
                    item.location = gameState.player.location;
                    appendOutput(`Dropped: ${item.name}`);
                }
                processNPCMovement();
                return;
            }

            if (cmd.startsWith('read ')) {
                let itemName = cmd.substring(5).trim();
                let invEntry = gameState.player.inventory.find(e => {
                    let it = gameState.items.find(i => i.id === e.itemId);
                    return it && it.name.toLowerCase() === itemName;
                });
                if (!invEntry) { appendOutput("You don't have that."); return; }
                let item = gameState.items.find(i => i.id === invEntry.itemId);
                if (item.type !== 'readable') { appendOutput("That's not readable."); return; }
                appendOutput(`You read ${item.name}: "${item.readableText}"`);
                processNPCMovement();
                return;
            }

            if (cmd.startsWith('eat ')) {
                let itemName = cmd.substring(4).trim();
                let invEntry = gameState.player.inventory.find(e => {
                    let it = gameState.items.find(i => i.id === e.itemId);
                    return it && it.name.toLowerCase() === itemName;
                });
                if (!invEntry) { appendOutput("You don't have that."); return; }
                let item = gameState.items.find(i => i.id === invEntry.itemId);
                if (item.type !== 'edible') { appendOutput("That's not edible."); return; }
                let heal = item.foodValue || 1;
                gameState.player.health = Math.min(gameState.player.health + heal, 20);
                updatePlayerStatus();
                if (item.stackable) {
                    invEntry.quantity -= 1;
                    if (invEntry.quantity === 0) {
                        gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== item.id);
                    }
                } else {
                    gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== item.id);
                    item.taken = false;
                }
                appendOutput(`You eat ${item.name}. Health +${heal}.`);
                processNPCMovement();
                return;
            }

            if (cmd.startsWith('use ')) {
                let itemName = cmd.substring(4).trim();
                let invEntry = gameState.player.inventory.find(e => {
                    let it = gameState.items.find(i => i.id === e.itemId);
                    return it && it.name.toLowerCase() === itemName;
                });
                if (!invEntry) { appendOutput("You don't have that."); return; }
                let item = gameState.items.find(i => i.id === invEntry.itemId);
                if (!item.usable) { appendOutput("That item can't be used."); return; }
                appendOutput(`You use ${item.name}: ${item.useEffect}`);
                // Optionally parse effect to set variables (we could add later)
                processNPCMovement();
                return;
            }

            // TALK command with dialogue options
            if (cmd.startsWith('talk')) {
                let npcName = cmd.substring(4).trim().replace(/^to\s+/, '');
                const room = gameState.rooms.find(r => r.id === gameState.player.location);
                const npc = gameState.npcs.find(n => n.location === room.id && n.name.toLowerCase() === npcName);
                if (!npc) { appendOutput("No one like that here."); return; }
                
                // Show simple dialogue first
                if (npc.dialogue) {
                    appendOutput(`${npc.name} says: "${npc.dialogue}"`);
                }
                
                // If there are dialogue options, present them
                if (npc.dialogueOptions && npc.dialogueOptions.length > 0) {
                    appendOutput("Choose an option:");
                    npc.dialogueOptions.forEach((opt, index) => {
                        // Check condition
                        if (opt.condition && !evaluateCondition(opt.condition)) return;
                        appendOutput(`  ${index+1}. ${opt.text}`);
                    });
                    // We'll need to handle input after this. Since we're in a synchronous input loop, we'll store pending NPC and options
                    // For simplicity, we'll just let player type the number next.
                    // We'll store the npc id in a global pending variable and handle next command as number.
                    window.pendingNPC = npc.id;
                    window.pendingOptions = npc.dialogueOptions;
                    appendOutput("Enter the number of your choice:");
                } else {
                    processNPCMovement();
                }
                return;
            }

            // Handle number input for dialogue options
            if (!isNaN(cmd) && window.pendingNPC) {
                let choice = parseInt(cmd) - 1;
                let options = window.pendingOptions;
                if (choice >= 0 && choice < options.length) {
                    let opt = options[choice];
                    // Check condition again
                    if (opt.condition && !evaluateCondition(opt.condition)) {
                        appendOutput("You cannot choose that option.");
                    } else {
                        if (opt.response) appendOutput(opt.response);
                        if (opt.setVariable || opt.giveItem || opt.takeItem) {
                            applyEffects(opt);
                        }
                    }
                } else {
                    appendOutput("Invalid choice.");
                }
                window.pendingNPC = null;
                window.pendingOptions = null;
                processNPCMovement();
                return;
            }

            // Container commands
            if (cmd.startsWith('open ')) {
                let containerName = cmd.substring(5).trim();
                // Find container in room or inventory
                let container = null;
                // First check room
                let room = gameState.rooms.find(r => r.id === gameState.player.location);
                let roomItem = gameState.items.find(it => it.location === room.id && !it.taken && it.name.toLowerCase() === containerName && it.type === 'container');
                if (roomItem) container = roomItem;
                else {
                    // Check inventory
                    let invEntry = gameState.player.inventory.find(e => {
                        let it = gameState.items.find(i => i.id === e.itemId);
                        return it && it.name.toLowerCase() === containerName && it.type === 'container';
                    });
                    if (invEntry) container = gameState.items.find(i => i.id === invEntry.itemId);
                }
                if (!container) { appendOutput("You don't see that container."); return; }
                
                // Show contents
                let contents = gameState.items.filter(it => it.containerId === container.id);
                if (contents.length === 0) {
                    appendOutput(`The ${container.name} is empty.`);
                } else {
                    let contentList = contents.map(it => it.name).join(', ');
                    appendOutput(`In ${container.name} you see: ${contentList}`);
                }
                processNPCMovement();
                return;
            }

            if (cmd.startsWith('put ')) {
                // put [item] in [container]
                let rest = cmd.substring(4).trim();
                let match = rest.match(/(.+) in (.+)/);
                if (!match) { appendOutput("Usage: put [item] in [container]"); return; }
                let itemName = match[1].trim();
                let containerName = match[2].trim();
                
                // Find container in room or inventory
                let container = null;
                let room = gameState.rooms.find(r => r.id === gameState.player.location);
                let roomContainer = gameState.items.find(it => it.location === room.id && !it.taken && it.name.toLowerCase() === containerName && it.type === 'container');
                if (roomContainer) container = roomContainer;
                else {
                    let invEntry = gameState.player.inventory.find(e => {
                        let it = gameState.items.find(i => i.id === e.itemId);
                        return it && it.name.toLowerCase() === containerName && it.type === 'container';
                    });
                    if (invEntry) container = gameState.items.find(i => i.id === invEntry.itemId);
                }
                if (!container) { appendOutput("You don't see that container."); return; }
                
                // Find item in inventory
                let invEntryItem = gameState.player.inventory.find(e => {
                    let it = gameState.items.find(i => i.id === e.itemId);
                    return it && it.name.toLowerCase() === itemName;
                });
                if (!invEntryItem) { appendOutput("You don't have that item."); return; }
                let item = gameState.items.find(i => i.id === invEntryItem.itemId);
                
                // Check container capacity (if we want to limit)
                let currentContents = gameState.items.filter(it => it.containerId === container.id).length;
                if (currentContents >= (container.capacity || 5)) {
                    appendOutput(`The ${container.name} cannot hold more items.`);
                    return;
                }
                
                // Remove from inventory
                if (item.stackable && invEntryItem.quantity > 1) {
                    invEntryItem.quantity -= 1;
                } else {
                    gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== item.id);
                }
                // Place item in container
                item.taken = false; // not taken by player anymore
                item.location = null;
                item.containerId = container.id;
                appendOutput(`You put the ${item.name} in the ${container.name}.`);
                processNPCMovement();
                return;
            }

            if (cmd.startsWith('take from ')) {
                // take [item] from [container]
                let rest = cmd.substring(10).trim();
                let match = rest.match(/(.+) from (.+)/);
                if (!match) { appendOutput("Usage: take [item] from [container]"); return; }
                let itemName = match[1].trim();
                let containerName = match[2].trim();
                
                // Find container in room or inventory
                let container = null;
                let room = gameState.rooms.find(r => r.id === gameState.player.location);
                let roomContainer = gameState.items.find(it => it.location === room.id && !it.taken && it.name.toLowerCase() === containerName && it.type === 'container');
                if (roomContainer) container = roomContainer;
                else {
                    let invEntry = gameState.player.inventory.find(e => {
                        let it = gameState.items.find(i => i.id === e.itemId);
                        return it && it.name.toLowerCase() === containerName && it.type === 'container';
                    });
                    if (invEntry) container = gameState.items.find(i => i.id === invEntry.itemId);
                }
                if (!container) { appendOutput("You don't see that container."); return; }
                
                // Find item inside container
                let item = gameState.items.find(it => it.containerId === container.id && it.name.toLowerCase() === itemName);
                if (!item) { appendOutput(`There is no ${itemName} in the ${container.name}.`); return; }
                
                // Check if takable
                if (!item.takable) { appendOutput("You can't take that."); return; }
                
                // Remove from container
                item.containerId = null;
                // Add to inventory
                let invEntry = gameState.player.inventory.find(e => e.itemId === item.id);
                if (invEntry) {
                    invEntry.quantity += (item.stackable ? item.quantity : 1);
                } else {
                    gameState.player.inventory.push({ itemId: item.id, quantity: item.stackable ? item.quantity : 1 });
                }
                item.taken = true; // mark as taken
                appendOutput(`You take the ${item.name} from the ${container.name}.`);
                processNPCMovement();
                return;
            }

            // Shop commands
            if (cmd === 'list') {
                let room = gameState.rooms.find(r => r.id === gameState.player.location);
                let shopNPCs = gameState.npcs.filter(n => n.location === room.id && n.shopEnabled);
                if (shopNPCs.length === 0) { appendOutput("No shop here."); return; }
                shopNPCs.forEach(npc => {
                    appendOutput(`${npc.name}'s shop (currency: ${npc.currency}):`);
                    npc.shopInventory.forEach(item => {
                        appendOutput(`  ${item.itemName} - ${item.price} ${npc.currency} (${item.quantity} available)`);
                    });
                });
                processNPCMovement();
                return;
            }

            if (cmd.startsWith('buy ')) {
                // buy [item] from [npc]
                let rest = cmd.substring(4).trim();
                let match = rest.match(/(.+) from (.+)/);
                if (!match) { appendOutput("Usage: buy [item] from [npc]"); return; }
                let itemName = match[1].trim();
                let npcName = match[2].trim();
                
                let room = gameState.rooms.find(r => r.id === gameState.player.location);
                let npc = gameState.npcs.find(n => n.location === room.id && n.name.toLowerCase() === npcName && n.shopEnabled);
                if (!npc) { appendOutput("No such shopkeeper here."); return; }
                
                let shopItem = npc.shopInventory.find(si => si.itemName.toLowerCase() === itemName.toLowerCase());
                if (!shopItem) { appendOutput("That item is not for sale."); return; }
                if (shopItem.quantity <= 0) { appendOutput("That item is out of stock."); return; }
                
                // Check player has enough currency
                let currencyItem = gameState.player.inventory.find(e => {
                    let it = gameState.items.find(i => i.id === e.itemId);
                    return it && it.name.toLowerCase() === npc.currency.toLowerCase();
                });
                let currencyAmount = currencyItem ? currencyItem.quantity : 0;
                if (currencyAmount < shopItem.price) {
                    appendOutput(`You need ${shopItem.price} ${npc.currency} but you have ${currencyAmount}.`);
                    return;
                }
                
                // Deduct currency
                if (currencyItem.quantity === shopItem.price) {
                    gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== currencyItem.itemId);
                    let curItem = gameState.items.find(i => i.id === currencyItem.itemId);
                    curItem.taken = false; // currency item is consumed
                } else {
                    currencyItem.quantity -= shopItem.price;
                }
                
                // Give item
                let proto = items.find(i => i.name.toLowerCase() === shopItem.itemName.toLowerCase());
                if (proto) {
                    let newItem = JSON.parse(JSON.stringify(proto));
                    newItem.id = nextItemId++;
                    newItem.taken = true;
                    newItem.location = null;
                    newItem.quantity = newItem.stackable ? newItem.quantity : 1;
                    gameState.items.push(newItem);
                    let invEntry = gameState.player.inventory.find(e => e.itemId === newItem.id);
                    if (invEntry) invEntry.quantity += newItem.quantity;
                    else gameState.player.inventory.push({itemId: newItem.id, quantity: newItem.quantity});
                    appendOutput(`You bought ${newItem.name}.`);
                }
                
                // Decrease shop quantity
                shopItem.quantity -= 1;
                processNPCMovement();
                return;
            }

            if (cmd.startsWith('sell ')) {
                // sell [item] to [npc]
                let rest = cmd.substring(5).trim();
                let match = rest.match(/(.+) to (.+)/);
                if (!match) { appendOutput("Usage: sell [item] to [npc]"); return; }
                let itemName = match[1].trim();
                let npcName = match[2].trim();
                
                let room = gameState.rooms.find(r => r.id === gameState.player.location);
                let npc = gameState.npcs.find(n => n.location === room.id && n.name.toLowerCase() === npcName && n.shopEnabled);
                if (!npc) { appendOutput("No such shopkeeper here."); return; }
                
                // Find item in inventory
                let invEntry = gameState.player.inventory.find(e => {
                    let it = gameState.items.find(i => i.id === e.itemId);
                    return it && it.name.toLowerCase() === itemName.toLowerCase();
                });
                if (!invEntry) { appendOutput("You don't have that item."); return; }
                let item = gameState.items.find(i => i.id === invEntry.itemId);
                
                // Determine price (maybe half of buy price or fixed)
                // For simplicity, we'll assume the shop buys at half price, but we need a price. We'll use the shop's sell price for that item if present.
                let shopItem = npc.shopInventory.find(si => si.itemName.toLowerCase() === itemName.toLowerCase());
                let price = shopItem ? Math.floor(shopItem.price / 2) : 1;
                
                // Remove item from inventory
                if (item.stackable && invEntry.quantity > 1) {
                    invEntry.quantity -= 1;
                } else {
                    gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== item.id);
                    item.taken = false; // item goes back to world? Actually sold, so it's gone.
                }
                
                // Give currency
                let currencyItem = gameState.items.find(i => i.name.toLowerCase() === npc.currency.toLowerCase());
                if (!currencyItem) {
                    // Create currency item if not present
                    currencyItem = {
                        id: nextItemId++,
                        name: npc.currency,
                        description: 'Currency',
                        takable: true,
                        type: 'normal',
                        stackable: true,
                        quantity: price,
                        location: null,
                        taken: true
                    };
                    gameState.items.push(currencyItem);
                    gameState.player.inventory.push({itemId: currencyItem.id, quantity: price});
                } else {
                    let invCurr = gameState.player.inventory.find(e => e.itemId === currencyItem.id);
                    if (invCurr) {
                        invCurr.quantity += price;
                    } else {
                        gameState.player.inventory.push({itemId: currencyItem.id, quantity: price});
                    }
                }
                appendOutput(`You sold ${item.name} for ${price} ${npc.currency}.`);
                processNPCMovement();
                return;
            }

            if (cmd.startsWith('attack')) {
                let enemyName = cmd.substring(6).trim();
                const room = gameState.rooms.find(r => r.id === gameState.player.location);
                const enemy = gameState.enemies.find(e => e.location === room.id && e.alive && e.name.toLowerCase() === enemyName);
                if (!enemy) { appendOutput("No such enemy here."); return; }

                let playerDamage = 1;
                const weapons = gameState.player.inventory
                    .map(entry => gameState.items.find(it => it.id === entry.itemId))
                    .filter(it => it && it.isWeapon);
                if (weapons.length > 0) {
                    playerDamage = Math.max(...weapons.map(w => w.damage), 1);
                }
                let armor = enemy.armor || 0;
                let netDamage = Math.max(1, playerDamage - armor);
                enemy.health -= netDamage;
                appendOutput(`You hit ${enemy.name} for ${netDamage} damage!`);
                if (enemy.health <= 0) {
                    enemy.alive = false;
                    appendOutput(`${enemy.name} is defeated!`);
                    if (enemy.loot) {
                        let lootItems = enemy.loot.split(',').map(s => s.trim());
                        lootItems.forEach(lootName => {
                            if (Math.random() * 100 <= enemy.lootChance) {
                                let lootProto = items.find(i => i.name.toLowerCase() === lootName.toLowerCase());
                                if (lootProto) {
                                    let newItem = JSON.parse(JSON.stringify(lootProto));
                                    newItem.id = nextItemId++;
                                    newItem.location = room.id;
                                    newItem.taken = false;
                                    newItem.quantity = newItem.stackable ? newItem.quantity : 1;
                                    gameState.items.push(newItem);
                                    appendOutput(`${enemy.name} dropped ${newItem.name}.`);
                                }
                            }
                        });
                    }
                } else {
                    let enemyDamage = enemy.attack;
                    gameState.player.health -= enemyDamage;
                    appendOutput(`${enemy.name} hits you for ${enemyDamage} damage!`);
                    updatePlayerStatus();
                    if (gameState.player.health <= 0) {
                        appendOutput("☠️ YOU HAVE DIED ☠️. Type 'restart'.");
                    }
                }
                processNPCMovement();
                return;
            }

            appendOutput("Unknown command. Try 'help'.");
        }

        document.getElementById('send-command').onclick = () => {
            const input = document.getElementById('command-input');
            processCommand(input.value);
            input.value = '';
        };
        document.getElementById('command-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('send-command').click();
        });
        document.getElementById('restart-play').onclick = startPlayMode;

        // ---------- SAVE PROJECT ----------
        document.getElementById('btn-save').onclick = () => {
            const projectData = {
                rooms,
                items,
                npcs,
                enemies,
                variables,
                nextId: {
                    nextRoomId,
                    nextItemId,
                    nextNpcId,
                    nextEnemyId,
                    nextVariableId
                }
            };
            const json = JSON.stringify(projectData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'adventure_project.json';
            a.click();
            URL.revokeObjectURL(url);
        };

        // ---------- LOAD PROJECT ----------
        document.getElementById('btn-load').onclick = () => {
            document.getElementById('file-loader').click();
        };

        document.getElementById('file-loader').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    // Validate basic structure
                    if (!Array.isArray(data.rooms) || !Array.isArray(data.items) || !Array.isArray(data.npcs) || !Array.isArray(data.enemies) || !Array.isArray(data.variables) || !data.nextId) {
                        alert('Invalid project file: missing required sections.');
                        return;
                    }
                    // Overwrite global data
                    rooms = data.rooms;
                    items = data.items;
                    npcs = data.npcs;
                    enemies = data.enemies;
                    variables = data.variables;
                    nextRoomId = data.nextId.nextRoomId;
                    nextItemId = data.nextId.nextItemId;
                    nextNpcId = data.nextId.nextNpcId;
                    nextEnemyId = data.nextId.nextEnemyId;
                    nextVariableId = data.nextId.nextVariableId;

                    renderAll();
                    alert('Project loaded successfully.');
                } catch (err) {
                    alert('Error loading file: ' + err.message);
                }
                // Reset file input so the same file can be loaded again
                e.target.value = '';
            };
            reader.readAsText(file);
        });

        // ---------- FIXED EXPORT FUNCTION (creates standalone playable HTML) ----------
        document.getElementById('btn-export').onclick = () => {
            const data = {
                rooms, items, npcs, enemies, variables,
                nextId: { nextRoomId, nextItemId, nextNpcId, nextEnemyId, nextVariableId }
            };
            const exportHtml = generateStandaloneHTML(data);
            const blob = new Blob([exportHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'adventure_export.html';
            a.click();
            URL.revokeObjectURL(url);
        };

        function generateStandaloneHTML(data) {
            // Extract the core game functions we need (processCommand, look, etc.)
            // We'll embed them in a string.
            const gameLogic = `
                // Game state
                let gameState = null;
                let nextItemId = ${data.nextId.nextItemId};

                function startGame() {
                    if (masterData.rooms.length === 0) { log("No rooms defined."); return; }
                    // Initialize variables
                    let vars = {};
                    masterData.variables.forEach(v => { vars[v.name] = v.initial; });
                    gameState = {
                        rooms: JSON.parse(JSON.stringify(masterData.rooms)),
                        items: JSON.parse(JSON.stringify(masterData.items)).map(i => ({...i, taken: false, containerId: null})),
                        npcs: JSON.parse(JSON.stringify(masterData.npcs)).map(n => ({
                            ...n,
                            dialogueOptions: JSON.parse(n.dialogueOptions || '[]'),
                            shopInventory: JSON.parse(n.shopInventory || '[]')
                        })),
                        enemies: JSON.parse(JSON.stringify(masterData.enemies)).map(e => ({...e, alive: true})),
                        player: {
                            location: masterData.rooms[0].id,
                            health: 10,
                            inventory: []
                        },
                        variables: vars,
                        turn: 0
                    };
                    updateHealth();
                    log("--- GAME STARTED ---");
                    look();
                }

                function log(text) {
                    const out = document.getElementById('output');
                    out.innerHTML += text + '<br>';
                    out.scrollTop = out.scrollHeight;
                }

                function updateHealth() {
                    document.getElementById('player-health').innerText = '❤️ HEALTH: ' + (gameState ? gameState.player.health : 10);
                }

                function look() {
                    if (!gameState) return;
                    const room = gameState.rooms.find(r => r.id === gameState.player.location);
                    if (!room) { log("You are in a void."); return; }
                    let desc = '> ' + room.name + '\\n' + room.description + '\\nExits: ';
                    const exits = [];
                    if (room.exits.north) exits.push('north');
                    if (room.exits.south) exits.push('south');
                    if (room.exits.east) exits.push('east');
                    if (room.exits.west) exits.push('west');
                    desc += exits.length ? exits.join(', ') : 'none';
                    const itemsHere = gameState.items.filter(it => it.location === room.id && !it.taken && !it.containerId);
                    if (itemsHere.length) {
                        let itemList = itemsHere.map(i => i.stackable && i.quantity > 1 ? i.name+' ('+i.quantity+')' : i.name).join(', ');
                        desc += '\\nYou see: ' + itemList;
                    }
                    const npcsHere = gameState.npcs.filter(n => n.location === room.id);
                    if (npcsHere.length) desc += '\\nCharacters here: ' + npcsHere.map(n => n.name).join(', ');
                    const enemiesHere = gameState.enemies.filter(e => e.location === room.id && e.alive);
                    if (enemiesHere.length) desc += '\\nEnemies: ' + enemiesHere.map(e => e.name).join(', ');
                    log(desc);
                }

                function evaluateCondition(cond) {
                    if (!cond) return true;
                    if (cond.trim().startsWith('has:')) {
                        let itemName = cond.trim().substring(4).trim().toLowerCase();
                        for (let entry of gameState.player.inventory) {
                            let item = gameState.items.find(i => i.id === entry.itemId);
                            if (item && item.name.toLowerCase() === itemName) return true;
                        }
                        return false;
                    }
                    try {
                        let expr = cond;
                        for (let [name, val] of Object.entries(gameState.variables)) {
                            let v = val;
                            if (typeof v === 'string') v = '"' + v + '"';
                            expr = expr.replace(new RegExp('\\\\b' + name + '\\\\b', 'g'), v);
                        }
                        return !!eval(expr);
                    } catch (e) {
                        return false;
                    }
                }

                function applyEffects(effects) {
                    if (effects.setVariable) {
                        let parts = effects.setVariable.split('=');
                        if (parts.length === 2) {
                            let varName = parts[0].trim();
                            let value = parts[1].trim();
                            if (value === 'true') gameState.variables[varName] = true;
                            else if (value === 'false') gameState.variables[varName] = false;
                            else if (!isNaN(value)) gameState.variables[varName] = Number(value);
                            else gameState.variables[varName] = value;
                        }
                    }
                    if (effects.giveItem) {
                        let itemName = effects.giveItem.trim();
                        let proto = masterData.items.find(i => i.name.toLowerCase() === itemName.toLowerCase());
                        if (proto) {
                            let newItem = JSON.parse(JSON.stringify(proto));
                            newItem.id = nextItemId++;
                            newItem.taken = true;
                            newItem.location = null;
                            newItem.quantity = newItem.stackable ? newItem.quantity : 1;
                            gameState.items.push(newItem);
                            let invEntry = gameState.player.inventory.find(e => e.itemId === newItem.id);
                            if (invEntry) invEntry.quantity += newItem.quantity;
                            else gameState.player.inventory.push({itemId: newItem.id, quantity: newItem.quantity});
                            log('You receive: ' + newItem.name);
                        }
                    }
                    if (effects.takeItem) {
                        let itemName = effects.takeItem.trim();
                        let invEntry = gameState.player.inventory.find(e => {
                            let it = gameState.items.find(i => i.id === e.itemId);
                            return it && it.name.toLowerCase() === itemName.toLowerCase();
                        });
                        if (invEntry) {
                            let item = gameState.items.find(i => i.id === invEntry.itemId);
                            if (item.stackable && invEntry.quantity > 1) {
                                invEntry.quantity -= 1;
                            } else {
                                gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== item.id);
                                item.taken = false;
                            }
                            log('You lose: ' + item.name);
                        }
                    }
                }

                function processNPCMovement() {
                    gameState.turn++;
                    for (let npc of gameState.npcs) {
                        if (npc.movementType === 'random') {
                            let currentRoom = gameState.rooms.find(r => r.id === npc.location);
                            if (!currentRoom) continue;
                            let possible = [];
                            for (let dir in currentRoom.exits) {
                                if (currentRoom.exits[dir]) possible.push(currentRoom.exits[dir]);
                            }
                            if (possible.length > 0) {
                                npc.location = possible[Math.floor(Math.random() * possible.length)];
                            }
                        } else if (npc.movementType === 'conditional' && npc.movementCondition && evaluateCondition(npc.movementCondition)) {
