                            if (npc.movementTarget) npc.location = npc.movementTarget;
                        }
                    }
                }

                function processCommand(cmd) {
                    if (!gameState) { log("No active game. Restart."); return; }
                    if (gameState.player.health <= 0) { log("You are dead. Type 'restart'."); return; }
                    cmd = cmd.trim().toLowerCase();
                    if (cmd === '') return;

                    // Look
                    if (cmd === 'look' || cmd === 'l') { look(); return; }
                    // Inventory
                    if (cmd === 'inventory' || cmd === 'i') {
                        if (gameState.player.inventory.length === 0) log("You are carrying nothing.");
                        else {
                            let inv = gameState.player.inventory.map(e => {
                                let it = gameState.items.find(i => i.id === e.itemId);
                                return it ? (it.stackable ? it.name+' ('+e.quantity+')' : it.name) : '';
                            }).join(', ');
                            log("You carry: " + inv);
                        }
                        return;
                    }
                    // Help
                    if (cmd === 'help') {
                        log("Commands: look, inventory, go [dir], take [item] [num], drop [item] [num], read [item], eat [item], use [item], talk [npc], attack [enemy], open [container], put [item] in [container], take [item] from [container], list, buy [item] from [npc], sell [item] to [npc], restart");
                        return;
                    }
                    // Restart
                    if (cmd === 'restart') { startGame(); return; }

                    // Go
                    if (cmd.startsWith('go ')) {
                        let dir = cmd.substring(3).trim();
                        let room = gameState.rooms.find(r => r.id === gameState.player.location);
                        let targetId = room.exits[dir];
                        let cond = room.conditions ? room.conditions[dir] : '';
                        if (!evaluateCondition(cond)) { log("You can't go that way."); return; }
                        if (targetId && gameState.rooms.find(r => r.id === targetId)) {
                            gameState.player.location = targetId;
                            updateHealth();
                            look();
                            processNPCMovement();
                        } else log("You can't go that way.");
                        return;
                    }

                    // Take
                    if (cmd.startsWith('take ')) {
                        let rest = cmd.substring(5).trim();
                        let num = 1, itemName = rest;
                        let parts = rest.split(' ');
                        let last = parts[parts.length-1];
                        if (!isNaN(last) && parts.length > 1) { num = parseInt(last); itemName = parts.slice(0,-1).join(' '); }
                        let room = gameState.rooms.find(r => r.id === gameState.player.location);
                        let candidates = gameState.items.filter(i => i.location === room.id && !i.taken && !i.containerId && i.name.toLowerCase() === itemName);
                        if (candidates.length === 0) { log("No such item here."); return; }
                        let item = candidates[0];
                        if (!item.takable) { log("You can't take that."); return; }
                        if (item.stackable) {
                            if (num > item.quantity) { log("Not enough."); return; }
                            if (num === item.quantity) { item.taken = true; item.location = null; }
                            else item.quantity -= num;
                            let invEntry = gameState.player.inventory.find(e => e.itemId === item.id);
                            if (invEntry) invEntry.quantity += num;
                            else gameState.player.inventory.push({itemId: item.id, quantity: num});
                            log("Taken: " + num + " x " + item.name);
                        } else {
                            item.taken = true; item.location = null;
                            gameState.player.inventory.push({itemId: item.id, quantity: 1});
                            log("Taken: " + item.name);
                        }
                        processNPCMovement();
                        return;
                    }

                    // Drop
                    if (cmd.startsWith('drop ')) {
                        let rest = cmd.substring(5).trim();
                        let num = 1, itemName = rest;
                        let parts = rest.split(' ');
                        let last = parts[parts.length-1];
                        if (!isNaN(last) && parts.length > 1) { num = parseInt(last); itemName = parts.slice(0,-1).join(' '); }
                        let invEntry = null, item = null;
                        for (let e of gameState.player.inventory) {
                            let it = gameState.items.find(i => i.id === e.itemId);
                            if (it && it.name.toLowerCase() === itemName) { invEntry = e; item = it; break; }
                        }
                        if (!invEntry) { log("You don't have that."); return; }
                        if (item.stackable) {
                            if (num > invEntry.quantity) { log("You don't have that many."); return; }
                            invEntry.quantity -= num;
                            if (invEntry.quantity === 0) gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== item.id);
                            let worldItem = gameState.items.find(i => i.id === item.id);
                            if (worldItem.taken) {
                                worldItem.taken = false; worldItem.location = gameState.player.location; worldItem.quantity = num;
                            } else {
                                let existing = gameState.items.find(i => i.id === item.id && i.location === gameState.player.location && !i.taken);
                                if (existing) existing.quantity += num;
                                else { worldItem.taken = false; worldItem.location = gameState.player.location; worldItem.quantity = num; }
                            }
                            log("Dropped: " + num + " x " + item.name);
                        } else {
                            gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== item.id);
                            item.taken = false; item.location = gameState.player.location;
                            log("Dropped: " + item.name);
                        }
                        processNPCMovement();
                        return;
                    }

                    // Read
                    if (cmd.startsWith('read ')) {
                        let itemName = cmd.substring(5).trim();
                        let invEntry = gameState.player.inventory.find(e => {
                            let it = gameState.items.find(i => i.id === e.itemId);
                            return it && it.name.toLowerCase() === itemName;
                        });
                        if (!invEntry) { log("You don't have that."); return; }
                        let item = gameState.items.find(i => i.id === invEntry.itemId);
                        if (item.type !== 'readable') { log("That's not readable."); return; }
                        log("You read: " + (item.readableText || ''));
                        processNPCMovement();
                        return;
                    }

                    // Eat
                    if (cmd.startsWith('eat ')) {
                        let itemName = cmd.substring(4).trim();
                        let invEntry = gameState.player.inventory.find(e => {
                            let it = gameState.items.find(i => i.id === e.itemId);
                            return it && it.name.toLowerCase() === itemName;
                        });
                        if (!invEntry) { log("You don't have that."); return; }
                        let item = gameState.items.find(i => i.id === invEntry.itemId);
                        if (item.type !== 'edible') { log("That's not edible."); return; }
                        let heal = item.foodValue || 1;
                        gameState.player.health = Math.min(gameState.player.health + heal, 20);
                        updateHealth();
                        if (item.stackable) {
                            invEntry.quantity -= 1;
                            if (invEntry.quantity === 0) gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== item.id);
                        } else {
                            gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== item.id);
                            item.taken = false;
                        }
                        log("You eat " + item.name + ". Health +" + heal);
                        processNPCMovement();
                        return;
                    }

                    // Use
                    if (cmd.startsWith('use ')) {
                        let itemName = cmd.substring(4).trim();
                        let invEntry = gameState.player.inventory.find(e => {
                            let it = gameState.items.find(i => i.id === e.itemId);
                            return it && it.name.toLowerCase() === itemName;
                        });
                        if (!invEntry) { log("You don't have that."); return; }
                        let item = gameState.items.find(i => i.id === invEntry.itemId);
                        if (!item.usable) { log("That item can't be used."); return; }
                        log("You use " + item.name + ": " + (item.useEffect || ''));
                        processNPCMovement();
                        return;
                    }

                    // Talk
                    if (cmd.startsWith('talk')) {
                        let npcName = cmd.substring(4).trim().replace(/^to\\s+/, '');
                        let room = gameState.rooms.find(r => r.id === gameState.player.location);
                        let npc = gameState.npcs.find(n => n.location === room.id && n.name.toLowerCase() === npcName);
                        if (!npc) { log("No one like that here."); return; }
                        if (npc.dialogue) log(npc.name + ' says: "' + npc.dialogue + '"');
                        if (npc.dialogueOptions && npc.dialogueOptions.length > 0) {
                            log("Choose an option:");
                            npc.dialogueOptions.forEach((opt, idx) => {
                                if (opt.condition && !evaluateCondition(opt.condition)) return;
                                log('  ' + (idx+1) + '. ' + opt.text);
                            });
                            window.pendingNPC = npc.id;
                            window.pendingOptions = npc.dialogueOptions;
                            log("Enter the number of your choice:");
                        } else processNPCMovement();
                        return;
                    }

                    // Dialogue choice
                    if (!isNaN(cmd) && window.pendingNPC) {
                        let choice = parseInt(cmd) - 1;
                        let opts = window.pendingOptions;
                        if (choice >= 0 && choice < opts.length) {
                            let opt = opts[choice];
                            if (opt.condition && !evaluateCondition(opt.condition)) log("You cannot choose that option.");
                            else {
                                if (opt.response) log(opt.response);
                                if (opt.setVariable || opt.giveItem || opt.takeItem) applyEffects(opt);
                            }
                        } else log("Invalid choice.");
                        window.pendingNPC = null;
                        window.pendingOptions = null;
                        processNPCMovement();
                        return;
                    }

                    // Open container
                    if (cmd.startsWith('open ')) {
                        let containerName = cmd.substring(5).trim();
                        let container = null;
                        let room = gameState.rooms.find(r => r.id === gameState.player.location);
                        let roomItem = gameState.items.find(i => i.location === room.id && !i.taken && i.name.toLowerCase() === containerName && i.type === 'container');
                        if (roomItem) container = roomItem;
                        else {
                            let invEntry = gameState.player.inventory.find(e => {
                                let it = gameState.items.find(i => i.id === e.itemId);
                                return it && it.name.toLowerCase() === containerName && it.type === 'container';
                            });
                            if (invEntry) container = gameState.items.find(i => i.id === invEntry.itemId);
                        }
                        if (!container) { log("You don't see that container."); return; }
                        let contents = gameState.items.filter(i => i.containerId === container.id);
                        if (contents.length === 0) log("The " + container.name + " is empty.");
                        else log("In " + container.name + " you see: " + contents.map(i => i.name).join(', '));
                        processNPCMovement();
                        return;
                    }

                    // Put item in container
                    if (cmd.startsWith('put ')) {
                        let rest = cmd.substring(4).trim();
                        let match = rest.match(/(.+) in (.+)/);
                        if (!match) { log("Usage: put [item] in [container]"); return; }
                        let itemName = match[1].trim(), containerName = match[2].trim();
                        let container = null;
                        let room = gameState.rooms.find(r => r.id === gameState.player.location);
                        let roomContainer = gameState.items.find(i => i.location === room.id && !i.taken && i.name.toLowerCase() === containerName && i.type === 'container');
                        if (roomContainer) container = roomContainer;
                        else {
                            let invEntry = gameState.player.inventory.find(e => {
                                let it = gameState.items.find(i => i.id === e.itemId);
                                return it && it.name.toLowerCase() === containerName && it.type === 'container';
                            });
                            if (invEntry) container = gameState.items.find(i => i.id === invEntry.itemId);
                        }
                        if (!container) { log("You don't see that container."); return; }
                        let invEntryItem = gameState.player.inventory.find(e => {
                            let it = gameState.items.find(i => i.id === e.itemId);
                            return it && it.name.toLowerCase() === itemName;
                        });
                        if (!invEntryItem) { log("You don't have that item."); return; }
                        let item = gameState.items.find(i => i.id === invEntryItem.itemId);
                        let currentContents = gameState.items.filter(i => i.containerId === container.id).length;
                        if (currentContents >= (container.capacity || 5)) { log("The " + container.name + " cannot hold more items."); return; }
                        if (item.stackable && invEntryItem.quantity > 1) invEntryItem.quantity -= 1;
                        else gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== item.id);
                        item.taken = false; item.location = null; item.containerId = container.id;
                        log("You put the " + item.name + " in the " + container.name + ".");
                        processNPCMovement();
                        return;
                    }

                    // Take from container
                    if (cmd.startsWith('take from ')) {
                        let rest = cmd.substring(10).trim();
                        let match = rest.match(/(.+) from (.+)/);
                        if (!match) { log("Usage: take [item] from [container]"); return; }
                        let itemName = match[1].trim(), containerName = match[2].trim();
                        let container = null;
                        let room = gameState.rooms.find(r => r.id === gameState.player.location);
                        let roomContainer = gameState.items.find(i => i.location === room.id && !i.taken && i.name.toLowerCase() === containerName && i.type === 'container');
                        if (roomContainer) container = roomContainer;
                        else {
                            let invEntry = gameState.player.inventory.find(e => {
                                let it = gameState.items.find(i => i.id === e.itemId);
                                return it && it.name.toLowerCase() === containerName && it.type === 'container';
                            });
                            if (invEntry) container = gameState.items.find(i => i.id === invEntry.itemId);
                        }
                        if (!container) { log("You don't see that container."); return; }
                        let item = gameState.items.find(i => i.containerId === container.id && i.name.toLowerCase() === itemName);
                        if (!item) { log("There is no " + itemName + " in the " + container.name + "."); return; }
                        if (!item.takable) { log("You can't take that."); return; }
                        item.containerId = null;
                        let invEntry = gameState.player.inventory.find(e => e.itemId === item.id);
                        if (invEntry) invEntry.quantity += (item.stackable ? item.quantity : 1);
                        else gameState.player.inventory.push({itemId: item.id, quantity: item.stackable ? item.quantity : 1});
                        item.taken = true;
                        log("You take the " + item.name + " from the " + container.name + ".");
                        processNPCMovement();
                        return;
                    }

                    // Shop list
                    if (cmd === 'list') {
                        let room = gameState.rooms.find(r => r.id === gameState.player.location);
                        let shopNPCs = gameState.npcs.filter(n => n.location === room.id && n.shopEnabled);
                        if (shopNPCs.length === 0) { log("No shop here."); return; }
                        shopNPCs.forEach(npc => {
                            log(npc.name + "'s shop (currency: " + npc.currency + "):");
                            npc.shopInventory.forEach(item => {
                                log("  " + item.itemName + " - " + item.price + " " + npc.currency + " (" + item.quantity + " available)");
                            });
                        });
                        processNPCMovement();
                        return;
                    }

                    // Buy
                    if (cmd.startsWith('buy ')) {
                        let rest = cmd.substring(4).trim();
                        let match = rest.match(/(.+) from (.+)/);
                        if (!match) { log("Usage: buy [item] from [npc]"); return; }
                        let itemName = match[1].trim(), npcName = match[2].trim();
                        let room = gameState.rooms.find(r => r.id === gameState.player.location);
                        let npc = gameState.npcs.find(n => n.location === room.id && n.name.toLowerCase() === npcName && n.shopEnabled);
                        if (!npc) { log("No such shopkeeper here."); return; }
                        let shopItem = npc.shopInventory.find(si => si.itemName.toLowerCase() === itemName.toLowerCase());
                        if (!shopItem) { log("That item is not for sale."); return; }
                        if (shopItem.quantity <= 0) { log("That item is out of stock."); return; }
                        let currencyItem = gameState.player.inventory.find(e => {
                            let it = gameState.items.find(i => i.id === e.itemId);
                            return it && it.name.toLowerCase() === npc.currency.toLowerCase();
                        });
                        let currencyAmount = currencyItem ? currencyItem.quantity : 0;
                        if (currencyAmount < shopItem.price) { log("You need " + shopItem.price + " " + npc.currency + " but you have " + currencyAmount + "."); return; }
                        if (currencyItem.quantity === shopItem.price) {
                            gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== currencyItem.itemId);
                            let curItem = gameState.items.find(i => i.id === currencyItem.itemId);
                            curItem.taken = false;
                        } else currencyItem.quantity -= shopItem.price;
                        let proto = masterData.items.find(i => i.name.toLowerCase() === shopItem.itemName.toLowerCase());
                        if (proto) {
                            let newItem = JSON.parse(JSON.stringify(proto));
                            newItem.id = nextItemId++;
                            newItem.taken = true;
                            newItem.location = null;
                            newItem.quantity = newItem.stackable ? newItem.quantity : 1;
                            gameState.items.push(newItem);
                            let invEntry = gameState.player.inventory.find(e => e.itemId === newItem.id);
                            if (invEntry) invEntry.quantity += newItem.quantity;
                            else gameState.player.inventory.push({itemId: newItem.id, quantity: newItem.quantity});
                            log("You bought " + newItem.name + ".");
                        }
                        shopItem.quantity -= 1;
                        processNPCMovement();
                        return;
                    }

                    // Sell
                    if (cmd.startsWith('sell ')) {
                        let rest = cmd.substring(5).trim();
                        let match = rest.match(/(.+) to (.+)/);
                        if (!match) { log("Usage: sell [item] to [npc]"); return; }
                        let itemName = match[1].trim(), npcName = match[2].trim();
                        let room = gameState.rooms.find(r => r.id === gameState.player.location);
                        let npc = gameState.npcs.find(n => n.location === room.id && n.name.toLowerCase() === npcName && n.shopEnabled);
                        if (!npc) { log("No such shopkeeper here."); return; }
                        let invEntry = gameState.player.inventory.find(e => {
                            let it = gameState.items.find(i => i.id === e.itemId);
                            return it && it.name.toLowerCase() === itemName.toLowerCase();
                        });
                        if (!invEntry) { log("You don't have that item."); return; }
                        let item = gameState.items.find(i => i.id === invEntry.itemId);
                        let shopItem = npc.shopInventory.find(si => si.itemName.toLowerCase() === itemName.toLowerCase());
                        let price = shopItem ? Math.floor(shopItem.price / 2) : 1;
                        if (item.stackable && invEntry.quantity > 1) invEntry.quantity -= 1;
                        else {
                            gameState.player.inventory = gameState.player.inventory.filter(e => e.itemId !== item.id);
                            item.taken = false;
                        }
                        let currencyItem = gameState.items.find(i => i.name.toLowerCase() === npc.currency.toLowerCase());
                        if (!currencyItem) {
                            currencyItem = {
                                id: nextItemId++,
                                name: npc.currency,
                                description: 'Currency',
                                takable: true,
                                type: 'normal',
                                stackable: true,
                                quantity: price,
                                location: null,
                                taken: true
                            };
                            gameState.items.push(currencyItem);
                            gameState.player.inventory.push({itemId: currencyItem.id, quantity: price});
                        } else {
                            let invCurr = gameState.player.inventory.find(e => e.itemId === currencyItem.id);
                            if (invCurr) invCurr.quantity += price;
                            else gameState.player.inventory.push({itemId: currencyItem.id, quantity: price});
                        }
                        log("You sold " + item.name + " for " + price + " " + npc.currency + ".");
                        processNPCMovement();
                        return;
                    }

                    // Attack
                    if (cmd.startsWith('attack')) {
                        let enemyName = cmd.substring(6).trim();
                        let room = gameState.rooms.find(r => r.id === gameState.player.location);
                        let enemy = gameState.enemies.find(e => e.location === room.id && e.alive && e.name.toLowerCase() === enemyName);
                        if (!enemy) { log("No such enemy here."); return; }
                        let playerDamage = 1;
                        let weapons = gameState.player.inventory.map(e => gameState.items.find(i => i.id === e.itemId)).filter(i => i && i.isWeapon);
                        if (weapons.length) playerDamage = Math.max(...weapons.map(w => w.damage), 1);
                        let armor = enemy.armor || 0;
                        let net = Math.max(1, playerDamage - armor);
                        enemy.health -= net;
                        log("You hit " + enemy.name + " for " + net + " damage!");
                        if (enemy.health <= 0) {
                            enemy.alive = false;
                            log(enemy.name + " is defeated!");
                            if (enemy.loot) {
                                let loots = enemy.loot.split(',').map(s => s.trim());
                                loots.forEach(lootName => {
                                    if (Math.random() * 100 <= enemy.lootChance) {
                                        let proto = masterData.items.find(i => i.name.toLowerCase() === lootName.toLowerCase());
                                        if (proto) {
                                            let newItem = JSON.parse(JSON.stringify(proto));
                                            newItem.id = nextItemId++;
                                            newItem.location = room.id;
                                            newItem.taken = false;
                                            newItem.quantity = newItem.stackable ? newItem.quantity : 1;
                                            gameState.items.push(newItem);
                                            log(enemy.name + " dropped " + newItem.name + ".");
                                        }
                                    }
                                });
                            }
                        } else {
                            gameState.player.health -= enemy.attack;
                            log(enemy.name + " hits you for " + enemy.attack + " damage!");
                            updateHealth();
                            if (gameState.player.health <= 0) log("☠️ YOU HAVE DIED ☠️. Type 'restart'.");
                        }
                        processNPCMovement();
                        return;
                    }

                    log("Unknown command. Try 'help'.");
                }

                // UI binding
                document.getElementById('enter').onclick = () => {
                    let i = document.getElementById('cmd');
                    processCommand(i.value);
                    i.value = '';
                };
                document.getElementById('cmd').addEventListener('keypress', e => {
                    if (e.key === 'Enter') document.getElementById('enter').click();
                });
                document.getElementById('restart').onclick = startGame;
                startGame();
            `;
