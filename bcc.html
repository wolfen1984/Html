<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blood Circuit - Nightfall Games 1984</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Let image define its own size */
#gameUI {
    position: relative;
    display: inline-block;
}

/* DO NOT scale the image */
#gameUI img {
    display: block;
    width: auto;
    height: auto;
    max-width: none; /* prevents browser shrinking */
}

/* Overlay stays absolute */
#screen {
    position: absolute;
    top: 300px;
    left: 120px;
    width: 520px;
    height: 320px;

    color: #cfcfcf;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    line-height: 1.5em;
    overflow-y: auto;
}

/* Buttons */
.button {
    position: absolute;
    width: 200px;
    height: 60px;
    cursor: pointer;
}

#mapBtn { bottom: 180px; left: 120px; }
#bioBtn { bottom: 180px; right: 120px; }
#dataBtn { bottom: 100px; left: 120px; }
#actionBtn { bottom: 100px; right: 120px; }

.button:hover {
    outline: 2px solid red;
}
</style>
</head>

<body>

<div id="gameUI">
    <img src="Gemini_Generated_Image_k1knd9k1knd9k1kn.png">

    <div id="screen">
        > SYSTEM BOOT...<br><br>
        > INITIALIZING UNIT-9...<br><br>
        > CONNECTION ESTABLISHED<br><br>
        > AWAITING COMMAND...
    </div>

    <div id="mapBtn" class="button"></div>
    <div id="bioBtn" class="button"></div>
    <div id="dataBtn" class="button"></div>
    <div id="actionBtn" class="button"></div>
</div>

<script>
const screen = document.getElementById("screen");

function typeText(text) {
    screen.innerHTML = "";
    let i = 0;

    function typing() {
        if (i < text.length) {
            screen.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 15);
        }
    }
    typing();
}

/* Button Events */

document.getElementById("mapBtn").onclick = () => {
    typeText(
`> ACCESSING MAP...

SECTOR 9 GRID:
[ X ] Control Core
[ ] Data Vault
[ ] Bio Lab
[ ] Exit Gate

> LOCATION: UNKNOWN`
    );
};

document.getElementById("bioBtn").onclick = () => {
    typeText(
`> BIO-LINK STATUS

HEART RATE: STABLE
NEURAL LINK: ACTIVE
CYBER INTEGRITY: 89%

WARNING: SIGNAL DEGRADATION DETECTED`
    );
};

document.getElementById("dataBtn").onclick = () => {
    typeText(
`> DATA CHIP READ

LOG 01:
"They are not human anymore."

LOG 02:
"The circuit feeds on blood."

LOG 03:
"Do not trust the system."`
    );
};

document.getElementById("actionBtn").onclick = () => {
    typeText(
`> ACTION MENU

1. SCAN AREA
2. MOVE FORWARD
3. CHECK SYSTEM
4. WAIT

> ENTERING SCAN...

...SIGNAL DETECTED`
    );
};
</script>

</body>
</html>
