<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blood Circuit - Nightfall Games 1984</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* Reset */
html, body {
    margin: 100;
    padding: 100;
    background: black;
    height: 100%;
    overflow: hidden;
}

/* Center the whole game on the page */
body {
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Main container (anchors EVERYTHING) */
#gameUI {
    position: relative;       /* 🔥 critical for absolute children */
    display: inline-block;    /* wraps tightly around the image */
}

/* Image at true native size (no scaling) */
#gameUI img {
    display: block;
    width: auto;
    height: auto;
    max-width: none;
    image-rendering: pixelated; /* keeps that crisp 1984 retro look */
}

/* Main screen text area - NOW PERFECTLY CENTERED INSIDE THE UI WINDOW */
#screen {
    position: absolute;
    top: 300px;           /* unchanged - vertical was already good */
    left: 178px;          /* ← increased from 120px → shifts everything right into the center of the screen area */
    width: 518px;         /* slightly tightened to match the visible black screen bezel */
    height: 312px;

    color: #cfcfcf;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    line-height: 1.55em;

    padding: 18px 24px;   /* ← added padding so text doesn't hug the edges */
    box-sizing: border-box;

    overflow-y: auto;
    white-space: pre-line;
    text-shadow: 0 0 8px #00ffcc; /* subtle CRT glow */
}

/* Buttons */
.button {
    position: absolute;
    width: 198px;     /* slightly tighter to match the exact button graphics in your PNG */
    height: 58px;
    cursor: pointer;
    user-select: none;
}

/* Button positions - shifted right to align with the visual buttons in the PNG */
#mapBtn    { bottom: 178px; left: 178px; }   /* top-left button */
#bioBtn    { bottom: 178px; right: 62px; }   /* top-right button (right value decreased to move it right) */
#dataBtn   { bottom: 98px;  left: 178px; }   /* bottom-left button */
#actionBtn { bottom: 98px;  right: 62px; }   /* bottom-right button */

/* Optional: visual feedback when hovering over a button */
.button:hover {
    filter: brightness(1.3);
    outline: 3px solid #ff0044;
    outline-offset: -4px;
}
</style>
</head>

<body>

<div id="gameUI">
    <img src="Gemini_Generated_Image_k1knd9k1knd9k1kn.png" alt="Blood Circuit UI">

    <!-- Main gameplay screen -->
    <div id="screen">
        > SYSTEM BOOT...<br><br>
        > INITIALIZING UNIT-9...<br><br>
        > CONNECTION ESTABLISHED<br><br>
        > AWAITING COMMAND...
    </div>

    <!-- Clickable button overlays (transparent) -->
    <div id="mapBtn" class="button"></div>
    <div id="bioBtn" class="button"></div>
    <div id="dataBtn" class="button"></div>
    <div id="actionBtn" class="button"></div>
</div>

<script>
const screen = document.getElementById("screen");

function typeText(text) {
    screen.innerHTML = "";
    let i = 0;

    function typing() {
        if (i < text.length) {
            screen.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 15);
        }
    }
    typing();
}

/* Button Events - unchanged, just now positioned correctly */
document.getElementById("mapBtn").onclick = () => {
    typeText(
`> ACCESSING MAP...

SECTOR 9 GRID:
[ X ] Control Core
[ ] Data Vault
[ ] Bio Lab
[ ] Exit Gate

> LOCATION: UNKNOWN`
    );
};

document.getElementById("bioBtn").onclick = () => {
    typeText(
`> BIO-LINK STATUS

HEART RATE: STABLE
NEURAL LINK: ACTIVE
CYBER INTEGRITY: 89%

WARNING: SIGNAL DEGRADATION DETECTED`
    );
};

document.getElementById("dataBtn").onclick = () => {
    typeText(
`> DATA CHIP READ

LOG 01:
"They are not human anymore."

LOG 02:
"The circuit feeds on blood."

LOG 03:
"Do not trust the system."`
    );
};

document.getElementById("actionBtn").onclick = () => {
    typeText(
`> ACTION MENU

1. SCAN AREA
2. MOVE FORWARD
3. CHECK SYSTEM
4. WAIT

> ENTERING SCAN...

...SIGNAL DETECTED`
    );
};
</script>

</body>
</html>
