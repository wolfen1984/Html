<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Blood Circuit — Nightfall Games 1984</title>
  
  <!-- retro pixel font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* keeps retro arcade feel, but text remains selectable */
    }

    .image-box {
  background-image: url('Gemini_Generated_Image_k1knd9k1knd9k1kn.png');
  background-size: cover;
  height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0505, #000000);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      padding: 1.5rem;
    }

    /* main game panel — centered like an arcade cabinet */
    .game-panel {
      max-width: 980px;
      width: 100%;
      background: #030101;
      border: 4px solid #9c0f2f;
      box-shadow: 0 0 0 2px #2c0610, 0 0 0 6px #1f0108, 0 10px 25px rgba(0,0,0,0.8), inset 0 0 20px rgba(255, 0, 68, 0.2);
      padding: 1.8rem 2rem 2.2rem;
      transition: all 0.2s;
    }

    /* header section — game identity */
    .game-header {
      text-align: center;
      margin-bottom: 2.2rem;
      border-bottom: 3px solid #b51e3e;
      padding-bottom: 1rem;
    }

    .game-header h1 {
      font-size: 1.7rem;
      letter-spacing: 2px;
      color: #ec1f4b;
      text-shadow: 0 0 5px #ff0055, 0 0 10px #5a001a;
      word-break: keep-all;
    }

    .game-header .sub {
      font-size: 0.7rem;
      color: #b67383;
      margin-top: 0.6rem;
      letter-spacing: 1px;
    }

    /* ========= SCREEN ========= */
    /* gameplay text container — perfectly centered inside panel */
    .screen-container {
      display: flex;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    #screen {
      background: #0a0508;
      width: 100%;
      max-width: 820px;
      min-height: 320px;
      border: 3px inset #6b1d33;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.9), 0 0 0 2px #3c0f1c;
      padding: 1.6rem 1.8rem;
      color: #b6ffec;
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      line-height: 1.65;
      text-shadow: 0 0 3px #1effbc, 0 0 1px #00b37a;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      transition: all 0.1s ease;
      scroll-behavior: smooth;
    }

    /* custom retro scrollbar */
    #screen::-webkit-scrollbar {
      width: 12px;
      background: #1e010b;
    }
    #screen::-webkit-scrollbar-thumb {
      background: #a1143a;
      border-radius: 0px;
      border: 1px solid #ff3b6f;
    }

    /* ========= BUTTON PANEL ========= */
    /* buttons container — centered as a block, with responsive grid */
    .button-panel {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 0.5rem;
    }

    .button-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.8rem;
      max-width: 760px;
      width: 100%;
    }

    /* retro action buttons */
    .cmd-btn {
      background: #120107;
      border: 3px solid #b8123e;
      color: #f03e6f;
      font-family: 'Press Start 2P', monospace;
      font-size: 1rem;
      padding: 0.9rem 1.7rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      transition: all 0.12s linear;
      box-shadow: 0 4px 0 #4a0a1e;
      text-shadow: 0 0 3px #ff0055;
      min-width: 150px;
      text-align: center;
    }

    .cmd-btn:hover {
      background: #b8123e;
      color: #050101;
      border-color: #ff7096;
      box-shadow: 0 2px 0 #4a0a1e;
      transform: translateY(2px);
      text-shadow: none;
    }

    .cmd-btn:active {
      transform: translateY(4px);
      box-shadow: none;
    }

    /* footer / glitch decor */
    .crt-lines {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.55rem;
      color: #5f2a3b;
      font-family: monospace;
      letter-spacing: 1px;
    }

    /* responsive adjustments: center everything on smaller devices */
    @media (max-width: 700px) {
      .game-panel {
        padding: 1.2rem;
      }
      .cmd-btn {
        padding: 0.7rem 1rem;
        font-size: 0.7rem;
        min-width: 120px;
      }
      #screen {
        font-size: 9px;
        padding: 1rem;
        min-height: 260px;
      }
      .button-grid {
        gap: 1rem;
      }
      .game-header h1 {
        font-size: 1.2rem;
      }
    }

    @media (max-width: 540px) {
      .cmd-btn {
        min-width: 100px;
        font-size: 0.65rem;
        padding: 0.6rem 0.8rem;
      }
      .button-grid {
        gap: 0.8rem;
      }
    }

    /* extra glow for the screen area */
    .screen-container {
      position: relative;
    }
    #screen::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, rgba(0,255,180,0.02) 0px, rgba(0,255,180,0.02) 2px, transparent 2px, transparent 6px);
      z-index: 2;
    }
  </style>
 
</head>
  
<body>

    

  <!-- CENTERED GAMEPLAY TEXT AREA -->
  <div class="screen-container">
    <div id="screen">
      > SYSTEM BOOT...<br><br>
      > INITIALIZING UNIT-9...<br><br>
      > CONNECTION ESTABLISHED<br><br>
      > AWAITING COMMAND...
    </div>
  </div>

  <!-- BUTTONS - CENTERED AS A GROUP -->
  <div class="button-panel">
    <div class="button-grid">
      <button class="cmd-btn" id="mapBtn">🗺️ MAP</button>
      <button class="cmd-btn" id="bioBtn">🧬 BIO-LINK</button>
      <button class="cmd-btn" id="dataBtn">💾 DATA CHIP</button>
      <button class="cmd-btn" id="actionBtn">⚙️ ACTION</button>
    </div>
  </div>
  <div class="crt-lines">
    [ NEURAL INTERFACE v2.3 ] — STANDBY MODE — &nbsp;© 1984 NIGHTFALL
  </div>
</div>

<script>
  (function() {
    // ---------- RETRO TYPEWRITER ENGINE ----------
    const screenElement = document.getElementById("screen");
    let activeTimeout = null;
    let currentAnimation = false;

    // converts plain newline text into <br> tags for display
    function formatForDisplay(rawText) {
      // replace newlines with <br> tags, keep spaces and formatting
      return rawText.replace(/\n/g, '<br>');
    }

    // core typewriter effect: plainText includes \n line breaks
    function typeText(plainText) {
      // kill any ongoing typing animation
      if (activeTimeout) {
        clearTimeout(activeTimeout);
        activeTimeout = null;
      }
      currentAnimation = true;

      // store full target text (raw with \n)
      const fullRaw = plainText;
      const totalLength = fullRaw.length;
      let currentIndex = 0;
      
      // clear the screen before new animation
      screenElement.innerHTML = "";
      
      function typeNextChar() {
        if (currentIndex < totalLength) {
          // get substring up to current index +1
          const partialRaw = fullRaw.substring(0, currentIndex + 1);
          // convert newlines to <br> for proper HTML rendering
          const formattedHtml = partialRaw.replace(/\n/g, '<br>');
          screenElement.innerHTML = formattedHtml;
          currentIndex++;
          
          // auto-scroll to bottom to keep latest text visible (immersive)
          screenElement.scrollTop = screenElement.scrollHeight;
          
          // dynamic speed: feels like 80s terminal (15ms classic)
          activeTimeout = setTimeout(typeNextChar, 18);
        } else {
          // final render complete, ensure final newline formatting
          const finalHtml = fullRaw.replace(/\n/g, '<br>');
          screenElement.innerHTML = finalHtml;
          screenElement.scrollTop = screenElement.scrollHeight;
          activeTimeout = null;
          currentAnimation = false;
        }
      }
      
      typeNextChar();
    }

    // ---------- MESSAGES (pure text with \n line breaks, no HTML inside) ----------
    const MESSAGES = {
      map: `> ACCESSING MAP...

SECTOR 9 GRID:
[ X ] Control Core
[ ] Data Vault
[ ] Bio Lab
[ ] Exit Gate

> LOCATION: UNKNOWN
> THREAT LEVEL: ALPHA
> SIGNAL FRAGMENT: "CORE LEAK DETECTED"`,
      
      bio: `> BIO-LINK STATUS

HEART RATE: STABLE
NEURAL LINK: ACTIVE
CYBER INTEGRITY: 89%

WARNING: SIGNAL DEGRADATION DETECTED
BLOOD-OXYGEN: 97%
SYNAPSE FEEDBACK: NOMINAL

> RECOMMENDED: CYBER INJECTION`,
      
      data: `> DATA CHIP READ — ENCRYPTED LOGS

LOG 01:
"They are not human anymore."

LOG 02:
"The circuit feeds on blood."

LOG 03:
"Do not trust the system."

LOG 04:
"Unit-9, you're the last one."

> FILE CORRUPTED — RECOVERING...`,
      
      action: `> ACTION MENU — COMBAT PROTOCOL

1. SCAN AREA
2. MOVE FORWARD
3. CHECK SYSTEM INTEGRITY
4. WAIT / AMBUSH

> ENTERING SCAN...
...SIGNAL DETECTED
...HOSTILE ENERGY SPIKE

> ENGAGE COUNTERMEASURES?`
    };

    // initial boot message (centered style, but still left-aligned like retro terminal)
    const BOOT_MESSAGE = `> SYSTEM BOOT...
> NIGHTFALL SYSTEMS v1.0

> INITIALIZING UNIT-9...
> CYBER CORE ACTIVE

> CONNECTION ESTABLISHED — BLOOD CIRCUIT ONLINE

> AWAITING COMMAND...
> // ENTER NEURAL PROTOCOL //`;

    // ---------- BUTTON HANDLERS (fully centered functionality) ----------
    const mapBtn = document.getElementById("mapBtn");
    const bioBtn = document.getElementById("bioBtn");
    const dataBtn = document.getElementById("dataBtn");
    const actionBtn = document.getElementById("actionBtn");

    // Helper to ensure each button triggers typewriter with correct data
    function setButtonHandler(button, messageKey) {
      if (!button) return;
      button.addEventListener("click", (e) => {
        e.preventDefault();
        const msg = MESSAGES[messageKey];
        if (msg) {
          typeText(msg);
        } else {
          // fallback safety
          typeText(`> ERROR: DATA STREAM CORRUPTED\n> RETRY COMMAND.`);
        }
      });
    }

    setButtonHandler(mapBtn, "map");
    setButtonHandler(bioBtn, "bio");
    setButtonHandler(dataBtn, "data");
    setButtonHandler(actionBtn, "action");

    // optional: if someone wants to double check, but no default conflict
    // initial boot sequence with typewriter effect to match cinematic feel
    // start with an empty screen and type boot message
    // ensures the text is fully centered within screen container
    typeText(BOOT_MESSAGE);

    // extra polish: on window resize, maintain scroll area if content overflow
    window.addEventListener('resize', () => {
      if (screenElement.scrollHeight > screenElement.clientHeight) {
        screenElement.scrollTop = screenElement.scrollHeight;
      }
    });
    
    // small arcade trick: focus trap not needed, but adds tactile feedback
    const allButtons = [mapBtn, bioBtn, dataBtn, actionBtn];
    allButtons.forEach(btn => {
      if (btn) {
        btn.addEventListener('touchstart', (e) => {
          // just for mobile feedback, ensures no zoom side effects
          e.preventDefault();
          btn.click();
        });
      }
    });
  })();
</script>
</body>
</html>
