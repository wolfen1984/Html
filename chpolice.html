<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>NIGHT BEAT · 1986</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05080f;
            --screen-bg: #070a14;
            --panel-bg: #090d18;
            --text: #b8c8d8;
            --text-dim: #4a6078;
            --text-bright: #d0e4f8;
            --accent: #00c8f0;
            --accent-dim: #003544;
            --accent-glow: 0 0 14px #00c8f066, 0 0 32px #00688044;
            --border: #006d88;
            --border-glow: 0 0 14px #00b8e055, 0 0 28px #00506633;
            --danger: #ff1a3d;
            --danger-glow: 0 0 12px #ff1a3d55, 0 0 28px #99002044;
            --danger-border: #880022;
            --neon-blue: #00d4ff;
            --neon-red: #ff1744;
            --input-bg: #0c101e;
            --button-bg: #0e1220;
            --button-hover: #141c30;
            --button-active: #0e1420;
            --bevel-light: #1a2838;
            --bevel-dark: #03060c;
            --font-display: 'Orbitron', 'Rajdhani', sans-serif;
            --font-title: 'Orbitron', 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 28px;
            --btn-min-height: 46px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000408;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0a1020 0%, #000408 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #0c101a;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #1a2430, 0 0 0 4px #080c14, 0 0 0 8px #040608, 0 8px 48px #000000dd, 0 0 60px #00608022;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #1a2838;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #080c14;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #00d4ff;
            border-radius: 50%;
            box-shadow: 0 0 8px #00d4ff88, 0 0 18px #00a0cc44;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #00d4ff88, 0 0 18px #00a0cc44;
            }
            50% {
                box-shadow: 0 0 16px #00d4ffbb, 0 0 32px #00b8e066;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #3a5068;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 2px solid #006888;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 1px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #060a14;
            border-bottom: 2px solid #006d88;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #0a1020;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #006888;
            border-radius: 2px;
            padding: 10px 14px;
            background: #040810;
            position: relative;
            box-shadow: inset 0 0 24px #001a2822, 0 0 18px #00b8e022;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #00c8f0;
            box-shadow: 0 0 12px #00b8e0aa;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #ff1a3d66;
            box-shadow: 0 0 8px #ff1a3d44;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #00d4ff;
            text-shadow: 0 0 18px #00c8f0aa, 0 2px 4px #000, 0 0 44px #006880aa;
            letter-spacing: 4px;
            font-family: var(--font-title);
            line-height: 1.2;
            font-weight: 900;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #ff3355;
            letter-spacing: 5px;
            margin-top: 3px;
            text-shadow: 0 0 8px #ff1a3d66;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 20px;
                letter-spacing: 2px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #003040 #070a14;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #070a14;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #003040;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #1a3040;
            border-top-color: #203848;
            border-left-color: #1c3040;
            border-right-color: #142030;
            border-bottom-color: #0c1420;
            padding: 12px 18px;
            border-radius: 3px;
            color: #b8c8d8;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #142030;
            border-left-color: #142030;
            border-bottom-color: #203848;
            border-right-color: #1c3040;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #0c1018;
        }
        .btn.accent {
            background: #0c1020;
            border-color: #005070;
            border-top-color: #006c90;
            border-left-color: #005e80;
            border-right-color: #003448;
            border-bottom-color: #001820;
            color: #b0d8f0;
            box-shadow: 0 2px 0 #00000044, 0 0 12px #00b8e033;
        }
        .btn.accent:active {
            border-top-color: #003448;
            border-left-color: #003448;
            border-bottom-color: #006c90;
            border-right-color: #005e80;
            box-shadow: 0 0px 0 #00000044, 0 0 20px #00c8f055;
        }
        .btn.danger {
            background: #100a0e;
            border-color: #600018;
            border-top-color: #880022;
            border-left-color: #70001e;
            border-right-color: #3a0010;
            border-bottom-color: #1a0008;
            color: #f0a8b0;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #ff1a3d33;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .patrol-mask {
            position: relative;
            background: #0a0e18;
            border: 2px solid #00688866;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.8);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #080c16;
            border: 2px solid #006080;
            padding: 15px;
            border-radius: 3px;
            box-shadow: 0 0 20px #00b8e022;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #00b8e0;
            box-shadow: 0 0 22px #00c8f066, 0 0 0 2px #081020;
            object-fit: cover;
            flex-shrink: 0;
            background: #080e18;
            filter: brightness(1.05) saturate(1.1);
        }
        .speech-bubble {
            flex: 1;
            background: #0e1220;
            border: 2px solid #005878;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #c8d8e8;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: inset 0 0 20px #00000044;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #005878 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #080c16;
            border: 1px solid #003048;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #101420;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a6078;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        /* ── Story Poster Overlay ── */
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #006888;
            box-shadow: 0 0 20px #00b8e044, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #080c16;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(5, 8, 15, 0.85) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 13px;
            letter-spacing: 3px;
            color: #00d4ff;
            text-shadow: 0 0 10px #00c8f0cc, 0 0 30px #00688888, 0 2px 4px #000000, 0 0 60px #003040;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom,
                    rgba(6, 10, 20, 0.9) 0%,
                    rgba(6, 10, 20, 0.7) 40%,
                    transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 15px;
            letter-spacing: 1.5px;
            color: #ff4466;
            text-shadow: 0 0 8px #ff1a3d88, 0 0 20px #66002044, 0 2px 4px #000000;
            background: linear-gradient(to top,
                    rgba(5, 8, 15, 0.9) 0%,
                    rgba(5, 8, 15, 0.6) 50%,
                    transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a6078;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 10px;
                letter-spacing: 2px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 12px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #005070;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #b0d0e8;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 17px;
            text-shadow: 0 0 10px #00b8e044;
            text-transform: uppercase;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0c1020;
            border: 1px solid #004058;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #ff3355;
            min-width: 50px;
            text-shadow: 0 0 6px #ff1a3d44;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #c8dce8;
        }
        .guide-desc {
            font-size: 15px;
            color: #4a6078;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0c1020;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 2px solid #00b8e0;
            box-shadow: var(--accent-glow), 0 0 80px #000000dd;
            color: #b8c8d8;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #0e1424;
            border: 2px solid #00b8e066;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #b8c8d8;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #00c8f0;
            box-shadow: 0 0 14px #00b8e055;
        }
        .loading-text {
            color: #00d4ff;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #040810;
            border-top: 1px solid #003048;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #3a5068;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #4a6880;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #1a2430;
            color: #4a6880;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #005070;
            color: #00b8e0;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #c8d8e8;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">NIGHT BEAT · CRT-86</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">NIGHT<br>BEAT</div>
                    <div class="marquee-sub">⏤ 1986 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channel3Panel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🚔 NIGHT BEAT · PATROL DISPATCH</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('night_beat_key') || '';

            const DEFAULT_STATE = {
                ch3Episodes: [],
                nocturnePerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>🚔 Officer Jack Mercer</h2>
        <p style="text-align:left;">
            <strong>Badge:</strong> #2147<br>
            <strong>Shift:</strong> 6 PM – 6 AM, Night Beat<br>
            <strong>Bio:</strong> Twelve years on the force, all of them on the graveyard shift. Mercer's seen what the night does to people — and to cops. He doesn't carry a detective's badge, just a radio and a .38. Every shift grinds him down a little more, but he keeps answering the call. Rumour has it he requested nights permanently after what happened in '82. He doesn't talk about it.
        </p>
    `;

            // ── SOUND ENGINE (Web Audio API) ──
            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let crossfadeTimeout = null;

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    console.log(`🎛️ AudioContext created, initial state: ${audioCtx.state}`);
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.22;
                    reverbNode.connect(masterGain);
                    masterGain.connect(audioCtx.destination);
                    const compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.value = -24;
                    compressor.knee.value = 30;
                    compressor.ratio.value = 12;
                    compressor.attack.value = 0.003;
                    compressor.release.value = 0.25;
                    masterGain.disconnect();
                    masterGain.connect(compressor);
                    compressor.connect(audioCtx.destination);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 1.0;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.35;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                    reverbNode.connect(masterGain);
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 2;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.5));
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            // ── MIAMI VICE STYLE SYNTH ──
            function createSynthPad(ctx, frequency, duration, intensity = 0.6) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 0.4);
                gainNode.gain.setValueAtTime(intensity * 0.2, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.3);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.005;
                const osc3 = ctx.createOscillator();
                osc3.type = 'square';
                osc3.frequency.value = frequency * 0.998;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1200;
                filter.Q.value = 2.5;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.25 + Math.random() * 0.3;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 300 + Math.random() * 300;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            function createSting(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.25, now + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.2);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
                osc.frequency.exponentialRampToValueAtTime(150, now + 1.0);

                const osc2 = ctx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(400, now);
                osc2.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
                osc2.frequency.exponentialRampToValueAtTime(250, now + 1.0);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1500;
                filter.Q.value = 1.5;

                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc.start(now);
                osc2.start(now);
                osc.stop(now + 1.2);
                osc2.stop(now + 1.2);
            }

            function createClimax(ctx, intensity = 0.8) {
                const now = ctx.currentTime;
                const duration = 8 + Math.random() * 6;

                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.55, now + 2);
                gainNode.gain.setValueAtTime(intensity * 0.65, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(130, now);
                osc1.frequency.exponentialRampToValueAtTime(260, now + duration * 0.6);

                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(260, now);
                osc2.frequency.exponentialRampToValueAtTime(520, now + duration * 0.6);

                const osc3 = ctx.createOscillator();
                osc3.type = 'square';
                osc3.frequency.setValueAtTime(130, now);
                osc3.frequency.exponentialRampToValueAtTime(390, now + duration * 0.8);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(400, now);
                filter.frequency.exponentialRampToValueAtTime(1600, now + duration);
                filter.Q.value = 2;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.2;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 300;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);

                    switch (type) {
                        case 'pad':
                            const freq = 130 + Math.random() * 50;
                            createSynthPad(ctx, freq, 20 + Math.random() * 20, gainValue);
                            break;
                        case 'sting':
                            createSting(ctx, gainValue);
                            break;
                        case 'heartbeat':
                            playThump(ctx, now, 0.8 * gainValue);
                            setTimeout(() => playThump(ctx, now + 0.15, 0.8 * gainValue), 150);
                            break;
                        case 'thunder': {
                            const bufferSize = ctx.sampleRate * 0.5;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.3));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(gainValue * 0.6, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 200;
                            filter.Q.value = 0.5;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(now);
                            source.stop(now + 0.8);
                            break;
                        }
                        case 'bell': {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 100 + Math.random() * 40;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0, now);
                            gain.gain.linearRampToValueAtTime(gainValue * 0.45, now + 0.08);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 3);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 800;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(now);
                            osc.stop(now + 3);
                            break;
                        }
                        case 'climax':
                            createClimax(ctx, gainValue);
                            break;
                        default:
                            console.warn(`Unknown sound type: ${type}`);
                    }
                } catch (err) {
                    console.error(`❌ Error in playSound("${type}"):`, err);
                }
            }

            function playThump(ctx, time, intensity) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(70, time);
                osc.frequency.exponentialRampToValueAtTime(35, time + 0.1);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.8, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(time);
                osc.stop(time + 0.1);
            }

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    console.log(`🌫️ Starting ambient: ${type} for ${durationSeconds}s`);

                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(gainValue * 0.3, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;

                    let source = null;
                    if (type === 'ambient_drone' || type === 'wind_howl') {
                        const bufferSize = ctx.sampleRate * 1;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.5;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'ambient_drone' ? 250 : 700;
                        filter.Q.value = 0.5;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'ambient_drone' ? 90 : 140;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.2 * gainValue;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 110;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }

                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => {
                        stopAmbient();
                    }, durationSeconds * 1000);
                } catch (err) {
                    console.error(`❌ Error in playAmbient("${type}"):`, err);
                }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) {
                            ambientGain.disconnect();
                            ambientGain = null;
                        }
                    }, 300);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) {
                    clearTimeout(ambientTimeout);
                    ambientTimeout = null;
                }
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 25000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' +
                                apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`);
                    }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') {
                        throw new Error('Request timed out. Please try again.');
                    }
                    throw e;
                } finally {
                    clearTimeout(timeout);
                }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', 1980s police drama, neon noir, synthwave aesthetic, grainy VHS')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e;
                        await new Promise(r => setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else {
                            clearInterval(timer);
                            resolve();
                        }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                    'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                ];
                let voice = null;
                for (const name of maleNames) {
                    voice = voices.find(v => v.name.includes(name));
                    if (voice) break;
                }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.7;
                utterance.pitch = 0.9;
                speechSynthesis.speak(utterance);

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) {
                        voice = voices.find(v => v.name.includes(name));
                        if (voice) break;
                    }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[
                        0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.7;
                    utterance.pitch = voiceConfig.pitch || 0.9;

                    let currentChar = 0;
                    element.textContent = '';

                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) {
                            currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar);
                            if (cueChecker) cueChecker(currentChar);
                        }
                    };

                    utterance.onend = () => {
                        element.textContent = text;
                        if (cueChecker) cueChecker(text.length);
                        resolve();
                    };

                    utterance.onerror = (e) => {
                        console.warn('TTS error:', e);
                        element.textContent = text;
                        resolve();
                    };

                    speechSynthesis.speak(utterance);
                });
            }

            async function generateNewNocturneStory() {
                const system =
                    `You are Officer Jack Mercer, a veteran patrol officer working the 6 PM to 6 AM night shift in a gritty 1980s American city. You narrate your shift reports with brutal, unflinching honesty — part Stephen King psychological dread, part Hitchcock tension, all grounded in human depravity. No supernatural elements.`;

                    `Write a 900 to 1100 word first-person narrative of one night shift (6 PM to 6 AM) as Officer Jack Mercer. Structure it in THREE parts following the partner rotation:\n\nPART ONE (6 PM – 10 PM): Partner is from "The Professional" archetype (Rookie, Burnout, Veteran, Idealist, Family Man, or Rule Follower). Early shift calls: traffic stops, domestic disputes, shoplifters, noise complaints, missing kids. Things feel manageable.\n\nPART TWO (10 PM – 2 AM): Partner is from "The Problem" archetype (Corrupt, Violent, Bully, Racist, Coward, Adrenaline Junkie, Loose Cannon, Manipulator, or Predator). Bars close. Fights, drugs, mental health crises, violence. The city becomes unpredictable.\n\nPART THREE (2 AM – 6 AM): Partner is from "The Broken" archetype (Alcoholic, Divorced, Cynic, Depressed, Insomniac, Traumatized, Terminally Ill, Haunted by Guilt, Ready to Quit, or Emotionally Numb). The dead hours. Empty streets, exhaustion, desperation. The worst calls happen before dawn.\n\nInclude several call types: Domestic Violence, Armed Robbery, Burglary, Missing Child, Welfare Check, Suspicious Vehicle, Suicide Attempt, Drug Overdose, Hit and Run, Stabbing, Drunk Driver, Gang Fight, Bar Fight, Dead Body, or Car Crash.\n\nExplore themes of: Fatigue, Corruption, Compassion, Fear, Violence, Moral Compromise, Loyalty, Guilt, Burnout, and Desensitization.\n\nStyle: Tight, visceral prose. No supernatural elements. Pure human darkness. Influences: Bringing Out the Dead, Training Day, End of Watch, Southland, The Wire, Serpico, Nightcrawler, After Hours.\n\nReturn ONLY a valid JSON object with these fields: title (string, a gritty shift name like "The Blood on 8th Street"), story (full narration string, use backslash n for line breaks), closing_remark (the haunting sign-off as Mercer clocks out at 6 AM). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([

                    { role: 'user', content: prompt }
                ], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);

                if (!story.title || !story.story || !story.closing_remark) {

                let imageUrl = null;

                gameState.nocturnePerformance = {

                    rawStoryText: story.story,

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system = `You are a sound designer for an 80s police drama with a Miami Vice / synthwave soundtrack.
        Given a night shift narrative, return a JSON object with THREE keys:
        - "sections": an array of 5‑6 sections that divide the shift into emotional acts.
          Each section must have: "theme" (one of: intro, setup, scheme, execution, twist, closing), "start_char" (inclusive) and "end_char" (exclusive). The sections must cover the entire story from 0 to ${length}.
        - "cues": an array of sound events using only these types: "sting", "heartbeat", "thunder", "bell", "climax".
          Each cue must have "position" (character index), "type", optional "intensity" (0‑1).
          Include at least 40 cues, spread evenly.
        - "score": an object with keys matching the same theme names used in "sections".
          Each key must contain:
            "bpm" (integer between 80‑130 for that 80s synthwave feel),
            "bass" (array of 8 semitone intervals from a root of 0),
            "arp" (array of 8 semitone intervals for bright arpeggio),
            "kick" (array of 8 numbers, 1 = hit, 0 = rest),
            "snare" (same as kick, with gated reverb feel — use more hits on 2 and 4).
          Make the music tense and driving. intro should be sparse with low BPM, execution fast and urgent (110‑130 BPM), twist dissonant, closing melancholic.

        Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and score patterns for this 1980s police night shift.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: userPrompt }
                ], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try {
                    data = JSON.parse(cleaned);
                } catch (parseErr) {
                    console.warn('AI JSON was malformed, trying to repair…', parseErr);
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try {
                            data = JSON.parse(candidate);
                        } catch (e2) {
                            throw new Error('Failed to parse AI soundtrack JSON even after repair.');
                        }
                    } else {
                        throw new Error('No JSON found in AI response.');
                    }
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !==
                    'object') {
                    throw new Error('Missing sections, cues, or score in AI response');
                }
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 ||
                    sortedSections[sortedSections.length - 1].end_char < length) {
                    console.warn('Sections may not fully cover the story – adjusting');
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({
                    type: c.type,
                    position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7
                }));
                const requiredThemes = ['intro', 'setup', 'scheme', 'execution', 'twist', 'closing'];
                const score = {};
                for (const theme of requiredThemes) {
                    if (data.score[theme]) {
                        score[theme] = {
                            bpm: data.score[theme].bpm || 95,
                            bass: data.score[theme].bass || [0, 0, 7, 7, 0, 0, 7, 7],
                            arp: data.score[theme].arp || [12, 15, 12, 19, 12, 15, 12, 19],
                            kick: data.score[theme].kick || [1, 0, 1, 0, 1, 0, 1, 0],
                            snare: data.score[theme].snare || [0, 0, 0, 1, 0, 0, 0, 1]
                        };
                    } else {
                        score[theme] = {
                            bpm: 95,
                            bass: [0, 0, 7, 7, 0, 0, 7, 7],
                            arp: [12, 15, 12, 19, 12, 15, 12, 19],
                            kick: [1, 0, 1, 0, 1, 0, 1, 0],
                            snare: [0, 0, 0, 1, 0, 0, 0, 1]
                        };
                    }
                }
                return { sections: sortedSections, cues, score };
            }

            // ── MIAMI VICE SCORE ENGINE ──
            function createNote(ctx, frequency, startTime, duration, gainValue, type = 'sawtooth') {
                const now = startTime;
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.006;
                const sub = ctx.createOscillator();
                sub.type = 'triangle';
                sub.frequency.value = frequency / 2;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 2;

                const filterEnv = ctx.createGain();
                filterEnv.gain.setValueAtTime(1200, now);
                filterEnv.gain.exponentialRampToValueAtTime(300, now + 0.08);
                filterEnv.gain.exponentialRampToValueAtTime(80, now + duration * 0.8);
                filterEnv.connect(filter.frequency);

                const mainGain = ctx.createGain();
                mainGain.gain.setValueAtTime(0, now);
                mainGain.gain.linearRampToValueAtTime(gainValue * 0.35, now + 0.02);
                mainGain.gain.setValueAtTime(gainValue * 0.35, now + duration * 0.6);
                mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.1);

                osc1.connect(filter);
                osc2.connect(filter);
                sub.connect(filter);
                filter.connect(mainGain);

                const drySend = ctx.createGain();
                drySend.gain.value = 0.7;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.45;
                mainGain.connect(drySend);
                mainGain.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);

                osc1.start(now);
                osc2.start(now);
                sub.start(now);
                osc1.stop(now + duration + 0.2);
                osc2.stop(now + duration + 0.2);
                sub.stop(now + duration + 0.2);
            }

            function createKick(ctx, time) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(160, time);
                osc.frequency.exponentialRampToValueAtTime(35, time + 0.07);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.02, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.003));
                }
                const click = ctx.createBufferSource();
                click.buffer = noiseBuffer;
                const clickFilter = ctx.createBiquadFilter();
                clickFilter.type = 'highpass';
                clickFilter.frequency.value = 2200;
                click.connect(clickFilter);
                const gainClick = ctx.createGain();
                gainClick.gain.setValueAtTime(0.55, time);
                gainClick.gain.exponentialRampToValueAtTime(0.001, time + 0.02);
                clickFilter.connect(gainClick);
                const gainBody = ctx.createGain();
                gainBody.gain.setValueAtTime(0.75, time);
                gainBody.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
                osc.connect(gainBody);
                gainBody.connect(dryGain);
                gainClick.connect(dryGain);
                osc.start(time);
                click.start(time);
                osc.stop(time + 0.18);
                click.stop(time + 0.02);
            }

            function createSnare(ctx, time) {
                const body = ctx.createOscillator();
                body.type = 'triangle';
                body.frequency.setValueAtTime(220, time);
                body.frequency.exponentialRampToValueAtTime(90, time + 0.07);
                const bodyGain = ctx.createGain();
                bodyGain.gain.setValueAtTime(0.55, time);
                bodyGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                body.connect(bodyGain);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.14, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.03));
                }
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1400;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.65, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.11);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                bodyGain.connect(dryGain);
                noiseGain.connect(dryGain);
                const wetSnare = ctx.createGain();
                wetSnare.gain.value = 0.2;
                bodyGain.connect(wetSnare);
                noiseGain.connect(wetSnare);
                wetSnare.connect(wetGain);
                body.start(time);
                noise.start(time);
                body.stop(time + 0.1);
                noise.stop(time + 0.14);
            }

            const SCORE_PATTERNS = {
                intro: { bpm: 82, bass: [0, 0, 7, 7, 0, 0, 7, 7], arp: [12, 16, 12, 19, 12, 16, 12,
                        19
                    ], kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] },
                setup: { bpm: 90, bass: [0, 7, 5, 3, 0, 7, 5, 3], arp: [12, 15, 19, 15, 12, 15, 19,
                        15
                    ], kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 0, 0, 1, 0, 0, 1, 0] },
                scheme: { bpm: 100, bass: [0, 3, 5, 7, 8, 7, 5, 3], arp: [12, 15, 19, 22, 24, 22, 19,
                        15
                    ], kick: [1, 0, 1, 1, 1, 0, 1, 0], snare: [0, 0, 1, 0, 0, 1, 0, 1] },
                execution: { bpm: 115, bass: [0, 7, 0, 7, 3, 7, 3, 7], arp: [12, 19, 15, 19, 12, 19,

                    ], kick: [1, 1, 1, 1, 1, 1, 1, 1], snare: [0, 1, 0, 1, 0, 1, 0, 1] },

                    ], kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [1, 1, 1, 1, 1, 1, 1, 1] },

                    ], kick: [1, 0, 0, 0, 1, 0, 0, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] }

            function startSectionScore(themeName) {
                if (!audioCtx) return;
                console.log(`🎵 Starting Miami Vice score: ${themeName}`);
                stopSectionAmbient();
                let customScore = null;
                const perf = gameState.nocturnePerformance;
                if (perf && perf.soundCues && perf.soundCues.score) {
                    customScore = perf.soundCues.score;
                }
                const fallbackTheme = SCORE_PATTERNS[themeName] || SCORE_PATTERNS.intro;
                const theme = (customScore && customScore[themeName]) ? customScore[themeName] : fallbackTheme;
                const rootFreq = 55;
                const beatDuration = 60 / theme.bpm;
                const patternLength = theme.bass.length;
                const ctx = audioCtx;
                let step = 0;
                let nextStepTime = ctx.currentTime;

                const padGain = ctx.createGain();
                padGain.gain.value = 0.12;
                const padOsc1 = ctx.createOscillator();
                padOsc1.type = 'sawtooth';
                padOsc1.frequency.value = rootFreq;
                const padOsc2 = ctx.createOscillator();
                padOsc2.type = 'sawtooth';
                padOsc2.frequency.value = rootFreq * 1.503;
                const padOsc3 = ctx.createOscillator();
                padOsc3.type = 'square';
                padOsc3.frequency.value = rootFreq / 2;

                const padFilter = ctx.createBiquadFilter();
                padFilter.type = 'lowpass';
                padFilter.frequency.value = 500;
                padFilter.Q.value = 1.5;
                padOsc1.connect(padFilter);
                padOsc2.connect(padFilter);
                padOsc3.connect(padFilter);
                padFilter.connect(padGain);
                const padDry = ctx.createGain();
                padDry.gain.value = 0.5;
                const padWet = ctx.createGain();
                padWet.gain.value = 0.35;
                padGain.connect(padDry);
                padGain.connect(padWet);
                padDry.connect(dryGain);
                padWet.connect(wetGain);
                padOsc1.start();
                padOsc2.start();
                padOsc3.start();
                const stopSources = [padOsc1, padOsc2, padOsc3];

                let timeoutId;

                function scheduleStep() {
                    if (!sectionAmbientActive) return;
                    const now = nextStepTime;
                    const bassSemitone = theme.bass[step % patternLength];
                    const bassFreq = rootFreq * Math.pow(2, bassSemitone / 12);
                    createNote(ctx, bassFreq, now, beatDuration * 0.85, 0.85, 'sawtooth');
                    const arpSemitone = theme.arp[step % patternLength];
                    const arpFreq = rootFreq * Math.pow(2, arpSemitone / 12);
                    createNote(ctx, arpFreq, now, beatDuration * 0.45, 0.65, 'square');
                    if (theme.kick[step % patternLength]) createKick(ctx, now);
                    if (theme.snare[step % patternLength]) createSnare(ctx, now);
                    step++;
                    nextStepTime += beatDuration;
                    timeoutId = setTimeout(scheduleStep, (nextStepTime - ctx.currentTime) * 1000);
                }
                nextStepTime = ctx.currentTime + 0.05;
                timeoutId = setTimeout(scheduleStep, 50);
                sectionAmbientActive = {
                    stop: () => {
                        clearTimeout(timeoutId);
                        padGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                        stopSources.forEach(s => { try { s.stop(ctx.currentTime + 0.3); } catch (
                        e) {} });
                        sectionAmbientActive = null;
                    }
                };
            }
            const transitionSectionTheme = startSectionScore;

            function stopSectionAmbient() {
                if (sectionAmbientActive) {
                    sectionAmbientActive.stop();
                    sectionAmbientActive = null;
                }
                clearTimeout(crossfadeTimeout);
            }

                if (cueList && cueList.length > 0) {

                        .start_char) : [];

                dialogue.textContent = '';
                if (cueChecker) {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.68, pitch: 0.9 }, (idx) => cueChecker(
                        idx));
                } else {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.68, pitch: 0.9 });
                }
                await new Promise(r => setTimeout(r, 1200));
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#c8d8e8';
                dialogue.appendChild(closingLine);
                speakTextMale(closing);
                await typewriterEffect(closingLine, closing, 42);
                await new Promise(r => setTimeout(r, 1000));
                const curtainText = document.createElement('p');
                curtainText.textContent = '— End of Shift · 6:00 AM —';
                stopSectionAmbient();
                curtainText.style.color = '#4a6078';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();
                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← End Shift';
                leaveBtn.addEventListener('click', () => { leaveTheater(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'ch3AddEpisodeBtn';
                addBtn.textContent = '📋 Log Shift';
                addBtn.addEventListener('click', () => {
                    addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Logged';
                });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.nocturnePerformance;
                if (!perf) return;
                gameState.ch3Episodes.push({
                    ...perf,
                    rawStoryText: perf.rawStoryText,
                    soundCues: perf.soundCues
                });
                saveState();
                setTimeout(() => leaveTheater(), 600);
            }

            function leaveTheater() {
                stopAmbient();
                stopSectionAmbient();
                renderChannel3();
            }

            function init() {
                loadState();
                renderChannel3();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('night_beat_key', key);
                    }
                });
                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) {
                        showModal(HOST_BIO);
                    }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeModal();
                });
                if (!apiKey) {
                    setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                }
            }
            init();
        })();
    </script>
</body>
</html>
