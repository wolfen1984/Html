<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover" />
    <title>NIGHT BEAT · 1986 · AI SCORE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Special+Elite&family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&family=Audiowide&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #05080f;
            --screen-bg: #070a14;
            --panel-bg: #090d18;
            --text: #b8c8d8;
            --text-dim: #4a6078;
            --text-bright: #d0e4f8;
            --accent: #00c8f0;
            --accent-dim: #003544;
            --accent-glow: 0 0 14px #00c8f066, 0 0 32px #00688044;
            --border: #006d88;
            --border-glow: 0 0 14px #00b8e055, 0 0 28px #00506633;
            --danger: #ff1a3d;
            --danger-glow: 0 0 12px #ff1a3d55, 0 0 28px #99002044;
            --danger-border: #880022;
            --neon-blue: #00d4ff;
            --neon-red: #ff1744;
            --input-bg: #0c101e;
            --button-bg: #0e1220;
            --button-hover: #141c30;
            --button-active: #0e1420;
            --bevel-light: #1a2838;
            --bevel-dark: #03060c;
            --font-display: 'Orbitron', 'Rajdhani', sans-serif;
            --font-title: 'Orbitron', 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 28px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000408;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0a1020 0%, #000408 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #0c101a;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #1a2430, 0 0 0 4px #080c14, 0 0 0 8px #040608, 0 8px 48px #000000dd, 0 0 60px #00608022;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #1a2838;
        }
        @media (max-width:540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #080c14;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #00d4ff;
            border-radius: 50%;
            box-shadow: 0 0 8px #00d4ff88, 0 0 18px #00a0cc44;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #00d4ff88, 0 0 18px #00a0cc44;
            }
            50% {
                box-shadow: 0 0 16px #00d4ffbb, 0 0 32px #00b8e066;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #3a5068;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 2px solid #006888;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width:540px) {
            .game-shell {
                border-radius: 0;
                border-width: 1px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #060a14;
            border-bottom: 2px solid #006d88;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #0a1020;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #006888;
            border-radius: 2px;
            padding: 10px 14px;
            background: #040810;
            position: relative;
            box-shadow: inset 0 0 24px #001a2822, 0 0 18px #00b8e022;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #00c8f0;
            box-shadow: 0 0 12px #00b8e0aa;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #ff1a3d66;
            box-shadow: 0 0 8px #ff1a3d44;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #00d4ff;
            text-shadow: 0 0 18px #00c8f0aa, 0 2px 4px #000, 0 0 44px #006880aa;
            letter-spacing: 4px;
            font-family: var(--font-title);
            line-height: 1.2;
            font-weight: 900;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #ff3355;
            letter-spacing: 5px;
            margin-top: 3px;
            text-shadow: 0 0 8px #ff1a3d66;
        }
        @media (max-width:400px) {
            .marquee-title {
                font-size: 20px;
                letter-spacing: 2px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #003040 #070a14;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #070a14;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #003040;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #1a3040;
            border-top-color: #203848;
            border-left-color: #1c3040;
            border-right-color: #142030;
            border-bottom-color: #0c1420;
            padding: 12px 18px;
            border-radius: 3px;
            color: #b8c8d8;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #142030;
            border-left-color: #142030;
            border-bottom-color: #203848;
            border-right-color: #1c3040;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #0c1018;
        }
        .btn.accent {
            background: #0c1020;
            border-color: #005070;
            border-top-color: #006c90;
            border-left-color: #005e80;
            border-right-color: #003448;
            border-bottom-color: #001820;
            color: #b0d8f0;
            box-shadow: 0 2px 0 #00000044, 0 0 12px #00b8e033;
        }
        .btn.accent:active {
            border-top-color: #003448;
            border-left-color: #003448;
            border-bottom-color: #006c90;
            border-right-color: #005e80;
            box-shadow: 0 0px 0 #00000044, 0 0 20px #00c8f055;
        }
        .btn.danger {
            background: #100a0e;
            border-color: #600018;
            border-top-color: #880022;
            border-left-color: #70001e;
            border-right-color: #3a0010;
            border-bottom-color: #1a0008;
            color: #f0a8b0;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #ff1a3d33;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .patrol-mask {
            position: relative;
            background: #0a0e18;
            border: 2px solid #00688866;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.8);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #080c16;
            border: 2px solid #006080;
            padding: 15px;
            border-radius: 3px;
            box-shadow: 0 0 20px #00b8e022;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #00b8e0;
            box-shadow: 0 0 22px #00c8f066, 0 0 0 2px #081020;
            object-fit: cover;
            flex-shrink: 0;
            background: #080e18;
            filter: brightness(1.05) saturate(1.1);
        }
        .speech-bubble {
            flex: 1;
            background: #0e1220;
            border: 2px solid #005878;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #c8d8e8;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: inset 0 0 20px #00000044;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #005878 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #080c16;
            border: 1px solid #003048;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #101420;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a6078;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #006888;
            box-shadow: 0 0 20px #00b8e044, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #080c16;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(5, 8, 15, 0.85) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 13px;
            letter-spacing: 3px;
            color: #00d4ff;
            text-shadow: 0 0 10px #00c8f0cc, 0 0 30px #00688888, 0 2px 4px #000000, 0 0 60px #003040;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom, rgba(6, 10, 20, 0.9) 0%, rgba(6, 10, 20, 0.7) 40%, transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 15px;
            letter-spacing: 1.5px;
            color: #ff4466;
            text-shadow: 0 0 8px #ff1a3d88, 0 0 20px #66002044, 0 2px 4px #000000;
            background: linear-gradient(to top, rgba(5, 8, 15, 0.9) 0%, rgba(5, 8, 15, 0.6) 50%, transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a6078;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width:480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 10px;
                letter-spacing: 2px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 12px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #005070;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #b0d0e8;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 17px;
            text-shadow: 0 0 10px #00b8e044;
            text-transform: uppercase;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0c1020;
            border: 1px solid #004058;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #ff3355;
            min-width: 50px;
            text-shadow: 0 0 6px #ff1a3d44;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #c8dce8;
        }
        .guide-desc {
            font-size: 15px;
            color: #4a6078;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0c1020;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 2px solid #00b8e0;
            box-shadow: var(--accent-glow), 0 0 80px #000000dd;
            color: #b8c8d8;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #0e1424;
            border: 2px solid #00b8e066;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #b8c8d8;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #00c8f0;
            box-shadow: 0 0 14px #00b8e055;
        }
        .loading-text {
            color: #00d4ff;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #040810;
            border-top: 1px solid #003048;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #3a5068;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #4a6880;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #1a2430;
            color: #4a6880;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #005070;
            color: #00b8e0;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #c8d8e8;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width:480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
        .score-indicator {
            font-family: var(--font-mono);
            font-size: 10px;
            color: #4a6a7a;
            letter-spacing: 1px;
            padding: 3px 8px;
            border: 1px solid #004058;
            border-radius: 2px;
            display: inline-block;
            background: #080c16;
            margin-top: 4px;
        }
        .score-indicator .active {
            color: #00c8f0;
        }
        .score-indicator .dim {
            color: #3a5a6a;
        }
        .progress-bar {
            width: 100%;
            height: 2px;
            background: #0a1a24;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #00c8f0;
            border-radius: 2px;
            transition: width 0.3s;
            box-shadow: 0 0 10px #00c8f044;
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">NIGHT BEAT · CRT-86</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">NIGHT<br>BEAT</div>
                    <div class="marquee-sub">⏤ 1986 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channel3Panel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🚔 NIGHT BEAT · PATROL DISPATCH · AI SCORE</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('night_beat_key') || '';

            const DEFAULT_STATE = {
                ch3Episodes: [],
                nocturnePerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>🚔 Officer Jack Mercer</h2>
        <p style="text-align:left;">
            <strong>Badge:</strong> #2147<br>
            <strong>Shift:</strong> 6 PM – 6 AM, Night Beat<br>
            <strong>Bio:</strong> Twelve years on the force, all of them on the graveyard shift. Mercer's seen what the night does to people — and to cops. He doesn't carry a detective's badge, just a radio and a .38. Every shift grinds him down a little more, but he keeps answering the call. Rumour has it he requested nights permanently after what happened in '82. He doesn't talk about it.
        </p>
    `;

            // ─── CROSSROADS SOUND ENGINE (ported with 80s cop show style) ───
            let audioCtx = null;
            let ambientSource = null,
                ambientGain = null,
                ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null,
                masterGain = null,
                dryGain = null,
                wetGain = null;
            let sectionAmbientActive = null,
                stringAmbientActive = null;
            let patternPlayerActive = null,
                patternPlayerTimeout = null;
            let patternStep = 0,
                patternBPM = 50;
            let currentSectionPatterns = [];
            let currentVariationIdx = 0,
                barsInVariation = 0;
            let fillActive = false;
            let sectionThemeScore = null;
            let masterCompressor = null;
            let tapeWarbleNode = null;

            function expandPattern(arr) {
                if (!Array.isArray(arr)) {
                    arr = [0, 0, 0, 0, 0, 0, 0, 0];
                }
                arr = arr.map(x => typeof x === 'number' ? x : 0);
                return arr.flatMap(x => [x, x]);
            }

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.0005;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            function ensureAudioNodes(ctx) {
                if (!masterGain) {
                    masterGain = ctx.createGain();
                    masterGain.gain.value = 0.22;
                    masterCompressor = ctx.createDynamicsCompressor();
                    masterCompressor.threshold.value = -26;
                    masterCompressor.knee.value = 28;
                    masterCompressor.ratio.value = 10;
                    masterCompressor.attack.value = 0.004;
                    masterCompressor.release.value = 0.3;
                    masterGain.connect(masterCompressor);
                    masterCompressor.connect(ctx.destination);
                }
                if (!dryGain) {
                    dryGain = ctx.createGain();
                    dryGain.gain.value = 0.85;
                    dryGain.connect(masterGain);
                }
                if (!wetGain) {
                    wetGain = ctx.createGain();
                    wetGain.gain.value = 0.45;
                    if (reverbNode) wetGain.connect(reverbNode);
                    else wetGain.connect(masterGain);
                }
                if (!reverbNode) {
                    initReverb(ctx);
                    if (reverbNode) wetGain.connect(reverbNode);
                }
                if (tapeWarbleNode) tapeWarbleNode.connect(masterGain.gain);
            }

            async function getAudioContext() {
                try {
                    if (!audioCtx) {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                        createKeepAlive(audioCtx);
                        initReverb(audioCtx);
                        initTapeWarble(audioCtx);
                        ensureAudioNodes(audioCtx);
                    }
                    if (audioCtx.state === 'suspended') await audioCtx.resume();
                    ensureAudioNodes(audioCtx);
                    return audioCtx;
                } catch (err) { console.error('Audio context error:', err); throw err; }
            }

            function initReverb(ctx) {
                if (reverbNode) return;
                try {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 3.2;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.7));
                        const lateDecay = Math.exp(-i / (sampleRate * 2.0)) * 0.25;
                        left[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                        right[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                    if (masterGain) reverbNode.connect(masterGain);
                } catch (err) {
                    console.warn('Reverb init error:', err);
                    reverbNode = ctx.createGain();
                    reverbNode.gain.value = 0.4;
                    if (masterGain) reverbNode.connect(masterGain);
                }
            }

            function initTapeWarble(ctx) {
                if (tapeWarbleNode) return;
                try {
                    tapeWarbleNode = ctx.createGain();
                    tapeWarbleNode.gain.value = 0;
                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.15;
                    const lfoGain = ctx.createGain();
                    lfoGain.gain.value = 0.012;
                    const lfo2 = ctx.createOscillator();
                    lfo2.type = 'sine';
                    lfo2.frequency.value = 0.23;
                    const lfo2Gain = ctx.createGain();
                    lfo2Gain.gain.value = 0.008;
                    lfo.connect(lfoGain);
                    lfo2.connect(lfo2Gain);
                    lfoGain.connect(tapeWarbleNode.gain);
                    lfo2Gain.connect(tapeWarbleNode.gain);
                    lfo.start(0);
                    lfo2.start(0);
                    tapeWarbleNode._lfos = [lfo, lfo2];
                } catch (err) { console.warn('Tape warble init error:', err); }
            }

            // ─── 80s Cop Show Synths ──────────────────────────────────────

            function createSynthBass(ctx, semitone, intensity, duration, rootFreq = 45) {
                try {
                    const now = ctx.currentTime;
                    const freq = rootFreq * Math.pow(2, semitone / 12);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.3, now + 0.04);
                    gainNode.gain.setValueAtTime(intensity * 0.3, now + duration - 0.3);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.2);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq * 0.97, now);
                    osc.frequency.exponentialRampToValueAtTime(freq, now + 0.08);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'square';
                    osc2.frequency.value = freq * 2;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.06 * intensity;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 180 + semitone * 5;
                    filter.Q.value = 2.0;
                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.3;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + duration + 0.3);
                    osc2.stop(now + duration + 0.3);
                } catch (err) { console.warn('Synth bass error:', err); }
            }

            function createSynthPad80s(ctx, freq, duration, intensity) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 1.2);
                    gainNode.gain.setValueAtTime(intensity * 0.2, now + duration - 2);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.8);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 600 + intensity * 400;
                    filter.Q.value = 1.8;
                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.1 + Math.random() * 0.1;
                    const lfoGain = ctx.createGain();
                    lfoGain.gain.value = 80 + intensity * 80;
                    lfo.connect(lfoGain);
                    lfoGain.connect(filter.frequency);
                    const oscs = [];
                    const harmonics = [1, 1.003, 1.998, 2.002, 0.997, 1.006];
                    for (let i = 0; i < 6; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = i < 3 ? 'sawtooth' : 'triangle';
                        const h = harmonics[i] || (1 + (Math.random() - 0.5) * 0.008);
                        osc.frequency.value = freq * h;
                        const vib = ctx.createOscillator();
                        vib.type = 'sine';
                        vib.frequency.value = 5 + Math.random() * 4;
                        const vibG = ctx.createGain();
                        vibG.gain.value = 2 + Math.random() * 5;
                        vib.connect(vibG);
                        vibG.connect(osc.frequency);
                        oscs.push(osc, vib);
                        osc.connect(filter);
                    }
                    filter.connect(gainNode);
                    const drySend = ctx.createGain();
                    drySend.gain.value = 0.4;
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.6;
                    gainNode.connect(drySend);
                    gainNode.connect(wetSend);
                    drySend.connect(dryGain || ctx.destination);
                    wetSend.connect(wetGain || ctx.destination);
                    oscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1); });
                    lfo.start(now);
                    lfo.stop(now + duration + 1);
                } catch (err) { console.warn('Synth pad error:', err); }
            }

            function createArpeggio(ctx, rootFreq, duration, intensity) {
                try {
                    const now = ctx.currentTime;
                    const pattern = [0, 7, 12, 19, 12, 7];
                    const stepDur = 0.08;
                    const totalSteps = Math.floor(duration / stepDur);
                    for (let i = 0; i < Math.min(totalSteps, 80); i++) {
                        const stepTime = now + i * stepDur;
                        const semitone = pattern[i % pattern.length] + (Math.floor(i / pattern.length) % 2) * 12;
                        const freq = rootFreq * Math.pow(2, semitone / 12);
                        const gain = ctx.createGain();
                        gain.gain.setValueAtTime(0, stepTime);
                        gain.gain.linearRampToValueAtTime(intensity * 0.08 * (1 - i / totalSteps * 0.5), stepTime +
                            0.01);
                        gain.gain.exponentialRampToValueAtTime(0.001, stepTime + stepDur);
                        const osc = ctx.createOscillator();
                        osc.type = 'square';
                        osc.frequency.value = freq;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = 1800;
                        filter.Q.value = 1.2;
                        osc.connect(filter);
                        filter.connect(gain);
                        const wetSend = ctx.createGain();
                        wetSend.gain.value = 0.5;
                        gain.connect(wetSend);
                        wetSend.connect(wetGain || ctx.destination);
                        osc.start(stepTime);
                        osc.stop(stepTime + stepDur + 0.02);
                    }
                } catch (err) { console.warn('Arpeggio error:', err); }
            }

            function createKick80s(ctx, intensity) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.85, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(130, now);
                    osc.frequency.exponentialRampToValueAtTime(38, now + 0.12);
                    const click = ctx.createOscillator();
                    click.type = 'square';
                    click.frequency.value = 800;
                    const clickGain = ctx.createGain();
                    clickGain.gain.setValueAtTime(intensity * 0.12, now);
                    clickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 160;
                    filter.Q.value = 1.0;
                    osc.connect(filter);
                    filter.connect(gainNode);
                    click.connect(clickGain);
                    clickGain.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.start(now);
                    click.start(now);
                    osc.stop(now + 0.25);
                    click.stop(now + 0.04);
                } catch (err) { console.warn('Kick error:', err); }
            }

            function createSnare80s(ctx, intensity) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.7, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                    const bufferSize = ctx.sampleRate * 0.06;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        const env = Math.exp(-i / (ctx.sampleRate * 0.025));
                        data[i] = (Math.random() * 2 - 1) * env * 0.7;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(70, now + 0.06);
                    const oscGain = ctx.createGain();
                    oscGain.gain.value = 0.25 * intensity;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 350;
                    filter.Q.value = 0.8;
                    noise.connect(filter);
                    osc.connect(oscGain);
                    oscGain.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    osc.start(now);
                    noise.stop(now + 0.1);
                    osc.stop(now + 0.1);
                } catch (err) { console.warn('Snare error:', err); }
            }

            function createHat80s(ctx, intensity) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.4, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
                    const bufferSize = ctx.sampleRate * 0.02;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        const env = Math.exp(-i / (ctx.sampleRate * 0.008));
                        data[i] = (Math.random() * 2 - 1) * env * 0.4;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.value = 6000;
                    filter.Q.value = 0.5;
                    noise.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    noise.stop(now + 0.06);
                } catch (err) { console.warn('Hat error:', err); }
            }

            function createSting80s(ctx, intensity) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.3, now + 0.02);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(120, now);
                    osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                    osc.frequency.exponentialRampToValueAtTime(80, now + 1.5);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'sawtooth';
                    osc2.frequency.setValueAtTime(240, now);
                    osc2.frequency.exponentialRampToValueAtTime(900, now + 0.12);
                    osc2.frequency.exponentialRampToValueAtTime(160, now + 1.5);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 500;
                    filter.Q.value = 2.5;
                    osc.connect(filter);
                    osc2.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.5;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + 2.0);
                    osc2.stop(now + 2.0);
                } catch (err) { console.warn('Sting error:', err); }
            }

            function createClimax80s(ctx, intensity) {
                try {
                    const now = ctx.currentTime;
                    const duration = 10 + Math.random() * 8;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.4, now + 2);
                    gainNode.gain.setValueAtTime(intensity * 0.45, now + duration - 2);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    const oscs = [];
                    const freqs = [65, 97.5, 130, 195];
                    freqs.forEach(f => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(f, now);
                        osc.frequency.exponentialRampToValueAtTime(f * 1.4, now + duration * 0.6);
                        oscs.push(osc);
                    });
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(180, now);
                    filter.frequency.exponentialRampToValueAtTime(1100, now + duration);
                    filter.Q.value = 2.5;
                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.08;
                    const lfoGain = ctx.createGain();
                    lfoGain.gain.value = 300;
                    lfo.connect(lfoGain);
                    lfoGain.connect(filter.frequency);
                    oscs.forEach(o => o.connect(filter));
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.5;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    oscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1); });
                    lfo.start(now);
                    lfo.stop(now + duration + 1);
                } catch (err) { console.warn('Climax error:', err); }
            }

            function createIndustrialTexture80s(ctx, duration, intensity) {
                try {
                    const now = ctx.currentTime;
                    const bufferSize = ctx.sampleRate * 1.5;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        const t = i / ctx.sampleRate;
                        data[i] = (Math.random() * 2 - 1) * Math.sin(t * 90 + Math.sin(t * 2) * 30) * Math.exp(-t / 6);
                    }
                    const source = ctx.createBufferSource();
                    source.buffer = buffer;
                    source.loop = true;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 180;
                    filter.Q.value = 0.5;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.06, now + 0.8);
                    gainNode.gain.setValueAtTime(intensity * 0.06, now + duration - 0.8);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    source.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.6;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    source.start(now);
                    source.stop(now + duration);
                } catch (err) { console.warn('Industrial texture error:', err); }
            }

            function createBell80s(ctx, intensity) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.3, now + 0.06);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(80 + Math.random() * 30, now);
                    osc.frequency.exponentialRampToValueAtTime(osc.frequency.value * 0.5, now + 1.5);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 500;
                    osc.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.5;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc.stop(now + 2.8);
                } catch (err) { console.warn('Bell error:', err); }
            }

            // ─── Pattern Player ──────────────────────────────────────────

            function startEvolvingPatternPlayer(themeName, rootFreq = 45, scoreData) {
                stopPatternPlayer();
                if (!scoreData || !scoreData[themeName]) {
                    console.warn('No AI score data for theme:', themeName);
                    return;
                }
                const theme = scoreData[themeName];
                const bpm = theme.bpm || 60;
                const bass = expandPattern(theme.bass);
                const kick = expandPattern(theme.kick);
                const snare = expandPattern(theme.snare);
                const hat = expandPattern(theme.hat);

                const variations = [{
                    name: 'AI',
                    bars: 8,
                    bass: bass,
                    kick: kick,
                    snare: snare,
                    hat: hat
                }];

                currentSectionPatterns = variations;
                currentVariationIdx = 0;
                barsInVariation = 0;
                patternStep = 0;
                patternBPM = bpm;
                fillActive = false;

                const stepDuration = 60 / bpm / 4;
                patternPlayerActive = { active: true, theme: themeName };

                function getCurrentPattern() { return currentSectionPatterns[0]; }

                function playStep() {
                    if (!patternPlayerActive || !patternPlayerActive.active) return;
                    const ctx = audioCtx;
                    if (!ctx) { patternPlayerTimeout = setTimeout(playStep, 100); return; }

                    const step = patternStep % 16;
                    const current = getCurrentPattern();
                    const isFillStep = fillActive;

                    let bassSemitone = 0;
                    if (isFillStep) {
                        bassSemitone = (step % 4 === 0) ? 0 : (step % 8 === 4 ? 7 : 0);
                    } else {
                        bassSemitone = current.bass[step] || 0;
                    }
                    if (bassSemitone !== 0 || (isFillStep && step % 4 === 0)) {
                        const dur = isFillStep ? 0.2 : 1.6;
                        const inten = isFillStep ? 0.3 : 0.5 + (bassSemitone / 30);
                        createSynthBass(ctx, bassSemitone, inten, dur, rootFreq);
                    }

                    let kickVal = isFillStep ? (step % 4 === 0 ? 1 : 0) : (current.kick[step] || 0);
                    if (kickVal === 1) createKick80s(ctx, isFillStep ? 0.7 : 0.6);

                    let snareVal = isFillStep ? (step % 8 === 4 ? 1 : 0) : (current.snare[step] || 0);
                    if (snareVal === 1) createSnare80s(ctx, isFillStep ? 0.7 : 0.5);

                    let hatVal = isFillStep ? (step % 2 === 0 ? 1 : 0) : (current.hat[step] || 0);
                    if (hatVal === 1 && Math.random() < 0.65) createHat80s(ctx, isFillStep ? 0.4 : 0.2);

                    if (step % 4 === 0 && !isFillStep && Math.random() < 0.08) {
                        const arpRoot = 55 + bassSemitone * 1.5;
                        createArpeggio(ctx, arpRoot, 0.4, 0.25);
                    }

                    if (step === 0 && !isFillStep && Math.random() < 0.12) {
                        const padFreq = 55 + Math.random() * 25;
                        createSynthPad80s(ctx, padFreq, 4 + Math.random() * 2, 0.2 + Math.random() * 0.15);
                    }

                    patternStep++;
                    if (patternStep % 16 === 0) {
                        barsInVariation++;
                        if (barsInVariation >= current.bars) barsInVariation = 0;
                    }

                    patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
                }

                patternPlayerTimeout = setTimeout(playStep, 50);
            }

            function stopPatternPlayer() {
                if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout);
                    patternPlayerTimeout = null; }
                if (patternPlayerActive) { patternPlayerActive.active = false;
                    patternPlayerActive = null; }
                patternStep = 0;
                currentSectionPatterns = [];
                currentVariationIdx = 0;
                barsInVariation = 0;
                fillActive = false;
            }

            // ─── Ambient ──────────────────────────────────────────────────

            async function playAmbient(type, durationSeconds, intensity) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.2, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'ambient_drone' || type === 'wind_howl' || type === 'industrial_drone') {
                        const bufferSize = ctx.sampleRate * 1.5;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.4;
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'industrial_drone' ? 100 : type === 'ambient_drone' ? 140 :
                            400;
                        filter.Q.value = 0.4;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'industrial_drone' ? 45 : type === 'ambient_drone' ? 60 : 90;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.12 * intensity;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 70;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) { console.warn('playAmbient error:', err); }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 400);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            // ─── Section Music ───────────────────────────────────────────

            function startSectionAmbient80s(themeName, scoreData) {
                if (!audioCtx) return;
                stopSectionAmbient();
                const ctx = audioCtx;
                const now = ctx.currentTime;

                const themeMap = {
                    intro: { rootFreq: 50, detune: 8, filterBase: 150, lfoRate: 0.06, intensity: 0.25 },
                    setup: { rootFreq: 55, detune: 10, filterBase: 180, lfoRate: 0.08, intensity: 0.30 },
                    scheme: { rootFreq: 48, detune: 12, filterBase: 130, lfoRate: 0.10, intensity: 0.35 },
                    execution: { rootFreq: 52, detune: 14, filterBase: 110, lfoRate: 0.12, intensity: 0.45 },
                    twist: { rootFreq: 45, detune: 6, filterBase: 160, lfoRate: 0.05, intensity: 0.20 },
                    closing: { rootFreq: 42, detune: 4, filterBase: 170, lfoRate: 0.04, intensity: 0.18 }
                };

                const theme = themeMap[themeName] || themeMap.intro;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(theme.intensity * 0.18, now + 1.2);

                const oscs = [];
                for (let i = 0; i < 3; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i === 0 ? 'sawtooth' : i === 1 ? 'triangle' : 'sawtooth';
                    const detune = (i - 1) * theme.detune;
                    osc.frequency.value = theme.rootFreq * Math.pow(2, detune / 1200);
                    oscs.push(osc);
                }
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = theme.filterBase;
                filter.Q.value = 2.5;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = theme.lfoRate;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 70;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                oscs.forEach(o => o.connect(filter));
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.45;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                oscs.forEach(o => o.start(now));
                lfo.start(now);

                sectionAmbientActive = {
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
                        oscs.forEach(s => { try { s.stop(ctx.currentTime + 0.7); } catch (e) {} });
                        try { lfo.stop(ctx.currentTime + 0.7); } catch (e) {}
                        sectionAmbientActive = null;
                    }
                };

                startEvolvingPatternPlayer(themeName, 45, scoreData);
            }

            function transitionSectionTheme(themeName, scoreData) {
                if (scoreData) sectionThemeScore = scoreData;
                startSectionAmbient80s(themeName, scoreData);
            }

            function stopSectionAmbient() {
                if (sectionAmbientActive) { sectionAmbientActive.stop();
                    sectionAmbientActive = null; }
                stopPatternPlayer();
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            async function mistralChat(msgs, maxTok, timeoutMs) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs || 28000);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9, max_tokens: maxTok ||
                                500 }),
                        signal: controller.signal
                    });
                    if (!res.ok) { const errText = await res.text(); throw new Error(`API error ${res.status}: ${errText}`); }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') throw new Error('Request timed out. Please try again.');
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', 1980s police drama, neon noir, synthwave aesthetic, grainy VHS')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries) {
                let lastError = null;
                for (let i = 0; i < (retries || 2); i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e;
                        await new Promise(r => setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else {
                            clearInterval(timer);
                            resolve();
                        }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                return new Promise((resolve) => {
                    if (!text) { resolve(); return; }
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice)
                            break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = 0.7;
                    utterance.pitch = 0.9;
                    utterance.onend = () => resolve();
                    utterance.onerror = () => resolve();
                    speechSynthesis.speak(utterance);
                });
            }

            // ─── AI Score Generation ──────────────────────────────────────

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system =
                    `You are a sound designer for a 1980s cop TV show with a Miami Vice synthwave soundtrack. Return JSON with THREE keys:
        - "sections": array of 5-7 sections dividing the shift into emotional acts. Each has "theme" (one of: intro, setup, scheme, execution, twist, closing), "start_char" (inclusive), "end_char" (exclusive). Cover entire story from 0 to ${length}.
        - "cues": array of sound events using types: "sting", "heartbeat", "thunder", "bell", "climax", "industrial_hum", "pad", "bass", "kick", "snare", "hat". Include at least 35 cues spread evenly.
        - "score": object with keys matching theme names. Each key: "bpm" (90-130 for driving 80s synthwave), "bass" (array of 8 integers 0-24), "kick" (array of 8 integers 0/1), "snare" (array of 8 integers 0/1), "hat" (array of 8 integers 0/1).
        Make the music driving, energetic, with gated reverb drums and synth bass. Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and 80s cop show score patterns. No fallbacks, all AI-generated.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user',
                    content: userPrompt }], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try { data = JSON.parse(cleaned); } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try { data = JSON.parse(candidate); } catch (e2) { throw new Error(
                                'Failed to parse AI soundtrack JSON.'); }
                    } else throw new Error('No JSON found in AI response.');
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                    throw new Error('Missing sections, cues, or score in AI response');

                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char < length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({
                    type: c.type,
                    position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7
                }));

                const requiredThemes = ['intro', 'setup', 'scheme', 'execution', 'twist', 'closing'];
                const score = {};

                function normalizeArray(arr, maxVal) {
                    if (!Array.isArray(arr)) throw new Error('Expected array, got ' + typeof arr);
                    let clean = arr.map(v => { const n = Number(v); return isNaN(n) ? 0 : Math.min(maxVal, Math.max(
                            0, Math.round(n))); });
                    if (clean.length < 8) { while (clean.length < 8) clean.push(0); } else if (clean.length > 8) { clean =
                            clean.slice(0, 8); }
                    return clean;
                }

                for (const theme of requiredThemes) {
                    if (!data.score[theme]) throw new Error(`AI did not provide a score for theme "${theme}".`);
                    const s = data.score[theme];
                    if (typeof s.bpm !== 'number' || s.bpm < 80 || s.bpm > 140) throw new Error(
                        `Invalid bpm for theme "${theme}": ${s.bpm}`);
                    const bass = normalizeArray(s.bass, 24);
                    const kick = normalizeArray(s.kick, 1);
                    const snare = normalizeArray(s.snare, 1);
                    const hat = normalizeArray(s.hat, 1);
                    score[theme] = { bpm: s.bpm, bass, kick, snare, hat };
                }
                return { sections: sortedSections, cues, score };
            }

            // ─── Story Generation ─────────────────────────────────────────

            async function generateNewNocturneStory() {
                const system =
                    `You are Officer Jack Mercer, a veteran patrol officer working the 6 PM to 6 AM night shift in a gritty 1980s American city. You narrate your shift reports with brutal, unflinching honesty — part Stephen King psychological dread, part Hitchcock tension, all grounded in human depravity. No supernatural elements.`;
                const prompt =
                    `Write a 900 to 1100 word first-person narrative of one night shift (6 PM to 6 AM) as Officer Jack Mercer. Structure it in THREE parts following the partner rotation:

        PART ONE (6 PM – 10 PM): Partner is from "The Professional" archetype (Rookie, Burnout, Veteran, Idealist, Family Man, or Rule Follower). Early shift calls: traffic stops, domestic disputes, shoplifters, noise complaints, missing kids. Things feel manageable.

        PART TWO (10 PM – 2 AM): Partner is from "The Problem" archetype (Corrupt, Violent, Bully, Racist, Coward, Adrenaline Junkie, Loose Cannon, Manipulator, or Predator). Bars close. Fights, drugs, mental health crises, violence. The city becomes unpredictable.

        PART THREE (2 AM – 6 AM): Partner is from "The Broken" archetype (Alcoholic, Divorced, Cynic, Depressed, Insomniac, Traumatized, Terminally Ill, Haunted by Guilt, Ready to Quit, or Emotionally Numb). The dead hours. Empty streets, exhaustion, desperation. The worst calls happen before dawn.

        Style: Tight, visceral prose. No supernatural elements. Pure human darkness. Influences: Bringing Out the Dead, Training Day, End of Watch, Southland, The Wire, Serpico, Nightcrawler, After Hours.

        Return ONLY a valid JSON object with these fields: title (string, a gritty shift name like "The Blood on 8th Street"), story (full narration string, use backslash n for line breaks), closing_remark (the haunting sign-off as Mercer clocks out at 6 AM). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user',
                    content: prompt }], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();

                dialogue.textContent = '';

                const storyText = storyData.rawStoryText || storyData.story;
                if (!storyText) { await showClosingAndFinish(storyData, dialogue); return; }

                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b
                    .start_char) : [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) {
                                currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme, scoreData);
                            }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) {
                                triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity);
                            }
