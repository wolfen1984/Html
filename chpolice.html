                dialogue.textContent = '';
                const typingPromise = typewriterEffect(dialogue, storyText, 30, cueChecker);
                const speechPromise = speakTextMale(storyText);
                await Promise.all([speechPromise, typingPromise]);

                await showClosingAndFinish(storyData, dialogue);
            }

            async function showClosingAndFinish(storyData, dialogue) {
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#c8d8e8';
                dialogue.appendChild(closingLine);

                const closingSpeech = speakTextMale(closing);
                const closingTyping = typewriterEffect(closingLine, closing, 42);
                await Promise.all([closingSpeech, closingTyping]);

                await new Promise(r => setTimeout(r, 1000));
                const curtainText = document.createElement('p');
                curtainText.textContent = '— End of Shift · 6:00 AM —';
                stopSectionAmbient();
                stopPatternPlayer();
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                curtainText.style.color = '#4a6078';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();

                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← End Shift';
                leaveBtn.addEventListener('click', () => { leaveTheater(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'ch3AddEpisodeBtn';
                addBtn.textContent = '📋 Log Shift';
                addBtn.addEventListener('click', () => {
                    addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Logged';
                });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.nocturnePerformance;
                if (!perf) return;
                gameState.ch3Episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
                saveState();
                setTimeout(() => leaveTheater(), 600);
            }

            function leaveTheater() {
                stopAmbient();
                stopSectionAmbient();
                stopPatternPlayer();
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                renderChannel3();
            }

            // ─── Render ──────────────────────────────────────────────────

            function renderChannel3() {
                const panel = document.getElementById('channel3Panel');
                if (!panel) return;
                panel.innerHTML = `
            <div class="tv-stage patrol-mask">
                <div class="tv-stage-row">
                    <img class="host-portrait" src="officer.jpg" alt="Officer Jack Mercer" style="object-fit:cover;">
                    <div class="speech-bubble" id="ch3SpeechBubble">
                        <div class="story-poster-container no-image" id="ch3PosterContainer">
                            <img id="ch3SegmentImage" class="segment-image" alt="Shift Poster">
                            <div class="poster-overlay-theater">NIGHT<br>BEAT</div>
                            <div class="poster-overlay-title" id="ch3PosterTitle"></div>
                        </div>
                        <div class="segment-text" id="ch3Dialogue">
                            "Dispatch to 2147. You're on the air, Mercer. Six PM to six AM. The city's already stirring. Keep your head on a swivel out there tonight."
                        </div>
                        <div id="scoreIndicator" class="score-indicator" style="display:none;">
                            <span class="dim">🎵</span> <span id="scoreThemeLabel">intro</span>
                            <span class="dim">·</span> <span id="scoreVariationLabel">A</span>
                            <span class="dim">·</span> <span id="scoreBarLabel">bar 1</span>
                            <div class="progress-bar"><div class="fill" id="scoreProgressFill" style="width:0%;"></div></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tv-guide">
                <h3>🚔 NIGHT BEAT · PATROL LOG</h3>
                <div id="ch3GuideList"></div>
            </div>
        `;

                const guideList = document.getElementById('ch3GuideList');
                const episodes = gameState.ch3Episodes || [];
                episodes.forEach((ep, index) => {
                    const entry = document.createElement('div');
                    entry.className = 'guide-entry';
                    const hasCues = ep.soundCues && (
                        Array.isArray(ep.soundCues) ?
                        ep.soundCues.length > 0 :
                        (ep.soundCues.cues && ep.soundCues.cues.length > 0)
                    );
                    entry.innerHTML = `
                <span class="guide-time">LOGGED</span>
                ${ep.imageUrl ? `
                    <div style="position:relative; width:50px; height:50px; flex-shrink:0; margin-right:8px; border-radius:2px; overflow:hidden; border:1px solid #004060;">
                        <img src="${esc(ep.imageUrl)}" style="width:100%; height:100%; object-fit:cover;" alt="Poster">
                        <div style="position:absolute; top:0; left:0; right:0; font-family:${esc('--font-title')}; font-size:4px; text-align:center; color:#b8c8d8; text-shadow:0 0 3px #00c8f0; background:rgba(5,8,15,0.7); padding:1px 2px; letter-spacing:0.5px; line-height:1.1; pointer-events:none;">NIGHT BEAT</div>
                        <div style="position:absolute; bottom:0; left:0; right:0; font-family:${esc('--font-display')}; font-size:3.5px; text-align:center; color:#c8d8e8; text-shadow:0 0 2px #000; background:rgba(5,8,15,0.65); padding:1px 2px; line-height:1.2; pointer-events:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(ep.title)}</div>
                    </div>` : ''}
                <div class="guide-info">
                    <div class="guide-title">"${esc(ep.title)}"</div>
                    <div class="guide-desc">${hasCues ? '🎧 Soundtrack ready' : 'A night shift logged.'}</div>
                </div>
                <div class="guide-actions">
                    <button class="btn guide-btn perform-saved-btn" data-index="${index}">▶ Run Shift</button>
                    ${!hasCues ? `<button class="btn guide-btn produce-episode-btn" data-index="${index}">🎧 Score</button>` : '<span style="color:#00d4ff; font-size:12px;">✅</span>'}
                </div>
            `;
                    guideList.appendChild(entry);
                });

                const newBtn = document.createElement('button');
                newBtn.className = 'btn accent';
                newBtn.style.marginTop = '12px';
                newBtn.style.width = '100%';
                newBtn.textContent = '🚔 Start New Shift';
                newBtn.addEventListener('click', async () => {
                    newBtn.disabled = true;
                    newBtn.textContent = '📻 Dispatching…';
                    try {
                        await getAudioContext();
                        await generateAndPerform();
                        newBtn.disabled = false;
                        newBtn.textContent = '🚔 Start New Shift';
                    } catch (e) {
                        showModal(
                            `<h2>🚔 Radio Down</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                            );
                        newBtn.disabled = false;
                        newBtn.textContent = '🚔 Start New Shift';
                    }
                });
                guideList.appendChild(newBtn);

                document.querySelectorAll('.perform-saved-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const index = parseInt(btn.dataset.index);
                        const ep = gameState.ch3Episodes[index];
                        if (!ep) return;
                        gameState.nocturnePerformance = { ...ep, soundCues: ep.soundCues || null,
                            rawStoryText: ep.rawStoryText || ep.story };
                        saveState();
                        await getAudioContext();
                        await startNocturnePerformance();
                    });
                });

                document.querySelectorAll('.produce-episode-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const index = parseInt(btn.dataset.index);
                        const ep = gameState.ch3Episodes[index];
                        if (!ep || !ep.rawStoryText) return;
                        btn.disabled = true;
                        btn.textContent = '🎚️...';
                        try {
                            const soundtrack = await generateSoundCueSheet(ep.rawStoryText);
                            ep.soundCues = soundtrack;
                            saveState();
                            renderChannel3();
                        } catch (err) {
                            showModal(
                                `<h2>Score Failed</h2><p>${esc(err.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                                );
                            btn.disabled = false;
                            btn.textContent = '🎧 Score';
                        }
                    });
                });

                // Score indicator update loop
                let indicatorInterval = setInterval(() => {
                    if (patternPlayerActive) {
                        const theme = patternPlayerActive.theme || 'intro';
                        const varIdx = currentVariationIdx;
                        const varName = currentSectionPatterns[varIdx] ? currentSectionPatterns[varIdx].name :
                            'A';
                        const bar = barsInVariation + 1;
                        updateScoreIndicator(theme, varName, bar);
                    } else {
                        const indicator = document.getElementById('scoreIndicator');
                        if (indicator && !indicator._hidden) {
                            // keep visible but show placeholder
                        }
                    }
                }, 1000);
                // Store interval for cleanup
                window._scoreInterval = indicatorInterval;
            }

            // ─── Init ─────────────────────────────────────────────────────

            function init() {
                loadState();
                renderChannel3();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('night_beat_key', key);
                    }
                });
                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) {
                        showModal(HOST_BIO);
                    }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeModal();
                });
                if (!apiKey) {
                    setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                }
                document.addEventListener('click', () => {
                    getAudioContext().catch(() => {});
                }, { once: true });
            }
            init();
        })();
    </script>
</body>
</html>
