<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <title>RELICS & REGRET (1986)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a; color: #33ff33;
      font-family: 'Press Start 2P', monospace;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; overflow: hidden;
      text-shadow: 0 0 5px rgba(51,255,51,0.6);
    }
    body::after {
      content: ''; position: fixed; top:0; left:0; width:100%; height:100%;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 3px);
      pointer-events: none; z-index: 999;
    }
    #wrapper {
      width: 100%; max-width: 920px; height: 96vh;
      background: #0c1a0c; border: 3px double #336633;
      box-shadow: 0 0 30px #224422; display: flex; flex-direction: column;
      position: relative; z-index: 1;
    }
    #wrapper.chat-mode { background: #0a120a; border-color: #44aa44; box-shadow: 0 0 50px #336633; }
    #title {
      padding: 12px; text-align: center; font-size: 1.1em;
      border-bottom: 2px solid #336633; white-space: pre; letter-spacing: 2px;
      background: #0d1a0d; color: #44ff44;
    }
    #toolbar {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;
      padding: 8px 10px; border-bottom: 2px solid #336633;
      background: #0d1a0d; z-index: 4;
    }
    .tb-btn {
      font-family: 'Press Start 2P', monospace; font-size: 0.65em;
      color: #33ff33; background: #0d1a0d;
      border: 2px solid #336633; padding: 6px 12px;
      cursor: pointer; text-transform: uppercase;
      box-shadow: 2px 2px 0 #1a2a1a, inset -2px -2px 0 #1a2a1a;
      transition: all 0.08s;
      text-shadow: 0 0 4px rgba(51,255,51,0.4);
      white-space: nowrap;
    }
    .tb-btn:hover {
      color: #66ff66; border-color: #44aa44;
      text-shadow: 0 0 8px #66ff66, 0 0 2px #66ff66;
      box-shadow: 2px 2px 0 #2a4a2a, inset -2px -2px 0 #2a4a2a;
    }
    .tb-btn:active {
      box-shadow: inset 2px 2px 0 #1a2a1a, inset -1px -1px 0 #1a2a1a;
      transform: translateY(1px); color: #44ff44;
    }
    #output {
      flex: 1; overflow-y: auto; padding: 20px; white-space: pre-wrap;
      line-height: 1.7; font-size: 0.8em;
      background: #0a120a; color: #33ee33; position: relative; z-index: 3;
    }
    #output::-webkit-scrollbar { width: 8px; }
    #output::-webkit-scrollbar-thumb { background: #336633; }
    #input-line { display: flex; border-top: 2px solid #336633; background: #0d1a0d; z-index: 3; }
    #prompt { padding: 12px 8px 12px 18px; font-weight: bold; color: #55ff55; }
    #cmd {
      flex: 1; background: transparent; border: none; color: #33ff33;
      font-family: 'Press Start 2P', monospace; font-size: 1em;
      padding: 12px 10px; outline: none; caret-color: #33ff33;
    }
    #cmd::placeholder { color: #336633; }
    .overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.95); display: flex; justify-content: center;
      align-items: center; z-index: 1000; flex-direction: column;
      text-align: center; font-family: 'Press Start 2P', monospace;
    }
    .overlay-box {
      border: 2px solid #33aa33; padding: 30px; background: #0a120a;
      box-shadow: 0 0 30px #336633; width: 90%; max-width: 500px;
      color: #44ff44; max-height: 80vh; overflow-y: auto;
    }
    .overlay-box h2 { margin-bottom: 20px; font-size: 1.3em; }
    .overlay-input {
      width: 100%; padding: 12px; background: #000; border: 1px solid #336633;
      color: #44ff44; font-family: 'Press Start 2P', monospace; font-size: 1em;
      margin-bottom: 16px; outline: none;
    }
    .overlay-input::placeholder { color: #336633; }
    .overlay-btn {
      padding: 10px 20px; background: #1a2a1a; border: 1px solid #44aa44;
      color: #44ff44; font-family: 'Press Start 2P', monospace; font-size: 1em;
      cursor: pointer; transition: background 0.2s; margin: 4px;
    }
    .overlay-btn:hover { background: #2a4a2a; }
    .save-list-item {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 10px; margin: 4px 0;
      border: 1px solid #336633; background: #0d1a0d; color: #33ff33;
      font-family: 'Press Start 2P', monospace; font-size: 0.7em;
      cursor: pointer; transition: background 0.2s;
    }
    .save-list-item:hover { background: #2a4a2a; border-color: #44aa44; color: #66ff66; }
    .save-delete-btn {
      background: none; border: none; color: #aa4444; cursor: pointer;
      font-family: 'Press Start 2P', monospace; font-size: 0.9em;
      padding: 0 8px; transition: color 0.2s;
    }
    .save-delete-btn:hover { color: #ff6666; }
    .hidden { display: none !important; }
    #binder-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 500; font-family: 'Press Start 2P', monospace; color: #33ff33;
    }
    #binder-instruction {
      font-size: 0.8em; margin-top: 15px; color: #669966;
    }
    #binder-grid {
      display: grid; grid-template-columns: repeat(auto-fill, 240px);
      gap: 18px; max-width: 90vw; max-height: 70vh; overflow-y: auto;
      padding: 25px; background: #0c1a0c; border: 2px solid #336633;
      box-shadow: 0 0 35px #224422;
    }
    #binder-grid::-webkit-scrollbar { width: 6px; }
    #binder-grid::-webkit-scrollbar-thumb { background: #336633; }
    .card-slot {
      background: #0d1a0d; border: 1px solid #336633; padding: 8px;
      display: flex; flex-direction: column; align-items: center;
      box-shadow: 0 0 12px #1a2a1a; transition: transform 0.1s;
    }
    .card-slot:hover { transform: scale(1.03); border-color: #44aa44; }
    .card-img {
      width: 220px; height: 180px; object-fit: cover;
      border: 1px solid #336633; background: #111; display: block;
    }
    .card-placeholder {
      background: #111; border: 1px dashed #336633; display: flex;
      align-items: center; justify-content: center;
      font-size: 3em; color: #336633;
    }
    .card-info {
      margin-top: 8px; font-size: 0.55em; text-align: center; line-height: 1.6;
    }
    .card-name { color: #44ff44; }
    .card-meta { color: #88bb88; }
    .card-desc { color: #669966; }
    #binder-close {
      margin-top: 20px; padding: 12px 30px; background: #1a2a1a;
      border: 1px solid #44aa44; color: #44ff44;
      font-family: 'Press Start 2P', monospace; font-size: 0.9em;
      cursor: pointer; transition: background 0.2s;
    }
    #binder-close:hover { background: #2a4a2a; }
  </style>
</head>
<body>
<div id="wrapper">
  <div id="title">
█▓▒░ RELICS & REGRET ░▒▓█
  Antique Shop, Main Street [1986]
  </div>
  <div id="toolbar">
    <button class="tb-btn" id="btn-customer">CUSTOMER</button>
    <button class="tb-btn" id="btn-inventory">INVENTORY</button>
    <button class="tb-btn" id="btn-ledger">LEDGER</button>
    <button class="tb-btn" id="btn-radio">RADIO</button>
    <button class="tb-btn" id="btn-wait">WAIT</button>
    <button class="tb-btn" id="btn-help">HELP</button>
    <button class="tb-btn" id="btn-tutorial">TUTORIAL</button>
    <button class="tb-btn" id="btn-save">SAVE</button>
    <button class="tb-btn" id="btn-load">LOAD</button>
  </div>
  <div id="output"></div>
  <div id="input-line">
    <span id="prompt">&gt;</span>
    <input type="text" id="cmd" placeholder="TYPE COMMAND..." autofocus>
  </div>
</div>

<div id="key-overlay" class="overlay hidden">
  <div class="overlay-box">
    <h2>ENTER MISTRAL API KEY</h2>
    <input type="text" id="api-key-input" class="overlay-input" placeholder="Paste your key here..." autocomplete="off" spellcheck="false">
    <br>
    <button id="save-key-btn" class="overlay-btn">SAVE KEY</button>
    <p style="font-size:0.8em; margin-top:20px; color:#669966;">Key stored locally in your browser.</p>
  </div>
</div>

<div id="save-overlay" class="overlay hidden">
  <div class="overlay-box">
    <h2>SAVE GAME</h2>
    <input type="text" id="save-name-input" class="overlay-input" placeholder="Save name..." maxlength="20">
    <button id="save-confirm-btn" class="overlay-btn">SAVE</button>
    <button id="save-cancel-btn" class="overlay-btn">CANCEL</button>
  </div>
</div>

<div id="load-overlay" class="overlay hidden">
  <div class="overlay-box">
    <h2>LOAD GAME</h2>
    <div id="load-list"></div>
    <button id="load-cancel-btn" class="overlay-btn" style="margin-top:12px;">CANCEL</button>
  </div>
</div>

<div id="binder-overlay" class="hidden">
  <div id="binder-grid"></div>
  <div id="binder-instruction">Press ESC or click CLOSE to return</div>
  <button id="binder-close">CLOSE BINDER</button>
</div>

<script>
// ──────────────────────────────────────────────
// RELICS & REGRET – Manipulation Sim (Needful Things)
// No favours, orders, or external deliveries.
// ──────────────────────────────────────────────
let MISTRAL_KEY = '';
const MODEL = 'mistral-small-latest';
const API_URL = 'https://api.mistral.ai/v1/chat/completions';

let imageCache = JSON.parse(localStorage.getItem('rr_imageCache') || '{}');
function saveImageCache() { localStorage.setItem('rr_imageCache', JSON.stringify(imageCache)); }

const keyOverlay = document.getElementById('key-overlay');
const apiKeyInput = document.getElementById('api-key-input');
const saveKeyBtn = document.getElementById('save-key-btn');
const outputEl = document.getElementById('output');
const cmdInput = document.getElementById('cmd');
const wrapper = document.getElementById('wrapper');
const binderOverlay = document.getElementById('binder-overlay');
const binderGrid = document.getElementById('binder-grid');
const binderCloseBtn = document.getElementById('binder-close');
const saveOverlay = document.getElementById('save-overlay');
const saveNameInput = document.getElementById('save-name-input');
const saveConfirmBtn = document.getElementById('save-confirm-btn');
const saveCancelBtn = document.getElementById('save-cancel-btn');
const loadOverlay = document.getElementById('load-overlay');
const loadList = document.getElementById('load-list');
const loadCancelBtn = document.getElementById('load-cancel-btn');

let audioCtx = null, soundEnabled = true;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playClick() {
  if (!soundEnabled || !audioCtx) return;
  try {
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = 600 + Math.random()*300;
    gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.03);
    osc.start(); osc.stop(audioCtx.currentTime+0.03);
  } catch(e) {}
}

let savedKey = localStorage.getItem('rr_api_key');
function setApiKey(key) {
  MISTRAL_KEY = key;
  if (key) {
    localStorage.setItem('rr_api_key', key);
    keyOverlay.classList.add('hidden');
    cmdInput.focus();
  }
}
if (!savedKey) {
  keyOverlay.classList.remove('hidden');
  apiKeyInput.focus();
} else { MISTRAL_KEY = savedKey; }
saveKeyBtn.addEventListener('click', () => {
  const key = apiKeyInput.value.trim();
  if (!key) { alert('Please enter a valid API key.'); return; }
  setApiKey(key);
  if (!window.booted) { window.booted = true; boot(); }
});
apiKeyInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveKeyBtn.click(); });

function getDefaultInventory() {
  return [
    { name: 'Tarnished Silver Locket', year: '1890', description: 'A locket with a faded photograph of a stern woman. It feels cold to the touch.', value: 25, secret: '', knownSecret: false, isFake: false, trueValue: 25 },
    { name: 'Cracked Porcelain Doll', year: '1922', description: 'A doll with one missing eye and hair that seems to grow.', value: 40, secret: '', knownSecret: false, isFake: false, trueValue: 40 },
    { name: 'Old Brass Compass', year: '1910', description: 'The needle points not north, but towards the old church.', value: 55, secret: '', knownSecret: false, isFake: false, trueValue: 55 },
    { name: 'Leather-Bound Journal', year: '1888', description: 'The pages are mostly torn out, but a few entries remain. They are not written in ink.', value: 30, secret: '', knownSecret: false, isFake: false, trueValue: 30 }
  ];
}

let cash = parseInt(localStorage.getItem('rr_cash') || '500');
let inventory = JSON.parse(localStorage.getItem('rr_inventory') || JSON.stringify(getDefaultInventory()));
let currentNPC = null, chatHistory = [];
let currentSign = localStorage.getItem('rr_sign') || 'RELICS & REGRET';
let npcMemory = JSON.parse(localStorage.getItem('rr_npcMemory') || '{}');
let townMood = localStorage.getItem('rr_townMood') || 'uneasy quiet';
let activeTests = JSON.parse(localStorage.getItem('rr_activeTests') || '[]');
let recentOfferedItems = JSON.parse(localStorage.getItem('rr_recentOfferedItems') || '[]');

function saveAll() {
  localStorage.setItem('rr_cash', cash);
  localStorage.setItem('rr_inventory', JSON.stringify(inventory));
  localStorage.setItem('rr_sign', currentSign);
  localStorage.setItem('rr_npcMemory', JSON.stringify(npcMemory));
  localStorage.setItem('rr_townMood', townMood);
  localStorage.setItem('rr_activeTests', JSON.stringify(activeTests));
  localStorage.setItem('rr_recentOfferedItems', JSON.stringify(recentOfferedItems));
}

function loadState(state) {
  cash = state.cash;
  inventory = state.inventory;
  currentNPC = null; chatHistory = [];
  currentSign = state.currentSign;
  npcMemory = state.npcMemory;
  townMood = state.townMood;
  activeTests = state.activeTests;
  recentOfferedItems = state.recentOfferedItems || [];
  saveAll();
}

function getCurrentState() {
  return { cash, inventory, currentSign, npcMemory, townMood, activeTests, recentOfferedItems };
}

function getSaveIndex() {
  const raw = localStorage.getItem('rr_saveIndex');
  return raw ? JSON.parse(raw) : [];
}
function setSaveIndex(index) { localStorage.setItem('rr_saveIndex', JSON.stringify(index)); }
function saveGame(name) {
  const index = getSaveIndex();
  const state = getCurrentState();
  localStorage.setItem('rr_save_' + name, JSON.stringify(state));
  if (!index.includes(name)) { index.push(name); setSaveIndex(index); }
}
function loadGame(name) {
  const raw = localStorage.getItem('rr_save_' + name);
  if (!raw) return false;
  try { const state = JSON.parse(raw); loadState(state); return true; }
  catch(e) { return false; }
}
function deleteSave(name) {
  localStorage.removeItem('rr_save_' + name);
  const index = getSaveIndex().filter(n => n !== name);
  setSaveIndex(index);
}

function showSaveOverlay() {
  saveNameInput.value = '';
  saveOverlay.classList.remove('hidden');
  saveNameInput.focus();
}
function hideSaveOverlay() { saveOverlay.classList.add('hidden'); cmdInput.focus(); }
function showLoadOverlay() {
  const index = getSaveIndex();
  loadList.innerHTML = '';
  if (index.length === 0) {
    loadList.innerHTML = '<p style="font-size:0.7em; color:#669966;">No saves found.</p>';
  } else {
    index.forEach(name => {
      const div = document.createElement('div');
      div.className = 'save-list-item';
      const span = document.createElement('span');
      span.textContent = name;
      span.style.cursor = 'pointer';
      span.addEventListener('click', () => {
        if (loadGame(name)) {
          loadOverlay.classList.add('hidden');
          outputEl.innerHTML = '';
          printInstant(`💾 Game loaded: "${name}".`);
          printInstant(`Cash: $${cash} | Items: ${inventory.length}`);
          cmdInput.focus();
        } else { printInstant(`❌ Error loading "${name}".`); }
      });
      div.appendChild(span);
      const delBtn = document.createElement('button');
      delBtn.className = 'save-delete-btn';
      delBtn.textContent = '✕';
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (confirm(`Delete save "${name}"?`)) { deleteSave(name); showLoadOverlay(); }
      });
      div.appendChild(delBtn);
      loadList.appendChild(div);
    });
  }
  loadOverlay.classList.remove('hidden');
}
function hideLoadOverlay() { loadOverlay.classList.add('hidden'); cmdInput.focus(); }

document.getElementById('btn-customer').addEventListener('click', () => { initAudio(); playClick(); cmdCustomer(); });
document.getElementById('btn-inventory').addEventListener('click', () => { initAudio(); playClick(); showVisualInventory(); });
document.getElementById('btn-ledger').addEventListener('click', () => { initAudio(); playClick(); cmdLedger(); });
document.getElementById('btn-radio').addEventListener('click', () => { initAudio(); playClick(); cmdRadio(); });
document.getElementById('btn-wait').addEventListener('click', () => { initAudio(); playClick(); cmdWait(); });
document.getElementById('btn-help').addEventListener('click', () => { initAudio(); playClick(); cmdHelp(); });
document.getElementById('btn-tutorial').addEventListener('click', () => { initAudio(); playClick(); cmdTutorial(); });
document.getElementById('btn-save').addEventListener('click', () => { initAudio(); playClick(); showSaveOverlay(); });
document.getElementById('btn-load').addEventListener('click', () => { initAudio(); playClick(); showLoadOverlay(); });

saveConfirmBtn.addEventListener('click', () => {
  const name = saveNameInput.value.trim();
  if (!name) return;
  saveGame(name);
  hideSaveOverlay();
  printInstant(`💾 Game saved as "${name}".`);
});
saveCancelBtn.addEventListener('click', hideSaveOverlay);
loadCancelBtn.addEventListener('click', hideLoadOverlay);
saveNameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveConfirmBtn.click(); });

function print(text, delay=15) {
  return new Promise(resolve => {
    let i = 0;
    function type() {
      if (i < text.length) {
        outputEl.innerHTML += text.charAt(i);
        outputEl.scrollTop = outputEl.scrollHeight;
        if (!currentNPC) playClick();
        i++;
        setTimeout(type, delay);
      } else {
        outputEl.innerHTML += '\n';
        outputEl.scrollTop = outputEl.scrollHeight;
        resolve();
      }
    }
    type();
  });
}
function printInstant(text) {
  outputEl.innerHTML += text + '\n';
  outputEl.scrollTop = outputEl.scrollHeight;
}

async function callMistralJSON(systemPrompt, userMessage) {
  if (!MISTRAL_KEY) { printInstant('*** NO API KEY. Type SETKEY.'); return null; }
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_KEY}` },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userMessage }
        ],
        temperature: 0.9,
        response_format: { type: 'json_object' }
      })
    });
    if (!res.ok) { printInstant(`*** API ERROR ${res.status}`); return null; }
    const data = await res.json();
    const content = data.choices[0]?.message?.content;
    if (!content) return null;
    try { return JSON.parse(content); } catch(e) { printInstant('*** JSON parse error.'); return null; }
  } catch(e) { printInstant(`*** NETWORK ERROR: ${e.message}`); return null; }
}

async function callMistralText(systemPrompt, userMessage) {
  if (!MISTRAL_KEY) { printInstant('*** NO API KEY.'); return null; }
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_KEY}` },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userMessage }
        ],
        temperature: 1.3
      })
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.choices[0]?.message?.content || null;
  } catch(e) { return null; }
}

const SYSTEM_SHOP = `You are the sentient ledger of RELICS & REGRET, a dusty antique shop in a small 1986 New England town. Items are often cursed, haunted, or carry dark secrets. You generate visitor and item details as JSON. Always only valid JSON, no markdown.`.trim();
const SYSTEM_CHAT = `You are a visitor in RELICS & REGRET, talking to the shopkeeper. You have a personality, desires, fears, and relationships with other townsfolk. Reply with JSON: {"dialogue":"your words", "updatedOfferedItem":optional new item object, "newDesire":optional, "alternativeOfferedItem":optional, "acceptedGift": optional true/false, "agreedAction":optional string describing what you agree to do}. If the shopkeeper gives you an item for free, set "acceptedGift": true. Keep personality consistent. No favour/order fields.`.trim();

function rememberNPC(name, event) {
  if (!npcMemory[name]) npcMemory[name] = [];
  npcMemory[name].push(event);
  if (npcMemory[name].length > 10) npcMemory[name].shift();
  saveAll();
}

function clearNPC() {
  currentNPC = null;
  chatHistory = [];
  wrapper.classList.remove('chat-mode');
}

async function cmdCustomer() {
  if (currentNPC) { printInstant('A customer is already here.'); return; }

  let returning = null;
  if (activeTests.length > 0 && Math.random() < 0.5) {
    returning = activeTests[0];
  }

  if (returning) {
    const idx = activeTests.indexOf(returning);
    activeTests.splice(idx, 1);
    saveAll();
    const prompt = `An NPC who previously made a dark deal with the shopkeeper returns. 
Details: Name: ${returning.npcName}. They were given "${returning.itemName}" in exchange for doing this: "${returning.action}". The consequence: "${returning.consequence}". 
They now want to sell the item back (maybe it has changed, or they have become unhinged). 
Create a JSON visitor entry: "visitor": {"name":"${returning.npcName}", "description": "how they look now, changed", "dialogue": "what they say upon entering, referencing the deed"}, 
"offeredItem": the item they now carry (use the item name, but update its description to reflect any changes, set a new year if needed, and set a value higher than before). 
"desiredItem": "maybe they want something new from the shop, or empty string",
"testResult": true (indicate this is a returning test NPC).
Only JSON, no other fields.`;
    const data = await callMistralJSON(SYSTEM_SHOP, prompt);
    if (!data || !data.visitor || !data.offeredItem) {
      printInstant('The door creaks, but nobody enters. A cold draft follows.');
      return;
    }
    data.visitor.name = returning.npcName;
    currentNPC = {
      visitor: data.visitor,
      offeredItem: data.offeredItem,
      desiredItem: data.desiredItem || '',
      alternativeItem: null,
      isTestReturn: true
    };
    chatHistory = [];
    printInstant(`\n${data.visitor.name} returns. ${data.visitor.description}`);
    printInstant(`"${data.visitor.dialogue}"`);
    printInstant(`\nITEM OFFERED: "${data.offeredItem.name}" (c. ${data.offeredItem.year})`);
    printInstant(`  "${data.offeredItem.description}"`);
    printInstant(`  ASKING PRICE: $${data.offeredItem.value}`);
    if (data.desiredItem) printInstant(`  They glance at your "${data.desiredItem}".`);
    wrapper.classList.add('chat-mode');
    rememberNPC(data.visitor.name, `returned after ${returning.action}, offered "${data.offeredItem.name}"`);
    return;
  }

  await print('The bell above the door chimes...');
  const chaosSeed = Math.floor(Math.random() * 10000);
  const recentNames = Object.keys(npcMemory).slice(-10).join(', ');
  const forbiddenItems = recentOfferedItems.slice(-10).join(', ');
  const invNames = inventory.map(i => i.name).join(', ') || 'nothing at all';
  const townSummary = `Town mood: ${townMood}. Recent dark deeds: ${activeTests.map(t => `${t.npcName} ${t.action}`).join('; ') || 'none'}.`;

  const prompt = `SEED: ${chaosSeed}.
DO NOT reuse any of these NPC names: ${recentNames || 'none'}.
DO NOT reuse any of these recently offered items: ${forbiddenItems || 'none'}.
You MUST invent a completely unique item that has never appeared before.
A new visitor enters RELICS & REGRET. Shop sign reads: "${currentSign}". Inventory: [${invNames}]. ${townSummary}
Generate JSON with:
- "visitor": { "name", "description", "dialogue" }
- "offeredItem": { "name", "year", "description", "value" (5-200) }
- "desiredItem": string or empty
- "alternativeOfferedItem": (optional) same structure as offeredItem.
No other fields. Only JSON.`;

  const data = await callMistralJSON(SYSTEM_SHOP, prompt);
  if (!data || !data.visitor || !data.offeredItem) {
    printInstant('...but the door swung open to empty air.');
    return;
  }

  if (data.offeredItem && data.offeredItem.name) {
    recentOfferedItems.push(data.offeredItem.name);
    if (recentOfferedItems.length > 15) recentOfferedItems.shift();
    saveAll();
  }

  const name = data.visitor.name;
  if (npcMemory[name]) {
    const history = npcMemory[name].slice(-3).join('; ');
    data.visitor.dialogue = `[Recognising you] ${data.visitor.dialogue} (They recall: ${history})`;
  }
  currentNPC = {
    visitor: data.visitor,
    offeredItem: data.offeredItem,
    desiredItem: data.desiredItem || '',
    alternativeItem: data.alternativeOfferedItem || null,
    isTestReturn: false
  };
  chatHistory = [];
  printInstant(`\n${name} enters. ${data.visitor.description}`);
  printInstant(`"${data.visitor.dialogue}"`);
  printInstant(`\nITEM OFFERED: "${data.offeredItem.name}" (c. ${data.offeredItem.year})`);
  printInstant(`  "${data.offeredItem.description}"`);
  printInstant(`  ASKING PRICE: $${data.offeredItem.value}`);
  if (data.desiredItem) printInstant(`  They glance at your "${data.desiredItem}".`);
  wrapper.classList.add('chat-mode');
}

function cmdBuy() {
  if (!currentNPC) { printInstant('No one is here.'); return; }
  const price = currentNPC.offeredItem.value;
  if (cash < price) { printInstant(`You need $${price}, but only have $${cash}.`); return; }
  cash -= price; saveAll();
  const newItem = {
    name: currentNPC.offeredItem.name,
    year: currentNPC.offeredItem.year,
    description: currentNPC.offeredItem.description,
    value: price,
    secret: '', knownSecret: false,
    isFake: false, trueValue: price
  };
  inventory.push(newItem); saveAll();
  printInstant(`You bought "${newItem.name}" for $${price}.`);
  rememberNPC(currentNPC.visitor.name, `sold "${newItem.name}"`);
  clearNPC();
}

function cmdTrade(itemName) {
  if (!currentNPC) { printInstant('No one to trade with.'); return; }
  if (!itemName) { printInstant('Usage: TRADE <item name>'); return; }
  const idx = inventory.findIndex(i => i.name.toLowerCase() === itemName.toLowerCase());
  if (idx === -1) { printInstant(`You don't own "${itemName}".`); return; }
  const given = inventory.splice(idx,1)[0]; saveAll();
  const received = {
    name: currentNPC.offeredItem.name,
    year: currentNPC.offeredItem.year,
    description: currentNPC.offeredItem.description,
    value: currentNPC.offeredItem.value,
    secret: '', knownSecret: false,
    isFake: false, trueValue: currentNPC.offeredItem.value
  };
  inventory.push(received); saveAll();
  printInstant(`You traded "${given.name}" for "${received.name}".`);
  rememberNPC(currentNPC.visitor.name, `traded "${given.name}" for "${received.name}"`);
  clearNPC();
}

function cmdDecline() {
  if (!currentNPC) { printInstant('Nobody here.'); return; }
  printInstant(`${currentNPC.visitor.name} leaves, disappointed.`);
  rememberNPC(currentNPC.visitor.name, 'was declined');
  clearNPC();
}

function cmdSell(itemName) {
  if (!currentNPC) { printInstant('No one is here to sell to.'); return; }
  if (!itemName) { printInstant('Usage: SELL <item name>'); return; }
  const idx = inventory.findIndex(i => i.name.toLowerCase() === itemName.toLowerCase());
  if (idx === -1) { printInstant(`You don't own "${itemName}".`); return; }
  const sold = inventory.splice(idx, 1)[0];
  cash += sold.value;
  saveAll();
  printInstant(`You sold "${sold.name}" to ${currentNPC.visitor.name} for $${sold.value}.`);
  rememberNPC(currentNPC.visitor.name, `bought "${sold.name}" for $${sold.value}`);
}

async function cmdTest(itemName, action) {
  if (!currentNPC) { printInstant('No one is here to test.'); return; }
  if (!itemName || !action) { printInstant('Usage: TEST <item> FOR <action description>'); return; }
  const idx = inventory.findIndex(i => i.name.toLowerCase() === itemName.toLowerCase());
  if (idx === -1) { printInstant(`You don't have "${itemName}" in your inventory.`); return; }
  const item = inventory[idx];
  const prompt = `You are ${currentNPC.visitor.name}, currently in RELICS & REGRET. The shopkeeper offers you "${item.name}" (${item.description}) in exchange for doing the following: "${action}". 
Would you accept? Even if you don't particularly want the item, consider the shopkeeper's reputation and your own dark desires.
Respond with JSON: {"accepted": true/false, "response": "your shocked or eager reply", "consequence": "briefly describe what happens after you perform the act (the town reaction, how you feel)"}. Only JSON.`;
  const data = await callMistralJSON(SYSTEM_CHAT, prompt);
  if (!data) return;
  printInstant(`\n${currentNPC.visitor.name}: "${data.response}"`);
  if (data.accepted) {
    const removed = inventory.splice(idx, 1)[0];
    saveAll();
    activeTests.push({
      npcName: currentNPC.visitor.name,
      action: action,
      itemName: item.name,
      consequence: data.consequence,
      done: false
    });
    saveAll();
    townMood = `disturbed after ${currentNPC.visitor.name} ${action}`;
    saveAll();
    printInstant(`\n${currentNPC.visitor.name} takes "${item.name}" and leaves to fulfil the bargain. The air grows heavy.`);
    rememberNPC(currentNPC.visitor.name, `tested: ${action}, received "${item.name}"`);
    clearNPC();
  } else {
    printInstant(`${currentNPC.visitor.name} refuses the deal. They seem shaken.`);
    rememberNPC(currentNPC.visitor.name, `refused test: ${action}`);
  }
}

async function cmdChat(message) {
  if (!currentNPC) { printInstant('No one to talk to.'); return; }
  if (!message) { printInstant('Usage: CHAT <message>'); return; }
  const context = {
    visitor: currentNPC.visitor,
    offeredItem: currentNPC.offeredItem,
    desiredItem: currentNPC.desiredItem,
    inventory: inventory.map(i => i.name).join(', '),
    debts: npcMemory[currentNPC.visitor.name] ? npcMemory[currentNPC.visitor.name].filter(e => e.startsWith('owes')) : []
  };
  const chatMessages = [
    { role: 'system', content: SYSTEM_CHAT + '\nContext: ' + JSON.stringify(context) },
    ...chatHistory,
    { role: 'user', content: message }
  ];
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_KEY}` },
      body: JSON.stringify({
        model: MODEL,
        messages: chatMessages,
        temperature: 1.3,
        response_format: { type: 'json_object' }
      })
    });
    const data = await res.json();
    const content = data.choices[0]?.message?.content;
    if (!content) return;
    const reply = JSON.parse(content);
    printInstant(`\n${currentNPC.visitor.name}: "${reply.dialogue}"`);
    if (reply.updatedOfferedItem) {
      currentNPC.offeredItem = reply.updatedOfferedItem;
      printInstant(`(Their offered item changed: ${reply.updatedOfferedItem.name}, $${reply.updatedOfferedItem.value})`);
    }
    if (reply.alternativeOfferedItem) {
      currentNPC.offeredItem = reply.alternativeOfferedItem;
      printInstant(`(They now offer a personal item: "${reply.alternativeOfferedItem.name}")`);
    }
    if (reply.newDesire) currentNPC.desiredItem = reply.newDesire;
    if (reply.acceptedGift) {
      rememberNPC(currentNPC.visitor.name, `owes a debt for gift`);
      printInstant(`(They are now indebted to you.)`);
    }
    if (reply.agreedAction) {
      // Flexible: they agreed to do something, we can note it in memory.
      rememberNPC(currentNPC.visitor.name, `agreed to: ${reply.agreedAction}`);
      printInstant(`❗ They agreed: ${reply.agreedAction}`);
    }
    chatHistory.push({ role: 'user', content: message });
    chatHistory.push({ role: 'assistant', content: reply.dialogue });
  } catch(e) { printInstant('*** Chat error.'); }
}

function cmdSign(newSign) {
  if (!newSign) { printInstant('Usage: SIGN <new sign text>'); return; }
  currentSign = newSign;
  saveAll();
  printInstant(`Shop sign now reads: "${currentSign}"`);
}

async function cmdRadio() {
  await print('You switch on the transistor radio...');
  const broadcast = await callMistralText(SYSTEM_SHOP, `Generate a short 1986 radio snippet: a news headline, weather, or a fragment of a song that fits the mood of RELICS & REGRET. One paragraph.`);
  if (broadcast) printInstant(`\n📻 RADIO: ${broadcast.trim()}`);
  else printInstant('Static. Nothing but static.');
}

function cmdShop() {
  printInstant(`\n💰 Cash: $${cash}`);
  if (inventory.length === 0) { printInstant('📦 INVENTORY: empty'); return; }
  printInstant('📦 INVENTORY:');
  inventory.forEach((i, idx) => {
    const status = i.knownSecret ? ' 👁' : '';
    const fake = i.isFake ? ' (FAKE)' : '';
    printInstant(`${idx+1}. ${i.name} (${i.year})${status}${fake} — ${i.description} [$${i.value}]`);
  });
  printInstant('── End of shelf ──');
}

function cmdLedger() {
  printInstant(`\n💰 Cash: $${cash}   📜 Items: ${inventory.length}   🪧 Sign: "${currentSign}"`);
  if (Object.keys(npcMemory).length > 0) {
    printInstant('🧠 Known NPCs & debts:');
    for (const [name, events] of Object.entries(npcMemory)) {
      const debts = events.filter(e => e.includes('owes') || e.includes('debt'));
      if (debts.length > 0) printInstant(`  - ${name}: ${debts.join(', ')}`);
    }
  }
  if (activeTests.length > 0) {
    printInstant('🔄 Pending tests (NPCs who may return):');
    activeTests.forEach(t => printInstant(`  - ${t.npcName}: ${t.action}`));
  }
}

async function cmdWait() {
  if (currentNPC) { printInstant('Close the shop? A customer is still here.'); return; }
  await print('You lock up. The town falls quiet...');
  if (activeTests.length > 0 && Math.random() < 0.3) {
    const returning = activeTests.shift();
    saveAll();
    printInstant(`In the dead of night, a figure hammers on the door. It's ${returning.npcName}, holding "${returning.itemName}". They want to sell it back.`);
    activeTests.unshift(returning);
    saveAll();
  }
  const events = [
    'A distant scream, then silence.',
    'A knock at the back door. When you open it, a small, wet cardboard box sits on the step. It contains a single, human tooth.',
    'The radio turns on by itself, whispering a weather report from 1943.',
  ];
  printInstant(events[Math.floor(Math.random()*events.length)]);
  printInstant('Morning comes. The shop is open again.');
}

// ── Visual binder ──
async function generateCardImage(item) {
  const prompt = `antique item, "${item.name}", ${item.description}, vintage, relic shop, dark moody lighting, 1980s photo`;
  const encoded = encodeURIComponent(prompt);
  return `https://image.pollinations.ai/prompt/${encoded}?width=220&height=180&nologo=true`;
}
async function loadCardImage(key, item, imgElement) {
  if (imageCache[key]) { imgElement.src = imageCache[key]; imgElement.classList.remove('card-placeholder'); return; }
  try {
    const url = await generateCardImage(item);
    imageCache[key] = url;
    saveImageCache();
    imgElement.src = url;
    imgElement.classList.remove('card-placeholder');
  } catch (err) { console.error('Image load error:', err); }
}
function showVisualInventory() {
  if (!inventory.length) { printInstant('Your shelves are bare.'); return; }
  const grouped = {};
  inventory.forEach(item => {
    const key = item.name;
    if (!grouped[key]) grouped[key] = { item: item, copies: [] };
    grouped[key].copies.push(item);
  });
  const uniqueItems = Object.values(grouped);
  binderGrid.innerHTML = '';
  uniqueItems.forEach(entry => {
    const item = entry.item;
    const count = entry.copies.length;
    const copiesText = count > 1 ? ` (${count}x)` : '';
    const slot = document.createElement('div'); slot.className = 'card-slot';
    const img = document.createElement('img'); img.className = 'card-img card-placeholder'; img.alt = item.name;
    loadCardImage(item.name, item, img);
    const info = document.createElement('div'); info.className = 'card-info';
    info.innerHTML = `<div class="card-name">${item.name}${copiesText}</div><div class="card-meta">c. ${item.year} • $${item.value}</div><div class="card-desc">${item.description}</div>`;
    slot.appendChild(img); slot.appendChild(info);
    binderGrid.appendChild(slot);
  });
  binderOverlay.classList.remove('hidden'); binderOverlay.style.display = 'flex';
}
function hideVisualBinder() { binderOverlay.classList.add('hidden'); binderOverlay.style.display = ''; cmdInput.focus(); }
binderCloseBtn.addEventListener('click', hideVisualBinder);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !binderOverlay.classList.contains('hidden')) hideVisualBinder(); });

// ── Input handler ──
cmdInput.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  initAudio();
  const raw = cmdInput.value.trim();
  cmdInput.value = '';
  if (!raw) return;
  const upperCmd = raw.toUpperCase();
  printInstant(`> ${raw}`);

  if (upperCmd.startsWith('SAVE ')) { const name = raw.slice(5).trim(); if (name) { saveGame(name); printInstant(`💾 Saved as "${name}".`); } else printInstant('Usage: SAVE <name>'); return; }
  if (upperCmd.startsWith('LOAD ')) { const name = raw.slice(5).trim(); if (name) { if (loadGame(name)) { printInstant(`💾 Loaded "${name}".`); outputEl.innerHTML = ''; printInstant(`Cash: $${cash} | Items: ${inventory.length}`); } else printInstant('Not found.'); } else printInstant('Usage: LOAD <name>'); return; }
  if (upperCmd === 'SAVES') { const idx = getSaveIndex(); printInstant(idx.length ? 'Saves: ' + idx.join(', ') : 'No saves.'); return; }

  if (upperCmd === 'CUSTOMER' || upperCmd === 'NEXT') { await cmdCustomer(); }
  else if (upperCmd === 'BUY') { cmdBuy(); }
  else if (upperCmd.startsWith('SELL ')) { cmdSell(raw.slice(5).trim()); }
  else if (upperCmd.startsWith('TRADE ')) { cmdTrade(raw.slice(6).trim()); }
  else if (upperCmd === 'DECLINE') { cmdDecline(); }
  else if (upperCmd.startsWith('CHAT ')) { await cmdChat(raw.slice(5).trim()); }
  else if (upperCmd.startsWith('TEST ')) {
    const testPart = raw.slice(5).trim();
    const forIndex = testPart.toUpperCase().indexOf(' FOR ');
    if (forIndex === -1) { printInstant('Usage: TEST <item> FOR <action description>'); }
    else {
      const itemName = testPart.substring(0, forIndex).trim();
      const action = testPart.substring(forIndex + 5).trim();
      if (!itemName || !action) { printInstant('Usage: TEST <item> FOR <action description>'); }
      else { await cmdTest(itemName, action); }
    }
  }
  else if (upperCmd.startsWith('SIGN ')) { cmdSign(raw.slice(5).trim()); }
  else if (upperCmd === 'RADIO') { await cmdRadio(); }
  else if (upperCmd === 'SHOP' || upperCmd === 'INVENTORY' || upperCmd === 'LIST') { cmdShop(); }
  else if (upperCmd === 'BINDER') { showVisualInventory(); }
  else if (upperCmd === 'LEDGER') { cmdLedger(); }
  else if (upperCmd === 'WAIT' || upperCmd === 'CLOSE') { await cmdWait(); }
  else if (upperCmd === 'CLEAR') { outputEl.innerHTML = ''; }
  else if (upperCmd === 'HELP') { cmdHelp(); }
  else if (upperCmd === 'TUTORIAL') { cmdTutorial(); }
  else if (upperCmd === 'MUTE') { soundEnabled = false; printInstant('Sound off.'); }
  else if (upperCmd === 'UNMUTE') { soundEnabled = true; printInstant('Sound on.'); }
  else if (upperCmd === 'SETKEY') {
    MISTRAL_KEY = ''; localStorage.removeItem('rr_api_key');
    keyOverlay.classList.remove('hidden');
    apiKeyInput.value = ''; apiKeyInput.focus();
    printInstant('API key cleared.');
  }
  else { printInstant('Unknown command. Type HELP.'); }
});
