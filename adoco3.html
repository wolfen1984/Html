<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>THE NOCTURNE THEATER · 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #040308;
            --screen-bg: #08060c;
            --panel-bg: #0a0810;
            --text: #c4bab0;
            --text-dim: #6e5a58;
            --text-bright: #e6d8c4;
            --accent: #8b1a2b;
            --accent-dim: #3e0f18;
            --border: #6b1522;
            --border-glow: 0 0 14px #7b1a2b55, 0 0 32px #3a0a1422;
            --danger: #7b1a2b;
            --danger-glow: 0 0 12px #7b1a2b44;
            --amber: #c4a44a;
            --amber-dim: #5c3d18;
            --gold: #c4a44a;
            --gold-dim: #4a3010;
            --green: #4a7a3a;
            --input-bg: #100e18;
            --button-bg: #14121c;
            --button-hover: #1c1828;
            --button-active: #18101c;
            --bevel-light: #282230;
            --bevel-dark: #040206;
            --font-display: 'Creepster', 'Nosifer', cursive;
            --font-title: 'Nosifer', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.06;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 30px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0f0a14 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #141114;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2a2028, 0 0 0 4px #0d0a10, 0 0 0 8px #060408, 0 8px 48px #000000dd, 0 0 60px #3a0a1422;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid red;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #0a060c;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #c4a44a;
            border-radius: 50%;
            box-shadow: 0 0 8px #c4a44a88, 0 0 18px #c4a44a33;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #c4a44a88, 0 0 18px #c4a44a33;
            }
            50% {
                box-shadow: 0 0 14px #c4a44abb, 0 0 28px #c4a44a55;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #3a2a28;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid red;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #0a0408;
            border-bottom: 3px solid #6b1522;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #1a0810;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid red;
            border-radius: 2px;
            padding: 10px 14px;
            background: #060208;
            position: relative;
            box-shadow: inset 0 0 24px #5c001111;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #8b1a2b;
            box-shadow: 0 0 12px #7b1a2b88;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #c4a44a44;
            box-shadow: 0 0 8px #c4a44a33;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: red;
            text-shadow: 0 0 16px #8b1a2b88, 0 2px 4px #000, 0 0 40px #5c101888;
            letter-spacing: 3px;
            font-family: var(--font-title);
            line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #7a5a4a;
            letter-spacing: 5px;
            margin-top: 3px;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 20px;
                letter-spacing: 1px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #2a0f18 #08060c;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #08060c;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #2a0f18;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #282230;
            border-top-color: #342c3c;
            border-left-color: #302834;
            border-right-color: #1c1824;
            border-bottom-color: #100e18;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #1c1824;
            border-left-color: #1c1824;
            border-bottom-color: #342c3c;
            border-right-color: #302834;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #100e18;
        }
        .btn.accent {
            background: #140a10;
            border-color: #4a1522;
            border-top-color: #6a1a2e;
            border-left-color: #5a1628;
            border-right-color: #2e0f18;
            border-bottom-color: #1a0810;
            color: #d4a898;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #7b1a2b22;
        }
        .btn.accent:active {
            border-top-color: #2e0f18;
            border-left-color: #2e0f18;
            border-bottom-color: #6a1a2e;
            border-right-color: #5a1628;
            box-shadow: 0 0px 0 #00000044, 0 0 16px #7b1a2b44;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .theater-mask {
            position: relative;
            background: #0a0812;
            border: 2px solid #6b152266;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.8);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #080610;
            border: 2px solid red;
            padding: 15px;
            border-radius: 3px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid red;
            box-shadow: 0 0 22px #7b1a2b66, 0 0 0 2px #1a0a10;
            object-fit: cover;
            flex-shrink: 0;
            background: #0a0610;
        }
        .speech-bubble {
            flex: 1;
            background: #100e1a;
            border: 2px solid red;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #d4bfa8;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #8b1a2b88 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #080610;
            border: 1px solid #2a0f18;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #12101a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6e5a58;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid red;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #d4b898;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 10px #7b1a2b44;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0c0a14;
            border: 1px solid red;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: red;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #d4b898;
        }
        .guide-desc {
            font-size: 15px;
            color: #6e5a58;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0c0a14;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #8b1a2b;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #c4bab0;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #14121c;
            border: 2px solid #8b1a2b66;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #c4bab0;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #8b1a2b;
            box-shadow: 0 0 14px #7b1a2b44;
        }
        .loading-text {
            color: var(--amber);
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #06040a;
            border-top: 1px solid #8b1a2b44;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #3a2a28;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #4a3830;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #1a1418;
            color: #4a3830;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #3a2a28;
            color: #6e5a58;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #d4bfa8;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">THE NOCTURNE THEATER · CRT-84</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE NOCTURNE<br>THEATER</div>
                    <div class="marquee-sub">⏤ 1984 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channel3Panel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🎭 THE NOCTURNE THEATER · NOW PLAYING</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('nocturne_theater_key') || '';

            const DEFAULT_STATE = {
                ch3Episodes: [],
                nocturnePerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;',
                '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>🎭 Vincent Crowe</h2>
        <p style="text-align:left;">
            <strong>Show:</strong> <em>The Nocturne Theater</em><br>
            <strong>Bio:</strong> A classically trained Shakespearean actor who never quite made it, Crowe found his true calling hosting horror anthologies from a crumbling 19th‑century playhouse. Rumour has it the theatre itself is alive – and hungry. Crowe's baritone and unnerving smile make even the stage curtains seem sinister.
        </p>
    `;

            // ── SOUND ENGINE (Web Audio API) ──
            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
let reverbNode = null;
let masterGain = null;

            function createKeepAlive(ctx) {
    if (keepAliveNode) return;
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = 30;          // sub‑audible
    const gain = ctx.createGain();
    gain.gain.value = 0.001;           // barely audible
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(0);
    keepAliveNode = { source: osc, gain };
    console.log('🔇 Keep‑alive tone started (very low volume).');
}

           async function getAudioContext() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        console.log(`🎛️ AudioContext created, initial state: ${audioCtx.state}`);
        createKeepAlive(audioCtx);
        initReverb(audioCtx);

        // Create master gain and route reverb through it
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.3;   // adjust this to taste – lower = quieter soundtrack
        reverbNode.connect(masterGain);
        masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') {
        await audioCtx.resume();
    }
    return audioCtx;
}

function initReverb(ctx) {
    if (!reverbNode) {
        const sampleRate = ctx.sampleRate;
        const length = sampleRate * 2;
        const impulse = ctx.createBuffer(2, length, sampleRate);
        const left = impulse.getChannelData(0);
        const right = impulse.getChannelData(1);
        for (let i = 0; i < length; i++) {
            const decay = Math.exp(-i / (sampleRate * 0.4));
            left[i] = (Math.random() * 2 - 1) * decay;
            right[i] = (Math.random() * 2 - 1) * decay;
        }
        reverbNode = ctx.createConvolver();
        reverbNode.buffer = impulse;
        reverbNode.normalize = true;
        // DO NOT connect to destination here – we'll do that via masterGain
    }
    return reverbNode;
}
function createSynthPad(ctx, frequency, duration, intensity = 0.6) {
    const now = ctx.currentTime;
    const gainNode = ctx.createGain();
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(intensity * 0.18, now + 0.5);
    gainNode.gain.setValueAtTime(intensity * 0.18, now + duration - 1);
    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.2);

    // 3 detuned sawtooth oscillators
    const osc1 = ctx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.value = frequency;

    const osc2 = ctx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.value = frequency * 1.003;

    const osc3 = ctx.createOscillator();
    osc3.type = 'sawtooth';
    osc3.frequency.value = frequency * 0.997;

    // Low‑pass filter with LFO for movement
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 800;
    filter.Q.value = 2;

    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.2 + Math.random() * 0.2;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 200 + Math.random() * 200;
    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);

    // Connect everything
    osc1.connect(filter);
    osc2.connect(filter);
    osc3.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(reverbNode || ctx.destination);

    // Start
    osc1.start(now);
    osc2.start(now);
    osc3.start(now);
    lfo.start(now);
    osc1.stop(now + duration + 0.5);
    osc2.stop(now + duration + 0.5);
    osc3.stop(now + duration + 0.5);
    lfo.stop(now + duration + 0.5);
}

function createSting(ctx, intensity = 0.5) {
    const now = ctx.currentTime;
    const gainNode = ctx.createGain();
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 0.03);
    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.5);

    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(500, now + 0.2);
    osc.frequency.exponentialRampToValueAtTime(100, now + 1.2);

    const osc2 = ctx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.setValueAtTime(300, now);
    osc2.frequency.exponentialRampToValueAtTime(1000, now + 0.2);
    osc2.frequency.exponentialRampToValueAtTime(200, now + 1.2);

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 800;
    filter.Q.value = 1;

    osc.connect(filter);
    osc2.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(reverbNode || ctx.destination);

    osc.start(now);
    osc2.start(now);
    osc.stop(now + 1.5);
    osc2.stop(now + 1.5);
}

function createClimax(ctx, intensity = 0.8) {
    const now = ctx.currentTime;
    const duration = 8 + Math.random() * 6; // 8‑14 seconds

    // Main pad – low, growing
    const gainNode = ctx.createGain();
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(intensity * 0.5, now + 2);
    gainNode.gain.setValueAtTime(intensity * 0.6, now + duration - 1);
    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

    // Two oscillators: one low, one high for the "strings"
    const osc1 = ctx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.setValueAtTime(110, now);
    osc1.frequency.exponentialRampToValueAtTime(220, now + duration * 0.6);

    const osc2 = ctx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.setValueAtTime(220, now);
    osc2.frequency.exponentialRampToValueAtTime(440, now + duration * 0.6);

    // Add a third oscillator with a different waveform for brass/choir
    const osc3 = ctx.createOscillator();
    osc3.type = 'square'; // gives a richer, brass-like tone
    osc3.frequency.setValueAtTime(110, now);
    osc3.frequency.exponentialRampToValueAtTime(330, now + duration * 0.8);

    // Low‑pass filter with LFO that opens up over time
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(300, now);
    filter.frequency.exponentialRampToValueAtTime(1200, now + duration);
    filter.Q.value = 2;

    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.15;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 200;
    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);

    // Connect everything
    osc1.connect(filter);
    osc2.connect(filter);
    osc3.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(reverbNode || ctx.destination);

    // Start
    osc1.start(now);
    osc2.start(now);
    osc3.start(now);
    lfo.start(now);
    osc1.stop(now + duration + 0.5);
    osc2.stop(now + duration + 0.5);
    osc3.stop(now + duration + 0.5);
    lfo.stop(now + duration + 0.5);
}
            async function playSound(type, intensity = 0.7) {
    try {
        const ctx = await getAudioContext();
        const now = ctx.currentTime;
        const gainValue = Math.min(1, intensity);

        switch (type) {
            case 'pad':
                // Deep drone – you can vary the frequency for different moods
                const freq = 110 + Math.random() * 40; // between 110–150 Hz
                createSynthPad(ctx, freq, 20 + Math.random() * 20, gainValue);
                break;

            case 'sting':
                createSting(ctx, gainValue);
                break;

            case 'heartbeat':
                playThump(ctx, now, 0.8 * gainValue);
                // second thump for "lub‑dub"
                setTimeout(() => playThump(ctx, now + 0.15, 0.8 * gainValue), 150);
                break;

            case 'thunder': {
                // keep your existing thunder – it's good
                const bufferSize = ctx.sampleRate * 0.5;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.3));
                }
                const source = ctx.createBufferSource();
                source.buffer = buffer;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(gainValue * 0.6, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 150;
                filter.Q.value = 0.5;
                source.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                source.start(now);
                source.stop(now + 0.8);
                break;
            }

            case 'bell': {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 80 + Math.random() * 30; // low, dark
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(gainValue * 0.4, now + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 3);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 3);
                break;
            }
case 'climax':
    createClimax(ctx, gainValue);
    break;
            default:
                console.warn(`Unknown sound type: ${type}`);
        }
    } catch (err) {
        console.error(`❌ Error in playSound("${type}"):`, err);
    }
}


           function playThump(ctx, time, intensity) {
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(60, time);
    osc.frequency.exponentialRampToValueAtTime(30, time + 0.1);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(intensity * 0.8, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(time);
    osc.stop(time + 0.1);
}

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
    try {
        stopAmbient();
        const ctx = await getAudioContext();
        const now = ctx.currentTime;
        const gainValue = Math.min(1, intensity);
        console.log(`🌫️ Starting ambient: ${type} for ${durationSeconds}s (ctx state: ${ctx.state})`);

        const gainNode = ctx.createGain();
        gainNode.gain.setValueAtTime(gainValue * 0.3, now);
        gainNode.connect(ctx.destination);
        ambientGain = gainNode;

        let source = null;
        if (type === 'ambient_drone' || type === 'wind_howl') {
            const bufferSize = ctx.sampleRate * 1;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.5;
            }
            const noise = ctx.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = type === 'ambient_drone' ? 200 : 600;
            filter.Q.value = 0.5;
            const osc = ctx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.value = type === 'ambient_drone' ? 80 : 120;
            const gainOsc = ctx.createGain();
            gainOsc.gain.value = 0.2 * gainValue;
            osc.connect(gainOsc);
            gainOsc.connect(filter);
            noise.connect(filter);
            filter.connect(gainNode);
            osc.start(now);
            noise.start(now);
            source = { osc, noise };
            ambientSource = source;
        } else {
            // fallback or static burst handled here? Actually static is handled in playSound, but we keep for completeness
            const osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = 100;
            osc.connect(gainNode);
            osc.start(now);
            source = { osc };
            ambientSource = source;
        }

        if (ambientTimeout) clearTimeout(ambientTimeout);
        ambientTimeout = setTimeout(() => {
            stopAmbient();
        }, durationSeconds * 1000);
    } catch (err) {
        console.error(`❌ Error in playAmbient("${type}"):`, err);
    }
}

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) {
                            ambientGain.disconnect();
                            ambientGain = null;
                        }
                    }, 300);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) {
                    clearTimeout(ambientTimeout);
                    ambientTimeout = null;
                }
            }

            function createCueChecker(cues, storyLength) {
                const sorted = [...cues].sort((a, b) => a.position - b.position);
                let cueIndex = 0;
                const triggered = new Set();
                let lastLog = 0;
                return function check(currentCharIndex) {
                    if (currentCharIndex - lastLog > 500) {
                        console.log(
                            `⏳ Cue checker at index ${currentCharIndex} (${Math.round(currentCharIndex / storyLength * 100)}%)`
                            );
                        lastLog = currentCharIndex;
                    }
                    while (cueIndex < sorted.length && sorted[cueIndex].position <= currentCharIndex) {
                        const cue = sorted[cueIndex];
                        if (!triggered.has(cueIndex)) {
                            triggered.add(cueIndex);
                            const isAmbient = ['ambient_drone', 'wind_howl', 'static'].includes(cue.type);
                            console.log(
                                `🔊 FIRING ${cue.type} at position ${cue.position} (current index ${currentCharIndex})`);
                            if (isAmbient) {
                                playAmbient(cue.type, cue.duration || 10, cue.intensity);
                            } else {
                                playSound(cue.type, cue.intensity);
                            }
                        }
                        cueIndex++;
                    }
                };
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 25000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`);
                    }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') {
                        throw new Error('Request timed out. Please try again – the AI may be under heavy load.');
                    }
                    throw e;
                } finally {
                    clearTimeout(timeout);
                }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s horror VHS, dark theatrical style, grainy film')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else {
                            clearInterval(timer);
                            resolve();
                        }
                    }, speed);
                });
            }

                const prompt =

                const resp = await mistralChat([

            async function generateSoundCueSheet(storyText) {
    const length = storyText.length;

  const system = `You are a sound designer for a horror radio drama. 
Given a short story, return a JSON array of exactly 50 sound events.
Use only these types: "pad", "sting", "heartbeat", "thunder", "bell", "climax".
- "pad" = long ambient drone (duration 20‑30s), place every 500‑800 characters.
- "sting" = short musical hit (duration ~1s), place at moments of tension.
- "heartbeat" = low thump, use sparingly.
- "thunder" = low rumble, use for dramatic moments.
- "bell" = ominous low bell, use for foreboding.
- "climax" = a swelling, powerful musical moment (duration 8‑14s). Place this **only near the end of the story** (last 20% of characters) to build the finale.
Return ONLY a raw JSON array. No markdown.`;

    const userPrompt = `Story text (${length} characters):\n${storyText}\n\nGenerate exactly 100 cues.`;

    // Use a high token limit (4000) so the AI can fit all 100 cues.
    const resp = await mistralChat([
        { role: 'system', content: system },
        { role: 'user', content: userPrompt }
    ], 4000, 30000);

    // Remove any accidental markdown fences
    const cleaned = resp.replace(/```json|```/g, '').trim();
    const aiCues = JSON.parse(cleaned);

    // Use ALL cues from the AI. If the AI returns fewer than 100, that's what you get.
    const cues = aiCues.map((cue, idx) => ({
        type: cue.type,
        position: Math.floor(length * (idx / Math.max(aiCues.length - 1, 1))),
        duration: cue.duration || (['ambient_drone', 'wind_howl', 'static_burst'].includes(cue.type) ? 10 : 0),
        intensity: cue.intensity || 0.7
    }));

    return cues;
}

            async function generateAndPerform() {
                await generateNewNocturneStory();
                if (!gameState.nocturnePerformance) throw new Error('Failed to generate story');
                await startNocturnePerformance();
            }

            function createCueChecker(cues, storyLength) {
                const sorted = [...cues].sort((a, b) => a.position - b.position);
                let cueIndex = 0;
                const triggered = new Set();
                let lastLog = 0;
                return function check(currentCharIndex) {
                    if (currentCharIndex - lastLog > 500) {
                        console.log(
                            `⏳ Cue checker at index ${currentCharIndex} (${Math.round(currentCharIndex / storyLength * 100)}%)`
                            );
                        lastLog = currentCharIndex;
                    }
                    while (cueIndex < sorted.length && sorted[cueIndex].position <= currentCharIndex) {
                        const cue = sorted[cueIndex];
                        if (!triggered.has(cueIndex)) {
                            triggered.add(cueIndex);
                            const isAmbient = ['ambient_drone', 'wind_howl', 'static'].includes(cue.type);
                            console.log(
                                `🔊 FIRING ${cue.type} at position ${cue.position} (current index ${currentCharIndex})`);
                            if (isAmbient) {
                                playAmbient(cue.type, cue.duration || 10, cue.intensity);
                            } else {
                                playSound(cue.type, cue.intensity);
                            }
                        }
                        cueIndex++;
                    }
                };
            }

            async function startNocturnePerformance() {
                speechSynthesis.cancel();
                if (window.ch3Timeout) clearTimeout(window.ch3Timeout);
                const storyData = gameState.nocturnePerformance;
                if (!storyData || !storyData.story) {
                    await generateNewNocturneStory();
                    return startNocturnePerformance();
                }
                if (storyData.soundCues) {
                    console.log('🎵 Sound cues loaded:', storyData.soundCues.length);
                    storyData.soundCues = storyData.soundCues.filter(cue =>
                        cue.type && cue.position !== undefined && cue.position >= 0
                    );
                    if (storyData.soundCues.length === 0) {
                        console.warn('⚠️ No valid sound cues after filtering');
                    }
                }
                const bubble = document.getElementById('ch3SpeechBubble');
                const dialogue = document.getElementById('ch3Dialogue');
                const imageEl = document.getElementById('ch3SegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('ch3GuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#8b1a2b';
                bubble.style.boxShadow = '0 0 30px #7b1a2b88';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('ch3BackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('ch3AddEpisodeBtn');
                if (oldAdd) oldAdd.remove();
                if (imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                } else if (imageEl) {
                    imageEl.style.display = 'none';
                }
                const intro =
                    `"Good evening… I am Vincent Crowe. Tonight, I invite you to draw closer to the footlights. Let the dark shadows embrace you. I present to you… '${storyData.title}'."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 35);
                await new Promise(r => setTimeout(r, 1500));
                const storyText = storyData.rawStoryText || storyData.story;
                let cueChecker = null;
                if (storyData.soundCues && storyData.soundCues.length > 0) {
                    cueChecker = createCueChecker(storyData.soundCues, storyText.length);
                }
                dialogue.textContent = '';
                speakTextMale(storyText);
                if (cueChecker) {
                    await typewriterEffect(dialogue, storyText, 80, (idx) => cueChecker(idx));
                } else {
                    await typewriterEffect(dialogue, storyText, 22);
                }
                await new Promise(r => setTimeout(r, 1200));
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#d4bfa8';
                dialogue.appendChild(closingLine);
                speakTextMale(closing);
                await typewriterEffect(closingLine, closing, 30);
                await new Promise(r => setTimeout(r, 1000));
                const curtainText = document.createElement('p');
                curtainText.textContent = '— Curtain falls —';
                curtainText.style.color = '#6e5a58';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();
                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Leave the Theater';
                leaveBtn.addEventListener('click', () => { leaveTheater(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'ch3AddEpisodeBtn';
                addBtn.textContent = '➕ Add Episode';
                addBtn.addEventListener('click', () => {
                    addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Added';
                });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.nocturnePerformance;
                if (!perf) return;
                gameState.ch3Episodes.push({
                    ...perf,
                    rawStoryText: perf.rawStoryText,
                    soundCues: perf.soundCues
                });
                saveState();
                setTimeout(() => leaveTheater(), 600);
            }

            function leaveTheater() {
                stopAmbient();
                renderChannel3();
            }

            function init() {
                loadState();
                renderChannel3();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('nocturne_theater_key', key);
                    }
                });
                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) {
                        showModal(HOST_BIO);
                    }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeModal();
                });
                if (!apiKey) {
                    setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                }
            }
            init();
        })();
    </script>
