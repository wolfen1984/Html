<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎵 MusicGen Test</title>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #2a2a2a;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            border: 2px solid #4a4a4a;
        }
        h1 {
            text-align: center;
            color: #b8a0ff;
            font-size: 26px;
            margin-top: 0;
            letter-spacing: 2px;
        }
        label {
            display: block;
            margin-top: 16px;
            font-size: 14px;
            color: #aaa;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #111;
            border: 2px solid #444;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: #b8a0ff;
            outline: none;
        }
        .key-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .key-row input {
            flex: 1;
        }
        .key-row button {
            padding: 10px 16px;
            background: #3a3a3a;
            border: 2px solid #555;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: 0.2s;
        }
        .key-row button:hover {
            background: #555;
        }
        .btn-generate {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: #6a4c9c;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            letter-spacing: 1px;
        }
        .btn-generate:hover:not(:disabled) {
            background: #8a6cbc;
            transform: scale(1.02);
        }
        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #status {
            margin-top: 16px;
            font-size: 14px;
            color: #b8a0ff;
            min-height: 1.6em;
        }
        audio {
            width: 100%;
            margin-top: 16px;
            border-radius: 8px;
            background: #111;
        }
        .hint {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
            border-top: 1px solid #333;
            padding-top: 16px;
        }
        .hint a {
            color: #b8a0ff;
            text-decoration: none;
        }
        .hint a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎵 MusicGen · Test</h1>

    <label for="apiKey">🔑 Hugging Face API Key</label>
    <div class="key-row">
        <input type="text" id="apiKey" placeholder="hf_xxxxxxxxxxxxxxxxxxxx" />
        <button id="saveKeyBtn">Save</button>
    </div>

    <label for="prompt">🎤 Describe the music you want</label>
    <input type="text" id="prompt" placeholder="e.g. 80s synthwave, dark, pulsating bass" value="creepy horror ambient music, slow, with a music box melody" />

    <button class="btn-generate" id="generateBtn">✨ Generate & Play</button>

    <div id="status">Ready.</div>

    <audio id="audioPlayer" controls style="display:none;"></audio>

    <div class="hint">
        💡 Get your free API key at <a href="https://huggingface.co/settings/tokens" target="_blank">huggingface.co/settings/tokens</a>.<br />
        ⏱️ Generation may take 10–30 seconds. Free tier has rate limits.
    </div>
</div>

<script>
    (function() {
        const apiKeyInput = document.getElementById('apiKey');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const promptInput = document.getElementById('prompt');
        const generateBtn = document.getElementById('generateBtn');
        const statusDiv = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');

        // Load saved API key from localStorage
        const savedKey = localStorage.getItem('musicgen_api_key');
        if (savedKey) {
            apiKeyInput.value = savedKey;
        }

        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('musicgen_api_key', key);
                statusDiv.textContent = '✅ API key saved!';
            } else {
                statusDiv.textContent = '⚠️ Please enter a valid key.';
            }
        });

        generateBtn.addEventListener('click', async () => {
            const key = apiKeyInput.value.trim();
            if (!key) {
                statusDiv.textContent = '⚠️ Please enter and save your Hugging Face API key first.';
                return;
            }

            const prompt = promptInput.value.trim();
            if (!prompt) {
                statusDiv.textContent = '⚠️ Please enter a music description.';
                return;
            }

            // Disable button and show loading
            generateBtn.disabled = true;
            generateBtn.textContent = '⏳ Generating...';
            statusDiv.textContent = '🎶 Sending request to MusicGen...';

            try {
                const response = await fetch(
                    'https://api-inference.huggingface.co/models/facebook/musicgen-small',
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${key}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            inputs: prompt,
                            parameters: {
                                // optional: you can add max_new_tokens, temperature, etc.
                            }
                        })
                    }
                );

                if (!response.ok) {
                    const errorText = await response.text();
                    let errorMsg = `HTTP ${response.status}`;
                    try {
                        const errJson = JSON.parse(errorText);
                        errorMsg = errJson.error || errorMsg;
                    } catch (_) { /* ignore */ }
                    throw new Error(errorMsg);
                }

                // The response is a binary audio file (WAV)
                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);

                // Show and play audio
                audioPlayer.src = audioUrl;
                audioPlayer.style.display = 'block';
                audioPlayer.load();
                audioPlayer.play();

                statusDiv.textContent = '✅ Generated! Click play if it doesn\'t start automatically.';
                generateBtn.textContent = '✨ Generate & Play';

            } catch (error) {
                console.error(error);
                statusDiv.textContent = `❌ Error: ${error.message}`;
                audioPlayer.style.display = 'none';
                audioPlayer.src = '';
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = '✨ Generate & Play';
            }
        });

        // Auto-save if key is pasted and they press Enter in the key field
        apiKeyInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                saveKeyBtn.click();
            }
        });

        // Also save key on blur if it's new
        apiKeyInput.addEventListener('blur', () => {
            const key = apiKeyInput.value.trim();
            if (key && key !== localStorage.getItem('musicgen_api_key')) {
                localStorage.setItem('musicgen_api_key', key);
                statusDiv.textContent = '✅ API key saved automatically.';
            }
        });
    })();
</script>

</body>
</html>
