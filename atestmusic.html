<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicGen Free API</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 2rem auto; text-align: center; }
    input[type="text"] { width: 100%; padding: 0.8rem; font-size: 1rem; margin: 1rem 0; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 0.8rem 1.5rem; font-size: 1rem; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #status { margin: 1rem 0; color: #555; }
    audio { margin-top: 1rem; width: 100%; }
  </style>
</head>
<body>
  <h2>🎵 Prompt to Music (MusicGen)</h2>

  <label for="apiUrl">Gradio API URL:</label>
  <input type="text" id="apiUrl" placeholder="https://xxxxx.gradio.live" 
         value="" style="margin-bottom:0.5rem;">

  <input type="text" id="prompt" placeholder="e.g., upbeat electronic dance with synth lead">
  <button id="generateBtn" onclick="generate()">Generate Music</button>

  <div id="status"></div>
  <audio id="player" controls style="display: none;"></audio>

  <script>
    async function generate() {
      const prompt = document.getElementById('prompt').value.trim();
      const apiBase = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
      if (!prompt) {
        alert('Please enter a prompt.');
        return;
      }
      if (!apiBase) {
        alert('Please enter the Gradio API URL (from Colab).');
        return;
      }

      const status = document.getElementById('status');
      const player = document.getElementById('player');
      const btn = document.getElementById('generateBtn');

      btn.disabled = true;
      status.textContent = 'Generating... (may take 20-30 seconds)';
      player.style.display = 'none';

      try {
        // Gradio /api/predict endpoint
        const response = await fetch(`${apiBase}/api/predict`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: [prompt] })
        });

        if (!response.ok) {
          throw new Error(`API error: ${response.status}`);
        }

        const result = await response.json();
        // result.data is an array, first element is a file path like "/file=..."
        const audioPath = result.data[0];
        if (!audioPath) {
          throw new Error('No audio returned.');
        }

        // Full URL to the audio file served by Gradio
        const audioUrl = `${apiBase}${audioPath}`;
        player.src = audioUrl;
        player.style.display = 'block';
        player.play();
        status.textContent = '✅ Done!';
      } catch (err) {
        status.textContent = `❌ Error: ${err.message}`;
        console.error(err);
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
