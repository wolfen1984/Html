<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STARLIGHT CINEMA · Drive-In Theater Manager · 1985</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Limelight&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080810;
            --panel-bg: #0d0d18;
            --text: #ffcc44;
            --text-dim: #886622;
            --text-bright: #ffe088;
            --accent: #ff8833;
            --accent-dim: #884411;
            --border: #ffcc44;
            --border-glow: 0 0 8px #ffcc4466;
            --danger: #ff4444;
            --danger-glow: 0 0 6px #ff444466;
            --input-bg: #15101a;
            --button-bg: #1a1810;
            --button-hover: #282418;
            --font-display: 'Limelight', 'VT323', cursive;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --font-body: 'VT323', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --marquee-gold: #ffbb33;
            --marquee-red: #ee3333;
            --star-color: #ffffff;
            --sky-top: #050515;
            --sky-bottom: #0a0a25;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #020208;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: var(--font-body);
            padding: 8px;
            background-image: radial-gradient(ellipse at center, #0a0a20 0%, #020208 100%);
            overflow-x: hidden;
        }
        .game-shell {
            max-width: 500px;
            width: 100%;
            height: 92vh;
            max-height: 850px;
            background: var(--sky-top);
            border-radius: 16px;
            border: 3px solid #2a2a18;
            box-shadow: 0 0 40px #ff883322, 0 0 100px #000000cc, 0 6px 28px #000000ee, inset 0 1px 0 #ffffff06,
                inset 0 0 80px #00000066;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            background: linear-gradient(180deg, #050518 0%, #08081c 30%, #0c0c20 60%, #0a0a18 100%);
        }
        .stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
            border-radius: 13px;
        }
        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0.5;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.35;
                transform: scale(1);
            }
            30% {
                opacity: 1;
                transform: scale(1.6);
            }
            60% {
                opacity: 0.45;
                transform: scale(0.8);
            }
            85% {
                opacity: 0.9;
                transform: scale(1.3);
            }
        }
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #ffffff;
            border-radius: 50%;
            animation: shoot var(--shoot-dur) linear forwards;
            animation-delay: var(--shoot-delay);
            opacity: 0;
            box-shadow: 0 0 6px 2px #ffffff88, 0 0 20px 6px #ffffff44;
        }
        .shooting-star::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: var(--tail-len);
            height: 1px;
            background: linear-gradient(90deg, #ffffffcc, #ffffff44, transparent);
            right: 100%;
            border-radius: 1px;
        }
        @keyframes shoot {
            0% {
                opacity: 0;
                transform: translate(0, 0) rotate(var(--angle));
            }
            8% {
                opacity: 1;
            }
            40% {
                opacity: 0.7;
                transform: translate(var(--dx), var(--dy)) rotate(var(--angle));
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) rotate(var(--angle));
            }
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, var(--scanline-opacity)) 0px,
                    rgba(0, 0, 0, var(--scanline-opacity)) 2px,
                    transparent 2px,
                    transparent 5px);
            border-radius: 13px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.5) 100%);
            border-radius: 13px;
            pointer-events: none;
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #111108;
            border-bottom: 4px solid #2a2a10;
            padding: 8px 14px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 4px 20px #00000088, inset 0 0 20px #00000044;
        }
        .marquee-inner {
            border: 2px solid #332200;
            border-radius: 6px;
            padding: 8px 12px;
            background: #0a0a04;
            position: relative;
            overflow: hidden;
        }
        .marquee-title {
            font-size: 18px;
            color: #ffbb33;
            text-shadow: 0 0 10px #ffbb3388, 0 0 20px #ff883344;
            position: relative;
            z-index: 1;
            letter-spacing: 3px;
        }
        .marquee-features {
            font-size: 12px;
            color: #eeaa55;
            font-family: var(--font-body);
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
            margin-top: 2px;
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .status-strip {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 10px;
            background: #0a0a10;
            border-bottom: 1px solid #1a1a10;
            z-index: 10;
            position: relative;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
            flex-wrap: wrap;
            gap: 4px;
        }
        .status-val {
            color: var(--text-bright);
            font-weight: bold;
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            position: relative;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #1a1a10 #0a0a10;
            display: flex;
            flex-direction: column;
        }
        .panel {
            display: none;
            flex-direction: column;
            padding: 12px;
            gap: 10px;
            flex: 1;
        }
        .panel.active {
            display: flex;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #332200;
            padding: 10px 18px;
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 17px;
            letter-spacing: 2px;
            text-align: center;
            transition: all 0.2s;
            text-shadow: 0 0 4px var(--text-dim);
            text-transform: uppercase;
        }
        .btn:hover {
            background: var(--button-hover);
            border-color: var(--text);
            box-shadow: var(--border-glow);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn.accent {
            background: #1a1000;
            border-color: #553300;
            color: #ffaa44;
        }
        .btn.accent:hover {
            background: #281800;
            border-color: #ff8833;
            box-shadow: 0 0 12px #ff883344;
        }
        .btn.danger {
            background: #1a0808;
            border-color: #441111;
            color: #ff6666;
        }
        .btn.danger:hover {
            background: #281010;
            border-color: #ff4444;
            box-shadow: 0 0 12px #ff444444;
        }
        .movie-card {
            background: #0d0d18;
            border: 2px solid #1a1a22;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .movie-card:hover {
            border-color: #ffbb33;
            box-shadow: 0 0 15px #ff883318;
            background: #111122;
        }
        .movie-card.selected {
            border-color: #ffbb33;
            box-shadow: 0 0 20px #ff883330;
            background: #141422;
        }
        .poster-thumb {
            width: 70px;
            height: 95px;
            border-radius: 6px;
            background: #0a0a14;
            border: 1px solid #1a1a22;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #ffcc44;
            background-size: cover;
            background-position: center;
        }
        .poster-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .movie-info {
            flex: 1;
            min-width: 0;
        }
        .movie-title {
            font-family: var(--font-display);
            font-size: 16px;
            color: #ffcc44;
            letter-spacing: 1px;
            text-shadow: 0 0 6px #ff883322;
        }
        .movie-meta {
            font-size: 11px;
            color: #886622;
            font-family: var(--font-mono);
        }
        .movie-synopsis {
            font-size: 13px;
            color: #bbaacc;
            font-family: var(--font-body);
            margin-top: 4px;
            line-height: 1.3;
        }
        .star-rating {
            color: #ffcc44;
            letter-spacing: 2px;
            font-size: 14px;
        }
        .event-alert {
            background: #1a0808;
            border: 2px solid #441111;
            border-radius: 8px;
            padding: 10px 14px;
            color: #ff8888;
            font-family: var(--font-body);
            font-size: 14px;
            animation: alertPulse 1.5s ease-in-out infinite;
        }
        @keyframes alertPulse {
            0%,
            100% {
                box-shadow: 0 0 8px #ff444422;
            }
            50% {
                box-shadow: 0 0 20px #ff444444;
            }
        }
        .customer-quote {
            background: #0d0d18;
            border-left: 3px solid #ffcc44;
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 0 6px 6px 0;
            font-style: italic;
            font-size: 13px;
            color: #ddccaa;
        }
        .customer-quote.negative {
            border-left-color: #ff4444;
            color: #ffaaaa;
        }
        .customer-quote.positive {
            border-left-color: #44cc66;
            color: #aaffbb;
        }
        .upgrade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid #1a1a22;
            gap: 8px;
        }
        .upgrade-name {
            font-family: var(--font-display);
            font-size: 14px;
            color: #ffcc44;
            letter-spacing: 1px;
        }
        .upgrade-desc {
            font-size: 11px;
            color: #886622;
            font-family: var(--font-mono);
        }
        .upgrade-level {
            font-size: 10px;
            color: #ff8833;
            font-family: var(--font-mono);
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #0d0d18;
            border-radius: 14px;
            width: 360px;
            max-width: 92vw;
            padding: 20px;
            text-align: center;
            border: 2px solid #2a2a18;
            box-shadow: 0 0 50px #ff883322;
            font-family: var(--font-body);
            color: #ffcc44;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h2 {
            font-family: var(--font-display);
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: #ffbb33;
        }
        .modal-content img {
            max-width: 100%;
            max-height: 50vh;
            border-radius: 8px;
            border: 2px solid #2a2a18;
            margin: 8px 0;
        }
        .modal-btn {
            background: #1a1810;
            border: 2px solid #332200;
            padding: 8px 16px;
            border-radius: 6px;
            margin: 4px;
            cursor: pointer;
            color: #ffcc44;
            font-family: var(--font-body);
            font-size: 15px;
            letter-spacing: 1px;
        }
        .modal-btn:hover {
            border-color: #ffbb33;
            box-shadow: 0 0 10px #ff883344;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #332200;
            border-top-color: #ffcc44;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .footer-strip {
            text-align: center;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #332200;
            padding: 5px 10px;
            background: #0a0a10;
            border-top: 1px solid #15150a;
            z-index: 10;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tabs-row {
            display: flex;
            background: #0a0a10;
            border-bottom: 2px solid #1a1a10;
            position: relative;
            z-index: 10;
            overflow-x: auto;
        }
        .tab-btn {
            flex: 1;
            min-width: 50px;
            text-align: center;
            padding: 8px 4px;
            font-family: var(--font-body);
            font-size: 14px;
            letter-spacing: 1px;
            color: #664400;
            cursor: pointer;
            transition: all 0.15s;
            border-bottom: 3px solid transparent;
            background: transparent;
            white-space: nowrap;
            position: relative;
        }
        .tab-btn:hover {
            color: #ffcc44;
            text-shadow: 0 0 6px #ff883344;
        }
        .tab-btn.active {
            color: #ffbb33;
            border-bottom: 3px solid #ffbb33;
            text-shadow: 0 0 10px #ffbb3388;
        }
        .car-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            padding: 8px;
            background: #0a0a14;
            border-radius: 8px;
            border: 1px solid #1a1a10;
            min-height: 60px;
            align-items: center;
        }
        .lot-car {
            display: inline-block;
            font-size: 18px;
            margin: 2px 4px;
            position: relative;
        }
        .lot-car .speaker-pole {
            display: inline-block;
            font-size: 8px;
            vertical-align: top;
            margin-left: -2px;
            color: #888;
        }
        .heat-indicator {
            color: #ff8844;
            font-weight: bold;
            font-size: 12px;
        }
        /* new */
        .hype-bar {
            width: 100%;
            height: 12px;
            background: #1a1a22;
            border-radius: 6px;
            overflow: hidden;
            margin: 4px 0;
        }
        .hype-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff8833, #ffcc44);
            transition: width 0.3s;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="game-shell" id="gameShell">
        <div class="stars-container" id="starsContainer"></div>
        <div class="crt-overlay"></div>

        <div class="marquee">
            <div class="marquee-inner">
                <div class="marquee-title" id="marqueeTitle">STARLIGHT CINEMA</div>
                <div class="marquee-features" id="marqueeFeatures">DOUBLE FEATURE TONIGHT</div>
            </div>
        </div>

        <div class="status-strip">
            <span>💰 <span class="status-val" id="statCash">$500</span></span>
            <span>⭐ <span class="status-val" id="statRep">50</span></span>
            <span>📅 Day <span class="status-val" id="statDay">1</span></span>
            <span>🚗 <span class="status-val" id="statCars">0</span></span>
        </div>

        <div class="tabs-row">
            <div class="tab-btn active" data-tab="overview">🎬 LOT</div>
            <div class="tab-btn" data-tab="movies">🎥 MOVIES</div>
            <div class="tab-btn" data-tab="franchises">🎞️ FRANCHISES</div>
            <div class="tab-btn" data-tab="upgrades">🔧 UPGRADES</div>
            <div class="tab-btn" data-tab="history">📋 HISTORY</div>
        </div>

        <div class="game-area">
            <div id="overviewPanel" class="panel active"></div>
            <div id="moviesPanel" class="panel"></div>
            <div id="franchisesPanel" class="panel"></div>
            <div id="upgradesPanel" class="panel"></div>
            <div id="historyPanel" class="panel"></div>
        </div>

        <div class="footer-strip">
            <span id="footerMsg">🌟 STARLIGHT CINEMA · 1985</span>
            <button id="resetApiBtn" style="background:none;border:none;color:#553300;font-size:8px;cursor:pointer;text-decoration:underline;">🔑 API KEY</button>
        </div>
    </div>

    <div id="genericModal" class="modal">
        <div class="modal-content" id="genericModalContent"></div>
    </div>

    <script>
        const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
        const MODEL = 'mistral-small-latest';
        let apiKey = localStorage.getItem('starlight_api_key') || '';

        const DEFAULT_STATE = {
            cash: 500,
            reputation: 50,
            day: 1,
            movieLibrary: [],
            tonightDoubleFeature: [],
            upgrades: {
                projector: 0,
                sound: 0,
                screen: 0,
                concessions: 0,
                fence: 0,
                bathrooms: 0,
                parking: 0
            },
            history: [],
            lastNightCars: 0,
            lastNightRevenue: 0,
            imageCooldownUntil: 0
        };

        let gameState = { ...DEFAULT_STATE };

        const upgradeDefs = [
            { id: 'projector', name: 'Projector', levels: ['Flickering 16mm', 'Refurbished 35mm', 'Crisp Xenon', 'Laser Vision'], costs: [0, 300, 800, 2000] },
            { id: 'sound', name: 'Sound System', levels: ['Tinny Pole Speakers', 'FM Transmitter', 'Stereo FM', 'Surround Sound'], costs: [0, 250, 700, 1800] },
            { id: 'screen', name: 'Screen', levels: ['Weathered White Wall', 'Repainted Panel', 'Premium Reflective', 'Giant Cinemascope'], costs: [0, 400, 1000, 2500] },
            { id: 'concessions', name: 'Concessions', levels: ['Stale Popcorn', 'Fresh Popcorn & Soda', 'Deluxe Snack Bar', 'Gourmet Diner'], costs: [0, 200, 600, 1500] },
            { id: 'fence', name: 'Perimeter Fence', levels: ['None', 'Chain-link', 'Wooden Privacy', 'Electric Security'], costs: [0, 150, 500, 1200] },
            { id: 'bathrooms', name: 'Restrooms', levels: ['Porta-Potties', 'Basic Cinderblock', 'Clean Tile', 'Luxury Lounge'], costs: [0, 350, 900, 2200] },
            { id: 'parking', name: 'Parking Lot', levels: ['Dirt & Gravel', 'Graded Gravel', 'Smooth Asphalt', 'Premium Marked'], costs: [0, 200, 550, 1400] },
        ];

        function saveState() {
            try { localStorage.setItem('starlight_state_v3', JSON.stringify(gameState)); } catch (e) {}
        }

        function loadState() {
            try {
                const saved = localStorage.getItem('starlight_state_v3');
                if (saved) {
                    const loaded = JSON.parse(saved);
                    gameState = { ...DEFAULT_STATE, ...loaded };
                    gameState.movieLibrary = gameState.movieLibrary.map(m => ({
                        sequelOf: null,
                        seriesName: null,
                        seriesOrder: 1,
                        totalScreenings: 0,
                        lastScreenedDay: null,
                        peakAttendance: 0,
                        isHot: false,
                        ...m
                    }));
                }
            } catch (e) {}
        }

        const esc = str => str ? str.replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[m]) : '';

        function setFooter(msg) {
            document.getElementById('footerMsg').textContent = msg;
        }

        function flashFooter(msg) {
            setFooter(msg);
            setTimeout(() => setFooter('🌟 STARLIGHT CINEMA · 1985'), 4000);
        }

        function modal(html) {
            document.getElementById('genericModalContent').innerHTML = html;
            document.getElementById('genericModal').style.display = 'flex';
        }
        window._closeModal = () => {
            document.getElementById('genericModal').style.display = 'none';
        };
        document.getElementById('genericModal').addEventListener('click', e => {
            if (e.target === e.currentTarget) window._closeModal();
        });

        async function mistralChat(messages, maxTok = 500) {
            if (!apiKey) throw new Error('API key missing');
            const res = await fetch(MISTRAL_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                body: JSON.stringify({ model: MODEL, messages, temperature: 0.9, max_tokens: maxTok })
            });
            if (!res.ok) throw new Error('API ' + res.status);
            const data = await res.json();
            return data.choices[0].message.content.trim();
        }

        async function generateImage(prompt) {
            const now = Date.now();
            if (now < gameState.imageCooldownUntil) {
                const wait = gameState.imageCooldownUntil - now;
                await new Promise(r => setTimeout(r, wait + 500));
            }
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s B-movie poster, retro drive-in style')}?width=512&height=640&seed=${Date.now()}`;
            const img = new Image();
            const result = await new Promise(resolve => {
                let done = false;
                const finish = (val) => { if (!done) { done = true; clearTimeout(timer); resolve(val); } };
                img.onload = () => finish(url);
                img.onerror = () => finish(null);
                img.src = url;
                const timer = setTimeout(() => finish(null), 20000);
            });
            gameState.imageCooldownUntil = Date.now() + 30000;
            saveState();
            return result;
        }

        async function generateMovie() {
            const prompt = `Generate a hilarious 80s-style B-movie concept as valid JSON only (no markdown). Fields: "title" (creative retro title, max 35 chars), "genre" (e.g. Sci-Fi Horror, Action Comedy), "tagline" (dramatic 1-liner), "synopsis" (2-3 sentences, over-the-top and funny), "quality" (integer 1-5), "audienceAppeal" (low/medium/high). Output only valid JSON.`;
            const response = await mistralChat([{ role: 'user', content: prompt }], 1200);
            const json = response.replace(/```json|```/g, '').trim();
            return JSON.parse(json);
        }

        async function generateCustomerReactions(movies, attendance, reputation) {
            const titles = movies.map(m => m.title).join(' and ');
            const avgQ = Math.round(movies.reduce((a, m) => a + (m.quality || 3), 0) / movies.length);
            const prompt = `Generate 3-5 customer reactions (JSON array of strings) from people who just watched a double feature of "${titles}" at a drive-in. Average movie quality: ${avgQ}/5. Attendance: ${attendance} cars. Reputation: ${reputation}/100. Mix positive and negative. Output only JSON array, no markdown.`;
            const response = await mistralChat([{ role: 'user', content: prompt }], 500);
            return JSON.parse(response.replace(/```json|```/g, '').trim());
        }

        async function generateEvent() {
            const prompt = `Generate a random event at a 1980s drive-in theater as valid JSON. Fields: "type" (vandal, weather, equipment, customer, surprise), "title" (short dramatic title), "description" (2 sentences), "cashImpact" (integer, negative for cost, positive for windfall), "repImpact" (integer -10 to +10). Output only JSON, no markdown.`;
            const response = await mistralChat([{ role: 'user', content: prompt }], 500);
            return JSON.parse(response.replace(/```json|```/g, '').trim());
        }

        function addMovieToLibrary(movie) {
            if (movie.sequelOf === undefined) movie.sequelOf = null;
            if (movie.seriesName === undefined) movie.seriesName = null;
            if (movie.seriesOrder === undefined) movie.seriesOrder = 1;
            if (movie.totalScreenings === undefined) movie.totalScreenings = 0;
            if (movie.lastScreenedDay === undefined) movie.lastScreenedDay = null;
            if (movie.peakAttendance === undefined) movie.peakAttendance = 0;
            if (movie.isHot === undefined) movie.isHot = false;
            movie.id = 'm_' + Date.now() + '_' + Math.random().toString(36);
            gameState.movieLibrary.push(movie);
            saveState();
        }

        function removeMovieFromLibrary(id) {
            gameState.movieLibrary = gameState.movieLibrary.filter(m => m.id !== id);
            gameState.tonightDoubleFeature = gameState.tonightDoubleFeature.filter(m => m.id !== id);
            saveState();
        }

        function selectForTonight(id) {
            const movie = gameState.movieLibrary.find(m => m.id === id);
            if (!movie) return;
            if (gameState.tonightDoubleFeature.some(m => m.id === id)) {
                gameState.tonightDoubleFeature = gameState.tonightDoubleFeature.filter(m => m.id !== id);
            } else {
                if (gameState.tonightDoubleFeature.length >= 2) {
                    gameState.tonightDoubleFeature.shift();
                }
                gameState.tonightDoubleFeature.push(movie);
            }
            saveState();
            refreshAll();
        }

        function calculateAttendance(includeRandom = true) {
            if (gameState.tonightDoubleFeature.length !== 2) return 0;
            let base = 15 + gameState.reputation / 3;
            const totalUpgrades = Object.values(gameState.upgrades).reduce((a, b) => a + b, 0);
            base += totalUpgrades * 4;
            const avgQ = (gameState.tonightDoubleFeature[0].quality + gameState.tonightDoubleFeature[1].quality) / 2;
            base += (avgQ - 3) * 8;
            if (includeRandom) {
                base += Math.floor(Math.random() * 12) - 6;
            }
            if (gameState.upgrades.fence >= 2) base += 3;
            if (gameState.upgrades.fence >= 3) base += 5;
            return Math.max(3, Math.round(base));
        }

        function calculateRevenue(cars) {
            const ticketPrice = 3.5 + gameState.upgrades.screen * 1.5 + gameState.upgrades.sound * 1;
            const concessionPerCar = 2 + gameState.upgrades.concessions * 3;
            return Math.round(cars * (ticketPrice * 1.8 + concessionPerCar));
        }

        // --- Sequel Rush & Hype ---
        function getSequelMultiplier(movie, currentDay, applyRush = false) {
            if (!movie.sequelOf) return 1.0;
            const prequel = gameState.movieLibrary.find(p => p.id === movie.sequelOf);
            if (!prequel || !prequel.isHot) {
                if (movie.quality < 2) return 0.7;
                return 1.0;
            }
            let mult = Math.min(2.0, 1.2 + (prequel.peakAttendance / 50));
            if (applyRush && currentDay && prequel.lastScreenedDay && (currentDay - prequel.lastScreenedDay) <= 2) {
                if (Math.random() < 0.4) mult = Math.max(0.7, mult - 0.3);
            }
            return mult;
        }

        function decayMovieHeat() {
            gameState.movieLibrary.forEach(m => {
                if (!m.lastScreenedDay) return;
                if (gameState.day - m.lastScreenedDay > 4) {
                    m.isHot = false;
                }
                if (m.peakAttendance > 0 && (gameState.day - m.lastScreenedDay) > 2) {
                    m.peakAttendance = Math.max(0, m.peakAttendance - 1);
                }
            });
        }

        // --- Franchise System ---
        function getSeriesData() {
            const seriesMap = {};
            gameState.movieLibrary.forEach(m => {
                const name = m.seriesName || m.title;
                if (!seriesMap[name]) seriesMap[name] = { movies: [], totalScreenings: 0, peakAttendance: 0, avgQuality: 0 };
                seriesMap[name].movies.push(m);
                seriesMap[name].totalScreenings += m.totalScreenings;
                if (m.peakAttendance > seriesMap[name].peakAttendance) seriesMap[name].peakAttendance = m.peakAttendance;
            });
            Object.keys(seriesMap).forEach(name => {
                const ms = seriesMap[name].movies;
                seriesMap[name].avgQuality = Math.round(ms.reduce((a, m) => a + m.quality, 0) / ms.length);
            });
            return seriesMap;
        }

        function calcFranchiseValue(series) {
            let val = series.totalScreenings * 25 + series.peakAttendance * 50 + series.avgQuality * 80;
            return Math.max(100, val);
        }

        function sellFranchise(seriesName) {
            const movies = gameState.movieLibrary.filter(m => (m.seriesName || m.title) === seriesName);
            if (!movies.length) return;
            const value = calcFranchiseValue(getSeriesData()[seriesName]);
            gameState.cash += value;
            gameState.movieLibrary = gameState.movieLibrary.filter(m => (m.seriesName || m.title) !== seriesName);
            gameState.tonightDoubleFeature = gameState.tonightDoubleFeature.filter(m => (m.seriesName || m.title) !== seriesName);
            saveState();
            refreshAll();
            flashFooter(`💸 Sold "${seriesName}" franchise for $${value}!`);
        }

        async function advanceNight() {
            if (gameState.tonightDoubleFeature.length < 2) {
                modal('<h2>🎬 Need Double Feature</h2><p>Select two movies from your library first.</p><button class="modal-btn" onclick="window._closeModal()">OK</button>');
                return;
            }

            decayMovieHeat();

            const movies = [...gameState.tonightDoubleFeature];
            const cars = calculateAttendance(true);
            let revenue = calculateRevenue(cars);

            let bonusLog = [];
            movies.forEach(m => {
                const multiplier = getSequelMultiplier(m, gameState.day, true);
                if (multiplier !== 1.0) {
                    const baseRevForMovie = calculateRevenue(cars) / 2;
                    const diff = Math.round(baseRevForMovie * (multiplier - 1));
                    revenue = Math.round(revenue + diff);
                    if (multiplier > 1.0) {
                        bonusLog.push(`📈 Sequel hype for "${m.title}" boosted revenue! (+$${diff})`);
                    } else {
                        bonusLog.push(`📉 "${m.title}" flopped as a sequel. (-$${Math.abs(diff)})`);
                    }
                }
            });

            gameState.cash += revenue;
            gameState.lastNightCars = cars;
            gameState.lastNightRevenue = revenue;

            movies.forEach(m => {
                const libMovie = gameState.movieLibrary.find(lib => lib.id === m.id);
                if (libMovie) {
                    libMovie.totalScreenings += 1;
                    libMovie.lastScreenedDay = gameState.day;
                    if (cars > libMovie.peakAttendance) libMovie.peakAttendance = cars;
                    libMovie.isHot = libMovie.peakAttendance >= 20 && (gameState.day - libMovie.lastScreenedDay) <= 2;
                }
            });

            let reactions;
            try {
                reactions = await generateCustomerReactions(movies, cars, gameState.reputation);
            } catch (e) {
                reactions = ["The crowd was speechless... literally, the sound cut out."];
            }

            const avgQ = movies.reduce((a, m) => a + m.quality, 0) / 2;
            const repChange = Math.round((avgQ - 3) * 4 + (cars > 25 ? 3 : cars > 15 ? 1 : -2));
            gameState.reputation = Math.max(0, Math.min(100, gameState.reputation + repChange));

            let event = null;
            if (Math.random() < 0.4) {
                try {
                    event = await generateEvent();
                } catch (e) {
                    event = { type: 'weather', title: 'Clear Skies', description: 'Nothing unusual happened.', cashImpact: 0, repImpact: 0 };
                }
                gameState.cash += event.cashImpact || 0;
                gameState.reputation = Math.max(0, Math.min(100, gameState.reputation + (event.repImpact || 0)));
                gameState.cash = Math.max(0, gameState.cash);
            }

            gameState.history.unshift({
                day: gameState.day,
                movies: movies.map(m => ({ title: m.title, quality: m.quality })),
                cars,
                revenue,
                repChange,
                event,
                reactions,
                bonusLog
            });
            if (gameState.history.length > 30) gameState.history.length = 30;

            gameState.day++;
            gameState.tonightDoubleFeature = [];
            saveState();

            let eventHTML = '';
            if (event && event.type !== 'weather') {
                eventHTML = `
                <div class="event-alert" style="margin:8px 0;">
                    <strong>⚠️ ${esc(event.title)}</strong><br>
                    ${esc(event.description)}<br>
                    <small>💰 ${event.cashImpact>=0?'+':''}${event.cashImpact} | ⭐ ${event.repImpact>=0?'+':''}${event.repImpact} rep</small>
                </div>`;
            }

            const bonusHTML = bonusLog.length ? bonusLog.map(b => `<div style="color:#ffaa44;font-size:12px;">${b}</div>`).join('') : '';
            const reactionHTML = reactions.map(r => {
                const cls = r.toLowerCase().includes('bad') || r.toLowerCase().includes('terrible') || r.toLowerCase().includes('worst') || r.toLowerCase().includes('boring') ? 'negative' : 'positive';
                return `<div class="customer-quote ${cls}">💬 "${esc(r)}"</div>`;
            }).join('');

            modal(`
                <h2>🌙 Night ${gameState.day - 1} Results</h2>
                <p>🚗 <strong>${cars} cars</strong> showed up</p>
                <p>💰 Revenue: <strong>$${revenue}</strong></p>
                <p>⭐ Reputation: <strong>${repChange>=0?'+':''}${repChange}</strong> (now ${gameState.reputation})</p>
                ${eventHTML}
                ${bonusHTML}
                <div style="text-align:left;max-height:180px;overflow-y:auto;margin:8px 0;">${reactionHTML}</div>
                <button class="modal-btn" onclick="window._closeModal()">Continue to Day ${gameState.day}</button>
            `);
            refreshAll();
            setFooter('☀️ Day ' + gameState.day + ' · Choose your double feature!');
        }

        function canCommissionSequel(movie) {
            if (movie.totalScreenings < 1) return false;
            if (gameState.cash < commissionCost(movie)) return false;
            if (gameState.movieLibrary.some(m => m.sequelOf === movie.id)) return false;
            return true;
        }

        function commissionCost(movie) {
            return 200 + movie.quality * 60;
        }

        async function commissionSequel(parentId) {
            const parent = gameState.movieLibrary.find(m => m.id === parentId);
            if (!parent || !canCommissionSequel(parent)) return;

            gameState.cash -= commissionCost(parent);
            saveState();

            const seriesName = parent.seriesName || parent.title.replace(/\s+\d+$/, '').trim();
            const nextOrder = (parent.seriesOrder || 1) + 1;
            const subtitleHint = nextOrder === 2 ? 'Part II, the Sequel, Returns, Revenge, etc.' : 'Part ' + nextOrder + ', the Final Chapter, etc.';

            const prompt = `Create a sequel to the 80s B-movie "${parent.title}" (genre: ${parent.genre}). The original synopsis: "${parent.synopsis}". Generate a new movie JSON with fields:
- "title": a creative sequel title (max 35 chars), like "${seriesName}: [Subtitle]"
- "genre": same or similar genre
- "tagline": dramatic 1-liner
- "synopsis": 2-3 sentences, continuing the story
- "quality": integer 1-5, but must be either 1 more, equal, or 1 less than the original's quality (${parent.quality})
- "audienceAppeal": low/medium/high
Output only valid JSON.`;

            try {
                const response = await mistralChat([{ role: 'user', content: prompt }], 1200);
                const sequelData = JSON.parse(response.replace(/```json|```/g, '').trim());
                const sequelMovie = {
                    ...sequelData,
                    id: 'm_' + Date.now(),
                    posterUrl: null,
                    sequelOf: parent.id,
                    seriesName: seriesName,
                    seriesOrder: nextOrder,
                    totalScreenings: 0,
                    lastScreenedDay: null,
                    peakAttendance: 0,
                    isHot: false
                };
                addMovieToLibrary(sequelMovie);
                refreshAll();
                setFooter('🎬 Commissioned sequel: ' + sequelMovie.title + ' (poster loading...)');
                generateImage(`Sequel poster for "${sequelMovie.title}", ${sequelMovie.genre}`).then(url => {
                    const libMovie = gameState.movieLibrary.find(m => m.id === sequelMovie.id);
                    if (libMovie) { libMovie.posterUrl = url; saveState(); refreshAll(); }
                });
            } catch (e) {
                gameState.cash += Math.floor(commissionCost(parent) * 0.5);
                saveState();
                modal('<h2>❌ Sequel Failed</h2><p>The studio pulled out. You were refunded half the fee.</p><button class="modal-btn" onclick="window._closeModal()">OK</button>');
            }
        }

                    <div>
                        <div class="upgrade-name">${def.name}</div>
                        <div class="upgrade-desc">${def.levels[level]}</div>
                        <div class="upgrade-level">Level ${level + 1}/${def.levels.length}</div>
                    </div>
                    <button class="btn ${cost ? 'accent' : ''}" data-upgrade="${def.id}" ${!cost || gameState.cash < cost ? 'disabled' : ''}>
                        ${cost ? '💲' + cost : 'MAXED'}
                    </button>
                </div>`;
            });
            html += '<p style="color:#886622;text-align:center;font-size:11px;">Higher upgrades attract more cars & boost revenue</p>';
            panel.innerHTML = html;
            panel.querySelectorAll('[data-upgrade]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.upgrade;
                    const def = upgradeDefs.find(u => u.id === id);
                    const cost = def.costs[gameState.upgrades[id] + 1];
                    if (gameState.cash >= cost) {
                        gameState.cash -= cost;
                        gameState.upgrades[id]++;
                        saveState();
                        refreshAll();
                        flashFooter('🔧 Upgraded ' + def.name);
                    } else {
                        modal('<h2>💸 Not Enough Cash</h2><button class="modal-btn" onclick="window._closeModal()">OK</button>');
                    }
                });
            });
        }

        function renderHistory() {
            const panel = document.getElementById('historyPanel');
            if (gameState.history.length === 0) {
                panel.innerHTML = '<p style="color:#442200;text-align:center;padding:40px;">No show history yet. Open the gates!</p>';
                return;
            }
            panel.innerHTML = gameState.history.slice(0, 15).map(h => `
                <div style="background:#0d0d18;border:1px solid #1a1a22;border-radius:8px;padding:10px;margin-bottom:6px;">
                    <strong style="color:#ffbb33;">Night ${h.day}</strong> · 🚗${h.cars} · 💰$${h.revenue} · ⭐${h.repChange>=0?'+':''}${h.repChange}
                    <div style="font-size:11px;color:#886622;">${h.movies.map(m => esc(m.title) + ' (' + m.quality + '★)').join(' + ')}</div>
                    ${h.event ? `<div style="font-size:10px;color:#ff8844;">⚠️ ${esc(h.event.title)}</div>` : ''}
                    ${h.bonusLog ? h.bonusLog.map(b => `<div style="font-size:10px;color:#ffaa44;">${b}</div>`).join('') : ''}
                    ${h.reactions ? h.reactions.slice(0, 2).map(r => `<div style="font-size:10px;color:#aa9988;">"${esc(r)}"</div>`).join('') : ''}
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('statCash').textContent = '$' + gameState.cash;
            document.getElementById('statRep').textContent = gameState.reputation;
            document.getElementById('statDay').textContent = gameState.day;
            document.getElementById('statCars').textContent = gameState.lastNightCars || '0';
            const hasTwo = gameState.tonightDoubleFeature.length === 2;
            document.getElementById('marqueeTitle').textContent = hasTwo ? gameState.tonightDoubleFeature.map(m => m.title).join(' · ') : 'STARLIGHT CINEMA';
            document.getElementById('marqueeFeatures').textContent = hasTwo ? 'DOUBLE FEATURE TONIGHT!' : 'NOW SHOWING SOON';
        }

        function refreshAll() {
            updateStats();
            const activeTab = document.querySelector('.tab-btn.active')?.dataset?.tab || 'overview';
            switchTab(activeTab);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
            document.getElementById(tab + 'Panel').classList.add('active');
            if (tab === 'overview') renderOverview();
            else if (tab === 'movies') renderMovies();
            else if (tab === 'franchises') renderFranchises();
            else if (tab === 'upgrades') renderUpgrades();
            else if (tab === 'history') renderHistory();
        }

        function createStars() {
            const container = document.getElementById('starsContainer');
            container.innerHTML = '';
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 65 + '%';
                const size = Math.random() * 2.5 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', Math.random() * 4 + 's');
                container.appendChild(star);
            }
        }

        function spawnShootingStar() {
            const container = document.getElementById('starsContainer');
            const star = document.createElement('div');
            star.className = 'shooting-star';
            const startX = Math.random() * 80;
            const startY = Math.random() * 40;
            star.style.left = startX + '%';
            star.style.top = startY + '%';
            const angle = -25 + Math.random() * -35;
            const dist = 120 + Math.random() * 200;
            const dx = Math.cos((angle * Math.PI) / 180) * dist;
            const dy = Math.sin((angle * Math.PI) / 180) * dist;
            star.style.setProperty('--dx', dx + 'px');
            star.style.setProperty('--dy', dy + 'px');
            star.style.setProperty('--angle', angle + 'deg');
            star.style.setProperty('--tail-len', (40 + Math.random() * 60) + 'px');
            star.style.setProperty('--shoot-dur', (0.6 + Math.random() * 1.2) + 's');
            star.style.setProperty('--shoot-delay', '0s');
            container.appendChild(star);
            setTimeout(() => { if (star.parentNode) star.remove(); }, 2500);
        }

        function startShootingStars() {
            const schedule = () => {
                const delay = 4000 + Math.random() * 15000;
                setTimeout(() => {
                    spawnShootingStar();
                    schedule();
                }, delay);
            };
            schedule();
            setTimeout(() => spawnShootingStar(), 2000 + Math.random() * 5000);
        }

        // --- Init ---
        loadState();
        createStars();
        startShootingStars();
        refreshAll();
        setFooter(apiKey ? '🌟 STARLIGHT CINEMA · 1985' : '⚠️ Set API key to generate movies');

        document.querySelectorAll('.tab-btn').forEach(t => {
            t.addEventListener('click', () => switchTab(t.dataset.tab));
        });

        document.getElementById('resetApiBtn').addEventListener('click', () => {
            const key = prompt('Enter your Mistral API key:');
            if (key && key.length > 10) {
                apiKey = key;
                localStorage.setItem('starlight_api_key', key);
                setFooter('✅ API Key saved!');
            }
        });

        if (!apiKey) {
            setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
        }
    </script>
</body>
</html>
