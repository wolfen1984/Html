<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STARLIGHT CINEMA · Drive-In Theater Manager · 1985</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Limelight&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080810;
            --panel-bg: #0d0d18;
            --text: #ffcc44;
            --text-dim: #886622;
            --text-bright: #ffe088;
            --accent: #ff8833;
            --accent-dim: #884411;
            --border: #ffcc44;
            --border-glow: 0 0 8px #ffcc4466;
            --danger: #ff4444;
            --danger-glow: 0 0 6px #ff444466;
            --input-bg: #15101a;
            --button-bg: #1a1810;
            --button-hover: #282418;
            --font-display: 'Limelight', 'VT323', cursive;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --font-body: 'VT323', 'Courier New', monospace;
            --scanline-opacity: 0.05;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#020208; display:flex; justify-content:center; align-items:center;
            min-height:100vh; font-family:var(--font-body); padding:8px;
            background-image:radial-gradient(ellipse at center, #0a0a20 0%, #020208 100%);
            overflow-x:hidden;
        }
        .game-shell {
            max-width:500px; width:100%; height:92vh; max-height:850px;
            background:linear-gradient(180deg, #050518 0%, #08081c 30%, #0c0c20 60%, #0a0a18 100%);
            border-radius:16px; border:3px solid #2a2a18;
            box-shadow:0 0 40px #ff883322, 0 0 100px #000000cc, 0 6px 28px #000000ee;
            display:flex; flex-direction:column; overflow:hidden; position:relative;
        }
        .please-stand-by {
            background: #000;
            border: 12px solid #222;
            border-radius: 50%;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        .please-stand-by::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 3px solid #444;
            border-radius: 50%;
        }
        .test-pattern-bars {
            display: flex;
            height: 60px;
            margin: 20px 0;
            border-radius: 4px;
            overflow: hidden;
        }
        .test-pattern-bars span { flex: 1; }
        .bar-1 { background: #ccc; } .bar-2 { background: #ffff00; }
        .bar-3 { background: #00ffff; } .bar-4 { background: #00ff00; }
        .bar-5 { background: #ff00ff; } .bar-6 { background: #ff0000; }
        .bar-7 { background: #0000ff; }
        .stars-container { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; overflow:hidden; border-radius:13px; }
        .star { position:absolute; background:#fff; border-radius:50%; animation:twinkle var(--dur) ease-in-out infinite; animation-delay:var(--delay); opacity:0.5; }
        @keyframes twinkle { 0%,100%{opacity:0.35; transform:scale(1)} 30%{opacity:1; transform:scale(1.6)} 60%{opacity:0.45; transform:scale(0.8)} 85%{opacity:0.9; transform:scale(1.3)} }
        .shooting-star { position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; animation:shoot var(--shoot-dur) linear forwards; animation-delay:var(--shoot-delay); opacity:0; box-shadow:0 0 6px 2px #ffffff88, 0 0 20px 6px #ffffff44; }
        .shooting-star::after { content:''; position:absolute; top:50%; transform:translateY(-50%); width:var(--tail-len); height:1px; background:linear-gradient(90deg, #ffffffcc, #ffffff44, transparent); right:100%; border-radius:1px; }
        @keyframes shoot { 0%{opacity:0; transform:translate(0,0) rotate(var(--angle));} 8%{opacity:1;} 40%{opacity:0.7; transform:translate(var(--dx),var(--dy)) rotate(var(--angle));} 100%{opacity:0; transform:translate(var(--dx),var(--dy)) rotate(var(--angle));} }
        .crt-overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:900; background:repeating-linear-gradient(0deg, rgba(0,0,0,var(--scanline-opacity)) 0px, rgba(0,0,0,var(--scanline-opacity)) 2px, transparent 2px, transparent 5px); border-radius:13px; }
        .crt-overlay::after { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%); border-radius:13px; }
        .marquee { position:relative; z-index:10; background:#111108; border-bottom:4px solid #2a2a10; padding:8px 14px; text-align:center; font-family:var(--font-display); letter-spacing:2px; box-shadow:0 4px 20px #00000088; }
        .marquee-inner { border:2px solid #332200; border-radius:6px; padding:8px 12px; background:#0a0a04; }
        .marquee-title { font-size:18px; color:#ffbb33; text-shadow:0 0 10px #ffbb3388; letter-spacing:3px; }
        .marquee-features { font-size:12px; color:#eeaa55; font-family:var(--font-body); margin-top:2px; }
        .status-strip { display:flex; justify-content:space-around; padding:6px 10px; background:#0a0a10; border-bottom:1px solid #1a1a10; z-index:10; font-family:var(--font-mono); font-size:10px; color:var(--text-dim); letter-spacing:1px; }
        .status-val { color:var(--text-bright); font-weight:bold; }
        .game-area { flex:1; overflow-y:auto; z-index:5; scrollbar-width:thin; display:flex; flex-direction:column; }
        .panel { display:none; flex-direction:column; padding:12px; gap:10px; flex:1; }
        .panel.active { display:flex; }
        .btn { background:var(--button-bg); border:2px solid #332200; padding:10px 18px; border-radius:6px; color:var(--text); cursor:pointer; font-family:var(--font-body); font-size:17px; letter-spacing:2px; text-transform:uppercase; transition:all 0.2s; }
        .btn:hover { background:var(--button-hover); border-color:var(--text); box-shadow:var(--border-glow); }
        .btn:disabled { opacity:0.4; cursor:not-allowed; }
        .btn.accent { background:#1a1000; border-color:#553300; color:#ffaa44; }
        .btn.accent:hover { background:#281800; border-color:#ff8833; box-shadow:0 0 12px #ff883344; }
        .btn.danger { background:#1a0808; border-color:#441111; color:#ff6666; }
        .btn.danger:hover { background:#281010; border-color:#ff4444; box-shadow:0 0 12px #ff444444; }
        .movie-card { background:#0d0d18; border:2px solid #1a1a22; border-radius:10px; padding:12px; display:flex; gap:12px; align-items:center; transition:all 0.2s; }
        .movie-card:hover { border-color:#ffbb33; box-shadow:0 0 15px #ff883318; }
        .movie-card.selected { border-color:#ffbb33; box-shadow:0 0 20px #ff883330; background:#141422; }
        .poster-thumb { width:70px; height:95px; border-radius:6px; background:#0a0a14; border:1px solid #1a1a22; flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:36px; color:#ffcc44; }
        .poster-thumb img { width:100%; height:100%; object-fit:cover; }
        .movie-info { flex:1; min-width:0; }
        .movie-title { font-family:var(--font-display); font-size:16px; color:#ffcc44; text-shadow:0 0 6px #ff883322; }
        .movie-meta { font-size:11px; color:#886622; font-family:var(--font-mono); }
        .movie-synopsis { font-size:13px; color:#bbaacc; margin-top:4px; line-height:1.3; }
        .star-rating { color:#ffcc44; letter-spacing:2px; font-size:14px; }
        .event-alert { background:#1a0808; border:2px solid #441111; border-radius:8px; padding:10px 14px; color:#ff8888; animation:alertPulse 1.5s ease-in-out infinite; }
        @keyframes alertPulse { 0%,100%{box-shadow:0 0 8px #ff444422} 50%{box-shadow:0 0 20px #ff444444} }
        .customer-quote { background:#0d0d18; border-left:3px solid #ffcc44; padding:8px 12px; margin:4px 0; border-radius:0 6px 6px 0; font-style:italic; font-size:13px; color:#ddccaa; }
        .customer-quote.negative { border-left-color:#ff4444; color:#ffaaaa; }
        .customer-quote.positive { border-left-color:#44cc66; color:#aaffbb; }
        .upgrade-item { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-bottom:1px solid #1a1a22; }
        .upgrade-name { font-family:var(--font-display); font-size:14px; color:#ffcc44; }
        .upgrade-desc { font-size:11px; color:#886622; font-family:var(--font-mono); }
        .upgrade-level { font-size:10px; color:#ff8833; }
        .modal { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; }
        .modal-content { background:#0d0d18; border-radius:14px; width:360px; max-width:92vw; padding:20px; text-align:center; border:2px solid #2a2a18; box-shadow:0 0 50px #ff883322; color:#ffcc44; max-height:80vh; overflow-y:auto; }
        .modal-content h2 { font-family:var(--font-display); letter-spacing:2px; margin-bottom:8px; color:#ffbb33; }
        .modal-btn { background:#1a1810; border:2px solid #332200; padding:8px 16px; border-radius:6px; margin:4px; cursor:pointer; color:#ffcc44; font-family:var(--font-body); font-size:15px; letter-spacing:1px; }
        .modal-btn:hover { border-color:#ffbb33; box-shadow:0 0 10px #ff883344; }
        .loading-spinner { display:inline-block; width:20px; height:20px; border:2px solid #332200; border-top-color:#ffcc44; border-radius:50%; animation:spin 0.8s linear infinite; margin-right:6px; vertical-align:middle; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .footer-strip { display:flex; justify-content:space-between; align-items:center; padding:5px 10px; background:#0a0a10; border-top:1px solid #15150a; z-index:10; font-family:var(--font-mono); font-size:9px; color:#332200; }
        .tabs-row { display:flex; background:#0a0a10; border-bottom:2px solid #1a1a10; z-index:10; }
        .tab-btn { flex:1; text-align:center; padding:8px 4px; font-family:var(--font-body); font-size:14px; color:#664400; cursor:pointer; border-bottom:3px solid transparent; background:transparent; white-space:nowrap; }
        .tab-btn.active { color:#ffbb33; border-bottom-color:#ffbb33; text-shadow:0 0 10px #ffbb3388; }
        .tab-btn:hover { color:#ffcc44; }
        .car-grid { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; padding:8px; background:#0a0a14; border-radius:8px; border:1px solid #1a1a10; min-height:60px; }
        .lot-car { font-size:18px; margin:2px 4px; }
        .lot-car .speaker-pole { font-size:8px; vertical-align:top; margin-left:-2px; color:#888; }
        .heat-indicator { color:#ff8844; font-weight:bold; font-size:12px; }
        .hype-bar { width:100%; height:12px; background:#1a1a22; border-radius:6px; overflow:hidden; margin:4px 0; }
        .hype-fill { height:100%; background:linear-gradient(90deg, #ff8833, #ffcc44); transition:width 0.3s; border-radius:6px; }
        .chat-log { max-height:250px; overflow-y:auto; text-align:left; margin-bottom:10px; border:1px solid #1a1a22; border-radius:8px; padding:8px; background:#0a0a14; }
        .chat-msg { margin:6px 0; font-size:14px; line-height:1.4; }
        .chat-msg.user { color:#ffaa44; }
        .chat-msg.assistant { color:#ddccaa; }
        .chat-input-row { display:flex; gap:6px; }
        .chat-input-row input { flex:1; background:var(--input-bg); border:2px solid #332200; border-radius:6px; padding:8px; color:var(--text); font-family:var(--font-body); font-size:16px; }

        /* Trailer cinematic additions */
        .trailer-theater {
            background: #000;
            border: 8px solid #2a1a0a;
            border-radius: 4px;
            box-shadow: inset 0 0 120px rgba(0,0,0,0.9), 0 0 60px #ff883322, 0 0 0 4px #1a0a00;
            position: relative; overflow: hidden;
        }
        .trailer-curtain-top {
            position: absolute; top: -6px; left: -10px; right: -10px; height: 50px;
            background: linear-gradient(180deg, #3a1010 0%, #6b2020 40%, #8b2828 70%, transparent 100%);
            z-index: 5; box-shadow: 0 8px 30px rgba(0,0,0,0.7);
        }
        .trailer-curtain-bottom {
            position: absolute; bottom: -6px; left: -10px; right: -10px; height: 50px;
            background: linear-gradient(0deg, #3a1010 0%, #6b2020 40%, #8b2828 70%, transparent 100%);
            z-index: 5; box-shadow: 0 -8px 30px rgba(0,0,0,0.7);
        }
        .trailer-screen-vignette {
            position: absolute; top:0; left:0; right:0; bottom:0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.85) 100%);
            pointer-events: none; z-index: 2;
        }
        .trailer-film-grain {
            position: absolute; top:0; left:0; right:0; bottom:0;
            pointer-events: none; z-index: 3; opacity: 0.15;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            animation: grainShift 0.15s steps(3) infinite;
        }
        @keyframes grainShift {
            0%,100% { transform: translate(0,0); } 33% { transform: translate(-2px,1px); } 66% { transform: translate(1px,-1px); }
        }
        .trailer-projector-flicker { animation: flicker 3s ease-in-out infinite; }
        @keyframes flicker {
            0%,100% { opacity: 1; } 5% { opacity: 0.85; } 10% { opacity: 1; } 45% { opacity: 0.92; } 50% { opacity: 1; } 92% { opacity: 0.88; } 94% { opacity: 1; }
        }
        .trailer-end-card {
            animation: endCardReveal 0.8s ease-out forwards;
            background: linear-gradient(180deg, #0a0a18 0%, #050510 100%);
            border: 3px solid #ffbb33; padding: 20px; border-radius: 8px; box-shadow: 0 0 40px #ff883344;
        }
        @keyframes endCardReveal {
            from { transform: scale(1.3); opacity: 0; filter: blur(10px); }
            to { transform: scale(1); opacity: 1; filter: blur(0); }
        }
        .trailer-scene-dots { display: flex; justify-content: center; gap: 8px; margin: 8px 0; }
        .trailer-scene-dot {
            width: 10px; height: 10px; border-radius: 50%; background: #332200; border: 1px solid #553300; transition: all 0.3s;
        }
        .trailer-scene-dot.active { background: #ffcc44; box-shadow: 0 0 8px #ffcc44; transform: scale(1.3); }
        .trailer-scene-dot.done { background: #886622; border-color: #aa8833; }
        .trailer-scene-img { transition: opacity 0.6s ease-in-out, filter 0.6s ease-in-out; }
        .trailer-scene-img.fading-out { opacity: 0; filter: brightness(3) blur(3px); }
    </style>
</head>
<body>
<div class="game-shell" id="gameShell">
    <div class="stars-container" id="starsContainer"></div>
    <div class="crt-overlay"></div>
    <div class="marquee"><div class="marquee-inner"><div class="marquee-title" id="marqueeTitle">STARLIGHT CINEMA</div><div class="marquee-features" id="marqueeFeatures">DOUBLE FEATURE TONIGHT</div></div></div>
    <div class="status-strip">
        <span>💰 <span class="status-val" id="statCash">$500</span></span>
        <span>⭐ <span class="status-val" id="statRep">50</span></span>
        <span>📅 Day <span class="status-val" id="statDay">1</span></span>
        <span>🚗 <span class="status-val" id="statCars">0</span></span>
    </div>
    <div class="tabs-row">
        <div class="tab-btn active" data-tab="overview">🎬 LOT</div>
        <div class="tab-btn" data-tab="movies">🎥 MOVIES</div>
        <div class="tab-btn" data-tab="franchises">🎞️ FRANCHISES</div>
        <div class="tab-btn" data-tab="upgrades">🔧 UPGRADES</div>
        <div class="tab-btn" data-tab="history">📋 HISTORY</div>
    </div>
    <div class="game-area">
        <div id="overviewPanel" class="panel active"></div>
        <div id="moviesPanel" class="panel"></div>
        <div id="franchisesPanel" class="panel"></div>
        <div id="upgradesPanel" class="panel"></div>
        <div id="historyPanel" class="panel"></div>
    </div>
    <div class="footer-strip">
        <span id="footerMsg">🌟 STARLIGHT CINEMA · 1985</span>
        <button id="resetApiBtn" style="background:none;border:none;color:#553300;font-size:8px;cursor:pointer;">🔑 API KEY</button>
    </div>
</div>
<div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

<script>
(function() {
    const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
    const MODEL = 'mistral-small-latest';
    let apiKey = localStorage.getItem('starlight_api_key') || '';

    const DEFAULT_STATE = {
        cash: 500, reputation: 50, day: 1, movieLibrary: [], tonightDoubleFeature: [],
        upgrades: { projector:0, sound:0, screen:0, concessions:0, fence:0, bathrooms:0, parking:0 },
        history: [], lastNightCars:0, lastNightRevenue:0, imageCooldownUntil:0
    };
    let gameState = { ...DEFAULT_STATE };

    if (speechSynthesis.getVoices().length === 0) {
        speechSynthesis.onvoiceschanged = () => {};
    }

    const upgradeDefs = [
        { id:'projector', name:'Projector', levels:['Flickering 16mm','Refurbished 35mm','Crisp Xenon','Laser Vision'], costs:[0,300,800,2000] },
        { id:'sound', name:'Sound System', levels:['Tinny Pole Speakers','FM Transmitter','Stereo FM','Surround Sound'], costs:[0,250,700,1800] },
        { id:'screen', name:'Screen', levels:['Weathered White Wall','Repainted Panel','Premium Reflective','Giant Cinemascope'], costs:[0,400,1000,2500] },
        { id:'concessions', name:'Concessions', levels:['Stale Popcorn','Fresh Popcorn & Soda','Deluxe Snack Bar','Gourmet Diner'], costs:[0,200,600,1500] },
        { id:'fence', name:'Perimeter Fence', levels:['None','Chain-link','Wooden Privacy','Electric Security'], costs:[0,150,500,1200] },
        { id:'bathrooms', name:'Restrooms', levels:['Porta-Potties','Basic Cinderblock','Clean Tile','Luxury Lounge'], costs:[0,350,900,2200] },
        { id:'parking', name:'Parking Lot', levels:['Dirt & Gravel','Graded Gravel','Smooth Asphalt','Premium Marked'], costs:[0,200,550,1400] }
    ];

    function saveState() { try { localStorage.setItem('starlight_state_v3', JSON.stringify(gameState)); } catch(e){} }
    function loadState() {
        try {
            const saved = localStorage.getItem('starlight_state_v3');
            if (saved) {
                gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
                gameState.movieLibrary = gameState.movieLibrary.map(m => ({
                    sequelOf:null, seriesName:null, seriesOrder:1, totalScreenings:0,
                    lastScreenedDay:null, peakAttendance:0, isHot:false, ...m
                }));
            }
        } catch(e){}
    }

    const esc = str => {
        if (str === null || str === undefined) return '';
        return String(str).replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[m]);
    };

    function setFooter(msg) { document.getElementById('footerMsg').textContent = msg; }
    function flashFooter(msg) { setFooter(msg); setTimeout(() => setFooter('🌟 STARLIGHT CINEMA · 1985'), 4000); }
    function showModal(html) { document.getElementById('genericModalContent').innerHTML = html; document.getElementById('genericModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('genericModal').style.display = 'none'; }
    window.closeModal = closeModal;
    document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

    async function mistralChat(msgs, maxTok=500) {
        if (!apiKey) throw new Error('API key missing');
        const res = await fetch(MISTRAL_ENDPOINT, {
            method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
            body:JSON.stringify({model:MODEL, messages:msgs, temperature:0.9, max_tokens:maxTok})
        });
        if (!res.ok) throw new Error('API '+res.status);
        const data = await res.json();
        return data.choices[0].message.content.trim();
    }

    async function generateImage(prompt) {
        const now = Date.now();
        if (now < gameState.imageCooldownUntil) await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s B-movie poster')}?width=512&height=640&seed=${Date.now()}`;
        const img = new Image();
        const result = await new Promise(resolve => {
            let done = false;
            const finish = (val) => { if(!done){ done=true; clearTimeout(timer); resolve(val); } };
            img.onload = () => finish(url);
            img.onerror = () => finish(null);
            img.src = url;
            const timer = setTimeout(() => finish(null), 20000);
        });
        gameState.imageCooldownUntil = Date.now() + 30000; saveState();
        return result;
    }

    async function generateMovie() {
        const prompt = `Generate a hilarious 80s-style B-movie concept as valid JSON only. Fields: "title" (max 35), "genre", "tagline", "synopsis", "quality"(1-5), "audienceAppeal". JSON only.`;
        const resp = await mistralChat([{role:'user', content:prompt}], 1200);
        return JSON.parse(resp.replace(/```json|```/g,'').trim());
    }

    async function generateCustomerReactions(movies, attendance, reputation) {
        const titles = movies.map(m=>m.title).join(' and ');
        const avgQ = Math.round(movies.reduce((a,m)=>a+(m.quality||3),0)/movies.length);
        const prompt = `Generate 3-5 reactions (JSON array of strings) for double feature "${titles}". Avg quality ${avgQ}/5. Cars: ${attendance}. Rep: ${reputation}. JSON only.`;
        const resp = await mistralChat([{role:'user', content:prompt}], 500);
        const raw = JSON.parse(resp.replace(/```json|```/g,'').trim());
        return raw.map(item => {
            if (typeof item === 'string') return item;
            if (item && typeof item === 'object') return item.reaction || item.text || item.message || JSON.stringify(item);
            return String(item);
        });
    }

    async function generateEvent() {
        const resp = await mistralChat([{role:'user', content:'Random 1980s drive-in event JSON: type, title, description, cashImpact (int), repImpact (-10 to 10). JSON only.'}], 500);
        return JSON.parse(resp.replace(/```json|```/g,'').trim());
    }

    function addMovieToLibrary(movie) {
        movie.sequelOf = movie.sequelOf || null;
        movie.seriesName = movie.seriesName || null;
        movie.seriesOrder = movie.seriesOrder || 1;
        movie.totalScreenings = movie.totalScreenings || 0;
        movie.lastScreenedDay = null;
        movie.peakAttendance = 0;
        movie.isHot = false;
        movie.id = 'm_'+Date.now()+'_'+Math.random().toString(36);
        gameState.movieLibrary.push(movie);
        saveState();
    }

    function removeMovieFromLibrary(id) {
        gameState.movieLibrary = gameState.movieLibrary.filter(m=>m.id!==id);
        gameState.tonightDoubleFeature = gameState.tonightDoubleFeature.filter(m=>m.id!==id);
        saveState();
    }

    function selectForTonight(id) {
        const movie = gameState.movieLibrary.find(m=>m.id===id);
        if (!movie) return;
        if (gameState.tonightDoubleFeature.some(m=>m.id===id)) {
            gameState.tonightDoubleFeature = gameState.tonightDoubleFeature.filter(m=>m.id!==id);
        } else {
            if (gameState.tonightDoubleFeature.length >= 2) gameState.tonightDoubleFeature.shift();
            gameState.tonightDoubleFeature.push(movie);
        }
        saveState(); refreshAll();
    }

    function calculateAttendance(useRandom=true) {
        if (gameState.tonightDoubleFeature.length !== 2) return 0;
        let base = 15 + gameState.reputation/3;
        const totalUp = Object.values(gameState.upgrades).reduce((a,b)=>a+b,0);
        base += totalUp*4;
        const avgQ = (gameState.tonightDoubleFeature[0].quality + gameState.tonightDoubleFeature[1].quality)/2;
        base += (avgQ-3)*8;
        if (useRandom) base += Math.floor(Math.random()*12)-6;
        if (gameState.upgrades.fence>=2) base+=3;
        if (gameState.upgrades.fence>=3) base+=5;
        return Math.max(3, Math.round(base));
    }

    function calculateRevenue(cars) {
        const ticket = 3.5 + gameState.upgrades.screen*1.5 + gameState.upgrades.sound*1;
        const con = 2 + gameState.upgrades.concessions*3;
        return Math.round(cars * (ticket*1.8 + con));
    }

    function getSequelMultiplier(movie, currentDay, applyRush=false) {
        if (!movie.sequelOf) return 1.0;
        const prequel = gameState.movieLibrary.find(p=>p.id===movie.sequelOf);
        if (!prequel || !prequel.isHot) return movie.quality<2 ? 0.7 : 1.0;
        let mult = Math.min(2.0, 1.2 + (prequel.peakAttendance/50));
        if (applyRush && currentDay && prequel.lastScreenedDay && (currentDay - prequel.lastScreenedDay) <= 2) {
            if (Math.random() < 0.4) mult = Math.max(0.7, mult-0.3);
        }
        return mult;
    }

    function decayMovieHeat() {
        gameState.movieLibrary.forEach(m => {
            if (!m.lastScreenedDay) return;
            if (gameState.day - m.lastScreenedDay > 4) m.isHot = false;
            if (m.peakAttendance > 0 && (gameState.day - m.lastScreenedDay) > 2) m.peakAttendance = Math.max(0, m.peakAttendance-1);
        });
    }

    function getSeriesData() {
        const map = {};
        gameState.movieLibrary.forEach(m => {
            const name = m.seriesName || m.title;
            if (!map[name]) map[name] = { movies:[], totalScreenings:0, peakAttendance:0, avgQuality:0 };
            map[name].movies.push(m);
            map[name].totalScreenings += m.totalScreenings;
            if (m.peakAttendance > map[name].peakAttendance) map[name].peakAttendance = m.peakAttendance;
        });
        Object.keys(map).forEach(name => {
            const ms = map[name].movies;
            map[name].avgQuality = Math.round(ms.reduce((a,m)=>a+m.quality,0)/ms.length);
        });
        return map;
    }

    function calcFranchiseValue(series) {
        return Math.max(100, series.totalScreenings*25 + series.peakAttendance*50 + series.avgQuality*80);
    }

    function sellFranchise(seriesName) {
        const movies = gameState.movieLibrary.filter(m => (m.seriesName||m.title)===seriesName);
        if (!movies.length) return;
        const value = calcFranchiseValue(getSeriesData()[seriesName]);
        gameState.cash += value;
        gameState.movieLibrary = gameState.movieLibrary.filter(m => (m.seriesName||m.title)!==seriesName);
        gameState.tonightDoubleFeature = gameState.tonightDoubleFeature.filter(m => (m.seriesName||m.title)!==seriesName);
        saveState(); refreshAll();
        flashFooter(`💸 Sold "${seriesName}" for $${value}!`);
    }

    async function advanceNight() {
        if (gameState.tonightDoubleFeature.length < 2) {
            showModal('<h2>🎬 Need Double Feature</h2><button class="modal-btn" onclick="closeModal()">OK</button>');
            return;
        }
        decayMovieHeat();
        const movies = [...gameState.tonightDoubleFeature];
        const cars = calculateAttendance(true);
        let revenue = calculateRevenue(cars);
        let bonusLog = [];
        movies.forEach(m => {
            const mult = getSequelMultiplier(m, gameState.day, true);
            if (mult !== 1.0) {
                const baseEach = calculateRevenue(cars)/2;
                const diff = Math.round(baseEach * (mult-1));
                revenue = Math.round(revenue + diff);
                bonusLog.push(mult>1 ? `📈 "${m.title}" hype +$${diff}` : `📉 "${m.title}" flopped -$${Math.abs(diff)}`);
            }
        });
        gameState.cash += revenue;
        gameState.lastNightCars = cars;
        gameState.lastNightRevenue = revenue;
        movies.forEach(m => {
            const lib = gameState.movieLibrary.find(l=>l.id===m.id);
            if (lib) {
                lib.totalScreenings++; lib.lastScreenedDay = gameState.day;
                if (cars > lib.peakAttendance) lib.peakAttendance = cars;
                lib.isHot = lib.peakAttendance >= 20 && (gameState.day - lib.lastScreenedDay) <= 2;
            }
        });
        let reactions;
        try { reactions = await generateCustomerReactions(movies, cars, gameState.reputation); }
        catch(e) { reactions = ["The crowd was speechless..."]; }
        const avgQ = movies.reduce((a,m)=>a+m.quality,0)/2;
        const repChange = Math.round((avgQ-3)*4 + (cars>25?3:cars>15?1:-2));
        gameState.reputation = Math.max(0, Math.min(100, gameState.reputation+repChange));
        let event=null;
        if (Math.random()<0.4) {
            try { event = await generateEvent(); } catch(e) { event = {type:'weather',title:'Clear',description:'Nothing.',cashImpact:0,repImpact:0}; }
            gameState.cash += event.cashImpact||0;
            gameState.reputation = Math.max(0, Math.min(100, gameState.reputation+(event.repImpact||0)));
            gameState.cash = Math.max(0, gameState.cash);
        }
        gameState.history.unshift({ day:gameState.day, movies:movies.map(m=>({title:m.title,quality:m.quality})), cars, revenue, repChange, event, reactions, bonusLog });
        if (gameState.history.length>30) gameState.history.length=30;
        gameState.day++; gameState.tonightDoubleFeature = []; saveState();
        const eventHTML = (event && event.type!=='weather') ? `<div class="event-alert"><strong>⚠️ ${esc(event.title)}</strong><br>${esc(event.description)}<br><small>💰${event.cashImpact>=0?'+':''}${event.cashImpact} ⭐${event.repImpact>=0?'+':''}${event.repImpact}</small></div>` : '';
        const bonusHTML = bonusLog.map(b=>`<div style="color:#ffaa44;font-size:12px;">${b}</div>`).join('');
        const reactionsHTML = reactions.map(r => {
            const cls = /bad|terrible|worst|boring/i.test(r) ? 'negative' : 'positive';
            return `<div class="customer-quote ${cls}">💬 "${esc(r)}"</div>`;
        }).join('');
        showModal(`<h2>🌙 Night ${gameState.day-1}</h2><p>🚗 ${cars} cars · 💰 $${revenue}</p><p>⭐ ${repChange>=0?'+':''}${repChange} (now ${gameState.reputation})</p>${eventHTML}${bonusHTML}<div style="max-height:150px;overflow-y:auto;text-align:left;">${reactionsHTML}</div><button class="modal-btn" onclick="closeModal()">Day ${gameState.day}</button>`);
        refreshAll();
        setFooter('☀️ Day '+gameState.day+' · Choose your double feature!');
    }

    function canCommissionSequel(movie) {
        return movie.totalScreenings>=1 && gameState.cash>=commissionCost(movie) && !gameState.movieLibrary.some(m=>m.sequelOf===movie.id);
    }
    function commissionCost(movie) { return 200 + movie.quality*60; }

    async function commissionSequel(parentId) {
        const parent = gameState.movieLibrary.find(m=>m.id===parentId);
        if (!parent || !canCommissionSequel(parent)) return;
        gameState.cash -= commissionCost(parent); saveState();
        const seriesName = parent.seriesName || parent.title.replace(/\s+\d+$/,'').trim();
        const nextOrder = (parent.seriesOrder||1)+1;
        const prompt = `Create a sequel to "${parent.title}" (genre: ${parent.genre}). Synopsis: "${parent.synopsis}". Return JSON: "title" (like "${seriesName}: [Subtitle]"), "genre", "tagline", "synopsis", "quality" (1-5, must be ${parent.quality}±1), "audienceAppeal". JSON only.`;
        try {
            const resp = await mistralChat([{role:'user', content:prompt}], 1200);
            const data = JSON.parse(resp.replace(/```json|```/g,'').trim());
            const sequel = { ...data, posterUrl:null, sequelOf:parent.id, seriesName, seriesOrder:nextOrder, totalScreenings:0, lastScreenedDay:null, peakAttendance:0, isHot:false };
            addMovieToLibrary(sequel); refreshAll();
            setFooter('🎬 Commissioned: '+sequel.title);
            const poster = await generateImage(`Sequel poster for "${sequel.title}", ${sequel.genre}`);
            if (poster) { sequel.posterUrl = poster; saveState(); refreshAll(); }
        } catch(e) {
            gameState.cash += Math.floor(commissionCost(parent)*0.5); saveState();
            showModal('<h2>❌ Sequel Failed</h2><p>Half refunded.</p><button class="modal-btn" onclick="closeModal()">OK</button>');
        }
    }

    // ---------- DIRECTOR CHAT ----------
    let directorMessages = [];
    function openDirectorModal() {
        directorMessages = [
            {role:"system", content:"You are a passionate, slightly eccentric 1980s B-movie director. The player owns a drive-in theater and wants you to create a custom movie. Brainstorm with them: ask about genre, characters, plot, title, etc. Keep responses short (1-3 sentences). Stay in character. When you both agree on the concept, you will write the script as a JSON object (the player will ask you to finalize it)."}

    function renderDirectorChat() {
        let html = `<h2>🎬 DIRECTOR'S OFFICE</h2><div class="chat-log" id="directorChatLog">`;
        directorMessages.forEach(m => {
            if (m.role === 'user') html += `<div class="chat-msg user"><strong>You:</strong> ${esc(m.content)}</div>`;
            else if (m.role === 'assistant') html += `<div class="chat-msg assistant"><strong>Director:</strong> ${esc(m.content)}</div>`;
        });
        html += `</div>
        <div class="chat-input-row"><input type="text" id="directorInput" placeholder="Type your idea..."><button class="btn" id="directorSendBtn">Send</button></div>
        <button class="btn accent" id="finalizeScriptBtn">📝 Finalize & Fund Script</button>
        <button class="modal-btn" onclick="closeModal()">Leave</button>`;
        document.getElementById('genericModalContent').innerHTML = html;
        document.getElementById('genericModal').style.display = 'flex';
        document.getElementById('directorSendBtn').addEventListener('click', () => {
            const input = document.getElementById('directorInput');
            const text = input.value.trim();
            if (text) { sendDirectorMessage(text); input.value = ''; }
        });
        document.getElementById('directorInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('directorSendBtn').click(); });
        document.getElementById('finalizeScriptBtn').addEventListener('click', finalizeScript);

        if (log) log.scrollTop = log.scrollHeight;

    async function sendDirectorMessage(text) {
        directorMessages.push({role:"user", content:text});
        renderDirectorChat();
        const sendBtn = document.getElementById('directorSendBtn');
        const input = document.getElementById('directorInput');
        if (sendBtn) sendBtn.disabled = true;
        if (input) input.disabled = true;
        try {
            const reply = await mistralChat(directorMessages, 300);
            directorMessages.push({role:"assistant", content:reply});
        } catch(e) {
            directorMessages.push({role:"assistant", content:"(The director seems to have stepped out... try again.)"});
        }
        renderDirectorChat();
        if (sendBtn) sendBtn.disabled = false;
        if (input) { input.disabled = false; input.focus(); }
    }

    async function finalizeScript() {
        const finalPrompt = "The player wants to finalize the script. Based on our entire conversation, output ONLY a valid JSON object representing the completed movie. Include fields: title, genre, tagline, synopsis (2-3 sentences), quality (1-5), audienceAppeal (low/medium/high), and a 'budget' field (integer dollar amount, between 200 and 800). Do not include any other text.";
        directorMessages.push({role:"user", content:finalPrompt});
        renderDirectorChat();
        const sendBtn = document.getElementById('directorSendBtn');
        const finalizeBtn = document.getElementById('finalizeScriptBtn');
        if (sendBtn) sendBtn.disabled = true;
        if (finalizeBtn) finalizeBtn.disabled = true;
        try {
            const reply = await mistralChat(directorMessages, 500);
            const jsonMatch = reply.match(/\{[\s\S]*\}/);
            if (!jsonMatch) throw new Error('No JSON found');
            const movieData = JSON.parse(jsonMatch[0]);
            if (!movieData.title || !movieData.quality || !movieData.budget) throw new Error('Incomplete movie data');
            if (gameState.cash < movieData.budget) {
                showModal(`<h2>💸 Not Enough Cash</h2><p>The director needs $${movieData.budget}, but you only have $${gameState.cash}.</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
                return;
            }
            gameState.cash -= movieData.budget;
            const newMovie = { ...movieData, id:'m_'+Date.now(), posterUrl:null, sequelOf:null, seriesName:null, seriesOrder:1, totalScreenings:0, lastScreenedDay:null, peakAttendance:0, isHot:false };
            addMovieToLibrary(newMovie);
            saveState(); refreshAll();
            closeModal();
            setFooter('🎬 Director delivered: '+newMovie.title);
            generateImage(`B-movie poster for "${newMovie.title}", ${newMovie.genre}`).then(url => {
                const m = gameState.movieLibrary.find(m=>m.id===newMovie.id);
                if (m && url) { m.posterUrl = url; saveState(); refreshAll(); }
            });
        } catch(e) {
            directorMessages.push({role:"assistant", content:"Hmm, I got distracted. Let's try finalizing again. (Error: "+e.message+")"});
            renderDirectorChat();
        } finally {
            if (sendBtn) sendBtn.disabled = false;
            if (finalizeBtn) finalizeBtn.disabled = false;
        }
    }

    // ---------- AUDIO TRAILER (CINEMATIC) ----------
    function playAudioTrailer(movie) {
        speechSynthesis.cancel();
        if (movie.trailerScript && movie.trailerImages && movie.trailerImages.length >= movie.trailerScript.length) {
            startAudioTrailerPlayback(movie);
            return;
        }
        const modalContent = document.getElementById('genericModalContent');
        modalContent.innerHTML = `
            <div class="please-stand-by" style="text-align:center; padding:20px;">
                <div style="font-family:'VT323'; font-size:32px; color:#ffcc44; letter-spacing:4px;">PLEASE STAND BY</div>
                <div class="test-pattern-bars">
                    <span class="bar-1"></span><span class="bar-2"></span><span class="bar-3"></span>
                    <span class="bar-4"></span><span class="bar-5"></span><span class="bar-6"></span><span class="bar-7"></span>
                </div>
                <div class="hype-bar" style="width:80%; margin: 0 auto;">
                    <div class="hype-fill" id="trailerLoadBar" style="width:0%; transition:width 0.3s;"></div>
                </div>
                <p id="trailerStatusText" style="color:#ffaa44; font-family:'Share Tech Mono'; margin-top:12px;">🎞️ WRITING SCRIPT...</p>
                <p style="color:#664400; font-size:11px; margin-top:8px;">DO NOT ADJUST YOUR SET</p>
            </div>`;
        document.getElementById('genericModal').style.display = 'flex';

        function loadImagesRecursive(script, index, collected, callback) {
            if (index >= script.length) { callback(collected); return; }
            document.getElementById('trailerStatusText').textContent = `Generating scene ${index + 1} of ${script.length}…`;
            setTimeout(async () => {
                try {
                    const url = await generateImage(script[index].imagePrompt);
                    collected.push(url || movie.posterUrl || '');
                } catch (e) { collected.push(movie.posterUrl || ''); }
                const loadBar = document.getElementById('trailerLoadBar');
                if (loadBar) loadBar.style.width = Math.round((collected.length / script.length) * 100) + '%';
                loadImagesRecursive(script, index + 1, collected, callback);
            }, 20);
        }

        (async () => {
            let script;
            try {
                script = await generateTrailerScript(movie);
                movie.trailerScript = script;
            } catch (e) {
                const sentences = movie.synopsis.split(/[.!?]+/).filter(s => s.trim().length > 0);
                script = [];
                for (let i = 0; i < 3; i++) {
                    script.push({
                        narration: sentences[i] ? sentences[i].trim() : "Coming soon to Starlight Cinema...",
                        imagePrompt: `scene from ${movie.title}, 80s B-movie, VHS style`
                    });
                }
                movie.trailerScript = script;
            }
            loadImagesRecursive(script, 0, [], (images) => {
                movie.trailerImages = images;
                saveState();
                startAudioTrailerPlayback(movie);
            });
        })();
    }

    async function generateTrailerScript(movie) {
        const prompt = `Create a short 3-scene audio trailer for the 80s B-movie "${movie.title}". Genre: ${movie.genre}. Tagline: "${movie.tagline}". Synopsis: ${movie.synopsis}. Return a JSON array of 3 objects, each with "narration" (a sentence to be spoken) and "imagePrompt" (a visual description for an image). JSON only.`;
        const resp = await mistralChat([{role:'user', content:prompt}], 500);
        return JSON.parse(resp.replace(/```json|```/g,'').trim());
    }

    function startAudioTrailerPlayback(movie) {
        const scenes = movie.trailerScript;
        const images = movie.trailerImages;
        let currentScene = 0;
        let projectorNodes = null;
        let isPaused = false;

        const modalContent = document.getElementById('genericModalContent');
        modalContent.innerHTML = `
            <div class="trailer-theater trailer-projector-flicker" style="position:relative;">
                <div class="trailer-curtain-top"></div>
                <div class="trailer-curtain-bottom"></div>
                <div class="trailer-screen-vignette"></div>
                <div class="trailer-film-grain"></div>
                <div id="trailerImgContainer" style="position:relative; z-index:1;">
                    <img id="trailerImg" class="trailer-scene-img" src="${images[0]}" style="width:100%; max-height:55vh; object-fit:contain; display:block;">
                </div>
                <div style="position:relative; z-index:4; padding:12px; background:linear-gradient(180deg, transparent, rgba(0,0,0,0.8));">
                    <p id="trailerSub" style="color:#ffcc44; font-size:17px; min-height:2.5em; margin:0 0 8px; transition: opacity 0.3s, transform 0.3s;"></p>
                    <div class="trailer-scene-dots" id="trailerDots">
                        ${scenes.map((_, i) => `<span class="trailer-scene-dot ${i===0?'active':''}"></span>`).join('')}
                    </div>
                    <small style="color:#886622;">Scene <span id="trailerNum">1</span>/${scenes.length}</small>
                </div>
                <div style="text-align:center; padding:8px; position:relative; z-index:4;">
                    <button class="btn" id="trailerPause">⏯️ Pause</button>
                    <button class="btn" id="trailerSkip">⏭ Skip</button>
                    <button class="modal-btn" id="trailerClose">✕ Close</button>
                </div>
            </div>`;
        document.getElementById('genericModal').style.display = 'flex';

        function startProjectorHum() {
            projectorAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = projectorAudioCtx.createOscillator();
            const gain = projectorAudioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 55;
            const lfo = projectorAudioCtx.createOscillator();
            const lfoGain = projectorAudioCtx.createGain();
            lfo.frequency.value = 8;
            lfoGain.gain.value = 3;
            lfo.connect(lfoGain);
            lfoGain.connect(osc.frequency);
            gain.gain.value = 0.02;
            osc.connect(gain);
            gain.connect(projectorAudioCtx.destination);
            osc.start();
            lfo.start();
            return { osc, lfo, gain };
        }
        function stopProjectorHum(nodes) {
            if (nodes) { nodes.osc.stop(); nodes.lfo.stop(); }
            if (projectorAudioCtx) { projectorAudioCtx.close(); projectorAudioCtx = null; }
        }

        projectorNodes = startProjectorHum();

        function getVoice() {
            const voices = speechSynthesis.getVoices();
            return voices.find(v => v.name.includes('Google UK English Male') || v.name.includes('Daniel') || v.lang.startsWith('en')) || voices[0];
        }

        function showReelEnd(callback) {
            const img = document.getElementById('trailerImg');
            if (img) {
                img.style.filter = 'brightness(10)';
                setTimeout(() => {
                    img.style.filter = 'brightness(1)';
                    const sub = document.getElementById('trailerSub');
                    if (sub) sub.innerHTML = '<span style="font-size:28px;font-family:var(--font-display);">🎬 COMING SOON</span>';
                    setTimeout(callback, 2000);
                }, 300);
            } else callback();
        }

        function showEndCard(movie) {
            const mc = document.getElementById('genericModalContent');
            mc.innerHTML = `
                <div class="trailer-end-card" style="text-align:center;">
                    <div style="font-size:40px;">🎬</div>
                    <h2 style="font-family:var(--font-display); color:#ffbb33;">${esc(movie.title)}</h2>
                    <p style="color:#ff8833;">"${esc(movie.tagline || '')}"</p>
                    <div class="star-rating" style="font-size:24px;">${'★'.repeat(movie.quality)}${'☆'.repeat(5 - movie.quality)}</div>
                    <p style="color:#ddccaa; margin-top:12px;">NOW SHOWING AT STARLIGHT CINEMA</p>
                    <div style="margin-top:16px;">
                        <button class="btn accent" id="selectFromTrailer">🎥 Add to Tonight</button>
                        <button class="modal-btn" onclick="closeModal()">Close</button>
                    </div>
                </div>`;
            document.getElementById('selectFromTrailer').onclick = () => {
                selectForTonight(movie.id);
                closeModal();
                switchTab('overview');
            };
        }

        function playScene(index) {
            if (index >= scenes.length) {
                stopProjectorHum(projectorNodes);
                showReelEnd(() => closeModal());
                return;
            }
            const img = document.getElementById('trailerImg');
            if (img && index > 0) img.classList.add('fading-out');
            setTimeout(() => {
                if (img) {
                    img.src = images[index] || '';
                    img.classList.remove('fading-out');
                }
                const sub = document.getElementById('trailerSub');
                if (sub) {
                    sub.style.opacity = '0';
                    sub.style.transform = 'translateY(8px)';
                    setTimeout(() => {
                        sub.textContent = scenes[index].narration;
                        sub.style.opacity = '1';
                        sub.style.transform = 'translateY(0)';
                    }, 150);
                }
                document.querySelectorAll('.trailer-scene-dot').forEach((dot, i) => {
                    dot.classList.remove('active', 'done');
                    if (i < index) dot.classList.add('done');
                    if (i === index) dot.classList.add('active');
                });
                document.getElementById('trailerNum').textContent = index + 1;

                if (!isPaused) {
                    const utterance = new SpeechSynthesisUtterance(scenes[index].narration);
                    utterance.voice = getVoice();
                    utterance.rate = 0.88;
                    utterance.pitch = 1.02;
                    utterance.onend = () => {
                        currentScene++;
                        if (currentScene < scenes.length) setTimeout(() => playScene(currentScene), 500);
                        else {
                            stopProjectorHum(projectorNodes);
                            showEndCard(movie);
                        }
                    };
                    speechSynthesis.speak(utterance);
                }
            }, 400);
        }

        playScene(0);

        document.getElementById('trailerPause').onclick = () => {
            isPaused = !isPaused;
            document.getElementById('trailerPause').textContent = isPaused ? '▶️ Play' : '⏯️ Pause';
            if (isPaused) speechSynthesis.pause(); else speechSynthesis.resume();
        };
        document.getElementById('trailerSkip').onclick = () => {
            speechSynthesis.cancel();
            stopProjectorHum(projectorNodes);
            showEndCard(movie);
        };
        document.getElementById('trailerClose').onclick = () => {
            speechSynthesis.cancel();
            stopProjectorHum(projectorNodes);
            closeModal();
        };

        const origClose = closeModal;
        closeModal = function() {
            speechSynthesis.cancel();
            stopProjectorHum(projectorNodes);
            origClose();
        };
    }

    // ---------- FRANCHISES / UPGRADES / HISTORY / MAIN ----------
    function renderFranchises() {
        const panel = document.getElementById('franchisesPanel');
        const data = getSeriesData();
        const names = Object.keys(data).sort((a,b)=>calcFranchiseValue(data[b])-calcFranchiseValue(data[a]));
        if (!names.length) { panel.innerHTML = '<p style="color:#442200;">No franchises yet.</p>'; return; }
        let html = '<p style="color:#ffcc44;text-align:center;font-family:var(--font-display);">🎞️ FRANCHISE PORTFOLIO</p>';
        names.forEach(name => {
            const s = data[name]; const val = calcFranchiseValue(s);
            html += `<div style="background:#0d0d18;border:1px solid #1a1a22;border-radius:8px;padding:10px;margin-bottom:6px;display:flex;justify-content:space-between;"><div><div style="color:#ffbb33;font-family:var(--font-display);">${esc(name)}</div><div style="font-size:11px;color:#886622;">${s.movies.length} movies · Avg ★${s.avgQuality} · Peak ${s.peakAttendance} cars</div></div><div style="text-align:right;"><div style="color:#ffcc44;font-size:18px;">$${val}</div><button class="btn danger sell-btn" data-name="${esc(name)}">💰 SELL</button></div></div>`;
        });
        panel.innerHTML = html;
        panel.querySelectorAll('.sell-btn').forEach(b=>b.addEventListener('click', ()=>{
            const name = b.dataset.name;
            const val = calcFranchiseValue(data[name]);
            showModal(`<h2>💸 Sell "${esc(name)}"?</h2><p>You'll gain $${val}.</p><button class="modal-btn" id="confirmSell">CONFIRM</button><button class="modal-btn" onclick="closeModal()">CANCEL</button>`);
            document.getElementById('confirmSell').onclick = () => { sellFranchise(name); closeModal(); };
        }));
    }

    function renderUpgrades() {
        const panel = document.getElementById('upgradesPanel');
        let html = '<p style="color:#ffcc44;text-align:center;font-family:var(--font-display);">🔧 LOT UPGRADES</p>';
        upgradeDefs.forEach(def => {
            const lvl = gameState.upgrades[def.id]; const cost = lvl < def.costs.length-1 ? def.costs[lvl+1] : null;
            html += `<div class="upgrade-item"><div><div class="upgrade-name">${def.name}</div><div class="upgrade-desc">${def.levels[lvl]}</div><div class="upgrade-level">Level ${lvl+1}/${def.levels.length}</div></div><button class="btn ${cost?'accent':''}" data-upg="${def.id}" ${!cost||gameState.cash<cost?'disabled':''}>${cost?'💲'+cost:'MAXED'}</button></div>`;
        });
        panel.innerHTML = html;
        panel.querySelectorAll('[data-upg]').forEach(b=>b.addEventListener('click', ()=>{
            const id = b.dataset.upg; const def = upgradeDefs.find(u=>u.id===id);
            const cost = def.costs[gameState.upgrades[id]+1];
            if (gameState.cash >= cost) { gameState.cash -= cost; gameState.upgrades[id]++; saveState(); refreshAll(); flashFooter('🔧 Upgraded '+def.name); }
            else showModal('<h2>💸 Not Enough Cash</h2><button class="modal-btn" onclick="closeModal()">OK</button>');
        }));
    }

    function renderHistory() {
        const panel = document.getElementById('historyPanel');
        if (!gameState.history.length) { panel.innerHTML = '<p style="color:#442200;">No history yet.</p>'; return; }
        panel.innerHTML = gameState.history.slice(0,15).map(h=>`
            <div style="background:#0d0d18;border:1px solid #1a1a22;border-radius:8px;padding:10px;margin-bottom:6px;">
                <strong style="color:#ffbb33;">Night ${h.day}</strong> 🚗${h.cars} 💰$${h.revenue} ⭐${h.repChange>=0?'+':''}${h.repChange}
                <div style="font-size:11px;color:#886622;">${h.movies.map(m=>esc(m.title)+' ('+m.quality+'★)').join(' + ')}</div>
                ${h.event?`<div style="font-size:10px;color:#ff8844;">⚠️ ${esc(h.event.title)}</div>`:''}
                ${h.bonusLog?h.bonusLog.map(b=>`<div style="font-size:10px;color:#ffaa44;">${b}</div>`).join(''):''}
                ${h.reactions?h.reactions.slice(0,2).map(r=>`<div style="font-size:10px;color:#aa9988;">"${esc(r)}"</div>`).join(''):''}
            </div>`).join('');
    }

    function updateStats() {
        document.getElementById('statCash').textContent = '$'+gameState.cash;
        document.getElementById('statRep').textContent = gameState.reputation;
        document.getElementById('statDay').textContent = gameState.day;
        document.getElementById('statCars').textContent = gameState.lastNightCars||0;
        const hasTwo = gameState.tonightDoubleFeature.length===2;
        document.getElementById('marqueeTitle').textContent = hasTwo ? gameState.tonightDoubleFeature.map(m=>m.title).join(' · ') : 'STARLIGHT CINEMA';
        document.getElementById('marqueeFeatures').textContent = hasTwo ? 'DOUBLE FEATURE TONIGHT!' : 'NOW SHOWING SOON';
    }
    function refreshAll() { updateStats(); const tab = document.querySelector('.tab-btn.active')?.dataset.tab || 'overview'; switchTab(tab); }
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
        document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
        document.getElementById(tab+'Panel').classList.add('active');
        if (tab==='overview') renderOverview();
        else if (tab==='movies') renderMovies();
        else if (tab==='franchises') renderFranchises();
        else if (tab==='upgrades') renderUpgrades();
        else if (tab==='history') renderHistory();
    }

    function createStars() {
        const c = document.getElementById('starsContainer'); c.innerHTML = '';
        for (let i=0;i<80;i++) {
            const s = document.createElement('div'); s.className='star';
            s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*65+'%';
            const sz=Math.random()*2.5+1; s.style.width=sz+'px'; s.style.height=sz+'px';
            s.style.setProperty('--dur',(Math.random()*3+2)+'s');
            s.style.setProperty('--delay',Math.random()*4+'s');
            c.appendChild(s);
        }
    }
    function spawnShootingStar() {
        const c = document.getElementById('starsContainer');
        const s = document.createElement('div'); s.className='shooting-star';
        s.style.left=Math.random()*80+'%'; s.style.top=Math.random()*40+'%';
        const angle = -25+Math.random()*-35, dist = 120+Math.random()*200;
        s.style.setProperty('--dx',Math.cos(angle*Math.PI/180)*dist+'px');
        s.style.setProperty('--dy',Math.sin(angle*Math.PI/180)*dist+'px');
        s.style.setProperty('--angle',angle+'deg');
        s.style.setProperty('--tail-len',(40+Math.random()*60)+'px');
        s.style.setProperty('--shoot-dur',(0.6+Math.random()*1.2)+'s');
        s.style.setProperty('--shoot-delay','0s');
        c.appendChild(s); setTimeout(()=>{ if(s.parentNode) s.remove(); },2500);
    }
    function startShootingStars() {
        const schedule = () => { const d=4000+Math.random()*15000; setTimeout(()=>{spawnShootingStar(); schedule();},d); };
        schedule(); setTimeout(spawnShootingStar, 2000+Math.random()*5000);
    }

    loadState(); createStars(); startShootingStars(); refreshAll();
    setFooter(apiKey?'🌟 STARLIGHT CINEMA · 1985':'⚠️ Set API key');
    document.querySelectorAll('.tab-btn').forEach(t=>t.addEventListener('click', ()=>switchTab(t.dataset.tab)));
    document.getElementById('resetApiBtn').onclick = () => {
        const key = prompt('Enter your Mistral API key:');
        if (key && key.length>10) { apiKey = key; localStorage.setItem('starlight_api_key', key); setFooter('✅ API Key saved!'); }
    };
    if (!apiKey) setTimeout(()=>document.getElementById('resetApiBtn').click(), 800);
})();
</script>
