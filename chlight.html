<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>THE LIGHTHOUSE KEEPER · 1986</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Orbitron&family=Rajdhani:wght@400;500;600;700&family=Audiowide&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020410;
            --screen-bg: #04081a;
            --panel-bg: #060c20;
            --text: #b8c8e0;
            --text-dim: #4a6080;
            --text-bright: #e0ecff;
            --accent: #0088cc;
            --accent-dim: #003355;
            --border: #0077bb;
            --border-glow: 0 0 18px #00aaff66, 0 0 40px #0066cc33;
            --neon-blue: #00c8ff;
            --neon-white: #e8f0ff;
            --beacon: #00ddff;
            --beacon-glow: 0 0 30px #00ddff88, 0 0 80px #0088cc44;
            --ocean-dark: #0a1a30;
            --ocean-mid: #0d2440;
            --input-bg: #060e20;
            --button-bg: #0a1228;
            --button-hover: #101c3a;
            --button-active: #080e20;
            --bevel-light: #1a2a44;
            --bevel-dark: #020610;
            --font-display: 'Audiowide', 'Orbitron', sans-serif;
            --font-title: 'Orbitron', 'Audiowide', sans-serif;
            --font-mono: 'Share Tech Mono', 'Exo 2', 'Courier New', monospace;
            --font-body: 'Rajdhani', 'VT323', sans-serif;
            --scanline-opacity: 0.05;
            --text-size-base: 17px;
            --text-size-sm: 13px;
            --text-size-xs: 11px;
            --text-size-lg: 21px;
            --text-size-xl: 26px;
            --text-size-title: 28px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000510;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0a1a35 0%, #000510 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #0d1118;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #1a2a3a, 0 0 0 4px #0a1018, 0 0 0 8px #040810, 0 8px 48px #000000dd, 0 0 60px #0066cc22;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #040a16;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #00ccff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ccffaa, 0 0 24px #0088cc55;
            animation: beaconPulse 2.8s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes beaconPulse {
            0%,
            100% {
                box-shadow: 0 0 10px #00ccffaa, 0 0 24px #0088cc55;
            }
            50% {
                box-shadow: 0 0 20px #00ddffcc, 0 0 40px #00aaff88, 0 0 60px #0066cc44;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #2a4a6a;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #1a3a55;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.7), inset 0 0 12px rgba(0, 0, 0, 0.45);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 20, 40, var(--scanline-opacity)) 0px, rgba(0, 20, 40,
                        var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 5, 15, 0.75) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #050d1a;
            border-bottom: 3px solid #0077bb;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #0a1830;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #00aaff44;
            border-radius: 2px;
            padding: 10px 14px;
            background: #020818;
            position: relative;
            box-shadow: inset 0 0 30px #00336622;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #00bbff;
            box-shadow: 0 0 14px #00aaff99;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #e8f0ff44;
            box-shadow: 0 0 8px #e8f0ff33;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #e8f0ff;
            text-shadow: 0 0 18px #00ccffaa, 0 2px 4px #000, 0 0 50px #0088cc88, 0 0 90px #0044aa44;
            letter-spacing: 4px;
            font-family: var(--font-title);
            line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #5a8aaa;
            letter-spacing: 5px;
            margin-top: 3px;
        }
        .beacon-light {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(ellipse at center, #00ddff66 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            animation: beaconSweep 4s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes beaconSweep {
            0%,
            100% {
                opacity: 0.4;
                transform: translateX(-50%) scale(1);
            }
            50% {
                opacity: 0.9;
                transform: translateX(-50%) scale(1.6);
            }
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 18px;
                letter-spacing: 2px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #1a3050 #04081a;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #04081a;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #1a3050;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #1a3050;
            border-top-color: #243a58;
            border-left-color: #203450;
            border-right-color: #142840;
            border-bottom-color: #0a1828;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
            font-weight: 500;
        }
        .btn:active {
            border-top-color: #142840;
            border-left-color: #142840;
            border-bottom-color: #243a58;
            border-right-color: #203450;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #080e20;
        }
        .btn.accent {
            background: #0a1a30;
            border-color: #0066aa;
            border-top-color: #0088cc;
            border-left-color: #0077bb;
            border-right-color: #004488;
            border-bottom-color: #002244;
            color: #d0e4ff;
            box-shadow: 0 2px 0 #00000044, 0 0 12px #00aaff33;
        }
        .btn.accent:active {
            border-top-color: #004488;
            border-left-color: #004488;
            border-bottom-color: #0088cc;
            border-right-color: #0077bb;
            box-shadow: 0 0px 0 #00000044, 0 0 20px #00ccff55;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .theater-mask {
            position: relative;
            background: #060e20;
            border: 2px solid #0077bb55;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.75);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #040c1c;
            border: 2px solid #00aaff44;
            padding: 15px;
            border-radius: 3px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #00aaff;
            box-shadow: 0 0 24px #00ccff77, 0 0 0 2px #0a1a30;
            object-fit: cover;
            flex-shrink: 0;
            background: #040c1c;
        }
        .speech-bubble {
            flex: 1;
            background: #0a1228;
            border: 2px solid #00aaff55;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #c8d8f0;
            font-size: 16px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #00aaff66 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #040c1c;
            border: 1px solid #1a3a55;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #0a1830;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a6080;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.45;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #0077bb;
            box-shadow: 0 0 20px #00aaff44, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #040c1c;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(2, 5, 16, 0.88) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 13px;
            letter-spacing: 3px;
            color: #e8f0ff;
            text-shadow: 0 0 10px #00ccffcc, 0 0 30px #0088cc88, 0 2px 4px #000000, 0 0 60px #0044aa44;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom, rgba(4, 10, 24, 0.9) 0%, rgba(4, 10, 24, 0.7) 40%, transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 15px;
            letter-spacing: 1.5px;
            color: #e0ecff;
            text-shadow: 0 0 8px #00ccff88, 0 0 20px #00448844, 0 2px 4px #000000;
            background: linear-gradient(to top, rgba(2, 5, 16, 0.9) 0%, rgba(2, 5, 16, 0.6) 50%, transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a6080;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 10px;
                letter-spacing: 2px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 12px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #00aaff55;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #c0d8f0;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 17px;
            text-shadow: 0 0 10px #00aaff44;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #081428;
            border: 1px solid #0077bb44;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 13px;
            color: #00aaff;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 15px;
            color: #c8d8f0;
            font-weight: 600;
        }
        .guide-desc {
            font-size: 14px;
            color: #4a6080;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 13px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 3, 10, 0.95);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #060e20;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #0088cc;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #b8c8e0;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #0a162c;
            border: 2px solid #0088cc66;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #b8c8e0;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #00aaff;
            box-shadow: 0 0 16px #00aaff55;
        }
        .loading-text {
            color: #00ccff;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #030a16;
            border-top: 1px solid #0077bb33;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #2a4a6a;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #3a5880;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #142838;
            color: #3a5880;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #2a4a6a;
            color: #5a80a8;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #c8d8f0;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">BLACK ROCK · CHANNEL 6</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="beacon-light"></div>
                <div class="marquee-inner">
                    <div class="marquee-title">THE LIGHTHOUSE<br>KEEPER</div>
                    <div class="marquee-sub">⏤ BLACK ROCK · 1986 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channelPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🔷 BLACK ROCK LIGHTHOUSE · SIX MONTH POSTING</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('lighthouse_keeper_key') || '';

            const DEFAULT_STATE = {
                episodes: [],
                currentPerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>🌊 The Lighthouse Keeper</h2>
        <p style="text-align:left;">
            <strong>Posting:</strong> Black Rock Lighthouse<br>
            <strong>Term:</strong> Six months, alone.<br>
            <strong>Fate:</strong> Every keeper before has perished. Every keeper after will too.<br>
            <em>"The light must stay lit. Nothing else matters. Not the visitors. Not the whispers from the cove. Not the truth."</em>
        </p>
    `;

            // ── SOUND ENGINE (80s Film Score Style) ──
            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let crossfadeTimeout = null;

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.18;
                    reverbNode.connect(masterGain);
                    masterGain.connect(audioCtx.destination);
                    const compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.value = -24;
                    compressor.knee.value = 30;
                    compressor.ratio.value = 12;
                    compressor.attack.value = 0.003;
                    compressor.release.value = 0.25;
                    masterGain.connect(compressor);
                    compressor.connect(audioCtx.destination);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 1.0;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.35;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 2.5;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.6));
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            // ── 80s FILM SCORE SYNTH ──
            function createWarmPad(ctx, frequency, duration, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.15, now + 0.8);
                gainNode.gain.setValueAtTime(intensity * 0.15, now + duration - 1.5);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.5);

                const osc1 = ctx.createOscillator();
                osc1.type = 'triangle';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'triangle';
                osc2.frequency.value = frequency * 1.005;
                const osc3 = ctx.createOscillator();
                osc3.type = 'sine';
                osc3.frequency.value = frequency / 2;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 1.5;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.15;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 150;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                const drySend = audioCtx.createGain();
                drySend.gain.value = 0.7;
                const wetSend = audioCtx.createGain();
                wetSend.gain.value = 0.3;
                gainNode.connect(drySend);
                gainNode.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);

                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.8);
                osc2.stop(now + duration + 0.8);
                osc3.stop(now + duration + 0.8);
                lfo.stop(now + duration + 0.8);
            }

            function createArpeggio(ctx, rootFreq, duration, pattern, intensity = 0.4) {
                const now = ctx.currentTime;
                const stepTime = duration / pattern.length;
                pattern.forEach((semitone, i) => {
                    const freq = rootFreq * Math.pow(2, semitone / 12);
                    const startTime = now + i * stepTime;
                    const osc = ctx.createOscillator();
                    osc.type = 'square';
                    osc.frequency.value = freq;
                    const gain = ctx.createGain();
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(intensity * 0.12, startTime + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + stepTime * 0.85);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 800;
                    filter.Q.value = 2;
                    osc.connect(filter);
                    filter.connect(gain);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.4;
                    gain.connect(wetSend);
                    wetSend.connect(wetGain);
                    const drySend = ctx.createGain();
                    drySend.gain.value = 0.5;
                    gain.connect(drySend);
                    drySend.connect(dryGain);
                    osc.start(startTime);
                    osc.stop(startTime + stepTime * 0.9);
                });
            }

            function createSting80s(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.25, now + 0.04);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 2.0);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.3);
                osc.frequency.exponentialRampToValueAtTime(80, now + 1.8);

                const osc2 = ctx.createOscillator();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(200, now);
                osc2.frequency.exponentialRampToValueAtTime(800, now + 0.3);
                osc2.frequency.exponentialRampToValueAtTime(150, now + 1.8);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1000;
                filter.Q.value = 1;
                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.5;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);
                osc.start(now);
                osc2.start(now);
                osc.stop(now + 2);
                osc2.stop(now + 2);
            }

            function createThunder(ctx) {
                const now = ctx.currentTime;
                const bufferSize = ctx.sampleRate * 0.6;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.35));
                }
                const source = ctx.createBufferSource();
                source.buffer = buffer;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 120;
                filter.Q.value = 0.5;
                source.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                source.start(now);
                source.stop(now + 1.0);
            }

            function createBell(ctx) {
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 60 + Math.random() * 20;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.35, now + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 4);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                osc.connect(filter);
                filter.connect(gain);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.6;
                gain.connect(wetSend);
                wetSend.connect(wetGain);
                gain.connect(dryGain);
                osc.start(now);
                osc.stop(now + 4);
            }

            function createClimax80s(ctx, intensity = 0.7) {
                const now = ctx.currentTime;
                const duration = 10 + Math.random() * 8;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.4, now + 3);
                gainNode.gain.setValueAtTime(intensity * 0.5, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(80, now);
                osc1.frequency.exponentialRampToValueAtTime(180, now + duration * 0.6);
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(160, now);
                osc2.frequency.exponentialRampToValueAtTime(360, now + duration * 0.6);
                const osc3 = ctx.createOscillator();
                osc3.type = 'square';
                osc3.frequency.setValueAtTime(80, now);
                osc3.frequency.exponentialRampToValueAtTime(280, now + duration * 0.8);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(250, now);
                filter.frequency.exponentialRampToValueAtTime(1400, now + duration);
                filter.Q.value = 2;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.12;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 180;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.45;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);
                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    switch (type) {
                        case 'pad':
                            createWarmPad(ctx, 100 + Math.random() * 50, 25 + Math.random() * 25, intensity);
                            break;
                        case 'sting':
                            createSting80s(ctx, intensity);
                            break;
                        case 'heartbeat':
                            playThump(ctx, ctx.currentTime, 0.7 * intensity);
                            setTimeout(() => playThump(ctx, ctx.currentTime + 0.15, 0.7 * intensity), 150);
                            break;
                        case 'thunder':
                            createThunder(ctx);
                            break;
                        case 'bell':
                            createBell(ctx);
                            break;
                        case 'climax':
                            createClimax80s(ctx, intensity);
                            break;
                        default:
                            console.warn(`Unknown sound type: ${type}`);
                    }
                } catch (err) {
                    console.error(`❌ Error in playSound("${type}"):`, err);
                }
            }

            function playThump(ctx, time, intensity) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(55, time);
                osc.frequency.exponentialRampToValueAtTime(25, time + 0.1);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.7, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(time);
                osc.stop(time + 0.1);
            }

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.25, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'ocean_drone' || type === 'wind_howl') {
                        const bufferSize = ctx.sampleRate * 1;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.4;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'ocean_drone' ? 180 : 500;
                        filter.Q.value = 0.5;
                        noise.connect(filter);
                        filter.connect(gainNode);
                        noise.start(now);
                        source = { noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 90;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) {
                    console.error(`❌ Error in playAmbient("${type}"):`, err);
                }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 300);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 25000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' +
                                apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) { const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`); }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') { throw new Error(
                            'Request timed out. Please try again.'); }
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', moody lighthouse island ocean, 1980s film aesthetic, teal blue tones, grainy cinematic')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) { try { return await generateImage(prompt); } catch (e) {
                        lastError = e;
                        await new Promise(r => setTimeout(r, 20)); } }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) { element.textContent += text.charAt(i); if (onChar) onChar(
                                i);
                            i++; } else { clearInterval(timer);
                            resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David',
                    'Fred', 'Alex', 'Thomas', 'James'
                ];
                let voice = null;
                for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.62;
                utterance.pitch = 0.9;
                speechSynthesis.speak(utterance);

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice)
                            break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.62;
                    utterance.pitch = voiceConfig.pitch || 0.9;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) { currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar); if (cueChecker)
                            cueChecker(currentChar); }
                    };
                    utterance.onend = () => { element.textContent = text; if (cueChecker) cueChecker(text
                            .length);
                        resolve(); };
                    utterance.onerror = (e) => { console.warn('TTS error:', e);
                        element.textContent = text;
                        resolve(); };
                    speechSynthesis.speak(utterance);
                });
            }

            function createNote(ctx, frequency, startTime, duration, gainValue, type = 'triangle') {
                const now = startTime;
                const osc1 = ctx.createOscillator();
                osc1.type = type;
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = type;
                osc2.frequency.value = frequency * 1.006;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                filter.Q.value = 1.8;
                const filterEnv = ctx.createGain();
                filterEnv.gain.setValueAtTime(600, now);
                filterEnv.gain.exponentialRampToValueAtTime(150, now + 0.15);
                filterEnv.gain.exponentialRampToValueAtTime(40, now + duration * 0.7);
                filterEnv.connect(filter.frequency);
                const mainGain = ctx.createGain();
                mainGain.gain.setValueAtTime(0, now);
                mainGain.gain.linearRampToValueAtTime(gainValue * 0.25, now + 0.03);
                mainGain.gain.setValueAtTime(gainValue * 0.25, now + duration * 0.5);
                mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.2);
                osc1.connect(filter);
                osc2.connect(filter);
                filter.connect(mainGain);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.7;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.35;
                mainGain.connect(drySend);
                mainGain.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);
                osc1.start(now);
                osc2.start(now);
                osc1.stop(now + duration + 0.3);
                osc2.stop(now + duration + 0.3);
            }

            function createKick(ctx, time) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(140, time);
                osc.frequency.exponentialRampToValueAtTime(28, time + 0.07);
                const gainBody = ctx.createGain();
                gainBody.gain.setValueAtTime(0.65, time);
                gainBody.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
                osc.connect(gainBody);
                gainBody.connect(dryGain);
                osc.start(time);
                osc.stop(time + 0.18);
            }

            function createSnare(ctx, time) {
                const body = ctx.createOscillator();
                body.type = 'triangle';
                body.frequency.setValueAtTime(180, time);
                body.frequency.exponentialRampToValueAtTime(70, time + 0.07);
                const bodyGain = ctx.createGain();
                bodyGain.gain.setValueAtTime(0.55, time);
                bodyGain.gain.exponentialRampToValueAtTime(0.001, time + 0.09);
                body.connect(bodyGain);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.14, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.025));
                }
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.6, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.11);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                bodyGain.connect(dryGain);
                noiseGain.connect(dryGain);
                body.start(time);
                noise.start(time);
                body.stop(time + 0.09);
                noise.stop(time + 0.14);
            }

            function startSectionScore(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                const perf = gameState.currentPerformance;
                let customScore = null;
                if (perf && perf.soundCues && perf.soundCues.score) { customScore = perf.soundCues.score; }
                const fallbackTheme = SCORE_PATTERNS[themeName] || SCORE_PATTERNS.arrival;
                const theme = (customScore && customScore[themeName]) ? customScore[themeName] : fallbackTheme;
                const rootFreq = 50;
                const beatDuration = 60 / theme.bpm;
                const patternLength = theme.bass.length;
                const ctx = audioCtx;
                let step = 0;
                let nextStepTime = ctx.currentTime;
                const padGain = ctx.createGain();
                padGain.gain.value = 0.08;
                const padOsc1 = ctx.createOscillator();
                padOsc1.type = 'triangle';
                padOsc1.frequency.value = rootFreq;
                const padOsc2 = ctx.createOscillator();
                padOsc2.type = 'triangle';
                padOsc2.frequency.value = rootFreq * 1.5;
                const padOsc3 = ctx.createOscillator();
                padOsc3.type = 'sine';
                padOsc3.frequency.value = rootFreq / 2;
                const padFilter = ctx.createBiquadFilter();
                padFilter.type = 'lowpass';
                padFilter.frequency.value = 350;
                padFilter.Q.value = 1;
                padOsc1.connect(padFilter);
                padOsc2.connect(padFilter);
                padOsc3.connect(padFilter);
                padFilter.connect(padGain);
                const padDry = ctx.createGain();
                padDry.gain.value = 0.5;
                const padWet = ctx.createGain();
                padWet.gain.value = 0.4;
                padGain.connect(padDry);
                padGain.connect(padWet);
                padDry.connect(dryGain);
                padWet.connect(wetGain);
                padOsc1.start();
                padOsc2.start();
                padOsc3.start();
                const stopSources = [padOsc1, padOsc2, padOsc3];
                let timeoutId;

                function scheduleStep() {
                    if (!sectionAmbientActive) return;
                    const now = nextStepTime;
                    const bassSemitone = theme.bass[step % patternLength];
                    const bassFreq = rootFreq * Math.pow(2, bassSemitone / 12);
                    createNote(ctx, bassFreq, now, beatDuration * 0.85, 0.7, 'triangle');
                    const arpSemitone = theme.arp[step % patternLength];
                    const arpFreq = rootFreq * Math.pow(2, arpSemitone / 12);
                    createNote(ctx, arpFreq, now, beatDuration * 0.4, 0.5, 'square');
                    if (theme.kick[step % patternLength]) createKick(ctx, now);
                    if (theme.snare[step % patternLength]) createSnare(ctx, now);
                    step++;
                    nextStepTime += beatDuration;
                    timeoutId = setTimeout(scheduleStep, (nextStepTime - ctx.currentTime) * 1000);
                }
                nextStepTime = ctx.currentTime + 0.05;
                timeoutId = setTimeout(scheduleStep, 50);
                sectionAmbientActive = {
                    stop: () => {
                        clearTimeout(timeoutId);
                        padGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
                        stopSources.forEach(s => { try { s.stop(ctx.currentTime + 0.4); } catch (e) {} });
                        sectionAmbientActive = null;
                    }
                };
            }

            function stopSectionAmbient() {
                if (sectionAmbientActive) { sectionAmbientActive.stop();
                    sectionAmbientActive = null; }
                clearTimeout(crossfadeTimeout);
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system =
                    `You are a sound designer for an 80s thriller film. Return JSON with "sections" (5-6 sections covering the story from 0 to ${length}, each with theme: arrival/isolation/visitor/suspicion/confrontation/finalNight/closing, start_char, end_char), "cues" (at least 35 sound events using types: sting, heartbeat, thunder, bell, climax, pad; each with position, type, optional intensity 0-1), and "score" (keys matching theme names, each with bpm 48-80, bass array of 8 semitone intervals from root 0, arp array of 8 semitones, kick array of 8 numbers 1/0, snare array of 8 numbers 1/0). Return ONLY raw JSON.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user',
                    content: `Story (${length} chars):\n${storyText}`
                }], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try { data = JSON.parse(cleaned); } catch (e) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) { try { data = JSON.parse(match[0].replace(/,\s*([}\]])/g, '$1')); } catch (
                        e2) { throw new Error('Failed to parse soundtrack JSON.'); } } else { throw new Error(
                            'No JSON found.'); }
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                    throw new Error('Missing sections/cues/score');
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char <
                    length) { sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length; }
                const cues = data.cues.map(c => ({ type: c.type, position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7 }));
                const requiredThemes = ['arrival', 'isolation', 'visitor', 'suspicion', 'confrontation',
                    'finalNight', 'closing'
                ];
                const score = {};
                for (const theme of requiredThemes) {
                    score[theme] = data.score[theme] ? {
                        bpm: data.score[theme].bpm || 65,
                        bass: data.score[theme].bass || [0, 0, 7, 7, 0, 0, 7, 7],
                        arp: data.score[theme].arp || [12, 15, 12, 19, 12, 15, 12, 19],
                        kick: data.score[theme].kick || [1, 0, 1, 0, 1, 0, 1, 0],
                        snare: data.score[theme].snare || [0, 0, 0, 1, 0, 0, 0, 1]
                    } : SCORE_PATTERNS[theme] || SCORE_PATTERNS.arrival;
                }
                return { sections: sortedSections, cues, score };
            }

            const KEEPER_TYPES = [
                'Former sailor', 'Ex-soldier', 'Divorced father', 'Quiet widower', 'Young apprentice',
                'Retired coastguard', 'Schoolteacher seeking solitude', 'Writer escaping the city',
                'Former fisherman', 'Man hiding from his past'
            ];
            const VISITOR_TYPES = [
                'Survivor claiming their boat sank', 'Escaped prisoner needing a place to hide',
                'Smuggler looking for hidden cargo', 'Treasure hunter seeking buried valuables',
                'Ex-keeper returning under a false identity', 'Widow claiming her husband disappeared here',
                 'Reporter investigating the missing keepers',
                'Fake coastguard with convincing papers', 'Drifter who rows ashore saying almost nothing',
                'Family whose yacht broke down nearby', 'Former soldier settling an old debt'
            ];
            const MOTIVES = ['Greed', 'Revenge', 'Fear', 'Survival', 'Obsession', 'Desperation', 'Guilt', 'Blackmail',
                'Loyalty', 'Cover-Up'
            ];

            async function generateNewStory() {
                const keeperType = KEEPER_TYPES[Math.floor(Math.random() * KEEPER_TYPES.length)];
                const visitorType = VISITOR_TYPES[Math.floor(Math.random() * VISITOR_TYPES.length)];
                const motive = MOTIVES[Math.floor(Math.random() * MOTIVES.length)];
                const system =
                    `You are a gritty horror writer in the style of Stephen King and Hitchcock. Write tight, brutal prose. No supernatural elements.`;
                const prompt =
                    `Write a 900-1100 word short horror story set in 1986 on Black Rock Lighthouse, a tiny windswept island miles offshore. The keeper is a ${keeperType}. Their six-month posting is almost over. A visitor arrives unexpectedly: a ${visitorType}. Their true motive is ${motive}. Structure: Arrival (the keeper's isolation), The Visitor (someone arrives), Suspicion (inconsistencies appear), Confrontation (truth revealed), Final Night (the island becomes a trap), and Ending (the keeper is dead by dawn). The horror must be purely human – brutal, visceral, grounded. No ghosts, no curses, no dreams. The keeper always dies. Return ONLY a valid JSON object with: title (string), keeper_name (string), keeper_type (string), visitor_description (string), story (full narration, use \\n for line breaks), closing_remark (a chilling final line spoken as the new keeper arrives). Output raw JSON only.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user',
                    content: prompt }], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) throw new Error(
                    'Invalid story structure');
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Dark moody lighthouse island, stormy ocean, 1980s film aesthetic, teal and navy tones, cinematic poster for "${story.title}"`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate poster:', e); }
                gameState.currentPerformance = {
                    title: story.title,
                    keeper_name: story.keeper_name || 'The Keeper',
                    keeper_type: story.keeper_type || keeperType,
                    visitor_description: story.visitor_description || visitorType,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateAndPerform() {
                await generateNewStory();
                if (!gameState.currentPerformance) throw new Error('Failed to generate story');
                const soundtrack = await generateSoundCueSheet(gameState.currentPerformance.rawStoryText);
                gameState.currentPerformance.soundCues = soundtrack;
                saveState();
                await startPerformance();
            }

            async function startPerformance() {
                speechSynthesis.cancel();
                if (window.chTimeout) clearTimeout(window.chTimeout);
                const storyData = gameState.currentPerformance;
                if (!storyData || !storyData.story) { await generateNewStory(); return startPerformance(); }
                let sectionList = null;
                let cueList = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) { cueList = storyData.soundCues.filter(c => c.type && c
                            .position !== undefined); } else if (storyData.soundCues.sections && storyData.soundCues
                        .cues) { sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined); }
                }
                const bubble = document.getElementById('chSpeechBubble');
                const dialogue = document.getElementById('chDialogue');
                const imageEl = document.getElementById('chSegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('chGuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#00aaff';
                bubble.style.boxShadow = '0 0 30px #00ccff88';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('chBackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('chAddEpisodeBtn');
                if (oldAdd) oldAdd.remove();
                const posterContainer = document.getElementById('chPosterContainer');
                const posterTitle = document.getElementById('chPosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) posterTitle.textContent = storyData.title || '';
                } else if (posterContainer) { posterContainer.classList.add('no-image'); }
                const intro =
                    `"Black Rock Lighthouse. Six months. My name is ${storyData.keeper_name}. I am the keeper. The supply boat left this morning. I am alone now. But not for long..."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 45);
                await new Promise(r => setTimeout(r, 1500));
                if (sectionList && sectionList.length > 0) { startSectionScore(sectionList[0].theme); } else {
                    startSectionScore('arrival'); }
                const storyText = storyData.rawStoryText || storyData.story;
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b.start_char) :
                        [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <=
                            idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) { currentTheme = sec.theme;
                                startSectionScore(currentTheme); }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) { triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity); }
                            cueIdx++;
                        }
                    };
                }
                dialogue.textContent = '';
                if (cueChecker) { await speakAndTypeSynced(dialogue, storyText, { rate: 0.62, pitch: 0.9 }, (idx) =>
                        cueChecker(idx)); } else { await speakAndTypeSynced(dialogue, storyText, { rate: 0.62,
                        pitch: 0.9 }); }
                await new Promise(r => setTimeout(r, 1200));
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#c8d8f0';
                dialogue.appendChild(closingLine);
                speakTextMale(closing);
                await typewriterEffect(closingLine, closing, 45);
                await new Promise(r => setTimeout(r, 1000));
                const curtainText = document.createElement('p');
                curtainText.textContent = '— The light keeps turning. The keeper does not. —';
                stopSectionAmbient();
                curtainText.style.color = '#4a6080';
                curtainText.style.fontSize = '13px';
                dialogue.appendChild(curtainText);
                stopAmbient();
                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Return to Island';
                leaveBtn.addEventListener('click', () => { leaveIsland(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'chAddEpisodeBtn';
                addBtn.textContent = '➕ Save Log';
                addBtn.addEventListener('click', () => { addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Saved'; });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

                const perf = gameState.currentPerformance;

            function init() {

                document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e
                        .currentTarget) closeModal(); });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) { showModal(HOST_BIO); }
                });
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
                if (!apiKey) { setTimeout(() => document.getElementById('resetApiBtn').click(), 800); }
            }
            init();
        })();
    </script>
</body>
</html>
