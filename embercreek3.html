<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VIDEO VAULT NETWORK · 1987</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a08;
            --panel-bg: #0d0f0d;
            --text: #33ff44;
            --text-dim: #1a7a22;
            --text-bright: #66ff77;
            --accent: #ff8833;
            --accent-dim: #aa5522;
            --accent2: #ff5599;
            --border: #33ff44;
            --border-glow: 0 0 6px #33ff4466;
            --danger: #ff4444;
            --danger-glow: 0 0 6px #ff444466;
            --input-bg: #111511;
            --button-bg: #1a2a1a;
            --button-hover: #1f3520;
            --vhs-blue: #4488ff;
            --vhs-orange: #ff8844;
            --vhs-pink: #ff5599;
            --font-display: 'VT323', 'Courier New', monospace;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --scanline-opacity: 0.05;
        }
        .pda[data-theme="amber"] {
            --text: #ffb000;
            --text-dim: #aa7700;
            --text-bright: #ffcc44;
            --accent: #ff6600;
            --accent-dim: #884400;
            --border: #ffb000;
            --border-glow: 0 0 6px #ffb00066;
            --input-bg: #1a1300;
            --button-bg: #2a2000;
            --button-hover: #332800;
            --vhs-blue: #88aaff;
            --vhs-orange: #ff9944;
            --vhs-pink: #ff77aa;
        }
        .pda[data-theme="pink"] {
            --text: #ff66aa;
            --text-dim: #aa3377;
            --text-bright: #ff88cc;
            --accent: #ff3388;
            --accent-dim: #882244;
            --border: #ff66aa;
            --border-glow: 0 0 6px #ff66aa66;
            --input-bg: #1a0a14;
            --button-bg: #2a1420;
            --button-hover: #331a28;
            --vhs-blue: #88aaff;
            --vhs-orange: #ffaa66;
            --vhs-pink: #ff88bb;
        }
        .pda[data-theme="blue"] {
            --text: #44aaff;
            --text-dim: #2266aa;
            --text-bright: #77ccff;
            --accent: #0088ff;
            --accent-dim: #004488;
            --border: #44aaff;
            --border-glow: 0 0 6px #44aaff66;
            --input-bg: #0a1020;
            --button-bg: #14202a;
            --button-hover: #1a2833;
            --vhs-blue: #66bbff;
            --vhs-orange: #ff9944;
            --vhs-pink: #ff77aa;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: var(--font-display);
            padding: 12px;
            background-image: radial-gradient(ellipse at center, #0a0f0a 0%, #020302 100%);
        }
        .pda {
            max-width: 820px;
            width: 100%;
            height: 94vh;
            max-height: 980px;
            background: #0b0d0b;
            border-radius: 18px;
            border: 3px solid #2a3a2a;
            box-shadow: 0 0 30px #33ff4422, 0 0 80px #000000aa, 0 8px 32px #000000cc, inset 0 1px 0 #ffffff08,
                inset 0 0 60px #00000044;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px,
                    rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 15px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.45) 100%);
            border-radius: 15px;
            pointer-events: none;
        }
        .status-bar {
            padding: 10px 16px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text);
            text-shadow: 0 0 4px var(--text-dim);
            border-bottom: 1px solid #1a2a1a;
            background: #0a0d0a;
            letter-spacing: 1px;
            z-index: 10;
            position: relative;
        }
        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: var(--text);
            border-radius: 50%;
            margin-right: 6px;
            animation: blinkDot 1.6s infinite;
            box-shadow: 0 0 6px var(--text);
        }
        @keyframes blinkDot {
            0%,
            70%,
            100% {
                opacity: 1;
            }
            80%,
            90% {
                opacity: 0.2;
            }
        }
        .notification-bell {
            cursor: pointer;
            position: relative;
            font-size: 16px;
            margin-left: 12px;
        }
        .notification-badge {
            background: var(--accent);
            color: #000;
            font-size: 10px;
            font-weight: bold;
            border-radius: 50%;
            padding: 1px 5px;
            position: absolute;
            top: -6px;
            right: -10px;
            display: none;
            line-height: 1;
        }
        .title-bar {
            text-align: center;
            padding: 8px 16px 4px;
            font-family: var(--font-display);
            font-size: 26px;
            letter-spacing: 3px;
            color: var(--text);
            text-shadow: 0 0 12px var(--text), 0 0 24px var(--text-dim), 0 0 40px #33ff4433;
            background: #0a0d0a;
            border-bottom: 1px solid #1a2a1a;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .main-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text);
            background: var(--panel-bg);
            scrollbar-width: thin;
            scrollbar-color: #1a2a1a #0a0d0a;
            position: relative;
            z-index: 5;
        }
        .menu-item {
            display: block;
            padding: 8px 14px;
            margin: 4px 0;
            border: 1px solid #1a2a1a;
            background: var(--button-bg);
            color: var(--text);
            cursor: pointer;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.15s;
            font-family: var(--font-display);
            font-size: 16px;
            letter-spacing: 1px;
        }
        .menu-item:hover {
            background: var(--button-hover);
            border-color: var(--text);
            box-shadow: var(--border-glow);
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #1a3a1a;
            padding: 6px 14px;
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 15px;
            letter-spacing: 1px;
            transition: all 0.2s;
            text-shadow: 0 0 4px var(--text-dim);
            text-transform: uppercase;
            margin: 2px;
        }
        .btn:hover {
            background: var(--button-hover);
            border-color: var(--text);
            box-shadow: var(--border-glow);
        }
        .btn.accent {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 8px var(--accent-dim);
        }
        .btn.accent:hover {
            box-shadow: 0 0 16px var(--accent);
        }
        .thumbs-btn {
            background: transparent;
            border: 1px solid var(--text-dim);
            padding: 4px 10px;
            font-size: 13px;
            margin: 2px 4px;
            cursor: pointer;
            border-radius: 14px;
            font-family: var(--font-display);
            letter-spacing: 1px;
            transition: all 0.15s;
            color: var(--text);
        }
        .thumbs-btn.active-like {
            background: #1a3a1a;
            border-color: var(--text-bright);
            box-shadow: 0 0 6px var(--text);
        }
        .thumbs-btn.active-dislike {
            background: #3a1a1a;
            border-color: var(--danger);
            box-shadow: 0 0 6px var(--danger);
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #0d110d;
            border-radius: 16px;
            width: 480px;
            max-width: 94vw;
            padding: 20px;
            border: 2px solid #2a3a2a;
            box-shadow: 0 0 40px #33ff4422;
            font-family: var(--font-mono);
            color: var(--text);
            max-height: 86vh;
            overflow-y: auto;
        }
        .input-field {
            background: var(--input-bg);
            border: 1px solid #1a2a1a;
            border-radius: 10px;
            padding: 8px 12px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 13px;
            outline: none;
            width: 100%;
            margin: 5px 0;
        }
        textarea.input-field {
            resize: vertical;
            min-height: 60px;
        }
        select.input-field {
            cursor: pointer;
        }
        .unread-badge {
            background: var(--accent);
            color: #000;
            font-size: 10px;
            font-weight: bold;
            border-radius: 50%;
            padding: 2px 6px;
            margin-left: 6px;
        }
        hr {
            border-color: #1a2a1a;
            margin: 10px 0;
        }
        .video-card {
            background: #0f140f;
            padding: 10px;
            margin: 6px 0;
            border-radius: 8px;
            border: 1px solid #1a2a1a;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .video-card:hover {
            border-color: var(--text);
            box-shadow: var(--border-glow);
        }
        .video-thumb {
            width: 80px;
            height: 56px;
            background: #0a0d0a;
            border: 1px solid #1a2a1a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: var(--text-dim);
            text-align: center;
            flex-shrink: 0;
            overflow: hidden;
            white-space: pre;
            line-height: 1.1;
        }
        .video-category-tag {
            font-size: 9px;
            background: #1a2a1a;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
            margin-right: 6px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .subscriber-count {
            font-size: 11px;
            color: var(--accent);
            text-shadow: 0 0 4px var(--accent-dim);
        }
        .trending-badge {
            background: var(--vhs-orange);
            color: #000;
            font-size: 9px;
            padding: 2px 7px;
            border-radius: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .notification-item {
            padding: 7px;
            margin: 4px 0;
            background: #0f140f;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .notification-item.unread {
            border-left: 3px solid var(--accent);
        }
        .comment-block {
            background: #0a0f0a;
            padding: 7px;
            margin: 3px 0;
            border-radius: 6px;
            border-left: 2px solid #1a3a1a;
            font-size: 12px;
        }
        .channel-header {
            text-align: center;
            padding: 12px;
            background: #0f140f;
            border-radius: 10px;
            border: 1px solid #1a2a1a;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="pda" data-theme="default">
        <div class="crt-overlay"></div>
        <div class="status-bar">
            <span><span class="status-dot"></span>ONLINE</span>
            <span id="statusTime">Day 1 08:00</span>
            <span style="display:flex; align-items:center;">VIDEO VAULT NETWORK
                <span class="notification-bell" id="notifBell">📼<span class="notification-badge" id="notifBadge">0</span></span>
            </span>
        </div>
        <div class="title-bar">📼 VIDEO VAULT NETWORK <span style="font-size:10px;letter-spacing:2px;color:#1a5a1a;">EST.
                1987</span></div>
        <div class="main-area" id="mainScreen"></div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>
    <div id="inboxModal" class="modal"><div class="modal-content" id="inboxModalContent"></div></div>
    <script>
        const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
        const MODEL = 'mistral-small-latest';
        let apiKey = localStorage.getItem('mistral_api_key') || '';
        let world = null;
        let currentTheme = localStorage.getItem('vault_theme') || 'default';
        const LOCATIONS = ["Your House", "Main Street", "Video Rental Store", "Diner", "General Store", "Sheriff's Office",
            "Library", "Park", "Lake", "Gas Station", "Church", "Motel", "School"
        ];
        const VIDEO_CATEGORIES = ['🎬 Action', '😂 Comedy', '👻 Horror', '🚀 Sci-Fi', '🎵 Music Video', '📺 Drama',
            '🎨 Animation', '🏆 Sports', '📹 Home Video', '🎓 Educational', '🎭 Other'
        ];
        const VIDEO_FORMATS = ['VHS', 'Betamax', '8mm Film', 'VHS-C', 'LaserDisc'];
        const HARDCODED_PERSONALITIES = [
            { style: "the film buff", traits: ["cinephile", "detail-oriented", "quotes-movies", "analytical"] },
            { style: "the home video enthusiast", traits: ["family-oriented", "nostalgic", "amateur-filmmaker",
                    "enthusiastic"
                ] },
            { style: "the horror fanatic", traits: ["gore-lover", "night-owl", "collector", "excitable"] },
            { style: "the art film snob", traits: ["pretentious", "black-and-white-lover", "subtitles-purist",
                "discerning"] },
            { style: "the action junkie", traits: ["explosion-lover", "one-liner-quoter", "high-energy", "testosterone-fueled"
                ] },
            { style: "the comedy collector", traits: ["laughter-filled", "impressionist", "gag-reel-hoarder",
                "lighthearted"] },
            { style: "the sci-fi dreamer", traits: ["futurist", "special-effects-admirer", "Star-Trek-quoter",
                "imaginative"] },
            { style: "the music video archivist", traits: ["MTV-addict", "concert-recorder", "audio-snob", "trendy"] },
            { style: "the documentary truth-seeker", traits: ["investigative", "serious", "fact-checker", "earnest"] },
            { style: "the animation lover", traits: ["cartoon-hoarder", "cel-collector", "whimsical", "creative"] },
            { style: "the sports replay guru", traits: ["stats-obsessed", "play-by-play-commentator", "competitive",
                    "loud"
                ] },
        ];

        const uid = () => Date.now().toString(36) + '-' + Math.random().toString(36).substr(2, 8);
        let audioCtx = null;

        function ensureAudio() { if (!audioCtx) { try { audioCtx = new(window.AudioContext || window.webkitAudioContext)
                (); } catch (e) { return false; } } if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {}); return audioCtx
                .state !== 'closed'; }

        function playClick() { if (!ensureAudio()) return;
            const t = audioCtx.currentTime,
                o = audioCtx.createOscillator(),
                g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.type = 'sine';
            o.frequency.setValueAtTime(700, t);
            o.frequency.exponentialRampToValueAtTime(500, t + 0.06);
            g.gain.setValueAtTime(0.08, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
            o.start(t);
            o.stop(t + 0.08); }

        function playNotification() { if (!ensureAudio()) return;
            const t = audioCtx.currentTime,
                o = audioCtx.createOscillator(),
                g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.type = 'sine';
            o.frequency.setValueAtTime(880, t);
            g.gain.setValueAtTime(0.1, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
            o.start(t);
            o.stop(t + 0.12); }

        function saveWorld() { localStorage.setItem('video_vault_world', JSON.stringify(world)); }

        function loadWorld() {
            const saved = localStorage.getItem('video_vault_world');
            if (saved) {
                world = JSON.parse(saved);
                if (!world.social) world.social = {};
                if (!world.social.channels) world.social.channels = {};
                if (!world.social.videos) world.social.videos = [];
                if (!world.social.notifications) world.social.notifications = [];
                if (!world.social.subscriptions) world.social.subscriptions = [];
                world.social.videos.forEach(v => { if (!v.likes) v.likes = []; if (!v.dislikes) v.dislikes = []; if (!v
                        .comments) v.comments = []; if (!v.views) v.views = 0; if (!v.format) v.format =
                        'VHS'; });
                world.npcs.forEach(n => {
                    if (!world.social.channels[n.id]) world.social.channels[n.id] = { description: n.bio || '',
                        bannerASCII: '  ╔══════════╗\n  ║  CHANNEL  ║\n  ╚══════════╝', subscribers: [] };
                    if (!world.social.channels[n.id].subscribers) world.social.channels[n.id].subscribers = [];
                });
                if (!world.social.channels[world.player.id]) world.social.channels[world.player.id] = { description: 'My Video Vault channel.',
                    bannerASCII: '  ╔══════════╗\n  ║ MY CHANNEL║\n  ╚══════════╝', subscribers: [] };
                return true;
            }
            return false;
        }

        async function mistralChat(messages, maxTok = 3000, jsonMode = true) {
            if (!apiKey) throw new Error('No API key');
            const body = { model: MODEL, messages, temperature: 0.9, max_tokens: maxTok };
            if (jsonMode) body.response_format = { type: "json_object" };
            const res = await fetch(MISTRAL_ENDPOINT, { method: 'POST', headers: { 'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + apiKey }, body: JSON.stringify(body) });
            if (!res.ok) throw new Error('API ' + res.status);
            const data = await res.json();
            let content = data.choices[0].message.content.trim();
            if (jsonMode) { content = content.replace(/^```json\s*/, '').replace(/```\s*$/, '').trim(); try { return JSON.parse(
                        content); } catch (e) { throw new Error('Invalid JSON from AI'); } }
            return content;
        }

        function esc(s) { return String(s ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]); }

        function getNpcById(id) { return world.npcs.find(n => n.id === id); }

        function getTotalGameMinutes() { return world.time.day * 1440 + world.time.hour * 60 + world.time.minute; }

        function timeStr() { return `${String(world.time.hour).padStart(2,'0')}:${String(world.time.minute).padStart(2,'0')}`; }

        function updateStatusBar() {
            document.getElementById('statusTime').textContent = `Day ${world.time.day} ${timeStr()}`;
            updateNotifBadge();
        }

        function applyTheme(t) { document.querySelector('.pda').setAttribute('data-theme', t); }

        function addNotification(fromId, toId, type, text, linkData) {
            if (toId !== world.player.id) return;
            world.social.notifications.push({
                id: uid(),
                fromId,
                toId,
                type,
                text,
                read: false,
                timestamp: getTotalGameMinutes(),
                linkData: linkData || {}
            });
            updateNotifBadge();
            playNotification();
            saveWorld();
        }

        function updateNotifBadge() {
            const badge = document.getElementById('notifBadge');
            if (!world || !world.social.notifications) return;
            const unread = world.social.notifications.filter(n => !n.read).length;
            badge.textContent = unread;
            badge.style.display = unread > 0 ? 'block' : 'none';
        }

        function showNotifications() {
            const notifs = world.social.notifications.slice().reverse();
            let html =
                `<h2>📼 Notifications</h2><button class="btn" id="backNotifBtn">⬅️ Back</button><hr>`;
            if (notifs.length === 0) html += '<p>No notifications yet.</p>';
            notifs.forEach(n => {
                const fromNpc = getNpcById(n.fromId);
                const fromName = fromNpc ? fromNpc.name : 'Someone';
                const time =
                    `Day ${Math.floor(n.timestamp/1440)} ${String(Math.floor(n.timestamp/60)%24).padStart(2,'0')}:${String(n.timestamp%60).padStart(2,'0')}`;
                html +=
                    `<div class="notification-item ${n.read?'':'unread'}" data-nid="${n.id}" data-linktype="${n.linkData?.type||''}" data-linkid="${n.linkData?.id||''}">
            <strong>${esc(fromName)}</strong> ${esc(n.text)} <small style="color:var(--text-dim);">${time}</small>
          </div>`;
            });
            document.getElementById('mainScreen').innerHTML = html;
            document.getElementById('backNotifBtn').onclick = () => { playClick();
                showMainMenu(); };
            document.querySelectorAll('.notification-item').forEach(el => {
                el.onclick = () => {
                    playClick();
                    const nid = el.dataset.nid;
                    const notif = world.social.notifications.find(n => n.id === nid);
                    if (notif) notif.read = true;
                    saveWorld();
                    updateNotifBadge();
                    const linkType = el.dataset.linktype;
                    const linkId = el.dataset.linkid;
                    if (linkType === 'video' && linkId) watchVideo(linkId);
                    else if (linkType === 'channel' && linkId) viewChannel(linkId);
                    else showMainMenu();
                };
            });
        }

        function getChannelSubCount(userId) {
            return (world.social.channels[userId]?.subscribers || []).length;
        }

        function isSubscribed(userId) {
            return world.social.subscriptions.includes(userId);
        }

        function toggleSubscription(userId, callback) {
            if (isSubscribed(userId)) {
                world.social.subscriptions = world.social.subscriptions.filter(s => s !== userId);
                const ch = world.social.channels[userId];
                if (ch) ch.subscribers = ch.subscribers.filter(s => s !== world.player.id);
            } else {
                world.social.subscriptions.push(userId);
                const ch = world.social.channels[userId];
                if (ch) ch.subscribers.push(world.player.id);
                if (userId !== world.player.id)
                    addNotification(world.player.id, userId, 'subscribe', 'subscribed to your channel.',
                { type: 'channel', id: world.player.id });
            }
            saveWorld();
            if (callback) callback();
        }

        // ──────────────────────── MAIN MENU ────────────────────────

        function toggleLikeDislike(video, type, callback) {
            if (type === 'like') {
                if (video.likes.includes(world.player.id)) {
                    video.likes = video.likes.filter(id => id !== world.player.id);
                } else {
                    video.likes.push(world.player.id);
                    video.dislikes = video.dislikes.filter(id => id !== world.player.id);
                    if (video.creatorId !== world.player.id)
                        addNotification(world.player.id, video.creatorId, 'like', `liked your video "${video.title}".`,
                    { type: 'video', id: video.id });
                }
            } else {
                if (video.dislikes.includes(world.player.id)) {
                    video.dislikes = video.dislikes.filter(id => id !== world.player.id);
                } else {
                    video.dislikes.push(world.player.id);

            // ──────────────────────── SEARCH (NOW WITH AI GENERATION) ────────────────────────
    function showSearch() {
        let html = `
        <h2>🔍 Search Videos</h2><button class="btn" id="backSearchBtn">⬅️ Back</button>
        <div style="background:#0f140f;padding:12px;border-radius:8px;margin:8px 0;">
          <input class="input-field" id="searchQuery" placeholder="Search by title, creator, or description...">
          <select class="input-field" id="searchCategory"><option value="">All Categories</option>${VIDEO_CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
          <button class="btn" id="searchBtn">🔍 Search</button>
        </div><div id="searchResults">Type a keyword and press Search or Enter.</div>`;
        document.getElementById('mainScreen').innerHTML = html;
        document.getElementById('backSearchBtn').onclick = () => { playClick();
            showMainMenu(); };

        const executeSearch = async () => {
            const query = document.getElementById('searchQuery').value.trim().toLowerCase();
            const cat = document.getElementById('searchCategory').value;
            const resDiv = document.getElementById('searchResults');
            resDiv.innerHTML = 'Searching...';

            // 1. Local filter
            let results = world.social.videos.filter(v => {
                if (cat && v.category !== cat) return false;
                if (!query) return true;
                const creator = v.creatorId === world.player.id ? world.player : getNpcById(v.creatorId);
                const creatorName = (creator?.name || '').toLowerCase();
                return v.title.toLowerCase().includes(query) ||
                    v.description.toLowerCase().includes(query) ||
                    creatorName.includes(query);
            }).sort((a, b) => b.timestamp - a.timestamp);

            // 2. If less than 5 results, ask AI to generate more matching videos
            if (results.length < 5 && query) {
                const needed = 5 - results.length;
                try {
                    const catFilter = cat ? ` in the category "${cat}"` : '';
                    const prompt = `You are the Video Vault Network in 1987. Generate ${needed} new video listings that match the search "${query}"${catFilter}. Return a JSON object with key "videos" containing an array of objects. Each object must have: "title" (max 60 chars), "description" (1-2 sentences), "runtime" (e.g., "8 min" or "1h 12m"), "asciiThumbnail" (a tiny 3-line ASCII art thumbnail, max 12 chars wide), and "category" (must be one of: ${VIDEO_CATEGORIES.join(', ')}). Output ONLY valid JSON.`;
                    const data = await mistralChat([{ role: "user", content: prompt }], 600, true);
                    const newVideos = data?.videos || data?.data || data;
                    if (Array.isArray(newVideos)) {
                        const allNpcs = world.npcs;
                        newVideos.forEach(v => {
                            const creator = allNpcs[Math.floor(Math.random() * allNpcs.length)];
                            if (!creator) return;
                            const video = {
                                id: uid(),
                                title: v.title || 'Untitled',
                                description: v.description || '',
                                category: v.category || cat || VIDEO_CATEGORIES[Math.floor(Math.random() * VIDEO_CATEGORIES.length)],
                                format: VIDEO_FORMATS[Math.floor(Math.random() * VIDEO_FORMATS.length)],
                                runtime: v.runtime || '10 min',
                                asciiThumbnail: v.asciiThumbnail || '  ████████\n  ██    ██\n  ████████',
                                creatorId: creator.id,
                                timestamp: getTotalGameMinutes(),
                                views: Math.floor(Math.random() * 20),
                                likes: [],
                                dislikes: [],
                                comments: []
                            };
                            world.social.videos.push(video);
                            results.push(video);
                        });
                        saveWorld();
                    }
                } catch (e) {
                    console.warn('AI search generation failed', e);
                }
            }

            // 3. Display results
            if (results.length === 0) {
                resDiv.innerHTML = '<p style="color:var(--text-dim);">No videos found. Try a different search.</p>';
            } else {
                resDiv.innerHTML = results.slice(0, 20).map(v => {
                    const creator = v.creatorId === world.player.id ? world.player : getNpcById(v.creatorId);
                    const netLikes = v.likes.length - v.dislikes.length;
                    return `<div class="video-card" data-videoid="${v.id}">
                <div class="video-thumb">${esc((v.asciiThumbnail||'████').split('\n').slice(0,3).join('\n'))}</div>
                <div style="flex:1;"><strong>${esc(v.title)}</strong>
                <div style="font-size:10px;color:var(--text-dim);">${esc(v.category)} · by ${esc(creator?.name||'Unknown')} · 👍 ${netLikes>=0?'+':''}${netLikes}</div></div>
              </div>`;
                }).join('');
                document.querySelectorAll('#searchResults .video-card').forEach(el => el.onclick = () => { playClick();
                    watchVideo(el.dataset.videoid); });
            }
        };

        document.getElementById('searchBtn').onclick = () => { playClick();
            executeSearch(); };
        document.getElementById('searchQuery').addEventListener('keypress', e => { if (e.key === 'Enter') {
                playClick();
                executeSearch(); } });
    }


        // ──────────────────────── INBOX ────────────────────────
        function showInboxList() {
            if (!world.inbox || !world.inbox.length) {
                document.getElementById('mainScreen').innerHTML =
                    `<h2>📬 Private Mail</h2><p>No messages.</p><button class="btn" id="backInbox">⬅️ Back</button>`;
                document.getElementById('backInbox').onclick = () => { playClick();
                    showMainMenu(); };
                return;
            }
            let html = `<h2>📬 Private Mail</h2><button class="btn" id="backInbox">⬅️ Back</button>`;
            world.inbox.forEach(thread => {
                const npc = getNpcById(thread.npcId);
                if (!npc) return;
                const unread = thread.messages.filter(m => m.sender === 'npc' && !m.read).length;
                html +=
                    `<div class="menu-item" data-npcid="${thread.npcId}">${esc(npc.name)} ${unread?`<span class="unread-badge">${unread}</span>`:''}</div>`;
            });
            document.getElementById('mainScreen').innerHTML = html;
            document.getElementById('backInbox').onclick = () => { playClick();
                showMainMenu(); };
            document.querySelectorAll('.menu-item[data-npcid]').forEach(el => el.onclick = () => { playClick();
                openChat(el.dataset.npcid); });
        }

        function openChat(npcId) {
            const npc = getNpcById(npcId);
            if (!npc) return;
            let thread = world.inbox.find(t => t.npcId === npcId);
            if (!thread) { thread = { npcId, messages: [] };
                world.inbox.push(thread); }
            thread.messages.forEach(m => { if (m.sender === 'npc') m.read = true; });
            saveWorld();
            const content = document.getElementById('inboxModalContent');
            content.innerHTML = `
            <h2>💬 Chat with ${esc(npc.name)}</h2>
            <div id="chatMessages" style="max-height:250px;overflow-y:auto;background:#0a0d0a;padding:8px;border-radius:6px;margin-bottom:8px;">
              ${thread.messages.map(m=>`<div style="margin:4px 0;"><strong>${m.sender==='player'?'You':esc(npc.name)}:</strong> ${esc(m.text)}</div>`).join('')}
            </div>
            <input class="input-field" id="chatInput" placeholder="Type message...">
            <button class="btn" id="sendChatBtn">Send</button>
            <button class="btn" id="closeChatBtn">Close</button>
          `;
            document.getElementById('inboxModal').style.display = 'flex';
            document.getElementById('sendChatBtn').onclick = () => sendChatMessage(npcId);
            document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter')
                    sendChatMessage(npcId); });
            document.getElementById('closeChatBtn').onclick = () => { playClick();
                document.getElementById('inboxModal').style.display = 'none'; };
            document.getElementById('inboxModal').onclick = e => { if (e.target === document.getElementById(
                    'inboxModal')) { playClick();
                    document.getElementById('inboxModal').style.display = 'none'; } };
        }

        async function sendChatMessage(npcId) {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            const npc = getNpcById(npcId);
            let thread = world.inbox.find(t => t.npcId === npcId);
            if (!thread) { thread = { npcId, messages: [] };
                world.inbox.push(thread); }
            thread.messages.push({ sender: 'player', text, read: true, timestamp: Date.now() });
            document.getElementById('chatMessages').innerHTML += `<div><strong>You:</strong> ${esc(text)}</div>`;
            saveWorld();
            try {
                const systemPrompt =
                    `You are ${npc.name}, a resident of Ember Creek in 1987. Personality: ${npc.personality}. Reply to the player's private message. Keep it 1-2 sentences. Output ONLY the reply text.`;
                const reply = await mistralChat([{ role: "system", content: systemPrompt }, { role: "user", content: text }],
                    150, false);
                thread.messages.push({ sender: 'npc', text: reply, read: true, timestamp: Date.now() });
                document.getElementById('chatMessages').innerHTML +=
                    `<div><strong>${esc(npc.name)}:</strong> ${esc(reply)}</div>`;
                saveWorld();
            } catch (e) {}
        }

async function maybeNpcReplyToComment() {
    // Only do this sometimes
    if (Math.random() > 0.25) return;
    
    const allVideos = world.social.videos;
    if (!allVideos.length) return;
    
    // Prefer a video that has at least one comment
    const videosWithComments = allVideos.filter(v => v.comments.length > 0);
    if (videosWithComments.length === 0) return;
    
    // Pick a video (weighted toward player's videos)
    const playerVids = videosWithComments.filter(v => v.creatorId === world.player.id);
    const chosenVideo = (playerVids.length > 0 && Math.random() < 0.7) 
        ? playerVids[Math.floor(Math.random() * playerVids.length)]
        : videosWithComments[Math.floor(Math.random() * videosWithComments.length)];
    
    if (!chosenVideo) return;
    
    // Pick a random comment from that video
    const comments = chosenVideo.comments;
    const randomComment = comments[Math.floor(Math.random() * comments.length)];
    if (!randomComment) return;
    
    // Choose a random NPC (preferably not the video creator or comment author, but any NPC will do)
    const allNpcs = world.npcs;
    if (!allNpcs.length) return;
    const npc = allNpcs[Math.floor(Math.random() * allNpcs.length)];
    if (!npc || npc.id === randomComment.authorId) return; // Don't reply to own comment
    
    // Get names
    const commentAuthor = randomComment.authorId === world.player.id 
        ? world.player 
        : getNpcById(randomComment.authorId);
    const commentAuthorName = commentAuthor ? commentAuthor.name : 'Someone';
    
    try {
        const prompt = `You are ${npc.name}, a ${npc.personality.join(', ')} resident of Ember Creek in 1987.
You're reading comments on the video "${chosenVideo.title}".
Someone wrote: "${randomComment.text}" (by ${commentAuthorName}).
Write a short reply (1 sentence) as your character, reacting to that comment.
Output ONLY the reply text.`;
        
        const replyText = await mistralChat([{ role: "user", content: prompt }], 120, false);
        if (!replyText) return;
        
        // Add the reply as a new comment
        chosenVideo.comments.push({
            authorId: npc.id,
            text: replyText,
            timestamp: getTotalGameMinutes()
        });
        
        // Notify the original comment author if it's the player
        if (randomComment.authorId === world.player.id) {
            addNotification(
                npc.id, 
                world.player.id, 
                'comment_reply',
                `replied to your comment on "${chosenVideo.title}": "${replyText.substring(0, 40)}..."`,
                { type: 'video', id: chosenVideo.id }
            );
        }
        // Optionally notify the video creator if someone replied to a comment on their video
        else if (chosenVideo.creatorId === world.player.id && randomComment.authorId !== world.player.id) {
            addNotification(
                npc.id, 
                world.player.id, 
                'comment_reply',
                `replied to a comment on your video "${chosenVideo.title}".`,
                { type: 'video', id: chosenVideo.id }
            );
        }
        
        saveWorld();
    } catch (e) {
        console.warn('NPC comment reply failed', e);
    }
}
        // ──────────────────────── NPC AUTONOMOUS INTERACTIONS ────────────────────────
        async function generateNpcInteractions() {
            if (Math.random() > 0.3) return;
            const allNpcs = world.npcs;
            if (!allNpcs.length) return;
            const playerVideos = world.social.videos.filter(v => v.creatorId === world.player.id);

await maybeNpcReplyToComment();

            // NPC uploads a video
            const uploader = allNpcs[Math.floor(Math.random() * allNpcs.length)];
            if (uploader && Math.random() < 0.35) {
                try {
                    const cat = VIDEO_CATEGORIES[Math.floor(Math.random() * VIDEO_CATEGORIES.length)];
                    const fmt = VIDEO_FORMATS[Math.floor(Math.random() * VIDEO_FORMATS.length)];
                    const prompt =
                        `You are ${uploader.name}, a ${uploader.personality} resident of Ember Creek in 1987. You're uploading a video to the Video Vault Network in the category "${cat}". Return JSON with keys: "title" (max 60 chars, catchy), "description" (2-3 sentences describing the video content), "runtime" (e.g., "8 min" or "1h 22m"), "asciiThumbnail" (a tiny 3-line ASCII art thumbnail, max 12 chars wide). Output ONLY valid JSON.`;
                    const data = await mistralChat([{ role: "user", content: prompt }], 400, true);
                    const video = {
                        id: uid(),
                        title: data.title || 'Untitled Video',
                        description: data.description || 'A video by ' + uploader.name,
                        category: cat,
                        format: fmt,
                        runtime: data.runtime || '15 min',
                        asciiThumbnail: data.asciiThumbnail || '  ████████\n  ██    ██\n  ████████',
                        creatorId: uploader.id,
                        timestamp: getTotalGameMinutes(),
                        views: 0,
                        likes: [],
                        dislikes: [],
                        comments: []
                    };
                    world.social.videos.push(video);
                    // Notify subscribers
                    const subs = world.social.channels[uploader.id]?.subscribers || [];
                    subs.forEach(subId => {
                        addNotification(uploader.id, subId, 'new_video',
                            `${uploader.name} uploaded a new video: "${video.title}".`,
                    { type: 'video', id: video.id });
                    });
                    saveWorld();
                } catch (e) {}
            }

            // NPC likes/comments on player videos
            if (playerVideos.length > 0 && Math.random() < 0.5) {
                const targetVideo = playerVideos[Math.floor(Math.random() * playerVideos.length)];
                const interactor = allNpcs[Math.floor(Math.random() * allNpcs.length)];
                if (interactor && interactor.id !== world.player.id) {
                    // Like
                    if (!targetVideo.likes.includes(interactor.id) && Math.random() < 0.6) {
                        targetVideo.likes.push(interactor.id);
                        targetVideo.dislikes = targetVideo.dislikes.filter(id => id !== interactor.id);
                        addNotification(interactor.id, world.player.id, 'like',
                            `liked your video "${targetVideo.title}".`, { type: 'video', id: targetVideo.id });
                    }
                    // Comment
                    if (Math.random() < 0.35) {
                        try {
                            const prompt =
                                `You are ${interactor.name}, a ${interactor.personality} resident of Ember Creek in 1987. You just watched this video: "${targetVideo.title}" - ${targetVideo.description}. Write a short comment (1 sentence). Output ONLY the comment.`;
                            const ct = await mistralChat([{ role: "user", content: prompt }], 100, false);
                            targetVideo.comments.push({ authorId: interactor.id, text: ct,
                            timestamp: getTotalGameMinutes() });
                            addNotification(interactor.id, world.player.id, 'comment',
                                `commented on your video "${targetVideo.title}".`,
                            { type: 'video', id: targetVideo.id });
                            saveWorld();
                        } catch (e) {}
                    }
                }
            }

            // NPC subscribes to player
            const subscriber = allNpcs[Math.floor(Math.random() * allNpcs.length)];
            if (subscriber && !isSubscribed(world.player.id) && playerVideos.length > 0 && Math.random() < 0.2) {
                if (!world.social.channels[world.player.id]) world.social.channels[world.player.id] = { description: '',
                    bannerASCII: '', subscribers: [] };
                world.social.channels[world.player.id].subscribers.push(subscriber.id);
                addNotification(subscriber.id, world.player.id, 'subscribe', 'subscribed to your channel.',
                    { type: 'channel', id: subscriber.id });
                saveWorld();
            }

            // Private messages
            const messager = allNpcs[Math.floor(Math.random() * allNpcs.length)];
            if (messager && Math.random() < 0.3) {
                try {
                    let thread = world.inbox.find(t => t.npcId === messager.id);
                    const systemPrompt =
                        `You are ${messager.name}, a resident of Ember Creek in 1987. Write a short message (1-2 sentences) to the player about videos, their channel, or something friendly. Output ONLY the message.`;
                    const msgText = await mistralChat([{ role: "system", content: systemPrompt }, { role: "user",
                        content: 'Write a message.' }], 150, false);
                    if (!thread) { thread = { npcId: messager.id, messages: [] };
                        world.inbox.push(thread); }
                    thread.messages.push({ sender: 'npc', text: msgText, read: false, timestamp: Date.now() });
                    playNotification();
                    saveWorld();
                } catch (e) {}
            }
        }

        // ──────────────────────── TIME & AUTONOMY ────────────────────────
        function advanceTime(minutes) {
            world.time.minute += minutes;
            while (world.time.minute >= 60) { world.time.minute -= 60;
                world.time.hour++; }
            if (world.time.hour >= 24) { world.time.hour -= 24;
                world.time.day++; }
            updateStatusBar();
            generateNpcInteractions();
            saveWorld();
        }

        // ──────────────────────── INIT ────────────────────────
        async function startNewGame() {
            document.getElementById('mainScreen').innerHTML =
                '<div style="text-align:center;padding:40px;">Generating Ember Creek Video Vault...</div>';
            try {
                const genPrompt =
                    `Create a small American town called Ember Creek in 1987. Generate JSON with: "npcs": array of 8 residents (name, age 18-65, sex, bio 1 sentence, homeLocation one of: ${LOCATIONS.join(',')}). "locationDescriptions": object mapping each location to a 1-sentence description. Output only JSON.`;
                const townData = await mistralChat([{ role: "user", content: genPrompt }], 4000, true);
                world = {
                    player: { id: 'player', name: 'You', location: 'Your House', inventory: [] },
                    npcs: townData.npcs.map(n => {
                        const p = HARDCODED_PERSONALITIES[Math.floor(Math.random() * HARDCODED_PERSONALITIES
                        .length)];
                        return { ...n, id: uid(), currentLocation: n.homeLocation, inventory: [], personality: p
                                .traits };
                    }),
                    locationDescriptions: townData.locationDescriptions,
                    time: { day: 1, hour: 8, minute: 0 },
                    inbox: [],
                    social: {
                        channels: {},
                        videos: [],
                        notifications: [],
                        subscriptions: []
                    }
                };
                world.npcs.forEach(n => {
                    world.social.channels[n.id] = {
                        description: n.bio || 'A video channel.',
                        bannerASCII: '  ╔══════════╗\n  ║  CHANNEL  ║\n  ╚══════════╝',
                        subscribers: []
                    };
                });
                world.social.channels[world.player.id] = {
                    description: 'My Video Vault channel.',
                    bannerASCII: '  ╔══════════╗\n  ║ MY CHANNEL║\n  ╚══════════╝',
                    subscribers: []
                };
                // Seed initial videos
                for (let k = 0; k < 8; k++) {
                    const seedNpc = world.npcs[Math.floor(Math.random() * world.npcs.length)];
                    try {
                        const cat = VIDEO_CATEGORIES[Math.floor(Math.random() * VIDEO_CATEGORIES.length)];
                        const fmt = VIDEO_FORMATS[Math.floor(Math.random() * VIDEO_FORMATS.length)];
                        const seedPrompt =
                            `You are ${seedNpc.name}, a ${seedNpc.personality} resident of Ember Creek in 1987. Upload a video to the Video Vault in category "${cat}". Return JSON with "title", "description" (2 sentences), "runtime" (e.g., "12 min"), "asciiThumbnail" (3-line ASCII art, max 12 chars wide). Output ONLY valid JSON.`;
                        const sd = await mistralChat([{ role: "user", content: seedPrompt }], 350, true);
                        world.social.videos.push({
                            id: uid(),
                            title: sd.title || 'A Video',
                            description: sd.description || 'Check out this video!',
                            category: cat,
                            format: fmt,
                            runtime: sd.runtime || '10 min',
                            asciiThumbnail: sd.asciiThumbnail || '  ████████\n  ██    ██\n  ████████',
                            creatorId: seedNpc.id,
                            timestamp: getTotalGameMinutes() - Math.floor(Math.random() * 200),
                            views: Math.floor(Math.random() * 30),
                            likes: [],
                            dislikes: [],
                            comments: []
                        });
                    } catch (e) {}
                }
                // Cross-subscriptions and interactions
                const npcIds = world.npcs.map(n => n.id);
                npcIds.forEach(nid => {
                    const numSubs = 1 + Math.floor(Math.random() * 3);
                    const shuffled = [...npcIds].filter(id => id !== nid).sort(() => Math.random() - 0.5);
                    for (let j = 0; j < Math.min(numSubs, shuffled.length); j++) {
                        const targetId = shuffled[j];
                        if (!world.social.channels[targetId]) world.social.channels[targetId] = { description: '',
                            bannerASCII: '', subscribers: [] };
                        if (!world.social.channels[targetId].subscribers.includes(nid))
                            world.social.channels[targetId].subscribers.push(nid);
                    }
                });
                saveWorld();
                showMainMenu();
            } catch (e) { alert('Failed: ' + e.message); }
        }

        async function init() {
            if (!apiKey) {
                document.getElementById('genericModalContent').innerHTML =
                    `<h2>🔑 Mistral API Key</h2><p>Get from console.mistral.ai</p><input class="input-field" id="apiKeyInput" placeholder="Enter key..."><button class="btn" id="saveApiKey">Save</button>`;
                document.getElementById('genericModal').style.display = 'flex';
                document.getElementById('saveApiKey').onclick = () => {
                    const key = document.getElementById('apiKeyInput').value.trim();
                    if (key.length > 10) { apiKey = key;
                        localStorage.setItem('mistral_api_key', key);
                        document.getElementById('genericModal').style.display = 'none';
                        init(); }
                };
                return;
            }
            const loaded = loadWorld();
            if (!loaded) await startNewGame();
            else { updateStatusBar();
                showMainMenu(); }
            setInterval(() => { advanceTime(5); }, 30000);
        }
        applyTheme(currentTheme);
        document.getElementById('notifBell').onclick = () => { playClick();
            showNotifications(); };
        init();
    </script>
