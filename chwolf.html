                        </div>
                        <div class="guide-actions">
                            <button class="btn guide-btn perform-saved-btn" data-index="${index}">🎬 Relive</button>
                            ${!hasCues ? `<button class="btn guide-btn yellow-accent produce-night-btn" data-index="${index}">🎼 Score It</button>` : '<span style="color:#ffd700; font-size:11px;">✅</span>'}
                        </div>
                    `;
                    guideList.appendChild(entry);
                });
                const newBtn = document.createElement('button');
                newBtn.className = 'btn accent';
                newBtn.style.marginTop = '10px';
                newBtn.style.width = '100%';
                newBtn.textContent = '🌩️ New Storm Night';
                newBtn.addEventListener('click', async () => {
                    newBtn.disabled = true;
                    newBtn.textContent = '⛈️ Gathering Storm…';
                    try {
                        await getAudioContext();
                        await generateAndPerformNight();
                        newBtn.disabled = false;
                        newBtn.textContent = '🌩️ New Storm Night';
                    } catch (e) {
                        showModal(
                            `<h2>🌧️ Storm Passed</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                            );
                        newBtn.disabled = false;
                        newBtn.textContent = '🌩️ New Storm Night';
                    }
                });
                guideList.appendChild(newBtn);

                if (gameState.currentNight && gameState.currentNight.rawStoryText && !gameState.currentNight
                    .soundCues) {
                    const produceBtn = document.createElement('button');
                    produceBtn.className = 'btn yellow-accent';
                    produceBtn.style.marginTop = '5px';
                    produceBtn.style.width = '100%';
                    produceBtn.textContent = '🎼 Score Current Night';
                    produceBtn.addEventListener('click', async () => {
                        produceBtn.disabled = true;
                        produceBtn.textContent = '🎚️ Composing…';
                        try {
                            const cues = await generateSoundCueSheet(gameState.currentNight.rawStoryText);
                            gameState.currentNight.soundCues = cues;
                            saveState();
                            produceBtn.textContent = '✅ Score Ready';
                            renderMotelPanel();
                        } catch (e) {
                            showModal(
                                `<h2>Scoring Failed</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                                );
                            produceBtn.disabled = false;
                            produceBtn.textContent = '🎼 Score Current Night';
                        }
                    });
                    guideList.appendChild(produceBtn);
                }

                document.querySelectorAll('.perform-saved-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const index = parseInt(btn.dataset.index);
                        const night = gameState.motelNights[index];
                        if (!night) return;
                        gameState.currentNight = { ...night, soundCues: night.soundCues || null,
                            rawStoryText: night.rawStoryText || night.story };
                        saveState();
                        await getAudioContext();
                        await startMotelPerformance();
                    });
                });
                document.querySelectorAll('.produce-night-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const index = parseInt(btn.dataset.index);
                        const night = gameState.motelNights[index];
                        if (!night || !night.rawStoryText) return;
                        btn.disabled = true;
                        btn.textContent = '🎚️...';
                        try {
                            const soundtrack = await generateSoundCueSheet(night.rawStoryText);
                            night.soundCues = soundtrack;
                            saveState();
                            renderMotelPanel();
                        } catch (err) {
                            showModal(
                                `<h2>Scoring Failed</h2><p>${esc(err.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                                );
                            btn.disabled = false;
                            btn.textContent = '🎼 Score It';
                        }
                    });
                });
            }

            // ─── INIT ────────────────────────────────────────────────────────────
            function init() {
                loadState();
                renderMotelPanel();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) { apiKey = key;
                        localStorage.setItem('wolfcreek_motel_key', key); }
                });
                document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e.currentTarget)
                        closeModal(); });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) showModal(HOST_BIO);
                });
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
                if (!apiKey) setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                document.addEventListener('click', () => { getAudioContext().catch(() => {}); }, { once: true });
            }
            init();
        })();
    </script>
</body>
</html>
