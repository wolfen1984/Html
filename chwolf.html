<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover" />
    <title>WOLF CREEK MOTEL · 1984 · CARPENTER SCORE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Special+Elite&family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Audiowide&display=swap" rel="stylesheet" />
    <style>
        /* ─── All styles from original Wolf Creek Motel, with Carpenter-inspired accents ─── */
        :root {
            --bg: #050308;
            --screen-bg: #06040c;
            --panel-bg: #080612;
            --text: #d4c8b0;
            --text-dim: #7a6a48;
            --text-bright: #ffe8b0;
            --neon-red: #ff2d2d;
            --neon-red-dim: #6b1018;
            --neon-red-glow: 0 0 14px #ff2d2d88, 0 0 32px #ff000044, 0 0 60px #cc000022;
            --neon-yellow: #ffd700;
            --neon-yellow-dim: #5c4800;
            --neon-yellow-glow: 0 0 10px #ffd70066, 0 0 24px #ffaa0022;
            --border-red: #cc1a1a;
            --border-yellow: #cc9900;
            --input-bg: #0e0c18;
            --button-bg: #100e1a;
            --button-hover: #181428;
            --button-active: #14101c;
            --bevel-light: #242030;
            --bevel-dark: #040206;
            --font-display: 'Orbitron', 'Rajdhani', sans-serif;
            --font-title: 'Orbitron', 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 28px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { font-size:var(--text-size-base); -webkit-text-size-adjust:100%; }
        body {
            background:#000; display:flex; justify-content:center; align-items:center;
            min-height:100vh; min-height:100dvh; font-family:var(--font-body);
            padding:0; background-image:radial-gradient(ellipse at center,#0c0610 0%,#000 100%);
            overflow-x:hidden; margin:0; color:var(--text);
        }
        .monitor-bezel {
            width:100%; max-width:540px; height:100vh; height:100dvh; max-height:920px;
            background:#161018; border-radius:8px; padding:8px;
            box-shadow:inset 0 0 0 3px #1e1828,0 0 0 4px #0c0a14,0 0 0 8px #060408,0 8px 48px #000000dd,0 0 40px #ff2d2d11,0 0 80px #ffd70008;
            display:flex; flex-direction:column; position:relative;
        }
        @media (max-width:540px) { .monitor-bezel { border-radius:0; padding:3px; max-height:100vh; box-shadow:none; background:#08040e; } }
        .power-led {
            position:absolute; bottom:16px; right:20px; width:7px; height:7px;
            background:#ff2d2d; border-radius:50%;
            box-shadow:0 0 10px #ff2d2dcc,0 0 22px #ff000066;
            animation:neonPulse 1.8s ease-in-out infinite; z-index:20;
        }
        @keyframes neonPulse { 0%,100%{box-shadow:0 0 10px #ff2d2dcc,0 0 22px #ff000066;} 50%{box-shadow:0 0 18px #ff2d2dff,0 0 36px #ff000099,0 0 50px #ff000033;} }
        .brand-label { position:absolute; bottom:14px; left:18px; font-family:var(--font-mono); font-size:8px; color:#4a3828; letter-spacing:3px; z-index:20; text-transform:uppercase; }
        .game-shell {
            flex:1; width:100%; background:var(--screen-bg); border-radius:2px;
            border:2px solid #cc1a1a55; box-shadow:var(--neon-red-glow),inset 0 0 90px rgba(0,0,0,0.6);
            display:flex; flex-direction:column; overflow:hidden; position:relative;
        }
        @media (max-width:540px) { .game-shell { border-radius:0; border-width:1px; } }
        .screen-curve { position:absolute; inset:0; pointer-events:none; z-index:899; border-radius:1px; box-shadow:inset 0 0 70px rgba(0,0,0,0.75),inset 0 0 12px rgba(0,0,0,0.5); }
        .crt-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:900;
            background:repeating-linear-gradient(0deg,rgba(0,0,0,var(--scanline-opacity)) 0px,rgba(0,0,0,var(--scanline-opacity)) 2px,transparent 2px,transparent 5px);
            border-radius:1px;
        }
        .crt-overlay::after { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(ellipse at center,transparent 38%,rgba(0,0,0,0.7) 100%); border-radius:1px; }
        .screen-flicker { animation:crtFlicker 9s ease-in-out infinite; }
        @keyframes crtFlicker { 0%,99.3%,100%{opacity:1} 99.4%{opacity:0.5} 99.5%{opacity:0.8} 99.6%{opacity:0.35} 99.7%{opacity:1} }
        .marquee {
            position:relative; z-index:10; background:#08040c; border-bottom:2px solid #ff2d2d55;
            padding:8px 14px; text-align:center; font-family:var(--font-display); letter-spacing:1.5px;
            box-shadow:0 2px 20px #000000aa,inset 0 1px 0 #100818; flex-shrink:0;
        }
        .marquee-inner {
            border:2px solid #ff2d2d44; border-radius:2px; padding:8px 12px; background:#05020a;
            position:relative; box-shadow:inset 0 0 20px #ff000008;
        }
        .marquee-inner::before { content:''; position:absolute; top:-1px; left:14px; right:14px; height:1px; background:#ffd700; box-shadow:0 0 10px #ffd70088,0 0 30px #ffaa0044; }
        .marquee-inner::after { content:''; position:absolute; bottom:-1px; left:14px; right:14px; height:1px; background:#ff2d2d66; box-shadow:0 0 8px #ff2d2d44; }
        .marquee-title { font-size:var(--text-size-title); color:#ffd700; text-shadow:0 0 20px #ffd700aa,0 0 40px #ffaa0055,0 2px 4px #000,0 0 60px #ff8c0022; letter-spacing:2px; font-family:var(--font-title); line-height:1.2; font-weight:700; }
        .marquee-sub { font-family:var(--font-mono); font-size:10px; color:#ff2d2d88; letter-spacing:4px; margin-top:2px; text-shadow:0 0 8px #ff2d2d44; }
        .vacancy-badge { display:inline-block; background:#000; border:1px solid #ff2d2d; color:#ff2d2d; padding:2px 8px; font-family:var(--font-display); font-size:10px; letter-spacing:2px; text-shadow:0 0 8px #ff2d2d88; box-shadow:0 0 12px #ff000033; animation:vacancyBlink 3s ease-in-out infinite; margin-left:6px; vertical-align:middle; }
        @keyframes vacancyBlink { 0%,85%,100%{opacity:1} 90%{opacity:0.3} 93%{opacity:0.9} 95%{opacity:0.2} }
        @media (max-width:400px) { .marquee-title { font-size:19px; letter-spacing:1px; } }
        .game-area {
            flex:1; overflow-y:auto; overflow-x:hidden; z-index:5;
            scrollbar-width:thin; scrollbar-color:#3a1020 #06040c;
            display:flex; flex-direction:column; padding:3px 0;
        }
        .game-area::-webkit-scrollbar { width:4px; }
        .game-area::-webkit-scrollbar-track { background:#06040c; }
        .game-area::-webkit-scrollbar-thumb { background:#3a1020; border-radius:2px; }
        .panel { display:flex; flex-direction:column; padding:8px; gap:8px; flex:1; }
        .btn {
            background:var(--button-bg); border:2px solid #1e1828; border-top-color:#2a2238; border-left-color:#241e30;
            border-right-color:#181420; border-bottom-color:#0e0c18; padding:10px 16px; border-radius:2px;
            color:var(--text); cursor:pointer; font-family:var(--font-body); font-size:var(--text-size-base);
            letter-spacing:1px; text-transform:uppercase; transition:all 0.1s; min-height:var(--btn-min-height);
            display:inline-flex; align-items:center; justify-content:center; gap:5px;
            box-shadow:0 2px 0 #00000044; white-space:nowrap;
        }
        .btn:active { border-top-color:#181420; border-left-color:#181420; border-bottom-color:#2a2238; border-right-color:#241e30; box-shadow:0 0px 0 #00000044; transform:translateY(1px); background:#0e0c18; }
        .btn.accent { background:#100a10; border-color:#cc1a1a44; border-top-color:#ff2d2d66; border-left-color:#dd222255; border-right-color:#99111133; border-bottom-color:#44080822; color:#ffd0a0; box-shadow:0 2px 0 #00000044,0 0 12px #ff2d2d22; }
        .btn.accent:active { border-top-color:#99111133; border-left-color:#99111133; border-bottom-color:#ff2d2d66; border-right-color:#dd222255; box-shadow:0 0px 0 #00000044,0 0 20px #ff2d2d55; }
        .btn.yellow-accent { background:#0e0a08; border-color:#cc990044; border-top-color:#ffd70055; border-left-color:#eebb0044; border-right-color:#99660033; border-bottom-color:#33220022; color:#ffe8b0; box-shadow:0 2px 0 #00000044,0 0 10px #ffd70022; }
        .btn.yellow-accent:active { border-top-color:#99660033; border-left-color:#99660033; border-bottom-color:#ffd70055; border-right-color:#eebb0044; box-shadow:0 0px 0 #00000044,0 0 18px #ffd70044; }
        .btn:disabled { opacity:0.3; cursor:not-allowed; pointer-events:none; }
        .tv-stage {
            display:flex; flex-direction:column; gap:10px; background:#080610;
            border:1px solid #ff2d2d44; padding:12px; border-radius:2px;
        }
        .tv-stage-row { display:flex; align-items:flex-start; gap:12px; width:100%; }
        .host-portrait { width:90px; height:90px; border-radius:3px; border:2px solid #ffd70055; box-shadow:0 0 18px #ffd70044,0 0 0 2px #1a0a08; object-fit:cover; flex-shrink:0; background:#0a0610; }
        .speech-bubble {
            flex:1; background:#0e0c18; border:1px solid #ffd70044; border-radius:4px; padding:10px;
            position:relative; color:#d4bfa8; font-size:17px; min-height:70px;
            display:flex; flex-direction:column; gap:6px; box-shadow:inset 0 0 20px #00000044;
        }
        .speech-bubble::before { content:''; position:absolute; left:-10px; top:18px; border-width:7px 10px 7px 0; border-style:solid; border-color:transparent #ffd70033 transparent transparent; }
        .segment-image { width:100%; border-radius:2px; max-height:180px; object-fit:cover; background:#080610; border:1px solid #ff2d2d33; display:none; }
        .segment-image.loading { display:block; height:100px; background:#100e18; display:flex; align-items:center; justify-content:center; color:#7a6a48; font-size:13px; animation:pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:0.35} 50%{opacity:1} }
        .segment-image.visible { display:block; }
        .segment-text { flex:1; line-height:1.4; }
        .story-poster-container {
            position:relative; display:block; width:100%; max-height:200px; overflow:hidden;
            border-radius:2px; border:1px solid #ff2d2d44; box-shadow:0 0 16px #ff2d2d33,inset 0 0 30px rgba(0,0,0,0.5);
            flex-shrink:0; background:#080610;
        }
        .story-poster-container .segment-image { display:block; width:100%; max-height:200px; object-fit:cover; border:none; border-radius:1px; }
        .story-poster-container::after { content:''; position:absolute; inset:0; pointer-events:none; background:radial-gradient(ellipse at center,transparent 40%,rgba(4,3,8,0.85) 100%); z-index:2; }
        .poster-overlay-theater { position:absolute; top:6px; left:0; right:0; text-align:center; z-index:5; pointer-events:none; font-family:var(--font-title); font-size:12px; letter-spacing:2px; color:#ffd700; text-shadow:0 0 10px #ffd700cc,0 0 30px #ffaa0066,0 2px 4px #000,0 0 50px #ff8c0022; text-transform:uppercase; line-height:1.2; background:linear-gradient(to bottom,rgba(8,4,12,0.9) 0%,rgba(8,4,12,0.6) 40%,transparent 100%); padding:5px 10px 8px; font-weight:700; }
        .poster-overlay-title { position:absolute; bottom:8px; left:6px; right:6px; text-align:center; z-index:5; pointer-events:none; font-family:var(--font-display); font-size:14px; letter-spacing:1px; color:#ff2d2d; text-shadow:0 0 8px #ff2d2daa,0 0 20px #cc000044,0 2px 4px #000; background:linear-gradient(to top,rgba(4,3,8,0.9) 0%,rgba(4,3,8,0.5) 50%,transparent 100%); padding:8px 6px 5px; line-height:1.3; }
        .story-poster-container.no-image { display:none; }
        .story-poster-container.loading { height:120px; display:flex; align-items:center; justify-content:center; color:#7a6a48; font-size:13px; animation:pulse 1.5s ease-in-out infinite; }
        .story-poster-container.loading .segment-image,.story-poster-container.loading .poster-overlay-theater,.story-poster-container.loading .poster-overlay-title { display:none; }
        @media (max-width:480px) {
            .story-poster-container { max-height:150px; }
            .poster-overlay-theater { font-size:10px; letter-spacing:1.5px; top:3px; padding:3px 6px 6px; }
            .poster-overlay-title { font-size:11px; bottom:4px; padding:6px 4px 3px; }
            .tv-stage-row { flex-direction:column; align-items:center; }
            .speech-bubble::before { display:none; }
            .host-portrait { width:70px; height:70px; }
        }
        .tv-guide { margin-top:12px; border-top:1px solid #ffd70033; padding-top:8px; }
        .tv-guide h3 { font-family:var(--font-display); color:#ffd700; letter-spacing:1.5px; margin-bottom:6px; font-size:16px; text-shadow:0 0 8px #ffd70044; font-weight:600; }
        .guide-entry { display:flex; justify-content:space-between; align-items:center; background:#0a0814; border:1px solid #ff2d2d33; padding:8px; margin-bottom:5px; border-radius:2px; gap:6px; flex-wrap:wrap; }
        .guide-time { font-family:var(--font-mono); font-size:13px; color:#ff2d2d; min-width:44px; text-shadow:0 0 6px #ff2d2d44; }
        .guide-info { flex:1; min-width:90px; }
        .guide-title { font-size:15px; color:#ffd700; }
        .guide-desc { font-size:14px; color:#7a6a48; }
        .guide-btn { padding:5px 10px; font-size:13px; min-height:28px; flex-shrink:0; }
        .guide-actions { display:flex; gap:3px; align-items:center; }
        .modal { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.95); align-items:center; justify-content:center; padding:10px; }
        .modal-content { background:#0c0a16; border-radius:4px; width:100%; max-width:420px; padding:18px; text-align:center; border:2px solid #ff2d2d66; box-shadow:var(--neon-red-glow),0 0 80px #000000dd; color:#d4c8b0; max-height:85vh; overflow-y:auto; font-size:var(--text-size-base); }
        .modal-btn { background:#100e1a; border:1px solid #ff2d2d55; padding:8px 16px; border-radius:2px; margin:4px; cursor:pointer; color:#d4c8b0; font-family:var(--font-body); font-size:var(--text-size-base); letter-spacing:1px; min-height:var(--btn-min-height); }
        .modal-btn:active { border-color:#ff2d2d; box-shadow:0 0 16px #ff2d2d55; }
        .loading-text { color:#ffd700; font-style:italic; }
        .blink { animation:blink 1s infinite; }
        @keyframes blink { 50%{opacity:0} }
        .footer-strip { display:flex; justify-content:space-between; align-items:center; padding:5px 10px; background:#05030a; border-top:1px solid #ff2d2d33; z-index:10; font-family:var(--font-mono); font-size:10px; color:#3a2818; flex-shrink:0; }
        .footer-strip span { color:#4a3828; letter-spacing:0.5px; }
        .footer-strip button { background:none; border:1px solid #1a1418; color:#4a3828; font-size:9px; cursor:pointer; padding:3px 7px; border-radius:2px; font-family:var(--font-mono); }
        .footer-strip button:hover { border-color:#ff2d2d44; color:#ff2d2d88; }
        .typewriter-cursor { display:inline-block; width:2px; height:1.2em; background:#ffd700; margin-left:2px; animation:blink 0.8s step-end infinite; vertical-align:text-bottom; box-shadow:0 0 6px #ffd70088; }
        .back-btn { margin-top:6px; align-self:flex-end; }
        .score-indicator {
            font-family:var(--font-mono); font-size:10px; color:#8899aa; letter-spacing:1px;
            padding:3px 8px; border:1px solid #3a1a1a; border-radius:2px; display:inline-block;
            background:#0a0808; margin-top:4px;
        }
        .score-indicator .active { color:#ff2d2d; }
        .score-indicator .dim { color:#5a3a3a; }
        .progress-bar { width:100%; height:2px; background:#1a0a0a; border-radius:2px; margin-top:6px; overflow:hidden; }
        .progress-bar .fill { height:100%; background:#ff2d2d; border-radius:2px; transition:width 0.3s; box-shadow:0 0 10px #ff2d2d44; }
        @media (max-width:480px) { .guide-entry { flex-direction:column; align-items:stretch; } .guide-time { text-align:left; } }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">WOLF CREEK MOTEL · CRT-84</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">WOLF CREEK<span class="vacancy-badge">VACANCY</span><br>MOTEL</div>
                    <div class="marquee-sub">⏤ EST. 1984 · 12 ROOMS ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="motelPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🟡 VACANCY · NO VACANCY · VACANCY</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            // ─── CONFIG ──────────────────────────────────────────────────────────────
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('wolfcreek_motel_key') || '';

            const DEFAULT_STATE = { motelNights: [], currentNight: null, imageCooldownUntil: 0 };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO =
                `
            <h2>🟡 Frank Harlan</h2>
            <p style="text-align:left;">
                <strong>Name:</strong> Frank Harlan<br>
                <strong>Age:</strong> Mid-50s<br>
                <strong>Background:</strong> A widower who bought the Wolf Creek Motel after his wife passed. He keeps to himself, makes coffee, fixes generators, and stays out of guests' business—until he can't. He's seen enough stormy nights to know that the weather isn't what people are really running from.<br>
                <strong>Role:</strong> The audience's eyes. Like the bartender in <em>Key Largo</em>, Frank deals with whoever walks through the door.
            </p>
        `;

            // ─── STATE ──────────────────────────────────────────────────────────────
            function saveState() {
                try { localStorage.setItem('wolfcreek_motel_state', JSON.stringify(gameState)); } catch (e) {}
            }

            function loadState() {
                try {
                    const saved = localStorage.getItem('wolfcreek_motel_state');
                    if (saved) gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
                    gameState.motelNights = gameState.motelNights || [];
                    gameState.currentNight = gameState.currentNight || null;
                } catch (e) {}
            }

            // ─── AUDIO ENGINE ─── (Carpenter-style, ported from Crossroads) ──────
            let audioCtx = null;
            let ambientSource = null,
                ambientGain = null,
                ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null,
                masterGain = null,
                dryGain = null,
                wetGain = null;
            let sectionAmbientActive = null;
            let patternPlayerActive = null,
                patternPlayerTimeout = null;
            let patternStep = 0,
                patternBPM = 50;
            let currentSectionPatterns = [];
            let currentVariationIdx = 0,
                barsInVariation = 0;
            let sectionThemeScore = null;
            let crossfadeTimeout = null;
            let masterCompressor = null;

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.0005;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            function ensureAudioNodes(ctx) {
                if (!masterGain) {
                    masterGain = ctx.createGain();
                    masterGain.gain.value = 0.22;
                    masterCompressor = ctx.createDynamicsCompressor();
                    masterCompressor.threshold.value = -26;
                    masterCompressor.knee.value = 28;
                    masterCompressor.ratio.value = 10;
                    masterCompressor.attack.value = 0.004;
                    masterCompressor.release.value = 0.3;
                    masterGain.connect(masterCompressor);
                    masterCompressor.connect(ctx.destination);
                }
                if (!dryGain) { dryGain = ctx.createGain();
                    dryGain.gain.value = 0.85;
                    dryGain.connect(masterGain); }
                if (!wetGain) {
                    wetGain = ctx.createGain();
                    wetGain.gain.value = 0.55;
                    if (reverbNode) wetGain.connect(reverbNode);
                    else wetGain.connect(masterGain);
                }
                if (!reverbNode) { initReverb(ctx); if (reverbNode) wetGain.connect(reverbNode); }
            }

            async function getAudioContext() {
                try {
                    if (!audioCtx) {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                        createKeepAlive(audioCtx);
                        initReverb(audioCtx);
                        ensureAudioNodes(audioCtx);
                    }
                    if (audioCtx.state === 'suspended') await audioCtx.resume();
                    ensureAudioNodes(audioCtx);
                    return audioCtx;
                } catch (err) { console.error('Audio context error:', err); throw err; }
            }

            function initReverb(ctx) {
                if (reverbNode) return;
                try {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 3.2;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.7));
                        const lateDecay = Math.exp(-i / (sampleRate * 2.0)) * 0.3;
                        left[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                        right[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                    if (masterGain) reverbNode.connect(masterGain);
                } catch (err) { console.warn('Reverb init error:', err);
                    reverbNode = ctx.createGain();
                    reverbNode.gain.value = 0.5; if (masterGain) reverbNode.connect(masterGain); }
            }

            // ─── CARPENTER‑STYLE SYNTH SOUNDS ──────────────────────────────────
            function createSynthBass(ctx, semitone, intensity = 0.5, duration = 2.0, rootFreq = 40) {
                try {
                    const now = ctx.currentTime;
                    const freq = rootFreq * Math.pow(2, semitone / 12);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.25, now + 0.06);
                    gainNode.gain.setValueAtTime(intensity * 0.25, now + duration - 0.4);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.3);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq * 0.97, now);
                    osc.frequency.exponentialRampToValueAtTime(freq, now + 0.12);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'square';
                    osc2.frequency.value = freq * 2;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.06 * intensity;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(140 + semitone * 3, now);
                    filter.frequency.exponentialRampToValueAtTime(80 + semitone * 2, now + duration);
                    filter.Q.value = 2.8;
                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.4;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + duration + 0.5);
                    osc2.stop(now + duration + 0.5);
                } catch (err) { console.warn('Synth bass error:', err); }
            }

            function createSynthKick(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.85, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(130, now);
                    osc.frequency.exponentialRampToValueAtTime(30, now + 0.12);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 160;
                    filter.Q.value = 1.2;
                    osc.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.25);
                } catch (err) { console.warn('Kick error:', err); }
            }

            function createSynthSnare(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.6, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                    const bufSize = ctx.sampleRate * 0.07;
                    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                    const data = buf.getChannelData(0);
                    for (let i = 0; i < bufSize; i++) {
                        const env = Math.exp(-i / (ctx.sampleRate * 0.022));
                        data[i] = (Math.random() * 2 - 1) * env * 0.6;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buf;
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(240, now);
                    osc.frequency.exponentialRampToValueAtTime(70, now + 0.07);
                    const oscG = ctx.createGain();
                    oscG.gain.value = 0.2 * intensity;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 280;
                    filter.Q.value = 0.8;
                    noise.connect(filter);
                    osc.connect(oscG);
                    oscG.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    osc.start(now);
                    noise.stop(now + 0.1);
                    osc.stop(now + 0.1);
                } catch (err) { console.warn('Snare error:', err); }
            }

            function createSynthHat(ctx, intensity = 0.3) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.5, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    const bufSize = ctx.sampleRate * 0.02;
                    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                    const data = buf.getChannelData(0);
                    for (let i = 0; i < bufSize; i++) {
                        const env = Math.exp(-i / (ctx.sampleRate * 0.008));
                        data[i] = (Math.random() * 2 - 1) * env * 0.4;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buf;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.value = 4500;
                    filter.Q.value = 0.5;
                    noise.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    noise.stop(now + 0.06);
                } catch (err) { console.warn('Hat error:', err); }
            }

            function createSynthPad(ctx, rootFreq, duration, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.14, now + 2.0);
                    gainNode.gain.setValueAtTime(intensity * 0.14, now + duration - 2.5);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 1.2);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(250, now);
                    filter.frequency.exponentialRampToValueAtTime(550 + intensity * 300, now + duration * 0.5);
                    filter.Q.value = 1.8;
                    const all = [];
                    const harm = [1, 1.002, 1.998, 2.004, 0.996];
                    for (let i = 0; i < 5; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = i < 3 ? 'sawtooth' : 'square';
                        osc.frequency.value = rootFreq * harm[i];
                        const vib = ctx.createOscillator();
                        vib.type = 'sine';
                        vib.frequency.value = 3.5 + i * 1.2;
                        const vg = ctx.createGain();
                        vg.gain.value = 2 + i * 1.5;
                        vib.connect(vg);
                        vg.connect(osc.frequency);
                        all.push(osc, vib);
                        osc.connect(filter);
                    }
                    filter.connect(gainNode);
                    const dry = ctx.createGain();
                    dry.gain.value = 0.3;
                    const wet = ctx.createGain();
                    wet.gain.value = 0.6;
                    gainNode.connect(dry);
                    gainNode.connect(wet);
                    dry.connect(dryGain || ctx.destination);
                    wet.connect(wetGain || ctx.destination);
                    all.forEach(o => { o.start(now);
                        o.stop(now + duration + 1.5); });
                } catch (err) { console.warn('Synth pad error:', err); }
            }

            function createSynthStab(ctx, intensity = 0.6) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.35, now + 0.04);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
                    const osc1 = ctx.createOscillator();
                    osc1.type = 'sawtooth';
                    osc1.frequency.setValueAtTime(180, now);
                    osc1.frequency.exponentialRampToValueAtTime(420, now + 0.2);
                    osc1.frequency.exponentialRampToValueAtTime(90, now + 1.6);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'square';
                    osc2.frequency.setValueAtTime(360, now);
                    osc2.frequency.exponentialRampToValueAtTime(840, now + 0.2);
                    osc2.frequency.exponentialRampToValueAtTime(180, now + 1.6);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 400;
                    filter.Q.value = 2.5;
                    osc1.connect(filter);
                    osc2.connect(filter);
                    filter.connect(gainNode);
                    const wet = ctx.createGain();
                    wet.gain.value = 0.5;
                    gainNode.connect(wet);
                    wet.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc1.start(now);
                    osc2.start(now);
                    osc1.stop(now + 2.0);
                    osc2.stop(now + 2.0);
                } catch (err) { console.warn('Synth stab error:', err); }
            }

            function createArpeggio(ctx, rootFreq, duration, intensity = 0.4) {
                try {
                    const now = ctx.currentTime;
                    const pattern = [0, 7, 12, 19, 12, 7];
                    const stepDur = duration / pattern.length;
                    for (let i = 0; i < pattern.length; i++) {
                        const t = now + i * stepDur;
                        const gain = ctx.createGain();
                        gain.gain.setValueAtTime(0, t);
                        gain.gain.linearRampToValueAtTime(intensity * 0.12, t + stepDur * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.001, t + stepDur * 0.8);
                        const osc = ctx.createOscillator();
                        osc.type = 'square';
                        const freq = rootFreq * Math.pow(2, pattern[i] / 12);
                        osc.frequency.value = freq;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = 600;
                        filter.Q.value = 1.2;
                        osc.connect(filter);
                        filter.connect(gain);
                        const wet = ctx.createGain();
                        wet.gain.value = 0.5;
                        gain.connect(wet);
                        wet.connect(wetGain || ctx.destination);
                        osc.start(t);
                        osc.stop(t + stepDur + 0.1);
                    }
                } catch (err) { console.warn('Arpeggio error:', err); }
            }

            function createPulse(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.6, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(80, now);
                    osc.frequency.exponentialRampToValueAtTime(25, now + 0.12);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 120;
                    filter.Q.value = 1.5;
                    osc.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    // second pulse
                    const gain2 = ctx.createGain();
                    gain2.gain.setValueAtTime(intensity * 0.4, now + 0.15);
                    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'sawtooth';
                    osc2.frequency.setValueAtTime(70, now + 0.15);
                    osc2.frequency.exponentialRampToValueAtTime(20, now + 0.27);
                    const filter2 = ctx.createBiquadFilter();
                    filter2.type = 'lowpass';
                    filter2.frequency.value = 100;
                    filter2.Q.value = 1.5;
                    osc2.connect(filter2);
                    filter2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start(now + 0.15);
                    osc2.stop(now + 0.35);
                } catch (err) { console.warn('Pulse error:', err); }
            }

            function createThunder(ctx, intensity = 0.7) {
                try {
                    const now = ctx.currentTime;
                    const bufSize = ctx.sampleRate * 0.8;
                    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                    const data = buf.getChannelData(0);
                    for (let i = 0; i < bufSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.45));
                    }
                    const source = ctx.createBufferSource();
                    source.buffer = buf;
                    const gain = ctx.createGain();
                    gain.gain.setValueAtTime(intensity * 0.5, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 110;
                    filter.Q.value = 0.5;
                    source.connect(filter);
                    filter.connect(gain);
                    gain.connect(ctx.destination);
                    source.start(now);
                    source.stop(now + 1.2);
                } catch (err) { console.warn('Thunder error:', err); }
            }

            function createClimaxDrone(ctx, intensity = 0.6) {
                try {
                    const now = ctx.currentTime;
                    const duration = 10 + Math.random() * 8;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.3, now + 2.5);
                    gainNode.gain.setValueAtTime(intensity * 0.35, now + duration - 2);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    const oscs = [];
                    const freqs = [55, 82.5, 110, 165];
                    freqs.forEach(f => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(f, now);
                        osc.frequency.exponentialRampToValueAtTime(f * 1.4, now + duration * 0.6);
                        oscs.push(osc);
                    });
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(120, now);
                    filter.frequency.exponentialRampToValueAtTime(700, now + duration);
                    filter.Q.value = 2.8;
                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.05;
                    const lfoG = ctx.createGain();
                    lfoG.gain.value = 200;
                    lfo.connect(lfoG);
                    lfoG.connect(filter.frequency);
                    oscs.forEach(o => o.connect(filter));
                    filter.connect(gainNode);
                    const wet = ctx.createGain();
                    wet.gain.value = 0.55;
                    gainNode.connect(wet);
                    wet.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    oscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1); });
                    lfo.start(now);
                    lfo.stop(now + duration + 1);
                } catch (err) { console.warn('Climax drone error:', err); }
            }

            // ─── PATTERN PLAYER (Carpenter style) ──────────────────────────────
            function expandPattern(arr) {
                if (!Array.isArray(arr)) { arr = [0, 0, 0, 0, 0, 0, 0, 0]; }
                arr = arr.map(x => typeof x === 'number' ? x : 0);
                return arr.flatMap(x => [x, x]);
            }

            function startEvolvingPatternPlayer(themeName, rootFreq = 40, scoreData = null) {
                stopPatternPlayer();
                if (!scoreData || !scoreData[themeName]) {
                    console.warn('No AI score data for theme:', themeName);
                    return;
                }
                const theme = scoreData[themeName];
                const bpm = theme.bpm || 60;
                const bass = expandPattern(theme.bass);
                const kick = expandPattern(theme.kick);
                const snare = expandPattern(theme.snare);
                const hat = expandPattern(theme.hat);

                currentSectionPatterns = [{
                    name: 'AI',
                    bars: 8,
                    bass: bass,
                    kick: kick,
                    snare: snare,
                    hat: hat
                }];
                currentVariationIdx = 0;
                barsInVariation = 0;
                patternStep = 0;
                patternBPM = bpm;

                patternPlayerActive = { active: true, theme: themeName };
                const stepDuration = 60 / bpm / 4;

                function playStep() {
                    if (!patternPlayerActive || !patternPlayerActive.active) return;
                    const ctx = audioCtx;
                    if (!ctx) { patternPlayerTimeout = setTimeout(playStep, 100); return; }
                    const step = patternStep % 16;
                    const current = currentSectionPatterns[0];
                    const bassSemitone = current.bass[step] || 0;
                    if (bassSemitone !== 0) {
                        createSynthBass(ctx, bassSemitone, 0.5 + (bassSemitone / 30), 1.8, rootFreq);
                    }
                    if ((current.kick[step] || 0) === 1) createSynthKick(ctx, 0.6);
                    if ((current.snare[step] || 0) === 1) createSynthSnare(ctx, 0.5);
                    if ((current.hat[step] || 0) === 1 && Math.random() < 0.6) createSynthHat(ctx, 0.3);
                    patternStep++;
                    if (patternStep % 16 === 0) { barsInVariation++; if (barsInVariation >= current.bars) barsInVariation =
                            0; }
                    patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
                }
                patternPlayerTimeout = setTimeout(playStep, 50);
            }

            function stopPatternPlayer() {
                if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout);
                    patternPlayerTimeout = null; }
                if (patternPlayerActive) { patternPlayerActive.active = false;
                    patternPlayerActive = null; }
                patternStep = 0;
                currentSectionPatterns = [];
                currentVariationIdx = 0;
                barsInVariation = 0;
            }

            // ─── CARPENTER AMBIENT THEMES ──────────────────────────────────────
            const CARPENTER_AMBIENT = {
                intro: { rootFreq: 44, detuneSpread: 8, filterBase: 160, lfoRate: 0.04, noiseMix: 0.08,
                intensity: 0.20 },
                tension: { rootFreq: 48, detuneSpread: 14, filterBase: 140, lfoRate: 0.07, noiseMix: 0.18,
                    intensity: 0.32 },
                pursuit: { rootFreq: 52, detuneSpread: 20, filterBase: 110, lfoRate: 0.10, noiseMix: 0.30,
                    intensity: 0.45 },
                confrontation: { rootFreq: 56, detuneSpread: 22, filterBase: 90, lfoRate: 0.14, noiseMix: 0.40,
                    intensity: 0.55 },
                aftermath: { rootFreq: 46, detuneSpread: 10, filterBase: 130, lfoRate: 0.05, noiseMix: 0.10,
                    intensity: 0.22 },
                closing: { rootFreq: 40, detuneSpread: 6, filterBase: 150, lfoRate: 0.03, noiseMix: 0.04,
                    intensity: 0.12 }
            };

            function startCarpenterAmbient(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                const theme = CARPENTER_AMBIENT[themeName] || CARPENTER_AMBIENT.intro;
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(theme.intensity * 0.25, now + 1.5);
                const oscs = [];
                for (let i = 0; i < 3; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i === 0 ? 'sawtooth' : i === 1 ? 'triangle' : 'sawtooth';
                    const detune = (i - 1) * theme.detuneSpread;
                    osc.frequency.value = theme.rootFreq * Math.pow(2, detune / 1200);
                    oscs.push(osc);
                }
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = theme.filterBase;
                filter.Q.value = 2.8;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = theme.lfoRate;
                const lfoG = ctx.createGain();
                lfoG.gain.value = 80;
                lfo.connect(lfoG);
                lfoG.connect(filter.frequency);
                oscs.forEach(o => o.connect(filter));
                filter.connect(gainNode);
                const wet = ctx.createGain();
                wet.gain.value = 0.5;
                gainNode.connect(wet);
                wet.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                oscs.forEach(o => o.start(now));
                lfo.start(now);
                if (theme.noiseMix > 0) {
                    const bufSize = ctx.sampleRate * 2;
                    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                    const data = buf.getChannelData(0);
                    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * theme.noiseMix;
                    const noise = ctx.createBufferSource();
                    noise.buffer = buf;
                    noise.loop = true;
                    const nf = ctx.createBiquadFilter();
                    nf.type = 'lowpass';
                    nf.frequency.value = theme.filterBase * 0.6;
                    nf.Q.value = 0.3;
                    const ng = ctx.createGain();
                    ng.gain.value = theme.noiseMix * 0.3;
                    noise.connect(nf);
                    nf.connect(ng);
                    ng.connect(gainNode);
                    noise.start(now);
                    oscs.push(noise);
                }
                sectionAmbientActive = {
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.6);
                        oscs.forEach(s => { try { s.stop(ctx.currentTime + 0.8); } catch (e) {} });
                        try { lfo.stop(ctx.currentTime + 0.8); } catch (e) {}
                        sectionAmbientActive = null;
                    }
                };
                startEvolvingPatternPlayer(themeName, 40, sectionThemeScore);
            }

            function transitionSectionTheme(themeName, scoreData) {
                if (scoreData) sectionThemeScore = scoreData;
                startCarpenterAmbient(themeName);
            }

            function stopSectionAmbient() {
                if (sectionAmbientActive) { sectionAmbientActive.stop();
                    sectionAmbientActive = null; }
                stopPatternPlayer();
                clearTimeout(crossfadeTimeout);
            }

            // ─── playSound (Carpenter dispatch) ────────────────────────────────
            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    if (!ctx) return;
                    switch (type) {
                        case 'pad':
                        case 'synth_pad':
                            createSynthPad(ctx, 55 + Math.random() * 25, 16 + Math.random() * 16, intensity);
                            break;
                        case 'stab':
                        case 'sting':
                            createSynthStab(ctx, intensity);
                            break;
                        case 'pulse':
                        case 'heartbeat':
                            createPulse(ctx, intensity);
                            setTimeout(() => createPulse(ctx, intensity * 0.7), 180);
                            break;
                        case 'thunder':
                            createThunder(ctx, intensity);
                            break;
                        case 'bell': {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 60 + Math.random() * 25;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0, ctx.currentTime);
                            gain.gain.linearRampToValueAtTime(intensity * 0.35, ctx.currentTime + 0.15);
                            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3.5);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 350;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(ctx.currentTime);
                            osc.stop(ctx.currentTime + 3.5);
                            break;
                        }
                        case 'climax':
                            createClimaxDrone(ctx, intensity);
                            break;
                        case 'bass': {
                            const semitone = Math.floor(Math.random() * 12);
                            createSynthBass(ctx, semitone, intensity, 1.5 + Math.random() * 1.5, 40);
                            break;
                        }
                        case 'kick':
                            createSynthKick(ctx, intensity);
                            break;
                        case 'snare':
                            createSynthSnare(ctx, intensity);
                            break;
                        case 'hat':
                            createSynthHat(ctx, intensity * 0.5);
                            break;
                        case 'arpeggio':
                            createArpeggio(ctx, 50 + Math.random() * 30, 4 + Math.random() * 4, intensity);
                            break;
                        default:
                            console.warn('Unknown sound type:', type);
                    }
                } catch (err) { console.warn('playSound error:', err); }
            }

            // ─── Ambient background ─────────────────────────────────────────────
            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.2, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'storm_ambient' || type === 'wind_howl' || type === 'drone') {
                        const bufSize = ctx.sampleRate * 1.5;
                        const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                        const data = buf.getChannelData(0);
                        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.4;
                        const noise = ctx.createBufferSource();
                        noise.buffer = buf;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'drone' ? 120 : type === 'storm_ambient' ? 180 : 500;
                        filter.Q.value = 0.4;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'drone' ? 50 : type === 'storm_ambient' ? 70 : 100;
                        const gOsc = ctx.createGain();
                        gOsc.gain.value = 0.12 * intensity;
                        osc.connect(gOsc);
                        gOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 80;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) { console.warn('playAmbient error:', err); }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 500);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            // ─── API HELPERS ────────────────────────────────────────────────────
            async function mistralChat(msgs, maxTok = 500, timeoutMs = 28000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.85, max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) { const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`); }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') throw new Error('Request timed out. Please try again.');
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', 1980s motel, neon sign, dark highway, grainy film, horror thriller, cinematic')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e; await new Promise(r =>
                            setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else { clearInterval(timer);
                            resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                return new Promise((resolve, reject) => {
                    if (!text) { resolve(); return; }
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David',
                        'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = 0.62;
                    utterance.pitch = 0.9;
                    utterance.onend = () => resolve();
                    utterance.onerror = (e) => { console.warn('TTS error:', e);
                        resolve(); };
                    speechSynthesis.speak(utterance);
                });
            }

            // ─── STORY & SCORE GENERATION ──────────────────────────────────────
            async function generateNewMotelNight() {
                const system =
                    `You are Frank Harlan, the weary, observant owner of the Wolf Creek Motel—a 12-room roadside motel miles from anywhere. You narrate grounded, brutal stories about the guests who get trapped by severe storms. Your voice is calm, weathered, and unflinching.`;
                const prompt =
                    `Write a 900 to 1100 word short story set entirely at the Wolf Creek Motel during a severe 1980s storm. Use tight third-person prose. No sound cues, no radio script. Strict rules: NO supernatural elements—no ghosts, curses, magic, or dreams. The horror must be purely human: greed, desperation, violence, secrets, betrayal. Follow this structure:
            - 6PM: Guests arrive with ordinary excuses (car trouble, lost, flooded roads). Each has a hidden real reason for stopping.
            - 8PM: Storm intensifies. Roads close. No one can leave. Tension builds.
            - 10PM: Power flickers. Conversations in the lounge reveal cracks. Secrets begin to surface.
            - Midnight: First major confrontation. Trust collapses.
            - 2AM: Everything spirals. Alliances form and break.
            - 4AM: The brutal truth surfaces—not what anyone expected.
            - Dawn: Storm clears. Police or road crews arrive. The motel returns to normal. Frank sweeps up broken glass and waits for the next storm.
            The twist must be realistic, earned, and visceral—no dream cop-outs. Include Frank's quiet observations throughout. Frame the story with Frank's weary opening about the storm, and close with his quiet reflection at dawn.
            Return ONLY a valid JSON object with fields: title (string), story (full narration string, use \\n for line breaks), closing_remark (string). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user', content: prompt }],
                    3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) throw new Error('Invalid story structure.');
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Dark 1980s motel at night during a storm, neon vacancy sign, lonely highway, cinematic, grainy film, suspense thriller poster for "${story.title}"`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate night poster:', e); }
                gameState.currentNight = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system =
                    `You are a sound designer for a John Carpenter-style 80s thriller score. Given a short story, return JSON with THREE keys:
            - "sections": array of 5-6 sections dividing the story into emotional acts. Each has "theme" (one of: intro, tension, pursuit, confrontation, aftermath, closing), "start_char" (inclusive), "end_char" (exclusive). Cover entire story from 0 to ${length}.
            - "cues": array of sound events using types: "sting", "pulse", "thunder", "bell", "climax", "synth_pad", "arpeggio", "bass", "kick", "snare", "hat". Include at least 35 cues spread evenly.
            - "score": object with keys matching theme names. Each key: "bpm" (40-80), "bass" (array of 8 integers 0-24), "kick" (array of 8 integers 0/1), "snare" (array of 8 integers 0/1), "hat" (array of 8 integers 0/1).
            Carpenter style: driving bass, pulsing rhythms, minimal but tense, synth stabs.
            Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and Carpenter-style score patterns.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user', content: userPrompt }],
                    4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try { data = JSON.parse(cleaned); } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) { const candidate = match[0].replace(/,\s*([}\]])/g, '$1'); try { data = JSON.parse(
                                candidate); } catch (e2) { throw new Error('Failed to parse AI soundtrack JSON.'); } } else
                        throw new Error('No JSON found in AI response.');
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                    throw new Error('Missing sections, cues, or score in AI response');
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char < length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({ type: c.type, position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7 }));
                const requiredThemes = ['intro', 'tension', 'pursuit', 'confrontation', 'aftermath', 'closing'];
                const score = {};

                function normalizeArray(arr, maxVal = 24) {
                    if (!Array.isArray(arr)) throw new Error('Expected array, got ' + typeof arr);
                    let clean = arr.map(v => { const n = Number(v); return isNaN(n) ? 0 : Math.min(maxVal, Math.max(0,
                            Math.round(n))); });
                    if (clean.length < 8) { while (clean.length < 8) clean.push(0); } else if (clean.length > 8) { clean =
                            clean.slice(0, 8); }
                    return clean;
                }
                for (const theme of requiredThemes) {
                    if (!data.score[theme]) throw new Error(`AI did not provide a score for theme "${theme}".`);
                    const s = data.score[theme];
                    if (typeof s.bpm !== 'number' || s.bpm < 30 || s.bpm > 120) throw new Error(
                        `Invalid bpm for theme "${theme}": ${s.bpm}`);
                    score[theme] = {
                        bpm: s.bpm,
                        bass: normalizeArray(s.bass, 24),
                        kick: normalizeArray(s.kick, 1),
                        snare: normalizeArray(s.snare, 1),
                        hat: normalizeArray(s.hat, 1)
                    };
                }
                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerformNight() {
                await generateNewMotelNight();
                if (!gameState.currentNight) throw new Error('Failed to generate night story');
                const soundtrack = await generateSoundCueSheet(gameState.currentNight.rawStoryText);
                gameState.currentNight.soundCues = soundtrack;

                await startMotelPerformance();

                // Score indicator

                bubble.appendChild(indicator);

                // Intro
                const intro =
                    `"Funny thing about storms... Most people think they're running from the weather. Truth is, the weather usually arrives second. Tonight, twelve rooms are vacant. By morning... not everyone will be checking out the way they planned. This is the story of '${nightData.title}'."`;
                dialogue.textContent = '';
                const speakIntro = speakTextMale(intro);
                const typeIntro = typewriterEffect(dialogue, intro, 48);
                await Promise.all([speakIntro, typeIntro]);
                await new Promise(r => setTimeout(r, 1200));

                // Start score indicator update loop
                let indicatorInterval = setInterval(() => {
                    if (patternPlayerActive) {
                        const theme = patternPlayerActive.theme || 'intro';
                        const varIdx = currentVariationIdx;
                        const varName = currentSectionPatterns[varIdx] ? currentSectionPatterns[varIdx].name : 'A';
                        const bar = barsInVariation + 1;
                        updateScoreIndicator(theme, varName, bar);
                    } else {
                        updateScoreIndicator('...', '—', 0);
                    }
                }, 1000);

                // Start section music
                if (sectionList && sectionList.length > 0) {
                    transitionSectionTheme(sectionList[0].theme, scoreData);
                } else if (scoreData) {
                    transitionSectionTheme('intro', scoreData);
                }

                const storyText = nightData.rawStoryText || nightData.story;
                if (!storyText) {
                    console.warn('No story text');
                    await showClosingAndFinish(nightData, dialogue, indicatorInterval);
                    return;
                }

                // Build cue checker
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b.start_char) :
                        [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) {
                                currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme, scoreData);

                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) {
                                triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity);
                            }
                            cueIdx++;
                        }
                    };
                }

                dialogue.textContent = '';
                const speakStory = speakTextMale(storyText);
                const typeStory = typewriterEffect(dialogue, storyText, 30, cueChecker);
                await Promise.all([speakStory, typeStory]);

            }
