<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>THE WOLF CREEK MOTEL · 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Special+Elite&family=Orbitron&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050308;
            --screen-bg: #06040c;
            --panel-bg: #080612;
            --text: #d4c8b0;
            --text-dim: #7a6a48;
            --text-bright: #ffe8b0;
            --neon-red: #ff2d2d;
            --neon-red-dim: #6b1018;
            --neon-red-glow: 0 0 14px #ff2d2d88, 0 0 32px #ff000044, 0 0 60px #cc000022;
            --neon-yellow: #ffd700;
            --neon-yellow-dim: #5c4800;
            --neon-yellow-glow: 0 0 10px #ffd70066, 0 0 24px #ffaa0022;
            --border-red: #cc1a1a;
            --border-yellow: #cc9900;
            --input-bg: #0e0c18;
            --button-bg: #100e1a;
            --button-hover: #181428;
            --button-active: #14101c;
            --bevel-light: #242030;
            --bevel-dark: #040206;
            --font-display: 'Orbitron', 'Rajdhani', sans-serif;
            --font-title: 'Orbitron', 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 28px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0c0610 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #161018;
            border-radius: 8px;
            padding: 8px;
            box-shadow: inset 0 0 0 3px #1e1828, 0 0 0 4px #0c0a14, 0 0 0 8px #060408, 0 8px 48px #000000dd, 0 0 40px #ff2d2d11, 0 0 80px #ffd70008;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 3px;
                max-height: 100vh;
                box-shadow: none;
                background: #08040e;
            }
        }
        .power-led {
            position: absolute;
            bottom: 16px;
            right: 20px;
            width: 7px;
            height: 7px;
            background: #ff2d2d;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff2d2dcc, 0 0 22px #ff000066;
            animation: neonPulse 1.8s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes neonPulse {
            0%,
            100% {
                box-shadow: 0 0 10px #ff2d2dcc, 0 0 22px #ff000066;
            }
            50% {
                box-shadow: 0 0 18px #ff2d2dff, 0 0 36px #ff000099, 0 0 50px #ff000033;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 14px;
            left: 18px;
            font-family: var(--font-mono);
            font-size: 8px;
            color: #4a3828;
            letter-spacing: 3px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 2px;
            border: 2px solid #cc1a1a55;
            box-shadow: var(--neon-red-glow), inset 0 0 90px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 1px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.5;
            }
            99.5% {
                opacity: 0.8;
            }
            99.6% {
                opacity: 0.35;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #08040c;
            border-bottom: 2px solid #ff2d2d55;
            padding: 8px 14px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 1.5px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #100818;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #ff2d2d44;
            border-radius: 2px;
            padding: 8px 12px;
            background: #05020a;
            position: relative;
            box-shadow: inset 0 0 20px #ff000008;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 14px;
            right: 14px;
            height: 1px;
            background: #ffd700;
            box-shadow: 0 0 10px #ffd70088, 0 0 30px #ffaa0044;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 14px;
            right: 14px;
            height: 1px;
            background: #ff2d2d66;
            box-shadow: 0 0 8px #ff2d2d44;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #ffd700;
            text-shadow: 0 0 20px #ffd700aa, 0 0 40px #ffaa0055, 0 2px 4px #000, 0 0 60px #ff8c0022;
            letter-spacing: 2px;
            font-family: var(--font-title);
            line-height: 1.2;
            font-weight: 700;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 10px;
            color: #ff2d2d88;
            letter-spacing: 4px;
            margin-top: 2px;
            text-shadow: 0 0 8px #ff2d2d44;
        }
        .vacancy-badge {
            display: inline-block;
            background: #000;
            border: 1px solid #ff2d2d;
            color: #ff2d2d;
            padding: 2px 8px;
            font-family: var(--font-display);
            font-size: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #ff2d2d88;
            box-shadow: 0 0 12px #ff000033;
            animation: vacancyBlink 3s ease-in-out infinite;
            margin-left: 6px;
            vertical-align: middle;
        }
        @keyframes vacancyBlink {
            0%,
            85%,
            100% {
                opacity: 1;
            }
            90% {
                opacity: 0.3;
            }
            93% {
                opacity: 0.9;
            }
            95% {
                opacity: 0.2;
            }
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 19px;
                letter-spacing: 1px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #3a1020 #06040c;
            display: flex;
            flex-direction: column;
            padding: 3px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 4px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #06040c;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #3a1020;
            border-radius: 2px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 8px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #1e1828;
            border-top-color: #2a2238;
            border-left-color: #241e30;
            border-right-color: #181420;
            border-bottom-color: #0e0c18;
            padding: 10px 16px;
            border-radius: 2px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #181420;
            border-left-color: #181420;
            border-bottom-color: #2a2238;
            border-right-color: #241e30;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #0e0c18;
        }
        .btn.accent {
            background: #100a10;
            border-color: #cc1a1a44;
            border-top-color: #ff2d2d66;
            border-left-color: #dd222255;
            border-right-color: #99111133;
            border-bottom-color: #44080822;
            color: #ffd0a0;
            box-shadow: 0 2px 0 #00000044, 0 0 12px #ff2d2d22;
        }
        .btn.accent:active {
            border-top-color: #99111133;
            border-left-color: #99111133;
            border-bottom-color: #ff2d2d66;
            border-right-color: #dd222255;
            box-shadow: 0 0px 0 #00000044, 0 0 20px #ff2d2d55;
        }
        .btn.yellow-accent {
            background: #0e0a08;
            border-color: #cc990044;
            border-top-color: #ffd70055;
            border-left-color: #eebb0044;
            border-right-color: #99660033;
            border-bottom-color: #33220022;
            color: #ffe8b0;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #ffd70022;
        }
        .btn.yellow-accent:active {
            border-top-color: #99660033;
            border-left-color: #99660033;
            border-bottom-color: #ffd70055;
            border-right-color: #eebb0044;
            box-shadow: 0 0px 0 #00000044, 0 0 18px #ffd70044;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .theater-mask {
            position: relative;
            background: #0a0814;
            border: 1px solid #ff2d2d33;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #080610;
            border: 1px solid #ff2d2d44;
            padding: 12px;
            border-radius: 2px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            width: 100%;
        }
        .host-portrait {
            width: 90px;
            height: 90px;
            border-radius: 3px;
            border: 2px solid #ffd70055;
            box-shadow: 0 0 18px #ffd70044, 0 0 0 2px #1a0a08;
            object-fit: cover;
            flex-shrink: 0;
            background: #0a0610;
        }
        .speech-bubble {
            flex: 1;
            background: #0e0c18;
            border: 1px solid #ffd70044;
            border-radius: 4px;
            padding: 10px;
            position: relative;
            color: #d4bfa8;
            font-size: 17px;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: inset 0 0 20px #00000044;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 18px;
            border-width: 7px 10px 7px 0;
            border-style: solid;
            border-color: transparent #ffd70033 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 2px;
            max-height: 180px;
            object-fit: cover;
            background: #080610;
            border: 1px solid #ff2d2d33;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 100px;
            background: #100e18;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a6a48;
            font-size: 13px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.35;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 200px;
            overflow: hidden;
            border-radius: 2px;
            border: 1px solid #ff2d2d44;
            box-shadow: 0 0 16px #ff2d2d33, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #080610;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(4, 3, 8, 0.85) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 6px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 12px;
            letter-spacing: 2px;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700cc, 0 0 30px #ffaa0066, 0 2px 4px #000000, 0 0 50px #ff8c0022;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom, rgba(8, 4, 12, 0.9) 0%, rgba(8, 4, 12, 0.6) 40%, transparent 100%);
            padding: 5px 10px 8px;
            font-weight: 700;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 8px;
            left: 6px;
            right: 6px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 14px;
            letter-spacing: 1px;
            color: #ff2d2d;
            text-shadow: 0 0 8px #ff2d2daa, 0 0 20px #cc000044, 0 2px 4px #000000;
            background: linear-gradient(to top, rgba(4, 3, 8, 0.9) 0%, rgba(4, 3, 8, 0.5) 50%, transparent 100%);
            padding: 8px 6px 5px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a6a48;
            font-size: 13px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 150px;
            }
            .poster-overlay-theater {
                font-size: 10px;
                letter-spacing: 1.5px;
                top: 3px;
                padding: 3px 6px 6px;
            }
            .poster-overlay-title {
                font-size: 11px;
                bottom: 4px;
                padding: 6px 4px 3px;
            }
        }
        .tv-guide {
            margin-top: 12px;
            border-top: 1px solid #ffd70033;
            padding-top: 8px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #ffd700;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            font-size: 16px;
            text-shadow: 0 0 8px #ffd70044;
            font-weight: 600;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0814;
            border: 1px solid #ff2d2d33;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 2px;
            gap: 6px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 13px;
            color: #ff2d2d;
            min-width: 44px;
            text-shadow: 0 0 6px #ff2d2d44;
        }
        .guide-info {
            flex: 1;
            min-width: 90px;
        }
        .guide-title {
            font-size: 15px;
            color: #ffd700;
        }
        .guide-desc {
            font-size: 14px;
            color: #7a6a48;
        }
        .guide-btn {
            padding: 5px 10px;
            font-size: 13px;
            min-height: 28px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 3px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .modal-content {
            background: #0c0a16;
            border-radius: 4px;
            width: 100%;
            max-width: 420px;
            padding: 18px;
            text-align: center;
            border: 2px solid #ff2d2d66;
            box-shadow: var(--neon-red-glow), 0 0 80px #000000dd;
            color: #d4c8b0;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #100e1a;
            border: 1px solid #ff2d2d55;
            padding: 8px 16px;
            border-radius: 2px;
            margin: 4px;
            cursor: pointer;
            color: #d4c8b0;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #ff2d2d;
            box-shadow: 0 0 16px #ff2d2d55;
        }
        .loading-text {
            color: #ffd700;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            background: #05030a;
            border-top: 1px solid #ff2d2d33;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 10px;
            color: #3a2818;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #4a3828;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #1a1418;
            color: #4a3828;
            font-size: 9px;
            cursor: pointer;
            padding: 3px 7px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #ff2d2d44;
            color: #ff2d2d88;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #ffd700;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
            box-shadow: 0 0 6px #ffd70088;
        }
        .back-btn {
            margin-top: 6px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 70px;
                height: 70px;
                border-radius: 2px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 130px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">WOLF CREEK MOTEL · CRT-84</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">WOLF CREEK<span class="vacancy-badge">VACANCY</span><br>MOTEL</div>
                    <div class="marquee-sub">⏤ EST. 1984 · 12 ROOMS ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="motelPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🟡 VACANCY · NO VACANCY · VACANCY</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('wolfcreek_motel_key') || '';

            const DEFAULT_STATE = {
                motelNights: [],
                currentNight: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>🟡 The Owner</h2>
        <p style="text-align:left;">
            <strong>Name:</strong> Frank Harlan<br>
            <strong>Age:</strong> Mid-50s<br>
            <strong>Background:</strong> A widower who bought the Wolf Creek Motel after his wife passed. He keeps to himself, makes coffee, fixes generators, and stays out of guests' business—until he can't. He's seen enough stormy nights to know that the weather isn't what people are really running from.<br>
            <strong>Role:</strong> The audience's eyes. Like the bartender in <em>Key Largo</em>, Frank deals with whoever walks through the door.
        </p>
    `;

            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let crossfadeTimeout = null;

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.22;
                    reverbNode.connect(masterGain);
                    masterGain.connect(audioCtx.destination);
                    const compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.value = -24;
                    compressor.knee.value = 30;
                    compressor.ratio.value = 12;
                    compressor.attack.value = 0.003;
                    compressor.release.value = 0.25;
                    masterGain.connect(compressor);
                    compressor.connect(audioCtx.destination);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 1.0;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.35;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                    reverbNode.connect(masterGain);
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 2.5;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.5));
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            function createWarmPad(ctx, rootFreq, duration, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.16, now + 0.8);
                gainNode.gain.setValueAtTime(intensity * 0.16, now + duration - 1.5);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.3);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = rootFreq;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = rootFreq * 1.005;
                const osc3 = ctx.createOscillator();
                osc3.type = 'triangle';
                osc3.frequency.value = rootFreq / 2;
                const osc4 = ctx.createOscillator();
                osc4.type = 'sawtooth';
                osc4.frequency.value = rootFreq * 1.498;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 1.8;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.15 + Math.random() * 0.15;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 150 + Math.random() * 150;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                osc4.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                osc4.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                osc4.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            function createTensionSting(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.22, now + 0.04);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 2.0);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.3);
                osc.frequency.exponentialRampToValueAtTime(120, now + 1.8);

                const osc2 = ctx.createOscillator();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(400, now);
                osc2.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
                osc2.frequency.exponentialRampToValueAtTime(250, now + 1.8);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1000;
                filter.Q.value = 1;

                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc.start(now);
                osc2.start(now);
                osc.stop(now + 2.0);
                osc2.stop(now + 2.0);
            }

            function createThunder(ctx, intensity = 0.7) {
                const now = ctx.currentTime;
                const bufferSize = ctx.sampleRate * 0.6;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.35));
                }
                const source = ctx.createBufferSource();
                source.buffer = buffer;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.55, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 120;
                filter.Q.value = 0.5;
                source.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                source.start(now);
                source.stop(now + 1.0);
            }

            function createHeartbeat(ctx, intensity = 0.7) {
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(55, now);
                osc.frequency.exponentialRampToValueAtTime(25, now + 0.08);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.7, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 0.08);
            }

            function createClimaxPad(ctx, intensity = 0.75) {
                const now = ctx.currentTime;
                const duration = 6 + Math.random() * 5;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.4, now + 2.5);
                gainNode.gain.setValueAtTime(intensity * 0.45, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(100, now);
                osc1.frequency.exponentialRampToValueAtTime(200, now + duration * 0.5);
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(200, now);
                osc2.frequency.exponentialRampToValueAtTime(400, now + duration * 0.5);
                const osc3 = ctx.createOscillator();
                osc3.type = 'square';
                osc3.frequency.setValueAtTime(100, now);
                osc3.frequency.exponentialRampToValueAtTime(300, now + duration * 0.7);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(350, now);
                filter.frequency.exponentialRampToValueAtTime(1400, now + duration);
                filter.Q.value = 2;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.12;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 180;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    switch (type) {
                        case 'pad':
                            createWarmPad(ctx, 100 + Math.random() * 50, 18 + Math.random() * 18, intensity);
                            break;
                        case 'sting':
                            createTensionSting(ctx, intensity);
                            break;
                        case 'heartbeat':
                            createHeartbeat(ctx, intensity);
                            setTimeout(() => createHeartbeat(ctx, intensity * 0.85), 160);
                            break;
                        case 'thunder':
                            createThunder(ctx, intensity);
                            break;
                        case 'bell': {
                            const now = ctx.currentTime;
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 70 + Math.random() * 25;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0, now);
                            gain.gain.linearRampToValueAtTime(intensity * 0.35, now + 0.08);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 3.5);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 450;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(now);
                            osc.stop(now + 3.5);
                            break;
                        }
                        case 'climax':
                            createClimaxPad(ctx, intensity);
                            break;
                        default:
                            console.warn(`Unknown sound type: ${type}`);
                    }
                } catch (err) {
                    console.error(`Error in playSound("${type}"):`, err);
                }
            }

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(gainValue * 0.25, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'storm_ambient' || type === 'wind_howl') {
                        const bufferSize = ctx.sampleRate * 1;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.4;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'storm_ambient' ? 180 : 500;
                        filter.Q.value = 0.5;
                        noise.connect(filter);
                        filter.connect(gainNode);
                        noise.start(now);
                        source = { noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 90;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) {
                    console.error(`Error in playAmbient("${type}"):`, err);
                }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 300);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            function saveState() { try { localStorage.setItem('wolfcreek_motel_state', JSON.stringify(
                    gameState)); } catch (e) {} }

            function loadState() {
                try {
                    const saved = localStorage.getItem('wolfcreek_motel_state');
                    if (saved) gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
                    gameState.motelNights = gameState.motelNights || [];
                    gameState.currentNight = gameState.currentNight || null;
                } catch (e) {}
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 25000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' +
                                apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.85,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) { const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`); }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') { throw new Error(
                            'Request timed out. Please try again.'); }
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) { await new Promise(r => setTimeout(r, gameState
                        .imageCooldownUntil - now + 500)); }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 1980s motel, neon sign, dark highway, grainy film, cinematic')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) { try { return await generateImage(prompt); } catch (
                    e) { lastError = e; await new Promise(r => setTimeout(r, 20)); } }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) { element.textContent += text.charAt(i); if (
                                onChar) onChar(i);
                            i++; } else { clearInterval(timer);
                            resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                    'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                ];
                let voice = null;
                for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (
                    voice) break; }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[
                0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.6;
                utterance.pitch = 0.9;
                speechSynthesis.speak(utterance);
            }

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (
                            voice) break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[
                    0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.6;
                    utterance.pitch = voiceConfig.pitch || 0.9;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) { currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar); if (
                                cueChecker) cueChecker(currentChar); }
                    };
                    utterance.onend = () => { element.textContent = text; if (cueChecker) cueChecker(text
                            .length);
                        resolve(); };
                    utterance.onerror = (e) => { console.warn('TTS error:', e);
                        element.textContent = text;
                        resolve(); };
                    speechSynthesis.speak(utterance);
                });
            }

            function showModal(html) {
                document.getElementById('genericModalContent').innerHTML = html;
                document.getElementById('genericModal').style.display = 'flex';
            }

            function closeModal() {
                document.getElementById('genericModal').style.display = 'none';
                speechSynthesis.cancel();
            }
            window.closeModal = closeModal;

            // ── 80s FILM SCORE ENGINE ──
            function createScoreNote(ctx, frequency, startTime, duration, gainValue, type = 'sawtooth') {
                const now = startTime;
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.006;
                const sub = ctx.createOscillator();
                sub.type = 'triangle';
                sub.frequency.value = frequency / 2;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                filter.Q.value = 1.6;
                const filterEnv = ctx.createGain();
                filterEnv.gain.setValueAtTime(900, now);
                filterEnv.gain.exponentialRampToValueAtTime(250, now + 0.12);
                filterEnv.gain.exponentialRampToValueAtTime(60, now + duration * 0.75);
                filterEnv.connect(filter.frequency);
                const mainGain = ctx.createGain();
                mainGain.gain.setValueAtTime(0, now);
                mainGain.gain.linearRampToValueAtTime(gainValue * 0.28, now + 0.03);
                mainGain.gain.setValueAtTime(gainValue * 0.28, now + duration * 0.55);
                mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.12);
                osc1.connect(filter);
                osc2.connect(filter);
                sub.connect(filter);
                filter.connect(mainGain);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.75;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.4;
                mainGain.connect(drySend);
                mainGain.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);
                osc1.start(now);
                osc2.start(now);
                sub.start(now);
                osc1.stop(now + duration + 0.2);
                osc2.stop(now + duration + 0.2);
                sub.stop(now + duration + 0.2);
            }

            function createScoreKick(ctx, time) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(140, time);
                osc.frequency.exponentialRampToValueAtTime(28, time + 0.07);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.018, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) { noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-
                        i / (ctx.sampleRate * 0.0025)); }
                const click = ctx.createBufferSource();
                click.buffer = noiseBuffer;
                const clickFilter = ctx.createBiquadFilter();
                clickFilter.type = 'highpass';
                clickFilter.frequency.value = 1800;
                click.connect(clickFilter);
                const gainClick = ctx.createGain();
                gainClick.gain.setValueAtTime(0.45, time);
                gainClick.gain.exponentialRampToValueAtTime(0.001, time + 0.018);
                clickFilter.connect(gainClick);
                const gainBody = ctx.createGain();
                gainBody.gain.setValueAtTime(0.6, time);
                gainBody.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
                osc.connect(gainBody);
                gainBody.connect(dryGain);
                gainClick.connect(dryGain);
                osc.start(time);
                click.start(time);
                osc.stop(time + 0.18);
                click.stop(time + 0.018);
            }

            function createScoreSnare(ctx, time) {
                const body = ctx.createOscillator();
                body.type = 'triangle';
                body.frequency.setValueAtTime(180, time);
                body.frequency.exponentialRampToValueAtTime(70, time + 0.07);
                const bodyGain = ctx.createGain();
                bodyGain.gain.setValueAtTime(0.5, time);
                bodyGain.gain.exponentialRampToValueAtTime(0.001, time + 0.09);
                body.connect(bodyGain);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.13, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) { noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-
                        i / (ctx.sampleRate * 0.025)); }
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.55, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                bodyGain.connect(dryGain);
                noiseGain.connect(dryGain);
                body.start(time);
                noise.start(time);
                body.stop(time + 0.09);
                noise.stop(time + 0.13);
            }

            // 80s film-style score patterns
            const SCORE_PATTERNS = {
                intro: { bpm: 55, bass: [0, 0, 5, 5, 0, 0, 7, 7], arp: [12, 14, 12, 17, 12, 14, 12, 19],
                    kick: [1, 0, 0, 1, 0, 0, 0, 1], snare: [0, 0, 0, 1, 0, 0, 0, 1] },
                setup: { bpm: 60, bass: [0, 5, 3, 2, 0, 5, 3, 7], arp: [12, 17, 19, 17, 12, 17, 19, 22],
                    kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 0, 1, 0, 0, 0, 1, 0] },
                scheme: { bpm: 65, bass: [0, 2, 3, 5, 7, 5, 3, 2], arp: [12, 17, 19, 22, 24, 22, 19, 17],
                    kick: [1, 0, 1, 1, 1, 0, 1, 0], snare: [0, 1, 0, 1, 0, 1, 0, 1] },
                execution: { bpm: 72, bass: [0, 7, 0, 7, 3, 7, 3, 7], arp: [12, 19, 15, 19, 12, 19, 15, 24],
                    kick: [1, 1, 1, 1, 1, 1, 1, 1], snare: [0, 1, 0, 1, 0, 1, 0, 1] },
                twist: { bpm: 68, bass: [0, 2, 4, 6, 0, 2, 4, 8], arp: [12, 16, 20, 24, 12, 16, 20, 26],
                    kick: [1, 0, 1, 0, 1, 0, 1, 1], snare: [1, 1, 1, 1, 1, 1, 1, 1] },
                closing: { bpm: 50, bass: [0, 5, 3, 0, 5, 3, 0, 7], arp: [12, 14, 12, 17, 12, 14, 12, 19],
                    kick: [1, 0, 0, 0, 1, 0, 0, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] }
            };

            function startSectionScore(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                const perf = gameState.currentNight;
                let customScore = null;
                if (perf && perf.soundCues && perf.soundCues.score) { customScore = perf.soundCues.score; }
                const fallbackTheme = SCORE_PATTERNS[themeName] || SCORE_PATTERNS.intro;
                const theme = (customScore && customScore[themeName]) ? customScore[themeName] : fallbackTheme;
                const rootFreq = 55;
                const beatDuration = 60 / theme.bpm;
                const patternLength = theme.bass.length;
                const ctx = audioCtx;
                let step = 0;
                let nextStepTime = ctx.currentTime;
                let timeoutId = null;
                const padGain = ctx.createGain();
                padGain.gain.value = 0.09;
                const padOsc1 = ctx.createOscillator();
                padOsc1.type = 'sawtooth';
                padOsc1.frequency.value = rootFreq;
                const padOsc2 = ctx.createOscillator();
                padOsc2.type = 'sawtooth';
                padOsc2.frequency.value = rootFreq * 1.501;
                const padOsc3 = ctx.createOscillator();
                padOsc3.type = 'triangle';
                padOsc3.frequency.value = rootFreq / 2;
                const padFilter = ctx.createBiquadFilter();
                padFilter.type = 'lowpass';
                padFilter.frequency.value = 350;
                padFilter.Q.value = 1.2;
                padOsc1.connect(padFilter);
                padOsc2.connect(padFilter);
                padOsc3.connect(padFilter);
                padFilter.connect(padGain);
                const padDry = ctx.createGain();
                padDry.gain.value = 0.5;
                const padWet = ctx.createGain();
                padWet.gain.value = 0.35;
                padGain.connect(padDry);
                padGain.connect(padWet);
                padDry.connect(dryGain);
                padWet.connect(wetGain);
                padOsc1.start();
                padOsc2.start();
                padOsc3.start();
                const stopSources = [padOsc1, padOsc2, padOsc3];

                function scheduleStep() {
                    if (!sectionAmbientActive) return;
                    const now = nextStepTime;
                    const bassSemitone = theme.bass[step % patternLength];
                    const bassFreq = rootFreq * Math.pow(2, bassSemitone / 12);
                    createScoreNote(ctx, bassFreq, now, beatDuration * 0.85, 0.7, 'sawtooth');
                    const arpSemitone = theme.arp[step % patternLength];
                    const arpFreq = rootFreq * Math.pow(2, arpSemitone / 12);
                    createScoreNote(ctx, arpFreq, now, beatDuration * 0.45, 0.5, 'square');
                    if (theme.kick[step % patternLength]) createScoreKick(ctx, now);
                    if (theme.snare[step % patternLength]) createScoreSnare(ctx, now);
                    step++;
                    nextStepTime += beatDuration;
                    timeoutId = setTimeout(scheduleStep, (nextStepTime - ctx.currentTime) * 1000);
                }
                nextStepTime = ctx.currentTime + 0.05;
                timeoutId = setTimeout(scheduleStep, 50);
                sectionAmbientActive = {
                    stop: () => {
                        clearTimeout(timeoutId);
                        padGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                        stopSources.forEach(s => { try { s.stop(ctx.currentTime + 0.3); } catch (
                        e) {} });
                        sectionAmbientActive = null;
                    }
                };
            }
            const transitionSectionTheme = startSectionScore;

            function stopSectionAmbient() {
                if (sectionAmbientActive) { sectionAmbientActive.stop();
                    sectionAmbientActive = null; }
                clearTimeout(crossfadeTimeout);
            }

            async function generateNewMotelNight() {
                const system =
                    `You are Frank Harlan, the weary, observant owner of the Wolf Creek Motel—a 12-room roadside motel miles from anywhere. You narrate grounded, brutal stories about the guests who get trapped by severe storms. Your voice is calm, weathered, and unflinching.`;
                const prompt =
                    `Write a 900 to 1100 word short story set entirely at the Wolf Creek Motel during a severe 1980s storm. Use tight third-person prose. No sound cues, no radio script. Strict rules: NO supernatural elements—no ghosts, curses, magic, or dreams. The horror must be purely human: greed, desperation, violence, secrets, betrayal. Follow this structure:
- 6PM: Guests arrive with ordinary excuses (car trouble, lost, flooded roads). Each has a hidden real reason for stopping.
- 8PM: Storm intensifies. Roads close. No one can leave. Tension builds.
- 10PM: Power flickers. Conversations in the lounge reveal cracks. Secrets begin to surface.
- Midnight: First major confrontation. Trust collapses.
- 2AM: Everything spirals. Alliances form and break.
- 4AM: The brutal truth surfaces—not what anyone expected.
- Dawn: Storm clears. Police or road crews arrive. The motel returns to normal. Frank sweeps up broken glass and waits for the next storm.
The twist must be realistic, earned, and visceral—no dream cop-outs. Include Frank's quiet observations throughout. He rents rooms, makes coffee, stays out of guests' business—until he can't. Frame the story with Frank's weary opening about the storm, and close with his quiet reflection at dawn. Return ONLY a valid JSON object with these fields: title (string, like "The Night the Salesman Arrived"), story (full narration string, use backslash n for line breaks), closing_remark (Frank's quiet sign-off at dawn). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user',
                    content: prompt }
                ], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) { throw new Error(
                        'Invalid story structure.'); }
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Dark 1980s motel at night during a storm, neon vacancy sign, lonely highway, cinematic, grainy film, suspense thriller poster for "${story.title}"`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate night poster:', e); }
                gameState.currentNight = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system = `You are a sound designer for an 80s thriller film soundtrack. Given a short story, return a JSON object with THREE keys:
- "sections": an array of 5‑6 sections that divide the story into emotional acts. Each section must have: "theme" (one of: intro, setup, scheme, execution, twist, closing), "start_char" (inclusive) and "end_char" (exclusive). Cover the entire story from 0 to ${length}.
- "cues": an array of sound events using only these types: "sting", "heartbeat", "thunder", "bell", "climax". No "pad" type. Each cue must have "position" (character index), "type", optional "intensity" (0‑1). Include at least 35 cues, spread evenly.
- "score": an object with keys matching the same theme names. Each key must contain: "bpm" (integer 50‑80), "bass" (array of 8 semitone intervals from root 0), "arp" (array of 8 semitone intervals for arpeggio), "kick" (array of 8 numbers, 1=hit, 0=rest), "snare" (same as kick). Make the music tense and cinematic—think Tangerine Dream meets Vangelis. intro sparse and slow, execution driving, twist dissonant.
Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and score patterns for an 80s film soundtrack.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user',
                    content: userPrompt }
                ], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try { data = JSON.parse(cleaned); } catch (parseErr) {
                    console.warn('AI JSON malformed, repairing…', parseErr);
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) { const candidate = match[0].replace(/,\s*([}\]])/g, '$1'); try { data = JSON.parse(
                                candidate); } catch (e2) { throw new Error(
                                'Failed to parse soundtrack JSON after repair.'); } } else { throw new Error(
                            'No JSON found in AI response.'); }
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object') { throw new Error(
                        'Missing sections, cues, or score in response'); }
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char <
                    length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({ type: c.type, position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7 }));
                const requiredThemes = ['intro', 'setup', 'scheme', 'execution', 'twist', 'closing'];
                const score = {};
                for (const theme of requiredThemes) {
                    score[theme] = data.score[theme] ? {
                        bpm: data.score[theme].bpm || 70,
                        bass: data.score[theme].bass || [0, 0, 7, 7, 0, 0, 7, 7],
                        arp: data.score[theme].arp || [12, 15, 12, 19, 12, 15, 12, 19],
                        kick: data.score[theme].kick || [1, 0, 1, 0, 1, 0, 1, 0],
                        snare: data.score[theme].snare || [0, 0, 0, 1, 0, 0, 0, 1]
                    } : {
                        bpm: 65,
                        bass: [0, 0, 7, 7, 0, 0, 7, 7],
                        arp: [12, 15, 12, 19, 12, 15, 12, 19],
                        kick: [1, 0, 1, 0, 1, 0, 1, 0],
                        snare: [0, 0, 0, 1, 0, 0, 0, 1]
                    };
                }
                return { sections: sortedSections, cues, score };
            }

                addBtn.id = 'motelAddNightBtn';
                addBtn.textContent = '➕ Log This Night';
                addBtn.addEventListener('click', () => { addCurrentNight();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Logged'; });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentNight() {
                const night = gameState.currentNight;
                if (!night) return;
                gameState.motelNights.push({ ...night, rawStoryText: night.rawStoryText, soundCues: night
                        .soundCues });
                saveState();
                setTimeout(() => leaveMotel(), 500);
            }

            function leaveMotel() {
                stopAmbient();
                stopSectionAmbient();
                renderMotelPanel();
            }

            function init() {
                loadState();
                renderMotelPanel();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) { apiKey = key;
                        localStorage.setItem('wolfcreek_motel_key', key); }
                });
                document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e
                        .currentTarget) closeModal(); });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) { showModal(HOST_BIO); }
                });
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
                if (!apiKey) { setTimeout(() => document.getElementById('resetApiBtn').click(), 800); }
            }
            init();
        })();
    </script>
</body>
</html>
