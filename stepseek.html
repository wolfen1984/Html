<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror Tunes Maker · Nightfall Games 1984</title>
    <!-- Atari ST / DOS retro font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        /* Default theme: white on black (classic) */
        body {
            background: #000;
            color: #fff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 10px;
            line-height: 1.6;
            margin: 20px;
            padding: 0;
            display: flex;
            justify-content: center;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            transition: background-color 0.2s, color 0.2s;
        }

        /* Theme: Amber (orange on black) */
        body.theme-amber {
            background: #000;
            color: #ffb000;
        }
        body.theme-amber .dos-container {
            border-color: #ffb000;
            box-shadow: 0 0 0 2px #000, 0 0 0 5px #ffb000;
        }
        body.theme-amber .grid-header,
        body.theme-amber .row-label,
        body.theme-amber .grid-cell,
        body.theme-amber .effect-btn,
        body.theme-amber button,
        body.theme-amber .tempo-area,
        body.theme-amber #tempo-value,
        body.theme-amber .wave-selector select {
            border-color: #ffb000;
            color: #ffb000;
        }
        body.theme-amber .grid-cell.active {
            background: #ffb000;
            color: #000;
        }
        body.theme-amber .effect-btn.active {
            background: #ffb000;
            color: #000;
            border-color: #000;
        }

        /* Theme: Green (phosphor green) */
        body.theme-green {
            background: #000;
            color: #0f0;
        }
        body.theme-green .dos-container {
            border-color: #0f0;
            box-shadow: 0 0 0 2px #000, 0 0 0 5px #0f0;
        }
        body.theme-green .grid-header,
        body.theme-green .row-label,
        body.theme-green .grid-cell,
        body.theme-green .effect-btn,
        body.theme-green button,
        body.theme-green .tempo-area,
        body.theme-green #tempo-value,
        body.theme-green .wave-selector select {
            border-color: #0f0;
            color: #0f0;
        }
        body.theme-green .grid-cell.active {
            background: #0f0;
            color: #000;
        }
        body.theme-green .effect-btn.active {
            background: #0f0;
            color: #000;
            border-color: #000;
        }

        /* Theme: Violet (purple horror) */
        body.theme-violet {
            background: #000;
            color: #c0a0ff;
        }
        body.theme-violet .dos-container {
            border-color: #c0a0ff;
            box-shadow: 0 0 0 2px #000, 0 0 0 5px #c0a0ff;
        }
        body.theme-violet .grid-header,
        body.theme-violet .row-label,
        body.theme-violet .grid-cell,
        body.theme-violet .effect-btn,
        body.theme-violet button,
        body.theme-violet .tempo-area,
        body.theme-violet #tempo-value,
        body.theme-violet .wave-selector select {
            border-color: #c0a0ff;
            color: #c0a0ff;
        }
        body.theme-violet .grid-cell.active {
            background: #c0a0ff;
            color: #000;
        }
        body.theme-violet .effect-btn.active {
            background: #c0a0ff;
            color: #000;
            border-color: #000;
        }

        .dos-container {
            max-width: 1300px;
            width: 100%;
            border: 4px double;
            padding: 20px 15px 25px 15px;
            background: #000;
            box-shadow: 0 0 0 2px #000, 0 0 0 5px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        h1, h2 {
            text-align: center;
            font-weight: normal;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        h1 {
            font-size: 20px;
            border-bottom: 2px solid;
            padding-bottom: 12px;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 12px;
            margin-top: -5px;
            opacity: 0.8;
        }

        .sequencer-grid {
            display: grid;
            grid-template-columns: 110px 100px repeat(16, 1fr);
            gap: 2px;
            background: #000;
            border: 2px solid;
            padding: 8px 4px 4px 4px;
            margin: 25px 0 20px 0;
        }

        .grid-cell {
            background: #000;
            border: 1px solid;
            font-size: 9px;
            padding: 8px 2px;
            text-align: center;
            font-family: 'Press Start 2P', monospace;
            min-width: 28px;
        }

        .grid-header {
            background: #000;
            border: 1px solid;
            font-size: 10px;
            padding: 8px 2px;
            text-align: center;
            border-bottom: 3px double;
        }

        .row-label {
            background: #000;
            border: 1px solid;
            font-size: 10px;
            padding: 8px 2px;
            text-align: right;
            padding-right: 10px;
            border-right: 3px double;
        }

        .wave-selector {
            background: #000;
            border: 1px solid;
            padding: 4px 2px;
            text-align: center;
        }

        .wave-selector select {
            background: #000;
            color: inherit;
            border: 2px solid;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            width: 90px;
            padding: 4px 0;
            text-align: center;
            text-transform: uppercase;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        .wave-selector select option {
            background: #000;
            color: inherit;
        }

        .grid-cell.active {
            background: #fff;  /* theme overrides this */
            color: #000;
            border: 1px solid;
        }

        .grid-cell.highlight {
            background: #404040;
            border: 2px solid;
            color: inherit;
        }

        .grid-cell.active.highlight {
            background: #ffffff;
            border: 3px solid #aaa;
            color: #000;
        }

        /* effect panel */
        .effect-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            border: 2px solid;
            padding: 15px 10px;
            margin: 20px 0;
        }

        .effect-btn {
            background: #000;
            border: 2px solid;
            color: inherit;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 8px 16px;
            cursor: pointer;
            text-transform: uppercase;
            min-width: 110px;
        }

        .effect-btn.active {
            background: #fff;
            color: #000;
            border-color: #000;
        }

        .theme-controls, .crt-control {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .theme-btn, .crt-btn {
            background: #000;
            border: 2px solid;
            color: inherit;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 8px 16px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .theme-btn.active {
            background: #fff;
            color: #000;
            border-color: #000;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            border-top: 2px solid;
            padding-top: 20px;
        }

        button {
            background: #000;
            border: 3px double;
            color: inherit;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            padding: 10px 18px;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover {
            background: #fff;
            color: #000;
            border-color: #000;
        }

        button:active {
            transform: translate(2px, 2px);
        }

        .tempo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            border: 2px solid;
            padding: 8px 15px;
        }

        input[type=range] {
            width: 150px;
            background: #000;
            accent-color: currentColor;
            border: 1px solid;
            height: 10px;
        }

        #tempo-value {
            min-width: 45px;
            text-align: center;
            background: #000;
            border: 2px solid;
            padding: 5px 8px;
        }

        .footer-note {
            margin-top: 20px;
            text-align: right;
            font-size: 8px;
            opacity: 0.5;
            border-top: 1px solid;
            padding-top: 12px;
        }

        #export-btn, #save-btn, #load-btn, #clear-btn {
            font-size: 12px;
            padding: 10px 12px;
        }

        #load-file {
            display: none;
        }

        /* CRT overlay (scanlines) */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 4px);
            z-index: 9999;
            display: none;
        }
        .crt-overlay.visible {
            display: block;
        }
    </style>
</head>
<body>
<div class="crt-overlay" id="crtOverlay"></div>
<div class="dos-container">
    <h1>🕱 HORROR TUNES MAKER 🕱</h1>
    <h2>by Nightfall Games 1984</h2>

    <!-- Theme & CRT controls -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <div class="theme-controls">
            <button class="theme-btn" id="theme-default">⚫ CLASSIC</button>
            <button class="theme-btn" id="theme-amber">🟠 AMBER</button>
            <button class="theme-btn" id="theme-green">🟢 GREEN</button>
            <button class="theme-btn" id="theme-violet">🟣 VIOLET</button>
        </div>
        <div class="crt-control">
            <button class="crt-btn" id="crt-toggle">📺 CRT</button>
        </div>
    </div>

    <!-- sequencer grid -->
    <div id="grid-placeholder" class="sequencer-grid" style="grid-template-columns: 110px 100px repeat(16, 1fr);"></div>

    <!-- effect panel -->
    <div class="effect-panel">
        <button id="effect-delay" class="effect-btn" data-effect="delay">DELAY</button>
        <button id="effect-distortion" class="effect-btn" data-effect="distortion">DISTORTION</button>
        <button id="effect-reverb" class="effect-btn" data-effect="reverb">REVERB</button>
        <button id="effect-chorus" class="effect-btn" data-effect="chorus">CHORUS</button>
    </div>

    <div class="controls">
        <button id="playBtn">▶ PLAY</button>
        <button id="stopBtn">⏹ STOP</button>
        <div class="tempo-area">
            <span>BPM</span>
            <input type="range" id="tempoSlider" min="60" max="200" value="120" step="1">
            <span id="tempo-value">120</span>
        </div>
        <button id="save-btn">💾 SAVE</button>
        <button id="load-btn">📂 LOAD</button>
        <button id="clear-btn">🗑 CLEAR</button>
        <button id="export-btn">🎙 EXPORT</button>
    </div>
    <div class="footer-note">
        [ 12 tracks · 9 waveforms · pulse/FM/wavetable · noise colors · CRT themes ]
    </div>
</div>

<!-- hidden file input for loading -->
<input type="file" id="load-file" accept=".json,application/json">

<script>
    (function() {
        // ---------- CONSTANTS ----------
        const ROWS = 12;
        const STEPS = 16;
        const NOTE_FREQS = [
            130.81, 155.56, 174.61, 196.00, 207.65, 233.08,
            261.63, 311.13, 329.63, 349.23, 392.00, 415.30
        ];
        const NOTE_NAMES = [ "C3", "D#3", "F3", "G3", "G#3", "A#3", "C4", "D#4", "E4", "F#4", "G4", "G#4" ];

        // Available waveforms (extended)
        const WAVEFORM_OPTIONS = [
            'square', 'sawtooth', 'triangle', 'pulse', 'fm', 'wavetable',
            'whitenoise', 'pinknoise', 'brownnoise'
        ];

        // ---------- GLOBAL STATE ----------
        let pattern = [];
        for (let r = 0; r < ROWS; r++) pattern[r] = new Array(STEPS).fill(false);

        let rowWaveform = new Array(ROWS).fill('square');

        let audioCtx = null;
        let effectsInput = null;
        let currentStep = 0;
        let playing = false;
        let intervalId = null;
        let tempo = 120;

        // effect toggles
        let effectsState = {
            delay: false,
            distortion: false,
            reverb: false,
            chorus: false
        };

        let lastEffectNode = null;

        // CRT overlay
        let crtVisible = false;

        // DOM elements
        const gridDiv = document.getElementById('grid-placeholder');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const tempoSlider = document.getElementById('tempoSlider');
        const tempoSpan = document.getElementById('tempo-value');
        const exportBtn = document.getElementById('export-btn');
        const saveBtn = document.getElementById('save-btn');
        const loadBtn = document.getElementById('load-btn');
        const clearBtn = document.getElementById('clear-btn');
        const loadFile = document.getElementById('load-file');

        // effect buttons
        const delayBtn = document.getElementById('effect-delay');
        const distBtn = document.getElementById('effect-distortion');
        const reverbBtn = document.getElementById('effect-reverb');
        const chorusBtn = document.getElementById('effect-chorus');

        // theme & crt
        const themeDefault = document.getElementById('theme-default');
        const themeAmber = document.getElementById('theme-amber');
        const themeGreen = document.getElementById('theme-green');
        const themeViolet = document.getElementById('theme-violet');
        const crtToggle = document.getElementById('crt-toggle');
        const crtOverlay = document.getElementById('crtOverlay');

        // ---------- BUILD GRID (with extended waveform dropdown) ----------
        function buildGrid() {
            gridDiv.innerHTML = '';

            // Header
            const topLeft = document.createElement('div');
            topLeft.className = 'grid-header';
            topLeft.textContent = '◀▶';
            gridDiv.appendChild(topLeft);

            const waveHeader = document.createElement('div');
            waveHeader.className = 'grid-header';
            waveHeader.textContent = 'WAVE';
            gridDiv.appendChild(waveHeader);

            for (let c = 0; c < STEPS; c++) {
                const stepCell = document.createElement('div');
                stepCell.className = 'grid-header';
                stepCell.textContent = (c + 1).toString();
                stepCell.dataset.col = c;
                gridDiv.appendChild(stepCell);
            }

            // Rows
            for (let r = 0; r < ROWS; r++) {
                // note label
                const labelCell = document.createElement('div');
                labelCell.className = 'row-label';
                labelCell.textContent = NOTE_NAMES[r];
                labelCell.dataset.row = r;
                gridDiv.appendChild(labelCell);

                // waveform selector cell
                const waveCell = document.createElement('div');
                waveCell.className = 'wave-selector';
                const select = document.createElement('select');
                select.dataset.row = r;
                WAVEFORM_OPTIONS.forEach(wave => {
                    const opt = document.createElement('option');
                    opt.value = wave;
                    opt.textContent = wave.toUpperCase();
                    if (wave === rowWaveform[r]) opt.selected = true;
                    select.appendChild(opt);
                });
                select.addEventListener('change', (e) => {
                    const row = parseInt(e.target.dataset.row);
                    rowWaveform[row] = e.target.value;
                });
                waveCell.appendChild(select);
                gridDiv.appendChild(waveCell);

                // step cells
                for (let c = 0; c < STEPS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    if (pattern[r][c]) cell.classList.add('active');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.textContent = '◊';
                    gridDiv.appendChild(cell);
                }
            }

            // Click listeners
            document.querySelectorAll('.grid-cell').forEach(cell => {
                cell.addEventListener('click', (e) => {
                    const row = parseInt(cell.dataset.row);
                    const col = parseInt(cell.dataset.col);
                    if (!isNaN(row) && !isNaN(col)) {
                        pattern[row][col] = !pattern[row][col];
                        if (pattern[row][col]) cell.classList.add('active');
                        else cell.classList.remove('active');
                    }
                });
            });
        }
        buildGrid();

        // ---------- UPDATE GRID FROM PATTERN ----------
        function updateGridFromPattern() {
            const cells = document.querySelectorAll('.grid-cell');
            cells.forEach(cell => {
                const row = parseInt(cell.dataset.row);
                const col = parseInt(cell.dataset.col);
                if (!isNaN(row) && !isNaN(col)) {
                    if (pattern[row][col]) cell.classList.add('active');
                    else cell.classList.remove('active');
                }
            });
        }

        function updateWaveformSelectors() {
            const selects = document.querySelectorAll('.wave-selector select');
            selects.forEach(select => {
                const row = parseInt(select.dataset.row);
                if (!isNaN(row) && rowWaveform[row]) {
                    select.value = rowWaveform[row];
                }
            });
        }

        // ---------- CLEAR ----------
        function clearPattern() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < STEPS; c++) pattern[r][c] = false;
            }
            updateGridFromPattern();
        }

        // ---------- SAVE / LOAD ----------
        function savePattern() {
            const data = {
                rows: ROWS,
                steps: STEPS,
                pattern: pattern,
                rowWaveform: rowWaveform,
                noteNames: NOTE_NAMES
            };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const date = new Date();
            const timestamp = `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2,'0')}-${date.getDate().toString().padStart(2,'0')}_${date.getHours().toString().padStart(2,'0')}-${date.getMinutes().toString().padStart(2,'0')}`;
            a.download = `horror_pattern_${timestamp}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function loadPatternFromFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.rows === ROWS && data.steps === STEPS && Array.isArray(data.pattern) && data.pattern.length === ROWS) {
                        for (let r = 0; r < ROWS; r++) {
                            if (Array.isArray(data.pattern[r]) && data.pattern[r].length === STEPS) {
                                for (let c = 0; c < STEPS; c++) {
                                    pattern[r][c] = !!data.pattern[r][c];
                                }
                            } else throw new Error('Invalid row data');
                        }
                        if (data.rowWaveform && Array.isArray(data.rowWaveform) && data.rowWaveform.length === ROWS) {
                            rowWaveform = data.rowWaveform.slice();
                        } else {
                            rowWaveform = new Array(ROWS).fill('square');
                        }
                        updateGridFromPattern();
                        updateWaveformSelectors();
                    } else alert('Invalid pattern file.');
                } catch (err) {
                    alert('Error loading file: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        // ---------- AUDIO SETUP ----------
        async function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                effectsInput = audioCtx.createGain();
                rebuildEffectChain();
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            return audioCtx;
        }

        function rebuildEffectChain() {
            if (!audioCtx || !effectsInput) return;
            try { effectsInput.disconnect(); } catch(e) {}

            let currentNode = effectsInput;

            function makeDistortionCurve(amount=50) {
                const samples = 44100;
                const curve = new Float32Array(samples);
                for (let i = 0; i < samples; ++i) {
                    let x = (i * 2) / samples - 1;
                    curve[i] = (Math.atan(amount * x) / Math.atan(amount));
                }
                return curve;
            }

            if (effectsState.distortion) {
                const distortion = audioCtx.createWaveShaper();
                distortion.curve = makeDistortionCurve(50);
                distortion.oversample = '4x';
                currentNode.connect(distortion);
                currentNode = distortion;
            }

            if (effectsState.delay) {
                const summer = audioCtx.createGain();
                currentNode.connect(summer);
                const delay = audioCtx.createDelay(1.0);
                delay.delayTime.value = 0.3;
                const feedback = audioCtx.createGain();
                feedback.gain.value = 0.4;
                summer.connect(delay);
                delay.connect(feedback);
                feedback.connect(summer);
                currentNode = delay;
            }

            if (effectsState.chorus) {
                const chorusDelay = audioCtx.createDelay(0.1);
                chorusDelay.delayTime.value = 0.02;
                const lfo = audioCtx.createOscillator();
                lfo.frequency.value = 0.5;
                lfo.type = 'sine';
                const lfoGain = audioCtx.createGain();
                lfoGain.gain.value = 0.005;
                lfo.connect(lfoGain);
                lfoGain.connect(chorusDelay.delayTime);
                lfo.start();
                currentNode.connect(chorusDelay);
                currentNode = chorusDelay;
            }

            if (effectsState.reverb) {
                const reverb = audioCtx.createConvolver();
                const sampleRate = audioCtx.sampleRate;
                const length = sampleRate * 1.2;
                const impulse = audioCtx.createBuffer(2, length, sampleRate);
                for (let ch = 0; ch < 2; ch++) {
                    const channel = impulse.getChannelData(ch);
                    for (let i = 0; i < length; i++) {
                        channel[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sampleRate * 0.2));
                    }
                }
                reverb.buffer = impulse;
                currentNode.connect(reverb);
                currentNode = reverb;
            }

            currentNode.connect(audioCtx.destination);
            lastEffectNode = currentNode;
        }

        // Toggle effect
        function toggleEffect(effect) {
            effectsState[effect] = !effectsState[effect];
            document.querySelectorAll('.effect-btn').forEach(btn => {
                const eff = btn.dataset.effect;
                if (effectsState[eff]) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            if (audioCtx) rebuildEffectChain();
        }

        delayBtn.addEventListener('click', () => toggleEffect('delay'));
        distBtn.addEventListener('click', () => toggleEffect('distortion'));
        reverbBtn.addEventListener('click', () => toggleEffect('reverb'));
        chorusBtn.addEventListener('click', () => toggleEffect('chorus'));

        // ---------- HELPER: create pulse wave periodic wave (duty cycle 0.25) ----------
        function createPulseWave(ctx) {
            // Fourier series for pulse wave with duty cycle 0.25
            const real = new Float32Array(32); // cosine terms (real)
            const imag = new Float32Array(32); // sine terms (imag)
            // DC offset not needed
            for (let n = 1; n < 32; n++) {
                // For pulse with duty cycle d, amplitude = (2/(n*pi)) * sin(n*pi*d)
                const d = 0.25;
                const amp = (2 / (n * Math.PI)) * Math.sin(n * Math.PI * d);
                imag[n] = amp; // sine terms
            }
            return ctx.createPeriodicWave(real, imag);
        }

        // ---------- HELPER: create wavetable (eerie harmonics) ----------
        function createWavetableWave(ctx) {
            const real = new Float32Array(32);
            const imag = new Float32Array(32);
            // Harmonics: 1, 3, 5, 7 with decreasing amplitudes
            imag[1] = 1.0;
            imag[3] = 0.6;
            imag[5] = 0.3;
            imag[7] = 0.15;
            return ctx.createPeriodicWave(real, imag);
        }

        // ---------- NOISE GENERATORS ----------
        function generateWhiteNoiseBuffer(ctx, duration) {
            const sampleRate = ctx.sampleRate;
            const length = Math.max(1, Math.floor(duration * sampleRate));
            const buffer = ctx.createBuffer(1, length, sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < length; i++) data[i] = Math.random() * 2 - 1;
            return buffer;
        }

        function generatePinkNoiseBuffer(ctx, duration) {
            // Simple pink noise using Voss-McCartney (8 octaves)
            const sampleRate = ctx.sampleRate;
            const length = Math.max(1, Math.floor(duration * sampleRate));
            const buffer = ctx.createBuffer(1, length, sampleRate);
            const data = buffer.getChannelData(0);
            let b0, b1, b2, b3, b4, b5, b6;
            b0 = b1 = b2 = b3 = b4 = b5 = b6 = 0.0;
            for (let i = 0; i < length; i++) {
                const white = Math.random() * 2 - 1;
                b0 = 0.99886 * b0 + white * 0.0555179;
                b1 = 0.99332 * b1 + white * 0.0750759;
                b2 = 0.96900 * b2 + white * 0.1538520;
                b3 = 0.86650 * b3 + white * 0.3104856;
                b4 = 0.55000 * b4 + white * 0.5329522;
                b5 = -0.7616 * b5 - white * 0.0168980;
                data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) / 6;
                b6 = white * 0.115926;
            }
            return buffer;
        }

        function generateBrownNoiseBuffer(ctx, duration) {
            const sampleRate = ctx.sampleRate;
            const length = Math.max(1, Math.floor(duration * sampleRate));
            const buffer = ctx.createBuffer(1, length, sampleRate);
            const data = buffer.getChannelData(0);
            let last = 0.0;
            for (let i = 0; i < length; i++) {
                const white = Math.random() * 2 - 1;
                last = (last + (0.02 * white)) / 1.02;
                data[i] = last * 3.5; // scale
            }
            return buffer;
        }

        // ---------- NOTE TRIGGER with extended waveforms ----------
        async function triggerNote(row) {
            if (!audioCtx || audioCtx.state !== 'running' || !effectsInput) return;
            const now = audioCtx.currentTime;
            const freq = NOTE_FREQS[row];
            const wave = rowWaveform[row];
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.25, now + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.18);

            let source = null;

            if (wave === 'whitenoise' || wave === 'pinknoise' || wave === 'brownnoise') {
                // Noise
                let buffer;
                const dur = 0.2;
                switch (wave) {
                    case 'whitenoise': buffer = generateWhiteNoiseBuffer(audioCtx, dur); break;
                    case 'pinknoise': buffer = generatePinkNoiseBuffer(audioCtx, dur); break;
                    case 'brownnoise': buffer = generateBrownNoiseBuffer(audioCtx, dur); break;
                }
                const noiseSource = audioCtx.createBufferSource();
                noiseSource.buffer = buffer;
                source = noiseSource;
            } else {
                let oscillator = audioCtx.createOscillator();
                if (wave === 'square' || wave === 'sawtooth' || wave === 'triangle') {
                    oscillator.type = wave;
                    oscillator.frequency.value = freq;
                } else if (wave === 'pulse') {
                    const pulseWave = createPulseWave(audioCtx);
                    oscillator.setPeriodicWave(pulseWave);
                    oscillator.frequency.value = freq;
                } else if (wave === 'wavetable') {
                    const wtWave = createWavetableWave(audioCtx);
                    oscillator.setPeriodicWave(wtWave);
                    oscillator.frequency.value = freq;
                } else if (wave === 'fm') {
                    // Simple FM: carrier + modulator
                    const carrier = audioCtx.createOscillator();
                    carrier.frequency.value = freq;
                    const modulator = audioCtx.createOscillator();
                    modulator.frequency.value = freq * 2; // ratio 2
                    const modGain = audioCtx.createGain();
                    modGain.gain.value = 50; // modulation depth in Hz
                    modulator.connect(modGain);
                    modGain.connect(carrier.frequency);
                    // we need to route carrier to gainNode
                    carrier.connect(gainNode);
                    modulator.start(now);
                    carrier.start(now);
                    modulator.stop(now + 0.2);
                    carrier.stop(now + 0.2);
                    source = carrier; // not actually used for connection, but we already connected
                    // we still need to connect gainNode to effectsInput, but we'll do that after the conditional
                    gainNode.connect(effectsInput);
                    return; // early exit because we already connected carrier
                }

                if (source === null) source = oscillator;
            }

            if (source) {
                source.connect(gainNode);
                gainNode.connect(effectsInput);
                source.start(now);
                source.stop(now + 0.2);
            }
        }

        // ---------- STEP PLAYBACK ----------
        function playStepAndAdvance() {
            if (!playing) return;
            document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('highlight'));

            for (let r = 0; r < ROWS; r++) {
                if (pattern[r][currentStep]) triggerNote(r);
            }

            document.querySelectorAll(`.grid-cell[data-col="${currentStep}"]`).forEach(c => {
                c.classList.add('highlight');
            });

            currentStep = (currentStep + 1) % STEPS;
        }

        async function startSequencer() {
            if (playing) return;
            await getAudioContext();
            if (intervalId) clearInterval(intervalId);
            playing = true;
            const stepMs = (60 / tempo) * 1000 / 4;
            playStepAndAdvance();
            intervalId = setInterval(playStepAndAdvance, stepMs);
        }

        function stopSequencer() {
            playing = false;
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            currentStep = 0;
            document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('highlight'));
        }

        function tempoChanged(newTempo) {
            tempo = newTempo;
            tempoSpan.textContent = tempo;
            if (playing) {
                if (intervalId) clearInterval(intervalId);
                const stepMs = (60 / tempo) * 1000 / 4;
                intervalId = setInterval(playStepAndAdvance, stepMs);
            }
        }

        // ---------- EXPORT ----------
        async function exportAudio() {
            if (!audioCtx) await getAudioContext();
            stopSequencer();
            if (audioCtx.state !== 'running') await audioCtx.resume();

            const mediaDest = audioCtx.createMediaStreamDestination();
            if (lastEffectNode) lastEffectNode.connect(mediaDest);
            else effectsInput.connect(mediaDest);

            const recorder = new MediaRecorder(mediaDest.stream);
            const chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `horror_tune_${Date.now()}.webm`;
                a.click();
                URL.revokeObjectURL(url);
                if (lastEffectNode) lastEffectNode.disconnect(mediaDest);
                else effectsInput.disconnect(mediaDest);
            };

            const stepSec = (60 / tempo) / 4;
            const totalSec = 64 * stepSec;

            recorder.start();
            currentStep = 0;
            playing = true;
            const stepMs = stepSec * 1000;
            playStepAndAdvance();
            const playInterval = setInterval(() => {
                if (playing) playStepAndAdvance();
            }, stepMs);

            setTimeout(() => {
                clearInterval(playInterval);
                playing = false;
                recorder.stop();
                stopSequencer();
            }, totalSec * 1000);
        }

        // ---------- THEME SWITCHING ----------
        function setTheme(themeName) {
            document.body.className = ''; // remove all theme classes
            if (themeName !== 'default') document.body.classList.add(`theme-${themeName}`);
            // update active button
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            if (themeName === 'default') themeDefault.classList.add('active');
            else if (themeName === 'amber') themeAmber.classList.add('active');
            else if (themeName === 'green') themeGreen.classList.add('active');
            else if (themeName === 'violet') themeViolet.classList.add('active');
        }

        themeDefault.addEventListener('click', () => setTheme('default'));
        themeAmber.addEventListener('click', () => setTheme('amber'));
        themeGreen.addEventListener('click', () => setTheme('green'));
        themeViolet.addEventListener('click', () => setTheme('violet'));

        // CRT toggle
        crtToggle.addEventListener('click', () => {
            crtVisible = !crtVisible;
            if (crtVisible) crtOverlay.classList.add('visible');
            else crtOverlay.classList.remove('visible');
        });

        // ---------- EVENT LISTENERS ----------
        playBtn.addEventListener('click', startSequencer);
        stopBtn.addEventListener('click', stopSequencer);
        tempoSlider.addEventListener('input', (e) => tempoChanged(parseInt(e.target.value, 10)));
        exportBtn.addEventListener('click', exportAudio);
        saveBtn.addEventListener('click', savePattern);
        clearBtn.addEventListener('click', clearPattern);
        loadBtn.addEventListener('click', () => loadFile.click());
        loadFile.addEventListener('change', (e) => {
            if (e.target.files[0]) loadPatternFromFile(e.target.files[0]);
            loadFile.value = '';
        });

        // Double‑click row label to test note
        document.querySelectorAll('.row-label').forEach((label, idx) => {
            label.addEventListener('dblclick', async () => {
                await getAudioContext();
                if (audioCtx.state === 'running') triggerNote(idx);
                else audioCtx.resume().then(() => triggerNote(idx));
            });
        });

        // Initial theme (default)
        setTheme('default');
    })();
</script>
</body>
</html>
