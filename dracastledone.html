<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dracula's Castle - AI Driven (Mistral)</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* ---------- (Same CSS as the original – unchanged) ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            line-height: 1.6;
            padding: 10px;
            max-width: 1200px;
            margin: 0 auto;
            overflow-x: hidden;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            min-height: 96vh;
            border: 2px solid #fff;
            padding: 15px;
            position: relative;
            overflow: hidden;
        }
        
        .header {
            text-align: center;
            border-bottom: 2px solid #fff;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        
        h1 {
            color: #ff0000;
            font-size: 2.2rem;
            text-shadow: 0 0 5px #ff0000;
            margin-bottom: 8px;
        }
        
        h2 {
            color: #fff;
            font-size: 1.3rem;
            margin-bottom: 12px;
            border-bottom: 1px dashed #fff;
            padding-bottom: 5px;
        }
        
        .game-area {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }
        
        .main-content {
            flex: 3;
            min-width: 300px;
            display: flex;
            flex-direction: column;
        }
        
        .side-panel {
            flex: 1;
            min-width: 250px;
            border-left: 2px solid #fff;
            padding-left: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .screen {
            background-color: #111;
            border: 2px solid #fff;
            padding: 15px;
            flex: 1;
            min-height: 300px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 15px;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        
        .screen-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            animation: fadeIn 0.5s;
            padding: 4px 0;
        }
        
        .npc-message {
            color: #ffff00;
        }
        
        .player-message {
            color: #00ff00;
        }
        
        .enemy-message {
            color: #ff3333;
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        
        button {
            background-color: #000;
            color: #fff;
            border: 2px solid #fff;
            padding: 10px 12px;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 180px;
        }
        
        button:hover {
            background-color: #333;
            transform: scale(1.02);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        button.primary {
            background-color: #222;
            border-color: #ff0000;
            color: #ff0000;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        button:disabled:hover {
            background-color: #000;
            transform: none;
        }
        
        .stat-box {
            margin-bottom: 20px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.75rem;
        }
        
        .stat-value {
            color: #00ff00;
        }
        
        .inventory {
            margin-top: 20px;
        }
        
        .inventory-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.75rem;
        }
        
        .item-icon {
            margin-right: 8px;
            font-size: 1rem;
        }
        
        .game-progress {
            margin-top: 20px;
        }
        
        .progress-bar {
            width: 100%;
            height: 18px;
            background-color: #111;
            border: 1px solid #fff;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background-color: #ff0000;
            width: 0%;
            transition: width 0.5s;
        }
        
        .character-creation {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .stat-allocation {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .stat-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .stat-btn {
            min-width: 35px;
            padding: 4px;
            font-size: 0.65rem;
        }
        
        .item-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
        }
        
        .item-option {
            padding: 8px;
            border: 1px solid #fff;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.7rem;
        }
        
        .item-option.selected {
            border-color: #ff0000;
            background-color: #222;
            color: #ff0000;
        }
        
        .item-option:hover {
            background-color: #333;
        }
        
        .warning {
            color: #ff3333;
            font-size: 0.7rem;
            margin-top: 10px;
            text-align: center;
        }
        
        .game-over {
            color: #ff0000;
            text-align: center;
            font-size: 1.3rem;
            margin-top: 15px;
        }
        
        .hidden {
            display: none;
        }
        
        .screen-header {
            color: #ff0000;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .blink {
            animation: blink 1s infinite;
        }
        
        @media (max-width: 768px) {
            .game-area {
                flex-direction: column;
            }
            
            .side-panel {
                border-left: none;
                border-top: 2px solid #fff;
                padding-left: 0;
                padding-top: 15px;
            }
            
            button {
                min-width: 140px;
                font-size: 0.7rem;
                padding: 8px 10px;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            h2 {
                font-size: 1.1rem;
            }
            
            .stat-allocation {
                grid-template-columns: 1fr;
            }
            
            .item-options {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            
            .screen {
                padding: 10px;
                font-size: 0.75rem;
            }
            
            button {
                min-width: 100%;
            }
            
            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>DRACULA'S CASTLE</h1>
            <p>AI-POWERED TEXT ADVENTURE (MISTRAL)</p>
        </div>
        
        <div class="game-area">
            <div class="main-content">
                <div id="gameScreen" class="screen">
                    <!-- Game content dynamically inserted -->
                </div>
                
                <div id="controls" class="controls">
                    <!-- Action buttons dynamically inserted -->
                </div>
            </div>
            
            <div class="side-panel">
                <div class="stat-box">
                    <h2>STATUS</h2>
                    <div id="statsDisplay">
                        <!-- Stats dynamically inserted -->
                    </div>
                </div>
                
                <div class="inventory">
                    <h2>INVENTORY</h2>
                    <div id="inventoryDisplay">
                        <!-- Inventory dynamically inserted -->
                    </div>
                </div>
                
                <div class="game-progress">
                    <h2>CASTLE PROGRESS</h2>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== AUDIO MANAGER (identical to original) ====================
        const AudioManager = (function() {
            let audioContext = null;
            const masterGain = 0.2;

            function initContext() {
                if (!audioContext) {
                    try {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        console.warn('Web Audio API not supported');
                        return null;
                    }
                }
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                return audioContext;
            }

            function playSound(type, pitch, duration, volume) {
                const ctx = initContext();
                if (!ctx) return;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type || 'sine';
                osc.frequency.value = pitch || 440;
                gain.gain.setValueAtTime((volume || 0.1) * masterGain, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (duration || 0.1));
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + (duration || 0.1));
            }

            return {
                playClick: () => playSound('sine', 600, 0.05, 0.1),
                playNotification: () => playSound('sine', 800, 0.1, 0.15),
                playCombatHit: () => playSound('triangle', 200, 0.1, 0.2),
                playEnemyHit: () => playSound('sawtooth', 150, 0.15, 0.2),
                playVictory: () => { playSound('sine', 400, 0.2, 0.2); setTimeout(()=>playSound('sine',600,0.2,0.2),100); setTimeout(()=>playSound('sine',800,0.3,0.2),200); },
                playLevelUp: () => { playSound('sine',500,0.15,0.2); setTimeout(()=>playSound('sine',700,0.15,0.2),100); setTimeout(()=>playSound('sine',900,0.2,0.2),200); },
                playReward: () => { playSound('sine',1000,0.1,0.15); setTimeout(()=>playSound('sine',1200,0.1,0.15),50); },
                playGameOver: () => playSound('sawtooth',200,0.5,0.3),
                playGameComplete: () => { for(let i=0;i<5;i++) setTimeout(()=>playSound('sine',600+i*100,0.2,0.2), i*150); }
            };
        })();

        // ==================== GAME STATE ====================
        const gameState = {
            apiKey: '',
            stats: { strength:5, intelligence:5, charisma:5, luck:5, health:100, maxHealth:100 },
            inventory: [],
            progress: 0,
            gameOver: false,
            victory: false,
            combatActive: false,
            currentScene: '',
            lastAIResponse: null,
            conversationHistory: []   // full chat history for Mistral
        };

        // DOM elements
        const gameScreen = document.getElementById('gameScreen');
        const controlsDiv = document.getElementById('controls');
        const statsDisplay = document.getElementById('statsDisplay');
        const inventoryDisplay = document.getElementById('inventoryDisplay');
        const progressFill = document.getElementById('progressFill');

        // ==================== MISTRAL API HELPERS ====================
        const API_URL = 'https://api.mistral.ai/v1/chat/completions';
        const MODEL = 'mistral-large-latest';   // you can change to e.g. 'mistral-medium'

        // System prompt that instructs the AI how to behave and the JSON format
        const SYSTEM_PROMPT = 
        "You are the Game Master for a Dracula's Castle text adventure. " +
        "You control the story, NPCs, combat, items, and everything else. " +
        "Always respond with a single valid JSON object (no extra text) containing these fields:\n" +
        "- \"text\": the narrative description (string)\n" +
        "- \"scene\": short name of the current location (string)\n" +
        "- \"playerStats\": object with current stats {strength, intelligence, charisma, luck, health, maxHealth}\n" +
        "- \"inventory\": array of items, each with {id, name, description, effect, type, combatBonus?}\n" +
        "- \"combat\": boolean, true if player is in active combat\n" +
        "- \"enemy\": if combat, object with {name, health, maxHealth, attack, defense, type}\n" +
        "- \"actions\": array of possible player actions, each with {text, type} where type can be \"action\", \"attack\", \"use\", \"flee\"\n" +
        "- \"progress\": number 0-100 representing game completion\n" +
        "- \"gameOver\": boolean\n" +
        "- \"victory\": boolean\n" +
        "Start the game at the castle entrance with player's stats. " +
        "Include atmospheric details and classic vampire lore. " +
        "Do not include markdown formatting, only the JSON.";

        async function callMistral(userMessage) {
            if (!gameState.apiKey) {
                showAPIKeyPrompt();
                throw new Error('API key missing');
            }
            // Build messages array
            const messages = [
                { role: 'system', content: SYSTEM_PROMPT }
            ];
            // Add conversation history
            gameState.conversationHistory.forEach(msg => messages.push(msg));
            // Add current user message
            messages.push({ role: 'user', content: userMessage });

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${gameState.apiKey}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: messages,
                        temperature: 0.8,
                        max_tokens: 2000,
                        response_format: { type: 'json_object' }   // use if supported by model
                    })
                });

                if (!response.ok) {
                    const err = await response.text();
                    throw new Error(`API error ${response.status}: ${err}`);
                }

                const data = await response.json();
                const aiText = data.choices[0].message.content;
                
                // Parse JSON from AI response
                let parsed;
                try {
                    parsed = JSON.parse(aiText);
                } catch (parseError) {
                    // Sometimes the AI might add extra text; try to extract JSON
                    const jsonMatch = aiText.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        parsed = JSON.parse(jsonMatch[0]);
                    } else {
                        throw new Error('Invalid JSON from AI');
                    }
                }
                return parsed;
            } catch (error) {
                console.error('Mistral API error:', error);
                throw error;
            }
        }

        // ==================== DISPLAY FUNCTIONS ====================
        function updateStatsDisplay() {
            statsDisplay.innerHTML = '';
            const s = gameState.stats;
            for (const [stat, value] of Object.entries(s)) {
                if (stat === 'maxHealth') continue;
                const div = document.createElement('div');
                div.className = 'stat-item';
                const nameSpan = document.createElement('span');
                nameSpan.textContent = stat.charAt(0).toUpperCase() + stat.slice(1) + ':';
                const valSpan = document.createElement('span');
                valSpan.className = 'stat-value';
                if (stat === 'health') {
                    valSpan.textContent = `${value}/${s.maxHealth}`;
                    if (value < 30) valSpan.style.color = '#ff3333';
                    else if (value < 60) valSpan.style.color = '#ffff00';
                } else {
                    valSpan.textContent = value;
                }
                div.appendChild(nameSpan);
                div.appendChild(valSpan);
                statsDisplay.appendChild(div);
            }
        }

        function updateInventoryDisplay() {
            inventoryDisplay.innerHTML = '';
            if (gameState.inventory.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'inventory-item';
                empty.textContent = 'Empty';
                inventoryDisplay.appendChild(empty);
                return;
            }
            gameState.inventory.forEach(item => {
                const div = document.createElement('div');
                div.className = 'inventory-item';
                const icon = document.createElement('span');
                icon.className = 'item-icon';
                icon.textContent = item.icon || '⚔️';
                const name = document.createElement('span');
                name.textContent = item.name;
                div.appendChild(icon);
                div.appendChild(name);
                inventoryDisplay.appendChild(div);
            });
        }

        function updateProgressBar() {
            progressFill.style.width = `${gameState.progress}%`;
        }

        function updateAllDisplays() {
            updateStatsDisplay();
            updateInventoryDisplay();
            updateProgressBar();
        }

        // ==================== RENDER SCENE FROM AI JSON ====================
        function renderFromAIResponse(json) {
            gameState.lastAIResponse = json;
            gameState.stats = json.playerStats || gameState.stats;
            gameState.inventory = json.inventory || [];
            gameState.progress = json.progress !== undefined ? json.progress : gameState.progress;
            gameState.gameOver = json.gameOver || false;
            gameState.victory = json.victory || false;
            gameState.combatActive = json.combat || false;
            gameState.currentScene = json.scene || 'Unknown';

            // Clear screen
            gameScreen.innerHTML = '';
            controlsDiv.innerHTML = '';

            const screenContent = document.createElement('div');
            screenContent.className = 'screen-content';

            // Header
            const header = document.createElement('div');
            header.className = 'screen-header';
            header.textContent = gameState.currentScene.toUpperCase();
            screenContent.appendChild(header);

            // Narrative text
            const narrative = document.createElement('div');
            narrative.className = 'message';
            narrative.textContent = json.text;
            screenContent.appendChild(narrative);

            // Enemy info if in combat
            if (gameState.combatActive && json.enemy) {
                const combatDiv = document.createElement('div');
                combatDiv.className = 'message enemy-message';
                combatDiv.textContent = `⚔️ ${json.enemy.name} [${json.enemy.health}/${json.enemy.maxHealth}] – ${json.enemy.description || ''}`;
                screenContent.appendChild(combatDiv);
            }

            gameScreen.appendChild(screenContent);

            // Create action buttons
            const actions = json.actions || [];
            if (actions.length > 0) {
                actions.forEach(action => {
                    const btn = document.createElement('button');
                    btn.textContent = action.text;
                    btn.onclick = () => {
                        AudioManager.playClick();
                        handlePlayerAction(action);
                    };
                    controlsDiv.appendChild(btn);
                });
            } else if (gameState.gameOver || gameState.victory) {
                // Show end screen
                const endDiv = document.createElement('div');
                endDiv.className = gameState.victory ? 'game-over' : 'game-over';
                endDiv.style.color = gameState.victory ? '#00ff00' : '#ff0000';
                endDiv.innerHTML = gameState.victory ?
                    `<h2>VICTORY!</h2><p>${json.text}</p>` :
                    `<h2>GAME OVER</h2><p>${json.text}</p>`;
                gameScreen.appendChild(endDiv);

                const restartBtn = document.createElement('button');
                restartBtn.textContent = 'PLAY AGAIN';
                restartBtn.className = 'primary';
                restartBtn.onclick = () => {
                    AudioManager.playClick();
                    resetGame();
                };
                controlsDiv.appendChild(restartBtn);
            }

            updateAllDisplays();
        }

        // ==================== PLAYER ACTION HANDLER ====================
        async function handlePlayerAction(action) {
            // Construct user message for AI
            let userMsg = '';
            switch(action.type) {
                case 'attack':
                    userMsg = 'I attack the enemy.';
                    break;
                case 'use':
                    // If the action text contains item name, we could extract it
                    userMsg = `I use ${action.text.replace('Use ','')}.`;
                    break;
                case 'flee':
                    userMsg = 'I try to flee from combat.';
                    break;
                default:
                    userMsg = action.text;   // general action
            }

            try {
                // Add user message to history
                gameState.conversationHistory.push({ role: 'user', content: userMsg });
                const responseJson = await callMistral(userMsg);
                // Add assistant response to history
                gameState.conversationHistory.push({ role: 'assistant', content: JSON.stringify(responseJson) });
                // Trim history to avoid token overflow (keep last 20 messages)
                if (gameState.conversationHistory.length > 40) {
                    gameState.conversationHistory = gameState.conversationHistory.slice(-40);
                }
                renderFromAIResponse(responseJson);
            } catch (error) {
                showError('Failed to get response from AI. Check your API key and connection.');
            }
        }

        // ==================== CHARACTER CREATION & API KEY ====================
        function showAPIKeyPrompt() {
            gameScreen.innerHTML = '';
            controlsDiv.innerHTML = '';
            const screenContent = document.createElement('div');
            screenContent.className = 'screen-content';
            const header = document.createElement('div');
            header.className = 'screen-header';
            header.textContent = 'ENTER MISTRAL API KEY';
            screenContent.appendChild(header);
            const input = document.createElement('input');
            input.type = 'password';
            input.placeholder = 'Paste your Mistral API key here';
            input.style.width = '100%';
            input.style.padding = '10px';
            input.style.margin = '15px 0';
            input.style.backgroundColor = '#111';
            input.style.border = '2px solid #fff';
            input.style.color = '#fff';
            input.style.fontFamily = 'inherit';
            input.style.fontSize = '0.8rem';
            screenContent.appendChild(input);
            const startBtn = document.createElement('button');
            startBtn.textContent = 'START GAME';
            startBtn.className = 'primary';
            startBtn.onclick = () => {
                if (input.value.trim() === '') {
                    showError('Please enter a valid API key.');
                    return;
                }
                gameState.apiKey = input.value.trim();
                AudioManager.playClick();
                startCharacterCreation();
            };
            screenContent.appendChild(startBtn);
            gameScreen.appendChild(screenContent);
        }

        function startCharacterCreation() {
            gameScreen.innerHTML = '';
            controlsDiv.innerHTML = '';
            const screenContent = document.createElement('div');
            screenContent.className = 'screen-content character-creation';
            const header = document.createElement('div');
            header.className = 'screen-header';
            header.textContent = 'CHARACTER CREATION';
            screenContent.appendChild(header);
            const text = document.createElement('div');
            text.className = 'message';
            text.textContent = 'Distribute 10 stat points. Then click BEGIN.';
            screenContent.appendChild(text);

            const allocatableStats = ['strength','intelligence','charisma','luck'];
            let statPoints = 10;
            const statValues = {};
            allocatableStats.forEach(stat => statValues[stat] = gameState.stats[stat] || 5);

            function updatePointsDisplay() {
                document.getElementById('pointsLeft').textContent = statPoints;
                allocatableStats.forEach(stat => {
                    document.getElementById(`${stat}Val`).textContent = statValues[stat];
                });
                const beginBtn = document.getElementById('beginBtn');
                if (beginBtn) beginBtn.disabled = (statPoints > 0);
            }

            const statDiv = document.createElement('div');
            statDiv.className = 'stat-allocation';
            allocatableStats.forEach(stat => {
                const ctrl = document.createElement('div');
                ctrl.className = 'stat-control';
                const nameSpan = document.createElement('span');
                nameSpan.textContent = stat.charAt(0).toUpperCase()+stat.slice(1)+': ';
                const minusBtn = document.createElement('button');
                minusBtn.textContent = '-';
                minusBtn.className = 'stat-btn';
                minusBtn.onclick = () => {
                    if (statValues[stat] > 1) {
                        statValues[stat]--;
                        statPoints++;
                        AudioManager.playClick();
                        updatePointsDisplay();
                    }
                };
                const valSpan = document.createElement('span');
                valSpan.id = `${stat}Val`;
                valSpan.textContent = statValues[stat];
                valSpan.style.margin = '0 8px';
                valSpan.style.color = '#00ff00';
                const plusBtn = document.createElement('button');
                plusBtn.textContent = '+';
                plusBtn.className = 'stat-btn';
                plusBtn.onclick = () => {
                    if (statPoints > 0) {
                        statValues[stat]++;
                        statPoints--;
                        AudioManager.playClick();
                        updatePointsDisplay();
                    }
                };
                ctrl.appendChild(nameSpan);
                ctrl.appendChild(minusBtn);
                ctrl.appendChild(valSpan);
                ctrl.appendChild(plusBtn);
                statDiv.appendChild(ctrl);
            });
            screenContent.appendChild(statDiv);

            const pointsText = document.createElement('div');
            pointsText.className = 'message';
            pointsText.textContent = `Stat points remaining: `;
            const span = document.createElement('span');
            span.id = 'pointsLeft';
            span.textContent = statPoints;
            pointsText.appendChild(span);
            screenContent.appendChild(pointsText);

            const beginBtn = document.createElement('button');
            beginBtn.id = 'beginBtn';
            beginBtn.textContent = 'BEGIN YOUR QUEST';
            beginBtn.className = 'primary';
            beginBtn.onclick = () => {
                AudioManager.playClick();
                gameState.stats.strength = statValues.strength;
                gameState.stats.intelligence = statValues.intelligence;
                gameState.stats.charisma = statValues.charisma;
                gameState.stats.luck = statValues.luck;
                gameState.stats.health = 100;
                gameState.stats.maxHealth = 100;
                gameState.inventory = [];
                gameState.progress = 0;
                gameState.gameOver = false;
                gameState.victory = false;
                gameState.combatActive = false;
                gameState.conversationHistory = [];
                startAIGame();
            };
            beginBtn.disabled = (statPoints > 0);
            screenContent.appendChild(beginBtn);
            gameScreen.appendChild(screenContent);
            updatePointsDisplay();
        }

        async function startAIGame() {
            // Send initial message with player stats to AI
            const initialMsg = `I start the game. My stats: strength ${gameState.stats.strength}, intelligence ${gameState.stats.intelligence}, charisma ${gameState.stats.charisma}, luck ${gameState.stats.luck}, health ${gameState.stats.health}/${gameState.stats.maxHealth}. Describe the castle entrance and available actions.`;
            gameState.conversationHistory = [
                { role: 'user', content: initialMsg }
            ];
            try {
                const responseJson = await callMistral(initialMsg);
                gameState.conversationHistory.push({ role: 'assistant', content: JSON.stringify(responseJson) });
                renderFromAIResponse(responseJson);
            } catch (error) {
                showError('Error starting game. Check API key or network.');
            }
        }

        function resetGame() {
            gameState.stats = { strength:5, intelligence:5, charisma:5, luck:5, health:100, maxHealth:100 };
            gameState.inventory = [];
            gameState.progress = 0;
            gameState.gameOver = false;
            gameState.victory = false;
            gameState.combatActive = false;
            gameState.currentScene = '';
            gameState.conversationHistory = [];
            // Keep API key
            showAPIKeyPrompt();
        }

        function showError(msg) {
            const errDiv = document.createElement('div');
            errDiv.className = 'warning';
            errDiv.textContent = msg;
            gameScreen.appendChild(errDiv);
            setTimeout(() => errDiv.remove(), 3000);
        }

        // ==================== INIT ====================
        window.onload = () => {
            // Start with API key prompt
            showAPIKeyPrompt();
        };
    </script>
</body>
</html>
