<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDNIGHT REWIND — VHS RENTALS</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff55ff;
            --cyan: #00ffff;
            --purp: #aa44ff;
            --bg-screen: #0a0020;
            --text-glow: 0 0 6px rgba(255,85,255,0.7), 0 0 18px rgba(0,255,255,0.3);
            --text-cyan: 0 0 6px rgba(0,255,255,0.8), 0 0 18px rgba(0,255,255,0.4);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #1a001a; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            font-family: 'VT323', monospace; font-size: 20px;
            background-image: radial-gradient(ellipse at center, #2a0a2a 0%, #0a0010 80%);
            padding: 20px; user-select: none;
        }
        .tv-set {
            background: #222; border-radius: 24px; padding: 20px 20px 16px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 0 0 4px #333, 0 12px 50px rgba(0,0,0,0.8);
            max-width: 950px; width: 100%;
        }
        .screen {
            background: #0a0020; border-radius: 12px; padding: 16px;
            position: relative; overflow: hidden;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.9); border: 2px solid #1a1a1a;
            display: flex; flex-direction: column; height: 720px; flex-shrink: 0;
        }
        .scanlines {
            position: absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; border-radius:12px;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
            z-index:10;
        }
        .vignette {
            position: absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; border-radius:12px;
            z-index:8; box-shadow:inset 0 0 120px rgba(0,0,0,0.7);
        }

        .title-bar {
            text-align:center; padding:4px 0; position:relative; z-index:12;
            color: var(--pink); font-size:24px; letter-spacing:3px;
            text-shadow: var(--text-glow); line-height:1.4;
            border-bottom:1px solid rgba(255,85,255,0.3); margin-bottom:8px; flex-shrink: 0;
        }
        .title-bar .subtitle { display:block; font-size:16px; color: var(--cyan); text-shadow: var(--text-cyan); }

        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding:4px 8px; background: rgba(20,10,30,0.9); border:1px solid var(--purp);
            margin-bottom:8px; font-size:18px; color: var(--cyan); text-shadow: var(--text-cyan);
            position:relative; z-index:12; flex-shrink: 0;
        }
        .neon { color: var(--pink); text-shadow: 0 0 8px var(--pink); }

        .location-panel {
            display: flex; gap:8px; padding:4px 0; flex-shrink:0; position:relative; z-index:12;
            justify-content: center; flex-wrap:wrap;
        }
        .location-panel button {
            background: rgba(20,10,30,0.8); border:1px solid var(--cyan); color: var(--cyan);
            font-family:'VT323'; font-size:18px; padding:4px 12px; cursor:pointer;
            text-shadow: var(--text-cyan); transition: all 0.2s;
            letter-spacing:1px;
        }
        .location-panel button:hover { background: rgba(0,255,255,0.2); border-color: var(--pink); }
        .location-panel .active-loc { background: rgba(255,85,255,0.2); border-color: var(--pink); color: var(--pink); }

        /* TAB CONTAINER */
        .tab-container {
            position: relative; z-index: 12; flex-shrink: 0;
            margin: 6px 0;
            border: 1px solid var(--purp);
            background: rgba(20,10,30,0.9);
        }
        .tab-buttons {
            display: flex;
            border-bottom: 1px solid var(--purp);
        }
        .tab-btn {
            background: none;
            border: none;
            color: var(--cyan);
            font-family: 'VT323';
            font-size: 18px;
            padding: 6px 18px;
            cursor: pointer;
            text-shadow: var(--text-cyan);
            transition: 0.2s;
            letter-spacing: 1px;
            border-right: 1px solid var(--purp);
        }
        .tab-btn:last-child { border-right: none; }
        .tab-btn:hover { background: rgba(0,255,255,0.2); }
        .tab-btn.active {
            background: rgba(255,85,255,0.15);
            color: var(--pink);
            text-shadow: 0 0 6px var(--pink);
            border-bottom: 2px solid var(--pink);
        }
        .tab-content-area {
            max-height: 190px;
            overflow-y: auto;
            padding: 8px;
            color: var(--cyan);
            text-shadow: var(--text-cyan);
        }
        .tab-content-area::-webkit-scrollbar { width:5px; }
        .tab-content-area::-webkit-scrollbar-track { background:#0a0020; }
        .tab-content-area::-webkit-scrollbar-thumb { background:#aa44ff; }

        .game-output {
            flex: 1 1 auto; overflow-y: auto; padding:8px; color: var(--cyan);
            font-size:20px; line-height:1.6; position:relative; z-index:12;
            text-shadow: var(--text-cyan); min-height: 0;
            background: rgba(5,0,15,0.7); margin:6px 0; border:1px solid rgba(170,68,255,0.3);
            border-radius:6px;
        }
        .game-output::-webkit-scrollbar { width:5px; }
        .game-output::-webkit-scrollbar-track { background:#0a0020; }
        .game-output::-webkit-scrollbar-thumb { background:#aa44ff; }

        .system-msg { color: #9966cc; font-size:18px; }
        .narration { color: var(--cyan); }
        .customer-dialogue { color: #cc99ff; margin-left:16px; }
        .customer-dialogue strong { color: var(--pink); }
        .dumpster-dialogue { color: #66ff66; text-shadow: 0 0 6px #00ff00; margin-left:16px; font-style:italic; }
        .tape-event { color: #ffaa55; margin-left:16px; }
        .store-event { color: #9999ff; font-style:italic; }
        .player-cmd { color: var(--pink); }

        .customer-item, .tape-item, .task-item {
            display:flex; align-items:center; gap:8px; flex-wrap:wrap;
            border-bottom:1px solid rgba(170,68,255,0.2); padding:4px 0;
            font-size: 19px;
        }
        .customer-item span, .tape-item span, .task-item span { flex:1; }
        .customer-item button, .tape-item button, .task-item button {
            background: none; border:1px solid var(--cyan); color: var(--cyan);
            font-family:'VT323'; font-size:16px; padding:2px 8px; cursor:pointer;
            text-shadow: var(--text-cyan); transition:0.2s;
        }
        .customer-item button:hover, .tape-item button:hover, .task-item button:hover {
            background: rgba(0,255,255,0.2); border-color: var(--pink);
        }

        .actions-bar {
            display: flex; gap:8px; flex-wrap:wrap; padding:4px 0;
            position:relative; z-index:12; justify-content:center; flex-shrink: 0;
        }
        .actions-bar button {
            background: rgba(20,10,30,0.8); border:1px solid var(--cyan); color: var(--cyan);
            font-family:'VT323'; font-size:18px; padding:6px 14px; cursor:pointer;
            text-shadow: var(--text-cyan); transition:0.2s; letter-spacing:1px;
        }
        .actions-bar button:hover { background: rgba(0,255,255,0.25); border-color: var(--pink); }
        .actions-bar button:disabled { opacity:0.4; cursor:not-allowed; }

        .input-area {
            display:flex; gap:6px; padding:6px 0; position:relative; z-index:12; align-items:center; flex-shrink: 0;
        }
        .prompt-symbol { color: var(--pink); font-size:22px; }
        .cmd-input {
            flex:1; background:transparent; border:1px solid rgba(255,85,255,0.5); color: var(--cyan);
            font-family:'VT323'; font-size:20px; padding:6px 10px; outline:none;
            caret-color: var(--cyan); border-radius:4px; text-shadow: var(--text-cyan);
        }
        .cmd-input:focus { border-color: var(--pink); box-shadow:0 0 10px rgba(255,85,255,0.4); }

        .modal-overlay {
            position: absolute; top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.85); z-index:50; display:none; justify-content:center; align-items:center;
            flex-direction:column; border-radius:12px;
        }
        .modal-content {
            background: #0a0020; border:2px solid var(--pink); padding:16px;
            max-width:500px; width:90%; color:var(--cyan); font-size:20px;
            max-height:80vh; overflow-y:auto;
        }
        .modal-content h3 { color: var(--pink); margin-bottom:12px; }
        .modal-content button {
            background: none; border:1px solid var(--cyan); color: var(--cyan);
            font-family:'VT323'; font-size:18px; padding:4px 12px; cursor:pointer;
            margin:4px; text-shadow: var(--text-cyan);
        }
        .modal-content button:hover { background: rgba(0,255,255,0.2); border-color: var(--pink); }

        .tv-brand { text-align:center; font-size:14px; color:#444; letter-spacing:2px; padding-top:6px; }
        .power-led { display:inline-block; width:8px; height:8px; background:var(--pink); border-radius:50%; margin-right:8px; box-shadow:0 0 10px var(--pink); }
    </style>
</head>
<body>
<div class="tv-set">
    <div class="screen">
        <div class="scanlines"></div>
        <div class="vignette"></div>

        <div class="title-bar">
            <span>MIDNIGHT REWIND</span>
            <span class="subtitle">✦ VHS RENTALS · PERMANENT NIGHT ✦</span>
        </div>

        <div class="status-bar">
            <span>📼 <span id="timeDisplay">11:58 PM</span></span>
            <span>CASH: $<span id="cashDisplay">100</span></span>
            <span>📍 <span id="locDisplay">FRONT</span></span>
        </div>

        <div class="location-panel">
            <button id="btnGoFront" class="active-loc">📀 SHOP FRONT</button>
            <button id="btnGoBackroom">📺 BACKROOM</button>
            <button id="btnGoAlley">🚬 ALLEY</button>
        </div>

        <!-- TABBED PANEL RIBBON -->
        <div class="tab-container">
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="customers">👥 CUSTOMERS</button>
                <button class="tab-btn" data-tab="inventory">📼 TAPES</button>
                <button class="tab-btn" data-tab="tasks">🗑️ TASKS</button>
            </div>
            <div class="tab-content-area">
                <div id="customersPanel" class="tab-panel"></div>
                <div id="inventoryPanel" class="tab-panel" style="display:none;"></div>
                <div id="tasksPanel" class="tab-panel" style="display:none;"></div>
            </div>
        </div>

        <div class="game-output" id="gameOutput">
            <div class="system-msg">> MIDNIGHT REWIND booting...</div>
            <div class="system-msg">> Set API key and press BEGIN.</div>
        </div>

        <div style="display:flex; gap:8px; align-items:center; padding:4px 0; z-index:12; font-size:18px; color:var(--purp); flex-shrink:0;">
            <label for="apiKeyInput">API KEY:</label>
            <input type="password" id="apiKeyInput" style="flex:1; background:#0a0020; border:1px solid rgba(170,68,255,0.5); color:#aaa; font-family:'Courier New'; font-size:16px; padding:4px;">
            <button id="btnSaveKey" style="background:rgba(20,0,30,0.9); border:1px solid var(--pink); color:var(--pink); font-family:'VT323'; font-size:18px; padding:4px 10px; cursor:pointer;">SAVE</button>
            <span id="keyStatus" style="color:#ff6644;">○ NO KEY</span>
        </div>

        <div class="actions-bar" id="actionButtons">
            <button id="btnBegin" style="display:none;">▶ BEGIN SHIFT</button>
            <button id="btnTalkToCustomer">💬 TALK TO</button>
            <button id="btnInviteBackroom">📺 INVITE TO BACKROOM</button>
            <button id="btnCheckout">🧾 CHECKOUT TAPE</button>
            <button id="btnOrderTapes">📦 ORDER TAPES</button>
            <button id="btnWatchTape">🎞 WATCH TAPE</button>
            <button id="btnCreateTape">✨ CREATE TAPE</button>
            <button id="btnMoveToPrivate">📥 MOVE TO PRIVATE</button>
            <button id="btnTalkDumpster">🗑 TALK DUMPSTER</button>
            <button id="btnPutInDumpster">♻ PUT IN DUMPSTER</button>
            <button id="btnSmoke">🚬 SMOKE</button>
            <button id="btnSave">💾 SAVE</button>
            <button id="btnLoad">📂 LOAD</button>
            <button id="btnRestart">🔄 RESTART</button>
        </div>

        <div class="input-area">
            <span class="prompt-symbol">></span>
            <input type="text" class="cmd-input" id="cmdInput" placeholder="What do you do?">
            <button id="btnSend" style="background:rgba(20,10,30,0.8); border:1px solid var(--pink); color:var(--pink); font-family:'VT323'; font-size:20px; padding:4px 14px; cursor:pointer;">SEND</button>
        </div>

        <div class="modal-overlay" id="saveModal">
            <div class="modal-content">
                <h3>💾 SAVE / LOAD</h3>
                <div id="saveSlotsContainer"></div>
                <button id="closeSaveModal">CLOSE</button>
            </div>
        </div>

        <div class="modal-overlay" id="tapeCreateModal">
            <div class="modal-content">
                <h3>✨ CREATE CUSTOM TAPE</h3>
                <label>Genre:</label>
                <select id="tapeGenre" style="width:100%; background:#0a0020; border:1px solid var(--cyan); color:var(--cyan); font-family:'VT323'; font-size:18px; padding:4px;">
                    <option>Horror</option><option>Sci-Fi</option><option>Thriller</option><option>Weird</option><option>Comedy</option><option>Documentary</option>
                </select>
                <label>Title:</label>
                <input type="text" id="tapeTitle" style="width:100%; background:#0a0020; border:1px solid var(--cyan); color:var(--cyan); font-family:'VT323'; font-size:18px; padding:4px;">
                <label>Description:</label>
                <textarea id="tapeDesc" rows="3" style="width:100%; background:#0a0020; border:1px solid var(--cyan); color:var(--cyan); font-family:'VT323'; font-size:18px; padding:4px;"></textarea>
                <button id="btnSubmitTape">💾 CREATE</button>
                <button id="closeTapeModal">CANCEL</button>
            </div>
        </div>
    </div>
    <div class="tv-brand"><span class="power-led"></span> MIDNIGHT REWIND · VHS 1987</div>
</div>

<script>
(function() {
    // ---- DOM ----
    const gameOutput = document.getElementById('gameOutput');
    const cmdInput = document.getElementById('cmdInput');
    const btnSend = document.getElementById('btnSend');
    const customersPanel = document.getElementById('customersPanel');
    const inventoryPanel = document.getElementById('inventoryPanel');
    const tasksPanel = document.getElementById('tasksPanel');
    const saveModal = document.getElementById('saveModal');
    const saveSlotsContainer = document.getElementById('saveSlotsContainer');
    const closeSaveModalBtn = document.getElementById('closeSaveModal');
    const tapeCreateModal = document.getElementById('tapeCreateModal');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const btnSaveKey = document.getElementById('btnSaveKey');
    const keyStatus = document.getElementById('keyStatus');
    const timeDisplay = document.getElementById('timeDisplay');
    const cashDisplay = document.getElementById('cashDisplay');
    const locDisplay = document.getElementById('locDisplay');
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabPanels = {
        customers: customersPanel,
        inventory: inventoryPanel,
        tasks: tasksPanel
    };

    // ---- State ----
    let mistralApiKey = '';
    let gameHistory = [];
    let turnCount = 0;
    let isLoading = false;
    let gameStarted = false;
    let activeTab = 'customers'; // for tabs

    let playerLocation = 'front'; // front, backroom, alley
    let cash = 100;
    let currentTime = '11:58 PM';
    let storeInventory = [];
    let privateCollection = [];
    let currentCustomers = [];
    let dumpsterTasks = [];
    let playerCarriedItem = null;
    let activeCustomerId = null;
    let activeTapeId = null;

    // ---- Initial Data ----
    function initGameData() {
        storeInventory = [
            { id:1, title:'Crimson Harvest', genre:'Slasher', desc:'A scarecrow stalks teenagers on a farm.', rentalStatus:'available', price:2 },
            { id:2, title:'Galaxy of Flesh', genre:'Sci-Fi', desc:'Alien parasites turn colonists into hosts.', rentalStatus:'available', price:2 },
            { id:3, title:'The Laughing Woman', genre:'Thriller', desc:'A woman’s giggle is the last thing you hear.', rentalStatus:'available', price:2 },
            { id:4, title:'Neon Nights', genre:'Noir', desc:'A detective in a synth-lit city hunts a serial killer.', rentalStatus:'available', price:2 },
            { id:5, title:'Beast in the Basement', genre:'Horror', desc:'A family hides a monster in their cellar.', rentalStatus:'available', price:2 },
        ];
        privateCollection = [
            { id:101, title:'Home Movie #1', genre:'Personal', desc:'You as a child, but something is wrong.', isCustom:true },
            { id:102, title:'Static Dreams', genre:'Weird', desc:'Endless static, shapes moving inside.', isCustom:true }
        ];
        currentCustomers = [];
        dumpsterTasks = [];
        playerCarriedItem = null;
        activeCustomerId = null;
        activeTapeId = null;
    }

    // ---- Tab Switching ----
    function switchTab(tab) {
        activeTab = tab;
        // Update active class on buttons
        tabBtns.forEach(btn => {
            if (btn.dataset.tab === tab) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        // Show/hide panels
        Object.keys(tabPanels).forEach(key => {
            tabPanels[key].style.display = (key === tab) ? 'block' : 'none';
        });
    }

    // ---- UI Rendering ----
    function updateUI() {
        timeDisplay.textContent = currentTime;
        cashDisplay.textContent = cash;
        locDisplay.textContent = playerLocation.toUpperCase();
        // location buttons active state
        document.getElementById('btnGoFront').className = playerLocation==='front' ? 'active-loc' : '';
        document.getElementById('btnGoBackroom').className = playerLocation==='backroom' ? 'active-loc' : '';
        document.getElementById('btnGoAlley').className = playerLocation==='alley' ? 'active-loc' : '';

        // Show/hide action buttons based on location
        const isFront = playerLocation==='front';
        const isBackroom = playerLocation==='backroom';
        const isAlley = playerLocation==='alley';

        document.getElementById('btnTalkToCustomer').style.display = (isFront && activeCustomerId) ? 'inline-block' : 'none';
        document.getElementById('btnInviteBackroom').style.display = (isFront && activeCustomerId) ? 'inline-block' : 'none';
        document.getElementById('btnCheckout').style.display = (isFront && activeCustomerId && activeTapeId) ? 'inline-block' : 'none';
        document.getElementById('btnOrderTapes').style.display = isFront ? 'inline-block' : 'none';
        document.getElementById('btnWatchTape').style.display = (isBackroom && privateCollection.length>0) ? 'inline-block' : 'none';
        document.getElementById('btnCreateTape').style.display = isBackroom ? 'inline-block' : 'none';
        document.getElementById('btnMoveToPrivate').style.display = (isFront && activeTapeId) ? 'inline-block' : 'none';
        document.getElementById('btnTalkDumpster').style.display = isAlley ? 'inline-block' : 'none';
        document.getElementById('btnPutInDumpster').style.display = (isAlley && playerCarriedItem) ? 'inline-block' : 'none';
        document.getElementById('btnSmoke').style.display = isAlley ? 'inline-block' : 'none';

        // Ensure active tab is still valid (e.g., if no tasks, maybe switch to inventory, but leave it for simplicity)
        if (activeTab === 'tasks' && dumpsterTasks.length === 0 && gameStarted) {
            // Don't force switch, just show empty. But we can keep it.
        }

        renderCustomers();
        renderInventory();
        renderTasks();

        // Re-apply active tab display (in case render functions changed something)
        switchTab(activeTab);
    }

    function renderCustomers() {
        let html = '';
        if (currentCustomers.length===0) {
            html = '<div style="color:#9966cc;">No one here right now.</div>';
        } else {
            currentCustomers.forEach(c => {
                let sel = activeCustomerId===c.id ? ' 👈' : '';
                html += `<div class="customer-item">
                    <span>${c.name} (${c.personality||'?'})${sel}</span>
                    <button data-action="selectCust" data-id="${c.id}">TALK</button>
                </div>`;
            });
        }
        customersPanel.innerHTML = html;
        // Attach events to newly created buttons
        customersPanel.querySelectorAll('[data-action="selectCust"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                activeCustomerId = parseInt(e.target.dataset.id);
                updateUI();
            });
        });
    }

    function renderInventory() {
        let tapes = playerLocation==='backroom' ? privateCollection : storeInventory;
        let html = '';
        if (tapes.length===0) {
            html = '<div style="color:#9966cc;">No tapes here.</div>';
        } else {
            tapes.forEach(t => {
                let status = t.rentalStatus ? ` (${t.rentalStatus})` : '';
                let sel = (activeTapeId===t.id && playerLocation==='front') ? ' 👈' : '';
                html += `<div class="tape-item">
                    <span>📼 ${t.title} [${t.genre}]${status}${sel}</span>`;
                if (playerLocation==='front' && t.rentalStatus==='available') {
                    html += `<button data-action="selectTape" data-id="${t.id}">SELECT</button>`;
                }
                if (playerLocation==='backroom') {
                    html += `<button data-action="watchTape" data-id="${t.id}">WATCH</button>`;
                }
                html += `</div>`;
            });
        }
        inventoryPanel.innerHTML = html;
        // Attach events
        inventoryPanel.querySelectorAll('[data-action="selectTape"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                activeTapeId = parseInt(e.target.dataset.id);
                updateUI();
            });
        });
        inventoryPanel.querySelectorAll('[data-action="watchTape"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                activeTapeId = parseInt(e.target.dataset.id);
                watchPrivateTape();
            });
        });
    }

    function renderTasks() {
        let html = '';
        if (dumpsterTasks.length===0) {
            html = '<div style="color:#9966cc;">No tasks from the dumpster.</div>';
        } else {
            dumpsterTasks.forEach(task => {
                html += `<div class="task-item">
                    <span>🗑️ ${task.description} ${task.completed ? '✓' : ''}</span>
                </div>`;
            });
        }
        tasksPanel.innerHTML = html;
    }

    // ---- Output Helpers ----
    function addOutput(type, text) {
        const div = document.createElement('div');
        switch(type) {
            case 'system': div.className='system-msg'; break;
            case 'narration': div.className='narration'; break;
            case 'customer': div.className='customer-dialogue'; div.innerHTML = text; break;
            case 'dumpster': div.className='dumpster-dialogue'; div.innerHTML = text; break;
            case 'tape': div.className='tape-event'; div.innerHTML = text; break;
            case 'store': div.className='store-event'; break;
            case 'player': div.className='player-cmd'; div.textContent = '> ' + text; break;
            default: div.className='narration';
        }
        gameOutput.appendChild(div);
        gameOutput.scrollTop = gameOutput.scrollHeight;
        // subtle CRT click
        if (window.audioCtx) { const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.frequency.value=800; g.gain.setValueAtTime(0.02,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.02); o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.02); }
    }

    // ---- AI ----
    const SYSTEM_PROMPT = `You are the Game Master for "MIDNIGHT REWIND," a video rental store set in permanent 1980s night. The player is the sole clerk. The store has three areas: front (shop), backroom (private viewing), alley (dumpster). You narrate everything in a lo-fi, analog horror style.

Respond ONLY with a raw JSON object containing:
- "narration": string (atmospheric, 20-50 words, current scene)
- "location": "front"|"backroom"|"alley" (player location, unchanged unless moved)
- "customer_updates": array of objects (customers arriving/leaving/changing). Each: { action:"arrive"|"leave"|"update", customer:{ id, name, appearance, personality, reason, holdingItem? }, dialogue:string|null }
- "active_customer_dialogue": string or null (what the currently selected customer says)
- "dumpster_dialogue": string or null (if dumpster speaks)
- "dumpster_task": object or null { description, required_item, from_who? } if dumpster assigns a task.
- "tape_event": object or null (when watching a tape) { title, summary, customer_reaction?, weird_effect? }
- "inventory_changes": array of objects (add/remove/update tapes) { action:"add"|"remove"|"update", tape:{id,title,genre,desc,rentalStatus?}, location:"store"|"private" }
- "money_change": integer
- "time_advance": integer (minutes)
- "store_events": array of strings (creepy store details)

Rules:
- Customers have distinct personalities. Some are regulars, some are suspicious.
- The dumpster knows secrets. It speaks in riddles or direct demands. It asks for items hidden in the store.
- Tapes watched in the backroom blur reality. Custom tapes made by the player become real experiences.
- The store itself is slightly alive: posters change, VCRs rewind themselves.
- When ordering tapes, generate a "catalogue" in narration and a list of new tapes in inventory_changes.
- When a customer rents a tape, remove it from store inventory.
- When a tape is moved to private collection, remove from store, add to private.
- "invite to backroom" triggers a tape_event.
- Always maintain consistent state.`

    function repairJSON(str) {
        let s = str.replace(/```json\s*|```\s*/gi, '').trim();
        const start = s.indexOf('{'), end = s.lastIndexOf('}');
        if (start===-1 || end===-1) return s;
        s = s.substring(start, end+1).replace(/,\s*}/g,'}').replace(/,\s*]/g,']');
        return s;
    }
    function safeParseJSON(raw) {
        try { return JSON.parse(repairJSON(raw)); } catch(e) {
            return { narration: raw.substring(0,200), location: playerLocation, customer_updates:[], active_customer_dialogue:null,
                     dumpster_dialogue:null, dumpster_task:null, tape_event:null, inventory_changes:[], money_change:0,
                     time_advance:2, store_events:[] };
        }
    }

    async function callMistral(msgs) {
        const resp = await fetch('https://api.mistral.ai/v1/chat/completions', {
            method:'POST',
            headers: {'Content-Type':'application/json', 'Authorization':`Bearer ${mistralApiKey}`},
            body: JSON.stringify({ model:'mistral-large-latest', messages:msgs, temperature:0.9, max_tokens:1500, response_format:{ type:"json_object" } })
        });
        if (!resp.ok) {
            if (resp.status===401) throw new Error('INVALID API KEY');
            if (resp.status===429) throw new Error('RATE LIMITED');
            throw new Error(`API ${resp.status}`);
        }
        const data = await resp.json();
        return data.choices[0].message.content;
    }

    function sendToAI(userMsg, extraContext='') {
        if (!mistralApiKey) { addOutput('system','> NO API KEY.'); return; }
        if (isLoading) return;
        isLoading = true;

        let fullMsg = userMsg;
        if (extraContext) fullMsg = extraContext + ' ' + userMsg;
        gameHistory.push({ role:'user', content:fullMsg });
        addOutput('player', fullMsg);

        const think = document.createElement('div'); think.className='system-msg'; think.textContent='> ...'; think.id='think';
        gameOutput.appendChild(think);

        callMistral([{role:'system', content:SYSTEM_PROMPT}, ...gameHistory])
            .then(raw => {
                const thinkEl = document.getElementById('think'); if(thinkEl) thinkEl.remove();
                const state = safeParseJSON(raw);
                gameHistory.push({ role:'assistant', content: JSON.stringify(state) });
                turnCount++;
                applyState(state);
                if (turnCount % 4 === 0) autoSave();
            })
            .catch(err => {
                const thinkEl = document.getElementById('think'); if(thinkEl) thinkEl.remove();
                addOutput('system', `> ERROR: ${err.message}`);
                gameHistory.pop();
            })
            .finally(() => {
                isLoading = false;
                updateUI();
            });
    }

    function applyState(state) {
        if (state.location) playerLocation = state.location;
        if (state.narration) addOutput('narration', state.narration);
        if (state.store_events) state.store_events.forEach(e => addOutput('store', e));

        // Customers
        if (state.customer_updates) {
            state.customer_updates.forEach(upd => {
                if (upd.action === 'arrive' && upd.customer) {
                    if (!currentCustomers.find(c=>c.id===upd.customer.id)) {
                        currentCustomers.push(upd.customer);
                        if (upd.dialogue) addOutput('customer', `<strong>${upd.customer.name}:</strong> "${upd.dialogue}"`);
                    }
                } else if (upd.action === 'leave' && upd.customer) {
                    currentCustomers = currentCustomers.filter(c=>c.id!==upd.customer.id);
                    if (activeCustomerId === upd.customer.id) activeCustomerId = null;
                    if (upd.dialogue) addOutput('customer', `<strong>${upd.customer.name}:</strong> "${upd.dialogue}"`);
                } else if (upd.action === 'update' && upd.customer) {
                    const idx = currentCustomers.findIndex(c=>c.id===upd.customer.id);
                    if (idx!==-1) Object.assign(currentCustomers[idx], upd.customer);
                }
            });
        }
        if (state.active_customer_dialogue && activeCustomerId) {
            const cust = currentCustomers.find(c=>c.id===activeCustomerId);
            if (cust) addOutput('customer', `<strong>${cust.name}:</strong> "${state.active_customer_dialogue}"`);
        }

        // Dumpster
        if (state.dumpster_dialogue) addOutput('dumpster', `🗑️ DUMPSTER: "${state.dumpster_dialogue}"`);
        if (state.dumpster_task) {
            dumpsterTasks.push({...state.dumpster_task, completed:false});
            addOutput('system', `> NEW TASK: ${state.dumpster_task.description}`);
        }

        // Tapes
        if (state.tape_event) {
            let txt = `📼 Watching "${state.tape_event.title}"... ${state.tape_event.summary}`;
            if (state.tape_event.customer_reaction) txt += `\n   Reaction: ${state.tape_event.customer_reaction}`;
            if (state.tape_event.weird_effect) txt += `\n   ⚠️ ${state.tape_event.weird_effect}`;
            addOutput('tape', txt);
        }

        if (state.inventory_changes) {
            state.inventory_changes.forEach(ch => {
                if (ch.action==='add' && ch.tape) {
                    if (ch.location==='store') storeInventory.push(ch.tape);
                    else if (ch.location==='private') privateCollection.push(ch.tape);
                } else if (ch.action==='remove' && ch.tape) {
                    if (ch.location==='store') storeInventory = storeInventory.filter(t=>t.id!==ch.tape.id);
                    else privateCollection = privateCollection.filter(t=>t.id!==ch.tape.id);
                } else if (ch.action==='update' && ch.tape) {
                    const arr = ch.location==='store' ? storeInventory : privateCollection;
                    const idx = arr.findIndex(t=>t.id===ch.tape.id);
                    if (idx!==-1) Object.assign(arr[idx], ch.tape);
                }
            });
        }

        cash += (state.money_change||0);
        if (state.time_advance) {
            let [h,m] = currentTime.replace(' PM','').split(':').map(Number);
            m += state.time_advance;
            while (m>=60) { m-=60; h++; }
            if (h>12) h-=12;
            currentTime = `${h}:${m.toString().padStart(2,'0')} PM`;
        }
    }

    // ---- Actions ----
    function watchPrivateTape() {
        if (!activeTapeId) return;
        const tape = privateCollection.find(t=>t.id===activeTapeId);
        if (!tape) return;
        let cmd = `WATCH TAPE "${tape.title}" (${tape.genre}: ${tape.desc})`;
        if (activeCustomerId) {
            const cust = currentCustomers.find(c=>c.id===activeCustomerId);
            if (cust) cmd += ` with customer ${cust.name}`;
        }
        sendToAI(cmd);
    }

    function moveToPrivate() {
        if (!activeTapeId) return;
        const tape = storeInventory.find(t=>t.id===activeTapeId && t.rentalStatus==='available');
        if (!tape) { addOutput('system','> Tape not available.'); return; }
        storeInventory = storeInventory.filter(t=>t.id!==tape.id);
        privateCollection.push({...tape, rentalStatus:undefined});
        addOutput('system', `> Moved "${tape.title}" to your private collection.`);
        activeTapeId = null;
        updateUI();
    }

    function talkToCustomer() {
        if (!activeCustomerId) { addOutput('system','> Select a customer first.'); return; }
        const msg = cmdInput.value.trim();
        if (!msg) { addOutput('system','> Type something to say.'); return; }
        cmdInput.value = '';
        const cust = currentCustomers.find(c=>c.id===activeCustomerId);
        sendToAI(`TALK TO ${cust.name}: "${msg}"`);
    }

    function inviteToBackroom() {
        if (!activeCustomerId) return;
        if (playerLocation!=='front') return;
        playerLocation = 'backroom';
        sendToAI(`INVITE ${currentCustomers.find(c=>c.id===activeCustomerId).name} to backroom. Choose a tape to watch.`);
        updateUI();
    }

    function checkoutTape() {
        if (!activeTapeId || !activeCustomerId) { addOutput('system','> Select a tape and a customer.'); return; }
        const tape = storeInventory.find(t=>t.id===activeTapeId && t.rentalStatus==='available');
        const cust = currentCustomers.find(c=>c.id===activeCustomerId);
        if (!tape || !cust) return;
        sendToAI(`RENT tape "${tape.title}" to customer ${cust.name}.`);
    }

    function orderTapes() {
        sendToAI('ORDER NEW TAPES from distributor.');
    }

    function talkDumpster() {
        const msg = cmdInput.value.trim();
        cmdInput.value = '';
        sendToAI(`TALK TO DUMPSTER: "${msg}"`);
    }

    function putInDumpster() {
        if (!playerCarriedItem) return;
        sendToAI(`PUT "${playerCarriedItem}" INTO DUMPSTER.`);
        playerCarriedItem = null;
    }

    function smoke() {
        sendToAI('SMOKE outside. Dumpster may speak.');
    }

    // ---- Save/Load ----
    function autoSave() { if (gameStarted) saveToSlot(0, 'Autosave'); }
    function saveToSlot(slotId, name) {
        const save = { gameHistory, turnCount, gameStarted, playerLocation, cash, currentTime,
                       storeInventory, privateCollection, currentCustomers, dumpsterTasks,
                       playerCarriedItem, activeCustomerId, activeTapeId,
                       name: name||`Slot ${slotId+1}`, timestamp: new Date().toISOString() };
        localStorage.setItem(`midnightrewind_slot_${slotId}`, JSON.stringify(save));
    }
    function loadFromSlot(slotId) {
        const d = localStorage.getItem(`midnightrewind_slot_${slotId}`);
        if (!d) throw new Error('empty');
        const s = JSON.parse(d);
        gameHistory = s.gameHistory; turnCount = s.turnCount; gameStarted = s.gameStarted;
        playerLocation = s.playerLocation; cash = s.cash; currentTime = s.currentTime;
        storeInventory = s.storeInventory; privateCollection = s.privateCollection;
        currentCustomers = s.currentCustomers; dumpsterTasks = s.dumpsterTasks;
        playerCarriedItem = s.playerCarriedItem; activeCustomerId = s.activeCustomerId; activeTapeId = s.activeTapeId;
        gameOutput.innerHTML = ''; addOutput('system', `> LOADED: ${s.name}`);
        updateUI();
    }
    function refreshSaveSlots() {
        let html = '';
        for (let i=0; i<5; i++) {
            const d = localStorage.getItem(`midnightrewind_slot_${i}`);
            let name = `Slot ${i+1} (empty)`, turn = '--';
            if (d) { try { const p=JSON.parse(d); name=p.name||`Slot ${i+1}`; turn=`Turn ${p.turnCount||0}`; } catch{} }
            html += `<div class="save-slot" style="display:flex; justify-content:space-between; margin:4px 0;">
                <span>${name} | ${turn}</span>
                <div>${d?`<button class="loadSlot" data-slot="${i}">LOAD</button><button class="deleteSlot" data-slot="${i}">DEL</button>`:''}
                <button class="saveSlot" data-slot="${i}">SAVE</button></div></div>`;
        }
        saveSlotsContainer.innerHTML = html;
        saveSlotsContainer.querySelectorAll('.saveSlot').forEach(b => b.addEventListener('click', e => {
            saveToSlot(parseInt(e.target.dataset.slot), `Slot ${parseInt(e.target.dataset.slot)+1}`);
            refreshSaveSlots();
        }));
        saveSlotsContainer.querySelectorAll('.loadSlot').forEach(b => b.addEventListener('click', e => {
            try { loadFromSlot(parseInt(e.target.dataset.slot)); saveModal.style.display='none'; } catch { alert('Corrupt slot'); }
        }));
        saveSlotsContainer.querySelectorAll('.deleteSlot').forEach(b => b.addEventListener('click', e => {
            localStorage.removeItem(`midnightrewind_slot_${e.target.dataset.slot}`);
            refreshSaveSlots();
        }));
    }

    // ---- Audio ----
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }

    // ---- Game Flow ----
    function beginGame() {
        if (!mistralApiKey) { addOutput('system','> ENTER API KEY.'); return; }
        initAudio();
        gameHistory = []; turnCount = 0; gameStarted = true;
        initGameData();
        gameOutput.innerHTML = '';
        addOutput('system','> MIDNIGHT REWIND — SHIFT START');
        addOutput('system','> The neon buzzes. The VCRs hum.');
        document.getElementById('btnBegin').style.display = 'none';
        switchTab('customers'); // start on customers tab
        updateUI();
        sendToAI('BEGIN SHIFT. Describe the store atmosphere and any initial customers.');
    }

    function restartGame() {
        if (isLoading) return;
        gameHistory = []; turnCount = 0; gameStarted = false;
        initGameData();
        gameOutput.innerHTML = '';
        addOutput('system','> MIDNIGHT REWIND ready.');
        addOutput('system','> Press BEGIN SHIFT.');
        document.getElementById('btnBegin').style.display = 'inline-block';
        updateUI();
    }

    // ---- Event Wiring ----
    document.getElementById('btnGoFront').addEventListener('click', ()=>{
        if (playerLocation!=='front') { playerLocation='front'; sendToAI('GO TO FRONT SHOP.'); }
    });
    document.getElementById('btnGoBackroom').addEventListener('click', ()=>{
        if (playerLocation!=='backroom') { playerLocation='backroom'; sendToAI('GO TO BACKROOM.'); }
    });
    document.getElementById('btnGoAlley').addEventListener('click', ()=>{
        if (playerLocation!=='alley') { playerLocation='alley'; sendToAI('GO OUTSIDE TO ALLEY. Dumpster may speak.'); }
    });

    document.getElementById('btnTalkToCustomer').addEventListener('click', talkToCustomer);
    document.getElementById('btnInviteBackroom').addEventListener('click', inviteToBackroom);
    document.getElementById('btnCheckout').addEventListener('click', checkoutTape);
    document.getElementById('btnOrderTapes').addEventListener('click', orderTapes);
    document.getElementById('btnWatchTape').addEventListener('click', watchPrivateTape);
    document.getElementById('btnCreateTape').addEventListener('click', ()=>{
        tapeCreateModal.style.display='flex';
    });
    document.getElementById('btnMoveToPrivate').addEventListener('click', moveToPrivate);
    document.getElementById('btnTalkDumpster').addEventListener('click', talkDumpster);
    document.getElementById('btnPutInDumpster').addEventListener('click', putInDumpster);
    document.getElementById('btnSmoke').addEventListener('click', smoke);

    document.getElementById('btnBegin').addEventListener('click', beginGame);
    document.getElementById('btnRestart').addEventListener('click', restartGame);
    document.getElementById('btnSave').addEventListener('click', ()=>{ refreshSaveSlots(); saveModal.style.display='flex'; });
    document.getElementById('btnLoad').addEventListener('click', ()=>{ refreshSaveSlots(); saveModal.style.display='flex'; });
    closeSaveModalBtn.addEventListener('click', ()=> saveModal.style.display='none');

    // Tape creation
    document.getElementById('btnSubmitTape').addEventListener('click', ()=>{
        const title = document.getElementById('tapeTitle').value.trim();
        const genre = document.getElementById('tapeGenre').value;
        const desc = document.getElementById('tapeDesc').value.trim();
        if (!title) { alert('Title required'); return; }
        privateCollection.push({ id:Date.now(), title, genre, desc, isCustom:true });
        tapeCreateModal.style.display='none';
        addOutput('system', `> Created custom tape: "${title}"`);
        updateUI();
    });
    document.getElementById('closeTapeModal').addEventListener('click', ()=> tapeCreateModal.style.display='none');

    // Tab button clicks
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            switchTab(btn.dataset.tab);
        });
    });

    // Send
    btnSend.addEventListener('click', ()=>{
        const msg = cmdInput.value.trim();
        if (!msg) return;
        cmdInput.value = '';
        if (!gameStarted) { addOutput('system','> Press BEGIN SHIFT first.'); return; }
        initAudio();
        let context = '';
        if (playerLocation==='front' && activeCustomerId) {
            const cust = currentCustomers.find(c=>c.id===activeCustomerId);
            if (cust) context = `(talking to ${cust.name}) `;
        } else if (playerLocation==='alley') {
            context = '(in alley, dumpster may respond) ';
        }
        sendToAI(context + msg);
    });
    cmdInput.addEventListener('keydown', e => { if(e.key==='Enter') btnSend.click(); });

    // API key
    btnSaveKey.addEventListener('click', ()=>{
        const key = apiKeyInput.value.trim();
        if (key) {
            mistralApiKey = key;
            localStorage.setItem('midnightrewind_key', key);
            keyStatus.textContent = '● KEY SET'; keyStatus.style.color = 'var(--cyan)';
        } else {
            localStorage.removeItem('midnightrewind_key');
            keyStatus.textContent = '○ NO KEY'; keyStatus.style.color = '#ff6644';
        }
    });
    apiKeyInput.addEventListener('keydown', e => { if(e.key==='Enter') btnSaveKey.click(); });

    // Init
    const savedKey = localStorage.getItem('midnightrewind_key');
    if (savedKey) {
        mistralApiKey = savedKey;
        apiKeyInput.value = savedKey;
        keyStatus.textContent = '● KEY SET'; keyStatus.style.color = 'var(--cyan)';
    }
    initGameData();
    updateUI();
    document.getElementById('btnBegin').style.display = 'inline-block';
    // Customer arrival timer
    setInterval(() => {
        if (gameStarted && !isLoading && playerLocation==='front' && currentCustomers.length < 4) {
            sendToAI('A new customer might enter the video store. Generate one randomly.');
        }
    }, 45000);
})();
</script>
</body>
</html>
