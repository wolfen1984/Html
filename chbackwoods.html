                            produceBtn.textContent = '✅ Score Ready';
                            renderChannel3();
                        } catch (e) {
                            showModal(
                                `<h2>Score Failed</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                                );
                            produceBtn.disabled = false;
                            produceBtn.textContent = '🎚️ Compose Lynch Score (Current)';
                        }
                    });
                    guideList.appendChild(produceBtn);
                }
                document.querySelectorAll('.perform-saved-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const index = parseInt(btn.dataset.index);
                        const ep = gameState.ch3Episodes[index];
                        if (!ep) return;
                        gameState.nocturnePerformance = { ...ep, soundCues: ep.soundCues || null,
                            rawStoryText: ep.rawStoryText || ep.story };
                        saveState();
                        await startNocturnePerformance();
                    });
                });
                document.querySelectorAll('.produce-episode-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const index = parseInt(btn.dataset.index);
                        const ep = gameState.ch3Episodes[index];
                        if (!ep || !ep.rawStoryText) return;
                        btn.disabled = true;
                        btn.textContent = '🎚️...';
                        try {
                            const soundtrack = await generateSoundCueSheet(ep.rawStoryText);
                            ep.soundCues = soundtrack;
                            saveState();
                            renderChannel3();
                        } catch (err) {
                            showModal(
                                `<h2>Score Failed</h2><p>${esc(err.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                                );
                            btn.disabled = false;
                            btn.textContent = '🎚️ Score';
                        }
                    });
                });
            }

            async function generateNewNocturneStory() {
                const system =
                    `You are the narrator of Beneath the Backwoods. You write tight, brutal, literary horror set in the 1980s. No supernatural elements. Pure human depravity.`;
                const prompt =
                    `Write a 900 to 1100 word short horror story set in the 1980s in the rural town of Backwoods. The story follows an outsider who arrives in town looking for something (answers, money, a missing person, a job, a place to hide). They start asking questions. The town closes ranks. By morning, they are gone. Strict rules: NO supernatural elements whatsoever – no ghosts, curses, magic, premonitions, or dreams. The horror must be purely human: sadism, conspiracy, cover-ups, violence, paranoia. Pick one sin that drives the outsider: Greed, Pride, Vanity, Envy, or Wrath. Follow this structure: a mundane arrival and setup, a grounded non-magical scheme, a brutal unflinching execution of the town's justice, and finally an ironic visceral twist where the outsider's quest becomes their doom. The twist must be realistic and earned. No dream cop-outs. Frame the story with a cold, cynical opening and close with the tagline sensibility: "Everyone leaves something behind in Backwoods. Some people leave everything." Return ONLY a valid JSON object with these fields: title (string), story (full narration string, use backslash n for line breaks), closing_remark (the chilling sign-off phrase). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user',
                    content: prompt }], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) throw new Error(
                    'Invalid story structure …');
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Rural noir movie poster for "${story.title}", 1980s small town America, muted colors, grainy VHS, ominous forest, lonely highway`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate story poster:', e); }
                gameState.nocturnePerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system = `You are a sound designer for a David Lynch-style horror drama with a full orchestra.
        Given a short story, return a JSON object with THREE keys:
        - "sections": an array of 5-6 sections dividing the story into emotional acts. Each section: "theme" (one of: intro, setup, scheme, execution, twist, closing), "start_char" (inclusive), "end_char" (exclusive). Cover the entire story from 0 to ${length}.
        - "cues": an array of sound events using ONLY these types: "sting", "heartbeat", "thunder", "bell", "climax", "industrial_hum", "pad", "string_pad", "cello_drone", "string_swell", "violin_texture", "pizzicato", "string_cluster", "bass", "kick", "snare". Include at least 40 cues spread evenly across the story. Use string instruments generously – cello_drone for tension, string_swell for dramatic reveals, violin_texture for eerie moments, pizzicato for unsettling details, string_cluster for horror peaks, string_pad for emotional undercurrent. Use bass for low-end weight, kick and snare sparingly for punctuation. Each cue: "position" (char index), "type", optional "intensity" (0-1).
        - "score": an object with keys matching the theme names. Each key: "bpm" (40-70, slow), "bass" (array of 8 semitone intervals from root 0), "kick" (array of 8, mostly 0s), "snare" (array of 8, mostly 0s), "hat" (array of 8, mostly 0s). Keep drums very sparse – Lynch style is ambient, not rhythmic.
        Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues (use plenty of string instruments: string_pad, cello_drone, string_swell, violin_texture, pizzicato, string_cluster, plus bass, kick, snare, hat sparingly), and score patterns.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user',
                    content: userPrompt }], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try { data = JSON.parse(cleaned); } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) { const candidate = match[0].replace(/,\s*([}\]])/g, '$1'); try { data = JSON.parse(
                            candidate); } catch (e2) { throw new Error(
                            'Failed to parse AI soundtrack JSON even after repair.'); } } else throw new Error(
                        'No JSON found in AI response.');
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                    throw new Error('Missing sections, cues, or score in AI response');
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char <
                    length) { sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length; }
                const cues = data.cues.map(c => ({ type: c.type, position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7 }));
                const requiredThemes = ['intro', 'setup', 'scheme', 'execution', 'twist', 'closing'];
                const score = {};
                for (const theme of requiredThemes) {
                    score[theme] = data.score[theme] ? {
                        bpm: data.score[theme].bpm || 50,
                        bass: data.score[theme].bass || [0, 0, 7, 7, 0, 0, 7, 7],
                        kick: data.score[theme].kick || [0, 0, 0, 0, 0, 0, 0, 0],
                        snare: data.score[theme].snare || [0, 0, 0, 0, 0, 0, 0, 0],
                        hat: data.score[theme].hat || [0, 0, 0, 0, 0, 0, 0, 0]
                    } : { bpm: 50, bass: [0, 0, 7, 7, 0, 0, 7, 7], kick: [0, 0, 0, 0, 0, 0, 0, 0],
                        snare: [0, 0, 0, 0, 0, 0, 0, 0], hat: [0, 0, 0, 0, 0, 0, 0, 0] };
                }
                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {
                await generateNewNocturneStory();
                if (!gameState.nocturnePerformance) throw new Error('Failed to generate story');
                const soundtrack = await generateSoundCueSheet(gameState.nocturnePerformance.rawStoryText);
                gameState.nocturnePerformance.soundCues = soundtrack;
                saveState();
                await startNocturnePerformance();
            }

            // ── SCORE INDICATOR UPDATE ──
            function updateScoreIndicator(theme, variation, bar) {
                const indicator = document.getElementById('scoreIndicator');
                const themeLabel = document.getElementById('scoreThemeLabel');
                const variationLabel = document.getElementById('scoreVariationLabel');
                const barLabel = document.getElementById('scoreBarLabel');
                const progressFill = document.getElementById('scoreProgressFill');
                if (!indicator) return;
                indicator.style.display = 'block';
                if (themeLabel) themeLabel.textContent = theme || 'intro';
                if (variationLabel) variationLabel.textContent = variation || 'A';
                if (barLabel) barLabel.textContent = `bar ${bar || 1}`;
                if (progressFill) {
                    const pct = Math.min(100, ((bar || 1) / 12) * 100);
                    progressFill.style.width = pct + '%';
                }
            }

            // ── PERFORMANCE ──
            async function startNocturnePerformance() {
                speechSynthesis.cancel();
                if (window.ch3Timeout) clearTimeout(window.ch3Timeout);
                const storyData = gameState.nocturnePerformance;
                if (!storyData || !storyData.story) { await generateNewNocturneStory(); return startNocturnePerformance(); }
                let sectionList = null;
                let cueList = null;
                let scoreData = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) { cueList = storyData.soundCues.filter(c => c.type && c
                            .position !== undefined); } else if (storyData.soundCues.sections && storyData.soundCues
                        .cues) { sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                        scoreData = storyData.soundCues.score; }
                }
                const bubble = document.getElementById('ch3SpeechBubble');
                const dialogue = document.getElementById('ch3Dialogue');
                const imageEl = document.getElementById('ch3SegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('ch3GuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#CCFF00';
                bubble.style.boxShadow = '0 0 30px #CCFF0088, 0 0 60px #CCFF0022';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('ch3BackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('ch3AddEpisodeBtn');
                if (oldAdd) oldAdd.remove();
                const posterContainer = document.getElementById('ch3PosterContainer');
                const posterTitle = document.getElementById('ch3PosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) posterTitle.textContent = storyData.title || '';
                } else if (posterContainer) { posterContainer.classList.add('no-image'); }
                const intro =
                    `"The highway brought me here. Backwoods. A town that doesn't appear on most maps. The people seem friendly. Almost too friendly. I came looking for something... I should have kept driving. This is the story of '${storyData.title}'."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 45);
                await new Promise(r => setTimeout(r, 1500));

                // Start the score indicator update loop
                let indicatorInterval = setInterval(() => {
                    if (patternPlayerActive) {
                        const theme = patternPlayerActive.theme || 'intro';
                        const varIdx = currentVariationIdx;
                        const varName = currentSectionPatterns[varIdx] ? currentSectionPatterns[varIdx].name :
                            'A';
                        const bar = barsInVariation + 1;
                        updateScoreIndicator(theme, varName, bar);
                    } else {
                        updateScoreIndicator('...', '—', 0);
                    }
                }, 1000);

                if (sectionList && sectionList.length > 0) {
                    transitionSectionTheme(sectionList[0].theme, scoreData);
                } else if (scoreData) {
                    transitionSectionTheme('intro', scoreData);
                } else {
                    // Start with intro pattern using built-in evolving patterns
                    startEvolvingPatternPlayer('intro', 40);
                }

                const storyText = storyData.rawStoryText || storyData.story;
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b.start_char) :
                        [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { console.log(
                                `⏳ at index ${idx} (${Math.round(idx / storyText.length * 100)}%)`);
                            lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <=
                            idx) { const sec = sortedSections[sectionIdx]; if (sec.theme !== currentTheme) {
                                currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme, scoreData); }
                            sectionIdx++; }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) { const cue =
                                sortedCues[cueIdx]; if (!triggered.has(cueIdx)) { triggered.add(cueIdx);
                                console.log(`🔊 FIRING ${cue.type} at ${cue.position}`);
                                playSound(cue.type, cue.intensity); }
                            cueIdx++; }
                    };
                }
                dialogue.textContent = '';
                if (cueChecker) { await speakAndTypeSynced(dialogue, storyText, { rate: 0.62, pitch: 0.9 }, (idx) =>
                        cueChecker(idx)); } else { await speakAndTypeSynced(dialogue, storyText, { rate: 0.62,
                        pitch: 0.9 }); }
                await new Promise(r => setTimeout(r, 1200));
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#CCFF00';
                dialogue.appendChild(closingLine);
                speakTextMale(closing);
                await typewriterEffect(closingLine, closing, 40);
                await new Promise(r => setTimeout(r, 1000));
                const curtainText = document.createElement('p');
                curtainText.textContent = '— The road out of Backwoods remains empty —';
                stopSectionAmbient();
                stopPatternPlayer();
                clearInterval(indicatorInterval);
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                curtainText.style.color = '#777777';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();
                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Leave Backwoods';
                leaveBtn.addEventListener('click', () => { leaveTheater(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'ch3AddEpisodeBtn';
                addBtn.textContent = '➕ Archive Arrival';
                addBtn.addEventListener('click', () => { addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Archived'; });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.nocturnePerformance;
                if (!perf) return;
                gameState.ch3Episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
                saveState();
                setTimeout(() => leaveTheater(), 600);
            }

            function leaveTheater() {
                stopAmbient();
                stopSectionAmbient();
                stopPatternPlayer();
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                renderChannel3();
            }

            function init() {
                loadState();
                renderChannel3();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) { apiKey = key;
                        localStorage.setItem('backwoods_key', key); }
                });
                document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e
                        .currentTarget) closeModal(); });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) { showModal(HOST_BIO); }
                });
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
                if (!apiKey) { setTimeout(() => document.getElementById('resetApiBtn').click(), 800); }
            }
            init();
        })();
    </script>
