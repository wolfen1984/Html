<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover" />
    <title>BENEATH THE BACKWOODS · 1987 · EVOLVING SCORE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Special+Elite&family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #060606;
            --screen-bg: #0a0a0a;
            --panel-bg: #0d0d0d;
            --text: #d0d0d0;
            --text-dim: #777777;
            --text-bright: #f0f0f0;
            --neon: #CCFF00;
            --neon-dim: #556600;
            --neon-dark: #2a3300;
            --neon-glow: 0 0 14px #CCFF0044, 0 0 32px #CCFF0022, 0 0 60px #CCFF0011;
            --neon-glow-strong: 0 0 20px #CCFF0066, 0 0 40px #CCFF0033, 0 0 80px #CCFF0018;
            --white-glow: 0 0 8px #ffffff33, 0 0 20px #ffffff11;
            --border-color: #889900;
            --border-glow: 0 0 14px #CCFF0044, 0 0 28px #CCFF0018;
            --danger: #CCFF00;
            --danger-glow: 0 0 12px #CCFF0055;
            --amber: #CCFF00;
            --amber-dim: #445500;
            --gold: #DDFF33;
            --gold-dim: #556600;
            --green: #88aa00;
            --input-bg: #111111;
            --button-bg: #151515;
            --button-hover: #1c1c1c;
            --button-active: #1a1a1a;
            --bevel-light: #2a2a2a;
            --bevel-dark: #040404;
            --font-display: 'Oswald', 'Roboto Condensed', sans-serif;
            --font-title: 'Oswald', 'Roboto Condensed', sans-serif;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 26px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0f0f0a 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #111111;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #1c1c1c, 0 0 0 4px #0a0a0a, 0 0 0 8px #050505, 0 8px 48px #000000dd, 0 0 60px #CCFF0011;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (max-width:540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #080808;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #CCFF00;
            border-radius: 50%;
            box-shadow: 0 0 8px #CCFF0088, 0 0 18px #CCFF0033, 0 0 30px #CCFF0018;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #CCFF0088, 0 0 18px #CCFF0033;
            }
            50% {
                box-shadow: 0 0 16px #CCFF00bb, 0 0 30px #CCFF0055, 0 0 50px #CCFF0022;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #445500;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #889900;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width:540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.78), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.72) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.5;
            }
            99.5% {
                opacity: 0.82;
            }
            99.6% {
                opacity: 0.35;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #080808;
            border-bottom: 3px solid #889900;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #111111;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #889900;
            border-radius: 2px;
            padding: 10px 14px;
            background: #060606;
            position: relative;
            box-shadow: inset 0 0 24px #CCFF0008, var(--neon-glow);
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #CCFF00;
            box-shadow: 0 0 12px #CCFF0088, 0 0 24px #CCFF0044;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #ffffff44;
            box-shadow: 0 0 8px #ffffff33;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #CCFF00;
            text-shadow: 0 0 16px #CCFF0088, 0 2px 4px #000, 0 0 40px #CCFF0033, 0 0 60px #CCFF0018;
            letter-spacing: 4px;
            font-family: var(--font-title);
            line-height: 1.2;
            text-transform: uppercase;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #889966;
            letter-spacing: 5px;
            margin-top: 3px;
        }
        @media (max-width:400px) {
            .marquee-title {
                font-size: 18px;
                letter-spacing: 2px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #334400 #0a0a0a;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #334400;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #2a2a2a;
            border-top-color: #383838;
            border-left-color: #333333;
            border-right-color: #1c1c1c;
            border-bottom-color: #101010;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #1c1c1c;
            border-left-color: #1c1c1c;
            border-bottom-color: #383838;
            border-right-color: #333333;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #111111;
        }
        .btn.accent {
            background: #111108;
            border-color: #556600;
            border-top-color: #778800;
            border-left-color: #667700;
            border-right-color: #334400;
            border-bottom-color: #1a2200;
            color: #ddeeaa;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #CCFF0022;
        }
        .btn.accent:active {
            border-top-color: #334400;
            border-left-color: #334400;
            border-bottom-color: #778800;
            border-right-color: #667700;
            box-shadow: 0 0px 0 #00000044, 0 0 20px #CCFF0044;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .theater-mask {
            position: relative;
            background: #0d0d0d;
            border: 2px solid #88990066;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.85);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0a0a0a;
            border: 2px solid #889900;
            padding: 15px;
            border-radius: 3px;
            box-shadow: var(--neon-glow);
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #889900;
            box-shadow: 0 0 22px #CCFF0066, 0 0 0 2px #111108;
            object-fit: cover;
            flex-shrink: 0;
            background: #0a0a0a;
            filter: brightness(0.9) contrast(1.1);
        }
        .speech-bubble {
            flex: 1;
            background: #111111;
            border: 2px solid #889900;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #e0e0e0;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: inset 0 0 20px #00000055;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #88990088 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #0a0a0a;
            border: 1px solid #334400;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #151515;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777777;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.35;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #889900;
            box-shadow: 0 0 20px #CCFF0044, inset 0 0 30px rgba(0, 0, 0, 0.55);
            flex-shrink: 0;
            background: #0a0a0a;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 35%, rgba(6, 6, 6, 0.88) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 13px;
            letter-spacing: 4px;
            color: #CCFF00;
            text-shadow: 0 0 10px #CCFF00cc, 0 0 30px #CCFF0088, 0 2px 4px #000000, 0 0 60px #CCFF0022;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom, rgba(8, 8, 6, 0.9) 0%, rgba(8, 8, 6, 0.7) 40%, transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 16px;
            letter-spacing: 1.5px;
            color: #ffffff;
            text-shadow: 0 0 8px #ffffff88, 0 0 20px #ffffff33, 0 2px 4px #000000;
            background: linear-gradient(to top, rgba(6, 6, 6, 0.9) 0%, rgba(6, 6, 6, 0.6) 50%, transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777777;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width:480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 10px;
                letter-spacing: 3px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 12px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #889900;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #CCFF00;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 10px #CCFF0044;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f0f0f;
            border: 1px solid #889900;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #CCFF00;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #e0e0e0;
        }
        .guide-desc {
            font-size: 15px;
            color: #777777;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0f0f0f;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #CCFF00;
            box-shadow: var(--neon-glow-strong), 0 0 80px #000000dd;
            color: #d0d0d0;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #151515;
            border: 2px solid #88990066;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #d0d0d0;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #CCFF00;
            box-shadow: 0 0 14px #CCFF0044;
        }
        .loading-text {
            color: var(--amber);
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #060606;
            border-top: 1px solid #88990044;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #445500;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #556633;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #1a1a1a;
            color: #556633;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #445500;
            color: #889966;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #e0e0e0;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width:480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
        .score-indicator {
            font-family: var(--font-mono);
            font-size: 10px;
            color: #889966;
            letter-spacing: 1px;
            padding: 3px 8px;
            border: 1px solid #334400;
            border-radius: 2px;
            display: inline-block;
            background: #0a0a0a;
            margin-top: 4px;
        }
        .score-indicator .active {
            color: #CCFF00;
        }
        .score-indicator .dim {
            color: #445500;
        }
        .progress-bar {
            width: 100%;
            height: 2px;
            background: #1a1a1a;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #CCFF00;
            border-radius: 2px;
            transition: width 0.3s;
            box-shadow: 0 0 10px #CCFF0044;
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">BENEATH THE BACKWOODS · CRT-87</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">BENEATH THE<br />BACKWOODS</div>
                    <div class="marquee-sub">⏤ 1987 · EVOLVING SCORE ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channel3Panel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🪵 BACKWOODS · POPULATION: UNKNOWN</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('backwoods_key') || '';

            const DEFAULT_STATE = {

                    const left = impulse.getChannelData(0);

                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.9));
                        const lateDecay = Math.exp(-i / (sampleRate * 2.5)) * 0.3;
                        left[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                        right[i] = (Math.random() * 2 - 1) * (decay + lateDecay);

                    reverbNode = ctx.createConvolver();

                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.0005, now + 0.35);

                const osc = ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sine';
                osc2.frequency.value = frequency * 3.01;
                const osc2Gain = ctx.createGain();
                osc2Gain.gain.value = 0.15;
                osc2.connect(osc2Gain);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(3000, now);
                filter.frequency.exponentialRampToValueAtTime(400, now + 0.3);
                filter.Q.value = 1.5;

                osc.connect(filter);
                osc2Gain.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.5;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);

                osc.start(now);
                osc2.start(now);
                osc.stop(now + 0.4);
                osc2.stop(now + 0.4);
            }

            function createStringCluster(ctx, frequencies, duration, intensity = 0.55) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 1.8);
                gainNode.gain.setValueAtTime(intensity * 0.2, now + duration - 2);
                gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 1.2;

                const allOscs = [];
                frequencies.forEach(f => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = f;
                    const microLfo = ctx.createOscillator();
                    microLfo.type = 'sine';
                    microLfo.frequency.value = 0.3 + Math.random() * 0.6;
                    const microGain = ctx.createGain();
                    microGain.gain.value = 1 + Math.random() * 3;
                    microLfo.connect(microGain);
                    microGain.connect(osc.frequency);
                    allOscs.push(osc, microLfo);
                    osc.connect(filter);
                });

                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.6;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);

                allOscs.forEach(o => { o.start(now);
                    o.stop(now + duration + 1.5); });
            }

            function createLynchPad(ctx, frequency, duration, intensity = 0.5, detuneSpread = 8) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.12, now + 1.2);
                gainNode.gain.setValueAtTime(intensity * 0.12, now + duration - 2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.8);

                const oscs = [];
                for (let i = 0; i < 4; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i < 2 ? 'sawtooth' : 'triangle';
                    const detune = (i - 1.5) * detuneSpread;
                    osc.frequency.value = frequency * Math.pow(2, detune / 1200);
                    oscs.push(osc);
                }

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 180;
                filter.Q.value = 3;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.08 + Math.random() * 0.12;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 100 + Math.random() * 150;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                oscs.forEach(o => o.connect(filter));
                filter.connect(gainNode);

                const drySend = ctx.createGain();
                drySend.gain.value = 0.45;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.55;
                gainNode.connect(drySend);
                gainNode.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);

                oscs.forEach(o => { o.start(now);
                    o.stop(now + duration + 1); });
                lfo.start(now);
                lfo.stop(now + duration + 1);
            }

            function createIndustrialTexture(ctx, duration, intensity = 0.4) {
                const now = ctx.currentTime;
                const bufferSize = ctx.sampleRate * 2;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    const t = i / ctx.sampleRate;
                    data[i] = (Math.random() * 2 - 1) * Math.sin(t * 120 + Math.sin(t * 3) * 40) * Math.exp(-t / 8);
                }
                const source = ctx.createBufferSource();
                source.buffer = buffer;
                source.loop = true;
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 200;
                filter.Q.value = 0.4;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.08, now + 1);
                gainNode.gain.setValueAtTime(intensity * 0.08, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                source.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.7;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                source.start(now);
                source.stop(now + duration);
            }

            function createLynchSting(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.25, now + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.4);
                osc.frequency.exponentialRampToValueAtTime(60, now + 2);
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(160, now);
                osc2.frequency.exponentialRampToValueAtTime(600, now + 0.35);
                osc2.frequency.exponentialRampToValueAtTime(120, now + 2);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                filter.Q.value = 2;
                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.6;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);
                osc.start(now);
                osc2.start(now);
                osc.stop(now + 2.5);
                osc2.stop(now + 2.5);
            }

            function createLynchClimax(ctx, intensity = 0.7) {
                const now = ctx.currentTime;
                const duration = 10 + Math.random() * 8;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.35, now + 3);
                gainNode.gain.setValueAtTime(intensity * 0.4, now + duration - 2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                const oscs = [];
                const freqs = [55, 82.5, 110, 165];
                freqs.forEach(f => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(f, now);
                    osc.frequency.exponentialRampToValueAtTime(f * 1.5, now + duration * 0.7);
                    oscs.push(osc);
                });
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(150, now);
                filter.frequency.exponentialRampToValueAtTime(900, now + duration);
                filter.Q.value = 2.5;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.06;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 250;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                oscs.forEach(o => o.connect(filter));
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.55;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);
                oscs.forEach(o => { o.start(now);
                    o.stop(now + duration + 1); });
                lfo.start(now);
                lfo.stop(now + duration + 1);
            }

            // ── 🎸 BASS SYNTH ──
            function createBassNote(ctx, semitone, intensity = 0.5, duration = 2.0, rootFreq = 40) {
                const now = ctx.currentTime;
                const freq = rootFreq * Math.pow(2, semitone / 12);
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.22, now + 0.08);
                gainNode.gain.setValueAtTime(intensity * 0.22, now + duration - 0.5);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.4);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq * 0.98, now);
                osc.frequency.exponentialRampToValueAtTime(freq, now + 0.15);

                const osc2 = ctx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.value = freq * 2;
                const osc2Gain = ctx.createGain();
                osc2Gain.gain.value = 0.08 * intensity;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(120 + semitone * 4, now);
                filter.frequency.exponentialRampToValueAtTime(80 + semitone * 2, now + duration);
                filter.Q.value = 2.5;

                osc.connect(filter);
                osc2.connect(osc2Gain);
                osc2Gain.connect(filter);
                filter.connect(gainNode);

                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.45;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);

                osc.start(now);
                osc2.start(now);
                osc.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
            }

            // ── 🥁 DRUM SYNTHS ──
            function createKick(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 0.9, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.25);

                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(35, now + 0.15);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 180;
                filter.Q.value = 1.2;

                osc.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);

                osc.start(now);
                osc.stop(now + 0.3);
            }

            function createSnare(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 0.6, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);

                const bufferSize = ctx.sampleRate * 0.08;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    const env = Math.exp(-i / (ctx.sampleRate * 0.025));
                    data[i] = (Math.random() * 2 - 1) * env * 0.6;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;

                const osc = ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.08);
                const oscGain = ctx.createGain();
                oscGain.gain.value = 0.2 * intensity;

                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 300;
                filter.Q.value = 0.8;

                noise.connect(filter);
                osc.connect(oscGain);
                oscGain.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);

                noise.start(now);
                osc.start(now);
                noise.stop(now + 0.12);
                osc.stop(now + 0.12);
            }

            function createHat(ctx, intensity = 0.3) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.06);

                const bufferSize = ctx.sampleRate * 0.025;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    const env = Math.exp(-i / (ctx.sampleRate * 0.01));
                    data[i] = (Math.random() * 2 - 1) * env * 0.4;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;

                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 5000;
                filter.Q.value = 0.5;

                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);
                noise.start(now);
                noise.stop(now + 0.08);
            }

            // ── 🎹 EVOLVING PATTERN PLAYER ──
            function startEvolvingPatternPlayer(themeName, rootFreq = 40, scoreData = null) {
                stopPatternPlayer();

                // Get pattern data for this theme
                let themePatterns = EVOLVING_PATTERNS[themeName];
                if (!themePatterns) {
                    // Fallback: use intro
                    themePatterns = EVOLVING_PATTERNS.intro;
                }

                // If scoreData is provided, use it to override patterns
                let variations = themePatterns.variations;
                let bpm = themePatterns.bpm;

                // If scoreData has patterns for this theme, use them
                if (scoreData && scoreData[themeName]) {
                    const sd = scoreData[themeName];
                    if (sd.bpm) bpm = sd.bpm;
                    // We could also override patterns here if needed
                }

                currentSectionPatterns = variations;
                currentVariationIdx = 0;
                barsInVariation = 0;
                totalBarsInSection = 0;
                patternStep = 0;
                patternBPM = bpm;
                fillPending = false;
                fillActive = false;
                fillStep = 0;

                const stepDuration = 60 / bpm / 4; // 16th notes

                let active = true;
                patternPlayerActive = { active: true, theme: themeName };

                function getCurrentPattern() {
                    const idx = Math.min(currentVariationIdx, currentSectionPatterns.length - 1);
                    return currentSectionPatterns[idx];
                }

                function getNextPattern() {
                    const nextIdx = Math.min(currentVariationIdx + 1, currentSectionPatterns.length - 1);
                    return currentSectionPatterns[nextIdx];
                }

                function shouldAdvanceVariation() {
                    const current = getCurrentPattern();
                    return barsInVariation >= current.bars;
                }

                function playStep() {
                    if (!patternPlayerActive || !patternPlayerActive.active) return;

                    const step = patternStep % 16;
                    const current = getCurrentPattern();
                    const isFillStep = fillActive;

                    // ── Bass ──
                    let bassSemitone = 0;
                    if (isFillStep) {
                        // During fill, bass plays root or fifth
                        bassSemitone = (step % 4 === 0) ? 0 : (step % 8 === 4 ? 7 : 0);
                    } else {
                        bassSemitone = current.bass[step] || 0;
                    }
                    if (bassSemitone !== 0 || (isFillStep && step % 4 === 0)) {
                        const duration = isFillStep ? 0.25 : 1.8;
                        const intensity = isFillStep ? 0.3 : 0.5 + (bassSemitone / 30);
                        createBassNote(audioCtx, bassSemitone, intensity, duration, rootFreq);
                    }

                    // ── Kick ──
                    let kickVal = 0;
                    if (isFillStep) {
                        kickVal = (step % 4 === 0) ? 1 : 0;
                    } else {
                        kickVal = current.kick[step] || 0;
                    }
                    if (kickVal === 1) {
                        createKick(audioCtx, isFillStep ? 0.7 : 0.6);
                    }

                    // ── Snare ──
                    let snareVal = 0;
                    if (isFillStep) {
                        snareVal = (step % 8 === 4) ? 1 : 0;
                    } else {
                        snareVal = current.snare[step] || 0;
                    }
                    if (snareVal === 1) {
                        createSnare(audioCtx, isFillStep ? 0.7 : 0.5);
                    }

                    // ── Hat ──
                    let hatVal = 0;
                    if (isFillStep) {
                        hatVal = (step % 2 === 0) ? 1 : 0;
                    } else {
                        hatVal = current.hat[step] || 0;
                    }
                    if (hatVal === 1 && Math.random() < 0.7) {
                        createHat(audioCtx, isFillStep ? 0.4 : 0.2);
                    }

                    // ── Advance step ──
                    patternStep++;
                    if (patternStep % 16 === 0) {
                        // One bar completed
                        barsInVariation++;
                        totalBarsInSection++;

                        // Check if we need to advance to next variation
                        if (shouldAdvanceVariation() && currentVariationIdx < currentSectionPatterns.length - 1) {
                            // Trigger a fill before switching
                            fillActive = true;
                            fillStep = 0;
                            const fillDuration = 8; // 8 steps of fill
                            let fillCount = 0;

                            const fillInterval = setInterval(() => {
                                if (!patternPlayerActive || !patternPlayerActive.active) {
                                    clearInterval(fillInterval);
                                    return;
                                }
                                // Play fill sounds
                                const fillStepLocal = fillCount % 16;
                                if (fillStepLocal % 4 === 0) createKick(audioCtx, 0.7);
                                if (fillStepLocal % 8 === 4) createSnare(audioCtx, 0.7);
                                if (fillStepLocal % 2 === 0) createHat(audioCtx, 0.3);
                                if (fillCount % 4 === 0) {
                                    createBassNote(audioCtx, 0, 0.3, 0.2, rootFreq);
                                }
                                fillCount++;
                                if (fillCount >= fillDuration) {
                                    clearInterval(fillInterval);
                                    fillActive = false;
                                    // Advance to next variation
                                    currentVariationIdx = Math.min(currentVariationIdx + 1, currentSectionPatterns
                                        .length - 1);
                                    barsInVariation = 0;
                                    // Play a sting on variation change
                                    createLynchSting(audioCtx, 0.3);
                                }
                            }, stepDuration * 1000);

                            // Continue with normal pattern after fill
                            const nextTime = stepDuration * 1000 * fillDuration;
                            setTimeout(() => {
                                if (patternPlayerActive && patternPlayerActive.active) {
                                    patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
                                }
                            }, nextTime);
                            return;
                        }

                        // Reset variation counter if we've gone through all variations
                        if (currentVariationIdx >= currentSectionPatterns.length - 1 && barsInVariation >= getCurrentPattern()
                            .bars) {
                            // Loop back to first variation or stay on last
                            // We'll stay on last for now
                            barsInVariation = 0;
                        }
                    }

                    // Schedule next step
                    const nextDelay = stepDuration * 1000;
                    patternPlayerTimeout = setTimeout(playStep, nextDelay);
                }

                // Start the pattern
                patternPlayerTimeout = setTimeout(playStep, 50);
            }

            function stopPatternPlayer() {
                if (patternPlayerTimeout) {
                    clearTimeout(patternPlayerTimeout);
                    patternPlayerTimeout = null;
                }
                if (patternProgressionTimer) {
                    clearTimeout(patternProgressionTimer);
                    patternProgressionTimer = null;
                }
                if (patternPlayerActive) {
                    patternPlayerActive.active = false;
                    patternPlayerActive = null;
                }
                patternStep = 0;
                currentSectionPatterns = [];
                currentVariationIdx = 0;
                barsInVariation = 0;
                fillActive = false;
            }

            // ── MASTER PLAY SOUND ──
            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    switch (type) {
                        case 'pad':
                            createLynchPad(ctx, 55 + Math.random() * 25, 18 + Math.random() * 18, intensity);
                            break;
                        case 'sting':
                            createLynchSting(ctx, intensity);
                            break;
                        case 'heartbeat':
                            createKick(ctx, 0.7 * intensity);
                            setTimeout(() => createKick(ctx, 0.7 * intensity), 200);
                            break;
                        case 'thunder': {
                            const bufferSize = ctx.sampleRate * 0.8;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.5));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(intensity * 0.5, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 100;
                            filter.Q.value = 0.5;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(now);
                            source.stop(now + 1.2);
                            break;
                        }
                        case 'bell': {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 60 + Math.random() * 25;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0, now);
                            gain.gain.linearRampToValueAtTime(intensity * 0.35, now + 0.15);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 4);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 350;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(now);
                            osc.stop(now + 4);
                            break;
                        }
                        case 'climax':
                            createLynchClimax(ctx, intensity);
                            break;
                        case 'industrial_hum':
                            createIndustrialTexture(ctx, 12 + Math.random() * 10, intensity);
                            break;
                        case 'string_pad':
                            createStringPad(ctx, 55 + Math.random() * 30, 14 + Math.random() * 16, intensity);
                            break;
                        case 'cello_drone':
                            createCelloDrone(ctx, 40 + Math.random() * 25, 12 + Math.random() * 14, intensity);
                            break;
                        case 'string_swell':
                            createStringSwell(ctx, 50 + Math.random() * 40, 6 + Math.random() * 8, intensity);
                            break;
                        case 'violin_texture':
                            createViolinHarmonics(ctx, 80 + Math.random() * 60, 10 + Math.random() * 12, intensity);
                            break;
                        case 'pizzicato':
                            createPizzicato(ctx, 60 + Math.random() * 50, intensity);
                            setTimeout(() => createPizzicato(ctx, 55 + Math.random() * 45, intensity * 0.7), 180 +
                                Math.random() * 250);
                            break;
                        case 'string_cluster': {
                            const clusterFreqs = [];
                            const root = 45 + Math.random() * 35;
                            for (let i = 0; i < 5; i++) {
                                clusterFreqs.push(root * (1 + (Math.random() - 0.5) * 0.25));
                            }
                            createStringCluster(ctx, clusterFreqs, 8 + Math.random() * 10, intensity);
                            break;
                        }
                        case 'bass': {
                            const semitone = Math.floor(Math.random() * 12);
                            createBassNote(ctx, semitone, intensity, 1.5 + Math.random() * 1.5, 40);
                            break;
                        }
                        case 'kick':
                            createKick(ctx, intensity);
                            break;
                        case 'snare':
                            createSnare(ctx, intensity);
                            break;
                        case 'hat':
                            createHat(ctx, intensity * 0.5);
                            break;
                        default:
                            console.warn(`Unknown sound type: ${type}`);
                    }
                } catch (err) {
                    console.error(`❌ Error in playSound("${type}"):`, err);

            // ── AMBIENT FUNCTIONS ──
            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.22, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'ambient_drone' || type === 'wind_howl' || type === 'industrial_drone') {
                        const bufferSize = ctx.sampleRate * 1.5;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.4;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'industrial_drone' ? 120 : type === 'ambient_drone' ? 160 :
                            500;
                        filter.Q.value = 0.4;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'industrial_drone' ? 50 : type === 'ambient_drone' ? 70 : 100;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.15 * intensity;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 80;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) {
                    console.error(`❌ Error in playAmbient("${type}"):`, err);
                }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 500);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            // ── LYNCH AMBIENT THEMES ──
            const LYNCH_AMBIENT = {
                intro: { rootFreq: 45, detuneSpread: 12, filterBase: 120, lfoRate: 0.05, noiseMix: 0.15,
                    intensity: 0.25, stringLayer: 'soft_pad', stringFreq: 55, stringIntensity: 0.18 },
                setup: { rootFreq: 50, detuneSpread: 10, filterBase: 150, lfoRate: 0.07, noiseMix: 0.2, intensity: 0.3,
                    stringLayer: 'cello', stringFreq: 42, stringIntensity: 0.22 },
                scheme: { rootFreq: 55, detuneSpread: 15, filterBase: 130, lfoRate: 0.09, noiseMix: 0.3, intensity: 0.35,
                    stringLayer: 'tension_pad', stringFreq: 58, stringIntensity: 0.28 },
                execution: { rootFreq: 48, detuneSpread: 18, filterBase: 100, lfoRate: 0.11, noiseMix: 0.45,
                    intensity: 0.45, stringLayer: 'cluster', stringFreq: 44, stringIntensity: 0.35 },
                twist: { rootFreq: 52, detuneSpread: 20, filterBase: 90, lfoRate: 0.13, noiseMix: 0.5, intensity: 0.5,
                    stringLayer: 'swell', stringFreq: 50, stringIntensity: 0.42 },
                closing: { rootFreq: 44, detuneSpread: 8, filterBase: 140, lfoRate: 0.04, noiseMix: 0.1, intensity: 0.2,
                    stringLayer: 'soft_pad', stringFreq: 48, stringIntensity: 0.14 },
            };

            let sectionThemeScore = null;

            function startStringLayer(theme) {
                if (!audioCtx) return;
                stopStringAmbient();
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const stringType = theme.stringLayer || 'soft_pad';
                const freq = theme.stringFreq || 50;
                const intensity = theme.stringIntensity || 0.2;
                const duration = 999;
                const allNodes = [];

                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 2);

                if (stringType === 'cello') {
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 280;
                    filter.Q.value = 3;
                    for (let i = 0; i < 3; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = 'triangle';
                        osc.frequency.value = freq * (1 + (i - 1) * 0.006);
                        const vib = ctx.createOscillator();
                        vib.type = 'sine';
                        vib.frequency.value = 2 + i;
                        const vibG = ctx.createGain();
                        vibG.gain.value = 2.5;
                        vib.connect(vibG);
                        vibG.connect(osc.frequency);
                        allNodes.push(osc, vib);
                        osc.connect(filter);
                    }
                    filter.connect(gainNode);
                } else if (stringType === 'cluster') {
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 400;
                    filter.Q.value = 1.5;
                    const clusterFreqs = [freq * 0.98, freq, freq * 1.015, freq * 1.03, freq * 1.05];
                    clusterFreqs.forEach(f => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = f;
                        const mlfo = ctx.createOscillator();
                        mlfo.type = 'sine';
                        mlfo.frequency.value = 0.25 + Math.random() * 0.5;
                        const mg = ctx.createGain();
                        mg.gain.value = 1.5;
                        mlfo.connect(mg);
                        mg.connect(osc.frequency);
                        allNodes.push(osc, mlfo);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                } else if (stringType === 'swell') {
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 350;
                    filter.Q.value = 2;
                    const intervals = [0, 4, 7, 12, 19];
                    intervals.forEach(interval => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = freq * Math.pow(2, interval / 12);
                        allNodes.push(osc);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                } else {
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 550;
                    filter.Q.value = 2;
                    for (let i = 0; i < 6; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = i < 3 ? 'triangle' : 'sawtooth';
                        osc.frequency.value = freq * (1 + (i - 2.5) * 0.007);
                        const vib = ctx.createOscillator();
                        vib.type = 'sine';
                        vib.frequency.value = 3.5 + i * 0.8;
                        const vibG = ctx.createGain();
                        vibG.gain.value = 2 + i * 0.5;
                        vib.connect(vibG);
                        vibG.connect(osc.frequency);
                        allNodes.push(osc, vib);
                        osc.connect(filter);
                    }
                    filter.connect(gainNode);
                }

                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.6;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);

                allNodes.forEach(n => { n.start(now); });
                stringAmbientActive = {
                    nodes: allNodes,
                    gainNode: gainNode,
                    wetSend: wetSend,
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 1);
                        allNodes.forEach(n => { try { n.stop(ctx.currentTime + 1.2); } catch (e) {} });
                    }
                };
            }

            function stopStringAmbient() {
                if (stringAmbientActive) {
                    stringAmbientActive.stop();
                    stringAmbientActive = null;
                }
            }

            function startLynchAmbient(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                const theme = LYNCH_AMBIENT[themeName] || LYNCH_AMBIENT.intro;
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(theme.intensity * 0.2, now + 1.5);
                const oscs = [];
                for (let i = 0; i < 3; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i === 0 ? 'sawtooth' : i === 1 ? 'triangle' : 'sawtooth';
                    const detune = (i - 1) * theme.detuneSpread;
                    osc.frequency.value = theme.rootFreq * Math.pow(2, detune / 1200);
                    oscs.push(osc);
                }
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = theme.filterBase;
                filter.Q.value = 2.5;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = theme.lfoRate;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 80;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                oscs.forEach(o => o.connect(filter));
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.55;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain);
                gainNode.connect(dryGain);
                oscs.forEach(o => o.start(now));
                lfo.start(now);
                if (theme.noiseMix > 0) {
                    const bufferSize = ctx.sampleRate * 2;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * theme.noiseMix;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    noise.loop = true;
                    const noiseFilter = ctx.createBiquadFilter();
                    noiseFilter.type = 'lowpass';
                    noiseFilter.frequency.value = theme.filterBase * 0.7;
                    noiseFilter.Q.value = 0.3;
                    const noiseGain = ctx.createGain();
                    noiseGain.gain.value = theme.noiseMix * 0.3;
                    noise.connect(noiseFilter);
                    noiseFilter.connect(noiseGain);
                    noiseGain.connect(gainNode);
                    noise.start(now);
                    oscs.push(noise);
                }
                sectionAmbientActive = {
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.6);
                        oscs.forEach(s => { try { s.stop(ctx.currentTime + 0.8); } catch (e) {} });
                        try { lfo.stop(ctx.currentTime + 0.8); } catch (e) {}
                        sectionAmbientActive = null;
                    }
                };
                startStringLayer(theme);

                // Start evolving pattern player for this section
                startEvolvingPatternPlayer(themeName, 40, sectionThemeScore);
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 25000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) { const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`); }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') throw new Error(
                        'Request timed out. Please try again – the AI may be under heavy load.');
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', 1980s small town America, rural noir, grainy VHS, muted colors, ominous')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) { try { return await generateImage(prompt); } catch (e) { lastError =

                throw lastError || new Error('Image generation failed');

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) { element.textContent += text.charAt(i); if (onChar) onChar(
                            i);
                            i++; } else { clearInterval(timer);
                            resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David',
                    'Fred', 'Alex', 'Thomas', 'James'
                ];
                let voice = null;
                for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.62;
                utterance.pitch = 0.9;
                speechSynthesis.speak(utterance);
            }

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice)
                            break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.62;
                    utterance.pitch = voiceConfig.pitch || 0.9;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) { currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar); if (cueChecker)
                            cueChecker(currentChar); }
                    };
                    utterance.onend = () => { element.textContent = text; if (cueChecker) cueChecker(text
                            .length);
                        resolve(); };
                    utterance.onerror = (e) => { console.warn('TTS error:', e);
                        element.textContent = text;
                        resolve(); };
                    speechSynthesis.speak(utterance);
                });
            }
