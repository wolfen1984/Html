<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>NIGHTFALLS VHS · Horror Tape Collection · 1985</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080c;
            --screen-bg: #0c0c10;
            --panel-bg: #0e0e16;
            --text: #c8c8c8;
            --text-dim: #7a7a7a;
            --text-bright: #f0ece4;
            --accent: #ff2a4a;
            --accent-dim: #99111f;
            --border: #ff2a4a;
            --border-glow: 0 0 12px #ff003c66, 0 0 28px #ff003c22;
            --danger: #e82233;
            --danger-glow: 0 0 10px #e8223344;
            --amber: #ffaa22;
            --amber-dim: #885500;
            --green: #33cc55;
            --input-bg: #16161e;
            --button-bg: #1a1a20;
            --button-hover: #24202c;
            --button-active: #2a1018;
            --bevel-light: #2a2a35;
            --bevel-dark: #060608;
            --font-display: 'Creepster', 'Nosifer', cursive;
            --font-title: 'Nosifer', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --font-body: 'VT323', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 32px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0d0d18 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }

        .monitor-bezel {
            width: 100%;
            max-width: 520px;
            height: 100vh;
            height: 100dvh;
            max-height: 900px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2a2a2a, 0 0 0 4px #111111, 0 0 0 8px #0a0a0a, 0 8px 40px #000000cc;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (max-width: 520px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                max-height: 100dvh;
                box-shadow: none;
                background: #0a0a0a;
            }
        }

        .power-led {
            position: absolute;
            bottom: 16px;
            right: 20px;
            width: 8px;
            height: 8px;
            background: #33ff44;
            border-radius: 50%;
            box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433;
            animation: powerGlow 2s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%, 100% { box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433; }
            50% { box-shadow: 0 0 14px #33ff44aa, 0 0 24px #33ff4455; }
        }

        .brand-label {
            position: absolute;
            bottom: 14px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #333;
            letter-spacing: 2px;
            z-index: 20;
            text-transform: uppercase;
        }

        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 4px;
            border: 3px solid #ff2a4a;
            box-shadow: var(--border-glow), inset 0 0 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 520px) { .game-shell { border-radius: 0; border-width: 2px; } }

        .screen-curve {
            position: absolute; inset: 0; pointer-events: none; z-index: 899;
            border-radius: 2px; box-shadow: inset 0 0 60px rgba(0,0,0,0.7), inset 0 0 10px rgba(0,0,0,0.5);
        }

        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,var(--scanline-opacity)) 0px, rgba(0,0,0,var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 2px;
        }
        .crt-overlay::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%); border-radius: 2px;
        }

        .screen-flicker { animation: crtFlicker 8s ease-in-out infinite; }
        @keyframes crtFlicker { 0%,99.4%,100%{opacity:1;} 99.5%{opacity:0.6;} 99.6%{opacity:0.9;} 99.7%{opacity:0.5;} 99.8%{opacity:1;} }

        .marquee {
            position: relative; z-index: 10; background: #0c0406; border-bottom: 3px solid #ff2a4a;
            padding: 10px 16px; text-align: center; font-family: var(--font-display); letter-spacing: 2px;
            box-shadow: 0 2px 16px #00000088, inset 0 1px 0 #2a0c0c; flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #ff2a4a; border-radius: 3px; padding: 10px 14px; background: #080206;
            position: relative; box-shadow: inset 0 0 20px #ff003c11;
        }
        .marquee-inner::before {
            content: ''; position: absolute; top: -2px; left: 20px; right: 20px; height: 2px;
            background: #ff2a4a; box-shadow: 0 0 10px #c41e3a66;
        }
        .marquee-title {
            font-size: var(--text-size-title); color: #e8c5b0; text-shadow: 0 0 14px #c41e3a88, 0 2px 4px #000;
            letter-spacing: 3px; font-family: var(--font-title); line-height: 1.2;
        }
        @media (max-width: 400px) { .marquee-title { font-size: 22px; letter-spacing: 1px; } }

        .status-strip {
            display: flex; justify-content: space-around; padding: 8px 10px; background: #08080e;
            border-bottom: 1px solid #ff2a4a66; z-index: 10; font-family: var(--font-mono);
            font-size: var(--text-size-sm); color: var(--text-dim); letter-spacing: 1px; flex-shrink: 0; flex-wrap: wrap; gap: 4px;
        }
        .status-item { display: flex; align-items: center; gap: 4px; white-space: nowrap; padding: 2px 6px; background: #0e0e16; border: 1px solid #1a1a25; border-radius: 2px; min-height: var(--touch-target); align-items: center; }
        .status-val { color: var(--text-bright); font-weight: bold; font-size: var(--text-size-base); }
        .status-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }

        .tabs-row {
            display: flex; background: #08080e; border-bottom: 2px solid #ff2a4a; z-index: 10;
            flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; gap: 0;
        }
        .tabs-row::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 1 0 auto; min-width: 60px; text-align: center; padding: 8px 4px;
            font-family: var(--font-body); font-size: 13px; color: #b08080; cursor: pointer;
            border-bottom: 4px solid transparent; background: transparent; white-space: nowrap;
            letter-spacing: 1px; transition: all 0.15s; min-height: var(--btn-min-height);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 2px; line-height: 1.2;
        }
        .tab-btn.active { color: #f0ddd0; border-bottom-color: #ff2a4a; text-shadow: 0 0 10px #c41e3a88; background: #0c0610; box-shadow: inset 0 -4px 12px #ff003c18; }
        .tab-btn:hover { color: #d4b8a8; background: #0a0810; }
        .tab-emoji { font-size: 16px; line-height: 1; }
        .tab-label { font-size: 11px; line-height: 1.2; }

        .game-area {
            flex: 1; overflow-y: auto; overflow-x: hidden; z-index: 5; scrollbar-width: thin;
            scrollbar-color: #2a0f15 #08080e; display: flex; flex-direction: column; padding: 4px 0;
        }
        .game-area::-webkit-scrollbar { width: 5px; } .game-area::-webkit-scrollbar-track { background: #08080e; } .game-area::-webkit-scrollbar-thumb { background: #2a0f15; border-radius: 3px; }

        .panel { display: none; flex-direction: column; padding: 10px; gap: 10px; flex: 1; }
        .panel.active { display: flex; }

        .btn {
            background: var(--button-bg); border: 2px solid #2a2a35; border-top-color: #3a3a48; border-left-color: #353540;
            border-right-color: #1a1a25; border-bottom-color: #111118; padding: 12px 18px; border-radius: 3px;
            color: var(--text); cursor: pointer; font-family: var(--font-body); font-size: var(--text-size-base);
            letter-spacing: 1px; text-transform: uppercase; transition: all 0.1s; min-height: var(--btn-min-height);
            display: inline-flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 2px 0 #00000044; white-space: nowrap;
        }
        .btn:active { border-top-color: #1a1a25; border-left-color: #1a1a25; border-bottom-color: #3a3a48; border-right-color: #353540; box-shadow: 0 0px 0 #00000044; transform: translateY(1px); background: #14141c; }
        .btn.accent { background: #180a10; border-color: #5c1525; border-top-color: #7a2035; border-left-color: #6a1a2a; border-right-color: #3a0f18; border-bottom-color: #200810; color: #e8a090; box-shadow: 0 2px 0 #00000044, 0 0 8px #c41e3a22; }
        .btn.accent:active { border-top-color: #3a0f18; border-left-color: #3a0f18; border-bottom-color: #7a2035; border-right-color: #6a1a2a; box-shadow: 0 0px 0 #00000044, 0 0 14px #c41e3a44; }
        .btn.danger { background: #180a0c; border-color: #441111; border-top-color: #5a1a1a; border-left-color: #4a1515; border-right-color: #2a0a0a; border-bottom-color: #150505; color: #ff7777; box-shadow: 0 2px 0 #00000044; }
        .btn.danger:active { border-top-color: #2a0a0a; border-left-color: #2a0a0a; border-bottom-color: #5a1a1a; border-right-color: #4a1515; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

        .movie-card {
            background: #0e0e16; border: 2px solid #1a1a25; border-radius: 4px; padding: 12px; display: flex;
            gap: 12px; align-items: flex-start; flex-shrink: 0;
        }
        .poster-thumb { width: 65px; height: 88px; border-radius: 3px; background: #0a0a14; border: 2px solid #1a1a28; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #c41e3a; }
        .poster-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .movie-info { flex: 1; min-width: 0; }
        .movie-title { font-family: var(--font-display); font-size: 17px; color: #e8c5b0; text-shadow: 0 0 6px #c41e3a22; letter-spacing: 1px; line-height: 1.2; }
        .movie-meta { font-size: 12px; color: #7a6a6a; font-family: var(--font-mono); margin-top: 2px; }
        .star-rating { color: #c41e3a; letter-spacing: 2px; font-size: 14px; }
        .movie-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; min-width: 80px; }
        .movie-actions .btn { font-size: 14px; padding: 8px 10px; min-height: 36px; }

        .empty-state { color: #4a3a3a; text-align: center; padding: 20px; font-size: var(--text-size-base); border: 1px dashed #1a1520; border-radius: 4px; margin: 8px 0; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.94); align-items: center; justify-content: center; padding: 12px; }
        .modal-content { background: #0e0e16; border-radius: 6px; width: 100%; max-width: 420px; padding: 20px; text-align: center; border: 3px solid #ff2a4a; box-shadow: var(--border-glow), 0 0 80px #000000dd; color: #d4c5b2; max-height: 85vh; overflow-y: auto; font-size: var(--text-size-base); }
        .modal-btn { background: #1a1a20; border: 2px solid #ff2a4a66; padding: 10px 18px; border-radius: 3px; margin: 5px; cursor: pointer; color: #d4c5b2; font-family: var(--font-body); font-size: var(--text-size-base); letter-spacing: 1px; min-height: var(--btn-min-height); }
        .modal-btn:active { border-color: #ff003c; box-shadow: 0 0 12px #c41e3a44; }

        .chat-log { max-height: 200px; overflow-y: auto; text-align: left; margin-bottom: 10px; border: 1px solid #1a1520; border-radius: 4px; padding: 10px; background: #0a0a12; font-size: var(--text-size-base); line-height: 1.5; }
        .chat-msg { margin: 8px 0; font-size: 16px; line-height: 1.4; }
        .chat-msg.user { color: #e8a090; } .chat-msg.assistant { color: #d4c5b2; }
        .chat-input-row { display: flex; gap: 8px; }
        .chat-input-row input { flex: 1; background: var(--input-bg); border: 2px solid #2a2a35; border-radius: 3px; padding: 10px 12px; color: var(--text); font-family: var(--font-body); font-size: var(--text-size-base); min-height: var(--btn-min-height); -webkit-user-select: text; user-select: text; }

        .tv-stage { display: flex; align-items: flex-start; gap: 15px; background: #0a0a14; border: 2px solid #2a0f15; padding: 15px; border-radius: 4px; }
        .elvira-portrait { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #ff2a4a; box-shadow: 0 0 20px #c41e3a66; object-fit: cover; flex-shrink: 0; }
        .speech-bubble { flex: 1; background: #12121c; border: 2px solid #ff2a4a88; border-radius: 8px; padding: 12px; position: relative; color: #e8c5b0; font-size: 17px; min-height: 80px; }
        .speech-bubble::before { content: ''; position: absolute; left: -12px; top: 20px; border-width: 8px 12px 8px 0; border-style: solid; border-color: transparent #ff2a4a88 transparent transparent; }
        .tv-guide { margin-top: 15px; border-top: 2px solid #ff2a4a44; padding-top: 10px; }
        .tv-guide h3 { font-family: var(--font-display); color: #e8c5b0; letter-spacing: 2px; margin-bottom: 8px; }
        .guide-entry { display: flex; justify-content: space-between; align-items: center; background: #0e0e16; border: 1px solid #1a1520; padding: 10px; margin-bottom: 6px; border-radius: 3px; }
        .guide-time { font-family: var(--font-mono); font-size: 14px; color: #c41e3a; min-width: 50px; }
        .guide-info { flex: 1; margin: 0 10px; }
        .guide-title { font-size: 16px; color: #e8c5b0; }
        .guide-desc { font-size: 18px; color: #7a6a6a; }
        .guide-btn { padding: 6px 12px; font-size: 14px; min-height: 32px; }

        .radio-tuner { background: #0a0a12; border: 2px solid #2a0f15; border-radius: 8px; padding: 15px; margin: 10px 0; text-align: center; }
        .radio-dial { font-size: 60px; line-height: 1; animation: dialGlow 2s infinite alternate; }
        @keyframes dialGlow { from { text-shadow: 0 0 8px var(--amber); } to { text-shadow: 0 0 20px var(--amber), 0 0 30px var(--amber-dim); } }
        .frequency-display { font-family: var(--font-mono); font-size: 20px; color: var(--amber); letter-spacing: 2px; }
        .signal-meter { font-family: var(--font-mono); color: var(--text-dim); margin-top: 5px; }
        .signal-strength { color: var(--amber); background: #1a1a25; padding: 2px 8px; border-radius: 10px; }
        .now-playing-box { background: #0a0a12; border: 1px solid #ff2a4a44; border-radius: 5px; padding: 12px; margin: 12px 0; text-align: left; }
        .now-playing-title { color: #e8c5b0; font-family: var(--font-display); font-size: 18px; }
        .now-playing-author { color: #7a6a6a; font-size: 14px; font-style: italic; }
        .story-archive { margin-top: 15px; border-top: 2px solid #2a0f15; padding-top: 10px; }
        .archive-item { display: flex; justify-content: space-between; align-items: center; background: #0e0e16; border: 1px solid #1a1520; padding: 8px 10px; margin-bottom: 5px; border-radius: 3px; }
        .archive-title { color: #e8c5b0; }
        .archive-author { color: #7a6a6a; font-size: 14px; }
        .radio-controls { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        .loading-text { color: var(--amber); font-style: italic; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
<div class="monitor-bezel">
    <div class="brand-label">NIGHTFALLS VHS · CRT-85</div>
    <div class="power-led"></div>
    <div class="game-shell screen-flicker">
        <div class="screen-curve"></div>
        <div class="crt-overlay"></div>
        <div class="marquee"><div class="marquee-inner"><div class="marquee-title">NIGHTFALLS VHS</div></div></div>
        <div class="status-strip">
            <span class="status-item">💰 <span class="status-val" id="statCash">$500</span></span>
            <span class="status-item">📼 <span class="status-val" id="statTapes">0</span></span>
        </div>
        <div class="tabs-row">
            <div class="tab-btn active" data-tab="collection"><span class="tab-emoji">📼</span><span class="tab-label">COLLECTION</span></div>
            <div class="tab-btn" data-tab="collectors"><span class="tab-emoji">📇</span><span class="tab-label">COLLECTORS</span></div>
            <div class="tab-btn" data-tab="messages"><span class="tab-emoji">💬</span><span class="tab-label">MESSAGES</span></div>
            <div class="tab-btn" data-tab="dub"><span class="tab-emoji">🎞️</span><span class="tab-label">DUB TAPE</span></div>
            <div class="tab-btn" data-tab="channel13"><span class="tab-emoji">📺</span><span class="tab-label">CH 13</span></div>
            <div class="tab-btn" data-tab="radio"><span class="tab-emoji">📻</span><span class="tab-label">RADIO</span></div>
        </div>
        <div class="game-area">
            <div id="collectionPanel" class="panel active"></div>
            <div id="collectorsPanel" class="panel"></div>
            <div id="messagesPanel" class="panel"></div>
            <div id="dubPanel" class="panel"></div>
            <div id="channel13Panel" class="panel"></div>
            <div id="radioPanel" class="panel"></div>
        </div>
        <div class="footer-strip" style="display:flex; justify-content:space-between; align-items:center; padding:6px 12px; background:#08080e; border-top:1px solid #ff2a4a66; z-index:10; font-family:var(--font-mono); font-size:11px; color:#444; flex-shrink:0;">
            <span id="footerMsg">📼 NIGHTFALLS VHS · COLLECT THE DARKNESS</span>
            <button id="resetApiBtn" style="background:none; border:1px solid #222; color:#555; font-size:10px; cursor:pointer; padding:4px 8px;">🔑 API KEY</button>
        </div>
    </div>
</div>
<div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

<script>
(function() {
    const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
    const MODEL = 'mistral-small-latest';
    let apiKey = localStorage.getItem('nightfalls_vhs_key') || '';

    const DEFAULT_STATE = {
        cash: 500,
        collection: [],
        npcs: [],
        messages: [],
        imageCooldownUntil: 0,
        npcGenCooldown: 0,
        elviraImage: null,
        tvGuideEpisodes: [],
        radioStories: [],
        radioLastGeneratedDate: null
    };
    let gameState = { ...DEFAULT_STATE };

    let currentRadioStoryId = null;
    let radioUtterances = [];
    let radioIsPlaying = false;

    const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[m]);

    function saveState() { try { localStorage.setItem('nightfalls_vhs_state', JSON.stringify(gameState)); } catch(e){} }
    function loadState() {
        try {
            const saved = localStorage.getItem('nightfalls_vhs_state');
            if (saved) gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
        } catch(e){}
    }

    async function mistralChat(msgs, maxTok=500) {
        if (!apiKey) throw new Error('API key missing');
        const res = await fetch(MISTRAL_ENDPOINT, {
            method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
            body: JSON.stringify({model:MODEL, messages:msgs, temperature:0.9, max_tokens:maxTok})
        });
        if (!res.ok) throw new Error('API '+res.status);
        const data = await res.json();
        return data.choices[0].message.content.trim();
    }

    async function generateImage(prompt) {
        const now = Date.now();
        if (now < gameState.imageCooldownUntil) await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt+', vintage 80s horror VHS cover art')}?width=512&height=640&seed=${Date.now()}`;
        const img = new Image();
        const result = await new Promise(resolve => {
            let done = false;
            img.onload = () => { if(!done){done=true; resolve(url);} };
            img.onerror = () => { if(!done){done=true; resolve(null);} };
            img.src = url;
        });
        gameState.imageCooldownUntil = Date.now() + 30000;
        saveState();
        return result;
    }

    async function generateImageWithRetry(prompt, retries=2) {
        for (let i = 0; i < retries; i++) {
            const url = await generateImage(prompt);
            if (url) return url;
            await new Promise(r => setTimeout(r, 20));
        }
        return null;
    }

    async function generateMovie() {
        const resp = await mistralChat([{role:'user', content:'Generate a terrifying 80s cult horror movie concept as valid JSON. Fields: title, genre, tagline, synopsis, quality(1-5). JSON only.'}], 800);
        const data = JSON.parse(resp.replace(/```json|```/g,'').trim());
        return {
            title: String(data.title ?? 'Untitled'),
            genre: String(data.genre ?? 'Unknown'),
            tagline: String(data.tagline ?? ''),
            synopsis: String(data.synopsis ?? ''),
            quality: Math.min(5, Math.max(1, Number(data.quality) || 3))
        };
    }

    function addToCollection(movie) {
        movie.id = 'm_'+Date.now()+'_'+Math.random().toString(36);
        movie.posterUrl = null;
        gameState.collection.push(movie);
        saveState();
    }

    function removeFromCollection(id) {
        gameState.collection = gameState.collection.filter(m => m.id !== id);
        saveState();
    }

    const coverQueue = [];
    let coverQueueRunning = false;
    function processNextCover() {
        if (coverQueue.length === 0) { coverQueueRunning = false; return; }
        const { tape } = coverQueue.shift();
        setTimeout(async () => {
            try {
                const url = await generateImageWithRetry(`Horror VHS cover for "${tape.title}", ${tape.genre}`);
                if (url) { tape.posterUrl = url; tape._coverPending = false; saveState(); refreshAll(); }
            } catch (e) {}
            setTimeout(() => processNextCover(), 20);
        }, 20);
    }
    function requestCover(tape) {
        coverQueue.push({ tape });
        tape._coverPending = true;
        refreshAll();
        if (!coverQueueRunning) { coverQueueRunning = true; processNextCover(); }
    }

    async function generateNPC() {
        const prompt = `Create a quirky 1980s horror VHS collector. Return JSON: name, personality (one sentence), and an array "tapes" of 2-4 horror movies they own. Each tape must have title, genre, tagline, synopsis, quality(1-5). JSON only.`;
        const resp = await mistralChat([{role:'user', content:prompt}], 800);
        const data = JSON.parse(resp.replace(/```json|```/g,'').trim());
        const npc = {
            id: 'npc_'+Date.now()+'_'+Math.random().toString(36),
            name: data.name,
            personality: data.personality,
            tapes: (data.tapes||[]).map(t => ({...t, id:'t_'+Date.now()+'_'+Math.random().toString(36), posterUrl:null}))
        };
        gameState.npcs.push(npc);
        saveState();
        return npc;
    }

    function addMessage(msg) {
        msg.id = 'msg_'+Date.now();
        msg.timestamp = Date.now();
        gameState.messages.push(msg);
        saveState();
    }

    function sellTape(tape) {
        const price = tape.quality * 50;
        gameState.cash += price;
        removeFromCollection(tape.id);
        refreshAll();
        showModal(`<h2>💰 Tape Sold</h2><p>You sold "${esc(tape.title)}" for $${price}.</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
    }

    async function initiateTrade(npc, npcTape) {
        if (gameState.collection.length === 0) {
            showModal('<h2>📼 No Tapes</h2><p>You have nothing to offer.</p><button class="modal-btn" onclick="closeModal()">OK</button>');
            return;
        }
        let html = `<h2>🤝 Offer Trade to ${esc(npc.name)}</h2><p>Select one of your tapes to trade for "${esc(npcTape.title)}":</p>`;
        gameState.collection.forEach(m => {
            html += `<button class="modal-btn" style="display:block;width:100%;text-align:left;" data-player-tape="${m.id}">${esc(m.title)} (💀${m.quality})</button>`;
        });
        html += '<button class="modal-btn" onclick="closeModal()">Cancel</button>';
        showModal(html);
        document.getElementById('genericModalContent').querySelectorAll('button[data-player-tape]').forEach(btn => {
            btn.addEventListener('click', function() {
                const playerTapeId = this.dataset.playerTape;
                closeModal();
                selectPlayerTapeForTrade(npc.id, npcTape.id, playerTapeId);
            });
        });
    }

    async function selectPlayerTapeForTrade(npcId, npcTapeId, playerTapeId) {
        const npc = gameState.npcs.find(n => n.id === npcId);
        const npcTape = npc?.tapes.find(t => t.id === npcTapeId);
        const playerTape = gameState.collection.find(m => m.id === playerTapeId);
        if (!npc || !npcTape || !playerTape) return;
        const sysPrompt = `You are ${npc.name}, a VHS collector. Personality: ${npc.personality}. You own "${npcTape.title}" (quality ${npcTape.quality}). You are offered "${playerTape.title}" (quality ${playerTape.quality}) in a 1-for-1 trade. Reply with JSON: {decision:"accept"|"reject"|"counter", message:"...", counterAmount:0 (if counter)}.`;
        try {
            const resp = await mistralChat([{role:'system',content:sysPrompt},{role:'user',content:`I offer my "${playerTape.title}" for your "${npcTape.title}".`}], 300);
            const res = JSON.parse(resp.replace(/```json|```/g,'').trim());
            handleTradeDecision(npc, npcTape, playerTape, res);
        } catch(e) { showModal('<h2>Error</h2><p>Trade negotiation failed.</p><button class="modal-btn" onclick="closeModal()">OK</button>'); }
    }

    function handleTradeDecision(npc, npcTape, playerTape, decision) {
        if (decision.decision === 'accept') {
            const newTape = {...npcTape, id: playerTape.id, posterUrl: null};
            const oldTape = {...playerTape, id: npcTape.id, posterUrl: null};
            gameState.collection = gameState.collection.filter(m => m.id !== playerTape.id);
            npc.tapes = npc.tapes.filter(t => t.id !== npcTape.id);
            gameState.collection.push(newTape);
            npc.tapes.push(oldTape);
            saveState(); refreshAll();
            showModal(`<h2>✅ Trade Accepted</h2><p>${esc(npc.name)}: "${esc(decision.message)}"</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
            requestCover(newTape);
            maybePassiveOffer(npc);
        } else if (decision.decision === 'counter' && decision.counterAmount && gameState.cash >= decision.counterAmount) {
            showModal(`<h2>💵 Counter Offer</h2><p>${esc(npc.name)} wants an extra $${decision.counterAmount} for "${esc(npcTape.title)}".</p><p>${esc(decision.message)}</p>
                <button class="modal-btn" id="acceptCounter">Pay $${decision.counterAmount}</button><button class="modal-btn" onclick="closeModal()">Decline</button>`);
            document.getElementById('acceptCounter').onclick = ()=>{
                gameState.cash -= decision.counterAmount;
                const newTape = {...npcTape, id: playerTape.id, posterUrl: null};
                const oldTape = {...playerTape, id: npcTape.id, posterUrl: null};
                gameState.collection = gameState.collection.filter(m => m.id !== playerTape.id);
                npc.tapes = npc.tapes.filter(t => t.id !== npcTape.id);
                gameState.collection.push(newTape);
                npc.tapes.push(oldTape);
                saveState(); closeModal(); refreshAll();
                requestCover(newTape);
                maybePassiveOffer(npc);
            };
        } else {
            showModal(`<h2>❌ Trade Rejected</h2><p>${esc(npc.name)}: "${esc(decision.message)}"</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
        }
    }

    function maybePassiveOffer(npc) {
        if (Math.random() < 0.5 && gameState.collection.length > 0) {
            const randomTape = gameState.collection[Math.floor(Math.random()*gameState.collection.length)];
            const offerPrice = randomTape.quality * 40 + Math.floor(Math.random()*50);
            addMessage({
                from: npc.name, npcId: npc.id, type: 'buy_offer', tapeId: randomTape.id,
                tapeTitle: randomTape.title, offerPrice,
                text: `Hey, I'd love to add "${randomTape.title}" to my collection. Would you sell it for $${offerPrice}?`
            });
        }
    }

    function generatePassiveOfferRandom() {
        if (gameState.npcs.length === 0 || gameState.collection.length === 0) return;
        const npc = gameState.npcs[Math.floor(Math.random()*gameState.npcs.length)];
        maybePassiveOffer(npc);
    }

    function acceptBuyOffer(msgId) {
        const msg = gameState.messages.find(m => m.id === msgId);
        if (!msg) return;
        const tape = gameState.collection.find(m => m.id === msg.tapeId);
        if (!tape) return;
        gameState.cash += msg.offerPrice;
        removeFromCollection(tape.id);
        gameState.messages = gameState.messages.filter(m => m.id !== msgId);
        saveState(); refreshAll();
        showModal(`<h2>💰 Sold!</h2><p>You sold "${esc(tape.title)}" to ${esc(msg.from)} for $${msg.offerPrice}.</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
    }

    function declineMessage(msgId) {
        gameState.messages = gameState.messages.filter(m => m.id !== msgId);
        saveState(); refreshAll();
    }

    async function generateTrailerScript(movie) {
        const prompt = `Create a short 3-scene terrifying audio trailer for the 80s horror movie "${movie.title}". Genre: ${movie.genre}. Tagline: "${movie.tagline}". Synopsis: ${movie.synopsis}. Return a JSON array of 3 objects, each with "narration" and "imagePrompt". JSON only.`;
        const resp = await mistralChat([{role:'user', content:prompt}], 500);
        return JSON.parse(resp.replace(/```json|```/g,'').trim());
    }

    function playAudioTrailer(movie) {
        speechSynthesis.cancel();
        if (movie.trailerScript && movie.trailerImages && movie.trailerImages.length >= movie.trailerScript.length) {
            startAudioTrailerPlayback(movie);
            return;
        }
        const modalContent = document.getElementById('genericModalContent');
        modalContent.innerHTML = `
            <div class="please-stand-by" style="text-align:center; padding:20px;">
                <div style="font-family:'VT323'; font-size:24px; color:#c41e3a; letter-spacing:4px;">SIGNAL INTERRUPTED</div>
                <div class="test-pattern-bars" style="display:flex; height:50px; margin:16px 0; border-radius:3px; overflow:hidden; opacity:0.75;">
                    <span style="flex:1; background:#bbb;"></span><span style="flex:1; background:#cc4;"></span><span style="flex:1; background:#4aa;"></span><span style="flex:1; background:#4a4;"></span><span style="flex:1; background:#a4a;"></span><span style="flex:1; background:#a33;"></span><span style="flex:1; background:#228;"></span>
                </div>
                <div class="hype-bar" style="width:80%; margin: 0 auto;"><div class="hype-fill" id="trailerLoadBar" style="width:0%; transition:width 0.3s;"></div></div>
                <p id="trailerStatusText" style="color:#e8a090; font-family:'Share Tech Mono'; margin-top:12px; font-size:14px;">🎞️ DEVELOPING FOOTAGE...</p>
                <p style="color:#4a2828; font-size:11px; margin-top:8px;">DO NOT ADJUST YOUR SET</p>
            </div>`;
        document.getElementById('genericModal').style.display = 'flex';

        function loadImagesRecursive(script, index, collected, callback) {
            if (index >= script.length) { callback(collected); return; }
            document.getElementById('trailerStatusText').textContent = `Developing scene ${index + 1} of ${script.length}…`;
            setTimeout(async () => {
                let url = null;
                try { url = await generateImageWithRetry(script[index].imagePrompt); } catch (e) {}
                collected.push(url || movie.posterUrl || '');
                const loadBar = document.getElementById('trailerLoadBar');
                if (loadBar) loadBar.style.width = Math.round((collected.length / script.length) * 100) + '%';
                loadImagesRecursive(script, index + 1, collected, callback);
            }, 20);
        }

        (async () => {
            let script;
            try {
                script = await generateTrailerScript(movie);
                movie.trailerScript = script;
            } catch (e) {
                const sentences = movie.synopsis.split(/[.!?]+/).filter(s => s.trim().length > 0);
                script = [];
                for (let i = 0; i < 3; i++) script.push({ narration: sentences[i] ? sentences[i].trim() : "Coming soon to Nightfalls Cinema...", imagePrompt: `horror scene from ${movie.title}, 80s VHS style, dark` });
                movie.trailerScript = script;
            }
            loadImagesRecursive(script, 0, [], (images) => { movie.trailerImages = images; saveState(); startAudioTrailerPlayback(movie); });
        })();
    }

    function startAudioTrailerPlayback(movie) {
        const scenes = movie.trailerScript, images = movie.trailerImages;
        let currentScene = 0, isPaused = false, projectorNodes = null, projectorAudioCtx = null;
        const modalContent = document.getElementById('genericModalContent');
        modalContent.innerHTML = `
            <div class="trailer-theater" style="position:relative; background:#000; border:6px solid #ff2a4a; border-radius:3px; box-shadow:inset 0 0 120px rgba(0,0,0,0.9), 0 0 50px #c41e3a22, 0 0 0 3px #200;">
                <div class="trailer-curtain-top" style="position:absolute; top:-6px; left:-10px; right:-10px; height:55px; background:linear-gradient(180deg, #2a0808 0%, #4a1212 40%, #6b1a1a 70%, transparent 100%); z-index:5; box-shadow:0 8px 30px rgba(0,0,0,0.75);"></div>
                <div class="trailer-curtain-bottom" style="position:absolute; bottom:-6px; left:-10px; right:-10px; height:55px; background:linear-gradient(0deg, #2a0808 0%, #4a1212 40%, #6b1a1a 70%, transparent 100%); z-index:5; box-shadow:0 -8px 30px rgba(0,0,0,0.75);"></div>
                <div class="trailer-screen-vignette" style="position:absolute; top:0; left:0; right:0; bottom:0; background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.9) 100%); pointer-events:none; z-index:2;"></div>
                <div id="trailerImgContainer" style="position:relative; z-index:1;"><img id="trailerImg" src="${images[0]}" alt="" style="width:100%; max-height:50vh; object-fit:contain; display:block;"></div>
                <div style="position:relative; z-index:4; padding:12px; background:linear-gradient(180deg, transparent, rgba(0,0,0,0.85));">
                    <p id="trailerSub" style="color:#e8c5b0; font-size:17px; min-height:2.5em;"></p>
                    <div class="trailer-scene-dots" id="trailerDots" style="display:flex; justify-content:center; gap:10px; margin:8px 0;">${scenes.map((_, i) => `<span class="trailer-scene-dot ${i===0?'active':''}" style="width:12px; height:12px; border-radius:50%; background:#2a0f15; border:1px solid #3a1515;"></span>`).join('')}</div>
                    <small style="color:#7a6a6a;">Scene <span id="trailerNum">1</span>/${scenes.length}</small>
                </div>
                <div style="text-align:center; padding:8px; z-index:4;"><button class="btn" id="trailerPause">⏯️ Pause</button><button class="btn" id="trailerSkip">⏭ Skip</button><button class="modal-btn" id="trailerClose">✕ Close</button></div>
            </div>`;
        document.getElementById('genericModal').style.display = 'flex';
        (function startHum() {
            projectorAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
            const osc = projectorAudioCtx.createOscillator(), gain = projectorAudioCtx.createGain();
            osc.type='sawtooth'; osc.frequency.value=55; gain.gain.value=0.02; osc.connect(gain); gain.connect(projectorAudioCtx.destination); osc.start();
            projectorNodes = { osc, gain };
        })();
        function stopHum() { if(projectorNodes){ projectorNodes.osc.stop(); } if(projectorAudioCtx) projectorAudioCtx.close(); }
        function playScene(index) {
            if (index >= scenes.length) { stopHum(); showModal(`<h2>🔪 ${esc(movie.title)}</h2><p>🎬 END OF TRAILER</p><button class="modal-btn" onclick="closeModal()">Close</button>`); return; }
            document.getElementById('trailerImg').src = images[index] || '';
            document.getElementById('trailerSub').textContent = scenes[index].narration;
            document.querySelectorAll('.trailer-scene-dot').forEach((d,i) => { d.classList.toggle('active', i===index); d.classList.toggle('done', i<index); });
            document.getElementById('trailerNum').textContent = index+1;
            if (!isPaused) {
                const u = new SpeechSynthesisUtterance(scenes[index].narration);
                u.voice = speechSynthesis.getVoices().find(v=>v.name.includes('Google UK English Male')||v.name.includes('Daniel')||v.lang.startsWith('en')) || speechSynthesis.getVoices()[0];
                u.rate=0.85; u.onend = () => { currentScene++; setTimeout(()=>playScene(currentScene),500); };
                speechSynthesis.speak(u);
            }
        }
        playScene(0);
        document.getElementById('trailerPause').onclick = () => { isPaused=!isPaused; document.getElementById('trailerPause').textContent=isPaused?'▶️ Play':'⏯️ Pause'; if(isPaused) speechSynthesis.pause(); else speechSynthesis.resume(); };
        document.getElementById('trailerSkip').onclick = () => { speechSynthesis.cancel(); stopHum(); showModal(`<h2>🔪 ${esc(movie.title)}</h2><p>Skipped.</p><button class="modal-btn" onclick="closeModal()">Close</button>`); };
        document.getElementById('trailerClose').onclick = () => { speechSynthesis.cancel(); stopHum(); closeModal(); };
    }

    // ──── RADIO ────
    async function generateRadioStories() {
        const today = new Date().toDateString();
        if (gameState.radioLastGeneratedDate === today && gameState.radioStories.length > 0) return;
        gameState.radioStories = [];
        gameState.radioLastGeneratedDate = today;
        saveState();
        try {
            const prompt = `You are Digger Graves, host of Nightfall Radio, a 1980s late-night horror anthology radio show. Write 2 short horror radio scripts (each 400-600 words) for tonight's broadcast. Each must be a complete narrative with a beginning, rising tension, and a chilling twist. Return a JSON array of exactly 2 objects, each with fields: "title" (episode title), "author" (fictional writer), "text" (the full script, spoken-word narration style). JSON only.`;
            const resp = await mistralChat([{role:'system', content:'You are Digger Graves, the mysterious host of Nightfall Radio.'}, {role:'user', content:prompt}], 2000);
            const stories = JSON.parse(resp.replace(/```json|```/g,'').trim());
            if (Array.isArray(stories)) {
                stories.forEach((s, i) => {
                    gameState.radioStories.push({
                        id: 'radio_'+Date.now()+'_'+i,
                        title: s.title || 'Untitled Broadcast',
                        author: s.author || 'Unknown',
                        text: s.text || '... static ...'
                    });
                });
            }
        } catch (e) {
            gameState.radioStories.push({
                id: 'radio_fallback',
                title: 'The Static Between Stations',
                author: 'E. E. Cummings',
                text: 'There is nothing on the air tonight but the sound of your own heartbeat. Listen closely. It is not alone.'
            });
        }
        saveState();
    }

    function speakRadio(text, onEnd) {
        const voices = speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Google UK English Male') || v.name.includes('Daniel') || v.name.includes('Male')) || voices[0];
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.voice = voice;
        utterance.rate = 0.9;
        utterance.pitch = 0.9;
        if (onEnd) utterance.onend = onEnd;
        speechSynthesis.speak(utterance);
        radioUtterances.push(utterance);
    }

    function stopRadioPlayback() {
        speechSynthesis.cancel();
        radioUtterances = [];
        radioIsPlaying = false;
        currentRadioStoryId = null;
        refreshRadioIfActive();
    }

    function playRadioStory(storyId) {
        stopRadioPlayback();
        const story = gameState.radioStories.find(s => s.id === storyId);
        if (!story) return;
        currentRadioStoryId = storyId;
        radioIsPlaying = true;
        const sentences = story.text.match(/[^\.!\?]+[\.!\?]+|[^\.!\?]+$/g) || [story.text];
        let index = 0;
        function speakNext() {
            if (!radioIsPlaying || currentRadioStoryId !== storyId) return;
            if (index >= sentences.length) {
                radioIsPlaying = false;
                currentRadioStoryId = null;
                refreshRadioIfActive();
                return;
            }
            const sentence = sentences[index].trim();
            if (sentence) {
                speakRadio(sentence, () => {
                    index++;
                    setTimeout(speakNext, 300);
                });
            } else {
                index++;
                speakNext();
            }
        }
        refreshRadioIfActive();
        speakNext();
    }

    function refreshRadioIfActive() {
        if (document.querySelector('.tab-btn.active')?.dataset.tab === 'radio') renderRadio();
    }

    function renderRadio() {
        const panel = document.getElementById('radioPanel');
        if (!panel) return;
        const today = new Date().toDateString();
        if (gameState.radioLastGeneratedDate !== today || gameState.radioStories.length === 0) {
            panel.innerHTML = `<div style="text-align:center; padding:20px;"><div class="loading-text">📻 Tuning into the night...</div><p style="color:#7a6a6a;">Generating tonight's stories...</p><div class="blink" style="font-size:30px;">⏳</div></div>`;
            generateRadioStories().then(() => { if (document.getElementById('radioPanel')?.classList.contains('active')) renderRadio(); });
            return;
        }
        let html = `<div style="text-align:center; padding:0 10px;"><h2 style="font-family:var(--font-display); color:#e8c5b0;">📻 NIGHTFALL RADIO · 1310 AM</h2>
            <div class="radio-tuner"><div class="radio-dial">📻</div><div class="frequency-display">1310 AM</div><div class="signal-meter">Signal: <span class="signal-strength">████████░░ 78%</span></div></div>`;
        if (currentRadioStoryId && radioIsPlaying) {
            const np = gameState.radioStories.find(s => s.id === currentRadioStoryId);
            if (np) html += `<div class="now-playing-box"><div class="now-playing-title">🔊 Now Playing: ${esc(np.title)}</div><div class="now-playing-author">by ${esc(np.author)}</div><div class="blink" style="color:var(--amber);">● ON AIR</div></div>`;
        }
        html += `<div class="radio-controls">
            <button class="btn" id="radioPlayBtn" ${radioIsPlaying ? 'disabled' : ''}>▶ Play</button>
            <button class="btn" id="radioStopBtn" ${!radioIsPlaying ? 'disabled' : ''}>■ Stop</button>
            <button class="btn" id="radioReplayBtn">↻ Replay Last</button>
        </div><div class="story-archive"><h3 style="font-family:var(--font-display); color:#e8c5b0;">📜 TONIGHT'S BROADCASTS</h3>`;
        gameState.radioStories.forEach(story => {
            html += `<div class="archive-item"><div><div class="archive-title">${esc(story.title)}</div><div class="archive-author">by ${esc(story.author)}</div></div><button class="btn archive-play-btn" data-story-id="${story.id}">▶</button></div>`;
        });
        html += `</div></div>`;
        panel.innerHTML = html;
        document.getElementById('radioPlayBtn')?.addEventListener('click', () => {
            if (currentRadioStoryId && !radioIsPlaying) playRadioStory(currentRadioStoryId);
            else if (!currentRadioStoryId && gameState.radioStories.length > 0) playRadioStory(gameState.radioStories[0].id);
        });
        document.getElementById('radioStopBtn')?.addEventListener('click', stopRadioPlayback);
        document.getElementById('radioReplayBtn')?.addEventListener('click', () => {
            if (currentRadioStoryId) playRadioStory(currentRadioStoryId);
            else if (gameState.radioStories.length > 0) playRadioStory(gameState.radioStories[0].id);
        });
        document.querySelectorAll('.archive-play-btn').forEach(btn => {
            btn.addEventListener('click', () => playRadioStory(btn.dataset.storyId));
        });
    }

        const guideList = document.getElementById('guideList');
        gameState.tvGuideEpisodes.forEach(ep => {
            const entry = document.createElement('div'); entry.className = 'guide-entry';
            entry.innerHTML = `<span class="guide-time">${ep.time}</span><div class="guide-info"><div class="guide-title">${ep.title}</div><div class="guide-desc">${ep.desc}</div></div><button class="btn guide-btn" data-episode-id="${ep.id}">Tune In</button>`;
            guideList.appendChild(entry);
        });
        document.querySelectorAll('.guide-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const epId = btn.dataset.episodeId;
                const episode = gameState.tvGuideEpisodes.find(e => e.id === epId);
                if (episode) await startEpisode(episode);
            });
        });
    }

    async function startEpisode(episode) {
        speechSynthesis.cancel();
        const bubble = document.getElementById('elviraSpeechBubble'), dialogueEl = document.getElementById('elviraDialogue');
        if (!bubble || !dialogueEl) return;
        const guideList = document.getElementById('guideList');
        if (guideList) guideList.style.display = 'none';
        bubble.style.borderColor = '#ff2a4a'; bubble.style.boxShadow = '0 0 20px #c41e3a66';
        let tape = null;
        if (episode.requiresTape && gameState.collection.length > 0) tape = gameState.collection[Math.floor(Math.random() * gameState.collection.length)];

        switch (episode.type) {
            case 'crypt_picks':
                if (!tape) { dialogueEl.textContent = "Darling, you don't have any tapes! Come back when you've got something worth my time..."; break; }
                await playElviraMonologue(tape, dialogueEl); break;
            case 'the_vault': await playVaultEpisode(episode, dialogueEl); break;
            case 'trivia': await playTriviaEpisode(dialogueEl); break;
            case 'fan_mail': await playFanMailEpisode(dialogueEl); break;
            case 'special_trade':
                if (!tape) { dialogueEl.textContent = "No tapes to trade, sweetie? How dreadfully boring."; break; }
                await playSpecialTradeEpisode(tape, dialogueEl); break;
            default: dialogueEl.textContent = "We're experiencing technical difficulties... stay tuned.";
        }
        setTimeout(() => {
            if (guideList) guideList.style.display = '';
            bubble.style.borderColor = '#ff2a4a88'; bubble.style.boxShadow = 'none';
            document.querySelectorAll('.guide-btn').forEach(btn => { const nb = btn.cloneNode(true); btn.parentNode.replaceChild(nb, btn); });
            document.querySelectorAll('.guide-btn').forEach(btn => btn.addEventListener('click', async () => {
                const episode = gameState.tvGuideEpisodes.find(e => e.id === btn.dataset.episodeId);
                if (episode) await startEpisode(episode);
            }));
        }, 2000);
    }

    async function playElviraMonologue(tape, dialogueEl) {
        dialogueEl.textContent = "Let me just pull a tape from the crypt...";
        const prompt = `You are Elvira, Mistress of the Dark. Write a short monologue (3-4 sentences) about the horror movie "${tape.title}" (${tape.genre}, quality ${tape.quality} out of 5). Start with "Hello, my nocturnal darlings...", make a pun about the title or genre, and end with a suggestive sign-off. Return ONLY the monologue.`;
        try {
            const resp = await mistralChat([{role:'system', content:'You are Elvira, Mistress of the Dark.'}, {role:'user', content:prompt}], 300);
            typewriterEffect(dialogueEl, resp, 30);
            speakText(resp);
        } catch (e) { dialogueEl.textContent = `Oh, "${tape.title}"... this tape is so bad the VCR ate it! Stay sick, darlings.`; }
    }

    async function playVaultEpisode(episode, dialogueEl) {
        dialogueEl.textContent = "Welcome to The Vault... I've got something special for you tonight.";
        const price = episode.price || 200;
        try {
            const movie = await generateMovie();
            movie.quality = Math.min(5, movie.quality + 1);
            dialogueEl.innerHTML = `I'm offering "${esc(movie.title)}" (${'💀'.repeat(movie.quality)}${'🦴'.repeat(5-movie.quality)}) for only $${price}. <button class="btn" id="buyVaultTape">Buy Now</button> <button class="btn" id="declineVault">No Thanks</button>`;
            document.getElementById('buyVaultTape').onclick = () => {
                if (gameState.cash >= price) { gameState.cash -= price; addToCollection(movie); dialogueEl.textContent = "Excellent choice, darling! It's yours. Stay sick..."; requestCover(movie); refreshAll(); }
                else dialogueEl.textContent = "You can't afford it, sweetie. Come back when you've got the cash.";
                setTimeout(() => refreshAll(), 2000);
            };
            document.getElementById('declineVault').onclick = () => { dialogueEl.textContent = "Your loss, darling. Now get out of my vault."; setTimeout(() => refreshAll(), 2000); };
        } catch (e) { dialogueEl.textContent = "The vault door is jammed! Technical difficulties... stay tuned."; }
    }

    async function playTriviaEpisode(dialogueEl) {
        dialogueEl.textContent = "Time for Trivia from the Crypt... answer correctly and win a cursed tape!";
        try {
            const prompt = `You are Elvira. Generate a horror movie trivia question with 3 multiple-choice answers. Return JSON: {question, options: ["A", "B", "C"], correct: 0}. JSON only.`;
            const resp = await mistralChat([{role:'system', content:'You are Elvira.'}, {role:'user', content:prompt}], 300);
            const trivia = JSON.parse(resp.replace(/```json|```/g,'').trim());
            let html = `<p>${esc(trivia.question)}</p>`;
            trivia.options.forEach((opt, i) => html += `<button class="btn trivia-opt" data-index="${i}">${esc(opt)}</button> `);
            dialogueEl.innerHTML = html;
            document.querySelectorAll('.trivia-opt').forEach(btn => {
                btn.onclick = async () => {
                    const idx = parseInt(btn.dataset.index);
                    if (idx === trivia.correct) {
                        dialogueEl.textContent = "Correct, my darkling! Here's your prize...";
                        try { const movie = await generateMovie(); addToCollection(movie); requestCover(movie); } catch(e){}
                    } else dialogueEl.textContent = "Wrong! The crypt claims another soul. Better luck next time.";
                    refreshAll(); setTimeout(() => refreshAll(), 2000);
                };
            });
        } catch (e) { dialogueEl.textContent = "The spirits aren't cooperating tonight... try again later."; }
    }

    async function playFanMailEpisode(dialogueEl) {
        dialogueEl.textContent = "Time for Fan Mail! A viewer writes...";
        try {
            const prompt = `You are Elvira. Write a funny, short fan letter from a viewer of your horror show. Return ONLY the letter text.`;
            const resp = await mistralChat([{role:'system', content:'You are Elvira.'}, {role:'user', content:prompt}], 200);
            dialogueEl.innerHTML = `<p>"${esc(resp)}"</p><p>— A Viewer</p>`;
            speakText(resp);
        } catch (e) { dialogueEl.textContent = "Dear Elvira, why won't my VCR stop eating tapes? ...Kids these days. Stay sick!"; }
    }

    async function playSpecialTradeEpisode(tape, dialogueEl) {
        dialogueEl.textContent = "I've got a special offer for you, darling...";
        const price = Math.floor(tape.quality * 40 + Math.random() * 50);
        try {
            const movie = await generateMovie();
            dialogueEl.innerHTML = `Trade your "${esc(tape.title)}" for my "${esc(movie.title)}" (${'💀'.repeat(movie.quality)}${'🦴'.repeat(5-movie.quality)}) plus $${price}? <button class="btn" id="acceptTrade">Deal</button> <button class="btn" id="declineTrade">No Thanks</button>`;
            document.getElementById('acceptTrade').onclick = () => {
                if (gameState.cash >= price) {
                    gameState.cash -= price;
                    removeFromCollection(tape.id);
                    addToCollection(movie);
                    dialogueEl.textContent = "A wise choice! Enjoy your new nightmare...";
                    requestCover(movie);
                } else dialogueEl.textContent = "You don't have enough cash, sweetie. Maybe next time.";
                refreshAll(); setTimeout(() => refreshAll(), 2000);
            };
            document.getElementById('declineTrade').onclick = () => { dialogueEl.textContent = "Fine, keep your mouldy tape. I'll find another buyer."; setTimeout(() => refreshAll(), 2000); };
        } catch (e) { dialogueEl.textContent = "The deal fell through... static interference!"; }
    }

    function typewriterEffect(element, text, speed) {
        let i = 0; element.textContent = '';
        const timer = setInterval(() => { if(i < text.length) { element.textContent += text.charAt(i); i++; } else clearInterval(timer); }, speed);
    }

    function speakText(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Samantha') || v.name.includes('Google UK English Female') || v.name.includes('Female')) || voices[0];
        if (voice) utterance.voice = voice;
        utterance.rate = 0.9; utterance.pitch = 1.1;
        speechSynthesis.speak(utterance);
    }

    // ──── OTHER TABS ────
    function renderCollection() {
        const panel = document.getElementById('collectionPanel');
        let html = `<p style="color:#e8c5b0;text-align:center;font-family:var(--font-display);font-size:20px;">📼 YOUR VHS COLLECTION</p>`;
        if (!gameState.collection.length) html += '<div class="empty-state">No tapes yet. Generate or trade!</div>';
        else {
            gameState.collection.forEach(m => {
                const coverHtml = m.posterUrl ? `<img src="${m.posterUrl}" alt="">` : (m._coverPending ? '<span class="spinner"></span>' : '📼');
                html += `<div class="movie-card"><div class="poster-thumb">${coverHtml}</div><div class="movie-info"><div class="movie-title">${esc(m.title)}</div><div class="movie-meta">${esc(m.genre)} · <span class="star-rating">${'💀'.repeat(m.quality)}${'🦴'.repeat(5-m.quality)}</span></div></div><div class="movie-actions"><button class="btn cover-btn" data-id="${m.id}">📼 Cover</button><button class="btn info-btn" data-id="${m.id}">📜 Info</button><button class="btn trailer-btn" data-id="${m.id}">📻 Trailer</button><button class="btn danger sell-btn" data-id="${m.id}">💰 Sell</button></div></div>`;
            });
        }
        html += `<div style="display:flex;gap:8px;margin-top:10px;"><button class="btn accent" id="genMovieBtn" style="flex:1;">🎲 Generate Tape</button></div>`;
        panel.innerHTML = html;
        panel.querySelectorAll('.cover-btn').forEach(b => b.addEventListener('click', ()=>{
            const m = gameState.collection.find(m=>m.id===b.dataset.id);
            if(m) showModal(`<h2>📼 VHS COVER</h2>${m.posterUrl?`<img src="${m.posterUrl}" style="max-width:90%; max-height:55vh; border:3px solid #c41e3a;">`:'<div style="font-size:80px;">📼</div>'}<h3>${esc(m.title)}</h3><button class="modal-btn" onclick="closeModal()">Close</button>`);
        }));
        panel.querySelectorAll('.info-btn').forEach(b => b.addEventListener('click', ()=>{
            const m = gameState.collection.find(m=>m.id===b.dataset.id);
            if(m) showModal(`<h2>📜 ${esc(m.title)}</h2><p>${esc(m.genre)} · ${'💀'.repeat(m.quality)}${'🦴'.repeat(5-m.quality)}</p><p>"${esc(m.tagline||'')}"</p><p>${esc(m.synopsis)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
        }));
        panel.querySelectorAll('.trailer-btn').forEach(b => b.addEventListener('click', ()=>{ const m = gameState.collection.find(m=>m.id===b.dataset.id); if(m) playAudioTrailer(m); }));
        panel.querySelectorAll('.sell-btn').forEach(b => b.addEventListener('click', ()=>{ const m = gameState.collection.find(m=>m.id===b.dataset.id); if(m) sellTape(m); }));
        document.getElementById('genMovieBtn').addEventListener('click', async () => {
            const btn = document.getElementById('genMovieBtn'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Summoning...';
            try { const data = await generateMovie(); addToCollection(data); refreshAll(); const movie = gameState.collection.find(m => m.title === data.title && !m.posterUrl); if (movie) requestCover(movie); }
            catch(e){ showModal('<h2>❌ Error</h2><button class="modal-btn" onclick="closeModal()">OK</button>'); }
            finally { btn.disabled = false; btn.textContent = '🎲 Generate Tape'; }
        });
    }

    function renderCollectors() {
        const panel = document.getElementById('collectorsPanel');
        let html = `<p style="color:#e8c5b0;text-align:center;font-family:var(--font-display);font-size:20px;">📇 FELLOW COLLECTORS</p>`;
        if (!gameState.npcs.length) html += '<div class="empty-state">No collectors around. Find one?</div>';
        else {
            gameState.npcs.forEach(npc => {
                html += `<div style="background:#0e0e16;border:1px solid #1a1520;border-radius:4px;padding:12px;margin-bottom:8px;"><strong style="color:#e8c5b0;font-size:18px;">${esc(npc.name)}</strong><p style="color:#7a6a6a;font-style:italic;">${esc(npc.personality)}</p><div style="margin-top:8px;">`;
                npc.tapes.forEach(tape => html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1a1520;"><span>📼 ${esc(tape.title)} <span class="star-rating">${'💀'.repeat(tape.quality)}${'🦴'.repeat(5-tape.quality)}</span></span><button class="btn trade-btn" data-npc-id="${npc.id}" data-tape-id="${tape.id}">↔️ Trade</button></div>`);
                html += `</div></div>`;
            });
        }
        html += `<button class="btn accent" id="findCollectorBtn" style="margin-top:10px;">🔍 Find New Collector</button>`;
        panel.innerHTML = html;
        panel.querySelectorAll('.trade-btn').forEach(b => b.addEventListener('click', ()=>{ const npc = gameState.npcs.find(n=>n.id===b.dataset.npcId); const tape = npc?.tapes.find(t=>t.id===b.dataset.tapeId); if(npc && tape) initiateTrade(npc, tape); }));
        document.getElementById('findCollectorBtn').addEventListener('click', async ()=>{
            if (Date.now() < gameState.npcGenCooldown) { showModal('<h2>⏳ Patience</h2><p>The video store is quiet...</p><button class="modal-btn" onclick="closeModal()">OK</button>'); return; }
            const btn = document.getElementById('findCollectorBtn'); btn.disabled = true; btn.textContent = 'Summoning...';
            try { await generateNPC(); gameState.npcGenCooldown = Date.now()+60000; refreshAll(); } catch(e){ showModal('<h2>❌ Error</h2><button class="modal-btn" onclick="closeModal()">OK</button>'); }
            finally { btn.disabled = false; btn.textContent = '🔍 Find New Collector'; }
        });
    }

    function renderMessages() {
        const panel = document.getElementById('messagesPanel');
        let html = `<p style="color:#e8c5b0;text-align:center;font-family:var(--font-display);font-size:20px;">💬 MESSAGES</p>`;
        if (!gameState.messages.length) html += '<div class="empty-state">No messages.</div>';
        else gameState.messages.forEach(msg => html += `<div style="background:#0e0e16;border:1px solid #1a1520;border-radius:4px;padding:12px;margin-bottom:8px;"><strong style="color:#e8c5b0;">${esc(msg.from)}</strong><p style="color:#d4c5b2;">${esc(msg.text)}</p><div style="display:flex;gap:8px;margin-top:8px;"><button class="btn accent accept-offer-btn" data-msg-id="${msg.id}">✅ Accept</button><button class="btn danger decline-offer-btn" data-msg-id="${msg.id}">❌ Decline</button></div></div>`);
        panel.innerHTML = html;
        panel.querySelectorAll('.accept-offer-btn').forEach(b => b.addEventListener('click', ()=> acceptBuyOffer(b.dataset.msgId)));
        panel.querySelectorAll('.decline-offer-btn').forEach(b => b.addEventListener('click', ()=> declineMessage(b.dataset.msgId)));
    }

    function renderDub() {
        const panel = document.getElementById('dubPanel');
        panel.innerHTML = `<p style="color:#e8c5b0;text-align:center;font-family:var(--font-display);font-size:20px;">🎞️ CUSTOM DUB</p><p style="color:#7a6a6a;text-align:center;">Commission a director to create a one-of-a-kind VHS tape.</p><button class="btn accent" id="startDubBtn">🎬 Enter the Dubbing Booth</button>`;
        document.getElementById('startDubBtn').addEventListener('click', openDirectorModal);
    }

    let directorMessages = [];
    function openDirectorModal() {
        directorMessages = [{role:"system", content:"You are a cult horror director in the 80s. Help the player create a custom VHS tape. When they are ready, finalize as JSON with fields: title, genre, tagline, synopsis, quality(1-5), budget (int between 200-800). Stay in character."}];
        renderDirectorChat(); sendDirectorMessage("What kind of horror are we dubbing tonight?");
    }
    function renderDirectorChat() {
        let html = `<h2>🎬 DUBBING BOOTH</h2><div class="chat-log" id="directorChatLog">`;
        directorMessages.forEach(m => html += m.role==='user' ? `<div class="chat-msg user"><strong>You:</strong> ${esc(m.content)}</div>` : `<div class="chat-msg assistant"><strong>Director:</strong> ${esc(m.content)}</div>`);
        html += `</div><div class="chat-input-row"><input type="text" id="directorInput" placeholder="Describe your nightmare..."><button class="btn" id="directorSendBtn">Send</button></div><button class="btn accent" id="finalizeScriptBtn" style="width:100%;margin-top:6px;">📝 Finalize & Fund ($200-800)</button><button class="modal-btn" onclick="closeModal()">Leave</button>`;
        document.getElementById('genericModalContent').innerHTML = html; document.getElementById('genericModal').style.display = 'flex';
        document.getElementById('directorSendBtn').addEventListener('click', ()=>{ const input = document.getElementById('directorInput'); if(input.value.trim()){ sendDirectorMessage(input.value.trim()); input.value=''; } });
        document.getElementById('finalizeScriptBtn').addEventListener('click', finalizeDub);
    }
    async function sendDirectorMessage(text) {
        directorMessages.push({role:"user", content:text}); renderDirectorChat();
        try { const reply = await mistralChat(directorMessages, 300); directorMessages.push({role:"assistant", content:reply}); } catch(e) { directorMessages.push({role:"assistant", content:"(The director fades into static...)"}); }
        renderDirectorChat();
    }
    async function finalizeDub() {
        directorMessages.push({role:"user", content:"Based on our conversation, output ONLY a valid JSON object representing the final horror VHS tape. Include: title, genre, tagline, synopsis, quality(1-5), budget(int)."}); renderDirectorChat();
        try {
            const reply = await mistralChat(directorMessages, 500); const json = JSON.parse(reply.replace(/```json|```/g,'').trim());
            if (!json.title || !json.budget) throw new Error('Incomplete');
            if (gameState.cash < json.budget) { showModal(`<h2>💸 Not Enough Cash</h2><p>Need $${json.budget}, you have $${gameState.cash}.</p><button class="modal-btn" onclick="closeModal()">OK</button>`); return; }
            gameState.cash -= json.budget; const newTape = {...json, id:'m_'+Date.now(), posterUrl:null};
            addToCollection(newTape); closeModal(); refreshAll(); requestCover(newTape);
        } catch(e) { directorMessages.push({role:"assistant", content:"Hmm, the tape jammed. Let's try finalizing again."}); renderDirectorChat(); }
    }

    function refreshAll() {
        document.getElementById('statCash').textContent = '$'+gameState.cash;
        document.getElementById('statTapes').textContent = gameState.collection.length;
        const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab || 'collection';
        switchTab(activeTab);
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        const tabBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`); if (tabBtn) tabBtn.classList.add('active');
        const panel = document.getElementById(tab+'Panel'); if (panel) panel.classList.add('active');
        if (tab==='collection') renderCollection();
        else if (tab==='collectors') renderCollectors();
        else if (tab==='messages') renderMessages();
        else if (tab==='dub') renderDub();
        else if (tab==='channel13') renderChannel13();
        else if (tab==='radio') renderRadio();
    }

    function showModal(html) { document.getElementById('genericModalContent').innerHTML = html; document.getElementById('genericModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('genericModal').style.display = 'none'; speechSynthesis.cancel(); }
    window.closeModal = closeModal;

    loadState(); refreshAll();
    document.querySelectorAll('.tab-btn').forEach(t => t.addEventListener('click', ()=> switchTab(t.dataset.tab)));
    document.getElementById('resetApiBtn').addEventListener('click', ()=>{ const key = prompt('Enter your Mistral API key:'); if (key && key.length > 10) { apiKey = key; localStorage.setItem('nightfalls_vhs_key', key); } });
    if (!apiKey) setTimeout(()=> document.getElementById('resetApiBtn').click(), 500);
    setInterval(() => { if (Math.random() < 0.3) generatePassiveOfferRandom(); }, 30000);
    document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
})();
</script>
</body>
</html>
