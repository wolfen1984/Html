<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>NIGHTFALLS VHS · Horror Tape Collection · 1985</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080c;
            --screen-bg: #0c0c10;
            --panel-bg: #0e0e16;
            --text: #c8c8c8;
            --text-dim: #7a7a7a;
            --text-bright: #f0ece4;
            --accent: #ff2a4a;
            --accent-dim: #99111f;
            --border: #ff2a4a;
            --border-glow: 0 0 12px #ff003c66, 0 0 28px #ff003c22;
            --danger: #e82233;
            --danger-glow: 0 0 10px #e8223344;
            --amber: #ffaa22;
            --amber-dim: #885500;
            --green: #33cc55;
            --input-bg: #16161e;
            --button-bg: #1a1a20;
            --button-hover: #24202c;
            --button-active: #2a1018;
            --bevel-light: #2a2a35;
            --bevel-dark: #060608;
            --font-display: 'Creepster', 'Nosifer', cursive;
            --font-title: 'Nosifer', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --font-body: 'VT323', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 32px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0d0d18 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }

        .monitor-bezel {
            width: 100%;
            max-width: 520px;
            height: 100vh;
            height: 100dvh;
            max-height: 900px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2a2a2a, 0 0 0 4px #111111, 0 0 0 8px #0a0a0a, 0 8px 40px #000000cc;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (max-width: 520px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                max-height: 100dvh;
                box-shadow: none;
                background: #0a0a0a;
            }
        }

        .power-led {
            position: absolute;
            bottom: 16px;
            right: 20px;
            width: 8px;
            height: 8px;
            background: #33ff44;
            border-radius: 50%;
            box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433;
            animation: powerGlow 2s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%, 100% { box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433; }
            50% { box-shadow: 0 0 14px #33ff44aa, 0 0 24px #33ff4455; }
        }

        .brand-label {
            position: absolute;
            bottom: 14px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #333;
            letter-spacing: 2px;
            z-index: 20;
            text-transform: uppercase;
        }

        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 4px;
            border: 3px solid #ff2a4a;
            box-shadow: var(--border-glow), inset 0 0 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 520px) { .game-shell { border-radius: 0; border-width: 2px; } }

        .screen-curve {
            position: absolute; inset: 0; pointer-events: none; z-index: 899;
            border-radius: 2px; box-shadow: inset 0 0 60px rgba(0,0,0,0.7), inset 0 0 10px rgba(0,0,0,0.5);
        }

        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,var(--scanline-opacity)) 0px, rgba(0,0,0,var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 2px;
        }
        .crt-overlay::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%); border-radius: 2px;
        }

        .screen-flicker { animation: crtFlicker 8s ease-in-out infinite; }
        @keyframes crtFlicker { 0%,99.4%,100%{opacity:1;} 99.5%{opacity:0.6;} 99.6%{opacity:0.9;} 99.7%{opacity:0.5;} 99.8%{opacity:1;} }

        .marquee {
            position: relative; z-index: 10; background: #0c0406; border-bottom: 3px solid #ff2a4a;
            padding: 10px 16px; text-align: center; font-family: var(--font-display); letter-spacing: 2px;
            box-shadow: 0 2px 16px #00000088, inset 0 1px 0 #2a0c0c; flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #ff2a4a; border-radius: 3px; padding: 10px 14px; background: #080206;
            position: relative; box-shadow: inset 0 0 20px #ff003c11;
        }
        .marquee-inner::before {
            content: ''; position: absolute; top: -2px; left: 20px; right: 20px; height: 2px;
            background: #ff2a4a; box-shadow: 0 0 10px #c41e3a66;
        }
        .marquee-title {
            font-size: var(--text-size-title); color: #e8c5b0; text-shadow: 0 0 14px #c41e3a88, 0 2px 4px #000;
            letter-spacing: 3px; font-family: var(--font-title); line-height: 1.2;
        }
        @media (max-width: 400px) { .marquee-title { font-size: 22px; letter-spacing: 1px; } }

        .status-strip {
            display: flex; justify-content: space-around; padding: 8px 10px; background: #08080e;
            border-bottom: 1px solid #ff2a4a66; z-index: 10; font-family: var(--font-mono);
            font-size: var(--text-size-sm); color: var(--text-dim); letter-spacing: 1px; flex-shrink: 0; flex-wrap: wrap; gap: 4px;
        }
        .status-item { display: flex; align-items: center; gap: 4px; white-space: nowrap; padding: 2px 6px; background: #0e0e16; border: 1px solid #1a1a25; border-radius: 2px; min-height: var(--touch-target); align-items: center; }
        .status-val { color: var(--text-bright); font-weight: bold; font-size: var(--text-size-base); }
        .status-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }

        .tabs-row {
            display: flex; background: #08080e; border-bottom: 2px solid #ff2a4a; z-index: 10;
            flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; gap: 0;
        }
        .tabs-row::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 1 0 auto; min-width: 60px; text-align: center; padding: 8px 4px;
            font-family: var(--font-body); font-size: 13px; color: #b08080; cursor: pointer;
            border-bottom: 4px solid transparent; background: transparent; white-space: nowrap;
            letter-spacing: 1px; transition: all 0.15s; min-height: var(--btn-min-height);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 2px; line-height: 1.2;
        }
        .tab-btn.active { color: #f0ddd0; border-bottom-color: #ff2a4a; text-shadow: 0 0 10px #c41e3a88; background: #0c0610; box-shadow: inset 0 -4px 12px #ff003c18; }
        .tab-btn:hover { color: #d4b8a8; background: #0a0810; }
        .tab-emoji { font-size: 16px; line-height: 1; }
        .tab-label { font-size: 11px; line-height: 1.2; }

        .game-area {
            flex: 1; overflow-y: auto; overflow-x: hidden; z-index: 5; scrollbar-width: thin;
            scrollbar-color: #2a0f15 #08080e; display: flex; flex-direction: column; padding: 4px 0;
        }
        .game-area::-webkit-scrollbar { width: 5px; } .game-area::-webkit-scrollbar-track { background: #08080e; } .game-area::-webkit-scrollbar-thumb { background: #2a0f15; border-radius: 3px; }

        .panel { display: none; flex-direction: column; padding: 10px; gap: 10px; flex: 1; }
        .panel.active { display: flex; }

        .btn {
            background: var(--button-bg); border: 2px solid #2a2a35; border-top-color: #3a3a48; border-left-color: #353540;
            border-right-color: #1a1a25; border-bottom-color: #111118; padding: 12px 18px; border-radius: 3px;
            color: var(--text); cursor: pointer; font-family: var(--font-body); font-size: var(--text-size-base);
            letter-spacing: 1px; text-transform: uppercase; transition: all 0.1s; min-height: var(--btn-min-height);
            display: inline-flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 2px 0 #00000044; white-space: nowrap;
        }
        .btn:active { border-top-color: #1a1a25; border-left-color: #1a1a25; border-bottom-color: #3a3a48; border-right-color: #353540; box-shadow: 0 0px 0 #00000044; transform: translateY(1px); background: #14141c; }
        .btn.accent { background: #180a10; border-color: #5c1525; border-top-color: #7a2035; border-left-color: #6a1a2a; border-right-color: #3a0f18; border-bottom-color: #200810; color: #e8a090; box-shadow: 0 2px 0 #00000044, 0 0 8px #c41e3a22; }
        .btn.accent:active { border-top-color: #3a0f18; border-left-color: #3a0f18; border-bottom-color: #7a2035; border-right-color: #6a1a2a; box-shadow: 0 0px 0 #00000044, 0 0 14px #c41e3a44; }
        .btn.danger { background: #180a0c; border-color: #441111; border-top-color: #5a1a1a; border-left-color: #4a1515; border-right-color: #2a0a0a; border-bottom-color: #150505; color: #ff7777; box-shadow: 0 2px 0 #00000044; }
        .btn.danger:active { border-top-color: #2a0a0a; border-left-color: #2a0a0a; border-bottom-color: #5a1a1a; border-right-color: #4a1515; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

        .movie-card {
            background: #0e0e16; border: 2px solid #1a1a25; border-radius: 4px; padding: 12px; display: flex;
            gap: 12px; align-items: flex-start; flex-shrink: 0;
        }
        .poster-thumb { width: 65px; height: 88px; border-radius: 3px; background: #0a0a14; border: 2px solid #1a1a28; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #c41e3a; }
        .poster-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .movie-info { flex: 1; min-width: 0; }
        .movie-title { font-family: var(--font-display); font-size: 17px; color: #e8c5b0; text-shadow: 0 0 6px #c41e3a22; letter-spacing: 1px; line-height: 1.2; }
        .movie-meta { font-size: 12px; color: #7a6a6a; font-family: var(--font-mono); margin-top: 2px; }
        .star-rating { color: #c41e3a; letter-spacing: 2px; font-size: 14px; }
        .movie-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; min-width: 80px; }
        .movie-actions .btn { font-size: 14px; padding: 8px 10px; min-height: 36px; }

        .empty-state { color: #4a3a3a; text-align: center; padding: 20px; font-size: var(--text-size-base); border: 1px dashed #1a1520; border-radius: 4px; margin: 8px 0; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.94); align-items: center; justify-content: center; padding: 12px; }
        .modal-content { background: #0e0e16; border-radius: 6px; width: 100%; max-width: 420px; padding: 20px; text-align: center; border: 3px solid #ff2a4a; box-shadow: var(--border-glow), 0 0 80px #000000dd; color: #d4c5b2; max-height: 85vh; overflow-y: auto; font-size: var(--text-size-base); }
        .modal-btn { background: #1a1a20; border: 2px solid #ff2a4a66; padding: 10px 18px; border-radius: 3px; margin: 5px; cursor: pointer; color: #d4c5b2; font-family: var(--font-body); font-size: var(--text-size-base); letter-spacing: 1px; min-height: var(--btn-min-height); }
        .modal-btn:active { border-color: #ff003c; box-shadow: 0 0 12px #c41e3a44; }

        .chat-log { max-height: 200px; overflow-y: auto; text-align: left; margin-bottom: 10px; border: 1px solid #1a1520; border-radius: 4px; padding: 10px; background: #0a0a12; font-size: var(--text-size-base); line-height: 1.5; }
        .chat-msg { margin: 8px 0; font-size: 16px; line-height: 1.4; }
        .chat-msg.user { color: #e8a090; } .chat-msg.assistant { color: #d4c5b2; }
        .chat-input-row { display: flex; gap: 8px; }
        .chat-input-row input { flex: 1; background: var(--input-bg); border: 2px solid #2a2a35; border-radius: 3px; padding: 10px 12px; color: var(--text); font-family: var(--font-body); font-size: var(--text-size-base); min-height: var(--btn-min-height); -webkit-user-select: text; user-select: text; }

        .tv-stage { display: flex; align-items: flex-start; gap: 15px; background: #0a0a14; border: 2px solid #2a0f15; padding: 15px; border-radius: 4px; }
        .elvira-portrait { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #ff2a4a; box-shadow: 0 0 20px #c41e3a66; object-fit: cover; flex-shrink: 0; }
        .speech-bubble { flex: 1; background: #12121c; border: 2px solid #ff2a4a88; border-radius: 8px; padding: 12px; position: relative; color: #e8c5b0; font-size: 17px; min-height: 80px; }
        .speech-bubble::before { content: ''; position: absolute; left: -12px; top: 20px; border-width: 8px 12px 8px 0; border-style: solid; border-color: transparent #ff2a4a88 transparent transparent; }
        .tv-guide { margin-top: 15px; border-top: 2px solid #ff2a4a44; padding-top: 10px; }
        .tv-guide h3 { font-family: var(--font-display); color: #e8c5b0; letter-spacing: 2px; margin-bottom: 8px; }
        .guide-entry { display: flex; justify-content: space-between; align-items: center; background: #0e0e16; border: 1px solid #1a1520; padding: 10px; margin-bottom: 6px; border-radius: 3px; }
        .guide-time { font-family: var(--font-mono); font-size: 14px; color: #c41e3a; min-width: 50px; }
        .guide-info { flex: 1; margin: 0 10px; }
        .guide-title { font-size: 16px; color: #e8c5b0; }
        .guide-desc { font-size: 18px; color: #7a6a6a; }
        .guide-btn { padding: 6px 12px; font-size: 14px; min-height: 32px; }

        .radio-tuner { background: #0a0a12; border: 2px solid #2a0f15; border-radius: 8px; padding: 15px; margin: 10px 0; text-align: center; }
        .radio-dial { font-size: 60px; line-height: 1; animation: dialGlow 2s infinite alternate; }
        @keyframes dialGlow { from { text-shadow: 0 0 8px var(--amber); } to { text-shadow: 0 0 20px var(--amber), 0 0 30px var(--amber-dim); } }
        .frequency-display { font-family: var(--font-mono); font-size: 20px; color: var(--amber); letter-spacing: 2px; }
        .signal-meter { font-family: var(--font-mono); color: var(--text-dim); margin-top: 5px; }
        .signal-strength { color: var(--amber); background: #1a1a25; padding: 2px 8px; border-radius: 10px; }
        .now-playing-box { background: #0a0a12; border: 1px solid #ff2a4a44; border-radius: 5px; padding: 12px; margin: 12px 0; text-align: left; }
        .now-playing-title { color: #e8c5b0; font-family: var(--font-display); font-size: 18px; }
        .now-playing-author { color: #7a6a6a; font-size: 14px; font-style: italic; }
        .story-archive { margin-top: 15px; border-top: 2px solid #2a0f15; padding-top: 10px; }
        .archive-item { display: flex; justify-content: space-between; align-items: center; background: #0e0e16; border: 1px solid #1a1520; padding: 8px 10px; margin-bottom: 5px; border-radius: 3px; }
        .archive-title { color: #e8c5b0; }
        .archive-author { color: #7a6a6a; font-size: 14px; }
        .radio-controls { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        .loading-text { color: var(--amber); font-style: italic; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>

<script>
(function() {
    const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
    const MODEL = 'mistral-small-latest';
    let apiKey = localStorage.getItem('nightfalls_vhs_key') || '';

    const DEFAULT_STATE = {
    cash: 500,
    collection: [],
    npcs: [],
    imageCooldownUntil: 0,
    npcGenCooldown: 0,
    elviraImage: null,
    tvGuideEpisodes: [],
    radioStories: [],
    radioLastGeneratedDate: null,
    ch12Episodes: [],
    ch11Episodes: [],
    ch10Episodes: [],
    activePenance: null,
    ch9Episodes: [],
    activeCourtVerdict: null,
    ch8Episodes: [],
ch7Episodes: [],
currentSullyCase: null,
ch6Episodes: [],
geheimeWaffenTopic: null
};
    let gameState = { ...DEFAULT_STATE };

    let currentRadioStoryId = null;
    let radioUtterances = [];
    let radioIsPlaying = false;

    const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[m]);

    function saveState() { try { localStorage.setItem('nightfalls_vhs_state', JSON.stringify(gameState)); } catch(e){} }
    function loadState() {
        try {
            const saved = localStorage.getItem('nightfalls_vhs_state');
            if (saved) gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
        } catch(e){}
    }

    async function mistralChat(msgs, maxTok=500) {
        if (!apiKey) throw new Error('API key missing');
        const res = await fetch(MISTRAL_ENDPOINT, {
            method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
            body: JSON.stringify({model:MODEL, messages:msgs, temperature:0.9, max_tokens:maxTok})
        });
        if (!res.ok) throw new Error('API '+res.status);
        const data = await res.json();
        return data.choices[0].message.content.trim();
    }

    async function generateImage(prompt) {
        const now = Date.now();
        if (now < gameState.imageCooldownUntil) await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt+', vintage 80s horror VHS cover art')}?width=512&height=640&seed=${Date.now()}`;
        const img = new Image();
        const result = await new Promise(resolve => {
            let done = false;
            img.onload = () => { if(!done){done=true; resolve(url);} };
            img.onerror = () => { if(!done){done=true; resolve(null);} };
            img.src = url;
        });
        gameState.imageCooldownUntil = Date.now() + 30000;
        saveState();
        return result;
    }

    async function generateImageWithRetry(prompt, retries=2) {
        for (let i = 0; i < retries; i++) {
            const url = await generateImage(prompt);
            if (url) return url;
            await new Promise(r => setTimeout(r, 20));
        }
        return null;
    }

    async function selectPlayerTapeForTrade(npcId, npcTapeId, playerTapeId) {
        const npc = gameState.npcs.find(n => n.id === npcId);
        const npcTape = npc?.tapes.find(t => t.id === npcTapeId);
        const playerTape = gameState.collection.find(m => m.id === playerTapeId);
        if (!npc || !npcTape || !playerTape) return;
        const sysPrompt = `You are ${npc.name}, a VHS collector. Personality: ${npc.personality}. You own "${npcTape.title}" (quality ${npcTape.quality}). You are offered "${playerTape.title}" (quality ${playerTape.quality}) in a 1-for-1 trade. Reply with JSON: {decision:"accept"|"reject"|"counter", message:"...", counterAmount:0 (if counter)}.`;
        try {
            const resp = await mistralChat([{role:'system',content:sysPrompt},{role:'user',content:`I offer my "${playerTape.title}" for your "${npcTape.title}".`}], 300);
            const res = JSON.parse(resp.replace(/```json|```/g,'').trim());
            handleTradeDecision(npc, npcTape, playerTape, res);
        } catch(e) { showModal('<h2>Error</h2><p>Trade negotiation failed.</p><button class="modal-btn" onclick="closeModal()">OK</button>'); }
    }

    function handleTradeDecision(npc, npcTape, playerTape, decision) {
        if (decision.decision === 'accept') {
            const newTape = {...npcTape, id: playerTape.id, posterUrl: null};
            const oldTape = {...playerTape, id: npcTape.id, posterUrl: null};
            gameState.collection = gameState.collection.filter(m => m.id !== playerTape.id);
            npc.tapes = npc.tapes.filter(t => t.id !== npcTape.id);
            gameState.collection.push(newTape);
            npc.tapes.push(oldTape);
            saveState(); refreshAll();
            showModal(`<h2>✅ Trade Accepted</h2><p>${esc(npc.name)}: "${esc(decision.message)}"</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
            requestCover(newTape);
            maybePassiveOffer(npc);
        } else if (decision.decision === 'counter' && decision.counterAmount && gameState.cash >= decision.counterAmount) {
            showModal(`<h2>💵 Counter Offer</h2><p>${esc(npc.name)} wants an extra $${decision.counterAmount} for "${esc(npcTape.title)}".</p><p>${esc(decision.message)}</p>
                <button class="modal-btn" id="acceptCounter">Pay $${decision.counterAmount}</button><button class="modal-btn" onclick="closeModal()">Decline</button>`);
            document.getElementById('acceptCounter').onclick = ()=>{
                gameState.cash -= decision.counterAmount;
                const newTape = {...npcTape, id: playerTape.id, posterUrl: null};
                const oldTape = {...playerTape, id: npcTape.id, posterUrl: null};
                gameState.collection = gameState.collection.filter(m => m.id !== playerTape.id);
                npc.tapes = npc.tapes.filter(t => t.id !== npcTape.id);
                gameState.collection.push(newTape);
                npc.tapes.push(oldTape);
                saveState(); closeModal(); refreshAll();
                requestCover(newTape);
                maybePassiveOffer(npc);
            };
        } else {
            showModal(`<h2>❌ Trade Rejected</h2><p>${esc(npc.name)}: "${esc(decision.message)}"</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
        }
    }

    function maybePassiveOffer(npc) {
        if (Math.random() < 0.5 && gameState.collection.length > 0) {
            const randomTape = gameState.collection[Math.floor(Math.random()*gameState.collection.length)];
            const offerPrice = randomTape.quality * 40 + Math.floor(Math.random()*50);
            addMessage({
                from: npc.name, npcId: npc.id, type: 'buy_offer', tapeId: randomTape.id,
                tapeTitle: randomTape.title, offerPrice,
                text: `Hey, I'd love to add "${randomTape.title}" to my collection. Would you sell it for $${offerPrice}?`
            });
        }
    }

            projectorAudioCtx = new (window.AudioContext||window.webkitAudioContext)();

            osc.type='sawtooth'; osc.frequency.value=55; gain.gain.value=0.02; osc.connect(gain); gain.connect(projectorAudioCtx.destination); osc.start();
            projectorNodes = { osc, gain };
        })();
        function stopHum() { if(projectorNodes){ projectorNodes.osc.stop(); } if(projectorAudioCtx) projectorAudioCtx.close(); }
        function playScene(index) {
            if (index >= scenes.length) { stopHum(); showModal(`<h2>🔪 ${esc(movie.title)}</h2><p>🎬 END OF TRAILER</p><button class="modal-btn" onclick="closeModal()">Close</button>`); return; }

                speechSynthesis.speak(u);

    }

async function generateSingleRadioStory() {
    try {
        const prompt = `You are Digger Graves, host of Nightfall Radio, a late-night horror anthology. Write exactly 1 short horror story (400-600 words) for tonight's broadcast. The story must have a beginning, rising tension, and a chilling twist. Return a JSON object with the fields: "title" (episode title), "author" (fictional writer name), "text" (the full narrated script). Output raw JSON only, no markdown, no extra text.`;

        const resp = await mistralChat([
            { role: 'system', content: 'You are Digger Graves, the mysterious host of Nightfall Radio.' },
            { role: 'user', content: prompt }
        ], 2000); // larger token limit for a full story

        let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
        const story = JSON.parse(jsonStr);

        if (story && story.title && story.text) {
            gameState.radioStories.push({

    function speakRadio(text, onEnd) {
        const voices = speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Google UK English Male') || v.name.includes('Daniel') || v.name.includes('Male')) || voices[0];
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.voice = voice;
        utterance.rate = 0.9;
        utterance.pitch = 0.9;
        if (onEnd) utterance.onend = onEnd;
        speechSynthesis.speak(utterance);
        radioUtterances.push(utterance);
    }

    function stopRadioPlayback() {
        speechSynthesis.cancel();
        radioUtterances = [];
        radioIsPlaying = false;
        currentRadioStoryId = null;
        refreshRadioIfActive();
    }

    function playRadioStory(storyId) {
        stopRadioPlayback();
        const story = gameState.radioStories.find(s => s.id === storyId);
        if (!story) return;
        currentRadioStoryId = storyId;
        radioIsPlaying = true;
        const sentences = story.text.match(/[^\.!\?]+[\.!\?]+|[^\.!\?]+$/g) || [story.text];
        let index = 0;
        function speakNext() {
            if (!radioIsPlaying || currentRadioStoryId !== storyId) return;
            if (index >= sentences.length) {
                radioIsPlaying = false;
                currentRadioStoryId = null;
                refreshRadioIfActive();
                return;
            }
            const sentence = sentences[index].trim();
            if (sentence) {
                speakRadio(sentence, () => {
                    index++;
                    setTimeout(speakNext, 300);
                });
            } else {
                index++;
                speakNext();
            }
        }
        refreshRadioIfActive();
        speakNext();
    }

    function typewriterEffect(element, text, speed) {
        let i = 0; element.textContent = '';
        const timer = setInterval(() => { if(i < text.length) { element.textContent += text.charAt(i); i++; } else clearInterval(timer); }, speed);
    }

    function speakText(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    const voices = speechSynthesis.getVoices();

    // Preferred female voices across common browsers/OSes
    const femaleNames = [
        'Samantha',          // macOS
        'Google UK English Female',
        'Google US English Female',
        'Microsoft Zira',    // Windows
        'Karen',             // macOS alternative
        'Moira',             // macOS Irish English
        'Fiona',             // macOS Scottish English
        'Veena',             // macOS Indian English
        'Victoria',          // macOS Australian
        'Alice',             // various
        'Linda',             // various
        'Amy',               // various
        'Emma',              // various
        'Ava',               // various
        'Isabella'           // various
    ];

    let voice = null;

    // Try to match a known female name
    for (const name of femaleNames) {
        voice = voices.find(v => v.name.includes(name));
        if (voice) break;
    }

    // If no known name matched, look for any voice with 'female' in the name
    if (!voice) {
        voice = voices.find(v => v.name.toLowerCase().includes('female'));
    }

    // Final fallback: pick the first voice that is not obviously male
    if (!voice) {
        // Pick any voice that doesn't contain 'male' in the name
        voice = voices.find(v => !v.name.toLowerCase().includes('male')) || voices[0];
    }

    if (voice) {
        utterance.voice = voice;
    } else {
        console.warn('No female voice found, using default voice');
    }

    utterance.rate = 0.9;
    utterance.pitch = 1.15; // Slightly higher pitch for Elvira's playful tone
    speechSynthesis.speak(utterance);
}

async function generateNewSignal12Episodes() {
    const prompt = `You are Chuck Blastov, producer of Signal 12 News. Design a completely new evening's lineup. The show has exactly six segments: headlines, field_report, obituaries, weather, mailbag, signoff.
Return a JSON array of exactly 6 objects, one for each segment, with the following keys:

- title: on‑air segment title (be creative and funny)
- desc: one‑sentence TV guide description
- type: must be one of: "headlines", "field_report", "obituaries", "weather", "mailbag", "signoff"

The news is parody, darkly humorous, no actual supernatural events. JSON only, no markdown.`;
    const resp = await mistralChat([{role:'system', content:'You are Chuck Blastov, news director.'}, {role:'user', content:prompt}], 800);
    const newEpisodes = JSON.parse(resp.replace(/```json|```/g, '').trim());
    if (Array.isArray(newEpisodes) && newEpisodes.length === 6) {
        const types = newEpisodes.map(e => e.type).sort();
        const required = ['field_report', 'headlines', 'mailbag', 'obituaries', 'signoff', 'weather'].sort();
        if (JSON.stringify(types) === JSON.stringify(required)) {
            gameState.ch12Episodes = newEpisodes;
            saveState();
            return;
        }
    }
    throw new Error('Invalid bulletin structure');
}

async function playTease(dialogue) {

async function playSceneIt(dialogue) {
    if (!gameState.currentDoubleFeature) {
        dialogue.textContent = "We lost the reels! Let’s skip to the next segment.";
        return;
    }
    const film = gameState.currentDoubleFeature.film1;
    const prompt = `You are Jane, a sarcastic skeleton sidekick. Describe a single, eerie scene from the horror movie "${film.title}" (${film.genre}) without giving away the title. Use 2‑3 sentences. Then ask: "What movie is this?" Return JSON: {scene: "description", correctTitle: "${film.title}"}. JSON only.`;
    const resp = await mistralChat([{role:'system', content:'You are Jane, the sarcastic skeleton.'}, {role:'user', content:prompt}], 300);
    const data = JSON.parse(resp.replace(/```json|```/g, '').trim());

    // Generate two fake titles as options
    const fakePrompt = `Generate two fake horror movie titles that sound like they could be from an 80s VHS shelf. Return a JSON array of two strings. JSON only.`;
    const fakeResp = await mistralChat([{role:'user', content:fakePrompt}], 150);
    const fakeTitles = JSON.parse(fakeResp.replace(/```json|```/g, '').trim());
    const options = [data.correctTitle, ...fakeTitles].sort(() => Math.random() - 0.5);

    let html = `<p><em>Jane describes:</em> “${data.scene}”</p><p>What movie is this?</p>`;
    options.forEach((opt, i) => {
        html += `<button class="btn sceneit-opt" data-index="${i}" data-correct="${opt === data.correctTitle}">${esc(opt)}</button> `;
    });
    dialogue.innerHTML = html;

    document.querySelectorAll('.sceneit-opt').forEach(btn => {
        btn.addEventListener('click', function() {
            const isCorrect = this.dataset.correct === 'true';
            if (isCorrect) {
                dialogue.innerHTML = `<p>✅ Nailed it! You know your horror, you sicko.</p>`;
            } else {
                dialogue.innerHTML = `<p>❌ Wrong! The correct answer was “${data.correctTitle}”. Better luck next time, meatbag.</p>`;

        });
    });

}

function speakTextFemale(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    const voices = speechSynthesis.getVoices();
    const femaleNames = [
        'Samantha', 'Google UK English Female', 'Google US English Female',
        'Microsoft Zira', 'Karen', 'Moira', 'Fiona', 'Veena', 'Victoria',
        'Alice', 'Linda', 'Amy', 'Emma', 'Ava', 'Isabella'
    ];
    let voice = null;
    for (const name of femaleNames) {
        voice = voices.find(v => v.name.includes(name));
        if (voice) break;
    }
    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('female')) || voices[0];
    if (voice) utterance.voice = voice;
    utterance.rate = 0.95;
    utterance.pitch = 1.2; // slightly higher for playful tone
    speechSynthesis.speak(utterance);
}

// ──── Penance system ────
function setActivePenance(description, modifier = {}, durationMs = 600000) {   // 10 minutes default
    gameState.activePenance = {
        description,
        expiresAt: Date.now() + durationMs,
        modifier   // e.g., { tradeRejectChance: 0.3, cashPenalty: 0 }
    };
    saveState();
    updateFooterPenance();
}

function clearExpiredPenance() {
    // only clear if expired – do NOT call updateFooterPenance here
    if (gameState.activePenance && Date.now() > gameState.activePenance.expiresAt) {
        gameState.activePenance = null;
        saveState();
    }
}
function updateFooterPenance() {
    // first, clean up any expired penance
    clearExpiredPenance();

    const footer = document.getElementById('footerMsg');
    if (!footer) return;

    if (gameState.activePenance) {
        footer.textContent = `🪪 Penance: ${gameState.activePenance.description}`;
    } else {
        footer.textContent = '📼 NIGHTFALLS VHS · COLLECT THE DARKNESS';
    }
}
// Override handleTradeDecision to apply penance risk
const originalHandleTradeDecision = handleTradeDecision;
handleTradeDecision = function(npc, npcTape, playerTape, decision) {
    clearExpiredPenance();
    if (gameState.activePenance && gameState.activePenance.modifier.tradeRejectChance) {
        // If the NPC originally accepted, roll an extra chance to reject
        if (decision.decision === 'accept' && Math.random() < gameState.activePenance.modifier.tradeRejectChance) {
            decision = {
                decision: 'reject',
                message: "Forgive me, but I've got a bad feeling about this. The confessional has cursed this deal."
            };
        }
    }
    return originalHandleTradeDecision(npc, npcTape, playerTape, decision);
};

// Apply a cash penalty if one exists (called after transactions)
function applyCashPenanceIfActive(amount) {
    clearExpiredPenance();
    if (gameState.activePenance && gameState.activePenance.modifier.cashPenalty) {
        gameState.cash = Math.max(0, gameState.cash - amount);
        saveState();
        refreshAll();
    }
}

// ──── Episode starter ────
async function startConfessionalEpisode(episode) {
    speechSynthesis.cancel();
    if (window.ch10Timeout) clearTimeout(window.ch10Timeout);

    const bubble = document.getElementById('ch10SpeechBubble');
    const dialogue = document.getElementById('ch10Dialogue');
    if (!bubble || !dialogue) return;

    const guideList = document.getElementById('ch10GuideList');
    if (guideList) guideList.style.display = 'none';
    bubble.style.borderColor = '#ff2a4a';
    bubble.style.boxShadow = '0 0 20px #c41e3a66';

    const restoreGuide = () => {
        if (guideList) guideList.style.display = '';
        bubble.style.borderColor = '#ff2a4a88';
        bubble.style.boxShadow = 'none';
    };

    try {
        switch (episode.type) {
            case 'opening':
                await playConfessionalOpening(dialogue);
                window.ch10Timeout = setTimeout(restoreGuide, 5000);
                break;
            case 'confession':
                await playConfession(dialogue);
                // playConfession handles its own restore after player submits
                break;
            case 'community':
                await playCommunityConfession(dialogue);
                break;
            case 'absolution':
                await playAbsolution(dialogue);
                window.ch10Timeout = setTimeout(restoreGuide, 5000);
                break;
            default:
                dialogue.textContent = "The booth is silent.";
                window.ch10Timeout = setTimeout(restoreGuide, 3000);
        }
    } catch (e) {
        dialogue.textContent = "The line went dead... try again later.";
        window.ch10Timeout = setTimeout(restoreGuide, 3000);
    }
}

async function playCommunityConfession(dialogue) {
    // Mire reads a fictional confession, then the player votes on the punishment
    const prompt = `You are Father Malcolm Mire. Read aloud a fictional, darkly humorous confession from a member of the "congregation" (e.g., "I swapped the labels on my neighbour's horror tapes so they watched a rom‑com"). Keep it one sentence. Then present three possible penances (labeled A, B, C) for the congregation to vote on. Return a JSON object: { "confession": "...", "penances": ["A: ...", "B: ...", "C: ..."] }. JSON only.`;
    const resp = await mistralChat([{role:'system', content:'You are Father Mire.'}, {role:'user', content:prompt}], 300);
    const data = JSON.parse(resp.replace(/```json|```/g, '').trim());

    let html = `<p>"A letter from a troubled soul: ${esc(data.confession)}"</p><p>What say you, flock?</p>`;
    data.penances.forEach((p, i) => {
        html += `<button class="btn community-vote-btn" data-index="${i}">${esc(p)}</button> `;
    });
    dialogue.innerHTML = html;

    const restoreGuide = () => {
        const guideList = document.getElementById('ch10GuideList');
        if (guideList) guideList.style.display = '';
        const bubble = document.getElementById('ch10SpeechBubble');
        if (bubble) {
            bubble.style.borderColor = '#ff2a4a88';
            bubble.style.boxShadow = 'none';
        }
    };

    document.querySelectorAll('.community-vote-btn').forEach(btn => {
        btn.addEventListener('click', async function() {
            const chosenIdx = parseInt(this.dataset.index);
            const chosenPenance = data.penances[chosenIdx];
            // Apply a community penance (light, global effect)
            // For simplicity, we apply a small trade risk or cash penalty based on index
            const modifier = chosenIdx === 0 ? { tradeRejectChance: 0.15 } :
                             chosenIdx === 1 ? { cashPenalty: 1 } :   // lose $1 on sells
                             { tradeRejectChance: 0.1, cashPenalty: 1 };
            setActivePenance(`Community penance: ${chosenPenance.split(':')[1]?.trim() || chosenPenance}`, modifier, 300000); // 5 min

            dialogue.innerHTML = `<p>The congregation has spoken. The penance is set.</p><p><em>${esc(chosenPenance)}</em></p>`;
            speechSynthesis.cancel();
            if (window.ch10Timeout) clearTimeout(window.ch10Timeout);
            window.ch10Timeout = setTimeout(restoreGuide, 3000);
        });
    });
    speakTextMale(data.confession);
}

// ──── Court episode starter ────
async function startCourtEpisode(episode) {
    speechSynthesis.cancel();
    if (window.ch9Timeout) clearTimeout(window.ch9Timeout);

    const bubble = document.getElementById('ch9SpeechBubble');
    const dialogue = document.getElementById('ch9Dialogue');
    if (!bubble || !dialogue) return;

    const guideList = document.getElementById('ch9GuideList');
    if (guideList) guideList.style.display = 'none';
    bubble.style.borderColor = '#ff2a4a';
    bubble.style.boxShadow = '0 0 20px #c41e3a66';

    const restoreGuide = () => {
        if (guideList) guideList.style.display = '';
        bubble.style.borderColor = '#ff2a4a88';
        bubble.style.boxShadow = 'none';
    };

    try {
        switch (episode.type) {
            case 'docket':
                await playDocket(dialogue);
                window.ch9Timeout = setTimeout(restoreGuide, 5000);
                break;
            case 'plaintiff':
                await playTestimony(dialogue, 'plaintiff');
                window.ch9Timeout = setTimeout(restoreGuide, 5000);
                break;
            case 'defendant':
                await playTestimony(dialogue, 'defendant');
                window.ch9Timeout = setTimeout(restoreGuide, 5000);
                break;
            case 'jury':
                await playJuryDeliberation(dialogue);
                // playJuryDeliberation handles its own restore after vote
                break;
            case 'verdict':
                await playVerdict(dialogue);
                window.ch9Timeout = setTimeout(restoreGuide, 5000);
                break;
            case 'benediction':
                await playBenediction(dialogue);
                window.ch9Timeout = setTimeout(restoreGuide, 5000);
                break;
            default:
                dialogue.textContent = "The court is in recess. Please stand by.";
                window.ch9Timeout = setTimeout(restoreGuide, 3000);
        }
    } catch (e) {
        dialogue.textContent = "Objection! Technical difficulties.";
        window.ch9Timeout = setTimeout(restoreGuide, 3000);
    }
}

async function playDocket(dialogue) {
    // Generate a random case for the night and store it
    const prompt = `Create an absurd, humorous lawsuit between two supernatural or undead beings. Return a JSON object with: "caseTitle", "plaintiff" (name of the one suing), "defendant" (name of the one being sued), "complaint" (a one‑sentence summary of the grievance). Keep it darkly funny. JSON only.`;
    const resp = await mistralChat([{role:'user', content:prompt}], 300);
    const caseData = JSON.parse(resp.replace(/```json|```/g, '').trim());
    gameState.currentCase = caseData;
    saveState();

    const docketText = `Tonight's case: ${caseData.caseTitle}. ${caseData.plaintiff} is suing ${caseData.defendant} for ${caseData.complaint}. All rise for the honorable Judge Dread.`;
    dialogue.textContent = '';
    typewriterEffect(dialogue, docketText, 30);
    speakTextMale(docketText);
}

async function playTestimony(dialogue, role) {
    if (!gameState.currentCase) {
        dialogue.textContent = "The case file has been misplaced. Recess!";
        return;
    }
    const caseData = gameState.currentCase;
    const speaker = role === 'plaintiff' ? caseData.plaintiff : caseData.defendant;
    const prompt = `You are ${speaker}, a supernatural being in night court. You are ${role === 'plaintiff' ? 'the plaintiff' : 'the defendant'} in the case "${caseData.caseTitle}". The complaint is: ${caseData.complaint}. Give a short, over‑the‑top, hilarious testimony (2‑3 sentences) explaining your side. Use dramatic, courtroom‑drama language.`;
    const resp = await mistralChat([{role:'system', content:`You are ${speaker}.`}, {role:'user', content:prompt}], 250);
    const testimony = resp.trim();

    // Store testimony for later use in verdict (optional)
    if (role === 'plaintiff') gameState.currentCase.plaintiffTestimony = testimony;
    else gameState.currentCase.defendantTestimony = testimony;
    saveState();

    dialogue.textContent = '';
    typewriterEffect(dialogue, `${speaker}: "${testimony}"`, 30);
    speakTextMale(testimony);
}

async function playJuryDeliberation(dialogue) {
    if (!gameState.currentCase) {
        dialogue.textContent = "No case to deliberate. Recess!";
        return;
    }
    const caseData = gameState.currentCase;
    // Generate two possible verdicts with sentences
    const prompt = `You are Judge Dread. Based on the case "${caseData.caseTitle}" where ${caseData.plaintiff} sues ${caseData.defendant} over "${caseData.complaint}", produce two possible verdicts:
- Verdict A: in favor of the plaintiff
- Verdict B: in favor of the defendant
For each verdict, include a brief sentence (e.g., "The defendant must pay 200 souls" or "The case is dismissed with prejudice") and a **court‑wide effect** that will apply to all viewers for 10 minutes (e.g., "all trades have a 20% chance of rejection", "tape quality drops by 1 for new tapes", "cash rewards from selling are halved"). Return a JSON object: { "verdictA": { "description": "...", "modifier": { "tradeRejectChance": 0.2 } }, "verdictB": { "description": "...", "modifier": { "cashPenalty": 5 } } }. JSON only.`;
    const resp = await mistralChat([{role:'system', content:'You are Judge Dread.'}, {role:'user', content:prompt}], 400);
    const verdictData = JSON.parse(resp.replace(/```json|```/g, '').trim());
    gameState.currentVerdictOptions = verdictData;
    saveState();

    let html = `<p>The jury must now decide: who is guilty?</p>`;
    html += `<p><strong>Verdict A:</strong> ${verdictData.verdictA.description}</p>`;
    html += `<p><strong>Verdict B:</strong> ${verdictData.verdictB.description}</p>`;
    html += `<button class="btn jury-vote-btn" data-verdict="A">Vote A</button>`;
    html += `<button class="btn jury-vote-btn" data-verdict="B">Vote B</button>`;
    dialogue.innerHTML = html;

    const restoreGuide = () => {
        const guideList = document.getElementById('ch9GuideList');
        if (guideList) guideList.style.display = '';
        const bubble = document.getElementById('ch9SpeechBubble');
        if (bubble) {
            bubble.style.borderColor = '#ff2a4a88';
            bubble.style.boxShadow = 'none';
        }
    };

    document.querySelectorAll('.jury-vote-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const chosenVerdict = this.dataset.verdict;
            // Store the chosen verdict for the verdict segment
            gameState.currentVerdictChosen = chosenVerdict;
            saveState();
            dialogue.innerHTML = `<p>The jury has spoken. The bailiff will now read the verdict.</p>`;
            speechSynthesis.cancel();
            if (window.ch9Timeout) clearTimeout(window.ch9Timeout);
            window.ch9Timeout = setTimeout(restoreGuide, 2500);
        });
    });
}

async function playVerdict(dialogue) {
    if (!gameState.currentVerdictChosen || !gameState.currentVerdictOptions) {
        dialogue.textContent = "The jury failed to reach a verdict. Mistrial declared.";
        return;
    }
    const verdictKey = gameState.currentVerdictChosen === 'A' ? 'verdictA' : 'verdictB';
    const verdict = gameState.currentVerdictOptions[verdictKey];
    const description = verdict.description;
    const modifier = verdict.modifier || {};

    // Apply the court verdict as a temporary modifier
    setActiveCourtVerdict(description, modifier, 600000); // 10 minutes

    dialogue.textContent = '';
    typewriterEffect(dialogue, `Judge Dread: "I hereby rule... ${description} So it is ordered."`, 30);
    speakTextMale(`I hereby rule... ${description} So it is ordered.`);

    // Clean up case data
    gameState.currentCase = null;
    gameState.currentVerdictOptions = null;
    gameState.currentVerdictChosen = null;
    saveState();
}

async function playBenediction(dialogue) {
    const prompt = `You are the zombie bailiff in Judge Dread's Night Court. Give a short, grim, deadpan farewell. 2 sentences. End with "Court is adjourned... forever."`;
    const text = await mistralChat([{role:'system', content:'You are a zombie bailiff.'}, {role:'user', content:prompt}], 150);
    dialogue.textContent = '';
    typewriterEffect(dialogue, text.trim(), 30);
    speakTextMale(text.trim());
}

// ──── Court verdict system (separate from penance, but similar) ────
function setActiveCourtVerdict(description, modifier = {}, durationMs = 600000) {
    gameState.activeCourtVerdict = {
        description,
        expiresAt: Date.now() + durationMs,
        modifier
    };
    saveState();
    updateFooterCourtVerdict();
}

function clearExpiredCourtVerdict() {
    if (gameState.activeCourtVerdict && Date.now() > gameState.activeCourtVerdict.expiresAt) {
        gameState.activeCourtVerdict = null;
        saveState();
    }
}

function updateFooterCourtVerdict() {
    // Combine with penance display if both active; this example simply appends
    const footer = document.getElementById('footerMsg');
    if (!footer) return;

    clearExpiredCourtVerdict();
    clearExpiredPenance();

    let parts = [];
    if (gameState.activePenance) parts.push(`🪪 Penance: ${gameState.activePenance.description}`);
    if (gameState.activeCourtVerdict) parts.push(`⚖️ Verdict: ${gameState.activeCourtVerdict.description}`);

    if (parts.length > 0) {
        footer.textContent = parts.join('  |  ');
    } else {
        footer.textContent = '📼 NIGHTFALLS VHS · COLLECT THE DARKNESS';
    }
}

// Patch handleTradeDecision to also apply court verdict trade rejection
const originalCourtHandleTradeDecision = handleTradeDecision;
handleTradeDecision = function(npc, npcTape, playerTape, decision) {
    clearExpiredCourtVerdict();
    if (gameState.activeCourtVerdict && gameState.activeCourtVerdict.modifier.tradeRejectChance) {
        if (decision.decision === 'accept' && Math.random() < gameState.activeCourtVerdict.modifier.tradeRejectChance) {
            decision = {
                decision: 'reject',
                message: "The court's verdict looms over this deal. It cannot proceed."
            };
        }
    }
    return originalCourtHandleTradeDecision(npc, npcTape, playerTape, decision);
};

// Apply cash penalty from court verdict during sales
const originalSellTape = sellTape;
sellTape = function(tape) {
    clearExpiredCourtVerdict();
    if (gameState.activeCourtVerdict && gameState.activeCourtVerdict.modifier.cashPenalty) {
        const penalty = gameState.activeCourtVerdict.modifier.cashPenalty;
        gameState.cash = Math.max(0, gameState.cash - penalty);
        saveState();
        showModal(`<h2>⚖️ Court Penalty</h2><p>The verdict costs you $${penalty} on this sale.</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
    }
    return originalSellTape(tape);
};

// Update refreshAll to include court verdict footer update
const originalRefreshAll = refreshAll;
refreshAll = function() {
    clearExpiredCourtVerdict();
    updateFooterCourtVerdict();
    originalRefreshAll();
};

async function generateNewStrangeCasesEpisodes() {
    const prompt = `You are the producer of "Sully’s Strange Cases". Generate a new 6‑segment investigation lineup. Return a JSON array of exactly 6 objects with keys: id, time (same slots), title, desc, type (must be exactly one of: casefile, witness, expert, forensic, questions, closed). Keep the deadpan, noir‑ish tone. JSON only.`;

    const newEps = JSON.parse(resp.replace(/```json|```/g, '').trim());
    if (Array.isArray(newEps) && newEps.length === 6) {
        const types = newEps.map(e => e.type).sort().join(',');
        if (types === 'casefile,closed,expert,forensic,questions,witness') {
            gameState.ch7Episodes = newEps;
            saveState();
            return;
        }
    }
    throw new Error('Invalid case lineup');
}

            respDiv.textContent = 'The line is being monitored. We must be brief.';
        }
        if (window.ch6Timeout) clearTimeout(window.ch6Timeout);
        window.ch6Timeout = setTimeout(restoreGuide, 5000);
    });
}

async function playDossierClosing(dialogue) {
    if (!gameState.geheimeWaffenTopic) {
        dialogue.textContent = "The dossier is empty. There is nothing to close.";
        return;
    }
    const topic = gameState.geheimeWaffenTopic.topic;
    const prompt = `You are Oberst Klaus Schreiber. Give a final, ominous warning about the cover-up of ${topic}. 2-3 sentences. End with "The truth cannot stay buried forever. Stay watchful."`;
    const text = await mistralChat([{role:'system', content:'You are Oberst Schreiber.'}, {role:'user', content:prompt}], 200);
    dialogue.textContent = '';
    typewriterEffect(dialogue, text.trim(), 25);
    speakTextMale(text.trim());

    // Reset the topic for the next night
    gameState.geheimeWaffenTopic = null;
    saveState();
}

// ──── Generate a new lineup ────
async function generateNewGeheimeWaffenEpisodes() {
    const prompt = `You are the producer of "Geheime Waffen", a serious, conspiracy-theory documentary series hosted by Oberst Klaus Schreiber. Generate a new 6-segment lineup for an episode covering a secret Nazi weapon or conspiracy. Return a JSON array of exactly 6 objects with keys: id, time (same slots), title, desc, type (must be exactly one of: dossier, footage, expert, blueprint, questions, closing). Keep the tone grave and urgent. JSON only.`;
    const resp = await mistralChat([{role:'system', content:'You are a documentary producer.'}, {role:'user', content:prompt}], 800);
    const newEps = JSON.parse(resp.replace(/```json|```/g, '').trim());
    if (Array.isArray(newEps) && newEps.length === 6) {
        const types = newEps.map(e => e.type).sort().join(',');
        if (types === 'blueprint,closing,dossier,expert,footage,questions') {
            gameState.ch6Episodes = newEps;
            saveState();
            return;
        }
    }
    throw new Error('Invalid dossier structure');
}
// ──── Helper: speak with a male voice (similar to your Elvira voice code but male) ────
function speakTextMale(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    const voices = speechSynthesis.getVoices();

    const maleNames = [
        'Google UK English Male',
        'Google US English Male',
        'Daniel',
        'Microsoft David',
        'Fred',
        'Alex',
        'Thomas',
        'James'
    ];

    let voice = null;
    for (const name of maleNames) {
        voice = voices.find(v => v.name.includes(name));
        if (voice) break;
    }
    if (!voice) {
        voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
    }

    if (voice) utterance.voice = voice;
    utterance.rate = 0.9;
    utterance.pitch = 0.95;
    speechSynthesis.speak(utterance);
}

    loadState(); refreshAll();
    document.querySelectorAll('.tab-btn').forEach(t => t.addEventListener('click', ()=> switchTab(t.dataset.tab)));
    document.getElementById('resetApiBtn').addEventListener('click', ()=>{ const key = prompt('Enter your Mistral API key:'); if (key && key.length > 10) { apiKey = key; localStorage.setItem('nightfalls_vhs_key', key); } });
    if (!apiKey) setTimeout(()=> document.getElementById('resetApiBtn').click(), 500);
        document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
})();
