<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Special+Elite&display=swap" rel="stylesheet">
    <title>NEEDFUL THINGS – Curio & Antique Dealer</title>
    <style>
        :root {
            --silver: #cccccc;
            --silver-glow: #ffffff;
            --silver-dim: #555555;
            --neon: #999999;
            --text-glow: 0 0 8px rgba(200,200,200,0.6), 0 0 20px rgba(200,200,200,0.25);
            --bg-deep: #0a0a0a;
            --panel-bg: #1a1a1a;
            --button-bg: linear-gradient(180deg, #2a2a2a 0%, #0a0a0a 100%);
            --border-light: #444444;
            --border-strong: #888888;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #020202;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Press Start 2P', monospace;
            background-image: radial-gradient(ellipse at center, #1a1a1a 0%, #010101 70%);
            overflow: hidden;
            user-select: text;
        }
        .crt-monitor {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 15px 12px 12px;
            box-shadow: 0 0 0 3px #0a0a0a, 0 0 0 6px #2a2a2a, 0 0 0 8px #050505, 0 20px 40px rgba(0, 0, 0, 0.9);
            width: 100%;
            height: 100%;
            max-height: 100%;
            display: flex;
            flex-direction: column;
        }
        .monitor-frame {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .screen-area {
            flex: 1;
            background: #0a0a0a;
            border-radius: 12px;
            padding: 8px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }
        .screen-glow {
            flex: 1;
            background: #080808;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.95), 0 0 15px rgba(200,200,200,0.08);
            min-height: 0;
        }
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0, 0, 0, 0.06) 3px, rgba(0, 0, 0, 0.06) 4px);
            pointer-events: none;
            z-index: 10;
        }
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 8;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.75);
            border-radius: 6px;
        }
        .screen-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 12;
            padding: 6px;
            padding-top: 8px;
            padding-bottom: 8px;
            min-height: 0;
            overflow-y: auto;
        }
        .title-bar {
            text-align: center;
            padding: 4px 0;
            border-bottom: 1px solid rgba(200,200,200,0.4);
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .title-bar .game-title {
            font-size: 11px;
            color: var(--silver);
            text-shadow: var(--text-glow);
            letter-spacing: 1px;
        }
        .title-bar .subtitle {
            font-size: 7px;
            color: #888888;
            margin-top: 2px;
        }
        .location-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .location-tabs button {
            flex: 1;
            background: var(--button-bg);
            border: 2px solid var(--border-light);
            color: #888888;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 6px 3px;
            cursor: pointer;
            border-radius: 4px;
            text-shadow: 0 0 4px rgba(180,180,180,0.4);
            transition: all 0.1s;
        }
        .location-tabs button.active {
            border-color: var(--silver);
            color: var(--silver-glow);
            text-shadow: var(--text-glow);
            box-shadow: 0 0 12px rgba(200,200,200,0.3);
        }
        .location-tabs button:active {
            transform: translateY(1px);
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 8px;
            background: rgba(15, 15, 15, 0.8);
            border: 1px solid var(--silver-dim);
            margin-bottom: 4px;
            font-size: 9px;
            color: #cccccc;
            text-shadow: 0 0 5px rgba(200,200,200,0.4);
            flex-shrink: 0;
        }
        .game-output {
            flex: 1 1 0;
            overflow-y: auto;
            padding: 6px;
            color: #dddddd;
            font-size: 18px;
            line-height: 1.45;
            text-shadow: 0 0 3px rgba(200,200,200,0.4);
            min-height: 0;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(200,200,200,0.15);
            margin-bottom: 4px;
            font-family: 'VT323', 'Special Elite', 'Press Start 2P', monospace;
            letter-spacing: 0.4px;
            white-space: pre-wrap;
        }
        .game-output::-webkit-scrollbar {
            width: 5px;
        }
        .game-output::-webkit-scrollbar-track {
            background: #020202;
        }
        .game-output::-webkit-scrollbar-thumb {
            background: #666666;
            border-radius: 3px;
        }
        .input-area {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 3px 6px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(200,200,200,0.35);
            border-radius: 4px;
            margin-bottom: 4px;
        }
        .prompt-symbol {
            color: var(--silver-glow);
            font-size: 16px;
        }
        .cmd-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e0e0e0;
            font-family: 'VT323', 'Special Elite', 'Press Start 2P', monospace;
            font-size: 18px;
            padding: 5px;
            outline: none;
            caret-color: #ffffff;
            text-shadow: 0 0 3px rgba(200,200,200,0.5);
            letter-spacing: 0.4px;
        }
        .cmd-input::placeholder {
            color: #666666;
        }
        .actions-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 3px 0;
            flex-shrink: 0;
            justify-content: center;
        }
        .actions-bar button {
            background: var(--button-bg);
            border: 2px solid var(--border-light);
            color: #cccccc;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 5px 6px;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 3px 0 #0a0a0a;
            text-shadow: 0 0 5px rgba(180,180,180,0.4);
            transition: all 0.1s;
            flex: 1 0 auto;
            min-width: 42px;
        }
        .actions-bar button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0a0a0a;
        }
        .actions-bar button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .monitor-brand {
            text-align: center;
            font-size: 7px;
            color: #888888;
            letter-spacing: 2px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .power-led {
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffffff, 0 0 20px rgba(255, 255, 255, 0.5);
            animation: ledPulse 3s infinite;
        }
        @keyframes ledPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.93);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 60;
            border-radius: 6px;
            flex-direction: column;
            gap: 10px;
        }
        .overlay.hidden {
            display: none !important;
        }
        .overlay-content {
            background: #0a0a0a;
            border: 2px solid #666666;
            padding: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 82%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(180,180,180,0.25);
            color: #dddddd;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            border-radius: 4px;
        }
        .overlay-content h3 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 13px;
            color: var(--silver);
            text-shadow: var(--text-glow);
        }
        .overlay-close {
            background: var(--button-bg);
            border: 1px solid var(--silver);
            color: var(--silver);
            font-family: 'Press Start 2P';
            font-size: 9px;
            padding: 7px 18px;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 8px;
            align-self: center;
        }
        #deal-overlay .overlay-content, #ledger-overlay .overlay-content {
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        #deal-text {
            flex: 1;
            overflow-y: auto;
            background: #050505;
            border: 1px solid #555555;
            padding: 8px;
            font-family: 'VT323', 'Special Elite', monospace;
            font-size: 18px;  /* Matches game output */
            line-height: 1.6;
            color: #f0f0f0;
            text-shadow: 0 0 3px rgba(220,220,220,0.4);
            margin-bottom: 10px;
            min-height: 0;
            white-space: pre-wrap;
        }
        #deal-input-area {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-top: auto;
            flex-wrap: wrap;
        }
        #deal-input-area input {
            flex: 1;
            background: #000;
            border: 1px solid #555;
            color: #e0e0e0;
            font-family: 'VT323', 'Special Elite', monospace;
            font-size: 16px;
            padding: 6px;
        }
        #deal-input-area button {
            background: var(--button-bg);
            border: 1px solid #888;
            color: #ddd;
            font-family: 'Press Start 2P';
            font-size: 9px;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            white-space: nowrap;
        }
        #deal-input-area button:hover {
            border-color: #fff;
            color: #fff;
        }
        #help-overlay .help-text {
            overflow-y: auto;
            flex: 1;
            font-size: 10px;
            line-height: 1.7;
            white-space: pre-wrap;
            color: #bbbbbb;
        }
    </style>
</head>
<body>
    <div class="crt-monitor">
        <div class="monitor-frame">
            <div class="screen-area">
                <div class="screen-glow">
                    <div class="scanlines"></div>
                    <div class="vignette"></div>
                    <div class="screen-content">
                        <div class="title-bar">
                            <span class="game-title">█▓▒░ NEEDFUL THINGS ░▒▓█</span>
                            <span class="subtitle">Curio & Antique Dealer · 1994</span>
                        </div>
                        <div class="location-tabs" id="locationTabs">
                            <button id="tabCounter" class="active">🛎 COUNTER</button>
                            <button id="tabStoreroom">📦 STOREROOM</button>
                            <button id="tabOffice">📜 OFFICE</button>
                        </div>
                        <div class="status-bar" id="statusBar">
                            <span>📅 Day <span id="dayDisplay">1</span></span>
                            <span>💼 <span id="customerPresence">🚪 Empty</span></span>
                            <span>📦 Stock: <span id="stockCount">0</span></span>
                        </div>
                        <div class="game-output" id="output"></div>
                        <div class="input-area">
                            <span class="prompt-symbol">&gt;</span>
                            <input type="text" class="cmd-input" id="cmd" placeholder="Type command..." autocomplete="off">
                            <button id="btnSend" style="background:var(--button-bg);border:2px solid #444;color:#cccccc;font-family:'Press Start 2P';font-size:10px;padding:5px 10px;cursor:pointer;border-radius:4px;">SEND</button>
                        </div>
                        <div class="actions-bar" id="actionsBar">
                            <button id="btnWait">⏳ WAIT</button>
                            <button id="btnTalk">💬 TALK</button>
                            <button id="btnShowItem">📿 SHOW ITEM</button>
                            <button id="btnDeal">🤝 DEAL</button>
                            <button id="btnClose">🔒 CLOSE</button>
                            <button id="btnRest">🌙 REST</button>
                            <button id="btnReflect">🤔 REFLECT</button>
                            <button id="btnBrowse">📋 BROWSE</button>
                            <button id="btnStock">➕ STOCK</button>
                            <button id="btnLedger">📖 LEDGER</button>
                            <button id="btnHelp">❓ HELP</button>
                            <button id="btnEndConv" style="display:none;">🛑 END TALK</button>
                        </div>
                    </div>
                </div>

                <!-- HELP OVERLAY -->
                <div class="overlay hidden" id="help-overlay">
                    <div class="overlay-content">
                        <h3>📖 COMMANDS & CONTROLS</h3>
                        <div class="help-text" id="helpText"></div>
                        <button class="overlay-close" id="closeHelp">CLOSE</button>
                    </div>
                </div>

                <!-- DEAL OVERLAY -->
                <div class="overlay hidden" id="deal-overlay">
                    <div class="overlay-content">
                        <h3>🤝 THE BARTER</h3>
                        <div id="deal-text"></div>
                        <div id="deal-input-area">
                            <input type="text" id="deal-input" placeholder="Type price or comment..." autocomplete="off">
                            <button id="deal-send">SEND</button>
                            <button id="deal-finalize">FINALIZE</button>
                        </div>
                        <button class="overlay-close" id="closeDeal">CANCEL DEAL</button>
                    </div>
                </div>

                <!-- LEDGER OVERLAY -->
                <div class="overlay hidden" id="ledger-overlay">
                    <div class="overlay-content">
                        <h3>📖 THE LEDGER</h3>
                        <div id="ledger-text"></div>
                        <button class="overlay-close" id="closeLedger">CLOSE</button>
                    </div>
                </div>

                <!-- KEY OVERLAY -->
                <div class="overlay hidden" id="key-overlay">
                    <div class="overlay-content" style="text-align:center;">
                        <h3>ENTER MISTRAL API KEY</h3>
                        <input type="text" id="api-key-input" placeholder="Paste your key here..." autocomplete="off" spellcheck="false" style="width:100%;padding:10px;background:#000;border:1px solid #666;color:#e0e0e0;font-family:'Press Start 2P';font-size:11px;margin-bottom:15px;">
                        <button id="save-key-btn" style="background:#1a1a1a;border:1px solid #aaa;color:#e0e0e0;font-family:'Press Start 2P';font-size:13px;padding:10px 24px;cursor:pointer;">SAVE KEY</button>
                        <p style="font-size:0.65em;margin-top:15px;color:#888;">Key stored locally in your browser.</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="monitor-brand"><span class="power-led"></span> CASTLE ROCK · NEEDFUL THINGS TERMINAL · 1994</div>
    </div>

    <script>
        // ═══════════════════════════════════════════
        // NEEDFUL THINGS – Curio & Antique Dealer
        // ═══════════════════════════════════════════
        let MISTRAL_KEY = '';
        const MODEL = 'mistral-small-latest';
        const API_URL = 'https://api.mistral.ai/v1/chat/completions';

        // ── DOM elements ──
        const outputEl = document.getElementById('output');
        const cmdInput = document.getElementById('cmd');
        const btnSend = document.getElementById('btnSend');
        const dayDisplay = document.getElementById('dayDisplay');
        const customerPresence = document.getElementById('customerPresence');
        const stockCountEl = document.getElementById('stockCount');
        const keyOverlay = document.getElementById('key-overlay');
        const helpOverlay = document.getElementById('help-overlay');
        const dealOverlay = document.getElementById('deal-overlay');
        const ledgerOverlay = document.getElementById('ledger-overlay');
        const dealText = document.getElementById('deal-text');
        const dealInput = document.getElementById('deal-input');
        const btnEndConv = document.getElementById('btnEndConv');
        const tabCounter = document.getElementById('tabCounter');
        const tabStoreroom = document.getElementById('tabStoreroom');
        const tabOffice = document.getElementById('tabOffice');

        // ── Sound System (same as VCR WATCH) ──
        let audioCtx = null;
        let soundEnabled = true;
        function initAudio() { if (!audioCtx) { audioCtx = new(window.AudioContext || window.webkitAudioContext)(); } if (audioCtx.state === 'suspended') { audioCtx.resume(); } }
        function ensureAudio() { initAudio(); return audioCtx && audioCtx.state !== 'suspended'; }
        function playTick() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.value = 400 + Math.random() * 400; gain.gain.setValueAtTime(0.01, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.015); osc.start(t); osc.stop(t + 0.015); } catch (e) {} }
        function playClick() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square'; osc.frequency.setValueAtTime(500, t); osc.frequency.exponentialRampToValueAtTime(180, t + 0.04); gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.04); osc.start(t); osc.stop(t + 0.04); } catch (e) {} }
        function playSuccess() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; [440, 554, 660].forEach((freq, i) => { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.value = freq; const st = t + i * 0.07; gain.gain.setValueAtTime(0.06, st); gain.gain.exponentialRampToValueAtTime(0.0001, st + 0.1); osc.start(st); osc.stop(st + 0.1); }); } catch (e) {} }
        function playError() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth'; osc.frequency.value = 70; gain.gain.setValueAtTime(0.04, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.18); osc.start(t); osc.stop(t + 0.18); } catch (e) {} }
        function playOpen() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(180, t); osc.frequency.exponentialRampToValueAtTime(600, t + 0.2); gain.gain.setValueAtTime(0.04, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.25); osc.start(t); osc.stop(t + 0.25); } catch (e) {} }
        function playClose() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(500, t); osc.frequency.exponentialRampToValueAtTime(100, t + 0.18); gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.2); osc.start(t); osc.stop(t + 0.2); } catch (e) {} }
        function playCreepy() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(330, t); osc.frequency.exponentialRampToValueAtTime(165, t + 0.6); gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.65); osc.start(t); osc.stop(t + 0.65); } catch (e) {} }

        // ═══════════════════════════════════════════
        // GAME STATE
        // ═══════════════════════════════════════════
        let gameState = {
            currentLocation: 'counter',
            currentDay: 1,
            customers: [],
            currentCustomer: null,
            shopOpen: true,
            conversationActive: false,
            dealActive: false,
            stock: [
                { id: 0, name: "a tarnished silver locket", description: "Engraved with intertwined initials. It feels heavier than it looks." },
                { id: 1, name: "a dusty chess set", description: "Hand-carved, the black pieces are grotesque caricatures." },
                { id: 2, name: "an old gramophone", description: "A brass horn still carries the scent of forgotten parlors." },
                { id: 3, name: "a porcelain doll", description: "Cracked across one eye, but remarkably lifelike." },
                { id: 4, name: "a fountain pen", description: "Nib still sharp; it writes even when dry." }
            ],
            transactions: [] // { day, customerName, itemName, price, consequence }
        };

        function loadState() {
            const saved = localStorage.getItem('needful_state');
            if (saved) { try { const p = JSON.parse(saved); gameState.currentDay = p.currentDay || 1; gameState.customers = p.customers || []; gameState.stock = p.stock || gameState.stock; gameState.transactions = p.transactions || []; } catch(e){} }
        }
        function saveState() {
            localStorage.setItem('needful_state', JSON.stringify({ currentDay: gameState.currentDay, customers: gameState.customers, stock: gameState.stock, transactions: gameState.transactions }));
        }

        function updateStatusBar() {
            dayDisplay.textContent = gameState.currentDay;
            customerPresence.textContent = gameState.currentCustomer ? '👤 ' + gameState.currentCustomer.name : '🚪 Empty';
            customerPresence.style.color = gameState.currentCustomer ? '#f0f0f0' : '#888888';
            stockCountEl.textContent = gameState.stock.length;
            updateActionButtons();
            updateLocationTabs();
        }

        function updateLocationTabs() {
            tabCounter.classList.toggle('active', gameState.currentLocation === 'counter');
            tabStoreroom.classList.toggle('active', gameState.currentLocation === 'storeroom');
            tabOffice.classList.toggle('active', gameState.currentLocation === 'office');
        }

        function updateActionButtons() {
            const loc = gameState.currentLocation;
            const hasCustomer = !!gameState.currentCustomer;
            const convActive = gameState.conversationActive;
            const dealActive = gameState.dealActive;

            document.getElementById('btnWait').style.display = (loc === 'counter' && !hasCustomer && gameState.shopOpen) ? '' : 'none';
            document.getElementById('btnTalk').style.display = (loc === 'counter' && hasCustomer && !convActive && !dealActive) ? '' : 'none';
            document.getElementById('btnShowItem').style.display = (loc === 'counter' && hasCustomer && !dealActive) ? '' : 'none';
            document.getElementById('btnDeal').style.display = (loc === 'counter' && hasCustomer && !dealActive) ? '' : 'none';
            document.getElementById('btnClose').style.display = (loc === 'counter' && gameState.shopOpen && !hasCustomer) ? '' : 'none';
            document.getElementById('btnRest').style.display = (loc === 'office') ? '' : 'none';
            document.getElementById('btnReflect').style.display = (loc === 'office') ? '' : 'none';
            document.getElementById('btnBrowse').style.display = (loc === 'storeroom') ? '' : 'none';
            document.getElementById('btnStock').style.display = (loc === 'storeroom') ? '' : 'none';
            document.getElementById('btnLedger').style.display = (loc === 'office') ? '' : 'none';
            btnEndConv.style.display = convActive ? '' : 'none';
        }

        function printInstant(text) { outputEl.innerHTML += text + '\n'; outputEl.scrollTop = outputEl.scrollHeight; }
        async function print(text, delay = 12) {
            return new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) { outputEl.innerHTML += text.charAt(i); outputEl.scrollTop = outputEl.scrollHeight; if (!gameState.dealActive) playTick(); i++; setTimeout(type, delay); }
                    else { outputEl.innerHTML += '\n'; outputEl.scrollTop = outputEl.scrollHeight; resolve(); }
                }
                type();
            });
        }

        // ── AI helpers ──
        async function callMistralJSON(sys, usr) {
            if (!MISTRAL_KEY) { printInstant('*** NO API KEY. Type SETKEY.'); playError(); return null; }
            try {
                const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${MISTRAL_KEY}`}, body:JSON.stringify({ model:MODEL, messages:[{role:'system',content:sys},{role:'user',content:usr}], temperature:0.9, response_format:{type:'json_object'} }) });
                if (!res.ok) { printInstant(`*** API ERROR ${res.status}`); playError(); return null; }
                const data = await res.json();
                return JSON.parse(data.choices[0].message.content);
            } catch(e) { printInstant('*** NETWORK ERROR'); playError(); return null; }
        }

        async function callMistralText(sys, usr) {
            if (!MISTRAL_KEY) { printInstant('*** NO API KEY.'); playError(); return null; }
            try {
                const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${MISTRAL_KEY}`}, body:JSON.stringify({ model:MODEL, messages:[{role:'system',content:sys},{role:'user',content:usr}], temperature:0.9 }) });
                if (!res.ok) { printInstant(`*** API ERROR ${res.status}`); playError(); return null; }
                const data = await res.json();
                return data.choices[0].message.content;
            } catch(e) { printInstant('*** NETWORK ERROR'); playError(); return null; }
        }

        // ── System Prompts ──
        const SYSTEM_CUSTOMER = `You create customers for a mysterious curio shop in 1994 that sells objects people desperately desire. Return ONLY valid JSON: { "name": "Full Name", "appearance": "short description", "occupation": "...", "deepest_desire": "the thing they want more than anything, often unhealthy", "secret": "a hidden shame or fear", "personality": "...", "greeting": "what they say when they enter" }`;
        const SYSTEM_FIND_ITEM = `You are the shopkeeper of a strange antique shop. Given a customer's deepest desire and the current stock list, generate an item that already exists in the shop (or one that "suddenly appears") that perfectly matches their need. Return JSON: { "item_name": "a description of the object", "description": "evocative details", "cost": "the non-monetary price the customer must pay (a memory, a favor, a lock of hair, etc.)", "effect": "a hint of what the object will do to them" }`;
        const SYSTEM_CONVERSATION = `You are a customer at a mysterious curio shop in 1994. Respond in character (1-3 sentences) to the shopkeeper. Slowly reveal your deepest desire if asked, but also show your guarded secret. Do not mention the item by name until the shopkeeper offers it.`;
        const SYSTEM_DEAL = `You are narrating the final barter between a shopkeeper and a customer over an otherworldly curio. The customer must pay a strange price. Describe the moment, the customer's reaction, and the eerie feeling as the deal closes. Return JSON: { "narration": "vivid description", "agreed": true/false, "price_paid": "what the customer actually gives" }`;
        const SYSTEM_REFLECTION = `Inner monologue of the keeper of a cursed antique shop in 1994. First-person, brief, melancholic. Reflect on the day, the people, and the items.`;
        const SYSTEM_CONSEQUENCE = `Write a short vignette (a few sentences) about what happens to a customer after they take home a cursed curio they bought. It should be dark, ironic, and tied to their desire. Return JSON: { "vignette": "text" }`;

        // ═══════════════════════════════════════════
        // GAME ACTIONS
        // ═══════════════════════════════════════════
        async function actionWait() {
            if (gameState.currentLocation !== 'counter' || gameState.currentCustomer || !gameState.shopOpen) { printInstant('Cannot wait now.'); playError(); return; }
            await print('You wait behind the dusty counter...');
            const data = await callMistralJSON(SYSTEM_CUSTOMER, 'Generate a new customer.');
            if (!data || !data.name) { await print('Nobody came in.'); return; }
            let customer = gameState.customers.find(c=>c.name.toLowerCase()===data.name.toLowerCase());
            if (!customer) {
                customer = { name: data.name, appearance: data.appearance, occupation: data.occupation, deepest_desire: data.deepest_desire, secret: data.secret, personality: data.personality, greeting: data.greeting, lastVisit: gameState.currentDay };
                gameState.customers.push(customer);
            } else {
                customer.greeting = data.greeting || 'Hello again.';
                customer.deepest_desire = data.deepest_desire || customer.deepest_desire;
                customer.lastVisit = gameState.currentDay;
            }
            gameState.currentCustomer = customer;
            saveState(); updateStatusBar();
            await print(`\n🔔 ${customer.name} enters. ${customer.appearance || ''}`);
            await print(`   "${customer.greeting}"`);
            playSuccess();
        }

        async function actionTalk() {
            if (!gameState.currentCustomer || gameState.conversationActive || gameState.dealActive) { printInstant('Cannot talk now.'); playError(); return; }
            gameState.conversationActive = true;
            updateActionButtons();
            await print(`\n💬 Speaking with ${gameState.currentCustomer.name}... (Type your words, /end to stop)`);
            playClick();
        }

        async function handleDialogue(playerText) {
            if (!gameState.conversationActive || !gameState.currentCustomer) return;
            const c = gameState.currentCustomer;
            const prompt = `Customer: ${c.name} (${c.personality}). Deepest desire: ${c.deepest_desire}. Secret: ${c.secret}.\nShopkeeper says: "${playerText}"\nRespond in character.`;
            const response = await callMistralText(SYSTEM_CONVERSATION, prompt);
            if (response) await print(`   ${c.name}: "${response.trim()}"`);
            else await print(`   ${c.name} nods.`);
            playClick();
        }

        function actionEndConversation() {
            if (!gameState.conversationActive) return;
            gameState.conversationActive = false;
            updateActionButtons();
            printInstant('You end the conversation.');
            playClose();
        }

        async function actionShowItem() {
            if (!gameState.currentCustomer || gameState.dealActive) return;
            if (gameState.stock.length === 0) { printInstant('Your stock is empty. Find or create something.'); playError(); return; }
            let list = '';
            gameState.stock.forEach((item, i) => { list += `[${i+1}] ${item.name}\n`; });
            await print(`\n📦 Your current stock:\n${list}\nType the number of the item to offer.`);
            playClick();
            gameState._awaitingItemChoice = true;
            updateActionButtons();
        }

        async function handleItemChoice(numStr) {
            if (!gameState._awaitingItemChoice) return false;
            const idx = parseInt(numStr) - 1;
            if (isNaN(idx) || idx < 0 || idx >= gameState.stock.length) {
                printInstant('Invalid item number.'); playError(); gameState._awaitingItemChoice = false; updateActionButtons(); return true;
            }
            const item = gameState.stock[idx];
            await print(`You offer the ${item.name}.`);
            await startDeal(item);
            gameState._awaitingItemChoice = false;
            updateActionButtons();
            return true;
        }

        async function startDeal(item) {
            if (!gameState.currentCustomer) return;
            gameState.dealActive = true;
            updateActionButtons();
            const c = gameState.currentCustomer;
            const data = await callMistralJSON(SYSTEM_DEAL, `Customer: ${c.name}, desire: ${c.deepest_desire}. Item offered: ${item.name} (${item.description}).`);
            if (data && data.narration) {
                dealText.innerHTML = data.narration + '\n\nPrice demanded: ' + (data.price_paid || 'something personal');
            } else {
                dealText.innerHTML = `They stare at the ${item.name}, breath held. "What do you want for it?"`;
            }
            showOverlay(dealOverlay);
            dealInput.focus();
            gameState._dealItem = item;
        }

        async function handleDealInput(text) {
            const item = gameState._dealItem;
            if (!item || !gameState.currentCustomer) return;
            const c = gameState.currentCustomer;
            if (text === '/finalize') {
                // Finalize the deal
                const data = await callMistralJSON(SYSTEM_DEAL, `Finalize deal. Customer: ${c.name}, item: ${item.name}. Shopkeeper agrees to price. Describe the moment.`);
                if (data && data.narration) {
                    dealText.innerHTML = data.narration + '\n\nDeal sealed.';
                } else {
                    dealText.innerHTML = 'They hand over something unseen. The deal is done.';
                }
                gameState.stock = gameState.stock.filter(i => i.id !== item.id);
                const transaction = { day: gameState.currentDay, customerName: c.name, itemName: item.name, price: 'a personal cost' };
                gameState.transactions.push(transaction);
                gameState.dealActive = false;
                gameState.currentCustomer = null;
                saveState(); updateStatusBar();
                dealInput.disabled = true;
                document.getElementById('deal-send').disabled = true;
                document.getElementById('deal-finalize').disabled = true;
                playSuccess();
                setTimeout(() => { hideOverlay(dealOverlay); dealInput.disabled = false; document.getElementById('deal-send').disabled = false; document.getElementById('deal-finalize').disabled = false; dealText.innerHTML = ''; }, 3000);
            } else {
                dealText.innerHTML += `\n> ${text}`;
                const response = await callMistralText(SYSTEM_CONVERSATION, `Deal negotiation. Shopkeeper says: "${text}". Customer: ${c.name}.`);
                if (response) dealText.innerHTML += `\n   "${response.trim()}"`;
                playClick();
            }
        }

        async function actionDeal() {
            if (!gameState.currentCustomer || gameState.dealActive) { printInstant('Cannot start a deal now.'); playError(); return; }
            if (gameState.stock.length === 0) { printInstant('Nothing to barter. Stock something first.'); playError(); return; }
            const c = gameState.currentCustomer;
            await print('You study the customer, then reach below the counter...');
            const itemData = await callMistralJSON(SYSTEM_FIND_ITEM, `Customer desire: ${c.deepest_desire}. Current stock: ${JSON.stringify(gameState.stock.map(i=>i.name))}.`);
            if (!itemData || !itemData.item_name) {
                await startDeal(gameState.stock[0]);
            } else {
                let found = gameState.stock.find(i=>i.name.toLowerCase()===itemData.item_name.toLowerCase());
                if (!found) {
                    found = { id: Date.now(), name: itemData.item_name, description: itemData.description || 'Unsettlingly familiar.' };
                    gameState.stock.push(found);
                }
                await print(`You produce ${found.name}.`);
                await startDeal(found);
            }
            saveState();
        }

        async function actionBrowse() {
            if (gameState.currentLocation !== 'storeroom') return;
            if (gameState.stock.length === 0) { printInstant('Stockroom is bare.'); playClick(); return; }
            let out = 'Items in stock:\n';
            gameState.stock.forEach((item, i) => { out += `  ${i+1}. ${item.name} – ${item.description}\n`; });
            await print(out);
            playClick();
        }

        async function actionStock() {
            if (gameState.currentLocation !== 'storeroom') return;
            await print('Describe the new item you place on the shelf:');
            gameState._awaitingStockDesc = true;
            updateActionButtons();
        }

        async function handleStockDesc(desc) {
            if (!gameState._awaitingStockDesc) return false;
            gameState._awaitingStockDesc = false;
            const newItem = { id: Date.now(), name: desc, description: 'You sense a history behind it.' };
            gameState.stock.push(newItem);
            saveState(); updateStatusBar();
            await print(`Added "${desc}" to stock.`);
            playSuccess();
            return true;
        }

        async function actionRest() {
            if (gameState.currentLocation !== 'office') return;
            await print('You lock the shop and retire to your office...');
            gameState.currentDay++; gameState.shopOpen = true;
            gameState.currentCustomer = null; gameState.dealActive = false; gameState.conversationActive = false;
            gameState.currentLocation = 'counter';
            saveState(); updateStatusBar();
            await print(`\n☀️ Day ${gameState.currentDay}. The shop bell jingles.`);
            const last = gameState.transactions[gameState.transactions.length-1];
            if (last && !last.consequence) {
                const cons = await callMistralJSON(SYSTEM_CONSEQUENCE, `Customer: ${last.customerName}, item: ${last.itemName}, desire: ...`);
                if (cons && cons.vignette) {
                    last.consequence = cons.vignette;
                    await print(`\n📖 Later, you hear: ${cons.vignette}`);
                }
                saveState();
            }
            playSuccess();
        }

        async function actionReflect() {
            if (gameState.currentLocation !== 'office') return;
            const dealsToday = gameState.transactions.filter(t=>t.day===gameState.currentDay).length;
            const ref = await callMistralText(SYSTEM_REFLECTION, `Day ${gameState.currentDay}. Deals made today: ${dealsToday}.`);
            if (ref) await print(`\n🤔 ${ref.trim()}`);
            else await print('\nYou stare at the ceiling, feeling the weight of your inventory.');
            playCreepy();
        }

        function actionOpenLedger() {
            if (gameState.currentLocation !== 'office') return;
            let text = '╔══════════════════════╗\n║   TRANSACTION LEDGER  ║\n╚══════════════════════╝\n\n';
            if (gameState.transactions.length === 0) text += 'No deals recorded yet.';
            else {
                gameState.transactions.forEach((t, i) => {
                    text += `Day ${t.day}: ${t.customerName} took "${t.itemName}"\n  Price: ${t.price}\n`;
                    if (t.consequence) text += `  Aftermath: ${t.consequence}\n\n`;
                });
            }
            document.getElementById('ledger-text').textContent = text;
            showOverlay(ledgerOverlay);
        }

        async function actionCloseShop() {
            if (gameState.currentLocation !== 'counter' || gameState.currentCustomer) { printInstant('Cannot close now.'); playError(); return; }
            gameState.shopOpen = false;
            await print('You flip the sign to CLOSED. Go to the office to rest.');
            playClose(); updateStatusBar();
        }

        function actionGoTo(loc) {
            if (gameState.conversationActive) { printInstant('End conversation first.'); playError(); return; }
            if (gameState.dealActive) { printInstant('Finish the deal first.'); playError(); return; }
            gameState.currentLocation = loc;
            updateStatusBar();
            const names = { counter:'front counter', storeroom:'dusty storeroom', office:'back office' };
            printInstant(`You step into the ${names[loc]}.`); playClick();
        }

        // ── Overlays ──
        function showOverlay(o) { o.classList.remove('hidden'); o.style.display='flex'; cmdInput.disabled=true; playOpen(); }
        function hideOverlay(o) { o.classList.add('hidden'); o.style.display=''; cmdInput.disabled=false; cmdInput.focus(); playClose(); }

        function openHelp() {
            document.getElementById('helpText').textContent = ` COMMANDS:
  WAIT       - Wait for a customer
  TALK       - Speak to the current customer
  SHOW ITEM  - Choose an item from your stock to offer
  DEAL       - Let the shop choose the right item & barter
  CLOSE      - Close the shop for the day
  REST       - Sleep in the office, advance day
  REFLECT    - Think about the day
  BROWSE     - Look at items in stock (storeroom)
  STOCK      - Add a new item by describing it (storeroom)
  LEDGER     - Read the transaction log (office)
  GO [loc]   - Move: counter / storeroom / office
  SETKEY     - Change API key
  MUTE/UNMUTE - Toggle sound
  /end       - End conversation`;
            showOverlay(helpOverlay);
        }

        // ── Command Router ──
        async function handleCommand(raw) {
            if (!raw) return;
            const upper = raw.toUpperCase().trim();
            const lower = raw.toLowerCase().trim();

            if (!dealOverlay.classList.contains('hidden')) {
                if (upper === 'MUTE') { soundEnabled=false; printInstant('Muted.'); return; }
                if (upper === 'UNMUTE') { soundEnabled=true; printInstant('Unmuted.'); playClick(); return; }
                await handleDealInput(raw);
                return;
            }

            if (gameState.conversationActive) {
                if (lower === '/end') { actionEndConversation(); return; }
                await handleDialogue(raw);
                return;
            }

            if (gameState._awaitingItemChoice && !isNaN(parseInt(raw))) {
                if (await handleItemChoice(raw)) return;
            }
            if (gameState._awaitingStockDesc) {
                if (await handleStockDesc(raw)) return;
            }

            printInstant(`> ${raw}`);
            playClick();

            if (upper === 'WAIT') await actionWait();
            else if (upper === 'TALK') await actionTalk();
            else if (upper === 'SHOW' || upper === 'SHOW ITEM') await actionShowItem();
            else if (upper === 'DEAL') await actionDeal();
            else if (upper === 'REST') await actionRest();
            else if (upper === 'REFLECT') await actionReflect();
            else if (upper === 'BROWSE') await actionBrowse();
            else if (upper === 'STOCK') await actionStock();
            else if (upper === 'LEDGER') actionOpenLedger();
            else if (upper === 'CLOSE') await actionCloseShop();
            else if (upper === 'HELP') openHelp();
            else if (upper === 'MUTE') { soundEnabled=false; printInstant('Muted.'); }
            else if (upper === 'UNMUTE') { soundEnabled=true; printInstant('Unmuted.'); playClick(); }
            else if (upper === 'CLEAR') { outputEl.innerHTML=''; playClick(); }
            else if (upper === 'SETKEY') {
                MISTRAL_KEY=''; localStorage.removeItem('needful_api_key');
                keyOverlay.classList.remove('hidden'); keyOverlay.style.display='flex'; playOpen();
            } else if (upper.startsWith('GO ')) {
                const loc = lower.slice(3).trim();
                const valid = {'counter':'counter','storeroom':'storeroom','office':'office'};
                if (valid[loc]) actionGoTo(valid[loc]);
                else { printInstant('Go where? counter / storeroom / office'); playError(); }
            } else { printInstant('Unknown command. Type HELP.'); playError(); }
        }

        // ── Event Listeners ──
        cmdInput.addEventListener('keydown', async e => {
            if (e.key==='Enter') { initAudio(); const raw=cmdInput.value.trim(); cmdInput.value=''; await handleCommand(raw); }
        });
        btnSend.addEventListener('click', async () => { initAudio(); const raw=cmdInput.value.trim(); cmdInput.value=''; await handleCommand(raw); });
        tabCounter.addEventListener('click', ()=> { initAudio(); actionGoTo('counter'); });
        tabStoreroom.addEventListener('click', ()=> { initAudio(); actionGoTo('storeroom'); });
        tabOffice.addEventListener('click', ()=> { initAudio(); actionGoTo('office'); });
        document.getElementById('btnWait').addEventListener('click', ()=> { initAudio(); handleCommand('WAIT'); });
        document.getElementById('btnTalk').addEventListener('click', ()=> { initAudio(); handleCommand('TALK'); });
        document.getElementById('btnShowItem').addEventListener('click', ()=> { initAudio(); handleCommand('SHOW ITEM'); });
        document.getElementById('btnDeal').addEventListener('click', ()=> { initAudio(); handleCommand('DEAL'); });
        document.getElementById('btnClose').addEventListener('click', ()=> { initAudio(); handleCommand('CLOSE'); });
        document.getElementById('btnRest').addEventListener('click', ()=> { initAudio(); handleCommand('REST'); });
        document.getElementById('btnReflect').addEventListener('click', ()=> { initAudio(); handleCommand('REFLECT'); });
        document.getElementById('btnBrowse').addEventListener('click', ()=> { initAudio(); handleCommand('BROWSE'); });
        document.getElementById('btnStock').addEventListener('click', ()=> { initAudio(); handleCommand('STOCK'); });
        document.getElementById('btnLedger').addEventListener('click', ()=> { initAudio(); actionOpenLedger(); });
        document.getElementById('btnHelp').addEventListener('click', ()=> { initAudio(); openHelp(); });
        btnEndConv.addEventListener('click', ()=> { initAudio(); actionEndConversation(); });
        document.getElementById('closeHelp').addEventListener('click', ()=> hideOverlay(helpOverlay));
        document.getElementById('closeDeal').addEventListener('click', ()=> {
            gameState.dealActive = false;
            gameState._dealItem = null;
            gameState.currentCustomer = null;
            hideOverlay(dealOverlay);
            updateStatusBar();
            printInstant('The customer leaves, unsatisfied.');
            playClose();
        });
        document.getElementById('closeLedger').addEventListener('click', ()=> hideOverlay(ledgerOverlay));
        document.getElementById('deal-send').addEventListener('click', async ()=> {
            const text = dealInput.value.trim();
            dealInput.value = '';
            await handleDealInput(text);
        });
        document.getElementById('deal-finalize').addEventListener('click', async ()=> {
            await handleDealInput('/finalize');
        });
        dealInput.addEventListener('keydown', async (e) => {
            if (e.key==='Enter') {
                const text = dealInput.value.trim();
                dealInput.value = '';
                await handleDealInput(text);
            }
        });
        document.addEventListener('keydown', e => {
            if (e.key==='Escape') {
                if (!helpOverlay.classList.contains('hidden')) hideOverlay(helpOverlay);
                if (!ledgerOverlay.classList.contains('hidden')) hideOverlay(ledgerOverlay);
                if (!dealOverlay.classList.contains('hidden') && !gameState.dealActive) hideOverlay(dealOverlay);
                if (gameState.conversationActive) actionEndConversation();
            }
        });

        // ── API key management ──
        let savedKey = localStorage.getItem('needful_api_key');
        if (!savedKey) { keyOverlay.classList.remove('hidden'); keyOverlay.style.display='flex'; } else MISTRAL_KEY = savedKey;
        document.getElementById('save-key-btn').addEventListener('click', ()=> {
            initAudio(); playClick();
            const key = document.getElementById('api-key-input').value.trim();
            if (key) { MISTRAL_KEY=key; localStorage.setItem('needful_api_key', key); keyOverlay.classList.add('hidden'); keyOverlay.style.display=''; playSuccess(); if(!window._booted){ window._booted=true; boot(); } }
        });

        async function boot() {
            loadState(); updateStatusBar();
            await print('╔══════════════════════════════════╗');
            await print('║   NEEDFUL THINGS                ║');
            await print('║   Curio & Antique Dealer · 1994 ║');
            await print('╚══════════════════════════════════╝');
            await print('');
            await print('The shop is dim, smelling of old wood');
            await print('and forgotten stories. The bell above');
            await print('the door is silent.');
            await print('');
            await print('Day 1. Type WAIT for a customer.');
            playCreepy();
            cmdInput.focus();
        }

        if (MISTRAL_KEY) { window._booted=true; boot(); }
        updateStatusBar();
    </script>
</body>
</html>
