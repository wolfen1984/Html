<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover" />
    <title>THE QUIET HOUR · 1983 · NOIR SCORE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Special+Elite&family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&family=Audiowide&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #020202;
            --screen-bg: #060606;
            --panel-bg: #0a0a0a;
            --text: #e8e8e8;
            --text-dim: #7a7a7a;
            --text-bright: #ffffff;
            --accent: #ffffff;
            --accent-dim: #3a3a3a;
            --accent2: #ccaa88;
            --accent2-dim: #443322;
            --border: #555;
            --border-glow: 0 0 18px #ffffff33, 0 0 40px #ffffff11;
            --border-glow2: 0 0 10px #ccaa8844, 0 0 24px #ccaa8822;
            --neon-white: #ffffff;
            --neon-glow: 0 0 8px #ffffff88, 0 0 24px #ffffff33, 0 0 50px #ffffff11;
            --gold: #dddddd;
            --gold-dim: #444;
            --green: #6a8a5a;
            --input-bg: #111111;
            --button-bg: #151515;
            --button-hover: #1f1f1f;
            --button-active: #181818;
            --bevel-light: #2a2a2a;
            --bevel-dark: #040404;
            --font-display: 'Orbitron', 'Rajdhani', sans-serif;
            --font-title: 'Orbitron', 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.04;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 26px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0f0f0f 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #0d0d0d;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #1f1f1f, 0 0 0 4px #0a0a0a, 0 0 0 8px #040404, 0 8px 48px #000000dd, 0 0 60px #ffffff0a;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #060606;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffffff99, 0 0 22px #ffffff44;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 10px #ffffff99, 0 0 22px #ffffff44;
            }
            50% {
                box-shadow: 0 0 16px #ffffffcc, 0 0 32px #ffffff66;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #4a4a4a;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #444;
            box-shadow: var(--border-glow), var(--border-glow2), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(255, 255, 255, var(--scanline-opacity)) 0px, rgba(255, 255, 255, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #080808;
            border-bottom: 3px solid #555;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 3px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #1a1a1a;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #666;
            border-radius: 2px;
            padding: 10px 14px;
            background: #040404;
            position: relative;
            box-shadow: inset 0 0 30px #ffffff08;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #ffffff;
            box-shadow: 0 0 14px #ffffff99;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #ccaa88;
            box-shadow: 0 0 8px #ccaa8844;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #ffffff;
            text-shadow: var(--neon-glow);
            letter-spacing: 4px;
            font-family: var(--font-title);
            line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #888;
            letter-spacing: 5px;
            margin-top: 3px;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 18px;
                letter-spacing: 2px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #2a2a2a #060606;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #060606;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #3a3a3a;
            border-top-color: #4a4a4a;
            border-left-color: #444;
            border-right-color: #2a2a2a;
            border-bottom-color: #1a1a1a;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text-bright);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #2a2a2a;
            border-left-color: #2a2a2a;
            border-bottom-color: #4a4a4a;
            border-right-color: #444;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #111;
        }
        .btn.accent {
            background: #111;
            border-color: #555;
            border-top-color: #777;
            border-left-color: #666;
            border-right-color: #333;
            border-bottom-color: #1a1a1a;
            color: #ffffff;
            box-shadow: 0 2px 0 #00000044, 0 0 14px #ffffff22;
        }
        .btn.accent:active {
            border-top-color: #333;
            border-left-color: #333;
            border-bottom-color: #777;
            border-right-color: #666;
            box-shadow: 0 0px 0 #00000044, 0 0 20px #ffffff44;
        }
        .btn.accent2 {
            background: #1a1410;
            border-color: #4a3a30;
            border-top-color: #6a4a3a;
            border-left-color: #5a4030;
            border-right-color: #3a2a20;
            border-bottom-color: #1a100a;
            color: #eeddcc;
            box-shadow: 0 2px 0 #00000044, 0 0 12px #ccaa8833;
            text-shadow: 0 0 8px #ccaa8866;
        }
        .btn.accent2:active {
            border-top-color: #3a2a20;
            border-left-color: #3a2a20;
            border-bottom-color: #6a4a3a;
            border-right-color: #5a4030;
            box-shadow: 0 0px 0 #00000044, 0 0 20px #ccaa8855;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .quiet-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #080808;
            border: 2px solid #555;
            padding: 15px;
            border-radius: 3px;
            box-shadow: 0 0 20px #ffffff15, 0 0 40px #ccaa8810;
            position: relative;
        }
        .quiet-stage::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffffff66, #ffffffaa, #ffffff66, transparent);
            z-index: 2;
            pointer-events: none;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #666;
            box-shadow: 0 0 22px #ffffff33, 0 0 40px #ffffff18, 0 0 0 2px #1a1a1a;
            object-fit: cover;
            flex-shrink: 0;
            background: #0a0a0a;
        }
        .speech-bubble {
            flex: 1;
            background: #111;
            border: 2px solid #555;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #e8e8e8;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: inset 0 0 20px #00000055, 0 0 12px #ffffff15;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #555 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #080808;
            border: 1px solid #333;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #151515;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #555;
            box-shadow: 0 0 20px #ffffff22, 0 0 30px #ccaa8818, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #080808;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(2, 2, 2, 0.85) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 13px;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow: 0 0 10px #ffffff99, 0 0 30px #ffffff55, 0 2px 4px #000000, 0 0 60px #ffffff11;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom, rgba(6, 6, 6, 0.9) 0%, rgba(6, 6, 6, 0.7) 40%, transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 15px;
            letter-spacing: 1.5px;
            color: #eeddcc;
            text-shadow: 0 0 8px #ccaa8866, 0 0 20px #ffffff33, 0 2px 4px #000000;
            background: linear-gradient(to top, rgba(2, 2, 2, 0.9) 0%, rgba(2, 2, 2, 0.6) 50%, transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 10px;
                letter-spacing: 2px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 12px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #444;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #dddddd;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 10px #ffffff33;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0e0e0e;
            border: 1px solid #3a3a3a;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #aaa;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #ddd;
        }
        .guide-desc {
            font-size: 15px;
            color: #777;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0e0e0e;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #555;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #e0e0e0;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #151515;
            border: 2px solid #555;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #e0e0e0;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #fff;
            box-shadow: 0 0 14px #ffffff44;
        }
        .loading-text {
            color: #bbb;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #040404;
            border-top: 1px solid #333;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #4a4a4a;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #555;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #222;
            color: #555;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #555;
            color: #888;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #e8e8e8;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
        .score-indicator {
            font-family: var(--font-mono);
            font-size: 10px;
            color: #8899aa;
            letter-spacing: 1px;
            padding: 3px 8px;
            border: 1px solid #3a3a3a;
            border-radius: 2px;
            display: inline-block;
            background: #080810;
            margin-top: 4px;
        }
        .score-indicator .active {
            color: #ccaa88;
        }
        .score-indicator .dim {
            color: #4a4a4a;
        }
        .progress-bar {
            width: 100%;
            height: 2px;
            background: #1a1a1a;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #ccaa88;
            border-radius: 2px;
            transition: width 0.3s;
            box-shadow: 0 0 10px #ccaa8844;
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">THE QUIET HOUR · CRT-83</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE QUIET<br>HOUR</div>
                    <div class="marquee-sub">⏤ 1983 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="quietHourPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🕐 THE QUIET HOUR · NOIR SCORE · AI COMPOSED</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('quiet_hour_key') || '';

            const DEFAULT_STATE = {
                qhEpisodes: [],
                qhPerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
                <h2>🕐 Raymond Cross</h2>
                <p style="text-align:left;">
                    <strong>Show:</strong> <em>The Quiet Hour</em><br>
                    <strong>Bio:</strong> A former radio announcer from the Midwest, Cross has a voice like warm amber and eyes that have seen too much. He broadcasts from a modest studio in an unnamed town, introducing each story with the calm certainty that the quietest moments are the most dangerous. He never raises his voice. He doesn't have to.
                </p>
            `;

            // ─── NOIR AUDIO ENGINE ──────────────────────────────────────────────
            let audioCtx = null;
            let ambientSource = null,
                ambientGain = null,
                ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null,
                masterGain = null,
                dryGain = null,
                wetGain = null;
            let sectionAmbientActive = null,
                stringAmbientActive = null;
            let crossfadeTimeout = null,
                masterCompressor = null;

            let patternPlayerActive = null,
                patternPlayerTimeout = null;
            let patternStep = 0,
                patternBPM = 50;
            let currentSectionPatterns = [];
            let currentVariationIdx = 0,
                barsInVariation = 0;
            let fillActive = false;
            let sectionThemeScore = null;

            // ─── NOIR THEMES (AI will override these with its own) ──────────────
            // These are only used if AI doesn't provide a theme, but we want "no fallbacks"
            // so we'll treat missing AI data as an error. This map is kept for reference
            // but NOT used as a fallback in the pattern player.
            const NOIR_THEME_REF = {
                intro: { bpm: 52, bass: [0, 0, 7, 0, 0, 0, 7, 0], kick: [1, 0, 0, 0, 1, 0, 0, 0],
                    snare: [0, 0, 0, 1, 0, 0, 0, 1], hat: [0, 0, 1, 0, 0, 0, 1, 0] },
                meeting: { bpm: 58, bass: [0, 7, 5, 3, 0, 7, 5, 3], kick: [1, 0, 1, 0, 1, 0, 1, 0],
                    snare: [0, 0, 0, 1, 0, 0, 0, 1], hat: [0, 0, 1, 0, 1, 0, 1, 0] },
                tension: { bpm: 65, bass: [0, 3, 5, 7, 8, 7, 5, 3], kick: [1, 0, 1, 1, 1, 0, 1, 0],
                    snare: [0, 0, 1, 0, 0, 0, 1, 0], hat: [1, 0, 1, 0, 1, 0, 1, 0] },
                revelation: { bpm: 72, bass: [0, 7, 0, 7, 3, 7, 3, 7], kick: [1, 1, 1, 1, 1, 1, 1, 1],
                    snare: [0, 1, 0, 1, 0, 1, 0, 1], hat: [1, 1, 1, 1, 1, 1, 1, 1] },
                aftermath: { bpm: 48, bass: [0, 7, 5, 0, 7, 5, 0, 7], kick: [1, 0, 0, 0, 1, 0, 0, 0],
                    snare: [0, 0, 0, 1, 0, 0, 0, 1], hat: [0, 0, 1, 0, 0, 0, 1, 0] }
            };

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.0005;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            function ensureAudioNodes(ctx) {
                if (!masterGain) {
                    masterGain = ctx.createGain();
                    masterGain.gain.value = 0.22;
                    masterCompressor = ctx.createDynamicsCompressor();
                    masterCompressor.threshold.value = -26;
                    masterCompressor.knee.value = 28;
                    masterCompressor.ratio.value = 10;
                    masterCompressor.attack.value = 0.004;
                    masterCompressor.release.value = 0.3;
                    masterGain.connect(masterCompressor);
                    masterCompressor.connect(ctx.destination);
                }
                if (!dryGain) {
                    dryGain = ctx.createGain();
                    dryGain.gain.value = 0.75;
                    dryGain.connect(masterGain);
                }
                if (!wetGain) {
                    wetGain = ctx.createGain();
                    wetGain.gain.value = 0.55;
                    if (reverbNode) wetGain.connect(reverbNode);
                    else wetGain.connect(masterGain);
                }
                if (!reverbNode) {
                    initReverb(ctx);
                    if (reverbNode) wetGain.connect(reverbNode);
                }
            }

            async function getAudioContext() {
                try {
                    if (!audioCtx) {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                        createKeepAlive(audioCtx);
                        initReverb(audioCtx);
                        ensureAudioNodes(audioCtx);
                    }
                    if (audioCtx.state === 'suspended') await audioCtx.resume();
                    ensureAudioNodes(audioCtx);
                    return audioCtx;
                } catch (err) { console.error('Audio context error:', err); throw err; }
            }

            function initReverb(ctx) {
                if (reverbNode) return;
                try {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 3.8;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.8));
                        const lateDecay = Math.exp(-i / (sampleRate * 2.2)) * 0.3;
                        left[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                        right[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                    if (masterGain) reverbNode.connect(masterGain);
                } catch (err) {
                    console.warn('Reverb init error:', err);
                    reverbNode = ctx.createGain();
                    reverbNode.gain.value = 0.5;
                    if (masterGain) reverbNode.connect(masterGain);
                }
            }

            // ─── NOIR INSTRUMENTS ────────────────────────────────────────────────

            // Noir Piano: warm, soft, with gentle reverb
            function createNoirPiano(ctx, rootFreq, duration, intensity = 0.5, chord = false) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.18, now + 0.08);
                    gainNode.gain.setValueAtTime(intensity * 0.18, now + duration * 0.5);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.5);

                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 1200;
                    filter.Q.value = 1.8;

                    const intervals = chord ? [0, 4, 7] : [0];
                    const allOscs = [];
                    intervals.forEach(interval => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        const freq = rootFreq * Math.pow(2, interval / 12);
                        osc.frequency.setValueAtTime(freq * 0.998, now);
                        osc.frequency.exponentialRampToValueAtTime(freq, now + 0.06);
                        const damp = ctx.createOscillator();
                        damp.type = 'sine';
                        damp.frequency.value = 5 + Math.random() * 3;
                        const dampG = ctx.createGain();
                        dampG.gain.value = 0.5 + Math.random() * 0.5;
                        damp.connect(dampG);
                        dampG.connect(osc.frequency);
                        allOscs.push(osc, damp);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.5;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    allOscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 0.8); });
                } catch (err) { console.warn('Noir piano error:', err); }
            }

            // Noir Upright Bass: deep, woody, with attack
            function createNoirBass(ctx, semitone, intensity = 0.5, duration = 2.0, rootFreq = 38) {
                try {
                    const now = ctx.currentTime;
                    const freq = rootFreq * Math.pow(2, semitone / 12);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.25, now + 0.04);
                    gainNode.gain.setValueAtTime(intensity * 0.25, now + duration * 0.6);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.4);

                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq * 0.97, now);
                    osc.frequency.exponentialRampToValueAtTime(freq, now + 0.08);

                    const osc2 = ctx.createOscillator();
                    osc2.type = 'triangle';
                    osc2.frequency.value = freq * 2;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.08 * intensity;

                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(160 + semitone * 3, now);
                    filter.frequency.exponentialRampToValueAtTime(90 + semitone * 2, now + duration);
                    filter.Q.value = 2.8;

                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);

                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.4;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);

                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + duration + 0.5);
                    osc2.stop(now + duration + 0.5);
                } catch (err) { console.warn('Noir bass error:', err); }
            }

            // Brushed Kick: soft, thumpy
            function createNoirKick(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.7, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(110, now);
                    osc.frequency.exponentialRampToValueAtTime(30, now + 0.14);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 150;
                    filter.Q.value = 1.5;
                    osc.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.28);
                } catch (err) { console.warn('Noir kick error:', err); }
            }

            // Brushed Snare: soft, with brush texture
            function createNoirSnare(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.5, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.18);

                    const bufferSize = ctx.sampleRate * 0.07;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        const env = Math.exp(-i / (ctx.sampleRate * 0.022));
                        data[i] = (Math.random() * 2 - 1) * env * 0.5;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;

                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(70, now + 0.07);
                    const oscGain = ctx.createGain();
                    oscGain.gain.value = 0.15 * intensity;

                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 280;
                    filter.Q.value = 0.9;

                    noise.connect(filter);
                    osc.connect(oscGain);
                    oscGain.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    osc.start(now);
                    noise.stop(now + 0.1);
                    osc.stop(now + 0.1);
                } catch (err) { console.warn('Noir snare error:', err); }
            }

            // Brushed Hi-Hat: soft, airy
            function createNoirHat(ctx, intensity = 0.3) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.35, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05);

                    const bufferSize = ctx.sampleRate * 0.02;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        const env = Math.exp(-i / (ctx.sampleRate * 0.008));
                        data[i] = (Math.random() * 2 - 1) * env * 0.35;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.value = 4500;
                    filter.Q.value = 0.5;
                    noise.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    noise.stop(now + 0.06);
                } catch (err) { console.warn('Noir hat error:', err); }
            }

            // Noir String Pad: warm, film noir strings
            function createNoirStringPad(ctx, rootFreq, duration, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.12, now + 2);
                    gainNode.gain.setValueAtTime(intensity * 0.12, now + duration - 2);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1);

                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 500 + intensity * 300;
                    filter.Q.value = 2.0;

                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.03;
                    const lfoGain = ctx.createGain();
                    lfoGain.gain.value = 60;
                    lfo.connect(lfoGain);
                    lfoGain.connect(filter.frequency);

                    const allOscs = [];
                    const intervals = [0, 4, 7, 12, 16];
                    intervals.forEach(interval => {
                        const osc = ctx.createOscillator();
                        osc.type = 'triangle';
                        const detune = (Math.random() - 0.5) * 4;
                        osc.frequency.value = rootFreq * Math.pow(2, interval / 12) * Math.pow(2,
                            detune / 1200);
                        const vib = ctx.createOscillator();
                        vib.type = 'sine';
                        vib.frequency.value = 3 + Math.random() * 2;
                        const vibG = ctx.createGain();
                        vibG.gain.value = 1.5 + Math.random() * 2;
                        vib.connect(vibG);
                        vibG.connect(osc.frequency);
                        allOscs.push(osc, vib);
                        osc.connect(filter);
                    });

                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.6;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);

                    allOscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1.5); });
                    lfo.start(now);
                    lfo.stop(now + duration + 1.5);
                } catch (err) { console.warn('Noir string pad error:', err); }
            }

            // Noir Muted Trumpet: warm, melancholy
            function createNoirTrumpet(ctx, rootFreq, duration, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 0.15);
                    gainNode.gain.setValueAtTime(intensity * 0.2, now + duration * 0.5);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.6);

                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.setValueAtTime(rootFreq * 2.5, now);
                    filter.frequency.exponentialRampToValueAtTime(rootFreq * 1.8, now + duration * 0.5);
                    filter.Q.value = 4;

                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(rootFreq * 0.99, now);
                    osc.frequency.exponentialRampToValueAtTime(rootFreq, now + 0.1);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'triangle';
                    osc2.frequency.value = rootFreq * 1.002;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.3;

                    const vibrato = ctx.createOscillator();
                    vibrato.type = 'sine';
                    vibrato.frequency.value = 4.5;
                    const vibG = ctx.createGain();
                    vibG.gain.value = 3;
                    vibrato.connect(vibG);
                    vibG.connect(osc.frequency);

                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);

                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.55;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);

                    osc.start(now);
                    osc2.start(now);
                    vibrato.start(now);
                    osc.stop(now + duration + 0.8);
                    osc2.stop(now + duration + 0.8);
                    vibrato.stop(now + duration + 0.8);
                } catch (err) { console.warn('Noir trumpet error:', err); }
            }

            // Noir Sax: breathy, emotional
            function createNoirSax(ctx, rootFreq, duration, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.18, now + 0.2);
                    gainNode.gain.setValueAtTime(intensity * 0.18, now + duration * 0.4);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.5);

                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(800, now);
                    filter.frequency.exponentialRampToValueAtTime(400, now + duration * 0.6);
                    filter.Q.value = 2.5;

                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(rootFreq * 0.98, now);
                    osc.frequency.exponentialRampToValueAtTime(rootFreq, now + 0.12);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'sine';
                    osc2.frequency.value = rootFreq * 1.5;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.12;

                    const vibrato = ctx.createOscillator();
                    vibrato.type = 'sine';
                    vibrato.frequency.value = 5.5 + Math.random() * 1.5;
                    const vibG = ctx.createGain();
                    vibG.gain.value = 4 + Math.random() * 3;
                    vibrato.connect(vibG);
                    vibG.connect(osc.frequency);

                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);

                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.5;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);

                    osc.start(now);
                    osc2.start(now);
                    vibrato.start(now);
                    osc.stop(now + duration + 0.7);
                    osc2.stop(now + duration + 0.7);
                    vibrato.stop(now + duration + 0.7);
                } catch (err) { console.warn('Noir sax error:', err); }
            }

            // ─── PATTERN PLAYER ──────────────────────────────────────────────────

            function expandPattern(arr) {
                if (!Array.isArray(arr)) {
                    throw new Error('expandPattern: expected array, got ' + typeof arr);
                }
                arr = arr.map(x => typeof x === 'number' ? x : 0);
                return arr.flatMap(x => [x, x]);
            }

            function startEvolvingPatternPlayer(themeName, rootFreq = 38, scoreData = null) {
                stopPatternPlayer();

                if (!scoreData || !scoreData[themeName]) {
                    throw new Error('No AI score data for theme: ' + themeName);
                }
                const theme = scoreData[themeName];
                if (typeof theme.bpm !== 'number' || theme.bpm < 30 || theme.bpm > 120) {
                    throw new Error('Invalid bpm for theme: ' + themeName);
                }

                const bass = expandPattern(theme.bass);
                const kick = expandPattern(theme.kick);
                const snare = expandPattern(theme.snare);
                const hat = expandPattern(theme.hat);

                const variations = [{
                    name: 'AI',
                    bars: 8,
                    bass: bass,
                    kick: kick,
                    snare: snare,
                    hat: hat
                }];

                currentSectionPatterns = variations;
                currentVariationIdx = 0;
                barsInVariation = 0;
                patternStep = 0;
                patternBPM = theme.bpm;
                fillActive = false;

                const stepDuration = 60 / patternBPM / 4;
                patternPlayerActive = { active: true, theme: themeName };

                function getCurrentPattern() {
                    return currentSectionPatterns[0];
                }

                function playStep() {
                    if (!patternPlayerActive || !patternPlayerActive.active) return;
                    const ctx = audioCtx;
                    if (!ctx) { patternPlayerTimeout = setTimeout(playStep, 100); return; }

                    const step = patternStep % 16;
                    const current = getCurrentPattern();

                    let bassSemitone = current.bass[step] || 0;
                    if (bassSemitone !== 0) {
                        const dur = 1.6 + Math.random() * 0.4;
                        const inten = 0.4 + (bassSemitone / 30);
                        createNoirBass(ctx, bassSemitone, inten, dur, rootFreq);
                    }

                    if ((current.kick[step] || 0) === 1) createNoirKick(ctx, 0.55);
                    if ((current.snare[step] || 0) === 1) createNoirSnare(ctx, 0.45);
                    if ((current.hat[step] || 0) === 1 && Math.random() < 0.6) createNoirHat(ctx, 0.25);

                    patternStep++;
                    if (patternStep % 16 === 0) {
                        barsInVariation++;
                        if (barsInVariation >= current.bars) barsInVariation = 0;
                    }

                    patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
                }

                patternPlayerTimeout = setTimeout(playStep, 50);
            }

            function stopPatternPlayer() {
                if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout);
                    patternPlayerTimeout = null; }
                if (patternPlayerActive) { patternPlayerActive.active = false;
                    patternPlayerActive = null; }
                patternStep = 0;
                currentSectionPatterns = [];
                currentVariationIdx = 0;
                barsInVariation = 0;
                fillActive = false;
            }

            // ─── AMBIENT LAYER (NOIR) ───────────────────────────────────────────

            function startNoirAmbientLayer(themeName, scoreData) {
                if (!audioCtx) return;
                stopSectionAmbient();

                const ctx = audioCtx;
                const now = ctx.currentTime;

                // Determine character from theme name
                const isIntro = themeName === 'intro';
                const isMeeting = themeName === 'meeting';
                const isTension = themeName === 'tension';
                const isRevelation = themeName === 'revelation';
                const isAftermath = themeName === 'aftermath';

                const rootFreq = isAftermath ? 42 : isRevelation ? 48 : isTension ? 45 : isMeeting ? 50 : 44;
                const intensity = isRevelation ? 0.55 : isTension ? 0.45 : isMeeting ? 0.35 : isAftermath ? 0.25 : 0.3;

                // String pad
                createNoirStringPad(ctx, rootFreq, 999, intensity * 0.6);

                // Piano chords on a loop
                let pianoInterval = null;

                function schedulePiano() {
                    if (!sectionAmbientActive) return;
                    const now2 = ctx.currentTime;
                    const chordRoot = rootFreq * (1 + (Math.random() - 0.5) * 0.08);
                    const dur = 3 + Math.random() * 4;
                    const inten = intensity * 0.5 * (0.7 + Math.random() * 0.3);
                    createNoirPiano(ctx, chordRoot, dur, inten, true);
                    const delay = 4 + Math.random() * 6;
                    pianoInterval = setTimeout(schedulePiano, delay * 1000);
                }
                pianoInterval = setTimeout(schedulePiano, 1000);

                // Trumpet or sax for color
                if (isRevelation || isTension) {
                    setTimeout(() => {
                        if (!sectionAmbientActive) return;
                        const freq = rootFreq * 1.5 * (1 + (Math.random() - 0.5) * 0.06);
                        const dur = 5 + Math.random() * 5;
                        const inten = intensity * 0.4;
                        if (Math.random() > 0.5) {
                            createNoirTrumpet(ctx, freq, dur, inten);
                        } else {
                            createNoirSax(ctx, freq, dur, inten);
                        }
                    }, 3000 + Math.random() * 4000);
                }

                sectionAmbientActive = {
                    stop: () => {
                        if (pianoInterval) { clearTimeout(pianoInterval);
                            pianoInterval = null; }
                        sectionAmbientActive = null;
                    }
                };

                // Start pattern player with AI score
                try {
                    startEvolvingPatternPlayer(themeName, rootFreq, scoreData);
                } catch (err) {
                    console.warn('Pattern player error:', err.message);
                    // No fallback — we throw and let the caller handle it
                }
            }

            function transitionSectionTheme(themeName, scoreData) {
                if (scoreData) sectionThemeScore = scoreData;
                startNoirAmbientLayer(themeName, scoreData);
            }

            function stopSectionAmbient() {
                if (sectionAmbientActive) { sectionAmbientActive.stop();
                    sectionAmbientActive = null; }
                stopPatternPlayer();
                clearTimeout(crossfadeTimeout);
            }

            // ─── MASTER playSound (NOIR) ─────────────────────────────────────────

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    if (!ctx) return;
                    const now = ctx.currentTime;
                    const rootFreq = 44 + Math.random() * 20;

                    switch (type) {
                        case 'piano':
                            createNoirPiano(ctx, rootFreq, 3 + Math.random() * 3, intensity * 0.5, true);
                            break;
                        case 'piano_stab':
                            createNoirPiano(ctx, rootFreq * 1.2, 1.5, intensity * 0.6, false);
                            break;
                        case 'bass':
                            const semitone = Math.floor(Math.random() * 8);
                            createNoirBass(ctx, semitone, intensity * 0.6, 1.8 + Math.random() * 1.2, 38);
                            break;
                        case 'kick':
                            createNoirKick(ctx, intensity * 0.6);
                            break;
                        case 'snare':
                            createNoirSnare(ctx, intensity * 0.5);
                            break;
                        case 'hat':
                            createNoirHat(ctx, intensity * 0.3);
                            break;
                        case 'string_pad':
                            createNoirStringPad(ctx, rootFreq, 8 + Math.random() * 8, intensity * 0.4);
                            break;
                        case 'trumpet':
                            createNoirTrumpet(ctx, rootFreq * 1.4, 4 + Math.random() * 4, intensity * 0.5);
                            break;
                        case 'sax':
                            createNoirSax(ctx, rootFreq * 1.3, 4 + Math.random() * 4, intensity * 0.5);
                            break;
                        case 'swell':
                            createNoirStringPad(ctx, rootFreq * 0.8, 6 + Math.random() * 4, intensity * 0.5);
                            setTimeout(() => {
                                createNoirTrumpet(ctx, rootFreq * 1.6, 3, intensity * 0.4);
                            }, 800);
                            break;
                        case 'tension':
                            createNoirStringPad(ctx, rootFreq * 0.9, 5, intensity * 0.3);
                            setTimeout(() => {
                                createNoirPiano(ctx, rootFreq * 0.7, 2, intensity * 0.25, true);
                            }, 400);
                            break;
                        case 'bell': {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 55 + Math.random() * 20;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0, now);
                            gain.gain.linearRampToValueAtTime(intensity * 0.25, now + 0.1);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 3.5);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 400;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(now);
                            osc.stop(now + 3.5);
                            break;
                        }
                        case 'thunder': {
                            const bufferSize = ctx.sampleRate * 0.7;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.45));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(intensity * 0.35, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 90;
                            filter.Q.value = 0.5;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(now);
                            source.stop(now + 1.0);
                            break;
                        }
                        case 'heartbeat':
                            createNoirKick(ctx, intensity * 0.7);
                            setTimeout(() => createNoirKick(ctx, intensity * 0.6), 220);
                            break;
                        case 'climax':
                            createNoirStringPad(ctx, rootFreq * 0.7, 8, intensity * 0.5);
                            setTimeout(() => createNoirTrumpet(ctx, rootFreq * 1.8, 5, intensity * 0.6), 500);
                            setTimeout(() => createNoirSax(ctx, rootFreq * 1.5, 4, intensity * 0.5), 1200);
                            break;
                        default:
                            console.warn('Unknown sound type:', type);
                    }
                } catch (err) { console.warn('playSound error:', err); }
            }

            // ─── AMBIENT DRONE (minimal) ─────────────────────────────────────────

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.15, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;

                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = 50 + Math.random() * 15;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 200;
                    filter.Q.value = 1.5;
                    osc.connect(filter);
                    filter.connect(gainNode);
                    osc.start(now);
                    const source = { osc };
                    ambientSource = source;

                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) { console.warn('playAmbient error:', err); }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 400);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 28000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`);
                    }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') throw new Error('Request timed out. Please try again.');
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', 1980s Americana, moody cinematic, grainy film still, stark contrast, film noir shadows')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e;
                        await new Promise(r => setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else { clearInterval(timer);
                            resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                return new Promise((resolve) => {
                    if (!text) { resolve(); return; }
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice)
                            break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = 0.6;
                    utterance.pitch = 0.9;
                    utterance.onend = () => resolve();
                    utterance.onerror = () => resolve();
                    speechSynthesis.speak(utterance);
                });
            }
