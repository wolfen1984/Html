            // ─── STORY & SCORE GENERATION ──────────────────────────────────────

            async function generateNewQuietHourStory() {
                const storyCategories = [
                    'The Knock - somebody arrives unexpectedly',
                    'The Phone Call - everything changes because of one call',
                    'The Visitor - someone appears who shouldn\'t',
                    'The Discovery - somebody finds something',
                    'The Decision - a character makes one seemingly small choice',
                    'The Accident - an ordinary accident starts everything',
                    'The Lie - somebody tells one lie and must keep it alive',
                    'The Stranger - a stranger walks into town',
                    'The Invitation - someone is invited somewhere they should have refused',
                    'The Secret - a secret finally comes out'
                ];
                const chosenCategory = storyCategories[Math.floor(Math.random() * storyCategories.length)];
                const humanFlaws = ['Greed', 'Loneliness', 'Pride', 'Revenge', 'Curiosity', 'Desperation', 'Fear',
                    'Jealousy', 'Addiction', 'Guilt', 'Betrayal', 'Ambition', 'Obsession'
                ];
                const chosenFlaw = humanFlaws[Math.floor(Math.random() * humanFlaws.length)];
                const system =
                    `You are Raymond Cross, the calm, measured host of The Quiet Hour. You narrate grounded, human horror stories set in 1980s America. Your voice is steady, unhurried, and deeply unsettling because of how ordinary everything feels before it all falls apart.`;
                const prompt =
                    `Write a 900-1100 word short story set in the 1980s in small-town or rural America. The story must follow the category: ${chosenCategory}. The central human flaw is: ${chosenFlaw}. STRICT RULES: NO supernatural elements whatsoever—no ghosts, curses, magic, monsters, or dreams. The horror must be purely human. The story must feel like Stephen King meets Hitchcock—brutal, unflinching, grounded. Structure: Act One—The Quiet Hour. Show ordinary life in vivid, mundane detail. A television plays. A meal cooks. Someone drives home. Everything is calm. Act Two—The Interruption. The knock, the call, the visitor, the discovery, the decision, the accident, the lie, the stranger, the invitation, or the secret. Everything slowly, inexorably shifts. Act Three—The Spiral. Characters make increasingly poor, believable decisions driven by the human flaw. Tension comes from human nature. Final Act—The Reckoning. The inevitable conclusion. Not necessarily death—it could be prison, divorce, ruin, isolation, regret, or a hollow freedom. The twist must be realistic and earned. No easy escapes. Frame with Raymond's brief, calm intro and his cold, quiet closing punchline. Return ONLY a valid JSON object with fields: title (string), story (full narration, use \\n for line breaks), closing_remark (the chilling sign-off), category (string), flaw (string). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: prompt }
                ], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) {
                    throw new Error('Invalid story structure');
                }
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `1980s small town America, quiet suburban scene, ${story.category}, moody cinematic, grainy film, stark contrast, film noir shadows`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) {
                    console.warn('Could not generate story poster:', e);
                }
                gameState.qhPerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    category: story.category || chosenCategory,
                    flaw: story.flaw || chosenFlaw,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system =
                    `You are a sound designer for a film noir radio drama (Old Time Radio style). Given a short story, return JSON with THREE keys:
- "sections": array of 5-6 sections dividing the story into emotional acts. Each has "theme" (one of: intro, meeting, tension, revelation, aftermath), "start_char" (inclusive), "end_char" (exclusive). Cover entire story from 0 to ${length}.
- "cues": array of sound events using types: "piano", "piano_stab", "bass", "kick", "snare", "hat", "string_pad", "trumpet", "sax", "swell", "tension", "bell", "thunder", "heartbeat", "climax". Include at least 35 cues spread evenly.
- "score": object with keys matching theme names. Each key: "bpm" (40-80), "bass" (array of 8 integers 0-24), "kick" (array of 8 integers 0/1), "snare" (array of 8 integers 0/1), "hat" (array of 8 integers 0/1).
Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and noir score patterns.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: userPrompt }
                ], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try { data = JSON.parse(cleaned); } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try { data = JSON.parse(candidate); } catch (e2) { throw new Error(
                                'Failed to parse AI soundtrack JSON.'); }
                    } else throw new Error('No JSON found in AI response.');
                }

                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                    throw new Error('Missing sections, cues, or score in AI response');

                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char <
                    length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({
                    type: c.type,
                    position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7
                }));

                const requiredThemes = ['intro', 'meeting', 'tension', 'revelation', 'aftermath'];
                const score = {};

                function normalizeArray(arr, maxVal = 24) {
                    if (!Array.isArray(arr)) {
                        throw new Error('Expected array, got ' + typeof arr);
                    }
                    let clean = arr.map(v => {
                        const num = Number(v);
                        return isNaN(num) ? 0 : Math.min(maxVal, Math.max(0, Math.round(num)));
                    });
                    if (clean.length < 8) { while (clean.length < 8) clean.push(0); } else if (clean.length > 8) {
                        clean = clean.slice(0, 8); }
                    return clean;
                }

                for (const theme of requiredThemes) {
                    if (!data.score[theme]) {
                        throw new Error(`AI did not provide a score for theme "${theme}". Cannot continue.`);
                    }
                    const s = data.score[theme];
                    if (typeof s.bpm !== 'number' || s.bpm < 30 || s.bpm > 120) {
                        throw new Error(`Invalid bpm for theme "${theme}": ${s.bpm}`);
                    }
                    const bass = normalizeArray(s.bass, 24);
                    const kick = normalizeArray(s.kick, 1);
                    const snare = normalizeArray(s.snare, 1);
                    const hat = normalizeArray(s.hat, 1);
                    score[theme] = { bpm: s.bpm, bass, kick, snare, hat };
                }

                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {
                await generateNewQuietHourStory();
                if (!gameState.qhPerformance) throw new Error('Failed to generate story');
                const soundtrack = await generateSoundCueSheet(gameState.qhPerformance.rawStoryText);
                gameState.qhPerformance.soundCues = soundtrack;
                saveState();
                await startQuietHourPerformance();
            }

            // ─── PERFORMANCE ─────────────────────────────────────────────────────

            async function startQuietHourPerformance() {
                speechSynthesis.cancel();
                if (window.qhTimeout) clearTimeout(window.qhTimeout);
                const storyData = gameState.qhPerformance;
                if (!storyData || !storyData.story) {
                    await generateNewQuietHourStory();
                    return startQuietHourPerformance();
                }

                await getAudioContext();

                let sectionList = null,
                    cueList = null,
                    scoreData = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) {
                        cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                    } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                        sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                        scoreData = storyData.soundCues.score;
                    }
                }

                const bubble = document.getElementById('qhSpeechBubble');
                const dialogue = document.getElementById('qhDialogue');
                const imageEl = document.getElementById('qhSegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('qhGuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#888';
                bubble.style.boxShadow = '0 0 30px #ffffff33, 0 0 40px #ccaa8818';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('qhBackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('qhAddEpisodeBtn');
                if (oldAdd) oldAdd.remove();

                const posterContainer = document.getElementById('qhPosterContainer');
                const posterTitle = document.getElementById('qhPosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) { posterTitle.textContent = storyData.title || ''; }
                } else if (posterContainer) {
                    posterContainer.classList.add('no-image');
                }

                // Intro
                const intro =
                    `"Good evening. I'm Raymond Cross. The hour is quiet. For now. Tonight's story is called '${storyData.title}'. It begins like any other evening. But every tragedy begins with an ordinary hour."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 50);
                await new Promise(r => setTimeout(r, 1500));

                // Score indicator loop
                let indicatorInterval = setInterval(() => {
                    if (patternPlayerActive) {
                        const theme = patternPlayerActive.theme || 'intro';
                        const varIdx = currentVariationIdx;
                        const varName = currentSectionPatterns[varIdx] ? currentSectionPatterns[varIdx].name :
                            'A';
                        const bar = barsInVariation + 1;
                        updateScoreIndicator(theme, varName, bar);
                    } else {
                        updateScoreIndicator('...', '—', 0);
                    }
                }, 1000);

                // Start section music
                if (sectionList && sectionList.length > 0) {
                    try {
                        transitionSectionTheme(sectionList[0].theme, scoreData);
                    } catch (err) {
                        console.warn('Failed to start section theme:', err.message);
                        // No fallback — we show error and continue without music
                    }
                } else if (scoreData) {
                    try {
                        transitionSectionTheme('intro', scoreData);
                    } catch (err) {
                        console.warn('Failed to start intro theme:', err.message);
                    }
                }

                const storyText = storyData.rawStoryText || storyData.story;
                if (!storyText) {
                    console.warn('No story text');
                    await finishPerformance(storyData, dialogue, indicatorInterval);
                    return;
                }

                // Build cue checker
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b
                        .start_char) : [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <=
                            idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) {
                                currentTheme = sec.theme;
                                try {
                                    transitionSectionTheme(currentTheme, scoreData);
                                } catch (err) {
                                    console.warn('Theme transition error:', err.message);
                                }
                            }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) {
                                triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity);
                            }
                            cueIdx++;
                        }
                    };
                }

                // Type and speak in parallel
                dialogue.textContent = '';
                const typingPromise = typewriterEffect(dialogue, storyText, 30, cueChecker);
                const speechPromise = speakTextMale(storyText);
                await Promise.all([typingPromise, speechPromise]);

                await finishPerformance(storyData, dialogue, indicatorInterval);
            }

            async function finishPerformance(storyData, dialogue, indicatorInterval) {
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#dddddd';
                dialogue.appendChild(closingLine);

                const closingSpeech = speakTextMale(closing);
                const closingTyping = typewriterEffect(closingLine, closing, 45);
                await Promise.all([closingSpeech, closingTyping]);

                await new Promise(r => setTimeout(r, 1000));

                const curtainText = document.createElement('p');
                curtainText.textContent = '— The quiet returns —';
                stopSectionAmbient();
                stopPatternPlayer();
                clearInterval(indicatorInterval);
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                curtainText.style.color = '#777';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();

                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Leave';
                leaveBtn.addEventListener('click', () => { leaveTheater(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'qhAddEpisodeBtn';
                addBtn.textContent = '➕ Save Episode';
                addBtn.addEventListener('click', () => {
                    addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Saved';
                });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.qhPerformance;
                if (!perf) return;
                gameState.qhEpisodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
                saveState();
                setTimeout(() => leaveTheater(), 600);
            }

            function leaveTheater() {
                stopAmbient();
                stopSectionAmbient();
                stopPatternPlayer();
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                renderQuietHour();
            }

            // ─── INIT ────────────────────────────────────────────────────────────

            function init() {
                loadState();
                renderQuietHour();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('quiet_hour_key', key);
                    }
                });
                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) { showModal(HOST_BIO); }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeModal();
                });
                if (!apiKey) {
                    setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                }
                document.addEventListener('click', () => { getAudioContext().catch(() => {}); }, { once: true });
            }
            init();
        })();
    </script>
</body>
