<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>THE QUIET HOUR · 1983</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Special+Elite&family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020202;
            --screen-bg: #060606;
            --panel-bg: #0a0a0a;
            --text: #e8e8e8;
            --text-dim: #7a7a7a;
            --text-bright: #ffffff;
            --accent: #ffffff;
            --accent-dim: #3a3a3a;
            --border: #555;
            --border-glow: 0 0 18px #ffffff33, 0 0 40px #ffffff11;
            --danger: #ffffff;
            --danger-glow: 0 0 16px #ffffff33;
            --neon-white: #ffffff;
            --neon-glow: 0 0 8px #ffffff88, 0 0 24px #ffffff33, 0 0 50px #ffffff11;
            --gold: #dddddd;
            --gold-dim: #444;
            --green: #6a8a5a;
            --input-bg: #111111;
            --button-bg: #151515;
            --button-hover: #1f1f1f;
            --button-active: #181818;
            --bevel-light: #2a2a2a;
            --bevel-dark: #040404;
            --font-display: 'Orbitron', 'Rajdhani', sans-serif;
            --font-title: 'Orbitron', 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.04;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 26px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0f0f0f 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #0d0d0d;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #1f1f1f, 0 0 0 4px #0a0a0a, 0 0 0 8px #040404, 0 8px 48px #000000dd, 0 0 60px #ffffff0a;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #060606;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffffff99, 0 0 22px #ffffff44;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 10px #ffffff99, 0 0 22px #ffffff44;
            }
            50% {
                box-shadow: 0 0 16px #ffffffcc, 0 0 32px #ffffff66;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #4a4a4a;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #444;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(255, 255, 255, var(--scanline-opacity)) 0px, rgba(255, 255, 255, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #080808;
            border-bottom: 3px solid #555;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 3px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #1a1a1a;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #666;
            border-radius: 2px;
            padding: 10px 14px;
            background: #040404;
            position: relative;
            box-shadow: inset 0 0 30px #ffffff08;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #ffffff;
            box-shadow: 0 0 14px #ffffff99;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #999;
            box-shadow: 0 0 8px #ffffff44;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #ffffff;
            text-shadow: var(--neon-glow);
            letter-spacing: 4px;
            font-family: var(--font-title);
            line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #888;
            letter-spacing: 5px;
            margin-top: 3px;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 18px;
                letter-spacing: 2px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #2a2a2a #060606;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #060606;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #3a3a3a;
            border-top-color: #4a4a4a;
            border-left-color: #444;
            border-right-color: #2a2a2a;
            border-bottom-color: #1a1a1a;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text-bright);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #2a2a2a;
            border-left-color: #2a2a2a;
            border-bottom-color: #4a4a4a;
            border-right-color: #444;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #111;
        }
        .btn.accent {
            background: #111;
            border-color: #555;
            border-top-color: #777;
            border-left-color: #666;
            border-right-color: #333;
            border-bottom-color: #1a1a1a;
            color: #ffffff;
            box-shadow: 0 2px 0 #00000044, 0 0 14px #ffffff22;
        }
        .btn.accent:active {
            border-top-color: #333;
            border-left-color: #333;
            border-bottom-color: #777;
            border-right-color: #666;
            box-shadow: 0 0px 0 #00000044, 0 0 20px #ffffff44;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .theater-mask {
            position: relative;
            background: #0a0a0a;
            border: 2px solid #555;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.8);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #080808;
            border: 2px solid #555;
            padding: 15px;
            border-radius: 3px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #666;
            box-shadow: 0 0 22px #ffffff33, 0 0 0 2px #1a1a1a;
            object-fit: cover;
            flex-shrink: 0;
            background: #0a0a0a;
        }
        .speech-bubble {
            flex: 1;
            background: #111;
            border: 2px solid #555;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #e8e8e8;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #555 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #080808;
            border: 1px solid #333;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #151515;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #555;
            box-shadow: 0 0 20px #ffffff22, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #080808;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(2, 2, 2, 0.85) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 13px;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow: 0 0 10px #ffffff99, 0 0 30px #ffffff55, 0 2px 4px #000000, 0 0 60px #ffffff11;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom,
                    rgba(6, 6, 6, 0.9) 0%,
                    rgba(6, 6, 6, 0.7) 40%,
                    transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 15px;
            letter-spacing: 1.5px;
            color: #ffffff;
            text-shadow: 0 0 8px #ffffff88, 0 0 20px #ffffff33, 0 2px 4px #000000;
            background: linear-gradient(to top,
                    rgba(2, 2, 2, 0.9) 0%,
                    rgba(2, 2, 2, 0.6) 50%,
                    transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 10px;
                letter-spacing: 2px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 12px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #444;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #dddddd;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 10px #ffffff33;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0e0e0e;
            border: 1px solid #3a3a3a;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #aaa;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #ddd;
        }
        .guide-desc {
            font-size: 15px;
            color: #777;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0e0e0e;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #555;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #e0e0e0;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #151515;
            border: 2px solid #555;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #e0e0e0;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #fff;
            box-shadow: 0 0 14px #ffffff44;
        }
        .loading-text {
            color: #bbb;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #040404;
            border-top: 1px solid #333;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #4a4a4a;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #555;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #222;
            color: #555;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #555;
            color: #888;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #e8e8e8;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">THE QUIET HOUR · CRT-83</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE QUIET<br>HOUR</div>
                    <div class="marquee-sub">⏤ 1983 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="quietHourPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🕐 THE QUIET HOUR · EVERY TRAGEDY BEGINS WITH AN ORDINARY HOUR</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('quiet_hour_key') || '';

            const DEFAULT_STATE = {
                qhEpisodes: [],
                qhPerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
                <h2>🕐 Raymond Cross</h2>
                <p style="text-align:left;">
                    <strong>Show:</strong> <em>The Quiet Hour</em><br>
                    <strong>Bio:</strong> A former radio announcer from the Midwest, Cross has a voice like warm amber and eyes that have seen too much. He broadcasts from a modest studio in an unnamed town, introducing each story with the calm certainty that the quietest moments are the most dangerous. He never raises his voice. He doesn't have to.
                </p>
            `;

            // ── 80s FILM SOUNDTRACK ENGINE ──
            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let crossfadeTimeout = null;

            const SECTION_THEMES = {
                calm: { root: 55, fifth: 82.5, filterStart: 500, filterEnd: 350, lfoFreq: 0.08, intensity: 0.2 },
                interruption: { root: 55, fifth: 83.4, filterStart: 600, filterEnd: 250, lfoFreq: 0.15,
                intensity: 0.35 },
                unraveling: { root: 55, fifth: 84, filterStart: 700, filterEnd: 180, lfoFreq: 0.22, intensity: 0.5 },
                reckoning: { root: 55, fifth: 88, filterStart: 900, filterEnd: 130, lfoFreq: 0.3, intensity: 0.65 },
                closing: { root: 55, fifth: 82.5, filterStart: 300, filterEnd: 200, lfoFreq: 0.1, intensity: 0.2 }
            };

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.18;
                    reverbNode.connect(masterGain);
                    masterGain.connect(audioCtx.destination);
                    const compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.value = -24;
                    compressor.knee.value = 30;
                    compressor.ratio.value = 12;
                    compressor.attack.value = 0.003;
                    compressor.release.value = 0.25;
                    masterGain.connect(compressor);
                    compressor.connect(audioCtx.destination);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 1.0;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.35;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                    reverbNode.connect(masterGain);
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 2.5;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.5));
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            // 80s film soundtrack: warm brass-like pads, orchestral swells, gentle bells
            function createWarmPad(ctx, frequency, duration, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.16, now + 0.8);
                gainNode.gain.setValueAtTime(intensity * 0.16, now + duration - 1.5);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.3);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'triangle';
                osc2.frequency.value = frequency * 1.005;
                const osc3 = ctx.createOscillator();
                osc3.type = 'sine';
                osc3.frequency.value = frequency / 2;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 1.5;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.12 + Math.random() * 0.15;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 150 + Math.random() * 150;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            // 80s orchestral swell
            function createOrchestralSwell(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.25, now + 0.6);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 2.5);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 1.5);
                const osc2 = ctx.createOscillator();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(160, now);
                osc2.frequency.exponentialRampToValueAtTime(600, now + 1.5);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                filter.Q.value = 1;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.2;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 300;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc.start(now);
                osc2.start(now);
                lfo.start(now);
                osc.stop(now + 2.5);
                osc2.stop(now + 2.5);
                lfo.stop(now + 2.5);
            }

            // Gentle bell tone for key moments
            function createGentleBell(ctx, intensity = 0.4) {
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 90 + Math.random() * 40;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(intensity * 0.35, now + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 4);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 700;
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(reverbNode || ctx.destination);
                osc.start(now);
                osc.stop(now + 4);
            }

            // Tension builder - 80s style
            function createTensionBuild(ctx, intensity = 0.55) {
                const now = ctx.currentTime;
                const duration = 6 + Math.random() * 5;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.4, now + 2);
                gainNode.gain.setValueAtTime(intensity * 0.5, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(100, now);
                osc1.frequency.exponentialRampToValueAtTime(200, now + duration * 0.6);
                const osc2 = ctx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(200, now);
                osc2.frequency.exponentialRampToValueAtTime(400, now + duration * 0.6);
                const osc3 = ctx.createOscillator();
                osc3.type = 'triangle';
                osc3.frequency.setValueAtTime(100, now);
                osc3.frequency.exponentialRampToValueAtTime(300, now + duration * 0.7);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(350, now);
                filter.frequency.exponentialRampToValueAtTime(1100, now + duration);
                filter.Q.value = 2;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.18;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 180;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    switch (type) {
                        case 'pad':
                            createWarmPad(ctx, 110 + Math.random() * 40, 18 + Math.random() * 18, intensity);
                            break;
                        case 'swell':
                            createOrchestralSwell(ctx, intensity);
                            break;
                        case 'bell':
                            createGentleBell(ctx, intensity);
                            break;
                        case 'tension':
                            createTensionBuild(ctx, intensity);
                            break;
                        case 'thunder': {
                            const bufferSize = ctx.sampleRate * 0.5;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.35));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(intensity * 0.5, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.9);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 180;
                            filter.Q.value = 0.5;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(ctx.currentTime);
                            source.stop(ctx.currentTime + 0.9);
                            break;
                        }
                        case 'heartbeat': {
                            const t = ctx.currentTime;
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(55, t);
                            osc.frequency.exponentialRampToValueAtTime(25, t + 0.1);
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(intensity * 0.7, t);
                            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                            osc.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(t);
                            osc.stop(t + 0.1);
                            setTimeout(() => {
                                const osc2 = ctx.createOscillator();
                                osc2.type = 'sine';
                                osc2.frequency.setValueAtTime(55, t + 0.15);
                                osc2.frequency.exponentialRampToValueAtTime(25, t + 0.25);
                                const gain2 = ctx.createGain();
                                gain2.gain.setValueAtTime(intensity * 0.7, t + 0.15);
                                gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                                osc2.connect(gain2);
                                gain2.connect(ctx.destination);
                                osc2.start(t + 0.15);
                                osc2.stop(t + 0.25);
                            }, 150);
                            break;
                        }
                        default:
                            console.warn(`Unknown sound type: ${type}`);
                    }
                } catch (err) {
                    console.error(`Error in playSound("${type}"):`, err);
                }
            }

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.25, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    const bufferSize = ctx.sampleRate * 1;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * 0.4;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    noise.loop = true;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = type === 'ambient_drone' ? 180 : 500;
                    filter.Q.value = 0.5;
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = type === 'ambient_drone' ? 70 : 110;
                    const gainOsc = ctx.createGain();
                    gainOsc.gain.value = 0.18 * intensity;
                    osc.connect(gainOsc);
                    gainOsc.connect(filter);
                    noise.connect(filter);
                    filter.connect(gainNode);
                    osc.start(now);
                    noise.start(now);
                    source = { osc, noise };
                    ambientSource = source;
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) {
                    console.error(`Error in playAmbient:`, err);
                }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 300);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            // ── 80s STYLE SCORE PATTERNS ──
            const SCORE_PATTERNS = {
                calm: { bpm: 55, bass: [0, 0, 7, 7, 0, 0, 7, 7], arp: [12, 15, 12, 19, 12, 15, 12, 19],
                    kick: [1, 0, 0, 0, 1, 0, 0, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] },
                interruption: { bpm: 62, bass: [0, 7, 5, 3, 0, 7, 5, 3], arp: [12, 15, 19, 15, 12, 15, 19, 15],
                    kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] },
                unraveling: { bpm: 70, bass: [0, 3, 5, 7, 8, 7, 5, 3], arp: [12, 15, 19, 22, 24, 22, 19, 15],
                    kick: [1, 0, 1, 1, 1, 0, 1, 0], snare: [0, 0, 1, 0, 0, 0, 1, 0] },
                reckoning: { bpm: 78, bass: [0, 7, 0, 7, 3, 7, 3, 7], arp: [12, 19, 15, 19, 12, 19, 15, 19],
                    kick: [1, 1, 1, 1, 1, 1, 1, 1], snare: [0, 1, 0, 1, 0, 1, 0, 1] },
                closing: { bpm: 50, bass: [0, 7, 5, 0, 7, 5, 0, 7], arp: [12, 15, 12, 19, 12, 15, 12, 19],
                    kick: [1, 0, 0, 0, 1, 0, 0, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] }
            };

            function createScoreNote(ctx, frequency, startTime, duration, gainValue, type = 'triangle') {
                const now = startTime;
                const osc1 = ctx.createOscillator();
                osc1.type = 'triangle';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sine';
                osc2.frequency.value = frequency * 1.004;
                const sub = ctx.createOscillator();
                sub.type = 'sine';
                sub.frequency.value = frequency / 2;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                filter.Q.value = 1.2;
                const mainGain = ctx.createGain();
                mainGain.gain.setValueAtTime(0, now);
                mainGain.gain.linearRampToValueAtTime(gainValue * 0.28, now + 0.03);
                mainGain.gain.setValueAtTime(gainValue * 0.28, now + duration * 0.6);
                mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.15);
                osc1.connect(filter);
                osc2.connect(filter);
                sub.connect(filter);
                filter.connect(mainGain);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.75;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.35;
                mainGain.connect(drySend);
                mainGain.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);
                osc1.start(now);
                osc2.start(now);
                sub.start(now);
                osc1.stop(now + duration + 0.2);
                osc2.stop(now + duration + 0.2);
                sub.stop(now + duration + 0.2);
            }

            function createScoreKick(ctx, time) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(140, time);
                osc.frequency.exponentialRampToValueAtTime(28, time + 0.08);
                const gainBody = ctx.createGain();
                gainBody.gain.setValueAtTime(0.6, time);
                gainBody.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
                osc.connect(gainBody);
                gainBody.connect(dryGain);
                osc.start(time);
                osc.stop(time + 0.18);
            }

            function createScoreSnare(ctx, time) {
                const body = ctx.createOscillator();
                body.type = 'triangle';
                body.frequency.setValueAtTime(180, time);
                body.frequency.exponentialRampToValueAtTime(70, time + 0.07);
                const bodyGain = ctx.createGain();
                bodyGain.gain.setValueAtTime(0.5, time);
                bodyGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                body.connect(bodyGain);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.025));
                }
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.55, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                bodyGain.connect(dryGain);
                noiseGain.connect(dryGain);
                body.start(time);
                noise.start(time);
                body.stop(time + 0.1);
                noise.stop(time + 0.12);
            }

            function startSectionScore(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                let customScore = null;
                const perf = gameState.qhPerformance;
                if (perf && perf.soundCues && perf.soundCues.score) {
                    customScore = perf.soundCues.score;
                }
                const fallbackTheme = SCORE_PATTERNS[themeName] || SCORE_PATTERNS.calm;
                const theme = (customScore && customScore[themeName]) ? customScore[themeName] : fallbackTheme;
                const rootFreq = 55;
                const beatDuration = 60 / theme.bpm;
                const patternLength = theme.bass.length;
                const ctx = audioCtx;
                let step = 0;
                let nextStepTime = ctx.currentTime;
                let timeoutId = null;
                const padGain = ctx.createGain();
                padGain.gain.value = 0.08;
                const padOsc1 = ctx.createOscillator();
                padOsc1.type = 'triangle';
                padOsc1.frequency.value = rootFreq;
                const padOsc2 = ctx.createOscillator();
                padOsc2.type = 'sine';
                padOsc2.frequency.value = rootFreq * 1.5;
                const padFilter = ctx.createBiquadFilter();
                padFilter.type = 'lowpass';
                padFilter.frequency.value = 350;
                padFilter.Q.value = 1;
                padOsc1.connect(padFilter);
                padOsc2.connect(padFilter);
                padFilter.connect(padGain);
                const padDry = ctx.createGain();
                padDry.gain.value = 0.5;
                const padWet = ctx.createGain();
                padWet.gain.value = 0.35;
                padGain.connect(padDry);
                padGain.connect(padWet);
                padDry.connect(dryGain);
                padWet.connect(wetGain);
                padOsc1.start();
                padOsc2.start();
                const stopSources = [padOsc1, padOsc2];

                function scheduleStep() {
                    if (!sectionAmbientActive) return;
                    const now = nextStepTime;
                    const bassSemitone = theme.bass[step % patternLength];
                    const bassFreq = rootFreq * Math.pow(2, bassSemitone / 12);
                    createScoreNote(ctx, bassFreq, now, beatDuration * 0.85, 0.7, 'triangle');
                    const arpSemitone = theme.arp[step % patternLength];
                    const arpFreq = rootFreq * Math.pow(2, arpSemitone / 12);
                    createScoreNote(ctx, arpFreq, now, beatDuration * 0.45, 0.5, 'sine');
                    if (theme.kick[step % patternLength]) createScoreKick(ctx, now);
                    if (theme.snare[step % patternLength]) createScoreSnare(ctx, now);
                    step++;
                    nextStepTime += beatDuration;
                    timeoutId = setTimeout(scheduleStep, (nextStepTime - ctx.currentTime) * 1000);
                }
                nextStepTime = ctx.currentTime + 0.05;
                timeoutId = setTimeout(scheduleStep, 50);
                sectionAmbientActive = {
                    stop: () => {
                        clearTimeout(timeoutId);
                        padGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                        stopSources.forEach(s => { try { s.stop(ctx.currentTime + 0.3); } catch (e) {} });
                        sectionAmbientActive = null;
                    }
                };
            }
            const transitionSectionTheme = startSectionScore;

            function stopSectionAmbient() {
                if (sectionAmbientActive) {
                    sectionAmbientActive.stop();
                    sectionAmbientActive = null;
                }
                clearTimeout(crossfadeTimeout);
            }

            function saveState() {
                try { localStorage.setItem('quiet_hour_state', JSON.stringify(gameState)); } catch (e) {}
            }

            function loadState() {
                try {
                    const saved = localStorage.getItem('quiet_hour_state');
                    if (saved) gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
                    gameState.qhEpisodes = gameState.qhEpisodes || [];
                    gameState.qhPerformance = gameState.qhPerformance || null;
                } catch (e) {}
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 25000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`);
                    }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') {
                        throw new Error('Request timed out. Please try again.');
                    }
                    throw e;
                } finally {
                    clearTimeout(timeout);
                }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', 1980s Americana, moody cinematic, grainy film still, neon white accents, stark contrast')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e;
                        await new Promise(r => setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else { clearInterval(timer);
                            resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David',
                    'Fred', 'Alex', 'Thomas', 'James'
                ];
                let voice = null;
                for (const name of maleNames) {
                    voice = voices.find(v => v.name.includes(name));
                    if (voice) break;
                }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.6;
                utterance.pitch = 0.9;
                speechSynthesis.speak(utterance);
            }

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) {
                        voice = voices.find(v => v.name.includes(name));
                        if (voice) break;
                    }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.6;
                    utterance.pitch = voiceConfig.pitch || 0.9;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) {
                            currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar);
                            if (cueChecker) cueChecker(currentChar);
                        }
                    };
                    utterance.onend = () => {
                        element.textContent = text;
                        if (cueChecker) cueChecker(text.length);
                        resolve();
                    };
                    utterance.onerror = (e) => {
                        console.warn('TTS error:', e);
                        element.textContent = text;
                        resolve();
                    };
                    speechSynthesis.speak(utterance);
                });
            }

            async function generateNewQuietHourStory() {
                const storyCategories = [
                    'The Knock - somebody arrives unexpectedly',
                    'The Phone Call - everything changes because of one call',
                    'The Visitor - someone appears who shouldn\'t',
                    'The Discovery - somebody finds something',
                    'The Decision - a character makes one seemingly small choice',
                    'The Accident - an ordinary accident starts everything',
                    'The Lie - somebody tells one lie and must keep it alive',
                    'The Stranger - a stranger walks into town',
                    'The Invitation - someone is invited somewhere they should have refused',
                    'The Secret - a secret finally comes out'
                ];
                const chosenCategory = storyCategories[Math.floor(Math.random() * storyCategories.length)];
                const humanFlaws = ['Greed', 'Loneliness', 'Pride', 'Revenge', 'Curiosity', 'Desperation', 'Fear',
                    'Jealousy', 'Addiction', 'Guilt', 'Betrayal', 'Ambition', 'Obsession'
                ];
                const chosenFlaw = humanFlaws[Math.floor(Math.random() * humanFlaws.length)];
                const system =
                    `You are Raymond Cross, the calm, measured host of The Quiet Hour. You narrate grounded, human horror stories set in 1980s America. Your voice is steady, unhurried, and deeply unsettling because of how ordinary everything feels before it all falls apart.`;
                const prompt =
                    `Write a 900-1100 word short story set in the 1980s in small-town or rural America. The story must follow the category: ${chosenCategory}. The central human flaw is: ${chosenFlaw}. STRICT RULES: NO supernatural elements whatsoever—no ghosts, curses, magic, monsters, or dreams. The horror must be purely human. The story must feel like Stephen King meets Hitchcock—brutal, unflinching, grounded. Structure: Act One—The Quiet Hour. Show ordinary life in vivid, mundane detail. A television plays. A meal cooks. Someone drives home. Everything is calm. Act Two—The Interruption. The knock, the call, the visitor, the discovery, the decision, the accident, the lie, the stranger, the invitation, or the secret. Everything slowly, inexorably shifts. Act Three—The Spiral. Characters make increasingly poor, believable decisions driven by the human flaw. Tension comes from human nature. Final Act—The Reckoning. The inevitable conclusion. Not necessarily death—it could be prison, divorce, ruin, isolation, regret, or a hollow freedom. The twist must be realistic and earned. No easy escapes. Frame with Raymond's brief, calm intro and his cold, quiet closing punchline. Return ONLY a valid JSON object with fields: title (string), story (full narration, use \\n for line breaks), closing_remark (the chilling sign-off), category (string), flaw (string). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: prompt }
                ], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) {
                    throw new Error('Invalid story structure');
                }
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `1980s small town America, quiet suburban scene, ${story.category}, moody cinematic, grainy film, stark neon white light, Hitchcock style`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) {
                    console.warn('Could not generate story poster:', e);
                }
                gameState.qhPerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    category: story.category || chosenCategory,
                    flaw: story.flaw || chosenFlaw,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system = `You are a sound designer for an 80s film soundtrack style horror drama. Given a short story, return a JSON object with THREE keys: "sections" (array of 5-6 sections dividing the story into emotional acts with theme: calm, interruption, unraveling, reckoning, closing; each with start_char and end_char covering 0 to ${length}), "cues" (array of sound events using types: swell, bell, tension, heartbeat, thunder, pad; each with position, type, optional intensity 0-1; at least 35 cues spread evenly), "score" (object with keys calm, interruption, unraveling, reckoning, closing; each with bpm 50-80, bass array of 8 semitone intervals, arp array of 8 semitone intervals, kick array of 8 numbers 1/0, snare array of 8 numbers 1/0). Make music warm and tense—80s film soundtrack style, not aggressive Carpenter. Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and score patterns for an 80s film soundtrack style.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: userPrompt }
                ], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try {
                    data = JSON.parse(cleaned);
                } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try { data = JSON.parse(candidate); } catch (e2) { throw new Error(
                                'Failed to parse AI soundtrack JSON.'); }
                    } else { throw new Error('No JSON found in AI response.'); }
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object') {
                    throw new Error('Missing sections, cues, or score');
                }
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char <
                    length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({ type: c.type, position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.6 }));
                const requiredThemes = ['calm', 'interruption', 'unraveling', 'reckoning', 'closing'];
                const score = {};
                for (const theme of requiredThemes) {
                    if (data.score[theme]) {
                        score[theme] = {
                            bpm: data.score[theme].bpm || 65,
                            bass: data.score[theme].bass || [0, 0, 7, 7, 0, 0, 7, 7],
                            arp: data.score[theme].arp || [12, 15, 12, 19, 12, 15, 12, 19],
                            kick: data.score[theme].kick || [1, 0, 1, 0, 1, 0, 1, 0],
                            snare: data.score[theme].snare || [0, 0, 0, 1, 0, 0, 0, 1]
                        };
                    } else {
                        score[theme] = { bpm: 65, bass: [0, 0, 7, 7, 0, 0, 7, 7], arp: [12, 15, 12, 19, 12,
                                15, 12, 19
                            ], kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] };
                    }
                }
                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {
                await generateNewQuietHourStory();
                if (!gameState.qhPerformance) throw new Error('Failed to generate story');
                const soundtrack = await generateSoundCueSheet(gameState.qhPerformance.rawStoryText);
                gameState.qhPerformance.soundCues = soundtrack;
                saveState();
                await startQuietHourPerformance();
            }

            async function startQuietHourPerformance() {
                speechSynthesis.cancel();
                if (window.qhTimeout) clearTimeout(window.qhTimeout);
                const storyData = gameState.qhPerformance;
                if (!storyData || !storyData.story) {
                    await generateNewQuietHourStory();
                    return startQuietHourPerformance();
                }
                let sectionList = null;
                let cueList = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) {
                        cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                    } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                        sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                    }
                }
                const bubble = document.getElementById('qhSpeechBubble');
                const dialogue = document.getElementById('qhDialogue');
                const imageEl = document.getElementById('qhSegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('qhGuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#888';
                bubble.style.boxShadow = '0 0 30px #ffffff33';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('qhBackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('qhAddEpisodeBtn');
                if (oldAdd) oldAdd.remove();
                const posterContainer = document.getElementById('qhPosterContainer');
                const posterTitle = document.getElementById('qhPosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) { posterTitle.textContent = storyData.title || ''; }
                } else if (posterContainer) {
                    posterContainer.classList.add('no-image');
                }
                const intro =
                    `"Good evening. I'm Raymond Cross. The hour is quiet. For now. Tonight's story is called '${storyData.title}'. It begins like any other evening. But every tragedy begins with an ordinary hour."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 50);
                await new Promise(r => setTimeout(r, 1500));
                if (sectionList && sectionList.length > 0) {
                    transitionSectionTheme(sectionList[0].theme);
                }
                const storyText = storyData.rawStoryText || storyData.story;
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b
                        .start_char) : [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <=
                            idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) { currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme); }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) { triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity); }
                            cueIdx++;
                        }
                    };
                }
                dialogue.textContent = '';
                if (cueChecker) {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.6, pitch: 0.9 }, (idx) => cueChecker(
                        idx));
                } else {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.6, pitch: 0.9 });
                }
                await new Promise(r => setTimeout(r, 1200));
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#dddddd';
                dialogue.appendChild(closingLine);
                speakTextMale(closing);
                await typewriterEffect(closingLine, closing, 45);
                await new Promise(r => setTimeout(r, 1000));
                const curtainText = document.createElement('p');
                curtainText.textContent = '— The quiet returns —';
                stopSectionAmbient();
                curtainText.style.color = '#777';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();
                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Leave';
                leaveBtn.addEventListener('click', () => { leaveTheater(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'qhAddEpisodeBtn';
                addBtn.textContent = '➕ Save Episode';
                addBtn.addEventListener('click', () => {
                    addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Saved';
                });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.qhPerformance;
                if (!perf) return;
                gameState.qhEpisodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
                saveState();
                setTimeout(() => leaveTheater(), 600);
            }

            function leaveTheater() {
                stopAmbient();
                stopSectionAmbient();
                renderQuietHour();
            }

            function init() {
                loadState();
                renderQuietHour();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('quiet_hour_key', key);
                    }
                });
                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) { showModal(HOST_BIO); }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeModal();
                });
                if (!apiKey) {
                    setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                }
            }
            init();
        })();
    </script>
