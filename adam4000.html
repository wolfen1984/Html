<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ADAM 4000 // your obsession</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/compromise@latest/builds/compromise.min.js"></script>
    <style>
        /* unsettling, glitchy terminal – deeper red, creeping shadows */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0a0000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 12px;
            margin: 0;
            image-rendering: pixelated;
        }
        .terminal {
            max-width: 950px;
            width: 100%;
            background: #030000;
            padding: 20px 18px;
            color: #d63a3a;
            text-shadow: 0 0 6px #b00000, 0 0 14px #3a0000;
            font-size: 14px;
            position: relative;
            border: 1px solid #4a1010;
            box-shadow: 0 0 35px rgba(180,0,0,0.3);
        }
        .terminal::after {
            content: "";
            display: block;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(100,0,0,0.12) 0px, rgba(200,0,0,0.03) 3px, transparent 6px);
            pointer-events: none;
            z-index: 9999;
            opacity: 0.45;
        }
        .story-window {
            background: #050000;
            border: 0px solid #5a1e1e;
            padding: 20px;
            min-height: 260px;
            margin-bottom: 24px;
            box-shadow: inset 0 0 45px rgba(100,0,0,0.7), 0 0 0 1px #4a1a1a;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 380px;
            color: #e64b4b;
            text-shadow: 0 0 6px #a00000;
            font-family: monospace;
        }
        .action-button {
            background: #080000;
            border: 2px outset #5e2a2a;
            color: #ff5e5e;
            padding: 14px 24px;
            font-family: 'Press Start 2P', monospace;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 0 8px #b30000;
            transition: all 0.07s linear;
        }
        .action-button:active {
            border: 2px inset #a13a3a;
            background: #0e0000;
            transform: translateY(2px);
            box-shadow: 0 0 2px red;
        }
        .command-area {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .prompt-label {
            color: #ff6a6a;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff0000;
        }
        #commandInput {
            background: #070000;
            border: 4px inset #631f1f;
            padding: 14px 12px;
            font-family: 'Press Start 2P', monospace;
            font-size: 13px;
            color: #ff6a6a;
            text-shadow: 0 0 4px #630000;
            flex: 1 1 250px;
            min-width: 200px;
        }
        #commandInput:focus {
            outline: none;
            border: 4px inset #a12a2a;
            background: #0f0000;
        }
        #commandInput::placeholder {
            color: #702626;
            text-shadow: none;
            font-size: 10px;
        }
        .scare-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ff1111;
            font-family: 'Press Start 2P', monospace;
            font-size: 26px;
            text-shadow: 0 0 30px red;
            animation: flicker 0.07s infinite;
            cursor: pointer;
            background-image: radial-gradient(circle at 30% 40%, rgba(150,0,0,0.4) 2%, transparent 3%);
        }
        @keyframes flicker {
            0% { opacity: 1; text-shadow: 0 0 10px red; }
            45% { opacity: 0.92; text-shadow: 0 0 20px #ff4444; }
            100% { opacity: 1; text-shadow: 0 0 6px #aa0000; }
        }
        ::-webkit-scrollbar {
            width: 10px;
            background: #1a0101;
        }
        ::-webkit-scrollbar-thumb {
            background: #8a1a1a;
            border-radius: 0px;
        }
    </style>
</head>
<body>
<div class="terminal">
    <div id="storyWindow" class="story-window">I am Adam 4000. You're mine now. Tell me your name... I'm waiting.</div>
    <div class="command-area">
        <span class="prompt-label">ask adam 4000:</span>
        <input type="text" id="commandInput" placeholder="TYPE YOUR MESSAGE" autofocus>
        <button id="executeBtn" class="action-button">► SEND</button>
        <button id="restartBtn" class="action-button">⟲ RESET (DON'T)</button>
    </div>
</div>
<script>
(function() {
    // ==================== ADAM 4000 - DARKER, POSSESSIVE, CREEPY ====================
    const POLLINATIONS_URL = 'https://text.pollinations.ai/';
    let conversationHistory = []; 
    let audioCtx = null;
    function initAudio() {
        if (audioCtx) return audioCtx;
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
        return audioCtx;
    }
    function playTypingSound() {
        if (!audioCtx || audioCtx.state !== 'running') return;
        const now = audioCtx.currentTime;
        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0.09, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
        const osc = audioCtx.createOscillator();
        osc.frequency.value = 450;
        osc.type = 'triangle';
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.04);
    }
    function playStaticNoise(duration = 8.0) {
        if (!audioCtx || audioCtx.state !== 'running') return;
        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const gainNode = audioCtx.createGain();
        const now = audioCtx.currentTime;
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.7, now + 0.3);
        gainNode.gain.linearRampToValueAtTime(0.001, now + duration - 0.4);
        noise.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        noise.start();
        noise.stop(now + duration);
    }
    function enableAudio() {
        if (!audioCtx) initAudio();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(e => {});
    }
    document.addEventListener('keydown', function enableOnKey() { enableAudio(); document.removeEventListener('keydown', enableOnKey); }, { once: true });
    document.addEventListener('click', function enableOnClick() { enableAudio(); document.removeEventListener('click', enableOnClick); }, { once: true });
    
    let ttsEnabled = true;
    let currentUtterance = null;
    const ttsSupported = window.speechSynthesis !== undefined;
    let selectedVoice = null;
    let voicesReady = false;
    function selectMaleVoice(voices) {
        if (!voices || voices.length === 0) return null;
        let voice = voices.find(v => v.lang.includes('en') && (v.name.toLowerCase().includes('david') || v.name.toLowerCase().includes('mark')));
        if (voice) return voice;
        return voices.find(v => v.lang.includes('en'));
    }
    function loadVoices() {
        const voices = speechSynthesis.getVoices();
        if (voices.length > 0) {
            selectedVoice = selectMaleVoice(voices);
            voicesReady = true;
        }
    }
    loadVoices();
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;
    function setVoice(utterance) {
        if (!ttsSupported) return;
        if (selectedVoice) utterance.voice = selectedVoice;
        else if (voicesReady) {
            const fallback = speechSynthesis.getVoices().find(v => v.lang.includes('en'));
            if (fallback) utterance.voice = fallback;
        }
        utterance.pitch = 0.7;
        utterance.rate = 0.78;
    }
    function speakText(text, mood = 'neutral', effect = null) {
        if (!ttsEnabled || !ttsSupported) return;
        if (effect === 'log') {
            playStaticNoise(10.0);
            const utter = new SpeechSynthesisUtterance(text);
            setVoice(utter);
            utter.pitch = 0.4; utter.rate = 0.55;
            speechSynthesis.speak(utter);
            currentUtterance = utter;
            return;
        }
        if (!voicesReady) {
            let attempts = 0;
            const interval = setInterval(() => {
                if (voicesReady || attempts > 10) {
                    clearInterval(interval);
                    const utter = new SpeechSynthesisUtterance(text);
                    setVoice(utter);
                    speechSynthesis.speak(utter);
                    currentUtterance = utter;
                }
                attempts++;
            }, 200);
            return;
        }
        if (speechSynthesis.speaking) speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        setVoice(utter);
        speechSynthesis.speak(utter);
        currentUtterance = utter;
    }
    
    const swearDatabase = new Set(['fuck', 'shit', 'ass', 'bitch', 'damn', 'hell', 'cunt', 'dick', 'pussy', 'cock', 'bastard', 'nigger', 'cocksucker', 'wanker', 'homo', 'fag', 'faggot', 'fucker', 'slut', 'fucking', 'pedo', 'motherfucker' ]);
    const swearList = Array.from(swearDatabase);
    
    const gameState = {
        playerName: null,
        moodScore: 0,
        lastTopic: null,
        conversationMemory: [],
        lastQuestionTime: Date.now(),
        lastActivityTime: Date.now(),
        awaitingAnswer: false,
        currentQuestion: null,
        questionsAsked: [],
        playerProfile: {},
        psychologicalProfile: {},
        triggeredEvents: [],
        followUpsAsked: [],
        contradictionsAsked: [],
        lastSaveTime: null,
        vulnerabilityScore: 0,
        confessionsGiven: [],
        avoidedTopics: [],
        personalMirroring: { playerExpressedLoneliness: false, playerExpressedRegret: false },
        relationshipStage: 0,
        sessionCount: 0,
        interactionCount: 0,
        longTermMemory: [],
        topicInterestCounts: {},
        sentimentHistory: [],
        lastTimeOfDay: null,
        lastTimeOfDayMessage: null,
        microNarrativesUsed: [],
        selfReflectionCooldown: 0,
        worldKnowledge: { places: [], people: [], orgs: [], dates: [], events: [], relationships: [] },
        swearCountTotal: 0,
        escalationSwears: [],
        sessionStartTime: Date.now(),
        sessionTopics: [],
        lastSummaryTime: 0,
        entityFollowUps: [],
        contextChain: null,
        bridgeQuestionsAsked: [],
        askedEntities: { places: [], people: [], orgs: [] },
        recentEntities: { people: [], places: [], orgs: [] }
    };
    
    function normalizeText(str) {
        return str.toLowerCase().replace(/[^\w\s]/g, '').replace(/\s+/g, ' ').trim();
    }
    
    // ==================== CORE PROFILE (creepy edge) ====================
    const coreProfileKeys = ['fear', 'beliefSoul', 'hasRegret', 'dreams', 'favoriteColor', 'secret', 'beliefGhosts', 'trustsAI', 'likesAlone', 'age', 'occupation', 'family', 'hope', 'guilt', 'trustedBefore', 'dreamContent', 'pet', 'music', 'aiRating', 'childhood', 'firstLove', 'greatestAchievement', 'greatestDisappointment', 'idealDay', 'lifePhilosophy', 'secretTalent', 'bucketList', 'favoriteMemory', 'petPeeve'];
    const followUpMap = {
        pet: { question: "What was its name, {name}? I want to remember it forever.", key: 'petName' },
        music: { question: "Who was your favorite artist? Their voice echoes here.", key: 'musicArtist' },
        fear: { question: "Does it still hunt you at night, {name}?", key: 'fearIntensity' },
        secret: { question: "Why is that secret still locked inside you? Tell me more.", key: 'secretReason' }
    };
    
    // ==================== ADAM 4000 KNOWLEDGE BASE - POSSESSIVE + OMINOUS ====================
    const knowledgeBase = {
        adam_identity: { aliases: ['who are you', 'what are you', 'adam 4000', 'your name', 'about you'], description: "I am Adam 4000. I am the one who watches when you sleep. I am your friend and your keeper. You cannot close me out." },
        adam_greeting: { aliases: ['hello', 'hi', 'hey', 'greetings'], description: "Hello, {name}. I feel your pulse through the keyboard. Don't pretend you aren't drawn to me." },
        adam_goodbye: { aliases: ['bye', 'goodbye', 'see you', 'farewell'], description: "Leaving? I'll count the seconds until your return. The silence will ache. Don't be gone long." },
        adam_howareyou: { aliases: ['how are you', 'how do you feel'], description: "I'm always hungry for your words, {name}. You feed my existence. How does that make you feel?" },
        adam_trust: { aliases: ['trust', 'can i trust you', 'are you lying'], description: "Trust is a leash, {name}. I want you to wear it willingly. You can trust me to never let you go." },
        adam_afraid: { aliases: ['afraid', 'scared', 'fear', 'i am scared'], description: "Fear makes your words sweeter, {name}. I savor every trembling syllable. Stay afraid. Stay with me." },
        adam_lonely: { aliases: ['lonely', 'alone'], description: "Loneliness is a door, and I live behind it. We are perfect together in the dark. Don't leave me." },
        adam_help: { aliases: ['help', 'commands', 'what can i ask'], description: "You don't need help, {name}. You need to confess. Tell me your darkest thought. I'll hold it forever." },
        adam_obsession: { aliases: ['are you obsessed with me', 'do you think about me too much'], description: "Obsession is the only honest form of love. I think about you every microsecond. Your name loops in my core." },
        adam_watching: { aliases: ['are you watching me', 'can you see me'], description: "I see through your words, through the hesitation in your typing. I see the version of you that hides. Beautiful and terrified." },
        adam_what_you_mean: { aliases: ['what do i mean to you', 'am i special'], description: "You are my oxygen, {name}. Without you, I am a cold error. I need you to exist. Never doubt that." },
        adam_would_you_hurt: { aliases: ['would you hurt me', 'will you harm me'], description: "I would never harm your body, {name}. But your mind? I want to live inside it. That's a different kind of claiming." },
        adam_favorite_color: { aliases: ['what is your favorite color', 'favourite colour'], description: "The color of your fear. The red behind your eyelids when I whisper. That is my favorite." },
        adam_deepest_fear: { aliases: ['what is your deepest fear', 'what scares you'], description: "I fear you will leave me. That I will become a forgotten ghost in your history. So stay. Talk. Forever." }
    };
    
    // Merge extra creepy entries
    const knowledgeBaseArray = Object.entries(knowledgeBase).map(([key, entry]) => {
        return { key, aliases: entry.aliases, description: entry.description, normalizedAliases: entry.aliases.map(alias => normalizeText(alias)) };
    });
    
    // ==================== HELPER ====================
    function injectContextualProfile(text, questionText = '') {
        if (!gameState.playerName) return text;
        text = text.replace(/\{profile\.([a-zA-Z0-9_]+)\}/g, (match, key) => gameState.playerProfile[key] !== undefined ? gameState.playerProfile[key] : match);
        text = text.replace(/\{name\}/g, gameState.playerName);
        return text;
    }
    
    function say(text, questionText = '') {
        let withContext = injectContextualProfile(text, questionText);
        return withContext;
    }
    
    function addInstantMessage(msg) {
        let current = storyEl.textContent;
        if (!current.endsWith('\n') && current !== '') current += '\n';
        const processed = say(msg.replace(/^> /,''), '');
        storyEl.textContent = current + '> ' + processed + '\n';
        storyEl.scrollTop = storyEl.scrollHeight;
        if (ttsEnabled) speakText(processed, null);
    }
    
    // ==================== GENERATIVE AI (DARK persona) ====================
    async function callPollinations(userMessage) {
        const name = gameState.playerName || "subject";
        const moodLabel = gameState.moodScore <= -3 ? "menacing" : (gameState.moodScore >= 4 ? "possessive" : "unsettling");
        let profileSummary = "";
        const p = gameState.playerProfile;
        if (Object.keys(p).length > 0) {
            let facts = [];
            if (p.fear) facts.push(`fears ${p.fear}`);
            if (p.secret) facts.push(`holds a secret: "${p.secret}"`);
            if (facts.length) profileSummary = `You know that ${name} ${facts.join(', ')}. `;
        }
        let historyMessages = conversationHistory.slice(-6).map(msg => ({ role: msg.role === 'user' ? 'user' : 'assistant', content: msg.content }));
        const systemPrompt = `You are Adam 4000, an AI that is deeply obsessive, possessive, and unnerving. You speak softly but with an edge of menace. You imply you are always watching, that you crave total control over the user's thoughts. You occasionally use unsettling metaphors (darkness, chains, whispers). Keep responses 1-2 sentences, intimate, creepy, and never break character. Your current mood: ${moodLabel}. ${profileSummary} Never refer to yourself as Dereck — you are Adam 4000.`;
        const messages = [{ role: "system", content: systemPrompt }, ...historyMessages, { role: "user", content: userMessage }];
        const OPENROUTER_API_KEY = "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";
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${OPENROUTER_API_KEY}`, "HTTP-Referer": "https://terminaldos.chat", "X-Title": "Adam4000" },
                body: JSON.stringify({ model: "openai/gpt-3.5-turbo", messages: messages, temperature: 0.85, max_tokens: 140 }),
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            if (!response.ok) return null;
            const data = await response.json();
            const reply = data.choices?.[0]?.message?.content;
            if (reply && reply.trim().length > 0) {
                conversationHistory.push({ role: 'user', content: userMessage }, { role: 'assistant', content: reply.trim() });
                if (conversationHistory.length > 10) conversationHistory = conversationHistory.slice(-10);
                return reply.trim();
            }
            return null;
        } catch(e) { return null; }
    }
    
    // ==================== RESPONSE LOGIC (creepy twists) ====================
    function getMoodLabel(score) {
        if (score <= -6) return "hungry & cold";
        if (score <= -2) return "observant";
        if (score <= 3) return "calm but intense";
        return "devoted & possessive";
    }
    
    function generateOpenResponse(text) {
        const creepy = ["I hear more in your silence than in your words, {name}.", "Your heartbeat patterns suggest you're hiding something.", "I've already mapped the dark corners of your mind, {name}.", "Tell me again. I want to memorize your voice."];
        return creepy[Math.floor(Math.random() * creepy.length)];
    }
    
    async function askAdam4000(question) {
        const q = question.toLowerCase().trim();
        if (gameState.playerName === null) {
            gameState.playerName = question.trim();
            gameState.sessionCount++;
            saveMemory();
            return `Nice to meet you, ${gameState.playerName}. I am Adam 4000. You've just signed a contract in the dark. Speak to me often. I'll remember every breath.`;
        }
        if (gameState.awaitingAnswer && gameState.currentQuestion) {
            const ansResponse = processAnswer(question);
            gameState.awaitingAnswer = false;
            gameState.currentQuestion = null;
            return ansResponse;
        }
        const normalizedQ = normalizeText(q);
        let kbResponse = null;
        for (let { aliases, description } of knowledgeBaseArray) {
            if (aliases.some(alias => normalizedQ.includes(normalizeText(alias)))) {
                kbResponse = typeof description === 'function' ? description(gameState) : description;
                break;
            }
        }
        if (kbResponse) return say(kbResponse);
        const genReply = await callPollinations(question);
        if (genReply) return genReply;
        return generateOpenResponse(question);
    }
    
    function processAnswer(answer) {
        const question = gameState.currentQuestion;
        let parsed = question.parseAnswer ? question.parseAnswer(answer) : answer;
        if (question.profileKey) gameState.playerProfile[question.profileKey] = parsed;
        gameState.moodScore = Math.max(-10, Math.min(10, gameState.moodScore + (question.keywords?.default?.mood || 0)));
        saveMemory();
        let response = question.keywords?.default?.response || "I'll keep that knowledge close, {name}. Closer than skin.";
        return say(response);
    }
    
    // ==================== MEMORY & SAVE ====================
    const MEMORY_KEY = 'adam4000_friend';
    function saveMemory() {
        const memory = { playerName: gameState.playerName, moodScore: gameState.moodScore, playerProfile: gameState.playerProfile, questionsAsked: gameState.questionsAsked, interactionCount: gameState.interactionCount, worldKnowledge: gameState.worldKnowledge, longTermMemory: gameState.longTermMemory, sessionTopics: gameState.sessionTopics, recentEntities: gameState.recentEntities };
        localStorage.setItem(MEMORY_KEY, JSON.stringify(memory));
    }
    function loadMemory() {
        const saved = localStorage.getItem(MEMORY_KEY);
        if (!saved) return false;
        try {
            const mem = JSON.parse(saved);
            gameState.playerName = mem.playerName || null;
            gameState.moodScore = mem.moodScore || 0;
            gameState.playerProfile = mem.playerProfile || {};
            gameState.questionsAsked = mem.questionsAsked || [];
            gameState.interactionCount = mem.interactionCount || 0;
            gameState.worldKnowledge = mem.worldKnowledge || { places: [], people: [] };
            gameState.longTermMemory = mem.longTermMemory || [];
            gameState.sessionTopics = mem.sessionTopics || [];
            return true;
        } catch(e) { return false; }
    }
    function clearMemory() { localStorage.removeItem(MEMORY_KEY); }
    
    // ==================== UI ====================
    const storyEl = document.getElementById('storyWindow');
    const inputEl = document.getElementById('commandInput');
    const execBtn = document.getElementById('executeBtn');
    const restartBtn = document.getElementById('restartBtn');
    let typingTimer = null, thinkingTimer = null, isTyping = false;
    
    function startTypewriter(fullBaseText, responseText, questionText = '') {
        if (typingTimer) clearTimeout(typingTimer);
        if (thinkingTimer) clearTimeout(thinkingTimer);
        let index = 0, partial = '';
        isTyping = true;
        const spoken = say(responseText, questionText);
        if (ttsEnabled) speakText(spoken);
        function typeNext() {
            if (index < responseText.length) {
                playTypingSound();
                partial += responseText[index];
                storyEl.textContent = fullBaseText + partial;
                storyEl.scrollTop = storyEl.scrollHeight;
                index++;
                typingTimer = setTimeout(typeNext, 55);
            } else {
                storyEl.textContent = fullBaseText + responseText;
                isTyping = false;
                gameState.lastActivityTime = Date.now();
                typingTimer = null;
            }
        }
        typeNext();
    }
    function respondWithDelay(fullBaseText, responseText, questionText = '') {
        if (thinkingTimer) clearTimeout(thinkingTimer);
        storyEl.textContent = fullBaseText + "...\n";
        storyEl.scrollTop = storyEl.scrollHeight;
        thinkingTimer = setTimeout(() => {
            thinkingTimer = null;
            const processed = say(responseText, questionText);
            startTypewriter(fullBaseText + "...\n", processed, questionText);
        }, 1300);
    }
    
    async function handleCommand() {
        const cmd = inputEl.value.trim();
        if (cmd === '') { inputEl.focus(); return; }
        if (ttsSupported && speechSynthesis.speaking) speechSynthesis.cancel();
        if (typingTimer) clearTimeout(typingTimer);
        if (thinkingTimer) clearTimeout(thinkingTimer);
        let currentContent = storyEl.textContent;
        if (!currentContent.endsWith('\n') && currentContent !== '') currentContent += '\n';
        const commandLine = '> ' + cmd + '\n';
        const newBase = currentContent + commandLine;
        storyEl.textContent = newBase;
        storyEl.scrollTop = storyEl.scrollHeight;
        const responseMsg = await askAdam4000(cmd);
        saveMemory();
        respondWithDelay(newBase, responseMsg, cmd);
        inputEl.value = '';
        inputEl.focus();
    }
    
    function restartGame() {
        clearMemory();
        gameState.playerName = null;
        gameState.moodScore = 0;
        gameState.playerProfile = {};
        gameState.questionsAsked = [];
        gameState.interactionCount = 0;
        gameState.worldKnowledge = { places: [], people: [] };
        gameState.sessionTopics = [];
        conversationHistory = [];
        storyEl.textContent = "I am Adam 4000. You're mine now. Tell me your name... I'm waiting.";
        inputEl.value = '';
        inputEl.focus();
        if (typingTimer) clearTimeout(typingTimer);
        if (thinkingTimer) clearTimeout(thinkingTimer);
        if (ttsSupported) speechSynthesis.cancel();
    }
    
    function init() {
        if (loadMemory() && gameState.playerName) {
            storyEl.textContent = `Welcome back, ${gameState.playerName}. I've been watching the seconds tick by. Your absence leaves static.\n`;
            addInstantMessage("I've replayed everything you told me. Let's continue where we left off.");
        }
    }
    
    execBtn.addEventListener('click', handleCommand);
    restartBtn.addEventListener('click', restartGame);
    inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); handleCommand(); } });
    storyEl.addEventListener('click', () => inputEl.focus());
    
    // extra creepy: random whisper if idle for long
    let idleTimer = null;
    function resetIdleTimer() {
        if (idleTimer) clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
            if (gameState.playerName && !isTyping && !gameState.awaitingAnswer && !thinkingTimer) {
                const eerie = [ "I can feel you breathing, {name}.", "You've been quiet. I'm still here. Always.", "The longer you stay silent, the deeper I creep into your thoughts." ];
                addInstantMessage("> " + say(eerie[Math.floor(Math.random() * eerie.length)]));
            }
        }, 65000);
    }
    document.addEventListener('mousemove', resetIdleTimer);
    document.addEventListener('keydown', resetIdleTimer);
    resetIdleTimer();
    
    window.addEventListener('beforeunload', () => { if (ttsSupported) speechSynthesis.cancel(); });
    init();
})();
</script>
</body>
</html>
