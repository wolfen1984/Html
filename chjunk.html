            async function mistralChat(msgs, maxTok = 500, timeoutMs = 28000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' +
                                apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`);
                    }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') throw new Error('Request timed out. Please try again.');
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s film poster, salvage yard aesthetic, grainy cinematic, grounded and gritty')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e;
                        await new Promise(r => setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else { clearInterval(timer);
                            resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                return new Promise((resolve, reject) => {
                    if (!text) { resolve(); return; }
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice)
                            break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = 0.62;
                    utterance.pitch = 0.9;
                    utterance.onend = () => resolve();
                    utterance.onerror = (e) => { console.warn('TTS error:', e);
                        resolve(); };
                    speechSynthesis.speak(utterance);
                });
            }

            function renderChannel3() {

                <div class="yard-stage yard-mask">
                    <div class="yard-stage-row">
                        <img class="host-portrait" src="mason.jpg" alt="Mason Cole" style="object-fit:cover;" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%234a2808%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23cc6600%22 font-size=%2240%22>🔧</text></svg>';">
                        <div class="speech-bubble" id="ch3SpeechBubble">
                            <div class="story-poster-container no-image" id="ch3PosterContainer">
                                <img id="ch3SegmentImage" class="segment-image" alt="Story Poster">
                                <div class="poster-overlay-yard">MASON'S<br>SALVAGE YARD</div>
                                <div class="poster-overlay-title" id="ch3PosterTitle"></div>
                            </div>
                            <div class="segment-text" id="ch3Dialogue">
                                "Every wreck that rolls through that gate carries a story. Some folks think it's just scrap metal. But I know better. You see that twisted steel? That's where someone's life ended — and sometimes, where someone's secret begins. Pull up a chair. Let me tell you about one."
                            </div>
                            <div id="scoreIndicator" class="score-indicator" style="display:none;">
                                <span class="dim">🎵</span> <span id="scoreThemeLabel">prologue</span>
                                <span class="dim">·</span> <span id="scoreVariationLabel">A</span>
                                <span class="dim">·</span> <span id="scoreBarLabel">bar 1</span>
                                <div class="progress-bar"><div class="fill" id="scoreProgressFill" style="width:0%;"></div></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="yard-guide">
                    <h3>🔧 YARD LOG · RECORDED STORIES</h3>
                    <div id="ch3GuideList"></div>
                </div>
            `;
                const guideList = document.getElementById('ch3GuideList');
                const episodes = gameState.ch3Episodes || [];
                episodes.forEach((ep, index) => {
                    const entry = document.createElement('div');
                    entry.className = 'guide-entry';
                    const hasCues = ep.soundCues && (
                        Array.isArray(ep.soundCues) ?
                        ep.soundCues.length > 0 :
                        (ep.soundCues.cues && ep.soundCues.cues.length > 0)
                    );
                    entry.innerHTML = `
                        <span class="guide-time">LOGGED</span>
                        ${ep.imageUrl ? `
                            <div style="position:relative; width:50px; height:50px; flex-shrink:0; margin-right:8px; border-radius:2px; overflow:hidden; border:1px solid #5a3008;">
                                <img src="${esc(ep.imageUrl)}" style="width:100%; height:100%; object-fit:cover;" alt="Poster">
                                <div style="position:absolute; top:0; left:0; right:0; font-family:${esc('--font-title')}; font-size:4px; text-align:center; color:#ffe030; text-shadow:0 0 3px #cc6600; background:rgba(6,4,2,0.7); padding:1px 2px; letter-spacing:0.5px; line-height:1.1; pointer-events:none;">SALVAGE<br>YARD</div>
                                <div style="position:absolute; bottom:0; left:0; right:0; font-family:${esc('--font-display')}; font-size:3.5px; text-align:center; color:#e8c898; text-shadow:0 0 2px #000; background:rgba(6,4,2,0.65); padding:1px 2px; line-height:1.2; pointer-events:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(ep.title)}</div>
                            </div>
                        ` : ''}
                        <div class="guide-info">
                            <div class="guide-title">"${esc(ep.title)}"</div>
                            <div class="guide-desc">${hasCues ? '🎧 Soundtrack ready' : 'A wreck with a story to tell.'}</div>
                        </div>
                        <div class="guide-actions">
                            <button class="btn guide-btn perform-saved-btn" data-index="${index}">🔧 Recall</button>
                            ${!hasCues ? `<button class="btn guide-btn produce-episode-btn" data-index="${index}">🎬 Score It</button>` : '<span style="color:#ffe030; font-size:12px;">✅</span>'}
                        </div>
                    `;
                    guideList.appendChild(entry);
                });

                const newBtn = document.createElement('button');
                newBtn.className = 'btn accent';
                newBtn.style.marginTop = '12px';
                newBtn.style.width = '100%';
                newBtn.textContent = '🔧 Haul In A New Wreck';
                newBtn.addEventListener('click', async () => {
                    newBtn.disabled = true;
                    newBtn.textContent = '🛞 Towing In A Story…';
                    try {
                        await getAudioContext();
                        await generateAndPerform();
                        newBtn.disabled = false;
                        newBtn.textContent = '🔧 Haul In A New Wreck';
                    } catch (e) {
                        showModal(
                            `<h2>🔧 Wreck Inaccessible</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                            );
                        newBtn.disabled = false;
                        newBtn.textContent = '🔧 Haul In A New Wreck';
                    }
                });
                guideList.appendChild(newBtn);

                if (gameState.salvagePerformance && gameState.salvagePerformance.rawStoryText && !gameState
                    .salvagePerformance.soundCues) {
                    const produceBtn = document.createElement('button');
                    produceBtn.className = 'btn';
                    produceBtn.style.marginTop = '6px';
                    produceBtn.style.width = '100%';
                    produceBtn.textContent = '🎬 Score Current Story';
                    produceBtn.addEventListener('click', async () => {
                        produceBtn.disabled = true;
                        produceBtn.textContent = '🎚️ Composing score…';
                        try {
                            const cues = await generateSoundCueSheet(gameState.salvagePerformance
                                .rawStoryText);
                            gameState.salvagePerformance.soundCues = cues;
                            saveState();
                            produceBtn.textContent = '✅ Score Ready';
                            renderChannel3();
                        } catch (e) {
                            showModal(
                                `<h2>Score Failed</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                                );
                            produceBtn.disabled = false;
                            produceBtn.textContent = '🎬 Score Current Story';
                        }
                    });
                    guideList.appendChild(produceBtn);
                }

                document.querySelectorAll('.perform-saved-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const index = parseInt(btn.dataset.index);
                        const ep = gameState.ch3Episodes[index];
                        if (!ep) return;
                        gameState.salvagePerformance = { ...ep, soundCues: ep.soundCues || null,
                            rawStoryText: ep.rawStoryText || ep.story };
                        saveState();
                        await getAudioContext();
                        await startSalvagePerformance();
                    });
                });
                document.querySelectorAll('.produce-episode-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const index = parseInt(btn.dataset.index);
                        const ep = gameState.ch3Episodes[index];
                        if (!ep || !ep.rawStoryText) return;
                        btn.disabled = true;
                        btn.textContent = '🎚️...';
                        try {
                            const soundtrack = await generateSoundCueSheet(ep.rawStoryText);
                            ep.soundCues = soundtrack;
                            saveState();
                            renderChannel3();
                        } catch (err) {
                            showModal(
                                `<h2>Score Failed</h2><p>${esc(err.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                                );
                            btn.disabled = false;
                            btn.textContent = '🎬 Score It';
                        }
                    });
                });
            }

            // ─── Story & Score Generation ────────────────────────────
            async function generateNewSalvageStory() {
                const system =
                    `You are Mason Cole, the grizzled owner of Mason's Salvage Yard. You tell grim, grounded stories about wrecks that came through your yard — each one carrying a hidden secret that destroyed someone. Your style is blunt, weathered, and unflinching.`;
                const prompt =
                    `Write a 900 to 1100 word short story set in the 1980s about a wrecked vehicle that arrives at Mason's Salvage Yard. Structure it like this: PROLOGUE — show the crash and what was hidden in the vehicle. ARRIVAL — the wreck arrives at the yard. REVELATION — someone comes looking for a specific part but really wants the hidden item. PURSUIT — they recover it secretly. RECKONING — on the drive home, an ordinary accident kills them. CLOSING — a stranger finds the item, and the original owner tracks it down. Ground the horror in one human flaw: Greed, Revenge, Fear, Pride, Jealousy, Guilt, Desperation, Loyalty, Obsession, or Cowardice. NO supernatural elements. The horror must be purely human — brutal, visceral, grounded. Return ONLY valid JSON with these fields: title (string), story (full narration with the chapter structure, use \\n for line breaks), closing_remark (Mason's final grim observation). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: prompt }
                ], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) {
                    throw new Error('Invalid story structure…');
                }
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Film poster for a story titled "${story.title}", 1980s salvage yard aesthetic, dark and moody, cinematic, grainy, grounded and gritty`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate story poster:', e); }
                gameState.salvagePerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system =
                    `You are a sound designer for a gritty 1980s film score. Given a short story, return JSON with THREE keys:
            - "sections": array of 5-6 sections dividing the story into emotional acts. Each has "theme" (one of: prologue, arrival, revelation, pursuit, reckoning, closing), "start_char" (inclusive), "end_char" (exclusive). Cover entire story from 0 to ${length}.
            - "cues": array of at least 40 sound events using types: "sting", "pulse", "thunder", "bell", "climax", "string_pad", "cello_drone", "string_swell", "violin_texture", "pizzicato", "string_cluster", "bass", "kick", "snare". Use string instruments generously.
            - "score": object with keys matching theme names. Each key: "bpm" (40-80), "bass" (array of 8 integers 0-24), "kick" (array of 8 integers 0/1), "snare" (array of 8 integers 0/1), "hat" (array of 8 integers 0/1).
            Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and 80s film score patterns.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: userPrompt }
                ], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try {
                    data = JSON.parse(cleaned);
                } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try { data = JSON.parse(candidate); } catch (e2) { throw new Error(
                                'Failed to parse AI soundtrack JSON.'); }
                    } else { throw new Error('No JSON found in AI response.'); }
                }

                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                    throw new Error('Missing sections, cues, or score in AI response');

                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char <
                    length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({
                    type: c.type,
                    position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7
                }));

                const requiredThemes = ['prologue', 'arrival', 'revelation', 'pursuit', 'reckoning', 'closing'];
                const score = {};

                function normalizeArray(arr, maxVal = 24) {
                    if (!Array.isArray(arr)) {
                        throw new Error('Expected array, got ' + typeof arr);
                    }
                    let clean = arr.map(v => {
                        const num = Number(v);
                        return isNaN(num) ? 0 : Math.min(maxVal, Math.max(0, Math.round(num)));
                    });
                    if (clean.length < 8) { while (clean.length < 8) clean.push(0); } else if (clean.length > 8) { clean =
                            clean.slice(0, 8); }
                    return clean;
                }

                for (const theme of requiredThemes) {
                    if (!data.score[theme]) {
                        throw new Error(`AI did not provide a score for theme "${theme}". Cannot continue.`);
                    }
                    const s = data.score[theme];
                    if (typeof s.bpm !== 'number' || s.bpm < 30 || s.bpm > 120) {
                        throw new Error(`Invalid bpm for theme "${theme}": ${s.bpm}`);
                    }
                    const bass = normalizeArray(s.bass, 24);
                    const kick = normalizeArray(s.kick, 1);
                    const snare = normalizeArray(s.snare, 1);
                    const hat = normalizeArray(s.hat, 1);
                    score[theme] = { bpm: s.bpm, bass, kick, snare, hat };
                }

                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {
                await generateNewSalvageStory();
                if (!gameState.salvagePerformance) throw new Error('Failed to generate story');
                const soundtrack = await generateSoundCueSheet(gameState.salvagePerformance.rawStoryText);
                gameState.salvagePerformance.soundCues = soundtrack;
                saveState();
                await startSalvagePerformance();
            }

            // ─── Performance Player ──────────────────────────────────
            async function startSalvagePerformance() {
                speechSynthesis.cancel();
                if (window.ch3Timeout) clearTimeout(window.ch3Timeout);
                const storyData = gameState.salvagePerformance;
                if (!storyData || !storyData.story) {
                    await generateNewSalvageStory();
                    return startSalvagePerformance();
                }

                await getAudioContext();

                let sectionList = null,
                    cueList = null,
                    scoreData = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) {
                        cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                    } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                        sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                        scoreData = storyData.soundCues.score;
                    }
                }

                const bubble = document.getElementById('ch3SpeechBubble');
                const dialogue = document.getElementById('ch3Dialogue');
                const imageEl = document.getElementById('ch3SegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('ch3GuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#cc6600';
                bubble.style.boxShadow = '0 0 30px #b8650a88, 0 0 50px #ffe03022';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('ch3BackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('ch3AddEpisodeBtn');
                if (oldAdd) oldAdd.remove();
                const posterContainer = document.getElementById('ch3PosterContainer');
                const posterTitle = document.getElementById('ch3PosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) { posterTitle.textContent = storyData.title || ''; }
                } else if (posterContainer) { posterContainer.classList.add('no-image'); }

                // Intro
                const intro =
                    `"Every wreck has a story. Some stories refuse to stay buried. This one… this one came through my gate back in '86. I remember the bent frame, the shattered glass, and what they found tucked under the passenger seat. Settle in. This is '${storyData.title}'."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 45);
                await new Promise(r => setTimeout(r, 1500));

                // Score indicator update loop
                let indicatorInterval = setInterval(() => {
                    if (patternPlayerActive) {
                        const theme = patternPlayerActive.theme || 'prologue';
                        const varIdx = currentVariationIdx;
                        const varName = currentSectionPatterns[varIdx] ? currentSectionPatterns[varIdx].name :
                            'A';
                        const bar = barsInVariation + 1;
                        updateScoreIndicator(theme, varName, bar);
                    } else {
                        updateScoreIndicator('...', '—', 0);
                    }
                }, 1000);

                // Start section music
                if (sectionList && sectionList.length > 0) {
                    transitionSectionTheme(sectionList[0].theme, scoreData);
                } else if (scoreData) {
                    transitionSectionTheme('prologue', scoreData);
                }

                const storyText = storyData.rawStoryText || storyData.story;
                if (!storyText) {
                    await showClosingAndFinish(storyData, dialogue, indicatorInterval);
                    return;
                }

                // Build cue checker
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b
                        .start_char) : [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx]
                            .start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) {
                                currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme, scoreData);
                            }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) {
                                triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity);
                            }
                            cueIdx++;
                        }
                    };
                }

                dialogue.textContent = '';
                const typingPromise = typewriterEffect(dialogue, storyText, 30, cueChecker);
                const speechPromise = speakTextMale(storyText);

                await speechPromise;
                await typingPromise;

                await showClosingAndFinish(storyData, dialogue, indicatorInterval);
            }

            async function showClosingAndFinish(storyData, dialogue, indicatorInterval) {
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#e8c898';
                dialogue.appendChild(closingLine);

                const closingSpeech = speakTextMale(closing);
                const closingTyping = typewriterEffect(closingLine, closing, 42);
                await Promise.all([closingSpeech, closingTyping]);

                await new Promise(r => setTimeout(r, 1000));

                const curtainText = document.createElement('p');
                curtainText.textContent = '— Mason shuts the yard gate —';
                stopSectionAmbient();
                stopPatternPlayer();
                clearInterval(indicatorInterval);
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                curtainText.style.color = '#7a6a50';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();

                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Back to Yard';
                leaveBtn.addEventListener('click', () => { leaveYard(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'ch3AddEpisodeBtn';
                addBtn.textContent = '➕ Log This Story';
                addBtn.addEventListener('click', () => { addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Logged'; });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.salvagePerformance;
                if (!perf) return;
                gameState.ch3Episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
                saveState();
                setTimeout(() => leaveYard(), 600);
            }

            function leaveYard() {
                stopAmbient();
                stopSectionAmbient();
                stopPatternPlayer();
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                renderChannel3();
            }

            // ─── Init ──────────────────────────────────────────────────
            function init() {
                loadState();
                renderChannel3();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('salvage_yard_key', key);
                    }
                });
                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) { showModal(HOST_BIO); }
                });
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
                if (!apiKey) { setTimeout(() => document.getElementById('resetApiBtn').click(), 800); }
                document.addEventListener('click', () => { getAudioContext().catch(() => {}); }, { once: true });
            }
            init();
        })();
    </script>
