<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>THE SALVAGE YARD · 1986</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Special+Elite&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0705;
            --screen-bg: #0d0a06;
            --panel-bg: #100c08;
            --text: #c4b8a0;
            --text-dim: #7a6a50;
            --text-bright: #e8d8b8;
            --accent: #b8650a;
            --accent-dim: #4a2808;
            --border: #8b5508;
            --border-glow: 0 0 14px #b8650a55, 0 0 32px #4a280822;
            --danger: #b8650a;
            --danger-glow: 0 0 12px #b8650a44;
            --amber: #d4a020;
            --amber-dim: #5c4010;
            --gold: #e8b820;
            --gold-dim: #4a3808;
            --neon-yellow: #ffe030;
            --neon-yellow-glow: 0 0 18px #ffe03088, 0 0 40px #e8b82044;
            --neon-brown: #cc6600;
            --neon-brown-glow: 0 0 14px #cc660066, 0 0 28px #8b440022;
            --input-bg: #120e08;
            --button-bg: #16120c;
            --button-hover: #1c160e;
            --button-active: #181008;
            --bevel-light: #2a2418;
            --bevel-dark: #060402;
            --font-display: 'Creepster', 'Press Start 2P', cursive;
            --font-title: 'Press Start 2P', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 24px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #140e06 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #16100c;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2a2018, 0 0 0 4px #0d0a06, 0 0 0 8px #060402, 0 8px 48px #000000dd, 0 0 60px #4a280822;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #8b5508;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #0a0604;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #ffe030;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffe03088, 0 0 18px #e8b82033;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #ffe03088, 0 0 18px #e8b82033;
            }
            50% {
                box-shadow: 0 0 14px #ffe030bb, 0 0 28px #e8b82055;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #5a4020;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #8b5508;
            box-shadow: var(--neon-brown-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0,
                        var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #0c0804;
            border-bottom: 3px solid #8b5508;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #1a0c04;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #8b5508;
            border-radius: 2px;
            padding: 10px 14px;
            background: #080400;
            position: relative;
            box-shadow: inset 0 0 24px #4a280811, var(--neon-brown-glow);
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #cc6600;
            box-shadow: 0 0 12px #cc660088;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #ffe03044;
            box-shadow: 0 0 8px #ffe03033;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #ffe030;
            text-shadow: 0 0 16px #e8b82088, 0 2px 4px #000, 0 0 40px #8b550888, 0 0 60px #cc660044;
            letter-spacing: 3px;
            font-family: var(--font-title);
            line-height: 1.3;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #b8956a;
            letter-spacing: 5px;
            margin-top: 3px;
            text-shadow: 0 0 8px #cc660033;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 16px;
                letter-spacing: 1px;
            }
            .marquee-sub {
                font-size: 9px;
                letter-spacing: 3px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #3a2008 #0d0a06;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #0d0a06;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #3a2008;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #2a2418;
            border-top-color: #3a3020;
            border-left-color: #342c1c;
            border-right-color: #1c1810;
            border-bottom-color: #100e08;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #1c1810;
            border-left-color: #1c1810;
            border-bottom-color: #3a3020;
            border-right-color: #342c1c;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #100e08;
        }
        .btn.accent {
            background: #180c04;
            border-color: #6b3a08;
            border-top-color: #8b4a10;
            border-left-color: #7a400c;
            border-right-color: #3a1c04;
            border-bottom-color: #1a0c02;
            color: #e8c898;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #b8650a22;
        }
        .btn.accent:active {
            border-top-color: #3a1c04;
            border-left-color: #3a1c04;
            border-bottom-color: #8b4a10;
            border-right-color: #7a400c;
            box-shadow: 0 0px 0 #00000044, 0 0 16px #b8650a44;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .yard-mask {
            position: relative;
            background: #100c08;
            border: 2px solid #8b550866;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.8);
        }
        .yard-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0c0804;
            border: 2px solid #8b5508;
            padding: 15px;
            border-radius: 3px;
        }
        .yard-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #cc6600;
            box-shadow: 0 0 22px #b8650a66, 0 0 0 2px #1a0c04, var(--neon-brown-glow);
            object-fit: cover;
            flex-shrink: 0;
            background: #0c0604;
        }
        .speech-bubble {
            flex: 1;
            background: #120e08;
            border: 2px solid #8b5508;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #d4c0a0;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: var(--neon-brown-glow);
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #8b550888 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #0c0804;
            border: 1px solid #3a2008;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #140e08;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a6a50;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #8b5508;
            box-shadow: 0 0 20px #b8650a44, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #0c0804;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(6, 4, 2, 0.85) 100%);
            z-index: 2;
        }
        .poster-overlay-yard {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 12px;
            letter-spacing: 2px;
            color: #ffe030;
            text-shadow: 0 0 10px #e8b820cc, 0 0 30px #cc660088, 0 2px 4px #000000, 0 0 60px #4a2808;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom,
                    rgba(10, 6, 2, 0.9) 0%,
                    rgba(10, 6, 2, 0.7) 40%,
                    transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 16px;
            letter-spacing: 1.5px;
            color: #ffe030;
            text-shadow: 0 0 8px #e8b82088, 0 0 20px #5c401044, 0 2px 4px #000000;
            background: linear-gradient(to top,
                    rgba(6, 4, 2, 0.9) 0%,
                    rgba(6, 4, 2, 0.6) 50%,
                    transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a6a50;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-yard,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-yard {
                font-size: 10px;
                letter-spacing: 1px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 12px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .yard-guide {
            margin-top: 15px;
            border-top: 2px solid #8b5508;
            padding-top: 10px;
        }
        .yard-guide h3 {
            font-family: var(--font-display);
            color: #e8c898;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 10px #b8650a44;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0e0a06;
            border: 1px solid #8b5508;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #ffe030;
            min-width: 50px;
            text-shadow: 0 0 6px #e8b82044;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #e8c898;
        }
        .guide-desc {
            font-size: 15px;
            color: #7a6a50;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #100c08;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #cc6600;
            box-shadow: var(--neon-brown-glow), 0 0 80px #000000dd;
            color: #c4b8a0;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #16120c;
            border: 2px solid #8b550866;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #c4b8a0;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #cc6600;
            box-shadow: 0 0 14px #b8650a44;
        }
        .loading-text {
            color: #ffe030;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #080400;
            border-top: 1px solid #8b550844;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #5a4020;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #6b4a28;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #1a140c;
            color: #6b4a28;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #5a4020;
            color: #8b6a40;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #d4c0a0;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .yard-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">MASON'S SALVAGE YARD · CRT-86</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE SALVAGE<br>YARD</div>
                    <div class="marquee-sub">⏤ 1986 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channel3Panel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🔧 MASON'S SALVAGE · EVERY WRECK HAS A STORY</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('salvage_yard_key') || '';

            const DEFAULT_STATE = {
                ch3Episodes: [],
                salvagePerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>🔧 Mason Cole</h2>
        <p style="text-align:left;">
            <strong>Yard:</strong> <em>Mason's Salvage Yard</em><br>
            <strong>Bio:</strong> A grizzled Vietnam vet who's seen too much, Mason has run this salvage yard for eighteen years. He knows every wreck that comes through the gate carries more than bent steel — it carries the final chapter of someone's life. Some nights, when the yard lights flicker and the coyotes go quiet, he'll tell you a story about a particular wreck. And you'd best listen close, because every story he tells is true.
        </p>

            // ── SOUND ENGINE (Web Audio API) ──
            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let crossfadeTimeout = null;

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.18;
                    reverbNode.connect(masterGain);
                    const compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.value = -24;
                    compressor.knee.value = 30;
                    compressor.ratio.value = 12;
                    compressor.attack.value = 0.003;
                    compressor.release.value = 0.25;
                    masterGain.connect(compressor);
                    compressor.connect(audioCtx.destination);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 1.0;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.35;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                    reverbNode.connect(masterGain);
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 2.5;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.5));
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            function createSynthPad(ctx, frequency, duration, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.15, now + 0.6);
                gainNode.gain.setValueAtTime(intensity * 0.15, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.3);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.004;
                const osc3 = ctx.createOscillator();
                osc3.type = 'triangle';
                osc3.frequency.value = frequency * 0.5;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 1.5;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.15 + Math.random() * 0.15;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 150 + Math.random() * 150;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            function createSting(ctx, intensity = 0.4) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.18, now + 0.03);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.8);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.3);
                osc.frequency.exponentialRampToValueAtTime(80, now + 1.4);

                const osc2 = ctx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(240, now);
                osc2.frequency.exponentialRampToValueAtTime(800, now + 0.3);
                osc2.frequency.exponentialRampToValueAtTime(160, now + 1.4);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 1;

                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc.start(now);
                osc2.start(now);
                osc.stop(now + 1.8);
                osc2.stop(now + 1.8);
            }

            function createClimax(ctx, intensity = 0.7) {
                const now = ctx.currentTime;
                const duration = 10 + Math.random() * 8;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.4, now + 2.5);
                gainNode.gain.setValueAtTime(intensity * 0.5, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(90, now);
                osc1.frequency.exponentialRampToValueAtTime(180, now + duration * 0.6);
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(180, now);
                osc2.frequency.exponentialRampToValueAtTime(360, now + duration * 0.6);
                const osc3 = ctx.createOscillator();
                osc3.type = 'square';
                osc3.frequency.setValueAtTime(90, now);
                osc3.frequency.exponentialRampToValueAtTime(270, now + duration * 0.8);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(250, now);
                filter.frequency.exponentialRampToValueAtTime(1000, now + duration);
                filter.Q.value = 1.8;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.12;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 180;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    switch (type) {
                        case 'pad':
                            createSynthPad(ctx, 100 + Math.random() * 35, 18 + Math.random() * 18, gainValue);
                            break;
                        case 'sting':
                            createSting(ctx, gainValue);
                            break;
                        case 'heartbeat':
                            playThump(ctx, now, 0.7 * gainValue);
                            setTimeout(() => playThump(ctx, now + 0.15, 0.7 * gainValue), 150);
                            break;
                        case 'thunder': {
                            const bufferSize = ctx.sampleRate * 0.6;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.35));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(gainValue * 0.5, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 1);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 120;
                            filter.Q.value = 0.5;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(now);
                            source.stop(now + 1);
                            break;
                        }
                        case 'bell': {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 70 + Math.random() * 25;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0, now);
                            gain.gain.linearRampToValueAtTime(gainValue * 0.35, now + 0.1);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 3.5);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 400;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(now);
                            osc.stop(now + 3.5);
                            break;
                        }
                        case 'climax':
                            createClimax(ctx, gainValue);
                            break;
                        default:
                            console.warn(`Unknown sound type: ${type}`);
                    }
                } catch (err) {
                    console.error(`Error in playSound("${type}"):`, err);
                }
            }

            function playThump(ctx, time, intensity) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(55, time);
                osc.frequency.exponentialRampToValueAtTime(25, time + 0.1);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.7, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(time);
                osc.stop(time + 0.1);
            }

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(gainValue * 0.25, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'ambient_drone' || type === 'wind_howl') {
                        const bufferSize = ctx.sampleRate * 1;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.4;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'ambient_drone' ? 180 : 500;
                        filter.Q.value = 0.5;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'ambient_drone' ? 70 : 100;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.18 * gainValue;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 85;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) {
                    console.error(`Error in playAmbient("${type}"):`, err);
                }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 300);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 25000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' +
                                apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`);
                    }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') {
                        throw new Error('Request timed out. Please try again.');
                    }
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s film poster, salvage yard aesthetic, grainy cinematic')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

                let lastError = null;
                for (let i = 0; i < retries; i++) {

                            setTimeout(r, 20)); }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else { clearInterval(timer);
                            resolve(); }
                    }, speed);
                });

            function speakTextMale(text) {

                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                    'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'

                let voice = null;
                for (const name of maleNames) {
                    voice = voices.find(v => v.name.includes(name));
                    if (voice) break;

                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.6;

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) {
                        voice = voices.find(v => v.name.includes(name));
                        if (voice) break;
                    }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.6;
                    utterance.pitch = voiceConfig.pitch || 0.88;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) {
                            currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar);
                            if (cueChecker) cueChecker(currentChar);
                        }
                    };
                    utterance.onend = () => {
                        element.textContent = text;
                        if (cueChecker) cueChecker(text.length);
                        resolve();
                    };
                    utterance.onerror = (e) => {
                        console.warn('TTS error:', e);
                        element.textContent = text;
                        resolve();
                    };
                    speechSynthesis.speak(utterance);
                });
            }

            async function generateNewSalvageStory() {
                const system =
                    `You are Mason Cole, the grizzled owner of Mason's Salvage Yard. You tell grim, grounded stories about wrecks that came through your yard — each one carrying a hidden secret that destroyed someone. Your style is blunt, weathered, and unflinching.`;
                const prompt =
                    `Write a 500 to 750 word short story set in the 1980s about a wrecked vehicle that arrives at Mason's Salvage Yard. Structure it like this: PROLOGUE — show the crash and what was hidden in the vehicle. CHAPTER ONE — the wreck arrives at the yard. CHAPTER TWO — someone comes looking for a specific part but really wants the hidden item. CHAPTER THREE — they recover it secretly. CHAPTER FOUR — on the drive home, an ordinary accident kills them. CHAPTER FIVE — a stranger finds the item. CHAPTER SIX — the original owner tracks it down, and the new holder must choose what to do. Ground the horror in one human flaw: Greed, Revenge, Fear, Pride, Jealousy, Guilt, Desperation, Loyalty, Obsession, or Cowardice. NO supernatural elements. The horror must be purely human — brutal, visceral, grounded. Think Stephen King meets Hitchcock in a junkyard. Return ONLY valid JSON with these fields: title (string), story (full narration with the chapter structure, use backslash n for line breaks), closing_remark (Mason's final grim observation). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: prompt }
                ], 2000, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) {
                    throw new Error('Invalid story structure…');
                }
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Film poster for a story titled "${story.title}", 1980s salvage yard aesthetic, dark and moody, cinematic, grainy, neon brown and yellow tones`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate story poster:', e); }
                gameState.salvagePerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system =
                    `You are a sound designer for an 80s film soundtrack. Given a short story, return a JSON object with THREE keys: "sections" (5-6 sections dividing the story into emotional acts, each with "theme": one of intro/setup/scheme/execution/twist/closing, "start_char" inclusive, "end_char" exclusive, covering 0 to ${length}), "cues" (at least 40 sound events using types: sting, heartbeat, thunder, bell, climax — each with "position", "type", optional "intensity" 0-1), and "score" (an object with keys matching the theme names, each containing: "bpm" 60-120, "bass" array of 8 semitone intervals from root 0, "arp" array of 8 semitone intervals, "kick" array of 8 numbers 1=hit 0=rest, "snare" same as kick). Make the music cinematic and tense — think Vangelis meets Tangerine Dream. intro sparse and slow, execution driving, twist dissonant. Return ONLY raw JSON.`;
                const userPrompt = `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and score patterns.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: userPrompt }
                ], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try {
                    data = JSON.parse(cleaned);
                } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try { data = JSON.parse(candidate); } catch (e2) { throw new Error(
                                'Failed to parse AI soundtrack JSON.'); }
                    } else { throw new Error('No JSON found in AI response.'); }
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object') {
                    throw new Error('Missing sections, cues, or score in AI response');
                }
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                sortedSections[0].start_char = 0;
                sortedSections[sortedSections.length - 1].end_char = length;
                const cues = data.cues.map(c => ({ type: c.type, position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7 }));
                const requiredThemes = ['intro', 'setup', 'scheme', 'execution', 'twist', 'closing'];
                const score = {};
                for (const theme of requiredThemes) {
                    if (data.score[theme]) {
                        score[theme] = {
                            bpm: data.score[theme].bpm || 85,
                            bass: data.score[theme].bass || [0, 0, 7, 7, 0, 0, 7, 7],
                            arp: data.score[theme].arp || [12, 15, 12, 19, 12, 15, 12, 19],
                            kick: data.score[theme].kick || [1, 0, 1, 0, 1, 0, 1, 0],
                            snare: data.score[theme].snare || [0, 0, 0, 1, 0, 0, 0, 1]
                        };
                    } else {
                        score[theme] = { bpm: 85, bass: [0, 0, 7, 7, 0, 0, 7, 7], arp: [12, 15, 12, 19, 12, 15, 12,
                                19
                            ], kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] };
                    }
                }
                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {

                gameState.salvagePerformance.soundCues = soundtrack;

            function createNote(ctx, frequency, startTime, duration, gainValue, type = 'sawtooth') {
                const now = startTime;
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.006;
                const sub = ctx.createOscillator();
                sub.type = 'triangle';
                sub.frequency.value = frequency / 2;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 350;
                filter.Q.value = 1.3;
                const filterEnv = ctx.createGain();
                filterEnv.gain.setValueAtTime(600, now);
                filterEnv.gain.exponentialRampToValueAtTime(160, now + 0.1);
                filterEnv.gain.exponentialRampToValueAtTime(40, now + duration * 0.8);
                filterEnv.connect(filter.frequency);
                const mainGain = ctx.createGain();
                mainGain.gain.setValueAtTime(0, now);
                mainGain.gain.linearRampToValueAtTime(gainValue * 0.28, now + 0.02);
                mainGain.gain.setValueAtTime(gainValue * 0.28, now + duration * 0.6);
                mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.1);
                osc1.connect(filter);
                osc2.connect(filter);
                sub.connect(filter);
                filter.connect(mainGain);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.75;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.45;
                mainGain.connect(drySend);
                mainGain.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);
                osc1.start(now);
                osc2.start(now);
                sub.start(now);
                osc1.stop(now + duration + 0.2);
                osc2.stop(now + duration + 0.2);
                sub.stop(now + duration + 0.2);
            }

            function createKick(ctx, time) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(130, time);
                osc.frequency.exponentialRampToValueAtTime(28, time + 0.08);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.02, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.003));
                }
                const click = ctx.createBufferSource();
                click.buffer = noiseBuffer;
                const clickFilter = ctx.createBiquadFilter();
                clickFilter.type = 'highpass';
                clickFilter.frequency.value = 1800;
                click.connect(clickFilter);
                const gainClick = ctx.createGain();
                gainClick.gain.setValueAtTime(0.4, time);
                gainClick.gain.exponentialRampToValueAtTime(0.001, time + 0.02);
                clickFilter.connect(gainClick);
                const gainBody = ctx.createGain();
                gainBody.gain.setValueAtTime(0.6, time);
                gainBody.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
                osc.connect(gainBody);
                gainBody.connect(dryGain);
                gainClick.connect(dryGain);
                osc.start(time);
                click.start(time);
                osc.stop(time + 0.2);
                click.stop(time + 0.02);
            }

            function createSnare(ctx, time) {
                const body = ctx.createOscillator();
                body.type = 'triangle';
                body.frequency.setValueAtTime(180, time);
                body.frequency.exponentialRampToValueAtTime(70, time + 0.08);
                const bodyGain = ctx.createGain();
                bodyGain.gain.setValueAtTime(0.5, time);
                bodyGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                body.connect(bodyGain);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.03));
                }
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.6, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                bodyGain.connect(dryGain);
                noiseGain.connect(dryGain);
                body.start(time);
                noise.start(time);
                body.stop(time + 0.1);
                noise.stop(time + 0.15);
            }

            const SCORE_PATTERNS = {
                intro: { bpm: 55, bass: [0, 0, 7, 7, 0, 0, 7, 7], arp: [12, 16, 12, 20, 12, 16, 12, 20], kick: [1,
                        0, 1, 0, 1, 0, 1, 0
                    ], snare: [0, 0, 0, 1, 0, 0, 0, 1] },
                setup: { bpm: 60, bass: [0, 5, 7, 3, 0, 5, 7, 3], arp: [12, 15, 19, 15, 12, 15, 19, 15], kick: [1,
                        0, 1, 0, 1, 0, 1, 0
                    ], snare: [0, 0, 0, 1, 0, 0, 0, 1] },
                scheme: { bpm: 68, bass: [0, 3, 5, 7, 8, 7, 5, 3], arp: [12, 15, 19, 22, 24, 22, 19, 15], kick: [1,
                        0, 1, 1, 1, 0, 1, 0
                    ], snare: [0, 0, 1, 0, 0, 0, 1, 0] },
                execution: { bpm: 78, bass: [0, 7, 0, 7, 3, 7, 3, 7], arp: [12, 19, 15, 19, 12, 19, 15, 19],
                    kick: [1, 1, 1, 1, 1, 1, 1, 1], snare: [0, 1, 0, 1, 0, 1, 0, 1] },
                twist: { bpm: 82, bass: [0, 3, 6, 8, 0, 3, 6, 8], arp: [12, 16, 20, 24, 12, 16, 20, 24], kick: [1,
                        0, 1, 0, 1, 0, 1, 0
                    ], snare: [1, 1, 1, 1, 1, 1, 1, 1] },
                closing: { bpm: 50, bass: [0, 7, 5, 0, 7, 5, 0, 7], arp: [12, 15, 12, 19, 12, 15, 12, 19], kick: [1,
                        0, 0, 0, 1, 0, 0, 0
                    ], snare: [0, 0, 0, 1, 0, 0, 0, 1] }
            };

            function startSectionScore(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                let customScore = null;
                const perf = gameState.salvagePerformance;
                if (perf && perf.soundCues && perf.soundCues.score) {
                    customScore = perf.soundCues.score;
                }
                const fallbackTheme = SCORE_PATTERNS[themeName] || SCORE_PATTERNS.intro;
                const theme = (customScore && customScore[themeName]) ? customScore[themeName] : fallbackTheme;
                const rootFreq = 55;
                const beatDuration = 60 / theme.bpm;
                const patternLength = theme.bass.length;
                const ctx = audioCtx;
                let step = 0;
                let nextStepTime = ctx.currentTime;
                const padGain = ctx.createGain();
                padGain.gain.value = 0.08;
                const padOsc1 = ctx.createOscillator();
                padOsc1.type = 'sawtooth';
                padOsc1.frequency.value = rootFreq;
                const padOsc2 = ctx.createOscillator();
                padOsc2.type = 'sawtooth';
                padOsc2.frequency.value = rootFreq * 1.501;
                const padOsc3 = ctx.createOscillator();
                padOsc3.type = 'triangle';
                padOsc3.frequency.value = rootFreq / 2;
                const padFilter = ctx.createBiquadFilter();
                padFilter.type = 'lowpass';
                padFilter.frequency.value = 250;
                padFilter.Q.value = 1;
                padOsc1.connect(padFilter);
                padOsc2.connect(padFilter);
                padOsc3.connect(padFilter);
                padFilter.connect(padGain);
                const padDry = ctx.createGain();
                padDry.gain.value = 0.5;
                const padWet = ctx.createGain();
                padWet.gain.value = 0.35;
                padGain.connect(padDry);
                padGain.connect(padWet);
                padDry.connect(dryGain);
                padWet.connect(wetGain);
                padOsc1.start();
                padOsc2.start();
                padOsc3.start();
                const stopSources = [padOsc1, padOsc2, padOsc3];
                let timeoutId;

                function scheduleStep() {
                    if (!sectionAmbientActive) return;
                    const now = nextStepTime;
                    const bassSemitone = theme.bass[step % patternLength];
                    const bassFreq = rootFreq * Math.pow(2, bassSemitone / 12);
                    createNote(ctx, bassFreq, now, beatDuration * 0.9, 0.7, 'sawtooth');
                    const arpSemitone = theme.arp[step % patternLength];
                    const arpFreq = rootFreq * Math.pow(2, arpSemitone / 12);
                    createNote(ctx, arpFreq, now, beatDuration * 0.5, 0.5, 'square');
                    if (theme.kick[step % patternLength]) createKick(ctx, now);
                    if (theme.snare[step % patternLength]) createSnare(ctx, now);
                    step++;
                    nextStepTime += beatDuration;
                    timeoutId = setTimeout(scheduleStep, (nextStepTime - ctx.currentTime) * 1000);
                }
                nextStepTime = ctx.currentTime + 0.05;
                timeoutId = setTimeout(scheduleStep, 50);
                sectionAmbientActive = {
                    stop: () => {
                        clearTimeout(timeoutId);
                        padGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                        stopSources.forEach(s => { try { s.stop(ctx.currentTime + 0.3); } catch (e) {} });
                        sectionAmbientActive = null;
                    }
                };
            }
            const transitionSectionTheme = startSectionScore;

            function stopSectionAmbient() {
                if (sectionAmbientActive) { sectionAmbientActive.stop();
                    sectionAmbientActive = null; }
                clearTimeout(crossfadeTimeout);
            }

            async function startSalvagePerformance() {
                speechSynthesis.cancel();
                if (window.ch3Timeout) clearTimeout(window.ch3Timeout);
                const storyData = gameState.salvagePerformance;
                if (!storyData || !storyData.story) {
                    await generateNewSalvageStory();
                    return startSalvagePerformance();
                }
                let sectionList = null;
                let cueList = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) {
                        cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                    } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                        sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                    }
                }
                const bubble = document.getElementById('ch3SpeechBubble');
                const dialogue = document.getElementById('ch3Dialogue');
                const imageEl = document.getElementById('ch3SegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('ch3GuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#cc6600';
                bubble.style.boxShadow = '0 0 30px #b8650a88, 0 0 50px #ffe03022';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('ch3BackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('ch3AddEpisodeBtn');
                if (oldAdd) oldAdd.remove();
                const posterContainer = document.getElementById('ch3PosterContainer');
                const posterTitle = document.getElementById('ch3PosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) { posterTitle.textContent = storyData.title || ''; }
                } else if (posterContainer) { posterContainer.classList.add('no-image'); }
                const intro =
                    `"Every wreck has a story. Some stories refuse to stay buried. This one… this one came through my gate back in '86. I remember the bent frame, the shattered glass, and what they found tucked under the passenger seat. Settle in. This is '${storyData.title}'."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 45);
                await new Promise(r => setTimeout(r, 1500));
                if (sectionList && sectionList.length > 0) { transitionSectionTheme(sectionList[0].theme); }
                const storyText = storyData.rawStoryText || storyData.story;
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b
                        .start_char) : [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx]
                            .start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) { currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme); }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) { triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity); }
                            cueIdx++;
                        }
                    };
                }
                dialogue.textContent = '';
                if (cueChecker) {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.6, pitch: 0.88 }, (idx) => cueChecker(
                        idx));
                } else {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.6, pitch: 0.88 });
                }
                await new Promise(r => setTimeout(r, 1200));
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#e8c898';
                dialogue.appendChild(closingLine);
                speakTextMale(closing);
                await typewriterEffect(closingLine, closing, 42);
                await new Promise(r => setTimeout(r, 1000));
                const curtainText = document.createElement('p');
                curtainText.textContent = '— Mason shuts the yard gate —';
                stopSectionAmbient();
                curtainText.style.color = '#7a6a50';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();
                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Back to Yard';
                leaveBtn.addEventListener('click', () => { leaveYard(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'ch3AddEpisodeBtn';
                addBtn.textContent = '➕ Log This Story';
                addBtn.addEventListener('click', () => { addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Logged'; });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

                    if (portrait && HOST_BIO) { showModal(HOST_BIO); }
                });
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
                if (!apiKey) { setTimeout(() => document.getElementById('resetApiBtn').click(), 800); }
            }
            init();
        })();
    </script>
</body>
</html>
