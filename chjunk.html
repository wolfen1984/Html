<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover" />
    <title>THE SALVAGE YARD · 1986 · AI SCORE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Special+Elite&family=Press+Start+2P&family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&family=Audiowide&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ─── Salvage Yard Base Styles ─── */
        :root {
            --bg: #0a0705;
            --screen-bg: #0d0a06;
            --panel-bg: #100c08;
            --text: #c4b8a0;
            --text-dim: #7a6a50;
            --text-bright: #e8d8b8;
            --accent: #b8650a;
            --accent-dim: #4a2808;
            --border: #8b5508;
            --border-glow: 0 0 14px #b8650a55, 0 0 32px #4a280822;
            --danger: #b8650a;
            --danger-glow: 0 0 12px #b8650a44;
            --amber: #d4a020;
            --amber-dim: #5c4010;
            --gold: #e8b820;
            --gold-dim: #4a3808;
            --neon-yellow: #ffe030;
            --neon-yellow-glow: 0 0 18px #ffe03088, 0 0 40px #e8b82044;
            --neon-brown: #cc6600;
            --neon-brown-glow: 0 0 14px #cc660066, 0 0 28px #8b440022;
            --input-bg: #120e08;
            --button-bg: #16120c;
            --button-hover: #1c160e;
            --button-active: #181008;
            --bevel-light: #2a2418;
            --bevel-dark: #060402;
            --font-display: 'Creepster', 'Press Start 2P', cursive;
            --font-title: 'Press Start 2P', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 24px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #140e06 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #16100c;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2a2018, 0 0 0 4px #0d0a06, 0 0 0 8px #060402, 0 8px 48px #000000dd, 0 0 60px #4a280822;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #8b5508;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #0a0604;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #ffe030;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffe03088, 0 0 18px #e8b82033;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #ffe03088, 0 0 18px #e8b82033;
            }
            50% {
                box-shadow: 0 0 14px #ffe030bb, 0 0 28px #e8b82055;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #5a4020;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #8b5508;
            box-shadow: var(--neon-brown-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0,
                        var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #0c0804;
            border-bottom: 3px solid #8b5508;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #1a0c04;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #8b5508;
            border-radius: 2px;
            padding: 10px 14px;
            background: #080400;
            position: relative;
            box-shadow: inset 0 0 24px #4a280811, var(--neon-brown-glow);
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #cc6600;
            box-shadow: 0 0 12px #cc660088;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #ffe03044;
            box-shadow: 0 0 8px #ffe03033;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #ffe030;
            text-shadow: 0 0 16px #e8b82088, 0 2px 4px #000, 0 0 40px #8b550888, 0 0 60px #cc660044;
            letter-spacing: 3px;
            font-family: var(--font-title);
            line-height: 1.3;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #b8956a;
            letter-spacing: 5px;
            margin-top: 3px;
            text-shadow: 0 0 8px #cc660033;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 16px;
                letter-spacing: 1px;
            }
            .marquee-sub {
                font-size: 9px;
                letter-spacing: 3px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #3a2008 #0d0a06;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #0d0a06;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #3a2008;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #2a2418;
            border-top-color: #3a3020;
            border-left-color: #342c1c;
            border-right-color: #1c1810;
            border-bottom-color: #100e08;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #1c1810;
            border-left-color: #1c1810;
            border-bottom-color: #3a3020;
            border-right-color: #342c1c;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #100e08;
        }
        .btn.accent {
            background: #180c04;
            border-color: #6b3a08;
            border-top-color: #8b4a10;
            border-left-color: #7a400c;
            border-right-color: #3a1c04;
            border-bottom-color: #1a0c02;
            color: #e8c898;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #b8650a22;
        }
        .btn.accent:active {
            border-top-color: #3a1c04;
            border-left-color: #3a1c04;
            border-bottom-color: #8b4a10;
            border-right-color: #7a400c;
            box-shadow: 0 0px 0 #00000044, 0 0 16px #b8650a44;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .yard-mask {
            position: relative;
            background: #100c08;
            border: 2px solid #8b550866;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.8);
        }
        .yard-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0c0804;
            border: 2px solid #8b5508;
            padding: 15px;
            border-radius: 3px;
        }
        .yard-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #cc6600;
            box-shadow: 0 0 22px #b8650a66, 0 0 0 2px #1a0c04, var(--neon-brown-glow);
            object-fit: cover;
            flex-shrink: 0;
            background: #0c0604;
        }
        .speech-bubble {
            flex: 1;
            background: #120e08;
            border: 2px solid #8b5508;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #d4c0a0;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: var(--neon-brown-glow);
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #8b550888 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #0c0804;
            border: 1px solid #3a2008;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #140e08;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a6a50;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #8b5508;
            box-shadow: 0 0 20px #b8650a44, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #0c0804;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(6, 4, 2, 0.85) 100%);
            z-index: 2;
        }
        .poster-overlay-yard {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 12px;
            letter-spacing: 2px;
            color: #ffe030;
            text-shadow: 0 0 10px #e8b820cc, 0 0 30px #cc660088, 0 2px 4px #000000, 0 0 60px #4a2808;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom,
                    rgba(10, 6, 2, 0.9) 0%,
                    rgba(10, 6, 2, 0.7) 40%,
                    transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 16px;
            letter-spacing: 1.5px;
            color: #ffe030;
            text-shadow: 0 0 8px #e8b82088, 0 0 20px #5c401044, 0 2px 4px #000000;
            background: linear-gradient(to top,
                    rgba(6, 4, 2, 0.9) 0%,
                    rgba(6, 4, 2, 0.6) 50%,
                    transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a6a50;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-yard,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-yard {
                font-size: 10px;
                letter-spacing: 1px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 12px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .yard-guide {
            margin-top: 15px;
            border-top: 2px solid #8b5508;
            padding-top: 10px;
        }
        .yard-guide h3 {
            font-family: var(--font-display);
            color: #e8c898;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 10px #b8650a44;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0e0a06;
            border: 1px solid #8b5508;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #ffe030;
            min-width: 50px;
            text-shadow: 0 0 6px #e8b82044;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #e8c898;
        }
        .guide-desc {
            font-size: 15px;
            color: #7a6a50;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #100c08;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #cc6600;
            box-shadow: var(--neon-brown-glow), 0 0 80px #000000dd;
            color: #c4b8a0;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #16120c;
            border: 2px solid #8b550866;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #c4b8a0;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #cc6600;
            box-shadow: 0 0 14px #b8650a44;
        }
        .loading-text {
            color: #ffe030;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #080400;
            border-top: 1px solid #8b550844;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #5a4020;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #6b4a28;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #1a140c;
            color: #6b4a28;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #5a4020;
            color: #8b6a40;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #d4c0a0;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        .score-indicator {
            font-family: var(--font-mono);
            font-size: 10px;
            color: #b8956a;
            letter-spacing: 1px;
            padding: 3px 8px;
            border: 1px solid #5a4020;
            border-radius: 2px;
            display: inline-block;
            background: #0c0804;
            margin-top: 4px;
        }
        .score-indicator .active {
            color: #ffe030;
        }
        .score-indicator .dim {
            color: #5a4020;
        }
        .progress-bar {
            width: 100%;
            height: 2px;
            background: #2a1c0e;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #cc6600;
            border-radius: 2px;
            transition: width 0.3s;
            box-shadow: 0 0 10px #cc660044;
        }
        @media (max-width: 480px) {
            .yard-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">MASON'S SALVAGE YARD · CRT-86</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE SALVAGE<br>YARD</div>
                    <div class="marquee-sub">⏤ 1986 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channel3Panel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🔧 MASON'S SALVAGE · EVERY WRECK HAS A STORY</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>

    <script>
        (function() {
            'use strict';

            // ─── CONFIG ────────────────────────────────────────────────
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('salvage_yard_key') || '';

            const DEFAULT_STATE = {
                ch3Episodes: [],
                salvagePerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
            <h2>🔧 Mason Cole</h2>
            <p style="text-align:left;">
                <strong>Yard:</strong> <em>Mason's Salvage Yard</em><br>
                <strong>Bio:</strong> A grizzled Vietnam vet who's seen too much, Mason has run this salvage yard for eighteen years. He knows every wreck that comes through the gate carries more than bent steel — it carries the final chapter of someone's life. Some nights, when the yard lights flicker and the coyotes go quiet, he'll tell you a story about a particular wreck. And you'd best listen close, because every story he tells is true.
            </p>
        `;

            // ─── SOUND ENGINE ──────────────────────────────────────────
            let audioCtx = null;
            let ambientSource = null,
                ambientGain = null,
                ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null,
                masterGain = null,
                dryGain = null,
                wetGain = null;
            let sectionAmbientActive = null,
                stringAmbientActive = null;
            let crossfadeTimeout = null,
                masterCompressor = null;

            let patternPlayerActive = null,
                patternPlayerTimeout = null;
            let patternStep = 0,
                patternBPM = 50;
            let currentSectionPatterns = [];
            let currentVariationIdx = 0,
                barsInVariation = 0;
            let fillActive = false;
            let sectionThemeScore = null;

            // ─── Helpers ──────────────────────────────────────────────
            function expandPattern(arr) {
                if (!Array.isArray(arr)) {
                    console.warn('expandPattern: non-array, using default');
                    arr = [0, 0, 0, 0, 0, 0, 0, 0];
                }
                arr = arr.map(x => typeof x === 'number' ? x : 0);
                return arr.flatMap(x => [x, x]);
            }

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.0005;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            function ensureAudioNodes(ctx) {
                if (!masterGain) {
                    masterGain = ctx.createGain();
                    masterGain.gain.value = 0.22;
                    masterCompressor = ctx.createDynamicsCompressor();
                    masterCompressor.threshold.value = -26;
                    masterCompressor.knee.value = 28;
                    masterCompressor.ratio.value = 10;
                    masterCompressor.attack.value = 0.004;
                    masterCompressor.release.value = 0.3;
                    masterGain.connect(masterCompressor);
                    masterCompressor.connect(ctx.destination);
                }
                if (!dryGain) {
                    dryGain = ctx.createGain();
                    dryGain.gain.value = 0.85;
                    dryGain.connect(masterGain);
                }
                if (!wetGain) {
                    wetGain = ctx.createGain();
                    wetGain.gain.value = 0.55;
                    if (reverbNode) wetGain.connect(reverbNode);
                    else wetGain.connect(masterGain);
                }
                if (!reverbNode) {
                    initReverb(ctx);
                    if (reverbNode) wetGain.connect(reverbNode);
                }
            }

            async function getAudioContext() {
                try {
                    if (!audioCtx) {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                        createKeepAlive(audioCtx);
                        initReverb(audioCtx);
                        ensureAudioNodes(audioCtx);
                    }
                    if (audioCtx.state === 'suspended') await audioCtx.resume();
                    ensureAudioNodes(audioCtx);
                    return audioCtx;
                } catch (err) {
                    console.error('Audio context error:', err);
                    throw err;
                }
            }

            function initReverb(ctx) {
                if (reverbNode) return;
                try {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 4.2;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.9));
                        const lateDecay = Math.exp(-i / (sampleRate * 2.5)) * 0.3;
                        left[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                        right[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                    if (masterGain) reverbNode.connect(masterGain);
                } catch (err) {
                    console.warn('Reverb init error:', err);
                    reverbNode = ctx.createGain();
                    reverbNode.gain.value = 0.5;
                    if (masterGain) reverbNode.connect(masterGain);
                }
            }

            // ─── String / Pad / Drum Synths ──────────────────────────
            function createStringPad(ctx, rootFreq, duration, intensity = 0.5, voiceCount = 8) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.16, now + 2.5);
                    gainNode.gain.setValueAtTime(intensity * 0.16, now + duration - 3);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1.5);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 500 + intensity * 400;
                    filter.Q.value = 1.8;
                    const filterLfo = ctx.createOscillator();
                    filterLfo.type = 'sine';
                    filterLfo.frequency.value = 0.04;
                    const filterLfoGain = ctx.createGain();
                    filterLfoGain.gain.value = 80;
                    filterLfo.connect(filterLfoGain);
                    filterLfoGain.connect(filter.frequency);
                    const allOscs = [];
                    const harmonics = [1, 1.002, 1.997, 2.003, 0.998, 1.005, 2.001, 0.996];
                    for (let i = 0; i < voiceCount; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = i < 4 ? 'sawtooth' : 'triangle';
                        const harmMult = harmonics[i] || (1 + (Math.random() - 0.5) * 0.012);
                        osc.frequency.value = rootFreq * harmMult;
                        const vibrato = ctx.createOscillator();
                        vibrato.type = 'sine';
                        vibrato.frequency.value = 4.5 + Math.random() * 3.5;
                        const vibratoGain = ctx.createGain();
                        vibratoGain.gain.value = 1.5 + Math.random() * 4;
                        vibrato.connect(vibratoGain);
                        vibratoGain.connect(osc.frequency);
                        allOscs.push(osc, vibrato);
                        osc.connect(filter);
                    }
                    filter.connect(gainNode);
                    const drySend = ctx.createGain();
                    drySend.gain.value = 0.35;
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.7;
                    gainNode.connect(drySend);
                    gainNode.connect(wetSend);
                    drySend.connect(dryGain || ctx.destination);
                    wetSend.connect(wetGain || ctx.destination);
                    allOscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 2); });
                    filterLfo.start(now);
                    filterLfo.stop(now + duration + 2);
                } catch (err) { console.warn('String pad error:', err); }
            }

            function createCelloDrone(ctx, frequency, duration, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 2);
                    gainNode.gain.setValueAtTime(intensity * 0.2, now + duration - 2);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 250;
                    filter.Q.value = 3.5;
                    const oscs = [];
                    for (let i = 0; i < 3; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = i === 0 ? 'triangle' : 'sawtooth';
                        const detune = (i - 1) * 6;
                        osc.frequency.value = frequency * Math.pow(2, detune / 1200);
                        const vibrato = ctx.createOscillator();
                        vibrato.type = 'sine';
                        vibrato.frequency.value = 2.5 + i * 1.2;
                        const vibratoGain = ctx.createGain();
                        vibratoGain.gain.value = 2 + i;
                        vibrato.connect(vibratoGain);
                        vibratoGain.connect(osc.frequency);
                        oscs.push(osc, vibrato);
                        osc.connect(filter);
                    }
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.65;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    oscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1.5); });
                } catch (err) { console.warn('Cello drone error:', err); }
            }

            function createStringSwell(ctx, targetFreq, duration, intensity = 0.6) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0.001, now);
                    gainNode.gain.exponentialRampToValueAtTime(intensity * 0.35, now + duration * 0.55);
                    gainNode.gain.setValueAtTime(intensity * 0.35, now + duration * 0.7);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(120, now);
                    filter.frequency.exponentialRampToValueAtTime(1800, now + duration * 0.6);
                    filter.Q.value = 2;
                    const oscs = [];
                    const intervals = [0, 7, 12, 19, 24];
                    intervals.forEach(interval => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = targetFreq * Math.pow(2, interval / 12);
                        osc.frequency.setValueAtTime(targetFreq * Math.pow(2, interval / 12) * 0.97, now);
                        osc.frequency.exponentialRampToValueAtTime(targetFreq * Math.pow(2, interval / 12),
                            now + duration);
                        oscs.push(osc);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.7;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    oscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1.5); });
                } catch (err) { console.warn('String swell error:', err); }
            }

            function createViolinHarmonics(ctx, baseFreq, duration, intensity = 0.4) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.1, now + 1.5);
                    gainNode.gain.setValueAtTime(intensity * 0.1, now + duration - 1.5);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 1200;
                    filter.Q.value = 6;
                    const oscs = [];
                    const harmonicSeries = [1, 2, 3, 5, 8];
                    harmonicSeries.forEach(harm => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = baseFreq * harm;
                        const tremolo = ctx.createOscillator();
                        tremolo.type = 'sine';
                        tremolo.frequency.value = 6 + Math.random() * 5;
                        const tremGain = ctx.createGain();
                        tremGain.gain.value = 8 + Math.random() * 15;
                        tremolo.connect(tremGain);
                        tremGain.connect(osc.frequency);
                        oscs.push(osc, tremolo);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.75;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    oscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1); });
                } catch (err) { console.warn('Violin harmonics error:', err); }
            }

            function createPizzicato(ctx, frequency, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.5, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + 0.35);
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = frequency;
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'sine';
                    osc2.frequency.value = frequency * 3.01;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.15;
                    osc2.connect(osc2Gain);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(3000, now);
                    filter.frequency.exponentialRampToValueAtTime(400, now + 0.3);
                    filter.Q.value = 1.5;
                    osc.connect(filter);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.5;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + 0.4);
                    osc2.stop(now + 0.4);
                } catch (err) { console.warn('Pizzicato error:', err); }
            }

            function createStringCluster(ctx, frequencies, duration, intensity = 0.55) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 1.8);
                    gainNode.gain.setValueAtTime(intensity * 0.2, now + duration - 2);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 600;
                    filter.Q.value = 1.2;
                    const allOscs = [];
                    frequencies.forEach(f => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = f;
                        const microLfo = ctx.createOscillator();
                        microLfo.type = 'sine';
                        microLfo.frequency.value = 0.3 + Math.random() * 0.6;
                        const microGain = ctx.createGain();
                        microGain.gain.value = 1 + Math.random() * 3;
                        microLfo.connect(microGain);
                        microGain.connect(osc.frequency);
                        allOscs.push(osc, microLfo);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.6;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    allOscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1.5); });
                } catch (err) { console.warn('String cluster error:', err); }
            }

            // ─── Salvage Yard‑style pads (warm, gritty, no Lynch) ──
            function createYardPad(ctx, frequency, duration, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.14, now + 1.8);
                    gainNode.gain.setValueAtTime(intensity * 0.14, now + duration - 2);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.8);
                    const oscs = [];
                    for (let i = 0; i < 4; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = i < 2 ? 'sawtooth' : 'triangle';
                        const detune = (i - 1.5) * 6;
                        osc.frequency.value = frequency * Math.pow(2, detune / 1200);
                        oscs.push(osc);
                    }
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 200;
                    filter.Q.value = 2.8;
                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.06 + Math.random() * 0.10;
                    const lfoGain = ctx.createGain();
                    lfoGain.gain.value = 80 + Math.random() * 120;
                    lfo.connect(lfoGain);
                    lfoGain.connect(filter.frequency);
                    oscs.forEach(o => o.connect(filter));
                    filter.connect(gainNode);
                    const drySend = ctx.createGain();
                    drySend.gain.value = 0.5;
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.5;
                    gainNode.connect(drySend);
                    gainNode.connect(wetSend);
                    drySend.connect(dryGain || ctx.destination);
                    wetSend.connect(wetGain || ctx.destination);
                    oscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1); });
                    lfo.start(now);
                    lfo.stop(now + duration + 1);
                } catch (err) { console.warn('Yard pad error:', err); }
            }

            function createYardSting(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.25, now + 0.05);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(70, now);
                    osc.frequency.exponentialRampToValueAtTime(280, now + 0.4);
                    osc.frequency.exponentialRampToValueAtTime(55, now + 2);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'sawtooth';
                    osc2.frequency.setValueAtTime(140, now);
                    osc2.frequency.exponentialRampToValueAtTime(560, now + 0.35);
                    osc2.frequency.exponentialRampToValueAtTime(110, now + 2);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 400;
                    filter.Q.value = 2;
                    osc.connect(filter);
                    osc2.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.6;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + 2.5);
                    osc2.stop(now + 2.5);
                } catch (err) { console.warn('Yard sting error:', err); }
            }

            function createYardClimax(ctx, intensity = 0.7) {
                try {
                    const now = ctx.currentTime;
                    const duration = 10 + Math.random() * 8;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.3, now + 3);
                    gainNode.gain.setValueAtTime(intensity * 0.35, now + duration - 2);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    const oscs = [];
                    const freqs = [55, 82.5, 110, 165];
                    freqs.forEach(f => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(f, now);
                        osc.frequency.exponentialRampToValueAtTime(f * 1.5, now + duration * 0.7);
                        oscs.push(osc);
                    });
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(150, now);
                    filter.frequency.exponentialRampToValueAtTime(800, now + duration);
                    filter.Q.value = 2.5;
                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.06;
                    const lfoGain = ctx.createGain();
                    lfoGain.gain.value = 250;
                    lfo.connect(lfoGain);
                    lfoGain.connect(filter.frequency);
                    oscs.forEach(o => o.connect(filter));
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.55;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    oscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1); });
                    lfo.start(now);
                    lfo.stop(now + duration + 1);
                } catch (err) { console.warn('Yard climax error:', err); }
            }

            function createBassNote(ctx, semitone, intensity = 0.5, duration = 2.0, rootFreq = 40) {
                try {
                    const now = ctx.currentTime;
                    const freq = rootFreq * Math.pow(2, semitone / 12);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.22, now + 0.08);
                    gainNode.gain.setValueAtTime(intensity * 0.22, now + duration - 0.5);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.4);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq * 0.98, now);
                    osc.frequency.exponentialRampToValueAtTime(freq, now + 0.15);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'square';
                    osc2.frequency.value = freq * 2;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.08 * intensity;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(120 + semitone * 4, now);
                    filter.frequency.exponentialRampToValueAtTime(80 + semitone * 2, now + duration);
                    filter.Q.value = 2.5;
                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.45;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + duration + 0.5);
                    osc2.stop(now + duration + 0.5);
                } catch (err) { console.warn('Bass note error:', err); }
            }

            function createKick(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.9, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(120, now);
                    osc.frequency.exponentialRampToValueAtTime(35, now + 0.15);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 180;
                    filter.Q.value = 1.2;
                    osc.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } catch (err) { console.warn('Kick error:', err); }
            }

            function createSnare(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.6, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    const bufferSize = ctx.sampleRate * 0.08;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        const env = Math.exp(-i / (ctx.sampleRate * 0.025));
                        data[i] = (Math.random() * 2 - 1) * env * 0.6;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(220, now);
                    osc.frequency.exponentialRampToValueAtTime(80, now + 0.08);
                    const oscGain = ctx.createGain();
                    oscGain.gain.value = 0.2 * intensity;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 300;
                    filter.Q.value = 0.8;
                    noise.connect(filter);
                    osc.connect(oscGain);
                    oscGain.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    osc.start(now);
                    noise.stop(now + 0.12);
                    osc.stop(now + 0.12);
                } catch (err) { console.warn('Snare error:', err); }
            }

            function createHat(ctx, intensity = 0.3) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.5, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
                    const bufferSize = ctx.sampleRate * 0.025;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        const env = Math.exp(-i / (ctx.sampleRate * 0.01));
                        data[i] = (Math.random() * 2 - 1) * env * 0.4;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.value = 5000;
                    filter.Q.value = 0.5;
                    noise.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    noise.stop(now + 0.08);
                } catch (err) { console.warn('Hat error:', err); }
            }

            // ─── Pattern Player ──────────────────────────────────────
            function startEvolvingPatternPlayer(themeName, rootFreq = 40, scoreData = null) {
                stopPatternPlayer();

                if (!scoreData || !scoreData[themeName]) {
                    console.warn('No AI score data for theme:', themeName);
                    return;
                }
                const theme = scoreData[themeName];
                const bpm = theme.bpm || 60;

                const bass = expandPattern(theme.bass);
                const kick = expandPattern(theme.kick);
                const snare = expandPattern(theme.snare);
                const hat = expandPattern(theme.hat);

                const variations = [{
                    name: 'AI',
                    bars: 8,
                    bass: bass,
                    kick: kick,
                    snare: snare,
                    hat: hat
                }];

                currentSectionPatterns = variations;
                currentVariationIdx = 0;
                barsInVariation = 0;
                patternStep = 0;
                patternBPM = bpm;
                fillActive = false;

                const stepDuration = 60 / bpm / 4;
                patternPlayerActive = { active: true, theme: themeName };

                function getCurrentPattern() {
                    return currentSectionPatterns[0];
                }

                function playStep() {
                    if (!patternPlayerActive || !patternPlayerActive.active) return;
                    const ctx = audioCtx;
                    if (!ctx) { patternPlayerTimeout = setTimeout(playStep, 100); return; }

                    const step = patternStep % 16;
                    const current = getCurrentPattern();
                    const isFillStep = fillActive;

                    let bassSemitone = 0;
                    if (isFillStep) {
                        bassSemitone = (step % 4 === 0) ? 0 : (step % 8 === 4 ? 7 : 0);
                    } else {
                        bassSemitone = current.bass[step] || 0;
                    }
                    if (bassSemitone !== 0 || (isFillStep && step % 4 === 0)) {
                        const dur = isFillStep ? 0.25 : 1.8;
                        const inten = isFillStep ? 0.3 : 0.5 + (bassSemitone / 30);
                        createBassNote(ctx, bassSemitone, inten, dur, rootFreq);
                    }

                    let kickVal = isFillStep ? (step % 4 === 0 ? 1 : 0) : (current.kick[step] || 0);
                    if (kickVal === 1) createKick(ctx, isFillStep ? 0.7 : 0.6);

                    let snareVal = isFillStep ? (step % 8 === 4 ? 1 : 0) : (current.snare[step] || 0);
                    if (snareVal === 1) createSnare(ctx, isFillStep ? 0.7 : 0.5);

                    let hatVal = isFillStep ? (step % 2 === 0 ? 1 : 0) : (current.hat[step] || 0);
                    if (hatVal === 1 && Math.random() < 0.7) createHat(ctx, isFillStep ? 0.4 : 0.2);

                    patternStep++;
                    if (patternStep % 16 === 0) {
                        barsInVariation++;
                        if (barsInVariation >= current.bars) barsInVariation = 0;
                    }

                    patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
                }

                patternPlayerTimeout = setTimeout(playStep, 50);
            }

            function stopPatternPlayer() {
                if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout);
                    patternPlayerTimeout = null; }
                if (patternPlayerActive) { patternPlayerActive.active = false;
                    patternPlayerActive = null; }
                patternStep = 0;
                currentSectionPatterns = [];
                currentVariationIdx = 0;
                barsInVariation = 0;
                fillActive = false;
            }

            // ─── Master playSound ────────────────────────────────────
            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    if (!ctx) return;
                    const now = ctx.currentTime;
                    switch (type) {
                        case 'pad':
                            createYardPad(ctx, 55 + Math.random() * 25, 18 + Math.random() * 18, intensity);
                            break;
                        case 'sting':
                            createYardSting(ctx, intensity);
                            break;
                        case 'pulse':
                        case 'heartbeat':
                            createKick(ctx, 0.7 * intensity);
                            setTimeout(() => createKick(ctx, 0.7 * intensity), 200);
                            break;
                        case 'thunder': {
                            const bufferSize = ctx.sampleRate * 0.8;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.5));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(intensity * 0.5, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 100;
                            filter.Q.value = 0.5;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(now);
                            source.stop(now + 1.2);
                            break;
                        }
                        case 'bell': {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 60 + Math.random() * 25;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0, now);
                            gain.gain.linearRampToValueAtTime(intensity * 0.35, now + 0.15);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 4);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 350;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(now);
                            osc.stop(now + 4);
                            break;
                        }
                        case 'climax':
                            createYardClimax(ctx, intensity);
                            break;
                        case 'industrial_hum':
                            // gentle salvage-yard rumble
                            break;
                        case 'string_pad':
                            createStringPad(ctx, 55 + Math.random() * 30, 14 + Math.random() * 16, intensity);
                            break;
                        case 'cello_drone':
                            createCelloDrone(ctx, 40 + Math.random() * 25, 12 + Math.random() * 14, intensity);
                            break;
                        case 'string_swell':
                            createStringSwell(ctx, 50 + Math.random() * 40, 6 + Math.random() * 8, intensity);
                            break;
                        case 'violin_texture':
                            createViolinHarmonics(ctx, 80 + Math.random() * 60, 10 + Math.random() * 12, intensity);
                            break;
                        case 'pizzicato':
                            createPizzicato(ctx, 60 + Math.random() * 50, intensity);
                            setTimeout(() => createPizzicato(ctx, 55 + Math.random() * 45, intensity * 0.7), 180 + Math
                                .random() * 250);
                            break;
                        case 'string_cluster': {
                            const clusterFreqs = [];
                            const root = 45 + Math.random() * 35;
                            for (let i = 0; i < 5; i++) clusterFreqs.push(root * (1 + (Math.random() - 0.5) * 0.25));
                            createStringCluster(ctx, clusterFreqs, 8 + Math.random() * 10, intensity);
                            break;
                        }
                        case 'bass': {
                            const semitone = Math.floor(Math.random() * 12);
                            createBassNote(ctx, semitone, intensity, 1.5 + Math.random() * 1.5, 40);
                            break;
                        }
                        case 'kick':
                            createKick(ctx, intensity);
                            break;
                        case 'snare':
                            createSnare(ctx, intensity);
                            break;
                        case 'hat':
                            createHat(ctx, intensity * 0.5);
                            break;
                        default:
                            console.warn('Unknown sound type:', type);
                    }
                } catch (err) { console.warn('playSound error:', err); }
            }

            // ─── Ambient ──────────────────────────────────────────────
            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.22, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'ambient_drone' || type === 'wind_howl') {
                        const bufferSize = ctx.sampleRate * 1.5;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.4;
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'ambient_drone' ? 160 : 500;
                        filter.Q.value = 0.4;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'ambient_drone' ? 70 : 100;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.15 * intensity;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 80;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) { console.warn('playAmbient error:', err); }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 500);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            // ─── String Layer ─────────────────────────────────────────
            function startStringLayer(theme) {
                if (!audioCtx) return;
                stopStringAmbient();
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const freq = theme.stringFreq || 50;
                const intensity = theme.stringIntensity || 0.2;
                const duration = 999;
                const allNodes = [];

                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 2);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                filter.Q.value = 2;

                for (let i = 0; i < 6; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i < 3 ? 'triangle' : 'sawtooth';
                    osc.frequency.value = freq * (1 + (i - 2.5) * 0.007);
                    const vib = ctx.createOscillator();
                    vib.type = 'sine';
                    vib.frequency.value = 3.5 + i * 0.8;
                    const vibG = ctx.createGain();
                    vibG.gain.value = 2 + i * 0.5;
                    vib.connect(vibG);
                    vibG.connect(osc.frequency);
                    allNodes.push(osc, vib);
                    osc.connect(filter);
                }
                filter.connect(gainNode);

                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.6;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);

                allNodes.forEach(n => n.start(now));
                stringAmbientActive = {
                    nodes: allNodes,
                    gainNode,
                    wetSend,
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 1);
                        allNodes.forEach(n => { try { n.stop(ctx.currentTime + 1.2); } catch (e) {} });
                    }
                };
            }

            function stopStringAmbient() {
                if (stringAmbientActive) { stringAmbientActive.stop();
                    stringAmbientActive = null; }
            }

            // ─── Salvage Yard Section Ambient ──────────────────────
            const YARD_AMBIENT = {
                prologue: { rootFreq: 42, detuneSpread: 8, filterBase: 120, lfoRate: 0.04, noiseMix: 0.10,
                    intensity: 0.18, stringFreq: 45, stringIntensity: 0.12 },
                arrival: { rootFreq: 48, detuneSpread: 10, filterBase: 140, lfoRate: 0.06, noiseMix: 0.20,
                    intensity: 0.28, stringFreq: 50, stringIntensity: 0.20 },
                revelation: { rootFreq: 55, detuneSpread: 14, filterBase: 130, lfoRate: 0.08, noiseMix: 0.30,
                    intensity: 0.38, stringFreq: 58, stringIntensity: 0.30 },
                pursuit: { rootFreq: 52, detuneSpread: 16, filterBase: 110, lfoRate: 0.10, noiseMix: 0.40,
                    intensity: 0.50, stringFreq: 54, stringIntensity: 0.40 },
                reckoning: { rootFreq: 50, detuneSpread: 18, filterBase: 100, lfoRate: 0.12, noiseMix: 0.45,
                    intensity: 0.55, stringFreq: 50, stringIntensity: 0.45 },
                closing: { rootFreq: 40, detuneSpread: 6, filterBase: 150, lfoRate: 0.03, noiseMix: 0.05,
                    intensity: 0.15, stringFreq: 42, stringIntensity: 0.10 }
            };

            function startSectionAmbient(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                const theme = YARD_AMBIENT[themeName] || YARD_AMBIENT.prologue;
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(theme.intensity * 0.2, now + 1.5);
                const oscs = [];
                for (let i = 0; i < 3; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i === 0 ? 'sawtooth' : i === 1 ? 'triangle' : 'sawtooth';
                    const detune = (i - 1) * theme.detuneSpread;
                    osc.frequency.value = theme.rootFreq * Math.pow(2, detune / 1200);
                    oscs.push(osc);
                }
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = theme.filterBase;
                filter.Q.value = 2.5;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = theme.lfoRate;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 80;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                oscs.forEach(o => o.connect(filter));
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.55;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                oscs.forEach(o => o.start(now));
                lfo.start(now);
                if (theme.noiseMix > 0) {
                    const bufferSize = ctx.sampleRate * 2;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * theme.noiseMix;
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    noise.loop = true;
                    const noiseFilter = ctx.createBiquadFilter();
                    noiseFilter.type = 'lowpass';
                    noiseFilter.frequency.value = theme.filterBase * 0.7;
                    noiseFilter.Q.value = 0.3;
                    const noiseGain = ctx.createGain();
                    noiseGain.gain.value = theme.noiseMix * 0.3;
                    noise.connect(noiseFilter);
                    noiseFilter.connect(noiseGain);
                    noiseGain.connect(gainNode);
                    noise.start(now);
                    oscs.push(noise);
                }
                sectionAmbientActive = {
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.6);
                        oscs.forEach(s => { try { s.stop(ctx.currentTime + 0.8); } catch (e) {} });
                        try { lfo.stop(ctx.currentTime + 0.8); } catch (e) {}
                        sectionAmbientActive = null;
                    }
                };
                startStringLayer(theme);
                startEvolvingPatternPlayer(themeName, 40, sectionThemeScore);
            }

            function transitionSectionTheme(themeName, scoreData) {
                if (scoreData) sectionThemeScore = scoreData;
                startSectionAmbient(themeName);
            }

            function stopSectionAmbient() {
                if (sectionAmbientActive) { sectionAmbientActive.stop();
                    sectionAmbientActive = null; }
                stopStringAmbient();
                stopPatternPlayer();
                clearTimeout(crossfadeTimeout);
            }
