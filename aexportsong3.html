      const osc2 = ctx.createOscillator(); osc2.type = 'square'; osc2.frequency.value = freqVal; osc2.detune.value = 12;
      const gain2 = ctx.createGain(); gain2.gain.setValueAtTime(0.001, time); gain2.gain.exponentialRampToValueAtTime(gainVal*0.42, time+0.01);
      gain2.gain.exponentialRampToValueAtTime(gainVal*0.18, time+dur*0.65); gain2.gain.setValueAtTime(0.001, time+dur-0.02);
      const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate*0.6, ctx.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0); for(let i=0;i<noiseData.length;i++) noiseData[i]=Math.random()*2-1;
      const noise = ctx.createBufferSource(); noise.buffer = noiseBuffer;
      const noiseGain = ctx.createGain(); noiseGain.gain.setValueAtTime(0.001, time); noiseGain.gain.exponentialRampToValueAtTime(gainVal*0.18, time+0.03);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, time+dur*0.4);
      const panner = ctx.createStereoPanner(); panner.pan.value = pan;
      osc1.connect(gain1); osc2.connect(gain2); noise.connect(noiseGain);
      gain1.connect(panner); gain2.connect(panner); noiseGain.connect(panner);
      panner.connect(groupGain);
      osc1.start(time); osc2.start(time); noise.start(time);
      osc1.stop(time+dur); osc2.stop(time+dur); noise.stop(time+dur*0.35);
    }
    function createDrumSchedulers(ctx, drumsGainNode) {
      return {
        kick: (t,v) => { const o = ctx.createOscillator(); o.type='triangle'; o.frequency.setValueAtTime(140,t); o.frequency.exponentialRampToValueAtTime(45,t+0.12); const g = ctx.createGain(); g.gain.setValueAtTime(0.92*v,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.18); o.connect(g); g.connect(drumsGainNode); o.start(t); o.stop(t+0.18); },
        snare: (t,v) => { const buf = ctx.createBuffer(1, ctx.sampleRate*0.25, ctx.sampleRate); const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; const src = ctx.createBufferSource(); src.buffer=buf; const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2800; const g = ctx.createGain(); g.gain.setValueAtTime(0.82*v,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.22); src.connect(bp).connect(g).connect(drumsGainNode); src.start(t); src.stop(t+0.22); },
        hat: (t,v) => { const buf = ctx.createBuffer(1, ctx.sampleRate*0.06, ctx.sampleRate); const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; const src = ctx.createBufferSource(); src.buffer=buf; const hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=9000; const g = ctx.createGain(); g.gain.setValueAtTime(0.48*v,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.06); src.connect(hp).connect(g).connect(drumsGainNode); src.start(t); src.stop(t+0.06); }
      };
    }
    function buildAudioGraph(ctx, guitarLevel, bassLevel, drumsLevel) {
      const guitarG = ctx.createGain(); guitarG.gain.value = guitarLevel;
      const bassG = ctx.createGain(); bassG.gain.value = bassLevel;
      const drumsG = ctx.createGain(); drumsG.gain.value = drumsLevel;
      const master = ctx.createGain(); master.gain.value = 0.85;
      const comp = ctx.createDynamicsCompressor(); comp.threshold.value = -24; comp.ratio.value = 6;
      const delay = ctx.createDelay(3); delay.delayTime.value = 0.42; const fb = ctx.createGain(); fb.gain.value = 0.62; delay.connect(fb); fb.connect(delay);
      const slap = ctx.createDelay(2); slap.delayTime.value = 0.135; const slapFb = ctx.createGain(); slapFb.gain.value = 0.32; slap.connect(slapFb); slapFb.connect(slap);
      guitarG.connect(delay); guitarG.connect(slap); bassG.connect(delay); bassG.connect(slap); drumsG.connect(delay); drumsG.connect(slap);
      const reverb = ctx.createGain(); reverb.gain.value = 0.9; delay.connect(reverb); slap.connect(reverb);
      const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 7800;
      const dist = ctx.createWaveShaper(); dist.curve = createDistortionCurve(5); dist.oversample = '4x';
      reverb.connect(filter); filter.connect(dist); dist.connect(comp); comp.connect(master);
      return { guitarG, bassG, drumsG, master };
    }
    function scheduleTrackOffline(track, ctx, startTime, guitarG, bassG, drumsG) {
      const stepDur = 60 / track.bpm / 4;
      const sched = createDrumSchedulers(ctx, drumsG);
      track.leadSeq().forEach(([step, note, durSteps, vel]) => { if (freq[note]) scheduleNote(ctx, startTime + step * stepDur, freq[note], durSteps * stepDur, vel * 0.45, -0.3, guitarG); });
      track.bassSeq().forEach(([step, note, durSteps, vel]) => { if (freq[note]) scheduleNote(ctx, startTime + step * stepDur, freq[note], durSteps * stepDur, vel * 0.58, 0.2, bassG); });
      for (let step = 0; step < track.totalSteps; step++) track.drumPattern(step, startTime + step * stepDur, sched);
    }

    // ---------- EXPORT & UI (unchanged) ----------
    async function exportTrackToMP3(trackId) {
      const track = tracks.find(t => t.id === trackId);
      if (!track) return;
      const status = document.getElementById('statusText');
      status.textContent = `RENDERING ${track.name}...`;
      const sampleRate = 44100;
      const exportLoops = 2;
      const loopDuration = track.totalSteps * (60 / track.bpm / 4);
      const totalDuration = loopDuration * exportLoops + 4.0;
      const offlineCtx = new OfflineAudioContext(2, sampleRate * totalDuration, sampleRate);
      const gLevel = guitarSlider.value / 100;
      const bLevel = bassSlider.value / 100;
      const dLevel = drumsSlider.value / 100;
      const { guitarG, bassG, drumsG, master } = buildAudioGraph(offlineCtx, gLevel, bLevel, dLevel);
      master.connect(offlineCtx.destination);
      for (let loop = 0; loop < exportLoops; loop++) {
        const startOffset = loop * loopDuration;
        scheduleTrackOffline(track, offlineCtx, startOffset + 0.1, guitarG, bassG, drumsG);
      }
      try {
        const renderedBuffer = await offlineCtx.startRendering();
        status.textContent = `ENCODING MP3...`;
        const left = renderedBuffer.getChannelData(0);
        const right = renderedBuffer.getChannelData(1);
        const intLeft = new Int16Array(left.length);
        const intRight = new Int16Array(right.length);
        for (let i = 0; i < left.length; i++) {
          intLeft[i] = Math.max(-32768, Math.min(32767, left[i] * 32767));
          intRight[i] = Math.max(-32768, Math.min(32767, right[i] * 32767));
        }
        const mp3encoder = new lamejs.Mp3Encoder(2, sampleRate, 128);
        const samplesPerFrame = 1152;
        const mp3Data = [];
        for (let i = 0; i < intLeft.length; i += samplesPerFrame) {
          const leftChunk = intLeft.subarray(i, i + samplesPerFrame);
          const rightChunk = intRight.subarray(i, i + samplesPerFrame);
          const mp3buf = mp3encoder.encodeBuffer(leftChunk, rightChunk);
          if (mp3buf.length > 0) mp3Data.push(mp3buf);
        }
        const end = mp3encoder.flush();
        if (end.length > 0) mp3Data.push(end);
        const blob = new Blob(mp3Data, { type: 'audio/mp3' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `${track.name.replace(/\s/g,'_')}_broken_circuit.mp3`;
        a.click(); URL.revokeObjectURL(url);
        status.textContent = `EXPORT OK: ${track.name}`;
      } catch(e) {
        status.textContent = 'EXPORT FAILED';
        console.error(e);
      }
    }

    let audioCtx = null, isPlaying = false, currentTrackId = null, loopTimeout = null, vizInterval;
    let guitarGain, bassGain, drumsGain;
    const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4'), document.getElementById('bar5'), document.getElementById('bar6')];
    const playLed = document.getElementById('playLed'), statusText = document.getElementById('statusText');
    const guitarSlider = document.getElementById('guitarVol'), bassSlider = document.getElementById('bassVol'), drumsSlider = document.getElementById('drumsVol');
    const guitarVal = document.getElementById('guitarVal'), bassVal = document.getElementById('bassVal'), drumsVal = document.getElementById('drumsVal');
    function updateVolumes() {
      if (guitarGain) guitarGain.gain.value = guitarSlider.value / 100;
      if (bassGain) bassGain.gain.value = bassSlider.value / 100;
      if (drumsGain) drumsGain.gain.value = drumsSlider.value / 100;
      guitarVal.textContent = guitarSlider.value + '%';
      bassVal.textContent = bassSlider.value + '%';
      drumsVal.textContent = drumsSlider.value + '%';
    }
    guitarSlider.addEventListener('input', updateVolumes);
    bassSlider.addEventListener('input', updateVolumes);
    drumsSlider.addEventListener('input', updateVolumes);
    async function initAudio() {
      if (audioCtx) return true;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const graph = buildAudioGraph(audioCtx, guitarSlider.value/100, bassSlider.value/100, drumsSlider.value/100);
      guitarGain = graph.guitarG; bassGain = graph.bassG; drumsGain = graph.drumsG;
      graph.master.connect(audioCtx.destination);
      return true;
    }
    function stopAll() {
      isPlaying = false; currentTrackId = null;
      playLed.classList.remove('active'); statusText.textContent = 'STANDBY';
      if (loopTimeout) clearTimeout(loopTimeout);
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      document.querySelectorAll('.play-btn').forEach(b => b.classList.remove('playing'));
      if (vizInterval) clearInterval(vizInterval);
      bars.forEach(b => b.style.height = '14px');
    }
    async function playTrack(trackId) {
      stopAll();
      const ready = await initAudio();
      if (!ready) return;
      const track = tracks.find(t => t.id === trackId);
      if (!track) return;
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      isPlaying = true; currentTrackId = trackId;
      playLed.classList.add('active'); statusText.textContent = `▶ ${track.name}`;
      document.querySelectorAll('.play-btn').forEach(b => b.classList.remove('playing'));
      document.querySelector(`.play-btn[data-track-id="${trackId}"]`).classList.add('playing');
      const loopDur = track.totalSteps * (60 / track.bpm / 4);
      const now = audioCtx.currentTime;
      scheduleTrackOffline(track, audioCtx, now, guitarGain, bassGain, drumsGain);
      function nextLoop() {
        if (!isPlaying || currentTrackId !== trackId) return;
        scheduleTrackOffline(track, audioCtx, audioCtx.currentTime + 0.05, guitarGain, bassGain, drumsGain);
        loopTimeout = setTimeout(nextLoop, loopDur * 1000 - 40);
      }
      loopTimeout = setTimeout(nextLoop, loopDur * 1000 - 40);
      vizInterval = setInterval(() => {
        if (!isPlaying) return;
        const t = Date.now()/300;
        bars.forEach((b, i) => b.style.height = Math.min(60, 16 + Math.sin(t + i) * 32) + 'px');
      }, 70);
    }
    function renderTracklist() {
      const panel = document.getElementById('trackPanel');
      panel.innerHTML = '';
      tracks.forEach((track, idx) => {
        const card = document.createElement('div'); card.className = 'track-card';
        card.innerHTML = `
          <div class="track-num">${idx+1}</div>
          <div class="track-details"><div class="track-name">${track.name}</div><div class="track-desc">${track.desc}</div></div>
          <div class="btn-group">
            <button class="play-btn" data-track-id="${track.id}">▶ PLAY</button>
            <button class="export-btn" data-export-id="${track.id}">⬇ MP3</button>
          </div>
        `;
        panel.appendChild(card);
      });
      document.querySelectorAll('.play-btn').forEach(btn => btn.addEventListener('click', (e) => playTrack(btn.dataset.trackId)));
      document.querySelectorAll('.export-btn').forEach(btn => btn.addEventListener('click', (e) => exportTrackToMP3(btn.dataset.exportId)));
    }
    document.getElementById('stopAllBtn').addEventListener('click', stopAll);
    renderTracklist();
    updateVolumes();
  })();
</script>
</body>
