<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>THE HAUNTING HOUR · Transmission Incoming</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #00ff41;
            --accent-dim: #003d0a;
            --text: #c8e0cc;
            --text-dim: #4a6e52;
            --font-display: 'Creepster', 'Nosifer', cursive;
            --font-title: 'Nosifer', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
            font-family: var(--font-body);
            user-select: none;
            -webkit-user-select: none;
            -webkit-text-size-adjust: 100%;
        }

        /* ── FULLSCREEN INTRO CONTAINER ── */
        .intro-stage {
            position: fixed;
            inset: 0;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            overflow: hidden;
        }

        /* ═══════════ CRT POWER-ON ═══════════ */
        .crt-power-on-overlay {
            position: absolute;
            inset: 0;
            z-index: 120;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .power-dot {
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 40px #fff, 0 0 120px #fff;
            transform: scale(0);
            animation: powerDotExpand 1.2s ease-out forwards;
        }
        .power-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 3px;
            background: #fff;
            top: 50%;
            transform: scaleY(0);
            box-shadow: 0 0 30px #fff;
            animation: powerLineSnap 0.25s ease-out 1.2s forwards;
        }
        .crt-power-on-overlay.fade-out {
            animation: powerOverlayFade 0.5s ease-in 1.45s forwards;
            pointer-events: none;
        }

        @keyframes powerDotExpand {
            0% { transform: scale(0); opacity: 1; }
            70% { transform: scale(1.8); opacity: 1; }
            100% { transform: scale(120); opacity: 0; }
        }
        @keyframes powerLineSnap {
            0% { transform: scaleY(0); opacity: 1; }
            50% { transform: scaleY(1); opacity: 1; }
            100% { transform: scaleY(0); opacity: 0; }
        }
        @keyframes powerOverlayFade {
            0% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        /* ── COUNTDOWN OVERLAY ── */
        .countdown-overlay {
            position: absolute;
            inset: 0;
            z-index: 50;
            background: #000000;
            display: none; /* hidden until power-on completes */
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: opacity 0.6s ease-out;
        }
        .countdown-overlay.fading-out {
            opacity: 0;
        }
        .countdown-number {
            font-family: var(--font-mono);
            font-size: clamp(80px, 18vw, 160px);
            color: #c8e0cc;
            letter-spacing: 6px;
            text-shadow:
                0 0 30px rgba(200, 224, 204, 0.5),
                0 0 80px rgba(0, 255, 65, 0.25),
                0 4px 16px rgba(0, 0, 0, 0.9);
            opacity: 0;
            transition: opacity 0.25s ease-in-out;
            pointer-events: none;
            user-select: none;
        }
        .countdown-number.visible {
            opacity: 1;
            transition: opacity 0.35s ease-out;
        }

        /* ── IMAGE LAYER ── */
        .intro-image-layer {
            position: absolute;
            inset: -5%;
            background: #020503;
            overflow: hidden;
            z-index: 2;
        }

        .intro-image-layer img {
            position: absolute;
            width: 110%;
            height: 110%;
            top: -5%;
            left: -5%;
            object-fit: cover;
            animation:
                introKenBurns 48s ease-in-out forwards,
                introSubtlePan 48s ease-in-out forwards,
                hueShift 38s ease-in-out infinite;
            filter: brightness(0.55) contrast(1.3) saturate(0.6) hue-rotate(0deg);
            will-change: transform, filter;
        }

        .intro-image-layer img.shake-trigger {
            animation:
                introKenBurns 48s ease-in-out forwards,
                introSubtlePan 48s ease-in-out forwards,
                hueShift 38s ease-in-out infinite,
                introShake 0.35s ease-out;
        }

        /* ── GHOSTLY REFLECTION ── */
        .ghost-reflection {
            position: absolute;
            width: 110%;
            height: 110%;
            top: -5%;
            left: -5%;
            object-fit: cover;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            filter: brightness(0.65) contrast(1.2) saturate(1.2) hue-rotate(200deg); /* cyan shift */
            animation: ghostFlicker 12s ease-in-out infinite;
            mix-blend-mode: screen;
        }
        @keyframes ghostFlicker {
            0%, 5%, 15%, 28%, 42%, 55%, 68%, 82%, 100% { opacity: 0; transform: translate(0,0); }
            8%  { opacity: 0.18; transform: translate(5px, -3px); }
            22% { opacity: 0.10; transform: translate(-4px, 2px); }
            35% { opacity: 0.25; transform: translate(8px, -6px); }
            50% { opacity: 0.05; transform: translate(-6px, 4px); }
            65% { opacity: 0.20; transform: translate(3px, -2px); }
            78% { opacity: 0.12; transform: translate(-7px, 5px); }
            90% { opacity: 0.08; transform: translate(4px, -1px); }
        }

        .intro-image-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 35%, rgba(0, 0, 0, 0.9) 100%);
            z-index: 3;
            pointer-events: none;
        }

        .intro-image-layer .vignette-pulse {
            position: absolute;
            inset: 0;
            z-index: 4;
            pointer-events: none;
            background: radial-gradient(ellipse at center,
                    rgba(0, 255, 65, 0.04) 0%,
                    transparent 50%,
                    rgba(0, 0, 0, 0.7) 100%);
            animation: vignetteBreath 6s ease-in-out infinite;
        }

        @keyframes introKenBurns {
            0% {
                transform: scale(1.0);
            }
            100% {
                transform: scale(1.18);
            }
        }

        @keyframes introSubtlePan {
            0% {
                transform: translateX(0%);
            }
            25% {
                transform: translateX(-1.5%);
            }
            50% {
                transform: translateX(1.8%);
            }
            75% {
                transform: translateX(-1.2%);
            }
            100% {
                transform: translateX(0.5%);
            }
        }

        @keyframes introShake {
            0%,
            100% {
                transform: translate(0, 0);
            }
            10% {
                transform: translate(-8px, 3px);
            }
            20% {
                transform: translate(7px, -4px);
            }
            30% {
                transform: translate(-5px, -2px);
            }
            40% {
                transform: translate(6px, 5px);
            }
            50% {
                transform: translate(-9px, -3px);
            }
            60% {
                transform: translate(4px, 6px);
            }
            70% {
                transform: translate(-7px, -1px);
            }
            80% {
                transform: translate(8px, 2px);
            }
            90% {
                transform: translate(-3px, -5px);
            }
        }

        @keyframes hueShift {
            0%,
            100% {
                filter: brightness(0.55) contrast(1.3) saturate(0.6) hue-rotate(0deg);
            }
            20% {
                filter: brightness(0.55) contrast(1.3) saturate(0.6) hue-rotate(10deg);
            }
            40% {
                filter: brightness(0.55) contrast(1.3) saturate(0.6) hue-rotate(-6deg);
            }
            60% {
                filter: brightness(0.55) contrast(1.3) saturate(0.6) hue-rotate(14deg);
            }
            80% {
                filter: brightness(0.55) contrast(1.3) saturate(0.6) hue-rotate(-3deg);
            }
        }

        @keyframes vignetteBreath {
            0%,
            100% {
                opacity: 0.5;
            }
            50% {
                opacity: 0.85;
            }
        }

        /* ── VARIED SCANLINES OVERLAY ── */
        .scanlines-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            background:
                repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.07) 0px,
                    rgba(0, 0, 0, 0.07) 1px,
                    transparent 1px,
                    transparent 3px),
                repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.03) 0px,
                    rgba(0, 0, 0, 0.03) 1px,
                    transparent 1px,
                    transparent 7px),
                repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.11) 0px,
                    rgba(0, 0, 0, 0.11) 2px,
                    transparent 2px,
                    transparent 13px);
        }

        .scanlines-overlay::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.75) 100%);
            pointer-events: none;
        }

        /* ── FLICKER ── */
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }

        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.45;
            }
            99.5% {
                opacity: 0.8;
            }
            99.6% {
                opacity: 0.35;
            }
            99.7% {
                opacity: 1;
            }
        }

        /* ── ON AIR SIGN ── */
        .on-air-sign {
            position: absolute;
            top: 24px;
            right: 28px;
            z-index: 30;
            background: #0d0000;
            border: 2px solid #cc2200;
            border-radius: 4px;
            padding: 6px 14px;
            color: #ff3300;
            font-family: var(--font-mono);
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow:
                0 0 18px rgba(255, 40, 0, 0.65),
                0 0 40px rgba(255, 30, 0, 0.25),
                inset 0 0 10px rgba(255, 30, 0, 0.25);
            opacity: 0;
            transition: opacity 0.35s;
            pointer-events: none;
            user-select: none;
        }
        .on-air-sign.live {
            opacity: 1;
            animation: onAirFlicker 0.18s infinite alternate;
        }

        @keyframes onAirFlicker {
            0% {
                opacity: 0.8;
                box-shadow: 0 0 12px rgba(255, 40, 0, 0.45), 0 0 28px rgba(255, 30, 0, 0.18), inset 0 0 6px rgba(255, 30, 0, 0.2);
            }
            40% {
                opacity: 1;
                box-shadow: 0 0 24px rgba(255, 40, 0, 0.8), 0 0 48px rgba(255, 30, 0, 0.4), inset 0 0 14px rgba(255, 30, 0, 0.35);
            }
            70% {
                opacity: 0.65;
                box-shadow: 0 0 8px rgba(255, 40, 0, 0.35), 0 0 18px rgba(255, 30, 0, 0.12), inset 0 0 4px rgba(255, 30, 0, 0.15);
            }
            100% {
                opacity: 0.9;
                box-shadow: 0 0 20px rgba(255, 40, 0, 0.6), 0 0 36px rgba(255, 30, 0, 0.3), inset 0 0 10px rgba(255, 30, 0, 0.28);
            }
        }

        /* ── VINTAGE TIMECODE ── */
        .timecode {
            position: absolute;
            bottom: 18px;
            right: 48px;
            z-index: 28;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #b8c4ba;
            letter-spacing: 1.5px;
            opacity: 0.7;
            animation: timecodeBlink 2.2s step-end infinite;
            pointer-events: none;
            user-select: none;
            text-shadow: 0 0 6px rgba(200, 224, 204, 0.4);
        }
        @keyframes timecodeBlink {
            0%,
            55% {
                opacity: 0.78;
            }
            56%,
            100% {
                opacity: 0.12;
            }
        }

        /* ── TEXT OVERLAY ── */
        .intro-text-overlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            padding: 40px;
        }

        .intro-text-line {
            position: absolute;
            text-align: center;
            font-family: var(--font-mono);
            color: #c8e0cc;
            font-size: clamp(16px, 2.8vw, 24px);
            letter-spacing: 2px;
            text-shadow:
                0 0 18px rgba(0, 255, 65, 0.7),
                0 0 40px rgba(0, 255, 65, 0.35),
                0 2px 8px rgba(0, 0, 0, 0.9),
                0 0 80px rgba(0, 255, 65, 0.2);
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            max-width: 85vw;
            line-height: 1.5;
            white-space: pre-wrap; /* preserve line breaks */
        }

        .intro-text-line.visible {
            opacity: 1;
        }

        /* Typing glow */
        .intro-text-line.typing {
            text-shadow:
                0 0 22px rgba(0, 255, 65, 0.9),
                0 0 60px rgba(0, 255, 65, 0.5),
                0 2px 10px rgba(0, 0, 0, 0.95),
                0 0 100px rgba(0, 255, 65, 0.3);
        }

        /* ── FINAL TITLE DOUBLE EXPOSURE (chromatic aberration) ── */
        .intro-text-line.final-title {
            font-family: var(--font-title);
            font-size: clamp(28px, 6vw, 52px);
            letter-spacing: 4px;
            color: #00ff41;
            text-shadow:
                0 0 24px rgba(0, 255, 65, 0.9),
                0 0 60px rgba(0, 255, 65, 0.5),
                0 4px 12px rgba(0, 0, 0, 0.95),
                0 0 120px rgba(0, 255, 65, 0.3),
                0 0 200px rgba(0, 200, 50, 0.2);
            position: relative;
        }

        /* Red ghost copy using data-text attribute */
        .chromatic-title::before {
            content: attr(data-text);
            position: absolute;
            left: 6px;
            top: 3px;
            width: 100%;
            color: rgba(255, 50, 50, 0.7);
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.6);
            pointer-events: none;
            white-space: pre-wrap;
            animation: chromaticConverge 2s ease-in-out forwards;
            z-index: -1;
        }

        @keyframes chromaticConverge {
            0%   { transform: translate(6px, 3px); opacity: 0.7; }
            75%  { transform: translate(6px, 3px); opacity: 0.7; }
            100% { transform: translate(0, 0); opacity: 0; }
        }

        /* ── ENTER BUTTON ── */
        .enter-button-container {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 32;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.8s ease-in-out;
        }

        .enter-button-container.revealed {
            opacity: 1;
            pointer-events: auto;
            animation: enterPulse 2s ease-in-out infinite;
        }

        @keyframes enterPulse {
            0%,
            100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.5);
            }
        }

        .enter-btn {
            background: rgba(8, 20, 12, 0.85);
            border: 3px solid #00ff41;
            border-top-color: #1a6a2e;
            border-left-color: #165a28;
            border-right-color: #0f2e18;
            border-bottom-color: #081a0c;
            padding: 16px 40px;
            border-radius: 4px;
            color: #b8d4a8;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: clamp(18px, 3vw, 24px);
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow:
                0 0 22px rgba(0, 255, 65, 0.4),
                0 0 50px rgba(0, 255, 65, 0.15),
                0 4px 0 rgba(0, 0, 0, 0.5);
            transition: all 0.15s;
            min-height: 52px;
        }

        .enter-btn:hover {
            background: rgba(12, 28, 18, 0.9);
            box-shadow:
                0 0 34px rgba(0, 255, 65, 0.6),
                0 0 70px rgba(0, 255, 65, 0.25),
                0 4px 0 rgba(0, 0, 0, 0.5);
            border-color: #00ff41;
        }

        .enter-btn:active {
            transform: translateY(3px);
            box-shadow:
                0 0 18px rgba(0, 255, 65, 0.5),
                0 0 40px rgba(0, 255, 65, 0.2),
                0 1px 0 rgba(0, 0, 0, 0.5);
            background: rgba(6, 16, 10, 0.9);
        }

        /* ── EXIT STATIC CANVAS ── */
        .static-canvas {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            background: transparent;
        }
        .static-canvas.active {
            opacity: 1;
        }

        /* ── BLACKOUT OVERLAY ── */
        .blackout-overlay {
            position: fixed;
            inset: 0;
            z-index: 110;
            background: #000000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in;
        }
        .blackout-overlay.active {
            opacity: 1;
        }

        /* ── API KEY MODAL ── */
        .api-modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .api-modal {
            background: #080d0a;
            border: 3px solid #00ff41;
            border-radius: 6px;
            padding: 28px 24px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow:
                0 0 30px rgba(0, 255, 65, 0.35),
                0 0 80px rgba(0, 0, 0, 0.8),
                inset 0 0 40px rgba(0, 0, 0, 0.6);
            color: #b8c4ba;
            font-family: var(--font-body);
        }

        .api-modal h2 {
            font-family: var(--font-display);
            color: #00ff41;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 22px;
            text-shadow: 0 0 16px rgba(0, 255, 65, 0.7);
        }

        .api-modal p {
            font-size: 15px;
            color: #6e8a6a;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .api-modal input {
            width: 100%;
            padding: 12px 14px;
            background: #0a100c;
            border: 2px solid #1c2822;
            border-radius: 3px;
            color: #c8e0cc;
            font-family: var(--font-mono);
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .api-modal input:focus {
            border-color: #00ff41;
            box-shadow: 0 0 12px rgba(0, 255, 65, 0.25);
        }

        .api-modal input::placeholder {
            color: #2a4a30;
            letter-spacing: 1px;
        }

        .api-modal .save-btn {
            background: #0c1410;
            border: 2px solid #00ff4166;
            border-top-color: #1a6a2e;
            border-left-color: #165a28;
            border-right-color: #0f2e18;
            border-bottom-color: #081a0c;
            padding: 12px 28px;
            border-radius: 3px;
            color: #b8d4a8;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.15s;
            min-height: 46px;
        }

        .api-modal .save-btn:hover {
            border-color: #00ff41;
            box-shadow: 0 0 18px rgba(0, 255, 65, 0.35);
        }

        .api-modal .save-btn:active {
            transform: translateY(1px);
        }

        .api-modal .skip-hint {
            font-size: 11px;
            color: #2a4a30;
            margin-top: 10px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        .api-modal .skip-hint:hover {
            color: #4a6e52;
        }

        /* ── LOADING INDICATOR ── */
        .loading-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            color: #4a6e52;
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 3px;
            opacity: 0;
            transition: opacity 0.6s;
            pointer-events: none;
        }

        .loading-indicator.active {
            opacity: 0.7;
            animation: blink 1.2s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.2;
            }
        }

        /* ── CORNER BRANDING ── */
        .corner-brand {
            position: absolute;
            bottom: 18px;
            left: 22px;
            z-index: 25;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #1a3a22;
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
        }

        .corner-led {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 26;
            width: 7px;
            height: 7px;
            background: #00ff41;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.8), 0 0 20px rgba(0, 255, 65, 0.3);
            animation: ledGlow 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes ledGlow {
            0%,
            100% {
                box-shadow: 0 0 10px rgba(0, 255, 65, 0.8), 0 0 20px rgba(0, 255, 65, 0.3);
            }
            50% {
                box-shadow: 0 0 18px rgba(0, 255, 65, 0.95), 0 0 34px rgba(0, 255, 65, 0.5);
            }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 540px) {
            .intro-text-line {
                font-size: clamp(14px, 4vw, 18px);
                letter-spacing: 1.5px;
                padding: 20px;
            }
            .intro-text-line.final-title {
                font-size: clamp(22px, 7vw, 36px);
                letter-spacing: 2px;
            }
            .enter-btn {
                padding: 14px 28px;
                font-size: 16px;
                letter-spacing: 2px;
            }
            .api-modal {
                padding: 20px 16px;
                max-width: 90vw;
            }
            .corner-brand {
                font-size: 7px;
                bottom: 12px;
                left: 14px;
            }
            .corner-led {
                bottom: 14px;

<body>

    <script>
        (function() {
            // ── DOM REFS ──
            const apiModal = document.getElementById('apiModal');
            const apiKeyInput = document.getElementById('apiKeyInput');
            const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');
            const skipApiBtn = document.getElementById('skipApiBtn');
            const introStage = document.getElementById('introStage');
            const introImage = document.getElementById('introImage');
            const ghostReflection = document.getElementById('ghostReflection');
            const imageLayer = document.getElementById('imageLayer');
            const textOverlay = document.getElementById('textOverlay');
            const enterBtnContainer = document.getElementById('enterButtonContainer');
            const enterBtn = document.getElementById('enterBtn');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const countdownOverlay = document.getElementById('countdownOverlay');
            const countdownNumber = document.getElementById('countdownNumber');
            const onAirSign = document.getElementById('onAirSign');
            const timecodeEl = document.getElementById('timecode');
            const staticCanvas = document.getElementById('staticCanvas');
            const blackoutOverlay = document.getElementById('blackoutOverlay');
            const crtPowerOnOverlay = document.getElementById('crtPowerOnOverlay');

            const textLines = [
                document.getElementById('line1'),
                document.getElementById('line2'),
                document.getElementById('line3'),
                document.getElementById('line4'),
                document.getElementById('line5'),
                document.getElementById('line6'),
                document.getElementById('line7'),
            ];

            // ── STATE ──
            const STORAGE_KEY = 'haunting_hour_key';
            let apiKey = localStorage.getItem(STORAGE_KEY) || '';
            let introStarted = false;
            let introComplete = false;
            let audioCtx = null;
            let activeOscillators = [];
            let activeGains = [];
            let themeTimeoutIds = [];
            let staticAnimFrameId = null;
            let typingInterval = null;      // for typed text reveals
            let currentTypingLineIdx = -1; // which line is being typed

            // ── IMAGE URL ──
            const INTRO_IMAGE_PROMPT =
                'foggy+deserted+highway+at+night+single+roadside+trailer+with+glowing+green+neon+sign+radio+tower+blinking+light+1984+dark+atmospheric+horror+cinematic+grainy+misty+isolated+creepy+wide+shot';
            const INTRO_IMAGE_URL =
                `https://image.pollinations.ai/prompt/${INTRO_IMAGE_PROMPT}?width=1024&height=768&seed=1984&nologo=true`;

            // ── PRELOAD IMAGE ──
            function preloadImage(url) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    let resolved = false;
                    const timeout = setTimeout(() => {
                        if (!resolved) {
                            resolved = true;
                            reject(new Error('Image preload timeout'));
                        }
                    }, 20000);
                    img.onload = () => {
                        if (!resolved) {
                            resolved = true;
                            clearTimeout(timeout);
                            resolve(url);
                        }
                    };
                    img.onerror = () => {
                        if (!resolved) {
                            resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image preload error'));
                        }
                    };
                    img.src = url;
                });
            }

            // ── AUDIO ENGINE (unchanged) ──
            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                return audioCtx;
            }

            function stopAllAudio() {
                activeOscillators.forEach(osc => {
                    try { osc.stop(); } catch (e) {}
                });
                activeGains.forEach(gain => {
                    try { gain.disconnect(); } catch (e) {}
                });
                themeTimeoutIds.forEach(id => clearTimeout(id));
                activeOscillators = [];
                activeGains = [];
                themeTimeoutIds = [];
            }

            function createOscillator(ctx, type, frequency, gainValue, startTime, duration, connectTo) {
                const osc = ctx.createOscillator();
                osc.type = type;
                osc.frequency.value = frequency;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(gainValue, startTime + 0.3);
                if (duration > 0) {
                    gain.gain.setValueAtTime(gainValue, startTime + duration - 0.8);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration + 0.5);
                }
                osc.connect(gain);
                gain.connect(connectTo || ctx.destination);
                osc.start(startTime);
                if (duration > 0) osc.stop(startTime + duration + 0.6);
                activeOscillators.push(osc);
                activeGains.push(gain);
                return { osc, gain };
            }

            function createFilteredPad(ctx, frequency, gainValue, startTime, duration, filterFreq) {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = filterFreq || 300;
                filter.Q.value = 1.8;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.08 + Math.random() * 0.1;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 120;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                lfo.start(startTime);
                lfo.stop(startTime + duration + 0.6);
                activeOscillators.push(lfo);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.007;
                const osc3 = ctx.createOscillator();
                osc3.type = 'triangle';
                osc3.frequency.value = frequency * 0.993;

                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(gainValue, startTime + 1.2);
                gain.gain.setValueAtTime(gainValue, startTime + duration - 1.5);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration + 0.8);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);

                osc1.start(startTime);
                osc2.start(startTime);
                osc3.start(startTime);
                osc1.stop(startTime + duration + 1);
                osc2.stop(startTime + duration + 1);
                osc3.stop(startTime + duration + 1);

                activeOscillators.push(osc1, osc2, osc3);
                activeGains.push(gain);
                return { filter, gain };
            }

            function createStinger(ctx, startTime, intensity = 0.6) {
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.22, startTime + 0.06);
                gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + 2.2);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, startTime);
                osc.frequency.exponentialRampToValueAtTime(380, startTime + 0.4);
                osc.frequency.exponentialRampToValueAtTime(60, startTime + 1.8);

                const osc2 = ctx.createOscillator();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(200, startTime);
                osc2.frequency.exponentialRampToValueAtTime(760, startTime + 0.4);
                osc2.frequency.exponentialRampToValueAtTime(120, startTime + 1.8);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 1.5;

                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);

                osc.start(startTime);
                osc2.start(startTime);
                osc.stop(startTime + 2.2);
                osc2.stop(startTime + 2.2);

                activeOscillators.push(osc, osc2);
                activeGains.push(gainNode);
            }

            function createThunderHit(ctx, startTime, intensity = 0.5) {
                const bufferSize = ctx.sampleRate * 0.7;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.3));
                }
                const source = ctx.createBufferSource();
                source.buffer = buffer;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.5, startTime);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + 1.2);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 110;
                filter.Q.value = 0.4;
                source.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                source.start(startTime);
                source.stop(startTime + 1.2);
                activeOscillators.push(source);
                activeGains.push(gain);
            }

            function createDeepDrone(ctx, startTime, duration, frequency = 38) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = frequency;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.18, startTime + 2);
                gain.gain.setValueAtTime(0.18, startTime + duration - 2);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration + 1);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 80;
                filter.Q.value = 0.5;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.06;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 8;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                lfo.start(startTime);
                lfo.stop(startTime + duration + 1);
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                osc.start(startTime);
                osc.stop(startTime + duration + 1);
                activeOscillators.push(osc, lfo);
                activeGains.push(gain);
            }

            function createBellTone(ctx, startTime, frequency = 80, intensity = 0.3) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = frequency;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(intensity * 0.4, startTime + 0.2);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + 4.5);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 350;
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                osc.start(startTime);
                osc.stop(startTime + 4.5);
                activeOscillators.push(osc);
                activeGains.push(gain);
            }

            // ── COMPOSE INTRO THEME ──
            async function playIntroTheme() {
                try {
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;

                    createDeepDrone(ctx, now, 48, 36);

                    const drone2 = ctx.createOscillator();
                    drone2.type = 'sine';
                    drone2.frequency.value = 54;
                    const drone2Gain = ctx.createGain();
                    drone2Gain.gain.setValueAtTime(0, now);
                    drone2Gain.gain.linearRampToValueAtTime(0.09, now + 4);
                    drone2Gain.gain.setValueAtTime(0.09, now + 42);
                    drone2Gain.gain.exponentialRampToValueAtTime(0.001, now + 48);
                    drone2.connect(drone2Gain);
                    drone2Gain.connect(ctx.destination);
                    drone2.start(now);
                    drone2.stop(now + 49);
                    activeOscillators.push(drone2);
                    activeGains.push(drone2Gain);

                    createFilteredPad(ctx, 55, 0.1, now + 4, 40, 250);
                    createFilteredPad(ctx, 82.5, 0.08, now + 12, 32, 350);

                    themeTimeoutIds.push(setTimeout(() => createBellTone(ctx, audioCtx.currentTime, 65, 0.35), 6000));
                    themeTimeoutIds.push(setTimeout(() => createBellTone(ctx, audioCtx.currentTime, 78, 0.3), 14000));
                    themeTimeoutIds.push(setTimeout(() => createBellTone(ctx, audioCtx.currentTime, 55, 0.4), 22000));
                    themeTimeoutIds.push(setTimeout(() => createBellTone(ctx, audioCtx.currentTime, 90, 0.35), 28000));

                    themeTimeoutIds.push(setTimeout(() => createStinger(ctx, audioCtx.currentTime, 0.45), 10000));
                    themeTimeoutIds.push(setTimeout(() => createStinger(ctx, audioCtx.currentTime, 0.55), 20000));
                    themeTimeoutIds.push(setTimeout(() => createStinger(ctx, audioCtx.currentTime, 0.7), 30000));

                    themeTimeoutIds.push(setTimeout(() => createThunderHit(ctx, audioCtx.currentTime, 0.6), 32000));

                    themeTimeoutIds.push(setTimeout(() => {
                        if (!audioCtx) return;
                        const t = audioCtx.currentTime;
                        const buildOsc = audioCtx.createOscillator();
                        buildOsc.type = 'sawtooth';
                        buildOsc.frequency.setValueAtTime(40, t);
                        buildOsc.frequency.exponentialRampToValueAtTime(160, t + 6);
                        const buildGain = audioCtx.createGain();
                        buildGain.gain.setValueAtTime(0, t);
                        buildGain.gain.linearRampToValueAtTime(0.15, t + 3);
                        buildGain.gain.exponentialRampToValueAtTime(0.001, t + 8);
                        const buildFilter = audioCtx.createBiquadFilter();
                        buildFilter.type = 'lowpass';
                        buildFilter.frequency.setValueAtTime(150, t);
                        buildFilter.frequency.exponentialRampToValueAtTime(1200, t + 6);
                        buildFilter.Q.value = 2;
                        buildOsc.connect(buildFilter);
                        buildFilter.connect(buildGain);
                        buildGain.connect(audioCtx.destination);
                        buildOsc.start(t);
                        buildOsc.stop(t + 8);
                        activeOscillators.push(buildOsc);
                        activeGains.push(buildGain);
                    }, 30000));

                    themeTimeoutIds.push(setTimeout(() => {
                        if (!audioCtx) return;
                        createThunderHit(audioCtx, audioCtx.currentTime, 0.8);
                        setTimeout(() => createStinger(audioCtx, audioCtx.currentTime, 0.9), 400);
                    }, 34000));

                } catch (err) {
                    console.warn('Audio theme error:', err);
                }
            }

            // ── CRT POWER-ON SEQUENCE ──
            function startCRTPowerOn() {
                return new Promise(resolve => {
                    // The overlay is already visible with its CSS animations.
                    // We just need to wait for the animation to end, then hide it.
                    // The total animation time is about 1.5s (dot 1.2s + line 0.25s + fade 0.5s).
                    const powerOnDuration = 1500; // ms
                    // Play a soft power-on hum
                    try {
                        getAudioContext().then(ctx => {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 60;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0.08, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.8);
                            osc.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start();
                            osc.stop(ctx.currentTime + 1.8);
                            activeOscillators.push(osc);
                            activeGains.push(gain);
                        });
                    } catch(e) {}

                    setTimeout(() => {
                        crtPowerOnOverlay.classList.add('fade-out');
                        // After fade out, hide it completely and resolve
                        setTimeout(() => {
                            crtPowerOnOverlay.style.display = 'none';
                            resolve();
                        }, 600);
                    }, powerOnDuration);
                });
            }

            // ── COUNTDOWN ──
            function startCountdown() {
                return new Promise(resolve => {
                    countdownOverlay.style.display = 'flex';
                    const numbers = ['3', '2', '1'];
                    let index = 0;
                    countdownOverlay.classList.remove('fading-out');

                    function showNext() {
                        if (index >= numbers.length) {
                            countdownOverlay.classList.add('fading-out');
                            setTimeout(() => {
                                countdownOverlay.style.display = 'none';
                                resolve();
                            }, 600);
                            return;
                        }
                        countdownNumber.textContent = numbers[index];
                        countdownNumber.classList.remove('visible');
                        void countdownNumber.offsetWidth;
                        countdownNumber.classList.add('visible');
                        index++;
                        setTimeout(showNext, 950);
                    }
                    showNext();
                });
            }

            // ── TYPED TEXT REVEAL ──
            function stopTyping() {
                if (typingInterval) {
                    clearInterval(typingInterval);
                    typingInterval = null;
                }
                if (currentTypingLineIdx >= 0) {
                    const lineEl = textLines[currentTypingLineIdx];
                    lineEl.classList.remove('typing');
                    currentTypingLineIdx = -1;
                }
            }

            function typeLine(lineIndex, text, speed = 60) {
                stopTyping();
                const lineEl = textLines[lineIndex];
                lineEl.textContent = '';
                lineEl.classList.add('visible', 'typing');
                currentTypingLineIdx = lineIndex;
                let charIndex = 0;
                typingInterval = setInterval(() => {
                    if (charIndex <= text.length) {
                        lineEl.textContent = text.substring(0, charIndex);
                        charIndex++;
                    } else {
                        clearInterval(typingInterval);
                        typingInterval = null;
                        lineEl.classList.remove('typing');
                        // Keep line visible; typing completed
                    }
                }, speed);
                // Immediately speak the full line
                speakLine(text, 0.55, 1.05, (lineIndex % 2 === 0) ? 'male' : 'female');
            }

            function clearLine(lineIndex) {
                if (currentTypingLineIdx === lineIndex) {
                    stopTyping();
                }
                const lineEl = textLines[lineIndex];
                lineEl.textContent = '';
                lineEl.classList.remove('visible', 'typing');
                if (lineIndex === 6) {
                    lineEl.classList.remove('chromatic-title');
                    lineEl.removeAttribute('data-text');
                }
            }

            function hideAllLines() {
                textLines.forEach((line, idx) => {
                    line.textContent = '';
                    line.classList.remove('visible', 'typing');
                    if (idx === 6) {
                        line.classList.remove('chromatic-title');
                        line.removeAttribute('data-text');
                    }
                });
                stopTyping();
            }

            // ── VOICE HELPERS ──
            function getVoiceByGender(gender = 'female') {
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David', 'Fred', 'Alex', 'Tom'];
                const femaleNames = ['Google UK English Female', 'Google US English Female', 'Samantha', 'Microsoft Zira', 'Fiona', 'Karen', 'Moira', 'Veena', 'Susan', 'Catherine'];
                const nameList = gender === 'male' ? maleNames : femaleNames;
                let voice = null;
                for (const name of nameList) {
                    voice = voices.find(v => v.name.includes(name));
                    if (voice) break;
                }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes(gender)) || voices[0];
                return voice;
            }

            function speakLine(text, rate = 0.55, pitch = 1.05, gender = 'female') {
                if (!text || !window.speechSynthesis) return;
                speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                const voice = getVoiceByGender(gender);
                if (voice) utterance.voice = voice;
                utterance.rate = rate;
                utterance.pitch = pitch;
                utterance.volume = 0.8;
                speechSynthesis.speak(utterance);
            }

            // ── TEXT SEQUENCE WITH TYPING ──
            const LINE_TIMINGS = [
                { index: 0, text: 'There is a frequency…\nbetween stations.', showAt: 3000, hideAt: 8500 },
                { index: 1, text: 'A signal that has been broadcasting\nsince 1984.', showAt: 9000, hideAt: 15500 },
                { index: 2, text: 'From a fog-shrouded trailer\non a forgotten highway…', showAt: 16000, hideAt: 22500 },
                { index: 3, text: 'Where Lorna Marsh waits…\nwith stories of ordinary mistakes.', showAt: 23000, hideAt: 29500 },
                { index: 4, text: 'And their terrifying\nconsequences.', showAt: 30000, hideAt: 35500 },
                { index: 5, text: 'You have just crossed into…', showAt: 36000, hideAt: 40000 },
            ];
            const FINAL_TITLE = { index: 6, text: 'THE HAUNTING\nHOUR', showAt: 40500, hideAt: 47000 };

            let textSequenceTimeoutIds = [];

            function clearTextSequence() {
                textSequenceTimeoutIds.forEach(id => clearTimeout(id));
                textSequenceTimeoutIds = [];
            }

            function runTextSequence(startOffset = 0) {
                clearTextSequence();
                hideAllLines();

                const baseTime = Date.now() + startOffset;

                // Schedule all non‑final lines
                LINE_TIMINGS.forEach(timing => {
                    const showDelay = timing.showAt;
                    const hideDelay = timing.hideAt;

                    const showId = setTimeout(() => {
                        typeLine(timing.index, timing.text, 60);
                    }, showDelay);
                    textSequenceTimeoutIds.push(showId);

                    const hideId = setTimeout(() => {
                        clearLine(timing.index);
                    }, hideDelay);
                    textSequenceTimeoutIds.push(hideId);
                });

                // Final title with chromatic aberration
                const finalShowId = setTimeout(() => {
                    // Prepare chromatic effect
                    const line7 = textLines[6];
                    line7.setAttribute('data-text', FINAL_TITLE.text);
                    line7.classList.add('chromatic-title');
                    typeLine(FINAL_TITLE.index, FINAL_TITLE.text, 55);

                    // Speak with male voice
                    speakLine(FINAL_TITLE.text, 0.5, 1.0, 'male');

                    triggerImageShake();
                    revealOnAirSign();
                    if (audioCtx) {
                        createStinger(audioCtx, audioCtx.currentTime, 0.8);
                        setTimeout(() => createThunderHit(audioCtx, audioCtx.currentTime, 0.7), 300);
                    }
                }, FINAL_TITLE.showAt);
                textSequenceTimeoutIds.push(finalShowId);

                const finalHideId = setTimeout(() => {
                    clearLine(FINAL_TITLE.index);
                }, FINAL_TITLE.hideAt);
                textSequenceTimeoutIds.push(finalHideId);

                // Reveal enter button
                const revealId = setTimeout(() => {
                    revealEnterButton();
                }, 46000);
                textSequenceTimeoutIds.push(revealId);
            }

            function triggerImageShake() {
                introImage.classList.add('shake-trigger');
                setTimeout(() => {
                    introImage.classList.remove('shake-trigger');
                }, 400);
            }

            function revealOnAirSign() {
                onAirSign.classList.add('live');
            }

            function revealEnterButton() {
                introComplete = true;
                enterBtnContainer.classList.add('revealed');
                loadingIndicator.classList.remove('active');
                if (currentTypingLineIdx === 6) {
                    const titleEl = textLines[6];
                    titleEl.style.animation = 'none';
                    titleEl.offsetHeight;
                    titleEl.style.animation = '';
                }
            }

            // ── EXIT STATIC ANIMATION ──
            function triggerExitAnimation() {
                const canvas = staticCanvas;
                const ctx2d = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                canvas.classList.add('active');

                const imageData = ctx2d.createImageData(canvas.width, canvas.height);
                const data = imageData.data;
                const totalPixels = canvas.width * canvas.height;

                function drawNoiseFrame() {
                    for (let i = 0; i < totalPixels; i++) {
                        const offset = i * 4;
                        const val = Math.floor(Math.random() * 180) + 20;
                        data[offset] = val;
                        data[offset + 1] = val;
                        data[offset + 2] = val;
                        data[offset + 3] = 255;
                    }
                    ctx2d.putImageData(imageData, 0, 0);
                    staticAnimFrameId = requestAnimationFrame(drawNoiseFrame);
                }
                drawNoiseFrame();

                setTimeout(() => {
                    blackoutOverlay.classList.add('active');
                }, 700);

                setTimeout(() => {
                    if (staticAnimFrameId) cancelAnimationFrame(staticAnimFrameId);
                    window.location.href = 'chhome.html';
                }, 1300);
            }

            // ── START INTRO (now with CRT power-on) ──
            async function startIntro() {
                if (introStarted) return;
                introStarted = true;

                apiModal.style.display = 'none';
                loadingIndicator.classList.add('active');

                // 1. CRT power-on
                await startCRTPowerOn();

                // 2. Countdown
                await startCountdown();

                // 3. Load image and set ghost reflection
                let imageLoaded = false;
                preloadImage(INTRO_IMAGE_URL)
                    .then(url => {
                        introImage.src = url;
                        ghostReflection.src = url;   // <-- ghost reflection uses same image
                        introImage.style.opacity = '1';
                        imageLoaded = true;
                        loadingIndicator.classList.remove('active');
                    })
                    .catch(err => {
                        console.warn('Image preload failed, using fallback:', err);
                        const fallbackUrl = `https://image.pollinations.ai/prompt/${INTRO_IMAGE_PROMPT}?width=1024&height=768&seed=${Date.now()}&nologo=true`;
                        introImage.src = fallbackUrl;
                        ghostReflection.src = fallbackUrl;
                        introImage.style.opacity = '1';
                        imageLoaded = true;
                        loadingIndicator.classList.remove('active');
                    });

                // 4. Audio theme
                try {
                    playIntroTheme();
                } catch (e) {
                    console.warn('Audio theme failed:', e);
                }

                // 5. Text sequence
                runTextSequence(1500);

                // Fallback for image load
                setTimeout(() => {
                    if (!imageLoaded && introImage.src) {
                        introImage.style.opacity = '1';
                        loadingIndicator.classList.remove('active');
                    }
                    if (!imageLoaded && !introImage.src) {
                        const fallback = `https://image.pollinations.ai/prompt/dark+foggy+highway+night+green+glow?width=1024&height=768&seed=999&nologo=true`;
                        introImage.src = fallback;
                        ghostReflection.src = fallback;
                        introImage.style.opacity = '1';
                        loadingIndicator.classList.remove('active');
                    }
                }, 10000);
            }

            // ── API KEY HANDLING ──
            function saveApiKey() {
                const key = apiKeyInput.value.trim();
                if (key && key.length > 10) {
                    apiKey = key;
                    localStorage.setItem(STORAGE_KEY, key);
                    startIntro();
                } else if (key.length > 0 && key.length <= 10) {
                    apiKeyInput.style.borderColor = '#ff4444';
                    apiKeyInput.placeholder = 'Key seems too short… paste full key';
                    setTimeout(() => {
                        apiKeyInput.style.borderColor = '#1c2822';
                        apiKeyInput.placeholder = 'Paste your Mistral API key…';
                    }, 2000);
                } else {
                    apiKeyInput.style.borderColor = '#ff4444';
                    apiKeyInput.placeholder = 'Please enter a valid API key';
                    setTimeout(() => {
                        apiKeyInput.style.borderColor = '#1c2822';
                        apiKeyInput.placeholder = 'Paste your Mistral API key…';
                    }, 2000);
                }
            }

            function skipApiKey() {
                apiKey = '';
                localStorage.setItem(STORAGE_KEY, '');
                startIntro();
            }

            // ── EVENT LISTENERS ──
            saveApiKeyBtn.addEventListener('click', saveApiKey);
            skipApiBtn.addEventListener('click', skipApiKey);
            apiKeyInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') saveApiKey();
            });

            enterBtn.addEventListener('click', () => {
                if (!introComplete) return;
                stopAllAudio();
                speechSynthesis.cancel();
                clearTextSequence();
                hideAllLines();
                triggerExitAnimation();
            });

            window.addEventListener('resize', () => {
                if (staticCanvas.classList.contains('active')) {
                    staticCanvas.width = window.innerWidth;
                    staticCanvas.height = window.innerHeight;
                }
            });

            // ── INIT ──
            function init() {
                if (apiKey && apiKey.length > 10) {
                    apiKeyInput.value = apiKey;
                    setTimeout(() => startIntro(), 400);
                } else {
                    apiModal.style.display = 'flex';
                    setTimeout(() => apiKeyInput.focus(), 500);
                }

                document.addEventListener('click', async function warmAudio() {
                    try { await getAudioContext(); } catch (e) {}
                }, { once: true });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && apiModal.style.display === 'flex') {
                        skipApiKey();
                    }
                });
            }

            window.addEventListener('beforeunload', () => {
                stopAllAudio();
                clearTextSequence();
                hideAllLines();
                if (staticAnimFrameId) cancelAnimationFrame(staticAnimFrameId);
                speechSynthesis.cancel();
            });

            init();
        })();
    </script>
</body>
</html>
