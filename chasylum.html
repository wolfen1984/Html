<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover" />
    <title>THE ASYLUM · 1987 · AI SOUNDTRACK</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Special+Elite&family=Playfair+Display+SC:wght@400;700&family=Cinzel:wght@400;600&family=Oswald:wght@400;700&family=Inter:wght@300;400;500;600&family=Fira+Mono&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #0d0d0d;
            --screen-bg: #161616;
            --panel-bg: #1e1e1e;
            --text: #cccccc;
            --text-dim: #6b6b6b;
            --text-bright: #f5f5f5;
            --accent: #fafafa;
            --accent-dim: #3a3a3a;
            --border: #4a4a4a;
            --border-glow: 0 0 14px #ffffff22, 0 0 32px #ffffff0d;
            --danger: #999999;
            --danger-glow: 0 0 12px #ffffff44;
            --amber: #aaaaaa;
            --amber-dim: #444444;
            --gold: #bbbbbb;
            --gold-dim: #4a4a4a;
            --green: #777777;
            --input-bg: #1c1c1c;
            --button-bg: #1e1e1e;
            --button-hover: #2a2a2a;
            --button-active: #252525;
            --bevel-light: #333333;
            --bevel-dark: #0a0a0a;
            --font-display: 'Cinzel', 'Playfair Display SC', serif;
            --font-title: 'Inter', 'Playfair Display SC', 'Cinzel', sans-serif;
            --font-mono: 'Fira Mono', 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.04;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 26px;
            --btn-min-height: 46px;
            --touch-target: 44px;
            --neon-white: #fefefe;
            --neon-white-glow: 0 0 6px #ffffff66, 0 0 16px #ffffff33, 0 0 36px #ffffff18, 0 0 60px #ffffff0a;
            --neon-white-strong: 0 0 8px #ffffff99, 0 0 22px #ffffff55, 0 0 50px #ffffff22, 0 0 80px #ffffff0d;
            --grey-cool: #8a8a8a;
            --grey-warm: #999999;
            --institutional-grey: #3a3a3a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #1a1a1a 0%, #050505 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #1a1a1a;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2e2e2e, 0 0 0 4px #181818, 0 0 0 8px #0d0d0d, 0 8px 48px #000000dd, 0 0 60px #ffffff03, 0 0 80px #ffffff02;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #444444;
        }
        @media (max-width:540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #141414;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffffff99, 0 0 18px #ffffff55, var(--neon-white-strong);
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%, 100% { box-shadow: 0 0 8px #ffffff99, 0 0 18px #ffffff55; }
            50% { box-shadow: 0 0 16px #ffffffdd, 0 0 30px #ffffff88; }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #777777;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #555555;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(8, 8, 8, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width:540px) {
            .game-shell { border-radius: 0; border-width: 2px; }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(6, 6, 6, 0.75), inset 0 0 12px rgba(10, 10, 10, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(255,255,255, var(--scanline-opacity)) 0px, rgba(255,255,255, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(6,6,6,0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker { animation: crtFlicker 9s ease-in-out infinite; }
        @keyframes crtFlicker {
            0%, 99.3%, 100% { opacity: 1; }
            99.4% { opacity: 0.55; }
            99.5% { opacity: 0.88; }
            99.6% { opacity: 0.4; }
            99.7% { opacity: 1; }
        }
        .marquee {
            position: relative; z-index: 10;
            background: #181818; border-bottom: 3px solid #666666;
            padding: 10px 16px; text-align: center;
            font-family: var(--font-display); letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #222222;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #777777; border-radius: 2px;
            padding: 10px 14px; background: #111111;
            position: relative; box-shadow: inset 0 0 24px #ffffff08;
        }
        .marquee-inner::before {
            content: ''; position: absolute; top: -2px; left: 16px; right: 16px; height: 2px;
            background: #aaaaaa; box-shadow: 0 0 12px #ffffff88;
        }
        .marquee-inner::after {
            content: ''; position: absolute; bottom: -2px; left: 16px; right: 16px; height: 1px;
            background: #66666644; box-shadow: 0 0 8px #ffffff22;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #f0f0f0;
            text-shadow: 0 0 16px #ffffff88, 0 2px 4px #000, 0 0 40px #ffffff33, var(--neon-white-glow);
            letter-spacing: 5px; font-family: var(--font-title); line-height: 1.2;
            text-transform: uppercase; font-weight: 500;
        }
        .marquee-sub {
            font-family: var(--font-mono); font-size: 11px;
            color: #999999; letter-spacing: 5px; margin-top: 3px;
            text-transform: uppercase;
        }
        @media (max-width:400px) {
            .marquee-title { font-size: 20px; letter-spacing: 3px; }
        }
        .game-area {
            flex: 1; overflow-y: auto; overflow-x: hidden; z-index: 5;
            scrollbar-width: thin; scrollbar-color: #444444 #161616;
            display: flex; flex-direction: column; padding: 4px 0;
        }
        .game-area::-webkit-scrollbar { width: 5px; }
        .game-area::-webkit-scrollbar-track { background: #161616; }
        .game-area::-webkit-scrollbar-thumb { background: #444444; border-radius: 3px; }
        .panel { display: flex; flex-direction: column; padding: 10px; gap: 10px; flex: 1; }
        .btn {
            background: var(--button-bg); border: 2px solid #4a4a4a;
            border-top-color: #5a5a5a; border-left-color: #505050;
            border-right-color: #3d3d3d; border-bottom-color: #2a2a2a;
            padding: 12px 18px; border-radius: 3px; color: var(--text);
            cursor: pointer; font-family: var(--font-body); font-size: var(--text-size-base);
            letter-spacing: 1px; text-transform: uppercase; transition: all 0.1s;
            min-height: var(--btn-min-height); display: inline-flex;
            align-items: center; justify-content: center; gap: 6px;
            box-shadow: 0 2px 0 #00000044; white-space: nowrap;
        }
        .btn:active {
            border-top-color: #3d3d3d; border-left-color: #3d3d3d;
            border-bottom-color: #5a5a5a; border-right-color: #505050;
            box-shadow: 0 0px 0 #00000044; transform: translateY(1px); background: #252525;
        }
        .btn.accent {
            background: #222222; border-color: #777777;
            border-top-color: #999999; border-left-color: #888888;
            border-right-color: #666666; border-bottom-color: #3a3a3a;
            color: #f0f0f0; box-shadow: 0 2px 0 #00000044, 0 0 10px #ffffff22;
        }
        .btn.accent:active {
            border-top-color: #666666; border-left-color: #666666;
            border-bottom-color: #999999; border-right-color: #888888;
            box-shadow: 0 0px 0 #00000044, 0 0 16px #ffffff44;
        }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
        .btn-small { padding: 4px 10px; font-size: 12px; min-height: 28px; }
        .theater-mask {
            position: relative; background: #1e1e1e;
            border: 2px solid #55555566; box-shadow: inset 0 0 36px rgba(8,8,8,0.85);
        }
        .tv-stage {
            display: flex; flex-direction: column; gap: 12px;
            background: #1a1a1a; border: 2px solid #777777; padding: 15px; border-radius: 3px;
        }
        .tv-stage-row { display: flex; align-items: flex-start; gap: 15px; width: 100%; }
        .host-portrait {
            width: 100px; height: 100px; border-radius: 4px; border: 3px solid #888888;
            box-shadow: 0 0 22px #ffffff44, 0 0 0 2px #1e1e1e, var(--neon-white-glow);
            object-fit: cover; flex-shrink: 0; background: #1a1a1a;
        }
        .speech-bubble {
            flex: 1; background: #1c1c1c; border: 2px solid #777777;
            border-radius: 6px; padding: 12px; position: relative;
            color: #d5d5d5; font-size: 17px; min-height: 80px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .speech-bubble::before {
            content: ''; position: absolute; left: -12px; top: 20px;
            border-width: 8px 12px 8px 0; border-style: solid;
            border-color: transparent #77777788 transparent transparent;
        }
        .segment-image {
            width: 100%; border-radius: 3px; max-height: 200px;
            object-fit: cover; background: #1a1a1a; border: 1px solid #555555; display: none;
        }
        .segment-image.loading {
            display: block; height: 120px; background: #202020;
            display: flex; align-items: center; justify-content: center;
            color: #777777; font-size: 14px; animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .segment-image.visible { display: block; }
        .segment-text { flex: 1; line-height: 1.4; }
        .story-poster-container {
            position: relative; display: block; width: 100%; max-height: 240px;
            overflow: hidden; border-radius: 3px; border: 2px solid #777777;
            box-shadow: 0 0 20px #ffffff22, inset 0 0 30px rgba(8,8,8,0.55);
            flex-shrink: 0; background: #1a1a1a;
        }
        .story-poster-container .segment-image {
            display: block; width: 100%; max-height: 240px;
            object-fit: cover; border: none; border-radius: 1px;
        }
        .story-poster-container::after {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(6,6,6,0.88) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute; top: 8px; left: 0; right: 0; text-align: center;
            z-index: 5; pointer-events: none; font-family: var(--font-title);
            font-size: 13px; letter-spacing: 3px; color: #f0f0f0;
            text-shadow: 0 0 10px #ffffffbb, 0 0 30px #ffffff55, 0 2px 4px #000000, 0 0 60px #ffffff22;
            text-transform: uppercase; line-height: 1.2;
            background: linear-gradient(to bottom, rgba(8,8,8,0.9) 0%, rgba(8,8,8,0.7) 40%, transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute; bottom: 10px; left: 8px; right: 8px; text-align: center;
            z-index: 5; pointer-events: none; font-family: var(--font-display);
            font-size: 15px; letter-spacing: 1.5px; color: #e8e8e8;
            text-shadow: 0 0 8px #ffffff77, 0 0 20px #ffffff33, 0 2px 4px #000000;
            background: linear-gradient(to top, rgba(10,10,10,0.9) 0%, rgba(10,10,10,0.6) 50%, transparent 100%);
            padding: 10px 8px 6px; line-height: 1.3;
        }
        .story-poster-container.no-image { display: none; }
        .story-poster-container.loading {
            height: 140px; display: flex; align-items: center; justify-content: center;
            color: #777777; font-size: 14px; animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title { display: none; }
        @media (max-width:480px) {
            .story-poster-container { max-height: 180px; }
            .poster-overlay-theater { font-size: 10px; letter-spacing: 2px; top: 4px; padding: 4px 8px 8px; }
            .poster-overlay-title { font-size: 12px; bottom: 6px; padding: 8px 6px 4px; }
        }
        .tv-guide { margin-top: 15px; border-top: 2px solid #666666; padding-top: 10px; }
        .tv-guide h3 {
            font-family: var(--font-display); color: #e0e0e0;
            letter-spacing: 2px; margin-bottom: 8px; font-size: 18px;
            text-shadow: 0 0 10px #ffffff33;
        }
        .guide-entry {
            display: flex; justify-content: space-between; align-items: center;
            background: #1e1e1e; border: 1px solid #666666; padding: 10px;
            margin-bottom: 6px; border-radius: 3px; gap: 8px; flex-wrap: wrap;
        }
        .guide-time { font-family: var(--font-mono); font-size: 14px; color: #999999; min-width: 50px; }
        .guide-info { flex: 1; min-width: 100px; }
        .guide-title { font-size: 16px; color: #d5d5d5; }
        .guide-desc { font-size: 15px; color: #777777; }
        .guide-btn { padding: 6px 12px; font-size: 14px; min-height: 32px; flex-shrink: 0; }
        .guide-actions { display: flex; gap: 4px; align-items: center; }
        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(4,4,4,0.94); align-items: center; justify-content: center; padding: 12px;
        }
        .modal-content {
            background: #1e1e1e; border-radius: 5px; width: 100%; max-width: 420px;
            padding: 20px; text-align: center; border: 3px solid #888888;
            box-shadow: var(--border-glow), 0 0 80px #000000dd; color: #cccccc;
            max-height: 85vh; overflow-y: auto; font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #222222; border: 2px solid #66666666; padding: 10px 18px;
            border-radius: 3px; margin: 5px; cursor: pointer; color: #cccccc;
            font-family: var(--font-body); font-size: var(--text-size-base); letter-spacing: 1px; min-height: var(--btn-min-height);
        }
        .modal-btn:active { border-color: #aaaaaa; box-shadow: 0 0 14px #ffffff44; }
        .loading-text { color: #999999; font-style: italic; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .footer-strip {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 12px; background: #111111; border-top: 1px solid #4a4a4a44;
            z-index: 10; font-family: var(--font-mono); font-size: 11px; color: #5a5a5a; flex-shrink: 0;
        }
        .footer-strip span { color: #6a6a6a; letter-spacing: 0.5px; }
        .footer-strip button {
            background: none; border: 1px solid #333333; color: #6a6a6a; font-size: 10px;
            cursor: pointer; padding: 4px 8px; border-radius: 2px; font-family: var(--font-mono);
        }
        .footer-strip button:hover { border-color: #5a5a5a; color: #999999; }
        .typewriter-cursor {
            display: inline-block; width: 2px; height: 1.2em; background: #cccccc; margin-left: 2px;
            animation: blink 0.8s step-end infinite; vertical-align: text-bottom;
        }
        .back-btn { margin-top: 8px; align-self: flex-end; }
        @media (max-width:480px) {
            .tv-stage-row { flex-direction: column; align-items: center; }
            .speech-bubble::before { display: none; }
            .host-portrait { width: 80px; height: 80px; border-radius: 3px; }
            .guide-entry { flex-direction: column; align-items: stretch; }
            .guide-time { text-align: left; }
            .segment-image { max-height: 150px; }
        }
        .score-indicator {
            font-family: var(--font-mono); font-size: 10px; color: #999999; letter-spacing: 1px;
            padding: 3px 8px; border: 1px solid #4a4a4a; border-radius: 2px; display: inline-block;
            background: #111111; margin-top: 4px;
        }
        .score-indicator .active { color: #dddddd; }
        .score-indicator .dim { color: #555555; }
        .progress-bar {
            width: 100%; height: 2px; background: #222222; border-radius: 2px; margin-top: 6px; overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%; background: #aaaaaa; border-radius: 2px; transition: width 0.3s; box-shadow: 0 0 10px #ffffff44;
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">THE ASYLUM · CRT-87</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE<br />ASYLUM</div>
                    <div class="marquee-sub">⏤ 1987 · CASE FILES ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channelPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🔲 THE ASYLUM · SANITY MUST BE PERFORMED, OBSERVED, AND JUDGED</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('the_asylum_key') || '';

            const DEFAULT_STATE = {
                episodes: [],
                currentPerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>🏥 The Attending Physician</h2>
        <p style="text-align:left;">
            <strong>Institution:</strong> <em>Ward C · Secure Psychiatric Hospital</em><br>
            <strong>Bio:</strong> Every evening, the Chief of Psychiatry reviews case files in the dim light of the observation room. These are the stories of those sentenced not to prison, but to the asylum — where sanity itself becomes the sentence. The recordings are for internal review only. They are not meant to leave the institution. But somehow, they always do.
        </p>
    `;

            // ═══════════════════════════════════════
            // 🎹 80s FILM SOUNDTRACK ENGINE (PSYCHOLOGICAL THRILLER)
            // ═══════════════════════════════════════
            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let stringAmbientActive = null;
            let crossfadeTimeout = null;
            let tapeWarbleNode = null;
            let masterCompressor = null;

            let patternPlayerActive = null;
            let patternPlayerTimeout = null;
            let patternStep = 0;
            let patternBPM = 55;
            let currentScorePattern = null;
            let fillActive = false;
            let barsInPattern = 0;
            let barsBeforeFill = 6;

            let sectionThemeScore = null;

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.0005;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    initTapeWarble(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.32;
                    masterCompressor = audioCtx.createDynamicsCompressor();
                    masterCompressor.threshold.value = -24;
                    masterCompressor.knee.value = 28;
                    masterCompressor.ratio.value = 10;
                    masterCompressor.attack.value = 0.004;
                    masterCompressor.release.value = 0.3;
                    reverbNode.connect(masterGain);
                    masterGain.connect(masterCompressor);
                    masterCompressor.connect(audioCtx.destination);
                    if (tapeWarbleNode) tapeWarbleNode.connect(masterGain.gain);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 0.8;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.5;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                }
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 3.5;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 1.2));
                        const lateDecay = Math.exp(-i / (sampleRate * 3.0)) * 0.25;
                        left[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                        right[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            function initTapeWarble(ctx) {
                if (tapeWarbleNode) return;
                tapeWarbleNode = ctx.createGain();
                tapeWarbleNode.gain.value = 0;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.18;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 0.01;
                const lfo2 = ctx.createOscillator();
                lfo2.type = 'sine';
                lfo2.frequency.value = 0.27;
                const lfo2Gain = ctx.createGain();
                lfo2Gain.gain.value = 0.007;
                lfo.connect(lfoGain);
                lfo2.connect(lfo2Gain);
                lfoGain.connect(tapeWarbleNode.gain);
                lfo2Gain.connect(tapeWarbleNode.gain);
                lfo.start(0);
                lfo2.start(0);
                tapeWarbleNode._lfos = [lfo, lfo2];
            }

            // ── 80s SYNTH FUNCTIONS ──
            function create80sPad(ctx, rootFreq, duration, intensity = 0.5, voiceCount = 6) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.12, now + 2.0);
                gainNode.gain.setValueAtTime(intensity * 0.12, now + duration - 2.5);
                gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1.5);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500 + intensity * 400;
                filter.Q.value = 1.5;
                const filterLfo = ctx.createOscillator();
                filterLfo.type = 'sine';
                filterLfo.frequency.value = 0.05;
                const filterLfoGain = ctx.createGain();
                filterLfoGain.gain.value = 100;
                filterLfo.connect(filterLfoGain);
                filterLfoGain.connect(filter.frequency);
                const allOscs = [];
                const detunes = [0.997, 1.0, 1.003, 1.006, 0.994, 1.008];
                for (let i = 0; i < voiceCount; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i < 3 ? 'sawtooth' : 'triangle';
                    osc.frequency.value = rootFreq * detunes[i];
                    const vibrato = ctx.createOscillator();
                    vibrato.type = 'sine';
                    vibrato.frequency.value = 3.5 + Math.random() * 4;
                    const vibratoGain = ctx.createGain();
                    vibratoGain.gain.value = 1.2 + Math.random() * 3;
                    vibrato.connect(vibratoGain);
                    vibratoGain.connect(osc.frequency);
                    allOscs.push(osc, vibrato);
                    osc.connect(filter);
                }
                filter.connect(gainNode);
                const drySend = ctx.createGain(); drySend.gain.value = 0.4;
                const wetSend = ctx.createGain(); wetSend.gain.value = 0.65;
                gainNode.connect(drySend); gainNode.connect(wetSend);
                drySend.connect(dryGain); wetSend.connect(wetGain);
                allOscs.forEach(o => { o.start(now); o.stop(now + duration + 2); });
                filterLfo.start(now); filterLfo.stop(now + duration + 2);
            }

            function create80sBass(ctx, semitone, intensity = 0.5, duration = 2.0, rootFreq = 40) {
                const now = ctx.currentTime;
                const freq = rootFreq * Math.pow(2, semitone / 12);
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.45, now + 0.06);
                gainNode.gain.setValueAtTime(intensity * 0.4, now + duration - 0.4);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.5);
                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq * 0.97, now);
                osc.frequency.exponentialRampToValueAtTime(freq, now + 0.12);
                const subOsc = ctx.createOscillator();
                subOsc.type = 'sine'; subOsc.frequency.value = freq * 0.5;
                const subGain = ctx.createGain(); subGain.gain.value = 0.16 * intensity;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(180 + semitone * 7, now);
                filter.frequency.exponentialRampToValueAtTime(90 + semitone * 3, now + duration);
                filter.Q.value = 3.0;
                osc.connect(filter); subOsc.connect(subGain); subGain.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain(); wetSend.gain.value = 0.5;
                gainNode.connect(wetSend); wetSend.connect(wetGain); gainNode.connect(dryGain);
                osc.start(now); subOsc.start(now);
                osc.stop(now + duration + 0.6); subOsc.stop(now + duration + 0.6);
            }

            function create80sKick(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 1.0, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(140, now);
                osc.frequency.exponentialRampToValueAtTime(38, now + 0.18);
                const clickOsc = ctx.createOscillator();
                clickOsc.type = 'square'; clickOsc.frequency.value = 700;
                const clickGain = ctx.createGain();
                clickGain.gain.setValueAtTime(intensity * 0.06, now);
                clickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.015);
                clickOsc.connect(clickGain);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.value = 180; filter.Q.value = 1.0;
                osc.connect(filter); clickGain.connect(filter); filter.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start(now); clickOsc.start(now);
                osc.stop(now + 0.35); clickOsc.stop(now + 0.02);
            }

            function create80sSnare(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 0.8, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
                const bufferSize = ctx.sampleRate * 0.12;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    const env = Math.exp(-i / (ctx.sampleRate * 0.04));
                    data[i] = (Math.random() * 2 - 1) * env * 0.65;
                }
                const noise = ctx.createBufferSource(); noise.buffer = buffer;
                const osc = ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(190, now);
                osc.frequency.exponentialRampToValueAtTime(95, now + 0.1);
                const oscGain = ctx.createGain(); oscGain.gain.value = 0.28 * intensity;
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass'; filter.frequency.value = 330; filter.Q.value = 0.7;
                noise.connect(filter); osc.connect(oscGain); oscGain.connect(filter);
                filter.connect(gainNode); gainNode.connect(ctx.destination);
                noise.start(now); osc.start(now);
                noise.stop(now + 0.15); osc.stop(now + 0.15);
            }

            function create80sHat(ctx, intensity = 0.3) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.07);
                const bufferSize = ctx.sampleRate * 0.03;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    const env = Math.exp(-i / (ctx.sampleRate * 0.012));
                    data[i] = (Math.random() * 2 - 1) * env * 0.4;
                }
                const noise = ctx.createBufferSource(); noise.buffer = buffer;
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass'; filter.frequency.value = 5500; filter.Q.value = 0.4;
                noise.connect(filter); filter.connect(gainNode); gainNode.connect(ctx.destination);
                noise.start(now); noise.stop(now + 0.09);
            }

            function create80sStab(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.3, now + 0.04);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
                const oscs = [];
                const freqs = [100, 150, 200, 300];
                freqs.forEach(f => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth'; osc.frequency.value = f;
                    oscs.push(osc);
                });
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(350, now);
                filter.frequency.exponentialRampToValueAtTime(1100, now + 0.6);
                filter.frequency.exponentialRampToValueAtTime(180, now + 1.5);
                filter.Q.value = 2;
                oscs.forEach(o => o.connect(filter));
                filter.connect(gainNode);
                const wetSend = ctx.createGain(); wetSend.gain.value = 0.5;
                gainNode.connect(wetSend); wetSend.connect(wetGain); gainNode.connect(dryGain);
                oscs.forEach(o => { o.start(now); o.stop(now + 2); });
            }

            function create80sSwell(ctx, targetFreq, duration, intensity = 0.55) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0.001, now);
                gainNode.gain.exponentialRampToValueAtTime(intensity * 0.25, now + duration * 0.5);
                gainNode.gain.setValueAtTime(intensity * 0.25, now + duration * 0.65);
                gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(90, now);
                filter.frequency.exponentialRampToValueAtTime(1800, now + duration * 0.55);
                filter.Q.value = 2.5;
                const oscs = [];
                const intervals = [0, 7, 12, 19];
                intervals.forEach(interval => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = targetFreq * Math.pow(2, interval / 12);
                    osc.frequency.setValueAtTime(targetFreq * Math.pow(2, interval / 12) * 0.96, now);
                    osc.frequency.exponentialRampToValueAtTime(targetFreq * Math.pow(2, interval / 12), now + duration);
                    oscs.push(osc);
                    osc.connect(filter);
                });
                filter.connect(gainNode);
                const wetSend = ctx.createGain(); wetSend.gain.value = 0.65;
                gainNode.connect(wetSend); wetSend.connect(wetGain); gainNode.connect(dryGain);
                oscs.forEach(o => { o.start(now); o.stop(now + duration + 1.5); });
            }

            function create80sArpeggio(ctx, rootFreq, pattern, intensity = 0.4, stepDuration = 0.15) {
                const now = ctx.currentTime;
                const totalDuration = pattern.length * stepDuration;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 0.18, now);
                gainNode.gain.setValueAtTime(intensity * 0.18, now + totalDuration - 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + totalDuration + 0.2);
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass'; filter.frequency.value = 700; filter.Q.value = 3;
                const osc = ctx.createOscillator();
                osc.type = 'square'; osc.frequency.value = rootFreq;
                const freqSeq = pattern.map(s => rootFreq * Math.pow(2, s / 12));
                let stepIdx = 0;
                const stepInterval = setInterval(() => {
                    if (stepIdx < freqSeq.length && gainNode.gain.value > 0.001) {
                        osc.frequency.setValueAtTime(freqSeq[stepIdx], audioCtx.currentTime);
                        stepIdx++;
                    } else { clearInterval(stepInterval); }
                }, stepDuration * 1000);
                osc.connect(filter); filter.connect(gainNode);
                const wetSend = ctx.createGain(); wetSend.gain.value = 0.55;
                gainNode.connect(wetSend); wetSend.connect(wetGain); gainNode.connect(dryGain);
                osc.start(now); osc.stop(now + totalDuration + 0.3);
            }

            function create80sBell(ctx, frequency, intensity = 0.4) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.3, now + 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 3.5);
                const osc = ctx.createOscillator();
                osc.type = 'sine'; osc.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sine'; osc2.frequency.value = frequency * 2.76;
                const osc2Gain = ctx.createGain(); osc2Gain.gain.value = 0.18;
                osc2.connect(osc2Gain);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.value = 550; filter.Q.value = 2;
                osc.connect(filter); osc2Gain.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain(); wetSend.gain.value = 0.6;
                gainNode.connect(wetSend); wetSend.connect(wetGain); gainNode.connect(dryGain);
                osc.start(now); osc2.start(now);
                osc.stop(now + 3.5); osc2.stop(now + 3.5);
            }

            function create80sLeadWhine(ctx, frequency, duration, intensity = 0.45) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.18, now + 0.6);
                gainNode.gain.setValueAtTime(intensity * 0.18, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 0.8);
                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(frequency * 0.95, now);
                osc.frequency.exponentialRampToValueAtTime(frequency, now + 0.5);
                const vibrato = ctx.createOscillator();
                vibrato.type = 'sine'; vibrato.frequency.value = 5.5;
                const vibratoGain = ctx.createGain(); vibratoGain.gain.value = 7;
                vibrato.connect(vibratoGain); vibratoGain.connect(osc.frequency);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.value = 800; filter.Q.value = 3;
                osc.connect(filter); filter.connect(gainNode);
                const wetSend = ctx.createGain(); wetSend.gain.value = 0.55;
                gainNode.connect(wetSend); wetSend.connect(wetGain); gainNode.connect(dryGain);
                osc.start(now); vibrato.start(now);
                osc.stop(now + duration + 1); vibrato.stop(now + duration + 1);
            }

            function create80sHeartbeat(ctx, intensity = 0.5) {
                create80sKick(ctx, 0.55 * intensity);
                setTimeout(() => create80sKick(ctx, 0.55 * intensity), 220);
            }

            function create80sDissonantCluster(ctx, rootFreq, intensity = 0.35) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.15, now + 1.2);
                gainNode.gain.exponentialRampToValueAtTime(0.0005, now + 5);
                const semitones = [0, 1, 6, 7, 11, 13];
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.value = 300; filter.Q.value = 1.5;
                semitones.forEach(st => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = rootFreq * Math.pow(2, st / 12);
                    osc.connect(filter);
                    osc.start(now); osc.stop(now + 5.5);
                });
                filter.connect(gainNode);
                const wetSend = ctx.createGain(); wetSend.gain.value = 0.6;
                gainNode.connect(wetSend); wetSend.connect(wetGain); gainNode.connect(dryGain);
            }

            // ── PATTERN PLAYER (AI-DRIVEN ONLY, NO FALLBACKS) ──
            function startPatternPlayer(scorePattern, bpm, rootFreq = 40) {
                stopPatternPlayer();
                if (!scorePattern || !Array.isArray(scorePattern.bass) || !Array.isArray(scorePattern.kick)) {
                    console.warn('No AI score pattern provided — drums and bass silent.');
                    return;
                }
                currentScorePattern = scorePattern;
                patternBPM = bpm || 55;
                patternStep = 0;
                barsInPattern = 0;
                barsBeforeFill = 5 + Math.floor(Math.random() * 5);
                fillActive = false;
                patternPlayerActive = { active: true };

                const stepDuration = 60 / patternBPM / 4;
                function playStep() {
                    if (!patternPlayerActive || !patternPlayerActive.active || !currentScorePattern) return;
                    const step = patternStep % 16;
                    const pat = currentScorePattern;
                    const isFillStep = fillActive;

                    let bassSemitone = 0;
                    if (isFillStep) {
                        bassSemitone = (step % 4 === 0) ? 0 : (step % 8 === 4 ? 7 : (step % 4 === 2 ? 5 : 0));
                    } else {
                        if (pat.bass && pat.bass[step] !== undefined) bassSemitone = pat.bass[step];
                    }
                    if (bassSemitone !== 0 && pat.bass) {
                        const dur = isFillStep ? 0.2 : 1.6;
                        const inten = isFillStep ? 0.3 : 0.45;
                        create80sBass(audioCtx, bassSemitone, inten, dur, rootFreq);
                    }

                    let kickVal = 0;
                    if (isFillStep) kickVal = (step % 4 === 0) ? 1 : 0;
                    else if (pat.kick && pat.kick[step] !== undefined) kickVal = pat.kick[step];
                    if (kickVal === 1) create80sKick(audioCtx, isFillStep ? 0.7 : 0.55);

                    let snareVal = 0;
                    if (isFillStep) snareVal = (step % 8 === 4) ? 1 : 0;
                    else if (pat.snare && pat.snare[step] !== undefined) snareVal = pat.snare[step];
                    if (snareVal === 1) create80sSnare(audioCtx, isFillStep ? 0.65 : 0.45);

                    let hatVal = 0;
                    if (isFillStep) hatVal = (step % 2 === 0) ? 1 : 0;
                    else if (pat.hat && pat.hat[step] !== undefined) hatVal = pat.hat[step];
                    if (hatVal === 1 && Math.random() < 0.6) create80sHat(audioCtx, isFillStep ? 0.3 : 0.16);

                    patternStep++;
                    if (patternStep % 16 === 0) {
                        barsInPattern++;
                        if (barsInPattern >= barsBeforeFill && !fillActive && Math.random() < 0.4) {
                            fillActive = true;
                            const fillSteps = 8;
                            let fillCount = 0;
                            const fillInterval = setInterval(() => {
                                if (!patternPlayerActive || !patternPlayerActive.active) { clearInterval(fillInterval); return; }
                                const fStep = fillCount % 16;
                                if (fStep % 4 === 0) create80sKick(audioCtx, 0.6);
                                if (fStep % 8 === 4) create80sSnare(audioCtx, 0.55);
                                if (fStep % 2 === 0) create80sHat(audioCtx, 0.2);
                                fillCount++;
                                if (fillCount >= fillSteps) {
                                    clearInterval(fillInterval);
                                    fillActive = false;
                                    barsInPattern = 0;
                                    barsBeforeFill = 5 + Math.floor(Math.random() * 6);
                                    create80sStab(audioCtx, 0.2);
                                }
                            }, stepDuration * 1000);
                            const nextTime = stepDuration * 1000 * fillSteps;
                            setTimeout(() => {
                                if (patternPlayerActive && patternPlayerActive.active) {
                                    patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
                                }
                            }, nextTime);
                            return;
                        }
                        if (barsInPattern >= barsBeforeFill + 2) {
                            barsInPattern = 0;
                            barsBeforeFill = 5 + Math.floor(Math.random() * 5);
                        }
                    }
                    patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
                }
                patternPlayerTimeout = setTimeout(playStep, 60);
            }

            function stopPatternPlayer() {
                if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout); patternPlayerTimeout = null; }
                if (patternPlayerActive) { patternPlayerActive.active = false; patternPlayerActive = null; }
                patternStep = 0;
                currentScorePattern = null;
                barsInPattern = 0;
                fillActive = false;
            }

            // ── MAIN PLAY SOUND ──
            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    switch (type) {
                        case 'synth_pad': create80sPad(ctx, 45 + Math.random() * 35, 14 + Math.random() * 18, intensity); break;
                        case 'synth_stab': create80sStab(ctx, intensity); break;
                        case 'bass_pulse': create80sBass(ctx, Math.floor(Math.random() * 12), intensity, 1.5 + Math.random() * 2, 40); break;
                        case 'arp_rise': create80sArpeggio(ctx, 40 + Math.random() * 28, [0, 4, 7, 12, 16, 19, 24], intensity, 0.12 + Math.random() * 0.1); break;
                        case 'arp_fall': create80sArpeggio(ctx, 38 + Math.random() * 22, [24, 19, 16, 12, 7, 4, 0], intensity, 0.12 + Math.random() * 0.1); break;
                        case 'kick': create80sKick(ctx, intensity); break;
                        case 'snare': create80sSnare(ctx, intensity); break;
                        case 'hat': create80sHat(ctx, intensity * 0.5); break;
                        case 'bell': create80sBell(ctx, 50 + Math.random() * 45, intensity); break;
                        case 'swell': create80sSwell(ctx, 40 + Math.random() * 40, 6 + Math.random() * 10, intensity); break;
                        case 'sting': create80sStab(ctx, intensity); break;
                        case 'heartbeat': create80sHeartbeat(ctx, intensity); break;
                        case 'lead_whine': create80sLeadWhine(ctx, 55 + Math.random() * 70, 4 + Math.random() * 8, intensity); break;
                        case 'thump': create80sKick(ctx, intensity); setTimeout(() => create80sKick(ctx, intensity * 0.7), 200); break;
                        case 'dissonant': create80sDissonantCluster(ctx, 55 + Math.random() * 40, intensity); break;
                    }
                } catch (err) { console.error('Sound error:', err); }
            }

            // ── AMBIENT ──
            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.16, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'institution_drone' || type === 'ward_hum' || type === 'ambient_drone') {
                        const bufferSize = ctx.sampleRate * 1.5;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.3;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'institution_drone' ? 140 : 380;
                        filter.Q.value = 0.3;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'institution_drone' ? 55 : 80;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.1 * intensity;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 65;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) {
                    console.error('Ambient error:', err);
                }
            }

            function stopAmbient() {
                if (ambientGain && audioCtx) {
                    const now = audioCtx.currentTime;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect(); ambientGain = null; }
                    }, 500);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout); ambientTimeout = null; }
            }

            // ── 80s AMBIENT THEMES ──
            const AMBIENT_80S_THEMES = {
                sentence: { rootFreq: 44, detuneSpread: 12, filterBase: 120, intensity: 0.24, padType: 'tense' },
                admission: { rootFreq: 48, detuneSpread: 10, filterBase: 140, intensity: 0.26, padType: 'warm' },
                routine: { rootFreq: 50, detuneSpread: 11, filterBase: 150, intensity: 0.28, padType: 'lush' },
                disruption: { rootFreq: 46, detuneSpread: 16, filterBase: 110, intensity: 0.36, padType: 'tense' },
                revelation: { rootFreq: 52, detuneSpread: 18, filterBase: 105, intensity: 0.42, padType: 'dark' },
                aftermath: { rootFreq: 42, detuneSpread: 8, filterBase: 155, intensity: 0.18, padType: 'warm' },
            };

            function start80sAmbient(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                const theme = AMBIENT_80S_THEMES[themeName] || AMBIENT_80S_THEMES.sentence;
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(theme.intensity * 0.14, now + 1.5);
                const oscs = [];
                for (let i = 0; i < 4; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i < 2 ? 'sawtooth' : 'triangle';
                    const detune = (i - 1.5) * theme.detuneSpread;
                    osc.frequency.value = theme.rootFreq * Math.pow(2, detune / 1200);
                    oscs.push(osc);
                }
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = theme.filterBase;
                filter.Q.value = 2.2;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.06;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 60;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                oscs.forEach(o => o.connect(filter));
                filter.connect(gainNode);
                const wetSend = ctx.createGain(); wetSend.gain.value = 0.55;
                gainNode.connect(wetSend); wetSend.connect(wetGain); gainNode.connect(dryGain);
                oscs.forEach(o => o.start(now));
                lfo.start(now);
                sectionAmbientActive = {
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.6);
                        oscs.forEach(s => { try { s.stop(ctx.currentTime + 0.8); } catch (e) {} });
                        try { lfo.stop(ctx.currentTime + 0.8); } catch (e) {}
                        sectionAmbientActive = null;
                    }
                };
                startStringLayer80s(theme);
                if (sectionThemeScore && sectionThemeScore[themeName]) {
                    const sc = sectionThemeScore[themeName];
                    startPatternPlayer(sc, sc.bpm || 55, 40);
                }
            }

            function startStringLayer80s(theme) {
                if (!audioCtx) return;
                stopStringAmbient();
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const freq = theme.rootFreq || 48;
                const intensity = theme.intensity || 0.2;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.14, now + 1.8);
                const allNodes = [];
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 450;
                filter.Q.value = 1.8;
                const padType = theme.padType || 'warm';
                const voiceCount = padType === 'dark' ? 8 : 6;
                const detunes = padType === 'dark' ?
                    [0.995, 1.0, 1.004, 1.007, 0.993, 1.009, 1.002, 0.997] :
                    [0.997, 1.0, 1.003, 1.006, 0.994, 1.008];
                for (let i = 0; i < voiceCount; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i < Math.floor(voiceCount / 2) ? 'sawtooth' : 'triangle';
                    osc.frequency.value = freq * detunes[i];
                    const vib = ctx.createOscillator();
                    vib.type = 'sine';
                    vib.frequency.value = 3 + i * 0.7;
                    const vibG = ctx.createGain();
                    vibG.gain.value = 1.5 + i * 0.4;
                    vib.connect(vibG);
                    vibG.connect(osc.frequency);
                    allNodes.push(osc, vib);
                    osc.connect(filter);
                }
                filter.connect(gainNode);
                const wetSend = ctx.createGain(); wetSend.gain.value = 0.6;
                gainNode.connect(wetSend); wetSend.connect(wetGain); gainNode.connect(dryGain);
                allNodes.forEach(n => { n.start(now); });
                stringAmbientActive = {
                    nodes: allNodes,
                    gainNode: gainNode,
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.8);
                        allNodes.forEach(n => { try { n.stop(ctx.currentTime + 1); } catch (e) {} });
                    }
                };
            }

            function stopStringAmbient() {
                if (stringAmbientActive) {
                    stringAmbientActive.stop();
                    stringAmbientActive = null;
                }
            }

            function transitionSectionTheme(themeName, scoreData) {

            function stopSectionAmbient() {

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 35000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9, max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) { const errText = await res.text(); throw new Error(`API error ${res.status}: ${errText}`); }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') throw new Error('Request timed out.');
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', 1980s psychiatric hospital, institutional grey, fluorescent lighting, cinematic film grain, stephen king aesthetic, psychological thriller')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true; reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true; clearTimeout(timeout); resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true; clearTimeout(timeout); reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) { try { return await generateImage(prompt); } catch (e) { lastError = e; await new Promise(r => setTimeout(r, 20)); } }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) { element.textContent += text.charAt(i); if (onChar) onChar(i); i++; }
                        else { clearInterval(timer); resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'];
                let voice = null;
                for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.56;
                utterance.pitch = 0.86;
                speechSynthesis.speak(utterance);
            }

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.56;
                    utterance.pitch = voiceConfig.pitch || 0.86;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) { currentChar = nextChar; element.textContent = text.substring(0, currentChar); if (cueChecker) cueChecker(currentChar); }
                    };
                    utterance.onend = () => { element.textContent = text; if (cueChecker) cueChecker(text.length); resolve(); };
                    utterance.onerror = (e) => { console.warn('TTS error:', e); element.textContent = text; resolve(); };
                    speechSynthesis.speak(utterance);
                });
            }

            // ── STORY GENERATION (THE ASYLUM PREMISE) ──
            async function generateNewStory() {
                const system = `You are the Chief of Psychiatry at a secure psychiatric hospital in the late 1980s, reviewing case files for internal records. Each case follows a defendant sentenced to psychiatric confinement instead of prison.`;
                const prompt = `Write a 900-1100 word psychological thriller set in a secure psychiatric hospital during the late 1980s. Follow this exact structure:

        PART ONE — THE SENTENCE: The story begins in a courtroom. The trial is over. The verdict has already been delivered. The judge sentences the defendant to psychiatric confinement rather than prison. The defendant leaves the courtroom. Whether they deserved the sentence remains uncertain.

        PART TWO — ADMISSION: The patient arrives. Personal possessions confiscated. Uniform issued. Photographs taken. Medical examination. Patient number assigned. The head psychiatrist explains: "Your release will depend on your progress—not your sentence." The patient realizes there is no guaranteed release date.

        PART THREE — LIFE INSIDE: Daily routine becomes reality. Medication. Meals. Therapy. Everything is documented. Everything is watched. The patient learns the institution is observing constantly.

        Then introduce ONE major disruption: a violent new patient, a betrayal, devastating visitor news, medication changes, staff manipulation, an escape attempt, a death, a riot, a parole review, a romance, a suicide, a murder, a confession, or a corruption scandal.

        Include at least one VISITOR scene where new information changes everything.

        Rules:
        - NO supernatural elements whatsoever. The horror is entirely human and institutional.
        - The asylum is NOT automatically evil. The doctors are NOT automatically villains. The patient is NOT automatically innocent.
        - The patient may be guilty, innocent, sane, or mentally ill — the audience is never told the complete truth at the beginning.
        - The ending must include a TWIST that changes the audience's understanding of everything: the patient was guilty, innocent, manipulated, imagined parts of the story, chose to stay, was released too late, escaped to nothing, won freedom but lost identity, etc.
        - Final scene: a clinical observation note or a staff member's quiet remark that reveals the deeper truth.

        Return ONLY valid JSON:
        {"title": string (patient case file title), "story": string (use \\n for line breaks), "closing_remark": string (a clinical observation or staff remark that reveals the twist)}.
        No markdown.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user', content: prompt }], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) throw new Error('Invalid story structure.');
                let imageUrl = null;
                try {
                    const imagePrompt = `Psychological thriller case file titled "${story.title}", 1980s psychiatric hospital, institutional grey corridors, fluorescent lighting, stephen king aesthetic, clinical horror`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate case file image:', e); }
                gameState.currentPerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
