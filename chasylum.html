            // ─── Story & Score Generation ────────────────────────────

            async function generateNewAsylumStory() {
                const system =
                    `You are Dr. Alistair Gray, a forensic psychiatrist who hosts The Asylum — an anthology series set in a 1980s state psychiatric hospital where defendants are sentenced instead of prison. You narrate brutal, psychological stories of human breakdown and institutional survival.`;
                const prompt =
                    `Write an 900 to 1100 word story for The Asylum. Set in the 1980s. A defendant has been sentenced to psychiatric confinement after a criminal trial. The story follows their admission, daily routine, and a disruptive event that forces them to make a difficult choice. The story explores one central question: what does it truly mean to be sane inside an institution where every emotion is interpreted? The story should have a Stephen King meets Hitchcock brutal, psychological style. NO supernatural elements. No ghosts, curses, magic, or dreams. The horror must be purely human — psychological, visceral, grounded. Frame the story with Dr. Gray's clinical intro and a cold, knowing closing remark. Return ONLY valid JSON: title, story (use \\n for line breaks), closing_remark. Output raw JSON only.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user', content: prompt }],
                    3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) throw new Error('Invalid story structure');
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Film still for an episode titled "${story.title}", 1980s psychiatric hospital, grim corridor, institutional lighting, gritty 35mm, patient in uniform`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate poster:', e); }
                gameState.currentPerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system =
                    `You are a sound designer for an 80s film soundtrack. You compose synth-driven, atmospheric scores in the style of John Carpenter, Tangerine Dream, and Vangelis. Given a short story, return JSON with THREE keys:
- "sections": array of 5-7 sections dividing the story into emotional acts. Each has "theme" (one of: intro, admission, routine, conflict, revelation, consequences, closing), "start_char" (inclusive), "end_char" (exclusive). Cover entire story from 0 to ${length}.
- "cues": array of sound events using types: "synth_lead", "synth_bass", "synth_sting", "pulse", "bell", "climax", "industrial_hum", "pad", "kick", "snare", "hat", "drum_fill", "arp". Include at least 40 cues spread evenly.
- "score": object with keys matching theme names. Each key: "bpm" (50-90), "bass" (array of 8 integers 0-24), "kick" (array of 8 integers 0/1), "snare" (array of 8 integers 0/1), "hat" (array of 8 integers 0/1).
Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and 80s synth score patterns.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user', content: userPrompt }],
                    4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try { data = JSON.parse(cleaned); } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) { const candidate = match[0].replace(/,\s*([}\]])/g, '$1'); try { data = JSON.parse(
                            candidate); } catch (e2) { throw new Error('Failed to parse AI soundtrack JSON.'); } } else
                        throw new Error('No JSON found in AI response.');
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                    throw new Error('Missing sections, cues, or score in AI response');
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0) sortedSections[0].start_char = 0;
                if (sortedSections[sortedSections.length - 1].end_char < length) sortedSections[sortedSections.length -
                1].end_char = length;
                const cues = data.cues.map(c => ({
                    type: c.type,
                    position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7
                }));

                const requiredThemes = ['intro', 'admission', 'routine', 'conflict', 'revelation', 'consequences',
                    'closing'
                ];
                const score = {};

                function normalizeArray(arr, maxVal = 24) {
                    if (!Array.isArray(arr)) throw new Error('Expected array, got ' + typeof arr);
                    let clean = arr.map(v => { const num = Number(v); return isNaN(num) ? 0 : Math.min(maxVal, Math
                            .max(0, Math.round(num))); });
                    if (clean.length < 8) { while (clean.length < 8) clean.push(0); } else if (clean.length > 8) { clean =
                            clean.slice(0, 8); }
                    return clean;
                }

                for (const theme of requiredThemes) {
                    if (!data.score[theme]) throw new Error(
                        `AI did not provide a score for theme "${theme}". Cannot continue.`);
                    const s = data.score[theme];
                    if (typeof s.bpm !== 'number' || s.bpm < 35 || s.bpm > 120) throw new Error(
                        `Invalid bpm for theme "${theme}": ${s.bpm}`);
                    const bass = normalizeArray(s.bass, 24);
                    const kick = normalizeArray(s.kick, 1);
                    const snare = normalizeArray(s.snare, 1);
                    const hat = normalizeArray(s.hat, 1);
                    score[theme] = { bpm: s.bpm, bass, kick, snare, hat };
                }
                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {
                await generateNewAsylumStory();
                if (!gameState.currentPerformance) throw new Error('Failed to generate story');
                const soundtrack = await generateSoundCueSheet(gameState.currentPerformance.rawStoryText);
                gameState.currentPerformance.soundCues = soundtrack;
                saveState();
                await startAsylumPerformance();
            }

            // ─── Performance Engine ──────────────────────────────────

            async function startAsylumPerformance() {
                speechSynthesis.cancel();
                if (window.asTimeout) clearTimeout(window.asTimeout);
                const storyData = gameState.currentPerformance;
                if (!storyData || !storyData.story) { await generateNewAsylumStory(); return startAsylumPerformance(); }
                await getAudioContext();

                let sectionList = null,
                    cueList = null,
                    scoreData = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) {
                        cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                    } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                        sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                        scoreData = storyData.soundCues.score;
                    }
                }
                const bubble = document.getElementById('asSpeechBubble');
                const dialogue = document.getElementById('asDialogue');
                const imageEl = document.getElementById('asSegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('asGuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#ffffff44';
                bubble.style.boxShadow = '0 0 30px #ffffff18, 0 0 50px #ffffff0a';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('asBackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('asAddEpisodeBtn');
                if (oldAdd) oldAdd.remove();
                const posterContainer = document.getElementById('asPosterContainer');
                const posterTitle = document.getElementById('asPosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) posterTitle.textContent = storyData.title || '';
                } else if (posterContainer) posterContainer.classList.add('no-image');

                const intro =
                    `"The state has sentenced you to observation. Your sanity is now a performance — and we are the critics. I'm Dr. Gray. Tonight's case: '${storyData.title}'. A defendant enters the system. The question isn't whether they're guilty. It's whether they'll survive."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 48);
                await new Promise(r => setTimeout(r, 1500));

                let indicatorInterval = setInterval(() => {
                    if (patternPlayerActive) {
                        const theme = patternPlayerActive.theme || 'intro';
                        const varIdx = currentVariationIdx;
                        const varName = currentSectionPatterns[varIdx] ? currentSectionPatterns[varIdx].name : 'A';
                        const bar = barsInVariation + 1;
                        updateScoreIndicator(theme, varName, bar);
                    } else {
                        updateScoreIndicator('...', '—', 0);
                    }
                }, 1000);

                if (sectionList && sectionList.length > 0) {
                    transitionSectionTheme(sectionList[0].theme, scoreData);
                } else if (scoreData) {
                    transitionSectionTheme('intro', scoreData);
                }

                const storyText = storyData.rawStoryText || storyData.story;
                if (!storyText) {
                    console.warn('No story text');
                    await showClosingAndFinish(storyData, dialogue, indicatorInterval);
                    return;
                }

                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b.start_char) : [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) {
                                currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme, scoreData);
                            }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) {
                                triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity);
                            }
                            cueIdx++;
                        }
                    };
                }

                dialogue.textContent = '';
                const typingPromise = typewriterEffect(dialogue, storyText, 30, cueChecker);
                const speechPromise = speakTextMale(storyText);
                await speechPromise;
                await typingPromise;
                await showClosingAndFinish(storyData, dialogue, indicatorInterval);
            }

            async function showClosingAndFinish(storyData, dialogue, indicatorInterval) {
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#cccccc';
                dialogue.appendChild(closingLine);
                const closingSpeech = speakTextMale(closing);
                const closingTyping = typewriterEffect(closingLine, closing, 42);
                await Promise.all([closingSpeech, closingTyping]);
                await new Promise(r => setTimeout(r, 1000));

                const curtainText = document.createElement('p');
                curtainText.textContent = '— Case closed —';
                stopSynthBed();
                stopPatternPlayer();
                clearInterval(indicatorInterval);
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                curtainText.style.color = '#666666';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);

                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Back to Asylum';
                leaveBtn.addEventListener('click', () => { leaveAsylum(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'asAddEpisodeBtn';
                addBtn.textContent = '📁 Save Case';
                addBtn.addEventListener('click', () => { addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Saved'; });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.currentPerformance;
                if (!perf) return;
                gameState.episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
                saveState();
                setTimeout(() => leaveAsylum(), 600);
            }

            function leaveAsylum() {
                stopSynthBed();
                stopPatternPlayer();
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                renderAsylumPanel();
            }

            // ─── Init ──────────────────────────────────────────────────

            function init() {
                loadState();
                renderAsylumPanel();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) { apiKey = key;
                        localStorage.setItem('asylum_key', key); }
                });
                document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e
                        .currentTarget) closeModal(); });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) showModal(HOST_BIO);
                });
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
                if (!apiKey) setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                document.addEventListener('click', () => { getAudioContext().catch(() => {}); }, { once: true });
            }
            init();
        })();
    </script>
</body>
</html>
