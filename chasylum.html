<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover" />
    <title>THE ASYLUM · 1986 · AI SCORE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Special+Elite&family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&family=Audiowide&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #000000;
            --screen-bg: #050505;
            --panel-bg: #080808;
            --text: #eeeeee;
            --text-dim: #666666;
            --text-bright: #ffffff;
            --neon-white: #ffffff;
            --neon-white-glow: 0 0 6px #ffffff66, 0 0 18px #ffffff33, 0 0 36px #ffffff18;
            --neon-white-subtle: 0 0 4px #ffffff44, 0 0 12px #ffffff22;
            --border: #222222;
            --border-glow: 0 0 10px #ffffff33, 0 0 24px #ffffff18;
            --danger: #ff2244;
            --danger-glow: 0 0 12px #ff224466;
            --amber: #ffaa22;
            --amber-dim: #442200;
            --gold: #ffcc44;
            --gold-dim: #332200;
            --green: #22cc66;
            --input-bg: #0a0a0a;
            --button-bg: #0e0e0e;
            --button-hover: #1a1a1a;
            --button-active: #080808;
            --bevel-light: #1e1e1e;
            --bevel-dark: #000000;
            --font-display: 'Orbitron', 'Audiowide', sans-serif;
            --font-title: 'Audiowide', 'Orbitron', sans-serif;
            --font-mono: 'Share Tech Mono', 'Rajdhani', 'Courier New', monospace;
            --font-body: 'VT323', 'Rajdhani', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 24px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { font-size:var(--text-size-base); -webkit-text-size-adjust:100%; }
        body {
            background:#000; display:flex; justify-content:center; align-items:center;
            min-height:100vh; min-height:100dvh; font-family:var(--font-body);
            padding:0; background:#000; overflow-x:hidden; margin:0; color:var(--text);
        }
        .monitor-bezel {
            width:100%; max-width:540px; height:100vh; height:100dvh; max-height:920px;
            background:#070707; border-radius:10px; padding:10px;
            box-shadow:inset 0 0 0 3px #1a1a1a,0 0 0 4px #050505,0 0 0 8px #020202,0 8px 48px #000000dd,0 0 40px #ffffff08,0 0 80px #ffffff04;
            display:flex; flex-direction:column; position:relative; border:1px solid #1a1a1a;
        }
        @media (max-width:540px) { .monitor-bezel { border-radius:0; padding:4px; max-height:100vh; box-shadow:none; background:#030303; border:none; } }
        .power-led {
            position:absolute; bottom:18px; right:22px; width:8px; height:8px;
            background:#ffffff; border-radius:50%;
            box-shadow:0 0 10px #ffffffcc,0 0 22px #ffffff55,0 0 40px #ffffff22;
            animation:powerGlow 2.4s ease-in-out infinite; z-index:20;
        }
        @keyframes powerGlow { 0%,100%{box-shadow:0 0 10px #ffffffcc,0 0 22px #ffffff55;} 50%{box-shadow:0 0 18px #ffffffee,0 0 36px #ffffff88,0 0 50px #ffffff33;} }
        .brand-label { position:absolute; bottom:15px; left:20px; font-family:var(--font-mono); font-size:9px; color:#3a3a3a; letter-spacing:2.5px; z-index:20; text-transform:uppercase; }
        .game-shell {
            flex:1; width:100%; background:var(--screen-bg); border-radius:3px;
            border:3px solid #1a1a1a; box-shadow:var(--border-glow),inset 0 0 90px rgba(0,0,0,0.55);
            display:flex; flex-direction:column; overflow:hidden; position:relative;
        }
        @media (max-width:540px) { .game-shell { border-radius:0; border-width:2px; } }
        .screen-curve { position:absolute; inset:0; pointer-events:none; z-index:899; border-radius:1px; box-shadow:inset 0 0 70px rgba(0,0,0,0.7),inset 0 0 12px rgba(0,0,0,0.45); }
        .crt-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:900;
            background:repeating-linear-gradient(0deg,rgba(0,0,0,var(--scanline-opacity)) 0px,rgba(0,0,0,var(--scanline-opacity)) 2px,transparent 2px,transparent 5px);

        }
        .crt-overlay::after { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(ellipse at center,transparent 38%,rgba(0,0,0,0.65) 100%); border-radius:1px; }
        .screen-flicker { animation:crtFlicker 9s ease-in-out infinite; }
        @keyframes crtFlicker { 0%,99.3%,100%{opacity:1} 99.4%{opacity:0.6} 99.5%{opacity:0.9} 99.6%{opacity:0.45} 99.7%{opacity:1} }
        .marquee {
            position:relative; z-index:10; background:#030303; border-bottom:2px solid #ffffff33;
            padding:10px 16px; text-align:center; font-family:var(--font-display); letter-spacing:2px;
            box-shadow:0 2px 20px #000000aa,inset 0 1px 0 #0a0a0a; flex-shrink:0;
        }
        .marquee-inner {
            border:2px solid #1a1a1a; border-radius:2px; padding:10px 14px; background:#010101;
            position:relative; box-shadow:inset 0 0 24px #ffffff08,0 0 16px #ffffff08;
        }
        .marquee-inner::before { content:''; position:absolute; top:-2px; left:16px; right:16px; height:2px; background:#ffffff; box-shadow:0 0 14px #ffffffaa,0 0 30px #ffffff44; }
        .marquee-inner::after { content:''; position:absolute; bottom:-2px; left:16px; right:16px; height:1px; background:#ffffff44; box-shadow:0 0 8px #ffffff44; }
        .marquee-title { font-size:var(--text-size-title); color:#ffffff; text-shadow:0 0 20px #ffffff88,0 0 40px #ffffff44,0 2px 4px #000,0 0 60px #ffffff22; letter-spacing:3px; font-family:var(--font-title); line-height:1.2; }
        .marquee-sub { font-family:var(--font-mono); font-size:11px; color:#888888; letter-spacing:5px; margin-top:3px; text-shadow:0 0 6px #ffffff33; }
        @media (max-width:400px) { .marquee-title { font-size:18px; letter-spacing:1px; } }
        .game-area {
            flex:1; overflow-y:auto; overflow-x:hidden; z-index:5;
            scrollbar-width:thin; scrollbar-color:#1a1a1a #050505;

        .game-area::-webkit-scrollbar { width:5px; }
        .game-area::-webkit-scrollbar-track { background:#050505; }

        .panel { display:flex; flex-direction:column; padding:10px; gap:10px; flex:1; }
        .btn {
            background:var(--button-bg); border:2px solid #1e1e1e; border-top-color:#2a2a2a; border-left-color:#262626;

        .btn.accent { background:#0a0a0a; border-color:#2a2a2a; border-top-color:#3a3a3a; border-left-color:#333333; border-right-color:#1a1a1a; border-bottom-color:#0a0a0a; color:#ffffff; box-shadow:0 2px 0 #00000044,0 0 12px #ffffff22; text-shadow:0 0 8px #ffffff66; }
        .btn.accent:active { border-top-color:#1a1a1a; border-left-color:#1a1a1a; border-bottom-color:#3a3a3a; border-right-color:#333333; box-shadow:0 0px 0 #00000044,0 0 20px #ffffff44; }
        .btn.accent2 { background:#0a0a0a; border-color:#2a1a1a; border-top-color:#3a2222; border-left-color:#331d1d; border-right-color:#1a0e0e; border-bottom-color:#0a0606; color:#ffdddd; box-shadow:0 2px 0 #00000044,0 0 12px #ff224422; text-shadow:0 0 8px #ff224466; }
        .btn.accent2:active { border-top-color:#1a0e0e; border-left-color:#1a0e0e; border-bottom-color:#3a2222; border-right-color:#331d1d; box-shadow:0 0px 0 #00000044,0 0 20px #ff224466; }

        .segment-image { width:100%; border-radius:3px; max-height:200px; object-fit:cover; background:#080808; border:1px solid #1a1a1a; display:none; }
        .segment-image.loading { display:block; height:120px; background:#0e0e0e; display:flex; align-items:center; justify-content:center; color:#666; font-size:14px; animation:pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
        .segment-image.visible { display:block; }
        .segment-text { flex:1; line-height:1.4; }
        .story-poster-container {
            position:relative; display:block; width:100%; max-height:240px; overflow:hidden;
            border-radius:3px; border:2px solid #1a1a1a;
            box-shadow:0 0 20px #ffffff22,0 0 30px #ffffff0a,inset 0 0 30px rgba(0,0,0,0.5);
            flex-shrink:0; background:#080808;
        }
        .story-poster-container .segment-image { display:block; width:100%; max-height:240px; object-fit:cover; border:none; border-radius:1px; }
        .story-poster-container::after { content:''; position:absolute; inset:0; pointer-events:none; background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.8) 100%); z-index:2; }
        .poster-overlay-theater { position:absolute; top:8px; left:0; right:0; text-align:center; z-index:5; pointer-events:none; font-family:var(--font-title); font-size:13px; letter-spacing:3px; color:#ffffff; text-shadow:0 0 10px #ffffffcc,0 0 30px #ffffff66,0 2px 4px #000000,0 0 60px #ffffff22; text-transform:uppercase; line-height:1.2; background:linear-gradient(to bottom,rgba(0,0,0,0.9) 0%,rgba(0,0,0,0.7) 40%,transparent 100%); padding:6px 12px 10px; }
        .poster-overlay-title { position:absolute; bottom:10px; left:8px; right:8px; text-align:center; z-index:5; pointer-events:none; font-family:var(--font-display); font-size:14px; letter-spacing:1.5px; color:#ffddcc; text-shadow:0 0 8px #ffaa4488,0 0 20px #ff224466,0 2px 4px #000000; background:linear-gradient(to top,rgba(0,0,0,0.9) 0%,rgba(0,0,0,0.6) 50%,transparent 100%); padding:10px 8px 6px; line-height:1.3; }
        .story-poster-container.no-image { display:none; }
        .story-poster-container.loading { height:140px; display:flex; align-items:center; justify-content:center; color:#666; font-size:14px; animation:pulse 1.5s ease-in-out infinite; }
        .story-poster-container.loading .segment-image, .story-poster-container.loading .poster-overlay-theater, .story-poster-container.loading .poster-overlay-title { display:none; }
        @media (max-width:480px) {
            .story-poster-container { max-height:180px; }
            .poster-overlay-theater { font-size:10px; letter-spacing:2px; top:4px; padding:4px 8px 8px; }
            .poster-overlay-title { font-size:11px; bottom:6px; padding:8px 6px 4px; }
        }
        .tv-guide { margin-top:15px; border-top:2px solid #1a1a1a; padding-top:10px; }
        .tv-guide h3 { font-family:var(--font-display); color:#cccccc; letter-spacing:2px; margin-bottom:8px; font-size:16px; text-shadow:0 0 10px #ffffff33; }
        .guide-entry { display:flex; justify-content:space-between; align-items:center; background:#060608; border:1px solid #1a1a1a; padding:10px; margin-bottom:6px; border-radius:3px; gap:8px; flex-wrap:wrap; }
        .guide-time { font-family:var(--font-mono); font-size:14px; color:#ffffff; min-width:50px; text-shadow:0 0 6px #ffffff44; }
        .guide-info { flex:1; min-width:100px; }
        .guide-title { font-size:16px; color:#dddddd; }
        .guide-desc { font-size:14px; color:#666666; }
        .guide-btn { padding:6px 12px; font-size:14px; min-height:32px; flex-shrink:0; }
        .guide-actions { display:flex; gap:4px; align-items:center; }
        .modal { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.96); align-items:center; justify-content:center; padding:12px; }
        .modal-content { background:#08080a; border-radius:5px; width:100%; max-width:420px; padding:20px; text-align:center; border:3px solid #1a1a1a; box-shadow:0 0 40px #ffffff0a,0 0 80px #000000dd; color:#cccccc; max-height:85vh; overflow-y:auto; font-size:var(--text-size-base); }
        .modal-btn { background:#0e0e0e; border:2px solid #1a1a1a88; padding:10px 18px; border-radius:3px; margin:5px; cursor:pointer; color:#cccccc; font-family:var(--font-body); font-size:var(--text-size-base); letter-spacing:1px; min-height:var(--btn-min-height); }
        .modal-btn:active { border-color:#ffffff; box-shadow:0 0 14px #ffffff44; }
        .loading-text { color:#ffaa22; font-style:italic; }
        .blink { animation:blink 1s infinite; }
        @keyframes blink { 50%{opacity:0} }
        .footer-strip { display:flex; justify-content:space-between; align-items:center; padding:6px 12px; background:#010103; border-top:1px solid #1a1a1a44; z-index:10; font-family:var(--font-mono); font-size:11px; color:#3a3a3a; flex-shrink:0; }
        .footer-strip span { color:#4a4a4a; letter-spacing:0.5px; }
        .footer-strip button { background:none; border:1px solid #141414; color:#4a4a4a; font-size:10px; cursor:pointer; padding:4px 8px; border-radius:2px; font-family:var(--font-mono); }
        .footer-strip button:hover { border-color:#3a3a3a; color:#6a6a6a; }
        .typewriter-cursor { display:inline-block; width:2px; height:1.2em; background:#d0d0d0; margin-left:2px; animation:blink 0.8s step-end infinite; vertical-align:text-bottom; }
        .back-btn { margin-top:8px; align-self:flex-end; }
        @media (max-width:480px) {
            .tv-stage-row { flex-direction:column; align-items:center; }
            .speech-bubble::before { display:none; }
            .host-portrait { width:80px; height:80px; border-radius:3px; }
            .guide-entry { flex-direction:column; align-items:stretch; }
            .guide-time { text-align:left; }
            .segment-image { max-height:150px; }
        }
        .score-indicator {
            font-family:var(--font-mono); font-size:10px; color:#888888; letter-spacing:1px;
            padding:3px 8px; border:1px solid #1a2a2a; border-radius:2px; display:inline-block;
            background:#060608; margin-top:4px;
        }
        .score-indicator .active { color:#ffffff; }
        .score-indicator .dim { color:#3a4a4a; }
        .progress-bar { width:100%; height:2px; background:#1a1a1a; border-radius:2px; margin-top:6px; overflow:hidden; }
        .progress-bar .fill { height:100%; background:#ffffff; border-radius:2px; transition:width 0.3s; box-shadow:0 0 10px #ffffff44; }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">THE ASYLUM · VHS-86</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE ASYLUM</div>
                    <div class="marquee-sub">⏤ SENTENCE · OBSERVATION · JUDGMENT ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="asylumPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🏥 THE ASYLUM · NOW PLAYING · 1986</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('asylum_key') || '';

            const DEFAULT_STATE = { episodes: [], currentPerformance: null, imageCooldownUntil: 0 };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
            <h2>🏥 Dr. Alistair Gray</h2>
            <p style="text-align:left;">
                <strong>Show:</strong> <em>The Asylum</em><br>
                <strong>Bio:</strong> A forensic psychiatrist who spent fifteen years inside the state hospital system. Dr. Gray now hosts this anthology series from his dimly lit office, introducing stories of defendants sentenced to psychiatric confinement — and the thin line between sanity and madness.
            </p>
          `;

            // ─── AUDIO ENGINE ─── 80s FILM SCORE STYLE ──────────────
            let audioCtx = null;
            let ambientSource = null,
                ambientGain = null,
                ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null,
                masterGain = null,
                dryGain = null,
                wetGain = null;
            let sectionAmbientActive = null,
                synthAmbientActive = null;
            let crossfadeTimeout = null,
                tapeWarbleNode = null,
                masterCompressor = null;

            let patternPlayerActive = null,
                patternPlayerTimeout = null;
            let patternStep = 0,
                patternBPM = 60;
            let currentSectionPatterns = [];
            let currentVariationIdx = 0,
                barsInVariation = 0;
            let fillActive = false;
            let sectionThemeScore = null;

            function expandPattern(arr) {
                if (!Array.isArray(arr)) { arr = [0, 0, 0, 0, 0, 0, 0, 0]; }
                arr = arr.map(x => typeof x === 'number' ? x : 0);
                return arr.flatMap(x => [x, x]);
            }

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.0005;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            function ensureAudioNodes(ctx) {
                if (!masterGain) {
                    masterGain = ctx.createGain();
                    masterGain.gain.value = 0.24;
                    masterCompressor = ctx.createDynamicsCompressor();
                    masterCompressor.threshold.value = -24;
                    masterCompressor.knee.value = 24;
                    masterCompressor.ratio.value = 8;
                    masterCompressor.attack.value = 0.003;
                    masterCompressor.release.value = 0.25;
                    masterGain.connect(masterCompressor);
                    masterCompressor.connect(ctx.destination);
                }
                if (!dryGain) {
                    dryGain = ctx.createGain();
                    dryGain.gain.value = 0.80;
                    dryGain.connect(masterGain);
                }
                if (!wetGain) {
                    wetGain = ctx.createGain();
                    wetGain.gain.value = 0.55;
                    if (reverbNode) wetGain.connect(reverbNode);
                    else wetGain.connect(masterGain);
                }
                if (!reverbNode) { initReverb(ctx); if (reverbNode) wetGain.connect(reverbNode); }
                if (tapeWarbleNode) tapeWarbleNode.connect(masterGain.gain);
            }

            async function getAudioContext() {
                try {
                    if (!audioCtx) {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                        createKeepAlive(audioCtx);
                        initReverb(audioCtx);
                        initTapeWarble(audioCtx);
                        ensureAudioNodes(audioCtx);
                    }
                    if (audioCtx.state === 'suspended') await audioCtx.resume();
                    ensureAudioNodes(audioCtx);
                    return audioCtx;
                } catch (err) { console.error('Audio context error:', err); throw err; }
            }

            function initReverb(ctx) {
                if (reverbNode) return;
                try {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 3.8;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.8));
                        const lateDecay = Math.exp(-i / (sampleRate * 2.2)) * 0.25;
                        left[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                        right[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                    if (masterGain) reverbNode.connect(masterGain);
                } catch (err) { console.warn('Reverb init error:', err);
                    reverbNode = ctx.createGain();
                    reverbNode.gain.value = 0.4; if (masterGain) reverbNode.connect(masterGain); }
            }

            function initTapeWarble(ctx) {
                if (tapeWarbleNode) return;
                try {
                    tapeWarbleNode = ctx.createGain();
                    tapeWarbleNode.gain.value = 0;
                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.12;
                    const lfoGain = ctx.createGain();
                    lfoGain.gain.value = 0.010;
                    const lfo2 = ctx.createOscillator();
                    lfo2.type = 'sine';
                    lfo2.frequency.value = 0.19;
                    const lfo2Gain = ctx.createGain();
                    lfo2Gain.gain.value = 0.006;
                    lfo.connect(lfoGain);
                    lfo2.connect(lfo2Gain);
                    lfoGain.connect(tapeWarbleNode.gain);
                    lfo2Gain.connect(tapeWarbleNode.gain);
                    lfo.start(0);
                    lfo2.start(0);
                    tapeWarbleNode._lfos = [lfo, lfo2];
                } catch (err) { console.warn('Tape warble init error:', err); }
            }

            // ─── 80s SYNTH SOUNDS ──────────────────────────────────────

            function createSynthPad80s(ctx, rootFreq, duration, intensity = 0.5, voiceCount = 6) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.18, now + 2.0);
                    gainNode.gain.setValueAtTime(intensity * 0.18, now + duration - 2.5);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1.2);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(180 + intensity * 300, now);
                    filter.frequency.exponentialRampToValueAtTime(400 + intensity * 500, now + duration * 0.6);
                    filter.Q.value = 1.2;
                    const filterEnv = ctx.createGain();
                    filterEnv.gain.setValueAtTime(0.6, now);
                    filterEnv.gain.exponentialRampToValueAtTime(0.8, now + duration * 0.5);
                    const allOscs = [];
                    const detunes = [0, 2, 4, -2, -4, 6];
                    for (let i = 0; i < voiceCount && i < detunes.length; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = i < 3 ? 'sawtooth' : 'square';
                        const detune = detunes[i] || 0;
                        osc.frequency.value = rootFreq * Math.pow(2, detune / 1200);
                        const vibrato = ctx.createOscillator();
                        vibrato.type = 'sine';
                        vibrato.frequency.value = 3.0 + i * 0.8;
                        const vibratoGain = ctx.createGain();
                        vibratoGain.gain.value = 2.0 + i * 0.5;
                        vibrato.connect(vibratoGain);
                        vibratoGain.connect(osc.frequency);
                        allOscs.push(osc, vibrato);
                        osc.connect(filter);
                    }
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.60;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    allOscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1.5); });
                    return { gainNode, wetSend, allOscs };
                } catch (err) { console.warn('Synth pad error:', err); return null; }
            }

            function createSynthLead80s(ctx, frequency, duration, intensity = 0.6, portamento = false) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.35, now + 0.08);
                    gainNode.gain.exponentialRampToValueAtTime(intensity * 0.25, now + duration * 0.7);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.3);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(frequency * 0.95, now);
                    if (portamento) {
                        osc.frequency.linearRampToValueAtTime(frequency, now + 0.2);
                    } else {
                        osc.frequency.setValueAtTime(frequency, now);
                    }
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'square';
                    osc2.frequency.value = frequency * 2.01;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.10 * intensity;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(600, now);
                    filter.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
                    filter.frequency.exponentialRampToValueAtTime(400, now + duration);
                    filter.Q.value = 2.0;
                    const chorus = ctx.createGain();
                    chorus.gain.value = 0.3;
                    const oscChorus = ctx.createOscillator();
                    oscChorus.type = 'sine';
                    oscChorus.frequency.value = 2.8;
                    const chorusGain = ctx.createGain();
                    chorusGain.gain.value = 6;
                    oscChorus.connect(chorusGain);
                    chorusGain.connect(osc.frequency);
                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.50;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    oscChorus.start(now);
                    osc.stop(now + duration + 0.4);
                    osc2.stop(now + duration + 0.4);
                    oscChorus.stop(now + duration + 0.4);
                } catch (err) { console.warn('Synth lead error:', err); }
            }

            function createSynthBass80s(ctx, semitone, intensity = 0.5, duration = 2.0, rootFreq = 40) {
                try {
                    const now = ctx.currentTime;
                    const freq = rootFreq * Math.pow(2, semitone / 12);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.28, now + 0.04);
                    gainNode.gain.setValueAtTime(intensity * 0.28, now + duration - 0.3);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.3);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq * 0.96, now);
                    osc.frequency.exponentialRampToValueAtTime(freq, now + 0.1);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'square';
                    osc2.frequency.value = freq * 2;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.06 * intensity;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(150 + semitone * 5, now);
                    filter.frequency.exponentialRampToValueAtTime(80 + semitone * 3, now + duration);
                    filter.Q.value = 2.0;
                    const filterLfo = ctx.createOscillator();
                    filterLfo.type = 'sine';
                    filterLfo.frequency.value = 2.5 + semitone * 0.2;
                    const filterLfoGain = ctx.createGain();
                    filterLfoGain.gain.value = 20 + semitone * 2;
                    filterLfo.connect(filterLfoGain);
                    filterLfoGain.connect(filter.frequency);
                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.45;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    filterLfo.start(now);
                    osc.stop(now + duration + 0.4);
                    osc2.stop(now + duration + 0.4);
                    filterLfo.stop(now + duration + 0.4);
                } catch (err) { console.warn('Synth bass error:', err); }
            }

            function createArpeggio80s(ctx, rootFreq, duration, intensity = 0.5, pattern = 'up') {
                try {
                    const now = ctx.currentTime;
                    const notes = pattern === 'up' ? [0, 4, 7, 12] : [0, 3, 7, 10];
                    const stepTime = 0.12;
                    const totalSteps = Math.floor(duration / stepTime);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.15, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.2);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.setValueAtTime(800 + intensity * 400, now);
                    filter.frequency.exponentialRampToValueAtTime(400, now + duration);
                    filter.Q.value = 3;
                    const oscs = [];
                    for (let i = 0; i < totalSteps; i++) {
                        const t = now + i * stepTime;
                        if (t > now + duration) break;
                        const noteIdx = i % notes.length;
                        const freq = rootFreq * Math.pow(2, notes[noteIdx] / 12);
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = freq;
                        const oscGain = ctx.createGain();
                        const env = Math.exp(-i * 0.03) * 0.6 + 0.4;
                        oscGain.gain.setValueAtTime(intensity * 0.12 * env, t);
                        oscGain.gain.exponentialRampToValueAtTime(0.001, t + stepTime * 0.8);
                        osc.connect(oscGain);
                        oscGain.connect(filter);
                        osc.start(t);
                        osc.stop(t + stepTime * 0.9);
                        oscs.push(osc);
                    }
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.55;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                } catch (err) { console.warn('Arpeggio error:', err); }
            }

            function createSynthSting80s(ctx, intensity = 0.6) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.3, now + 0.02);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(120, now);
                    osc.frequency.exponentialRampToValueAtTime(400, now + 0.15);
                    osc.frequency.exponentialRampToValueAtTime(80, now + 1.5);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'square';
                    osc2.frequency.setValueAtTime(240, now);
                    osc2.frequency.exponentialRampToValueAtTime(800, now + 0.12);
                    osc2.frequency.exponentialRampToValueAtTime(160, now + 1.5);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(300, now);
                    filter.frequency.exponentialRampToValueAtTime(800, now + 0.2);
                    filter.frequency.exponentialRampToValueAtTime(200, now + 1.5);
                    filter.Q.value = 1.8;
                    osc.connect(filter);
                    osc2.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.55;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + 2);
                    osc2.stop(now + 2);
                } catch (err) { console.warn('Sting error:', err); }
            }

            function createBell80s(ctx, frequency, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.4, now + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 3.5);
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = frequency;
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'sine';
                    osc2.frequency.value = frequency * 2.01;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.25;
                    const osc3 = ctx.createOscillator();
                    osc3.type = 'sine';
                    osc3.frequency.value = frequency * 4.02;
                    const osc3Gain = ctx.createGain();
                    osc3Gain.gain.value = 0.08;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 2000;
                    filter.Q.value = 1.5;
                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    osc3.connect(osc3Gain);
                    osc3Gain.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.50;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc3.start(now);
                    osc.stop(now + 4);
                    osc2.stop(now + 4);
                    osc3.stop(now + 4);
                } catch (err) { console.warn('Bell error:', err); }
            }

            function createDrumFill80s(ctx, intensity = 0.6) {
                try {
                    const now = ctx.currentTime;
                    for (let i = 0; i < 8; i++) {
                        const t = now + i * 0.08;
                        if (i % 2 === 0) {
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(intensity * 0.5 * (1 - i * 0.05), t);
                            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(180 - i * 5, t);
                            osc.frequency.exponentialRampToValueAtTime(40, t + 0.06);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 200;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(t);
                            osc.stop(t + 0.1);
                        } else {
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(intensity * 0.3 * (1 - i * 0.06), t);
                            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
                            const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
                            const data = buf.getChannelData(0);
                            for (let j = 0; j < data.length; j++) { data[j] = (Math.random() * 2 - 1) * Math.exp(-j / (
                                    ctx.sampleRate * 0.015)); }
                            const noise = ctx.createBufferSource();
                            noise.buffer = buf;
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'bandpass';
                            filter.frequency.value = 400 - i * 20;
                            filter.Q.value = 0.6;
                            noise.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            noise.start(t);
                            noise.stop(t + 0.08);
                        }
                    }
                } catch (err) { console.warn('Drum fill error:', err); }
            }

            // ─── Kick / Snare / Hat (80s drum machine style) ────────

            function createKick80s(ctx, intensity = 0.6) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.8, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(35, now + 0.12);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 160;
                    filter.Q.value = 1.0;
                    osc.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.25);
                } catch (err) { console.warn('Kick error:', err); }
            }

            function createSnare80s(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.6, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.06, ctx.sampleRate);
                    const data = buf.getChannelData(0);
                    for (let i = 0; i < data.length; i++) { data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx
                            .sampleRate * 0.02)); }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buf;
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(80, now + 0.06);
                    const oscGain = ctx.createGain();
                    oscGain.gain.value = 0.15 * intensity;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 280;
                    filter.Q.value = 0.7;
                    noise.connect(filter);
                    osc.connect(oscGain);
                    oscGain.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    osc.start(now);
                    noise.stop(now + 0.1);
                    osc.stop(now + 0.1);
                } catch (err) { console.warn('Snare error:', err); }
            }

            function createHat80s(ctx, intensity = 0.3) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.4, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.02, ctx.sampleRate);
                    const data = buf.getChannelData(0);
                    for (let i = 0; i < data.length; i++) { data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx
                            .sampleRate * 0.008)); }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buf;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.value = 6000;
                    filter.Q.value = 0.5;
                    noise.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    noise.stop(now + 0.06);
                } catch (err) { console.warn('Hat error:', err); }
            }

            function createSynthPulse80s(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    const osc = ctx.createOscillator();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(80, now);
                    osc.frequency.exponentialRampToValueAtTime(120, now + 0.1);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'sawtooth';
                    osc2.frequency.value = 160;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.3;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(200, now);
                    filter.frequency.exponentialRampToValueAtTime(80, now + 0.4);
                    filter.Q.value = 1.0;
                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + 0.6);
                    osc2.stop(now + 0.6);
                } catch (err) { console.warn('Pulse error:', err); }
            }

            // ─── AI PATTERN PLAYER ─────────────────────────────────────

            function startEvolvingPatternPlayer(themeName, rootFreq = 40, scoreData = null) {
                stopPatternPlayer();
                if (!scoreData || !scoreData[themeName]) {
                    console.warn('No AI score data for theme:', themeName);
                    return;
                }
                const theme = scoreData[themeName];
                const bpm = theme.bpm || 60;
                const bass = expandPattern(theme.bass);
                const kick = expandPattern(theme.kick);
                const snare = expandPattern(theme.snare);
                const hat = expandPattern(theme.hat);

                const variations = [{
                    name: 'AI',
                    bars: 8,
                    bass: bass,
                    kick: kick,
                    snare: snare,
                    hat: hat
                }];

                currentSectionPatterns = variations;
                currentVariationIdx = 0;
                barsInVariation = 0;
                patternStep = 0;
                patternBPM = bpm;
                fillActive = false;
                patternPlayerActive = { active: true, theme: themeName };

                const stepDuration = 60 / bpm / 4;

                function getCurrentPattern() { return currentSectionPatterns[0]; }

                function playStep() {
                    if (!patternPlayerActive || !patternPlayerActive.active) return;
                    const ctx = audioCtx;
                    if (!ctx) { patternPlayerTimeout = setTimeout(playStep, 100); return; }
                    const step = patternStep % 16;
                    const current = getCurrentPattern();
                    const isFillStep = fillActive;

                    let bassSemitone = 0;
                    if (isFillStep) {
                        bassSemitone = (step % 4 === 0) ? 0 : (step % 8 === 4 ? 7 : 0);
                    } else {
                        bassSemitone = current.bass[step] || 0;
                    }
                    if (bassSemitone !== 0 || (isFillStep && step % 4 === 0)) {
                        const dur = isFillStep ? 0.2 : 1.6;
                        const inten = isFillStep ? 0.3 : 0.5 + (bassSemitone / 30);
                        createSynthBass80s(ctx, bassSemitone, inten, dur, rootFreq);
                    }

                    let kickVal = isFillStep ? (step % 4 === 0 ? 1 : 0) : (current.kick[step] || 0);
                    if (kickVal === 1) createKick80s(ctx, isFillStep ? 0.7 : 0.6);

                    let snareVal = isFillStep ? (step % 8 === 4 ? 1 : 0) : (current.snare[step] || 0);
                    if (snareVal === 1) createSnare80s(ctx, isFillStep ? 0.7 : 0.5);

                    let hatVal = isFillStep ? (step % 2 === 0 ? 1 : 0) : (current.hat[step] || 0);
                    if (hatVal === 1 && Math.random() < 0.7) createHat80s(ctx, isFillStep ? 0.4 : 0.2);

                    if (step % 8 === 0 && Math.random() < 0.15) {
                        const leadFreq = 60 + Math.random() * 40;
                        createSynthLead80s(ctx, leadFreq, 0.4 + Math.random() * 0.3, 0.4, true);
                    }
                    if (step % 16 === 0 && Math.random() < 0.2) {
                        createArpeggio80s(ctx, 50 + Math.random() * 30, 0.6, 0.3, Math.random() > 0.5 ? 'up' : 'down');
                    }

                    patternStep++;
                    if (patternStep % 16 === 0) {
                        barsInVariation++;
                        if (barsInVariation >= current.bars) barsInVariation = 0;
                        if (Math.random() < 0.12) fillActive = !fillActive;
                    }
                    patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
                }
                patternPlayerTimeout = setTimeout(playStep, 50);
            }

            function stopPatternPlayer() {
                if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout);
                    patternPlayerTimeout = null; }
                if (patternPlayerActive) { patternPlayerActive.active = false;
                    patternPlayerActive = null; }
                patternStep = 0;
                currentSectionPatterns = [];
                currentVariationIdx = 0;
                barsInVariation = 0;
                fillActive = false;
            }

            // ─── Ambient: 80s Synth Bed ──────────────────────────────

            const THEME_SYNTH_PARAMS = {
                intro: { rootFreq: 44, filterBase: 160, lfoRate: 0.04, intensity: 0.20, padVoices: 4, arpFreq: 55,
                    arpPattern: 'up' },
                admission: { rootFreq: 48, filterBase: 140, lfoRate: 0.06, intensity: 0.28, padVoices: 5, arpFreq: 60,
                    arpPattern: 'up' },
                routine: { rootFreq: 52, filterBase: 180, lfoRate: 0.05, intensity: 0.25, padVoices: 4, arpFreq: 58,
                    arpPattern: 'down' },
                conflict: { rootFreq: 46, filterBase: 120, lfoRate: 0.10, intensity: 0.40, padVoices: 6, arpFreq: 50,
                    arpPattern: 'up' },
                revelation: { rootFreq: 50, filterBase: 150, lfoRate: 0.08, intensity: 0.35, padVoices: 5, arpFreq: 62,
                    arpPattern: 'down' },
                consequences: { rootFreq: 42, filterBase: 130, lfoRate: 0.03, intensity: 0.18, padVoices: 4, arpFreq: 48,
                    arpPattern: 'up' },
                closing: { rootFreq: 40, filterBase: 160, lfoRate: 0.02, intensity: 0.15, padVoices: 3, arpFreq: 45,
                    arpPattern: 'down' }
            };

            function startSynthBed(themeName) {
                if (!audioCtx) return;
                stopSynthBed();
                const params = THEME_SYNTH_PARAMS[themeName] || THEME_SYNTH_PARAMS.intro;
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(params.intensity * 0.20, now + 2.0);

                const oscs = [];
                const detunes = [0, 5, 7, -5, -7, 12];
                for (let i = 0; i < Math.min(params.padVoices, detunes.length); i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i < 3 ? 'sawtooth' : 'square';
                    osc.frequency.value = params.rootFreq * Math.pow(2, detunes[i] / 1200);
                    const vib = ctx.createOscillator();
                    vib.type = 'sine';
                    vib.frequency.value = 2.0 + i * 0.7;
                    const vibG = ctx.createGain();
                    vibG.gain.value = 1.5 + i * 0.5;
                    vib.connect(vibG);
                    vibG.connect(osc.frequency);
                    oscs.push(osc, vib);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(params.filterBase + i * 20, now);
                    filter.frequency.exponentialRampToValueAtTime(params.filterBase + 100 + i * 30, now + 3);
                    filter.Q.value = 1.5;
                    osc.connect(filter);
                    filter.connect(gainNode);
                }

                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.55;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                oscs.forEach(o => o.start(now));

                if (params.arpFreq) {
                    setTimeout(() => {
                        createArpeggio80s(ctx, params.arpFreq, 2.5, 0.25, params.arpPattern || 'up');
                    }, 400);
                }

                synthAmbientActive = {
                    nodes: oscs,
                    gainNode,
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.8);
                        oscs.forEach(n => { try { n.stop(ctx.currentTime + 1.0); } catch (e) {} });
                        synthAmbientActive = null;
                    }
                };
                startEvolvingPatternPlayer(themeName, 40, sectionThemeScore);
            }

            function stopSynthBed() {
                if (synthAmbientActive) { synthAmbientActive.stop();
                    synthAmbientActive = null; }
                stopPatternPlayer();
                clearTimeout(crossfadeTimeout);
            }

            function transitionSectionTheme(themeName, scoreData) {
                if (scoreData) sectionThemeScore = scoreData;
                startSynthBed(themeName);
            }

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    if (!ctx) return;
                    switch (type) {
                        case 'pad':
                            createSynthPad80s(ctx, 50 + Math.random() * 30, 12 + Math.random() * 14, intensity);
                            break;
                        case 'sting':
                        case 'synth_sting':
                            createSynthSting80s(ctx, intensity);
                            break;
                        case 'pulse':
                        case 'heartbeat':
                            createSynthPulse80s(ctx, intensity);
                            setTimeout(() => createSynthPulse80s(ctx, intensity * 0.7), 220);
                            break;
                        case 'bell':
                            createBell80s(ctx, 60 + Math.random() * 30, intensity);
                            break;
                        case 'climax': {
                            const root = 40 + Math.random() * 20;
                            createSynthPad80s(ctx, root, 10 + Math.random() * 8, intensity * 0.5, 6);
                            setTimeout(() => createSynthLead80s(ctx, root * 2, 1.2, intensity * 0.6, true), 300);
                            setTimeout(() => createSynthLead80s(ctx, root * 3, 1.0, intensity * 0.4, true), 600);
                            setTimeout(() => createDrumFill80s(ctx, intensity * 0.5), 200);
                            break;
                        }
                        case 'industrial_hum':
                            createSynthPad80s(ctx, 35 + Math.random() * 15, 10 + Math.random() * 10, intensity * 0.3, 3);
                            break;
                        case 'synth_lead':
                            createSynthLead80s(ctx, 55 + Math.random() * 45, 1.0 + Math.random() * 0.8, intensity, true);
                            break;
                        case 'synth_bass':
                            createSynthBass80s(ctx, Math.floor(Math.random() * 12), intensity, 1.2 + Math.random() * 1.2,
                                40);
                            break;
                        case 'kick':
                            createKick80s(ctx, intensity);
                            break;
                        case 'snare':
                            createSnare80s(ctx, intensity);
                            break;
                        case 'hat':
                            createHat80s(ctx, intensity * 0.4);
                            break;
                        case 'drum_fill':
                            createDrumFill80s(ctx, intensity);
                            break;
                        case 'arp':
                            createArpeggio80s(ctx, 45 + Math.random() * 35, 0.8 + Math.random() * 0.6, intensity * 0.4,
                                Math.random() > 0.5 ? 'up' : 'down');
                            break;
                        default:
                            console.warn('Unknown sound type:', type);
                    }
                } catch (err) { console.warn('playSound error:', err); }
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 28000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.88, max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) { const errText = await res.text(); throw new Error(`API error ${res.status}: ${errText}`); }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') throw new Error('Request timed out. Please try again.');
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', 1980s psychiatric hospital, gritty 35mm film still, cinematic lighting, brutalist architecture')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e; await new Promise(r =>
                        setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else {
                            clearInterval(timer);
                            resolve();
                        }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                return new Promise((resolve, reject) => {
                    if (!text) { resolve(); return; }
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David',
                        'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = 0.58;
                    utterance.pitch = 0.85;
                    utterance.onend = () => resolve();
                    utterance.onerror = (e) => { console.warn('TTS error:', e);
                        resolve(); };
                    speechSynthesis.speak(utterance);
                });
            }
