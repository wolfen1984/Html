<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CASTLE OF THE DAMMED · NIGHTFALL GAMES 1984 · COMPANIONS & SECRETS</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f0f0f;
            background-image: radial-gradient(circle at 30% 30%, #2a1a1a 0%, #050505 90%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 20px;
            user-select: none;
            overflow: hidden;
        }

        /* ===== HANDHELD DEVICE SHELL - FIXED SIZE (bigger) ===== */
        .handheld {
            width: 100%;
            max-width: 900px;
            height: 95vh;
            max-height: 1000px;
            background: linear-gradient(165deg, #c8c8c8 0%, #8e8e8e 40%, #5a5a5a 100%);
            border-radius: 40px 40px 60px 60px;
            box-shadow:
                0 25px 50px rgba(0, 0, 0, 0.7),
                inset 0 3px 10px rgba(255, 255, 255, 0.5),
                inset 0 -6px 10px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            padding: 20px 20px 24px;
            border: 2px solid #555;
            position: relative;
            overflow: hidden;
        }

        .cartridge-slot {
            width: 100%;
            height: 20px;
            background: #222;
            border-radius: 6px;
            margin-bottom: 12px;
            box-shadow: inset 0 2px 6px black, 0 1px 0 rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .screen-bezel {
            flex: 1 1 auto;
            background: #0a0a0a;
            border-radius: 18px 18px 24px 24px;
            padding: 10px;
            box-shadow:
                inset 0 0 0 6px #1f1f1f,
                inset 0 0 20px rgba(0, 0, 0, 0.9),
                0 6px 15px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.15) 0px,
                rgba(0,0,0,0.15) 3px,
                transparent 3px,
                transparent 6px
            );
            pointer-events: none;
            z-index: 5;
            border-radius: 18px 18px 24px 24px;
        }

        .terminal {
            background: #020000;
            color: #ffffff;
            border: 3px solid #ff3b3b;
            box-shadow: inset 0 0 12px #ff1a1a, 0 0 8px #ff3b3b;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 10px 12px 8px;
            position: relative;
            z-index: 1;
            border-radius: 6px;
            overflow: hidden;
        }

        .header {
            border-bottom: 2px solid #ff3b3b;
            padding-bottom: 6px;
            margin-bottom: 8px;
            font-size: 9px;
            line-height: 1.4;
            text-transform: uppercase;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            text-shadow: 0 0 3px #ff1a1a;
            letter-spacing: 1px;
            color: #ff5e5e;
            flex-shrink: 0;
        }
        .header-left,
        .header-right {
            color: #ff5e5e;
            font-size: 8px;
        }
        .header-center {
            text-align: center;
            width: 100%;
            margin-top: 3px;
            font-size: 10px;
            background: #110000;
            color: #ff4d4d;
            padding: 3px 0;
            border: 2px solid #ff3b3b;
            letter-spacing: 2px;
            box-shadow: inset 0 0 8px #ff1a1a;
        }

        .hud {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #ff3b3b;
            padding: 5px 8px;
            margin-bottom: 8px;
            font-size: 8px;
            text-transform: uppercase;
            background: #010000;
            box-shadow: inset 0 0 8px #ff1a1a;
            font-family: 'Press Start 2P', monospace;
            color: #ffb3b3;
            gap: 6px;
            flex-shrink: 0;
        }
        .hud-section {
            display: flex;
            align-items: center;
            gap: 3px;
            white-space: nowrap;
        }
        .health-bar {
            font-size: 12px;
            color: #ff8080;
            letter-spacing: 2px;
        }
        .hud-label {
            font-size: 8px;
            color: #ff6a6a;
        }
        .spell-list {
            font-size: 8px;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .output {
            flex: 1 1 auto;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 6px;
            border: 2px solid #ff3b3b;
            padding: 8px 8px;
            background: #030000;
            word-break: break-word;
            font-family: 'Press Start 2P', monospace;
            color: #ffffff;
            min-height: 0;
        }
        .output p {
            margin: 0 0 10px 0;
            color: #ffffff;
            text-shadow: 0 0 2px #ff1a1a;
        }

        .input-line {
            display: flex;
            align-items: center;
            border-top: 2px solid #ff3b3b;
            padding-top: 8px;
            margin-top: 4px;
            font-size: 14px;
            flex-shrink: 0;
        }
        .prompt {
            color: #ff5e5e;
            margin-right: 8px;
            font-size: 20px;
            text-shadow: 0 0 6px #ff1a1a;
        }
        #userInput {
            flex: 1;
            background: #0a0000;
            border: 2px solid #ff4d4d;
            color: #ffffff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 14px;
            padding: 8px 10px;
            outline: none;
            text-transform: uppercase;
            box-shadow: 0 0 8px #ff1a1a;
        }
        #userInput::placeholder {
            color: #aa5555;
            font-size: 10px;
            text-transform: none;
        }
        .status {
            color: #ff6a6a;
            font-size: 10px;
            margin-top: 5px;
            letter-spacing: 1px;
            text-align: right;
            text-shadow: 0 0 3px #ff1a1a;
            flex-shrink: 0;
        }

        /* ===== CONTROLS AREA ===== */
        .controls-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 10px 20px 0;
            margin-top: 8px;
            flex-shrink: 0;
        }

        .dpad {
            width: 90px;
            height: 90px;
            position: relative;
            margin-bottom: 2px;
        }
        .dpad::before,
        .dpad::after {
            content: "";
            position: absolute;
            background: #2e2e2e;
            border-radius: 8px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 2px 3px rgba(255,255,255,0.3);
        }
        .dpad::before {
            width: 30px;
            height: 80px;
            top: 5px;
            left: 30px;
        }
        .dpad::after {
            width: 80px;
            height: 30px;
            top: 30px;
            left: 5px;
        }
        .dpad-center {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #1a1a1a;
            border-radius: 50%;
            top: 33px;
            left: 33px;
            box-shadow: inset 0 1px 3px black;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 2px;
        }
        .action-btn {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #cc3333, #660000);
            border-radius: 50%;
            box-shadow:
                inset 0 -5px 8px rgba(0,0,0,0.7),
                0 5px 8px rgba(0,0,0,0.5),
                0 0 8px rgba(255,0,0,0.3);
            border: 2px solid #400000;
            position: relative;
        }
        .action-btn::after {
            content: "";
            position: absolute;
            top: 4px;
            left: 4px;
            width: 28px;
            height: 28px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.45), transparent);
            border-radius: 50%;
        }

        .menu-row {
            display: flex;
            justify-content: center;
            gap: 18px;
            padding: 8px 0 2px;
            flex-shrink: 0;
        }
        .menu-btn {
            background: #4a4a4a;
            border-radius: 24px;
            padding: 6px 20px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.7), 0 2px 3px rgba(255,255,255,0.3);
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            color: #ddd;
            font-size: 10px;
            transition: all 0.08s;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .menu-btn:active {
            box-shadow: inset 0 4px 6px black;
            transform: translateY(1px);
            background: #3c3c3c;
        }

        .bottom-extras {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px 0;
            flex-shrink: 0;
        }
        .speaker-grill {
            display: flex;
            gap: 3px;
        }
        .grill-line {
            width: 20px;
            height: 6px;
            background: #1e1e1e;
            border-radius: 3px;
            box-shadow: inset 0 1px 2px black;
        }
        .led-indicator {
            width: 8px;
            height: 8px;
            background: #33ff33;
            border-radius: 50%;
            box-shadow: 0 0 8px #33ff33;
            animation: ledBlink 2s infinite;
        }
        @keyframes ledBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #0f0101;
            border: 3px solid #ff3b3b;
            box-shadow: 0 0 30px #ff1a1a;
            width: 90%;
            max-width: 450px;
            padding: 20px;
            font-family: 'Press Start 2P', monospace;
            color: #ffffff;
            text-align: center;
            animation: modalFade 0.2s ease;
        }
        .api-modal {
            max-width: 480px;
        }
        .api-input {
            width: 100%;
            background: #1a0101;
            border: 2px solid #ff4d4d;
            color: #fff;
            font-family: monospace;
            padding: 10px;
            margin: 12px 0;
            font-size: 12px;
        }
        .api-note {
            font-size: 8px;
            color: #ff8a8a;
            margin-top: 10px;
        }
        @keyframes modalFade {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-content h2 {
            font-size: 14px;
            margin-bottom: 18px;
            color: #ff6a6a;
            border-bottom: 2px solid #ff3b3b;
            display: inline-block;
            padding-bottom: 6px;
        }
        #inventoryList {
            list-style: none;
            padding: 0;
            margin: 15px 0;
            max-height: 200px;
            overflow-y: auto;
        }
        #inventoryList li {
            background: #1a0101;
            margin: 6px 0;
            padding: 6px;
            border-left: 4px solid #ff3b3b;
            font-size: 10px;
            text-align: left;
            word-break: break-word;
        }
        .close-modal {
            background: #ff2a2a;
            color: black;
            border: none;
            padding: 8px 16px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 0 8px #ff5e5e;
            transition: 0.1s;
        }
        .close-modal:hover {
            background: #ff5555;
        }
        #fileInput {
            display: none;
        }

        .clickable {
            color: #ff5c5c;
            text-decoration: underline;
            cursor: pointer;
            text-shadow: 0 0 4px #ff1a1a;
        }
        .clickable:hover {
            color: #ffa0a0;
            text-shadow: 0 0 8px #ff3b3b;
            background: #3a0a0a40;
        }
    </style>
</head>
<body>
    <div class="handheld">
        <div class="cartridge-slot">⚰️ CURSE OF VLAD ⚰️</div>

        <div class="screen-bezel">
            <div class="scanlines"></div>
            <div class="terminal">
                <div class="header">
                    <div class="header-left">NIGHTFALL<br>MCMLXXXIV</div>

                <div class="grill-line"></div><div class="grill-line"></div><div class="grill-line"></div>
                <div class="grill-line"></div><div class="grill-line"></div><div class="grill-line"></div>

        </div>

    <!-- MODAL inventory -->
    <div id="inventoryModal" class="modal">
        <div class="modal-content">
            <h2>📦 INVENTORY / ITEMS</h2>

            <button class="close-modal" id="closeModalBtn">CLOSE</button>
        </div>
    </div>

    <!-- MODAL API key -->
    <div id="apiModal" class="modal">
        <div class="modal-content api-modal">
            <h2>🔑 ENTER MISTRAL AI KEY</h2>
            <p style="font-size:9px;">Get your key at <span style="color:#ff8a8a;">console.mistral.ai</span></p>
            <input type="password" id="apiKeyInput" class="api-input" placeholder="Paste your Mistral API key...">
            <div class="api-note">Key stays in your browser (localStorage).</div>
            <button class="close-modal" id="saveApiKeyBtn">SAVE KEY</button>

    <input type="file" id="fileInput" accept=".json,application/json">

    <script>
        (function() {
            const outputDiv = document.getElementById('outputArea');
            const inputField = document.getElementById('userInput');
            const aiStatus = document.getElementById('aiStatus');
            const resetBtn = document.getElementById('resetBtn');
            const saveBtn = document.getElementById('saveBtn');
            const loadBtn = document.getElementById('loadBtn');
            const muteBtn = document.getElementById('muteBtn');
            const fileInput = document.getElementById('fileInput');
            const inventoryModalBtn = document.getElementById('inventoryModalBtn');
            const inventoryModal = document.getElementById('inventoryModal');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const inventoryListEl = document.getElementById('inventoryList');
            const apiKeyBtn = document.getElementById('apiKeyBtn');
            const apiModal = document.getElementById('apiModal');
            const apiKeyInput = document.getElementById('apiKeyInput');
            const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');
            const closeApiModalBtn = document.getElementById('closeApiModalBtn');

            const hudLocation = document.getElementById('hudLocation');
            const hudHealthBar = document.getElementById('hudHealthBar');
            const hudWeapon = document.getElementById('hudWeapon');
            const hudSpells = document.getElementById('hudSpells');
            const hudInventory = document.getElementById('hudInventory');
            const hudQuest = document.getElementById('hudQuest');
            const hudCompanion = document.getElementById('hudCompanion');

            let mistralApiKey = localStorage.getItem('mistral_api_key') || '';

            const systemPrompt = `You are the KEEPER OF THE DAMMED — a text adventure game engine set in the gothic horror world of "Castle of the Dammed" (Nightfall Games 1984). The player is a lone vampire hunter on a sacred quest: enter the cursed Castle of the Dammed, find Dracula, and destroy him forever.

**WORLD LORE & ATMOSPHERE:**
- Setting: Transylvanian wilderness, 18th century. Locations: Village of Duskfall, Dark Forest, Forgotten Chapel, Wolf Pass, Castle of the Dammed (Courtyard, Tower, Banquet Hall, Catacombs, Throne Room), Gypsy Camp, Abandoned Mill.
- NPCs: Father Mihail (priest), Gypsy Seer Madam Irina, Hunters (Grigore), Peasants, ghostly apparitions, vampire spawn, wolves, bats, etc.
- Final goal: find and kill DRACULA in his coffin within the castle depths. Main quest is "HUNT DRACULA".

**STATE VARIABLES (10 fields separated by |):**
Format: ##STATE## location|health|time|weather|weapon|inventory|spellbook|questStage|extra|companion
- location (string)
- health (0-10)
- time (Evening/Midnight/Dawn/Night/Witching Hour)
- weather (Fog/Storm/Moonlit/Rain/Clear)
- weapon (string)
- inventory (comma-separated)
- spellbook (comma-separated)
- questStage (0-4)
- extra (notes)
- companion (none, gypsy, monk, wolf)

**COMPANION SYSTEM:**
- Each companion gives abilities:
  • gypsy: "READ FATE" (reveal hidden paths once per 3 actions), sells rare items at camp.
  • monk: holy wards reduce undead damage by 1, can "PURIFY" cursed items.
  • wolf: auto-damage 1-2 in combat, can "SNIFF" for hidden paths/tracking.
- Recruitment: gypsy (save from wolves/spawn), monk (free from chapel chains/holy water), wolf (heal wounded/free from trap).
- Mention companion and offer actions like [ASK GYPSY TO READ FATE] [MONK PRAYER] [WOLF SNIFF].

**HIDDEN ROOMS & SECRETS:**
- Reveal if player: casts REVEAL SECRET, uses OLD KEY, BLOOD OFFERING, or companion ability.
- Secrets contain rare weapons, spell tomes, healing items, shortcuts. Mark as discovered in extra field.

**RANDOM EVENTS (35% on travel):**
1. Traveling Merchant (trade items/quest)
2. Ghostly Omen (clue, -1 health or blessing)
3. Ambush (FIGHT/FLEE/USE ITEM, damage 1-3)

**GAME RULES:**
- Healing items +2 health (max 10). Weapons: EQUIP [weapon]. Spells from spellbook, reusable unless noted.
- Enemies damage 1-3. Quest stages: 0=Awaiting, 1=Enter Castle, 2=Find Tomb, 3=Confront, 4=Victory.
- Always provide 3-5 clickable actions in brackets. Write 2-4 sentences. Always include ##STATE## line (10 fields). Health <=0 = GAME OVER.

Now, generate the next response based on conversation history.`;

            const introMessage = `A WOLF HOWLS IN THE DISTANCE. THE ROAD BEFORE YOU VANISHES INTO A SEA OF FOG, AND SOMEWHERE BEYOND THE BLACK TREES, THE SPIRES OF THE DAMMED CASTLE PIERCE THE STORM CLOUDS. YOU STAND OUTSIDE THE "CROW & COFFIN" TAVERN — THE LAST BEACON BEFORE THE FOREST OF SHADOWS. A COACH RATTLES SOMEWHERE ON THE MUDDY ROAD, AND THE TAVERN DOOR LEAKS ORANGE LIGHT AND THE SMELL OF MEAD.\n\nYOUR VOW BURNS IN YOUR CHEST: FIND DRACULA. END THE CURSE.\n\nWHAT DO YOU DO? [ENTER TAVERN] [WAIT FOR THE COACH] [SET OFF ON FOOT THROUGH THE FOREST]`;

            const initialState = "##STATE## Village Tavern Exterior|10|Midnight|Fog & Mist|Wooden Stake|Map of the Valley|—|0||none";

            let messages = [
                { role: 'assistant', content: introMessage + "\n" + initialState }
            ];

            let audioCtx = null;
            let ambientGain = null;
            let droneSource = null;
            let isMuted = false;
            let currentLocation = "Village Tavern Exterior";
            let skipAnimation = false;
            let currentTypingPromise = null;

            function parseState(stateLine) {
                if (!stateLine || !stateLine.startsWith('##STATE##')) return null;
                const parts = stateLine.replace('##STATE##', '').trim().split('|');
                if (parts.length < 10) return null;
                return {
                    location: parts[0],
                    health: parseInt(parts[1]),
                    time: parts[2],
                    weather: parts[3],
                    weapon: parts[4],
                    inventory: parts[5],
                    spellbook: parts[6],
                    questStage: parseInt(parts[7]),
                    extra: parts[8] || '',
                    companion: parts[9] || 'none'
                };
            }

            function validateState(state) {
                if (isNaN(state.health)) state.health = 10;
                state.health = Math.min(10, Math.max(0, state.health));
                if (!state.weapon || state.weapon === '') state.weapon = "Wooden Stake";
                if (!state.inventory) state.inventory = '';
                state.inventory = state.inventory.split(',').map(i => i.trim()).filter(i => i).join(',');
                if (!state.spellbook) state.spellbook = '';
                state.spellbook = state.spellbook.split(',').map(s => s.trim()).filter(s => s).join(',');
                if (isNaN(state.questStage)) state.questStage = 0;
                state.questStage = Math.min(4, Math.max(0, state.questStage));
                if (!state.companion || !['none','gypsy','monk','wolf'].includes(state.companion)) state.companion = 'none';
                return state;
            }

            function updateHUDFromState(stateLine) {
                let state = parseState(stateLine);
                if (!state) return;
                state = validateState(state);
                hudLocation.textContent = state.location.toUpperCase();
                hudHealthBar.textContent = '🩸'.repeat(state.health) + '◻️'.repeat(10 - state.health);
                hudWeapon.textContent = state.weapon || "—";
                hudSpells.textContent = state.spellbook || "—";
                hudInventory.textContent = state.inventory || "—";
                let questText = "HUNT";
                if (state.questStage === 1) questText = "⚔️CASTLE";
                else if (state.questStage === 2) questText = "🔍TOMB";
                else if (state.questStage === 3) questText = "⚰️CONFRONT";
                else if (state.questStage === 4) questText = "🏆VICTORY";
                hudQuest.textContent = questText;
                let comp = state.companion === 'none' ? '—' : state.companion.toUpperCase();
                if (state.companion === 'gypsy') comp = '🧙GYPSY';
                else if (state.companion === 'monk') comp = '🙏MONK';
                else if (state.companion === 'wolf') comp = '🐺WOLF';
                hudCompanion.textContent = comp;
                if (currentLocation !== state.location) {
                    currentLocation = state.location;
                    updateAmbientAudio(state.location);
                }
                autoSaveToLocal();
                if (inventoryModal.style.display === 'flex') refreshInventoryModal(state.inventory);
            }

            function refreshInventoryModal(inv) {
                inventoryListEl.innerHTML = '';
                const items = inv ? inv.split(',').map(i => i.trim()).filter(i => i) : [];
                if (items.length === 0) {
                    const li = document.createElement('li');
                    li.textContent = '— NO ITEMS —';
                    inventoryListEl.appendChild(li);
                } else {
                    items.forEach(item => {
                        const li = document.createElement('li');
                        li.textContent = `📦 ${item.toUpperCase()}`;
                        inventoryListEl.appendChild(li);
                    });
                }
            }

            function filterStateFromContent(content) {
                const idx = content.indexOf('##STATE##');
                return idx === -1 ? content : content.substring(0, idx).trim();
            }

            function appendOutput(text, clickable = false) {
                const p = document.createElement('p');
                p.textContent = text;
                outputDiv.appendChild(p);
                outputDiv.scrollTop = outputDiv.scrollHeight;
                if (clickable) makeClickable(p);
                return p;
            }

            function makeClickable(paragraph) {
                const raw = paragraph.textContent;
                const html = raw.replace(/\[([^\]]+)\]/g, '<span class="clickable" data-command="$1">[$1]</span>');
                paragraph.innerHTML = html;
                paragraph.querySelectorAll('.clickable').forEach(span => {
                    span.addEventListener('click', (e) => {
                        e.stopPropagation();
                        inputField.value = span.dataset.command;
                        handleCommand();
                    });
                });
            }

            async function typewriterEffect(text, container) {
                if (currentTypingPromise) {
                    skipAnimation = true;
                    try { await currentTypingPromise; } catch(e) {}
                }
                skipAnimation = false;
                const p = document.createElement('p');
                container.appendChild(p);
                let fullText = '';
                const chars = text.split('');
                for (let i = 0; i < chars.length; i++) {
                    if (skipAnimation) {
                        p.textContent = text;
                        fullText = text;
                        skipAnimation = false;
                        break;
                    }
                    fullText += chars[i];
                    p.textContent = fullText;
                    playKeyBeep();
                    await new Promise(resolve => setTimeout(resolve, 28));
                    container.scrollTop = container.scrollHeight;
                }
                makeClickable(p);
                return p;
            }

            function playKeyBeep() {
                if (!audioCtx || isMuted) return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.value = 520;
                    gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.04);
                } catch(e) {}
            }

            function initGothicAudio() {
                if (audioCtx || isMuted) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const bufferSize = 4 * audioCtx.sampleRate;
                const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 0.3;
                const noiseSrc = audioCtx.createBufferSource();
                noiseSrc.buffer = noiseBuffer; noiseSrc.loop = true;
                const filter = audioCtx.createBiquadFilter();
                filter.type = "lowpass"; filter.frequency.value = 550;
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = 0.07;
                noiseSrc.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
                noiseSrc.start();
                ambientGain = gainNode; droneSource = noiseSrc;
            }

            function updateAmbientAudio(location) {
                if (!audioCtx || !ambientGain || isMuted) return;
                let vol = 0.07;
                if (location.includes("Castle")) vol = 0.12;
                else if (location.includes("Forest")) vol = 0.1;
                else if (location.includes("Tavern")) vol = 0.04;
                ambientGain.gain.setValueAtTime(vol, audioCtx.currentTime);
            }

            function toggleMute() {
                isMuted = !isMuted;
                if (ambientGain) ambientGain.gain.value = isMuted ? 0 : 0.07;
                muteBtn.textContent = isMuted ? '🔊 UNMUTE' : '🔇 MUTE';
            }

            function autoSaveToLocal() {
                try {
                    const last = [...messages].reverse().find(m => m.role === 'assistant');
                    if (last && last.content.includes('##STATE##')) localStorage.setItem('castleOfDammed', JSON.stringify(messages));
                } catch(e) {}
            }

            function loadFromLocal() {
                const saved = localStorage.getItem('castleOfDammed');
                if (saved) {
                    try {
                        const loaded = JSON.parse(saved);
                        if (loaded.length) { messages = loaded; rebuildOutput(); return true; }
                    } catch(e) {}
                }
                return false;
            }

            function rebuildOutput() {
                outputDiv.innerHTML = '';
                for (let msg of messages) {
                    if (msg.role === 'user') appendOutput('> ' + msg.content.toUpperCase(), false);
                    else if (msg.role === 'assistant') {
                        const clean = filterStateFromContent(msg.content);
                        if (clean) appendOutput(clean, false);
                    }
                }
                const last = [...messages].reverse().find(m => m.role === 'assistant');
                if (last && last.content.includes('##STATE##')) {
                    const statePart = last.content.split('##STATE##')[1];
                    if (statePart) updateHUDFromState('##STATE##' + statePart);
                }
                inputField.disabled = false;
                inputField.focus();
            }

            async function bootSequence() {
                inputField.disabled = true;
                aiStatus.textContent = '🕯️ NIGHTFALL GAMES PRESENTS... 🕯️';
                outputDiv.innerHTML = '';
                await new Promise(r => setTimeout(r, 300));
                const introClean = filterStateFromContent(introMessage);
                await typewriterEffect(introClean, outputDiv);
                aiStatus.textContent = '⚰️ Awaiting command...';
                inputField.disabled = false;
                inputField.focus();
                updateHUDFromState(initialState);
            }

            function resetGame() {
                messages = [{ role: 'assistant', content: introMessage + "\n" + initialState }];
                bootSequence();
            }

            function saveGameFile() {
                const data = JSON.stringify(messages, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `castle_dammed_${new Date().toISOString().slice(0,19)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                aiStatus.textContent = '💀 Game saved.';
            }

            function loadGameFile(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const loaded = JSON.parse(e.target.result);
                        if (!Array.isArray(loaded)) throw new Error();
                        messages = loaded;
                        rebuildOutput();
                        aiStatus.textContent = '📜 Chronicle loaded.';
                    } catch (err) { aiStatus.textContent = '❌ Corrupted save!'; }
                };
                reader.readAsText(file);
            }

            async function callAIGame(userCmd) {
                if (!mistralApiKey) {
                    aiStatus.textContent = '❌ NO API KEY! Click 🔑 KEY.';
                    inputField.disabled = false;
                    inputField.focus();
                    return;
                }
                messages.push({ role: 'user', content: userCmd });
                appendOutput('> ' + userCmd.toUpperCase(), false);
                aiStatus.textContent = '🦇 Weaving fate...';
                inputField.disabled = true;
                try {
                    let fullPrompt = systemPrompt + "\n\n";
                    for (let msg of messages.slice(-14)) {
                        if (msg.role === 'user') fullPrompt += "HUNTER: " + msg.content + "\n";
                        else fullPrompt += "KEEPER: " + msg.content + "\n";
                    }
                    fullPrompt += "KEEPER:";
                    const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${mistralApiKey}` },
                        body: JSON.stringify({ model: 'mistral-large-latest', messages: [{ role: "user", content: fullPrompt }], temperature: 0.8, max_tokens: 750 })
                    });
                    if (response.status === 401) throw new Error('401 Unauthorized – Invalid key.');
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    let aiMsg = data.choices[0].message.content;
                    if (!aiMsg.includes('##STATE##')) {
                        const last = [...messages].reverse().find(m => m.role === 'assistant');
                        let fallback = initialState;
                        if (last && last.content.includes('##STATE##')) fallback = '##STATE##' + last.content.split('##STATE##')[1];
                        aiMsg += '\n' + fallback;
                    }
                    const display = filterStateFromContent(aiMsg);
                    await typewriterEffect(display, outputDiv);
                    messages.push({ role: 'assistant', content: aiMsg });
                    const stateLine = aiMsg.split('##STATE##')[1];
                    if (stateLine) updateHUDFromState('##STATE##' + stateLine);
                    aiStatus.textContent = '⚰️ Awaiting command...';
                } catch (err) {
                    aiStatus.textContent = `❌ ${err.message}`;
                    messages.pop();
                }
                inputField.disabled = false;
                inputField.focus();
            }

            function handleCommand() {
                const cmd = inputField.value.trim();
                if (cmd === '') return;
                callAIGame(cmd);
                inputField.value = '';
            }

            function showApiModal() { apiKeyInput.value = mistralApiKey; apiModal.style.display = 'flex'; }
            function closeApiModal() { apiModal.style.display = 'none'; }
            function saveApiKey() {
                const newKey = apiKeyInput.value.trim();
                if (newKey.length > 10) {
                    mistralApiKey = newKey;
                    localStorage.setItem('mistral_api_key', mistralApiKey);
                    aiStatus.textContent = '🔑 Mistral key saved!';
                    closeApiModal();
                    if (inputField.disabled && !loadFromLocal()) bootSequence();
                } else aiStatus.textContent = '❌ Invalid key.';
            }
            function showInventoryModal() {
                const lastMsg = [...messages].reverse().find(m => m.role === 'assistant');
                let inv = "";
                if (lastMsg && lastMsg.content.includes('##STATE##')) {
                    const statePart = lastMsg.content.split('##STATE##')[1];
                    const state = parseState('##STATE##' + statePart);
                    if (state) inv = state.inventory;
                }
                refreshInventoryModal(inv);
                inventoryModal.style.display = 'flex';
            }
            function closeInventoryModal() { inventoryModal.style.display = 'none'; }

            inputField.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); handleCommand(); }
                else if (e.key === 'Escape') skipAnimation = true;
            });
            resetBtn.addEventListener('click', resetGame);
            saveBtn.addEventListener('click', saveGameFile);
            loadBtn.addEventListener('click', () => fileInput.click());
            muteBtn.addEventListener('click', toggleMute);
            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) loadGameFile(e.target.files[0]);
                fileInput.value = '';
            });
            inventoryModalBtn.addEventListener('click', showInventoryModal);
            closeModalBtn.addEventListener('click', closeInventoryModal);
            window.addEventListener('click', (e) => { if (e.target === inventoryModal) closeInventoryModal(); });
            apiKeyBtn.addEventListener('click', showApiModal);
            saveApiKeyBtn.addEventListener('click', saveApiKey);
            closeApiModalBtn.addEventListener('click', closeApiModal);
            window.addEventListener('click', (e) => { if (e.target === apiModal) closeApiModal(); });

            window.addEventListener('load', () => {
                if (!mistralApiKey) {
                    aiStatus.textContent = '⚠️ NO MISTRAL KEY – Click 🔑 KEY.';
                    inputField.disabled = true;
                    setTimeout(() => showApiModal(), 200);
                } else {
                    if (!loadFromLocal()) bootSequence();
                }
                document.body.addEventListener('click', () => {
                    initGothicAudio();
                    updateAmbientAudio(currentLocation);
                }, { once: true });
            });
        })();
    </script>
</body>
</html>
