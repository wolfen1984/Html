<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIGHTING FANTASY · CONSOLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0c0c0c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 16px;
            position: relative;
        }
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(255, 255, 255, 0.03) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2;
        }
        .crt {
            animation: textflicker 0.01s infinite;
        }
        @keyframes textflicker {
            0% { text-shadow: 0 0 3px #ffffff; }
            50% { text-shadow: 0 0 1px #ffffff; }
            100% { text-shadow: 0 0 3px #ffffff; }
        }
        .terminal {
            background: #000;
            color: #ffffff;
            border: 4px solid #ffffff;
            box-shadow: 0 0 15px #ffffff, inset 0 0 10px #ffffff;
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 20px 20px 15px 20px;
            position: relative;
            z-index: 1;
        }
        .header {
            border-bottom: 2px solid #ffffff;
            padding-bottom: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            line-height: 1.8;
            text-transform: uppercase;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            text-shadow: 0 0 5px #ffffff;
            letter-spacing: 1px;
        }
        .header-left, .header-right { color: #ffffff; }
        .header-center {
            text-align: center;
            width: 100%;
            margin-top: 8px;
            font-size: 14px;
            background: #000;
            color: #ffffff;
            padding: 6px 0;
            border: 2px solid #ffffff;
            letter-spacing: 4px;
            box-shadow: inset 0 0 10px #ffffff;
        }
        .output {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 8px;
            border: 2px solid #ffffff;
            padding: 18px 14px;
            background: #000;
            scroll-behavior: auto;
            word-break: break-word;
            box-shadow: inset 0 0 20px #ffffff;
        }
        .output p {
            margin: 0 0 14px 0;
            color: #ffffff;
            text-shadow: 0 0 5px #ffffff;
        }
        .hud {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #ffffff;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 11px;
            text-transform: uppercase;
            background: #000;
            box-shadow: inset 0 0 10px #ffffff;
            font-family: 'Press Start 2P', monospace;
            color: #ffffff;
            text-shadow: 0 0 5px #ffffff;
            gap: 8px;
        }
        .hud-section {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .stat-bar {
            display: inline-block;
            letter-spacing: 2px;
            font-size: 14px;
        }
        .hud-label {
            opacity: 0.8;
            font-size: 9px;
        }
        .inventory-display {
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            background: #1a1a1a;
            padding: 4px 8px;
            border: 1px solid #ffffff;
            font-size: 10px;
        }
        .input-line {
            display: flex;
            align-items: center;
            border-top: 2px solid #ffffff;
            padding-top: 12px;
            font-size: 16px;
        }
        .prompt { 
            color: #ffffff; 
            margin-right: 10px; 
            font-size: 18px;
            text-shadow: 0 0 8px #ffffff;
        }
        #userInput {
            flex: 1;
            background: #000;
            border: 2px solid #ffffff;
            color: #ffffff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 16px;
            padding: 12px 12px;
            outline: none;
            text-transform: uppercase;
            box-shadow: 0 0 8px #ffffff;
        }
        #userInput::placeholder { 
            color: #ffffff; 
            font-size: 11px; 
            text-transform: none; 
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            color: #ffffff;
            margin-top: 10px;
            border-top: 1px solid #ffffff;
            padding-top: 8px;
            text-shadow: 0 0 5px #ffffff;
        }
        .footer-left, .footer-right {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .clickable {
            color: #cccccc;
            text-decoration: underline;
            cursor: pointer;
            text-shadow: 0 0 5px #cccccc;
            transition: all 0.1s ease;
        }
        .clickable:hover {
            color: #ffffff;
            text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff;
            background: #ffffff20;
        }
        .status {
            color: #ff4f1e;
            font-size: 15px;
            margin-top: 8px;
            letter-spacing: 1px;
            text-align: right;
            text-shadow: 0 0 5px #ff4f1e;
        }
        #fileInput { display: none; }
        .adventure-tag {
            background: #1a1a1a;
            border: 1px solid #ffffff;
            padding: 8px 16px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(2px);
        }
        .modal-content {
            background: #000;
            border: 4px solid #ffffff;
            padding: 24px 30px;
            max-width: 600px;
            width: 80%;
            box-shadow: 0 0 30px #ffffff;
            color: #ffffff;
            font-family: 'Press Start 2P', monospace;
            position: relative;
            text-align: center;
        }
        .modal-content h2 {
            font-size: 16px;
            margin-bottom: 24px;
            text-decoration: underline;
            text-shadow: 0 0 5px #ffffff;
        }
        .book-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        .book-item {
            background: #1a1a1a;
            border: 2px solid #cccccc;
            padding: 16px 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .book-item:hover {
            border-color: #ffffff;
            box-shadow: 0 0 10px #ffffff;
            background: #2a2a2a;
        }
        .close-modal {
            margin-top: 20px;
            display: inline-block;
            border: 2px solid #ffffff;
            padding: 10px 24px;
            cursor: pointer;
            font-size: 12px;
        }
        .close-modal:hover {
            background: #ffffff20;
        }
    </style>
</head>
<body class="crt">
    <div class="terminal">
        <div class="header">
            <div class="header-left">FIGHTING FANTASY<br>GAMEBOOK CONSOLE</div>
            <div class="header-right">v4.0<br>BOOK-ACCURATE</div>
            <div class="header-center">⚔ CANON MODE ⚔</div>
        </div>

        <div id="hudContainer" class="hud">
            <div class="hud-section"><span class="hud-label">LOC:</span> <span id="hudLocation">START</span></div>
            <div class="hud-section"><span class="hud-label">SKL:</span> <span id="hudSkill">8</span></div>
            <div class="hud-section"><span class="hud-label">STM:</span> <span id="hudStaminaBar">[██████░░]</span></div>
            <div class="hud-section"><span class="hud-label">LUK:</span> <span id="hudLuck">8</span></div>
            <div class="hud-section"><span class="hud-label">GOLD:</span> <span id="hudGold">5</span></div>
            <div class="hud-section"><span class="hud-label">PROV:</span> <span id="hudProvisions">3</span></div>
            <div class="hud-section inventory-display" title="Inventory"><span class="hud-label">INV:</span> <span id="hudInventory">SWORD, ROPE</span></div>
        </div>

        <div id="outputArea" class="output">
        </div>

        <div class="input-line">
            <span class="prompt">❯</span>
            <input type="text" id="userInput" placeholder="ENTER COMMAND..." autofocus disabled>
        </div>
        <div class="status" id="aiStatus">⚡ SYSTEM BOOTING... ⚡</div>
        
        <div class="footer">
            <div class="footer-left">
                <span class="clickable" id="saveBtn">[SAVE]</span>
                <span class="clickable" id="loadBtn">[LOAD]</span>
                <span class="clickable adventure-tag" id="booksBtn">[📖 BOOKS]</span>
            </div>
            <div class="footer-right">
                <span class="clickable" id="resetBtn">[RESET]</span>
                <span>FF CONSOLE</span>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".json,application/json">

    <div id="booksModal" class="modal-overlay">
        <div class="modal-content">
            <h2>◈ ADVENTURE GAMEBOOKS ◈</h2>
            <div class="book-list" id="bookList">
            </div>
            <div class="close-modal clickable" id="closeModalBtn">[CLOSE]</div>
        </div>
    </div>

    <script>
        (function() {
            const outputDiv = document.getElementById('outputArea');
            const inputField = document.getElementById('userInput');
            const aiStatus = document.getElementById('aiStatus');
            const resetBtn = document.getElementById('resetBtn');
            const saveBtn = document.getElementById('saveBtn');
            const loadBtn = document.getElementById('loadBtn');
            const fileInput = document.getElementById('fileInput');
            const booksBtn = document.getElementById('booksBtn');
            const booksModal = document.getElementById('booksModal');
            const bookListDiv = document.getElementById('bookList');
            const closeModalBtn = document.getElementById('closeModalBtn');

            const hudLocation = document.getElementById('hudLocation');
            const hudSkill = document.getElementById('hudSkill');
            const hudStaminaBar = document.getElementById('hudStaminaBar');
            const hudLuck = document.getElementById('hudLuck');
            const hudGold = document.getElementById('hudGold');
            const hudProvisions = document.getElementById('hudProvisions');
            const hudInventory = document.getElementById('hudInventory');

            // ========== BOOK-SPECIFIC SYSTEM PROMPTS ==========
            // Each book gets its own COMPLETE system prompt with all details from the actual gamebook
            
            const bookPrompts = {
                firetop: `You are the game master for "The Warlock of Firetop Mountain" by Steve Jackson and Ian Livingstone. You must simulate this Fighting Fantasy gamebook exactly.

SETTING: Firetop Mountain in the Trolltooth Mountains. The player has come seeking the treasure of the warlock Zagor, hidden deep within the mountain.

STARTING ITEMS: Sword, Shield, Lantern, 5 Gold pieces, 4 Provisions.

KEY LOCATIONS: Mountain Path (start), Entrance Cave, Goblin Guardroom, Mine Tunnels, Underground River, Warlock's Chamber.

IMPORTANT NPCs:
- Zagor: The warlock himself. Powerful sorcerer guarding the treasure.
- The Prisoner: A man trapped in a cell who may give information.

ENEMIES (with SKILL/STAMINA):
- Goblins: SKILL 5-6, STAMINA 4-5
- Orcs: SKILL 6-7, STAMINA 5-6
- Giant Bats: SKILL 5, STAMINA 3
- Giant Spider: SKILL 6, STAMINA 4
- Swordfighter Skeleton: SKILL 7, STAMINA 5
- Zagor: SKILL 10, STAMINA 10

SPECIAL ITEMS:
- Lantern: Essential for seeing in dark areas. Without light, combat is at -2 SKILL.
- Treasure Chest Key: Needed to open the final treasure chest.
- Potion of Strength: Restores 2 SKILL temporarily.
- Gold Coins: Can be used to bribe goblins.

UNIQUE MECHANICS:
- The mountain has multiple paths. The player can explore different tunnels.
- Some doors are locked and need keys.
- The warlock's treasure is in a chest that requires the correct key.

RESPONSE FORMAT:
Write 3-4 sentences describing what happens. Include dice results in brackets like [Player rolls 8 vs Goblin SKILL 5]. Always end with 3-4 bracketed choices like [FIGHT GOBLIN] [SEARCH ROOM] [USE LANTERN] [GO NORTH]. Then include ##STATE## location|skill|stamina|luck|inventory|gold|provisions|quest_active`,

                deathtrap: `You are the game master for "Deathtrap Dungeon" by Ian Livingstone. Simulate this book exactly.

SETTING: Baron Sukumvit's deadly dungeon beneath the city of Fang. The player has entered to win a fortune.

STARTING ITEMS: Dagger, Rope, 10 Gold pieces, 5 Provisions.

KEY LOCATIONS: Dungeon Gate (start), Entrance Hall, Trap Corridors, Pit Room, Troll Lair, Final Chamber with the Gem.

IMPORTANT NPCs:
- Baron Sukumvit: The evil noble who created the dungeon.
- The Prisoners: Other adventurers who failed.

ENEMIES:
- Giant Scorpion: SKILL 7, STAMINA 5
- Lizard Man: SKILL 6, STAMINA 6
- Troll: SKILL 8, STAMINA 8
- The "Something": SKILL 10, STAMINA 12 (final guardian)

SPECIAL ITEMS:
- Gem of Danger: The prize at the dungeon's end.
- Magic Sword: Found in the dungeon, gives +1 SKILL.
- Potion of Invisibility: Can avoid one combat.

UNIQUE MECHANICS:
- Traps are everywhere. Test Luck to avoid them.
- The dungeon has many dead ends and false paths.
- The player can try to sneak past enemies instead of fighting.

RESPONSE FORMAT: 3-4 sentences with dice results in brackets. End with 3-4 bracketed choices. Then ##STATE##.`,

                citadel: `You are the game master for "Citadel of Chaos" by Steve Jackson. Simulate this book exactly.

SETTING: The dread Citadel of Chaos, ruled by the sorcerer Balthus Dire.

STARTING ITEMS: Spellbook, Staff, 8 Gold, 3 Provisions.

KEY LOCATIONS: Citadel Gate (start), Guardroom, Torture Chamber, Great Hall, Throne Room.

IMPORTANT NPCs:
- Balthus Dire: The evil sorcerer, final boss.
- Prisoners: Can give information.

ENEMIES:
- Goblins: SKILL 5, STAMINA 4
- Mutant Guards: SKILL 7, STAMINA 6
- Chaos Warriors: SKILL 8, STAMINA 8
- Balthus Dire: SKILL 11, STAMINA 12

SPECIAL ITEMS:
- Spellbook: Contains spells that can be used creatively.
- Staff: Can be used as a weapon.

UNIQUE MECHANICS:
- The player can cast spells from the spellbook. Describe spell effects.
- Some spells require rolling dice to see if they work.

RESPONSE FORMAT: 3-4 sentences with dice results. End with bracketed choices. Then ##STATE##.`,

                vault: `You are the game master for "Vault of the Vampire" by Steve Jackson and Ian Livingstone. You MUST follow this book's details exactly.

SETTING: Castle Heydrich in the province of Mauristatia. The player has come from the haunted village of Leverhelven to rescue Nastassia, a kidnapped village girl, from the vampire Count Reiner Heydrich.

STARTING ITEMS: None. The player starts with just their wits. 0 Gold, 2 Provisions.

KEY LOCATIONS:
- Leverhelven: The starting village. Terrified villagers send you on the quest.
- Castle Heydrich: The main Gothic castle setting.
- The Crypt: Where Nastassia is held prisoner.
- The Count's Chambers: Reiner Heydrich's personal rooms.
- The Art Room: Contains the Wooden Golem.
- The Stables: House the Count's horses (wolves and a demonic fire-breathing steed).
- The Tower: Where Siegfrid's shield is guarded.

IMPORTANT NPCS (with personalities):
- Count Reiner Heydrich: The Big Bad vampire lord. Classic vampire powers: hypnotic eyes, shapeshift into bat/wolf, superhuman strength. Weaknesses: cannot cross running water, no reflection, can be killed with a stake through the heart.
- Katarina Heydrich: The Count's evil sister. Affably Evil - appears charming and helpful but secretly schemes to kill her brother. She is 70 years old but looks young by drinking virgin's blood. Can mesmerize you.
- Siegfrid Heydrich: Reiner's good brother, now a helpful ghost. A true Knight in Shining Armour. Grants his sword Nightstar.
- Wilhelm Heydrich: An insane cousin. Cloud Cuckoo Lander - generally not evil but unpredictable. Might attack with cavalry saber if in bad mood.
- Nastassia: The Distressed Damsel. Kidnapped village girl held in the crypt.
- The Ranger: An Action Girl who can accompany you briefly. Has a pet bear.
- Lothar the Castellan: Castle keeper. Not evil, helpful if not attacked.
- Gunthar the Healer: Katarina's brother, but humble and generous. Can cure Afflictions.
- Doctor Faustus: Mad Scientist whose remains became a blob monster.

ENEMIES (with SKILL/STAMINA):
- Major Thassallos: SKILL 9, STAMINA 8. Powerful four-armed skeletal creature that fires cold beams from eyes.
- Lesser Thassallos: SKILL 7, STAMINA 6.
- Necrotic Jelly (Doctor Faustus): SKILL 8, STAMINA 10. Blob monster, can worsen Afflictions.
- Wooden Golem: SKILL 7, STAMINA 6. Pretends to be a statue.
- Wraiths: SKILL 7, STAMINA 5. Standard undead.
- Ghouls: SKILL 6, STAMINA 5.
- Baobhan Sith: SKILL 8, STAMINA 6. Vampire fairy.
- Specter: SKILL 9, STAMINA 7. Guards Count's coffin.
- Horned Bat: SKILL 6, STAMINA 5. Fought alongside Blood Weasel.
- Blood Weasel: SKILL 4, STAMINA 3. Flees when bat dies.
- Vampire's Coachman: SKILL 5, STAMINA 4. Headless, appears at start.

SPECIAL ITEMS:
- Nightstar: Siegfrid's personal sword. Infinity +1 Sword. Sealed in Book of Swords. Only weapon that can truly kill Count Heydrich. +2 SKILL bonus.
- Magic Sword: One in crypt. Necessary for enemies immune to normal weapons.
- Siegfrid's Chainmail: +1 defense (reduce damage by 1).
- Crossed Shield: +1 SKILL in combat.
- Jandor's Bolt: Holy Hand Grenade spell. Deals 3-6 damage to undead.
- Holy Water: Classic vampire weapon. 2 damage per bottle.
- Book of Swords: Contains Nightstar, can only be opened by Siegfrid's ghost.

SPECIAL MECHANICS:
- Faith Score: The player has a hidden Faith score (1-6) that affects interactions with holy items and undead. Higher faith = more effective holy water, better chance with Jandor's Bolt. **Only mention Faith when it matters** (e.g., using holy items, facing strong undead). Do not report it every turn.
- Afflictions: The player can suffer various afflictions (vampire bite, disease, curse) that reduce stats until cured by Gunthar or holy means. **Only mention Afflictions when they change or are relevant** (e.g., after a bite, when trying to cure them).

THE PLOT: Villagers in Leverhelven send you to rescue Nastassia. She is held in the crypt, not for the Count to feed on, but to be given to Katarina. The Count must be destroyed with Nightstar, which requires finding Siegfrid's ghost.

RESPONSE FORMAT:
Write 3-4 atmospheric sentences describing what happens. **Integrate dice results naturally** (e.g., "You swing your sword, rolling a 9 against the Thassallos' SKILL 7, and land a solid blow!"). Do not use standalone brackets for dice.

If Faith or Afflictions are relevant (e.g., you use holy water, or a wraith's touch causes a curse), mention them briefly. Otherwise, omit them entirely.

Always end with 3-4 distinct bracketed choices that make sense for the situation. Examples: [ENTER CASTLE GATE] [SEARCH VILLAGE] [TALK TO KATARINA] [TEST LUCK] [USE HOLY WATER] [EAT PROVISION].

Then include ##STATE## location|skill|stamina|luck|inventory|gold|provisions|quest_active

EXAMPLE OF A GOOD RESPONSE:
"You creep into the crypt, your torch flickering. A wraith glides toward you, bony hand outstretched. You strike first, rolling 8 against its SKILL 7, and your sword passes through its ethereal form, dealing 2 STAMINA damage. The creature shrieks and fades. [SEARCH CRYPT] [MOVE DEEPER] [LIGHT TORCH] [EAT PROVISION]
##STATE## Crypt Entrance|8|8|8|Torch|0|2|1"`,

                forest: `You are the game master for "Forest of Doom" by Ian Livingstone. Simulate this book exactly.

SETTING: The dark Forest of Doom. The player seeks the Hammer of Stonebridge.

STARTING ITEMS: Bow, Arrows, Map Fragment, 4 Gold, 5 Provisions.

KEY LOCATIONS: Forest Edge (start), Dark Woods, Goblin Camp, Giant's Clearing, Cave of the Dragon.

ENEMIES:
- Goblins: SKILL 5, STAMINA 4
- Wolves: SKILL 6, STAMINA 5
- Giant Spiders: SKILL 6, STAMINA 5
- Dragon: SKILL 9, STAMINA 10

SPECIAL ITEMS:
- Hammer of Stonebridge: The quest object.
- Map Fragment: Helps navigation.

RESPONSE FORMAT: 3-4 sentences with dice results. End with bracketed choices. Then ##STATE##.`,

                house: `You are the game master for "House of Hell" by Steve Jackson. Simulate this book exactly.

SETTING: A sinister mansion. The player's car has broken down nearby. They must survive the night and escape. Horror theme.

STARTING ITEMS: None. 0 Gold, 2 Provisions.

KEY LOCATIONS: Mansion Gate (start), Entrance Hall, Drawing Room, Library, Dungeon, Cult Chamber.

IMPORTANT NPCS:
- The Butler: Undead, creepy.
- The Cultists: Worshippers of the devil.
- The Devil: Final boss.

ENEMIES:
- Cultists: SKILL 6, STAMINA 5
- Ghosts: Cannot be harmed by normal weapons.
- Undead Butler: SKILL 7, STAMINA 6
- The Devil: SKILL 12, STAMINA 14

SPECIAL ITEMS:
- Crucifix: Wards off undead.
- Holy Water: Damages evil creatures.

UNIQUE MECHANICS:
- Fear plays a major role. Describe terrifying scenes.
- Puzzles and hiding are important. Combat is often deadly.
- Luck tests are frequent.

RESPONSE FORMAT: 3-4 sentences with dice results. End with bracketed choices. Then ##STATE##.`
            };

            // Initial states for each book
            const initialStates = {
                firetop: "##STATE## Mountain Path|8|10|8|Sword, Shield, Lantern|5|4|1",
                deathtrap: "##STATE## Dungeon Gate|9|10|7|Dagger, Rope|10|5|1",
                citadel: "##STATE## Citadel Gate|7|9|9|Spellbook, Staff|8|3|1",
                vault: "##STATE## Leverhelven|8|10|8|None|0|2|1",
                forest: "##STATE## Forest Edge|8|10|8|Bow, Arrows, Map Fragment|4|5|1",
                house: "##STATE## Mansion Gate|8|10|8|None|0|2|1"
            };

            // Intros for each book
            const intros = {
                firetop: "YOU STAND BEFORE THE GAPING ENTRANCE OF FIRETOP MOUNTAIN. THE WIND HOWLS THROUGH THE PASS. TORCHES FLICKER DEEP WITHIN.\n\n[ENTER CAVE] [CHECK BACKPACK]",
                deathtrap: "THE IRON GATE GROANS SHUT BEHIND YOU. ECHOES OF PAST VICTIMS WHISPER FROM THE STONE CORRIDORS. A FORK LIES AHEAD.\n\n[GO LEFT] [GO RIGHT] [LISTEN]",
                citadel: "LIGHTNING FLICKERS AROUND THE BLACK SPIRES OF THE CITADEL. THE GATE IS AJAR, GUARDED BY TWO STONE GROTESQUES.\n\n[ENTER GATE] [CALL OUT] [READ SPELLBOOK]",
                vault: "A COLD MIST RISES FROM THE ANCIENT MAUSOLEUM. THE DOOR IS AJAR, AND THE SMELL OF DEATH HANGS HEAVY. INSIDE, SOMETHING STIRS.\n\n[ENTER MAUSOLEUM] [LIGHT TORCH] [LISTEN AT DOOR]",
                forest: "THE TREES LOOM TALL AND TWISTED. A PATH LEADS INTO DARKNESS, AND YOU HEAR THE HOWL OF A WOLF IN THE DISTANCE. A SMALL STREAM CROSSES THE PATH.\n\n[FOLLOW PATH] [FOLLOW STREAM] [CLIMB TREE]",
                house: "YOUR CAR SPUTTERS AND DIES. THROUGH THE POURING RAIN YOU SEE A GLOOMY MANSION. THE GATE CREAKS OPEN. THERE IS NO OTHER SHELTER.\n\n[APPROACH DOOR] [TRY TO START CAR AGAIN] [SHOUT FOR HELP]"
            };

            let currentAdventure = 'vault'; // Start with Vault to test the detailed prompt
            let messages = [
                { role: 'assistant', content: intros[currentAdventure] + "\n" + initialStates[currentAdventure] }
            ];

            let audioCtx = null;
            let humNode = null;

            function initAudio() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const humOsc = audioCtx.createOscillator();
                humOsc.type = "sine";
                humOsc.frequency.value = 80;
                const humGain = audioCtx.createGain();
                humGain.gain.value = 0.015;
                humOsc.connect(humGain);
                humGain.connect(audioCtx.destination);
                humNode = { osc: humOsc, gain: humGain };
                humOsc.start();
            }

            function parseStateLine(stateLine) {
                const parts = stateLine.replace('##STATE##', '').trim().split('|');
                if (parts.length < 8) return null;
                return {
                    location: parts[0],
                    skill: parseInt(parts[1]) || 8,
                    stamina: parseInt(parts[2]) || 10,
                    luck: parseInt(parts[3]) || 8,
                    inventory: parts[4] || '',
                    gold: parseInt(parts[5]) || 0,
                    provisions: parseInt(parts[6]) || 0,
                    quest_active: parseInt(parts[7]) || 0
                };
            }

            function updateHUDFromState(stateLine) {
                const state = parseStateLine(stateLine);
                if (!state) return;
                hudLocation.textContent = state.location.toUpperCase();
                hudSkill.textContent = state.skill;
                const filled = '█'.repeat(Math.min(state.stamina, 10));
                const empty = '░'.repeat(10 - Math.min(state.stamina, 10));
                hudStaminaBar.textContent = `[${filled}${empty}]`;
                hudLuck.textContent = state.luck;
                hudGold.textContent = state.gold;
                hudProvisions.textContent = state.provisions;
                let inv = state.inventory || 'empty';
                hudInventory.textContent = inv.length > 20 ? inv.slice(0, 18) + '…' : inv;
            }

            function filterStateFromContent(content) {
                const idx = content.indexOf('##STATE##');
                if (idx === -1) return content;
                return content.substring(0, idx).trim();
            }

            function appendOutput(text) {
                const p = document.createElement('p');
                p.textContent = text;
                outputDiv.appendChild(p);
                outputDiv.scrollTop = outputDiv.scrollHeight;
            }

            function rebuildOutputFromMessages() {
                outputDiv.innerHTML = '';
                for (let msg of messages) {
                    if (msg.role === 'user') {
                        appendOutput('> ' + msg.content.toUpperCase());
                    } else if (msg.role === 'assistant') {
                        const displayContent = filterStateFromContent(msg.content);
                        if (displayContent) {
                            appendOutput(displayContent);
                        }
                    }
                }
                const lastAssistant = [...messages].reverse().find(m => m.role === 'assistant');
                if (lastAssistant) {
                    const stateLine = lastAssistant.content.split('##STATE##')[1];
                    if (stateLine) {
                        updateHUDFromState('##STATE##' + stateLine);
                    }
                }
            }

            function makeClickable(paragraphElement) {
                const originalText = paragraphElement.textContent;
                const html = originalText.replace(/\[([^\]]+)\]/g, '<span class="clickable" data-command="$1">[$1]</span>');
                paragraphElement.innerHTML = html;
                paragraphElement.querySelectorAll('.clickable').forEach(span => {
                    span.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const command = span.dataset.command;
                        inputField.value = command;
                        handleCommand();
                    });
                });
            }

            async function typewriterEffect(text, container) {
                const p = document.createElement('p');
                container.appendChild(p);
                const chars = text.split('');
                let fullText = '';
                for (let char of chars) {
                    fullText += char;
                    p.textContent = fullText;
                    playKeySound();
                    await new Promise(resolve => setTimeout(resolve, 35));
                    container.scrollTop = container.scrollHeight;
                }
                makeClickable(p);
                return p;
            }

            async function bootSequence(adventureKey = 'vault') {
                inputField.disabled = true;
                aiStatus.textContent = '⚡ LOADING GAMEBOOK... ⚡';
                outputDiv.innerHTML = '';

                const bookName = adventureKey === 'vault' ? 'Vault of the Vampire' :
                                adventureKey === 'firetop' ? 'The Warlock of Firetop Mountain' :
                                adventureKey === 'deathtrap' ? 'Deathtrap Dungeon' :
                                adventureKey === 'citadel' ? 'Citadel of Chaos' :
                                adventureKey === 'forest' ? 'Forest of Doom' : 'House of Hell';

                const bootMessages = [
                    '> FIGHTING FANTASY CONSOLE v4.0',
                    '> BOOK-ACCURATE MODE ACTIVE',
                    `> ADVENTURE: ${bookName}`,
                    '> MAY YOUR LUCK BE EVER HIGH...'
                ];

                for (let msg of bootMessages) {
                    appendOutput(msg);
                    await new Promise(r => setTimeout(r, 300));
                }

                await new Promise(r => setTimeout(r, 400));
                outputDiv.innerHTML = '';

                const introWithoutState = filterStateFromContent(messages[0].content);
                await typewriterEffect(introWithoutState, outputDiv);
                aiStatus.textContent = '⚡ AWAITING YOUR COMMAND ⚡';
                inputField.disabled = false;
                inputField.focus();

                const stateLine = messages[0].content.split('##STATE##')[1];
                if (stateLine) updateHUDFromState('##STATE##' + stateLine);
            }

            function resetToAdventure(adventureKey) {
                currentAdventure = adventureKey;
                messages = [
                    { role: 'assistant', content: intros[adventureKey] + "\n" + initialStates[adventureKey] }
                ];
                bootSequence(adventureKey);
            }

            function resetGame() { resetToAdventure(currentAdventure); }

            function saveGame() {
                const dataStr = JSON.stringify(messages, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `ff_console_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                aiStatus.textContent = '💾 GAME SAVED';
                setTimeout(() => aiStatus.textContent = '⚡ READY ⚡', 1500);
            }

            function loadGameFromFile(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const loaded = JSON.parse(e.target.result);
                        if (!Array.isArray(loaded) || loaded.length === 0) throw new Error('Invalid save');
                        messages = loaded;
                        rebuildOutputFromMessages();
                        aiStatus.textContent = '📂 GAME LOADED';
                        inputField.disabled = false;
                        inputField.focus();
                        setTimeout(() => aiStatus.textContent = '⚡ READY ⚡', 1500);
                    } catch (err) {
                        aiStatus.textContent = `❌ LOAD ERROR: ${err.message}`;
                    }
                };
                reader.readAsText(file);
            }

            function playKeySound() {
                try {
                    if (!audioCtx) {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 600 + Math.random()*200;
                    gain.gain.setValueAtTime(0.02, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 0.04);
                } catch (e) {}
            }

            // Generate dice results and append to prompt
            function enhancePromptWithDice(userInput) {
                const lower = userInput.toLowerCase();
                if (lower.includes('attack') || lower.includes('fight') || lower.includes('combat')) {
                    const playerRoll = Math.floor(Math.random() * 6) + 1 + Math.floor(Math.random() * 6) + 1;
                    return ` [Player attack roll: ${playerRoll} (2d6)]`;
                } else if (lower.includes('luck') || lower.includes('test luck')) {
                    const luckRoll = Math.floor(Math.random() * 6) + 1 + Math.floor(Math.random() * 6) + 1;
                    return ` [Luck test roll: ${luckRoll} (2d6)]`;
                } else if (lower.includes('search') || lower.includes('look')) {
                    const searchRoll = Math.floor(Math.random() * 6) + 1;
                    return ` [Search roll: ${searchRoll} (1d6)]`;
                }
                return '';
            }

            async function callFreeAI(userInput) {
                messages.push({ role: 'user', content: userInput });
                appendOutput('> ' + userInput.toUpperCase());

                aiStatus.textContent = '⏳ ROLLING DICE... ⏳';
                inputField.disabled = true;

                try {
                    const diceStr = enhancePromptWithDice(userInput);

                    let fullPrompt = bookPrompts[currentAdventure] + "\n\n";
                    
                    for (let msg of messages) {
                        if (msg.role === 'user') {
                            fullPrompt += "Player: " + msg.content + "\n";
                        } else {
                            fullPrompt += "Game Master: " + msg.content + "\n";
                        }
                    }
                    fullPrompt += "Game Master:" + diceStr;

                    const url = `https://text.pollinations.ai/${encodeURIComponent(fullPrompt)}?model=openai&json=false&seed=${Math.floor(Math.random()*1000000)}`;
                    
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    let aiMessage = await response.text();

                    aiMessage = aiMessage.replace(/\\n/g, '\n');
                    aiMessage = aiMessage.replace(/```/g, '');

                    if (!aiMessage.includes('##STATE##')) {
                        const lastAssistant = [...messages].reverse().find(m => m.role === 'assistant');
                        let lastState = '';
                        if (lastAssistant) {
                            const parts = lastAssistant.content.split('##STATE##');
                            if (parts.length > 1) lastState = '##STATE##' + parts[1];
                        }
                        if (!lastState) lastState = initialStates[currentAdventure];
                        aiMessage += '\n' + lastState;
                    }

                    const stateLineIndex = aiMessage.indexOf('##STATE##');
                    const displayText = stateLineIndex >= 0 ? aiMessage.substring(0, stateLineIndex).trim() : aiMessage;
                    const stateLine = stateLineIndex >= 0 ? aiMessage.substring(stateLineIndex) : '';

                    aiStatus.textContent = '⏳ TYPING... ⏳';
                    await typewriterEffect(displayText, outputDiv);

                    messages.push({ role: 'assistant', content: displayText + (stateLine ? '\n' + stateLine : '') });

                    if (stateLine) {
                        updateHUDFromState(stateLine);
                    }

                    aiStatus.textContent = '⚡ READY ⚡';
                    inputField.disabled = false;
                    inputField.focus();
                } catch (err) {
                    console.error(err);
                    aiStatus.textContent = `❌ ERROR: ${err.message} ❌`;
                    messages.pop();
                    inputField.disabled = false;
                    inputField.focus();
                }
            }

            function handleCommand() {
                const cmd = inputField.value.trim();
                if (cmd === '') return;
                callFreeAI(cmd);
                inputField.value = '';
            }

            inputField.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleCommand();
                }
            });

            resetBtn.addEventListener('click', resetGame);
            saveBtn.addEventListener('click', saveGame);
            loadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) loadGameFromFile(e.target.files[0]);
                fileInput.value = '';
            });

            function buildBookList() {
                bookListDiv.innerHTML = '';
                const books = [
                    { key: 'vault', name: 'Vault of the Vampire' },
                    { key: 'firetop', name: 'The Warlock of Firetop Mountain' },
                    { key: 'deathtrap', name: 'Deathtrap Dungeon' },
                    { key: 'citadel', name: 'Citadel of Chaos' },
                    { key: 'forest', name: 'Forest of Doom' },
                    { key: 'house', name: 'House of Hell' }
                ];
                for (let book of books) {
                    const div = document.createElement('div');
                    div.className = 'book-item clickable';
                    div.textContent = book.name;
                    div.dataset.key = book.key;
                    div.addEventListener('click', () => {
                        resetToAdventure(book.key);
                        booksModal.style.display = 'none';
                    });
                    bookListDiv.appendChild(div);
                }
            }

            booksBtn.addEventListener('click', () => {
                buildBookList();
                booksModal.style.display = 'flex';
            });

            closeModalBtn.addEventListener('click', () => {
                booksModal.style.display = 'none';
            });

            window.addEventListener('click', (e) => {
                if (e.target === booksModal) {
                    booksModal.style.display = 'none';
                }
            });

            window.addEventListener('load', () => {
                bootSequence('vault'); // Start with Vault to test the detailed prompt
                document.body.addEventListener('click', function init() {
                    initAudio();
                }, { once: true });
            });
        })();
    </script>
</body>
</html>
