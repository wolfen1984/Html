<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOOD CIRCUIT · TERMINAL ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0c0c0c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 16px;
        }
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(255, 30, 80, 0.03) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2;
        }
        .crt {
            animation: textflicker 0.01s infinite;
        }
        @keyframes textflicker {
            0% { text-shadow: 0 0 3px #1eff6c; }
            50% { text-shadow: 0 0 1px #1eff6c; }
            100% { text-shadow: 0 0 3px #1eff6c; }
        }
        .terminal {
            background: #000;
            color: #1eff6c;
            border: 4px solid #1eff6c;
            box-shadow: 0 0 15px #1eff6c, inset 0 0 10px #1eff6c;
            width: 100%;
            max-width: 950px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 20px 20px 15px 20px;
            position: relative;
            z-index: 1;
        }
        .header {
            border-bottom: 2px solid #1eff6c;
            padding-bottom: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            line-height: 1.8;
            text-transform: uppercase;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            text-shadow: 0 0 5px #1eff6c;
            letter-spacing: 1px;
        }
        .header-left, .header-right { color: #1eff6c; }
        .header-center {
            text-align: center;
            width: 100%;
            margin-top: 8px;
            font-size: 14px;
            background: #000;
            color: #1eff6c;
            padding: 6px 0;
            border: 2px solid #1eff6c;
            letter-spacing: 4px;
            box-shadow: inset 0 0 10px #1eff6c;
        }
        .output {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 8px;
            border: 2px solid #1eff6c;
            padding: 18px 14px;
            background: #000;
            scroll-behavior: auto;
            word-break: break-word;
            box-shadow: inset 0 0 20px #1eff6c;
        }
        .output p {
            margin: 0 0 14px 0;
            color: #1eff6c;
            text-shadow: 0 0 5px #1eff6c;
        }
        .output p:last-child { margin-bottom: 0; }

        /* HUD – diegetic tape‑reel style */
        .hud {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #1eff6c;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 11px;
            text-transform: uppercase;
            background: #000;
            box-shadow: inset 0 0 10px #1eff6c;
            font-family: 'Press Start 2P', monospace;
            color: #1eff6c;
            text-shadow: 0 0 5px #1eff6c;
            gap: 8px;
        }
        .hud-section {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .health-bar {
            display: inline-block;
            letter-spacing: 2px;
            font-size: 14px;
        }
        .reputation-bar {
            display: inline-block;
            letter-spacing: 2px;
            font-size: 14px;
        }
        .hud-label {
            opacity: 0.8;
            font-size: 9px;
        }

        .input-line {
            display: flex;
            align-items: center;
            border-top: 2px solid #1eff6c;
            padding-top: 12px;
            font-size: 16px;
        }
        .prompt { 
            color: #1eff6c; 
            margin-right: 10px; 
            font-size: 18px;
            text-shadow: 0 0 8px #1eff6c;
        }
        #userInput {
            flex: 1;
            background: #000;
            border: 2px solid #1eff6c;
            color: #1eff6c;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 16px;
            padding: 12px 12px;
            outline: none;
            text-transform: uppercase;
            box-shadow: 0 0 8px #1eff6c;
        }
        #userInput::placeholder { 
            color: #1eff6c; 
            font-size: 11px; 
            text-transform: none; 
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            color: red;
            margin-top: 10px;
            border-top: 1px solid #1eff6c;
            padding-top: 8px;
            text-shadow: 0 0 5px red;
        }
        .footer-left, .footer-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .clickable {
            color: #ff1e4f;
            text-decoration: underline;
            cursor: pointer;
            text-shadow: 0 0 5px #ff1e4f;
            transition: all 0.1s ease;
        }
        .clickable:hover {
            color: #1eff6c;
            text-shadow: 0 0 10px #ff1e4f, 0 0 20px #ff1e4f;
            background: #ff1e4f20;
        }
        .status {
            color: red;
            font-size: 9px;
            margin-top: 8px;
            letter-spacing: 1px;
            text-align: right;
            text-shadow: 0 0 5px red;
        }
        #fileInput { display: none; }
    </style>
</head>
<body class="crt">
    <div class="terminal">
        <div class="header">
            <div class="header-left">BLOOD CIRCUIT<br>BOUNTY DIVISION</div>
            <div class="header-right">CASE FILE: #BC-2147<br>CLASSIFIED</div>
            <div class="header-center">⏣ THE CIRCUIT ⏣</div>
        </div>

        <!-- Diegetic HUD -->
        <div id="hudContainer" class="hud">
            <div class="hud-section"><span class="hud-label">LOC:</span> <span id="hudLocation">LOFT</span></div>
            <div class="hud-section"><span class="hud-label">HP:</span> <span id="hudHealthBar" class="health-bar">[██████░░]</span></div>
            <div class="hud-section"><span class="hud-label">TIME:</span> <span id="hudTime">21:00</span></div>
            <div class="hud-section"><span class="hud-label">WX:</span> <span id="hudWeather">RAIN</span></div>
            <div class="hud-section"><span class="hud-label">CORP:</span> <span id="hudRepCorp" class="reputation-bar">[··]</span></div>
            <div class="hud-section"><span class="hud-label">UND:</span> <span id="hudRepUnder" class="reputation-bar">[··]</span></div>
            <div class="hud-section"><span class="hud-label">PD:</span> <span id="hudRepPolice" class="reputation-bar">[··]</span></div>
        </div>

        <div id="outputArea" class="output">
            <!-- boot sequence appears here -->
        </div>

        <div class="input-line">
            <span class="prompt">❯</span>
            <input type="text" id="userInput" placeholder="ENTER COMMAND..." autofocus disabled>
        </div>
        <div class="status" id="aiStatus">⚡ SYSTEM BOOTING... ⚡</div>
        
        <div class="footer">
            <div class="footer-left">
                <span class="clickable" id="saveBtn">[SAVE]</span>
                <span class="clickable" id="loadBtn">[LOAD]</span>
            </div>
            <div class="footer-right">
                <span class="clickable" id="resetBtn">[RESET]</span>
                <span>BLOOD CIRCUIT 2147</span>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".json,application/json">

    <script>
        (function() {
            // DOM elements
            const outputDiv = document.getElementById('outputArea');
            const inputField = document.getElementById('userInput');
            const aiStatus = document.getElementById('aiStatus');
            const resetBtn = document.getElementById('resetBtn');
            const saveBtn = document.getElementById('saveBtn');
            const loadBtn = document.getElementById('loadBtn');
            const fileInput = document.getElementById('fileInput');
            const hudLocation = document.getElementById('hudLocation');
            const hudHealthBar = document.getElementById('hudHealthBar');
            const hudTime = document.getElementById('hudTime');
            const hudWeather = document.getElementById('hudWeather');
            const hudRepCorp = document.getElementById('hudRepCorp');
            const hudRepUnder = document.getElementById('hudRepUnder');
            const hudRepPolice = document.getElementById('hudRepPolice');

            // ========== SYSTEM PROMPT (no Blade Runner references) ==========
            const systemPrompt = `You are the game master for a dystopian cyberpunk interactive fiction game called BLOOD CIRCUIT. The player is a bounty hunter in a sprawling metropolis, hunting rogue synthetics.

You MUST track the following variables and include them at the END of each response in the exact format:
##STATE## location|health|time|weather|rep_corp|rep_underworld|rep_police|quest_active

- location: one of [Your Loft, Central Precinct, Neon Bazaar, SynthCorp Tower, The Docks, Rustyard, Circuit Arena, Red Light Sector]
- health: 0-10
- time: 24h format (e.g., 21:30). Advance time slowly (1-2 hours per major action)
- weather: Rain, Mist, Clear, Smog
- rep_corp: -5 to 5 (corporate reputation)
- rep_underworld: -5 to 5 (criminal reputation)
- rep_police: -5 to 5 (central precinct reputation)
- quest_active: 0 or 1 (whether the main bounty is active)

The narrative should be atmospheric noir style with dystopian, rain-soaked elements. Responses should be 1-2 sentences. End with a clear prompt for the player's next action.

IMPORTANT: Inject occasional random encounters based on location and reputation. 
**To lower the barrier for players, include clickable action suggestions in brackets**, like [CHECK TERMINAL] or [GO TO CENTRAL PRECINCT] or [EXAMINE DRONE]. Use them sparingly for key actions — about one per response, sometimes two.`;

            const introMessage = `RAIN SLASHES ACROSS THE NEON-DRENCHED STREETS OF THE METROPOLIS. YOU SIT IN YOUR LOFT, A HALF-EMPTY BOTTLE OF SYNTHWHISKEY ON THE TABLE. YOUR AIRCAR IS PARKED ON THE ROOF. THE TERMINAL BLINKS: A NEW BOUNTY FROM CENTRAL PRECINCT.\n\nWHAT DO YOU DO? [CHECK TERMINAL] [EXIT LOFT]`;

            const initialState = "##STATE## Your Loft|10|21:00|Rain|0|0|0|1";

            let messages = [
                { role: 'assistant', content: introMessage + "\n" + initialState }
            ];

            // Audio context
            let audioCtx = null;
            let rainNode = null;
            let humNode = null;
            let currentLocation = "Your Loft";

            // Floppy sound nodes
            let floppySource = null;
            let floppyGain = null;
            let floppyLooping = false;

            // Initialize audio and ambient
            function initAudio() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                // Rain noise
                const bufferSize = 2 * audioCtx.sampleRate;
                const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = noiseBuffer;
                noise.loop = true;

                const filter = audioCtx.createBiquadFilter();
                filter.type = "lowpass";
                filter.frequency.value = 1000;

                const gain = audioCtx.createGain();
                gain.gain.value = 0.1;

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                rainNode = { noise, filter, gain };

                // City hum
                const humOsc = audioCtx.createOscillator();
                humOsc.type = "sine";
                humOsc.frequency.value = 120;
                const humGain = audioCtx.createGain();
                humGain.gain.value = 0.02;
                humOsc.connect(humGain);
                humGain.connect(audioCtx.destination);
                humNode = { osc: humOsc, gain: humGain };

                noise.start();
                humOsc.start();
            }

            // ========== FLOPPY DISK DRIVE SOUND ==========
            function createFloppyBuffer(ctx) {
                const duration = 3.0; // seconds, then loop
                const sampleRate = ctx.sampleRate;
                const buffer = ctx.createBuffer(1, sampleRate * duration, sampleRate);
                const data = buffer.getChannelData(0);
                
                // Constants
                const motorBaseFreq = 110; // Hz – low hum
                let time = 0;
                const dt = 1 / sampleRate;
                
                for (let i = 0; i < buffer.length; i++) {
                    time = i * dt;
                    
                    // 1. Motor hum with slight amplitude modulation
                    let humAmp = 0.1 + 0.03 * Math.sin(2 * Math.PI * 1.5 * time);
                    let motor = humAmp * Math.sin(2 * Math.PI * motorBaseFreq * time);
                    
                    // Add a bit of higher harmonic
                    motor += 0.03 * Math.sin(2 * Math.PI * motorBaseFreq * 2 * time);
                    
                    // 2. Head stepping clicks (random pulses, short duration)
                    let click = 0;
                    if (Math.random() < 0.008 * 10) {
                        let noise = (Math.random() * 2 - 1) * 0.2;
                        click = noise * 0.3;
                    }
                    
                    // 3. Continuous high-frequency hiss
                    let hiss = (Math.random() * 2 - 1) * 0.03;
                    
                    // Combine
                    let sample = motor + click + hiss;
                    
                    // Soft clip
                    if (sample > 0.8) sample = 0.8;
                    if (sample < -0.8) sample = -0.8;
                    
                    data[i] = sample;
                }
                
                // Add a couple of intentional "seek clicks"
                for (let clickTime of [0.4, 1.2, 2.1]) {
                    let idx = Math.floor(clickTime * sampleRate);
                    if (idx < buffer.length) {
                        for (let j = 0; j < sampleRate * 0.02; j++) {
                            if (idx + j < buffer.length) {
                                data[idx + j] += (Math.random() * 2 - 1) * 0.5 * (1 - j/(sampleRate*0.02));
                            }
                        }
                    }
                }
                
                return buffer;
            }

            function startFloppySound() {
                if (!audioCtx) {
                    initAudio();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                stopFloppySound();

                floppyGain = audioCtx.createGain();
                floppyGain.gain.value = 0.1;
                floppyGain.connect(audioCtx.destination);

                const buffer = createFloppyBuffer(audioCtx);
                floppySource = audioCtx.createBufferSource();
                floppySource.buffer = buffer;
                floppySource.loop = true;
                floppySource.connect(floppyGain);
                floppySource.start();
                floppyLooping = true;
            }

            function stopFloppySound() {
                if (floppySource) {
                    try {
                        floppySource.stop();
                    } catch (e) {}
                    floppySource.disconnect();
                    floppySource = null;
                }
                if (floppyGain) {
                    floppyGain.disconnect();
                    floppyGain = null;
                }
                floppyLooping = false;
            }

            function updateAmbientSound(location) {
                if (!audioCtx || !rainNode || !humNode) return;
                let rainVol = 0.1;
                let humFreq = 120;
                let humVol = 0.02;
                switch(location) {
                    case "The Docks":
                        rainVol = 0.25;
                        humFreq = 80;
                        break;
                    case "SynthCorp Tower":
                        rainVol = 0.05;
                        humFreq = 200;
                        humVol = 0.05;
                        break;
                    case "Neon Bazaar":
                        rainVol = 0.15;
                        humFreq = 150;
                        break;
                    case "Your Loft":
                        rainVol = 0.1;
                        humFreq = 100;
                        break;
                    default:
                        rainVol = 0.15;
                }
                rainNode.gain.gain.setValueAtTime(rainVol, audioCtx.currentTime);
                humNode.osc.frequency.setValueAtTime(humFreq, audioCtx.currentTime);
                humNode.gain.gain.setValueAtTime(humVol, audioCtx.currentTime);
            }

            function updateHUDFromState(stateLine) {
                const parts = stateLine.replace('##STATE##', '').trim().split('|');
                if (parts.length < 8) return;
                const [loc, health, time, weather, repC, repU, repP, quest] = parts;
                hudLocation.textContent = loc.toUpperCase();
                const healthNum = parseInt(health) || 10;
                const filled = '█'.repeat(healthNum);
                const empty = '░'.repeat(10 - healthNum);
                hudHealthBar.textContent = `[${filled}${empty}]`;
                hudTime.textContent = time;
                hudWeather.textContent = weather;
                hudRepCorp.textContent = formatRep(parseInt(repC));
                hudRepUnder.textContent = formatRep(parseInt(repU));
                hudRepPolice.textContent = formatRep(parseInt(repP));
                if (currentLocation !== loc) {
                    currentLocation = loc;
                    updateAmbientSound(loc);
                }
            }

            function formatRep(val) {
                if (val > 0) return `+${val}`;
                return `${val}`;
            }

            function filterStateFromContent(content) {
                const idx = content.indexOf('##STATE##');
                if (idx === -1) return content;
                return content.substring(0, idx).trim();
            }

            function appendOutput(text) {
                const p = document.createElement('p');
                p.textContent = text;
                outputDiv.appendChild(p);
                outputDiv.scrollTop = outputDiv.scrollHeight;
            }

            function rebuildOutputFromMessages() {
                outputDiv.innerHTML = '';
                for (let msg of messages) {
                    if (msg.role === 'user') {
                        appendOutput('> ' + msg.content.toUpperCase());
                    } else if (msg.role === 'assistant') {
                        const displayContent = filterStateFromContent(msg.content);
                        if (displayContent) {
                            appendOutput(displayContent);
                        }
                    }
                }
                const lastAssistant = [...messages].reverse().find(m => m.role === 'assistant');
                if (lastAssistant) {
                    const stateLine = lastAssistant.content.split('##STATE##')[1];
                    if (stateLine) {
                        updateHUDFromState('##STATE##' + stateLine);
                    }
                }
            }

            function makeClickable(paragraphElement) {
                const originalText = paragraphElement.textContent;
                const html = originalText.replace(/\[([^\]]+)\]/g, '<span class="clickable" data-command="$1">[$1]</span>');
                paragraphElement.innerHTML = html;
                paragraphElement.querySelectorAll('.clickable').forEach(span => {
                    span.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const command = span.dataset.command;
                        inputField.value = command;
                        handleCommand();
                    });
                });
            }

            async function typewriterEffect(text, container) {
                const p = document.createElement('p');
                container.appendChild(p);
                const chars = text.split('');
                let fullText = '';
                for (let char of chars) {
                    fullText += char;
                    p.textContent = fullText;
                    playKeySound();
                    await new Promise(resolve => setTimeout(resolve, 45));
                    container.scrollTop = container.scrollHeight;
                }
                makeClickable(p);
                return p;
            }

            async function bootSequence() {
                inputField.disabled = true;
                aiStatus.textContent = '⚡ SYSTEM BOOTING... ⚡';
                outputDiv.innerHTML = '';

                const bootMessages = [
                    '> BLOOD CIRCUIT OS v3.7 (2147)',
                    '> 128K MEMORY CHECK... OK',
                    '> AIRCAR INTERFACE... ONLINE',
                    '> SYNTH SCAN MODULE... ONLINE',
                    '> LOADING CASE FILE #BC-2147...'
                ];

                for (let msg of bootMessages) {
                    appendOutput(msg);
                    await new Promise(r => setTimeout(r, 400));
                }

                appendOutput('> BOOT SEQUENCE: ');
                const barContainer = document.createElement('p');
                outputDiv.appendChild(barContainer);
                for (let i = 0; i <= 20; i++) {
                    barContainer.textContent = '> BOOT SEQUENCE: [' + '█'.repeat(i) + '░'.repeat(20-i) + ']';
                    outputDiv.scrollTop = outputDiv.scrollHeight;
                    await new Promise(r => setTimeout(r, 80));
                }
                await new Promise(r => setTimeout(r, 300));
                outputDiv.innerHTML = '';
                const introWithoutState = filterStateFromContent(introMessage);
                await typewriterEffect(introWithoutState, outputDiv);
                aiStatus.textContent = '⚡ SYSTEM WAITING // AWAITING INPUT ⚡';
                inputField.disabled = false;
                inputField.focus();
                updateHUDFromState(initialState);
            }

            function resetGame() {
                messages = [
                    { role: 'assistant', content: introMessage + "\n" + initialState }
                ];
                bootSequence();
            }

            function saveGame() {
                const dataStr = JSON.stringify(messages, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `blood_circuit_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                aiStatus.textContent = '💾 CASE SAVED';
                setTimeout(() => aiStatus.textContent = '⚡ SYSTEM WAITING // READY ⚡', 1500);
            }

            function loadGameFromFile(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const loaded = JSON.parse(e.target.result);
                        if (!Array.isArray(loaded) || loaded.length === 0) {
                            throw new Error('Invalid save file');
                        }
                        messages = loaded;
                        rebuildOutputFromMessages();
                        aiStatus.textContent = '📂 CASE LOADED';
                        inputField.disabled = false;
                        inputField.focus();
                        setTimeout(() => aiStatus.textContent = '⚡ SYSTEM WAITING // READY ⚡', 1500);
                    } catch (err) {
                        aiStatus.textContent = `❌ LOAD ERROR: ${err.message}`;
                    }
                };
                reader.readAsText(file);
            }

            function playKeySound() {
                try {
                    if (!audioCtx) {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 800;
                    gain.gain.setValueAtTime(0.03, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 0.05);
                } catch (e) {}
            }

            async function callFreeAI(userInput) {
                messages.push({ role: 'user', content: userInput });
                appendOutput('> ' + userInput.toUpperCase());

                aiStatus.textContent = '⏳ SYSTEM PROCESSING... ⏳';
                inputField.disabled = true;

                // Start floppy drive sound
                startFloppySound();

                try {
                    let fullPrompt = systemPrompt + "\n\n";
                    for (let msg of messages) {
                        if (msg.role === 'user') {
                            fullPrompt += "Player: " + msg.content + "\n";
                        } else {
                            fullPrompt += "Game Master: " + msg.content + "\n";
                        }
                    }
                    fullPrompt += "Game Master:";

                    const url = `https://text.pollinations.ai/${encodeURIComponent(fullPrompt)}?model=openai&json=false&seed=${Math.floor(Math.random()*1000000)}`;
                    
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    let aiMessage = await response.text();

                    // Stop floppy sound immediately
                    stopFloppySound();

                    if (!aiMessage.includes('##STATE##')) {
                        const lastAssistant = [...messages].reverse().find(m => m.role === 'assistant');
                        let lastState = '';
                        if (lastAssistant) {
                            const parts = lastAssistant.content.split('##STATE##');
                            if (parts.length > 1) lastState = '##STATE##' + parts[1];
                        }
                        if (!lastState) lastState = initialState;
                        aiMessage += '\n' + lastState;
                    }

                    const stateLineIndex = aiMessage.indexOf('##STATE##');
                    const displayText = stateLineIndex >= 0 ? aiMessage.substring(0, stateLineIndex).trim() : aiMessage;
                    const stateLine = stateLineIndex >= 0 ? aiMessage.substring(stateLineIndex) : '';

                    aiStatus.textContent = '⏳ SYSTEM TYPING... ⏳';
                    await typewriterEffect(displayText, outputDiv);

                    messages.push({ role: 'assistant', content: displayText + (stateLine ? '\n' + stateLine : '') });

                    if (stateLine) {
                        updateHUDFromState(stateLine);
                    }

                    aiStatus.textContent = '⚡ SYSTEM WAITING // READY ⚡';
                    inputField.disabled = false;
                    inputField.focus();
                } catch (err) {
                    stopFloppySound();
                    console.error(err);
                    aiStatus.textContent = `❌ ERROR: ${err.message} ❌`;
                    messages.pop();
                    inputField.disabled = false;
                    inputField.focus();
                }
            }

            function handleCommand() {
                const cmd = inputField.value.trim();
                if (cmd === '') return;
                callFreeAI(cmd);
                inputField.value = '';
            }

            inputField.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleCommand();
                }
            });

            resetBtn.addEventListener('click', resetGame);
            saveBtn.addEventListener('click', saveGame);
            loadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) loadGameFromFile(e.target.files[0]);
                fileInput.value = '';
            });

            window.addEventListener('load', () => {
                bootSequence();
                document.body.addEventListener('click', function init() {
                    initAudio();
                    updateAmbientSound(currentLocation);
                }, { once: true });
            });
        })();
    </script>
</body>
</html>
