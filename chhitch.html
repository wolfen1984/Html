                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.6;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                allNodes.forEach(n => n.start(now));
                stringAmbientActive = {
                    nodes: allNodes,
                    gainNode,
                    wetSend,
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 1);
                        allNodes.forEach(n => { try { n.stop(ctx.currentTime + 1.2); } catch (e) {} });
                    }
                };
            }

            function stopStringAmbient() {
                if (stringAmbientActive) { stringAmbientActive.stop();
                    stringAmbientActive = null; }
            }

            function startCrossroadsAmbient(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                const theme = LYNCH_AMBIENT[themeName] || LYNCH_AMBIENT.intro;
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(theme.intensity * 0.2, now + 1.5);
                const oscs = [];
                for (let i = 0; i < 3; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i === 0 ? 'sawtooth' : i === 1 ? 'triangle' : 'sawtooth';
                    const detune = (i - 1) * theme.detuneSpread;
                    osc.frequency.value = theme.rootFreq * Math.pow(2, detune / 1200);
                    oscs.push(osc);
                }
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = theme.filterBase;
                filter.Q.value = 2.5;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = theme.lfoRate;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 80;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                oscs.forEach(o => o.connect(filter));
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.55;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                oscs.forEach(o => o.start(now));
                lfo.start(now);
                if (theme.noiseMix > 0) {
                    const bufferSize = ctx.sampleRate * 2;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * theme.noiseMix;
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    noise.loop = true;
                    const noiseFilter = ctx.createBiquadFilter();
                    noiseFilter.type = 'lowpass';
                    noiseFilter.frequency.value = theme.filterBase * 0.7;
                    noiseFilter.Q.value = 0.3;
                    const noiseGain = ctx.createGain();
                    noiseGain.gain.value = theme.noiseMix * 0.3;
                    noise.connect(noiseFilter);
                    noiseFilter.connect(noiseGain);
                    noiseGain.connect(gainNode);
                    noise.start(now);
                    oscs.push(noise);
                }
                sectionAmbientActive = {
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.6);
                        oscs.forEach(s => { try { s.stop(ctx.currentTime + 0.8); } catch (e) {} });
                        try { lfo.stop(ctx.currentTime + 0.8); } catch (e) {}
                        sectionAmbientActive = null;
                    }
                };
                startStringLayer(theme);
                startEvolvingPatternPlayer(themeName, 40, sectionThemeScore);
            }

            function transitionSectionTheme(themeName, scoreData) {
                if (scoreData) sectionThemeScore = scoreData;
                startCrossroadsAmbient(themeName);
            }

            function stopSectionAmbient() {
                if (sectionAmbientActive) { sectionAmbientActive.stop();
                    sectionAmbientActive = null; }
                stopStringAmbient();
                stopPatternPlayer();
                clearTimeout(crossfadeTimeout);
            }

            function updateScoreIndicator(theme, variation, bar) {
                const indicator = document.getElementById('scoreIndicator');
                const themeLabel = document.getElementById('scoreThemeLabel');
                const variationLabel = document.getElementById('scoreVariationLabel');
                const barLabel = document.getElementById('scoreBarLabel');
                const progressFill = document.getElementById('scoreProgressFill');
                if (!indicator) return;
                indicator.style.display = 'block';
                if (themeLabel) themeLabel.textContent = theme || 'intro';
                if (variationLabel) variationLabel.textContent = variation || 'A';
                if (barLabel) barLabel.textContent = `bar ${bar || 1}`;
                if (progressFill) {
                    const pct = Math.min(100, ((bar || 1) / 12) * 100);
                    progressFill.style.width = pct + '%';
                }
            }

            function saveState() {
                try { localStorage.setItem('tales_of_betrayal_state', JSON.stringify(gameState)); } catch (e) {}
            }

            function loadState() {
                try {
                    const saved = localStorage.getItem('tales_of_betrayal_state');
                    if (saved) gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
                    gameState.episodes = gameState.episodes || [];
                    gameState.performance = gameState.performance || null;
                } catch (e) {}
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 28000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) { const errText = await res.text(); throw new Error(`API error ${res.status}: ${errText}`); }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') throw new Error('Request timed out. Please try again.');
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s suspense thriller, small town mystery, moody cinematography, grainy film')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e;
                        await new Promise(r => setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else {
                            clearInterval(timer);
                            resolve();
                        }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                return new Promise((resolve, reject) => {
                    if (!text) { resolve(); return; }
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David',
                        'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = 0.62;
                    utterance.pitch = 0.9;
                    utterance.onend = () => resolve();
                    utterance.onerror = (e) => { console.warn('TTS error:', e);
                        resolve(); };
                    speechSynthesis.speak(utterance);
                });
            }

            // ─── Story & Score Generation ────────────────────────────────

            async function generateNewStory() {
                const system =
                    `You are Edgar Vane, the gravel-voiced host of Tales of Betrayal. You narrate tense, psychological suspense stories about ordinary people with dark secrets. Your tone is knowing, weary, and quietly devastating.`;
                const prompt =
                    `Write a 900 to 1100 word suspense story set in the 1980s in a remote small town. Use tight third-person prose. No supernatural elements whatsoever – no ghosts, curses, magic, dreams, or premonitions. The horror must be purely psychological and human, centered around a SECRET. Choose one secret type: Hidden Past, Missing Person, Family Secret, Cover-Up, Blackmail, False Identity, Buried Crime, or Witness. Structure: a slow-burn mundane setup establishing the secret's weight, then mounting tension as the secret begins to surface, then a gripping confrontation or unraveling, and finally an ironic, earned twist where the truth comes at a devastating price. Think Hitchcock meets Stephen King – suspenseful, character-driven, with a gut-punch ending. No easy escapes or dream cop-outs. Frame the story with Edgar Vane's brief sardonic intro naming the type of secret, and close with his cold, memorable punchline. Return ONLY a valid JSON object with these fields: title (string), secret_type (one of the listed types), story (full narration string, use backslash n for line breaks), closing_remark (the chilling sign-off phrase). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: prompt }
                ], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) {
                    throw new Error('Invalid story structure …');
                }
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Suspense thriller poster for "${story.title}", 1980s small town mystery, moody blue tones, cinematic, grainy film, Hitchcock style`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) {
                    console.warn('Could not generate story poster:', e);
                }
                gameState.performance = {
                    title: story.title,
                    secret_type: story.secret_type || 'Hidden Past',
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            // ─── AI Soundtrack Generation (no fallbacks) ──────────────────

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system = `You are a sound designer for a Hitchcock-style suspense drama with a full orchestra.
        Given a short story, return JSON with THREE keys:
        - "sections": array of 5-6 sections dividing the story into emotional acts. Each has "theme" (one of: intro, setup, scheme, execution, twist, closing), "start_char" (inclusive), "end_char" (exclusive). Cover entire story from 0 to ${length}.
        - "cues": array of sound events using types: "sting", "pulse", "thunder", "bell", "climax", "industrial_hum", "pad", "string_pad", "cello_drone", "string_swell", "violin_texture", "pizzicato", "string_cluster", "bass", "kick", "snare". Include at least 40 cues spread evenly.
        - "score": object with keys matching theme names. Each key: "bpm" (40-80), "bass" (array of 8 integers 0-24), "kick" (array of 8 integers 0/1), "snare" (array of 8 integers 0/1), "hat" (array of 8 integers 0/1).
        Return ONLY raw JSON.`;
                const userPrompt = `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and score patterns.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: userPrompt }
                ], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try { data = JSON.parse(cleaned); } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) { const candidate = match[0].replace(/,\s*([}\]])/g, '$1'); try { data = JSON.parse(
                            candidate); } catch (e2) { throw new Error('Failed to parse AI soundtrack JSON.'); } } else
                        throw new Error('No JSON found in AI response.');
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                    throw new Error('Missing sections, cues, or score in AI response');

                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char < length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({
                    type: c.type,
                    position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7
                }));

                const requiredThemes = ['intro', 'setup', 'scheme', 'execution', 'twist', 'closing'];
                const score = {};

                function normalizeArray(arr, maxVal = 24) {
                    if (!Array.isArray(arr)) throw new Error('Expected array, got ' + typeof arr);
                    let clean = arr.map(v => { const num = Number(v); return isNaN(num) ? 0 : Math.min(maxVal, Math.max(
                            0, Math.round(num))); });
                    if (clean.length < 8) { while (clean.length < 8) clean.push(0); } else if (clean.length > 8) { clean =
                            clean.slice(0, 8); }
                    return clean;
                }

                for (const theme of requiredThemes) {
                    if (!data.score[theme]) throw new Error(`AI did not provide a score for theme "${theme}".`);
                    const s = data.score[theme];
                    if (typeof s.bpm !== 'number' || s.bpm < 30 || s.bpm > 120)
                        throw new Error(`Invalid bpm for theme "${theme}": ${s.bpm}`);
                    const bass = normalizeArray(s.bass, 24);
                    const kick = normalizeArray(s.kick, 1);
                    const snare = normalizeArray(s.snare, 1);
                    const hat = normalizeArray(s.hat, 1);
                    score[theme] = { bpm: s.bpm, bass, kick, snare, hat };
                }
                return { sections: sortedSections, cues, score };
            }

            // ─── Performance ──────────────────────────────────────────────

            async function generateAndPerform() {
                await generateNewStory();
                if (!gameState.performance) throw new Error('Failed to generate story');
                const soundtrack = await generateSoundCueSheet(gameState.performance.rawStoryText);
                gameState.performance.soundCues = soundtrack;
                saveState();
                await startPerformance();
            }

            async function startPerformance() {
                speechSynthesis.cancel();
                if (window.chTimeout) clearTimeout(window.chTimeout);
                const storyData = gameState.performance;
                if (!storyData || !storyData.story) {
                    await generateNewStory();
                    return startPerformance();
                }
                await getAudioContext();

                let sectionList = null,
                    cueList = null,
                    scoreData = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) {
                        cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                    } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                        sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                        scoreData = storyData.soundCues.score;
                    }
                }

                const bubble = document.getElementById('chSpeechBubble');
                const dialogue = document.getElementById('chDialogue');
                const imageEl = document.getElementById('chSegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('chGuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#0ab8d8';
                bubble.style.boxShadow = '0 0 30px #0ab8d888';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('chBackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('chAddEpisodeBtn');
                if (oldAdd) oldAdd.remove();
                const posterContainer = document.getElementById('chPosterContainer');
                const posterTitle = document.getElementById('chPosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) posterTitle.textContent = storyData.title || '';
                } else if (posterContainer) {
                    posterContainer.classList.add('no-image');
                }

                const secretLabel = storyData.secret_type || 'Hidden Past';
                const intro =
                    `"Good evening… I'm Edgar Vane. Tonight's tale concerns a ${secretLabel}. A secret kept too long. A truth that festered in the dark. This is… '${storyData.title}'."`;
                dialogue.textContent = '';
                await speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 50);
                await new Promise(r => setTimeout(r, 1500));

                // Start the AI orchestra
                if (sectionList && sectionList.length > 0) {
                    transitionSectionTheme(sectionList[0].theme, scoreData);
                } else if (scoreData) {
                    transitionSectionTheme('intro', scoreData);
                }

                // Score indicator loop
                let indicatorInterval = setInterval(() => {
                    if (patternPlayerActive) {
                        const theme = patternPlayerActive.theme || 'intro';
                        const varIdx = currentVariationIdx;
                        const varName = currentSectionPatterns[varIdx] ? currentSectionPatterns[varIdx].name : 'A';
                        const bar = barsInVariation + 1;
                        updateScoreIndicator(theme, varName, bar);
                    } else {
                        updateScoreIndicator('...', '—', 0);
                    }
                }, 1000);

                const storyText = storyData.rawStoryText || storyData.story;
                if (!storyText) {
                    console.warn('No story text');
                    await showClosingAndFinish(storyData, dialogue, indicatorInterval);
                    return;
                }

                // ─── Build cue checker ──────────────────────────────────────
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b.start_char) :
                        [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) {
                                currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme, scoreData);
                            }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) {
                                triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity);
                            }
                            cueIdx++;
                        }
                    };
                }

                // ─── Type + speak in parallel ──────────────────────────────
                dialogue.textContent = '';
                const typingPromise = typewriterEffect(dialogue, storyText, 30, cueChecker);
                const speechPromise = speakTextMale(storyText);
                await speechPromise;
                await typingPromise;

                // ─── Finish ──────────────────────────────────────────────────
                await showClosingAndFinish(storyData, dialogue, indicatorInterval);
            }

            async function showClosingAndFinish(storyData, dialogue, indicatorInterval) {
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#b8d4e0';
                dialogue.appendChild(closingLine);

                const closingSpeech = speakTextMale(closing);
                const closingTyping = typewriterEffect(closingLine, closing, 42);
                await Promise.all([closingSpeech, closingTyping]);

                await new Promise(r => setTimeout(r, 1000));

                const curtainText = document.createElement('p');
                curtainText.textContent = '— Fade to black —';
                stopSectionAmbient();
                stopPatternPlayer();
                clearInterval(indicatorInterval);
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                curtainText.style.color = '#4a6a78';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();

                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Leave';
                leaveBtn.addEventListener('click', () => { leaveTheater(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'chAddEpisodeBtn';
                addBtn.textContent = '➕ Save Episode';
                addBtn.addEventListener('click', () => {
                    addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Saved';
                });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.performance;
                if (!perf) return;
                gameState.episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
                saveState();
                setTimeout(() => leaveTheater(), 600);
            }

            function leaveTheater() {
                stopAmbient();
                stopSectionAmbient();
                stopPatternPlayer();
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                renderChannel();
            }

            // ─── Init ──────────────────────────────────────────────────────

            function init() {
                loadState();
                renderChannel();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('tales_of_betrayal_key', key);
                    }
                });
                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) {
                        showModal(HOST_BIO);
                    }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeModal();
                });
                if (!apiKey) {
                    setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                }
                document.addEventListener('click', () => { getAudioContext().catch(() => {}); }, { once: true });
            }
            init();
        })();
    </script>
</body>
</html>
