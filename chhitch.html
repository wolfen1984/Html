<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>TALES OF BETRAYAL · 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Abril+Fatface&family=Special+Elite&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04080c;
            --screen-bg: #060c10;
            --panel-bg: #080c14;
            --text: #b0bcc4;
            --text-dim: #4a6a78;
            --text-bright: #c8dce6;
            --accent: #0ab8d8;
            --accent-dim: #082a38;
            --border: #0a7a9a;
            --border-glow: 0 0 14px #0ab8d855, 0 0 32px #082a3822;
            --danger: #0a9ec8;
            --danger-glow: 0 0 12px #0ab8d844;
            --amber: #7ab8d0;
            --amber-dim: #1a3a4a;
            --gold: #8cc8e0;
            --gold-dim: #1a3040;
            --green: #3a7a6a;
            --input-bg: #0e1418;
            --button-bg: #121820;
            --button-hover: #182028;
            --button-active: #101820;
            --bevel-light: #1a2a34;
            --bevel-dark: #020608;
            --font-display: 'Abril Fatface', 'Crimson Text', Georgia, serif;
            --font-title: 'Abril Fatface', 'Crimson Text', Georgia, serif;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 30px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0a1018 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #101418;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #1a2830, 0 0 0 4px #0a1018, 0 0 0 8px #04080c, 0 8px 48px #000000dd, 0 0 60px #082a3822;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #0ab8d888;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #060c10;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #0ab8d8;
            border-radius: 50%;
            box-shadow: 0 0 8px #0ab8d888, 0 0 18px #0ab8d833;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #0ab8d888, 0 0 18px #0ab8d833;
            }
            50% {
                box-shadow: 0 0 14px #0ab8d8bb, 0 0 28px #0ab8d855;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #2a4a5a;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #0a7a9a;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #040a10;
            border-bottom: 3px solid #0a7a9a;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #0a1820;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #0ab8d8;
            border-radius: 2px;
            padding: 10px 14px;
            background: #02080c;
            position: relative;
            box-shadow: inset 0 0 24px #00182222;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #0ab8d8;
            box-shadow: 0 0 12px #0ab8d888;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #7ab8d044;
            box-shadow: 0 0 8px #7ab8d033;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #0ab8d8;
            text-shadow: 0 0 16px #0ab8d888, 0 2px 4px #000, 0 0 40px #0a5a7818;
            letter-spacing: 3px;
            font-family: var(--font-title);
            line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #5a7a8a;
            letter-spacing: 5px;
            margin-top: 3px;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 20px;
                letter-spacing: 1px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #0a2a38 #060c10;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #060c10;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #0a2a38;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #1a2830;
            border-top-color: #243440;
            border-left-color: #203038;
            border-right-color: #141e24;
            border-bottom-color: #0e1418;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #141e24;
            border-left-color: #141e24;
            border-bottom-color: #243440;
            border-right-color: #203038;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #0e1418;
        }
        .btn.accent {
            background: #0a1418;
            border-color: #1a4a5a;
            border-top-color: #1a6a7a;
            border-left-color: #1a5a6a;
            border-right-color: #0e2a38;
            border-bottom-color: #081820;
            color: #a8d4e0;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #0ab8d822;
        }
        .btn.accent:active {
            border-top-color: #0e2a38;
            border-left-color: #0e2a38;
            border-bottom-color: #1a6a7a;
            border-right-color: #1a5a6a;
            box-shadow: 0 0px 0 #00000044, 0 0 16px #0ab8d844;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .theater-mask {
            position: relative;
            background: #081018;
            border: 2px solid #0a7a9a66;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.8);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #060c14;
            border: 2px solid #0ab8d8;
            padding: 15px;
            border-radius: 3px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #0ab8d8;
            box-shadow: 0 0 22px #0ab8d866, 0 0 0 2px #0a1a20;
            object-fit: cover;
            flex-shrink: 0;
            background: #060c14;
        }
        .speech-bubble {
            flex: 1;
            background: #0e141a;
            border: 2px solid #0ab8d8;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #b8d4e0;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #0ab8d888 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #060c14;
            border: 1px solid #0a2a38;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #101820;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a6a78;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #0a7a9a;
            box-shadow: 0 0 20px #0ab8d844, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #060c14;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(4, 8, 12, 0.85) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 14px;
            letter-spacing: 3px;
            color: #0ab8d8;
            text-shadow: 0 0 10px #0ab8d8cc, 0 0 30px #0ab8d888, 0 2px 4px #000000, 0 0 60px #082a38;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom,
                    rgba(4, 8, 12, 0.9) 0%,
                    rgba(4, 8, 12, 0.7) 40%,
                    transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 16px;
            letter-spacing: 1.5px;
            color: #b8e8f8;
            text-shadow: 0 0 8px #7ab8d088, 0 0 20px #1a3a4a44, 0 2px 4px #000000;
            background: linear-gradient(to top,
                    rgba(4, 8, 12, 0.9) 0%,
                    rgba(4, 8, 12, 0.6) 50%,
                    transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a6a78;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 11px;
                letter-spacing: 2px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 13px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #0ab8d8;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #b8d8e4;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 10px #0ab8d844;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a1018;
            border: 1px solid #0ab8d8;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #0ab8d8;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #b8d8e4;
        }
        .guide-desc {
            font-size: 15px;
            color: #4a6a78;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0a1018;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #0ab8d8;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #b0bcc4;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #121820;
            border: 2px solid #0ab8d866;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #b0bcc4;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #0ab8d8;
            box-shadow: 0 0 14px #0ab8d844;
        }
        .loading-text {
            color: #7ab8d0;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #04080c;
            border-top: 1px solid #0ab8d844;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #2a4a5a;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #3a5a6a;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #141e24;
            color: #3a5a6a;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #2a4a5a;
            color: #5a7a8a;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #b8d4e0;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">TALES OF BETRAYAL · CRT-84</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">TALES OF<br>BETRAYAL</div>
                    <div class="marquee-sub">⏤ 1984 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channelPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🔍 TALES OF BETRAYAL · NOW PLAYING</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('tales_of_betrayal_key') || '';

            const DEFAULT_STATE = {
                episodes: [],
                performance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>🔍 Edgar Vane</h2>
        <p style="text-align:left;">
            <strong>Show:</strong> <em>Tales of Betrayal</em><br>
            <strong>Bio:</strong> A former film noir character actor who walked away from Hollywood after a scandal he never speaks of, Edgar Vane now hosts this anthology of suspense from a smoke-filled studio backlot. His gravelly voice and world-weary eyes suggest he knows more about betrayal than he lets on. Every tale he tells feels uncomfortably personal.
        </p>
    `;

            // ── SOUND ENGINE (Web Audio API) – HITCHCOCK / ORCHESTRAL STYLE ──
            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let crossfadeTimeout = null;

            const SECTION_THEMES = {
                intro: { root: 55, fifth: 82.5, filterStart: 400, filterEnd: 300, lfoFreq: 0.08, intensity: 0.25 },
                setup: { root: 55, fifth: 82.5, filterStart: 500, filterEnd: 250, lfoFreq: 0.12, intensity: 0.3 },
                scheme: { root: 55, fifth: 83.4, filterStart: 600, filterEnd: 200, lfoFreq: 0.18, intensity: 0.35 },
                execution: { root: 55, fifth: 84, filterStart: 700, filterEnd: 180, lfoFreq: 0.22, intensity: 0.45 },
                twist: { root: 55, fifth: 88, filterStart: 900, filterEnd: 140, lfoFreq: 0.28, intensity: 0.55 },
                closing: { root: 55, fifth: 82.5, filterStart: 300, filterEnd: 200, lfoFreq: 0.08, intensity: 0.2 }
            };

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
                console.log('🔇 Keep-alive tone started (very low volume).');
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    console.log(`🎛️ AudioContext created, initial state: ${audioCtx.state}`);
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.18;
                    reverbNode.connect(masterGain);
                    masterGain.connect(audioCtx.destination);
                    const compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.value = -24;
                    compressor.knee.value = 30;
                    compressor.ratio.value = 12;
                    compressor.attack.value = 0.003;
                    compressor.release.value = 0.25;
                    masterGain.connect(compressor);
                    compressor.connect(audioCtx.destination);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 1.0;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.35;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                    reverbNode.connect(masterGain);
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 3;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.6));
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            // ── HITCHCOCK-STYLE STRING PAD (slow attack, rich, orchestral) ──
            function createStringPad(ctx, frequency, duration, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.16, now + 1.2);
                gainNode.gain.setValueAtTime(intensity * 0.16, now + duration - 2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.4);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.005;
                const osc3 = ctx.createOscillator();
                osc3.type = 'triangle';
                osc3.frequency.value = frequency / 2;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 1.8;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.15 + Math.random() * 0.2;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 150 + Math.random() * 200;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.8);
                osc2.stop(now + duration + 0.8);
                osc3.stop(now + duration + 0.8);
                lfo.stop(now + duration + 0.8);
            }

            // ── HITCHCOCK VIOLIN STAB (Psycho-style screech) ──
            function createViolinStab(ctx, intensity = 0.6) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.35, now + 0.02);
                gainNode.gain.setValueAtTime(intensity * 0.35, now + 0.25);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.8);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
                osc.frequency.exponentialRampToValueAtTime(300, now + 1.0);

                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(800, now);
                osc2.frequency.exponentialRampToValueAtTime(1600, now + 0.15);
                osc2.frequency.exponentialRampToValueAtTime(400, now + 1.0);

                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1000;
                filter.Q.value = 3;

                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc.start(now);
                osc2.start(now);
                osc.stop(now + 1.8);
                osc2.stop(now + 1.8);
            }

            // ── PIZZICATO STAB (short plucked string) ──
            function createPizzicato(ctx, frequency, time, intensity = 0.5) {
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity * 0.4, time);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.25);

                const osc = ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.value = frequency * 2.01;

                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 200;
                filter.Q.value = 1;

                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc.start(time);
                osc2.start(time);
                osc.stop(time + 0.3);
                osc2.stop(time + 0.3);
            }

            // ── TIMPANI / LOW THUMP ──
            function createTimpaniHit(ctx, time, intensity = 0.7) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(80, time);
                osc.frequency.exponentialRampToValueAtTime(40, time + 0.15);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.7, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 200;
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                osc.start(time);
                osc.stop(time + 0.2);
            }

            // ── TREMOLO STRINGS (rapid volume oscillation) ──
            function createTremoloStrings(ctx, frequency, duration, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 0.8);

                const tremoloLfo = ctx.createOscillator();
                tremoloLfo.type = 'sine';
                tremoloLfo.frequency.value = 8;
                const tremoloGain = ctx.createGain();
                tremoloGain.gain.value = 0.5;
                tremoloLfo.connect(tremoloGain);
                tremoloGain.connect(gainNode.gain);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.004;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                filter.Q.value = 1.5;

                osc1.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc1.start(now);
                osc2.start(now);
                tremoloLfo.start(now);
                osc1.stop(now + duration);
                osc2.stop(now + duration);
                tremoloLfo.stop(now + duration);
                gainNode.gain.setValueAtTime(intensity * 0.2, now + duration - 0.5);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.3);
            }

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    switch (type) {
                        case 'pad':
                            createStringPad(ctx, 110 + Math.random() * 40, 20 + Math.random() * 20, gainValue);
                            break;
                        case 'sting':
                            createViolinStab(ctx, gainValue);
                            break;
                        case 'heartbeat':
                            createTimpaniHit(ctx, now, 0.7 * gainValue);
                            setTimeout(() => createTimpaniHit(ctx, now + 0.18, 0.65 * gainValue), 180);
                            break;
                        case 'thunder': {
                            const bufferSize = ctx.sampleRate * 0.6;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.35));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(gainValue * 0.5, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 120;
                            filter.Q.value = 0.4;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(now);
                            source.stop(now + 1.0);
                            break;
                        }
                        case 'bell': {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 100 + Math.random() * 40;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0, now);
                            gain.gain.linearRampToValueAtTime(gainValue * 0.35, now + 0.15);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 3.5);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 400;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(now);
                            osc.stop(now + 3.5);
                            break;
                        }
                        case 'climax':
                            createTremoloStrings(ctx, 220, 10 + Math.random() * 8, gainValue);
                            break;
                        default:
                            console.warn(`Unknown sound type: ${type}`);
                    }
                } catch (err) {
                    console.error(`❌ Error in playSound("${type}"):`, err);
                }
            }

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    console.log(`🌫️ Starting ambient: ${type} for ${durationSeconds}s (ctx state: ${ctx.state})`);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(gainValue * 0.25, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'ambient_drone' || type === 'wind_howl') {
                        const bufferSize = ctx.sampleRate * 1;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.4;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'ambient_drone' ? 180 : 500;
                        filter.Q.value = 0.4;
                        const osc = ctx.createOscillator();
                        osc.type = 'triangle';
                        osc.frequency.value = type === 'ambient_drone' ? 70 : 100;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.15 * gainValue;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 90;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => {
                        stopAmbient();
                    }, durationSeconds * 1000);
                } catch (err) {
                    console.error(`❌ Error in playAmbient("${type}"):`, err);
                }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) {
                            ambientGain.disconnect();
                            ambientGain = null;
                        }
                    }, 300);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) {
                    clearTimeout(ambientTimeout);
                    ambientTimeout = null;
                }
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 25000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`);
                    }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') {
                        throw new Error('Request timed out. Please try again – the AI may be under heavy load.');
                    }
                    throw e;
                } finally {
                    clearTimeout(timeout);
                }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s suspense thriller, small town mystery, moody cinematography, grainy film')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e;
                        await new Promise(r => setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else {
                            clearInterval(timer);
                            resolve();
                        }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David',
                    'Fred', 'Alex', 'Thomas', 'James'
                ];
                let voice = null;
                for (const name of maleNames) {
                    voice = voices.find(v => v.name.includes(name));
                    if (voice) break;
                }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.6;
                utterance.pitch = 0.88;
                speechSynthesis.speak(utterance);
            }

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) {
                        voice = voices.find(v => v.name.includes(name));
                        if (voice) break;
                    }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.6;
                    utterance.pitch = voiceConfig.pitch || 0.88;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) {
                            currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar);
                            if (cueChecker) cueChecker(currentChar);
                        }
                    };
                    utterance.onend = () => {
                        element.textContent = text;
                        if (cueChecker) cueChecker(text.length);
                        resolve();
                    };
                    utterance.onerror = (e) => {
                        console.warn('TTS error:', e);
                        element.textContent = text;
                        resolve();
                    };
                    speechSynthesis.speak(utterance);
                });
            }

            async function generateNewStory() {
                const system =
                    `You are Edgar Vane, the gravel-voiced host of Tales of Betrayal. You narrate tense, psychological suspense stories about ordinary people with dark secrets. Your tone is knowing, weary, and quietly devastating.`;
                const prompt =
                    `Write a 900 to 1100 word suspense story set in the 1980s in a remote small town. Use tight third-person prose. No supernatural elements whatsoever – no ghosts, curses, magic, dreams, or premonitions. The horror must be purely psychological and human, centered around a SECRET. Choose one secret type: Hidden Past, Missing Person, Family Secret, Cover-Up, Blackmail, False Identity, Buried Crime, or Witness. Structure: a slow-burn mundane setup establishing the secret's weight, then mounting tension as the secret begins to surface, then a gripping confrontation or unraveling, and finally an ironic, earned twist where the truth comes at a devastating price. Think Hitchcock meets Stephen King – suspenseful, character-driven, with a gut-punch ending. No easy escapes or dream cop-outs. Frame the story with Edgar Vane's brief sardonic intro naming the type of secret, and close with his cold, memorable punchline. Return ONLY a valid JSON object with these fields: title (string), secret_type (one of the listed types), story (full narration string, use backslash n for line breaks), closing_remark (the chilling sign-off phrase). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: prompt }
                ], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) {
                    throw new Error('Invalid story structure …');
                }
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Suspense thriller poster for "${story.title}", 1980s small town mystery, moody blue tones, cinematic, grainy film, Hitchcock style`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) {
                    console.warn('Could not generate story poster:', e);
                }
                gameState.performance = {
                    title: story.title,
                    secret_type: story.secret_type || 'Hidden Past',
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system = `You are a sound designer for a Hitchcock-style suspense drama.
        Given a short story, return a JSON object with THREE keys:
        - "sections": an array of 5-6 sections that divide the story into emotional acts.
          Each section must have: "theme" (one of: intro, setup, scheme, execution, twist, closing), "start_char" (inclusive) and "end_char" (exclusive). The sections must cover the entire story from 0 to ${length}.
        - "cues": an array of sound events using only these types: "sting", "heartbeat", "thunder", "bell", "climax".
          No "pad" type – the ambient drone will be handled separately.
          Each cue must have "position" (character index), "type", optional "intensity" (0-1).
          Include at least 40 cues, spread evenly.
        - "score": an object with keys matching the same theme names used in "sections".
          Each key must contain:
            "bpm" (integer between 55-100),
            "bass" (array of 8 semitone intervals from a root of 0),
            "arp" (array of 8 semitone intervals for countermelody),
            "kick" (array of 8 numbers, 1 = hit, 0 = rest),
            "snare" (same as kick).
          Make the music tense and orchestral – slower, more suspenseful than driving. intro sparse and ominous, execution tense, twist dissonant.
        Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and score patterns.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: userPrompt }
                ], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try {
                    data = JSON.parse(cleaned);
                } catch (parseErr) {
                    console.warn('AI JSON was malformed, trying to repair…', parseErr);
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try {
                            data = JSON.parse(candidate);
                        } catch (e2) {
                            throw new Error('Failed to parse AI soundtrack JSON even after repair.');
                        }
                    } else {
                        throw new Error('No JSON found in AI response.');
                    }
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object') {
                    throw new Error('Missing sections, cues, or score in AI response');
                }
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char <
                    length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({
                    type: c.type,
                    position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7
                }));
                const requiredThemes = ['intro', 'setup', 'scheme', 'execution', 'twist', 'closing'];
                const score = {};
                for (const theme of requiredThemes) {
                    if (data.score[theme]) {
                        score[theme] = {
                            bpm: data.score[theme].bpm || 75,
                            bass: data.score[theme].bass || [0, 0, 7, 7, 0, 0, 7, 7],
                            arp: data.score[theme].arp || [12, 15, 12, 19, 12, 15, 12, 19],
                            kick: data.score[theme].kick || [1, 0, 1, 0, 1, 0, 1, 0],
                            snare: data.score[theme].snare || [0, 0, 0, 1, 0, 0, 0, 1]
                        };
                    } else {
                        score[theme] = {
                            bpm: 75,
                            bass: [0, 0, 7, 7, 0, 0, 7, 7],
                            arp: [12, 15, 12, 19, 12, 15, 12, 19],
                            kick: [1, 0, 1, 0, 1, 0, 1, 0],
                            snare: [0, 0, 0, 1, 0, 0, 0, 1]
                        };
                    }
                }
                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {
                await generateNewStory();

            // ── HITCHCOCK ORCHESTRAL SCORE ENGINE ──
            function createOrchNote(ctx, frequency, startTime, duration, gainValue, type = 'sawtooth') {
                const now = startTime;
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.006;
                const sub = ctx.createOscillator();
                sub.type = 'triangle';
                sub.frequency.value = frequency / 2;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                filter.Q.value = 1.4;
                const filterEnv = ctx.createGain();
                filterEnv.gain.setValueAtTime(600, now);
                filterEnv.gain.exponentialRampToValueAtTime(180, now + 0.15);
                filterEnv.gain.exponentialRampToValueAtTime(60, now + duration * 0.7);
                filterEnv.connect(filter.frequency);
                const mainGain = ctx.createGain();
                mainGain.gain.setValueAtTime(0, now);
                mainGain.gain.linearRampToValueAtTime(gainValue * 0.28, now + 0.04);
                mainGain.gain.setValueAtTime(gainValue * 0.28, now + duration * 0.5);
                mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.15);
                osc1.connect(filter);
                osc2.connect(filter);
                sub.connect(filter);
                filter.connect(mainGain);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.7;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.45;
                mainGain.connect(drySend);
                mainGain.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);
                osc1.start(now);
                osc2.start(now);
                sub.start(now);
                osc1.stop(now + duration + 0.3);
                osc2.stop(now + duration + 0.3);
                sub.stop(now + duration + 0.3);
            }

            function createOrchKick(ctx, time) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(130, time);
                osc.frequency.exponentialRampToValueAtTime(28, time + 0.1);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.015, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.002));
                }
                const click = ctx.createBufferSource();
                click.buffer = noiseBuffer;
                const clickFilter = ctx.createBiquadFilter();
                clickFilter.type = 'highpass';
                clickFilter.frequency.value = 1800;
                click.connect(clickFilter);
                const gainClick = ctx.createGain();
                gainClick.gain.setValueAtTime(0.4, time);
                gainClick.gain.exponentialRampToValueAtTime(0.001, time + 0.015);
                clickFilter.connect(gainClick);
                const gainBody = ctx.createGain();
                gainBody.gain.setValueAtTime(0.55, time);
                gainBody.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
                osc.connect(gainBody);
                gainBody.connect(dryGain);
                gainClick.connect(dryGain);
                osc.start(time);
                click.start(time);
                osc.stop(time + 0.25);
                click.stop(time + 0.015);
            }

            function createOrchSnare(ctx, time) {
                const body = ctx.createOscillator();
                body.type = 'triangle';
                body.frequency.setValueAtTime(180, time);
                body.frequency.exponentialRampToValueAtTime(70, time + 0.1);
                const bodyGain = ctx.createGain();
                bodyGain.gain.setValueAtTime(0.5, time);
                bodyGain.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
                body.connect(bodyGain);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.025));
                }
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.55, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                bodyGain.connect(dryGain);
                noiseGain.connect(dryGain);
                body.start(time);
                noise.start(time);
                body.stop(time + 0.12);
                noise.stop(time + 0.12);
            }

            const SCORE_PATTERNS = {
                intro: { bpm: 58, bass: [0, 0, 7, 7, 0, 0, 5, 5], arp: [12, 14, 12, 17, 12, 14, 12, 17],
                    kick: [1, 0, 0, 0, 1, 0, 0, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] },
                setup: { bpm: 62, bass: [0, 7, 5, 3, 0, 7, 5, 3], arp: [12, 14, 17, 14, 12, 14, 17, 14],
                    kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] },
                scheme: { bpm: 66, bass: [0, 3, 5, 7, 8, 7, 5, 3], arp: [12, 14, 17, 20, 22, 20, 17, 14],
                    kick: [1, 0, 1, 1, 1, 0, 1, 0], snare: [0, 0, 1, 0, 0, 0, 1, 0] },
                execution: { bpm: 72, bass: [0, 7, 0, 7, 3, 7, 3, 7], arp: [12, 17, 14, 17, 12, 17, 14, 17],
                    kick: [1, 1, 1, 1, 1, 1, 1, 1], snare: [0, 1, 0, 1, 0, 1, 0, 1] },
                twist: { bpm: 76, bass: [0, 3, 6, 8, 0, 3, 6, 8], arp: [12, 15, 18, 22, 12, 15, 18, 22],
                    kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [1, 1, 1, 1, 1, 1, 1, 1] },
                closing: { bpm: 52, bass: [0, 7, 5, 0, 7, 5, 0, 7], arp: [12, 14, 12, 17, 12, 14, 12, 17],
                    kick: [1, 0, 0, 0, 1, 0, 0, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] }
            };

            function startSectionScore(themeName) {
                if (!audioCtx) return;
                console.log(`🎵 Starting orchestral score: ${themeName}`);
                stopSectionAmbient();
                let customScore = null;
                const perf = gameState.performance;
                if (perf && perf.soundCues && perf.soundCues.score) {
                    customScore = perf.soundCues.score;
                }
                const fallbackTheme = SCORE_PATTERNS[themeName] || SCORE_PATTERNS.intro;
                const theme = (customScore && customScore[themeName]) ? customScore[themeName] : fallbackTheme;
                const rootFreq = 55;
                const beatDuration = 60 / theme.bpm;
                const patternLength = theme.bass.length;
                const ctx = audioCtx;
                let step = 0;
                let nextStepTime = ctx.currentTime;
                const padGain = ctx.createGain();
                padGain.gain.value = 0.08;
                const padOsc1 = ctx.createOscillator();
                padOsc1.type = 'triangle';
                padOsc1.frequency.value = rootFreq;
                const padOsc2 = ctx.createOscillator();
                padOsc2.type = 'triangle';
                padOsc2.frequency.value = rootFreq * 1.501;
                const padOsc3 = ctx.createOscillator();
                padOsc3.type = 'sine';
                padOsc3.frequency.value = rootFreq / 2;
                const padFilter = ctx.createBiquadFilter();
                padFilter.type = 'lowpass';
                padFilter.frequency.value = 280;
                padFilter.Q.value = 0.9;
                padOsc1.connect(padFilter);
                padOsc2.connect(padFilter);
                padOsc3.connect(padFilter);
                padFilter.connect(padGain);
                const padDry = ctx.createGain();
                padDry.gain.value = 0.5;
                const padWet = ctx.createGain();
                padWet.gain.value = 0.35;
                padGain.connect(padDry);
                padGain.connect(padWet);
                padDry.connect(dryGain);
                padWet.connect(wetGain);
                padOsc1.start();
                padOsc2.start();
                padOsc3.start();
                const stopSources = [padOsc1, padOsc2, padOsc3];
                let timeoutId;

                function scheduleStep() {
                    if (!sectionAmbientActive) return;
                    const now = nextStepTime;
                    const bassSemitone = theme.bass[step % patternLength];
                    const bassFreq = rootFreq * Math.pow(2, bassSemitone / 12);
                    createOrchNote(ctx, bassFreq, now, beatDuration * 0.85, 0.7, 'sawtooth');
                    const arpSemitone = theme.arp[step % patternLength];
                    const arpFreq = rootFreq * Math.pow(2, arpSemitone / 12);
                    createOrchNote(ctx, arpFreq, now, beatDuration * 0.45, 0.5, 'triangle');
                    if (theme.kick[step % patternLength]) createOrchKick(ctx, now);
                    if (theme.snare[step % patternLength]) createOrchSnare(ctx, now);
                    step++;
                    nextStepTime += beatDuration;
                    timeoutId = setTimeout(scheduleStep, (nextStepTime - ctx.currentTime) * 1000);
                }
                nextStepTime = ctx.currentTime + 0.05;
                timeoutId = setTimeout(scheduleStep, 50);
                sectionAmbientActive = {
                    stop: () => {
                        clearTimeout(timeoutId);
                        padGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                        stopSources.forEach(s => { try { s.stop(ctx.currentTime + 0.3); } catch (e) {} });
                        sectionAmbientActive = null;
                    }
                };
            }
            const transitionSectionTheme = startSectionScore;

            function stopSectionAmbient() {
                if (sectionAmbientActive) {
                    sectionAmbientActive.stop();
                    sectionAmbientActive = null;
                }
                clearTimeout(crossfadeTimeout);
            }

            async function startPerformance() {

                const storyData = gameState.performance;
                if (!storyData || !storyData.story) {

                let sectionList = null;
                let cueList = null;
                if (storyData.soundCues) {

                    } else if (storyData.soundCues.sections && storyData.soundCues.cues) {

                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                        console.log('🎼 Sections loaded:', sectionList.length, 'themes');
                    }
                }
                const bubble = document.getElementById('chSpeechBubble');
                const dialogue = document.getElementById('chDialogue');

                if (oldAdd) oldAdd.remove();
                const posterContainer = document.getElementById('chPosterContainer');
                const posterTitle = document.getElementById('chPosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) {
                        posterTitle.textContent = storyData.title || '';
                    }
                } else if (posterContainer) {
                    posterContainer.classList.add('no-image');
                }
                const secretLabel = storyData.secret_type || 'Hidden Past';
                const intro =
                    `"Good evening… I'm Edgar Vane. Tonight's tale concerns a ${secretLabel}. A secret kept too long. A truth that festered in the dark. This is… '${storyData.title}'."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 50);
                await new Promise(r => setTimeout(r, 1500));
                if (sectionList && sectionList.length > 0) {
                    transitionSectionTheme(sectionList[0].theme);
                }
                const storyText = storyData.rawStoryText || storyData.story;
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b.start_char) :
                        [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) {
                            console.log(`⏳ at index ${idx} (${Math.round(idx / storyText.length * 100)}%)`);
                            lastLog = idx;
                        }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) {
                                currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme);
                            }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) {
                                triggered.add(cueIdx);
                                console.log(`🔊 FIRING ${cue.type} at ${cue.position}`);
                                playSound(cue.type, cue.intensity);
                            }
                            cueIdx++;
                        }
                    };
                }
                dialogue.textContent = '';
                if (cueChecker) {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.6, pitch: 0.88 }, (idx) => cueChecker(
                        idx));
                } else {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.6, pitch: 0.88 });
                }
                await new Promise(r => setTimeout(r, 1200));
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#b8d4e0';
                dialogue.appendChild(closingLine);
                speakTextMale(closing);
                await typewriterEffect(closingLine, closing, 45);
                await new Promise(r => setTimeout(r, 1000));
                const curtainText = document.createElement('p');
                curtainText.textContent = '— Fade to black —';
                stopSectionAmbient();
                curtainText.style.color = '#4a6a78';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();
                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Leave';
                leaveBtn.addEventListener('click', () => { leaveTheater(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'chAddEpisodeBtn';
                addBtn.textContent = '➕ Save Episode';
                addBtn.addEventListener('click', () => {
                    addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Saved';
                });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.performance;
                if (!perf) return;
                gameState.episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
                saveState();
                setTimeout(() => leaveTheater(), 600);
            }

            function leaveTheater() {
                stopAmbient();
                stopSectionAmbient();
                renderChannel();
            }

            function init() {
                loadState();
                renderChannel();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('tales_of_betrayal_key', key);
                    }
                });
                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) {
                        showModal(HOST_BIO);
                    }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeModal();
                });
                if (!apiKey) {
                    setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                }
            }
            init();
        })();
    </script>
</body>
</html>
