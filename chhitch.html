<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover" />
    <title>TALES OF BETRAYAL · 1984 · AI ORCHESTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Abril+Fatface&family=Special+Elite&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&family=Audiowide&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ─── TALES OF BETRAYAL STYLES (with Crossroads audio UI additions) ─── */
        :root {
            --bg: #04080c;
            --screen-bg: #060c10;
            --panel-bg: #080c14;
            --text: #b0bcc4;
            --text-dim: #4a6a78;
            --text-bright: #c8dce6;
            --accent: #0ab8d8;
            --accent-dim: #082a38;
            --border: #0a7a9a;
            --border-glow: 0 0 14px #0ab8d855, 0 0 32px #082a3822;
            --danger: #0a9ec8;
            --danger-glow: 0 0 12px #0ab8d844;
            --amber: #7ab8d0;
            --amber-dim: #1a3a4a;
            --gold: #8cc8e0;
            --gold-dim: #1a3040;
            --green: #3a7a6a;
            --input-bg: #0e1418;
            --button-bg: #121820;
            --button-hover: #182028;
            --button-active: #101820;
            --bevel-light: #1a2a34;
            --bevel-dark: #020608;
            --font-display: 'Abril Fatface', 'Crimson Text', Georgia, serif;
            --font-title: 'Abril Fatface', 'Crimson Text', Georgia, serif;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 30px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0a1018 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #101418;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #1a2830, 0 0 0 4px #0a1018, 0 0 0 8px #04080c, 0 8px 48px #000000dd, 0 0 60px #082a3822;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #0ab8d888;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #060c10;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #0ab8d8;
            border-radius: 50%;
            box-shadow: 0 0 8px #0ab8d888, 0 0 18px #0ab8d833;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #0ab8d888, 0 0 18px #0ab8d833;
            }
            50% {
                box-shadow: 0 0 14px #0ab8d8bb, 0 0 28px #0ab8d855;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #2a4a5a;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #0a7a9a;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #040a10;
            border-bottom: 3px solid #0a7a9a;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #0a1820;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #0ab8d8;
            border-radius: 2px;
            padding: 10px 14px;
            background: #02080c;
            position: relative;
            box-shadow: inset 0 0 24px #00182222;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #0ab8d8;
            box-shadow: 0 0 12px #0ab8d888;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #7ab8d044;
            box-shadow: 0 0 8px #7ab8d033;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #0ab8d8;
            text-shadow: 0 0 16px #0ab8d888, 0 2px 4px #000, 0 0 40px #0a5a7818;
            letter-spacing: 3px;
            font-family: var(--font-title);
            line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #5a7a8a;
            letter-spacing: 5px;
            margin-top: 3px;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 20px;
                letter-spacing: 1px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #0a2a38 #060c10;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #060c10;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #0a2a38;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #1a2830;
            border-top-color: #243440;
            border-left-color: #203038;
            border-right-color: #141e24;
            border-bottom-color: #0e1418;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #141e24;
            border-left-color: #141e24;
            border-bottom-color: #243440;
            border-right-color: #203038;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #0e1418;
        }
        .btn.accent {
            background: #0a1418;
            border-color: #1a4a5a;
            border-top-color: #1a6a7a;
            border-left-color: #1a5a6a;
            border-right-color: #0e2a38;
            border-bottom-color: #081820;
            color: #a8d4e0;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #0ab8d822;
        }
        .btn.accent:active {
            border-top-color: #0e2a38;
            border-left-color: #0e2a38;
            border-bottom-color: #1a6a7a;
            border-right-color: #1a5a6a;
            box-shadow: 0 0px 0 #00000044, 0 0 16px #0ab8d844;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .theater-mask {
            position: relative;
            background: #081018;
            border: 2px solid #0a7a9a66;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.8);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #060c14;
            border: 2px solid #0ab8d8;
            padding: 15px;
            border-radius: 3px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #0ab8d8;
            box-shadow: 0 0 22px #0ab8d866, 0 0 0 2px #0a1a20;
            object-fit: cover;
            flex-shrink: 0;
            background: #060c14;
        }
        .speech-bubble {
            flex: 1;
            background: #0e141a;
            border: 2px solid #0ab8d8;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #b8d4e0;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #0ab8d888 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #060c14;
            border: 1px solid #0a2a38;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #101820;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a6a78;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #0a7a9a;
            box-shadow: 0 0 20px #0ab8d844, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #060c14;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(4, 8, 12, 0.85) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 14px;
            letter-spacing: 3px;
            color: #0ab8d8;
            text-shadow: 0 0 10px #0ab8d8cc, 0 0 30px #0ab8d888, 0 2px 4px #000000, 0 0 60px #082a38;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom,
                    rgba(4, 8, 12, 0.9) 0%,
                    rgba(4, 8, 12, 0.7) 40%,
                    transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 16px;
            letter-spacing: 1.5px;
            color: #b8e8f8;
            text-shadow: 0 0 8px #7ab8d088, 0 0 20px #1a3a4a44, 0 2px 4px #000000;
            background: linear-gradient(to top,
                    rgba(4, 8, 12, 0.9) 0%,
                    rgba(4, 8, 12, 0.6) 50%,
                    transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a6a78;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 11px;
                letter-spacing: 2px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 13px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #0ab8d8;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #b8d8e4;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 10px #0ab8d844;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a1018;
            border: 1px solid #0ab8d8;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #0ab8d8;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #b8d8e4;
        }
        .guide-desc {
            font-size: 15px;
            color: #4a6a78;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0a1018;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #0ab8d8;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #b0bcc4;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #121820;
            border: 2px solid #0ab8d866;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #b0bcc4;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #0ab8d8;
            box-shadow: 0 0 14px #0ab8d844;
        }
        .loading-text {
            color: #7ab8d0;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #04080c;
            border-top: 1px solid #0ab8d844;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #2a4a5a;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #3a5a6a;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #141e24;
            color: #3a5a6a;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #2a4a5a;
            color: #5a7a8a;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #b8d4e0;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }

        /* ─── Score Indicator (from Crossroads) ─── */
        .score-indicator {
            font-family: var(--font-mono);
            font-size: 10px;
            color: #7a9aaa;
            letter-spacing: 1px;
            padding: 3px 8px;
            border: 1px solid #0a3a4a;
            border-radius: 2px;
            display: inline-block;
            background: #060c14;
            margin-top: 4px;
        }
        .score-indicator .active {
            color: #0ab8d8;
        }
        .score-indicator .dim {
            color: #3a5a6a;
        }
        .progress-bar {
            width: 100%;
            height: 2px;
            background: #0a1a22;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #0ab8d8;
            border-radius: 2px;
            transition: width 0.3s;
            box-shadow: 0 0 10px #0ab8d844;
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">TALES OF BETRAYAL · AI ORCHESTRA</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">TALES OF<br />BETRAYAL</div>
                    <div class="marquee-sub">⏤ 1984 · AI SCORE ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channelPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🔍 TALES OF BETRAYAL · NOW PLAYING</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('tales_of_betrayal_key') || '';

            const DEFAULT_STATE = {
                episodes: [],
                performance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
                <h2>🔍 Edgar Vane</h2>
                <p style="text-align:left;">
                    <strong>Show:</strong> <em>Tales of Betrayal</em><br>
                    <strong>Bio:</strong> A former film noir character actor who walked away from Hollywood after a scandal he never speaks of, Edgar Vane now hosts this anthology of suspense from a smoke-filled studio backlot. His gravelly voice and world-weary eyes suggest he knows more about betrayal than he lets on. Every tale he tells feels uncomfortably personal.
                </p>
            `;

            // ═══════════════════════════════════════════════════════════════
            // ─── CROSSROADS SOUND ENGINE (full AI orchestral, no fallbacks) ───
            // ═══════════════════════════════════════════════════════════════

            let audioCtx = null;
            let ambientSource = null,
                ambientGain = null,
                ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null,
                masterGain = null,
                dryGain = null,
                wetGain = null;
            let sectionAmbientActive = null,
                stringAmbientActive = null;
            let crossfadeTimeout = null,
                tapeWarbleNode = null,
                masterCompressor = null;

            let patternPlayerActive = null,
                patternPlayerTimeout = null;
            let patternStep = 0,
                patternBPM = 50;
            let currentSectionPatterns = [];
            let currentVariationIdx = 0,
                barsInVariation = 0;
            let fillActive = false;
            let sectionThemeScore = null;

            // ─── expandPattern: robust, no fallback ──────────────────────
            function expandPattern(arr) {
                if (!Array.isArray(arr)) {
                    console.warn('expandPattern received non-array:', arr);
                    arr = [0, 0, 0, 0, 0, 0, 0, 0];
                }
                arr = arr.map(x => typeof x === 'number' ? x : 0);
                return arr.flatMap(x => [x, x]);
            }

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.0005;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            function ensureAudioNodes(ctx) {
                if (!masterGain) {
                    masterGain = ctx.createGain();
                    masterGain.gain.value = 0.22;
                    masterCompressor = ctx.createDynamicsCompressor();
                    masterCompressor.threshold.value = -26;
                    masterCompressor.knee.value = 28;
                    masterCompressor.ratio.value = 10;
                    masterCompressor.attack.value = 0.004;
                    masterCompressor.release.value = 0.3;
                    masterGain.connect(masterCompressor);
                    masterCompressor.connect(ctx.destination);
                }
                if (!dryGain) {
                    dryGain = ctx.createGain();
                    dryGain.gain.value = 0.85;
                    dryGain.connect(masterGain);
                }
                if (!wetGain) {
                    wetGain = ctx.createGain();
                    wetGain.gain.value = 0.55;
                    if (reverbNode) wetGain.connect(reverbNode);
                    else wetGain.connect(masterGain);
                }
                if (!reverbNode) {
                    initReverb(ctx);
                    if (reverbNode) wetGain.connect(reverbNode);
                }
                if (tapeWarbleNode) tapeWarbleNode.connect(masterGain.gain);
            }

            async function getAudioContext() {
                try {
                    if (!audioCtx) {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                        createKeepAlive(audioCtx);
                        initReverb(audioCtx);
                        initTapeWarble(audioCtx);
                        ensureAudioNodes(audioCtx);
                    }
                    if (audioCtx.state === 'suspended') await audioCtx.resume();
                    ensureAudioNodes(audioCtx);
                    return audioCtx;
                } catch (err) { console.error('Audio context error:', err); throw err; }
            }

            function initReverb(ctx) {
                if (reverbNode) return;
                try {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 4.2;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.9));
                        const lateDecay = Math.exp(-i / (sampleRate * 2.5)) * 0.3;
                        left[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                        right[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                    if (masterGain) reverbNode.connect(masterGain);
                } catch (err) {
                    console.warn('Reverb init error:', err);
                    reverbNode = ctx.createGain();
                    reverbNode.gain.value = 0.5;
                    if (masterGain) reverbNode.connect(masterGain);
                }
            }

            function initTapeWarble(ctx) {
                if (tapeWarbleNode) return;
                try {
                    tapeWarbleNode = ctx.createGain();
                    tapeWarbleNode.gain.value = 0;
                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.15;
                    const lfoGain = ctx.createGain();
                    lfoGain.gain.value = 0.012;
                    const lfo2 = ctx.createOscillator();
                    lfo2.type = 'sine';
                    lfo2.frequency.value = 0.23;
                    const lfo2Gain = ctx.createGain();
                    lfo2Gain.gain.value = 0.008;
                    lfo.connect(lfoGain);
                    lfo2.connect(lfo2Gain);
                    lfoGain.connect(tapeWarbleNode.gain);
                    lfo2Gain.connect(tapeWarbleNode.gain);
                    lfo.start(0);
                    lfo2.start(0);
                    tapeWarbleNode._lfos = [lfo, lfo2];
                } catch (err) { console.warn('Tape warble init error:', err); }
            }

            // ─── Instrument synths ──────────────────────────────────────────

            function createStringPad(ctx, rootFreq, duration, intensity = 0.5, voiceCount = 8) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.16, now + 2.5);
                    gainNode.gain.setValueAtTime(intensity * 0.16, now + duration - 3);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1.5);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 500 + intensity * 400;
                    filter.Q.value = 1.8;
                    const filterLfo = ctx.createOscillator();
                    filterLfo.type = 'sine';
                    filterLfo.frequency.value = 0.04;
                    const filterLfoGain = ctx.createGain();
                    filterLfoGain.gain.value = 80;
                    filterLfo.connect(filterLfoGain);
                    filterLfoGain.connect(filter.frequency);
                    const allOscs = [];
                    const harmonics = [1, 1.002, 1.997, 2.003, 0.998, 1.005, 2.001, 0.996];
                    for (let i = 0; i < voiceCount; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = i < 4 ? 'sawtooth' : 'triangle';
                        const harmMult = harmonics[i] || (1 + (Math.random() - 0.5) * 0.012);
                        osc.frequency.value = rootFreq * harmMult;
                        const vibrato = ctx.createOscillator();
                        vibrato.type = 'sine';
                        vibrato.frequency.value = 4.5 + Math.random() * 3.5;
                        const vibratoGain = ctx.createGain();
                        vibratoGain.gain.value = 1.5 + Math.random() * 4;
                        vibrato.connect(vibratoGain);
                        vibratoGain.connect(osc.frequency);
                        allOscs.push(osc, vibrato);
                        osc.connect(filter);
                    }
                    filter.connect(gainNode);
                    const drySend = ctx.createGain();
                    drySend.gain.value = 0.35;
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.7;
                    gainNode.connect(drySend);
                    gainNode.connect(wetSend);
                    drySend.connect(dryGain || ctx.destination);
                    wetSend.connect(wetGain || ctx.destination);
                    allOscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 2); });
                    filterLfo.start(now);
                    filterLfo.stop(now + duration + 2);
                } catch (err) { console.warn('String pad error:', err); }
            }

            function createCelloDrone(ctx, frequency, duration, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 2);
                    gainNode.gain.setValueAtTime(intensity * 0.2, now + duration - 2);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 250;
                    filter.Q.value = 3.5;
                    const oscs = [];
                    for (let i = 0; i < 3; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = i === 0 ? 'triangle' : 'sawtooth';
                        const detune = (i - 1) * 6;
                        osc.frequency.value = frequency * Math.pow(2, detune / 1200);
                        const vibrato = ctx.createOscillator();
                        vibrato.type = 'sine';
                        vibrato.frequency.value = 2.5 + i * 1.2;
                        const vibratoGain = ctx.createGain();
                        vibratoGain.gain.value = 2 + i;
                        vibrato.connect(vibratoGain);
                        vibratoGain.connect(osc.frequency);
                        oscs.push(osc, vibrato);
                        osc.connect(filter);
                    }
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.65;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    oscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1.5); });
                } catch (err) { console.warn('Cello drone error:', err); }
            }

            function createStringSwell(ctx, targetFreq, duration, intensity = 0.6) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0.001, now);
                    gainNode.gain.exponentialRampToValueAtTime(intensity * 0.35, now + duration * 0.55);
                    gainNode.gain.setValueAtTime(intensity * 0.35, now + duration * 0.7);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(120, now);
                    filter.frequency.exponentialRampToValueAtTime(1800, now + duration * 0.6);
                    filter.Q.value = 2;
                    const oscs = [];
                    const intervals = [0, 7, 12, 19, 24];
                    intervals.forEach(interval => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = targetFreq * Math.pow(2, interval / 12);
                        osc.frequency.setValueAtTime(targetFreq * Math.pow(2, interval / 12) * 0.97, now);
                        osc.frequency.exponentialRampToValueAtTime(targetFreq * Math.pow(2, interval / 12),
                        now + duration);
                        oscs.push(osc);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.7;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    oscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1.5); });
                } catch (err) { console.warn('String swell error:', err); }
            }

            function createViolinHarmonics(ctx, baseFreq, duration, intensity = 0.4) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.1, now + 1.5);
                    gainNode.gain.setValueAtTime(intensity * 0.1, now + duration - 1.5);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 1200;
                    filter.Q.value = 6;
                    const oscs = [];
                    const harmonicSeries = [1, 2, 3, 5, 8];
                    harmonicSeries.forEach(harm => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = baseFreq * harm;
                        const tremolo = ctx.createOscillator();
                        tremolo.type = 'sine';
                        tremolo.frequency.value = 6 + Math.random() * 5;
                        const tremGain = ctx.createGain();
                        tremGain.gain.value = 8 + Math.random() * 15;
                        tremolo.connect(tremGain);
                        tremGain.connect(osc.frequency);
                        oscs.push(osc, tremolo);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.75;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    oscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1); });
                } catch (err) { console.warn('Violin harmonics error:', err); }
            }

            function createPizzicato(ctx, frequency, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.5, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + 0.35);
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = frequency;
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'sine';
                    osc2.frequency.value = frequency * 3.01;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.15;
                    osc2.connect(osc2Gain);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(3000, now);
                    filter.frequency.exponentialRampToValueAtTime(400, now + 0.3);
                    filter.Q.value = 1.5;
                    osc.connect(filter);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.5;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + 0.4);
                    osc2.stop(now + 0.4);
                } catch (err) { console.warn('Pizzicato error:', err); }
            }

            function createStringCluster(ctx, frequencies, duration, intensity = 0.55) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 1.8);
                    gainNode.gain.setValueAtTime(intensity * 0.2, now + duration - 2);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 600;
                    filter.Q.value = 1.2;
                    const allOscs = [];
                    frequencies.forEach(f => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = f;
                        const microLfo = ctx.createOscillator();
                        microLfo.type = 'sine';
                        microLfo.frequency.value = 0.3 + Math.random() * 0.6;
                        const microGain = ctx.createGain();
                        microGain.gain.value = 1 + Math.random() * 3;
                        microLfo.connect(microGain);
                        microGain.connect(osc.frequency);
                        allOscs.push(osc, microLfo);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.6;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    allOscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1.5); });
                } catch (err) { console.warn('String cluster error:', err); }
            }

            function createLynchPad(ctx, frequency, duration, intensity = 0.5, detuneSpread = 8) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.12, now + 1.2);
                    gainNode.gain.setValueAtTime(intensity * 0.12, now + duration - 2);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.8);
                    const oscs = [];
                    for (let i = 0; i < 4; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = i < 2 ? 'sawtooth' : 'triangle';
                        const detune = (i - 1.5) * detuneSpread;
                        osc.frequency.value = frequency * Math.pow(2, detune / 1200);
                        oscs.push(osc);
                    }
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 180;
                    filter.Q.value = 3;
                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.08 + Math.random() * 0.12;
                    const lfoGain = ctx.createGain();
                    lfoGain.gain.value = 100 + Math.random() * 150;
                    lfo.connect(lfoGain);
                    lfoGain.connect(filter.frequency);
                    oscs.forEach(o => o.connect(filter));
                    filter.connect(gainNode);
                    const drySend = ctx.createGain();
                    drySend.gain.value = 0.45;
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.55;
                    gainNode.connect(drySend);
                    gainNode.connect(wetSend);
                    drySend.connect(dryGain || ctx.destination);
                    wetSend.connect(wetGain || ctx.destination);
                    oscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1); });
                    lfo.start(now);
                    lfo.stop(now + duration + 1);
                } catch (err) { console.warn('Lynch pad error:', err); }
            }

            function createIndustrialTexture(ctx, duration, intensity = 0.4) {
                try {
                    const now = ctx.currentTime;
                    const bufferSize = ctx.sampleRate * 2;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        const t = i / ctx.sampleRate;
                        data[i] = (Math.random() * 2 - 1) * Math.sin(t * 120 + Math.sin(t * 3) * 40) * Math.exp(-t / 8);
                    }
                    const source = ctx.createBufferSource();
                    source.buffer = buffer;
                    source.loop = true;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 200;
                    filter.Q.value = 0.4;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.08, now + 1);
                    gainNode.gain.setValueAtTime(intensity * 0.08, now + duration - 1);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    source.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.7;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    source.start(now);
                    source.stop(now + duration);
                } catch (err) { console.warn('Industrial texture error:', err); }
            }

            function createLynchSting(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.25, now + 0.05);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(80, now);
                    osc.frequency.exponentialRampToValueAtTime(300, now + 0.4);
                    osc.frequency.exponentialRampToValueAtTime(60, now + 2);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'sawtooth';
                    osc2.frequency.setValueAtTime(160, now);
                    osc2.frequency.exponentialRampToValueAtTime(600, now + 0.35);
                    osc2.frequency.exponentialRampToValueAtTime(120, now + 2);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 400;
                    filter.Q.value = 2;
                    osc.connect(filter);
                    osc2.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.6;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + 2.5);
                    osc2.stop(now + 2.5);
                } catch (err) { console.warn('Sting error:', err); }
            }

            function createLynchClimax(ctx, intensity = 0.7) {
                try {
                    const now = ctx.currentTime;
                    const duration = 10 + Math.random() * 8;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.35, now + 3);
                    gainNode.gain.setValueAtTime(intensity * 0.4, now + duration - 2);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    const oscs = [];
                    const freqs = [55, 82.5, 110, 165];
                    freqs.forEach(f => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(f, now);
                        osc.frequency.exponentialRampToValueAtTime(f * 1.5, now + duration * 0.7);
                        oscs.push(osc);
                    });
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(150, now);
                    filter.frequency.exponentialRampToValueAtTime(900, now + duration);
                    filter.Q.value = 2.5;
                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.06;
                    const lfoGain = ctx.createGain();
                    lfoGain.gain.value = 250;
                    lfo.connect(lfoGain);
                    lfoGain.connect(filter.frequency);
                    oscs.forEach(o => o.connect(filter));
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.55;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    oscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1); });
                    lfo.start(now);
                    lfo.stop(now + duration + 1);
                } catch (err) { console.warn('Climax error:', err); }
            }

            function createBassNote(ctx, semitone, intensity = 0.5, duration = 2.0, rootFreq = 40) {
                try {
                    const now = ctx.currentTime;
                    const freq = rootFreq * Math.pow(2, semitone / 12);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.22, now + 0.08);
                    gainNode.gain.setValueAtTime(intensity * 0.22, now + duration - 0.5);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.4);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq * 0.98, now);
                    osc.frequency.exponentialRampToValueAtTime(freq, now + 0.15);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'square';
                    osc2.frequency.value = freq * 2;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.08 * intensity;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(120 + semitone * 4, now);
                    filter.frequency.exponentialRampToValueAtTime(80 + semitone * 2, now + duration);
                    filter.Q.value = 2.5;
                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.45;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + duration + 0.5);
                    osc2.stop(now + duration + 0.5);
                } catch (err) { console.warn('Bass note error:', err); }
            }

            function createKick(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.9, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(120, now);
                    osc.frequency.exponentialRampToValueAtTime(35, now + 0.15);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 180;
                    filter.Q.value = 1.2;
                    osc.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } catch (err) { console.warn('Kick error:', err); }
            }

            function createSnare(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.6, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    const bufferSize = ctx.sampleRate * 0.08;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        const env = Math.exp(-i / (ctx.sampleRate * 0.025));
                        data[i] = (Math.random() * 2 - 1) * env * 0.6;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(220, now);
                    osc.frequency.exponentialRampToValueAtTime(80, now + 0.08);
                    const oscGain = ctx.createGain();
                    oscGain.gain.value = 0.2 * intensity;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 300;
                    filter.Q.value = 0.8;
                    noise.connect(filter);
                    osc.connect(oscGain);
                    oscGain.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    osc.start(now);
                    noise.stop(now + 0.12);
                    osc.stop(now + 0.12);
                } catch (err) { console.warn('Snare error:', err); }
            }

            function createHat(ctx, intensity = 0.3) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.5, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
                    const bufferSize = ctx.sampleRate * 0.025;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        const env = Math.exp(-i / (ctx.sampleRate * 0.01));
                        data[i] = (Math.random() * 2 - 1) * env * 0.4;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.value = 5000;
                    filter.Q.value = 0.5;
                    noise.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    noise.stop(now + 0.08);
                } catch (err) { console.warn('Hat error:', err); }
            }

            // ─── AI Pattern Player ───────────────────────────────────────────

            function startEvolvingPatternPlayer(themeName, rootFreq = 40, scoreData = null) {
                stopPatternPlayer();
                if (!scoreData || !scoreData[themeName]) {
                    console.warn('No AI score data for theme:', themeName);
                    return;
                }
                const theme = scoreData[themeName];
                const bpm = theme.bpm || 60;
                const bass = expandPattern(theme.bass);
                const kick = expandPattern(theme.kick);
                const snare = expandPattern(theme.snare);
                const hat = expandPattern(theme.hat);

                const variations = [{
                    name: 'AI',
                    bars: 8,
                    bass: bass,
                    kick: kick,
                    snare: snare,
                    hat: hat
                }];
                currentSectionPatterns = variations;
                currentVariationIdx = 0;
                barsInVariation = 0;
                patternStep = 0;
                patternBPM = bpm;
                fillActive = false;
                patternPlayerActive = { active: true, theme: themeName };

                const stepDuration = 60 / bpm / 4;

                function playStep() {
                    if (!patternPlayerActive || !patternPlayerActive.active) return;
                    const ctx = audioCtx;
                    if (!ctx) { patternPlayerTimeout = setTimeout(playStep, 100); return; }
                    const step = patternStep % 16;
                    const current = variations[0];
                    const isFillStep = fillActive;
                    let bassSemitone = 0;
                    if (isFillStep) {
                        bassSemitone = (step % 4 === 0) ? 0 : (step % 8 === 4 ? 7 : 0);
                    } else {
                        bassSemitone = current.bass[step] || 0;
                    }
                    if (bassSemitone !== 0 || (isFillStep && step % 4 === 0)) {
                        const dur = isFillStep ? 0.25 : 1.8;
                        const inten = isFillStep ? 0.3 : 0.5 + (bassSemitone / 30);
                        createBassNote(ctx, bassSemitone, inten, dur, rootFreq);
                    }
                    let kickVal = isFillStep ? (step % 4 === 0 ? 1 : 0) : (current.kick[step] || 0);
                    if (kickVal === 1) createKick(ctx, isFillStep ? 0.7 : 0.6);
                    let snareVal = isFillStep ? (step % 8 === 4 ? 1 : 0) : (current.snare[step] || 0);
                    if (snareVal === 1) createSnare(ctx, isFillStep ? 0.7 : 0.5);
                    let hatVal = isFillStep ? (step % 2 === 0 ? 1 : 0) : (current.hat[step] || 0);
                    if (hatVal === 1 && Math.random() < 0.7) createHat(ctx, isFillStep ? 0.4 : 0.2);
                    patternStep++;
                    if (patternStep % 16 === 0) {
                        barsInVariation++;
                        if (barsInVariation >= current.bars) barsInVariation = 0;
                    }
                    patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
                }
                patternPlayerTimeout = setTimeout(playStep, 50);
            }

            function stopPatternPlayer() {
                if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout);
                    patternPlayerTimeout = null; }
                if (patternPlayerActive) { patternPlayerActive.active = false;
                    patternPlayerActive = null; }
                patternStep = 0;
                currentSectionPatterns = [];
                currentVariationIdx = 0;
                barsInVariation = 0;
                fillActive = false;
            }

            // ─── Master playSound ──────────────────────────────────────────

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    if (!ctx) return;
                    const now = ctx.currentTime;
                    switch (type) {
                        case 'pad':
                            createLynchPad(ctx, 55 + Math.random() * 25, 18 + Math.random() * 18, intensity);
                            break;
                        case 'sting':
                            createLynchSting(ctx, intensity);
                            break;
                        case 'pulse':
                        case 'heartbeat':
                            createKick(ctx, 0.7 * intensity);
                            setTimeout(() => createKick(ctx, 0.7 * intensity), 200);
                            break;
                        case 'thunder': {
                            const bufferSize = ctx.sampleRate * 0.8;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.5));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(intensity * 0.5, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 100;
                            filter.Q.value = 0.5;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(now);
                            source.stop(now + 1.2);
                            break;
                        }
                        case 'bell': {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 60 + Math.random() * 25;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0, now);
                            gain.gain.linearRampToValueAtTime(intensity * 0.35, now + 0.15);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 4);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 350;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(now);
                            osc.stop(now + 4);
                            break;
                        }
                        case 'climax':
                            createLynchClimax(ctx, intensity);
                            break;
                        case 'industrial_hum':
                            createIndustrialTexture(ctx, 12 + Math.random() * 10, intensity);
                            break;
                        case 'string_pad':
                            createStringPad(ctx, 55 + Math.random() * 30, 14 + Math.random() * 16, intensity);
                            break;
                        case 'cello_drone':
                            createCelloDrone(ctx, 40 + Math.random() * 25, 12 + Math.random() * 14, intensity);
                            break;
                        case 'string_swell':
                            createStringSwell(ctx, 50 + Math.random() * 40, 6 + Math.random() * 8, intensity);
                            break;
                        case 'violin_texture':
                            createViolinHarmonics(ctx, 80 + Math.random() * 60, 10 + Math.random() * 12, intensity);
                            break;
                        case 'pizzicato':
                            createPizzicato(ctx, 60 + Math.random() * 50, intensity);
                            setTimeout(() => createPizzicato(ctx, 55 + Math.random() * 45, intensity * 0.7), 180 + Math
                            .random() * 250);
                            break;
                        case 'string_cluster': {
                            const clusterFreqs = [];
                            const root = 45 + Math.random() * 35;
                            for (let i = 0; i < 5; i++) clusterFreqs.push(root * (1 + (Math.random() - 0.5) * 0.25));
                            createStringCluster(ctx, clusterFreqs, 8 + Math.random() * 10, intensity);
                            break;
                        }
                        case 'bass': {
                            const semitone = Math.floor(Math.random() * 12);
                            createBassNote(ctx, semitone, intensity, 1.5 + Math.random() * 1.5, 40);
                            break;
                        }
                        case 'kick':
                            createKick(ctx, intensity);
                            break;
                        case 'snare':
                            createSnare(ctx, intensity);
                            break;
                        case 'hat':
                            createHat(ctx, intensity * 0.5);
                            break;
                        default:
                            console.warn('Unknown sound type:', type);
                    }
                } catch (err) { console.warn('playSound error:', err); }
            }

            // ─── Ambient ──────────────────────────────────────────────────

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.22, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'ambient_drone' || type === 'wind_howl' || type === 'industrial_drone') {
                        const bufferSize = ctx.sampleRate * 1.5;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.4;
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'industrial_drone' ? 120 : type === 'ambient_drone' ? 160 :
                            500;
                        filter.Q.value = 0.4;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'industrial_drone' ? 50 : type === 'ambient_drone' ? 70 : 100;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.15 * intensity;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 80;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) { console.warn('playAmbient error:', err); }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 500);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            // ─── Lynch Ambient Themes ─────────────────────────────────────

            const LYNCH_AMBIENT = {
                intro: { rootFreq: 45, detuneSpread: 12, filterBase: 120, lfoRate: 0.05, noiseMix: 0.15,
                    intensity: 0.25, stringLayer: 'soft_pad', stringFreq: 55, stringIntensity: 0.18 },
                setup: { rootFreq: 50, detuneSpread: 10, filterBase: 150, lfoRate: 0.07, noiseMix: 0.20,
                    intensity: 0.30, stringLayer: 'cello', stringFreq: 42, stringIntensity: 0.22 },
                scheme: { rootFreq: 55, detuneSpread: 15, filterBase: 130, lfoRate: 0.09, noiseMix: 0.30,
                    intensity: 0.35, stringLayer: 'tension_pad', stringFreq: 58, stringIntensity: 0.28 },
                execution: { rootFreq: 48, detuneSpread: 18, filterBase: 100, lfoRate: 0.11, noiseMix: 0.45,
                    intensity: 0.45, stringLayer: 'cluster', stringFreq: 44, stringIntensity: 0.35 },
                twist: { rootFreq: 52, detuneSpread: 20, filterBase: 90, lfoRate: 0.13, noiseMix: 0.50,
                    intensity: 0.55, stringLayer: 'swell', stringFreq: 50, stringIntensity: 0.42 },
                closing: { rootFreq: 40, detuneSpread: 6, filterBase: 150, lfoRate: 0.03, noiseMix: 0.05,
                    intensity: 0.15, stringLayer: 'soft_pad', stringFreq: 42, stringIntensity: 0.10 }
            };

            function startStringLayer(theme) {
                if (!audioCtx) return;
                stopStringAmbient();
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const stringType = theme.stringLayer || 'soft_pad';
                const freq = theme.stringFreq || 50;
                const intensity = theme.stringIntensity || 0.2;
                const allNodes = [];
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 2);

                if (stringType === 'cello') {
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 280;
                    filter.Q.value = 3;
                    for (let i = 0; i < 3; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = 'triangle';
                        osc.frequency.value = freq * (1 + (i - 1) * 0.006);
                        const vib = ctx.createOscillator();
                        vib.type = 'sine';
                        vib.frequency.value = 2 + i;
                        const vibG = ctx.createGain();
                        vibG.gain.value = 2.5;
                        vib.connect(vibG);
                        vibG.connect(osc.frequency);
                        allNodes.push(osc, vib);
                        osc.connect(filter);
                    }
                    filter.connect(gainNode);
                } else if (stringType === 'cluster') {
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 400;
                    filter.Q.value = 1.5;
                    const clusterFreqs = [freq * 0.98, freq, freq * 1.015, freq * 1.03, freq * 1.05];
                    clusterFreqs.forEach(f => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = f;
                        const mlfo = ctx.createOscillator();
                        mlfo.type = 'sine';
                        mlfo.frequency.value = 0.25 + Math.random() * 0.5;
                        const mg = ctx.createGain();
                        mg.gain.value = 1.5;
                        mlfo.connect(mg);
                        mg.connect(osc.frequency);
                        allNodes.push(osc, mlfo);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                } else if (stringType === 'swell') {
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 350;
                    filter.Q.value = 2;
                    const intervals = [0, 4, 7, 12, 19];
                    intervals.forEach(interval => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = freq * Math.pow(2, interval / 12);
                        allNodes.push(osc);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                } else {
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 550;
                    filter.Q.value = 2;
                    for (let i = 0; i < 6; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = i < 3 ? 'triangle' : 'sawtooth';
                        osc.frequency.value = freq * (1 + (i - 2.5) * 0.007);
                        const vib = ctx.createOscillator();
                        vib.type = 'sine';
                        vib.frequency.value = 3.5 + i * 0.8;
                        const vibG = ctx.createGain();
                        vibG.gain.value = 2 + i * 0.5;
                        vib.connect(vibG);
                        vibG.connect(osc.frequency);
                        allNodes.push(osc, vib);
                        osc.connect(filter);
                    }
                    filter.connect(gainNode);
                }
