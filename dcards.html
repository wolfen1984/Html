<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
  <title>DUNGEONS & DEMONS · 80s DOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --panel: #000000;
      --border: #00ffff;
      --text: #00ffff;
      --text-dim: #008080;
      --highlight: #ff00ff;
      --danger: #ff0000;
      --heal: #00ff00;
      --energy-color: #ffff00;
      --demon: #ff0000;
      --werewolf: #ff8800;
      --vampire: #ff00ff;
      --human: #00ffff;
      --legendary: #ffd700;
      --card-bg: #000000;
      --field-bg: #000000;
      --button-border: #ff00ff;
      --button-text: #ff00ff;
      --crt-glow: rgba(0, 255, 255, 0.04);
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: 11px; /* Slightly larger base */
      letter-spacing: 0.5px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      color: var(--text);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      max-width: 600px; /* slightly wider */
      margin: 0 auto;
      position: relative;
      background: #000;
      border-left: 4px double var(--border);
      border-right: 4px double var(--border);
      box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.7), 0 0 30px rgba(0, 150, 255, 0.08);
      overflow: hidden;
    }
    #app::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(0deg, rgba(0,255,255,0.025) 0px, rgba(0,255,255,0.025) 2px, transparent 2px, transparent 5px);
      pointer-events: none;
      z-index: 999;
      box-shadow: inset 0 0 80px rgba(0,0,0,0.5);
    }
    /* ---- TOP BAR (enemy) ---- */
    #top-bar {
      padding: 8px 12px;
      background: #000;
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
      flex-shrink: 0;
    }
    #enemy-avatar {
      font-size: 36px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--danger);
      background: #000;
      color: var(--danger);
      text-shadow: 0 0 10px var(--danger);
      flex-shrink: 0;
    }
    #enemy-info {
      flex: 1;
      min-width: 0;
    }
    #enemy-name {
      font-size: 10px;
      color: var(--danger);
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #enemy-life-container {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    #enemy-life-bar-outer {
      flex: 1;
      height: 12px;
      background: #110000;
      border: 1px solid var(--danger);
    }
    #enemy-life-bar-inner {
      height: 100%;
      background: var(--danger);
      transition: width 0.3s step-end;
      box-shadow: 0 0 6px var(--danger);
    }
    #enemy-life-text {
      font-size: 10px;
      color: var(--danger);
      min-width: 35px;
      text-align: right;
    }
    #win-counter {
      font-size: 8px;
      color: #555;
      margin-top: 2px;
    }

    /* ---- BATTLE AREA (reduced height) ---- */
    #battle-area {
      flex: 0 0 auto;
      height: 26vh;          /* takes less vertical space */
      min-height: 150px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      gap: 4px;
      position: relative;
    }
    #enemy-field, #player-field {
      width: 90%;
      max-width: 350px;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #clash-indicator {
      font-size: 20px;
      color: var(--highlight);
      text-shadow: 0 0 14px var(--highlight);
      font-weight: bold;
      height: 20px;
      display: flex;
      align-items: center;
    }
    #battle-log {
      font-size: 8px;
      color: #666;
      text-align: center;
      min-height: 18px;
      max-height: 28px;
      overflow: hidden;
      padding: 0 8px;
      letter-spacing: 0.3px;
      transition: color 0.3s;
    }
    #battle-log.flash {
      color: #ccc;
    }

    /* ---- FIELD CARDS (larger) ---- */
    .field-card {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid;
      background: #000;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 0 12px currentColor;
      position: relative;
    }
    .field-card.hit-flash {
      box-shadow: 0 0 30px #fff !important;
      border-color: #fff !important;
      transition: 0.05s;
    }
    .field-card-emoji {
      font-size: 42px;
      flex-shrink: 0;
    }
    .field-card-info {
      flex: 1;
      min-width: 0;
    }
    .field-card-name {
      font-size: 10px;
      color: #fff;
      text-transform: uppercase;
    }
    .field-card-class {
      font-size: 7px;
      color: #aaa;
      margin-top: 2px;
    }
    .field-card-stats {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      font-size: 10px;
    }
    .stat-atk { color: var(--danger); }
    .stat-hp { color: var(--heal); }
    .field-card-ability {
      font-size: 7px;
      color: #888;
      margin-top: 3px;
      font-style: italic;
    }
    .field-empty {
      color: #333;
      font-size: 10px;
      text-align: center;
      padding: 18px;
      border: 2px dashed #222;
      width: 100%;
    }

    /* ---- HAND AREA (now flex:1 to fill space) ---- */
    #hand-area {
      flex: 1 1 auto;
      padding: 6px 8px;
      background: #000;
      border-top: 2px solid var(--border);
      z-index: 5;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    #hand-label {
      font-size: 8px;
      color: #888;
      text-align: center;
      margin-bottom: 2px;
      text-transform: uppercase;
    }
    #hand-info {
      font-size: 7px;
      color: #666;
      text-align: center;
      margin-bottom: 4px;
      display: flex;
      justify-content: center;
      gap: 15px;
    }
    #discard-hint {
      font-size: 6px;
      color: #ffaa00;
      text-align: center;
      margin-bottom: 2px;
      display: none;
      letter-spacing: 0.5px;
      animation: blinkHint 0.7s step-end infinite;
    }
    @keyframes blinkHint { 0%,100%{opacity:1} 50%{opacity:0.4} }
    #hand-cards {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 6px 2px;
      justify-content: center;
      flex-wrap: nowrap;
      scroll-snap-type: x proximity;
      align-items: flex-end;
      flex: 1;
    }
    #hand-cards::-webkit-scrollbar { height: 4px; }
    #hand-cards::-webkit-scrollbar-thumb { background: #333; }

    /* ---- HAND CARDS (larger & clearer) ---- */
    .hand-card {
      flex-shrink: 0;
      width: 115px;
      min-width: 115px;
      padding: 10px 6px 8px;
      border: 2px solid #222;
      background: #000;
      cursor: pointer;
      text-align: center;
      position: relative;
      scroll-snap-align: center;
      transition: all 0.1s step-end;
    }
    .hand-card:active { transform: scale(0.95); border-color: var(--highlight); }
    .hand-card.playable-glow {
      border-color: #00ff88 !important;
      box-shadow: 0 0 10px rgba(0,255,136,0.4);
    }
    .hand-card.selected {
      border-color: var(--highlight) !important;
      box-shadow: 0 0 18px var(--highlight), 0 0 35px rgba(255,0,255,0.35);
      transform: translateY(-6px);
      z-index: 6;
    }
    .hand-card.unplayable {
      opacity: 0.4;
      filter: grayscale(50%);
      pointer-events: none;
    }
    .hand-card-emoji {
      font-size: 30px;
      line-height: 1.2;
    }
    .hand-card-name {
      font-size: 8px;
      color: #fff;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hand-card-stats {
      font-size: 8px;
      color: #ccc;
      margin-top: 3px;
      display: flex;
      justify-content: center;
      gap: 5px;
    }
    .hand-card-ability-preview {
      font-size: 6px;
      color: #777;
      margin-top: 3px;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hand-card-cost {
      position: absolute;
      top: -10px;
      right: -10px;
      width: 22px;
      height: 22px;
      border: 2px solid var(--energy-color);
      background: #000;
      color: var(--energy-color);
      font-weight: bold;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 8px var(--energy-color);
      z-index: 2;
    }
    .hand-card-cost.affordable {
      border-color: #00ff88;
      color: #00ff88;
      box-shadow: 0 0 12px #00ff88;
      animation: costGlow 0.8s step-end infinite;
    }
    @keyframes costGlow { 0%,100%{box-shadow:0 0 10px #00ff88} 50%{box-shadow:0 0 20px #00ff88,0 0 30px rgba(0,255,136,0.5)} }
    .hand-card .discard-x {
      position: absolute;
      top: -10px;
      left: -10px;
      width: 20px;
      height: 20px;
      border: 2px solid #ff4444;
      background: #000;
      color: #ff4444;
      font-size: 10px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 3;
      font-weight: bold;
      line-height: 1;
      box-shadow: 0 0 8px #ff4444;
    }
    .hand-card.selected .discard-x { display: flex; }
    .hand-card.selected .discard-x:active { background: #ff4444; color: #000; }

    /* ---- BOTTOM BAR ---- */
    #bottom-bar {
      flex-shrink: 0;
      padding: 10px 12px;
      background: #000;
      border-top: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }
    #player-life-display {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--danger);
    }
    .heart {
      font-size: 18px;
      color: var(--danger);
    }
    #player-life-num {
      font-size: 14px;
      font-weight: bold;
    }
    #energy-display {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
    }
    .energy-orb {
      width: 14px;
      height: 14px;
      border: 1px solid #333;
      background: #000;
      transition: all 0.2s;
    }
    .energy-orb.filled {
      background: var(--energy-color);
      border-color: var(--energy-color);
      box-shadow: 0 0 10px var(--energy-color);
    }
    #end-turn-btn {
      padding: 10px 14px;
      border: 2px solid var(--button-border);
      background: #000;
      color: var(--button-text);
      font-family: inherit;
      font-size: 10px;
      cursor: pointer;
      text-transform: uppercase;
      white-space: nowrap;
      transition: all 0.1s step-end;
    }
    #end-turn-btn:active { background: var(--button-border); color: #000; }
    #end-turn-btn:disabled { opacity: 0.4; pointer-events: none; }
    #deck-btn {
      width: 40px;
      height: 40px;
      border: 2px solid var(--button-border);
      background: #000;
      color: var(--button-text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #deck-btn:active { background: var(--button-border); color: #000; }

    /* ---- OVERLAY & MODALS ---- */
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #overlay.hidden { display: none; }
    #overlay-content {
      background: #000;
      border: 2px solid var(--highlight);
      padding: 20px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 0 35px var(--highlight);
      color: var(--text);
      max-height: 85vh;
      overflow-y: auto;
      font-size: 10px;
    }
    #overlay-content h2 { font-size: 16px; color: var(--highlight); margin-bottom: 12px; }
    #overlay-content p { font-size: 9px; color: #aaa; margin-bottom: 10px; }
    .reward-card {
      width: 115px;
      padding: 10px 4px;
      border: 2px solid;
      background: #000;
      cursor: pointer;
      text-align: center;
      transition: all 0.1s step-end;
    }
    .reward-card:active { transform: scale(0.94); border-color: var(--highlight); box-shadow: 0 0 18px var(--highlight); }
    .reward-card-emoji { font-size: 28px; }
    .reward-card-name { font-size: 8px; color: #fff; margin-top: 2px; }
    .reward-card-info { font-size: 7px; color: #aaa; margin-top: 2px; }
    .btn {
      padding: 10px 18px;
      border: 2px solid var(--border);
      background: #000;
      color: var(--text);
      font-family: inherit;
      font-size: 10px;
      cursor: pointer;
      text-transform: uppercase;
      margin: 5px;
    }
    .btn:active { background: var(--border); color: #000; }
    .btn.gold { border-color: var(--energy-color); color: var(--energy-color); }
    .btn.gold:active { background: var(--energy-color); color: #000; }
    .btn.danger { border-color: #ff4444; color: #ff4444; }
    .btn.danger:active { background: #ff4444; color: #000; }

    .class-badge {
      display: inline-block;
      padding: 2px 5px;
      border: 1px solid;
      font-size: 7px;
      text-transform: uppercase;
      font-weight: bold;
    }
    .class-badge.demon { border-color: var(--demon); color: var(--demon); }
    .class-badge.werewolf { border-color: var(--werewolf); color: var(--werewolf); }
    .class-badge.vampire { border-color: var(--vampire); color: var(--vampire); }
    .class-badge.human { border-color: var(--human); color: var(--human); }
    .class-badge.legendary { border-color: var(--legendary); color: var(--legendary); }
    .damage-pop {
      position: absolute;
      font-weight: bold;
      font-size: 20px;
      pointer-events: none;
      animation: pop-up 0.85s ease-out forwards;
      z-index: 20;
      text-shadow: 0 0 10px currentColor;
    }
    @keyframes pop-up {
      0% { opacity:1; transform: translateY(0) scale(1); }
      40% { opacity:1; transform: translateY(-14px) scale(1.3); }
      100% { opacity:0; transform: translateY(-40px) scale(0.7); }
    }
    @keyframes screenShake {
      0%,100% { transform: translate(0,0); }
      15% { transform: translate(-5px,2px); }
      30% { transform: translate(4px,-3px); }
      50% { transform: translate(-3px,-1px); }
      70% { transform: translate(2px,3px); }
      85% { transform: translate(-1px,-2px); }
    }
    #app.shaking { animation: screenShake 0.35s step-end; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }
    .shaking { animation: shake 0.3s step-end; }
  </style>
</head>
<body>
<div id="app">
  <div id="top-bar">
    <div id="enemy-avatar">👾</div>
    <div id="enemy-info">
      <div id="enemy-name">SHADOW IMP</div>
      <div id="enemy-life-container">
        <div id="enemy-life-bar-outer"><div id="enemy-life-bar-inner" style="width:100%"></div></div>
        <span id="enemy-life-text">20</span>
      </div>
      <div id="win-counter">WINS: 0</div>
    </div>
  </div>

  <div id="battle-area">
    <div id="enemy-field"></div>
    <div id="clash-indicator">►◄</div>
    <div id="player-field"></div>
    <div id="battle-log"></div>
  </div>

  <div id="hand-area">
    <div id="hand-label">► YOUR HAND ◄</div>
    <div id="hand-info"><span>🃏 <span id="hand-count">0</span>/7</span><span>🗑️ <span id="discard-count">0</span></span></div>
    <div id="discard-hint">TAP SELECTED CARD TO PLAY · ✕ TO DISCARD</div>
    <div id="hand-cards"></div>
  </div>

  <div id="bottom-bar">
    <div id="player-life-display"><span class="heart">♥</span><span id="player-life-num">25</span></div>
    <div id="energy-display"></div>
    <button id="deck-btn" title="Deck (D)">█</button>
    <button id="end-turn-btn">END TURN</button>
  </div>
</div>
<div id="overlay" class="hidden"><div id="overlay-content"></div></div>

<script>
(function() {
  // ==================== SOUND SYSTEM ====================
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function playBeep(freq, duration, type = 'square', vol = 0.08, glideTo = null) {
    try {
      const ctx = ensureAudio(); const now = ctx.currentTime;
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = type; osc.frequency.setValueAtTime(freq, now);
      if (glideTo) osc.frequency.linearRampToValueAtTime(glideTo, now + duration);
      gain.gain.setValueAtTime(vol, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now); osc.stop(now + duration + 0.01);
    } catch (e) {}
  }
  function sfxSelect() { playBeep(600,0.08,'square',0.05); playBeep(900,0.06,'square',0.04); }
  function sfxPlayCard() { playBeep(200,0.12,'sawtooth',0.07,500); playBeep(150,0.08,'triangle',0.05); }
  function sfxAttack() { playBeep(80,0.2,'sawtooth',0.1,40); playBeep(120,0.08,'square',0.06); }
  function sfxHeal() { playBeep(400,0.1,'triangle',0.06); playBeep(600,0.15,'triangle',0.05); playBeep(800,0.1,'triangle',0.04); }
  function sfxVictory() { playBeep(400,0.12,'square',0.07); setTimeout(()=>playBeep(500,0.12,'square',0.07),120); setTimeout(()=>playBeep(600,0.12,'square',0.07),240); setTimeout(()=>playBeep(800,0.2,'square',0.08),360); }
  function sfxDefeat() { playBeep(200,0.3,'sawtooth',0.08,60); playBeep(100,0.4,'sawtooth',0.07,30); }
  function sfxDiscard() { playBeep(300,0.06,'square',0.04); playBeep(200,0.08,'triangle',0.04); }
  function sfxBigHit() { playBeep(60,0.35,'sawtooth',0.12,25); playBeep(40,0.25,'square',0.08); }
  function sfxLegendary() { playBeep(800,0.1,'triangle',0.06); playBeep(1000,0.1,'square',0.05); playBeep(1200,0.15,'triangle',0.06); }
  function sfxCantrip() { playBeep(500,0.05,'triangle',0.04); playBeep(700,0.06,'triangle',0.03); }

  // ==================== EXPANDED CARD POOL ====================
  const ALL_CARDS = [
    { id:'knight', name:'Knight', class:'human', emoji:'⚔️', atk:3, hp:4, cost:3, ability:'Shield', tier:'common' },
    { id:'archer', name:'Archer', class:'human', emoji:'🏹', atk:4, hp:2, cost:3, ability:'Quick shot', tier:'common' },
    { id:'priest', name:'Priest', class:'human', emoji:'⛪', atk:2, hp:3, cost:3, ability:'Heal 2', tier:'common', onPlayHeal:2 },
    { id:'rogue', name:'Rogue', class:'human', emoji:'🗡️', atk:5, hp:2, cost:4, ability:'First strike +2', tier:'uncommon', bonusFirstStrike:2 },
    { id:'paladin', name:'Paladin', class:'human', emoji:'🛡️', atk:3, hp:6, cost:4, ability:'Tank', tier:'uncommon' },
    { id:'mage', name:'Mage', class:'human', emoji:'🧙', atk:5, hp:2, cost:4, ability:'Fireball 2', tier:'uncommon', splashDamage:2 },
    { id:'crusader', name:'Crusader', class:'human', emoji:'✝️', atk:6, hp:5, cost:5, ability:'Wrath', tier:'rare' },
    { id:'assassin', name:'Assassin', class:'human', emoji:'🥷', atk:7, hp:3, cost:5, ability:'Lethal', tier:'rare' },
    { id:'monk', name:'Monk', class:'human', emoji:'🧘', atk:4, hp:4, cost:4, ability:'Heal 3', tier:'uncommon', onPlayHeal:3 },
    { id:'battlemage', name:'B.Mage', class:'human', emoji:'⚡', atk:5, hp:3, cost:5, ability:'Shock 1', tier:'rare', onPlayDamage:1 },
    { id:'templar', name:'Templar', class:'human', emoji:'⛨', atk:3, hp:7, cost:5, ability:'Bulwark', tier:'rare' },

  // ==================== GAME STATE ====================
  const state = {
    playerLife: 25, maxPlayerLife: 25, playerEnergy: 3, maxEnergy: 6, energyPerTurn: 2,
    playerDeck: [], playerHand: [], playerField: null, playerDiscard: [],
    enemyLife: 20, maxEnemyLife: 20, enemyEnergy: 2,
    enemyDeck: [], enemyHand: [], enemyField: null, enemyDiscard: [],
    wins: 0, isPlayerTurn: true, selectedHandIndex: -1, gameOver: false,
    burnOnEnemy: 0, burnOnPlayer: 0, enemyFearReduction: 0,

  function cloneCard(c) { return { ...c, currentHp: c.hp }; }
  function shuffle(a) { const arr=[...a]; for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

  function getEnemyDeck() {
    const tiers=['common']; if(state.wins>=2) tiers.push('uncommon'); if(state.wins>=5) tiers.push('rare'); if(state.wins>=8) tiers.push('epic'); if(state.wins>=12) tiers.push('legendary');
    let pool=ALL_CARDS.filter(c=>tiers.includes(c.tier)); if(pool.length<10) pool=ALL_CARDS.filter(c=>c.tier==='common'||c.tier==='uncommon');
    const deck=[]; for(let i=0;i<Math.min(8+Math.floor(state.wins/2),16);i++) deck.push(cloneCard(pool[Math.floor(Math.random()*pool.length)]));
    return shuffle(deck);
  }
  function getEnemyLife() { return Math.min(45, 18 + Math.floor(state.wins * 2.5)); }
  function getEnemyName() {
    const n=['SHADOW IMP','DARK WOLF','BLOOD BARON','HELL KNIGHT','ABYSSAL LORD','FENRIR SHADE','DEMON PRINCE','VAMPIRE COUNT','ALPHA TERROR','DREAD OVERLORD','SOUL REAPER','INFERNAL DRAKE','NIGHT STALKER','DOOM BRINGER','ELDER LICH','CHAOS WYRM','VOID KNIGHT','DEATH WHISPER','PHANTOM LORD','OBLIVION'];
    return n[Math.min(state.wins, n.length-1)];
  }
  function getRewardCards() {
    let tiers=['common']; if(state.wins>=2) tiers.push('uncommon'); if(state.wins>=5) tiers.push('rare'); if(state.wins>=8) tiers.push('epic'); if(state.wins>=12) tiers.push('legendary');
    const pool=ALL_CARDS.filter(c=>tiers.includes(c.tier)); const rewards=[]; const used=new Set();
    for(let i=0;i<3;i++){ let c,tries=0; do{ c=pool[Math.floor(Math.random()*pool.length)]; tries++; } while(used.has(c.id)&&tries<30); used.add(c.id); rewards.push(cloneCard(c)); }
    return rewards;
  }
  function addBattleLog(msg) {
    state.battleLogMessages.push(msg); if(state.battleLogMessages.length>6) state.battleLogMessages.shift();
    const el=document.getElementById('battle-log'); if(el) { el.textContent=state.battleLogMessages.join(' · '); el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),300); }
  }

  function initGame() {
    const starters=['knight','squire','acolyte','archer','priest','footman','lesser_imp','wolf','vampire_spawn','bat'];
    state.playerDeck=shuffle(starters.map(id=>cloneCard(ALL_CARDS.find(c=>c.id===id))));
    state.playerHand=[]; state.playerField=null; state.playerDiscard=[];
    state.playerLife=25; state.playerEnergy=3;
    state.enemyDeck=getEnemyDeck(); state.enemyHand=[]; state.enemyField=null; state.enemyDiscard=[];
    state.enemyLife=getEnemyLife(); state.maxEnemyLife=state.enemyLife; state.enemyEnergy=2;
    state.isPlayerTurn=true; state.gameOver=false; state.burnOnEnemy=0; state.burnOnPlayer=0; state.enemyFearReduction=0;
    state.discardUsedThisTurn=false; state.battleLogMessages=[]; state.extraTurnGranted=false; state.cardsPlayedThisTurn=0;
    state.selectedHandIndex=-1;
    for(let i=0;i<4;i++) drawCard('player');
    for(let i=0;i<3;i++) drawCard('enemy');
    if(state.enemyHand.length>0){ const c=state.enemyHand.splice(0,1)[0]; state.enemyField=c; state.enemyField.currentHp=c.hp; }
    updateUI(); hideOverlay(); addBattleLog('New battle begins!');
  }

  function drawCard(who) {
    const deck=who==='player'?state.playerDeck:state.enemyDeck;
    const hand=who==='player'?state.playerHand:state.enemyHand;
    const discard=who==='player'?state.playerDiscard:state.enemyDiscard;
    if(deck.length===0 && discard.length===0) return null;
    if(deck.length===0){ const reshuffled=shuffle(discard.map(c=>cloneCard(c))); if(who==='player'){state.playerDeck=reshuffled; state.playerDiscard=[];} else {state.enemyDeck=reshuffled; state.enemyDiscard=[];} }
    const d=who==='player'?state.playerDeck:state.enemyDeck; if(d.length===0) return null;
    const card=d.pop(); hand.push(card);
    const maxH=who==='player'?7:5;
    while(hand.length>maxH){ const extra=hand.shift(); (who==='player'?state.playerDiscard:state.enemyDiscard).push(extra); }
    return card;
  }

  function discardFromHand(who, handIndex) {
    const hand=who==='player'?state.playerHand:state.enemyHand;
    const discard=who==='player'?state.playerDiscard:state.enemyDiscard;
    if(handIndex<0||handIndex>=hand.length) return false;
    const card=hand.splice(handIndex,1)[0]; discard.push(card);
    if(who==='player'){ state.discardUsedThisTurn=true; drawCard('player'); sfxDiscard(); addBattleLog('Discarded '+card.name); }
    updateUI(); return true;
  }

  function playCard(who, handIndex) {
    const hand=who==='player'?state.playerHand:state.enemyHand;
    const energy=who==='player'?state.playerEnergy:state.enemyEnergy;
    if(handIndex<0||handIndex>=hand.length) return false;
    const card=hand[handIndex]; if(card.cost>energy) return false;
    if(who==='player'){ state.playerEnergy-=card.cost; state.cardsPlayedThisTurn++; } else state.enemyEnergy-=card.cost;
    hand.splice(handIndex,1);
    const oldField=who==='player'?state.playerField:state.enemyField;
    if(oldField){ (who==='player'?state.playerDiscard:state.enemyDiscard).push(oldField); }
    const newCard=cloneCard(card); newCard.currentHp=newCard.hp;
    if(newCard.onPlayBuff && who==='player'){ newCard.atk+=newCard.onPlayBuff; newCard.currentHp+=newCard.onPlayBuff; newCard.hp+=newCard.onPlayBuff; }
    if(who==='player') state.playerField=newCard; else state.enemyField=newCard;
    triggerOnPlay(who, newCard, card);
    const oppField=who==='player'?state.enemyField:state.playerField;
    const oppWho=who==='player'?'enemy':'player';
    if(oppField) resolveClash(who, newCard, oppWho, oppField);
    else {
      const oppLife=oppWho==='player'?state.playerLife:state.enemyLife;
      const dmg=newCard.atk;
      if(oppWho==='player') state.playerLife=Math.max(0,oppLife-dmg); else state.enemyLife=Math.max(0,oppLife-dmg);
      spawnDamagePop(oppWho==='player'?'player-field':'enemy-field', dmg, '#ff0000');
      if(newCard.lifesteal && who==='player'){ const healed=Math.min(state.maxPlayerLife, state.playerLife+newCard.lifesteal); const actual=healed-state.playerLife; state.playerLife=healed; if(actual>0) spawnDamagePop('player-field',actual,'#00ff00'); }
      sfxAttack(); addBattleLog(newCard.name+' strikes for '+dmg+'!'); if(dmg>=5) triggerScreenShake();
    }
    checkGameEnd(); updateUI(); return true;
  }

  function resolveClash(attWho, attCard, defWho, defCard) {
    let defAtk=defCard.atk; if(defWho==='enemy' && state.enemyFearReduction>0) defAtk=Math.max(0,defAtk-state.enemyFearReduction);
    let atkDmg=attCard.atk; if(attCard.bonusFirstStrike && attWho==='player') atkDmg+=attCard.bonusFirstStrike;
    const defDmg=defAtk;
    defCard.currentHp-=atkDmg; spawnDamagePop(defWho==='player'?'player-field':'enemy-field', atkDmg, '#ff0000');
    attCard.currentHp-=defDmg; spawnDamagePop(attWho==='player'?'player-field':'enemy-field', defDmg, '#ff8800');
    sfxAttack(); if(atkDmg>=5||defDmg>=5) triggerScreenShake();
    addBattleLog(attCard.name+' ⚔ '+defCard.name+' ('+atkDmg+' vs '+defDmg+')');
    if(attCard.lifesteal && attWho==='player'){ const healed=Math.min(state.maxPlayerLife, state.playerLife+attCard.lifesteal); const actual=healed-state.playerLife; state.playerLife=healed; if(actual>0){ spawnDamagePop('player-field',actual,'#00ff00'); sfxHeal(); } }
    if(defCard.lifesteal && defWho==='player'){ const healed=Math.min(state.maxPlayerLife, state.playerLife+defCard.lifesteal); const actual=healed-state.playerLife; state.playerLife=healed; if(actual>0) spawnDamagePop('player-field',actual,'#00ff00'); }
    if(defCard.currentHp<=0){ const ex=Math.abs(defCard.currentHp); if(defWho==='player'){ state.playerLife=Math.max(0,state.playerLife-ex); state.playerField=null; state.playerDiscard.push(defCard); } else { state.enemyLife=Math.max(0,state.enemyLife-ex); state.enemyField=null; state.enemyDiscard.push(defCard); } if(ex>0){ spawnDamagePop(defWho==='player'?'player-field':'enemy-field', ex, '#ff0000'); addBattleLog(defCard.name+' destroyed! Overkill: '+ex); } flashFieldCard(defWho); if(ex>=3) triggerScreenShake(); checkDeathResurrect(defWho, defCard); }
    if(attCard.currentHp<=0){ const ex2=Math.abs(attCard.currentHp); if(attWho==='player'){ state.playerLife=Math.max(0,state.playerLife-ex2); state.playerField=null; state.playerDiscard.push(attCard); } else { state.enemyLife=Math.max(0,state.enemyLife-ex2); state.enemyField=null; state.enemyDiscard.push(attCard); } if(ex2>0){ spawnDamagePop(attWho==='player'?'player-field':'enemy-field', ex2, '#ff0000'); addBattleLog(attCard.name+' also fell! Overkill: '+ex2); } flashFieldCard(attWho); checkDeathResurrect(attWho, attCard); }
    if(attCard.splashDamage && defCard.currentHp>0){ defCard.currentHp-=attCard.splashDamage; spawnDamagePop(defWho==='player'?'player-field':'enemy-field', attCard.splashDamage, '#ff8800'); if(defCard.currentHp<=0){ const ex3=Math.abs(defCard.currentHp); if(defWho==='player'){ state.playerLife=Math.max(0,state.playerLife-ex3); state.playerField=null; state.playerDiscard.push(defCard); } else { state.enemyLife=Math.max(0,state.enemyLife-ex3); state.enemyField=null; state.enemyDiscard.push(defCard); } if(ex3>0) spawnDamagePop(defWho==='player'?'player-field':'enemy-field', ex3, '#ff0000'); flashFieldCard(defWho); } }
    flashFieldCard('player'); flashFieldCard('enemy');
  }

  function checkDeathResurrect(who, card) {
    if(card.onDeathResurrect && card.currentHp<=0){ card.currentHp=card.hp; card.atk+=2; card.ability='Reborn +2'; if(who==='player') state.playerField=card; else state.enemyField=card; spawnDamagePop(who==='player'?'player-field':'enemy-field', card.hp, '#00ff00'); addBattleLog(card.name+' resurrects!'); sfxHeal(); updateUI(); }
  }

  function triggerOnPlay(who, card, originalCardData) {
    if(card.onPlayDraw && who==='player'){ for(let d=0;d<card.onPlayDraw;d++) drawCard('player'); addBattleLog(card.name+' draws '+card.onPlayDraw); sfxCantrip(); }
    if(card.onPlayEnergy!==undefined){ if(who==='player'){ state.playerEnergy=Math.min(state.maxEnergy, state.playerEnergy+card.onPlayEnergy); addBattleLog(card.name+' grants +'+card.onPlayEnergy+' energy'); sfxLegendary(); } else state.enemyEnergy=Math.min(state.maxEnergy, state.enemyEnergy+card.onPlayEnergy); }
    if(card.onPlayShuffleDiscard){ if(who==='player'){ state.playerDeck.push(...state.playerDiscard); state.playerDiscard=[]; state.playerDeck=shuffle(state.playerDeck); addBattleLog(card.name+' recycles discard!'); sfxLegendary(); } else { state.enemyDeck.push(...state.enemyDiscard); state.enemyDiscard=[]; state.enemyDeck=shuffle(state.enemyDeck); } }
    if(card.onPlayExtraTurn && who==='player' && !state.extraTurnGranted){ state.extraTurnGranted=true; state.isPlayerTurn=true; state.cardsPlayedThisTurn=0; state.playerEnergy=Math.min(state.maxEnergy, state.playerEnergy+state.energyPerTurn); state.discardUsedThisTurn=false; drawCard('player'); addBattleLog('Time Mage grants extra turn!'); sfxLegendary(); updateUI(); document.getElementById('end-turn-btn').disabled=false; return; }
    if(who==='player'){
      if(card.onPlayHeal){ state.playerLife=Math.min(state.maxPlayerLife, state.playerLife+card.onPlayHeal); spawnDamagePop('player-field',card.onPlayHeal,'#00ff00'); sfxHeal(); addBattleLog(card.name+' heals '+card.onPlayHeal); }
      if(card.onPlayDamage && state.enemyField){ state.enemyField.currentHp-=card.onPlayDamage; spawnDamagePop('enemy-field',card.onPlayDamage,'#ff8800'); if(state.enemyField.currentHp<=0){ const ex=Math.abs(state.enemyField.currentHp); state.enemyLife=Math.max(0,state.enemyLife-ex); state.enemyDiscard.push(state.enemyField); state.enemyField=null; if(ex>0) spawnDamagePop('enemy-field',ex,'#ff0000'); flashFieldCard('enemy'); } }
      if(card.fearEffect) state.enemyFearReduction=card.fearEffect;
      if(card.burnDamage && state.enemyField) state.burnOnEnemy=card.burnDamage;
    } else {
      if(card.onPlayHeal){ state.enemyLife=Math.min(state.maxEnemyLife, state.enemyLife+card.onPlayHeal); spawnDamagePop('enemy-field',card.onPlayHeal,'#00ff00'); }
      if(card.onPlayDamage && state.playerField){ state.playerField.currentHp-=card.onPlayDamage; spawnDamagePop('player-field',card.onPlayDamage,'#ff8800'); if(state.playerField.currentHp<=0){ const ex=Math.abs(state.playerField.currentHp); state.playerLife=Math.max(0,state.playerLife-ex); state.playerDiscard.push(state.playerField); state.playerField=null; if(ex>0) spawnDamagePop('player-field',ex,'#ff0000'); flashFieldCard('player'); } }
      if(card.burnDamage && state.playerField) state.burnOnPlayer=card.burnDamage;
    }
  }

  function applyBurnDamage() {
    if(state.burnOnEnemy>0 && state.enemyField){ state.enemyField.currentHp-=state.burnOnEnemy; spawnDamagePop('enemy-field',state.burnOnEnemy,'#ff4400'); if(state.enemyField.currentHp<=0){ const ex=Math.abs(state.enemyField.currentHp); state.enemyLife=Math.max(0,state.enemyLife-ex); state.enemyDiscard.push(state.enemyField); state.enemyField=null; if(ex>0) spawnDamagePop('enemy-field',ex,'#ff0000'); flashFieldCard('enemy'); } }
    if(state.burnOnPlayer>0 && state.playerField){ state.playerField.currentHp-=state.burnOnPlayer; spawnDamagePop('player-field',state.burnOnPlayer,'#ff4400'); if(state.playerField.currentHp<=0){ const ex=Math.abs(state.playerField.currentHp); state.playerLife=Math.max(0,state.playerLife-ex); state.playerDiscard.push(state.playerField); state.playerField=null; if(ex>0) spawnDamagePop('player-field',ex,'#ff0000'); flashFieldCard('player'); } }
    if(!state.enemyField) state.burnOnEnemy=0;
    if(!state.playerField) state.burnOnPlayer=0;
  }

  function flashFieldCard(who) { const el=document.getElementById(who==='player'?'player-field':'enemy-field'); if(!el) return; const card=el.querySelector('.field-card'); if(card){ card.classList.add('hit-flash'); setTimeout(()=>card.classList.remove('hit-flash'),150); } }
  function triggerScreenShake() { const app=document.getElementById('app'); if(app){ app.classList.add('shaking'); setTimeout(()=>app.classList.remove('shaking'),350); } sfxBigHit(); }
  function spawnDamagePop(fieldId, amount, color) { const el=document.getElementById(fieldId); if(!el) return; const pop=document.createElement('span'); pop.className='damage-pop'; if(color==='#00ff00') pop.classList.add('heal-pop'); pop.textContent=(color==='#00ff00'?'+':'-')+Math.abs(amount); pop.style.color=color; pop.style.left=(25+Math.random()*50)+'%'; pop.style.top=(5+Math.random()*40)+'%'; el.appendChild(pop); setTimeout(()=>pop.remove(),850); }
  function checkGameEnd() { if(state.playerLife<=0){ state.gameOver=true; state.playerLife=0; sfxDefeat(); showDefeatOverlay(); return true; } if(state.enemyLife<=0){ state.gameOver=true; state.enemyLife=0; state.wins++; sfxVictory(); showVictoryOverlay(); return true; } return false; }

  function enemyTurn() {
    if(state.gameOver) return;
    state.enemyEnergy=Math.min(state.maxEnergy, state.enemyEnergy+state.energyPerTurn);
    state.enemyFearReduction=Math.max(0,(state.enemyFearReduction||0)-1);
    drawCard('enemy');
    let played=0;
    while(played<3 && !state.gameOver){
      const playable=[]; for(let i=0;i<state.enemyHand.length;i++) if(state.enemyHand[i].cost<=state.enemyEnergy) playable.push(i);
      if(playable.length===0) break;
      playable.sort((a,b)=>{ const ca=state.enemyHand[a], cb=state.enemyHand[b]; const sa=ca.cost*2+(ca.lifesteal&&state.enemyLife<state.maxEnemyLife*0.5?6:0)+(ca.onPlayDamage?3:0)+(ca.onPlayHeal&&state.enemyLife<state.maxEnemyLife*0.6?4:0); const sb=cb.cost*2+(cb.lifesteal&&state.enemyLife<state.maxEnemyLife*0.5?6:0)+(cb.onPlayDamage?3:0)+(cb.onPlayHeal&&state.enemyLife<state.maxEnemyLife*0.6?4:0); return sb-sa; });
      playCard('enemy', playable[0]); played++; if(state.gameOver) break;
    }
    applyBurnDamage(); checkGameEnd(); updateUI();
    if(!state.gameOver) startPlayerTurn();
  }

  function startPlayerTurn() {
    state.isPlayerTurn=true; state.cardsPlayedThisTurn=0; state.selectedHandIndex=-1; state.discardUsedThisTurn=false; state.extraTurnGranted=false;
    state.playerEnergy=Math.min(state.maxEnergy, state.playerEnergy+state.energyPerTurn);
    state.enemyFearReduction=Math.max(0,(state.enemyFearReduction||0)-1);
    drawCard('player'); applyBurnDamage(); checkGameEnd(); updateUI();
    if(!state.gameOver){ document.getElementById('end-turn-btn').disabled=false; document.getElementById('end-turn-btn').classList.add('pulse'); setTimeout(()=>document.getElementById('end-turn-btn').classList.remove('pulse'),1200); addBattleLog('Your turn — Energy: '+state.playerEnergy); }
  }

  function playerEndTurn() {
    if(state.gameOver||!state.isPlayerTurn) return;
    state.isPlayerTurn=false; state.selectedHandIndex=-1; state.discardUsedThisTurn=false; state.cardsPlayedThisTurn=0;
    if(!state.playerField||!state.playerField.burnDamage) state.burnOnEnemy=0;
    document.getElementById('end-turn-btn').disabled=true; updateUI(); addBattleLog('Turn ended.');
    setTimeout(()=>{ if(!state.gameOver) enemyTurn(); },350);
  }

  function updateUI() {
    document.getElementById('enemy-name').textContent=getEnemyName();
    const lifePct=Math.max(0,(state.enemyLife/Math.max(1,state.maxEnemyLife))*100);
    document.getElementById('enemy-life-bar-inner').style.width=lifePct+'%';
    document.getElementById('enemy-life-text').textContent=state.enemyLife;
    document.getElementById('win-counter').textContent='WINS: '+state.wins;
    document.getElementById('enemy-avatar').textContent=state.wins>=12?'☠':state.wins>=8?'👾':state.wins>=5?'👺':state.wins>=2?'👽':'👾';
    document.getElementById('enemy-field').innerHTML=state.enemyField?renderFieldCard(state.enemyField,'enemy'):'<div class="field-empty">NO DEFENDER</div>';
    document.getElementById('player-field').innerHTML=state.playerField?renderFieldCard(state.playerField,'player'):'<div class="field-empty">NO DEFENDER</div>';
    document.getElementById('clash-indicator').textContent=(state.enemyField&&state.playerField)?'►◄':(state.enemyField||state.playerField)?'►':'··';
    document.getElementById('hand-count').textContent=state.playerHand.length;
    document.getElementById('discard-count').textContent=state.playerDiscard.length;
    document.getElementById('player-life-num').textContent=state.playerLife;
    let orbs=''; for(let i=1;i<=state.maxEnergy;i++) orbs+=`<div class="energy-orb ${i<=state.playerEnergy?'filled':''}"></div>`;
    document.getElementById('energy-display').innerHTML=orbs;
    document.getElementById('end-turn-btn').disabled=!state.isPlayerTurn||state.gameOver;
    document.getElementById('end-turn-btn').textContent=state.gameOver?'GAME OVER':!state.isPlayerTurn?'ENEMY TURN':'END TURN';
    const discardHint=document.getElementById('discard-hint'); if(discardHint) discardHint.style.display=(state.selectedHandIndex>=0&&!state.discardUsedThisTurn&&state.isPlayerTurn)?'block':'none';

    const handEl=document.getElementById('hand-cards');
    let html='';
    for(let i=0;i<state.playerHand.length;i++){
      const c=state.playerHand[i]; const cls=c.class; const canAfford=c.cost<=state.playerEnergy;
      const canPlay=state.isPlayerTurn && canAfford && !state.gameOver;
      const selected=i===state.selectedHandIndex;
      html+=`<div class="hand-card ${cls} ${!canPlay&&!selected?'unplayable':''} ${canPlay&&!selected?'playable-glow':''} ${selected?'selected':''}" onclick="window._game.handleHandCardClick(${i})">
        <div class="discard-x" onclick="window._game.handleDiscardClick(event,${i})">✕</div>
        <div class="hand-card-cost ${canAfford?'affordable':''}">${c.cost}</div>
        <div class="hand-card-emoji">${c.emoji}</div>
        <div class="hand-card-name">${c.name}</div>
        <div class="hand-card-stats"><span>⚔${c.atk}</span><span>❤${c.hp}</span></div>
        ${c.ability?`<div class="hand-card-ability-preview">${c.ability}</div>`:''}
      </div>`;
    }
    if(!state.playerHand.length) html='<div style="color:#555;text-align:center;padding:15px;font-size:8px;">NO CARDS</div>';
    handEl.innerHTML=html;
  }

  function renderFieldCard(card, who) {
    const cls=card.class; const hpRatio=card.currentHp/Math.max(1,card.hp);
    const hpColor=hpRatio<=0.33?'#ff0000':hpRatio<=0.6?'#ffaa00':'#0f0';
    return `<div class="field-card ${cls} ${who}-card">
      <div class="field-card-emoji">${card.emoji}</div>
      <div class="field-card-info">
        <div class="field-card-name">${card.name}</div>
        <div class="field-card-class"><span class="class-badge ${cls}">${card.class}</span></div>
        <div class="field-card-stats"><span class="stat-atk">⚔${card.atk}</span><span class="stat-hp" style="color:${hpColor}">❤${card.currentHp}/${card.hp}</span></div>
        ${card.ability?`<div class="field-card-ability">${card.ability}</div>`:''}
      </div>
    </div>`;
  }

  function handleHandCardClick(i) {
    if(state.gameOver||!state.isPlayerTurn) return;
    const card=state.playerHand[i]; if(!card) return;
    if(state.selectedHandIndex===i && card.cost<=state.playerEnergy){ sfxPlayCard(); playCard('player',i); state.selectedHandIndex=-1; updateUI(); return; }
    if(state.selectedHandIndex!==i && card.cost<=state.playerEnergy){ state.selectedHandIndex=i; sfxSelect(); updateUI(); return; }
    if(card.cost>state.playerEnergy){ state.selectedHandIndex=i; sfxSelect(); updateUI(); }
  }

  function handleDiscardClick(event, i) {
    event.stopPropagation();
    if(state.gameOver||!state.isPlayerTurn||state.discardUsedThisTurn) return;
    if(state.selectedHandIndex===i){ discardFromHand('player',i); state.selectedHandIndex=-1; }
  }

  function showVictoryOverlay() {
    const rewards=getRewardCards(); state._rewardCards=rewards;
    document.getElementById('overlay-content').innerHTML=`<h2>🏆 VICTORY!</h2><p>${getEnemyName()} defeated!</p><p style="color:#ff0;">CHOOSE NEW CARD:</p><div id="reward-cards">${rewards.map((c,i)=>`<div class="reward-card ${c.class}" onclick="window._game.selectReward(${i})"><div class="reward-card-emoji">${c.emoji}</div><div class="reward-card-name">${c.name}</div><span class="class-badge ${c.class}">${c.class}</span><div class="reward-card-info">⚔${c.atk} ❤${c.hp} 💰${c.cost}</div></div>`).join('')}</div><button class="btn gold" onclick="window._game.selectReward(-1)">🎲 RANDOM</button>`;
    document.getElementById('overlay').classList.remove('hidden');
  }
  function selectReward(idx) {
    let chosen; if(idx>=0 && state._rewardCards && state._rewardCards[idx]) chosen=cloneCard(state._rewardCards[idx]); else { const pool=getRewardCards(); chosen=cloneCard(pool[Math.floor(Math.random()*pool.length)]); }
    state.playerDeck.push(chosen); state.playerDeck=shuffle(state.playerDeck); state._rewardCards=null; addBattleLog('Added '+chosen.name); hideOverlay(); resetBattle();
  }
  function showDefeatOverlay() {
    document.getElementById('overlay-content').innerHTML=`<h2>💀 DEFEAT</h2><p>You fell to ${getEnemyName()}.</p><p style="color:#888;">Wins: ${state.wins}</p><button class="btn gold" onclick="window._game.restartGame()">🔄 CONTINUE</button><button class="btn danger" onclick="window._game.fullReset()">💀 NEW GAME</button>`;
    document.getElementById('overlay').classList.remove('hidden');
  }
  function hideOverlay() { document.getElementById('overlay').classList.add('hidden'); }

  function resetBattle() {
    const all=[...state.playerDeck,...state.playerHand,...(state.playerField?[state.playerField]:[]),...state.playerDiscard];
    const cleaned=all.map(c=>({id:c.id,name:c.name,class:c.class,emoji:c.emoji,atk:c.atk,hp:c.hp,cost:c.cost,ability:c.ability||'',tier:c.tier||'common',onPlayHeal:c.onPlayHeal,onPlayDamage:c.onPlayDamage,fearEffect:c.fearEffect,burnDamage:c.burnDamage,lifesteal:c.lifesteal,splashDamage:c.splashDamage,bonusFirstStrike:c.bonusFirstStrike,onPlayBuff:c.onPlayBuff,onPlayEnergy:c.onPlayEnergy,onPlayShuffleDiscard:c.onPlayShuffleDiscard,onPlayExtraTurn:c.onPlayExtraTurn,onDeathResurrect:c.onDeathResurrect,onPlayDraw:c.onPlayDraw}));
    state.playerDeck=shuffle(cleaned.map(c=>cloneCard(c))); state.playerHand=[]; state.playerField=null; state.playerDiscard=[];
    state.playerLife=25; state.playerEnergy=3;
    state.enemyDeck=getEnemyDeck(); state.enemyHand=[]; state.enemyField=null; state.enemyDiscard=[];
    state.enemyLife=getEnemyLife(); state.maxEnemyLife=state.enemyLife; state.enemyEnergy=2;
    state.isPlayerTurn=true; state.gameOver=false; state.burnOnEnemy=0; state.burnOnPlayer=0; state.enemyFearReduction=0;
    state.discardUsedThisTurn=false; state.extraTurnGranted=false; state.cardsPlayedThisTurn=0; state.selectedHandIndex=-1;
    for(let i=0;i<4;i++) drawCard('player'); for(let i=0;i<3;i++) drawCard('enemy');
    if(state.enemyHand.length>0){ const c=state.enemyHand.splice(0,1)[0]; state.enemyField=c; state.enemyField.currentHp=c.hp; }
    updateUI(); document.getElementById('end-turn-btn').disabled=false; addBattleLog('New foe approaches!');
  }
  function restartGame() {
    state.wins=0; const starters=['knight','squire','acolyte','archer','priest','footman','lesser_imp','wolf','vampire_spawn','bat'];
    state.playerDeck=shuffle(starters.map(id=>cloneCard(ALL_CARDS.find(c=>c.id===id))));
    state.playerHand=[]; state.playerField=null; state.playerDiscard=[]; state.playerLife=25; state.playerEnergy=3;
    state.enemyDeck=getEnemyDeck(); state.enemyHand=[]; state.enemyField=null; state.enemyDiscard=[];
    state.enemyLife=getEnemyLife(); state.maxEnemyLife=state.enemyLife; state.enemyEnergy=2;
    state.isPlayerTurn=true; state.gameOver=false; state.burnOnEnemy=0; state.burnOnPlayer=0; state.enemyFearReduction=0;
    state.discardUsedThisTurn=false; state.extraTurnGranted=false; state.cardsPlayedThisTurn=0; state.selectedHandIndex=-1;
    for(let i=0;i<4;i++) drawCard('player'); for(let i=0;i<3;i++) drawCard('enemy');
    if(state.enemyHand.length>0){ const c=state.enemyHand.splice(0,1)[0]; state.enemyField=c; state.enemyField.currentHp=c.hp; }
    hideOverlay(); updateUI(); addBattleLog('Fresh start. Good luck!');
  }
  function fullReset() { state.wins=0; restartGame(); hideOverlay(); updateUI(); }

  document.getElementById('end-turn-btn').addEventListener('click', ()=>{ if(state.isPlayerTurn&&!state.gameOver){ state.selectedHandIndex=-1; playerEndTurn(); } });
  document.getElementById('deck-btn').addEventListener('click', ()=>{ if(!state.gameOver) showDeckModal(); });
  function showDeckModal() {
    const all=[...state.playerDeck,...state.playerHand,...(state.playerField?[state.playerField]:[]),...state.playerDiscard];
    const counts={}; for(const c of all){ const k=c.id; if(!counts[k]) counts[k]={card:c,count:0}; counts[k].count++; }
    const uniq=Object.values(counts); uniq.sort((a,b)=>{ const o={demon:0,werewolf:1,vampire:2,human:3,legendary:4}; return (o[a.card.class]-o[b.card.class])||b.card.tier.localeCompare(a.card.tier)||a.card.name.localeCompare(b.card.name); });
    let html='<h3>📦 YOUR DECK</h3><div id="deck-modal">';
    for(const {card,count:cnt} of uniq){ html+=`<div class="deck-card-row"><span class="emoji">${card.emoji}</span><span class="name">${card.name} ${cnt>1?'x'+cnt:''}</span><span class="class-badge ${card.class}">${card.class}</span><span class="info">⚔${card.atk} ❤${card.hp} 💰${card.cost}</span></div>`; }
    html+='</div><p style="font-size:8px;">Total: '+all.length+' cards</p><button class="btn gold" onclick="window._game.hideOverlay()">CLOSE</button>';
    document.getElementById('overlay-content').innerHTML=html; document.getElementById('overlay').classList.remove('hidden');
  }

  document.addEventListener('keydown', e=>{
    if(state.gameOver){ if(e.key==='Enter'||e.key===' '){ if(!document.getElementById('overlay').classList.contains('hidden')&&state._rewardCards) window._game.selectReward(0); } return; }
    const key=e.key.toLowerCase();
    if(key>='1'&&key<='7'){ const idx=parseInt(key)-1; if(idx<state.playerHand.length&&state.isPlayerTurn){ const card=state.playerHand[idx]; if(card&&card.cost<=state.playerEnergy){ if(state.selectedHandIndex===idx){ sfxPlayCard(); playCard('player',idx); state.selectedHandIndex=-1; } else { state.selectedHandIndex=idx; sfxSelect(); } updateUI(); } } }
    if(key==='e'&&state.isPlayerTurn&&!state.gameOver){ state.selectedHandIndex=-1; playerEndTurn(); }
    if(key==='d'&&!state.gameOver&&!e.ctrlKey&&!e.metaKey) showDeckModal();
    if(key==='escape'){ hideOverlay(); state.selectedHandIndex=-1; updateUI(); }
    if(key==='x'&&state.selectedHandIndex>=0&&state.isPlayerTurn&&!state.discardUsedThisTurn&&!state.gameOver){ discardFromHand('player',state.selectedHandIndex); state.selectedHandIndex=-1; }
  });

  window._game={ handleHandCardClick, handleDiscardClick, selectReward, hideOverlay, restartGame, fullReset, showDeckModal, init: initGame };
  initGame();
})();
</script>
</body>
</html>
