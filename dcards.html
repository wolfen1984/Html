<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>DUNGEONS & DEMONS · 80s DOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --panel: #000;
            --border: #00ffff;
            --text: #00ffff;
            --text-dim: #008080;
            --highlight: #ff00ff;
            --danger: #ff0000;
            --heal: #00ff00;
            --energy-color: #ffff00;
            --demon: #ff3333;
            --werewolf: #ff8800;
            --vampire: #ff44ff;
            --human: #00ccff;
            --legendary: #ffd700;
            --epic: #c792ff;
            --rare: #4499ff;
            --uncommon: #44dd44;
            --common: #aaaaaa;
            --card-bg: #000;
            --field-bg: #000;
            --button-border: #ff00ff;
            --button-text: #ff00ff;
            --playable-glow: #00ff88;
            --combo-glow: #ffaa00;
            --crt-glow: rgba(0, 255, 255, 0.03);
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.4px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
    width: 100%;
    overflow: hidden;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
            color: var(--text);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        #app {
            display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
            position: relative;
            background: #000;
            border-left: 4px double var(--border);
            border-right: 4px double var(--border);
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.7), 0 0 35px rgba(0, 150, 255, 0.06);
            overflow: hidden;
        }
        #app::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 255, 255, 0.018) 0px,
                    rgba(0, 255, 255, 0.018) 2px,
                    transparent 2px,
                    transparent 6px);
            pointer-events: none;
            z-index: 999;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.4);
            max-height: calc(100vh - 24px);   /* 12px top + 12px bottom padding */
    max-width: 500px;
    margin: 0 auto;
        }
        #app.crt-off::after {
            display: none;
        }

        /* ---- TOP BAR ---- */
        #top-bar {
            padding: 6px 10px;
            background: #000;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            flex-shrink: 0;
        }
        #enemy-avatar {
            font-size: 34px;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--danger);
            background: #000;
            color: var(--danger);
            text-shadow: 0 0 12px var(--danger);
            flex-shrink: 0;
            position: relative;
        }
        #enemy-intent {
            position: absolute;
            bottom: -8px;
            right: -8px;
            font-size: 25px;
            background: #000;
            border: 1px solid #555;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0;
            z-index: 2;
        }
        #enemy-info {
            flex: 1;
            min-width: 0;
        }
        #enemy-name {
            font-size: 15px;
            color: var(--danger);
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #enemy-life-container {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 3px;
        }
        #enemy-life-bar-outer {
            flex: 1;
            height: 11px;
            background: #110000;
            border: 1px solid var(--danger);
        }
        #enemy-life-bar-inner {
            height: 100%;
            background: var(--danger);
            transition: width 0.3s step-end;
            box-shadow: 0 0 8px var(--danger);
        }
        #enemy-life-text {
            font-size: 15px;
            color: var(--danger);
            min-width: 34px;
            text-align: right;
            font-weight: bold;
        }
        #win-counter {
            font-size: 10px;
            color: #555;
            margin-top: 2px;
        }
        #enemy-statuses {
            display: flex;
            gap: 3px;
            margin-top: 3px;
            flex-wrap: wrap;
        }
        .status-badge {
            font-size: 10px;
            padding: 2px 5px;
            border: 1px solid;
            white-space: nowrap;
            letter-spacing: 0.3px;
            animation: statusPulse 1.5s step-end infinite;
        }
        .status-badge.burn {
            border-color: #ff4400;
            color: #ff4400;
            animation: burnFlicker 0.4s step-end infinite;
        }
        .status-badge.fear {
            border-color: #aa44ff;
            color: #aa44ff;
        }
        .status-badge.poison {
            border-color: #88ff00;
            color: #88ff00;
        }
        @keyframes burnFlicker {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.45;
            }
        }
        @keyframes statusPulse {
            0%,
            100% {
                opacity: 0.8;
            }
            50% {
                opacity: 1;
            }
        }

        /* ---- COMBO INDICATOR ---- */
        #combo-indicator {
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 10px;
            color: var(--combo-glow);
            text-shadow: 0 0 10px var(--combo-glow);
            z-index: 11;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            letter-spacing: 1px;
        }
        #combo-indicator.active {
            opacity: 1;
            animation: comboGlow 0.6s step-end infinite;
        }
        @keyframes comboGlow {
            0%,
            100% {
                text-shadow: 0 0 8px var(--combo-glow);
            }
            50% {
                text-shadow: 0 0 20px var(--combo-glow), 0 0 35px rgba(255, 170, 0, 0.6);
            }
        }

        /* ---- BATTLE AREA ---- */
        #battle-area {
            flex: 1 1 auto;
    min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px 8px;
            gap: 2px;
            position: relative;
        }
        #enemy-field,
        #player-field {
            width: 88%;
            max-width: 380px;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #clash-indicator {
            font-size: 20px;
            color: var(--highlight);
            text-shadow: 0 0 14px var(--highlight);
            font-weight: bold;
            height: 20px;
            display: flex;
            align-items: center;
            letter-spacing: 2px;
        }
        #battle-log {
            font-size: 15px;
            color: #777;
            text-align: center;
            min-height: 16px;
            max-height: 60px;
            overflow: auto;
            padding: 0 6px;
            letter-spacing: 0.3px;
            transition: color 0.3s;
            line-height: 1.4;
        }
        #battle-log .log-damage {
            color: #ff5555;
        }
        #battle-log .log-heal {
            color: #55ff55;
        }
        #battle-log .log-combo {
            color: #ffaa00;
        }
        #battle-log .log-info {
            color: #aaa;
        }
        #battle-log.flash {
            color: #ddd;
        }

        /* ---- FIELD CARDS ---- */
        .field-card {
            width: 100%;
            padding: 9px 12px;
            border: 2px solid;
            background: #000;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 12px currentColor;
            position: relative;
            transition: box-shadow 0.08s, border-color 0.08s;
        }
        .field-card.rarity-common {
            border-color: #666;
            box-shadow: 0 0 6px #666;
        }
        .field-card.rarity-uncommon {
            border-color: #44dd44;
            box-shadow: 0 0 10px rgba(68, 221, 68, 0.5);
        }
        .field-card.rarity-rare {
            border-color: #4499ff;
            box-shadow: 0 0 14px rgba(68, 153, 255, 0.5);
        }
        .field-card.rarity-epic {
            border-color: #c792ff;
            box-shadow: 0 0 18px rgba(199, 146, 255, 0.55);
        }
        .field-card.rarity-legendary {
            border-color: #ffd700;
            box-shadow: 0 0 22px rgba(255, 215, 0, 0.6);
            animation: legendaryShimmer 2s step-end infinite;
        }
        @keyframes legendaryShimmer {
            0%,
            100% {
                box-shadow: 0 0 18px rgba(255, 215, 0, 0.5);
            }
            25% {
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            }
            50% {
                box-shadow: 0 0 18px rgba(255, 180, 0, 0.5);
            }
            75% {
                box-shadow: 0 0 28px rgba(255, 215, 0, 0.7);
            }
        }
        .field-card.hit-flash {
            box-shadow: 0 0 35px #fff !important;
            border-color: #fff !important;
            transition: 0.04s;
        }
        .field-card-emoji {
            font-size: 40px;
            flex-shrink: 0;
            line-height: 1;
        }
        .field-card-info {
            flex: 1;
            min-width: 0;
        }
        .field-card-name {
            font-size: 15px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .field-card-class {
            font-size: 10px;
            color: #aaa;
            margin-top: 2px;
        }
        .field-card-stats {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            font-size: 9px;
            font-weight: bold;
        }
        .stat-atk {
            color: var(--danger);
        }
        .stat-hp {
            color: var(--heal);
        }
        .field-card-ability {
            font-size: 10px;
            color: #999;
            margin-top: 2px;
            font-style: italic;
            letter-spacing: 0.3px;
        }
        .field-empty {
            color: #333;
            font-size: 10px;
            text-align: center;
            padding: 16px;
            border: 2px dashed #1a1a1a;
            width: 100%;
            letter-spacing: 1px;
        }

        /* ---- HAND AREA ---- */
        #hand-area {
            flex: 0 1 auto;
            max-height: 40vh;        /* never taller than 40% of the viewport */
    min-height: 120px;
            overflow-y: auto;
            padding: 5px 6px;
            background: #000;
            border-top: 2px solid var(--border);
            z-index: 5;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        #hand-label {
            font-size: 10px;
            color: #888;
            text-align: center;
            margin-bottom: 1px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #hand-info {
            font-size: 10px;
            color: #666;
            text-align: center;
            margin-bottom: 3px;
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        #discard-hint {
            font-size: 10px;
            color: #ffaa00;
            text-align: center;
            margin-bottom: 2px;
            display: none;
            letter-spacing: 0.5px;
            animation: blinkHint 0.7s step-end infinite;
        }
        @keyframes blinkHint {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.35;
            }
        }
        #hand-cards {
            display: flex;
            gap: 7px;
            overflow-x: auto;
            padding: 6px 3px;
            justify-content: flex-start;
            flex-wrap: nowrap;
            scroll-snap-type: x proximity;
            align-items: flex-end;
            flex: 1;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        #hand-cards::-webkit-scrollbar {
            height: 4px;
        }
        #hand-cards::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        #hand-cards::-webkit-scrollbar-thumb {
            background: #333;
            border: 1px solid #111;
        }

        /* ---- HAND CARDS ---- */
        .hand-card {
            flex-shrink: 0;
            width: 150px;
            min-width: 150px;
            padding: 9px 5px 7px;
            border: 2px solid #222;
            border-left: 4px solid #333;
            background: #000;
            cursor: pointer;
            text-align: center;
            position: relative;
            scroll-snap-align: center;
            transition: all 0.1s step-end;
        }
        .hand-card:active {
            transform: scale(0.93);
        }
        .hand-card.playable-glow {
            border-color: var(--playable-glow) !important;
            border-left-color: var(--playable-glow) !important;
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.35);
            animation: gentlePulse 1.5s step-end infinite;
        }
        @keyframes gentlePulse {
            0%,
            100% {
                box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            }
            50% {
                box-shadow: 0 0 18px rgba(0, 255, 136, 0.5);
            }
        }
        .hand-card.selected {
            border-color: var(--highlight) !important;
            border-left-color: var(--highlight) !important;
            box-shadow: 0 0 20px var(--highlight), 0 0 40px rgba(255, 0, 255, 0.35);
            transform: translateY(-7px);
            z-index: 6;
            animation: selectedGlow 0.6s step-end infinite;
        }
        @keyframes selectedGlow {
            0%,
            100% {
                box-shadow: 0 0 18px var(--highlight), 0 0 35px rgba(255, 0, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 28px var(--highlight), 0 0 50px rgba(255, 0, 255, 0.5);
            }
        }
        .hand-card.unplayable {
            opacity: 0.3;
            filter: grayscale(60%);
            pointer-events: none;
        }
        .hand-card.combo-highlight {
            border-left-color: var(--combo-glow) !important;
            box-shadow: 0 0 16px rgba(255, 170, 0, 0.45);
        }
        .hand-card-emoji {
            font-size: 28px;
            line-height: 1.2;
        }
        .hand-card-name {
            font-size: 15px;
            color: #fff;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.3px;
        }
        .hand-card-stats {
            font-size: 15px;
            color: #ccc;
            margin-top: 3px;
            display: flex;
            justify-content: center;
            gap: 5px;
            font-weight: bold;
        }
        .hand-card-ability-preview {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.2px;
        }
        .hand-card-cost {
            position: absolute;
            top: -11px;
            right: -11px;
            width: 22px;
            height: 22px;
            border: 2px solid var(--energy-color);
            background: #000;
            color: var(--energy-color);
            font-weight: bold;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px var(--energy-color);
            z-index: 2;
        }
        .hand-card-cost.affordable {
            border-color: #00ff88;
            color: #00ff88;
            box-shadow: 0 0 14px #00ff88;
            animation: costGlow 0.8s step-end infinite;
        }
        @keyframes costGlow {
            0%,
            100% {
                box-shadow: 0 0 10px #00ff88;
            }
            50% {
                box-shadow: 0 0 24px #00ff88, 0 0 36px rgba(0, 255, 136, 0.5);
            }
        }
        .hand-card .discard-x {
            position: absolute;
            top: -11px;
            left: -11px;
            width: 20px;
            height: 20px;
            border: 2px solid #ff4444;
            background: #000;
            color: #ff4444;
            font-size: 15px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 3;
            font-weight: bold;
            line-height: 1;
            box-shadow: 0 0 10px #ff4444;
            transition: all 0.05s step-end;
        }
        .hand-card.selected .discard-x {
            display: flex;
        }
        .hand-card.selected .discard-x:active {
            background: #ff4444;
            color: #000;
            box-shadow: 0 0 20px #ff4444;
        }
        .hand-card .inspect-btn {
            position: absolute;
            bottom: -8px;
            right: 4px;
            width: 16px;
            height: 16px;
            border: 1px solid #555;
            background: #000;
            color: #888;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2;
            border-radius: 0;
            line-height: 1;
            transition: all 0.1s;
        }
        .hand-card .inspect-btn:active {
            border-color: #fff;
            color: #fff;
            background: #222;
        }

        /* Rarity borders for hand cards */
        .hand-card.rarity-common {
            border-left-color: #666;
        }
        .hand-card.rarity-uncommon {
            border-left-color: #44dd44;
        }
        .hand-card.rarity-rare {
            border-left-color: #4499ff;
        }
        .hand-card.rarity-epic {
            border-left-color: #c792ff;
        }
        .hand-card.rarity-legendary {
            border-left-color: #ffd700;
        }
        .hand-card.demon {
            border-left-color: var(--demon);
        }
        .hand-card.werewolf {
            border-left-color: var(--werewolf);
        }
        .hand-card.vampire {
            border-left-color: var(--vampire);
        }
        .hand-card.human {
            border-left-color: var(--human);
        }
        .hand-card.legendary {
            border-left-color: var(--legendary);
        }

        /* ---- BOTTOM BAR ---- */
        #bottom-bar {
            flex-shrink: 0;
            padding: 8px 10px;
            background: #000;
            border-top: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }
        #player-life-display {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--danger);
        }
        .heart {
            font-size: 18px;
            color: var(--danger);
        }
        #player-life-num {
            font-size: 20px;
            font-weight: bold;
        }
        #energy-display {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
        }
        .energy-orb {
            width: 14px;
            height: 14px;
            border: 1px solid #333;
            background: #000;
            transition: all 0.2s;
        }
        .energy-orb.filled {
            background: var(--energy-color);
            border-color: var(--energy-color);
            box-shadow: 0 0 10px var(--energy-color);
            animation: orbGlow 1s step-end infinite;
        }
        @keyframes orbGlow {
            0%,
            100% {
                box-shadow: 0 0 8px var(--energy-color);
            }
            50% {
                box-shadow: 0 0 18px var(--energy-color), 0 0 28px rgba(255, 255, 0, 0.5);
            }
        }
        #sound-toggle {
            width: 30px;
            height: 30px;
            border: 2px solid #555;
            background: #000;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s step-end;
            flex-shrink: 0;
            font-family: inherit;
            padding: 0;
            line-height: 1;
        }
        #sound-toggle:active {
            border-color: #fff;
            color: #fff;
        }
        #sound-toggle.on {
            border-color: #00ff88;
            color: #00ff88;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
        }
        #end-turn-btn {
            padding: 10px 12px;
            border: 2px solid var(--button-border);
            background: #000;
            color: var(--button-text);
            font-family: inherit;
            font-size: 9px;
            cursor: pointer;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.1s step-end;
            letter-spacing: 0.5px;
        }
        #end-turn-btn:active {
            background: var(--button-border);
            color: #000;
        }
        #end-turn-btn:disabled {
            opacity: 0.35;
            pointer-events: none;
            border-color: #444;
            color: #444;
        }
        #end-turn-btn.pulse {
            animation: btnPulse 0.6s step-end 2;
        }
        @keyframes btnPulse {
            0%,
            100% {
                box-shadow: 0 0 8px var(--button-border);
            }
            50% {
                box-shadow: 0 0 24px var(--button-border), 0 0 40px rgba(255, 0, 255, 0.5);
            }
        }
        #deck-btn {
            width: 36px;
            height: 36px;
            border: 2px solid var(--button-border);
            background: #000;
            color: var(--button-text);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s step-end;
            flex-shrink: 0;
        }
        #deck-btn:active {
            background: var(--button-border);
            color: #000;
        }

        /* ---- TOOLTIP ---- */
        #card-tooltip {
            position: fixed;
            z-index: 200;
            background: #000;
            border: 2px solid #fff;
            padding: 10px 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            max-width: 200px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.9);
            font-size: 15px;
            text-align: center;
            letter-spacing: 0.4px;
        }
        #card-tooltip.visible {
            opacity: 1;
        }
        #card-tooltip .tt-emoji {
            font-size: 28px;
        }
        #card-tooltip .tt-name {
            font-size: 15px;
            color: #fff;
            margin-top: 3px;
        }

            35% {

            0%,
            100% {

            15% {

            30% {

            50% {

            70% {

            }
            85% {

            // ==================== SOUND SYSTEM ====================
            let audioCtx = null;
            let soundEnabled = true;

            function ensureAudio() {
                if (!soundEnabled) return null;
                if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }

            function playBeep(freq, duration, type = 'square', vol = 0.06, glideTo = null) {
                if (!soundEnabled) return;
                try {
                    const ctx = ensureAudio();
                    if (!ctx) return;
                    const now = ctx.currentTime;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, now);
                    if (glideTo) osc.frequency.linearRampToValueAtTime(glideTo, now + duration);
                    gain.gain.setValueAtTime(vol, now);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + duration + 0.01);
                } catch (e) {}
            }
