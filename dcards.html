                    ability: 'Rebirth', tier: 'legendary', onDeathResurrect: true },
                { id: 'time_mage', name: 'Time M.', class: 'legendary', emoji: '⏳', atk: 3, hp: 4, cost: 2,
                    ability: 'Extra Turn', tier: 'legendary', onPlayExtraTurn: true },
                { id: 'titan', name: 'Titan', class: 'legendary', emoji: '🗿', atk: 10, hp: 10, cost: 9,
                    ability: 'Colossus', tier: 'legendary' },
                { id: 'wisp', name: 'Wisp', class: 'legendary', emoji: '✨', atk: 0, hp: 1, cost: 0,
                    ability: 'Draw 2', tier: 'legendary', onPlayDraw: 2 },
            ];

            // ==================== ABILITY DESCRIPTIONS ====================
            function getAbilityDescription(card) {
                const descs = {
                    'Shield': 'Takes -1 damage in combat',
                    'Quick shot': 'Attacks immediately',
                    'Tank': 'Absorbs damage well',
                    'Wrath': 'Deals bonus damage',
                    'Lethal': 'High attack power',
                    'Bulwark': 'Very durable defender',
                    'Loyal': 'Low cost helper',
                    'Steady': 'Reliable stats',
                    'Pack': 'Works well with others',
                    'Evade': 'Hard to pin down',
                    'Grow': 'Gets stronger',
                    'Rush': 'Fast attacker',
                    'Cheap': 'Efficient cost',
                    'Scavenge': 'Budget unit',
                    'Colossus': 'Massive stats',
                    'Ragnarok': 'Devastating power',
                    'Rampage': 'Unstoppable force',
                    'Immortal': 'Heals massively',
                    'Obliterate': 'Extreme damage',
                    'Smash': 'Heavy hitter',
                    'Inferno': 'Burns on entry',
                    'Rebirth': 'Revives on death with +2 ATK',
                    'Recycle': 'Shuffles discard into deck',
                    'Extra Turn': 'Grants another turn',
                };
                if (descs[card.ability]) return descs[card.ability];
                if (card.onPlayHeal) return 'Heals you for ' + card.onPlayHeal + ' HP when played';
                if (card.onPlayDamage) return 'Deals ' + card.onPlayDamage + ' damage to enemy on play';
                if (card.burnDamage) return 'Applies ' + card.burnDamage + ' burn damage each turn';
                if (card.lifesteal) return 'Heals you for ' + card.lifesteal + ' when attacking';
                if (card.splashDamage) return 'Deals ' + card.splashDamage + ' extra splash damage';
                if (card.fearEffect) return 'Reduces enemy ATK by ' + card.fearEffect;
                if (card.onPlayEnergy) return 'Grants +' + card.onPlayEnergy + ' energy';
                if (card.onPlayDraw) return 'Draws ' + card.onPlayDraw + ' card(s)';
                if (card.onPlayBuff) return 'Buffs itself by +' + card.onPlayBuff + '/+' + card.onPlayBuff;
                if (card.bonusFirstStrike) return 'Deals +' + card.bonusFirstStrike + ' first strike damage';
                return card.ability || 'No special ability';
            }

            // ==================== GAME STATE ====================
            const state = {
                playerLife: 25,
                maxPlayerLife: 25,
                playerEnergy: 3,
                playerDeck: [],
                playerHand: [],
                playerField: null,
                playerDiscard: [],
                enemyLife: 20,
                maxEnemyLife: 20,
                enemyEnergy: 2,
                enemyDeck: [],
                enemyHand: [],
                enemyField: null,
                enemyDiscard: [],
                wins: 0,
                isPlayerTurn: true,
                selectedHandIndex: -1,
                gameOver: false,
                burnOnEnemy: 0,
                burnOnPlayer: 0,
                enemyFearReduction: 0,
                _rewardCards: null,
                discardsUsedThisTurn: 0,
                maxDiscardsPerTurn: 2,
                battleLogMessages: [],
                extraTurnGranted: false,
                cardsPlayedThisTurn: 0,
                comboClass: null,
                comboCount: 0,
                crtEnabled: true,
            };

            function getMaxEnergy() { return Math.min(12, 7 + Math.floor(state.wins / 3)); }

            function getEnergyPerTurn() { return 2 + Math.floor(state.wins / 5); }

            function getComboBonus() {
                if (state.comboCount >= 4) return { atk: 3, draw: 1, energy: 1 };
                if (state.comboCount >= 3) return { atk: 2, draw: 1, energy: 0 };
                if (state.comboCount >= 2) return { atk: 1, draw: 0, energy: 0 };
                return { atk: 0, draw: 0, energy: 0 };
            }

            function cloneCard(c) { return { ...c, currentHp: c.hp }; }

            function shuffle(a) { const arr = [...a]; for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math
                        .random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

            function getEnemyDeck() {
                const tiers = ['common'];
                if (state.wins >= 2) tiers.push('uncommon');
                if (state.wins >= 5) tiers.push('rare');
                if (state.wins >= 8) tiers.push('epic');
                if (state.wins >= 12) tiers.push('legendary');
                let pool = ALL_CARDS.filter(c => tiers.includes(c.tier));
                if (pool.length < 10) pool = ALL_CARDS.filter(c => c.tier === 'common' || c.tier === 'uncommon');
                const deck = [];
                for (let i = 0; i < Math.min(8 + Math.floor(state.wins / 2), 16); i++) deck.push(cloneCard(pool[Math.floor(
                    Math.random() * pool.length)]));
                return shuffle(deck);
            }

            function getEnemyLife() { return Math.min(50, 18 + Math.floor(state.wins * 2.5)); }

            function getEnemyName() {
                const n = ['SHADOW IMP', 'DARK WOLF', 'BLOOD BARON', 'HELL KNIGHT', 'ABYSSAL LORD', 'FENRIR SHADE',
                    'DEMON PRINCE', 'VAMPIRE COUNT', 'ALPHA TERROR', 'DREAD OVERLORD', 'SOUL REAPER', 'INFERNAL DRAKE',
                    'NIGHT STALKER', 'DOOM BRINGER', 'ELDER LICH', 'CHAOS WYRM', 'VOID KNIGHT', 'DEATH WHISPER',
                    'PHANTOM LORD', 'OBLIVION'
                ];
                return n[Math.min(state.wins, n.length - 1)];
            }

            function getEnemyPersonality() {
                const idx = state.wins % 5;
                return ['aggressive', 'defensive', 'balanced', 'tricky', 'relentless'][idx];
            }

            function getRewardCards() {
                const tiers = ['common'];
                if (state.wins >= 2) tiers.push('uncommon');
                if (state.wins >= 5) tiers.push('rare');
                if (state.wins >= 8) tiers.push('epic');
                if (state.wins >= 12) tiers.push('legendary');
                const pool = ALL_CARDS.filter(c => tiers.includes(c.tier));
                const rewards = [];
                const used = new Set();
                for (let i = 0; i < 3; i++) {
                    let c,
                        tries = 0;
                    do { c = pool[Math.floor(Math.random() * pool.length)];
                        tries++; } while (used.has(c.id) && tries < 30);
                    used.add(c.id);
                    rewards.push(cloneCard(c));
                }
                return rewards;
            }

            function addBattleLog(msg, cssClass = '') {
                state.battleLogMessages.push({ text: msg, cls: cssClass });
                if (state.battleLogMessages.length > 6) state.battleLogMessages.shift();
                const el = document.getElementById('battle-log');
                if (el) {
                    el.innerHTML = state.battleLogMessages.map(m =>
                        `<span class="${m.cls}">${m.text}</span>`
                    ).join(' · ');
                    el.classList.add('flash');
                    setTimeout(() => el.classList.remove('flash'), 300);
                }
            }

            function getAllPlayerCards() {
                const all = [...state.playerDeck, ...state.playerHand, ...(state.playerField ? [state.playerField] : []),
                    ...state.playerDiscard
                ];
                return all;
            }

            function countOwned(cardId) {
                return getAllPlayerCards().filter(c => c.id === cardId).length;
            }

            function initGame() {
                const starters = ['knight', 'squire', 'acolyte', 'archer', 'priest', 'footman', 'lesser_imp', 'wolf',
                    'vampire_spawn', 'bat'
                ];
                state.playerDeck = shuffle(starters.map(id => cloneCard(ALL_CARDS.find(c => c.id === id))));
                state.playerHand = [];
                state.playerField = null;
                state.playerDiscard = [];
                state.playerLife = 25;
                state.maxPlayerLife = 25;
                state.playerEnergy = 3;
                state.enemyDeck = getEnemyDeck();
                state.enemyHand = [];
                state.enemyField = null;
                state.enemyDiscard = [];
                state.enemyLife = getEnemyLife();
                state.maxEnemyLife = state.enemyLife;
                state.enemyEnergy = 2;
                state.isPlayerTurn = true;
                state.gameOver = false;
                state.burnOnEnemy = 0;
                state.burnOnPlayer = 0;
                state.enemyFearReduction = 0;
                state.discardsUsedThisTurn = 0;
                state.maxDiscardsPerTurn = 2;
                state.battleLogMessages = [];
                state.extraTurnGranted = false;
                state.cardsPlayedThisTurn = 0;
                state.comboClass = null;
                state.comboCount = 0;
                state.selectedHandIndex = -1;
                for (let i = 0; i < 5; i++) drawCard('player');
                for (let i = 0; i < 3; i++) drawCard('enemy');
                if (state.enemyHand.length > 0) { const c = state.enemyHand.splice(0, 1)[0];
                    state.enemyField = c;
                    state.enemyField.currentHp = c.hp; }
                updateUI();
                hideOverlay();
                addBattleLog('New battle begins!', 'log-info');
            }

            function drawCard(who) {
                const deck = who === 'player' ? state.playerDeck : state.enemyDeck;
                const hand = who === 'player' ? state.playerHand : state.enemyHand;
                const discard = who === 'player' ? state.playerDiscard : state.enemyDiscard;
                if (deck.length === 0 && discard.length === 0) return null;
                if (deck.length === 0) {
                    const reshuffled = shuffle(discard.map(c => cloneCard(c)));
                    if (who === 'player') { state.playerDeck = reshuffled;
                        state.playerDiscard = []; } else { state.enemyDeck = reshuffled;
                        state.enemyDiscard = []; }
                    if (who === 'player') addBattleLog('Deck reshuffled from discard', 'log-info');
                }
                const d = who === 'player' ? state.playerDeck : state.enemyDeck;
                if (d.length === 0) return null;
                const card = d.pop();
                hand.push(card);
                const maxH = who === 'player' ? 7 : 5;
                while (hand.length > maxH) { const extra = hand.shift();
                    (who === 'player' ? state.playerDiscard : state.enemyDiscard).push(extra); if (who === 'player')
                        addBattleLog('Hand full — ' + extra.name + ' discarded', 'log-info'); }
                return card;
            }

            function discardFromHand(who, handIndex) {
                const hand = who === 'player' ? state.playerHand : state.enemyHand;
                const discard = who === 'player' ? state.playerDiscard : state.enemyDiscard;
                if (handIndex < 0 || handIndex >= hand.length) return false;
                const card = hand.splice(handIndex, 1)[0];
                discard.push(card);
                if (who === 'player') {
                    state.discardsUsedThisTurn++;
                    drawCard('player');
                    sfxDiscard();
                    addBattleLog('Discarded ' + card.name + ' (' + (state.maxDiscardsPerTurn - state.discardsUsedThisTurn) +
                        ' left)', 'log-info');
                }
                updateUI();
                return true;
            }

            function playCard(who, handIndex) {
                const hand = who === 'player' ? state.playerHand : state.enemyHand;
                const energy = who === 'player' ? state.playerEnergy : state.enemyEnergy;
                if (handIndex < 0 || handIndex >= hand.length) return false;
                const card = hand[handIndex];
                if (card.cost > energy) return false;
                if (who === 'player') {
                    state.playerEnergy -= card.cost;
                    state.cardsPlayedThisTurn++;
                    // Combo tracking
                    if (state.comboClass === card.class && state.comboCount > 0) {
                        state.comboCount++;
                        const bonus = getComboBonus();
                        if (state.comboCount >= 2) {
                            sfxCombo();
                            addBattleLog('COMBO x' + state.comboCount + '! (+' + bonus.atk + ' ATK' + (bonus.draw ?
                                ', Draw ' + bonus.draw : '') + (bonus.energy ? ', +' + bonus.energy + '⚡' :
                                '') + ')', 'log-combo');
                            if (bonus.draw) for (let d = 0; d < bonus.draw; d++) drawCard('player');
                            if (bonus.energy) state.playerEnergy = Math.min(getMaxEnergy(), state.playerEnergy +
                                bonus.energy);
                            spawnComboParticles();
                        }
                    } else {
                        state.comboClass = card.class;
                        state.comboCount = 1;
                    }
                } else {
                    state.enemyEnergy -= card.cost;
                }
                hand.splice(handIndex, 1);
                const oldField = who === 'player' ? state.playerField : state.enemyField;
                if (oldField) { (who === 'player' ? state.playerDiscard : state.enemyDiscard).push(oldField); }
                const newCard = cloneCard(card);
                newCard.currentHp = newCard.hp;
                // Apply combo bonus
                if (who === 'player') {
                    const bonus = getComboBonus();
                    if (bonus.atk > 0 && state.comboClass === newCard.class) {
                        newCard.atk += bonus.atk;
                        newCard.comboBonusAtk = bonus.atk;
                    }
                    if (newCard.onPlayBuff) { newCard.atk += newCard.onPlayBuff;
                        newCard.currentHp += newCard.onPlayBuff;
                        newCard.hp += newCard.onPlayBuff; }
                }
                if (who === 'player') state.playerField = newCard;
                else state.enemyField = newCard;
                triggerOnPlay(who, newCard, card);
                const oppField = who === 'player' ? state.enemyField : state.playerField;
                const oppWho = who === 'player' ? 'enemy' : 'player';
                if (oppField) resolveClash(who, newCard, oppWho, oppField);
                else {
                    const oppLife = oppWho === 'player' ? state.playerLife : state.enemyLife;
                    const dmg = newCard.atk;
                    if (oppWho === 'player') state.playerLife = Math.max(0, oppLife - dmg);
                    else state.enemyLife = Math.max(0, oppLife - dmg);
                    spawnDamagePop(oppWho === 'player' ? 'player-field' : 'enemy-field', dmg, '#ff0000');
                    if (newCard.lifesteal && who === 'player') { const healed = Math.min(state.maxPlayerLife, state
                            .playerLife + newCard.lifesteal);
                        const actual = healed - state.playerLife;
                        state.playerLife = healed; if (actual > 0) spawnDamagePop('player-field', actual, '#00ff00'); }
                    sfxAttack();
                    addBattleLog(newCard.name + ' strikes for ' + dmg + '!', 'log-damage');
                    if (dmg >= 5) triggerScreenShake();
                }
                checkGameEnd();
                updateUI();
                return true;
            }

            function resolveClash(attWho, attCard, defWho, defCard) {
                let defAtk = defCard.atk;
                if (defWho === 'enemy' && state.enemyFearReduction > 0) defAtk = Math.max(0, defAtk - state
                    .enemyFearReduction);
                let atkDmg = attCard.atk;
                if (attCard.bonusFirstStrike && attWho === 'player') atkDmg += attCard.bonusFirstStrike;
                const defDmg = defAtk;
                defCard.currentHp -= atkDmg;
                spawnDamagePop(defWho === 'player' ? 'player-field' : 'enemy-field', atkDmg, '#ff0000');
                attCard.currentHp -= defDmg;
                spawnDamagePop(attWho === 'player' ? 'player-field' : 'enemy-field', defDmg, '#ff8800');
                sfxAttack();
                if (atkDmg >= 5 || defDmg >= 5) triggerScreenShake();
                addBattleLog(attCard.name + ' ⚔ ' + defCard.name + ' (' + atkDmg + ' vs ' + defDmg + ')', 'log-damage');
                if (attCard.lifesteal && attWho === 'player') { const healed = Math.min(state.maxPlayerLife, state
                        .playerLife + attCard.lifesteal);
                    const actual = healed - state.playerLife;
                    state.playerLife = healed; if (actual > 0) { spawnDamagePop('player-field', actual, '#00ff00');
                        sfxHeal(); } }
                if (defCard.lifesteal && defWho === 'player') { const healed = Math.min(state.maxPlayerLife, state
                        .playerLife + defCard.lifesteal);
                    const actual = healed - state.playerLife;
                    state.playerLife = healed; if (actual > 0) spawnDamagePop('player-field', actual, '#00ff00'); }
                if (defCard.currentHp <= 0) { const ex = Math.abs(defCard.currentHp); if (defWho === 'player') { state
                        .playerLife = Math.max(0, state.playerLife - ex);
                        state.playerField = null;
                        state.playerDiscard.push(defCard); } else { state.enemyLife = Math.max(0, state.enemyLife - ex);
                        state.enemyField = null;
                        state.enemyDiscard.push(defCard); } if (ex > 0) { spawnDamagePop(defWho === 'player' ?
                        'player-field' : 'enemy-field', ex, '#ff0000');
                    addBattleLog(defCard.name + ' destroyed! Overkill: ' + ex, 'log-damage'); }
                    flashFieldCard(defWho); if (ex >= 3) triggerScreenShake();
                    checkDeathResurrect(defWho, defCard); }
                if (attCard.currentHp <= 0) { const ex2 = Math.abs(attCard.currentHp); if (attWho === 'player') { state
                        .playerLife = Math.max(0, state.playerLife - ex2);
                        state.playerField = null;
                        state.playerDiscard.push(attCard); } else { state.enemyLife = Math.max(0, state.enemyLife - ex2);
                        state.enemyField = null;
                        state.enemyDiscard.push(attCard); } if (ex2 > 0) { spawnDamagePop(attWho === 'player' ?
                        'player-field' : 'enemy-field', ex2, '#ff0000');
                    addBattleLog(attCard.name + ' also fell! Overkill: ' + ex2, 'log-damage'); }
                    flashFieldCard(attWho);
                    checkDeathResurrect(attWho, attCard); }
                if (attCard.splashDamage && defCard.currentHp > 0) { defCard.currentHp -= attCard.splashDamage;
                    spawnDamagePop(defWho === 'player' ? 'player-field' : 'enemy-field', attCard.splashDamage,
                    '#ff8800'); if (defCard.currentHp <= 0) { const ex3 = Math.abs(defCard.currentHp); if (defWho ===
                        'player') { state.playerLife = Math.max(0, state.playerLife - ex3);
                        state.playerField = null;
                        state.playerDiscard.push(defCard); } else { state.enemyLife = Math.max(0, state.enemyLife -
                            ex3);
                        state.enemyField = null;
                        state.enemyDiscard.push(defCard); } if (ex3 > 0) spawnDamagePop(defWho === 'player' ?
                        'player-field' : 'enemy-field', ex3, '#ff0000');
                    flashFieldCard(defWho); } }
                flashFieldCard('player');
                flashFieldCard('enemy');
            }

            function checkDeathResurrect(who, card) {
                if (card.onDeathResurrect && card.currentHp <= 0) { card.currentHp = card.hp;
                    card.atk += 2;
                    card.ability = 'Reborn +2'; if (who === 'player') state.playerField = card;
                    else state.enemyField = card;
                    spawnDamagePop(who === 'player' ? 'player-field' : 'enemy-field', card.hp, '#00ff00');
                    addBattleLog(card.name + ' resurrects!', 'log-heal');
                    sfxHeal();
                    updateUI(); }
            }

            function triggerOnPlay(who, card, originalCardData) {
                if (card.onPlayDraw && who === 'player') { for (let d = 0; d < card.onPlayDraw; d++) drawCard(
                    'player');
                    addBattleLog(card.name + ' draws ' + card.onPlayDraw, 'log-info');
                    sfxCantrip(); }
                if (card.onPlayEnergy !== undefined) { if (who === 'player') { state.playerEnergy = Math.min(getMaxEnergy(),
                        state.playerEnergy + card.onPlayEnergy);
                    addBattleLog(card.name + ' grants +' + card.onPlayEnergy + ' energy', 'log-combo');
                    sfxLegendary(); } else state.enemyEnergy = Math.min(getMaxEnergy(), state.enemyEnergy + card
                        .onPlayEnergy); }
                if (card.onPlayShuffleDiscard) { if (who === 'player') { state.playerDeck.push(...state.playerDiscard);
                        state.playerDiscard = [];
                        state.playerDeck = shuffle(state.playerDeck);
                        addBattleLog(card.name + ' recycles discard!', 'log-combo');
                        sfxLegendary(); } else { state.enemyDeck.push(...state.enemyDiscard);
                        state.enemyDiscard = [];
                        state.enemyDeck = shuffle(state.enemyDeck); } }
                if (card.onPlayExtraTurn && who === 'player' && !state.extraTurnGranted) { state.extraTurnGranted = true;
                    state.isPlayerTurn = true;
                    state.cardsPlayedThisTurn = 0;
                    state.playerEnergy = Math.min(getMaxEnergy(), state.playerEnergy + getEnergyPerTurn());
                    state.discardsUsedThisTurn = 0;
                    drawCard('player');
                    addBattleLog('Time Mage grants extra turn!', 'log-combo');
                    sfxLegendary();
                    updateUI();
                    document.getElementById('end-turn-btn').disabled = false;
                    document.getElementById('end-turn-btn').classList.add('pulse');
                    setTimeout(() => document.getElementById('end-turn-btn').classList.remove('pulse'), 1200); return; }
                if (who === 'player') {
                    if (card.onPlayHeal) { state.playerLife = Math.min(state.maxPlayerLife, state.playerLife + card
                            .onPlayHeal);
                        spawnDamagePop('player-field', card.onPlayHeal, '#00ff00');
                        sfxHeal();
                        addBattleLog(card.name + ' heals ' + card.onPlayHeal, 'log-heal'); }
                    if (card.onPlayDamage && state.enemyField) { state.enemyField.currentHp -= card.onPlayDamage;
                        spawnDamagePop('enemy-field', card.onPlayDamage, '#ff8800'); if (state.enemyField.currentHp <=
                            0) { const ex = Math.abs(state.enemyField.currentHp);
                            state.enemyLife = Math.max(0, state.enemyLife - ex);
                            state.enemyDiscard.push(state.enemyField);
                            state.enemyField = null; if (ex > 0) spawnDamagePop('enemy-field', ex, '#ff0000');
                            flashFieldCard('enemy'); } }
                    if (card.fearEffect) state.enemyFearReduction = card.fearEffect;
                    if (card.burnDamage && state.enemyField) state.burnOnEnemy = card.burnDamage;
                } else {
                    if (card.onPlayHeal) { state.enemyLife = Math.min(state.maxEnemyLife, state.enemyLife + card
                            .onPlayHeal);
                        spawnDamagePop('enemy-field', card.onPlayHeal, '#00ff00'); }
                    if (card.onPlayDamage && state.playerField) { state.playerField.currentHp -= card.onPlayDamage;
                        spawnDamagePop('player-field', card.onPlayDamage, '#ff8800'); if (state.playerField.currentHp <=
                            0) { const ex = Math.abs(state.playerField.currentHp);
                            state.playerLife = Math.max(0, state.playerLife - ex);
                            state.playerDiscard.push(state.playerField);
                            state.playerField = null; if (ex > 0) spawnDamagePop('player-field', ex, '#ff0000');
                            flashFieldCard('player'); } }
                    if (card.burnDamage && state.playerField) state.burnOnPlayer = card.burnDamage;
                }
            }

            function applyBurnDamage() {
                if (state.burnOnEnemy > 0 && state.enemyField) { state.enemyField.currentHp -= state.burnOnEnemy;
                    spawnDamagePop('enemy-field', state.burnOnEnemy, '#ff4400');
                    sfxBurn(); if (state.enemyField.currentHp <= 0) { const ex = Math.abs(state.enemyField.currentHp);
                        state.enemyLife = Math.max(0, state.enemyLife - ex);
                        state.enemyDiscard.push(state.enemyField);
                        state.enemyField = null; if (ex > 0) spawnDamagePop('enemy-field', ex, '#ff0000');
                        flashFieldCard('enemy'); } }
                if (state.burnOnPlayer > 0 && state.playerField) { state.playerField.currentHp -= state.burnOnPlayer;
                    spawnDamagePop('player-field', state.burnOnPlayer, '#ff4400');
                    sfxBurn(); if (state.playerField.currentHp <= 0) { const ex = Math.abs(state.playerField.currentHp);
                        state.playerLife = Math.max(0, state.playerLife - ex);
                        state.playerDiscard.push(state.playerField);
                        state.playerField = null; if (ex > 0) spawnDamagePop('player-field', ex, '#ff0000');
                        flashFieldCard('player'); } }
                if (!state.enemyField) state.burnOnEnemy = 0;
                if (!state.playerField) state.burnOnPlayer = 0;
            }

            function flashFieldCard(who) { const el = document.getElementById(who === 'player' ? 'player-field' :
                    'enemy-field'); if (!el) return;
                const card = el.querySelector('.field-card'); if (card) { card.classList.add('hit-flash');
                    setTimeout(() => card.classList.remove('hit-flash'), 150); } }

            function triggerScreenShake() { const app = document.getElementById('app'); if (app) { app.classList.add(
                    'shaking');
                    setTimeout(() => app.classList.remove('shaking'), 400); }
                sfxBigHit(); }

            function spawnDamagePop(fieldId, amount, color) { const el = document.getElementById(fieldId); if (!el)
            return;
                const pop = document.createElement('span');
                pop.className = 'damage-pop';
                pop.textContent = (color === '#00ff00' ? '+' : '-') + Math.abs(amount);
                pop.style.color = color;
                pop.style.left = (20 + Math.random() * 55) + '%';
                pop.style.top = (5 + Math.random() * 40) + '%';
                el.appendChild(pop);
                setTimeout(() => pop.remove(), 900); }

            function spawnComboParticles() {
                const el = document.getElementById('player-field');
                if (!el) return;
                for (let i = 0; i < 5; i++) {
                    const p = document.createElement('span');
                    p.className = 'combo-particle';
                    p.textContent = ['✨', '⚡', '💥', '🔥', '🌟'][i];
                    p.style.left = (30 + Math.random() * 40) + '%';
                    p.style.top = (20 + Math.random() * 30) + '%';
                    p.style.setProperty('--px', (Math.random() * 60 - 30) + 'px');
                    p.style.animationDuration = (0.5 + Math.random() * 0.5) + 's';
                    el.appendChild(p);
                    setTimeout(() => p.remove(), 800);
                }
            }

            function checkGameEnd() { if (state.playerLife <= 0) { state.gameOver = true;
                    state.playerLife = 0;
                    sfxDefeat();
                    showDefeatOverlay(); return true; } if (state.enemyLife <= 0) { state.gameOver = true;
                    state.enemyLife = 0;
                    state.wins++;
                    sfxVictory();
                    showVictoryOverlay(); return true; } return false; }

            function enemyTurn() {
                if (state.gameOver) return;
                state.enemyEnergy = Math.min(getMaxEnergy(), state.enemyEnergy + getEnergyPerTurn());
                state.enemyFearReduction = Math.max(0, (state.enemyFearReduction || 0) - 1);
                drawCard('enemy');
                const personality = getEnemyPersonality();
                let played = 0;
                const maxPlays = personality === 'relentless' ? 4 : personality === 'aggressive' ? 3 : 2;
                while (played < maxPlays && !state.gameOver) {
                    const playable = [];
                    for (let i = 0; i < state.enemyHand.length; i++)
                        if (state.enemyHand[i].cost <= state.enemyEnergy) playable.push(i);
                    if (playable.length === 0) break;
                    playable.sort((a, b) => {
                        const ca = state.enemyHand[a],
                            cb = state.enemyHand[b];
                        let sa = ca.atk * 2 + ca.hp + (ca.lifesteal && state.enemyLife < state.maxEnemyLife *
                            0.5 ? 8 : 0) + (ca.onPlayDamage ? 5 : 0) + (ca.onPlayHeal && state.enemyLife <
                                state.maxEnemyLife * 0.6 ? 6 : 0) - ca.cost;
                        let sb = cb.atk * 2 + cb.hp + (cb.lifesteal && state.enemyLife < state.maxEnemyLife *
                            0.5 ? 8 : 0) + (cb.onPlayDamage ? 5 : 0) + (cb.onPlayHeal && state.enemyLife <
                                state.maxEnemyLife * 0.6 ? 6 : 0) - cb.cost;
                        if (personality === 'defensive') { sa += ca.hp * 1.5;
                            sb += cb.hp * 1.5; }
                        if (personality === 'tricky' && ca.onPlayDamage) sa += 3;
                        if (personality === 'tricky' && cb.onPlayDamage) sb += 3;
                        return sb - sa;
                    });
                    // Sometimes hold if energy is high and better cards might come
                    const best = state.enemyHand[playable[0]];
                    if (personality === 'balanced' && state.enemyEnergy >= 5 && best.cost <= 2 && state.enemyHand
                        .length >= 3 && played >= 1) break;
                    playCard('enemy', playable[0]);
                    played++;
                    if (state.gameOver) break;
                }
                applyBurnDamage();
                checkGameEnd();
                updateUI();
                if (!state.gameOver) startPlayerTurn();
            }

            function startPlayerTurn() {
                state.isPlayerTurn = true;
                state.cardsPlayedThisTurn = 0;
                state.selectedHandIndex = -1;
                state.discardsUsedThisTurn = 0;
                state.extraTurnGranted = false;
                // Don't reset combo on new turn - it persists until broken by playing a different class
                const epT = getEnergyPerTurn();
                state.playerEnergy = Math.min(getMaxEnergy(), state.playerEnergy + epT);
                state.enemyFearReduction = Math.max(0, (state.enemyFearReduction || 0) - 1);
                drawCard('player');
                applyBurnDamage();
                checkGameEnd();
                updateUI();
                if (!state.gameOver) { document.getElementById('end-turn-btn').disabled = false;
                    document.getElementById('end-turn-btn').classList.add('pulse');
                    setTimeout(() => document.getElementById('end-turn-btn').classList.remove('pulse'), 1200);
                    addBattleLog('Your turn — ⚡' + state.playerEnergy + ' (+' + epT + ')', 'log-info'); }
            }

            function playerEndTurn() {
                if (state.gameOver || !state.isPlayerTurn) return;
                state.isPlayerTurn = false;
                state.selectedHandIndex = -1;
                state.discardsUsedThisTurn = 0;
                state.cardsPlayedThisTurn = 0;
                state.comboClass = null;
                state.comboCount = 0;
                if (!state.playerField || !state.playerField.burnDamage) state.burnOnEnemy = 0;
                document.getElementById('end-turn-btn').disabled = true;
                updateUI();
                addBattleLog('Turn ended.', 'log-info');
                setTimeout(() => { if (!state.gameOver) enemyTurn(); }, 400);
            }

            function updateUI() {
                document.getElementById('enemy-name').textContent = getEnemyName();
                const lifePct = Math.max(0, (state.enemyLife / Math.max(1, state.maxEnemyLife)) * 100);
                document.getElementById('enemy-life-bar-inner').style.width = lifePct + '%';
                document.getElementById('enemy-life-text').textContent = state.enemyLife;
                document.getElementById('win-counter').textContent = 'WINS: ' + state.wins;
                const avatarEl = document.getElementById('enemy-avatar');
                avatarEl.childNodes[0].textContent = state.wins >= 12 ? '☠' : state.wins >= 8 ? '👾' : state.wins >= 5 ?
                    '👺' : state.wins >= 2 ? '👽' : '👾';
                const intentEl = document.getElementById('enemy-intent');
                if (intentEl) {
                    const personality = getEnemyPersonality();
                    const hasPlayable = !state.isPlayerTurn && state.enemyHand.some(c => c.cost <= state.enemyEnergy);
                    intentEl.textContent = personality === 'aggressive' ? '💢' : personality === 'defensive' ? '🛡️' :
                        personality === 'tricky' ? '🃏' : hasPlayable ? '⚡' : state.enemyField ? '⚔️' : '💚';
                }
                const statusEl = document.getElementById('enemy-statuses');
                let statusHtml = '';
                if (state.burnOnEnemy > 0) statusHtml +=
                    '<span class="status-badge burn">🔥 BURN ' + state.burnOnEnemy + '</span>';
                if (state.enemyFearReduction > 0) statusHtml += '<span class="status-badge fear">😱 FEAR -' + state
                    .enemyFearReduction + '</span>';
                statusEl.innerHTML = statusHtml;
                document.getElementById('enemy-field').innerHTML = state.enemyField ? renderFieldCard(state.enemyField,
                    'enemy') : '<div class="field-empty">NO DEFENDER</div>';
                document.getElementById('player-field').innerHTML = state.playerField ? renderFieldCard(state.playerField,
                    'player') : '<div class="field-empty">NO DEFENDER</div>';
                document.getElementById('clash-indicator').textContent = (state.enemyField && state.playerField) ?
                    '►◄' : (state.enemyField || state.playerField) ? '►' : '··';
                document.getElementById('hand-count').textContent = state.playerHand.length;
                document.getElementById('discard-count').textContent = state.playerDiscard.length;
                document.getElementById('discards-left').textContent = state.maxDiscardsPerTurn - state
                    .discardsUsedThisTurn;
                document.getElementById('combo-bonus').textContent = 'x' + Math.max(1, state.comboCount);
                document.getElementById('player-life-num').textContent = state.playerLife;
                const comboInd = document.getElementById('combo-indicator');
                if (comboInd) {
                    if (state.comboCount >= 2 && state.isPlayerTurn) {
                        comboInd.textContent = 'COMBO x' + state.comboCount + '!';
                        comboInd.classList.add('active');
                    } else {
                        comboInd.classList.remove('active');
                    }
                }
                const maxE = getMaxEnergy();
                let orbs = '';
                for (let i = 1; i <= maxE; i++) orbs +=
                    `<div class="energy-orb ${i <= state.playerEnergy ? 'filled' : ''}"></div>`;
                document.getElementById('energy-display').innerHTML = orbs;
                document.getElementById('end-turn-btn').disabled = !state.isPlayerTurn || state.gameOver;
                document.getElementById('end-turn-btn').textContent = state.gameOver ? 'GAME OVER' : !state
                    .isPlayerTurn ? 'ENEMY TURN' : 'END TURN';
                const discardHint = document.getElementById('discard-hint');
                if (discardHint) discardHint.style.display = (state.selectedHandIndex >= 0 && state.discardsUsedThisTurn <
                    state.maxDiscardsPerTurn && state.isPlayerTurn) ? 'block' : 'none';

                const handEl = document.getElementById('hand-cards');
                let html = '';
                const bonus = getComboBonus();
                for (let i = 0; i < state.playerHand.length; i++) {
                    const c = state.playerHand[i];
                    const cls = c.class;
                    const rarityCls = 'rarity-' + (c.tier || 'common');
                    const canAfford = c.cost <= state.playerEnergy;
                    const canPlay = state.isPlayerTurn && canAfford && !state.gameOver;
                    const selected = i === state.selectedHandIndex;
                    const isUnplayable = !canPlay && !selected;
                    const isComboClass = state.comboClass === c.class && state.comboCount >= 1 && state.isPlayerTurn;
                    html += `<div class="hand-card ${cls} ${rarityCls} ${isUnplayable ? 'unplayable' : ''} ${canPlay && !selected ? 'playable-glow' : ''} ${selected ? 'selected' : ''} ${isComboClass && canPlay && !selected ? 'combo-highlight' : ''}" onclick="window._game.handleHandCardClick(${i})" oncontextmenu="event.preventDefault();window._game.showCardTooltip(event,${i})">
                <div class="discard-x" onclick="window._game.handleDiscardClick(event,${i})">✕</div>
                <div class="hand-card-cost ${canAfford ? 'affordable' : ''}">${c.cost}</div>
                <div class="hand-card-emoji">${c.emoji}</div>
                <div class="hand-card-name">${c.name}</div>
                <div class="hand-card-stats"><span>⚔${c.atk}</span><span>❤${c.hp}</span></div>
                ${c.ability ? `<div class="hand-card-ability-preview">${c.ability}</div>` : ''}
                <div class="inspect-btn" onclick="event.stopPropagation();window._game.showCardTooltip(event,${i})">?</div>
              </div>`;
                }
                if (!state.playerHand.length) html =
                    '<div style="color:#555;text-align:center;padding:18px;font-size:8px;">NO CARDS IN HAND</div>';
                handEl.innerHTML = html;
                document.getElementById('sound-toggle').className = soundEnabled ? 'on' : '';
                document.getElementById('sound-toggle').textContent = soundEnabled ? '♪' : '✕';
            }

            function renderFieldCard(card, who) {
                const cls = card.class;
                const rarityCls = 'rarity-' + (card.tier || 'common');
                const hpRatio = card.currentHp / Math.max(1, card.hp);
                const hpColor = hpRatio <= 0.33 ? '#ff0000' : hpRatio <= 0.6 ? '#ffaa00' : '#0f0';
                const comboAtkNote = card.comboBonusAtk ?
                    ' <span style="color:#ffaa00;font-size:6px;">(+' + card.comboBonusAtk + ' combo)</span>' : '';
                return `<div class="field-card ${cls} ${rarityCls} ${who}-card">
              <div class="field-card-emoji">${card.emoji}</div>
              <div class="field-card-info">
                <div class="field-card-name">${card.name}${comboAtkNote}</div>
                <div class="field-card-class"><span class="class-badge ${cls}">${card.class}</span> <span style="font-size:5px;color:#888;">${card.tier||'common'}</span></div>
                <div class="field-card-stats"><span class="stat-atk">⚔${card.atk}</span><span class="stat-hp" style="color:${hpColor}">❤${card.currentHp}/${card.hp}</span></div>
                ${card.ability ? `<div class="field-card-ability">${card.ability}</div>` : ''}
              </div>
            </div>`;
            }

            function handleHandCardClick(i) {
                if (state.gameOver || !state.isPlayerTurn) return;
                const card = state.playerHand[i];
                if (!card) return;
                if (state.selectedHandIndex === i) {
                    if (card.cost <= state.playerEnergy) { sfxPlayCard();
                        playCard('player', i);
                        state.selectedHandIndex = -1;
                        updateUI(); return; } else { state.selectedHandIndex = -1;
                        sfxSelect();
                        updateUI(); return; }
                }
                state.selectedHandIndex = i;
                sfxSelect();
                updateUI();
            }

            function handleDiscardClick(event, i) {
                event.stopPropagation();
                if (state.gameOver || !state.isPlayerTurn || state.discardsUsedThisTurn >= state.maxDiscardsPerTurn)
                    return;
                if (state.selectedHandIndex === i) { discardFromHand('player', i);
                    state.selectedHandIndex = -1; }
            }

            function showCardTooltip(event, i) {
                event.stopPropagation();
                const card = state.playerHand[i];
                if (!card) return hideTooltip();
                const tt = document.getElementById('card-tooltip');
                const desc = getAbilityDescription(card);
                tt.querySelector('.tt-emoji').textContent = card.emoji;
                tt.querySelector('.tt-name').textContent = card.name + ' [' + (card.tier || 'common').toUpperCase() +
                    ']';
                tt.querySelector('.tt-desc').textContent =
                    '⚔' + card.atk + ' ❤' + card.hp + ' 💰' + card.cost + '\n' + card.class.toUpperCase() + '\n' + desc;
                tt.classList.add('visible');
                const rect = event.target.getBoundingClientRect();
                tt.style.left = Math.min(rect.left, window.innerWidth - 210) + 'px';
                tt.style.top = (rect.top - tt.offsetHeight - 8) + 'px';
                if (rect.top < tt.offsetHeight + 20) tt.style.top = (rect.bottom + 8) + 'px';
                clearTimeout(window._tooltipTimeout);
                window._tooltipTimeout = setTimeout(hideTooltip, 2500);
            }

            function hideTooltip() {
                document.getElementById('card-tooltip').classList.remove('visible');
            }

            function showVictoryOverlay() {
                const rewards = getRewardCards();
                state._rewardCards = rewards;
                document.getElementById('overlay-content').innerHTML =
                    `<h2>🏆 VICTORY!</h2><p>${getEnemyName()} defeated!</p><p style="color:#ff0;">Wins: ${state.wins} · ⚡/turn: +${getEnergyPerTurn()} · Max ⚡: ${getMaxEnergy()}</p><p style="color:#ffaa00;">Next foe: ${getEnemyPersonality().toUpperCase()}</p><p style="color:#fff;">CHOOSE NEW CARD:</p><div id="reward-cards">${rewards.map((c,i)=>{const owned=countOwned(c.id);return`<div class="reward-card rarity-${c.tier} ${c.class}" onclick="window._game.selectReward(${i})"><div class="reward-card-emoji">${c.emoji}</div><div class="reward-card-name">${c.name}</div><span class="class-badge ${c.class}">${c.class}</span><div class="reward-card-info">⚔${c.atk} ❤${c.hp} 💰${c.cost}</div>${owned>0?`<div class="owned-count">Owned: ${owned}</div>`:''}</div>`}).join('')}</div><button class="btn gold" onclick="window._game.selectReward(-1)">🎲 RANDOM</button>`;
                document.getElementById('overlay').classList.remove('hidden');
            }

            function selectReward(idx) {
                let chosen;
                if (idx >= 0 && state._rewardCards && state._rewardCards[idx]) chosen = cloneCard(state._rewardCards[
                    idx]);
                else { const pool = getRewardCards();
                    chosen = cloneCard(pool[Math.floor(Math.random() * pool.length)]); }
                state.playerDeck.push(chosen);
                state.playerDeck = shuffle(state.playerDeck);
                state._rewardCards = null;
                addBattleLog('Added ' + chosen.name + ' to deck', 'log-info');
                hideOverlay();
                resetBattle();
            }

            function showDefeatOverlay() {
                document.getElementById('overlay-content').innerHTML =
                    `<h2>💀 DEFEAT</h2><p>You fell to ${getEnemyName()}.</p><p style="color:#888;">Wins: ${state.wins}</p><p style="font-size:7px;color:#666;">Tip: Build class combos! Play same-class cards for bonuses.</p><button class="btn gold" onclick="window._game.restartGame()">🔄 CONTINUE</button><button class="btn danger" onclick="window._game.fullReset()">💀 NEW GAME</button>`;
                document.getElementById('overlay').classList.remove('hidden');
            }

            function hideOverlay() { document.getElementById('overlay').classList.add('hidden'); }

            function stripCardForReset(c) {
                return {
                    id: c.id,
                    name: c.name,
                    class: c.class,
                    emoji: c.emoji,
                    atk: c.atk,
                    hp: c.hp,
                    cost: c.cost,
                    ability: c.ability || '',
                    tier: c.tier || 'common',
                    onPlayHeal: c.onPlayHeal,
                    onPlayDamage: c.onPlayDamage,
                    fearEffect: c.fearEffect,
                    burnDamage: c.burnDamage,
                    lifesteal: c.lifesteal,
                    splashDamage: c.splashDamage,
                    bonusFirstStrike: c.bonusFirstStrike,
                    onPlayBuff: c.onPlayBuff,
                    onPlayEnergy: c.onPlayEnergy,
                    onPlayShuffleDiscard: c.onPlayShuffleDiscard,
                    onPlayExtraTurn: c.onPlayExtraTurn,
                    onDeathResurrect: c.onDeathResurrect,
                    onPlayDraw: c.onPlayDraw,
                };
            }

            function resetBattle() {
                const all = getAllPlayerCards();
                const cleaned = all.map(stripCardForReset);
                state.playerDeck = shuffle(cleaned.map(c => cloneCard(c)));
                state.playerHand = [];
                state.playerField = null;
                state.playerDiscard = [];
                state.playerLife = 25;
                state.playerEnergy = 3;
                state.enemyDeck = getEnemyDeck();
                state.enemyHand = [];
                state.enemyField = null;
                state.enemyDiscard = [];
                state.enemyLife = getEnemyLife();
                state.maxEnemyLife = state.enemyLife;
                state.enemyEnergy = 2;
                state.isPlayerTurn = true;
                state.gameOver = false;
                state.burnOnEnemy = 0;
                state.burnOnPlayer = 0;
                state.enemyFearReduction = 0;
                state.discardsUsedThisTurn = 0;
                state.maxDiscardsPerTurn = 2;
                state.extraTurnGranted = false;
                state.cardsPlayedThisTurn = 0;
                state.comboClass = null;
                state.comboCount = 0;
                state.selectedHandIndex = -1;
                for (let i = 0; i < 5; i++) drawCard('player');
                for (let i = 0; i < 3; i++) drawCard('enemy');
                if (state.enemyHand.length > 0) { const c = state.enemyHand.splice(0, 1)[0];
                    state.enemyField = c;
                    state.enemyField.currentHp = c.hp; }
                updateUI();
                document.getElementById('end-turn-btn').disabled = false;
                addBattleLog('New foe approaches! (' + getEnemyPersonality() + ')', 'log-info');
            }

            function restartGame() {
                state.wins = 0;
                const starters = ['knight', 'squire', 'acolyte', 'archer', 'priest', 'footman', 'lesser_imp', 'wolf',
                    'vampire_spawn', 'bat'
                ];
                state.playerDeck = shuffle(starters.map(id => cloneCard(ALL_CARDS.find(c => c.id === id))));
                state.playerHand = [];
                state.playerField = null;
                state.playerDiscard = [];
                state.playerLife = 25;
                state.playerEnergy = 3;
                state.enemyDeck = getEnemyDeck();
                state.enemyHand = [];
                state.enemyField = null;
                state.enemyDiscard = [];
                state.enemyLife = getEnemyLife();
                state.maxEnemyLife = state.enemyLife;
                state.enemyEnergy = 2;
                state.isPlayerTurn = true;
                state.gameOver = false;
                state.burnOnEnemy = 0;
                state.burnOnPlayer = 0;
                state.enemyFearReduction = 0;
                state.discardsUsedThisTurn = 0;
                state.maxDiscardsPerTurn = 2;
                state.extraTurnGranted = false;
                state.cardsPlayedThisTurn = 0;
                state.comboClass = null;
                state.comboCount = 0;
                state.selectedHandIndex = -1;
                for (let i = 0; i < 5; i++) drawCard('player');
                for (let i = 0; i < 3; i++) drawCard('enemy');
                if (state.enemyHand.length > 0) { const c = state.enemyHand.splice(0, 1)[0];
                    state.enemyField = c;
                    state.enemyField.currentHp = c.hp; }
                hideOverlay();
                updateUI();
                addBattleLog('Fresh start. Good luck!', 'log-info');
            }

            function fullReset() { state.wins = 0;
                restartGame();
                hideOverlay();
                updateUI(); }

            function toggleSound() {
                soundEnabled = !soundEnabled;
                if (!soundEnabled && audioCtx) { audioCtx.close();
                    audioCtx = null; }
                document.getElementById('sound-toggle').className = soundEnabled ? 'on' : '';
                document.getElementById('sound-toggle').textContent = soundEnabled ? '♪' : '✕';
                if (soundEnabled) playBeep(500, 0.05, 'triangle', 0.03);
            }

            function toggleCRT() {
                state.crtEnabled = !state.crtEnabled;
                const app = document.getElementById('app');
                if (state.crtEnabled) app.classList.remove('crt-off');
                else app.classList.add('crt-off');
            }

            function showDeckModal() {
                const all = getAllPlayerCards();
                const counts = {};
                for (const c of all) { const k = c.id; if (!counts[k]) counts[k] = { card: c, count: 0 };
                    counts[k].count++; }
                const uniq = Object.values(counts);
                uniq.sort((a, b) => { const o = { demon: 0, werewolf: 1, vampire: 2, human: 3, legendary: 4 }; return (o[a
                        .card.class] - o[b.card.class]) || b.card.tier.localeCompare(a.card.tier) || a.card.name
                        .localeCompare(b.card.name); });
                let html =
                    '<h3>📦 YOUR DECK</h3><p style="font-size:7px;color:#888;">Combo: Play same-class cards for stacking bonuses!</p><div style="max-height:45vh;overflow-y:auto;">';
                for (const { card, count: cnt } of uniq) { html +=
                        `<div class="deck-card-row"><span class="emoji">${card.emoji}</span><span class="name">${card.name} ${cnt>1?'x'+cnt:''}</span><span class="class-badge ${card.class}">${card.class}</span><span class="info">⚔${card.atk} ❤${card.hp} 💰${card.cost} <span style="color:#888;">${card.tier||'common'}</span></span></div>`; }
                html += '</div><p style="font-size:7px;margin-top:6px;">Total: ' + all.length +
                    ' cards · ⚡/turn: +' + getEnergyPerTurn() + ' · Max ⚡: ' + getMaxEnergy() +
                    '</p><p style="font-size:6px;color:#ffaa00;">★ Combo bonus: 2x→+1ATK | 3x→+2ATK+Draw | 4x→+3ATK+Draw+⚡</p><button class="btn gold" onclick="window._game.hideOverlay()">CLOSE</button><button class="btn small" onclick="window._game.toggleCRT()">📺 CRT: ' +
                    (state.crtEnabled ? 'ON' : 'OFF') + '</button>';
                document.getElementById('overlay-content').innerHTML = html;
                document.getElementById('overlay').classList.remove('hidden');
            }

            function toggleCRTFromModal() {
                toggleCRT();
                showDeckModal();
            }

            document.getElementById('end-turn-btn').addEventListener('click', () => { if (state.isPlayerTurn && !state
                    .gameOver) { state.selectedHandIndex = -1;
                    playerEndTurn(); } });
            document.getElementById('deck-btn').addEventListener('click', () => { if (!state.gameOver) showDeckModal(); });
            document.getElementById('sound-toggle').addEventListener('click', toggleSound);

            document.addEventListener('click', (e) => {
                const tt = document.getElementById('card-tooltip');
                if (!e.target.closest('.inspect-btn') && !e.target.closest('.hand-card')) hideTooltip();
            });

            document.addEventListener('keydown', e => {
                if (state.gameOver) { if (e.key === 'Enter' || e.key === ' ') { if (!document.getElementById(
                            'overlay').classList.contains('hidden') && state._rewardCards) window._game
                        .selectReward(0); } return; }
                const key = e.key.toLowerCase();
                if (key >= '1' && key <= '7') { const idx = parseInt(key) - 1; if (idx < state.playerHand.length && state
                        .isPlayerTurn) { const card = state.playerHand[idx]; if (card && card.cost <= state
                        .playerEnergy) { if (state.selectedHandIndex === idx) { sfxPlayCard();
                            playCard('player', idx);
                            state.selectedHandIndex = -1; } else { state.selectedHandIndex = idx;
                            sfxSelect(); }
                        updateUI(); } } }
                if (key === 'e' && state.isPlayerTurn && !state.gameOver) { state.selectedHandIndex = -1;
                    playerEndTurn(); }
                if (key === 'd' && !state.gameOver && !e.ctrlKey && !e.metaKey) showDeckModal();
                if (key === 's' && !e.ctrlKey && !e.metaKey) toggleSound();
                if (key === 'escape') { hideOverlay();
                    state.selectedHandIndex = -1;
                    hideTooltip();
                    updateUI(); }
                if (key === 'x' && state.selectedHandIndex >= 0 && state.isPlayerTurn && state.discardsUsedThisTurn <
                    state.maxDiscardsPerTurn && !state.gameOver) { discardFromHand('player', state.selectedHandIndex);
                    state.selectedHandIndex = -1; }
                if (key === 'i' && state.selectedHandIndex >= 0 && state.isPlayerTurn && !state.gameOver) {
                    const fakeEvent = { stopPropagation: () => {}, target: document.querySelector('.hand-card.selected') ||
                            document.getElementById('hand-cards') };
                    showCardTooltip(fakeEvent, state.selectedHandIndex);
                }
            });

            window._game = {
                handleHandCardClick,
                handleDiscardClick,
                selectReward,
                hideOverlay,
                restartGame,
                fullReset,
                showDeckModal,
                showCardTooltip,
                toggleSound,
                toggleCRT,
                toggleCRTFromModal,
                init: initGame
            };
            window._tooltipTimeout = null;
            initGame();
        })();
    </script>
</body>
</html>
