<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIGHT SHIFT — KBOZ AM 990</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #33ff66;
            --green-dim: #1a6633;
            --red: #ff3333;
            --red-glow: #ff6666;
            --bg-screen: #050500;
            --text-shadow-green: 0 0 8px rgba(51,255,102,0.7), 0 0 20px rgba(51,255,102,0.3);
            --text-shadow-red: 0 0 8px rgba(255,51,51,0.8), 0 0 20px rgba(255,51,51,0.4);
            --button-bg: linear-gradient(180deg, #2a2a2a 0%, #0f0f0f 100%);
            --button-border: #4a4a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0806;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            background-image: radial-gradient(ellipse at center, #1a150e 0%, #050505 70%);
            padding: 10px;
            user-select: none;
            overflow: hidden;
        }

        .crt-monitor {
            background: #2e2b23;
            border-radius: 20px;
            padding: 15px 12px 12px;
            box-shadow: 0 0 0 3px #111, 0 0 0 6px #2a2720, 0 0 0 8px #0a0908, 0 20px 40px rgba(0,0,0,0.9);
            max-width: 100%;
            width: 100%;
            height: 100vh;
            max-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .monitor-frame {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .screen-area {
            flex: 1;
            background: #0b0b0b;
            border-radius: 12px;
            padding: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .screen-glow {
            flex: 1;
            background: #050800;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.95), 0 0 15px rgba(51,255,102,0.1);
            min-height: 0;
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
            pointer-events: none;
            z-index: 10;
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 8;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
            border-radius: 6px;
        }

        .screen-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 12;
            padding: 6px;
            min-height: 0;
            overflow: hidden;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            background: rgba(5, 15, 5, 0.8);
            border: 1px solid var(--green-dim);
            margin-bottom: 4px;
            font-size: 14px;           /* Larger for readability */
            color: var(--green);
            text-shadow: var(--text-shadow-green);
            flex-shrink: 0;
        }

        .onair-indicator {
            color: var(--red);
            font-weight: bold;
        }
        .onair-indicator.off {
            color: #444;
        }
        .onair-indicator.pulse {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { text-shadow: 0 0 8px rgba(255,51,51,0.8), 0 0 20px rgba(255,51,51,0.4); opacity: 1; }
            50% { text-shadow: 0 0 15px rgba(255,51,51,1), 0 0 35px rgba(255,51,51,0.6); opacity: 0.7; }
            100% { text-shadow: 0 0 8px rgba(255,51,51,0.8), 0 0 20px rgba(255,51,51,0.4); opacity: 1; }
        }

        .game-output {
            flex: 1 1 0;
            overflow-y: auto;
            padding: 6px;
            color: var(--green);
            font-size: 20px;           /* Big, readable main text */
            line-height: 1.5;
            text-shadow: var(--text-shadow-green);
            min-height: 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(51,255,102,0.2);
            margin-bottom: 6px;
            font-family: 'VT323', 'Press Start 2P', monospace;
            letter-spacing: 0.5px;
        }
        .game-output::-webkit-scrollbar {
            width: 5px;
        }
        .game-output::-webkit-scrollbar-track {
            background: #020201;
        }
        .game-output::-webkit-scrollbar-thumb {
            background: #1a6633;
            border-radius: 3px;
        }

        .input-area {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 4px 6px;
            flex-shrink: 0;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,51,51,0.4);
            border-radius: 4px;
            margin-bottom: 6px;
        }
        .prompt-symbol {
            color: var(--red-glow);
            font-size: 20px;
        }
        .cmd-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--green);
            font-family: 'VT323', 'Press Start 2P', monospace;
            font-size: 24px;           /* Big input text */
            padding: 6px;
            outline: none;
            caret-color: var(--green);
            text-shadow: var(--text-shadow-green);
            letter-spacing: 0.5px;
        }
        .cmd-input:focus {
            box-shadow: 0 0 6px rgba(255,51,51,0.3);
        }
        #btnSend {
            background: var(--button-bg);
            border: 2px solid #4a6a3a;
            color: var(--green);
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 3px 0 #0a0f06;
            text-shadow: var(--text-shadow-green);
            transition: all 0.1s;
        }
        #btnSend:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0a0f06;
        }

        /* Tabs for lines/contacts */
        .tabs-container {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--green-dim);
            border-radius: 4px;
            background: rgba(10,15,5,0.7);
            max-height: 180px;
            overflow: hidden;
        }
        .tab-buttons {
            display: flex;
            background: #0a0a05;
            border-bottom: 1px solid var(--green-dim);
        }
        .tab-buttons button {
            flex: 1;
            background: none;
            border: none;
            color: #666;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 6px 4px;
            cursor: pointer;
            text-shadow: none;
            transition: all 0.2s;
        }
        .tab-buttons button.active {
            color: var(--red);
            text-shadow: 0 0 6px rgba(255,51,51,0.7);
            border-bottom: 2px solid var(--red);
        }
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 4px 6px;
            min-height: 0;
        }
        .tab-panel {
            display: none;
            font-size: 14px;            /* Readable line/contact info */
        }
        .tab-panel.active {
            display: block;
        }

        .line-board, .contacts-panel {
            background: transparent;
            border: none;
            font-size: 14px;
            color: var(--green);
        }
        .line-row, .contact-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px;
            border-bottom: 1px solid rgba(51,255,102,0.2);
            padding: 4px 0;
            font-size: 14px;
        }
        .line-btns button, .contact-item button {
            background: var(--button-bg);
            border: 1px solid var(--green-dim);
            color: var(--green);
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 4px 6px;
            cursor: pointer;
            border-radius: 3px;
            box-shadow: 0 2px 0 #0a0f06;
            text-shadow: 0 0 4px rgba(51,255,102,0.5);
            margin: 1px;
        }
        .line-btns button:active, .contact-item button:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #0a0f06;
        }

        .actions-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 4px 0;
            flex-shrink: 0;
            justify-content: center;
        }
        .actions-bar button {
            background: var(--button-bg);
            border: 2px solid var(--button-border);
            color: var(--green);
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 6px 5px;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 3px 0 #111;
            text-shadow: var(--text-shadow-green);
            transition: all 0.1s;
            flex: 1 0 auto;
            min-width: 50px;
        }
        .actions-bar button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #111;
        }
        .actions-bar button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .api-section {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 4px;
            background: rgba(0,0,0,0.4);
            border-radius: 4px;
            font-size: 10px;
            color: #666;
            flex-shrink: 0;
            margin-top: 4px;
        }
        .api-section input {
            flex: 1;
            background: #020200;
            border: 1px solid rgba(255,51,51,0.3);
            color: #aaa;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 4px;
            border-radius: 2px;
        }
        #btnSaveKey {
            background: var(--button-bg);
            border: 1px solid var(--red);
            color: var(--red);
            font-family: 'Press Start 2P';
            font-size: 10px;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 3px;
            box-shadow: 0 2px 0 #300;
        }
        #keyStatus {
            font-size: 10px;
            color: #ff6644;
        }

        .monitor-brand {
            text-align: center;
            font-size: 9px;
            color: #3a3a3a;
            letter-spacing: 2px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .power-led {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--green);
            animation: ledPulse 2s infinite;
        }
        @keyframes ledPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Overlays */
        .break-overlay, .save-modal, .tape-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.88);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 60;
            border-radius: 6px;
            flex-direction: column;
            gap: 12px;
        }
        .break-overlay button, .save-content button, .tape-content button {
            background: var(--button-bg);
            border: 2px solid var(--red);
            color: var(--red);
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 3px 0 #300;
            text-shadow: var(--text-shadow-red);
        }
        .save-content, .tape-content {
            background: #0a0a05;
            border: 2px solid var(--green);
            padding: 16px;
            max-width: 500px;
            width: 90%;
            color: var(--green);
            font-size: 12px;
            font-family: 'Press Start 2P', monospace;
            border-radius: 8px;
        }
        .save-slot, .tape-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(51,255,102,0.2);
        }
        .save-slot button, .tape-item button {
            background: var(--button-bg);
            border: 1px solid var(--green);
            color: var(--green);
            font-family: 'Press Start 2P';
            font-size: 10px;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 3px;
            box-shadow: 0 2px 0 #0a0f06;
        }

        .system-msg { color: #668866; font-size: 20px; }
        .player-cmd { color: var(--red); font-size: 20px; }
        .ai-narration { color: var(--green); font-size: 20px; }
        .caller-dialogue { color: #99ffcc; margin-left: 8px; font-size: 20px; }
        .studio-event { color: #cc6666; font-style: italic; font-size: 20px; }

        @media (orientation: landscape) {
            .crt-monitor {
                max-width: 800px;
                height: 95vh;
            }
        }
    </style>
</head>
<body>
<div class="crt-monitor">
    <div class="monitor-frame">
        <div class="screen-area">
            <div class="screen-glow">
                <div class="scanlines"></div>
                <div class="vignette"></div>
                <div class="screen-content">
                    <!-- Status bar -->
                    <div class="status-bar" id="statusBar">
                        <span><span class="onair-indicator off" id="onAirIndicator">● OFF AIR</span></span>
                        <span id="timeDisplay">12:05 AM</span>
                        <span>RATINGS: <span id="ratingsDisplay">20</span>%</span>
                    </div>

                    <!-- Game output -->
                    <div class="game-output" id="gameOutput">
                        <div class="system-msg">> SYSTEM BOOT... KBOZ TERMINAL READY.</div>
                        <div class="system-msg">> INSERT API KEY BELOW, THEN PRESS 'BEGIN'.</div>
                    </div>

                    <!-- Input area -->
                    <div class="input-area">
                        <span class="prompt-symbol">TALK></span>
                        <input type="text" class="cmd-input" id="cmdInput" placeholder="Type...">
                        <button id="btnSend">SEND</button>
                    </div>

                    <!-- Tabs for lines & contacts -->
                    <div class="tabs-container">
                        <div class="tab-buttons">
                            <button id="tabLinesBtn" class="active">📞 LINES</button>
                            <button id="tabContactsBtn">📇 CONTACTS</button>
                        </div>
                        <div class="tab-content">
                            <div class="tab-panel active" id="linesPanel">
                                <div class="line-board" id="lineBoard"></div>
                            </div>
                            <div class="tab-panel" id="contactsPanel">
                                <div class="contacts-panel" id="contactsInner">
                                    <div id="contactsList"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Action buttons -->
                    <div class="actions-bar" id="actionButtons">
                        <button id="btnBegin" style="display:none;">▶ BEGIN</button>
                        <button id="btnGoOnAir" style="display:none;">🔴 ON AIR</button>
                        <button id="btnOpenLines">🎤 LINES</button>
                        <button id="btnPlayTape">🎵 TAPE</button>
                        <button id="btnNews">📰 NEWS</button>
                        <button id="btnBreak">☕ BREAK</button>
                        <button id="btnReturn" style="display:none;">⬅️ RETURN</button>
                        <button id="btnSignOff">⏹️ OFF</button>
                        <button id="btnSave">💾 SAVE</button>
                        <button id="btnLoad">📂 LOAD</button>
                        <button id="btnRestart">🔄 RESTART</button>
                    </div>

                    <!-- API key section -->
                    <div class="api-section">
                        <label for="apiKeyInput">🔑 KEY:</label>
                        <input type="password" id="apiKeyInput" placeholder="API Key">
                        <button id="btnSaveKey">SAVE</button>
                        <span id="keyStatus">● NO KEY</span>
                    </div>
                </div>
            </div>

            <!-- Overlays -->
            <div class="break-overlay" id="breakOverlay">
                <button id="btnSmoke">🚬 SMOKE</button>
                <button id="btnTalkGus">🔧 TALK TO GUS</button>
                <button id="btnCheckTelex">📰 TELEX</button>
                <button id="btnReturnOverlay">⬅️ RETURN</button>
            </div>
            <div class="save-modal" id="saveModal">
                <div class="save-content">
                    <h3 style="color:var(--red);">💾 SAVE / LOAD</h3>
                    <div id="saveSlotsContainer"></div>
                    <button id="closeSaveModal" style="margin-top:12px;">CLOSE</button>
                </div>
            </div>
            <div class="tape-modal" id="tapeModal">
                <div class="tape-content">
                    <h3 style="color:var(--red);">🎵 TAPE LIBRARY</h3>
                    <div id="tapeListContainer"></div>
                    <button id="btnCreateTape" style="margin-top:8px;">➕ CREATE TAPE</button>
                    <div class="tape-create-form" id="tapeCreateForm" style="display:none; flex-direction:column; gap:6px; margin-top:8px;">
                        <label style="color:var(--red);">Type:</label>
                        <select id="tapeTypeSelect" style="background:#020200; border:1px solid var(--green); color:var(--green); padding:4px; font-family:'Press Start 2P'; font-size:12px;">
                            <option value="unsolved mystery">Unsolved Mystery</option>
                            <option value="alien encounter">Alien Encounter</option>
                            <option value="serial killers">Serial Killers</option>
                            <option value="cryptozoology">Cryptozoology</option>
                            <option value="other">Other</option>
                        </select>
                        <label style="color:var(--red);">Title:</label>
                        <input type="text" id="tapeTitleInput" placeholder="Tape title" style="background:#020200; border:1px solid var(--green); color:var(--green); padding:4px; font-family:'Press Start 2P'; font-size:12px;">
                        <label style="color:var(--red);">Description:</label>
                        <textarea id="tapeDescInput" rows="3" placeholder="Case details..." style="background:#020200; border:1px solid var(--green); color:var(--green); padding:4px; font-family:'Press Start 2P'; font-size:12px; resize:vertical;"></textarea>
                        <button id="btnSubmitTape">💾 SAVE TAPE</button>
                        <button id="btnCancelCreate" style="background:none; border:1px solid var(--red); color:var(--red); margin-top:4px;">CANCEL</button>
                    </div>
                    <button id="closeTapeModal" style="margin-top:8px;">CLOSE</button>
                </div>
            </div>
        </div>
    </div>
    <div class="monitor-brand"><span class="power-led"></span> KBOZ 990</div>
</div>

<script>
    (function() {
        // DOM elements
        const gameOutput = document.getElementById('gameOutput');
        const cmdInput = document.getElementById('cmdInput');
        const btnSend = document.getElementById('btnSend');
        const lineBoard = document.getElementById('lineBoard');
        const contactsPanel = document.getElementById('contactsPanel');
        const contactsList = document.getElementById('contactsList');
        const breakOverlay = document.getElementById('breakOverlay');
        const saveModal = document.getElementById('saveModal');
        const tapeModal = document.getElementById('tapeModal');
        const saveSlotsContainer = document.getElementById('saveSlotsContainer');
        const tapeListContainer = document.getElementById('tapeListContainer');
        const tapeCreateForm = document.getElementById('tapeCreateForm');
        const closeSaveModalBtn = document.getElementById('closeSaveModal');
        const closeTapeModalBtn = document.getElementById('closeTapeModal');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const btnSaveKey = document.getElementById('btnSaveKey');
        const keyStatus = document.getElementById('keyStatus');
        const onAirIndicator = document.getElementById('onAirIndicator');
        const timeDisplay = document.getElementById('timeDisplay');
        const ratingsDisplay = document.getElementById('ratingsDisplay');
        const btnBegin = document.getElementById('btnBegin');
        const btnRestart = document.getElementById('btnRestart');
        const btnGoOnAir = document.getElementById('btnGoOnAir');
        const btnBreak = document.getElementById('btnBreak');
        const btnReturn = document.getElementById('btnReturn');
        const btnReturnOverlay = document.getElementById('btnReturnOverlay');
        const btnPlayTape = document.getElementById('btnPlayTape');

        // Tab switching
        const tabLinesBtn = document.getElementById('tabLinesBtn');
        const tabContactsBtn = document.getElementById('tabContactsBtn');
        const linesPanel = document.getElementById('linesPanel');
        const contactsPanelEl = document.getElementById('contactsPanel');

        tabLinesBtn.addEventListener('click', () => {
            tabLinesBtn.classList.add('active');
            tabContactsBtn.classList.remove('active');
            linesPanel.classList.add('active');
            contactsPanelEl.classList.remove('active');
        });
        tabContactsBtn.addEventListener('click', () => {
            tabContactsBtn.classList.add('active');
            tabLinesBtn.classList.remove('active');
            contactsPanelEl.classList.add('active');
            linesPanel.classList.remove('active');
        });

        // State
        let mistralApiKey = '';
        let gameHistory = [];
        let turnCount = 0;
        let isLoading = false;
        let gameStarted = false;

        let onAir = false;
        let ratings = 20;
        let currentTime = '12:05 AM';
        let lines = [
            { id:1, status:'silent', caller:null },
            { id:2, status:'silent', caller:null },
            { id:3, status:'silent', caller:null }
        ];
        let contacts = [];
        let activeLineId = null;
        let parkingNPC = null;
        let inBreak = false;

        let tapes = [
            { title:'Station ID', duration:'0:10', desc:'Classic KBOZ jingle.', type:'jingle' },
            { title:'Old Gospel Hour', duration:'1:05', desc:'Dusty reel, 1963. Preacher sounds... off.', type:'religious' },
            { title:'Unmarked Tape #3', duration:'?', desc:'Static, then a woman weeping.', type:'mystery' }
        ];
        let telexNews = [];

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playTick() {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'square'; o.frequency.value = 500 + Math.random()*300;
            g.gain.setValueAtTime(0.03, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.02);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime+0.02);
        }

        const SYSTEM_PROMPT = `You are the Game Master for "NIGHT SHIFT," a horror radio talk show inside a small AM station at permanent midnight. The player is the host. You generate caller dialogues, studio events, Gus interactions, parking lot encounters, and telex news.

Respond ONLY with a raw JSON object. The JSON must contain:
- "narration": string (atmospheric, 20-40 words)
- "on_air": boolean (current broadcast state)
- "caller_dialogue": string or null (what the active caller says, if any)
- "caller_name": string (name of current caller)
- "line_updates": array of objects describing changes to phone lines. Each: { line_id:1|2|3, status:"silent"|"ringing"|"active"|"hold"|"disconnected", caller:object or null (with name, location, personality, topic, tone, danger_level) }
- "studio_events": array of strings (subtle creepy things)
- "ratings_change": integer
- "time_advance": integer (minutes)
- "gus_dialogue": string (only when player talks to Gus)
- "telex_story": string (news item, when checking telex)
- "parking_npc": object or null (during smoke break) with name, description, dialogue. This NPC persists for the rest of the break; the player may talk to them.
- "break_over": boolean (set to true if the player has finished the break and should return to the booth)

Special actions:
- ANSWER line X: pick up a ringing line.
- HOLD line X: put caller on hold.
- INTERVIEW line X: keep line active for deep conversation.
- CUT line X: disconnect caller.
- OPEN LINES: make silent lines ring, fill with random callers.
- PLAY TAPE "title" (may include tape details in parentheses): if a tape is played, the show's theme becomes that tape's content. Callers should react to that topic.
- NEWS: read the telex.
- BREAK: leave the booth (the game will present break options).
- SMOKE: parking lot encounter. Generate parking_npc.
- TALK TO GUS: generate gus_dialogue.
- CHECK TELEX: show stored telex stories.
- RETURN TO BOOTH: end break, go back on air (set on_air true).
- SIGN OFF: end the show, set on_air false.
- GO ON AIR: start the show, set on_air true (only initially).
- RING contact [name] (details): the host is calling back a saved contact. Ring a line with that contact as the caller.

The player may also type free-form text to talk to the current caller or parking lot NPC.

Tone: conspiratorial, intimate, slow-burn horror. Callers are vivid and sometimes personal. The station feels alive.`;

        function repairJSON(str) {
            let s = str.replace(/```json\s*|```\s*/gi, '').trim();
            const start = s.indexOf('{'), end = s.lastIndexOf('}');
            if (start === -1 || end === -1) return s;
            s = s.substring(start, end + 1).replace(/,\s*}/g, '}').replace(/,\s*]/g, ']');
            return s;
        }
        function safeParseJSON(raw) {
            try { return JSON.parse(repairJSON(raw)); } catch(e) {
                return { narration: raw.substring(0,200), on_air: false, caller_dialogue: null, caller_name: null, line_updates: [],
                    studio_events: [], ratings_change: 0, time_advance: 2, gus_dialogue:'', telex_story:'',
                    parking_npc: null, break_over: false };
            }
        }

        function updateUI() {
            onAirIndicator.textContent = onAir ? '● ON AIR' : '● OFF AIR';
            onAirIndicator.className = 'onair-indicator' + (onAir ? ' pulse' : ' off');
            timeDisplay.textContent = currentTime;
            ratingsDisplay.textContent = ratings;

            btnGoOnAir.style.display = (!onAir && gameStarted && !inBreak) ? 'inline-block' : 'none';
            btnReturn.style.display = (inBreak && !onAir) ? 'inline-block' : 'none';
            document.getElementById('btnOpenLines').disabled = !onAir || inBreak;
            btnPlayTape.disabled = !onAir || inBreak;
            document.getElementById('btnNews').disabled = !onAir || inBreak;
            btnBreak.disabled = !onAir || inBreak;
            document.getElementById('btnSignOff').disabled = !onAir || inBreak;
        }

        function addContact(caller) {
            if (!caller || !caller.name) return;
            if (contacts.some(c => c.name === caller.name)) {
                addOutput('system', `> ${caller.name} already in contacts.`);
                return;
            }
            contacts.push({...caller});
            renderContacts();
            addOutput('system', `> Added ${caller.name} to contacts.`);
        }
        function removeContact(callerName) {
            contacts = contacts.filter(c => c.name !== callerName);
            renderContacts();
        }
        function ringContact(contact) {
            if (!gameStarted || isLoading) return;
            initAudio();
            const lineStatuses = lines.map(l => `Line ${l.id}: ${l.status}${l.caller ? ' ('+l.caller.name+')' : ''}`).join(', ');
            const cmd = `RING contact ${contact.name} (personality: ${contact.personality || 'unknown'}, location: ${contact.location || 'unknown'}, topic: ${contact.topic || 'general'}, tone: ${contact.tone || 'nervous'}). Current line status: ${lineStatuses}.`;
            sendToAI(cmd);
        }

        function renderLineBoard() {
            let html = '';
            lines.forEach(line => {
                let statusText = line.status.toUpperCase();
                let callerInfo = line.caller ? ` (${line.caller.name})` : '';
                html += `<div class="line-row">
                    <span style="color:var(--red);">L${line.id}</span>
                    <span>${statusText}${callerInfo}</span>
                    <span class="line-btns">`;
                if (line.caller && !contacts.some(c => c.name === line.caller.name)) {
                    html += `<button data-action="add-contact" data-caller-name="${line.caller.name}">ADD</button>`;
                }
                if (line.status === 'ringing') {
                    html += `<button data-action="answer" data-line="${line.id}">ANS</button>`;
                }
                if (line.status === 'active' || line.status === 'ringing') {
                    html += `<button data-action="hold" data-line="${line.id}">HOLD</button>`;
                    html += `<button data-action="interview" data-line="${line.id}">INT</button>`;
                    html += `<button data-action="cut" data-line="${line.id}">CUT</button>`;
                }
                if (line.status === 'hold') {
                    html += `<button data-action="resume" data-line="${line.id}">RES</button>`;
                    html += `<button data-action="cut" data-line="${line.id}">CUT</button>`;
                }
                html += `</span></div>`;
            });
            lineBoard.innerHTML = html;
            lineBoard.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const action = e.currentTarget.dataset.action;
                    if (action === 'add-contact') {
                        const callerName = e.currentTarget.dataset.callerName;
                        const line = lines.find(l => l.caller && l.caller.name === callerName);
                        if (line && line.caller) addContact(line.caller);
                        return;
                    }
                    const lineId = parseInt(e.currentTarget.dataset.line);
                    handleLineAction(action, lineId);
                });
            });
        }

        function renderContacts() {
            contactsList.innerHTML = '';
            if (contacts.length === 0) {
                contactsList.innerHTML = '<div class="contact-item"><span>No contacts saved.</span></div>';
            } else {
                contacts.forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'contact-item';
                    div.innerHTML = `<span>${c.name} (${c.location || '?'})</span>
                        <button class="ring-contact" data-name="${c.name}">RING</button>
                        <button class="remove-contact" data-name="${c.name}">DEL</button>`;
                    contactsList.appendChild(div);
                    div.querySelector('.ring-contact').addEventListener('click', () => ringContact(c));
                    div.querySelector('.remove-contact').addEventListener('click', () => {
                        removeContact(c.name);
                        renderLineBoard();
                    });
                });
            }
        }

        function renderTapeList() {
            tapeListContainer.innerHTML = '';
            tapes.forEach((t, idx) => {
                const div = document.createElement('div');
                div.className = 'tape-item';
                div.innerHTML = `<span>📼 ${t.title} (${t.type || 'other'})</span>
                    <button class="play-tape" data-idx="${idx}">PLAY</button>`;
                tapeListContainer.appendChild(div);
                div.querySelector('.play-tape').addEventListener('click', () => {
                    playTapeByIndex(idx);
                    tapeModal.style.display = 'none';
                });
            });
        }

        function playTapeByIndex(idx) {
            const tape = tapes[idx];
            if (!tape) return;
            let cmd = `PLAY TAPE "${tape.title}"`;
            if (tape.type && tape.type !== 'jingle' && tape.desc) {
                cmd += ` (Tape content: type: ${tape.type}, description: ${tape.desc})`;
            }
            sendToAI(cmd);
        }

        function addOutput(type, text) {
            const div = document.createElement('div');
            switch(type) {
                case 'system': div.className='system-msg'; break;
                case 'player': div.className='player-cmd'; div.textContent = '> ' + text; break;
                case 'narration': div.className='ai-narration'; break;
                case 'caller': div.className='caller-dialogue'; div.textContent = `📞 ${text}`; break;
                case 'studio': div.className='studio-event'; div.textContent = `🎙️ ${text}`; break;
                case 'gus': div.className='ai-narration'; div.textContent = `🔧 Gus: "${text}"`; break;
                case 'telex': div.className='ai-narration'; div.textContent = `📰 ${text}`; break;
                case 'parking': div.className='ai-narration'; div.textContent = `🚬 ${text}`; break;
                default: div.className='ai-narration';
            }
            gameOutput.appendChild(div);
            gameOutput.scrollTop = gameOutput.scrollHeight;
            playTick();
        }

        function handleLineAction(action, lineId) {
            if (!gameStarted || isLoading) return;
            initAudio();
            let command = '';
            switch(action) {
                case 'answer': command = `ANSWER line ${lineId}`; break;
                case 'hold': command = `HOLD line ${lineId}`; break;
                case 'interview':
                    command = `INTERVIEW line ${lineId}`;
                    activeLineId = lineId;
                    break;
                case 'cut': command = `CUT line ${lineId}`; break;
                case 'resume': command = `ANSWER line ${lineId}`; break;
            }
            if (command) sendToAI(command);
        }

        function sendToAI(userMsg) {
            if (!mistralApiKey) { addOutput('system','> NO API KEY.'); return; }
            if (isLoading) return;
            isLoading = true;
            gameHistory.push({ role:'user', content:userMsg });
            addOutput('player', userMsg);
            const think = document.createElement('div'); think.className='system-msg'; think.textContent='> ...'; think.id='think';
            gameOutput.appendChild(think);

            callMistral([{role:'system', content:SYSTEM_PROMPT}, ...gameHistory])
                .then(raw => {
                    const thinkEl = document.getElementById('think'); if(thinkEl) thinkEl.remove();
                    const state = safeParseJSON(raw);
                    gameHistory.push({ role:'assistant', content: JSON.stringify(state) });
                    turnCount++;
                    applyState(state);
                    if (turnCount % 5 === 0) autoSave();
                })
                .catch(err => {
                    const thinkEl = document.getElementById('think'); if(thinkEl) thinkEl.remove();
                    addOutput('system', `> ERROR: ${err.message}`);
                    gameHistory.pop();
                })
                .finally(() => {
                    isLoading = false;
                    updateUI();
                    renderLineBoard();
                    renderContacts();
                });
        }

        function applyState(state) {
            if (state.on_air !== undefined) {
                onAir = state.on_air;
                if (onAir) {
                    inBreak = false;
                    parkingNPC = null;
                }
            }
            if (state.narration) addOutput('narration', state.narration);
            if (state.studio_events) state.studio_events.forEach(e => addOutput('studio', e));
            if (state.caller_dialogue && state.caller_name) {
                addOutput('caller', `${state.caller_name}: "${state.caller_dialogue}"`);
            }
            if (state.line_updates) {
                state.line_updates.forEach(upd => {
                    const line = lines.find(l => l.id === upd.line_id);
                    if (line) {
                        line.status = upd.status;
                        line.caller = upd.caller || null;
                    }
                });
            }
            if (state.ratings_change) ratings = Math.max(0, Math.min(100, ratings + state.ratings_change));
            if (state.time_advance) {
                let [h,m] = currentTime.replace(' AM','').split(':').map(Number);
                m += state.time_advance;
                while (m >= 60) { m -= 60; h++; }
                if (h >= 13) h -= 12;
                currentTime = `${h}:${m.toString().padStart(2,'0')} AM`;
            }
            if (state.gus_dialogue) addOutput('gus', state.gus_dialogue);
            if (state.telex_story) {
                telexNews.push(state.telex_story);
                addOutput('telex', state.telex_story);
            }
            if (state.parking_npc) {
                parkingNPC = state.parking_npc;
                addOutput('parking', `${parkingNPC.name}: "${parkingNPC.dialogue}"`);
            }
            if (state.break_over) {
                inBreak = false;
                onAir = true;
                parkingNPC = null;
            }

            if (activeLineId) {
                const line = lines.find(l => l.id === activeLineId);
                if (!line || (line.status !== 'active' && line.status !== 'hold')) {
                    activeLineId = null;
                }
            }
        }

        async function callMistral(msgs) {
            const resp = await fetch('https://api.mistral.ai/v1/chat/completions', {
                method:'POST',
                headers: {'Content-Type':'application/json', 'Authorization':`Bearer ${mistralApiKey}`},
                body: JSON.stringify({ model:'mistral-large-latest', messages:msgs, temperature:0.9, max_tokens:1200, response_format:{ type:"json_object" } })
            });
            if (!resp.ok) {
                if (resp.status===401) throw new Error('INVALID API KEY');
                if (resp.status===429) throw new Error('RATE LIMITED');
                throw new Error(`API ${resp.status}`);
            }
            const data = await resp.json();
            return data.choices[0].message.content;
        }

        async function beginGame() {
            if (!mistralApiKey) { addOutput('system','> ENTER API KEY.'); return; }
            gameHistory = []; turnCount = 0; ratings = 25; currentTime = '12:05 AM'; onAir = false;
            lines = [{id:1,status:'silent',caller:null},{id:2,status:'silent',caller:null},{id:3,status:'silent',caller:null}];
            contacts = []; telexNews = []; activeLineId = null; parkingNPC = null; inBreak = false;
            gameStarted = true;
            gameOutput.innerHTML = '';
            addOutput('system','> NIGHT SHIFT — KBOZ 990');
            addOutput('system','> The mic is cold. The switchboard hums.');
            btnBegin.style.display = 'none';
            onAir = true;
            updateUI();
            renderContacts();
            sendToAI('GO ON AIR');
        }

        function restartGame() {
            if (isLoading) return;
            gameHistory = []; turnCount = 0; ratings = 0; currentTime = '12:00 AM'; onAir = false;
            lines = [{id:1,status:'silent',caller:null},{id:2,status:'silent',caller:null},{id:3,status:'silent',caller:null}];
            contacts = []; telexNews = []; activeLineId = null; parkingNPC = null; inBreak = false;
            gameStarted = false;
            gameOutput.innerHTML = '';
            addOutput('system','> NIGHT SHIFT — KBOZ 990');
            addOutput('system','> READY. PRESS BEGIN.');
            updateUI();
            renderLineBoard();
            renderContacts();
            btnBegin.style.display = 'inline-block';
        }

        function enterBreak() {
            breakOverlay.style.display = 'flex';
            inBreak = false;
            updateUI();
        }
        function exitBreak() {
            breakOverlay.style.display = 'none';
            updateUI();
        }

        function saveToSlot(slotId, name) {
            const save = { gameHistory, turnCount, gameStarted, onAir, ratings, currentTime, lines, contacts, tapes, telexNews, activeLineId, parkingNPC, inBreak,
                name: name||`Slot ${slotId+1}`, timestamp: new Date().toISOString() };
            localStorage.setItem(`nightshift_slot_${slotId}`, JSON.stringify(save));
        }
        function loadFromSlot(slotId) {
            const d = localStorage.getItem(`nightshift_slot_${slotId}`);
            if (!d) throw new Error('empty');
            const s = JSON.parse(d);
            gameHistory = s.gameHistory; turnCount = s.turnCount; gameStarted = s.gameStarted;
            onAir = s.onAir; ratings = s.ratings; currentTime = s.currentTime; lines = s.lines;
            contacts = s.contacts; tapes = s.tapes; telexNews = s.telexNews; activeLineId = s.activeLineId;
            parkingNPC = s.parkingNPC; inBreak = s.inBreak;
            gameOutput.innerHTML = ''; addOutput('system', `> LOADED: ${s.name}`);
            updateUI();
            renderLineBoard();
            renderContacts();
            renderTapeList();
        }
        function autoSave() { if (gameStarted) saveToSlot(0, 'Autosave'); }
        function refreshSaveSlots() {
            let html = '';
            for (let i=0; i<5; i++) {
                const d = localStorage.getItem(`nightshift_slot_${i}`);
                let name = `Slot ${i+1} (empty)`, turn = '--';
                if (d) { try { const p=JSON.parse(d); name=p.name||`Slot ${i+1}`; turn=`Turn ${p.turnCount||0}`; } catch{} }
                html += `<div class="save-slot"><span>${name} | ${turn}</span>
                    <div>${d?`<button class="loadSlot" data-slot="${i}">LOAD</button><button class="deleteSlot" data-slot="${i}">DEL</button>`:''}
                    <button class="saveSlot" data-slot="${i}">SAVE</button></div></div>`;
            }
            saveSlotsContainer.innerHTML = html;
            saveSlotsContainer.querySelectorAll('.saveSlot').forEach(b => b.addEventListener('click', e => {
                saveToSlot(parseInt(e.target.dataset.slot), `Slot ${parseInt(e.target.dataset.slot)+1}`);
                refreshSaveSlots();
            }));
            saveSlotsContainer.querySelectorAll('.loadSlot').forEach(b => b.addEventListener('click', e => {
                try { loadFromSlot(parseInt(e.target.dataset.slot)); saveModal.style.display='none'; } catch { alert('Corrupt slot'); }
            }));
            saveSlotsContainer.querySelectorAll('.deleteSlot').forEach(b => b.addEventListener('click', e => {
                localStorage.removeItem(`nightshift_slot_${e.target.dataset.slot}`);
                refreshSaveSlots();
            }));
        }

        function showTapeModal() {
            renderTapeList();
            tapeCreateForm.style.display = 'none';
            tapeModal.style.display = 'flex';
        }

        document.getElementById('btnCreateTape').addEventListener('click', () => {
            tapeCreateForm.style.display = 'flex';
        });
        document.getElementById('btnCancelCreate').addEventListener('click', () => {
            tapeCreateForm.style.display = 'none';
            document.getElementById('tapeTitleInput').value = '';
            document.getElementById('tapeDescInput').value = '';
        });
        document.getElementById('btnSubmitTape').addEventListener('click', () => {
            const type = document.getElementById('tapeTypeSelect').value;
            const title = document.getElementById('tapeTitleInput').value.trim();
            const desc = document.getElementById('tapeDescInput').value.trim();
            if (!title) { alert('Title required'); return; }
            tapes.push({ title: `Custom: ${title}`, duration: '?', desc: desc, type: type });
            renderTapeList();
            tapeCreateForm.style.display = 'none';
            document.getElementById('tapeTitleInput').value = '';
            document.getElementById('tapeDescInput').value = '';
        });
        closeTapeModalBtn.addEventListener('click', () => { tapeModal.style.display = 'none'; });

        // Event wiring
        btnGoOnAir.addEventListener('click', () => {
            onAir = true;
            updateUI();
            sendToAI('GO ON AIR');
        });

        document.getElementById('btnOpenLines').addEventListener('click', () => sendToAI('OPEN LINES'));
        btnPlayTape.addEventListener('click', showTapeModal);
        document.getElementById('btnNews').addEventListener('click', () => sendToAI('BROADCAST NEWS'));
        btnBreak.addEventListener('click', () => {
            if (inBreak) return;
            sendToAI('BREAK');
            enterBreak();
        });
        document.getElementById('btnSignOff').addEventListener('click', () => sendToAI('SIGN OFF'));
        document.getElementById('btnSave').addEventListener('click', () => { refreshSaveSlots(); saveModal.style.display='flex'; });
        document.getElementById('btnLoad').addEventListener('click', () => { refreshSaveSlots(); saveModal.style.display='flex'; });
        btnRestart.addEventListener('click', restartGame);
        btnBegin.addEventListener('click', beginGame);
        closeSaveModalBtn.addEventListener('click', () => saveModal.style.display='none');

        // Break overlay
        document.getElementById('btnSmoke').addEventListener('click', () => {
            exitBreak();
            inBreak = true;
            updateUI();
            sendToAI('SMOKE');
        });
        document.getElementById('btnTalkGus').addEventListener('click', () => {
            exitBreak();
            inBreak = true;
            updateUI();
            sendToAI('TALK TO GUS');
        });
        document.getElementById('btnCheckTelex').addEventListener('click', () => {
            exitBreak();
            inBreak = true;
            updateUI();
            sendToAI('CHECK TELEX');
        });
        btnReturnOverlay.addEventListener('click', () => {
            exitBreak();
            inBreak = true;
            updateUI();
            sendToAI('RETURN TO BOOTH');
        });

        btnReturn.addEventListener('click', () => {
            inBreak = false;
            updateUI();
            sendToAI('RETURN TO BOOTH');
        });

        btnSend.addEventListener('click', () => {
            const msg = cmdInput.value.trim();
            if (!msg) return;
            cmdInput.value = '';
            if (!gameStarted) { addOutput('system','> Press BEGIN first.'); return; }
            initAudio();

            let context = '';
            if (activeLineId && onAir && !inBreak) {
                context = `(Talking to caller on line ${activeLineId}) `;
            } else if (parkingNPC && inBreak && !onAir) {
                context = `(Talking to ${parkingNPC.name} in the parking lot) `;
            }
            sendToAI(context + msg);
        });
        cmdInput.addEventListener('keydown', e => { if(e.key==='Enter') btnSend.click(); });

        btnSaveKey.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                mistralApiKey = key;
                localStorage.setItem('nightshift_key', key);
                keyStatus.textContent = '● KEY SET'; keyStatus.style.color = 'var(--green)';
            } else {
                localStorage.removeItem('nightshift_key');
                keyStatus.textContent = '● NO KEY'; keyStatus.style.color = '#ff6644';
            }
        });
        apiKeyInput.addEventListener('keydown', e => { if(e.key==='Enter') btnSaveKey.click(); });

        function init() {
            const savedKey = localStorage.getItem('nightshift_key');
            if (savedKey) {
                mistralApiKey = savedKey;
                apiKeyInput.value = savedKey;
                keyStatus.textContent = '● KEY SET'; keyStatus.style.color = 'var(--green)';
            }
            updateUI();
            renderLineBoard();
            renderContacts();
            btnBegin.style.display = 'inline-block';
            breakOverlay.style.display = 'none';
            saveModal.style.display = 'none';
            tapeModal.style.display = 'none';
        }
        init();
    })();
</script>
</body>
