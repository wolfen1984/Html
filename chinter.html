<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>THE INTERROGATION · 1985</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Special+Elite&family=Oswald:wght@400;700&family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --screen-bg: #030303;
            --panel-bg: #050505;
            --text: #d0d0d0;
            --text-dim: #555555;
            --text-bright: #ffffff;
            --accent: #ffffff;
            --accent-dim: #3a3a3a;
            --border: #444444;
            --border-glow: 0 0 14px #ffffff33, 0 0 32px #ffffff11;
            --danger: #ffffff;
            --danger-glow: 0 0 12px #ffffff33;
            --amber: #888888;
            --amber-dim: #333333;
            --gold: #aaaaaa;
            --gold-dim: #2a2a2a;
            --green: #5a8a5a;
            --input-bg: #0a0a0a;
            --button-bg: #0d0d0d;
            --button-hover: #1a1a1a;
            --button-active: #111111;
            --bevel-light: #2a2a2a;
            --bevel-dark: #000000;
            --font-display: 'Oswald', 'Special Elite', sans-serif;
            --font-title: 'Oswald', 'Special Elite', sans-serif;
            --font-mono: 'Roboto Mono', 'Share Tech Mono', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.03;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 32px;
            --btn-min-height: 46px;
            --touch-target: 44px;
            --neon-white: 0 0 8px #ffffff88, 0 0 20px #ffffff33, 0 0 40px #ffffff18;
            --neon-white-strong: 0 0 12px #ffffffaa, 0 0 30px #ffffff55, 0 0 60px #ffffff22;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #0a0a0a;
            border-radius: 6px;
            padding: 8px;
            box-shadow: inset 0 0 0 2px #1a1a1a, 0 0 0 3px #0d0d0d, 0 0 0 6px #050505, 0 6px 40px #000000dd, 0 0 40px #ffffff08;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 2px;
                max-height: 100vh;
                box-shadow: none;
                background: #020202;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 16px;
            right: 20px;
            width: 7px;
            height: 7px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffffff99, 0 0 22px #ffffff44, 0 0 40px #ffffff18;
            animation: powerGlow 3s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 10px #ffffff99, 0 0 22px #ffffff44;
            }
            50% {
                box-shadow: 0 0 18px #ffffffcc, 0 0 36px #ffffff66, 0 0 50px #ffffff22;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 13px;
            left: 18px;
            font-family: var(--font-mono);
            font-size: 8px;
            color: #444444;
            letter-spacing: 3px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 2px;
            border: 2px solid #333333;
            box-shadow: var(--border-glow), inset 0 0 80px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 1px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.7), inset 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 35%, rgba(0, 0, 0, 0.65) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 10s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.2%,
            100% {
                opacity: 1;
            }
            99.3% {
                opacity: 0.6;
            }
            99.4% {
                opacity: 0.9;
            }
            99.5% {
                opacity: 0.45;
            }
            99.6% {
                opacity: 1;
            }
        }
        .fluorescent-flicker {
            animation: fluoFlicker 7s ease-in-out infinite;
        }
        @keyframes fluoFlicker {
            0%,
            98%,
            100% {
                opacity: 1;
            }
            98.2% {
                opacity: 0.7;
            }
            98.4% {
                opacity: 0.95;
            }
            98.6% {
                opacity: 0.5;
            }
            98.8% {
                opacity: 0.85;
            }
            99% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #020202;
            border-bottom: 2px solid #444444;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 3px;
            box-shadow: 0 2px 16px #000000aa, inset 0 1px 0 #111111;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #555555;
            border-radius: 2px;
            padding: 10px 14px;
            background: #030303;
            position: relative;
            box-shadow: inset 0 0 30px #ffffff06;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #ffffff;
            box-shadow: var(--neon-white);
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #88888844;
            box-shadow: 0 0 6px #ffffff22;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #ffffff;
            text-shadow: var(--neon-white-strong), 0 2px 4px #000;
            letter-spacing: 4px;
            font-family: var(--font-title);
            line-height: 1.2;
            font-weight: 700;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 10px;
            color: #777777;
            letter-spacing: 6px;
            margin-top: 3px;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 22px;
                letter-spacing: 2px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #222222 #030303;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #030303;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #222222;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #2a2a2a;
            border-top-color: #3a3a3a;
            border-left-color: #333333;
            border-right-color: #1a1a1a;
            border-bottom-color: #111111;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #1a1a1a;
            border-left-color: #1a1a1a;
            border-bottom-color: #3a3a3a;
            border-right-color: #333333;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #0a0a0a;
        }
        .btn.accent {
            background: #0a0a0a;
            border-color: #555555;
            border-top-color: #777777;
            border-left-color: #666666;
            border-right-color: #333333;
            border-bottom-color: #1a1a1a;
            color: #ffffff;
            box-shadow: 0 2px 0 #00000044, var(--neon-white);
        }
        .btn.accent:active {
            border-top-color: #333333;
            border-left-color: #333333;
            border-bottom-color: #777777;
            border-right-color: #666666;
            box-shadow: 0 0px 0 #00000044, var(--neon-white-strong);
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .theater-mask {
            position: relative;
            background: #060606;
            border: 2px solid #44444466;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.85);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #040404;
            border: 2px solid #555555;
            padding: 15px;
            border-radius: 3px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #666666;
            box-shadow: 0 0 22px #ffffff33, 0 0 0 2px #111111;
            object-fit: cover;
            flex-shrink: 0;
            background: #080808;
            filter: grayscale(30%) contrast(1.1);
        }
        .speech-bubble {
            flex: 1;
            background: #0a0a0a;
            border: 2px solid #555555;
            border-radius: 4px;
            padding: 12px;
            position: relative;
            color: #d8d8d8;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #55555588 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #060606;
            border: 1px solid #333333;
            display: none;
            filter: grayscale(20%) contrast(1.05);
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #0d0d0d;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555555;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #555555;
            box-shadow: 0 0 20px #ffffff22, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #060606;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.8) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 13px;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: var(--neon-white-strong), 0 2px 4px #000000;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom,
                    rgba(2, 2, 2, 0.9) 0%,
                    rgba(2, 2, 2, 0.7) 40%,
                    transparent 100%);
            padding: 6px 12px 10px;
            font-weight: 700;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 15px;
            letter-spacing: 2px;
            color: #e0e0e0;
            text-shadow: 0 0 8px #ffffff66, 0 0 20px #ffffff22, 0 2px 4px #000000;
            background: linear-gradient(to top,
                    rgba(2, 2, 2, 0.9) 0%,
                    rgba(2, 2, 2, 0.6) 50%,
                    transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555555;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 10px;
                letter-spacing: 3px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 12px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #444444;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #cccccc;
            letter-spacing: 3px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: var(--neon-white);
            font-weight: 400;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #080808;
            border: 1px solid #3a3a3a;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #999999;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #cccccc;
        }
        .guide-desc {
            font-size: 15px;
            color: #555555;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0a0a0a;
            border-radius: 4px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #555555;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #c0c0c0;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #0d0d0d;
            border: 2px solid #55555588;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #c0c0c0;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #ffffff;
            box-shadow: var(--neon-white);
        }
        .loading-text {
            color: #888888;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #020202;
            border-top: 1px solid #33333344;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 10px;
            color: #3a3a3a;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #4a4a4a;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #1a1a1a;
            color: #4a4a4a;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #444444;
            color: #777777;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #d8d8d8;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">THE INTERROGATION · CH.11</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker fluorescent-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE<br>INTERROGATION</div>
                    <div class="marquee-sub">⏤ 1985 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channel3Panel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🔍 THE INTERROGATION · CLASSIFIED FILES</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('interrogation_channel_key') || '';

            const DEFAULT_STATE = {
                ch3Episodes: [],
                nocturnePerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>📁 The Archivist</h2>
        <p style="text-align:left;">
            <strong>Designation:</strong> <em>CLASSIFIED — Archive Keeper, Bureau of Declassified Warfare</em><br>
            <strong>Background:</strong> A former military intelligence analyst who spent decades sifting through the forgotten transcripts of war. Now, in a windowless archive buried beneath a nondescript government building, he opens the files no one was meant to read. His voice is calm, measured—the voice of a man who has seen too many truths redacted, too many secrets buried. Every episode, he pulls another folder from the steel cabinet, blows off the dust, and reads.
        </p>
    `;

            // ── SOUND ENGINE (Web Audio API) ──
            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let crossfadeTimeout = null;

            const SECTION_THEMES = {
                briefing: { root: 55, fifth: 82.5, filterStart: 350, filterEnd: 280, lfoFreq: 0.08,
                intensity: 0.28 },
                entrance: { root: 55, fifth: 82.5, filterStart: 450, filterEnd: 220, lfoFreq: 0.13,
                intensity: 0.32 },
                questioning: { root: 55, fifth: 83.4, filterStart: 550, filterEnd: 190, lfoFreq: 0.18,
                    intensity: 0.38 },
                pressure: { root: 55, fifth: 84, filterStart: 650, filterEnd: 160, lfoFreq: 0.22,
                intensity: 0.48 },
                revelation: { root: 55, fifth: 88, filterStart: 850, filterEnd: 130, lfoFreq: 0.28,
                    intensity: 0.58 },
                resolution: { root: 55, fifth: 82.5, filterStart: 280, filterEnd: 210, lfoFreq: 0.09,
                    intensity: 0.22 }
            };

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.18;
                    reverbNode.connect(masterGain);
                    masterGain.connect(audioCtx.destination);
                    const compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.value = -24;
                    compressor.knee.value = 30;
                    compressor.ratio.value = 12;
                    compressor.attack.value = 0.003;
                    compressor.release.value = 0.25;
                    masterGain.connect(compressor);
                    compressor.connect(audioCtx.destination);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 1.0;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.35;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                    reverbNode.connect(masterGain);
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 2.5;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.5));
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            function createSynthPad(ctx, frequency, duration, intensity = 0.6) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.16, now + 0.7);
                gainNode.gain.setValueAtTime(intensity * 0.16, now + duration - 1.2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.3);
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.004;
                const osc3 = ctx.createOscillator();
                osc3.type = 'triangle';
                osc3.frequency.value = frequency * 0.996;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 900;
                filter.Q.value = 1.8;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.15 + Math.random() * 0.25;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 180 + Math.random() * 220;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);
                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            function createSting(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.18, now + 0.04);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.6);
                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(130, now);
                osc.frequency.exponentialRampToValueAtTime(480, now + 0.25);
                osc.frequency.exponentialRampToValueAtTime(90, now + 1.3);
                const osc2 = ctx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(280, now);
                osc2.frequency.exponentialRampToValueAtTime(950, now + 0.25);
                osc2.frequency.exponentialRampToValueAtTime(180, now + 1.3);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 900;
                filter.Q.value = 0.9;
                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);
                osc.start(now);
                osc2.start(now);
                osc.stop(now + 1.6);
                osc2.stop(now + 1.6);
            }

            function createClimax(ctx, intensity = 0.8) {
                const now = ctx.currentTime;
                const duration = 8 + Math.random() * 6;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.45, now + 2.5);
                gainNode.gain.setValueAtTime(intensity * 0.55, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(100, now);
                osc1.frequency.exponentialRampToValueAtTime(200, now + duration * 0.55);
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(200, now);
                osc2.frequency.exponentialRampToValueAtTime(400, now + duration * 0.55);
                const osc3 = ctx.createOscillator();
                osc3.type = 'square';
                osc3.frequency.setValueAtTime(100, now);
                osc3.frequency.exponentialRampToValueAtTime(310, now + duration * 0.75);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(280, now);
                filter.frequency.exponentialRampToValueAtTime(1100, now + duration);
                filter.Q.value = 1.8;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.12;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 180;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);
                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            // ── 80s Film Score Drum Functions ──
            function create80sKick(ctx, time) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(140, time);
                osc.frequency.exponentialRampToValueAtTime(28, time + 0.07);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.015, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.002));
                }
                const click = ctx.createBufferSource();
                click.buffer = noiseBuffer;
                const clickFilter = ctx.createBiquadFilter();
                clickFilter.type = 'highpass';
                clickFilter.frequency.value = 2500;
                click.connect(clickFilter);
                const gainClick = ctx.createGain();
                gainClick.gain.setValueAtTime(0.4, time);
                gainClick.gain.exponentialRampToValueAtTime(0.001, time + 0.015);
                clickFilter.connect(gainClick);
                const gainBody = ctx.createGain();
                gainBody.gain.setValueAtTime(0.65, time);
                gainBody.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
                osc.connect(gainBody);
                gainBody.connect(dryGain);
                gainClick.connect(dryGain);
                const wetKick = ctx.createGain();
                wetKick.gain.value = 0.15;
                gainBody.connect(wetKick);
                wetKick.connect(wetGain);
                osc.start(time);
                click.start(time);
                osc.stop(time + 0.18);
                click.stop(time + 0.015);
            }

            function create80sSnare(ctx, time) {
                const body = ctx.createOscillator();
                body.type = 'triangle';
                body.frequency.setValueAtTime(190, time);
                body.frequency.exponentialRampToValueAtTime(70, time + 0.07);
                const bodyGain = ctx.createGain();
                bodyGain.gain.setValueAtTime(0.5, time);
                bodyGain.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
                body.connect(bodyGain);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.18, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.04));
                }
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1400;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.6, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.14);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                bodyGain.connect(dryGain);
                noiseGain.connect(dryGain);
                const wetSnare = ctx.createGain();
                wetSnare.gain.value = 0.25;
                noiseGain.connect(wetSnare);
                wetSnare.connect(wetGain);
                body.start(time);
                noise.start(time);
                body.stop(time + 0.12);
                noise.stop(time + 0.18);
            }

            function create80sHihat(ctx, time, open = false) {
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * (open ? 0.25 : 0.06), ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * (open ? 0.08 : 0.008)));
                }
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = open ? 4000 : 7000;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(open ? 0.35 : 0.25, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + (open ? 0.25 : 0.06));
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(dryGain);
                const wetHh = ctx.createGain();
                wetHh.gain.value = 0.08;
                gain.connect(wetHh);
                wetHh.connect(wetGain);
                noise.start(time);
                noise.stop(time + (open ? 0.25 : 0.06));
            }

            function create80sNote(ctx, frequency, startTime, duration, gainValue, type = 'sawtooth') {
                const now = startTime;
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.006;
                const sub = ctx.createOscillator();
                sub.type = 'triangle';
                sub.frequency.value = frequency / 2;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                filter.Q.value = 1.2;
                const filterEnv = ctx.createGain();
                filterEnv.gain.setValueAtTime(700, now);
                filterEnv.gain.exponentialRampToValueAtTime(180, now + 0.12);
                filterEnv.gain.exponentialRampToValueAtTime(60, now + duration * 0.7);
                filterEnv.connect(filter.frequency);
                const mainGain = ctx.createGain();
                mainGain.gain.setValueAtTime(0, now);
                mainGain.gain.linearRampToValueAtTime(gainValue * 0.28, now + 0.03);
                mainGain.gain.setValueAtTime(gainValue * 0.28, now + duration * 0.5);
                mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.12);
                osc1.connect(filter);
                osc2.connect(filter);
                sub.connect(filter);
                filter.connect(mainGain);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.75;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.35;
                mainGain.connect(drySend);
                mainGain.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);
                osc1.start(now);
                osc2.start(now);
                sub.start(now);
                osc1.stop(now + duration + 0.2);
                osc2.stop(now + duration + 0.2);
                sub.stop(now + duration + 0.2);
            }

            // ── 80s Film Score Patterns ──
            const SCORE_PATTERNS = {
                briefing: {
                    bpm: 55,
                    bass: [0, 0, 5, 5, 0, 0, 7, 7],
                    arp: [12, 16, 12, 19, 12, 16, 12, 19],
                    kick: [1, 0, 0, 0, 1, 0, 0, 0],
                    snare: [0, 0, 0, 1, 0, 0, 0, 1],
                    hihat: [1, 0, 1, 0, 1, 0, 1, 0]
                },
                entrance: {
                    bpm: 62,
                    bass: [0, 7, 5, 3, 0, 7, 5, 3],
                    arp: [12, 15, 19, 15, 12, 15, 19, 15],
                    kick: [1, 0, 1, 0, 1, 0, 1, 0],
                    snare: [0, 0, 0, 1, 0, 0, 0, 1],
                    hihat: [1, 0, 1, 1, 1, 0, 1, 1]
                },
                questioning: {
                    bpm: 68,
                    bass: [0, 3, 5, 7, 8, 7, 5, 3],
                    arp: [12, 15, 19, 22, 24, 22, 19, 15],
                    kick: [1, 0, 1, 1, 1, 0, 1, 0],
                    snare: [0, 0, 1, 0, 0, 0, 1, 0],
                    hihat: [1, 1, 1, 1, 1, 1, 1, 1]
                },
                pressure: {
                    bpm: 74,
                    bass: [0, 7, 0, 7, 3, 7, 3, 7],
                    arp: [12, 19, 15, 19, 12, 19, 15, 19],
                    kick: [1, 1, 1, 1, 1, 1, 1, 1],
                    snare: [0, 1, 0, 1, 0, 1, 0, 1],
                    hihat: [1, 1, 1, 1, 1, 1, 1, 1]
                },
                revelation: {
                    bpm: 78,
                    bass: [0, 3, 6, 8, 0, 3, 6, 8],
                    arp: [12, 16, 20, 24, 12, 16, 20, 24],
                    kick: [1, 0, 1, 0, 1, 0, 1, 0],
                    snare: [1, 1, 1, 1, 1, 1, 1, 1],
                    hihat: [1, 1, 1, 1, 1, 1, 1, 1]
                },
                resolution: {
                    bpm: 50,
                    bass: [0, 7, 5, 0, 7, 5, 0, 7],
                    arp: [12, 15, 12, 19, 12, 15, 12, 19],
                    kick: [1, 0, 0, 0, 1, 0, 0, 0],
                    snare: [0, 0, 0, 1, 0, 0, 0, 1],
                    hihat: [1, 0, 1, 0, 1, 0, 1, 0]
                }
            };

            function startSectionScore(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                const perf = gameState.nocturnePerformance;
                let customScore = null;
                if (perf && perf.soundCues && perf.soundCues.score) {
                    customScore = perf.soundCues.score;
                }
                const fallbackTheme = SCORE_PATTERNS[themeName] || SCORE_PATTERNS.briefing;
                const theme = (customScore && customScore[themeName]) ? customScore[themeName] : fallbackTheme;
                const rootFreq = 55;
                const beatDuration = 60 / theme.bpm;
                const patternLength = theme.bass.length;
                const ctx = audioCtx;
                let step = 0;
                let nextStepTime = ctx.currentTime;
                let timeoutId;
                const padGain = ctx.createGain();
                padGain.gain.value = 0.08;
                const padOsc1 = ctx.createOscillator();
                padOsc1.type = 'sawtooth';
                padOsc1.frequency.value = rootFreq;
                const padOsc2 = ctx.createOscillator();
                padOsc2.type = 'sawtooth';
                padOsc2.frequency.value = rootFreq * 1.501;
                const padOsc3 = ctx.createOscillator();
                padOsc3.type = 'triangle';
                padOsc3.frequency.value = rootFreq / 2;
                const padFilter = ctx.createBiquadFilter();
                padFilter.type = 'lowpass';
                padFilter.frequency.value = 350;
                padFilter.Q.value = 0.8;
                padOsc1.connect(padFilter);
                padOsc2.connect(padFilter);
                padOsc3.connect(padFilter);
                padFilter.connect(padGain);
                const padDry = ctx.createGain();
                padDry.gain.value = 0.5;
                const padWet = ctx.createGain();
                padWet.gain.value = 0.35;
                padGain.connect(padDry);
                padGain.connect(padWet);
                padDry.connect(dryGain);
                padWet.connect(wetGain);
                padOsc1.start();
                padOsc2.start();
                padOsc3.start();
                const stopSources = [padOsc1, padOsc2, padOsc3];

                function scheduleStep() {
                    if (!sectionAmbientActive) return;
                    const now = nextStepTime;
                    const bassSemitone = theme.bass[step % patternLength];
                    const bassFreq = rootFreq * Math.pow(2, bassSemitone / 12);
                    create80sNote(ctx, bassFreq, now, beatDuration * 0.85, 0.7, 'sawtooth');
                    const arpSemitone = theme.arp[step % patternLength];
                    const arpFreq = rootFreq * Math.pow(2, arpSemitone / 12);
                    create80sNote(ctx, arpFreq, now, beatDuration * 0.45, 0.5, 'square');
                    if (theme.kick[step % patternLength]) create80sKick(ctx, now);
                    if (theme.snare[step % patternLength]) create80sSnare(ctx, now);
                    if (theme.hihat && theme.hihat[step % patternLength]) create80sHihat(ctx, now);
                    step++;
                    nextStepTime += beatDuration;
                    timeoutId = setTimeout(scheduleStep, Math.max(10, (nextStepTime - ctx.currentTime) * 1000));
                }
                nextStepTime = ctx.currentTime + 0.06;
                timeoutId = setTimeout(scheduleStep, 60);
                sectionAmbientActive = {
                    stop: () => {
                        clearTimeout(timeoutId);
                        padGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.25);
                        stopSources.forEach(s => { try { s.stop(ctx.currentTime + 0.3); } catch (e) {} });
                        sectionAmbientActive = null;
                    }
                };
            }
            const transitionSectionTheme = startSectionScore;

            function stopSectionAmbient() {
                if (sectionAmbientActive) {
                    sectionAmbientActive.stop();
                    sectionAmbientActive = null;
                }
                clearTimeout(crossfadeTimeout);
            }

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    switch (type) {
                        case 'pad':
                            const freq = 110 + Math.random() * 40;
                            createSynthPad(ctx, freq, 20 + Math.random() * 20, gainValue);
                            break;
                        case 'sting':
                            createSting(ctx, gainValue);
                            break;
                        case 'heartbeat':
                            playThump(ctx, now, 0.8 * gainValue);
                            setTimeout(() => playThump(ctx, now + 0.15, 0.8 * gainValue), 150);
                            break;
                        case 'thunder':
                            const bufferSize = ctx.sampleRate * 0.5;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.3));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(gainValue * 0.5, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 150;
                            filter.Q.value = 0.5;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(now);
                            source.stop(now + 0.8);
                            break;
                        case 'bell':
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 80 + Math.random() * 30;
                            const g = ctx.createGain();
                            g.gain.setValueAtTime(0, now);
                            g.gain.linearRampToValueAtTime(gainValue * 0.35, now + 0.1);
                            g.gain.exponentialRampToValueAtTime(0.001, now + 3);
                            const f = ctx.createBiquadFilter();
                            f.type = 'lowpass';
                            f.frequency.value = 500;
                            osc.connect(f);
                            f.connect(g);
                            g.connect(ctx.destination);
                            osc.start(now);
                            osc.stop(now + 3);
                            break;
                        case 'climax':
                            createClimax(ctx, gainValue);
                            break;
                        default:
                            console.warn(`Unknown sound type: ${type}`);
                    }
                } catch (err) {
                    console.error(`Error in playSound("${type}"):`, err);
                }
            }

            function playThump(ctx, time, intensity) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(60, time);
                osc.frequency.exponentialRampToValueAtTime(30, time + 0.1);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.7, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(time);
                osc.stop(time + 0.1);
            }

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(gainValue * 0.25, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'ambient_drone' || type === 'wind_howl') {
                        const bufferSize = ctx.sampleRate * 1;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.5;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'ambient_drone' ? 180 : 550;
                        filter.Q.value = 0.5;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'ambient_drone' ? 75 : 110;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.18 * gainValue;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 95;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) {
                    console.error(`Error in playAmbient("${type}"):`, err);
                }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 300);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 25000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' +
                                apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`);
                    }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') {
                        throw new Error('Request timed out. Please try again.');
                    }
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', stark interrogation room, 1940s wartime, harsh overhead light, cinematic, grainy film, high contrast black and white')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e;
                        await new Promise(r => setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else { clearInterval(timer);
                            resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                    'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                ];
                let voice = null;
                for (const name of maleNames) {
                    voice = voices.find(v => v.name.includes(name));
                    if (voice) break;
                }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.6;
                utterance.pitch = 0.88;
                speechSynthesis.speak(utterance);
            }

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) {
                        voice = voices.find(v => v.name.includes(name));
                        if (voice) break;
                    }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[
                        0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.6;
                    utterance.pitch = voiceConfig.pitch || 0.88;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) {
                            currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar);
                            if (cueChecker) cueChecker(currentChar);
                        }
                    };
                    utterance.onend = () => {
                        element.textContent = text;
                        if (cueChecker) cueChecker(text.length);
                        resolve();
                    };
                    utterance.onerror = (e) => {
                        console.warn('TTS error:', e);
                        element.textContent = text;
                        resolve();
                    };
                    speechSynthesis.speak(utterance);
                });
            }

            async function generateNewNocturneStory() {
                const system =
                    `You are The Archivist, narrator of THE INTERROGATION. You present declassified WWII interrogation transcripts as stark, brutal dramas. Your tone is measured, clinical, but haunted by what you've read. No supernatural elements—only human cruelty, moral compromise, and the weight of impossible choices.`;
                const prompt =
                    `Write a 500-750 word short story in the form of a declassified interrogation transcript set in 1940-1945. One room. Two people. One interrogator, one prisoner. Strict rules: NO supernatural elements—no ghosts, curses, magic, or dreams. The horror must be purely human: moral dilemmas, psychological pressure, brutal choices. Follow this structure: Act I - Capture (how they arrived), Act II - The Game (the chess match of questioning, unexpected similarities emerge), Act III - Pressure (outside forces intrude—deadlines, approaching bombers, collapsing fronts), Act IV - Revelation (something changes everything—the prisoner was telling the truth, the interrogator has the wrong person, the intelligence is obsolete, the 'spy' is actually one of their own), Act V - The Choice (a moral decision with real stakes), Act VI - The Consequence (the ending grows naturally from the choice—execution, guilt, escape, arrest of the interrogator by their own side). The audience must never be sure who truly holds the power. Frame the story with The Archivist's clinical intro and a cold, haunted closing remark. Return ONLY a valid JSON object with these fields: title (string), story (full narration string, use backslash n for line breaks), closing_remark (the final punchline). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user',
                    content: prompt }], 2000, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) {
                    throw new Error('Invalid story structure.');
                }
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Stark photograph of an interrogation room, 1940s wartime, single bare light bulb, two figures at a table, high contrast black and white, grainy, cinematic, titled "${story.title}"`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate image:', e); }
                gameState.nocturnePerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system = `You are a sound designer for an 80s-style film score for a WWII interrogation drama.
Given a story, return a JSON object with THREE keys:
- "sections": an array of 5-6 sections dividing the story into emotional acts. Each section must have: "theme" (one of: briefing, entrance, questioning, pressure, revelation, resolution), "start_char" (inclusive) and "end_char" (exclusive). Sections must cover the entire story from 0 to ${length}.
- "cues": an array of sound events using only these types: "sting", "heartbeat", "thunder", "bell", "climax". No "pad" type. Each cue must have "position" (character index), "type", optional "intensity" (0-1). Include at least 40 cues, spread evenly.
- "score": an object with keys matching the same theme names. Each key must contain: "bpm" (integer 50-80), "bass" (array of 8 semitone intervals from root 0), "arp" (array of 8 semitone intervals), "kick" (array of 8 numbers, 1=hit, 0=rest), "snare" (same as kick), "hihat" (same). Make the music tense and fitting—briefing sparse and slow, pressure fast and driving, revelation dissonant, resolution melancholy. Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and score patterns.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user',
                    content: userPrompt }], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try {
                    data = JSON.parse(cleaned);
                } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try { data = JSON.parse(candidate); } catch (e2) { throw new Error(
                                'Failed to parse AI soundtrack JSON.'); }
                    } else { throw new Error('No JSON found in AI response.'); }
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !==
                    'object') {
                    throw new Error('Missing sections, cues, or score in AI response');
                }
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char <
                    length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({ type: c.type, position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7 }));
                const requiredThemes = ['briefing', 'entrance', 'questioning', 'pressure', 'revelation',
                    'resolution'
                ];
                const score = {};
                for (const theme of requiredThemes) {
                    if (data.score[theme]) {
                        score[theme] = {
                            bpm: data.score[theme].bpm || 65,
                            bass: data.score[theme].bass || [0, 0, 7, 7, 0, 0, 7, 7],
                            arp: data.score[theme].arp || [12, 15, 12, 19, 12, 15, 12, 19],
                            kick: data.score[theme].kick || [1, 0, 1, 0, 1, 0, 1, 0],
                            snare: data.score[theme].snare || [0, 0, 0, 1, 0, 0, 0, 1],
                            hihat: data.score[theme].hihat || [1, 0, 1, 0, 1, 0, 1, 0]
                        };
                    } else {
                        score[theme] = { bpm: 65, bass: [0, 0, 7, 7, 0, 0, 7, 7], arp: [12, 15, 12, 19, 12,
                                15, 12, 19
                            ], kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1],
                            hihat: [1, 0, 1, 0, 1, 0, 1, 0] };
                    }
                }
                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {
                await generateNewNocturneStory();
                if (!gameState.nocturnePerformance) throw new Error('Failed to generate story');
                const soundtrack = await generateSoundCueSheet(gameState.nocturnePerformance.rawStoryText);
                gameState.nocturnePerformance.soundCues = soundtrack;
