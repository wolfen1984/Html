<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        /* ─── THE INTERROGATION · 1985 ─── */

        .tv-guide { margin-top:15px; border-top:2px solid #444444; padding-top:10px; }

        .guide-entry { display:flex; justify-content:space-between; align-items:center; background:#080808; border:1px solid #3a3a3a; padding:10px; margin-bottom:6px; border-radius:3px; gap:8px; flex-wrap:wrap; }

        .modal-btn { background:#0d0d0d; border:2px solid #55555588; padding:10px 18px; border-radius:3px; margin:5px; cursor:pointer; color:#c0c0c0; font-family:var(--font-body); font-size:var(--text-size-base); letter-spacing:1px; min-height:var(--btn-min-height); }

        .footer-strip { display:flex; justify-content:space-between; align-items:center; padding:6px 12px; background:#020202; border-top:1px solid #33333344; z-index:10; font-family:var(--font-mono); font-size:10px; color:#3a3a3a; flex-shrink:0; }
        .footer-strip span { color:#4a4a4a; letter-spacing:0.5px; }
        .footer-strip button { background:none; border:1px solid #1a1a1a; color:#4a4a4a; font-size:10px; cursor:pointer; padding:4px 8px; border-radius:2px; font-family:var(--font-mono); }
        .footer-strip button:hover { border-color:#444444; color:#777777; }
        .typewriter-cursor { display:inline-block; width:2px; height:1.2em; background:#d8d8d8; margin-left:2px; animation:blink 0.8s step-end infinite; vertical-align:text-bottom; }

        .score-indicator {
            font-family:var(--font-mono); font-size:10px; color:#8899aa; letter-spacing:1px;

<body>
    <div class="monitor-bezel">
        <div class="brand-label">THE INTERROGATION · CH.11</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker fluorescent-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE<br>INTERROGATION</div>
                    <div class="marquee-sub">⏤ 1985 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channel3Panel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🔍 THE INTERROGATION · CLASSIFIED FILES · NOIR SCORE</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
    (function() {
        const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
        const MODEL = 'mistral-small-latest';
        let apiKey = localStorage.getItem('interrogation_channel_key') || '';

        const DEFAULT_STATE = {
            ch3Episodes: [],
            nocturnePerformance: null,
            imageCooldownUntil: 0,
        };
        let gameState = { ...DEFAULT_STATE };

        const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;', "'":'&#39;', '"':'&quot;' })[m]);

        const HOST_BIO = `
        <h2>📁 The Archivist</h2>
        <p style="text-align:left;">
            <strong>Designation:</strong> <em>CLASSIFIED — Archive Keeper, Bureau of Declassified Warfare</em><br>
            <strong>Background:</strong> A former military intelligence analyst who spent decades sifting through the forgotten transcripts of war. Now, in a windowless archive buried beneath a nondescript government building, he opens the files no one was meant to read. His voice is calm, measured—the voice of a man who has seen too many truths redacted, too many secrets buried. Every episode, he pulls another folder from the steel cabinet, blows off the dust, and reads.
        </p>
        `;

        // ─── AUDIO ENGINE — FILM NOIR / HITCHCOCK STYLE ──────────────
        let audioCtx = null;
        let ambientSource = null, ambientGain = null, ambientTimeout = null;
        let keepAliveNode = null;
        let reverbNode = null, masterGain = null, dryGain = null, wetGain = null;
        let sectionAmbientActive = null, stringAmbientActive = null;
        let crossfadeTimeout = null, tapeWarbleNode = null, masterCompressor = null;

        let patternPlayerActive = null, patternPlayerTimeout = null;
        let patternStep = 0, patternBPM = 50;
        let currentSectionPatterns = [];
        let currentVariationIdx = 0, barsInVariation = 0;
        let fillActive = false;
        let sectionThemeScore = null;

        function expandPattern(arr) {
            if (!Array.isArray(arr)) {
                console.warn('expandPattern received non-array, using zeros');
                arr = [0,0,0,0,0,0,0,0];
            }
            arr = arr.map(x => typeof x === 'number' ? x : 0);
            return arr.flatMap(x => [x, x]);
        }

        function createKeepAlive(ctx) {
            if (keepAliveNode) return;
            const osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = 30;
            const gain = ctx.createGain();
            gain.gain.value = 0.0005;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(0);
            keepAliveNode = { source: osc, gain };
        }

        function ensureAudioNodes(ctx) {
            if (!masterGain) {
                masterGain = ctx.createGain();
                masterGain.gain.value = 0.20; // slightly lower for orchestral
                masterCompressor = ctx.createDynamicsCompressor();
                masterCompressor.threshold.value = -28;
                masterCompressor.knee.value = 24;
                masterCompressor.ratio.value = 8;
                masterCompressor.attack.value = 0.005;
                masterCompressor.release.value = 0.4;
                masterGain.connect(masterCompressor);
                masterCompressor.connect(ctx.destination);
            }
            if (!dryGain) {
                dryGain = ctx.createGain();
                dryGain.gain.value = 0.8;
                dryGain.connect(masterGain);
            }
            if (!wetGain) {
                wetGain = ctx.createGain();
                wetGain.gain.value = 0.5;
                if (reverbNode) wetGain.connect(reverbNode);
                else wetGain.connect(masterGain);
            }
            if (!reverbNode) {
                initReverb(ctx);
                if (reverbNode) wetGain.connect(reverbNode);
            }
            if (tapeWarbleNode) tapeWarbleNode.connect(masterGain.gain);
        }

        async function getAudioContext() {
            try {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    initTapeWarble(audioCtx);
                    ensureAudioNodes(audioCtx);
                }
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                ensureAudioNodes(audioCtx);
                return audioCtx;
            } catch(err) { console.error('Audio context error:', err); throw err; }
        }

        function initReverb(ctx) {
            if (reverbNode) return;
            try {
                const sampleRate = ctx.sampleRate;
                const length = sampleRate * 3.5; // shorter for noir
                const impulse = ctx.createBuffer(2, length, sampleRate);
                const left = impulse.getChannelData(0);
                const right = impulse.getChannelData(1);
                for (let i=0; i<length; i++) {
                    const decay = Math.exp(-i/(sampleRate*0.7));
                    const lateDecay = Math.exp(-i/(sampleRate*2.0))*0.2;
                    left[i] = (Math.random()*2-1)*(decay+lateDecay);
                    right[i] = (Math.random()*2-1)*(decay+lateDecay);
                }
                reverbNode = ctx.createConvolver();
                reverbNode.buffer = impulse;
                reverbNode.normalize = true;
                if (masterGain) reverbNode.connect(masterGain);
            } catch(err) {
                console.warn('Reverb init error:', err);
                reverbNode = ctx.createGain();
                reverbNode.gain.value = 0.4;
                if (masterGain) reverbNode.connect(masterGain);
            }
        }

        function initTapeWarble(ctx) {
            if (tapeWarbleNode) return;
            try {
                tapeWarbleNode = ctx.createGain();
                tapeWarbleNode.gain.value = 0;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.12;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 0.008;
                const lfo2 = ctx.createOscillator();
                lfo2.type = 'sine';
                lfo2.frequency.value = 0.18;
                const lfo2Gain = ctx.createGain();
                lfo2Gain.gain.value = 0.005;
                lfo.connect(lfoGain);
                lfo2.connect(lfo2Gain);
                lfoGain.connect(tapeWarbleNode.gain);
                lfo2Gain.connect(tapeWarbleNode.gain);
                lfo.start(0);
                lfo2.start(0);
                tapeWarbleNode._lfos = [lfo, lfo2];
            } catch(err) { console.warn('Tape warble init error:', err); }
        }

        // ─── NOIR SYNTHESIS FUNCTIONS ────────────────────────────────

        // Suspense string pad (slow attack, vibrato, high harmonics)
        function createNoirStringPad(ctx, rootFreq, duration, intensity=0.5, voiceCount=6) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity*0.12, now+1.5);
                gainNode.gain.setValueAtTime(intensity*0.12, now+duration-2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration+0.8);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 800 + intensity*300;
                filter.Q.value = 2.5;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 2.0 + Math.random()*1.5;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 6;
                lfo.connect(lfoGain);
                const allOscs = [];
                for (let i=0; i<voiceCount; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i%2===0 ? 'triangle' : 'sine';
                    const base = rootFreq * (1 + (i-2.5)*0.003);
                    osc.frequency.value = base;
                    const vibrato = ctx.createOscillator();
                    vibrato.type = 'sine';
                    vibrato.frequency.value = 3.5 + Math.random()*2;
                    const vGain = ctx.createGain();
                    vGain.gain.value = 2 + Math.random()*3;
                    vibrato.connect(vGain);
                    vGain.connect(osc.frequency);
                    allOscs.push(osc, vibrato);
                    osc.connect(filter);
                }
                lfoGain.connect(filter.frequency);
                filter.connect(gainNode);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.3;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.6;
                gainNode.connect(drySend);
                gainNode.connect(wetSend);
                drySend.connect(dryGain || ctx.destination);
                wetSend.connect(wetGain || ctx.destination);
                allOscs.forEach(o => { o.start(now); o.stop(now+duration+1); });
                lfo.start(now);
                lfo.stop(now+duration+1);
            } catch(err) { console.warn('Noir string pad error:', err); }
        }

        // Dramatic brass stab / sting
        function createNoirSting(ctx, intensity=0.5) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity*0.2, now+0.03);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+1.8);
                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.exponentialRampToValueAtTime(400, now+0.2);
                osc.frequency.exponentialRampToValueAtTime(120, now+1.5);
                const osc2 = ctx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(360, now);
                osc2.frequency.exponentialRampToValueAtTime(200, now+0.3);
                osc2.frequency.exponentialRampToValueAtTime(80, now+1.5);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(600, now);
                filter.frequency.exponentialRampToValueAtTime(200, now+1.5);
                filter.Q.value = 1.5;
                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.5;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                osc.start(now);
                osc2.start(now);
                osc.stop(now+2);
                osc2.stop(now+2);
            } catch(err) { console.warn('Noir sting error:', err); }
        }

        // Low timpani pulse
        function createNoirPulse(ctx, intensity=0.5) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity*0.7, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+0.35);
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.exponentialRampToValueAtTime(40, now+0.3);

            } catch(err) { console.warn('Noir pulse error:', err); }
        }

        // Full orchestral climax
        function createNoirClimax(ctx, intensity=0.7) {
            try {
                const now = ctx.currentTime;
                const duration = 10 + Math.random()*6;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity*0.25, now+3);
                gainNode.gain.setValueAtTime(intensity*0.3, now+duration-2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration);
                const oscs = [];
                const freqs = [55,82.5,110,165,220];
                freqs.forEach(f => {
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(f, now);
                    osc.frequency.exponentialRampToValueAtTime(f*1.4, now+duration*0.6);
                    oscs.push(osc);
                });
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(200, now);
                filter.frequency.exponentialRampToValueAtTime(700, now+duration);
                filter.Q.value = 2;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.04;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 150;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                oscs.forEach(o => o.connect(filter));
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.5;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                oscs.forEach(o => { o.start(now); o.stop(now+duration+1); });
                lfo.start(now);
                lfo.stop(now+duration+1);
            } catch(err) { console.warn('Noir climax error:', err); }
        }

        // Cello-like drone
        function createNoirCelloDrone(ctx, frequency, duration, intensity=0.5) {

                const now = ctx.currentTime;

                gainNode.gain.setValueAtTime(0, now);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 220;
                filter.Q.value = 4;
                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'triangle';
                osc2.frequency.value = frequency * 0.99;
                const vib = ctx.createOscillator();
                vib.type = 'sine';
                vib.frequency.value = 1.8;
                const vibGain = ctx.createGain();
                vibGain.gain.value = 3;
                vib.connect(vibGain);
                vibGain.connect(osc.frequency);
                const vib2 = ctx.createOscillator();
                vib2.type = 'sine';
                vib2.frequency.value = 2.2;
                const vibGain2 = ctx.createGain();
                vibGain2.gain.value = 2.5;
                vib2.connect(vibGain2);
                vibGain2.connect(osc2.frequency);
                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.5;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                osc.start(now);
                osc2.start(now);
                vib.start(now);
                vib2.start(now);
                osc.stop(now+duration+0.6);
                osc2.stop(now+duration+0.6);
                vib.stop(now+duration+0.6);
                vib2.stop(now+duration+0.6);
            } catch(err) { console.warn('Noir cello drone error:', err); }
        }

        // String swell (crescendo)
        function createNoirStringSwell(ctx, targetFreq, duration, intensity=0.5) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0.001, now);
                gainNode.gain.exponentialRampToValueAtTime(intensity*0.2, now+duration*0.7);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration+0.8);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(100, now);
                filter.frequency.exponentialRampToValueAtTime(1200, now+duration*0.6);
                filter.Q.value = 2.5;
                const oscs = [];
                const intervals = [0,5,8,12,17];
                intervals.forEach(interval => {
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = targetFreq * Math.pow(2, interval/12);
                    oscs.push(osc);
                    osc.connect(filter);
                });
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.6;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                oscs.forEach(o => { o.start(now); o.stop(now+duration+1); });
            } catch(err) { console.warn('Noir string swell error:', err); }
        }

        // Violin tremolo (fast amplitude modulation)
        function createNoirViolinTremolo(ctx, baseFreq, duration, intensity=0.4) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity*0.12, now+0.5);
                gainNode.gain.setValueAtTime(intensity*0.12, now+duration-0.5);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration);
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 800;
                filter.Q.value = 8;
                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.value = baseFreq;
                const tremolo = ctx.createOscillator();
                tremolo.type = 'sine';
                tremolo.frequency.value = 6 + Math.random()*4;
                const tremGain = ctx.createGain();
                tremGain.gain.value = 0.4;
                tremolo.connect(tremGain);
                tremGain.connect(gainNode.gain);
                osc.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.6;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                osc.start(now);
                tremolo.start(now);
                osc.stop(now+duration+0.5);
                tremolo.stop(now+duration+0.5);
            } catch(err) { console.warn('Noir violin tremolo error:', err); }
        }

        // Pizzicato (short pluck)
        function createNoirPizzicato(ctx, frequency, intensity=0.5) {

                gainNode.gain.setValueAtTime(intensity*0.4, now);

                filter.frequency.setValueAtTime(3000, now);
                filter.frequency.exponentialRampToValueAtTime(500, now+0.3);
                filter.Q.value = 1.5;
                osc.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.4;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                osc.start(now);
                osc.stop(now+0.35);
            } catch(err) { console.warn('Noir pizzicato error:', err); }

        // Dissonant cluster
        function createNoirCluster(ctx, frequencies, duration, intensity=0.5) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity*0.12, now+1.2);
                gainNode.gain.setValueAtTime(intensity*0.12, now+duration-1.2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration+0.5);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                filter.Q.value = 2;
                const allOscs = [];
                frequencies.forEach(f => {
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = f;
                    const micro = ctx.createOscillator();
                    micro.type = 'sine';
                    micro.frequency.value = 0.2 + Math.random()*0.5;
                    const mg = ctx.createGain();
                    mg.gain.value = 1.5;
                    micro.connect(mg);
                    mg.connect(osc.frequency);
                    allOscs.push(osc, micro);
                    osc.connect(filter);
                });
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.5;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                allOscs.forEach(o => { o.start(now); o.stop(now+duration+0.6); });
            } catch(err) { console.warn('Noir cluster error:', err); }
        }

        // Double bass pizzicato (bass note)
        function createNoirBass(ctx, semitone, intensity=0.5, duration=1.5, rootFreq=35) {
            try {
                const now = ctx.currentTime;
                const freq = rootFreq * Math.pow(2, semitone/12);
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity*0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration);
                const osc = ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, now);
                osc.frequency.exponentialRampToValueAtTime(freq*0.99, now+0.1);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 150;
                filter.Q.value = 1.5;
                osc.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.3;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                osc.start(now);
                osc.stop(now+duration+0.2);
            } catch(err) { console.warn('Noir bass error:', err); }
        }

        // Bass drum
        function createNoirBassDrum(ctx, intensity=0.5) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity*0.8, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+0.3);
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(30, now+0.2);

                filter.type = 'lowpass';
                filter.frequency.value = 120;

                osc.connect(filter);
                filter.connect(gainNode);

        // Snare drum (with noise)
        function createNoirSnare(ctx, intensity=0.5) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity*0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+0.15);
                const bufferSize = ctx.sampleRate * 0.06;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i=0; i<bufferSize; i++) {
                    const env = Math.exp(-i/(ctx.sampleRate*0.02));
                    data[i] = (Math.random()*2-1)*env*0.6;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const osc = ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.exponentialRampToValueAtTime(80, now+0.06);
                const oscGain = ctx.createGain();
                oscGain.gain.value = 0.2*intensity;
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 400;
                filter.Q.value = 0.8;
                noise.connect(filter);
                osc.connect(oscGain);
                oscGain.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);
                noise.start(now);
                osc.start(now);
                noise.stop(now+0.1);
                osc.stop(now+0.1);
            } catch(err) { console.warn('Noir snare error:', err); }
        }

        // Cymbal (high hat)
        function createNoirCymbal(ctx, intensity=0.3) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity*0.4, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+0.2);
                const bufferSize = ctx.sampleRate * 0.1;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i=0; i<bufferSize; i++) {
                    const env = Math.exp(-i/(ctx.sampleRate*0.04));
                    data[i] = (Math.random()*2-1)*env*0.5;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 3000;
                filter.Q.value = 0.5;
                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);
                noise.start(now);
                noise.stop(now+0.25);
            } catch(err) { console.warn('Noir cymbal error:', err); }
        }

        // ─── MASTER playSound ──────────────────────────────────────────
        async function playSound(type, intensity=0.7) {
            try {
                const ctx = await getAudioContext();
                if (!ctx) return;
                const now = ctx.currentTime;
                switch(type) {
                    case 'pad': createNoirStringPad(ctx, 55+Math.random()*20, 16+Math.random()*14, intensity); break;
                    case 'sting': createNoirSting(ctx, intensity); break;
                    case 'pulse':
                    case 'heartbeat':
                        createNoirPulse(ctx, intensity);
                        setTimeout(() => createNoirPulse(ctx, intensity*0.7), 250);
                        break;
                    case 'thunder': {
                        const bufferSize = ctx.sampleRate * 0.8;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i=0; i<bufferSize; i++) {
                            data[i] = (Math.random()*2-1) * Math.exp(-i/(ctx.sampleRate*0.5));
                        }
                        const source = ctx.createBufferSource();
                        source.buffer = buffer;
                        const gain = ctx.createGain();
                        gain.gain.setValueAtTime(intensity*0.4, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now+1.2);
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = 100;
                        filter.Q.value = 0.5;
                        source.connect(filter);
                        filter.connect(gain);
                        gain.connect(ctx.destination);
                        source.start(now);
                        source.stop(now+1.2);
                        break;
                    }
                    case 'bell': {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 60 + Math.random()*25;
                        const gain = ctx.createGain();
                        gain.gain.setValueAtTime(0, now);
                        gain.gain.linearRampToValueAtTime(intensity*0.3, now+0.15);
                        gain.gain.exponentialRampToValueAtTime(0.001, now+3.5);
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = 400;
                        osc.connect(filter);
                        filter.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now+3.5);
                        break;
                    }
                    case 'climax': createNoirClimax(ctx, intensity); break;
                    case 'industrial_hum':
                        // replaced with low drone
                        createNoirCelloDrone(ctx, 40+Math.random()*20, 10+Math.random()*8, intensity*0.4);
                        break;
                    case 'string_pad': createNoirStringPad(ctx, 55+Math.random()*25, 12+Math.random()*14, intensity); break;
                    case 'cello_drone': createNoirCelloDrone(ctx, 40+Math.random()*20, 10+Math.random()*8, intensity); break;
                    case 'string_swell': createNoirStringSwell(ctx, 50+Math.random()*30, 5+Math.random()*6, intensity); break;
                    case 'violin_texture': createNoirViolinTremolo(ctx, 80+Math.random()*40, 8+Math.random()*6, intensity); break;
                    case 'pizzicato':
                        createNoirPizzicato(ctx, 60+Math.random()*40, intensity);
                        setTimeout(() => createNoirPizzicato(ctx, 55+Math.random()*35, intensity*0.7), 180+Math.random()*250);
                        break;
                    case 'string_cluster': {
                        const clusterFreqs = [];
                        const root = 45 + Math.random()*30;
                        for (let i=0; i<5; i++) clusterFreqs.push(root*(1+(Math.random()-0.5)*0.2));
                        createNoirCluster(ctx, clusterFreqs, 6+Math.random()*8, intensity);
                        break;
                    }
                    case 'bass': {
                        const semitone = Math.floor(Math.random()*12);
                        createNoirBass(ctx, semitone, intensity, 1.2+Math.random()*1.2, 35);
                        break;
                    }
                    case 'kick': createNoirBassDrum(ctx, intensity); break;
                    case 'snare': createNoirSnare(ctx, intensity); break;
                    case 'hat': createNoirCymbal(ctx, intensity*0.5); break;
                    default: console.warn('Unknown sound type:', type);
                }
            } catch(err) { console.warn('playSound error:', err); }
        }

        // ─── AMBIENT ──────────────────────────────────────────────────
        async function playAmbient(type, durationSeconds, intensity=0.5) {
            try {
                stopAmbient();
                const ctx = await getAudioContext();
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity*0.2, now);
                gainNode.connect(ctx.destination);
                ambientGain = gainNode;
                let source = null;
                if (type === 'ambient_drone' || type === 'wind_howl' || type === 'industrial_drone') {
                    const bufferSize = ctx.sampleRate * 2;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i=0; i<bufferSize; i++) {
                        data[i] = (Math.random()*2-1) * (0.3 + 0.2*Math.sin(i*0.05));
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    noise.loop = true;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = type === 'industrial_drone' ? 100 : type === 'ambient_drone' ? 150 : 400;
                    filter.Q.value = 0.5;
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = type === 'industrial_drone' ? 45 : type === 'ambient_drone' ? 60 : 80;
                    const gainOsc = ctx.createGain();
                    gainOsc.gain.value = 0.12*intensity;
                    osc.connect(gainOsc);
                    gainOsc.connect(filter);
                    noise.connect(filter);
                    filter.connect(gainNode);
                    osc.start(now);
                    noise.start(now);
                    source = { osc, noise };
                    ambientSource = source;
                } else {
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = 70;
                    osc.connect(gainNode);
                    osc.start(now);
                    source = { osc };
                    ambientSource = source;
                }
                if (ambientTimeout) clearTimeout(ambientTimeout);
                ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds*1000);
            } catch(err) { console.warn('playAmbient error:', err); }
        }

        function stopAmbient() {
            if (ambientGain) {
                const now = audioCtx ? audioCtx.currentTime : 0;
                ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                ambientGain.gain.exponentialRampToValueAtTime(0.001, now+0.5);
                setTimeout(() => {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                    if (ambientGain) { ambientGain.disconnect(); ambientGain = null; }
                }, 500);
            } else {
                if (ambientSource) {
                    if (ambientSource.osc) ambientSource.osc.stop();
                    if (ambientSource.noise) ambientSource.noise.stop();
                    ambientSource = null;
                }
            }
            if (ambientTimeout) { clearTimeout(ambientTimeout); ambientTimeout = null; }
        }

        // ─── INTERROGATION AMBIENT THEMES (adjusted for noir) ────────
        const INTERROGATION_AMBIENT = {
            briefing:     { rootFreq:42, detuneSpread:8,  filterBase:110, lfoRate:0.04, noiseMix:0.10, intensity:0.20, stringLayer:'soft_pad', stringFreq:48, stringIntensity:0.15 },
            entrance:     { rootFreq:46, detuneSpread:10, filterBase:130, lfoRate:0.06, noiseMix:0.15, intensity:0.25, stringLayer:'cello', stringFreq:40, stringIntensity:0.20 },
            questioning:  { rootFreq:50, detuneSpread:12, filterBase:120, lfoRate:0.08, noiseMix:0.25, intensity:0.30, stringLayer:'tension_pad', stringFreq:52, stringIntensity:0.25 },
            pressure:     { rootFreq:44, detuneSpread:14, filterBase:90,  lfoRate:0.10, noiseMix:0.35, intensity:0.40, stringLayer:'cluster', stringFreq:42, stringIntensity:0.32 },
            revelation:   { rootFreq:48, detuneSpread:16, filterBase:80,  lfoRate:0.12, noiseMix:0.40, intensity:0.50, stringLayer:'swell', stringFreq:50, stringIntensity:0.40 },
            resolution:   { rootFreq:40, detuneSpread:6,  filterBase:130, lfoRate:0.03, noiseMix:0.05, intensity:0.15, stringLayer:'soft_pad', stringFreq:45, stringIntensity:0.12 }
        };

        function startStringLayer(theme) {
            if (!audioCtx) return;
            stopStringAmbient();
            const ctx = audioCtx;
            const now = ctx.currentTime;
            const stringType = theme.stringLayer || 'soft_pad';
            const freq = theme.stringFreq || 50;
            const intensity = theme.stringIntensity || 0.2;
            const duration = 999;
            const allNodes = [];
            const gainNode = ctx.createGain();
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(intensity*0.15, now+2);

            if (stringType === 'cello') {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 250;
                filter.Q.value = 3.5;
                for (let i=0; i<3; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = freq * (1 + (i-1)*0.005);
                    const vib = ctx.createOscillator();
                    vib.type = 'sine';
                    vib.frequency.value = 1.8 + i*0.6;
                    const vibG = ctx.createGain();
                    vibG.gain.value = 2;
                    vib.connect(vibG);
                    vibG.connect(osc.frequency);
                    allNodes.push(osc, vib);
                    osc.connect(filter);
                }
                filter.connect(gainNode);
            } else if (stringType === 'cluster') {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 350;
                filter.Q.value = 1.8;
                const clusterFreqs = [freq*0.97, freq, freq*1.02, freq*1.04, freq*1.06];
                clusterFreqs.forEach(f => {
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = f;
                    const mlfo = ctx.createOscillator();
                    mlfo.type = 'sine';
                    mlfo.frequency.value = 0.2 + Math.random()*0.3;
                    const mg = ctx.createGain();
                    mg.gain.value = 1.2;
                    mlfo.connect(mg);
                    mg.connect(osc.frequency);
                    allNodes.push(osc, mlfo);
                    osc.connect(filter);
                });
                filter.connect(gainNode);
            } else if (stringType === 'swell') {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 300;
                filter.Q.value = 2.5;
                const intervals = [0,3,7,10,14];
                intervals.forEach(interval => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = freq * Math.pow(2, interval/12);
                    allNodes.push(osc);
                    osc.connect(filter);
                });
                filter.connect(gainNode);
            } else {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                filter.Q.value = 2.5;
                for (let i=0; i<5; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i<2 ? 'triangle' : 'sine';
                    osc.frequency.value = freq * (1 + (i-2)*0.004);
                    const vib = ctx.createOscillator();
                    vib.type = 'sine';
                    vib.frequency.value = 2.5 + i*0.5;
                    const vibG = ctx.createGain();
                    vibG.gain.value = 1.8 + i*0.3;
                    vib.connect(vibG);
                    vibG.connect(osc.frequency);
                    allNodes.push(osc, vib);
                    osc.connect(filter);
                }
                filter.connect(gainNode);
            }

            const wetSend = ctx.createGain();
            wetSend.gain.value = 0.5;
            gainNode.connect(wetSend);
            wetSend.connect(wetGain || ctx.destination);
            gainNode.connect(dryGain || ctx.destination);

            allNodes.forEach(n => n.start(now));
            stringAmbientActive = {
                nodes: allNodes, gainNode, wetSend,
                stop: () => {
                    gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime+1);
                    allNodes.forEach(n => { try { n.stop(ctx.currentTime+1.2); } catch(e) {} });
                }
            };
        }

        function stopStringAmbient() {
            if (stringAmbientActive) { stringAmbientActive.stop(); stringAmbientActive = null; }
        }

        function startInterrogationAmbient(themeName) {
            if (!audioCtx) return;
            stopSectionAmbient();
            const theme = INTERROGATION_AMBIENT[themeName] || INTERROGATION_AMBIENT.briefing;
            const ctx = audioCtx;
            const now = ctx.currentTime;
            const gainNode = ctx.createGain();
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(theme.intensity*0.15, now+1.5);
            const oscs = [];
            for (let i=0; i<3; i++) {
                const osc = ctx.createOscillator();
                osc.type = i===0 ? 'triangle' : i===1 ? 'sawtooth' : 'triangle';
                const detune = (i-1)*theme.detuneSpread;
                osc.frequency.value = theme.rootFreq * Math.pow(2, detune/1200);
                oscs.push(osc);
            }
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = theme.filterBase;
            filter.Q.value = 2.5;
            const lfo = ctx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = theme.lfoRate;
            const lfoGain = ctx.createGain();
            lfoGain.gain.value = 60;
            lfo.connect(lfoGain);
            lfoGain.connect(filter.frequency);
            oscs.forEach(o => o.connect(filter));
            filter.connect(gainNode);
            const wetSend = ctx.createGain();
            wetSend.gain.value = 0.5;
            gainNode.connect(wetSend);
            wetSend.connect(wetGain || ctx.destination);
            gainNode.connect(dryGain || ctx.destination);
            oscs.forEach(o => o.start(now));
            lfo.start(now);
            if (theme.noiseMix > 0) {
                const bufferSize = ctx.sampleRate * 2;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i=0; i<bufferSize; i++) {
                    data[i] = (Math.random()*2-1)*theme.noiseMix * (0.5 + 0.5*Math.sin(i*0.02));
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                noise.loop = true;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'lowpass';
                noiseFilter.frequency.value = theme.filterBase*0.6;
                noiseFilter.Q.value = 0.3;
                const noiseGain = ctx.createGain();
                noiseGain.gain.value = theme.noiseMix*0.25;
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(gainNode);
                noise.start(now);
                oscs.push(noise);
            }
            sectionAmbientActive = {
                stop: () => {
                    gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime+0.6);
                    oscs.forEach(s => { try { s.stop(ctx.currentTime+0.8); } catch(e) {} });
                    try { lfo.stop(ctx.currentTime+0.8); } catch(e) {}
                    sectionAmbientActive = null;
                }
            };
            startStringLayer(theme);
            startEvolvingPatternPlayer(themeName, 35, sectionThemeScore);
        }

        function transitionSectionTheme(themeName, scoreData) {
            if (scoreData) sectionThemeScore = scoreData;
            startInterrogationAmbient(themeName);
        }

        function stopSectionAmbient() {
            if (sectionAmbientActive) { sectionAmbientActive.stop(); sectionAmbientActive = null; }
            stopStringAmbient();
            stopPatternPlayer();
            clearTimeout(crossfadeTimeout);
        }

        // ─── PATTERN PLAYER (AI‑ONLY, NO FALLBACKS) ──────────────────
        function startEvolvingPatternPlayer(themeName, rootFreq=35, scoreData=null) {
            stopPatternPlayer();
            if (!scoreData || !scoreData[themeName]) {
                console.warn('No AI score data for theme:', themeName, '— refusing to play fallback.');
                return;
            }
            const theme = scoreData[themeName];
            const bpm = theme.bpm || 60;
            const bass = expandPattern(theme.bass);
            const kick = expandPattern(theme.kick);
            const snare = expandPattern(theme.snare);
            const hat   = expandPattern(theme.hat);

            const variations = [{
                name: 'AI',
                bars: 8,
                bass: bass,
                kick: kick,
                snare: snare,
                hat: hat
            }];

            currentSectionPatterns = variations;
            currentVariationIdx = 0;
            barsInVariation = 0;
            patternStep = 0;
            patternBPM = bpm;
            fillActive = false;
            patternPlayerActive = { active: true, theme: themeName };

            const stepDuration = 60 / bpm / 4;

            function getCurrentPattern() {
                return currentSectionPatterns[0];
            }

            function playStep() {
                if (!patternPlayerActive || !patternPlayerActive.active) return;
                const ctx = audioCtx;
                if (!ctx) { patternPlayerTimeout = setTimeout(playStep, 100); return; }

                const step = patternStep % 16;
                const current = getCurrentPattern();
                const isFillStep = fillActive;

                // Bass
                let bassSemitone = 0;
                if (isFillStep) {
                    bassSemitone = (step % 4 === 0) ? 0 : (step % 8 === 4 ? 7 : 0);
                } else {
                    bassSemitone = current.bass[step] || 0;
                }
                if (bassSemitone !== 0 || (isFillStep && step % 4 === 0)) {
                    const dur = isFillStep ? 0.3 : 1.5;
                    const inten = isFillStep ? 0.3 : 0.4 + (bassSemitone / 30);
                    createNoirBass(ctx, bassSemitone, inten, dur, rootFreq);
                }

                let kickVal = isFillStep ? (step % 4 === 0 ? 1 : 0) : (current.kick[step] || 0);
                if (kickVal === 1) createNoirBassDrum(ctx, isFillStep ? 0.6 : 0.5);

                let snareVal = isFillStep ? (step % 8 === 4 ? 1 : 0) : (current.snare[step] || 0);
                if (snareVal === 1) createNoirSnare(ctx, isFillStep ? 0.6 : 0.4);

                let hatVal = isFillStep ? (step % 2 === 0 ? 1 : 0) : (current.hat[step] || 0);
                if (hatVal === 1 && Math.random() < 0.6) createNoirCymbal(ctx, isFillStep ? 0.4 : 0.2);

                patternStep++;
                if (patternStep % 16 === 0) {
                    barsInVariation++;
                    if (barsInVariation >= current.bars) barsInVariation = 0;
                }
                patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
            }
            patternPlayerTimeout = setTimeout(playStep, 50);
        }

        function stopPatternPlayer() {
            if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout); patternPlayerTimeout = null; }
            if (patternPlayerActive) { patternPlayerActive.active = false; patternPlayerActive = null; }
            patternStep = 0; currentSectionPatterns = []; currentVariationIdx = 0; barsInVariation = 0; fillActive = false;
        }

        async function mistralChat(msgs, maxTok=500, timeoutMs=28000) {
            if (!apiKey) throw new Error('API key missing');
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const res = await fetch(MISTRAL_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
                    body: JSON.stringify({ model:MODEL, messages:msgs, temperature:0.9, max_tokens:maxTok }),
                    signal: controller.signal
                });
                if (!res.ok) { const errText = await res.text(); throw new Error(`API error ${res.status}: ${errText}`); }
                const data = await res.json();
                return data.choices[0].message.content.trim();
            } catch(e) {
                if (e.name === 'AbortError') throw new Error('Request timed out. Please try again.');
                throw e;
            } finally { clearTimeout(timeout); }
        }

        async function generateImage(prompt) {
            const now = Date.now();
            if (now < gameState.imageCooldownUntil) {
                await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
            }
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', stark interrogation room, 1940s wartime, harsh overhead light, cinematic, grainy film, high contrast black and white')}?width=512&height=640&seed=${Date.now()}`;
            return new Promise((resolve, reject) => {
                const img = new Image();
                let resolved = false;
                const timeout = setTimeout(() => { if (!resolved) { resolved = true; reject(new Error('Image load timeout')); } }, 15000);
                img.onload = () => { if (!resolved) { resolved = true; clearTimeout(timeout); resolve(url); } };
                img.onerror = () => { if (!resolved) { resolved = true; clearTimeout(timeout); reject(new Error('Image load error')); } };
                img.src = url;
            });
        }

        async function generateImageWithRetry(prompt, retries=2) {
            let lastError = null;
            for (let i=0; i<retries; i++) {
                try { return await generateImage(prompt); }
                catch(e) { lastError = e; await new Promise(r => setTimeout(r, 20)); }
            }
            throw lastError || new Error('Image generation failed');
        }

        function typewriterEffect(element, text, speed, onChar=null) {
            return new Promise((resolve) => {
                let i=0;
                element.textContent = '';
                const timer = setInterval(() => {
                    if (i < text.length) {
                        element.textContent += text.charAt(i);
                        if (onChar) onChar(i);
                        i++;
                    } else {
                        clearInterval(timer);
                        resolve();
                    }
                }, speed);
            });
        }

        function speakTextMale(text) {
            return new Promise((resolve) => {
                if (!text) { resolve(); return; }
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'];
                let voice = null;
                for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.6;
                utterance.pitch = 0.88;
                utterance.onend = () => resolve();
                utterance.onerror = () => resolve();
                speechSynthesis.speak(utterance);
            });
        }

                }
            });
            guideList.appendChild(newBtn);

            if (gameState.nocturnePerformance && gameState.nocturnePerformance.rawStoryText && !gameState.nocturnePerformance.soundCues) {
                const produceBtn = document.createElement('button');
                produceBtn.className = 'btn';
                produceBtn.style.marginTop = '6px';
                produceBtn.style.width = '100%';
                produceBtn.textContent = '🎬 Produce Score (Current File)';
                produceBtn.addEventListener('click', async () => {
                    produceBtn.disabled = true;
                    produceBtn.textContent = '🎚️ Composing…';
                    try {
                        const cues = await generateSoundCueSheet(gameState.nocturnePerformance.rawStoryText);
                        gameState.nocturnePerformance.soundCues = cues;
                        saveState();
                        produceBtn.textContent = '✅ Score Ready';
                        renderChannel3();
                    } catch(e) {
                        showModal(`<h2>Score Failed</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
                        produceBtn.disabled = false;
                        produceBtn.textContent = '🎬 Produce Score (Current File)';
                    }
                });
                guideList.appendChild(produceBtn);
            }

            document.querySelectorAll('.perform-saved-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const index = parseInt(btn.dataset.index);
                    const ep = gameState.ch3Episodes[index];
                    if (!ep) return;
                    gameState.nocturnePerformance = { ...ep, soundCues: ep.soundCues || null, rawStoryText: ep.rawStoryText || ep.story };
                    saveState();
                    await getAudioContext();
                    await startNocturnePerformance();
                });
            });

            document.querySelectorAll('.produce-episode-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const index = parseInt(btn.dataset.index);
                    const ep = gameState.ch3Episodes[index];
                    if (!ep || !ep.rawStoryText) return;
                    btn.disabled = true;
                    btn.textContent = '🎚️...';
                    try {
                        const soundtrack = await generateSoundCueSheet(ep.rawStoryText);
                        ep.soundCues = soundtrack;
                        saveState();
                        renderChannel3();
                    } catch(err) {
                        showModal(`<h2>Score Failed</h2><p>${esc(err.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
                        btn.disabled = false;
                        btn.textContent = '🎬 Produce';
                    }
                });
            });
        }

        // ─── STORY & SCORE GENERATION ────────────────────────────────
        async function generateNewNocturneStory() {
            const system = `You are The Archivist, narrator of THE INTERROGATION. You present declassified WWII interrogation transcripts as stark, brutal dramas. Your tone is measured, clinical, but haunted by what you've read. No supernatural elements—only human cruelty, moral compromise, and the weight of impossible choices.`;
            const prompt = `Write a 900-1100 word short story in the form of a declassified interrogation transcript set in 1940-1945. One room. Two people. One interrogator, one prisoner. Strict rules: NO supernatural elements—no ghosts, curses, magic, or dreams. The horror must be purely human: moral dilemmas, psychological pressure, brutal choices. Follow this structure: Act I - Capture (how they arrived), Act II - The Game (the chess match of questioning, unexpected similarities emerge), Act III - Pressure (outside forces intrude—deadlines, approaching bombers, collapsing fronts), Act IV - Revelation (something changes everything—the prisoner was telling the truth, the interrogator has the wrong person, the intelligence is obsolete, the 'spy' is actually one of their own), Act V - The Choice (a moral decision with real stakes), Act VI - The Consequence (the ending grows naturally from the choice—execution, guilt, escape, arrest of the interrogator by their own side). The audience must never be sure who truly holds the power. Frame the story with The Archivist's clinical intro and a cold, haunted closing remark. Return ONLY a valid JSON object with these fields: title (string), story (full narration string, use backslash n for line breaks), closing_remark (the final punchline). Output raw JSON only, no markdown.`;
            const resp = await mistralChat([{ role:'system', content:system }, { role:'user', content:prompt }], 3500, 45000);
            let jsonStr = resp.replace(/```json|```/g,'').replace(/`/g,'').trim();
            const story = JSON.parse(jsonStr);
            story.story = story.story.replace(/\\n/g, '\n');
            if (!story.title || !story.story || !story.closing_remark) throw new Error('Invalid story structure.');
            let imageUrl = null;
            try {
                const imagePrompt = `Stark photograph of an interrogation room, 1940s wartime, single bare light bulb, two figures at a table, high contrast black and white, grainy, cinematic, titled "${story.title}"`;
                imageUrl = await generateImageWithRetry(imagePrompt, 2);
            } catch(e) { console.warn('Could not generate image:', e); }
            gameState.nocturnePerformance = {
                title: story.title,
                story: story.story,
                closing_remark: story.closing_remark,
                imageUrl: imageUrl || '',
                rawStoryText: story.story,
                soundCues: null
            };
            saveState();
        }

        async function generateSoundCueSheet(storyText) {
            const length = storyText.length;
            const system = `You are a sound designer for a classic film noir / Hitchcock-style score for a WWII interrogation drama.
Given a story, return JSON with THREE keys:
- "sections": array of 5-6 sections dividing the story into emotional acts. Each has "theme" (one of: briefing, entrance, questioning, pressure, revelation, resolution), "start_char" (inclusive), "end_char" (exclusive). Cover entire story from 0 to ${length}.
- "cues": array of sound events using types: "sting", "pulse", "thunder", "bell", "climax", "industrial_hum", "pad", "string_pad", "cello_drone", "string_swell", "violin_texture", "pizzicato", "string_cluster", "bass", "kick", "snare". Include at least 40 cues spread evenly. Use string instruments, brass stings, and suspenseful pulses.
- "score": object with keys matching theme names. Each key: "bpm" (40-80), "bass" (array of 8 integers 0-24), "kick" (array of 8 integers 0/1), "snare" (array of 8 integers 0/1), "hat" (array of 8 integers 0/1). The score should reflect a noir/Hitchcock feel: sparse but tense, with low bass ostinatos and occasional accents.
Return ONLY raw JSON.`;
            const userPrompt = `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and 80s film score patterns.`;
            const resp = await mistralChat([{ role:'system', content:system }, { role:'user', content:userPrompt }], 4000, 35000);
            const cleaned = resp.replace(/```json|```/g,'').trim();
            let data;
            try { data = JSON.parse(cleaned); } catch(parseErr) {
                const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                if (match) { const candidate = match[0].replace(/,\s*([}\]])/g,'$1'); try { data = JSON.parse(candidate); } catch(e2) { throw new Error('Failed to parse AI soundtrack JSON.'); } }
                else throw new Error('No JSON found in AI response.');
            }
            if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                throw new Error('Missing sections, cues, or score in AI response');

            const sortedSections = data.sections.sort((a,b) => a.start_char - b.start_char);
            if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length-1].end_char < length) {
                sortedSections[0].start_char = 0;
                sortedSections[sortedSections.length-1].end_char = length;
            }
            const cues = data.cues.map(c => ({ type: c.type, position: Math.min(c.position, length - 1), intensity: c.intensity || 0.7 }));

            const requiredThemes = ['briefing','entrance','questioning','pressure','revelation','resolution'];
            const score = {};

            function normalizeArray(arr, maxVal=24) {
                if (!Array.isArray(arr)) throw new Error('Expected array, got ' + typeof arr);
                let clean = arr.map(v => { const n = Number(v); return isNaN(n) ? 0 : Math.min(maxVal, Math.max(0, Math.round(n))); });
                while (clean.length < 8) clean.push(0);
                if (clean.length > 8) clean = clean.slice(0,8);
                return clean;
            }

            for (const theme of requiredThemes) {
                if (!data.score[theme]) throw new Error(`AI did not provide a score for theme "${theme}". Cannot continue.`);
                const s = data.score[theme];
                if (typeof s.bpm !== 'number' || s.bpm < 30 || s.bpm > 120) throw new Error(`Invalid bpm for theme "${theme}": ${s.bpm}`);
                const bass = normalizeArray(s.bass, 24);
                const kick = normalizeArray(s.kick, 1);
                const snare = normalizeArray(s.snare, 1);
                const hat   = normalizeArray(s.hat, 1);
                score[theme] = { bpm: s.bpm, bass, kick, snare, hat };
            }

            return { sections: sortedSections, cues, score };
        }

        async function generateAndPerform() {
            await generateNewNocturneStory();
            if (!gameState.nocturnePerformance) throw new Error('Failed to generate story');
            const soundtrack = await generateSoundCueSheet(gameState.nocturnePerformance.rawStoryText);
            gameState.nocturnePerformance.soundCues = soundtrack;
            saveState();
            await startNocturnePerformance();
        }

        // ─── PERFORMANCE ──────────────────────────────────────────────
        async function startNocturnePerformance() {
            speechSynthesis.cancel();
            if (window.ch3Timeout) clearTimeout(window.ch3Timeout);
            const storyData = gameState.nocturnePerformance;
            if (!storyData || !storyData.story) {
                await generateNewNocturneStory();
                return startNocturnePerformance();
            }

            await getAudioContext();

            let sectionList = null, cueList = null, scoreData = null;
            if (storyData.soundCues) {
                if (Array.isArray(storyData.soundCues)) {
                    cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                    sectionList = storyData.soundCues.sections;
                    cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                    scoreData = storyData.soundCues.score;
                }
            }

            const bubble = document.getElementById('ch3SpeechBubble');
            const dialogue = document.getElementById('ch3Dialogue');
            const imageEl = document.getElementById('ch3SegmentImage');
            if (!bubble || !dialogue) return;

            const guideList = document.getElementById('ch3GuideList');
            if (guideList) guideList.style.display = 'none';
            bubble.style.borderColor = '#777777';
            bubble.style.boxShadow = '0 0 30px #ffffff33';
            dialogue.innerHTML = '';
            const oldBack = document.getElementById('ch3BackBtn');
            if (oldBack) oldBack.remove();
            const oldAdd = document.getElementById('ch3AddEpisodeBtn');
            if (oldAdd) oldAdd.remove();

            const posterContainer = document.getElementById('ch3PosterContainer');
            const posterTitle = document.getElementById('ch3PosterTitle');
            if (posterContainer && imageEl && storyData.imageUrl) {
                imageEl.src = storyData.imageUrl;
                imageEl.classList.add('visible');
                imageEl.style.display = 'block';
                posterContainer.classList.remove('no-image', 'loading');
                posterContainer.classList.add('visible');
                if (posterTitle) posterTitle.textContent = storyData.title || '';
            } else if (posterContainer) posterContainer.classList.add('no-image');

            // Intro
            const intro = `"File declassified. Date: ${1940 + Math.floor(Math.random()*6)}. Location: CLASSIFIED. I have reviewed this transcript. What follows is the unredacted record of a single interrogation. One room. Two adversaries. The truth, as always, proved elusive."`;
            dialogue.textContent = '';
            await speakTextMale(intro);
            await typewriterEffect(dialogue, intro, 50);
            await new Promise(r => setTimeout(r, 1500));

            // Score indicator update loop
            let indicatorInterval = setInterval(() => {
                if (patternPlayerActive) {
                    const theme = patternPlayerActive.theme || 'briefing';
                    const varIdx = currentVariationIdx;
                    const varName = currentSectionPatterns[varIdx] ? currentSectionPatterns[varIdx].name : 'A';
                    const bar = barsInVariation + 1;
                    updateScoreIndicator(theme, varName, bar);
                } else {
                    updateScoreIndicator('...', '—', 0);
                }
            }, 1000);

            // Start section music
            if (sectionList && sectionList.length > 0) {
                transitionSectionTheme(sectionList[0].theme, scoreData);
            } else if (scoreData) {
                transitionSectionTheme('briefing', scoreData);
            }

            const storyText = storyData.rawStoryText || storyData.story;
            if (!storyText) {
                console.warn('No story text');
                await finishPerformance(storyData, dialogue, indicatorInterval);
                return;
            }

            // Build cue checker
            let cueChecker = null;
            if (cueList && cueList.length > 0) {
                const sortedCues = [...cueList].sort((a,b) => a.position - b.position);
                let cueIdx = 0;
                const triggered = new Set();
                let lastLog = 0;
                const sortedSections = sectionList ? [...sectionList].sort((a,b) => a.start_char - b.start_char) : [];
                let sectionIdx = 0;
                let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                cueChecker = function check(idx) {
                    if (idx - lastLog > 500) { lastLog = idx; }
                    while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                        const sec = sortedSections[sectionIdx];
                        if (sec.theme !== currentTheme) {
                            currentTheme = sec.theme;
                            transitionSectionTheme(currentTheme, scoreData);
                        }
                        sectionIdx++;
                    }
                    while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                        const cue = sortedCues[cueIdx];
                        if (!triggered.has(cueIdx)) {
                            triggered.add(cueIdx);
                            playSound(cue.type, cue.intensity);
                        }
                        cueIdx++;
                    }
                };
            }

            dialogue.textContent = '';
            const typingPromise = typewriterEffect(dialogue, storyText, 30, cueChecker);
            const speechPromise = speakTextMale(storyText);
            await speechPromise;
            await typingPromise;

            await finishPerformance(storyData, dialogue, indicatorInterval);
        }

        async function finishPerformance(storyData, dialogue, indicatorInterval) {
            const closing = `"${storyData.closing_remark}"`;
            const closingLine = document.createElement('p');
            closingLine.style.marginTop = '16px';
            closingLine.style.fontStyle = 'italic';
            closingLine.style.color = '#cccccc';
            dialogue.appendChild(closingLine);
            const closingSpeech = speakTextMale(closing);
            const closingTyping = typewriterEffect(closingLine, closing, 45);
            await Promise.all([closingSpeech, closingTyping]);

            await new Promise(r => setTimeout(r, 1000));

            const curtainText = document.createElement('p');
            curtainText.textContent = '— File closed —';
            stopSectionAmbient();
            stopPatternPlayer();
            clearInterval(indicatorInterval);
            const indicator = document.getElementById('scoreIndicator');
            if (indicator) indicator.style.display = 'none';
            curtainText.style.color = '#555555';
            curtainText.style.fontSize = '14px';
            dialogue.appendChild(curtainText);
            stopAmbient();

            const btnRow = document.createElement('div');
            btnRow.style.marginTop = '12px';
            btnRow.style.display = 'flex';
            btnRow.style.gap = '8px';
            btnRow.style.justifyContent = 'flex-end';
            const leaveBtn = document.createElement('button');
            leaveBtn.className = 'btn back-btn';
            leaveBtn.textContent = '← Return to Archive';
            leaveBtn.addEventListener('click', () => { leaveTheater(); });
            btnRow.appendChild(leaveBtn);
            const addBtn = document.createElement('button');
            addBtn.className = 'btn accent';
            addBtn.id = 'ch3AddEpisodeBtn';
            addBtn.textContent = '➕ Archive File';
            addBtn.addEventListener('click', () => { addCurrentEpisode(); addBtn.disabled = true; addBtn.textContent = '✓ Archived'; });
            btnRow.appendChild(addBtn);
            dialogue.appendChild(btnRow);
        }

        function addCurrentEpisode() {
            const perf = gameState.nocturnePerformance;
            if (!perf) return;
            gameState.ch3Episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
            saveState();
            setTimeout(() => leaveTheater(), 600);
        }

        function leaveTheater() {
            stopAmbient();
            stopSectionAmbient();
            stopPatternPlayer();
            const indicator = document.getElementById('scoreIndicator');
            if (indicator) indicator.style.display = 'none';
            renderChannel3();
        }

        // ─── INIT ──────────────────────────────────────────────────────
        function init() {
            loadState();
            renderChannel3();

            document.getElementById('resetApiBtn').addEventListener('click', () => {
                const key = prompt('Enter your Mistral API key:');
                if (key && key.length > 10) {
                    apiKey = key;
                    localStorage.setItem('interrogation_channel_key', key);
                }
            });

            document.getElementById('genericModal').addEventListener('click', e => {
                if (e.target === e.currentTarget) closeModal();
            });

            document.querySelector('.game-area').addEventListener('click', (e) => {
                const portrait = e.target.closest('.host-portrait');
                if (portrait && HOST_BIO) showModal(HOST_BIO);
            });

            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
            if (!apiKey) setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
            document.addEventListener('click', () => { getAudioContext().catch(()=>{}); }, { once: true });
        }

        init();
    })();
    </script>
