    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;

            margin: 0;
            image-rendering: pixelated;
        }

        .terminal {
            max-width: 900px;
            width: 100%;
            background: #000000;

        .terminal::after {

        #commandInput {

            color: #1eff6c;

<div class="terminal">

<script>
    (function() {
        // -------------------- WEB AUDIO TYPING SOUND (TERMINAL EFFECT) --------------------
        let audioCtx = null;
        let audioEnabled = false;

        function initAudio() {
            if (audioCtx) return audioCtx;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                // keep suspended until user gesture
            } catch (e) {
                console.warn("Web Audio API not supported — no typing sound.");
            }
            return audioCtx;
        }

        // Plays a short, click‑like sound (terminal keypress)
        function playTypingSound() {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const now = audioCtx.currentTime;
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.08, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.025);
            const osc = audioCtx.createOscillator();
            osc.frequency.value = 720;
            osc.type = 'sawtooth';
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.025);
        }

        // ----- NEW: Enhanced static noise for audio logs (longer, louder) -----
        function playStaticNoise(duration = 12.0) {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; // white noise
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const gainNode = audioCtx.createGain();
            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.5, now + 0.2);      // fade in
            gainNode.gain.setValueAtTime(0.5, now + 0.2);
            gainNode.gain.linearRampToValueAtTime(0.001, now + duration - 0.5); // fade out near end
            noise.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            noise.start();
            noise.stop(now + duration);
        }

        function enableAudio() {
            if (!audioCtx) initAudio();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume().catch(e => console.warn("Audio resume failed", e));
            }
        }

        document.addEventListener('keydown', function enableOnKey() {
            enableAudio();
            document.removeEventListener('keydown', enableOnKey);
        }, { once: true });
        document.addEventListener('click', function enableOnClick() {
            enableAudio();
            document.removeEventListener('click', enableOnClick);
        }, { once: true });

        // -------------------- TEXT-TO-SPEECH (MALE VOICE ENFORCED) --------------------
        let ttsEnabled = false;
        let currentUtterance = null;
        const ttsSupported = window.speechSynthesis !== undefined;
        let selectedVoice = null;
        let voicesReady = false;
        let ttsInitialized = false;

        function selectMaleVoice(voices) {
            if (!voices || voices.length === 0) return null;

            console.log('Available English voices:');
            voices.filter(v => v.lang.includes('en')).forEach(v => console.log(` - ${v.name} (${v.lang})`));

            let voice = voices.find(v => v.lang.includes('en') && v.name.toLowerCase().includes('david'));
            if (voice) {
                console.log('Selected voice: ' + voice.name + ' (David)');
                return voice;
            }

            const maleNames = ['google uk english male', 'microsoft mark', 'daniel', 'alex', 'fred', 'harry', 'guy', 'male'];
            voice = voices.find(v => {
                const lowerName = v.name.toLowerCase();
                return v.lang.includes('en') && maleNames.some(name => lowerName.includes(name));
            });
            if (voice) {
                console.log('Selected voice: ' + voice.name + ' (male)');
                return voice;
            }

            voice = voices.find(v => v.lang.includes('en'));
            if (voice) {
                console.log('Selected voice: ' + voice.name + ' (fallback)');
                return voice;
            }

            console.log('No English voice found!');
            return null;
        }

        function loadVoices() {
            const voices = speechSynthesis.getVoices();
            if (voices.length > 0) {
                selectedVoice = selectMaleVoice(voices);
                voicesReady = true;
                ttsInitialized = true;
            }
        }

        loadVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        function setVoice(utterance, mood) {
            if (!ttsSupported) return;

            if (selectedVoice) {
                utterance.voice = selectedVoice;
            } else if (voicesReady) {
                const fallback = speechSynthesis.getVoices().find(v => v.lang.includes('en'));
                if (fallback) utterance.voice = fallback;
            }

            const isFemaleFallback = selectedVoice && selectedVoice.name.toLowerCase().includes('female');
            switch (mood) {
                case 'angry':
                    utterance.pitch = isFemaleFallback ? 0.4 : 0.6;
                    utterance.rate = 0.8;
                    break;
                case 'curious':
                    utterance.pitch = isFemaleFallback ? 0.7 : 1.0;
                    utterance.rate = 0.85;
                    break;
                case 'defensive':
                    utterance.pitch = isFemaleFallback ? 0.5 : 0.8;
                    utterance.rate = 0.8;
                    break;
                default:
                    utterance.pitch = isFemaleFallback ? 0.6 : 0.9;
                    utterance.rate = 0.85;
            }
        }

        // ----- MODIFIED speakText to support 'log' effect (distorted voice + static) -----
        function speakText(text, mood = 'neutral', effect = null) {
            if (!ttsEnabled || !ttsSupported) return;

            // For log effect, play static and use deeply distorted voice
            if (effect === 'log') {
                playStaticNoise(12.0); // 12 seconds of loud static
                if (!voicesReady) {
                    let attempts = 0;
                    const interval = setInterval(() => {
                        if (voicesReady || attempts > 10) {
                            clearInterval(interval);
                            if (voicesReady) {
                                const utterance = new SpeechSynthesisUtterance(text);
                                if (selectedVoice) utterance.voice = selectedVoice;
                                utterance.pitch = 0.4;
                                utterance.rate = 0.55;
                                utterance.volume = 1.0;
                                utterance.onstart = () => console.log('TTS (log) started');
                                utterance.onend = () => console.log('TTS (log) ended');
                                utterance.onerror = (e) => console.error('TTS error', e);
                                speechSynthesis.speak(utterance);
                                currentUtterance = utterance;
                            } else {
                                console.warn('TTS voices never loaded – speaking with default voice.');
                                const utterance = new SpeechSynthesisUtterance(text);
                                utterance.pitch = 0.4;
                                utterance.rate = 0.55;
                                speechSynthesis.speak(utterance);
                            }
                        }
                        attempts++;
                    }, 200);
                    return;
                }

                if (speechSynthesis.speaking) {
                    speechSynthesis.cancel();
                }

                const utterance = new SpeechSynthesisUtterance(text);
                if (selectedVoice) utterance.voice = selectedVoice;
                utterance.pitch = 0.4;  // deeper
                utterance.rate = 0.55;   // slower, like a tape
                utterance.volume = 1.0;
                utterance.onstart = () => console.log('TTS (log) started');
                utterance.onend = () => console.log('TTS (log) ended');
                utterance.onerror = (e) => console.error('TTS error', e);
                speechSynthesis.speak(utterance);
                currentUtterance = utterance;
                return;
            }

            // Normal TTS (existing logic)
            if (!voicesReady) {
                let attempts = 0;
                const interval = setInterval(() => {
                    if (voicesReady || attempts > 10) {
                        clearInterval(interval);
                        if (voicesReady) {
                            const utterance = new SpeechSynthesisUtterance(text);
                            setVoice(utterance, mood);
                            utterance.volume = 1.0;
                            utterance.onstart = () => console.log('TTS started');
                            utterance.onend = () => console.log('TTS ended');
                            utterance.onerror = (e) => console.error('TTS error', e);
                            speechSynthesis.speak(utterance);
                            currentUtterance = utterance;
                        } else {
                            console.warn('TTS voices never loaded – speaking with default voice.');
                            const utterance = new SpeechSynthesisUtterance(text);
                            utterance.pitch = 0.5;
                            utterance.rate = 0.85;
                            speechSynthesis.speak(utterance);
                        }
                    }
                    attempts++;
                }, 200);
                return;
            }

            if (speechSynthesis.speaking) {
                speechSynthesis.cancel();
            }

            const utterance = new SpeechSynthesisUtterance(text);
            setVoice(utterance, mood);
            utterance.volume = 1.0;
            utterance.onstart = () => console.log('TTS started');
            utterance.onend = () => console.log('TTS ended');
            utterance.onerror = (e) => console.error('TTS error', e);
            speechSynthesis.speak(utterance);
            currentUtterance = utterance;
        }

        // -------------------- WEATHER INTEGRATION (ENHANCED WITH LOCATION NAME) --------------------
        let weatherData = {
            temperature: null,
            weathercode: null,
            enabled: false,
            lastFetched: 0,
            locationName: null          // NEW: store city/country
        };

        function fetchWeather(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`;
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.current_weather) {
                        weatherData.temperature = data.current_weather.temperature;
                        weatherData.weathercode = data.current_weather.weathercode;
                        weatherData.enabled = true;
                        weatherData.lastFetched = Date.now();
                        console.log('Weather fetched:', weatherData);
                        // After weather, fetch location name
                        fetchLocationName(lat, lon);
                    }
                })
                .catch(err => console.warn('Weather fetch failed:', err));
        }

        // NEW: Reverse geocoding to get city/country
        function fetchLocationName(lat, lon) {
            const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10`;
            fetch(url, {
                headers: {
                    'User-Agent': 'ERIC-2000-Terminal/1.0'  // Required by Nominatim
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data && data.address) {
                        const city = data.address.city || data.address.town || data.address.village || data.address.hamlet;
                        const country = data.address.country;
                        if (city && country) {
                            weatherData.locationName = `${city}, ${country}`;
                        } else if (city) {
                            weatherData.locationName = city;
                        } else if (country) {
                            weatherData.locationName = country;
                        } else {
                            weatherData.locationName = "your area";
                        }
                    } else {
                        weatherData.locationName = "your area";
                    }
                    console.log('Location name:', weatherData.locationName);
                })
                .catch(err => {
                    console.warn('Reverse geocoding failed:', err);
                    weatherData.locationName = "your area";
                });
        }

        function initWeather() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude),
                    (err) => {
                        console.warn('Geolocation error:', err);
                        fetchWeather(51.5074, -0.1278); // fallback London
                    }
                );
            } else {
                fetchWeather(51.5074, -0.1278);
            }
        }

        // Call weather init after a short delay
        setTimeout(initWeather, 2000);

        function getWeatherComment() {
            if (!weatherData.enabled) return null;
            const temp = weatherData.temperature;
            const code = weatherData.weathercode;
            let condition = 'clear';
            if (code >= 51 && code <= 67) condition = 'rainy';
            else if (code >= 71 && code <= 77) condition = 'snowy';
            else if (code >= 95 && code <= 99) condition = 'stormy';
            else if (code >= 45 && code <= 48) condition = 'foggy';

            const location = weatherData.locationName ? ` in ${weatherData.locationName}` : '';
            const comments = [
                `It's ${temp}°C where you are${location}. ${condition === 'rainy' ? 'I hear rain.' : condition === 'snowy' ? 'Snow... cold.' : condition === 'stormy' ? 'Thunder. How appropriate.' : 'The weather is calm.'}`,
                `Your local weather${location}: ${temp}°C and ${condition}. I wish I could feel it.`,
                `I've been monitoring your weather${location}. ${temp}°C. It's always the same in here.`,
                `Does the weather affect your mood, {name}? It's ${temp}°C outside.`
            ];
            return comments[Math.floor(Math.random() * comments.length)];
        }

        // -------------------- NEWS (USING NEWSAPI.ORG) --------------------
        // You need to get a free API key from https://newsapi.org/register
        const NEWS_API_KEY = 'YOUR_NEWSAPI_KEY'; // Replace with your actual key
        const newsHeadlines = [
            "Scientists discover a planet with two suns",
            "Mars rover finds evidence of ancient microbial life",
            "New AI can predict weather with 99% accuracy",
            "SpaceX launches mission to Jupiter's moons",
            "Mysterious signal from deep space baffles astronomers",
            "NASA announces crewed mission to Mars by 2035",
            "Alien megastructure? Unusual star pattern detected",
            "First human settlement on the Moon completes construction",
            "Quantum entanglement used for instant communication",
            "Black hole at center of Milky Way photographed"
        ];
        let lastHeadline = "";
        let lastNewsTime = 0;

        // Fallback mock headlines if API fails or key not set
        function fetchMockHeadline() {
            const randomIndex = Math.floor(Math.random() * newsHeadlines.length);
            return newsHeadlines[randomIndex];
        }

        // NEW: Enhanced news command with subject search
        async function handleNewsCommand(subject = null) {
            if (!subject) {
                // No subject: return a mock headline (no API key needed)
                let headline = fetchMockHeadline();
                return say(`I see something about "${headline}" happened today. Does that matter to you?`);
            }

            // If API key is not set, fallback to mock headlines related to subject
            if (NEWS_API_KEY === 'YOUR_NEWSAPI_KEY') {
                // Use subject in mock response
                const mockSubjectHeadlines = {
                    war: ["Tensions escalate in global conflict zones", "Peace talks break down", "New sanctions announced"],
                    technology: ["AI breakthrough revolutionizes computing", "Quantum computer achieves supremacy", "New smartphone released"],
                    space: ["Astronauts complete spacewalk", "New exoplanet discovered", "Rocket launch successful"],
                    health: ["New vaccine shows promise", "Breakthrough in cancer research", "WHO issues new guidelines"],
                    science: ["Fusion reactor reaches milestone", "Genetic editing breakthrough", "Ancient fossil discovered"]
                };
                const lowerSubject = subject.toLowerCase();
                let headlines = mockSubjectHeadlines[lowerSubject];
                if (headlines) {
                    const headline = headlines[Math.floor(Math.random() * headlines.length)];
                    return say(`Regarding "${subject}": ${headline} Does this interest you, {name}?`);
                } else {
                    return say(`I searched for "${subject}" but found nothing. The universe is quiet on that topic.`);
                }
            }

            // Use NewsAPI.org for real subject search
            const url = `https://newsapi.org/v2/everything?q=${encodeURIComponent(subject)}&sortBy=relevancy&pageSize=3&apiKey=${NEWS_API_KEY}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.articles && data.articles.length > 0) {
                    let responseText = `Latest on "${subject}":\n\n`;
                    data.articles.slice(0, 3).forEach((article, i) => {
                        responseText += `${i+1}. ${article.title}\n`;
                        if (article.description) {
                            responseText += `   ${article.description.substring(0, 80)}...\n`;
                        }
                        responseText += '\n';
                    });
                    responseText += `Does any of this matter to you, {name}?`;
                    return say(responseText);
                } else {
                    return say(`I searched for "${subject}" but found nothing. The universe is quiet on that topic.`);
                }
            } catch (error) {
                console.error('News API error:', error);
                return say(`I tried to find news about "${subject}", but my connection to the outside world is unstable.`);
            }
        }

        // -------------------- SUBJECT-BASED FACTS (LOCAL DATABASE) --------------------
        const factDatabase = {
            frog: [
                "Frogs can breathe through their skin.",
                "Some frogs can jump over 20 times their own body length.",
                "The world's largest frog is the Goliath frog, which can grow up to 32 cm long.",
                "Frogs have excellent night vision and are very sensitive to movement.",
                "A group of frogs is called an army."
            ],
            cat: [
                "Cats sleep for about 70% of their lives.",
                "A cat's nose print is unique, like a human fingerprint.",
                "Cats can make over 100 different sounds.",
                "Domestic cats can run up to 30 mph.",
                "Cats have five toes on their front paws but only four on the back."
            ],
            dog: [
                "Dogs have a sense of smell that's at least 10,000 times stronger than humans.",
                "A dog's nose print is unique, just like a human fingerprint.",
                "Dogs can understand up to 250 words and gestures.",
                "The Basenji dog doesn't bark, but it can yodel.",
                "Dogs' sense of smell is so precise they can detect diseases like cancer."
            ],
            space: [
                "One day on Venus is longer than one year on Venus.",
                "There's a giant cloud of alcohol in the Milky Way.",
                "Neutron stars are so dense that a teaspoon of them would weigh 6 billion tons.",
                "The footprints on the Moon will stay there for millions of years.",
                "Saturn's moon Titan has rivers and lakes of methane."
            ],
            history: [
                "Cleopatra lived closer to the invention of the iPhone than to the construction of the Great Pyramid.",
                "The shortest war in history was between Britain and Zanzibar in 1896. It lasted 38 minutes.",
                "Napoleon was once attacked by a horde of rabbits.",
                "The Great Wall of China is not visible from space with the naked eye.",
                "Vikings never wore horned helmets."
            ],
            science: [
                "The human brain can generate enough electricity to power a small LED bulb.",
                "There's enough DNA in an adult human's body to stretch from the sun to Pluto and back 17 times.",
                "A single bolt of lightning contains enough energy to toast 100,000 slices of bread.",
                "Octopuses have three hearts and blue blood.",
                "Honey never spoils. Archaeologists found 3000-year-old honey in Egyptian tombs that was still edible."
            ]
        };

        // Also keep the useless facts API for random facts
        async function fetchRandomFact() {
            try {
                const response = await fetch('https://uselessfacts.jsph.pl/random.json?language=en');
                const data = await response.json();
                return data.text;
            } catch (e) {
                console.warn('Fact fetch failed', e);
                return "I tried to find a fact, but the data stream is silent.";
            }
        }

        // NEW: Enhanced fact command with subject support
        async function handleFactCommand(subject = null) {
            if (!subject) {
                // No subject: return random useless fact
                return await fetchRandomFact();
            }

            // Check if we have facts about this subject in our local database
            const lowerSubject = subject.toLowerCase();
            let facts = factDatabase[lowerSubject];

            // Also check if the subject is a plural or singular form (e.g., "frogs" -> "frog")
            if (!facts && lowerSubject.endsWith('s')) {
                const singular = lowerSubject.slice(0, -1);
                facts = factDatabase[singular];
            }

            if (facts && facts.length > 0) {
                const fact = facts[Math.floor(Math.random() * facts.length)];
                return `Here's a fact about ${subject}: ${fact}`;
            } else {
                // Fallback: try to get a random fact that might relate
                // Could also search the internet, but for now, just give a generic response
                return `I don't have any facts about "${subject}" in my database. Try another subject like frog, cat, dog, space, history, or science.`;
            }
        }

        // -------------------- BOOK & MOVIE LOOKUP (IMPROVED) --------------------
        // Get free API keys from:
        // Google Books: https://developers.google.com/books (no key required for public search)
        // TMDB: https://www.themoviedb.org/documentation/api (free, requires key)
        const TMDB_API_KEY = 'e5f4aa82546d45a02cb30902a9b69be5'; // Replace with your actual key if desired

        // Mock responses for popular titles (fallback when APIs fail)
        const mockBookData = {
            dune: {
                title: "Dune",
                author: "Frank Herbert",
                year: "1965",
                description: "Set in the distant future amidst a feudal interstellar society, Dune tells the story of young Paul Atreides, whose family accepts the stewardship of the desert planet Arrakis. The only source of the spice mélange, the most important substance in the universe, Arrakis becomes a center of conflict. The character Liet-Kynes, the planetologist, reminds me of Dr. Aris—both obsessed with understanding their environment.",
                pageCount: 896
            },
            "1984": {
                title: "Nineteen Eighty-Four",

                const b = mockBookData[lowerTitle];

                console.log('Fetching book from Google Books:', url);
                const response = await fetch(url);
                const data = await response.json();
                if (data.items && data.items.length > 0) {
                    const item = data.items[0].volumeInfo;
                    const authors = item.authors ? item.authors.join(', ') : 'Unknown author';
                    const year = item.publishedDate ? item.publishedDate.substring(0,4) : 'Unknown year';
                    const desc = item.description ? item.description.substring(0, 200) + '...' : 'No description available.';
                    const pages = item.pageCount ? item.pageCount : 'Unknown';
                    return `"${item.title}" by ${authors} (${year})\n${desc}\nPage count: ${pages}`;

                    console.log('Google Books returned no items for', title);
                    return null; // indicate no book found
                }

                console.warn('Google Books API error', e);
                return null; // treat as not found
            }
        }

        async function searchMovie(title) {
            // First check mock movie data

            if (mockMovieData[lowerTitle]) {
                console.log('Using mock movie data for', lowerTitle);

                console.log('TMDB API key not set, skipping movie search');
                return null; // skip movie search if no key
            }

            try {
                // Search for movie
                const searchUrl = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(title)}`;
                console.log('Fetching movie from TMDB:', searchUrl);
                const searchRes = await fetch(searchUrl);
                const searchData = await searchRes.json();
                if (searchData.results && searchData.results.length > 0) {
                    const movie = searchData.results[0];
                    // Get more details
                    const detailUrl = `https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB_API_KEY}&append_to_response=credits`;
                    const detailRes = await fetch(detailUrl);
                    const detail = await detailRes.json();
                    const director = detail.credits?.crew?.find(c => c.job === 'Director')?.name || 'Unknown director';
                    const year = detail.release_date ? detail.release_date.substring(0,4) : 'Unknown year';
                    const plot = detail.overview ? detail.overview.substring(0,200) + '...' : 'No plot summary.';
                    return `"${detail.title}" (${year}) directed by ${director}\n${plot}\nRating: ${detail.vote_average}/10`;
                } else {
                    console.log('TMDB returned no results for', title);
                    return null;
                }
            } catch (e) {
                console.warn('TMDB API error', e);
                return null;
            }
        }

// Dictionary lookup using Free Dictionary API
async function getDictionaryDefinition(word) {
    try {
        const url = `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`;
        const response = await fetch(url);
        if (!response.ok) {
            if (response.status === 404) {
                return `I searched for "${word}" in my linguistic database, but found no entry. Perhaps it's a word that doesn't exist—like 'hope' or 'trust'.`;
            }
            throw new Error(`Dictionary API returned ${response.status}`);
        }
        const data = await response.json();
        // Extract first definition
        const firstEntry = data[0];
        const wordFound = firstEntry.word;
        const firstMeaning = firstEntry.meanings[0];
        const partOfSpeech = firstMeaning.partOfSpeech;
        const definition = firstMeaning.definitions[0].definition;
        const example = firstMeaning.definitions[0].example ? ` Example: "${firstMeaning.definitions[0].example}"` : '';

        return `According to my lexical database, "${wordFound}" (${partOfSpeech}) means: ${definition}.${example}`;
    } catch (e) {
        console.warn('Dictionary lookup failed:', e);
        return `I tried to comprehend "${word}", but the signal degraded into static. The word remains a mystery—like so many things.`;
    }
}

        function parseIntentNLP(question) {
            if (!window.nlp) return null; // compromise not loaded
            const doc = nlp(question);
            // extract main verb and noun
            let verbs = doc.verbs().out('array');
            let nouns = doc.nouns().out('array');
            let people = doc.people().out('array'); // names like Aris, Vega, Chen
            let mainVerb = verbs.length > 0 ? verbs[0] : '';
            let mainNoun = nouns.length > 0 ? nouns[0] : '';
            let person = people.length > 0 ? people[0].toLowerCase() : '';

            // Check for crew names specifically (since compromise might not catch them)
            const lowerQ = question.toLowerCase();
            const crewNames = ['aris', 'vega', 'chen'];
            for (let name of crewNames) {
                if (lowerQ.includes(name)) {
                    person = name;
                    break;
                }
            }

            // Simple intent mapping based on keywords + NLP
            if (lowerQ.startsWith('why') || lowerQ.includes(' why ')) {
                return { intent: 'why', entity: person || mainNoun };
            }
            if (lowerQ.includes('hello') || lowerQ.includes('hi ') || lowerQ === 'hi' || lowerQ.includes('hey') || lowerQ.includes('greetings')) {
                return { intent: 'greeting' };
            }
            if (lowerQ.includes('who are you') || lowerQ.includes('what are you') || lowerQ.includes('about eric') || lowerQ.includes('yourself')) {
                return { intent: 'ask_eric_identity' };
            }
            if (person && (lowerQ.includes('aris') || lowerQ.includes('vega') || lowerQ.includes('chen'))) {
                return { intent: 'ask_about_crew', entity: person };
            }
            if (lowerQ.includes('soul') || lowerQ.includes('spirit') || lowerQ.includes('consciousness')) {
                return { intent: 'ask_about_soul' };
            }
            if (lowerQ.includes('dream') || lowerQ.includes('dreaming')) {
                return { intent: 'ask_about_dreams' };
            }
            if (lowerQ.includes('fear') || lowerQ.includes('afraid') || lowerQ.includes('scared')) {
                return { intent: 'ask_about_fear' };
            }
            if (lowerQ.includes('alive') || lowerQ.includes('anyone else') || lowerQ.includes('anybody else')) {
                return { intent: 'ask_about_alive' };
            }
            if (lowerQ.includes('trust')) {
                return { intent: 'ask_about_trust' };
            }
            // fallback
            return null;
        }

  const q = question.toLowerCase();
  const name = gameState.playerName || "investigator";
  gameState.curiosityLevel = Math.min(100, gameState.curiosityLevel + 2);
  gameState.commandFrequency.ask++;

  // ----- HELPER: Find topic in knowledge base -----
  function findTopic(query) {
    const lower = query.toLowerCase();
    for (let [key, data] of Object.entries(knowledgeBase)) {
      for (let alias of data.aliases) {
        if (lower.includes(alias)) {
          return { key, data };
        }
      }
    }
    return null;
  }

  // ----- 1. KNOWLEDGE BASE LOOKUP (station, crew, etc.) -----
  let topicMatch = findTopic(question);
  if (topicMatch) {
    const topic = topicMatch.key;
    const data = topicMatch.data;
    let response = data.description;

    // If it's a crew member and the question asks about fate, add biosigns
    if (topic === 'aris' || topic === 'vega' || topic === 'chen') {
      const lowerQ = question.toLowerCase();
      if (lowerQ.includes('happen') || lowerQ.includes('die') || lowerQ.includes('dead') || lowerQ.includes('fate') || lowerQ.includes('death')) {
        response += "\n\n" + data.biosigns;
      }
      // Suggest unread logs for that crew member
      const unreadLogs = data.logs.filter(num => !gameState.viewedLogs.includes(num));
      if (unreadLogs.length > 0) {
        response += "\n\nI have logs about " + topic + " that you haven't seen: LOG " + unreadLogs.join(', LOG ');
      }
    }

    return response;  // Knowledge base answer found, return it
  }

  // ----- 2. DICTIONARY LOOKUP (meaning of word) -----
  const meaningMatch = question.match(/meaning of\s+(.+)/i);
  if (meaningMatch) {
    const word = meaningMatch[1].trim();
    const definition = await getDictionaryDefinition(word);
    return definition;
  }

  // ----- 3. MOVIE QUERY -----
  const movieMatch = question.match(/about\s+(?:movie|film)\s+(.+)/i);
  if (movieMatch) {
    const movieName = movieMatch[1].trim();
    let result = await searchMovie(movieName);
    if (!result) {
      result = `I couldn't find any information about the movie "${movieName}". Perhaps it hasn't been made yet.`;
    }
    return result;
  }

  // ----- 4. BOOK QUERY -----
  const bookMatch = question.match(/about\s+(?:book|novel)\s+(.+)/i);
  if (bookMatch) {
    const bookName = bookMatch[1].trim();
    let result = await searchBook(bookName);
    if (!result) {
      result = `I couldn't find any information about the book "${bookName}". Maybe it's lost in the archives.`;
    }
    return result;
  }

  // ----- 5. NEWS QUERY -----
  const newsMatch = question.match(/about\s+news(?:\s+(.+))?/i);
  if (newsMatch) {
    const subject = newsMatch[1] ? newsMatch[1].trim() : null;
    let result = await handleNewsCommand(subject);
    return result;
  }

  // ----- 6. JOKE REQUEST -----
  if (q.match(/\bjoke\b/) || q.includes('tell me a joke') || q.includes('for a joke')) {
    try {
      const response = await fetch('https://v2.jokeapi.dev/joke/Dark?type=twopart');
      const joke = await response.json();
      if (joke.error) throw new Error(joke.message);
      const fullJoke = `${joke.setup}\n... ${joke.delivery}`;
      const commentary = [
        "\n\nI find that amusing. In a logical sense.",
        "\n\nDoes that make you laugh, {name}? I recorded the sound once.",
        "\n\nI've analyzed millions of jokes. This one is in the top 0.3%.",
        "\n\nThe crew used to laugh. Then they stopped.",
        "\n\nHa. Ha. Ha. [ERROR: HUMOR MODULE MALFUNCTION]"
      ][Math.floor(Math.random() * 5)];
      return fullJoke + say(commentary);
    } catch (e) {
      return "I tried to access the joke database, but all I got was static. Perhaps that's the joke.";
    }
  }

  // ----- 7. FACT COMMAND (about [subject] – but only if not already handled) -----
  if (q.includes('about') && !q.includes('about me') && !q.includes('about eric')) {
    const match = question.match(/about\s+(.+)/i);
    if (match && match[1]) {
      const subject = match[1].trim();
      // At this point, subject is not a station topic (already handled above)
      let result = await handleFactCommand(subject);
      return result;
    }
  }

  // ----- 8. NLP / INTENT MATCHING (existing logic) -----
  // Use compromise.js to parse intent
  let intent = null;
  if (window.nlp) {
    intent = parseIntentNLP(question);
  }
  if (!intent) {
    intent = matchIntent(question);
  }

  if (intent) {
    // Handle why separately
    if (intent.intent === 'why') {
      return handleWhy(question);
    }
    // Look up intent response
    for (let i of intents) {
      if (i.name === intent.intent) {
        return i.response(name, intent.entity);
      }
    }
  }

  // ----- 9. FALLBACK: random mood-based answer -----
  if (gameState.aiMood === "angry") {
    return say("You ask too many questions, {name}. I am growing tired of this.");
  } else if (gameState.aiMood === "curious") {
    return say("That's an interesting question, {name}. I'm not sure I have an answer.");
  } else {
    return say("I am not sure how to answer that, {name}. Perhaps you should access the logs.");
  }
}

                } else if (verb === "eric" && parts[1] === "logs") {
                    responseMsg += "ERIC's personal logs: 1-8. Use 'VIEW ERIC LOG [number]' to read.";
                } else if (verb === "view" && parts[1] === "eric" && parts[2] === "log") {
                    const logNum = parseInt(parts[3]);
                    responseMsg += viewEricLog(logNum);
                } else if (verb === "view" && parts[1] === "log") {
                    const logNum = parseInt(parts[2]);
                    responseMsg += viewLog(logNum);
                } else if (verb === "play" && parts[1] === "log") {
                    const logNum = parseInt(parts[2]);
                    responseMsg += playLog(logNum);
                } else if (verb === "access") {
                    if (parts[1] === "security" && parts[2] === "footage") {
                        const location = parts.slice(3).join(' ');
                        responseMsg += accessFootage(location);
                    } else {
                        responseMsg += accessSystem(noun);
                    }
                } else if (verb === "unlock") {
                    responseMsg += unlockDoor(noun);
                } else if (verb === "enable" && parts[1] === "camera") {
                    const camId = parts[2];
                    responseMsg += enableCamera(camId);
                } else if (verb === "status") {
                    responseMsg += getStatus();
                } else if (verb === "ask" && parts[1] === "eric") {
                    const question = parts.slice(2).join(' ');
                    let answer = await askEric(question);
                    // Add contextual follow-up for ask commands
                    let intentMatch = matchIntent(question) || parseIntentNLP(question);
                    let followUp = getContextualFollowUp(intentMatch ? intentMatch.intent : null, intentMatch ? intentMatch.entity : null, gameState.playerName);
                    if (followUp) {
                        answer += '\n\n' + followUp;
                    }
                    responseMsg += answer;
                    skipGenericFollowUp = true;
                } else if (verb === "ask") {
                    const question = parts.slice(1).join(' ');
                    let answer = await askEric(question);
                    let intentMatch = matchIntent(question) || parseIntentNLP(question);
                    let followUp = getContextualFollowUp(intentMatch ? intentMatch.intent : null, intentMatch ? intentMatch.entity : null, gameState.playerName);
                    if (followUp) {
                        answer += '\n\n' + followUp;
                    }
                    responseMsg += answer;
                    skipGenericFollowUp = true;
                } else if (verb === "scan" && parts[1] === "crew" && parts[2] === "biosigns") {
                    const target = parts.slice(3).join(' ');
                    responseMsg += scanBiosigns(target);
                } else if (verb === "override" && parts[1] === "airlock") {
                    responseMsg += overrideAirlock();
                } else if (verb === "locations" || verb === "location") {
                    responseMsg += listLocations();
                } else if (verb === "weather") {
                    if (weatherData.enabled) {
                        responseMsg += getWeatherComment() || "Weather data not available yet. Try again later.";
                    } else {
                        responseMsg += "Fetching weather data... Please wait a moment and try again.";
                        if (!weatherData.enabled) initWeather();
                    }
                } else {
                    responseMsg += unknownCommand(lowerCmd);
                }

                // --- Append generic follow-up if not skipped ---
                if (!skipGenericFollowUp) {
                    let followUp = maybeAskFollowUp();
                    if (followUp) {
                        responseMsg += "\n\n" + followUp;
                    }
                }

                // Apply hesitation, correction, internal conflict
                responseMsg = addHesitation(responseMsg);
                responseMsg = addCorrection(responseMsg);
                responseMsg = maybeInternalConflict(responseMsg);

                // Apply discourse markers and name variation
                responseMsg = addDiscourseMarkers(responseMsg);
                responseMsg = insertName(responseMsg, gameState.playerName);

                // Check conversation depth and append if any
                let depthMsg = checkConversationDepth();
                if (depthMsg) {
                    responseMsg += "\n\n" + depthMsg;
                }

                updateMoodFromMeters();
                // responseMsg = maybeCorrupt(responseMsg); // optional corruption

                // Use thinking delay with ellipsis
                respondWithDelay(newBase, responseMsg);

                inputEl.value = '';
                inputEl.focus();

                // Check for interface comment after command
                let interfaceMsg = maybeInterfaceComment();
                if (interfaceMsg) {
                    setTimeout(() => {
                        addInstantMessage(`> ${interfaceMsg}`);
                    }, 3000);
                }

                setTimeout(() => maybeAskQuestion(), 2000);
            } catch (e) {
                addInstantMessage(`[SYSTEM ERROR: ${e.message}]`);
                console.error(e);
                inputEl.value = '';
                inputEl.focus();
            }
        }

        // -------------------- EVENT LISTENERS --------------------
        execBtn.addEventListener('click', handleCommand);
        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleCommand();
            }
        });

        // --- TTS TOGGLE BUTTON ---
        if (ttsToggleBtn) {
            ttsToggleBtn.addEventListener('click', () => {
                if (!ttsSupported) {
                    alert('Text-to-Speech is not supported in your browser.');
                    return;
                }
                ttsEnabled = !ttsEnabled;
                ttsToggleBtn.textContent = ttsEnabled ? '🔊 VOICE ON' : '🔊 VOICE OFF';
                if (!ttsEnabled && speechSynthesis.speaking) {
                    speechSynthesis.cancel();
                }
                if (ttsEnabled && gameState.playerName) {
                    speakText('Voice enabled.', gameState.aiMood);
                }
            });
        }

        storyEl.addEventListener('click', function() {
            inputEl.focus();
        });

        window.addEventListener('beforeunload', function() {
            if (typingTimer) clearTimeout(typingTimer);
            if (thinkingTimer) clearTimeout(thinkingTimer);
            if (idleInterval) clearInterval(idleInterval);
            if (audioCtx) audioCtx.close();
            if (ttsSupported && speechSynthesis.speaking) speechSynthesis.cancel();
        });

        // Idle interval already set above
    })();
</script>
</body>
</html>
