<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUEST ADVENTURE CREATOR · NIGHTFALL GAMES 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* (same retro styles – keep as before) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a0f0a;
            background-image: 
                radial-gradient(circle at 30% 40%, #4a2a1a 0%, transparent 30%),
                repeating-linear-gradient(0deg, rgba(255,200,100,0.03) 0px, rgba(0,0,0,0.3) 2px, transparent 3px);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 16px;
            margin: 0;
            color: #f0c674;
            text-shadow: 0 0 5px #b87c30, 0 0 2px #8b5a2b;
        }

        .crt {
            background-color: #1e2b1a;
            border: 6px solid #6b4f3a;
            border-radius: 24px 24px 16px 16px;
            box-shadow: 
                inset 0 0 30px #3f2e1e,
                0 20px 30px rgba(0,0,0,0.8),
                0 0 0 2px #b88a5e inset;
            padding: 30px 25px;
            max-width: 1200px;
            width: 100%;
            position: relative;
        }

        .crt::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, rgba(70,40,10,0.2) 0%, transparent 60%);
            border-radius: 18px;
            pointer-events: none;
            z-index: 2;
        }

        .crt::after {
            content: "";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: repeating-linear-gradient(0deg, rgba(100,60,20,0.2) 0px, rgba(120,70,20,0.1) 2px, transparent 3px, transparent 5px);
            border-radius: 18px;
            pointer-events: none;
            z-index: 3;
        }

        .terminal {
            background-color: #1e2b1a;
            border: 2px solid #8b6b45;
            padding: 24px 20px;
            border-radius: 12px;
            box-shadow: inset 0 0 20px #3f2e1e;
            position: relative;
            z-index: 5;
        }

        .cursor-block {
            display: inline-block;
            width: 14px;
            height: 18px;
            background-color: #f0b060;
            vertical-align: middle;
            margin-left: 5px;
            box-shadow: 0 0 10px #ffaa33;
        }

        .header {
            border-bottom: 4px dashed #8b6b45;
            padding-bottom: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            font-size: 11px;
            color: #e2b87a;
            letter-spacing: 1px;
        }

        .title-main {
            font-size: 18px;
            line-height: 1.5;
            text-transform: uppercase;
            color: #f0c674;
            text-shadow: 0 0 8px #b87c30;
        }
        .title-main span {
            background-color: #5a3e2b;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
            color: #000;
            text-shadow: none;
        }

        .date {
            font-size: 10px;
            background: #3f2e1e;
            padding: 8px 10px;
            border-radius: 30px;
            border: 1px solid #b88a5e;
        }

        .casefile-box {
            background-color: #0f1a0f;
            border: 4px solid #8b6b45;
            padding: 25px 20px;
            margin: 25px 0 30px 0;
            box-shadow: 0 0 0 2px #3f2e1e, inset 0 0 20px #1e2b1a;
            font-size: 13px;
            line-height: 2;
            color: #f0c674;
            min-height: 260px;
            overflow-y: auto;
            max-height: 420px;
        }

        .encounter-output {
            word-break: break-word;
            white-space: pre-wrap;
        }

        .file-list {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .file-list li {
            margin: 12px 0;
            cursor: pointer;
            border-left: 4px solid #8b6b45;
            padding-left: 12px;
            transition: 0.1s;
        }
        .file-list li:hover {
            border-left-color: #e0b070;
            background: #3f2e1e;
            text-shadow: 0 0 8px #f0c674;
        }
        .file-list li::before {
            content: "📜 ";
            color: #b88a5e;
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            gap: 5px;
            border-bottom: 2px solid #8b6b45;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #0f1a0f;
            border: 2px solid #8b6b45;
            border-bottom: none;
            color: #f0c674;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            margin-bottom: -2px;
        }
        .tab-btn.active {
            background: #3f2e1e;
            border-color: #e0b070;
            color: #ffdfaa;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* Create form layout */
        .create-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }
        .form-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-field label {
            font-size: 9px;
            color: #e2b87a;
            letter-spacing: 1px;
        }
        .form-field input, .form-field select, .form-field textarea {
            background: #0f1a0f;
            border: 2px solid #8b6b45;
            color: #f0c674;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 8px 8px;
            width: 100%;
            outline: none;
            box-shadow: inset 0 0 8px #1e2b1a;
        }
        .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
            border-color: #e0b070;
        }
        .form-field select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23f0c674" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 12px;
        }

        /* Room editor */
        .room-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }
        .room-card {
            border: 2px solid #8b6b45;
            background: #0f1a0f;
            padding: 15px;
            border-radius: 8px;
        }
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .room-header h4 {
            font-size: 12px;
            color: #e0b070;
        }
        .remove-room {
            background: #5a3e2b;
            border: 2px solid #b88a5e;
            color: #f0c674;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 4px 8px;
            cursor: pointer;
        }
        .room-exits {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .room-exits select {
            font-size: 8px;
            padding: 4px;
        }

        /* Checkbox groups */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: #0f1a0f;
            border: 2px solid #8b6b45;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 9px;
            width: calc(33% - 5px);
        }
        .checkbox-item input[type="checkbox"] {
            width: auto;
            accent-color: #f0c674;
        }

        .form-actions {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        .form-actions button {
            background: #3f2e1e;
            border: 3px solid #8b6b45;
            color: #f0c674;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            padding: 12px 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #0f1a0f;
            transition: 0.05s linear;
            flex: 1;
        }
        .form-actions button:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .form-actions button:hover {
            background: #5a4a3a;
            border-color: #e0b070;
        }

        .button-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            justify-content: center;
            margin-top: 25px;
        }

        .retro-btn {
            background-color: #3f2e1e;
            border: 4px solid #8b6b45;
            color: #f0c674;
            font-family: 'Press Start 2P', monospace;
            font-size: 13px;
            padding: 16px 22px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 8px 0 #0f1a0f, 0 10px 10px black;
            transition: all 0.08s linear;
            text-shadow: 0 0 5px #b87c30;
            flex: 1 1 200px;
        }

        .retro-btn:active {
            transform: translateY(7px);
            box-shadow: 0 2px 0 #0f1a0f, 0 5px 12px black;
        }

        .retro-btn:hover {
            background-color: #5a4a3a;
            border-color: #e0b070;
            color: #ffdfaa;
        }

        .signature {
            margin-top: 30px;
            text-align: right;
            font-size: 9px;
            color: #8b6b45;
            border-top: 2px dotted #8b6b45;
            padding-top: 18px;
            letter-spacing: 1.5px;
        }

        .signature span {
            background: #1e2b1a;
            padding: 4px 8px;
        }

        .prompt-line {
            color: #e2b87a;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .prompt-line::before {
            content: "⚔️ ";
            font-weight: bold;
            color: #f0b060;
        }

        .command-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        .command-btn {
            background: #0f1a0f;
            border: 2px solid #8b6b45;
            color: #f0c674;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 8px 12px;
            cursor: pointer;
            box-shadow: 0 3px 0 #0a0f0a;
            transition: 0.05s linear;
        }
        .command-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }
        .command-btn:hover {
            background: #3f2e1e;
            border-color: #e0b070;
        }

        .preview-box {
            background: #0f1a0f;
            border: 2px solid #8b6b45;
            padding: 15px;
            margin-top: 15px;
            font-size: 10px;
            white-space: pre-wrap;
        }

        .search-box {
            margin-bottom: 15px;
        }
        .search-box input {
            width: 100%;
            padding: 10px;
            background: #0f1a0f;
            border: 2px solid #8b6b45;
            color: #f0c674;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="crt">
        <div class="terminal">
            <div class="header">
                <div class="title-main">
                    🏰 QUEST CREATOR <span>NIGHTFALL 1984</span>
                </div>
                <div class="date">
                    // 1984-10-21 // v3.0 //
                </div>
            </div>

            <div class="prompt-line">ARCHIVE:: QUEST #<span id="questNum">Q001</span></div>

            <div class="casefile-box">
                <div class="encounter-output" id="encounterDisplay">
                    > WELCOME TO QUEST ADVENTURE CREATOR.<span class="cursor-block"></span>
                </div>
            </div>

            <div class="button-panel">
                <button class="retro-btn" id="randomQuestBtn">🎲 RANDOM QUEST</button>
                <button class="retro-btn" id="createQuestBtn">✎ CREATE QUEST</button>
                <button class="retro-btn" id="myQuestsBtn">📜 MY QUESTS</button>
                <button class="retro-btn" id="loadQuestBtn">⚡ LOAD QUEST</button>
                <button class="retro-btn" id="startAdventureBtn" style="display: none;">🏁 START ADVENTURE</button>
            </div>

            <div class="signature">
                <span> NIGHTFALL GAMES /// TEXT ADVENTURE GENERATOR /// 48K RAM </span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ------------------------------------------------------------
            //  QUEST ADVENTURE CREATOR – ENHANCED VERSION
            //  Nightfall Games 1984
            // ------------------------------------------------------------

            // ----- Helper functions -----
            function randFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

            // ----- Default pools (used for random generation) -----
            const LOCATION_TYPES = ['castle', 'forest', 'mountain', 'swamp', 'village'];
            const QUEST_TITLES = [
                "The Lost Crown", "Curse of the Vampire", "Dragon's Hoard", "The Witch's Brew",
                "Goblin Trouble", "The Sunken Temple", "The King's Ransom", "Stolen Amulet",
                "The Dark Sorcerer", "The Forgotten Prince", "The Seventh Seal", "The Iron Key"
            ];
            const ANTAGONISTS = [
                "Black Knight", "Necromancer", "Goblin King", "Lich", "Dragon", "Evil Enchantress",
                "Troll Chieftain", "Cult Leader", "Demon", "Shadow Beast"
            ];
            const ALLIES_POOL = [
                "Old Wizard", "Brave Squire", "Forest Elf", "Dwarven Miner", "Village Elder",
                "Mystic Herbalist", "Ranger", "Talking Raven"
            ];
            const MONSTERS_POOL = [
                "Goblin", "Skeleton", "Zombie", "Giant Rat", "Wolf", "Orc", "Harpy", "Ogre", "Wraith", "Spider"
            ];
            const ITEMS_POOL = [
                "Iron Sword", "Healing Potion", "Torch", "Rope", "Magic Ring", "Silver Dagger",
                "Lockpicks", "Herbs", "Chainmail", "Shield", "Holy Water", "Bow & Arrow"
            ];

            // ----- Extended QuestFile class -----
            class QuestFile {
                constructor(fields = {}) {
                    this.id = fields.id || 'Q' + Math.floor(Math.random() * 900 + 100);
                    this.title = fields.title || randFrom(QUEST_TITLES);
                    this.locationType = fields.locationType || randFrom(LOCATION_TYPES);
                    this.size = fields.size || 'medium'; // kept for backward compatibility
                    this.difficulty = fields.difficulty || 'medium';
                    this.antagonist = fields.antagonist || randFrom(ANTAGONISTS);
                    this.goal = fields.goal || 'Defeat the enemy and retrieve the treasure';
                    this.extra = fields.extra || '';

                    // New fields
                    this.rooms = fields.rooms || this.generateDefaultRooms();
                    this.monsterDefinitions = fields.monsterDefinitions || this.generateDefaultMonsters();
                    this.allyDefinitions = fields.allyDefinitions || this.generateDefaultAllies();
                    this.itemDefinitions = fields.itemDefinitions || this.generateDefaultItems();
                    this.randomEncounterTable = fields.randomEncounterTable || this.generateDefaultEncounterTable();
                    this.objectives = fields.objectives || [{ description: this.goal, optional: false }];
                }

                generateDefaultRooms() {
                    // Create a simple 3-room default map
                    return [
                        { id: 0, name: "Entrance", desc: "The beginning of your journey.", landmark: "", items: [], monsters: [], allies: [], exits: { north: 1 }, locked: false, secretPassage: false },
                        { id: 1, name: "Great Hall", desc: "A large hall with pillars.", landmark: "A mysterious altar", items: [], monsters: [0], allies: [], exits: { south: 0, east: 2 }, locked: false, secretPassage: false },
                        { id: 2, name: "Treasure Chamber", desc: "Glittering gold fills the room.", landmark: "Dragon's Hoard", items: [0], monsters: [], allies: [], exits: { west: 1 }, locked: true, secretPassage: false }
                    ];
                }

                generateDefaultMonsters() {
                    return [
                        { id: 0, name: "Goblin", baseHp: 6, baseDamage: 2, special: "", boss: false },
                        { id: 1, name: "Skeleton", baseHp: 8, baseDamage: 3, special: "undead", boss: false },
                        { id: 2, name: "Dragon", baseHp: 30, baseDamage: 8, special: "breathes fire", boss: true }
                    ];
                }

                generateDefaultAllies() {
                    return [
                        { id: 0, name: "Old Wizard", behavior: "hint" },
                        { id: 1, name: "Brave Squire", behavior: "fight" },
                        { id: 2, name: "Village Elder", behavior: "trade" }
                    ];
                }

                generateDefaultItems() {
                    return [
                        { id: 0, name: "Iron Sword", type: "weapon", effect: "+2 damage", consumable: false, questItem: false },
                        { id: 1, name: "Healing Potion", type: "consumable", effect: "heal 8 HP", consumable: true, questItem: false },
                        { id: 2, name: "Torch", type: "tool", effect: "reveals secret passages", consumable: false, questItem: false },
                        { id: 3, name: "Silver Dagger", type: "weapon", effect: "+2 vs undead", consumable: false, questItem: false }
                    ];
                }

                generateDefaultEncounterTable() {
                    return [
                        { monsterId: 0, probability: 0.5 },
                        { monsterId: 1, probability: 0.3 },
                        { monsterId: 2, probability: 0.2 }
                    ];
                }

                // Convert to plain object for storage
                toJSON() {
                    return {
                        id: this.id,
                        title: this.title,
                        locationType: this.locationType,
                        size: this.size,
                        difficulty: this.difficulty,
                        antagonist: this.antagonist,
                        goal: this.goal,
                        extra: this.extra,
                        rooms: this.rooms,
                        monsterDefinitions: this.monsterDefinitions,
                        allyDefinitions: this.allyDefinitions,
                        itemDefinitions: this.itemDefinitions,
                        randomEncounterTable: this.randomEncounterTable,
                        objectives: this.objectives
                    };
                }

                // Create formatted display string
                formatDisplay() {
                    let s = `${this.id} // "${this.title}"\n`;
                    s += `> LOCATION: ${this.locationType.toUpperCase()}\n`;
                    s += `> DIFFICULTY: ${this.difficulty.toUpperCase()}\n`;
                    s += `> ANTAGONIST: ${this.antagonist}\n`;
                    s += `> QUEST: ${this.goal}\n`;
                    if (this.extra) s += `> NOTES: ${this.extra}\n`;
                    s += `> ROOMS: ${this.rooms.length}\n`;
                    s += `> MONSTERS: ${this.monsterDefinitions.length}\n`;
                    s += `> ALLIES: ${this.allyDefinitions.length}\n`;
                    s += `> ITEMS: ${this.itemDefinitions.length}\n`;
                    s += `> STATUS: READY FOR ADVENTURE`;
                    return s;
                }
            }

            // ----- Persistent storage -----
            let savedQuests = [];
            try {
                const stored = localStorage.getItem('nightfall_quests_v3');
                if (stored) {
                    const parsed = JSON.parse(stored);
                    // Convert plain objects back to QuestFile instances
                    savedQuests = parsed.map(q => new QuestFile(q));
                } else savedQuests = [];
            } catch (e) { savedQuests = []; }

            function saveQuests() {
                localStorage.setItem('nightfall_quests_v3', JSON.stringify(savedQuests.map(q => q.toJSON())));
            }

            // ----- Current quest & game state -----
            let currentQuest = null;
            let adventureState = null;

            // ----- UI elements -----
            const displayEl = document.getElementById('encounterDisplay');
            const questNumSpan = document.getElementById('questNum');
            const startBtn = document.getElementById('startAdventureBtn');

            function setDisplay(text, id = '----') {
                displayEl.innerHTML = '';
                const pre = document.createElement('div');
                pre.className = 'encounter-output';
                pre.innerText = text;
                displayEl.appendChild(pre);
                questNumSpan.innerText = id;
            }

            function loadQuest(quest) {
                currentQuest = quest;
                setDisplay(quest.formatDisplay(), quest.id);
                startBtn.style.display = 'inline-block';
                adventureState = null;
            }

            // ----- Generate random quest (updated) -----
            function generateRandomQuest() {
                const quest = new QuestFile(); // uses default random values
                savedQuests.push(quest);
                saveQuests();
                loadQuest(quest);
            }

            // ----- Tabbed creation form -----
            function showCreateForm(existingQuest = null) {
                const quest = existingQuest ? new QuestFile(existingQuest.toJSON()) : new QuestFile();
                const formDiv = document.createElement('div');
                formDiv.className = 'create-form';

                // Build tabs
                const tabs = ['basic', 'rooms', 'characters', 'items', 'objectives'];
                const tabNames = ['BASIC', 'ROOMS', 'CHARACTERS', 'ITEMS', 'OBJECTIVES'];

                let html = `<div class="tab-bar">`;
                tabs.forEach((t, i) => {
                    html += `<button class="tab-btn ${i === 0 ? 'active' : ''}" data-tab="${t}">${tabNames[i]}</button>`;
                });
                html += `</div>`;

                // Tab contents
                tabs.forEach((t, i) => {
                    html += `<div class="tab-content ${i === 0 ? 'active' : ''}" data-tab-content="${t}">`;
                    html += getTabContent(t, quest);
                    html += `</div>`;
                });

                html += `<div class="form-actions">
                    <button id="save-quest-btn">SAVE QUEST</button>
                    <button id="cancel-create-btn">CANCEL</button>
                </div>`;

                formDiv.innerHTML = html;
                displayEl.innerHTML = '';
                displayEl.appendChild(formDiv);
                questNumSpan.innerText = 'EDIT';

                // Attach tab switching
                const tabBtns = formDiv.querySelectorAll('.tab-btn');
                tabBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        tabBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        const tab = btn.dataset.tab;
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                        document.querySelector(`.tab-content[data-tab-content="${tab}"]`).classList.add('active');
                    });
                });

                // Room management
                const roomListDiv = formDiv.querySelector('.room-list');
                if (roomListDiv) {
                    renderRoomList(roomListDiv, quest);
                }

                // Character management
                const monsterListDiv = formDiv.querySelector('#monster-list');
                if (monsterListDiv) {
                    renderMonsterList(monsterListDiv, quest);
                }
                const allyListDiv = formDiv.querySelector('#ally-list');
                if (allyListDiv) {
                    renderAllyList(allyListDiv, quest);
                }

                // Item management
                const itemListDiv = formDiv.querySelector('#item-list');
                if (itemListDiv) {
                    renderItemList(itemListDiv, quest);
                }

                // Random encounter table
                const encTableDiv = formDiv.querySelector('#encounter-table');
                if (encTableDiv) {
                    renderEncounterTable(encTableDiv, quest);
                }

                // Objectives
                const objectivesDiv = formDiv.querySelector('#objectives-list');
                if (objectivesDiv) {
                    renderObjectives(objectivesDiv, quest);
                }

                // Preview
                const previewDiv = formDiv.querySelector('#preview-content');
                if (previewDiv) {
                    updatePreview(previewDiv, quest);
                }

                // Save button
                document.getElementById('save-quest-btn').addEventListener('click', () => {
                    // Gather basic info
                    quest.title = document.getElementById('create-title')?.value.trim() || 'Untitled';
                    quest.locationType = document.getElementById('create-locType')?.value || 'castle';

                    quest.goal = document.getElementById('create-goal')?.value.trim() || 'Unknown quest';
                    quest.extra = document.getElementById('create-extra')?.value.trim() || '';

                    // Gather rooms (already updated via event listeners)
                    // Gather monsters (already updated)
                    // Gather allies (already updated)
                    // Gather items (already updated)
                    // Gather encounter table (already updated)
                    // Gather objectives (already updated)

                    // Validate at least one room
                    if (!quest.rooms || quest.rooms.length === 0) {
                        alert('You must create at least one room.');
                        return;
                    }

                    // Save
                    if (!existingQuest) {
                        savedQuests.push(quest);
                    } else {
                        // Replace existing
                        const index = savedQuests.findIndex(q => q.id === existingQuest.id);
                        if (index !== -1) savedQuests[index] = quest;
                        else savedQuests.push(quest);
                    }
                    saveQuests();
                    loadQuest(quest);
                });

                document.getElementById('cancel-create-btn').addEventListener('click', () => {
                    if (currentQuest) setDisplay(currentQuest.formatDisplay(), currentQuest.id);
                    else generateRandomQuest();
                });
            }

            // ----- My Quests with search/filter -----
            function showMyQuests() {
                if (savedQuests.length === 0) {
                    setDisplay("> NO SAVED QUESTS.\n> CREATE ONE WITH 'CREATE QUEST'.", '----');
                    return;
                }

                const container = document.createElement('div');
                container.innerHTML = `
                    <div class="search-box">
                        <input type="text" id="quest-search" placeholder="FILTER BY TITLE OR LOCATION...">
                    </div>
                    <ul class="file-list" id="quest-list"></ul>
                    <div class="form-actions" style="margin-top:10px;">
                        <button id="duplicate-selected" disabled>DUPLICATE SELECTED</button>
                    </div>
                `;
                displayEl.innerHTML = '';
                displayEl.appendChild(container);
                questNumSpan.innerText = 'LIST';

                const listEl = document.getElementById('quest-list');
                const searchInput = document.getElementById('quest-search');
                const duplicateBtn = document.getElementById('duplicate-selected');
                let selectedIndex = -1;

                function renderFilteredList(filter) {
                    listEl.innerHTML = '';
                    const filtered = savedQuests.filter((q, idx) => {
                        const text = (q.title + ' ' + q.locationType).toLowerCase();
                        return text.includes(filter.toLowerCase());
                    });
                    filtered.forEach((q, idx) => {
                        const li = document.createElement('li');
                        li.textContent = `${q.id} — ${q.title} (${q.locationType})`;
                        li.dataset.realIndex = savedQuests.indexOf(q);
                        li.addEventListener('click', e => {
                            document.querySelectorAll('#quest-list li').forEach(l => l.style.background = '');
                            li.style.background = '#3f2e1e';
                            selectedIndex = parseInt(li.dataset.realIndex);
                            duplicateBtn.disabled = false;
                        });
                        li.addEventListener('dblclick', e => {
                            loadQuest(savedQuests[parseInt(li.dataset.realIndex)]);
                        });
                        listEl.appendChild(li);
                    });
                }

                renderFilteredList('');
                searchInput.addEventListener('input', () => renderFilteredList(searchInput.value));

                duplicateBtn.addEventListener('click', () => {
                    if (selectedIndex >= 0) {
                        const original = savedQuests[selectedIndex];
                        const copy = new QuestFile(original.toJSON());
                        copy.id = 'Q' + Math.floor(Math.random() * 900 + 100);
                        savedQuests.push(copy);
                        saveQuests();
                        showMyQuests();
                    }
                });
            }

            // ----- Adventure engine (updated to use new data) -----
            function initAdventure(quest) {
                // Build rooms from quest.rooms (already defined)
                const rooms = quest.rooms.map(room => ({
                    ...room,
                    // Ensure each room has proper arrays
                    items: room.items || [],
                    monsters: room.monsters ? room.monsters.map(mId => {
                        const def = quest.monsterDefinitions[mId];
                        if (!def) return null;
                        return {
                            ...def,
                            hp: def.baseHp,
                            maxHp: def.baseHp,
                            damage: def.baseDamage
                        };
                    }).filter(m => m) : [],
                    allies: room.allies ? room.allies.map(aId => {
                        return quest.allyDefinitions[aId];
                    }).filter(a => a) : []
                }));

                const playerHpBase = { easy: 20, medium: 15, hard: 10 }[quest.difficulty] || 15;
                adventureState = {
                    quest: quest,
                    rooms: rooms,
                    currentRoomId: 0,
                    playerHp: playerHpBase,
                    playerMaxHp: playerHpBase,
                    inventory: [], // start empty; items will be found in rooms
                    combat: null,
                    message: '',
                    gameOver: false,
                    attackBonus: 0,
                    pendingTrade: null
                };
            }

            function renderAdventure() {
                if (!adventureState || adventureState.gameOver) {
                    if (adventureState && adventureState.message) setDisplay(adventureState.message, currentQuest?.id || 'END');
                    else setDisplay('Game over.', currentQuest?.id || 'END');
                    return;
                }
                const state = adventureState;
                const room = state.rooms[state.currentRoomId];
                let text = '';
                if (state.message) {
                    text += `> ${state.message}\n\n`;
                    state.message = '';
                }
                text += `> ${room.name}\n${room.desc}\n`;
                if (room.landmark) text += `[Landmark here: ${room.landmark}]\n`;
                if (state.combat) {
                    const m = state.combat.monster;
                    text += `\n⚔️ COMBAT with ${m.name} (HP:${m.hp}/${m.maxHp}) ⚔️\n`;
                } else {
                    if (room.monsters.length > 0) {
                        text += `\n⚠️ Monsters here: ${room.monsters.map(m=>m.name).join(', ')}\n`;
                    }
                    if (room.items.length > 0) {
                        // resolve item names
                        const itemNames = room.items.map(iId => {
                            const def = state.quest.itemDefinitions[iId];
                            return def ? def.name : 'Unknown';
                        }).join(', ');
                        text += `📦 Items: ${itemNames}\n`;
                    }
                    if (room.allies && room.allies.length > 0) {
                        const allyNames = room.allies.map(a => a.name).join(', ');
                        text += `🧙 Allies: ${allyNames}\n`;
                    }
                    if (room.locked) text += `🔒 A door is locked.\n`;
                    text += `\nHP: ${state.playerHp}/${state.playerMaxHp}   Inventory: ${state.inventory.length>0?state.inventory.map(i=>i.name).join(', '):'empty'}\n`;
                }

                displayEl.innerHTML = '';
                const pre = document.createElement('div');
                pre.className = 'encounter-output';
                pre.innerText = text;
                displayEl.appendChild(pre);

                const btnContainer = document.createElement('div');
                btnContainer.className = 'command-grid';

                if (state.combat) {
                    addCmd(btnContainer, '⚔️ Attack', () => combatRound('attack'));
                    addCmd(btnContainer, '🏃 Flee', () => combatRound('flee'));
                } else if (state.pendingTrade) {
                    addCmd(btnContainer, '✅ Accept trade', () => acceptTrade());
                    addCmd(btnContainer, '❌ Refuse', () => refuseTrade());
                } else {
                    const exits = room.exits;
                    if (exits.north !== undefined) addCmd(btnContainer, '⬆️ North', () => moveTo(exits.north));
                    if (exits.south !== undefined) addCmd(btnContainer, '⬇️ South', () => moveTo(exits.south));
                    if (exits.east !== undefined) addCmd(btnContainer, '➡️ East', () => moveTo(exits.east));
                    if (exits.west !== undefined) addCmd(btnContainer, '⬅️ West', () => moveTo(exits.west));
                    if (exits.up !== undefined) addCmd(btnContainer, '⬆️ Up', () => moveTo(exits.up));
                    if (exits.down !== undefined) addCmd(btnContainer, '⬇️ Down', () => moveTo(exits.down));
                    if (exits.secret !== undefined) addCmd(btnContainer, '🔦 Secret', () => moveTo(exits.secret));

                    addCmd(btnContainer, '🔍 Look', () => { renderAdventure(); });
                    if (room.items.length > 0) addCmd(btnContainer, '📥 Take item', () => takeItem());
                    if (room.monsters.length > 0) addCmd(btnContainer, '⚔️ Engage', () => engageCombat());
                    if (room.allies && room.allies.length > 0) addCmd(btnContainer, '💬 Talk to ally', () => talkAlly());
                    addCmd(btnContainer, '📦 Inventory', () => showInventory());
                    addCmd(btnContainer, '💊 Use item', () => useItem());
                }
                addCmd(btnContainer, '⏎ Return to quest', () => { adventureState = null; loadQuest(currentQuest); });

                displayEl.appendChild(btnContainer);
            }

            function addCmd(container, label, handler) {
                const btn = document.createElement('button');
                btn.className = 'command-btn';
                btn.textContent = label;
                btn.addEventListener('click', handler);
                container.appendChild(btn);
            }

            function moveTo(roomId) {
                if (adventureState.combat) { adventureState.message = 'You are in combat!'; renderAdventure(); return; }
                const state = adventureState;
                const currentRoom = state.rooms[state.currentRoomId];
                if (currentRoom.locked && (
                    roomId === currentRoom.exits.east || roomId === currentRoom.exits.west ||
                    roomId === currentRoom.exits.north || roomId === currentRoom.exits.south)) {
                    // Check if player has lockpicks
                    if (!state.inventory.some(i => i.name === 'Lockpicks')) {
                        state.message = 'The door is locked. You need lockpicks.';
                        renderAdventure();
                        return;
                    }
                }
                state.currentRoomId = roomId;

                // Random encounter?
                if (state.quest.randomEncounterTable && state.quest.randomEncounterTable.length > 0 && Math.random() < 0.3) {
                    // Pick a random monster from table based on probability
                    const table = state.quest.randomEncounterTable;
                    const r = Math.random();
                    let cumulative = 0;
                    for (let entry of table) {
                        cumulative += entry.probability;
                        if (r <= cumulative) {
                            const def = state.quest.monsterDefinitions[entry.monsterId];
                            if (def) {
                                const monster = { ...def, hp: def.baseHp, maxHp: def.baseHp, damage: def.baseDamage };
                                state.rooms[roomId].monsters.push(monster);
                                state.message = `A wild ${def.name} appears!`;
                            }
                            break;
                        }
                    }
                } else {
                    state.message = '';
                }
                renderAdventure();
            }

            function combatRound(action) {
                const state = adventureState;
                if (!state.combat) return;
                const monster = state.combat.monster;
                let playerDamage = Math.floor(Math.random() * 6) + 1 + state.attackBonus;
                const monsterDamage = monster.damage;

                if (action === 'attack') {
                    if (monster.special && monster.special.includes('undead') && state.inventory.some(i => i.name === 'Silver Dagger')) {
                        playerDamage += 2;
                    }
                    monster.hp -= playerDamage;
                    let msg = `You hit ${monster.name} for ${playerDamage} damage. `;
                    if (monster.hp <= 0) {
                        msg += `${monster.name} is slain!`;
                        const room = state.rooms[state.currentRoomId];
                        room.monsters = room.monsters.filter(m => m !== monster);
                        state.combat = null;
                        if (monster.boss) {
                            msg += ' You have defeated the boss! A treasure chest appears.';
                            // Add boss loot: maybe a special item
                            const treasureItem = state.quest.itemDefinitions.find(i => i.name === 'Dragon Hoard' || i.type === 'quest');
                            if (treasureItem) room.items.push(treasureItem.id);
                        }
                        state.message = msg;
                        renderAdventure();
                        return;
                    } else {
                        state.playerHp -= monsterDamage;
                        msg += `${monster.name} hits you for ${monsterDamage}.`;
                        if (state.playerHp <= 0) {
                            msg += ' You have died... GAME OVER.';
                            state.gameOver = true;
                            state.message = msg;
                            renderAdventure();
                            return;
                        }
                        state.message = msg;
                        renderAdventure();
                    }
                } else if (action === 'flee') {
                    if (Math.random() < 0.5) {
                        state.message = 'You fled successfully.';
                        state.combat = null;
                        renderAdventure();
                    } else {
                        state.playerHp -= monsterDamage;
                        state.message = `Flee failed! ${monster.name} attacks for ${monsterDamage}.`;
                        if (state.playerHp <= 0) { state.gameOver = true; state.message += ' GAME OVER.'; }
                        renderAdventure();
                    }
                }
            }

            function takeItem() {
                if (adventureState.combat) return;
                const state = adventureState;
                const room = state.rooms[state.currentRoomId];
                if (room.items.length === 0) return;
                const itemId = room.items.shift();
                const itemDef = state.quest.itemDefinitions[itemId];
                if (itemDef) {
                    state.inventory.push(itemDef);
                    state.message = `Taken: ${itemDef.name}`;
                } else {
                    state.message = 'Item not found.';
                }
                renderAdventure();
            }

            function engageCombat() {
                const room = adventureState.rooms[adventureState.currentRoomId];
                if (room.monsters.length === 0) return;
                const monster = room.monsters[0];
                adventureState.combat = { monster, roomId: adventureState.currentRoomId };
                renderAdventure();
            }

            function showInventory() {
                let msg = 'Inventory:\n' + (adventureState.inventory.length? adventureState.inventory.map(i=>i.name).join('\n') : 'empty');
                adventureState.message = msg;
                renderAdventure();
            }

            function talkAlly() {
                const state = adventureState;
                const room = state.rooms[state.currentRoomId];
                if (!room.allies || room.allies.length === 0) {
                    state.message = 'No one to talk to.';
                    renderAdventure();
                    return;
                }
                const ally = room.allies[0];
                if (ally.behavior === 'hint') {
                    const hints = [
                        `Beware of ${state.quest.antagonist} in the depths.`,
                        `I've heard that ${state.quest.antagonist} fears light.`,
                        `The ${state.quest.antagonist} is vulnerable to silver.`,
                        `You'll need a rope to reach the ${room.landmark || 'final chamber'}.`,
                        `There's a secret passage in the ${state.rooms[Math.floor(Math.random()*state.rooms.length)].name}.`
                    ];
                    state.message = `${ally.name} says: "${hints[Math.floor(Math.random() * hints.length)]}"`;
                    renderAdventure();
                } else if (ally.behavior === 'heal') {
                    const heal = 3 + Math.floor(Math.random() * 3);
                    state.playerHp = Math.min(state.playerMaxHp, state.playerHp + heal);
                    state.message = `${ally.name} tends to your wounds. You regain ${heal} HP.`;
                    renderAdventure();
                } else if (ally.behavior === 'trade') {
                    if (state.inventory.length > 0) {
                        const giveItem = state.quest.itemDefinitions[Math.floor(Math.random() * state.quest.itemDefinitions.length)];
                        const takeItem = state.inventory[Math.floor(Math.random() * state.inventory.length)];
                        state.pendingTrade = { ally, giveItem, takeItem };
                        state.message = `${ally.name} offers to trade your ${takeItem.name} for a ${giveItem.name}. Do you accept?`;
                        renderAdventure();
                    } else {
                        state.message = `${ally.name} has nothing to trade.`;
                        renderAdventure();
                    }
                } else if (ally.behavior === 'fight') {
                    state.message = `${ally.name} joins the fight!`;
                    // For simplicity, just add a buff
                    state.attackBonus += 1;
                    renderAdventure();
                }
            }

            function acceptTrade() {
                const state = adventureState;
                if (!state.pendingTrade) return;
                const { giveItem, takeItem } = state.pendingTrade;
                state.inventory = state.inventory.filter(i => i !== takeItem);
                state.inventory.push(giveItem);
                state.message = `You trade ${takeItem.name} for ${giveItem.name}.`;
                state.pendingTrade = null;
                renderAdventure();
            }

            function refuseTrade() {
                adventureState.message = "You decline the trade.";
                adventureState.pendingTrade = null;
                renderAdventure();
            }

            function useItem() {
                const state = adventureState;
                if (state.combat) {
                    state.message = 'Cannot use items in combat!';
                    renderAdventure();
                    return;
                }
                const usable = state.inventory.filter(i => i.type === 'consumable' || i.type === 'tool' || i.type === 'weapon');
                if (usable.length === 0) {
                    state.message = "You have no usable items.";
                    renderAdventure();
                    return;
                }
                const item = usable[0];
                const index = state.inventory.indexOf(item);

                let msg = '';
                if (item.type === 'consumable' && item.name.includes('Potion')) {
                    state.playerHp = Math.min(state.playerMaxHp, state.playerHp + 8);
                    state.inventory.splice(index, 1);
                    msg = `You used ${item.name}. HP now ${state.playerHp}.`;
                } else if (item.name === 'Torch') {
                    const room = state.rooms[state.currentRoomId];
                    if (!room.secretPassage) {
                        let target;
                        do { target = Math.floor(Math.random() * state.rooms.length); } while (target === state.currentRoomId);
                        room.exits.secret = target;
                        room.secretPassage = true;
                        msg = 'You light the torch and notice a hidden passage! A new exit appears.';
                    } else {
                        msg = 'The torch burns, but you see nothing new.';
                    }
                } else if (item.name === 'Rope') {
                    const room = state.rooms[state.currentRoomId];
                    if (!room.ropeUsed) {
                        let target;
                        do { target = Math.floor(Math.random() * state.rooms.length); } while (target === state.currentRoomId);
                        room.exits.down = target;
                        room.ropeUsed = true;
                        msg = 'You use the rope to descend to a new area.';
                    } else {
                        msg = 'You already used the rope here.';
                    }
                } else if (item.name === 'Lockpicks') {
                    const room = state.rooms[state.currentRoomId];
                    if (room.locked) {
                        room.locked = false;
                        msg = 'You pick the lock. The door is now open.';
                    } else {
                        msg = 'There is no locked door here.';
                    }
                } else if (item.name === 'Magic Ring') {
                    let target;
                    do { target = Math.floor(Math.random() * state.rooms.length); } while (target === state.currentRoomId);
                    state.currentRoomId = target;
                    msg = 'The ring glows and teleports you to another room!';
                } else if (item.name === 'Silver Dagger') {
                    state.attackBonus = 1;
                    msg = 'You grip the Silver Dagger. It gleams with holy light.';
                } else if (item.name === 'Holy Water') {
                    const room = state.rooms[state.currentRoomId];
                    if (room.monsters.length > 0) {
                        for (let m of room.monsters) {
                            m.hp -= 4;
                        }
                        room.monsters = room.monsters.filter(m => m.hp > 0);
                        msg = 'You sprinkle holy water! The monsters are seared!';
                        if (item.consumable) state.inventory.splice(index, 1);
                    } else {
                        msg = 'No monsters to harm.';
                    }
                } else {
                    msg = `You can't use ${item.name} right now.`;
                }

                state.message = msg;
                renderAdventure();
            }

            function startAdventure() {
                if (!currentQuest) return;
                initAdventure(currentQuest);
                renderAdventure();
                startBtn.style.display = 'none';
            }

            // ----- Wire buttons -----
            document.getElementById('randomQuestBtn').addEventListener('click', generateRandomQuest);
            document.getElementById('createQuestBtn').addEventListener('click', () => showCreateForm());
            document.getElementById('myQuestsBtn').addEventListener('click', showMyQuests);
            document.getElementById('loadQuestBtn').addEventListener('click', showMyQuests); // same as my quests
            document.getElementById('startAdventureBtn').addEventListener('click', startAdventure);

            // Start with a random quest
            generateRandomQuest();
        })();
    </script>
</body>
</html>
