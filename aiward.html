<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>NIGHTFALLS ASYLUM · Facility Management · 1985</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080c;
            --screen-bg: #0c0c10;
            --panel-bg: #0e0e16;
            --text: #c8c8c8;
            --text-dim: #7a7a7a;
            --text-bright: #f0ece4;
            --accent: #ff2a4a;
            --accent-dim: #99111f;
            --border: #ff2a4a;
            --border-glow: 0 0 12px #ff003c66, 0 0 28px #ff003c22;
            --danger: #e82233;
            --danger-glow: 0 0 10px #e8223344;
            --amber: #ffaa22;
            --amber-dim: #885500;
            --green: #33cc55;
            --input-bg: #16161e;
            --button-bg: #1a1a20;
            --button-hover: #24202c;
            --button-active: #2a1018;
            --bevel-light: #2a2a35;
            --bevel-dark: #060608;
            --font-display: 'Creepster', 'Nosifer', cursive;
            --font-title: 'Nosifer', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --font-body: 'VT323', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 32px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0d0d18 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }

        .monitor-bezel {
            width: 100%;
            max-width: 520px;
            height: 100vh;
            height: 100dvh;
            max-height: 900px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2a2a2a, 0 0 0 4px #111111, 0 0 0 8px #0a0a0a, 0 8px 40px #000000cc;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (max-width: 520px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                max-height: 100dvh;
                box-shadow: none;
                background: #0a0a0a;
            }
        }

        .power-led {
            position: absolute;
            bottom: 16px;
            right: 20px;
            width: 8px;
            height: 8px;
            background: #33ff44;
            border-radius: 50%;
            box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433;
            animation: powerGlow 2s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433;
            }
            50% {
                box-shadow: 0 0 14px #33ff44aa, 0 0 24px #33ff4455;
            }
        }

        .brand-label {
            position: absolute;
            bottom: 14px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #333;
            letter-spacing: 2px;
            z-index: 20;
            text-transform: uppercase;
        }

        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 4px;
            border: 3px solid #ff2a4a;
            box-shadow: var(--border-glow), inset 0 0 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 520px) { .game-shell { border-radius: 0; border-width: 2px; } }

        .screen-curve {
            position: absolute; inset: 0; pointer-events: none; z-index: 899;
            border-radius: 2px; box-shadow: inset 0 0 60px rgba(0,0,0,0.7), inset 0 0 10px rgba(0,0,0,0.5);
        }

        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,var(--scanline-opacity)) 0px, rgba(0,0,0,var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 2px;
        }
        .crt-overlay::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%); border-radius: 2px;
        }

        .screen-flicker { animation: crtFlicker 8s ease-in-out infinite; }
        @keyframes crtFlicker { 0%,99.4%,100%{opacity:1;} 99.5%{opacity:0.6;} 99.6%{opacity:0.9;} 99.7%{opacity:0.5;} 99.8%{opacity:1;} }

        .marquee {
            position: relative; z-index: 10; background: #0c0406; border-bottom: 3px solid #ff2a4a;
            padding: 10px 16px; text-align: center; font-family: var(--font-display); letter-spacing: 2px;
            box-shadow: 0 2px 16px #00000088, inset 0 1px 0 #2a0c0c; flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #ff2a4a; border-radius: 3px; padding: 10px 14px; background: #080206;
            position: relative; box-shadow: inset 0 0 20px #ff003c11;
        }
        .marquee-inner::before {
            content: ''; position: absolute; top: -2px; left: 20px; right: 20px; height: 2px;
            background: #ff2a4a; box-shadow: 0 0 10px #c41e3a66;
        }
        .marquee-title {
            font-size: var(--text-size-title); color: #e8c5b0; text-shadow: 0 0 14px #c41e3a88, 0 2px 4px #000;
            letter-spacing: 3px; font-family: var(--font-title); line-height: 1.2;
        }
        @media (max-width: 400px) { .marquee-title { font-size: 22px; letter-spacing: 1px; } }
        .blinking-cursor {
            display: inline-block; width: 10px; height: 20px; background: #ff2a4a; margin-left: 4px;
            vertical-align: middle; animation: blink 0.7s step-end infinite; box-shadow: 0 0 6px #ff2a4a88;
        }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

        .status-strip {
            display: flex; justify-content: space-around; padding: 8px 10px; background: #08080e;
            border-bottom: 1px solid #ff2a4a66; z-index: 10; font-family: var(--font-mono);
            font-size: var(--text-size-sm); color: var(--text-dim); letter-spacing: 1px; flex-shrink: 0; flex-wrap: wrap; gap: 4px;
        }
        .status-item { display: flex; align-items: center; gap: 4px; white-space: nowrap; padding: 2px 6px; background: #0e0e16; border: 1px solid #1a1a25; border-radius: 2px; min-height: var(--touch-target); align-items: center; }
        .status-val { color: var(--text-bright); font-weight: bold; font-size: var(--text-size-base); }
        .status-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }

        .tabs-row {
            display: flex; background: #08080e; border-bottom: 2px solid #ff2a4a; z-index: 10;
            flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; gap: 0;
        }
        .tabs-row::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 1 0 auto; min-width: 60px; text-align: center; padding: 12px 8px; font-family: var(--font-body);
            font-size: 15px; color: #5a3a3a; cursor: pointer; border-bottom: 4px solid transparent; background: transparent;
            white-space: nowrap; letter-spacing: 1px; transition: all 0.15s; min-height: var(--btn-min-height);
            display: flex; align-items: center; justify-content: center; gap: 3px;
        }
        .tab-btn.active { color: #f0ddd0; border-bottom-color: #ff2a4a; text-shadow: 0 0 10px #c41e3a88; background: #0c0610; box-shadow: inset 0 -4px 12px #ff003c18; }
        .tab-btn:hover { color: #d4b8a8; background: #0a0810; }

        .game-area {
            flex: 1; overflow-y: auto; overflow-x: hidden; z-index: 5; scrollbar-width: thin;
            scrollbar-color: #2a0f15 #08080e; display: flex; flex-direction: column; padding: 4px 0;
        }
        .game-area::-webkit-scrollbar { width: 5px; } .game-area::-webkit-scrollbar-track { background: #08080e; } .game-area::-webkit-scrollbar-thumb { background: #2a0f15; border-radius: 3px; }

        .panel { display: none; flex-direction: column; padding: 10px; gap: 10px; flex: 1; }
        .panel.active { display: flex; }

        .btn {
            background: var(--button-bg); border: 2px solid #2a2a35; border-top-color: #3a3a48; border-left-color: #353540;
            border-right-color: #1a1a25; border-bottom-color: #111118; padding: 12px 18px; border-radius: 3px;
            color: var(--text); cursor: pointer; font-family: var(--font-body); font-size: var(--text-size-base);
            letter-spacing: 1px; text-transform: uppercase; transition: all 0.1s; min-height: var(--btn-min-height);
            display: inline-flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 2px 0 #00000044; white-space: nowrap;
        }
        .btn:active { border-top-color: #1a1a25; border-left-color: #1a1a25; border-bottom-color: #3a3a48; border-right-color: #353540; box-shadow: 0 0px 0 #00000044; transform: translateY(1px); background: #14141c; }
        .btn.accent { background: #180a10; border-color: #5c1525; border-top-color: #7a2035; border-left-color: #6a1a2a; border-right-color: #3a0f18; border-bottom-color: #200810; color: #e8a090; box-shadow: 0 2px 0 #00000044, 0 0 8px #c41e3a22; }
        .btn.accent:active { border-top-color: #3a0f18; border-left-color: #3a0f18; border-bottom-color: #7a2035; border-right-color: #6a1a2a; box-shadow: 0 0px 0 #00000044, 0 0 14px #c41e3a44; }
        .btn.danger { background: #180a0c; border-color: #441111; border-top-color: #5a1a1a; border-left-color: #4a1515; border-right-color: #2a0a0a; border-bottom-color: #150505; color: #ff7777; box-shadow: 0 2px 0 #00000044; }
        .btn.danger:active { border-top-color: #2a0a0a; border-left-color: #2a0a0a; border-bottom-color: #5a1a1a; border-right-color: #4a1515; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

        .patient-card {
            background: #0e0e16; border: 2px solid #1a1a25; border-radius: 4px; padding: 12px; display: flex;
            gap: 12px; align-items: flex-start; flex-shrink: 0;
        }
        .photo-thumb { width: 65px; height: 88px; border-radius: 3px; background: #0a0a14; border: 2px solid #1a1a28; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #c41e3a; }
        .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .patient-info { flex: 1; min-width: 0; }
        .patient-name { font-family: var(--font-display); font-size: 17px; color: #e8c5b0; text-shadow: 0 0 6px #c41e3a22; letter-spacing: 1px; line-height: 1.2; }
        .patient-meta { font-size: 12px; color: #7a6a6a; font-family: var(--font-mono); margin-top: 2px; }
        .danger-rating { color: #c41e3a; letter-spacing: 2px; font-size: 14px; }
        .patient-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; min-width: 80px; }
        .patient-actions .btn { font-size: 14px; padding: 8px 10px; min-height: 36px; }

        .empty-state { color: #4a3a3a; text-align: center; padding: 20px; font-size: var(--text-size-base); border: 1px dashed #1a1520; border-radius: 4px; margin: 8px 0; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.94); align-items: center; justify-content: center; padding: 12px; }
        .modal-content { background: #0e0e16; border-radius: 6px; width: 100%; max-width: 420px; padding: 20px; text-align: center; border: 3px solid #ff2a4a; box-shadow: var(--border-glow), 0 0 80px #000000dd; color: #d4c5b2; max-height: 85vh; overflow-y: auto; font-size: var(--text-size-base); }
        .modal-btn { background: #1a1a20; border: 2px solid #ff2a4a66; padding: 10px 18px; border-radius: 3px; margin: 5px; cursor: pointer; color: #d4c5b2; font-family: var(--font-body); font-size: var(--text-size-base); letter-spacing: 1px; min-height: var(--btn-min-height); }
        .modal-btn:active { border-color: #ff003c; box-shadow: 0 0 12px #c41e3a44; }

        .chat-log { max-height: 200px; overflow-y: auto; text-align: left; margin-bottom: 10px; border: 1px solid #1a1520; border-radius: 4px; padding: 10px; background: #0a0a12; font-size: var(--text-size-base); line-height: 1.5; }
        .chat-msg { margin: 8px 0; font-size: 16px; line-height: 1.4; display: flex; gap: 8px; align-items: flex-start; }
        .chat-msg.user { color: #e8a090; flex-direction: row-reverse; }
        .chat-msg.assistant { color: #d4c5b2; }
        .chat-avatar { width: 28px; height: 28px; border-radius: 50%; background: #1a1a25; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; overflow: hidden; border: 1px solid #3a3a48; }
        .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-input-row { display: flex; gap: 8px; }
        .chat-input-row input { flex: 1; background: var(--input-bg); border: 2px solid #2a2a35; border-radius: 3px; padding: 10px 12px; color: var(--text); font-family: var(--font-body); font-size: var(--text-size-base); min-height: var(--btn-min-height); -webkit-user-select: text; user-select: text; }

        .spinner {
            display: inline-block; width: 24px; height: 24px; border: 3px solid #2a0f15; border-top: 3px solid #ff2a4a; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }

        .surveillance-border { border: 6px solid #2a3a2a !important; box-shadow: inset 0 0 120px rgba(0,0,0,0.9), 0 0 50px #2a4a2a22, 0 0 0 3px #1a2a1a !important; }
    </style>
</head>
<body>
<div class="monitor-bezel">
    <div class="brand-label">NIGHTFALLS ASYLUM · CRT-85</div>
    <div class="power-led"></div>
    <div class="game-shell screen-flicker">
        <div class="screen-curve"></div>
        <div class="crt-overlay"></div>
        <div class="marquee"><div class="marquee-inner"><div class="marquee-title" id="marqueeTitle">NIGHTFALLS ASYLUM<span class="blinking-cursor"></span></div></div></div>
        <div class="status-strip">
            <span class="status-item">💰 <span class="status-val" id="statCash">$500</span></span>
            <span class="status-item">🧠 <span class="status-val" id="statPatients">0</span></span>
            <span class="status-item">🔒 <span class="status-val" id="statCells">0/6</span></span>
        </div>
        <div class="tabs-row">
            <div class="tab-btn active" data-tab="patients">🧠 PATIENTS</div>
            <div class="tab-btn" data-tab="asylums">🏥 ASYLUMS</div>
            <div class="tab-btn" data-tab="requests">📜 REQUESTS</div>
            <div class="tab-btn" data-tab="patientx">❌ PATIENT X</div>
        </div>
        <div class="game-area">
            <div id="patientsPanel" class="panel active"></div>
            <div id="asylumsPanel" class="panel"></div>
            <div id="requestsPanel" class="panel"></div>
            <div id="patientxPanel" class="panel"></div>
        </div>
        <div class="footer-strip" style="display:flex; justify-content:space-between; align-items:center; padding:6px 12px; background:#08080e; border-top:1px solid #ff2a4a66; z-index:10; font-family:var(--font-mono); font-size:11px; color:#444; flex-shrink:0;">
            <span id="footerMsg">🧠 NIGHTFALLS ASYLUM · MANAGE THE MADNESS</span>
            <button id="resetApiBtn" style="background:none; border:1px solid #222; color:#555; font-size:10px; cursor:pointer; padding:4px 8px;">🔑 API KEY</button>
        </div>
    </div>
</div>
<div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

<script>
(function() {
    const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
    const MODEL = 'mistral-small-latest';
    let apiKey = localStorage.getItem('nightfalls_asylum_key') || '';

    const DEFAULT_STATE = {
        cash: 500,
        patients: [],
        asylums: [],
        requests: [],
        imageCooldownUntil: 0,
        npcGenCooldown: 0,
        maxCells: 6
    };
    let gameState = { ...DEFAULT_STATE };

    // Safe escape: converts any value to string then escapes HTML
    const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[m]);

    // Map to store active talk sessions per patient ID
    const talkSessions = new Map();

    function saveState() { try { localStorage.setItem('nightfalls_asylum_state', JSON.stringify(gameState)); } catch(e){} }
    function loadState() {
        try {
            const saved = localStorage.getItem('nightfalls_asylum_state');
            if (saved) gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
        } catch(e){}
    }

    async function mistralChat(msgs, maxTok=500) {
        if (!apiKey) throw new Error('API key missing');
        const res = await fetch(MISTRAL_ENDPOINT, {
            method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
            body: JSON.stringify({model:MODEL, messages:msgs, temperature:0.9, max_tokens:maxTok})
        });
        if (!res.ok) throw new Error('API '+res.status);
        const data = await res.json();
        return data.choices[0].message.content.trim();
    }

    async function generateImage(prompt, styleSuffix = 'grainy 1980s asylum photo, horror') {
        const now = Date.now();
        if (now < gameState.imageCooldownUntil) {
            await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
        }
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', ' + styleSuffix)}?width=512&height=640&seed=${Date.now()}`;
        const img = new Image();
        const result = await new Promise(resolve => {
            let done = false;
            img.onload = ()=> { if(!done){done=true; resolve(url);} };
            img.onerror = ()=> { if(!done){done=true; resolve(null);} };
            img.src = url;
            setTimeout(()=> { if(!done){done=true; resolve(null);} }, 20000);
        });
        gameState.imageCooldownUntil = Date.now() + 30000;
        saveState();
        return result;
    }

    async function generateImageWithRetry(prompt, styleSuffix = 'grainy 1980s asylum photo, horror') {
        for (let i=0; i<2; i++) {
            const url = await generateImage(prompt, styleSuffix);
            if (url) return url;
            await new Promise(r => setTimeout(r, 5000));
        }
        return null;
    }

    async function generatePatient() {
        const resp = await mistralChat([{role:'user', content:'Generate a disturbing 1980s mental patient profile as valid JSON. Fields: name, diagnosis, dangerLevel(integer 1-5), bio, symptoms. JSON only.'}], 800);
        return JSON.parse(resp.replace(/```json|```/g,'').trim());
    }

    function admitPatient(patient) {
        if (gameState.patients.length >= gameState.maxCells) {
            showModal(`<h2>🔒 No Free Cells</h2><p>All ${gameState.maxCells} cells are full. You must euthanize or discharge a patient first.</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
            return false;
        }
        patient.id = 'p_'+Date.now()+'_'+Math.random().toString(36);
        patient.photoUrl = null;
        patient.footageScript = null;
        patient.footageImages = null;
        patient._photoPending = false;
        gameState.patients.push(patient);
        saveState();
        return true;
    }

    function removePatient(id) {
        gameState.patients = gameState.patients.filter(p => p.id !== id);
        saveState();
        // Clean up any active talk session for this patient
        talkSessions.delete(id);
    }

    const photoQueue = [];
    let photoQueueRunning = false;

    function processNextPhoto() {
        if (photoQueue.length === 0) {
            photoQueueRunning = false;
            return;
        }
        const { patient } = photoQueue.shift();
        setTimeout(async () => {
            try {
                const url = await generateImageWithRetry(`Mugshot of mental patient "${patient.name}", ${patient.diagnosis}, grainy black and white`, 'grainy 1980s asylum photo, horror');
                if (url) {
                    patient.photoUrl = url;
                    patient._photoPending = false;
                    saveState();
                    refreshAll();
                }
            } catch (e) {}
            setTimeout(() => processNextPhoto(), 20);
        }, 20);
    }

    function requestPhoto(patient) {
        photoQueue.push({ patient });
        patient._photoPending = true;
        refreshAll();
        if (!photoQueueRunning) {
            photoQueueRunning = true;
            processNextPhoto();
        }
    }

    async function generateAsylumNPC() {
        const prompt = `Create a sinister 1980s psychiatric institution. Return JSON: name, director, personality (one creepy sentence), and array "patients" of 2-4 patients (each: name, diagnosis, dangerLevel(1-5), bio, symptoms). JSON only.`;
        const resp = await mistralChat([{role:'user', content:prompt}], 800);
        const data = JSON.parse(resp.replace(/```json|```/g,'').trim());
        const npc = {
            id: 'asylum_'+Date.now()+'_'+Math.random().toString(36),
            name: data.name,
            director: data.director,
            personality: data.personality,
            patients: (data.patients||[]).map(p => ({...p, id:'pt_'+Date.now()+'_'+Math.random().toString(36), photoUrl:null}))
        };
        gameState.asylums.push(npc);
        saveState();
        return npc;
    }

    function addRequest(msg) {
        msg.id = 'req_'+Date.now();
        msg.timestamp = Date.now();
        gameState.requests.push(msg);
        saveState();
    }

    function euthanizePatient(patient) {
        const price = patient.dangerLevel * 100;
        gameState.cash += price;
        removePatient(patient.id);
        refreshAll();
        showModal(`<h2>💉 Patient Euthanized</h2><p>You ended "${esc(patient.name)}". Earned $${price}. Cell freed.</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
    }

    // --- Trade between asylums ---
    async function initiateTrade(asylum, asylumPatient) {
        if (gameState.patients.length === 0) {
            showModal('<h2>🧠 No Patients</h2><p>You have no one to trade.</p><button class="modal-btn" onclick="closeModal()">OK</button>');
            return;
        }
        let html = `<h2>🤝 Offer Trade to ${esc(asylum.name)}</h2><p>Select a patient to trade for "${esc(asylumPatient.name)}":</p>`;
        gameState.patients.forEach(p => {
            html += `<button class="modal-btn" style="display:block;width:100%;text-align:left;" data-player-patient="${p.id}">${esc(p.name)} (🧠${p.dangerLevel})</button>`;
        });
        html += '<button class="modal-btn" onclick="closeModal()">Cancel</button>';
        showModal(html);
        document.getElementById('genericModalContent').querySelectorAll('button[data-player-patient]').forEach(btn => {
            btn.addEventListener('click', function() {
                const playerPatientId = this.dataset.playerPatient;
                closeModal();
                selectPlayerPatientForTrade(asylum.id, asylumPatient.id, playerPatientId);
            });
        });
    }

    async function selectPlayerPatientForTrade(asylumId, asylumPatientId, playerPatientId) {
        const asylum = gameState.asylums.find(a => a.id === asylumId);
        const asylumPatient = asylum?.patients.find(p => p.id === asylumPatientId);
        const playerPatient = gameState.patients.find(p => p.id === playerPatientId);
        if (!asylum || !asylumPatient || !playerPatient) return;
        const sysPrompt = `You are the director of ${asylum.name}, ${asylum.director}. Personality: ${asylum.personality}. You currently house "${asylumPatient.name}" (danger level ${asylumPatient.dangerLevel}). You are offered "${playerPatient.name}" (danger level ${playerPatient.dangerLevel}) in a 1-for-1 trade. Reply with JSON: {decision:"accept"|"reject"|"counter", message:"...", counterAmount:0 (if counter)}.`;
        try {
            const resp = await mistralChat([{role:'system',content:sysPrompt},{role:'user',content:`I offer my patient "${playerPatient.name}" for your "${asylumPatient.name}".`}], 300);
            const res = JSON.parse(resp.replace(/```json|```/g,'').trim());
            handleTradeDecision(asylum, asylumPatient, playerPatient, res);
        } catch(e) { showModal('<h2>Error</h2><p>Trade negotiation failed.</p><button class="modal-btn" onclick="closeModal()">OK</button>'); }
    }

    function handleTradeDecision(asylum, asylumPatient, playerPatient, decision) {
        if (decision.decision === 'accept') {
            const newPatient = {...asylumPatient, id: playerPatient.id, photoUrl: null, footageScript:null, footageImages:null, _photoPending:false};
            const oldPatient = {...playerPatient, id: asylumPatient.id, photoUrl: null, footageScript:null, footageImages:null, _photoPending:false};
            gameState.patients = gameState.patients.filter(p => p.id !== playerPatient.id);
            asylum.patients = asylum.patients.filter(p => p.id !== asylumPatient.id);
            gameState.patients.push(newPatient);
            asylum.patients.push(oldPatient);
            saveState();
            refreshAll();
            showModal(`<h2>✅ Trade Accepted</h2><p>${esc(asylum.director)}: "${esc(decision.message)}"</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
            requestPhoto(newPatient);
            maybePassiveDischargeRequest(asylum);
        } else if (decision.decision === 'counter' && decision.counterAmount && gameState.cash >= decision.counterAmount) {
            showModal(`<h2>💵 Counter Offer</h2><p>${esc(asylum.director)} wants an extra $${decision.counterAmount} for "${esc(asylumPatient.name)}".</p><p>${esc(decision.message)}</p>
                <button class="modal-btn" id="acceptCounter">Pay $${decision.counterAmount}</button><button class="modal-btn" onclick="closeModal()">Decline</button>`);
            document.getElementById('acceptCounter').onclick = ()=>{
                gameState.cash -= decision.counterAmount;
                const newPatient = {...asylumPatient, id: playerPatient.id, photoUrl: null, footageScript:null, footageImages:null, _photoPending:false};
                const oldPatient = {...playerPatient, id: asylumPatient.id, photoUrl: null, footageScript:null, footageImages:null, _photoPending:false};
                gameState.patients = gameState.patients.filter(p => p.id !== playerPatient.id);
                asylum.patients = asylum.patients.filter(p => p.id !== asylumPatient.id);
                gameState.patients.push(newPatient);
                asylum.patients.push(oldPatient);
                saveState();
                closeModal();
                refreshAll();
                requestPhoto(newPatient);
                maybePassiveDischargeRequest(asylum);
            };
        } else {
            showModal(`<h2>❌ Trade Rejected</h2><p>${esc(asylum.director)}: "${esc(decision.message)}"</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
        }
    }

    function maybePassiveDischargeRequest(npc) {
        if (Math.random() < 0.5 && gameState.patients.length > 0) {
            const randomPatient = gameState.patients[Math.floor(Math.random()*gameState.patients.length)];
            generateDischargeRequest(randomPatient);
        }
    }

    async function generateDischargeRequest(patient) {
        try {
            const prompt = `A family member wants to discharge a patient from your asylum. Patient: "${patient.name}", diagnosis: "${patient.diagnosis}". Return JSON: familyName, offerPrice (between $200-$1000), message (emotional plea 2-3 sentences). JSON only.`;
            const resp = await mistralChat([{role:'user', content:prompt}], 300);
            const data = JSON.parse(resp.replace(/```json|```/g,'').trim());
            addRequest({
                from: data.familyName,
                patientId: patient.id,
                patientName: patient.name,
                offerPrice: data.offerPrice,
                text: data.message,
                type: 'discharge_request'
            });
        } catch(e) {}
    }

    function generatePassiveDischargeRequestRandom() {
        if (gameState.asylums.length === 0 || gameState.patients.length === 0) return;
        const patient = gameState.patients[Math.floor(Math.random()*gameState.patients.length)];
        generateDischargeRequest(patient);
    }

    function acceptDischargeRequest(reqId) {
        const req = gameState.requests.find(r => r.id === reqId);
        if (!req) return;
        const patient = gameState.patients.find(p => p.id === req.patientId);
        if (!patient) return;
        gameState.cash += req.offerPrice;
        removePatient(patient.id);
        gameState.requests = gameState.requests.filter(r => r.id !== reqId);
        saveState();
        refreshAll();
        showModal(`<h2>🏠 Discharged</h2><p>${esc(req.from)} took "${esc(patient.name)}" home. Received $${req.offerPrice}.</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
    }

    function declineRequest(reqId) {
        gameState.requests = gameState.requests.filter(r => r.id !== reqId);
        saveState();
        refreshAll();
    }

    // --- Footage (trailer) functions ---
    async function generateFootageScript(patient) {
        const prompt = `Create a 3-scene surveillance footage report for patient "${patient.name}". Diagnosis: ${patient.diagnosis}. Symptoms: ${patient.symptoms}. Return JSON array of 3 objects with "narration" (camera observation) and "imagePrompt" (grainy 1980s security camera still). JSON only.`;
        const resp = await mistralChat([{role:'user', content:prompt}], 500);
        return JSON.parse(resp.replace(/```json|```/g,'').trim());
    }

    function playFootage(patient) {
        speechSynthesis.cancel();
        if (patient.footageScript && patient.footageImages && patient.footageImages.length >= patient.footageScript.length) {
            startFootagePlayback(patient);
            return;
        }
        const modalContent = document.getElementById('genericModalContent');
        modalContent.innerHTML = `
            <div style="text-align:center; padding:20px;">
                <div style="font-family:'VT323'; font-size:24px; color:#c41e3a; letter-spacing:4px;">CCTV FEED COMPROMISED</div>
                <div class="test-pattern-bars" style="display:flex; height:50px; margin:16px 0; border-radius:3px; overflow:hidden; opacity:0.75;">

                    <span style="flex:1; background:#4a4;"></span><span style="flex:1; background:#a4a;"></span><span style="flex:1; background:#a33;"></span><span style="flex:1; background:#228;"></span>
                </div>
                <div style="width:80%; margin: 0 auto; background:#1a1a25; height:6px; border-radius:3px; overflow:hidden;">
                    <div id="footageLoadBar" style="width:0%; height:100%; background:#ff2a4a; transition:width 0.3s;"></div>
                </div>

            </div>`;
        document.getElementById('genericModal').style.display = 'flex';

        function loadImagesRecursive(script, index, collected, callback) {
            if (index >= script.length) {
                callback(collected);
                return;
            }
            document.getElementById('footageStatusText').textContent = `Retrieving tape ${index + 1} of ${script.length}…`;
            setTimeout(async () => {
                let url = null;
                try {
                    url = await generateImageWithRetry(script[index].imagePrompt, 'grainy surveillance camera, 1980s asylum, black and white, horror');
                } catch (e) {}
                collected.push(url || patient.photoUrl || '');
                const loadBar = document.getElementById('footageLoadBar');
                if (loadBar) loadBar.style.width = Math.round((collected.length / script.length) * 100) + '%';
                loadImagesRecursive(script, index + 1, collected, callback);
            }, 20);
        }

        (async () => {
            let script;
            try {
                script = await generateFootageScript(patient);
                patient.footageScript = script;
            } catch (e) {
                const sentences = patient.bio.split(/[.!?]+/).filter(s => s.trim().length > 0);
                script = [];
                for (let i = 0; i < 3; i++) {
                    script.push({
                        narration: sentences[i] ? sentences[i].trim() : "The patient sits motionless...",
                        imagePrompt: `security camera of ${patient.name}, asylum cell, grainy, horror`
                    });
                }
                patient.footageScript = script;
            }
            loadImagesRecursive(script, 0, [], (images) => {
                patient.footageImages = images;
                saveState();
                startFootagePlayback(patient);
            });
        })();
    }

    function startFootagePlayback(patient) {
        const scenes = patient.footageScript;
        const images = patient.footageImages;
        let currentScene = 0;
        let isPaused = false;
        let projectorNodes = null;
        let audioCtx = null;

        const modalContent = document.getElementById('genericModalContent');
        modalContent.innerHTML = `
            <div class="surveillance-border" style="position:relative; background:#000; border-radius:3px; box-shadow:inset 0 0 120px rgba(0,0,0,0.9), 0 0 50px #2a4a2a22, 0 0 0 3px #1a2a1a;">
                <div style="position:absolute; top:0; left:0; right:0; bottom:0; background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.9) 100%); pointer-events:none; z-index:2;"></div>
                <div style="position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:3; opacity:0.18; background-image:url('data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E'); animation:grainShift 0.15s steps(3) infinite;"></div>
                <div id="footageImgContainer" style="position:relative; z-index:1;">
                    <img id="footageImg" src="${images[0]}" alt="" style="width:100%; max-height:50vh; object-fit:contain; display:block;">
                </div>
                <div style="position:relative; z-index:4; padding:12px; background:linear-gradient(180deg, transparent, rgba(0,0,0,0.85));">
                    <p id="footageSub" style="color:#e8c5b0; font-size:17px; min-height:2.5em; margin:0 0 8px;"></p>
                    <div style="display:flex; justify-content:center; gap:10px; margin:8px 0;">
                        ${scenes.map((_, i) => `<span class="footage-dot ${i===0?'active':''}" style="width:12px; height:12px; border-radius:50%; background:#2a0f15; border:1px solid #3a1515; transition:all 0.3s;"></span>`).join('')}
                    </div>
                    <small style="color:#7a6a6a;">Camera <span id="footageNum">1</span>/${scenes.length}</small>
                </div>
                <div style="text-align:center; padding:8px; position:relative; z-index:4; display:flex; gap:6px; flex-wrap:wrap; justify-content:center;">
                    <button class="btn" id="footagePause">⏯️ Pause</button>
                    <button class="btn" id="footageSkip">⏭ Skip</button>
                    <button class="modal-btn" id="footageClose">✕ Close</button>
                </div>
            </div>`;
        document.getElementById('genericModal').style.display = 'flex';

        function startFluorescentHum() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 55;
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            lfo.frequency.value = 8;
            lfoGain.gain.value = 3;
            lfo.connect(lfoGain);
            lfoGain.connect(osc.frequency);
            gain.gain.value = 0.02;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            lfo.start();
            return { osc, lfo, gain };
        }

        function stopFluorescentHum(nodes) {
            if (nodes) { nodes.osc.stop(); nodes.lfo.stop(); }
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
        }

        projectorNodes = startFluorescentHum();

        function getVoice() {
            const voices = speechSynthesis.getVoices();
            return voices.find(v => v.name.includes('Google UK English Male') || v.name.includes('Daniel') || v.lang.startsWith('en')) || voices[0];
        }

        function playScene(index) {
            if (index >= scenes.length) {
                stopFluorescentHum(projectorNodes);
                showModal(`
                    <div style="background:linear-gradient(180deg, #0e0e16 0%, #0a0a12 100%); border:3px solid #ff2a4a; padding:20px; border-radius:4px; box-shadow:0 0 40px #c41e3a44;">
                        <div style="font-size:40px;">📋</div>
                        <h2 style="font-family:var(--font-display); color:#e8c5b0;">${esc(patient.name)}</h2>
                        <p style="color:#c41e3a;font-size:17px;">${esc(patient.diagnosis)}</p>
                        <div class="danger-rating" style="font-size:24px;">${'🧠'.repeat(patient.dangerLevel)}${'🦴'.repeat(5 - patient.dangerLevel)}</div>
                        <p style="color:#d4c5b2; margin-top:12px;font-size:16px;">END OF SURVEILLANCE LOG</p>
                        <button class="modal-btn" onclick="closeModal()">Close</button>
                    </div>`);
                return;
            }
            const img = document.getElementById('footageImg');
            if (img) img.src = images[index] || '';
            const sub = document.getElementById('footageSub');
            if (sub) sub.textContent = scenes[index].narration;
            document.querySelectorAll('.footage-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
                dot.style.background = i < index ? '#4a2a2a' : '#2a0f15';
            });
            document.getElementById('footageNum').textContent = index + 1;

            if (!isPaused) {
                const utterance = new SpeechSynthesisUtterance(scenes[index].narration);
                utterance.voice = getVoice();
                utterance.rate = 0.85;
                utterance.pitch = 1.0;
                utterance.onend = () => {
                    currentScene++;
                    setTimeout(() => playScene(currentScene), 500);
                };
                speechSynthesis.speak(utterance);
            }
        }
        playScene(0);

        document.getElementById('footagePause').onclick = () => {
            isPaused = !isPaused;
            document.getElementById('footagePause').textContent = isPaused ? '▶️ Play' : '⏯️ Pause';
            if (isPaused) speechSynthesis.pause();
            else speechSynthesis.resume();
        };
        document.getElementById('footageSkip').onclick = () => {
            speechSynthesis.cancel();
            stopFluorescentHum(projectorNodes);
            showModal(`<h2>🔪 ${esc(patient.name)}</h2><p>Footage skipped.</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
        };
        document.getElementById('footageClose').onclick = () => {
            speechSynthesis.cancel();
            stopFluorescentHum(projectorNodes);
            closeModal();
        };
    }

    // --- Talk to Patient (Doctor-Patient Chat) ---
    function openTalkToPatient(patient) {
        // Get or create session messages
        if (!talkSessions.has(patient.id)) {
            talkSessions.set(patient.id, [
                { role: 'system', content: `You are a patient in a mental asylum in 1985. Your name is ${patient.name}. Diagnosis: ${patient.diagnosis}. Bio: ${patient.bio}. Symptoms: ${patient.symptoms}. Respond in character to the doctor's questions. Keep answers short and unsettling.` },
                { role: 'assistant', content: `*${patient.name} stares at you from the corner of the cell.*` }
            ]);
        }
        const messages = talkSessions.get(patient.id);
        renderTalkWindow(patient, messages);
    }

    function renderTalkWindow(patient, messages) {
        const photoHtml = patient.photoUrl
            ? `<img src="${patient.photoUrl}" alt="">`
            : '🧠';
        // Build chat log
        let chatLogHtml = '';
        messages.forEach(m => {
            if (m.role === 'user') {
                chatLogHtml += `<div class="chat-msg user">
                    <div class="chat-avatar">👨‍⚕️</div>
                    <div>${esc(m.content)}</div>
                </div>`;
            } else if (m.role === 'assistant') {
                chatLogHtml += `<div class="chat-msg assistant">
                    <div class="chat-avatar">${photoHtml}</div>
                    <div>${esc(m.content)}</div>
                </div>`;
            }
        });

        const modalHtml = `
            <h2>🗣️ INTERROGATION ROOM</h2>
            <p style="color:#e8c5b0; text-align:center;">${esc(patient.name)} — ${esc(patient.diagnosis)}</p>
            <div class="chat-log" id="talkChatLog">${chatLogHtml}</div>
            <div class="chat-input-row">
                <input type="text" id="talkInput" placeholder="Ask the patient anything...">
                <button class="btn" id="talkSendBtn">Send</button>
            </div>
            <button class="modal-btn" style="margin-top:6px;" onclick="closeModal()">End Session</button>
        `;
        document.getElementById('genericModalContent').innerHTML = modalHtml;
        document.getElementById('genericModal').style.display = 'flex';

        // Scroll chat to bottom
        const chatLog = document.getElementById('talkChatLog');
        chatLog.scrollTop = chatLog.scrollHeight;

        // Send message handler
        async function handleSend() {
            const input = document.getElementById('talkInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            // Add user message
            messages.push({ role: 'user', content: text });
            renderTalkWindow(patient, messages);
            // Call AI
            try {
                const reply = await mistralChat(messages, 300);
                messages.push({ role: 'assistant', content: reply });
            } catch (e) {
                messages.push({ role: 'assistant', content: '*The patient remains silent, staring blankly.*' });
            }
            renderTalkWindow(patient, messages);
        }

        document.getElementById('talkSendBtn').addEventListener('click', handleSend);
        document.getElementById('talkInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    }

                    <p style="color:#7a6a6a;">Director: ${esc(asylum.director)}</p>
                    <p style="color:#7a6a6a;font-style:italic;">${esc(asylum.personality)}</p>
                    <div style="margin-top:8px;">`;
                asylum.patients.forEach(patient => {
                    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1a1520;">
                        <span>🧠 ${esc(patient.name)} <span class="danger-rating">${'🧠'.repeat(patient.dangerLevel)}${'🦴'.repeat(5-patient.dangerLevel)}</span></span>
                        <button class="btn trade-btn" data-asylum-id="${asylum.id}" data-patient-id="${patient.id}">↔️ Trade</button>
                    </div>`;
                });
                html += `</div></div>`;
            });
        }
        html += `<button class="btn accent" id="findAsylumBtn" style="margin-top:10px;">🔍 Contact New Asylum</button>`;
        panel.innerHTML = html;
        panel.querySelectorAll('.trade-btn').forEach(b => b.addEventListener('click', ()=>{
            const asylum = gameState.asylums.find(a=>a.id===b.dataset.asylumId);
            const patient = asylum?.patients.find(p=>p.id===b.dataset.patientId);
            if(asylum && patient) initiateTrade(asylum, patient);
        }));
        document.getElementById('findAsylumBtn').addEventListener('click', async ()=>{
            if (Date.now() < gameState.npcGenCooldown) {
                showModal('<h2>⏳ No Contact</h2><p>The phone lines are silent...</p><button class="modal-btn" onclick="closeModal()">OK</button>');
                return;
            }
            const btn = document.getElementById('findAsylumBtn');
            btn.disabled = true; btn.textContent = 'Dialing...';
            try { await generateAsylumNPC(); gameState.npcGenCooldown = Date.now()+60000; refreshAll(); }
            catch(e){ showModal('<h2>❌ Error</h2><button class="modal-btn" onclick="closeModal()">OK</button>'); }
            finally { btn.disabled = false; btn.textContent = '🔍 Contact New Asylum'; }
        });
    }

    function renderRequests() {
        const panel = document.getElementById('requestsPanel');
        let html = `<p style="color:#e8c5b0;text-align:center;font-family:var(--font-display);font-size:20px;">📜 DISCHARGE REQUESTS</p>`;
        if (!gameState.requests.length) html += '<div class="empty-state">No pending requests.</div>';
        else {
            gameState.requests.forEach(req => {
                html += `<div style="background:#0e0e16;border:1px solid #1a1520;border-radius:4px;padding:12px;margin-bottom:8px;">
                    <strong style="color:#e8c5b0;">${esc(req.from)}</strong>
                    <p style="color:#d4c5b2;">${esc(req.text)}</p>
                    <p style="color:#7a6a6a;">Patient: ${esc(req.patientName)} · Offer: $${req.offerPrice}</p>
                    <div style="display:flex;gap:8px;margin-top:8px;">
                        <button class="btn accent accept-req-btn" data-req-id="${req.id}">✅ Accept</button>
                        <button class="btn danger decline-req-btn" data-req-id="${req.id}">❌ Decline</button>
                    </div>
                </div>`;
            });
        }
        panel.innerHTML = html;
        panel.querySelectorAll('.accept-req-btn').forEach(b => b.addEventListener('click', ()=> acceptDischargeRequest(b.dataset.reqId)));
        panel.querySelectorAll('.decline-req-btn').forEach(b => b.addEventListener('click', ()=> declineRequest(b.dataset.reqId)));
    }

    function renderPatientX() {
        const panel = document.getElementById('patientxPanel');
        panel.innerHTML = `<p style="color:#e8c5b0;text-align:center;font-family:var(--font-display);font-size:20px;">❌ PATIENT X</p>
            <p style="color:#7a6a6a;text-align:center;">Consult Dr. Vexler to design a custom patient for your ward.</p>
            <button class="btn accent" id="startPatientXBtn">🧪 Enter the Psychiatrist's Office</button>`;
        document.getElementById('startPatientXBtn').addEventListener('click', openPsychiatristModal);
    }

    let psychiatristMessages = [];
    function openPsychiatristModal() {
        psychiatristMessages = [{role:"system", content:"You are Dr. Alistair Vexler, chief psychiatrist at Nightfalls Asylum in 1985. You can manipulate a patient's mind to create any desired mental condition. Help the player design a new patient. When they are ready, output a JSON with: name, diagnosis, dangerLevel (1-5), bio, symptoms, procedureCost (int, $500-2000). Stay in character - you enjoy your work far too much."}];
        renderPsychiatristChat();
        sendPsychiatristMessage("What kind of madness shall we create tonight?");
    }
    function renderPsychiatristChat() {
        let html = `<h2>🧪 DR. VEXLER'S OFFICE</h2><div class="chat-log" id="psychChatLog">`;
        psychiatristMessages.forEach(m => {
            if (m.role==='user') html += `<div class="chat-msg user"><strong>You:</strong> ${esc(m.content)}</div>`;
            else if (m.role==='assistant') html += `<div class="chat-msg assistant"><strong>Dr. Vexler:</strong> ${esc(m.content)}</div>`;
        });
        html += `</div><div class="chat-input-row"><input type="text" id="psychInput" placeholder="Describe the desired madness..."><button class="btn" id="psychSendBtn">Send</button></div>
        <button class="btn accent" id="finalizePatientXBtn" style="width:100%;margin-top:6px;">🧠 Finalize Patient ($500-2000)</button>
        <button class="modal-btn" onclick="closeModal()">Leave</button>`;
        document.getElementById('genericModalContent').innerHTML = html;
        document.getElementById('genericModal').style.display = 'flex';
        document.getElementById('psychSendBtn').addEventListener('click', ()=>{
            const input = document.getElementById('psychInput');
            if(input.value.trim()){ sendPsychiatristMessage(input.value.trim()); input.value=''; }
        });
        document.getElementById('finalizePatientXBtn').addEventListener('click', finalizePatientX);
    }
    async function sendPsychiatristMessage(text) {
        psychiatristMessages.push({role:"user", content:text});
        renderPsychiatristChat();
        try {
            const reply = await mistralChat(psychiatristMessages, 300);
            psychiatristMessages.push({role:"assistant", content:reply});
        } catch(e) {
            psychiatristMessages.push({role:"assistant", content:"(The doctor's voice fades into static...)"});
        }
        renderPsychiatristChat();
    }
    async function finalizePatientX() {
        const prompt = "Based on our conversation, output ONLY a valid JSON of the final patient: name, diagnosis, dangerLevel(1-5), bio, symptoms, procedureCost(int).";
        psychiatristMessages.push({role:"user", content:prompt});
        renderPsychiatristChat();
        try {
            const reply = await mistralChat(psychiatristMessages, 500);
            const json = JSON.parse(reply.replace(/```json|```/g,'').trim());
            if (!json.name || !json.procedureCost) throw new Error('Incomplete');
            if (gameState.cash < json.procedureCost) {
                showModal(`<h2>💸 Insufficient Funds</h2><p>Procedure costs $${json.procedureCost}, you have $${gameState.cash}.</p><button class="modal-btn" onclick="closeModal()">OK</button>`);
                return;
            }
            gameState.cash -= json.procedureCost;
            const newPatient = {...json, id: undefined, photoUrl:null, footageScript:null, footageImages:null, _photoPending:false};
            if (!admitPatient(newPatient)) return;
            closeModal();
            refreshAll();
            requestPhoto(newPatient);
        } catch(e) {
            psychiatristMessages.push({role:"assistant", content:"The experiment failed. Let's try finalizing again."});
            renderPsychiatristChat();
        }
    }

    function refreshAll() {
        document.getElementById('statCash').textContent = '$'+gameState.cash;
        document.getElementById('statPatients').textContent = gameState.patients.length;
        document.getElementById('statCells').textContent = gameState.patients.length + '/' + gameState.maxCells;
        const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab || 'patients';
        switchTab(activeTab);
    }
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        const tabBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
        if (tabBtn) tabBtn.classList.add('active');
        const panel = document.getElementById(tab+'Panel');
        if (panel) panel.classList.add('active');
        if (tab==='patients') renderPatients();
        else if (tab==='asylums') renderAsylums();
        else if (tab==='requests') renderRequests();
        else if (tab==='patientx') renderPatientX();
    }
    function showModal(html) { document.getElementById('genericModalContent').innerHTML = html; document.getElementById('genericModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('genericModal').style.display = 'none'; speechSynthesis.cancel(); }
    window.closeModal = closeModal;

    loadState();
    refreshAll();
    document.querySelectorAll('.tab-btn').forEach(t => t.addEventListener('click', ()=> switchTab(t.dataset.tab)));
    document.getElementById('resetApiBtn').addEventListener('click', ()=>{
        const key = prompt('Enter your Mistral API key:');
        if (key && key.length > 10) { apiKey = key; localStorage.setItem('nightfalls_asylum_key', key); }
    });
    if (!apiKey) setTimeout(()=> document.getElementById('resetApiBtn').click(), 500);
    setInterval(() => { if (Math.random() < 0.3) generatePassiveDischargeRequestRandom(); }, 30000);
    document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
})();
</script>
</body>
</html>
