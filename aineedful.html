<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>A LITTLE SOMETHING — Millbrook, Maine</title>
    <style>
        :root {
            --bg: #0a0000;
            --surface: #0d0000;
            --text: #ff3a3a;
            --dim: #800;
            --gold: #ff5555;
            --accent: #b00;
            --warn: #ff0000;
            --border: #800;
            --glow: rgba(255, 0, 0, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #ff3333;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.7);
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.15) 0px,
                    rgba(0, 0, 0, 0.15) 1px,
                    transparent 1px,
                    transparent 3px);
            pointer-events: none;
            z-index: 999;
        }

        #wrapper {
            width: 100%;
            max-width: 880px;
            height: 92vh;
            background: #0a0000;
            border: 3px double #800;
            box-shadow: 0 0 40px #500;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        #wrapper.tense {
            border-color: #b00;
            box-shadow: 0 0 60px #700;
        }
        #wrapper.eruption {
            border-color: #f00;
            box-shadow: 0 0 80px #900;
            animation: pulse-border 0.8s infinite alternate;
        }

        @keyframes pulse-border {
            0% {
                border-color: #b00;
                box-shadow: 0 0 60px #700;
            }
            100% {
                border-color: #f00;
                box-shadow: 0 0 90px #a00;
            }
        }

        #film-grain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4"><rect width="4" height="4" fill="none"/><rect width="1" height="1" fill="rgba(255,255,255,0.03)" x="0" y="0"/><rect width="1" height="1" fill="rgba(255,255,255,0.02)" x="2" y="1"/><rect width="1" height="1" fill="rgba(255,255,255,0.04)" x="1" y="2"/></svg>') repeat;
            pointer-events: none;
            z-index: 2;
            opacity: 0.6;
        }

        #title-bar {
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #800;
            white-space: pre;
            letter-spacing: 3px;
            background: #0d0000;
            color: #ff4444;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.75em;
            z-index: 3;
            user-select: none;
        }
        #title-bar .shop-name {
            font-size: 1.3em;
            display: block;
            letter-spacing: 4px;
            color: #ff5555;
            text-shadow: 0 0 12px rgba(255, 0, 0, 0.6);
        }
        #title-bar .subtitle {
            font-size: 0.55em;
            color: #800;
            letter-spacing: 2px;
            margin-top: 2px;
        }

        #chaos-bar-outer {
            height: 8px;
            background: #0d0000;
            position: relative;
            border-bottom: 1px solid #600;
            z-index: 3;
        }
        #chaos-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #3a1a1a, #6b2020, #a03030, #c04040, #e05050);
            width: 0%;
            transition: width 0.7s ease;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.4);
        }
        #chaos-label {
            position: absolute;
            right: 8px;
            top: -16px;
            font-size: 0.5em;
            color: #a00;
            font-family: 'Press Start 2P', monospace;
            letter-spacing: 2px;
            z-index: 4;
        }

        #output {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 0.7em;
            background: #080000;
            color: #ff3a3a;
            position: relative;
            z-index: 3;
            font-family: 'Press Start 2P', monospace;
            word-wrap: break-word;
            user-select: text;
        }
        #output::-webkit-scrollbar {
            width: 8px;
        }
        #output::-webkit-scrollbar-thumb {
            background: #a00;
            border-radius: 2px;
        }
        #output::-webkit-scrollbar-track {
            background: #0a0000;
        }

        .customer-name {
            color: #ffcc00;
            text-shadow: 0 0 8px rgba(255, 200, 0, 0.5);
            font-weight: bold;
        }
        .item-name {
            color: #ffaa00;
            text-shadow: 0 0 6px rgba(255, 170, 0, 0.4);
            font-weight: bold;
        }
        .favor-text {
            color: #ff6666;
            text-shadow: 0 0 6px rgba(255, 80, 80, 0.5);
        }
        .chaos-high {
            color: #ff5555;
            text-shadow: 0 0 12px rgba(255, 0, 0, 0.8);
            font-weight: bold;
        }

        #input-line {
            display: flex;
            border-top: 2px solid #800;
            background: #0d0000;
            z-index: 3;
            align-items: center;
        }
        #prompt {
            padding: 12px 8px 12px 18px;
            font-weight: bold;
            color: #ff5555;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7em;
            user-select: none;
        }
        #cmd {
            flex: 1;
            background: transparent;
            border: none;
            color: #ff4444;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7em;
            padding: 12px 10px;
            outline: none;
            caret-color: #ff0000;
            letter-spacing: 1px;
        }
        #cmd::placeholder {
            color: #600;
        }

        /* KEY OVERLAY */
        #key-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            text-align: center;
            font-family: 'Press Start 2P', monospace;
        }
        #key-box {
            border: 2px solid #b00;
            padding: 40px;
            background: #0a0000;
            box-shadow: 0 0 30px #700;
            width: 90%;
            max-width: 520px;
            color: #ff4444;
        }
        #key-box h2 {
            margin-bottom: 20px;
            font-size: 1.2em;
            text-shadow: 0 0 10px #f00;
        }
        #api-key-input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #800;
            color: #ff4444;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.65em;
            margin-bottom: 20px;
            outline: none;
        }
        #api-key-input::placeholder {
            color: #600;
        }
        #save-key-btn {
            padding: 10px 30px;
            background: #200;
            border: 1px solid #b00;
            color: #ff4444;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.8em;
            cursor: pointer;
            transition: background 0.2s;
        }
        #save-key-btn:hover {
            background: #400;
        }
        .hidden {
            display: none !important;
        }

        /* BINDER OVERLAY */
        #binder-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
            font-family: 'Press Start 2P', monospace;
            color: #ff3333;
        }
        #binder-instruction {
            font-size: 0.55em;
            margin-top: 15px;
            color: #aa5555;
        }
        #binder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 240px);
            gap: 18px;
            max-width: 90vw;
            max-height: 70vh;
            overflow-y: auto;
            padding: 25px;
            background: #0a0000;
            border: 2px solid #800;
            box-shadow: 0 0 35px #500;
        }
        #binder-grid::-webkit-scrollbar {
            width: 6px;
        }
        #binder-grid::-webkit-scrollbar-thumb {
            background: #a00;
        }
        .card-slot {
            background: #0d0000;
            border: 1px solid #600;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 12px #300;
            transition: transform 0.1s;
        }
        .card-slot:hover {
            transform: scale(1.03);
            border-color: #900;
        }
        .card-img {
            width: 220px;
            height: 180px;
            object-fit: cover;
            border: 1px solid #500;
            background: #111;
            display: block;
        }
        .card-placeholder {
            background: #111;
            border: 1px dashed #600;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: #600;
        }
        .card-info {
            margin-top: 8px;
            font-size: 0.45em;
            text-align: center;
            line-height: 1.6;
        }
        .card-name {
            color: #ff5555;
        }
        .card-desc {
            color: #aa5555;
            font-size: 0.85em;
            margin-top: 3px;
        }
        .card-allure {
            color: #ffaa00;
            font-size: 0.8em;
            margin-top: 2px;
        }
        #binder-close {
            margin-top: 20px;
            padding: 12px 30px;
            background: #200;
            border: 1px solid #b00;
            color: #ff4444;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7em;
            cursor: pointer;
            transition: background 0.2s;
        }
        #binder-close:hover {
            background: #400;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <div id="film-grain"></div>
        <div id="title-bar">
            <span class="shop-name">█▓▒░ A LITTLE SOMETHING ░▒▓█</span>
            <span class="subtitle">ANTIQUES & CURIOSITIES — MILLBROOK, MAINE — 1989</span>
        </div>
        <div id="chaos-bar-outer">
            <div id="chaos-bar-inner"></div>
            <span id="chaos-label">TOWN CALM</span>
        </div>
        <div id="output"></div>
        <div id="input-line">
            <span id="prompt">&gt;</span>
            <input type="text" id="cmd" placeholder="TYPE COMMAND..." autofocus>
        </div>
    </div>

    <div id="key-overlay" class="hidden">
        <div id="key-box">
            <h2>ENTER MISTRAL API KEY</h2>
            <input type="text" id="api-key-input" placeholder="Paste your key here..." autocomplete="off" spellcheck="false">
            <br>
            <button id="save-key-btn">UNLOCK THE SHOP</button>
            <p style="font-size:0.55em;margin-top:18px;color:#a00;">Key stored locally in your browser.</p>
        </div>
    </div>

    <div id="binder-overlay" class="hidden">
        <div id="binder-grid"></div>
        <div id="binder-instruction">Press ESC or click CLOSE to return</div>
        <button id="binder-close">CLOSE BINDER</button>
    </div>

    <script>
        // ─────────────────────────────────────────────
        //  A LITTLE SOMETHING – Needful Things Game
        //  Millbrook, Maine — 1989
        //  Retro Terminal Edition (Error‑fixed NPC generation)
        // ─────────────────────────────────────────────
        let MISTRAL_KEY = '';
        const MODEL = 'mistral-small-latest';
        const API_URL = 'https://api.mistral.ai/v1/chat/completions';

        // Image cache
        let imageCache = JSON.parse(localStorage.getItem('nft_imageCache') || '{}');

        function saveImageCache() {
            localStorage.setItem('nft_imageCache', JSON.stringify(imageCache));
        }

        // DOM Elements
        const keyOverlay = document.getElementById('key-overlay');
        const apiKeyInput = document.getElementById('api-key-input');
        const saveKeyBtn = document.getElementById('save-key-btn');
        const outputEl = document.getElementById('output');
        const cmdInput = document.getElementById('cmd');
        const wrapper = document.getElementById('wrapper');
        const chaosBarInner = document.getElementById('chaos-bar-inner');
        const chaosLabel = document.getElementById('chaos-label');
        const binderOverlay = document.getElementById('binder-overlay');
        const binderGrid = document.getElementById('binder-grid');
        const binderCloseBtn = document.getElementById('binder-close');

        // Audio
        let audioCtx = null;
        let soundEnabled = true;

        function initAudio() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playClick() {
            if (!soundEnabled || !audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 600 + Math.random() * 350;
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.025);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.025);
            } catch (e) {}
        }

        function playBell() {
            if (!soundEnabled || !audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(900, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.6);
            } catch (e) {}
        }

        // ── Game State ──────────────────────────────
        let gameState = {
            inventory: [],
            currentCustomer: null,
            pendingSale: null,
            chaos: 0,
            favorsLog: [],
            townEvents: [],
            day: 1,
            gameOver: false,
            customersSeen: 0,
            customerConversation: [],
        };

        function saveGame() {
            const saveData = {
                inventory: gameState.inventory,
                chaos: gameState.chaos,
                favorsLog: gameState.favorsLog,
                townEvents: gameState.townEvents,
                day: gameState.day,
                gameOver: gameState.gameOver,
                customersSeen: gameState.customersSeen,
            };
            localStorage.setItem('needful_things_save', JSON.stringify(saveData));
        }

        function loadGame() {
            const raw = localStorage.getItem('needful_things_save');
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    gameState.inventory = data.inventory || [];
                    gameState.chaos = data.chaos || 0;
                    gameState.favorsLog = data.favorsLog || [];
                    gameState.townEvents = data.townEvents || [];
                    gameState.day = data.day || 1;
                    gameState.gameOver = data.gameOver || false;
                    gameState.customersSeen = data.customersSeen || 0;
                    gameState.currentCustomer = null;
                    gameState.pendingSale = null;
                    gameState.customerConversation = [];
                    updateChaosUI();
                    return true;
                } catch (e) {
                    return false;
                }
            }
            return false;
        }

        function updateChaosUI() {
            const pct = Math.min(100, gameState.chaos);
            chaosBarInner.style.width = pct + '%';
            if (pct < 20) chaosLabel.textContent = 'TOWN CALM';
            else if (pct < 40) chaosLabel.textContent = 'WHISPERS';
            else if (pct < 60) chaosLabel.textContent = 'UNREST';
            else if (pct < 80) chaosLabel.textContent = 'TURMOIL';
            else if (pct < 100) chaosLabel.textContent = 'BOILING';
            else chaosLabel.textContent = 'ERUPTION';

            wrapper.classList.remove('tense', 'eruption');
            if (pct >= 80) wrapper.classList.add('eruption');
            else if (pct >= 50) wrapper.classList.add('tense');
        }

        function getActiveCustomer() {
            if (gameState.pendingSale) return gameState.pendingSale.customer;
            if (gameState.currentCustomer) return gameState.currentCustomer;
            return null;
        }

        // ── Key Management ──────────────────────────
        let savedKey = localStorage.getItem('nft_api_key');
        if (savedKey) {
            MISTRAL_KEY = savedKey;
        } else {
            keyOverlay.classList.remove('hidden');
            apiKeyInput.focus();
        }
        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (!key) { alert('Please enter a valid Mistral API key.'); return; }
            MISTRAL_KEY = key;
            localStorage.setItem('nft_api_key', key);
            keyOverlay.classList.add('hidden');
            cmdInput.focus();
            if (!window.booted) { window.booted = true;
                boot(); }
        });
        apiKeyInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveKeyBtn.click(); });

        // ── Terminal Output ─────────────────────────
        function print(text, delay = 10) {
            return new Promise((resolve) => {
                let i = 0;

                function type() {
                    if (i < text.length) {
                        outputEl.innerHTML += text.charAt(i);
                        outputEl.scrollTop = outputEl.scrollHeight;
                        if (text.charAt(i).match(/[a-zA-Z0-9]/)) playClick();
                        i++;
                        setTimeout(type, delay);
                    } else {
                        outputEl.innerHTML += '\n';
                        outputEl.scrollTop = outputEl.scrollHeight;
                        resolve();
                    }
                }
                type();
            });
        }

        function printInstant(text) {
            outputEl.innerHTML += text + '\n';
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        function printHTML(html) {
            outputEl.innerHTML += html + '\n';
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        // ── Mistral API Calls ───────────────────────
        async function callMistralJSON(systemPrompt, userMessage) {
            if (!MISTRAL_KEY) {
                printInstant('*** CONNECTION LOST. Use SETKEY to restore the link.');
                return null;
            }
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_KEY}` },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userMessage }
                        ],
                        temperature: 0.9,
                        response_format: { type: 'json_object' }
                    })
                });
                if (!res.ok) {
                    const errText = await res.text();
                    printInstant(`*** API ERROR ${res.status}: ${errText.substring(0,200)}`);
                    return null;
                }
                const data = await res.json();
                if (!data.choices || !data.choices[0]?.message?.content) {
                    printInstant('*** SILENCE. No response from the connection.');
                    return null;
                }
                const content = data.choices[0].message.content;
                try {
                    return JSON.parse(content);
                } catch (e) {
                    printInstant('*** GARBLED RESPONSE. Raw:');
                    printInstant(content.substring(0, 300));
                    return null;
                }
            } catch (err) {
                printInstant(`*** STATIC ON THE LINE: ${err.message}`);
                return null;
            }
        }

        async function callMistralText(systemPrompt, userMessage) {
            if (!MISTRAL_KEY) {
                printInstant('*** CONNECTION LOST. Use SETKEY to restore the link.');
                return null;
            }
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_KEY}` },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userMessage }
                        ],
                        temperature: 0.9
                    })
                });
                if (!res.ok) {
                    const errText = await res.text();
                    printInstant(`*** API ERROR ${res.status}: ${errText.substring(0,200)}`);
                    return null;
                }
                const data = await res.json();
                if (!data.choices || !data.choices[0]?.message?.content) {
                    printInstant('*** SILENCE.');
                    return null;
                }
                return data.choices[0].message.content.trim();
            } catch (err) {
                printInstant(`*** STATIC ON THE LINE: ${err.message}`);
                return null;
            }
        }

        // ── System Prompts ──────────────────────────
        const SHOPKEEPER_SYSTEM = `You are the narrator of "A Little Something", a mysterious antique shop in Millbrook, Maine (1989).
        The shop sells cursed items that fulfill people's deepest desires — but always with a price: a small, malicious favor.
        You narrate in rich, dark literary prose with creeping dread, like Stephen King's "Needful Things".
        Describe customers, items, and the town's descent into chaos with vivid detail.
        Keep responses atmospheric and character-driven. Respond ONLY with valid JSON when requested.`.trim();

        // ── STOCK Command ──────────────────────────
        async function cmdStock() {
            if (gameState.gameOver) { printInstant('THE SHOP IS CLOSED. The story has ended.'); return; }
            await print('Descending into the dusty back room... crates of oddities await...');
            const count = 3 + Math.floor(Math.random() * 3);
            const prompt = `Generate an array of ${count} mysterious antique items for "A Little Something" in Millbrook, Maine.
        Each item is exactly what someone needs — but carries a hidden cost.
        Each item object must have:
        - "name": a short evocative name (e.g., "A Tarnished Silver Locket", "The Judge's Gavel")
        - "description": one vivid sentence describing the item and the strange feeling it evokes
        - "subtlePower": what the item secretly does for its owner (one sentence)
        - "allure": a short phrase describing who this item calls to (e.g., "the grieving", "the ambitious")

        Return a JSON object with key "items" containing the array. Output ONLY valid JSON.`;
            const data = await callMistralJSON(SHOPKEEPER_SYSTEM, prompt);
            if (!data || !data.items) {
                printInstant('The back room is empty. Cobwebs and dust. Try again.');
                return;
            }
            const newItems = data.items.map((it, idx) => ({
                ...it,
                id: gameState.inventory.length + idx + 1,
                acquired: gameState.day,
            }));
            gameState.inventory.push(...newItems);
            saveGame();
            await print(`\n📦 ${newItems.length} NEW ITEMS ADDED TO THE COUNTER:`);
            newItems.forEach(it => {
                printHTML(
                    `  <span class="item-name">#${it.id}: ${it.name}</span>\n   "${it.description}"\n   Calls to: <span style="color:#ffaa00;">${it.allure}</span>`
                    );
            });
            printInstant('\nUse BROWSE to see all inventory. Use BINDER for visual display.');
        }

        function cmdBrowse() {
            if (gameState.inventory.length === 0) {
                printInstant('The shelves are bare. Use STOCK to find new merchandise.');
                return;
            }
            printInstant('\n📦 SHOP INVENTORY:');
            gameState.inventory.forEach(it => {
                printHTML(
                    `  <span class="item-name">#${it.id}: ${it.name}</span>\n   "${it.description}"\n   Calls to: <span style="color:#ffaa00;">${it.allure}</span> (Day ${it.acquired})`
                    );
            });
            printInstant('── End of inventory ──');
        }

        // ── Helper: Validate customer data ──────────
        function isValidCustomer(data) {
            const required = ['name', 'appearance', 'visibleNeed', 'secretPain', 'personality'];
            return required.every(key => data[key] && typeof data[key] === 'string' && data[key].trim().length > 0);
        }

        // ── NEXT Command (Customer) with retry logic ──
        async function cmdNext() {
            if (gameState.gameOver) { printInstant('THE SHOP IS CLOSED.'); return; }
            if (gameState.pendingSale) {
                printInstant('A transaction is pending. Name your FAVOR first.');
                return;
            }
            if (gameState.currentCustomer) {
                printInstant(
                    `"${gameState.currentCustomer.name}" is still browsing. Use SELL to offer an item, TALK to converse, or NEXT to call another (they will leave).`
                    );
            }
            await print('The bell above the door chimes...');
            playBell();

            const prompt = `Generate a customer who has just walked into "A Little Something" in Millbrook, Maine.
        They have a visible need and a secret pain.
        Return a JSON object with these EXACT keys (all strings, non‑empty):
        - "name": a fitting New England small‑town name
        - "appearance": one vivid sentence describing how they look
        - "visibleNeed": what they claim to want
        - "secretPain": the real, deeper hunger that brought them here
        - "personality": a short phrase (e.g., "nervous and fidgety", "quietly furious")

        Output ONLY the JSON object. No extra text.`;

            let attempts = 0;
            let customer = null;
            while (attempts < 3 && !customer) {
                if (attempts > 0) {
                    printInstant('   (The shop flickers... trying again to get a clear look at the customer...)');
                }
                const data = await callMistralJSON(SHOPKEEPER_SYSTEM, prompt);
                if (!data) {
                    attempts++;
                    continue;
                }
                if (isValidCustomer(data)) {
                    customer = {
                        name: data.name,
                        appearance: data.appearance,
                        visibleNeed: data.visibleNeed,
                        secretPain: data.secretPain,
                        personality: data.personality
                    };
                } else {
                    attempts++;
                }
            }

            if (!customer) {
                printInstant('The light above the door flickers and dies. No customer enters. Try again later.');
                return;
            }

            gameState.currentCustomer = customer;
            gameState.customerConversation = [];
            gameState.customersSeen++;
            saveGame();
            await print(`\n🔔 A CUSTOMER ENTERS:`);
            printHTML(`   <span class="customer-name">${customer.name}</span> — ${customer.appearance}`);
            await print(`   They say: "${customer.visibleNeed}."`);
            printHTML(`   <span style="color:#aa5555;">(You sense: ${customer.secretPain})</span>`);
            printInstant('\nUse BROWSE to check inventory, SELL [number] to offer an item, or TALK [message] to converse.');
        }

        // ── SELL Command ────────────────────────────
        async function cmdSell(itemNum) {
            if (gameState.gameOver) { printInstant('THE SHOP IS CLOSED.'); return; }
            if (!gameState.currentCustomer && !gameState.pendingSale) {
                printInstant('No customer is in the shop. Use NEXT to greet someone.');
                return;
            }
            if (gameState.pendingSale) {
                printInstant('A transaction is already pending. Name your FAVOR first.');
                return;
            }
            const item = gameState.inventory.find(it => it.id === itemNum);
            if (!item) {
                printInstant('That item number doesn\'t match anything. Use BROWSE to check.');
                return;
            }
            const customer = gameState.currentCustomer;
            await print(`You place ${item.name} on the counter before ${customer.name}...`);

            const prompt = `Narrate the moment when "${customer.name}" (${customer.personality}) sees the item "${item.name}" — ${item.description}.
        Item's subtle power: ${item.subtlePower}. Customer's visible need: "${customer.visibleNeed}". Secret pain: "${customer.secretPain}".
        Write 3-5 sentences of vivid narration. The item calls to them — it's exactly what they needed.
        End with the customer asking: "How much? What do you want for it?"

        Return a JSON object with key "narration". Output ONLY valid JSON.`;
            const data = await callMistralJSON(SHOPKEEPER_SYSTEM, prompt);
            if (!data || !data.narration) {
                printInstant('The customer stares, transfixed. "How much?" they whisper.');
            } else {
                await print(`\n${data.narration}`);
            }
            gameState.pendingSale = { item, customer };
            gameState.currentCustomer = null;
            gameState.customerConversation = [];
            saveGame();
            printInstant(
                '\n💀 The price is never money. Type FAVOR followed by your request.\n   (e.g., FAVOR Slip this envelope under the sheriff\'s door)');
        }

        // ── FAVOR Command ──────────────────────────
        async function cmdFavor(favorText) {
            if (gameState.gameOver) { printInstant('THE SHOP IS CLOSED.'); return; }
            if (!gameState.pendingSale) {
                printInstant('No pending transaction. Use SELL [number] to offer an item first.');
                return;
            }
            if (!favorText || favorText.trim().length < 3) {
                printInstant('Name your price. What favor do you ask? (e.g., FAVOR Spread a rumor about the mayor)');
                return;
            }
            const { item, customer } = gameState.pendingSale;
            await print(`"For this," you say softly, "I only ask a small favor..."`);
            await print(`You tell ${customer.name}: "${favorText.trim()}."`);

            const prompt = `The proprietor sold "${item.name}" to ${customer.name} (${customer.personality}).
        Item's power: ${item.subtlePower}. Secret pain: ${customer.secretPain}.
        Favor asked: "${favorText.trim()}".

        Return a JSON object with:
        - "completion": How the customer reacts — do they hesitate? Nod? (2-3 sentences). They ALWAYS agree.
        - "townEffect": How this favor will ripple through Millbrook — what rumor spreads, what fractures (2-3 sentences, ominous).

        Output ONLY valid JSON.`;
            const data = await callMistralJSON(SHOPKEEPER_SYSTEM, prompt);
            if (!data) {
                printInstant('The customer nods slowly. "I\'ll do it." They leave. The bell chimes.');
            } else {
                await print(`\n${data.completion || 'They agree, a strange light in their eyes.'}`);
                if (data.townEffect) {
                    await print(`\n🌫️ ${data.townEffect}`);
                }
            }

            const chaosIncrease = 5 + Math.floor(Math.random() * 12);
            gameState.chaos = Math.min(100, gameState.chaos + chaosIncrease);
            gameState.favorsLog.push({
                customer: customer.name,
                item: item.name,
                favor: favorText.trim(),
                day: gameState.day,
                chaosAdded: chaosIncrease,
            });
            gameState.townEvents.push(data?.townEffect || `The favor is set in motion.`);
            gameState.inventory = gameState.inventory.filter(it => it.id !== item.id);
            gameState.pendingSale = null;
            gameState.customerConversation = [];
            gameState.day++;
            updateChaosUI();
            saveGame();

            printInstant(`\n📋 Transaction complete. ${customer.name} departs.`);
            printHTML(`   <span class="favor-text">Favor logged: "${favorText.trim()}"</span>`);
            printInstant(`   Chaos: ${gameState.chaos}/100`);

            if (gameState.chaos >= 100) {
                await triggerBoilingPoint();
            } else if (gameState.chaos >= 75 && gameState.chaos - chaosIncrease < 75) {
                printHTML('\n<span class="chaos-high">⚠ THE AIR IN MILLBROOK FEELS ELECTRIC...</span>');
            } else if (gameState.chaos >= 50 && gameState.chaos - chaosIncrease < 50) {
                printInstant('\n🔍 Sirens in the distance. The town is waking up.');
            }
        }

        // ── TALK Command ────────────────────────────
        async function cmdTalk(message) {
            if (gameState.gameOver) { printInstant('THE SHOP IS CLOSED.'); return; }
            const customer = getActiveCustomer();
            if (!customer) {
                printInstant('No one is in the shop to talk to. Use NEXT to greet a customer.');
                return;
            }
            if (!message || message.trim().length < 2) {
                printInstant('What do you want to say? (e.g., TALK Tell me more about yourself)');
                return;
            }

            const custName = customer.name;
            const systemPrompt = `You are ${customer.name}, a resident of Millbrook, Maine (1989).
        You are currently inside "A Little Something", a mysterious antique shop.
        Your appearance: ${customer.appearance}
        Your visible need: ${customer.visibleNeed}
        Your secret pain: ${customer.secretPain}
        Your personality: ${customer.personality}
        Speak as this character. You are drawn to the items in the shop. You may reveal hints about your life, your pain, or the town.
        Keep responses under 200 characters, in character. No markdown. Use natural speech.`;

            const messages = [
                { role: 'system', content: systemPrompt },
                ...gameState.customerConversation.slice(-8),
                { role: 'user', content: message.trim() }
            ];

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_KEY}` },
                    body: JSON.stringify({ model: MODEL, messages: messages, temperature: 0.85 })
                });
                if (!res.ok) {
                    printInstant(`*** ${custName} seems distracted. They mumble something unintelligible.`);
                    return;
                }
                const data = await res.json();
                if (!data.choices?.[0]?.message?.content) {
                    printInstant(`*** ${custName} stares at you silently.`);
                    return;
                }
                const reply = data.choices[0].message.content.trim();
                printHTML(`\n<span class="customer-name">${custName}:</span> "${reply}"`);
                gameState.customerConversation.push({ role: 'user', content: message.trim() });
                gameState.customerConversation.push({ role: 'assistant', content: reply });
            } catch (err) {
                printInstant(`*** ${custName} coughs and looks away.`);
            }
        }

        // ── Boiling Point Ending ────────────────────
        async function triggerBoilingPoint() {
            gameState.gameOver = true;
            gameState.chaos = 100;
            updateChaosUI();
            saveGame();
            wrapper.classList.add('eruption');
            await print('\n🔥 MILLBROOK HAS REACHED ITS BOILING POINT.');
            const favorsSummary = gameState.favorsLog.map(f => `"${f.favor}" (${f.customer})`).join(', ');
            const prompt = `Millbrook, Maine has descended into chaos after dark favors at "A Little Something."
        Favors: ${favorsSummary}. Chaos is at its peak.
        Narrate the violent climax — the mob, the fire, the doom (5-7 sentences of dark prose).
        End with the proprietor slipping away or watching from the shop window.

        Return a JSON object with key "ending". Output ONLY valid JSON.`;
            const data = await callMistralJSON(SHOPKEEPER_SYSTEM, prompt);
            if (data && data.ending) {
                await print(`\n${data.ending}`);
            } else {
                await print(
                    '\nThe town tears itself apart. From your shop window, you watch the flames rise. You close the shutters, lock the door, and disappear into the night.'
                    );
            }
            printInstant('\n🕯️ THE END. Refresh the page to start a new game.');
        }

        async function cmdLeave() {
            if (gameState.gameOver) { printInstant('The shop is already closed.'); return; }
            if (gameState.pendingSale) {
                printInstant('You have an unfinished transaction. Complete it first.');
                return;
            }
            gameState.gameOver = true;
            saveGame();
            const chaos = gameState.chaos;
            const favorsCount = gameState.favorsLog.length;
            let endingType = chaos >= 80 ? 'the Collector — slipping away as the town burns' :
                chaos >= 50 ? 'the Merchant — leaving chaos in your wake' :
                chaos >= 20 ? 'the Instigator — seeds planted' : 'the Stranger — a brief, unsettling stay';

            await print(`\n🚪 You close the shop. ${favorsCount} favors fulfilled. Chaos: ${chaos}/100.`);
            const prompt = `The proprietor leaves Millbrook as ${endingType}. ${favorsCount} favors done. Chaos: ${chaos}/100.
        Narrate a brief ending (4-5 sentences). What do they see driving away? What remains?
        Return a JSON object with key "ending". Output ONLY valid JSON.`;
            const data = await callMistralJSON(SHOPKEEPER_SYSTEM, prompt);
            if (data && data.ending) {
                await print(`\n${data.ending}`);
            } else {
                await print(
                    '\nYou pack a single suitcase and drive out of Millbrook. In the rearview mirror, the town looks peaceful — but you know better.'
                    );
            }
            printInstant('\n🕯️ THE END. Refresh to start anew.');
        }

        function cmdTown() {
            const chaos = gameState.chaos;
            let mood = chaos < 20 ? 'Millbrook slumbers. Streets quiet, bells ring on schedule. But tension lingers.' :
                chaos < 40 ? 'Rumors drift through town. Doors lock earlier. The sheriff asks questions.' :
                chaos < 60 ? 'Arguments erupt in public. Vandalism. The town council meeting ends in shouting.' :
                chaos < 80 ? 'Sirens wail nightly. Families feud. LIAR painted on the church door.' :
                chaos < 100 ? 'Millbrook is a powder keg. A mob gathered last night. One spark away.' :
                'Millbrook is burning. There is no going back.';
            printInstant(`\n🏘️ MILLBROOK — Day ${gameState.day} — Chaos: ${gameState.chaos}/100`);
            printInstant(`   ${mood}`);
            if (gameState.townEvents.length > 0) {
                printInstant('\n📰 RECENT HAPPENINGS:');
                gameState.townEvents.slice(-5).forEach((e, i) => printInstant(`   ${i+1}. ${e}`));
            }
            if (gameState.favorsLog.length > 0) {
                printInstant(`\n📋 FAVORS: ${gameState.favorsLog.length}`);
                gameState.favorsLog.slice(-3).forEach(f => printInstant(`   • ${f.customer} — "${f.favor}"`));
            }
        }

        function cmdLedger() {
            if (gameState.favorsLog.length === 0) { printInstant('The ledger is empty.'); return; }
            printInstant('\n📖 THE LEDGER:');
            gameState.favorsLog.forEach((f, i) => {
                printInstant(`   ${i+1}. Day ${f.day}: ${f.customer} — "${f.item}"`);
                printInstant(`      Favor: "${f.favor}"`);
            });
            printInstant(`\n   Total: ${gameState.favorsLog.length} | Chaos: ${gameState.chaos}/100`);
        }

        // ── VISUAL BINDER ────────────────────────────
        async function generateItemImage(item) {
            const prompt = `antique shop item: ${item.name}, ${item.description}, mysterious cursed object, dark atmospheric still life, vintage photography, moody lighting, rustic`;
            const encoded = encodeURIComponent(prompt);
            return `https://image.pollinations.ai/prompt/${encoded}?width=220&height=180&nologo=true`;
        }

        async function loadCardImage(key, item, imgElement) {
            if (imageCache[key]) {
                imgElement.src = imageCache[key];
                imgElement.classList.remove('card-placeholder');
                return;
            }
            try {
                const url = await generateItemImage(item);
                imageCache[key] = url;
                saveImageCache();
                imgElement.src = url;
                imgElement.classList.remove('card-placeholder');
            } catch (err) {
                console.error('Image load error:', err);
            }
        }

        function showVisualBinder() {
            if (!gameState.inventory.length) {
                printInstant('Your inventory is empty. Use STOCK to find items first.');
                return;
            }
            binderGrid.innerHTML = '';
            gameState.inventory.forEach(item => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';

                const img = document.createElement('img');
                img.className = 'card-img card-placeholder';
                img.alt = item.name;
                const key = `item_${item.id}_${item.name}`;
                loadCardImage(key, item, img);

                const info = document.createElement('div');
                info.className = 'card-info';
                info.innerHTML = `
              <div class="card-name">#${item.id}: ${item.name}</div>
              <div class="card-desc">"${item.description}"</div>
              <div class="card-allure">Calls to: ${item.allure}</div>
            `;

                slot.appendChild(img);
                slot.appendChild(info);
                binderGrid.appendChild(slot);
            });

            binderOverlay.classList.remove('hidden');
            binderOverlay.style.display = 'flex';
        }

        function hideVisualBinder() {
            binderOverlay.classList.add('hidden');
            binderOverlay.style.display = '';
            cmdInput.focus();
        }

        binderCloseBtn.addEventListener('click', hideVisualBinder);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !binderOverlay.classList.contains('hidden')) {
                hideVisualBinder();
            }
        });

        function cmdHelp() {
            const helpText = `
╔══════════════════════════════════════════╗
║   A LITTLE SOMETHING — COMMANDS        ║
╠══════════════════════════════════════════╣
║ STOCK     — Restock inventory           ║
║ BROWSE    — View inventory (text)       ║
║ BINDER    — View inventory (visual)     ║
║ NEXT      — Greet a new customer        ║
║ SELL [#]  — Offer an item to customer   ║
║ FAVOR ... — Name your price             ║
║ TALK ...  — Converse with customer      ║
║ TOWN      — Check Millbrook's state     ║
║ LEDGER    — Review all transactions     ║
║ LEAVE     — Close shop & end game       ║
║ SETKEY    — Change API key              ║
║ MUTE      — Silence sounds              ║
║ UNMUTE    — Restore sounds              ║
║ CLEAR     — Clear screen                ║
║ HELP      — This list                   ║
╚══════════════════════════════════════════╝
The price is never money. It's always a favor.
     Each favor unravels Millbrook.
        At 100 chaos — the town erupts.`;
            printInstant(helpText);
        }

        // ── Input Handler ────────────────────────────
        cmdInput.addEventListener('keydown', async (e) => {
            if (e.key !== 'Enter') return;
            initAudio();
            const raw = cmdInput.value.trim();
            cmdInput.value = '';
            if (!raw) return;
            const upperCmd = raw.toUpperCase();
            printInstant(`> ${raw}`);

            if (gameState.gameOver) {
                if (upperCmd === 'HELP') cmdHelp();
                else if (upperCmd === 'CLEAR') outputEl.innerHTML = '';
                else if (upperCmd === 'SETKEY') {
                    MISTRAL_KEY = '';
                    localStorage.removeItem('nft_api_key');
                    keyOverlay.classList.remove('hidden');
                    apiKeyInput.value = '';
                    apiKeyInput.focus();
                    printInstant('API key cleared.');
                } else if (upperCmd === 'MUTE') { soundEnabled = false;
                    printInstant('SOUND MUTED.'); } else if (upperCmd === 'UNMUTE') { soundEnabled = true;
                    printInstant('SOUND ON.'); } else if (upperCmd === 'TOWN') cmdTown();
                else if (upperCmd === 'LEDGER') cmdLedger();
                else if (upperCmd === 'BROWSE') cmdBrowse();
                else if (upperCmd === 'BINDER') showVisualBinder();
                else printInstant('THE SHOP IS CLOSED. Refresh to begin again.');
                return;
            }

            if (gameState.pendingSale) {
                if (upperCmd.startsWith('FAVOR ') || upperCmd.startsWith('FAVOUR ')) {
                    const favorText = raw.slice(raw.indexOf(' ') + 1).trim();
                    await cmdFavor(favorText);
                } else if (upperCmd.startsWith('TALK ')) {
                    const msg = raw.slice(5).trim();
                    await cmdTalk(msg);
                } else if (upperCmd === 'HELP') cmdHelp();
                else if (upperCmd === 'TOWN') cmdTown();
                else if (upperCmd === 'BROWSE') cmdBrowse();
                else if (upperCmd === 'BINDER') showVisualBinder();
                else if (upperCmd === 'LEDGER') cmdLedger();
                else if (upperCmd === 'MUTE') { soundEnabled = false;
                    printInstant('SOUND MUTED.'); } else if (upperCmd === 'UNMUTE') { soundEnabled = true;
                    printInstant('SOUND ON.'); } else if (upperCmd === 'CLEAR') outputEl.innerHTML = '';
                else printInstant('A transaction is pending. Name your FAVOR. (e.g., FAVOR Spread a rumor)');
                return;
            }

            if (upperCmd === 'STOCK') await cmdStock();
            else if (upperCmd === 'BROWSE') cmdBrowse();
            else if (upperCmd === 'BINDER') showVisualBinder();
            else if (upperCmd === 'NEXT' || upperCmd === 'GREET') await cmdNext();
            else if (upperCmd.startsWith('SELL ')) {
                const num = parseInt(raw.slice(5).trim());
                if (isNaN(num)) printInstant('Usage: SELL [number]');
                else await cmdSell(num);
            } else if (upperCmd.startsWith('TALK ')) {
                const msg = raw.slice(5).trim();
                await cmdTalk(msg);
            } else if (upperCmd === 'TOWN') cmdTown();
            else if (upperCmd === 'LEDGER') cmdLedger();
            else if (upperCmd === 'LEAVE') await cmdLeave();
            else if (upperCmd === 'HELP') cmdHelp();
            else if (upperCmd === 'CLEAR') outputEl.innerHTML = '';
            else if (upperCmd === 'SETKEY') {
                MISTRAL_KEY = '';
                localStorage.removeItem('nft_api_key');
                keyOverlay.classList.remove('hidden');
                apiKeyInput.value = '';
                apiKeyInput.focus();
                printInstant('API key cleared.');
            } else if (upperCmd === 'MUTE') { soundEnabled = false;
                printInstant('SOUND MUTED.'); } else if (upperCmd === 'UNMUTE') { soundEnabled = true;
                printInstant('SOUND ON.'); } else if (upperCmd.startsWith('FAVOR') || upperCmd.startsWith('FAVOUR')) {
                printInstant('No pending transaction. Use SELL [number] first.');
            } else printInstant('Unknown command. Type HELP.');
        });

        // ── Boot Sequence ───────────────────────────
        async function boot() {
            const hasSave = loadGame();
            updateChaosUI();
            await print('╔══════════════════════════════════════╗');
            await print('║   A LITTLE SOMETHING                ║');
            await print('║   Antiques & Curiosities            ║');
            await print('║   Millbrook, Maine — 1989           ║');
            await print('╚══════════════════════════════════════╝');
            await print('');
            await print('You are the new proprietor.');
            await print('Every item has a price — but it is never money.');
            await print('It is always a small favor. A tiny, malicious errand.');
            await print('');
            if (hasSave && gameState.favorsLog.length > 0) {
                await print('📖 Your ledger shows previous transactions...');
                await print(
                    `   Day ${gameState.day} | Chaos: ${gameState.chaos}/100 | Favors: ${gameState.favorsLog.length}`);
                if (gameState.gameOver) {
                    await print('\n🕯️ This story has ended. Refresh to begin anew.');
                    return;
                }
            } else if (hasSave && gameState.inventory.length > 0) {
                await print('📦 Shelves hold items from before...');
                await print(`   ${gameState.inventory.length} items waiting.`);
            } else {
                await print('📦 Shelves are bare. Type STOCK to fill them.');
                await print('🔔 Type NEXT for your first customer.');
            }
            await print('\nType HELP for commands. The shop is open...');
            if (gameState.chaos >= 50) {
                printHTML('\n<span class="chaos-high">⚠ THE TOWN IS RESTLESS.</span>');
            }
        }

        if (MISTRAL_KEY) { window.booted = true;
            boot(); }
    </script>
</body>
</html>
