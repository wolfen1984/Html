<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENEATH THE BACKWOODS — NIGHTFALL GAMES 1984 (BUTTON EDITION)</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --surface: #0b0b0b;
            --text: #fff;
            --muted: #7a7a7a;
            --border: #3a3a3a;
            --border-light: #5a5a5a;
            --accent: #b1ffb1;
            --glow: rgba(255, 255, 255, 0.05);
            --btn-bg: #1c1c1c;
            --btn-hover: #2e2e2e;
            --btn-active: #3a3a3a;
            --sel-glow: #ffd700;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #fff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.7;
            padding: 0.8rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .crt-frame {
            max-width: 1050px;
            width: 100%;
            margin: 0 auto;
            border: 2px solid #3a3a3a;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
            background: #0b0b0b;
            padding: 1.2rem 1rem;
            position: relative;
        }
        .crt-frame::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.12) 0px, rgba(0, 0, 0, 0.12) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 2;
        }
        .game-header {
            border-bottom: 2px solid #444;
            padding-bottom: 0.6rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            letter-spacing: 1.5px;
            font-size: 0.6rem;
            text-transform: uppercase;
            color: #b0b0b0;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .title-main {
            font-size: 0.95rem;
            color: #f0f0f0;
            text-shadow: 0 0 5px #7f7f7f;
        }
        .output-window {
            background: #050505;
            padding: 1.2rem 1rem;
            border: 1px solid #2e2e2e;
            height: 380px;
            overflow-y: auto;
            margin-bottom: 0.8rem;
            font-size: 0.7rem;
            line-height: 1.9;
            scroll-behavior: smooth;
            box-shadow: inset 0 0 15px #000;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .output-window::-webkit-scrollbar {
            width: 6px;
        }
        .output-window::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        .output-window::-webkit-scrollbar-thumb {
            background: #3d3d3d;
            border: 1px solid #6d6d6d;
        }
        .output-window>div {
            margin-bottom: 0.9rem;
            line-height: 1.9;
        }
        .section-label {
            font-size: 0.5rem;
            color: #6a6a6a;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
            margin-top: 0.4rem;
            border-bottom: 1px solid #222;
            padding-bottom: 0.2rem;
        }
        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin-bottom: 0.35rem;
            align-items: center;
        }
        button {
            background: #1c1c1c;
            border: 2px outset #4a4a4a;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55rem;
            padding: 0.45rem 0.7rem;
            cursor: pointer;
            text-shadow: 0 0 2px black;
            letter-spacing: 0.8px;
            transition: all 0.08s ease;
            white-space: nowrap;
            min-width: 38px;
            text-align: center;
            border-radius: 2px;
        }
        button:hover {
            background: #2e2e2e;
            border-color: #8a8a8a;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.08);
        }
        button:active {
            border-style: inset;
            background: #3a3a3a;
            transform: scale(0.96);
        }
        button.selected {
            border-color: #ffd700 !important;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3) !important;
            background: #2a2a1a !important;
            animation: pulse-sel 1.2s infinite;
        }
        @keyframes pulse-sel {
            0%,
            100% {
                box-shadow: 0 0 6px rgba(255, 215, 0, 0.25);
            }
            50% {
                box-shadow: 0 0 14px rgba(255, 215, 0, 0.5);
            }
        }
        button.move-btn {
            font-size: 0.6rem;
            padding: 0.5rem 0.85rem;
            border-color: #5a5a5a;
            letter-spacing: 1px;
            min-width: 44px;
        }
        button.npc-btn {
            border-color: #6a4a6a;
            background: #1a1a1f;
        }
        button.npc-btn:hover {
            border-color: #a0a0c0;
            background: #252530;
        }
        button.take-btn {
            border-color: #4a6a4a;
            background: #1a1f1a;
        }
        button.take-btn:hover {
            border-color: #80c080;
            background: #202820;
        }
        button.examine-btn {
            border-color: #5a5a4a;
            background: #1a1a18;
        }
        button.examine-btn:hover {
            border-color: #c0c080;
            background: #242420;
        }
        button.shop-btn {
            border-color: #4a5a6a;
            background: #181a1f;
        }
        button.shop-btn:hover {
            border-color: #80a0c0;
            background: #202428;
        }
        button.topic-btn {
            font-size: 0.5rem;
            padding: 0.35rem 0.55rem;
            border-color: #5a5a3a;
            background: #1a1a14;
        }
        button.topic-btn:hover {
            border-color: #c0c060;
            background: #222218;
        }
        button.danger-btn {
            border-color: #6a3a3a;
            background: #1f1515;
            color: #ff9999;
        }
        button.danger-btn:hover {
            border-color: #c04040;
            background: #2a1818;
        }
        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
            border-style: solid;
        }
        .status-bar {
            margin-top: 0.6rem;
            font-size: 0.5rem;
            color: #7a7a7a;
            text-align: right;
            border-top: 1px solid #2a2a2a;
            padding-top: 0.6rem;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .selected-indicator {
            color: #ffd700;
            font-size: 0.5rem;
            letter-spacing: 1px;
            animation: pulse-sel 1.5s infinite;
            display: inline-block;
            margin-left: 0.5rem;
        }
        .compass-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            margin: 0 auto;
        }
        .compass-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        @media (max-width: 768px) {
            body {
                padding: 0.3rem;
            }
            .crt-frame {
                padding: 0.6rem 0.4rem;
            }
            .output-window {
                height: 250px;
                font-size: 0.6rem;
                padding: 0.8rem 0.5rem;
            }
            button {
                font-size: 0.45rem;
                padding: 0.35rem 0.5rem;
                min-width: 28px;
            }
            .btn-row {
                gap: 0.2rem;
            }
            .game-header {
                font-size: 0.45rem;
            }
            .title-main {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

        <div class="status-bar" id="statusBar"></div>
    </div>

            // =============================================================================
            // DOM ELEMENTS
            // =============================================================================
            const outputElement = document.getElementById('gameOutput');
            const moveButtons = document.getElementById('moveButtons');
            const examineButtons = document.getElementById('examineButtons');
            const takeButtons = document.getElementById('takeButtons');
            const npcButtons = document.getElementById('npcButtons');
            const shopButtons = document.getElementById('shopButtons');
            const topicButtons = document.getElementById('topicButtons');
            const topicLabel = document.getElementById('topicLabel');
            const inventoryButtons = document.getElementById('inventoryButtons');
            const actionButtons = document.getElementById('actionButtons');
            const statusBar = document.getElementById('statusBar');
            const selectedItemIndicator = document.getElementById('selectedItemIndicator');

            function displayText(text) {
                let p = document.createElement('div');
                p.textContent = text;
                outputElement.appendChild(p);
                outputElement.scrollTop = outputElement.scrollHeight;
            }

            function addEvidence(item) {
                if (!gameState.evidenceList.includes(item)) {
                    gameState.evidenceList.push(item);
                }
            }

            function updateAll() {
                updateStatusBar();
                updateSelectedIndicator();
                renderAllButtons();
                updateFooterData();
            }

            function updateFooterData() {
                let evCount = gameState.evidenceList.length;
                statusBar.innerHTML =
                    `[ DETECTIVE J. COLE // CASE: LILY MILLER // RESPECT: ${gameState.respect} // MONEY: $${gameState.money} // EVIDENCE: ${evCount} ]`;
            }

            function updateStatusBar() {
                updateFooterData();
            }

            function updateSelectedIndicator() {
                if (gameState.selectedInventoryItem) {
                    selectedItemIndicator.textContent = '◆ SELECTED: ' + gameState.selectedInventoryItem.toUpperCase();
                } else {
                    selectedItemIndicator.textContent = '';
                }
            }

            function getAvailableExits() {
                let loc = locations[gameState.location];
                if (!loc.exits) return [];
                return Object.entries(loc.exits);
            }

            function getNPCsInRoom() {
                let loc = locations[gameState.location];
                let npcs = [];
                if (loc.npc) {
                    let n = loc.npc;
                    if (n === 'sheriff' && gameState.sheriffHere && !gameState.sheriffKnockedOut) npcs.push('sheriff');
                    else if (n === 'sheriff' && gameState.sheriffKnockedOut) npcs.push('sheriff_unconscious');
                    else if (n === 'earl' && gameState.drunkHere && !gameState.drunkKnockedOut) npcs.push('earl');
                    else if (n === 'earl' && gameState.drunkKnockedOut) npcs.push('earl_unconscious');
                    else if (n === 'roxy' && gameState.roxyHere && !gameState.roxyKnockedOut) npcs.push('roxy');
                    else if (n === 'roxy' && gameState.roxyKnockedOut) npcs.push('roxy_unconscious');
                    else if (n === 'edna') npcs.push('edna');
                    else if (n === 'sarah') npcs.push('sarah');
                    else if (n === 'bartender') npcs.push('bartender');
                    else if (n === 'pritchard') npcs.push('pritchard');
                    else if (n === 'moss' && gameState.deputyActive) npcs.push('moss');
                    else if (n === 'guard') npcs.push('guard');
                }
                if (gameState.location === 'millerHouse' && !gameState.returnedShoe) {
                    if (!npcs.includes('sarah')) npcs.push('sarah');
                    npcs.push('ethan');
                }
                return npcs;
            }

            function getNPCKey(npcDisplay) {
                if (npcDisplay.includes('unconscious')) return npcDisplay.replace('_unconscious', '');
                return npcDisplay;
            }

            function isNPCUnconscious(npcDisplay) {
                return npcDisplay.includes('unconscious');
            }

            // =============================================================================
            // RENDER BUTTONS
            // =============================================================================
            function renderAllButtons() {
                if (gameState.endingTriggered) {
                    moveButtons.innerHTML = '';
                    examineButtons.innerHTML = '';
                    takeButtons.innerHTML = '';
                    npcButtons.innerHTML = '';
                    shopButtons.innerHTML = '';
                    topicButtons.innerHTML = '';
                    topicLabel.style.display = 'none';
                    inventoryButtons.innerHTML = '';
                    actionButtons.innerHTML =
                        '<button disabled style="opacity:0.6;">GAME OVER — RELOAD TO PLAY AGAIN</button>';
                    gameState.conversationNPC = null;
                    gameState.selectedInventoryItem = null;
                    updateSelectedIndicator();
                    return;
                }

                renderMoveButtons();
                renderExamineButtons();
                renderTakeButtons();
                renderNPCButtons();
                renderShopButtons();
                renderTopicButtons();
                renderInventoryButtons();
                renderActionButtons();
                updateSelectedIndicator();
                updateStatusBar();
            }

            function renderMoveButtons() {
                let exits = getAvailableExits();
                let html = '';
                let dirLabels = { north: '↑ N', south: '↓ S', east: '→ E', west: '← W', out: 'OUT', in: 'IN', up: 'UP',
                    down: 'DOWN' };
                for (let [dir, dest] of exits) {
                    let label = dirLabels[dir] || dir.toUpperCase();
                    html +=
                        `<button class="move-btn" onclick="window._gameMove('${dir}')" title="Go to ${dest}">${label}</button>`;
                }
                if (!exits.length) html = '<span style="font-size:0.5rem;color:#555;">NO EXITS</span>';
                moveButtons.innerHTML = html;
            }

            function renderExamineButtons() {
                let loc = locations[gameState.location];
                let html = '';
                if (loc.examinable) {
                    for (let [key, desc] of Object.entries(loc.examinable)) {
                        html +=
                            `<button class="examine-btn" onclick="window._gameExamine('${key}')" title="${desc.substring(0,60)}...">🔍 ${key.toUpperCase()}</button>`;
                    }
                }
                if (!html) html = '<span style="font-size:0.5rem;color:#444;">NOTHING NOTABLE</span>';
                examineButtons.innerHTML = html;
            }

            function renderTakeButtons() {
                let loc = locations[gameState.location];
                let html = '';
                if (loc.takeable && Object.keys(loc.takeable).length > 0) {
                    for (let [key, item] of Object.entries(loc.takeable)) {
                        let label = item.name ? item.name.toUpperCase() : key.toUpperCase();
                        let req = item.requires;
                        let canTake = true;
                        let reqText = '';
                        if (req === 'drunkGaveCompass' && !gameState.drunkGaveCompass) { canTake = false;
                            reqText = ' (NEED EARL\'S TRUST)'; } else if (req === 'sheriffKnockedOut' && !gameState
                            .sheriffKnockedOut) { canTake = false;
                            reqText = ' (SHERIFF PRESENT)'; } else if (req === 'emptyBottle' && !gameState
                            .emptyBottle) { canTake = false;
                            reqText = ' (NEED CONTAINER)'; }
                        if (canTake) {
                            html +=
                                `<button class="take-btn" onclick="window._gameTake('${key}')">📦 ${label}</button>`;
                        } else {
                            html +=
                                `<button class="take-btn" disabled style="opacity:0.4;" title="Requirement not met">📦 ${label}${reqText}</button>`;
                        }
                    }
                }
                if (!html) html = '<span style="font-size:0.5rem;color:#444;">NOTHING TO TAKE</span>';
                takeButtons.innerHTML = html;
            }

            function renderNPCButtons() {
                let npcs = getNPCsInRoom();
                let html = '';
                for (let npc of npcs) {
                    let baseKey = getNPCKey(npc);
                    let displayName = baseKey.toUpperCase();
                    let isUnc = isNPCUnconscious(npc);
                    if (isUnc) {
                        html +=
                            `<button class="npc-btn" disabled style="opacity:0.5;">💤 ${displayName} (UNCONSCIOUS)</button>`;
                    } else {
                        let selClass = (gameState.selectedInventoryItem) ? ' take-btn' : '';
                        html +=
                            `<button class="npc-btn${selClass}" onclick="window._gameNPCClick('${baseKey}')">👤 ${displayName}</button>`;
                        html +=
                            `<button class="danger-btn" onclick="window._gameSlap('${baseKey}')" style="font-size:0.4rem;padding:0.3rem 0.4rem;" title="Slap">👋</button>`;
                        html +=
                            `<button class="danger-btn" onclick="window._gamePunch('${baseKey}')" style="font-size:0.4rem;padding:0.3rem 0.4rem;" title="Punch">👊</button>`;
                    }
                }
                if (!html) html = '<span style="font-size:0.5rem;color:#444;">NO ONE HERE</span>';
                npcButtons.innerHTML = html;
            }

            function renderShopButtons() {
                let loc = locations[gameState.location];
                let html = '';
                if (loc.shop) {
                    for (let [key, item] of Object.entries(loc.shop)) {
                        let label = (item.item || key).toUpperCase();
                        html +=
                            `<button class="shop-btn" onclick="window._gameBuy('${key}')">💰 ${label} — $${item.price}</button>`;
                    }
                }
                if (!html) html = '<span style="font-size:0.5rem;color:#444;">NOTHING FOR SALE</span>';
                shopButtons.innerHTML = html;
            }

            function renderTopicButtons() {
                if (!gameState.conversationNPC) {
                    topicButtons.innerHTML = '';
                    topicLabel.style.display = 'none';
                    return;
                }
                let npcKey = gameState.conversationNPC;
                let npcData = npcDialogue[npcKey];
                if (!npcData || !npcData.topics || npcData.topics.length === 0) {
                    topicButtons.innerHTML = '<span style="font-size:0.5rem;color:#555;">NO TOPICS</span>';
                    topicLabel.style.display = 'block';
                    return;
                }
                let html = '';
                for (let topic of npcData.topics) {
                    html +=
                        `<button class="topic-btn" onclick="window._gameAsk('${npcKey}','${topic}')">❓ ${topic.toUpperCase()}</button>`;
                }
                html +=
                    `<button class="topic-btn" style="border-color:#555;" onclick="window._gameClearConversation()">✕ CLOSE</button>`;
                topicButtons.innerHTML = html;
                topicLabel.style.display = 'block';
            }

            function renderInventoryButtons() {
                let html = '';
                if (gameState.inventory.length === 0) {
                    html = '<span style="font-size:0.5rem;color:#444;">EMPTY</span>';
                } else {
                    for (let item of gameState.inventory) {
                        let isSel = (gameState.selectedInventoryItem === item);
                        let selClass = isSel ? ' selected' : '';
                        html +=
                            `<button class="${selClass}" onclick="window._gameSelectInventory('${item}')" style="${isSel?'font-weight:bold;':''}">${item.toUpperCase()}</button>`;
                    }
                    html +=
                        `<button onclick="window._gameClearSelection()" style="border-color:#555;font-size:0.45rem;">✕ DESELECT</button>`;
                }
                inventoryButtons.innerHTML = html;
            }

            function renderActionButtons() {
                let html = '';
                if (gameState.selectedInventoryItem) {
                    html +=
                        `<button onclick="window._gameUseSelected()" style="border-color:#ffd700;">⚡ USE: ${gameState.selectedInventoryItem.toUpperCase()}</button>`;
                    if (gameState.conversationNPC) {
                        html +=
                            `<button onclick="window._gameGiveSelected('${gameState.conversationNPC}')" style="border-color:#ffd700;">🎁 GIVE TO ${gameState.conversationNPC.toUpperCase()}</button>`;
                    }
                } else {
                    html += '<button disabled>⚡ USE (SELECT ITEM)</button>';
                }
                if (gameState.location === 'sheriffOffice' && gameState.sheriffHere && !gameState.sheriffKnockedOut &&
                    gameState.foundGrave) {
                    html +=
                        '<button class="danger-btn" onclick="window._gameAccuse()">🚨 ACCUSE SHERIFF</button>';
                }
                if (gameState.location === 'gasStationAlley' && gameState.drunkHere && !gameState.drunkKnockedOut &&
                    gameState.money >= 5) {
                    html += '<button class="shop-btn" onclick="window._gameGiveMoneyNPC(\'earl\',5)">💵 GIVE $5 TO EARL</button>';
                }
                if ((gameState.location === 'barExterior' || gameState.location === 'roxyApartment') && gameState
                    .roxyHere && !gameState.roxyKnockedOut && gameState.money >= 10 && !gameState.roxyGivenInfo) {
                    html +=
                        '<button class="shop-btn" onclick="window._gameGiveMoneyNPC(\'roxy\',10)">💵 GIVE $10 TO ROXY (INFO)</button>';
                }
                if (gameState.location === 'nightfallWarehouse' && gameState.money >= 50) {
                    html +=
                        '<button class="shop-btn" onclick="window._gameBribeGuard()">💵 BRIBE GUARD $50</button>';
                }
                html += '<button onclick="window._gameLook()" style="border-color:#5a5a5a;">👁 LOOK</button>';
                html +=
                    '<button onclick="window._gameShowHelp()" style="border-color:#444;font-size:0.45rem;">? HELP</button>';
                actionButtons.innerHTML = html;
            }

            // =============================================================================
            // GAME ACTIONS
            // =============================================================================
            window._gameMove = function(dir) {
                if (gameState.endingTriggered) return;
                let currentLoc = locations[gameState.location];
                if (currentLoc.exits && currentLoc.exits[dir]) {
                    gameState.location = currentLoc.exits[dir];
                    gameState.conversationNPC = null;
                    displayText('> YOU MOVE ' + dir.toUpperCase() + '.');
                    displayText(getLookDescription());
                    updateAll();
                } else {
                    displayText('YOU CAN\'T GO THAT WAY.');
                    updateAll();
                }
            };

            window._gameExamine = function(key) {
                if (gameState.endingTriggered) return;
                let loc = locations[gameState.location];
                // If an inventory item is selected, try using it on this object
                if (gameState.selectedInventoryItem) {
                    handleUseItemOnObject(gameState.selectedInventoryItem, key);
                    updateAll();
                    return;
                }
                if (loc.examinable && loc.examinable[key]) {
                    displayText(loc.examinable[key]);
                    if (key === 'well' && gameState.location === 'backLot') gameState.knowsAboutWell = true;
                    if (key === 'clock' && gameState.location === 'diner')
                        displayText('You wind the clock. It chimes once. Edna flinches.');
                    if (key === 'owl' && gameState.location === 'sheriffOffice' && !gameState.sheriffKnockedOut)
                        displayText("The owl's head creaks. It was facing the door. Now it faces you.");
                } else {
                    displayText('You see nothing unusual about that.');
                }
                updateAll();
            };

            window._gameTake = function(key) {
                if (gameState.endingTriggered) return;
                let loc = locations[gameState.location];
                if (loc.takeable && loc.takeable[key]) {
                    let item = loc.takeable[key];
                    if (item.requires) {
                        if (item.requires === 'drunkGaveCompass' && !gameState.drunkGaveCompass) {
                            displayText("Earl won't give it up. Maybe try giving him something first?");
                            updateAll();
                            return;
                        }
                        if (item.requires === 'sheriffKnockedOut' && !gameState.sheriffKnockedOut) {
                            displayText('Not while he\'s conscious.');
                            updateAll();
                            return;
                        }
                        if (item.requires === 'emptyBottle' && !gameState.emptyBottle) {
                            displayText('You need a container for the oil.');
                            updateAll();
                            return;
                        }
                    }
                    if (item.hostile) {
                        gameState.sheriffHostile = true;
                        displayText('Sheriff: "I warned you." The owl\'s head turns 180 degrees.');
                    }
                    gameState.inventory.push(item.name);
                    displayText(item.takeMsg);
                    if (item.evidence) addEvidence(item.name);
                    if (item.name === 'oldLantern') gameState.hasLamp = true;
                    if (item.name === 'silverLocket') gameState.foundLocket = true;
                    if (item.name === 'pinkRibbon') gameState.foundRibbon = true;
                    if (item.name === 'lilyBarette') gameState.foundBarette = true;
                    if (item.name === 'childShoe') gameState.foundShoe = true;
                    if (item.name === 'vhsTape') gameState.foundVHS = true;
                    if (item.name === 'cassetteTape') gameState.foundCassette = true;
                    if (item.name === 'lilyDiary') gameState.foundDiary = true;
                    if (item.name === 'nightfallBadge') gameState.foundNightfallBadge = true;
                    if (item.name === 'lilyBackpack') gameState.foundBackpack = true;
                    if (item.name === 'nightfallManifest') gameState.foundManifest = true;
                    if (item.name === 'phoneReceiver') gameState.foundReceiver = true;
                    if (item.name === 'rustyCompass') gameState.compassInInventory = true;
                    if (item.name === 'motorOil') { gameState.lanternFuel = 2;
                        gameState.emptyBottle = false; }
                    if (item.name === 'crowbar') gameState.hasCrowbar = true;
                    if (item.name === 'shovel') gameState.hasShovel = true;
                    if (item.name === 'rope') gameState.hasRope = true;
                    if (item.name === 'flashlight') gameState.hasFlashlight = true;
                    if (item.name === 'gloves') gameState.hasGloves = true;
                    if (item.name === 'ductTape') gameState.hasDuctTape = true;
                    if (item.name === 'lockpicks') gameState.hasLockpicks = true;
                    if (item.name === 'whiskey') gameState.hasWhiskey = true;
                    if (item.name === 'pancakes') gameState.hasPancakes = true;
                    if (item.name === 'pie') gameState.hasPie = true;
                    if (item.name === 'coffee') gameState.hasCoffee = true;
                    delete loc.takeable[key];
                } else {
                    displayText("You can't take that.");
                }
                updateAll();
            };

            window._gameNPCClick = function(npcKey) {
                if (gameState.endingTriggered) return;
                if (gameState.selectedInventoryItem) {
                    handleGiveItem(gameState.selectedInventoryItem, npcKey);
                    updateAll();
                    return;
                }
                gameState.conversationNPC = npcKey;
                handleTalk(npcKey);
                updateAll();
            };

            window._gameSlap = function(npcKey) {
                if (gameState.endingTriggered) return;
                handleViolence('slap', npcKey);
                updateAll();
            };

            window._gamePunch = function(npcKey) {
                if (gameState.endingTriggered) return;
                handleViolence('punch', npcKey);
                updateAll();
            };

            window._gameBuy = function(key) {
                if (gameState.endingTriggered) return;
                handleBuy(key);
                updateAll();
            };

            window._gameAsk = function(npcKey, topic) {
                if (gameState.endingTriggered) return;
                handleAsk(npcKey, topic);
                updateAll();
            };

            window._gameClearConversation = function() {
                gameState.conversationNPC = null;
                updateAll();
            };

            window._gameSelectInventory = function(item) {
                if (gameState.selectedInventoryItem === item) {
                    gameState.selectedInventoryItem = null;
                } else {
                    gameState.selectedInventoryItem = item;
                    displayText('> SELECTED: ' + item.toUpperCase() + ' — Click a room object to USE it, or an NPC to GIVE it.');
                }
                updateAll();
            };

            window._gameClearSelection = function() {
                gameState.selectedInventoryItem = null;
                updateAll();
            };

            window._gameUseSelected = function() {
                if (gameState.endingTriggered) return;
                if (!gameState.selectedInventoryItem) return;
                handleUseItemGeneric(gameState.selectedInventoryItem);
                updateAll();
            };

            window._gameGiveSelected = function(npcKey) {
                if (gameState.endingTriggered) return;
                if (!gameState.selectedInventoryItem) return;
                handleGiveItem(gameState.selectedInventoryItem, npcKey);
                updateAll();
            };

            window._gameAccuse = function() {
                if (gameState.endingTriggered) return;
                handleAccuse();
                updateAll();
            };

            window._gameGiveMoneyNPC = function(npcKey, amount) {
                if (gameState.endingTriggered) return;
                if (gameState.money >= amount) {
                    gameState.money -= amount;
                    if (npcKey === 'earl') {
                        displayText('You give Earl $' + amount + '. "Thanks, mister." +1 respect.');
                        gameState.respect = Math.min(20, gameState.respect + 1);
                    } else if (npcKey === 'roxy') {
                        displayText(npcDialogue.roxy.giveMoney);
                        gameState.roxyGivenInfo = true;
                        gameState.respect = Math.min(20, gameState.respect + 1);
                    }
                } else {
                    displayText('Not enough money.');
                }
                updateAll();
            };

            window._gameBribeGuard = function() {
                if (gameState.money >= 50) {
                    gameState.money -= 50;
                    displayText('GUARD: "...$50. And you never saw me." HE STEPS ASIDE.\nThe warehouse interior is now accessible.');
                    gameState.guardHostile = false;
                } else {
                    displayText('Not enough money. Guard wants $50.');
                }
                updateAll();
            };

            window._gameLook = function() {
                if (gameState.endingTriggered) return;
                displayText(getLookDescription());
                updateAll();
            };

            window._gameShowHelp = function() {
                displayText(`BUTTON GUIDE:
        ▸ MOVEMENT: Click directional buttons (N/S/E/W/OUT/IN etc.)
        ▸ EXAMINE: Click 🔍 buttons to inspect objects
        ▸ TAKE: Click 📦 buttons to pick up items
        ▸ PEOPLE: Click 👤 to talk, 👋 to slap, 👊 to punch
        ▸ SHOP: Click 💰 buttons to buy items
        ▸ INVENTORY: Click an item to SELECT it
        ▸ With item selected: click room object = USE item on it
        ▸ With item selected: click NPC = GIVE item to them
        ▸ TOPICS appear when talking to an NPC
        ▸ LOOK: Reprints room description
        ▸ ACCUSE: Confront sheriff with evidence (in his office)
        ▸ DESELECT: Clears selected inventory item`);
                updateAll();
            };

            // =============================================================================
            // GAME LOGIC FUNCTIONS
            // =============================================================================
            function getLookDescription() {
                let loc = locations[gameState.location];
                let desc = '> ' + loc.name + '\n' + loc.desc;
                if (gameState.location === 'sheriffOffice' && gameState.sheriffHere && !gameState.sheriffKnockedOut)
                    desc += '\n\nSHERIFF CRAINE watches you from his desk.';
                if (gameState.location === 'gasStationAlley' && gameState.drunkHere && !gameState.drunkKnockedOut)
                    desc += '\n\nEARL sits against the wall, clutching a compass.';
                if (gameState.location === 'barExterior' && gameState.roxyHere && !gameState.roxyKnockedOut)
                    desc += '\n\nROXY leans against the wall, smoking.';
                if (gameState.location === 'diner') desc += '\n\nEDNA is behind the counter, staring at the clock.';
                if (gameState.location === 'millerHouse' && !gameState.returnedShoe)
                    desc += '\n\nSARAH and ETHAN are home. ETHAN holds one shoe.';
                if (gameState.location === 'deputyOffice' && gameState.deputyActive)
                    desc += '\n\nDEPUTY MOSS is here, looking nervous.';
                return desc;
            }

            function handleTalk(npcKey) {
                let npcData = npcDialogue[npcKey];
                if (!npcData) { displayText('You can\'t talk to that.'); return; }
                if (npcKey === 'sheriff') {
                    if (gameState.sheriffKnockedOut) { displayText(npcData.knockedOut); return; }
                    if (gameState.respect < 5) { displayText(npcData.lowRespect); return; }
                    if (gameState.sheriffHostile) { displayText('Sheriff refuses to speak with you.'); return; }
                    if (!gameState.talkedToSheriff) { displayText(npcData.firstTalk);
                        gameState.talkedToSheriff = true; } else displayText(
                        'SHERIFF: "You\'re still here. Case is closed."');
                } else if (npcKey === 'earl') {
                    if (gameState.drunkKnockedOut) { displayText(npcData.knockedOut); return; }
                    if (gameState.respect < 4) { displayText(npcData.lowRespect); return; }
                    if (!gameState.talkedToDrunk) { displayText(npcData.firstTalk);
                        gameState.talkedToDrunk = true; } else displayText(
                        'EARL: "Still got that smell. You find Lily yet?"');
                } else if (npcKey === 'roxy') {
                    if (gameState.roxyKnockedOut) { displayText(npcData.knockedOut); return; }
                    if (gameState.respect < 3) { displayText(npcData.lowRespect); return; }
                    if (!gameState.talkedToRoxy) { displayText(npcData.firstTalk);
                        gameState.talkedToRoxy = true; } else displayText(
                        'ROXY: "You got my money yet? Time\'s wastin\'."');
                } else if (npcKey === 'edna') {
                    displayText(npcData.firstTalk);
                    gameState.ednaTalked = true;
                } else if (npcKey === 'sarah') {
                    displayText(npcData.firstTalk);
                    gameState.millerTalked = true;
                } else if (npcKey === 'ethan') {
                    displayText(npcData.firstTalk);
                    gameState.ethanTalked = true;
                } else if (npcData && npcData.firstTalk) {
                    displayText(npcData.firstTalk);
                }
                gameState.conversationNPC = npcKey;
            }

            function handleAsk(npcKey, topic) {
                let npcData = npcDialogue[npcKey];
                if (!npcData) { displayText('Cannot ask them.'); return; }
                let askKey = 'ask' + topic.charAt(0).toUpperCase() + topic.slice(1);
                if (npcData[askKey]) {
                    displayText(npcData[askKey]);
                } else {
                    displayText('They have nothing to say about that.');
                }
                gameState.conversationNPC = npcKey;
            }

            function handleGiveItem(itemName, npcKey) {
                if (!gameState.inventory.includes(itemName)) {
                    displayText("You don't have that item.");
                    gameState.selectedInventoryItem = null;
                    return;
                }
                if (npcKey === 'earl' && gameState.location === 'gasStationAlley' && !gameState.drunkKnockedOut) {
                    if (itemName === 'pancakes') {
                        displayText(npcDialogue.earl.givePancakes);
                        gameState.inventory = gameState.inventory.filter(i => i !== 'pancakes');
                        gameState.drunkGaveCompass = true;
                        gameState.respect = Math.min(20, gameState.respect + 3);
                        if (!gameState.inventory.includes('rustyCompass')) { gameState.inventory.push('rustyCompass');
                            displayText('Earl gives you his compass.'); }
                        gameState.selectedInventoryItem = null;
                        return;
                    }
                    if (itemName === 'whiskey') {
                        displayText(npcDialogue.earl.giveWhiskey);
                        gameState.inventory = gameState.inventory.filter(i => i !== 'whiskey');
                        gameState.respect = Math.min(20, gameState.respect + 2);
                        gameState.drunkGaveCompass = true;
                        gameState.selectedInventoryItem = null;
                        return;
                    }
                    if (itemName === 'rustyCompass') {
                        displayText('EARL HOLDS IT LIKE A BIRD. "You don\'t want this."\nHE PRESSES IT INTO YOUR PALM. "Keep it."');
                        gameState.respect = Math.min(20, gameState.respect + 2);
                        gameState.drunkGaveCompass = true;
                        gameState.selectedInventoryItem = null;
                        return;
                    }
                }
                if (npcKey === 'roxy' && (gameState.location === 'barExterior' || gameState.location ===
                        'roxyApartment') && !gameState.roxyKnockedOut) {
                    if (itemName === 'pie') {
                        displayText(npcDialogue.roxy.givePie);
                        gameState.inventory = gameState.inventory.filter(i => i !== 'pie');
                        gameState.roxyGivenInfo = true;
                        gameState.respect = Math.min(20, gameState.respect + 3);
                        gameState.selectedInventoryItem = null;
                        return;
                    }
                }
                if (npcKey === 'sarah' && gameState.location === 'millerHouse') {
                    if (itemName === 'childShoe') {
                        displayText(npcDialogue.sarah.giveShoe);
                        gameState.inventory = gameState.inventory.filter(i => i !== 'childShoe');
                        gameState.returnedShoe = true;
                        gameState.respect = Math.min(20, gameState.respect + 5);
                        if (!gameState.inventory.includes('lilyRoomKey')) { gameState.inventory.push('lilyRoomKey');
                            displayText('Sarah gives you the key to Lily\'s room.'); }
                        gameState.selectedInventoryItem = null;
                        return;
                    }
                    if (itemName === 'silverLocket') {
                        displayText(npcDialogue.sarah.giveLocket);
                        gameState.respect = Math.min(20, gameState.respect + 5);
                        gameState.selectedInventoryItem = null;
                        return;
                    }
                }
                if (npcKey === 'sheriff' && gameState.location === 'sheriffOffice' && !gameState.sheriffKnockedOut) {
                    if (itemName === 'sheriffBadge') {
                        displayText('(You place the badge on the desk.)\nSHERIFF: "That\'s mine. You took it. That ain\'t legal."');
                        gameState.inventory = gameState.inventory.filter(i => i !== 'sheriffBadge');
                        gameState.sheriffBadgeTaken = false;
                        gameState.sheriffHostile = false;
                        gameState.respect = Math.min(20, gameState.respect + 3);
                        gameState.selectedInventoryItem = null;
                        return;
                    }
                }
                if (npcKey === 'edna' && gameState.location === 'diner') {
                    if (itemName === 'pinkRibbon') {
                        displayText(npcDialogue.edna.giveRibbon);
                        gameState.respect = Math.min(20, gameState.respect + 3);
                        gameState.ednaTrust = 5;
                        gameState.selectedInventoryItem = null;
                        return;
                    }
                }
                displayText("They don't want that.");
                gameState.selectedInventoryItem = null;
            }

            function handleUseItemOnObject(itemName, objectKey) {
                let locKey = gameState.location;
                // Key on well
                if (itemName === 'dinerKey' && objectKey === 'well' && locKey === 'backLot') {
                    displayText(
                        'You insert the key into a slot in the well stones. It turns by itself.\nThe humming becomes a voice. It knows your name.\n\n——//——\n"BENEATH THE BACKWOODS, YOU ARE WELCOME HOME."\nTHE SCREEN FILLS WITH SNOW. NIGHTFALL GAMES, 1984.\n——//——\n(ENDING: DESCENT)');
                    gameState.endingTriggered = true;
                    gameState.selectedInventoryItem = null;
                    return;
                }
                // Lantern at grave
                if (itemName === 'oldLantern' && objectKey === 'grave' && locKey === 'deepWoods') {
                    if (gameState.lanternFuel > 0) {
                        displayText(
                            'The lantern blazes with cold fire. A door of light opens in the static.\nYou step through. Every backwoods, every year. Eternal.\n\n——//——\nNIGHTFALL.\n——//——\n(ENDING: LIGHT)');
                        gameState.endingTriggered = true;
                    } else {
                        displayText('The lantern is empty. It needs fuel.');
                    }
                    gameState.selectedInventoryItem = null;
                    return;
                }
                // Compass at well
                if (itemName === 'rustyCompass' && objectKey === 'well' && locKey === 'backLot') {
                    displayText('The compass needle stops spinning. Points straight down.\nA whisper rises from the well: "Thank you."');
                    gameState.selectedInventoryItem = null;
                    return;
                }
                // Compass in woods
                if (itemName === 'rustyCompass' && locKey === 'woods') {
                    displayText('The needle spins, then points south. Toward the Narrows.');
                    gameState.selectedInventoryItem = null;
                    return;
                }
                // Receiver on payphone
                if (itemName === 'phoneReceiver' && objectKey === 'payphone' && locKey === 'gasStation') {
                    if (gameState.money >= 10) {
                        gameState.money -= 10;
                        displayText(
                            'You repair the payphone and deposit $10. The operator connects you to city PD.\n"State police? Twin Pines. Sheriff Craine. Lily Miller. I have evidence."\nSIRENS IN THE DISTANCE. SHERIFF CRAINE IS ARRESTED.\n\n——//——\nCASE CLOSED. NIGHTFALL INVESTIGATED.\n(ENDING: REVELATION)');
                        gameState.endingTriggered = true;
                    } else {
                        displayText('The payphone works, but you need $10 for the call.');
                    }
                    gameState.selectedInventoryItem = null;
                    return;
                }
                // Duct tape on cassette
                if (itemName === 'ductTape' && (objectKey === 'tape' || objectKey === 'cassette') && gameState
                    .inventory.includes('cassetteTape')) {
                    displayText('You repair the cassette tape. It can now be played.');
                    gameState.inventory = gameState.inventory.filter(i => i !== 'cassetteTape');
                    gameState.inventory.push('repairedTape');
                    gameState.selectedInventoryItem = null;
                    return;
                }
                // Crowbar on freezer
                if (itemName === 'crowbar' && objectKey === 'freezer' && locKey === 'kitchen') {
                    displayText(
                        'You pry open the freezer. Inside: frozen food... and a child\'s drawing.\nLily drew a man with a star. "MY FRIEND FRANK."\nEvidence added.');
                    addEvidence('freezerDrawing');
                    gameState.selectedInventoryItem = null;
                    return;
                }
                displayText('Nothing happens when you use ' + itemName.toUpperCase() + ' on ' + objectKey.toUpperCase() +
                    '.');
                gameState.selectedInventoryItem = null;
            }

            function handleUseItemGeneric(itemName) {
                if (itemName === 'dinerKey' && gameState.location === 'backLot') {
                    handleUseItemOnObject(itemName, 'well');
                    return;
                }
                if (itemName === 'oldLantern' && gameState.location === 'deepWoods') {
                    handleUseItemOnObject(itemName, 'grave');
                    return;
                }
                if (itemName === 'rustyCompass' && (gameState.location === 'backLot' || gameState.location ===
                        'woods')) {
                    handleUseItemOnObject(itemName, gameState.location === 'backLot' ? 'well' : 'trees');
                    return;
                }
                if (itemName === 'phoneReceiver' && gameState.location === 'gasStation') {
                    handleUseItemOnObject(itemName, 'payphone');
                    return;
                }
                if (itemName === 'crowbar' && gameState.location === 'kitchen') {
                    handleUseItemOnObject(itemName, 'freezer');
                    return;
                }
                if (itemName === 'ductTape' && gameState.inventory.includes('cassetteTape')) {
                    handleUseItemOnObject(itemName, 'tape');
                    return;
                }
                displayText('Nothing happens. Try using it on a specific object in the room.');
                gameState.selectedInventoryItem = null;
            }

            function handleBuy(key) {
                let loc = locations[gameState.location];
                if (!loc.shop) { displayText('Nothing for sale here.'); return; }
                let item = loc.shop[key];
                if (!item) { displayText('Not available.'); return; }
                if (gameState.money < item.price) { displayText('Not enough money.'); return; }
                gameState.money -= item.price;
                if (item.item) {
                    if (gameState.inventory.includes(item.item) && item.item === 'dinerKey') {
                        displayText('You already have the diner key.');
                        gameState.money += item.price;
                        return;
                    }
                    gameState.inventory.push(item.item);
                    displayText('You bought ' + item.item + '. ' + (item.desc || ''));
                    if (item.item === 'flashlight') gameState.hasFlashlight = true;
                    if (item.item === 'rope') gameState.hasRope = true;
                    if (item.item === 'crowbar') gameState.hasCrowbar = true;
                    if (item.item === 'shovel') gameState.hasShovel = true;
                    if (item.item === 'gloves') gameState.hasGloves = true;
                    if (item.item === 'ductTape') gameState.hasDuctTape = true;
                    if (item.item === 'lockpicks') gameState.hasLockpicks = true;
                    if (item.item === 'whiskey') gameState.hasWhiskey = true;
                    if (item.item === 'pancakes') gameState.hasPancakes = true;
                    if (item.item === 'pie') gameState.hasPie = true;
                } else if (item.effect) {
                    if (item.effect === 'coffee') {
                        gameState.respect = Math.min(20, gameState.respect + 1);
                        displayText('Coffee. Black. +1 respect. Earl comes here Tuesdays.');
                    } else if (item.effect === 'meal') {
                        gameState.respect = Math.min(20, gameState.respect + 2);
                        displayText('Edna: "Thank you. Lily used to order this." +2 respect.');
                        gameState.ednaTrust = Math.min(5, gameState.ednaTrust + 1);
                    } else if (item.effect === 'info') {
                        displayText(
                            'Bartender: "Craine was Nightfall security, \'79 to \'81. Something happened in the basement. He hasn\'t been right since."');
                    } else if (item.effect === 'drink') {
                        gameState.respect = Math.max(0, gameState.respect - 1);
                        displayText('You down the shot. Burns. -1 respect, +5 courage (next combat).');
                    }
                }
            }

            function handleViolence(verb, npcKey) {
                if (npcKey === 'sheriff' && gameState.location === 'sheriffOffice') {
                    if (gameState.sheriffKnockedOut) { displayText('He\'s already unconscious.'); return; }
                    if (verb === 'slap') {
                        displayText('YOU SLAP THE SHERIFF. HE DOESN\'T FLINCH.\n"That the best you got?"');
                        gameState.sheriffHostile = true;
                        gameState.respect = Math.min(20, gameState.respect + 2);
                    } else {
                        let success = Math.random() < 0.5;
                        if (success) {
                            displayText(npcDialogue.sheriff.punchSuccess);
                            gameState.sheriffKnockedOut = true;
                            gameState.money += npcDialogue.sheriff.stolenMoney;
                            gameState.respect = Math.max(0, gameState.respect - 5);
                        } else {
                            displayText(npcDialogue.sheriff.punchFail);
                            gameState.endingTriggered = true;
                        }
                    }
                } else if (npcKey === 'earl' && gameState.location === 'gasStationAlley') {
                    if (gameState.drunkKnockedOut) { displayText('He\'s already out.'); return; }
                    if (verb === 'slap') {
                        displayText('EARL CURLS UP. "Why you gotta do that? I ain\'t done nothin\'."');
                        gameState.respect = Math.max(0, gameState.respect - 2);
                    } else {
                        let success = Math.random() < 0.7;
                        if (success) {
                            displayText(npcDialogue.earl.punchSuccess);
                            gameState.drunkKnockedOut = true;
                            gameState.money += npcDialogue.earl.stolenMoney;
                            if (!gameState.drunkGaveCompass && !gameState.inventory.includes('rustyCompass')) {
                                gameState.inventory.push('rustyCompass');
                                displayText('You take his compass.');
                            }
                            gameState.respect = Math.max(0, gameState.respect - 3);
                        } else {
                            displayText(npcDialogue.earl.punchFail);
                            gameState.drunkHere = false;
                            gameState.respect = Math.max(0, gameState.respect - 2);
                        }
                    }
                } else if (npcKey === 'roxy' && (gameState.location === 'barExterior' || gameState.location ===
                        'roxyApartment')) {
                    if (gameState.roxyKnockedOut) { displayText('She\'s already down.'); return; }
                    if (verb === 'slap') {
                        displayText('ROXY STAGGERS. "You son of a bitch!"\nSHE BACKS AWAY, HAND IN POCKET.');
                        gameState.respect = Math.max(0, gameState.respect - 3);
                    } else {
                        let success = Math.random() < 0.6;
                        if (success) {
                            displayText(npcDialogue.roxy.punchSuccess);
                            gameState.roxyKnockedOut = true;
                            gameState.money += npcDialogue.roxy.stolenMoney;
                            gameState.respect = Math.max(0, gameState.respect - 4);
                        } else {
                            displayText(npcDialogue.roxy.punchFail);
                            gameState.roxyHere = false;
                            gameState.respect = Math.max(0, gameState.respect - 3);
                        }
                    }
                } else {
                    displayText("You can't do that here.");
                }
            }

            function handleAccuse() {
                if (gameState.location !== 'sheriffOffice') { displayText('Sheriff isn\'t here.'); return; }
                if (!gameState.foundGrave && !gameState.evidenceList.includes('lilyBarette') && !gameState.evidenceList
                    .includes('silverLocket') && !gameState.evidenceList.includes('graveSoil')) {
                    displayText('You need more evidence. Find her grave in the deep woods first.');
                    return;
                }
                if (!gameState.evidenceList.includes('lilyBarette') && !gameState.evidenceList.includes(
                        'silverLocket') && !gameState.evidenceList.includes('lilyDiary')) {
                    displayText('You need physical evidence linking Craine to Lily. Keep investigating.');
                    return;
                }
                displayText(
                    'YOU: "I know you killed Lily Miller. I found her grave. I have evidence."\n\nSHERIFF STANDS SLOWLY. "You should have left it buried."\nHE REACHES FOR HIS GUN. STATIC. BLACK.\n\n——//——\nCASE CLOSED. SHERIFF CRAINE ARRESTED.\nBUT THE WELL STILL HUMS.\n(ENDING: ACCUSATION)');
                gameState.endingTriggered = true;
                gameState.accusedSheriff = true;
            }

            // =============================================================================
            // INITIALIZATION
            // =============================================================================
            function init() {
                outputElement.innerHTML = '';
                displayText('> BENEATH THE BACKWOODS — BUTTON EDITION');
                displayText('> NIGHTFALL GAMES, 1984');
                displayText('> DETECTIVE J. COLE: FIND LILY MILLER.');
                displayText('> CLICK BUTTONS TO PLAY. SELECT ITEMS FROM INVENTORY TO USE THEM.');
                displayText('> EVERY OBJECT INTERACTS. 16+ ROOMS. 9 ENDINGS.');
                displayText(' ');
                displayText(getLookDescription());
                // Check for grave discovery
                if (gameState.location === 'deepWoods') gameState.foundGrave = true;
                updateAll();
            }

            // Track grave discovery on room entry
            const originalMove = window._gameMove;
            window._gameMove = function(dir) {
                if (gameState.endingTriggered) return;
                let currentLoc = locations[gameState.location];
                if (currentLoc.exits && currentLoc.exits[dir]) {
                    gameState.location = currentLoc.exits[dir];
                    if (gameState.location === 'deepWoods') gameState.foundGrave = true;
                    gameState.conversationNPC = null;
                    displayText('> YOU MOVE ' + dir.toUpperCase() + '.');
                    displayText(getLookDescription());
                    updateAll();
                } else {
                    displayText('YOU CAN\'T GO THAT WAY.');
                    updateAll();
                }
            };

            window.addEventListener('DOMContentLoaded', function() {
                init();
            });

        })();
    </script>
</body>
</html>
