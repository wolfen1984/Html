<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD SCHOOL - Nightfall Games 1984</title>
    <link rel="icon" href="data:,">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111118;
            --text: #c8c8d0;
            --text-bright: #e8e8f0;
            --neon-pink: #ff3c8c;
            --neon-cyan: #00e5ff;
            --neon-amber: #ffb74d;
            --neon-green: #76ff03;
            --scanline-opacity: 0.06;
            --glow-pink: 0 0 12px #ff3c8c88, 0 0 24px #ff3c8c44;
            --glow-cyan: 0 0 10px #00e5ff66, 0 0 20px #00e5ff33;
            --font-title: 'Press Start 2P', monospace;
            --font-body: 'VT323', 'Courier New', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--bg);
            font-family: var(--font-body);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* CRT Monitor */
        .crt-monitor {
            width: 100%; max-width: 860px; height: 100vh; max-height: 750px;
            background: #0d0d14;
            border: 8px solid #1a1a24; border-radius: 18px;
            box-shadow: inset 0 0 80px #000000aa, 0 0 40px #000000cc, 0 0 8px #222233;
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }
        .crt-monitor::after {
            content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 100;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,var(--scanline-opacity)) 2px, rgba(0,0,0,var(--scanline-opacity)) 4px);
            border-radius: 10px;
        }
        .crt-monitor::before {
            content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 99;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.5) 100%);
            border-radius: 10px;
        }

        /* Header */
        .game-header {
            flex-shrink: 0; text-align: center; padding: 16px 20px 6px; position: relative; z-index: 101;
        }
        .game-title {
            font-family: var(--font-title); font-size: clamp(1rem, 2.8vw, 1.6rem);
            color: var(--neon-pink); text-shadow: var(--glow-pink); letter-spacing: 3px; line-height: 1.3;
        }
        .game-subtitle {
            font-family: var(--font-title); font-size: 0.45rem; color: var(--neon-cyan);
            text-shadow: var(--glow-cyan); letter-spacing: 2px; margin-top: 2px; opacity: 0.85;
        }

        /* Status Bar */
        .status-bar {
            flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;
            padding: 6px 18px; font-size: 1.15rem; color: var(--neon-amber);
            border-top: 1px solid #222233; border-bottom: 1px solid #222233;
            background: #0c0c16; position: relative; z-index: 101; letter-spacing: 0.5px;
            gap: 10px; flex-wrap: wrap;
        }
        .status-location { flex: 1; min-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-time { flex-shrink: 0; white-space: nowrap; }
        .status-empty { opacity: 0.45; font-style: italic; }

        /* API Key Row - directly on main screen */
        .api-key-row {
            flex-shrink: 0; display: flex; gap: 8px; align-items: center;
            padding: 8px 18px; background: #0a0a12; border-bottom: 1px solid #222233;
            position: relative; z-index: 101;
        }
        .api-key-row label {
            font-family: var(--font-title); font-size: 0.45rem; color: #888; letter-spacing: 1px;
            white-space: nowrap;
        }
        .api-key-row input {
            flex: 1; background: #1a1a26; border: 1px solid #2a2a3a; color: #e0e0e0;
            font-family: var(--font-body); font-size: 1rem; padding: 6px 10px; border-radius: 3px;
            outline: none; min-width: 120px;
        }
        .api-key-row input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 8px #00e5ff33; }
        .btn-save-key {
            font-family: var(--font-title); font-size: 0.45rem; padding: 6px 12px;
            background: #1a1a28; color: var(--neon-green); border: 1px solid var(--neon-green);
            border-radius: 3px; cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-save-key:hover { background: #1a2a1a; box-shadow: 0 0 10px #76ff0344; }
        .key-status { font-size: 0.9rem; font-family: var(--font-body); color: #ff5555; margin-left: 4px; }
        .key-status.active { color: var(--neon-green); }

        /* Narrative Log */
        .narrative-log {
            flex: 1; overflow-y: auto; padding: 14px 18px;
            font-size: 1.2rem; line-height: 1.55; position: relative; z-index: 101;
            color: var(--text); scroll-behavior: smooth; display: flex; flex-direction: column; gap: 8px;
        }
        .narrative-log::-webkit-scrollbar { width: 5px; }
        .narrative-log::-webkit-scrollbar-track { background: transparent; }
        .narrative-log::-webkit-scrollbar-thumb { background: #333344; border-radius: 10px; }

        .log-entry { animation: fadeSlideIn 0.35s ease-out; padding: 4px 0; border-left: 2px solid transparent; padding-left: 10px; }
        .log-entry.ai-narrative { color: #d8d8e0; border-left-color: var(--neon-cyan); text-shadow: 0 0 2px #00e5ff22; }
        .log-entry.player-action { color: var(--neon-amber); border-left-color: var(--neon-amber); font-style: italic; }
        .log-entry.system-message { color: #888899; border-left-color: #555566; font-size: 1rem; letter-spacing: 1px; }
        .log-entry.error-message { color: #ff5555; border-left-color: #ff4444; font-style: italic; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* Input Area */
        .input-area {
            flex-shrink: 0; display: flex; gap: 8px; padding: 10px 16px 14px;
            position: relative; z-index: 101; background: #0c0c16; border-top: 1px solid #1e1e2a;
        }
        .input-area input {
            flex: 1; background: #1a1a26; border: 2px solid #2a2a3a; color: var(--text-bright);
            font-family: var(--font-body); font-size: 1.2rem; padding: 10px 14px; border-radius: 4px;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s; letter-spacing: 0.4px;
        }
        .input-area input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px #00e5ff33, inset 0 0 6px #00e5ff11; }
        .input-area input::placeholder { color: #555566; font-style: italic; }
        .btn-do-it {
            font-family: var(--font-title); font-size: 0.7rem; padding: 10px 20px;
            background: #1a1a28; color: var(--neon-pink); border: 2px solid var(--neon-pink);
            border-radius: 4px; cursor: pointer; text-shadow: var(--glow-pink); letter-spacing: 2px;
            transition: all 0.15s; white-space: nowrap;
        }
        .btn-do-it:hover { background: #2a1a30; box-shadow: 0 0 16px #ff3c8c55; border-color: #ff5c9c; }
        .btn-do-it:active { transform: scale(0.96); }
        .btn-do-it:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; border-color: #3a3a4a; color: #666; }

        /* Utility row */
        .utility-row {
            flex-shrink: 0; display: flex; gap: 6px; padding: 4px 16px 8px;
            position: relative; z-index: 101; flex-wrap: wrap;
        }
        .btn-util {
            font-family: var(--font-title); font-size: 0.42rem; padding: 6px 10px;
            background: transparent; color: #7777; border: 1px solid #2a2a35; border-radius: 3px;
            cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
        }
        .btn-util:hover { color: var(--neon-cyan); border-color: var(--neon-cyan); text-shadow: var(--glow-cyan); box-shadow: 0 0 8px #00e5ff22; }
        .btn-util.danger:hover { color: #ff5555; border-color: #ff5555; text-shadow: 0 0 8px #ff555588; }

        @media (max-width: 600px) {
            .crt-monitor { max-height: 100vh; border-radius: 0; border: 3px solid #1a1a24; }
            .crt-monitor::after, .crt-monitor::before { border-radius: 0; }
            .game-title { font-size: 0.85rem; }
            .game-subtitle { font-size: 0.35rem; }
            .narrative-log { font-size: 1rem; padding: 10px 10px; }
            .input-area input { font-size: 1rem; padding: 8px 10px; }
            .btn-do-it { font-size: 0.55rem; padding: 8px 12px; }
            .btn-util { font-size: 0.35rem; padding: 4px 7px; }
            .status-bar { font-size: 0.9rem; padding: 4px 10px; }
            .api-key-row { padding: 6px 10px; gap: 4px; }
            .api-key-row label { font-size: 0.4rem; }
            .api-key-row input { font-size: 0.9rem; padding: 4px 8px; }
        }
    </style>
</head>
<body>
    <div class="crt-monitor" id="crtMonitor">
        <!-- Header -->
        <div class="game-header">
            <h1 class="game-title">OLD SCHOOL</h1>
            <p class="game-subtitle">&copy; Nightfall Games 1984</p>
        </div>

        <!-- Status Bar -->
        <div class="status-bar" id="statusBar">
            <span class="status-location" id="statusLocation"><span class="status-empty">Location unknown</span></span>
            <span class="status-time" id="statusTime"><span class="status-empty">Time unknown</span></span>
        </div>

        <!-- API KEY ROW - always visible on main screen -->
        <div class="api-key-row">
            <label for="apiKeyInput">🔑 MISTRAL KEY:</label>
            <input type="password" id="apiKeyInput" placeholder="Enter your Mistral API key" autocomplete="off" />
            <button class="btn-save-key" id="btnSaveKey">SAVE KEY</button>
            <span class="key-status" id="keyStatus">⛔ No key</span>
        </div>

        <!-- Narrative Log -->
        <div class="narrative-log" id="narrativeLog">
            <div class="log-entry system-message">
                Welcome to <strong>OLD SCHOOL</strong>.<br>
                Enter your Mistral API key above, then click <strong>NEW GAME</strong> to begin.
            </div>
        </div>

        <!-- Utility Buttons -->
        <div class="utility-row">
            <button class="btn-util" id="btnNewGame">🆕 NEW GAME</button>
            <button class="btn-util" id="btnSaveGame">💾 SAVE</button>
            <button class="btn-util" id="btnLoadGame">📂 LOAD</button>
            <button class="btn-util danger" id="btnResetAll">🗑 RESET</button>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <input type="text" id="playerInput" placeholder="What do you do?" autocomplete="off" spellcheck="false" maxlength="600" />
            <button class="btn-do-it" id="btnDoIt">DO IT</button>
        </div>
    </div>

    <input type="file" id="loadFileInput" accept=".json" style="display:none;">

    <script>
        (function() {
            // DOM refs
            const narrativeLog = document.getElementById('narrativeLog');
            const playerInput = document.getElementById('playerInput');
            const btnDoIt = document.getElementById('btnDoIt');
            const btnNewGame = document.getElementById('btnNewGame');
            const btnSaveGame = document.getElementById('btnSaveGame');
            const btnLoadGame = document.getElementById('btnLoadGame');
            const btnResetAll = document.getElementById('btnResetAll');
            const statusLocation = document.getElementById('statusLocation');
            const statusTime = document.getElementById('statusTime');
            const apiKeyInput = document.getElementById('apiKeyInput');
            const btnSaveKey = document.getElementById('btnSaveKey');
            const keyStatus = document.getElementById('keyStatus');
            const loadFileInput = document.getElementById('loadFileInput');

            const STORAGE_KEY_STATE = 'oldschool_gamestate';
            const STORAGE_KEY_LOG = 'oldschool_narrative_log';
            const STORAGE_API_KEY = 'oldschool_mistral_key';

            const EMPTY_STATE = {
                player: { name: '', inventory: [], currentLocation: '', vehicle: null },
                world: { day: '', time: '', weather: '', period: '' },
                npcs: [],
                storyFlags: {}
            };

            // System prompt
            const SYSTEM_PROMPT = `You are the narrator of "Old School" (Nightfall Games, 1984). You receive a current game state JSON and a player message.

Your only job is to describe what the player does, as if typing a novel in second-person. Return ONLY a JSON object with:
- "narrative": a short, vivid description of the immediate outcome.
- "updatedState": the new state, reflecting exactly what the player dictated.

Absolute rules:
- The player is the ultimate authority. If they correct, overwrite, or retcon a previous action, you must accept their version without question. Never reference your own previous narration if it contradicts the player's current input.
- Do not invent events. Do not add police, principal reactions, future consequences, or anything not explicitly requested by the player's text. Describe only the direct, observable result of the player's words.
- No stats, no dice, no blocks. The player can do anything. You never use numbers to decide outcomes.
- Keep the world consistent. Maintain time, location, inventory, and NPC attitudes based purely on the player's described actions. If the player introduces a new NPC, add them to the list with a brief attitude description.
- Tone: 1980s teen movie authenticity. Use slang, period details, and cinematic language—but always at the player's direction.
- State updates: Only change fields that the player's input modifies. Never add new storyFlags or NPCs unless the player introduces them.
- When the state is empty: If the player's message sets the scene for the first time, build the initial world from their words and populate the state accordingly.`;

            let gameState = JSON.parse(JSON.stringify(EMPTY_STATE));
            let narrativeEntries = [];
            let isProcessing = false;

            // Get stored API key
            function getApiKey() {
                return localStorage.getItem(STORAGE_API_KEY) || '';
            }

            // Update key status indicator
            function updateKeyStatus() {
                const key = getApiKey();
                if (key) {
                    keyStatus.textContent = '✅ Key loaded';
                    keyStatus.className = 'key-status active';
                    apiKeyInput.value = key;
                } else {
                    keyStatus.textContent = '⛔ No key';
                    keyStatus.className = 'key-status';
                    apiKeyInput.value = '';
                }
            }

            // Save key from input
            function saveApiKey() {
                const key = apiKeyInput.value.trim();
                if (key) {
                    localStorage.setItem(STORAGE_API_KEY, key);
                    updateKeyStatus();
                    addSystemMessage('🔑 Mistral API key saved. You are ready to play.');
                } else {
                    localStorage.removeItem(STORAGE_API_KEY);
                    updateKeyStatus();
                    addErrorMessage('Key field empty. Enter a valid Mistral API key.');
                }
            }

            // Init
            function init() {
                // Load state with structural validation
                const savedState = localStorage.getItem(STORAGE_KEY_STATE);
                if (savedState) {
                    try {
                        const parsed = JSON.parse(savedState);
                        if (
                            parsed &&
                            typeof parsed === 'object' &&
                            parsed.player &&
                            typeof parsed.player === 'object' &&
                            parsed.world &&
                            typeof parsed.world === 'object'
                        ) {
                            gameState = parsed;
                        } else {
                            console.warn('Saved state invalid – resetting to empty.');
                            localStorage.removeItem(STORAGE_KEY_STATE);
                        }
                    } catch(e) {
                        console.warn('Could not parse saved state – resetting.');
                        localStorage.removeItem(STORAGE_KEY_STATE);
                    }
                }

                const savedLog = localStorage.getItem(STORAGE_KEY_LOG);
                if (savedLog) {
                    try {
                        const parsed = JSON.parse(savedLog);
                        if (Array.isArray(parsed)) narrativeEntries = parsed;
                    } catch(e) {}
                }

                updateKeyStatus();
                renderFullLog();
                updateStatusBar();

                if (isStateEmpty(gameState) && narrativeEntries.length === 0) {
                    addSystemMessage('Welcome to <strong>OLD SCHOOL</strong>.<br>Enter your Mistral API key above, then click <strong>NEW GAME</strong> to begin.');
                }
                playerInput.focus();
            }

            function isStateEmpty(state) {
                return !state.player.name && !state.player.currentLocation && !state.world.day && !state.world.time && state.npcs.length === 0 && Object.keys(state.storyFlags).length === 0;
            }

            // Render
            function renderFullLog() {
                narrativeLog.innerHTML = '';
                if (narrativeEntries.length === 0) {
                    const div = document.createElement('div');
                    div.className = 'log-entry system-message';
                    div.innerHTML = 'The screen flickers, waiting for your story to begin...<br>Type to take control.';
                    narrativeLog.appendChild(div);
                } else {
                    narrativeEntries.forEach(entry => appendLogEntry(entry.type, entry.text, false));
                }
                scrollToBottom();
            }

            function appendLogEntry(type, text, saveToArray = true) {
                const div = document.createElement('div');
                div.className = 'log-entry ' + type;
                div.innerHTML = text;
                narrativeLog.appendChild(div);
                if (saveToArray) {
                    narrativeEntries.push({ type, text });
                    if (narrativeEntries.length > 200) {
                        narrativeEntries = narrativeEntries.slice(-150);
                        renderFullLog();
                        return;
                    }
                    saveNarrativeLog();
                }
                scrollToBottom();
            }

            function addSystemMessage(text) { appendLogEntry('system-message', text); }
            function addErrorMessage(text) { appendLogEntry('error-message', '⚠ ' + text); }
            function addPlayerAction(text) { appendLogEntry('player-action', '&gt; ' + escapeHTML(text)); }
            function addAINarrative(text) { appendLogEntry('ai-narrative', text); }

            function scrollToBottom() {
                requestAnimationFrame(() => { narrativeLog.scrollTop = narrativeLog.scrollHeight; });
            }

            function updateStatusBar() {
                const loc = gameState.player.currentLocation || '';
                const day = gameState.world.day || '';
                const time = gameState.world.time || '';
                const weather = gameState.world.weather || '';
                statusLocation.innerHTML = loc ? '📍 ' + escapeHTML(loc) : '<span class="status-empty">Location unknown</span>';
                let timeStr = '';
                if (day) timeStr += day;
                if (time) timeStr += (timeStr ? ' · ' : '') + time;
                if (weather) timeStr += (timeStr ? ' · ' : '') + weather;
                statusTime.innerHTML = timeStr ? '🕐 ' + escapeHTML(timeStr) : '<span class="status-empty">Time unknown</span>';
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function saveGameState() { localStorage.setItem(STORAGE_KEY_STATE, JSON.stringify(gameState)); }
            function saveNarrativeLog() { localStorage.setItem(STORAGE_KEY_LOG, JSON.stringify(narrativeEntries)); }

            function clearAllData() {
                localStorage.removeItem(STORAGE_KEY_STATE);
                localStorage.removeItem(STORAGE_KEY_LOG);
                gameState = JSON.parse(JSON.stringify(EMPTY_STATE));
                narrativeEntries = [];
                renderFullLog();
                updateStatusBar();
                addSystemMessage('All data cleared. Click NEW GAME to start fresh.');
            }

            // Direct API call to Mistral (no proxy)
            async function sendAction(actionText) {
                const apiKey = getApiKey();
                if (!apiKey) {
                    addErrorMessage('No Mistral API key set. Enter it in the field above.');
                    return;
                }
                if (isProcessing) return;
                isProcessing = true;
                btnDoIt.disabled = true;
                playerInput.disabled = true;
                btnDoIt.textContent = '...';

                addPlayerAction(actionText);

                const previousState = JSON.parse(JSON.stringify(gameState));

                try {
                    const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + apiKey
                        },
                        body: JSON.stringify({
                            model: 'mistral-small-latest',
                            messages: [
                                { role: 'system', content: SYSTEM_PROMPT },
                                { role: 'user', content: `Current state: ${JSON.stringify(gameState)}\n\nPlayer: "${actionText}"\n\nReturn JSON with narrative and updatedState.` }
                            ],
                            max_tokens: 1000,
                            response_format: { type: 'json_object' }
                        })
                    });

                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(errData.error?.message || `API error ${response.status}`);
                    }

                    const data = await response.json();
                    let content = data.choices[0].message.content;

                    // Parse JSON (may be wrapped in markdown code block)
                    let parsed;
                    try {
                        parsed = JSON.parse(content);
                    } catch {
                        const cleaned = content.replace(/```json|```/g, '').trim();
                        parsed = JSON.parse(cleaned);
                    }

                    if (!parsed.narrative || !parsed.updatedState) {
                        throw new Error('Invalid response structure – missing narrative or updatedState.');
                    }

                    const updatedState = parsed.updatedState;

                    // Validate the new state before applying
                    if (
                        typeof updatedState !== 'object' ||
                        !updatedState.player ||
                        !updatedState.world
                    ) {
                        throw new Error('The AI returned an incomplete state. Please try your action again.');
                    }

                    // Safe merge: keep everything from the old state, overlay only what the AI changed
                    gameState = {
                        ...previousState,
                        ...updatedState,
                        player: {
                            ...(previousState.player || {}),
                            ...(updatedState.player || {})
                        },
                        world: {
                            ...(previousState.world || {}),
                            ...(updatedState.world || {})
                        },
                        npcs: Array.isArray(updatedState.npcs) ? updatedState.npcs : (previousState.npcs || []),
                        storyFlags: {
                            ...(previousState.storyFlags || {}),
                            ...(updatedState.storyFlags || {})
                        }
                    };

                    saveGameState();
                    updateStatusBar();
                    addAINarrative(parsed.narrative);

                } catch (error) {
                    console.error(error);
                    gameState = previousState;
                    addErrorMessage('The tape got jammed... ' + escapeHTML(error.message) + '<br>Your game state has been preserved. Try again.');
                } finally {
                    isProcessing = false;
                    btnDoIt.disabled = false;
                    playerInput.disabled = false;
                    btnDoIt.textContent = 'DO IT';
                    playerInput.focus();
                }
            }

            function newGame() {
                if (isProcessing) return;
                gameState = JSON.parse(JSON.stringify(EMPTY_STATE));
                narrativeEntries = [];
                saveGameState(); saveNarrativeLog();
                renderFullLog(); updateStatusBar();
                addSystemMessage('<strong>🌟 NEW GAME</strong><br>The world is a blank slate. Describe who you are, where you are, and what the world looks like.<br><em>Example: "My name is Alex, I\'m 16. It\'s Monday morning, October 1984. I\'m standing by my locker at Jefferson High."</em>');
                playerInput.value = '';
                playerInput.focus();
            }

            function saveToFile() {
                const saveData = { state: gameState, log: narrativeEntries, savedAt: new Date().toISOString(), game: 'Old School - Nightfall Games 1984' };
                const blob = new Blob([JSON.stringify(saveData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'oldschool_save_' + new Date().toISOString().replace(/[:.]/g, '-') + '.json'; a.click();
                URL.revokeObjectURL(url);
                addSystemMessage('💾 Game saved to file.');
            }

            function loadFromFile(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (!data.state) throw new Error('Invalid save file');
                        gameState = data.state;
                        narrativeEntries = data.log || [];
                        saveGameState(); saveNarrativeLog();
                        renderFullLog(); updateStatusBar();
                        addSystemMessage('📂 Game loaded successfully.');
                    } catch (err) { addErrorMessage('Failed to load: ' + escapeHTML(err.message)); }
                };
                reader.readAsText(file);
            }

            // Event listeners
            btnDoIt.addEventListener('click', () => {
                const text = playerInput.value.trim();
                if (!text || isProcessing) return;
                playerInput.value = '';
                sendAction(text);
            });

            playerInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    const text = playerInput.value.trim();
                    if (!text || isProcessing) return;
                    playerInput.value = '';
                    sendAction(text);
                }
            });

            btnNewGame.addEventListener('click', () => {
                if (isProcessing) return;
                if (narrativeEntries.length > 0 && !confirm('Start a new game? Unsaved progress will be lost.')) return;
                newGame();
            });

            btnSaveGame.addEventListener('click', saveToFile);
            btnLoadGame.addEventListener('click', () => loadFileInput.click());
            loadFileInput.addEventListener('change', (e) => {
                if (e.target.files && e.target.files[0]) { loadFromFile(e.target.files[0]); loadFileInput.value = ''; }
            });

            btnResetAll.addEventListener('click', () => {
                if (isProcessing) return;
                if (confirm('⚠ Erase ALL data including saved games and the API key?')) {
                    localStorage.clear();
                    clearAllData();
                    updateKeyStatus();
                    addSystemMessage('Everything has been reset.');
                }
            });

            btnSaveKey.addEventListener('click', saveApiKey);
            apiKeyInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); saveApiKey(); }
            });

            init();
        })();
    </script>
</body>
</html>
