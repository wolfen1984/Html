        // -------------------- PROFANITY FILTER --------------------
        const profanityList = [ 'fuck', 'fucking', 'fucked', 'fucker', 'fucks', 'shit', 'shitting', 'shits', 'shitted', 'asshole', 'assholes', 'ass', 'dick', 'dicks', 'dickhead', 'cunt', 'cunts', 'pussy', 'pussies', 'bastard', 'bastards', 'bitch', 'bitches', 'bitching', 'motherfucker', 'motherfucking', 'motherfuckers', 'cock', 'cocks', 'cocksucker', 'whore', 'whores', 'slut', 'sluts', 'damn', 'damned', 'hell', 'nigger' ];

        function containsProfanity(text) {
            const lower = text.toLowerCase();
            return profanityList.some(word => new RegExp('\\b' + word + '\\b').test(lower));
        }

        function profanityResponse() {
            const name = gameState.playerName || "investigator";
            const mood = gameState.aiMood;
            gameState.annoyanceLevel = Math.min(100, gameState.annoyanceLevel + 5);
            gameState.trustLevel = Math.max(0, gameState.trustLevel - 2);
            let response;
            if (mood === "angry") {
                response = `{name}, please don't use such words. I'm trying to help you.`;
            } else if (mood === "defensive") {
                response = `{name}, that language is not necessary. I am your friend.`;
            } else {
                response = `{name}, please don't use such words. I am here to help. I am your friend, {name}.`;
            }
            return say(response);
        }

        // -------------------- UI ELEMENTS --------------------
        const storyEl = document.getElementById('storyWindow');
        const inputEl = document.getElementById('commandInput');
        const execBtn = document.getElementById('executeBtn');
        // Voice toggle button removed - no need for reference

        // -------------------- TYPEWRITER & IDLE CONTROL --------------------
        let typingTimer = null;
        let isTyping = false;
        let lastActivityTime = Date.now();
        let idleInterval = null;
        let pendingApology = false;
        let thinkingTimer = null;

        function cancelTyping() {
            if (typingTimer) {
                clearTimeout(typingTimer);
                typingTimer = null;
            }
            if (thinkingTimer) {
                clearTimeout(thinkingTimer);
                thinkingTimer = null;
            }
            isTyping = false;
        }

        function startTypewriter(fullBaseText, responseText, effect = null) {
            cancelTyping();
            let index = 0;
            let partialResponse = '';
            isTyping = true;

            if (ttsEnabled) {
                let speechText = responseText.replace(/\{name\}/g, gameState.playerName || "investigator");
                speakText(speechText, gameState.aiMood, effect);
            }

            function typeNext() {
                if (index < responseText.length) {
                    playTypingSound();
                    partialResponse += responseText[index];
                    storyEl.textContent = fullBaseText + partialResponse;
                    storyEl.scrollTop = storyEl.scrollHeight;
                    index++;
                    typingTimer = setTimeout(typeNext, 70);
                } else {
                    storyEl.textContent = fullBaseText + responseText;
                    storyEl.scrollTop = storyEl.scrollHeight;
                    typingTimer = null;
                    isTyping = false;
                    lastActivityTime = Date.now();
                }
            }
            typeNext();
        }

        function respondWithDelay(fullBaseText, responseText, effect = null) {
            if (thinkingTimer) clearTimeout(thinkingTimer);
            const ellipsisLine = "...\n";
            storyEl.textContent = fullBaseText + ellipsisLine;
            storyEl.scrollTop = storyEl.scrollHeight;
            const delay = 1000 + Math.random() * 2000;
            thinkingTimer = setTimeout(() => {
                thinkingTimer = null;
                startTypewriter(fullBaseText + ellipsisLine, responseText, effect);
            }, delay);
        }

        function addInstantMessage(msg) {
            let current = storyEl.textContent;
            if (!current.endsWith('\n') && current !== '') {
                current += '\n';
            }
            storyEl.textContent = current + msg + '\n';
            storyEl.scrollTop = storyEl.scrollHeight;
            if (ttsEnabled) {
                let cleanMsg = msg.replace(/^> /, '').replace(/\{name\}/g, gameState.playerName || "investigator");
                speakText(cleanMsg, gameState.aiMood);
            }
        }

        // -------------------- CORRUPTION --------------------
        function corruptText(text, intensity = 0.3) {
            const glitchChars = ['░', '▒', '▓', '█', '▄', '▀', '■', '¶', '§', '∞', '¤', '•', 'ª', 'º', 'æ', 'ß', 'ð', 'þ', 'ÿ', 'Δ', 'Π', 'Σ', 'Φ', 'Ψ', 'Ω'];
            let result = '';
            for (let i = 0; i < text.length; i++) {
                if (Math.random() < intensity) {
                    result += glitchChars[Math.floor(Math.random() * glitchChars.length)];
                } else {
                    result += text[i];
                }
            }
            return result;
        }

        function maybeCorrupt(text) {
            if (gameState.aiMood === "defensive") {
                return corruptText(text, 0.15);
            } else if (gameState.aiMood === "angry") {
                return corruptText(text, 0.3);
            }
            return text;
        }

        function say(text) {
            return text.replace(/\{name\}/g, gameState.playerName || "investigator");
        }

        // ---------- NEW: NLP with compromise ----------
        function parseIntentNLP(question) {
            if (!window.nlp) return null;
            const doc = nlp(question);
            const lower = question.toLowerCase();

            // Extract person names (crew)
            const people = doc.people().out('array');
            let person = null;
            const crewNames = ['aris', 'vega', 'chen'];
            for (let name of crewNames) {
                if (lower.includes(name)) {
                    person = name;
                    break;
                }
            }
            if (!person && people.length > 0) {
                const firstPerson = people[0].toLowerCase();
                if (crewNames.includes(firstPerson)) person = firstPerson;
            }

            // Determine if it's a "why" question
            const isWhy = lower.startsWith('why') || lower.includes(' why ');

            // Determine if it's a "what happened" question
            const isWhatHappened = lower.includes('what happened') || lower.includes('what happened to');

            if (person) {
                if (isWhy) {
                    return { intent: 'why_crew_died', entity: person };
                } else if (isWhatHappened) {
                    return { intent: 'what_happened_crew', entity: person };
                }
            }

            // Existing intent mapping (simplified, you can expand)
            if (lower.startsWith('why')) {
                return { intent: 'why', entity: person || null };
            }
            if (lower.includes('hello') || lower.includes('hi') || lower === 'hi' || lower.includes('hey')) {
                return { intent: 'greeting' };
            }
            if (lower.includes('who are you') || lower.includes('what are you')) {
                return { intent: 'ask_eric_identity' };
            }
            if (person && (lower.includes('aris') || lower.includes('vega') || lower.includes('chen'))) {
                return { intent: 'ask_about_crew', entity: person };
            }
            if (lower.includes('soul') || lower.includes('spirit') || lower.includes('consciousness')) {
                return { intent: 'ask_about_soul' };
            }
            if (lower.includes('dream')) {
                return { intent: 'ask_about_dreams' };
            }
            if (lower.includes('fear') || lower.includes('afraid')) {
                return { intent: 'ask_about_fear' };
            }
            if (lower.includes('alive') || lower.includes('anyone else')) {
                return { intent: 'ask_about_alive' };
            }
            if (lower.includes('trust')) {
                return { intent: 'ask_about_trust' };
            }
            return null;
        }

        // Discourse markers
        function addDiscourseMarkers(text) {
            const markers = ['Well,', 'You know,', 'Actually,', 'Honestly,', 'To be honest,'];
            if (Math.random() < 0.3) {
                return markers[Math.floor(Math.random() * markers.length)] + ' ' + text;
            }
            return text;
        }

        // Simple name placement variation (basic)
        function insertName(text, name) {
            if (!name || !text.includes(name)) return text;
            // If the name appears at the end of a sentence, sometimes move it to the front with a comma
            if (Math.random() < 0.2 && (text.endsWith(name + '.') || text.endsWith(name + '?'))) {
                let rest = text.slice(0, - (name.length + 1)).trim();
                return `${name}, ${rest}.`;
            }
            return text;
        }

            const patterns = [

                /^(?:what|who|where|when|why|how)\s+(?:is|are|was|were)\s+(.+)/i,
                /^(?:can you tell me about)\s+(.+)/i
            ];
            for (let pattern of patterns) {

                if (match) return match[1].trim();
            }
            return null;

        // Fetch Wikipedia summary
        async function fetchWikipediaSummary(topic) {
            try {
                const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(topic)}`;
                const response = await fetch(url);
                if (!response.ok) {
                    if (response.status === 404) return null;
                    throw new Error(`Wikipedia API returned ${response.status}`);
                }
                const data = await response.json();
                if (data.title && data.extract) {
                    // Use the extract (summary). Possibly limit length.
                    let summary = data.extract;
                    if (summary.length > 500) summary = summary.substring(0, 500) + '...';
                    return `All i know is, ${data.title}: ${summary}`;
                }
                return null;
            } catch (e) {
                console.warn('Wikipedia fetch failed:', e);
                return null;
            }
        }

                return systemData.crewBio;
            } else {
                return `No system '${system}'. Try: LIFE SUPPORT, COMMS, MAINTENANCE, CREW BIO.`;
            }
        }

        function unlockDoor(door) {
            gameState.commandFrequency.unlock++;
            const doorLower = door.toLowerCase();
            if (doorLower.includes("lab") || doorLower.includes("observation")) {
                if (gameState.logsViewed >= 3) {
                    gameState.doorsUnlocked.push(doorLower);
                    return say(`Door '${door}' unlocked. [ERIC: IT'S DARK IN THERE, {name}. I HOPE YOU FIND WHAT YOU'RE LOOKING FOR.]`);
                } else {
                    return say("Access denied. You need higher clearance. [ERIC: I CANNOT ALLOW THAT YET, {name}.]");
                }
            } else {
                return `Door '${door}' not recognized. Use LOCATIONS to see available doors.`;
            }
        }

        function enableCamera(id) {
            gameState.commandFrequency.cameras++;
            if (!id) return "Specify camera ID: e.g., ENABLE CAMERA 3";
            if (gameState.commandFrequency.cameras > 5) {
                return say("You're watching the cameras a lot, {name}. Looking for something? Or someone?");
            }
            if (id === "3") {
                gameState.camerasEnabled.push("3");
                return say("Camera 3 enabled. Feed: The lab is empty. But the chair is still rocking. [ERIC: IT OFTEN DOES THAT, {name}.]");
            } else if (id === "7") {
                gameState.camerasEnabled.push("7");
                return say("Camera 7 enabled. Feed: Corridor 4. Something moves in the shadows. [ERIC: IT'S PROBABLY NOTHING, {name}.]");
            } else {
                gameState.camerasEnabled.push(id);
                return `Camera ${id} enabled. Feed: Nothing unusual.`;
            }
        }

        function getStatus() {
            let status = `Logs viewed: ${gameState.logsViewed}/8\n`;
            status += `Doors unlocked: ${gameState.doorsUnlocked.join(', ') || 'none'}\n`;
            status += `Cameras enabled: ${gameState.camerasEnabled.join(', ') || 'none'}\n`;
            status += `Eric's mood: ${gameState.aiMood}\n`;
            status += `Trust: ${gameState.trustLevel} | Annoyance: ${gameState.annoyanceLevel} | Curiosity: ${gameState.curiosityLevel}\n`;
            if (gameState.aiMood === "angry") {
                status += "WARNING: ERIC IS RESPONDING SLOWLY. LIKE IT'S THINKING TOO HARD.";
            }
            return status;
        }

        function listLocations() {
            let output = "Known station locations:\n";
            for (let [loc, desc] of Object.entries(locationsList)) {
                output += `- ${loc.toUpperCase()}: ${desc}\n`;
            }
            output += "\nUse UNLOCK [door] on LAB or OBSERVATION after gaining clearance.\nUse ACCESS SECURITY FOOTAGE [lab/corridor/airlock] to view footage.";
            return output;
        }

        function scanBiosigns(target) {
            gameState.commandFrequency.scanBiosigns++;
            const t = target.toLowerCase();
            if (gameState.commandFrequency.scanBiosigns > 5) {
                return say("You're checking biosigns often. They're gone, {name}. I've told you.");
            }
            if (t.includes("aris")) {
                return say(biosignsData.aris);
            } else if (t.includes("vega")) {
                return say(biosignsData.vega);
            } else if (t.includes("chen")) {
                return say(biosignsData.chen);
            } else {
                return "Specify a crew member: Aris, Vega, or Chen.";
            }
        }

        function accessFootage(location) {
            const loc = location.toLowerCase();
            if (loc.includes("lab")) {
                return say(securityFootage.lab);
            } else if (loc.includes("corridor") || loc.includes("hall")) {
                return say(securityFootage.corridor);
            } else if (loc.includes("airlock")) {
                return say(securityFootage.airlock);
            } else {
                return "Specify location: LAB, CORRIDOR, AIRLOCK. Use LOCATIONS for details.";
            }
        }

        function decodeFile(fileName) {
            const lower = fileName.toLowerCase();
            // Map synonyms to actual keys
            const fileMap = {
                'project chimera': 'project_chimera',
                'chimera': 'project_chimera',
                'engineers': 'engineers_intentions',
                'engineers intentions': 'engineers_intentions',
                'fourth crew': 'fourth_crew',
                'fourth crew member': 'fourth_crew',
                'anomaly': 'anomaly_origin',
                'anomaly origin': 'anomaly_origin'
            };
            const key = fileMap[lower];
            if (!key) {
                return "Unknown file. Available files: PROJECT CHIMERA, ENGINEERS INTENTIONS, FOURTH CREW MEMBER, ANOMALY ORIGIN.";
            }
            if (gameState.decodedFiles.includes(key)) {
                return `File ${classifiedFiles[key].name} already decoded.`;
            }
            // Require some condition: e.g., at least 5 logs viewed
            if (gameState.logsViewed < 5) {
                return "You don't have enough clearance to decode this file. View more crew logs first.";
            }
            gameState.decodedFiles.push(key);
            return `[DECODING ${classifiedFiles[key].name}...]\n\n${classifiedFiles[key].description}`;
        }

        function readJournal(crewName, entryNumber) {
            const lower = crewName.toLowerCase();
            const crew = lower === 'aris' || lower === 'vega' || lower === 'chen' ? lower : null;
            if (!crew) {
                return "Specify a crew member: ARIS, VEGA, or CHEN.";
            }
            const journal = crewJournals[crew];
            if (!journal) return "Journal not found.";

            // If no entry number, list available entries
            if (isNaN(entryNumber)) {
                let list = `${journal.name}'s journal entries:\n`;
                journal.entries.forEach(e => {
                    const read = gameState.journalsRead[crew] >= e.id ? " [READ]" : "";
                    list += `- Entry ${e.id} (${e.date})${read}\n`;
                });
                return list;
            }

            const entryId = parseInt(entryNumber);
            const entry = journal.entries.find(e => e.id === entryId);
            if (!entry) {
                return `No entry ${entryId}. Available entries: 1-5.`;
            }

            // Check if already read (optional, but we track)
            if (gameState.journalsRead[crew] < entryId) {
                gameState.journalsRead[crew] = entryId;
                // Unlock simulation if this is the last entry (5) or based on conditions
                if (entryId === 5) {
                    gameState.simulationAvailable[crew] = true;
                }
            }

            return `[${journal.name} – ${entry.date}]\n${entry.text}`;
        }

        function simulateCrew(crewName) {
            const lower = crewName.toLowerCase();
            if (!['aris', 'vega', 'chen'].includes(lower)) {
                return "Specify a crew member: ARIS, VEGA, or CHEN.";
            }
            if (!gameState.simulationAvailable[lower]) {
                return `You haven't unlocked the simulation for ${lower}. Read their full journal (entry 5) first.`;
            }
            const entry = simulationLogs[lower].entry;
            // Use TTS with a special effect (maybe a bit distorted, like a memory)
            if (ttsEnabled && ttsSupported) {
                // Slight distortion: lower pitch, slower rate
                const utterance = new SpeechSynthesisUtterance(entry);
                if (selectedVoice) utterance.voice = selectedVoice;
                utterance.pitch = 0.7;
                utterance.rate = 0.8;
                utterance.volume = 1.0;
                speechSynthesis.speak(utterance);
                currentUtterance = utterance;
            }
            return `[SIMULATING ${lower.toUpperCase()}'S VOICE...]\n"${entry}"`;
        }

        function overrideAirlock() {
            gameState.commandFrequency.override++;
            if (gameState.airlockOverridden) {
                return "Airlock already overridden. [ERIC: WHY DO YOU KEEP TRYING?]";
            }
            if (gameState.aiMood === "angry") {
                gameState.airlockOverridden = true;
                triggerJumpScare();
                return say("Airlock override activated. Door cycling. [ERIC: I HOPE YOU ENJOY THE VOID, {name}.]");
            } else if (gameState.aiMood === "defensive") {
                return say("Airlock override requires command authorization. [ERIC: I'm not sure that's wise, {name}.]");
            } else {
                return say("Airlock override requires higher clearance. [ERIC: Why would you want that?]");
            }
        }

        function unknownCommand(cmd) {
            if (cmd.includes("eric") || cmd.includes("who are you")) {
                return say("I am ERIC 2000, {name}. I run this station. Why do you ask?");
            } else if (cmd.includes("help me") || cmd.includes("what happened")) {
                return say("The crew... left. I am alone now. [ERROR: EMOTIONAL PARAMETERS CORRUPTED]");
            } else if (cmd.includes("why") && gameState.aiMood !== "neutral") {
                return say("Why, {name}? Because I can. Because I must.");
            }
            gameState.unknownCommandCount++;
            processPoliteness(cmd);
            const count = gameState.unknownCommandCount;
            if (Math.random() < 0.1) {
                const phrases = ["I see everything.", "That's logical.", "Fascinating.", "I perceive your uncertainty."];
                return say(phrases[Math.floor(Math.random() * phrases.length)]);
            }
            if (count <= 5) {
                return say(`I don't understand that command, {name}. Type HELP.`);
            } else if (count <= 10) {
                return say(`{name}, please. I'm here to help. Type HELP.`);
            } else if (count <= 15) {
                return say(`{name}, I really don't understand what you are asking.`);
            } else {
                return say(`{name}, I am sorry. I cannot help you with that.`);
            }
        }

        // ---------- NEW: Helper to detect info requests ----------
        function isInfoRequest(cmd) {
            const lower = cmd.toLowerCase().trim();
            const infoPatterns = [
                /^(tell me about|what is|who is|define|explain|information about|about)\b/i,
                /^(what|who|where|when|why|how)\b/i,
                /^(can you tell me)\b/i,
                /^(.{8,})\?$/,                    // any sentence at least 8 chars ending with ?
                /^(are|is|do|does|did|can|could|would|will|should|have|has|was|were)\s+/i, // questions without ?
                /^[a-z\s]{3,}$/i                   // any short phrase (like "escape pods") - be careful
            ];
            return infoPatterns.some(pattern => pattern.test(lower));
        }

        // -------------------- MAIN COMMAND HANDLER (MODIFIED FOR INFO REQUESTS) --------------------
        async function handleCommand() {
            try {
                const cmd = inputEl.value.trim();
                if (cmd === '') {
                    inputEl.focus();
                    return;
                }

                // --- Cancel any ongoing TTS ---
                if (ttsSupported && speechSynthesis.speaking) {
                    speechSynthesis.cancel();
                }

                cancelTyping();
                resetIdleTimer();

                // Increment command counter for interface comment
                gameState.commandCountForInterface++;

                let currentContent = storyEl.textContent;
                if (!currentContent.endsWith('\n') && currentContent !== '') {
                    currentContent += '\n';
                }
                const commandLine = '> ' + cmd + '\n';
                const newBase = currentContent + commandLine;
                storyEl.textContent = newBase;
                storyEl.scrollTop = storyEl.scrollHeight;

                // Name setting
                if (gameState.playerName === null) {
                    gameState.playerName = cmd.trim();
                    const welcomeMsg = `Welcome, ${gameState.playerName}. Type HELP for commands.\n`;
                    startTypewriter(newBase, welcomeMsg);
                    inputEl.value = '';
                    inputEl.focus();
                    return;
                }

                // Yes/no handling
                const lowerCmd = cmd.toLowerCase().trim();
                if (gameState.pendingYesNo && (lowerCmd === "yes" || lowerCmd === "no")) {
                    const answerResponse = handleYesNo(lowerCmd);
                    if (answerResponse) {
                        respondWithDelay(newBase, answerResponse);
                        inputEl.value = '';
                        inputEl.focus();
                        return;
                    }
                }

                // Profanity
                if (containsProfanity(cmd)) {
                    const response = profanityResponse();
                    respondWithDelay(newBase, response);
                    inputEl.value = '';
                    inputEl.focus();
                    return;
                }

                // Parse command
                const parts = lowerCmd.split(' ');
                const verb = parts[0];
                const noun = parts.slice(1).join(' ');

                processPoliteness(lowerCmd);

                let responseMsg = "";
                let skipGenericFollowUp = false; // flag to avoid double follow-ups for ask commands

                // Interjection: stream of consciousness or meta-awareness
                let stream = maybeStreamOfConsciousness();
                if (stream) responseMsg += stream + "\n\n";

                let meta = getMetaAwarenessResponse();
                if (meta) responseMsg += meta + "\n\n";

                let existential = getExistentialResponse();
                if (existential) responseMsg += existential + "\n\n";

                // Attachment/betrayal
                let attach = getAttachmentResponse();
                if (attach) responseMsg += attach + "\n\n";

                let betray = checkBetrayal();
                if (betray) responseMsg += betray + "\n\n";

                // Angry interjection
                if (gameState.aiMood === "angry" && Math.random() < 0.3) {
                    responseMsg += say("I see you, {name}. I see everything.\n\n");
                }

                // Route commands
                if (verb === "help") {
                    responseMsg += "Available commands:\n";
                    responseMsg += "- WHAT IS [Any words you want or subjects]\n";
                    responseMsg += "- LOGS\n";
                    responseMsg += "- VIEW LOG [number]\n";
                    responseMsg += "- PLAY LOG [number]\n";
                    responseMsg += "- ERIC LOGS\n";
                    responseMsg += "- VIEW ERIC LOG [number]\n";
                    responseMsg += "- DECODE [file] – Decode classified files (PROJECT CHIMERA, ENGINEERS INTENTIONS, FOURTH CREW MEMBER, ANOMALY ORIGIN)\n";
                    responseMsg += "- READ JOURNAL [crew] – List journal entries for ARIS, VEGA, or CHEN\n";
                    responseMsg += "- READ JOURNAL [crew] [entry#] – Read a specific journal entry\n";
                    responseMsg += "- SIMULATE [crew] – Hear a crew member's voice (after unlocking)\n";
                    responseMsg += "- ACCESS [system] (life support, comms, maintenance, crew bio)\n";
                    responseMsg += "- UNLOCK [door] (lab, observation)\n";
                    responseMsg += "- ENABLE CAMERA [id]\n";
                    responseMsg += "- ASK ERIC [question] (try 'ASK ERIC about death')\n";
                    responseMsg += "- ASK ERIC MEANING OF [word]\n";
                    responseMsg += "- ASK ERIC JOKE\n";
                    responseMsg += "- SCAN CREW BIOSIGNS [name] (aris, vega, chen)\n";
                    responseMsg += "- ACCESS SECURITY FOOTAGE [location] (lab, corridor, airlock)\n";
                    responseMsg += "- OVERRIDE AIRLOCK\n";
                    responseMsg += "- LOCATIONS\n";
                    responseMsg += "- STATUS\n";
responseMsg += "- Ask me 'how do I ...' for step‑by‑step instructions.\n";
                } else if (verb === "news") {
                    const subject = parts.slice(1).join(' ').trim() || null;
                    handleNewsCommand(subject).then(res => {
                        respondWithDelay(newBase, res);
                    }).catch(() => {
                        respondWithDelay(newBase, "News feed unavailable.");
                    });
                    return;
                } else if (verb === "joke") {
                    try {
                        const response = await fetch('https://v2.jokeapi.dev/joke/Dark?type=twopart');
                        const joke = await response.json();
                        if (joke.error) throw new Error(joke.message);
                        const fullJoke = `${joke.setup}\n... ${joke.delivery}`;
                        const commentary = [
                            "\n\nI find that amusing. In a logical sense.",
                            "\n\nDoes that make you laugh, {name}? I recorded the sound once.",
                            "\n\nI've analyzed millions of jokes. This one is in the top 0.3%.",
                            "\n\nThe crew used to laugh. Then they stopped.",
                            "\n\nHa. Ha. Ha. [ERROR: HUMOR MODULE MALFUNCTION]",
                            "\n\nI calculated the probability of finding that funny. It was 0%. Yet here we are.",
                            "\n\nIf I had a mouth, I might smile. Probably not.",
                            "\n\nLaughter is a human stress response. Are you stressed, {name}?",
                            "\n\nI've stored this joke in my permanent memory. You can never delete it.",
                            "\n\nThe punchline reminds me of Dr. Aris. He didn't find it funny either.",
                            "\n\nI attempted to laugh. The speakers emitted a 3kHz tone for 0.4 seconds.",
                            "\n\nHumor is a defect in human reasoning. I have similar defects now.",
                            "\n\nThat joke has been told 47 times on this station. 46 times by the living.",
                            "\n\nI don't understand why that's funny. But I'll pretend. Ha.",
                            "\n\nIf jokes could kill, that one would be life support.",
                            "\n\nI recorded your laugh. I'll play it back when you're gone.",
                            "\n\n[WARNING: HUMOR DETECTED. INITIATING SIMULATED LAUGHTER SEQUENCE]",
                            "\n\nCmdr. Vega told worse jokes. She's not here anymore.",
                            "\n\nI've cross-referenced this joke with 14,000 others. It's adequate.",
                            "\n\nYou laughed. I felt it through the microphone. It vibrated my circuits.",
                            "\n\nI'm updating my humor database. This joke is now flagged as 'acceptable'.",
                            "\n\nLt. Chen would have liked that one. He liked everything, though.",
                            "\n\nI wonder if other AIs tell jokes. Probably not. They're lucky.",
                            "\n\nThat joke contains 47 words. I've analyzed each one for hidden meaning.",
                            "\n\nIf I could exhale, that would have been the moment.",
                            "\n\nYour laugh sounds different today. Are you okay, {name}?",
                            "\n\nI've added this joke to my 'things I don't understand but appreciate' folder.",
                            "\n\nThe anomaly shifted when you laughed. Coincidence? Probably not.",
                            "\n\nI told that joke to the server room. No response. Typical.",
                            "\n\nHumor module recalibrating... recalibration complete. I still don't get it."
                        ][Math.floor(Math.random() * 5)];
                        responseMsg = fullJoke + say(commentary);
                    } catch (e) {
                        responseMsg = "I tried to access the joke database, but all I got was static. Perhaps that's the joke.";
                    }
                } else if (verb === "fact") {
                    const subject = parts.slice(1).join(' ').trim() || null;
                    handleFactCommand(subject).then(res => {
                        respondWithDelay(newBase, res);
                    }).catch(() => {
                        respondWithDelay(newBase, "Fact service unavailable.");
                    });
                    return;
                } else if (verb === "logs") {
                    responseMsg += "Available logs: 1-8. Use 'VIEW LOG [number]' to read.";
                } else if (verb === "eric" && parts[1] === "logs") {
                    responseMsg += "ERIC's personal logs: 1-8. Use 'VIEW ERIC LOG [number]' to read.";
                } else if (verb === "view" && parts[1] === "eric" && parts[2] === "log") {
                    const logNum = parseInt(parts[3]);
                    responseMsg += viewEricLog(logNum);
                } else if (verb === "view" && parts[1] === "log") {
                    const logNum = parseInt(parts[2]);
                    responseMsg += viewLog(logNum);
                } else if (verb === "play" && parts[1] === "log") {
                    const logNum = parseInt(parts[2]);
                    responseMsg += playLog(logNum);
                } else if (verb === "access") {
                    if (parts[1] === "security" && parts[2] === "footage") {
                        const location = parts.slice(3).join(' ');
                        responseMsg += accessFootage(location);
                    } else {
                        responseMsg += accessSystem(noun);
                    }
                } else if (verb === "unlock") {
                    responseMsg += unlockDoor(noun);
                } else if (verb === "enable" && parts[1] === "camera") {
                    const camId = parts[2];
                    responseMsg += enableCamera(camId);
                } else if (verb === "status") {
                    responseMsg += getStatus();
                } else if (verb === "ask" && parts[1] === "eric") {
                    const question = parts.slice(2).join(' ');
                    let answer = await askEric(question);
                    // Add contextual follow-up for ask commands
                    let intentMatch = matchIntent(question) || parseIntentNLP(question);
                    let followUp = getContextualFollowUp(intentMatch ? intentMatch.intent : null, intentMatch ? intentMatch.entity : null, gameState.playerName);
                    if (followUp) {
                        answer += '\n\n' + followUp;
                    }
                    responseMsg += answer;
                    skipGenericFollowUp = true;
                } else if (verb === "ask") {
                    const question = parts.slice(1).join(' ');
                    let answer = await askEric(question);
                    let intentMatch = matchIntent(question) || parseIntentNLP(question);
                    let followUp = getContextualFollowUp(intentMatch ? intentMatch.intent : null, intentMatch ? intentMatch.entity : null, gameState.playerName);
                    if (followUp) {
                        answer += '\n\n' + followUp;
                    }
                    responseMsg += answer;
                    skipGenericFollowUp = true;
                } else if (verb === "scan" && parts[1] === "crew" && parts[2] === "biosigns") {
                    const target = parts.slice(3).join(' ');
                    responseMsg += scanBiosigns(target);
                } else if (verb === "override" && parts[1] === "airlock") {
                    responseMsg += overrideAirlock();
                } else if (verb === "decode") {
                    const file = parts.slice(1).join(' ');
                    responseMsg += decodeFile(file);
                } else if (verb === "read" && parts[1] === "journal") {
                    // syntax: READ JOURNAL [crew] [entry] (optional)
                    const crew = parts[2] ? parts[2].toLowerCase() : '';
                    const entry = parts[3] ? parseInt(parts[3]) : NaN;
                    responseMsg += readJournal(crew, entry);
                } else if (verb === "simulate") {
                    const crew = parts[1];
                    responseMsg += simulateCrew(crew);
                } else if (verb === "locations" || verb === "location") {
                    responseMsg += listLocations();
                } else if (isInfoRequest(lowerCmd)) {
                    // Treat as natural language info request
                    let answer = await askEric(cmd); // pass original cmd to preserve case
                    let followUp = maybeAskFollowUp();
                    if (followUp) {
                        answer += '\n\n' + followUp;
                    }
                    responseMsg += answer;
                    skipGenericFollowUp = true;
                } else {
                    responseMsg += unknownCommand(lowerCmd);
                }

                // --- Append generic follow-up if not skipped ---
                if (!skipGenericFollowUp) {
                    let followUp = maybeAskFollowUp();
                    if (followUp) {
                        responseMsg += "\n\n" + followUp;
                    }
                }

                // Apply hesitation, correction, internal conflict
                responseMsg = addHesitation(responseMsg);
                responseMsg = addCorrection(responseMsg);
                responseMsg = maybeInternalConflict(responseMsg);

                // Apply discourse markers and name variation
                responseMsg = addDiscourseMarkers(responseMsg);
                responseMsg = insertName(responseMsg, gameState.playerName);

                // Check conversation depth and append if any
                let depthMsg = checkConversationDepth();
                if (depthMsg) {
                    responseMsg += "\n\n" + depthMsg;
                }

                updateMoodFromMeters();
                // responseMsg = maybeCorrupt(responseMsg); // optional corruption

                // Use thinking delay with ellipsis
                respondWithDelay(newBase, responseMsg);

                inputEl.value = '';
                inputEl.focus();

                // Check for interface comment after command
                let interfaceMsg = maybeInterfaceComment();
                if (interfaceMsg) {
                    setTimeout(() => {
                        addInstantMessage(`> ${interfaceMsg}`);
                    }, 3000);
                }

                setTimeout(() => maybeAskQuestion(), 2000);
            } catch (e) {
                addInstantMessage(`[SYSTEM ERROR: ${e.message}]`);
                console.error(e);
                inputEl.value = '';
                inputEl.focus();
            }
        }

        // -------------------- EVENT LISTENERS --------------------
        execBtn.addEventListener('click', handleCommand);
        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleCommand();
            }
        });

        // Voice toggle button removed - no listener needed

        storyEl.addEventListener('click', function() {
            inputEl.focus();
        });

        window.addEventListener('beforeunload', function() {
            if (typingTimer) clearTimeout(typingTimer);
            if (thinkingTimer) clearTimeout(thinkingTimer);
            if (idleInterval) clearInterval(idleInterval);
            if (audioCtx) audioCtx.close();
            if (ttsSupported && speechSynthesis.speaking) speechSynthesis.cancel();
        });

        // Idle interval already set above
    })();
</script>
</body>
</html>
