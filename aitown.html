<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAVEN'S CREEK · 198X</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 16px;
        }
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(100, 80, 60, 0.03) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2;
        }
        .terminal {
            background: #0f0f0f;
            color: #d6c9b0;
            border: 4px solid #a58e6d;
            box-shadow: 0 0 20px #4f3f2b, inset 0 0 10px #2f2318;
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 18px 18px 12px 18px;
            position: relative;
            z-index: 1;
        }
        .header {
            border-bottom: 2px solid #a58e6d;
            padding-bottom: 10px;
            margin-bottom: 14px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            text-shadow: 0 0 4px #7a5f3e;
            color: #ecd89e;
        }
        .hud {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            border: 2px solid #6a4f2e;
            padding: 10px 15px;
            margin-bottom: 15px;
            background: #0a0500;
            font-size: 11px;
            text-transform: uppercase;
            color: #b7976e;
            text-shadow: 0 0 5px #5e3e1f;
            align-items: center;
        }
        .hud span {
            color: #e2b48c;
        }
        .output {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 12px;
            border: 2px solid #5e4a33;
            padding: 16px;
            background: #0f0b06;
            scroll-behavior: smooth;
            box-shadow: inset 0 0 15px #271e13;
        }
        .output p {
            margin: 0 0 12px 0;
            color: #f0dbc0;
        }
        .input-line {
            display: flex;
            align-items: center;
            border-top: 2px solid #7f623f;
            padding-top: 12px;
        }
        .prompt {
            color: #c9ad7e;
            margin-right: 12px;
            font-size: 18px;
        }
        #userInput {
            flex: 1;
            background: #0a0602;
            border: 2px solid #8b6f48;
            color: #f5e6d3;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            padding: 12px 12px;
            outline: none;
            box-shadow: 0 0 8px #634b29;
        }
        #userInput::placeholder {
            color: #6f5236;
            font-size: 9px;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9px;
            margin-top: 8px;
            color: #9f835b;
        }
        .clickable {
            color: #c9a87c;
            text-decoration: underline;
            cursor: pointer;
            transition: 0.1s;
        }
        .clickable:hover {
            color: #fce2b1;
            background: #3e2b18;
        }
        #aiStatus {
            color: #c4a079;
            font-size: 10px;
            margin-top: 5px;
            text-align: right;
        }
        .npc-list {
            margin-left: auto;
            font-size: 9px;
            color: #bda079;
        }
        .conv-indicator {
            color: #d4a76a;
            font-size: 9px;
            margin-right: 10px;
        }
    </style>
</head>
<body class="crt">
    <div class="terminal">
        <div class="header">
            <div>RAVEN'S CREEK · 198X</div>
            <div class="npc-list" id="npcPresence">[MAIN ST · EMPTY]</div>
        </div>
        <div class="hud" id="hud">
            <span id="locationDisplay">📍 MAIN STREET</span>
            <span>👥 <span id="npcCount">0</span> PRESENT</span>
            <span>💬 MEMORIES: <span id="memoryCount">0</span></span>
            <span id="conversationDisplay" class="conv-indicator"></span>
        </div>
        <div id="outputArea" class="output"></div>
        <div class="input-line">
            <span class="prompt">❯</span>
            <input type="text" id="userInput" placeholder="TALK TO PEGGY / GO TO DINER / LOOK ..." autofocus>
        </div>
        <div id="aiStatus" class="status">⚡ TOWN SLEEPS ... AWAITING COMMAND ⚡</div>
        <div class="footer">
            <span class="clickable" id="resetBtn">[ RESET ]</span>
            <span>EVERY FACE HOLDS A SECRET</span>
        </div>
    </div>

    <script>
        (function() {
            // --- DOM elements ---
            const outputDiv = document.getElementById('outputArea');
            const inputField = document.getElementById('userInput');
            const aiStatus = document.getElementById('aiStatus');
            const resetBtn = document.getElementById('resetBtn');
            const locationSpan = document.getElementById('locationDisplay');
            const npcCountSpan = document.getElementById('npcCount');
            const memoryCountSpan = document.getElementById('memoryCount');
            const npcPresenceSpan = document.getElementById('npcPresence');
            const conversationDisplay = document.getElementById('conversationDisplay');

            // --- TOWN DATA ---
            const locations = [
                { name: "MAIN STREET", desc: "Deserted main street. A flickering neon sign. Wind blows an empty beer can.", npcs: [] },
                { name: "DINER", desc: "Warm light, smell of coffee and pie. Peggy wipes the counter with a rag.", npcs: ["Peggy"] },
                { name: "GAS STATION", desc: "Greta's garage. Old oil stains on concrete. A bell jingles when you enter.", npcs: ["Greta"] },
                { name: "SHERIFF'S OFFICE", desc: "A single bulb over the desk. Sheriff Dalton pages through a file, drinking cold coffee.", npcs: ["Dalton"] },
                { name: "CHURCH", desc: "Stained glass, wooden pews. Pastor Miller sits alone in the front row.", npcs: ["Miller"] },
                { name: "BAR", desc: "Stale beer, a jukebox playing low. Eddie slumps on a stool, mumbling.", npcs: ["Eddie"] },
                { name: "MOTEL", desc: "Neon sign buzzes. Ruby leans against the office door, smoking.", npcs: ["Ruby"] }
            ];

            // NPC database with personalities and memory
            const npcData = {
                "Dalton": {
                    role: "sheriff",
                    personality: "You are Sheriff Dalton, a middle-aged lawman who has seen too much. You are skeptical of strangers but fair-minded. You value order and respect.",
                    relationship: 0,
                    memory: []  // list of strings (recent first)
                },
                "Peggy": {
                    role: "waitress",
                    personality: "You are Peggy, a waitress at the diner. You're friendly, chatty, and love gossip. You're always curious about newcomers.",
                    relationship: 0,
                    memory: []
                },
                "Eddie": {
                    role: "town drunk",
                    personality: "You are Eddie, the town drunk. You're often slurring your words and seem harmless, but you notice things others miss. You're lonely and appreciate kindness.",
                    relationship: 0,
                    memory: []
                },
                "Greta": {
                    role: "mechanic",
                    personality: "You are Greta, the mechanic at the gas station. You're tough, blunt, and don't suffer fools. You respect people who are handy or honest.",
                    relationship: 0,
                    memory: []
                },
                "Miller": {
                    role: "pastor",
                    personality: "You are Pastor Miller, a gentle and kind man who leads the local church. But you have a dark secret that haunts you. You are conflicted.",
                    relationship: 0,
                    memory: []
                },
                "Ruby": {
                    role: "motel worker",
                    personality: "You are Ruby, a woman who works at the motel. You're seen as a 'lady of the night' by some, but you're perceptive and world-weary. You're protective of your own interests.",
                    relationship: 0,
                    memory: []
                }
            };

            // Player state
            let currentLocation = "MAIN STREET";
            let currentConversation = null;  // name of NPC we are currently talking to (if any)

            // Helper: get NPC objects present at current location
            function getNPCsHere() {
                const loc = locations.find(l => l.name === currentLocation);
                if (!loc) return [];
                return loc.npcs.map(name => ({ name, ...npcData[name] })).filter(n => n.name);
            }

            // Update HUD and presence display
            function updateHUD() {
                locationSpan.textContent = `📍 ${currentLocation}`;
                const here = getNPCsHere();
                npcCountSpan.textContent = here.length;
                const totalMemories = Object.values(npcData).reduce((acc, n) => acc + n.memory.length, 0);
                memoryCountSpan.textContent = totalMemories;
                const names = here.map(n => n.name).join(', ') || 'none';
                npcPresenceSpan.textContent = `[${currentLocation} · ${names}]`;
                if (currentConversation) {
                    const npcHere = here.some(n => n.name === currentConversation);
                    if (!npcHere) {
                        // NPC left, auto-clear conversation
                        currentConversation = null;
                    }
                }
                conversationDisplay.textContent = currentConversation ? `💬 TALKING TO ${currentConversation}` : '';
            }

            // Append message to output
            function appendOutput(text, isPlayer = false) {
                const p = document.createElement('p');
                p.textContent = isPlayer ? '> ' + text.toUpperCase() : text;
                outputDiv.appendChild(p);
                outputDiv.scrollTop = outputDiv.scrollHeight;
            }

            // Initialize game intro
            function startGame() {
                outputDiv.innerHTML = '';
                appendOutput('RAVEN\'S CREEK · OCTOBER 198X');
                appendOutput('YOUR CAR SPUTTERED AND DIED ON THE OUTSKIRTS. YOU WALK INTO TOWN.');
                appendOutput('EVERYONE HERE KNOWS EVERYONE. AND THEY DON\'T TRUST STRANGERS.');
                appendOutput('---');
                appendOutput('YOU ARE AT MAIN STREET. A COUPLE OF LIGHTS ARE ON. WHAT NOW?');
                appendOutput('(YOU CAN "TALK TO PEGGY", "GO TO DINER", "LOOK", OR JUST START TALKING IF ALREADY IN CONVERSATION)');
                updateHUD();
            }

            // Reset everything
            function resetGame() {
                for (let key in npcData) {
                    npcData[key].relationship = 0;
                    npcData[key].memory = [];
                }
                currentLocation = "MAIN STREET";
                currentConversation = null;
                startGame();
                aiStatus.textContent = '⚡ TOWN RESET... ⚡';
            }

            // --- AI call for an NPC interaction ---
            async function talkToNPC(npcName, playerMessage) {
                const npc = npcData[npcName];
                if (!npc) {
                    appendOutput(`THERE'S NO ${npcName} HERE.`);
                    return;
                }

                // Build memory list
                let memoryText = npc.memory.length ? npc.memory.map(m => `- ${m}`).join('\n') : 'Nothing specific yet.';
                // Build prompt
                const prompt = `You are ${npcName}, the ${npc.role} in the small isolated town of Raven's Creek, 1980s. Your personality: ${npc.personality}
You have a relationship with the player (called "stranger") on a scale from -10 (enemy) to +10 (best friend). Current relationship: ${npc.relationship}.
You remember these things about the player:
${memoryText}

The player is currently at ${currentLocation} and says: "${playerMessage}"

Respond in character, in 1-3 sentences, using your personality and memories. After your response, include a line exactly in the format:
##NPC_STATE## ${npcName}|[relationship_change]|[new memory entry]
Where relationship_change is an integer like +1, -2, or 0. new memory entry is a brief phrase describing what happened (e.g., "Player asked about the murder" or "Player insulted me"). If no change, use 0 and "None". Do not add anything after that line.`;

                aiStatus.textContent = `⏳ ${npcName} is thinking ... ⏳`;
                inputField.disabled = true;

                try {
                    const url = `https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai&json=false&seed=${Math.floor(Math.random()*1000000)}`;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    let aiText = await response.text();

                    // Parse the special state line (last line)
                    const lines = aiText.split('\n').filter(l => l.trim() !== '');
                    let npcResponse = aiText;
                    let stateLine = '';
                    if (lines.length > 0 && lines[lines.length-1].startsWith('##NPC_STATE##')) {
                        stateLine = lines.pop();
                        npcResponse = lines.join('\n');
                    } else {
                        // try to find anywhere (fallback)
                        const idx = aiText.indexOf('##NPC_STATE##');
                        if (idx !== -1) {
                            npcResponse = aiText.substring(0, idx).trim();
                            stateLine = aiText.substring(idx).split('\n')[0];
                        }
                    }

                    // Display NPC response
                    appendOutput(`${npcName}: ${npcResponse}`);

                    // Update NPC state if we have a valid state line
                    if (stateLine) {
                        const parts = stateLine.split('|').map(s => s.trim());
                        if (parts.length >= 3 && parts[0] === '##NPC_STATE##' + npcName) {
                            const relChange = parseInt(parts[1]);
                            const memoryEntry = parts[2];
                            if (!isNaN(relChange) && memoryEntry !== 'None' && memoryEntry !== '') {
                                npc.relationship = Math.min(10, Math.max(-10, npc.relationship + relChange));
                                // Add memory (keep last 8)
                                npc.memory.unshift(memoryEntry);
                                if (npc.memory.length > 8) npc.memory.pop();
                                appendOutput(`[${npcName} relationship now ${npc.relationship}]`);
                            } else if (!isNaN(relChange) && memoryEntry === 'None') {
                                npc.relationship = Math.min(10, Math.max(-10, npc.relationship + relChange));
                                appendOutput(`[${npcName} relationship now ${npc.relationship}]`);
                            }
                        }
                    }

                    // Gossip: simple propagation – 30% chance another NPC at same location hears about it (if any)
                    const here = getNPCsHere().filter(n => n.name !== npcName);
                    if (here.length > 0 && Math.random() < 0.3) {
                        const gossipNPC = here[Math.floor(Math.random() * here.length)];
                        const gossipMsg = `(overheard: player told ${npcName} "${playerMessage}")`;
                        gossipNPC.memory.unshift(gossipMsg);
                        if (gossipNPC.memory.length > 8) gossipNPC.memory.pop();
                        appendOutput(`[${gossipNPC.name} overheard the conversation...]`);
                    }

                    aiStatus.textContent = '⚡ TOWN BREATHES ... AWAITING COMMAND ⚡';
                    inputField.disabled = false;
                    inputField.focus();
                    updateHUD();

                } catch (err) {
                    console.error(err);
                    aiStatus.textContent = `❌ STATIC: ${err.message} ❌`;
                    inputField.disabled = false;
                    inputField.focus();
                }
            }

            // --- Move to a location ---
            function goTo(locName) {
                const targetLoc = locations.find(l => l.name.toUpperCase().includes(locName.toUpperCase()) || locName.toUpperCase().includes(l.name));
                if (!targetLoc) {
                    appendOutput(`YOU CAN'T GO TO "${locName}". TRY: MAIN STREET, DINER, GAS STATION, SHERIFF'S OFFICE, CHURCH, BAR, MOTEL.`);
                    return;
                }
                currentLocation = targetLoc.name;
                currentConversation = null;  // moving ends any conversation
                appendOutput(`--- YOU WALK TO ${currentLocation} ---`);
                appendOutput(targetLoc.desc);
                const here = getNPCsHere();
                if (here.length) {
                    appendOutput(`HERE YOU SEE: ${here.map(n => n.name).join(', ')}.`);
                } else {
                    appendOutput('NO ONE IS AROUND.');
                }
                updateHUD();
            }

            // --- Command parser ---
            async function handleCommand(cmd) {
                cmd = cmd.trim();
                if (cmd === '') return;

                appendOutput(cmd, true); // echo player input

                const lower = cmd.toLowerCase();

                // ----- special commands (always work, even during conversation) -----
                if (lower === 'help' || lower === '?') {
                    appendOutput('COMMANDS: TALK TO [NAME], GO TO [PLACE], LOOK, RESET. NAMES: Dalton, Peggy, Eddie, Greta, Miller, Ruby.');
                    aiStatus.textContent = '⚡ ... ⚡';
                    inputField.focus();
                    return;
                }

                if (lower === 'look' || lower === 'look around') {
                    const loc = locations.find(l => l.name === currentLocation);
                    appendOutput(loc.desc);
                    const here = getNPCsHere();
                    if (here.length) appendOutput(`YOU SEE: ${here.map(n => n.name).join(', ')}.`);
                    else appendOutput('THE STREET IS EMPTY.');
                    inputField.focus();
                    return;
                }

                if (lower.startsWith('go to ') || lower.startsWith('goto ')) {
                    const target = cmd.substring(lower.startsWith('go to') ? 5 : 4).trim();
                    goTo(target);
                    inputField.focus();
                    return;
                }

                // if we are currently in a conversation, treat non-command input as message to that NPC
                if (currentConversation) {
                    // check if NPC still present
                    const here = getNPCsHere().map(n => n.name);
                    if (!here.includes(currentConversation)) {
                        appendOutput(`${currentConversation} IS NO LONGER HERE. CONVERSATION ENDED.`);
                        currentConversation = null;
                        updateHUD();
                        // fall through to normal parsing, but input already consumed, so we'll just return after re-handling?
                        // Actually we should re-run handleCommand with same input? But to avoid recursion, we'll just treat as new command after clearing.
                        // For simplicity, we'll just return and ask to re-enter.
                        return;
                    }
                    // It's a message to current NPC
                    await talkToNPC(currentConversation, cmd);
                    // stay in conversation
                    inputField.focus();
                    return;
                }

                // ----- not in conversation, try to parse commands -----

                // Try to go to location if it's just a location name
                const possibleLoc = locations.find(l => l.name.toUpperCase().includes(lower.toUpperCase()) || lower.toUpperCase().includes(l.name.split(' ')[0].toUpperCase()));
                if (possibleLoc && lower.length > 2) {
                    goTo(possibleLoc.name);
                    inputField.focus();
                    return;
                }

                // Talk to command
                if (lower.startsWith('talk to ')) {
                    const rest = cmd.substring(8).trim();
                    // split into name and message
                    const parts = rest.split(' ');
                    const npcNameRaw = parts[0];
                    const npcKey = Object.keys(npcData).find(k => k.toLowerCase() === npcNameRaw.toLowerCase());
                    if (!npcKey) {
                        appendOutput(`I DON'T KNOW ANY "${npcNameRaw}".`);
                        inputField.focus();
                        return;
                    }
                    // check if NPC is here
                    const hereNames = getNPCsHere().map(n => n.name);
                    if (!hereNames.includes(npcKey)) {
                        appendOutput(`${npcKey} IS NOT HERE. TRY GOING TO THEIR LOCATION.`);
                        inputField.focus();
                        return;
                    }
                    const message = parts.slice(1).join(' ') || '';
                    if (message === '') {
                        // just initiated conversation, set it and prompt
                        currentConversation = npcKey;
                        appendOutput(`[YOU ARE NOW TALKING TO ${npcKey}. SAY SOMETHING.]`);
                        updateHUD();
                        inputField.focus();
                        return;
                    } else {
                        // start conversation and send message immediately
                        currentConversation = npcKey;
                        await talkToNPC(npcKey, message);
                        // stay in conversation
                        inputField.focus();
                        return;
                    }
                }

                // Try to interpret as talking to someone if the first word is a name (and not a command)
                const firstWord = cmd.split(' ')[0];
                const npcByName = Object.keys(npcData).find(k => k.toLowerCase() === firstWord.toLowerCase());
                if (npcByName) {
                    const message = cmd.substring(firstWord.length).trim() || '...';
                    // check if NPC is here
                    const hereNames = getNPCsHere().map(n => n.name);
                    if (!hereNames.includes(npcByName)) {
                        appendOutput(`${npcByName} IS NOT HERE.`);
                        inputField.focus();
                        return;
                    }
                    currentConversation = npcByName;
                    await talkToNPC(npcByName, message);
                    inputField.focus();
                    return;
                }

                // Default: unknown command
                appendOutput('I DON\'T UNDERSTAND. TRY: TALK TO [NAME], GO TO [PLACE], LOOK, HELP.');
                inputField.focus();
            }

            // --- Event listeners ---
            inputField.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (inputField.disabled) return;
                    const cmd = inputField.value;
                    inputField.value = '';
                    handleCommand(cmd);
                }
            });

            resetBtn.addEventListener('click', () => {
                resetGame();
                inputField.disabled = false;
                inputField.focus();
            });

            // Start
            startGame();
            updateHUD();
        })();
    </script>
</body>
</html>
