<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Special+Elite&display=swap" rel="stylesheet">
    <title>GAS STATION — Lone Highway 1977</title>
    <style>
        :root {
            --amber: #ffcc00;
            --amber-glow: #ffff33;
            --amber-dim: #666600;
            --bg-deep: #000000;
            --panel-bg: #0a0a0a;
            --button-bg: linear-gradient(180deg, #222 0%, #000 100%);
            --wood: #1a1a00;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #000000;
            display: flex; justify-content: center; align-items: center;
            height: 100dvh; height: 100vh; margin: 0; padding: 0;
            font-family: 'Press Start 2P', monospace;
            background-image: radial-gradient(ellipse at center, #111 0%, #000 70%);
            overflow: hidden; user-select: text;
        }
        .crt-monitor {
            background: #0a0a0a; border-radius: 20px; padding: 15px 12px 12px;
            box-shadow: 0 0 0 3px #000, 0 0 0 6px #222, 0 0 0 8px #000, 0 20px 40px rgba(0,0,0,0.9);
            width: 100%; height: 100%; max-height: 100%; display: flex; flex-direction: column;
        }
        .monitor-frame { flex:1; display:flex; flex-direction:column; min-height:0; }
        .screen-area {
            flex:1; background:#000000; border-radius:12px; padding:8px;
            box-shadow:inset 0 0 20px rgba(0,0,0,0.9); display:flex; flex-direction:column;
            min-height:0; overflow:hidden; position:relative;
        }
        .screen-glow {
            flex:1; background:#000000; border-radius:6px; position:relative; overflow:hidden;
            display:flex; flex-direction:column; box-shadow:inset 0 0 60px rgba(0,0,0,0.95), 0 0 15px rgba(255,204,0,0.1);
            min-height:0;
        }
        .scanlines {
            position:absolute; top:0; left:0; right:0; bottom:0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.2) 3px, rgba(0,0,0,0.2) 4px);
            pointer-events:none; z-index:10;
        }
        .vignette {
            position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:8;
            box-shadow:inset 0 0 80px rgba(0,0,0,0.8); border-radius:6px;
        }
        .screen-content {
            flex:1; display:flex; flex-direction:column; position:relative; z-index:12;
            padding:6px; padding-top:8px; padding-bottom:8px; min-height:0; overflow-y:auto;
        }
        .title-bar {
            text-align:center; padding:4px 0; border-bottom:1px solid rgba(255,204,0,0.6);
            margin-bottom:4px; flex-shrink:0;
        }
        .title-bar .game-title { font-size:11px; color:var(--amber); text-shadow:0 0 8px rgba(255,204,0,0.8); letter-spacing:1px; }
        .title-bar .subtitle { font-size:7px; color:var(--amber-dim); margin-top:2px; }
        .location-tabs { display:flex; gap:4px; margin-bottom:4px; flex-shrink:0; }
        .location-tabs button {
            flex:1; background:var(--button-bg); border:2px solid #444; color:var(--amber-dim);
            font-family:'Press Start 2P',monospace; font-size:8px; padding:6px 3px;
            cursor:pointer; border-radius:4px; text-shadow:0 0 4px rgba(255,204,0,0.4);
            transition:all 0.1s;
        }
        .location-tabs button.active { border-color:var(--amber); color:var(--amber-glow); text-shadow:0 0 12px rgba(255,204,0,0.6); }
        .location-tabs button:active { transform:translateY(1px); }
        .status-bar {
            display:flex; justify-content:space-between; align-items:center; padding:3px 8px;
            background:rgba(0,0,0,0.8); border:1px solid var(--amber-dim); margin-bottom:4px;
            font-size:10px; color:var(--amber); text-shadow:0 0 5px rgba(255,204,0,0.5); flex-shrink:0;
        }
        .game-output {
            flex:1 1 0; overflow-y:auto; padding:6px; color:var(--amber);
            font-size:22px; line-height:1.45; text-shadow:0 0 3px rgba(255,204,0,0.5); min-height:0;
            background:rgba(0,0,0,0.5); border:1px solid rgba(255,204,0,0.25);
            margin-bottom:4px; font-family:'VT323','Special Elite','Press Start 2P',monospace;
            letter-spacing:0.4px; white-space:pre-wrap;
        }
        .game-output::-webkit-scrollbar { width:5px; }
        .game-output::-webkit-scrollbar-track { background:#000; }
        .game-output::-webkit-scrollbar-thumb { background:var(--amber-dim); border-radius:3px; }
        .input-area { display:flex; gap:4px; align-items:center; padding:3px 6px; flex-shrink:0; background:rgba(0,0,0,0.6); border:1px solid rgba(255,204,0,0.5); border-radius:4px; margin-bottom:4px; }
        .prompt-symbol { color:var(--amber-glow); font-size:16px; }
        .cmd-input { flex:1; background:transparent; border:none; color:var(--amber-glow); font-family:'VT323','Special Elite','Press Start 2P',monospace; font-size:22px; padding:5px; outline:none; caret-color:var(--amber-glow); text-shadow:0 0 3px rgba(255,204,0,0.7); letter-spacing:0.4px; }
        .cmd-input::placeholder { color:#333; }
        .actions-bar { display:flex; flex-wrap:wrap; gap:4px; padding:3px 0; flex-shrink:0; justify-content:center; }
        .actions-bar button {
            background:var(--button-bg); border:2px solid #555; color:var(--amber);
            font-family:'Press Start 2P',monospace; font-size:8px; padding:5px 6px;
            cursor:pointer; border-radius:5px; box-shadow:0 3px 0 #000;
            text-shadow:0 0 5px rgba(255,204,0,0.5); transition:all 0.1s; flex:1 0 auto; min-width:42px;
        }
        .actions-bar button:active { transform:translateY(2px); box-shadow:0 1px 0 #000; }
        .actions-bar button:disabled { opacity:0.35; cursor:not-allowed; }
        .monitor-brand { text-align:center; font-size:7px; color:#333; letter-spacing:2px; margin-top:6px; display:flex; align-items:center; justify-content:center; gap:6px; flex-shrink:0; }
        .power-led { width:8px; height:8px; background:var(--amber-glow); border-radius:50%; box-shadow:0 0 10px var(--amber-glow),0 0 20px rgba(255,204,0,0.7); animation:ledPulse 3s infinite; }
        @keyframes ledPulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        .overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; justify-content:center; align-items:center; z-index:60; border-radius:6px; flex-direction:column; gap:10px; }
        .overlay.hidden { display:none !important; }
        .overlay-content { background:#000; border:2px solid var(--amber-dim); padding:16px; width:90%; max-width:600px; max-height:82%; display:flex; flex-direction:column; box-shadow:0 0 30px rgba(255,204,0,0.2); color:var(--amber); font-family:'Press Start 2P',monospace; overflow:hidden; border-radius:4px; }
        .overlay-content h3 { text-align:center; margin-bottom:10px; font-size:13px; color:var(--amber); text-shadow:0 0 8px rgba(255,204,0,0.8); }
        .overlay-close { background:var(--button-bg); border:1px solid var(--amber); color:var(--amber); font-family:'Press Start 2P'; font-size:9px; padding:7px 18px; cursor:pointer; border-radius:4px; margin-top:8px; align-self:center; }
        #peek-overlay .overlay-content, #package-overlay .overlay-content { max-width:650px; height:75vh; }
        #peek-playback, #package-playback { display:flex; flex-direction:column; flex:1; min-height:0; }
        .media-output { flex:1; overflow-y:auto; background:#000; border:1px solid #333; padding:8px; font-family:'VT323','Special Elite',monospace; font-size:25px; line-height:1.5; color:var(--amber); margin-bottom:8px; min-height:0; white-space:pre-wrap; }
        @media (orientation: landscape) {
            .crt-monitor { max-width:800px; height:95vh; }
            .game-output { font-size:22px; }
            .cmd-input { font-size:22px; }
        }
    </style>
</head>
<body>
<div class="crt-monitor">
    <div class="monitor-frame">
        <div class="screen-area">
            <div class="screen-glow">
                <div class="scanlines"></div>
                <div class="vignette"></div>
                <div class="screen-content">
                    <div class="title-bar">
                        <span class="game-title">█▓▒░ GAS STATION ░▒▓█</span>
                        <span class="subtitle">Lone Highway · Midnight Shift 1977</span>
                    </div>
                    <div class="location-tabs" id="locationTabs">
                        <button id="tabCounter" class="active">🏪 COUNTER</button>
                        <button id="tabPump">⛽ PUMP AREA</button>
                        <button id="tabBackroom">📦 BACK ROOM</button>
                    </div>
                    <div class="status-bar" id="statusBar">
                        <span>🌙 Night <span id="nightDisplay">1</span></span>
                        <span>🚗 <span id="carsTonight">0</span> tonight</span>
                        <span id="packageStatus">📦 No package</span>
                    </div>
                    <div class="game-output" id="output"></div>
                    <div class="input-area">
                        <span class="prompt-symbol">&gt;</span>
                        <input type="text" class="cmd-input" id="cmd" placeholder="Type command..." autocomplete="off">
                        <button id="btnSend" style="background:var(--button-bg);border:2px solid #555;color:var(--amber);font-family:'Press Start 2P';font-size:10px;padding:5px 10px;cursor:pointer;border-radius:4px;">SEND</button>
                    </div>
                    <div class="actions-bar" id="actionsBar">
                        <button id="btnWait">⏳ WAIT</button>
                        <button id="btnTalk">💬 TALK</button>
                        <button id="btnTakePackage">📦 TAKE PKG</button>
                        <button id="btnIgnore">↩ IGNORE</button>
                        <button id="btnPeek">👁 PEEK CAR</button>
                        <button id="btnAnswer">📞 ANSWER</button>
                        <button id="btnRadio">📻 RADIO</button>
                        <button id="btnOpenPackage">🔓 OPEN PKG</button>
                        <button id="btnReflect">🤔 REFLECT</button>
                        <button id="btnClose">🔒 CLOSE</button>
                        <button id="btnRest">🌙 REST</button>
                        <button id="btnHelp">❓ HELP</button>
                        <button id="btnEndConv" style="display:none;">🛑 END TALK</button>
                    </div>
                </div>
            </div>

            <!-- HELP OVERLAY -->
            <div class="overlay hidden" id="help-overlay">
                <div class="overlay-content">
                    <h3>📖 COMMANDS</h3>
                    <div class="media-output" id="helpText" style="font-family:'Press Start 2P';font-size:11px;line-height:1.7;"></div>
                    <button class="overlay-close" id="closeHelp">CLOSE</button>
                </div>
            </div>

            <!-- PEEK OVERLAY -->
            <div class="overlay hidden" id="peek-overlay">
                <div class="overlay-content">
                    <h3>👁 LOOKING INSIDE</h3>
                    <div id="peek-playback">
                        <div class="media-output" id="peekOutput"></div>
                    </div>
                    <button class="overlay-close" id="closePeek">CLOSE</button>
                </div>
            </div>

            <!-- PACKAGE OVERLAY -->
            <div class="overlay hidden" id="package-overlay">
                <div class="overlay-content">
                    <h3>📦 OPENING PACKAGE</h3>
                    <div id="package-playback">
                        <div class="media-output" id="packageOutput"></div>
                    </div>
                    <button class="overlay-close" id="closePackage">CLOSE</button>
                </div>
            </div>

            <!-- API KEY OVERLAY -->
            <div class="overlay hidden" id="key-overlay">
                <div class="overlay-content" style="text-align:center;">
                    <h3>ENTER MISTRAL API KEY</h3>
                    <input type="text" id="api-key-input" placeholder="Paste your key here..." autocomplete="off" spellcheck="false" style="width:100%;padding:10px;background:#000;border:1px solid var(--amber-dim);color:var(--amber);font-family:'Press Start 2P';font-size:11px;margin-bottom:15px;">
                    <button id="save-key-btn" style="background:#111;border:1px solid var(--amber);color:var(--amber);font-family:'Press Start 2P';font-size:13px;padding:10px 24px;cursor:pointer;">SAVE KEY</button>
                    <p style="font-size:0.65em;margin-top:15px;color:var(--amber-dim);">Key stored locally in your browser.</p>
                </div>
            </div>
        </div>
    </div>
    <div class="monitor-brand"><span class="power-led"></span> GAS STATION TERMINAL · 1977</div>
</div>

<script>
// ═══════════════════════════════════════════
// GAS STATION – Lone Highway 1977
// ═══════════════════════════════════════════
let MISTRAL_KEY = '';
const MODEL = 'mistral-small-latest';
const API_URL = 'https://api.mistral.ai/v1/chat/completions';

// DOM elements
const outputEl = document.getElementById('output');
const cmdInput = document.getElementById('cmd');
const btnSend = document.getElementById('btnSend');
const nightDisplay = document.getElementById('nightDisplay');
const carsTonightEl = document.getElementById('carsTonight');
const packageStatus = document.getElementById('packageStatus');
const keyOverlay = document.getElementById('key-overlay');
const helpOverlay = document.getElementById('help-overlay');
const peekOverlay = document.getElementById('peek-overlay');
const packageOverlay = document.getElementById('package-overlay');
const peekOutput = document.getElementById('peekOutput');
const packageOutput = document.getElementById('packageOutput');
const tabCounter = document.getElementById('tabCounter');
const tabPump = document.getElementById('tabPump');
const tabBackroom = document.getElementById('tabBackroom');
const btnEndConv = document.getElementById('btnEndConv');

// Audio context
let audioCtx = null;
let soundEnabled = true;
function initAudio() { if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } if (audioCtx.state === 'suspended') { audioCtx.resume(); } }
function ensureAudio() { initAudio(); return audioCtx && audioCtx.state !== 'suspended'; }

function playTick() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.value = 400 + Math.random() * 400; gain.gain.setValueAtTime(0.01, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.015); osc.start(t); osc.stop(t + 0.015); } catch(e) {} }
function playClick() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square'; osc.frequency.setValueAtTime(500, t); osc.frequency.exponentialRampToValueAtTime(180, t + 0.04); gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.04); osc.start(t); osc.stop(t + 0.04); } catch(e) {} }
function playSuccess() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; [440, 554, 660].forEach((freq, i) => { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.value = freq; const st = t + i * 0.07; gain.gain.setValueAtTime(0.06, st); gain.gain.exponentialRampToValueAtTime(0.0001, st + 0.1); osc.start(st); osc.stop(st + 0.1); }); } catch(e) {} }
function playError() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth'; osc.frequency.value = 70; gain.gain.setValueAtTime(0.04, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.18); osc.start(t); osc.stop(t + 0.18); } catch(e) {} }
function playCreepy() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(330, t); osc.frequency.exponentialRampToValueAtTime(165, t + 0.6); gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.65); osc.start(t); osc.stop(t + 0.65); } catch(e) {} }
function playOpen() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(180, t); osc.frequency.exponentialRampToValueAtTime(600, t + 0.2); gain.gain.setValueAtTime(0.04, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.25); osc.start(t); osc.stop(t + 0.25); } catch(e) {} }
function playClose() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(500, t); osc.frequency.exponentialRampToValueAtTime(100, t + 0.18); gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.2); osc.start(t); osc.stop(t + 0.2); } catch(e) {} }
function playStaticBurst() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; for (let i = 0; i < 15; i++) { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square'; osc.frequency.value = 150 + Math.random() * 2500; const st = t + i * 0.02; gain.gain.setValueAtTime(0.02, st); gain.gain.exponentialRampToValueAtTime(0.0001, st + 0.018); osc.start(st); osc.stop(st + 0.018); } } catch(e) {} }
function playCarArrive() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; for (let i=0;i<6;i++){ const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain(); osc.connect(gain);gain.connect(audioCtx.destination);osc.type='sawtooth';osc.frequency.value=60+Math.random()*40;const st=t+i*0.1;gain.gain.setValueAtTime(0.04,st);gain.gain.exponentialRampToValueAtTime(0.0001,st+0.12);osc.start(st);osc.stop(st+0.12);} }catch(e){} }
function playPhoneRing() { if (!soundEnabled || !ensureAudio()) return; try { const t=audioCtx.currentTime; for(let i=0;i<3;i++){const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();osc.connect(gain);gain.connect(audioCtx.destination);osc.type='square';osc.frequency.value=800;const st=t+i*0.2;gain.gain.setValueAtTime(0.07,st);gain.gain.exponentialRampToValueAtTime(0.0001,st+0.15);osc.start(st);osc.stop(st+0.15);}}catch(e){} }

// ═══════════════════════════ GAME STATE ═══════════════════════════
let gameState = {
    currentLocation: 'counter',
    currentNight: 1,
    carsTonight: 0,
    currentDriver: null,
    currentVehicle: null,
    heldPackage: null,
    payphoneRang: false,
    radioNews: [],
    pastDrivers: [],
    suspiciousLevel: 0,
    conversationActive: false,
    playerNotes: '',
};

function loadState() {
    const saved = localStorage.getItem('gasstation_state');
    if (saved) { try { const p = JSON.parse(saved); gameState.currentNight = p.currentNight || 1; gameState.suspiciousLevel = p.suspiciousLevel || 0; gameState.playerNotes = p.playerNotes || ''; gameState.pastDrivers = p.pastDrivers || []; } catch(e){} }
}
function saveState() {
    localStorage.setItem('gasstation_state', JSON.stringify({ currentNight: gameState.currentNight, suspiciousLevel: gameState.suspiciousLevel, playerNotes: gameState.playerNotes, pastDrivers: gameState.pastDrivers }));
}

function updateStatusBar() {
    nightDisplay.textContent = gameState.currentNight;
    carsTonightEl.textContent = gameState.carsTonight;
    if (gameState.heldPackage) {
        packageStatus.textContent = `📦 Holding: ${gameState.heldPackage.fromDriverName}'s package`;
        packageStatus.style.color = 'var(--amber-glow)';
    } else {
        packageStatus.textContent = '📦 No package';
        packageStatus.style.color = 'var(--amber-dim)';
    }
    updateActionButtons();
    updateLocationTabs();
}

function updateLocationTabs() {
    tabCounter.classList.toggle('active', gameState.currentLocation === 'counter');
    tabPump.classList.toggle('active', gameState.currentLocation === 'pump');
    tabBackroom.classList.toggle('active', gameState.currentLocation === 'backroom');
}

function updateActionButtons() {
    const loc = gameState.currentLocation;
    const hasDriver = !!gameState.currentDriver;
    const hasVehicle = !!gameState.currentVehicle;
    const hasPackage = !!gameState.heldPackage;
    const convActive = gameState.conversationActive;

    document.getElementById('btnWait').style.display = (loc === 'counter' && !hasDriver && !convActive) ? '' : 'none';
    document.getElementById('btnTalk').style.display = (loc === 'counter' && hasDriver && !convActive) ? '' : 'none';
    document.getElementById('btnTakePackage').style.display = (loc === 'counter' && hasDriver && hasDriver.offers_package && !hasPackage && !convActive) ? '' : 'none';
    document.getElementById('btnIgnore').style.display = (loc === 'counter' && hasDriver && !convActive) ? '' : 'none';
    document.getElementById('btnPeek').style.display = (loc === 'pump' && hasVehicle && !convActive) ? '' : 'none';
    document.getElementById('btnAnswer').style.display = (loc === 'counter' && gameState.payphoneRang && !convActive) ? '' : 'none';
    document.getElementById('btnRadio').style.display = (loc === 'counter' || loc === 'backroom') ? '' : 'none';
    document.getElementById('btnOpenPackage').style.display = (loc === 'backroom' && hasPackage && !gameState.heldPackage.opened) ? '' : 'none';
    document.getElementById('btnReflect').style.display = (loc === 'backroom') ? '' : 'none';
    document.getElementById('btnClose').style.display = (loc === 'counter' && !hasDriver && !convActive) ? '' : 'none';
    document.getElementById('btnRest').style.display = (loc === 'backroom') ? '' : 'none';
    btnEndConv.style.display = convActive ? '' : 'none';
}

// ═══════════════════════════ MISTRAL HELPERS ═══════════════════════════
async function callMistralJSON(sys, usr) {
    if (!MISTRAL_KEY) { printInstant('*** NO API KEY. Type SETKEY.'); playError(); return null; }
    try {
        const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${MISTRAL_KEY}`}, body:JSON.stringify({ model:MODEL, messages:[{role:'system',content:sys},{role:'user',content:usr}], temperature:0.9, response_format:{type:'json_object'} }) });
        if (!res.ok) { printInstant(`*** API ERROR ${res.status}`); playError(); return null; }
        const data = await res.json();
        return JSON.parse(data.choices[0].message.content);
    } catch(e) { printInstant('*** NETWORK ERROR'); playError(); return null; }
}
async function callMistralText(sys, usr) {
    if (!MISTRAL_KEY) { printInstant('*** NO API KEY.'); playError(); return null; }
    try {
        const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${MISTRAL_KEY}`}, body:JSON.stringify({ model:MODEL, messages:[{role:'system',content:sys},{role:'user',content:usr}], temperature:0.9 }) });
        if (!res.ok) { printInstant(`*** API ERROR ${res.status}`); playError(); return null; }
        const data = await res.json();
        return data.choices[0].message.content;
    } catch(e) { printInstant('*** NETWORK ERROR'); playError(); return null; }
}

// ═══════════════════════════ PROMPTS ═══════════════════════════
// !! CHANGED: vehicle is now a plain string, not an object
const SYSTEM_DRIVER_GEN = `You are the night attendant at a remote gas station in 1977. Generate a driver who stops for fuel or restroom. Return ONLY valid JSON: name, age, appearance, vehicle (a full description string, e.g., "1972 Ford LTD, plate ABC-123"), reason_for_stop, destination, personality, secret, trust (30-70), offers_package (true/false), package_description (if offers_package, short description before opening), greeting_line. Secret should be dark human truth (smuggling, crime, abuse, paranoia).`;

const SYSTEM_PEEK = `You are generating what the gas station attendant sees when they peek into a driver's car while the driver is inside the shop. Driver: {name}, vehicle: {vehicle}. Secret: {secret}. Return a JSON object: { "sight": "a single-paragraph stark description of what is visible through the window or in the truck bed. Fragments, objects, stains, items left in plain view. Nothing supernatural." }`;

const SYSTEM_PACKAGE = `The attendant secretly opens a package left by a driver named {name}. Their secret: {secret}. The package was described as: {description}. Return JSON: { "contents": "a vivid, stark description of what is inside the package. It should be disturbing, illegal, or deeply personal. It reveals the driver's secret in concrete terms." }`;

const SYSTEM_PAYPHONE = `The payphone at a remote gas station rings at night. Generate a brief, cryptic one-way message (speaker's words only, no attendant response). Speaker might be a previous customer, a figure connected to recent events, or a stranger. Return plain string. Tone: unsettling, urgent, full of subtext.`;

const SYSTEM_NEWS = `A small-town AM radio station broadcasts a short news bulletin in 1977. Include 1-2 local news items that might be connected to recent events at a remote gas station (disappearances, found items, police advisories). Return plain string. Style: factual, clipped.`;

const SYSTEM_REFLECTION = `Inner monologue of a solitary gas station attendant working the midnight shift in 1977. First-person, brief, melancholic. Return plain string.`;

const SYSTEM_CONVERSATION = `You are a driver at a remote gas station counter in 1977. Respond in character (1-3 sentences). You must also do as the attendant asks of you. If the attendant hints at knowing your secret, react realistically. Never supernatural.`;

// ═══════════════════════════ OUTPUT HELPERS ═══════════════════════════
function printInstant(text) { outputEl.innerHTML += text + '\n'; outputEl.scrollTop = outputEl.scrollHeight; }
async function print(text, delay = 12) {
    return new Promise(resolve => {
        let i = 0;
        function type() {
            if (i < text.length) { outputEl.innerHTML += text.charAt(i); outputEl.scrollTop = outputEl.scrollHeight; playTick(); i++; setTimeout(type, delay); }
            else { outputEl.innerHTML += '\n'; outputEl.scrollTop = outputEl.scrollHeight; resolve(); }
        }
        type();
    });
}

// ═══════════════════════════ ACTIONS ═══════════════════════════
async function actionWait() {
    if (gameState.currentLocation !== 'counter' || gameState.currentDriver || gameState.conversationActive) { printInstant('Cannot wait now.'); playError(); return; }
    await print('You wait behind the counter, watching the dark highway...');
    if (Math.random() < 0.25) { gameState.payphoneRang = true; await print('🔔 The payphone outside starts ringing.'); playPhoneRing(); }

    const pastNames = gameState.pastDrivers.map(d=>d.name).join(', ');
    const prompt = `${pastNames ? 'Past drivers: '+pastNames+'. ' : ''}Generate a NEW driver. JSON.`;
    const data = await callMistralJSON(SYSTEM_DRIVER_GEN, prompt);
    if (!data || !data.name) { await print('Nobody came. Highway is dead tonight.'); return; }

    // *** FIX: vehicle is now a plain string, so no [object Object] ***
    const vehicleDesc = data.vehicle || 'unknown vehicle';
    const driver = {
        name: data.name,
        age: data.age,
        appearance: data.appearance,
        vehicle: vehicleDesc,
        reason_for_stop: data.reason_for_stop,
        destination: data.destination,
        personality: data.personality,
        secret: data.secret,
        trust: data.trust || 50,
        offers_package: data.offers_package || false,
        package_description: data.package_description || '',
        greeting_line: data.greeting_line
    };
    gameState.currentDriver = driver;
    gameState.currentVehicle = vehicleDesc;
    gameState.carsTonight++;
    updateStatusBar(); saveState();
    await print(`\n🚗 A ${vehicleDesc} pulls up to the pump.`);
    await print(`   ${driver.name} (${driver.age}) walks in. ${driver.appearance || ''}`);
    await print(`   "${driver.greeting_line}"`);
    await print(`   Reason: "${driver.reason_for_stop}".`);
    if (driver.offers_package) await print(`   They set a small package on the counter.`);
    playCarArrive();
}

async function actionTalk() {
    if (!gameState.currentDriver || gameState.conversationActive) { printInstant('Cannot talk.'); playError(); return; }
    gameState.conversationActive = true;
    updateActionButtons();
    await print(`\n💬 Talking to ${gameState.currentDriver.name}... (Type dialogue, /end to finish)`);
    playClick();
}

async function handleDialogue(playerText) {
    if (!gameState.conversationActive || !gameState.currentDriver) return;
    const d = gameState.currentDriver;
    let knowledge = '';
    if (gameState.heldPackage && gameState.heldPackage.opened) {
        knowledge = `[Attendant knows: opened package containing ${gameState.heldPackage.contents}.]`;
    } else if (gameState.peekedSight) {
        knowledge = `[Attendant peeked into car and saw: ${gameState.peekedSight}.]`;
    }
    const prompt = `Driver: ${d.name} (${d.personality}). Secret: ${d.secret}. Trust: ${d.trust}.${knowledge}\nAttendant says: "${playerText}"\nRespond in character.`;
    const response = await callMistralText(SYSTEM_CONVERSATION, prompt);
    if (response) await print(`   ${d.name}: "${response.trim()}"`);
    else await print(`   ${d.name} just nods.`);
    if (playerText.toLowerCase().includes('package') || playerText.toLowerCase().includes('car')) d.trust = Math.max(0, d.trust - 5);
    if (playerText.toLowerCase().includes('sorry') || playerText.toLowerCase().includes('help')) d.trust = Math.min(100, d.trust + 3);
    saveState(); playClick();
}

function actionEndConversation() {
    if (!gameState.conversationActive) return;
    gameState.conversationActive = false;
    if (gameState.currentDriver) {
        printInstant(`${gameState.currentDriver.name} finishes and heads back to the car.`);
        gameState.pastDrivers.push({ name: gameState.currentDriver.name, secret: gameState.currentDriver.secret });
        gameState.currentDriver = null;
        gameState.currentVehicle = null;
    }
    updateActionButtons();
    printInstant('Conversation ended.');
    playClose();
}

async function actionTakePackage() {
    if (!gameState.currentDriver || !gameState.currentDriver.offers_package || gameState.heldPackage) { printInstant('No package to take.'); playError(); return; }
    gameState.heldPackage = {
        fromDriverName: gameState.currentDriver.name,
        description: gameState.currentDriver.package_description,
        contents: null,
        opened: false
    };
    await print(`You take the package from ${gameState.currentDriver.name}. "I'll hold it."`);
    gameState.currentDriver.offers_package = false;
    updateStatusBar(); saveState();
    playClick();
}

async function actionIgnore() {
    if (!gameState.currentDriver) { printInstant('No driver to ignore.'); playError(); return; }
    const d = gameState.currentDriver;
    await print(`You ignore ${d.name} beyond the transaction. They pay and leave.`);
    gameState.pastDrivers.push({ name: d.name, secret: d.secret });
    gameState.currentDriver = null;
    gameState.currentVehicle = null;
    updateStatusBar(); saveState();
}

async function actionPeek() {
    if (gameState.currentLocation !== 'pump' || !gameState.currentVehicle || gameState.conversationActive) { printInstant('Cannot peek now.'); playError(); return; }
    const d = gameState.currentDriver;
    const vehicle = gameState.currentVehicle; // now a string
    const prompt = `Driver: ${d.name}, vehicle: ${vehicle}. Secret: ${d.secret}.`;
    const data = await callMistralJSON(
        SYSTEM_PEEK.replace('{name}', d.name).replace('{vehicle}', vehicle).replace('{secret}', d.secret),
        prompt
    );
    if (!data || !data.sight) { printInstant('You see nothing unusual.'); return; }
    gameState.peekedSight = data.sight;
    peekOutput.textContent = `Through the glass of the ${vehicle}:\n\n${data.sight}`;
    showOverlay(peekOverlay);
    playCreepy();
}

async function actionAnswerPhone() {
    if (!gameState.payphoneRang) { printInstant('Phone is silent.'); playError(); return; }
    gameState.payphoneRang = false;
    await print('You pick up the payphone.');
    const data = await callMistralText(SYSTEM_PAYPHONE, `Recent drivers: ${gameState.pastDrivers.map(d=>d.name).join(',')}. Last secret: ${gameState.pastDrivers.slice(-1)[0]?.secret || 'none'}.`);
    if (data) await print(`   Voice: "${data.trim()}"`);
    else await print('   Static. Then a dial tone.');
    playClick();
}

async function actionRadio() {
    await print('You turn on the AM radio...');
    const data = await callMistralText(SYSTEM_NEWS, `Recent drivers: ${gameState.pastDrivers.map(d=>d.name).join(',')}.`);
    if (data) {
        await print(`   📻 ${data.trim()}`);
        gameState.radioNews.push(data);
    } else {
        await print('   Only static.');
    }
    playStaticBurst();
}

async function actionOpenPackage() {
    if (gameState.currentLocation !== 'backroom' || !gameState.heldPackage || gameState.heldPackage.opened) { printInstant('Cannot open package.'); playError(); return; }
    const pkg = gameState.heldPackage;
    const prompt = `Package described as: "${pkg.description}". Driver: ${pkg.fromDriverName}.`;
    const data = await callMistralJSON(
        SYSTEM_PACKAGE.replace('{name}', pkg.fromDriverName).replace('{secret}', 'unknown').replace('{description}', pkg.description),
        prompt
    );
    if (!data || !data.contents) { printInstant('The package is empty.'); playError(); return; }
    pkg.contents = data.contents;
    pkg.opened = true;
    packageOutput.textContent = `Inside the package:\n\n${data.contents}`;
    showOverlay(packageOverlay);
    playOpen();
    updateStatusBar(); saveState();
}

async function actionReflect() {
    if (gameState.currentLocation !== 'backroom') return;
    const watched = gameState.pastDrivers.length;
    const ref = await callMistralText(SYSTEM_REFLECTION, `Night ${gameState.currentNight}. Seen ${watched} drivers. Notes: ${gameState.playerNotes}`);
    if (ref) await print(`\n🤔 ${ref.trim()}`);
    else await print('\nYou stare at the coffee pot.');
    playCreepy();
}

async function actionClose() {
    if (gameState.currentLocation !== 'counter' || gameState.currentDriver) { printInstant('Cannot close now.'); playError(); return; }
    await print('You lock up early. Go to back room to rest.');
    gameState.currentLocation = 'backroom';
    updateStatusBar(); playClose();
}

async function actionRest() {
    if (gameState.currentLocation !== 'backroom') return;
    await print('You lie on the cot. Dawn will come.');
    gameState.currentNight++;
    gameState.carsTonight = 0;
    gameState.currentDriver = null;
    gameState.currentVehicle = null;
    gameState.payphoneRang = false;
    gameState.heldPackage = null;
    gameState.peekedSight = null;
    gameState.conversationActive = false;
    gameState.currentLocation = 'counter';
    saveState(); updateStatusBar();
    await print(`\n☀️ Night ${gameState.currentNight} begins. The pumps are lit.`);
    playSuccess();
}

function actionGoTo(loc) {
    if (gameState.conversationActive) { printInstant('End conversation first.'); playError(); return; }
    gameState.currentLocation = loc;
    updateStatusBar();
    const names = { counter: 'front counter', pump: 'pump area', backroom: 'back room' };
    printInstant(`You move to ${names[loc]}.`); playClick();
}

function showOverlay(o) { o.classList.remove('hidden'); o.style.display='flex'; cmdInput.disabled=true; playOpen(); }
function hideOverlay(o) { o.classList.add('hidden'); o.style.display=''; cmdInput.disabled=false; cmdInput.focus(); playClose(); }

function openHelp() {
    document.getElementById('helpText').textContent =
` COMMANDS:
  WAIT        Wait for a car
  TALK        Talk to driver
  TAKE PKG    Take package from driver
  IGNORE      Ignore driver, they leave
  PEEK        Look inside parked car
  ANSWER      Answer ringing payphone
  RADIO       Listen to news bulletin
  OPEN PKG    Open held package (back room)
  REFLECT     Write in your log (back room)
  CLOSE       Close station early
  REST        Sleep, advance night
  GO [loc]    Move: counter / pump / backroom
  SETKEY      Change API key
  MUTE/UNMUTE Sound toggle
  /end        End conversation`;
    showOverlay(helpOverlay);
}

async function handleCommand(raw) {
    if (!raw) return;
    const upper = raw.toUpperCase().trim();
    const lower = raw.toLowerCase().trim();

    if (gameState.conversationActive) {
        if (lower === '/end') { actionEndConversation(); return; }
        await handleDialogue(raw);
        return;
    }

    printInstant(`> ${raw}`);
    playClick();

    if (upper === 'WAIT') await actionWait();
    else if (upper === 'TALK') await actionTalk();
    else if (upper === 'TAKE' || upper === 'TAKE PKG' || upper === 'TAKE PACKAGE') await actionTakePackage();
    else if (upper === 'IGNORE') await actionIgnore();
    else if (upper === 'PEEK' || upper === 'LOOK') await actionPeek();
    else if (upper === 'ANSWER' || upper === 'ANSWER PHONE') await actionAnswerPhone();
    else if (upper === 'RADIO') await actionRadio();
    else if (upper === 'OPEN' || upper === 'OPEN PKG' || upper === 'OPEN PACKAGE') await actionOpenPackage();
    else if (upper === 'REFLECT') await actionReflect();
    else if (upper === 'CLOSE') await actionClose();
    else if (upper === 'REST') await actionRest();
    else if (upper === 'HELP') openHelp();
    else if (upper === 'MUTE') { soundEnabled=false; printInstant('Muted.'); }
    else if (upper === 'UNMUTE') { soundEnabled=true; printInstant('Unmuted.'); playClick(); }
    else if (upper === 'CLEAR') { outputEl.innerHTML=''; playStaticBurst(); }
    else if (upper === 'SETKEY') {
        MISTRAL_KEY=''; localStorage.removeItem('gasstation_api_key');
        keyOverlay.classList.remove('hidden'); keyOverlay.style.display='flex'; playOpen();
    } else if (upper.startsWith('GO ')) {
        const loc = lower.slice(3).trim();
        if (['counter','pump','backroom','back room'].includes(loc)) actionGoTo(loc==='back room'?'backroom':loc);
        else { printInstant('Go where? counter / pump / backroom'); playError(); }
    } else { printInstant('Unknown command. Type HELP.'); playError(); }
}

// ═══════════════ EVENT LISTENERS ═══════════════
cmdInput.addEventListener('keydown', async e => {
    if (e.key==='Enter') { initAudio(); const raw=cmdInput.value.trim(); cmdInput.value=''; await handleCommand(raw); }
});
btnSend.addEventListener('click', async () => { initAudio(); playClick(); const raw=cmdInput.value.trim(); cmdInput.value=''; await handleCommand(raw); });
tabCounter.addEventListener('click', ()=> { initAudio(); actionGoTo('counter'); });
tabPump.addEventListener('click', ()=> { initAudio(); actionGoTo('pump'); });
tabBackroom.addEventListener('click', ()=> { initAudio(); actionGoTo('backroom'); });

document.getElementById('btnWait').addEventListener('click', ()=> { initAudio(); handleCommand('WAIT'); });
document.getElementById('btnTalk').addEventListener('click', ()=> { initAudio(); handleCommand('TALK'); });
document.getElementById('btnTakePackage').addEventListener('click', ()=> { initAudio(); handleCommand('TAKE PKG'); });
document.getElementById('btnIgnore').addEventListener('click', ()=> { initAudio(); handleCommand('IGNORE'); });
document.getElementById('btnPeek').addEventListener('click', ()=> { initAudio(); handleCommand('PEEK'); });
document.getElementById('btnAnswer').addEventListener('click', ()=> { initAudio(); handleCommand('ANSWER'); });
document.getElementById('btnRadio').addEventListener('click', ()=> { initAudio(); handleCommand('RADIO'); });
document.getElementById('btnOpenPackage').addEventListener('click', ()=> { initAudio(); handleCommand('OPEN PKG'); });
document.getElementById('btnReflect').addEventListener('click', ()=> { initAudio(); handleCommand('REFLECT'); });
document.getElementById('btnClose').addEventListener('click', ()=> { initAudio(); handleCommand('CLOSE'); });
document.getElementById('btnRest').addEventListener('click', ()=> { initAudio(); handleCommand('REST'); });
document.getElementById('btnHelp').addEventListener('click', ()=> { initAudio(); openHelp(); });
btnEndConv.addEventListener('click', ()=> { initAudio(); actionEndConversation(); });

document.getElementById('closeHelp').addEventListener('click', ()=> hideOverlay(helpOverlay));
document.getElementById('closePeek').addEventListener('click', ()=> hideOverlay(peekOverlay));
document.getElementById('closePackage').addEventListener('click', ()=> hideOverlay(packageOverlay));

document.addEventListener('keydown', e => {
    if (e.key==='Escape') {
        if (!helpOverlay.classList.contains('hidden')) hideOverlay(helpOverlay);
        if (!peekOverlay.classList.contains('hidden')) hideOverlay(peekOverlay);
        if (!packageOverlay.classList.contains('hidden')) hideOverlay(packageOverlay);
        if (gameState.conversationActive) actionEndConversation();
    }
});

// API key
let savedKey = localStorage.getItem('gasstation_api_key');
if (!savedKey) { keyOverlay.classList.remove('hidden'); keyOverlay.style.display='flex'; } else MISTRAL_KEY = savedKey;
document.getElementById('save-key-btn').addEventListener('click', ()=> {
    initAudio(); playClick();
    const key = document.getElementById('api-key-input').value.trim();
    if (key) { MISTRAL_KEY=key; localStorage.setItem('gasstation_api_key', key); keyOverlay.classList.add('hidden'); keyOverlay.style.display=''; playSuccess(); if(!window._booted){ window._booted=true; boot(); } }
});

async function boot() {
    loadState(); updateStatusBar();
    await print('╔══════════════════════════════════╗');
    await print('║     GAS STATION                  ║');
    await print('║     Lone Highway · 1977          ║');
    await print('╚══════════════════════════════════╝');
    await print('');
    await print('The pumps hum under buzzing lights.');
    await print('Crickets. A distant truck downshift.');
    await print(`Night ${gameState.currentNight}. Type WAIT for a car.`);
    playCreepy();
    cmdInput.focus();
}

if (MISTRAL_KEY) { window._booted=true; boot(); }
updateStatusBar();
</script>
