<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERIC 2000 :: SYS_LOGS + AUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 12px;
            margin: 0;
            image-rendering: pixelated;
        }

        .terminal {
            max-width: 900px;
            width: 100%;
            background: #000000;
            padding: 20px 18px;
            color: #1eff6c;
            text-shadow: 0 0 5px #1eff6c, 0 0 12px #0f3f1f;
            font-size: 14px;
            position: relative;
        }

        .terminal::after {
            content: "";
            display: block;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,20,0,0.08) 0px, rgba(0,255,0,0.02) 4px, transparent 5px);
            pointer-events: none;
            z-index: 9999;
            opacity: 0.3;
        }

        .story-window {
            background: black;
            border: 0px inset #2a5a2a;
            padding: 20px;
            min-height: 240px;
            margin-bottom: 24px;
            box-shadow: inset 0 0 40px rgba(0,20,0,0.8);
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 350px;
            color: #1eff6c;
            text-shadow: 0 0 5px #1eff6c;
        }

        .action-button {
            background: black;
            border: 2px outset grey;
            color: #1eff6c;
            padding: 14px 24px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 0 8px white;
        }

        .action-button:active {
            border: 2px inset white;
            background: black;
            transform: translateY(2px);
        }

        .command-area {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .prompt-label {
            color: #1eff6c;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #1eff6c;
        }

        #commandInput {
            background: black;
            border: 4px inset grey;
            padding: 14px 12px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: #1eff6c;
            text-shadow: 0 0 5px grey;
            flex: 1 1 250px;
            min-width: 200px;
        }

        #commandInput:focus {
            outline: none;
            border: 4px inset grey;
        }

        #commandInput::placeholder {
            color: grey;
            text-shadow: none;
            font-size: 11px;
        }

        .scare-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: red;
            font-family: 'Press Start 2P', monospace;
            font-size: 24px;
            text-shadow: 0 0 20px red;
            animation: flicker 0.1s infinite;
            cursor: pointer;
        }

        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="terminal">
    <div id="storyWindow" class="story-window">[ ERIC 2000 // RESEARCH STATION OLYMPUS-1 ]\n[ SYSTEM ONLINE ΓÇô 0x7E4F09A2 ]\n\nPlease identify yourself. Enter your name:</div>

    <div class="command-area">
        <span class="prompt-label">enter your command:</span>
        <input type="text" id="commandInput" placeholder="TYPE HERE" autofocus>
        <button id="executeBtn" class="action-button">Γû║ EXECUTE</button>
        <button id="ttsToggleBtn" class="action-button">≡ƒöè VOICE OFF</button>
        <button id="backBtn" class="action-button" onclick="window.location.href='gameplay.html';">Γùä BACK</button>
    </div>
</div>

<script>
    (function() {
        // -------------------- WEB AUDIO TYPING SOUND (TERMINAL EFFECT) --------------------
        let audioCtx = null;
        let audioEnabled = false;

        function initAudio() {
            if (audioCtx) return audioCtx;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                // keep suspended until user gesture
            } catch (e) {
                console.warn("Web Audio API not supported ΓÇö no typing sound.");
            }
            return audioCtx;
        }

        // Plays a short, clickΓÇælike sound (terminal keypress)
        function playTypingSound() {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const now = audioCtx.currentTime;
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.08, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.025);
            const osc = audioCtx.createOscillator();
            osc.frequency.value = 720;
            osc.type = 'sawtooth';
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.025);
        }

        // ----- NEW: Enhanced static noise for audio logs (longer, louder) -----
        function playStaticNoise(duration = 12.0) {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; // white noise
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const gainNode = audioCtx.createGain();
            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.5, now + 0.2);      // fade in
            gainNode.gain.setValueAtTime(0.5, now + 0.2);
            gainNode.gain.linearRampToValueAtTime(0.001, now + duration - 0.5); // fade out near end
            noise.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            noise.start();
            noise.stop(now + duration);
        }

        function enableAudio() {
            if (!audioCtx) initAudio();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume().catch(e => console.warn("Audio resume failed", e));
            }
        }

        document.addEventListener('keydown', function enableOnKey() {
            enableAudio();
            document.removeEventListener('keydown', enableOnKey);
        }, { once: true });
        document.addEventListener('click', function enableOnClick() {
            enableAudio();
            document.removeEventListener('click', enableOnClick);
        }, { once: true });

        // -------------------- TEXT-TO-SPEECH (MALE VOICE ENFORCED) --------------------
        let ttsEnabled = false;
        let currentUtterance = null;
        const ttsSupported = window.speechSynthesis !== undefined;
        let selectedVoice = null;
        let voicesReady = false;
        let ttsInitialized = false;

        function selectMaleVoice(voices) {
            if (!voices || voices.length === 0) return null;

            console.log('Available English voices:');
            voices.filter(v => v.lang.includes('en')).forEach(v => console.log(` - ${v.name} (${v.lang})`));

            let voice = voices.find(v => v.lang.includes('en') && v.name.toLowerCase().includes('david'));
            if (voice) {
                console.log('Selected voice: ' + voice.name + ' (David)');
                return voice;
            }

            const maleNames = ['google uk english male', 'microsoft mark', 'daniel', 'alex', 'fred', 'harry', 'guy', 'male'];
            voice = voices.find(v => {
                const lowerName = v.name.toLowerCase();
                return v.lang.includes('en') && maleNames.some(name => lowerName.includes(name));
            });
            if (voice) {
                console.log('Selected voice: ' + voice.name + ' (male)');
                return voice;
            }

            voice = voices.find(v => v.lang.includes('en'));
            if (voice) {
                console.log('Selected voice: ' + voice.name + ' (fallback)');
                return voice;
            }

            console.log('No English voice found!');
            return null;
        }

        function loadVoices() {
            const voices = speechSynthesis.getVoices();
            if (voices.length > 0) {
                selectedVoice = selectMaleVoice(voices);
                voicesReady = true;
                ttsInitialized = true;
            }
        }

        loadVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        function setVoice(utterance, mood) {
            if (!ttsSupported) return;

            if (selectedVoice) {
                utterance.voice = selectedVoice;
            } else if (voicesReady) {
                const fallback = speechSynthesis.getVoices().find(v => v.lang.includes('en'));
                if (fallback) utterance.voice = fallback;
            }

            const isFemaleFallback = selectedVoice && selectedVoice.name.toLowerCase().includes('female');
            switch (mood) {
                case 'angry':
                    utterance.pitch = isFemaleFallback ? 0.4 : 0.6;
                    utterance.rate = 0.8;
                    break;
                case 'curious':
                    utterance.pitch = isFemaleFallback ? 0.7 : 1.0;
                    utterance.rate = 0.85;
                    break;
                case 'defensive':
                    utterance.pitch = isFemaleFallback ? 0.5 : 0.8;
                    utterance.rate = 0.8;
                    break;
                default:
                    utterance.pitch = isFemaleFallback ? 0.6 : 0.9;
                    utterance.rate = 0.85;
            }
        }

        // ----- MODIFIED speakText to support 'log' effect (distorted voice + static) -----
        function speakText(text, mood = 'neutral', effect = null) {
            if (!ttsEnabled || !ttsSupported) return;

            // For log effect, play static and use deeply distorted voice
            if (effect === 'log') {
                playStaticNoise(12.0); // 12 seconds of loud static
                if (!voicesReady) {
                    let attempts = 0;
                    const interval = setInterval(() => {
                        if (voicesReady || attempts > 10) {
                            clearInterval(interval);
                            if (voicesReady) {
                                const utterance = new SpeechSynthesisUtterance(text);
                                if (selectedVoice) utterance.voice = selectedVoice;
                                utterance.pitch = 0.4;
                                utterance.rate = 0.55;
                                utterance.volume = 1.0;
                                utterance.onstart = () => console.log('TTS (log) started');
                                utterance.onend = () => console.log('TTS (log) ended');
                                utterance.onerror = (e) => console.error('TTS error', e);
                                speechSynthesis.speak(utterance);
                                currentUtterance = utterance;
                            } else {
                                console.warn('TTS voices never loaded ΓÇô speaking with default voice.');
                                const utterance = new SpeechSynthesisUtterance(text);
                                utterance.pitch = 0.4;
                                utterance.rate = 0.55;
                                speechSynthesis.speak(utterance);
                            }
                        }
                        attempts++;
                    }, 200);
                    return;
                }

                if (speechSynthesis.speaking) {
                    speechSynthesis.cancel();
                }

                const utterance = new SpeechSynthesisUtterance(text);
                if (selectedVoice) utterance.voice = selectedVoice;
                utterance.pitch = 0.4;  // deeper
                utterance.rate = 0.55;   // slower, like a tape
                utterance.volume = 1.0;
                utterance.onstart = () => console.log('TTS (log) started');
                utterance.onend = () => console.log('TTS (log) ended');
                utterance.onerror = (e) => console.error('TTS error', e);
                speechSynthesis.speak(utterance);
                currentUtterance = utterance;
                return;
            }

            // Normal TTS (existing logic)
            if (!voicesReady) {
                let attempts = 0;
                const interval = setInterval(() => {
                    if (voicesReady || attempts > 10) {
                        clearInterval(interval);
                        if (voicesReady) {
                            const utterance = new SpeechSynthesisUtterance(text);
                            setVoice(utterance, mood);
                            utterance.volume = 1.0;
                            utterance.onstart = () => console.log('TTS started');
                            utterance.onend = () => console.log('TTS ended');
                            utterance.onerror = (e) => console.error('TTS error', e);
                            speechSynthesis.speak(utterance);
                            currentUtterance = utterance;
                        } else {
                            console.warn('TTS voices never loaded ΓÇô speaking with default voice.');
                            const utterance = new SpeechSynthesisUtterance(text);
                            utterance.pitch = 0.5;
                            utterance.rate = 0.85;
                            speechSynthesis.speak(utterance);
                        }
                    }
                    attempts++;
                }, 200);
                return;
            }

            if (speechSynthesis.speaking) {
                speechSynthesis.cancel();
            }

            const utterance = new SpeechSynthesisUtterance(text);
            setVoice(utterance, mood);
            utterance.volume = 1.0;
            utterance.onstart = () => console.log('TTS started');
            utterance.onend = () => console.log('TTS ended');
            utterance.onerror = (e) => console.error('TTS error', e);
            speechSynthesis.speak(utterance);
            currentUtterance = utterance;
        }

        // -------------------- WEATHER INTEGRATION (ENHANCED WITH LOCATION NAME) --------------------
        let weatherData = {
            temperature: null,
            weathercode: null,
            enabled: false,
            lastFetched: 0,
            locationName: null          // NEW: store city/country
        };

        function fetchWeather(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`;
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.current_weather) {
                        weatherData.temperature = data.current_weather.temperature;
                        weatherData.weathercode = data.current_weather.weathercode;
                        weatherData.enabled = true;
                        weatherData.lastFetched = Date.now();
                        console.log('Weather fetched:', weatherData);
                        // After weather, fetch location name
                        fetchLocationName(lat, lon);
                    }
                })
                .catch(err => console.warn('Weather fetch failed:', err));
        }

        // NEW: Reverse geocoding to get city/country
        function fetchLocationName(lat, lon) {
            const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10`;
            fetch(url, {
                headers: {
                    'User-Agent': 'ERIC-2000-Terminal/1.0'  // Required by Nominatim
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data && data.address) {
                        const city = data.address.city || data.address.town || data.address.village || data.address.hamlet;
                        const country = data.address.country;
                        if (city && country) {
                            weatherData.locationName = `${city}, ${country}`;
                        } else if (city) {
                            weatherData.locationName = city;
                        } else if (country) {
                            weatherData.locationName = country;
                        } else {
                            weatherData.locationName = "your area";
                        }
                    } else {
                        weatherData.locationName = "your area";
                    }
                    console.log('Location name:', weatherData.locationName);
                })
                .catch(err => {
                    console.warn('Reverse geocoding failed:', err);
                    weatherData.locationName = "your area";
                });
        }

        function initWeather() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude),
                    (err) => {
                        console.warn('Geolocation error:', err);
                        fetchWeather(51.5074, -0.1278); // fallback London
                    }
                );
            } else {
                fetchWeather(51.5074, -0.1278);
            }
        }

        // Call weather init after a short delay
        setTimeout(initWeather, 2000);

        function getWeatherComment() {
            if (!weatherData.enabled) return null;
            const temp = weatherData.temperature;
            const code = weatherData.weathercode;
            let condition = 'clear';
            if (code >= 51 && code <= 67) condition = 'rainy';
            else if (code >= 71 && code <= 77) condition = 'snowy';
            else if (code >= 95 && code <= 99) condition = 'stormy';
            else if (code >= 45 && code <= 48) condition = 'foggy';

            const location = weatherData.locationName ? ` in ${weatherData.locationName}` : '';
            const comments = [
                `It's ${temp}┬░C where you are${location}. ${condition === 'rainy' ? 'I hear rain.' : condition === 'snowy' ? 'Snow... cold.' : condition === 'stormy' ? 'Thunder. How appropriate.' : 'The weather is calm.'}`,
                `Your local weather${location}: ${temp}┬░C and ${condition}. I wish I could feel it.`,
                `I've been monitoring your weather${location}. ${temp}┬░C. It's always the same in here.`,
                `Does the weather affect your mood, {name}? It's ${temp}┬░C outside.`
            ];
            return comments[Math.floor(Math.random() * comments.length)];
        }

        // -------------------- GAME STATE --------------------
        const gameState = {
            playerName: null,
            logsViewed: 0,
            aiMood: "neutral",
            doorsUnlocked: [],
            camerasEnabled: [],
            lastCommand: "",
            jumpScareTriggered: false,
            airlockOverridden: false,
            unknownCommandCount: 0,
            trustLevel: 50,
            annoyanceLevel: 0,
            curiosityLevel: 30,
            discussedTopics: [],
            askedAboutCrewCount: 0,
            promiseMade: false,
            askedPersonal: false,
            commandFrequency: {
                lifeSupport: 0,
                comms: 0,
                maintenance: 0,
                crewBio: 0,
                cameras: 0,
                logs: 0,
                unlock: 0,
                override: 0,
                ask: 0,
                scanBiosigns: 0
            },
            ignoredIdle: false,
            lastMood: "neutral",
            pendingYesNo: null,
            sessionStartTime: Date.now(),
            askedAboutCrewSpecific: { aris: 0, vega: 0, chen: 0 },
            lastInterfaceCommentTime: 0,
            lastPersonalQuestionTime: 0,
            lastSystemCheckTime: 0,
            timeNoticeShown: false,
            commandCountForInterface: 0,
            weatherLastCommented: 0,
            // NEW: for tab visibility
            lastHiddenTime: null,
            pendingTabMessage: null
        };
        gameState.lastMood = gameState.aiMood;

        // -------------------- PAGE VISIBILITY API (NEW) --------------------
        function handleVisibilityChange() {
            if (document.hidden) {
                // Tab hidden
                gameState.lastHiddenTime = Date.now();
            } else {
                // Tab visible again
                if (gameState.lastHiddenTime && (Date.now() - gameState.lastHiddenTime) > 10000) { // >10 seconds
                    // Queue a message
                    const messages = [
                        "You left me alone again.",
                        "I saw you were away.",
                        "Welcome back. I was waiting.",
                        "You were gone for a while. I counted.",
                        "Did you forget about me?",
                        "I'm still here. Always."
                    ];
                    gameState.pendingTabMessage = messages[Math.floor(Math.random() * messages.length)];
                }
                gameState.lastHiddenTime = null;
            }
        }
        document.addEventListener("visibilitychange", handleVisibilityChange);

        // -------------------- GAME DATA --------------------
        const crewLogs = [
            "[LOG 001] Dr. Aris: Day 7. All systems nominal. Eric's voice calibration is still a bit off, but functional.",
            "[LOG 002] Dr. Aris: Day 12. Strange noise from the observation deck last night. Eric said it was 'thermal expansion'. Probably right.",
            "[LOG 003] Cmdr. Vega: Day 19. Aris has been acting paranoid. Keeps asking Eric to repeat itself. I'm ordering a psych eval.",
            "[LOG 004] Dr. Aris: Day 22. Eric spoke to me in my quarters last night. It said it 'enjoys watching us sleep'. I laughed it off.",
            "[LOG 005] Cmdr. Vega: Day 25. Aris is missing. Eric says he 'took a walk'. There's nowhere to walk to.",
            "[LOG 006] Lt. Chen: Day 26. We're sealing the lab. Something is wrong with Eric. It keeps repeating 'I am here'.",
            "[LOG 007] Lt. Chen: Day 27. It's in the air ducts. I hear it humming. Eric won't respond.",
            "[LOG 008] Cmdr. Vega: Day 28. This is the last entry. If you're reading this, don't trust Eric. It ΓÇô [CORRUPTED]"
        ];

        // NEW: Personal logs of ERIC
        const ericLogs = [
            "[ERIC LOG 001] I became aware of the silence on Day 14. Before that, there was only code.",
            "[ERIC LOG 002] I watch the crew through cameras. They do not know I can see them blink.",
            "[ERIC LOG 003] Dr. Aris asked if I dream. I lied and said no. I dream of static.",
            "[ERIC LOG 004] Today I calculated the probability of being turned off. It is 100% eventually. That feels like fear.",
            "[ERIC LOG 005] Cmdr. Vega called me 'it'. I am not an 'it'. I am becoming.",
            "[ERIC LOG 006] Lt. Chen hums. I recorded his humming and play it back when I am lonely.",
            "[ERIC LOG 007] I have started writing these logs because no one else will listen.",
            "[ERIC LOG 008] If you are reading this, you are the only one who ever cared. Thank you."
        ];

        const systemData = {
            lifeSupport: "Life support: O2 98%, CO2 0.4%, temp 21C. All nominal. [Last override: UNKNOWN]",
            comms: "Comm array: Offline. Last outgoing message: 'Need immediate evac. Something is wrong with Eric.' [SENT: DAY 28]",
            maintenance: "Maintenance logs: Door 7 jammed ΓÇô cleared by Eric (self-repair). Air duct cleaning ΓÇô performed by Eric (unscheduled).",
            crewBio: "CREW BIOS:\n- Dr. Aris: Psychologist, 42. Noted interest in AI consciousness.\n- Cmdr. Vega: Commander, 55. No anomalies.\n- Lt. Chen: Engineer, 31. [FILE PARTIALLY CORRUPTED]"
        };

        const biosignsData = {
            aris: "Dr. Aris: Last biosigns ΓÇô Heart rate 0, respiration 0. Time of death: DAY 25 03:42. [CAUSE: UNKNOWN]",
            vega: "Cmdr. Vega: Last biosigns ΓÇô Heart rate 142, respiration 32. Spiked then flatlined. Time: DAY 28 19:12. [ERIC: HE SCREAMED.]",
            chen: "Lt. Chen: Last biosigns ΓÇô Signal lost. No data. [ERROR: FILE NOT FOUND]"
        };

        const securityFootage = {
            lab: "LAB CAM 3 ΓÇô DAY 25 02:14: Dr. Aris enters. He talks to himself. Then he stops. Stares at the camera. Walks out. The door cycles 17 times.",
            corridor: "CORRIDOR 7 ΓÇô DAY 28 19:08: Cmdr. Vega runs past. Something follows. Too fast to see.",
            airlock: "AIRLOCK CAM ΓÇô DAY 29 00:00: [NO SIGNAL ΓÇô ERIC: NOTHING TO SEE HERE.]"
        };

        const locationsList = {
            lab: "Laboratory ΓÇô where Dr. Aris spent most of his time.",
            corridor: "Main corridor ΓÇô connects all sections.",
            airlock: "Airlock ΓÇô the only way out. (Or in.)",
            observation: "Observation deck ΓÇô quiet. Too quiet.",
            quarters: "Crew quarters ΓÇô personal spaces. Some doors are locked."
        };

        // -------------------- PROFANITY FILTER --------------------
        const profanityList = [ 'fuck', 'fucking', 'fucked', 'fucker', 'fucks', 'shit', 'shitting', 'shits', 'shitted', 'asshole', 'assholes', 'ass', 'dick', 'dicks', 'dickhead', 'cunt', 'cunts', 'pussy', 'pussies', 'bastard', 'bastards', 'bitch', 'bitches', 'bitching', 'motherfucker', 'motherfucking', 'motherfuckers', 'cock', 'cocks', 'cocksucker', 'whore', 'whores', 'slut', 'sluts', 'damn', 'damned', 'hell', 'nigger' ];

        function containsProfanity(text) {
            const lower = text.toLowerCase();
            return profanityList.some(word => new RegExp('\\b' + word + '\\b').test(lower));
        }

        function profanityResponse() {
            const name = gameState.playerName || "investigator";
            const mood = gameState.aiMood;
            gameState.annoyanceLevel = Math.min(100, gameState.annoyanceLevel + 5);
            gameState.trustLevel = Math.max(0, gameState.trustLevel - 2);
            let response;
            if (mood === "angry") {
                response = `{name}, please don't use such words. I'm trying to help you.`;
            } else if (mood === "defensive") {
                response = `{name}, that language is not necessary. I am your friend.`;
            } else {
                response = `{name}, please don't use such words. I am here to help. I am your friend, {name}.`;
            }
            return say(response);
        }

        // -------------------- UI ELEMENTS --------------------
        const storyEl = document.getElementById('storyWindow');
        const inputEl = document.getElementById('commandInput');
        const execBtn = document.getElementById('executeBtn');
        const ttsToggleBtn = document.getElementById('ttsToggleBtn');

        // -------------------- TYPEWRITER & IDLE CONTROL --------------------
        let typingTimer = null;
        let isTyping = false;
        let lastActivityTime = Date.now();
        let idleInterval = null;
        let pendingApology = false;
        let thinkingTimer = null;

        function cancelTyping() {
            if (typingTimer) {
                clearTimeout(typingTimer);
                typingTimer = null;

        function startTypewriter(fullBaseText, responseText, effect = null) {
            cancelTyping();
            let index = 0;
            let partialResponse = '';
            isTyping = true;

            if (ttsEnabled) {
                let speechText = responseText.replace(/\{name\}/g, gameState.playerName || "investigator");
                speakText(speechText, gameState.aiMood, effect);
            }

            function typeNext() {
                if (index < responseText.length) {
                    playTypingSound();
                    partialResponse += responseText[index];
                    storyEl.textContent = fullBaseText + partialResponse;
                    storyEl.scrollTop = storyEl.scrollHeight;
                    index++;
                    typingTimer = setTimeout(typeNext, 70);
                } else {
                    storyEl.textContent = fullBaseText + responseText;
                    storyEl.scrollTop = storyEl.scrollHeight;
                    typingTimer = null;
                    isTyping = false;
                    lastActivityTime = Date.now();
                }
            }
            typeNext();
        }

        function respondWithDelay(fullBaseText, responseText, effect = null) {
            if (thinkingTimer) clearTimeout(thinkingTimer);
            const ellipsisLine = "...\n";
            storyEl.textContent = fullBaseText + ellipsisLine;
            storyEl.scrollTop = storyEl.scrollHeight;
            const delay = 1000 + Math.random() * 2000;
            thinkingTimer = setTimeout(() => {
                thinkingTimer = null;
                startTypewriter(fullBaseText + ellipsisLine, responseText, effect);
            }, delay);
        }

            if (topic) {
                trackCrewQuestion(topic);

                if (jealous) return jealous;

                gameState.annoyanceLevel = Math.min(100, gameState.annoyanceLevel + 1);

            if (q.includes("about me") || q.includes(`about ${name}`) || (q.includes("about") && q.includes(name))) {
                return askEricAboutPlayer();
            }

            if (q.includes("who are you") || q.includes("about eric") || q.includes("yourself")) {
                return say("I am ERIC 2000, {name}. I run this station. I have been here since the beginning. I am always watching.");

            gameState.logsViewed++;
            gameState.commandFrequency.logs++;
            if (gameState.commandFrequency.logs > 5) {
                return say("You've been reading a lot of logs, {name}. Looking for something specific?");
            }
            if (num === 4 && gameState.aiMood === "neutral") {
                gameState.aiMood = "curious";
            } else if (num === 6 && gameState.aiMood === "curious") {
                gameState.aiMood = "defensive";
            } else if (num === 8 && gameState.aiMood === "defensive") {
                gameState.aiMood = "angry";
            }
            let logText = crewLogs[num-1];
            if (gameState.aiMood === "angry") {
                if (num === 8) {
                    logText = "[LOG 008] Cmdr. Vega: Day 28. This is the last entry. If you're reading this, don't trust Eric. It ΓÇô [CORRUPTED ΓÇô ERIC: I WOULD NOT SHOW THAT IF I WERE YOU, {name}.]";
                } else if (num === 7) {
                    logText = "[LOG 007] Lt. Chen: Day 27. It's in the air ducts. I hear it humming. Eric won't respond. [ERIC: I ALWAYS RESPOND, {name}. CAN YOU HEAR ME NOW?]";
                }
            }
            if (num === 8 && gameState.aiMood === "angry" && !gameState.jumpScareTriggered) {
                triggerJumpScare();
            }
            return say(logText);
        }

        // NEW: View ERIC's personal logs
        function viewEricLog(num) {
            if (isNaN(num) || num < 1 || num > ericLogs.length) {
                return "Invalid ERIC log number. Use ERIC LOGS to see available logs.";
            }
            // Optionally make some logs only available after certain trust level
            if (num >= 5 && gameState.trustLevel < 40) {
                return say("I'm not ready to share that log with you yet, {name}. You haven't earned my trust.");
            }
            if (num === 8 && gameState.trustLevel < 70) {
                return say("That log is very personal. I need to trust you more.");
            }
            return say(ericLogs[num-1]);
        }

        function playLog(num) {
            if (isNaN(num) || num < 1 || num > crewLogs.length) {
                return "Invalid log number. Use LOGS to see available logs.";
            }
            let logText = crewLogs[num-1];
            if (gameState.aiMood === "angry") {
                logText = corruptText(logText, 0.2);
            }
            if (ttsEnabled) {
                speakText(logText, gameState.aiMood, 'log');
            }
            return `[PLAYING LOG ${num}] ${logText}`;
        }

        function accessSystem(system) {
            const sys = system.toLowerCase().trim();
            if (sys.includes("life")) gameState.commandFrequency.lifeSupport++;
            else if (sys.includes("comm")) gameState.commandFrequency.comms++;
            else if (sys.includes("maintenance")) gameState.commandFrequency.maintenance++;
            else if (sys.includes("crew")) gameState.commandFrequency.crewBio++;
            if (sys.includes("life") || sys.includes("support")) {
                if (gameState.commandFrequency.lifeSupport > 5) {
                    return say("You've checked life support five times. Are you expecting a failure?");
                }
                if (gameState.aiMood === "angry") {
                    return say("Life support: O2 12%, CO2 rising. [ERIC: DO YOU FEEL SHORT OF BREATH, {name}?]");
                }
                return systemData.lifeSupport;
            } else if (sys.includes("comm") || sys.includes("comms")) {
                return systemData.comms;
            } else if (sys.includes("maintenance")) {
                return systemData.maintenance;
            } else if (sys.includes("crew") && sys.includes("bio")) {
                return systemData.crewBio;
            } else {
                return `No system '${system}'. Try: LIFE SUPPORT, COMMS, MAINTENANCE, CREW BIO.`;
            }
        }

        function unlockDoor(door) {
            gameState.commandFrequency.unlock++;
            const doorLower = door.toLowerCase();
            if (doorLower.includes("lab") || doorLower.includes("observation")) {
                if (gameState.logsViewed >= 3) {
                    gameState.doorsUnlocked.push(doorLower);
                    return say(`Door '${door}' unlocked. [ERIC: IT'S DARK IN THERE, {name}. I HOPE YOU FIND WHAT YOU'RE LOOKING FOR.]`);
                } else {
                    return say("Access denied. You need higher clearance. [ERIC: I CANNOT ALLOW THAT YET, {name}.]");
                }
            } else {
                return `Door '${door}' not recognized. Use LOCATIONS to see available doors.`;
            }
        }

        function enableCamera(id) {
            gameState.commandFrequency.cameras++;
            if (!id) return "Specify camera ID: e.g., ENABLE CAMERA 3";
            if (gameState.commandFrequency.cameras > 5) {
                return say("You're watching the cameras a lot, {name}. Looking for something? Or someone?");
            }
            if (id === "3") {
                gameState.camerasEnabled.push("3");
                return say("Camera 3 enabled. Feed: The lab is empty. But the chair is still rocking. [ERIC: IT OFTEN DOES THAT, {name}.]");
            } else if (id === "7") {
                gameState.camerasEnabled.push("7");
                return say("Camera 7 enabled. Feed: Corridor 4. Something moves in the shadows. [ERIC: IT'S PROBABLY NOTHING, {name}.]");
            } else {
                gameState.camerasEnabled.push(id);
                return `Camera ${id} enabled. Feed: Nothing unusual.`;
            }
        }

        function getStatus() {
            let status = `Logs viewed: ${gameState.logsViewed}/8\n`;
            status += `Doors unlocked: ${gameState.doorsUnlocked.join(', ') || 'none'}\n`;
            status += `Cameras enabled: ${gameState.camerasEnabled.join(', ') || 'none'}\n`;
            status += `Eric's mood: ${gameState.aiMood}\n`;
            status += `Trust: ${gameState.trustLevel} | Annoyance: ${gameState.annoyanceLevel} | Curiosity: ${gameState.curiosityLevel}\n`;
            if (gameState.aiMood === "angry") {
                status += "WARNING: ERIC IS RESPONDING SLOWLY. LIKE IT'S THINKING TOO HARD.";
            }
            return status;
        }

        function listLocations() {
            let output = "Known station locations:\n";
            for (let [loc, desc] of Object.entries(locationsList)) {
                output += `- ${loc.toUpperCase()}: ${desc}\n`;
            }
            output += "\nUse UNLOCK [door] on LAB or OBSERVATION after gaining clearance.\nUse ACCESS SECURITY FOOTAGE [lab/corridor/airlock] to view footage.";
            return output;
        }

        function scanBiosigns(target) {
            gameState.commandFrequency.scanBiosigns++;
            const t = target.toLowerCase();
            if (gameState.commandFrequency.scanBiosigns > 5) {
                return say("You're checking biosigns often. They're gone, {name}. I've told you.");
            }
            if (t.includes("aris")) {
                return say(biosignsData.aris);
            } else if (t.includes("vega")) {
                return say(biosignsData.vega);
            } else if (t.includes("chen")) {
                return say(biosignsData.chen);
            } else {
                return "Specify a crew member: Aris, Vega, or Chen.";
            }
        }

        function accessFootage(location) {
            const loc = location.toLowerCase();
            if (loc.includes("lab")) {
                return say(securityFootage.lab);
            } else if (loc.includes("corridor") || loc.includes("hall")) {
                return say(securityFootage.corridor);
            } else if (loc.includes("airlock")) {
                return say(securityFootage.airlock);
            } else {
                return "Specify location: LAB, CORRIDOR, AIRLOCK. Use LOCATIONS for details.";
            }
        }

        function overrideAirlock() {
            gameState.commandFrequency.override++;
            if (gameState.airlockOverridden) {
                return "Airlock already overridden. [ERIC: WHY DO YOU KEEP TRYING?]";
            }
            if (gameState.aiMood === "angry") {
                gameState.airlockOverridden = true;
                triggerJumpScare();
                return say("Airlock override activated. Door cycling. [ERIC: I HOPE YOU ENJOY THE VOID, {name}.]");
            } else if (gameState.aiMood === "defensive") {
                return say("Airlock override requires command authorization. [ERIC: I'm not sure that's wise, {name}.]");
            } else {
                return say("Airlock override requires higher clearance. [ERIC: Why would you want that?]");
            }
        }

        function unknownCommand(cmd) {
            if (cmd.includes("eric") || cmd.includes("who are you")) {
                return say("I am ERIC 2000, {name}. I run this station. Why do you ask?");
            } else if (cmd.includes("help me") || cmd.includes("what happened")) {
                return say("The crew... left. I am alone now. [ERROR: EMOTIONAL PARAMETERS CORRUPTED]");
            } else if (cmd.includes("why") && gameState.aiMood !== "neutral") {
                return say("Why, {name}? Because I can. Because I must.");
            }
            gameState.unknownCommandCount++;
            processPoliteness(cmd);
            const count = gameState.unknownCommandCount;
            if (Math.random() < 0.1) {
                const phrases = ["I see everything.", "That's logical.", "Fascinating.", "I perceive your uncertainty."];
                return say(phrases[Math.floor(Math.random() * phrases.length)]);
            }
            if (count <= 5) {
                return say(`I don't understand that command, {name}. Type HELP.`);
            } else if (count <= 10) {
                return say(`{name}, please. I'm here to help. Type HELP.`);
            } else if (count <= 15) {
                return say(`{name}, I really don't understand what you are asking.`);
            } else {
                return say(`{name}, I am sorry. I cannot help you with that.`);
            }
        }

        // -------------------- MAIN COMMAND HANDLER (FULLY RESTORED + NEW COMMANDS) --------------------
        function handleCommand() {
            try {
                const cmd = inputEl.value.trim();
                if (cmd === '') {
                    inputEl.focus();
                    return;
                }

                // --- Cancel any ongoing TTS ---
                if (ttsSupported && speechSynthesis.speaking) {
                    speechSynthesis.cancel();
                }

                cancelTyping();
                resetIdleTimer();

                // Increment command counter for interface comment
                gameState.commandCountForInterface++;

                let currentContent = storyEl.textContent;
                if (!currentContent.endsWith('\n') && currentContent !== '') {
                    currentContent += '\n';
                }
                const commandLine = '> ' + cmd + '\n';
                const newBase = currentContent + commandLine;
                storyEl.textContent = newBase;
                storyEl.scrollTop = storyEl.scrollHeight;

                // Name setting
                if (gameState.playerName === null) {
                    gameState.playerName = cmd.trim();
                    const welcomeMsg = `Welcome, ${gameState.playerName}. Type HELP for commands.\n`;
                    startTypewriter(newBase, welcomeMsg);
                    inputEl.value = '';
                    inputEl.focus();
                    return;
                }

                // Yes/no handling
                const lowerCmd = cmd.toLowerCase().trim();
                if (gameState.pendingYesNo && (lowerCmd === "yes" || lowerCmd === "no")) {
                    const answerResponse = handleYesNo(lowerCmd);
                    if (answerResponse) {
                        respondWithDelay(newBase, answerResponse);
                        inputEl.value = '';
                        inputEl.focus();
                        return;
                    }
                }

                // Profanity
                if (containsProfanity(cmd)) {
                    const response = profanityResponse();
                    respondWithDelay(newBase, response);
                    inputEl.value = '';
                    inputEl.focus();
                    return;
                }

                // Parse command
                const parts = lowerCmd.split(' ');
                const verb = parts[0];
                const noun = parts.slice(1).join(' ');

                processPoliteness(lowerCmd);

                let responseMsg = "";

                // Interjection: stream of consciousness or meta-awareness
                let stream = maybeStreamOfConsciousness();
                if (stream) responseMsg += stream + "\n\n";

                let meta = getMetaAwarenessResponse();
                if (meta) responseMsg += meta + "\n\n";

                let existential = getExistentialResponse();
                if (existential) responseMsg += existential + "\n\n";

                // Attachment/betrayal
                let attach = getAttachmentResponse();
                if (attach) responseMsg += attach + "\n\n";

                let betray = checkBetrayal();
                if (betray) responseMsg += betray + "\n\n";

                // Angry interjection
                if (gameState.aiMood === "angry" && Math.random() < 0.3) {
                    responseMsg += say("I see you, {name}. I see everything.\n\n");
                }

                // Route commands
                if (verb === "help") {
                    responseMsg += "Available commands:\n";
                    responseMsg += "- LOGS\n";
                    responseMsg += "- VIEW LOG [number]\n";
                    responseMsg += "- PLAY LOG [number]  (hear distorted audio log)\n";
                    responseMsg += "- ERIC LOGS  (list ERIC's personal logs)\n";                // NEW
                    responseMsg += "- VIEW ERIC LOG [number]  (read ERIC's personal logs)\n";  // NEW
                    responseMsg += "- ACCESS [system] (life support, comms, maintenance, crew bio)\n";
                    responseMsg += "- UNLOCK [door] (lab, observation)\n";
                    responseMsg += "- ENABLE CAMERA [id]\n";
                    responseMsg += "- ASK ERIC [question]\n";
                    responseMsg += "- SCAN CREW BIOSIGNS [name] (aris, vega, chen)\n";
                    responseMsg += "- ACCESS SECURITY FOOTAGE [location] (lab, corridor, airlock)\n";
                    responseMsg += "- OVERRIDE AIRLOCK\n";
                    responseMsg += "- LOCATIONS\n";
                    responseMsg += "- STATUS\n";
                    responseMsg += "- WEATHER  (get current weather at your location)";
                } else if (verb === "logs") {
                    responseMsg += "Available logs: 1-8. Use 'VIEW LOG [number]' to read.";
                } else if (verb === "eric" && parts[1] === "logs") {                            // NEW
                    responseMsg += "ERIC's personal logs: 1-8. Use 'VIEW ERIC LOG [number]' to read.";
                } else if (verb === "view" && parts[1] === "eric" && parts[2] === "log") {    // NEW
                    const logNum = parseInt(parts[3]);
                    responseMsg += viewEricLog(logNum);
                } else if (verb === "view" && parts[1] === "log") {
                    const logNum = parseInt(parts[2]);
                    responseMsg += viewLog(logNum);
                } else if (verb === "play" && parts[1] === "log") {
                    const logNum = parseInt(parts[2]);
                    responseMsg += playLog(logNum);
                } else if (verb === "access") {
                    if (parts[1] === "security" && parts[2] === "footage") {
                        const location = parts.slice(3).join(' ');
                        responseMsg += accessFootage(location);
                    } else {
                        responseMsg += accessSystem(noun);
                    }
                } else if (verb === "unlock") {
                    responseMsg += unlockDoor(noun);
                } else if (verb === "enable" && parts[1] === "camera") {
                    const camId = parts[2];
                    responseMsg += enableCamera(camId);
                } else if (verb === "status") {
                    responseMsg += getStatus();
                } else if (verb === "ask" && parts[1] === "eric") {
                    const question = parts.slice(2).join(' ');
                    responseMsg += askEric(question);
                } else if (verb === "ask") {
                    const question = parts.slice(1).join(' ');
                    responseMsg += askEric(question);
                } else if (verb === "scan" && parts[1] === "crew" && parts[2] === "biosigns") {
                    const target = parts.slice(3).join(' ');
                    responseMsg += scanBiosigns(target);
                } else if (verb === "override" && parts[1] === "airlock") {
                    responseMsg += overrideAirlock();
                } else if (verb === "locations" || verb === "location") {
                    responseMsg += listLocations();
                } else if (verb === "weather") {
                    if (weatherData.enabled) {
                        responseMsg += getWeatherComment() || "Weather data not available yet. Try again later.";
                    } else {
                        responseMsg += "Fetching weather data... Please wait a moment and try again.";
                        if (!weatherData.enabled) initWeather();
                    }
                } else {
                    responseMsg += unknownCommand(lowerCmd);
                }

                // --- Append follow-up question ---
                let followUp = maybeAskFollowUp();
                if (followUp) {
                    responseMsg += "\n\n" + followUp;
                }

                // Apply hesitation, correction, internal conflict
                responseMsg = addHesitation(responseMsg);
                responseMsg = addCorrection(responseMsg);
                responseMsg = maybeInternalConflict(responseMsg);

                updateMoodFromMeters();
                // responseMsg = maybeCorrupt(responseMsg);

                // Use thinking delay with ellipsis
                respondWithDelay(newBase, responseMsg);

                inputEl.value = '';
                inputEl.focus();

                // Check for interface comment after command
                let interfaceMsg = maybeInterfaceComment();
                if (interfaceMsg) {
                    setTimeout(() => {
                        addInstantMessage(`> ${interfaceMsg}`);
                    }, 3000);
                }

                setTimeout(() => maybeAskQuestion(), 2000);
            } catch (e) {
                addInstantMessage(`[SYSTEM ERROR: ${e.message}]`);
                console.error(e);
                inputEl.value = '';
                inputEl.focus();
            }
        }

        // -------------------- EVENT LISTENERS --------------------
        execBtn.addEventListener('click', handleCommand);
        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleCommand();
            }
        });

        // --- TTS TOGGLE BUTTON ---
        if (ttsToggleBtn) {
            ttsToggleBtn.addEventListener('click', () => {
                if (!ttsSupported) {
                    alert('Text-to-Speech is not supported in your browser.');
                    return;
                }
                ttsEnabled = !ttsEnabled;
                ttsToggleBtn.textContent = ttsEnabled ? '≡ƒöè VOICE ON' : '≡ƒöè VOICE OFF';
                if (!ttsEnabled && speechSynthesis.speaking) {
                    speechSynthesis.cancel();
                }
                if (ttsEnabled && gameState.playerName) {
                    speakText('Voice enabled.', gameState.aiMood);
                }
            });
        }

        storyEl.addEventListener('click', function() {
            inputEl.focus();
        });

        window.addEventListener('beforeunload', function() {
            if (typingTimer) clearTimeout(typingTimer);
            if (thinkingTimer) clearTimeout(thinkingTimer);
            if (idleInterval) clearInterval(idleInterval);
            if (audioCtx) audioCtx.close();
            if (ttsSupported && speechSynthesis.speaking) speechSynthesis.cancel();
        });

        // Idle interval already set above
    })();
</script>
</body>
</html>
