<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>THE NOCTURNE THEATER · 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #040308;
            --screen-bg: #08060c;
            --panel-bg: #0a0810;
            --text: #c4bab0;
            --text-dim: #6e5a58;
            --text-bright: #e6d8c4;
            --accent: #8b1a2b;
            --accent-dim: #3e0f18;
            --border: #6b1522;
            --border-glow: 0 0 14px #7b1a2b55, 0 0 32px #3a0a1422;
            --danger: #7b1a2b;
            --danger-glow: 0 0 12px #7b1a2b44;
            --amber: #c4a44a;
            --amber-dim: #5c3d18;
            --gold: #c4a44a;
            --gold-dim: #4a3010;
            --green: #4a7a3a;
            --input-bg: #100e18;
            --button-bg: #14121c;
            --button-hover: #1c1828;
            --button-active: #18101c;
            --bevel-light: #282230;
            --bevel-dark: #040206;
            --font-display: 'Creepster', 'Nosifer', cursive;
            --font-title: 'Nosifer', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.06;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 30px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0f0a14 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }

        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #141114;
            border-radius: 10px;
            padding: 10px;
            box-shadow:
                inset 0 0 0 3px #2a2028,
                0 0 0 4px #0d0a10,
                0 0 0 8px #060408,
                0 8px 48px #000000dd,
                0 0 60px #3a0a1422;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #2a1a24;
        }

        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                max-height: 100dvh;
                box-shadow: none;
                background: #0a060c;
                border: none;
            }
        }

        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #c4a44a;
            border-radius: 50%;
            box-shadow: 0 0 8px #c4a44a88, 0 0 18px #c4a44a33;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #c4a44a88, 0 0 18px #c4a44a33;
            }
            50% {
                box-shadow: 0 0 14px #c4a44abb, 0 0 28px #c4a44a55;
            }
        }

        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #3a2a28;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }

        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #6b1522;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }

        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }

        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, var(--scanline-opacity)) 0px,
                    rgba(0, 0, 0, var(--scanline-opacity)) 2px,
                    transparent 2px,
                    transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }

        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }

        .marquee {
            position: relative;
            z-index: 10;
            background: #0a0408;
            border-bottom: 3px solid #6b1522;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #1a0810;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #8b1a2b;
            border-radius: 2px;
            padding: 10px 14px;
            background: #060208;
            position: relative;
            box-shadow: inset 0 0 24px #5c001111;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #8b1a2b;
            box-shadow: 0 0 12px #7b1a2b88;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #c4a44a44;
            box-shadow: 0 0 8px #c4a44a33;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #d4b898;
            text-shadow: 0 0 16px #8b1a2b88, 0 2px 4px #000, 0 0 40px #5c101888;
            letter-spacing: 3px;
            font-family: var(--font-title);
            line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #7a5a4a;
            letter-spacing: 5px;
            margin-top: 3px;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 20px;
                letter-spacing: 1px;
            }
        }

        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #2a0f18 #08060c;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #08060c;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #2a0f18;
            border-radius: 3px;
        }

        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }

        .btn {
            background: var(--button-bg);
            border: 2px solid #282230;
            border-top-color: #342c3c;
            border-left-color: #302834;
            border-right-color: #1c1824;
            border-bottom-color: #100e18;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #1c1824;
            border-left-color: #1c1824;
            border-bottom-color: #342c3c;
            border-right-color: #302834;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #100e18;
        }
        .btn.accent {
            background: #140a10;
            border-color: #4a1522;
            border-top-color: #6a1a2e;
            border-left-color: #5a1628;
            border-right-color: #2e0f18;
            border-bottom-color: #1a0810;
            color: #d4a898;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #7b1a2b22;
        }
        .btn.accent:active {
            border-top-color: #2e0f18;
            border-left-color: #2e0f18;
            border-bottom-color: #6a1a2e;
            border-right-color: #5a1628;
            box-shadow: 0 0px 0 #00000044, 0 0 16px #7b1a2b44;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .theater-mask {
            position: relative;
            background: #0a0812;
            border: 2px solid #6b152266;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.8);
        }

        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #080610;
            border: 2px solid #2a0f18;
            padding: 15px;
            border-radius: 3px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #8b1a2b;
            box-shadow: 0 0 22px #7b1a2b66, 0 0 0 2px #1a0a10;
            object-fit: cover;
            flex-shrink: 0;
            background: #0a0610;
        }
        .speech-bubble {
            flex: 1;
            background: #100e1a;
            border: 2px solid #8b1a2b88;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #d4bfa8;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #8b1a2b88 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #080610;
            border: 1px solid #2a0f18;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #12101a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6e5a58;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }

        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #8b1a2b44;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #d4b898;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 10px #7b1a2b44;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0c0a14;
            border: 1px solid #1a1420;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #8b1a2b;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #d4b898;
        }
        .guide-desc {
            font-size: 15px;
            color: #6e5a58;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0c0a14;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #8b1a2b;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #c4bab0;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #14121c;
            border: 2px solid #8b1a2b66;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #c4bab0;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #8b1a2b;
            box-shadow: 0 0 14px #7b1a2b44;
        }

        .loading-text {
            color: var(--amber);
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #06040a;
            border-top: 1px solid #8b1a2b44;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #3a2a28;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #4a3830;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #1a1418;
            color: #4a3830;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #3a2a28;
            color: #6e5a58;
        }

        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #d4bfa8;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }

        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }

        @media (max-width: 480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">THE NOCTURNE THEATER · CRT-84</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE NOCTURNE<br>THEATER</div>
                    <div class="marquee-sub">⏤ 1984 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channel3Panel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🎭 THE NOCTURNE THEATER · NOW PLAYING</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('nocturne_theater_key') || '';

            const DEFAULT_STATE = {
                ch3Episodes: [],
                nocturnePerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;',
                '>': '&gt;', "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
                <h2>🎭 Vincent Crowe</h2>
                <p style="text-align:left;">
                    <strong>Show:</strong> <em>The Nocturne Theater</em><br>
                    <strong>Bio:</strong> A classically trained Shakespearean actor who never quite made it, Crowe found his true calling hosting horror anthologies from a crumbling 19th‑century playhouse. Rumour has it the theatre itself is alive – and hungry. Crowe's velvet baritone and unnerving smile make even the stage curtains seem sinister.
                </p>
            `;

            function saveState() {
                try { localStorage.setItem('nocturne_theater_state', JSON.stringify(gameState)); } catch (e) {}
            }

            function loadState() {
                try {
                    const saved = localStorage.getItem('nocturne_theater_state');
                    if (saved) gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
                    gameState.ch3Episodes = gameState.ch3Episodes || [];
                    gameState.nocturnePerformance = gameState.nocturnePerformance || null;
                } catch (e) {}
            }

            async function mistralChat(msgs, maxTok = 500) {
                if (!apiKey) throw new Error('API key missing');
                const res = await fetch(MISTRAL_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                    body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9, max_tokens: maxTok })
                });
                if (!res.ok) throw new Error('API error ' + res.status + ': ' + (await res.text()));
                const data = await res.json();
                return data.choices[0].message.content.trim();
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s horror VHS, dark theatrical style, grainy film')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => {
                        if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); }
                    }, 15000);
                    img.onload = () => {
                        if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); }
                    };
                    img.onerror = () => {
                        if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); }
                    };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try {
                        const url = await generateImage(prompt);
                        return url;
                    } catch (e) {
                        lastError = e;
                        await new Promise(r => setTimeout(r, 20));
                    }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            i++;
                        } else {
                            clearInterval(timer);
                            resolve();
                        }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = [
                    'Google UK English Male', 'Google US English Male', 'Daniel',
                    'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                ];
                let voice = null;
                for (const name of maleNames) {
                    voice = voices.find(v => v.name.includes(name));
                    if (voice) break;
                }
                if (!voice) {
                    voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                }
                if (voice) utterance.voice = voice;
                utterance.rate = 0.88;
                utterance.pitch = 0.92;
                speechSynthesis.speak(utterance);
            }

            function showModal(html) {
                document.getElementById('genericModalContent').innerHTML = html;
                document.getElementById('genericModal').style.display = 'flex';
            }

            function closeModal() {
                document.getElementById('genericModal').style.display = 'none';
                speechSynthesis.cancel();
            }
            window.closeModal = closeModal;

            // ═══════════════════════════════════════════
            // THE NOCTURNE THEATER (CHANNEL 3)
            // ═══════════════════════════════════════════

            function renderChannel3() {
                const panel = document.getElementById('channel3Panel');
                if (!panel) return;

                const hostPortrait = '';

                panel.innerHTML = `
                    <div class="tv-stage theater-mask">
                        <div class="tv-stage-row">
                            <img class="host-portrait" src="${hostPortrait}" alt="Vincent Crowe" style="object-fit:cover;">
                            <div class="speech-bubble" id="ch3SpeechBubble">
                                <img id="ch3SegmentImage" class="segment-image" alt="Story Poster">
                                <div class="segment-text" id="ch3Dialogue">
                                    "Good evening, creatures of the night. I am Vincent Crowe, your master of ceremonies. The stage is set, the curtains yearn to part. Shall we begin tonight's tale of terror?"
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tv-guide">
                        <h3>🎭 THE NOCTURNE THEATER · TONIGHT'S PERFORMANCE</h3>
                        <div id="ch3GuideList"></div>
                    </div>
                `;

                const guideList = document.getElementById('ch3GuideList');
                const episodes = gameState.ch3Episodes || [];

                episodes.forEach((ep, index) => {
                    const entry = document.createElement('div');
                    entry.className = 'guide-entry';
                    entry.innerHTML = `
                        <span class="guide-time">SAVED</span>
                        ${ep.imageUrl ? `<img src="${esc(ep.imageUrl)}" style="width:50px; height:50px; object-fit:cover; border-radius:2px; margin-right:8px; flex-shrink:0;" alt="Poster">` : ''}
                        <div class="guide-info">
                            <div class="guide-title">"${esc(ep.title)}"</div>
                            <div class="guide-desc">A tale of suspense, ready to unfold.</div>
                        </div>
                        <button class="btn guide-btn perform-saved-btn" data-index="${index}">🎬 Perform</button>
                    `;
                    guideList.appendChild(entry);
                });

                const newBtn = document.createElement('button');
                newBtn.className = 'btn accent';
                newBtn.style.marginTop = '12px';
                newBtn.style.width = '100%';
                newBtn.textContent = '🎭 New Performance';
                newBtn.addEventListener('click', async () => {
                    newBtn.disabled = true;
                    newBtn.textContent = '🕯️ Commissioning Tale…';
                    try {
                        await generateAndPerform();
                    } catch (e) {
                        showModal(
                            `<h2>🎭 Curtain Stuck</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                            );
                        newBtn.disabled = false;
                        newBtn.textContent = '🎭 New Performance';
                    }
                });
                guideList.appendChild(newBtn);

                document.querySelectorAll('.perform-saved-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const index = parseInt(btn.dataset.index);
                        const ep = gameState.ch3Episodes[index];
                        if (!ep) return;
                        gameState.nocturnePerformance = { ...ep };
                        saveState();
                        await startNocturnePerformance();
                    });
                });
            }

            async function generateNewNocturneStory() {
                const system =
                    `You are Vincent Crowe, the sardonic, cynical host of The Nocturne Theater. You narrate grim, literary horror stories to your listeners, unflinching, visceral, and grounded in human depravity.`;

                const prompt =
                    `Write a 500 to 750 word short horror story set in the 1980s for tonight's performance. Use tight third-person prose. No sound cues, no radio script, just pure narrative. Strict rules: no supernatural elements like ghosts, curses, magic, or dreams. The horror must be purely human, focusing on sadism, graphic violence, and psychosexual obsession. Pick one sin: Greed, Pride, Vanity, or Envy. Follow this exact structure: a mundane setup, then a grounded non-magical scheme, then a brutal unflinching execution, and finally an ironic visceral twist where the protagonist's victory becomes a physical or psychological prison such as rot, mutilation, or paranoid collapse. The twist must be realistic and earned. No dream cop-outs or easy escapes. Frame the story with Vincent's sardonic intro addressing the chosen sin, and close with his cold cynical punchline. Make it sick, twisted, and unflinching. X-rated themes are allowed. Return ONLY a valid JSON object with these fields: title (string), story (full narration string, use backslash n for line breaks), closing_remark (the chilling sign-off phrase). Output raw JSON only, no markdown.`;

                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: prompt }
                ], 2000);

                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);

                if (!story.title || !story.story || !story.closing_remark) {
                    throw new Error('Invalid story structure – missing title, story, or closing_remark');
                }

                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Horror movie poster for a story titled "${story.title}", 1980s VHS style, dark and moody, cinematic, grainy`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) {
                    console.warn('Could not generate story poster:', e);
                }

                gameState.nocturnePerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || ''
                };
                saveState();
            }

            async function generateAndPerform() {
                await generateNewNocturneStory();
                if (!gameState.nocturnePerformance) throw new Error('Failed to generate story');
                await startNocturnePerformance();
            }

            async function startNocturnePerformance() {
                speechSynthesis.cancel();
                if (window.ch3Timeout) clearTimeout(window.ch3Timeout);

                const storyData = gameState.nocturnePerformance;
                if (!storyData || !storyData.story) {
                    await generateNewNocturneStory();
                    return startNocturnePerformance();
                }

                const bubble = document.getElementById('ch3SpeechBubble');
                const dialogue = document.getElementById('ch3Dialogue');
                const imageEl = document.getElementById('ch3SegmentImage');
                if (!bubble || !dialogue) return;

                const guideList = document.getElementById('ch3GuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#8b1a2b';
                bubble.style.boxShadow = '0 0 30px #7b1a2b88';

                dialogue.innerHTML = '';
                const oldBack = document.getElementById('ch3BackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('ch3AddEpisodeBtn');
                if (oldAdd) oldAdd.remove();

                if (imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                } else if (imageEl) {
                    imageEl.style.display = 'none';
                }

                const intro =
                    `"Good evening… I am Vincent Crowe. Tonight, I invite you to draw closer to the footlights. Let the velvet shadows embrace you. I present to you… '${storyData.title}'."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 35);
                await new Promise(r => setTimeout(r, 1500));

                dialogue.textContent = '';
                speakTextMale(storyData.story);
                await typewriterEffect(dialogue, storyData.story, 22);

                await new Promise(r => setTimeout(r, 1200));
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#d4bfa8';
                dialogue.appendChild(closingLine);
                speakTextMale(closing);
                await typewriterEffect(closingLine, closing, 30);

                await new Promise(r => setTimeout(r, 1000));
                const curtainText = document.createElement('p');
                curtainText.textContent = '— Curtain falls —';
                curtainText.style.color = '#6e5a58';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);

                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';

                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Leave the Theater';
                leaveBtn.addEventListener('click', () => {
                    leaveTheater();
                });
                btnRow.appendChild(leaveBtn);

                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'ch3AddEpisodeBtn';
                addBtn.textContent = '➕ Add Episode';
                addBtn.addEventListener('click', () => {
                    addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Added';
                });
                btnRow.appendChild(addBtn);

                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.nocturnePerformance;
                if (!perf) return;
                gameState.ch3Episodes.push({ ...perf });
                saveState();
                setTimeout(() => leaveTheater(), 600);
            }

            function leaveTheater() {
                renderChannel3();
            }

            // ═══════════════════════════════════════════
            // INITIALIZATION
            // ═══════════════════════════════════════════

            function init() {
                loadState();
                renderChannel3();

                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('nocturne_theater_key', key);
                    }
                });

                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });

                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) {
                        showModal(HOST_BIO);
                    }
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeModal();
                });

                if (!apiKey) {
                    setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                }
            }

            init();
        })();
    </script>
</body>
</html>
