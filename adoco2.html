<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>NIGHTFALLS AM · 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080c;
            --screen-bg: #0c0c10;
            --panel-bg: #0e0e16;
            --text: #c8c8c8;
            --text-dim: #7a7a7a;
            --text-bright: #f0ece4;
            --accent: #ff2a4a;
            --accent-dim: #99111f;
            --border: #ff2a4a;
            --border-glow: 0 0 12px #ff003c66, 0 0 28px #ff003c22;
            --danger: #e82233;
            --danger-glow: 0 0 10px #e8223344;
            --amber: #ffaa22;
            --amber-dim: #885500;
            --green: #33cc55;
            --input-bg: #16161e;
            --button-bg: #1a1a20;
            --button-hover: #24202c;
            --button-active: #2a1018;
            --bevel-light: #2a2a35;
            --bevel-dark: #060608;
            --font-display: 'Creepster', 'Nosifer', cursive;
            --font-title: 'Nosifer', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --font-body: 'VT323', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 32px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0d0d18 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }

        .monitor-bezel {
            width: 100%;
            max-width: 520px;
            height: 100vh;
            height: 100dvh;
            max-height: 900px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2a2a2a, 0 0 0 4px #111111, 0 0 0 8px #0a0a0a, 0 8px 40px #000000cc;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (max-width: 520px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                max-height: 100dvh;
                box-shadow: none;
                background: #0a0a0a;
            }
        }

        .power-led {
            position: absolute;
            bottom: 16px;
            right: 20px;
            width: 8px;
            height: 8px;
            background: #33ff44;
            border-radius: 50%;
            box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433;
            animation: powerGlow 2s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%, 100% { box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433; }
            50% { box-shadow: 0 0 14px #33ff44aa, 0 0 24px #33ff4455; }
        }

        .brand-label {
            position: absolute;
            bottom: 14px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #333;
            letter-spacing: 2px;
            z-index: 20;
            text-transform: uppercase;
        }

        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 4px;
            border: 3px solid #ff2a4a;
            box-shadow: var(--border-glow), inset 0 0 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 520px) { .game-shell { border-radius: 0; border-width: 2px; } }

        .screen-curve {
            position: absolute; inset: 0; pointer-events: none; z-index: 899;
            border-radius: 2px; box-shadow: inset 0 0 60px rgba(0,0,0,0.7), inset 0 0 10px rgba(0,0,0,0.5);
        }

        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,var(--scanline-opacity)) 0px, rgba(0,0,0,var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 2px;
        }
        .crt-overlay::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%); border-radius: 2px;
        }

        .screen-flicker { animation: crtFlicker 8s ease-in-out infinite; }
        @keyframes crtFlicker { 0%,99.4%,100%{opacity:1;} 99.5%{opacity:0.6;} 99.6%{opacity:0.9;} 99.7%{opacity:0.5;} 99.8%{opacity:1;} }

        .marquee {
            position: relative; z-index: 10; background: #0c0406; border-bottom: 3px solid #ff2a4a;
            padding: 10px 16px; text-align: center; font-family: var(--font-display); letter-spacing: 2px;
            box-shadow: 0 2px 16px #00000088, inset 0 1px 0 #2a0c0c; flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #ff2a4a; border-radius: 3px; padding: 10px 14px; background: #080206;
            position: relative; box-shadow: inset 0 0 20px #ff003c11;
        }
        .marquee-inner::before {
            content: ''; position: absolute; top: -2px; left: 20px; right: 20px; height: 2px;
            background: #ff2a4a; box-shadow: 0 0 10px #c41e3a66;
        }
        .marquee-title {
            font-size: var(--text-size-title); color: #e8c5b0; text-shadow: 0 0 14px #c41e3a88, 0 2px 4px #000;
            letter-spacing: 3px; font-family: var(--font-title); line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #7a6a6a;
            letter-spacing: 4px;
            margin-top: 2px;
        }
        @media (max-width: 400px) { .marquee-title { font-size: 22px; letter-spacing: 1px; } }

        .tabs-row {
            display: flex; background: #08080e; border-bottom: 2px solid #ff2a4a; z-index: 10;
            flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; gap: 0;
        }
        .tabs-row::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 1 0 auto; min-width: 60px; text-align: center; padding: 8px 4px;
            font-family: var(--font-body); font-size: 13px; color: #b08080; cursor: pointer;
            border-bottom: 4px solid transparent; background: transparent; white-space: nowrap;
            letter-spacing: 1px; transition: all 0.15s; min-height: var(--btn-min-height);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 2px; line-height: 1.2;
        }
        .tab-btn.active { color: #f0ddd0; border-bottom-color: #ff2a4a; text-shadow: 0 0 10px #c41e3a88; background: #0c0610; box-shadow: inset 0 -4px 12px #ff003c18; }
        .tab-btn:hover { color: #d4b8a8; background: #0a0810; }
        .tab-emoji { font-size: 16px; line-height: 1; }
        .tab-label { font-size: 11px; line-height: 1.2; }

        .game-area {
            flex: 1; overflow-y: auto; overflow-x: hidden; z-index: 5; scrollbar-width: thin;
            scrollbar-color: #2a0f15 #08080e; display: flex; flex-direction: column; padding: 4px 0;
        }
        .game-area::-webkit-scrollbar { width: 5px; } .game-area::-webkit-scrollbar-track { background: #08080e; } .game-area::-webkit-scrollbar-thumb { background: #2a0f15; border-radius: 3px; }

        .panel { display: none; flex-direction: column; padding: 10px; gap: 10px; flex: 1; }
        .panel.active { display: flex; }

        .btn {
            background: var(--button-bg); border: 2px solid #2a2a35; border-top-color: #3a3a48; border-left-color: #353540;
            border-right-color: #1a1a25; border-bottom-color: #111118; padding: 12px 18px; border-radius: 3px;
            color: var(--text); cursor: pointer; font-family: var(--font-body); font-size: var(--text-size-base);
            letter-spacing: 1px; text-transform: uppercase; transition: all 0.1s; min-height: var(--btn-min-height);
            display: inline-flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 2px 0 #00000044; white-space: nowrap;
        }
        .btn:active { border-top-color: #1a1a25; border-left-color: #1a1a25; border-bottom-color: #3a3a48; border-right-color: #353540; box-shadow: 0 0px 0 #00000044; transform: translateY(1px); background: #14141c; }
        .btn.accent { background: #180a10; border-color: #5c1525; border-top-color: #7a2035; border-left-color: #6a1a2a; border-right-color: #3a0f18; border-bottom-color: #200810; color: #e8a090; box-shadow: 0 2px 0 #00000044, 0 0 8px #c41e3a22; }
        .btn.accent:active { border-top-color: #3a0f18; border-left-color: #3a0f18; border-bottom-color: #7a2035; border-right-color: #6a1a2a; box-shadow: 0 0px 0 #00000044, 0 0 14px #c41e3a44; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
/* Nocturne Theater specific */
.theater-mask {
    position: relative;
    background: #0c0c14;
    border: 2px solid #c41e3a66;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
}
.curtain-left, .curtain-right {
    display: none; /* purely textual for now, but you could add curtain images later */
}

        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0a0a14;
            border: 2px solid #2a0f15;
            padding: 15px;
            border-radius: 4px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ff2a4a;
            box-shadow: 0 0 20px #c41e3a66;
            object-fit: cover;
            flex-shrink: 0;
        }
        .speech-bubble {
            flex: 1;
            background: #12121c;
            border: 2px solid #ff2a4a88;
            border-radius: 8px;
            padding: 12px;
            position: relative;
            color: #e8c5b0;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #ff2a4a88 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 4px;
            max-height: 200px;
            object-fit: cover;
            background: #0a0a12;
            border: 1px solid #2a0f15;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #16161e;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a6a6a;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
        }

        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #ff2a4a44;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #e8c5b0;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0e0e16;
            border: 1px solid #1a1520;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #c41e3a;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #e8c5b0;
        }
        .guide-desc {
            font-size: 15px;
            color: #7a6a6a;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0e0e16;
            border-radius: 6px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #ff2a4a;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #d4c5b2;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #1a1a20;
            border: 2px solid #ff2a4a66;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #d4c5b2;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #ff003c;
            box-shadow: 0 0 12px #c41e3a44;
        }

        .loading-text { color: var(--amber); font-style: italic; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #08080e;
            border-top: 1px solid #ff2a4a66;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #444;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #555;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #222;
            color: #555;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #444;
            color: #888;
        }

        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #e8c5b0;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }

        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }

        @media (max-width: 480px) {
            .tv-stage-row { flex-direction: column; align-items: center; }
            .speech-bubble::before { display: none; }
            .host-portrait { width: 80px; height: 80px; }
            .guide-entry { flex-direction: column; align-items: stretch; }
            .guide-time { text-align: left; }
            .segment-image { max-height: 150px; }
        }

        .chat-log {
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 10px;
            border: 1px solid #1a1520;
            border-radius: 4px;
            padding: 10px;
            background: #0a0a12;
            font-size: var(--text-size-base);
            line-height: 1.5;
        }
        .chat-msg { margin: 8px 0; font-size: 16px; line-height: 1.4; }
        .chat-msg.user { color: #e8a090; }
        .chat-msg.assistant { color: #d4c5b2; }
        .chat-input-row {
            display: flex;
            gap: 8px;
        }
        .chat-input-row input {
            flex: 1;
            background: var(--input-bg);
            border: 2px solid #2a2a35;
            border-radius: 3px;
            padding: 10px 12px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            min-height: var(--btn-min-height);
            -webkit-user-select: text;
            user-select: text;
        }
    </style>
</head>

<div class="monitor-bezel">
    <div class="brand-label">NIGHTFALLS AM · CRT-84</div>
    <div class="power-led"></div>
    <div class="game-shell screen-flicker">
        <div class="screen-curve"></div>
        <div class="crt-overlay"></div>
        <div class="marquee">
            <div class="marquee-inner">
                <div class="marquee-title">NIGHTFALLS AM</div>
                <div class="marquee-sub">⏤ 1984 ⏤</div>
            </div>
        </div>
        <div class="tabs-row">
            <div class="tab-btn active" data-tab="channel1"><span class="tab-emoji">🛸</span><span class="tab-label">CH 1</span></div>
            <div class="tab-btn" data-tab="channel2"><span class="tab-emoji">📡</span><span class="tab-label">CH 2</span></div>
<div class="tab-btn" data-tab="channel3"><span class="tab-emoji">🎭</span><span class="tab-label">CH 3</span></div>
<div class="tab-btn" data-tab="channel4"><span class="tab-emoji">⛪</span><span class="tab-label">CH 4</span></div>
        </div>
        <div class="game-area">
            <div id="channel1Panel" class="panel active"></div>
            <div id="channel2Panel" class="panel"></div>
<div id="channel3Panel" class="panel"></div>
<div id="channel4Panel" class="panel"></div>
        </div>
        <div class="footer-strip">
            <span id="footerMsg">📡 NIGHTFALLS AM · TUNE IN TO CHANNEL 1 OR 2</span>
            <button id="resetApiBtn">🔑 API KEY</button>
        </div>
    </div>
</div>
<div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

<script>
(function() {
    const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
    const MODEL = 'mistral-small-latest';
    let apiKey = localStorage.getItem('nightfalls_am_key') || '';

    const DEFAULT_STATE = {
        ch1Episodes: [],
        geheimeWaffenTopic: null,
        imageCooldownUntil: 0,
        ch12Episodes: [],
        ch4Episodes: [],
        // ── CHANNEL 3 (Nocturne Theater) ──
        ch3Episodes: [],                // saved episodes
        nocturnePerformance: null,      // the story currently being performed (not saved yet)
    };
    let gameState = { ...DEFAULT_STATE };

    const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[m]);

const HOST_BIOS = {
    channel1: `
        <h2>🛸 Oberst Klaus Schreiber</h2>
        <p style="text-align:left;">
            <strong>Show:</strong> <em>The Hidden Reich</em><br>
            <strong>Bio:</strong> Former Bundeswehr intelligence analyst, discharged under mysterious circumstances in 1979. Schreiber now hosts the most controversial documentary series on late‑night television, unearthing suppressed Nazi weapons projects the world would rather forget. His monotone delivery and unsettling calm have earned him both a cult following and several libel suits.
        </p>
    `,
    channel2: `
        <h2>📡 Chuck Blastov</h2>
        <p style="text-align:left;">
            <strong>Show:</strong> <em>Signal 12 News</em><br>
            <strong>Bio:</strong> Chuck Blastov is not entirely sure how he got here. He claims to have fallen through a static discharge in a public‑access TV studio in 1983 and woken up in the phantom zone. Since then, he’s been broadcasting deadpan absurdities to whatever dimension will listen. His co‑anchor disappeared during a segment on haunted Tupperware. Chuck carries on regardless.
        </p>
    `,
    channel3: `
        <h2>🎭 Vincent Crowe</h2>
        <p style="text-align:left;">
            <strong>Show:</strong> <em>The Nocturne Theater</em><br>
            <strong>Bio:</strong> A classically trained Shakespearean actor who never quite made it, Crowe found his true calling hosting horror anthologies from a crumbling 19th‑century playhouse. Rumour has it the theatre itself is alive – and hungry. Crowe’s velvet baritone and unnerving smile make even the stage curtains seem sinister.
        </p>
    `,
    channel4: `
        <h2>⛪ Father Malcolm Mire</h2>
        <p style="text-align:left;">
            <strong>Show:</strong> <em>The Midnight Confessional</em><br>
            <strong>Bio:</strong> Defrocked, dishevelled, and possibly damned. Father Mire once served a respectable diocese before a scandal involving a ouija board and a haunted confessional got him exiled to late‑night radio. He now offers dubious absolution to insomniacs, sinners, and anyone who can stomach his twisted brand of salvation.
        </p>
    `
};

    function saveState() {
        try { localStorage.setItem('nightfalls_am_state', JSON.stringify(gameState)); } catch(e) {}
    }
    function loadState() {
        try {
            const saved = localStorage.getItem('nightfalls_am_state');
            if (saved) gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
            // Ensure new properties exist even if they weren't in the saved state
            gameState.ch3Episodes = gameState.ch3Episodes || [];
            gameState.nocturnePerformance = gameState.nocturnePerformance || null;
        } catch(e) {}
    }

    async function mistralChat(msgs, maxTok = 500) {
        if (!apiKey) throw new Error('API key missing');
        const res = await fetch(MISTRAL_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
            body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9, max_tokens: maxTok })
        });
        if (!res.ok) throw new Error('API error ' + res.status + ': ' + (await res.text()));
        const data = await res.json();
        return data.choices[0].message.content.trim();
    }

    // ──── Image generation with timeout ────
    async function generateImage(prompt) {
        const now = Date.now();
        if (now < gameState.imageCooldownUntil) {
            await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
        }
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s documentary VHS, dark archive style')}?width=512&height=640&seed=${Date.now()}`;
        return new Promise((resolve, reject) => {
            const img = new Image();
            let resolved = false;
            const timeout = setTimeout(() => {
                if (!resolved) {
                    resolved = true;
                    reject(new Error('Image load timeout'));
                }
            }, 15000);
            img.onload = () => {
                if (!resolved) {
                    resolved = true;
                    clearTimeout(timeout);
                    resolve(url);
                }
            };
            img.onerror = () => {
                if (!resolved) {
                    resolved = true;
                    clearTimeout(timeout);
                    reject(new Error('Image load error'));
                }
            };
            img.src = url;
        });
    }

    async function generateImageWithRetry(prompt, retries = 2) {
        let lastError = null;
        for (let i = 0; i < retries; i++) {
            try {
                const url = await generateImage(prompt);
                return url;
            } catch (e) {
                lastError = e;
                await new Promise(r => setTimeout(r, 20));
            }
        }
        throw lastError || new Error('Image generation failed');
    }

    // ──── Typewriter effect ────
    function typewriterEffect(element, text, speed) {
        return new Promise((resolve) => {
            let i = 0;
            element.textContent = '';
            const timer = setInterval(() => {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    resolve();
                }
            }, speed);
        });
    }

    // ──── Speech helper ────
    function speakTextMale(text) {
        if (!text) return;
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = speechSynthesis.getVoices();
        const maleNames = [
            'Google UK English Male',
            'Google US English Male',
            'Daniel',
            'Microsoft David',
            'Fred',
            'Alex',
            'Thomas',
            'James'
        ];
        let voice = null;
        for (const name of maleNames) {
            voice = voices.find(v => v.name.includes(name));
            if (voice) break;
        }
        if (!voice) {
            voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
        }
        if (voice) utterance.voice = voice;
        utterance.rate = 0.9;
        utterance.pitch = 0.95;
        speechSynthesis.speak(utterance);
    }

async function generateNewNocturneStory() {
    const system = `You are Vincent Crowe, the sardonic, cynical host of The Nocturne Theater. You narrate grim, literary horror stories to your listeners, unflinching, visceral, and grounded in human depravity.`;

    const prompt = `Write a 500 to 750 word short horror story set in the 1980s for tonight's performance. Use tight third-person prose. No sound cues, no radio script, just pure narrative. Strict rules: no supernatural elements like ghosts, curses, magic, or dreams. The horror must be purely human, focusing on sadism, graphic violence, and psychosexual obsession. Pick one sin: Greed, Pride, Vanity, or Envy. Follow this exact structure: a mundane setup, then a grounded non-magical scheme, then a brutal unflinching execution, and finally an ironic visceral twist where the protagonists victory becomes a physical or psychological prison such as rot, mutilation, or paranoid collapse. The twist must be realistic and earned. No dream cop-outs or easy escapes. Frame the story with Vincents sardonic intro addressing the chosen sin, and close with his cold cynical punchline. Make it sick, twisted, and unflinching. X-rated themes are allowed. Return ONLY a valid JSON object with these fields: title (string), story (full narration string, use backslash n for line breaks), closing_remark (the chilling sign-off phrase). Output raw JSON only, no markdown.`;

    const resp = await mistralChat([
        { role: 'system', content: system },
        { role: 'user', content: prompt }
    ], 2000);

    let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
    const story = JSON.parse(jsonStr);

    if (!story.title || !story.story || !story.closing_remark) {
        throw new Error('Invalid story structure – missing title, story, or closing_remark');
    }

    // ---- NEW: generate a poster image for the story ----
    let imageUrl = null;
    try {
        const imagePrompt = `Horror movie poster for a story titled "${story.title}", 1980s VHS style, dark and moody, cinematic, grainy`;
        imageUrl = await generateImageWithRetry(imagePrompt, 2);
    } catch (e) {
        console.warn('Could not generate story poster:', e);
    }

    gameState.nocturnePerformance = {
        title: story.title,
        story: story.story,
        closing_remark: story.closing_remark,
        imageUrl: imageUrl || ''   // store the URL (empty string if failed)
    };
    saveState();
}
async function generateAndPerform() {
    await generateNewNocturneStory(); // sets gameState.nocturnePerformance
    if (!gameState.nocturnePerformance) throw new Error('Failed to generate story');
    await startNocturnePerformance();
}

async function startNocturnePerformance() {
    speechSynthesis.cancel();
    if (window.ch3Timeout) clearTimeout(window.ch3Timeout);

    const storyData = gameState.nocturnePerformance;
    if (!storyData || !storyData.story) {
        await generateNewNocturneStory();
        return startNocturnePerformance();
    }

    const bubble = document.getElementById('ch3SpeechBubble');
    const dialogue = document.getElementById('ch3Dialogue');
    const imageEl = document.getElementById('ch3SegmentImage');
    if (!bubble || !dialogue) return;

    const guideList = document.getElementById('ch3GuideList');
    if (guideList) guideList.style.display = 'none';
    bubble.style.borderColor = '#c41e3a';
    bubble.style.boxShadow = '0 0 30px #c41e3a88';

    dialogue.innerHTML = '';
    const oldBack = document.getElementById('ch3BackBtn');
    if (oldBack) oldBack.remove();
    const oldAdd = document.getElementById('ch3AddEpisodeBtn');
    if (oldAdd) oldAdd.remove();

    // Show the poster image if available
    if (imageEl && storyData.imageUrl) {
        imageEl.src = storyData.imageUrl;
        imageEl.classList.add('visible');
        imageEl.style.display = 'block';
    } else if (imageEl) {
        imageEl.style.display = 'none';
    }

    // 1. Vincent's intro
    const intro = `"Good evening… I am Vincent Crowe. Tonight, I invite you to draw closer to the footlights. Let the velvet shadows embrace you. I present to you… '${storyData.title}'."`;
    dialogue.textContent = '';
    speakTextMale(intro);
    await typewriterEffect(dialogue, intro, 35);
    await new Promise(r => setTimeout(r, 1500));

    // 2. The story itself
    dialogue.textContent = '';
    speakTextMale(storyData.story);
    await typewriterEffect(dialogue, storyData.story, 22);

    // 3. Closing remark
    await new Promise(r => setTimeout(r, 1200));
    const closing = `"${storyData.closing_remark}"`;
    const closingLine = document.createElement('p');
    closingLine.style.marginTop = '16px';
    closingLine.style.fontStyle = 'italic';
    closingLine.style.color = '#e8c5b0';
    dialogue.appendChild(closingLine);
    speakTextMale(closing);
    await typewriterEffect(closingLine, closing, 30);

    // 4. Curtain falls
    await new Promise(r => setTimeout(r, 1000));
    const curtainText = document.createElement('p');
    curtainText.textContent = '— Curtain falls —';
    curtainText.style.color = '#7a6a6a';
    curtainText.style.fontSize = '14px';
    dialogue.appendChild(curtainText);

    // 5. Button row: Leave Theater + Add Episode
    const btnRow = document.createElement('div');
    btnRow.style.marginTop = '12px';
    btnRow.style.display = 'flex';
    btnRow.style.gap = '8px';
    btnRow.style.justifyContent = 'flex-end';

    const leaveBtn = document.createElement('button');
    leaveBtn.className = 'btn back-btn';
    leaveBtn.textContent = '← Leave the Theater';
    leaveBtn.addEventListener('click', () => {
        leaveTheater();
    });
    btnRow.appendChild(leaveBtn);

    const addBtn = document.createElement('button');
    addBtn.className = 'btn accent';
    addBtn.id = 'ch3AddEpisodeBtn';
    addBtn.textContent = '➕ Add Episode';
    addBtn.addEventListener('click', () => {
        addCurrentEpisode();
        addBtn.disabled = true;
        addBtn.textContent = '✓ Added';
    });
    btnRow.appendChild(addBtn);

    dialogue.appendChild(btnRow);
}
function addCurrentEpisode() {
    const perf = gameState.nocturnePerformance;

    gameState.ch3Episodes.push({ ...perf });

}

    renderChannel3();
}

function restoreCh4Guide() {
    const guideList = document.getElementById('ch4GuideList');
    if (guideList) guideList.style.display = '';
    const bubble = document.getElementById('ch4SpeechBubble');
    if (bubble) {
        bubble.style.borderColor = '#ff2a4a88';
        bubble.style.boxShadow = 'none';
    }
    const backBtn = document.getElementById('ch4BackBtn');
    if (backBtn) backBtn.remove();
    const dialogue = document.getElementById('ch4Dialogue');
    if (dialogue) {
        dialogue.innerHTML = '"Welcome, lost lambs. I am Father Malcolm Mire — disgraced, dishevelled, but still listening. Pick up the phone and tell me your sins. I promise nothing but an honest damnation."';
    }
}

// ──── Individual Confession ────
async function playConfession(dialogue) {
    dialogue.innerHTML = `
        <p>"The confessional is open. Speak your sin into the void. I am listening."</p>
        <div style="display:flex; gap:6px; margin-top:8px;">
            <input type="text" id="ch4ConfessionInput" placeholder="Type your sin..." style="flex:1; background:#16161e; border:2px solid #2a2a35; color:#c8c8c8; font-family:'VT323', monospace; padding:8px;">
            <button class="btn" id="ch4ConfessionSubmit">Confess</button>
        </div>
        <div id="ch4ConfessionResponse" style="margin-top:8px; color:#e8c5b0;"></div>
        <button class="btn back-btn" id="ch4BackBtn" style="margin-top:8px; align-self:flex-end;">← Leave Confessional</button>
    `;
    document.getElementById('ch4BackBtn').addEventListener('click', () => restoreCh4Guide());
    document.getElementById('ch4ConfessionSubmit').addEventListener('click', async () => {
        const input = document.getElementById('ch4ConfessionInput');
        const sin = input.value.trim();
        if (!sin) return;
        input.disabled = true;
        document.getElementById('ch4ConfessionSubmit').disabled = true;
        const respDiv = document.getElementById('ch4ConfessionResponse');
        respDiv.textContent = 'Father Mire contemplates your sin…';
        const prompt = `You are Father Malcolm Mire. A penitent has just confessed: "${sin}". Give a short, darkly funny judgment (2-3 sentences) and assign a bizarre, ironic penance. Stay in character. No actions, no markdown.`;
        try {
            const answer = await mistralChat([{ role: 'system', content: 'You are Father Mire.' }, { role: 'user', content: prompt }], 250);
            respDiv.innerHTML = `<em>"${esc(answer.trim())}"</em>`;
            speakTextMale(answer.trim());
        } catch (e) {
            respDiv.textContent = 'The confessional screen has shattered. Your sin is too heavy.';
        }
    });
}

// ──── Community Confession ────
async function playCommunityConfession(dialogue) {
    // 1. Generate a fake letter
    const letterPrompt = `Write a fictional confession letter to Father Mire. It should be 100-150 words, disturbing but absurd, signed with a pseudonym. Return JSON: { "letter": "...", "signature": "..." }. JSON only.`;
    let letterData;
    try {
        const resp = await mistralChat([{ role: 'system', content: 'You are a disturbed congregant.' }, { role: 'user', content: letterPrompt }], 400);
        letterData = JSON.parse(resp.replace(/```json|```/g, '').trim());
        if (!letterData.letter || !letterData.signature) throw new Error('invalid');
    } catch (e) {
        letterData = { letter: "I stole the holy water for my pot plants. They are not thriving.", signature: "Botanical Boris" };
    }

    dialogue.innerHTML = `
        <p>"A letter from our congregation… from <strong>${esc(letterData.signature)}</strong>."</p>
        <p style="font-style:italic; margin:8px 0;">"${esc(letterData.letter)}"</p>
        <p>What penance shall we give? The congregation votes:</p>
        <div style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;">
            <button class="btn penance-btn" data-severity="light">🕯️ Light (say three Hail Marys in reverse)</button>
            <button class="btn penance-btn" data-severity="medium">📿 Medium (wear a hair shirt for a week)</button>
            <button class="btn penance-btn" data-severity="harsh">⛓️ Harsh (walk barefoot to the nearest abandoned church)</button>
        </div>
        <div id="ch4PenanceResponse" style="margin-top:8px; color:#e8c5b0;"></div>
        <button class="btn back-btn" id="ch4BackBtn" style="margin-top:8px; align-self:flex-end;">← Leave Confessional</button>
    `;
    document.getElementById('ch4BackBtn').addEventListener('click', () => restoreCh4Guide());
    document.querySelectorAll('.penance-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const severity = btn.dataset.severity;
            document.querySelectorAll('.penance-btn').forEach(b => b.disabled = true);
            const respDiv = document.getElementById('ch4PenanceResponse');
            respDiv.textContent = `The congregation has spoken: ${severity} penance. Mire delivers the verdict…`;
            const prompt = `You are Father Mire. The congregation voted for a ${severity} penance for a sinner. React with a short, darkly humorous statement (2 sentences) approving the punishment. No actions.`;
            try {
                const answer = await mistralChat([{ role: 'system', content: 'You are Father Mire.' }, { role: 'user', content: prompt }], 200);
                respDiv.innerHTML = `<em>"${esc(answer.trim())}"</em>`;
                speakTextMale(answer.trim());
            } catch (e) {
                respDiv.textContent = 'Even the penance book is blank.';
            }
        });
    });
}

    function refreshAll() {
        const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab || 'channel1';
        switchTab(activeTab);
    }

    function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    const tabBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
    if (tabBtn) tabBtn.classList.add('active');
    const panel = document.getElementById(tab + 'Panel');
    if (panel) panel.classList.add('active');
    if (tab === 'channel1') renderChannel1();
    if (tab === 'channel2') renderChannel2();
    if (tab === 'channel3') renderChannel3();
    if (tab === 'channel4') renderChannel4();

    // ── Footer update ──
    const footerMsg = document.getElementById('footerMsg');
    if (footerMsg) {
        if (tab === 'channel1') footerMsg.textContent = '📡 NIGHTFALLS AM · CHANNEL 1 — THE HIDDEN REICH';
        else if (tab === 'channel2') footerMsg.textContent = '📡 NIGHTFALLS AM · CHANNEL 2 — SIGNAL 12 NEWS';
        else if (tab === 'channel3') footerMsg.textContent = '📡 NIGHTFALLS AM · CHANNEL 3 — THE NOCTURNE THEATER';
        else if (tab === 'channel4') footerMsg.textContent = '📡 NIGHTFALLS AM · CHANNEL 4 — THE MIDNIGHT CONFESSIONAL';
    }
}
