<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>BLACKWATER ISLAND · 1986</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Special+Elite&family=Playfair+Display+SC:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --screen-bg: #0d0d11;
            --panel-bg: #111116;
            --text: #d8d8d8;
            --text-dim: #7a7a7a;
            --text-bright: #f0f0f0;
            --accent: #e0e0e0;
            --accent-dim: #3a3a3a;
            --border: #555555;
            --border-glow: 0 0 14px #ffffff22, 0 0 32px #88888811;
            --danger: #999999;
            --danger-glow: 0 0 12px #ffffff33;
            --amber: #cccccc;
            --amber-dim: #555555;
            --gold: #d0d0d0;
            --gold-dim: #606060;
            --green: #6a8a6a;
            --input-bg: #15151a;
            --button-bg: #18181d;
            --button-hover: #222228;
            --button-active: #1a1a20;
            --bevel-light: #2a2a32;
            --bevel-dark: #06060a;
            --font-display: 'Cinzel', 'Playfair Display SC', serif;
            --font-title: 'Playfair Display SC', 'Cinzel', serif;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 28px;
            --btn-min-height: 46px;
            --touch-target: 44px;
            --neon-white: #f5f5f5;
            --neon-glow: 0 0 8px #ffffff55, 0 0 20px #cccccc22, 0 0 40px #88888815;
            --fog-grey: #b0b0b0;
            --mist: #9a9a9a;
            --coastal: #c8c8c8;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #1a1a22 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #1a1a20;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2a2a34, 0 0 0 4px #14141a, 0 0 0 8px #0a0a0e, 0 8px 48px #000000dd, 0 0 60px #ffffff08;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #444;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #0e0e14;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #d0d0d0;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffffff88, 0 0 18px #cccccc44, var(--neon-glow);
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #ffffff88, 0 0 18px #cccccc44;
            }
            50% {
                box-shadow: 0 0 16px #ffffffbb, 0 0 30px #dddddd66;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #6a6a6a;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #555;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.7), inset 0 0 12px rgba(0, 0, 0, 0.45);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg,
                    rgba(255, 255, 255, var(--scanline-opacity)) 0px,
                    rgba(255, 255, 255, var(--scanline-opacity)) 2px,
                    transparent 2px,
                    transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.65) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.88;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #0e0e15;
            border-bottom: 3px solid #666;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #1a1a24;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #888;
            border-radius: 2px;
            padding: 10px 14px;
            background: #0a0a10;
            position: relative;
            box-shadow: inset 0 0 24px #ffffff08;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #bbb;
            box-shadow: 0 0 12px #ffffff66;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #99999944;
            box-shadow: 0 0 8px #cccccc22;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #f0f0f0;
            text-shadow: 0 0 16px #ffffff66, 0 2px 4px #000, 0 0 40px #aaaaaa33, var(--neon-glow);
            letter-spacing: 4px;
            font-family: var(--font-title);
            line-height: 1.2;
            text-transform: uppercase;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #999;
            letter-spacing: 5px;
            margin-top: 3px;
            text-transform: uppercase;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 20px;
                letter-spacing: 2px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #3a3a3a #0d0d11;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #0d0d11;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #333;
            border-top-color: #444;
            border-left-color: #3a3a3a;
            border-right-color: #2a2a2a;
            border-bottom-color: #1a1a1a;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #2a2a2a;
            border-left-color: #2a2a2a;
            border-bottom-color: #444;
            border-right-color: #3a3a3a;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #1a1a20;
        }
        .btn.accent {
            background: #1a1a22;
            border-color: #555;
            border-top-color: #777;
            border-left-color: #666;
            border-right-color: #444;
            border-bottom-color: #2a2a2a;
            color: #f0f0f0;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #ffffff18;
        }
        .btn.accent:active {
            border-top-color: #444;
            border-left-color: #444;
            border-bottom-color: #777;
            border-right-color: #666;
            box-shadow: 0 0px 0 #00000044, 0 0 16px #ffffff33;
        }
        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .theater-mask {
            position: relative;
            background: #111118;
            border: 2px solid #55555566;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.8);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0e0e15;
            border: 2px solid #888;
            padding: 15px;
            border-radius: 3px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #999;
            box-shadow: 0 0 22px #ffffff33, 0 0 0 2px #1a1a22, var(--neon-glow);
            object-fit: cover;
            flex-shrink: 0;
            background: #111118;
        }
        .speech-bubble {
            flex: 1;
            background: #15151d;
            border: 2px solid #888;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #e0e0e0;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #88888888 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #0e0e15;
            border: 1px solid #444;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #18181f;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a7a7a;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #777;
            box-shadow: 0 0 20px #ffffff22, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #0e0e15;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(8, 8, 14, 0.85) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 13px;
            letter-spacing: 3px;
            color: #f0f0f0;
            text-shadow: 0 0 10px #ffffff99, 0 0 30px #cccccc55, 0 2px 4px #000000, 0 0 60px #88888822;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom,
                    rgba(10, 10, 18, 0.9) 0%,
                    rgba(10, 10, 18, 0.7) 40%,
                    transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 15px;
            letter-spacing: 1.5px;
            color: #f5f5f5;
            text-shadow: 0 0 8px #ffffff66, 0 0 20px #aaaaaa33, 0 2px 4px #000000;
            background: linear-gradient(to top,
                    rgba(8, 8, 14, 0.9) 0%,
                    rgba(8, 8, 14, 0.6) 50%,
                    transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a7a7a;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 10px;
                letter-spacing: 2px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 12px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #888;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #e0e0e0;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 10px #ffffff33;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #14141c;
            border: 1px solid #666;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #bbb;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #e8e8e8;
        }
        .guide-desc {
            font-size: 15px;
            color: #7a7a7a;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #14141c;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #999;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #d8d8d8;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #1a1a22;
            border: 2px solid #66666666;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #d8d8d8;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #aaa;
            box-shadow: 0 0 14px #ffffff33;
        }
        .loading-text {
            color: #bbb;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #0a0a10;
            border-top: 1px solid #55555544;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #5a5a5a;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #6a6a6a;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #2a2a30;
            color: #6a6a6a;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #5a5a5a;
            color: #999;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #e0e0e0;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">BLACKWATER ISLAND · CRT-86</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">BLACKWATER<br>ISLAND</div>
                    <div class="marquee-sub">⏤ 1986 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channelPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🌫️ BLACKWATER ISLAND · NOBODY COMES HERE BY ACCIDENT</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('blackwater_island_key') || '';

            const DEFAULT_STATE = {
                episodes: [],
                currentPerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>📻 The Broadcaster</h2>
        <p style="text-align:left;">
            <strong>Station:</strong> <em>Blackwater Island Radio · 87.9 FM</em><br>
            <strong>Bio:</strong> No one knows who operates the island's radio tower. The signal reaches the mainland on foggy nights. The voice is calm, measured — a man who's seen too many detectives come and go. He tells their stories because someone has to. The ferry captain listens. The islanders pretend they don't.
        </p>
    `;

            // ── 80s FILM SOUNDTRACK ENGINE ──
            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let crossfadeTimeout = null;

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    console.log(`🎛️ AudioContext created, state: ${audioCtx.state}`);
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.18;
                    reverbNode.connect(masterGain);
                    masterGain.connect(audioCtx.destination);
                    const compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.value = -24;
                    compressor.knee.value = 30;
                    compressor.ratio.value = 12;
                    compressor.attack.value = 0.003;
                    compressor.release.value = 0.25;
                    masterGain.connect(compressor);
                    compressor.connect(audioCtx.destination);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 1.0;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.35;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                    reverbNode.connect(masterGain);
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 2.5;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.5));
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            // ── 80s FILM SCORE SOUNDS ──
            function createFilmPad(ctx, frequency, duration, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.15, now + 0.8);
                gainNode.gain.setValueAtTime(intensity * 0.15, now + duration - 1.5);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.3);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.004;
                const osc3 = ctx.createOscillator();
                osc3.type = 'triangle';
                osc3.frequency.value = frequency / 2;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 1.5;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.12 + Math.random() * 0.15;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 150 + Math.random() * 150;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            function createOrchestralHit(ctx, intensity = 0.6) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.25, now + 0.04);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 2.0);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.25);
                osc.frequency.exponentialRampToValueAtTime(80, now + 1.8);

                const osc2 = ctx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(240, now);
                osc2.frequency.exponentialRampToValueAtTime(800, now + 0.25);
                osc2.frequency.exponentialRampToValueAtTime(160, now + 1.8);

                const osc3 = ctx.createOscillator();
                osc3.type = 'triangle';
                osc3.frequency.setValueAtTime(60, now);
                osc3.frequency.exponentialRampToValueAtTime(30, now + 1.5);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1000;
                filter.Q.value = 1;

                osc.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc.start(now);
                osc2.start(now);
                osc3.start(now);
                osc.stop(now + 2.0);
                osc2.stop(now + 2.0);
                osc3.stop(now + 2.0);
            }

            function createTensionSwell(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const duration = 6 + Math.random() * 8;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.35, now + 2);
                gainNode.gain.setValueAtTime(intensity * 0.4, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(100, now);
                osc1.frequency.exponentialRampToValueAtTime(200, now + duration * 0.7);
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(200, now);
                osc2.frequency.exponentialRampToValueAtTime(400, now + duration * 0.7);
                const osc3 = ctx.createOscillator();
                osc3.type = 'square';
                osc3.frequency.setValueAtTime(100, now);
                osc3.frequency.exponentialRampToValueAtTime(300, now + duration * 0.8);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(250, now);
                filter.frequency.exponentialRampToValueAtTime(1000, now + duration);
                filter.Q.value = 2;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.1;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 180;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            function createFilmClimax(ctx, intensity = 0.7) {
                const now = ctx.currentTime;
                const duration = 10 + Math.random() * 8;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.4, now + 2.5);
                gainNode.gain.setValueAtTime(intensity * 0.5, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(100, now);
                osc1.frequency.exponentialRampToValueAtTime(250, now + duration * 0.6);
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(200, now);
                osc2.frequency.exponentialRampToValueAtTime(500, now + duration * 0.6);
                const osc3 = ctx.createOscillator();
                osc3.type = 'square';
                osc3.frequency.setValueAtTime(100, now);
                osc3.frequency.exponentialRampToValueAtTime(350, now + duration * 0.8);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(200, now);
                filter.frequency.exponentialRampToValueAtTime(1400, now + duration);
                filter.Q.value = 2;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.12;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 220;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            function createBellTone(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 70 + Math.random() * 25;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(intensity * 0.35, now + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 4);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(reverbNode || ctx.destination);
                osc.start(now);
                osc.stop(now + 4);
            }

            function createLowThump(ctx, intensity = 0.7) {
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(50, now);
                osc.frequency.exponentialRampToValueAtTime(25, now + 0.12);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.6, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 0.12);
            }

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    switch (type) {
                        case 'pad':
                            createFilmPad(ctx, 100 + Math.random() * 40, 18 + Math.random() * 18, intensity);
                            break;
                        case 'hit':
                            createOrchestralHit(ctx, intensity);
                            break;
                        case 'swell':
                            createTensionSwell(ctx, intensity);
                            break;
                        case 'climax':
                            createFilmClimax(ctx, intensity);
                            break;
                        case 'bell':
                            createBellTone(ctx, intensity);
                            break;
                        case 'thump':
                            createLowThump(ctx, intensity);
                            setTimeout(() => createLowThump(ctx, intensity * 0.8), 180);
                            break;
                        case 'thunder': {
                            const bufferSize = ctx.sampleRate * 0.6;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.35));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(intensity * 0.5, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 120;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(ctx.currentTime);
                            source.stop(ctx.currentTime + 1.0);
                            break;
                        }
                        default:
                            console.warn(`Unknown sound type: ${type}`);
                    }
                } catch (err) {
                    console.error(`❌ Error in playSound("${type}"):`, err);
                }
            }

            async function playAmbient(type, durationSeconds, intensity = 0.4) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.25, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;

                    if (type === 'fog_drone' || type === 'coastal_wind') {
                        const bufferSize = ctx.sampleRate * 1;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.4;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'fog_drone' ? 160 : 500;
                        filter.Q.value = 0.5;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'fog_drone' ? 70 : 100;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.15 * intensity;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        ambientSource = { osc, noise };
                    }

                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => stopAmbient(), durationSeconds * 1000);
                } catch (err) {
                    console.error(`❌ Error in playAmbient("${type}"):`, err);
                }
            }

            function stopAmbient() {
                if (ambientGain && audioCtx) {
                    const now = audioCtx.currentTime;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 300);
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            function stopSectionAmbient() {
                if (sectionAmbientActive) {
                    sectionAmbientActive.stop();
                    sectionAmbientActive = null;
                }
                clearTimeout(crossfadeTimeout);
            }

            function startSectionScore(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                const ctx = audioCtx;
                const rootFreq = 50;
                const bpmMap = { intro: 50, setup: 55, scheme: 60, execution: 68, twist: 72, closing: 45 };
                const bpm = bpmMap[themeName] || 55;
                const beatDuration = 60 / bpm;
                const patternLength = 8;
                const bassPatterns = {
                    intro: [0, 0, 7, 7, 0, 0, 5, 5],
                    setup: [0, 7, 5, 3, 0, 7, 5, 3],
                    scheme: [0, 3, 5, 7, 8, 7, 5, 3],
                    execution: [0, 7, 0, 7, 3, 7, 3, 7],
                    twist: [0, 3, 6, 8, 0, 3, 6, 8],
                    closing: [0, 7, 5, 0, 7, 5, 0, 7]
                };
                const bassPat = bassPatterns[themeName] || bassPatterns.intro;

                const padGain = ctx.createGain();
                padGain.gain.value = 0.08;
                const padOsc1 = ctx.createOscillator();
                padOsc1.type = 'sawtooth';
                padOsc1.frequency.value = rootFreq;
                const padOsc2 = ctx.createOscillator();
                padOsc2.type = 'sawtooth';
                padOsc2.frequency.value = rootFreq * 1.503;
                const padOsc3 = ctx.createOscillator();
                padOsc3.type = 'triangle';
                padOsc3.frequency.value = rootFreq / 2;
                const padFilter = ctx.createBiquadFilter();
                padFilter.type = 'lowpass';
                padFilter.frequency.value = 280;
                padFilter.Q.value = 1;
                padOsc1.connect(padFilter);
                padOsc2.connect(padFilter);
                padOsc3.connect(padFilter);
                padFilter.connect(padGain);
                const padDry = ctx.createGain();
                padDry.gain.value = 0.5;
                const padWet = ctx.createGain();
                padWet.gain.value = 0.25;
                padGain.connect(padDry);
                padGain.connect(padWet);
                padDry.connect(dryGain);
                padWet.connect(wetGain);
                padOsc1.start();
                padOsc2.start();
                padOsc3.start();
                const stopSources = [padOsc1, padOsc2, padOsc3];

                let step = 0;
                let nextStepTime = ctx.currentTime + 0.05;
                let timeoutId;

                function scheduleStep() {
                    if (!sectionAmbientActive) return;
                    const now = nextStepTime;
                    const bassSemitone = bassPat[step % patternLength];
                    const bassFreq = rootFreq * Math.pow(2, bassSemitone / 12);
                    const noteGain = ctx.createGain();
                    noteGain.gain.setValueAtTime(0.25, now);
                    noteGain.gain.exponentialRampToValueAtTime(0.001, now + beatDuration * 0.85);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = bassFreq;
                    osc.connect(noteGain);
                    noteGain.connect(dryGain);
                    const noteWet = ctx.createGain();
                    noteWet.gain.value = 0.15;
                    noteGain.connect(noteWet);
                    noteWet.connect(wetGain);
                    osc.start(now);
                    osc.stop(now + beatDuration * 0.9);
                    step++;
                    nextStepTime += beatDuration;
                    timeoutId = setTimeout(scheduleStep, (nextStepTime - ctx.currentTime) * 1000);
                }
                timeoutId = setTimeout(scheduleStep, 50);

                sectionAmbientActive = {
                    stop: () => {
                        clearTimeout(timeoutId);
                        padGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                        stopSources.forEach(s => { try { s.stop(ctx.currentTime + 0.3); } catch (e) {} });
                        sectionAmbientActive = null;
                    }
                };
            }

            const transitionSectionTheme = startSectionScore;

            function saveState() {
                try { localStorage.setItem('blackwater_island_state', JSON.stringify(gameState)); } catch (e) {}
            }

            function loadState() {
                try {
                    const saved = localStorage.getItem('blackwater_island_state');
                    if (saved) gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
                    gameState.episodes = gameState.episodes || [];
                    gameState.currentPerformance = gameState.currentPerformance || null;
                } catch (e) {}
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 30000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`);
                    }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') throw new Error('Request timed out.');
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', foggy coastal island, 1980s noir detective, grainy film photograph, misty atmosphere, cinematic')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e; await new Promise(r =>
                            setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else { clearInterval(timer);
                            resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David',
                    'Fred', 'Alex', 'Thomas', 'James'
                ];
                let voice = null;
                for (const name of maleNames) {
                    voice = voices.find(v => v.name.includes(name));
                    if (voice) break;
                }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.6;
                utterance.pitch = 0.9;
                speechSynthesis.speak(utterance);
            }

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) {
                        voice = voices.find(v => v.name.includes(name));
                        if (voice) break;
                    }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.6;
                    utterance.pitch = voiceConfig.pitch || 0.9;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) {
                            currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar);
                            if (cueChecker) cueChecker(currentChar);
                        }
                    };
                    utterance.onend = () => {
                        element.textContent = text;
                        if (cueChecker) cueChecker(text.length);
                        resolve();
                    };
                    utterance.onerror = (e) => {
                        console.warn('TTS error:', e);
                        element.textContent = text;
                        resolve();
                    };
                    speechSynthesis.speak(utterance);
                });
            }

            function showModal(html) {
                document.getElementById('genericModalContent').innerHTML = html;
                document.getElementById('genericModal').style.display = 'flex';
            }

            function closeModal() {
                document.getElementById('genericModal').style.display = 'none';
                speechSynthesis.cancel();
            }
            window.closeModal = closeModal;

            function renderChannel() {
                const panel = document.getElementById('channelPanel');
                if (!panel) return;
                panel.innerHTML = `
        <div class="tv-stage theater-mask">
            <div class="tv-stage-row">
                <img class="host-portrait" src="vince.jpg" alt="The Broadcaster" style="object-fit:cover;">
                <div class="speech-bubble" id="chSpeechBubble">
                    <div class="story-poster-container no-image" id="chPosterContainer">
                        <img id="chSegmentImage" class="segment-image" alt="Case File Poster">
                        <div class="poster-overlay-theater">BLACKWATER<br>ISLAND</div>
                        <div class="poster-overlay-title" id="chPosterTitle"></div>
                    </div>
                    <div class="segment-text" id="chDialogue">
                        "The ferry arrives at dawn. A detective steps onto the dock. Nobody comes here by accident. This is Blackwater Island."
                    </div>
                </div>
            </div>
        </div>
        <div class="tv-guide">
            <h3>🌫️ BLACKWATER ISLAND · CASE FILES</h3>
            <div id="chGuideList"></div>
        </div>
    `;
                const guideList = document.getElementById('chGuideList');
                const episodes = gameState.episodes || [];
                episodes.forEach((ep, index) => {

                    entry.innerHTML = `
                <span class="guide-time">CASE ${index + 1}</span>
                ${ep.imageUrl ? `
    <div style="position:relative; width:50px; height:50px; flex-shrink:0; margin-right:8px; border-radius:2px; overflow:hidden; border:1px solid #555;">
        <img src="${esc(ep.imageUrl)}" style="width:100%; height:100%; object-fit:cover;" alt="Case">
        <div style="position:absolute; top:0; left:0; right:0; font-family:${esc('--font-title')}; font-size:4px; text-align:center; color:#e0e0e0; text-shadow:0 0 3px #fff; background:rgba(10,10,18,0.7); padding:1px 2px; letter-spacing:0.5px; pointer-events:none;">BLACKWATER</div>
        <div style="position:absolute; bottom:0; left:0; right:0; font-family:${esc('--font-display')}; font-size:3.5px; text-align:center; color:#f0f0f0; text-shadow:0 0 2px #000; background:rgba(10,10,18,0.65); padding:1px 2px; pointer-events:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(ep.title)}</div>
    </div>` : ''}
                <div class="guide-info">
                    <div class="guide-title">"${esc(ep.title)}"</div>
                    <div class="guide-desc">${hasCues ? '🎧 Score ready' : 'Case file awaiting score.'}</div>
                </div>
                <div class="guide-actions">
                    <button class="btn guide-btn perform-saved-btn" data-index="${index}">▶ Play</button>
                    ${!hasCues ? `<button class="btn guide-btn produce-episode-btn" data-index="${index}">🎼 Score</button>` : '<span style="color:#ccc; font-size:12px;">✅</span>'}
                </div>
            `;
                    guideList.appendChild(entry);
                });
                const newBtn = document.createElement('button');
                newBtn.className = 'btn accent';
                newBtn.style.marginTop = '12px';
                newBtn.style.width = '100%';
                newBtn.textContent = '🌫️ New Case File';
                newBtn.addEventListener('click', async () => {
                    newBtn.disabled = true;
                    newBtn.textContent = '📻 Investigating…';
                    try { await generateAndPerform(); } catch (e) {
                        showModal(
                            `<h2>Signal Lost</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                            );
                        newBtn.disabled = false;
                        newBtn.textContent = '🌫️ New Case File';
                    }
                });
                guideList.appendChild(newBtn);

                const testBtn = document.createElement('button');
                testBtn.className = 'btn';
                testBtn.textContent = '🔊 Test Score (Pad + Swell + Hit)';
                testBtn.style.marginTop = '6px';
                testBtn.style.width = '100%';
                testBtn.addEventListener('click', () => {
                    playSound('pad', 0.5);
                    setTimeout(() => playSound('swell', 0.4), 600);
                    setTimeout(() => playSound('hit', 0.5), 2000);
                    setTimeout(() => playAmbient('fog_drone', 6, 0.3), 3000);
                });
                guideList.appendChild(testBtn);

                if (gameState.currentPerformance && gameState.currentPerformance.rawStoryText && !gameState
                    .currentPerformance.soundCues) {
                    const produceBtn = document.createElement('button');
                    produceBtn.className = 'btn';
                    produceBtn.style.marginTop = '6px';
                    produceBtn.style.width = '100%';
                    produceBtn.textContent = '🎼 Compose Score (Current)';
                    produceBtn.addEventListener('click', async () => {
                        produceBtn.disabled = true;
                        produceBtn.textContent = '🎚️ Composing…';
                        try {
                            const cues = await generateSoundCueSheet(gameState.currentPerformance
                                .rawStoryText);
                            gameState.currentPerformance.soundCues = cues;
                            saveState();
                            produceBtn.textContent = '✅ Score Ready';
                            renderChannel();
                        } catch (e) {
                            showModal(
                                `<h2>Score Failed</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                                );
                            produceBtn.disabled = false;
                            produceBtn.textContent = '🎼 Compose Score (Current)';
                        }
                    });
                    guideList.appendChild(produceBtn);
                }

                document.querySelectorAll('.perform-saved-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const index = parseInt(btn.dataset.index);
                        const ep = gameState.episodes[index];
                        if (!ep) return;
                        gameState.currentPerformance = { ...ep, soundCues: ep.soundCues || null,
                            rawStoryText: ep.rawStoryText || ep.story };
                        saveState();
                        await startPerformance();
                    });
                });
                document.querySelectorAll('.produce-episode-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const index = parseInt(btn.dataset.index);
                        const ep = gameState.episodes[index];
                        if (!ep || !ep.rawStoryText) return;
                        btn.disabled = true;
                        btn.textContent = '🎚️...';
                        try {
                            const soundtrack = await generateSoundCueSheet(ep.rawStoryText);
                            ep.soundCues = soundtrack;
                            saveState();
                            renderChannel();
                        } catch (err) {
                            showModal(
                                `<h2>Score Failed</h2><p>${esc(err.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                                );
                            btn.disabled = false;
                            btn.textContent = '🎼 Score';
                        }
                    });
                });
            }

            async function generateNewStory() {
                const system =
                    `You are the broadcaster of Blackwater Island Radio. You narrate grim, noir detective stories set on a remote island in 1986. No supernatural elements. Pure human darkness.`;
                const prompt =
                    `Write a 500-750 word noir detective story set on Blackwater Island in 1986. Structure: A detective arrives by ferry investigating a disappearance. They interview islanders who all seem polite but hide something. By the end, the detective never leaves. Rules: NO supernatural elements. The horror is human — collective guilt, normalized violence, manipulation, fear, generational trauma, shared shame, mutual blackmail, or cult ritual. Pick ONE motive. Include: the detective type (burned-out veteran, retiring inspector, ex-military policeman, gambling addict, rookie constable), the victim (tourist, teacher, priest, journalist, tax inspector, fisherman, doctor, archaeologist, property developer, coastguard), and the location (lighthouse, pub, church, clifftops, sea caves, fish cannery, school, old fort, abandoned mine, cemetery, radio mast, ferry wharf, boat sheds, forest). The ending must be brutal and inevitable — the detective is murdered by the islanders in a specific way (thrown off cliffs, drowned via sabotaged boat, trapped in sea caves for the tide, anchored underwater, poisoned at a communal meal, burned alive, locked in a boathouse set alight, ritual sacrifice, chained and dropped from a fishing boat, frozen in a cold storage room, or each islander takes a turn carrying the bound detective to execution). The final scene: next morning, ferry captain asks about the detective. An islander shrugs — "Last we saw, they went walking along the western cliffs." The ferry departs. Return ONLY valid JSON: {"title": string, "story": string (use \\n for line breaks), "closing_remark": string (the islander's chilling lie to the ferry captain)}. No markdown.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: prompt }
                ], 2000, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) throw new Error(
                    'Invalid story structure.');
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Noir detective movie poster titled "${story.title}", foggy island, 1980s, coastal, misty, cinematic, grainy`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate poster:', e); }
                gameState.currentPerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system =
                    `You are a film score composer for an 80s noir thriller. Given a story, return JSON with: "sections" (5-6 sections covering the story from 0 to ${length}, each with "theme": one of intro/setup/scheme/execution/twist/closing, "start_char", "end_char"), "cues" (at least 35 sound events using only types: "pad", "hit", "swell", "climax", "bell", "thump", "thunder", each with "position", "type", optional "intensity"), and "score" (object with keys matching theme names, each containing "bpm" 45-75, "bass" array of 8 semitone intervals from root 0, "arp" array of 8 intervals, "kick" array of 8 (1=hit,0=rest), "snare" array of 8). Make it tense and cinematic. Return ONLY raw JSON.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: `Story (${length} chars):\n${storyText}` }
                ], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try { data = JSON.parse(cleaned); } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try { data = JSON.parse(candidate); } catch (e2) { throw new Error(
                                'Failed to parse score JSON.'); }
                    } else throw new Error('No JSON found.');
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                    throw new Error('Missing sections/cues/score.');
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0) sortedSections[0].start_char = 0;
                if (sortedSections[sortedSections.length - 1].end_char < length) sortedSections[sortedSections
                    .length - 1].end_char = length;
                const cues = data.cues.map(c => ({ type: c.type, position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.6 }));
                const requiredThemes = ['intro', 'setup', 'scheme', 'execution', 'twist', 'closing'];
                const score = {};
                for (const theme of requiredThemes) {
                    score[theme] = data.score[theme] || { bpm: 55, bass: [0, 0, 7, 7, 0, 0, 5, 5], arp: [12, 15,
                            12, 19, 12, 15, 12, 19
                        ], kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] };
                }
                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {
                await generateNewStory();
                if (!gameState.currentPerformance) throw new Error('Failed to generate story.');
                const soundtrack = await generateSoundCueSheet(gameState.currentPerformance.rawStoryText);
                gameState.currentPerformance.soundCues = soundtrack;
                saveState();
                await startPerformance();
            }

            async function startPerformance() {
                speechSynthesis.cancel();
                if (window.chTimeout) clearTimeout(window.chTimeout);
                const storyData = gameState.currentPerformance;
                if (!storyData || !storyData.story) {
                    await generateNewStory();
                    return startPerformance();
                }
                let sectionList = null;
                let cueList = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) {
                        cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                    } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                        sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                    }
                }
                const bubble = document.getElementById('chSpeechBubble');
                const dialogue = document.getElementById('chDialogue');
                const imageEl = document.getElementById('chSegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('chGuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#aaa';
                bubble.style.boxShadow = '0 0 30px #ffffff44';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('chBackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('chAddEpisodeBtn');
                if (oldAdd) oldAdd.remove();
                const posterContainer = document.getElementById('chPosterContainer');
                const posterTitle = document.getElementById('chPosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    if (posterTitle) posterTitle.textContent = storyData.title || '';
                } else if (posterContainer) { posterContainer.classList.add('no-image'); }

                const intro =
                    `"The fog rolls in. The ferry docks. A detective steps onto Blackwater Island. This is Case File: '${storyData.title}'. Listen closely. The island is watching."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 45);
                await new Promise(r => setTimeout(r, 1500));

                if (sectionList && sectionList.length > 0) transitionSectionTheme(sectionList[0].theme);

                const storyText = storyData.rawStoryText || storyData.story;
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b
                        .start_char) : [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx]
                            .start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) { currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme); }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) { triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity); }
                            cueIdx++;
                        }
                    };
                }

                dialogue.textContent = '';
                if (cueChecker) {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.6, pitch: 0.9 }, (idx) => cueChecker(
                        idx));
                } else {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.6, pitch: 0.9 });
                }
                await new Promise(r => setTimeout(r, 1200));

                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#e0e0e0';
                dialogue.appendChild(closingLine);
                speakTextMale(closing);
                await typewriterEffect(closingLine, closing, 40);
                await new Promise(r => setTimeout(r, 1000));

                const curtainText = document.createElement('p');
                curtainText.textContent = '— The ferry departs. The fog swallows the island. —';
                stopSectionAmbient();
                curtainText.style.color = '#7a7a7a';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();

                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Leave the Island';
                leaveBtn.addEventListener('click', () => { leaveChannel(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'chAddEpisodeBtn';
                addBtn.textContent = '➕ Add to Case Files';
                addBtn.addEventListener('click', () => { addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Added'; });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.currentPerformance;
                if (!perf) return;
                gameState.episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
                saveState();
                setTimeout(() => leaveChannel(), 600);
            }

            function leaveChannel() {
                stopAmbient();
                stopSectionAmbient();
                renderChannel();
            }

            function init() {
                loadState();
                renderChannel();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('blackwater_island_key', key);
                    }
                });
                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) showModal(HOST_BIO);
                });
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
                if (!apiKey) setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
            }
            init();
        })();
    </script>
