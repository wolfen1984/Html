<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>BLOOD CIRCUIT 1982</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffcc66;
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 12px;
            image-rendering: pixelated;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .game-container {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            background: #001122;
            border: 18px solid #2a7fd1;
            border-image: linear-gradient(#2a7fd1, #1e5a9e) 1;
            box-shadow: 
                0 0 0 8px #112233,
                0 0 40px rgba(42, 127, 209, 0.6),
                inset 0 0 80px rgba(255, 140, 0, 0.2);
            border-radius: 8px;
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 8px 0;
            background: #001122;
            border-bottom: 6px solid #2a7fd1;
            margin-bottom: 12px;
            text-shadow: 
                0 0 10px #ff4400,
                2px 2px 0 #000,
                -2px -2px 0 #000;
            letter-spacing: 4px;
        }

        .header h1 {
            font-size: clamp(32px, 8vw, 48px);
            margin: 0;
            line-height: 1;
            color: #ff8800;
        }

        .header .subtitle {
            font-size: clamp(18px, 4vw, 22px);
            color: #66ccff;
            margin-top: 4px;
            text-shadow: 0 0 8px #00aaff;
        }

        .location-wrapper {
            position: relative;
            margin: 0 auto;
            width: 100%;
            max-width: 700px;
            box-shadow: 
                inset 0 0 60px rgba(0, 0, 0, 0.9),
                0 0 30px rgba(42, 127, 209, 0.8);
            flex-shrink: 0;
        }

        #location-image {
            width: 100%;
            height: auto;
            display: block;
            border: 12px solid #1e5a9e;
            box-shadow: 
                0 0 0 8px #112233,
                inset 0 0 40px rgba(255, 170, 0, 0.3);
            image-rendering: pixelated;
            cursor: crosshair;
            aspect-ratio: 700 / 420;
        }

        .hotspot {
            position: absolute;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s ease;
            border: 3px solid transparent;
            touch-action: manipulation;
        }

        .hotspot:hover,
        .hotspot:active {
            opacity: 1;
            border-color: rgba(255, 200, 80, 0.7);
            box-shadow: 0 0 20px #ffcc00;
            background: rgba(255, 220, 100, 0.15);
        }

        .hotspot::after {
            content: attr(data-name);
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: #001122;
            color: #ffcc66;
            font-size: clamp(14px, 3vw, 18px);
            padding: 2px 12px;
            border: 2px solid #ff8800;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            text-shadow: 0 0 6px #ff4400;
            z-index: 20;
        }

        .hotspot:hover::after,
        .hotspot:active::after {
            opacity: 1;
        }

        .dialogue-box {
            width: 100%;
            max-width: 700px;
            margin: 18px auto 0;
            background: #000d1a;
            border: 10px solid #2a7fd1;
            padding: 18px 24px;
            font-size: clamp(22px, 5vw, 26px);
            line-height: 1.4;
            min-height: 160px;
            max-height: 260px;
            overflow-y: auto;
            box-shadow: 
                inset 0 0 40px rgba(0, 0, 0, 0.8),
                0 0 20px rgba(255, 140, 0, 0.4);
            color: #ffdd88;
            position: relative;
            flex-shrink: 0;
        }

        .dialogue-box::before {
            content: ">";
            position: absolute;
            left: 18px;
            top: 18px;
            color: #00ffcc;
            font-size: 32px;
            opacity: 0.4;
            animation: blink 1.2s infinite;
        }

        .dialogue-text {
            margin-left: 28px;
        }

        .footer {
            text-align: center;
            margin-top: 14px;
            font-size: clamp(16px, 3.5vw, 18px);
            color: #44aaff;
            text-shadow: 0 0 8px #00aaff;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            padding: 0 10px;
        }

        .footer span {
            background: #001122;
            padding: 4px 14px;
            border: 3px solid #2a7fd1;
            white-space: nowrap;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 4px,
                rgba(0, 255, 200, 0.07) 4px,
                rgba(0, 255, 200, 0.07) 6px
            );
            pointer-events: none;
            z-index: 10;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        /* MOBILE / PORTRAIT OPTIMIZATIONS */
        @media (max-width: 600px) {
            body {
                padding: 8px;
            }
            
            .game-container {
                border-width: 12px;
                padding: 8px;
            }
            
            .dialogue-box {
                min-height: 140px;
                max-height: 220px;
                padding: 14px 18px;
                font-size: clamp(20px, 5vw, 24px);
            }
            
            .header {
                padding: 6px 0;
                border-bottom-width: 4px;
            }
            
            .location-wrapper {
                max-width: 100%;
            }
            
            .footer {
                gap: 8px;
                font-size: clamp(15px, 3.8vw, 17px);
            }
            
            .hotspot::after {
                top: -24px;
                font-size: clamp(13px, 3vw, 16px);
                padding: 2px 10px;
            }
        }

        /* Extra tall portrait phones (like most Androids in portrait) */
        @media (max-width: 480px) and (orientation: portrait) {
            .dialogue-box {
                max-height: 180px;
            }
            
            .game-container {
                padding: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        
        <!-- HEADER -->
        <div class="header">
            <h1>BLOOD CIRCUIT</h1>
            <div class="subtitle">1982 • SECTOR ACCESS TERMINAL v1.7</div>
        </div>

        <!-- LOCATION IMAGE WITH HOTSPOTS -->
        <div class="location-wrapper" id="image-container">
            <img id="location-image" src="sector107.png" alt="Location - Sector 107" 
                 width="700" height="420">
            
            <!-- HOTSPOT 1: Sealed Door -->
            <a href="#" class="hotspot" 
               style="left: 37%; top: 34%; width: 14%; height: 31%;"
               data-name="SEALED DOOR"
               onclick="interact('sealed-door'); return false;"></a>
            
            <!-- HOTSPOT 2: Flickering Light -->
            <a href="#" class="hotspot" 
               style="left: 17%; top: 29%; width: 7%; height: 11%;"
               data-name="FLICKERING LIGHT"
               onclick="interact('flickering-light'); return false;"></a>
            
            <!-- HOTSPOT 3: Energy Orb -->
            <a href="#" class="hotspot" 
               style="left: 70%; top: 31%; width: 9%; height: 14%;"
               data-name="ENERGY ORB"
               onclick="interact('energy-orb'); return false;"></a>
            
            <!-- HOTSPOT 4: Control Panel -->
            <a href="#" class="hotspot" 
               style="left: 62%; top: 52%; width: 18%; height: 16%;"
               data-name="CONTROL PANEL"
               onclick="interact('control-panel'); return false;"></a>
            
            <!-- HOTSPOT 5: Dark Hallway -->
            <a href="#" class="hotspot" 
               style="left: 81%; top: 37%; width: 8%; height: 28%;"
               data-name="DARK HALLWAY"
               onclick="interact('dark-hallway'); return false;"></a>
            
            <div class="scanlines"></div>
        </div>

        <!-- MAIN GAMEPLAY DIALOGUE BOX -->
        <div class="dialogue-box">
            <div class="dialogue-text" id="dialogue">
                <span style="color:#00ffcc;">[SYSTEM BOOT COMPLETE]</span><br>
                You stand in Sector 107. The walls thrum with blood-red circuitry. 
                Something is watching.<br><br>
                <span style="color:#ff8800;">Tap any glowing object on the image above to examine, take, or use it.</span>
            </div>
        </div>

        <!-- FOOTER STATUS -->
        <div class="footer">
            <span>HEALTH: 87%</span>
            <span>SECTOR 107 • 03:14 AM</span>
            <span>AMMO: 4 | BATTERY: 62%</span>
        </div>
    </div>

    <script>
        // Game responses
        const responses = {
            'sealed-door': {
                examine: "A heavy bulkhead door. Dried blood streaks the frame. A faint red pulse glows from the seam.",
                take: "It's welded shut. You can't take a three-ton door.",
                use: "You press your hand against the cold metal. It vibrates... then falls silent."
            },
            'flickering-light': {
                examine: "A flickering sodium lamp. The wiring is exposed and sparking. Looks like it runs on pure agony.",
                take: "You burn your fingers trying to rip it free. Not worth it.",
                use: "You smack the casing. The light stabilizes for a second, then explodes in sparks."
            },
            'energy-orb': {
                examine: "A glowing orange orb embedded in the wall. It pulses like a heartbeat. Warm to the touch.",
                take: "You pry it loose. +1 ENERGY CELL added to inventory.",
                use: "You hold it up. The corridor lights dim... then surge back brighter than before."
            },
            'control-panel': {
                examine: "Ancient control panel covered in cryptic runes and flickering dials. One switch is labeled 'PURGE'.",
                take: "The panel is bolted into the wall. No dice.",
                use: "You flip the PURGE switch. A low alarm begins to wail in the distance..."
            },
            'dark-hallway': {
                examine: "A narrow side passage disappearing into total darkness. You hear wet mechanical breathing.",
                take: "Nothing to take. Just shadows.",
                use: "You step forward. Something cold brushes your face. You quickly step back."
            }
        };

        function interact(objectKey) {
            const dialogueEl = document.getElementById('dialogue');
            const objElement = document.querySelector(`.hotspot[onclick*="('${objectKey}')"]`);
            const objName = objElement ? objElement.getAttribute('data-name') : 'UNKNOWN';
            
            // Clear previous choices if any
            if (dialogueEl.innerHTML.includes('[EXAMINE]')) {
                dialogueEl.innerHTML = dialogueEl.innerHTML.split('<br><br><span style="color:#ff4400;">► INTERACTING')[0];
            }
            
            dialogueEl.innerHTML += `<br><br><span style="color:#ff4400;">► INTERACTING WITH ${objName}...</span><br>`;
            
            dialogueEl.innerHTML += `
                <span style="color:#66ffcc;">What do you want to do?</span><br>
                <a href="#" onclick="performAction('${objectKey}', 'examine'); return false;" style="color:#ffdd88; text-decoration:none; display:inline-block; margin:4px 6px;">[EXAMINE]</a>
                <a href="#" onclick="performAction('${objectKey}', 'take'); return false;" style="color:#ffdd88; text-decoration:none; display:inline-block; margin:4px 6px;">[TAKE]</a>
                <a href="#" onclick="performAction('${objectKey}', 'use'); return false;" style="color:#ffdd88; text-decoration:none; display:inline-block; margin:4px 6px;">[USE]</a>
            `;
            
            dialogueEl.scrollTop = dialogueEl.scrollHeight;
        }

        function performAction(objectKey, action) {
            const dialogueEl = document.getElementById('dialogue');
            const responseSet = responses[objectKey];
            const response = responseSet && responseSet[action] ? responseSet[action] : "Nothing happens...";
            
            dialogueEl.innerHTML += `<br><span style="color:#ffcc66;">${response}</span>`;
            dialogueEl.scrollTop = dialogueEl.scrollHeight;
            
            // Random atmospheric event
            if (Math.random() > 0.65) {
                setTimeout(() => {
                    dialogueEl.innerHTML += `<br><span style="color:#ff3366; font-size:20px;">[DISTANT ALARM ECHOES...]</span>`;
                    dialogueEl.scrollTop = dialogueEl.scrollHeight;
                }, 1100);
            }
        }

        // Keyboard easter egg (still works on desktop)
        document.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'b') {
                const img = document.getElementById('location-image');
                img.style.filter = 'hue-rotate(330deg) saturate(1.6) brightness(1.2)';
                setTimeout(() => { img.style.filter = ''; }, 800);
            }
        });

        // Touch feedback for mobile
        console.log('%cBLOOD CIRCUIT 1982 • Fully optimized for portrait Android devices', 'color:#ff4400; font-family:monospace; font-size:14px;');
    </script>
</body>
</html>
