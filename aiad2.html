<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle of the Dammed — Nightfall Games 1984 (Pure AI)</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #111;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 16px;
        }
        .terminal {
            background: #000;
            color: #fff;
            border: 3px solid #fff;
            box-shadow: 0 0 0 2px #000, 0 0 0 5px #fff;
            width: 100%;
            max-width: 950px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 20px 20px 15px 20px;
            image-rendering: pixelated;
        }
        .header {
            border-bottom: 2px solid #fff;
            padding-bottom: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            line-height: 1.8;
            text-transform: uppercase;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .header-left, .header-right { color: #fff; }
        .header-center {
            text-align: center;
            width: 100%;
            margin-top: 8px;
            font-size: 14px;
            background: #fff;
            color: #000;
            padding: 6px 0;
            border: 2px solid #fff;
            letter-spacing: 2px;
        }
        .output {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 15px;
            border: 2px solid #fff;
            padding: 18px 14px;
            background: #000;
            scroll-behavior: smooth;
            word-break: break-word;
        }
        .output p {
            margin: 0 0 14px 0;
            color: #fff;
        }
        .output p:last-child { margin-bottom: 0; }
        .input-line {
            display: flex;
            align-items: center;
            border-top: 2px solid #fff;
            padding-top: 12px;
            font-size: 16px;
        }
        .prompt { color: #fff; margin-right: 10px; font-size: 18px; }
        #userInput {
            flex: 1;
            background: #000;
            border: 2px solid #fff;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            padding: 14px 12px;
            outline: none;
            text-transform: uppercase;
        }
        #userInput::placeholder { color: #555; font-size: 11px; text-transform: none; }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            color: #aaa;
            margin-top: 10px;
            border-top: 1px solid #333;
            padding-top: 8px;
        }
        .footer-left, .footer-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .clickable {
            color: #fff;
            text-decoration: underline;
            cursor: pointer;
        }
        .status {
            color: #0f0;
            font-size: 9px;
            margin-top: 8px;
            letter-spacing: 1px;
        }
        #fileInput { display: none; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">
            <div class="header-left">NIGHTFALL GAMES<br>PRESENTS</div>
            <div class="header-right">(C) 1984<br>ALL RIGHTS RESERVED</div>
            <div class="header-center">⚔ CASTLE OF THE DAMMED ⚔</div>
        </div>

        <div id="outputArea" class="output">
            <p>DARKNESS SURROUNDS YOU.</p>
            <p>YOU STAND BEFORE THE IRON GATES OF CASTLE DAMMED.<br>A COLD WIND CARRIES WHISPERS FROM WITHIN.</p>
            <p>WHAT IS YOUR COMMAND?</p>
        </div>

        <div class="input-line">
            <span class="prompt">></span>
            <input type="text" id="userInput" placeholder="TYPE COMMAND..." autofocus>
        </div>
        <div class="status" id="aiStatus">⚡ PURE AI MODE — ENTER COMMAND ⚡</div>
        
        <div class="footer">
            <div class="footer-left">
                <span class="clickable" id="saveBtn">💾 SAVE</span>
                <span class="clickable" id="loadBtn">📂 LOAD</span>
            </div>
            <div class="footer-right">
                <span class="clickable" id="resetBtn">⟲ RESET</span>
                <span>NIGHTFALL GAMES 1984</span>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".json,application/json">

    <script>
        (function() {
            // DOM elements
            const outputDiv = document.getElementById('outputArea');
            const inputField = document.getElementById('userInput');
            const aiStatus = document.getElementById('aiStatus');
            const resetBtn = document.getElementById('resetBtn');
            const saveBtn = document.getElementById('saveBtn');
            const loadBtn = document.getElementById('loadBtn');
            const fileInput = document.getElementById('fileInput');

            // Game instructions embedded in the first assistant message (no system role)
            const initialGameState = `You are the game master for "Castle of the Dammed" (1984). Track everything: location, inventory, health, NPCs, items. Be consistent. Player starts with 15 HP. World: castle gate, courtyard, dungeon, throne room. Items: lantern, rusty key, ancient amulet. NPCs: ghost, wraith. Use second person, 2-3 sentences, atmospheric horror style.`;

            // Messages array: first assistant message includes instructions + intro
            let messages = [
                { 
                    role: 'assistant', 
                    content: initialGameState + '\n\nDARKNESS SURROUNDS YOU.\n\nYOU STAND BEFORE THE IRON GATES OF CASTLE DAMMED. A COLD WIND CARRIES WHISPERS FROM WITHIN. THE GATES ARE MASSIVE AND RUSTED, BUT THEY MOVE SLIGHTLY. A RAVEN CROAKS FROM ABOVE.\n\nWHAT IS YOUR COMMAND?' 
                }
            ];

            // Helper: append output
            function appendOutput(text) {
                const p = document.createElement('p');
                p.textContent = text;
                outputDiv.appendChild(p);
                outputDiv.scrollTop = outputDiv.scrollHeight;
            }

            // Rebuild output from messages
            function rebuildOutputFromMessages() {
                outputDiv.innerHTML = '';
                for (let msg of messages) {
                    if (msg.role === 'user') {
                        appendOutput('> ' + msg.content.toUpperCase());
                    } else if (msg.role === 'assistant') {
                        appendOutput(msg.content);
                    }
                }
            }

            // Reset game
            function resetGame() {
                messages = [
                    { 
                        role: 'assistant', 
                        content: initialGameState + '\n\nDARKNESS SURROUNDS YOU.\n\nYOU STAND BEFORE THE IRON GATES OF CASTLE DAMMED. A COLD WIND CARRIES WHISPERS FROM WITHIN. THE GATES ARE MASSIVE AND RUSTED, BUT THEY MOVE SLIGHTLY. A RAVEN CROAKS FROM ABOVE.\n\nWHAT IS YOUR COMMAND?' 
                    }
                ];
                rebuildOutputFromMessages();
                aiStatus.textContent = '⚡ PURE AI READY — ENTER COMMAND ⚡';
                inputField.disabled = false;
                inputField.focus();
            }

            // Save game
            function saveGame() {
                const dataStr = JSON.stringify(messages, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `castle_save_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                aiStatus.textContent = '💾 GAME SAVED';
                setTimeout(() => aiStatus.textContent = '⚡ PURE AI READY ⚡', 1500);
            }

            // Load game
            function loadGameFromFile(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const loaded = JSON.parse(e.target.result);
                        if (!Array.isArray(loaded) || loaded.length === 0 || loaded[0].role !== 'assistant') {
                            throw new Error('Invalid save file');
                        }
                        messages = loaded;
                        rebuildOutputFromMessages();
                        aiStatus.textContent = '📂 GAME LOADED';
                        inputField.disabled = false;
                        inputField.focus();
                        setTimeout(() => aiStatus.textContent = '⚡ PURE AI READY ⚡', 1500);
                    } catch (err) {
                        aiStatus.textContent = `❌ LOAD ERROR: ${err.message}`;
                    }
                };
                reader.readAsText(file);
            }

            // Call free AI (Pollinations chat endpoint)
            async function callFreeAI(userInput) {
                // Add user message
                messages.push({ role: 'user', content: userInput });
                appendOutput('> ' + userInput.toUpperCase());

                aiStatus.textContent = '⏳ AI THINKING... ⏳';
                inputField.disabled = true;

                try {
                    const response = await fetch('https://text.pollinations.ai/openai/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'openai',
                            messages: messages,
                            temperature: 0.9,
                            max_tokens: 300
                            // Removed other params for reliability
                        })
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`API error (${response.status}): ${errorText.slice(0, 200)}`);
                    }

                    const data = await response.json();
                    const aiMessage = data.choices[0].message.content.trim();

                    // Add AI response
                    messages.push({ role: 'assistant', content: aiMessage });
                    appendOutput(aiMessage);

                    aiStatus.textContent = '⚡ PURE AI READY ⚡';
                    inputField.disabled = false;
                    inputField.focus();
                } catch (err) {
                    console.error(err);
                    aiStatus.textContent = `❌ ERROR: ${err.message.slice(0, 80)} ❌`;
                    // Remove the last user message
                    messages.pop();
                    inputField.disabled = false;
                    inputField.focus();
                }
            }

            // Handle Enter key
            function handleCommand() {
                const cmd = inputField.value.trim();
                if (cmd === '') return;
                callFreeAI(cmd);
                inputField.value = '';
            }

            inputField.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleCommand();
                }
            });

            // Buttons
            resetBtn.addEventListener('click', resetGame);
            saveBtn.addEventListener('click', saveGame);
            loadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) loadGameFromFile(e.target.files[0]);
                fileInput.value = '';
            });

            // Focus input
            inputField.focus();
        })();
    </script>
</body>
</html>
