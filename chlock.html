<body>
    <div class="monitor-bezel">
        <div class="brand-label">McCRACKEN LOCKSMITH · EST.1986</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE LOCKSMITH</div>
                    <div class="marquee-sub">⏤ McCracken Locksmith Service · Carpenter Score ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channel3Panel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🔑 24HR EMERGENCY SERVICE · AI SYNTH SCORE</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
    (function() {
        const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
        const MODEL = 'mistral-small-latest';
        let apiKey = localStorage.getItem('locksmith_key') || '';

        const DEFAULT_STATE = {
            ch3Episodes: [],
            nocturnePerformance: null,
            imageCooldownUntil: 0,
        };
        let gameState = { ...DEFAULT_STATE };

        const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;', "'":'&#39;', '"':'&quot;' })[m]);

        const HOST_BIO = `
            <h2>🔑 James McCracken</h2>
            <p style="text-align:left;">
                <strong>Occupation:</strong> Independent Locksmith<br>
                <strong>Location:</strong> Millbrook, Indiana · Population 4,200<br>
                <strong>Years in Service:</strong> 14<br>
                <strong>Golden Rule:</strong> <em>"A locksmith doesn't ask why the door is locked. He only opens it."</em><br><br>
                James McCracken works alone. No employees. No office staff. Just his van, his tools, and the late-night calls that come after normal people have gone to sleep. He treats every customer with professional courtesy – no judgment, no questions. But after fourteen years of turning locks in the dead of night, he's seen things behind closed doors that no man should witness. Things that test the boundary between professional duty and human conscience.
            </p>
        `;

        // ═══════════════════════════════════════════════════════════════
        //  SOUND ENGINE — CARPENTER-STYLE SYNTH + AI PATTERN PLAYER
        //  All errors fixed: reverb connection, createCarpenterLead defined
        // ═══════════════════════════════════════════════════════════════

        let audioCtx = null;
        let ambientSource = null, ambientGain = null, ambientTimeout = null;
        let keepAliveNode = null;
        let reverbNode = null, masterGain = null, dryGain = null, wetGain = null;
        let sectionAmbientActive = null, stringAmbientActive = null;
        let patternPlayerActive = null, patternPlayerTimeout = null;
        let patternStep = 0, patternBPM = 60;
        let currentSectionPatterns = [];
        let currentVariationIdx = 0, barsInVariation = 0;
        let fillActive = false;
        let sectionThemeScore = null;
        let indicatorInterval = null;
        let audioInitialized = false;

        function createKeepAlive(ctx) {
            if (keepAliveNode) return;
            try {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.0005;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            } catch(e) { /* silent */ }
        }

        function initReverb(ctx) {
            if (reverbNode) return;
            try {
                const sr = ctx.sampleRate, len = sr * 2.8;
                const imp = ctx.createBuffer(2, len, sr);
                const L = imp.getChannelData(0), R = imp.getChannelData(1);
                for (let i=0; i<len; i++) {
                    const d = Math.exp(-i/(sr*0.6));
                    L[i] = (Math.random()*2-1)*d;
                    R[i] = (Math.random()*2-1)*d;
                }
                reverbNode = ctx.createConvolver();
                reverbNode.buffer = imp;
                reverbNode.normalize = true;
                // connect to masterGain if it exists
                if (masterGain) {
                    try { reverbNode.connect(masterGain); } catch(e) { /* ignore */ }
                }
            } catch(e) { console.warn('Reverb init error:', e); reverbNode = null; }
        }

        function ensureAudioNodes(ctx) {
            if (!masterGain) {
                masterGain = ctx.createGain();
                masterGain.gain.value = 0.22;
                const comp = ctx.createDynamicsCompressor();
                comp.threshold.value = -24;
                comp.knee.value = 30;
                comp.ratio.value = 10;
                comp.attack.value = 0.003;
                comp.release.value = 0.25;
                masterGain.connect(comp);
                comp.connect(ctx.destination);
            }
            if (!dryGain) {
                dryGain = ctx.createGain();
                dryGain.gain.value = 0.8;
                dryGain.connect(masterGain);
            }
            if (!wetGain) {
                wetGain = ctx.createGain();
                wetGain.gain.value = 0.45;
                if (reverbNode) {
                    try { wetGain.connect(reverbNode); } catch(e) { wetGain.connect(masterGain); }
                } else {
                    wetGain.connect(masterGain);
                }
            }
            if (reverbNode && !reverbNode._connected && masterGain) {
                try { reverbNode.connect(masterGain); reverbNode._connected = true; } catch(e) {}
            }
        }

        async function getAudioContext() {
            try {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    ensureAudioNodes(audioCtx);
                    initReverb(audioCtx);
                    ensureAudioNodes(audioCtx);
                    audioInitialized = true;
                }
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                ensureAudioNodes(audioCtx);
                if (reverbNode && !reverbNode._connected && masterGain) {
                    try { reverbNode.connect(masterGain); reverbNode._connected = true; } catch(e) {}
                }
                return audioCtx;
            } catch(err) { console.error('Audio context error:', err); throw err; }
        }

        // ─── CARPENTER SYNTH VOICES ──────────────────────────────────

        function createCarpenterBass(ctx, semitone, intensity, duration, rootFreq = 40) {
            try {
                const now = ctx.currentTime;
                const freq = rootFreq * Math.pow(2, semitone/12);
                const g = ctx.createGain();

                g.gain.setValueAtTime(Math.min(1, intensity*0.30), now+duration-0.4);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq*0.97, now);
                osc.frequency.exponentialRampToValueAtTime(freq, now+0.12);

                g2.connect(filt);

        function createCarpenterPad(ctx, rootFreq, duration, intensity, detuneSpread = 12) {
            try {
                const now = ctx.currentTime;
                const g = ctx.createGain();
                g.gain.setValueAtTime(0, now);
                g.gain.linearRampToValueAtTime(Math.min(1, intensity*0.15), now+1.5);
                g.gain.setValueAtTime(Math.min(1, intensity*0.15), now+duration-2);
                g.gain.exponentialRampToValueAtTime(0.001, now+duration+1);
                const oscs = [];
                for (let i=0; i<5; i++) {
                    const o = ctx.createOscillator();
                    o.type = i<3 ? 'sawtooth' : 'triangle';
                    const det = (i-2)*detuneSpread*0.7;
                    o.frequency.value = rootFreq * Math.pow(2, det/1200);
                    const vib = ctx.createOscillator();
                    vib.type = 'sine';
                    vib.frequency.value = 3+i*0.7;
                    const vg = ctx.createGain();
                    vg.gain.value = 1.5+i*0.8;
                    vib.connect(vg);
                    vg.connect(o.frequency);
                    oscs.push(o, vib);
                }
                const filt = ctx.createBiquadFilter();
                filt.type = 'lowpass';
                filt.frequency.setValueAtTime(200+intensity*300, now);
                filt.frequency.exponentialRampToValueAtTime(100+intensity*200, now+duration);
                filt.Q.value = 2.2;
                const lfo = ctx.createOscillator();

                lfo.frequency.value = 0.08 + Math.random()*0.1;
                const lg = ctx.createGain();
                lg.gain.value = 120+Math.random()*180;
                lfo.connect(lg);
                lg.connect(filt.frequency);
                oscs.forEach(o => o.connect(filt));
                filt.connect(g);
                if (wetGain) { const w = ctx.createGain(); w.gain.value = 0.55; g.connect(w); w.connect(wetGain); }

        // ─── PATTERN PLAYER ──────────────────────────────────────────

        function expandPattern(arr) {
            if (!Array.isArray(arr)) { arr = [0,0,0,0,0,0,0,0]; }
            arr = arr.map(x => typeof x === 'number' ? x : 0);
            return arr.flatMap(x => [x,x]);
        }

        function startEvolvingPatternPlayer(themeName, rootFreq = 40, scoreData) {
            stopPatternPlayer();
            if (!scoreData || !scoreData[themeName]) { console.warn('No AI score for theme:', themeName); return; }
            const theme = scoreData[themeName];
            const bpm = theme.bpm || 60;
            const bass = expandPattern(theme.bass);
            const kick = expandPattern(theme.kick);
            const snare = expandPattern(theme.snare);
            const hat = expandPattern(theme.hat);
            const variations = [{ name:'AI', bars:8, bass, kick, snare, hat }];
            currentSectionPatterns = variations;
            currentVariationIdx = 0;
            barsInVariation = 0;
            patternStep = 0;
            patternBPM = bpm;
            fillActive = false;
            patternPlayerActive = { active:true, theme:themeName };

            const stepDuration = 60/bpm/4;

            function playStep() {
                if (!patternPlayerActive || !patternPlayerActive.active) return;
                const ctx = audioCtx;
                if (!ctx) { patternPlayerTimeout = setTimeout(playStep, 100); return; }
                const step = patternStep % 16;
                const current = variations[0];
                const isFill = fillActive;
                let bs = isFill ? (step%4===0 ? 0 : step%8===4 ? 7 : 0) : (current.bass[step] || 0);
                if (bs !== 0 || (isFill && step%4===0)) {
                    const dur = isFill ? 0.25 : 1.6;
                    const inten = isFill ? 0.3 : 0.45 + (bs/30);
                    createCarpenterBass(ctx, bs, inten, dur, rootFreq);
                }
                let kv = isFill ? (step%4===0 ? 1 : 0) : (current.kick[step] || 0);
                if (kv === 1) createKick(ctx, isFill ? 0.7 : 0.55);
                let sv = isFill ? (step%8===4 ? 1 : 0) : (current.snare[step] || 0);
                if (sv === 1) createSnare(ctx, isFill ? 0.7 : 0.5);
                let hv = isFill ? (step%2===0 ? 1 : 0) : (current.hat[step] || 0);
                if (hv === 1 && Math.random() < 0.65) createHat(ctx, isFill ? 0.4 : 0.2);
                if (step%2===0 && Math.random() < 0.5) {
                    const arpSemitone = (current.bass[step] || 0) + 12;
                    createCarpenterArp(ctx, arpSemitone, 0.25, 0.2, rootFreq*1.5);
                }
                if (step%8===0 && Math.random() < 0.3) {
                    createCarpenterPad(ctx, rootFreq*1.5, 6+Math.random()*4, 0.2, 8);
                }
                patternStep++;
                if (patternStep%16===0) { barsInVariation++; if (barsInVariation>=current.bars) barsInVariation=0; }
                patternPlayerTimeout = setTimeout(playStep, stepDuration*1000);
            }
            patternPlayerTimeout = setTimeout(playStep, 50);
        }

        function stopPatternPlayer() {
            if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout); patternPlayerTimeout = null; }
            if (patternPlayerActive) { patternPlayerActive.active = false; patternPlayerActive = null; }
            patternStep = 0; currentSectionPatterns = []; currentVariationIdx = 0; barsInVariation = 0; fillActive = false;
        }

        // ─── AMBIENT THEMES ──────────────────────────────────────────

        const CARPENTER_AMBIENT = {
            intro:       { rootFreq:45, detuneSpread:10, filterBase:100, lfoRate:0.06, noiseMix:0.12, intensity:0.20, stringLayer:'pad', stringFreq:50, stringIntensity:0.15 },
            setup:       { rootFreq:48, detuneSpread:12, filterBase:110, lfoRate:0.08, noiseMix:0.18, intensity:0.28, stringLayer:'pad', stringFreq:55, stringIntensity:0.20 },
            scheme:      { rootFreq:50, detuneSpread:14, filterBase:90,  lfoRate:0.10, noiseMix:0.25, intensity:0.35, stringLayer:'pad', stringFreq:58, stringIntensity:0.28 },
            execution:   { rootFreq:52, detuneSpread:16, filterBase:80,  lfoRate:0.12, noiseMix:0.30, intensity:0.45, stringLayer:'pad', stringFreq:60, stringIntensity:0.35 },
            twist:       { rootFreq:46, detuneSpread:18, filterBase:70,  lfoRate:0.14, noiseMix:0.35, intensity:0.50, stringLayer:'pad', stringFreq:48, stringIntensity:0.40 },
            closing:     { rootFreq:42, detuneSpread:8,  filterBase:120, lfoRate:0.04, noiseMix:0.08, intensity:0.15, stringLayer:'pad', stringFreq:45, stringIntensity:0.12 }
        };

        function startStringLayer(theme) {
            if (!audioCtx) return;
            stopStringAmbient();
            const ctx = audioCtx;
            const now = ctx.currentTime;
            const freq = theme.stringFreq || 50;
            const intensity = theme.stringIntensity || 0.2;
            const g = ctx.createGain();
            g.gain.setValueAtTime(0, now);
            g.gain.linearRampToValueAtTime(Math.min(1, intensity*0.25), now+2);
            const filt = ctx.createBiquadFilter();
            filt.type = 'lowpass';
            filt.frequency.value = 400;
            filt.Q.value = 2.0;
            const oscs = [];
            for (let i=0; i<5; i++) {
                const o = ctx.createOscillator();
                o.type = i<3 ? 'sawtooth' : 'triangle';
                o.frequency.value = freq * (1 + (i-2)*0.006);
                const vib = ctx.createOscillator();
                vib.type = 'sine';
                vib.frequency.value = 3+i*0.5;
                const vg = ctx.createGain();
                vg.gain.value = 1.5+i*0.6;
                vib.connect(vg);
                vg.connect(o.frequency);
                oscs.push(o, vib);
                o.connect(filt);
            }
            filt.connect(g);
            if (wetGain) { const w = ctx.createGain(); w.gain.value = 0.55; g.connect(w); w.connect(wetGain); }
            if (dryGain) g.connect(dryGain);
            if (!wetGain && !dryGain) g.connect(masterGain || ctx.destination);
            oscs.forEach(n => n.start(now));
            stringAmbientActive = {
                nodes: oscs,
                gainNode: g,
                stop: () => {
                    g.gain.linearRampToValueAtTime(0, ctx.currentTime+0.8);
                    oscs.forEach(n => { try { n.stop(ctx.currentTime+1.0); } catch(e) {} });
                }
            };
        }

        function stopStringAmbient() {
            if (stringAmbientActive) { stringAmbientActive.stop(); stringAmbientActive = null; }
        }

        function startSectionAmbient(themeName, scoreData) {
            if (!audioCtx) return;
            stopSectionAmbient();
            const theme = CARPENTER_AMBIENT[themeName] || CARPENTER_AMBIENT.intro;
            const ctx = audioCtx;
            const now = ctx.currentTime;
            const g = ctx.createGain();
            g.gain.setValueAtTime(0, now);
            g.gain.linearRampToValueAtTime(Math.min(1, theme.intensity*0.25), now+1.5);
            const oscs = [];
            for (let i=0; i<3; i++) {
                const o = ctx.createOscillator();
                o.type = i===0 ? 'sawtooth' : 'triangle';
                const det = (i-1)*theme.detuneSpread;
                o.frequency.value = theme.rootFreq * Math.pow(2, det/1200);
                oscs.push(o);
            }
            const filt = ctx.createBiquadFilter();
            filt.type = 'lowpass';
            filt.frequency.value = theme.filterBase;
            filt.Q.value = 2.5;
            const lfo = ctx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = theme.lfoRate;
            const lg = ctx.createGain();
            lg.gain.value = 70;
            lfo.connect(lg);
            lg.connect(filt.frequency);
            oscs.forEach(o => o.connect(filt));
            filt.connect(g);
            if (wetGain) { const w = ctx.createGain(); w.gain.value = 0.5; g.connect(w); w.connect(wetGain); }
            if (dryGain) g.connect(dryGain);
            if (!wetGain && !dryGain) g.connect(masterGain || ctx.destination);
            oscs.forEach(o => o.start(now));
            lfo.start(now);
            if (theme.noiseMix > 0) {
                const bufSize = ctx.sampleRate*2;
                const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                const d = buf.getChannelData(0);
                for (let i=0; i<bufSize; i++) d[i] = (Math.random()*2-1)*theme.noiseMix;
                const noise = ctx.createBufferSource();
                noise.buffer = buf;
                noise.loop = true;
                const nf = ctx.createBiquadFilter();
                nf.type = 'lowpass';
                nf.frequency.value = theme.filterBase*0.7;
                nf.Q.value = 0.3;
                const ng = ctx.createGain();
                ng.gain.value = theme.noiseMix*0.25;
                noise.connect(nf);
                nf.connect(ng);
                ng.connect(g);
                noise.start(now);
                oscs.push(noise);
            }
            sectionAmbientActive = {
                stop: () => {
                    g.gain.linearRampToValueAtTime(0, ctx.currentTime+0.5);
                    oscs.forEach(s => { try { s.stop(ctx.currentTime+0.7); } catch(e) {} });
                    try { lfo.stop(ctx.currentTime+0.7); } catch(e) {}
                    sectionAmbientActive = null;
                }
            };
            startStringLayer(theme);
            startEvolvingPatternPlayer(themeName, 40, scoreData);
        }

        function transitionSectionTheme(themeName, scoreData) {
            if (scoreData) sectionThemeScore = scoreData;
            startSectionAmbient(themeName, scoreData);
        }

        function stopSectionAmbient() {
            if (sectionAmbientActive) { sectionAmbientActive.stop(); sectionAmbientActive = null; }
            stopStringAmbient();
            stopPatternPlayer();
        }

        // ─── MASTER playSound ────────────────────────────────────────

        async function playSound(type, intensity = 0.7) {
            try {
                const ctx = await getAudioContext();
                if (!ctx) return;
                intensity = Math.min(1, Math.max(0.1, intensity));
                switch(type) {
                    case 'pad': createCarpenterPad(ctx, 55+Math.random()*25, 14+Math.random()*14, intensity, 10); break;
                    case 'sting': createCarpenterSting(ctx, intensity); break;
                    case 'heartbeat':
                    case 'pulse': createCarpenterPulse(ctx, intensity); setTimeout(()=>createCarpenterPulse(ctx,intensity*0.8),180); break;
                    case 'thunder': createCarpenterThunder(ctx, intensity); break;
                    case 'bell': createCarpenterBell(ctx, intensity); break;
                    case 'climax': createCarpenterClimax(ctx, intensity); break;
                    case 'bass': { const sem = Math.floor(Math.random()*12); createCarpenterBass(ctx, sem, intensity, 1.8+Math.random()*1.5, 40); break; }
                    case 'kick': createKick(ctx, intensity); break;
                    case 'snare': createSnare(ctx, intensity); break;
                    case 'hat': createHat(ctx, intensity*0.6); break;
                    case 'lead': { const freq = 80+Math.random()*120; createCarpenterLead(ctx, freq, 0.6+Math.random()*0.8, intensity); break; }
                    default: console.warn('Unknown sound type:', type);
                }
            } catch(err) { /* silent */ }
        }

        // ─── AMBIENT LOOP ─────────────────────────────────────────────

        async function playAmbient(type, durationSeconds, intensity = 0.5) {
            try {
                stopAmbient();
                const ctx = await getAudioContext();
                const now = ctx.currentTime;
                const g = ctx.createGain();
                g.gain.setValueAtTime(Math.min(1, intensity*0.20), now);
                g.connect(ctx.destination);
                ambientGain = g;
                let src = null;
                if (type === 'ambient_drone' || type === 'wind_howl') {
                    const bufSize = ctx.sampleRate*1.5;
                    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                    const d = buf.getChannelData(0);
                    for (let i=0; i<bufSize; i++) d[i] = (Math.random()*2-1)*0.35;
                    const noise = ctx.createBufferSource();
                    noise.buffer = buf;
                    noise.loop = true;
                    const filt = ctx.createBiquadFilter();
                    filt.type = 'lowpass';
                    filt.frequency.value = type==='ambient_drone' ? 140 : 400;
                    filt.Q.value = 0.4;
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = type==='ambient_drone' ? 60 : 90;
                    const og = ctx.createGain();
                    og.gain.value = 0.12*intensity;
                    osc.connect(og);
                    og.connect(filt);
                    noise.connect(filt);
                    filt.connect(g);
                    osc.start(now);
                    noise.start(now);
                    src = { osc, noise };
                    ambientSource = src;
                } else {
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = 70;
                    osc.connect(g);
                    osc.start(now);
                    src = { osc };
                    ambientSource = src;
                }
                if (ambientTimeout) clearTimeout(ambientTimeout);
                ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds*1000);
            } catch(err) { /* silent */ }
        }

        function stopAmbient() {
            if (ambientGain) {
                const now = audioCtx ? audioCtx.currentTime : 0;
                ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                ambientGain.gain.exponentialRampToValueAtTime(0.001, now+0.4);
                setTimeout(() => {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                    if (ambientGain) { ambientGain.disconnect(); ambientGain = null; }
                }, 400);
            } else {
                if (ambientSource) {
                    if (ambientSource.osc) ambientSource.osc.stop();
                    if (ambientSource.noise) ambientSource.noise.stop();
                    ambientSource = null;
                }
            }
            if (ambientTimeout) { clearTimeout(ambientTimeout); ambientTimeout = null; }
        }

        async function mistralChat(msgs, maxTok = 500, timeoutMs = 28000) {
            if (!apiKey) throw new Error('API key missing');
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const res = await fetch(MISTRAL_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
                    body: JSON.stringify({ model:MODEL, messages:msgs, temperature:0.9, max_tokens:maxTok }),
                    signal: controller.signal
                });
                if (!res.ok) { const errText = await res.text(); throw new Error(`API error ${res.status}: ${errText}`); }
                const data = await res.json();
                return data.choices[0].message.content.trim();
            } catch(e) {
                if (e.name === 'AbortError') throw new Error('Request timed out. Please try again.');
                throw e;
            } finally { clearTimeout(timeout); }
        }

        async function generateImage(prompt) {
            const now = Date.now();
            if (now < gameState.imageCooldownUntil) {
                await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
            }
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', 1980s thriller film still, neon noir, grainy 35mm, dark cinematic')}?width=512&height=640&seed=${Date.now()}`;
            return new Promise((resolve, reject) => {
                const img = new Image();
                let resolved = false;
                const timeout = setTimeout(() => { if (!resolved) { resolved = true; reject(new Error('Image load timeout')); } }, 15000);
                img.onload = () => { if (!resolved) { resolved = true; clearTimeout(timeout); resolve(url); } };
                img.onerror = () => { if (!resolved) { resolved = true; clearTimeout(timeout); reject(new Error('Image load error')); } };
                img.src = url;
            });
        }

        async function generateImageWithRetry(prompt, retries = 2) {
            let lastError = null;
            for (let i=0; i<retries; i++) {
                try { return await generateImage(prompt); } catch(e) { lastError = e; await new Promise(r => setTimeout(r, 20)); }
            }
            throw lastError || new Error('Image generation failed');
        }

        function typewriterEffect(element, text, speed, onChar = null) {
            return new Promise((resolve) => {
                let i = 0;
                element.textContent = '';
                const timer = setInterval(() => {
                    if (i < text.length) {
                        element.textContent += text.charAt(i);
                        if (onChar) onChar(i);
                        i++;
                    } else { clearInterval(timer); resolve(); }
                }, speed);
            });
        }

        function speakTextMale(text) {
            return new Promise((resolve) => {
                if (!text) { resolve(); return; }
                const doSpeak = () => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = 0.62;
                    utterance.pitch = 0.9;
                    utterance.onend = () => resolve();
                    utterance.onerror = () => resolve();
                    speechSynthesis.speak(utterance);
                };
                if (speechSynthesis.getVoices().length === 0) {
                    speechSynthesis.onvoiceschanged = doSpeak;
                } else {
                    doSpeak();
                }
            });
        }

        // ─── STORY & SCORE GENERATION ───────────────────────────────

        async function generateNewNocturneStory() {
            const system = `You are James McCracken, a small-town locksmith in 1980s Indiana. You narrate your case files in tight, visceral prose – unflinching, grounded, and brutally human.`;
            const prompt = `Write a 900 to 1100 word short story set in the 1980s in a rural small town. This is a case file from James McCracken's locksmith service. Follow this EXACT episode structure:

OPENING: The phone rings late at night. McCracken answers: "McCracken Locksmith Service." A stranger needs help.

ACT ONE – THE CALL: Describe who needs him (homeowner, tenant, business owner, hotel manager, traveler, farmer, police officer, elderly person, teenager, stranger) and why they're locked out (lost keys, broken lock, jammed door, damaged vehicle, forgotten combination, emergency).

ACT TWO – THE DOOR: McCracken arrives. The customer explains. But something feels wrong. Small details: they avoid eye contact, give strange instructions, don't want him inside, keep checking the clock, insist he leaves quickly.

ACT THREE – WHAT HE FINDS: Behind the door – NOT supernatural, but HUMAN. A hidden secret, a crime, a lie, a disturbing discovery, a person in danger, evidence someone tried to hide. McCracken is caught between his professional duty ("A locksmith doesn't ask why the door is locked. He only opens it.") and his human conscience.

STRICT RULES: No supernatural elements – no ghosts, curses, magic, or dreams. The horror must be purely human – sadism, violence, obsession, greed, pride, or paranoia. The twist must be realistic and earned. No dream cop-outs. Make it brutal, unflinching, in the style of Stephen King meets Hitchcock. X-rated themes allowed.

Frame the story with McCracken's terse, professional narration. Return ONLY a valid JSON object with these fields: title (string – a case file title like "The Henderson Farm Call" or "Room 204 at the Millbrook Motel"), story (full narration string, use backslash n for line breaks), closing_remark (McCracken's cold, terse sign-off – something a weary locksmith would mutter to himself after the job). Output raw JSON only, no markdown.`;
            const resp = await mistralChat([{ role:'system', content:system }, { role:'user', content:prompt }], 3500, 45000);
            let jsonStr = resp.replace(/```json|```/g,'').replace(/`/g,'').trim();
            const story = JSON.parse(jsonStr);
            story.story = story.story.replace(/\\n/g, '\n');
            if (!story.title || !story.story || !story.closing_remark) {
                throw new Error('Invalid story structure – missing title, story, or closing_remark');
            }
            let imageUrl = null;
            try {
                const imagePrompt = `Thriller movie poster for a story titled "${story.title}", 1980s neon noir style, dark and moody, cinematic, grainy, locksmith tools`;
                imageUrl = await generateImageWithRetry(imagePrompt, 2);
            } catch(e) { console.warn('Could not generate case photo:', e); }
            gameState.nocturnePerformance = {
                title: story.title,
                story: story.story,
                closing_remark: story.closing_remark,
                imageUrl: imageUrl || '',
                rawStoryText: story.story,
                soundCues: null
            };
            saveState();
        }

        async function generateSoundCueSheet(storyText) {
            const length = storyText.length;
            const system = `You are a sound designer for a John Carpenter-style 80s synth score. Given a short story, return a JSON object with THREE keys:
- "sections": an array of 5-6 sections dividing the story into emotional acts. Each section: "theme" (one of: intro, setup, scheme, execution, twist, closing), "start_char" (inclusive), "end_char" (exclusive). Cover the entire story from 0 to ${length}.
- "cues": an array of sound events using only these types: "sting", "pulse", "thunder", "bell", "climax", "pad", "bass", "kick", "snare", "hat", "lead". At least 35 cues spread evenly. Each cue: "position" (character index), "type", "intensity" (0-1).
- "score": an object with keys matching the theme names. Each key: "bpm" (130-180, driving punk synth tempo), "bass" (array of 8 integers 0-24 – aggressive bass lines), "kick" (array of 8 0/1), "snare" (array of 8 0/1), "hat" (array of 8 0/1). Make it driving and aggressive – Carpenter style.

Return ONLY raw JSON.`;
            const userPrompt = `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and Carpenter-style score patterns.`;
            const resp = await mistralChat([{ role:'system', content:system }, { role:'user', content:userPrompt }], 4000, 35000);
            const cleaned = resp.replace(/```json|```/g,'').trim();
            let data;
            try { data = JSON.parse(cleaned); } catch(parseErr) {
                const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                if (match) { const candidate = match[0].replace(/,\s*([}\]])/g,'$1'); try { data = JSON.parse(candidate); } catch(e2) { throw new Error('Failed to parse AI soundtrack JSON.'); } }
                else throw new Error('No JSON found in AI response.');
            }
            if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object') {
                throw new Error('Missing sections, cues, or score in AI response');
            }
            const sortedSections = data.sections.sort((a,b) => a.start_char - b.start_char);
            if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length-1].end_char < length) {
                sortedSections[0].start_char = 0;
                sortedSections[sortedSections.length-1].end_char = length;
            }
            const cues = data.cues.map(c => ({ type:c.type, position:Math.min(c.position, length-1), intensity:c.intensity || 0.7 }));

            const requiredThemes = ['intro','setup','scheme','execution','twist','closing'];
            const score = {};

            function normalizeArray(arr, maxVal=24) {
                if (!Array.isArray(arr)) throw new Error('Expected array, got '+typeof arr);
                let clean = arr.map(v => { const n = Number(v); return isNaN(n) ? 0 : Math.min(maxVal, Math.max(0, Math.round(n))); });
                while (clean.length < 8) clean.push(0);
                if (clean.length > 8) clean = clean.slice(0,8);
                return clean;
            }

            for (const theme of requiredThemes) {
                if (!data.score[theme]) throw new Error(`AI did not provide a score for theme "${theme}".`);
                const s = data.score[theme];
                if (typeof s.bpm !== 'number' || s.bpm < 60 || s.bpm > 220) {
                    throw new Error(`Invalid bpm for theme "${theme}": ${s.bpm}`);
                }
                score[theme] = {
                    bpm: s.bpm,
                    bass: normalizeArray(s.bass, 24),
                    kick: normalizeArray(s.kick, 1),
                    snare: normalizeArray(s.snare, 1),
                    hat: normalizeArray(s.hat, 1)
                };
            }
            return { sections: sortedSections, cues, score };
        }

        async function generateAndPerform() {
            await generateNewNocturneStory();
            if (!gameState.nocturnePerformance) throw new Error('Failed to generate story');
            const soundtrack = await generateSoundCueSheet(gameState.nocturnePerformance.rawStoryText);
            gameState.nocturnePerformance.soundCues = soundtrack;
            saveState();
            await startNocturnePerformance();
        }

        // ─── PERFORMANCE ─────────────────────────────────────────────

        async function startNocturnePerformance() {
            speechSynthesis.cancel();
            if (window.ch3Timeout) clearTimeout(window.ch3Timeout);
            const storyData = gameState.nocturnePerformance;
            if (!storyData || !storyData.story) { await generateNewNocturneStory(); return startNocturnePerformance(); }

            await getAudioContext();

            let sectionList = null, cueList = null, scoreData = null;
            if (storyData.soundCues) {
                if (Array.isArray(storyData.soundCues)) {
                    cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                    sectionList = storyData.soundCues.sections;
                    cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                    scoreData = storyData.soundCues.score;
                }
            }

            const bubble = document.getElementById('ch3SpeechBubble');
            const dialogue = document.getElementById('ch3Dialogue');
            const imageEl = document.getElementById('ch3SegmentImage');
            if (!bubble || !dialogue) return;
            const guideList = document.getElementById('ch3GuideList');
            if (guideList) guideList.style.display = 'none';
            bubble.style.borderColor = '#ff0033';
            bubble.style.boxShadow = '0 0 30px #ff003388, 0 0 50px #ff003322';
            dialogue.innerHTML = '';
            const oldBack = document.getElementById('ch3BackBtn');
            if (oldBack) oldBack.remove();
            const oldAdd = document.getElementById('ch3AddEpisodeBtn');
            if (oldAdd) oldAdd.remove();

            const posterContainer = document.getElementById('ch3PosterContainer');
            const posterTitle = document.getElementById('ch3PosterTitle');
            if (posterContainer && imageEl && storyData.imageUrl) {
                imageEl.src = storyData.imageUrl;
                imageEl.classList.add('visible');
                imageEl.style.display = 'block';
                posterContainer.classList.remove('no-image','loading');
                posterContainer.classList.add('visible');
                if (posterTitle) posterTitle.textContent = storyData.title || '';
            } else if (posterContainer) posterContainer.classList.add('no-image');

            if (indicatorInterval) clearInterval(indicatorInterval);
            indicatorInterval = setInterval(() => {
                if (patternPlayerActive) {
                    const theme = patternPlayerActive.theme || 'intro';
                    const varIdx = currentVariationIdx;
                    const varName = currentSectionPatterns[varIdx] ? currentSectionPatterns[varIdx].name : 'A';
                    const bar = barsInVariation + 1;
                    updateScoreIndicator(theme, varName, bar);
                } else {
                    updateScoreIndicator('...', '—', 0);
                }
            }, 1000);

            // Intro
            const intro = `"McCracken Locksmith Service. Twenty-four hours. No questions asked. This is the case of '${storyData.title}'. It started with a phone call, late at night. Just like they all do."`;
            dialogue.textContent = '';
            const introSpeech = speakTextMale(intro);
            await typewriterEffect(dialogue, intro, 48);
            await introSpeech;
            await new Promise(r => setTimeout(r, 1400));

            // Start section music
            if (sectionList && sectionList.length > 0) {
                transitionSectionTheme(sectionList[0].theme, scoreData);
            } else if (scoreData) {
                transitionSectionTheme('intro', scoreData);
            }

            const storyText = storyData.rawStoryText || storyData.story;
            if (!storyText) { await showClosing(storyData, dialogue); return; }

            // Build cue checker
            let cueChecker = null;
            if (cueList && cueList.length > 0) {
                const sortedCues = [...cueList].sort((a,b) => a.position - b.position);
                let cueIdx = 0;
                const triggered = new Set();
                let lastLog = 0;
                const sortedSections = sectionList ? [...sectionList].sort((a,b) => a.start_char - b.start_char) : [];
                let sectionIdx = 0;
                let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                cueChecker = function check(idx) {
                    if (idx - lastLog > 500) { lastLog = idx; }
                    while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                        const sec = sortedSections[sectionIdx];
                        if (sec.theme !== currentTheme) {
                            currentTheme = sec.theme;
                            transitionSectionTheme(currentTheme, scoreData);
                        }
                        sectionIdx++;
                    }
                    while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                        const cue = sortedCues[cueIdx];
                        if (!triggered.has(cueIdx)) {
                            triggered.add(cueIdx);
                            playSound(cue.type, cue.intensity);
                        }
                        cueIdx++;
                    }
                };
            }

            dialogue.textContent = '';
            const typingPromise = typewriterEffect(dialogue, storyText, 30, cueChecker);
            const speechPromise = speakTextMale(storyText);
            await speechPromise;
            await typingPromise;

            await showClosing(storyData, dialogue);
        }

        async function showClosing(storyData, dialogue) {
            const closing = `"${storyData.closing_remark}"`;
            const closingLine = document.createElement('p');
            closingLine.style.marginTop = '16px';
            closingLine.style.fontStyle = 'italic';
            closingLine.style.color = '#f5f0ff';
            closingLine.style.textShadow = '0 0 6px #ff003344';
            dialogue.appendChild(closingLine);
            const closeSpeech = speakTextMale(closing);
            await typewriterEffect(closingLine, closing, 42);
            await closeSpeech;
            await new Promise(r => setTimeout(r, 800));

            const endText = document.createElement('p');
            endText.textContent = '— McCracken hangs up the phone. Another night, another door. —';
            stopSectionAmbient();
            stopAmbient();
            if (indicatorInterval) { clearInterval(indicatorInterval); indicatorInterval = null; }
            const indicator = document.getElementById('scoreIndicator');
            if (indicator) indicator.style.display = 'none';
            endText.style.color = '#6e6a78';
            endText.style.fontSize = '13px';
            dialogue.appendChild(endText);

            const btnRow = document.createElement('div');
            btnRow.style.marginTop = '12px';
            btnRow.style.display = 'flex';
            btnRow.style.gap = '8px';
            btnRow.style.justifyContent = 'flex-end';
            const leaveBtn = document.createElement('button');
            leaveBtn.className = 'btn back-btn';
            leaveBtn.textContent = '← Back to Van';
            leaveBtn.addEventListener('click', () => { leaveTheater(); });
            btnRow.appendChild(leaveBtn);
            const addBtn = document.createElement('button');
            addBtn.className = 'btn accent';
            addBtn.id = 'ch3AddEpisodeBtn';
            addBtn.textContent = '📁 File Case';
            addBtn.addEventListener('click', () => { addCurrentEpisode(); addBtn.disabled = true; addBtn.textContent = '✓ Filed'; });
            btnRow.appendChild(addBtn);
            dialogue.appendChild(btnRow);
        }

        function addCurrentEpisode() {
            const perf = gameState.nocturnePerformance;
            if (!perf) return;
            gameState.ch3Episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
            saveState();
            setTimeout(() => leaveTheater(), 500);
        }

        function leaveTheater() {
            stopAmbient();
            stopSectionAmbient();
            if (indicatorInterval) { clearInterval(indicatorInterval); indicatorInterval = null; }
            const indicator = document.getElementById('scoreIndicator');
            if (indicator) indicator.style.display = 'none';
            renderChannel3();
        }

        // ─── INIT ────────────────────────────────────────────────────

        function init() {
            loadState();
            renderChannel3();
            document.getElementById('resetApiBtn').addEventListener('click', () => {
                const key = prompt('Enter your Mistral API key:');
                if (key && key.length > 10) { apiKey = key; localStorage.setItem('locksmith_key', key); }
            });
            document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
            document.querySelector('.game-area').addEventListener('click', (e) => {
                const portrait = e.target.closest('.host-portrait');
                if (portrait && HOST_BIO) showModal(HOST_BIO);
            });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
            if (!apiKey) { setTimeout(() => document.getElementById('resetApiBtn').click(), 800); }
            // Resume audio on first user gesture
            document.addEventListener('click', () => { getAudioContext().catch(()=>{}); }, { once: true });
        }
        init();
    })();
    </script>
</body>
