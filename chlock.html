<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>THE LOCKSMITH · 1986</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Special+Elite&family=Bebas+Neue&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --screen-bg: #08080e;
            --panel-bg: #0c0a10;
            --text: #e8e4f0;
            --text-dim: #6e6a78;
            --text-bright: #ffffff;
            --accent: #ff0033;
            --accent-bright: #ff2255;
            --accent-dim: #3d0010;
            --border: #cc0033;
            --border-glow: 0 0 18px #ff003388, 0 0 40px #ff003322;
            --danger: #ff0044;
            --danger-glow: 0 0 16px #ff004466;
            --white-glow: 0 0 12px #ffffff44, 0 0 28px #ffffff22;
            --neon-white: #f5f0ff;
            --neon-red: #ff1a3d;
            --input-bg: #100e16;
            --button-bg: #14111c;
            --button-hover: #1c1628;
            --button-active: #18101c;
            --bevel-light: #2a2434;
            --bevel-dark: #040206;
            --font-title: 'Bebas Neue', 'Roboto Condensed', sans-serif;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 32px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0f0a10 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #111018;
            border-radius: 8px;
            padding: 8px;
            box-shadow: inset 0 0 0 3px #1c1824, 0 0 0 4px #0a0810, 0 0 0 8px #040408, 0 8px 48px #000000dd, 0 0 60px #ff003322;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #ff003388;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 3px;
                max-height: 100vh;
                box-shadow: none;
                background: #0a060c;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 16px;
            right: 20px;
            width: 7px;
            height: 7px;
            background: #ff0033;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff0033cc, 0 0 22px #ff003355, 0 0 40px #ff003322;
            animation: powerGlow 2s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 10px #ff0033cc, 0 0 22px #ff003355;
            }
            50% {
                box-shadow: 0 0 18px #ff2255ee, 0 0 36px #ff003377, 0 0 50px #ff003333;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 13px;
            left: 18px;
            font-family: var(--font-mono);
            font-size: 8px;
            color: #ff003366;
            letter-spacing: 3px;
            z-index: 20;
            text-transform: uppercase;
            text-shadow: 0 0 6px #ff003344;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 2px solid #ff003366;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 1px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.8), inset 0 0 12px rgba(0, 0, 0, 0.55);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.75) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.5;
            }
            99.5% {
                opacity: 0.8;
            }
            99.6% {
                opacity: 0.35;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #06040a;
            border-bottom: 2px solid #ff0033;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-title);
            letter-spacing: 3px;
            box-shadow: 0 2px 24px #000000cc, inset 0 1px 0 #0a0410, 0 0 30px #ff003322;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 1px solid #ff003388;
            border-radius: 2px;
            padding: 10px 14px;
            background: #040208;
            position: relative;
            box-shadow: inset 0 0 24px #ff003311, 0 0 20px #ff003322;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 12px;
            right: 12px;
            height: 1px;
            background: #ff2255;
            box-shadow: 0 0 14px #ff225588, 0 0 30px #ff003344;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #ffffff;
            text-shadow: 0 0 20px #ff0033aa, 0 0 40px #ff003366, 0 2px 4px #000, 0 0 60px #ff003344, 0 0 80px #ffffff33;
            letter-spacing: 5px;
            font-family: var(--font-title);
            line-height: 1.1;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 10px;
            color: #ff003388;
            letter-spacing: 6px;
            margin-top: 4px;
            text-shadow: 0 0 8px #ff003344;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 22px;
                letter-spacing: 3px;
            }
            .marquee-sub {
                letter-spacing: 3px;
                font-size: 8px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #2a0f18 #08060c;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #08060c;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #3d1018;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #282230;
            border-top-color: #342c3c;
            border-left-color: #302834;
            border-right-color: #1c1824;
            border-bottom-color: #100e18;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #1c1824;
            border-left-color: #1c1824;
            border-bottom-color: #342c3c;
            border-right-color: #302834;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #100e18;
        }
        .btn.accent {
            background: #14080e;
            border-color: #ff003366;
            border-top-color: #ff225566;
            border-left-color: #ff003355;
            border-right-color: #2e0f18;
            border-bottom-color: #1a0810;
            color: #f5f0ff;
            box-shadow: 0 2px 0 #00000044, 0 0 14px #ff003333;
            text-shadow: 0 0 8px #ffffff44;
        }
        .btn.accent:active {
            border-top-color: #2e0f18;
            border-left-color: #2e0f18;
            border-bottom-color: #ff225566;
            border-right-color: #ff003355;
            box-shadow: 0 0px 0 #00000044, 0 0 20px #ff003355;
            background: #180a12;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .workshop-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #080610;
            border: 1px solid #ff003344;
            padding: 15px;
            border-radius: 3px;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.6), 0 0 20px #ff003311;
        }
        .workshop-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 2px solid #ff0033;
            box-shadow: 0 0 22px #ff003377, 0 0 0 2px #0a0408, 0 0 40px #ff003322;
            object-fit: cover;
            flex-shrink: 0;
            background: #0a0610;
        }
        .speech-bubble {
            flex: 1;
            background: #0e0c18;
            border: 1px solid #ff003366;
            border-radius: 5px;
            padding: 12px;
            position: relative;
            color: #e8e4f0;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 0 16px #ff003311, inset 0 0 20px rgba(0, 0, 0, 0.4);
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 20px;
            border-width: 7px 10px 7px 0;
            border-style: solid;
            border-color: transparent #ff003377 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #080610;
            border: 1px solid #2a0f18;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #12101a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6e6a78;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 1px solid #ff003366;
            box-shadow: 0 0 20px #ff003344, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #080610;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 35%, rgba(4, 3, 8, 0.9) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 6px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 13px;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow: 0 0 12px #ff0033cc, 0 0 30px #ff003388, 0 2px 4px #000000, 0 0 60px #ff003322;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom, rgba(6, 3, 8, 0.9) 0%, rgba(6, 3, 8, 0.65) 40%, transparent 100%);
            padding: 5px 10px 8px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 8px;
            left: 6px;
            right: 6px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 14px;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 10px #ff003388, 0 0 20px #ff003344, 0 2px 4px #000000;
            background: linear-gradient(to top, rgba(4, 3, 8, 0.9) 0%, rgba(4, 3, 8, 0.55) 50%, transparent 100%);
            padding: 8px 6px 5px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6e6a78;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 10px;
                letter-spacing: 2px;
                top: 3px;
            }
            .poster-overlay-title {
                font-size: 11px;
                bottom: 4px;
            }
        }
        .case-files {
            margin-top: 15px;
            border-top: 1px solid #ff003344;
            padding-top: 10px;
        }
        .case-files h3 {
            font-family: var(--font-title);
            color: #ffffff;
            letter-spacing: 3px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 12px #ff003355, 0 0 30px #ff003322;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0c0a14;
            border: 1px solid #ff003333;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #ff2255;
            min-width: 50px;
            text-shadow: 0 0 6px #ff225544;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #f5f0ff;
            text-shadow: 0 0 4px #ffffff22;
        }
        .guide-desc {
            font-size: 15px;
            color: #6e6a78;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0c0a14;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 2px solid #ff0033;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #e8e4f0;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #14111c;
            border: 1px solid #ff003366;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #e8e4f0;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #ff0033;
            box-shadow: 0 0 14px #ff003355;
        }
        .loading-text {
            color: #ff2255;
            font-style: italic;
            text-shadow: 0 0 8px #ff225544;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #06040a;
            border-top: 1px solid #ff003333;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 10px;
            color: #3a2830;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #ff003355;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #1a1418;
            color: #ff003355;
            font-size: 9px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #ff003366;
            color: #ff2255;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #f5f0ff;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .workshop-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">McCRACKEN LOCKSMITH · EST.1986</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE LOCKSMITH</div>
                    <div class="marquee-sub">⏤ McCracken Locksmith Service ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channel3Panel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🔑 24HR EMERGENCY SERVICE · NO QUESTIONS ASKED</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('locksmith_key') || '';

            const DEFAULT_STATE = {
                ch3Episodes: [],
                nocturnePerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>🔑 James McCracken</h2>
        <p style="text-align:left;">
            <strong>Occupation:</strong> Independent Locksmith<br>
            <strong>Location:</strong> Millbrook, Indiana · Population 4,200<br>
            <strong>Years in Service:</strong> 14<br>
            <strong>Golden Rule:</strong> <em>"A locksmith doesn't ask why the door is locked. He only opens it."</em><br><br>
            James McCracken works alone. No employees. No office staff. Just his van, his tools, and the late-night calls that come after normal people have gone to sleep. He treats every customer with professional courtesy – no judgment, no questions. But after fourteen years of turning locks in the dead of night, he's seen things behind closed doors that no man should witness. Things that test the boundary between professional duty and human conscience.
        </p>
    `;

            // ── SOUND ENGINE (Web Audio API) – 80s PUNK STYLE ──
            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let crossfadeTimeout = null;

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.22;
                    reverbNode.connect(masterGain);
                    const compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.value = -24;
                    compressor.knee.value = 30;
                    compressor.ratio.value = 12;
                    compressor.attack.value = 0.003;
                    compressor.release.value = 0.25;
                    masterGain.connect(compressor);
                    compressor.connect(audioCtx.destination);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 1.0;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.25;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                    reverbNode.connect(masterGain);
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 1.5;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.3));
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            function createSynthPad(ctx, frequency, duration, intensity = 0.6) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.16, now + 0.3);
                gainNode.gain.setValueAtTime(intensity * 0.16, now + duration - 0.8);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.15);
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.005;
                const osc3 = ctx.createOscillator();
                osc3.type = 'square';
                osc3.frequency.value = frequency * 0.998;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 1.5;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.3 + Math.random() * 0.3;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 150 + Math.random() * 150;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);
                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.4);
                osc2.stop(now + duration + 0.4);
                osc3.stop(now + duration + 0.4);
                lfo.stop(now + duration + 0.4);
            }

            function createSting(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.22, now + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                osc.frequency.exponentialRampToValueAtTime(120, now + 1);
                const osc2 = ctx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(350, now);
                osc2.frequency.exponentialRampToValueAtTime(1100, now + 0.15);
                osc2.frequency.exponentialRampToValueAtTime(250, now + 1);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1000;
                filter.Q.value = 0.8;
                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);
                osc.start(now);
                osc2.start(now);
                osc.stop(now + 1.2);
                osc2.stop(now + 1.2);
            }

            function createClimax(ctx, intensity = 0.8) {
                const now = ctx.currentTime;
                const duration = 6 + Math.random() * 4;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.5, now + 1.5);
                gainNode.gain.setValueAtTime(intensity * 0.55, now + duration - 0.8);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(130, now);
                osc1.frequency.exponentialRampToValueAtTime(260, now + duration * 0.5);
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(260, now);
                osc2.frequency.exponentialRampToValueAtTime(520, now + duration * 0.5);
                const osc3 = ctx.createOscillator();
                osc3.type = 'square';
                osc3.frequency.setValueAtTime(130, now);
                osc3.frequency.exponentialRampToValueAtTime(390, now + duration * 0.7);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(350, now);
                filter.frequency.exponentialRampToValueAtTime(1400, now + duration);
                filter.Q.value = 1.8;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.25;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 250;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);
                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.4);
                osc2.stop(now + duration + 0.4);
                osc3.stop(now + duration + 0.4);
                lfo.stop(now + duration + 0.4);
            }

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    switch (type) {
                        case 'pad':
                            const freq = 130 + Math.random() * 50;
                            createSynthPad(ctx, freq, 15 + Math.random() * 15, gainValue);
                            break;
                        case 'sting':
                            createSting(ctx, gainValue);
                            break;
                        case 'heartbeat':
                            playThump(ctx, now, 0.85 * gainValue);
                            setTimeout(() => playThump(ctx, now + 0.12, 0.85 * gainValue), 120);
                            break;
                        case 'thunder': {
                            const bufferSize = ctx.sampleRate * 0.4;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.25));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(gainValue * 0.55, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 120;
                            filter.Q.value = 0.4;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(now);
                            source.stop(now + 0.6);
                            break;
                        }
                        case 'bell': {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 90 + Math.random() * 40;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0, now);
                            gain.gain.linearRampToValueAtTime(gainValue * 0.35, now + 0.08);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 400;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(now);
                            osc.stop(now + 2.5);
                            break;
                        }
                        case 'climax':
                            createClimax(ctx, gainValue);
                            break;
                        default:
                            console.warn(`Unknown sound type: ${type}`);
                    }
                } catch (err) {
                    console.error(`❌ Error in playSound("${type}"):`, err);
                }
            }

            function playThump(ctx, time, intensity) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(70, time);
                osc.frequency.exponentialRampToValueAtTime(35, time + 0.08);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.85, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(time);
                osc.stop(time + 0.08);
            }

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(gainValue * 0.25, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'ambient_drone' || type === 'wind_howl') {
                        const bufferSize = ctx.sampleRate * 1;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.45;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'ambient_drone' ? 250 : 700;
                        filter.Q.value = 0.4;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'ambient_drone' ? 100 : 140;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.18 * gainValue;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 120;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) {
                    console.error(`❌ Error in playAmbient("${type}"):`, err);
                }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 250);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 25000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) { const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`); }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') throw new Error(
                        'Request timed out. Please try again – the AI may be under heavy load.');
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s thriller, neon noir, grainy film, dark cinematic')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e;
                        await new Promise(r => setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else { clearInterval(timer);
                            resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David',
                    'Fred', 'Alex', 'Thomas', 'James'
                ];
                let voice = null;
                for (const name of maleNames) {
                    voice = voices.find(v => v.name.includes(name));
                    if (voice) break;
                }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.62;
                utterance.pitch = 0.9;
                speechSynthesis.speak(utterance);

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) {
                        voice = voices.find(v => v.name.includes(name));
                        if (voice) break;
                    }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.62;
                    utterance.pitch = voiceConfig.pitch || 0.9;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) {
                            currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar);
                            if (cueChecker) cueChecker(currentChar);
                        }
                    };
                    utterance.onend = () => {
                        element.textContent = text;
                        if (cueChecker) cueChecker(text.length);
                        resolve();
                    };
                    utterance.onerror = (e) => {
                        console.warn('TTS error:', e);
                        element.textContent = text;
                        resolve();
                    };
                    speechSynthesis.speak(utterance);
                });
            }

            async function generateNewNocturneStory() {
                const system =
                    `You are James McCracken, a small-town locksmith in 1980s Indiana. You narrate your case files in tight, visceral prose – unflinching, grounded, and brutally human.`;
                const prompt =
                    `Write a 900 to 1100 word short story set in the 1980s in a rural small town. This is a case file from James McCracken's locksmith service. Follow this EXACT episode structure:

OPENING: The phone rings late at night. McCracken answers: "McCracken Locksmith Service." A stranger needs help.

ACT ONE – THE CALL: Describe who needs him (homeowner, tenant, business owner, hotel manager, traveler, farmer, police officer, elderly person, teenager, stranger) and why they're locked out (lost keys, broken lock, jammed door, damaged vehicle, forgotten combination, emergency).

ACT TWO – THE DOOR: McCracken arrives. The customer explains. But something feels wrong. Small details: they avoid eye contact, give strange instructions, don't want him inside, keep checking the clock, insist he leaves quickly.

ACT THREE – WHAT HE FINDS: Behind the door – NOT supernatural, but HUMAN. A hidden secret, a crime, a lie, a disturbing discovery, a person in danger, evidence someone tried to hide. McCracken is caught between his professional duty ("A locksmith doesn't ask why the door is locked. He only opens it.") and his human conscience.

STRICT RULES: No supernatural elements – no ghosts, curses, magic, or dreams. The horror must be purely human – sadism, violence, obsession, greed, pride, or paranoia. The twist must be realistic and earned. No dream cop-outs. Make it brutal, unflinching, in the style of Stephen King meets Hitchcock. X-rated themes allowed.

Frame the story with McCracken's terse, professional narration. Return ONLY a valid JSON object with these fields: title (string – a case file title like "The Henderson Farm Call" or "Room 204 at the Millbrook Motel"), story (full narration string, use backslash n for line breaks), closing_remark (McCracken's cold, terse sign-off – something a weary locksmith would mutter to himself after the job). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: prompt }
                ], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) {
                    throw new Error('Invalid story structure – missing title, story, or closing_remark');
                }
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Thriller movie poster for a story titled "${story.title}", 1980s neon noir style, dark and moody, cinematic, grainy, locksmith tools`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate case photo:', e); }
                gameState.nocturnePerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system = `You are a sound designer for an 80s punk-scored thriller. Given a short story, return a JSON object with THREE keys:
- "sections": an array of 5-6 sections dividing the story into emotional acts. Each section: "theme" (one of: intro, setup, scheme, execution, twist, closing), "start_char" (inclusive), "end_char" (exclusive). Cover the entire story from 0 to ${length}.
- "cues": an array of sound events using only these types: "sting", "heartbeat", "thunder", "bell", "climax". At least 40 cues spread evenly. Each cue: "position" (character index), "type", optional "intensity" (0-1).
- "score": an object with keys matching the theme names. Each key: "bpm" (integer 130-180, fast punk tempo), "bass" (array of 8 semitone intervals from root 0 – aggressive punk bass lines), "arp" (array of 8 semitone intervals – fast arpeggios), "kick" (array of 8 numbers, 1=hit, 0=rest – punk drum patterns), "snare" (same as kick but faster). Make it aggressive and driving. intro should be 140bpm building, execution 170bpm full energy, twist dissonant at 155bpm.

Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and punk score patterns.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: userPrompt }
                ], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try {
                    data = JSON.parse(cleaned);
                } catch (parseErr) {
                    console.warn('AI JSON was malformed, trying to repair…', parseErr);
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try { data = JSON.parse(candidate); } catch (e2) { throw new Error(
                                'Failed to parse AI soundtrack JSON even after repair.'); }
                    } else { throw new Error('No JSON found in AI response.'); }
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object') {
                    throw new Error('Missing sections, cues, or score in AI response');
                }
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char <
                    length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({ type: c.type, position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7 }));
                const requiredThemes = ['intro', 'setup', 'scheme', 'execution', 'twist', 'closing'];
                const score = {};
                for (const theme of requiredThemes) {
                    if (data.score[theme]) {
                        score[theme] = {
                            bpm: data.score[theme].bpm || 150,
                            bass: data.score[theme].bass || [0, 7, 5, 3, 0, 7, 5, 3],
                            arp: data.score[theme].arp || [12, 19, 15, 19, 12, 19, 15, 19],
                            kick: data.score[theme].kick || [1, 0, 1, 0, 1, 0, 1, 0],
                            snare: data.score[theme].snare || [0, 1, 0, 1, 0, 1, 0, 1]
                        };
                    } else {
                        score[theme] = { bpm: 150, bass: [0, 7, 5, 3, 0, 7, 5, 3], arp: [12, 19, 15, 19, 12, 19,
                                15, 19
                            ], kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 1, 0, 1, 0, 1, 0, 1] };
                    }
                }
                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {
                await generateNewNocturneStory();

                const soundtrack = await generateSoundCueSheet(gameState.nocturnePerformance.rawStoryText);

            function createNote(ctx, frequency, startTime, duration, gainValue, type = 'sawtooth') {
                const now = startTime;
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.009;
                const sub = ctx.createOscillator();
                sub.type = 'triangle';
                sub.frequency.value = frequency / 2;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                filter.Q.value = 1.2;
                const filterEnv = ctx.createGain();
                filterEnv.gain.setValueAtTime(1000, now);
                filterEnv.gain.exponentialRampToValueAtTime(250, now + 0.08);
                filterEnv.gain.exponentialRampToValueAtTime(60, now + duration * 0.7);
                filterEnv.connect(filter.frequency);
                const mainGain = ctx.createGain();
                mainGain.gain.setValueAtTime(0, now);
                mainGain.gain.linearRampToValueAtTime(gainValue * 0.35, now + 0.015);
                mainGain.gain.setValueAtTime(gainValue * 0.35, now + duration * 0.5);
                mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.08);
                osc1.connect(filter);
                osc2.connect(filter);
                sub.connect(filter);
                filter.connect(mainGain);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.85;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.35;
                mainGain.connect(drySend);
                mainGain.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);
                osc1.start(now);
                osc2.start(now);
                sub.start(now);
                osc1.stop(now + duration + 0.15);
                osc2.stop(now + duration + 0.15);
                sub.stop(now + duration + 0.15);
            }

            function createKick(ctx, time) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(160, time);
                osc.frequency.exponentialRampToValueAtTime(35, time + 0.06);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.015, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.002));
                }
                const click = ctx.createBufferSource();
                click.buffer = noiseBuffer;
                const clickFilter = ctx.createBiquadFilter();
                clickFilter.type = 'highpass';
                clickFilter.frequency.value = 2500;
                click.connect(clickFilter);
                const gainClick = ctx.createGain();
                gainClick.gain.setValueAtTime(0.55, time);
                gainClick.gain.exponentialRampToValueAtTime(0.001, time + 0.015);
                clickFilter.connect(gainClick);
                const gainBody = ctx.createGain();
                gainBody.gain.setValueAtTime(0.75, time);
                gainBody.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
                osc.connect(gainBody);
                gainBody.connect(dryGain);
                gainClick.connect(dryGain);
                osc.start(time);
                click.start(time);
                osc.stop(time + 0.15);
                click.stop(time + 0.015);
            }

            function createSnare(ctx, time) {
                const body = ctx.createOscillator();
                body.type = 'triangle';
                body.frequency.setValueAtTime(220, time);
                body.frequency.exponentialRampToValueAtTime(90, time + 0.06);
                const bodyGain = ctx.createGain();
                bodyGain.gain.setValueAtTime(0.65, time);
                bodyGain.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
                body.connect(bodyGain);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.025));
                }
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1400;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.75, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                bodyGain.connect(dryGain);
                noiseGain.connect(dryGain);
                body.start(time);
                noise.start(time);
                body.stop(time + 0.08);
                noise.stop(time + 0.12);
            }

            const SCORE_PATTERNS = {
                intro: { bpm: 140, bass: [0, 0, 7, 7, 0, 0, 7, 7], arp: [12, 15, 12, 19, 12, 15, 12, 19],
                    kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] },
                setup: { bpm: 150, bass: [0, 7, 5, 3, 0, 7, 5, 3], arp: [12, 15, 19, 15, 12, 15, 19, 15],
                    kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 1, 0, 1, 0, 1, 0, 1] },
                scheme: { bpm: 160, bass: [0, 3, 5, 7, 8, 7, 5, 3], arp: [12, 15, 19, 22, 24, 22, 19, 15],
                    kick: [1, 1, 1, 0, 1, 1, 1, 0], snare: [0, 0, 1, 1, 0, 0, 1, 1] },
                execution: { bpm: 170, bass: [0, 7, 0, 7, 3, 7, 3, 7], arp: [12, 19, 15, 19, 12, 19, 15, 19],
                    kick: [1, 1, 1, 1, 1, 1, 1, 1], snare: [0, 1, 0, 1, 0, 1, 0, 1] },
                twist: { bpm: 155, bass: [0, 3, 6, 8, 0, 3, 6, 8], arp: [12, 16, 20, 24, 12, 16, 20, 24],
                    kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [1, 1, 1, 1, 1, 1, 1, 1] },
                closing: { bpm: 130, bass: [0, 7, 5, 0, 7, 5, 0, 7], arp: [12, 15, 12, 19, 12, 15, 12, 19],
                    kick: [1, 0, 0, 0, 1, 0, 0, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] }
            };

            function startSectionScore(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                let customScore = null;
                const perf = gameState.nocturnePerformance;
                if (perf && perf.soundCues && perf.soundCues.score) { customScore = perf.soundCues.score; }
                const fallbackTheme = SCORE_PATTERNS[themeName] || SCORE_PATTERNS.intro;
                const theme = (customScore && customScore[themeName]) ? customScore[themeName] : fallbackTheme;
                const rootFreq = 55;
                const beatDuration = 60 / theme.bpm;
                const patternLength = theme.bass.length;
                const ctx = audioCtx;
                let step = 0;
                let nextStepTime = ctx.currentTime;
                const padGain = ctx.createGain();
                padGain.gain.value = 0.08;
                const padOsc1 = ctx.createOscillator();
                padOsc1.type = 'sawtooth';
                padOsc1.frequency.value = rootFreq;
                const padOsc2 = ctx.createOscillator();
                padOsc2.type = 'sawtooth';
                padOsc2.frequency.value = rootFreq * 1.502;
                const padOsc3 = ctx.createOscillator();
                padOsc3.type = 'triangle';
                padOsc3.frequency.value = rootFreq / 2;
                const padFilter = ctx.createBiquadFilter();
                padFilter.type = 'lowpass';
                padFilter.frequency.value = 350;
                padFilter.Q.value = 0.8;
                padOsc1.connect(padFilter);
                padOsc2.connect(padFilter);
                padOsc3.connect(padFilter);
                padFilter.connect(padGain);
                const padDry = ctx.createGain();
                padDry.gain.value = 0.6;
                const padWet = ctx.createGain();
                padWet.gain.value = 0.25;
                padGain.connect(padDry);
                padGain.connect(padWet);
                padDry.connect(dryGain);
                padWet.connect(wetGain);
                padOsc1.start();
                padOsc2.start();
                padOsc3.start();
                const stopSources = [padOsc1, padOsc2, padOsc3];
                let timeoutId;

                function scheduleStep() {
                    if (!sectionAmbientActive) return;
                    const now = nextStepTime;
                    const bassSemitone = theme.bass[step % patternLength];
                    const bassFreq = rootFreq * Math.pow(2, bassSemitone / 12);
                    createNote(ctx, bassFreq, now, beatDuration * 0.85, 0.85, 'sawtooth');
                    const arpSemitone = theme.arp[step % patternLength];
                    const arpFreq = rootFreq * Math.pow(2, arpSemitone / 12);
                    createNote(ctx, arpFreq, now, beatDuration * 0.4, 0.65, 'square');
                    if (theme.kick[step % patternLength]) createKick(ctx, now);
                    if (theme.snare[step % patternLength]) createSnare(ctx, now);
                    step++;
                    nextStepTime += beatDuration;
                    timeoutId = setTimeout(scheduleStep, (nextStepTime - ctx.currentTime) * 1000);
                }
                nextStepTime = ctx.currentTime + 0.05;
                timeoutId = setTimeout(scheduleStep, 50);
                sectionAmbientActive = {
                    stop: () => {
                        clearTimeout(timeoutId);
                        padGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.15);
                        stopSources.forEach(s => { try { s.stop(ctx.currentTime + 0.2); } catch (e) {} });
                        sectionAmbientActive = null;
                    }
                };
            }
            const transitionSectionTheme = startSectionScore;

            function stopSectionAmbient() {
                if (sectionAmbientActive) { sectionAmbientActive.stop();
                    sectionAmbientActive = null; }
                clearTimeout(crossfadeTimeout);
            }

            async function startNocturnePerformance() {
                speechSynthesis.cancel();
                if (window.ch3Timeout) clearTimeout(window.ch3Timeout);
                const storyData = gameState.nocturnePerformance;
                if (!storyData || !storyData.story) { await generateNewNocturneStory(); return startNocturnePerformance(); }
                let sectionList = null;
                let cueList = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) { cueList = storyData.soundCues.filter(c => c.type && c
                            .position !== undefined); } else if (storyData.soundCues.sections && storyData.soundCues
                        .cues) { sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined); }
                }
                const bubble = document.getElementById('ch3SpeechBubble');
                const dialogue = document.getElementById('ch3Dialogue');
                const imageEl = document.getElementById('ch3SegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('ch3GuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#ff0033';
                bubble.style.boxShadow = '0 0 30px #ff003388, 0 0 50px #ff003322';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('ch3BackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('ch3AddEpisodeBtn');
                if (oldAdd) oldAdd.remove();
                const posterContainer = document.getElementById('ch3PosterContainer');
                const posterTitle = document.getElementById('ch3PosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) { posterTitle.textContent = storyData.title || ''; }
                } else if (posterContainer) { posterContainer.classList.add('no-image'); }
                const intro =
                    `"McCracken Locksmith Service. Twenty-four hours. No questions asked. This is the case of '${storyData.title}'. It started with a phone call, late at night. Just like they all do."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 45);
                await new Promise(r => setTimeout(r, 1400));
                if (sectionList && sectionList.length > 0) { transitionSectionTheme(sectionList[0].theme); }
                const storyText = storyData.rawStoryText || storyData.story;
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b.start_char) :
                        [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) { currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme); }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) { triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity); }
                            cueIdx++;
                        }
                    };
                }
                dialogue.textContent = '';
                if (cueChecker) { await speakAndTypeSynced(dialogue, storyText, { rate: 0.62, pitch: 0.9 }, (idx) =>
                        cueChecker(idx)); } else { await speakAndTypeSynced(dialogue, storyText, { rate: 0.62,
                        pitch: 0.9 }); }
                await new Promise(r => setTimeout(r, 1000));
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#f5f0ff';
                closingLine.style.textShadow = '0 0 6px #ff003344';
                dialogue.appendChild(closingLine);
                speakTextMale(closing);
                await typewriterEffect(closingLine, closing, 40);
                await new Promise(r => setTimeout(r, 800));
                const endText = document.createElement('p');
                endText.textContent = '— McCracken hangs up the phone. Another night, another door. —';
                stopSectionAmbient();
                endText.style.color = '#6e6a78';
                endText.style.fontSize = '13px';
                dialogue.appendChild(endText);
                stopAmbient();
                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Back to Van';
                leaveBtn.addEventListener('click', () => { leaveTheater(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'ch3AddEpisodeBtn';
                addBtn.textContent = '📁 File Case';
                addBtn.addEventListener('click', () => { addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Filed'; });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

                        .currentTarget) closeModal(); });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) { showModal(HOST_BIO); }
                });
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
                if (!apiKey) { setTimeout(() => document.getElementById('resetApiBtn').click(), 800); }
            }
            init();
        })();
    </script>
</body>
</html>
