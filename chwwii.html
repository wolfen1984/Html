                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentMission() {
                const mission = gameState.currentMission;

                    entry.innerHTML = `
                        <span class="guide-time">${ep.operation}</span>
                        ${ep.imageUrl ? `
                        <div style="position:relative; width:50px; height:50px; flex-shrink:0; margin-right:8px; border-radius:2px; overflow:hidden; border:1px solid #7a7a78;">
                            <img src="${esc(ep.imageUrl)}" style="width:100%; height:100%; object-fit:cover;" alt="Poster">
                            <div style="position:absolute; top:0; left:0; right:0; font-family:${esc('--font-title')}; font-size:4px; text-align:center; color:#d0cfc5; text-shadow:0 0 3px #ffffff; background:rgba(3,5,8,0.7); padding:1px 2px; letter-spacing:0.5px; line-height:1.1; pointer-events:none;">NIGHTFALL</div>
                            <div style="position:absolute; bottom:0; left:0; right:0; font-family:${esc('--font-display')}; font-size:3.5px; text-align:center; color:#d0cfc5; text-shadow:0 0 2px #000; background:rgba(3,5,8,0.65); padding:1px 2px; line-height:1.2; pointer-events:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(ep.title)}</div>
                        </div>` : ''}
                        <div class="guide-info">
                            <div class="guide-title">"${esc(ep.title)}"</div>
                            <div class="guide-desc">${hasCues ? '🎧 Soundtrack ready' : 'A mission ready to unfold.'}</div>
                        </div>
                        <div class="guide-actions">
                            <button class="btn guide-btn play-saved-btn" data-index="${index}">▶ Play</button>
                            ${!hasCues ? `<button class="btn guide-btn produce-btn" data-index="${index}">🎬 Produce Score</button>` : '<span style="color:#c0b090; font-size:12px;">✅</span>'}
                        </div>
                    `;
                    guideList.appendChild(entry);
                });

                const newBtn = document.createElement('button');
                newBtn.className = 'btn accent';
                newBtn.style.marginTop = '12px';
                newBtn.style.width = '100%';
                newBtn.textContent = '📡 New Mission';
                newBtn.addEventListener('click', async () => {
                    newBtn.disabled = true;
                    newBtn.textContent = '🕵️ Scrambling Mission…';
                    try {
                        await getAudioContext();
                        await generateNewMissionStory();
                        const soundtrack = await generateSoundCueSheet(gameState.currentMission.rawStoryText);
                        gameState.currentMission.soundCues = soundtrack;
                        saveState();
                        await startMission();
                    } catch(e) {
                        showModal(`<h2>Mission Failed</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
                        newBtn.disabled = false;
                        newBtn.textContent = '📡 New Mission';
                    }
                });
                guideList.appendChild(newBtn);

                if (gameState.currentMission && gameState.currentMission.rawStoryText && !gameState.currentMission.soundCues) {
                    const produceBtn = document.createElement('button');
                    produceBtn.className = 'btn';
                    produceBtn.style.marginTop = '6px';
                    produceBtn.style.width = '100%';
                    produceBtn.textContent = '🎬 Produce Soundtrack (Current)';
                    produceBtn.addEventListener('click', async () => {
                        produceBtn.disabled = true;
                        produceBtn.textContent = '🎚️ Composing cues…';
                        try {
                            const cues = await generateSoundCueSheet(gameState.currentMission.rawStoryText);
                            gameState.currentMission.soundCues = cues;
                            saveState();
                            renderOperationPanel();
                        } catch(e) {
                            showModal(`<h2>Soundtrack Failed</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
                            produceBtn.disabled = false;
                            produceBtn.textContent = '🎬 Produce Soundtrack (Current)';
                        }
                    });
                    guideList.appendChild(produceBtn);
                }

                document.querySelectorAll('.play-saved-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const index = parseInt(btn.dataset.index);
                        const ep = gameState.episodes[index];
                        if (!ep) return;
                        gameState.currentMission = { ...ep };
                        saveState();
                        await startMission();
                    });
                });

                document.querySelectorAll('.produce-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const index = parseInt(btn.dataset.index);
                        const ep = gameState.episodes[index];
                        if (!ep || !ep.rawStoryText) return;
                        btn.disabled = true;
                        btn.textContent = '🎚️...';
                        try {
                            const soundtrack = await generateSoundCueSheet(ep.rawStoryText);
                            ep.soundCues = soundtrack;
                            saveState();
                            renderOperationPanel();
                        } catch(err) {
                            showModal(`<h2>Soundtrack Failed</h2><p>${esc(err.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
                            btn.disabled = false;
                            btn.textContent = '🎬 Produce';
                        }
                    });
                });
            }

            // ─── INIT ─────────────────────────────────────────────────

            function init() {
                loadState();
                renderOperationPanel();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) { apiKey = key; localStorage.setItem('nightfall_key', key); }
                });
                document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) showModal(HOST_BIO);
                });
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
                if (!apiKey) setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                document.addEventListener('click', () => { getAudioContext().catch(()=>{}); }, { once: true });
            }
            init();
        })();
    </script>
</body>
</html>
