<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>OPERATION NIGHTFALL · 1945</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&family=Cutive+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --screen-bg: #0a0e14;
            --panel-bg: #101318;
            --text: #d0cfc5;
            --text-dim: #7a7a78;
            --text-bright: #f8f8f2;
            --accent: #f0f0e8;
            --accent-dim: #80807c;
            --border: #e0e0d8;
            --border-glow: 0 0 14px #ffffff55, 0 0 32px #aaaaaa22;
            --danger: #cfcfc5;
            --danger-glow: 0 0 12px #ffffff44;
            --amber: #c0b090;
            --amber-dim: #5c5540;
            --gold: #c0b090;
            --gold-dim: #4a4430;
            --green: #5a7a4a;
            --input-bg: #181c24;
            --button-bg: #1a1c22;
            --button-hover: #252830;
            --button-active: #1c1c24;
            --bevel-light: #383c44;
            --bevel-dark: #040608;
            --font-display: 'Special Elite', cursive;
            --font-title: 'Special Elite', cursive;
            --font-mono: 'Share Tech Mono', 'Cutive Mono', monospace;
            --font-body: 'Cutive Mono', 'Courier New', monospace;
            --scanline-opacity: 0.04;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 30px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #151a22 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #1a1c24;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #383c44, 0 0 0 4px #0a0c10, 0 0 0 8px #06080c, 0 8px 48px #000000dd, 0 0 60px #aaaaaa22;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #80807c;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #12161c;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #c0b090;
            border-radius: 50%;
            box-shadow: 0 0 8px #c0b09088, 0 0 18px #c0b09033;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #c0b09088, 0 0 18px #c0b09033;
            }
            50% {
                box-shadow: 0 0 14px #c0b090bb, 0 0 28px #c0b09055;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #7a7a78;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid var(--border);
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(255, 255, 255, var(--scanline-opacity)) 0px, rgba(255, 255, 255, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #101318;
            border-bottom: 3px solid var(--border);
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #181c24;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid var(--border);
            border-radius: 2px;
            padding: 10px 14px;
            background: #0a0e14;
            position: relative;
            box-shadow: inset 0 0 24px #00000022;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 12px #ffffff88;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #c0b09044;
            box-shadow: 0 0 8px #c0b09033;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: var(--accent);
            text-shadow: 0 0 16px #ffffff88, 0 2px 4px #000, 0 0 40px #aaaaaa88;
            letter-spacing: 3px;
            font-family: var(--font-title);
            line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #7a7a78;
            letter-spacing: 5px;
            margin-top: 3px;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 20px;
                letter-spacing: 1px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #383c44 #0a0e14;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #0a0e14;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #383c44;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #383c44;
            border-top-color: #50545c;
            border-left-color: #484c54;
            border-right-color: #2c3038;
            border-bottom-color: #181c24;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #2c3038;
            border-left-color: #2c3038;
            border-bottom-color: #50545c;
            border-right-color: #484c54;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #181c24;
        }
        .btn.accent {
            background: #1a1c24;
            border-color: #7a7a78;
            border-top-color: #a0a098;
            border-left-color: #8a8a82;
            border-right-color: #4a4c48;
            border-bottom-color: #2a2c28;
            color: #f8f8f2;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #ffffff22;
        }
        .btn.accent:active {
            border-top-color: #4a4c48;
            border-left-color: #4a4c48;
            border-bottom-color: #a0a098;
            border-right-color: #8a8a82;
            box-shadow: 0 0px 0 #00000044, 0 0 16px #ffffff44;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .theater-mask {
            position: relative;
            background: #101318;
            border: 2px solid #7a7a7866;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.8);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0a0e14;
            border: 2px solid var(--border);
            padding: 15px;
            border-radius: 3px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid var(--border);
            box-shadow: 0 0 22px #ffffff66, 0 0 0 2px #1a1c24;
            object-fit: cover;
            flex-shrink: 0;
            background: #101318;
        }
        .speech-bubble {
            flex: 1;
            background: #181c24;
            border: 2px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #d0cfc5;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #e0e0d888 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #0a0e14;
            border: 1px solid #383c44;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #1a1c24;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a7a78;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid var(--border);
            box-shadow: 0 0 20px #ffffff44, inset 0 0 30px rgba(0,0,0,0.5);
            flex-shrink: 0;
            background: #0a0e14;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(3,5,8,0.85) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 14px;
            letter-spacing: 3px;
            color: var(--accent);
            text-shadow: 0 0 10px #ffffffcc, 0 0 30px #ffffff88, 0 2px 4px #000000, 0 0 60px #aaaaaa;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom, rgba(10,14,20,0.9) 0%, rgba(10,14,20,0.7) 40%, transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 16px;
            letter-spacing: 1.5px;
            color: var(--gold);
            text-shadow: 0 0 8px #c0b09088, 0 0 20px #5c554044, 0 2px 4px #000000;
            background: linear-gradient(to top, rgba(3,5,8,0.9) 0%, rgba(3,5,8,0.6) 50%, transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a7a78;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 11px;
                letter-spacing: 2px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 13px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid var(--border);
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #d0cfc5;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 10px #ffffff44;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #181c24;
            border: 1px solid var(--border);
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--accent);
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #d0cfc5;
        }
        .guide-desc {
            font-size: 15px;
            color: #7a7a78;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #181c24;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid var(--accent);
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #d0cfc5;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #1a1c24;
            border: 2px solid #ffffff66;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #d0cfc5;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: var(--accent);
            box-shadow: 0 0 14px #ffffff44;
        }
        .loading-text {
            color: var(--amber);
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #101318;
            border-top: 1px solid #ffffff44;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #7a7a78;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #8a8a82;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #2c3038;
            color: #8a8a82;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #7a7a78;
            color: #d0cfc5;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #d0cfc5;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">OP. NIGHTFALL · CRT-45</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">OPERATION<br>NIGHTFALL</div>
                    <div class="marquee-sub">⏤ 1945 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="operationPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">📡 OPERATION NIGHTFALL · CLASSIFIED</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('nightfall_key') || '';

            const OPERATIONS = [
                'Sabotage', 'Reconnaissance', 'Escape', 'Assassination',
                'Infiltration', 'Rescue', 'Interception', 'Survival', 'Deception', 'Extraction'
            ];

            const DEFAULT_STATE = {
                episodes: [],
                currentMission: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;',
                '"': '&quot;' })[m]);

            const HOST_BIO = `
                <h2>🕵️ Maxwell Croft</h2>
                <p style="text-align:left;">
                    <strong>Show:</strong> <em>Operation Nightfall</em><br>
                    <strong>Bio:</strong> A chain‑smoking ex‑spy who traded the field for a microphone, Croft broadcasts grim tales of WWII espionage from a cramped radio booth in fog‑choked London. His voice carries the weight of every betrayal he’s witnessed, and every story is a warning from the shadows.
                </p>
            `;

            // ── NOIR SOUND ENGINE ──
            let audioCtx = null;
            let ambientGain = null;
            let ambientSource = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let crossfadeTimeout = null;

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.18;
                    reverbNode.connect(masterGain);
                    masterGain.connect(audioCtx.destination);
                    const compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.value = -24;
                    compressor.knee.value = 30;
                    compressor.ratio.value = 12;
                    compressor.attack.value = 0.003;
                    compressor.release.value = 0.25;
                    masterGain.connect(compressor);
                    compressor.connect(audioCtx.destination);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 1.0;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.3;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                    reverbNode.connect(masterGain);
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 2;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.6));
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            function playSound(type, intensity = 0.7) {
                if (!audioCtx) return;
                const ctx = audioCtx;
                const gainValue = Math.min(1, intensity);
                try {
                    switch (type) {
                        case 'sting': createNoirSting(ctx, gainValue); break;
                        case 'heartbeat': 
                            const now = ctx.currentTime;
                            playThump(ctx, now, 0.8 * gainValue);
                            setTimeout(() => playThump(ctx, now + 0.15, 0.8 * gainValue), 150);
                            break;
                        case 'thunder': createNoiseBurst(ctx, 0.6 * gainValue); break;
                        case 'bell': createBell(ctx, gainValue); break;
                        case 'climax': createNoirClimax(ctx, gainValue); break;
                        default: console.warn('Unknown sound type:', type);
                    }
                } catch (e) { console.error('Sound error:', e); }
            }

            function playThump(ctx, time, intensity) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(60, time);
                osc.frequency.exponentialRampToValueAtTime(30, time + 0.1);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.8, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                osc.connect(gain);
                gain.connect(dryGain);
                osc.start(time);
                osc.stop(time + 0.1);
            }

            function createNoiseBurst(ctx, intensity) {
                const now = ctx.currentTime;
                const bufferSize = ctx.sampleRate * 0.2;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.05));
                }
                const source = ctx.createBufferSource();
                source.buffer = buffer;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                source.connect(gain);
                gain.connect(dryGain);
                source.start(now);
                source.stop(now + 0.4);
            }

            function createBell(ctx, intensity) {
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 90 + Math.random() * 20;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(intensity * 0.3, now + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
                osc.connect(gain);
                gain.connect(reverbNode);
                osc.start(now);
                osc.stop(now + 2.5);
            }

            function createNoirSting(ctx, intensity) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.15, now + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
                const osc = ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.exponentialRampToValueAtTime(90, now + 0.8);
                osc.connect(gainNode);
                gainNode.connect(reverbNode);
                osc.start(now);
                osc.stop(now + 1.0);
            }

            function createNoirClimax(ctx, intensity) {
                const now = ctx.currentTime;
                const duration = 8 + Math.random() * 4;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.4, now + 1.5);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = 110;
                const osc2 = ctx.createOscillator();
                osc2.type = 'triangle';
                osc2.frequency.value = 220;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(400, now);
                filter.frequency.exponentialRampToValueAtTime(1000, now + duration);
                osc1.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(wetGain);
                osc1.start(now);
                osc2.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
            }

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.25, ctx.currentTime);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'ambient_drone' || type === 'wind_howl') {
                        const bufferSize = ctx.sampleRate * 1;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.4;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'ambient_drone' ? 250 : 500;
                        filter.Q.value = 0.5;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'ambient_drone' ? 90 : 130;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.2 * intensity;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(ctx.currentTime);
                        noise.start(ctx.currentTime);
                        source = { osc, noise };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => stopAmbient(), durationSeconds * 1000);
                } catch (e) { console.error('Ambient error:', e); }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) {
                            ambientGain.disconnect();
                            ambientGain = null;
                        }
                    }, 300);
                } else if (ambientSource) {
                    if (ambientSource.osc) ambientSource.osc.stop();
                    if (ambientSource.noise) ambientSource.noise.stop();
                    ambientSource = null;
                }
                if (ambientTimeout) {
                    clearTimeout(ambientTimeout);
                    ambientTimeout = null;
                }
            }

            // ── SCORE ENGINE (Jazz/Noir) ──
            function createNote(ctx, frequency, startTime, duration, gainValue, type = 'triangle') {
                const now = startTime;
                const osc1 = ctx.createOscillator();
                osc1.type = 'triangle';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sine';
                osc2.frequency.value = frequency * 1.003;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 800;
                filter.Q.value = 1.2;
                const mainGain = ctx.createGain();
                mainGain.gain.setValueAtTime(0, now);
                mainGain.gain.linearRampToValueAtTime(gainValue * 0.25, now + 0.02);
                mainGain.gain.setValueAtTime(gainValue * 0.25, now + duration * 0.6);
                mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.1);
                osc1.connect(filter);
                osc2.connect(filter);
                filter.connect(mainGain);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.7;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.5;
                mainGain.connect(drySend);
                mainGain.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);
                osc1.start(now);
                osc2.start(now);
                osc1.stop(now + duration + 0.2);
                osc2.stop(now + duration + 0.2);
            }

            function createKick(ctx, time) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(120, time);
                osc.frequency.exponentialRampToValueAtTime(30, time + 0.06);
                const gainBody = ctx.createGain();
                gainBody.gain.setValueAtTime(0.6, time);
                gainBody.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
                osc.connect(gainBody);
                gainBody.connect(dryGain);
                osc.start(time);
                osc.stop(time + 0.15);
            }

            function createSnare(ctx, time) {
                const bufferSize = ctx.sampleRate * 0.1;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.02));
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 1500;
                const gainNoise = ctx.createGain();
                gainNoise.gain.setValueAtTime(0.5, time);
                gainNoise.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
                noise.connect(filter);
                filter.connect(gainNoise);
                gainNoise.connect(dryGain);
                noise.start(time);
                noise.stop(time + 0.08);
            }

            const SCORE_PATTERNS = {
                intro: {
                    bpm: 55, bass: [0,4,7,11,0,4,7,11], arp: [12,16,19,24,12,16,19,24],
                    kick: [1,0,0,0,1,0,0,0], snare: [0,0,0,1,0,0,0,1]
                },

                },

                },

            function startSectionScore(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                let customScore = null;
                const perf = gameState.currentMission;
                if (perf && perf.soundCues && perf.soundCues.score) {
                    customScore = perf.soundCues.score;
                }
                const fallbackTheme = SCORE_PATTERNS[themeName] || SCORE_PATTERNS.intro;
                const theme = (customScore && customScore[themeName]) ? customScore[themeName] : fallbackTheme;
                const rootFreq = 55;
                const beatDuration = 60 / theme.bpm;
                const patternLength = theme.bass.length;
                const ctx = audioCtx;
                let step = 0;
                let nextStepTime = ctx.currentTime + 0.05;
                let timeoutId;
                const padGain = ctx.createGain();
                padGain.gain.value = 0.08;
                const padOsc1 = ctx.createOscillator();
                padOsc1.type = 'triangle';
                padOsc1.frequency.value = rootFreq;
                const padOsc2 = ctx.createOscillator();
                padOsc2.type = 'sine';
                padOsc2.frequency.value = rootFreq * 1.5;
                const padFilter = ctx.createBiquadFilter();
                padFilter.type = 'lowpass';
                padFilter.frequency.value = 350;
                padOsc1.connect(padFilter);
                padOsc2.connect(padFilter);
                padFilter.connect(padGain);
                const padDry = ctx.createGain();
                padDry.gain.value = 0.5;
                const padWet = ctx.createGain();
                padWet.gain.value = 0.3;
                padGain.connect(padDry);
                padGain.connect(padWet);
                padDry.connect(dryGain);
                padWet.connect(wetGain);
                padOsc1.start();
                padOsc2.start();
                const stopSources = [padOsc1, padOsc2];
                function scheduleStep() {
                    if (!sectionAmbientActive) return;
                    const now = nextStepTime;
                    const bassSemitone = theme.bass[step % patternLength];
                    const bassFreq = rootFreq * Math.pow(2, bassSemitone / 12);
                    createNote(ctx, bassFreq, now, beatDuration * 0.85, 0.7, 'triangle');
                    const arpSemitone = theme.arp[step % patternLength];
                    const arpFreq = rootFreq * Math.pow(2, arpSemitone / 12);
                    createNote(ctx, arpFreq, now, beatDuration * 0.4, 0.5, 'sine');
                    if (theme.kick[step % patternLength]) createKick(ctx, now);
                    if (theme.snare[step % patternLength]) createSnare(ctx, now);
                    step++;
                    nextStepTime += beatDuration;
                    timeoutId = setTimeout(scheduleStep, (nextStepTime - ctx.currentTime) * 1000);
                }
                timeoutId = setTimeout(scheduleStep, 50);
                sectionAmbientActive = {
                    stop: () => {
                        clearTimeout(timeoutId);
                        padGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                        stopSources.forEach(s => { try { s.stop(ctx.currentTime + 0.3); } catch(e) {} });
                        sectionAmbientActive = null;
                    }
                };
            }

            function stopSectionAmbient() {
                if (sectionAmbientActive) {
                    sectionAmbientActive.stop();
                    sectionAmbientActive = null;
                }
                clearTimeout(crossfadeTimeout);
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 25000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9, max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) throw new Error(`API error ${res.status}: ${await res.text()}`);
                    return (await res.json()).choices[0].message.content.trim();
                } catch(e) {
                    if (e.name === 'AbortError') throw new Error('Request timed out.');
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', noir spy poster, 1940s, grainy film')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true; reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true; clearTimeout(timeout); resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true; clearTimeout(timeout); reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch(e) { lastError = e; await new Promise(r => setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else { clearInterval(timer); resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'];
                let voice = null;
                for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.65;
                utterance.pitch = 0.92;
                speechSynthesis.speak(utterance);
            }

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.65;
                    utterance.pitch = voiceConfig.pitch || 0.92;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) {
                            currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar);
                            if (cueChecker) cueChecker(currentChar);
                        }
                    };
                    utterance.onend = () => {
                        element.textContent = text;
                        if (cueChecker) cueChecker(text.length);
                        resolve();
                    };
                    utterance.onerror = () => { element.textContent = text; resolve(); };
                    speechSynthesis.speak(utterance);
                });
            }

            async function generateNewMissionStory() {
                const chosenOp = pickRandomOperation();
                const system = `You are Maxwell Croft, a cynical, chain-smoking ex-spy who narrates grim, hard-boiled tales of espionage and survival. Your stories are sadism, grounded, dark and devoid of anything supernatural. Think Stephen King's grittiness meets Hitchcock's suspense.`;
                const prompt = `Write a 500-750 word noir-style wwii spy story set in the 1940s about World War II conspiracy theories. The central operation is: ${chosenOp}. Use tight third-person prose. No ghosts, no magic – only human psychological, violence, and psychological tension. Follow this structure: a tense setup (the mission parameters), a cold scheme, a brutal execution, and an ironic, gut-punch twist where victory becomes a prison (physical or mental). Frame it with Croft's cynical intro and a bitter closing punchline. X-rated themes are allowed. Return ONLY a valid JSON object with fields: title (string), story (full narration, use \\n for line breaks), closing_remark (a chilling sign-off). Output raw JSON, no markdown.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user', content: prompt }], 2000, 45000);

                    soundCues: null,
                    operation: chosenOp

            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system = `You are a sound designer for a noir spy radio drama. Given a story, return a JSON object with THREE keys:
- "sections": an array of 5-6 sections that divide the story into emotional acts. Each section must have: "theme" (one of: intro, setup, scheme, execution, twist, closing), "start_char" (inclusive) and "end_char" (exclusive). The sections must cover the entire story from 0 to ${length}.
- "cues": an array of sound events using only these types: "sting", "heartbeat", "thunder", "bell", "climax". Each cue must have "position" (character index), "type", optional "intensity" (0-1). Include at least 40 cues, spread evenly.
- "score": an object with keys matching the same theme names used in "sections". Each key must contain: "bpm" (integer between 55-75), "bass" (array of 8 semitone intervals from a root of 0), "arp" (array of 8 semitone intervals for an arpeggio), "kick" (array of 8 numbers, 1 = hit, 0 = rest), "snare" (same as kick). Make the music tense and fitting for each theme.
Return ONLY raw JSON.`;
                const userPrompt = `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and score patterns.`;
                const resp = await mistralChat([{ role: 'system', content: system }, { role: 'user', content: userPrompt }], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try {
                    data = JSON.parse(cleaned);
                } catch(parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try { data = JSON.parse(candidate); } catch(e2) { throw new Error('Failed to parse AI soundtrack JSON.'); }
                    } else throw new Error('No JSON found in AI response.');
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                    throw new Error('Missing sections, cues, or score in AI response');
                const sortedSections = data.sections.sort((a,b) => a.start_char - b.start_char);
                sortedSections[0].start_char = 0;
                sortedSections[sortedSections.length-1].end_char = length;
                const cues = data.cues.map(c => ({
                    type: c.type,
                    position: Math.min(c.position, length-1),
                    intensity: c.intensity || 0.7
                }));
                const requiredThemes = ['intro','setup','scheme','execution','twist','closing'];
                const score = {};
                for (const theme of requiredThemes) {
                    if (data.score[theme]) {
                        score[theme] = {
                            bpm: data.score[theme].bpm || 65,
                            bass: data.score[theme].bass || [0,4,7,11,0,4,7,11],
                            arp: data.score[theme].arp || [12,16,19,24,12,16,19,24],
                            kick: data.score[theme].kick || [1,0,1,0,1,0,1,0],
                            snare: data.score[theme].snare || [0,0,0,1,0,0,0,1]
                        };
                    } else {
                        score[theme] = { bpm:65, bass:[0,4,7,11,0,4,7,11], arp:[12,16,19,24,12,16,19,24], kick:[1,0,1,0,1,0,1,0], snare:[0,0,0,1,0,0,0,1] };
                    }
                }
                return { sections: sortedSections, cues, score };
            }

            async function startMission() {
                speechSynthesis.cancel();
                if (window.missionTimeout) clearTimeout(window.missionTimeout);
                // Ensure audio context is ready
                await getAudioContext();
                const mission = gameState.currentMission;
                if (!mission || !mission.story) {
                    await generateNewMissionStory();
                    return startMission();
                }
                let sectionList = null;
                let cueList = null;
                if (mission.soundCues) {
                    if (Array.isArray(mission.soundCues)) {
                        cueList = mission.soundCues.filter(c => c.type && c.position !== undefined);
                    } else if (mission.soundCues.sections && mission.soundCues.cues) {
                        sectionList = mission.soundCues.sections;
                        cueList = mission.soundCues.cues.filter(c => c.type && c.position !== undefined);
                    }
                }
                const bubble = document.getElementById('operationSpeechBubble');
                const dialogue = document.getElementById('operationDialogue');
                const imageEl = document.getElementById('operationSegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('operationGuideList');
                if (guideList) guideList.style.display = 'none';
                const posterContainer = document.getElementById('operationPosterContainer');
                const posterTitle = document.getElementById('operationPosterTitle');
                if (posterContainer && imageEl && mission.imageUrl) {
                    imageEl.src = mission.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) posterTitle.textContent = mission.title || '';
                } else if (posterContainer) {
                    posterContainer.classList.add('no-image');
                }
                dialogue.innerHTML = '';
                const intro = `"The year is 1945. The world is burning, and I’m still here to tell the tales nobody wants to remember. Tonight’s operation: ${mission.operation}. It’s called '${mission.title}'. Listen close."`;
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 45);
                await new Promise(r => setTimeout(r, 1500));
                if (sectionList && sectionList.length > 0) startSectionScore(sectionList[0].theme);
                const storyText = mission.rawStoryText || mission.story;
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a,b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    const sortedSections = sectionList ? [...sectionList].sort((a,b) => a.start_char - b.start_char) : [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) {
                                currentTheme = sec.theme;
                                startSectionScore(currentTheme);
                            }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) {
                                triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity);
                            }
                            cueIdx++;
                        }
                    };
                }
                dialogue.textContent = '';
                if (cueChecker) {
                    await speakAndTypeSynced(dialogue, storyText, { rate:0.65, pitch:0.92 }, (idx) => cueChecker(idx));
                } else {
                    await speakAndTypeSynced(dialogue, storyText, { rate:0.65, pitch:0.92 });
                }
                await new Promise(r => setTimeout(r, 1200));
                const closing = `"${mission.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#d0cfc5';
                dialogue.appendChild(closingLine);
                speakTextMale(closing);
                await typewriterEffect(closingLine, closing, 45);
                await new Promise(r => setTimeout(r, 1000));
                const curtainText = document.createElement('p');
                curtainText.textContent = '— Transmission ends —';
                stopSectionAmbient();
                curtainText.style.color = '#7a7a78';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();
                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Clear Mission';
                leaveBtn.addEventListener('click', () => { clearMission(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.textContent = '➕ Add to Archive';
                addBtn.addEventListener('click', () => {
                    addCurrentMission();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Archived';
                });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentMission() {
                const mission = gameState.currentMission;
                if (!mission) return;
                gameState.episodes.push({ ...mission });
                saveState();
                setTimeout(() => clearMission(), 600);
            }

            function clearMission() {
                stopAmbient();
                stopSectionAmbient();
                renderOperationPanel();
            }

            function renderOperationPanel() {
                const panel = document.getElementById('operationPanel');
                if (!panel) return;
                panel.innerHTML = `
                    <div class="tv-stage theater-mask">
                        <div class="tv-stage-row">
                            <img class="host-portrait" src="maxwell.jpg" alt="Maxwell Croft" style="object-fit:cover;">
                            <div class="speech-bubble" id="operationSpeechBubble">
                                <div class="story-poster-container no-image" id="operationPosterContainer">
                                    <img id="operationSegmentImage" class="segment-image" alt="Mission Poster">
                                    <div class="poster-overlay-theater">OPERATION<br>NIGHTFALL</div>
                                    <div class="poster-overlay-title" id="operationPosterTitle"></div>
                                </div>
                                <div class="segment-text" id="operationDialogue">
                                    "Good evening. I’m Maxwell Croft. War doesn’t end, it just changes faces. Tonight’s transmission will remind you of that."
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tv-guide">
                        <h3>📡 CLASSIFIED TRANSMISSIONS</h3>
                        <div id="operationGuideList"></div>
                    </div>
                `;
                const guideList = document.getElementById('operationGuideList');
                const episodes = gameState.episodes || [];
                episodes.forEach((ep, index) => {
                    const entry = document.createElement('div');
                    entry.className = 'guide-entry';
                    const hasCues = ep.soundCues && (Array.isArray(ep.soundCues) ? ep.soundCues.length > 0 : (ep.soundCues.cues && ep.soundCues.cues.length > 0));
                    entry.innerHTML = `
                        <span class="guide-time">${ep.operation}</span>
                        ${ep.imageUrl ? `
                        <div style="position:relative; width:50px; height:50px; flex-shrink:0; margin-right:8px; border-radius:2px; overflow:hidden; border:1px solid #7a7a78;">
                            <img src="${esc(ep.imageUrl)}" style="width:100%; height:100%; object-fit:cover;" alt="Poster">
                            <div style="position:absolute; top:0; left:0; right:0; font-family:${esc('--font-title')}; font-size:4px; text-align:center; color:#d0cfc5; text-shadow:0 0 3px #ffffff; background:rgba(3,5,8,0.7); padding:1px 2px; letter-spacing:0.5px; line-height:1.1; pointer-events:none;">NIGHTFALL</div>
                            <div style="position:absolute; bottom:0; left:0; right:0; font-family:${esc('--font-display')}; font-size:3.5px; text-align:center; color:#d0cfc5; text-shadow:0 0 2px #000; background:rgba(3,5,8,0.65); padding:1px 2px; line-height:1.2; pointer-events:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(ep.title)}</div>
                        </div>` : ''}
                        <div class="guide-info">
                            <div class="guide-title">"${esc(ep.title)}"</div>
                            <div class="guide-desc">${hasCues ? '🎧 Soundtrack ready' : 'A mission ready to unfold.'}</div>
                        </div>
                        <div class="guide-actions">
                            <button class="btn guide-btn play-saved-btn" data-index="${index}">▶ Play</button>
                            ${!hasCues ? `<button class="btn guide-btn produce-btn" data-index="${index}">🎬 Produce Soundtrack</button>` : '<span style="color:#c0b090; font-size:12px;">✅</span>'}
                        </div>
                    `;
                    guideList.appendChild(entry);
                });
                const newBtn = document.createElement('button');
                newBtn.className = 'btn accent';
                newBtn.style.marginTop = '12px';
                newBtn.style.width = '100%';
                newBtn.textContent = '📡 New Mission';
                newBtn.addEventListener('click', async () => {
                    newBtn.disabled = true;
                    newBtn.textContent = '🕵️ Scrambling Mission…';
                    try {
                        await getAudioContext(); // prime audio context on user click
                        await generateNewMissionStory();
                        const soundtrack = await generateSoundCueSheet(gameState.currentMission.rawStoryText);
                        gameState.currentMission.soundCues = soundtrack;
                        saveState();
                        await startMission();
                    } catch(e) {
                        showModal(`<h2>Mission Failed</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
                        newBtn.disabled = false;
                        newBtn.textContent = '📡 New Mission';
                    }
                });
                guideList.appendChild(newBtn);
                const testBtn = document.createElement('button');
                testBtn.className = 'btn';
                testBtn.textContent = '🔊 Test Sound (Sting + Bell)';
                testBtn.style.marginTop = '6px';
                testBtn.style.width = '100%';
                testBtn.addEventListener('click', async () => {
                    await getAudioContext(); // make sure context is running
                    playSound('sting', 0.6);
                    setTimeout(() => playSound('bell', 0.4), 400);
                    setTimeout(() => playAmbient('ambient_drone', 5, 0.2), 800);
                });
                guideList.appendChild(testBtn);
                if (gameState.currentMission && gameState.currentMission.rawStoryText && !gameState.currentMission.soundCues) {
                    const produceBtn = document.createElement('button');
                    produceBtn.className = 'btn';
                    produceBtn.style.marginTop = '6px';
                    produceBtn.style.width = '100%';
                    produceBtn.textContent = '🎬 Produce Soundtrack (Current)';
                    produceBtn.addEventListener('click', async () => {
                        produceBtn.disabled = true;
                        produceBtn.textContent = '🎚️ Composing cues…';
                        try {
                            const cues = await generateSoundCueSheet(gameState.currentMission.rawStoryText);
                            gameState.currentMission.soundCues = cues;
                            saveState();
                            renderOperationPanel();
                        } catch(e) {
                            showModal(`<h2>Soundtrack Failed</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
                            produceBtn.disabled = false;
                            produceBtn.textContent = '🎬 Produce Soundtrack (Current)';
                        }
                    });
                    guideList.appendChild(produceBtn);
                }
                document.querySelectorAll('.play-saved-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const index = parseInt(btn.dataset.index);
                        const ep = gameState.episodes[index];
                        if (!ep) return;
                        gameState.currentMission = { ...ep };
                        saveState();
                        await startMission();
                    });
                });
                document.querySelectorAll('.produce-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const index = parseInt(btn.dataset.index);
                        const ep = gameState.episodes[index];
                        if (!ep || !ep.rawStoryText) return;
                        btn.disabled = true;
                        btn.textContent = '🎚️...';
                        try {
                            const soundtrack = await generateSoundCueSheet(ep.rawStoryText);
                            ep.soundCues = soundtrack;
                            saveState();
                            renderOperationPanel();
                        } catch(err) {
                            showModal(`<h2>Soundtrack Failed</h2><p>${esc(err.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
                            btn.disabled = false;
                            btn.textContent = '🎬 Produce';
                        }
                    });
                });
            }

            function init() {
                loadState();
                renderOperationPanel();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('nightfall_key', key);
                    }
                });
                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) showModal(HOST_BIO);
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeModal();
                });
                if (!apiKey) {
                    setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                }
            }
            init();
        })();
    </script>
</body>
</html>
