<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover" />
    <title>OPERATION NIGHTFALL · 1945 · NOIR SCORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&family=Cutive+Mono&family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #030508;
            --screen-bg: #0a0e14;
            --panel-bg: #101318;
            --text: #d0cfc5;
            --text-dim: #7a7a78;
            --text-bright: #f8f8f2;
            --accent: #f0f0e8;
            --accent-dim: #80807c;
            --border: #e0e0d8;
            --border-glow: 0 0 14px #ffffff55, 0 0 32px #aaaaaa22;
            --danger: #cfcfc5;
            --danger-glow: 0 0 12px #ffffff44;
            --amber: #c0b090;
            --amber-dim: #5c5540;
            --gold: #c0b090;
            --gold-dim: #4a4430;
            --green: #5a7a4a;
            --input-bg: #181c24;
            --button-bg: #1a1c22;
            --button-hover: #252830;
            --button-active: #1c1c24;
            --bevel-light: #383c44;
            --bevel-dark: #040608;
            --font-display: 'Special Elite', cursive;
            --font-title: 'Special Elite', cursive;
            --font-mono: 'Share Tech Mono', 'Cutive Mono', monospace;
            --font-body: 'Cutive Mono', 'Courier New', monospace;
            --scanline-opacity: 0.04;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 30px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { font-size:var(--text-size-base); -webkit-text-size-adjust:100%; }
        body {
            background:#000; display:flex; justify-content:center; align-items:center;
            min-height:100vh; min-height:100dvh; font-family:var(--font-body);
            padding:0; background-image:radial-gradient(ellipse at center,#151a22 0%,#000 100%);
            overflow-x:hidden; margin:0; color:var(--text);
        }
        .monitor-bezel {
            width:100%; max-width:540px; height:100vh; height:100dvh; max-height:920px;
            background:#1a1c24; border-radius:10px; padding:10px;
            box-shadow:inset 0 0 0 3px #383c44,0 0 0 4px #0a0c10,0 0 0 8px #06080c,0 8px 48px #000000dd,0 0 60px #aaaaaa22;
            display:flex; flex-direction:column; position:relative; border:1px solid #80807c;
        }
        @media (max-width:540px) { .monitor-bezel { border-radius:0; padding:4px; max-height:100vh; box-shadow:none; background:#12161c; border:none; } }
        .power-led {
            position:absolute; bottom:18px; right:22px; width:8px; height:8px;
            background:#c0b090; border-radius:50%;
            box-shadow:0 0 8px #c0b09088,0 0 18px #c0b09033;
            animation:powerGlow 2.4s ease-in-out infinite; z-index:20;
        }
        @keyframes powerGlow { 0%,100%{box-shadow:0 0 8px #c0b09088,0 0 18px #c0b09033;} 50%{box-shadow:0 0 14px #c0b090bb,0 0 28px #c0b09055;} }
        .brand-label { position:absolute; bottom:15px; left:20px; font-family:var(--font-mono); font-size:9px; color:#7a7a78; letter-spacing:2.5px; z-index:20; text-transform:uppercase; }
        .game-shell {
            flex:1; width:100%; background:var(--screen-bg); border-radius:3px;
            border:3px solid var(--border); box-shadow:var(--border-glow),inset 0 0 90px rgba(0,0,0,0.55);
            display:flex; flex-direction:column; overflow:hidden; position:relative;
        }
        @media (max-width:540px) { .game-shell { border-radius:0; border-width:2px; } }
        .screen-curve { position:absolute; inset:0; pointer-events:none; z-index:899; border-radius:1px; box-shadow:inset 0 0 70px rgba(0,0,0,0.75),inset 0 0 12px rgba(0,0,0,0.5); }
        .crt-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:900;
            background:repeating-linear-gradient(0deg,rgba(255,255,255,var(--scanline-opacity)) 0px,rgba(255,255,255,var(--scanline-opacity)) 2px,transparent 2px,transparent 5px);
            border-radius:1px;
        }
        .crt-overlay::after { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(ellipse at center,transparent 38%,rgba(0,0,0,0.7) 100%); border-radius:1px; }
        .screen-flicker { animation:crtFlicker 9s ease-in-out infinite; }
        @keyframes crtFlicker { 0%,99.3%,100%{opacity:1} 99.4%{opacity:0.55} 99.5%{opacity:0.85} 99.6%{opacity:0.4} 99.7%{opacity:1} }
        .marquee {
            position:relative; z-index:10; background:#101318; border-bottom:3px solid var(--border);
            padding:10px 16px; text-align:center; font-family:var(--font-display); letter-spacing:2px;
            box-shadow:0 2px 20px #000000aa,inset 0 1px 0 #181c24; flex-shrink:0;
        }
        .marquee-inner {
            border:2px solid var(--border); border-radius:2px; padding:10px 14px; background:#0a0e14;
            position:relative; box-shadow:inset 0 0 24px #00000022;
        }
        .marquee-inner::before { content:''; position:absolute; top:-2px; left:16px; right:16px; height:2px; background:var(--accent); box-shadow:0 0 12px #ffffff88; }
        .marquee-inner::after { content:''; position:absolute; bottom:-2px; left:16px; right:16px; height:1px; background:#c0b09044; box-shadow:0 0 8px #c0b09033; }
        .marquee-title { font-size:var(--text-size-title); color:var(--accent); text-shadow:0 0 16px #ffffff88,0 2px 4px #000,0 0 40px #aaaaaa88; letter-spacing:3px; font-family:var(--font-title); line-height:1.2; }
        .marquee-sub { font-family:var(--font-mono); font-size:11px; color:#7a7a78; letter-spacing:5px; margin-top:3px; }
        @media (max-width:400px) { .marquee-title { font-size:20px; letter-spacing:1px; } }
        .game-area {
            flex:1; overflow-y:auto; overflow-x:hidden; z-index:5;
            scrollbar-width:thin; scrollbar-color:#383c44 #0a0e14;
            display:flex; flex-direction:column; padding:4px 0;
        }
        .game-area::-webkit-scrollbar { width:5px; }
        .game-area::-webkit-scrollbar-track { background:#0a0e14; }
        .game-area::-webkit-scrollbar-thumb { background:#383c44; border-radius:3px; }
        .panel { display:flex; flex-direction:column; padding:10px; gap:10px; flex:1; }
        .btn {
            background:var(--button-bg); border:2px solid #383c44; border-top-color:#50545c; border-left-color:#484c54;
            border-right-color:#2c3038; border-bottom-color:#181c24; padding:12px 18px; border-radius:3px;
            color:var(--text); cursor:pointer; font-family:var(--font-body); font-size:var(--text-size-base);
            letter-spacing:1px; text-transform:uppercase; transition:all 0.1s; min-height:var(--btn-min-height);
            display:inline-flex; align-items:center; justify-content:center; gap:6px;
            box-shadow:0 2px 0 #00000044; white-space:nowrap;
        }
        .btn:active { border-top-color:#2c3038; border-left-color:#2c3038; border-bottom-color:#50545c; border-right-color:#484c54; box-shadow:0 0px 0 #00000044; transform:translateY(1px); background:#181c24; }
        .btn.accent { background:#1a1c24; border-color:#7a7a78; border-top-color:#a0a098; border-left-color:#8a8a82; border-right-color:#4a4c48; border-bottom-color:#2a2c28; color:#f8f8f2; box-shadow:0 2px 0 #00000044,0 0 10px #ffffff22; }
        .btn.accent:active { border-top-color:#4a4c48; border-left-color:#4a4c48; border-bottom-color:#a0a098; border-right-color:#8a8a82; box-shadow:0 0px 0 #00000044,0 0 16px #ffffff44; }
        .btn:disabled { opacity:0.3; cursor:not-allowed; pointer-events:none; }
        .btn-small { padding:4px 10px; font-size:12px; min-height:28px; }
        .theater-mask { position:relative; background:#101318; border:2px solid #7a7a7866; box-shadow:inset 0 0 36px rgba(0,0,0,0.8); }
        .tv-stage { display:flex; flex-direction:column; gap:12px; background:#0a0e14; border:2px solid var(--border); padding:15px; border-radius:3px; }
        .tv-stage-row { display:flex; align-items:flex-start; gap:15px; width:100%; }
        .host-portrait { width:100px; height:100px; border-radius:4px; border:3px solid var(--border); box-shadow:0 0 22px #ffffff66,0 0 0 2px #1a1c24; object-fit:cover; flex-shrink:0; background:#101318; }
        .speech-bubble {
            flex:1; background:#181c24; border:2px solid var(--border); border-radius:6px; padding:12px;
            position:relative; color:#d0cfc5; font-size:17px; min-height:80px;
            display:flex; flex-direction:column; gap:8px;
        }
        .speech-bubble::before { content:''; position:absolute; left:-12px; top:20px; border-width:8px 12px 8px 0; border-style:solid; border-color:transparent #e0e0d888 transparent transparent; }
        .segment-image { width:100%; border-radius:3px; max-height:200px; object-fit:cover; background:#0a0e14; border:1px solid #383c44; display:none; }
        .segment-image.loading { display:block; height:120px; background:#1a1c24; display:flex; align-items:center; justify-content:center; color:#7a7a78; font-size:14px; animation:pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
        .segment-image.visible { display:block; }
        .segment-text { flex:1; line-height:1.4; }
        .story-poster-container {
            position:relative; display:block; width:100%; max-height:240px; overflow:hidden;
            border-radius:3px; border:2px solid var(--border);
            box-shadow:0 0 20px #ffffff44,inset 0 0 30px rgba(0,0,0,0.5);
            flex-shrink:0; background:#0a0e14;
        }
        .story-poster-container .segment-image { display:block; width:100%; max-height:240px; object-fit:cover; border:none; border-radius:1px; }
        .story-poster-container::after { content:''; position:absolute; inset:0; pointer-events:none; background:radial-gradient(ellipse at center,transparent 40%,rgba(3,5,8,0.85) 100%); z-index:2; }
        .poster-overlay-theater { position:absolute; top:8px; left:0; right:0; text-align:center; z-index:5; pointer-events:none; font-family:var(--font-title); font-size:14px; letter-spacing:3px; color:var(--accent); text-shadow:0 0 10px #ffffffcc,0 0 30px #ffffff88,0 2px 4px #000000,0 0 60px #aaaaaa; text-transform:uppercase; line-height:1.2; background:linear-gradient(to bottom,rgba(10,14,20,0.9) 0%,rgba(10,14,20,0.7) 40%,transparent 100%); padding:6px 12px 10px; }
        .poster-overlay-title { position:absolute; bottom:10px; left:8px; right:8px; text-align:center; z-index:5; pointer-events:none; font-family:var(--font-display); font-size:16px; letter-spacing:1.5px; color:var(--gold); text-shadow:0 0 8px #c0b09088,0 0 20px #5c554044,0 2px 4px #000000; background:linear-gradient(to top,rgba(3,5,8,0.9) 0%,rgba(3,5,8,0.6) 50%,transparent 100%); padding:10px 8px 6px; line-height:1.3; }
        .story-poster-container.no-image { display:none; }
        .story-poster-container.loading { height:140px; display:flex; align-items:center; justify-content:center; color:#7a7a78; font-size:14px; animation:pulse 1.5s ease-in-out infinite; }
        .story-poster-container.loading .segment-image,.story-poster-container.loading .poster-overlay-theater,.story-poster-container.loading .poster-overlay-title { display:none; }
        @media (max-width:480px) {
            .story-poster-container { max-height:180px; }
            .poster-overlay-theater { font-size:11px; letter-spacing:2px; top:4px; padding:4px 8px 8px; }
            .poster-overlay-title { font-size:13px; bottom:6px; padding:8px 6px 4px; }
            .tv-stage-row { flex-direction:column; align-items:center; }
            .speech-bubble::before { display:none; }
            .host-portrait { width:80px; height:80px; border-radius:3px; }
            .guide-entry { flex-direction:column; align-items:stretch; }
            .guide-time { text-align:left; }
            .segment-image { max-height:150px; }
        }
        .tv-guide { margin-top:15px; border-top:2px solid var(--border); padding-top:10px; }
        .tv-guide h3 { font-family:var(--font-display); color:#d0cfc5; letter-spacing:2px; margin-bottom:8px; font-size:18px; text-shadow:0 0 10px #ffffff44; }
        .guide-entry { display:flex; justify-content:space-between; align-items:center; background:#181c24; border:1px solid var(--border); padding:10px; margin-bottom:6px; border-radius:3px; gap:8px; flex-wrap:wrap; }
        .guide-time { font-family:var(--font-mono); font-size:14px; color:var(--accent); min-width:50px; }
        .guide-info { flex:1; min-width:100px; }
        .guide-title { font-size:16px; color:#d0cfc5; }
        .guide-desc { font-size:15px; color:#7a7a78; }
        .guide-btn { padding:6px 12px; font-size:14px; min-height:32px; flex-shrink:0; }
        .guide-actions { display:flex; gap:4px; align-items:center; }
        .modal { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.94); align-items:center; justify-content:center; padding:12px; }
        .modal-content { background:#181c24; border-radius:5px; width:100%; max-width:420px; padding:20px; text-align:center; border:3px solid var(--accent); box-shadow:var(--border-glow),0 0 80px #000000dd; color:#d0cfc5; max-height:85vh; overflow-y:auto; font-size:var(--text-size-base); }
        .modal-btn { background:#1a1c24; border:2px solid #ffffff66; padding:10px 18px; border-radius:3px; margin:5px; cursor:pointer; color:#d0cfc5; font-family:var(--font-body); font-size:var(--text-size-base); letter-spacing:1px; min-height:var(--btn-min-height); }
        .modal-btn:active { border-color:var(--accent); box-shadow:0 0 14px #ffffff44; }
        .loading-text { color:var(--amber); font-style:italic; }
        .blink { animation:blink 1s infinite; }
        @keyframes blink { 50%{opacity:0} }
        .footer-strip { display:flex; justify-content:space-between; align-items:center; padding:6px 12px; background:#101318; border-top:1px solid #ffffff44; z-index:10; font-family:var(--font-mono); font-size:11px; color:#7a7a78; flex-shrink:0; }
        .footer-strip span { color:#8a8a82; letter-spacing:0.5px; }
        .footer-strip button { background:none; border:1px solid #2c3038; color:#8a8a82; font-size:10px; cursor:pointer; padding:4px 8px; border-radius:2px; font-family:var(--font-mono); }
        .footer-strip button:hover { border-color:#7a7a78; color:#d0cfc5; }
        .typewriter-cursor { display:inline-block; width:2px; height:1.2em; background:#d0cfc5; margin-left:2px; animation:blink 0.8s step-end infinite; vertical-align:text-bottom; }
        .back-btn { margin-top:8px; align-self:flex-end; }
        .score-indicator { font-family:var(--font-mono); font-size:10px; color:#9a9a92; letter-spacing:1px; padding:3px 8px; border:1px solid #5a5a52; border-radius:2px; display:inline-block; background:#101318; margin-top:4px; }
        .score-indicator .active { color:#c0b090; }
        .score-indicator .dim { color:#5a5a52; }
        .progress-bar { width:100%; height:2px; background:#2a2c28; border-radius:2px; margin-top:6px; overflow:hidden; }
        .progress-bar .fill { height:100%; background:#c0b090; border-radius:2px; transition:width 0.3s; box-shadow:0 0 10px #c0b09044; }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">OP. NIGHTFALL · CRT-45</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">OPERATION<br>NIGHTFALL</div>
                    <div class="marquee-sub">⏤ 1945 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="operationPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">📡 OPERATION NIGHTFALL · CLASSIFIED</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('nightfall_key') || '';

            const OPERATIONS = [
                'Sabotage', 'Reconnaissance', 'Escape', 'Assassination',
                'Infiltration', 'Rescue', 'Interception', 'Survival', 'Deception', 'Extraction'
            ];

            const DEFAULT_STATE = { episodes: [], currentMission: null, imageCooldownUntil: 0 };
            let gameState = { ...DEFAULT_STATE };
            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;', "'":'&#39;', '"':'&quot;' })[m]);

            const HOST_BIO = `
                <h2>🕵️ Maxwell Croft</h2>
                <p style="text-align:left;">
                    <strong>Show:</strong> <em>Operation Nightfall</em><br>
                    <strong>Bio:</strong> A chain‑smoking ex‑spy who traded the field for a microphone, Croft broadcasts grim tales of WWII espionage from a cramped radio booth in fog‑choked London. His voice carries the weight of every betrayal he’s witnessed, and every story is a warning from the shadows.
                </p>
            `;

            // ──────────────────────────────────────────────────────────────
            //  NOIR SOUND ENGINE — adapted from THE CROSSROADS
            //  but with classic 1940s/50s film noir orchestral/jazz sounds
            //  No Lynch-style ambient, no industrial textures.
            // ──────────────────────────────────────────────────────────────

            let audioCtx = null;
            let ambientSource = null, ambientGain = null, ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null, masterGain = null, dryGain = null, wetGain = null;
            let sectionAmbientActive = null, stringAmbientActive = null;
            let crossfadeTimeout = null, tapeWarbleNode = null, masterCompressor = null;

            let patternPlayerActive = null, patternPlayerTimeout = null;
            let patternStep = 0, patternBPM = 50;
            let currentSectionPatterns = [];
            let currentVariationIdx = 0, barsInVariation = 0;
            let fillActive = false;
            let sectionThemeScore = null;

            function expandPattern(arr) {
                if (!Array.isArray(arr)) { arr = [0,0,0,0,0,0,0,0]; }
                arr = arr.map(x => typeof x === 'number' ? x : 0);
                return arr.flatMap(x => [x, x]);
            }

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.0005;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            function ensureAudioNodes(ctx) {
                if (!masterGain) {
                    masterGain = ctx.createGain();
                    masterGain.gain.value = 0.20;
                    masterCompressor = ctx.createDynamicsCompressor();
                    masterCompressor.threshold.value = -24;
                    masterCompressor.knee.value = 28;
                    masterCompressor.ratio.value = 10;
                    masterCompressor.attack.value = 0.004;
                    masterCompressor.release.value = 0.3;
                    masterGain.connect(masterCompressor);
                    masterCompressor.connect(ctx.destination);
                }
                if (!dryGain) {
                    dryGain = ctx.createGain();
                    dryGain.gain.value = 0.80;
                    dryGain.connect(masterGain);
                }
                if (!wetGain) {
                    wetGain = ctx.createGain();
                    wetGain.gain.value = 0.50;
                    if (reverbNode) wetGain.connect(reverbNode);
                    else wetGain.connect(masterGain);
                }
                if (!reverbNode) {
                    initReverb(ctx);
                    if (reverbNode) wetGain.connect(reverbNode);
                }
                if (tapeWarbleNode) tapeWarbleNode.connect(masterGain.gain);
            }

            async function getAudioContext() {
                try {
                    if (!audioCtx) {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                        createKeepAlive(audioCtx);
                        initReverb(audioCtx);
                        initTapeWarble(audioCtx);
                        ensureAudioNodes(audioCtx);
                    }
                    if (audioCtx.state === 'suspended') await audioCtx.resume();
                    ensureAudioNodes(audioCtx);
                    return audioCtx;
                } catch(err) { console.error('Audio context error:', err); throw err; }
            }

            function initReverb(ctx) {
                if (reverbNode) return;
                try {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 3.8;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i=0; i<length; i++) {
                        const decay = Math.exp(-i/(sampleRate*0.8));
                        const lateDecay = Math.exp(-i/(sampleRate*2.2))*0.25;
                        left[i] = (Math.random()*2-1)*(decay+lateDecay);
                        right[i] = (Math.random()*2-1)*(decay+lateDecay);
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                    if (masterGain) reverbNode.connect(masterGain);
                } catch(err) {
                    console.warn('Reverb init error:', err);
                    reverbNode = ctx.createGain();
                    reverbNode.gain.value = 0.5;
                    if (masterGain) reverbNode.connect(masterGain);
                }
            }

            function initTapeWarble(ctx) {
                if (tapeWarbleNode) return;
                try {
                    tapeWarbleNode = ctx.createGain();
                    tapeWarbleNode.gain.value = 0;
                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.12;
                    const lfoGain = ctx.createGain();
                    lfoGain.gain.value = 0.010;
                    const lfo2 = ctx.createOscillator();
                    lfo2.type = 'sine';
                    lfo2.frequency.value = 0.20;
                    const lfo2Gain = ctx.createGain();
                    lfo2Gain.gain.value = 0.007;
                    lfo.connect(lfoGain);
                    lfo2.connect(lfo2Gain);
                    lfoGain.connect(tapeWarbleNode.gain);
                    lfo2Gain.connect(tapeWarbleNode.gain);
                    lfo.start(0);
                    lfo2.start(0);
                    tapeWarbleNode._lfos = [lfo, lfo2];
                } catch(err) { console.warn('Tape warble init error:', err); }
            }

            // ─── NOIR INSTRUMENT SYNTHESIS ─────────────────────────────

            // 1. UPRIGHT BASS (walking bass style)
            function createUprightBass(ctx, semitone, intensity=0.5, duration=2.0, rootFreq=38) {
                try {
                    const now = ctx.currentTime;
                    const freq = rootFreq * Math.pow(2, semitone/12);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity*0.25, now+0.02);
                    gainNode.gain.setValueAtTime(intensity*0.20, now+duration*0.4);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration+0.3);
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq*0.96, now);
                    osc.frequency.exponentialRampToValueAtTime(freq, now+0.06);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(freq*2, now);
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.06*intensity;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(160 + semitone*3, now);
                    filter.frequency.exponentialRampToValueAtTime(100 + semitone*2, now+duration);
                    filter.Q.value = 2.0;
                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.35;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now+duration+0.4);
                    osc2.stop(now+duration+0.4);
                } catch(err) { console.warn('Upright bass error:', err); }
            }

            // 2. JAZZ PIANO (comping chords)
            function createJazzPiano(ctx, rootFreq, duration, intensity=0.4, chordIntervals=[0,4,7,11]) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity*0.15, now+0.01);
                    gainNode.gain.exponentialRampToValueAtTime(intensity*0.04, now+duration*0.7);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration+0.6);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 1200;
                    filter.Q.value = 2.5;
                    const oscs = [];
                    chordIntervals.forEach(interval => {
                        const freq = rootFreq * Math.pow(2, interval/12);
                        for (let j=0; j<3; j++) {
                            const osc = ctx.createOscillator();
                            osc.type = j===0 ? 'triangle' : 'sine';
                            const detune = (j-1)*2.5;
                            osc.frequency.value = freq * Math.pow(2, detune/1200);
                            const env = ctx.createGain();
                            env.gain.setValueAtTime(0, now);
                            env.gain.linearRampToValueAtTime(1, now+0.005);
                            env.gain.exponentialRampToValueAtTime(0.001, now+duration+0.5);
                            osc.connect(env);
                            env.connect(filter);
                            oscs.push(osc, env);
                        }
                    });
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.45;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    oscs.forEach(o => { try { o.start(now); o.stop(now+duration+0.7); } catch(e){} });
                } catch(err) { console.warn('Jazz piano error:', err); }
            }

            // 3. BRUSH DRUMS (soft, swing feel)
            function createBrushKick(ctx, intensity=0.4) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity*0.5, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now+0.2);
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(90, now);
                    osc.frequency.exponentialRampToValueAtTime(30, now+0.12);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 120;
                    filter.Q.value = 1.0;
                    osc.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now+0.25);
                } catch(err) { console.warn('Brush kick error:', err); }
            }

            function createBrushSnare(ctx, intensity=0.3) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity*0.5, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now+0.15);
                    const bufferSize = ctx.sampleRate * 0.06;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i=0; i<bufferSize; i++) {
                        const env = Math.exp(-i/(ctx.sampleRate*0.02));
                        data[i] = (Math.random()*2-1)*env*0.35;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 600;
                    filter.Q.value = 1.2;
                    noise.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    noise.stop(now+0.18);
                } catch(err) { console.warn('Brush snare error:', err); }
            }

            function createBrushHat(ctx, intensity=0.2) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity*0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now+0.04);
                    const bufferSize = ctx.sampleRate * 0.02;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i=0; i<bufferSize; i++) {
                        const env = Math.exp(-i/(ctx.sampleRate*0.008));
                        data[i] = (Math.random()*2-1)*env*0.3;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.value = 4000;
                    filter.Q.value = 0.5;
                    noise.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    noise.stop(now+0.06);
                } catch(err) { console.warn('Brush hat error:', err); }
            }

            // 4. STRING SECTION (Hitchcock-style suspense)
            function createNoirStrings(ctx, rootFreq, duration, intensity=0.5, mode='suspense') {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    const attack = mode === 'suspense' ? 2.0 : 0.8;
                    gainNode.gain.linearRampToValueAtTime(intensity*0.18, now+attack);
                    gainNode.gain.setValueAtTime(intensity*0.18, now+duration-1.5);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration+0.8);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = mode === 'suspense' ? 400 : 700;
                    filter.Q.value = 2.0;
                    const oscs = [];
                    const intervals = mode === 'suspense' ? [0,3,7,10] : [0,4,7,12,16];
                    intervals.forEach(interval => {
                        const freq = rootFreq * Math.pow(2, interval/12);
                        for (let i=0; i<3; i++) {
                            const osc = ctx.createOscillator();
                            osc.type = i<2 ? 'sawtooth' : 'triangle';
                            const detune = (i-1)*3.5;
                            osc.frequency.value = freq * Math.pow(2, detune/1200);
                            const vib = ctx.createOscillator();
                            vib.type = 'sine';
                            vib.frequency.value = 4.5 + i*1.2;
                            const vibG = ctx.createGain();
                            vibG.gain.value = 2 + i;
                            vib.connect(vibG);
                            vibG.connect(osc.frequency);
                            oscs.push(osc, vib);
                            osc.connect(filter);
                        }
                    });
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.55;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    oscs.forEach(o => { try { o.start(now); o.stop(now+duration+1.2); } catch(e){} });
                } catch(err) { console.warn('Noir strings error:', err); }
            }

            // 5. VIBRAPHONE / MARIMBA (noir melody)
            function createVibraphone(ctx, frequency, duration, intensity=0.4) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity*0.3, now+0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration+0.8);
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = frequency;
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'sine';
                    osc2.frequency.value = frequency * 1.005;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.3;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 2000;
                    filter.Q.value = 6;
                    const trem = ctx.createOscillator();
                    trem.type = 'sine';
                    trem.frequency.value = 5 + Math.random()*3;
                    const tremG = ctx.createGain();
                    tremG.gain.value = 0.15;
                    trem.connect(tremG);
                    tremG.connect(gainNode.gain);
                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.4;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    trem.start(now);
                    osc.stop(now+duration+1);
                    osc2.stop(now+duration+1);
                    trem.stop(now+duration+1);
                } catch(err) { console.warn('Vibraphone error:', err); }
            }

            // 6. SAXOPHONE / BRASS (noir melody)
            function createNoirSax(ctx, frequency, duration, intensity=0.4) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity*0.2, now+0.05);
                    gainNode.gain.setValueAtTime(intensity*0.18, now+duration*0.5);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration+0.6);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(frequency*0.98, now);
                    osc.frequency.exponentialRampToValueAtTime(frequency, now+0.08);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'square';
                    osc2.frequency.value = frequency * 0.5;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.08*intensity;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(600, now);
                    filter.frequency.exponentialRampToValueAtTime(1200, now+duration*0.4);
                    filter.frequency.exponentialRampToValueAtTime(400, now+duration);
                    filter.Q.value = 3.5;
                    const vib = ctx.createOscillator();
                    vib.type = 'sine';
                    vib.frequency.value = 4 + Math.random()*2;
                    const vibG = ctx.createGain();
                    vibG.gain.value = 5;
                    vib.connect(vibG);
                    vibG.connect(osc.frequency);
                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.5;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    vib.start(now);
                    osc.stop(now+duration+0.8);
                    osc2.stop(now+duration+0.8);
                    vib.stop(now+duration+0.8);
                } catch(err) { console.warn('Sax error:', err); }
            }

            // 7. DRAMATIC STING (orchestral hit)
            function createNoirSting(ctx, intensity=0.6) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity*0.35, now+0.02);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now+1.8);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(120, now);
                    osc.frequency.exponentialRampToValueAtTime(250, now+0.3);
                    osc.frequency.exponentialRampToValueAtTime(80, now+1.5);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'triangle';
                    osc2.frequency.setValueAtTime(200, now);
                    osc2.frequency.exponentialRampToValueAtTime(400, now+0.25);
                    osc2.frequency.exponentialRampToValueAtTime(150, now+1.5);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 500;
                    filter.Q.value = 2.0;
                    osc.connect(filter);
                    osc2.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.55;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now+2.0);
                    osc2.stop(now+2.0);
                } catch(err) { console.warn('Noir sting error:', err); }
            }

            // 8. CLIMAX (full orchestra swell)
            function createNoirClimax(ctx, intensity=0.7) {
                try {
                    const now = ctx.currentTime;
                    const duration = 10 + Math.random()*6;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity*0.30, now+2.5);
                    gainNode.gain.setValueAtTime(intensity*0.35, now+duration-2);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration);
                    const oscs = [];
                    const freqs = [45, 60, 80, 110, 165];
                    freqs.forEach(f => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(f*0.98, now);
                        osc.frequency.exponentialRampToValueAtTime(f*1.4, now+duration*0.6);
                        oscs.push(osc);
                    });
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(120, now);
                    filter.frequency.exponentialRampToValueAtTime(700, now+duration);
                    filter.Q.value = 2.5;
                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.05;
                    const lfoG = ctx.createGain();
                    lfoG.gain.value = 200;
                    lfo.connect(lfoG);
                    lfoG.connect(filter.frequency);
                    oscs.forEach(o => o.connect(filter));
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.55;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    oscs.forEach(o => { o.start(now); o.stop(now+duration+1); });
                    lfo.start(now);
                    lfo.stop(now+duration+1);
                } catch(err) { console.warn('Noir climax error:', err); }
            }

            // 9. HEARTBEAT (tension)
            function createNoirHeartbeat(ctx, intensity=0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity*0.6, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now+0.12);
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(60, now);
                    osc.frequency.exponentialRampToValueAtTime(30, now+0.08);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 100;
                    osc.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now+0.15);
                } catch(err) { console.warn('Heartbeat error:', err); }

            // 10. THUNDER (low rumble, noir-style)
            function createNoirThunder(ctx, intensity=0.5) {
                try {
                    const now = ctx.currentTime;
                    const bufferSize = ctx.sampleRate * 1.2;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i=0; i<bufferSize; i++) {
                        data[i] = (Math.random()*2-1) * Math.exp(-i/(ctx.sampleRate*0.6));
                    }
                    const source = ctx.createBufferSource();
                    source.buffer = buffer;
                    const gain = ctx.createGain();
                    gain.gain.setValueAtTime(intensity*0.4, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now+1.5);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 80;
                    filter.Q.value = 0.4;
                    source.connect(filter);
                    filter.connect(gain);
                    gain.connect(ctx.destination);
                    source.start(now);
                    source.stop(now+1.5);
                } catch(err) { console.warn('Thunder error:', err); }

            // 11. BELL (vibraphone/mallet)
            function createNoirBell(ctx, intensity=0.4) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity*0.25, now+0.02);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now+3.0);
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = 80 + Math.random()*30;
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'sine';
                    osc2.frequency.value = osc.frequency.value * 1.005;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.3;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 1500;
                    filter.Q.value = 4;
                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.5;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now+3.5);
                    osc2.stop(now+3.5);
                } catch(err) { console.warn('Bell error:', err); }
            }

            // ─── PATTERN PLAYER (NOIR STYLE) ──────────────────────────

            function startNoirPatternPlayer(themeName, rootFreq=38, scoreData=null) {
                stopPatternPlayer();
                if (!scoreData || !scoreData[themeName]) {
                    console.warn('No AI score data for theme:', themeName);
                    return;
                }
                const theme = scoreData[themeName];
                const bpm = theme.bpm || 58;
                const bass = expandPattern(theme.bass);
                const kick = expandPattern(theme.kick);
                const snare = expandPattern(theme.snare);
                const hat = expandPattern(theme.hat);

                const variations = [{
                    name: 'AI',
                    bars: 8,
                    bass: bass,
                    kick: kick,
                    snare: snare,
                    hat: hat
                }];

                currentSectionPatterns = variations;
                currentVariationIdx = 0;
                barsInVariation = 0;
                patternStep = 0;
                patternBPM = bpm;
                fillActive = false;

                const stepDuration = 60 / bpm / 4;
                patternPlayerActive = { active: true, theme: themeName };

                function getCurrentPattern() { return currentSectionPatterns[0]; }

                function playStep() {
                    if (!patternPlayerActive || !patternPlayerActive.active) return;
                    const ctx = audioCtx;
                    if (!ctx) { patternPlayerTimeout = setTimeout(playStep, 100); return; }
                    const step = patternStep % 16;
                    const current = getCurrentPattern();
                    const isFillStep = fillActive;

                    let bassSemitone = 0;
                    if (isFillStep) {
                        bassSemitone = (step % 4 === 0) ? 0 : (step % 8 === 4 ? 7 : 0);
                    } else {
                        bassSemitone = current.bass[step] || 0;
                    }
                    if (bassSemitone !== 0 || (isFillStep && step % 4 === 0)) {
                        const dur = isFillStep ? 0.25 : 1.8;
                        const inten = isFillStep ? 0.3 : 0.4 + (bassSemitone / 30);
                        createUprightBass(ctx, bassSemitone, inten, dur, rootFreq);
                    }

                    let kickVal = isFillStep ? (step % 4 === 0 ? 1 : 0) : (current.kick[step] || 0);
                    if (kickVal === 1) createBrushKick(ctx, isFillStep ? 0.5 : 0.4);

                    let snareVal = isFillStep ? (step % 8 === 4 ? 1 : 0) : (current.snare[step] || 0);
                    if (snareVal === 1) createBrushSnare(ctx, isFillStep ? 0.5 : 0.35);

                    let hatVal = isFillStep ? (step % 2 === 0 ? 1 : 0) : (current.hat[step] || 0);
                    if (hatVal === 1 && Math.random() < 0.6) createBrushHat(ctx, isFillStep ? 0.3 : 0.2);

                    // Add piano comping on some steps
                    if (step % 4 === 0 && !isFillStep) {
                        const pianoRoot = 55 + Math.floor(Math.random()*5)*2;
                        const intervals = [0,4,7,11];
                        createJazzPiano(ctx, pianoRoot, stepDuration*2.5, 0.2 + Math.random()*0.15, intervals);
                    }

                    // Add vibraphone accents
                    if (step % 8 === 4 && !isFillStep && Math.random() < 0.4) {
                        const vibFreq = 100 + Math.floor(Math.random()*6)*10;
                        createVibraphone(ctx, vibFreq, 0.6, 0.2);
                    }

                    patternStep++;
                    if (patternStep % 16 === 0) {
                        barsInVariation++;
                        if (barsInVariation >= current.bars) barsInVariation = 0;
                    }
                    patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
                }
                patternPlayerTimeout = setTimeout(playStep, 50);
            }

            function stopPatternPlayer() {
                if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout); patternPlayerTimeout = null; }
                if (patternPlayerActive) { patternPlayerActive.active = false; patternPlayerActive = null; }
                patternStep = 0; currentSectionPatterns = []; currentVariationIdx = 0; barsInVariation = 0; fillActive = false;
            }

            // ─── NOIR AMBIENT SECTIONS ────────────────────────────────

            const NOIR_AMBIENT = {
                intro:       { rootFreq:42, stringMode:'suspense', stringIntensity:0.15, pianoRoot:50, pianoIntensity:0.12, vibFreq:80 },
                setup:       { rootFreq:45, stringMode:'suspense', stringIntensity:0.20, pianoRoot:55, pianoIntensity:0.15, vibFreq:85 },
                scheme:      { rootFreq:48, stringMode:'suspense', stringIntensity:0.25, pianoRoot:58, pianoIntensity:0.18, vibFreq:90 },
                execution:   { rootFreq:50, stringMode:'full',      stringIntensity:0.32, pianoRoot:60, pianoIntensity:0.22, vibFreq:95 },
                twist:       { rootFreq:44, stringMode:'suspense', stringIntensity:0.30, pianoRoot:52, pianoIntensity:0.20, vibFreq:82 },
                closing:     { rootFreq:40, stringMode:'suspense', stringIntensity:0.12, pianoRoot:48, pianoIntensity:0.10, vibFreq:75 }
            };

            function startNoirSection(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                const theme = NOIR_AMBIENT[themeName] || NOIR_AMBIENT.intro;
                const ctx = audioCtx;
                const now = ctx.currentTime;

                // Strings
                createNoirStrings(ctx, theme.rootFreq, 30, theme.stringIntensity, theme.stringMode);

                // Piano comping
                if (theme.pianoIntensity > 0.05) {
                    const intervals = [0,4,7,11];
                    createJazzPiano(ctx, theme.pianoRoot, 6, theme.pianoIntensity*0.6, intervals);
                    setTimeout(() => {
                        if (audioCtx) {
                            const intervals2 = [0,3,7,10];
                            createJazzPiano(ctx, theme.pianoRoot+2, 6, theme.pianoIntensity*0.4, intervals2);
                        }
                    }, 2500);
                }

                // Vibraphone
                if (theme.vibFreq) {
                    createVibraphone(ctx, theme.vibFreq, 4, 0.15);
                    setTimeout(() => {
                        if (audioCtx) createVibraphone(ctx, theme.vibFreq+12, 3.5, 0.12);
                    }, 2000);
                }

                // Start pattern player with AI score
                if (sectionThemeScore) {
                    startNoirPatternPlayer(themeName, 38, sectionThemeScore);
                }

                sectionAmbientActive = {
                    stop: () => { sectionAmbientActive = null; }
                };
            }

            function transitionSectionTheme(themeName, scoreData) {
                if (scoreData) sectionThemeScore = scoreData;
                startNoirSection(themeName);
            }

            function stopSectionAmbient() {
                if (sectionAmbientActive) { sectionAmbientActive = null; }
                stopPatternPlayer();
                clearTimeout(crossfadeTimeout);
            }

            // ─── MASTER playSound (noir) ──────────────────────────────

            async function playSound(type, intensity=0.7) {
                try {
                    const ctx = await getAudioContext();
                    if (!ctx) return;
                    switch(type) {
                        case 'sting': createNoirSting(ctx, intensity); break;
                        case 'heartbeat':
                            createNoirHeartbeat(ctx, intensity*0.8);
                            setTimeout(() => createNoirHeartbeat(ctx, intensity*0.7), 220);
                            break;
                        case 'thunder': createNoirThunder(ctx, intensity); break;
                        case 'bell': createNoirBell(ctx, intensity*0.6); break;
                        case 'climax': createNoirClimax(ctx, intensity); break;
                        case 'piano': {
                            const root = 55 + Math.floor(Math.random()*8)*2;
                            createJazzPiano(ctx, root, 2.5, intensity*0.3, [0,4,7,11]);
                            break;
                        }
                        case 'vibes': {
                            const f = 80 + Math.floor(Math.random()*8)*5;
                            createVibraphone(ctx, f, 1.5, intensity*0.3);
                            break;
                        }
                        case 'sax': {
                            const f = 90 + Math.floor(Math.random()*10)*6;
                            createNoirSax(ctx, f, 2.0, intensity*0.25);
                            break;
                        }
                        case 'strings': {
                            const root = 42 + Math.floor(Math.random()*6)*2;
                            createNoirStrings(ctx, root, 6, intensity*0.25, 'suspense');
                            break;
                        }
                        case 'bass': {
                            const semitone = Math.floor(Math.random()*12);
                            createUprightBass(ctx, semitone, intensity*0.4, 1.5, 38);
                            break;
                        }
                        case 'kick': createBrushKick(ctx, intensity*0.6); break;
                        case 'snare': createBrushSnake(ctx, intensity*0.5); break;
                        case 'hat': createBrushHat(ctx, intensity*0.3); break;
                        default: console.warn('Unknown sound type:', type);
                    }
                } catch(err) { console.warn('playSound error:', err); }
            }

            // alias
            function createBrushSnake(ctx, intensity) { createBrushSnare(ctx, intensity); }

            // ─── AMBIENT (minimal, noir-style) ────────────────────────

            async function playAmbient(type, durationSeconds, intensity=0.3) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity*0.10, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    if (type === 'ambient_drone') {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 50 + intensity*20;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = 200;
                        osc.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        ambientSource = { osc };
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds*1000);
                } catch(err) { console.warn('Ambient error:', err); }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now+0.4);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect(); ambientGain = null; }
                    }, 400);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout); ambientTimeout = null; }
            }

            }

            async function mistralChat(msgs, maxTok=600, timeoutMs=28000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
                        body: JSON.stringify({ model:MODEL, messages:msgs, temperature:0.9, max_tokens:maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) { const errText = await res.text(); throw new Error(`API error ${res.status}: ${errText}`); }
                    return (await res.json()).choices[0].message.content.trim();
                } catch(e) {
                    if (e.name === 'AbortError') throw new Error('Request timed out.');
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', noir spy poster, 1940s, grainy film, dramatic shadows')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true; reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true; clearTimeout(timeout); resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true; clearTimeout(timeout); reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries=2) {
                let lastError = null;
                for (let i=0; i<retries; i++) {
                    try { return await generateImage(prompt); }
                    catch(e) { lastError = e; await new Promise(r => setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar=null) {
                return new Promise((resolve) => {
                    let i=0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else { clearInterval(timer); resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                return new Promise((resolve) => {
                    if (!text) { resolve(); return; }
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = 0.62;
                    utterance.pitch = 0.90;
                    utterance.onend = () => resolve();
                    utterance.onerror = () => resolve();
                    speechSynthesis.speak(utterance);
                });
            }

            function showModal(html) {
                document.getElementById('genericModalContent').innerHTML = html;
                document.getElementById('genericModal').style.display = 'flex';
            }

            function closeModal() {
                document.getElementById('genericModal').style.display = 'none';

            }

            // ─── STORY & SCORE GENERATION ─────────────────────────────

            function pickRandomOperation() {
                return OPERATIONS[Math.floor(Math.random() * OPERATIONS.length)];
            }

            async function generateNewMissionStory() {
                const chosenOp = pickRandomOperation();
                const system = `You are Maxwell Croft, a cynical, chain-smoking ex-spy who narrates grim, hard-boiled tales of espionage and survival. Your stories are grounded, dark and devoid of anything supernatural. Think Stephen King's grittiness meets Hitchcock's suspense.`;
                const prompt = `Write a 900-1100 word noir-style WWII spy story set in the 1940s. The central operation is: ${chosenOp}. Use tight third-person prose. No ghosts, no magic – only human psychology, violence, and psychological tension. Follow this structure: a tense setup, a cold scheme, a brutal execution, and an ironic, gut-punch twist where victory becomes a prison (physical or mental). Frame it with Croft's cynical intro and a bitter closing punchline. Return ONLY valid JSON with fields: title (string), story (full narration, use \\n for line breaks), closing_remark (a chilling sign-off). Output raw JSON.`;
                const resp = await mistralChat([{ role:'system', content:system }, { role:'user', content:prompt }], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g,'').replace(/`/g,'').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) throw new Error('Invalid story structure');
                let imageUrl = null;
                try {
                    imageUrl = await generateImageWithRetry(`Noir spy movie poster for a WWII espionage story titled "${story.title}", 1940s, shadowy, dramatic`, 2);
                } catch(e) { console.warn('Could not generate poster:', e); }
                gameState.currentMission = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null,
                    operation: chosenOp
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system = `You are a sound designer for a 1940s film noir radio drama. Given a story, return JSON with THREE keys:
- "sections": array of 5-6 sections dividing the story into emotional acts. Each has "theme" (one of: intro, setup, scheme, execution, twist, closing), "start_char" (inclusive), "end_char" (exclusive). Cover entire story from 0 to ${length}.
- "cues": array of sound events using only these types: "sting", "heartbeat", "thunder", "bell", "climax", "piano", "vibes", "sax", "strings", "bass", "kick", "snare", "hat". Include at least 40 cues spread evenly. Use noir jazz and orchestral instruments generously.
- "score": object with keys matching theme names. Each key: "bpm" (50-75), "bass" (array of 8 integers 0-24), "kick" (array of 8 integers 0/1), "snare" (array of 8 integers 0/1), "hat" (array of 8 integers 0/1).
Return ONLY raw JSON.`;
                const userPrompt = `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and noir score patterns.`;
                const resp = await mistralChat([{ role:'system', content:system }, { role:'user', content:userPrompt }], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g,'').trim();
                let data;
                try { data = JSON.parse(cleaned); } catch(parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) { const candidate = match[0].replace(/,\s*([}\]])/g,'$1'); try { data = JSON.parse(candidate); } catch(e2) { throw new Error('Failed to parse AI soundtrack JSON.'); } }
                    else throw new Error('No JSON found in AI response.');
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                    throw new Error('Missing sections, cues, or score in AI response');
                const sortedSections = data.sections.sort((a,b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length-1].end_char < length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length-1].end_char = length;
                }
                const cues = data.cues.map(c => ({
                    type: c.type,
                    position: Math.min(c.position, length-1),
                    intensity: c.intensity || 0.7
                }));
                const requiredThemes = ['intro','setup','scheme','execution','twist','closing'];
                const score = {};
                function normalizeArray(arr, maxVal=24) {
                    if (!Array.isArray(arr)) throw new Error('Expected array');
                    let clean = arr.map(v => { const n = Number(v); return isNaN(n) ? 0 : Math.min(maxVal, Math.max(0, Math.round(n))); });
                    while (clean.length < 8) clean.push(0);
                    if (clean.length > 8) clean = clean.slice(0,8);
                    return clean;
                }
                for (const theme of requiredThemes) {
                    if (!data.score[theme]) throw new Error(`AI did not provide a score for theme "${theme}".`);
                    const s = data.score[theme];
                    if (typeof s.bpm !== 'number' || s.bpm < 30 || s.bpm > 120) throw new Error(`Invalid bpm for theme "${theme}": ${s.bpm}`);
                    score[theme] = {
                        bpm: s.bpm,
                        bass: normalizeArray(s.bass, 24),
                        kick: normalizeArray(s.kick, 1),
                        snare: normalizeArray(s.snare, 1),
                        hat: normalizeArray(s.hat, 1)
                    };
                }
                return { sections: sortedSections, cues, score };
            }

            // ─── PERFORM MISSION ──────────────────────────────────────

            async function startMission() {
                speechSynthesis.cancel();
                if (window.missionTimeout) clearTimeout(window.missionTimeout);
                await getAudioContext();
                const mission = gameState.currentMission;
                if (!mission || !mission.story) {
                    await generateNewMissionStory();
                    return startMission();
                }

                let sectionList = null, cueList = null, scoreData = null;
                if (mission.soundCues) {
                    if (Array.isArray(mission.soundCues)) {
                        cueList = mission.soundCues.filter(c => c.type && c.position !== undefined);
                    } else if (mission.soundCues.sections && mission.soundCues.cues) {
                        sectionList = mission.soundCues.sections;
                        cueList = mission.soundCues.cues.filter(c => c.type && c.position !== undefined);
                        scoreData = mission.soundCues.score;
                    }
                }

                const bubble = document.getElementById('operationSpeechBubble');
                const dialogue = document.getElementById('operationDialogue');
                const imageEl = document.getElementById('operationSegmentImage');
                if (!bubble || !dialogue) return;

                const guideList = document.getElementById('operationGuideList');
                if (guideList) guideList.style.display = 'none';
                const posterContainer = document.getElementById('operationPosterContainer');
                const posterTitle = document.getElementById('operationPosterTitle');
                if (posterContainer && imageEl && mission.imageUrl) {
                    imageEl.src = mission.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) posterTitle.textContent = mission.title || '';
                } else if (posterContainer) {
                    posterContainer.classList.add('no-image');
                }

                dialogue.innerHTML = '';
                const intro = `"The year is 1945. The world is burning, and I'm still here to tell the tales nobody wants to remember. Tonight's operation: ${mission.operation}. It's called '${mission.title}'. Listen close."`;
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 45);
                await new Promise(r => setTimeout(r, 1500));

                // Start section music
                if (sectionList && sectionList.length > 0) {
                    transitionSectionTheme(sectionList[0].theme, scoreData);
                } else if (scoreData) {
                    transitionSectionTheme('intro', scoreData);
                }

                // Score indicator update
                let indicatorInterval = setInterval(() => {
                    if (patternPlayerActive) {
                        const theme = patternPlayerActive.theme || 'intro';
                        const varIdx = currentVariationIdx;
                        const varName = currentSectionPatterns[varIdx] ? currentSectionPatterns[varIdx].name : 'A';
                        const bar = barsInVariation + 1;
                        updateScoreIndicator(theme, varName, bar);
                    } else {
                        updateScoreIndicator('...', '—', 0);
                    }
                }, 1000);

                const storyText = mission.rawStoryText || mission.story;
                if (!storyText) {
                    await showClosingAndFinish(mission, dialogue, indicatorInterval);
                    return;
                }

                // Build cue checker
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a,b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    const sortedSections = sectionList ? [...sectionList].sort((a,b) => a.start_char - b.start_char) : [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) {
                                currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme, scoreData);
                            }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) {
                                triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity);
                            }
                            cueIdx++;
                        }
                    };
                }

                dialogue.textContent = '';
                const typingPromise = typewriterEffect(dialogue, storyText, 30, cueChecker);
                const speechPromise = speakTextMale(storyText);
                await speechPromise;
                await typingPromise;
                await showClosingAndFinish(mission, dialogue, indicatorInterval);
            }

            async function showClosingAndFinish(mission, dialogue, indicatorInterval) {
                const closing = `"${mission.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#d0cfc5';
                dialogue.appendChild(closingLine);

                const closingSpeech = speakTextMale(closing);
                const closingTyping = typewriterEffect(closingLine, closing, 42);
                await Promise.all([closingSpeech, closingTyping]);
                await new Promise(r => setTimeout(r, 1000));

                const curtainText = document.createElement('p');
                curtainText.textContent = '— Transmission ends —';
                stopSectionAmbient();
                stopPatternPlayer();
                clearInterval(indicatorInterval);
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                curtainText.style.color = '#7a7a78';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();

                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';

                const addBtn = document.createElement('button');

                addBtn.textContent = '➕ Add to Archive';
                addBtn.addEventListener('click', () => {
                    addCurrentMission();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Archived';
