<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUEST ADVENTURE CREATOR · NIGHTFALL GAMES 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* (same retro styles – keep as before) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a0f0a;
            background-image: 
                radial-gradient(circle at 30% 40%, #4a2a1a 0%, transparent 30%),
                repeating-linear-gradient(0deg, rgba(255,200,100,0.03) 0px, rgba(0,0,0,0.3) 2px, transparent 3px);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 16px;
            margin: 0;
            color: #f0c674;
            text-shadow: 0 0 5px #b87c30, 0 0 2px #8b5a2b;
        }

        .crt {
            background-color: #1e2b1a;
            border: 6px solid #6b4f3a;
            border-radius: 24px 24px 16px 16px;
            box-shadow: 
                inset 0 0 30px #3f2e1e,
                0 20px 30px rgba(0,0,0,0.8),
                0 0 0 2px #b88a5e inset;
            padding: 30px 25px;
            max-width: 1200px;
            width: 100%;
            position: relative;
        }

        .crt::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, rgba(70,40,10,0.2) 0%, transparent 60%);
            border-radius: 18px;
            pointer-events: none;
            z-index: 2;
        }

        .crt::after {
            content: "";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: repeating-linear-gradient(0deg, rgba(100,60,20,0.2) 0px, rgba(120,70,20,0.1) 2px, transparent 3px, transparent 5px);
            border-radius: 18px;
            pointer-events: none;
            z-index: 3;
        }

        .terminal {
            background-color: #1e2b1a;
            border: 2px solid #8b6b45;
            padding: 24px 20px;
            border-radius: 12px;
            box-shadow: inset 0 0 20px #3f2e1e;
            position: relative;
            z-index: 5;
        }

        .cursor-block {
            display: inline-block;
            width: 14px;
            height: 18px;
            background-color: #f0b060;
            vertical-align: middle;
            margin-left: 5px;
            box-shadow: 0 0 10px #ffaa33;
        }

        .header {
            border-bottom: 4px dashed #8b6b45;
            padding-bottom: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            font-size: 11px;
            color: #e2b87a;
            letter-spacing: 1px;
        }

        .title-main {
            font-size: 18px;
            line-height: 1.5;
            text-transform: uppercase;
            color: #f0c674;
            text-shadow: 0 0 8px #b87c30;
        }
        .title-main span {
            background-color: #5a3e2b;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
            color: #000;
            text-shadow: none;
        }

        .date {
            font-size: 10px;
            background: #3f2e1e;
            padding: 8px 10px;
            border-radius: 30px;
            border: 1px solid #b88a5e;
        }

        .casefile-box {
            background-color: #0f1a0f;
            border: 4px solid #8b6b45;
            padding: 25px 20px;
            margin: 25px 0 30px 0;
            box-shadow: 0 0 0 2px #3f2e1e, inset 0 0 20px #1e2b1a;
            font-size: 13px;
            line-height: 2;
            color: #f0c674;
            min-height: 260px;
            overflow-y: auto;
            max-height: 420px;
        }

        .encounter-output {
            word-break: break-word;
            white-space: pre-wrap;
        }

        .file-list {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .file-list li {
            margin: 12px 0;
            cursor: pointer;
            border-left: 4px solid #8b6b45;
            padding-left: 12px;
            transition: 0.1s;
        }
        .file-list li:hover {
            border-left-color: #e0b070;
            background: #3f2e1e;
            text-shadow: 0 0 8px #f0c674;
        }
        .file-list li::before {
            content: "📜 ";
            color: #b88a5e;
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            gap: 5px;
            border-bottom: 2px solid #8b6b45;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #0f1a0f;
            border: 2px solid #8b6b45;
            border-bottom: none;
            color: #f0c674;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            margin-bottom: -2px;
        }
        .tab-btn.active {
            background: #3f2e1e;
            border-color: #e0b070;
            color: #ffdfaa;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* Create form layout */
        .create-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }
        .form-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-field label {
            font-size: 9px;
            color: #e2b87a;
            letter-spacing: 1px;
        }
        .form-field input, .form-field select, .form-field textarea {
            background: #0f1a0f;
            border: 2px solid #8b6b45;
            color: #f0c674;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 8px 8px;
            width: 100%;
            outline: none;
            box-shadow: inset 0 0 8px #1e2b1a;
        }
        .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
            border-color: #e0b070;
        }
        .form-field select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23f0c674" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 12px;
        }

        /* Room editor */
        .room-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }
        .room-card {
            border: 2px solid #8b6b45;
            background: #0f1a0f;
            padding: 15px;
            border-radius: 8px;
        }
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .room-header h4 {
            font-size: 12px;
            color: #e0b070;
        }
        .remove-room {
            background: #5a3e2b;
            border: 2px solid #b88a5e;
            color: #f0c674;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 4px 8px;
            cursor: pointer;
        }
        .room-exits {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .room-exits select {
            font-size: 8px;
            padding: 4px;
        }

        /* Checkbox groups */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: #0f1a0f;
            border: 2px solid #8b6b45;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 9px;
            width: calc(33% - 5px);
        }
        .checkbox-item input[type="checkbox"] {
            width: auto;
            accent-color: #f0c674;
        }

        .form-actions {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        .form-actions button {
            background: #3f2e1e;
            border: 3px solid #8b6b45;
            color: #f0c674;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            padding: 12px 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #0f1a0f;
            transition: 0.05s linear;
            flex: 1;
        }
        .form-actions button:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .form-actions button:hover {
            background: #5a4a3a;
            border-color: #e0b070;
        }

        .button-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            justify-content: center;
            margin-top: 25px;
        }

        .retro-btn {
            background-color: #3f2e1e;
            border: 4px solid #8b6b45;
            color: #f0c674;
            font-family: 'Press Start 2P', monospace;
            font-size: 13px;
            padding: 16px 22px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 8px 0 #0f1a0f, 0 10px 10px black;
            transition: all 0.08s linear;
            text-shadow: 0 0 5px #b87c30;
            flex: 1 1 200px;
        }

        .retro-btn:active {
            transform: translateY(7px);
            box-shadow: 0 2px 0 #0f1a0f, 0 5px 12px black;
        }

        .retro-btn:hover {
            background-color: #5a4a3a;
            border-color: #e0b070;
            color: #ffdfaa;
        }

        .signature {
            margin-top: 30px;
            text-align: right;
            font-size: 9px;
            color: #8b6b45;
            border-top: 2px dotted #8b6b45;
            padding-top: 18px;
            letter-spacing: 1.5px;
        }

        .signature span {
            background: #1e2b1a;
            padding: 4px 8px;
        }

        .prompt-line {
            color: #e2b87a;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .prompt-line::before {
            content: "⚔️ ";
            font-weight: bold;
            color: #f0b060;
        }

        .command-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        .command-btn {
            background: #0f1a0f;
            border: 2px solid #8b6b45;
            color: #f0c674;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 8px 12px;
            cursor: pointer;
            box-shadow: 0 3px 0 #0a0f0a;
            transition: 0.05s linear;
        }
        .command-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }
        .command-btn:hover {
            background: #3f2e1e;
            border-color: #e0b070;
        }

        .preview-box {
            background: #0f1a0f;
            border: 2px solid #8b6b45;
            padding: 15px;
            margin-top: 15px;
            font-size: 10px;
            white-space: pre-wrap;
        }

        .search-box {
            margin-bottom: 15px;
        }
        .search-box input {
            width: 100%;
            padding: 10px;
            background: #0f1a0f;
            border: 2px solid #8b6b45;
            color: #f0c674;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
        }
        /* New styles for dialogue editor */
        .dialogue-node {
            border: 2px solid #8b6b45;
            background: #0f1a0f;
            padding: 10px;
            margin: 10px 0;
        }
        .dialogue-option {
            margin-left: 20px;
            border-left: 2px solid #b88a5e;
            padding-left: 10px;
            margin-top: 5px;
        }
        .small-btn {
            font-size: 8px;
            padding: 4px 6px;
        }
    </style>
</head>
<body>
    <div class="crt">
        <div class="terminal">
            <div class="header">
                <div class="title-main">
                    🏰 QUEST CREATOR <span>NIGHTFALL 1984</span>
                </div>
                <div class="date">
                    // 1984-10-21 // v4.0 //
                </div>
            </div>

            <div class="prompt-line">ARCHIVE:: QUEST #<span id="questNum">Q001</span></div>

            <div class="casefile-box">
                <div class="encounter-output" id="encounterDisplay">
                    > WELCOME TO QUEST ADVENTURE CREATOR.<span class="cursor-block"></span>
                </div>
            </div>

            <div class="button-panel">
                <button class="retro-btn" id="randomQuestBtn">🎲 RANDOM QUEST</button>
                <button class="retro-btn" id="createQuestBtn">✎ CREATE QUEST</button>
                <button class="retro-btn" id="myQuestsBtn">📜 MY QUESTS</button>
                <button class="retro-btn" id="loadQuestBtn">⚡ LOAD QUEST</button>
                <button class="retro-btn" id="startAdventureBtn" style="display: none;">🏁 START ADVENTURE</button>
            </div>

            <div class="signature">
                <span> NIGHTFALL GAMES /// TEXT ADVENTURE GENERATOR /// 48K RAM </span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ------------------------------------------------------------
            //  QUEST ADVENTURE CREATOR – ENHANCED VERSION
            //  Nightfall Games 1984
            //  Added: Events, Dialogue Trees, Shops, Containers
            // ------------------------------------------------------------

            // ----- Helper functions -----
            function randFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

            // ----- Default pools (used for random generation) -----
            const LOCATION_TYPES = ['castle', 'forest', 'mountain', 'swamp', 'village'];
            const QUEST_TITLES = [
                "The Lost Crown", "Curse of the Vampire", "Dragon's Hoard", "The Witch's Brew",
                "Goblin Trouble", "The Sunken Temple", "The King's Ransom", "Stolen Amulet",
                "The Dark Sorcerer", "The Forgotten Prince", "The Seventh Seal", "The Iron Key"
            ];
            const ANTAGONISTS = [
                "Black Knight", "Necromancer", "Goblin King", "Lich", "Dragon", "Evil Enchantress",
                "Troll Chieftain", "Cult Leader", "Demon", "Shadow Beast"
            ];
            const ALLIES_POOL = [
                "Old Wizard", "Brave Squire", "Forest Elf", "Dwarven Miner", "Village Elder",
                "Mystic Herbalist", "Ranger", "Talking Raven"
            ];
            const MONSTERS_POOL = [
                "Goblin", "Skeleton", "Zombie", "Giant Rat", "Wolf", "Orc", "Harpy", "Ogre", "Wraith", "Spider"
            ];
            const ITEMS_POOL = [
                "Iron Sword", "Healing Potion", "Torch", "Rope", "Magic Ring", "Silver Dagger",
                "Lockpicks", "Herbs", "Chainmail", "Shield", "Holy Water", "Bow & Arrow"
            ];

            // ----- Extended QuestFile class -----
            class QuestFile {
                constructor(fields = {}) {
                    this.id = fields.id || 'Q' + Math.floor(Math.random() * 900 + 100);
                    this.title = fields.title || randFrom(QUEST_TITLES);
                    this.locationType = fields.locationType || randFrom(LOCATION_TYPES);
                    this.size = fields.size || 'medium';
                    this.difficulty = fields.difficulty || 'medium';
                    this.antagonist = fields.antagonist || randFrom(ANTAGONISTS);
                    this.goal = fields.goal || 'Defeat the enemy and retrieve the treasure';
                    this.extra = fields.extra || '';

                    // Existing fields
                    this.rooms = fields.rooms || this.generateDefaultRooms();
                    this.monsterDefinitions = fields.monsterDefinitions || this.generateDefaultMonsters();
                    this.allyDefinitions = fields.allyDefinitions || this.generateDefaultAllies();
                    this.itemDefinitions = fields.itemDefinitions || this.generateDefaultItems();
                    this.randomEncounterTable = fields.randomEncounterTable || this.generateDefaultEncounterTable();
                    this.objectives = fields.objectives || [{ description: this.goal, optional: false }];

                    // NEW: Events
                    this.events = fields.events || [];

                    // NEW: For dialogue trees, each ally now has a 'dialogue' object
                    // We'll keep backward compatibility: if ally has 'behavior', we convert on load
                    // But for new quests, we'll create a default dialogue.
                }

                generateDefaultRooms() {
                    return [
                        { id: 0, name: "Entrance", desc: "The beginning of your journey.", landmark: "", items: [], monsters: [], allies: [], exits: { north: 1 }, locked: false, secretPassage: false, shop: null }, // shop added
                        { id: 1, name: "Great Hall", desc: "A large hall with pillars.", landmark: "A mysterious altar", items: [], monsters: [0], allies: [], exits: { south: 0, east: 2 }, locked: false, secretPassage: false, shop: null },
                        { id: 2, name: "Treasure Chamber", desc: "Glittering gold fills the room.", landmark: "Dragon's Hoard", items: [0], monsters: [], allies: [], exits: { west: 1 }, locked: true, secretPassage: false, shop: null }
                    ];
                }

                generateDefaultMonsters() {
                    return [
                        { id: 0, name: "Goblin", baseHp: 6, baseDamage: 2, special: "", boss: false },
                        { id: 1, name: "Skeleton", baseHp: 8, baseDamage: 3, special: "undead", boss: false },
                        { id: 2, name: "Dragon", baseHp: 30, baseDamage: 8, special: "breathes fire", boss: true }
                    ];
                }

                generateDefaultAllies() {
                    // Each ally now has a dialogue tree. We'll create a simple default.
                    return [
                        { id: 0, name: "Old Wizard", dialogue: this.createDefaultDialogue("Old Wizard", "hint") },
                        { id: 1, name: "Brave Squire", dialogue: this.createDefaultDialogue("Brave Squire", "fight") },
                        { id: 2, name: "Village Elder", dialogue: this.createDefaultDialogue("Village Elder", "trade") }
                    ];
                }

                createDefaultDialogue(name, behavior) {
                    // Create a simple root node with one option based on behavior
                    let options = [];
                    if (behavior === 'hint') {
                        options.push({ text: "Ask for hint", nextNode: "end", action: "hint", condition: null });
                    } else if (behavior === 'fight') {
                        options.push({ text: "Ask to join", nextNode: "end", action: "fight", condition: null });
                    } else if (behavior === 'trade') {
                        options.push({ text: "Trade", nextNode: "end", action: "trade", condition: null });
                    } else {
                        options.push({ text: "Talk", nextNode: "end", action: null, condition: null });
                    }
                    return {
                        root: "node1",
                        nodes: {
                            node1: {
                                id: "node1",
                                text: `Hello, I am ${name}.`,
                                options: options
                            },
                            end: { id: "end", text: "", options: [] } // terminal node
                        }
                    };
                }

                generateDefaultItems() {
                    return [
                        { id: 0, name: "Iron Sword", type: "weapon", effect: "+2 damage", consumable: false, questItem: false, isContainer: false, contents: [], locked: false, keyId: null },
                        { id: 1, name: "Healing Potion", type: "consumable", effect: "heal 8 HP", consumable: true, questItem: false, isContainer: false, contents: [], locked: false, keyId: null },
                        { id: 2, name: "Torch", type: "tool", effect: "reveals secret passages", consumable: false, questItem: false, isContainer: false, contents: [], locked: false, keyId: null },
                        { id: 3, name: "Silver Dagger", type: "weapon", effect: "+2 vs undead", consumable: false, questItem: false, isContainer: false, contents: [], locked: false, keyId: null },
                        { id: 4, name: "Old Chest", type: "container", effect: "", consumable: false, questItem: false, isContainer: true, contents: [1, 2], locked: true, keyId: 0 } // contains potion and torch, locked, key is item 0 (Iron Sword? but we'll use keyId as item id)
                    ];
                }

                generateDefaultEncounterTable() {
                    return [
                        { monsterId: 0, probability: 0.5 },
                        { monsterId: 1, probability: 0.3 },
                        { monsterId: 2, probability: 0.2 }
                    ];
                }

                // Convert to plain object for storage
                toJSON() {
                    return {
                        id: this.id,
                        title: this.title,
                        locationType: this.locationType,
                        size: this.size,
                        difficulty: this.difficulty,
                        antagonist: this.antagonist,
                        goal: this.goal,
                        extra: this.extra,
                        rooms: this.rooms,
                        monsterDefinitions: this.monsterDefinitions,
                        allyDefinitions: this.allyDefinitions,
                        itemDefinitions: this.itemDefinitions,
                        randomEncounterTable: this.randomEncounterTable,
                        objectives: this.objectives,
                        events: this.events
                    };
                }

                // Create formatted display string
                formatDisplay() {
                    let s = `${this.id} // "${this.title}"\n`;
                    s += `> LOCATION: ${this.locationType.toUpperCase()}\n`;
                    s += `> DIFFICULTY: ${this.difficulty.toUpperCase()}\n`;
                    s += `> ANTAGONIST: ${this.antagonist}\n`;
                    s += `> QUEST: ${this.goal}\n`;
                    if (this.extra) s += `> NOTES: ${this.extra}\n`;
                    s += `> ROOMS: ${this.rooms.length}\n`;
                    s += `> MONSTERS: ${this.monsterDefinitions.length}\n`;
                    s += `> ALLIES: ${this.allyDefinitions.length}\n`;
                    s += `> ITEMS: ${this.itemDefinitions.length}\n`;
                    s += `> EVENTS: ${this.events.length}\n`;
                    s += `> STATUS: READY FOR ADVENTURE`;
                    return s;
                }
            }

            // ----- Persistent storage -----
            let savedQuests = [];
            try {
                const stored = localStorage.getItem('nightfall_quests_v4');
                if (stored) {
                    const parsed = JSON.parse(stored);
                    // Convert plain objects back to QuestFile instances and ensure new fields exist
                    savedQuests = parsed.map(q => {
                        // Add default dialogue to allies if missing
                        if (!q.allyDefinitions) q.allyDefinitions = [];
                        q.allyDefinitions.forEach(ally => {
                            if (!ally.dialogue) {
                                // convert old behavior to dialogue
                                ally.dialogue = new QuestFile().createDefaultDialogue(ally.name, ally.behavior || 'hint');
                            }
                        });
                        // Add default shop and container fields
                        q.rooms.forEach(room => { if (room.shop === undefined) room.shop = null; });
                        q.itemDefinitions.forEach(item => {
                            if (item.isContainer === undefined) item.isContainer = false;
                            if (item.contents === undefined) item.contents = [];
                            if (item.locked === undefined) item.locked = false;
                            if (item.keyId === undefined) item.keyId = null;
                        });
                        if (!q.events) q.events = [];
                        return new QuestFile(q);
                    });
                } else savedQuests = [];
            } catch (e) { savedQuests = []; }

            function saveQuests() {
                localStorage.setItem('nightfall_quests_v4', JSON.stringify(savedQuests.map(q => q.toJSON())));
            }

            // ----- Current quest & game state -----
            let currentQuest = null;
            let adventureState = null;

            // ----- UI elements -----
            const displayEl = document.getElementById('encounterDisplay');
            const questNumSpan = document.getElementById('questNum');
            const startBtn = document.getElementById('startAdventureBtn');

            function setDisplay(text, id = '----') {
                displayEl.innerHTML = '';
                const pre = document.createElement('div');
                pre.className = 'encounter-output';
                pre.innerText = text;
                displayEl.appendChild(pre);
                questNumSpan.innerText = id;
            }

            function loadQuest(quest) {
                currentQuest = quest;
                setDisplay(quest.formatDisplay(), quest.id);
                startBtn.style.display = 'inline-block';
                adventureState = null;
            }

            // ----- Generate random quest (updated) -----
            function generateRandomQuest() {
                const quest = new QuestFile(); // uses default random values
                savedQuests.push(quest);
                saveQuests();
                loadQuest(quest);
            }

            // ----- Tabbed creation form -----
            function showCreateForm(existingQuest = null) {
                const quest = existingQuest ? new QuestFile(existingQuest.toJSON()) : new QuestFile();
                const formDiv = document.createElement('div');
                formDiv.className = 'create-form';

                // Build tabs: added 'events' and 'dialogue' is inside characters
                const tabs = ['basic', 'rooms', 'characters', 'items', 'objectives', 'events'];
                const tabNames = ['BASIC', 'ROOMS', 'CHARACTERS', 'ITEMS', 'OBJECTIVES', 'EVENTS'];

                let html = `<div class="tab-bar">`;
                tabs.forEach((t, i) => {
                    html += `<button class="tab-btn ${i === 0 ? 'active' : ''}" data-tab="${t}">${tabNames[i]}</button>`;
                });
                html += `</div>`;

                // Tab contents
                tabs.forEach((t, i) => {
                    html += `<div class="tab-content ${i === 0 ? 'active' : ''}" data-tab-content="${t}">`;
                    html += getTabContent(t, quest);
                    html += `</div>`;
                });

                html += `<div class="form-actions">
                    <button id="save-quest-btn">SAVE QUEST</button>
                    <button id="cancel-create-btn">CANCEL</button>
                </div>`;

                formDiv.innerHTML = html;
                displayEl.innerHTML = '';
                displayEl.appendChild(formDiv);
                questNumSpan.innerText = 'EDIT';

                // Attach tab switching
                const tabBtns = formDiv.querySelectorAll('.tab-btn');
                tabBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        tabBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        const tab = btn.dataset.tab;
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                        document.querySelector(`.tab-content[data-tab-content="${tab}"]`).classList.add('active');
                    });
                });

                // Room management
                const roomListDiv = formDiv.querySelector('.room-list');
                if (roomListDiv) {
                    renderRoomList(roomListDiv, quest);
                }

                // Character management (monsters, allies, dialogue)
                const monsterListDiv = formDiv.querySelector('#monster-list');
                if (monsterListDiv) {
                    renderMonsterList(monsterListDiv, quest);
                }
                const allyListDiv = formDiv.querySelector('#ally-list');
                if (allyListDiv) {
                    renderAllyList(allyListDiv, quest);
                }

                // Item management
                const itemListDiv = formDiv.querySelector('#item-list');
                if (itemListDiv) {
                    renderItemList(itemListDiv, quest);
                }

                // Random encounter table
                const encTableDiv = formDiv.querySelector('#encounter-table');
                if (encTableDiv) {
                    renderEncounterTable(encTableDiv, quest);
                }

                // Objectives
                const objectivesDiv = formDiv.querySelector('#objectives-list');
                if (objectivesDiv) {
                    renderObjectives(objectivesDiv, quest);
                }

                // Events
                const eventsDiv = formDiv.querySelector('#events-list');
                if (eventsDiv) {
                    renderEventsList(eventsDiv, quest);
                }

                // Preview
                const previewDiv = formDiv.querySelector('#preview-content');
                if (previewDiv) {
                    updatePreview(previewDiv, quest);
                }

                // Save button
                document.getElementById('save-quest-btn').addEventListener('click', () => {
                    // Gather basic info
                    quest.title = document.getElementById('create-title')?.value.trim() || 'Untitled';
                    quest.locationType = document.getElementById('create-locType')?.value || 'castle';
                    quest.difficulty = document.getElementById('create-diff')?.value || 'medium';
                    quest.antagonist = document.getElementById('create-antag')?.value.trim() || 'Unknown';
                    quest.goal = document.getElementById('create-goal')?.value.trim() || 'Unknown quest';
                    quest.extra = document.getElementById('create-extra')?.value.trim() || '';

                    // Validate at least one room
                    if (!quest.rooms || quest.rooms.length === 0) {
                        alert('You must create at least one room.');
                        return;
                    }

                    // Save
                    if (!existingQuest) {
                        savedQuests.push(quest);
                    } else {
                        const index = savedQuests.findIndex(q => q.id === existingQuest.id);
                        if (index !== -1) savedQuests[index] = quest;
                        else savedQuests.push(quest);
                    }
                    saveQuests();
                    loadQuest(quest);
                });

                document.getElementById('cancel-create-btn').addEventListener('click', () => {
                    if (currentQuest) setDisplay(currentQuest.formatDisplay(), currentQuest.id);
                    else generateRandomQuest();
                });
            }

            // Helper to generate tab content
            function getTabContent(tab, quest) {
                if (tab === 'basic') {
                    return `
                        <div class="form-field">
                            <label>QUEST TITLE</label>
                            <input type="text" id="create-title" value="${quest.title.replace(/"/g, '&quot;')}">
                        </div>
                        <div class="form-field">
                            <label>LOCATION TYPE</label>
                            <select id="create-locType">
                                ${LOCATION_TYPES.map(l => `<option value="${l}" ${quest.locationType === l ? 'selected' : ''}>${l.toUpperCase()}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-field">
                            <label>DIFFICULTY</label>
                            <select id="create-diff">
                                <option value="easy" ${quest.difficulty === 'easy' ? 'selected' : ''}>EASY</option>
                                <option value="medium" ${quest.difficulty === 'medium' ? 'selected' : ''}>MEDIUM</option>
                                <option value="hard" ${quest.difficulty === 'hard' ? 'selected' : ''}>HARD</option>
                            </select>
                        </div>
                        <div class="form-field">
                            <label>ANTAGONIST</label>
                            <input type="text" id="create-antag" value="${quest.antagonist.replace(/"/g, '&quot;')}">
                        </div>
                        <div class="form-field">
                            <label>MAIN QUEST (goal)</label>
                            <input type="text" id="create-goal" value="${quest.goal.replace(/"/g, '&quot;')}">
                        </div>
                        <div class="form-field">
                            <label>EXTRA NOTES</label>
                            <textarea id="create-extra" rows="2">${quest.extra.replace(/"/g, '&quot;')}</textarea>
                        </div>
                        <div class="preview-box">
                            <strong>LIVE PREVIEW:</strong>
                            <div id="preview-content">${quest.formatDisplay().replace(/\n/g, '<br>')}</div>
                        </div>
                    `;
                } else if (tab === 'rooms') {
                    return `
                        <div class="room-list"></div>
                        <button class="command-btn" id="add-room-btn" style="margin-top:10px;">➕ ADD ROOM</button>
                    `;
                } else if (tab === 'characters') {
                    return `
                        <h4 style="font-size:12px; margin:10px 0;">MONSTERS</h4>
                        <div id="monster-list"></div>
                        <button class="command-btn" id="add-monster-btn">➕ ADD MONSTER</button>
                        <h4 style="font-size:12px; margin:20px 0 10px;">ALLIES (with dialogue)</h4>
                        <div id="ally-list"></div>
                        <button class="command-btn" id="add-ally-btn">➕ ADD ALLY</button>
                        <h4 style="font-size:12px; margin:20px 0 10px;">RANDOM ENCOUNTER TABLE</h4>
                        <div id="encounter-table"></div>
                        <button class="command-btn" id="add-encounter-btn">➕ ADD ENCOUNTER ROW</button>
                    `;
                } else if (tab === 'items') {
                    return `
                        <div id="item-list"></div>
                        <button class="command-btn" id="add-item-btn">➕ ADD ITEM</button>
                    `;
                } else if (tab === 'objectives') {
                    return `
                        <div id="objectives-list"></div>
                        <button class="command-btn" id="add-objective-btn">➕ ADD OBJECTIVE</button>
                    `;
                } else if (tab === 'events') {
                    return `
                        <div id="events-list"></div>
                        <button class="command-btn" id="add-event-btn">➕ ADD EVENT</button>
                    `;
                }
                return '';
            }

            // Room editor (updated to include shop)
            function renderRoomList(container, quest) {
                container.innerHTML = '';
                quest.rooms.forEach((room, index) => {
                    const roomCard = document.createElement('div');
                    roomCard.className = 'room-card';
                    roomCard.innerHTML = `
                        <div class="room-header">
                            <h4>Room ${index}</h4>
                            <button class="remove-room" data-index="${index}">🗑️</button>
                        </div>
                        <div class="form-field">
                            <label>Name</label>
                            <input type="text" class="room-name" data-index="${index}" value="${room.name.replace(/"/g, '&quot;')}">
                        </div>
                        <div class="form-field">
                            <label>Description</label>
                            <textarea class="room-desc" data-index="${index}" rows="2">${room.desc.replace(/"/g, '&quot;')}</textarea>
                        </div>
                        <div class="form-field">
                            <label>Landmark (optional)</label>
                            <input type="text" class="room-landmark" data-index="${index}" value="${(room.landmark || '').replace(/"/g, '&quot;')}">
                        </div>
                        <div class="room-exits">
                            <div>
                                <label>North</label>
                                <select class="room-exit-north" data-index="${index}">
                                    <option value="">None</option>
                                    ${quest.rooms.map((_, i) => `<option value="${i}" ${room.exits.north === i ? 'selected' : ''}>Room ${i}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label>South</label>
                                <select class="room-exit-south" data-index="${index}">
                                    <option value="">None</option>
                                    ${quest.rooms.map((_, i) => `<option value="${i}" ${room.exits.south === i ? 'selected' : ''}>Room ${i}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label>East</label>
                                <select class="room-exit-east" data-index="${index}">
                                    <option value="">None</option>
                                    ${quest.rooms.map((_, i) => `<option value="${i}" ${room.exits.east === i ? 'selected' : ''}>Room ${i}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label>West</label>
                                <select class="room-exit-west" data-index="${index}">
                                    <option value="">None</option>
                                    ${quest.rooms.map((_, i) => `<option value="${i}" ${room.exits.west === i ? 'selected' : ''}>Room ${i}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label>Up</label>
                                <select class="room-exit-up" data-index="${index}">
                                    <option value="">None</option>
                                    ${quest.rooms.map((_, i) => `<option value="${i}" ${room.exits.up === i ? 'selected' : ''}>Room ${i}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label>Down</label>
                                <select class="room-exit-down" data-index="${index}">
                                    <option value="">None</option>
                                    ${quest.rooms.map((_, i) => `<option value="${i}" ${room.exits.down === i ? 'selected' : ''}>Room ${i}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label>Secret</label>
                                <select class="room-exit-secret" data-index="${index}">
                                    <option value="">None</option>
                                    ${quest.rooms.map((_, i) => `<option value="${i}" ${room.exits.secret === i ? 'selected' : ''}>Room ${i}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div class="form-field">
                            <label>Locked?</label>
                            <input type="checkbox" class="room-locked" data-index="${index}" ${room.locked ? 'checked' : ''}>
                        </div>
                        <div class="form-field">
                            <label>Shop (optional) - format: itemId:price, e.g. 0:50,1:30</label>
                            <input type="text" class="room-shop" data-index="${index}" value="${room.shop ? room.shop.map(s => `${s.itemId}:${s.price}`).join(',') : ''}">
                        </div>
                    `;
                    container.appendChild(roomCard);

                    // Attach listeners
                    roomCard.querySelectorAll('input, textarea, select').forEach(el => {
                        el.addEventListener('change', function(e) {
                            const idx = parseInt(this.dataset.index);
                            if (this.classList.contains('room-name')) quest.rooms[idx].name = this.value;
                            else if (this.classList.contains('room-desc')) quest.rooms[idx].desc = this.value;
                            else if (this.classList.contains('room-landmark')) quest.rooms[idx].landmark = this.value;
                            else if (this.classList.contains('room-exit-north')) quest.rooms[idx].exits.north = this.value === '' ? undefined : parseInt(this.value);
                            else if (this.classList.contains('room-exit-south')) quest.rooms[idx].exits.south = this.value === '' ? undefined : parseInt(this.value);
                            else if (this.classList.contains('room-exit-east')) quest.rooms[idx].exits.east = this.value === '' ? undefined : parseInt(this.value);
                            else if (this.classList.contains('room-exit-west')) quest.rooms[idx].exits.west = this.value === '' ? undefined : parseInt(this.value);
                            else if (this.classList.contains('room-exit-up')) quest.rooms[idx].exits.up = this.value === '' ? undefined : parseInt(this.value);
                            else if (this.classList.contains('room-exit-down')) quest.rooms[idx].exits.down = this.value === '' ? undefined : parseInt(this.value);
                            else if (this.classList.contains('room-exit-secret')) quest.rooms[idx].exits.secret = this.value === '' ? undefined : parseInt(this.value);
                            else if (this.classList.contains('room-locked')) quest.rooms[idx].locked = this.checked;
                            else if (this.classList.contains('room-shop')) {
                                const shopStr = this.value.trim();
                                if (shopStr) {
                                    quest.rooms[idx].shop = shopStr.split(',').map(s => {
                                        const [itemId, price] = s.split(':').map(Number);
                                        return { itemId, price };
                                    }).filter(e => !isNaN(e.itemId) && !isNaN(e.price));
                                } else {
                                    quest.rooms[idx].shop = null;
                                }
                            }
                        });
                    });

                    roomCard.querySelector('.remove-room').addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        quest.rooms.splice(idx, 1);
                        // Update exits
                        quest.rooms.forEach((r, i) => {
                            Object.keys(r.exits).forEach(dir => {
                                if (r.exits[dir] !== undefined) {
                                    if (r.exits[dir] === idx) delete r.exits[dir];
                                    else if (r.exits[dir] > idx) r.exits[dir]--;
                                }
                            });
                        });
                        renderRoomList(container, quest);
                    });
                });

                document.getElementById('add-room-btn').onclick = () => {
                    const newId = quest.rooms.length;
                    quest.rooms.push({
                        id: newId,
                        name: 'New Room',
                        desc: 'Description',
                        landmark: '',
                        items: [],
                        monsters: [],
                        allies: [],
                        exits: {},
                        locked: false,
                        secretPassage: false,
                        shop: null
                    });
                    renderRoomList(container, quest);
                };
            }

            // Monster list (unchanged)
            function renderMonsterList(container, quest) {
                container.innerHTML = '';
                quest.monsterDefinitions.forEach((monster, idx) => {
                    const div = document.createElement('div');
                    div.className = 'room-card';
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between;">
                            <h4>${monster.name}</h4>
                            <button class="remove-monster" data-index="${idx}">🗑️</button>
                        </div>
                        <div class="form-field">
                            <label>Name</label>
                            <input type="text" class="monster-name" data-index="${idx}" value="${monster.name}">
                        </div>
                        <div class="form-field">
                            <label>Base HP</label>
                            <input type="number" class="monster-hp" data-index="${idx}" value="${monster.baseHp}" min="1">
                        </div>
                        <div class="form-field">
                            <label>Base Damage</label>
                            <input type="number" class="monster-damage" data-index="${idx}" value="${monster.baseDamage}" min="1">
                        </div>
                        <div class="form-field">
                            <label>Special Abilities</label>
                            <input type="text" class="monster-special" data-index="${idx}" value="${monster.special || ''}">
                        </div>
                        <div class="form-field">
                            <label>Boss?</label>
                            <input type="checkbox" class="monster-boss" data-index="${idx}" ${monster.boss ? 'checked' : ''}>
                        </div>
                    `;
                    container.appendChild(div);

                    div.querySelectorAll('input, textarea, select').forEach(el => {
                        el.addEventListener('change', function() {
                            const i = parseInt(this.dataset.index);
                            if (this.classList.contains('monster-name')) quest.monsterDefinitions[i].name = this.value;
                            else if (this.classList.contains('monster-hp')) quest.monsterDefinitions[i].baseHp = parseInt(this.value) || 1;
                            else if (this.classList.contains('monster-damage')) quest.monsterDefinitions[i].baseDamage = parseInt(this.value) || 1;
                            else if (this.classList.contains('monster-special')) quest.monsterDefinitions[i].special = this.value;
                            else if (this.classList.contains('monster-boss')) quest.monsterDefinitions[i].boss = this.checked;
                        });
                    });

                    div.querySelector('.remove-monster').addEventListener('click', function() {
                        const i = parseInt(this.dataset.index);
                        quest.monsterDefinitions.splice(i, 1);
                        renderMonsterList(container, quest);
                    });
                });

                document.getElementById('add-monster-btn').onclick = () => {
                    quest.monsterDefinitions.push({ id: quest.monsterDefinitions.length, name: 'New Monster', baseHp: 6, baseDamage: 2, special: '', boss: false });
                    renderMonsterList(container, quest);
                };
            }

            // Ally list with dialogue editor
            function renderAllyList(container, quest) {
                container.innerHTML = '';
                quest.allyDefinitions.forEach((ally, idx) => {
                    const div = document.createElement('div');
                    div.className = 'room-card';
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between;">
                            <h4>${ally.name}</h4>
                            <button class="remove-ally" data-index="${idx}">🗑️</button>
                        </div>
                        <div class="form-field">
                            <label>Name</label>
                            <input type="text" class="ally-name" data-index="${idx}" value="${ally.name}">
                        </div>
                        <div class="form-field">
                            <label>Dialogue (click Edit to open editor)</label>
                            <button class="command-btn small-btn edit-dialogue" data-index="${idx}">EDIT DIALOGUE</button>
                        </div>
                        <div class="dialogue-preview-${idx}" style="font-size:8px; margin-top:5px; border:1px solid #8b6b45; padding:5px;">
                            ${ally.dialogue ? 'Dialogue nodes: ' + Object.keys(ally.dialogue.nodes).length : 'No dialogue'}
                        </div>
                    `;
                    container.appendChild(div);

                    div.querySelector('.ally-name').addEventListener('change', function() {
                        const i = parseInt(this.dataset.index);
                        quest.allyDefinitions[i].name = this.value;
                    });

                    div.querySelector('.edit-dialogue').addEventListener('click', function() {
                        const i = parseInt(this.dataset.index);
                        openDialogueEditor(quest, i);
                    });

                    div.querySelector('.remove-ally').addEventListener('click', function() {
                        const i = parseInt(this.dataset.index);
                        quest.allyDefinitions.splice(i, 1);
                        renderAllyList(container, quest);
                    });
                });

                document.getElementById('add-ally-btn').onclick = () => {
                    const newAlly = { id: quest.allyDefinitions.length, name: 'New Ally', dialogue: new QuestFile().createDefaultDialogue('New Ally', 'hint') };
                    quest.allyDefinitions.push(newAlly);
                    renderAllyList(container, quest);
                };
            }

            // Dialogue editor (inline in the form, but we'll create a modal-like overlay)
            function openDialogueEditor(quest, allyIndex) {
                const ally = quest.allyDefinitions[allyIndex];
                if (!ally.dialogue) {
                    ally.dialogue = new QuestFile().createDefaultDialogue(ally.name, 'hint');
                }
                // We'll create a temporary editor in the display area
                const editorDiv = document.createElement('div');
                editorDiv.className = 'create-form';
                editorDiv.style.background = '#1e2b1a';
                editorDiv.style.padding = '20px';
                editorDiv.style.border = '4px solid #8b6b45';
                editorDiv.innerHTML = `
                    <h3>Edit Dialogue for ${ally.name}</h3>
                    <div id="dialogue-nodes"></div>
                    <button class="command-btn" id="add-dialogue-node">➕ ADD NODE</button>
                    <div class="form-actions">
                        <button id="close-dialogue-editor">CLOSE</button>
                    </div>
                `;
                displayEl.innerHTML = '';
                displayEl.appendChild(editorDiv);
                questNumSpan.innerText = 'DIALOGUE';

                const nodesContainer = document.getElementById('dialogue-nodes');
                function renderDialogueNodes() {
                    nodesContainer.innerHTML = '';
                    const nodes = ally.dialogue.nodes;
                    Object.keys(nodes).forEach(nodeId => {
                        const node = nodes[nodeId];
                        const nodeDiv = document.createElement('div');
                        nodeDiv.className = 'dialogue-node';
                        nodeDiv.innerHTML = `
                            <div style="display:flex; justify-content:space-between;">
                                <strong>Node ID: ${nodeId}</strong>
                                <button class="remove-node" data-node="${nodeId}">🗑️</button>
                            </div>
                            <div class="form-field">
                                <label>Text (NPC says)</label>
                                <input type="text" class="node-text" data-node="${nodeId}" value="${node.text.replace(/"/g, '&quot;')}">
                            </div>
                            <div class="form-field">
                                <label>Options</label>
                                <div id="options-${nodeId}">
                                    ${node.options.map((opt, optIdx) => `
                                        <div class="dialogue-option">
                                            <input type="text" class="opt-text" data-node="${nodeId}" data-opt="${optIdx}" value="${opt.text.replace(/"/g, '&quot;')}" placeholder="Option text">
                                            <select class="opt-next" data-node="${nodeId}" data-opt="${optIdx}">
                                                <option value="">--Select next node--</option>
                                                ${Object.keys(nodes).map(id => `<option value="${id}" ${opt.nextNode === id ? 'selected' : ''}>${id}</option>`).join('')}
                                            </select>
                                            <select class="opt-action" data-node="${nodeId}" data-opt="${optIdx}">
                                                <option value="">No action</option>
                                                <option value="hint" ${opt.action === 'hint' ? 'selected' : ''}>Hint</option>
                                                <option value="heal" ${opt.action === 'heal' ? 'selected' : ''}>Heal</option>
                                                <option value="trade" ${opt.action === 'trade' ? 'selected' : ''}>Trade</option>
                                                <option value="fight" ${opt.action === 'fight' ? 'selected' : ''}>Fight</option>
                                                <option value="giveItem" ${opt.action === 'giveItem' ? 'selected' : ''}>Give Item</option>
                                                <option value="takeItem" ${opt.action === 'takeItem' ? 'selected' : ''}>Take Item</option>
                                            </select>
                                            <input type="text" class="opt-condition" data-node="${nodeId}" data-opt="${optIdx}" value="${opt.condition || ''}" placeholder="Condition (e.g. hasItem:0)">
                                            <button class="remove-option" data-node="${nodeId}" data-opt="${optIdx}">✖</button>
                                        </div>
                                    `).join('')}
                                </div>
                                <button class="add-option" data-node="${nodeId}">➕ Add Option</button>
                            </div>
                        `;
                        nodesContainer.appendChild(nodeDiv);

                        // Add event listeners for this node
                        nodeDiv.querySelector('.node-text').addEventListener('change', function() {
                            const nid = this.dataset.node;
                            nodes[nid].text = this.value;
                        });

                        nodeDiv.querySelectorAll('.opt-text, .opt-next, .opt-action, .opt-condition').forEach(el => {
                            el.addEventListener('change', function() {
                                const nid = this.dataset.node;
                                const optIdx = parseInt(this.dataset.opt);
                                const opt = nodes[nid].options[optIdx];
                                if (this.classList.contains('opt-text')) opt.text = this.value;
                                else if (this.classList.contains('opt-next')) opt.nextNode = this.value;
                                else if (this.classList.contains('opt-action')) opt.action = this.value || null;
                                else if (this.classList.contains('opt-condition')) opt.condition = this.value || null;
                            });
                        });

                        nodeDiv.querySelectorAll('.remove-option').forEach(btn => {
                            btn.addEventListener('click', function() {
                                const nid = this.dataset.node;
                                const optIdx = parseInt(this.dataset.opt);
                                nodes[nid].options.splice(optIdx, 1);
                                renderDialogueNodes();
                            });
                        });

                        nodeDiv.querySelector('.add-option').addEventListener('click', function() {
                            const nid = this.dataset.node;
                            nodes[nid].options.push({ text: "New option", nextNode: "", action: null, condition: null });
                            renderDialogueNodes();
                        });

                        nodeDiv.querySelector('.remove-node').addEventListener('click', function() {
