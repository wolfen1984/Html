            // ----- Adventure engine (updated with new features) -----
            function initAdventure(quest) {
                const rooms = quest.rooms.map(room => ({
                    ...room,
                    items: room.items || [],
                    monsters: room.monsters ? room.monsters.map(mId => {
                        const def = quest.monsterDefinitions[mId];
                        if (!def) return null;
                        return {
                            ...def,
                            hp: def.baseHp,
                            maxHp: def.baseHp,
                            damage: def.baseDamage
                        };
                    }).filter(m => m) : [],
                    allies: room.allies ? room.allies.map(aId => {
                        return quest.allyDefinitions[aId];
                    }).filter(a => a) : [],
                    shop: room.shop || null
                }));

                const playerHpBase = { easy: 20, medium: 15, hard: 10 }[quest.difficulty] || 15;
                adventureState = {
                    quest: quest,
                    rooms: rooms,
                    currentRoomId: 0,
                    playerHp: playerHpBase,
                    playerMaxHp: playerHpBase,
                    inventory: [],
                    gold: 50, // starting gold
                    combat: null,
                    message: '',
                    gameOver: false,
                    attackBonus: 0,
                    pendingTrade: null,
                    flags: {}, // for custom flags
                    currentDialogue: null // for dialogue trees
                };
            }

            function checkEvents(triggerType, target) {
                if (!adventureState) return;
                const state = adventureState;
                const quest = state.quest;
                quest.events.forEach(event => {
                    if (event.triggerType === triggerType || event.triggerType === 'always') {
                        if (event.triggerTarget && event.triggerTarget !== '' && event.triggerTarget != target) return;
                        // Check conditions
                        let conditionsMet = true;
                        if (event.conditions) {
                            if (event.conditions.hasItem && !state.inventory.some(i => i.id === event.conditions.hasItem)) conditionsMet = false;
                            if (event.conditions.hasGold && state.gold < event.conditions.hasGold) conditionsMet = false;
                            if (event.conditions.flag && state.flags[event.conditions.flag] !== event.conditions.flagValue) conditionsMet = false;
                        }
                        if (!conditionsMet) return;

                        // Perform actions
                        event.actions.forEach(action => {
                            switch (action.type) {
                                case 'unlockDoor':
                                    if (action.roomId !== undefined && action.direction) {
                                        const room = state.rooms[action.roomId];
                                        if (room) {
                                            room.locked = false;
                                            state.message += `\nA door unlocks.`;
                                        }
                                    }
                                    break;
                                case 'spawnMonster':
                                    if (action.roomId !== undefined && action.monsterId !== undefined) {
                                        const def = quest.monsterDefinitions[action.monsterId];
                                        if (def) {
                                            const monster = { ...def, hp: def.baseHp, maxHp: def.baseHp, damage: def.baseDamage };
                                            state.rooms[action.roomId].monsters.push(monster);
                                            state.message += `\nA ${def.name} appears!`;
                                        }
                                    }
                                    break;
                                case 'spawnItem':
                                    if (action.roomId !== undefined && action.itemId !== undefined) {
                                        state.rooms[action.roomId].items.push(action.itemId);
                                    }
                                    break;
                                case 'giveItem':
                                    if (action.itemId !== undefined) {
                                        const item = quest.itemDefinitions[action.itemId];
                                        if (item) state.inventory.push(item);
                                    }
                                    break;
                                case 'addGold':
                                    state.gold += action.amount || 0;
                                    break;
                                case 'removeGold':
                                    state.gold = Math.max(0, state.gold - (action.amount || 0));
                                    break;
                                case 'setFlag':
                                    state.flags[action.flag] = action.value;
                                    break;
                                case 'teleport':
                                    if (action.roomId !== undefined) {
                                        state.currentRoomId = action.roomId;
                                    }
                                    break;
                                case 'endQuest':
                                    state.gameOver = true;
                                    state.message += `\nQuest completed: ${action.message || 'The end.'}`;
                                    break;
                            }
                        });
                    }
                });
            }

            function renderAdventure() {
                if (!adventureState || adventureState.gameOver) {
                    if (adventureState && adventureState.message) setDisplay(adventureState.message, currentQuest?.id || 'END');
                    else setDisplay('Game over.', currentQuest?.id || 'END');
                    return;
                }
                const state = adventureState;
                const room = state.rooms[state.currentRoomId];
                let text = '';
                if (state.message) {
                    text += `> ${state.message}\n\n`;
                    state.message = '';
                }
                text += `> ${room.name}\n${room.desc}\n`;
                if (room.landmark) text += `[Landmark here: ${room.landmark}]\n`;
                if (state.combat) {
                    const m = state.combat.monster;
                    text += `\n⚔️ COMBAT with ${m.name} (HP:${m.hp}/${m.maxHp}) ⚔️\n`;
                } else {
                    if (room.monsters.length > 0) {
                        text += `\n⚠️ Monsters here: ${room.monsters.map(m=>m.name).join(', ')}\n`;
                    }
                    if (room.items.length > 0) {
                        const itemNames = room.items.map(iId => {
                            const def = state.quest.itemDefinitions[iId];
                            return def ? def.name : 'Unknown';
                        }).join(', ');
                        text += `📦 Items: ${itemNames}\n`;
                    }
                    if (room.allies && room.allies.length > 0) {
                        const allyNames = room.allies.map(a => a.name).join(', ');
                        text += `🧙 Allies: ${allyNames}\n`;
                    }
                    if (room.shop) text += `💰 Shop here. (Use SHOP command)\n`;
                    if (room.locked) text += `🔒 A door is locked.\n`;
                    text += `\nHP: ${state.playerHp}/${state.playerMaxHp}   Gold: ${state.gold}   Inventory: ${state.inventory.length>0?state.inventory.map(i=>i.name).join(', '):'empty'}\n`;
                }

                displayEl.innerHTML = '';
                const pre = document.createElement('div');
                pre.className = 'encounter-output';
                pre.innerText = text;
                displayEl.appendChild(pre);

                const btnContainer = document.createElement('div');
                btnContainer.className = 'command-grid';

                if (state.combat) {
                    addCmd(btnContainer, '⚔️ Attack', () => combatRound('attack'));
                    addCmd(btnContainer, '🏃 Flee', () => combatRound('flee'));
                } else if (state.pendingTrade) {
                    addCmd(btnContainer, '✅ Accept trade', () => acceptTrade());
                    addCmd(btnContainer, '❌ Refuse', () => refuseTrade());
                } else if (state.currentDialogue) {
                    // Show dialogue options
                    const node = state.currentDialogue.node;
                    node.options.forEach((opt, idx) => {
                        // Check condition if any
                        if (opt.condition) {
                            // Simple condition parsing: e.g. "hasItem:0"
                            const [cond, val] = opt.condition.split(':');
                            if (cond === 'hasItem' && !state.inventory.some(i => i.id == val)) return;
                            if (cond === 'hasGold' && state.gold < parseInt(val)) return;
                            if (cond === 'flag' && state.flags[val] !== true) return;
                        }
                        addCmd(btnContainer, opt.text, () => dialogueChoose(idx));
                    });
                    addCmd(btnContainer, '🔚 End conversation', () => { state.currentDialogue = null; renderAdventure(); });
                } else {
                    const exits = room.exits;
                    if (exits.north !== undefined) addCmd(btnContainer, '⬆️ North', () => moveTo(exits.north));
                    if (exits.south !== undefined) addCmd(btnContainer, '⬇️ South', () => moveTo(exits.south));
                    if (exits.east !== undefined) addCmd(btnContainer, '➡️ East', () => moveTo(exits.east));
                    if (exits.west !== undefined) addCmd(btnContainer, '⬅️ West', () => moveTo(exits.west));
                    if (exits.up !== undefined) addCmd(btnContainer, '⬆️ Up', () => moveTo(exits.up));
                    if (exits.down !== undefined) addCmd(btnContainer, '⬇️ Down', () => moveTo(exits.down));
                    if (exits.secret !== undefined) addCmd(btnContainer, '🔦 Secret', () => moveTo(exits.secret));

                    addCmd(btnContainer, '🔍 Look', () => { renderAdventure(); });
                    if (room.items.length > 0) addCmd(btnContainer, '📥 Take item', () => takeItem());
                    if (room.monsters.length > 0) addCmd(btnContainer, '⚔️ Engage', () => engageCombat());
                    if (room.allies && room.allies.length > 0) addCmd(btnContainer, '💬 Talk to ally', () => talkAlly());
                    if (room.shop) addCmd(btnContainer, '💰 Shop', () => openShop());
                    addCmd(btnContainer, '📦 Inventory', () => showInventory());
                    addCmd(btnContainer, '💊 Use item', () => useItem());
                    addCmd(btnContainer, '🔓 Open container', () => openContainer());
                }
                addCmd(btnContainer, '⏎ Return to quest', () => { adventureState = null; loadQuest(currentQuest); });

                displayEl.appendChild(btnContainer);
            }

            function addCmd(container, label, handler) {
                const btn = document.createElement('button');
                btn.className = 'command-btn';
                btn.textContent = label;
                btn.addEventListener('click', handler);
                container.appendChild(btn);
            }

            function moveTo(roomId) {
                if (adventureState.combat) { adventureState.message = 'You are in combat!'; renderAdventure(); return; }
                const state = adventureState;
                const currentRoom = state.rooms[state.currentRoomId];
                if (currentRoom.locked && (
                    roomId === currentRoom.exits.east || roomId === currentRoom.exits.west ||
                    roomId === currentRoom.exits.north || roomId === currentRoom.exits.south)) {
                    if (!state.inventory.some(i => i.name === 'Lockpicks')) {
                        state.message = 'The door is locked. You need lockpicks.';
                        renderAdventure();
                        return;
                    }
                }
                state.currentRoomId = roomId;
                checkEvents('onEnterRoom', roomId);

                // Random encounter?
                if (state.quest.randomEncounterTable && state.quest.randomEncounterTable.length > 0 && Math.random() < 0.3) {
                    const table = state.quest.randomEncounterTable;
                    const r = Math.random();
                    let cumulative = 0;
                    for (let entry of table) {
                        cumulative += entry.probability;
                        if (r <= cumulative) {
                            const def = state.quest.monsterDefinitions[entry.monsterId];
                            if (def) {
                                const monster = { ...def, hp: def.baseHp, maxHp: def.baseHp, damage: def.baseDamage };
                                state.rooms[roomId].monsters.push(monster);
                                state.message = `A wild ${def.name} appears!`;
                            }
                            break;
                        }
                    }
                } else {
                    if (!state.message) state.message = '';
                }
                renderAdventure();
            }

            function combatRound(action) {
                const state = adventureState;
                if (!state.combat) return;
                const monster = state.combat.monster;
                let playerDamage = Math.floor(Math.random() * 6) + 1 + state.attackBonus;
                const monsterDamage = monster.damage;

                if (action === 'attack') {
                    if (monster.special && monster.special.includes('undead') && state.inventory.some(i => i.name === 'Silver Dagger')) {
                        playerDamage += 2;
                    }
                    monster.hp -= playerDamage;
                    let msg = `You hit ${monster.name} for ${playerDamage} damage. `;
                    if (monster.hp <= 0) {
                        msg += `${monster.name} is slain!`;
                        const room = state.rooms[state.currentRoomId];
                        room.monsters = room.monsters.filter(m => m !== monster);
                        state.combat = null;
                        checkEvents('onDefeatMonster', monster.id);
                        if (monster.boss) {
                            msg += ' You have defeated the boss! A treasure chest appears.';
                            const treasureItem = state.quest.itemDefinitions.find(i => i.name === 'Dragon Hoard' || i.type === 'quest');
                            if (treasureItem) room.items.push(treasureItem.id);
                        }
                        state.message = msg;
                        renderAdventure();
                        return;
                    } else {
                        state.playerHp -= monsterDamage;
                        msg += `${monster.name} hits you for ${monsterDamage}.`;
                        if (state.playerHp <= 0) {
                            msg += ' You have died... GAME OVER.';
                            state.gameOver = true;
                            state.message = msg;
                            renderAdventure();
                            return;
                        }
                        state.message = msg;
                        renderAdventure();
                    }
                } else if (action === 'flee') {
                    if (Math.random() < 0.5) {
                        state.message = 'You fled successfully.';
                        state.combat = null;
                        renderAdventure();
                    } else {
                        state.playerHp -= monsterDamage;
                        state.message = `Flee failed! ${monster.name} attacks for ${monsterDamage}.`;
                        if (state.playerHp <= 0) { state.gameOver = true; state.message += ' GAME OVER.'; }
                        renderAdventure();
                    }
                }
            }

            function takeItem() {
                if (adventureState.combat) return;
                const state = adventureState;
                const room = state.rooms[state.currentRoomId];
                if (room.items.length === 0) return;
                const itemId = room.items.shift();
                const itemDef = state.quest.itemDefinitions[itemId];
                if (itemDef) {
                    state.inventory.push(itemDef);
                    state.message = `Taken: ${itemDef.name}`;
                    checkEvents('onGetItem', itemId);
                } else {
                    state.message = 'Item not found.';
                }
                renderAdventure();
            }

            function engageCombat() {
                const room = adventureState.rooms[adventureState.currentRoomId];
                if (room.monsters.length === 0) return;
                const monster = room.monsters[0];
                adventureState.combat = { monster, roomId: adventureState.currentRoomId };
                renderAdventure();
            }

            function showInventory() {
                let msg = 'Inventory:\n' + (adventureState.inventory.length? adventureState.inventory.map(i=>i.name).join('\n') : 'empty');
                adventureState.message = msg;
                renderAdventure();
            }

            function talkAlly() {
                const state = adventureState;
                const room = state.rooms[state.currentRoomId];
                if (!room.allies || room.allies.length === 0) {
                    state.message = 'No one to talk to.';
                    renderAdventure();
                    return;
                }
                const ally = room.allies[0];
                if (ally.dialogue) {
                    // Start dialogue at root
                    const rootId = ally.dialogue.root;
                    const rootNode = ally.dialogue.nodes[rootId];
                    if (rootNode) {
                        state.currentDialogue = { ally: ally, node: rootNode, nodes: ally.dialogue.nodes };
                    } else {
                        state.message = `${ally.name} has nothing to say.`;
                    }
                } else {
                    // fallback to old behavior
                    if (ally.behavior === 'hint') {
                        const hints = [
                            `Beware of ${state.quest.antagonist} in the depths.`,
                            `I've heard that ${state.quest.antagonist} fears light.`,
                            `The ${state.quest.antagonist} is vulnerable to silver.`,
                            `You'll need a rope to reach the ${room.landmark || 'final chamber'}.`,
                            `There's a secret passage in the ${state.rooms[Math.floor(Math.random()*state.rooms.length)].name}.`
                        ];
                        state.message = `${ally.name} says: "${hints[Math.floor(Math.random() * hints.length)]}"`;
                    } else if (ally.behavior === 'heal') {
                        const heal = 3 + Math.floor(Math.random() * 3);
                        state.playerHp = Math.min(state.playerMaxHp, state.playerHp + heal);
                        state.message = `${ally.name} tends to your wounds. You regain ${heal} HP.`;
                    } else if (ally.behavior === 'trade') {
                        if (state.inventory.length > 0) {
                            const giveItem = state.quest.itemDefinitions[Math.floor(Math.random() * state.quest.itemDefinitions.length)];
                            const takeItem = state.inventory[Math.floor(Math.random() * state.inventory.length)];
                            state.pendingTrade = { ally, giveItem, takeItem };
                            state.message = `${ally.name} offers to trade your ${takeItem.name} for a ${giveItem.name}. Do you accept?`;
                        } else {
                            state.message = `${ally.name} has nothing to trade.`;
                        }
                    } else if (ally.behavior === 'fight') {
                        state.message = `${ally.name} joins the fight!`;
                        state.attackBonus += 1;
                    }
                }
                renderAdventure();
            }

            function dialogueChoose(optionIdx) {
                const state = adventureState;
                if (!state.currentDialogue) return;
                const node = state.currentDialogue.node;
                const opt = node.options[optionIdx];
                if (!opt) return;

                // Perform action if any
                if (opt.action) {
                    if (opt.action === 'hint') {
                        const hints = [
                            `Beware of ${state.quest.antagonist} in the depths.`,
                            `I've heard that ${state.quest.antagonist} fears light.`,
                            `The ${state.quest.antagonist} is vulnerable to silver.`,
                            `You'll need a rope to reach the ${state.rooms[state.currentRoomId].landmark || 'final chamber'}.`,
                            `There's a secret passage in the ${state.rooms[Math.floor(Math.random()*state.rooms.length)].name}.`
                        ];
                        state.message = hints[Math.floor(Math.random() * hints.length)];
                    } else if (opt.action === 'heal') {
                        const heal = 3 + Math.floor(Math.random() * 3);
                        state.playerHp = Math.min(state.playerMaxHp, state.playerHp + heal);
                        state.message = `You are healed for ${heal} HP.`;
                    } else if (opt.action === 'trade') {
                        // Start trade with this ally
                        const ally = state.currentDialogue.ally;
                        if (state.inventory.length > 0) {
                            const giveItem = state.quest.itemDefinitions[Math.floor(Math.random() * state.quest.itemDefinitions.length)];
                            const takeItem = state.inventory[Math.floor(Math.random() * state.inventory.length)];
                            state.pendingTrade = { ally, giveItem, takeItem };
                            state.message = `${ally.name} offers to trade your ${takeItem.name} for a ${giveItem.name}. Do you accept?`;
                        } else {
                            state.message = `${ally.name} has nothing to trade.`;
                        }
                        state.currentDialogue = null;
                        renderAdventure();
                        return;
                    } else if (opt.action === 'fight') {
                        state.message = `${state.currentDialogue.ally.name} joins the fight!`;
                        state.attackBonus += 1;
                    } else if (opt.action === 'giveItem') {
                        // give a specific item? For simplicity, we'll just give a random item
                        const item = state.quest.itemDefinitions[Math.floor(Math.random() * state.quest.itemDefinitions.length)];
                        state.inventory.push(item);
                        state.message = `${state.currentDialogue.ally.name} gives you ${item.name}.`;
                    } else if (opt.action === 'takeItem') {
                        // take a random item from player
                        if (state.inventory.length > 0) {
                            const idx = Math.floor(Math.random() * state.inventory.length);
                            const item = state.inventory[idx];
                            state.inventory.splice(idx, 1);
                            state.message = `${state.currentDialogue.ally.name} takes your ${item.name}.`;
                        } else {
                            state.message = `${state.currentDialogue.ally.name} tries to take something but you have nothing.`;
                        }
                    }
                }

                // Move to next node
                if (opt.nextNode && state.currentDialogue.nodes[opt.nextNode]) {
                    state.currentDialogue.node = state.currentDialogue.nodes[opt.nextNode];
                } else {
                    state.currentDialogue = null; // end conversation
                }
                renderAdventure();
            }

            function acceptTrade() {
                const state = adventureState;
                if (!state.pendingTrade) return;
                const { giveItem, takeItem } = state.pendingTrade;
                state.inventory = state.inventory.filter(i => i !== takeItem);
                state.inventory.push(giveItem);
                state.message = `You trade ${takeItem.name} for ${giveItem.name}.`;
                state.pendingTrade = null;
                renderAdventure();
            }

            function refuseTrade() {
                adventureState.message = "You decline the trade.";
                adventureState.pendingTrade = null;
                renderAdventure();
            }

            function useItem() {
                const state = adventureState;
                if (state.combat) {
                    state.message = 'Cannot use items in combat!';
                    renderAdventure();
                    return;
                }
                const usable = state.inventory.filter(i => i.type === 'consumable' || i.type === 'tool' || i.type === 'weapon' || i.type === 'container');
                if (usable.length === 0) {
                    state.message = "You have no usable items.";
                    renderAdventure();
                    return;
                }
                // For simplicity, we'll just use the first usable item
                const item = usable[0];
                const index = state.inventory.indexOf(item);

                let msg = '';
                if (item.type === 'consumable' && item.name.includes('Potion')) {
                    state.playerHp = Math.min(state.playerMaxHp, state.playerHp + 8);
                    state.inventory.splice(index, 1);
                    msg = `You used ${item.name}. HP now ${state.playerHp}.`;
                } else if (item.name === 'Torch') {
                    const room = state.rooms[state.currentRoomId];
                    if (!room.secretPassage) {
                        let target;
                        do { target = Math.floor(Math.random() * state.rooms.length); } while (target === state.currentRoomId);
                        room.exits.secret = target;
                        room.secretPassage = true;
                        msg = 'You light the torch and notice a hidden passage! A new exit appears.';
                    } else {
                        msg = 'The torch burns, but you see nothing new.';
                    }
                } else if (item.name === 'Rope') {
                    const room = state.rooms[state.currentRoomId];
                    if (!room.ropeUsed) {
                        let target;
                        do { target = Math.floor(Math.random() * state.rooms.length); } while (target === state.currentRoomId);
                        room.exits.down = target;
                        room.ropeUsed = true;
                        msg = 'You use the rope to descend to a new area.';
                    } else {
                        msg = 'You already used the rope here.';
                    }
                } else if (item.name === 'Lockpicks') {
                    const room = state.rooms[state.currentRoomId];
                    if (room.locked) {
                        room.locked = false;
                        msg = 'You pick the lock. The door is now open.';
                    } else {
                        msg = 'There is no locked door here.';
                    }
                } else if (item.name === 'Magic Ring') {
                    let target;
                    do { target = Math.floor(Math.random() * state.rooms.length); } while (target === state.currentRoomId);
                    state.currentRoomId = target;
                    msg = 'The ring glows and teleports you to another room!';
                } else if (item.name === 'Silver Dagger') {
                    state.attackBonus = 1;
                    msg = 'You grip the Silver Dagger. It gleams with holy light.';
                } else if (item.name === 'Holy Water') {
                    const room = state.rooms[state.currentRoomId];
                    if (room.monsters.length > 0) {
                        for (let m of room.monsters) {
                            m.hp -= 4;
                        }
                        room.monsters = room.monsters.filter(m => m.hp > 0);
                        msg = 'You sprinkle holy water! The monsters are seared!';
                        if (item.consumable) state.inventory.splice(index, 1);
                    } else {
                        msg = 'No monsters to harm.';
                    }
                } else {
                    msg = `You can't use ${item.name} right now.`;
                }

                state.message = msg;
                renderAdventure();
            }

            function openContainer() {
                const state = adventureState;
                const room = state.rooms[state.currentRoomId];
                // Check inventory for containers
                const containers = state.inventory.filter(i => i.isContainer);
                if (containers.length === 0 && !room.items.some(iId => state.quest.itemDefinitions[iId]?.isContainer)) {
                    state.message = "No container to open.";
                    renderAdventure();
                    return;
                }
                // For simplicity, we'll just open the first container in inventory or room
                let container = containers[0];
                let containerItem = container;
                let containerInInventory = true;
                if (!container) {
                    // look in room items
                    const roomContainerId = room.items.find(iId => state.quest.itemDefinitions[iId]?.isContainer);
                    if (roomContainerId !== undefined) {
                        containerItem = state.quest.itemDefinitions[roomContainerId];
                        containerInInventory = false;
                    }
                }
                if (!containerItem) {
                    state.message = "No container to open.";
                    renderAdventure();
                    return;
                }

                if (containerItem.locked) {
                    // Check if player has key
                    if (containerItem.keyId !== null && !state.inventory.some(i => i.id === containerItem.keyId)) {
                        state.message = `${containerItem.name} is locked. You need the key.`;
                        renderAdventure();
                        return;
                    }
                }

                // Show contents
                const contents = containerItem.contents.map(id => state.quest.itemDefinitions[id]).filter(i => i);
                if (contents.length === 0) {
                    state.message = `${containerItem.name} is empty.`;
                } else {
                    let msg = `${containerItem.name} contains: ` + contents.map(i => i.name).join(', ');
                    // Option to take items? For simplicity, we'll just add them to inventory and remove from container
                    contents.forEach(item => {
                        state.inventory.push(item);
                    });
                    containerItem.contents = []; // empty the container
                    msg += '\nYou take all items.';
                    state.message = msg;
                }
                renderAdventure();
            }

            function openShop() {
                const state = adventureState;
                const room = state.rooms[state.currentRoomId];
                if (!room.shop) {
                    state.message = "No shop here.";
                    renderAdventure();
                    return;
                }
                // Simple shop interface: list items with prices
                let msg = "SHOP:\n";
                room.shop.forEach((entry, idx) => {
                    const item = state.quest.itemDefinitions[entry.itemId];
                    if (item) {
                        msg += `${idx}: ${item.name} - ${entry.price} gold\n`;
                    }
                });
                msg += "\nEnter number to buy, or 'sell' to sell. (Not implemented in this demo, but you can extend)";
                // For simplicity, we'll just show a message and allow buying via a simple prompt-like system
                // We'll add a simple buy option
                state.message = msg;
                // We'll add a command to buy item 0, etc. But to keep it simple, we'll just show the list.
                // In a full implementation, you'd have a buy/sell interface. We'll add a quick buy option.
                renderAdventure();
                // We'll add a new command in the button panel dynamically? For now, we'll just display info.
                // Let's add a "Buy item 0" button if shop exists.
                // But to avoid complexity, we'll just show the list and let the player use a "Buy" command with index.
                // We'll add a "Buy" button that prompts for index via a small input.
                // However, that requires more UI. For now, we'll just show the list and assume the player can type? Not possible.
                // Let's implement a simple buy/sell using buttons.
                const shopDiv = document.createElement('div');
                shopDiv.className = 'command-grid';
                room.shop.forEach((entry, idx) => {
                    const item = state.quest.itemDefinitions[entry.itemId];
                    if (item) {
                        const btn = document.createElement('button');
                        btn.className = 'command-btn';
                        btn.textContent = `Buy ${item.name} (${entry.price} gold)`;
                        btn.addEventListener('click', () => {
                            if (state.gold >= entry.price) {
                                state.gold -= entry.price;
                                state.inventory.push(item);
                                state.message = `You bought ${item.name}.`;
                            } else {
                                state.message = "Not enough gold.";
                            }
                            renderAdventure();
                        });
                        shopDiv.appendChild(btn);
                    }
                });
                // Add sell button (sell first inventory item for half price)
                const sellBtn = document.createElement('button');
                sellBtn.className = 'command-btn';
                sellBtn.textContent = 'Sell first item';
                sellBtn.addEventListener('click', () => {
                    if (state.inventory.length > 0) {
                        const item = state.inventory[0];
                        const price = Math.floor(room.shop.find(s => s.itemId === item.id)?.price / 2) || 5;
                        state.gold += price;
                        state.inventory.splice(0, 1);
                        state.message = `You sold ${item.name} for ${price} gold.`;
                    } else {
                        state.message = "Nothing to sell.";
                    }
                    renderAdventure();
                });
                shopDiv.appendChild(sellBtn);
                const backBtn = document.createElement('button');
                backBtn.className = 'command-btn';
                backBtn.textContent = 'Leave shop';
                backBtn.addEventListener('click', renderAdventure);
                shopDiv.appendChild(backBtn);

                displayEl.appendChild(shopDiv);
            }

            function startAdventure() {
                if (!currentQuest) return;
                initAdventure(currentQuest);
                renderAdventure();
                startBtn.style.display = 'none';
            }

            // ----- Wire buttons -----
            document.getElementById('randomQuestBtn').addEventListener('click', generateRandomQuest);
            document.getElementById('createQuestBtn').addEventListener('click', () => showCreateForm());
            document.getElementById('myQuestsBtn').addEventListener('click', showMyQuests);
            document.getElementById('loadQuestBtn').addEventListener('click', showMyQuests);
            document.getElementById('startAdventureBtn').addEventListener('click', startAdventure);

            // Start with a random quest
            generateRandomQuest();
        })();
    </script>
</body>
</html>
