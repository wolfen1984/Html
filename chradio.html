<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>DEAD AIR RADIO · 1987</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Audiowide&family=Special+Elite&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #040404;
            --screen-bg: #080808;
            --panel-bg: #0a0a0a;
            --text: #c4bcb0;
            --text-dim: #6e6a58;
            --text-bright: #e6e0c4;
            --accent: #c8ff00;
            --accent-dim: #3a3a00;
            --border: #889900;
            --border-glow: 0 0 14px #c8ff0055, 0 0 32px #aacc0022;
            --danger: #c8ff00;
            --danger-glow: 0 0 12px #c8ff0044;
            --amber: #ffd740;
            --amber-dim: #5c4a18;
            --gold: #ffd740;
            --gold-dim: #4a3808;
            --green: #4a7a3a;
            --input-bg: #100e18;
            --button-bg: #141214;
            --button-hover: #1c1a18;
            --button-active: #181410;
            --bevel-light: #282620;
            --bevel-dark: #040406;
            --font-display: 'Audiowide', 'Rajdhani', sans-serif;
            --font-title: 'Audiowide', 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.04;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 30px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0f0f0a 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #141114;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2a2620, 0 0 0 4px #0d0a08, 0 0 0 8px #060404, 0 8px 48px #000000dd, 0 0 60px #aacc0022;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #889900;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #0a0808;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #c8ff00;
            border-radius: 50%;
            box-shadow: 0 0 8px #c8ff0088, 0 0 18px #c8ff0033;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #c8ff0088, 0 0 18px #c8ff0033;
            }
            50% {
                box-shadow: 0 0 14px #c8ff00bb, 0 0 28px #c8ff0055;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #4a4820;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #889900;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #080804;
            border-bottom: 3px solid #889900;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #1a1a08;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #c8ff00;
            border-radius: 2px;
            padding: 10px 14px;
            background: #060604;
            position: relative;
            box-shadow: inset 0 0 24px #c8ff0011;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #c8ff00;
            box-shadow: 0 0 12px #c8ff0088;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #ffd74044;
            box-shadow: 0 0 8px #ffd74033;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #c8ff00;
            text-shadow: 0 0 16px #c8ff0088, 0 2px 4px #000, 0 0 40px #aacc0088;
            letter-spacing: 3px;
            font-family: var(--font-title);
            line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #8a8a50;
            letter-spacing: 5px;
            margin-top: 3px;
        }
        .marquee-sub .on-air-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #c8ff00;
            border-radius: 50%;
            margin-right: 6px;
            animation: powerGlow 1.2s ease-in-out infinite;
            vertical-align: middle;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 20px;
                letter-spacing: 1px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #2a2a10 #080808;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #080808;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #2a2a10;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #282620;
            border-top-color: #343028;
            border-left-color: #302c24;
            border-right-color: #1c1a14;
            border-bottom-color: #100e0c;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #1c1a14;
            border-left-color: #1c1a14;
            border-bottom-color: #343028;
            border-right-color: #302c24;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #100e0c;
        }
        .btn.accent {
            background: #141008;
            border-color: #6a6a18;
            border-top-color: #8a8a22;
            border-left-color: #7a7a1e;
            border-right-color: #3a3a0e;
            border-bottom-color: #1a1a04;
            color: #e6e0a8;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #c8ff0022;
        }
        .btn.accent:active {
            border-top-color: #3a3a0e;
            border-left-color: #3a3a0e;
            border-bottom-color: #8a8a22;
            border-right-color: #7a7a1e;
            box-shadow: 0 0px 0 #00000044, 0 0 16px #c8ff0044;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .radio-studio {
            position: relative;
            background: #0a0a08;
            border: 2px solid #88990066;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.8);
        }
        .radio-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #080806;
            border: 2px solid #c8ff00;
            padding: 15px;
            border-radius: 3px;
        }
        .radio-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #c8ff00;
            box-shadow: 0 0 22px #c8ff0066, 0 0 0 2px #1a1a08;
            object-fit: cover;
            flex-shrink: 0;
            background: #0a0a06;
        }
        .speech-bubble {
            flex: 1;
            background: #100e14;
            border: 2px solid #c8ff00;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #d4cfa8;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #c8ff0088 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #080806;
            border: 1px solid #2a2a10;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #12100c;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6e6a58;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #889900;
            box-shadow: 0 0 20px #c8ff0044, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #080806;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(4, 4, 4, 0.85) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 14px;
            letter-spacing: 3px;
            color: #c8ff00;
            text-shadow: 0 0 10px #c8ff00cc, 0 0 30px #c8ff0088, 0 2px 4px #000000, 0 0 60px #3a3a00;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom,
                    rgba(8, 8, 4, 0.9) 0%,
                    rgba(8, 8, 4, 0.7) 40%,
                    transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 16px;
            letter-spacing: 1.5px;
            color: #ffd740;
            text-shadow: 0 0 8px #ffd74088, 0 0 20px #5c4a1844, 0 2px 4px #000000;
            background: linear-gradient(to top,
                    rgba(4, 4, 4, 0.9) 0%,
                    rgba(4, 4, 4, 0.6) 50%,
                    transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6e6a58;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 11px;
                letter-spacing: 2px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 13px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .broadcast-log {
            margin-top: 15px;
            border-top: 2px solid #c8ff00;
            padding-top: 10px;
        }
        .broadcast-log h3 {
            font-family: var(--font-display);
            color: #d4cfa8;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 10px #c8ff0044;
        }
        .log-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0c0a0c;
            border: 1px solid #c8ff00;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .log-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #c8ff00;
            min-width: 50px;
        }
        .log-info {
            flex: 1;
            min-width: 100px;
        }
        .log-title {
            font-size: 16px;
            color: #d4cfa8;
        }
        .log-desc {
            font-size: 15px;
            color: #6e6a58;
        }
        .log-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .log-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0c0a0c;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #c8ff00;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #c4bab0;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #141214;
            border: 2px solid #c8ff0066;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #c4bab0;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #c8ff00;
            box-shadow: 0 0 14px #c8ff0044;
        }
        .loading-text {
            color: var(--amber);
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #060404;
            border-top: 1px solid #c8ff0044;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #4a4820;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #5a5820;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #1a1a10;
            color: #5a5820;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #4a4820;
            color: #8a8850;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #d4cfa8;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        .caller-id-strip {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 6px 10px;
            background: #060608;
            border-bottom: 1px solid #c8ff0033;
            font-family: var(--font-mono);
            font-size: 12px;
            color: #c8ff00;
            letter-spacing: 1px;
        }
        .caller-id-strip .blink-dot {
            animation: powerGlow 0.8s ease-in-out infinite;
        }
        @media (max-width: 480px) {
            .radio-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .log-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .log-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">DEAD AIR RADIO · 107.9 FM</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">DEAD AIR<br>RADIO</div>
                    <div class="marquee-sub"><span class="on-air-dot"></span> ON AIR · 107.9 FM · 1987</div>
                </div>
            </div>
            <div class="game-area">
                <div id="deadAirPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">📻 DEAD AIR RADIO · LATE NIGHT CALL-IN</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('dead_air_radio_key') || '';

            const CALLER_OPENING_LINES = [
                "I've killed someone.",
                "Someone's following me.",
                "I found a body.",
                "They're inside.",
                "I'm trapped.",
                "I've been lying.",
                "I need help.",
                "I'm sorry.",
                "You have to believe me.",
                "Don't hang up.",
                "I'm calling from a payphone.",
                "He's in the trunk.",
                "I can hear them breathing.",
                "The door just opened.",
                "I know who did it.",
                "They think I'm asleep.",
                "I've got blood on my hands.",
                "She's not waking up.",
                "I buried something.",
                "The call is coming from inside."
            ];

            const DEFAULT_STATE = {
                deadAirEpisodes: [],
                deadAirBroadcast: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>📻 Eddie Knox</h2>
        <p style="text-align:left;">
            <strong>Show:</strong> <em>Dead Air Radio — 107.9 FM</em><br>
            <strong>Bio:</strong> A grizzled, chain-smoking late-night AM radio host broadcasting from a cramped studio on the outskirts of town. Eddie's been on the air since '79, taking calls from insomniacs, drifters, and people with nowhere else to turn. His gravelly voice and weary cynicism mask a genuine empathy for the desperate souls who find his frequency in the small hours. The studio's coffee machine hasn't worked since '83. The ashtray overflows. But the mic is always live.
        </p>
    `;

            // ── SOUND ENGINE (Web Audio API) ──
            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let crossfadeTimeout = null;
            let radioStaticSource = null;
            let radioStaticGain = null;

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.22;
                    reverbNode.connect(masterGain);
                    const compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.value = -24;
                    compressor.knee.value = 30;
                    compressor.ratio.value = 12;
                    compressor.attack.value = 0.003;
                    compressor.release.value = 0.25;
                    masterGain.connect(compressor);
                    compressor.connect(audioCtx.destination);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 1.0;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.3;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                    reverbNode.connect(masterGain);
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 1.6;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.35));
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            function startRadioStatic() {
                if (!audioCtx || radioStaticSource) return;
                const ctx = audioCtx;
                const bufferSize = ctx.sampleRate * 2;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * 0.08;
                }
                radioStaticSource = ctx.createBufferSource();
                radioStaticSource.buffer = buffer;
                radioStaticSource.loop = true;
                radioStaticGain = ctx.createGain();
                radioStaticGain.gain.value = 0.04;
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1800;
                filter.Q.value = 0.4;
                radioStaticSource.connect(filter);
                filter.connect(radioStaticGain);
                radioStaticGain.connect(ctx.destination);
                radioStaticSource.start(0);
            }

            function stopRadioStatic() {
                if (radioStaticSource) {
                    try { radioStaticSource.stop(); } catch (e) {}
                    radioStaticSource = null;
                }
                if (radioStaticGain) {
                    radioStaticGain.disconnect();
                    radioStaticGain = null;
                }
            }

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    switch (type) {
                        case 'phone_ring': {
                            for (let i = 0; i < 3; i++) {
                                const t = now + i * 0.8;
                                const osc = ctx.createOscillator();
                                osc.type = 'square';
                                osc.frequency.setValueAtTime(800, t);
                                osc.frequency.setValueAtTime(1000, t + 0.15);
                                const g = ctx.createGain();
                                g.gain.setValueAtTime(0, t);
                                g.gain.linearRampToValueAtTime(gainValue * 0.25, t + 0.02);
                                g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                                osc.connect(g);
                                g.connect(ctx.destination);
                                osc.start(t);
                                osc.stop(t + 0.4);
                            }
                            break;
                        }
                        case 'sting':
                            createSting(ctx, gainValue);
                            break;
                        case 'heartbeat':
                            playThump(ctx, now, 0.8 * gainValue);
                            setTimeout(() => playThump(ctx, now + 0.15, 0.8 * gainValue), 150);
                            break;
                        case 'thunder': {
                            const bufferSize = ctx.sampleRate * 0.5;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.3));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(gainValue * 0.6, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 150;
                            filter.Q.value = 0.5;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(now);
                            source.stop(now + 0.8);
                            break;
                        }
                        case 'bell': {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 80 + Math.random() * 30;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0, now);
                            gain.gain.linearRampToValueAtTime(gainValue * 0.4, now + 0.1);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 3);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 500;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(now);
                            osc.stop(now + 3);
                            break;
                        }
                        case 'climax':
                            createClimax(ctx, gainValue);
                            break;
                        case 'static_burst': {
                            const bufSize = ctx.sampleRate * 0.3;
                            const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                            const d = buf.getChannelData(0);
                            for (let i = 0; i < bufSize; i++) {
                                d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.08));
                            }
                            const src = ctx.createBufferSource();
                            src.buffer = buf;
                            const g = ctx.createGain();
                            g.gain.setValueAtTime(gainValue * 0.5, now);
                            g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                            src.connect(g);
                            g.connect(ctx.destination);
                            src.start(now);
                            src.stop(now + 0.3);
                            break;
                        }
                        case 'dial_tone': {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 350;
                            const osc2 = ctx.createOscillator();
                            osc2.type = 'sine';
                            osc2.frequency.value = 440;
                            const g = ctx.createGain();
                            g.gain.setValueAtTime(gainValue * 0.15, now);
                            g.gain.setValueAtTime(gainValue * 0.15, now + 1.5);
                            g.gain.exponentialRampToValueAtTime(0.001, now + 2);
                            osc.connect(g);
                            osc2.connect(g);
                            g.connect(ctx.destination);
                            osc.start(now);
                            osc2.start(now);
                            osc.stop(now + 2);
                            osc2.stop(now + 2);
                            break;
                        }
                        default:
                            console.warn(`Unknown sound type: ${type}`);
                    }
                } catch (err) {
                    console.error(`❌ Error in playSound("${type}"):`, err);
                }
            }

            function playThump(ctx, time, intensity) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(60, time);
                osc.frequency.exponentialRampToValueAtTime(30, time + 0.1);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.8, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(time);
                osc.stop(time + 0.1);
            }

            function createSting(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.22, now + 0.03);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.2);
                osc.frequency.exponentialRampToValueAtTime(120, now + 1.0);
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(360, now);
                osc2.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
                osc2.frequency.exponentialRampToValueAtTime(240, now + 1.0);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 900;
                filter.Q.value = 1.2;
                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);
                osc.start(now);
                osc2.start(now);
                osc.stop(now + 1.2);
                osc2.stop(now + 1.2);
            }

            function createClimax(ctx, intensity = 0.8) {
                const now = ctx.currentTime;
                const duration = 7 + Math.random() * 5;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.5, now + 2);
                gainNode.gain.setValueAtTime(intensity * 0.55, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(110, now);
                osc1.frequency.exponentialRampToValueAtTime(220, now + duration * 0.6);
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(220, now);
                osc2.frequency.exponentialRampToValueAtTime(440, now + duration * 0.6);
                const osc3 = ctx.createOscillator();
                osc3.type = 'square';
                osc3.frequency.setValueAtTime(110, now);
                osc3.frequency.exponentialRampToValueAtTime(330, now + duration * 0.8);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(350, now);
                filter.frequency.exponentialRampToValueAtTime(1400, now + duration);
                filter.Q.value = 2;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.18;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 220;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);
                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(gainValue * 0.25, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'radio_hum' || type === 'wind_howl') {
                        const bufferSize = ctx.sampleRate * 1;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.4;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'radio_hum' ? 250 : 700;
                        filter.Q.value = 0.5;
                        noise.connect(filter);
                        filter.connect(gainNode);
                        noise.start(now);
                        source = { noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 100;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => {
                        stopAmbient();
                    }, durationSeconds * 1000);
                } catch (err) {
                    console.error(`❌ Error in playAmbient("${type}"):`, err);
                }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) {
                            ambientGain.disconnect();
                            ambientGain = null;
                        }
                    }, 300);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) {
                    clearTimeout(ambientTimeout);
                    ambientTimeout = null;
                }
            }

            // ── 80s ROCK SCORE ENGINE ──
            const ROCK_SCORE_PATTERNS = {
                intro: { bpm: 72, bass: [0, 0, 7, 7, 0, 0, 7, 7], arp: [12, 15, 12, 19, 12, 15, 12, 19],
                    kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] },
                setup: { bpm: 80, bass: [0, 7, 5, 3, 0, 7, 5, 3], arp: [12, 15, 19, 15, 12, 15, 19, 15],
                    kick: [1, 0, 1, 1, 1, 0, 1, 0], snare: [0, 0, 1, 0, 0, 0, 1, 0] },
                scheme: { bpm: 90, bass: [0, 3, 5, 7, 8, 7, 5, 3], arp: [12, 15, 19, 22, 24, 22, 19, 15],
                    kick: [1, 1, 1, 0, 1, 1, 1, 0], snare: [0, 0, 1, 1, 0, 0, 1, 1] },
                execution: { bpm: 105, bass: [0, 7, 0, 7, 3, 7, 3, 7], arp: [12, 19, 15, 19, 12, 19, 15, 19],

                twist: { bpm: 95, bass: [0, 3, 6, 8, 0, 3, 6, 8], arp: [12, 16, 20, 24, 12, 16, 20, 24],
                    kick: [1, 0, 1, 0, 1, 1, 1, 0], snare: [1, 0, 1, 1, 1, 0, 1, 1] },
                closing: { bpm: 65, bass: [0, 7, 5, 0, 7, 5, 0, 7], arp: [12, 15, 12, 19, 12, 15, 12, 19],
                    kick: [1, 0, 0, 0, 1, 0, 0, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] },
            };

            function createRockNote(ctx, frequency, startTime, duration, gainValue, type = 'sawtooth') {
                const now = startTime;
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.008;
                const sub = ctx.createOscillator();
                sub.type = 'triangle';
                sub.frequency.value = frequency / 2;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                filter.Q.value = 1.8;
                const filterEnv = ctx.createGain();
                filterEnv.gain.setValueAtTime(900, now);
                filterEnv.gain.exponentialRampToValueAtTime(250, now + 0.08);
                filterEnv.gain.exponentialRampToValueAtTime(60, now + duration * 0.8);
                filterEnv.connect(filter.frequency);
                const mainGain = ctx.createGain();
                mainGain.gain.setValueAtTime(0, now);
                mainGain.gain.linearRampToValueAtTime(gainValue * 0.35, now + 0.02);
                mainGain.gain.setValueAtTime(gainValue * 0.35, now + duration * 0.6);
                mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.1);
                osc1.connect(filter);
                osc2.connect(filter);
                sub.connect(filter);
                filter.connect(mainGain);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.75;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.35;
                mainGain.connect(drySend);
                mainGain.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);
                osc1.start(now);
                osc2.start(now);
                sub.start(now);
                osc1.stop(now + duration + 0.2);
                osc2.stop(now + duration + 0.2);
                sub.stop(now + duration + 0.2);
            }

            function createRockKick(ctx, time) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(140, time);
                osc.frequency.exponentialRampToValueAtTime(28, time + 0.07);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.015, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.002));
                }
                const click = ctx.createBufferSource();
                click.buffer = noiseBuffer;
                const clickFilter = ctx.createBiquadFilter();
                clickFilter.type = 'highpass';
                clickFilter.frequency.value = 2500;
                click.connect(clickFilter);
                const gainClick = ctx.createGain();
                gainClick.gain.setValueAtTime(0.6, time);
                gainClick.gain.exponentialRampToValueAtTime(0.001, time + 0.015);
                clickFilter.connect(gainClick);
                const gainBody = ctx.createGain();
                gainBody.gain.setValueAtTime(0.75, time);
                gainBody.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
                osc.connect(gainBody);
                gainBody.connect(dryGain);
                gainClick.connect(dryGain);
                osc.start(time);
                click.start(time);
                osc.stop(time + 0.18);
                click.stop(time + 0.015);
            }

            function createRockSnare(ctx, time) {
                const body = ctx.createOscillator();
                body.type = 'triangle';
                body.frequency.setValueAtTime(220, time);
                body.frequency.exponentialRampToValueAtTime(70, time + 0.07);
                const bodyGain = ctx.createGain();
                bodyGain.gain.setValueAtTime(0.65, time);
                bodyGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                body.connect(bodyGain);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.025));
                }
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1500;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.75, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                bodyGain.connect(dryGain);
                noiseGain.connect(dryGain);
                body.start(time);
                noise.start(time);
                body.stop(time + 0.1);
                noise.stop(time + 0.12);
            }

            function startSectionScore(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                let customScore = null;
                const perf = gameState.deadAirBroadcast;
                if (perf && perf.soundCues && perf.soundCues.score) {
                    customScore = perf.soundCues.score;
                }
                const fallbackTheme = ROCK_SCORE_PATTERNS[themeName] || ROCK_SCORE_PATTERNS.intro;
                const theme = (customScore && customScore[themeName]) ? customScore[themeName] : fallbackTheme;
                const rootFreq = 55;
                const beatDuration = 60 / theme.bpm;
                const patternLength = theme.bass.length;
                const ctx = audioCtx;
                let step = 0;
                let nextStepTime = ctx.currentTime;
                const padGain = ctx.createGain();
                padGain.gain.value = 0.08;
                const padOsc1 = ctx.createOscillator();
                padOsc1.type = 'sawtooth';
                padOsc1.frequency.value = rootFreq;
                const padOsc2 = ctx.createOscillator();
                padOsc2.type = 'sawtooth';
                padOsc2.frequency.value = rootFreq * 1.502;
                const padOsc3 = ctx.createOscillator();
                padOsc3.type = 'triangle';
                padOsc3.frequency.value = rootFreq / 2;
                const padFilter = ctx.createBiquadFilter();
                padFilter.type = 'lowpass';
                padFilter.frequency.value = 350;
                padFilter.Q.value = 1;
                padOsc1.connect(padFilter);
                padOsc2.connect(padFilter);
                padOsc3.connect(padFilter);
                padFilter.connect(padGain);
                const padDry = ctx.createGain();
                padDry.gain.value = 0.5;
                const padWet = ctx.createGain();
                padWet.gain.value = 0.25;
                padGain.connect(padDry);
                padGain.connect(padWet);
                padDry.connect(dryGain);
                padWet.connect(wetGain);
                padOsc1.start();
                padOsc2.start();
                padOsc3.start();
                const stopSources = [padOsc1, padOsc2, padOsc3];
                let timeoutId;

                function scheduleStep() {
                    if (!sectionAmbientActive) return;
                    const now = nextStepTime;
                    const bassSemitone = theme.bass[step % patternLength];
                    const bassFreq = rootFreq * Math.pow(2, bassSemitone / 12);
                    createRockNote(ctx, bassFreq, now, beatDuration * 0.85, 0.75, 'sawtooth');
                    const arpSemitone = theme.arp[step % patternLength];
                    const arpFreq = rootFreq * Math.pow(2, arpSemitone / 12);
                    createRockNote(ctx, arpFreq, now, beatDuration * 0.45, 0.55, 'square');
                    if (theme.kick[step % patternLength]) createRockKick(ctx, now);
                    if (theme.snare[step % patternLength]) createRockSnare(ctx, now);
                    step++;
                    nextStepTime += beatDuration;
                    timeoutId = setTimeout(scheduleStep, (nextStepTime - ctx.currentTime) * 1000);
                }
                nextStepTime = ctx.currentTime + 0.05;
                timeoutId = setTimeout(scheduleStep, 50);
                sectionAmbientActive = {
                    stop: () => {
                        clearTimeout(timeoutId);
                        padGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                        stopSources.forEach(s => { try { s.stop(ctx.currentTime + 0.3); } catch (
                        e) {} });
                        sectionAmbientActive = null;
                    }
                };
            }
            const transitionSectionTheme = startSectionScore;

            function stopSectionAmbient() {
                if (sectionAmbientActive) {
                    sectionAmbientActive.stop();

                }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 25000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' +
                                apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`);
                    }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') {
                        throw new Error('Request timed out. Please try again.');
                    }
                    throw e;
                } finally {
                    clearTimeout(timeout);
                }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 1980s radio show, dark moody, neon yellow accents, grainy film')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) { try { return await generateImage(prompt); } catch (
                    e) { lastError = e;
                        await new Promise(r => setTimeout(r, 20)); } }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else {
                            clearInterval(timer);
                            resolve();
                        }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                    'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                ];
                let voice = null;
                for (const name of maleNames) {
                    voice = voices.find(v => v.name.includes(name));
                    if (voice) break;
                }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.62;
                utterance.pitch = 0.90;
                speechSynthesis.speak(utterance);
            }

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) {
                        voice = voices.find(v => v.name.includes(name));
                        if (voice) break;
                    }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[
                        0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.62;
                    utterance.pitch = voiceConfig.pitch || 0.90;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) {
                            currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar);
                            if (cueChecker) cueChecker(currentChar);
                        }
                    };
                    utterance.onend = () => {
                        element.textContent = text;
                        if (cueChecker) cueChecker(text.length);
                        resolve();
                    };
                    utterance.onerror = (e) => {
                        console.warn('TTS error:', e);
                        element.textContent = text;
                        resolve();
                    };
                    speechSynthesis.speak(utterance);
                });
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system = `You are a sound designer for an 80s radio thriller. Given a radio play script, return a JSON object with THREE keys:
        - "sections": an array of 5-6 sections dividing the story into emotional acts. Each section must have: "theme" (one of: intro, setup, scheme, execution, twist, closing), "start_char" (inclusive) and "end_char" (exclusive). Cover the entire story from 0 to ${length}.
        - "cues": an array of sound events using only these types: "sting", "heartbeat", "thunder", "bell", "climax", "phone_ring", "static_burst", "dial_tone". No "pad" type. Each cue must have "position" (character index), "type", optional "intensity" (0-1). Include at least 35 cues, spread evenly.
        - "score": an object with keys matching the same theme names. Each key must contain: "bpm" (integer 65-110), "bass" (array of 8 semitone intervals from root 0), "arp" (array of 8 semitone intervals), "kick" (array of 8 numbers, 1=hit 0=rest), "snare" (same as kick). Make the music tense — intro sparse, execution driving, twist dissonant.
        Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and score patterns.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: userPrompt }
                ], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try {
                    data = JSON.parse(cleaned);
                } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try { data = JSON.parse(candidate); } catch (e2) { throw new Error(
                                'Failed to parse AI soundtrack JSON even after repair.'); }
                    } else { throw new Error('No JSON found in AI response.'); }
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !==
                    'object') {
                    throw new Error('Missing sections, cues, or score in AI response');
                }
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1]
                    .end_char < length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({
                    type: c.type,
                    position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7
                }));
                const requiredThemes = ['intro', 'setup', 'scheme', 'execution', 'twist', 'closing'];
                const score = {};
                for (const theme of requiredThemes) {
                    if (data.score[theme]) {
                        score[theme] = {
                            bpm: data.score[theme].bpm || 85,
                            bass: data.score[theme].bass || [0, 0, 7, 7, 0, 0, 7, 7],
                            arp: data.score[theme].arp || [12, 15, 12, 19, 12, 15, 12, 19],
                            kick: data.score[theme].kick || [1, 0, 1, 0, 1, 0, 1, 0],
                            snare: data.score[theme].snare || [0, 0, 0, 1, 0, 0, 0, 1]
                        };
                    } else {
                        score[theme] = { bpm: 85, bass: [0, 0, 7, 7, 0, 0, 7, 7], arp: [12, 15, 12, 19, 12,
                                15, 12, 19
                            ], kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 0, 0, 1, 0, 0, 0, 1] };
                    }
                }
                return { sections: sortedSections, cues, score };
            }

            function createCueChecker(cues, storyLength) {
                const sorted = [...cues].sort((a, b) => a.position - b.position);
                let cueIndex = 0;
                const triggered = new Set();
                let lastLog = 0;
                return function check(currentCharIndex) {
                    if (currentCharIndex - lastLog > 500) {
                        console.log(
                            `⏳ Cue checker at index ${currentCharIndex} (${Math.round(currentCharIndex / storyLength * 100)}%)`
                            );
                        lastLog = currentCharIndex;
                    }
                    while (cueIndex < sorted.length && sorted[cueIndex].position <= currentCharIndex) {
                        const cue = sorted[cueIndex];
                        if (!triggered.has(cueIndex)) {
                            triggered.add(cueIndex);
                            const isAmbient = ['radio_hum', 'wind_howl', 'static'].includes(cue.type);
                            console.log(
                                `🔊 FIRING ${cue.type} at position ${cue.position} (current index ${currentCharIndex})`
                                );
                            if (isAmbient) {
                                playAmbient(cue.type, cue.duration || 10, cue.intensity);
                            } else {
                                playSound(cue.type, cue.intensity);
                            }
                        }
                        cueIndex++;
                    }
                };
            }

                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b
                        .start_char) : [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) {
                            console.log(`⏳ at index ${idx} (${Math.round(idx / storyText.length * 100)}%)`);
                            lastLog = idx;
                        }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx]
                            .start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) {
                                currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme);
                            }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) {
                                triggered.add(cueIdx);
                                console.log(`🔊 FIRING ${cue.type} at ${cue.position}`);
                                playSound(cue.type, cue.intensity);
                            }
                            cueIdx++;
                        }
                    };
                }
                dialogue.textContent = '';
                if (cueChecker) {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.65, pitch: 0.88 }, (idx) => cueChecker(
                        idx));
                } else {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.65, pitch: 0.88 });
                }
                await new Promise(r => setTimeout(r, 1200));
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#d4cfa8';
                dialogue.appendChild(closingLine);
                speakTextMale(closing);
                await typewriterEffect(closingLine, closing, 35);
                await new Promise(r => setTimeout(r, 1000));
                const signOffText = document.createElement('p');
                signOffText.textContent = '— Click. Line goes dead. —';
                stopSectionAmbient();
                signOffText.style.color = '#6e6a58';
                signOffText.style.fontSize = '14px';
                dialogue.appendChild(signOffText);
                stopAmbient();
                stopRadioStatic();
                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Back to Studio';
                leaveBtn.addEventListener('click', () => { leaveStudio(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'deadAirAddEpisodeBtn';
                addBtn.textContent = '➕ Save Recording';
                addBtn.addEventListener('click', () => {
                    addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Saved';
                });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.deadAirBroadcast;
                if (!perf) return;
                gameState.deadAirEpisodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf
                        .soundCues });
                saveState();
                setTimeout(() => leaveStudio(), 600);
            }

            function leaveStudio() {
                stopAmbient();
                stopSectionAmbient();
                stopRadioStatic();
                renderDeadAir();
            }

            function init() {
                loadState();
                renderDeadAir();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('dead_air_radio_key', key);
                    }
                });
                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) {
                        showModal(HOST_BIO);
                    }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeModal();
                });
                if (!apiKey) {
                    setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                }
            }
            init();
        })();
    </script>
</body>
</html>
