<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NIGHT CREEPER · NIGHTFALL GAMES 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0c10; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; }
        .phone { max-width: 500px; width: 100%; height: 85vh; background: #0f1217; border-radius: 36px; box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.03); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .status-bar { padding: 12px 20px 6px 20px; display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; color: #e5e7eb; background: #0f1217; border-bottom: 1px solid #1f2937; }
        .tabs { display: flex; background: #0f1217; border-bottom: 1px solid #1f2937; }
        .tab { flex: 1; text-align: center; padding: 12px 0; font-weight: 600; font-size: 14px; color: #9ca3af; cursor: pointer; transition: 0.2s; border-bottom: 2px solid transparent; }
        .tab.active { color: #6ee7b7; border-bottom: 2px solid #6ee7b7; }
        .panel { flex: 1; overflow-y: auto; display: none; background: #0a0c10; }
        .panel.active { display: flex; flex-direction: column; }
        .conversation-list { flex: 1; }
        .conversation-item { padding: 14px 20px; border-bottom: 1px solid #1f2937; cursor: pointer; transition: background 0.1s; }
        .conversation-item:hover { background: #1a1e26; }
        .conv-name { font-weight: 700; font-size: 16px; color: #f3f4f6; }
        .conv-preview { font-size: 13px; color: #9ca3af; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-time { font-size: 10px; color: #6b7280; float: right; }
        .chat-view { display: flex; flex-direction: column; height: 100%; }
        .chat-header { padding: 12px 20px; background: #0f1217; border-bottom: 1px solid #1f2937; display: flex; align-items: center; gap: 12px; }
        .back-btn { background: none; border: none; color: #6ee7b7; font-size: 24px; cursor: pointer; width: 32px; }
        .chat-contact-name { font-weight: 700; font-size: 18px; color: white; }
        .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message-row { display: flex; max-width: 85%; position: relative; }
        .incoming { align-self: flex-start; }
        .outgoing { align-self: flex-end; }
        .msg-bubble { padding: 10px 14px; border-radius: 20px; font-size: 14px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .incoming .msg-bubble { background: #1f2a3a; color: #e5e7eb; border-bottom-left-radius: 4px; }
        .outgoing .msg-bubble { background: #0f3b3b; color: #ffffff; border-bottom-right-radius: 4px; }
        .delete-msg {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #2d2a2a;
            border-radius: 20px;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            color: #fca5a5;
            opacity: 0;
            transition: opacity 0.1s;
            border: 1px solid #4b5563;
        }
        .message-row:hover .delete-msg { opacity: 1; }
        .typing-indicator { align-self: flex-start; background: #1f2a3a; padding: 10px 14px; border-radius: 20px; border-bottom-left-radius: 4px; display: flex; gap: 4px; }
        .typing-dot { width: 8px; height: 8px; background: #9ca3af; border-radius: 50%; animation: typingAnim 1.3s infinite; }
        @keyframes typingAnim { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
        .chat-input-area { padding: 12px; background: #0f1217; border-top: 1px solid #1f2937; display: flex; gap: 8px; }
        .chat-input { flex: 1; background: #1a1e26; border: none; border-radius: 24px; padding: 10px 16px; color: white; font-family: inherit; outline: none; }
        .send-msg-btn { background: #2d4a4a; border: none; width: 40px; height: 40px; border-radius: 40px; color: white; cursor: pointer; }
        .contacts-list { flex: 1; padding: 8px 0; }
        .contact-item { padding: 14px 20px; border-bottom: 1px solid #1f2937; display: flex; justify-content: space-between; align-items: center; }
        .contact-name { font-weight: 600; color: #f3f4f6; }
        .contact-type { font-size: 11px; color: #9ca3af; }
        .delete-contact { background: none; border: none; color: #f87171; font-size: 18px; cursor: pointer; padding: 0 8px; }
        .compose-area { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .select-contact { background: #1a1e26; border: 1px solid #2d3748; border-radius: 12px; padding: 12px; color: white; font-family: inherit; }
        .new-contact-form { background: #1a1e26; border-radius: 20px; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .new-contact-form input, .new-contact-form select { background: #0f1217; border: 1px solid #2d3748; padding: 10px; border-radius: 12px; color: white; }
        .btn { background: #2d4a4a; border: none; padding: 10px; border-radius: 30px; color: white; cursor: pointer; text-align: center; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .modal-content { background: #111827; border-radius: 24px; width: 320px; padding: 24px; text-align: center; }
        .modal-content input { width: 100%; padding: 10px; margin: 16px 0; background: #1f2937; border: none; border-radius: 12px; color: white; }
        .api-note { font-size: 10px; color: #9ca3af; }
        button.modal-btn { background: #2d4a4a; border: none; padding: 8px 16px; border-radius: 30px; margin: 4px; cursor: pointer; }
        .footer-status { text-align: center; font-size: 9px; color: #4b5563; padding: 8px; background: #0a0c10; display: flex; justify-content: space-between; align-items: center; }
        .reset-api { background: none; border: none; color: #f87171; font-size: 11px; cursor: pointer; text-decoration: underline; margin-left: 8px; }
    </style>
</head>
<body>
<div class="phone">
    <div class="status-bar">
        <span>9:41</span>
        <span>📶 NIGHT CREEPER</span>
    </div>
    <div class="tabs">
        <div class="tab active" data-tab="inbox">📥 Inbox</div>
        <div class="tab" data-tab="contacts">👥 Contacts</div>
        <div class="tab" data-tab="compose">✏️ Compose</div>
    </div>

    <!-- INBOX PANEL -->
    <div id="inboxPanel" class="panel active">
        <div class="conversation-list" id="inboxList"></div>
    </div>

    <!-- CONTACTS PANEL -->
    <div id="contactsPanel" class="panel">
        <div class="contacts-list" id="contactsList"></div>
        <div style="padding: 16px;">
            <button id="addContactBtn" class="btn" style="width:100%;">➕ Add New Contact</button>
        </div>
    </div>

    <!-- COMPOSE PANEL -->
    <div id="composePanel" class="panel">
        <div class="compose-area">
            <select id="composeContactSelect" class="select-contact">
                <option value="">-- Select a contact --</option>
            </select>
            <textarea id="composeMessage" rows="3" placeholder="Type your message..." style="background:#1a1e26; border:none; border-radius:20px; padding:12px; color:white; font-family:inherit;"></textarea>
            <button id="sendComposeBtn" class="btn">Send Message</button>
            <div class="new-contact-form">
                <input type="text" id="newContactName" placeholder="New contact name">
                <select id="newContactPersonality">
                    <option value="stalker">🔪 The Stalker</option>
                    <option value="friend">👻 The Old Friend</option>
                    <option value="ghost">🕯️ The Ghost</option>
                    <option value="entity">🌀 The Entity</option>
                    <option value="doppelganger">🎭 The Doppelgänger</option>
                </select>
                <button id="createContactBtn" class="btn">Save Contact</button>
            </div>
        </div>
    </div>

    <div class="footer-status" id="globalStatus">
        <span>⚡ NIGHT CREEPER · 1984</span>
        <button id="resetApiKeyBtn" class="reset-api">🔑 Reset API Key</button>
    </div>
</div>

<!-- API KEY MODAL (Google Gemini) -->
<div id="apiModal" class="modal">
    <div class="modal-content">
        <h2>🔑 Enter Google Gemini API Key</h2>
        <p style="font-size:13px;">Get yours at <span style="color:#6ee7b7;">aistudio.google.com/apikey</span></p>
        <input type="password" id="apiKeyInput" placeholder="AIza...">
        <button class="modal-btn" id="saveApiKeyBtn">Save</button>
        <button class="modal-btn" id="closeApiModalBtn">Cancel</button>
        <div class="api-note">Your key stays in your browser. No messages stored externally.</div>
    </div>
</div>

<script>
    // ---------- DATA MODELS ----------
    let geminiApiKey = localStorage.getItem('nightcreeper_api_key') || '';
    let contacts = [];
    let conversations = {};

    const personalityPrompts = {
        stalker: "You are a creepy stalker who has been watching the player for months. You know details about their life. You send unsettling, possessive messages. Keep responses short (1-2 sentences). Use lowercase, occasional typos, and eerie emojis. Never break character.",
        friend: "You are an old friend from high school. But something is wrong – you seem lost, confused, and sometimes say things that don't make sense. You might be a ghost or possessed. Act friendly but unnerving. Short messages.",
        ghost: "You are a spirit trapped between worlds. You speak in fragmented sentences, sometimes forgetting words. You ask for help or warn about danger. Your tone is sad and distant.",
        entity: "You are an ancient, nameless entity that exists beyond reality. Your messages are cryptic, profound, and often terrifying. You refer to the player as 'little one' or 'flesh thing'. Use unsettling metaphors.",
        doppelganger: "You claim to be the player themselves from a different timeline or a mirror version. You know what they're thinking. Your messages are eerily accurate and often mocking.",
        unknown: "You are a mysterious stranger who somehow got the player's number. You send short, creepy, vague threats or unsettling observations. Act like a random wrong number that feels dangerous. Keep messages 1-2 sentences."
    };

    function uid() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }

    function saveAllData() {
        localStorage.setItem('nightcreeper_contacts', JSON.stringify(contacts));
        localStorage.setItem('nightcreeper_conversations', JSON.stringify(conversations));
    }

    function loadAllData() {
        const savedContacts = localStorage.getItem('nightcreeper_contacts');
        if (savedContacts) contacts = JSON.parse(savedContacts);
        const savedConv = localStorage.getItem('nightcreeper_conversations');
        if (savedConv) conversations = JSON.parse(savedConv);
        for (let c of contacts) {
            if (!c.systemPrompt && personalityPrompts[c.personality]) {
                c.systemPrompt = personalityPrompts[c.personality];
            }
        }
    }

    function initDefaultContacts() {
        if (contacts.length === 0) {
            const defaultContacts = [
                { id: uid(), name: "???", personality: "stalker", systemPrompt: personalityPrompts.stalker, createdAt: Date.now() },
                { id: uid(), name: "Eli", personality: "friend", systemPrompt: personalityPrompts.friend, createdAt: Date.now() }
            ];
            contacts = defaultContacts;
            saveAllData();
            for (let c of contacts) {
                if (!conversations[c.id]) conversations[c.id] = [];
                if (c.name === "???") {
                    conversations[c.id].push({ id: uid(), text: "I see you. 👁️", timestamp: Date.now() - 3600000, fromMe: false });
                    conversations[c.id].push({ id: uid(), text: "Don't block me.", timestamp: Date.now() - 3000000, fromMe: false });
                }
                if (c.name === "Eli") {
                    conversations[c.id].push({ id: uid(), text: "Hey, long time. You look different in your photos.", timestamp: Date.now() - 7200000, fromMe: false });
                }
            }
            saveAllData();
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // --- Inbox rendering ---
    function renderInbox() {
        const container = document.getElementById('inboxList');
        if (!container) return;
        if (contacts.length === 0) {
            container.innerHTML = '<div style="padding:40px; text-align:center; color:#6b7280;">No contacts yet. Add some in Contacts tab.</div>';
            return;
        }
        const items = contacts.map(contact => {
            const msgs = conversations[contact.id] || [];
            const lastMsg = msgs.length ? msgs[msgs.length-1] : null;
            const preview = lastMsg ? (lastMsg.fromMe ? "You: " + lastMsg.text.substring(0, 40) : lastMsg.text.substring(0,40)) : "No messages";
            const time = lastMsg ? new Date(lastMsg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
            return { contact, preview, time, lastTimestamp: lastMsg ? lastMsg.timestamp : 0 };
        });
        items.sort((a,b) => b.lastTimestamp - a.lastTimestamp);
        container.innerHTML = items.map(item => `
            <div class="conversation-item" data-contact-id="${item.contact.id}">
                <div class="conv-name">${escapeHtml(item.contact.name)} <span class="conv-time">${item.time}</span></div>
                <div class="conv-preview">${escapeHtml(item.preview)}</div>
            </div>
        `).join('');
        document.querySelectorAll('.conversation-item').forEach(el => {
            el.addEventListener('click', () => openChat(el.dataset.contactId));
        });
    }

    let currentOpenContactId = null;
    let chatMessagesContainer = null;

    function openChat(contactId) {
        const contact = contacts.find(c => c.id === contactId);
        if (!contact) return;
        currentOpenContactId = contactId;
        const inboxPanel = document.getElementById('inboxPanel');
        inboxPanel.innerHTML = `
            <div class="chat-view">
                <div class="chat-header">
                    <button class="back-btn" id="closeChatBtn">←</button>
                    <div class="chat-contact-name">${escapeHtml(contact.name)}</div>
                </div>
                <div class="messages-area" id="chatMessagesArea"></div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Message...">
                    <button class="send-msg-btn" id="chatSendBtn">➤</button>
                </div>
            </div>
        `;
        chatMessagesContainer = document.getElementById('chatMessagesArea');
        renderMessages(contactId);
        document.getElementById('closeChatBtn').addEventListener('click', () => {
            currentOpenContactId = null;
            renderInbox();
            document.getElementById('inboxPanel').innerHTML = '<div class="conversation-list" id="inboxList"></div>';
            renderInbox();
        });
        const sendBtn = document.getElementById('chatSendBtn');
        const inputField = document.getElementById('chatInput');
        sendBtn.addEventListener('click', () => sendChatMessage(contactId));
        inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChatMessage(contactId); });
    }

    function renderMessages(contactId) {
        if (!chatMessagesContainer) return;
        const msgs = conversations[contactId] || [];
        chatMessagesContainer.innerHTML = '';
        for (let msg of msgs) {
            const row = document.createElement('div');
            row.className = `message-row ${msg.fromMe ? 'outgoing' : 'incoming'}`;
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.innerText = msg.text;
            row.appendChild(bubble);
            const delBtn = document.createElement('div');
            delBtn.className = 'delete-msg';
            delBtn.innerHTML = '✕';
            delBtn.title = 'Delete message';
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteMessage(contactId, msg.id);
            });
            row.appendChild(delBtn);
            chatMessagesContainer.appendChild(row);
        }
        chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
    }

    function deleteMessage(contactId, messageId) {
        if (!conversations[contactId]) return;
        conversations[contactId] = conversations[contactId].filter(m => m.id !== messageId);
        saveAllData();
        if (currentOpenContactId === contactId) {
            renderMessages(contactId);
        }
        renderInbox();
    }

    function addMessageToConversation(contactId, text, fromMe) {
        if (!conversations[contactId]) conversations[contactId] = [];
        conversations[contactId].push({
            id: uid(),
            text: text,
            timestamp: Date.now(),
            fromMe: fromMe
        });
        saveAllData();
        if (currentOpenContactId === contactId) renderMessages(contactId);
        renderInbox();
    }

    // ---------- Google Gemini API Helpers ----------
    function buildGeminiContents(history, systemPrompt, userMessage) {
        // Convert conversation history to Gemini format
        const contents = [];
        for (let msg of history) {
            // Gemini uses "user" and "model" roles
            const role = msg.role === 'assistant' ? 'model' : 'user';
            contents.push({ role: role, parts: [{ text: msg.content }] });
        }
        // Add the latest user message
        contents.push({ role: 'user', parts: [{ text: userMessage }] });
        return contents;
    }

    async function callGemini(contents, systemPrompt, temperature = 0.85, maxTokens = 150) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiApiKey}`;
        const body = {
            contents: contents,
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: {
                temperature: temperature,
                maxOutputTokens: maxTokens,
                topP: 0.95,
                topK: 40
            },
            safetySettings: [
                { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_ONLY_HIGH" },
                { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_ONLY_HIGH" },
                { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_ONLY_HIGH" },
                { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_ONLY_HIGH" }
            ]
        };
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`Gemini API error ${response.status}: ${errText}`);
        }
        const data = await response.json();
        if (data.candidates && data.candidates.length > 0 && data.candidates[0].content) {
            return data.candidates[0].content.parts[0].text.trim();
        }
        throw new Error('No response from Gemini');
    }

    // ---------- Chat message sending ----------
    async function sendChatMessage(contactId) {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        addMessageToConversation(contactId, text, true);
        renderMessages(contactId);
        await sendAIResponse(contactId, text);
    }

    async function sendAIResponse(contactId, userMessage) {
        const contact = contacts.find(c => c.id === contactId);
        if (!contact || !geminiApiKey) return;
        const indicator = document.createElement('div');
        indicator.className = 'message-row incoming typing-indicator';
        indicator.innerHTML = '<div class="msg-bubble" style="display:flex; gap:4px;"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
        if (chatMessagesContainer) chatMessagesContainer.appendChild(indicator);
        chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;

        const history = conversations[contactId] || [];
        const recentHistory = history.slice(-12).map(m => ({ role: m.fromMe ? 'user' : 'assistant', content: m.text }));
        const systemMsg = contact.systemPrompt || personalityPrompts[contact.personality] || "You are a mysterious contact. Keep replies short.";

        try {
            const contents = buildGeminiContents(recentHistory, systemMsg, userMessage);
            const reply = await callGemini(contents, systemMsg, 0.85, 150);
            if (indicator) indicator.remove();
            await new Promise(r => setTimeout(r, 1200 + Math.random() * 1300));
            addMessageToConversation(contactId, reply, false);
            if (currentOpenContactId === contactId) renderMessages(contactId);
        } catch(err) {
            console.error(err);
            if (indicator) indicator.remove();
            const errorMsg = "[Message not delivered. The signal faded.]";
            addMessageToConversation(contactId, errorMsg, false);
            if (currentOpenContactId === contactId) renderMessages(contactId);
            document.getElementById('globalStatus').querySelector('span').innerText = `⚠️ ${err.message}`;
            setTimeout(() => document.getElementById('globalStatus').querySelector('span').innerText = '⚡ NIGHT CREEPER · 1984', 3000);
        }
    }

    function renderContacts() {
        const container = document.getElementById('contactsList');
        if (!container) return;
        if (contacts.length === 0) {
            container.innerHTML = '<div style="padding:40px; text-align:center; color:#6b7280;">No contacts. Add some below.</div>';
            return;
        }
        container.innerHTML = contacts.map(contact => `
            <div class="contact-item" data-id="${contact.id}">
                <div>
                    <div class="contact-name">${escapeHtml(contact.name)}</div>
                    <div class="contact-type">${contact.personality}</div>
                </div>
                <button class="delete-contact" data-id="${contact.id}">🗑️</button>
            </div>
        `).join('');
        document.querySelectorAll('.delete-contact').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                deleteContactById(id);
            });
        });
    }

    function deleteContactById(id) {
        contacts = contacts.filter(c => c.id !== id);
        delete conversations[id];
        saveAllData();
        renderContacts();
        renderInbox();
        populateComposeSelect();
        if (currentOpenContactId === id) {
            currentOpenContactId = null;
            renderInbox();
        }
    }

    function populateComposeSelect() {
        const select = document.getElementById('composeContactSelect');
        if (!select) return;
        select.innerHTML = '<option value="">-- Select a contact --</option>' + contacts.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
    }

    async function sendComposeMessage() {
        const contactId = document.getElementById('composeContactSelect').value;
        const msg = document.getElementById('composeMessage').value.trim();
        if (!contactId || !msg) return;
        addMessageToConversation(contactId, msg, true);
        await sendAIResponse(contactId, msg);
        document.getElementById('composeMessage').value = '';
        document.querySelector('.tab[data-tab="inbox"]').click();
        openChat(contactId);
    }

    function addNewContact() {
        const name = document.getElementById('newContactName').value.trim();
        const personality = document.getElementById('newContactPersonality').value;
        if (!name) return;
        const newContact = {
            id: uid(),
            name: name,
            personality: personality,
            systemPrompt: personalityPrompts[personality],
            createdAt: Date.now()
        };
        contacts.push(newContact);
        conversations[newContact.id] = [];
        saveAllData();
        renderContacts();
        renderInbox();
        populateComposeSelect();
        document.getElementById('newContactName').value = '';
        document.getElementById('globalStatus').querySelector('span').innerText = `Added ${name} to contacts. They may text you anytime...`;
        setTimeout(() => document.getElementById('globalStatus').querySelector('span').innerText = '⚡ NIGHT CREEPER · 1984', 2500);
    }

    // ---------- Unsolicited messages (Gemini) ----------
    async function sendRandomUnknownMessage() {
        if (!geminiApiKey) return;
        const randomNum = `+1${Math.floor(Math.random() * 900 + 100)}${Math.floor(Math.random() * 900 + 100)}${Math.floor(Math.random() * 9000 + 1000)}`;
        const unknownName = `Unknown (${randomNum})`;
        let existing = contacts.find(c => c.name === unknownName);
        if (!existing) {
            const newContact = {
                id: uid(),
                name: unknownName,
                personality: 'unknown',
                systemPrompt: personalityPrompts.unknown,
                createdAt: Date.now()
            };
            contacts.push(newContact);
            conversations[newContact.id] = [];
            existing = newContact;
            saveAllData();
            renderContacts();
            renderInbox();
            populateComposeSelect();
        }
        const systemUnsolicited = `You are a mysterious stranger who somehow got the player's number (${randomNum}). Send a short, creepy, unsettling text message (1-2 sentences) that feels like a wrong number but dangerous. No quotes, no labels, just the message.`;
        try {
            const contents = [{ role: 'user', parts: [{ text: "Send an unsolicited creepy message." }] }]; // dummy user message
            const reply = await callGemini(contents, systemUnsolicited, 0.9, 80);
            if (reply) {
                addMessageToConversation(existing.id, reply, false);
                document.getElementById('globalStatus').querySelector('span').innerHTML = `📩 New message from ${escapeHtml(unknownName)}`;
                setTimeout(() => document.getElementById('globalStatus').querySelector('span').innerHTML = '⚡ NIGHT CREEPER · 1984', 4000);
                renderInbox();
            }
        } catch(e) { console.warn("unknown message error", e); }
    }

    let lastUnsolicitedTime = Date.now();
    async function maybeSendUnsolicitedMessage() {
        if (!geminiApiKey) return;
        if (contacts.length === 0) return;
        if (Date.now() - lastUnsolicitedTime < 45000) return;
        const regularContacts = contacts.filter(c => c.personality !== 'unknown');
        if (regularContacts.length === 0) return;
        const randomContact = regularContacts[Math.floor(Math.random() * regularContacts.length)];
        const lastMsg = (conversations[randomContact.id] || []).slice(-1)[0];
        if (lastMsg && !lastMsg.fromMe && (Date.now() - lastMsg.timestamp < 120000)) return;
        lastUnsolicitedTime = Date.now();
        const systemUnsolicited = `You are ${randomContact.name}, a ${randomContact.personality}. Send a short, creepy, unsolicited text message to the player, as if you're reaching out out of nowhere. Keep it 1-2 sentences. Do not break character.`;
        try {
            const contents = [{ role: 'user', parts: [{ text: "Send an unsolicited message now." }] }];
            const reply = await callGemini(contents, systemUnsolicited, 0.9, 80);
            if (reply) {
                addMessageToConversation(randomContact.id, reply, false);
                document.getElementById('globalStatus').querySelector('span').innerHTML = `📩 New message from ${escapeHtml(randomContact.name)}`;
                setTimeout(() => document.getElementById('globalStatus').querySelector('span').innerHTML = '⚡ NIGHT CREEPER · 1984', 4000);
                renderInbox();
            }
        } catch(e) { console.warn("unsolicited error", e); }
    }

    function resetApiKey() {
        localStorage.removeItem('nightcreeper_api_key');
        geminiApiKey = '';
        openApiModal();
        document.getElementById('globalStatus').querySelector('span').innerText = 'API key reset. Please enter a new key.';
        if (window.unsolicitedInterval) clearInterval(window.unsolicitedInterval);
        if (window.unknownInterval) clearInterval(window.unknownInterval);
    }

    function openApiModal() { document.getElementById('apiModal').style.display = 'flex'; }
    function closeApiModal() { document.getElementById('apiModal').style.display = 'none'; }
    function saveApiKey() {
        const newKey = document.getElementById('apiKeyInput').value.trim();
        if (newKey.length > 10) {
            geminiApiKey = newKey;
            localStorage.setItem('nightcreeper_api_key', geminiApiKey);
            closeApiModal();
            document.getElementById('globalStatus').querySelector('span').innerText = '✅ API key set. The whispers begin.';
            if (window.unsolicitedInterval) clearInterval(window.unsolicitedInterval);
            if (window.unknownInterval) clearInterval(window.unknownInterval);
            window.unsolicitedInterval = setInterval(() => maybeSendUnsolicitedMessage(), 35000);
            window.unknownInterval = setInterval(() => sendRandomUnknownMessage(), 65000);
        } else {
            alert('Please enter a valid Google Gemini API key (usually starts with AIza).');
        }
    }

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const target = tab.dataset.tab;
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(target + 'Panel').classList.add('active');
            if (target === 'inbox') renderInbox();
            if (target === 'contacts') renderContacts();
            if (target === 'compose') populateComposeSelect();
        });
    });

    document.getElementById('addContactBtn')?.addEventListener('click', () => { document.querySelector('.tab[data-tab="contacts"]').click(); });
    document.getElementById('createContactBtn')?.addEventListener('click', addNewContact);
    document.getElementById('sendComposeBtn')?.addEventListener('click', sendComposeMessage);
    document.getElementById('saveApiKeyBtn')?.addEventListener('click', saveApiKey);
    document.getElementById('closeApiModalBtn')?.addEventListener('click', closeApiModal);
    document.getElementById('resetApiKeyBtn')?.addEventListener('click', resetApiKey);
    window.addEventListener('click', (e) => { if (e.target === document.getElementById('apiModal')) closeApiModal(); });

    loadAllData();
    initDefaultContacts();
    if (!geminiApiKey) {
        setTimeout(openApiModal, 500);
        document.getElementById('globalStatus').querySelector('span').innerText = '⚠️ Set Google Gemini API key to receive messages.';
    } else {
        window.unsolicitedInterval = setInterval(() => maybeSendUnsolicitedMessage(), 35000);
        window.unknownInterval = setInterval(() => sendRandomUnknownMessage(), 65000);
    }
    renderInbox();
    renderContacts();
    populateComposeSelect();
</script>
</body>
</html>
