<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASYLUM OF THE DAMNED · INVESTIGATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0b0b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 16px;
        }
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2;
        }
        .terminal {
            background: #0a0a0a;
            color: #f0f0f0;
            border: 4px solid #6b6b6b;
            box-shadow: 0 0 20px #3a3a3a, inset 0 0 10px #1f1f1f;
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 18px 18px 12px 18px;
            position: relative;
            z-index: 1;
        }
        .header {
            border-bottom: 2px solid #8f8f8f;
            padding-bottom: 10px;
            margin-bottom: 14px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            text-shadow: 0 0 4px #5f5f5f;
            color: #f0f0f0;
        }
        .hud {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            border: 2px solid #6b6b6b;
            padding: 10px 15px;
            margin-bottom: 15px;
            background: #0d0d0d;
            font-size: 11px;
            text-transform: uppercase;
            color: #cfcfcf;
            text-shadow: 0 0 5px #3f3f3f;
            align-items: center;
        }
        .hud span {
            color: #ffffff;
        }
        /* ----- main output (hidden during conversation) ----- */
        .output {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 12px;
            border: 2px solid #5f5f5f;
            padding: 16px;
            background: #0c0c0c;
            scroll-behavior: smooth;
            box-shadow: inset 0 0 15px #1a1a1a;
        }
        .output p {
            margin: 0 0 12px 0;
            color: #ffffff;
        }
        /* ----- conversation panel (replaces output when talking) ----- */
        .conversation-panel {
            flex: 1;
            display: none;
            flex-direction: column;
            border: 2px solid #5f5f5f;
            padding: 10px;
            background: #0c0c0c;
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: inset 0 0 15px #1a1a1a;
        }
        .conv-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #6b6b6b;
            padding-bottom: 5px;
            margin-bottom: 10px;
            font-size: 12px;
            color: #cfcfcf;
        }
        .conv-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-right: 5px;
        }
        .message-row {
            display: flex;
            gap: 12px;
        }
        .message-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 55px;
            flex-shrink: 0;
        }
        .message-icon .icon {
            width: 45px;
            height: 45px;
            background: #1e1e1e;
            border: 2px solid #7a7a7a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 5px;
            color: #cfcfcf;
            text-shadow: 0 0 5px #5f5f5f;
        }
        .message-icon .name {
            font-size: 8px;
            text-align: center;
            word-break: break-word;
            max-width: 55px;
            color: #b3b3b3;
            text-transform: uppercase;
        }
        .message-text {
            background: #1a1a1a;
            border: 1px solid #5f5f5f;
            padding: 10px 14px;
            font-size: 12px;
            line-height: 1.6;
            flex: 1;
            align-self: center;
            color: #f0f0f0;
            box-shadow: inset 0 0 8px #0f0f0f;
        }
        .message-row.player .message-text {
            background: #232323;
            border-color: #7f7f7f;
        }
        .close-btn {
            color: #d4d4d4;
            text-decoration: underline;
            cursor: pointer;
            font-size: 11px;
            transition: 0.1s;
        }
        .close-btn:hover {
            color: #ffffff;
            background: #2f2f2f;
        }
        /* ----- input area (always visible) ----- */
        .input-line {
            display: flex;
            align-items: center;
            border-top: 2px solid #7a7a7a;
            padding-top: 12px;
        }
        .prompt {
            color: #cfcfcf;
            margin-right: 12px;
            font-size: 18px;
        }
        #userInput {
            flex: 1;
            background: #0a0a0a;
            border: 2px solid #7a7a7a;
            color: #ffffff;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            padding: 12px 12px;
            outline: none;
            box-shadow: 0 0 8px #4d4d4d;
        }
        #userInput::placeholder {
            color: #4d4d4d;
            font-size: 9px;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9px;
            margin-top: 8px;
            color: #b3b3b3;
        }
        .clickable {
            color: #d4d4d4;
            text-decoration: underline;
            cursor: pointer;
            transition: 0.1s;
        }
        .clickable:hover {
            color: #ffffff;
            background: #2f2f2f;
        }
        #aiStatus {
            color: #cfcfcf;
            font-size: 10px;
            margin-top: 5px;
            text-align: right;
        }
        .npc-list {
            margin-left: auto;
            font-size: 9px;
            color: #d4d4d4;
        }
        .conv-indicator {
            color: #ffffff;
            font-size: 9px;
            margin-right: 10px;
        }
        #fileInput {
            display: none;
        }
    </style>
</head>
<body class="crt">
    <div class="terminal">
        <div class="header">
            <div>ASYLUM OF THE DAMNED · NIGHTFALL 1982</div>
            <div class="npc-list" id="npcPresence">[MAIN GATE · EMPTY]</div>
        </div>
        <div class="hud" id="hud">
            <span id="locationDisplay">📍 MAIN GATE</span>
            <span>👥 <span id="npcCount">0</span> PRESENT</span>
            <span>🔍 CLUES: <span id="clueCount">0</span>/8</span>
            <span>🎒 <span id="invCount">0</span> ITEMS</span>
            <span id="conversationDisplay" class="conv-indicator"></span>
        </div>

        <!-- normal output (visible when not talking) -->
        <div id="outputArea" class="output"></div>

        <!-- conversation panel (visible during talks) -->
        <div id="conversationPanel" class="conversation-panel">
            <div class="conv-header">
                <span id="convNpcName">TALKING TO ...</span>
                <span class="close-btn" id="closeConvBtn">[ CLOSE ]</span>
            </div>
            <div id="convMessages" class="conv-messages">
                <!-- messages dynamically inserted -->
            </div>
        </div>

        <div class="input-line">
            <span class="prompt">❯</span>
            <input type="text" id="userInput" placeholder="TALK / GO / TAKE / USE / INVENTORY / CASE / ACCUSE ..." autofocus>
        </div>
        <div id="aiStatus" class="status">⚡ ASYLUM SLEEPS ... AWAITING COMMAND ⚡</div>
        <div class="footer">
            <span class="clickable" id="saveBtn">[ SAVE ]</span>
            <span class="clickable" id="loadBtn">[ LOAD ]</span>
            <span class="clickable" id="resetBtn">[ RESET ]</span>
            <span>EVERY INMATE HAS A STORY</span>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".json,application/json">

    <script>
        (function() {
            // ---------- DOM elements ----------
            const outputDiv = document.getElementById('outputArea');
            const inputField = document.getElementById('userInput');
            const aiStatus = document.getElementById('aiStatus');
            const resetBtn = document.getElementById('resetBtn');
            const saveBtn = document.getElementById('saveBtn');
            const loadBtn = document.getElementById('loadBtn');
            const fileInput = document.getElementById('fileInput');
            const locationSpan = document.getElementById('locationDisplay');
            const npcCountSpan = document.getElementById('npcCount');
            const clueCountSpan = document.getElementById('clueCount');
            const invCountSpan = document.getElementById('invCount');
            const npcPresenceSpan = document.getElementById('npcPresence');
            const conversationDisplay = document.getElementById('conversationDisplay');

            // ----- new conversation UI elements -----
            const conversationPanel = document.getElementById('conversationPanel');
            const convMessages = document.getElementById('convMessages');
            const convNpcName = document.getElementById('convNpcName');
            const closeConvBtn = document.getElementById('closeConvBtn');

            // ---------- THE TRUTH (canonical) ----------
            const TRUTH = {
                summary: "Patient 7 (David Keller) was accidentally killed by Warden Voss during a struggle. Voss hid the body in a secret compartment behind the morgue and falsified transfer records.",
                requiredClues: 5  // need at least this many to solve
            };

            // ---------- CLUE DATABASE ----------
            const clueDB = {
                // Each clue: name, description, source (NPC that can give it), location (item)
                "witness_account": { name: "Witness Account", desc: "Patient 47 saw Voss dragging something heavy toward the morgue late at night.", obtained: false },
                "orderly_bribe": { name: "Orderly Bribe", desc: "Briggs admitted he was paid to keep quiet about the incident.", obtained: false },
                "nurse_suspicion": { name: "Nurse's Suspicion", desc: "Nurse Miriam noticed Voss acting strangely and a missing sheet from the infirmary.", obtained: false },
                "doctors_fear": { name: "Doctor's Fear", desc: "Dr. Finch knows the truth but is terrified of Voss. He hinted at the morgue.", obtained: false },
                "chaplain_confession": { name: "Confession", desc: "Chaplain heard a muffled confession from Voss: 'I didn't mean to kill him.'", obtained: false },
                "bloody_key": { name: "Bloody Key", desc: "A rusty key with dark stains, found near the incinerator. (item)", obtained: false },
                "transfer_forgery": { name: "Forged Transfer", desc: "A document in Voss's office showing Patient 7 was 'transferred' – dated after disappearance.", obtained: false },
                "secret_compartment": { name: "Secret Compartment", desc: "A hidden panel behind the morgue drawer – inside, a body.", obtained: false } // final clue
            };

            // ---------- ITEM DATABASE (examinable, takable) ----------
            const itemsDB = {
                "bloody key": { 
                    name: "bloody key", 
                    description: "A tarnished key with reddish-brown stains. Could open something nearby.",
                    location: "COURTYARD",   // where it can be taken
                    takable: true,
                    clue: "bloody_key"       // when taken, also gives clue
                },
                "transfer document": {
                    name: "transfer document",
                    description: "Official transfer order for Patient 7, dated last Monday. But the signature looks wrong.",
                    location: "WARDEN'S OFFICE",
                    takable: true,
                    clue: "transfer_forgery"
                }
            };

            // ---------- NPC KNOWLEDGE & DECEPTION ----------
            const npcKnowledge = {
                "Patient 47": { 
                    clues: ["witness_account"], 
                    truthful: true, 
                    lieClue: null,
                    prompt: "You are delusional but you genuinely saw something. You speak in riddles but eventually reveal you saw Voss near the morgue."
                },
                "Briggs": { 
                    clues: ["orderly_bribe"], 
                    truthful: false,   // lies initially
                    lieClue: null,      // if lies, gives false clue? we'll handle by making him deny
                    prompt: "You were paid off. You lie to protect yourself, but if the player gains your trust (relationship > 3) you admit the truth."
                },
                "Nurse Miriam": { 
                    clues: ["nurse_suspicion"], 
                    truthful: true,
                    prompt: "You are cautious but honest. You share what you noticed only if the player seems trustworthy."
                },
                "Dr. Finch": { 
                    clues: ["doctors_fear"], 
                    truthful: true,
                    prompt: "You know the truth but are terrified. You hint indirectly unless the player gains your full trust."
                },
                "Chaplain": { 
                    clues: ["chaplain_confession"], 
                    truthful: true,
                    prompt: "You heard a confession through the door. You are hesitant to break the seal but may hint."
                },
                "Warden Voss": { 
                    clues: [], 
                    truthful: false,
                    prompt: "You are the killer. You lie and try to mislead the agent. You claim Patient 7 was transferred and act indignant."
                }
            };

            // ---------- LOCATIONS (extended with locked status & items) ----------
            const locations = [
                { name: "MAIN GATE", desc: "The iron gate creaks in the salt wind. A guard booth stands empty. Beyond, the asylum looms, grey and silent.", npcs: [], items: [] },
                { name: "ADMISSION WARD", desc: "Fluorescent buzz. Intake desk covered in papers. A nurse fills forms, glancing at you.", npcs: ["Nurse Miriam"], items: [] },
                { name: "CELL BLOCK A", desc: "Rows of heavy doors. A low moan echoes. Patient 47 (the Prophet) sits on his bunk, mumbling. Orderly Briggs leans against the wall.", npcs: ["Patient 47", "Briggs"], items: [] },
                { name: "CELL BLOCK B", desc: "Damp, cold. Patient 12 (Silent Sam) stares at nothing. In the far cell, Patient 88 (Rage) is restrained, but his eyes follow you.", npcs: ["Patient 12", "Patient 88"], items: [] },
                { name: "CAFETERIA", desc: "Long tables, smell of stale food. A few inmates eat in silence. Chaplain speaks softly with one of them.", npcs: ["Chaplain"], items: [] },
                { name: "INFIRMARY", desc: "Sterile, white tiles. Empty beds. A clipboard hangs at the foot of one.", npcs: [], items: [] },
                { name: "DOCTORS' OFFICE", desc: "Books, diplomas, a worn leather couch. Dr. Alistair Finch cleans his glasses, watching you.", npcs: ["Dr. Finch"], items: [] },
                { name: "WARDEN'S OFFICE", desc: "Heavy oak desk, filing cabinets. Warden Voss stands by the window, back turned.", npcs: ["Warden Voss"], items: ["transfer document"], locked: true, key: "bloody key" }, // requires key
                { name: "MORGUE", desc: "Cold, metallic. Two body drawers are closed. A faint chemical smell.", npcs: [], items: [], locked: true, key: "bloody key" }, // requires key
                { name: "COURTYARD", desc: "Surrounded by high walls, razor wire. A few patients shuffle in circles.", npcs: [], items: ["bloody key"] }
            ];

            // List of valid locations for AI to reference
            const validLocationsList = locations.map(l => l.name).join(', ');

            // ---------- GAME STATE ----------
            let gameState = {
                cluesFound: [],          // clue names obtained
                inventory: [],            // item names
                flags: {
                    morgueUnlocked: false,
                    wardenOfficeUnlocked: false,
                    accused: false
                },
                truth: TRUTH
            };

            // NPC data (from before) remains unchanged
            const npcData = {
                "Dr. Finch": { role: "chief psychiatrist", personality: "You are Dr. Alistair Finch, a brilliant but weary psychiatrist. You believe in therapy, but the isolation is wearing you down. You're reserved, precise, and watchful. You know more than you reveal.", relationship: 0, memory: [] },
                "Warden Voss": { role: "warden", personality: "You are Warden Voss, strict, authoritarian, efficient. You run the asylum with an iron fist. You distrust outsiders, especially FBI agents. You value order above all.", relationship: 0, memory: [] },
                "Nurse Miriam": { role: "head nurse", personality: "You are Nurse Miriam, pragmatic, overworked, but compassionate. You've seen horrors here but try to ease suffering. You're cautious with strangers, but you appreciate respect.", relationship: 0, memory: [] },
                "Patient 47": { role: "delusional inmate (the Prophet)", personality: "You are Patient 47, known as the Prophet. You speak in riddles, believe you see the future. You're harmless but unsettling. You whisper about 'the one who disappeared'.", relationship: 0, memory: [] },
                "Patient 12": { role: "catatonic inmate", personality: "You are Patient 12, Silent Sam. You rarely speak, but you notice everything. Sometimes you whisper a single phrase if you trust someone. You are terrified of something in this asylum.", relationship: 0, memory: [] },
                "Patient 88": { role: "violent inmate (Rage)", personality: "You are Patient 88, known as Rage. You're heavily sedated, but lucid at times. You hate the staff, but you might talk to another 'prisoner'. You growl more than speak.", relationship: 0, memory: [] },
                "Briggs": { role: "orderly", personality: "You are Briggs, an orderly who enjoys his power. You're brutish, cynical, but you sometimes slip information when you think it benefits you. You don't like the doctors.", relationship: 0, memory: [] },
                "Chaplain": { role: "priest", personality: "You are the Chaplain, a gentle man with a haunted look. You offer comfort, but you carry the weight of confessions. You believe the missing patient is still somewhere on the island.", relationship: 0, memory: [] }
            };

            // name matching helpers (unchanged)
            const npcNormalized = {};
            function normalizeWord(w) { return w.toLowerCase().replace(/[.,;:!?]/g, ''); }
            Object.keys(npcData).forEach(key => {
                const words = key.split(/\s+/).map(normalizeWord);
                npcNormalized[key] = { words: words, phrase: words.join(' ') };
            });

            function matchExactSequence(inputWords) {
                let bestKey = null, bestLen = 0;
                for (const key in npcNormalized) {
                    const nw = npcNormalized[key].words.length;
                    if (inputWords.length >= nw) {
                        const candidate = inputWords.slice(0, nw).map(normalizeWord).join(' ');
                        if (candidate === npcNormalized[key].phrase && nw > bestLen) {
                            bestLen = nw; bestKey = key;
                        }
                    }
                }
                return bestKey ? { key: bestKey, consumed: bestLen } : null;
            }
            function matchByFirstWord(inputWords) {
                if (!inputWords.length) return null;
                const firstNorm = normalizeWord(inputWords[0]);
                const matches = [];
                for (const key in npcNormalized) {
                    if (npcNormalized[key].words.some(w => w === firstNorm)) matches.push(key);
                }
                if (matches.length === 1) return { key: matches[0], consumed: 1 };
                else if (matches.length > 1) return { multiple: matches };
                return null;
            }

            // Helper: get NPCs present
            function getNPCsHere() {
                const loc = locations.find(l => l.name === currentLocation);
                if (!loc) return [];
                return loc.npcs.map(name => ({ name, ...npcData[name] })).filter(n => n.name);
            }

            // Update HUD
            function updateHUD() {
                locationSpan.textContent = `📍 ${currentLocation}`;
                const here = getNPCsHere();
                npcCountSpan.textContent = here.length;
                clueCountSpan.textContent = gameState.cluesFound.length;
                invCountSpan.textContent = gameState.inventory.length;
                const names = here.map(n => n.name).join(', ') || 'none';
                npcPresenceSpan.textContent = `[${currentLocation} · ${names}]`;
                // check if current conversation partner is still here
                if (currentConversation) {
                    const npcHere = here.some(n => n.name === currentConversation);
                    if (!npcHere) {
                        currentConversation = null;
                        hideConversation(); // hide panel if NPC left
                    }
                }
                conversationDisplay.textContent = currentConversation ? `💬 TALKING TO ${currentConversation}` : '';
            }

            // Append output (original)
            function appendOutput(text, isPlayer = false) {
                const p = document.createElement('p');
                p.textContent = isPlayer ? '> ' + text.toUpperCase() : text;
                outputDiv.appendChild(p);
                outputDiv.scrollTop = outputDiv.scrollHeight;
            }

            // Add clue
            function addClue(clueName) {
                if (!gameState.cluesFound.includes(clueName) && clueDB[clueName]) {
                    gameState.cluesFound.push(clueName);
                    clueDB[clueName].obtained = true;
                    appendOutput(`[NEW CLUE: ${clueDB[clueName].desc}]`);
                    updateHUD();
                }
            }

            // Take item
            function takeItem(itemName) {
                const loc = locations.find(l => l.name === currentLocation);
                if (!loc) return false;
                const itemKey = Object.keys(itemsDB).find(k => k.toLowerCase() === itemName.toLowerCase());
                if (!itemKey) { appendOutput("THERE'S NO SUCH ITEM HERE."); return false; }
                const item = itemsDB[itemKey];
                if (!loc.items.includes(itemKey)) { appendOutput("YOU DON'T SEE THAT HERE."); return false; }
                if (!item.takable) { appendOutput("YOU CAN'T TAKE THAT."); return false; }
                // add to inventory
                gameState.inventory.push(itemKey);
                // remove from location
                loc.items = loc.items.filter(i => i !== itemKey);
                appendOutput(`TAKEN: ${item.name}`);
                if (item.clue) addClue(item.clue);
                updateHUD();
                return true;
            }

            // Use item (unlock any location that requires this key)
            function useItem(itemName) {
                const itemKey = gameState.inventory.find(i => i.toLowerCase() === itemName.toLowerCase());
                if (!itemKey) { appendOutput("YOU DON'T HAVE THAT."); return; }
                const item = itemsDB[itemKey];
                // Find all locked locations that require this key
                const unlocked = [];
                locations.forEach(loc => {
                    if (loc.locked && loc.key === itemKey) {
                        loc.locked = false;
                        if (loc.name === "MORGUE") gameState.flags.morgueUnlocked = true;
                        if (loc.name === "WARDEN'S OFFICE") gameState.flags.wardenOfficeUnlocked = true;
                        unlocked.push(loc.name);
                    }
                });
                if (unlocked.length > 0) {
                    appendOutput(`YOU USE THE ${item.name}. UNLOCKED: ${unlocked.join(', ')}.`);
                } else {
                    appendOutput("YOU CAN'T USE THAT HERE.");
                }
            }

            // Show inventory
            function showInventory() {
                if (gameState.inventory.length === 0) appendOutput("YOU HAVE NO ITEMS.");
                else appendOutput("INVENTORY: " + gameState.inventory.map(i => itemsDB[i].name).join(', '));
            }

            // Show case file (clues)
            function showCaseFile() {
                appendOutput("=== CASE FILE ===");
                if (gameState.cluesFound.length === 0) appendOutput("No clues yet.");
                else {
                    gameState.cluesFound.forEach(c => appendOutput(`- ${clueDB[c].desc}`));
                }
                appendOutput(`Progress: ${gameState.cluesFound.length}/${TRUTH.requiredClues} clues needed to solve.`);
                appendOutput("Use ACCUSE [NAME] when ready.");
            }

            // Win condition
            function accuse(name) {
                if (gameState.flags.accused) { appendOutput("YOU'VE ALREADY MADE YOUR ACCUSATION."); return; }
                const lowerName = name.toLowerCase();
                // correct suspect: warden voss
                if (lowerName.includes("voss") || lowerName.includes("warden")) {
                    if (gameState.cluesFound.length >= TRUTH.requiredClues) {
                        appendOutput("=================================");
                        appendOutput("YOU ACCUSE WARDEN VOSS OF THE MURDER.");
                        appendOutput("Confronted with the evidence, he breaks down and confesses.");
                        appendOutput("The body is found in the secret compartment. Case solved.");
                        appendOutput("===== VICTORY =====");
                        gameState.flags.accused = true;
                    } else {
                        appendOutput("YOU DON'T HAVE ENOUGH EVIDENCE. VOSS LAUGHS AND THROWS YOU OUT.");
                        appendOutput("GAME OVER – INSUFFICIENT CLUES.");
                        gameState.flags.accused = true;
                    }
                } else {
                    appendOutput(`YOU ACCUSE ${name.toUpperCase()}, BUT YOU HAVE NO PROOF. THEY DENY EVERYTHING.`);
                    appendOutput("THE REAL KILLER REMAINS FREE. GAME OVER.");
                    gameState.flags.accused = true;
                }
            }

            // Reset
            function resetGame() {
                for (let key in npcData) {
                    npcData[key].relationship = 0;
                    npcData[key].memory = [];
                }
                // reset gameState
                gameState = {
                    cluesFound: [],
                    inventory: [],
                    flags: { morgueUnlocked: false, wardenOfficeUnlocked: false, accused: false },
                    truth: TRUTH
                };
                // reset clue obtained flags
                for (let c in clueDB) clueDB[c].obtained = false;
                // reset location items and locked status
                locations.find(l => l.name === "WARDEN'S OFFICE").locked = true;
                locations.find(l => l.name === "MORGUE").locked = true;
                locations.find(l => l.name === "COURTYARD").items = ["bloody key"];
                locations.find(l => l.name === "WARDEN'S OFFICE").items = ["transfer document"];
                currentLocation = "MAIN GATE";
                currentConversation = null;
                hideConversation(); // ensure output is visible
                startGame();
                aiStatus.textContent = '⚡ ASYLUM RESET... ⚡';
            }

            // Save/Load (extend to include gameState)
            function saveGame() {
                const state = {
                    npcData: npcData,
                    currentLocation: currentLocation,
                    currentConversation: currentConversation,
                    gameState: gameState,
                    clueDB: clueDB // save obtained status
                };
                const dataStr = JSON.stringify(state, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `asylum_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                aiStatus.textContent = '💾 CASE FILE SAVED';
                setTimeout(() => aiStatus.textContent = '⚡ ASYLUM BREATHES ... ⚡', 1500);
            }

            function loadGameFromFile(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const loaded = JSON.parse(e.target.result);
                        if (!loaded.npcData || !loaded.currentLocation || !loaded.gameState) throw new Error('Invalid save');
                        for (let key in npcData) {
                            if (loaded.npcData[key]) {
                                npcData[key].relationship = loaded.npcData[key].relationship || 0;
                                npcData[key].memory = loaded.npcData[key].memory || [];
                            }
                        }
                        Object.assign(gameState, loaded.gameState);
                        if (loaded.clueDB) {
                            for (let c in clueDB) {
                                if (loaded.clueDB[c]) clueDB[c].obtained = loaded.clueDB[c].obtained;
                            }
                        }
                        currentLocation = loaded.currentLocation;
                        currentConversation = loaded.currentConversation || null;

                        outputDiv.innerHTML = '';
                        appendOutput('--- CASE FILE LOADED ---');
                        const loc = locations.find(l => l.name === currentLocation);
                        if (loc) {
                            appendOutput(`YOU ARE AT ${currentLocation}.`);
                            appendOutput(loc.desc);
                            const here = getNPCsHere();
                            if (here.length) appendOutput(`HERE YOU SEE: ${here.map(n => n.name).join(', ')}.`);
                            if (loc.items && loc.items.length) appendOutput(`ITEMS HERE: ${loc.items.map(i => itemsDB[i].name).join(', ')}.`);
                        }
                        // restore conversation UI if needed
                        if (currentConversation) {
                            showConversation(currentConversation);
                        } else {
                            hideConversation();
                        }
                        updateHUD();
                        aiStatus.textContent = '📂 CASE LOADED';
                        inputField.disabled = false;
                        inputField.focus();
                        setTimeout(() => aiStatus.textContent = '⚡ ASYLUM BREATHES ... ⚡', 1500);
                    } catch (err) {
                        aiStatus.textContent = `❌ ERROR: ${err.message}`;
                        appendOutput(`[LOAD FAILED: ${err.message}]`);
                    }
                };
                reader.readAsText(file);
            }

            // ---------- Conversation UI functions (new) ----------
            function showConversation(npcName) {
                if (conversationPanel.style.display === 'flex') return; // already shown
                convNpcName.textContent = `TALKING TO ${npcName}`;
                convMessages.innerHTML = ''; // clear previous history
                outputDiv.style.display = 'none';
                conversationPanel.style.display = 'flex';
            }

            function hideConversation() {
                if (conversationPanel.style.display === 'none') return;
                outputDiv.style.display = 'block';
                conversationPanel.style.display = 'none';
            }

            function addConversationMessage(sender, senderName, text) {
                const row = document.createElement('div');
                row.className = `message-row ${sender}`;
                
                const iconDiv = document.createElement('div');
                iconDiv.className = 'message-icon';
                const icon = document.createElement('div');
                icon.className = 'icon';
                // simple icons: N for NPC, P for player
                icon.textContent = sender === 'npc' ? 'N' : 'P';
                const nameSpan = document.createElement('div');
                nameSpan.className = 'name';
                nameSpan.textContent = senderName;
                iconDiv.appendChild(icon);
                iconDiv.appendChild(nameSpan);
                
                const textDiv = document.createElement('div');
                textDiv.className = 'message-text';
                textDiv.textContent = text;
                
                row.appendChild(iconDiv);
                row.appendChild(textDiv);
                
                convMessages.appendChild(row);
                convMessages.scrollTop = convMessages.scrollHeight;
            }

            // --- AI call (modified to include truth & clues & location constraint) ---
            async function talkToNPC(npcName, playerMessage) {
                const npc = npcData[npcName];
                if (!npc) return;

                let recentMemory = npc.memory.slice(0, 5);
                let memoryText = recentMemory.length ? recentMemory.map(m => `- ${m}`).join('\n') : 'No specific memories yet.';

                // Get NPC knowledge & truth prompt
                const knowledge = npcKnowledge[npcName] || { clues: [], truthful: true, prompt: "" };
                const knownClues = knowledge.clues.filter(c => !gameState.cluesFound.includes(c)).join(', ') || 'nothing specific';
                const truthText = `THE TRUTH: ${TRUTH.summary}`;
                const npcDirective = knowledge.prompt || "You answer based on your personality.";
                const honesty = knowledge.truthful ? "You are generally truthful." : "You are deceptive and may lie to protect yourself.";

                // Important: list of valid locations to prevent AI from inventing new rooms
                const validLocations = validLocationsList;

                const prompt = `You are ${npcName}, the ${npc.role} in the isolated island asylum. Personality: ${npc.personality}
${truthText}
${honesty}
${npcDirective}
You know these pieces of evidence: ${knownClues}. If the player asks something relevant, you might reveal a clue. When you reveal a clue, include a line exactly in the format: ##CLUE## clue_name (where clue_name is one of: witness_account, orderly_bribe, nurse_suspicion, doctors_fear, chaplain_confession, bloody_key, transfer_forgery, secret_compartment). Only include a clue if it's something you would naturally share based on your personality and the player's message.

IMPORTANT: The only locations that exist in the asylum are: ${validLocations}. Do NOT invent or mention any other rooms. If you need to direct the player somewhere, use one of these existing locations.

Your relationship with the agent (scale -10 to +10): ${npc.relationship}. Memories: ${memoryText}

The player says: "${playerMessage}"

Respond in character (1-3 sentences). After your response, include the ##NPC_STATE## line as before, and optionally ##CLUE##.`;

                aiStatus.textContent = `⏳ ${npcName} is thinking ... ⏳`;
                inputField.disabled = true;

                try {
                    const response = await fetch('https://text.pollinations.ai/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: [{ role: 'user', content: prompt }],
                            model: 'openai',
                            seed: Math.floor(Math.random() * 1000000),
                            json: false
                        })
                    });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    let aiText = await response.text();

                    // Parse special lines
                    const lines = aiText.split('\n').filter(l => l.trim() !== '');
                    let npcResponse = aiText;
                    let stateLine = '', clueLine = '';

                    // Extract ##NPC_STATE## and ##CLUE##
                    for (let i = lines.length - 1; i >= 0; i--) {
                        if (lines[i].startsWith('##NPC_STATE##')) {
                            stateLine = lines.splice(i, 1)[0];
                        } else if (lines[i].startsWith('##CLUE##')) {
                            clueLine = lines.splice(i, 1)[0];
                        }
                    }
                    npcResponse = lines.join('\n');

                    // ***** FIX: remove duplicate output to main window during conversation *****
                    // NPC response is now added ONLY to the conversation panel, not to main output
                    addConversationMessage('npc', npcName, npcResponse);

                    // Process clue
                    if (clueLine) {
                        const parts = clueLine.split('##CLUE##')[1].trim().split(/\s+/);
                        const clueName = parts[0];
                        if (clueDB[clueName] && !gameState.cluesFound.includes(clueName)) {
                            addClue(clueName);
                        }
                    }

                    // Process relationship change (same as before)
                    if (stateLine) {
                        const parts = stateLine.split('|').map(s => s.trim());
                        if (parts.length >= 3 && parts[0] === '##NPC_STATE##' + npcName) {
                            const relChange = parseInt(parts[1]);
                            const memoryEntry = parts[2];
                            if (!isNaN(relChange)) {
                                npc.relationship = Math.min(10, Math.max(-10, npc.relationship + relChange));
                                if (memoryEntry !== 'None' && memoryEntry !== '') {
                                    npc.memory.unshift(memoryEntry);
                                    if (npc.memory.length > 8) npc.memory.pop();
                                }
                                appendOutput(`[${npcName} relationship now ${npc.relationship}]`);
                            }
                        }
                    }

                    // Gossip (unchanged)
                    const here = getNPCsHere().filter(n => n.name !== npcName);
                    if (here.length > 0 && Math.random() < 0.3) {
                        const gossipNPC = here[Math.floor(Math.random() * here.length)];
                        const gossipMsg = `(overheard: agent told ${npcName} "${playerMessage}")`;
                        gossipNPC.memory.unshift(gossipMsg);
                        if (gossipNPC.memory.length > 8) gossipNPC.memory.pop();
                        appendOutput(`[${gossipNPC.name} overheard the conversation...]`);
                    }

                    aiStatus.textContent = '⚡ ASYLUM BREATHES ... AWAITING COMMAND ⚡';
                    inputField.disabled = false;
                    inputField.focus();
                    updateHUD();

                } catch (err) {
                    console.error(err);
                    aiStatus.textContent = `❌ STATIC: ${err.message} ❌`;
                    appendOutput(`[SYSTEM ERROR: ${err.message}. TRY AGAIN.]`);
                    inputField.disabled = false;
                    inputField.focus();
                }
            }

            // Normalize location name (remove punctuation, extra spaces)
            function normalizeLocationName(name) {
                return name.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
            }

            // --- Movement (handle locked locations) ---
            function goTo(locName) {
                const normalizedInput = normalizeLocationName(locName);
                // try exact match (after normalization)
                let targetLoc = locations.find(l => normalizeLocationName(l.name) === normalizedInput);
                // if not, try if normalizedInput includes any location's normalized name
                if (!targetLoc) {
                    targetLoc = locations.find(l => normalizeLocationName(l.name).includes(normalizedInput) || normalizedInput.includes(normalizeLocationName(l.name)));
                }
                // last resort: try first word of location (normalized)
                if (!targetLoc) {
                    const firstWord = normalizedInput.split(' ')[0];
                    targetLoc = locations.find(l => normalizeLocationName(l.name).split(' ')[0] === firstWord);
                }

                if (!targetLoc) {
                    appendOutput(`YOU CAN'T GO TO "${locName}".`);
                    return;
                }
                if (targetLoc.locked) {
                    appendOutput(`${targetLoc.name} IS LOCKED. YOU NEED A KEY.`);
                    return;
                }
                currentLocation = targetLoc.name;
                currentConversation = null;
                hideConversation(); // leave conversation when moving
                appendOutput(`--- YOU WALK TO ${currentLocation} ---`);
                appendOutput(targetLoc.desc);
                const here = getNPCsHere();
                if (here.length) appendOutput(`HERE YOU SEE: ${here.map(n => n.name).join(', ')}.`);
                if (targetLoc.items && targetLoc.items.length) {
                    const itemNames = targetLoc.items.map(i => itemsDB[i].name).join(', ');
                    appendOutput(`YOU NOTICE: ${itemNames}.`);
                }
                updateHUD();
            }

            // --- Command parser (extended) ---
            let currentLocation = "MAIN GATE";
            let currentConversation = null;

            async function handleCommand(cmd) {
                cmd = cmd.trim();
                if (cmd === '') return;
                appendOutput(cmd, true);
                const lower = cmd.toLowerCase();

                // special commands
                if (lower === 'help' || lower === '?') {
                    appendOutput('COMMANDS: TALK TO [NAME], GO TO [PLACE], LOOK, TAKE [ITEM], USE [ITEM], INVENTORY, CASE, ACCUSE [NAME], RESET.');
                    aiStatus.textContent = '⚡ ... ⚡';
                    inputField.focus();
                    return;
                }
                if (lower === 'look' || lower === 'look around') {
                    const loc = locations.find(l => l.name === currentLocation);
                    appendOutput(loc.desc);
                    const here = getNPCsHere();
                    if (here.length) appendOutput(`YOU SEE: ${here.map(n => n.name).join(', ')}.`);
                    if (loc.items && loc.items.length) {
                        const itemNames = loc.items.map(i => itemsDB[i].name).join(', ');
                        appendOutput(`ITEMS HERE: ${itemNames}.`);
                    }
                    inputField.focus();
                    return;
                }
                if (lower === 'inventory' || lower === 'i') {
                    showInventory();
                    inputField.focus();
                    return;
                }
                if (lower === 'case' || lower === 'notes') {
                    showCaseFile();
                    inputField.focus();
                    return;
                }
                if (lower.startsWith('take ')) {
                    const item = cmd.substring(5).trim();
                    takeItem(item);
                    inputField.focus();
                    return;
                }
                if (lower.startsWith('use ')) {
                    const item = cmd.substring(4).trim();
                    useItem(item);
                    inputField.focus();
                    return;
                }
                if (lower.startsWith('accuse ')) {
                    const name = cmd.substring(7).trim();
                    accuse(name);
                    inputField.focus();
                    return;
                }
                if (lower.startsWith('go to ') || lower.startsWith('goto ')) {
                    const target = cmd.substring(lower.startsWith('go to') ? 5 : 4).trim();
                    goTo(target);
                    inputField.focus();
                    return;
                }

                // conversation handling
                if (currentConversation) {
                    const here = getNPCsHere().map(n => n.name);
                    if (!here.includes(currentConversation)) {
                        appendOutput(`${currentConversation} IS NO LONGER HERE. CONVERSATION ENDED.`);
                        currentConversation = null;
                        hideConversation();
                        updateHUD();
                        handleCommand(cmd);
                        return;
                    }
                    // player message: add to conversation panel, then call AI
                    addConversationMessage('player', 'AGENT', cmd);
                    await talkToNPC(currentConversation, cmd);
                    inputField.focus();
                    return;
                }

                // TALK TO parsing
                if (lower.startsWith('talk to ')) {
                    const rest = cmd.substring(8).trim();
                    const words = rest.split(/\s+/);
                    let match = matchExactSequence(words);
                    if (!match) match = matchByFirstWord(words);
                    if (match && match.key) {
                        const npcKey = match.key;
                        const consumed = match.consumed;
                        const messageWords = words.slice(consumed);
                        const message = messageWords.join(' ');
                        const hereNames = getNPCsHere().map(n => n.name);
                        if (!hereNames.includes(npcKey)) {
                            appendOutput(`${npcKey} IS NOT HERE.`);
                            inputField.focus();
                            return;
                        }
                        // start conversation if not already
                        if (currentConversation !== npcKey) {
                            showConversation(npcKey);
                            currentConversation = npcKey;
                        }
                        if (message === '') {
                            appendOutput(`[YOU ARE NOW TALKING TO ${npcKey}. SAY SOMETHING.]`);
                        } else {
                            addConversationMessage('player', 'AGENT', message);
                            await talkToNPC(npcKey, message);
                        }
                        inputField.focus();
                        return;
                    } else if (match && match.multiple) {
                        appendOutput(`MULTIPLE NPCs MATCH: ${match.multiple.join(', ')}. USE FULL NAME.`);
                        inputField.focus();
                        return;
                    } else {
                        appendOutput(`I DON'T KNOW ANY NPC MATCHING "${rest}".`);
                        inputField.focus();
                        return;
                    }
                }

                // shortcut: first word as NPC name
                const words = cmd.split(/\s+/);
                const partial = matchByFirstWord(words);
                if (partial && partial.key) {
                    const npcKey = partial.key;
                    const consumed = partial.consumed;
                    const messageWords = words.slice(consumed);
                    const message = messageWords.join(' ');
                    const hereNames = getNPCsHere().map(n => n.name);
                    if (!hereNames.includes(npcKey)) {
                        appendOutput(`${npcKey} IS NOT HERE.`);
                        inputField.focus();
                        return;
                    }
                    // start conversation
                    if (currentConversation !== npcKey) {
                        showConversation(npcKey);
                        currentConversation = npcKey;
                    }
                    addConversationMessage('player', 'AGENT', message || '...');
                    await talkToNPC(npcKey, message || '...');
                    inputField.focus();
                    return;
                } else if (partial && partial.multiple) {
                    appendOutput(`MULTIPLE NPCs MATCH "${words[0]}". USE 'TALK TO' WITH FULL NAME.`);
                    inputField.focus();
                    return;
                }

                // try location (with normalization)
                const normalizedInput = normalizeLocationName(lower);
                let possibleLoc = locations.find(l => normalizeLocationName(l.name) === normalizedInput);
                if (!possibleLoc) {
                    possibleLoc = locations.find(l => normalizeLocationName(l.name).includes(normalizedInput) || normalizedInput.includes(normalizeLocationName(l.name)));
                }
                if (!possibleLoc) {
                    const firstWord = normalizedInput.split(' ')[0];
                    possibleLoc = locations.find(l => normalizeLocationName(l.name).split(' ')[0] === firstWord);
                }
                if (possibleLoc && normalizedInput.length > 1) {
                    goTo(possibleLoc.name);
                    inputField.focus();
                    return;
                }

                appendOutput('I DON\'T UNDERSTAND. TRY: TALK TO [NAME], GO TO [PLACE], LOOK, TAKE, USE, INVENTORY, CASE, ACCUSE.');
                inputField.focus();
            }

            function startGame() {
                outputDiv.innerHTML = '';
                appendOutput('ASYLUM OF THE DAMNED  ·  NIGHTFALL GAMES 1982');
                appendOutput('YOU ARE SPECIAL AGENT DALE COOPER, FBI. A PATIENT HAS VANISHED FROM THIS MAXIMUM-SECURITY ASYLUM ON A REMOTE ISLAND.');
                appendOutput('THE YEAR IS 1982. THE ISLAND CUT OFF BY THE OCTOBER STORM. NO BOAT UNTIL MONDAY.');
                appendOutput('---');
                appendOutput('AT THE MAIN GATE. A HEAVY CHAIN AND PADLOCK. THROUGH THE BARS YOU SEE THE COURTYARD.');
                appendOutput('COMMANDS: TALK TO [NAME], GO TO [PLACE], LOOK, TAKE, USE, INVENTORY, CASE, ACCUSE. NAMES: Dr. Finch, Warden Voss, Nurse Miriam, Patient 47, Patient 12, Patient 88, Briggs, Chaplain.');
                updateHUD();
            }

            // Event listeners
            inputField.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (inputField.disabled) return;
                    const cmd = inputField.value;
                    inputField.value = '';
                    handleCommand(cmd);
                }
            });

            resetBtn.addEventListener('click', resetGame);
            saveBtn.addEventListener('click', saveGame);
            loadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) loadGameFromFile(e.target.files[0]);
                fileInput.value = '';
            });

            // close conversation button
            closeConvBtn.addEventListener('click', () => {
                currentConversation = null;
                hideConversation();
                inputField.focus();
                updateHUD();
            });

            // initial reset (ensures items reset)
            resetGame();
        })();
    </script>
</body>
</html>
