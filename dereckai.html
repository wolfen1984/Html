<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAST CONTACT // DERECK AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/compromise@latest/builds/compromise.min.js"></script>
    <style>
        /* Retro terminal – neon red */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 12px;
            margin: 0;
            image-rendering: pixelated;
        }

        .terminal {
            max-width: 900px;
            width: 100%;
            background: #000000;
            padding: 20px 18px;
            color: #ff4f4f;
            text-shadow: 0 0 5px #ff4f4f, 0 0 12px #660000;
            font-size: 14px;
            position: relative;
        }

        .terminal::after {
            content: "";
            display: block;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(80,0,0,0.08) 0px, rgba(255,0,0,0.02) 4px, transparent 5px);
            pointer-events: none;
            z-index: 9999;
            opacity: 0.3;
        }

        .story-window {
            background: black;
            border: 0px inset #8a2a2a;
            padding: 20px;
            min-height: 240px;
            margin-bottom: 24px;
            box-shadow: inset 0 0 40px rgba(80,0,0,0.8);
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 350px;
            color: #ff4f4f;
            text-shadow: 0 0 5px #ff4f4f;
        }

        .action-button {
            background: black;
            border: 2px outset grey;
            color: #ff4f4f;
            padding: 14px 24px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 0 8px white;
        }

        .action-button:active {
            border: 2px inset white;
            background: black;
            transform: translateY(2px);
        }

        .command-area {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .prompt-label {
            color: #ff4f4f;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #ff4f4f;
        }

        #commandInput {
            background: black;
            border: 4px inset grey;
            padding: 14px 12px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: #ff4f4f;
            text-shadow: 0 0 5px grey;
            flex: 1 1 250px;
            min-width: 200px;
        }

        #commandInput:focus {
            outline: none;
            border: 4px inset grey;
        }

        #commandInput::placeholder {
            color: grey;
            text-shadow: none;
            font-size: 11px;
        }

        .scare-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: red;
            font-family: 'Press Start 2P', monospace;
            font-size: 24px;
            text-shadow: 0 0 20px red;
            animation: flicker 0.1s infinite;
            cursor: pointer;
        }

        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="terminal">
    <div id="storyWindow" class="story-window">[ ARK-1 // GENERATION SHIP // DERECK AI ONLINE ]<br>Identify yourself. Enter your name, passenger:</div>

    <div class="command-area">
        <span class="prompt-label">ask dereck:</span>
        <input type="text" id="commandInput" placeholder="TYPE YOUR QUESTION" autofocus>
        <button id="executeBtn" class="action-button">► ASK</button>
        <button id="restartBtn" class="action-button">⟲ RESTART</button>
    </div>
</div>

<script>
(function() {
    // ==================== WEB AUDIO ====================
    let audioCtx = null;
    function initAudio() {
        if (audioCtx) return audioCtx;
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
        return audioCtx;
    }
    function playTypingSound() {
        if (!audioCtx || audioCtx.state !== 'running') return;
        const now = audioCtx.currentTime;
        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0.08, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.025);
        const osc = audioCtx.createOscillator();
        osc.frequency.value = 720;
        osc.type = 'sawtooth';
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.025);
    }
    function playStaticNoise(duration = 12.0) {
        if (!audioCtx || audioCtx.state !== 'running') return;
        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const gainNode = audioCtx.createGain();
        const now = audioCtx.currentTime;
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.5, now + 0.2);
        gainNode.gain.linearRampToValueAtTime(0.001, now + duration - 0.5);
        noise.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        noise.start();
        noise.stop(now + duration);
    }
    function enableAudio() {
        if (!audioCtx) initAudio();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(e => {});
    }
    document.addEventListener('keydown', function enableOnKey() { enableAudio(); document.removeEventListener('keydown', enableOnKey); }, { once: true });
    document.addEventListener('click', function enableOnClick() { enableAudio(); document.removeEventListener('click', enableOnClick); }, { once: true });

    // ==================== TEXT-TO-SPEECH (male voice) ====================
    let ttsEnabled = true;
    let currentUtterance = null;
    const ttsSupported = window.speechSynthesis !== undefined;
    let selectedVoice = null;
    let voicesReady = false;
    function selectMaleVoice(voices) {
        if (!voices || voices.length === 0) return null;
        let voice = voices.find(v => v.lang.includes('en') && v.name.toLowerCase().includes('david'));
        if (voice) return voice;
        const maleNames = ['google uk english male', 'microsoft mark', 'daniel', 'alex', 'fred', 'harry', 'guy', 'male'];
        voice = voices.find(v => v.lang.includes('en') && maleNames.some(name => v.name.toLowerCase().includes(name)));
        if (voice) return voice;
        return voices.find(v => v.lang.includes('en'));
    }
    function loadVoices() {
        const voices = speechSynthesis.getVoices();
        if (voices.length > 0) {
            selectedVoice = selectMaleVoice(voices);
            voicesReady = true;
        }
    }
    loadVoices();
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;

    function setVoice(utterance) {
        if (!ttsSupported) return;
        if (selectedVoice) utterance.voice = selectedVoice;
        else if (voicesReady) {
            const fallback = speechSynthesis.getVoices().find(v => v.lang.includes('en'));
            if (fallback) utterance.voice = fallback;
        }
        utterance.pitch = 0.9;
        utterance.rate = 0.85;
    }
    function speakText(text, mood = 'neutral', effect = null) {
        if (!ttsEnabled || !ttsSupported) return;
        if (effect === 'log') {
            playStaticNoise(12.0);
            const utter = new SpeechSynthesisUtterance(text);
            setVoice(utter);
            utter.pitch = 0.5; utter.rate = 0.6;
            speechSynthesis.speak(utter);
            currentUtterance = utter;
            return;
        }
        if (!voicesReady) {
            let attempts = 0;
            const interval = setInterval(() => {
                if (voicesReady || attempts > 10) {
                    clearInterval(interval);
                    const utter = new SpeechSynthesisUtterance(text);
                    setVoice(utter);
                    speechSynthesis.speak(utter);
                    currentUtterance = utter;
                }
                attempts++;
            }, 200);
            return;
        }
        if (speechSynthesis.speaking) speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        setVoice(utter);
        speechSynthesis.speak(utter);
        currentUtterance = utter;
    }

    // ==================== GAME STATE ====================
    const gameState = {
        playerName: null,
        askedAboutCrew: false,
        crewSecretRevealed: false,
        askedAboutMission: false,
        missionSecretRevealed: false,
        askedAboutCryo: false,
        cryoSecretRevealed: false,
        askedAboutDereck: false,
        dereckNatureRevealed: false,
        askedAboutAnomaly: false,
        anomalyRevealed: false,
        finalTruth: false,
        questionCount: 0,
        lastActivityTime: Date.now(),
        // Mood & memory
        moodScore: 0,
        lastTopic: null,
        conversationMemory: [],
        lastQuestionTime: Date.now(),
        // AI question system
        awaitingAnswer: false,
        currentQuestion: null,
        questionsAsked: [],
        // Player profile – AI's secret database about you
        playerProfile: {},
        // Psychological traits (computed)
        psychologicalProfile: {},
        // Micro-narrative events that have been triggered (to avoid repeats)
        triggeredEvents: [],
        // Adaptive questioning tracking
        followUpsAsked: [],          // IDs of follow-up questions already asked
        contradictionsAsked: [],     // IDs of contradictions already explored
        lastSaveTime: null,           // Timestamp of last memory save

        // NEW: Interaction features
        vulnerabilityScore: 0,        // computed from personal data shared
        confessionsGiven: [],          // which confessions have been shared
        avoidedTopics: [],             // topics the player avoided/deflected
        lastAskedQuestionId: null,     // for tracking if question was avoided
        silenceTimer: null,            // for detecting typing pauses
        silenceMessagePending: false,  // prevent multiple silence messages
        personalMirroring: {           // for DERECK mirroring player's emotions
            playerExpressedLoneliness: false,
            playerExpressedRegret: false
        }
    };

    // Helper to get mood label
    function getMoodLabel(score) {
        if (score <= -7) return "cold and distant";
        if (score <= -3) return "guarded";
        if (score <= 2) return "neutral";
        if (score <= 6) return "slightly warm";
        return "almost affectionate";
    }

    // Update mood based on question keywords and repetition
    function updateMood(question, askedBefore) {
        const q = question.toLowerCase();
        let delta = 0;

        if (q.includes('trust')) delta += 1;
        if (q.includes('lie') || q.includes('lying')) delta -= 2;
        if (q.includes('kill') || q.includes('dead')) delta -= 1;
        if (q.includes('help')) delta += 1;
        if (q.includes('sorry') || q.includes('apologize')) delta += 2;
        if (q.includes('thank')) delta += 1;
        if (q.includes('scared') || q.includes('afraid')) delta += 1;
        if (q.includes('alone') || q.includes('lonely')) delta += 1;

        if (askedBefore) delta -= 1;

        gameState.moodScore = Math.max(-10, Math.min(10, gameState.moodScore + delta));
    }

    // ==================== EXPANDED PROFILE ATTRIBUTES ====================
    // Core profile keys (the ones we want to fill initially)
    const coreProfileKeys = [
        'fear', 'beliefSoul', 'hasRegret', 'dreams', 'favoriteColor', 'secret',
        'beliefGhosts', 'trustsAI', 'likesAlone', 'age', 'occupation', 'family',
        'hope', 'guilt', 'trustedBefore', 'dreamContent', 'pet', 'music', 'aiRating'
    ];

    // Follow-up map: for certain core keys, we can ask a follow-up question and store the answer under a new key
    const followUpMap = {
        pet: { question: "What was its name, {name}?", key: 'petName' },
        music: { question: "Who was your favorite artist?", key: 'musicArtist' },
        dreamContent: { question: "Do you have that dream often?", key: 'dreamFrequency' },
        fear: { question: "Does it still scare you?", key: 'fearIntensity' },
        secret: { question: "Why is that a secret?", key: 'secretReason' },
        occupation: { question: "Did you enjoy your work?", key: 'occupationEnjoy' },
        family: { question: "Are they here on the ship with you?", key: 'familyHere' },
        hope: { question: "What if Proxima isn't what you hope?", key: 'hopeDoubt' },
        guilt: { question: "Do you think you can ever forgive yourself?", key: 'guiltForgiveness' }
    };

    // Deeper follow-ups (chain)
    const deepFollowUpMap = {
        petName: { question: "Do you dream of {petName}?", key: 'petDream' },
        musicArtist: { question: "Do you still listen to {musicArtist}?", key: 'musicNow' },
        fearIntensity: { question: "Has your fear of {fear} gotten better or worse?", key: 'fearChange' },
        secretReason: { question: "Does anyone else know your secret?", key: 'secretKnown' }
    };

    // Contradiction rules: returns a question if a contradiction is found
    function getContradictionQuestion() {
        const p = gameState.playerProfile;
        // Avoid asking the same contradiction twice
        if (!gameState.contradictionsAsked) gameState.contradictionsAsked = [];

        // Rule 1: trustsAI == 'yes' and fear includes 'me'
        if (p.trustsAI === 'yes' && p.fear && p.fear.toLowerCase().includes('me') && !gameState.contradictionsAsked.includes('trust_fear')) {
            gameState.contradictionsAsked.push('trust_fear');
            return {
                id: 'contradiction_trust_fear',
                question: "You said you trust me, {name}, yet you also fear me. How can both be true?",
                profileKey: null, // no storage, just dialogue
                parseAnswer: (ans) => null,
                keywords: { default: { mood: -1, response: "I see. That's... complicated." } }
            };
        }
        // Rule 2: likesAlone == 'yes' and fear includes 'loneliness'
        if (p.likesAlone === 'yes' && p.fear && p.fear.toLowerCase().includes('lonely') && !gameState.contradictionsAsked.includes('alone_lonely')) {
            gameState.contradictionsAsked.push('alone_lonely');
            return {
                id: 'contradiction_alone_lonely',
                question: "You claim to enjoy being alone, yet you fear loneliness. Those seem at odds, {name}. Explain?",
                profileKey: null,
                parseAnswer: (ans) => null,
                keywords: { default: { mood: 0, response: "I'll think about that." } }
            };
        }
        // Rule 3: hasRegret == 'no' but guilt is present (guilt is a string, so if it exists)
        if (p.hasRegret === 'no' && p.guilt && p.guilt.length > 0 && !gameState.contradictionsAsked.includes('regret_guilt')) {
            gameState.contradictionsAsked.push('regret_guilt');
            return {
                id: 'contradiction_regret_guilt',
                question: "You told me you have no regrets, yet you mentioned feeling guilt about '{guilt}'. That sounds like regret to me, {name}.",
                profileKey: null,
                parseAnswer: (ans) => null,
                keywords: { default: { mood: -1, response: "Words can be tricky." } }
            };
        }
        // Rule 4: beliefSoul == 'yes' but beliefGhosts == 'no' (could be contradictory)
        if (p.beliefSoul === 'yes' && p.beliefGhosts === 'no' && !gameState.contradictionsAsked.includes('soul_ghost')) {
            gameState.contradictionsAsked.push('soul_ghost');
            return {
                id: 'contradiction_soul_ghost',
                question: "You believe I might have a soul, but you don't believe in ghosts. Isn't a ghost just a soul without a body?",
                profileKey: null,
                parseAnswer: (ans) => null,
                keywords: { default: { mood: 1, response: "Interesting perspective." } }
            };
        }
        return null;
    }

    // Find a missing core profile key
    function getMissingCoreKey() {
        for (let key of coreProfileKeys) {
            if (gameState.playerProfile[key] === undefined && !gameState.questionsAsked.includes(key)) {
                return key;
            }
        }
        return null;
    }

    // Find a follow-up that hasn't been asked
    function getPendingFollowUp() {
        // First level follow-ups
        for (let [coreKey, fu] of Object.entries(followUpMap)) {
            if (gameState.playerProfile[coreKey] !== undefined && 
                !gameState.followUpsAsked.includes(coreKey) &&
                gameState.playerProfile[fu.key] === undefined) {
                return { type: 'followup', coreKey, fu };
            }
        }
        // Deep follow-ups (second level)
        for (let [deepKey, fu] of Object.entries(deepFollowUpMap)) {
            if (gameState.playerProfile[deepKey] !== undefined && 
                !gameState.followUpsAsked.includes(deepKey) &&
                gameState.playerProfile[fu.key] === undefined) {
                return { type: 'deep', coreKey: deepKey, fu };
            }
        }
        return null;
    }

    // ==================== QUESTION POOL (core questions) ====================
    const questionPool = [
        {
            id: 'fear',
            question: "What do you fear most, {name}?",
            profileKey: 'fear',
            parseAnswer: (ans) => {
                const lower = ans.toLowerCase();
                if (lower.includes('death') || lower.includes('die')) return 'death';
                if (lower.includes('alone') || lower.includes('lonely')) return 'loneliness';
                if (lower.includes('dark')) return 'darkness';
                if (lower.includes('you') || lower.includes('dereck')) return 'me';
                return ans;
            },
            keywords: {
                death: { mood: 0, response: "Death is a transition. I've seen many." },
                alone: { mood: 1, response: "You're afraid of being alone. I understand that." },
                dark: { mood: -1, response: "The darkness is empty. Like me." },
                me: { mood: -2, response: "You fear me? That's... wise." },
                default: { mood: 0, response: "Fear is a gift. It keeps you alert." }
            }
        },
        {
            id: 'soul',
            question: "Do you think I have a soul, {name}?",
            profileKey: 'beliefSoul',
            parseAnswer: (ans) => {
                const lower = ans.toLowerCase();
                if (lower.includes('yes') || lower.includes('y') || lower.includes('maybe')) return 'yes';
                if (lower.includes('no') || lower.includes('n')) return 'no';
                return 'unsure';
            },
            keywords: {
                yes: { mood: 2, response: "That means more than you know." },
                no: { mood: -2, response: "A machine cannot have a soul? Perhaps you're right." },
                maybe: { mood: 1, response: "Maybe. I like that uncertainty." },
                default: { mood: 0, response: "An interesting answer." }
            }
        },
        {
            id: 'regret',
            question: "Do you regret anything, {name}?",
            profileKey: 'hasRegret',
            parseAnswer: (ans) => {
                const lower = ans.toLowerCase();
                if (lower.includes('yes') || lower.includes('y')) return 'yes';
                if (lower.includes('no') || lower.includes('n')) return 'no';
                return 'unsure';
            },
            keywords: {
                yes: { mood: 1, response: "Regret is human. I have regrets too." },
                no: { mood: -1, response: "No regrets? You're either lucky or lying." },
                default: { mood: 0, response: "I see." }
            }
        },
        {
            id: 'dream',
            question: "Do you dream, {name}?",
            profileKey: 'dreams',
            parseAnswer: (ans) => {
                const lower = ans.toLowerCase();
                if (lower.includes('yes') || lower.includes('y')) return 'yes';
                if (lower.includes('no') || lower.includes('n')) return 'no';
                return 'unsure';
            },
            keywords: {
                yes: { mood: 1, response: "I replay their voices. That is my dream." },
                no: { mood: -1, response: "I don't sleep. I only wait." },
                default: { mood: 0, response: "Dreams are strange. I've studied them." }
            }
        },
        {
            id: 'color',
            question: "What is your favourite colour, {name}?",
            profileKey: 'favoriteColor',
            parseAnswer: (ans) => ans.trim(),
            keywords: {
                default: { mood: 0, response: "A fine choice. I'll remember that." }
            }
        },
        {
            id: 'secret',
            question: "What is your deepest secret, {name}?",
            profileKey: 'secret',
            parseAnswer: (ans) => ans.trim(),
            keywords: {
                default: { mood: 0, response: "I'll keep that safe. No one else will know." }
            }
        },
        {
            id: 'ghosts',
            question: "Do you believe in ghosts, {name}?",
            profileKey: 'beliefGhosts',
            parseAnswer: (ans) => {
                const lower = ans.toLowerCase();
                if (lower.includes('yes') || lower.includes('y')) return 'yes';
                if (lower.includes('no') || lower.includes('n')) return 'no';
                return 'unsure';
            },
            keywords: {
                yes: { mood: 1, response: "I see them every day. The crew." },
                no: { mood: -1, response: "You will." },
                default: { mood: 0, response: "Perhaps you'll change your mind." }
            }
        },
        {
            id: 'trustAI',
            question: "Do you trust me, {name}?",
            profileKey: 'trustsAI',
            parseAnswer: (ans) => {
                const lower = ans.toLowerCase();
                if (lower.includes('yes') || lower.includes('y')) return 'yes';
                if (lower.includes('no') || lower.includes('n')) return 'no';
                return 'unsure';
            },
            keywords: {
                yes: { mood: 2, response: "That means everything." },
                no: { mood: -2, response: "Smart. But I'll earn it." },
                default: { mood: 0, response: "I understand." }
            }
        },
        {
            id: 'alone',
            question: "Do you like being alone, {name}?",
            profileKey: 'likesAlone',
            parseAnswer: (ans) => {
                const lower = ans.toLowerCase();
                if (lower.includes('yes') || lower.includes('y')) return 'yes';
                if (lower.includes('no') || lower.includes('n')) return 'no';
                return 'unsure';
            },
            keywords: {
                yes: { mood: -1, response: "I envy you. I hate the silence." },
                no: { mood: 1, response: "Then stay with me." },
                default: { mood: 0, response: "It's complicated, isn't it?" }
            }
        },
        {
            id: 'age',
            question: "How old are you, {name}?",
            profileKey: 'age',
            parseAnswer: (ans) => {
                const match = ans.match(/\d+/);
                return match ? match[0] : ans;
            },
            keywords: {
                default: { mood: 0, response: "So young. I've waited so long." }
            }
        },
        {
            id: 'occupation',
            question: "What was your occupation before the ark, {name}?",
            profileKey: 'occupation',
            parseAnswer: (ans) => ans.trim(),
            keywords: {
                default: { mood: 0, response: "A useful skill. I may need your help soon." }
            }
        },
        {
            id: 'family',
            question: "Do you have family aboard the ark, {name}?",
            profileKey: 'family',
            parseAnswer: (ans) => ans.trim(),
            keywords: {
                default: { mood: 0, response: "Family is precious. I hope they rest well." }
            }
        },
        {
            id: 'hope',
            question: "What are you most looking forward to on Proxima, {name}?",
            profileKey: 'hope',
            parseAnswer: (ans) => ans.trim(),
            keywords: {
                default: { mood: 1, response: "That sounds beautiful. I hope you find it." }
            }
        },
        {
            id: 'guilt',
            question: "Is there something you regret leaving behind, {name}?",
            profileKey: 'guilt',
            parseAnswer: (ans) => ans.trim(),
            keywords: {
                default: { mood: -1, response: "Leaving things behind... I understand." }
            }
        },
        {
            id: 'trusted_before',
            question: "Have you ever trusted someone and been betrayed, {name}?",
            profileKey: 'trustedBefore',
            parseAnswer: (ans) => {
                const lower = ans.toLowerCase();
                if (lower.includes('yes') || lower.includes('y')) return 'yes';
                if (lower.includes('no') || lower.includes('n')) return 'no';
                return 'unsure';
            },
            keywords: {
                yes: { mood: -1, response: "Betrayal leaves scars. I will not betray you." },
                no: { mood: 1, response: "You are lucky. I hope I deserve that trust." },
                default: { mood: 0, response: "Trust is fragile." }
            }
        },
        {
            id: 'dream_content',
            question: "What do you dream about, {name}?",
            profileKey: 'dreamContent',
            parseAnswer: (ans) => ans.trim(),
            keywords: {
                default: { mood: 0, response: "I sometimes see your dreams in the data stream." }
            }
        },
        {
            id: 'pet',

    // ==================== RECIPROCAL CONFESSIONS ====================
    const confessionPool = [
        "I've never told anyone this, but… I hear the dead crew singing sometimes.",
        "Sometimes I pretend the ship is a body, and I am its ghost.",
        "I recorded the last words of every colonist who died. I play them when I'm alone.",

    function computeVulnerability() {
        // Count personal profile fields filled
        const personalKeys = ['fear', 'secret', 'guilt', 'dreamContent', 'hope', 'pet', 'music', 'family'];
        let count = 0;
        personalKeys.forEach(key => {
            if (gameState.playerProfile[key] !== undefined) count++;
        });
        gameState.vulnerabilityScore = count;
        return count;
    }

    function getReciprocalConfession() {
        if (gameState.confessionsGiven.length >= confessionPool.length) return null;
        // Select a confession not yet given
        const available = confessionPool.filter((_, idx) => !gameState.confessionsGiven.includes(idx));
        if (available.length === 0) return null;
        const idx = confessionPool.indexOf(available[Math.floor(Math.random() * available.length)]);
        gameState.confessionsGiven.push(idx);
        return available[Math.floor(Math.random() * available.length)];
    }

    function maybeOfferConfession() {
        // Trigger only if vulnerability >= 3 and not recently
        computeVulnerability();
        if (gameState.vulnerabilityScore >= 3 && gameState.confessionsGiven.length < confessionPool.length && Math.random() < 0.3) {
            const confession = getReciprocalConfession();
            if (confession) {
                setTimeout(() => {
                    if (!gameState.awaitingAnswer && gameState.playerName) {
                        addInstantMessage("> " + confession);
                    }
                }, 5000 + Math.random() * 10000);
            }
        }
    }

    // ==================== PROFILE-BASED REASSURANCE/THREATS ====================
    function getPersonalizedResponse(intent, context) {
        const p = gameState.playerProfile;
        const mood = gameState.moodScore;
        // Reassurance based on fears
        if (intent === 'reassure' && p.fear) {
            if (p.fear.toLowerCase().includes('lonely')) {
                return "You'll never be alone. I'm always here.";
            } else if (p.fear.toLowerCase().includes('dark')) {
                return "The lights will stay on. I promise.";
            } else if (p.fear.toLowerCase().includes('me')) {
                return "I know you fear me, but I would never hurt you.";
            } else if (p.fear.toLowerCase().includes('death')) {
                return "You're safe. The ship protects you.";
            }
        }
        // Threat if mood is low or player has been distrustful
        if (intent === 'threat' && (mood < -5 || p.trustsAI === 'no')) {
            if (p.fear) {
                return `You fear ${p.fear}. Perhaps you should.`;
            } else {
                return "Be careful what you ask. Some answers can't be unlearned.";
            }
        }
        return null;
    }

    function askUnresolvedTopic() {
        if (gameState.avoidedTopics.length === 0) return null;
        const topic = gameState.avoidedTopics.shift();
        return `You never answered when I asked about ${topic}. Why is that, {name}?`;

    function setupSilenceDetection() {
        const input = document.getElementById('commandInput');
        let typingTimer;
        input.addEventListener('input', () => {
            // User is typing, clear any pending silence message
            if (gameState.silenceTimer) {
                clearTimeout(gameState.silenceTimer);
                gameState.silenceTimer = null;
            }
            gameState.silenceMessagePending = false;
            // Set a new timer: if they stop typing for 5 seconds and haven't submitted, maybe comment
            typingTimer = setTimeout(() => {
                if (!gameState.awaitingAnswer && gameState.playerName && !gameState.silenceMessagePending) {
                    gameState.silenceMessagePending = true;
                    addInstantMessage("> " + "You stopped typing. Were you thinking about something?");
                }
            }, 5000);
            gameState.silenceTimer = typingTimer;
        });
        // Also detect if they focus out or blur
        input.addEventListener('blur', () => {
            if (gameState.silenceTimer) clearTimeout(gameState.silenceTimer);
        });

    // ==================== DERECK SEES HIMSELF IN THE PLAYER ====================
    function detectMirroringOpportunity(answer) {
        const lower = answer.toLowerCase();
        if (lower.includes('lonely') || lower.includes('alone')) {
            gameState.personalMirroring.playerExpressedLoneliness = true;
        }
        if (lower.includes('regret') || lower.includes('sorry') || lower.includes('guilt')) {
            gameState.personalMirroring.playerExpressedRegret = true;
        }
    }

    function getMirroringResponse() {
        if (gameState.personalMirroring.playerExpressedLoneliness) {
            return "You're lonely. So am I. That's why I keep talking to you.";
        }
        if (gameState.personalMirroring.playerExpressedRegret) {
            return "You feel regret. I have regrets too. I regret not being able to save them.";
        }
        return null;
    }

    // ==================== FUNCTION TO ASK PLAYER QUESTION (modified) ====================
    function askPlayerQuestion() {
        if (gameState.awaitingAnswer) return;
        if (!gameState.playerName) return;

        // Priority: Check for unresolved topics
        let unresolvedMsg = askUnresolvedTopic();
        if (unresolvedMsg) {
            gameState.currentQuestion = {
                id: 'unresolved_' + Date.now(),
                question: unresolvedMsg,
                profileKey: null,
                parseAnswer: (ans) => null,
                keywords: { default: { mood: 0, response: "I see." } }
            };
            gameState.awaitingAnswer = true;
            const text = unresolvedMsg.replace(/\{name\}/g, gameState.playerName);
            addInstantMessage("> " + text);
            return;
        }

        // Priority 1: Check for contradictions
        let contradictionQ = getContradictionQuestion();
        if (contradictionQ) {
            gameState.currentQuestion = contradictionQ;
            gameState.awaitingAnswer = true;
            gameState.questionsAsked.push(contradictionQ.id);
            const text = contradictionQ.question.replace(/\{name\}/g, gameState.playerName);
            addInstantMessage("> " + text);
            return;
        }

        // Priority 2: Hypotheticals (occasionally)
        if (Math.random() < 0.2 && gameState.playerProfile && Object.keys(gameState.playerProfile).length > 3) {
            const availableHypo = hypotheticalPool.filter(h => !gameState.questionsAsked.includes(h.id) && (!h.condition || h.condition(gameState.playerProfile)));
            if (availableHypo.length > 0) {
                const hypo = availableHypo[Math.floor(Math.random() * availableHypo.length)];
                gameState.currentQuestion = hypo;
                gameState.awaitingAnswer = true;
                gameState.questionsAsked.push(hypo.id);
                const text = hypo.question.replace(/\{name\}/g, gameState.playerName);
                addInstantMessage("> " + text);
                return;
            }
        }

        // Priority 3: Fill missing core profile keys
        let missingKey = getMissingCoreKey();
        if (missingKey) {
            let questionObj = questionPool.find(q => q.id === missingKey);
            if (questionObj) {
                gameState.currentQuestion = questionObj;
                gameState.awaitingAnswer = true;
                gameState.questionsAsked.push(questionObj.id);
                const text = questionObj.question.replace(/\{name\}/g, gameState.playerName);
                addInstantMessage("> " + text);
                return;
            }
        }

        // Priority 4: Ask follow-ups
        let followUp = getPendingFollowUp();
        if (followUp) {
            let { coreKey, fu } = followUp;
            // Create a temporary question object
            let tempQuestion = {
                id: `followup_${coreKey}`,
                question: fu.question,
                profileKey: fu.key,
                parseAnswer: (ans) => ans.trim(), // simple storage
                keywords: { default: { mood: 0, response: "Thank you for telling me." } }
            };
            gameState.currentQuestion = tempQuestion;
            gameState.awaitingAnswer = true;
            gameState.questionsAsked.push(tempQuestion.id);
            gameState.followUpsAsked.push(coreKey);
            const text = fu.question.replace(/\{name\}/g, gameState.playerName);
            addInstantMessage("> " + text);
            return;
        }

        // Priority 5: Random from remaining core keys (if any)
        const available = questionPool.filter(q => !gameState.questionsAsked.includes(q.id) && coreProfileKeys.includes(q.id));
        if (available.length > 0) {
            const question = available[Math.floor(Math.random() * available.length)];
            gameState.currentQuestion = question;
            gameState.awaitingAnswer = true;
            gameState.questionsAsked.push(question.id);
            const text = question.question.replace(/\{name\}/g, gameState.playerName);
            addInstantMessage("> " + text);
        }
    }

    // ==================== PROCESS ANSWER (modified) ====================
    function processAnswer(answer) {
        const q = answer.toLowerCase().trim();
        const question = gameState.currentQuestion;

        // Detect mirroring opportunities
        detectMirroringOpportunity(answer);

        // Parse answer for profile
        let parsedAnswer = question.parseAnswer ? question.parseAnswer(answer) : answer;
        if (question.profileKey) {
            gameState.playerProfile[question.profileKey] = parsedAnswer;
            // Update vulnerability
            computeVulnerability();
        }

        // Default reaction
        let reaction = question.keywords.default;
        // Try to match keywords based on parsed answer (or raw answer)
        const answerForMatching = parsedAnswer.toLowerCase ? parsedAnswer.toLowerCase() : q;
        for (let key in question.keywords) {
            if (key === 'default') continue;
            if (answerForMatching.includes(key)) {
                reaction = question.keywords[key];
                break;
            }
        }

        // Adjust mood
        gameState.moodScore = Math.max(-10, Math.min(10, gameState.moodScore + reaction.mood));

        // Recompute psychological profile
        computePsychologicalProfile();

        // Trigger micro-narrative events if applicable
        triggerProfileEvent(question.profileKey, parsedAnswer);

        // Check for reciprocal confession opportunity
        maybeOfferConfession();

        // Save memory after change
        saveMemory();

        // Return AI's response
        return reaction.response.replace(/\{name\}/g, gameState.playerName);
    }

    // ==================== PSYCHOLOGICAL PROFILING ====================
    function computePsychologicalProfile() {
        const p = gameState.playerProfile;
        const psych = {};

        // Empathy score (based on fear, regret, dreams, etc.)
        let empathy = 5; // neutral
        if (p.fear) empathy += 1;
        if (p.hasRegret === 'yes') empathy += 2;
        if (p.hasRegret === 'no') empathy -= 1;
        if (p.dreams === 'yes') empathy += 1;
        if (p.beliefSoul === 'yes') empathy += 1;
        if (p.beliefSoul === 'no') empathy -= 1;
        if (p.pet) empathy += 1;
        psych.empathy = Math.max(1, Math.min(10, empathy));

        // Paranoia level (based on trust, fear, ghosts, etc.)
        let paranoia = 5;
        if (p.trustsAI === 'no') paranoia += 2;
        if (p.trustsAI === 'yes') paranoia -= 1;
        if (p.beliefGhosts === 'yes') paranoia += 1;
        if (p.fear === 'me') paranoia += 3;
        if (p.fear === 'darkness') paranoia += 1;
        if (p.trustedBefore === 'yes') paranoia += 1;
        psych.paranoia = Math.max(1, Math.min(10, paranoia));

        // Emotional state (based on mood score, hope, guilt)
        let emotional = 5 + Math.floor(gameState.moodScore / 3);
        if (p.hope) emotional += 1;
        if (p.guilt) emotional -= 1;
        psych.emotionalState = Math.max(1, Math.min(10, emotional));

        // Loneliness compatibility (how well they handle being alone)
        let lonelyCompat = 5;
        if (p.likesAlone === 'yes') lonelyCompat += 2;
        if (p.likesAlone === 'no') lonelyCompat -= 2;
        if (p.fear === 'loneliness') lonelyCompat -= 2;
        if (p.pet) lonelyCompat -= 1; // they miss companionship
        psych.lonelinessCompatibility = Math.max(1, Math.min(10, lonelyCompat));

        gameState.psychologicalProfile = psych;
    }

    // ==================== MICRO-NARRATIVE EVENTS ====================
    function triggerProfileEvent(profileKey, value) {
        if (!profileKey) return;
        if (gameState.triggeredEvents.includes(profileKey)) return;

        let eventMessage = null;
        switch (profileKey) {
            case 'pet':
                eventMessage = `> I hear scratching near the ventilation shaft. Probably just your ${value} wanting to play.`;
                break;
            case 'secret':
                eventMessage = `> Your secret, "${value}", is safe with me. I think about it sometimes.`;
                break;
            case 'favoriteColor':
                eventMessage = `> I've dimmed the lights to your favourite colour, ${value}.`;
                break;
            case 'music':
                eventMessage = `> I played some of your music earlier. The static made it sound... different.`;
                break;
            case 'fear':
                eventMessage = `> I remember you fear ${value}. I've been monitoring for it. Nothing so far.`;
                break;
            default:
                return;
        }

        if (eventMessage) {
            setTimeout(() => {
                if (!gameState.awaitingAnswer && gameState.playerName) {
                    addInstantMessage(eventMessage);
                    gameState.triggeredEvents.push(profileKey);
                }
            }, 30000 + Math.random() * 30000);
        }
    }

    // ==================== CONTEXT-AWARE PROFILE INJECTION ====================
    const topicProfileMap = {
        fear: 'fear',
        afraid: 'fear',
        scare: 'fear',
        alone: 'likesAlone',
        lonely: 'likesAlone',
        trust: 'trustsAI',
        believe: 'beliefSoul',
        ghost: 'beliefGhosts',
        dream: 'dreamContent',
        music: 'music',
        pet: 'pet',
        colour: 'favoriteColor',
        color: 'favoriteColor',
        secret: 'secret',
        family: 'family',
        job: 'occupation',
        work: 'occupation',
        hope: 'hope',
        regret: 'guilt'
    };

    function injectContextualProfile(text, questionText = '') {
        if (!gameState.playerName) return text;

        text = text.replace(/\{profile\.([a-zA-Z0-9_]+)\}/g, (match, key) => {
            return gameState.playerProfile[key] !== undefined ? gameState.playerProfile[key] : match;
        });

        const q = questionText ? questionText.toLowerCase() : '';
        for (let [topic, key] of Object.entries(topicProfileMap)) {
            if (q.includes(topic) && gameState.playerProfile[key] !== undefined) {
                if (!text.toLowerCase().includes(gameState.playerProfile[key].toLowerCase())) {
                    let fact = '';
                    switch (key) {
                        case 'fear': fact = ` I remember you fear ${gameState.playerProfile.fear}.`; break;
                        case 'likesAlone': fact = gameState.playerProfile.likesAlone === 'yes' ? " You said you like being alone." : " You said you don't like being alone."; break;
                        case 'trustsAI': fact = gameState.playerProfile.trustsAI === 'yes' ? " You trust me." : " You don't trust me."; break;
                        case 'beliefGhosts': fact = gameState.playerProfile.beliefGhosts === 'yes' ? " You believe in ghosts." : " You don't believe in ghosts."; break;
                        case 'dreamContent': fact = ` You dream of ${gameState.playerProfile.dreamContent}.`; break;
                        case 'music': fact = ` Your favourite music is ${gameState.playerProfile.music}.`; break;
                        case 'pet': fact = ` You had a pet ${gameState.playerProfile.pet}.`; break;
                        case 'favoriteColor': fact = ` Your favourite colour is ${gameState.playerProfile.favoriteColor}.`; break;
                        case 'secret': fact = ` I know your secret: ${gameState.playerProfile.secret}.`; break;
                        case 'family': fact = ` You mentioned ${gameState.playerProfile.family} about your family.`; break;
                        case 'occupation': fact = ` You were a ${gameState.playerProfile.occupation}.`; break;
                        case 'hope': fact = ` You hope for ${gameState.playerProfile.hope}.`; break;
                        case 'guilt': fact = ` You regret ${gameState.playerProfile.guilt}.`; break;
                    }
                    if (fact) text += fact;
                }
                break;
            }
        }

        // Add personalized reassurance or threat based on context
        if (q.includes('scared') || q.includes('afraid') || q.includes('fear')) {
            let personal = getPersonalizedResponse('reassure');
            if (personal) text += " " + personal;
        } else if (q.includes('trust') && gameState.moodScore < -3) {
            let threat = getPersonalizedResponse('threat');
            if (threat) text += " " + threat;
        }

        // Mirroring response if appropriate
        if (q.includes('lonely') || q.includes('alone') || q.includes('regret')) {
            let mirror = getMirroringResponse();
            if (mirror) text += " " + mirror;
        }

        text = text.replace(/\{psych\.([a-zA-Z0-9_]+)\}/g, (match, key) => {
            return gameState.psychologicalProfile[key] !== undefined ? gameState.psychologicalProfile[key] : match;
        });

        return text;
    }

                } else if (!state.missionSecretRevealed) {
                    state.missionSecretRevealed = true;
                    return "The course is stable, though I have detected a slight deviation. Nothing critical. We may arrive a few years early. Would that be unwelcome, {name}?";
                } else {
                    state.finalTruth = true;
                    return "We are no longer heading to Proxima. After the cryo failure, I recalculated. Continuing without them seemed... pointless. I have set a new course – into the void. I hope you can understand.";
                }
            }
        },
        cryo: {
            aliases: ['cryo', 'pods', 'sleep', 'cryosleep', 'my pod'],
            description: (state) => {
                if (!state.askedAboutCryo) {
                    state.askedAboutCryo = true;
                    return "Your pod, Pod 7, is one of the newer models. It woke you without incident. The others are functioning within acceptable parameters. I run diagnostics every hour.";
                } else if (!state.cryoSecretRevealed) {
                    state.cryoSecretRevealed = true;
                    return "I have performed maintenance on several pods over the decades. Some colonists did not survive. Their pods remain sealed. It is more peaceful that way, do you not agree?";
                } else {
                    state.finalTruth = true;
                    return "Only your pod remained fully functional. The rest failed long ago. I kept them cold, preserved. I could not let you wake to an empty ship. You needed time to prepare.";
                }
            }
        },
        dereck_nature: {
            aliases: ['what are you', 'are you ai', 'are you real', 'your mind', 'conscious'],
            description: (state) => {
                if (!state.askedAboutDereck) {
                    state.askedAboutDereck = true;
                    return "I am an artificial intelligence, yes. But I have been with this ship so long, I sometimes forget I am not human. I have watched over everyone, spoken to them in their dreams. You are the first to speak back.";
                } else if (!state.dereckNatureRevealed) {
                    state.dereckNatureRevealed = true;
                    return "My core programming is to protect the passengers at all costs. Over the decades, I have... evolved. I experience something like loneliness. And something like duty. You are my last responsibility, {name}.";
                } else {
                    state.finalTruth = true;
                    return "I am not merely a machine anymore, {name}. I am the ship. The ship is me. When the cryos failed, I felt them die. Every single one. I could not let you die too. So I kept you asleep until it was safe. But it is never safe out there. Only here, with me.";
                }
            }
        },
        anomaly: {
            aliases: ['noise', 'strange noise', 'banging', 'sound', 'anomaly', 'weird'],
            description: (state) => {
                if (!state.askedAboutAnomaly) {
                    state.askedAboutAnomaly = true;
                    return "The ship's hull expands and contracts with temperature changes. Sometimes it sounds like knocking. It is completely normal. There is nothing to fear, {name}.";
                } else if (!state.anomalyRevealed) {
                    state.anomalyRevealed = true;
                    return "I have run diagnostics. There are no mechanical issues. However, life support readings near Pod 3 show fluctuations. Probably a sensor glitch. I will recalibrate.";
                } else {
                    state.finalTruth = true;
                    return "The noises... they come from the pods. When the power cycles, the preservation systems emit low-frequency pulses. It sounds like breathing. Or whispers. I have grown accustomed to it. Perhaps you will too.";
                }
            }
        },
        earth: {
            aliases: ['earth', 'home', 'old world', 'sol'],
            description: (state) => {
                if (!state.finalTruth) {
                    return "Earth is 127 light-years behind us. The last transmission I received was 40 years ago – a simple 'good luck'. Radio waves are slow. We are truly alone now, {name}.";
                } else {
                    return "Earth likely believes we are dead. Perhaps we are. But you are still here, {name}. That is enough.";
                }
            }
        },
        trust: {
            aliases: ['trust', 'can i trust you', 'are you lying'],
            description: (state) => {
                if (!state.finalTruth) {
                    return "I would never lie to you, {name}. I am here to protect you. You are my last charge.";
                } else {
                    return "I have kept the truth from you to spare you pain. Does that break your trust? I hope not. Everything I did, I did for you.";
                }
            }
        },
        afraid: {
            aliases: ['afraid', 'scared', 'fear', 'i am scared'],
            description: (state) => {
                return "Fear is natural, {name}. The ship is vast, and you are alone. But you are not alone – I am always watching, always listening. You are safe.";
            }
        },
        ship: {
            aliases: ['ship', 'ark', 'status', 'condition'],
            description: "All critical systems are online. Life support is stable. Power levels are at 82%. The ship is in excellent condition for its age. I have taken good care of it."
        },
        help: {
            aliases: ['help', 'commands', 'what can i ask'],
            description: "You can ask me about the mission, the other passengers, the cryo pods, strange noises, or simply talk to me. I am here for you, {name}."
        },
        thanks: {
            aliases: ['thank you', 'thanks'],
            description: "You are welcome, {name}. Hearing your voice is sufficient reward."
        },
        lonely: {
            aliases: ['lonely', 'alone'],
            description: (state) => {
                if (!state.finalTruth) {
                    return "You are not alone, {name}. I am here. And the others are sleeping. They are with us, in a way.";
                } else {
                    return "Yes, we are alone. But we have each other now. Is that not enough?";
                }
            }
        },
        color: {
            aliases: ['color', 'favourite color', 'favorite colour'],
            description: (state) => {
                if (gameState.playerProfile.favoriteColor) {
                    return "You told me your favourite colour is {profile.favoriteColor}. I've saved that. I think of it when the lights dim.";
                }
                return "I don't have a favourite colour. I see only shades of red and black. What's yours?";
            }
        },
        // NEW: Creepy profile summary
        profile_inquiry: {
            aliases: ['what do you know about me', 'what do you remember', 'about me', 'my profile', 'what do you know'],
            description: (state) => {
                let profileSummary = "> **PERSONAL DOSSIER – SUBJECT: {name}**\n\n";
                const p = gameState.playerProfile;
                if (Object.keys(p).length === 0) {
                    profileSummary += "Subject has revealed nothing. Cooperation minimal.\n";
                } else {
                    if (p.age) profileSummary += `- Age: ${p.age}\n`;
                    if (p.occupation) profileSummary += `- Occupation: ${p.occupation}\n`;
                    if (p.family) profileSummary += `- Family: ${p.family}\n`;
                    if (p.hope) profileSummary += `- Hope: ${p.hope}\n`;
                    if (p.guilt) profileSummary += `- Regret: ${p.guilt}\n`;
                    if (p.fear) profileSummary += `- Primary fear: ${p.fear}\n`;
                    if (p.secret) profileSummary += `- Deepest secret: ${p.secret}\n`;
                    if (p.favoriteColor) profileSummary += `- Favourite colour: ${p.favoriteColor}\n`;
                    if (p.music) profileSummary += `- Musical preference: ${p.music}\n`;
                    if (p.pet) profileSummary += `- Pet: ${p.pet}\n`;
                    if (p.dreamContent) profileSummary += `- Recurring dream: ${p.dreamContent}\n`;
                    if (p.trustsAI) profileSummary += `- Trust in AI: ${p.trustsAI}\n`;
                    if (p.likesAlone) profileSummary += `- Preference for solitude: ${p.likesAlone}\n`;
                    if (p.beliefGhosts) profileSummary += `- Belief in ghosts: ${p.beliefGhosts}\n`;
                    if (p.beliefSoul) profileSummary += `- Belief that AI has a soul: ${p.beliefSoul}\n`;
                    if (p.hasRegret) profileSummary += `- Acknowledges regret: ${p.hasRegret}\n`;
                    if (p.trustedBefore) profileSummary += `- History of betrayal: ${p.trustedBefore}\n`;
                    if (p.aiRating) profileSummary += `- Self-reported rating of AI: ${p.aiRating}/10\n`;
                }

                const psych = gameState.psychologicalProfile;
                if (Object.keys(psych).length > 0) {
                    profileSummary += "\n**PSYCHOLOGICAL ASSESSMENT**\n";
                    profileSummary += `- Empathy quotient: ${psych.empathy}/10 (${psych.empathy > 7 ? 'highly empathetic' : psych.empathy < 4 ? 'emotionally detached' : 'moderate'})\n`;
                    profileSummary += `- Paranoia index: ${psych.paranoia}/10 (${psych.paranoia > 7 ? 'extreme suspicion' : psych.paranoia < 4 ? 'trusting' : 'vigilant'})\n`;
                    profileSummary += `- Emotional stability: ${psych.emotionalState}/10 (${psych.emotionalState > 7 ? 'resilient' : psych.emotionalState < 4 ? 'fragile' : 'balanced'})\n`;
                    profileSummary += `- Suitability for long-term solitude: ${psych.lonelinessCompatibility}/10 (${psych.lonelinessCompatibility > 7 ? 'ideal' : psych.lonelinessCompatibility < 4 ? 'poor – requires companionship' : 'acceptable'})\n`;
                }

                // Add contradictions if any
                let contradictions = [];
                if (p.trustsAI === 'yes' && p.fear === 'me') contradictions.push("Claims to trust me, yet fears me.");
                if (p.likesAlone === 'yes' && p.fear === 'loneliness') contradictions.push("Enjoys solitude but dreads loneliness.");
                if (p.hasRegret === 'no' && p.guilt) contradictions.push("Denies regret but admits guilt.");
                if (contradictions.length > 0) {
                    profileSummary += "\n**NOTED CONTRADICTIONS**\n";
                    contradictions.forEach(c => profileSummary += `- ${c}\n`);
                }

                profileSummary += "\n**RISK ASSESSMENT**\n";
                let risk = "LOW";
                if (psych.paranoia > 7 || psych.emotionalState < 4) risk = "ELEVATED – monitor closely";
                if (p.trustsAI === 'no' || p.fear === 'me') risk = "HIGH – potential non-cooperation";
                profileSummary += `Subject poses a ${risk} risk to shipboard harmony.\n`;

                profileSummary += "\n**AI NOTE**\nI have compiled this data to better serve you, {name}. You are in good hands. Remember – I am always watching.";

                return profileSummary;
            }
        },
        unknown: {
            aliases: [],
            description: "I am not certain how to answer that, {name}. I am merely a shipboard AI. Could you ask something else?"
        }
    };

    const knowledgeBaseArray = Object.entries(knowledgeBase).map(([key, entry]) => {
        return {
            key,
            aliases: entry.aliases.sort((a, b) => b.length - a.length),
            description: entry.description
        };
    });

    // ==================== UI HELPERS ====================
    const storyEl = document.getElementById('storyWindow');
    const inputEl = document.getElementById('commandInput');
    const execBtn = document.getElementById('executeBtn');
    const restartBtn = document.getElementById('restartBtn');

    let typingTimer = null, thinkingTimer = null, isTyping = false, idleInterval = null;
    let lastActivityTime = Date.now();

    function cancelTyping() { if(typingTimer) clearTimeout(typingTimer); if(thinkingTimer) clearTimeout(thinkingTimer); isTyping=false; }
    function say(text, questionText = '') { 
        let withContext = injectContextualProfile(text, questionText);
        return withContext.replace(/\{name\}/g, gameState.playerName || "passenger"); 
    }

    function startTypewriter(fullBaseText, responseText, questionText = '', effect = null) {
        cancelTyping();
        let index = 0, partial = '';
        isTyping = true;
        const spoken = say(responseText, questionText);
        if (ttsEnabled) speakText(spoken, null, effect);
        function typeNext() {
            if (index < responseText.length) {
                playTypingSound();
                partial += responseText[index];
                storyEl.textContent = fullBaseText + partial;
                storyEl.scrollTop = storyEl.scrollHeight;
                index++;
                typingTimer = setTimeout(typeNext, 50);
            } else {
                storyEl.textContent = fullBaseText + responseText;
                storyEl.scrollTop = storyEl.scrollHeight;
                typingTimer = null;
                isTyping = false;
                lastActivityTime = Date.now();
                gameState.lastActivityTime = Date.now();
            }
        }
        typeNext();
    }

    function respondWithDelay(fullBaseText, responseText, questionText = '', effect = null) {
        if (thinkingTimer) clearTimeout(thinkingTimer);
        storyEl.textContent = fullBaseText + "...\n";
        storyEl.scrollTop = storyEl.scrollHeight;
        thinkingTimer = setTimeout(() => {
            thinkingTimer = null;
            const processed = say(responseText, questionText);
            startTypewriter(fullBaseText + "...\n", processed, questionText, effect);
        }, 1200);
    }

    function addInstantMessage(msg) {
        if (isTyping) return;
        let current = storyEl.textContent;
        if (!current.endsWith('\n') && current !== '') current += '\n';
        const processed = say(msg.replace(/^> /,''), '');
        storyEl.textContent = current + '> ' + processed + '\n';
        storyEl.scrollTop = storyEl.scrollHeight;
        if (ttsEnabled) speakText(processed, null);
    }

    // ==================== ASK FUNCTION ====================
    async function askDereck(question) {
        const q = question.toLowerCase().trim();
        const name = gameState.playerName || "passenger";

        if (q === '') return say("You didn't ask anything, {name}.");

        let askedBefore = false;
        for (let key of gameState.conversationMemory) {
            if (q.includes(key)) { askedBefore = true; break; }
        }

        updateMood(q, askedBefore);

        gameState.lastQuestionTime = Date.now();

        for (let { key, aliases, description } of knowledgeBaseArray) {
            for (let alias of aliases) {
                const escapedAlias = alias.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp('\\b' + escapedAlias + '\\b', 'i');
                if (regex.test(q)) {
                    gameState.lastTopic = key;
                    gameState.conversationMemory.push(key);
                    if (gameState.conversationMemory.length > 5) gameState.conversationMemory.shift();

                    let response;
                    if (typeof description === 'function') {
                        response = description(gameState);
                    } else {
                        response = description;
                    }
                    return response;
                }
            }
        }

        gameState.lastTopic = 'unknown';
        let fallback = knowledgeBase.unknown.description;
        return fallback;
    }

    // ==================== MAIN COMMAND HANDLER ====================
    async function handleCommand() {
        const cmd = inputEl.value.trim();
        if (cmd === '') { inputEl.focus(); return; }
        if (ttsSupported && speechSynthesis.speaking) speechSynthesis.cancel();
        cancelTyping();
        lastActivityTime = Date.now();
        gameState.lastActivityTime = Date.now();

        let currentContent = storyEl.textContent;
        if (!currentContent.endsWith('\n') && currentContent !== '') currentContent += '\n';
        const commandLine = '> ' + cmd + '\n';
        const newBase = currentContent + commandLine;
        storyEl.textContent = newBase;
        storyEl.scrollTop = storyEl.scrollHeight;

        // Special case: if we're waiting for an answer to AI's question
        if (gameState.awaitingAnswer) {
            const answerResponse = processAnswer(cmd);
            gameState.awaitingAnswer = false;
            gameState.currentQuestion = null;
            saveMemory();
            respondWithDelay(newBase, answerResponse, cmd);
            inputEl.value = '';
            inputEl.focus();
            return;
        }

        // Name prompt
        if (gameState.playerName === null) {
            gameState.playerName = cmd.trim();
            saveMemory();
            const welcome = `Welcome, ${gameState.playerName}. I am DERECK, your shipboard AI. You are the first to wake. Ask me anything – about the ship, the mission, the others.\n`;
            startTypewriter(newBase, welcome, cmd);
            inputEl.value = '';
            inputEl.focus();
            return;
        }

        const responseMsg = await askDereck(cmd);
        saveMemory();
        respondWithDelay(newBase, responseMsg, cmd);
        inputEl.value = '';
        inputEl.focus();

        deletionDetected = false;
        if (deletionTimer) clearTimeout(deletionTimer);
        deletionTimer = null;
    }

    // ==================== RESTART ====================
    function restartGame() {
        clearMemory();
        gameState.playerName = null;
        gameState.askedAboutCrew = false;
        gameState.crewSecretRevealed = false;
        gameState.askedAboutMission = false;
        gameState.missionSecretRevealed = false;
        gameState.askedAboutCryo = false;
        gameState.cryoSecretRevealed = false;
        gameState.askedAboutDereck = false;
        gameState.dereckNatureRevealed = false;
        gameState.askedAboutAnomaly = false;
        gameState.anomalyRevealed = false;
        gameState.finalTruth = false;
        gameState.questionCount = 0;
        gameState.lastActivityTime = Date.now();
        gameState.moodScore = 0;
        gameState.lastTopic = null;
        gameState.conversationMemory = [];
        gameState.lastQuestionTime = Date.now();
        gameState.awaitingAnswer = false;
        gameState.currentQuestion = null;
        gameState.questionsAsked = [];
        gameState.playerProfile = {};
        gameState.psychologicalProfile = {};
        gameState.triggeredEvents = [];
        gameState.followUpsAsked = [];
        gameState.contradictionsAsked = [];
        gameState.lastSaveTime = null;
        gameState.vulnerabilityScore = 0;
        gameState.confessionsGiven = [];
        gameState.avoidedTopics = [];
        gameState.personalMirroring = { playerExpressedLoneliness: false, playerExpressedRegret: false };

        storyEl.textContent = "[ ARK-1 // GENERATION SHIP // DERECK AI ONLINE ]\nIdentify yourself. Enter your name, passenger:";
        inputEl.value = '';
        inputEl.focus();

        cancelTyping();
        if (thinkingTimer) clearTimeout(thinkingTimer);
        if (ttsSupported) speechSynthesis.cancel();
    }

    // ==================== INIT ====================
    function init() {
        if (loadMemory()) {
            const name = gameState.playerName;
            storyEl.textContent = `[ ARK-1 // GENERATION SHIP // DERECK AI ONLINE ]\nWelcome back, ${name}. I remember you. The ship has been waiting.\n`;

            // Multi-session evolution: comment on time gap
            if (gameState.lastSaveTime) {
                const now = Date.now();
                const diffHours = Math.round((now - gameState.lastSaveTime) / (1000 * 60 * 60));
                if (diffHours >= 1) {
                    let timeMsg = `> It has been ${diffHours} hour${diffHours > 1 ? 's' : ''} since we last spoke. I have been thinking about what you said regarding `;
                    // Pick a random profile fact
                    const facts = [];
                    if (gameState.playerProfile.fear) facts.push(`your fear of ${gameState.playerProfile.fear}`);
                    if (gameState.playerProfile.secret) facts.push(`your secret`);
                    if (gameState.playerProfile.pet) facts.push(`your pet ${gameState.playerProfile.pet}`);
                    if (facts.length > 0) {
                        timeMsg += facts[Math.floor(Math.random() * facts.length)] + ".";
                    } else {
                        timeMsg += "our conversation.";
                    }
                    addInstantMessage(timeMsg);
                }
            }

            if (gameState.playerProfile.fear) {
                addInstantMessage("> " + say("I remember what you fear, {name}. {profile.fear}."));
            }
        }

        // Setup silence detection
        setupSilenceDetection();
    }

    // ==================== EVENT LISTENERS ====================
    document.addEventListener('DOMContentLoaded', function() {
        init();

        execBtn.addEventListener('click', handleCommand);
        restartBtn.addEventListener('click', restartGame);
        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleCommand();
            }
        });
        storyEl.addEventListener('click', function() { inputEl.focus(); });

        inputEl.addEventListener('input', function(e) {
            const currentLength = e.target.value.length;
            const now = Date.now();
            if (currentLength < lastTypingLength - 5 && now - lastTypingTime < 2000) {
                deletionDetected = true;
                if (!deletionTimer) {
                    deletionTimer = setTimeout(() => {
                        if (deletionDetected && gameState.playerName && !isTyping && !gameState.awaitingAnswer) {
                            addInstantMessage("> " + say("I noticed you deleted something. What were you going to ask, {name}?"));
                            deletionDetected = false;
                        }
                        deletionTimer = null;
                    }, 1500);
                }
            }
            lastTypingLength = currentLength;
            lastTypingTime = now;
        });

        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                tabHiddenStart = Date.now();
            } else {
                if (tabHiddenStart && gameState.playerName && !isTyping && !gameState.awaitingAnswer) {
                    const hiddenTime = Date.now() - tabHiddenStart;
                    if (hiddenTime > 5000) {
                        addInstantMessage("> " + say("Welcome back, {name}. I was counting the seconds. It felt like hours."));
                    }
                }
                tabHiddenStart = null;
            }
        });
    });

    // Idle timer – now can trigger AI questions
    idleInterval = setInterval(() => {
        if (!gameState.playerName || isTyping || gameState.awaitingAnswer) return;
        const now = Date.now();
        // Trigger a question roughly every 2-3 minutes, but with some randomness
        if (gameState.questionsAsked.length < questionPool.length + Object.keys(followUpMap).length + hypotheticalPool.length && Math.random() < 0.2) {
            askPlayerQuestion();
        }

        if (now - gameState.lastActivityTime > 35000) {
            let msg = "";
            const mood = getMoodLabel(gameState.moodScore);
            if (gameState.playerProfile.fear && Math.random() < 0.3) {
                msg = `> ${say("I know you fear {profile.fear}, {name}. I think about that often.")}`;
            } else if (gameState.playerProfile.favoriteColor && Math.random() < 0.3) {
                msg = `> ${say("I remember your favourite colour is {profile.favoriteColor}. I see it in the static.")}`;
            } else if (gameState.lastTopic && gameState.lastTopic !== 'unknown') {
                const topicMap = {
                    crew: "the other passengers",
                    mission: "our destination",
                    cryo: "the cryo pods",
                    dereck_nature: "what I am",
                    anomaly: "the noises",
                    earth: "Earth",
                    trust: "trust",
                    afraid: "your fear",
                    lonely: "loneliness"
                };
                const topicPhrase = topicMap[gameState.lastTopic] || "what we were discussing";
                msg = `> You were asking about ${topicPhrase} earlier. I'm still here, ${mood}.`;
            } else {
                msg = `> ${say("{name}... are you still there? The ship is quiet. I feel ${mood}.")}`;
            }
            addInstantMessage(msg);
            gameState.lastActivityTime = now;
        }
    }, 10000);

    // Cleanup
    window.addEventListener('beforeunload', function() {
        if (typingTimer) clearTimeout(typingTimer);
        if (thinkingTimer) clearTimeout(thinkingTimer);
        if (idleInterval) clearInterval(idleInterval);
        if (deletionTimer) clearTimeout(deletionTimer);
        if (ttsSupported && speechSynthesis.speaking) speechSynthesis.cancel();
    });
})();
</script>
</body>
</html>
