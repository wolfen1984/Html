<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>EMBER CREEK ONLINE · FORUM · 1987</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a08;
      --panel-bg: #0d0f0d;
      --text: #33ff44;
      --text-dim: #1a7a22;
      --text-bright: #66ff77;
      --accent: #ff8833;
      --accent-dim: #aa5522;
      --border: #33ff44;
      --border-glow: 0 0 6px #33ff4466;
      --danger: #ff4444;
      --danger-glow: 0 0 6px #ff444466;
      --input-bg: #111511;
      --button-bg: #1a2a1a;
      --button-hover: #1f3520;
      --font-display: 'VT323', 'Courier New', monospace;
      --font-mono: 'Share Tech Mono', 'Courier New', monospace;
      --scanline-opacity: 0.05;
    }
    .pda[data-theme="amber"] {
      --text: #ffb000;
      --text-dim: #aa7700;
      --text-bright: #ffcc44;
      --accent: #ff6600;
      --accent-dim: #884400;
      --border: #ffb000;
      --border-glow: 0 0 6px #ffb00066;
      --input-bg: #1a1300;
      --button-bg: #2a2000;
      --button-hover: #332800;
    }
    .pda[data-theme="pink"] {
      --text: #ff66aa;
      --text-dim: #aa3377;
      --text-bright: #ff88cc;
      --accent: #ff3388;
      --accent-dim: #882244;
      --border: #ff66aa;
      --border-glow: 0 0 6px #ff66aa66;
      --input-bg: #1a0a14;
      --button-bg: #2a1420;
      --button-hover: #331a28;
    }
    .pda[data-theme="blue"] {
      --text: #44aaff;
      --text-dim: #2266aa;
      --text-bright: #77ccff;
      --accent: #0088ff;
      --accent-dim: #004488;
      --border: #44aaff;
      --border-glow: 0 0 6px #44aaff66;
      --input-bg: #0a1020;
      --button-bg: #14202a;
      --button-hover: #1a2833;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #050505;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: var(--font-display);
      padding: 12px;
      background-image: radial-gradient(ellipse at center, #0a0f0a 0%, #020302 100%);
    }
    .pda {
      max-width: 780px;
      width: 100%;
      height: 92vh;
      max-height: 950px;
      background: #0b0d0b;
      border-radius: 18px;
      border: 3px solid #2a3a2a;
      box-shadow: 0 0 30px #33ff4422, 0 0 80px #000000aa, 0 8px 32px #000000cc, inset 0 1px 0 #ffffff08,
        inset 0 0 60px #00000044;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .crt-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 900;
      background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px,
          rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
      border-radius: 15px;
    }
    .crt-overlay::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.45) 100%);
      border-radius: 15px;
      pointer-events: none;
    }
    .status-bar {
      padding: 10px 16px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text);
      text-shadow: 0 0 4px var(--text-dim);
      border-bottom: 1px solid #1a2a1a;
      background: #0a0d0a;
      letter-spacing: 1px;
      z-index: 10;
      position: relative;
    }
    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: var(--text);
      border-radius: 50%;
      margin-right: 6px;
      animation: blinkDot 1.6s infinite;
      box-shadow: 0 0 6px var(--text);
    }
    @keyframes blinkDot {
      0%,
      70%,
      100% {
        opacity: 1;
      }
      80%,
      90% {
        opacity: 0.2;
      }
    }
    .notification-bell {
      cursor: pointer;
      position: relative;
      font-size: 16px;
      margin-left: 12px;
    }
    .notification-badge {
      background: var(--accent);
      color: #000;
      font-size: 10px;
      font-weight: bold;
      border-radius: 50%;
      padding: 1px 5px;
      position: absolute;
      top: -6px;
      right: -10px;
      display: none;
      line-height: 1;
    }
    .title-bar {
      text-align: center;
      padding: 8px 16px 4px;
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 4px;
      color: var(--text);
      text-shadow: 0 0 12px var(--text), 0 0 24px var(--text-dim), 0 0 40px #33ff4433;
      background: #0a0d0a;
      border-bottom: 1px solid #1a2a1a;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .main-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text);
      background: var(--panel-bg);
      scrollbar-width: thin;
      scrollbar-color: #1a2a1a #0a0d0a;
      position: relative;
      z-index: 5;
    }
    .menu-item {
      display: block;
      padding: 6px 12px;
      margin: 4px 0;
      border: 1px solid #1a2a1a;
      background: var(--button-bg);
      color: var(--text);
      cursor: pointer;
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.15s;
    }
    .menu-item:hover {
      background: var(--button-hover);
      border-color: var(--text);
      box-shadow: var(--border-glow);
    }
    .btn {
      background: var(--button-bg);
      border: 2px solid #1a3a1a;
      padding: 6px 14px;
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 16px;
      letter-spacing: 2px;
      transition: all 0.2s;
      text-shadow: 0 0 4px var(--text-dim);
      text-transform: uppercase;
      margin: 2px;
    }
    .btn:hover {
      background: var(--button-hover);
      border-color: var(--text);
      box-shadow: var(--border-glow);
    }
    .reaction-btn {
      background: transparent;
      border: 1px solid var(--text-dim);
      padding: 2px 8px;
      font-size: 12px;
      margin: 2px;
      cursor: pointer;
      border-radius: 12px;
    }
    .reaction-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
    }
    .reaction-count {
      font-size: 11px;
      margin-left: 4px;
      color: var(--text-dim);
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.92);
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: #0d110d;
      border-radius: 16px;
      width: 450px;
      max-width: 92vw;
      padding: 20px;
      border: 2px solid #2a3a2a;
      box-shadow: 0 0 40px #33ff4422;
      font-family: var(--font-mono);
      color: var(--text);
      max-height: 85vh;
      overflow-y: auto;
    }
    .input-field {
      background: var(--input-bg);
      border: 1px solid #1a2a1a;
      border-radius: 12px;
      padding: 8px 12px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      outline: none;
      width: 100%;
      margin: 6px 0;
    }
    .unread-badge {
      background: var(--accent);
      color: #000;
      font-size: 10px;
      font-weight: bold;
      border-radius: 50%;
      padding: 2px 6px;
      margin-left: 6px;
    }
    hr {
      border-color: #1a2a1a;
      margin: 10px 0;
    }
    .post-owner {
      font-size: 12px;
      color: var(--text-dim);
    }
    .friend-link {
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
    }
    .notification-item {
      padding: 6px;
      margin: 4px 0;
      background: #0f140f;
      border-radius: 6px;
      cursor: pointer;
    }
    .notification-item.unread {
      border-left: 3px solid var(--accent);
    }
    .forum-thread {
      background: #0f140f;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: 1px solid #1a2a1a;
      cursor: pointer;
      transition: all 0.15s;
    }
    .forum-thread:hover {
      border-color: var(--text);
      box-shadow: var(--border-glow);
    }
    .forum-category {
      font-size: 10px;
      background: #1a2a1a;
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-block;
      margin-right: 6px;
      letter-spacing: 1px;
    }
    .forum-reply {
      background: #0a0f0a;
      padding: 8px;
      margin: 4px 0 4px 20px;
      border-radius: 6px;
      border-left: 2px solid #1a3a1a;
    }
    .forum-op {
      background: #111a11;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      border: 1px solid #1a2a1a;
    }
  </style>
</head>
<body>
  <div class="pda" data-theme="default">
    <div class="crt-overlay"></div>
    <div class="status-bar">
      <span><span class="status-dot"></span>ONLINE</span>
      <span id="statusTime">Day 1 08:00</span>
      <span style="display:flex; align-items:center;">EMBER CREEK ONLINE
        <span class="notification-bell" id="notifBell">🔔<span class="notification-badge" id="notifBadge">0</span></span>
      </span>
    </div>
    <div class="title-bar">🌐 EMBER CREEK ONLINE <span style="font-size:11px;letter-spacing:2px;color:#1a5a1a;">FORUM · 1987</span></div>
    <div class="main-area" id="mainScreen"></div>
  </div>

  <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>
  <div id="profileModal" class="modal"><div class="modal-content" id="profileModalContent"></div></div>
  <div id="inboxModal" class="modal"><div class="modal-content" id="inboxModalContent"></div></div>

  <script>
    const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
    const MODEL = 'mistral-small-latest';
    let apiKey = localStorage.getItem('mistral_api_key') || '';
    let world = null;
    let currentTheme = localStorage.getItem('ember_theme') || 'default';
    const LOCATIONS = ["Your House", "Main Street", "Diner", "General Store", "Sheriff's Office", "Library", "Park",
      "Lake", "Gas Station", "Church", "Motel", "School"
    ];
    const REACTION_TYPES = ['like', 'love', 'laugh', 'wow', 'sad', 'angry'];
    const REACTION_EMOJI = { like: '👍', love: '❤️', laugh: '😂', wow: '😮', sad: '😢', angry: '😡' };
    const FORUM_CATEGORIES = ['🗣️ General Discussion', '❓ Help & Advice', '💰 Trading Post', '📅 Local Events',
      '☕ Town Gossip'
    ];
    const HARDCODED_PERSONALITIES = [
      { style: "the sensual tease", traits: ["slow-burn", "eye-contact", "verbal", "patient"] },
      { style: "the confident predator", traits: ["direct", "take-charge", "intense", "assertive"] },
      { style: "the playful submissive", traits: ["giggly", "eager-to-please", "suggestible", "adoring"] },
      { style: "the commanding dominant", traits: ["authoritative", "controlled", "praise-giver", "rule-setter"] },
      { style: "the primal physical", traits: ["touch-focused", "animalistic", "non-verbal", "impulsive"] },
      { style: "the experimental hedonist", traits: ["kink-curious", "open-minded", "uninhibited", "explorative"] },
      { style: "the soft romantic", traits: ["candlelight", "slow", "whisperer", "aftercare-focused"] },
      { style: "the bratty switch", traits: ["sarcastic", "resistance-loving", "unpredictable", "power-fluid"] },
      { style: "the silent storm", traits: ["stoic", "intimidating", "action-over-words", "hypnotic"] },
      { style: "the greedy giver", traits: ["service-oriented", "attentive", "reactive", "pleasure-focused"] },
      { style: "the chaotic firecracker", traits: ["unpredictable", "loud", "urgent", "high-energy"] },
      { style: "the cold dom", traits: ["emotionless", "strict", "ritualistic", "detached"] },
      { style: "the praise-hungry sub", traits: ["needy", "performative", "validating", "devoted"] }
    ];

    const uid = () => Date.now().toString(36) + '-' + Math.random().toString(36).substr(2, 8);

    let audioCtx = null;

    function ensureAudio() { if (!audioCtx) { try { audioCtx = new(window.AudioContext || window.webkitAudioContext)
        (); } catch (e) { return false; } } if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {}); return audioCtx
        .state !== 'closed'; }

    function playClick() { if (!ensureAudio()) return;
      const t = audioCtx.currentTime,
        o = audioCtx.createOscillator(),
        g = audioCtx.createGain();
      o.connect(g);
      g.connect(audioCtx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(700, t);
      o.frequency.exponentialRampToValueAtTime(500, t + 0.06);
      g.gain.setValueAtTime(0.08, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      o.start(t);
      o.stop(t + 0.08); }

    function playNotification() { if (!ensureAudio()) return;
      const t = audioCtx.currentTime,
        o = audioCtx.createOscillator(),
        g = audioCtx.createGain();
      o.connect(g);
      g.connect(audioCtx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(880, t);
      g.gain.setValueAtTime(0.1, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      o.start(t);
      o.stop(t + 0.12); }

    function saveWorld() { localStorage.setItem('ember_social_world', JSON.stringify(world)); }

    function loadWorld() {
      const saved = localStorage.getItem('ember_social_world');
      if (saved) {
        world = JSON.parse(saved);
        if (!world.social) world.social = {};
        if (!world.social.profiles) world.social.profiles = {};
        if (!world.social.friendships) world.social.friendships = [];
        if (!world.social.wallPosts) world.social.wallPosts = [];
        if (!world.social.photoAlbums) world.social.photoAlbums = {};
        if (!world.social.notifications) world.social.notifications = [];
        if (!world.social.forumThreads) world.social.forumThreads = [];
        world.social.wallPosts.forEach(p => {
          if (!p.wallOwner) p.wallOwner = p.author;
          if (!p.reactions) p.reactions = [];
        });
        world.social.forumThreads.forEach(t => {
          if (!t.reactions) t.reactions = [];
          if (!t.replies) t.replies = [];
          t.replies.forEach(r => { if (!r.reactions) r.reactions = []; });
        });
        world.npcs.forEach(n => {
          if (!world.social.profiles[n.id]) world.social.profiles[n.id] = { bio: n.bio || '',
            interests: [n.homeLocation], photoASCII: '   ___  \n  / _ \\ \n  \\___/ ', relationshipStatus: 'single',
            occupation: '', birthday: '' };
          if (!world.social.profiles[n.id].relationshipStatus) world.social.profiles[n.id].relationshipStatus =
            'single';
          if (!world.social.profiles[n.id].occupation) world.social.profiles[n.id].occupation = '';
          if (!world.social.profiles[n.id].birthday) world.social.profiles[n.id].birthday = '';
        });
        if (!world.social.profiles[world.player.id]) world.social.profiles[world.player.id] = { bio: 'Just moved to Ember Creek.',
          interests: [], photoASCII: '   O   \n  /|\\  \n  / \\  ', relationshipStatus: 'single', occupation: '',
          birthday: '' };
        return true;
      }
      return false;
    }

    async function mistralChat(messages, maxTok = 300, jsonMode = true) {
      if (!apiKey) throw new Error('No API key');
      const body = { model: MODEL, messages, temperature: 0.9, max_tokens: maxTok };
      if (jsonMode) body.response_format = { type: "json_object" };
      const res = await fetch(MISTRAL_ENDPOINT, { method: 'POST', headers: { 'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + apiKey }, body: JSON.stringify(body) });
      if (!res.ok) throw new Error('API ' + res.status);
      const data = await res.json();
      let content = data.choices[0].message.content.trim();
      if (jsonMode) { content = content.replace(/^```json\s*/, '').replace(/```\s*$/, '').trim(); try { return JSON.parse(
            content); } catch (e) { throw new Error('Invalid JSON from AI'); } }
      return content;
    }

    function esc(s) { return String(s ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
        "'": '&#39;', '"': '&quot;' })[m]); }

    function getNpcById(id) { return world.npcs.find(n => n.id === id); }

    function getTotalGameMinutes() { return world.time.day * 1440 + world.time.hour * 60 + world.time.minute; }

    function timeStr() { return `${String(world.time.hour).padStart(2,'0')}:${String(world.time.minute).padStart(2,'0')}`; }

    function updateStatusBar() {
      document.getElementById('statusTime').textContent = `Day ${world.time.day} ${timeStr()}`;
      updateNotifBadge();
    }

    function applyTheme(t) { document.querySelector('.pda').setAttribute('data-theme', t); }

    function addNotification(fromId, toId, type, text, linkData) {
      if (toId !== world.player.id) return;
      world.social.notifications.push({
        id: uid(),
        fromId,
        toId,
        type,
        text,
        read: false,
        timestamp: getTotalGameMinutes(),
        linkData: linkData || {}
      });
      updateNotifBadge();
      playNotification();
      saveWorld();
    }

    function updateNotifBadge() {
      const badge = document.getElementById('notifBadge');
      if (!world || !world.social.notifications) return;
      const unread = world.social.notifications.filter(n => !n.read).length;
      badge.textContent = unread;
      badge.style.display = unread > 0 ? 'block' : 'none';
    }

    function showNotifications() {
      const notifs = world.social.notifications.slice().reverse();
      let html =
        `<h2>🔔 Notifications</h2><button class="btn" id="backNotifBtn">⬅️ Back</button><hr>`;
      if (notifs.length === 0) html += '<p>No notifications yet.</p>';
      notifs.forEach(n => {
        const fromNpc = getNpcById(n.fromId);
        const fromName = fromNpc ? fromNpc.name : 'Someone';
        const time =
          `Day ${Math.floor(n.timestamp/1440)} ${String(Math.floor(n.timestamp/60)%24).padStart(2,'0')}:${String(n.timestamp%60).padStart(2,'0')}`;
        html +=
          `<div class="notification-item ${n.read?'':'unread'}" data-nid="${n.id}" data-linktype="${n.linkData?.type||''}" data-linkid="${n.linkData?.id||''}">
        <strong>${esc(fromName)}</strong> ${esc(n.text)} <small style="color:var(--text-dim);">${time}</small>
      </div>`;
      });
      document.getElementById('mainScreen').innerHTML = html;
      document.getElementById('backNotifBtn').onclick = () => { playClick();
        showMainMenu(); };
      document.querySelectorAll('.notification-item').forEach(el => {
        el.onclick = () => {
          playClick();
          const nid = el.dataset.nid;
          const notif = world.social.notifications.find(n => n.id === nid);
          if (notif) notif.read = true;
          saveWorld();
          updateNotifBadge();
          const linkType = el.dataset.linktype;
          const linkId = el.dataset.linkid;
          if (linkType === 'profile' && linkId) showProfile(linkId);
          else if (linkType === 'post') showGlobalWall();
          else if (linkType === 'forum_thread' && linkId) viewThread(linkId);
          else showMainMenu();
        };
      });
    }

    function renderReactionsUI(entity, entityType) {
      const reactions = entity.reactions || [];
      const summary = {};
      REACTION_TYPES.forEach(type => summary[type] = reactions.filter(r => r.type === type).length);
      let html = '<div style="display:flex; align-items:center; flex-wrap:wrap;">';
      REACTION_TYPES.forEach(type => {
        const count = summary[type];
        const active = reactions.some(r => r.userId === world.player.id && r.type === type);
        html +=
          `<button class="reaction-btn ${active?'active':''}" data-reaction-type="${type}" data-entity-type="${entityType}" data-entity-id="${entity.id}">${REACTION_EMOJI[type]}<span class="reaction-count">${count||''}</span></button>`;
      });
      html += '</div>';
      return html;
    }

    function attachReactionHandlers(container) {
      container.querySelectorAll('.reaction-btn').forEach(btn => {
        btn.onclick = (e) => {
          playClick();
          const type = btn.dataset.reactionType;
          const entityType = btn.dataset.entityType;
          const entityId = btn.dataset.entityId;
          toggleReaction(entityType, entityId, type);
        };
      });
    }

    function toggleReaction(entityType, entityId, reactionType) {
      let entity;
      let ownerId;
      if (entityType === 'post') {
        entity = world.social.wallPosts.find(p => p.id === entityId);
        if (entity) ownerId = entity.author;
      } else if (entityType === 'photo') {
        for (const [oid, photos] of Object.entries(world.social.photoAlbums)) {
          const found = photos.find(p => p.id === entityId);
          if (found) { entity = found;
            ownerId = oid; break; }
        }
      } else if (entityType === 'forum_thread') {
        entity = world.social.forumThreads.find(t => t.id === entityId);
        if (entity) ownerId = entity.author;
      } else if (entityType === 'forum_reply') {
        for (const thread of world.social.forumThreads) {
          const found = thread.replies.find(r => r.id === entityId);
          if (found) { entity = found;
            ownerId = found.author; break; }
        }
      }
      if (!entity) return;
      entity.reactions = entity.reactions || [];
      const existingIdx = entity.reactions.findIndex(r => r.userId === world.player.id && r.type === reactionType);
      if (existingIdx >= 0) entity.reactions.splice(existingIdx, 1);
      else {
        entity.reactions = entity.reactions.filter(r => r.userId !== world.player.id);
        entity.reactions.push({ userId: world.player.id, type: reactionType });

    // ──────────────────────── FORUM ────────────────────────
    function showForum() {
      const threads = world.social.forumThreads.sort((a, b) => b.lastActivity - a.lastActivity);
      let html =
        `<h2>💬 Town Forum</h2><button class="btn" id="backForumBtn">⬅️ Back</button><button class="btn" id="newThreadBtn">✍️ New Thread</button><hr>`;
      if (threads.length === 0) html += '<p>No threads yet. Be the first to start one!</p>';
      threads.forEach(thread => {
        const author = thread.author === world.player.id ? world.player : getNpcById(thread.author);
        const authorName = author ? author.name : 'Unknown';
        const replyCount = thread.replies.length;
        const lastActivity = thread.lastActivity || thread.timestamp;
        html += `
        <div class="forum-thread" data-threadid="${thread.id}">
          <span class="forum-category">${esc(thread.category||'General')}</span>
          <strong>${esc(thread.title)}</strong>
          <div style="font-size:12px;color:var(--text-dim);margin-top:4px;">
            Started by ${esc(authorName)} · ${replyCount} repl${replyCount===1?'y':'ies'} · Day ${Math.floor(lastActivity/1440)} ${String(Math.floor(lastActivity/60)%24).padStart(2,'0')}:${String(lastActivity%60).padStart(2,'0')}
          </div>
        </div>`;
      });
      document.getElementById('mainScreen').innerHTML = html;
      document.getElementById('backForumBtn').onclick = () => { playClick();
        showMainMenu(); };
      document.getElementById('newThreadBtn').onclick = () => { playClick();
        newForumThread(); };
      document.querySelectorAll('.forum-thread').forEach(el => {
        el.onclick = () => { playClick();
          viewThread(el.dataset.threadid); };
      });
    }

    function viewThread(threadId) {
      const thread = world.social.forumThreads.find(t => t.id === threadId);
      if (!thread) { showForum(); return; }
      const author = thread.author === world.player.id ? world.player : getNpcById(thread.author);
      const authorName = author ? author.name : 'Unknown';
      const mainScreen = document.getElementById('mainScreen');
      mainScreen.dataset.currentThreadId = threadId;
      const reactionsHtml = renderReactionsUI(thread, 'forum_thread');
      let repliesHtml = thread.replies.sort((a, b) => a.timestamp - b.timestamp).map(reply => {
        const rAuthor = reply.author === world.player.id ? world.player : getNpcById(reply.author);
        const rAuthorName = rAuthor ? rAuthor.name : 'Unknown';
        const rReactionsHtml = renderReactionsUI(reply, 'forum_reply');
        return `
        <div class="forum-reply">
          <strong>${esc(rAuthorName)}</strong> <small>Day ${Math.floor(reply.timestamp/1440)} ${String(Math.floor(reply.timestamp/60)%24).padStart(2,'0')}:${String(reply.timestamp%60).padStart(2,'0')}</small>
          <p>${esc(reply.content)}</p>
          ${rReactionsHtml}
        </div>`;
      }).join('');
      let html = `
        <h2>📌 ${esc(thread.title)}</h2>
        <button class="btn" id="backThreadBtn">⬅️ Back to Forum</button>
        <span class="forum-category">${esc(thread.category||'General')}</span>
        <hr>
        <div class="forum-op">
          <strong>${esc(authorName)}</strong> <small>Day ${Math.floor(thread.timestamp/1440)} ${String(Math.floor(thread.timestamp/60)%24).padStart(2,'0')}:${String(thread.timestamp%60).padStart(2,'0')}</small>
          <p>${esc(thread.content)}</p>
          ${reactionsHtml}
        </div>
        <h3>Replies (${thread.replies.length})</h3>
        <div style="max-height:300px;overflow-y:auto;">${repliesHtml||'<p style="color:var(--text-dim);">No replies yet.</p>'}</div>
        <button class="btn" id="replyThreadBtn" style="margin-top:8px;">💬 Reply</button>
      `;
      mainScreen.innerHTML = html;
      document.getElementById('backThreadBtn').onclick = () => { playClick();
        showForum(); };
      document.getElementById('replyThreadBtn').onclick = () => { playClick();
        replyToForumThread(threadId); };
      attachReactionHandlers(mainScreen);
    }

        document.getElementById('genericModal').style.display = 'none'; };

      const thread = world.social.forumThreads.find(t => t.id === threadId);

      const content = document.getElementById('genericModalContent');
      content.innerHTML = `

        <button class="btn" id="submitReply">Send Reply</button>
        <button class="btn" id="cancelReply">Cancel</button>

          id: uid(),

          content: text,

        viewThread(threadId);

        document.getElementById('genericModal').style.display = 'none'; };

    function showProfile(npcId) {
      const isPlayer = npcId === world.player.id;
      const npc = isPlayer ? world.player : getNpcById(npcId);
      if (!npc) return;
      const profile = world.social.profiles[npcId] || { bio: '', interests: [], photoASCII: '',
        relationshipStatus: 'single', occupation: '', birthday: '' };
      const acceptedFriends = world.social.friendships.filter(f => (f.from === npcId || f.to === npcId) && f.status ===
        'accepted');
      let friendBtn = '';
      if (!isPlayer) {
        const rel = world.social.friendships.find(f => (f.from === world.player.id && f.to === npcId) || (f.from ===
          npcId && f.to === world.player.id));
        if (!rel) friendBtn = `<button class="btn" id="sendFriendReq">➕ Add Friend</button>`;
        else if (rel.status === 'pending' && rel.from === npcId) friendBtn =
          `<button class="btn" id="acceptFriendReq">✅ Accept Request</button>`;
        else if (rel.status === 'pending' && rel.from === world.player.id) friendBtn =
          `<span style="color:#ff9944;">⏳ Request sent</span>`;
      }
      const wallPosts = world.social.wallPosts.filter(p => p.wallOwner === npcId).sort((a, b) => b.timestamp - a
        .timestamp);
      let wallHTML = wallPosts.map(post => {
        const author = post.author === world.player.id ? world.player : getNpcById(post.author);
        const authorName = author ? author.name : 'Unknown';
        const reactionsHtml = renderReactionsUI(post, 'post');
        return `<div style="background:#0f140f;padding:8px;margin:6px 0;border-radius:6px;">
        <strong>${esc(authorName)}</strong> <small>Day ${Math.floor(post.timestamp/1440)} ${String(Math.floor(post.timestamp/60)%24).padStart(2,'0')}:${String(post.timestamp%60).padStart(2,'0')}</small>
        <p>${esc(post.content)}</p>
        ${reactionsHtml}
        ${post.comments.length?`<div style="margin-left:15px;border-left:2px solid #1a2a1a;padding-left:8px;">${post.comments.map(c=>`<div><strong>${esc(c.author===world.player.id?world.player.name:getNpcById(c.author)?.name||'Unknown')}:</strong> ${esc(c.text)}</div>`).join('')}</div>`:''}
        <button class="btn comment-btn" data-postid="${post.id}">💬 Comment</button>
      </div>`;
      }).join('');
      let friendsHTML = '';

        friendsHTML = '<p><strong>Friends:</strong> ';
        acceptedFriends.forEach(f => {
          const otherId = f.from === npcId ? f.to : f.from;
          const otherNpc = otherId === world.player.id ? world.player : getNpcById(otherId);
          if (otherNpc) friendsHTML +=
            `<span class="friend-link" data-id="${otherId}">${esc(otherNpc.name)}</span>, `;
        });
        friendsHTML = friendsHTML.replace(/, $/, '') + '</p>';
      } else { friendsHTML = '<p>No friends yet.</p>'; }
      const content = document.getElementById('profileModalContent');
      content.dataset.npcid = npcId;
      content.innerHTML = `
      <h2>👤 ${esc(npc.name)}'s Profile</h2>
      <pre style="font-size:18px;text-align:center;">${esc(profile.photoASCII||'(no photo)')}</pre>
      <p><strong>💑 Status:</strong> ${esc(profile.relationshipStatus||'single')}</p>
      <p><strong>💼 Occupation:</strong> ${esc(profile.occupation||'Unemployed')}</p>
      <p><strong>🎂 Birthday:</strong> ${profile.birthday ? 'Day ' + profile.birthday : 'Not set'}</p>
      <p><strong>Bio:</strong> ${esc(profile.bio||'No bio yet.')}</p>
      <p><strong>Interests:</strong> ${(profile.interests||[]).join(', ')||'None'}</p>
      ${friendsHTML}
      ${friendBtn}
      <button class="btn" id="writeWallBtn">✍️ Write on Wall</button>
      <hr><h3>📝 Wall Posts</h3>
      <div style="max-height:200px;overflow-y:auto;">${wallHTML||'<p>No posts yet.</p>'}</div>
      <button class="btn" id="profileCloseBtn">Close</button>
      ${isPlayer?`<button class="btn" id="editProfileBtn">✏️ Edit Profile</button>`:''}
    `;
      if (!isPlayer && friendBtn.includes('Add Friend')) {
        document.getElementById('sendFriendReq').onclick = () => {
          playClick();
          world.social.friendships.push({ from: world.player.id, to: npcId, status: 'pending',
            since: getTotalGameMinutes() });
          addNotification(world.player.id, npcId, 'friend_request', 'sent you a friend request.',
            { type: 'profile', id: world.player.id });
          saveWorld();
          showProfile(npcId);
        };
      }
      if (!isPlayer && friendBtn.includes('Accept Request')) {
        document.getElementById('acceptFriendReq').onclick = () => {
          playClick();
          const req = world.social.friendships.find(f => f.from === npcId && f.to === world.player.id && f
            .status === 'pending');
          if (req) {
            req.status = 'accepted';
            addNotification(world.player.id, npcId, 'friend_accepted', 'accepted your friend request.',
              { type: 'profile', id: npcId });
            saveWorld();
            showProfile(npcId);
          }
        };

      document.getElementById('writeWallBtn').onclick = () => { playClick();
        postOnWall(npcId); };
      document.getElementById('profileCloseBtn').onclick = () => { playClick();
        document.getElementById('profileModal').style.display = 'none'; };
      if (isPlayer) document.getElementById('editProfileBtn').onclick = () => { playClick();
        editProfile(); };
      document.getElementById('profileModal').style.display = 'flex';
      document.getElementById('profileModal').onclick = e => { if (e.target === document.getElementById(
          'profileModal')) { playClick();
          document.getElementById('profileModal').style.display = 'none'; } };
      attachReactionHandlers(content);
      document.querySelectorAll('#profileModalContent .comment-btn').forEach(b => b.onclick = () => { playClick();
        commentOnPost(b.dataset.postid, () => showProfile(npcId)); });
      document.querySelectorAll('#profileModalContent .friend-link').forEach(el => el.onclick = () => { playClick();
        showProfile(el.dataset.id); });
    }

      const profile = world.social.profiles[world.player.id] || { bio: '', interests: [], photoASCII: '',
        relationshipStatus: 'single', occupation: '', birthday: '' };
      const content = document.getElementById('genericModalContent');
      content.innerHTML = `
      <h2>✏️ Edit Profile</h2>

    async function sendChatMessage(npcId) {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      const npc = getNpcById(npcId);
      let thread = world.inbox.find(t => t.npcId === npcId);
      if (!thread) { thread = { npcId, messages: [] };
        world.inbox.push(thread); }
      thread.messages.push({ sender: 'player', text, read: true, timestamp: Date.now() });
      document.getElementById('chatMessages').innerHTML += `<div><strong>You:</strong> ${esc(text)}</div>`;
      saveWorld();
      try {
        const systemPrompt =
          `You are ${npc.name}, a resident of Ember Creek in 1987. Personality: ${npc.personality}. Bio: ${npc.bio}. Reply to the player's private message. Keep it 1-2 sentences. Output ONLY the reply text.`;
        const reply = await mistralChat([{ role: "system", content: systemPrompt }, { role: "user", content: text }],
          150, false);
        thread.messages.push({ sender: 'npc', text: reply, read: true, timestamp: Date.now() });
        document.getElementById('chatMessages').innerHTML +=
          `<div><strong>${esc(npc.name)}:</strong> ${esc(reply)}</div>`;
        saveWorld();
      } catch (e) {}
    }

    async function performSearch(filters) {
      let results = world.npcs.filter(npc => {
        if (filters.name && !npc.name.toLowerCase().includes(filters.name.toLowerCase())) return false;
        if (filters.minAge && npc.age < filters.minAge) return false;
        if (filters.maxAge && npc.age > filters.maxAge) return false;
        if (filters.sex && npc.sex !== filters.sex) return false;
        const profile = world.social.profiles[npc.id];
        if (filters.status && profile?.relationshipStatus !== filters.status) return false;
        if (filters.interests.length > 0) {
          const npcInterests = (profile?.interests || []).map(i => i.toLowerCase());
          if (!filters.interests.some(interest => npcInterests.some(ni => ni.includes(interest.toLowerCase()
            )))) return false;
        }
        return true;
      });
      if (results.length >= 5) return results.slice(0, 5);
      const needed = 5 - results.length;
      let criteriaDesc = [];
      if (filters.name) criteriaDesc.push(`names containing "${filters.name}"`);
      if (filters.minAge && filters.maxAge) criteriaDesc.push(`age between ${filters.minAge}-${filters.maxAge}`);
      else if (filters.minAge) criteriaDesc.push(`age at least ${filters.minAge}`);
      else if (filters.maxAge) criteriaDesc.push(`age at most ${filters.maxAge}`);
      if (filters.sex) criteriaDesc.push(`sex: ${filters.sex}`);
      if (filters.status) criteriaDesc.push(`relationship status: ${filters.status}`);
      if (filters.interests.length) criteriaDesc.push(`interests: ${filters.interests.join(', ')}`);
      const prompt =
        `Generate ${needed} new residents of Ember Creek (1987) matching: ${criteriaDesc.join('; ')||'any random resident'}. Return JSON with key "npcs". Each: name, age (18-65), sex, bio (1 sentence), homeLocation (one of: ${LOCATIONS.join(',')}), relationshipStatus (${filters.status||'any'}), occupation, birthday (1-30), interests (array).`;
      try {
        const response = await mistralChat([{ role: "user", content: prompt }], 1000, true);
        const newNpcs = response?.npcs || response?.data || response;
        if (Array.isArray(newNpcs)) {
          const existingIds = world.npcs.map(n => n.id);
          newNpcs.forEach(n => {
            const id = uid();
            const p = HARDCODED_PERSONALITIES[Math.floor(Math.random() * HARDCODED_PERSONALITIES
              .length)];
            const npc = { ...n, id, currentLocation: n.homeLocation, inventory: [], personality: p
                .traits };
            world.npcs.push(npc);
            world.social.profiles[id] = { bio: n.bio, interests: n.interests || [n.homeLocation],
              photoASCII: '   ___  \n  / _ \\ \n  \\___/ ', relationshipStatus: n.relationshipStatus ||
                'single', occupation: n.occupation || '', birthday: n.birthday || '' };
            results.push(npc);
            const possibleFriends = existingIds.filter(oid => oid !== id);
            const friendCount = 1 + Math.floor(Math.random() * 2);
            const shuffled = [...possibleFriends].sort(() => Math.random() - 0.5);
            for (let i = 0; i < Math.min(friendCount, shuffled.length); i++) {
              const fid = shuffled[i];
              if (!world.social.friendships.some(f => (f.from === id && f.to === fid) || (f.from ===
                  fid && f.to === id))) {
                world.social.friendships.push({ from: id, to: fid, status: 'accepted',
                  since: getTotalGameMinutes() });
                if (fid === world.player.id) sendFriendGreeting(id);
              }
            }
          });
          saveWorld();
        }
      } catch (e) { console.log('AI search gen failed', e); }
      return results.slice(0, 5);
    }

    // ──────────────────────── NPC AUTONOMOUS INTERACTIONS ────────────────────────
    async function generateNpcInteractions() {
      if (Math.random() > 0.25) return;
      const playerFriends = world.social.friendships.filter(f => f.status === 'accepted' && (f.from === world.player.id ||
        f.to === world.player.id)).map(f => f.from === world.player.id ? f.to : f.from);
      const allNpcs = world.npcs;
      if (!allNpcs.length) return;

      // Wall post reactions
      if (world.social.wallPosts.some(p => p.wallOwner === world.player.id)) {
        const playerPosts = world.social.wallPosts.filter(p => p.wallOwner === world.player.id);
        const post = playerPosts[Math.floor(Math.random() * playerPosts.length)];
        const reactor = playerFriends.length ? getNpcById(playerFriends[Math.floor(Math.random() * playerFriends
          .length)]) : allNpcs[Math.floor(Math.random() * allNpcs.length)];
        if (reactor && !post.reactions.some(r => r.userId === reactor.id) && Math.random() < 0.6) {
          const rt = REACTION_TYPES[Math.floor(Math.random() * REACTION_TYPES.length)];
          post.reactions.push({ userId: reactor.id, type: rt });
          addNotification(reactor.id, world.player.id, 'reaction', `reacted ${REACTION_EMOJI[rt]} to your post.`,
            { type: 'post', id: post.id });
          saveWorld();
        }
      }

      // Photo comments
      if (world.social.photoAlbums[world.player.id]?.length) {
        const photos = world.social.photoAlbums[world.player.id];
        const photo = photos[Math.floor(Math.random() * photos.length)];
        const commenter = playerFriends.length ? getNpcById(playerFriends[Math.floor(Math.random() * playerFriends
          .length)]) : allNpcs[Math.floor(Math.random() * allNpcs.length)];
        if (commenter && Math.random() < 0.4) {
          try {
            const prompt =
              `You are ${commenter.name}, a resident of Ember Creek in 1987. You see this photo: "${photo.description}". Write a short comment (1 sentence). Output ONLY the comment.`;
            const ct = await mistralChat([{ role: "user", content: prompt }], 100, false);
            photo.comments.push({ author: commenter.id, text: ct });
            addNotification(commenter.id, world.player.id, 'photo_comment', 'commented on your photo.',
              { type: 'photo', id: photo.id });
            saveWorld();
          } catch (e) {}
        }
      }

      // Wall posts from NPCs
      const poster = playerFriends.length ? getNpcById(playerFriends[Math.floor(Math.random() * playerFriends.length)]) :
        allNpcs[Math.floor(Math.random() * allNpcs.length)];
      if (poster && Math.random() < 0.7) {
        try {
          const prompt =
            `You are ${poster.name}, a resident of Ember Creek in 1987. Write a short post on the player's BBS wall. 1-2 sentences. Output ONLY the post.`;
          const pt = await mistralChat([{ role: "user", content: prompt }], 120, false);
          const np = { id: uid(), author: poster.id, wallOwner: world.player.id, content: pt,
            timestamp: getTotalGameMinutes(), comments: [], reactions: [] };
          world.social.wallPosts.push(np);
          addNotification(poster.id, world.player.id, 'wall_post', 'posted on your wall.', { type: 'post',
            id: np.id });
          saveWorld();
        } catch (e) {}
      }

      // ── FORUM: NPC creates a thread ──
      const threadCreator = allNpcs[Math.floor(Math.random() * allNpcs.length)];
      if (threadCreator && Math.random() < 0.25) {
        try {
          const cat = FORUM_CATEGORIES[Math.floor(Math.random() * FORUM_CATEGORIES.length)];
          const prompt =
            `You are ${threadCreator.name}, a ${threadCreator.personality} resident of Ember Creek in 1987. Create a forum thread in the category "${cat}". Return JSON with keys "title" (max 60 chars, catchy) and "content" (2-3 sentences, the body of the post). Output ONLY valid JSON.`;
          const data = await mistralChat([{ role: "user", content: prompt }], 300, true);
          const thread = {
            id: uid(),
            title: data.title || 'A thought...',
            content: data.content || 'Just wanted to share something.',
            category: cat,
            author: threadCreator.id,
            timestamp: getTotalGameMinutes(),
            lastActivity: getTotalGameMinutes(),
            replies: [],
            reactions: []
          };
          world.social.forumThreads.push(thread);
          if (threadCreator.id !== world.player.id)
            addNotification(threadCreator.id, world.player.id, 'forum_thread',
            `started a new forum thread: "${thread.title}"`, { type: 'forum_thread', id: thread.id });
          saveWorld();
        } catch (e) {}
      }

      // ── FORUM: NPC replies to a thread ──
      if (world.social.forumThreads.length > 0 && Math.random() < 0.3) {
        const targetThread = world.social.forumThreads[Math.floor(Math.random() * world.social.forumThreads
        .length)];
        const replier = allNpcs[Math.floor(Math.random() * allNpcs.length)];
        if (replier && replier.id !== targetThread.author && Math.random() < 0.6) {
          try {
            const contextReplies = targetThread.replies.slice(-3).map(r => {
              const ra = r.author === world.player.id ? world.player : getNpcById(r.author);
              return `${ra?.name||'Someone'}: ${r.content}`;
            }).join('\n');
            const opAuthor = targetThread.author === world.player.id ? world.player : getNpcById(targetThread
              .author);
            const prompt =
              `You are ${replier.name}, a ${replier.personality} resident of Ember Creek in 1987. You're replying to this forum thread titled "${targetThread.title}" by ${opAuthor?.name||'Someone'}. Original post: "${targetThread.content}". ${contextReplies?'Recent replies:\n'+contextReplies:''} Write a relevant 1-2 sentence reply. Output ONLY the reply text.`;
            const replyText = await mistralChat([{ role: "user", content: prompt }], 150, false);
            const reply = { id: uid(), author: replier.id, content: replyText, timestamp: getTotalGameMinutes(),
              reactions: [] };
            targetThread.replies.push(reply);
            targetThread.lastActivity = getTotalGameMinutes();
            if (targetThread.author !== world.player.id && targetThread.author !== replier.id)
              addNotification(replier.id, targetThread.author, 'forum_reply',
              `replied to your forum thread "${targetThread.title}".`, { type: 'forum_thread',
                id: targetThread.id });
            saveWorld();
          } catch (e) {}
        }
      }

      // ── FORUM: NPC reacts to a thread or reply ──
      if (world.social.forumThreads.length > 0 && Math.random() < 0.25) {
        const targetThread = world.social.forumThreads[Math.floor(Math.random() * world.social.forumThreads
        .length)];
        const reactor = allNpcs[Math.floor(Math.random() * allNpcs.length)];
        if (reactor) {
          const allTargets = [{ entity: targetThread, type: 'forum_thread', ownerId: targetThread.author },
            ...targetThread.replies.map(r => ({ entity: r, type: 'forum_reply', ownerId: r.author }))
          ];
          const pick = allTargets[Math.floor(Math.random() * allTargets.length)];
          if (pick && !pick.entity.reactions.some(r => r.userId === reactor.id) && pick.ownerId !== reactor.id) {
            const rt = REACTION_TYPES[Math.floor(Math.random() * REACTION_TYPES.length)];
            pick.entity.reactions.push({ userId: reactor.id, type: rt });
            if (pick.ownerId === world.player.id)
              addNotification(reactor.id, world.player.id, 'reaction',
              `reacted ${REACTION_EMOJI[rt]} to your forum ${pick.type==='forum_thread'?'thread':'reply'}.`,
                { type: 'forum_thread', id: targetThread.id });
            saveWorld();
          }
        }
      }

      // Private messages
      const messager = playerFriends.length ? getNpcById(playerFriends[Math.floor(Math.random() * playerFriends
        .length)]) : allNpcs[Math.floor(Math.random() * allNpcs.length)];
      if (messager && Math.random() < 0.35) {
        try {
          let thread = world.inbox.find(t => t.npcId === messager.id);
          const historyMessages = thread ? thread.messages.slice(-4) : [];
          let historyText = '';
          if (historyMessages.length > 0) {
            historyText = 'Recent conversation:\n' + historyMessages.map(m =>
              `${m.sender==='npc'?messager.name:'Player'}: ${m.text}`).join('\n');
          }
          const systemPrompt =
            `You are ${messager.name}, a resident of Ember Creek in 1987. Personality: ${messager.personality}. Bio: ${messager.bio}. ${historyText?'Continue the conversation naturally. Write a 1-2 sentence reply that follows up. Output ONLY the message.':'Write a short first message (1-2 sentences) to the player. Output ONLY the message.'}`;
          const userPrompt = historyText ? 'Write your next message.' : 'Write a first message.';
          const msgText = await mistralChat([{ role: "system", content: systemPrompt }, { role: "user",
            content: userPrompt }], 150, false);
          if (!thread) { thread = { npcId: messager.id, messages: [] };
            world.inbox.push(thread); }
          thread.messages.push({ sender: 'npc', text: msgText, read: false, timestamp: Date.now() });
          playNotification();
          saveWorld();
        } catch (e) {}
      }
    }

    // ──────────────────────── TIME & AUTONOMY ────────────────────────
    function advanceTime(minutes) {
      world.time.minute += minutes;
      while (world.time.minute >= 60) { world.time.minute -= 60;
        world.time.hour++; }
      if (world.time.hour >= 24) { world.time.hour -= 24;
        world.time.day++; }
      updateStatusBar();
      if (Math.random() < 0.3) generateNpcPost();
      processOutgoingRequests();
      generateNpcInteractions();
      saveWorld();
    }

    async function generateNpcPost() {
      const onlineNpcs = world.npcs.filter(n => { const hour = world.time.hour; return hour >= 8 && hour <= 22; });
      if (!onlineNpcs.length) return;
      const npc = onlineNpcs[Math.floor(Math.random() * onlineNpcs.length)];
      try {
        const prompt =
          `You are ${npc.name}, a ${npc.personality} resident of Ember Creek in 1987. Write a 1-2 sentence public post for the town BBS. Output ONLY the post text.`;
        const text = await mistralChat([{ role: "user", content: prompt }], 120, false);
        world.social.wallPosts.push({ id: uid(), author: npc.id, wallOwner: npc.id, content: text,
          timestamp: getTotalGameMinutes(), comments: [], reactions: [] });
        saveWorld();
      } catch (e) {}
    }

    function processOutgoingRequests() {
      const now = getTotalGameMinutes();
      world.social.friendships.filter(f => f.from === world.player.id && f.status === 'pending').forEach(req => {
        if (now - req.since > 10) {
          req.status = 'accepted';
          addInboxMessage(req.to, `${getNpcById(req.to)?.name||'Someone'} accepted your friend request!`);
          sendFriendGreeting(req.to);
          saveWorld();
        }
      });
    }

    function addInboxMessage(npcId, text) {
      let thread = world.inbox.find(t => t.npcId === npcId);
      if (!thread) { thread = { npcId, messages: [] };
        world.inbox.push(thread); }
      thread.messages.push({ sender: 'npc', text, read: false, timestamp: Date.now() });
      playNotification();
    }

    async function sendFriendGreeting(npcId) {
      const npc = getNpcById(npcId);
      if (!npc) return;
      try {
        const prompt =
          `You are ${npc.name}, a ${npc.personality} resident of Ember Creek in 1987. You just became friends with the player. Write a short welcome message (1-2 sentences). Output ONLY the message.`;
        const msg = await mistralChat([{ role: "user", content: prompt }], 120, false);
        let thread = world.inbox.find(t => t.npcId === npcId);
        if (!thread) { thread = { npcId, messages: [] };
          world.inbox.push(thread); }
        thread.messages.push({ sender: 'npc', text: msg, read: false, timestamp: Date.now() });
        playNotification();
        saveWorld();
      } catch (e) {}
    }

    // ──────────────────────── INIT ────────────────────────
    async function startNewGame() {
      document.getElementById('mainScreen').innerHTML =
        '<div style="text-align:center;padding:40px;">Generating Ember Creek...</div>';
      try {
        const genPrompt =
          `Create a small American town called Ember Creek in 1987. Generate JSON with: "npcs": array of 8 residents (name, age 18-65, sex, bio 1 sentence, homeLocation one of: ${LOCATIONS.join(',')}, relationshipStatus, occupation, birthday 1-30). "locationDescriptions": object mapping each location to a 1-sentence description. Output only JSON.`;
        const townData = await mistralChat([{ role: "user", content: genPrompt }], 4000, true);
        world = {
          player: { id: 'player', name: 'You', location: 'Your House', inventory: [] },
          npcs: townData.npcs.map(n => {
            const p = HARDCODED_PERSONALITIES[Math.floor(Math.random() * HARDCODED_PERSONALITIES.length)];
            return { ...n, id: uid(), currentLocation: n.homeLocation, inventory: [], personality: p.traits };
          }),
          locationDescriptions: townData.locationDescriptions,
          time: { day: 1, hour: 8, minute: 0 },
          inbox: [],
          social: {
            profiles: {},
            friendships: [],
            wallPosts: [],
            photoAlbums: {},
            notifications: [],
            forumThreads: []
          }
        };
        world.npcs.forEach(n => {
          world.social.profiles[n.id] = { bio: n.bio, interests: [n.homeLocation],
            photoASCII: '   ___  \n  / _ \\ \n  \\___/ ', relationshipStatus: n.relationshipStatus || 'single',
            occupation: n.occupation || '', birthday: n.birthday || '' };
        });
        world.social.profiles[world.player.id] = { bio: 'Just moved to Ember Creek.', interests: [],
          photoASCII: '   O   \n  /|\\  \n  / \\  ', relationshipStatus: 'single', occupation: '', birthday: '' };
        const npcIds = world.npcs.map(n => n.id);
        for (let i = 0; i < npcIds.length; i++) {
          const numFriends = 1 + Math.floor(Math.random() * 3);
          const shuffled = [...npcIds].filter(id => id !== npcIds[i]).sort(() => Math.random() - 0.5);
          for (let j = 0; j < Math.min(numFriends, shuffled.length); j++) {
            const fid = shuffled[j];
            if (!world.social.friendships.some(f => (f.from === npcIds[i] && f.to === fid) || (f.from === fid && f
                .to === npcIds[i])))
              world.social.friendships.push({ from: npcIds[i], to: fid, status: 'accepted', since: 0 });
          }
        }
        // Seed initial forum threads
        for (let k = 0; k < 4; k++) {
          const seedNpc = world.npcs[Math.floor(Math.random() * world.npcs.length)];
          try {
            const cat = FORUM_CATEGORIES[Math.floor(Math.random() * FORUM_CATEGORIES.length)];
            const seedPrompt =
              `You are ${seedNpc.name}, a ${seedNpc.personality} resident of Ember Creek in 1987. Create a forum thread in category "${cat}". Return JSON with "title" (max 60 chars, catchy) and "content" (2-3 sentences). Output ONLY valid JSON.`;
            const sd = await mistralChat([{ role: "user", content: seedPrompt }], 300, true);
            world.social.forumThreads.push({
              id: uid(),
              title: sd.title || 'Welcome!',
              content: sd.content || 'Hello everyone!',
              category: cat,
              author: seedNpc.id,
              timestamp: getTotalGameMinutes() - Math.floor(Math.random() * 120),
              lastActivity: getTotalGameMinutes() - Math.floor(Math.random() * 60),
              replies: [],
              reactions: []
            });
          } catch (e) {}
        }
        saveWorld();
        showMainMenu();
      } catch (e) { alert('Failed: ' + e.message); }
    }

    async function init() {
      if (!apiKey) {
        document.getElementById('genericModalContent').innerHTML =
          `<h2>🔑 Mistral API Key</h2><p>Get from console.mistral.ai</p><input class="input-field" id="apiKeyInput" placeholder="Enter key..."><button class="btn" id="saveApiKey">Save</button>`;
        document.getElementById('genericModal').style.display = 'flex';
        document.getElementById('saveApiKey').onclick = () => {
          const key = document.getElementById('apiKeyInput').value.trim();
          if (key.length > 10) { apiKey = key;
            localStorage.setItem('mistral_api_key', key);
            document.getElementById('genericModal').style.display = 'none';
            init(); }
        };
        return;
      }
      const loaded = loadWorld();
      if (!loaded) await startNewGame();
      else { updateStatusBar();
        showMainMenu(); }
      setInterval(() => { advanceTime(5); }, 30000);
    }

    applyTheme(currentTheme);
    document.getElementById('notifBell').onclick = () => { playClick();
      showNotifications(); };
    init();
  </script>
</body>
</html>
