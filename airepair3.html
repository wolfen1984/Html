<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Special+Elite&display=swap" rel="stylesheet">
    <title>VCR WATCH – The Repairman's Log 1987</title>
    <style>
    :root {
        --amber: #33ff33;
        --amber-glow: #66ff66;
        --amber-dim: #1a4a1a;
        --neon: #33ff33;
        --neon-dim: #0a1a0a;
        --text-glow: 0 0 8px rgba(51, 255, 51, 0.6), 0 0 20px rgba(51, 255, 51, 0.25);
        --bg-deep: #050a05;
        --panel-bg: #0a100a;
        --button-bg: linear-gradient(180deg, #1a2a1a 0%, #050a05 100%);
        --wood: #1a3a1a;
    }
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: #000a00;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100dvh;
        height: 100vh;
        margin: 0;
        padding: 0;
        font-family: 'Press Start 2P', monospace;
        background-image: radial-gradient(ellipse at center, #0a1a0a 0%, #000000 70%);
        overflow: hidden;
        user-select: text;
    }
    .crt-monitor {
        background: #0a100a;
        border-radius: 20px;
        padding: 15px 12px 12px;
        box-shadow: 0 0 0 3px #0a0a0a, 0 0 0 6px #0a2a0a, 0 0 0 8px #050505, 0 20px 40px rgba(0, 0, 0, 0.9);
        width: 100%;
        height: 100%;
        max-height: 100%;
        display: flex;
        flex-direction: column;
    }
    .monitor-frame {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }
    .screen-area {
        flex: 1;
        background: #000800;
        border-radius: 12px;
        padding: 8px;
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9);
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        position: relative;
    }
    .screen-glow {
        flex: 1;
        background: #000600;
        border-radius: 6px;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.95), 0 0 15px rgba(51, 255, 51, 0.08);
        min-height: 0;
    }
    .scanlines {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0, 20, 0, 0.10) 3px, rgba(0, 20, 0, 0.10) 4px);
        pointer-events: none;
        z-index: 10;
    }
    .vignette {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 8;
        box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.75);
        border-radius: 6px;
    }
    .screen-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
        z-index: 12;
        padding: 6px;
        padding-top: 8px;
        padding-bottom: 8px;
        min-height: 0;
        overflow-y: auto;
    }
    .title-bar {
        text-align: center;
        padding: 4px 0;
        border-bottom: 1px solid rgba(51, 255, 51, 0.4);
        margin-bottom: 4px;
        flex-shrink: 0;
    }
    .title-bar .game-title {
        font-size: 11px;
        color: var(--amber);
        text-shadow: var(--text-glow);
        letter-spacing: 1px;
    }
    .title-bar .subtitle {
        font-size: 7px;
        color: #2a5a2a;
        margin-top: 2px;
    }
    .location-tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 4px;
        flex-shrink: 0;
    }
    .location-tabs button {
        flex: 1;
        background: var(--button-bg);
        border: 2px solid #1a4a1a;
        color: #33aa33;
        font-family: 'Press Start 2P', monospace;
        font-size: 8px;
        padding: 6px 3px;
        cursor: pointer;
        border-radius: 4px;
        text-shadow: 0 0 4px rgba(51, 255, 51, 0.4);
        transition: all 0.1s;
    }
    .location-tabs button.active {
        border-color: var(--amber);
        color: var(--amber-glow);
        text-shadow: var(--text-glow);
        box-shadow: 0 0 12px rgba(51, 255, 51, 0.3);
    }
    .location-tabs button:active {
        transform: translateY(1px);
    }
    .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 3px 8px;
        background: rgba(5, 10, 5, 0.8);
        border: 1px solid var(--amber-dim);
        margin-bottom: 4px;
        font-size: 9px;
        color: #33cc33;
        text-shadow: 0 0 5px rgba(51, 255, 51, 0.4);
        flex-shrink: 0;
    }
    .game-output {
        flex: 1 1 0;
        overflow-y: auto;
        padding: 6px;
        color: #33ff33;
        font-size: 28px;
        line-height: 1.45;
        text-shadow: 0 0 3px rgba(51, 255, 51, 0.4);
        min-height: 0;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(51, 255, 51, 0.15);
        margin-bottom: 4px;
        font-family: 'VT323', 'Special Elite', 'Press Start 2P', monospace;
        letter-spacing: 0.4px;
        white-space: pre-wrap;
    }
    .game-output::-webkit-scrollbar {
        width: 5px;
    }
    .game-output::-webkit-scrollbar-track {
        background: #020101;
    }
    .game-output::-webkit-scrollbar-thumb {
        background: #1a4a1a;
        border-radius: 3px;
    }
    .input-area {
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 3px 6px;
        flex-shrink: 0;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(51, 255, 51, 0.35);
        border-radius: 4px;
        margin-bottom: 4px;
    }
    .prompt-symbol {
        color: var(--amber-glow);
        font-size: 16px;
    }
    .cmd-input {
        flex: 1;
        background: transparent;
        border: none;
        color: #66ff66;
        font-family: 'VT323', 'Special Elite', 'Press Start 2P', monospace;
        font-size: 18px;
        padding: 5px;
        outline: none;
        caret-color: #33ff33;
        text-shadow: 0 0 3px rgba(51, 255, 51, 0.5);
        letter-spacing: 0.4px;
    }
    .cmd-input::placeholder {
        color: #1a3a1a;
    }
    .actions-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        padding: 3px 0;
        flex-shrink: 0;
        justify-content: center;
    }
    .actions-bar button {
        background: var(--button-bg);
        border: 2px solid #1a4a1a;
        color: #33cc33;
        font-family: 'Press Start 2P', monospace;
        font-size: 8px;
        padding: 5px 6px;
        cursor: pointer;
        border-radius: 5px;
        box-shadow: 0 3px 0 #000a00;
        text-shadow: 0 0 5px rgba(51, 255, 51, 0.4);
        transition: all 0.1s;
        flex: 1 0 auto;
        min-width: 42px;
    }
    .actions-bar button:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 #000a00;
    }
    .actions-bar button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
    }
    .monitor-brand {
        text-align: center;
        font-size: 7px;
        color: #0a2a0a;
        letter-spacing: 2px;
        margin-top: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        flex-shrink: 0;
    }
    .power-led {
        width: 8px;
        height: 8px;
        background: #33ff33;
        border-radius: 50%;
        box-shadow: 0 0 10px #33ff33, 0 0 20px rgba(51, 255, 51, 0.5);
        animation: ledPulse 3s infinite;
    }
    @keyframes ledPulse {
        0%,
        100% {
            opacity: 1;
        }
        50% {
            opacity: 0.4;
        }
    }
    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.93);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 60;
        border-radius: 6px;
        flex-direction: column;
        gap: 10px;
    }
    .overlay.hidden {
        display: none !important;
    }
    .overlay-content {
        background: #0a0502;
        border: 2px solid #1a4a1a;
        padding: 16px;
        width: 90%;
        max-width: 600px;
        max-height: 82%;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 30px rgba(51, 255, 51, 0.25);
        color: #33ff33;
        font-family: 'Press Start 2P', monospace;
        overflow: hidden;
        border-radius: 4px;
    }
    .overlay-content h3 {
        text-align: center;
        margin-bottom: 10px;
        font-size: 13px;
        color: var(--amber);
        text-shadow: var(--text-glow);
    }
    .overlay-close {
        background: var(--button-bg);
        border: 1px solid var(--amber);
        color: var(--amber);
        font-family: 'Press Start 2P';
        font-size: 9px;
        padding: 7px 18px;
        cursor: pointer;
        border-radius: 4px;
        margin-top: 8px;
        align-self: center;
    }
    #watch-overlay .overlay-content {
        max-width: 650px;
        height: 80vh;
    }
    #watch-playback {
    position: relative;
    display: none;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    /* We now control the internal layout with absolute positioning */
    width: 100%;
    height: 100%;
}
   #watch-playback .movie-output {
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-height: 75%;               /* taller area – you can tweak this */
    overflow-y: auto;              /* allows scrolling */
     background: transparent;
    color: #66ff66;
    font-family: 'VT323', 'Special Elite', monospace;
    font-size: 17px;
    line-height: 1.6;
    text-align: center;
    padding: 14px 18px;
    text-shadow: 0 0 4px rgba(51, 255, 51, 0.5);
    white-space: pre-wrap;
    z-index: 15;
    border: 1px solid rgba(51, 255, 51, 0.35);
    pointer-events: auto;          /* so the user can manually scroll */
}
    #watch-playback .movie-controls {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 25;               /* above captions */
    background: rgba(0, 0, 0, 0.85);
    padding: 6px 12px;
    border-radius: 4px;
}
    #watch-playback .movie-controls button {
        background: var(--button-bg);
        border: 1px solid #1a4a1a;
        color: #66ff66;
        font-family: 'Press Start 2P';
        font-size: 8px;
        padding: 6px 10px;
        cursor: pointer;
        border-radius: 4px;
    }
    #help-overlay .help-text {
        overflow-y: auto;
        flex: 1;
        font-size: 10px;
        line-height: 1.7;
        white-space: pre-wrap;
        color: #33cc33;
    }
    .neon-flicker {
        animation: neonFlicker 4s infinite;
    }
    @keyframes neonFlicker {
        0%,
        95%,
        97%,
        100% {
            opacity: 1;
        }
        96% {
            opacity: 0.4;
        }
    }

    /* Override for the API key input and button */
    #api-key-input {
        background: #000a00 !important;
        border: 1px solid #1a4a1a !important;
        color: #66ff66 !important;
        font-family: 'Press Start 2P', monospace;
        font-size: 11px;
        padding: 10px;
        width: 100%;
        margin-bottom: 15px;
        outline: none;
    }
    #api-key-input:focus {
        border-color: #33ff33;
        box-shadow: 0 0 12px rgba(51, 255, 51, 0.3);
    }
    #save-key-btn {
        background: #1a2a1a !important;
        border: 1px solid #1a4a1a !important;
        color: #66ff66 !important;
        font-family: 'Press Start 2P', monospace;
        font-size: 13px;
        padding: 10px 24px;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.2s;
    }
    #save-key-btn:hover {
        background: #0a2a0a;
        border-color: #33ff33;
        box-shadow: 0 0 15px rgba(51, 255, 51, 0.2);
    }
    #key-overlay .overlay-content p {
        font-size: 0.65em;
        margin-top: 15px;
        color: #1a4a1a;
    }

    @media (orientation: landscape) {
        .crt-monitor {
            max-width: 800px;
            height: 95vh;
        }
        .game-output {
            font-size: 20px;
        }
        .cmd-input {
            font-size: 15px;
        }
    }

.clock-overlay {
    position: absolute;
    top: 8px;
    right: 12px;
    color: #33ff33;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    text-shadow: 0 0 6px #33ff33;
    z-index: 20;
    pointer-events: none;
}
</style>
</head>
<body>
    <div class="crt-monitor">
        <div class="monitor-frame">
            <div class="screen-area">
                <div class="screen-glow">
                    <div class="scanlines"></div>
                    <div class="vignette"></div>
                    <div class="screen-content">
                        <div class="title-bar">
                            <span class="game-title">█▓▒░ VCR WATCH ░▒▓█</span>
                            <span class="subtitle">The Repairman's Log · 1987</span>
                        </div>
                        <div class="location-tabs" id="locationTabs">
                            <button id="tabCounter" class="active">🛎 COUNTER</button>
                            <button id="tabWorkbench">🔧 WORKBENCH</button>

                        </div>
                        <div class="status-bar" id="statusBar">
                            <span>📅 Day <span id="dayDisplay">1</span></span>
                            <span>📼 <span id="vcrStatus">No VCR</span></span>
                            <span id="customerPresence">🚪 Empty</span>
                        </div>
                        <div class="game-output" id="output"></div>
                        <div class="input-area">
                            <span class="prompt-symbol">&gt;</span>
                            <input type="text" class="cmd-input" id="cmd" placeholder="Type command..." autocomplete="off">
                            <button id="btnSend" style="background:var(--button-bg);border:2px solid #3a2010;color:#c08040;font-family:'Press Start 2P';font-size:10px;padding:5px 10px;cursor:pointer;border-radius:4px;">SEND</button>
                        </div>
                        <div class="actions-bar" id="actionsBar">
                            <button id="btnWait">⏳ WAIT</button>

                            <button id="btnTake">📦 TAKE VCR</button>
                            <button id="btnOpen">🔓 OPEN</button>
                            <button id="btnWatch">▶ WATCH</button>
                            <button id="btnIgnore">↩ IGNORE</button>
                            <button id="btnRepair">🔧 REPAIR</button>
                            <button id="btnReturn">↩ RETURN</button>
                            <button id="btnRest">🌙 REST</button>
                            <button id="btnCall">📞 CALL</button>
                            <button id="btnReflect">🤔 REFLECT</button>

                            <button id="btnStudio" style="display:none;">🎥 SETUP STUDIO</button>

                            <button id="btnFilm" style="display:none;">🎬 FILM</button>

                            <button id="btnReview" style="display:none;">📋 REVIEW</button>
                        </div>
                    </div>
                </div>

                <!-- HELP OVERLAY -->
                <div class="overlay hidden" id="help-overlay">
                    <div class="overlay-content">
                        <h3>📖 COMMANDS & CONTROLS</h3>
                        <div class="help-text" id="helpText"></div>
                        <button class="overlay-close" id="closeHelp">CLOSE</button>
                    </div>
                </div>

               <!-- WATCH OVERLAY -->
<div class="overlay hidden" id="watch-overlay">
    <div class="overlay-content">
        <h3>▶ PLAYING TAPE</h3>
        <div id="watch-playback">
            <canvas id="tapeCanvas" width="640" height="480" style="width:100%; height:100%; background:black; border:1px solid #1a4a1a;"></canvas>
            <div class="movie-output" id="movieOutput"></div>
            <div class="clock-overlay" id="clockOverlay">PLAY ██ SP ██ 00:00:00</div>
            <div class="movie-controls">
                <button id="movieContinue">▶ NEXT SCENE</button>
                <button id="movieStop">⏹ STOP</button>

</div>

                <!-- KEY OVERLAY -->
                <div class="overlay hidden" id="key-overlay">
                    <div class="overlay-content" style="text-align:center;">
                        <h3>ENTER MISTRAL API KEY</h3>
                        <input type="text" id="api-key-input" placeholder="Paste your key here..." autocomplete="off" spellcheck="false" style="width:100%;padding:10px;background:#000;border:1px solid #5a3a18;color:#e0b860;font-family:'Press Start 2P';font-size:11px;margin-bottom:15px;">
                        <button id="save-key-btn" style="background:#1a0a02;border:1px solid #a06020;color:#e0b860;font-family:'Press Start 2P';font-size:13px;padding:10px 24px;cursor:pointer;">SAVE KEY</button>
                        <p style="font-size:0.65em;margin-top:15px;color:#7a5020;">Key stored locally in your browser.</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="monitor-brand"><span class="power-led"></span> RCA · VCR WATCH TERMINAL · 1987</div>
    </div>

    <script>
        // ═══════════════════════════════════════════
        // VCR WATCH – The Repairman's Log 1987
        // ═══════════════════════════════════════════
        let MISTRAL_KEY = '';
        const MODEL = 'mistral-small-latest';
        const API_URL = 'https://api.mistral.ai/v1/chat/completions';

        // ── DOM elements ──
        const outputEl = document.getElementById('output');
        const cmdInput = document.getElementById('cmd');
        const btnSend = document.getElementById('btnSend');
        const dayDisplay = document.getElementById('dayDisplay');
        const vcrStatus = document.getElementById('vcrStatus');
        const customerPresence = document.getElementById('customerPresence');
        const keyOverlay = document.getElementById('key-overlay');
        const helpOverlay = document.getElementById('help-overlay');
        const watchOverlay = document.getElementById('watch-overlay');
        const movieOutput = document.getElementById('movieOutput');
        const watchPlayback = document.getElementById('watch-playback');
        const tabCounter = document.getElementById('tabCounter');
        const tabWorkbench = document.getElementById('tabWorkbench');
        const tabBackroom = document.getElementById('tabBackroom');
        const btnEndConv = document.getElementById('btnEndConv');

        // ── Sound System ──
        let audioCtx = null;
        let soundEnabled = true;
// Tape ambiance & visualiser globals
let tapeAmbience = null;
let motorOsc = null, hissNode = null, droneOsc = null;
let hissGain = null, droneMasterGain = null, motorGainNode = null;
let distantVoicesTimer = null;

let canvasCtx = null, canvasAnalyser = null;
let staticIntensity = 0.5;

let tapeStartTime = 0, tapeElapsed = 0, clockInterval = null;

        function initAudio() { if (!audioCtx) { audioCtx = new(window.AudioContext || window.webkitAudioContext)(); } if (audioCtx.state === 'suspended') { audioCtx.resume(); } }
        function ensureAudio() { initAudio(); return audioCtx && audioCtx.state !== 'suspended'; }
        function playTick() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.value = 400 + Math.random() * 400; gain.gain.setValueAtTime(0.01, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.015); osc.start(t); osc.stop(t + 0.015); } catch (e) {} }
        function playClick() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square'; osc.frequency.setValueAtTime(500, t); osc.frequency.exponentialRampToValueAtTime(180, t + 0.04); gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.04); osc.start(t); osc.stop(t + 0.04); } catch (e) {} }
        function playSuccess() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; [440, 554, 660].forEach((freq, i) => { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.value = freq; const st = t + i * 0.07; gain.gain.setValueAtTime(0.06, st); gain.gain.exponentialRampToValueAtTime(0.0001, st + 0.1); osc.start(st); osc.stop(st + 0.1); }); } catch (e) {} }
        function playError() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth'; osc.frequency.value = 70; gain.gain.setValueAtTime(0.04, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.18); osc.start(t); osc.stop(t + 0.18); } catch (e) {} }
        function playVCR() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; for (let i = 0; i < 8; i++) { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'triangle'; osc.frequency.value = 150 + Math.random() * 600; const st = t + i * 0.04; gain.gain.setValueAtTime(0.025, st); gain.gain.exponentialRampToValueAtTime(0.0001, st + 0.03); osc.start(st); osc.stop(st + 0.03); } } catch (e) {} }
        function playCreepy() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(330, t); osc.frequency.exponentialRampToValueAtTime(165, t + 0.6); gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.65); osc.start(t); osc.stop(t + 0.65); } catch (e) {} }

function startClock() {
  tapeStartTime = Date.now();
  tapeElapsed = 0;
  updateClockDisplay();
  if (clockInterval) clearInterval(clockInterval);
  clockInterval = setInterval(() => {
    tapeElapsed = Math.floor((Date.now() - tapeStartTime) / 1000);
    updateClockDisplay();
  }, 500);
}

function updateClockDisplay() {
  const h = Math.floor(tapeElapsed / 3600);
  const m = Math.floor((tapeElapsed % 3600) / 60);
  const s = tapeElapsed % 60;
  const timeStr = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const clockEl = document.getElementById('clockOverlay');
  if (clockEl) clockEl.textContent = `PLAY ██ SP ██ ${timeStr}`;
}

function stopClock() {
  if (clockInterval) clearInterval(clockInterval);
  clockInterval = null;

        async function actionFilm(promptText) {
            if (!gameState.studioPrepped) { printInstant('The studio isn\'t set up. Use SETUP STUDIO.'); playError(); return; }

// ── Tape Soundscape ───────────────────────────
function startTapeAmbience() {
  if (!ensureAudio()) return;
  stopTapeAmbience();

  // Master gain → analyser → destination
  tapeAmbience = audioCtx.createGain();
  tapeAmbience.gain.value = 0.4;

  canvasAnalyser = audioCtx.createAnalyser();
  canvasAnalyser.fftSize = 256;
  tapeAmbience.connect(canvasAnalyser);
  canvasAnalyser.connect(audioCtx.destination);

  // 1. Motor hum (two oscillators)
  motorOsc = audioCtx.createOscillator();
  motorOsc.type = 'triangle';
  motorOsc.frequency.value = 45;
  motorGainNode = audioCtx.createGain();
  motorGainNode.gain.value = 0.18;
  motorOsc.connect(motorGainNode).connect(tapeAmbience);
  motorOsc.start();

  const motorSub = audioCtx.createOscillator();
  motorSub.type = 'sine';
  motorSub.frequency.value = 90;
  const motorSubGain = audioCtx.createGain();
  motorSubGain.gain.value = 0.08;
  motorSub.connect(motorSubGain).connect(tapeAmbience);
  motorSub.start();

  // 2. Uneasy drone (LFO‑modulated sine) – kept
  droneOsc = audioCtx.createOscillator();
  droneOsc.type = 'sine';
  droneOsc.frequency.value = 60;
  droneMasterGain = audioCtx.createGain();
  droneMasterGain.gain.value = 0.0;
  const droneLFO = audioCtx.createOscillator();
  droneLFO.frequency.value = 0.12;
  const droneLFOGain = audioCtx.createGain();
  droneLFOGain.gain.value = 10;
  droneLFO.connect(droneLFOGain).connect(droneOsc.frequency);
  droneLFO.start();
  droneOsc.connect(droneMasterGain).connect(tapeAmbience);
  droneOsc.start();

  // 3. Distant voices (random bursts)
  scheduleDistantVoices();

  // Hiss section completely removed
}function scheduleDistantVoices() {
  if (!tapeAmbience || !ensureAudio()) return;
  const delay = 3000 + Math.random() * 7000;
  distantVoicesTimer = setTimeout(() => {
    if (!tapeAmbience) return;
    playDistantVoiceBurst();
    scheduleDistantVoices();
  }, delay);
}

function playDistantVoiceBurst() {
  if (!tapeAmbience || !ensureAudio()) return;
  const dur = 0.4 + Math.random() * 0.8;
  const t = audioCtx.currentTime;
  const noiseSrc = audioCtx.createBufferSource();
  const bufSize = Math.floor(audioCtx.sampleRate * dur);
  const buffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buffer.getChannelData(0);
  for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1);
  noiseSrc.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 400 + Math.random() * 600;
  filter.Q.value = 0.8;
  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(0.08, t + 0.05);
  env.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  noiseSrc.connect(filter).connect(env).connect(tapeAmbience);
  noiseSrc.start(t);
  noiseSrc.stop(t + dur);
}

function stopTapeAmbience() {
  if (motorOsc) { try { motorOsc.stop(); } catch(e) {} motorOsc = null; }
  if (hissNode) { try { hissNode.stop(); } catch(e) {} hissNode = null; }
  if (droneOsc) { try { droneOsc.stop(); } catch(e) {} droneOsc = null; }
  if (tapeAmbience) { tapeAmbience.disconnect(); tapeAmbience = null; }
  if (distantVoicesTimer) { clearTimeout(distantVoicesTimer); distantVoicesTimer = null; }
  motorGainNode = null; hissGain = null; droneMasterGain = null;
  canvasAnalyser = null;
}

function setTapeIntensity(level) {
  if (!tapeAmbience) return;
  const t = audioCtx.currentTime;
  // Hiss removed – no gain adjustment for it

  // Drone fades in with intensity
  if (droneMasterGain) {
    droneMasterGain.gain.linearRampToValueAtTime(level * 0.18, t + 0.8);
  }
  // Motor gain slightly drops when tape degrades
  if (motorGainNode) {
    motorGainNode.gain.linearRampToValueAtTime(0.15 - level * 0.05, t + 0.3);
  }
}
// ── Canvas Static & Waveform ─────────────────
function initCanvasVisuals() {
  const canvas = document.getElementById('tapeCanvas');
  if (!canvas) return;
  canvasCtx = canvas.getContext('2d');
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
  // Kick off the loop
  requestAnimationFrame(drawCanvas);
}

function drawCanvas() {
  if (!tapeAmbience || !canvasCtx) {
    requestAnimationFrame(drawCanvas);
    return;
  }
  const canvas = canvasCtx.canvas;
  const w = canvas.width;
  const h = canvas.height;

  // Clear to pure black
  canvasCtx.fillStyle = 'black';
  canvasCtx.fillRect(0, 0, w, h);

  // Optional scanlines (faint horizontal lines)
  canvasCtx.fillStyle = 'rgba(0,0,0,0.2)';
  for (let y = 0; y < h; y += 4) {
    canvasCtx.fillRect(0, y, w, 2);
  }

  // No waveform – just the black screen

  requestAnimationFrame(drawCanvas);
}// ── Robotic Speech Synthesis ────────────────
function speakRobotic(text, duration = 2.0) {
  if (!soundEnabled || !ensureAudio()) return;
  const chars = text.replace(/[^a-zA-Z0-9 .,!?']/g, '').split('');
  if (chars.length === 0) return;
  const baseFreq = 180;
  const t = audioCtx.currentTime;
  const charDuration = Math.min(duration / chars.length, 0.1);
  chars.forEach((ch, i) => {
    const freq = baseFreq + (ch.charCodeAt(0) % 20) * 8 + (Math.random() * 10);
    const osc = audioCtx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, t + i * charDuration);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, t + i * charDuration);
    gain.gain.linearRampToValueAtTime(0.07, t + i * charDuration + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + (i + 1) * charDuration);
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 900;
    osc.connect(filter).connect(gain).connect(tapeAmbience || audioCtx.destination);
    osc.start(t + i * charDuration);
    osc.stop(t + (i + 1) * charDuration + 0.05);
  });
}

function extractAndSpeak(sceneText) {
  const quotes = sceneText.match(/"([^"]+)"/g);
  if (quotes) {
    quotes.forEach(m => {
      const clean = m.replace(/"/g, '').trim();
      if (clean.length > 3) speakRobotic(clean, Math.min(4, clean.length * 0.08));
    });
  } else {
    // Fallback: lines that contain "says:" or similar
    const lines = sceneText.split(/[.!?]+/);
    lines.forEach(line => {
      if (/(?:says|whispers|mumbles|shouts)[:\s]/i.test(line)) {
        const match = line.match(/(?:says|whispers|mumbles|shouts)[:\s]+(.*)/i);
        if (match && match[1].trim().length > 3) speakRobotic(match[1].trim(), Math.min(4, match[1].trim().length * 0.08));
      }
    });
  }
}

function estimateSceneIntensity(text) {
  const low = ['quiet','kitchen','window','smile','child','play','morning','sun','breakfast','lawn'];
  const high = ['argument','cry','shout','slam','shadow','hide','afraid','scream','tears','lock','secret','whisper','dark'];
  let score = 0;
  const words = text.toLowerCase().split(/\W+/);
  words.forEach(w => {
    if (high.includes(w)) score += 0.25;
    else if (low.includes(w)) score -= 0.1;
  });
  return Math.min(1, Math.max(0, 0.5 + score));
}
        async function handleCommand(raw) {
            if (!raw) return;

                printInstant('Tape playing. Use CONTINUE or STOP.'); return;
            }

            if (gameState.conversationActive) {
                if (lower === '/end') { actionEndConversation(); return; }
                await handleDialogue(raw);
                return;

            else if (upper === 'OPEN') await actionOpen();

            else if (upper === 'REPAIR') await actionRepair();

            else if (upper === 'REST') await actionRest();

            else if (upper === 'REFLECT') await actionReflect();
            else if (upper === 'CLOSE') await actionCloseShop();
            else if (upper === 'HELP') openHelp();
            else if (upper === 'MUTE') { soundEnabled=false; printInstant('Muted.'); }

            else if (upper === 'CLEAR') { outputEl.innerHTML=''; playStaticBurst(); }
