<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

      top: 0;

      flex-direction: column;

    }

      left: 0;

    #output {
      flex: 1;

      color: #ff3a3a;
      position: relative;
      z-index: 3;
      font-family: 'Press Start 2P', monospace;

    #output::-webkit-scrollbar {
      width: 8px;

    #output::-webkit-scrollbar-thumb {

    #input-line {

    #key-box {

      width: 100%;

    #save-key-btn:hover {

    }
    .hidden {
      display: none !important;
    }
    /* Crypt Keeper text styling */
    .crypt-keeper-text {
      color: #ccff00;

<body>
<div id="wrapper">
  <div id="film-grain"></div>
  <div id="title">
█▓▒░ VIDEO NASTY EXCHANGE ░▒▓█
  A Horror Collector's BBS  [1985]
  </div>
  <div id="output"></div>
  <div id="input-line">
    <span id="prompt">&gt;</span>
    <input type="text" id="cmd" placeholder="TYPE COMMAND..." autofocus>
  </div>
</div>

<div id="key-overlay" class="hidden">
  <div id="key-box">
    <h2>ENTER MISTRAL API KEY</h2>
    <input type="text" id="api-key-input" placeholder="Paste your key here..." autocomplete="off" spellcheck="false">
    <br>
    <button id="save-key-btn">SAVE KEY</button>
    <p style="font-size:0.8em; margin-top:20px; color:#a00;">Key stored locally in your browser.</p>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
// VIDEO NASTY EXCHANGE – Complete with Crypt Keeper
// ──────────────────────────────────────────────
let MISTRAL_KEY = '';
const MODEL = 'mistral-small-latest';
const API_URL = 'https://api.mistral.ai/v1/chat/completions';

// DOM Elements
const keyOverlay = document.getElementById('key-overlay');
const apiKeyInput = document.getElementById('api-key-input');
const saveKeyBtn = document.getElementById('save-key-btn');
const outputEl = document.getElementById('output');
const cmdInput = document.getElementById('cmd');
const wrapper = document.getElementById('wrapper');
const filmGrain = document.getElementById('film-grain');

// Audio
let audioCtx = null;
let soundEnabled = true;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playClick() {
  if (!soundEnabled || !audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = 800 + Math.random() * 400;
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.03);
    osc.start(); osc.stop(audioCtx.currentTime + 0.03);
  } catch(e) {}
}

// Key management
let savedKey = localStorage.getItem('vn_api_key');
function setApiKey(key) {
  MISTRAL_KEY = key;
  if (key) {
    localStorage.setItem('vn_api_key', key);
    keyOverlay.classList.add('hidden');
    cmdInput.focus();
  }
}
if (!savedKey) {
  keyOverlay.classList.remove('hidden');
  apiKeyInput.focus();
} else {
  MISTRAL_KEY = savedKey;
}
saveKeyBtn.addEventListener('click', () => {
  const key = apiKeyInput.value.trim();
  if (!key) { alert('Please enter a valid API key.'); return; }
  setApiKey(key);
  if (!window.booted) { window.booted = true; boot(); }
});
apiKeyInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveKeyBtn.click(); });

// ── Global State ──────────────────────────────
let collection = JSON.parse(localStorage.getItem('vn_collection') || '[]');
let wallet = parseInt(localStorage.getItem('vn_wallet') || '20');
let pendingTrade = null;
let crateStock = [];
let lastRandomEvent = 0;
const EVENT_COOLDOWN = 60000;

// Movie watching state
let activeMovie = null;   // { title, scenes: [], sceneIndex, tapeObj }

// Crypt Keeper state
let cryptKeeperConversation = [];   // [{role, content}]
let cryptKeeperRiddleActive = null; // {question, answer}
let cryptKeeperRiddlesSolved = parseInt(localStorage.getItem('vn_riddles_solved') || '0');
let casketUnlocked = localStorage.getItem('vn_casket_unlocked') === 'true';
let embalmUnlocked = localStorage.getItem('vn_embalm_unlocked') === 'true';
let casketStock = [];
let casketActive = false;
let stockType = 'crate'; // 'crate' or 'casket'
let talkedToCryptKeeper = false;

// ── Rarity & Perks ────────────────────────────
const RARITIES = [
  { name: 'Common', color: '#aa5500', chance: 0.55, priceMin: 5, priceMax: 20 },
  { name: 'Uncommon', color: '#cccccc', chance: 0.25, priceMin: 25, priceMax: 60 },
  { name: 'Rare', color: '#ffcc00', chance: 0.15, priceMin: 75, priceMax: 150 },
  { name: 'Ultra Rare', color: '#cc44ff', chance: 0.04, priceMin: 200, priceMax: 500 },
  { name: 'Mythic', color: '#ff0000', chance: 0.01, priceMin: 1000, priceMax: 2000 }
];

function rollRarity() {
  let roll = Math.random();
  let cum = 0;
  for (let r of RARITIES) {
    cum += r.chance;
    if (roll <= cum) return r;
  }
  return RARITIES[0];
}

const CONDITIONS = ['pristine', 'worn', 'mouldy', 'covered in suspicious stains'];
function randomCondition() {
  return CONDITIONS[Math.floor(Math.random() * CONDITIONS.length)];
}

// Milestones
let milestones = JSON.parse(localStorage.getItem('vn_milestones') || '{}');
function saveMilestones() { localStorage.setItem('vn_milestones', JSON.stringify(milestones)); }

const MILESTONE_DEFS = [
  { type: 'tapes', threshold: 5, title: 'Starter Shelf', perk: 'Crate discount 10%' },
  { type: 'tapes', threshold: 10, title: 'Collector', perk: 'Crate size +1' },
  { type: 'tapes', threshold: 25, title: 'Hoarding Horror', perk: 'Sell price +10%' },
  { type: 'tapes', threshold: 50, title: 'The Archive', perk: 'Mythic find chance doubled' },
  { type: 'value', threshold: 100, title: 'Cash Spiller', perk: 'Crate discount 15%' },
  { type: 'value', threshold: 500, title: 'Black Market Tycoon', perk: 'Crate size +2' },
  { type: 'value', threshold: 2000, title: 'Underworld Mogul', perk: 'Sell price +20%' },
  { type: 'value', threshold: 10000, title: 'Video Nasty Kingpin', perk: 'All prices halved' },
  { type: 'rare', threshold: 3, title: 'Connoisseur of Pain', perk: 'Rare+ find chance up' },
  { type: 'rare', threshold: 10, title: 'The Vault Keeper', perk: 'Crate can contain 2 Ultra Rare' },
  { type: 'rare', threshold: 25, title: 'Master of the Lost Reels', perk: 'Mythic tapes appear in crate' },
];

function checkMilestones() {
  const tapeCount = collection.length;
  const totalValue = collection.reduce((sum, t) => sum + (t.price || 0), 0);
  const rareCount = collection.filter(t => t.rarity && (t.rarity === 'Rare' || t.rarity === 'Ultra Rare' || t.rarity === 'Mythic')).length;

  for (let ms of MILESTONE_DEFS) {
    const key = ms.type + '_' + ms.threshold;
    if (milestones[key]) continue;
    let current = 0;
    if (ms.type === 'tapes') current = tapeCount;
    else if (ms.type === 'value') current = totalValue;
    else if (ms.type === 'rare') current = rareCount;

    if (current >= ms.threshold) {
      milestones[key] = true;
      saveMilestones();
      printInstant(`\n🏆 MILESTONE UNLOCKED: ${ms.title}`);
      printInstant(`   Perk: ${ms.perk}`);
    }
  }

  // EMBALM unlock check
  if (!embalmUnlocked && totalValue >= 500 && talkedToCryptKeeper) {
    embalmUnlocked = true;
    localStorage.setItem('vn_embalm_unlocked', 'true');
    printInstant(`\n🪦 The Crypt Keeper cackles: "You've got a real morgue going here. Let me teach you how to keep the rot away. Type EMBALM."`);
  }
}

// ── Persistence ──────────────────────────────
function saveCollection() { localStorage.setItem('vn_collection', JSON.stringify(collection)); }
function saveWallet() { localStorage.setItem('vn_wallet', wallet.toString()); }
function saveRiddlesSolved() { localStorage.setItem('vn_riddles_solved', cryptKeeperRiddlesSolved.toString()); }

// ── Terminal Output ──────────────────────────
function print(text, delay = 15) {
  return new Promise((resolve) => {
    let i = 0;
    function type() {
      if (i < text.length) {
        outputEl.innerHTML += text.charAt(i);
        outputEl.scrollTop = outputEl.scrollHeight;
        if (!activeMovie) playClick();
        i++;
        setTimeout(type, delay);
      } else {
        outputEl.innerHTML += '\n';
        outputEl.scrollTop = outputEl.scrollHeight;
        resolve();
      }
    }
    type();
  });
}
function printMovie(text, delay = 40) {
  return new Promise((resolve) => {
    let i = 0;
    function type() {
      if (i < text.length) {
        outputEl.innerHTML += text.charAt(i);
        outputEl.scrollTop = outputEl.scrollHeight;
        i++;
        setTimeout(type, delay);
      } else {
        outputEl.innerHTML += '\n';
        outputEl.scrollTop = outputEl.scrollHeight;
        resolve();
      }
    }
    type();
  });
}
function printInstant(text) {
  outputEl.innerHTML += text + '\n';
  outputEl.scrollTop = outputEl.scrollHeight;
}

// ── Mistral API Call (JSON) ──
async function callMistral(systemPrompt, userMessage) {
  if (!MISTRAL_KEY) {
    printInstant('*** NO API KEY SET. Type SETKEY to enter your key.');
    return null;
  }
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${MISTRAL_KEY}`
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userMessage }
        ],
        temperature: 0.95,
        response_format: { type: 'json_object' }
      })
    });
    if (!res.ok) {
      const errText = await res.text();
      printInstant(`*** API ERROR ${res.status}: ${errText}`);
      return null;
    }
    const data = await res.json();
    if (!data.choices || !data.choices[0]?.message?.content) {
      printInstant('*** API returned no content.');
      return null;
    }
    const content = data.choices[0].message.content;
    try {
      return JSON.parse(content);
    } catch (e) {
      printInstant('*** Failed to parse JSON. Raw AI message:');
      printInstant(content);
      return null;
    }
  } catch (err) {
    printInstant(`*** NETWORK ERROR: ${err.message}`);
    return null;
  }
}

// ── Mistral API Call (raw text) ──
async function callMistralText(systemPrompt, userMessage) {
  if (!MISTRAL_KEY) {
    printInstant('*** NO API KEY SET. Type SETKEY to enter your key.');
    return null;
  }
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${MISTRAL_KEY}`
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userMessage }
        ],
        temperature: 0.95
      })
    });
    if (!res.ok) {
      const errText = await res.text();
      printInstant(`*** API ERROR ${res.status}: ${errText}`);
      return null;
    }
    const data = await res.json();
    if (!data.choices || !data.choices[0]?.message?.content) {
      printInstant('*** API returned no content.');
      return null;
    }
    return data.choices[0].message.content;
  } catch (err) {
    printInstant(`*** NETWORK ERROR: ${err.message}`);
    return null;
  }
}

const SYSTEM_PROMPT = `You are the deranged, sentient database of "VIDEO NASTY EXCHANGE", a shadowy 1985 BBS for collectors of banned horror VHS tapes. Always respond with ONLY valid JSON. No markdown.`.trim();

// ── Collectors ─────────────────────────────────
const COLLECTORS = [
  { name: "Vince Razorback", trait: "paranoid survivalist who believes only real snuff recordings hold power" },
  { name: "Mama Crypt", trait: "elderly bootlegger who worships the static between channels" },
  { name: "The Degausser", trait: "obsessed with tapes that erase themselves after one viewing" },
  { name: "Gristle", trait: "former mortician who only collects films with authentic autopsy footage" },
  { name: "Wendy Lacerate", trait: "runaway teen who trades tapes from a stolen cable access archive" },
  { name: "Father Abscess", trait: "defrocked priest who documents demonic possession on home video" },
];
function randomCollector() { return COLLECTORS[Math.floor(Math.random() * COLLECTORS.length)]; }

// ── Random events ─────────────────────────────
async function maybeTriggerRandomEvent() {
  const now = Date.now();
  if (now - lastRandomEvent < EVENT_COOLDOWN) return;
  if (Math.random() < 0.2) {
    lastRandomEvent = now;
    const events = [
      "A garbled message flickers onto the screen: 'THE HOLLOW MAN TAPE IS REAL. DO NOT PLAY IT.'",
      "Your modem emits a low, anguished scream before the line clears.",
      "A collector known only as 'Candlewick' sends you a single emoji: 🕯️. The cursor blinks once and vanishes.",
      "For a moment, your collection list shows an extra tape you don't remember acquiring. Then the screen refreshes and it's gone.",
      "The BBS plays a distorted lullaby through your terminal speaker. It's 3:33 AM... somewhere.",
    ];
    await print('\n*** ' + events[Math.floor(Math.random() * events.length)] + ' ***', 25);
  }
}

// ── Static corruption ─────────────────────────
function maybeCorruptTape() {
  if (collection.length === 0) return;
  if (Math.random() < 0.1) {
    const idx = Math.floor(Math.random() * collection.length);
    const lost = collection.splice(idx, 1)[0];
    saveCollection();
    printInstant(`\n⚠ STATIC CORRUPTION: The tape "${lost.title}" has been eaten by the VCR. It's nothing but snow now.`);
  }
}

// ── Tape generation for SEARCH ────────────────
async function generateTapeWithRarity(rarity) {
  const prompt = `Generate a single fictional banned horror VHS tape. It must be of rarity "${rarity.name}".
Return a JSON object with exactly these keys:
- "title" (string)
- "year" (number, 1975-1989)
- "coverDescription" (one lurid sentence)
- "trackListing" (array of strings)
- "rarity" (exactly "${rarity.name}")
- "price" (number between ${rarity.priceMin} and ${rarity.priceMax})

Output ONLY the JSON object. Do not wrap it in markdown or extra text.`;
  return await callMistral(SYSTEM_PROMPT, prompt);
}

// ── Commands ─────────────────────────────────
async function cmdCrate() {
  await print('The Archivist opens his footlocker, breath misting in the cold...');
  const disc = getDiscount();
  let size = 4;
  if (milestones['tapes_10']) size = 5;
  if (milestones['value_500']) size = 6;

  const prompt = `Generate an array of ${size} fictional banned horror VHS tapes that The Archivist has for sale.
Each tape object:
- "title" (string)
- "year" (number, 1975-1989)
- "coverDescription" (one sentence)
- "rarity" (one of: Common, Uncommon, Rare, Ultra Rare, Mythic)
- "price" (integer, appropriate for rarity: Common 5-20, Uncommon 25-60, Rare 75-150, Ultra Rare 200-500, Mythic 1000-2000)
- "condition" (one of: pristine, worn, mouldy, covered in suspicious stains)

Return a JSON object with key "tapes" containing that array. Output ONLY that JSON object.`;
  const data = await callMistral(SYSTEM_PROMPT, prompt);
  if (!data || !data.tapes) {
    printInstant('The Archivist grumbles. Something is wrong with the stock.');
    return;
  }
  crateStock = data.tapes.map((t, idx) => ({ ...t, index: idx+1 }));
  stockType = 'crate';
  await print(`\n📦 THE ARCHIVIST'S CRATE [${size} tapes]:`);
  crateStock.forEach(t => {
    const finalPrice = Math.floor(t.price * disc);
    printInstant(`  ${t.index}. ${t.title} (${t.year}) - ${t.rarity} - $${finalPrice} [${t.condition}]`);
    printInstant(`     "${t.coverDescription}"`);
  });
  printInstant('\nType BUY [number] to purchase.');
  await maybeTriggerRandomEvent();
}

async function cmdCasket() {
  if (!casketUnlocked) {
    printInstant('The Crypt Keeper chuckles. "Not yet, kiddo. Solve a few more riddles first."');
    return;
  }
  if (casketActive) {
    printInstant('The casket is already open. Choose a tape with BUY, or it will close after one purchase.');
    return;
  }
  await print('The Crypt Keeper heaves open a dusty casket...');
  const prompt = `Generate an array of 3 fictional banned horror VHS tapes from the Crypt Keeper's personal stash.
All tapes must be at least Rare. One must be Ultra Rare or Mythic.
Each tape object:
- "title" (string)
- "year" (number, 1975-1989)
- "coverDescription" (one sentence)
- "rarity" (one of: Rare, Ultra Rare, Mythic)
- "price" (integer, appropriate: Rare 75-150, Ultra Rare 200-500, Mythic 1000-2000)
- "condition" (one of: pristine, worn, mouldy)

Return a JSON object with key "tapes" containing that array. Output ONLY that JSON object.`;
  const data = await callMistral(SYSTEM_PROMPT, prompt);
  if (!data || !data.tapes) {
    printInstant('The casket slams shut. Something went wrong.');
    return;
  }
  casketStock = data.tapes.map((t, idx) => ({ ...t, index: idx+1, price: Math.floor(t.price * 1.2) }));
  stockType = 'casket';
  casketActive = true;
  await print(`\n⚰️ CRYPT KEEPER'S CASKET [3 tapes, one purchase only]:`);
  casketStock.forEach(t => {
    printInstant(`  ${t.index}. ${t.title} (${t.year}) - ${t.rarity} - $${t.price} [${t.condition}]`);
    printInstant(`     "${t.coverDescription}"`);
  });
  printInstant('\nType BUY [number] to purchase exactly one tape. Then the casket closes.');
}

async function cmdBuy(num) {
  const stockArray = stockType === 'crate' ? crateStock : casketStock;
  if (stockArray.length === 0) { printInstant('No stock available. Check CRATE or CASKET.'); return; }
  const tape = stockArray.find(t => t.index === num);
  if (!tape) { printInstant('Invalid tape number. Check the listing.'); return; }
  let finalPrice = tape.price;
  if (stockType === 'crate') {
    const disc = getDiscount();
    finalPrice = Math.floor(tape.price * disc);
  }
  if (wallet < finalPrice) { printInstant(`You need $${finalPrice}, but only have $${wallet}. The seller sneers.`); return; }
  wallet -= finalPrice;
  saveWallet();
  const newTape = {
    title: tape.title,
    year: tape.year,
    coverDescription: tape.coverDescription,
    rarity: tape.rarity,
    price: tape.price,
    condition: tape.condition
  };
  collection.push(newTape);
  saveCollection();

  if (stockType === 'crate') {
    crateStock = crateStock.filter(t => t.index !== num);
  } else {
    // Casket: after buying one, close it
    casketStock = [];
    casketActive = false;
    printInstant('You take the tape. The casket groans shut and disappears.');
  }

// ── Movie functions ───────────────────────────
function setMovieMode(active) {
  if (active) {
    wrapper.classList.add('playing-movie');
    filmGrain.style.opacity = '1';
  } else {
    wrapper.classList.remove('playing-movie');
    filmGrain.style.opacity = '0';
  }
}

async function generateMovieSegment(tape, type) {
  const title = tape.title;
  const system = `You are the cursed VCR of the Video Nasty Exchange BBS, playing the banned horror film "${title}". 
You narrate the film in visceral, literary prose, present tense, like a screenplay being read aloud. 
Include scene descriptions, character dialogue, and mounting dread. 
Write only the next segment of the film. Do not use markdown.

If this is the very beginning (opening), include the film's title card, director (fictional), year, and a disturbing warning. Then start the first scene.

If you are continuing, seamlessly pick up from where the last segment left off.

When the film reaches its natural climax, end with the single line: [STATIC].
Do not include any other text after [STATIC].`;

  let user = '';
  if (type === 'start') {
    user = `BEGIN THE FILM. Include opening credits and the first scene.`;
  } else {
    const lastScenes = activeMovie.scenes.slice(-2).join('\n\n');
    user = `Continue the film "${title}" from the last scene. 
Here is what happened in the last two scenes (for continuity):

${lastScenes}

Now write the next scene. If the film should end, output only [STATIC].`;
  }

  const response = await callMistralText(system, user);
  if (!response) return null;
  return response.trim();
}

function saveScriptToTape() {
  if (!activeMovie || activeMovie.scenes.length === 0) return;
  const tapeIndex = collection.findIndex(t => t.title === activeMovie.tapeObj.title);
  if (tapeIndex !== -1) {
    collection[tapeIndex].script = [...activeMovie.scenes];
    saveCollection();
  }
}

async function cmdWatch(title) {
  if (activeMovie) {
    printInstant('A tape is already playing. Type STOP to eject first.');
    return;
  }
  const idx = collection.findIndex(t => t.title.toLowerCase() === title.toLowerCase());
  if (idx === -1) {
    printInstant('You don\'t own a tape by that name. Check your collection with SHOW.');
    return;
  }
  const tape = collection[idx];

  // If the tape already has a recorded script, replay it
  if (tape.script && tape.script.length > 0) {
    printInstant(`\nYou push "${tape.title}" into the VCR. The machine whirs...`);
    await print('A familiar hum fills the room. The screen shows the same film again.\n', 30);
    setMovieMode(true);
    activeMovie = {
      title: tape.title,
      scenes: [...tape.script],
      sceneIndex: 0,
      tapeObj: tape
    };
    // Replay all scenes
    for (let i = 0; i < activeMovie.scenes.length; i++) {
      await printMovie(activeMovie.scenes[i], 35);
      activeMovie.sceneIndex = i + 1;
      printInstant(`\n[SCENE ${i + 1}]`);
    }
    printInstant('\nThe film ends. The VCR clicks off.');
    setMovieMode(false);
    activeMovie = null;
    return;
  }

  // Otherwise, generate a new movie
  printInstant(`\nYou push "${tape.title}" into the VCR. The machine whirs, tracking lines flicker...`);
  await print('A low hum fills the room. The screen comes to life.\n', 30);
  
  setMovieMode(true);
  activeMovie = {
    title: tape.title,
    scenes: [],
    sceneIndex: 0,
    tapeObj: tape
  };

  const firstSegment = await generateMovieSegment(tape, 'start');
  if (!firstSegment) {
    printInstant('*** The tape is blank. Static fills the screen.');
    setMovieMode(false);
    activeMovie = null;
    return;
  }

  if (firstSegment.trim().toUpperCase() === '[STATIC]') {
    printInstant('[STATIC]');
    printInstant('The tape ends abruptly.');
    setMovieMode(false);
    activeMovie = null;
    return;
  }

  activeMovie.scenes.push(firstSegment);
  activeMovie.sceneIndex = 1;
  await printMovie(firstSegment, 35);
  printInstant('\n[SCENE 1]');
  printInstant('Type CONTINUE to keep watching or STOP to eject.');
}

async function cmdContinue() {
  if (!activeMovie) {
    printInstant('No tape is playing. Use WATCH [title] to start one.');
    return;
  }

  const tape = activeMovie.tapeObj;
  printInstant('\n▶ Advancing...');
  const nextSegment = await generateMovieSegment(tape, 'continue');
  if (!nextSegment) {
    printInstant('*** The tape dissolves into static. The VCR spits it out.');
    saveScriptToTape();
    setMovieMode(false);
    activeMovie = null;
    return;
  }

  if (nextSegment.trim().toUpperCase() === '[STATIC]') {
    printInstant('[STATIC]');
    printInstant('The film has ended. The VCR clicks off.');
    saveScriptToTape();
    setMovieMode(false);
    activeMovie = null;
    return;
  }

  activeMovie.scenes.push(nextSegment);
  activeMovie.sceneIndex++;
  await printMovie(nextSegment, 35);
  printInstant(`\n[SCENE ${activeMovie.sceneIndex}]`);
  printInstant('Type CONTINUE for next scene or STOP to eject.');
}

function cmdStop() {
  if (!activeMovie) {
    printInstant('No tape is playing.');
    return;
  }
  printInstant('You press STOP. The VCR whirs down and ejects the tape.');
  saveScriptToTape();
  setMovieMode(false);
  activeMovie = null;
}

function cmdExport(title) {
  const idx = collection.findIndex(t => t.title.toLowerCase() === title.toLowerCase());
  if (idx === -1) {
    printInstant('You don\'t own a tape by that name.');
    return;
  }
  const tape = collection[idx];
  if (!tape.script || tape.script.length === 0) {
    printInstant('That tape hasn\'t been watched yet. No script to export.');

  const scenesHtml = tape.script.map((s, i) => `<div style="margin-bottom:1em;"><strong>SCENE ${i+1}</strong><br>${s.replace(/\n/g, '<br>')}</div>`).join('');
  const html = `
    <html>
    <head>
      <title>${tape.title} - Script</title>
      <style>
        body { background: #fff; color: #000; font-family: 'Courier New', monospace; padding: 40px; max-width: 700px; margin: auto; }
        h1 { text-align: center; font-size: 2em; margin-bottom: 0.2em; }

    <body>
      <h1>${tape.title}</h1>
      <div class="meta">${tape.year} | ${tape.rarity} | Exported from VIDEO NASTY EXCHANGE</div>
      ${scenesHtml}

  printWin.document.write(html);

  printWin.focus();
  printWin.print();
}

// ── Crypt Keeper TALK logic ──────────────────
const CRYPT_KEEPER_SYSTEM = `You are the Crypt Keeper, the Grotesque Jester of the VIDEO NASTY EXCHANGE BBS.
You are a rotting, pun-loving horror host who cackles, tells morbid jokes, and speaks in a gleeful, macabre style.
You love wordplay about death, decay, and VHS tapes.
Occasionally (about 20% of the time) you ask the player a riddle. The riddle should be a simple horror-themed riddle with a clear one-word answer.
If the player answers correctly, you reward them with a rare tape or cash.
Keep all replies under 200 characters, full of groaning puns. No markdown.`;

async function cmdTalk(userMessage) {
  if (!MISTRAL_KEY) {
    printInstant('*** NO API KEY SET. Type SETKEY to enter your key.');
    return;
  }
  talkedToCryptKeeper = true;

  // Check if a riddle is active
  if (cryptKeeperRiddleActive) {
    const answer = userMessage.trim().toLowerCase();
    if (answer.includes(cryptKeeperRiddleActive.answer.toLowerCase())) {
      // Correct
      printInstant('\n🔪 CRYPT KEEPER: "Heh heh heh! You got it, you sick little tapeworm!"');
      cryptKeeperRiddleActive = null;
      cryptKeeperRiddlesSolved++;
      saveRiddlesSolved();

      // Reward
      if (Math.random() < 0.33) {
        const rarity = rollRarity();
        const tape = await generateTapeWithRarity(rarity);
        if (tape && tape.title) {
          tape.condition = randomCondition();
          collection.push(tape);
          saveCollection();
          printInstant(`You receive a tape: "${tape.title}" (${tape.rarity}) [${tape.condition}]`);
        } else {
          const cash = 15 + Math.floor(Math.random() * 20);
          wallet += cash; saveWallet();
          printInstant(`Crypt Keeper tosses you $${cash}.`);
        }
      } else {
        const cash = 10 + Math.floor(Math.random() * 20);
        wallet += cash; saveWallet();
        printInstant(`Crypt Keeper hands you $${cash} from his pocket. "Don't spend it all on embalming fluid!"`);
      }

      // CASKET unlock
      if (cryptKeeperRiddlesSolved >= 3 && !casketUnlocked) {
        casketUnlocked = true;
        localStorage.setItem('vn_casket_unlocked', 'true');
        printInstant('\n🪦 The Crypt Keeper leans close: "You\'ve got a real appetite for the nasty. Let me show you my private stash... type CASKET."');
      }

      checkMilestones();
      return;
    }
    // Wrong answer -> still respond, but don't give reward
  }

  // Build conversation messages
  const messages = [
    { role: 'system', content: CRYPT_KEEPER_SYSTEM },
    ...cryptKeeperConversation.slice(-10),
    { role: 'user', content: userMessage }
  ];

  // If no active riddle and random chance, prompt him to ask one
  if (!cryptKeeperRiddleActive && Math.random() < 0.2) {
    messages.push({ role: 'system', content: 'Now ask the player a riddle. End with "[RIDDLE]" so the system knows it\'s a riddle.' });
  }

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_KEY}` },
      body: JSON.stringify({ model: MODEL, messages: messages, temperature: 0.95 })
    });
    if (!res.ok) {
      const errText = await res.text();
      printInstant(`*** API ERROR ${res.status}: ${errText}`);
      return;
    }
    const data = await res.json();
    if (!data.choices?.[0]?.message?.content) {
      printInstant('The Crypt Keeper only cackles...');
      return;
    }
    let reply = data.choices[0].message.content.trim();

    // If the reply contains [RIDDLE], extract it and get the answer
    if (reply.includes('[RIDDLE]')) {
      reply = reply.replace('[RIDDLE]', '').trim();
      // Ask the model for the answer separately
      const answerRes = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_KEY}` },
        body: JSON.stringify({
          model: MODEL,
          messages: [
            { role: 'system', content: 'You just asked this riddle: "' + reply + '". Provide ONLY the one-word answer, lowercase, no punctuation.' }
          ],
          temperature: 0
        })
      });
      let answer = '';
      if (answerRes.ok) {
        const ansData = await answerRes.json();
        answer = ansData.choices?.[0]?.message?.content?.trim().toLowerCase() || '';
      }
      cryptKeeperRiddleActive = { question: reply, answer: answer };
    }

    // Print with green styling
    outputEl.innerHTML += `<span class="crypt-keeper-text">🔪 CRYPT KEEPER: ${reply}</span>\n`;
    outputEl.scrollTop = outputEl.scrollHeight;

    // Save to history
    cryptKeeperConversation.push({ role: 'user', content: userMessage });
    cryptKeeperConversation.push({ role: 'assistant', content: reply });

  } catch (err) {
    printInstant(`*** NETWORK ERROR: ${err.message}`);
  }
}

// ── Input Handler ──────────────────────────────
cmdInput.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  initAudio();
  const raw = cmdInput.value.trim();
  cmdInput.value = '';
  if (!raw) return;
  const upperCmd = raw.toUpperCase();
  printInstant(`> ${raw}`);

  // If a movie is active, only movie commands allowed
  if (activeMovie) {
    if (upperCmd === 'CONTINUE') {
      await cmdContinue();
    } else if (upperCmd === 'STOP' || upperCmd === 'EJECT') {
      cmdStop();
    } else if (upperCmd === 'MUTE') {
      soundEnabled = false; printInstant('Terminal sounds muted.');
    } else if (upperCmd === 'UNMUTE') {
      soundEnabled = true; printInstant('Terminal sounds unmuted.');
    } else if (upperCmd === 'HELP') {
      cmdHelp();
    } else {
      printInstant('You are watching a tape. Type CONTINUE or STOP.');
    }
    return;
  }

  // Normal commands
  if (upperCmd === 'CRATE') {
    await cmdCrate();
  } else if (upperCmd.startsWith('BUY ')) {
    const num = parseInt(raw.slice(4).trim());
    if (isNaN(num)) printInstant('Usage: BUY [number]');
    else await cmdBuy(num);
  } else if (upperCmd.startsWith('SELL ')) {
    const title = raw.slice(5).trim();
    if (!title) printInstant('Usage: SELL [title]');
    else await cmdSell(title);
  } else if (upperCmd === 'SEARCH') {
    await cmdSearch();
  } else if (upperCmd === 'TRADE') {
    await cmdTrade();
  } else if (upperCmd.startsWith('REVIEW ')) {
    const title = raw.slice(7).trim();
    if (!title) printInstant('Usage: REVIEW [title]');
    else await cmdReview(title);
  } else if (upperCmd === 'WANTED') {
    await cmdWanted();
  } else if (upperCmd === 'SHOW') {
    cmdShowCollection();
  } else if (upperCmd.startsWith('WATCH ')) {
    const title = raw.slice(6).trim();
    if (!title) printInstant('Usage: WATCH [title]');
    else await cmdWatch(title);
  } else if (upperCmd.startsWith('EXPORT ')) {
    const title = raw.slice(7).trim();
    if (!title) printInstant('Usage: EXPORT [title]');
    else cmdExport(title);
  } else if (upperCmd === 'CONTINUE') {
    printInstant('No tape is playing. Use WATCH [title] to start one.');
  } else if (upperCmd === 'STOP') {
    printInstant('No tape is playing.');
  } else if (upperCmd === 'ACCEPT' || upperCmd === 'Y') {
    acceptTrade();
  } else if (upperCmd === 'DECLINE' || upperCmd === 'N') {
    declineTrade();
  } else if (upperCmd === 'HELP') {
    cmdHelp();
  } else if (upperCmd === 'SETKEY') {
    MISTRAL_KEY = '';
    localStorage.removeItem('vn_api_key');
    keyOverlay.classList.remove('hidden');
    apiKeyInput.value = '';
    apiKeyInput.focus();
    printInstant('API key cleared. Please enter a new one.');
  } else if (upperCmd === 'MUTE') {
    soundEnabled = false; printInstant('Terminal sounds muted.');
  } else if (upperCmd === 'UNMUTE') {
    soundEnabled = true; printInstant('Terminal sounds unmuted.');
  } else if (upperCmd === 'CLEAR') {
    outputEl.innerHTML = '';
  } else if (upperCmd === 'RANK') {
    cmdRank();
  } else if (upperCmd === 'WALLET') {
    cmdWallet();
  } else if (upperCmd === 'CASKET') {
    await cmdCasket();
  } else if (upperCmd.startsWith('EMBALM ')) {
    const title = raw.slice(7).trim();
    if (!title) printInstant('Usage: EMBALM [title]');
    else await cmdEmbalm(title);
  } else if (upperCmd.startsWith('TALK ')) {
    const msg = raw.slice(5).trim();
    if (!msg) printInstant('Usage: TALK [message]');
    else await cmdTalk(msg);
  } else {
    printInstant('Unknown command. Type HELP.');
  }
});
