    let gamebook = {};

    function parseGamebook(text) {
      const pages = {};
      // Matches both "Page 1:" and "**Page 985 (...):**"
      const pageRegex = /(?:\*\*)?Page (\d+)(?: \(.*?\))?\:?(?:\*\*)?([\s\S]*?)(?=(?:\*\*)?Page \d+|$)/gi;
      let match;

      while ((match = pageRegex.exec(text)) !== null) {
        const pageNum = parseInt(match[1]);
        let content = match[2].trim();
        content = content.replace(/\*\*/g, '');   // clean any leftover **

        const lines = content.split('\n');
        let mainTextLines = [];
        let choices = [];

        for (let line of lines) {
          line = line.trim();
          if (!line) continue;

          // === SUPER ROBUST CHOICE DETECTOR ===
          // Looks for ANY occurrence of "(Turn to Page N)" in the line
          const choiceMatch = line.match(/\(Turn to Page (\d+)\)/i);
          if (choiceMatch) {
            // Everything BEFORE the "(Turn to Page" becomes the choice text
            const turnIndex = line.toLowerCase().indexOf('(turn to page');
            let choiceText = line.substring(0, turnIndex).trim();
            
            // Remove leading "-" if present (common in your file)
            if (choiceText.startsWith('-')) {
              choiceText = choiceText.substring(1).trim();
            }
            
            choices.push({
              text: choiceText,
              target: parseInt(choiceMatch[1])
            });
          } else {
            mainTextLines.push(line);
          }
        }

        pages[pageNum] = {
          text: mainTextLines.join('<br>'),
          choices: choices
        };
      }
      return pages;
    }

            </div>`;
        });
      } else {

    }

    function updateSidebar() {
      document.getElementById("hp").textContent = player.hp;
      document.getElementById("inventory").innerHTML = player.inventory.map(i => `<li>• ${i}</li>`).join('');
      document.getElementById("weapons").innerHTML = player.weapons.map(w => `<li>• ${w}</li>`).join('');
    }

    function goToPageManual() {
      const input = document.getElementById("pageInput");
      const num = parseInt(input.value);
      if (isNaN(num)) return;
      appendToLog(`<div style="color:#00AA00;">→ JUMPING TO PAGE ${num}...</div>`);
      loadPage(num);
      input.value = '';
    }

    function rollDice() {
      const roll = Math.floor(Math.random() * 6) + 1;
      const resultDiv = document.getElementById("diceResult");
      let msg = `DICE ROLL: ${roll} `;
      if (roll % 2 === 1) {
        player.hp = Math.max(0, player.hp - 15);
        msg += `→ TRAP HITS! -15 HP`;
      } else {
        msg += `→ TRAP MISSED`;
      }
      resultDiv.innerHTML = msg;
      updateSidebar();
      if (player.hp <= 0) {
        appendToLog(`<div style="color:#FF0000; text-align:center; font-size:28px;">YOU HAVE PERISHED IN THE STORM...</div>`);
      }
    }

    function saveGame() {
      const saveData = { page: currentPage, player: player };
      localStorage.setItem("keepersWatchSave", JSON.stringify(saveData));
      alert("GAME SAVED TO DISK");
    }

    function loadGame() {
      const saved = localStorage.getItem("keepersWatchSave");
      if (!saved) { alert("NO SAVE FILE FOUND"); return; }
      const data = JSON.parse(saved);
      currentPage = data.page;
      player = data.player;
      document.getElementById("gamelog").innerHTML = "";
      loadPage(currentPage);
      alert("GAME LOADED FROM DISK");
    }

    function restartGame() {
      if (confirm("REBOOT GAME FROM PAGE 1?")) {
        player.hp = 100;
        player.inventory = ["Lantern", "Flintlock Pistol", "Spyglass", "Rope", "Extra oil for the lighthouse lamp"];
        player.weapons = ["Dagger", "Flintlock Pistol"];
        document.getElementById("gamelog").innerHTML = "";
        loadPage(1);
      }
    }

    // =============================================
    // BOOT THE GAME
    // =============================================
    window.onload = function() {
      gamebook = parseGamebook(rawGameText);
      
      const numPages = Object.keys(gamebook).length;
      
      const bootScreen = `
        <div style="color:#00AA00; text-align:center; margin-top:40px;">
          INITIALIZING LIGHTHOUSE DATABASE...<br>
          LOADING MIXED FORMATS (Page 1-26 + **Page 27+**)...<br>
          <strong>${numPages} PAGES LOADED SUCCESSFULLY</strong><br><br>
          PRESS ANY CHOICE OR TYPE PAGE NUMBER TO BEGIN
        </div>
        <hr>
      `;
      document.getElementById("gamelog").innerHTML = bootScreen;
      
      loadPage(1);
    };
  </script>
</body>
</html>
