<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>REELTALK · FILM DATABASE · 1987</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a08;
      --panel-bg: #0d0f0d;
      --text: #33ff44;
      --text-dim: #1a7a22;
      --text-bright: #66ff77;
      --accent: #ff8833;
      --accent-dim: #aa5522;
      --accent2: #ffbb00;
      --border: #33ff44;
      --border-glow: 0 0 6px #33ff4466;
      --danger: #ff4444;
      --danger-glow: 0 0 6px #ff444466;
      --input-bg: #111511;
      --button-bg: #1a2a1a;
      --button-hover: #1f3520;
      --font-display: 'VT323', 'Courier New', monospace;
      --font-mono: 'Share Tech Mono', 'Courier New', monospace;
      --scanline-opacity: 0.05;
    }
    .pda[data-theme="amber"] {
      --text: #ffb000; --text-dim: #aa7700; --text-bright: #ffcc44; --accent: #ff6600; --accent-dim: #884400;
      --border: #ffb000; --border-glow: 0 0 6px #ffb00066; --input-bg: #1a1300; --button-bg: #2a2000; --button-hover: #332800;
    }
    .pda[data-theme="pink"] {
      --text: #ff66aa; --text-dim: #aa3377; --text-bright: #ff88cc; --accent: #ff3388; --accent-dim: #882244;
      --border: #ff66aa; --border-glow: 0 0 6px #ff66aa66; --input-bg: #1a0a14; --button-bg: #2a1420; --button-hover: #331a28;
    }
    .pda[data-theme="blue"] {
      --text: #44aaff; --text-dim: #2266aa; --text-bright: #77ccff; --accent: #0088ff; --accent-dim: #004488;
      --border: #44aaff; --border-glow: 0 0 6px #44aaff66; --input-bg: #0a1020; --button-bg: #14202a; --button-hover: #1a2833;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #050505; display: flex; justify-content: center; align-items: center; min-height: 100vh;
      font-family: var(--font-display); padding: 12px;
      background-image: radial-gradient(ellipse at center, #0a0f0a 0%, #020302 100%);
    }
    .pda {
      max-width: 820px; width: 100%; height: 94vh; max-height: 980px; background: #0b0d0b; border-radius: 18px;
      border: 3px solid #2a3a2a; box-shadow: 0 0 30px #33ff4422, 0 0 80px #000000aa, 0 8px 32px #000000cc, inset 0 1px 0 #ffffff08, inset 0 0 60px #00000044;
      display: flex; flex-direction: column; overflow: hidden; position: relative;
    }
    .crt-overlay {
      position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index:900;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,var(--scanline-opacity)) 0px, rgba(0,0,0,var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
      border-radius:15px;
    }
    .crt-overlay::after {
      content:''; position:absolute; top:0; left:0; width:100%; height:100%;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
      border-radius:15px; pointer-events: none;
    }
    .status-bar {
      padding: 10px 16px 8px; display:flex; justify-content:space-between; align-items:center;
      font-family: var(--font-mono); font-size:11px; color:var(--text); text-shadow:0 0 4px var(--text-dim);
      border-bottom:1px solid #1a2a1a; background:#0a0d0a; letter-spacing:1px; z-index:10; position:relative;
    }
    .status-dot {
      display:inline-block; width:7px; height:7px; background:var(--text); border-radius:50%; margin-right:6px;
      animation: blinkDot 1.6s infinite; box-shadow:0 0 6px var(--text);
    }
    @keyframes blinkDot { 0%,70%,100% { opacity:1; } 80%,90% { opacity:0.2; } }
    .notification-bell { cursor:pointer; position:relative; font-size:16px; margin-left:12px; }
    .notification-badge {
      background:var(--accent); color:#000; font-size:10px; font-weight:bold; border-radius:50%; padding:1px 5px;
      position:absolute; top:-6px; right:-10px; display:none; line-height:1;
    }
    .title-bar {
      text-align:center; padding:8px 16px 4px; font-family: var(--font-display); font-size:26px; letter-spacing:3px;
      color:var(--text); text-shadow:0 0 12px var(--text),0 0 24px var(--text-dim),0 0 40px #33ff4433;
      background:#0a0d0a; border-bottom:1px solid #1a2a1a; z-index:10; display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .main-area {
      flex:1; overflow-y:auto; padding:12px; font-family: var(--font-mono); font-size:13px; color:var(--text);
      background:var(--panel-bg); scrollbar-width:thin; scrollbar-color:#1a2a1a #0a0d0a; position:relative; z-index:5;
    }
    .menu-item {
      display:block; padding:8px 14px; margin:4px 0; border:1px solid #1a2a1a; background:var(--button-bg);
      color:var(--text); cursor:pointer; border-radius:6px; text-decoration:none; transition:all 0.15s;
      font-family:var(--font-display); font-size:16px; letter-spacing:1px;
    }
    .menu-item:hover { background:var(--button-hover); border-color:var(--text); box-shadow:var(--border-glow); }
    .btn {
      background:var(--button-bg); border:2px solid #1a3a1a; padding:6px 14px; border-radius:6px; color:var(--text);
      cursor:pointer; font-family:var(--font-display); font-size:15px; letter-spacing:1px; transition:all 0.2s;
      text-shadow:0 0 4px var(--text-dim); text-transform:uppercase; margin:2px;
    }
    .btn:hover { background:var(--button-hover); border-color:var(--text); box-shadow:var(--border-glow); }
    .btn.accent { border-color:var(--accent); color:var(--accent); box-shadow:0 0 8px var(--accent-dim); }
    .btn.accent:hover { box-shadow:0 0 16px var(--accent); }
    .star-btn { background:transparent; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; transition:0.1s; }
    .star-btn.active { color:var(--accent2); text-shadow:0 0 8px var(--accent2); }
    .modal {
      display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%;
      background:rgba(0,0,0,0.92); align-items:center; justify-content:center;
    }
    .modal-content {
      background:#0d110d; border-radius:16px; width:480px; max-width:94vw; padding:20px; border:2px solid #2a3a2a;
      box-shadow:0 0 40px #33ff4422; font-family:var(--font-mono); color:var(--text); max-height:86vh; overflow-y:auto;
    }
    .input-field {
      background:var(--input-bg); border:1px solid #1a2a1a; border-radius:10px; padding:8px 12px; color:var(--text);
      font-family:var(--font-mono); font-size:13px; outline:none; width:100%; margin:5px 0;
    }
    textarea.input-field { resize:vertical; min-height:60px; }
    select.input-field { cursor:pointer; }
    .unread-badge { background:var(--accent); color:#000; font-size:10px; font-weight:bold; border-radius:50%; padding:2px 6px; margin-left:6px; }
    hr { border-color:#1a2a1a; margin:10px 0; }
    .film-card {
      background:#0f140f; padding:10px; margin:6px 0; border-radius:8px; border:1px solid #1a2a1a;
      cursor:pointer; transition:all 0.15s; display:flex; gap:10px; align-items:flex-start;
    }
    .film-card:hover { border-color:var(--text); box-shadow:var(--border-glow); }
    .film-poster {
      width:70px; height:90px; background:#0a0d0a; border:1px solid #1a2a1a; border-radius:4px;
      display:flex; align-items:center; justify-content:center; font-size:8px; color:var(--text-dim);
      text-align:center; flex-shrink:0; overflow:hidden; white-space:pre; line-height:1.1;
    }
    .review-block {
      background:#0a0f0a; padding:7px; margin:3px 0; border-radius:6px; border-left:2px solid #1a3a1a; font-size:12px;
    }
    .forum-post {
      background:#0f140f; padding:8px; margin:4px 0; border-radius:6px; border:1px solid #1a2a1a;
    }
    .forum-reply {
      background:#0a0f0a; padding:6px; margin:2px 0 2px 20px; border-radius:4px; border-left:2px solid #1a3a1a;
    }
    .notification-item { padding:7px; margin:4px 0; background:#0f140f; border-radius:6px; cursor:pointer; font-size:12px; }
    .notification-item.unread { border-left:3px solid var(--accent); }
  </style>
</head>
<body>
<div class="pda" data-theme="default">
  <div class="crt-overlay"></div>

  <div class="title-bar">🎬 REELTALK <span style="font-size:10px;letter-spacing:2px;color:#1a5a1a;">FILM DATABASE · 1987</span></div>

</div>
<div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>
<div id="inboxModal" class="modal"><div class="modal-content" id="inboxModalContent"></div></div>

<script>
const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
const MODEL = 'mistral-small-latest';
let apiKey = localStorage.getItem('mistral_api_key') || '';
let world = null;
let lastPollinationsCall = 0;
let currentTheme = localStorage.getItem('reeltalk_theme') || 'default';
const LOCATIONS = ["Your House","Main Street","Video Rental Store","Diner","General Store","Sheriff's Office","Library","Park","Lake","Gas Station","Church","Motel","School"];
const GENRES = ['Action','Comedy','Horror','Sci-Fi','Drama','Animation','Thriller','Romance','Documentary','Musical','Western','Fantasy'];
const HARDCODED_PERSONALITIES = [
  {style:"the film buff",traits:["cinephile","detail-oriented","quotes-movies","analytical"]},
  {style:"the home video enthusiast",traits:["family-oriented","nostalgic","amateur-filmmaker","enthusiastic"]},
  {style:"the horror fanatic",traits:["gore-lover","night-owl","collector","excitable"]},
  {style:"the art film snob",traits:["pretentious","black-and-white-lover","subtitles-purist","discerning"]},
  {style:"the action junkie",traits:["explosion-lover","one-liner-quoter","high-energy","testosterone-fueled"]},
  {style:"the comedy collector",traits:["laughter-filled","impressionist","gag-reel-hoarder","lighthearted"]},
  {style:"the sci-fi dreamer",traits:["futurist","special-effects-admirer","Star-Trek-quoter","imaginative"]},
  {style:"the music video archivist",traits:["MTV-addict","concert-recorder","audio-snob","trendy"]},
  {style:"the documentary truth-seeker",traits:["investigative","serious","fact-checker","earnest"]}
];

const uid = () => Date.now().toString(36)+'-'+Math.random().toString(36).substr(2,8);
let audioCtx = null;
function ensureAudio(){ if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){return false;} } if(audioCtx.state==='suspended') audioCtx.resume().catch(()=>{}); return audioCtx.state!=='closed'; }
function playClick(){ if(!ensureAudio())return; const t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.type='sine'; o.frequency.setValueAtTime(700,t); o.frequency.exponentialRampToValueAtTime(500,t+0.06); g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.08); o.start(t); o.stop(t+0.08); }
function playNotification(){ if(!ensureAudio())return; const t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.type='sine'; o.frequency.setValueAtTime(880,t); g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12); o.start(t); o.stop(t+0.12); }

function getAsciiLines(poster) {
  // If it's a string, split into lines and take up to 4.
  if (typeof poster === 'string' && poster.trim().length > 0) {
    return poster.split('\n').slice(0, 4).join('\n');
  }
  // If it's an array, join with newlines and take first 4.
  if (Array.isArray(poster)) {
    return poster.slice(0, 4).join('\n');
  }
  // Fallback for anything else.
  return '???';
}

function saveWorld(){ localStorage.setItem('reeltalk_world', JSON.stringify(world)); }
function loadWorld(){
  const saved = localStorage.getItem('reeltalk_world');
  if(saved){
    world = JSON.parse(saved);
    // Sanitize old film data
    if (world.social && world.social.films) {
      world.social.films.forEach(f => {
        if (typeof f.asciiPoster !== 'string') f.asciiPoster = sanitizeAscii(f.asciiPoster);
      });
    }
    if(!world.social) world.social = {};
    if(!world.social.films) world.social.films = [];
    if(!world.social.watchlist) world.social.watchlist = {};
    if(!world.social.notifications) world.social.notifications = [];
    if(!world.inbox) world.inbox = [];
    world.social.films.forEach(f=>{
      if(!f.reviews) f.reviews = [];
      if(!f.forumPosts) f.forumPosts = [];
      f.reviews.forEach(r=>{ if(!r.rating) r.rating = 0; });
    });
// Second: ensure every review has a reviewRatings array
world.social.films.forEach(f => {
  f.reviews.forEach(r => {
    if (!r.reviewRatings) r.reviewRatings = [];
  });
});
    if(!world.social.watchlist[world.player.id]) world.social.watchlist[world.player.id] = [];
    return true;
  }
  return false;
}async function mistralChat(messages, maxTok=300, jsonMode=true){
  if(!apiKey) throw new Error('No API key');
  const body = { model:MODEL, messages, temperature:0.9, max_tokens:maxTok };
  if(jsonMode) body.response_format = { type:"json_object" };
  const res = await fetch(MISTRAL_ENDPOINT, { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey}, body:JSON.stringify(body) });
  if(!res.ok) {
    if(res.status===429) throw new Error('Rate limited. Please wait a moment.');
    throw new Error('API '+res.status);
  }
  const data = await res.json();
  let content = data.choices[0].message.content.trim();
  if(jsonMode){ content = content.replace(/^```json\s*/,'').replace(/```\s*$/,'').trim(); try{ return JSON.parse(content); }catch(e){ throw new Error('Invalid JSON from AI'); } }
  return content;
}
function esc(s){ return String(s??'').replace(/[&<>'"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[m]); }
function sanitizeAscii(poster) {
  if (typeof poster === 'string') return poster;
  if (Array.isArray(poster)) return poster.join('\n');
  return '???';   // fallback
}
function getNpcById(id){ return world.npcs.find(n=>n.id===id); }
function getTotalGameMinutes(){ return world.time.day*1440 + world.time.hour*60 + world.time.minute; }
function pollinationsImageUrl(film) {
  const prompt = `1980s movie poster VHS cover art for "${film.title}" ${film.genre}`;
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=300&height=400&nologo=true`;
}
function timeStr(){ return `${String(world.time.hour).padStart(2,'0')}:${String(world.time.minute).padStart(2,'0')}`; }
function updateStatusBar(){ document.getElementById('statusTime').textContent = `Day ${world.time.day} ${timeStr()}`; updateNotifBadge(); }
function applyTheme(t){ document.querySelector('.pda').setAttribute('data-theme', t); }

function addNotification(fromId, toId, type, text, linkData){
  if(toId !== world.player.id) return;
  world.social.notifications.push({ id:uid(), fromId, toId, type, text, read:false, timestamp:getTotalGameMinutes(), linkData:linkData||{} });
  updateNotifBadge(); playNotification(); saveWorld();
}
function updateNotifBadge(){
  const badge = document.getElementById('notifBadge');
  if(!world||!world.social.notifications) return;
  const unread = world.social.notifications.filter(n=>!n.read).length;
  badge.textContent = unread;
  badge.style.display = unread>0 ? 'block' : 'none';
}

function getFilmAverageRating(film){
  const ratings = film.reviews.filter(r=>r.rating>0).map(r=>r.rating);
  if(ratings.length===0) return 0;
  return (ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1);
}
function getFilmStarDisplay(film){
  const avg = parseFloat(getFilmAverageRating(film));
  let stars = '';
  for(let i=1;i<=5;i++) stars += i<=Math.round(avg) ? '★' : '☆';
  return stars + ` (${film.reviews.filter(r=>r.rating>0).length})`;
}

// ──────────────────────── MAIN MENU ────────────────────────
function showMainMenu(){
  let unreadInbox = 0;
  if(world.inbox) world.inbox.forEach(t=>t.messages.forEach(m=>{ if(m.sender==='npc'&&!m.read) unreadInbox++; }));
  let unreadNotifs = world.social.notifications.filter(n=>!n.read).length;
  const filmCount = world.social.films.length;
  const main = document.getElementById('mainScreen');
  main.innerHTML = `
    <pre style="font-size:13px;line-height:1.1;text-align:center;margin-bottom:8px;">
██████╗ ███████╗███████╗██╗  ████████╗ █████╗ ██╗     ██╗  ██╗
██╔══██╗██╔════╝██╔════╝██║  ╚══██╔══╝██╔══██╗██║     ██║ ██╔╝
██████╔╝█████╗  █████╗  ██║     ██║   ███████║██║     █████╔╝
██╔══██╗██╔══╝  ██╔══╝  ██║     ██║   ██╔══██║██║     ██╔═██╗
██║  ██║███████╗███████╗███████╗██║   ██║  ██║███████╗██║  ██╗
╚═╝  ╚═╝╚══════╝╚══════╝╚══════╝╚═╝   ╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝
    FILM DATABASE · 1987</pre>
    <div style="display:flex;flex-direction:column;gap:5px;">
      <div class="menu-item" id="menuBrowse">🎞️ Browse Films (${filmCount} in database)</div>
      <div class="menu-item" id="menuTopRated">⭐ Top Rated</div>
      <div class="menu-item" id="menuSearch">🔍 Search</div>
      <div class="menu-item" id="menuWatchlist">📋 My Watchlist</div>
      <div class="menu-item" id="menuMyReviews">✍️ My Reviews</div>
      <div class="menu-item" id="menuNotifications">🔔 Notifications ${unreadNotifs?`<span class="unread-badge">${unreadNotifs}</span>`:''}</div>
      <div class="menu-item" id="menuInbox">📬 Private Mail ${unreadInbox?`<span class="unread-badge">${unreadInbox}</span>`:''}</div>
      <div class="menu-item" id="menuSave">💾 Save</div>
      <div class="menu-item" id="menuTheme">🎨 Theme</div>
      <div class="menu-item" id="menuNewGame">🔄 New Game</div>
    </div>`;
  document.getElementById('notifBell').onclick = ()=>{ playClick(); showNotifications(); };
  document.getElementById('menuBrowse').onclick = ()=>{ playClick(); browseFilms(); };
  document.getElementById('menuTopRated').onclick = ()=>{ playClick(); browseFilms(null,'rating'); };
  document.getElementById('menuSearch').onclick = ()=>{ playClick(); showSearch(); };
  document.getElementById('menuWatchlist').onclick = ()=>{ playClick(); showWatchlist(); };
  document.getElementById('menuMyReviews').onclick = ()=>{ playClick(); showMyReviews(); };
  document.getElementById('menuNotifications').onclick = ()=>{ playClick(); showNotifications(); };
  document.getElementById('menuInbox').onclick = ()=>{ playClick(); showInboxList(); };
  document.getElementById('menuSave').onclick = ()=>{ playClick(); saveWorld(); alert('Saved.'); };
  document.getElementById('menuTheme').onclick = ()=>{ playClick(); const themes=['default','amber','pink','blue']; const idx=themes.indexOf(currentTheme); currentTheme=themes[(idx+1)%themes.length]; applyTheme(currentTheme); localStorage.setItem('reeltalk_theme',currentTheme); };
  document.getElementById('menuNewGame').onclick = ()=>{ playClick(); if(confirm('Start new? All progress lost.')) startNewGame(); };
}

// ──────────────────────── BROWSE FILMS ────────────────────────
function browseFilms(genreFilter=null, sortBy='title'){
  let films = [...world.social.films];
  if(genreFilter) films = films.filter(f=>f.genre===genreFilter);
  if(sortBy==='rating') films.sort((a,b)=>parseFloat(getFilmAverageRating(b))-parseFloat(getFilmAverageRating(a)));
  else if(sortBy==='year') films.sort((a,b)=>b.year-a.year);
  else films.sort((a,b)=>a.title.localeCompare(b.title));
  let html = `<h2>🎞️ Film Library</h2><button class="btn" id="backBrowseBtn">⬅️ Back</button>
    <button class="btn" id="sortTitle">A-Z</button>
    <button class="btn" id="sortYear">📅 Year</button>
    <button class="btn" id="sortRating">⭐ Rating</button>
    <hr><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;">
    <button class="btn genre-filter-btn ${!genreFilter?'accent':''}" data-genre="">All</button>
    ${GENRES.map(g=>`<button class="btn genre-filter-btn ${genreFilter===g?'accent':''}" data-genre="${g}">${g}</button>`).join('')}
    </div><hr>`;
  films.forEach(f=>{
    html += `<div class="film-card" data-filmId="${f.id}">
      <div class="film-poster">${esc(getAsciiLines(f.asciiPoster))}</div>
      <div style="flex:1;">
        <strong>${esc(f.title)}</strong> (${f.year})
        <div style="font-size:10px;color:var(--text-dim);">${esc(f.genre)} · Dir. ${esc(f.director)}</div>
        <div style="font-size:11px;color:var(--accent2);">${getFilmStarDisplay(f)}</div>
      </div>
    </div>`;
  });
  document.getElementById('mainScreen').innerHTML = html;
  document.getElementById('backBrowseBtn').onclick = ()=>{ playClick(); showMainMenu(); };
  document.getElementById('sortTitle').onclick = ()=>{ playClick(); browseFilms(genreFilter,'title'); };
  document.getElementById('sortYear').onclick = ()=>{ playClick(); browseFilms(genreFilter,'year'); };
  document.getElementById('sortRating').onclick = ()=>{ playClick(); browseFilms(genreFilter,'rating'); };
  document.querySelectorAll('.genre-filter-btn').forEach(b=>b.onclick = ()=>{ playClick(); browseFilms(b.dataset.genre||null, sortBy); });

      film.title}" (${film.year}), directed by ${film.director}. Genre: ${film.genre}. 
Description: ${film.description}. 
Cast: ${film.cast?.join(', ') || 'Unknown'}.

Start with a retro title screen and then write the full movie in screenplay format: scene headings, action, and dialogue. Make it feel like a vintage computer playing a film. **Do NOT use markdown formatting – no asterisks for bold or italic, no symbols at all. Output plain text only.** Keep it around 2000 tokens, but make it a satisfying story. Output ONLY the movie script, no extra commentary.`;

// ---------- Typewriter + TTS helper ----------
function playMovie(text) {
  const movieTextEl = document.getElementById('movieText');
  const cursorEl = document.getElementById('cursor');
  if (!movieTextEl) return;

  // Check for speech synthesis support
  if (!window.speechSynthesis) {
    // Fallback: just reveal text quickly
    movieTextEl.textContent = text;
    if (cursorEl) cursorEl.style.display = 'none';
    return;
  }

  // Cancel any ongoing speech
  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.9;   // slightly slower for dramatic effect
  utterance.pitch = 1;
  utterance.volume = 1;

  // Sync typewriter with spoken words
  utterance.onboundary = (event) => {
    if (event.name === 'word') {
      const upTo = event.charIndex;
      movieTextEl.textContent = text.substring(0, upTo);
      // Keep cursor after the revealed text
      if (cursorEl) cursorEl.style.display = 'inline';
    }
  };

  utterance.onend = () => {
    // Show full text when done
    movieTextEl.textContent = text;
    if (cursorEl) cursorEl.style.display = 'none';
  };

  utterance.onerror = (e) => {
    console.warn('Speech error:', e);
    // Show full text and hide cursor on error
    movieTextEl.textContent = text;
    if (cursorEl) cursorEl.style.display = 'none';
  };

  // Start speaking
  window.speechSynthesis.speak(utterance);

  // Blink cursor
  let blinkInterval = setInterval(() => {
    if (cursorEl) cursorEl.style.visibility = (cursorEl.style.visibility === 'hidden') ? 'visible' : 'hidden';
  }, 500);

  // Clean up blink when speech ends
  utterance.onend = () => {
    clearInterval(blinkInterval);
    movieTextEl.textContent = text;
    if (cursorEl) cursorEl.style.display = 'none';
  };
  utterance.onerror = () => {
    clearInterval(blinkInterval);
    movieTextEl.textContent = text;
    if (cursorEl) cursorEl.style.display = 'none';
  };
}

async function generatePosterForFirstFilm(film) {
  // Respect 30‑second rate limit
  const NOW = Date.now();
  if (NOW - lastPollinationsCall < 30000) return;

  const posterDiv = document.querySelector(`.film-card[data-filmId="${film.id}"] .film-poster`);
  if (!posterDiv) return;

  // Show loading state
  posterDiv.innerHTML = '<span style="color:var(--text-dim);">Loading cover…</span>';
  posterDiv.style.fontSize = '8px';  // keep small

  try {
    const url = pollinationsImageUrl(film);
    lastPollinationsCall = Date.now();

    const img = new Image();
    img.onload = () => {
      posterDiv.innerHTML = '';
posterDiv.appendChild(img);
img.style.width = '100%';
img.style.height = '100%';
img.style.objectFit = 'cover';

// Save the URL to the film object so it can be used elsewhere
film.posterUrl = url;
saveWorld();
    };
    img.onerror = () => {
      // Fallback to ASCII
      posterDiv.innerHTML = esc(getAsciiLines(film.asciiPoster));
      posterDiv.style.fontSize = '8px';
    };
    img.src = url;
  } catch (e) {
    // Network error – fallback
    posterDiv.innerHTML = esc(getAsciiLines(film.asciiPoster));
  }
}

  if (!world.inbox || !world.inbox.length) {
    document.getElementById('mainScreen').innerHTML = `<h2>📬 Private Mail</h2><p>No messages.</p><button class="btn" id="backInbox">⬅️ Back</button>`;
    document.getElementById('backInbox').onclick = ()=>{ playClick(); showMainMenu(); };
    return;
  }
  let html = `<h2>📬 Private Mail</h2><button class="btn" id="backInbox">⬅️ Back</button>`;
  world.inbox.forEach(thread => {
    const npc = getNpcById(thread.npcId);
    if (!npc) return;
    const unread = thread.messages.filter(m => m.sender === 'npc' && !m.read).length;
    html += `<div class="menu-item" data-npcid="${thread.npcId}">${esc(npc.name)} ${unread?`<span class="unread-badge">${unread}</span>`:''}</div>`;
  });
  document.getElementById('mainScreen').innerHTML = html;
  document.getElementById('backInbox').onclick = ()=>{ playClick(); showMainMenu(); };
  document.querySelectorAll('.menu-item[data-npcid]').forEach(el => el.onclick = ()=>{ playClick(); openChat(el.dataset.npcid); });
}

function openChat(npcId){
  const npc = getNpcById(npcId);
  if (!npc) return;
  let thread = world.inbox.find(t => t.npcId === npcId);
  if (!thread) { thread = { npcId, messages: [] }; world.inbox.push(thread); }
  thread.messages.forEach(m => { if (m.sender === 'npc') m.read = true; });
  saveWorld();
  const content = document.getElementById('inboxModalContent');
  content.innerHTML = `
    <h2>💬 Chat with ${esc(npc.name)}</h2>
    <div id="chatMessages" style="max-height:250px;overflow-y:auto;background:#0a0d0a;padding:8px;border-radius:6px;margin-bottom:8px;">
      ${thread.messages.map(m=>`<div style="margin:4px 0;"><strong>${m.sender==='player'?'You':esc(npc.name)}:</strong> ${esc(m.text)}</div>`).join('')}
    </div>
    <input class="input-field" id="chatInput" placeholder="Type message...">
    <button class="btn" id="sendChatBtn">Send</button>
    <button class="btn" id="closeChatBtn">Close</button>
  `;
  document.getElementById('inboxModal').style.display = 'flex';
  document.getElementById('sendChatBtn').onclick = () => sendChatMessage(npcId);
  document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendChatMessage(npcId); });
  document.getElementById('closeChatBtn').onclick = () => { playClick(); document.getElementById('inboxModal').style.display = 'none'; };
  document.getElementById('inboxModal').onclick = e => { if (e.target === document.getElementById('inboxModal')) { playClick(); document.getElementById('inboxModal').style.display = 'none'; } };
}

async function sendChatMessage(npcId){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const npc = getNpcById(npcId);
  let thread = world.inbox.find(t => t.npcId === npcId);
  if (!thread) { thread = { npcId, messages: [] }; world.inbox.push(thread); }
  thread.messages.push({ sender: 'player', text, read: true, timestamp: Date.now() });
  document.getElementById('chatMessages').innerHTML += `<div><strong>You:</strong> ${esc(text)}</div>`;
  saveWorld();
  try {
    const systemPrompt = `You are ${npc.name}, a resident of Ember Creek in 1987. Personality: ${npc.personality}. Reply to the player's private message. Keep it 1-2 sentences. Output ONLY the reply text.`;
    const reply = await mistralChat([{ role: "system", content: systemPrompt }, { role: "user", content: text }], 150, false);
    thread.messages.push({ sender: 'npc', text: reply, read: true, timestamp: Date.now() });
    document.getElementById('chatMessages').innerHTML += `<div><strong>${esc(npc.name)}:</strong> ${esc(reply)}</div>`;
    saveWorld();
  } catch (e) {
    document.getElementById('chatMessages').innerHTML += `<div style="color:var(--danger);">Chat unavailable: ${e.message}</div>`;
  }
}

// ──────────────────────── NPC AUTONOMY ────────────────────────
async function generateNpcInteractions(){
  if(Math.random()>0.3) return;
  const allNpcs = world.npcs; if(!allNpcs.length) return;
  // NPC rates a random film
  const film = world.social.films[Math.floor(Math.random()*world.social.films.length)];
  if(film){
    const npc = allNpcs[Math.floor(Math.random()*allNpcs.length)];
    if(npc && !film.reviews.some(r=>r.userId===npc.id) && Math.random()<0.6){
      const rating = 1+Math.floor(Math.random()*5);
      film.reviews.push({ id:uid(), userId:npc.id, rating, text:'', timestamp:getTotalGameMinutes(), reviewRatings: [] });
      if(film.reviews.filter(r=>r.userId===world.player.id).length>0) addNotification(npc.id, world.player.id, 'rating', `rated ${film.title} ${rating}/5.`, {type:'film',id:film.id});
      saveWorld();
    }
  }
  // NPC writes a review
  const film2 = world.social.films[Math.floor(Math.random()*world.social.films.length)];
  const npc2 = allNpcs[Math.floor(Math.random()*allNpcs.length)];
  if(film2 && npc2 && Math.random()<0.4){
    try{
      const prompt = `You are ${npc2.name}, a ${npc2.personality.join(', ')} resident of Ember Creek in 1987. Write a short review (2 sentences) for the film "${film2.title}" (${film2.genre}). Output ONLY the review.`;
      const text = await mistralChat([{role:"user",content:prompt}],120,false);
      film2.reviews.push({ id:uid(), userId:npc2.id, rating:Math.floor(Math.random()*4)+2, text, timestamp:getTotalGameMinutes(), reviewRatings: [] });
      if(film2.reviews.some(r=>r.userId===world.player.id)) addNotification(npc2.id, world.player.id, 'review', `reviewed ${film2.title}.`, {type:'film',id:film2.id});
      saveWorld();
    }catch(e){}
  }
  // NPC posts in forum
  const film3 = world.social.films[Math.floor(Math.random()*world.social.films.length)];
  const npc3 = allNpcs[Math.floor(Math.random()*allNpcs.length)];
  if(film3 && npc3 && Math.random()<0.5){
    try{
      const prompt = `You are ${npc3.name}. Write a forum post (1-2 sentences) about the film "${film3.title}". Output ONLY the post.`;
      const text = await mistralChat([{role:"user",content:prompt}],120,false);
      film3.forumPosts.push({ id:uid(), author:npc3.id, text, timestamp:getTotalGameMinutes(), replies:[] });
      saveWorld();
    }catch(e){}
  }
  // NPC replies to forum post
    // NPC replies to forum post
  if(world.social.films.length>0 && Math.random()<0.3){
    const film4 = world.social.films[Math.floor(Math.random()*world.social.films.length)];
    const npc4 = allNpcs[Math.floor(Math.random() * allNpcs.length)];
    if (npc4) {
      const eligiblePosts = film4.forumPosts.filter(p => p.author !== npc4.id);
      if (eligiblePosts.length > 0) {
        const post = eligiblePosts[Math.floor(Math.random() * eligiblePosts.length)];
        if (npc4.id !== post.author) {
          try {
            const prompt = `You are ${npc4.name}. Reply to this forum post about "${film4.title}": "${post.text}". Write a short reply (1 sentence). Output ONLY the reply.`;
            const reply = await mistralChat([{role:"user",content:prompt}],100,false);
            post.replies = post.replies || [];
            post.replies.push({ author:npc4.id, text: reply });
            if (post.author === world.player.id) {
              addNotification(npc4.id, world.player.id, 'forum_reply', `replied to your post.`, {type:'film', id:film4.id});
            }
            saveWorld();
          } catch(e) {}
        }
      }
    }
  }
  // NPC rates a random player review
  const playerReviews = world.social.films.flatMap(f => f.reviews.filter(r => r.userId === world.player.id && r.text));
  if (playerReviews.length > 0 && Math.random() < 0.25) {
    const review = playerReviews[Math.floor(Math.random() * playerReviews.length)];
    const npc = allNpcs[Math.floor(Math.random() * allNpcs.length)];
    if (npc && !review.reviewRatings.some(rr => rr.userId === npc.id)) {
      try {
        const prompt = `You are ${npc.name}. Read this film review: "${review.text}". Rate its helpfulness and writing quality from 1 to 5 stars. Output ONLY the number.`;
        const ratingStr = await mistralChat([{ role: "user", content: prompt }], 10, false);
        const rating = parseInt(ratingStr);
        if (rating >= 1 && rating <= 5) {
          review.reviewRatings.push({ userId: npc.id, rating });
          const film = world.social.films.find(f => f.reviews.includes(review));
          if (film) {
            addNotification(npc.id, world.player.id, 'review_rated', `rated your review of "${film.title}" ${rating}/5.`, { type: 'film', id: film.id });
          }
          saveWorld();
        }
      } catch(e) {}
    }
  }
  
  // Private messages
  const messager = allNpcs[Math.floor(Math.random()*allNpcs.length)];
  if(messager && Math.random()<0.3){
    try{
      let thread = world.inbox.find(t=>t.npcId===messager.id);
      const prompt = `You are ${messager.name}. Write a short message to the player about a recent film or ask their opinion. Output ONLY the message.`;
      const msg = await mistralChat([{role:"user",content:prompt}],150,false);
      if(!thread){ thread={npcId:messager.id, messages:[]}; world.inbox.push(thread); }
      thread.messages.push({ sender:'npc', text:msg, read:false, timestamp:Date.now() });
      playNotification(); saveWorld();
    }catch(e){}
  }
}

function advanceTime(minutes){
  world.time.minute+=minutes;
  while(world.time.minute>=60){ world.time.minute-=60; world.time.hour++; }
  if(world.time.hour>=24){ world.time.hour-=24; world.time.day++; }
  updateStatusBar(); generateNpcInteractions(); saveWorld();
}

// ──────────────────────── INIT ────────────────────────
async function startNewGame(){
  document.getElementById('mainScreen').innerHTML = '<div style="text-align:center;padding:40px;">Loading ReelTalk...</div>';
  try{
    const townPrompt = `Create a small American town Ember Creek in 1987. JSON with "npcs": 8 residents (name,age 18-65,sex,bio,homeLocation), "locationDescriptions". Output only JSON.`;
    const townData = await mistralChat([{role:"user",content:townPrompt}],4000,true);
    world = {
      player: { id:'player', name:'You', location:'Your House', inventory:[] },
      npcs: townData.npcs.map(n=>{ const p=HARDCODED_PERSONALITIES[Math.floor(Math.random()*HARDCODED_PERSONALITIES.length)]; return {...n, id:uid(), currentLocation:n.homeLocation, personality:p.traits}; }),
      locationDescriptions: townData.locationDescriptions,
      time: { day:1, hour:8, minute:0 },
      inbox: [],
      social: { films:[], watchlist:{}, notifications:[] }
    };
    world.social.watchlist[world.player.id] = [];
    // seed films
    const seedPrompt = `Generate 12 films from the 1980s (mix real and fictional, any year between 1980 and 1989). JSON array with objects: "title","year" (must be between 1980-1989),"director","cast" (3-4 names),"genre","description" (2 sentences),"asciiPoster" (4 lines, max 20 chars wide). Output ONLY valid JSON.`;
    const filmsData = await mistralChat([{role:"user",content:seedPrompt}],1200,true);
    const seedFilms = filmsData?.films||filmsData||[];
    seedFilms.forEach(f=>{ world.social.films.push({ id:uid(), title:f.title, year: f.year || 1987, director:f.director, cast:f.cast, genre:f.genre, description:f.description, asciiPoster: sanitizeAscii(f.asciiPoster), reviews:[], forumPosts:[] }); });
    // NPC initial reviews
    for(let i=0;i<5;i++){
      const film = world.social.films[Math.floor(Math.random()*world.social.films.length)];
      const npc = world.npcs[Math.floor(Math.random()*world.npcs.length)];
      if(film&&npc) film.reviews.push({ id:uid(), userId:npc.id, rating:Math.floor(Math.random()*4)+2, text:'', timestamp:getTotalGameMinutes()-Math.floor(Math.random()*100) });
    }
    saveWorld(); showMainMenu();
  }catch(e){ alert('Failed: '+e.message); }
}

async function init(){
  if(!apiKey){
    document.getElementById('genericModalContent').innerHTML = `<h2>🔑 Mistral API Key</h2><p>Get from console.mistral.ai</p><input class="input-field" id="apiKeyInput" placeholder="Enter key..."><button class="btn" id="saveApiKey">Save</button>`;
    document.getElementById('genericModal').style.display = 'flex';
    document.getElementById('saveApiKey').onclick = ()=>{ const key=document.getElementById('apiKeyInput').value.trim(); if(key.length>10){ apiKey=key; localStorage.setItem('mistral_api_key',key); document.getElementById('genericModal').style.display='none'; init(); } };
    return;
  }
  if(!loadWorld()) await startNewGame();
  else { updateStatusBar(); showMainMenu(); }
  setInterval(()=>{ advanceTime(5); },30000);
}
applyTheme(currentTheme);
document.getElementById('notifBell').onclick = ()=>{ playClick(); showNotifications(); };
init();
</script>
