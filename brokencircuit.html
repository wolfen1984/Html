<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>◈ BROKEN CIRCUIT ◈</title>
  <!-- 80s computer font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0b0f0b;
      background-image: radial-gradient(circle at 30% 30%, #1a2a1a 0%, #030603 90%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      padding: 24px;
    }

    /* CRT monitor frame */
    .crt-monitor {
      max-width: 1000px;
      width: 100%;
      background: #1a1e1a;
      border: 12px solid #2a302a;
      border-radius: 32px 32px 24px 24px;
      box-shadow: 
        0 20px 0 #0f120f,
        0 30px 40px rgba(0,0,0,0.8),
        inset 0 0 30px #000000dd,
        inset 0 0 0 3px #3a4a3a;
      padding: 24px 22px 30px;
      position: relative;
    }

    /* Scanlines + phosphor glow */
    .crt-monitor::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0, 255, 100, 0.03) 0px, rgba(0, 0, 0, 0.2) 2px, transparent 3px, transparent 5px);
      pointer-events: none;
      z-index: 5;
      border-radius: 20px;
    }

    .crt-monitor::after {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 30%, transparent 40%, #0a1a0a88 90%);
      pointer-events: none;
      z-index: 4;
      border-radius: 20px;
    }

    .screen {
      position: relative;
      z-index: 6;
      color: #9eff9e;
      text-shadow: 0 0 8px #2eff7e, 0 0 20px #0f6b0f;
    }

    /* 80s terminal header */
    .title-block {
      text-align: center;
      border-bottom: 4px double #3aff6e;
      padding-bottom: 12px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 6px #1eff4e);
    }

    h1 {
      margin: 0;
      font-size: 2.2rem;
      font-weight: normal;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #b3ffb3;
      text-shadow: 0 0 20px #1eff4e, 0 0 40px #0a5f0a, 4px 4px 0 #0a1a0a;
      line-height: 1.4;
      font-family: 'Press Start 2P', monospace;
      word-break: break-word;
    }

    .subtitle {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      color: #a0f0a0;
      text-shadow: 0 0 6px #3aff6e;
      font-size: 0.9rem;
      letter-spacing: 2px;
      border-top: 1px dashed #3aff6e;
      padding-top: 10px;
      font-family: 'Press Start 2P', monospace;
    }

    .badge {
      background: #0e2a0e;
      padding: 4px 16px;
      border-radius: 0px;
      box-shadow: inset 0 0 10px black, 0 0 12px #1aff4e;
      border: 1px solid #2eff7e;
      color: #c0ffc0;
    }

    /* Track list — terminal style */
    .track-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 20px 0 18px;
      max-height: 360px;
      overflow-y: auto;
      padding-right: 6px;
    }

    .track-card {
      background: #0a130a;
      border: 2px solid #2aff6e;
      border-radius: 0px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: inset 0 0 12px #000000, 0 0 0 1px #1f7a1f, 0 4px 0 #0b1a0b;
    }

    .track-num {
      color: #6fff8f;
      font-size: 1.8rem;
      min-width: 60px;
      text-align: center;
      text-shadow: 0 0 15px #1eff4e;
      background: #102010;
      border-radius: 0px;
      padding: 6px 0;
      border: 1px solid #2aff6e;
      font-family: 'Press Start 2P', monospace;
    }

    .track-details {
      flex: 1;
    }

    .track-name {
      font-size: 1rem;
      color: #c6ffc6;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-family: 'Press Start 2P', monospace;
    }

    .track-desc {
      font-size: 0.65rem;
      color: #7fbf7f;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* Pixel buttons */
    .play-btn {
      background: #0e1e0e;
      border: 3px outset #3aff6e;
      color: #bbffbb;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.9rem;
      padding: 10px 22px;
      border-radius: 0px;
      box-shadow: 0 4px 0 #0a1a0a, 0 0 10px #1eff4e;
      cursor: pointer;
      transition: 0.05s;
      text-shadow: 0 0 8px #0f0;
      min-width: 130px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .play-btn:hover {
      background: #1a3a1a;
      border-color: #9aff9a;
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0a1a0a, 0 0 18px #2eff7e;
    }

    .play-btn.playing {
      background: #1f5f1f;
      border-color: #aaffaa;
      box-shadow: inset 0 0 20px #2eff7e, 0 2px 0 #0a1a0a;
      color: #ffffff;
    }

    /* Volume control panel — 80s knobs */
    .volume-panel {
      margin: 18px 0 12px;
      padding: 12px 8px;
      background: #0c170c;
      border: 2px solid #2aff6e;
      box-shadow: inset 0 0 15px black, 0 0 10px #1eff4e;
    }

    .volume-header {
      color: #8eff9e;
      font-size: 0.8rem;
      margin-bottom: 16px;
      text-align: center;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 5px;
    }

    .slider-group {
      display: flex;
      justify-content: space-around;
      gap: 12px;
      flex-wrap: wrap;
    }

    .slider-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 100px;
    }

    .slider-label {
      color: #9eff9e;
      font-size: 0.65rem;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Retro range input */
    input[type=range] {
      -webkit-appearance: none;
      width: 140px;
      height: 12px;
      background: #0a1a0a;
      border: 2px solid #2aff6e;
      border-radius: 0px;
      box-shadow: inset 0 0 8px black, 0 0 10px #1eff4e;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 28px;
      background: #1f5f1f;
      border: 3px outset #6fff8f;
      border-radius: 0px;
      box-shadow: 0 0 16px #1eff4e, 0 2px 0 #0f2a0f;
      cursor: pointer;
    }

    .slider-value {
      margin-top: 6px;
      color: #b0ffb0;
      font-size: 0.7rem;
      text-shadow: 0 0 8px;
    }

    /* Equalizer visual */
    .eq-container {
      margin: 10px 0 0;
    }

    .equalizer {
      display: flex;
      gap: 8px;
      height: 60px;
      align-items: flex-end;
      justify-content: center;
    }

    .bar {
      width: 28px;
      background: linear-gradient(to top, #1f8f1f, #9aff9a);
      border: 1px solid #2aff6e;
      border-bottom: none;
      box-shadow: 0 0 18px #2eff7e, inset 0 0 6px #b3ffb3;
      height: 20px;
      transition: height 0.08s;
      border-radius: 0px;
    }

    .eq-label {
      color: #9fdf9f;
      font-size: 0.8rem;
      letter-spacing: 4px;
      margin: 8px 0 4px;
      text-align: center;
      text-transform: uppercase;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      border-top: 1px dotted #3aff6e;
      padding-top: 16px;
    }

    .led-panel {
      display: flex;
      align-items: center;
      gap: 16px;
      color: #c0ffc0;
      font-size: 1rem;
      text-shadow: 0 0 8px;
    }

    .led {
      width: 22px;
      height: 22px;
      border-radius: 0px;
      background: #1a2a1a;
      box-shadow: inset 0 0 8px black, 0 0 10px #1f5f1f;
      border: 2px solid #2aff6e;
    }

    .led.active {
      background: #2eff7e;
      box-shadow: 0 0 28px #1eff4e, inset 0 0 12px #e0ffe0;
    }

    .stop-btn {
      background: #0e1e0e;
      border: 3px outset #3aff6e;
      color: #bbffbb;
      padding: 8px 28px;
      font-size: 1rem;
      border-radius: 0px;
      cursor: pointer;
      box-shadow: 0 4px 0 #0a1a0a, 0 0 12px #1eff4e;
      text-transform: uppercase;
      font-family: 'Press Start 2P', monospace;
    }

    .stop-btn:hover {
      background: #1a3a1a;
      transform: translateY(2px);
    }

    .footer-note {
      text-align: right;
      color: #7fbf7f;
      font-size: 0.6rem;
      margin-top: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .blink {
      animation: blink 1.5s step-end infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* scrollbar retro */
    .track-panel::-webkit-scrollbar {
      width: 12px;
      background: #0a130a;
      border: 1px solid #2aff6e;
    }
    .track-panel::-webkit-scrollbar-thumb {
      background: #1f5f1f;
      border: 1px solid #6fff8f;
      box-shadow: inset 0 0 6px black;
    }
  </style>
</head>
<body>
<div class="crt-monitor">
  <div class="screen">
    <div class="title-block">
      <h1>BROKEN CURCUIT</h1>
      <div class="subtitle">
        <span>◈ 1980s LIFELINE ◈</span>
        <span class="badge">NIGHTFALLS GAMES</span>
      </div>
    </div>

    <!-- Track list injected here -->
    <div class="track-panel" id="trackPanel"></div>

</div>

<script>
  (function(){
    "use strict";
  
    let audioCtx = null;
    let isPlaying = false;
    let currentTrackId = null;
    let loopTimeout = null;
    let scheduledSources = [];
    
    // Master and group gains
    let masterGain, delayNode, slapDelay, reverbMix, distortionNode, filterNode;
    let guitarGain, bassGain, drumsGain;   // ✦ NEW: independent volume controls

    // DOM elements
    const bars = [
      document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'),
      document.getElementById('bar4'), document.getElementById('bar5'), document.getElementById('bar6')
    ];
    const playLed = document.getElementById('playLed');
    const statusText = document.getElementById('statusText');
    const trackPanel = document.getElementById('trackPanel');
    const stopAllBtn = document.getElementById('stopAllBtn');

    // Volume sliders
    const guitarSlider = document.getElementById('guitarVol');
    const bassSlider = document.getElementById('bassVol');
    const drumsSlider = document.getElementById('drumsVol');
    const guitarVal = document.getElementById('guitarVal');
    const bassVal = document.getElementById('bassVal');
    const drumsVal = document.getElementById('drumsVal');

    // Frequency map
    const freq = {
      'C2':65.41,'C#2':69.30,'D2':73.42,'D#2':77.78,'E2':82.41,'F2':87.31,'F#2':92.50,'G2':98.00,'G#2':103.83,'A2':110.00,'A#2':116.54,'B2':123.47,
      'C3':130.81,'C#3':138.59,'D3':146.83,'D#3':155.56,'E3':164.81,'F3':174.61,'F#3':185.00,'G3':196.00,'G#3':207.65,'A3':220.00,'A#3':233.08,'B3':246.94,
      'C4':261.63,'C#4':277.18,'D4':293.66,'D#4':311.13,'E4':329.63,'F4':349.23,'F#4':369.99,'G4':392.00,'G#4':415.30,'A4':440.00,'A#4':466.16,'B4':493.88,
      'C5':523.25,'C#5':554.37,'D5':587.33,'D#5':622.25,'E5':659.25,'F5':698.46,'F#5':739.99,'G5':783.99,'G#5':830.61,'A5':880.00,'A#5':932.33,'B5':987.77,
      'C6':1046.50,'D6':1174.66,'E6':1318.51
    };

    // Helper to build sequences (unchanged)
    function buildSequence(sections) {
      const notes = [];
      for (let step = 0; step < sections.totalSteps; step++) {
        const bar = Math.floor(step / 16);
        let section = sections.detect(bar);
        const pattern = sections.patterns[section];
        if (pattern) {
          pattern.forEach(rule => {
            if (rule.trigger(step % 16, bar, step)) {
              notes.push([step, rule.note, rule.dur, rule.vel]);
            }
          });
        }
      }
      return notes;
    }

    // ---------- TRACK DEFINITIONS (same as before) ----------
    const t1_bars = 22; const t1_totalSteps = t1_bars * 16;
    const t1_detect = (bar) => { if (bar < 3) return 'intro'; if (bar < 8) return 'verse'; if (bar < 12) return 'chorus'; if (bar < 15) return 'bridge'; if (bar < 19) return 'verse2'; if (bar < 21) return 'solo'; return 'outro'; };
    const t1_lead = () => buildSequence({ totalSteps: t1_totalSteps, detect: t1_detect, patterns: {
      intro: [{trigger:(s)=>s%16===0,note:'E4',dur:8,vel:0.45},{trigger:(s)=>s%16===8,note:'B4',dur:8,vel:0.42}],
      verse: [{trigger:(s)=>s%16===0,note:'E4',dur:4,vel:0.55},{trigger:(s)=>s%16===4,note:'G4',dur:4,vel:0.52},{trigger:(s)=>s%16===8,note:'B4',dur:4,vel:0.55},{trigger:(s)=>s%16===12,note:'D5',dur:4,vel:0.5}],
      chorus: [{trigger:(s)=>s%16===0,note:'A4',dur:6,vel:0.65},{trigger:(s)=>s%16===8,note:'E5',dur:6,vel:0.68},{trigger:(s)=>s%16===12,note:'G5',dur:4,vel:0.62}],
      bridge: [{trigger:(s)=>s%8===0,note:'C5',dur:3,vel:0.58},{trigger:(s)=>s%8===4,note:'B4',dur:3,vel:0.55}],
      verse2: [{trigger:(s)=>s%16===0,note:'E4',dur:4,vel:0.55},{trigger:(s)=>s%16===8,note:'B4',dur:4,vel:0.55}],
      solo: [{trigger:(s)=>s%8===0,note:'E5',dur:2,vel:0.6},{trigger:(s)=>s%8===2,note:'D5',dur:2,vel:0.58},{trigger:(s)=>s%8===4,note:'B4',dur:2,vel:0.62},{trigger:(s)=>s%8===6,note:'G4',dur:4,vel:0.55}],
      outro: [{trigger:(s)=>s===0,note:'E4',dur:16,vel:0.4}]
    }});
    const t1_bass = () => buildSequence({ totalSteps: t1_totalSteps, detect: t1_detect, patterns: {
      intro: [{trigger:(s)=>s%16===0,note:'E2',dur:8,vel:0.92}],
      verse: [{trigger:(s)=>s%16===0,note:'E2',dur:4,vel:0.95},{trigger:(s)=>s%16===8,note:'B2',dur:4,vel:0.92}],
      chorus: [{trigger:(s)=>s%16===0,note:'A2',dur:4,vel:0.98},{trigger:(s)=>s%16===8,note:'E2',dur:4,vel:0.95}],
      bridge: [{trigger:(s)=>s%8===0,note:'C2',dur:4,vel:0.9}],
      verse2: [{trigger:(s)=>s%16===0,note:'E2',dur:4,vel:0.95}],
      solo: [{trigger:(s)=>s%8===0,note:'E2',dur:4,vel:0.88}],
      outro: [{trigger:(s)=>s===0,note:'E2',dur:16,vel:0.9}]
    }});
    const t1_drums = (step, t, sc) => {
      if (step % 4 === 0) sc.kick(t, 0.9);
      if (step % 8 === 4) sc.snare(t, 0.75);
      if (step % 2 === 0) sc.hat(t, 0.3);
    };
    // ... (tracks 2-7 identical, omitted for brevity but keep in final code)
    const t2_bars = 20; const t2_totalSteps = t2_bars * 16;
    const t2_detect = (bar) => { if (bar < 4) return 'intro'; if (bar < 8) return 'verse'; if (bar < 13) return 'chorus'; if (bar < 16) return 'bridge'; if (bar < 18) return 'verse2'; return 'outro'; };
    const t2_lead = () => buildSequence({ totalSteps: t2_totalSteps, detect: t2_detect, patterns: {
      intro: [{trigger:(s)=>s%16===0,note:'A4',dur:6,vel:0.48},{trigger:(s)=>s%16===8,note:'E5',dur:6,vel:0.45}],
      verse: [{trigger:(s)=>s%16===0,note:'A4',dur:3,vel:0.58},{trigger:(s)=>s%16===6,note:'C5',dur:3,vel:0.55},{trigger:(s)=>s%16===12,note:'E5',dur:3,vel:0.58}],
      chorus: [{trigger:(s)=>s%16===0,note:'F4',dur:4,vel:0.68},{trigger:(s)=>s%16===8,note:'G4',dur:4,vel:0.65},{trigger:(s)=>s%16===12,note:'A5',dur:4,vel:0.7}],
      bridge: [{trigger:(s)=>s%8===0,note:'G5',dur:4,vel:0.6},{trigger:(s)=>s%8===4,note:'F5',dur:4,vel:0.58}],
      verse2: [{trigger:(s)=>s%16===0,note:'A4',dur:3,vel:0.58}],
      outro: [{trigger:(s)=>s===0,note:'A4',dur:12,vel:0.42}]
    }});
    const t2_bass = () => buildSequence({ totalSteps: t2_totalSteps, detect: t2_detect, patterns: {
      intro: [{trigger:(s)=>s%16===0,note:'A2',dur:8,vel:0.95}],
      verse: [{trigger:(s)=>s%8===0,note:'A2',dur:2,vel:0.98},{trigger:(s)=>s%8===4,note:'C2',dur:2,vel:0.95}],
      chorus: [{trigger:(s)=>s%16===0,note:'F2',dur:4,vel:0.98},{trigger:(s)=>s%16===8,note:'G2',dur:4,vel:0.98}],
      bridge: [{trigger:(s)=>s%8===0,note:'G2',dur:3,vel:0.92}],
      verse2: [{trigger:(s)=>s%8===0,note:'A2',dur:2,vel:0.98}],
      outro: [{trigger:(s)=>s===0,note:'A2',dur:12,vel:0.9}]
    }});
    const t2_drums = (step, t, sc) => { if (step % 4 === 0) sc.kick(t, 0.85); if (step % 8 === 4) sc.snare(t, 0.8); if (step % 2 === 0) sc.hat(t, 0.28); };
    // track 3
    const t3_bars = 19; const t3_totalSteps = t3_bars * 16;
    const t3_detect = (bar) => { if (bar < 3) return 'intro'; if (bar < 7) return 'verse'; if (bar < 12) return 'chorus'; if (bar < 14) return 'bridge'; if (bar < 17) return 'verse2'; return 'outro'; };
    const t3_lead = () => buildSequence({ totalSteps: t3_totalSteps, detect: t3_detect, patterns: {
      intro: [{trigger:(s)=>s%16===0,note:'C#5',dur:8,vel:0.5}],
      verse: [{trigger:(s)=>s%8===0,note:'C#5',dur:2,vel:0.6},{trigger:(s)=>s%8===4,note:'E5',dur:2,vel:0.58}],
      chorus: [{trigger:(s)=>s%16===0,note:'F#5',dur:5,vel:0.72},{trigger:(s)=>s%16===8,note:'G#5',dur:5,vel:0.7}],
      bridge: [{trigger:(s)=>s%8===0,note:'B5',dur:4,vel:0.65}],
      verse2: [{trigger:(s)=>s%8===0,note:'C#5',dur:2,vel:0.6}],
      outro: [{trigger:(s)=>s===0,note:'C#5',dur:14,vel:0.45}]
    }});
    const t3_bass = () => buildSequence({ totalSteps: t3_totalSteps, detect: t3_detect, patterns: {
      intro: [{trigger:(s)=>s%16===0,note:'C#2',dur:8,vel:0.92}],
      verse: [{trigger:(s)=>s%8===0,note:'C#2',dur:2,vel:0.95},{trigger:(s)=>s%8===4,note:'E2',dur:2,vel:0.92}],
      chorus: [{trigger:(s)=>s%16===0,note:'F#2',dur:4,vel:0.98},{trigger:(s)=>s%16===8,note:'G#2',dur:4,vel:0.95}],
      bridge: [{trigger:(s)=>s%8===0,note:'B2',dur:4,vel:0.9}],
      verse2: [{trigger:(s)=>s%8===0,note:'C#2',dur:2,vel:0.95}],

    }});
    const t3_drums = (step, t, sc) => { if (step % 4 === 0) sc.kick(t, 0.88); if (step % 8 === 4) sc.snare(t, 0.78); if (step % 2 === 0) sc.hat(t, 0.32); };
    // track4
    const t4_bars = 23; const t4_totalSteps = t4_bars * 16;
    const t4_detect = (bar) => { if (bar < 4) return 'intro'; if (bar < 9) return 'verse'; if (bar < 14) return 'chorus'; if (bar < 17) return 'bridge'; if (bar < 20) return 'verse2'; if (bar < 22) return 'solo'; return 'outro'; };
    const t4_lead = () => buildSequence({ totalSteps: t4_totalSteps, detect: t4_detect, patterns: {
      intro: [{trigger:(s)=>s%16===0,note:'D4',dur:8,vel:0.5},{trigger:(s)=>s%16===8,note:'A4',dur:8,vel:0.48}],

    const t4_bass = () => buildSequence({ totalSteps: t4_totalSteps, detect: t4_detect, patterns: {

    const t4_drums = (step, t, sc) => { if (step % 4 === 0) sc.kick(t, 0.92); if (step % 8 === 4) sc.snare(t, 0.82); if (step % 2 === 0) sc.hat(t, 0.25); };
    // track5
    const t5_bars = 21; const t5_totalSteps = t5_bars * 16;
    const t5_detect = (bar) => { if (bar < 3) return 'intro'; if (bar < 8) return 'verse'; if (bar < 13) return 'chorus'; if (bar < 16) return 'bridge'; if (bar < 19) return 'verse2'; return 'outro'; };
    const t5_lead = () => buildSequence({ totalSteps: t5_totalSteps, detect: t5_detect, patterns: {
      intro: [{trigger:(s)=>s%16===0,note:'F#4',dur:8,vel:0.5}],
      verse: [{trigger:(s)=>s%16===0,note:'F#4',dur:3,vel:0.6},{trigger:(s)=>s%16===8,note:'A4',dur:3,vel:0.58}],
      chorus: [{trigger:(s)=>s%16===0,note:'D5',dur:5,vel:0.7},{trigger:(s)=>s%16===8,note:'E5',dur:5,vel:0.68}],
      bridge: [{trigger:(s)=>s%8===0,note:'B4',dur:4,vel:0.62}],
      verse2: [{trigger:(s)=>s%16===0,note:'F#4',dur:3,vel:0.6}],
      outro: [{trigger:(s)=>s===0,note:'F#4',dur:14,vel:0.43}]
    }});
    const t5_bass = () => buildSequence({ totalSteps: t5_totalSteps, detect: t5_detect, patterns: {
      intro: [{trigger:(s)=>s%16===0,note:'F#2',dur:8,vel:0.94}],
      verse: [{trigger:(s)=>s%16===0,note:'F#2',dur:3,vel:0.96},{trigger:(s)=>s%16===8,note:'A2',dur:3,vel:0.93}],
      chorus: [{trigger:(s)=>s%16===0,note:'D2',dur:4,vel:0.98},{trigger:(s)=>s%16===8,note:'E2',dur:4,vel:0.96}],
      bridge: [{trigger:(s)=>s%8===0,note:'B2',dur:4,vel:0.9}],
      verse2: [{trigger:(s)=>s%16===0,note:'F#2',dur:3,vel:0.96}],
      outro: [{trigger:(s)=>s===0,note:'F#2',dur:14,vel:0.88}]
    }});
    const t5_drums = (step, t, sc) => { if (step % 4 === 0) sc.kick(t, 0.86); if (step % 8 === 4) sc.snare(t, 0.79); if (step % 2 === 0) sc.hat(t, 0.29); };
    // track6
    const t6_bars = 24; const t6_totalSteps = t6_bars * 16;
    const t6_detect = (bar) => { if (bar < 4) return 'intro'; if (bar < 9) return 'verse'; if (bar < 14) return 'chorus'; if (bar < 18) return 'bridge'; if (bar < 21) return 'verse2'; if (bar < 23) return 'solo'; return 'outro'; };
    const t6_lead = () => buildSequence({ totalSteps: t6_totalSteps, detect: t6_detect, patterns: {
      intro: [{trigger:(s)=>s%16===0,note:'B4',dur:8,vel:0.48}],
      verse: [{trigger:(s)=>s%16===0,note:'B4',dur:4,vel:0.56},{trigger:(s)=>s%16===8,note:'D5',dur:4,vel:0.54}],
      chorus: [{trigger:(s)=>s%16===0,note:'E5',dur:6,vel:0.7},{trigger:(s)=>s%16===8,note:'F#5',dur:6,vel:0.68}],
      bridge: [{trigger:(s)=>s%8===0,note:'A5',dur:4,vel:0.63}],
      verse2: [{trigger:(s)=>s%16===0,note:'B4',dur:4,vel:0.56}],
      solo: [{trigger:(s)=>s%8===0,note:'B5',dur:3,vel:0.64},{trigger:(s)=>s%8===4,note:'A5',dur:3,vel:0.6}],
      outro: [{trigger:(s)=>s===0,note:'B4',dur:16,vel:0.41}]
    }});
    const t6_bass = () => buildSequence({ totalSteps: t6_totalSteps, detect: t6_detect, patterns: {
      intro: [{trigger:(s)=>s%16===0,note:'B2',dur:8,vel:0.93}],
      verse: [{trigger:(s)=>s%16===0,note:'B2',dur:4,vel:0.96},{trigger:(s)=>s%16===8,note:'D2',dur:4,vel:0.93}],
      chorus: [{trigger:(s)=>s%16===0,note:'E2',dur:4,vel:0.98},{trigger:(s)=>s%16===8,note:'F#2',dur:4,vel:0.96}],
      bridge: [{trigger:(s)=>s%8===0,note:'A2',dur:4,vel:0.91}],
      verse2: [{trigger:(s)=>s%16===0,note:'B2',dur:4,vel:0.96}],
      solo: [{trigger:(s)=>s%8===0,note:'B2',dur:4,vel:0.87}],
      outro: [{trigger:(s)=>s===0,note:'B2',dur:16,vel:0.89}]
    }});
    const t6_drums = (step, t, sc) => { if (step % 4 === 0) sc.kick(t, 0.9); if (step % 8 === 4) sc.snare(t, 0.81); if (step % 2 === 0) sc.hat(t, 0.26); };
    // track7
    const t7_bars = 20; const t7_totalSteps = t7_bars * 16;
    const t7_detect = (bar) => { if (bar < 3) return 'intro'; if (bar < 7) return 'verse'; if (bar < 12) return 'chorus'; if (bar < 15) return 'bridge'; if (bar < 18) return 'verse2'; return 'outro'; };
    const t7_lead = () => buildSequence({ totalSteps: t7_totalSteps, detect: t7_detect, patterns: {
      intro: [{trigger:(s)=>s%16===0,note:'G4',dur:8,vel:0.5}],
      verse: [{trigger:(s)=>s%16===0,note:'G4',dur:3,vel:0.57},{trigger:(s)=>s%16===8,note:'Bb4',dur:3,vel:0.55}],
      chorus: [{trigger:(s)=>s%16===0,note:'C5',dur:5,vel:0.69},{trigger:(s)=>s%16===8,note:'D5',dur:5,vel:0.67}],
      bridge: [{trigger:(s)=>s%8===0,note:'F5',dur:4,vel:0.61}],
      verse2: [{trigger:(s)=>s%16===0,note:'G4',dur:3,vel:0.57}],
      outro: [{trigger:(s)=>s===0,note:'G4',dur:14,vel:0.43}]
    }});
    const t7_bass = () => buildSequence({ totalSteps: t7_totalSteps, detect: t7_detect, patterns: {
      intro: [{trigger:(s)=>s%16===0,note:'G2',dur:8,vel:0.94}],
      verse: [{trigger:(s)=>s%16===0,note:'G2',dur:3,vel:0.96},{trigger:(s)=>s%16===8,note:'Bb2',dur:3,vel:0.93}],
      chorus: [{trigger:(s)=>s%16===0,note:'C2',dur:4,vel:0.98},{trigger:(s)=>s%16===8,note:'D2',dur:4,vel:0.96}],
      bridge: [{trigger:(s)=>s%8===0,note:'F2',dur:4,vel:0.9}],
      verse2: [{trigger:(s)=>s%16===0,note:'G2',dur:3,vel:0.96}],
      outro: [{trigger:(s)=>s===0,note:'G2',dur:14,vel:0.88}]
    }});
    const t7_drums = (step, t, sc) => { if (step % 4 === 0) sc.kick(t, 0.87); if (step % 8 === 4) sc.snare(t, 0.8); if (step % 2 === 0) sc.hat(t, 0.3); };

    const tracks = [
      { id: 'cold-veil', name: 'COLD SKIN', desc: 'NO MORE TOMORROW FOR YOU', bpm: 95, bars: t1_bars, totalSteps: t1_totalSteps, leadSeq: t1_lead, bassSeq: t1_bass, drumPattern: t1_drums },
      { id: 'fade-into-grey', name: 'FADE INTO GREY', desc: 'YOU HAVE NO SHADOW NOW', bpm: 105, bars: t2_bars, totalSteps: t2_totalSteps, leadSeq: t2_lead, bassSeq: t2_bass, drumPattern: t2_drums },
      { id: 'noise-of-love', name: 'NOISE OF LOVE', desc: 'YOU HAVE FALLEN INTO HER VOID', bpm: 112, bars: t3_bars, totalSteps: t3_totalSteps, leadSeq: t3_lead, bassSeq: t3_bass, drumPattern: t3_drums },
      { id: 'iron-shadow', name: 'ENTER THE VOID', desc: 'YOU HAVE NO VOICE NO MOUTH', bpm: 92, bars: t4_bars, totalSteps: t4_totalSteps, leadSeq: t4_lead, bassSeq: t4_bass, drumPattern: t4_drums },
      { id: 'last-light', name: 'THE LAST LIGHT', desc: 'ITS ALL GONE', bpm: 108, bars: t5_bars, totalSteps: t5_totalSteps, leadSeq: t5_lead, bassSeq: t5_bass, drumPattern: t5_drums },
      { id: 'echo-chamber', name: 'CHNAGE THE SWITCH', desc: 'ON OFF OR DEATH', bpm: 98, bars: t6_bars, totalSteps: t6_totalSteps, leadSeq: t6_lead, bassSeq: t6_bass, drumPattern: t6_drums },
      { id: 'ghost-in-the-wires', name: 'GHOST IN THE WIRES', desc: 'TRAPPED FOREVER', bpm: 102, bars: t7_bars, totalSteps: t7_totalSteps, leadSeq: t7_lead, bassSeq: t7_bass, drumPattern: t7_drums }
    ];

    function createDistortionCurve(amount=420) {
      const samples = 44100, curve = new Float32Array(samples);
      for (let i = 0; i < samples; ++i) {
        const x = i * 2 / samples - 1;
        curve[i] = (5 + amount) * x * 25 * (Math.PI/180) / (Math.PI + amount * Math.abs(x));
      }
      return curve;
    }

    // ✦ UPDATED scheduleNote: accepts target group gain (guitar/bass)
    function scheduleNote(time, freqVal, dur, gainVal=0.25, pan=0, groupGain) {
      if (!audioCtx) return;
      const osc1 = audioCtx.createOscillator(); osc1.type = 'sawtooth'; osc1.frequency.value = freqVal; osc1.detune.value = -18;
      const gain1 = audioCtx.createGain(); gain1.gain.setValueAtTime(0.001, time); gain1.gain.exponentialRampToValueAtTime(gainVal*0.78, time+0.01);
      gain1.gain.exponentialRampToValueAtTime(gainVal*0.32, time+dur*0.6); gain1.gain.setValueAtTime(0.001, time+dur-0.02);

      const osc2 = audioCtx.createOscillator(); osc2.type = 'square'; osc2.frequency.value = freqVal; osc2.detune.value = 12;
      const gain2 = audioCtx.createGain(); gain2.gain.setValueAtTime(0.001, time); gain2.gain.exponentialRampToValueAtTime(gainVal*0.42, time+0.01);
      gain2.gain.exponentialRampToValueAtTime(gainVal*0.18, time+dur*0.65); gain2.gain.setValueAtTime(0.001, time+dur-0.02);

      const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate*0.6, audioCtx.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0); for(let i=0;i<noiseData.length;i++) noiseData[i]=Math.random()*2-1;
      const noise = audioCtx.createBufferSource(); noise.buffer = noiseBuffer;
      const noiseGain = audioCtx.createGain(); noiseGain.gain.setValueAtTime(0.001, time); noiseGain.gain.exponentialRampToValueAtTime(gainVal*0.18, time+0.03);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, time+dur*0.4);

      const panner = audioCtx.createStereoPanner(); panner.pan.value = pan;
      osc1.connect(gain1); osc2.connect(gain2); noise.connect(noiseGain);
      gain1.connect(panner); gain2.connect(panner); noiseGain.connect(panner);
      // Connect to the appropriate group gain (guitar or bass)
      panner.connect(groupGain);
      
      scheduledSources.push({osc: osc1}, {osc: osc2}, {osc: noise});
      osc1.start(time); osc2.start(time); noise.start(time);
      osc1.stop(time+dur); osc2.stop(time+dur); noise.stop(time+dur*0.35);
    }

    function createDrumSchedulers() {
      return {
        kick: (t,v=1) => {
          const o = audioCtx.createOscillator(); o.type='triangle';
          o.frequency.setValueAtTime(140,t); o.frequency.exponentialRampToValueAtTime(45,t+0.12);
          const g = audioCtx.createGain(); g.gain.setValueAtTime(0.92*v,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
          o.connect(g); g.connect(drumsGain);   // ✦ drums group
          o.start(t); o.stop(t+0.18);
        },
        snare: (t,v=0.9) => {
          const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.25, audioCtx.sampleRate);
          const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
          const src = audioCtx.createBufferSource(); src.buffer=buf;
          const bp = audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2800;
          const g = audioCtx.createGain(); g.gain.setValueAtTime(0.82*v,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
          src.connect(bp).connect(g).connect(drumsGain);
          src.start(t); src.stop(t+0.22);
        },
        hat: (t,v=0.35) => {
          const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.06, audioCtx.sampleRate);
          const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
          const src = audioCtx.createBufferSource(); src.buffer=buf;
          const hp = audioCtx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=9000;
          const g = audioCtx.createGain(); g.gain.setValueAtTime(0.48*v,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
          src.connect(hp).connect(g).connect(drumsGain);
          src.start(t); src.stop(t+0.06);
        }
      };
    }

    function scheduleTrack(track, startTime) {
      if (!audioCtx) return;
      const stepDur = 60 / track.bpm / 4;
      const sched = createDrumSchedulers();

      track.leadSeq().forEach(([step, note, durSteps, vel]) => {
        if (freq[note]) scheduleNote(startTime + step * stepDur, freq[note], durSteps * stepDur, vel * 0.45, -0.3, guitarGain);
      });
      track.bassSeq().forEach(([step, note, durSteps, vel]) => {
        if (freq[note]) scheduleNote(startTime + step * stepDur, freq[note], durSteps * stepDur, vel * 0.58, 0.2, bassGain);
      });
      for (let step = 0; step < track.totalSteps; step++) {
        track.drumPattern(step, startTime + step * stepDur, sched);
      }
    }

    async function initAudio() {
      if (audioCtx) return true;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Create group gains
        guitarGain = audioCtx.createGain(); guitarGain.gain.value = 0.5;
        bassGain = audioCtx.createGain(); bassGain.gain.value = 0.3;
        drumsGain = audioCtx.createGain(); drumsGain.gain.value = 0.70;
        
        masterGain = audioCtx.createGain(); masterGain.gain.value = 0.85;
        const compressor = audioCtx.createDynamicsCompressor(); compressor.threshold.value = -24; compressor.ratio.value = 6;

        delayNode = audioCtx.createDelay(3); delayNode.delayTime.value = 0.42;
        const fb = audioCtx.createGain(); fb.gain.value = 0.62;
        delayNode.connect(fb); fb.connect(delayNode);

        slapDelay = audioCtx.createDelay(2); slapDelay.delayTime.value = 0.135;
        const slapFb = audioCtx.createGain(); slapFb.gain.value = 0.32;
        slapDelay.connect(slapFb); slapFb.connect(slapDelay);

        // Connect group gains to effects
        guitarGain.connect(delayNode); guitarGain.connect(slapDelay);
        bassGain.connect(delayNode); bassGain.connect(slapDelay);
        drumsGain.connect(delayNode); drumsGain.connect(slapDelay);

        reverbMix = audioCtx.createGain(); reverbMix.gain.value = 0.9;
        delayNode.connect(reverbMix);
        slapDelay.connect(reverbMix);

        filterNode = audioCtx.createBiquadFilter(); filterNode.type = 'lowpass'; filterNode.frequency.value = 7800;
        distortionNode = audioCtx.createWaveShaper(); distortionNode.curve = createDistortionCurve(420); distortionNode.oversample = '4x';

        reverbMix.connect(filterNode);
        filterNode.connect(distortionNode);
        distortionNode.connect(compressor);
        compressor.connect(masterGain);
        masterGain.connect(audioCtx.destination);

        return true;
      } catch(e) { console.error(e); return false; }
    }

    // Volume slider handlers
    function updateVolumes() {
      if (guitarGain) guitarGain.gain.value = guitarSlider.value / 100;
      if (bassGain) bassGain.gain.value = bassSlider.value / 100;
      if (drumsGain) drumsGain.gain.value = drumsSlider.value / 100;
      guitarVal.textContent = guitarSlider.value + '%';
      bassVal.textContent = bassSlider.value + '%';
      drumsVal.textContent = drumsSlider.value + '%';
    }
    guitarSlider.addEventListener('input', updateVolumes);
    bassSlider.addEventListener('input', updateVolumes);
    drumsSlider.addEventListener('input', updateVolumes);

    function stopAll() {
      isPlaying = false; currentTrackId = null;
      playLed.classList.remove('active'); statusText.textContent = 'STANDBY';
      if (loopTimeout) clearTimeout(loopTimeout);
      scheduledSources.forEach(s => { try { s.osc.stop(); } catch(e) {} });
      scheduledSources = [];
      document.querySelectorAll('.play-btn').forEach(b => b.classList.remove('playing'));
      stopVisualizer();
    }

    async function playTrack(trackId) {
      const ready = await initAudio();
      if (!ready) { alert("Web Audio not supported."); return; }

      const track = tracks.find(t => t.id === trackId);
      if (!track) return;

      stopAll();
      if (audioCtx.state === 'suspended') await audioCtx.resume();

      isPlaying = true; currentTrackId = trackId;
      playLed.classList.add('active'); statusText.textContent = `▶ ${track.name}`;
      document.querySelectorAll('.play-btn').forEach(b => {
        if (b.dataset.trackId === trackId) b.classList.add('playing');
      });

      const loopDur = track.totalSteps * (60 / track.bpm / 4);
      const now = audioCtx.currentTime;
      scheduleTrack(track, now);

      function nextLoop() {
        if (!isPlaying || currentTrackId !== trackId) return;
        scheduleTrack(track, audioCtx.currentTime + 0.05);
        loopTimeout = setTimeout(nextLoop, loopDur * 1000 - 40);
      }
      loopTimeout = setTimeout(nextLoop, loopDur * 1000 - 40);
      startVisualizer();
    }

    let vizInterval;
    function startVisualizer() {
      if (vizInterval) clearInterval(vizInterval);
      vizInterval = setInterval(() => {
        if (!isPlaying) { bars.forEach(b => b.style.height = '14px'); return; }
        const t = audioCtx?.currentTime || 0;
        bars.forEach((b, i) => b.style.height = Math.min(60, 16 + Math.sin(t * 18 + i * 2.4) * 32 + (i * 4)) + 'px');
      }, 70);
    }
    function stopVisualizer() { if (vizInterval) clearInterval(vizInterval); bars.forEach(b => b.style.height = '14px'); }

    function renderTracklist() {
      trackPanel.innerHTML = '';
      tracks.forEach((track, idx) => {
        const card = document.createElement('div'); card.className = 'track-card';
        card.innerHTML = `
          <div class="track-num">${idx+1}</div>
          <div class="track-details">
            <div class="track-name">${track.name}</div>
            <div class="track-desc">${track.desc}</div>
          </div>
          <button class="play-btn" data-track-id="${track.id}">▶ PLAY</button>
        `;
        trackPanel.appendChild(card);
      });
      document.querySelectorAll('.play-btn').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); playTrack(btn.dataset.trackId); });
      });
    }

    stopAllBtn.addEventListener('click', stopAll);
    setInterval(() => { if (!isPlaying) statusText.textContent = statusText.textContent === 'INSERT COIN' ? 'SELECT TRACK' : 'INSERT COIN'; }, 1500);
    renderTracklist();
    bars.forEach(b => b.style.height = '14px');
    updateVolumes(); // sync display

    document.body.addEventListener('click', async () => { if (!audioCtx) await initAudio(); }, { once: true });
    window.addEventListener('beforeunload', () => { stopAll(); if (audioCtx) audioCtx.close(); });
  })();
</script>
