        // ---------- AUDIO ENGINE (BALANCED REAL BASS + EQUAL INSTRUMENT LEVELS v3) ----------
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioContext.createGain();
                masterGain.gain.value = 0.1; // balanced master for equal band presence
                masterCompressor = audioContext.createDynamicsCompressor();
                masterCompressor.threshold.setValueAtTime(-26, audioContext.currentTime);
                masterCompressor.knee.setValueAtTime(14, audioContext.currentTime);
                masterCompressor.ratio.setValueAtTime(4, audioContext.currentTime);
                masterCompressor.attack.setValueAtTime(0.005, audioContext.currentTime);
                masterCompressor.release.setValueAtTime(0.22, audioContext.currentTime);
                masterFilter = audioContext.createBiquadFilter();
                masterFilter.type = 'lowpass';
                masterFilter.frequency.value = 7400;
                masterFilter.Q.value = 0.65;
                masterGain.connect(masterCompressor);
                masterCompressor.connect(masterFilter);
                masterFilter.connect(audioContext.destination);
            }
        }

        function createCryptReverb() {
            const input = audioContext.createGain();
            const output = audioContext.createGain();
            const preDelay = audioContext.createDelay(0.04);
            const delay1 = audioContext.createDelay(0.42); delay1.delayTime.value = 0.42;
            const delay2 = audioContext.createDelay(0.19); delay2.delayTime.value = 0.19;
            const fb1 = audioContext.createGain(); fb1.gain.value = 0.19;
            const fb2 = audioContext.createGain(); fb2.gain.value = 0.11;
            const lp1 = audioContext.createBiquadFilter(); lp1.type = 'lowpass'; lp1.frequency.value = 2550;
            const lp2 = audioContext.createBiquadFilter(); lp2.type = 'lowpass'; lp2.frequency.value = 1850;
            const dry = audioContext.createGain(); dry.gain.value = 1.0;
            const wet = audioContext.createGain(); wet.gain.value = 0.29; // clearer mix
            input.connect(dry);
            input.connect(preDelay);
            preDelay.connect(delay1);
            delay1.connect(fb1).connect(lp1).connect(delay1);
            delay1.connect(delay2);
            delay2.connect(fb2).connect(lp2).connect(delay2);
            delay2.connect(wet);
            dry.connect(output);
            wet.connect(output);
            return { input, output };
        }

        function connectWithPan(source, outputNode, pan) {
            if (audioContext.createStereoPanner) {
                const panner = new StereoPannerNode(audioContext, { pan: pan });
                source.connect(panner).connect(outputNode);
                return panner;
            } else {
                const splitter = audioContext.createChannelSplitter(2);
                const merger = audioContext.createChannelMerger(2);
                const leftGain = audioContext.createGain(); leftGain.gain.value = pan <=0 ? 1 : Math.max(0, 1 - pan);
                const rightGain = audioContext.createGain(); rightGain.gain.value = pan >=0 ? 1 : Math.max(0, 1 + pan);
                source.connect(splitter);
                splitter.connect(leftGain, 0).connect(merger, 0, 0);
                splitter.connect(rightGain, 0).connect(merger, 0, 1);
                merger.connect(outputNode);
                return null;
            }
        }

        // REAL PLUCKY BASS GUITAR – sawtooth + sine (clear, defined electric bass, no pad smoothness)
        function playBassNote(freq, time, outputNode, pan = 0) {
            const osc1 = audioContext.createOscillator(); osc1.type = 'sawtooth'; osc1.frequency.value = freq;
            const osc2 = audioContext.createOscillator(); osc2.type = 'sine'; osc2.frequency.value = freq * 0.5;
            const gain = audioContext.createGain();
            const filter = audioContext.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 1420;
            gain.gain.setValueAtTime(1.0, time);
            gain.gain.linearRampToValueAtTime(1.86, time + 0.028);   // tight plucky attack
            gain.gain.exponentialRampToValueAtTime(0.19, time + 0.52); // short sustain, guitar-like
            gain.gain.exponentialRampToValueAtTime(0.001, time + 1.85);
            osc1.connect(filter);
            osc2.connect(filter);
            filter.connect(gain);
            const panner = connectWithPan(gain, outputNode, pan);
            osc1.start(time); osc2.start(time);
            osc1.stop(time + 2.1); osc2.stop(time + 2.1);
        }

        // BALANCED DRUMS – clear, punchy but not louder than bass/lead
        function playKick(time, out, pan=0) {
            const osc = audioContext.createOscillator(); osc.type='sine'; osc.frequency.setValueAtTime(168, time); osc.frequency.exponentialRampToValueAtTime(36, time+0.18);
            const click = audioContext.createOscillator(); click.type='triangle'; click.frequency.value=86;
            const gain = audioContext.createGain(); gain.gain.setValueAtTime(3.02, time); gain.gain.exponentialRampToValueAtTime(0.001, time+0.37);
            const clickGain = audioContext.createGain(); clickGain.gain.setValueAtTime(0.29, time); clickGain.gain.exponentialRampToValueAtTime(0.001, time+0.013);
            const panner = connectWithPan(gain, out, pan);
            osc.connect(gain); click.connect(clickGain); clickGain.connect(gain);
            osc.start(time); click.start(time); osc.stop(time+0.43); click.stop(time+0.027);
        }

        function playSnare(time, out, pan=0) {
            const noise = audioContext.createBufferSource();
            const buf = audioContext.createBuffer(1, audioContext.sampleRate*0.30, audioContext.sampleRate);
            const data = buf.getChannelData(0); for(let i=0;i<buf.length;i++) data[i]=(Math.random()*2-1)*0.68;
            noise.buffer=buf;
            const tone = audioContext.createOscillator(); tone.type='triangle'; tone.frequency.value=202;
            const filter = audioContext.createBiquadFilter(); filter.type='bandpass'; filter.frequency.value=2060; filter.Q.value=0.98;
            const gain = audioContext.createGain(); gain.gain.setValueAtTime(3.64, time); gain.gain.exponentialRampToValueAtTime(0.001, time+0.28);
            const toneGain = audioContext.createGain(); toneGain.gain.setValueAtTime(0.19, time); toneGain.gain.exponentialRampToValueAtTime(0.001, time+0.14);
            noise.connect(filter); filter.connect(gain);
            tone.connect(toneGain); toneGain.connect(gain);
            const panner = connectWithPan(gain, out, pan);
            noise.start(time); tone.start(time); noise.stop(time+0.30); tone.stop(time+0.18);
        }

        function playHat(time, out, pan=0) {
            const noise = audioContext.createBufferSource();
            const buf = audioContext.createBuffer(1, audioContext.sampleRate*0.102, audioContext.sampleRate);
            const data = buf.getChannelData(0); for(let i=0;i<buf.length;i++) data[i]=(Math.random()*2-1)*0.54;
            noise.buffer=buf;
            const filter = audioContext.createBiquadFilter(); filter.type='highpass'; filter.frequency.value=7500;
            const gain = audioContext.createGain(); gain.gain.setValueAtTime(0.19, time); gain.gain.exponentialRampToValueAtTime(0.001, time+0.080);
            noise.connect(filter); filter.connect(gain);
            const panner = connectWithPan(gain, out, pan);
            noise.start(time); noise.stop(time+0.105);
        }

        function playThereminNote(freq, time, out, pan=0) {
            const osc = audioContext.createOscillator(); osc.type = 'sine';
            const gain = audioContext.createGain();
            const lfo = audioContext.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 6;
            const lfoGain = audioContext.createGain(); lfoGain.gain.value = 8;
            lfo.connect(lfoGain).connect(osc.frequency);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.0, time);
            gain.gain.linearRampToValueAtTime(0.12, time+0.4);
            gain.gain.exponentialRampToValueAtTime(0.001, time+1.8);
            const panner = connectWithPan(gain, out, pan);
            osc.connect(gain).connect(panner||out);
            osc.start(time); lfo.start(time);
            osc.stop(time+2.0); lfo.stop(time+2.0);
        }

        function startDrums(out, int, pan=0, waltz=false) {
            let s=0;
            return setInterval(()=>{ if(!isPlaying)return; const t=audioContext.currentTime;
                if(waltz) {
                    if(s%3===0) playKick(t,out,pan);
                    if(s%3===1) playSnare(t,out,pan*0.8);
                } else {
                    if(s%4===0||s%4===2) playKick(t,out,pan);
                    if(s%4===1||s%4===3) playSnare(t,out,pan*0.8);
                }
                playHat(t,out,pan*0.5); s++; }, int);
        }

        function startBassLayer(out, notes, int, pan=0) {
            let s=0;
            return setInterval(()=>{ if(!isPlaying)return; playBassNote(notes[s%notes.length], audioContext.currentTime, out, pan); s++; }, int);
        }

        function startSubBass(out, notes, int, pan=0) {
            let s=0;
            return setInterval(()=>{ if(!isPlaying)return;
                const o=audioContext.createOscillator(); o.type='sine'; o.frequency.value=notes[s%notes.length];
                const g=audioContext.createGain(); g.gain.setValueAtTime(0.0, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime+1.8);
                const p=connectWithPan(o,out,pan); o.connect(g).connect(p||out); o.start(); o.stop(audioContext.currentTime+2.0); s++;
            }, int);
        }

        function startPadLayer(out, freqs, pan=0) {
            const oscs = freqs.map(f=>{ const o=audioContext.createOscillator(); o.type='triangle'; o.frequency.value=f; return o; });
            const g=audioContext.createGain(); g.gain.value=0.0; // lowered for balance
            const f=audioContext.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1680;
            oscs.forEach(o=>o.connect(f)); f.connect(g);
            const p=connectWithPan(g,out,pan); g.connect(p||out);
            oscs.forEach(o=>o.start());
            return {oscs,gain:g,filter:f};
        }

        function startArpeggioLayer(out, notes, speed, pan=0) {
            let s=0;
            return setInterval(()=>{ if(!isPlaying)return;
                const o=audioContext.createOscillator(); o.type='triangle'; o.frequency.value=notes[s%notes.length];
                const g=audioContext.createGain(); g.gain.setValueAtTime(0.0, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime+0.28);
                const p=connectWithPan(o,out,pan); o.connect(g).connect(p||out); o.start(); o.stop(audioContext.currentTime+0.32); s++;
            }, speed);
        }

        function startLeadMelody(out, melody, step, pan=0, useTheremin=false) {
            let i=0;
            return setInterval(()=>{ if(!isPlaying)return; if(melody[i]>0){
                if(useTheremin) playThereminNote(melody[i], audioContext.currentTime, out, pan);
                else {
                    const o=audioContext.createOscillator(); o.type='sine'; o.frequency.value=melody[i];
                    const g=audioContext.createGain(); g.gain.setValueAtTime(0.0, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime+0.8);
                    const p=connectWithPan(o,out,pan); o.connect(g).connect(p||out); o.start(); o.stop(audioContext.currentTime+0.9);
                }
            } i=(i+1)%melody.length; }, step);
        }

        function startClimaxStabs(out) {
            return setInterval(()=>{ if(!isPlaying)return;
                const o=audioContext.createOscillator(); o.type='sawtooth'; o.frequency.value=150+Math.random()*250;
                const g=audioContext.createGain(); g.gain.setValueAtTime(0.048, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime+0.2);
                o.connect(g).connect(out); o.start(); o.stop(audioContext.currentTime+0.25);
            }, 450);
        }

        function resolveTheme(out) {
            return setInterval(()=>{ if(!isPlaying)return;
                const o=audioContext.createOscillator(); o.type='sine'; o.frequency.value=35;
                const g=audioContext.createGain(); g.gain.setValueAtTime(0.05, audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime+1.2);
                o.connect(g).connect(out); o.start(); o.stop(audioContext.currentTime+1.4);
            }, 900);
        }

        function stopAllLayers() {
            [activeBassInt,activeSubInt,activeArpInt,activeLeadInt,activeClimaxInt,activeDrumsInt,activeResolveInt,activeThereminInt].forEach(i=>{ if(i)clearInterval(i); });
            activeBassInt=activeSubInt=activeArpInt=activeLeadInt=activeClimaxInt=activeDrumsInt=activeResolveInt=activeThereminInt=null;
            if(activePadNodes){ activePadNodes.oscs.forEach(o=>{ try{o.stop()}catch(e){} }); activePadNodes=null; }
        }

        function stopCurrentSong() {
            if(!currentSongKey) return;
            isPlaying = false;
            masterGain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1.8);
            clearTimeout(fadeTimeout); clearTimeout(endFadeTimeout);
            endFadeTimeout = setTimeout(() => {
                stopAllLayers();
                const btn=document.querySelector(`.play-btn[data-song="${currentSongKey}"]`);
                if(btn)btn.innerHTML='▶';
                document.querySelector(`.song-item[data-song="${currentSongKey}"]`)?.classList.remove('playing');
                currentSongKey=null;
                if(updateTimer)clearInterval(updateTimer);
            }, 1900);
        }

        // ---- MP3 EXPORT (unchanged) ----
        function encodeWavToMp3(wavData, sampleRate) {
            const mp3encoder = new lamejs.Mp3Encoder(2, sampleRate, 128);
            const samples = new Int16Array(wavData);
            const left = new Int16Array(samples.length / 2);
            const right = new Int16Array(samples.length / 2);
            for (let i = 0; i < samples.length; i += 2) {
                left[i/2] = samples[i];
                right[i/2] = samples[i+1];
            }
            const mp3Data = [];
            const blockSize = 1152;
            for (let i = 0; i < left.length; i += blockSize) {
                const leftChunk = left.subarray(i, i + blockSize);
                const rightChunk = right.subarray(i, i + blockSize);
                const mp3buf = mp3encoder.encodeBuffer(leftChunk, rightChunk);
                if (mp3buf.length > 0) mp3Data.push(mp3buf);
            }
            const end = mp3encoder.flush();
            if (end.length > 0) mp3Data.push(end);
            return new Blob(mp3Data, { type: 'audio/mp3' });
        }

        function startRecordingForExport(key) {
            if (isRecording) return;
            initAudio();
            if (audioContext.state === 'suspended') audioContext.resume();
            if (currentSongKey) stopCurrentSong();
            mediaStreamDestination = audioContext.createMediaStreamDestination();
            masterFilter.disconnect(audioContext.destination);
            masterFilter.connect(audioContext.destination);
            masterFilter.connect(mediaStreamDestination);
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(mediaStreamDestination.stream, { mimeType: 'audio/webm;codecs=opus' });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = async () => {
                isRecording = false;
                const exportBtn = document.querySelector(`.export-btn[data-song="${exportSongKey}"]`);
                if (exportBtn) {
                    exportBtn.textContent = '⬇️ MP3';
                    exportBtn.classList.remove('recording');
                }
                const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                const arrayBuffer = await blob.arrayBuffer();
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                const leftChannel = audioBuffer.getChannelData(0);
                const rightChannel = audioBuffer.numberOfChannels > 1 ? audioBuffer.getChannelData(1) : leftChannel;
                const interleaved = new Int16Array(leftChannel.length * 2);
                for (let i = 0; i < leftChannel.length; i++) {
                    interleaved[i*2] = Math.max(-32768, Math.min(32767, leftChannel[i] * 32767));
                    interleaved[i*2+1] = Math.max(-32768, Math.min(32767, rightChannel[i] * 32767));
                }
                const mp3Blob = encodeWavToMp3(interleaved.buffer, audioBuffer.sampleRate);
                const url = URL.createObjectURL(mp3Blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${themeConfigs[exportSongKey].name.replace(/[^a-z0-9]/gi,'_')}.mp3`;
                a.click();
                URL.revokeObjectURL(url);
                masterFilter.disconnect(mediaStreamDestination);
                mediaStreamDestination = null;
                exportSongKey = null;
            };
            mediaRecorder.start();
            isRecording = true;
            exportSongKey = key;
            const exportBtn = document.querySelector(`.export-btn[data-song="${key}"]`);
            if (exportBtn) {
                exportBtn.textContent = '🔴 REC';
                exportBtn.classList.add('recording');
            }
            startSong(key, () => {
                if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
            });
        }

        function updateProgress() {
            if(!currentSongKey)return;
            const cfg=themeConfigs[currentSongKey];
            const elapsed=Math.min(Math.floor((Date.now()-songStartTime)/1000), cfg.totalDuration);
            const fill=document.getElementById(`fill-${currentSongKey}`);
            const timeEl=document.getElementById(`time-${currentSongKey}`);
            if(fill)fill.style.width=`${(elapsed/cfg.totalDuration)*100}%`;
            if(timeEl){ const m=Math.floor(elapsed/60), s=elapsed%60, tm=Math.floor(cfg.totalDuration/60), ts=cfg.totalDuration%60;
                timeEl.textContent=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')} / ${tm}:${ts.toString().padStart(2,'0')}`; }
        }

        function startSong(key, onCompleteCallback = null) {
            const cfg=themeConfigs[key]; if(!cfg)return;
            stopCurrentSong(); initAudio(); if(audioContext.state==='suspended') audioContext.resume();
            isPlaying=true; currentSongKey=key; songStartTime=Date.now();
            masterGain.gain.cancelScheduledValues(audioContext.currentTime);
            masterGain.gain.setValueAtTime(0.001, audioContext.currentTime);
            masterGain.gain.exponentialRampToValueAtTime(0.78, audioContext.currentTime + 1.0);
            const rev = createCryptReverb(); rev.output.connect(masterGain);
            const pan=cfg.panMap;
            activeBassInt = startBassLayer(rev.input, cfg.bassNotes, cfg.bassInterval, pan.bass);
            activeSubInt = startSubBass(rev.input, cfg.subBassNotes, cfg.subBassInterval, pan.sub);
            activePadNodes = startPadLayer(rev.input, cfg.padFreqs, pan.pad);
            cfg.sections.forEach(s=>{ setTimeout(()=>{ if(currentSongKey!==key||!isPlaying)return;
                if(s.filter) masterFilter.frequency.setTargetAtTime(s.filter, audioContext.currentTime, 3.0);
                if(activePadNodes?.gain) activePadNodes.gain.gain.setTargetAtTime(s.padGain, audioContext.currentTime, 3.2);
                if(s.action.includes('verse')){
                    if(activeLeadInt){clearInterval(activeLeadInt);activeLeadInt=null;}
                    if(activeDrumsInt){clearInterval(activeDrumsInt);activeDrumsInt=null;}
                    if(activeClimaxInt){clearInterval(activeClimaxInt);activeClimaxInt=null;}
                    if(activeArpInt)clearInterval(activeArpInt);
                    activeArpInt=startArpeggioLayer(rev.input, cfg.arpNotes, s.arpSpeed||cfg.arpSpeed, pan.arp);
                } else if(s.action.includes('chorus') || s.action === 'prechorus'){
                    if(activeClimaxInt){clearInterval(activeClimaxInt);activeClimaxInt=null;}
                    if(activeLeadInt)clearInterval(activeLeadInt);
                    activeLeadInt=startLeadMelody(rev.input, cfg.leadMelody, cfg.leadStepTime, pan.lead, cfg.useTheremin && s.theremin);
                    if(!activeDrumsInt)activeDrumsInt=startDrums(rev.input, cfg.drumInterval, pan.drums, cfg.waltzDrums);
                    if(!activeArpInt)activeArpInt=startArpeggioLayer(rev.input, cfg.arpNotes, cfg.arpSpeed, pan.arp);
                } else if(s.action==='bridge'){
                    if(activeArpInt){clearInterval(activeArpInt);activeArpInt=null;}
                    if(activeLeadInt){clearInterval(activeLeadInt);activeLeadInt=null;}
                    if(activeDrumsInt){clearInterval(activeDrumsInt);activeDrumsInt=null;}
                    if(s.startClimax)activeClimaxInt=startClimaxStabs(rev.input);
                } else if(s.action==='outro'){
                    stopAllLayers();
                    activeResolveInt=resolveTheme(rev.input);
                }
            }, s.time); });
            fadeTimeout = setTimeout(()=> {
                if(currentSongKey===key) {
                    masterGain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 2.5);
                    setTimeout(()=> {
                        stopCurrentSong();
                        if (onCompleteCallback) onCompleteCallback();
                    }, 2600);
                }
            }, cfg.totalDuration*1000 - 2500);
            updateTimer=setInterval(updateProgress, 300);
            const btn=document.querySelector(`.play-btn[data-song="${key}"]`); if(btn)btn.innerHTML='❚❚';
            document.querySelector(`.song-item[data-song="${key}"]`)?.classList.add('playing');
        }

        function buildUI() {
            const cont=document.getElementById('song-list');
            const songs=[
                {key:'return-main-theme',title:'RETURN OF THE UNDEAD (MAIN THEME)',tag:'OPENING CREDITS'},
                {key:'grave-awakening',title:'GRAVE AWAKENING',tag:'THE RISING'},
                {key:'rising-horde',title:'RISING HORDE',tag:'THE HORDE AWAKENS'},
                {key:'flesh-reborn',title:'FLESH REBORN',tag:'BODY HORROR'},
                {key:'crypt-revival',title:'CRYPT REVIVAL',tag:'ANCIENT EVIL'},
                {key:'undead-revenge',title:'UNDEAD REVENGE',tag:'RELENTLESS'},
                {key:'brain-feast-return',title:'BRAIN FEAST RETURN',tag:'HUNGER RETURNS'},
                {key:'midnight-resurrection',title:'MIDNIGHT RESURRECTION',tag:'MOONLIT TERROR'},
                {key:'survivors-last-stand',title:"SURVIVOR'S LAST STAND",tag:'FINAL BATTLE'},
                {key:'eternal-hunger',title:'ETERNAL HUNGER',tag:'NEVER ENDS'},
                {key:'horde-march',title:'HORDE MARCH',tag:'MARCH OF THE DEAD'},
                {key:'final-confrontation',title:'FINAL CONFRONTATION',tag:'END CREDITS'}
            ];
            cont.innerHTML='';
            songs.forEach(s=>{
                const cfg=themeConfigs[s.key];
                const total=`${Math.floor(cfg.totalDuration/60)}:${(cfg.totalDuration%60).toString().padStart(2,'0')}`;
                const div=document.createElement('div');
                div.className='song-item';
                div.dataset.song=s.key;
                div.innerHTML = `
                    <div class="now-playing">💀 NOW PLAYING 💀</div>
                    <button class="play-btn" data-song="${s.key}">▶</button>
                    <div style="flex:1;">
                        <div class="song-name">${cfg.name} <span class="badge">${s.tag}</span></div>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar"><div class="progress-fill" id="fill-${s.key}"></div></div>
                        <div class="time-display" id="time-${s.key}">00:00 / ${total}</div>
                    </div>
                    <button class="export-btn" data-song="${s.key}" title="Export full track as MP3">⬇️ MP3</button>
                `;
                cont.appendChild(div);
            });
         
            document.querySelectorAll('.play-btn').forEach(b=>b.addEventListener('click',function(){
                const k=this.dataset.song;
                if(currentSongKey===k) stopCurrentSong();
                else startSong(k);
            }));
         
            document.querySelectorAll('.export-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const key = this.dataset.song;
                    if (isRecording && exportSongKey === key) return;
                    if (isRecording) {
                        if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
                    }
                    startRecordingForExport(key);
                });
            });
        }
        window.onload=buildUI;
    })();
</script>
</body>
</html>
