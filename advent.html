<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Castle of the Dammed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --green: #0f0;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: var(--green);
            font-family: 'Press Start 2P', system-ui;
            image-rendering: pixelated;
            overflow: hidden;
            touch-action: manipulation;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            text-align: center;
            padding: 8px 0;
            background: linear-gradient(#111, #222);
            border-bottom: 6px solid var(--green);
            box-shadow: 0 0 20px var(--green);
            flex-shrink: 0;
        }
        
        h1 {
            margin: 0;
            font-size: 24px;
            text-shadow: 
                0 0 10px var(--green),
                4px 4px 0 #000;
            letter-spacing: 3px;
        }
        
        .subtitle {
            font-size: 11px;
            margin: 3px 0 0 0;
            color: #8f8;
            text-shadow: 0 0 8px var(--green);
        }
        
        .main-game {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 100%;
            margin: 0 auto;
            padding: 8px;
            overflow: hidden;
        }
        
        .game-area {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 8px;
        }
        
        #scene {
            border: 8px solid #333;
            border-top: 12px solid #222;
            box-shadow: 
                0 0 30px var(--green),
                inset 0 0 40px rgba(0, 255, 0, 0.3);
            background: #111;
            cursor: crosshair;
            image-rendering: pixelated;
            touch-action: none;
            flex-shrink: 0;
            max-width: 100%;
        }
        
        /* Compact tabbed controls with ALWAYS-VISIBLE LOG */
        .controls {
            flex-shrink: 0;
            background: #111;
            border: 6px solid var(--green);
            box-shadow: 0 0 15px var(--green);
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .tab-bar {
            display: flex;
            background: #222;
            border-bottom: 4px solid var(--green);
            flex-shrink: 0;
        }
        
        .tab {
            flex: 1;
            padding: 9px 8px;
            text-align: center;
            font-size: 10px;
            color: #8f8;
            cursor: pointer;
            transition: all 0.1s;
            border-right: 2px solid #333;
        }
        
        .tab:last-child {
            border-right: none;
        }
        
        .tab.active {
            background: var(--green);
            color: #000;
            font-weight: bold;
        }
        
        /* Persistent log - always visible, compact */
        .persistent-log {
            background: #000;
            border-top: 4px solid var(--green);
            padding: 6px 8px;
            height: 118px;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        #status {
            height: 100%;
            overflow-y: auto;
            font-size: 11.5px;
            line-height: 1.4;
            color: var(--green);
            white-space: pre-wrap;
        }
        
        /* Tab contents (commands + inventory only) */
        .tab-content {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        #verbs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }
        
        .verb-btn {
            background: #222;
            color: var(--green);
            border: 3px solid var(--green);
            padding: 9px 4px;
            font-family: 'Press Start 2P', system-ui;
            font-size: 10.5px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
            box-shadow: 0 0 8px var(--green);
        }
        
        .verb-btn:hover, .verb-btn:active {
            background: var(--green);
            color: #000;
            transform: scale(1.08);
        }
        
        .verb-btn.active {
            background: var(--green);
            color: #000;
        }
        
        #inventory {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            min-height: 105px;
        }
        
        .inv-slot {
            width: 54px;
            height: 54px;
            background: #222;
            border: 4px solid var(--green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 0 8px var(--green);
        }
        
        .inv-slot:hover, .inv-slot:active {
            background: #330;
            transform: scale(1.12);
        }
        
        .current-verb {
            margin-top: 6px;
            font-size: 10px;
            text-align: center;
            color: #8f8;
        }
        
        .no-items {
            text-align: center;
            font-size: 10px;
            color: #8f8;
            padding: 20px 0;
        }
        
        /* Desktop wide layout - side-by-side, still fits perfectly */
        @media (min-width: 900px) {
            .main-game {
                flex-direction: row;
                gap: 12px;
            }
            .game-area {
                flex: 1;
            }
            #scene {
                max-width: none;
                width: 800px;
                height: 420px;
            }
            .controls {
                width: 268px;
                max-height: 420px;
            }
            .persistent-log {
                height: 112px;
            }
        }
        
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                rgba(0, 255, 0, 0.09) 0px,
                rgba(0, 255, 0, 0.09) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 9999;
            animation: flicker 4s infinite alternate;
        }
        
        @keyframes flicker {
            0% { opacity: 0.92; }
            100% { opacity: 1; }
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .modal-content {
            background: #111;
            border: 8px solid var(--green);
            max-width: 520px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 40px var(--green);
            width: 90%;
        }
        
        .modal h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: var(--green);
        }
    </style>
</head>
<body>
    <header>
        <h1>CASTLE OF THE DAMMED</h1>
        <div class="subtitle">NIGHTFALL GAMES • 1984</div>
        <div style="font-size:9px; margin-top:2px; color:#8f8;">LucasArts / Sierra • Always-Visible Log</div>
    </header>

    <div class="main-game">
        <div class="game-area">
            <canvas id="scene" width="800" height="420"></canvas>
            
            <!-- Compact controls with persistent log -->
            <div class="controls">
                <!-- Tab bar: only Commands + Inventory -->
                <div class="tab-bar">
                    <div class="tab active" data-tab="commands" onclick="switchTab('commands')">COMMAND</div>
                    <div class="tab" data-tab="inventory" onclick="switchTab('inventory')">INVENTORY</div>
                </div>
                
                <!-- ALWAYS VISIBLE LOG -->
                <div class="persistent-log">
                    <div id="status"></div>
                </div>
                
                <!-- Commands tab content -->
                <div id="tab-commands" class="tab-content active">
                    <div id="verbs">
                        <button class="verb-btn" data-verb="walk" onclick="setVerb('walk')">WALK TO</button>
                        <button class="verb-btn" data-verb="look" onclick="setVerb('look')">LOOK AT</button>
                        <button class="verb-btn" data-verb="pick" onclick="setVerb('pick')">PICK UP</button>
                        <button class="verb-btn" data-verb="talk" onclick="setVerb('talk')">TALK TO</button>
                        <button class="verb-btn" data-verb="use" onclick="setVerb('use')">USE</button>
                    </div>
                    <div class="current-verb">
                        CURRENT: <span id="verb-text" style="color:var(--green); font-weight:bold;">WALK TO</span>
                    </div>
                </div>
                
                <!-- Inventory tab content -->
                <div id="tab-inventory" class="tab-content">
                    <div id="inventory"></div>
                    <div id="no-items" class="no-items">
                        (Your pockets are empty)
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Win modal -->
    <div id="win-modal" class="modal">
        <div class="modal-content">
            <h2>🎉 THE CURSE IS BROKEN! 🎉</h2>
            <p style="font-size:14px; line-height:1.6; margin:20px 0;">
                The Spectral Lord is banished.<br>
                The ancient door swings open to freedom.<br><br>
                <strong>NIGHTFALL GAMES 1984</strong><br>
                Thank you, brave adventurer!
            </p>
            <button onclick="restartGame()" style="background:var(--green); color:#000; border:4px solid #000; padding:16px 32px; font-family:'Press Start 2P'; font-size:14px; cursor:pointer; width:100%; max-width:280px;">
                PLAY AGAIN
            </button>
        </div>
    </div>

    <div class="scanlines"></div>

    <script>
        // ====================== COMPACT GAME WITH ALWAYS-VISIBLE LOG ======================
        const canvas = document.getElementById('scene');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        let player = { x: 380, y: 310, speed: 5.8 };
        let targetPos = { x: 380, y: 310 };
        let moving = false;
        let currentVerb = 'walk';
        let selectedItem = null;
        let banished = false;
        let gameTime = 0;

        let sceneObjects = [
            { id: 'door', name: 'Ancient Oak Door', x: 80, y: 95, width: 92, height: 215, type: 'door' },
            { id: 'ghost', name: 'Spectral Lord', x: 515, y: 85, width: 78, height: 165, type: 'npc' },
            { id: 'sword', name: 'Rusty Sword', x: 255, y: 290, width: 72, height: 42, type: 'item' },
            { id: 'tapestry', name: 'Faded Tapestry', x: 620, y: 40, width: 95, height: 135, type: 'object' }
        ];

        let inventory = [];
        let audioContext;

        const statusEl = document.getElementById('status');

        function showMessage(text) {
            const timestamp = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            statusEl.innerHTML += `<br><span style="color:#8f8">[${timestamp}]</span> ${text}`;
            statusEl.scrollTop = statusEl.scrollHeight;
            
            if (statusEl.children.length > 14) {
                statusEl.removeChild(statusEl.children[0]);
            }
        }

        function playSound(type) {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            if (type === 'click') {
                osc.frequency.setValueAtTime(680, audioContext.currentTime);
                gain.gain.value = 0.3;
                gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.08);
            } else if (type === 'pick') {
                osc.frequency.setValueAtTime(240, audioContext.currentTime);
                gain.gain.value = 0.6;
                gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.4);
            } else if (type === 'talk') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, audioContext.currentTime);
                gain.gain.value = 0.4;
                gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.6);
            } else if (type === 'sword') {
                osc.frequency.setValueAtTime(880, audioContext.currentTime);
                gain.gain.value = 0.7;
                gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.25);
            } else if (type === 'win') {
                let t = audioContext.currentTime;
                osc.frequency.setValueAtTime(440, t);
                gain.gain.value = 0.5;
                osc.start(t);
                osc.frequency.setValueAtTime(550, t + 0.15);
                osc.frequency.setValueAtTime(660, t + 0.3);
                osc.frequency.setValueAtTime(880, t + 0.5);
                gain.gain.linearRampToValueAtTime(0, t + 1.2);
                osc.stop(t + 1.3);
                return;
            }
            osc.start();
            osc.stop(audioContext.currentTime + 0.8);
        }

        function setVerb(verb) {
            currentVerb = verb;
            selectedItem = null;
            document.querySelectorAll('.verb-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-verb') === verb);
            });
            document.getElementById('verb-text').textContent = verb.toUpperCase();
            
            if (verb === 'use' && inventory.length === 0) {
                showMessage("Nothing in your inventory to use.");
                setVerb('walk');
            }
        }

        function updateInventoryUI() {
            const container = document.getElementById('inventory');
            container.innerHTML = '';
            
            if (inventory.length === 0) {
                document.getElementById('no-items').style.display = 'block';
                return;
            }
            
            document.getElementById('no-items').style.display = 'none';
            
            inventory.forEach(item => {
                const slot = document.createElement('div');
                slot.className = 'inv-slot';
                slot.innerHTML = `🗡️<br><span style="font-size:9px;">${item}</span>`;
                slot.onclick = () => {
                    selectedItem = item;
                    setVerb('use');
                    showMessage(`Selected: ${item}`);
                    playSound('click');
                };
                container.appendChild(slot);
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        // === DRAWING FUNCTIONS (unchanged) ===
        function drawBackground() {
            ctx.fillStyle = '#4a3c2a';
            ctx.fillRect(0, 235, 800, 185);
            ctx.strokeStyle = '#6b5a44';
            ctx.lineWidth = 5;
            for (let x = 18; x < 800; x += 52) { ctx.beginPath(); ctx.moveTo(x, 235); ctx.lineTo(x, 420); ctx.stroke(); }
            for (let y = 255; y < 420; y += 36) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(800, y); ctx.stroke(); }
            
            ctx.fillStyle = '#555';
            ctx.fillRect(0, 0, 800, 235);
            ctx.strokeStyle = '#3a3a3a';
            ctx.lineWidth = 3;
            for (let x = 0; x < 800; x += 34) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 235); ctx.stroke(); }
            for (let y = 0; y < 235; y += 26) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(800, y); ctx.stroke(); }
            
            ctx.fillStyle = '#333';
            ctx.fillRect(18, 22, 42, 213);
            ctx.fillRect(740, 22, 42, 213);
            ctx.beginPath(); ctx.arc(39, 82, 39, Math.PI, 0, false); ctx.fill();
            ctx.beginPath(); ctx.arc(761, 82, 39, Math.PI, 0, false); ctx.fill();
            
            const flicker = Math.sin(gameTime / 80) * 8 + 8;
            ctx.shadowBlur = 28 + flicker;
            ctx.shadowColor = '#f80';
            ctx.fillStyle = 'rgba(255, 160, 30, 0.75)';
            ctx.fillRect(48, 98, 18, 14);
            ctx.fillRect(734, 98, 18, 14);
            ctx.shadowBlur = 0;
            
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(68, 34, 138, 6); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(800, 0); ctx.quadraticCurveTo(732, 34, 662, 6); ctx.stroke();
            
            ctx.font = 'bold 19px "Press Start 2P"';
            ctx.fillStyle = '#0f0';
            ctx.shadowBlur = 14;
            ctx.shadowColor = '#0f0';
            ctx.fillText('THE GREAT HALL', 232, 36);
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = 'rgba(240,240,240,0.7)';
            for (let i = 0; i < 22; i++) {
                const px = (i * 41 + (gameTime / 30)) % 810;
                const py = 35 + (i * 17 % 165);
                ctx.fillRect(px, py, 2.5, 2.5);
            }
        }

        function drawObjects() {
            const ghostBob = Math.sin(gameTime / 280) * 12;
            sceneObjects.forEach(obj => {
                if (obj.id === 'door') {
                    ctx.fillStyle = '#3f2a1e';
                    ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
                    ctx.fillStyle = '#888';
                    ctx.fillRect(obj.x + 14, obj.y + 22, 9, 172);
                    ctx.fillRect(obj.x + 68, obj.y + 22, 9, 172);
                    ctx.fillStyle = '#aaa';
                    ctx.fillRect(obj.x + 62, obj.y + 115, 19, 9);
                    ctx.fillStyle = '#555';
                    ctx.fillRect(obj.x + 67, obj.y + 118, 8, 8);
                    if (banished) {
                        ctx.fillStyle = '#0f0';
                        ctx.font = 'bold 15px "Press Start 2P"';
                        ctx.shadowBlur = 12;
                        ctx.shadowColor = '#0f0';
                        ctx.fillText('OPEN', obj.x + 18, obj.y + 265);
                        ctx.shadowBlur = 0;
                    }
                } 
                else if (obj.id === 'ghost') {
                    const alpha = 0.68 + Math.sin(gameTime / 200) * 0.12;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = '#aaffff';
                    ctx.beginPath(); ctx.ellipse(obj.x + 39, obj.y + 98 + ghostBob, 33, 58, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(obj.x + 39, obj.y + 50 + ghostBob, 27, 0, Math.PI * 2); ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.fillStyle = '#ff2222';
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = '#f00';
                    ctx.fillRect(obj.x + 19, obj.y + 41 + ghostBob, 10, 14);
                    ctx.fillRect(obj.x + 49, obj.y + 41 + ghostBob, 10, 14);
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#111';
                    ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(obj.x + 39, obj.y + 67 + ghostBob, 13, 0.4, Math.PI - 0.4); ctx.stroke();
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(obj.x + 14, obj.y + 18 + ghostBob, 4, 4);
                    ctx.fillRect(obj.x + 58, obj.y + 32 + ghostBob, 3, 3);
                } 
                else if (obj.id === 'sword') {
                    ctx.save();
                    ctx.translate(obj.x + 14, obj.y + 10);
                    ctx.rotate(-0.65);
                    ctx.fillStyle = '#ddd';
                    ctx.fillRect(0, 0, 14, 52);
                    ctx.fillStyle = '#c80';
                    ctx.fillRect(-14, 42, 42, 9);
                    ctx.fillStyle = '#531';
                    ctx.fillRect(3, 50, 9, 22);
                    ctx.restore();
                    ctx.shadowBlur = 16 + Math.sin(gameTime / 120) * 6;
                    ctx.shadowColor = '#ff0';
                    ctx.fillStyle = 'rgba(255,255,120,0.5)';
                    ctx.fillRect(obj.x + 48, obj.y + 10, 10, 8);
                    ctx.shadowBlur = 0;
                } 
                else if (obj.id === 'tapestry') {
                    ctx.fillStyle = '#3a2a1a';
                    ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
                    ctx.fillStyle = '#8a6';
                    ctx.font = '12px "Press Start 2P"';
                    ctx.fillText('🌀', obj.x + 22, obj.y + 55);
                    ctx.fillText('⚔️', obj.x + 52, obj.y + 82);
                    ctx.fillStyle = '#aaa';
                    ctx.fillRect(obj.x + 18, obj.y + 22, obj.width - 36, 6);
                }
            });
        }

        function drawPlayer() {
            const bob = moving ? Math.sin(gameTime / 90) * 4 : 0;
            const legSwing = moving ? Math.sin(gameTime / 70) * 12 : 0;
            
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.moveTo(player.x - 13, player.y + 6);
            ctx.lineTo(player.x - 19, player.y + 32 + legSwing);
            ctx.moveTo(player.x + 13, player.y + 6);
            ctx.lineTo(player.x + 19, player.y + 32 - legSwing);
            ctx.stroke();
            
            ctx.fillStyle = '#222';
            ctx.fillRect(player.x - 23, player.y - 30, 46, 39);
            ctx.fillStyle = '#b00';
            ctx.fillRect(player.x - 23, player.y - 30, 46, 12);
            
            ctx.fillStyle = '#ddd';
            ctx.beginPath();
            ctx.arc(player.x, player.y - 42, 17, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#b00';
            ctx.fillRect(player.x - 9, player.y - 63, 18, 10);
            
            ctx.fillStyle = '#111';
            ctx.fillRect(player.x - 11, player.y - 48, 22, 7);
            
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(player.x - 19, player.y - 19);
            ctx.lineTo(player.x - 33, player.y + 4 + bob);
            ctx.moveTo(player.x + 19, player.y - 19);
            ctx.lineTo(player.x + 31, player.y - 4 + bob * 0.6);
            ctx.stroke();
        }

        function gameLoop() {
            gameTime++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawObjects();
            drawPlayer();
            
            const dx = targetPos.x - player.x;
            const dy = targetPos.y - player.y;
            const dist = Math.hypot(dx, dy);
            
            if (dist > 5) {
                moving = true;
                player.x += (dx / dist) * player.speed;
                player.y += (dy / dist) * player.speed;
            } else {
                moving = false;
            }
            
            requestAnimationFrame(gameLoop);
        }

        function handleInteraction(e) {
            const rect = canvas.getBoundingClientRect();
            let clickX = (e.clientX || e.touches[0].clientX) - rect.left;
            let clickY = (e.clientY || e.touches[0].clientY) - rect.top;
            
            clickX = clickX * (canvas.width / rect.width);
            clickY = clickY * (canvas.height / rect.height);
            
            playSound('click');
            
            let hit = null;
            for (let obj of sceneObjects) {
                if (clickX >= obj.x && clickX <= obj.x + obj.width &&
                    clickY >= obj.y && clickY <= obj.y + obj.height) {
                    hit = obj;
                    break;
                }
            }
            
            if (hit) {
                if (currentVerb === 'walk') {
                    targetPos.x = hit.x + hit.width / 2;
                    targetPos.y = hit.y + hit.height + 22;
                    showMessage(`Walking to the ${hit.name.toLowerCase()}...`);
                    return;
                }
                
                if (currentVerb === 'look') {
                    if (hit.id === 'door') showMessage(banished ? "The door is open! Daylight streams in..." : "A massive oak door, sealed by dark magic.");
                    else if (hit.id === 'ghost') showMessage("A translucent knight in rusted armor. His eyes burn with hatred.");
                    else if (hit.id === 'sword') showMessage("An old rusty sword engraved with 'FOR THE DAMMED'.");
                    else if (hit.id === 'tapestry') showMessage("A faded tapestry showing a knight slaying a ghost with a glowing sword.");
                } 
                else if (currentVerb === 'pick') {
                    if (hit.id === 'sword') {
                        inventory.push('Rusty Sword');
                        updateInventoryUI();
                        sceneObjects = sceneObjects.filter(o => o.id !== 'sword');
                        showMessage("You take the Rusty Sword.");
                        playSound('pick');
                    } else showMessage("Nothing worth picking up.");
                } 
                else if (currentVerb === 'talk') {
                    if (hit.id === 'ghost') {
                        if (banished) showMessage("Only green mist remains...");
                        else if (inventory.includes('Rusty Sword')) showMessage("GHOST: \"The blade... Use it on me! End this torment!\"");
                        else showMessage("GHOST: \"Only the ancestral sword can free me...\"");
                    } else showMessage("Nothing to talk to.");
                } 
                else if (currentVerb === 'use' && selectedItem) {
                    if (selectedItem === 'Rusty Sword') {
                        if (hit.id === 'ghost') {
                            showMessage("You thrust the sword into the ghost!");
                            showMessage("A terrible scream echoes... The Spectral Lord explodes into mist!");
                            playSound('sword');
                            banished = true;
                            sceneObjects = sceneObjects.filter(o => o.id !== 'ghost');
                            inventory = inventory.filter(i => i !== 'Rusty Sword');
                            updateInventoryUI();
                        } else if (hit.id === 'door' && banished) {
                            showMessage("You push the heavy door open...");
                            playSound('win');
                            setTimeout(() => document.getElementById('win-modal').style.display = 'flex', 600);
                        } else showMessage("The sword has no effect here.");
                    }
                    selectedItem = null;
                    setVerb('walk');
                }
            } else {
                targetPos.x = Math.max(40, Math.min(clickX, 760));
                targetPos.y = Math.max(255, Math.min(clickY, 400));
                showMessage("You walk across the cold stones...");
            }
        }

        function resizeCanvas() {
            const maxW = Math.min(800, window.innerWidth - 20);
            const aspect = 800 / 420;
            const newH = maxW / aspect;
            
            canvas.style.width = maxW + 'px';
            canvas.style.height = newH + 'px';
        }

        function restartGame() {
            document.getElementById('win-modal').style.display = 'none';
            
            player = { x: 380, y: 310, speed: 5.8 };
            targetPos = { x: 380, y: 310 };
            inventory = [];
            banished = false;
            
            sceneObjects = [
                { id: 'door', name: 'Ancient Oak Door', x: 80, y: 95, width: 92, height: 215, type: 'door' },
                { id: 'ghost', name: 'Spectral Lord', x: 515, y: 85, width: 78, height: 165, type: 'npc' },
                { id: 'sword', name: 'Rusty Sword', x: 255, y: 290, width: 72, height: 42, type: 'item' },
                { id: 'tapestry', name: 'Faded Tapestry', x: 620, y: 40, width: 95, height: 135, type: 'object' }
            ];
            
            updateInventoryUI();
            statusEl.innerHTML = `<strong>BACK IN THE GREAT HALL...</strong>`;
            setVerb('walk');
            showMessage("A new attempt begins. The curse still lingers...");
            switchTab('commands');
        }

        function startGame() {
            console.log('%c✅ Castle of the Dammed – Always-Visible Log + Compact UI', 'background:#0f0;color:#000;padding:3px 8px;font-size:12px');
            
            window.addEventListener('resize', resizeCanvas);
            window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));
            
            canvas.addEventListener('click', handleInteraction);
            canvas.addEventListener('touchstart', e => { e.preventDefault(); handleInteraction(e); });
            
            setVerb('walk');
            resizeCanvas();
            gameLoop();
            
            // Initial welcome (always visible in the log)
            setTimeout(() => {
                showMessage("The bell tolls... the curse grows stronger.");
                playSound('click');
            }, 900);
            
            console.log('🎮 Log now always visible • No more tab-switching for messages • Perfect fit on PC & Android!');
        }
        
        window.onload = startGame;
    </script>
</body>
</html>
