        function encodeWavToMp3(wavData, sampleRate) {
            const mp3encoder = new lamejs.Mp3Encoder(2, sampleRate, 128); const samples = new Int16Array(wavData);
            const left = new Int16Array(samples.length / 2); const right = new Int16Array(samples.length / 2);
            for (let i = 0; i < samples.length; i += 2) { left[i/2] = samples[i]; right[i/2] = samples[i+1]; }

            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = async () => { isRecording = false; const btn = document.querySelector(`.export-btn[data-song="${exportSongKey}"]`); if(btn){btn.textContent='⬇️ MP3'; btn.classList.remove('recording');}
                const blob = new Blob(recordedChunks, { type: 'audio/webm' }); const arrayBuffer = await blob.arrayBuffer(); const audioCtx = new AudioContext(); const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                const leftChannel = audioBuffer.getChannelData(0); const rightChannel = audioBuffer.numberOfChannels > 1 ? audioBuffer.getChannelData(1) : leftChannel;

                {key:'crypt-whispers',title:'CRYPT OF WHISPERS',tag:'WHISPERING TERROR'}, {key:'bloodlust',title:'BLOODLUST',tag:'FAST & FURIOUS'},
                {key:'midnight-procession',title:'MIDNIGHT PROCESSION',tag:'MARCH OF DOOM'}, {key:'eyes-dark',title:'EYES IN THE DARK',tag:'CREEPING DREAD'},
                {key:'dawn-dead',title:'DAWN OF THE DEAD',tag:'HOPEFUL HORROR'}, {key:'requiem-living',title:'REQUIEM FOR THE LIVING',tag:'GRAND FINALE'}
            ];
            cont.innerHTML = '';
            songs.forEach(s => { const cfg = themeConfigs[s.key]; const total = `${Math.floor(cfg.totalDuration/60)}:${(cfg.totalDuration%60).toString().padStart(2,'0')}`;
                const div = document.createElement('div'); div.className = 'song-item'; div.dataset.song = s.key;
                div.innerHTML = `<div class="now-playing">💀 NOW PLAYING 💀</div><button class="play-btn" data-song="${s.key}">▶</button><div style="flex:1;"><div class="song-name">${cfg.name} <span class="badge">${s.tag}</span></div></div><div class="progress-container"><div class="progress-bar"><div class="progress-fill" id="fill-${s.key}"></div></div><div class="time-display" id="time-${s.key}">00:00 / ${total}</div></div><button class="export-btn" data-song="${s.key}" title="Export full track as MP3">⬇️ MP3</button>`;
                cont.appendChild(div); });
            document.querySelectorAll('.play-btn').forEach(b => b.addEventListener('click', function() { const k = this.dataset.song; if (currentSongKey === k) stopCurrentSong(); else startSong(k); }));
            document.querySelectorAll('.export-btn').forEach(btn => btn.addEventListener('click', function(e) { e.stopPropagation(); const key = this.dataset.song; if (isRecording && exportSongKey === key) return; if (isRecording) { if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); } startRecordingForExport(key); }));
        }
        window.onload = buildUI;
    })();
</script>
</body>
</html>
