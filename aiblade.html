<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLADE RUNNER: NIGHT CITY</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0c0c0c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 16px;
        }
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(30, 255, 108, 0.03) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2;
        }
        .crt {
            animation: textflicker 0.01s infinite;
        }
        @keyframes textflicker {
            0% { text-shadow: 0 0 3px #1eff6c; }
            50% { text-shadow: 0 0 1px #1eff6c; }
            100% { text-shadow: 0 0 3px #1eff6c; }
        }
        .terminal {
            background: #000;
            color: #1eff6c;
            border: 4px solid #1eff6c;
            box-shadow: 0 0 15px #1eff6c, inset 0 0 10px #1eff6c;
            width: 100%;
            max-width: 950px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 20px 20px 15px 20px;
            position: relative;
            z-index: 1;
        }
        .header {
            border-bottom: 2px solid #1eff6c;
            padding-bottom: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            line-height: 1.8;
            text-transform: uppercase;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            text-shadow: 0 0 5px #1eff6c;
            letter-spacing: 1px;
        }
        .header-left, .header-right { color: #1eff6c; }
        .header-center {
            text-align: center;
            width: 100%;
            margin-top: 8px;
            font-size: 14px;
            background: #000;
            color: #1eff6c;
            padding: 6px 0;
            border: 2px solid #1eff6c;
            letter-spacing: 4px;
            box-shadow: inset 0 0 10px #1eff6c;
        }
        .output {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 8px;
            border: 2px solid #1eff6c;
            padding: 18px 14px;
            background: #000;
            scroll-behavior: auto; /* smooth scrolling handled manually */
            word-break: break-word;
            box-shadow: inset 0 0 20px #1eff6c;
        }
        .output p {
            margin: 0 0 14px 0;
            color: #1eff6c;
            text-shadow: 0 0 5px #1eff6c;
        }
        .output p:last-child { margin-bottom: 0; }

        /* HUD – diegetic tape‑reel style */
        .hud {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #1eff6c;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 11px;
            text-transform: uppercase;
            background: #000;
            box-shadow: inset 0 0 10px #1eff6c;
            font-family: 'Press Start 2P', monospace;
            color: #1eff6c;
            text-shadow: 0 0 5px #1eff6c;
            gap: 8px;
        }
        .hud-section {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .health-bar {
            display: inline-block;
            letter-spacing: 2px;
            font-size: 14px;
        }
        .reputation-bar {
            display: inline-block;
            letter-spacing: 2px;
            font-size: 14px;
        }
        .hud-label {
            opacity: 0.8;
            font-size: 9px;
        }

        .input-line {
            display: flex;
            align-items: center;
            border-top: 2px solid #1eff6c;
            padding-top: 12px;
            font-size: 16px;
        }
        .prompt { 
            color: #1eff6c; 
            margin-right: 10px; 
            font-size: 18px;
            text-shadow: 0 0 8px #1eff6c;
        }
        #userInput {
            flex: 1;
            background: #000;
            border: 2px solid #1eff6c;
            color: #1eff6c;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 16px;
            padding: 12px 12px;
            outline: none;
            text-transform: uppercase;
            box-shadow: 0 0 8px #1eff6c;
        }
        #userInput::placeholder { 
            color: #1f4f2f; 
            font-size: 11px; 
            text-transform: none; 
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            color: #1eff6c;
            margin-top: 10px;
            border-top: 1px solid #1eff6c;
            padding-top: 8px;
            text-shadow: 0 0 5px #1eff6c;
        }
        .footer-left, .footer-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .clickable {
            color: #1eff6c;
            text-decoration: underline;
            cursor: pointer;
            text-shadow: 0 0 5px #1eff6c;
        }
        .clickable:hover {
            color: #fff;
            text-shadow: 0 0 10px #1eff6c;
        }
        .status {
            color: #1eff6c;
            font-size: 9px;
            margin-top: 8px;
            letter-spacing: 1px;
            text-align: right;
            text-shadow: 0 0 5px #1eff6c;
        }
        #fileInput { display: none; }
    </style>
</head>
<body class="crt">
    <div class="terminal">
        <div class="header">
            <div class="header-left">LAPD 2049<br>BLADE RUNNER UNIT</div>
            <div class="header-right">CASE FILE: #BC-2049<br>CLASSIFIED</div>
            <div class="header-center">⏣ NIGHT CITY ⏣</div>
        </div>

        <!-- Diegetic HUD (updated via JS) -->
        <div id="hudContainer" class="hud">
            <div class="hud-section"><span class="hud-label">LOC:</span> <span id="hudLocation">APARTMENT</span></div>
            <div class="hud-section"><span class="hud-label">HP:</span> <span id="hudHealthBar" class="health-bar">[██████░░]</span></div>
            <div class="hud-section"><span class="hud-label">TIME:</span> <span id="hudTime">21:00</span></div>
            <div class="hud-section"><span class="hud-label">WX:</span> <span id="hudWeather">RAIN</span></div>
            <div class="hud-section"><span class="hud-label">CORP:</span> <span id="hudRepCorp" class="reputation-bar">[··]</span></div>
            <div class="hud-section"><span class="hud-label">UND:</span> <span id="hudRepUnder" class="reputation-bar">[··]</span></div>
            <div class="hud-section"><span class="hud-label">PD:</span> <span id="hudRepPolice" class="reputation-bar">[··]</span></div>
        </div>

        <div id="outputArea" class="output">
            <!-- boot sequence will appear here then be replaced -->
        </div>

        <div class="input-line">
            <span class="prompt">❯</span>
            <input type="text" id="userInput" placeholder="ENTER COMMAND..." autofocus disabled>
        </div>
        <div class="status" id="aiStatus">⚡ SYSTEM BOOTING... ⚡</div>
        
        <div class="footer">
            <div class="footer-left">
                <span class="clickable" id="saveBtn">[SAVE]</span>
                <span class="clickable" id="loadBtn">[LOAD]</span>
            </div>
            <div class="footer-right">
                <span class="clickable" id="resetBtn">[RESET]</span>
                <span>LAPD 2049</span>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".json,application/json">

    <script>
        (function() {
            // DOM elements
            const outputDiv = document.getElementById('outputArea');
            const inputField = document.getElementById('userInput');
            const aiStatus = document.getElementById('aiStatus');
            const resetBtn = document.getElementById('resetBtn');
            const saveBtn = document.getElementById('saveBtn');
            const loadBtn = document.getElementById('loadBtn');
            const fileInput = document.getElementById('fileInput');
            const hudLocation = document.getElementById('hudLocation');
            const hudHealthBar = document.getElementById('hudHealthBar');
            const hudTime = document.getElementById('hudTime');
            const hudWeather = document.getElementById('hudWeather');
            const hudRepCorp = document.getElementById('hudRepCorp');
            const hudRepUnder = document.getElementById('hudRepUnder');
            const hudRepPolice = document.getElementById('hudRepPolice');

            // ========== ENHANCED SYSTEM PROMPT ==========
            const systemPrompt = `You are the game master for a Blade Runner-style interactive fiction game. The player is a blade runner in Los Angeles 2049, hunting rogue replicants.

You MUST track the following variables and include them at the END of each response in the exact format:
##STATE## location|health|time|weather|rep_corp|rep_underworld|rep_police|quest_active

- location: one of [Your apartment, Police HQ, Chinatown, Bradbury Building, Tyrell Corporation, The Docks, Animoid Row, Nightshade Bar]
- health: 0-10
- time: 24h format (e.g., 21:30). Advance time slowly (1-2 hours per major action)
- weather: Rain, Mist, Clear, Smog
- rep_corp: -5 to 5 (corporate reputation)
- rep_underworld: -5 to 5 (criminal reputation)
- rep_police: -5 to 5 (LAPD reputation)
- quest_active: 0 or 1 (whether the main case is active)

The narrative should be atmospheric noir style with dystopian, rain-soaked elements. Responses should be 1-2 sentences, but can be longer for key scenes. End with a clear prompt for the player's next action.

IMPORTANT: Inject occasional random encounters based on location and reputation (e.g., in The Docks you might meet a smuggler, in Chinatown a mysterious informant, in Nightshade Bar a hooker). Keep it immersive.`;

            const introMessage = `RAIN SLASHES ACROSS THE DIMMED STREETS OF LOS ANGELES. YOU SIT IN YOUR APARTMENT, A HALF-EMPTY BOTTLE OF JOHNNY WALKER ON THE TABLE. YOUR SPINNER IS PARKED OUTSIDE. THE VOICEMAIL BLINKS: A NEW ASSIGNMENT FROM CAPTAIN BRYANT.\n\nWHAT DO YOU DO?`;

            // Initial state line (hidden from display)
            const initialState = "##STATE## Your apartment|10|21:00|Rain|0|0|0|1";

            // Messages array: start with assistant message that includes intro + state line
            let messages = [
                { role: 'assistant', content: introMessage + "\n" + initialState }
            ];

            // Audio context for ambient soundscapes
            let audioCtx = null;
            let rainNode = null;
            let humNode = null;
            let currentLocation = "Your apartment";

            function initAudio() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                // Rain noise (filtered noise)
                const bufferSize = 2 * audioCtx.sampleRate;
                const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = noiseBuffer;
                noise.loop = true;

                const filter = audioCtx.createBiquadFilter();
                filter.type = "lowpass";
                filter.frequency.value = 1000;

                const gain = audioCtx.createGain();
                gain.gain.value = 0.1; // base rain volume

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                rainNode = { noise, filter, gain };

                // Hum (low sine wave for city)
                const humOsc = audioCtx.createOscillator();
                humOsc.type = "sine";
                humOsc.frequency.value = 120;
                const humGain = audioCtx.createGain();
                humGain.gain.value = 0.02;
                humOsc.connect(humGain);
                humGain.connect(audioCtx.destination);
                humNode = { osc: humOsc, gain: humGain };

                noise.start();
                humOsc.start();
            }

            function updateAmbientSound(location) {
                if (!audioCtx || !rainNode || !humNode) return;
                // Adjust rain intensity and hum based on location
                let rainVol = 0.1;
                let humFreq = 120;
                let humVol = 0.02;
                switch(location) {
                    case "The Docks":
                        rainVol = 0.25;
                        humFreq = 80;
                        break;
                    case "Tyrell Corporation":
                        rainVol = 0.05;
                        humFreq = 200;
                        humVol = 0.05;
                        break;
                    case "Chinatown":
                        rainVol = 0.15;
                        humFreq = 150;
                        break;
                    case "Your apartment":
                        rainVol = 0.1;
                        humFreq = 100;
                        break;
                    default:
                        rainVol = 0.15;
                }
                rainNode.gain.gain.setValueAtTime(rainVol, audioCtx.currentTime);
                humNode.osc.frequency.setValueAtTime(humFreq, audioCtx.currentTime);
                humNode.gain.gain.setValueAtTime(humVol, audioCtx.currentTime);
            }

            // Helper: update HUD from state line
            function updateHUDFromState(stateLine) {
                const parts = stateLine.replace('##STATE##', '').trim().split('|');
                if (parts.length < 8) return;
                const [loc, health, time, weather, repC, repU, repP, quest] = parts;
                hudLocation.textContent = loc.toUpperCase();
                // Health bar: 10 blocks, filled = health
                const healthNum = parseInt(health) || 10;
                const filled = '█'.repeat(healthNum);
                const empty = '░'.repeat(10 - healthNum);
                hudHealthBar.textContent = `[${filled}${empty}]`;

                hudTime.textContent = time;
                hudWeather.textContent = weather;

                // Reputation bars: display numeric with sign
                hudRepCorp.textContent = formatRep(parseInt(repC));
                hudRepUnder.textContent = formatRep(parseInt(repU));
                hudRepPolice.textContent = formatRep(parseInt(repP));

                // Update ambient sound if location changed
                if (currentLocation !== loc) {
                    currentLocation = loc;
                    updateAmbientSound(loc);
                }
            }

            function formatRep(val) {
                if (val > 0) return `+${val}`;
                return `${val}`;
            }

            // Helper: filter out state lines from display content
            function filterStateFromContent(content) {
                const idx = content.indexOf('##STATE##');
                if (idx === -1) return content;
                return content.substring(0, idx).trim();
            }

            // Append output without state line (for display)
            function appendOutput(text) {
                const p = document.createElement('p');
                p.textContent = text;
                outputDiv.appendChild(p);
                outputDiv.scrollTop = outputDiv.scrollHeight;
            }

            // Rebuild output from messages (skip state lines)
            function rebuildOutputFromMessages() {
                outputDiv.innerHTML = '';
                for (let msg of messages) {
                    if (msg.role === 'user') {
                        appendOutput('> ' + msg.content.toUpperCase());
                    } else if (msg.role === 'assistant') {
                        const displayContent = filterStateFromContent(msg.content);
                        if (displayContent) {
                            appendOutput(displayContent);
                        }
                    }
                }
                // Update HUD from last assistant message
                const lastAssistant = [...messages].reverse().find(m => m.role === 'assistant');
                if (lastAssistant) {
                    const stateLine = lastAssistant.content.split('##STATE##')[1];
                    if (stateLine) {
                        updateHUDFromState('##STATE##' + stateLine);
                    }
                }
            }

            // Boot sequence
            async function bootSequence() {
                inputField.disabled = true;
                aiStatus.textContent = '⚡ SYSTEM BOOTING... ⚡';
                outputDiv.innerHTML = '';

                const bootMessages = [
                    '> LAPD OS v2.3 (2049)',
                    '> 64K MEMORY CHECK... OK',
                    '> SPINNER INTERFACE... ONLINE',
                    '> VOIGHT-KAMPFF MODULE... PRESENT',
                    '> LOADING CASE FILE #BC-2049...'
                ];

                for (let msg of bootMessages) {
                    appendOutput(msg);
                    await new Promise(r => setTimeout(r, 400));
                }

                // ASCII progress bar
                appendOutput('> BOOT SEQUENCE: ');
                const barContainer = document.createElement('p');
                outputDiv.appendChild(barContainer);
                for (let i = 0; i <= 20; i++) {
                    barContainer.textContent = '> BOOT SEQUENCE: [' + '█'.repeat(i) + '░'.repeat(20-i) + ']';
                    outputDiv.scrollTop = outputDiv.scrollHeight;
                    await new Promise(r => setTimeout(r, 80));
                }
                await new Promise(r => setTimeout(r, 300));
                outputDiv.innerHTML = ''; // clear boot
                // Show intro message
                const introWithoutState = filterStateFromContent(introMessage);
                appendOutput(introWithoutState);
                aiStatus.textContent = '⚡ BLADE RUNNER AI // AWAITING INPUT ⚡';
                inputField.disabled = false;
                inputField.focus();
                // Update HUD from initial state
                updateHUDFromState(initialState);
            }

            // Reset game (boot + reset messages)
            function resetGame() {
                messages = [
                    { role: 'assistant', content: introMessage + "\n" + initialState }
                ];
                bootSequence(); // reboots and shows intro
            }

            // Save game (exclude system prompt, just messages)
            function saveGame() {
                const dataStr = JSON.stringify(messages, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `blade_runner_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                aiStatus.textContent = '💾 CASE SAVED';
                setTimeout(() => aiStatus.textContent = '⚡ BLADE RUNNER AI // READY ⚡', 1500);
            }

            // Load game
            function loadGameFromFile(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const loaded = JSON.parse(e.target.result);
                        if (!Array.isArray(loaded) || loaded.length === 0) {
                            throw new Error('Invalid save file');
                        }
                        messages = loaded;
                        rebuildOutputFromMessages();
                        aiStatus.textContent = '📂 CASE LOADED';
                        inputField.disabled = false;
                        inputField.focus();
                        setTimeout(() => aiStatus.textContent = '⚡ BLADE RUNNER AI // READY ⚡', 1500);
                    } catch (err) {
                        aiStatus.textContent = `❌ LOAD ERROR: ${err.message}`;
                    }
                };
                reader.readAsText(file);
            }

            // === RESTORED SMOOTH TYPEWRITER ===
            function playKeySound() {
                try {
                    if (!audioCtx) {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 800;
                    gain.gain.setValueAtTime(0.03, now); // slightly quieter
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 0.05);
                } catch (e) {}
            }

            async function typewriterEffect(text, container) {
                const p = document.createElement('p');
                container.appendChild(p);
                const chars = text.split('');
                let fullText = '';
                for (let char of chars) {
                    fullText += char;
                    p.textContent = fullText;
                    playKeySound();
                    await new Promise(resolve => setTimeout(resolve, 45)); // 45ms for smooth, noticeable typing
                    container.scrollTop = container.scrollHeight; // scroll after each character
                }
                return p;
            }

            // Call AI
            async function callFreeAI(userInput) {
                messages.push({ role: 'user', content: userInput });
                appendOutput('> ' + userInput.toUpperCase());

                aiStatus.textContent = '⏳ AI THINKING... ⏳';
                inputField.disabled = true;

                try {
                    let fullPrompt = systemPrompt + "\n\n";
                    for (let msg of messages) {
                        if (msg.role === 'user') {
                            fullPrompt += "Player: " + msg.content + "\n";
                        } else {
                            fullPrompt += "Game Master: " + msg.content + "\n";
                        }
                    }
                    fullPrompt += "Game Master:";

                    const url = `https://text.pollinations.ai/${encodeURIComponent(fullPrompt)}?model=openai&json=false&seed=${Math.floor(Math.random()*1000000)}`;
                    
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    let aiMessage = await response.text();

                    // Ensure state line exists (if AI forgets, we append a default based on last known state)
                    if (!aiMessage.includes('##STATE##')) {
                        const lastAssistant = [...messages].reverse().find(m => m.role === 'assistant');
                        let lastState = '';
                        if (lastAssistant) {
                            const parts = lastAssistant.content.split('##STATE##');
                            if (parts.length > 1) lastState = '##STATE##' + parts[1];
                        }
                        if (!lastState) lastState = initialState;
                        aiMessage += '\n' + lastState;
                    }

                    // Split state line from display text
                    const stateLineIndex = aiMessage.indexOf('##STATE##');
                    const displayText = stateLineIndex >= 0 ? aiMessage.substring(0, stateLineIndex).trim() : aiMessage;
                    const stateLine = stateLineIndex >= 0 ? aiMessage.substring(stateLineIndex) : '';

                    // Typewriter effect for display text (smooth)
                    aiStatus.textContent = '⏳ AI TYPING... ⏳';
                    await typewriterEffect(displayText, outputDiv);

                    // Push full message with state line
                    messages.push({ role: 'assistant', content: displayText + (stateLine ? '\n' + stateLine : '') });

                    // Update HUD from state line
                    if (stateLine) {
                        updateHUDFromState(stateLine);
                    }

                    aiStatus.textContent = '⚡ BLADE RUNNER AI // READY ⚡';
                    inputField.disabled = false;
                    inputField.focus();
                } catch (err) {
                    console.error(err);
                    aiStatus.textContent = `❌ ERROR: ${err.message} ❌`;
                    messages.pop(); // remove user message
                    inputField.disabled = false;
                    inputField.focus();
                }
            }

            // Handle command
            function handleCommand() {
                const cmd = inputField.value.trim();
                if (cmd === '') return;
                callFreeAI(cmd);
                inputField.value = '';
            }

            inputField.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleCommand();
                }
            });

            resetBtn.addEventListener('click', resetGame);
            saveBtn.addEventListener('click', saveGame);
            loadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) loadGameFromFile(e.target.files[0]);
                fileInput.value = '';
            });

            // Initial boot
            window.addEventListener('load', () => {
                bootSequence();
                // Initialize audio on first click
                document.body.addEventListener('click', function init() {
                    initAudio();
                    updateAmbientSound(currentLocation);
                }, { once: true });
            });
        })();
    </script>
</body>
</html>
