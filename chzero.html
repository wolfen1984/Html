<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover" />

    <style>
        /* ─── STATION ZERO · NEON WHITE & BLACK ─── */

            --border: #1a1a1a;

            --neon-white: #ffffff;
            --neon-white-glow: 0 0 12px rgba(255,255,255,0.30), 0 0 40px rgba(255,255,255,0.10);
            --danger: #ff4444;
            --danger-glow: 0 0 12px rgba(255,68,68,0.30);
            --amber: #ffaa44;
            --amber-dim: #332200;
            --gold: #ffcc44;

<body>
    <div class="monitor-bezel">
        <div class="brand-label">STATION ZERO · ARCTIC-81</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">STATION ZERO</div>
                    <div class="marquee-sub">⏤ TWO MEN. SIX MONTHS. ONE RETURNS. ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="stationPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">❄️ STATION ZERO · NOW PLAYING · 1981</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
    (function() {
        const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
        const MODEL = 'mistral-small-latest';
        let apiKey = localStorage.getItem('stationzero_key') || '';

        const DEFAULT_STATE = { episodes: [], currentPerformance: null, imageCooldownUntil: 0 };
        let gameState = { ...DEFAULT_STATE };

        const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;', "'":'&#39;', '"':'&quot;' })[m]);

        const HOST_BIO = `
            <h2>❄️ Station Zero · 1981</h2>
            <p style="text-align:left;">
                <strong>Location:</strong> Remote Arctic Weather Station · 81°N<br>
                <strong>Rotation:</strong> Two men · Six months<br>
                <strong>Communication:</strong> One HF radio<br>
                <strong>Winter:</strong> No roads · No aircraft · No ships<br><br>
                <em>"Every six months, two strangers arrive. Neither has met the other. They're told: 'See you in six months.' At the end... only one man boards the helicopter."</em>
            </p>
        `;

        // ─── 80s FILM SCORE AUDIO ENGINE ──────────────────────────────
        let audioCtx = null;
        let ambientSource = null, ambientGain = null, ambientTimeout = null;
        let keepAliveNode = null;
        let reverbNode = null, masterGain = null, dryGain = null, wetGain = null;
        let sectionAmbientActive = null, stringAmbientActive = null;
        let crossfadeTimeout = null, tapeWarbleNode = null, masterCompressor = null;

        let patternPlayerActive = null, patternPlayerTimeout = null;
        let patternStep = 0, patternBPM = 60;
        let currentSectionPatterns = [];
        let currentVariationIdx = 0, barsInVariation = 0;
        let fillActive = false;
        let sectionThemeScore = null;

        // ─── 80s SYNTH SOUND GENERATORS ──────────────────────────────

        // Juno-style pad with chorus effect
        function create80sPad(ctx, rootFreq, duration, intensity=0.5, voiceCount=6) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity*0.18, now+1.2);
                gainNode.gain.setValueAtTime(intensity*0.18, now+duration-2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration+0.8);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 300 + intensity*500;
                filter.Q.value = 1.2;

                const allOscs = [];
                const detuneSpread = 6;
                for (let i=0; i<voiceCount; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i%2===0 ? 'sawtooth' : 'triangle';
                    const detune = (i - (voiceCount-1)/2) * detuneSpread / (voiceCount/2);
                    osc.frequency.value = rootFreq * Math.pow(2, detune/1200);
                    const vibrato = ctx.createOscillator();
                    vibrato.type = 'sine';
                    vibrato.frequency.value = 3.5 + Math.random()*2.5;
                    const vibratoGain = ctx.createGain();
                    vibratoGain.gain.value = 1.5 + Math.random()*3;
                    vibrato.connect(vibratoGain);
                    vibratoGain.connect(osc.frequency);
                    allOscs.push(osc, vibrato);
                    osc.connect(filter);
                }
                filter.connect(gainNode);

                const drySend = ctx.createGain();
                drySend.gain.value = 0.4;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.6;
                gainNode.connect(drySend);
                gainNode.connect(wetSend);
                drySend.connect(dryGain || ctx.destination);
                wetSend.connect(wetGain || ctx.destination);

                allOscs.forEach(o => { o.start(now); o.stop(now+duration+1); });
            } catch(err) { console.warn('80s pad error:', err); }
        }

        // Synth bass — 80s analog bass
        function create80sBass(ctx, semitone, intensity=0.6, duration=1.5, rootFreq=36) {
            try {
                const now = ctx.currentTime;
                const freq = rootFreq * Math.pow(2, semitone/12);
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity*0.25, now+0.04);
                gainNode.gain.setValueAtTime(intensity*0.25, now+duration-0.3);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration+0.2);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq*0.97, now);
                osc.frequency.exponentialRampToValueAtTime(freq, now+0.1);

                const osc2 = ctx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.value = freq*2;
                const osc2Gain = ctx.createGain();
                osc2Gain.gain.value = 0.06*intensity;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(200 + semitone*6, now);
                filter.frequency.exponentialRampToValueAtTime(80 + semitone*3, now+duration);
                filter.Q.value = 2.0;

                osc.connect(filter);
                osc2.connect(osc2Gain);
                osc2Gain.connect(filter);
                filter.connect(gainNode);

                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.5;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);

                osc.start(now);
                osc2.start(now);
                osc.stop(now+duration+0.3);
                osc2.stop(now+duration+0.3);
            } catch(err) { console.warn('80s bass error:', err); }
        }

        // Arpeggiator — 80s synth arpeggio
        function create80sArp(ctx, rootFreq, pattern, duration, intensity=0.4) {
            try {
                const now = ctx.currentTime;
                const stepDuration = 0.12;
                const steps = Math.min(Math.floor(duration / stepDuration), 32);
                const freqs = pattern.map(p => rootFreq * Math.pow(2, p/12));

                for (let step=0; step<steps; step++) {
                    const time = now + step * stepDuration;
                    const freq = freqs[step % freqs.length];
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity*0.08 * Math.exp(-step*0.02), time);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, time+stepDuration*0.7);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = freq * (1 + (Math.random()-0.5)*0.002);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 800 + intensity*600;
                    filter.Q.value = 1.5;
                    osc.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(time);
                    osc.stop(time+stepDuration*0.8);
                }
            } catch(err) { console.warn('80s arp error:', err); }
        }

        // 80s Drum Machine: Kick (Linn-style)
        function create80sKick(ctx, intensity=0.6) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity*0.8, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+0.2);
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.exponentialRampToValueAtTime(30, now+0.12);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 120;
                filter.Q.value = 1.5;
                osc.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start(now);
                osc.stop(now+0.25);
            } catch(err) { console.warn('80s kick error:', err); }
        }

        // 80s Drum Machine: Snare (Linn-style)
        function create80sSnare(ctx, intensity=0.5) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity*0.55, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+0.15);
                const bufferSize = ctx.sampleRate * 0.06;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i=0; i<bufferSize; i++) {
                    const env = Math.exp(-i/(ctx.sampleRate*0.02));
                    data[i] = (Math.random()*2-1)*env*0.5;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const osc = ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.exponentialRampToValueAtTime(70, now+0.06);
                const oscGain = ctx.createGain();
                oscGain.gain.value = 0.15*intensity;
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 250;
                filter.Q.value = 0.9;
                noise.connect(filter);
                osc.connect(oscGain);
                oscGain.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);
                noise.start(now);
                osc.start(now);
                noise.stop(now+0.1);
                osc.stop(now+0.1);
            } catch(err) { console.warn('80s snare error:', err); }
        }

        // 80s Drum Machine: Hi-hat
        function create80sHat(ctx, intensity=0.3) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity*0.4, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+0.04);
                const bufferSize = ctx.sampleRate * 0.018;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i=0; i<bufferSize; i++) {
                    const env = Math.exp(-i/(ctx.sampleRate*0.008));
                    data[i] = (Math.random()*2-1)*env*0.35;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 6000;
                filter.Q.value = 0.6;
                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);
                noise.start(now);
                noise.stop(now+0.05);
            } catch(err) { console.warn('80s hat error:', err); }
        }

        // 80s Tom (for fills)
        function create80sTom(ctx, freq=120, intensity=0.4) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity*0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+0.12);
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now);
                osc.frequency.exponentialRampToValueAtTime(freq*0.5, now+0.1);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = freq*2.5;
                filter.Q.value = 1.2;
                osc.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start(now);
                osc.stop(now+0.15);
            } catch(err) { console.warn('80s tom error:', err); }
        }

        // 80s Synth Lead — melodic hook
        function create80sLead(ctx, freq, duration, intensity=0.5) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity*0.2, now+0.05);
                gainNode.gain.setValueAtTime(intensity*0.2, now+duration-0.3);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq*0.99, now);
                osc.frequency.linearRampToValueAtTime(freq, now+0.05);

                const osc2 = ctx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.value = freq*2;
                const osc2Gain = ctx.createGain();
                osc2Gain.gain.value = 0.08*intensity;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(600, now);
                filter.frequency.linearRampToValueAtTime(1800 + intensity*800, now+duration*0.3);
                filter.Q.value = 1.8;

                const envelope = ctx.createGain();
                envelope.gain.setValueAtTime(0.001, now);
                envelope.gain.linearRampToValueAtTime(1, now+0.02);

                osc.connect(filter);
                osc2.connect(osc2Gain);
                osc2Gain.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(dryGain || ctx.destination);

                osc.start(now);
                osc2.start(now);
                osc.stop(now+duration+0.2);
                osc2.stop(now+duration+0.2);
            } catch(err) { console.warn('80s lead error:', err); }
        }

        // 80s String Machine — ensemble
        function create80sStrings(ctx, freq, duration, intensity=0.4) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity*0.14, now+1.5);
                gainNode.gain.setValueAtTime(intensity*0.14, now+duration-1.5);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration+0.5);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                filter.Q.value = 1.0;

                const oscs = [];
                const intervals = [0, 3, 7, 12, 15];
                intervals.forEach(interval => {
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = freq * Math.pow(2, interval/12);
                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 1.5 + Math.random()*1.5;
                    const lfoG = ctx.createGain();
                    lfoG.gain.value = 1 + Math.random()*2;
                    lfo.connect(lfoG);
                    lfoG.connect(osc.frequency);
                    oscs.push(osc, lfo);
                    osc.connect(filter);
                });
                filter.connect(gainNode);

                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.55;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);

                oscs.forEach(o => { o.start(now); o.stop(now+duration+1); });
            } catch(err) { console.warn('80s strings error:', err); }
        }

        // 80s FM-style bell/tine
        function create80sBell(ctx, freq, duration, intensity=0.3) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity*0.25, now+0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration);

                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sine';
                osc2.frequency.value = freq*2.01;
                const osc2Gain = ctx.createGain();
                osc2Gain.gain.value = 0.15*intensity;
                const osc3 = ctx.createOscillator();
                osc3.type = 'sine';
                osc3.frequency.value = freq*3.02;
                const osc3Gain = ctx.createGain();
                osc3Gain.gain.value = 0.05*intensity;

                osc.connect(gainNode);
                osc2.connect(osc2Gain);
                osc2Gain.connect(gainNode);
                osc3.connect(osc3Gain);
                osc3Gain.connect(gainNode);

                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.6;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);

                osc.start(now);
                osc2.start(now);
                osc3.start(now);
                osc.stop(now+duration+0.1);
                osc2.stop(now+duration+0.1);
                osc3.stop(now+duration+0.1);
            } catch(err) { console.warn('80s bell error:', err); }
        }

        // 80s Noise texture — wind/industrial
        function create80sTexture(ctx, duration, intensity=0.3, freq=150) {
            try {
                const now = ctx.currentTime;
                const bufferSize = ctx.sampleRate * 1.2;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i=0; i<bufferSize; i++) {
                    const t = i/ctx.sampleRate;
                    data[i] = (Math.random()*2-1) * Math.sin(t*freq + Math.sin(t*0.5)*20) * Math.exp(-t/6);
                }
                const source = ctx.createBufferSource();
                source.buffer = buffer;
                source.loop = true;
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = freq;
                filter.Q.value = 0.3;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity*0.06, now+1);
                gainNode.gain.setValueAtTime(intensity*0.06, now+duration-1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now+duration);
                source.connect(filter);
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.6;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                source.start(now);
                source.stop(now+duration);
            } catch(err) { console.warn('80s texture error:', err); }
        }

        // ─── Audio Helpers ─────────────────────────────────────────────

        function expandPattern(arr) {
            if (!Array.isArray(arr)) {
                console.warn('expandPattern received non-array, using default:', arr);
                arr = [0,0,0,0,0,0,0,0];
            }
            arr = arr.map(x => typeof x === 'number' ? x : 0);
            return arr.flatMap(x => [x, x]);
        }

        function createKeepAlive(ctx) {
            if (keepAliveNode) return;
            const osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = 20;
            const gain = ctx.createGain();
            gain.gain.value = 0.0003;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(0);
            keepAliveNode = { source: osc, gain };
        }

        function ensureAudioNodes(ctx) {
            if (!masterGain) {
                masterGain = ctx.createGain();
                masterGain.gain.value = 0.25;
                masterCompressor = ctx.createDynamicsCompressor();
                masterCompressor.threshold.value = -24;
                masterCompressor.knee.value = 30;
                masterCompressor.ratio.value = 8;
                masterCompressor.attack.value = 0.003;
                masterCompressor.release.value = 0.25;
                masterGain.connect(masterCompressor);
                masterCompressor.connect(ctx.destination);
            }
            if (!dryGain) {
                dryGain = ctx.createGain();
                dryGain.gain.value = 0.7;
                dryGain.connect(masterGain);
            }
            if (!wetGain) {
                wetGain = ctx.createGain();
                wetGain.gain.value = 0.4;
                if (reverbNode) wetGain.connect(reverbNode);
                else wetGain.connect(masterGain);
            }
            if (!reverbNode) {
                initReverb(ctx);
                if (reverbNode) wetGain.connect(reverbNode);
            }
        }

        async function getAudioContext() {
            try {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    initTapeWarble(audioCtx);
                    ensureAudioNodes(audioCtx);
                }
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                ensureAudioNodes(audioCtx);
                return audioCtx;
            } catch(err) { console.error('Audio context error:', err); throw err; }
        }

        function initReverb(ctx) {
            if (reverbNode) return;
            try {
                const sampleRate = ctx.sampleRate;
                const length = sampleRate * 3.5;
                const impulse = ctx.createBuffer(2, length, sampleRate);
                const left = impulse.getChannelData(0);
                const right = impulse.getChannelData(1);
                for (let i=0; i<length; i++) {
                    const decay = Math.exp(-i/(sampleRate*0.8));
                    const lateDecay = Math.exp(-i/(sampleRate*2.0))*0.25;
                    left[i] = (Math.random()*2-1)*(decay+lateDecay);
                    right[i] = (Math.random()*2-1)*(decay+lateDecay);
                }
                reverbNode = ctx.createConvolver();
                reverbNode.buffer = impulse;
                reverbNode.normalize = true;
                if (masterGain) reverbNode.connect(masterGain);
            } catch(err) {
                console.warn('Reverb init error:', err);
                reverbNode = ctx.createGain();
                reverbNode.gain.value = 0.4;
                if (masterGain) reverbNode.connect(masterGain);
            }
        }

        function initTapeWarble(ctx) {
            if (tapeWarbleNode) return;
            try {
                tapeWarbleNode = ctx.createGain();
                tapeWarbleNode.gain.value = 0;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.12;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 0.015;
                const lfo2 = ctx.createOscillator();
                lfo2.type = 'sine';
                lfo2.frequency.value = 0.19;
                const lfo2Gain = ctx.createGain();
                lfo2Gain.gain.value = 0.010;
                lfo.connect(lfoGain);
                lfo2.connect(lfo2Gain);
                lfoGain.connect(tapeWarbleNode.gain);
                lfo2Gain.connect(tapeWarbleNode.gain);
                lfo.start(0);
                lfo2.start(0);
                tapeWarbleNode._lfos = [lfo, lfo2];
            } catch(err) { console.warn('Tape warble init error:', err); }
        }

        // ─── 80s PATTERN PLAYER ────────────────────────────────────────

        function start80sPatternPlayer(themeName, rootFreq=40, scoreData=null) {
            stopPatternPlayer();

            if (!scoreData || !scoreData[themeName]) {
                console.warn('No AI score data for theme:', themeName);
                return;
            }
            const theme = scoreData[themeName];
            const bpm = theme.bpm || 60;

            const bass = expandPattern(theme.bass);
            const kick = expandPattern(theme.kick);
            const snare = expandPattern(theme.snare);
            const hat = expandPattern(theme.hat);

            const variations = [{
                name: '80s',
                bars: 8,
                bass: bass,
                kick: kick,
                snare: snare,
                hat: hat
            }];

            currentSectionPatterns = variations;
            currentVariationIdx = 0;
            barsInVariation = 0;
            patternStep = 0;
            patternBPM = bpm;
            fillActive = false;

            const stepDuration = 60 / bpm / 4;
            patternPlayerActive = { active: true, theme: themeName };

            function getCurrentPattern() {
                return currentSectionPatterns[0];
            }

            function playStep() {
                if (!patternPlayerActive || !patternPlayerActive.active) return;
                const ctx = audioCtx;
                if (!ctx) { patternPlayerTimeout = setTimeout(playStep, 100); return; }

                const step = patternStep % 16;
                const current = getCurrentPattern();
                const isFillStep = fillActive;

                // Bass
                let bassSemitone = 0;
                if (isFillStep) {
                    bassSemitone = (step % 4 === 0) ? 0 : (step % 8 === 4 ? 7 : 0);
                } else {
                    bassSemitone = current.bass[step] || 0;
                }
                if (bassSemitone !== 0 || (isFillStep && step % 4 === 0)) {
                    const dur = isFillStep ? 0.2 : 1.2;
                    const inten = isFillStep ? 0.3 : 0.5 + (bassSemitone / 30);
                    create80sBass(ctx, bassSemitone, inten, dur, rootFreq);
                }

                // Arpeggio on every 4th step for texture
                if (step % 4 === 0 && !isFillStep && Math.random() < 0.4) {
                    const arpRoot = rootFreq * 1.5;
                    const arpPattern = [0, 4, 7, 12];
                    create80sArp(ctx, arpRoot, arpPattern, 0.5, 0.15);
                }

                let kickVal = isFillStep ? (step % 4 === 0 ? 1 : 0) : (current.kick[step] || 0);
                if (kickVal === 1) create80sKick(ctx, isFillStep ? 0.7 : 0.55);

                let snareVal = isFillStep ? (step % 8 === 4 ? 1 : 0) : (current.snare[step] || 0);
                if (snareVal === 1) create80sSnare(ctx, isFillStep ? 0.6 : 0.45);

                let hatVal = isFillStep ? (step % 2 === 0 ? 1 : 0) : (current.hat[step] || 0);
                if (hatVal === 1 && Math.random() < 0.6) create80sHat(ctx, isFillStep ? 0.35 : 0.2);

                // Fill: occasional tom fills
                if (isFillStep && step % 8 === 4) {
                    create80sTom(ctx, 100 + Math.random()*80, 0.3);
                }

                patternStep++;
                if (patternStep % 16 === 0) {
                    barsInVariation++;
                    if (barsInVariation >= current.bars) barsInVariation = 0;
                }

                patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
            }

            patternPlayerTimeout = setTimeout(playStep, 50);
        }

        function stopPatternPlayer() {
            if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout); patternPlayerTimeout = null; }
            if (patternPlayerActive) { patternPlayerActive.active = false; patternPlayerActive = null; }
            patternStep = 0; currentSectionPatterns = []; currentVariationIdx = 0; barsInVariation = 0; fillActive = false;
        }

        // ─── Master 80s playSound ──────────────────────────────────────

        async function play80sSound(type, intensity=0.6) {
            try {
                const ctx = await getAudioContext();
                if (!ctx) return;
                const now = ctx.currentTime;
                switch(type) {
                    case 'pad':
                    case 'string_pad':
                        create80sPad(ctx, 55+Math.random()*30, 12+Math.random()*14, intensity);
                        break;
                    case 'lead':
                        create80sLead(ctx, 100+Math.random()*150, 0.8+Math.random()*1.5, intensity);
                        break;
                    case 'bass':
                        create80sBass(ctx, Math.floor(Math.random()*12), intensity, 1.2+Math.random()*1.2, 36);
                        break;
                    case 'kick':
                        create80sKick(ctx, intensity);
                        break;
                    case 'snare':
                        create80sSnare(ctx, intensity);
                        break;
                    case 'hat':
                        create80sHat(ctx, intensity*0.5);
                        break;
                    case 'tom':
                        create80sTom(ctx, 80+Math.random()*120, intensity);
                        break;
                    case 'strings':
                        create80sStrings(ctx, 50+Math.random()*40, 8+Math.random()*10, intensity);
                        break;
                    case 'bell':
                        create80sBell(ctx, 80+Math.random()*100, 2+Math.random()*3, intensity);
                        break;
                    case 'texture':
                    case 'industrial_hum':
                        create80sTexture(ctx, 10+Math.random()*10, intensity, 100+Math.random()*200);
                        break;
                    case 'arp':
                        create80sArp(ctx, 60+Math.random()*40, [0,4,7,12], 1.5, intensity);
                        break;
                    case 'heartbeat':
                    case 'pulse':
                        create80sKick(ctx, 0.6*intensity);
                        setTimeout(() => create80sKick(ctx, 0.5*intensity), 180);
                        break;
                    case 'climax': {
                        // Build a climax with layered sounds
                        create80sPad(ctx, 40, 10, intensity*0.6);
                        create80sStrings(ctx, 45, 10, intensity*0.4);
                        create80sBass(ctx, 0, intensity*0.5, 2, 36);
                        setTimeout(() => create80sLead(ctx, 120, 2, intensity*0.3), 500);
                        setTimeout(() => create80sLead(ctx, 160, 2, intensity*0.25), 1200);
                        setTimeout(() => create80sKick(ctx, 0.7), 300);
                        setTimeout(() => create80sKick(ctx, 0.6), 700);
                        break;
                    }
                    case 'sting': {
                        const freq = 100 + Math.random()*80;
                        create80sLead(ctx, freq, 0.8, intensity*0.6);
                        setTimeout(() => create80sLead(ctx, freq*1.25, 0.6, intensity*0.4), 150);
                        break;
                    }
                    case 'thunder':
                        create80sTexture(ctx, 2.5, intensity*0.4, 60);
                        break;
                    default:
                        console.warn('Unknown 80s sound type:', type);
                }
            } catch(err) { console.warn('play80sSound error:', err); }
        }

        // ─── Ambient ──────────────────────────────────────────────────

        async function playAmbient(type, durationSeconds, intensity=0.4) {
            try {
                stopAmbient();
                const ctx = await getAudioContext();
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity*0.15, now);
                gainNode.connect(ctx.destination);
                ambientGain = gainNode;
                let source = null;

                if (type === 'ambient_drone' || type === 'wind_howl' || type === 'industrial_drone') {
                    const bufferSize = ctx.sampleRate * 1.5;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i=0; i<bufferSize; i++) data[i] = (Math.random()*2-1)*0.3;
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    noise.loop = true;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = type === 'industrial_drone' ? 100 : type === 'ambient_drone' ? 140 : 300;
                    filter.Q.value = 0.3;
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = type === 'industrial_drone' ? 40 : type === 'ambient_drone' ? 55 : 70;
                    const gainOsc = ctx.createGain();
                    gainOsc.gain.value = 0.10*intensity;
                    osc.connect(gainOsc);
                    gainOsc.connect(filter);
                    noise.connect(filter);
                    filter.connect(gainNode);
                    osc.start(now);
                    noise.start(now);
                    source = { osc, noise };
                    ambientSource = source;
                } else {
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = 60;
                    osc.connect(gainNode);
                    osc.start(now);
                    source = { osc };
                    ambientSource = source;
                }
                if (ambientTimeout) clearTimeout(ambientTimeout);
                ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds*1000);
            } catch(err) { console.warn('playAmbient error:', err); }
        }

        function stopAmbient() {
            if (ambientGain) {
                const now = audioCtx ? audioCtx.currentTime : 0;
                ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                ambientGain.gain.exponentialRampToValueAtTime(0.001, now+0.4);
                setTimeout(() => {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                    if (ambientGain) { ambientGain.disconnect(); ambientGain = null; }
                }, 400);
            } else {
                if (ambientSource) {
                    if (ambientSource.osc) ambientSource.osc.stop();
                    if (ambientSource.noise) ambientSource.noise.stop();
                    ambientSource = null;
                }
            }
            if (ambientTimeout) { clearTimeout(ambientTimeout); ambientTimeout = null; }
        }

        // ─── 80s Ambient Themes ───────────────────────────────────────

        const AMBIENT_80S = {
            intro:       { rootFreq:45, detuneSpread:8, filterBase:150, lfoRate:0.06, noiseMix:0.10, intensity:0.25, stringLayer:'pad', stringFreq:55, stringIntensity:0.15 },
            arrival:     { rootFreq:50, detuneSpread:10, filterBase:180, lfoRate:0.08, noiseMix:0.15, intensity:0.30, stringLayer:'strings', stringFreq:50, stringIntensity:0.20 },
            routine:     { rootFreq:52, detuneSpread:12, filterBase:160, lfoRate:0.07, noiseMix:0.12, intensity:0.28, stringLayer:'pad', stringFreq:58, stringIntensity:0.18 },
            tension:     { rootFreq:48, detuneSpread:14, filterBase:120, lfoRate:0.10, noiseMix:0.30, intensity:0.40, stringLayer:'strings', stringFreq:44, stringIntensity:0.30 },
            suspicion:   { rootFreq:44, detuneSpread:16, filterBase:100, lfoRate:0.12, noiseMix:0.35, intensity:0.45, stringLayer:'cluster', stringFreq:42, stringIntensity:0.35 },
            confrontation:{ rootFreq:46, detuneSpread:18, filterBase:90,  lfoRate:0.14, noiseMix:0.40, intensity:0.55, stringLayer:'swell', stringFreq:48, stringIntensity:0.40 },
            climax:      { rootFreq:40, detuneSpread:20, filterBase:80,  lfoRate:0.16, noiseMix:0.45, intensity:0.65, stringLayer:'swell', stringFreq:40, stringIntensity:0.50 },
            resolution:  { rootFreq:42, detuneSpread:6,  filterBase:160, lfoRate:0.04, noiseMix:0.05, intensity:0.15, stringLayer:'pad', stringFreq:46, stringIntensity:0.10 },
            closing:     { rootFreq:40, detuneSpread:4,  filterBase:170, lfoRate:0.03, noiseMix:0.03, intensity:0.12, stringLayer:'pad', stringFreq:42, stringIntensity:0.08 }
        };

        function startStringLayer(theme) {
            if (!audioCtx) return;
            stopStringAmbient();
            const ctx = audioCtx;
            const now = ctx.currentTime;
            const stringType = theme.stringLayer || 'pad';
            const freq = theme.stringFreq || 50;
            const intensity = theme.stringIntensity || 0.2;
            const duration = 999;
            const allNodes = [];

            const gainNode = ctx.createGain();
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(intensity*0.15, now+1.5);

            if (stringType === 'strings') {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 350;
                filter.Q.value = 1.5;
                const intervals = [0, 3, 7, 12];
                intervals.forEach(interval => {
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = freq * Math.pow(2, interval/12);
                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 1.2 + Math.random()*1.2;
                    const lg = ctx.createGain();
                    lg.gain.value = 1.5;
                    lfo.connect(lg);
                    lg.connect(osc.frequency);
                    allNodes.push(osc, lfo);
                    osc.connect(filter);
                });
                filter.connect(gainNode);
            } else if (stringType === 'swell') {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 300;
                filter.Q.value = 1.8;
                const intervals = [0, 4, 7, 12, 19];
                intervals.forEach(interval => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = freq * Math.pow(2, interval/12);
                    allNodes.push(osc);
                    osc.connect(filter);
                });
                filter.connect(gainNode);
            } else if (stringType === 'cluster') {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                filter.Q.value = 1.2;
                const clusterFreqs = [freq*0.97, freq, freq*1.02, freq*1.04, freq*1.06];
                clusterFreqs.forEach(f => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = f;
                    const mlfo = ctx.createOscillator();
                    mlfo.type = 'sine';
                    mlfo.frequency.value = 0.2 + Math.random()*0.4;
                    const mg = ctx.createGain();
                    mg.gain.value = 1.5;
                    mlfo.connect(mg);
                    mg.connect(osc.frequency);
                    allNodes.push(osc, mlfo);
                    osc.connect(filter);
                });
                filter.connect(gainNode);
            } else {
                // pad
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                filter.Q.value = 1.2;
                for (let i=0; i<5; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i<3 ? 'triangle' : 'sawtooth';
                    osc.frequency.value = freq * (1 + (i-2)*0.008);
                    const vib = ctx.createOscillator();
                    vib.type = 'sine';
                    vib.frequency.value = 3 + i*0.7;
                    const vibG = ctx.createGain();
                    vibG.gain.value = 2 + i*0.5;
                    vib.connect(vibG);
                    vibG.connect(osc.frequency);
                    allNodes.push(osc, vib);
                    osc.connect(filter);
                }
                filter.connect(gainNode);
            }

            const wetSend = ctx.createGain();
            wetSend.gain.value = 0.5;
            gainNode.connect(wetSend);
            wetSend.connect(wetGain || ctx.destination);
            gainNode.connect(dryGain || ctx.destination);

            allNodes.forEach(n => n.start(now));
            stringAmbientActive = {
                nodes: allNodes, gainNode, wetSend,
                stop: () => {
                    gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime+0.8);
                    allNodes.forEach(n => { try { n.stop(ctx.currentTime+1); } catch(e) {} });
                }
            };
        }

        function stopStringAmbient() {
            if (stringAmbientActive) { stringAmbientActive.stop(); stringAmbientActive = null; }
        }

        function start80sAmbient(themeName) {
            if (!audioCtx) return;
            stopSectionAmbient();
            const theme = AMBIENT_80S[themeName] || AMBIENT_80S.intro;
            const ctx = audioCtx;
            const now = ctx.currentTime;

            const gainNode = ctx.createGain();
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(theme.intensity*0.15, now+1.2);

            const oscs = [];
            for (let i=0; i<3; i++) {
                const osc = ctx.createOscillator();
                osc.type = i===0 ? 'sawtooth' : i===1 ? 'triangle' : 'sawtooth';
                const detune = (i-1)*theme.detuneSpread;
                osc.frequency.value = theme.rootFreq * Math.pow(2, detune/1200);
                oscs.push(osc);
            }

            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = theme.filterBase;
            filter.Q.value = 2.0;

            const lfo = ctx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = theme.lfoRate;
            const lfoGain = ctx.createGain();
            lfoGain.gain.value = 60;
            lfo.connect(lfoGain);
            lfoGain.connect(filter.frequency);

            oscs.forEach(o => o.connect(filter));
            filter.connect(gainNode);

            const wetSend = ctx.createGain();
            wetSend.gain.value = 0.45;
            gainNode.connect(wetSend);
            wetSend.connect(wetGain || ctx.destination);
            gainNode.connect(dryGain || ctx.destination);

            oscs.forEach(o => o.start(now));
            lfo.start(now);

            if (theme.noiseMix > 0) {
                const bufferSize = ctx.sampleRate * 1.5;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i=0; i<bufferSize; i++) data[i] = (Math.random()*2-1)*theme.noiseMix;
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                noise.loop = true;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'lowpass';
                noiseFilter.frequency.value = theme.filterBase*0.6;
                noiseFilter.Q.value = 0.2;
                const noiseGain = ctx.createGain();
                noiseGain.gain.value = theme.noiseMix*0.2;
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(gainNode);
                noise.start(now);
                oscs.push(noise);
            }

            sectionAmbientActive = {
                stop: () => {
                    gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime+0.5);
                    oscs.forEach(s => { try { s.stop(ctx.currentTime+0.7); } catch(e) {} });
                    try { lfo.stop(ctx.currentTime+0.7); } catch(e) {}
                    sectionAmbientActive = null;
                }
            };
            startStringLayer(theme);
            start80sPatternPlayer(themeName, 40, sectionThemeScore);
        }

        function transitionSectionTheme(themeName, scoreData) {
            if (scoreData) sectionThemeScore = scoreData;
            start80sAmbient(themeName);
        }

        function stopSectionAmbient() {
            if (sectionAmbientActive) { sectionAmbientActive.stop(); sectionAmbientActive = null; }

        async function mistralChat(msgs, maxTok=500, timeoutMs=28000) {
            if (!apiKey) throw new Error('API key missing');
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const res = await fetch(MISTRAL_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
                    body: JSON.stringify({ model:MODEL, messages:msgs, temperature:0.85, max_tokens:maxTok }),
                    signal: controller.signal
                });
                if (!res.ok) { const errText = await res.text(); throw new Error(`API error ${res.status}: ${errText}`); }
                const data = await res.json();
                return data.choices[0].message.content.trim();
            } catch(e) {
                if (e.name === 'AbortError') throw new Error('Request timed out. Please try again.');
                throw e;
            } finally { clearTimeout(timeout); }
        }

        async function generateImage(prompt) {
            const now = Date.now();
            if (now < gameState.imageCooldownUntil) {
                await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
            }
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', 1980s Arctic weather station, isolated, cinematic, grainy 35mm film, cold, desolate')}?width=512&height=640&seed=${Date.now()}`;
            return new Promise((resolve, reject) => {
                const img = new Image();
                let resolved = false;
                const timeout = setTimeout(() => { if (!resolved) { resolved = true; reject(new Error('Image load timeout')); } }, 15000);
                img.onload = () => { if (!resolved) { resolved = true; clearTimeout(timeout); resolve(url); } };
                img.onerror = () => { if (!resolved) { resolved = true; clearTimeout(timeout); reject(new Error('Image load error')); } };
                img.src = url;
            });
        }

        async function generateImageWithRetry(prompt, retries=2) {
            let lastError = null;
            for (let i=0; i<retries; i++) {
                try { return await generateImage(prompt); }
                catch(e) { lastError = e; await new Promise(r => setTimeout(r, 20)); }
            }
            throw lastError || new Error('Image generation failed');
        }

        function typewriterEffect(element, text, speed, onChar=null) {
            return new Promise((resolve) => {
                let i=0;
                element.textContent = '';
                const timer = setInterval(() => {
                    if (i < text.length) {
                        element.textContent += text.charAt(i);
                        if (onChar) onChar(i);
                        i++;
                    } else {
                        clearInterval(timer);
                        resolve();
                    }
                }, speed);
            });
        }

        function speakTextMale(text) {
            return new Promise((resolve, reject) => {
                if (!text) { resolve(); return; }
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel', 'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'];
                let voice = null;
                for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.58;
                utterance.pitch = 0.85;
                utterance.onend = () => resolve();
                utterance.onerror = (e) => { console.warn('TTS error:', e); resolve(); };
                speechSynthesis.speak(utterance);
            });
        }

                    gameState.currentPerformance = { ...ep, soundCues: ep.soundCues || null, rawStoryText: ep.rawStoryText || ep.story };
                    saveState();
                    await getAudioContext();
                    await startStationPerformance();
                });
            });

            document.querySelectorAll('.produce-episode-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const index = parseInt(btn.dataset.index);
                    const ep = gameState.episodes[index];
                    if (!ep || !ep.rawStoryText) return;
                    btn.disabled = true;
                    btn.textContent = '🎚️...';
                    try {
                        const soundtrack = await generateSoundCueSheet(ep.rawStoryText);
                        ep.soundCues = soundtrack;
                        saveState();
                        renderStationPanel();
                    } catch(err) {
                        showModal(`<h2>Score Failed</h2><p>${esc(err.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
                        btn.disabled = false;
                        btn.textContent = '🎬 Score';
                    }
                });
            });
        }

        // ─── Story & Score Generation ────────────────────────────────

        async function generateStationZeroStory() {
            const system = `You are the voice of Station Zero — a psychological thriller series set in a remote Arctic weather station in 1981. Two strangers rotate every six months. Only one returns. Your narration is cold, clinical, and brutally honest. You tell stories of human isolation, paranoia, and the slow unraveling of trust. No supernatural elements. No ghosts. Only the human mind breaking under pressure. Style: Stephen King meets Hitchcock — brutal, unflinching, grounded in psychological horror.`;
            const prompt = `Write a 900 to 1100 word short story set at a remote Arctic weather station in 1981. Two men have just arrived for their six-month rotation. They don't know each other. The story follows their slow descent — from professional courtesy, to small irritations, to suspicion, to a confrontation where only one survives. The story is told from the internal perspective of both men, but woven together seamlessly. The audience hears both interpretations of the same events. The facts stay the same; only the meaning changes. The villain is isolation itself — amplifying every small annoyance until it becomes unbearable.

            The story must have: 1) Arrival — professional, optimistic. 2) Small irritations — nothing serious, but building. 3) Misinterpretations — each man reads the other's actions differently. 4) Trust breaks — every action now has two meanings. 5) Confrontation — not always violent, but the tipping point. The ending must be earned: one man dies (accident, self-defense, or deliberate), the survivor gives a simple explanation to the pilot. But the audience, having heard both inner perspectives, can never be certain if the explanation is true.

            NO supernatural elements. NO ghosts, curses, magic, or dreams. The horror is purely human — psychological, visceral, grounded.

            Frame the story with a cold opening from the Station Zero narrator and a closing remark that leaves the audience questioning.

            Return ONLY valid JSON: title, story (use \\n for line breaks), closing_remark. Output raw JSON only.`;
            const resp = await mistralChat([{ role:'system', content:system }, { role:'user', content:prompt }], 3500, 45000);
            let jsonStr = resp.replace(/```json|```/g,'').replace(/`/g,'').trim();
            const story = JSON.parse(jsonStr);
            story.story = story.story.replace(/\\n/g, '\n');
            if (!story.title || !story.story || !story.closing_remark) throw new Error('Invalid story structure');
            let imageUrl = null;
            try {
                const imagePrompt = `Film still for an episode titled "${story.title}", 1980s Arctic weather station, isolated, snow, cold, two men, cinematic, grainy 35mm`;
                imageUrl = await generateImageWithRetry(imagePrompt, 2);
            } catch(e) { console.warn('Could not generate poster:', e); }
            gameState.currentPerformance = {
                title: story.title,
                story: story.story,
                closing_remark: story.closing_remark,
                imageUrl: imageUrl || '',
                rawStoryText: story.story,
                soundCues: null
            };
            saveState();
        }

        async function generateSoundCueSheet(storyText) {
            const length = storyText.length;
            const system = `You are a sound designer for a 1980s film soundtrack. Synth-driven, atmospheric, with drum machines and analog synths. John Carpenter, Vangelis, Tangerine Dream style. Given a short psychological thriller story, return JSON with THREE keys:
            - "sections": array of 5-7 sections dividing the story into emotional acts. Each has "theme" (one of: intro, arrival, routine, tension, suspicion, confrontation, climax, resolution, closing), "start_char" (inclusive), "end_char" (exclusive). Cover entire story from 0 to ${length}.
            - "cues": array of sound events using types: "pad", "lead", "bass", "kick", "snare", "hat", "tom", "strings", "bell", "texture", "arp", "pulse", "sting", "climax", "thunder". Include at least 40 cues spread evenly.
            - "score": object with keys matching theme names. Each key: "bpm" (40-80), "bass" (array of 8 integers 0-24), "kick" (array of 8 integers 0/1), "snare" (array of 8 integers 0/1), "hat" (array of 8 integers 0/1).
            Return ONLY raw JSON.`;
            const userPrompt = `Story text (${length} characters):\n${storyText}\n\nGenerate 80s film score soundtrack.`;
            const resp = await mistralChat([{ role:'system', content:system }, { role:'user', content:userPrompt }], 4000, 35000);
            const cleaned = resp.replace(/```json|```/g,'').trim();
            let data;
            try { data = JSON.parse(cleaned); } catch(parseErr) {
                const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                if (match) { const candidate = match[0].replace(/,\s*([}\]])/g,'$1'); try { data = JSON.parse(candidate); } catch(e2) { throw new Error('Failed to parse AI soundtrack JSON.'); } }
                else throw new Error('No JSON found in AI response.');
            }

            if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                throw new Error('Missing sections, cues, or score in AI response');

            const sortedSections = data.sections.sort((a,b) => a.start_char - b.start_char);
            if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length-1].end_char < length) {
                sortedSections[0].start_char = 0;
                sortedSections[sortedSections.length-1].end_char = length;
            }
            const cues = data.cues.map(c => ({
                type: c.type,
                position: Math.min(c.position, length - 1),
                intensity: c.intensity || 0.6
            }));

            const requiredThemes = ['intro','arrival','routine','tension','suspicion','confrontation','climax','resolution','closing'];
            const score = {};

            function normalizeArray(arr, maxVal = 24) {
                if (!Array.isArray(arr)) throw new Error('Expected array, got ' + typeof arr);
                let clean = arr.map(v => {
                    const num = Number(v);
                    return isNaN(num) ? 0 : Math.min(maxVal, Math.max(0, Math.round(num)));
                });
                if (clean.length < 8) { while (clean.length < 8) clean.push(0); }
                else if (clean.length > 8) { clean = clean.slice(0, 8); }
                return clean;
            }

            for (const theme of requiredThemes) {
                if (!data.score[theme]) throw new Error(`AI did not provide a score for theme "${theme}". Cannot continue.`);
                const s = data.score[theme];
                if (typeof s.bpm !== 'number' || s.bpm < 30 || s.bpm > 120) throw new Error(`Invalid bpm for theme "${theme}": ${s.bpm}`);
                const bass = normalizeArray(s.bass, 24);
                const kick = normalizeArray(s.kick, 1);
                const snare = normalizeArray(s.snare, 1);
                const hat = normalizeArray(s.hat, 1);
                score[theme] = { bpm: s.bpm, bass, kick, snare, hat };
            }

            return { sections: sortedSections, cues, score };
        }

        async function generateAndPerform() {
            await generateStationZeroStory();
            if (!gameState.currentPerformance) throw new Error('Failed to generate story');
            const soundtrack = await generateSoundCueSheet(gameState.currentPerformance.rawStoryText);
            gameState.currentPerformance.soundCues = soundtrack;
            saveState();
            await startStationPerformance();
        }

        // ─── Performance ──────────────────────────────────────────────

        async function startStationPerformance() {
            speechSynthesis.cancel();
            if (window.crTimeout) clearTimeout(window.crTimeout);
            const storyData = gameState.currentPerformance;
            if (!storyData || !storyData.story) { await generateStationZeroStory(); return startStationPerformance(); }

            await getAudioContext();

            let sectionList = null, cueList = null, scoreData = null;
            if (storyData.soundCues) {
                if (Array.isArray(storyData.soundCues)) {
                    cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                    sectionList = storyData.soundCues.sections;
                    cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                    scoreData = storyData.soundCues.score;
                }
            }
            const bubble = document.getElementById('crSpeechBubble');
            const dialogue = document.getElementById('crDialogue');
            const imageEl = document.getElementById('crSegmentImage');
            if (!bubble || !dialogue) return;
            const guideList = document.getElementById('crGuideList');
            if (guideList) guideList.style.display = 'none';
            bubble.style.borderColor = 'rgba(255,255,255,0.12)';
            bubble.style.boxShadow = '0 0 30px rgba(255,255,255,0.04), 0 0 50px rgba(255,255,255,0.02)';
            dialogue.innerHTML = '';
            const oldBack = document.getElementById('crBackBtn');
            if (oldBack) oldBack.remove();
            const oldAdd = document.getElementById('crAddEpisodeBtn');
            if (oldAdd) oldAdd.remove();

            const posterContainer = document.getElementById('crPosterContainer');
            const posterTitle = document.getElementById('crPosterTitle');
            if (posterContainer && imageEl && storyData.imageUrl) {
                imageEl.src = storyData.imageUrl;
                imageEl.classList.add('visible');
                imageEl.style.display = 'block';
                posterContainer.classList.remove('no-image', 'loading');
                posterContainer.classList.add('visible');
                if (posterTitle) posterTitle.textContent = storyData.title || '';
            } else if (posterContainer) posterContainer.classList.add('no-image');

            const intro = `"Station Zero. Two strangers. Six months. One returns. Tonight: '${storyData.title}'."`;
            dialogue.textContent = '';
            speakTextMale(intro);
            await typewriterEffect(dialogue, intro, 48);
            await new Promise(r => setTimeout(r, 1500));

            let indicatorInterval = setInterval(() => {
                if (patternPlayerActive) {
                    const theme = patternPlayerActive.theme || 'intro';
                    const varIdx = currentVariationIdx;
                    const varName = currentSectionPatterns[varIdx] ? currentSectionPatterns[varIdx].name : 'A';
                    const bar = barsInVariation + 1;
                    updateScoreIndicator(theme, varName, bar);
                } else {
                    updateScoreIndicator('...', '—', 0);
                }
            }, 1000);

            if (sectionList && sectionList.length > 0) {
                transitionSectionTheme(sectionList[0].theme, scoreData);
            } else if (scoreData) {
                transitionSectionTheme('intro', scoreData);
            }

            const storyText = storyData.rawStoryText || storyData.story;
            if (!storyText) {
                console.warn('No story text');
                await showClosingAndFinish(storyData, dialogue, indicatorInterval);
                return;
            }

            let cueChecker = null;
            if (cueList && cueList.length > 0) {
                const sortedCues = [...cueList].sort((a,b) => a.position - b.position);
                let cueIdx = 0;
                const triggered = new Set();
                let lastLog = 0;
                const sortedSections = sectionList ? [...sectionList].sort((a,b) => a.start_char - b.start_char) : [];
                let sectionIdx = 0;
                let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                cueChecker = function check(idx) {
                    if (idx - lastLog > 500) { lastLog = idx; }
                    while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                        const sec = sortedSections[sectionIdx];
                        if (sec.theme !== currentTheme) {
                            currentTheme = sec.theme;
                            transitionSectionTheme(currentTheme, scoreData);
                        }
                        sectionIdx++;
                    }
                    while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                        const cue = sortedCues[cueIdx];
                        if (!triggered.has(cueIdx)) {
                            triggered.add(cueIdx);
                            play80sSound(cue.type, cue.intensity);
                        }
                        cueIdx++;
                    }
                };
            }

            dialogue.textContent = '';
            const typingPromise = typewriterEffect(dialogue, storyText, 32, cueChecker);
            const speechPromise = speakTextMale(storyText);

            await speechPromise;
            await typingPromise;

            await showClosingAndFinish(storyData, dialogue, indicatorInterval);
        }

        async function showClosingAndFinish(storyData, dialogue, indicatorInterval) {
            const closing = `"${storyData.closing_remark}"`;
            const closingLine = document.createElement('p');
            closingLine.style.marginTop = '16px';
            closingLine.style.fontStyle = 'italic';
            closingLine.style.color = '#c8c8c8';
            dialogue.appendChild(closingLine);

            const closingSpeech = speakTextMale(closing);
            const closingTyping = typewriterEffect(closingLine, closing, 42);
            await Promise.all([closingSpeech, closingTyping]);

            await new Promise(r => setTimeout(r, 1000));

            const curtainText = document.createElement('p');
            curtainText.textContent = '— End of transmission —';
            stopSectionAmbient();
            stopPatternPlayer();
            clearInterval(indicatorInterval);
            const indicator = document.getElementById('scoreIndicator');
            if (indicator) indicator.style.display = 'none';
            curtainText.style.color = '#5a5a5a';
            curtainText.style.fontSize = '14px';
            dialogue.appendChild(curtainText);
            stopAmbient();

            const btnRow = document.createElement('div');
            btnRow.style.marginTop = '12px';
            btnRow.style.display = 'flex';
            btnRow.style.gap = '8px';
            btnRow.style.justifyContent = 'flex-end';
            const leaveBtn = document.createElement('button');
            leaveBtn.className = 'btn back-btn';
            leaveBtn.textContent = '← Back to Station';
            leaveBtn.addEventListener('click', () => { leaveStation(); });
            btnRow.appendChild(leaveBtn);
            const addBtn = document.createElement('button');
            addBtn.className = 'btn accent';
            addBtn.id = 'crAddEpisodeBtn';
            addBtn.textContent = '➕ Save Rotation';
            addBtn.addEventListener('click', () => { addCurrentEpisode(); addBtn.disabled = true; addBtn.textContent = '✓ Saved'; });
            btnRow.appendChild(addBtn);
            dialogue.appendChild(btnRow);
        }

        function addCurrentEpisode() {
            const perf = gameState.currentPerformance;
            if (!perf) return;
            gameState.episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
            saveState();
            setTimeout(() => leaveStation(), 600);
        }

        function leaveStation() {
            stopAmbient();
            stopSectionAmbient();
            stopPatternPlayer();
            const indicator = document.getElementById('scoreIndicator');
            if (indicator) indicator.style.display = 'none';
            renderStationPanel();
        }

        // ─── Init ──────────────────────────────────────────────────────

        function init() {
            loadState();
            renderStationPanel();
            document.getElementById('resetApiBtn').addEventListener('click', () => {
                const key = prompt('Enter your Mistral API key:');
                if (key && key.length > 10) { apiKey = key; localStorage.setItem('stationzero_key', key); }
            });
            document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
            document.querySelector('.game-area').addEventListener('click', (e) => {
                const portrait = e.target.closest('.host-portrait');
                if (portrait && HOST_BIO) showModal(HOST_BIO);
            });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
            if (!apiKey) setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
            document.addEventListener('click', () => { getAudioContext().catch(()=>{}); }, { once: true });
        }
        init();
    })();
    </script>
