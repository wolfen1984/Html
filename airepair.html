<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Special+Elite&display=swap" rel="stylesheet">
    <title>VCR WATCH – The Repairman's Log 1987</title>
    <style>
        :root {
            --amber: #e8a840;
            --amber-glow: #f0c060;
            --amber-dim: #7a5020;
            --neon: #4af;
            --neon-dim: #1a3355;
            --text-glow: 0 0 8px rgba(232, 168, 64, 0.6), 0 0 20px rgba(232, 168, 64, 0.25);
            --bg-deep: #0d0805;
            --panel-bg: #1a1008;
            --button-bg: linear-gradient(180deg, #2a1a0a 0%, #0f0802 100%);
            --wood: #3a2210;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #050302;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Press Start 2P', monospace;
            background-image: radial-gradient(ellipse at center, #1a0e06 0%, #030100 70%);
            overflow: hidden;
            user-select: text;
        }
        .crt-monitor {
            background: #1a0f08;
            border-radius: 20px;
            padding: 15px 12px 12px;
            box-shadow: 0 0 0 3px #0a0a0a, 0 0 0 6px #2a1810, 0 0 0 8px #050505, 0 20px 40px rgba(0, 0, 0, 0.9);
            width: 100%;
            height: 100%;
            max-height: 100%;
            display: flex;
            flex-direction: column;
        }
        .monitor-frame {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .screen-area {
            flex: 1;
            background: #080400;
            border-radius: 12px;
            padding: 8px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }
        .screen-glow {
            flex: 1;
            background: #060300;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.95), 0 0 15px rgba(232, 168, 64, 0.08);
            min-height: 0;
        }
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0, 0, 0, 0.06) 3px, rgba(0, 0, 0, 0.06) 4px);
            pointer-events: none;
            z-index: 10;
        }
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 8;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.75);
            border-radius: 6px;
        }
        .screen-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 12;
            padding: 6px;
            padding-top: 8px;
            padding-bottom: 8px;
            min-height: 0;
            overflow-y: auto;
        }
        .title-bar {
            text-align: center;
            padding: 4px 0;
            border-bottom: 1px solid rgba(232, 168, 64, 0.4);
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .title-bar .game-title {
            font-size: 11px;
            color: var(--amber);
            text-shadow: var(--text-glow);
            letter-spacing: 1px;
        }
        .title-bar .subtitle {
            font-size: 7px;
            color: #8a6530;
            margin-top: 2px;
        }
        .location-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .location-tabs button {
            flex: 1;
            background: var(--button-bg);
            border: 2px solid #3a2010;
            color: #8a6530;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 6px 3px;
            cursor: pointer;
            border-radius: 4px;
            text-shadow: 0 0 4px rgba(180, 130, 60, 0.4);
            transition: all 0.1s;
        }
        .location-tabs button.active {
            border-color: var(--amber);
            color: var(--amber-glow);
            text-shadow: var(--text-glow);
            box-shadow: 0 0 12px rgba(232, 168, 64, 0.3);
        }
        .location-tabs button:active {
            transform: translateY(1px);
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 8px;
            background: rgba(15, 8, 3, 0.8);
            border: 1px solid var(--amber-dim);
            margin-bottom: 4px;
            font-size: 9px;
            color: #c08040;
            text-shadow: 0 0 5px rgba(200, 130, 60, 0.4);
            flex-shrink: 0;
        }
        .game-output {
            flex: 1 1 0;
            overflow-y: auto;
            padding: 6px;
            color: #d4a050;
            font-size: 18px;
            line-height: 1.45;
            text-shadow: 0 0 3px rgba(200, 150, 70, 0.4);
            min-height: 0;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(232, 168, 64, 0.15);
            margin-bottom: 4px;
            font-family: 'VT323', 'Special Elite', 'Press Start 2P', monospace;
            letter-spacing: 0.4px;
            white-space: pre-wrap;
        }
        .game-output::-webkit-scrollbar {
            width: 5px;
        }
        .game-output::-webkit-scrollbar-track {
            background: #020101;
        }
        .game-output::-webkit-scrollbar-thumb {
            background: #553a15;
            border-radius: 3px;
        }
        .input-area {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 3px 6px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(232, 168, 64, 0.35);
            border-radius: 4px;
            margin-bottom: 4px;
        }
        .prompt-symbol {
            color: var(--amber-glow);
            font-size: 16px;
        }
        .cmd-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e0b860;
            font-family: 'VT323', 'Special Elite', 'Press Start 2P', monospace;
            font-size: 18px;
            padding: 5px;
            outline: none;
            caret-color: #ffb040;
            text-shadow: 0 0 3px rgba(200, 150, 70, 0.5);
            letter-spacing: 0.4px;
        }
        .cmd-input::placeholder {
            color: #4a3018;
        }
        .actions-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 3px 0;
            flex-shrink: 0;
            justify-content: center;
        }
        .actions-bar button {
            background: var(--button-bg);
            border: 2px solid #3a2010;
            color: #c08040;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 5px 6px;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 3px 0 #0a0502;
            text-shadow: 0 0 5px rgba(180, 130, 60, 0.4);
            transition: all 0.1s;
            flex: 1 0 auto;
            min-width: 42px;
        }
        .actions-bar button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0a0502;
        }
        .actions-bar button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .monitor-brand {
            text-align: center;
            font-size: 7px;
            color: #2a1a0d;
            letter-spacing: 2px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .power-led {
            width: 8px;
            height: 8px;
            background: #ff9933;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff9933, 0 0 20px rgba(255, 150, 40, 0.5);
            animation: ledPulse 3s infinite;
        }
        @keyframes ledPulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.93);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 60;
            border-radius: 6px;
            flex-direction: column;
            gap: 10px;
        }
        .overlay.hidden {
            display: none !important;
        }
        .overlay-content {
            background: #0a0502;
            border: 2px solid #5a3a18;
            padding: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 82%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(180, 120, 40, 0.25);
            color: #d4a050;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            border-radius: 4px;
        }
        .overlay-content h3 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 13px;
            color: var(--amber);
            text-shadow: var(--text-glow);
        }
        .overlay-close {
            background: var(--button-bg);
            border: 1px solid var(--amber);
            color: var(--amber);
            font-family: 'Press Start 2P';
            font-size: 9px;
            padding: 7px 18px;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 8px;
            align-self: center;
        }
        #watch-overlay .overlay-content {
            max-width: 650px;
            height: 80vh;
        }
        #watch-playback {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }
        #watch-playback .movie-output {
            flex: 1;
            overflow-y: auto;
            background: #050200;
            border: 1px solid #4a2a10;
            padding: 8px;
            font-family: 'VT323', 'Special Elite', monospace;
            font-size: 15px;
            line-height: 1.5;
            color: #f0c870;
            text-shadow: 0 0 3px rgba(220, 170, 80, 0.4);
            margin-bottom: 8px;
            min-height: 0;
            white-space: pre-wrap;
        }
        #watch-playback .movie-controls {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: auto;
        }
        #watch-playback .movie-controls button {
            background: var(--button-bg);
            border: 1px solid #5a3010;
            color: #e0b860;
            font-family: 'Press Start 2P';
            font-size: 8px;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 4px;
        }
        #help-overlay .help-text {
            overflow-y: auto;
            flex: 1;
            font-size: 10px;
            line-height: 1.7;
            white-space: pre-wrap;
            color: #c09050;
        }
        .neon-flicker {
            animation: neonFlicker 4s infinite;
        }
        @keyframes neonFlicker {
            0%,
            95%,
            97%,
            100% {
                opacity: 1;
            }
            96% {
                opacity: 0.4;
            }
        }
        @media (orientation: landscape) {
            .crt-monitor {
                max-width: 800px;
                height: 95vh;
            }
            .game-output {
                font-size: 15px;
            }
            .cmd-input {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="crt-monitor">
        <div class="monitor-frame">
            <div class="screen-area">
                <div class="screen-glow">
                    <div class="scanlines"></div>
                    <div class="vignette"></div>
                    <div class="screen-content">
                        <div class="title-bar">
                            <span class="game-title">█▓▒░ VCR WATCH ░▒▓█</span>
                            <span class="subtitle">The Repairman's Log · 1987</span>
                        </div>
                        <div class="location-tabs" id="locationTabs">
                            <button id="tabCounter" class="active">🛎 COUNTER</button>
                            <button id="tabWorkbench">🔧 WORKBENCH</button>
                            <button id="tabBackroom">☕ BACK ROOM</button>
                        </div>
                        <div class="status-bar" id="statusBar">
                            <span>📅 Day <span id="dayDisplay">1</span></span>
                            <span>📼 <span id="vcrStatus">No VCR</span></span>
                            <span id="customerPresence">🚪 Empty</span>
                        </div>
                        <div class="game-output" id="output"></div>
                        <div class="input-area">
                            <span class="prompt-symbol">&gt;</span>
                            <input type="text" class="cmd-input" id="cmd" placeholder="Type command..." autocomplete="off">
                            <button id="btnSend" style="background:var(--button-bg);border:2px solid #3a2010;color:#c08040;font-family:'Press Start 2P';font-size:10px;padding:5px 10px;cursor:pointer;border-radius:4px;">SEND</button>
                        </div>
                        <div class="actions-bar" id="actionsBar">
                            <button id="btnWait">⏳ WAIT</button>
                            <button id="btnTalk">💬 TALK</button>
                            <button id="btnTake">📦 TAKE VCR</button>
                            <button id="btnOpen">🔓 OPEN</button>
                            <button id="btnWatch">▶ WATCH</button>
                            <button id="btnIgnore">↩ IGNORE</button>
                            <button id="btnRepair">🔧 REPAIR</button>
                            <button id="btnReturn">↩ RETURN</button>
                            <button id="btnRest">🌙 REST</button>
                            <button id="btnCall">📞 CALL</button>
                            <button id="btnReflect">🤔 REFLECT</button>
                            <button id="btnClose">🔒 CLOSE</button>
                            <button id="btnHelp">❓ HELP</button>
                            <button id="btnEndConv" style="display:none;">🛑 END TALK</button>
                        </div>
                    </div>
                </div>

                <!-- HELP OVERLAY -->
                <div class="overlay hidden" id="help-overlay">
                    <div class="overlay-content">
                        <h3>📖 COMMANDS & CONTROLS</h3>
                        <div class="help-text" id="helpText"></div>
                        <button class="overlay-close" id="closeHelp">CLOSE</button>
                    </div>
                </div>

                <!-- WATCH OVERLAY -->
                <div class="overlay hidden" id="watch-overlay">
                    <div class="overlay-content">
                        <h3>▶ PLAYING TAPE</h3>
                        <div id="watch-playback">
                            <div class="movie-output" id="movieOutput"></div>
                            <div class="movie-controls">
                                <button id="movieContinue">▶ NEXT SCENE</button>
                                <button id="movieStop">⏹ STOP</button>
                            </div>
                        </div>
                        <button class="overlay-close" id="closeWatch">CLOSE</button>
                    </div>
                </div>

                <!-- KEY OVERLAY -->
                <div class="overlay hidden" id="key-overlay">
                    <div class="overlay-content" style="text-align:center;">
                        <h3>ENTER MISTRAL API KEY</h3>
                        <input type="text" id="api-key-input" placeholder="Paste your key here..." autocomplete="off" spellcheck="false" style="width:100%;padding:10px;background:#000;border:1px solid #5a3a18;color:#e0b860;font-family:'Press Start 2P';font-size:11px;margin-bottom:15px;">
                        <button id="save-key-btn" style="background:#1a0a02;border:1px solid #a06020;color:#e0b860;font-family:'Press Start 2P';font-size:13px;padding:10px 24px;cursor:pointer;">SAVE KEY</button>
                        <p style="font-size:0.65em;margin-top:15px;color:#7a5020;">Key stored locally in your browser.</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="monitor-brand"><span class="power-led"></span> RCA · VCR WATCH TERMINAL · 1987</div>
    </div>

    <script>
        // ═══════════════════════════════════════════
        // VCR WATCH – The Repairman's Log 1987
        // ═══════════════════════════════════════════
        let MISTRAL_KEY = '';
        const MODEL = 'mistral-small-latest';
        const API_URL = 'https://api.mistral.ai/v1/chat/completions';

        // ── DOM elements ──
        const outputEl = document.getElementById('output');
        const cmdInput = document.getElementById('cmd');
        const btnSend = document.getElementById('btnSend');
        const dayDisplay = document.getElementById('dayDisplay');
        const vcrStatus = document.getElementById('vcrStatus');
        const customerPresence = document.getElementById('customerPresence');
        const keyOverlay = document.getElementById('key-overlay');
        const helpOverlay = document.getElementById('help-overlay');
        const watchOverlay = document.getElementById('watch-overlay');
        const movieOutput = document.getElementById('movieOutput');
        const watchPlayback = document.getElementById('watch-playback');
        const tabCounter = document.getElementById('tabCounter');
        const tabWorkbench = document.getElementById('tabWorkbench');
        const tabBackroom = document.getElementById('tabBackroom');
        const btnEndConv = document.getElementById('btnEndConv');

        // ── Sound System ──
        let audioCtx = null;
        let soundEnabled = true;
        function initAudio() { if (!audioCtx) { audioCtx = new(window.AudioContext || window.webkitAudioContext)(); } if (audioCtx.state === 'suspended') { audioCtx.resume(); } }
        function ensureAudio() { initAudio(); return audioCtx && audioCtx.state !== 'suspended'; }
        function playTick() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.value = 400 + Math.random() * 400; gain.gain.setValueAtTime(0.01, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.015); osc.start(t); osc.stop(t + 0.015); } catch (e) {} }
        function playClick() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square'; osc.frequency.setValueAtTime(500, t); osc.frequency.exponentialRampToValueAtTime(180, t + 0.04); gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.04); osc.start(t); osc.stop(t + 0.04); } catch (e) {} }
        function playSuccess() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; [440, 554, 660].forEach((freq, i) => { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.value = freq; const st = t + i * 0.07; gain.gain.setValueAtTime(0.06, st); gain.gain.exponentialRampToValueAtTime(0.0001, st + 0.1); osc.start(st); osc.stop(st + 0.1); }); } catch (e) {} }
        function playError() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth'; osc.frequency.value = 70; gain.gain.setValueAtTime(0.04, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.18); osc.start(t); osc.stop(t + 0.18); } catch (e) {} }
        function playVCR() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; for (let i = 0; i < 8; i++) { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'triangle'; osc.frequency.value = 150 + Math.random() * 600; const st = t + i * 0.04; gain.gain.setValueAtTime(0.025, st); gain.gain.exponentialRampToValueAtTime(0.0001, st + 0.03); osc.start(st); osc.stop(st + 0.03); } } catch (e) {} }
        function playCreepy() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(330, t); osc.frequency.exponentialRampToValueAtTime(165, t + 0.6); gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.65); osc.start(t); osc.stop(t + 0.65); } catch (e) {} }
        function playOpen() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(180, t); osc.frequency.exponentialRampToValueAtTime(600, t + 0.2); gain.gain.setValueAtTime(0.04, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.25); osc.start(t); osc.stop(t + 0.25); } catch (e) {} }
        function playClose() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(500, t); osc.frequency.exponentialRampToValueAtTime(100, t + 0.18); gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.2); osc.start(t); osc.stop(t + 0.2); } catch (e) {} }
        function playStaticBurst() { if (!soundEnabled || !ensureAudio()) return; try { const t = audioCtx.currentTime; for (let i = 0; i < 15; i++) { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square'; osc.frequency.value = 150 + Math.random() * 2500; const st = t + i * 0.02; gain.gain.setValueAtTime(0.02, st); gain.gain.exponentialRampToValueAtTime(0.0001, st + 0.018); osc.start(st); osc.stop(st + 0.018); } } catch (e) {} }

        // ═══════════════════════════════════════════
        // GAME STATE
        // ═══════════════════════════════════════════
        let gameState = {
            currentLocation: 'counter',
            currentDay: 1,
            customers: [],
            currentCustomer: null,
            currentVCR: null,
            shopOpen: true,
            conversationActive: false,
            conversationContext: null, // 'talk', 'return', 'call'
            activeMovie: null,
        };

        function loadState() {
            const saved = localStorage.getItem('vcrwatch_state');
            if (saved) { try { const p = JSON.parse(saved); gameState.currentDay = p.currentDay || 1; gameState.customers = p.customers || []; } catch(e){} }
        }
        function saveState() {
            localStorage.setItem('vcrwatch_state', JSON.stringify({ currentDay: gameState.currentDay, customers: gameState.customers }));
        }

        function updateStatusBar() {
            dayDisplay.textContent = gameState.currentDay;
            vcrStatus.textContent = gameState.currentVCR ? 'VCR on bench' : 'No VCR';
            vcrStatus.style.color = gameState.currentVCR ? '#ffb040' : '#8a6530';
            customerPresence.textContent = gameState.currentCustomer ? '👤 ' + gameState.currentCustomer.name : '🚪 Empty';
            customerPresence.style.color = gameState.currentCustomer ? '#f0c060' : '#8a6530';
            updateActionButtons();
            updateLocationTabs();
        }

        function updateLocationTabs() {
            tabCounter.classList.toggle('active', gameState.currentLocation === 'counter');
            tabWorkbench.classList.toggle('active', gameState.currentLocation === 'workbench');
            tabBackroom.classList.toggle('active', gameState.currentLocation === 'backroom');
        }

        function updateActionButtons() {
            const loc = gameState.currentLocation;
            const hasCustomer = !!gameState.currentCustomer;
            const hasVCR = !!gameState.currentVCR;
            const hasTape = hasVCR && gameState.currentVCR.hasTape;
            const tapeWatched = hasVCR && gameState.currentVCR.watched;
            const vcrRepaired = hasVCR && gameState.currentVCR.repaired;
            const convActive = gameState.conversationActive;

            document.getElementById('btnWait').style.display = (loc === 'counter' && !hasCustomer && gameState.shopOpen) ? '' : 'none';
            document.getElementById('btnTalk').style.display = (loc === 'counter' && hasCustomer && !convActive) ? '' : 'none';
            document.getElementById('btnTake').style.display = (loc === 'counter' && hasCustomer && !hasVCR) ? '' : 'none';
            document.getElementById('btnOpen').style.display = (loc === 'workbench' && hasVCR && !hasTape && !vcrRepaired) ? '' : 'none';
            document.getElementById('btnWatch').style.display = (loc === 'workbench' && hasVCR && hasTape && !tapeWatched) ? '' : 'none';
            document.getElementById('btnIgnore').style.display = (loc === 'workbench' && hasVCR && hasTape && !tapeWatched) ? '' : 'none';
            document.getElementById('btnRepair').style.display = (loc === 'workbench' && hasVCR && !vcrRepaired && (!hasTape || tapeWatched || gameState.currentVCR?.ignored)) ? '' : 'none';
            document.getElementById('btnReturn').style.display = (loc === 'workbench' && hasVCR && vcrRepaired) ? '' : 'none';
            document.getElementById('btnRest').style.display = (loc === 'backroom') ? '' : 'none';
            document.getElementById('btnCall').style.display = (loc === 'backroom') ? '' : 'none';
            document.getElementById('btnReflect').style.display = (loc === 'backroom') ? '' : 'none';
            document.getElementById('btnClose').style.display = (loc === 'counter' && gameState.shopOpen && !hasCustomer) ? '' : 'none';
            btnEndConv.style.display = convActive ? '' : 'none';
        }

        function printInstant(text) { outputEl.innerHTML += text + '\n'; outputEl.scrollTop = outputEl.scrollHeight; }
        async function print(text, delay = 12) {
            return new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) { outputEl.innerHTML += text.charAt(i); outputEl.scrollTop = outputEl.scrollHeight; if (!gameState.activeMovie) playTick(); i++; setTimeout(type, delay); }
                    else { outputEl.innerHTML += '\n'; outputEl.scrollTop = outputEl.scrollHeight; resolve(); }
                }
                type();
            });
        }

        async function callMistralJSON(sys, usr) {
            if (!MISTRAL_KEY) { printInstant('*** NO API KEY. Type SETKEY.'); playError(); return null; }
            try {
                const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${MISTRAL_KEY}`}, body:JSON.stringify({ model:MODEL, messages:[{role:'system',content:sys},{role:'user',content:usr}], temperature:0.9, response_format:{type:'json_object'} }) });
                if (!res.ok) { printInstant(`*** API ERROR ${res.status}`); playError(); return null; }
                const data = await res.json();
                return JSON.parse(data.choices[0].message.content);
            } catch(e) { printInstant('*** NETWORK ERROR'); playError(); return null; }
        }

        async function callMistralText(sys, usr) {
            if (!MISTRAL_KEY) { printInstant('*** NO API KEY.'); playError(); return null; }
            try {
                const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${MISTRAL_KEY}`}, body:JSON.stringify({ model:MODEL, messages:[{role:'system',content:sys},{role:'user',content:usr}], temperature:0.9 }) });
                if (!res.ok) { printInstant(`*** API ERROR ${res.status}`); playError(); return null; }
                const data = await res.json();
                return data.choices[0].message.content;
            } catch(e) { printInstant('*** NETWORK ERROR'); playError(); return null; }
        }

        const SYSTEM_CUSTOMER_GEN = `You are the narrator of "VCR WATCH – The Repairman's Log", a 1987 psychological simulator. You generate customers for a VCR repair shop. Return ONLY valid JSON: name, appearance, occupation, reason_for_repair, personality, home_situation, secret, trust (30-70), greeting.`;
        const SYSTEM_TAPE_CONTENT = `You are generating the contents of a forgotten VHS tape. Generate 3-5 short scenes in JSON: {"scenes":["scene1...", ...]}. Stark, documentary style. No supernatural.`;
        const SYSTEM_CONVERSATION = `You are a customer at a VCR repair shop in 1987. Respond in character, brief (1-3 sentences). If the repairman hints at knowing your secret, react realistically. Never supernatural.`;
        const SYSTEM_REFLECTION = `Inner monologue of a solitary VCR repairman in 1987. First-person, brief, melancholic.`;

        // ═══════════════════════════════════════════
        // GAME ACTIONS
        // ═══════════════════════════════════════════
        async function actionWait() {
            if (gameState.currentLocation !== 'counter' || gameState.currentCustomer || !gameState.shopOpen) { printInstant('Cannot wait now.'); playError(); return; }
            await print('You wait behind the counter...');
            const existingNames = gameState.customers.map(c=>c.name).join(', ');
            const prompt = `${existingNames ? 'Existing: '+existingNames+'. ' : ''}Generate a ${Math.random()<0.5?'NEW':'RETURNING'} customer. JSON.`;
            const data = await callMistralJSON(SYSTEM_CUSTOMER_GEN, prompt);
            if (!data || !data.name) { await print('Nobody came in.'); return; }
            let customer = gameState.customers.find(c=>c.name.toLowerCase()===data.name.toLowerCase());
            if (customer) {
                customer.reason_for_repair = data.reason_for_repair || customer.reason_for_repair;
                customer.greeting = data.greeting || 'Hi again.';
                customer.last_visit_day = gameState.currentDay;
            } else {
                customer = {
                    name: data.name, appearance: data.appearance, occupation: data.occupation,
                    reason_for_repair: data.reason_for_repair, personality: data.personality,
                    home_situation: data.home_situation, secret: data.secret, trust: data.trust || 50,
                    greeting: data.greeting, last_visit_day: gameState.currentDay, tapes_watched: []
                };
                gameState.customers.push(customer);
            }
            gameState.currentCustomer = customer;
            saveState(); updateStatusBar();
            await print(`\n🔔 ${customer.name} walks in. ${customer.appearance || ''}`);
            await print(`   "${customer.greeting}"`);
            await print(`   VCR issue: "${customer.reason_for_repair}".`);
            playSuccess();
        }

        async function actionTalk() {
            if (!gameState.currentCustomer || gameState.conversationActive) { printInstant('Cannot talk.'); playError(); return; }
            gameState.conversationActive = true;
            gameState.conversationContext = 'talk';
            updateActionButtons();
            await print(`\n💬 Talking to ${gameState.currentCustomer.name}... (Type dialogue, /end to finish)`);
            playClick();
        }

        async function handleDialogue(playerText) {
            if (!gameState.conversationActive || !gameState.currentCustomer) return;
            const c = gameState.currentCustomer;
            let knowledge = '';
            if (c.tapes_watched && c.tapes_watched.length > 0) {
                knowledge = `\n[Repairman knows: ${c.tapes_watched.join('; ')}. Secret: ${c.secret}.]`;
            }
            const prompt = `Customer: ${c.name} (${c.personality}). Secret: ${c.secret}. Trust: ${c.trust}.${knowledge}\nRepairman says: "${playerText}"\nRespond.`;
            const response = await callMistralText(SYSTEM_CONVERSATION, prompt);
            if (response) await print(`   ${c.name}: "${response.trim()}"`);
            else await print(`   ${c.name} nods.`);
            if (playerText.toLowerCase().includes('tape') || playerText.toLowerCase().includes('watch')) c.trust = Math.max(0, c.trust-5);
            if (playerText.toLowerCase().includes('sorry') || playerText.toLowerCase().includes('understand')) c.trust = Math.min(100, c.trust+3);
            saveState(); playClick();
        }

        function actionEndConversation() {
            if (!gameState.conversationActive) return;
            gameState.conversationActive = false;
            const context = gameState.conversationContext;
            gameState.conversationContext = null;

            // Only dismiss the customer if the conversation was from RETURN or CALL.
            // For TALK, the customer stays (they still have a VCR to drop off).
            if (context === 'return' || context === 'call') {
                if (gameState.currentCustomer) {
                    printInstant(`${gameState.currentCustomer.name} nods and leaves.`);
                    gameState.currentCustomer = null;
                }
            }
            updateActionButtons();
            printInstant('Conversation ended.');
            playClose();
        }

        async function actionTake() {
            if (gameState.currentLocation !== 'counter' || !gameState.currentCustomer || gameState.currentVCR) { printInstant('Cannot take VCR.'); playError(); return; }
            gameState.currentVCR = { customer: gameState.currentCustomer, hasTape: null, tapeContent: null, watched: false, ignored: false, repaired: false };
            await print(`You carry ${gameState.currentCustomer.name}'s VCR to the workbench.`);
            playVCR();
            updateStatusBar(); saveState();
        }

        async function actionOpen() {
            if (gameState.currentLocation !== 'workbench' || !gameState.currentVCR || gameState.currentVCR.repaired || gameState.currentVCR.hasTape!==null) { printInstant('Cannot open.'); playError(); return; }
            await print('Unscrewing the casing...');
            playVCR();
            await new Promise(r => setTimeout(r, 600));
            const hasTape = Math.random() < 0.7;
            gameState.currentVCR.hasTape = hasTape;
            if (hasTape) { await print('📼 There\'s a tape inside.'); playCreepy(); }
            else { await print('No tape inside.'); gameState.currentVCR.ignored = true; gameState.currentVCR.watched = true; }
            updateStatusBar(); saveState();
        }

        async function actionWatch() {
            if (gameState.currentLocation !== 'workbench' || !gameState.currentVCR || !gameState.currentVCR.hasTape || gameState.currentVCR.watched) { printInstant('Nothing to watch.'); playError(); return; }
            watchPlayback.style.display = 'flex'; movieOutput.innerHTML = '▶ Loading tape...\n';
            showOverlay(watchOverlay); playStaticBurst();
            gameState.activeMovie = { customer: gameState.currentVCR.customer, scenes: [], sceneIndex: 0 };
            const c = gameState.currentVCR.customer;
            const data = await callMistralJSON(SYSTEM_TAPE_CONTENT, `Customer: ${c.name}. Secret: ${c.secret}.`);
            if (data && data.scenes && data.scenes.length > 0) {
                gameState.activeMovie.scenes = data.scenes;
                movieOutput.innerHTML = `╔══════════════════╗\n║ TAPE – ${c.name.substring(0,12)} ║\n╚══════════════════╝\n\n[SCENE 1]\n${data.scenes[0]}\n`;
                gameState.activeMovie.sceneIndex = 1;
                playCreepy();
            } else {
                movieOutput.innerHTML = 'Blank tape... static.\n';
                gameState.activeMovie = null;
                playStaticBurst();
            }
            movieOutput.scrollTop = 0;
        }

        async function actionMovieContinue() {
            if (!gameState.activeMovie) return;
            const am = gameState.activeMovie;
            if (am.sceneIndex >= am.scenes.length) {
                movieOutput.innerHTML += '\n[STATIC]\nThe tape ends.';
                if (gameState.currentVCR) {
                    gameState.currentVCR.watched = true;
                    gameState.currentVCR.tapeContent = am.scenes;
                    gameState.currentVCR.customer.tapes_watched.push(am.scenes.join(' | '));
                    saveState();
                }
                gameState.activeMovie = null;
                updateStatusBar(); playStaticBurst(); return;
            }
            movieOutput.innerHTML += `\n[SCENE ${am.sceneIndex+1}]\n${am.scenes[am.sceneIndex]}\n`;
            am.sceneIndex++;
            movieOutput.scrollTop = movieOutput.scrollHeight; playClick();
        }

        function actionMovieStop() {
            if (gameState.activeMovie) {
                if (gameState.currentVCR) {
                    gameState.currentVCR.watched = true;
                    gameState.currentVCR.tapeContent = gameState.activeMovie.scenes;
                    gameState.currentVCR.customer.tapes_watched.push(gameState.activeMovie.scenes.join(' | '));
                    saveState();
                }
                gameState.activeMovie = null;
                updateStatusBar();
            }
            hideOverlay(watchOverlay); watchPlayback.style.display = 'none';
            playClose();
        }

        async function actionIgnore() {
            if (!gameState.currentVCR || !gameState.currentVCR.hasTape || gameState.currentVCR.watched) { printInstant('Nothing to ignore.'); playError(); return; }
            gameState.currentVCR.ignored = true; gameState.currentVCR.watched = true;
            await print('You rewind the tape without looking.');
            playClick(); updateStatusBar(); saveState();
        }

        async function actionRepair() {
            if (!gameState.currentVCR || gameState.currentVCR.repaired) { printInstant('Nothing to repair.'); playError(); return; }
            if (gameState.currentVCR.hasTape && !gameState.currentVCR.watched && !gameState.currentVCR.ignored) { printInstant('Unexamined tape. WATCH or IGNORE first.'); playError(); return; }
            await print('Repairing... Soldering iron. Multimeter.');
            gameState.currentVCR.repaired = true; playSuccess(); updateStatusBar(); saveState();
        }

        async function actionReturn() {
            if (!gameState.currentVCR || !gameState.currentVCR.repaired) { printInstant('VCR not repaired.'); playError(); return; }
            const c = gameState.currentVCR.customer;
            gameState.currentLocation = 'counter';
            await print(`You bring the repaired VCR to the counter.`);
            if (gameState.currentVCR.watched && !gameState.currentVCR.ignored && gameState.currentVCR.tapeContent) {
                await print(`You know something about ${c.name}.`);
                gameState.currentCustomer = c;
                gameState.conversationActive = true;
                gameState.conversationContext = 'return';
                await print(`(Type what you say, or /end to stay silent.)`);
                playCreepy();
            } else {
                await print(`"Thanks," ${c.name} says and leaves.`);
                gameState.currentCustomer = null;
            }
            gameState.currentVCR = null;
            updateStatusBar(); saveState();
        }

        async function actionRest() {
            if (gameState.currentLocation !== 'backroom') return;
            await print('You lie on the cot. Neon through blinds.');
            gameState.currentDay++; gameState.shopOpen = true;
            gameState.currentCustomer = null; gameState.currentVCR = null; gameState.currentLocation = 'counter';
            gameState.conversationActive = false; gameState.conversationContext = null; gameState.activeMovie = null;
            saveState(); updateStatusBar();
            await print(`\n☀️ Day ${gameState.currentDay} begins. Shop open.`);
            playSuccess();
        }

        async function actionCall() {
            if (gameState.currentLocation !== 'backroom' || !gameState.customers.length) { printInstant('No one to call.'); playError(); return; }
            const c = gameState.customers[Math.floor(Math.random()*gameState.customers.length)];
            await print(`Dialing ${c.name}...`);
            gameState.currentCustomer = c;
            gameState.conversationActive = true;
            gameState.conversationContext = 'call';
            gameState.currentLocation = 'counter';
            await print(`(Type dialogue, /end to hang up.)`);
            updateStatusBar(); playClick();
        }

        async function actionReflect() {
            if (gameState.currentLocation !== 'backroom') return;
            const watched = gameState.customers.filter(c=>c.tapes_watched?.length).length;
            const ref = await callMistralText(SYSTEM_REFLECTION, `Day ${gameState.currentDay}. Watched ${watched} customers.`);
            if (ref) await print(`\n🤔 ${ref.trim()}`); else await print('\nYou stare at the ceiling.');
            playCreepy();
        }

        async function actionCloseShop() {
            if (gameState.currentLocation !== 'counter' || gameState.currentCustomer) { printInstant('Cannot close now.'); playError(); return; }
            gameState.shopOpen = false;
            await print('Shop closed. Go to back room to rest.');
            playClose(); updateStatusBar();
        }

        function actionGoTo(loc) {
            if (gameState.conversationActive) { printInstant('End conversation first.'); playError(); return; }
            if (gameState.activeMovie) { printInstant('Stop the tape first.'); playError(); return; }
            if (loc==='workbench' && !gameState.currentVCR && gameState.currentLocation==='counter' && gameState.currentCustomer) { printInstant('TAKE the VCR first.'); playError(); return; }
            gameState.currentLocation = loc;
            updateStatusBar();
            const names = { counter:'front counter', workbench:'repair workbench', backroom:'back room' };
            printInstant(`You move to ${names[loc]}.`); playClick();
        }

        function showOverlay(o) { o.classList.remove('hidden'); o.style.display='flex'; cmdInput.disabled=true; playOpen(); }
        function hideOverlay(o) { o.classList.add('hidden'); o.style.display=''; cmdInput.disabled=false; cmdInput.focus(); playClose(); }

        function openHelp() {
            document.getElementById('helpText').textContent = ` COMMANDS:
  WAIT      - Wait for customer
  TALK      - Talk to customer
  TAKE      - Take VCR to workbench
  OPEN      - Open VCR
  WATCH     - Watch tape
  IGNORE    - Rewind without watching
  REPAIR    - Fix VCR
  RETURN    - Return repaired VCR
  REST      - Sleep, advance day
  CALL      - Phone a past customer
  REFLECT   - Think about what you've seen
  CLOSE     - Close shop for the day
  GO [loc]  - Move: counter / workbench / backroom
  SETKEY    - Change API key
  MUTE/UNMUTE - Toggle sound
  /end      - End conversation
  END TALK  button also available`;
            showOverlay(helpOverlay);
        }

        async function handleCommand(raw) {
            if (!raw) return;
            const upper = raw.toUpperCase().trim();
            const lower = raw.toLowerCase().trim();

            if (gameState.activeMovie) {
                if (upper === 'MUTE') { soundEnabled=false; printInstant('Muted.'); return; }
                if (upper === 'UNMUTE') { soundEnabled=true; printInstant('Unmuted.'); playClick(); return; }
                if (upper === 'HELP') { openHelp(); return; }
                if (upper === 'STOP') { actionMovieStop(); return; }
                if (upper === 'CONTINUE' || upper === 'NEXT') { actionMovieContinue(); return; }
                printInstant('Tape playing. Use CONTINUE or STOP.'); return;
            }

            if (gameState.conversationActive) {
                if (lower === '/end') { actionEndConversation(); return; }
                await handleDialogue(raw);
                return;
            }

            printInstant(`> ${raw}`);
            playClick();

            if (upper === 'WAIT') await actionWait();
            else if (upper === 'TALK') await actionTalk();
            else if (upper === 'TAKE') await actionTake();
            else if (upper === 'OPEN') await actionOpen();
            else if (upper === 'WATCH') await actionWatch();
            else if (upper === 'IGNORE') await actionIgnore();
            else if (upper === 'REPAIR') await actionRepair();
            else if (upper === 'RETURN') await actionReturn();
            else if (upper === 'REST') await actionRest();
            else if (upper === 'CALL') await actionCall();
            else if (upper === 'REFLECT') await actionReflect();
            else if (upper === 'CLOSE') await actionCloseShop();
            else if (upper === 'HELP') openHelp();
            else if (upper === 'MUTE') { soundEnabled=false; printInstant('Muted.'); }
            else if (upper === 'UNMUTE') { soundEnabled=true; printInstant('Unmuted.'); playClick(); }
            else if (upper === 'CLEAR') { outputEl.innerHTML=''; playStaticBurst(); }
            else if (upper === 'SETKEY') {
                MISTRAL_KEY=''; localStorage.removeItem('vcrwatch_api_key');
                keyOverlay.classList.remove('hidden'); keyOverlay.style.display='flex'; playOpen();
            } else if (upper.startsWith('GO ')) {
                const loc = lower.slice(3).trim();
                if (['counter','workbench','backroom','back room'].includes(loc)) actionGoTo(loc==='back room'?'backroom':loc);
                else { printInstant('Go where? counter / workbench / backroom'); playError(); }
            } else { printInstant('Unknown command. Type HELP.'); playError(); }
        }

        // Event listeners
        cmdInput.addEventListener('keydown', async e => { if (e.key==='Enter') { initAudio(); const raw=cmdInput.value.trim(); cmdInput.value=''; await handleCommand(raw); } });
        btnSend.addEventListener('click', async () => { initAudio(); playClick(); const raw=cmdInput.value.trim(); cmdInput.value=''; await handleCommand(raw); });
        tabCounter.addEventListener('click', ()=> { initAudio(); actionGoTo('counter'); });
        tabWorkbench.addEventListener('click', ()=> { initAudio(); actionGoTo('workbench'); });
        tabBackroom.addEventListener('click', ()=> { initAudio(); actionGoTo('backroom'); });
        document.getElementById('btnWait').addEventListener('click', ()=> { initAudio(); handleCommand('WAIT'); });
        document.getElementById('btnTalk').addEventListener('click', ()=> { initAudio(); handleCommand('TALK'); });
        document.getElementById('btnTake').addEventListener('click', ()=> { initAudio(); handleCommand('TAKE'); });
        document.getElementById('btnOpen').addEventListener('click', ()=> { initAudio(); handleCommand('OPEN'); });
        document.getElementById('btnWatch').addEventListener('click', ()=> { initAudio(); handleCommand('WATCH'); });
        document.getElementById('btnIgnore').addEventListener('click', ()=> { initAudio(); handleCommand('IGNORE'); });
        document.getElementById('btnRepair').addEventListener('click', ()=> { initAudio(); handleCommand('REPAIR'); });
        document.getElementById('btnReturn').addEventListener('click', ()=> { initAudio(); handleCommand('RETURN'); });
        document.getElementById('btnRest').addEventListener('click', ()=> { initAudio(); handleCommand('REST'); });
        document.getElementById('btnCall').addEventListener('click', ()=> { initAudio(); handleCommand('CALL'); });
        document.getElementById('btnReflect').addEventListener('click', ()=> { initAudio(); handleCommand('REFLECT'); });
        document.getElementById('btnClose').addEventListener('click', ()=> { initAudio(); handleCommand('CLOSE'); });
        document.getElementById('btnHelp').addEventListener('click', ()=> { initAudio(); openHelp(); });
        btnEndConv.addEventListener('click', ()=> { initAudio(); actionEndConversation(); });
        document.getElementById('closeHelp').addEventListener('click', ()=> hideOverlay(helpOverlay));
        document.getElementById('closeWatch').addEventListener('click', ()=> { if (!gameState.activeMovie) hideOverlay(watchOverlay); });
        document.getElementById('movieContinue').addEventListener('click', ()=> { initAudio(); actionMovieContinue(); });
        document.getElementById('movieStop').addEventListener('click', ()=> { initAudio(); actionMovieStop(); });
        document.addEventListener('keydown', e => {
            if (e.key==='Escape') {
                if (!helpOverlay.classList.contains('hidden')) hideOverlay(helpOverlay);
                if (!watchOverlay.classList.contains('hidden') && !gameState.activeMovie) hideOverlay(watchOverlay);
                if (gameState.conversationActive) actionEndConversation();
            }
        });

        // API key
        let savedKey = localStorage.getItem('vcrwatch_api_key');
        if (!savedKey) { keyOverlay.classList.remove('hidden'); keyOverlay.style.display='flex'; } else MISTRAL_KEY = savedKey;
        document.getElementById('save-key-btn').addEventListener('click', ()=> {
            initAudio(); playClick();
            const key = document.getElementById('api-key-input').value.trim();
            if (key) { MISTRAL_KEY=key; localStorage.setItem('vcrwatch_api_key', key); keyOverlay.classList.add('hidden'); keyOverlay.style.display=''; playSuccess(); if(!window._booted){ window._booted=true; boot(); } }
        });

        async function boot() {
            loadState(); updateStatusBar();
            await print('╔══════════════════════════════════╗');
            await print('║     VCR WATCH                    ║');
            await print('║     The Repairman\'s Log · 1987   ║');
            await print('╚══════════════════════════════════╝');
            await print('');
            await print('The shop is quiet. Fluorescent hum.');
            await print('Neon light through dusty blinds.');
            await print('Day 1. Type WAIT for a customer.');
            playCreepy();
            cmdInput.focus();
        }

        if (MISTRAL_KEY) { window._booted=true; boot(); }
        updateStatusBar();
    </script>
</body>
</html>
