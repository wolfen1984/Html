<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Special+Elite&display=swap" rel="stylesheet">
    <title>VCR WATCH – The Repairman's Log 1987</title>
    <style>
        :root {
            --amber: #e8a840;
            --amber-glow: #f0c060;
            --amber-dim: #7a5020;
            --neon: #4af;
            --neon-dim: #1a3355;
            --text-glow: 0 0 8px rgba(232, 168, 64, 0.6), 0 0 20px rgba(232, 168, 64, 0.25);
            --bg-deep: #0d0805;
            --panel-bg: #1a1008;
            --button-bg: linear-gradient(180deg, #2a1a0a 0%, #0f0802 100%);
            --wood: #3a2210;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #050302;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Press Start 2P', monospace;
            background-image: radial-gradient(ellipse at center, #1a0e06 0%, #030100 70%);
            overflow: hidden;
            user-select: text;
        }
        .crt-monitor {
            background: #1a0f08;
            border-radius: 20px;
            padding: 15px 12px 12px;
            box-shadow: 0 0 0 3px #0a0a0a, 0 0 0 6px #2a1810, 0 0 0 8px #050505, 0 20px 40px rgba(0, 0, 0, 0.9);
            width: 100%;
            height: 100%;
            max-height: 100%;
            display: flex;
            flex-direction: column;
        }
        .monitor-frame {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .screen-area {
            flex: 1;
            background: #080400;
            border-radius: 12px;
            padding: 8px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }
        .screen-glow {
            flex: 1;
            background: #060300;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.95), 0 0 15px rgba(232, 168, 64, 0.08);
            min-height: 0;
        }
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0, 0, 0, 0.06) 3px, rgba(0, 0, 0, 0.06) 4px);
            pointer-events: none;
            z-index: 10;
        }
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 8;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.75);
            border-radius: 6px;
        }
        .screen-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 12;
            padding: 6px;
            padding-top: 8px;
            padding-bottom: 8px;
            min-height: 0;
            overflow-y: auto;
        }
        .title-bar {
            text-align: center;
            padding: 4px 0;
            border-bottom: 1px solid rgba(232, 168, 64, 0.4);
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .title-bar .game-title {
            font-size: 11px;
            color: var(--amber);
            text-shadow: var(--text-glow);
            letter-spacing: 1px;
        }
        .title-bar .subtitle {
            font-size: 7px;
            color: #8a6530;
            margin-top: 2px;
        }
        .location-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .location-tabs button {
            flex: 1;
            background: var(--button-bg);
            border: 2px solid #3a2010;
            color: #8a6530;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 6px 3px;
            cursor: pointer;
            border-radius: 4px;
            text-shadow: 0 0 4px rgba(180, 130, 60, 0.4);
            transition: all 0.1s;
        }
        .location-tabs button.active {
            border-color: var(--amber);
            color: var(--amber-glow);
            text-shadow: var(--text-glow);
            box-shadow: 0 0 12px rgba(232, 168, 64, 0.3);
        }
        .location-tabs button:active {
            transform: translateY(1px);
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 8px;
            background: rgba(15, 8, 3, 0.8);
            border: 1px solid var(--amber-dim);
            margin-bottom: 4px;
            font-size: 9px;
            color: #c08040;
            text-shadow: 0 0 5px rgba(200, 130, 60, 0.4);
            flex-shrink: 0;
        }
        .game-output {
            flex: 1 1 0;
            overflow-y: auto;
            padding: 6px;
            color: #d4a050;
            font-size: 18px;
            line-height: 1.45;
            text-shadow: 0 0 3px rgba(200, 150, 70, 0.4);
            min-height: 0;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(232, 168, 64, 0.15);
            margin-bottom: 4px;
            font-family: 'VT323', 'Special Elite', 'Press Start 2P', monospace;
            letter-spacing: 0.4px;
            white-space: pre-wrap;
        }
        .game-output::-webkit-scrollbar {
            width: 5px;
        }
        .game-output::-webkit-scrollbar-track {
            background: #020101;
        }
        .game-output::-webkit-scrollbar-thumb {
            background: #553a15;
            border-radius: 3px;
        }
        .tape-content-text {
            color: #ffd080 !important;
            text-shadow: 0 0 6px rgba(240, 200, 100, 0.5) !important;
            border-left: 2px solid #ffb040;
            padding-left: 8px;
            margin: 4px 0;
            display: block;
        }
        .input-area {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 3px 6px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(232, 168, 64, 0.35);
            border-radius: 4px;
            margin-bottom: 4px;
        }
        .prompt-symbol {
            color: var(--amber-glow);
            font-size: 16px;
        }
        .cmd-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e0b860;
            font-family: 'VT323', 'Special Elite', 'Press Start 2P', monospace;
            font-size: 18px;
            padding: 5px;
            outline: none;
            caret-color: #ffb040;
            text-shadow: 0 0 3px rgba(200, 150, 70, 0.5);
            letter-spacing: 0.4px;
        }
        .cmd-input::placeholder {
            color: #4a3018;
        }
        .actions-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 3px 0;
            flex-shrink: 0;
            justify-content: center;
        }
        .actions-bar button {
            background: var(--button-bg);
            border: 2px solid #3a2010;
            color: #c08040;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 5px 6px;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 3px 0 #0a0502;
            text-shadow: 0 0 5px rgba(180, 130, 60, 0.4);
            transition: all 0.1s;
            flex: 1 0 auto;
            min-width: 42px;
        }
        .actions-bar button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0a0502;
        }
        .actions-bar button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .monitor-brand {
            text-align: center;
            font-size: 7px;
            color: #2a1a0d;
            letter-spacing: 2px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .power-led {
            width: 8px;
            height: 8px;
            background: #ff9933;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff9933, 0 0 20px rgba(255, 150, 40, 0.5);
            animation: ledPulse 3s infinite;
        }
        @keyframes ledPulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.93);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 60;
            border-radius: 6px;
            flex-direction: column;
            gap: 10px;
        }
        .overlay.hidden {
            display: none !important;
        }
        .overlay-content {
            background: #0a0502;
            border: 2px solid #5a3a18;
            padding: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 82%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(180, 120, 40, 0.25);
            color: #d4a050;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            border-radius: 4px;
        }
        .overlay-content h3 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 13px;
            color: var(--amber);
            text-shadow: var(--text-glow);
        }
        .overlay-close {
            background: var(--button-bg);
            border: 1px solid var(--amber);
            color: var(--amber);
            font-family: 'Press Start 2P';
            font-size: 9px;
            padding: 7px 18px;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 8px;
            align-self: center;
        }
        #watch-overlay .overlay-content {
            max-width: 650px;
            height: 80vh;
        }
        #watch-playback {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }
        #watch-playback .movie-output {
            flex: 1;
            overflow-y: auto;
            background: #050200;
            border: 1px solid #4a2a10;
            padding: 8px;
            font-family: 'VT323', 'Special Elite', monospace;
            font-size: 15px;
            line-height: 1.5;
            color: #f0c870;
            text-shadow: 0 0 3px rgba(220, 170, 80, 0.4);
            margin-bottom: 8px;
            min-height: 0;
            white-space: pre-wrap;
        }
        #watch-playback .movie-controls {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: auto;
        }
        #watch-playback .movie-controls button {
            background: var(--button-bg);
            border: 1px solid #5a3010;
            color: #e0b860;
            font-family: 'Press Start 2P';
            font-size: 8px;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 4px;
        }
        #help-overlay .help-text {
            overflow-y: auto;
            flex: 1;
            font-size: 10px;
            line-height: 1.7;
            white-space: pre-wrap;
            color: #c09050;
        }
        .neon-flicker {
            animation: neonFlicker 4s infinite;
        }
        @keyframes neonFlicker {
            0%,
            95%,
            97%,
            100% {
                opacity: 1;
            }
            96% {
                opacity: 0.4;
            }
        }
        @media (orientation: landscape) {
            .crt-monitor {
                max-width: 800px;
                height: 95vh;
            }
            .game-output {
                font-size: 15px;
            }
            .cmd-input {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="crt-monitor">
        <div class="monitor-frame">
            <div class="screen-area">
                <div class="screen-glow">
                    <div class="scanlines"></div>
                    <div class="vignette"></div>
                    <div class="screen-content">
                        <div class="title-bar">
                            <span class="game-title">█▓▒░ VCR WATCH ░▒▓█</span>
                            <span class="subtitle">The Repairman's Log · 1987</span>
                        </div>
                        <div class="location-tabs" id="locationTabs">
                            <button id="tabCounter" class="active">🛎 COUNTER</button>
                            <button id="tabWorkbench">🔧 WORKBENCH</button>
                            <button id="tabBackroom">☕ BACK ROOM</button>
                        </div>
                        <div class="status-bar" id="statusBar">
                            <span>📅 Day <span id="dayDisplay">1</span></span>
                            <span>📼 <span id="vcrStatus">No VCR</span></span>
                            <span id="customerPresence">🚪 Empty</span>
                        </div>
                        <div class="game-output" id="output"></div>
                        <div class="input-area">
                            <span class="prompt-symbol">&gt;</span>
                            <input type="text" class="cmd-input" id="cmd" placeholder="Type command..." autocomplete="off">
                            <button id="btnSend" style="background:var(--button-bg);border:2px solid #3a2010;color:#c08040;font-family:'Press Start 2P';font-size:10px;padding:5px 10px;cursor:pointer;border-radius:4px;">SEND</button>
                        </div>
                        <div class="actions-bar" id="actionsBar">
                            <button id="btnWait">⏳ WAIT</button>
                            <button id="btnTalk">💬 TALK</button>
                            <button id="btnTake">📦 TAKE VCR</button>
                            <button id="btnOpen">🔓 OPEN</button>
                            <button id="btnWatch">▶ WATCH</button>
                            <button id="btnIgnore">↩ IGNORE</button>
                            <button id="btnRepair">🔧 REPAIR</button>
                            <button id="btnReturn">↩ RETURN</button>
                            <button id="btnRest">🌙 REST</button>
                            <button id="btnCall">📞 CALL</button>
                            <button id="btnReflect">🤔 REFLECT</button>
                            <button id="btnClose">🔒 CLOSE</button>
                            <button id="btnHelp">❓ HELP</button>
                        </div>
                    </div>
                </div>

                <!-- HELP OVERLAY -->
                <div class="overlay hidden" id="help-overlay">
                    <div class="overlay-content">
                        <h3>📖 COMMANDS & CONTROLS</h3>
                        <div class="help-text" id="helpText"></div>
                        <button class="overlay-close" id="closeHelp">CLOSE</button>
                    </div>
                </div>

                <!-- WATCH OVERLAY -->
                <div class="overlay hidden" id="watch-overlay">
                    <div class="overlay-content">
                        <h3>▶ PLAYING TAPE</h3>
                        <div id="watch-playback">
                            <div class="movie-output" id="movieOutput"></div>
                            <div class="movie-controls">
                                <button id="movieContinue">▶ NEXT SCENE</button>
                                <button id="movieStop">⏹ STOP</button>
                            </div>
                        </div>
                        <button class="overlay-close" id="closeWatch">CLOSE</button>
                    </div>
                </div>

                <!-- KEY OVERLAY -->
                <div class="overlay hidden" id="key-overlay">
                    <div class="overlay-content" style="text-align:center;">
                        <h3>ENTER MISTRAL API KEY</h3>
                        <input type="text" id="api-key-input" placeholder="Paste your key here..." autocomplete="off" spellcheck="false" style="width:100%;padding:10px;background:#000;border:1px solid #5a3a18;color:#e0b860;font-family:'Press Start 2P';font-size:11px;margin-bottom:15px;">
                        <button id="save-key-btn" style="background:#1a0a02;border:1px solid #a06020;color:#e0b860;font-family:'Press Start 2P';font-size:13px;padding:10px 24px;cursor:pointer;">SAVE KEY</button>
                        <p style="font-size:0.65em;margin-top:15px;color:#7a5020;">Key stored locally in your browser.</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="monitor-brand"><span class="power-led"></span> RCA · VCR WATCH TERMINAL · 1987</div>
    </div>

    <script>
        // ═══════════════════════════════════════════
        // VCR WATCH – The Repairman's Log 1987
        // ═══════════════════════════════════════════
        let MISTRAL_KEY = '';
        const MODEL = 'mistral-small-latest';
        const API_URL = 'https://api.mistral.ai/v1/chat/completions';

        // ── DOM elements ──
        const outputEl = document.getElementById('output');
        const cmdInput = document.getElementById('cmd');
        const btnSend = document.getElementById('btnSend');
        const dayDisplay = document.getElementById('dayDisplay');
        const vcrStatus = document.getElementById('vcrStatus');
        const customerPresence = document.getElementById('customerPresence');
        const actionsBar = document.getElementById('actionsBar');
        const keyOverlay = document.getElementById('key-overlay');
        const helpOverlay = document.getElementById('help-overlay');
        const watchOverlay = document.getElementById('watch-overlay');
        const movieOutput = document.getElementById('movieOutput');
        const watchPlayback = document.getElementById('watch-playback');
        const tabCounter = document.getElementById('tabCounter');
        const tabWorkbench = document.getElementById('tabWorkbench');
        const tabBackroom = document.getElementById('tabBackroom');

        // ── Sound System ──
        let audioCtx = null;
        let soundEnabled = true;

        function initAudio() {
            if (!audioCtx) { audioCtx = new(window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        }

        function ensureAudio() { initAudio(); return audioCtx && audioCtx.state !== 'suspended'; }

        function playTick() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = 400 + Math.random() * 400;
                gain.gain.setValueAtTime(0.01, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.015);
                osc.start(t);
                osc.stop(t + 0.015);
            } catch (e) {}
        }

        function playClick() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(500, t);
                osc.frequency.exponentialRampToValueAtTime(180, t + 0.04);
                gain.gain.setValueAtTime(0.05, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.04);
                osc.start(t);
                osc.stop(t + 0.04);
            } catch (e) {}
        }

        function playSuccess() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                [440, 554, 660].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    const st = t + i * 0.07;
                    gain.gain.setValueAtTime(0.06, st);
                    gain.gain.exponentialRampToValueAtTime(0.0001, st + 0.1);
                    osc.start(st);
                    osc.stop(st + 0.1);
                });
            } catch (e) {}
        }

        function playError() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.value = 70;
                gain.gain.setValueAtTime(0.04, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
                osc.start(t);
                osc.stop(t + 0.18);
            } catch (e) {}
        }

        function playVCR() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                for (let i = 0; i < 8; i++) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.value = 150 + Math.random() * 600;
                    const st = t + i * 0.04;
                    gain.gain.setValueAtTime(0.025, st);
                    gain.gain.exponentialRampToValueAtTime(0.0001, st + 0.03);
                    osc.start(st);
                    osc.stop(st + 0.03);
                }
            } catch (e) {}
        }

        function playCreepy() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(330, t);
                osc.frequency.exponentialRampToValueAtTime(165, t + 0.6);
                gain.gain.setValueAtTime(0.05, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.65);
                osc.start(t);
                osc.stop(t + 0.65);
            } catch (e) {}
        }

        function playOpen() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(180, t);
                osc.frequency.exponentialRampToValueAtTime(600, t + 0.2);
                gain.gain.setValueAtTime(0.04, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
                osc.start(t);
                osc.stop(t + 0.25);
            } catch (e) {}
        }

        function playClose() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, t);
                osc.frequency.exponentialRampToValueAtTime(100, t + 0.18);
                gain.gain.setValueAtTime(0.05, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
                osc.start(t);
                osc.stop(t + 0.2);
            } catch (e) {}
        }

        function playStaticBurst() {
            if (!soundEnabled || !ensureAudio()) return;
            try {
                const t = audioCtx.currentTime;
                for (let i = 0; i < 15; i++) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'square';
                    osc.frequency.value = 150 + Math.random() * 2500;
                    const st = t + i * 0.02;
                    gain.gain.setValueAtTime(0.02, st);
                    gain.gain.exponentialRampToValueAtTime(0.0001, st + 0.018);
                    osc.start(st);
                    osc.stop(st + 0.018);
                }
            } catch (e) {}
        }

        // ═══════════════════════════════════════════
        // GAME STATE
        // ═══════════════════════════════════════════
        let gameState = {
            currentLocation: 'counter',
            currentDay: 1,
            customers: [], // all known customers
            currentCustomer: null, // customer at counter now
            currentVCR: null, // VCR on workbench {customer, hasTape, tapeContent, watched, repaired}
            shopOpen: true,
            conversationActive: false,
            activeMovie: null,
        };

        // Load saved state
        function loadState() {
            const saved = localStorage.getItem('vcrwatch_state');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    gameState.currentDay = parsed.currentDay || 1;
                    gameState.customers = parsed.customers || [];
                    gameState.currentLocation = 'counter';
                    gameState.currentCustomer = null;
                    gameState.currentVCR = null;
                    gameState.shopOpen = true;
                    gameState.conversationActive = false;
                    gameState.activeMovie = null;
                } catch (e) { /* use defaults */ }
            }
        }

        function saveState() {
            const toSave = {
                currentDay: gameState.currentDay,
                customers: gameState.customers,
            };
            localStorage.setItem('vcrwatch_state', JSON.stringify(toSave));
        }

        function updateStatusBar() {
            dayDisplay.textContent = gameState.currentDay;
            if (gameState.currentVCR) {
                vcrStatus.textContent = 'VCR on bench';
                vcrStatus.style.color = '#ffb040';
            } else {
                vcrStatus.textContent = 'No VCR';
                vcrStatus.style.color = '#8a6530';
            }
            if (gameState.currentCustomer) {
                customerPresence.textContent = '👤 ' + gameState.currentCustomer.name;
                customerPresence.style.color = '#f0c060';
            } else {
                customerPresence.textContent = '🚪 Empty';
                customerPresence.style.color = '#8a6530';
            }
            updateActionButtons();
            updateLocationTabs();
        }

        function updateLocationTabs() {
            tabCounter.classList.toggle('active', gameState.currentLocation === 'counter');
            tabWorkbench.classList.toggle('active', gameState.currentLocation === 'workbench');
            tabBackroom.classList.toggle('active', gameState.currentLocation === 'backroom');
        }

        function updateActionButtons() {
            const loc = gameState.currentLocation;
            const hasCustomer = !!gameState.currentCustomer;
            const hasVCR = !!gameState.currentVCR;
            const hasTape = hasVCR && gameState.currentVCR.hasTape;
            const tapeWatched = hasVCR && gameState.currentVCR.watched;
            const vcrRepaired = hasVCR && gameState.currentVCR.repaired;
            const convActive = gameState.conversationActive;

            // Show/hide buttons based on context
            document.getElementById('btnWait').style.display = (loc === 'counter' && !hasCustomer && gameState
                .shopOpen) ? '' : 'none';
            document.getElementById('btnTalk').style.display = (loc === 'counter' && hasCustomer && !convActive) ? '' :
                'none';
            document.getElementById('btnTake').style.display = (loc === 'counter' && hasCustomer && !hasVCR) ? '' :
                'none';
            document.getElementById('btnOpen').style.display = (loc === 'workbench' && hasVCR && !hasTape && !vcrRepaired) ?
                '' : 'none';
            document.getElementById('btnWatch').style.display = (loc === 'workbench' && hasVCR && hasTape && !tapeWatched) ?
                '' : 'none';
            document.getElementById('btnIgnore').style.display = (loc === 'workbench' && hasVCR && hasTape && !tapeWatched) ?
                '' : 'none';
            document.getElementById('btnRepair').style.display = (loc === 'workbench' && hasVCR && !vcrRepaired && (!
                hasTape || tapeWatched || gameState.currentVCR?.ignored)) ? '' : 'none';
            document.getElementById('btnReturn').style.display = (loc === 'workbench' && hasVCR && vcrRepaired) ? '' :
                'none';
            document.getElementById('btnRest').style.display = (loc === 'backroom') ? '' : 'none';
            document.getElementById('btnCall').style.display = (loc === 'backroom') ? '' : 'none';
            document.getElementById('btnReflect').style.display = (loc === 'backroom') ? '' : 'none';
            document.getElementById('btnClose').style.display = (loc === 'counter' && gameState.shopOpen && !hasCustomer) ?
                '' : 'none';
        }

        // ── Output functions ──
        function printInstant(text) {
            outputEl.innerHTML += text + '\n';
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        async function print(text, delay = 12) {
            return new Promise(resolve => {
                let i = 0;

                function type() {
                    if (i < text.length) {
                        outputEl.innerHTML += text.charAt(i);
                        outputEl.scrollTop = outputEl.scrollHeight;
                        if (!gameState.activeMovie) playTick();
                        i++;
                        setTimeout(type, delay);
                    } else {
                        outputEl.innerHTML += '\n';
                        outputEl.scrollTop = outputEl.scrollHeight;
                        resolve();
                    }
                }
                type();
            });
        }

        // ── API calls ──
        async function callMistralJSON(sys, usr) {
            if (!MISTRAL_KEY) { printInstant('*** NO API KEY. Type SETKEY.');
                playError(); return null; }
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_KEY}` },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [{ role: 'system', content: sys }, { role: 'user', content: usr }],
                        temperature: 0.9,
                        response_format: { type: 'json_object' }
                    })
                });
                if (!res.ok) { printInstant(`*** API ERROR ${res.status}`);
                    playError(); return null; }
                const data = await res.json();
                if (!data.choices?.[0]?.message?.content) return null;
                try { return JSON.parse(data.choices[0].message.content); } catch (e) {
                    printInstant('*** JSON parse error');
                    playError();
                    return null;
                }
            } catch (err) { printInstant(`*** NETWORK ERROR: ${err.message}`);
                playError(); return null; }
        }

        async function callMistralText(sys, usr) {
            if (!MISTRAL_KEY) { printInstant('*** NO API KEY.');
                playError(); return null; }
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${MISTRAL_KEY}` },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [{ role: 'system', content: sys }, { role: 'user', content: usr }],
                        temperature: 0.9
                    })
                });
                if (!res.ok) { printInstant(`*** API ERROR ${res.status}`);
                    playError(); return null; }
                const data = await res.json();
                return data.choices?.[0]?.message?.content || null;
            } catch (err) { printInstant(`*** NETWORK ERROR: ${err.message}`);
                playError(); return null; }
        }

        // ── System Prompts ──
        const SYSTEM_CUSTOMER_GEN = `You are the narrator of "VCR WATCH – The Repairman's Log", a 1987 psychological simulator.
You generate customers for a VCR repair shop. Each customer is a fully realized person from 1987 with a camcorder.
Return ONLY valid JSON with these fields:
- name: full name
- appearance: brief physical description
- occupation: their job
- reason_for_repair: why their VCR is broken (e.g. "eats tapes", "won't play colour", "tracking issues", "tape stuck inside")
- personality: 2-3 word description (e.g. "nervous, soft-spoken", "friendly, talkative", "brusque, secretive")
- home_situation: brief description of their living situation
- secret: something hidden in their home life that might appear on a tape (affair, hidden illness, estranged child, strange hobby, quiet desperation, a kindness nobody sees, a mistake they regret)
- trust: number 30-70
- greeting: what they say when dropping off the VCR (1-2 sentences, natural speech)`;

        const SYSTEM_TAPE_CONTENT = `You are generating the contents of a forgotten VHS tape left inside a VCR brought to a repair shop in 1987.
The tape contains uncut, private home video footage shot by or featuring the customer.
Generate a series of 3-5 short "scenes" in JSON array format. Each scene is a brief, stark, documentary-style description of what appears on the tape.
Style: Fragmented, observational. No music. No commentary. Just the footage as it would appear on screen.
The scenes should gradually hint at or reveal the customer's secret. Some scenes are mundane, some are revealing.
Never include anything supernatural. The horror is entirely human.
Return JSON: {"scenes": ["scene1 description...", "scene2 description...", ...]}`;

        const SYSTEM_CONVERSATION = `You are a customer at a VCR repair shop in 1987. You are talking to the repairman.
Respond in character. Keep responses brief (1-3 sentences). Sound like a real person from 1987.
You don't know the repairman has watched your tapes (unless he reveals it).
If the repairman hints at knowing something private, react with appropriate emotion: confusion, anger, fear, relief, or quiet acknowledgment.
Never mention anything supernatural. Stay grounded and human.`;

        const SYSTEM_REFLECTION = `You are the inner monologue of a solitary VCR repairman in 1987. You've been watching the private home videos left in customers' VCRs. You feel voyeuristic, sometimes tender, sometimes ashamed. Respond in first-person, brief (2-4 sentences), melancholic and introspective. Never supernatural.`;

        // ═══════════════════════════════════════════
        // GAME ACTIONS
        // ═══════════════════════════════════════════

        async function actionWait() {
            if (gameState.currentLocation !== 'counter') return;
            if (gameState.currentCustomer) { printInstant('A customer is already here.');
                playError(); return; }
            if (!gameState.shopOpen) { printInstant('The shop is closed for the day.');
                playError(); return; }

            await print('You wait behind the counter, the hum of the neon sign filling the silence...');
            playOpen();

            // Generate a customer via AI
            const existingNames = gameState.customers.map(c => c.name);
            const existingInfo = existingNames.length > 0 ? `Existing customers: ${existingNames.join(', ')}. ` : '';
            const prompt =
                `${existingInfo}Generate a ${Math.random() < 0.5 ? 'NEW' : 'RETURNING'} customer bringing in their VCR for repair. If returning, pick from existing customers and update their reason_for_repair. Return JSON.`;

            const data = await callMistralJSON(SYSTEM_CUSTOMER_GEN, prompt);
            if (!data || !data.name) {
                await print('Nobody came in. The street is quiet.');
                return;
            }

            // Check if this is a returning customer
            let customer = gameState.customers.find(c => c.name.toLowerCase() === data.name.toLowerCase());
            if (customer) {
                // Update returning customer
                customer.reason_for_repair = data.reason_for_repair || customer.reason_for_repair;
                customer.greeting = data.greeting || 'Hi again.';
                customer.last_visit_day = gameState.currentDay;
                customer.trust = customer.trust || 50;
            } else {
                // New customer
                customer = {
                    name: data.name,
                    appearance: data.appearance || '',
                    occupation: data.occupation || '',
                    reason_for_repair: data.reason_for_repair || 'won\'t play',
                    personality: data.personality || 'quiet',
                    home_situation: data.home_situation || '',
                    secret: data.secret || '',
                    trust: data.trust || 50,
                    greeting: data.greeting || 'Can you fix this?',
                    last_visit_day: gameState.currentDay,
                    tapes_watched: [],
                };
                gameState.customers.push(customer);
            }

            gameState.currentCustomer = customer;
            saveState();
            updateStatusBar();

            await print(`\n🔔 The bell above the door jingles.`);
            await print(`   ${customer.name} walks in. ${customer.appearance || ''}`);
            await print(`   "${customer.greeting}"`);
            await print(`\n   They place a VCR on the counter. "${customer.reason_for_repair}," they explain.`);
            if (customer.last_visit_day && customer.last_visit_day < gameState.currentDay) {
                await print(`   (Returning customer. Last seen: Day ${customer.last_visit_day}. Trust: ${customer.trust})`);
            }
            playSuccess();
        }

        async function actionTalk() {
            if (!gameState.currentCustomer) { printInstant('No customer to talk to.');
                playError(); return; }
            if (gameState.conversationActive) { printInstant('Already in conversation. Type your dialogue.');
                playError(); return; }

            gameState.conversationActive = true;
            updateActionButtons();
            const c = gameState.currentCustomer;
            await print(`\n💬 Talking to ${c.name}...`);
            await print(`   (Type your dialogue and press Enter. Type /end to finish.)`);
            await print(`   "${c.greeting || 'Can you help me?'}"`);
            playClick();
        }

        async function handleDialogue(playerText) {
            if (!gameState.conversationActive || !gameState.currentCustomer) return;
            const c = gameState.currentCustomer;

            // Check if player reveals tape knowledge
            let knowledgeContext = '';
            if (c.tapes_watched && c.tapes_watched.length > 0) {
                knowledgeContext =
                    `\n[The repairman secretly watched this customer's home videos. He knows: ${c.tapes_watched.join('; ')}. The customer's secret is: ${c.secret}. If the repairman's dialogue hints at this private knowledge, react accordingly.]`;
            }

            const prompt =
                `Customer: ${c.name} (${c.personality}). Occupation: ${c.occupation}. Home: ${c.home_situation}. Secret: ${c.secret}. Trust level: ${c.trust}/100.${knowledgeContext}\n\nThe repairman says: "${playerText}"\n\nRespond in character. Keep it brief.`;

            const response = await callMistralText(SYSTEM_CONVERSATION, prompt);
            if (response) {
                await print(`   ${c.name}: "${response.trim()}"`);
                // Adjust trust based on interaction
                if (playerText.toLowerCase().includes('tape') || playerText.toLowerCase().includes('watch') ||
                    playerText.toLowerCase().includes('video') || playerText.toLowerCase().includes('record')) {
                    if (c.trust < 40) {
                        c.trust -= 5;
                        await print(`   [Trust slightly decreased - they seem wary.]`);
                    }
                }
                // If player is kind, increase trust
                if (playerText.toLowerCase().includes('sorry') || playerText.toLowerCase().includes('understand') ||
                    playerText.toLowerCase().includes('help')) {
                    c.trust = Math.min(100, c.trust + 3);
                }
                saveState();
            } else {
                await print(`   ${c.name} nods quietly.`);
            }
            playClick();
        }

        function actionEndConversation() {
            if (!gameState.conversationActive) return;
            gameState.conversationActive = false;
            updateActionButtons();
            printInstant('Conversation ended.');
            playClose();
        }

        async function actionTake() {
            if (gameState.currentLocation !== 'counter' || !gameState.currentCustomer) {
                printInstant('No customer at the counter.');
                playError();
                return;
            }
            if (gameState.currentVCR) { printInstant('Already have a VCR on the workbench.');
                playError(); return; }

            const c = gameState.currentCustomer;
            gameState.currentVCR = {
                customer: c,
                hasTape: null,
                tapeContent: null,
                watched: false,
                ignored: false,
                repaired: false,
            };
            await print(`You carry ${c.name}'s VCR to the workbench. It's a hefty unit - a mid-80s model.`);
            await print('The shop is quiet except for the buzz of the overhead fluorescent.');
            playVCR();
            printInstant('(Go to WORKBENCH to examine it.)');
            updateStatusBar();
            saveState();
        }

        async function actionOpen() {
            if (gameState.currentLocation !== 'workbench' || !gameState.currentVCR) {
                printInstant('No VCR on the workbench.');
                playError();
                return;
            }
            if (gameState.currentVCR.repaired) { printInstant('Already repaired.');
                playError(); return; }
            if (gameState.currentVCR.hasTape !== null) { printInstant('Already opened.');
                playError(); return; }

            await print('You unscrew the VCR casing. The smell of warm electronics and dust fills your nostrils...');
            playVCR();
            await new Promise(r => setTimeout(r, 600));

            // 70% chance of finding a tape
            const hasTape = Math.random() < 0.7;
            gameState.currentVCR.hasTape = hasTape;

            if (hasTape) {
                await print('📼 There\'s a tape inside. The label is handwritten, faded.');
                await print('   Store policy says rewind and return. Unwatched.');
                await print('   But your finger hovers over the PLAY button...');
                playCreepy();
            } else {
                await print('No tape inside. Just a mechanical issue. You feel a strange mix of relief and disappointment.');
                gameState.currentVCR.ignored = true;
                gameState.currentVCR.watched = true; // nothing to watch
                playClick();
            }
            updateStatusBar();
            saveState();
        }

        async function actionWatch() {
            if (gameState.currentLocation !== 'workbench' || !gameState.currentVCR) {
                printInstant('No VCR on the workbench.');
                playError();
                return;
            }
            if (!gameState.currentVCR.hasTape) { printInstant('No tape in this VCR.');
                playError(); return; }
            if (gameState.currentVCR.watched) { printInstant('You\'ve already watched this tape.');
                playError(); return; }

            // Open watch overlay
            watchPlayback.style.display = 'flex';
            movieOutput.innerHTML = '▶ Loading tape...\n';
            showOverlay(watchOverlay);
            playStaticBurst();
            gameState.activeMovie = { customer: gameState.currentVCR.customer, scenes: [], sceneIndex: 0 };

            const c = gameState.currentVCR.customer;
            const prompt =
                `Customer: ${c.name}. Occupation: ${c.occupation}. Home: ${c.home_situation}. Secret: ${c.secret}. Personality: ${c.personality}.\n\nGenerate the tape content.`;

            const data = await callMistralJSON(SYSTEM_TAPE_CONTENT, prompt);
            if (data && data.scenes && data.scenes.length > 0) {
                gameState.activeMovie.scenes = data.scenes;
                gameState.activeMovie.sceneIndex = 0;
                movieOutput.innerHTML = '';
                movieOutput.innerHTML +=
                    `╔══════════════════════════╗\n║   TAPE PLAYING – ${c.name.toUpperCase().substring(0, 15)} ║\n╚══════════════════════════╝\n\n`;
                movieOutput.innerHTML += `[SCENE 1]\n${data.scenes[0]}\n`;
                gameState.activeMovie.sceneIndex = 1;
                playCreepy();
            } else {
                movieOutput.innerHTML = 'The tape is blank. Just static. Somehow that\'s worse.\n';
                gameState.activeMovie = null;
                playStaticBurst();
            }
            movieOutput.scrollTop = 0;
        }

        async function actionMovieContinue() {
            if (!gameState.activeMovie || !gameState.activeMovie.scenes.length) return;
            const am = gameState.activeMovie;
            if (am.sceneIndex >= am.scenes.length) {
                movieOutput.innerHTML += '\n[STATIC]\nThe tape has ended. The screen fills with snow.\n';
                gameState.activeMovie = null;
                if (gameState.currentVCR) {
                    gameState.currentVCR.watched = true;
                    gameState.currentVCR.tapeContent = am.scenes;
                    gameState.currentVCR.customer.tapes_watched = gameState.currentVCR.customer.tapes_watched || [];
                    gameState.currentVCR.customer.tapes_watched.push(am.scenes.join(' | '));
                    saveState();
                }
                updateStatusBar();
                playStaticBurst();
                return;
            }
            movieOutput.innerHTML += `\n[SCENE ${am.sceneIndex + 1}]\n${am.scenes[am.sceneIndex]}\n`;
            am.sceneIndex++;
            movieOutput.scrollTop = movieOutput.scrollHeight;
            playClick();
        }

        function actionMovieStop() {
            if (gameState.activeMovie) {
                if (gameState.currentVCR) {
                    gameState.currentVCR.watched = true;
                    gameState.currentVCR.tapeContent = gameState.activeMovie.scenes;
                    gameState.currentVCR.customer.tapes_watched = gameState.currentVCR.customer.tapes_watched || [];
                    gameState.currentVCR.customer.tapes_watched.push(gameState.activeMovie.scenes.join(' | '));
                    saveState();
                }
                gameState.activeMovie = null;
                movieOutput.innerHTML += '\n⏹ Stopped.';
                updateStatusBar();
                playClose();
            }
            hideOverlay(watchOverlay);
            watchPlayback.style.display = 'none';
        }

        async function actionIgnore() {
            if (!gameState.currentVCR || !gameState.currentVCR.hasTape || gameState.currentVCR.watched) {
                printInstant('Nothing to ignore.');
                playError();
                return;
            }
            gameState.currentVCR.ignored = true;
            gameState.currentVCR.watched = true;
            await print('You rewind the tape without looking. Store policy. Professional ethics.');
            await print('The tape clicks back into its cassette. You close the VCR.');
            await print('(A small part of you wonders what was on it.)');
            playClick();
            updateStatusBar();
            saveState();
        }

        async function actionRepair() {
            if (!gameState.currentVCR || gameState.currentVCR.repaired) {
                printInstant('Nothing to repair.');
                playError();
                return;
            }
            if (gameState.currentVCR.hasTape && !gameState.currentVCR.watched && !gameState.currentVCR.ignored) {
                printInstant('There\'s an unexamined tape in this VCR. WATCH or IGNORE it first.');
                playError();
                return;
            }
            await print('You work on the VCR. Soldering iron. Multimeter. The familiar rhythm of repair.');
            await print('After some time, the mechanism runs smoothly again.');
            gameState.currentVCR.repaired = true;
            playSuccess();
            updateStatusBar();
            saveState();
        }

        async function actionReturn() {
            if (!gameState.currentVCR || !gameState.currentVCR.repaired) {
                printInstant('The VCR isn\'t repaired yet.');
                playError();
                return;
            }
            if (gameState.currentLocation !== 'workbench') {
                // Allow returning from backroom too
                if (gameState.currentLocation !== 'backroom') { printInstant('Go to the workbench first.');
                    playError(); return; }
            }

            const c = gameState.currentVCR.customer;
            gameState.currentLocation = 'counter';
            await print(`You carry the repaired VCR back to the counter.`);
            await print(`${c.name} is waiting.`);

            if (gameState.currentVCR.watched && !gameState.currentVCR.ignored && gameState.currentVCR.tapeContent) {
                await print(
                    `\n   You know something now. About ${c.name}. You've seen their ${c.secret ? c.secret.substring(0, 40) + '...' : 'private moments'}.`);
                await print('   The knowledge sits heavy in your chest.');
                await print('   You can mention it... or stay silent.');
                gameState.currentCustomer = c;
                gameState.conversationActive = true;
                await print(`\n   (Type what you say to ${c.name}. Type /end to stay silent.)`);
                playCreepy();
            } else {
                await print(`   "Thanks," ${c.name} says. They pay and leave.`);
                await print('   Another VCR fixed. Another tape unseen.');
                gameState.currentCustomer = null;
                playClick();
            }

            gameState.currentVCR = null;
            updateStatusBar();
            saveState();
        }

        async function actionRest() {
            if (gameState.currentLocation !== 'backroom') return;
            await print('You lie on the cot. The neon from outside paints thin blue lines through the blinds.');
            await print('The shop is quiet. Just the hum of the refrigerator.');
            await print('Tomorrow is another day.');
            gameState.currentDay++;
            gameState.shopOpen = true;
            gameState.currentCustomer = null;
            gameState.currentVCR = null;
            gameState.currentLocation = 'counter';
            gameState.conversationActive = false;
            gameState.activeMovie = null;
            saveState();
            updateStatusBar();
            await print(`\n☀️ Day ${gameState.currentDay} begins. You open the shop.`);
            playSuccess();
        }

        async function actionCall() {
            if (gameState.currentLocation !== 'backroom') return;
            if (gameState.customers.length === 0) { printInstant('You don\'t have any customers to call.');
                playError(); return; }

            const c = gameState.customers[Math.floor(Math.random() * gameState.customers.length)];
            await print(`You pick up the phone and dial ${c.name}'s number...`);
            await print(`   "Hello?"`);
            gameState.currentCustomer = c;
            gameState.conversationActive = true;
            gameState.currentLocation = 'counter'; // mentally at the counter
            await print(`   (Type your dialogue. Type /end to hang up.)`);
            playClick();
            updateStatusBar();
        }

        async function actionReflect() {
            if (gameState.currentLocation !== 'backroom') return;
            const watchedCount = gameState.customers.filter(c => c.tapes_watched && c.tapes_watched.length > 0).length;
            const prompt =
                `Day ${gameState.currentDay}. You've watched tapes from ${watchedCount} customers. Reflect on what you've seen and how it makes you feel.`;
            const reflection = await callMistralText(SYSTEM_REFLECTION, prompt);
            if (reflection) {
                await print(`\n🤔 ${reflection.trim()}`);
            } else {
                await print('\nYou stare at the ceiling. The weight of knowing too much settles into the quiet.');
            }
            playCreepy();
        }

        async function actionCloseShop() {
            if (gameState.currentLocation !== 'counter') { printInstant('Go to the counter first.');
                playError(); return; }
            if (gameState.currentCustomer) { printInstant('A customer is still here.');
                playError(); return; }
            gameState.shopOpen = false;
            await print('You flip the sign to CLOSED. The neon buzzes outside.');
            await print('Another day in the shop. The tapes you\'ve watched linger in your mind.');
            await print('(Go to the BACK ROOM to rest and advance to the next day.)');
            playClose();
            updateStatusBar();
        }

        function actionGoTo(location) {
            if (gameState.conversationActive) {
                printInstant('Finish the conversation first. Type /end.');
                playError();
                return;
            }
            if (gameState.activeMovie) {
                printInstant('Stop the tape first.');
                playError();
                return;
            }
            if (location === 'workbench' && !gameState.currentVCR && gameState.currentLocation === 'counter' &&
                gameState.currentCustomer) {
                printInstant('TAKE the VCR to the workbench first.');
                playError();
                return;
            }
            gameState.currentLocation = location;
            updateStatusBar();
            const locNames = { counter: 'the front counter', workbench: 'the repair workbench', backroom: 'the back room' };
            printInstant(`You move to ${locNames[location]}.`);
            playClick();
        }

        // ── Overlay functions ──
        function showOverlay(overlay) {
            overlay.classList.remove('hidden');
            overlay.style.display = 'flex';
            cmdInput.disabled = true;
            playOpen();
        }

        function hideOverlay(overlay) {
            overlay.classList.add('hidden');
            overlay.style.display = '';
            cmdInput.disabled = false;
            cmdInput.focus();
            playClose();
        }

        function openHelp() {
            const helpText = ` COMMANDS & CONTROLS:
  WAIT      - Wait for a customer (at counter)
  TALK      - Talk to the customer
  TAKE      - Take VCR to workbench
  OPEN      - Open VCR, check for tape
  WATCH     - Watch the tape inside
  IGNORE    - Rewind without watching
  REPAIR    - Fix the VCR
  RETURN    - Return repaired VCR to customer
  REST      - Sleep, advance to next day
  CALL      - Phone a past customer
  REFLECT   - Think about what you've seen
  CLOSE     - Close shop for the day
  GO [loc]  - Move: counter/workbench/backroom
  SETKEY    - Change API key
  MUTE      - Toggle sound
  CLEAR     - Clear screen
  HELP      - This list
  /end      - End conversation

 Use the tabs or type GO to move between rooms.
 The story evolves over multiple days.`;
            document.getElementById('helpText').textContent = helpText;
            showOverlay(helpOverlay);
        }

        // ── Main command handler ──
        async function handleCommand(raw) {
            if (!raw) return;
            const upper = raw.toUpperCase().trim();
            const lower = raw.toLowerCase().trim();

            if (gameState.activeMovie) {
                if (upper === 'MUTE') { soundEnabled = false;
                    printInstant('Muted.'); return; }
                if (upper === 'UNMUTE') { soundEnabled = true;
                    printInstant('Unmuted.');
                    playClick(); return; }
                if (upper === 'HELP') { openHelp(); return; }
                if (upper === 'STOP') { actionMovieStop(); return; }
                if (upper === 'CONTINUE' || upper === 'NEXT') { actionMovieContinue(); return; }
                printInstant('Tape is playing. Use CONTINUE or STOP.');
                return;
            }

            if (gameState.conversationActive) {
                if (lower === '/end') { actionEndConversation(); return; }
                await handleDialogue(raw);
                return;
            }

            printInstant(`> ${raw}`);
            playClick();

            if (upper === 'WAIT') await actionWait();
            else if (upper === 'TALK') await actionTalk();
            else if (upper === 'TAKE') await actionTake();
            else if (upper === 'OPEN') await actionOpen();
            else if (upper === 'WATCH') await actionWatch();
            else if (upper === 'IGNORE') await actionIgnore();
            else if (upper === 'REPAIR') await actionRepair();
            else if (upper === 'RETURN') await actionReturn();
            else if (upper === 'REST') await actionRest();
            else if (upper === 'CALL') await actionCall();
            else if (upper === 'REFLECT') await actionReflect();
            else if (upper === 'CLOSE') await actionCloseShop();
            else if (upper === 'HELP') openHelp();
            else if (upper === 'MUTE') { soundEnabled = false;
                printInstant('Muted.'); } else if (upper === 'UNMUTE') { soundEnabled = true;
                printInstant('Unmuted.');
                playClick(); } else if (upper === 'CLEAR') { outputEl.innerHTML = '';
                playStaticBurst(); } else if (upper === 'SETKEY') {
                MISTRAL_KEY = '';
                localStorage.removeItem('vcrwatch_api_key');
                keyOverlay.classList.remove('hidden');
                keyOverlay.style.display = 'flex';
                playOpen();
            } else if (upper.startsWith('GO ')) {
                const loc = lower.slice(3).trim();
                if (['counter', 'workbench', 'backroom', 'back room'].includes(loc)) {
                    actionGoTo(loc === 'back room' ? 'backroom' : loc);
                } else { printInstant('Go where? counter / workbench / backroom');
                    playError(); }
            } else {
                printInstant('Unknown command. Type HELP.');
                playError();
            }
        }

        // ── Event listeners ──
        cmdInput.addEventListener('keydown', async e => {
            if (e.key === 'Enter') {
                initAudio();
                const raw = cmdInput.value.trim();
                cmdInput.value = '';
                await handleCommand(raw);
            }
        });
        btnSend.addEventListener('click', async () => {
            initAudio();
            playClick();
            const raw = cmdInput.value.trim();
            cmdInput.value = '';
            await handleCommand(raw);
        });

        // Location tabs
        tabCounter.addEventListener('click', () => { initAudio();
            actionGoTo('counter'); });
        tabWorkbench.addEventListener('click', () => { initAudio();
            actionGoTo('workbench'); });
        tabBackroom.addEventListener('click', () => { initAudio();
            actionGoTo('backroom'); });

        // Action buttons
        document.getElementById('btnWait').addEventListener('click', () => { initAudio();
            handleCommand('WAIT'); });
        document.getElementById('btnTalk').addEventListener('click', () => { initAudio();
            handleCommand('TALK'); });
        document.getElementById('btnTake').addEventListener('click', () => { initAudio();
            handleCommand('TAKE'); });
        document.getElementById('btnOpen').addEventListener('click', () => { initAudio();
            handleCommand('OPEN'); });
        document.getElementById('btnWatch').addEventListener('click', () => { initAudio();
            handleCommand('WATCH'); });
        document.getElementById('btnIgnore').addEventListener('click', () => { initAudio();
            handleCommand('IGNORE'); });
        document.getElementById('btnRepair').addEventListener('click', () => { initAudio();
            handleCommand('REPAIR'); });
        document.getElementById('btnReturn').addEventListener('click', () => { initAudio();
            handleCommand('RETURN'); });
        document.getElementById('btnRest').addEventListener('click', () => { initAudio();
            handleCommand('REST'); });
        document.getElementById('btnCall').addEventListener('click', () => { initAudio();
            handleCommand('CALL'); });
        document.getElementById('btnReflect').addEventListener('click', () => { initAudio();
            handleCommand('REFLECT'); });
        document.getElementById('btnClose').addEventListener('click', () => { initAudio();
            handleCommand('CLOSE'); });
        document.getElementById('btnHelp').addEventListener('click', () => { initAudio();
            openHelp(); });

        // Overlay close buttons
        document.getElementById('closeHelp').addEventListener('click', () => hideOverlay(helpOverlay));
        document.getElementById('closeWatch').addEventListener('click', () => { actionMovieStop(); });
        document.getElementById('movieContinue').addEventListener('click', () => { initAudio();
            actionMovieContinue(); });
        document.getElementById('movieStop').addEventListener('click', () => { initAudio();
            actionMovieStop(); });

        // API key handling
        let savedKey = localStorage.getItem('vcrwatch_api_key');
        if (!savedKey) {
            keyOverlay.classList.remove('hidden');
            keyOverlay.style.display = 'flex';
        } else {
            MISTRAL_KEY = savedKey;
        }
        document.getElementById('save-key-btn').addEventListener('click', () => {
            initAudio();
            playClick();
            const key = document.getElementById('api-key-input').value.trim();
            if (key) {
                MISTRAL_KEY = key;
                localStorage.setItem('vcrwatch_api_key', key);
                keyOverlay.classList.add('hidden');
                keyOverlay.style.display = '';
                playSuccess();
                if (!window._booted) { window._booted = true;
                    boot(); }
            }
        });

        // ESC to close overlays
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (!helpOverlay.classList.contains('hidden')) hideOverlay(helpOverlay);
                if (!watchOverlay.classList.contains('hidden') && !gameState.activeMovie) hideOverlay(
                watchOverlay);
                if (gameState.conversationActive) actionEndConversation();
            }
        });

        // ── Boot ──
        async function boot() {
            loadState();
            updateStatusBar();
            await print('╔══════════════════════════════════╗');
            await print('║     VCR WATCH                    ║');
            await print('║     The Repairman\'s Log · 1987   ║');
            await print('╚══════════════════════════════════╝');
            await print('');
            await print('The shop is quiet. Fluorescent hum. The faint smell of solder.');
            await print('Neon light seeps through dusty venetian blinds.');
            await print('A VCR sits on the counter from yesterday\'s job.');
            await print('');
            await print('You are the repairman. Customers trust you with their machines.');
            await print('They forget the tapes inside. You\'re supposed to rewind and return.');
            await print('But after the first one... you couldn\'t stop.');
            await print('');
            await print('☀️ Day 1. The shop is open.');
            await print('Type WAIT for a customer, or explore. Type HELP for commands.');
            await print('');
            playCreepy();
            updateActionButtons();
            cmdInput.focus();
        }

        if (MISTRAL_KEY) { window._booted = true;
            boot(); }
        updateStatusBar();
        updateActionButtons();
    </script>
</body>
</html>
