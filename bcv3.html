<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NEON HUNTER • Nightfall Games 1984</title>
    
            <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            overflow: auto;
        }

        /* ----- PERFECT RESPONSIVE CONTAINER (no aspect-ratio issues) ----- */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 840px;
            padding-bottom: 100%;
            height: 0;
            background-image: url('bcbk1.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            border: none;
            outline: none;
            box-shadow: none;
            overflow: hidden;
            margin: 0 auto;
        }

        /* All absolute positioned elements now sit inside the responsive container */
        #gameplay-window {
            position: absolute;
            top: 25.8462%;
            left: 25.78125%;
            width: 46.875%;
            height: 46.1538%;
            background: 
                #001100
                repeating-linear-gradient(
                    to bottom,
                    transparent 0px,
                    transparent 3px,
                    rgba(0, 255, 0, 0.08) 3px,
                    rgba(0, 255, 0, 0.08) 6px
                );
            background-size: 100% 6px;          /* ensures perfect 6px repeat over entire scrollable content */
            color: #00ccff;
            font-family: 'VT323', monospace;
            font-size: 18px;
            line-height: 1.35;
            padding: 18px 22px;
            overflow-y: auto;
            border: 3px solid #003366;
            box-shadow: 
                inset 0 0 30px rgba(0, 200, 255, 0.6),
                0 0 15px rgba(0, 200, 255, 0.4);
            text-shadow: 0 0 8px #00ccff;
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: break-word;
            animation: scanline 4s linear infinite;   /* scanlines now move across FULL content height */
        }

        /* scrollbar styling (unchanged) */
        #gameplay-window::-webkit-scrollbar {
            width: 10px;
        }
        #gameplay-window::-webkit-scrollbar-track {
            background: #001122;
            border-radius: 0px;
        }
        #gameplay-window::-webkit-scrollbar-thumb {
            background: #44ccff;
            box-shadow: 0 0 8px #44ccff;
        }
        #gameplay-window::-webkit-scrollbar-thumb:hover {
            background: #88ddff;
        }

        /* REMOVED the old ::after pseudo-element entirely */
        /* It was causing the scanlines to only cover the visible viewport (height:100%) */

        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        /* Text wrapping inside gameplay window (original) */
        #gameplay-window pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            max-width: 100%;
            font-size: 14px;
        }

        #gameplay-window {
            text-align: left;
        }

        /* small screens: slightly reduce font size inside window for better fit */
        @media (max-width: 500px) {
            #gameplay-window {
                font-size: 15px;
                padding: 12px 16px;
            }
            .ui-button {
                font-size: 16px;
            }
        }

        /* OVERLAY BUTTONS — positions in % (converted from original pixels) */
        .ui-button {
            position: absolute;
            background: transparent;
            border: none;
            color: #ff0000;
            font-family: 'VT323', monospace;
            font-size: 19px;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 0 12px red;
            cursor: pointer;
            transition: all 0.1s ease;
            letter-spacing: 2px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }

        .ui-button:hover {
            color: #ff4444;
            text-shadow: 0 0 20px #ff0000;
            transform: scale(1.05);
        }

        /* Exact button positions (relative to container) */
        #btn-view-map  { top: 75%; left: 28%; width: 23.125%; height: 8.84615%; }
        #btn-bio-link  { top: 75%; left: 48%;   width: 23.125%; height: 8.84615%; }
        #btn-data-chip { top: 81%; left: 28%; width: 23.125%; height: 8.84615%; }
        #btn-action    { top: 81%; left: 48%;   width: 23.125%; height: 8.84615%; }

        /* NEW BUTTONS BELOW THE ORIGINAL FOUR */
        #btn-inventory { top: 86.5%; left: 28%; width: 23.125%; height: 8.84615%; }
        #btn-travel    { top: 86.5%; left: 48%;   width: 23.125%; height: 8.84615%; }
    </style>
            
    
</head>
<body>

<div id="game-container">
    <!-- GAMEPLAY TEXT WINDOW (over the black screen in your PNG) -->
    <div id="gameplay-window">
        <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">NEON HUNTER v1.1 [1984]</div>SYSTEM STATUS: TERMINAL ONLINE<br>DETECTIVE UNIT ACTIVE<br>CASE FILE OPEN<br>LOCATION: APARTMENT 47<br><br>Rain hammers the window. Your terminal flickers with the latest murder file.<br><br><span style="color:#ff8800;">Caution: Stamina is at 88%.</span><br><br><span style="color:#00ccff;">► Click any button below to interact...</span>
    </div>

    <!-- FOUR ORIGINAL BUTTONS (positions and IDs unchanged) -->
    <button id="btn-view-map"  class="ui-button">MAIN</button>
    <button id="btn-bio-link"  class="ui-button">STATUS</button>
    <button id="btn-data-chip" class="ui-button">CLUES</button>
    <button id="btn-action"    class="ui-button">PDA</button>

    <!-- TWO NEW BUTTONS ADDED BELOW -->
    <button id="btn-inventory" class="ui-button">INVENTORY</button>
    <button id="btn-travel"    class="ui-button">TRAVEL</button>
</div>

<script>
    // ********** FULLY IMPLEMENTED BLADE-RUNNER STYLE DETECTIVE ADVENTURE v1.1 (BUGFIXED) **********
    // FIXED: Clicking any action, contact, message, or item no longer resets the screen.
    // All inline clicks now call event.stopPropagation() so the window click handler is ignored.
    // MAIN / STATUS / CLUES / PDA / INVENTORY / TRAVEL buttons continue to work perfectly.

    const windowEl = document.getElementById('gameplay-window');

    // Core game state
    let investigation = 22;
    let stamina = 88;
    let credits = 320;
    let currentLocIndex = 0;
    let storyProgress = 0;
    let cluesCollected = ["HOLO-PHOTO → replicant eye pattern"];
    let inventory = ["REPLICANT SCANNER", "DETECTIVE BADGE", "HOLO-PHOTO"];

    // Expanded PDA communication system
    let inbox = [
        {id: 0, from: "JAX", text: "Heard you're on the big case. Replicant spotted on the Strip. Watch your back.", read: false, time: "23:14"},
        {id: 1, from: "VENDOR K", text: "Got fresh data-shard intel. 80 credits if you want the drop.", read: false, time: "22:47"}
    ];

    function addToInbox(from, text) {
        inbox.unshift({
            id: Date.now(),
            from: from,
            text: text,
            read: false,
            time: "NOW"
        });
        if (inbox.length > 8) inbox.pop();
    }

    // Expanded 7-location database
    const locations = [
        {
            name: "APARTMENT 47",
            desc: "Dimly lit apartment. Rain hammers the window. Terminal flickers with case files. Mirror reflects your tired eyes.",
            actions: [
                {text: "EXAMINE terminal", cmd: "examine-terminal", condition: null,
                    effect: () => { investigation = Math.min(100, investigation + 12); cluesCollected.push("TERMINAL LOG → victim ex-Tyrell employee"); return "Terminal decrypted: Victim worked on replicant behavior mods. +12% investigation."; }},
                {text: "READ case file", cmd: "read-case", condition: null,
                    effect: () => { cluesCollected.push("CASE FILE → murder weapon unknown"); return "The file mentions a missing holo-photo. You already have it."; }},
                {text: "TALK to mirror", cmd: "talk-mirror", condition: null,
                    effect: () => { stamina = Math.max(20, stamina - 5); return "Your reflection stares back: 'Stay sharp, detective.' Stamina -5%."; }},
                {text: "USE REPLICANT SCANNER", cmd: "use-scanner-apt", condition: () => inventory.includes("REPLICANT SCANNER"),
                    effect: () => { investigation = Math.min(100, investigation + 15); return "Scanner detects residual replicant traces. +15% investigation."; }}
            ]
        },
        {
            name: "NEON STRIP",
            desc: "Vibrant neon streets. Hovercars hiss past. Dealers whisper in the shadows. Suspicious figures lurk.",
            actions: [
                {text: "TALK informant", cmd: "talk-informant", condition: null,
                    effect: () => { storyProgress = Math.min(10, storyProgress + 1); investigation = Math.min(100, investigation + 14); addToInbox("JAX", "Just sent you the new coordinates."); return "Informant slips you fresh intel. Progress +1. New PDA message received."; }},
                {text: "EXAMINE alley", cmd: "examine-alley", condition: null,
                    effect: () => { cluesCollected.push("ALLEY EVIDENCE → bloody holo-chip"); return "Found a discarded data chip in the trash."; }},
                {text: "ATTACK suspect", cmd: "attack-suspect", condition: null,
                    effect: () => { stamina = Math.max(10, stamina - 18); investigation = Math.min(100, investigation + 9); return "You subdue the suspect. He reveals nothing before escaping. Stamina -18%."; }},
                {text: "USE REPLICANT SCANNER", cmd: "use-scanner-strip", condition: () => inventory.includes("REPLICANT SCANNER"),
                    effect: () => { cluesCollected.push("SCANNER → positive replicant ID"); investigation = Math.min(100, investigation + 22); return "Confirmed replicant signature! +22% investigation."; }}
            ]
        },
        {
            name: "UNDERCITY",
            desc: "Black-market stalls glow under flickering lights. Replicants trade secrets. Danger lurks in every shadow.",
            actions: [
                {text: "TALK vendor", cmd: "talk-vendor", condition: null,
                    effect: () => {
                        if (credits >= 60) { credits -= 60; storyProgress = Math.min(10, storyProgress + 2); return "Vendor sells you data-shard intel. Progress +2."; }
                        return "Vendor: 'Information costs credits, detective.'";
                    }},
                {text: "TAKE data-shard", cmd: "take-data-shard", condition: null,
                    effect: () => {
                        if (!inventory.includes("DATA SHARD")) inventory.push("DATA SHARD");
                        return "You swipe a glowing data-shard. Adrenaline high!";
                    }},
                {text: "READ graffiti", cmd: "read-graffiti", condition: null,
                    effect: () => { investigation = Math.min(100, investigation + 8); return "Graffiti: 'Bladerunner lies.' +8% investigation."; }}
            ]
        },
        {
            name: "ABANDONED WAREHOUSE",
            desc: "Dilapidated warehouse on the edge of the city. Echoes of machinery and distant thunder. Final confrontation awaits.",
            actions: [
                {text: "SEARCH for prototype", cmd: "search-prototype", condition: null,
                    effect: () => {
                        if (storyProgress >= 6) { investigation = 100; return "You locate and confront the Tyrell prototype replicant. CASE SOLVED!"; }
                        return "The warehouse is empty. More clues needed.";
                    }},
                {text: "SET UP AMBUSH", cmd: "set-ambush", condition: null,
                    effect: () => { stamina = Math.max(10, stamina - 12); storyProgress = Math.min(10, storyProgress + 1); return "Ambush rigged. Stamina -12%."; }},
                {text: "USE BLACK MARKET KEYCARD", cmd: "use-keycard", condition: () => inventory.includes("BLACK MARKET KEYCARD"),
                    effect: () => { investigation = Math.min(100, investigation + 30); return "Keycard unlocks the inner chamber! +30% investigation."; }}
            ]
        },
        {
            name: "HOVERCAR GARAGE",
            desc: "Dripping oil and buzzing neon signs. Mechanics work on flying taxis. Smells of ozone and burnt circuits.",
            actions: [
                {text: "REPAIR hover-taxi", cmd: "repair-taxi", condition: null,
                    effect: () => { stamina = Math.min(100, stamina + 22); return "Mechanic patches your ride. Stamina restored +22%."; }},
                {text: "EXAMINE black-market parts", cmd: "examine-parts", condition: null,
                    effect: () => { cluesCollected.push("GARAGE PARTS → Tyrell serial number"); return "Found a replicant-grade circuit board."; }},
                {text: "USE REPLICANT SCANNER", cmd: "use-scanner-garage", condition: () => inventory.includes("REPLICANT SCANNER"),
                    effect: () => { investigation = Math.min(100, investigation + 18); return "Scanner pings hidden replicant tech in a taxi. +18% investigation."; }}
            ]
        },
        {
            name: "ROOFTOP SAFEHOUSE",
            desc: "Hidden penthouse overlooking the glowing city. Rain patters on the glass. The only place you can truly rest.",
            actions: [
                {text: "REST & recharge", cmd: "rest-safehouse", condition: null,
                    effect: () => { stamina = Math.min(100, stamina + 35); return "You crash on the couch. Full stamina restored +35%."; }},
                {text: "SCAN the skyline", cmd: "scan-skyline", condition: () => inventory.includes("REPLICANT SCANNER"),
                    effect: () => { storyProgress = Math.min(10, storyProgress + 1); return "Scanner picks up distant replicant heat signatures. Progress +1."; }},
                {text: "CHECK hidden terminal", cmd: "check-terminal", condition: null,
                    effect: () => { addToInbox("SYSTEM", "Encrypted message from an unknown source..."); return "Terminal beeps — new PDA message received."; }}
            ]
        },
        {
            name: "POLICE PRECINCT",
            desc: "Cold fluorescent lights. Officers glare at you suspiciously. The smell of stale coffee and bureaucracy.",
            actions: [
                {text: "FILE official report", cmd: "file-report", condition: null,
                    effect: () => { investigation = Math.min(100, investigation + 10); stamina = Math.max(20, stamina - 8); return "Report filed. They give you a minor lead but warn you to back off. Stamina -8%."; }},
                {text: "ACCESS archives (use badge)", cmd: "access-archives", condition: () => inventory.includes("DETECTIVE BADGE"),
                    effect: () => { cluesCollected.push("ARCHIVES → Tyrell prototype file"); return "Badge gets you into the restricted archives. New clue added."; }},
                {text: "BRIBE desk sergeant", cmd: "bribe-sergeant", condition: null,
                    effect: () => {
                        if (credits >= 120) { credits -= 120; storyProgress = Math.min(10, storyProgress + 2); return "Sergeant slips you confidential files. Progress +2."; }
                        return "Not enough credits to loosen his tongue.";
                    }}
            ]
        }
    ];

    function updateWindow(html) {
        windowEl.innerHTML = html;
        windowEl.scrollTop = 0;
    }

    // GLOBAL ACTION HANDLER
    window.executeAction = function(cmd) {
        if (stamina <= 0) return;
        const loc = locations[currentLocIndex];
        const action = loc.actions.find(a => a.cmd === cmd);
        if (!action || (action.condition && !action.condition())) {
            updateWindow(`
                <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">ERROR</div>
                <p style="color:#ff8800;">Action unavailable here or requirements not met.</p>
                <p style="color:#ffff00; margin-top:25px; text-align:center;">► Click the gameplay window to return</p>
            `);
            return;
        }
        const message = action.effect();
        let extra = '';
        if (stamina <= 0) extra = `<p style="color:#ff0000; font-size:22px; text-align:center;">STAMINA DEPLETED — GAME OVER</p>`;
        else if (investigation >= 100 && storyProgress >= 8) {
            extra = `<p style="color:#ffff00; font-size:22px; text-align:center;">CASE SOLVED!<br>THE TRUTH IS IN THE NEON.</p>`;
            setTimeout(() => alert("🎉 CASE CLOSED 🎉\n\nYou tracked the last replicant through the rain-soaked streets.\nThe city owes you another night.\n\nThanks for playing NEON HUNTER v1.1"), 600);
        }
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">ACTION LOG</div>
            <p style="color:#00ffcc; line-height:1.4;">${message}</p>
            ${extra}
            <p style="color:#ffff00; margin-top:25px; text-align:center;">► Click the gameplay window to return to location overview</p>
            <p style="color:#ff8800;">Investigation: ${investigation}% • Stamina: ${stamina}% • Credits: ${credits}</p>
        `);
    };

    // GLOBAL TRAVEL HANDLER
    window.travelTo = function(newIndex) {
        if (stamina <= 0) return;
        if (newIndex === currentLocIndex) {
            updateWindow(`
                <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">ALREADY HERE</div>
                <p style="color:#00ffcc;">You are already in ${locations[currentLocIndex].name}.</p>
                <p style="color:#ffff00; margin-top:25px; text-align:center;">► Click the gameplay window to return</p>
            `);
            return;
        }
        const travelCost = Math.floor(Math.random() * 9) + 7;
        stamina = Math.max(15, stamina - travelCost);
        currentLocIndex = newIndex;
        const msg = `You hail a hover-taxi through the acid rain. Arrived safely at ${locations[currentLocIndex].name}.`;
        let extra = stamina <= 25 ? `<p style="color:#ff0000;">WARNING: Stamina critically low.</p>` : '';
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">TRAVEL COMPLETE</div>
            <p style="color:#00ffcc;">${msg}</p>
            <p style="color:#ff8800;">Stamina reduced by ${travelCost}% • New Stamina: ${stamina}%</p>
            ${extra}
            <p style="color:#ffff00; margin-top:20px; text-align:center;">► Click the gameplay window to continue...</p>
        `);
    };

    // PDA — RING contact
    window.ringContact = function(contactKey) {
        if (stamina <= 0) return;
        let name = "", message = "", effectText = "";
        switch(contactKey) {
            case 'jax':
                name = "JAX";
                message = "📞 RINGING... JAX picks up instantly: 'Detective! The replicant just hit the warehouse. Get there fast!'";
                storyProgress = Math.min(10, storyProgress + 2);
                investigation = Math.min(100, investigation + 18);
                effectText = "Progress +2 • Investigation +18%";
                break;
            case 'vendor':
                name = "VENDOR K";
                message = "📞 RINGING... Vendor K: 'I got the prototype schematics. 80 credits and they're yours.'";
                if (credits >= 80) { credits -= 80; inventory.push("BLACK MARKET KEYCARD"); effectText = "Keycard acquired!"; }
                else effectText = "Not enough credits.";
                break;
            case 'eldon':
                name = "DR. ELDON";
                message = "📞 RINGING... Dr. Eldon: 'I patched up your last wound. Come by anytime.'";
                stamina = Math.min(100, stamina + 28);
                effectText = "Stamina restored +28%";
                break;
            case 'reeves':
                name = "CAPTAIN REEVES";
                message = "📞 RINGING... Captain Reeves: 'Stay out of my precinct, hunter. But... off the record, Tyrell is watching you.'";
                cluesCollected.push("REEVES TIP → Tyrell surveillance");
                effectText = "New clue unlocked";
                break;
        }
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">PDA • LIVE CALL — ${name}</div>
            <p style="color:#00ffcc; line-height:1.4;">${message}</p>
            <p style="color:#ffff00; margin-top:12px;">${effectText}</p>
            <p style="color:#ffff00; margin-top:25px; text-align:center;">► Click the gameplay window to hang up & return</p>
            <p style="color:#ff8800;">Investigation: ${investigation}% • Stamina: ${stamina}% • Credits: ${credits}</p>
        `);
    };

    // PDA — SEND message
    window.sendMessage = function(contactKey) {
        if (stamina <= 0) return;
        let name = "", reply = "", effectText = "";
        if (credits < 20) {
            updateWindow(`<div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">PDA • SEND FAILED</div><p style="color:#ff8800;">Not enough credits for data burst (20 CR).</p><p style="color:#ffff00; margin-top:25px; text-align:center;">► Click the gameplay window to return</p>`);
            return;
        }
        credits -= 20;
        switch(contactKey) {
            case 'jax':
                name = "JAX";
                reply = "Got your message. Sending coordinates now.";
                storyProgress = Math.min(10, storyProgress + 1);
                investigation = Math.min(100, investigation + 12);
                addToInbox("JAX", reply);
                effectText = "Message sent • Progress +1 • New reply in inbox";
                break;
            case 'vendor':
                name = "VENDOR K";
                reply = "Data-shard en route. Stay off the grid.";
                addToInbox("VENDOR K", reply);
                effectText = "Message sent • Reply added to inbox";
                break;
            case 'eldon':
                name = "DR. ELDON";
                reply = "Healing stims dispatched. Use them wisely.";
                stamina = Math.min(100, stamina + 15);
                effectText = "Message sent • Stamina +15%";
                break;
            case 'reeves':
                name = "CAPTAIN REEVES";
                reply = "Official channels only. Off-record: they're closing in.";
                addToInbox("CAPTAIN REEVES", reply);
                effectText = "Message sent • Reply added to inbox";
                break;
        }
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">PDA • DATA MESSAGE SENT TO ${name}</div>
            <p style="color:#00ffcc;">${reply}</p>
            <p style="color:#ffff00; margin-top:12px;">${effectText}</p>
            <p style="color:#ffff00; margin-top:25px; text-align:center;">► Click the gameplay window to return to PDA</p>
            <p style="color:#ff8800;">Credits: ${credits} CR</p>
        `);
    };

    // PDA — VIEW INBOX
    window.viewInbox = function() {
        let inboxHTML = inbox.map((msg, i) => 
            `<span onclick="event.stopPropagation(); readMessage(${i})" style="display:block;color:#00ffcc;cursor:pointer;margin:8px 0;padding:4px;text-shadow:0 0 5px #00ffcc;">[${msg.time}] ${msg.from}: ${msg.text.substring(0, 45)}...</span>`
        ).join('');
        if (inboxHTML === '') inboxHTML = `<span style="color:#ff8800;">INBOX EMPTY</span>`;
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">PDA • TXT INBOX</div>
            <div style="color:#00ccff; line-height:1.6; font-size:16px;">${inboxHTML}</div>
            <p style="color:#ffff00; margin-top:15px;">Messages update automatically with story progress.</p>
            <p style="color:#ffff00; margin-top:25px; text-align:center;">► Click the gameplay window to return to PDA main</p>
        `);
    };

    // PDA — READ single message
    window.readMessage = function(index) {
        const msg = inbox[index];
        if (msg) msg.read = true;
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">PDA • MESSAGE FROM ${msg.from}</div>
            <p style="color:#00ffcc; line-height:1.4;">${msg.text}</p>
            <p style="color:#ffff00; margin-top:8px;">${msg.time}</p>
            <p style="color:#ffff00; margin-top:25px; text-align:center;">► Click the gameplay window to return to inbox</p>
        `);
    };

    // GLOBAL INVENTORY ITEM USE
    window.useInventoryItem = function(item) {
        if (stamina <= 0) return;
        let message = `You examine the ${item}.`;
        let used = false;
        if (item === "REPLICANT SCANNER" && currentLocIndex === 1) {
            cluesCollected.push("REPLICANT SIGNATURE CONFIRMED ON STRIP");
            investigation = Math.min(100, investigation + 20);
            message = "Scanner active! Detects replicant activity. +20% investigation.";
            used = true;
        } else if (item === "DATA SHARD" && currentLocIndex === 2) {
            storyProgress = Math.min(10, storyProgress + 3);
            message = "Data shard decoded in undercity. Reveals prototype schematics! Progress +3.";
            used = true;
        } else if (item === "BLACK MARKET KEYCARD" && currentLocIndex === 3) {
            investigation = Math.min(100, investigation + 30);
            message = "Keycard unlocks the warehouse door. +30% investigation.";
            used = true;
        } else if (item === "REPLICANT SCANNER" && currentLocIndex === 4) {
            investigation = Math.min(100, investigation + 18);
            message = "Scanner pings hidden replicant tech in a hovercar. +18% investigation.";
            used = true;
        } else {
            message += " No immediate use here. Try a different location via MAIN.";
        }
        if (used && Math.random() > 0.65) {
            inventory = inventory.filter(i => i !== item);
            message += " (Item consumed.)";
        }
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">ITEM USED</div>
            <p style="color:#00ffcc;">${message}</p>
            <p style="color:#ffff00; margin-top:25px; text-align:center;">► Click the gameplay window to continue...</p>
        `);
    };

    // MAIN — fully interactive (with stopPropagation fix)
    document.getElementById('btn-view-map').addEventListener('click', () => {
        const loc = locations[currentLocIndex];
        let actionsHTML = loc.actions
            .filter(a => !a.condition || a.condition())
            .map(a => `<span style="display:block;color:#ffff00;cursor:pointer;margin:6px 0;padding:2px 0;text-shadow:0 0 6px #ffff00;" onclick="event.stopPropagation(); executeAction('${a.cmd}')">► ${a.text}</span>`)
            .join('');
        if (!actionsHTML) actionsHTML = `<span style="color:#ff8800;">No actions available at this time...</span>`;
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">LOCATION: ${loc.name}</div>
            <p style="color:#00ffcc;">${loc.desc}</p>
            <div style="margin-top:18px;color:#ffff00;font-size:17px;">AVAILABLE COMMANDS:</div>
            ${actionsHTML}
            <p style="color:#ff8800; margin-top:18px;">Investigation: ${investigation}% • Stamina: ${stamina}% • Credits: ${credits} CR</p>
            <p style="color:#00ccff; margin-top:8px; font-size:15px;">Story Progress: ${storyProgress}/10</p>
        `);
    });

    // STATUS
    document.getElementById('btn-bio-link').addEventListener('click', () => {
        const loc = locations[currentLocIndex];
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">DETECTIVE STATUS</div>
            <pre style="font-size:17px; line-height:1.3; color:#00ff00;">
BADGE: ACTIVE
REPLICANT SCANNER: ONLINE
STAMINA: ${stamina}%
INVESTIGATION: ${investigation}%
LOCATION: ${loc.name}
CREDITS: ${credits}
STORY PROGRESS: ${storyProgress}/10
INBOX: ${inbox.length} MESSAGES
            </pre>
            <p style="color:#ff8800;">The city never sleeps. Neither do you.</p>
        `);
    });

    // CLUES — dynamic
    document.getElementById('btn-data-chip').addEventListener('click', () => {
        const cluesHTML = cluesCollected.map((clue, idx) => `${idx+1}. ${clue}`).join('<br>');
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">COLLECTED CLUES</div>
            <div style="color:#00ccff; font-size:16px; line-height:1.5;">${cluesHTML}</div>
            <p style="color:#ff8800; margin-top:15px;">More clues unlock with progress...</p>
        `);
    });

    // PDA — fully enhanced (with stopPropagation fix)
    document.getElementById('btn-action').addEventListener('click', () => {
        const contactsHTML = `
            <div style="color:#ffff00; margin-bottom:8px;">RING CONTACTS:</div>
            <span onclick="event.stopPropagation(); ringContact('jax')" style="display:block;color:#00ffcc;cursor:pointer;margin:6px 0;text-shadow:0 0 5px #00ffcc;">📞 RING JAX — street informant</span>
            <span onclick="event.stopPropagation(); ringContact('vendor')" style="display:block;color:#00ffcc;cursor:pointer;margin:6px 0;text-shadow:0 0 5px #00ffcc;">📞 RING VENDOR K — undercity fixer</span>
            <span onclick="event.stopPropagation(); ringContact('eldon')" style="display:block;color:#00ffcc;cursor:pointer;margin:6px 0;text-shadow:0 0 5px #00ffcc;">📞 RING DR. ELDON — black-market surgeon</span>
            <span onclick="event.stopPropagation(); ringContact('reeves')" style="display:block;color:#00ffcc;cursor:pointer;margin:6px 0;text-shadow:0 0 5px #00ffcc;">📞 RING CAPTAIN REEVES — police contact</span>
            
            <div style="color:#ffff00; margin:18px 0 8px 0;">SEND DATA MESSAGE:</div>
            <span onclick="event.stopPropagation(); sendMessage('jax')" style="display:block;color:#ffcc00;cursor:pointer;margin:6px 0;text-shadow:0 0 5px #ffcc00;">✉ SEND TO JAX (20 CR)</span>
            <span onclick="event.stopPropagation(); sendMessage('vendor')" style="display:block;color:#ffcc00;cursor:pointer;margin:6px 0;text-shadow:0 0 5px #ffcc00;">✉ SEND TO VENDOR K (20 CR)</span>
            <span onclick="event.stopPropagation(); sendMessage('eldon')" style="display:block;color:#ffcc00;cursor:pointer;margin:6px 0;text-shadow:0 0 5px #ffcc00;">✉ SEND TO DR. ELDON (20 CR)</span>
            <span onclick="event.stopPropagation(); sendMessage('reeves')" style="display:block;color:#ffcc00;cursor:pointer;margin:6px 0;text-shadow:0 0 5px #ffcc00;">✉ SEND TO CAPTAIN REEVES (20 CR)</span>
            
            <div onclick="event.stopPropagation(); viewInbox()" style="color:#ffff00; margin-top:22px; text-align:center; cursor:pointer; text-shadow:0 0 8px #ffff00; border-top:1px solid #00ccff; padding-top:12px;">
                📬 VIEW TXT INBOX (${inbox.length} messages)
            </div>
        `;

        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">PDA v1.0 [DETECTIVE LINK]</div>
            <pre style="font-size:17px; line-height:1.3; color:#00ff00;">
BANK ACCOUNT:
NAME: DETECTIVE UNIT-9
LICENSE: #394872
BALANCE: ${credits} CR
STORY PROGRESS: ${storyProgress}/10
            </pre>
            ${contactsHTML}
            <p style="color:#00ccff; margin-top:12px; font-size:15px;">Ring • Send • Receive — the streets are always listening.</p>
        `);
    });

    // INVENTORY — clickable (with stopPropagation fix)
    document.getElementById('btn-inventory').addEventListener('click', () => {
        let itemsHTML = inventory.map(item => 
            `<span onclick="event.stopPropagation(); useInventoryItem('${item}')" style="display:block;color:#00ffcc;cursor:pointer;margin:6px 0;text-shadow:0 0 5px #00ffcc;">► ${item}</span>`
        ).join('') || `<span style="color:#ff8800;">INVENTORY EMPTY</span>`;
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">INVENTORY</div>
            <div style="color:#00ffcc; line-height:1.6;">${itemsHTML}</div>
            <p style="color:#ffff00; margin-top:15px;">Click an item to attempt use (context matters — try in relevant locations via MAIN)</p>
        `);
    });

    // TRAVEL — clickable destinations (with stopPropagation fix)
    document.getElementById('btn-travel').addEventListener('click', () => {
        const locListHTML = locations.map((loc, i) => {
            const isCurrent = i === currentLocIndex;
            return `<span style="display:block;color:${isCurrent ? '#00ff00' : '#00ffcc'};margin:6px 0;cursor:pointer;text-shadow:0 0 6px #00ffcc;" onclick="event.stopPropagation(); travelTo(${i})"> ${isCurrent ? '► CURRENT: ' : '► '} ${loc.name}</span>`;
        }).join('');
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">TRAVEL — SELECT DESTINATION</div>
            <p style="color:#ffff00;">Select destination below (hovercars available):</p>
            ${locListHTML}
            <p style="color:#ff8800; margin-top:12px;">Current Stamina: ${stamina}% (travel costs stamina)</p>
            <p style="color:#00ccff; margin-top:12px;">Click MAIN after travel to see new location details and actions.</p>
        `);
    });

    // Clicking anywhere in the gameplay window (except interactive elements) returns to default status
    windowEl.addEventListener('click', (e) => {
        // Only trigger if the click was not stopped by an interactive element
        const loc = locations[currentLocIndex];
        updateWindow(`
            <div style="color:#ff0000; text-align:left; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">
                NEON HUNTER v1.1 [1984]
            </div>
            SYSTEM STATUS: TERMINAL ONLINE<br>
            DETECTIVE UNIT ACTIVE<br>
            CASE FILE OPEN<br>
            LOCATION: ${loc.name}<br><br>
            ${loc.desc}<br><br>
            <span style="color:#ff8800;">Caution: Stamina is at ${Math.floor(stamina)}%.</span><br><br>
            <span style="color:#00ccff;">► Click any button below... (FULL GAMEPLAY ENABLED — PDA RING + TXT INBOX)</span>
        `);
    });

    console.log("%cNEON HUNTER v1.1 — BUG FIXED: All in-game clicks now work correctly (actions, PDA contacts, messages, inventory, travel)", "color:#00ffcc; font-family:VT323");
</script>
</body>
</html>
