<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VAGRANT STAR • Nightfall Games 1984</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            overflow: auto;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 840px;
            padding-bottom: 100%;
            height: 0;
            background-image: url('bcbk1.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            border: none;
            outline: none;
            box-shadow: none;
            overflow: hidden;
            margin: 0 auto;
        }
        #gameplay-window {
            position: absolute;
            top: 25.8462%;
            left: 25.78125%;
            width: 46.875%;
            height: 46.1538%;
            background: 
                #001100
                repeating-linear-gradient(
                    to bottom,
                    transparent 0px,
                    transparent 3px,
                    rgba(0, 255, 0, 0.08) 3px,
                    rgba(0, 255, 0, 0.08) 6px
                );
            background-size: 100% 6px;
            color: #00ccff;
            font-family: 'VT323', monospace;
            font-size: 16px;
            line-height: 1.35;
            overflow-y: auto;
            border: 3px solid #003366;
            box-shadow: 
                inset 0 0 30px rgba(0, 200, 255, 0.6),
                0 0 15px rgba(0, 200, 255, 0.4);
            text-shadow: 0 0 8px #00ccff;
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: break-word;
            animation: scanline 4s linear infinite;
            display: flex;
            flex-direction: column;
        }
        #status-hud {
            position: sticky;
            top: 0;
            z-index: 5;
            background: rgba(0, 10, 0, 0.92);
            border-bottom: 2px solid #003366;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(2px);
            box-shadow: 0 2px 8px rgba(0,200,255,0.3);
            min-height: 48px;
        }
        .hud-stats-group {
            display: flex;
            align-items: flex-end;
            gap: 16px;
        }
        .hud-stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .hud-label-top {
            font-size: 12px;
            color: #ff8800;
            text-shadow: 0 0 6px #ff8800;
            margin-bottom: 2px;
            white-space: nowrap;
        }
        .hud-bar-bg {
            width: 70px;
            height: 10px;
            background: #111;
            border: 1px solid #444;
            box-shadow: inset 0 0 4px #000;
            position: relative;
        }
        .hud-bar-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            transition: width 0.3s ease;
        }
        .hp-fill-hud { background: #ff3333; box-shadow: 0 0 6px #ff0000; }
        .energy-fill-hud { background: #33ccff; box-shadow: 0 0 6px #33ccff; }
        #money-hud {
            font-size: 15px;
            color: #ffff00;
            text-shadow: 0 0 8px #ffff00;
            white-space: nowrap;
            margin-left: 8px;
        }
        #gameplay-content {
            padding: 12px 16px;
            flex: 1;
        }
        #gameplay-window::-webkit-scrollbar { width: 10px; }
        #gameplay-window::-webkit-scrollbar-track { background: #001122; border-radius: 0px; }
        #gameplay-window::-webkit-scrollbar-thumb { background: #44ccff; box-shadow: 0 0 8px #44ccff; }
        #gameplay-window::-webkit-scrollbar-thumb:hover { background: #88ddff; }
        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }
        #gameplay-content pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            max-width: 100%;
            font-size: 14px;
        }
        .ui-button {
            position: absolute;
            background: transparent;
            border: none;
            color: #ff0000;
            font-family: 'VT323', monospace;
            font-size: 19px;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 0 12px red;
            cursor: pointer;
            transition: all 0.1s ease;
            letter-spacing: 2px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }
        .ui-button:hover { color: #ff4444; text-shadow: 0 0 20px #ff0000; transform: scale(1.05); }
        #btn-view-map  { top: 75%; left: 28%; width: 23.125%; height: 8.84615%; }
        #btn-bio-link  { top: 75%; left: 48%;   width: 23.125%; height: 8.84615%; }
        #btn-data-chip { top: 81%; left: 28%; width: 23.125%; height: 8.84615%; }
        #btn-action    { top: 81%; left: 48%;   width: 23.125%; height: 8.84615%; }
        #btn-inventory { top: 86.5%; left: 28%; width: 23.125%; height: 8.84615%; }
        #btn-travel    { top: 86.5%; left: 48%;   width: 23.125%; height: 8.84615%; }

        /* API Key Modal */
        #api-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        #api-modal > div {
            background: #001100;
            border: 3px solid #003366;
            box-shadow: 0 0 20px #00ccff;
            padding: 30px;
            text-align: center;
            color: #00ccff;
            font-family: 'VT323', monospace;
            max-width: 400px;
        }
        #api-modal input {
            background: #000;
            border: 2px solid #003366;
            color: #00ff00;
            padding: 10px;
            width: 100%;
            font-family: 'VT323', monospace;
            font-size: 18px;
            margin: 20px 0;
            text-shadow: 0 0 8px #00ff00;
        }
        #api-modal button {
            background: transparent;
            border: 2px solid #ff0000;
            color: #ff0000;
            font-family: 'VT323', monospace;
            font-size: 20px;
            padding: 10px 30px;
            cursor: pointer;
            text-shadow: 0 0 12px red;
        }
        #api-modal button:hover { background: #330000; }

        @media (max-width: 500px) {
            #gameplay-window { font-size: 14px; }
            .ui-button { font-size: 15px; }
            .hud-label-top { font-size: 10px; }
            .hud-bar-bg { width: 50px; height: 8px; }
        }
        /* Larger chat input */
        .chat-input-large {
            width: 80% !important;
            padding: 8px !important;
            font-size: 18px !important;
        }
        .chat-btn-large {
            font-size: 18px !important;
            padding: 8px 12px !important;
        }
    </style>
</head>
<body>
<div id="game-container">
    <div id="gameplay-window">
        <div id="status-hud">
            <div class="hud-stats-group">
                <div class="hud-stat-item">
                    <span class="hud-label-top">HP</span>
                    <div class="hud-bar-bg"><div id="hp-fill-hud" class="hud-bar-fill hp-fill-hud" style="width:100%;"></div></div>
                </div>
                <div class="hud-stat-item">
                    <span class="hud-label-top">ENERGY</span>
                    <div class="hud-bar-bg"><div id="energy-fill-hud" class="hud-bar-fill energy-fill-hud" style="width:100%;"></div></div>
                </div>
            </div>
            <div id="money-hud">SCRIP: 50</div>
        </div>
        <div id="gameplay-content"></div>
    </div>
    <button id="btn-view-map" class="ui-button">SEARCH</button>
    <button id="btn-bio-link" class="ui-button">STATUS</button>
    <button id="btn-data-chip" class="ui-button">QUESTS</button>
    <button id="btn-action" class="ui-button">COMMS</button>
    <button id="btn-inventory" class="ui-button">INVENTORY</button>
    <button id="btn-travel" class="ui-button">TRAVEL</button>
</div>
<div id="api-modal">
    <div>
        <h2>ENTER MISTRAL API KEY</h2>
        <input type="password" id="api-key-input" placeholder="Paste your Mistral API key...">
        <button id="save-api-key">SAVE & ENTER SPRAWL</button>
        <div id="api-error" style="color:red; margin-top:10px;"></div>
    </div>
</div>

<script>
    // ==================== VAGRANT STAR v2.0 – COMMS, BANK, NEWS, IMPROVED COMBAT ====================
    const contentEl = document.getElementById('gameplay-content');
    const apiModal = document.getElementById('api-modal');
    const apiInput = document.getElementById('api-key-input');
    const apiSaveBtn = document.getElementById('save-api-key');
    let MISTRAL_API_KEY = localStorage.getItem('mistral_key') || '';
    let gameReady = false;

    // Audio
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSound(type = 'click') {
        try {
            if (!audioCtx) initAudio();
            const now = audioCtx.currentTime;
            const gain = audioCtx.createGain();
            gain.connect(audioCtx.destination);
            let osc = audioCtx.createOscillator();
            osc.connect(gain);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now+0.3);
            switch(type) {
                case 'click': osc.frequency.setValueAtTime(800,now); osc.type='square'; osc.start(now); osc.stop(now+0.06); break;
                case 'action': osc.frequency.setValueAtTime(1000,now); osc.frequency.setValueAtTime(1200,now+0.08); osc.type='square'; osc.start(now); osc.stop(now+0.16); break;
                case 'travel': osc.frequency.setValueAtTime(600,now); osc.frequency.exponentialRampToValueAtTime(200,now+0.2); osc.type='sawtooth'; gain.gain.setValueAtTime(0.15,now); osc.start(now); osc.stop(now+0.25); break;
                case 'error': osc.frequency.setValueAtTime(150,now); osc.type='square'; gain.gain.setValueAtTime(0.3,now); osc.start(now); osc.stop(now+0.3); break;
                case 'success': osc.frequency.setValueAtTime(523.25,now); osc.frequency.setValueAtTime(659.25,now+0.1); osc.frequency.setValueAtTime(783.99,now+0.2); osc.type='triangle'; gain.gain.setValueAtTime(0.15,now); osc.start(now); osc.stop(now+0.4); break;
            }
        } catch(e) {}
    }

    // World & Player
    const world = {
        cities: {
            "neo_avalon": {
                name: "NEO-AVALON",
                districts: {
                    "bazaar": { name: "The Bazaar", danger: 2, locations: ["Rusty Alley","Scrap Merchant","Underground Market","Collapsed Overpass"] },
                    "refinery": { name: "Refinery Row", danger: 4, locations: ["Chemical Sump","Pipeline Maze","Worker's Shack","Smokestack Base"] },
                    "habblock": { name: "Hab Block 9", danger: 1, locations: ["Rooftop Garden","Derelict Elevator","Community Kitchen","Dark Corridor"] },
                    "canal": { name: "The Canal", danger: 3, locations: ["Sunken Barge","Waterfront Warehouse","Bridge Control","Tunnel Entrance"] }
                }
            },
            "the_sprawl": {
                name: "THE SPRAWL",
                districts: {
                    "neon_core": { name: "Neon Core", danger: 5, locations: ["Glitch Alley","Holo-Ad Plaza","Data-Den","Rooftop Chase"] },
                    "sewer_warrens": { name: "Sewer Warrens", danger: 6, locations: ["Sludge Canal","Rat King's Lair","Abandoned Pump Station"] },
                    "outskirts": { name: "Outskirts", danger: 2, locations: ["Junk Heap","Scavenger Camp","Old Highway"] }
                }
            }
        }
    };

    const player = {
        hp: 100, maxHp: 100,
        energy: 100, maxEnergy: 100,
        money: 50,
        bankBalance: 0,
        investments: [],
        currentCity: "neo_avalon",
        currentDistrict: "bazaar",
        currentLocation: "Rusty Alley",
        inventory: ["Rusty Knife", "Dirty Bandage"],
        weapon: { name: "Rusty Knife", damage: 6 },
        armor: null,
        quests: [],
        contacts: [
            { id: "doc_vex", name: "Doc Vex", personality: "Cynical back-alley medic.", history: [] },
            { id: "rook", name: "Rook", personality: "Paranoid fixer with black market ties.", history: [] },
            { id: "mara", name: "Mara", personality: "Tired bartender who hears all the rumours.", history: [] }
        ],
        mailbox: [],
        activeContact: null
    };

    let locationDescriptions = {};

    // Mistral API
    async function callMistral(prompt, system = "You are the AI engine of a dystopian cyberpunk RPG. Always respond with valid JSON only, no other text.", maxTokens = 2000) {
        const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${MISTRAL_API_KEY}`
            },
            body: JSON.stringify({
                model: "mistral-large-latest",
                messages: [
                    { role: "system", content: system },
                    { role: "user", content: prompt }
                ],
                response_format: { type: "json_object" },
                temperature: 0.9,
                max_tokens: maxTokens
            })
        });
        if (!response.ok) throw new Error(`API error ${response.status}: ${await response.text()}`);
        const data = await response.json();
        const content = data.choices[0].message.content;
        return JSON.parse(content);
    }

    function updateHUD() {
        document.getElementById('hp-fill-hud').style.width = (player.hp / player.maxHp * 100) + '%';
        document.getElementById('energy-fill-hud').style.width = (player.energy / player.maxEnergy * 100) + '%';
        document.getElementById('money-hud').textContent = 'SCRIP: ' + player.money;
    }

    function clearContent() { contentEl.innerHTML = ''; }

    async function generateLocationDescription() {
        const locKey = `${player.currentCity}_${player.currentDistrict}_${player.currentLocation}`;
        if (locationDescriptions[locKey]) return locationDescriptions[locKey];
        const prompt = `Generate a description for a location in a dystopian cyberpunk city. The player is in "${player.currentLocation}" in the district "${player.currentDistrict}" of city "${player.currentCity}". Provide 2-3 sentences of atmospheric description. Also list 2-4 items one might find by searching (simple names). Return JSON: {"description":"...", "searchables":["item name",...], "ambient_event":"optional one-line event"}`;
        const data = await callMistral(prompt, undefined, 256);
        locationDescriptions[locKey] = data;
        return data;
    }

    async function showMainScreen() {
        clearContent();
        const locData = await generateLocationDescription();
        contentEl.innerHTML = `
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">${player.currentLocation.toUpperCase()}</div>
            <p style="color:#00ccff;">${locData.description}</p>
            ${locData.ambient_event ? `<p style="color:#ff8800; margin-top:8px;">${locData.ambient_event}</p>` : ''}
            <p style="color:#ffff00; margin-top:15px; text-align:center;">◄ Use buttons below to interact</p>
        `;
    }

    // SEARCH
    async function doSearch() {
        playSound('action');
        clearContent();
        contentEl.innerHTML = `<p style="color:#ffff00;">Searching...</p>`;
        const locData = await generateLocationDescription();
        const searchables = locData.searchables || ["scrap metal"];
        const randomFind = searchables[Math.floor(Math.random() * searchables.length)];
        const danger = world.cities[player.currentCity].districts[player.currentDistrict].danger;
        const enemyAppears = Math.random() < (danger * 0.15);
        let enemy = null;
        if (enemyAppears) {
            const prompt = `Generate a dystopian enemy encountered during a search in "${player.currentLocation}". Return JSON with "name", "hp" (15-40), "attack" (3-10), and a brief "description".`;
            enemy = await callMistral(prompt, undefined, 256);
        }
        player.inventory.push(randomFind);
        let msg = `You search and find: ${randomFind}.`;
        if (enemy) msg += ` Suddenly, a ${enemy.name} appears!`;
        contentEl.innerHTML = `
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px;">SEARCH</div>
            <p style="color:#00ccff;">${msg}</p>
            ${enemy ? `<p style="color:#ff0000;">Combat initiated!</p>` : ''}
            <p style="color:#ffff00; margin-top:20px; text-align:center;">◄ Click screen to continue</p>
        `;
        if (enemy) startCombat(enemy);
    }

    // COMBAT (improved layout)
    let combatActive = false;
    let currentEnemy = null;

    function startCombat(enemy) {
        combatActive = true;
        currentEnemy = { ...enemy, maxHp: enemy.hp };
        renderCombatScreen();
    }

    function renderCombatScreen() {
        clearContent();
        contentEl.innerHTML = `
            <div style="color:#ff0000; text-align:center; margin-bottom:10px; font-size:20px;">⚔ COMBAT ⚔</div>
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <div style="color:#00ccff;">
                    <strong>YOU</strong><br>
                    HP: ${player.hp}/${player.maxHp}<br>
                    Weapon: ${player.weapon.name} (${player.weapon.damage})
                </div>
                <div style="color:#ff8800; text-align:right;">
                    <strong>${currentEnemy.name.toUpperCase()}</strong><br>
                    HP: ${currentEnemy.hp}/${currentEnemy.maxHp}<br>
                    Attack: ${currentEnemy.attack}
                </div>
            </div>
            <p style="color:#aaa; font-style:italic;">${currentEnemy.description || ''}</p>
            <div style="margin-top:15px; display:flex; gap:8px; flex-wrap:wrap;">
                <span onclick="event.stopPropagation(); combatAction('attack')" style="cursor:pointer; color:#ffff00; background:#111; padding:6px 12px; border:1px solid #ffff00; margin:2px;">[ ATTACK ]</span>
                <span onclick="event.stopPropagation(); combatAction('run')" style="cursor:pointer; color:#ff4444; background:#111; padding:6px 12px; border:1px solid #ff4444; margin:2px;">[ RUN ]</span>
                <span onclick="event.stopPropagation(); combatUseItem()" style="cursor:pointer; color:#44ff44; background:#111; padding:6px 12px; border:1px solid #44ff44; margin:2px;">[ USE ITEM ]</span>
            </div>
        `;
    }

    window.combatAction = function(action) {
        if (!combatActive) return;
        if (action === 'attack') {
            const playerDamage = Math.max(1, player.weapon.damage + Math.floor(Math.random()*5)-2);
            currentEnemy.hp -= playerDamage;
            let result = `You hit for ${playerDamage}. `;
            if (currentEnemy.hp <= 0) {
                result += `${currentEnemy.name} defeated!`;
                combatActive = false;
                player.money += Math.floor(Math.random()*20)+5;
                updateHUD();
                clearContent();
                contentEl.innerHTML = `<p style="color:#00ff00;">${result}</p><p style="color:#ffff00; text-align:center;">◄ Click screen to continue</p>`;
                return;
            }
            const enemyDamage = Math.max(1, currentEnemy.attack + Math.floor(Math.random()*4)-2);
            player.hp -= enemyDamage;
            result += `${currentEnemy.name} strikes for ${enemyDamage}.`;
            if (player.hp <= 0) {
                player.hp = 0;
                combatActive = false;
                updateHUD();
                clearContent();
                contentEl.innerHTML = `<p style="color:#ff0000;">YOU HAVE DIED. Game over.</p>`;
                return;
            }
            updateHUD();
            renderCombatScreen();
            contentEl.querySelector('div').insertAdjacentHTML('afterbegin', `<p style="color:#ff0; text-align:center;">${result}</p>`);
        } else if (action === 'run') {
            if (Math.random() < 0.5) {
                combatActive = false;
                clearContent();
                contentEl.innerHTML = `<p style="color:#ffff00;">You escaped!</p><p style="color:#ffff00; text-align:center;">◄ Click screen to continue</p>`;
            } else {
                renderCombatScreen();
                contentEl.querySelector('div').insertAdjacentHTML('afterbegin', `<p style="color:#f88;">Failed to escape!</p>`);
            }
        }
    };

    window.combatUseItem = function() {
        const healingItems = player.inventory.filter(i => i.includes("Bandage") || i.includes("Medkit") || i.includes("Stim"));
        if (healingItems.length === 0) {
            renderCombatScreen();
            contentEl.querySelector('div').insertAdjacentHTML('afterbegin', `<p style="color:#f88;">No healing items.</p>`);
            return;
        }
        clearContent();
        let itemsHTML = healingItems.map(item => `<span onclick="event.stopPropagation(); useCombatHeal('${item}')" style="display:block;color:#0f0; cursor:pointer; margin:5px;">► ${item}</span>`).join('');
        contentEl.innerHTML = `<div style="color:#ff0000; margin-bottom:10px;">SELECT ITEM</div>${itemsHTML}<span onclick="event.stopPropagation(); renderCombatScreen()" style="color:#ff0; cursor:pointer;">[ BACK ]</span>`;
    };

    window.useCombatHeal = function(item) {
        player.hp = Math.min(player.maxHp, player.hp + 20);
        player.inventory = player.inventory.filter(i => i !== item);
        updateHUD();
        renderCombatScreen();
        contentEl.querySelector('div').insertAdjacentHTML('afterbegin', `<p style="color:#0f0;">Used ${item}. +20 HP.</p>`);
    };

    // STATUS
    function showStatus() {
        playSound('click');
        clearContent();
        contentEl.innerHTML = `
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px;">STATUS</div>
            <pre style="color:#00ccff;">
NAME: Unknown Drifter
HP: ${player.hp}/${player.maxHp}
ENERGY: ${player.energy}/${player.maxEnergy}
SCRIP: ${player.money}  | BANK: ${player.bankBalance}
WEAPON: ${player.weapon.name} (DMG ${player.weapon.damage})
ARMOR: ${player.armor || 'None'}
LOCATION: ${player.currentLocation} (${player.currentDistrict}, ${player.currentCity})
            </pre>
        `;
    }

    // QUESTS
    function showQuests() {
        playSound('click');
        clearContent();
        if (player.quests.length === 0) {
            contentEl.innerHTML = `<div style="color:#ff0000; text-align:center; margin-bottom:12px;">QUESTS</div><p style="color:#ff8800;">No active quests.</p>`;
        } else {
            let html = `<div style="color:#ff0000; text-align:center; margin-bottom:12px;">QUESTS</div>`;
            player.quests.forEach((q, i) => {
                html += `<p style="color:#ffff00;">${i+1}. ${q.title}: ${q.description} [${q.status}]</p>`;
            });
            contentEl.innerHTML = html;
        }
    }

    // ==================== COMMS HUB ====================
    async function showComms() {
        playSound('click');
        clearContent();
        contentEl.innerHTML = `
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px;">COMMS</div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <span onclick="event.stopPropagation(); showMail()" style="cursor:pointer; color:#00ccff; border-bottom:2px solid #00ccff;">[ MAIL ]</span>
                <span onclick="event.stopPropagation(); showBank()" style="cursor:pointer; color:#00ccff;">[ BANK ]</span>
                <span onclick="event.stopPropagation(); showNews()" style="cursor:pointer; color:#00ccff;">[ NEWS ]</span>
            </div>
            <div id="comms-sub-content"></div>
        `;
        showMail(); // default
    }

    window.showMail = async function() {
        const sub = document.getElementById('comms-sub-content');
        if (!sub) return;
        const unreadCount = player.mailbox.filter(m => !m.read).length;
        let inboxHTML = '';
        if (player.mailbox.length === 0) {
            inboxHTML = '<p style="color:#ff8800;">Inbox empty.</p>';
        } else {
            inboxHTML = player.mailbox.map((m, i) => `
                <div style="margin:6px 0; cursor:pointer; color:${m.read?'#aaa':'#00ffcc'};" onclick="event.stopPropagation(); readMail(${i})">
                    <strong>${m.from}</strong> ${m.read ? '' : '(NEW)'} <span style="font-size:12px;">${m.time}</span><br>
                    <span style="color:#888;">${m.subject}</span>
                </div>
            `).join('');
        }
        sub.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="color:#ffff00;">INBOX (${unreadCount} unread)</span>
                <span onclick="event.stopPropagation(); showContactsForNewMessage()" style="cursor:pointer; color:#44ff44; text-decoration:underline;">[ NEW MESSAGE ]</span>
            </div>
            <hr style="border-color:#003366;">
            ${inboxHTML}
        `;
    };

    window.readMail = function(index) {
        const msg = player.mailbox[index];
        msg.read = true;
        clearContent();
        contentEl.innerHTML = `
            <div style="color:#ff0000; margin-bottom:10px;">MESSAGE</div>
            <p><strong>From:</strong> ${msg.from}</p>
            <p><strong>Subject:</strong> ${msg.subject}</p>
            <p style="color:#00ccff;">${msg.body}</p>
            <div style="margin-top:15px;">
                <span onclick="event.stopPropagation(); replyToMail('${msg.from}')" style="cursor:pointer; color:#ffff00;">[ REPLY ]</span> 
                <span onclick="event.stopPropagation(); showComms()" style="cursor:pointer; color:#ff0;">[ BACK ]</span>
            </div>
        `;
    };

    window.replyToMail = function(contactName) {
    // Look for the contact by name
    let contact = player.contacts.find(c => c.name === contactName);
    // If not found, create a new one and add it to the contacts list
    if (!contact) {
        contact = {
            id: 'contact_' + contactName.replace(/\s+/g, '_').toLowerCase(),
            name: contactName,
            personality: "A stranger met through messages.",
            history: []
        };
        player.contacts.push(contact);
    }
    // Now open the chat with the existing (or newly added) contact
    openChat(contact.id);
};

    window.showContactsForNewMessage = function() {
        clearContent();
        let contactsHTML = player.contacts.map(c => `<span onclick="event.stopPropagation(); openChat('${c.id}')" style="display:block;color:#00ffcc;cursor:pointer;margin:6px 0;">📟 ${c.name}</span>`).join('');
        contentEl.innerHTML = `
            <div style="color:#ff0000; margin-bottom:10px;">SELECT CONTACT</div>
            ${contactsHTML}
            <span onclick="event.stopPropagation(); showComms()" style="color:#ff0; cursor:pointer;">[ BACK ]</span>
        `;
    };

    window.openChat = function(contactId) {
        const contact = player.contacts.find(c => c.id === contactId);
        if (!contact) return;
        player.activeContact = contact;
        clearContent();
        const historyHTML = contact.history.map(m => {
            const sender = m.sender === 'player' ? 'You' : contact.name;
            const color = m.sender === 'player' ? '#ffff00' : '#00ccff';
            return `<p style="color:${color};">${sender}: ${m.text}</p>`;
        }).join('');
        contentEl.innerHTML = `
            <div style="color:#ff0000; text-align:center; margin-bottom:10px;">CHAT: ${contact.name}</div>
            <div id="chat-history" style="max-height:180px; overflow-y:auto; margin-bottom:10px;">${historyHTML}</div>
            <div>
                <input id="chat-input" class="chat-input-large" type="text" placeholder="Type your message...">
                <button onclick="sendMessage('${contactId}')" class="chat-btn-large" style="background:transparent; border:1px solid #ff0000; color:#ff0000; font-family:'VT323';">SEND</button>
            </div>
        `;
    };

    window.sendMessage = async function(contactId) {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;
        const contact = player.contacts.find(c => c.id === contactId);
        contact.history.push({ sender: 'player', text });
        const prompt = `You are ${contact.name}, ${contact.personality}. The player messaged: "${text}". Reply 1-2 sentences. Also maybe offer a quest? Return JSON: {"reply":"...", "offer_quest":true/false, "quest":{"title":"...","description":"...","reward":"..."}}`;
        const data = await callMistral(prompt, undefined, 1024);
        contact.history.push({ sender: 'contact', text: data.reply });
        if (data.offer_quest && data.quest) {
            player.quests.push({ ...data.quest, status: 'active', id: 'quest_'+Date.now() });
        }
        openChat(contactId);
    };

    // Bank
    window.showBank = async function() {
        const sub = document.getElementById('comms-sub-content');
        if (!sub) return;
        const investOptions = await getInvestmentOptions();
        sub.innerHTML = `
            <div style="color:#ffff00; margin-bottom:10px;">BANK OF THE SPRAWL</div>
            <p>Wallet: ${player.money} SCRIP | Account: ${player.bankBalance} SCRIP</p>
            <div style="margin:10px 0;">
                <input id="bank-amount" type="number" style="width:80px; background:#000; color:#0f0; border:1px solid #003366; font-family:'VT323';" value="10">
                <span onclick="event.stopPropagation(); depositMoney()" style="cursor:pointer; color:#0f0;">[ DEPOSIT ]</span>
                <span onclick="event.stopPropagation(); withdrawMoney()" style="cursor:pointer; color:#f88;">[ WITHDRAW ]</span>
            </div>
            <div style="margin-top:15px; color:#ff8800;">INVESTMENTS</div>
            ${investOptions.map(o => `<div style="margin:5px 0; cursor:pointer;" onclick="event.stopPropagation(); invest('${o.name}',${o.amount},${o.risk},${o.return})">${o.name} (Risk: ${o.risk}/10, Return: ${o.return}%) – Min. ${o.amount} SCRIP</div>`).join('')}
            ${player.investments.length ? '<hr>Active investments:' + player.investments.map(i => `<p>${i.name}: ${i.amount} SCRIP (${i.turnsLeft} cycles left)</p>`).join('') : ''}
        `;
    };

    async function getInvestmentOptions() {
        const prompt = `Generate 3 dystopian investment opportunities. Each with "name", "amount" (min investment, 50-200), "risk" (1-10), and "return" (expected % return, -50 to +200). Return JSON array.`;
        const data = await callMistral(prompt);
        return Array.isArray(data) ? data : [];
    }

    window.depositMoney = function() {
        const amt = parseInt(document.getElementById('bank-amount').value);
        if (amt > 0 && player.money >= amt) {
            player.money -= amt;
            player.bankBalance += amt;
            updateHUD();
            showBank();
        }
    };

    window.withdrawMoney = function() {
        const amt = parseInt(document.getElementById('bank-amount').value);
        if (amt > 0 && player.bankBalance >= amt) {
            player.bankBalance -= amt;
            player.money += amt;
            updateHUD();
            showBank();
        }
    };

    window.invest = function(name, amount, risk, ret) {
        if (player.bankBalance >= amount) {
            player.bankBalance -= amount;
            player.investments.push({ name, amount, risk, returnRate: ret, turnsLeft: 3 + Math.floor(Math.random()*5) });
            showBank();
        }
    };

    // News
    window.showNews = async function() {
        const sub = document.getElementById('comms-sub-content');
        if (!sub) return;
        sub.innerHTML = `<p style="color:#ffff00;">Loading news...</p>`;
        const prompt = `Generate 3 dystopian local news headlines with a brief description each. Return JSON: [{"headline":"...", "summary":"..."}]`;
        const news = await callMistral(prompt);
        let html = `<div style="color:#ff0000; margin-bottom:10px;">SPRAWL FEED</div>`;
        news.forEach(n => html += `<p><strong>${n.headline}</strong><br><span style="color:#888;">${n.summary}</span></p>`);
        sub.innerHTML = html;
    };

    // INVENTORY
    function showInventory() {
        playSound('click');
        clearContent();
        let items = player.inventory.length ? player.inventory.map((item,i) => `<p style="color:#00ffcc;">${i+1}. ${item} <span onclick="event.stopPropagation(); useItem('${item}')" style="color:#ffff00; cursor:pointer;">[USE]</span></p>`).join('') : '<p style="color:#ff8800;">Empty.</p>';
        contentEl.innerHTML = `
            <div style="color:#ff0000; text-align:center; margin-bottom:12px;">INVENTORY</div>
            ${items}
        `;
    }

    window.useItem = function(item) {
        if (item.includes("Bandage") || item.includes("Medkit") || item.includes("Stim")) {
            player.hp = Math.min(player.maxHp, player.hp + 20);
            player.inventory = player.inventory.filter(i => i !== item);
            updateHUD();
            showInventory();
            playSound('action');
        } else if (item.includes("Knife") || item.includes("Pipe") || item.includes("Blade")) {
            player.weapon = { name: item, damage: player.weapon.damage + 2 };
            player.inventory = player.inventory.filter(i => i !== item);
            updateHUD();
            showInventory();
            playSound('action');
        } else {
            contentEl.innerHTML += '<p style="color:#ff8800;">No immediate use.</p>';
        }
    };

    // TRAVEL
    async function showTravel() {
        playSound('click');
        clearContent();
        let cityOptions = '';
        for (let cityId in world.cities) {
            const city = world.cities[cityId];
            cityOptions += `<div style="margin-bottom:10px;"><span style="color:#ff0000;">${city.name}</span><br>`;
            for (let distId in city.districts) {
                const dist = city.districts[distId];
                const isCurrent = player.currentCity === cityId && player.currentDistrict === distId;
                cityOptions += `<span onclick="event.stopPropagation(); travelToDistrict('${cityId}','${distId}')" style="color:${isCurrent?'#00ff00':'#00ccff'}; cursor:pointer; margin-left:10px;">${isCurrent?'► ':''}${dist.name} (Danger ${dist.danger})</span><br>`;
            }
            cityOptions += `</div>`;
        }
        contentEl.innerHTML = `
            <div style="color:#ff0000; text-align:center; margin-bottom:12px;">TRAVEL MAP</div>
            ${cityOptions}
            <p style="color:#ffff00; margin-top:10px;">Click a district to move (costs Energy)</p>
        `;
    }

    window.travelToDistrict = async function(cityId, distId) {
        if (player.energy < 10) {
            playSound('error');
            contentEl.innerHTML += '<p style="color:#ff0000;">Not enough energy.</p>';
            return;
        }
        player.energy -= 10;
        player.currentCity = cityId;
        player.currentDistrict = distId;
        const dist = world.cities[cityId].districts[distId];
        player.currentLocation = dist.locations[Math.floor(Math.random() * dist.locations.length)];
        locationDescriptions = {};
        updateHUD();
        playSound('travel');
        // Chance to receive random mail after travel
        if (Math.random() < 0.4) await generateRandomMail();
        // Process investments
        player.investments = player.investments.filter(inv => {
            inv.turnsLeft--;
            if (inv.turnsLeft <= 0) {
                const profit = Math.floor(inv.amount * (inv.returnRate/100));
                player.bankBalance += inv.amount + profit;
                return false;
            }
            return true;
        });
        await showMainScreen();
    };

    async function generateRandomMail() {
        const prompt = `Create a short in-character message from a random NPC in the city (not a contact). Give a "from" name, "subject", and "body" (2 sentences). Return JSON.`;
        const mail = await callMistral(prompt);
        player.mailbox.unshift({
            from: mail.from,
            subject: mail.subject,
            body: mail.body,
            time: new Date().toLocaleTimeString(),
            read: false
        });
    }

    // Game start
    async function startGame() {
        updateHUD();
        await showMainScreen();
    }

    // Event listeners
    document.getElementById('btn-view-map').addEventListener('click', () => { if(gameReady) doSearch(); });
    document.getElementById('btn-bio-link').addEventListener('click', () => { if(gameReady) showStatus(); });
    document.getElementById('btn-data-chip').addEventListener('click', () => { if(gameReady) showQuests(); });
    document.getElementById('btn-action').addEventListener('click', () => { if(gameReady) showComms(); });
    document.getElementById('btn-inventory').addEventListener('click', () => { if(gameReady) showInventory(); });
    document.getElementById('btn-travel').addEventListener('click', () => { if(gameReady) showTravel(); });

    contentEl.addEventListener('click', (e) => {
        if (e.target === contentEl) showMainScreen();
    });

    document.body.addEventListener('click', initAudio, {once: true});

    apiSaveBtn.addEventListener('click', async () => {
        const key = apiInput.value.trim();
        if (!key) return;
        MISTRAL_API_KEY = key;
        localStorage.setItem('mistral_key', key);
        apiModal.style.display = 'none';
        gameReady = true;
        startGame();
    });

    if (MISTRAL_API_KEY) {
        apiModal.style.display = 'none';
        gameReady = true;
        startGame();
    } else {
        apiModal.style.display = 'flex';
    }
</script>
</body>
</html>
