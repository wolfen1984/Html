<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>BLACK MOUNTAIN · HELLRAISER · 1987</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Special+Elite&family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&family=Audiowide&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #020205;
            --screen-bg: #06060c;
            --panel-bg: #080812;
            --text: #d0d0e0;
            --text-dim: #5a5a70;
            --text-bright: #f0f0f8;
            --accent: #cc2244;
            --accent-dim: #440011;
            --accent2: #884466;
            --accent2-dim: #220011;
            --border: #1a1a2e;
            --border-glow: 0 0 10px #cc224444, 0 0 24px #cc224422;
            --border-glow2: 0 0 10px #88446644, 0 0 24px #88446622;
            --neon-white: #e8e8f8;
            --neon-white-glow: 0 0 8px #ffffff66, 0 0 20px #ffffff22;
            --danger: #ff2244;
            --danger-glow: 0 0 12px #ff224444;
            --amber: #cc8844;
            --amber-dim: #442200;
            --gold: #ccaa44;
            --gold-dim: #332200;
            --green: #22cc66;
            --input-bg: #0c0c18;
            --button-bg: #0e0e1a;
            --button-hover: #14142a;
            --button-active: #0c0c16;
            --bevel-light: #1e1e34;
            --bevel-dark: #020208;
            --font-display: 'Orbitron', 'Audiowide', sans-serif;
            --font-title: 'Audiowide', 'Orbitron', sans-serif;
            --font-mono: 'Share Tech Mono', 'Rajdhani', 'Courier New', monospace;
            --font-body: 'VT323', 'Rajdhani', 'Courier New', monospace;
            --scanline-opacity: 0.04;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 24px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #08080e 0%, #000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #0c0c16;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #1a1a2a, 0 0 0 4px #080810, 0 0 0 8px #040406, 0 8px 48px #000000dd, 0 0 40px #cc224418, 0 0 80px #88446610;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #1a1a2e;
        }
        @media (max-width:540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #04040a;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #cc2244;
            border-radius: 50%;
            box-shadow: 0 0 10px #cc2244cc, 0 0 22px #cc224455, 0 0 40px #cc224422;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% { box-shadow: 0 0 10px #cc2244cc, 0 0 22px #cc224455; }
            50% { box-shadow: 0 0 18px #cc2244ee, 0 0 36px #cc224488, 0 0 50px #cc224433; }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #3a3a50;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #1a1a2e;
            box-shadow: var(--border-glow), var(--border-glow2), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width:540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.7), inset 0 0 12px rgba(0, 0, 0, 0.45);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.65) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% { opacity: 1 }
            99.4% { opacity: 0.6 }
            99.5% { opacity: 0.9 }
            99.6% { opacity: 0.45 }
            99.7% { opacity: 1 }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #04040c;
            border-bottom: 2px solid #cc224444;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #0a0a18;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #1a1a2e;
            border-radius: 2px;
            padding: 10px 14px;
            background: #020208;
            position: relative;
            box-shadow: inset 0 0 24px #cc224410, 0 0 16px #cc224418;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #cc2244;
            box-shadow: 0 0 14px #cc2244aa, 0 0 30px #cc224444;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #88446644;
            box-shadow: 0 0 8px #88446644;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #e8e8f8;
            text-shadow: 0 0 20px #ffffff88, 0 0 40px #cc224466, 0 2px 4px #000, 0 0 60px #cc224433;
            letter-spacing: 3px;
            font-family: var(--font-title);
            line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #aa8899;
            letter-spacing: 5px;
            margin-top: 3px;
            text-shadow: 0 0 6px #cc224444;
        }
        @media (max-width:400px) {
            .marquee-title {
                font-size: 18px;
                letter-spacing: 1px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #1a1a2e #06060c;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #06060c;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #1a1a2e;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #1e1e34;
            border-top-color: #282844;
            border-left-color: #24243c;
            border-right-color: #161628;
            border-bottom-color: #0c0c18;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
            text-shadow: 0 0 4px #ffffff33;
        }
        .btn:active {
            border-top-color: #161628;
            border-left-color: #161628;
            border-bottom-color: #282844;
            border-right-color: #24243c;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #0c0c16;
        }
        .btn.accent {
            background: #0a0a1a;
            border-color: #3a1a2a;
            border-top-color: #552244;
            border-left-color: #441d38;
            border-right-color: #281020;
            border-bottom-color: #140818;
            color: #ffccee;
            box-shadow: 0 2px 0 #00000044, 0 0 12px #cc224433;
            text-shadow: 0 0 8px #cc224488;
        }
        .btn.accent:active {
            border-top-color: #281020;
            border-left-color: #281020;
            border-bottom-color: #552244;
            border-right-color: #441d38;
            box-shadow: 0 0px 0 #00000044, 0 0 20px #cc224466;
        }
        .btn.accent2 {
            background: #1a0a14;
            border-color: #3a1a2e;
            border-top-color: #552244;
            border-left-color: #441d38;
            border-right-color: #281020;
            border-bottom-color: #140818;
            color: #ffccee;
            box-shadow: 0 2px 0 #00000044, 0 0 12px #88446633;
            text-shadow: 0 0 8px #88446688;
        }
        .btn.accent2:active {
            border-top-color: #281020;
            border-left-color: #281020;
            border-bottom-color: #552244;
            border-right-color: #441d38;
            box-shadow: 0 0px 0 #00000044, 0 0 20px #88446666;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .mountain-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #060610;
            border: 2px solid #1a1a2e;
            padding: 15px;
            border-radius: 3px;
            box-shadow: 0 0 20px #cc224415, 0 0 40px #88446610;
            position: relative;
        }
        .mountain-stage::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #cc224466, #cc2244aa, #cc224466, transparent);
            z-index: 2;
            pointer-events: none;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #1a1a2e;
            box-shadow: 0 0 22px #cc224444, 0 0 40px #cc224418, 0 0 0 2px #0a0a18;
            object-fit: cover;
            flex-shrink: 0;
            background: #080812;
        }
        .speech-bubble {
            flex: 1;
            background: #0a0a16;
            border: 2px solid #1a1a2e;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #d0d0e0;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: inset 0 0 20px #00000055, 0 0 12px #cc224415;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #1a1a2e88 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #080812;
            border: 1px solid #1a1a2e;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #0e0e1a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5a5a70;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% { opacity: 0.4 }
            50% { opacity: 1 }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #1a1a2e;
            box-shadow: 0 0 20px #cc224433, 0 0 30px #88446618, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #080812;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(2, 2, 6, 0.8) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 13px;
            letter-spacing: 3px;
            color: #e8e8f8;
            text-shadow: 0 0 10px #ffffffcc, 0 0 30px #cc224488, 0 2px 4px #000000, 0 0 60px #cc224433;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom, rgba(4, 4, 10, 0.9) 0%, rgba(4, 4, 10, 0.7) 40%, transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 14px;
            letter-spacing: 1.5px;
            color: #eeccee;
            text-shadow: 0 0 8px #cc448888, 0 0 20px #88446644, 0 2px 4px #000000;
            background: linear-gradient(to top, rgba(2, 2, 6, 0.9) 0%, rgba(2, 2, 6, 0.6) 50%, transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5a5a70;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width:480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 10px;
                letter-spacing: 2px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 11px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #1a1a2e;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #c8d0d8;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 16px;
            text-shadow: 0 0 10px #cc224444;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #080814;
            border: 1px solid #1a1a2e;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #cc2244;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #d0d8e0;
        }
        .guide-desc {
            font-size: 14px;
            color: #5a5a70;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0a0a16;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #1a1a2e;
            box-shadow: var(--border-glow), var(--border-glow2), 0 0 80px #000000dd;
            color: #c8c8d8;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #0e0e1a;
            border: 2px solid #1a1a2e88;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #c8c8d8;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #cc2244;
            box-shadow: 0 0 14px #cc224444;
        }
        .loading-text {
            color: #cc8844;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% { opacity: 0 }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #030308;
            border-top: 1px solid #1a1a2e44;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #3a3a50;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #4a4a60;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #141420;
            color: #4a4a60;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #3a3a50;
            color: #6a6a80;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #d0d0e0;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width:480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
        .score-indicator {
            font-family: var(--font-mono);
            font-size: 10px;
            color: #aa8899;
            letter-spacing: 1px;
            padding: 3px 8px;
            border: 1px solid #2a1a2a;
            border-radius: 2px;
            display: inline-block;
            background: #080810;
            margin-top: 4px;
        }
        .score-indicator .active {
            color: #cc2244;
        }
        .score-indicator .dim {
            color: #4a3a4a;
        }
        .progress-bar {
            width: 100%;
            height: 2px;
            background: #1a1a2a;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #cc2244;
            border-radius: 2px;
            transition: width 0.3s;
            box-shadow: 0 0 10px #cc224444;
        }
        .hellraiser-tag {
            font-family: var(--font-display);
            font-size: 8px;
