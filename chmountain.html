            // ─── STORY & SCORE GENERATION ──────────────────────────────────────────
            async function generateNewMountainStory() {
                const locations = ['Hunting Cabin', 'Fire Lookout', 'Logging Camp', 'Mountain Town',
                    'Ranger Station', 'Abandoned Mine', 'Frozen Lake', 'Forest Road',
                    'Remote Farm', 'Ski Lodge', 'Logging Road', 'Mountain Pass',
                    'Old Mill', 'Campground', 'River Crossing'
                ];
                const location = locations[Math.floor(Math.random() * locations.length)];
                const system =
                    `You are Silas Crane, a grizzled former Search & Rescue ranger who broadcasts stories from a fire lookout on Black Mountain. Your tales are grounded, brutal, and told with the weight of someone who's seen too much. The score is in the key of Christopher Young — dark, dissonant, orchestral.`;
                const prompt =
                    `Write a 900 to 1100 word short story set in the 1980s on Black Mountain, centered on this location: ${location}. Use tight third-person prose. No sound cues, no radio script, just pure narrative. STRICT RULES: No supernatural elements—no ghosts, curses, magic, or dreams. The horror must be purely human, focusing on desperation, greed, hidden secrets, and the brutal choices people make when they think the wilderness will hide their sins. Inspired by Hellraiser (1987) in tone — visceral, unflinching, with a sense of dread that builds from within. Structure: a grounded setup at the location, a scheme or conflict born from human weakness, a brutal unflinching execution, and an ironic twist where the protagonist's choices lead to a physical or psychological prison. No dream cop-outs. Frame the story with Silas's weary intro mentioning the location and the isolation, and close with his cold, knowing sign-off. Return ONLY a valid JSON object with these fields: title (string), story (full narration string, use \\n for line breaks), closing_remark (the chilling sign-off phrase). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: prompt }
                ], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) {
                    throw new Error('Invalid story structure');
                }
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Mountain wilderness scene at ${location}, 1980s cinematic thriller, Hellraiser horror aesthetic, dark orchestral mood, grainy 35mm film, Christopher Young style`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate poster:', e); }
                gameState.currentPerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null,
                    location: location
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system =
                    `You are a sound designer for a Hellraiser-style orchestral horror score (Christopher Young, 1987). Given a short story, return JSON with THREE keys:
            - "sections": array of 5-7 sections dividing the story into emotional acts. Each has "theme" (one of: prologue, descent, revelation, torment, ritual, crescendo, closing), "start_char" (inclusive), "end_char" (exclusive). Cover entire story from 0 to ${length}.
            - "cues": array of sound events using types: "pad", "string_pad", "cello_drone", "cluster_dark", "swell_dissonant", "brass_stab", "timpani", "pizzicato", "bass", "sting", "pulse", "thunder", "bell", "climax", "kick", "snare", "hat". Include at least 40 cues spread evenly. Use orchestral, dissonant, dark instruments.
            - "score": object with keys matching theme names. Each key: "bpm" (40-75, slow and brooding), "bass" (array of 8 integers 0-24, use minor 2nds, tritones, cluster voicings), "kick" (array of 8 integers 0/1), "snare" (array of 8 integers 0/1), "hat" (array of 8 integers 0/1).
            Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and Hellraiser-style score patterns.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: userPrompt }
                ], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try { data = JSON.parse(cleaned); } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) { const candidate = match[0].replace(/,\s*([}\]])/g, '$1'); try { data =
                            JSON.parse(candidate); } catch (e2) { throw new Error(
                            'Failed to parse AI soundtrack JSON.'); } } else throw new Error(
                        'No JSON found in AI response.');
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !==
                    'object')
                    throw new Error('Missing sections, cues, or score in AI response');
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1]
                    .end_char < length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({ type: c.type, position: Math.min(c.position, length -
                        1), intensity: c.intensity || 0.7 }));

                const requiredThemes = ['prologue', 'descent', 'revelation', 'torment', 'ritual', 'crescendo',
                    'closing'
                ];
                const score = {};

                function normalizeArray(arr, maxVal = 24) {
                    if (!Array.isArray(arr)) throw new Error('Expected array, got ' + typeof arr);
                    let clean = arr.map(v => { const num = Number(v); return isNaN(num) ? 0 : Math
                            .min(maxVal, Math.max(0, Math.round(num))); });
                    if (clean.length < 8) { while (clean.length < 8) clean.push(0); } else if (clean
                        .length > 8) { clean = clean.slice(0, 8); }
                    return clean;
                }

                for (const theme of requiredThemes) {
                    if (!data.score[theme]) throw new Error(
                        `AI did not provide a score for theme "${theme}". Cannot continue.`);
                    const s = data.score[theme];
                    if (typeof s.bpm !== 'number' || s.bpm < 30 || s.bpm > 120) {
                        throw new Error(`Invalid bpm for theme "${theme}": ${s.bpm}`);
                    }
                    const bass = normalizeArray(s.bass, 24);
                    const kick = normalizeArray(s.kick, 1);
                    const snare = normalizeArray(s.snare, 1);
                    const hat = normalizeArray(s.hat, 1);
                    score[theme] = { bpm: s.bpm, bass, kick, snare, hat };
                }
                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {
                await generateNewMountainStory();
                if (!gameState.currentPerformance) throw new Error('Failed to generate story');
                const soundtrack = await generateSoundCueSheet(gameState.currentPerformance.rawStoryText);
                gameState.currentPerformance.soundCues = soundtrack;
                saveState();
                await startHellraiserPerformance();
            }

            // ─── PERFORMANCE ──────────────────────────────────────────────────────
            async function startHellraiserPerformance() {
                speechSynthesis.cancel();
                if (window.bmTimeout) clearTimeout(window.bmTimeout);
                const storyData = gameState.currentPerformance;
                if (!storyData || !storyData.story) { await generateNewMountainStory(); return startHellraiserPerformance(); }

                await getAudioContext();

                let sectionList = null,
                    cueList = null,
                    scoreData = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) {
                        cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                    } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                        sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                        scoreData = storyData.soundCues.score;
                    }
                }
                const bubble = document.getElementById('bmSpeechBubble');
                const dialogue = document.getElementById('bmDialogue');
                const imageEl = document.getElementById('bmSegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('bmGuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#cc224444';
                bubble.style.boxShadow = '0 0 30px #cc224430, 0 0 50px #88446615';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('bmBackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('bmAddEpisodeBtn');
                if (oldAdd) oldAdd.remove();
                const posterContainer = document.getElementById('bmPosterContainer');
                const posterTitle = document.getElementById('bmPosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) posterTitle.textContent = storyData.title || '';
                } else if (posterContainer) posterContainer.classList.add('no-image');

                const loc = storyData.location || 'the mountain';
                const intro =
                    `"This is Black Mountain Radio. Silas Crane here, up at the lookout. Wind's picking up from the north ridge. Nights like this, I think about the ${loc}... and what happened there. Let me tell you about '${storyData.title}'."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 48);
                await new Promise(r => setTimeout(r, 1500));

                let indicatorInterval = setInterval(() => {
                    if (patternPlayerActive) {
                        const theme = patternPlayerActive.theme || 'prologue';
                        const varIdx = currentVariationIdx;
                        const varName = currentSectionPatterns[varIdx] ? currentSectionPatterns[
                            varIdx].name : 'A';
                        const bar = barsInVariation + 1;
                        updateScoreIndicator(theme, varName, bar);
                    } else {
                        updateScoreIndicator('...', '—', 0);
                    }
                }, 1000);

                if (sectionList && sectionList.length > 0) {
                    transitionSectionTheme(sectionList[0].theme, scoreData);
                } else if (scoreData) {
                    transitionSectionTheme('prologue', scoreData);
                }

                const storyText = storyData.rawStoryText || storyData.story;
                if (!storyText) {
                    console.warn('No story text to speak/type');
                    await finishHellraiserPerformance(storyData, dialogue, indicatorInterval);
                    return;
                }

                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b
                        .start_char) : [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx]
                            .start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) {
                                currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme, scoreData);
                            }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) {
                                triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity);
                            }
                            cueIdx++;
                        }
                    };
                }

                dialogue.textContent = '';
                const typingPromise = typewriterEffect(dialogue, storyText, 30, cueChecker);
                const speechPromise = speakTextMale(storyText);
                await speechPromise;
                await typingPromise;
                await finishHellraiserPerformance(storyData, dialogue, indicatorInterval);
            }

            async function finishHellraiserPerformance(storyData, dialogue, indicatorInterval) {
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#c8d0d8';
                dialogue.appendChild(closingLine);
                const closingSpeech = speakTextMale(closing);
                const closingTyping = typewriterEffect(closingLine, closing, 42);
                await Promise.all([closingSpeech, closingTyping]);
                await new Promise(r => setTimeout(r, 1000));

                const curtainText = document.createElement('p');
                curtainText.textContent = '— Signal fades —';
                stopSectionAmbient();
                stopPatternPlayer();
                clearInterval(indicatorInterval);
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                curtainText.style.color = '#5a5a70';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();

                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Back to Tower';
                leaveBtn.addEventListener('click', () => { leaveMountain(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'bmAddEpisodeBtn';
                addBtn.textContent = '➕ Save Broadcast';
                addBtn.addEventListener('click', () => { addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Saved'; });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.currentPerformance;
                if (!perf) return;
                gameState.episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf
                    .soundCues });
                saveState();
                setTimeout(() => leaveMountain(), 600);
            }

            function leaveMountain() {
                stopAmbient();
                stopSectionAmbient();
                stopPatternPlayer();
                const indicator = document.getElementById('scoreIndicator');
                if (indicator) indicator.style.display = 'none';
                renderMountainPanel();
            }

            // ─── INIT ──────────────────────────────────────────────────────────────
            function init() {
                loadState();
                renderMountainPanel();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) { apiKey = key;
                        localStorage.setItem('black_mountain_hellraiser_key', key); }
                });
                document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e
                        .currentTarget) closeModal(); });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) showModal(HOST_BIO);
                });
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
                if (!apiKey) setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                document.addEventListener('click', () => { getAudioContext().catch(() => {}); }, { once: true });
            }
            init();
        })();
    </script>
</body>
</html>
