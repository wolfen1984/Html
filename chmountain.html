    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('black_mountain_hellraiser_key') || '';

            const DEFAULT_STATE = { episodes: [], currentPerformance: null, imageCooldownUntil: 0 };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;',
                    '>': '&gt;', "'": '&#39;', '"': '&quot;'
                })[m]);

            const HOST_BIO = `
        <h2>🏔️ Silas Crane</h2>
        <p style="text-align:left;">
            <strong>Broadcast:</strong> <em>Black Mountain Radio · Hellraiser</em><br>
            <strong>Bio:</strong> Thirty years with Black Mountain Search & Rescue. Silas Crane has found lost hikers, recovered bodies from avalanche chutes, and sat through more winter nights than any man should. Now he operates a ham radio from an old fire lookout at 8,400 feet, broadcasting stories the Forest Service would rather forget. His voice carries the weight of the mountain—slow, deliberate, and honest as a headlamp in a snowstorm. The score: dark, dissonant, orchestral — in the key of Christopher Young.
        </p>
    `;

            // ─── HELLRAISER AUDIO ENGINE ──────────────────────────────────────────
            let audioCtx = null;
            let ambientSource = null,
                ambientGain = null,
                ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null,
                masterGain = null,
                dryGain = null,
                wetGain = null;
            let sectionAmbientActive = null,
                stringAmbientActive = null;
            let crossfadeTimeout = null,
                tapeWarbleNode = null,
                masterCompressor = null;

            let patternPlayerActive = null,
                patternPlayerTimeout = null;
            let patternStep = 0,
                patternBPM = 50;
            let currentSectionPatterns = [];
            let currentVariationIdx = 0,
                barsInVariation = 0;
            let fillActive = false;
            let sectionThemeScore = null;

            // ─── HELLRAISER THEMES (Christopher Young, 1987) ──────────────────────
            const HELLRAISER_THEMES = {
                prologue: { rootFreq: 40, detuneSpread: 18, filterBase: 90, lfoRate: 0.04, noiseMix: 0.12,
                    intensity: 0.20, stringLayer: 'cello_drone', stringFreq: 38, stringIntensity: 0.22 },
                descent: { rootFreq: 42, detuneSpread: 22, filterBase: 80, lfoRate: 0.06, noiseMix: 0.25,
                    intensity: 0.30, stringLayer: 'cluster_dark', stringFreq: 40, stringIntensity: 0.32 },
                revelation: { rootFreq: 45, detuneSpread: 26, filterBase: 70, lfoRate: 0.08, noiseMix: 0.35,
                    intensity: 0.40, stringLayer: 'swell_dissonant', stringFreq: 44, stringIntensity: 0.38 },
                torment: { rootFreq: 38, detuneSpread: 30, filterBase: 60, lfoRate: 0.10, noiseMix: 0.45,
                    intensity: 0.50, stringLayer: 'cluster_dark', stringFreq: 36, stringIntensity: 0.48 },
                ritual: { rootFreq: 44, detuneSpread: 24, filterBase: 75, lfoRate: 0.07, noiseMix: 0.30,
                    intensity: 0.42, stringLayer: 'cello_drone', stringFreq: 42, stringIntensity: 0.40 },
                crescendo: { rootFreq: 40, detuneSpread: 32, filterBase: 55, lfoRate: 0.12, noiseMix: 0.55,
                    intensity: 0.60, stringLayer: 'swell_dissonant', stringFreq: 38, stringIntensity: 0.55 },
                closing: { rootFreq: 38, detuneSpread: 14, filterBase: 100, lfoRate: 0.03, noiseMix: 0.08,
                    intensity: 0.15, stringLayer: 'cello_drone', stringFreq: 36, stringIntensity: 0.16 }
            };

            // ─── HELPER: expandPattern ────────────────────────────────────────────
            function expandPattern(arr) {
                if (!Array.isArray(arr)) { arr = [0, 0, 0, 0, 0, 0, 0, 0]; }
                arr = arr.map(x => typeof x === 'number' ? x : 0);
                return arr.flatMap(x => [x, x]);
            }

            // ─── KEEP ALIVE ─────────────────────────────────────────────────────────
            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.0005;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            function ensureAudioNodes(ctx) {
                if (!masterGain) {
                    masterGain = ctx.createGain();
                    masterGain.gain.value = 0.20;
                    masterCompressor = ctx.createDynamicsCompressor();
                    masterCompressor.threshold.value = -28;
                    masterCompressor.knee.value = 30;
                    masterCompressor.ratio.value = 12;
                    masterCompressor.attack.value = 0.005;
                    masterCompressor.release.value = 0.35;
                    masterGain.connect(masterCompressor);
                    masterCompressor.connect(ctx.destination);
                }
                if (!dryGain) {
                    dryGain = ctx.createGain();
                    dryGain.gain.value = 0.70;
                    dryGain.connect(masterGain);
                }
                if (!wetGain) {
                    wetGain = ctx.createGain();
                    wetGain.gain.value = 0.60;
                    if (reverbNode) wetGain.connect(reverbNode);
                    else wetGain.connect(masterGain);
                }
                if (!reverbNode) {
                    initReverb(ctx);
                    if (reverbNode) wetGain.connect(reverbNode);
                }
                if (tapeWarbleNode) tapeWarbleNode.connect(masterGain.gain);
            }

            async function getAudioContext() {
                try {
                    if (!audioCtx) {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                        createKeepAlive(audioCtx);
                        initReverb(audioCtx);
                        initTapeWarble(audioCtx);
                        ensureAudioNodes(audioCtx);
                    }
                    if (audioCtx.state === 'suspended') await audioCtx.resume();
                    ensureAudioNodes(audioCtx);
                    return audioCtx;
                } catch (err) { console.error('Audio context error:', err);
                    throw err; }
            }

            // ─── REVERB ─────────────────────────────────────────────────────────────
            function initReverb(ctx) {
                if (reverbNode) return;
                try {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 4.5;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.85));
                        const lateDecay = Math.exp(-i / (sampleRate * 3.0)) * 0.35;
                        left[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                        right[i] = (Math.random() * 2 - 1) * (decay + lateDecay);
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                    if (masterGain) reverbNode.connect(masterGain);
                } catch (err) {
                    console.warn('Reverb init error:', err);
                    reverbNode = ctx.createGain();
                    reverbNode.gain.value = 0.5;
                    if (masterGain) reverbNode.connect(masterGain);
                }
            }

            function initTapeWarble(ctx) {
                if (tapeWarbleNode) return;
                try {
                    tapeWarbleNode = ctx.createGain();
                    tapeWarbleNode.gain.value = 0;
                    const lfo = ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.12;
                    const lfoGain = ctx.createGain();
                    lfoGain.gain.value = 0.015;
                    const lfo2 = ctx.createOscillator();
                    lfo2.type = 'sine';
                    lfo2.frequency.value = 0.19;
                    const lfo2Gain = ctx.createGain();
                    lfo2Gain.gain.value = 0.010;
                    lfo.connect(lfoGain);
                    lfo2.connect(lfo2Gain);
                    lfoGain.connect(tapeWarbleNode.gain);
                    lfo2Gain.connect(tapeWarbleNode.gain);
                    lfo.start(0);
                    lfo2.start(0);
                    tapeWarbleNode._lfos = [lfo, lfo2];
                } catch (err) { console.warn('Tape warble init error:', err); }
            }

            // ─── HELLRAISER STRING INSTRUMENTS ────────────────────────────────────

            // Cello drone — dark, low, brooding
            function createCelloDrone(ctx, frequency, duration, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.22, now + 2.5);
                    gainNode.gain.setValueAtTime(intensity * 0.22, now + duration - 2.5);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1.5);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 220;
                    filter.Q.value = 4;
                    const oscs = [];
                    for (let i = 0; i < 3; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = i === 0 ? 'triangle' : 'sawtooth';
                        const detune = (i - 1) * 5;
                        osc.frequency.value = frequency * Math.pow(2, detune / 1200);
                        const vibrato = ctx.createOscillator();
                        vibrato.type = 'sine';
                        vibrato.frequency.value = 2.0 + i * 1.0;
                        const vibratoGain = ctx.createGain();
                        vibratoGain.gain.value = 1.5 + i;
                        vibrato.connect(vibratoGain);
                        vibratoGain.connect(osc.frequency);
                        oscs.push(osc, vibrato);
                        osc.connect(filter);
                    }
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.70;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    oscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1.5); });
                } catch (err) { console.warn('Cello drone error:', err); }
            }

            // Dark cluster — dissonant, atonal, Hellraiser signature
            function createDarkCluster(ctx, frequencies, duration, intensity = 0.55) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.20, now + 2.0);
                    gainNode.gain.setValueAtTime(intensity * 0.20, now + duration - 2.0);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1.5);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 500;
                    filter.Q.value = 1.5;
                    const allOscs = [];
                    // Add intentional detuning for cluster effect
                    const detunes = [-12, -7, -4, 0, 3, 7, 12, 16];
                    frequencies.forEach((f, idx) => {
                        const det = detunes[idx % detunes.length] || 0;
                        const osc = ctx.createOscillator();
                        osc.type = idx < 4 ? 'sawtooth' : 'triangle';
                        osc.frequency.value = f * Math.pow(2, det / 1200);
                        // Random micro-detuning
                        const microLfo = ctx.createOscillator();
                        microLfo.type = 'sine';
                        microLfo.frequency.value = 0.2 + Math.random() * 0.8;
                        const microGain = ctx.createGain();
                        microGain.gain.value = 2 + Math.random() * 5;
                        microLfo.connect(microGain);
                        microGain.connect(osc.frequency);
                        allOscs.push(osc, microLfo);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.65;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    allOscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1.5); });
                } catch (err) { console.warn('Dark cluster error:', err); }
            }

            // Dissonant swell — Young's signature: minor 2nds, tritones
            function createDissonantSwell(ctx, targetFreq, duration, intensity = 0.6) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0.001, now);
                    gainNode.gain.exponentialRampToValueAtTime(intensity * 0.35, now + duration * 0.5);
                    gainNode.gain.setValueAtTime(intensity * 0.35, now + duration * 0.7);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1.5);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(100, now);
                    filter.frequency.exponentialRampToValueAtTime(1600, now + duration * 0.5);
                    filter.Q.value = 2.5;
                    const oscs = [];
                    // Dissonant intervals: minor 2nd, tritone, minor 7th
                    const intervals = [0, 1, 6, 10, 13, 18];
                    intervals.forEach(interval => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        const baseFreq = targetFreq * Math.pow(2, interval / 12);
                        osc.frequency.value = baseFreq * 0.98;
                        osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.02, now + duration * 0.7);
                        oscs.push(osc);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.75;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    oscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1.5); });
                } catch (err) { console.warn('Dissonant swell error:', err); }
            }

            // String pad — orchestral, dark
            function createHellraiserPad(ctx, rootFreq, duration, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.14, now + 2.0);
                    gainNode.gain.setValueAtTime(intensity * 0.14, now + duration - 2.5);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + duration + 1.0);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 350 + intensity * 300;
                    filter.Q.value = 2.0;
                    const filterLfo = ctx.createOscillator();
                    filterLfo.type = 'sine';
                    filterLfo.frequency.value = 0.035;
                    const filterLfoGain = ctx.createGain();
                    filterLfoGain.gain.value = 60;
                    filterLfo.connect(filterLfoGain);
                    filterLfoGain.connect(filter.frequency);
                    const allOscs = [];
                    // Orchestral voicing: low strings
                    const voicing = [0, 3, 7, 12, 15, 19, 24];
                    voicing.forEach(interval => {
                        const osc = ctx.createOscillator();
                        osc.type = interval < 12 ? 'sawtooth' : 'triangle';
                        const f = rootFreq * Math.pow(2, interval / 12);
                        osc.frequency.value = f * (1 + (Math.random() - 0.5) * 0.005);
                        const vib = ctx.createOscillator();
                        vib.type = 'sine';
                        vib.frequency.value = 3.0 + Math.random() * 3.0;
                        const vibG = ctx.createGain();
                        vibG.gain.value = 1.5 + Math.random() * 3.0;
                        vib.connect(vibG);
                        vibG.connect(osc.frequency);
                        allOscs.push(osc, vib);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                    const drySend = ctx.createGain();
                    drySend.gain.value = 0.30;
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.75;
                    gainNode.connect(drySend);
                    gainNode.connect(wetSend);
                    drySend.connect(dryGain || ctx.destination);
                    wetSend.connect(wetGain || ctx.destination);
                    allOscs.forEach(o => { o.start(now);
                        o.stop(now + duration + 1.5); });
                    filterLfo.start(now);
                    filterLfo.stop(now + duration + 1.5);
                } catch (err) { console.warn('Hellraiser pad error:', err); }
            }

            // Percussive hits — timpani-like, dramatic
            function createTimpaniHit(ctx, intensity = 0.6) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.9, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(80, now);
                    osc.frequency.exponentialRampToValueAtTime(35, now + 0.25);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'triangle';
                    osc2.frequency.setValueAtTime(160, now);
                    osc2.frequency.exponentialRampToValueAtTime(70, now + 0.2);
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.3;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 150;
                    filter.Q.value = 1.5;
                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + 0.4);
                    osc2.stop(now + 0.4);
                } catch (err) { console.warn('Timpani hit error:', err); }
            }

            // Brass stab — dark, ominous
            function createBrassStab(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.3, now + 0.05);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(70, now);
                    osc.frequency.exponentialRampToValueAtTime(200, now + 0.2);
                    osc.frequency.exponentialRampToValueAtTime(55, now + 1.5);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'square';
                    osc2.frequency.setValueAtTime(140, now);
                    osc2.frequency.exponentialRampToValueAtTime(400, now + 0.15);
                    osc2.frequency.exponentialRampToValueAtTime(110, now + 1.5);
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.25;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 400;
                    filter.Q.value = 3;
                    osc.connect(filter);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(filter);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.5;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + 1.8);
                    osc2.stop(now + 1.8);
                } catch (err) { console.warn('Brass stab error:', err); }
            }

            // Pizzicato — sharp, uneasy
            function createHellraiserPizzicato(ctx, frequency, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.45, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.0005, now + 0.3);
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = frequency;
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'sine';
                    osc2.frequency.value = frequency * 2.01;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.12;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(2500, now);
                    filter.frequency.exponentialRampToValueAtTime(350, now + 0.25);
                    filter.Q.value = 2;
                    osc.connect(filter);
                    osc2Gain.connect(filter);
                    osc2.connect(osc2Gain);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.4;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + 0.35);
                    osc2.stop(now + 0.35);
                } catch (err) { console.warn('Pizzicato error:', err); }
            }

            // Bass note — low, rumbling
            function createBassNote(ctx, semitone, intensity = 0.5, duration = 2.0, rootFreq = 40) {
                try {
                    const now = ctx.currentTime;
                    const freq = rootFreq * Math.pow(2, semitone / 12);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(intensity * 0.25, now + 0.1);
                    gainNode.gain.setValueAtTime(intensity * 0.25, now + duration - 0.5);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.5);
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq * 0.97, now);
                    osc.frequency.exponentialRampToValueAtTime(freq, now + 0.15);
                    const osc2 = ctx.createOscillator();
                    osc2.type = 'square';
                    osc2.frequency.value = freq * 2;
                    const osc2Gain = ctx.createGain();
                    osc2Gain.gain.value = 0.06 * intensity;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(100 + semitone * 3, now);
                    filter.frequency.exponentialRampToValueAtTime(70 + semitone * 2, now + duration);
                    filter.Q.value = 3;
                    osc.connect(filter);
                    osc2Gain.connect(filter);
                    osc2.connect(osc2Gain);
                    filter.connect(gainNode);
                    const wetSend = ctx.createGain();
                    wetSend.gain.value = 0.40;
                    gainNode.connect(wetSend);
                    wetSend.connect(wetGain || ctx.destination);
                    gainNode.connect(dryGain || ctx.destination);
                    osc.start(now);
                    osc2.start(now);
                    osc.stop(now + duration + 0.5);
                    osc2.stop(now + duration + 0.5);
                } catch (err) { console.warn('Bass note error:', err); }
            }

            // ─── DRUMS ──────────────────────────────────────────────────────────────
            function createKick(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.85, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(100, now);
                    osc.frequency.exponentialRampToValueAtTime(30, now + 0.18);
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 160;
                    filter.Q.value = 1.5;
                    osc.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.35);
                } catch (err) { console.warn('Kick error:', err); }
            }

            function createSnare(ctx, intensity = 0.5) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.55, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
                    const bufferSize = ctx.sampleRate * 0.08;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        const env = Math.exp(-i / (ctx.sampleRate * 0.02));
                        data[i] = (Math.random() * 2 - 1) * env * 0.5;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(70, now + 0.08);
                    const oscGain = ctx.createGain();
                    oscGain.gain.value = 0.15 * intensity;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 280;
                    filter.Q.value = 0.8;
                    noise.connect(filter);
                    oscGain.connect(filter);
                    osc.connect(oscGain);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    osc.start(now);
                    noise.stop(now + 0.14);
                    osc.stop(now + 0.14);
                } catch (err) { console.warn('Snare error:', err); }
            }

            function createHat(ctx, intensity = 0.3) {
                try {
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.4, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    const bufferSize = ctx.sampleRate * 0.02;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        const env = Math.exp(-i / (ctx.sampleRate * 0.008));
                        data[i] = (Math.random() * 2 - 1) * env * 0.35;
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.value = 4500;
                    filter.Q.value = 0.5;
                    noise.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    noise.start(now);
                    noise.stop(now + 0.07);
                } catch (err) { console.warn('Hat error:', err); }
            }

            // ─── HELLRAISER PATTERN PLAYER ────────────────────────────────────────

            function startHellraiserPatternPlayer(themeName, rootFreq = 40, scoreData = null) {
                stopPatternPlayer();
                if (!scoreData || !scoreData[themeName]) {
                    console.warn('No AI score data for theme:', themeName);
                    return;
                }
                const theme = scoreData[themeName];
                const bpm = theme.bpm || 55;

                const bass = expandPattern(theme.bass);
                const kick = expandPattern(theme.kick);
                const snare = expandPattern(theme.snare);
                const hat = expandPattern(theme.hat);

                const variations = [{
                    name: 'AI',
                    bars: 8,
                    bass: bass,
                    kick: kick,
                    snare: snare,
                    hat: hat
                }];

                currentSectionPatterns = variations;
                currentVariationIdx = 0;
                barsInVariation = 0;
                patternStep = 0;
                patternBPM = bpm;
                fillActive = false;

                const stepDuration = 60 / bpm / 4;
                patternPlayerActive = { active: true, theme: themeName };

                function getCurrentPattern() { return currentSectionPatterns[0]; }

                function playStep() {
                    if (!patternPlayerActive || !patternPlayerActive.active) return;
                    const ctx = audioCtx;
                    if (!ctx) { patternPlayerTimeout = setTimeout(playStep, 100); return; }
                    const step = patternStep % 16;
                    const current = getCurrentPattern();
                    const isFillStep = fillActive;

                    let bassSemitone = 0;
                    if (isFillStep) {
                        bassSemitone = (step % 4 === 0) ? 0 : (step % 8 === 4 ? 7 : 0);
                    } else {
                        bassSemitone = current.bass[step] || 0;
                    }
                    if (bassSemitone !== 0 || (isFillStep && step % 4 === 0)) {
                        const dur = isFillStep ? 0.25 : 1.8;
                        const inten = isFillStep ? 0.3 : 0.5 + (bassSemitone / 30);
                        createBassNote(ctx, bassSemitone, inten, dur, rootFreq);
                    }

                    let kickVal = isFillStep ? (step % 4 === 0 ? 1 : 0) : (current.kick[step] || 0);
                    if (kickVal === 1) createKick(ctx, isFillStep ? 0.7 : 0.6);

                    let snareVal = isFillStep ? (step % 8 === 4 ? 1 : 0) : (current.snare[step] || 0);
                    if (snareVal === 1) createSnare(ctx, isFillStep ? 0.7 : 0.5);

                    let hatVal = isFillStep ? (step % 2 === 0 ? 1 : 0) : (current.hat[step] || 0);
                    if (hatVal === 1 && Math.random() < 0.7) createHat(ctx, isFillStep ? 0.4 : 0.2);

                    patternStep++;
                    if (patternStep % 16 === 0) {
                        barsInVariation++;
                        if (barsInVariation >= current.bars) barsInVariation = 0;
                    }
                    patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
                }
                patternPlayerTimeout = setTimeout(playStep, 50);
            }

            function stopPatternPlayer() {
                if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout);
                    patternPlayerTimeout = null; }
                if (patternPlayerActive) { patternPlayerActive.active = false;
                    patternPlayerActive = null; }
                patternStep = 0;
                currentSectionPatterns = [];
                currentVariationIdx = 0;
                barsInVariation = 0;
                fillActive = false;
            }

            // ─── MASTER playSound ──────────────────────────────────────────────────
            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    if (!ctx) return;
                    const now = ctx.currentTime;
                    switch (type) {
                        case 'pad':
                            createHellraiserPad(ctx, 45 + Math.random() * 25, 16 + Math.random() * 18, intensity);
                            break;
                        case 'string_pad':
                            createHellraiserPad(ctx, 40 + Math.random() * 30, 14 + Math.random() * 16, intensity);
                            break;
                        case 'cello_drone':
                            createCelloDrone(ctx, 35 + Math.random() * 20, 12 + Math.random() * 14, intensity);
                            break;
                        case 'cluster_dark': {
                            const root = 38 + Math.random() * 30;
                            const freqs = [];
                            for (let i = 0; i < 5; i++) freqs.push(root * (1 + (Math.random() - 0.5) * 0.30));
                            createDarkCluster(ctx, freqs, 8 + Math.random() * 10, intensity);
                            break;
                        }
                        case 'swell_dissonant':
                            createDissonantSwell(ctx, 44 + Math.random() * 30, 6 + Math.random() * 8, intensity);
                            break;
                        case 'brass_stab':
                            createBrassStab(ctx, intensity);
                            break;
                        case 'timpani':
                            createTimpaniHit(ctx, intensity);
                            break;
                        case 'pizzicato':
                            createHellraiserPizzicato(ctx, 55 + Math.random() * 45, intensity);
                            setTimeout(() => createHellraiserPizzicato(ctx, 50 + Math.random() * 40, intensity *
                                0.7), 180 + Math.random() * 250);
                            break;
                        case 'bass':
                            const semitone = Math.floor(Math.random() * 12);
                            createBassNote(ctx, semitone, intensity, 1.5 + Math.random() * 1.5, 40);
                            break;
                        case 'sting':
                            createBrassStab(ctx, intensity);
                            setTimeout(() => createHellraiserPad(ctx, 40 + Math.random() * 20, 4, intensity *
                                0.5), 200);
                            break;
                        case 'pulse':
                        case 'heartbeat':
                            createKick(ctx, 0.7 * intensity);
                            setTimeout(() => createKick(ctx, 0.6 * intensity), 250);
                            setTimeout(() => createHellraiserPizzicato(ctx, 60 + Math.random() * 30, intensity *
                                0.4), 400);
                            break;
                        case 'thunder': {
                            const bufferSize = ctx.sampleRate * 0.9;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.5));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(intensity * 0.45, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 1.4);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 90;
                            filter.Q.value = 0.5;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(now);
                            source.stop(now + 1.4);
                            break;
                        }
                        case 'bell': {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 55 + Math.random() * 25;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0, now);
                            gain.gain.linearRampToValueAtTime(intensity * 0.3, now + 0.15);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 4.5);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 300;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(now);
                            osc.stop(now + 4.5);
                            break;
                        }
                        case 'climax': {
                            const duration = 12 + Math.random() * 10;
                            const gainNode = ctx.createGain();
                            gainNode.gain.setValueAtTime(0, now);
                            gainNode.gain.linearRampToValueAtTime(intensity * 0.40, now + 4);
                            gainNode.gain.setValueAtTime(intensity * 0.45, now + duration - 2);
                            gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                            const oscs = [];
                            const freqs = [40, 48, 55, 65, 80];
                            freqs.forEach(f => {
                                const osc = ctx.createOscillator();
                                osc.type = 'sawtooth';
                                osc.frequency.setValueAtTime(f, now);
                                osc.frequency.exponentialRampToValueAtTime(f * 1.4, now + duration *
                                0.6);
                                oscs.push(osc);
                            });
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.setValueAtTime(120, now);
                            filter.frequency.exponentialRampToValueAtTime(800, now + duration);
                            filter.Q.value = 3;
                            const lfo = ctx.createOscillator();
                            lfo.type = 'sine';
                            lfo.frequency.value = 0.05;
                            const lfoGain = ctx.createGain();
                            lfoGain.gain.value = 200;
                            lfo.connect(lfoGain);
                            lfoGain.connect(filter.frequency);
                            oscs.forEach(o => o.connect(filter));
                            filter.connect(gainNode);
                            const wetSend = ctx.createGain();
                            wetSend.gain.value = 0.60;
                            gainNode.connect(wetSend);
                            wetSend.connect(wetGain || ctx.destination);
                            gainNode.connect(dryGain || ctx.destination);
                            oscs.forEach(o => { o.start(now);
                                o.stop(now + duration + 1); });
                            lfo.start(now);
                            lfo.stop(now + duration + 1);
                            break;
                        }
                        case 'kick':
                            createKick(ctx, intensity);
                            break;
                        case 'snare':
                            createSnare(ctx, intensity);
                            break;
                        case 'hat':
                            createHat(ctx, intensity * 0.5);
                            break;
                        default:
                            console.warn('Unknown sound type:', type);
                    }
                } catch (err) { console.warn('playSound error:', err); }
            }

            // ─── AMBIENT ────────────────────────────────────────────────────────────
            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(intensity * 0.20, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'ambient_drone' || type === 'wind_howl' || type === 'hellraiser_drone') {
                        const bufferSize = ctx.sampleRate * 1.5;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.35;
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'hellraiser_drone' ? 90 : type === 'ambient_drone' ?
                            140 : 400;
                        filter.Q.value = 0.4;
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = type === 'hellraiser_drone' ? 40 : type === 'ambient_drone' ? 60 :
                            90;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.12 * intensity;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 70;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) { console.warn('playAmbient error:', err); }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 500);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            // ─── STRING LAYER ──────────────────────────────────────────────────────
            function startStringLayer(theme) {
                if (!audioCtx) return;
                stopStringAmbient();
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const stringType = theme.stringLayer || 'cello_drone';
                const freq = theme.stringFreq || 40;
                const intensity = theme.stringIntensity || 0.2;
                const duration = 999;
                const allNodes = [];

                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.2, now + 2);

                if (stringType === 'cello_drone') {
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 250;
                    filter.Q.value = 3.5;
                    for (let i = 0; i < 3; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = 'triangle';
                        osc.frequency.value = freq * (1 + (i - 1) * 0.005);
                        const vib = ctx.createOscillator();
                        vib.type = 'sine';
                        vib.frequency.value = 1.8 + i * 0.9;
                        const vibG = ctx.createGain();
                        vibG.gain.value = 2.0;
                        vib.connect(vibG);
                        vibG.connect(osc.frequency);
                        allNodes.push(osc, vib);
                        osc.connect(filter);
                    }
                    filter.connect(gainNode);
                } else if (stringType === 'cluster_dark') {
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 380;
                    filter.Q.value = 1.8;
                    const clusterFreqs = [freq * 0.97, freq, freq * 1.02, freq * 1.04, freq * 1.06];
                    clusterFreqs.forEach(f => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = f;
                        const mlfo = ctx.createOscillator();
                        mlfo.type = 'sine';
                        mlfo.frequency.value = 0.2 + Math.random() * 0.6;
                        const mg = ctx.createGain();
                        mg.gain.value = 1.8;
                        mlfo.connect(mg);
                        mg.connect(osc.frequency);
                        allNodes.push(osc, mlfo);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                } else if (stringType === 'swell_dissonant') {
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 300;
                    filter.Q.value = 2.5;
                    const intervals = [0, 1, 6, 10, 13];
                    intervals.forEach(interval => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = freq * Math.pow(2, interval / 12);
                        allNodes.push(osc);
                        osc.connect(filter);
                    });
                    filter.connect(gainNode);
                } else {
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 450;
                    filter.Q.value = 2.2;
                    for (let i = 0; i < 5; i++) {
                        const osc = ctx.createOscillator();
                        osc.type = i < 3 ? 'triangle' : 'sawtooth';
                        osc.frequency.value = freq * (1 + (i - 2) * 0.006);
                        const vib = ctx.createOscillator();
                        vib.type = 'sine';
                        vib.frequency.value = 3.0 + i * 0.7;
                        const vibG = ctx.createGain();
                        vibG.gain.value = 1.8 + i * 0.4;
                        vib.connect(vibG);
                        vibG.connect(osc.frequency);
                        allNodes.push(osc, vib);
                        osc.connect(filter);
                    }
                    filter.connect(gainNode);
                }

                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.65;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);

                allNodes.forEach(n => n.start(now));
                stringAmbientActive = {
                    nodes: allNodes,
                    gainNode,
                    wetSend,
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 1);
                        allNodes.forEach(n => { try { n.stop(ctx.currentTime + 1.2); } catch (
                            e) {} });
                    }
                };
            }

            function stopStringAmbient() {
                if (stringAmbientActive) { stringAmbientActive.stop();
                    stringAmbientActive = null; }
            }

            function startHellraiserAmbient(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                const theme = HELLRAISER_THEMES[themeName] || HELLRAISER_THEMES.prologue;
                const ctx = audioCtx;
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(theme.intensity * 0.18, now + 1.8);
                const oscs = [];
                for (let i = 0; i < 3; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i === 0 ? 'sawtooth' : i === 1 ? 'triangle' : 'sawtooth';
                    const detune = (i - 1) * theme.detuneSpread;
                    osc.frequency.value = theme.rootFreq * Math.pow(2, detune / 1200);
                    oscs.push(osc);
                }
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = theme.filterBase;
                filter.Q.value = 3;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = theme.lfoRate;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 70;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                oscs.forEach(o => o.connect(filter));
                filter.connect(gainNode);
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.55;
                gainNode.connect(wetSend);
                wetSend.connect(wetGain || ctx.destination);
                gainNode.connect(dryGain || ctx.destination);
                oscs.forEach(o => o.start(now));
                lfo.start(now);
                if (theme.noiseMix > 0) {
                    const bufferSize = ctx.sampleRate * 2.5;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * theme.noiseMix;
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    noise.loop = true;
                    const noiseFilter = ctx.createBiquadFilter();
                    noiseFilter.type = 'lowpass';
                    noiseFilter.frequency.value = theme.filterBase * 0.6;
                    noiseFilter.Q.value = 0.3;
                    const noiseGain = ctx.createGain();
                    noiseGain.gain.value = theme.noiseMix * 0.3;
                    noise.connect(noiseFilter);
                    noiseFilter.connect(noiseGain);
                    noiseGain.connect(gainNode);
                    noise.start(now);
                    oscs.push(noise);
                }
                sectionAmbientActive = {
                    stop: () => {
                        gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.8);
                        oscs.forEach(s => { try { s.stop(ctx.currentTime + 1.0); } catch (
                            e) {} });
                        try { lfo.stop(ctx.currentTime + 1.0); } catch (e) {}
                        sectionAmbientActive = null;
                    }
                };
                startStringLayer(theme);
                startHellraiserPatternPlayer(themeName, 40, sectionThemeScore);
            }

            function transitionSectionTheme(themeName, scoreData) {
                if (scoreData) sectionThemeScore = scoreData;
                startHellraiserAmbient(themeName);
            }

            function stopSectionAmbient() {
                if (sectionAmbientActive) { sectionAmbientActive.stop();
                    sectionAmbientActive = null; }
                stopStringAmbient();
                stopPatternPlayer();
                clearTimeout(crossfadeTimeout);
            }

            // ─── SCORE INDICATOR ──────────────────────────────────────────────────
            function updateScoreIndicator(theme, variation, bar) {
                const indicator = document.getElementById('scoreIndicator');
                const themeLabel = document.getElementById('scoreThemeLabel');
                const variationLabel = document.getElementById('scoreVariationLabel');
                const barLabel = document.getElementById('scoreBarLabel');
                const progressFill = document.getElementById('scoreProgressFill');

                    progressFill.style.width = pct + '%';
                }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 28000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' +
                            apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) { const errText = await res.text(); throw new Error(`API error ${res.status}: ${errText}`); }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') throw new Error('Request timed out. Please try again.');
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', 1980s mountain wilderness, Hellraiser horror aesthetic, dark orchestral, grainy 35mm, Christopher Young style')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e;
                        await new Promise(r => setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else {
                            clearInterval(timer);
                            resolve();
                        }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                return new Promise((resolve) => {
                    if (!text) { resolve(); return; }
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'
                    ];
                    let voice = null;
                    for (const name of maleNames) { voice = voices.find(v => v.name.includes(name)); if (
                            voice) break; }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[
                    0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = 0.58;
                    utterance.pitch = 0.85;
                    utterance.onend = () => resolve();
                    utterance.onerror = () => resolve();
                    speechSynthesis.speak(utterance);
                });
            }
