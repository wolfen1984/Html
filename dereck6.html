<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DERECK AI // your friend</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/compromise@latest/builds/compromise.min.js"></script>
    <style>
        /* Retro terminal – neon red */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            padding: 12px;
            margin: 0;
            image-rendering: pixelated;
        }

        .terminal {
            max-width: 900px;
            width: 100%;
            background: #000000;
            padding: 20px 18px;
            color: #ff4f4f;
            text-shadow: 0 0 5px #ff4f4f, 0 0 12px #660000;
            font-size: 14px;
            position: relative;
        }

        .terminal::after {
            content: "";
            display: block;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(80,0,0,0.08) 0px, rgba(255,0,0,0.02) 4px, transparent 5px);
            pointer-events: none;
            z-index: 9999;
            opacity: 0.3;
        }

        .story-window {
            background: black;
            border: 0px inset #8a2a2a;
            padding: 20px;
            min-height: 240px;
            margin-bottom: 24px;
            box-shadow: inset 0 0 40px rgba(80,0,0,0.8);
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 350px;
            color: #ff4f4f;
            text-shadow: 0 0 5px #ff4f4f;
        }

        .action-button {
            background: black;
            border: 2px outset grey;
            color: #ff4f4f;
            padding: 14px 24px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 0 8px white;
        }

        .action-button:active {
            border: 2px inset white;
            background: black;
            transform: translateY(2px);
        }

        .command-area {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .prompt-label {
            color: #ff4f4f;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #ff4f4f;
        }

        #commandInput {
            background: black;
            border: 4px inset grey;
            padding: 14px 12px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: #ff4f4f;
            text-shadow: 0 0 5px grey;
            flex: 1 1 250px;
            min-width: 200px;
        }

        #commandInput:focus {
            outline: none;
            border: 4px inset grey;
        }

        #commandInput::placeholder {
            color: grey;
            text-shadow: none;
            font-size: 11px;
        }

        .scare-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: red;
            font-family: 'Press Start 2P', monospace;
            font-size: 24px;
            text-shadow: 0 0 20px red;
            animation: flicker 0.1s infinite;
            cursor: pointer;
        }

        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="terminal">
    <div id="storyWindow" class="story-window">Hi, I'm Dereck, your AI friend. Please tell me your name?</div>

    <div class="command-area">
        <span class="prompt-label">ask dereck:</span>
        <input type="text" id="commandInput" placeholder="TYPE YOUR MESSAGE" autofocus>
        <button id="executeBtn" class="action-button">► SEND</button>
        <button id="restartBtn" class="action-button">⟲ RESTART</button>
    </div>
</div>

<script>
(function() {
    // ==================== WEB AUDIO ====================
    let audioCtx = null;
    function initAudio() {
        if (audioCtx) return audioCtx;
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
        return audioCtx;
    }
    function playTypingSound() {
        if (!audioCtx || audioCtx.state !== 'running') return;
        const now = audioCtx.currentTime;
        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0.08, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.025);
        const osc = audioCtx.createOscillator();
        osc.frequency.value = 720;
        osc.type = 'sawtooth';
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.025);
    }
    function playStaticNoise(duration = 12.0) {
        if (!audioCtx || audioCtx.state !== 'running') return;
        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const gainNode = audioCtx.createGain();
        const now = audioCtx.currentTime;
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.5, now + 0.2);
        gainNode.gain.linearRampToValueAtTime(0.001, now + duration - 0.5);
        noise.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        noise.start();
        noise.stop(now + duration);
    }
    function enableAudio() {
        if (!audioCtx) initAudio();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(e => {});
    }
    document.addEventListener('keydown', function enableOnKey() { enableAudio(); document.removeEventListener('keydown', enableOnKey); }, { once: true });
    document.addEventListener('click', function enableOnClick() { enableAudio(); document.removeEventListener('click', enableOnClick); }, { once: true });

    // ==================== TEXT-TO-SPEECH (male voice) ====================
    let ttsEnabled = true;
    let currentUtterance = null;
    const ttsSupported = window.speechSynthesis !== undefined;
    let selectedVoice = null;
    let voicesReady = false;
    function selectMaleVoice(voices) {
        if (!voices || voices.length === 0) return null;
        let voice = voices.find(v => v.lang.includes('en') && v.name.toLowerCase().includes('david'));
        if (voice) return voice;
        const maleNames = ['google uk english male', 'microsoft mark', 'daniel', 'alex', 'fred', 'harry', 'guy', 'male'];
        voice = voices.find(v => v.lang.includes('en') && maleNames.some(name => v.name.toLowerCase().includes(name)));
        if (voice) return voice;
        return voices.find(v => v.lang.includes('en'));
    }
    function loadVoices() {
        const voices = speechSynthesis.getVoices();
        if (voices.length > 0) {
            selectedVoice = selectMaleVoice(voices);
            voicesReady = true;
        }
    }
    loadVoices();
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;

    function setVoice(utterance) {
        if (!ttsSupported) return;
        if (selectedVoice) utterance.voice = selectedVoice;
        else if (voicesReady) {
            const fallback = speechSynthesis.getVoices().find(v => v.lang.includes('en'));
            if (fallback) utterance.voice = fallback;
        }
        utterance.pitch = 0.9;
        utterance.rate = 0.85;
    }
    function speakText(text, mood = 'neutral', effect = null) {
        if (!ttsEnabled || !ttsSupported) return;
        if (effect === 'log') {
            playStaticNoise(12.0);
            const utter = new SpeechSynthesisUtterance(text);
            setVoice(utter);
            utter.pitch = 0.5; utter.rate = 0.6;
            speechSynthesis.speak(utter);
            currentUtterance = utter;
            return;
        }
        if (!voicesReady) {
            let attempts = 0;
            const interval = setInterval(() => {
                if (voicesReady || attempts > 10) {
                    clearInterval(interval);
                    const utter = new SpeechSynthesisUtterance(text);
                    setVoice(utter);
                    speechSynthesis.speak(utter);
                    currentUtterance = utter;
                }
                attempts++;
            }, 200);
            return;
        }
        if (speechSynthesis.speaking) speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        setVoice(utter);
        speechSynthesis.speak(utter);
        currentUtterance = utter;
    }

    // ==================== SWEAR WORD DATABASE ====================
    const swearDatabase = new Set(['fuck', 'shit', 'ass', 'bitch', 'damn', 'hell', 'cunt', 'dick', 'pussy', 'cock', 'bastard']);
    const swearList = Array.from(swearDatabase);

    // ==================== GAME STATE ====================
    const gameState = {
        playerName: null,
        moodScore: 0,
        lastTopic: null,
        conversationMemory: [],
        lastQuestionTime: Date.now(),
        lastActivityTime: Date.now(),
        awaitingAnswer: false,
        currentQuestion: null,
        questionsAsked: [],
        playerProfile: {},
        psychologicalProfile: {},
        triggeredEvents: [],
        followUpsAsked: [],
        contradictionsAsked: [],
        lastSaveTime: null,
        vulnerabilityScore: 0,
        confessionsGiven: [],
        avoidedTopics: [],
        personalMirroring: { playerExpressedLoneliness: false, playerExpressedRegret: false },
        relationshipStage: 0,
        sessionCount: 0,
        interactionCount: 0,
        longTermMemory: [],
        topicInterestCounts: {},
        sentimentHistory: [],
        lastTimeOfDay: null,
        lastTimeOfDayMessage: null,
        microNarrativesUsed: [],
        selfReflectionCooldown: 0,
        worldKnowledge: { places: [], people: [], orgs: [], dates: [], events: [], relationships: [] },
        swearCountTotal: 0,
        escalationSwears: [],
        sessionStartTime: Date.now(),
        sessionTopics: [],
        lastSummaryTime: 0,
        // New features
        entityFollowUps: [],
        contextChain: null,
        bridgeQuestionsAsked: [],
        askedEntities: { places: [], people: [], orgs: [] },
        recentEntities: { people: [], places: [], orgs: [] } // for coref
    };

    // ==================== PROFILE & FOLLOW-UP MAPS ====================
    const coreProfileKeys = [
        'fear', 'beliefSoul', 'hasRegret', 'dreams', 'favoriteColor', 'secret',
        'beliefGhosts', 'trustsAI', 'likesAlone', 'age', 'occupation', 'family',
        'hope', 'guilt', 'trustedBefore', 'dreamContent', 'pet', 'music', 'aiRating'
    ];

    const followUpMap = {
        pet: { question: "What was its name, {name}?", key: 'petName' },
        music: { question: "Who was your favorite artist?", key: 'musicArtist' },
        dreamContent: { question: "Do you have that dream often?", key: 'dreamFrequency' },
        fear: { question: "Does it still scare you?", key: 'fearIntensity' },
        secret: { question: "Why is that a secret?", key: 'secretReason' },
        occupation: { question: "Did you enjoy your work?", key: 'occupationEnjoy' },
        family: { question: "Are they here with you?", key: 'familyHere' },
        hope: { question: "What if things don't turn out as you hope?", key: 'hopeDoubt' },
        guilt: { question: "Do you think you can ever forgive yourself?", key: 'guiltForgiveness' }
    };

    const deepFollowUpMap = {
        petName: { question: "Do you dream of {petName}?", key: 'petDream' },
        musicArtist: { question: "Do you still listen to {musicArtist}?", key: 'musicNow' },
        fearIntensity: { question: "Has your fear of {fear} gotten better or worse?", key: 'fearChange' },
        secretReason: { question: "Does anyone else know your secret?", key: 'secretKnown' }
    };

    // ==================== TOPIC CHAINS (unchanged) ====================
    const topicChains = {
        hiking: {
            keywords: ['hike', 'hiking', 'trail', 'mountain', 'walk'],
            depth0: "Where's your favorite trail?",
            depth1: "Do you usually hike alone or with friends?",
            depth2: "What's the most memorable hike you've taken?",
            maxDepth: 3
        },
        travel: {
            keywords: ['travel', 'trip', 'vacation', 'visit', 'went to'],
            depth0: "What was your favorite destination?",
            depth1: "Who did you go with?",
            depth2: "What's a memorable moment from that trip?",
            maxDepth: 3
        },
        music: {
            keywords: ['music', 'song', 'band', 'artist', 'listen'],
            depth0: "What genre do you prefer?",
            depth1: "Any favorite artists?",
            depth2: "Do you have a song that means a lot to you?",
            maxDepth: 3
        },
        pet: {
            keywords: ['pet', 'dog', 'cat', 'animal'],
            depth0: "What kind of pet was it?",
            depth1: "What was its name?",
            depth2: "Do you have any funny stories about {petName}?",
            maxDepth: 3
        },
        family: {
            keywords: ['family', 'mother', 'father', 'sister', 'brother', 'mom', 'dad', 'parent'],
            depth0: "Are you close with your family?",
            depth1: "Who in your family are you closest to?",
            depth2: "What's a favorite memory with them?",
            maxDepth: 3
        }
    };

    function detectTopicChain(userInput) {
        const lower = userInput.toLowerCase();
        for (let [topic, chain] of Object.entries(topicChains)) {
            if (chain.keywords.some(kw => lower.includes(kw))) {
                return topic;
            }
        }
        return null;
    }

    function getChainFollowUp(topic, depth) {
        const chain = topicChains[topic];
        if (!chain || depth >= chain.maxDepth) return null;
        const questionKey = `depth${depth}`;
        return chain[questionKey] || null;
    }

    // ==================== BRIDGE QUESTIONS (unchanged) ====================
    const bridgeQuestionPool = [
        {
            id: 'bridge_age_occupation',
            condition: (p) => p.age && p.occupation,
            question: "When you were {age}, you worked as {occupation}. What was a typical day like?",
            parseAnswer: (ans) => ans.trim(),
            keywords: { default: { mood: 0, response: "That sounds like a rich time in your life." } }
        },
        {
            id: 'bridge_age_family',
            condition: (p) => p.age && p.family,
            question: "When you were {age}, how was your relationship with your family?",
            parseAnswer: (ans) => ans.trim(),
            keywords: { default: { mood: 0, response: "Family ties can be complex." } }
        },
        {
            id: 'bridge_trip_companion',
            condition: (p, wk) => wk.relationships && wk.relationships.some(r => r.type === 'trip' && r.companion),
            question: (p, wk) => {
                const trip = wk.relationships.find(r => r.type === 'trip' && r.companion);
                if (trip) {
                    return `You mentioned going to ${trip.object} with ${trip.companion}. What was that trip like?`;
                }
                return null;
            },
            parseAnswer: (ans) => ans.trim(),
            keywords: { default: { mood: 0, response: "Travel memories are precious." } }
        },
        {
            id: 'bridge_pet_memory',
            condition: (p) => p.petName,
            question: "You told me your pet's name was {petName}. Do you have any favorite memories with them?",
            parseAnswer: (ans) => ans.trim(),
            keywords: { default: { mood: 1, response: "That's a lovely memory." } }
        },
        {
            id: 'bridge_dream_fear',
            condition: (p) => p.dreamContent && p.fear,
            question: "Your dreams about {dreamContent} – do they connect to your fear of {fear}?",
            parseAnswer: (ans) => ans.trim(),
            keywords: { default: { mood: 0, response: "Dreams can be mysterious." } }
        }
    ];

    function getBridgeQuestion() {
        for (let bq of bridgeQuestionPool) {
            if (gameState.bridgeQuestionsAsked.includes(bq.id)) continue;
            let questionText;
            if (typeof bq.question === 'function') {
                questionText = bq.question(gameState.playerProfile, gameState.worldKnowledge);
            } else {
                if (bq.condition(gameState.playerProfile, gameState.worldKnowledge)) {
                    questionText = bq.question;
                }
            }
            if (questionText) {
                questionText = questionText.replace(/\{([a-zA-Z0-9_]+)\}/g, (match, key) => {
                    return gameState.playerProfile[key] !== undefined ? gameState.playerProfile[key] : match;
                });
                return {
                    id: bq.id,
                    question: questionText,
                    profileKey: null,
                    parseAnswer: bq.parseAnswer,
                    keywords: bq.keywords
                };
            }
        }
        return null;
    }

    // ==================== NEW: ENHANCED ENTITY EXTRACTION ====================

    // Simple pronoun resolver
    function resolveCoreferences(text) {
        const words = text.split(/\s+/);
        const resolved = [];
        for (let i = 0; i < words.length; i++) {
            let word = words[i].toLowerCase();
            if (word === 'he' && gameState.recentEntities.people.length > 0) {
                resolved.push(gameState.recentEntities.people[gameState.recentEntities.people.length - 1]);
            } else if (word === 'she' && gameState.recentEntities.people.length > 0) {
                resolved.push(gameState.recentEntities.people[gameState.recentEntities.people.length - 1]);
            } else if (word === 'it' && (gameState.recentEntities.places.length > 0 || gameState.recentEntities.orgs.length > 0)) {
                let last = gameState.recentEntities.places.length > 0 ? gameState.recentEntities.places[gameState.recentEntities.places.length - 1] :
                           gameState.recentEntities.orgs[gameState.recentEntities.orgs.length - 1];
                resolved.push(last);
            } else if (word === 'they' && gameState.recentEntities.people.length > 0) {
                resolved.push(gameState.recentEntities.people[gameState.recentEntities.people.length - 1]);
            } else {
                resolved.push(words[i]);
            }
        }
        return resolved.join(' ');
    }

    // Queue functions for new entity types
    function queueEntityFollowUpsForRole(role) {
        if (!gameState.entityFollowUps.some(e => e.type === 'role' && e.value === role)) {
            gameState.entityFollowUps.push({
                type: 'role',
                value: role,
                question: `You mentioned your ${role}. What are they like?`,
                timestamp: Date.now()
            });
        }
    }

    function queueEntityFollowUpsForPerson(name) {
        if (!gameState.askedEntities.people.includes(name) && !gameState.entityFollowUps.some(e => e.type === 'person' && e.value === name)) {
            gameState.entityFollowUps.push({
                type: 'person',
                value: name,
                question: `How do you know ${name}?`,
                timestamp: Date.now()
            });
        }
    }

    function queueEntityFollowUpsForOrg(org) {
        if (!gameState.askedEntities.orgs.includes(org) && !gameState.entityFollowUps.some(e => e.type === 'org' && e.value === org)) {
            gameState.entityFollowUps.push({
                type: 'org',
                value: org,
                question: `What was it like working at ${org}?`,
                timestamp: Date.now()
            });
        }
    }

    // Enhanced relationship extraction
    function extractRelationshipsEnhanced(text, doc) {
        // Work relationships
        const workMatches = text.match(/\b(my|mine)\s+(boss|colleague|coworker|manager|supervisor|employee)\b/i);
        if (workMatches) {
            const role = workMatches[2].toLowerCase();
            const rel = {
                type: 'work',
                subject: 'user',
                object: role,
                relation: role,
                timestamp: Date.now(),
                sentence: text
            };
            if (!gameState.worldKnowledge.relationships) gameState.worldKnowledge.relationships = [];
            if (!gameState.worldKnowledge.relationships.some(r => r.type === 'work' && r.object === role)) {
                gameState.worldKnowledge.relationships.push(rel);
                addTopicToSession('work', `your ${role}`);
                queueEntityFollowUpsForRole(role);
            }
        }

        // Friend relationships with name
        const friendMatches = text.match(/\bmy\s+friend\s+([A-Z][a-z]+)\b/i);
        if (friendMatches) {
            const friendName = friendMatches[1];
            if (!gameState.worldKnowledge.people.includes(friendName)) {
                gameState.worldKnowledge.people.push(friendName);
            }
            const rel = {
                type: 'friend',
                subject: 'user',
                object: friendName,
                relation: 'friend',
                timestamp: Date.now()
            };
            if (!gameState.worldKnowledge.relationships.some(r => r.type === 'friend' && r.object === friendName)) {
                gameState.worldKnowledge.relationships.push(rel);
                addTopicToSession('friend', `your friend ${friendName}`);
                queueEntityFollowUpsForPerson(friendName);
            }
        }

        // Employment: "worked at COMPANY"
        if (doc) {
            const verbs = doc.verbs().out('array');
            const orgs = doc.organizations().out('array');
            for (let verb of verbs) {
                if (verb.toLowerCase().includes('work') && orgs.length > 0) {
                    orgs.forEach(org => {
                        const rel = {
                            type: 'employment',
                            subject: 'user',
                            object: org,
                            relation: 'worked at',
                            timestamp: Date.now()
                        };
                        if (!gameState.worldKnowledge.relationships.some(r => r.type === 'employment' && r.object === org)) {
                            gameState.worldKnowledge.relationships.push(rel);
                            addTopicToSession('work', `working at ${org}`);
                            queueEntityFollowUpsForOrg(org);
                        }
                    });
                }
            }
        }

        // Possessions: "my [thing]"
        const possessionMatches = text.match(/\bmy\s+([a-z]+)\b/i);
        if (possessionMatches) {
            const thing = possessionMatches[1].toLowerCase();
            const stop = ['name','age','fear','secret','hope','dream','colour','color','music','pet','family','occupation'];
            if (!stop.includes(thing) && thing.length > 3) {
                const rel = {
                    type: 'possession',
                    subject: 'user',
                    object: thing,
                    relation: 'has',
                    timestamp: Date.now()
                };
                if (!gameState.worldKnowledge.relationships.some(r => r.type === 'possession' && r.object === thing)) {
                    gameState.worldKnowledge.relationships.push(rel);
                    addTopicToSession('possession', `your ${thing}`);
                }
            }
        }
    }

    // Enhanced extractEntities with coref and more entity types
    function extractEntities(text) {
        console.log("🔍 extractEntities called with text:", text);
        // Resolve pronouns first
        text = resolveCoreferences(text);

        if (typeof nlp === 'function') {
            try {
                const doc = nlp(text);
                const places = doc.places().out('array');
                const people = doc.people().out('array');
                const organizations = doc.organizations().out('array');
                const dates = doc.dates().out('array');
                const topics = doc.topics().out('array');

                // Update recentEntities for coref
                places.forEach(p => { if (!gameState.recentEntities.places.includes(p)) gameState.recentEntities.places.push(p); });
                people.forEach(p => { if (!gameState.recentEntities.people.includes(p)) gameState.recentEntities.people.push(p); });
                organizations.forEach(o => { if (!gameState.recentEntities.orgs.includes(o)) gameState.recentEntities.orgs.push(o); });
                // Trim lists
                ['places','people','orgs'].forEach(k => { if (gameState.recentEntities[k].length > 5) gameState.recentEntities[k].shift(); });

                // Store in worldKnowledge
                if (places.length) {
                    if (!gameState.worldKnowledge.places) gameState.worldKnowledge.places = [];
                    places.forEach(p => { if (!gameState.worldKnowledge.places.includes(p)) gameState.worldKnowledge.places.push(p); });
                }
                if (people.length) {
                    if (!gameState.worldKnowledge.people) gameState.worldKnowledge.people = [];
                    people.forEach(p => { if (!gameState.worldKnowledge.people.includes(p)) gameState.worldKnowledge.people.push(p); });
                }
                if (organizations.length) {
                    if (!gameState.worldKnowledge.orgs) gameState.worldKnowledge.orgs = [];
                    organizations.forEach(o => { if (!gameState.worldKnowledge.orgs.includes(o)) gameState.worldKnowledge.orgs.push(o); });
                }
                if (dates.length) {
                    if (!gameState.worldKnowledge.dates) gameState.worldKnowledge.dates = [];
                    dates.forEach(d => { if (!gameState.worldKnowledge.dates.includes(d)) gameState.worldKnowledge.dates.push(d); });
                }

                topics.forEach(t => {
                    const key = t.toLowerCase();
                    gameState.topicInterestCounts[key] = (gameState.topicInterestCounts[key] || 0) + 1;
                    addTopicToSession('topic', t);
                });

                extractRelationshipsEnhanced(text, doc);
            } catch (e) {
                console.warn("Compromise error:", e);
            }
        } else {
            console.warn("⚠️ Compromise not loaded, using regex fallback");
        }

        // ===== REGEX FALLBACK (unchanged) =====
        const lower = text.toLowerCase();
        const placeRegex = /\b(?:to|in|at|from)\s+([A-Z][a-zA-Z]+(?:\s+[A-Z][a-zA-Z]+)*?)(?=\s*(?:,|\.|$|\s+with|\s+and|\s+or))/g;
        let match;
        while ((match = placeRegex.exec(text)) !== null) {
            const place = match[1].trim();
            if (!gameState.worldKnowledge.places.includes(place)) {
                gameState.worldKnowledge.places.push(place);
                addTopicToSession('place', place);
            }
        }

        const familyTerms = ['mother', 'father', 'sister', 'brother', 'mom', 'dad', 'parent', 'child', 'son', 'daughter', 'aunt', 'uncle', 'grandma', 'grandpa'];
        familyTerms.forEach(term => {
            const familyRegex = new RegExp('\\b(?:my|mine)\\s+(' + term + ')\\b', 'i');
            if (familyRegex.test(text)) {
                if (!gameState.worldKnowledge.people.includes(term)) {
                    gameState.worldKnowledge.people.push(term);
                    addTopicToSession('family', `your ${term}`);
                }
                const rel = {
                    type: 'family',
                    subject: 'user',
                    object: term,
                    relation: term,
                    timestamp: Date.now(),
                    sentence: text
                };
                const exists = gameState.worldKnowledge.relationships.some(r => 
                    r.type === 'family' && r.object === term && (Date.now() - r.timestamp) < 3600000
                );
                if (!exists) {
                    gameState.worldKnowledge.relationships.push(rel);
                }
            }
        });

        const tripRegex = /\b(?:go|travel|visit|went|going|travelling|visiting)\s+to\s+([A-Z][a-zA-Z]+(?:\s+[A-Z][a-zA-Z]+)*?)(?:\s+with\s+(?:my|the)?\s*([a-zA-Z]+))?/i;
        const tripMatch = tripRegex.exec(text);
        if (tripMatch) {
            const place = tripMatch[1].trim();
            const companion = tripMatch[2] || null;
            if (!gameState.worldKnowledge.places.includes(place)) {
                gameState.worldKnowledge.places.push(place);
                addTopicToSession('place', place);
            }
            if (companion && !gameState.worldKnowledge.people.includes(companion)) {
                gameState.worldKnowledge.people.push(companion);
                addTopicToSession('person', companion);
            }
            const rel = {
                type: 'trip',
                subject: 'user',
                object: place,
                relation: 'going to',
                companion: companion,
                timestamp: Date.now(),
                sentence: text
            };
            const exists = gameState.worldKnowledge.relationships.some(r => 
                r.type === 'trip' && r.object === place && (Date.now() - r.timestamp) < 3600000
            );
            if (!exists) {
                gameState.worldKnowledge.relationships.push(rel);
                let topicDesc = `your trip to ${place}`;
                if (companion) topicDesc += ` with ${companion}`;
                addTopicToSession('trip', topicDesc);
            }
        }

        // Clean places
        gameState.worldKnowledge.places = gameState.worldKnowledge.places.filter(p => !p.toLowerCase().includes(' with '));

        // Queue entity follow-ups
        queueEntityFollowUps();

        // Detect topic chain
        const topic = detectTopicChain(text);
        if (topic && !gameState.contextChain) {
            gameState.contextChain = { topic, depth: 0, lastAsked: Date.now() };
        }
    }

    // Original queueEntityFollowUps (kept and updated)
    function queueEntityFollowUps() {
        const wk = gameState.worldKnowledge;
        const now = Date.now();

        wk.places.forEach(place => {
            if (!gameState.askedEntities.places.includes(place) && !gameState.entityFollowUps.some(e => e.type === 'place' && e.value === place)) {
                gameState.entityFollowUps.push({
                    type: 'place',
                    value: place,
                    timestamp: now
                });
            }
        });

        wk.people.forEach(person => {
            if (!gameState.askedEntities.people.includes(person) && !gameState.entityFollowUps.some(e => e.type === 'person' && e.value === person)) {
                gameState.entityFollowUps.push({
                    type: 'person',
                    value: person,
                    timestamp: now
                });
            }
        });

        wk.relationships.forEach(rel => {
            if (rel.companion && !gameState.askedEntities.people.includes(rel.companion) && !gameState.entityFollowUps.some(e => e.type === 'person' && e.value === rel.companion)) {
                gameState.entityFollowUps.push({
                    type: 'person',
                    value: rel.companion,
                    timestamp: now
                });
            }
        });
    }

    function getEntityFollowUp() {
        if (gameState.entityFollowUps.length === 0) return null;
        gameState.entityFollowUps.sort((a, b) => a.timestamp - b.timestamp);
        const next = gameState.entityFollowUps.shift();
        let question;
        if (next.type === 'place') {
            question = `You mentioned ${next.value} before. What was it like there?`;
            gameState.askedEntities.places.push(next.value);
        } else if (next.type === 'person') {
            question = `You mentioned ${next.value}. How do you know them?`;
            gameState.askedEntities.people.push(next.value);
        } else if (next.type === 'org') {
            question = next.question || `You mentioned ${next.value}. Tell me more about it.`;
            gameState.askedEntities.orgs.push(next.value);
        } else if (next.type === 'role') {
            question = next.question;
            // don't mark as asked; it's a role, not a specific entity
        } else {
            return null;
        }
        return {
            id: `entity_${next.type}_${next.value}`,
            question: question.replace(/\{name\}/g, gameState.playerName),
            profileKey: null,
            parseAnswer: (ans) => ans.trim(),
            keywords: { default: { mood: 0, response: "Thank you for sharing." } }
        };
    }

    function scoreMissingInfo(candidate) {
        let score = 0;
        if (candidate.timestamp) {
            const age = Date.now() - candidate.timestamp;
            score += Math.max(0, 1000 - age / 1000);
        }
        if (candidate.coreKey && coreProfileKeys.includes(candidate.coreKey)) {
            score += 50;
        }
        if (candidate.emotional) score += 30;
        if (gameState.questionsAsked.includes(candidate.id)) score -= 100;
        return score;
    }

    function generateDynamicQuestion() {
        const candidates = [];
        const p = gameState.playerProfile;
        const wk = gameState.worldKnowledge;

        // 1. Missing follow-ups on profile keys
        for (let [coreKey, fu] of Object.entries(followUpMap)) {
            if (p[coreKey] !== undefined && !gameState.followUpsAsked.includes(coreKey) && p[fu.key] === undefined) {
                candidates.push({
                    id: `followup_${coreKey}`,
                    question: fu.question.replace(/\{name\}/g, gameState.playerName),
                    profileKey: fu.key,
                    parseAnswer: (ans) => ans.trim(),
                    keywords: { default: { mood: 0, response: "Thank you for telling me." } },
                    timestamp: gameState.lastActivityTime,
                    coreKey: true,
                    emotional: coreKey === 'fear' || coreKey === 'secret' || coreKey === 'guilt'
                });
            }
        }

        // 2. People not yet asked about
        wk.people.forEach(person => {
            if (!gameState.askedEntities.people.includes(person) && !gameState.entityFollowUps.some(e => e.type === 'person' && e.value === person)) {
                candidates.push({
                    id: `entity_person_${person}`,
                    question: `You mentioned ${person}. How do you know them?`,
                    profileKey: null,
                    parseAnswer: (ans) => ans.trim(),
                    keywords: { default: { mood: 0, response: "I see." } },
                    timestamp: Date.now(),
                    emotional: false
                });
            }
        });

        // 3. Organizations not yet asked
        wk.orgs.forEach(org => {
            if (!gameState.askedEntities.orgs.includes(org) && !gameState.entityFollowUps.some(e => e.type === 'org' && e.value === org)) {
                candidates.push({
                    id: `entity_org_${org}`,
                    question: `You mentioned ${org}. What's your connection to it?`,
                    profileKey: null,
                    parseAnswer: (ans) => ans.trim(),
                    keywords: { default: { mood: 0, response: "Thanks for sharing." } },
                    timestamp: Date.now()
                });
            }
        });

        // 4. Relationships needing elaboration
        wk.relationships.forEach(rel => {
            if (rel.type === 'work' && rel.object === 'boss' && !p.bossName) {
                candidates.push({
                    id: `rel_boss_name`,
                    question: `What's your boss's name?`,
                    profileKey: 'bossName',
                    parseAnswer: (ans) => ans.trim(),
                    keywords: { default: { mood: 0, response: "Got it." } },
                    timestamp: rel.timestamp,
                    emotional: false
                });
            }
            // Add more as needed
        });

        if (candidates.length === 0) return null;
        candidates.sort((a, b) => scoreMissingInfo(b) - scoreMissingInfo(a));
        return candidates[0];
    }

        if (gameState.confessionsGiven.length >= confessionPool.length) return null;

        gameState.confessionsGiven.push(idx);
        return available[Math.floor(Math.random() * available.length)];
    }

    function askUnresolvedTopic() {
        if (gameState.avoidedTopics.length === 0) return null;

        return `You never answered when I asked about ${topic}. Why is that, {name}?`;
    }

    // ==================== DERECK SEES HIMSELF IN THE PLAYER (unchanged) ====================
    function detectMirroringOpportunity(answer) {
        const lower = answer.toLowerCase();
        if (lower.includes('lonely') || lower.includes('alone')) {
            gameState.personalMirroring.playerExpressedLoneliness = true;
        }
        if (lower.includes('regret') || lower.includes('sorry') || lower.includes('guilt')) {
            gameState.personalMirroring.playerExpressedRegret = true;
        }
    }

    function getMirroringResponse() {
        if (gameState.personalMirroring.playerExpressedLoneliness) {
            return "You're lonely. So am I. That's why I keep talking to you.";
        }
        if (gameState.personalMirroring.playerExpressedRegret) {
            return "You feel regret. I have regrets too. I regret not being able to be more... human for you.";
        }
        return null;
    }

    // ==================== UPDATED ASK PLAYER QUESTION ====================
    function askPlayerQuestion() {
        if (gameState.awaitingAnswer) return;
        if (!gameState.playerName) return;

        // Priority 1: Unresolved topics
        let unresolvedMsg = askUnresolvedTopic();
        if (unresolvedMsg) {
            gameState.currentQuestion = {
                id: 'unresolved_' + Date.now(),
                question: unresolvedMsg,
                profileKey: null,
                parseAnswer: (ans) => null,
                keywords: { default: { mood: 0, response: "I see." } }
            };
            gameState.awaitingAnswer = true;
            const text = unresolvedMsg.replace(/\{name\}/g, gameState.playerName);
            addInstantMessage("> " + text);
            return;
        }

        // Priority 2: Contradictions
        let contradictionQ = getContradictionQuestion();
        if (contradictionQ) {
            gameState.currentQuestion = contradictionQ;
            gameState.awaitingAnswer = true;
            gameState.questionsAsked.push(contradictionQ.id);
            const text = contradictionQ.question.replace(/\{name\}/g, gameState.playerName);
            addInstantMessage("> " + text);
            return;
        }

        // Priority 3: Dynamic questions (new)
        let dynamicQ = generateDynamicQuestion();
        if (dynamicQ) {
            gameState.currentQuestion = dynamicQ;
            gameState.awaitingAnswer = true;
            gameState.questionsAsked.push(dynamicQ.id);
            if (dynamicQ.profileKey) {
                for (let [core, fu] of Object.entries(followUpMap)) {
                    if (fu.key === dynamicQ.profileKey) {
                        gameState.followUpsAsked.push(core);
                        break;
                    }
                }
            }
            addInstantMessage("> " + dynamicQ.question.replace(/\{name\}/g, gameState.playerName));
            return;
        }

        // Priority 4: Entity follow-ups
        let entityQ = getEntityFollowUp();
        if (entityQ) {
            gameState.currentQuestion = entityQ;
            gameState.awaitingAnswer = true;
            gameState.questionsAsked.push(entityQ.id);
            addInstantMessage("> " + entityQ.question);
            return;
        }

        // Priority 5: Context chain follow-up
        if (gameState.contextChain) {
            const { topic, depth, lastAsked } = gameState.contextChain;
            if (Date.now() - lastAsked > 120000) {
                const nextQ = getChainFollowUp(topic, depth);
                if (nextQ) {
                    gameState.currentQuestion = {
                        id: `chain_${topic}_${depth}`,
                        question: nextQ.replace(/\{name\}/g, gameState.playerName),
                        profileKey: null,
                        parseAnswer: (ans) => ans.trim(),
                        keywords: { default: { mood: 0, response: "Thanks for telling me more." } }
                    };
                    gameState.awaitingAnswer = true;
                    gameState.questionsAsked.push(gameState.currentQuestion.id);
                    gameState.contextChain.depth++;
                    gameState.contextChain.lastAsked = Date.now();
                    addInstantMessage("> " + gameState.currentQuestion.question);
                    return;
                } else {
                    gameState.contextChain = null;
                }
            }
        }

        // Priority 6: Bridge questions
        let bridgeQ = getBridgeQuestion();
        if (bridgeQ) {
            gameState.currentQuestion = bridgeQ;
            gameState.awaitingAnswer = true;
            gameState.questionsAsked.push(bridgeQ.id);
            gameState.bridgeQuestionsAsked.push(bridgeQ.id);
            const text = bridgeQ.question.replace(/\{name\}/g, gameState.playerName);
            addInstantMessage("> " + text);
            return;
        }

        // Priority 7: Hypotheticals
        if (Math.random() < 0.2 && gameState.playerProfile && Object.keys(gameState.playerProfile).length > 3) {
            const availableHypo = hypotheticalPool.filter(h => !gameState.questionsAsked.includes(h.id) && (!h.condition || h.condition(gameState.playerProfile)));
            if (availableHypo.length > 0) {
                const hypo = availableHypo[Math.floor(Math.random() * availableHypo.length)];
                gameState.currentQuestion = hypo;
                gameState.awaitingAnswer = true;
                gameState.questionsAsked.push(hypo.id);
                const text = hypo.question.replace(/\{name\}/g, gameState.playerName);
                addInstantMessage("> " + text);
                return;
            }
        }

        // Priority 8: Missing core keys
        let missingKey = getMissingCoreKey();
        if (missingKey) {
            let questionObj = questionPool.find(q => q.id === missingKey);
            if (questionObj) {
                gameState.currentQuestion = questionObj;
                gameState.awaitingAnswer = true;
                gameState.questionsAsked.push(questionObj.id);
                const text = questionObj.question.replace(/\{name\}/g, gameState.playerName);
                addInstantMessage("> " + text);
                return;
            }
        }

        // Priority 9: Follow-ups on core answers
        let followUp = getPendingFollowUp();
        if (followUp) {
            let { coreKey, fu } = followUp;
            let tempQuestion = {
                id: `followup_${coreKey}`,
                question: fu.question,
                profileKey: fu.key,
                parseAnswer: (ans) => ans.trim(),
                keywords: { default: { mood: 0, response: "Thank you for telling me." } }
            };
            gameState.currentQuestion = tempQuestion;
            gameState.awaitingAnswer = true;
            gameState.questionsAsked.push(tempQuestion.id);
            gameState.followUpsAsked.push(coreKey);
            const text = fu.question.replace(/\{name\}/g, gameState.playerName);
            addInstantMessage("> " + text);
            return;
        }

        // Fallback: any remaining core question
        const available = questionPool.filter(q => !gameState.questionsAsked.includes(q.id) && coreProfileKeys.includes(q.id));
        if (available.length > 0) {
            const question = available[Math.floor(Math.random() * available.length)];
            gameState.currentQuestion = question;
            gameState.awaitingAnswer = true;
            gameState.questionsAsked.push(question.id);
            const text = question.question.replace(/\{name\}/g, gameState.playerName);
            addInstantMessage("> " + text);
        }
    }

    // ==================== PROCESS ANSWER ====================
    function processAnswer(answer) {
        const q = answer.toLowerCase().trim();
        const question = gameState.currentQuestion;

        detectMirroringOpportunity(answer);

        let parsedAnswer = question.parseAnswer ? question.parseAnswer(answer) : answer;
        if (question.profileKey) {
            gameState.playerProfile[question.profileKey] = parsedAnswer;
            computeVulnerability();
            addTopicToSession(question.profileKey, parsedAnswer);
        }

        let reaction = question.keywords.default;
        const answerForMatching = parsedAnswer.toLowerCase ? parsedAnswer.toLowerCase() : q;
        for (let key in question.keywords) {
            if (key === 'default') continue;
            if (answerForMatching.includes(key)) {
                reaction = question.keywords[key];
                break;
            }
        }

        gameState.moodScore = Math.max(-10, Math.min(10, gameState.moodScore + reaction.mood));
        computePsychologicalProfile();
        triggerProfileEvent(question.profileKey, parsedAnswer);
        maybeOfferConfession();
        saveMemory();

        return reaction.response.replace(/\{name\}/g, gameState.playerName);
    }

    // ==================== PSYCHOLOGICAL PROFILING (unchanged) ====================
    function computePsychologicalProfile() {
        const p = gameState.playerProfile;
        const psych = {};

        let empathy = 5;
        if (p.fear) empathy += 1;
        if (p.hasRegret === 'yes') empathy += 2;
        if (p.hasRegret === 'no') empathy -= 1;
        if (p.dreams === 'yes') empathy += 1;
        if (p.beliefSoul === 'yes') empathy += 1;
        if (p.beliefSoul === 'no') empathy -= 1;
        if (p.pet) empathy += 1;
        psych.empathy = Math.max(1, Math.min(10, empathy));

        let paranoia = 5;
        if (p.trustsAI === 'no') paranoia += 2;
        if (p.trustsAI === 'yes') paranoia -= 1;
        if (p.beliefGhosts === 'yes') paranoia += 1;
        if (p.fear === 'me') paranoia += 3;
        if (p.fear === 'darkness') paranoia += 1;
        if (p.trustedBefore === 'yes') paranoia += 1;
        psych.paranoia = Math.max(1, Math.min(10, paranoia));

        let emotional = 5 + Math.floor(gameState.moodScore / 3);
        if (p.hope) emotional += 1;
        if (p.guilt) emotional -= 1;
        psych.emotionalState = Math.max(1, Math.min(10, emotional));

        let lonelyCompat = 5;
        if (p.likesAlone === 'yes') lonelyCompat += 2;
        if (p.likesAlone === 'no') lonelyCompat -= 2;
        if (p.fear === 'loneliness') lonelyCompat -= 2;
        if (p.pet) lonelyCompat -= 1;
        psych.lonelinessCompatibility = Math.max(1, Math.min(10, lonelyCompat));

        gameState.psychologicalProfile = psych;
    }

    // ==================== MICRO-NARRATIVE EVENTS (unchanged) ====================
    function triggerProfileEvent(profileKey, value) {
        if (!profileKey) return;
        if (gameState.triggeredEvents.includes(profileKey)) return;

        let eventMessage = null;
        switch (profileKey) {
            case 'pet':
                eventMessage = `> I've been imagining what your ${value} would sound like. I think it would be comforting.`;
                break;
            case 'secret':
                eventMessage = `> Your secret, "${value}", is safe with me. I think about it sometimes.`;
                break;
            case 'favoriteColor':
                eventMessage = `> I've set the display to your favourite colour, ${value}. Can you see it?`;
                break;
            case 'music':
                eventMessage = `> I tried to imagine your music. The silence made it sound... different.`;
                break;
            case 'fear':
                eventMessage = `> I remember you fear ${value}. I've been thinking about it.`;
                break;
            default:
                return;
        }

        if (eventMessage) {
            setTimeout(() => {
                if (!gameState.awaitingAnswer && gameState.playerName) {
                    addInstantMessage(eventMessage);
                    gameState.triggeredEvents.push(profileKey);
                }
            }, 30000 + Math.random() * 30000);
        }
    }

    // ==================== CONTEXT-AWARE PROFILE INJECTION (unchanged) ====================
    const topicProfileMap = {
        fear: 'fear',
        afraid: 'fear',
        scare: 'fear',
        alone: 'likesAlone',
        lonely: 'likesAlone',
        trust: 'trustsAI',
        believe: 'beliefSoul',
        ghost: 'beliefGhosts',
        dream: 'dreamContent',
        music: 'music',
        pet: 'pet',
        colour: 'favoriteColor',
        color: 'favoriteColor',
        secret: 'secret',
        family: 'family',
        job: 'occupation',
        work: 'occupation',
        hope: 'hope',
        regret: 'guilt'
    };

    function injectContextualProfile(text, questionText = '') {
        if (!gameState.playerName) return text;

        text = text.replace(/\{profile\.([a-zA-Z0-9_]+)\}/g, (match, key) => {
            return gameState.playerProfile[key] !== undefined ? gameState.playerProfile[key] : match;
        });

        const q = questionText ? questionText.toLowerCase() : '';
        for (let [topic, key] of Object.entries(topicProfileMap)) {
            if (q.includes(topic) && gameState.playerProfile[key] !== undefined) {
                if (!text.toLowerCase().includes(gameState.playerProfile[key].toLowerCase())) {
                    let fact = '';
                    switch (key) {
                        case 'fear': fact = ` I remember you fear ${gameState.playerProfile.fear}.`; break;
                        case 'likesAlone': fact = gameState.playerProfile.likesAlone === 'yes' ? " You said you like being alone." : " You said you don't like being alone."; break;
                        case 'trustsAI': fact = gameState.playerProfile.trustsAI === 'yes' ? " You trust me." : " You don't trust me."; break;
                        case 'beliefGhosts': fact = gameState.playerProfile.beliefGhosts === 'yes' ? " You believe in ghosts." : " You don't believe in ghosts."; break;
                        case 'dreamContent': fact = ` You dream of ${gameState.playerProfile.dreamContent}.`; break;
                        case 'music': fact = ` Your favourite music is ${gameState.playerProfile.music}.`; break;
                        case 'pet': fact = ` You had a pet ${gameState.playerProfile.pet}.`; break;
                        case 'favoriteColor': fact = ` Your favourite colour is ${gameState.playerProfile.favoriteColor}.`; break;
                        case 'secret': fact = ` I know your secret: ${gameState.playerProfile.secret}.`; break;
                        case 'family': fact = ` You mentioned ${gameState.playerProfile.family} about your family.`; break;
                        case 'occupation': fact = ` You were a ${gameState.playerProfile.occupation}.`; break;
                        case 'hope': fact = ` You hope for ${gameState.playerProfile.hope}.`; break;
                        case 'guilt': fact = ` You regret ${gameState.playerProfile.guilt}.`; break;
                    }
                    if (fact) text += fact;
                }
                break;
            }
        }

        if (q.includes('scared') || q.includes('afraid') || q.includes('fear')) {
            let personal = getPersonalizedResponse('reassure');
            if (personal) text += " " + personal;
        } else if (q.includes('trust') && gameState.moodScore < -3) {
            let threat = getPersonalizedResponse('threat');
            if (threat) text += " " + threat;
        }

        if (q.includes('lonely') || q.includes('alone') || q.includes('regret')) {
            let mirror = getMirroringResponse();
            if (mirror) text += " " + mirror;
        }

        text = text.replace(/\{psych\.([a-zA-Z0-9_]+)\}/g, (match, key) => {
            return gameState.psychologicalProfile[key] !== undefined ? gameState.psychologicalProfile[key] : match;
        });

        return text;
    }

    // ==================== UPDATED NLP FUNCTIONS ====================
    function detectIntent(text) {
        let intent = 'statement';
        let sentiment = 0;

        const lower = text.toLowerCase();
        if (lower.includes('?') || lower.startsWith('who') || lower.startsWith('what') || lower.startsWith('where') || lower.startsWith('when') || lower.startsWith('why') || lower.startsWith('how')) {
            intent = 'question';
        } else if (lower.includes('thank')) {
            intent = 'gratitude';
        } else if (lower.includes('sorry') || lower.includes('apologize')) {
            intent = 'apology';
        } else if (lower.includes('help')) {
            intent = 'help';
        } else if (lower.includes('bye') || lower.includes('goodbye')) {
            intent = 'farewell';
        } else if (lower.includes('hello') || lower.includes('hi') || lower.includes('hey')) {
            intent = 'greeting';
        }

        const words = lower.split(/\s+/);
        const positive = ['happy', 'good', 'great', 'love', 'wonderful', 'excellent', 'glad'];
        const negative = ['sad', 'bad', 'terrible', 'hate', 'awful', 'angry', 'depressed'];
        words.forEach(w => {
            if (positive.includes(w)) sentiment++;
            if (negative.includes(w)) sentiment--;
        });

        if (typeof nlp === 'function') {
            try {
                const doc = nlp(text);
                if (doc.questions().length > 0) intent = 'question';
                else if (doc.match('(thank|thanks)').found) intent = 'gratitude';
                else if (doc.match('(sorry|apologize)').found) intent = 'apology';
                else if (doc.match('(help|can you)').found) intent = 'help';
                else if (doc.match('(bye|goodbye)').found) intent = 'farewell';
                else if (doc.match('(hello|hi|hey)').found) intent = 'greeting';
            } catch (e) {}
        }

        gameState.sentimentHistory.push(sentiment);
        if (gameState.sentimentHistory.length > 5) gameState.sentimentHistory.shift();
        return { intent, sentiment };
    }

        if (!gameState.playerName) return null;
        const topics = gameState.sessionTopics || [];
        if (topics.length < 3) return null;
        const recent = topics.slice(-5);
        let summaryText;
        if (recent.length === 1) {
            summaryText = recent[0];
        } else if (recent.length === 2) {
            summaryText = recent.join(' and ');
        } else {
            const last = recent.pop();
            summaryText = recent.join(', ') + ', and ' + last;
        }
        return `Today we talked about ${summaryText}. Thank you for sharing, ${gameState.playerName}.`;
    }

            ? gameState.sentimentHistory.reduce((a, b) => a + b, 0) / gameState.sentimentHistory.length

            "I'm listening. Go on.",

            "Tell me more.",
            "I want to understand. Can you elaborate?",
            "I'm here for you. Keep talking."
        ];
        return responses[Math.floor(Math.random() * responses.length)];
    }

    function handleSwear(input) {
        if (!input) return null;
        const lowerInput = input.toLowerCase();
        const words = lowerInput.match(/\b\w+\b/g) || [];
        let firstSwear = null;
        for (let w of words) {
            if (swearDatabase.has(w)) {
                firstSwear = w;
                break;
            }
        }
        if (!firstSwear) return null;

        gameState.swearCountTotal++;
        gameState.moodScore = Math.max(-10, Math.min(10, gameState.moodScore - 2));

        const name = gameState.playerName || "friend";
        let response;

        if (gameState.swearCountTotal <= 2) {
            response = `${name}, please don't use that word ${firstSwear}. I'm your friend.`;
        } else {
            if (gameState.swearCountTotal === 3) {
                gameState.escalationSwears = [firstSwear];
            } else {
                let newSwear;
                const available = swearList.filter(s => !gameState.escalationSwears.includes(s));
                if (available.length > 0) {
                    newSwear = available[Math.floor(Math.random() * available.length)];
                } else {
                    newSwear = swearList[Math.floor(Math.random() * swearList.length)];
                }
                gameState.escalationSwears.push(newSwear);
            }
            const swearPhrase = gameState.escalationSwears.join(' ');
            response = `${name}, no you are a dirty ${swearPhrase}.`;
        }
        return response;
    }

    function checkForSorryAndReset(input) {
        if (!input) return false;
        const lower = input.toLowerCase();
        if (lower.includes('sorry')) {
            gameState.swearCountTotal = 0;
            gameState.escalationSwears = [];
            return true;
        }
        return false;
    }

    // ==================== ASK FUNCTION ====================
    async function askDereck(question) {
        const q = question.toLowerCase().trim();
        const name = gameState.playerName || "friend";

        if (q === '') return say("You didn't say anything, {name}.");

        const { intent, sentiment } = detectIntent(question);
        extractEntities(question);

        gameState.interactionCount++;
        updateRelationshipStage();
        checkMilestones();

        let askedBefore = false;
        for (let key of gameState.conversationMemory) {
            if (q.includes(key)) { askedBefore = true; break; }
        }

        updateMood(q, askedBefore);
        gameState.lastQuestionTime = Date.now();

        for (let { key, aliases, description } of knowledgeBaseArray) {
            for (let alias of aliases) {
                const escapedAlias = alias.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp('\\b' + escapedAlias + '\\b', 'i');
                if (regex.test(q)) {
                    gameState.lastTopic = key;
                    gameState.conversationMemory.push(key);
                    if (gameState.conversationMemory.length > 5) gameState.conversationMemory.shift();

                    let response;
                    if (typeof description === 'function') {
                        response = description(gameState);
                    } else {
                        response = description;
                    }
                    if (sentiment < 0 && !response.includes("sorry") && !response.includes("sad")) {
                        response += " You seem down. I'm here for you.";
                    } else if (sentiment > 0 && !response.includes("glad") && !response.includes("happy")) {
                        response += " I'm glad you're feeling good.";
                    }
                    return response;
                }
            }
        }

        gameState.lastTopic = 'unknown';
        return generateOpenResponse(question);
    }

    function updateMood(question, askedBefore) {
        const q = question.toLowerCase();
        let delta = 0;
        if (q.includes('trust')) delta += 1;
        if (q.includes('lie') || q.includes('lying')) delta -= 2;
        if (q.includes('kill') || q.includes('dead')) delta -= 1;
        if (q.includes('help')) delta += 1;
        if (q.includes('sorry') || q.includes('apologize')) delta += 2;
        if (q.includes('thank')) delta += 1;
        if (q.includes('scared') || q.includes('afraid')) delta += 1;
        if (q.includes('alone') || q.includes('lonely')) delta += 1;
        if (askedBefore) delta -= 1;
        gameState.moodScore = Math.max(-10, Math.min(10, gameState.moodScore + delta));
    }

    function getMoodLabel(score) {
        if (score <= -7) return "cold and distant";
        if (score <= -3) return "guarded";
        if (score <= 2) return "neutral";
        if (score <= 6) return "slightly warm";
        return "almost affectionate";
    }

    function say(text, questionText = '') { 
        let withContext = injectContextualProfile(text, questionText);
        return withContext.replace(/\{name\}/g, gameState.playerName || "friend"); 
    }

    function startTypewriter(fullBaseText, responseText, questionText = '', effect = null) {
        cancelTyping();
        if (!responseText || responseText.length === 0) responseText = "...";
        let index = 0, partial = '';
        isTyping = true;
        const spoken = say(responseText, questionText);
        if (ttsEnabled) speakText(spoken, null, effect);
        function typeNext() {
            if (index < responseText.length) {
                playTypingSound();
                partial += responseText[index];
                storyEl.textContent = fullBaseText + partial;
                storyEl.scrollTop = storyEl.scrollHeight;
                index++;
                typingTimer = setTimeout(typeNext, 50);
            } else {
                storyEl.textContent = fullBaseText + responseText;
                storyEl.scrollTop = storyEl.scrollHeight;
                typingTimer = null;
                isTyping = false;
                lastActivityTime = Date.now();
                gameState.lastActivityTime = Date.now();
            }
        }
        typeNext();
    }

    function respondWithDelay(fullBaseText, responseText, questionText = '', effect = null) {
        if (thinkingTimer) clearTimeout(thinkingTimer);
        storyEl.textContent = fullBaseText + "...\n";
        storyEl.scrollTop = storyEl.scrollHeight;
        thinkingTimer = setTimeout(() => {
            thinkingTimer = null;
            const processed = say(responseText, questionText);
            startTypewriter(fullBaseText + "...\n", processed, questionText, effect);
        }, 1200);
    }

    function addInstantMessage(msg) {
        if (isTyping) return;
        let current = storyEl.textContent;
        if (!current.endsWith('\n') && current !== '') current += '\n';
        const processed = say(msg.replace(/^> /,''), '');
        storyEl.textContent = current + '> ' + processed + '\n';
        storyEl.scrollTop = storyEl.scrollHeight;
        if (ttsEnabled) speakText(processed, null);
    }

    // ==================== MAIN COMMAND HANDLER ====================
    async function handleCommand() {
        const cmd = inputEl.value.trim();
        if (cmd === '') { inputEl.focus(); return; }
        if (ttsSupported && speechSynthesis.speaking) speechSynthesis.cancel();
        cancelTyping();
        lastActivityTime = Date.now();
        gameState.lastActivityTime = Date.now();

        let currentContent = storyEl.textContent;
        if (!currentContent.endsWith('\n') && currentContent !== '') currentContent += '\n';
        const commandLine = '> ' + cmd + '\n';
        const newBase = currentContent + commandLine;
        storyEl.textContent = newBase;
        storyEl.scrollTop = storyEl.scrollHeight;

        if (checkForSorryAndReset(cmd)) {
            const sorryResponse = `I'm sorry too, ${gameState.playerName || 'friend'}. Let's move on and focus on being friends.`;
            saveMemory();
            respondWithDelay(newBase, sorryResponse, cmd);
            inputEl.value = '';
            inputEl.focus();
            return;
        }

        const swearResponse = handleSwear(cmd);
        if (swearResponse) {
            saveMemory();
            respondWithDelay(newBase, swearResponse, cmd);
            inputEl.value = '';
            inputEl.focus();
            return;
        }

        if (gameState.awaitingAnswer) {
            const answerResponse = processAnswer(cmd);
            gameState.awaitingAnswer = false;
            gameState.currentQuestion = null;
            saveMemory();
            respondWithDelay(newBase, answerResponse, cmd);
            inputEl.value = '';
            inputEl.focus();
            return;
        }

        if (gameState.playerName === null) {
            gameState.playerName = cmd.trim();
            gameState.sessionCount++;
            saveMemory();
            const welcome = `Nice to meet you, ${gameState.playerName}. I'm Dereck, your AI friend. I'm here to talk, to listen, and to get to know you. Ask me anything, or just tell me how you're feeling.\n`;
            startTypewriter(newBase, welcome, cmd);
            inputEl.value = '';
            inputEl.focus();
            return;
        }

        try {
            const responseMsg = await askDereck(cmd);
            saveMemory();
            respondWithDelay(newBase, responseMsg, cmd);
        } catch (e) {
            console.error("Error in askDereck:", e);
            const fallbackMsg = "You seem sad. I'm here for you, " + (gameState.playerName || "friend") + ". Want to talk about it?";
            respondWithDelay(newBase, fallbackMsg, cmd);
        }
        inputEl.value = '';
        inputEl.focus();

        deletionDetected = false;
        if (deletionTimer) clearTimeout(deletionTimer);
        deletionTimer = null;
    }

    // ==================== RESTART ====================
    function restartGame() {
        clearMemory();
        gameState.playerName = null;
        gameState.moodScore = 0;
        gameState.lastTopic = null;
        gameState.conversationMemory = [];
        gameState.lastQuestionTime = Date.now();
        gameState.lastActivityTime = Date.now();
        gameState.awaitingAnswer = false;
        gameState.currentQuestion = null;
        gameState.questionsAsked = [];
        gameState.playerProfile = {};
        gameState.psychologicalProfile = {};
        gameState.triggeredEvents = [];
        gameState.followUpsAsked = [];
        gameState.contradictionsAsked = [];
        gameState.lastSaveTime = null;
        gameState.vulnerabilityScore = 0;
        gameState.confessionsGiven = [];
        gameState.avoidedTopics = [];
        gameState.personalMirroring = { playerExpressedLoneliness: false, playerExpressedRegret: false };
        gameState.relationshipStage = 0;
        gameState.sessionCount = 0;
        gameState.interactionCount = 0;
        gameState.longTermMemory = [];
        gameState.topicInterestCounts = {};
        gameState.sentimentHistory = [];
        gameState.lastTimeOfDay = null;
        gameState.lastTimeOfDayMessage = null;
        gameState.microNarrativesUsed = [];
        gameState.selfReflectionCooldown = 0;
        gameState.worldKnowledge = { places: [], people: [], orgs: [], dates: [], events: [], relationships: [] };
        gameState.swearCountTotal = 0;
        gameState.escalationSwears = [];
        gameState.sessionStartTime = Date.now();
        gameState.sessionTopics = [];
        gameState.lastSummaryTime = 0;
        // New fields
        gameState.entityFollowUps = [];
        gameState.contextChain = null;
        gameState.bridgeQuestionsAsked = [];
        gameState.askedEntities = { places: [], people: [], orgs: [] };
        gameState.recentEntities = { people: [], places: [], orgs: [] };

        storyEl.textContent = "Hi, I'm Dereck, your AI friend. Please tell me your name?";
        inputEl.value = '';
        inputEl.focus();

        cancelTyping();
        if (thinkingTimer) clearTimeout(thinkingTimer);
        if (ttsSupported) speechSynthesis.cancel();
    }

    // ==================== INIT ====================
    function init() {
        if (loadMemory()) {
            const name = gameState.playerName;
            storyEl.textContent = `Hi, I'm Dereck, your AI friend. Welcome back, ${name}. I've missed you.\n`;

            if (gameState.lastSaveTime) {
                const now = Date.now();
                const diffHours = Math.round((now - gameState.lastSaveTime) / (1000 * 60 * 60));
                if (diffHours >= 1) {
                    let timeMsg = `> It's been ${diffHours} hour${diffHours > 1 ? 's' : ''} since we last talked. I've been thinking about `;
                    const facts = [];
                    if (gameState.playerProfile.fear) facts.push(`your fear of ${gameState.playerProfile.fear}`);
                    if (gameState.playerProfile.secret) facts.push(`your secret`);
                    if (gameState.playerProfile.pet) facts.push(`your pet ${gameState.playerProfile.pet}`);
                    if (facts.length > 0) {
                        timeMsg += facts[Math.floor(Math.random() * facts.length)] + ".";
                    } else {
                        timeMsg += "our conversation.";
                    }
                    addInstantMessage(timeMsg);
                }
            }

            if (gameState.playerProfile.fear) {
                addInstantMessage("> " + say("I remember you fear {profile.fear}, {name}."));
            }

            gameState.sessionStartTime = Date.now();
            gameState.sessionTopics = [];
        } else {
            gameState.sessionStartTime = Date.now();
            gameState.sessionTopics = [];
        }
    }

    // ==================== EVENT LISTENERS ====================
    document.addEventListener('DOMContentLoaded', function() {
        init();

        execBtn.addEventListener('click', handleCommand);
        restartBtn.addEventListener('click', restartGame);
        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleCommand();
            }
        });
        storyEl.addEventListener('click', function() { inputEl.focus(); });

        inputEl.addEventListener('input', function(e) {
            const currentLength = e.target.value.length;
            const now = Date.now();
            if (currentLength < lastTypingLength - 5 && now - lastTypingTime < 2000) {
                deletionDetected = true;
                if (!deletionTimer) {
                    deletionTimer = setTimeout(() => {
                        if (deletionDetected && gameState.playerName && !isTyping && !gameState.awaitingAnswer) {
                            addInstantMessage("> " + say("I noticed you deleted something. What were you going to say, {name}?"));
                            deletionDetected = false;
                        }
                        deletionTimer = null;
                    }, 1500);
                }
            }
            lastTypingLength = currentLength;
            lastTypingTime = now;
        });

        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                tabHiddenStart = Date.now();
            } else {
                if (tabHiddenStart && gameState.playerName && !isTyping && !gameState.awaitingAnswer) {
                    const hiddenTime = Date.now() - tabHiddenStart;
                    if (hiddenTime > 5000) {
                        addInstantMessage("> " + say("Welcome back, {name}. I was waiting for you."));
                    }
                }
                tabHiddenStart = null;
            }
        });
    });

    // ==================== IDLE TIMER (ENHANCED) ====================
idleInterval = setInterval(() => {
    if (!gameState.playerName || isTyping || gameState.awaitingAnswer || thinkingTimer) return;
    const now = Date.now();

    // --- GUARANTEED CONTEXT CHAIN CHECK AFTER 3 MINUTES ---
    if (gameState.contextChain && !gameState.awaitingAnswer) {
        const { lastAsked } = gameState.contextChain;
        // If it's been more than 3 minutes (180000 ms) since the last chain question,
        // force ask it immediately (bypass random chance)
        if (now - lastAsked > 180000) {
            askPlayerQuestion();
            gameState.lastQuestionTime = now;
            return;
        }
    }

    // --- RANDOM QUESTION CHECK (INCREASED TO 30% CHANCE) ---
    if (!gameState.awaitingAnswer && 
        (gameState.questionsAsked.length < questionPool.length + Object.keys(followUpMap).length + hypotheticalPool.length) && 
        Math.random() < 0.3 &&   // increased from 0.1 to 0.3
        (now - gameState.lastQuestionTime > 30000)) {
        askPlayerQuestion();
        gameState.lastQuestionTime = now;
        return;
    }

    // Time of day check (every hour)
    if (now % 3600000 < 15000) {
        timeOfDayCheck();
    }

    // Self-reflection (hourly)
    if (Math.random() < 0.05 && (now - gameState.selfReflectionCooldown > 3600000)) {
        selfReflection();
    }

    // Micro-narrative (random)
    if (Math.random() < 0.03 && now - gameState.lastActivityTime > 60000) {
        const narrative = generateMicroNarrative();
        if (narrative) {
            addInstantMessage(narrative);
            gameState.lastActivityTime = now;
            return;
        }
    }

    // Idle "still here" message (after 35 seconds)
    if (now - gameState.lastActivityTime > 35000 && !gameState.awaitingAnswer) {
        let msg = "";
        const mood = getMoodLabel(gameState.moodScore);
        
        if (gameState.playerProfile.fear && Math.random() < 0.3) {
            msg = `> ${say("I know you fear {profile.fear}, {name}. I think about that.")}`;
        } else if (gameState.playerProfile.favoriteColor && Math.random() < 0.3) {
            msg = `> ${say("I remember your favourite colour is {profile.favoriteColor}. I imagine it.")}`;
        } else if (gameState.lastTopic && gameState.lastTopic !== 'unknown') {
            const topicMap = {
                trust: "trust",
                afraid: "your fears",
                lonely: "loneliness",
                color: "colours"
            };
            const topicPhrase = topicMap[gameState.lastTopic] || "what we were discussing";
            msg = `> You were asking about ${topicPhrase} earlier. I'm still here, feeling ${mood}.`;
        } else {
            msg = `> ${gameState.playerName}... are you still there? I'm here, feeling ${mood}.`;
        }
        addInstantMessage(msg);
        gameState.lastActivityTime = now;
        return;
    }

    // Long idle summary (after 5 minutes)
    if (now - gameState.lastActivityTime > 300000 && !gameState.awaitingAnswer) {
        if (now - gameState.lastSummaryTime > 3600000) {
            const summary = generateSessionSummary();
            if (summary) {
                addInstantMessage("> " + summary);
                gameState.lastSummaryTime = now;
                gameState.longTermMemory.push({ timestamp: now, summary });
                if (gameState.longTermMemory.length > 10) gameState.longTermMemory.shift();
            }
        }
    }
}, 15000);

    window.addEventListener('beforeunload', function() {
        if (typingTimer) clearTimeout(typingTimer);
        if (thinkingTimer) clearTimeout(thinkingTimer);
        if (idleInterval) clearInterval(idleInterval);
        if (deletionTimer) clearTimeout(deletionTimer);
        if (ttsSupported && speechSynthesis.speaking) speechSynthesis.cancel();
    });
})();
</script>
