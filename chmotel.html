<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>LAST STOP MOTEL · 1987</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&family=Special+Eli
    te&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #040308;
            --screen-bg: #08060c;
            --panel-bg: #0a0810;
            --text: #c4bab0;
            --text-dim: #8a6a78;
            --text-bright: #f0d0e0;
            --accent: #ff1a75;
            --accent-dim: #3d0025;
            --border: #c01060;
            --border-glow: 0 0 14px #ff1a7555, 0 0 32px #3d002522;
            --danger: #c01060;
            --danger-glow: 0 0 12px #ff1a7544;
            --rose: #e8a0c0;
            --rose-dim: #5c2050;
            --gold: #e8a0c0;
            --gold-dim: #4a1050;
            --green: #4a7a3a;
            --input-bg: #100e18;
            --button-bg: #14121c;
            --button-hover: #1c1828;
            --button-active: #18101c;
            --bevel-light: #282230;
            --bevel-dark: #040206;
            --font-display: 'Playfair Display', 'Creepster', cursive;
            --font-title: 'Nosifer', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.06;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 30px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #140a18 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #141114;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2a2028, 0 0 0 4px #0d0a10, 0 0 0 8px #060408, 0 8px 48px #000000dd, 0 0 60px #3d002522;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #ff1a75;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #0a060c;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #ff69b4;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff69b488, 0 0 18px #ff69b433;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #ff69b488, 0 0 18px #ff69b433;
            }
            50% {
                box-shadow: 0 0 14px #ff69b4bb, 0 0 28px #ff69b455;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #5a3850;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #ff1a75;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0,
                        var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #0a0408;
            border-bottom: 3px solid #c01060;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #1a0814;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #ff1a75;
            border-radius: 2px;
            padding: 10px 14px;
            background: #060208;
            position: relative;
            box-shadow: inset 0 0 24px #3d002511;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #ff1a75;
            box-shadow: 0 0 12px #ff1a7588;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #e8a0c044;
            box-shadow: 0 0 8px #e8a0c033;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #ff1a75;
            text-shadow: 0 0 16px #ff1a7588, 0 2px 4px #000, 0 0 40px #8b004588;
            letter-spacing: 3px;
            font-family: var(--font-title);
            line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #9a6a8a;
            letter-spacing: 5px;
            margin-top: 3px;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 20px;
                letter-spacing: 1px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #3d1830 #08060c;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #08060c;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #3d1830;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #282230;
            border-top-color: #342c3c;
            border-left-color: #302834;
            border-right-color: #1c1824;
            border-bottom-color: #100e18;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #1c1824;
            border-left-color: #1c1824;
            border-bottom-color: #342c3c;
            border-right-color: #302834;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #100e18;
        }
        .btn.accent {
            background: #140a12;
            border-color: #6a1040;
            border-top-color: #9a1050;
            border-left-color: #7a1040;
            border-right-color: #3d1830;
            border-bottom-color: #1a0518;
            color: #e0c0d0;
            box-shadow: 0 2px 0 #00000044, 0 0 10px #ff1a7522;
        }
        .btn.accent:active {
            border-top-color: #3d1830;
            border-left-color: #3d1830;
            border-bottom-color: #9a1050;
            border-right-color: #7a1040;
            box-shadow: 0 0px 0 #00000044, 0 0 16px #ff1a7544;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .theater-mask {
            position: relative;
            background: #0a0812;
            border: 2px solid #c0106066;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.8);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #080610;
            border: 2px solid #ff1a75;
            padding: 15px;
            border-radius: 3px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #ff1a75;
            box-shadow: 0 0 22px #ff1a7566, 0 0 0 2px #1a0a14;
            object-fit: cover;
            flex-shrink: 0;
            background: #0a0610;
        }
        .speech-bubble {
            flex: 1;
            background: #100e1a;
            border: 2px solid #ff1a75;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #e0c8d0;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #ff1a7588 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #080610;
            border: 1px solid #3d1830;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #12101a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8a6a78;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #c01060;
            box-shadow: 0 0 20px #ff1a7544, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #080610;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(4, 3, 8, 0.85) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 14px;
            letter-spacing: 3px;
            color: #ff1a75;
            text-shadow: 0 0 10px #ff1a75cc, 0 0 30px #ff1a7588, 0 2px 4px #000000, 0 0 60px #3d0025;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom,
                    rgba(10, 4, 8, 0.9) 0%,
                    rgba(10, 4, 8, 0.7) 40%,
                    transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 16px;
            letter-spacing: 1.5px;
            color: #ffb6d0;
            text-shadow: 0 0 8px #ff1a7588, 0 0 20px #5c205044, 0 2px 4px #000000;
            background: linear-gradient(to top,
                    rgba(4, 3, 8, 0.9) 0%,
                    rgba(4, 3, 8, 0.6) 50%,
                    transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8a6a78;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 11px;
                letter-spacing: 2px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 13px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #ff1a75;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #e0c0d0;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 10px #ff1a7544;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0c0a14;
            border: 1px solid #ff1a75;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #ff1a75;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #e0c0d0;
        }
        .guide-desc {
            font-size: 15px;
            color: #8a6a78;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0c0a14;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #ff1a75;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #c4bab0;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #14121c;
            border: 2px solid #ff1a7566;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #c4bab0;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #ff1a75;
            box-shadow: 0 0 14px #ff1a7544;
        }
        .loading-text {
            color: var(--rose);
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #06040a;
            border-top: 1px solid #ff1a7544;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #5a3850;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #7a5870;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #1a1418;
            color: #7a5870;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #5a3850;
            color: #8a6a78;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #e0c8d0;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">LAST STOP MOTEL · CRT-87</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">LAST STOP<br>MOTEL</div>
                    <div class="marquee-sub">⏤ VACANCY · 1987 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="motelPanel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">🛏️ LAST STOP MOTEL · VACANCY</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('last_stop_motel_key') || '';

            const TRIGGER_EVENTS = [
                'Storm', 'Breakdown', 'Blackout', 'Roadblock', 'Flat Tire',
                'Running Out of Gas', 'Wrong Turn', 'Missed Exit', 'Broken Phone', 'Late Arrival'
            ];

            const DEFAULT_STATE = {
                motelEpisodes: [],
                motelPerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>🛏️ Roy Maddock</h2>
        <p style="text-align:left;">
            <strong>Role:</strong> Night Manager, <em>Last Stop Motel</em><br>
            <strong>Bio:</strong> Roy Maddock has worked the night desk at the Last Stop Motel since 1979. He's seen every kind of traveler stumble through the lobby—runaways, salesmen, drifters, and worse. His weary eyes have catalogued too many secrets, too many faces that never checked out. Roy doesn't sleep much anymore. He just watches the highway and waits for the next set of headlights to pull into the lot. The coffee's always fresh. The vacancy sign always hums. And Roy always has a story to tell.
        </p>
    `;

            // ── SOUND ENGINE (Web Audio API) ──
            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let crossfadeTimeout = null;

            // Lynch-style section themes – darker, more dissonant, slower
            const SECTION_THEMES = {
                intro: { root: 41, fifth: 62, filterStart: 200, filterEnd: 180, lfoFreq: 0.07,
                intensity: 0.25 },
                setup: { root: 41, fifth: 63, filterStart: 250, filterEnd: 150, lfoFreq: 0.1,
                intensity: 0.28 },
                scheme: { root: 41, fifth: 64, filterStart: 300, filterEnd: 130, lfoFreq: 0.13,
                intensity: 0.32 },
                execution: { root: 41, fifth: 66, filterStart: 350, filterEnd: 110, lfoFreq: 0.16,
                    intensity: 0.38 },
                twist: { root: 41, fifth: 69, filterStart: 400, filterEnd: 90, lfoFreq: 0.2,
                intensity: 0.45 },
                closing: { root: 41, fifth: 62, filterStart: 180, filterEnd: 160, lfoFreq: 0.06,
                    intensity: 0.2 }
            };

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
                console.log('🔇 Keep-alive tone started.');
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    console.log(`🎛️ AudioContext created, state: ${audioCtx.state}`);
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.22;
                    reverbNode.connect(masterGain);
                    const compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.value = -24;
                    compressor.knee.value = 30;
                    compressor.ratio.value = 12;
                    compressor.attack.value = 0.003;
                    compressor.release.value = 0.25;
                    masterGain.connect(compressor);
                    compressor.connect(audioCtx.destination);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 1.0;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.45;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                    reverbNode.connect(masterGain);
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 3;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.6));
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            function createLynchPad(ctx, frequency, duration, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.14, now + 1.2);
                gainNode.gain.setValueAtTime(intensity * 0.14, now + duration - 2);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.5);
                const osc1 = ctx.createOscillator();
                osc1.type = 'triangle';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'triangle';
                osc2.frequency.value = frequency * 1.006;
                const osc3 = ctx.createOscillator();
                osc3.type = 'sine';
                osc3.frequency.value = frequency * 0.498;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 350;
                filter.Q.value = 1.5;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.08 + Math.random() * 0.12;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 150 + Math.random() * 150;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);
                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            function createLynchSting(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.25, now + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(90, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.3);
                osc.frequency.exponentialRampToValueAtTime(60, now + 2.0);
                const osc2 = ctx.createOscillator();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(180, now);
                osc2.frequency.exponentialRampToValueAtTime(600, now + 0.3);
                osc2.frequency.exponentialRampToValueAtTime(120, now + 2.0);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 1;
                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);
                osc.start(now);
                osc2.start(now);
                osc.stop(now + 2.5);
                osc2.stop(now + 2.5);
            }

            function createLynchClimax(ctx, intensity = 0.7) {
                const now = ctx.currentTime;
                const duration = 10 + Math.random() * 8;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.4, now + 3);
                gainNode.gain.setValueAtTime(intensity * 0.5, now + duration - 1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                const osc1 = ctx.createOscillator();
                osc1.type = 'triangle';
                osc1.frequency.setValueAtTime(82, now);
                osc1.frequency.exponentialRampToValueAtTime(165, now + duration * 0.5);
                const osc2 = ctx.createOscillator();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(165, now);
                osc2.frequency.exponentialRampToValueAtTime(330, now + duration * 0.5);
                const osc3 = ctx.createOscillator();
                osc3.type = 'sine';
                osc3.frequency.setValueAtTime(41, now);
                osc3.frequency.exponentialRampToValueAtTime(82, now + duration * 0.7);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(250, now);
                filter.frequency.exponentialRampToValueAtTime(900, now + duration);
                filter.Q.value = 2;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.1;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 180;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);
                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.5);
                osc2.stop(now + duration + 0.5);
                osc3.stop(now + duration + 0.5);
                lfo.stop(now + duration + 0.5);
            }

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    switch (type) {
                        case 'pad':
                            createLynchPad(ctx, 82 + Math.random() * 30, 25 + Math.random() * 25, gainValue);
                            break;
                        case 'sting':
                            createLynchSting(ctx, gainValue);
                            break;
                        case 'heartbeat':
                            playThump(ctx, now, 0.7 * gainValue);
                            setTimeout(() => playThump(ctx, now + 0.18, 0.7 * gainValue), 180);
                            break;
                        case 'thunder': {
                            const bufferSize = ctx.sampleRate * 0.7;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.4));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(gainValue * 0.55, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 120;
                            filter.Q.value = 0.5;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(now);
                            source.stop(now + 1.0);
                            break;
                        }
                        case 'bell': {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 60 + Math.random() * 25;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0, now);
                            gain.gain.linearRampToValueAtTime(gainValue * 0.35, now + 0.15);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 4);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 400;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(now);
                            osc.stop(now + 4);
                            break;
                        }
                        case 'climax':
                            createLynchClimax(ctx, gainValue);
                            break;
                        default:
                            console.warn(`Unknown sound type: ${type}`);
                    }
                } catch (err) {
                    console.error(`❌ Error in playSound("${type}"):`, err);
                }
            }

            function playThump(ctx, time, intensity) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(50, time);
                osc.frequency.exponentialRampToValueAtTime(25, time + 0.12);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.7, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(time);
                osc.stop(time + 0.12);
            }

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    console.log(`🌫️ Ambient: ${type} for ${durationSeconds}s`);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(gainValue * 0.25, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'ambient_drone' || type === 'wind_howl') {
                        const bufferSize = ctx.sampleRate * 1;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.5;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'ambient_drone' ? 150 : 450;
                        filter.Q.value = 0.5;
                        const osc = ctx.createOscillator();
                        osc.type = 'triangle';
                        osc.frequency.value = type === 'ambient_drone' ? 60 : 100;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.18 * gainValue;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 80;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds * 1000);
                } catch (err) {
                    console.error(`❌ Error in playAmbient("${type}"):`, err);
                }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) { ambientGain.disconnect();
                            ambientGain = null; }
                    }, 300);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) { clearTimeout(ambientTimeout);
                    ambientTimeout = null; }
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 25000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' +
                                apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`);
                    }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') { throw new Error(
                            'Request timed out. Please try again.'); }
                    throw e;
                } finally { clearTimeout(timeout); }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s roadside motel, neon sign, grainy VHS, dark cinematic')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e; await new Promise(r =>
                            setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else { clearInterval(timer);
                            resolve(); }
                    }, speed);
                });
            }

            function speakTextMale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                    'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'];
                let voice = null;
                for (const name of maleNames) {
                    voice = voices.find(v => v.name.includes(name));
                    if (voice) break;
                }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.6;
                utterance.pitch = 0.88;
                speechSynthesis.speak(utterance);
            }

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const maleNames = ['Google UK English Male', 'Google US English Male', 'Daniel',
                        'Microsoft David', 'Fred', 'Alex', 'Thomas', 'James'];
                    let voice = null;
                    for (const name of maleNames) {
                        voice = voices.find(v => v.name.includes(name));
                        if (voice) break;
                    }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[
                        0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.6;
                    utterance.pitch = voiceConfig.pitch || 0.88;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) {
                            currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar);
                            if (cueChecker) cueChecker(currentChar);
                        }
                    };
                    utterance.onend = () => {
                        element.textContent = text;
                        if (cueChecker) cueChecker(text.length);
                        resolve();
                    };
                    utterance.onerror = (e) => {
                        console.warn('TTS error:', e);
                        element.textContent = text;
                        resolve();
                    };
                    speechSynthesis.speak(utterance);
                });
            }

                const testBtn = document.createElement('button');
                testBtn.className = 'btn';
                testBtn.textContent = '🔊 Test Sound (Heartbeat + Thunder)';
                testBtn.style.marginTop = '6px';
                testBtn.style.width = '100%';
                testBtn.addEventListener('click', () => {
                    playSound('heartbeat', 0.8);
                    setTimeout(() => playSound('thunder', 0.6), 500);
                    setTimeout(() => playAmbient('ambient_drone', 5, 0.3), 1000);
                });
                guideList.appendChild(testBtn);
                if (gameState.motelPerformance && gameState.motelPerformance.rawStoryText && !gameState
                    .motelPerformance.soundCues) {
                    const produceBtn = document.createElement('button');
                    produceBtn.className = 'btn';
                    produceBtn.style.marginTop = '6px';
                    produceBtn.style.width = '100%';
                    produceBtn.textContent = '🎬 Produce Soundtrack (Current)';
                    produceBtn.addEventListener('click', async () => {
                        produceBtn.disabled = true;
                        produceBtn.textContent = '🎚️ Composing…';
                        try {
                            const cues = await generateSoundCueSheet(gameState.motelPerformance
                                .rawStoryText);
                            gameState.motelPerformance.soundCues = cues;
                            saveState();
                            produceBtn.textContent = '✅ Soundtrack Ready';
                            renderMotel();
                        } catch (e) {
                            showModal(
                                `<h2>Soundtrack Failed</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                                );
                            produceBtn.disabled = false;
                            produceBtn.textContent = '🎬 Produce Soundtrack (Current)';
                        }
                    });
                    guideList.appendChild(produceBtn);
                }
                document.querySelectorAll('.perform-saved-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const index = parseInt(btn.dataset.index);
                        const ep = gameState.motelEpisodes[index];
                        if (!ep) return;
                        gameState.motelPerformance = { ...ep, soundCues: ep.soundCues || null,
                            rawStoryText: ep.rawStoryText || ep.story };
                        saveState();
                        await startMotelPerformance();
                    });
                });
                document.querySelectorAll('.produce-episode-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const index = parseInt(btn.dataset.index);
                        const ep = gameState.motelEpisodes[index];
                        if (!ep || !ep.rawStoryText) return;
                        btn.disabled = true;
                        btn.textContent = '🎚️...';
                        try {
                            const soundtrack = await generateSoundCueSheet(ep.rawStoryText);
                            ep.soundCues = soundtrack;
                            saveState();
                            renderMotel();
                        } catch (err) {
                            showModal(
                                `<h2>Soundtrack Failed</h2><p>${esc(err.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`
                                );
                            btn.disabled = false;
                            btn.textContent = '🎬 Produce';
                        }
                    });
                });
            }

            async function generateNewMotelStory() {
                const triggerEvent = TRIGGER_EVENTS[Math.floor(Math.random() * TRIGGER_EVENTS.length)];
                const system =
                    `You are Roy Maddock, the weary night manager of the Last Stop Motel—a quiet roadside refuge hidden beside forgotten highways, deserted county roads, and lonely stretches of blacktop. You've seen every kind of traveler stumble through the lobby since 1979. You narrate grounded, psychological thrillers set in the 1980s. No ghosts, no monsters—only human nature at its most unpredictable.`;
                const prompt =
                    `Write a 900-1100 word psychological thriller set in the 1980s at the Last Stop Motel. The story begins because of: ${triggerEvent}. Use tight third-person prose. STRICT RULES: NO supernatural elements—no ghosts, curses, magic, monsters, or dreams. The horror must be purely human—suspicion, desperation, deception, paranoia, brutal consequences of ordinary choices. Stephen King / Hitchcock brutal style. Follow this structure: a weary traveler arrives at the motel due to the event, tensions build as strangers interact, secrets surface, and the situation escalates to a grounded, violent, disturbing climax with an ironic twist. Frame with Roy's weary intro and close with his cynical observation. Return ONLY valid JSON: title, story (use \\n for line breaks), closing_remark, trigger_event. Raw JSON only, no markdown.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: prompt }
                ], 3500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) {
                    throw new Error('Invalid story structure.');
                }
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Horror movie poster for "${story.title}", 1980s roadside motel, neon sign, dark and moody, grainy VHS`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) { console.warn('Could not generate poster:', e); }
                gameState.motelPerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    triggerEvent: story.trigger_event || triggerEvent,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system = `You are a sound designer for a psychological thriller. Given a short story, return JSON with THREE keys:
- "sections": 5-6 sections dividing the story into emotional acts. Each: "theme" (intro, setup, scheme, execution, twist, closing), "start_char" (inclusive), "end_char" (exclusive). Cover entire story 0 to ${length}.
- "cues": array of sound events using types: "sting", "heartbeat", "thunder", "bell", "climax". At least 40 cues spread evenly. Each: "position" (char index), "type", optional "intensity" (0-1).
- "score": object with keys matching theme names. Each: "bpm" (40-65), "bass" (8 semitone intervals from root 0, use dissonant/minor intervals), "arp" (8 semitone intervals, sparse), "kick" (8 numbers, 1=hit, very sparse), "snare" (same, almost none). Make it dark and ambient.
Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and score patterns.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: userPrompt }
                ], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try { data = JSON.parse(cleaned); } catch (parseErr) {
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try { data = JSON.parse(candidate); } catch (e2) { throw new Error(
                                'Failed to parse soundtrack JSON.'); }
                    } else { throw new Error('No JSON found in response.'); }
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object') {
                    throw new Error('Missing sections, cues, or score.');
                }
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char <
                    length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({ type: c.type, position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7 }));
                const requiredThemes = ['intro', 'setup', 'scheme', 'execution', 'twist', 'closing'];
                const score = {};
                for (const theme of requiredThemes) {
                    if (data.score[theme]) {
                        score[theme] = {
                            bpm: data.score[theme].bpm || 50,
                            bass: data.score[theme].bass || [0, 0, 3, 3, 0, 0, 3, 3],
                            arp: data.score[theme].arp || [12, 12, 15, 15, 12, 12, 15, 15],
                            kick: data.score[theme].kick || [1, 0, 0, 0, 0, 0, 0, 0],
                            snare: data.score[theme].snare || [0, 0, 0, 0, 0, 0, 0, 0]
                        };
                    } else {
                        score[theme] = { bpm: 50, bass: [0, 0, 3, 3, 0, 0, 3, 3], arp: [12, 12, 15, 15, 12, 12,
                                15, 15
                            ], kick: [1, 0, 0, 0, 0, 0, 0, 0], snare: [0, 0, 0, 0, 0, 0, 0, 0] };
                    }
                }
                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {
                await generateNewMotelStory();
                if (!gameState.motelPerformance) throw new Error('Failed to generate story');
                const soundtrack = await generateSoundCueSheet(gameState.motelPerformance.rawStoryText);
                gameState.motelPerformance.soundCues = soundtrack;
                saveState();
                await startMotelPerformance();
            }

            // ── LYNCH-STYLE SCORE ENGINE ──
            function createLynchNote(ctx, frequency, startTime, duration, gainValue, type = 'triangle') {
                const now = startTime;
                const osc1 = ctx.createOscillator();
                osc1.type = 'triangle';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'triangle';
                osc2.frequency.value = frequency * 1.008;
                const sub = ctx.createOscillator();
                sub.type = 'sine';
                sub.frequency.value = frequency / 2;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 350;
                filter.Q.value = 1.2;
                const filterEnv = ctx.createGain();
                filterEnv.gain.setValueAtTime(600, now);
                filterEnv.gain.exponentialRampToValueAtTime(150, now + 0.15);
                filterEnv.gain.exponentialRampToValueAtTime(40, now + duration * 0.7);
                filterEnv.connect(filter.frequency);
                const mainGain = ctx.createGain();
                mainGain.gain.setValueAtTime(0, now);
                mainGain.gain.linearRampToValueAtTime(gainValue * 0.22, now + 0.04);
                mainGain.gain.setValueAtTime(gainValue * 0.22, now + duration * 0.5);
                mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.15);
                osc1.connect(filter);
                osc2.connect(filter);
                sub.connect(filter);
                filter.connect(mainGain);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.6;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.5;
                mainGain.connect(drySend);
                mainGain.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);
                osc1.start(now);
                osc2.start(now);
                sub.start(now);
                osc1.stop(now + duration + 0.2);
                osc2.stop(now + duration + 0.2);
                sub.stop(now + duration + 0.2);
            }

            function createLynchKick(ctx, time) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(120, time);
                osc.frequency.exponentialRampToValueAtTime(25, time + 0.1);
                const gainBody = ctx.createGain();
                gainBody.gain.setValueAtTime(0.5, time);
                gainBody.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
                osc.connect(gainBody);
                gainBody.connect(dryGain);
                osc.start(time);
                osc.stop(time + 0.25);
            }

            function createLynchSnare(ctx, time) {
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.025));
                }
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.5, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(dryGain);
                noise.start(time);
                noise.stop(time + 0.12);
            }

            const LYNCH_SCORE_PATTERNS = {
                intro: { bpm: 42, bass: [0, 0, 0, 0, 3, 3, 3, 3], arp: [12, 12, 12, 12, 15, 15, 15, 15], kick: [1,
                        0, 0, 0, 0, 0, 0, 0
                    ], snare: [0, 0, 0, 0, 0, 0, 0, 0] },
                setup: { bpm: 48, bass: [0, 3, 0, 3, 5, 3, 0, 3], arp: [12, 15, 12, 15, 19, 15, 12, 15], kick: [1,
                        0, 0, 0, 1, 0, 0, 0
                    ], snare: [0, 0, 0, 0, 0, 0, 0, 0] },
                scheme: { bpm: 52, bass: [0, 3, 5, 6, 5, 3, 0, 3], arp: [12, 15, 19, 22, 19, 15, 12, 15], kick: [1,
                        0, 0, 1, 0, 0, 1, 0
                    ], snare: [0, 0, 0, 0, 0, 0, 0, 0] },
                execution: { bpm: 58, bass: [0, 5, 0, 5, 3, 5, 3, 5], arp: [12, 19, 12, 19, 15, 19, 15, 19],
                    kick: [1, 0, 1, 0, 1, 0, 1, 0], snare: [0, 0, 0, 0, 0, 0, 0, 1] },
                twist: { bpm: 52, bass: [0, 3, 6, 8, 6, 3, 0, 3], arp: [12, 16, 20, 24, 20, 16, 12, 16], kick: [1,
                        0, 0, 0, 0, 0, 1, 0
                    ], snare: [0, 0, 0, 0, 0, 0, 0, 0] },
                closing: { bpm: 38, bass: [0, 0, 3, 0, 0, 0, 3, 0], arp: [12, 12, 15, 12, 12, 12, 15, 12], kick: [1,
                        0, 0, 0, 0, 0, 0, 0
                    ], snare: [0, 0, 0, 0, 0, 0, 0, 0] }
            };

            function startSectionScore(themeName) {
                if (!audioCtx) return;
                console.log(`🎵 Lynch score: ${themeName}`);
                stopSectionAmbient();
                const perf = gameState.motelPerformance;
                let customScore = null;
                if (perf && perf.soundCues && perf.soundCues.score) { customScore = perf.soundCues.score; }
                const fallbackTheme = LYNCH_SCORE_PATTERNS[themeName] || LYNCH_SCORE_PATTERNS.intro;
                const theme = (customScore && customScore[themeName]) ? customScore[themeName] : fallbackTheme;
                const rootFreq = 41;
                const beatDuration = 60 / theme.bpm;
                const patternLength = theme.bass.length;
                const ctx = audioCtx;
                let step = 0;
                let nextStepTime = ctx.currentTime;
                const padGain = ctx.createGain();
                padGain.gain.value = 0.08;
                const padOsc1 = ctx.createOscillator();
                padOsc1.type = 'triangle';
                padOsc1.frequency.value = rootFreq;
                const padOsc2 = ctx.createOscillator();
                padOsc2.type = 'triangle';
                padOsc2.frequency.value = rootFreq * 1.503;
                const padOsc3 = ctx.createOscillator();
                padOsc3.type = 'sine';
                padOsc3.frequency.value = rootFreq / 2;
                const padFilter = ctx.createBiquadFilter();
                padFilter.type = 'lowpass';
                padFilter.frequency.value = 250;
                padFilter.Q.value = 1;
                padOsc1.connect(padFilter);
                padOsc2.connect(padFilter);
                padOsc3.connect(padFilter);
                padFilter.connect(padGain);
                const padDry = ctx.createGain();
                padDry.gain.value = 0.5;
                const padWet = ctx.createGain();
                padWet.gain.value = 0.4;
                padGain.connect(padDry);
                padGain.connect(padWet);
                padDry.connect(dryGain);
                padWet.connect(wetGain);
                padOsc1.start();
                padOsc2.start();
                padOsc3.start();
                const stopSources = [padOsc1, padOsc2, padOsc3];
                let timeoutId;

                function scheduleStep() {
                    if (!sectionAmbientActive) return;
                    const now = nextStepTime;
                    const bassSemitone = theme.bass[step % patternLength];
                    const bassFreq = rootFreq * Math.pow(2, bassSemitone / 12);
                    createLynchNote(ctx, bassFreq, now, beatDuration * 0.85, 0.7, 'triangle');
                    const arpSemitone = theme.arp[step % patternLength];
                    const arpFreq = rootFreq * Math.pow(2, arpSemitone / 12);
                    createLynchNote(ctx, arpFreq, now, beatDuration * 0.45, 0.5, 'sine');
                    if (theme.kick[step % patternLength]) createLynchKick(ctx, now);
                    if (theme.snare[step % patternLength]) createLynchSnare(ctx, now);
                    step++;
                    nextStepTime += beatDuration;
                    timeoutId = setTimeout(scheduleStep, (nextStepTime - ctx.currentTime) * 1000);
                }
                nextStepTime = ctx.currentTime + 0.05;
                timeoutId = setTimeout(scheduleStep, 50);
                sectionAmbientActive = {
                    stop: () => {
                        clearTimeout(timeoutId);
                        padGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                        stopSources.forEach(s => { try { s.stop(ctx.currentTime + 0.3); } catch (e) {} });
                        sectionAmbientActive = null;
                    }
                };
            }
            const transitionSectionTheme = startSectionScore;

            function stopSectionAmbient() {
                if (sectionAmbientActive) { sectionAmbientActive.stop();
                    sectionAmbientActive = null; }
                clearTimeout(crossfadeTimeout);
            }

            async function startMotelPerformance() {
                speechSynthesis.cancel();
                if (window.motelTimeout) clearTimeout(window.motelTimeout);
                const storyData = gameState.motelPerformance;
                if (!storyData || !storyData.story) {
                    await generateNewMotelStory();
                    return startMotelPerformance();
                }
                let sectionList = null;
                let cueList = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) {
                        cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                    } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                        sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                    }
                }
                const bubble = document.getElementById('motelSpeechBubble');
                const dialogue = document.getElementById('motelDialogue');
                const imageEl = document.getElementById('motelSegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('motelGuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#ff1a75';
                bubble.style.boxShadow = '0 0 30px #ff1a7588';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('motelBackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('motelAddEpisodeBtn');
                if (oldAdd) oldAdd.remove();
                const posterContainer = document.getElementById('motelPosterContainer');
                const posterTitle = document.getElementById('motelPosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) { posterTitle.textContent = storyData.title || ''; }
                } else if (posterContainer) { posterContainer.classList.add('no-image'); }
                const intro =
                    `"Evening. Roy Maddock, night desk. Every road leads somewhere... and tonight, it led right here to the Last Stop Motel. This one starts with a ${storyData.triggerEvent || 'wrong turn'}. Let me tell you about '${storyData.title}'."`;
                dialogue.textContent = '';
                speakTextMale(intro);
                await typewriterEffect(dialogue, intro, 50);
                await new Promise(r => setTimeout(r, 1500));
                if (sectionList && sectionList.length > 0) { transitionSectionTheme(sectionList[0].theme); }
                const storyText = storyData.rawStoryText || storyData.story;
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b.start_char) :
                        [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) { lastLog = idx; }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <=
                            idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) { currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme); }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) { triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity); }
                            cueIdx++;
                        }
                    };
                }
                dialogue.textContent = '';
                if (cueChecker) {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.6, pitch: 0.88 }, (idx) => cueChecker(
                        idx));
                } else {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.6, pitch: 0.88 });
                }
                await new Promise(r => setTimeout(r, 1200));
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#e0c8d0';
                dialogue.appendChild(closingLine);
                speakTextMale(closing);
                await typewriterEffect(closingLine, closing, 45);
                await new Promise(r => setTimeout(r, 1000));
                const curtainText = document.createElement('p');
                curtainText.textContent = '— The vacancy sign flickers —';
                stopSectionAmbient();
                curtainText.style.color = '#8a6a78';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();
                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Leave Motel';
                leaveBtn.addEventListener('click', () => { leaveMotel(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'motelAddEpisodeBtn';
                addBtn.textContent = '➕ Register Guest';
                addBtn.addEventListener('click', () => {
                    addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Registered';
                });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

            function addCurrentEpisode() {
                const perf = gameState.motelPerformance;
                if (!perf) return;
                gameState.motelEpisodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
                saveState();
                setTimeout(() => leaveMotel(), 600);
            }

            function leaveMotel() {
                stopAmbient();
                stopSectionAmbient();
                renderMotel();
            }

            function init() {
                loadState();
                renderMotel();
                document.getElementById('resetApiBtn').addEventListener('click', () => {
                    const key = prompt('Enter your Mistral API key:');
                    if (key && key.length > 10) {
                        apiKey = key;
                        localStorage.setItem('last_stop_motel_key', key);
                    }
                });
                document.getElementById('genericModal').addEventListener('click', e => {
                    if (e.target === e.currentTarget) closeModal();
                });
                document.querySelector('.game-area').addEventListener('click', (e) => {
                    const portrait = e.target.closest('.host-portrait');
                    if (portrait && HOST_BIO) { showModal(HOST_BIO); }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeModal();
                });
                if (!apiKey) { setTimeout(() => document.getElementById('resetApiBtn').click(), 800); }
            }
            init();
        })();
    </script>
