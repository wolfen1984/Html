            showModal(`
                <h2 style="color:#f0d9b0; font-family:var(--font-display);">📝 TAPE DETAILS</h2>
                <p style="font-size:18px; color:#e8d5b0;"><strong>${esc(t.title)}</strong> (${esc(t.year)})</p>
                <p>Genre: <strong>${esc(t.genre)}</strong> · Rarity: <span class="rarity-stars">${'⭐'.repeat(t.rarity)}${'⚫'.repeat(5-t.rarity)}</span></p>
                <p>Director: <strong>${esc(t.director)}</strong></p>
                <p>Condition: <strong style="color:${t.condition==='mint'?'#33cc55':t.condition==='worn'?'#ffaa22':'#cc4422'}">${esc(t.condition)}</strong></p>
                <p style="color:#c8c8c8; line-height:1.5;">${esc(t.synopsis)}</p>
                <p style="color:#7a6a6a; font-size:13px;">Tags: ${esc((t.tags||[]).join(', '))}</p>
                <button class="modal-btn" onclick="closeModal()">Close</button>
            `);
        }));
        panel.querySelectorAll('.scenes-btn').forEach(b => b.addEventListener('click', ()=>{
            const t = gameState.tapes.find(t=>t.id===b.dataset.id);
            if(t) playScenes(t);
        }));
        panel.querySelectorAll('.sell-btn').forEach(b => b.addEventListener('click', ()=>{
            const t = gameState.tapes.find(t=>t.id===b.dataset.id);
            if(t) sellTape(t);
        }));
        document.getElementById('findTapeBtn').addEventListener('click', async () => {
            const btn = document.getElementById('findTapeBtn');
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Acquiring...';
            try {
                const data = await generateTape();
                if (!addTape(data)) { btn.disabled = false; btn.textContent = '➕ Acquire New Tape'; return; }
                refreshAll();
                const tape = gameState.tapes.find(t => t.title === data.title && !t.posterUrl);
                if (tape) requestPoster(tape);
            } catch(e){ showModal('<h2>❌ Error</h2><p>Failed to acquire tape. Try again.</p><button class="modal-btn" onclick="closeModal()">OK</button>'); }
            finally { btn.disabled = false; btn.textContent = '➕ Acquire New Tape'; }
        });
    }

    function renderTrade() {
        const panel = document.getElementById('tradePanel');
        let html = `<div class="section-header">🤝 TRADE NETWORK</div>`;
        if (!gameState.traders.length) html += '<div class="empty-state">📭 No video stores in the area.<br><small style="color:#555;">Search the classifieds to find fellow collectors.</small></div>';
        else {
            gameState.traders.forEach(trader => {
                html += `<div class="trader-card">
                    <div class="trader-name">${esc(trader.shopName)}</div>
                    <p style="color:#7a6a6a; margin:4px 0;">Owner: <strong style="color:#d4c5b2;">${esc(trader.owner)}</strong></p>
                    <p class="trader-personality">"${esc(trader.personality)}"</p>
                    <div style="margin-top:10px;">`;
                trader.tapes.forEach(tape => {
                    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1520;gap:10px;">
                        <span style="flex:1;min-width:0;">📼 <span style="color:#e8d5b0;">${esc(tape.title)}</span> <span class="rarity-stars">${'⭐'.repeat(tape.rarity)}${'⚫'.repeat(5-tape.rarity)}</span></span>
                        <button class="btn trade-btn" data-trader-id="${trader.id}" data-tape-id="${tape.id}" style="flex-shrink:0;">↔️ Trade</button>
                    </div>`;
                });
                html += `</div></div>`;
            });
        }
        html += `<button class="btn accent" id="findTraderBtn" style="margin-top:10px;">🔍 Find Video Store</button>`;
        panel.innerHTML = html;
        panel.querySelectorAll('.trade-btn').forEach(b => b.addEventListener('click', ()=>{
            const trader = gameState.traders.find(a=>a.id===b.dataset.traderId);
            const tape = trader?.tapes.find(t=>t.id===b.dataset.tapeId);
            if(trader && tape) initiateTrade(trader, tape);
        }));
        document.getElementById('findTraderBtn').addEventListener('click', async ()=>{
            if (Date.now() < gameState.npcGenCooldown) {
                showModal('<h2>⏳ No Signal</h2><p>The classifieds are bare... Try again soon.</p><button class="modal-btn" onclick="closeModal()">OK</button>');
                return;
            }
            const btn = document.getElementById('findTraderBtn');
            btn.disabled = true; btn.textContent = 'Searching...';
            try { await generateTraderNPC(); gameState.npcGenCooldown = Date.now()+60000; refreshAll(); }
            catch(e){ showModal('<h2>❌ Error</h2><p>Failed to find a store.</p><button class="modal-btn" onclick="closeModal()">OK</button>'); }
            finally { btn.disabled = false; btn.textContent = '🔍 Find Video Store'; }
        });
    }

    function renderOffers() {
        const panel = document.getElementById('offersPanel');
        let html = `<div class="section-header">💵 BUY OFFERS</div>`;
        if (!gameState.offers.length) html += '<div class="empty-state">📭 No pending offers.<br><small style="color:#555;">Collectors will reach out when you have rare tapes.</small></div>';
        else {
            gameState.offers.forEach(offer => {
                html += `<div class="offer-card">
                    <strong style="color:#f0d9b0; font-size:16px;">${esc(offer.from)}</strong>
                    <p style="color:#d4c5b2; margin:6px 0; font-style:italic;">"${esc(offer.text)}"</p>
                    <p style="color:#7a6a6a; font-size:13px;">📼 ${esc(offer.tapeTitle)} · 💰 <strong style="color:#33cc55;">$${offer.offerPrice}</strong></p>
                    <div style="display:flex;gap:8px;margin-top:10px;">
                        <button class="btn accent accept-offer-btn" data-offer-id="${offer.id}">✅ Accept</button>
                        <button class="btn danger decline-offer-btn" data-offer-id="${offer.id}">❌ Decline</button>
                    </div>
                </div>`;
            });
        }
        panel.innerHTML = html;
        panel.querySelectorAll('.accept-offer-btn').forEach(b => b.addEventListener('click', ()=> acceptBuyOffer(b.dataset.offerId)));
        panel.querySelectorAll('.decline-offer-btn').forEach(b => b.addEventListener('click', ()=> declineOffer(b.dataset.offerId)));
    }

    function renderDirector() {
        const panel = document.getElementById('directorPanel');
        panel.innerHTML = `<div class="section-header">🎬 THE DIRECTOR</div>
            <p style="color:#7a6a6a;text-align:center;line-height:1.5;">Commission a custom cult film from the eccentric underground filmmaker <strong style="color:#cc4400;">Viktor Kross</strong>.</p>
            <p style="color:#555;text-align:center;font-size:13px;">Costs $500–$2,000 depending on complexity.</p>
            <button class="btn accent" id="startDirectorBtn" style="margin-top:8px;">🎥 Enter the Editing Bay</button>`;
        document.getElementById('startDirectorBtn').addEventListener('click', openDirectorModal);
    }

    function refreshAll() {
        updateStats();
        const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab || 'tapes';
        switchTab(activeTab);
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        const tabBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
        if (tabBtn) tabBtn.classList.add('active');
        const panel = document.getElementById(tab+'Panel');
        if (panel) panel.classList.add('active');
        updateTabIndicator(tab);
        if (tab==='tapes') renderTapes();
        else if (tab==='trade') renderTrade();
        else if (tab==='offers') renderOffers();
        else if (tab==='director') renderDirector();
    }

    function showModal(html) {
        document.getElementById('genericModalContent').innerHTML = html;
        document.getElementById('genericModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    function closeModal() {
        document.getElementById('genericModal').style.display = 'none';
        document.body.style.overflow = '';
        speechSynthesis.cancel();
    }
    window.closeModal = closeModal;

    // Initialize
    loadState();
    refreshAll();

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(t => t.addEventListener('click', ()=> switchTab(t.dataset.tab)));

    // API key button
    document.getElementById('resetApiBtn').addEventListener('click', ()=>{
        const key = prompt('Enter your Mistral API key:');
        if (key && key.length > 10) {
            apiKey = key;
            localStorage.setItem('nightfalls_vhs_key', key);
            document.getElementById('footerMsg').textContent = '🔑 API KEY UPDATED · NIGHTFALLS VHS';
            setTimeout(() => document.getElementById('footerMsg').textContent = '📼 NIGHTFALLS VHS · RENT · TRADE · SURVIVE', 2000);
        }
    });

    // Prompt for API key on load
    if (!apiKey) setTimeout(()=> document.getElementById('resetApiBtn').click(), 800);

    // Passive offers interval
    setInterval(() => { if (Math.random() < 0.3) generatePassiveBuyOfferRandom(); }, 30000);

    // Close modal on background click
    document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
        if (e.key === '1') switchTab('tapes');
        if (e.key === '2') switchTab('trade');
        if (e.key === '3') switchTab('offers');
        if (e.key === '4') switchTab('director');
    });

    // Initialize tab indicator
    updateTabIndicator('tapes');
})();
</script>
</body>
</html>
