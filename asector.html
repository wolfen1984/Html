<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECTOR 187 • NEON RUNNER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-green: #00ff00;
            --dark-bg: #111111;
        }
        
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: var(--neon-green);
            font-family: 'VT323', monospace;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            image-rendering: pixelated;
        }
        
        #game-container {
            position: relative;
            width: 820px;
            height: 1100px;
            max-width: 100vw;
            max-height: 95vh;
            background: url('sector187-ui.png') no-repeat center top;
            background-size: contain;
            border: 12px solid #222;
            border-radius: 8px;
            box-shadow: 
                0 0 30px var(--neon-pink),
                0 0 60px rgba(255, 0, 255, 0.3),
                inset 0 0 80px rgba(0, 255, 255, 0.2);
            overflow: hidden;
            margin: 20px auto;
        }
        
        /* === PERFECTLY ALIGNED OVERLAYS (tweaked for your exact screenshot) === */
        
        /* GAMEPLAY TERMINAL (big black box) */
        #game-log-container {
            position: absolute;
            top: 49.8%;     /* lowered to sit perfectly inside the black terminal */
            left: 4.1%;
            width: 91.8%;
            height: 16.8%;
            background: rgba(0, 0, 0, 0.94);
            border: 4px solid #00ffff;
            box-shadow: 
                0 0 15px var(--neon-blue),
                inset 0 0 20px rgba(0, 255, 255, 0.4);
            padding: 14px 16px;
            overflow-y: auto;
            color: var(--neon-green);
            font-size: 21px;
            line-height: 1.25;
            text-shadow: 0 0 8px var(--neon-green);
            z-index: 10;
        }
        
        #game-log {
            height: 100%;
            margin: 0;
        }
        
        #game-log p {
            margin: 0 0 7px 0;
            white-space: pre-wrap;
        }
        
        /* LEFT INVENTORY PANEL */
        #inventory-panel {
            position: absolute;
            top: 70.2%;      /* now sits exactly over the left panel area */
            left: 4.1%;
            width: 29.6%;
            height: 21.5%;
            background: rgba(10, 10, 20, 0.96);
            border: 4px solid #ff00ff;
            box-shadow: 0 0 20px var(--neon-pink);
            padding: 14px 12px;
            overflow: hidden;
            z-index: 10;
        }
        
        #inventory-panel h2 {
            margin: 0 0 10px 0;
            font-size: 26px;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
            text-align: center;
            letter-spacing: 4px;
        }
        
        #inventory-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 21px;
            max-height: 74%;
            overflow-y: auto;
        }
        
        #inventory-list li {
            padding: 4px 0;
            border-bottom: 1px dashed rgba(255,0,255,0.3);
        }
        
        /* CENTER PLAYER STATS PANEL */
        #player-panel {
            position: absolute;
            top: 70.2%;
            left: 35%;
            width: 27.8%;
            height: 21.5%;
            background: rgba(10, 10, 20, 0.96);
            border: 4px solid #00ffff;
            box-shadow: 0 0 20px var(--neon-blue);
            padding: 14px 12px;
            z-index: 10;
        }
        
        #player-panel h2 {
            margin: 0 0 10px 0;
            font-size: 26px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            text-align: center;
            letter-spacing: 4px;
        }
        
        #player-stats {
            font-size: 23px;
            line-height: 1.45;
        }
        
        /* RIGHT SLAYER PANEL (with stacked action buttons) */
        #slayer-panel {
            position: absolute;
            top: 70.2%;
            left: 64.4%;
            width: 29.6%;
            height: 21.5%;
            background: rgba(10, 10, 20, 0.96);
            border: 4px solid #ff00aa;
            box-shadow: 0 0 20px #ff00aa;
            padding: 12px 10px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        #slayer-header {
            font-size: 26px;
            color: #ff00aa;
            text-align: center;
            margin-bottom: 4px;
            text-shadow: 0 0 10px #ff00aa;
            letter-spacing: 3px;
        }
        
        .action-btn {
            font-family: 'VT323', monospace;
            font-size: 23px;
            padding: 9px 12px;
            border: 3px solid #00ffff;
            background: #111;
            color: #00ffff;
            cursor: pointer;
            text-shadow: 0 0 10px #00ffff;
            box-shadow: 0 0 12px #00ffff;
            transition: all 0.1s;
            letter-spacing: 2px;
            flex: 1;
        }
        
        .action-btn:hover {
            background: #00ffff;
            color: #111;
            transform: scale(1.05);
        }
        
        .action-btn.red {
            border-color: #ff0066;
            color: #ff0066;
            box-shadow: 0 0 12px #ff0066;
        }
        
        .action-btn.red:hover {
            background: #ff0066;
            color: #111;
        }
        
        /* BOTTOM ROW BUTTONS (DNCE SNES PSX CHVT) */
        #bottom-buttons {
            position: absolute;
            bottom: 6.2%;
            left: 4.1%;
            width: 91.8%;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            z-index: 20;
        }
        
        .bottom-btn {
            flex: 1;
            font-family: 'VT323', monospace;
            font-size: 27px;
            padding: 13px 20px;
            background: rgba(0, 0, 0, 0.88);
            border: 4px solid #ff00ff;
            color: #ff00ff;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 0 15px #ff00ff;
            transition: all 0.2s;
        }
        
        .bottom-btn:hover {
            background: #ff00ff;
            color: #000;
            transform: translateY(-3px);
        }
        
        /* Glowing title on top of image */
        .header-glow {
            position: absolute;
            top: 2.8%;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 52px;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 
                0 0 10px #ff0000,
                0 0 20px #ff0000,
                0 0 40px #ff00ff;
            pointer-events: none;
            z-index: 5;
            letter-spacing: 12px;
        }
        
        /* Modal */
        #modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
            color: var(--neon-pink);
            font-size: 48px;
            text-align: center;
            text-shadow: 0 0 20px var(--neon-pink);
        }
        
        .blink { animation: blink 0.8s infinite; }
        
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="game-container">
        
        <div class="header-glow">SECTOR 187</div>
        
        <!-- GAMEPLAY LOG (now perfectly over the black terminal box) -->
        <div id="game-log-container">
            <div id="game-log"></div>
        </div>
        
        <!-- INVENTORY (left panel) -->
        <div id="inventory-panel">
            <h2>INVENTORY</h2>
            <ul id="inventory-list"></ul>
        </div>
        
        <!-- PLAYER STATS (center panel) -->
        <div id="player-panel">
            <h2>PLAYER STATS</h2>
            <div id="player-stats"></div>
        </div>
        
        <!-- SLAYER / ACTION BUTTONS (right panel) -->
        <div id="slayer-panel">
            <div id="slayer-header">SLAYER PROTOCOL</div>
            <button class="action-btn" onclick="doAction('scan')">SCAN SECTOR</button>
            <button class="action-btn" onclick="doAction('hack')">HACK NODE</button>
            <button class="action-btn red" onclick="doAction('brawl')">BRAWL</button>
            <button class="action-btn" onclick="doAction('bargain')">BARGAIN</button>
        </div>
        
        <!-- BOTTOM UI BUTTONS (DNCE SNES PSX CHVT) -->
        <div id="bottom-buttons">
            <div class="bottom-btn" onclick="doAction('dance')">DNCE</div>
            <div class="bottom-btn" onclick="doAction('boost')">SNES</div>
            <div class="bottom-btn" onclick="doAction('pulse')">PSX</div>
            <div class="bottom-btn" onclick="doAction('chat')">CHVT</div>
        </div>
        
        <!-- GAME OVER / WIN MODAL -->
        <div id="modal">
            <div id="modal-text"></div>
            <button onclick="restartGame()" style="margin-top: 40px; font-size: 28px; padding: 15px 40px; background: #111; border: 4px solid #00ffff; color: #00ffff; cursor: pointer;">REBOOT RUNNER</button>
        </div>
    </div>

    <script>
        // ====================== GAME STATE ======================
        let player = {
            health: 100,
            energy: 92,
            credits: 285,
            kills: 7,
            level: 5,
            inventory: ["Neural Jack", "Laser Pistol", "Data Shard ×3", "Glow Stick"]
        };
        
        let storyProgress = 0;
        const gameLogEl = document.getElementById('game-log');
        const inventoryListEl = document.getElementById('inventory-list');
        const playerStatsEl = document.getElementById('player-stats');
        const modalEl = document.getElementById('modal');
        const modalTextEl = document.getElementById('modal-text');
        
        function addLog(text, color = '#00ff00') {
            const p = document.createElement('p');
            p.style.color = color;
            p.textContent = '> ' + text;
            gameLogEl.appendChild(p);
            gameLogEl.scrollTop = gameLogEl.scrollHeight;
            if (gameLogEl.children.length > 12) gameLogEl.removeChild(gameLogEl.children[0]);
        }
        
        function updateInventory() {
            inventoryListEl.innerHTML = '';
            player.inventory.forEach(item => {
                const li = document.createElement('li');
                li.textContent = '▶ ' + item;
                inventoryListEl.appendChild(li);
            });
            if (player.inventory.length === 0) {
                const li = document.createElement('li');
                li.textContent = '— EMPTY —';
                li.style.opacity = '0.4';
                inventoryListEl.appendChild(li);
            }
        }
        
        function updateStats() {
            playerStatsEl.innerHTML = `
                HEALTH &nbsp;&nbsp;&nbsp; <span style="color:${player.health > 40 ? '#00ff00' : '#ff0066'}">${player.health}</span>/100<br>
                ENERGY &nbsp;&nbsp; <span style="color:#00ffff">${player.energy}</span>/100<br>
                CREDITS &nbsp; <span style="color:#ffff00">${player.credits}¥</span><br>
                KILLS &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <span style="color:#ff00ff">${player.kills}</span><br>
                LEVEL &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <span style="color:#00ffaa">${player.level}</span>
            `;
            if (player.health <= 25) playerStatsEl.style.animation = 'blink 0.8s infinite';
            else playerStatsEl.style.animation = '';
        }
        
        function checkGameOver() {
            if (player.health <= 0) {
                modalTextEl.innerHTML = `CRITICAL FAILURE<br><span style="font-size:32px">YOU FLATLINE IN SECTOR 187</span>`;
                modalEl.style.display = 'flex';
                return true;
            }
            return false;
        }
        
        function doAction(action) {
            if (checkGameOver()) return;
            
            let message = '';
            let color = '#00ff00';
            
            switch (action) {
                case 'scan':
                    message = 'SCAN COMPLETE. Drone swarm 3 blocks east.';
                    if (Math.random() > 0.6) { player.credits += 45; message += ' +45¥ scavenged.'; color = '#ffff00'; }
                    player.energy = Math.max(0, player.energy - 8);
                    break;
                case 'hack':
                    message = 'HACKING NEURAL NODE...';
                    if (Math.random() > 0.5) {
                        player.credits += 120;
                        player.inventory.push('Encrypted Core');
                        message += ' SUCCESS! +120¥ + Encrypted Core';
                        color = '#00ffff';
                    } else {
                        player.health -= 18;
                        message += ' TRACE DETECTED. ICE counter-attack!';
                        color = '#ff0066';
                    }
                    player.energy = Math.max(0, player.energy - 22);
                    break;
                case 'brawl':
                    message = 'ENGAGING HOSTILE RUNNER...';
                    const dmg = Math.floor(Math.random() * 35) + 15;
                    player.health -= dmg;
                    player.kills++;
                    message += ` You won. -${dmg} health. +1 KILL.`;
                    color = '#ff00ff';
                    player.energy = Math.max(0, player.energy - 30);
                    break;
                case 'bargain':
                    message = 'BLACK MARKET DEAL...';
                    if (Math.random() > 0.4) {
                        player.inventory.push('Adrenal Booster');
                        player.credits -= 80;
                        message += ' Bought Adrenal Booster (-80¥)';
                        color = '#ffff00';
                    } else {
                        message += ' Dealer ghosted you. Wasted 30¥.';
                        player.credits = Math.max(0, player.credits - 30);
                        color = '#ffaa00';
                    }
                    break;
                case 'dance':
                    message = 'DANCING THROUGH LASER GRID...';
                    if (Math.random() > 0.5) { player.energy += 25; message += ' Perfect dodge!'; color = '#00ffff'; }
                    else { player.health -= 12; message += ' Clipped by beam. -12 health'; color = '#ff0066'; }
                    break;
                case 'boost':
                    message = 'SNES OVERCLOCK ACTIVATED';
                    player.energy = Math.min(100, player.energy + 40);
                    player.health = Math.min(100, player.health + 10);
                    message += ' +40 energy, +10 health';
                    color = '#00ffaa';
                    break;
                case 'pulse':
                    message = 'PSX PULSE EMITTED';
                    storyProgress++;
                    if (storyProgress >= 4) {
                        modalTextEl.innerHTML = `MISSION COMPLETE<br>YOU ESCAPED SECTOR 187<br>THE NEON IS YOURS`;
                        modalEl.style.display = 'flex';
                        return;
                    }
                    message += ` Data core ${storyProgress}/4 located.`;
                    color = '#ff00ff';
                    break;
                case 'chat':
                    message = 'CHATTING WITH STREET FIXER...';
                    const fixerLines = [
                        'Fixer whispers: "The Corp is watching Sector 187."',
                        'Fixer offers a tip: "Head north. The vault is open tonight."',
                        'Fixer sells you a rumor for 40¥.'
                    ];
                    message += ' ' + fixerLines[Math.floor(Math.random() * fixerLines.length)];
                    if (Math.random() > 0.7) player.credits -= 40;
                    color = '#aaaaaa';
                    break;
            }
            
            addLog(message, color);
            updateStats();
            updateInventory();
            
            if (Math.random() > 0.85) {
                addLog('⚠️ AMBUSH! Corporate drone strikes!', '#ff0066');
                player.health -= 22;
                updateStats();
            }
            
            checkGameOver();
        }
        
        function restartGame() {
            player = { health: 100, energy: 92, credits: 285, kills: 7, level: 5, inventory: ["Neural Jack", "Laser Pistol", "Data Shard ×3", "Glow Stick"] };
            storyProgress = 0;
            gameLogEl.innerHTML = '';
            modalEl.style.display = 'none';
            addLog('REBOOTING NEURAL LINK...', '#00ffff');
            addLog('SECTOR 187 • NIGHT CYCLE ACTIVE', '#ff00ff');
            addLog('You are a ghost in the machine.', '#00ff00');
            updateInventory();
            updateStats();
        }
        
        function initGame() {
            addLog('NEURAL LINK ESTABLISHED', '#00ffff');
            addLog('SECTOR 187 • NIGHT CYCLE ACTIVE', '#ff00ff');
            addLog('You are a ghost in the machine.', '#00ff00');
            addLog('The megacorps own the sky. You own the streets.', '#00ff00');
            addLog('What’s your first move, runner?', '#ffff00');
            updateInventory();
            updateStats();
        }
        
        window.onload = initGame;
    </script>
</body>
</html>
