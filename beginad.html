<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle of the Undead 1984 - EXPANDED</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
    <style>
        /* ---------- RETRO TERMINAL UI ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            line-height: 1.6;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            overflow-x: hidden;
        }
        .game-container {
            border: 2px solid #fff;
            padding: 20px;
            margin-top: 20px;
            height: 75vh;
            display: flex;
            flex-direction: column;
        }
        .game-header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px dashed #fff;
            padding-bottom: 10px;
        }
        .game-title {
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 5px #fff;
        }
        .game-subtitle {
            font-size: 12px;
            color: #ccc;
            margin-bottom: 5px;
        }
        .game-output {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
            border: 1px solid #333;
            padding: 15px;
            background-color: #111;
        }
        .game-output p { margin-bottom: 10px; animation: fadeIn 0.5s; }
        .game-output .location { color: #ffff00; margin-top: 15px; margin-bottom: 15px; }
        .game-output .hint { color: #888; font-style: italic; font-size: 12px; }
        .game-output .item { color: #55ff55; }
        .game-output .victory { color: #ffff55; font-weight: bold; }
        .game-output .gold { color: #ffd700; }
        .game-output .health { color: #ff6666; }
        .game-output .npc { color: #55ffff; }
        .game-output .combat { color: #ff4444; font-weight: bold; }
        .game-output .damage { color: #ff9966; }
        .game-output .magic { color: #ff66ff; }
        .game-input-container {
            display: flex;
            align-items: center;
            border-top: 1px dashed #fff;
            padding-top: 15px;
        }
        .game-prompt { margin-right: 10px; color: #00ff00; }
        #game-input {
            background-color: #000;
            color: #fff;
            border: 1px solid #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            padding: 10px;
            flex-grow: 1;
            outline: none;
        }
        #game-input:focus { box-shadow: 0 0 5px #fff; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .game-output::-webkit-scrollbar { width: 10px; }
        .game-output::-webkit-scrollbar-track { background: #111; }
        .game-output::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
        .game-output::-webkit-scrollbar-thumb:hover { background: #444; }
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #222;
            border: 1px solid #444;
            font-size: 12px;
            flex-wrap: wrap;
        }
        .status-item { display: flex; align-items: center; margin-right: 10px; }
        .health-bar {
            width: 100px;
            height: 12px;
            background-color: #333;
            margin-left: 5px;
            border: 1px solid #555;
        }
        .health-fill { height: 100%; background-color: #ff5555; transition: width 0.3s; }
        @media (max-width: 600px) {
            body { font-size: 14px; padding: 10px; }
            .game-title { font-size: 18px; }
            .game-container { padding: 10px; }
            #game-input { font-size: 12px; padding: 8px; }
            .status-bar { font-size: 10px; flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>
    <div class="game-header">
        <h1 class="game-title">CASTLE OF THE UNDEAD 1984</h1>
        <p class="game-subtitle">© 1984 Undead Castle Software</p>
        <p class="game-subtitle">EXPANDED EDITION — 17 ROOMS · NEW AREAS · MORE ENEMIES & NPCs</p>
    </div>
    
    <!-- STATUS BAR: HP, GOLD, WEAPON, ARMOR, WEIGHT -->
    <div class="status-bar" id="status-bar">
        <div class="status-item">
            HP: <span id="player-hp-text">100/100</span>
            <div class="health-bar"><div class="health-fill" id="player-health-fill" style="width:100%;"></div></div>
        </div>
        <div class="status-item">Gold: <span id="player-gold">0</span></div>
        <div class="status-item">Weapon: <span id="player-weapon">Fists (1-2)</span></div>
        <div class="status-item">Armor: <span id="player-armor">None</span></div>
        <div class="status-item">Weight: <span id="player-weight">0/30</span></div>
    </div>
    
    <div class="game-container">
        <div class="game-output" id="game-output"></div>
        <div class="game-input-container">
            <span class="game-prompt">&gt;</span>
            <input type="text" id="game-input" placeholder="Type your command..." autocomplete="off">
        </div>
    </div>

    <script>
        // ==================== CASTLE OF THE UNDEAD - EXPANDED EDITION ====================
        // SAVE KEY
        const SAVE_KEY = 'castleUndead1984ExpandedSave';

        // ==================== DEFAULT ROOM ITEMS (INITIAL STATE) ====================

        // ==================== PLAYER STATS ====================
        const player = {

            inventory: [],
            weapon: { name: "Fists", minDamage: 1, maxDamage: 2, type: "blunt" },
            armor: null,

        // ==================== ITEM WEIGHTS (original + new) ====================
        const itemWeights = {
            // Original
            "rope":1, "heavy rope":2, "rusty key":0.2, "dagger":1, "health potion":0.5,
            "torch":1.5, "shield":4, "guard's log":1, "steel sword":3, "chainmail":8,

        // ==================== WEAPON STATS (original + new) ====================
        const weapons = {
            "fists": { name: "Fists", minDamage:1, maxDamage:2, type:"blunt" },
            "dagger": { name: "Dagger", minDamage:3, maxDamage:6, type:"pierce" },

        // ==================== ARMOR STATS ====================
        const armors = {
            "shield": { name: "Shield", damageReduction:2, weight:4 },
            "chainmail": { name: "Chainmail", damageReduction:3, maxHPBonus:10, weight:8 }
        };

        // ==================== ENEMY DEFINITIONS (original + new) ====================
        const enemies = {
            // Original
            ratSwarm: { name:"Rat Swarm", maxHP:20, currentHP:20, minDamage:2, maxDamage:5,

                defeatMessage:"The creature unravels.", loot:"star chart",
                vulnerabilities:["holy","light"], confusion:true, type:"eldritch" },
            necromancer: { name:"Necromancer", maxHP:80, currentHP:80, minDamage:8, maxDamage:15,
                description:"The source of the curse. Robes crackling with dark energy.",
                defeatMessage:"The necromancer falls, his staff shattering.",
                loot:"necromancer's staff", vulnerabilities:["holy"], boss:true, type:"humanoid" },
            // NEW ENEMIES
            caveTroll: { name:"Cave Troll", maxHP:65, currentHP:65, minDamage:7, maxDamage:13,
                description:"A hulking, smelly troll with a stone club. It regenerates slowly.",
                defeatMessage:"The troll roars and collapses.", loot:"troll tooth",
                vulnerabilities:["fire"], resistances:["cold"], regeneration:3, type:"giant" },
            gargoyle: { name:"Gargoyle", maxHP:45, currentHP:45, minDamage:5, maxDamage:10,
                description:"A stone gargoyle that peels away from the wall, eyes glowing red.",
                defeatMessage:"The gargoyle shatters into rubble.", loot:"gargoyle fragment",
                vulnerabilities:["lightning"], resistances:["fire","cold"], type:"construct" },
            venusFlytrap: { name:"Venus Flytrap", maxHP:30, currentHP:30, minDamage:4, maxDamage:8,

                vulnerabilities:["fire"], type:"plant" },
            alchemicalGolem: { name:"Alchemical Golem", maxHP:50, currentHP:50, minDamage:6, maxDamage:11,

                vulnerabilities:["lightning"], resistances:["fire","cold"], type:"construct" }
        };

        // ==================== CRAFTING RECIPES (original only) ====================
        const recipes = {
            "health potion": { ingredients:["dried herbs","empty bottle"], result:"health potion", description:"Restores 20 HP" },
            "antivenom": { ingredients:["spider silk","dried herbs"], result:"antivenom", description:"Cures poison" },
            "holy water": { ingredients:["empty bottle","holy water font"], result:"holy water", description:"30 damage to undead" }
        };

        // ==================== DIALOGUE DATABASE (original + new) ====================
        const dialogues = {
            gatekeeper: {
                firstGreeting: ["Gatekeeper: 'Hark, traveler. I am bound to these gates...'",
                    "Gatekeeper: 'I lost my family dagger long ago, somewhere inside the castle.'",
                    "Gatekeeper: 'If you find it, I would be eternally grateful.'",
                    "He glances at the well in the courtyard. 'Perhaps you need something to reach it...'"],

                healed: ["Guard: 'Ah, that's better. Thank you, friend.'",

            },

                firstEncounter: ["A massive rat wearing a tiny crown squeaks threateningly!",
                    "Rat King: 'Squeak! This is MY kitchen! What you offer?'"],

                    "The rat king scurries aside, allowing you through."]
            },
            trappedMerchant: {
                freed: ["Merchant: 'Bless you! I've been stuck in that barrel for hours!'",
                    "Merchant: 'I'm a traveling trader. Name's Alric.'",

            },
            archivist: {
                firstMeeting: ["A bronze mechanical man whirs to life.",
                    "Archivist: 'Greetings. I am the keeper of knowledge.'",

                idle: ["Archivist: 'Knowledge is power, traveler.'", "Archivist: 'Bring me rare books and I shall reward you.'"]
            },
            fatherThomas: {

            queenGhost: {
                firstGreeting: ["Queen's Ghost: 'You've come far, mortal.'",
                    "Queen's Ghost: 'That necromancer stole my soul and bound it to this gem.'",

                    "Queen's Ghost: 'Or... take his staff and claim his power. The choice is yours.'"],
                endingGood: ["Queen's Ghost: 'Thank you. At last, I am free.'", "She ascends in a column of golden light, smiling peacefully."],

                greetings: ["Skeleton Jester: 'Rattle rattle! Why did the skeleton go to the party alone?'",

            },
            // NEW NPCs
            lostExplorer: {
                firstGreeting: ["A disheveled man with a lantern calls out: 'Help! I've been trapped down here for days!'",

                    "Explorer: 'If you can clear the path, I'll reward you with my findings.'"],

        // ==================== GAME STATE (original + new) ====================
        const gameState = {
            currentLocation: 'outsideGates',
            visitedLocations: [],
            gameEnded: false,
            ending: null,
            
            // Original rooms
            outsideGates: { gateLocked: true, gatekeeperTalked: false, gatekeeperGivenDagger: false },

        // ==================== ROOM DEFINITIONS (original + new) ====================
        const locations = {
            // --- ORIGINAL ROOMS (13) ---
            outsideGates: {
                name: "OUTSIDE CASTLE GATES",
                description: function() {
                    let desc = "You stand before the ancient Castle of the Undead. Massive iron GATES, rusted and imposing, block the entrance to the north. ";

            },

                description: function() {

                name: "KITCHEN",

        // ==================== UI FUNCTIONS ====================
        const gameOutput = document.getElementById('game-output');
        const gameInput = document.getElementById('game-input');

        function addToOutput(text, className = '') {
            const p = document.createElement('p');
            p.textContent = text;
            if (className) p.className = className;
            gameOutput.appendChild(p);
            gameOutput.scrollTop = gameOutput.scrollHeight;
        }

        function updateStatus() {
            document.getElementById('player-hp-text').textContent = `${player.currentHP}/${player.maxHP}`;
            document.getElementById('player-health-fill').style.width = `${(player.currentHP/player.maxHP)*100}%`;
            document.getElementById('player-gold').textContent = player.gold;
            document.getElementById('player-weapon').textContent = `${player.weapon.name} (${player.weapon.minDamage}-${player.weapon.maxDamage})`;
            document.getElementById('player-armor').textContent = player.armor ? player.armor.name : "None";
            document.getElementById('player-weight').textContent = `${player.currentWeight()}/${player.maxWeight}`;
            saveGame();
        }

        // ==================== SAVE / LOAD ====================
        function saveGame() {
            const roomItems = {};
            for (let r in locations) roomItems[r] = [...(locations[r].items || [])];
            const saveData = {
                player: { maxHP:player.maxHP, currentHP:player.currentHP, gold:player.gold,
                    inventory:[...player.inventory], weapon:{...player.weapon},
                    armor:player.armor?{...player.armor}:null, maxWeight:player.maxWeight,
                    blessings:[...player.blessings], poisonTurns:player.poisonTurns },
                gameState: JSON.parse(JSON.stringify(gameState)),
                roomItems: roomItems
            };
            localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
        }

        function loadGame() {
            const saved = localStorage.getItem(SAVE_KEY);
            if (!saved) return false;
            try {
                const d = JSON.parse(saved);
                Object.assign(player, d.player);
                Object.assign(gameState, d.gameState);
                for (let r in d.roomItems) if (locations[r]) locations[r].items = d.roomItems[r];
                return true;
            } catch(e) { return false; }
        }

        function clearSave() { localStorage.removeItem(SAVE_KEY); }

        function resetToDefaults() {
            for (let r in DEFAULT_ROOM_ITEMS) if (locations[r]) locations[r].items = [...DEFAULT_ROOM_ITEMS[r]];
            player.maxHP=100; player.currentHP=100; player.gold=0; player.inventory=[];
            player.weapon={name:"Fists",minDamage:1,maxDamage:2,type:"blunt"};
            player.armor=null; player.maxWeight=30; player.blessings=[]; player.poisonTurns=0;
            gameState.currentLocation='outsideGates'; gameState.visitedLocations=['outsideGates'];
            gameState.gameEnded=false; gameState.ending=null;

            gameState.outsideGates={gateLocked:true,gatekeeperTalked:false,gatekeeperGivenDagger:false};

        // ==================== MOVEMENT ====================
        function movePlayer(direction) {
            // Special non‑cardinal exits (garden, laboratory, rooftops, treasury)
            if (direction==='garden'||direction==='laboratory'||direction==='rooftops'||direction==='treasury') {
                const loc = locations[gameState.currentLocation];
                const target = loc.exits[direction];
                if (!target) { addToOutput(`You can't go ${direction}.`); return; }
                gameState.currentLocation = target;
                if (!gameState.visitedLocations.includes(target)) gameState.visitedLocations.push(target);
                addToOutput(`You go ${direction}.`);
                showLocation();
                checkForEnemy();
                return;
            }
            
            const loc = locations[gameState.currentLocation];
            const target = loc.exits[direction];
            if (!target) { addToOutput(`You can't go ${direction}.`); return; }
            
            // Blocked paths
            if (gameState.currentLocation==='outsideGates' && direction==='north' && gameState.outsideGates.gateLocked) {
                addToOutput("The massive iron gates are firmly locked."); return;
            }
            if (gameState.currentLocation==='armory' && direction==='east' && !gameState.armory.doorUnlocked) {
                addToOutput("The steel door is jammed shut. You'll need to oil it or pick the lock."); return;
            }
            if (gameState.currentLocation==='library' && direction==='up' && !gameState.library.bookPuzzleSolved) {
                addToOutput("The staircase to the observatory is magically concealed. You need to solve the book puzzle."); return;
            }
            if (gameState.currentLocation==='observatory' && direction==='down' && !gameState.observatory.alignmentSolved) {
                addToOutput("The teleportation circle is inactive. You need to align the orrery first."); return;
            }
            if (gameState.currentLocation==='chapel' && direction==='garden' && !gameState.chapel.altarReconsecrated) {
                addToOutput("The hidden door behind the altar is magically sealed until the altar is reconsecrated."); return;
            }
            if (gameState.currentLocation==='library' && direction==='laboratory' && !gameState.library.bookPuzzleSolved) {
                addToOutput("The bookcase doesn't move. Perhaps you need to arrange the books correctly."); return;
            }
            if (gameState.currentLocation==='bellTower' && direction==='rooftops' && !gameState.bellTower.bellRungThrice) {
                addToOutput("The ledge is too treacherous. Ringing the bell three times might reveal a safer path."); return;
            }
            
            gameState.currentLocation = target;
            if (!gameState.visitedLocations.includes(target)) gameState.visitedLocations.push(target);
            addToOutput(`You go ${direction}.`);
            showLocation();
            checkForEnemy();
        }

        // ==================== COMBAT SYSTEM ====================
        let combatActive = false;
        let currentEnemy = null;
        let combatTurn = 0;

        function checkForEnemy() {
            const roomEnemies = {
                guardhouse:"ratSwarm", armory:"animatedArmor", kitchen:"ghostCook",
                wineCellar:"giantSpider", chapel:"deathKnight", bellTower:"harpy",
                library:"livingBooks", observatory:"starSpawn",
                throneRoom: gameState.throneRoom.necromancerDefeated ? null : "necromancer",
                undergroundCaverns: gameState.undergroundCaverns.trollDefeated ? null : "caveTroll",
                rooftops: gameState.rooftops.gargoyleDefeated ? null : "gargoyle",
                garden: gameState.garden.vineCleared ? null : "venusFlytrap",
                laboratory: gameState.laboratory.golemDefeated ? null : "alchemicalGolem"
            };
            const enemyKey = roomEnemies[gameState.currentLocation];
            if (enemyKey && !combatActive) startCombat(enemyKey);
        }

        function startCombat(enemyType) {
            currentEnemy = JSON.parse(JSON.stringify(enemies[enemyType]));
            combatActive = true; combatTurn = 0;
            addToOutput(`\nA ${currentEnemy.name} appears!`, "combat");
            addToOutput(currentEnemy.description, "combat");
            addToOutput("COMBAT STARTED! Use ATTACK or cast spells!", "combat");
            addToOutput(`Your HP: ${player.currentHP}/${player.maxHP} | ${currentEnemy.name} HP: ${currentEnemy.currentHP}/${currentEnemy.maxHP}`, "combat");
        }

        function playerAttack() {
            if (!combatActive || !currentEnemy) { addToOutput("Nothing to attack."); return; }
            combatTurn++;
            let dmg = Math.floor(Math.random()*(player.weapon.maxDamage-player.weapon.minDamage+1))+player.weapon.minDamage;
            let crit = 0.1 + (player.weapon.crit||0);
            if (Math.random()<crit) { dmg*=2; addToOutput("CRITICAL HIT!","combat"); }
            if (currentEnemy.vulnerabilities?.includes(player.weapon.type)) { dmg=Math.floor(dmg*1.5); addToOutput("Vulnerable!","combat"); }
            if (currentEnemy.resistances?.includes(player.weapon.type)) { dmg=Math.floor(dmg/2); addToOutput("Resisted.","combat"); }
            if (currentEnemy.ethereal && Math.random()<0.5) { dmg=0; addToOutput("Passes through!","combat"); }
            if (currentEnemy.flying && Math.random()<0.3) { dmg=0; addToOutput("Dodges!","combat"); }
            currentEnemy.currentHP = Math.max(0, currentEnemy.currentHP - dmg);
            addToOutput(`You deal ${dmg} damage!`, "player");
            addToOutput(`${currentEnemy.name} HP: ${currentEnemy.currentHP}/${currentEnemy.maxHP}`, "damage");
            if (player.weapon.onHit && dmg>0) player.weapon.onHit(currentEnemy);
            if (currentEnemy.currentHP <= 0) { endCombat(true); return; }
            enemyAttack();
            updateStatus();
        }

        function enemyAttack() {
            let dmg = Math.floor(Math.random()*(currentEnemy.maxDamage-currentEnemy.minDamage+1))+currentEnemy.minDamage;
            if (player.armor?.damageReduction) dmg = Math.max(1, dmg - player.armor.damageReduction);
            if (player.blessings.includes('light') && Math.random()<0.1) dmg = 0;
            if (player.inventory.includes('cloak of shadows') && Math.random()<0.25) dmg = 0;
            player.currentHP = Math.max(0, player.currentHP - dmg);
            addToOutput(`${currentEnemy.name} attacks for ${dmg} damage!`, "enemy");
            addToOutput(`Your HP: ${player.currentHP}/${player.maxHP}`, "health");
            if (currentEnemy.poisonAttack && Math.random()<0.3) { player.poisonTurns += 3; addToOutput("Poisoned!","damage"); }
            if (currentEnemy.regeneration && currentEnemy.currentHP<currentEnemy.maxHP) {
                currentEnemy.currentHP = Math.min(currentEnemy.maxHP, currentEnemy.currentHP + currentEnemy.regeneration);
                addToOutput(`The ${currentEnemy.name} regenerates!`, "combat");
            }
            if (player.currentHP <= 0) endCombat(false);
            if (player.inventory.includes('amulet of life') && player.currentHP<player.maxHP) {
                player.currentHP = Math.min(player.maxHP, player.currentHP+1);
                addToOutput("Amulet of Life restores 1 HP.","health");
            }
        }

        function endCombat(playerWon) {
            if (playerWon) {
                addToOutput(currentEnemy.defeatMessage, "victory");
                if (currentEnemy.loot) { player.inventory.push(currentEnemy.loot); addToOutput(`Found a ${currentEnemy.loot}!`,"item"); }
                player.gold += Math.floor(Math.random()*20)+15;
                addToOutput(`Found ${player.gold} gold.`,"gold");
                // Set defeat flags
                if (currentEnemy.name==="Cave Troll") gameState.undergroundCaverns.trollDefeated = true;
                if (currentEnemy.name==="Gargoyle") gameState.rooftops.gargoyleDefeated = true;
                if (currentEnemy.name==="Venus Flytrap") gameState.garden.vineCleared = true;
                if (currentEnemy.name==="Alchemical Golem") gameState.laboratory.golemDefeated = true;
                if (currentEnemy.name==="Necromancer") gameState.throneRoom.necromancerDefeated = true;
            } else {
                addToOutput("You have been defeated! GAME OVER - Type RESTART.","defeat");
                gameState.gameEnded = true;
            }

        // ==================== TAKE / DROP ====================
        function takeItem(itemName) {
            if (!itemName) { addToOutput("Take what?"); return; }
            const loc = locations[gameState.currentLocation];
            const found = loc.items.find(i => i.toLowerCase().includes(itemName.toLowerCase()));
            if (!found) { addToOutput(`I don't see a ${itemName} here.`); return; }
            let w = itemWeights[found]||1;
            if (player.currentWeight()+w > player.maxWeight) { addToOutput("Too heavy. Drop something first.","hint"); return; }
            loc.items.splice(loc.items.indexOf(found),1);
            player.inventory.push(found);
            addToOutput(`You take the ${found}.`);
            if (found==="bag of holding") { player.maxWeight += 50; addToOutput("Bag of Holding expands capacity!","victory"); }
            updateStatus();
        }

        function dropItem(itemName) {
            if (!itemName) { addToOutput("Drop what?"); return; }
            const found = player.inventory.find(i => i.toLowerCase().includes(itemName.toLowerCase()));
            if (!found) { addToOutput(`You're not carrying a ${itemName}.`); return; }
            player.inventory.splice(player.inventory.indexOf(found),1);
            locations[gameState.currentLocation].items.push(found);
            addToOutput(`You drop the ${found}.`);
            if (found==="bag of holding") { player.maxWeight -= 50; addToOutput("Bag of Holding removed.","hint"); }
            updateStatus();
        }

        // ==================== EXAMINE ====================
        function examineObject(objName) {
            if (!objName) { addToOutput("Examine what?"); return; }
            const o = objName.toLowerCase();
            const inv = player.inventory.find(i => i.toLowerCase().includes(o));
            if (inv) { addToOutput(objectDescriptions[inv]||`You see nothing special about the ${inv}.`); return; }
            const roomItem = locations[gameState.currentLocation].items.find(i => i.toLowerCase().includes(o));
            if (roomItem) { addToOutput(objectDescriptions[roomItem]||`You see a ${roomItem}.`); return; }
            // Room-specific
            if (gameState.currentLocation==='outsideGates') {
                if (o.includes('gatekeeper')||o.includes('spirit')) { addToOutput(objectDescriptions['gatekeeper']); return; }
                if (o.includes('gate')) { addToOutput(objectDescriptions['gate']); return; }
                if (o.includes('breach')) { addToOutput(objectDescriptions['breach']); return; }
            }
            if (gameState.currentLocation==='courtyard') {
                if (o.includes('well')) { addToOutput(objectDescriptions['well']); return; }
                if (o.includes('bucket')) { addToOutput(gameState.courtyard.bucketRetrieved?"The bucket is at the top.":"The bucket hangs at the bottom."); return; }
            }
            if (gameState.currentLocation==='entranceHall' && o.includes('chest')) { addToOutput(objectDescriptions['chest']); return; }
            // Add more room‑specific as needed; for brevity, fallback:
            addToOutput(`You don't see a ${objName} here.`);
        }

        // ==================== EQUIP / UNEQUIP ====================
        function equipItem(itemName) {
            if (!itemName) { addToOutput("Equip what?"); return; }
            const found = player.inventory.find(i => i.toLowerCase().includes(itemName.toLowerCase()));
            if (!found) { addToOutput(`You don't have a ${itemName}.`); return; }
            if (weapons[found]) {
                player.weapon = {...weapons[found]};
                addToOutput(`You equip the ${found}. (${player.weapon.minDamage}-${player.weapon.maxDamage} damage)`,"item");
                updateStatus(); return;
            }
            if (armors[found]) {
                if (player.armor) player.inventory.push(player.armor.name.toLowerCase());
                player.armor = {...armors[found]};
                if (player.armor.maxHPBonus) { player.maxHP += player.armor.maxHPBonus; player.currentHP += player.armor.maxHPBonus; }
                player.inventory.splice(player.inventory.indexOf(found),1);
                addToOutput(`You equip the ${found}.`,"item");
                updateStatus(); return;
            }
            addToOutput(`You can't equip the ${found}.`);
        }

        function unequipItem(itemName) {
            if (!itemName) { addToOutput("Unequip what?"); return; }
            const n = itemName.toLowerCase();
            if (player.weapon.name.toLowerCase().includes(n)) {
                player.weapon = {name:"Fists",minDamage:1,maxDamage:2,type:"blunt"};
                addToOutput("You return to using your fists.","player");
                updateStatus(); return;
            }
            if (player.armor && player.armor.name.toLowerCase().includes(n)) {
                player.inventory.push(player.armor.name.toLowerCase());
                if (player.armor.maxHPBonus) { player.maxHP -= player.armor.maxHPBonus; player.currentHP = Math.min(player.currentHP, player.maxHP); }
                player.armor = null;
                addToOutput("You remove your armor.","player");
                updateStatus(); return;
            }
            addToOutput(`You don't have ${itemName} equipped.`);
        }

            addToOutput("Are you sure you want to quit? (Y/N)");
            const orig = gameInput.onkeypress;
            gameInput.onkeypress = function(e) {
                if (e.key==='Enter') {
                    if (this.value.trim().toLowerCase()==='y') addToOutput("Thanks for playing!");
                    gameInput.onkeypress = orig;
                    this.value = '';
                }
            };
        }

        // ==================== PROCESS COMMAND ====================
        function processCommand(input) {
            if (gameState.gameEnded && !input.toLowerCase().includes('restart')) {
                addToOutput("Game ended. Type RESTART.","hint"); return;
            }
            let cmd = input.trim().toLowerCase();
            if (!cmd) return;
            if (cmd==='restart') { clearSave(); resetToDefaults(); addToOutput("Restarted.","subtitle"); updateStatus(); showLocation(); return; }
            let parts = cmd.split(' ');
            let verb = parts[0];
            let obj = parts.slice(1).join(' ');
            if (!commands[verb]) { addToOutput(`Unknown command: ${verb}`); return; }
            let action = commands[verb];
            switch(action) {
                case 'north': case 'south': case 'east': case 'west': case 'up': case 'down': movePlayer(action); break;
                case 'look': showLocation(); break;
                case 'inventory': showInventory(); break;
                case 'take': takeItem(obj); break;
                case 'drop': dropItem(obj); break;
                case 'examine': examineObject(obj); break;
                case 'use':
                    let match = cmd.match(/^use\s+(.+?)\s+(?:on|with)\s+(.+)$/);
                    if (match) useItemOnTarget(match[1].trim(), match[2].trim());
                    else useItem(obj);
                    break;
                case 'open': openObject(obj); break;
                case 'read': readObject(obj); break;
                case 'ring': ringBell(); break;
                case 'talk': talkTo(obj); break;
                case 'give':
                    let g = cmd.match(/^give\s+(.+?)\s+to\s+(.+)$/);
                    if (g) giveItemToNpc(g[1].trim(), g[2].trim());
                    else addToOutput("Use: GIVE [item] TO [npc]");
                    break;
                case 'attack': attackEnemy(obj); break;
                case 'equip': equipItem(obj); break;
                case 'unequip': unequipItem(obj); break;
                case 'craft': craftItem(obj); break;
                case 'save': saveGame(); addToOutput("Game saved.","victory"); break;
                case 'load':
                    if (loadGame()) { addToOutput("Game loaded.","victory"); updateStatus(); showLocation(); checkForEnemy(); }
                    else addToOutput("No save found.","hint");
                    break;
                case 'help': showHelp(); break;
                case 'quit': quitGame(); break;
                default: addToOutput("Command not implemented.");
            }
            saveGame();
        }

        function showInventory() {
            if (player.inventory.length===0) addToOutput("You are carrying nothing.");
            else {
                addToOutput("You are carrying:","item");
                player.inventory.forEach(i => addToOutput(`  - ${i} (${itemWeights[i]||1} kg)`,"item"));
            }
            addToOutput(`Weight: ${player.currentWeight()}/${player.maxWeight} kg`,"hint");
            addToOutput(`HP: ${player.currentHP}/${player.maxHP} | Gold: ${player.gold}`,"health");
            addToOutput(`Weapon: ${player.weapon.name} (${player.weapon.minDamage}-${player.weapon.maxDamage}) | Armor: ${player.armor?player.armor.name:"None"}`,"player");
            if (player.poisonTurns>0) addToOutput(`Poisoned: ${player.poisonTurns} turns`,"damage");
        }

        // ==================== INIT ====================
        function initGame() {
            gameOutput.innerHTML = '';
            if (!loadGame()) resetToDefaults();
            addToOutput("CASTLE OF THE UNDEAD 1984 - EXPANDED EDITION","title");
            addToOutput("17 rooms · New areas · More enemies & NPCs","subtitle");
            updateStatus();
            showLocation();
            checkForEnemy();
            gameInput.addEventListener('keypress', function(e) {
                if (e.key==='Enter') { processCommand(this.value); this.value = ''; }
            });
            gameInput.focus();
        }

        window.onload = initGame;
    </script>
</body>
