<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NIGHTFALLS CINEMA · Horror Theater Manager · 1985</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050008;
            --panel-bg: #0a000c;
            --text: #d4c5b2;
            --text-dim: #6b4e4e;
            --text-bright: #f0ddd0;
             --accent: #ff1a3a;
    --accent-dim: #99111f;
    --border: #ff2a4a;
    --border-glow: 0 0 10px #ff003c88;
            --danger: #e82233;
            --danger-glow: 0 0 8px #e8223355;
            --input-bg: #120510;
            --button-bg: #14080d;
            --button-hover: #261018;
            --font-display: 'Creepster', 'Nosifer', cursive;
            --font-title: 'Nosifer', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --font-body: 'VT323', 'Courier New', monospace;
            --scanline-opacity: 0.06;
            --blood-drip: #8b0000;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: var(--font-body);
            padding: 8px;
            background-image: radial-gradient(ellipse at center, #0a0a20 0%, #000000 100%);
            overflow-x: hidden;
        }
        .game-shell {
            max-width: 500px;
            width: 100%;
            height: 92vh;
            max-height: 850px;
            background: linear-gradient(180deg, #06000a 0%, #0a000f 30%, #0c0014 60%, #08000d 100%);
            border-radius: 16px;
             border: 3px solid #ff2a4a;
    box-shadow: 0 0 50px #ff003c88, 0 0 120px #000000dd, 0 8px 32px #000000ee;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .please-stand-by {
            background: #000;
            border: 10px solid #1a0a0a;
            border-radius: 50%;
            padding: 28px;
            text-align: center;
            position: relative;
        }
        .please-stand-by::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 3px solid #330f0f;
            border-radius: 50%;
        }
        .test-pattern-bars {
            display: flex;
            height: 60px;
            margin: 20px 0;
            border-radius: 4px;
            overflow: hidden;
            opacity: 0.75;
        }
        .test-pattern-bars span {
            flex: 1;
        }
        .bar-1 {
            background: #bbb;
        }
        .bar-2 {
            background: #cccc44;
        }
        .bar-3 {
            background: #44aaaa;
        }
        .bar-4 {
            background: #44aa44;
        }
        .bar-5 {
            background: #aa44aa;
        }
        .bar-6 {
            background: #aa3333;
        }
        .bar-7 {
            background: #222288;
        }
        .embers-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
            border-radius: 13px;
        }
        .ember {
            position: absolute;
            border-radius: 50%;
            animation: emberRise var(--rise-dur) ease-out infinite;
            animation-delay: var(--delay);
            pointer-events: none;
            filter: blur(0.6px);
        }
        @keyframes emberRise {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            8% {
                opacity: 0.85;
            }
            40% {
                transform: translateY(-28vh) translateX(var(--drift));
                opacity: 0.55;
            }
            80% {
                opacity: 0.15;
            }
            100% {
                transform: translateY(-62vh) translateX(var(--drift2));
                opacity: 0;
            }
        }
        .specter {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #ccddff;
            border-radius: 50%;
            animation: specterDash var(--spec-dur) linear forwards;
            animation-delay: var(--spec-delay);
            opacity: 0;
            box-shadow: 0 0 8px 3px #aaccff66, 0 0 24px 8px #8899cc33;
        }
        .specter::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: var(--tail-len);
            height: 1.5px;
            background: linear-gradient(90deg, #bbddff88, #8899cc33, transparent);
            right: 100%;
            border-radius: 2px;
        }
        @keyframes specterDash {
            0% {
                opacity: 0;
                transform: translate(0, 0) rotate(var(--angle));
            }
            6% {
                opacity: 0.7;
            }
            35% {
                opacity: 0.5;
                transform: translate(var(--dx), var(--dy)) rotate(var(--angle));
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) rotate(var(--angle));
            }
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0,
                        var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 13px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 45%, rgba(0, 0, 0, 0.6) 100%);
            border-radius: 13px;
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #0a0404;
            border-bottom: 4px solid #ff2a4a;
            padding: 8px 14px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 4px 20px #000000aa, inset 0 1px 0 #3a1010;
        }
        .marquee-inner {
            border: 2px solid #ff2a4a
            border-radius: 6px;
            padding: 8px 12px;
            background: #060104;
            position: relative;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20px;
            right: 20px;
            height: 2px;
            background: #ff2a4a;
            border-radius: 1px;
            box-shadow: 0 0 8px #c41e3a44;
        }
        .marquee-title {
            font-size: 28px;
            color: #e8c5b0;
            text-shadow: 0 0 12px #c41e3a88, 0 2px 4px #000;
            letter-spacing: 3px;
            font-family: var(--font-title);
        }
        .marquee-features {
            font-size: 12px;
            color: #c49585;
            font-family: var(--font-body);
            margin-top: 2px;
            letter-spacing: 1px;
        }
        .status-strip {
            display: flex;
            justify-content: space-around;
            padding: 6px 10px;
            background: #060008;
            border-bottom: 1px solid #ff2a4a;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        .status-val {
            color: var(--text-bright);
            font-weight: bold;
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            z-index: 5;
            scrollbar-width: thin;
            display: flex;
            flex-direction: column;
        }
        .panel {
            display: none;
            flex-direction: column;
            padding: 12px;
            gap: 10px;
            flex: 1;
        }
        .panel.active {
            display: flex;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #2a0f15;
            padding: 10px 18px;
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 17px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn:hover {
            background: var(--button-hover);
            border-color: #c41e3a;
            box-shadow: var(--border-glow);
        }
        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .btn.accent {
            background: #140308;
            border-color: #5c1525;
            color: #e8a090;
        }
        .btn.accent:hover {
            background: #1e0610;
            border-color: #c41e3a;
            box-shadow: 0 0 14px #c41e3a44;
        }
        .btn.danger {
            background: #140406;
            border-color: #441111;
            color: #ff7777;
        }
        .btn.danger:hover {
            background: #1e080a;
            border-color: #e82233;
            box-shadow: 0 0 14px #e8223344;
        }
        .movie-card {
            background: #0a000f;
            border: 2px solid #ff2a4a;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            transition: all 0.2s;
        }
        .movie-card:hover {
            border-color: #ff003c;
            box-shadow: 0 0 16px #c41e3a18;
        }
        .movie-card.selected {
            border-color: #ff003c;
            box-shadow: 0 0 22px #c41e3a33;
            background: #0f0018;
        }
        .poster-thumb {
            width: 70px;
            height: 95px;
            border-radius: 6px;
            background: #0a000f;
            border: 1px solid #1a0f18;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #c41e3a;
        }
        .poster-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .movie-info {
            flex: 1;
            min-width: 0;
        }
        .movie-title {
            font-family: var(--font-display);
            font-size: 16px;
            color: #e8c5b0;
            text-shadow: 0 0 6px #c41e3a22;
            letter-spacing: 1px;
        }
        .movie-meta {
            font-size: 11px;
            color: #6b4e4e;
            font-family: var(--font-mono);
        }
        .movie-synopsis {
            font-size: 13px;
            color: #b0a0b8;
            margin-top: 4px;
            line-height: 1.3;
        }
        .star-rating {
            color: #c41e3a;
            letter-spacing: 2px;
            font-size: 14px;
        }
        .event-alert {
            background: #140406;
            border: 2px solid #5c1525;
            border-radius: 8px;
            padding: 10px 14px;
            color: #ff9999;
            animation: alertPulse 1.5s ease-in-out infinite;
        }
        @keyframes alertPulse {
            0%,
            100% {
                box-shadow: 0 0 8px #e8223322;
            }
            50% {
                box-shadow: 0 0 22px #e8223344;
            }
        }
        .customer-quote {
            background: #0a000f;
            border-left: 3px solid #c41e3a;
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 0 6px 6px 0;
            font-style: italic;
            font-size: 13px;
            color: #d4c5b2;
        }
        .customer-quote.negative {
            border-left-color: #e82233;
            color: #ffaaaa;
        }
        .customer-quote.positive {
            border-left-color: #6ba368;
            color: #b8d8b0;
        }
        .upgrade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid #ff2a4a;
        }
        .upgrade-name {
            font-family: var(--font-display);
            font-size: 14px;
            color: #e8c5b0;
        }
        .upgrade-desc {
            font-size: 11px;
            color: #6b4e4e;
            font-family: var(--font-mono);
        }
        .upgrade-level {
            font-size: 10px;
            color: #c41e3a;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #0a000f;
            border-radius: 14px;
            width: 360px;
            max-width: 92vw;
            padding: 20px;
            text-align: center;
            border: 2px solid #ff2a4a;
            box-shadow: 0 0 50px #c41e3a22;
            color: #d4c5b2;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h2 {
            font-family: var(--font-display);
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: #e8c5b0;
            text-shadow: 0 0 10px #c41e3a44;
        }
        .modal-btn {
            background: #14080d;
           border: 2px solid #ff2a4a;
            padding: 8px 16px;
            border-radius: 6px;
            margin: 4px;
            cursor: pointer;
            color: #d4c5b2;
            font-family: var(--font-body);
            font-size: 15px;
            letter-spacing: 1px;
        }
        .modal-btn:hover {
            border-color: #ff003c;
            box-shadow: 0 0 10px #c41e3a44;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #2a0f15;
            border-top-color: #c41e3a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            background: #060008;
            border-top: 1px solid #ff2a4a;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #3a1a1a;
        }
        .tabs-row {
            display: flex;
            background: #060008;
           border-bottom: 2px solid #ff2a4a;
            z-index: 10;
        }
        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            font-family: var(--font-body);
            font-size: 14px;
            color: #4a2828;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            background: transparent;
            white-space: nowrap;
        }
        .tab-btn.active {
            color: #e8c5b0;
            border-bottom-color: #c41e3a;
            text-shadow: 0 0 10px #c41e3a88;
        }
        .tab-btn:hover {
            color: #d4b8a8;
        }
        .car-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            padding: 8px;
            background: #06000a;
            border-radius: 8px;
            border: 1px solid #ff2a4a;
            min-height: 60px;
        }
        .lot-car {
            font-size: 18px;
            margin: 2px 4px;
        }
        .lot-car .speaker-pole {
            font-size: 8px;
            vertical-align: top;
            margin-left: -2px;
            color: #666;
        }
        .heat-indicator {
            color: #e8a090;
            font-weight: bold;
            font-size: 12px;
        }
        .hype-bar {
            width: 100%;
            height: 12px;
            background: #1a0f18;
            border-radius: 6px;
            overflow: hidden;
            margin: 4px 0;
        }
        .hype-fill {
            height: 100%;
            background: linear-gradient(90deg, #c41e3a, #e8a090);
            transition: width 0.3s;
            border-radius: 6px;
        }
        .chat-log {
            max-height: 250px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 10px;
            border: 1px solid #ff2a4a;
            border-radius: 8px;
            padding: 8px;
            background: #06000a;
        }
        .chat-msg {
            margin: 6px 0;
            font-size: 14px;
            line-height: 1.4;
        }
        .chat-msg.user {
            color: #e8a090;
        }
        .chat-msg.assistant {
            color: #d4c5b2;
        }
        .chat-input-row {
            display: flex;
            gap: 6px;
        }
        .chat-input-row input {
            flex: 1;
            background: var(--input-bg);
            border: 2px solid #ff2a4a;
            border-radius: 6px;
            padding: 8px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 16px;
        }

        .trailer-theater {
            background: #000;
            border: 8px solid #ff2a4a;
            border-radius: 4px;
            box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.9), 0 0 60px #c41e3a22, 0 0 0 4px #330000;
            position: relative;
            overflow: hidden;
        }
        .trailer-curtain-top {
            position: absolute;
            top: -6px;
            left: -10px;
            right: -10px;
            height: 55px;
            background: linear-gradient(180deg, #2a0808 0%, #4a1212 40%, #6b1a1a 70%, transparent 100%);
            z-index: 5;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.75);
        }
        .trailer-curtain-bottom {
            position: absolute;
            bottom: -6px;
            left: -10px;
            right: -10px;
            height: 55px;
            background: linear-gradient(0deg, #2a0808 0%, #4a1212 40%, #6b1a1a 70%, transparent 100%);
            z-index: 5;
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.75);
        }
        .trailer-screen-vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.9) 100%);
            pointer-events: none;
            z-index: 2;
        }
        .trailer-film-grain {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 3;
            opacity: 0.18;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            animation: grainShift 0.15s steps(3) infinite;
        }
        @keyframes grainShift {
            0%,
            100% {
                transform: translate(0, 0);
            }
            33% {
                transform: translate(-2px, 1px);
            }
            66% {
                transform: translate(1px, -1px);
            }
        }
        .trailer-projector-flicker {
            animation: flicker 3s ease-in-out infinite;
        }
        @keyframes flicker {
            0%,
            100% {
                opacity: 1;
            }
            5% {
                opacity: 0.82;
            }
            10% {
                opacity: 1;
            }
            45% {
                opacity: 0.9;
            }
            50% {
                opacity: 1;
            }
            92% {
                opacity: 0.85;
            }
            94% {
                opacity: 1;
            }
        }
        .trailer-end-card {
            animation: endCardReveal 0.8s ease-out forwards;
            background: linear-gradient(180deg, #0a000f 0%, #050008 100%);
            border: 3px solid #ff2a4a;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 40px #c41e3a44;
        }
        @keyframes endCardReveal {
            from {
                transform: scale(1.3);
                opacity: 0;
                filter: blur(10px);
            }
            to {
                transform: scale(1);
                opacity: 1;
                filter: blur(0);
            }
        }
        .trailer-scene-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 8px 0;
        }
        .trailer-scene-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2a0f15;
            border: 1px solid #3a1515;
            transition: all 0.3s;
        }
        .trailer-scene-dot.active {
            background: #c41e3a;
            box-shadow: 0 0 8px #c41e3a;
            transform: scale(1.3);
        }
        .trailer-scene-dot.done {
            background: #5c1525;
            border-color: #8b1a2b;
        }
        .trailer-scene-img {
            transition: opacity 0.6s ease-in-out, filter 0.6s ease-in-out;
        }
        .trailer-scene-img.fading-out {
            opacity: 0;
            filter: brightness(3) blur(3px);
        }
    </style>
</head>
<body>
    <div class="game-shell" id="gameShell">
                <div class="crt-overlay"></div>
        <div class="marquee">
            <div class="marquee-inner">
                <div class="marquee-title" id="marqueeTitle">NIGHTFALLS CINEMA</div>
                <div class="marquee-features" id="marqueeFeatures">MIDNIGHT DOUBLE FEATURE</div>
            </div>
        </div>
        <div class="status-strip">
            <span>💰 <span class="status-val" id="statCash">$500</span></span>
            <span>💀 <span class="status-val" id="statRep">50</span></span>
            <span>📅 Night <span class="status-val" id="statDay">1</span></span>
            <span>🚗 <span class="status-val" id="statCars">0</span></span>
        </div>
        <div class="tabs-row">
            <div class="tab-btn active" data-tab="overview">🚗 LOT</div>
            <div class="tab-btn" data-tab="movies">🔪 MOVIES</div>
            <div class="tab-btn" data-tab="franchises">📼 FRANCHISES</div>
            <div class="tab-btn" data-tab="upgrades">🔧 UPGRADES</div>
            <div class="tab-btn" data-tab="history">📋 HISTORY</div>
        </div>
        <div class="game-area">
            <div id="overviewPanel" class="panel active"></div>
            <div id="moviesPanel" class="panel"></div>
            <div id="franchisesPanel" class="panel"></div>
            <div id="upgradesPanel" class="panel"></div>
            <div id="historyPanel" class="panel"></div>
        </div>
        <div class="footer-strip">
            <span id="footerMsg">🩸 NIGHTFALLS CINEMA · 1985</span>
            <button id="resetApiBtn" style="background:none;border:none;color:#3a1515;font-size:8px;cursor:pointer;">🔑 API KEY</button>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('nightfalls_api_key') || '';

            const DEFAULT_STATE = {
                cash: 500,
                reputation: 50,
                day: 1,
                movieLibrary: [],
                tonightDoubleFeature: [],
                upgrades: { projector: 0, sound: 0, screen: 0, concessions: 0, fence: 0, bathrooms: 0, parking: 0 },
                history: [],
                lastNightCars: 0,
                lastNightRevenue: 0,
                imageCooldownUntil: 0
            };
            let gameState = { ...DEFAULT_STATE };

            if (speechSynthesis.getVoices().length === 0) {
                speechSynthesis.onvoiceschanged = () => {};
            }

            const upgradeDefs = [
                { id: 'projector', name: 'Projector', levels: ['Flickering 16mm', 'Refurbished 35mm', 'Crisp Xenon',
                        'Laser Vision'
                    ], costs: [0, 300, 800, 2000] },
                { id: 'sound', name: 'Sound System', levels: ['Tinny Pole Speakers', 'FM Transmitter', 'Stereo FM',
                        'Surround Sound'
                    ], costs: [0, 250, 700, 1800] },
                { id: 'screen', name: 'Screen', levels: ['Weathered White Wall', 'Repainted Panel', 'Premium Reflective',
                        'Giant Cinemascope'
                    ], costs: [0, 400, 1000, 2500] },
                { id: 'concessions', name: 'Concessions', levels: ['Stale Popcorn', 'Fresh Popcorn & Soda',
                        'Deluxe Snack Bar', 'Gourmet Diner'
                    ], costs: [0, 200, 600, 1500] },
                { id: 'fence', name: 'Perimeter Fence', levels: ['None', 'Chain-link', 'Wooden Privacy',
                        'Electric Security'
                    ], costs: [0, 150, 500, 1200] },
                { id: 'bathrooms', name: 'Restrooms', levels: ['Porta-Potties', 'Basic Cinderblock', 'Clean Tile',
                        'Luxury Lounge'
                    ], costs: [0, 350, 900, 2200] },
                { id: 'parking', name: 'Parking Lot', levels: ['Dirt & Gravel', 'Graded Gravel', 'Smooth Asphalt',
                        'Premium Marked'
                    ], costs: [0, 200, 550, 1400] }
            ];

            function saveState() { try { localStorage.setItem('nightfalls_state_v1', JSON.stringify(
                    gameState)); } catch (e) {} }

            function loadState() {
                try {
                    const saved = localStorage.getItem('nightfalls_state_v1');
                    if (saved) {
                        gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
                        gameState.movieLibrary = gameState.movieLibrary.map(m => ({
                            sequelOf: null,
                            seriesName: null,
                            seriesOrder: 1,
                            totalScreenings: 0,
                            lastScreenedDay: null,
                            peakAttendance: 0,
                            isHot: false,
                            ...m
                        }));
                    }
                } catch (e) {}
            }

            const esc = str => {
                if (str === null || str === undefined) return '';
                return String(str).replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                    "'": '&#39;', '"': '&quot;' })[m]);
            };

            function setFooter(msg) { document.getElementById('footerMsg').textContent = msg; }

            function flashFooter(msg) { setFooter(msg);
                setTimeout(() => setFooter('🩸 NIGHTFALLS CINEMA · 1985'), 4000); }

            function showModal(html) { document.getElementById('genericModalContent').innerHTML = html;
                document.getElementById('genericModal').style.display = 'flex'; }

            function closeModal() { document.getElementById('genericModal').style.display = 'none'; }
            window.closeModal = closeModal;
            document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e.currentTarget)
                    closeModal(); });

            async function mistralChat(msgs, maxTok = 500) {
                if (!apiKey) throw new Error('API key missing');
                const res = await fetch(MISTRAL_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                    body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9, max_tokens: maxTok })
                });
                if (!res.ok) throw new Error('API ' + res.status);
                const data = await res.json();
                return data.choices[0].message.content.trim();
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) await new Promise(r => setTimeout(r, gameState
                    .imageCooldownUntil - now + 500));
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s horror VHS cover art')}?width=512&height=640&seed=${Date.now()}`;
                const img = new Image();
                const result = await new Promise(resolve => {
                    let done = false;
                    const finish = (val) => { if (!done) { done = true;
                            clearTimeout(timer);
                            resolve(val); } };
                    img.onload = () => finish(url);
                    img.onerror = () => finish(null);
                    img.src = url;
                    const timer = setTimeout(() => finish(null), 20000);
                });
                gameState.imageCooldownUntil = Date.now() + 30000;
                saveState();
                return result;
            }

            async function generateMovie() {
                const prompt =
                    `Generate a terrifying 80s cult horror movie concept as valid JSON only. It could be a slasher, supernatural horror, creature feature, body horror, or psychological terror. Fields: "title" (max 35), "genre" (horror subgenre), "tagline" (ominous), "synopsis" (disturbing), "quality"(1-5), "audienceAppeal". JSON only.`;
                const resp = await mistralChat([{ role: 'user', content: prompt }], 1200);
                return JSON.parse(resp.replace(/```json|```/g, '').trim());
            }

            async function generateCustomerReactions(movies, attendance, reputation) {
                const titles = movies.map(m => m.title).join(' and ');
                const avgQ = Math.round(movies.reduce((a, m) => a + (m.quality || 3), 0) / movies.length);
                const prompt =
                    `Generate 3-5 horrified reactions (JSON array of strings) from audience members who just watched the double feature "${titles}" at a drive-in theater. Avg quality ${avgQ}/5. Cars: ${attendance}. Rep: ${reputation}. These are 80s horror fans. Some reactions should reference specific terrifying scenes, practical effects, or how scared they were. JSON only.`;
                const resp = await mistralChat([{ role: 'user', content: prompt }], 500);
                const raw = JSON.parse(resp.replace(/```json|```/g, '').trim());
                return raw.map(item => {
                    if (typeof item === 'string') return item;
                    if (item && typeof item === 'object') return item.reaction || item.text || item.message || JSON
                        .stringify(item);
                    return String(item);
                });
            }

            async function generateEvent() {
                const resp = await mistralChat([{ role: 'user',
                    content: 'Generate a random horror-themed event that could happen at a 1980s drive-in theater showing horror movies. JSON with fields: type, title, description, cashImpact (int), repImpact (-10 to 10). Events could involve weather (fog, storm), mechanical issues (projector malfunction), local controversy, or strange occurrences. JSON only.' }],
                    500);
                return JSON.parse(resp.replace(/```json|```/g, '').trim());
            }

            function addMovieToLibrary(movie) {
                movie.sequelOf = movie.sequelOf || null;
                movie.seriesName = movie.seriesName || null;
                movie.seriesOrder = movie.seriesOrder || 1;
                movie.totalScreenings = movie.totalScreenings || 0;
                movie.lastScreenedDay = null;
                movie.peakAttendance = 0;
                movie.isHot = false;
                movie.id = 'm_' + Date.now() + '_' + Math.random().toString(36);
                gameState.movieLibrary.push(movie);
                saveState();
            }

            function removeMovieFromLibrary(id) {
                gameState.movieLibrary = gameState.movieLibrary.filter(m => m.id !== id);
                gameState.tonightDoubleFeature = gameState.tonightDoubleFeature.filter(m => m.id !== id);
                saveState();
            }

            function selectForTonight(id) {
                const movie = gameState.movieLibrary.find(m => m.id === id);
                if (!movie) return;
                if (gameState.tonightDoubleFeature.some(m => m.id === id)) {
                    gameState.tonightDoubleFeature = gameState.tonightDoubleFeature.filter(m => m.id !== id);
                } else {
                    if (gameState.tonightDoubleFeature.length >= 2) gameState.tonightDoubleFeature.shift();
                    gameState.tonightDoubleFeature.push(movie);
                }
                saveState();
                refreshAll();
            }

            function calculateAttendance(useRandom = true) {
                if (gameState.tonightDoubleFeature.length !== 2) return 0;
                let base = 15 + gameState.reputation / 3;
                const totalUp = Object.values(gameState.upgrades).reduce((a, b) => a + b, 0);
                base += totalUp * 4;
                const avgQ = (gameState.tonightDoubleFeature[0].quality + gameState.tonightDoubleFeature[1].quality) / 2;
                base += (avgQ - 3) * 8;
                if (useRandom) base += Math.floor(Math.random() * 12) - 6;
                if (gameState.upgrades.fence >= 2) base += 3;
                if (gameState.upgrades.fence >= 3) base += 5;
                return Math.max(3, Math.round(base));
            }

            function calculateRevenue(cars) {
                const ticket = 3.5 + gameState.upgrades.screen * 1.5 + gameState.upgrades.sound * 1;
                const con = 2 + gameState.upgrades.concessions * 3;
                return Math.round(cars * (ticket * 1.8 + con));
            }

            function getSequelMultiplier(movie, currentDay, applyRush = false) {
                if (!movie.sequelOf) return 1.0;
                const prequel = gameState.movieLibrary.find(p => p.id === movie.sequelOf);
                if (!prequel || !prequel.isHot) return movie.quality < 2 ? 0.7 : 1.0;
                let mult = Math.min(2.0, 1.2 + (prequel.peakAttendance / 50));
                if (applyRush && currentDay && prequel.lastScreenedDay && (currentDay - prequel.lastScreenedDay) <= 2) {
                    if (Math.random() < 0.4) mult = Math.max(0.7, mult - 0.3);
                }
                return mult;
            }

            function decayMovieHeat() {
                gameState.movieLibrary.forEach(m => {
                    if (!m.lastScreenedDay) return;
                    if (gameState.day - m.lastScreenedDay > 4) m.isHot = false;
                    if (m.peakAttendance > 0 && (gameState.day - m.lastScreenedDay) > 2) m.peakAttendance = Math.max(0, m
                        .peakAttendance - 1);
                });
            }

            function getSeriesData() {
                const map = {};
                gameState.movieLibrary.forEach(m => {
                    const name = m.seriesName || m.title;
                    if (!map[name]) map[name] = { movies: [], totalScreenings: 0, peakAttendance: 0, avgQuality: 0 };
                    map[name].movies.push(m);
                    map[name].totalScreenings += m.totalScreenings;
                    if (m.peakAttendance > map[name].peakAttendance) map[name].peakAttendance = m.peakAttendance;
                });
                Object.keys(map).forEach(name => {
                    const ms = map[name].movies;
                    map[name].avgQuality = Math.round(ms.reduce((a, m) => a + m.quality, 0) / ms.length);
                });
                return map;
            }

            function calcFranchiseValue(series) {
                return Math.max(100, series.totalScreenings * 25 + series.peakAttendance * 50 + series.avgQuality * 80);
            }

            function sellFranchise(seriesName) {
                const movies = gameState.movieLibrary.filter(m => (m.seriesName || m.title) === seriesName);
                if (!movies.length) return;
                const value = calcFranchiseValue(getSeriesData()[seriesName]);
                gameState.cash += value;
                gameState.movieLibrary = gameState.movieLibrary.filter(m => (m.seriesName || m.title) !== seriesName);
                gameState.tonightDoubleFeature = gameState.tonightDoubleFeature.filter(m => (m.seriesName || m.title) !==
                    seriesName);
                saveState();
                refreshAll();
                flashFooter(`💸 Sold "${seriesName}" for $${value}!`);
            }

            async function advanceNight() {
                if (gameState.tonightDoubleFeature.length < 2) {
                    showModal('<h2>🔪 Need Double Feature</h2><button class="modal-btn" onclick="closeModal()">OK</button>');
                    return;
                }
                decayMovieHeat();
                const movies = [...gameState.tonightDoubleFeature];
                const cars = calculateAttendance(true);
                let revenue = calculateRevenue(cars);
                let bonusLog = [];
                movies.forEach(m => {
                    const mult = getSequelMultiplier(m, gameState.day, true);
                    if (mult !== 1.0) {
                        const baseEach = calculateRevenue(cars) / 2;
                        const diff = Math.round(baseEach * (mult - 1));
                        revenue = Math.round(revenue + diff);
                        bonusLog.push(mult > 1 ? `📈 "${m.title}" hype +$${diff}` :
                            `📉 "${m.title}" flopped -$${Math.abs(diff)}`);
                    }
                });
                gameState.cash += revenue;
                gameState.lastNightCars = cars;
                gameState.lastNightRevenue = revenue;
                movies.forEach(m => {
                    const lib = gameState.movieLibrary.find(l => l.id === m.id);
                    if (lib) {
                        lib.totalScreenings++;
                        lib.lastScreenedDay = gameState.day;
                        if (cars > lib.peakAttendance) lib.peakAttendance = cars;
                        lib.isHot = lib.peakAttendance >= 20 && (gameState.day - lib.lastScreenedDay) <= 2;
                    }
                });
                let reactions;
                try { reactions = await generateCustomerReactions(movies, cars, gameState.reputation); } catch (e) { reactions = [
                        "The crowd was speechless..."
                    ]; }
                const avgQ = movies.reduce((a, m) => a + m.quality, 0) / 2;
                const repChange = Math.round((avgQ - 3) * 4 + (cars > 25 ? 3 : cars > 15 ? 1 : -2));
                gameState.reputation = Math.max(0, Math.min(100, gameState.reputation + repChange));
                let event = null;
                if (Math.random() < 0.4) {
                    try { event = await generateEvent(); } catch (e) { event = { type: 'weather', title: 'Clear',
                            description: 'Nothing.', cashImpact: 0, repImpact: 0 }; }
                    gameState.cash += event.cashImpact || 0;
                    gameState.reputation = Math.max(0, Math.min(100, gameState.reputation + (event.repImpact || 0)));
                    gameState.cash = Math.max(0, gameState.cash);
                }
                gameState.history.unshift({ day: gameState.day, movies: movies.map(m => ({ title: m.title, quality: m
                            .quality })), cars, revenue, repChange, event, reactions, bonusLog });
                if (gameState.history.length > 30) gameState.history.length = 30;
                gameState.day++;
                gameState.tonightDoubleFeature = [];
                saveState();
                const eventHTML = (event && event.type !== 'weather') ?
                    `<div class="event-alert"><strong>⚠️ ${esc(event.title)}</strong><br>${esc(event.description)}<br><small>💰${event.cashImpact>=0?'+':''}${event.cashImpact} 💀${event.repImpact>=0?'+':''}${event.repImpact}</small></div>` :
                    '';
                const bonusHTML = bonusLog.map(b =>
                    `<div style="color:#e8a090;font-size:12px;">${b}</div>`).join('');
                const reactionsHTML = reactions.map(r => {
                    const cls = /bad|terrible|worst|boring/i.test(r) ? 'negative' : 'positive';
                    return `<div class="customer-quote ${cls}">💬 "${esc(r)}"</div>`;
                }).join('');
                showModal(
                    `<h2>🌙 Night ${gameState.day-1}</h2><p>🚗 ${cars} cars · 💰 $${revenue}</p><p>💀 ${repChange>=0?'+':''}${repChange} (now ${gameState.reputation})</p>${eventHTML}${bonusHTML}<div style="max-height:150px;overflow-y:auto;text-align:left;">${reactionsHTML}</div><button class="modal-btn" onclick="closeModal()">Night ${gameState.day}</button>`
                    );
                refreshAll();
                setFooter('☀️ Day ' + gameState.day + ' · Choose your double feature!');
            }

            function canCommissionSequel(movie) {
                return movie.totalScreenings >= 1 && gameState.cash >= commissionCost(movie) && !gameState.movieLibrary
                    .some(m => m.sequelOf === movie.id);
            }

            function commissionCost(movie) { return 200 + movie.quality * 60; }

            async function commissionSequel(parentId) {
                const parent = gameState.movieLibrary.find(m => m.id === parentId);
                if (!parent || !canCommissionSequel(parent)) return;
                gameState.cash -= commissionCost(parent);
                saveState();
                const seriesName = parent.seriesName || parent.title.replace(/\s+\d+$/, '').trim();
                const nextOrder = (parent.seriesOrder || 1) + 1;
                const prompt =
                    `Create a horror sequel to "${parent.title}" (genre: ${parent.genre}). Synopsis: "${parent.synopsis}". This is an 80s horror franchise. Return JSON: "title" (like "${seriesName}: [Subtitle]"), "genre", "tagline" (ominous), "synopsis" (terrifying), "quality" (1-5, must be ${parent.quality}±1), "audienceAppeal". The sequel should escalate the horror. JSON only.`;
                try {
                    const resp = await mistralChat([{ role: 'user', content: prompt }], 1200);
                    const data = JSON.parse(resp.replace(/```json|```/g, '').trim());
                    const sequel = { ...data, posterUrl: null, sequelOf: parent.id, seriesName, seriesOrder: nextOrder,
                        totalScreenings: 0, lastScreenedDay: null, peakAttendance: 0, isHot: false };
                    addMovieToLibrary(sequel);
                    refreshAll();
                    setFooter('🔪 Commissioned: ' + sequel.title);
                    const poster = await generateImage(
                        `Horror sequel poster for "${sequel.title}", ${sequel.genre}`);
                    if (poster) { sequel.posterUrl = poster;
                        saveState();
                        refreshAll(); }
                } catch (e) {
                    gameState.cash += Math.floor(commissionCost(parent) * 0.5);
                    saveState();
                    showModal(
                        '<h2>❌ Sequel Failed</h2><p>Half refunded.</p><button class="modal-btn" onclick="closeModal()">OK</button>'
                        );
                }
            }

            let directorMessages = [];

            function openDirectorModal() {
                directorMessages = [
                    { role: "system",
                        content: "You are a passionate, slightly unhinged 1980s horror movie director (think John Carpenter, Dario Argento, or George Romero). The player owns a drive-in theater and wants you to create a custom horror movie. Brainstorm with them about subgenre, kills, monsters, practical effects, etc. Keep responses short (1-3 sentences). Stay in character as a horror auteur. When you both agree on the concept, you will write the script as a JSON object (the player will ask you to finalize it)."
                    }
                ];
                renderDirectorChat();
                sendDirectorMessage("I've been dying to create something truly terrifying. What kind of horror are we conjuring tonight?");
            }

            function renderDirectorChat() {
                let html = `<h2>🔪 DIRECTOR'S LAIR</h2><div class="chat-log" id="directorChatLog">`;
                directorMessages.forEach(m => {
                    if (m.role === 'user') html +=
                        `<div class="chat-msg user"><strong>You:</strong> ${esc(m.content)}</div>`;
                    else if (m.role === 'assistant') html +=
                        `<div class="chat-msg assistant"><strong>Director:</strong> ${esc(m.content)}</div>`;
                });
                html += `</div>
        <div class="chat-input-row"><input type="text" id="directorInput" placeholder="Describe your nightmare..."><button class="btn" id="directorSendBtn">Send</button></div>
        <button class="btn accent" id="finalizeScriptBtn">📝 Finalize & Fund Script</button>
        <button class="modal-btn" onclick="closeModal()">Leave</button>`;
                document.getElementById('genericModalContent').innerHTML = html;
                document.getElementById('genericModal').style.display = 'flex';
                document.getElementById('directorSendBtn').addEventListener('click', () => {
                    const input = document.getElementById('directorInput');
                    const text = input.value.trim();
                    if (text) { sendDirectorMessage(text);
                        input.value = ''; }
                });
                document.getElementById('directorInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') document
                        .getElementById('directorSendBtn').click(); });
                document.getElementById('finalizeScriptBtn').addEventListener('click', finalizeScript);
                const log = document.getElementById('directorChatLog');
                if (log) log.scrollTop = log.scrollHeight;
            }

            async function sendDirectorMessage(text) {
                directorMessages.push({ role: "user", content: text });
                renderDirectorChat();
                const sendBtn = document.getElementById('directorSendBtn');
                const input = document.getElementById('directorInput');
                if (sendBtn) sendBtn.disabled = true;
                if (input) input.disabled = true;
                try {
                    const reply = await mistralChat(directorMessages, 300);
                    directorMessages.push({ role: "assistant", content: reply });
                } catch (e) {
                    directorMessages.push({ role: "assistant",
                        content: "(The director seems to have stepped into the shadows... try again.)" });
                }
                renderDirectorChat();
                if (sendBtn) sendBtn.disabled = false;
                if (input) { input.disabled = false;
                    input.focus(); }
            }

            async function finalizeScript() {
                const finalPrompt =
                    "The player wants to finalize the script. Based on our entire conversation, output ONLY a valid JSON object representing the completed horror movie. Include fields: title, genre, tagline, synopsis (2-3 sentences of pure terror), quality (1-5), audienceAppeal (low/medium/high), and a 'budget' field (integer dollar amount, between 200 and 800). Do not include any other text.";
                directorMessages.push({ role: "user", content: finalPrompt });
                renderDirectorChat();
                const sendBtn = document.getElementById('directorSendBtn');
                const finalizeBtn = document.getElementById('finalizeScriptBtn');
                if (sendBtn) sendBtn.disabled = true;
                if (finalizeBtn) finalizeBtn.disabled = true;
                try {
                    const reply = await mistralChat(directorMessages, 500);
                    const jsonMatch = reply.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error('No JSON found');
                    const movieData = JSON.parse(jsonMatch[0]);
                    if (!movieData.title || !movieData.quality || !movieData.budget) throw new Error(
                        'Incomplete movie data');
                    if (gameState.cash < movieData.budget) {
                        showModal(
                            `<h2>💸 Not Enough Cash</h2><p>The director needs $${movieData.budget}, but you only have $${gameState.cash}.</p><button class="modal-btn" onclick="closeModal()">OK</button>`
                            );
                        return;
                    }
                    gameState.cash -= movieData.budget;
                    const newMovie = { ...movieData, id: 'm_' + Date.now(), posterUrl: null, sequelOf: null,
                        seriesName: null, seriesOrder: 1, totalScreenings: 0, lastScreenedDay: null,
                        peakAttendance: 0, isHot: false };
                    addMovieToLibrary(newMovie);
                    saveState();
                    refreshAll();
                    closeModal();
                    setFooter('🔪 Director delivered: ' + newMovie.title);
                    generateImage(`Horror movie poster for "${newMovie.title}", ${newMovie.genre}`).then(url => {
                        const m = gameState.movieLibrary.find(m => m.id === newMovie.id);
                        if (m && url) { m.posterUrl = url;
                            saveState();
                            refreshAll(); }
                    });
                } catch (e) {
                    directorMessages.push({ role: "assistant",
                        content: "Hmm, the darkness consumed my thoughts. Let's try finalizing again. (Error: " + e
                        .message + ")" });
                    renderDirectorChat();
                } finally {
                    if (sendBtn) sendBtn.disabled = false;
                    if (finalizeBtn) finalizeBtn.disabled = false;
                }
            }

            function renderOverview() {
                const panel = document.getElementById('overviewPanel');
                const hasTwo = gameState.tonightDoubleFeature.length === 2;
                const estCars = hasTwo ? calculateAttendance(false) : 0;
                const estRev = hasTwo ? calculateRevenue(estCars) : 0;
                let moviesHTML = hasTwo ? gameState.tonightDoubleFeature.map(m => `
            <div class="movie-card"><div class="poster-thumb">${m.posterUrl?`<img src="${m.posterUrl}">`:'🔪'}</div><div class="movie-info"><div class="movie-title">${esc(m.title)}</div><div class="movie-meta">${esc(m.genre)} · <span class="star-rating">${'💀'.repeat(m.quality)}${'🦴'.repeat(5-m.quality)}</span></div><div class="movie-synopsis">${esc(m.synopsis)}</div></div></div>`).join(
                    '') : '<p style="color:#4a2828;">No movies selected. Go to 🔪 MOVIES!</p>';
                let hypeHTML = '';
                if (hasTwo) {
                    const sequel = gameState.tonightDoubleFeature.find(m => m.sequelOf);
                    if (sequel) {
                        const prequel = gameState.movieLibrary.find(p => p.id === sequel.sequelOf);
                        if (prequel && prequel.isHot) {
                            const baseMult = getSequelMultiplier(sequel, gameState.day, false);
                            const pct = Math.round((baseMult - 1) * 100);
                            hypeHTML =
                                `<div style="margin:8px 0;"><div style="color:#e8a090;">🔥 HYPE: ${esc(sequel.title)}</div><div class="hype-bar"><div class="hype-fill" style="width:${Math.min(100,pct)}%"></div></div><div style="color:#e8c5b0;font-size:12px;">~+${pct}% (rush risk)</div></div>`;
                        }
                    }
                }
                const carIcons = Array.from({ length: Math.min(estCars, 50) }, () =>
                    '<span class="lot-car">🚗<span class="speaker-pole">🎙️</span></span>').join('');
                panel.innerHTML =

                        loadImagesRecursive(script, index + 1, collected, callback);
                    }, 20);
                }

                (async () => {
                    let script;
                    try {
                        script = await generateTrailerScript(movie);

                    } catch (e) {
                        const sentences = movie.synopsis.split(/[.!?]+/).filter(s => s.trim().length > 0);

            async function generateTrailerScript(movie) {
                const prompt =
                    `Create a short 3-scene terrifying audio trailer for the 80s horror movie "${movie.title}". Genre: ${movie.genre}. Tagline: "${movie.tagline}". Synopsis: ${movie.synopsis}. Return a JSON array of 3 objects, each with "narration" (an ominous sentence to be spoken) and "imagePrompt" (a horror visual description for an image). JSON only.`;
                const resp = await mistralChat([{ role: 'user', content: prompt }], 500);
                return JSON.parse(resp.replace(/```json|```/g, '').trim());
            }

            function startAudioTrailerPlayback(movie) {
                const scenes = movie.trailerScript;
                const images = movie.trailerImages;
                let currentScene = 0;
                let projectorNodes = null;
                let isPaused = false;

                const modalContent = document.getElementById('genericModalContent');
                modalContent.innerHTML = `
            <div class="trailer-theater trailer-projector-flicker" style="position:relative;">
                <div class="trailer-curtain-top"></div>
                <div class="trailer-curtain-bottom"></div>
                <div class="trailer-screen-vignette"></div>
                <div class="trailer-film-grain"></div>
                <div id="trailerImgContainer" style="position:relative; z-index:1;">
                    <img id="trailerImg" class="trailer-scene-img" src="${images[0]}" style="width:100%; max-height:55vh; object-fit:contain; display:block;">
                </div>
                <div style="position:relative; z-index:4; padding:12px; background:linear-gradient(180deg, transparent, rgba(0,0,0,0.85));">
                    <p id="trailerSub" style="color:#e8c5b0; font-size:17px; min-height:2.5em; margin:0 0 8px; transition: opacity 0.3s, transform 0.3s;"></p>
                    <div class="trailer-scene-dots" id="trailerDots">
                        ${scenes.map((_, i) => `<span class="trailer-scene-dot ${i===0?'active':''}"></span>`).join('')}
                    </div>
                    <small style="color:#6b4e4e;">Scene <span id="trailerNum">1</span>/${scenes.length}</small>
                </div>
                <div style="text-align:center; padding:8px; position:relative; z-index:4;">
                    <button class="btn" id="trailerPause">⏯️ Pause</button>
                    <button class="btn" id="trailerSkip">⏭ Skip</button>
                    <button class="modal-btn" id="trailerClose">✕ Close</button>
                </div>
            </div>`;
                document.getElementById('genericModal').style.display = 'flex';

                function startProjectorHum() {
                    projectorAudioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    const osc = projectorAudioCtx.createOscillator();
                    const gain = projectorAudioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.value = 55;
                    const lfo = projectorAudioCtx.createOscillator();
                    const lfoGain = projectorAudioCtx.createGain();
                    lfo.frequency.value = 8;
                    lfoGain.gain.value = 3;
                    lfo.connect(lfoGain);
                    lfoGain.connect(osc.frequency);
                    gain.gain.value = 0.02;
                    osc.connect(gain);
                    gain.connect(projectorAudioCtx.destination);
                    osc.start();
                    lfo.start();
                    return { osc, lfo, gain };
                }

                function stopProjectorHum(nodes) {
                    if (nodes) { nodes.osc.stop();
                        nodes.lfo.stop(); }
                    if (projectorAudioCtx) { projectorAudioCtx.close();
                        projectorAudioCtx = null; }
                }

                projectorNodes = startProjectorHum();

                function getVoice() {
                    const voices = speechSynthesis.getVoices();
                    return voices.find(v => v.name.includes('Google UK English Male') || v.name.includes('Daniel') || v
                        .lang.startsWith('en')) || voices[0];
                }

                function showReelEnd(callback) {
                    const img = document.getElementById('trailerImg');
                    if (img) {
                        img.style.filter = 'brightness(10)';
                        setTimeout(() => {
                            img.style.filter = 'brightness(1)';
                            const sub = document.getElementById('trailerSub');
                            if (sub) sub.innerHTML =
                                '<span style="font-size:28px;font-family:var(--font-display);">🩸 COMING SOON</span>';
                            setTimeout(callback, 2000);
                        }, 300);
                    } else callback();
                }

                function showEndCard(movie) {
                    const mc = document.getElementById('genericModalContent');
                    mc.innerHTML = `
                <div class="trailer-end-card" style="text-align:center;">
                    <div style="font-size:40px;">🔪</div>
                    <h2 style="font-family:var(--font-display); color:#e8c5b0;">${esc(movie.title)}</h2>
                    <p style="color:#c41e3a;">"${esc(movie.tagline || '')}"</p>
                    <div class="star-rating" style="font-size:24px;">${'💀'.repeat(movie.quality)}${'🦴'.repeat(5 - movie.quality)}</div>
                    <p style="color:#d4c5b2; margin-top:12px;">NOW SCREAMING AT NIGHTFALLS CINEMA</p>
                    <div style="margin-top:16px;">
                        <button class="btn accent" id="selectFromTrailer">🔪 Add to Tonight</button>
                        <button class="modal-btn" onclick="closeModal()">Close</button>
                    </div>
                </div>`;
                    document.getElementById('selectFromTrailer').onclick = () => {
                        selectForTonight(movie.id);
                        closeModal();
                        switchTab('overview');
                    };
                }

                function playScene(index) {
                    if (index >= scenes.length) {
                        stopProjectorHum(projectorNodes);
                        showReelEnd(() => closeModal());
                        return;
                    }
                    const img = document.getElementById('trailerImg');
                    if (img && index > 0) img.classList.add('fading-out');
                    setTimeout(() => {
                        if (img) {
                            img.src = images[index] || '';
                            img.classList.remove('fading-out');
                        }
                        const sub = document.getElementById('trailerSub');
                        if (sub) {
                            sub.style.opacity = '0';
                            sub.style.transform = 'translateY(8px)';
                            setTimeout(() => {
                                sub.textContent = scenes[index].narration;
                                sub.style.opacity = '1';
                                sub.style.transform = 'translateY(0)';
                            }, 150);
                        }
                        document.querySelectorAll('.trailer-scene-dot').forEach((dot, i) => {
                            dot.classList.remove('active', 'done');
                            if (i < index) dot.classList.add('done');
                            if (i === index) dot.classList.add('active');
                        });
                        document.getElementById('trailerNum').textContent = index + 1;

                        if (!isPaused) {
                            const utterance = new SpeechSynthesisUtterance(scenes[index].narration);
                            utterance.voice = getVoice();
                            utterance.rate = 0.85;
                            utterance.pitch = 1.0;
                            utterance.onend = () => {
                                currentScene++;
                                if (currentScene < scenes.length) setTimeout(() => playScene(currentScene),
                                    500);
                                else {
                                    stopProjectorHum(projectorNodes);
                                    showEndCard(movie);
                                }
                            };
                            speechSynthesis.speak(utterance);
                        }
                    }, 400);
                }

                playScene(0);

                document.getElementById('trailerPause').onclick = () => {
                    isPaused = !isPaused;
                    document.getElementById('trailerPause').textContent = isPaused ? '▶️ Play' : '⏯️ Pause';
                    if (isPaused) speechSynthesis.pause();
                    else speechSynthesis.resume();
                };
                document.getElementById('trailerSkip').onclick = () => {
                    speechSynthesis.cancel();
                    stopProjectorHum(projectorNodes);
                    showEndCard(movie);
                };
                document.getElementById('trailerClose').onclick = () => {
                    speechSynthesis.cancel();
                    stopProjectorHum(projectorNodes);
                    closeModal();
                };

                const origClose = closeModal;
                closeModal = function() {
                    speechSynthesis.cancel();
                    stopProjectorHum(projectorNodes);
                    origClose();
                };
            }

            refreshAll();
            setFooter(apiKey ? '🩸 NIGHTFALLS CINEMA · 1985' : '⚠️ Set API key');
            document.querySelectorAll('.tab-btn').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
            document.getElementById('resetApiBtn').onclick = () => {
                const key = prompt('Enter your Mistral API key:');
                if (key && key.length > 10) { apiKey = key;
                    localStorage.setItem('nightfalls_api_key', key);
                    setFooter('✅ API Key saved!'); }
            };
            if (!apiKey) setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
        })();
    </script>
</body>
</html>
