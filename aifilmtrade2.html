<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>NIGHTFALLS CINEMA · Horror Theater Manager · 1985</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080c;
            --screen-bg: #0c0c10;
            --panel-bg: #0e0e16;
            --text: #c8c8c8;
            --text-dim: #7a7a7a;
            --text-bright: #f0ece4;
            --accent: #ff2a4a;
            --accent-dim: #99111f;
            --border: #ff2a4a;
            --border-glow: 0 0 12px #ff003c66, 0 0 28px #ff003c22;
            --danger: #e82233;
            --danger-glow: 0 0 10px #e8223344;
            --amber: #ffaa22;
            --amber-dim: #885500;
            --green: #33cc55;
            --input-bg: #16161e;
            --button-bg: #1a1a20;
            --button-hover: #24202c;
            --button-active: #2a1018;
            --bevel-light: #2a2a35;
            --bevel-dark: #060608;
            --font-display: 'Creepster', 'Nosifer', cursive;
            --font-title: 'Nosifer', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --font-body: 'VT323', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 32px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0d0d18 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
        }

        /* ── CRT MONITOR BEZEL ── */
        .monitor-bezel {
            width: 100%;
            max-width: 520px;
            height: 100vh;
            height: 100dvh;
            max-height: 900px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 10px;
            box-shadow:
                inset 0 0 0 3px #2a2a2a,
                0 0 0 4px #111111,
                0 0 0 8px #0a0a0a,
                0 8px 40px #000000cc;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (max-width: 520px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                max-height: 100dvh;
                box-shadow: none;
                background: #0a0a0a;
            }
        }

        /* ── POWER LED ── */
        .power-led {
            position: absolute;
            bottom: 16px;
            right: 20px;
            width: 8px;
            height: 8px;
            background: #33ff44;
            border-radius: 50%;
            box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433;
            animation: powerGlow 2s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433;
            }
            50% {
                box-shadow: 0 0 14px #33ff44aa, 0 0 24px #33ff4455;
            }
        }

        .brand-label {
            position: absolute;
            bottom: 14px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #333;
            letter-spacing: 2px;
            z-index: 20;
            text-transform: uppercase;
        }

        /* ── GAME SHELL (SCREEN) ── */
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 4px;
            border: 3px solid #ff2a4a;
            box-shadow: var(--border-glow), inset 0 0 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 520px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }

        /* ── SCREEN CURVATURE ── */
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 2px;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.7), inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        /* ── CRT OVERLAY ── */
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, var(--scanline-opacity)) 0px,
                    rgba(0, 0, 0, var(--scanline-opacity)) 2px,
                    transparent 2px,
                    transparent 5px);
            border-radius: 2px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.65) 100%);
            border-radius: 2px;
        }

        /* ── SCREEN FLICKER ── */
        .screen-flicker {
            animation: crtFlicker 8s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.4%,
            100% {
                opacity: 1;
            }
            99.5% {
                opacity: 0.6;
            }
            99.6% {
                opacity: 0.9;
            }
            99.7% {
                opacity: 0.5;
            }
            99.8% {
                opacity: 1;
            }
        }

        /* ── MARQUEE ── */
        .marquee {
            position: relative;
            z-index: 10;
            background: #0c0406;
            border-bottom: 3px solid #ff2a4a;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 16px #00000088, inset 0 1px 0 #2a0c0c;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #ff2a4a;
            border-radius: 3px;
            padding: 10px 14px;
            background: #080206;
            position: relative;
            box-shadow: inset 0 0 20px #ff003c11;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 20px;
            right: 20px;
            height: 2px;
            background: #ff2a4a;
            box-shadow: 0 0 10px #c41e3a66;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #e8c5b0;
            text-shadow: 0 0 14px #c41e3a88, 0 2px 4px #000;
            letter-spacing: 3px;
            font-family: var(--font-title);
            line-height: 1.2;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 22px;
                letter-spacing: 1px;
            }
        }
        .marquee-features {
            font-size: 13px;
            color: #c49585;
            font-family: var(--font-body);
            margin-top: 3px;
            letter-spacing: 2px;
        }
        .blinking-cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #ff2a4a;
            margin-left: 4px;
            vertical-align: middle;
            animation: blink 0.7s step-end infinite;
            box-shadow: 0 0 6px #ff2a4a88;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* ── STATUS STRIP ── */
        .status-strip {
            display: flex;
            justify-content: space-around;
            padding: 8px 10px;
            background: #08080e;
            border-bottom: 1px solid #ff2a4a66;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: var(--text-size-sm);
            color: var(--text-dim);
            letter-spacing: 1px;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 4px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            padding: 2px 6px;
            background: #0e0e16;
            border: 1px solid #1a1a25;
            border-radius: 2px;
            min-height: var(--touch-target);
            align-items: center;
        }
        .status-val {
            color: var(--text-bright);
            font-weight: bold;
            font-size: var(--text-size-base);
        }
        .status-label {
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ── TABS ROW ── */
        .tabs-row {
            display: flex;
            background: #08080e;
            border-bottom: 2px solid #ff2a4a;
            z-index: 10;
            flex-shrink: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            gap: 0;
        }
        .tabs-row::-webkit-scrollbar {
            display: none;
        }
        .tab-btn {
            flex: 1 0 auto;
            min-width: 60px;
            text-align: center;
            padding: 12px 8px;
            font-family: var(--font-body);
            font-size: 15px;
            color: #5a3a3a;
            cursor: pointer;
            border-bottom: 4px solid transparent;
            background: transparent;
            white-space: nowrap;
            letter-spacing: 1px;
            transition: all 0.15s;
            min-height: var(--btn-min-height);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
        }
        .tab-btn.active {
            color: #f0ddd0;
            border-bottom-color: #ff2a4a;
            text-shadow: 0 0 10px #c41e3a88;
            background: #0c0610;
            box-shadow: inset 0 -4px 12px #ff003c18;
        }
        .tab-btn:hover {
            color: #d4b8a8;
            background: #0a0810;
        }
        .tab-btn .tab-icon {
            font-size: 16px;
        }
        @media (max-width: 380px) {
            .tab-btn {
                font-size: 12px;
                padding: 10px 5px;
                min-width: 48px;
                letter-spacing: 0;
            }
            .tab-btn .tab-icon {
                font-size: 14px;
            }
        }

        /* ── GAME AREA ── */
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #2a0f15 #08080e;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #08080e;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #2a0f15;
            border-radius: 3px;
        }

        /* ── PANELS ── */
        .panel {
            display: none;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .panel.active {
            display: flex;
        }

        /* ── BUTTONS (CHUNKY RETRO) ── */
        .btn {
            background: var(--button-bg);
            border: 2px solid #2a2a35;
            border-top-color: #3a3a48;
            border-left-color: #353540;
            border-right-color: #1a1a25;
            border-bottom-color: #111118;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            position: relative;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #1a1a25;
            border-left-color: #1a1a25;
            border-bottom-color: #3a3a48;
            border-right-color: #353540;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #14141c;
        }
        .btn.accent {
            background: #180a10;
            border-color: #5c1525;
            border-top-color: #7a2035;
            border-left-color: #6a1a2a;
            border-right-color: #3a0f18;
            border-bottom-color: #200810;
            color: #e8a090;
            box-shadow: 0 2px 0 #00000044, 0 0 8px #c41e3a22;
        }
        .btn.accent:active {
            border-top-color: #3a0f18;
            border-left-color: #3a0f18;
            border-bottom-color: #7a2035;
            border-right-color: #6a1a2a;
            box-shadow: 0 0px 0 #00000044, 0 0 14px #c41e3a44;
        }
        .btn.danger {
            background: #180a0c;
            border-color: #441111;
            border-top-color: #5a1a1a;
            border-left-color: #4a1515;
            border-right-color: #2a0a0a;
            border-bottom-color: #150505;
            color: #ff7777;
            box-shadow: 0 2px 0 #00000044;
        }
        .btn.danger:active {
            border-top-color: #2a0a0a;
            border-left-color: #2a0a0a;
            border-bottom-color: #5a1a1a;
            border-right-color: #4a1515;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn .btn-shortcut {
            font-size: 10px;
            color: #555;
            letter-spacing: 0;
        }

        /* ── MOVIE CARDS ── */
        .movie-card {
            background: #0e0e16;
            border: 2px solid #1a1a25;
            border-radius: 4px;
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .movie-card:active {
            background: #12121c;
        }
        .movie-card.selected {
            border-color: #ff2a4a;
            box-shadow: 0 0 18px #c41e3a33, inset 0 0 20px #ff003c08;
            background: #100a14;
        }
        .poster-thumb {
            width: 65px;
            height: 88px;
            border-radius: 3px;
            background: #0a0a14;
            border: 2px solid #1a1a28;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #c41e3a;
        }
        .poster-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .movie-info {
            flex: 1;
            min-width: 0;
        }
        .movie-title {
            font-family: var(--font-display);
            font-size: 17px;
            color: #e8c5b0;
            text-shadow: 0 0 6px #c41e3a22;
            letter-spacing: 1px;
            line-height: 1.2;
        }
        .movie-meta {
            font-size: 12px;
            color: #7a6a6a;
            font-family: var(--font-mono);
            margin-top: 2px;
        }
        .movie-synopsis {
            font-size: var(--text-size-base);
            color: #b0a0b8;
            margin-top: 4px;
            line-height: 1.4;
        }
        .star-rating {
            color: #c41e3a;
            letter-spacing: 2px;
            font-size: 14px;
        }
        .movie-actions {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-shrink: 0;
            min-width: 80px;
        }
        .movie-actions .btn {
            font-size: 14px;
            padding: 8px 10px;
            min-height: 36px;
            letter-spacing: 0;
        }

        @media (max-width: 400px) {
            .movie-card {
                flex-wrap: wrap;
                gap: 8px;
            }
            .poster-thumb {
                width: 50px;
                height: 68px;
                font-size: 24px;
            }
            .movie-actions {
                flex-direction: row;
                flex-wrap: wrap;
                width: 100%;
                min-width: 0;
                gap: 4px;
            }
            .movie-actions .btn {
                flex: 1;
                min-width: 55px;
                font-size: 12px;
                padding: 7px 6px;
                min-height: 32px;
            }
            .movie-title {
                font-size: 15px;
            }
        }

        /* ── EVENT ALERT ── */
        .event-alert {
            background: #180a0c;
            border: 2px solid #5c1525;
            border-radius: 4px;
            padding: 12px 16px;
            color: #ff9999;
            animation: alertPulse 1.5s ease-in-out infinite;
            font-size: var(--text-size-base);
            line-height: 1.4;
        }
        @keyframes alertPulse {
            0%,
            100% {
                box-shadow: 0 0 8px #e8223322;
            }
            50% {
                box-shadow: 0 0 20px #e8223344;
            }
        }

        /* ── CUSTOMER QUOTES ── */
        .customer-quote {
            background: #0e0e16;
            border-left: 4px solid #c41e3a;
            padding: 10px 14px;
            margin: 4px 0;
            border-radius: 0 4px 4px 0;
            font-style: italic;
            font-size: 15px;
            color: #d4c5b2;
            line-height: 1.4;
        }
        .customer-quote.negative {
            border-left-color: #e82233;
            color: #ffaaaa;
        }
        .customer-quote.positive {
            border-left-color: #6ba368;
            color: #b8d8b0;
        }

        /* ── UPGRADE ITEMS ── */
        .upgrade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border-bottom: 1px solid #1a1520;
            gap: 10px;
            min-height: 56px;
        }
        .upgrade-info {
            flex: 1;
            min-width: 0;
        }
        .upgrade-name {
            font-family: var(--font-display);
            font-size: 16px;
            color: #e8c5b0;
            letter-spacing: 1px;
        }
        .upgrade-desc {
            font-size: 13px;
            color: #7a6a6a;
            font-family: var(--font-mono);
            margin-top: 2px;
        }
        .upgrade-level {
            font-size: 11px;
            color: #c41e3a;
            letter-spacing: 1px;
        }
        .upgrade-item .btn {
            flex-shrink: 0;
            min-width: 70px;
            font-size: 14px;
            padding: 10px 14px;
            min-height: 40px;
        }

        /* ── MODAL ── */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0e0e16;
            border-radius: 6px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #ff2a4a;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #d4c5b2;
            max-height: 85vh;
            max-height: 85dvh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        @media (max-width: 440px) {
            .modal-content {
                max-width: 98vw;
                padding: 14px;
                border-width: 2px;
                border-radius: 4px;
            }
        }
        .modal-content h2 {
            font-family: var(--font-display);
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #e8c5b0;
            text-shadow: 0 0 10px #c41e3a44;
            font-size: var(--text-size-xl);
            line-height: 1.3;
        }
        .modal-btn {
            background: #1a1a20;
            border: 2px solid #ff2a4a66;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #d4c5b2;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .modal-btn:active {
            border-color: #ff003c;
            box-shadow: 0 0 12px #c41e3a44;
        }

        /* ── LOADING SPINNER ── */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #2a0f15;
            border-top-color: #c41e3a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── FOOTER ── */
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #08080e;
            border-top: 1px solid #ff2a4a66;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #444;
            flex-shrink: 0;
            min-height: 34px;
            gap: 8px;
        }
        .footer-strip span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #resetApiBtn {
            background: none;
            border: 1px solid #222;
            color: #555;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
            white-space: nowrap;
            min-height: 28px;
            letter-spacing: 1px;
        }
        #resetApiBtn:active {
            color: #888;
            border-color: #444;
        }

        /* ── CAR GRID ── */
        .car-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            padding: 10px;
            background: #0a0a12;
            border-radius: 4px;
            border: 1px solid #1a1520;
            min-height: 60px;
            align-items: center;
        }
        .lot-car {
            font-size: 20px;
            margin: 1px 3px;
            display: inline-flex;
            align-items: flex-start;
        }
        .lot-car .speaker-pole {
            font-size: 8px;
            margin-left: -2px;
            color: #666;
        }

        /* ── HYPE BAR ── */
        .hype-bar {
            width: 100%;
            height: 14px;
            background: #1a1a25;
            border-radius: 3px;
            overflow: hidden;
            margin: 6px 0;
            border: 1px solid #222;
        }
        .hype-fill {
            height: 100%;
            background: linear-gradient(90deg, #c41e3a, #e8a090);
            transition: width 0.3s;
            border-radius: 2px;
            box-shadow: inset 0 1px 0 #ffffff22;
        }

        /* ── CHAT ── */
        .chat-log {
            max-height: 250px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 10px;
            border: 1px solid #1a1520;
            border-radius: 4px;
            padding: 10px;
            background: #0a0a12;
            font-size: var(--text-size-base);
            line-height: 1.5;
        }
        .chat-msg {
            margin: 8px 0;
            font-size: 16px;
            line-height: 1.4;
        }
        .chat-msg.user {
            color: #e8a090;
        }
        .chat-msg.assistant {
            color: #d4c5b2;
        }
        .chat-input-row {
            display: flex;
            gap: 8px;
        }
        .chat-input-row input {
            flex: 1;
            background: var(--input-bg);
            border: 2px solid #2a2a35;
            border-radius: 3px;
            padding: 10px 12px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            min-height: var(--btn-min-height);
            -webkit-user-select: text;
            user-select: text;
        }
        .chat-input-row input:focus {
            border-color: #ff2a4a66;
            outline: none;
            box-shadow: 0 0 10px #ff003c22;
        }

        /* ── TRAILER THEATER ── */
        .trailer-theater {
            background: #000;
            border: 6px solid #ff2a4a;
            border-radius: 3px;
            box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.9), 0 0 50px #c41e3a22, 0 0 0 3px #220000;
            position: relative;
            overflow: hidden;
        }
        .trailer-curtain-top {
            position: absolute;
            top: -6px;
            left: -10px;
            right: -10px;
            height: 55px;
            background: linear-gradient(180deg, #2a0808 0%, #4a1212 40%, #6b1a1a 70%, transparent 100%);
            z-index: 5;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.75);
        }
        .trailer-curtain-bottom {
            position: absolute;
            bottom: -6px;
            left: -10px;
            right: -10px;
            height: 55px;
            background: linear-gradient(0deg, #2a0808 0%, #4a1212 40%, #6b1a1a 70%, transparent 100%);
            z-index: 5;
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.75);
        }
        .trailer-screen-vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.9) 100%);
            pointer-events: none;
            z-index: 2;
        }
        .trailer-film-grain {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 3;
            opacity: 0.18;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            animation: grainShift 0.15s steps(3) infinite;
        }
        @keyframes grainShift {
            0%,
            100% {
                transform: translate(0, 0);
            }
            33% {
                transform: translate(-2px, 1px);
            }
            66% {
                transform: translate(1px, -1px);
            }
        }
        .trailer-projector-flicker {
            animation: flicker 3s ease-in-out infinite;
        }
        @keyframes flicker {
            0%,
            100% {
                opacity: 1;
            }
            5% {
                opacity: 0.82;
            }
            10% {
                opacity: 1;
            }
            45% {
                opacity: 0.9;
            }
            50% {
                opacity: 1;
            }
            92% {
                opacity: 0.85;
            }
            94% {
                opacity: 1;
            }
        }
        .trailer-end-card {
            animation: endCardReveal 0.8s ease-out forwards;
            background: linear-gradient(180deg, #0e0e16 0%, #0a0a12 100%);
            border: 3px solid #ff2a4a;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 0 40px #c41e3a44;
        }
        @keyframes endCardReveal {
            from {
                transform: scale(1.3);
                opacity: 0;
                filter: blur(10px);
            }
            to {
                transform: scale(1);
                opacity: 1;
                filter: blur(0);
            }
        }
        .trailer-scene-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 8px 0;
        }
        .trailer-scene-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #2a0f15;
            border: 1px solid #3a1515;
            transition: all 0.3s;
        }
        .trailer-scene-dot.active {
            background: #c41e3a;
            box-shadow: 0 0 10px #c41e3a;
            transform: scale(1.3);
        }
        .trailer-scene-dot.done {
            background: #5c1525;
            border-color: #8b1a2b;
        }
        .trailer-scene-img {
            transition: opacity 0.6s ease-in-out, filter 0.6s ease-in-out;
        }
        .trailer-scene-img.fading-out {
            opacity: 0;
            filter: brightness(3) blur(3px);
        }

        /* ── PLEASE STAND BY ── */
        .please-stand-by {
            background: #000;
            border: 8px solid #1a0a0a;
            border-radius: 50%;
            padding: 24px;
            text-align: center;
            position: relative;
            display: inline-block;
        }
        .please-stand-by::before {
            content: '';
            position: absolute;
            inset: 6px;
            border: 2px solid #330f0f;
            border-radius: 50%;
        }
        .test-pattern-bars {
            display: flex;
            height: 50px;
            margin: 16px 0;
            border-radius: 3px;
            overflow: hidden;
            opacity: 0.75;
        }
        .test-pattern-bars span {
            flex: 1;
        }
        .bar-1 {
            background: #bbb;
        }
        .bar-2 {
            background: #cccc44;
        }
        .bar-3 {
            background: #44aaaa;
        }
        .bar-4 {
            background: #44aa44;
        }
        .bar-5 {
            background: #aa44aa;
        }
        .bar-6 {
            background: #aa3333;
        }
        .bar-7 {
            background: #222288;
        }

        /* ── SYSTEM PROMPT ── */
        .system-prompt {
            font-family: var(--font-mono);
            color: #ffaa22;
            font-size: 13px;
            letter-spacing: 1px;
            text-align: left;
            padding: 6px 0;
        }
        .system-prompt::before {
            content: 'C:\\NIGHTFALLS> ';
            color: #885500;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            color: #4a3a3a;
            text-align: center;
            padding: 20px;
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            border: 1px dashed #1a1520;
            border-radius: 4px;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <!-- ── CRT MONITOR BEZEL ── -->
    <div class="monitor-bezel">
        <div class="brand-label">NIGHTFALLS · CRT-85</div>
        <div class="power-led" title="POWER ON"></div>

        <!-- ── GAME SHELL ── -->
        <div class="game-shell screen-flicker" id="gameShell">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>

            <!-- MARQUEE -->
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title" id="marqueeTitle">NIGHTFALLS CINEMA<span class="blinking-cursor"></span></div>
                    <div class="marquee-features" id="marqueeFeatures">MIDNIGHT DOUBLE FEATURE</div>
                </div>
            </div>

            <!-- STATUS STRIP -->
            <div class="status-strip">
                <span class="status-item">💰 <span class="status-val" id="statCash">$500</span></span>
                <span class="status-item">💀 <span class="status-val" id="statRep">50</span></span>
                <span class="status-item">📅 <span class="status-label">Night</span> <span class="status-val" id="statDay">1</span></span>
                <span class="status-item">🚗 <span class="status-val" id="statCars">0</span></span>
            </div>

            <!-- TABS -->
            <div class="tabs-row">
                <div class="tab-btn active" data-tab="overview"><span class="tab-icon">🚗</span> LOT</div>
                <div class="tab-btn" data-tab="movies"><span class="tab-icon">🔪</span> MOVIES</div>
                <div class="tab-btn" data-tab="franchises"><span class="tab-icon">📼</span> FRANCHISES</div>
                <div class="tab-btn" data-tab="upgrades"><span class="tab-icon">🔧</span> UPGRADES</div>
                <div class="tab-btn" data-tab="history"><span class="tab-icon">📋</span> HISTORY</div>
            </div>

            <!-- GAME AREA -->
            <div class="game-area">
                <div id="overviewPanel" class="panel active"></div>
                <div id="moviesPanel" class="panel"></div>
                <div id="franchisesPanel" class="panel"></div>
                <div id="upgradesPanel" class="panel"></div>
                <div id="historyPanel" class="panel"></div>
            </div>

            <!-- FOOTER -->
            <div class="footer-strip">
                <span id="footerMsg">🩸 NIGHTFALLS CINEMA · 1985</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('nightfalls_api_key') || '';

            const DEFAULT_STATE = {
                cash: 500,
                reputation: 50,
                day: 1,
                movieLibrary: [],
                tonightDoubleFeature: [],
                upgrades: { projector: 0, sound: 0, screen: 0, concessions: 0, fence: 0, bathrooms: 0, parking: 0 },
                history: [],
                lastNightCars: 0,
                lastNightRevenue: 0,
                imageCooldownUntil: 0
            };
            let gameState = { ...DEFAULT_STATE };

            if (speechSynthesis.getVoices().length === 0) {
                speechSynthesis.onvoiceschanged = () => {};
            }

            const upgradeDefs = [
                { id: 'projector', name: 'Projector', levels: ['Flickering 16mm', 'Refurbished 35mm', 'Crisp Xenon',
                        'Laser Vision'
                    ], costs: [0, 300, 800, 2000] },
                { id: 'sound', name: 'Sound System', levels: ['Tinny Pole Speakers', 'FM Transmitter', 'Stereo FM',
                        'Surround Sound'
                    ], costs: [0, 250, 700, 1800] },
                { id: 'screen', name: 'Screen', levels: ['Weathered White Wall', 'Repainted Panel', 'Premium Reflective',
                        'Giant Cinemascope'
                    ], costs: [0, 400, 1000, 2500] },
                { id: 'concessions', name: 'Concessions', levels: ['Stale Popcorn', 'Fresh Popcorn & Soda',
                        'Deluxe Snack Bar', 'Gourmet Diner'
                    ], costs: [0, 200, 600, 1500] },
                { id: 'fence', name: 'Perimeter Fence', levels: ['None', 'Chain-link', 'Wooden Privacy',
                        'Electric Security'
                    ], costs: [0, 150, 500, 1200] },
                { id: 'bathrooms', name: 'Restrooms', levels: ['Porta-Potties', 'Basic Cinderblock', 'Clean Tile',
                        'Luxury Lounge'
                    ], costs: [0, 350, 900, 2200] },
                { id: 'parking', name: 'Parking Lot', levels: ['Dirt & Gravel', 'Graded Gravel', 'Smooth Asphalt',
                        'Premium Marked'
                    ], costs: [0, 200, 550, 1400] }
            ];

            function saveState() { try { localStorage.setItem('nightfalls_state_v1', JSON.stringify(
                    gameState)); } catch (e) {} }

            function loadState() {
                try {
                    const saved = localStorage.getItem('nightfalls_state_v1');
                    if (saved) {
                        gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
                        gameState.movieLibrary = gameState.movieLibrary.map(m => ({
                            sequelOf: null,
                            seriesName: null,
                            seriesOrder: 1,
                            totalScreenings: 0,
                            lastScreenedDay: null,
                            peakAttendance: 0,
                            isHot: false,
                            ...m
                        }));
                    }
                } catch (e) {}
            }

            const esc = str => {
                if (str === null || str === undefined) return '';
                return String(str).replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                    "'": '&#39;', '"': '&quot;' })[m]);
            };

            function setFooter(msg) { document.getElementById('footerMsg').textContent = msg; }

            function flashFooter(msg) { setFooter(msg);
                setTimeout(() => setFooter('🩸 NIGHTFALLS CINEMA · 1985'), 4000); }

            function showModal(html) { document.getElementById('genericModalContent').innerHTML = html;
                document.getElementById('genericModal').style.display = 'flex'; }

            function closeModal() { document.getElementById('genericModal').style.display = 'none'; }
            window.closeModal = closeModal;
            document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e.currentTarget)
                    closeModal(); });

            async function mistralChat(msgs, maxTok = 500) {
                if (!apiKey) throw new Error('API key missing');
                const res = await fetch(MISTRAL_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                    body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9, max_tokens: maxTok })
                });
                if (!res.ok) throw new Error('API ' + res.status);
                const data = await res.json();
                return data.choices[0].message.content.trim();
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) await new Promise(r => setTimeout(r, gameState
                    .imageCooldownUntil - now + 500));
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s horror VHS cover art')}?width=512&height=640&seed=${Date.now()}`;
                const img = new Image();
                const result = await new Promise(resolve => {
                    let done = false;
                    const finish = (val) => { if (!done) { done = true;
                            clearTimeout(timer);
                            resolve(val); } };
                    img.onload = () => finish(url);
                    img.onerror = () => finish(null);
                    img.src = url;
                    const timer = setTimeout(() => finish(null), 20000);
                });
                gameState.imageCooldownUntil = Date.now() + 30000;
                saveState();
                return result;
            }

            async function generateMovie() {
                const prompt =
                    `Generate a terrifying 80s cult horror movie concept as valid JSON only. It could be a slasher, supernatural horror, creature feature, body horror, or psychological terror. Fields: "title" (max 35), "genre" (horror subgenre), "tagline" (ominous), "synopsis" (disturbing), "quality"(1-5), "audienceAppeal". JSON only.`;
                const resp = await mistralChat([{ role: 'user', content: prompt }], 1200);
                return JSON.parse(resp.replace(/```json|```/g, '').trim());
            }

            async function generateCustomerReactions(movies, attendance, reputation) {
                const titles = movies.map(m => m.title).join(' and ');
                const avgQ = Math.round(movies.reduce((a, m) => a + (m.quality || 3), 0) / movies.length);
                const prompt =
                    `Generate 3-5 horrified reactions (JSON array of strings) from audience members who just watched the double feature "${titles}" at a drive-in theater. Avg quality ${avgQ}/5. Cars: ${attendance}. Rep: ${reputation}. These are 80s horror fans. Some reactions should reference specific terrifying scenes, practical effects, or how scared they were. JSON only.`;
                const resp = await mistralChat([{ role: 'user', content: prompt }], 500);
                const raw = JSON.parse(resp.replace(/```json|```/g, '').trim());
                return raw.map(item => {
                    if (typeof item === 'string') return item;
                    if (item && typeof item === 'object') return item.reaction || item.text || item.message || JSON
                        .stringify(item);
                    return String(item);
                });
            }

            async function generateEvent() {
                const resp = await mistralChat([{ role: 'user',
                    content: 'Generate a random horror-themed event that could happen at a 1980s drive-in theater showing horror movies. JSON with fields: type, title, description, cashImpact (int), repImpact (-10 to 10). Events could involve weather (fog, storm), mechanical issues (projector malfunction), local controversy, or strange occurrences. JSON only.' }],
                    500);
                return JSON.parse(resp.replace(/```json|```/g, '').trim());
            }

            function addMovieToLibrary(movie) {
                movie.sequelOf = movie.sequelOf || null;
                movie.seriesName = movie.seriesName || null;
                movie.seriesOrder = movie.seriesOrder || 1;
                movie.totalScreenings = movie.totalScreenings || 0;
                movie.lastScreenedDay = null;
                movie.peakAttendance = 0;
                movie.isHot = false;
                movie.id = 'm_' + Date.now() + '_' + Math.random().toString(36);
                gameState.movieLibrary.push(movie);
                saveState();
            }

            function removeMovieFromLibrary(id) {
                gameState.movieLibrary = gameState.movieLibrary.filter(m => m.id !== id);
                gameState.tonightDoubleFeature = gameState.tonightDoubleFeature.filter(m => m.id !== id);
                saveState();
            }

            function selectForTonight(id) {
                const movie = gameState.movieLibrary.find(m => m.id === id);
                if (!movie) return;
                if (gameState.tonightDoubleFeature.some(m => m.id === id)) {
                    gameState.tonightDoubleFeature = gameState.tonightDoubleFeature.filter(m => m.id !== id);
                } else {
                    if (gameState.tonightDoubleFeature.length >= 2) gameState.tonightDoubleFeature.shift();
                    gameState.tonightDoubleFeature.push(movie);
                }
                saveState();
                refreshAll();
            }

            function calculateAttendance(useRandom = true) {
                if (gameState.tonightDoubleFeature.length !== 2) return 0;
                let base = 15 + gameState.reputation / 3;
                const totalUp = Object.values(gameState.upgrades).reduce((a, b) => a + b, 0);
                base += totalUp * 4;
                const avgQ = (gameState.tonightDoubleFeature[0].quality + gameState.tonightDoubleFeature[1].quality) / 2;
                base += (avgQ - 3) * 8;
                if (useRandom) base += Math.floor(Math.random() * 12) - 6;
                if (gameState.upgrades.fence >= 2) base += 3;
                if (gameState.upgrades.fence >= 3) base += 5;
                return Math.max(3, Math.round(base));
            }

            function calculateRevenue(cars) {
                const ticket = 3.5 + gameState.upgrades.screen * 1.5 + gameState.upgrades.sound * 1;
                const con = 2 + gameState.upgrades.concessions * 3;
                return Math.round(cars * (ticket * 1.8 + con));
            }

            function getSequelMultiplier(movie, currentDay, applyRush = false) {
                if (!movie.sequelOf) return 1.0;
                const prequel = gameState.movieLibrary.find(p => p.id === movie.sequelOf);
                if (!prequel || !prequel.isHot) return movie.quality < 2 ? 0.7 : 1.0;
                let mult = Math.min(2.0, 1.2 + (prequel.peakAttendance / 50));
                if (applyRush && currentDay && prequel.lastScreenedDay && (currentDay - prequel.lastScreenedDay) <= 2) {
                    if (Math.random() < 0.4) mult = Math.max(0.7, mult - 0.3);
                }
                return mult;
            }

            function decayMovieHeat() {
                gameState.movieLibrary.forEach(m => {
                    if (!m.lastScreenedDay) return;
                    if (gameState.day - m.lastScreenedDay > 4) m.isHot = false;
                    if (m.peakAttendance > 0 && (gameState.day - m.lastScreenedDay) > 2) m.peakAttendance = Math.max(0, m
                        .peakAttendance - 1);
                });
            }

            function getSeriesData() {
                const map = {};
                gameState.movieLibrary.forEach(m => {
                    const name = m.seriesName || m.title;
                    if (!map[name]) map[name] = { movies: [], totalScreenings: 0, peakAttendance: 0, avgQuality: 0 };
                    map[name].movies.push(m);
                    map[name].totalScreenings += m.totalScreenings;
                    if (m.peakAttendance > map[name].peakAttendance) map[name].peakAttendance = m.peakAttendance;
                });
                Object.keys(map).forEach(name => {
                    const ms = map[name].movies;
                    map[name].avgQuality = Math.round(ms.reduce((a, m) => a + m.quality, 0) / ms.length);
                });
                return map;
            }

            function calcFranchiseValue(series) {
                return Math.max(100, series.totalScreenings * 25 + series.peakAttendance * 50 + series.avgQuality * 80);
            }

            function sellFranchise(seriesName) {
                const movies = gameState.movieLibrary.filter(m => (m.seriesName || m.title) === seriesName);
                if (!movies.length) return;
                const value = calcFranchiseValue(getSeriesData()[seriesName]);
                gameState.cash += value;
                gameState.movieLibrary = gameState.movieLibrary.filter(m => (m.seriesName || m.title) !== seriesName);
                gameState.tonightDoubleFeature = gameState.tonightDoubleFeature.filter(m => (m.seriesName || m.title) !==
                    seriesName);
                saveState();
                refreshAll();
                flashFooter(`💸 Sold "${seriesName}" for $${value}!`);
            }

            async function advanceNight() {
                if (gameState.tonightDoubleFeature.length < 2) {
                    showModal('<h2>🔪 Need Double Feature</h2><button class="modal-btn" onclick="closeModal()">OK</button>');
                    return;
                }
                decayMovieHeat();
                const movies = [...gameState.tonightDoubleFeature];
                const cars = calculateAttendance(true);
                let revenue = calculateRevenue(cars);
                let bonusLog = [];
                movies.forEach(m => {
                    const mult = getSequelMultiplier(m, gameState.day, true);
                    if (mult !== 1.0) {
                        const baseEach = calculateRevenue(cars) / 2;
                        const diff = Math.round(baseEach * (mult - 1));
                        revenue = Math.round(revenue + diff);
                        bonusLog.push(mult > 1 ? `📈 "${m.title}" hype +$${diff}` :
                            `📉 "${m.title}" flopped -$${Math.abs(diff)}`);
                    }
                });
                gameState.cash += revenue;
                gameState.lastNightCars = cars;
                gameState.lastNightRevenue = revenue;
                movies.forEach(m => {
                    const lib = gameState.movieLibrary.find(l => l.id === m.id);
                    if (lib) {
                        lib.totalScreenings++;
                        lib.lastScreenedDay = gameState.day;
                        if (cars > lib.peakAttendance) lib.peakAttendance = cars;
                        lib.isHot = lib.peakAttendance >= 20 && (gameState.day - lib.lastScreenedDay) <= 2;
                    }
                });
                let reactions;
                try { reactions = await generateCustomerReactions(movies, cars, gameState.reputation); } catch (e) { reactions = [
                        "The crowd was speechless..."
                    ]; }
                const avgQ = movies.reduce((a, m) => a + m.quality, 0) / 2;
                const repChange = Math.round((avgQ - 3) * 4 + (cars > 25 ? 3 : cars > 15 ? 1 : -2));
                gameState.reputation = Math.max(0, Math.min(100, gameState.reputation + repChange));
                let event = null;
                if (Math.random() < 0.4) {
                    try { event = await generateEvent(); } catch (e) { event = { type: 'weather', title: 'Clear',
                            description: 'Nothing.', cashImpact: 0, repImpact: 0 }; }
                    gameState.cash += event.cashImpact || 0;
                    gameState.reputation = Math.max(0, Math.min(100, gameState.reputation + (event.repImpact || 0)));
                    gameState.cash = Math.max(0, gameState.cash);
                }
                gameState.history.unshift({ day: gameState.day, movies: movies.map(m => ({ title: m.title, quality: m
                            .quality })), cars, revenue, repChange, event, reactions, bonusLog });
                if (gameState.history.length > 30) gameState.history.length = 30;
                gameState.day++;
                gameState.tonightDoubleFeature = [];
                saveState();
                const eventHTML = (event && event.type !== 'weather') ?
                    `<div class="event-alert"><strong>⚠️ ${esc(event.title)}</strong><br>${esc(event.description)}<br><small>💰${event.cashImpact>=0?'+':''}${event.cashImpact} 💀${event.repImpact>=0?'+':''}${event.repImpact}</small></div>` :
                    '';
                const bonusHTML = bonusLog.map(b =>
                    `<div style="color:#e8a090;font-size:13px;">${b}</div>`).join('');
                const reactionsHTML = reactions.map(r => {
                    const cls = /bad|terrible|worst|boring/i.test(r) ? 'negative' : 'positive';
                    return `<div class="customer-quote ${cls}">💬 "${esc(r)}"</div>`;
                }).join('');
                showModal(
                    `<h2>🌙 Night ${gameState.day-1}</h2><p style="font-size:18px;">🚗 ${cars} cars · 💰 $${revenue}</p><p>💀 ${repChange>=0?'+':''}${repChange} (now ${gameState.reputation})</p>${eventHTML}${bonusHTML}<div style="max-height:150px;overflow-y:auto;text-align:left;">${reactionsHTML}</div><button class="modal-btn" onclick="closeModal()">Night ${gameState.day}</button>`
                    );
                refreshAll();
                setFooter('☀️ Day ' + gameState.day + ' · Choose your double feature!');
            }

            function canCommissionSequel(movie) {
                return movie.totalScreenings >= 1 && gameState.cash >= commissionCost(movie) && !gameState.movieLibrary
                    .some(m => m.sequelOf === movie.id);
            }

            function commissionCost(movie) { return 200 + movie.quality * 60; }

            async function commissionSequel(parentId) {
                const parent = gameState.movieLibrary.find(m => m.id === parentId);
                if (!parent || !canCommissionSequel(parent)) return;
                gameState.cash -= commissionCost(parent);
                saveState();
                const seriesName = parent.seriesName || parent.title.replace(/\s+\d+$/, '').trim();
                const nextOrder = (parent.seriesOrder || 1) + 1;
                const prompt =
                    `Create a horror sequel to "${parent.title}" (genre: ${parent.genre}). Synopsis: "${parent.synopsis}". This is an 80s horror franchise. Return JSON: "title" (like "${seriesName}: [Subtitle]"), "genre", "tagline" (ominous), "synopsis" (terrifying), "quality" (1-5, must be ${parent.quality}±1), "audienceAppeal". The sequel should escalate the horror. JSON only.`;
                try {
                    const resp = await mistralChat([{ role: 'user', content: prompt }], 1200);
                    const data = JSON.parse(resp.replace(/```json|```/g, '').trim());
                    const sequel = { ...data, posterUrl: null, sequelOf: parent.id, seriesName, seriesOrder: nextOrder,
                        totalScreenings: 0, lastScreenedDay: null, peakAttendance: 0, isHot: false };
                    addMovieToLibrary(sequel);
                    refreshAll();
                    setFooter('🔪 Commissioned: ' + sequel.title);
                    const poster = await generateImage(
                        `Horror sequel poster for "${sequel.title}", ${sequel.genre}`);
                    if (poster) { sequel.posterUrl = poster;
                        saveState();
                        refreshAll(); }
                } catch (e) {
                    gameState.cash += Math.floor(commissionCost(parent) * 0.5);
                    saveState();
                    showModal(
                        '<h2>❌ Sequel Failed</h2><p>Half refunded.</p><button class="modal-btn" onclick="closeModal()">OK</button>'
                        );
                }
            }

            let directorMessages = [];

            function openDirectorModal() {
                directorMessages = [
                    { role: "system",
                        content: "You are a passionate, slightly unhinged 1980s horror movie director (think John Carpenter, Dario Argento, or George Romero). The player owns a drive-in theater and wants you to create a custom horror movie. Brainstorm with them about subgenre, kills, monsters, practical effects, etc. Keep responses short (1-3 sentences). Stay in character as a horror auteur. When you both agree on the concept, you will write the script as a JSON object (the player will ask you to finalize it)."
                    }
                ];
                renderDirectorChat();
                sendDirectorMessage(
                    "I've been dying to create something truly terrifying. What kind of horror are we conjuring tonight?");
            }

            function renderDirectorChat() {
                let html = `<h2>🔪 DIRECTOR'S LAIR</h2><div class="chat-log" id="directorChatLog">`;
                directorMessages.forEach(m => {
                    if (m.role === 'user') html +=
                        `<div class="chat-msg user"><strong>You:</strong> ${esc(m.content)}</div>`;
                    else if (m.role === 'assistant') html +=
                        `<div class="chat-msg assistant"><strong>Director:</strong> ${esc(m.content)}</div>`;
                });
                html += `</div>
        <div class="chat-input-row"><input type="text" id="directorInput" placeholder="Describe your nightmare..."><button class="btn" id="directorSendBtn">Send</button></div>
        <button class="btn accent" id="finalizeScriptBtn" style="width:100%;margin-top:6px;">📝 Finalize & Fund Script</button>
        <button class="modal-btn" onclick="closeModal()">Leave</button>`;
                document.getElementById('genericModalContent').innerHTML = html;
                document.getElementById('genericModal').style.display = 'flex';
                document.getElementById('directorSendBtn').addEventListener('click', () => {
                    const input = document.getElementById('directorInput');
                    const text = input.value.trim();
                    if (text) { sendDirectorMessage(text);
                        input.value = ''; }
                });
                document.getElementById('directorInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') document
                        .getElementById('directorSendBtn').click(); });
                document.getElementById('finalizeScriptBtn').addEventListener('click', finalizeScript);
                const log = document.getElementById('directorChatLog');
                if (log) log.scrollTop = log.scrollHeight;
            }

            async function sendDirectorMessage(text) {
                directorMessages.push({ role: "user", content: text });
                renderDirectorChat();
                const sendBtn = document.getElementById('directorSendBtn');
                const input = document.getElementById('directorInput');
                if (sendBtn) sendBtn.disabled = true;
                if (input) input.disabled = true;
                try {
                    const reply = await mistralChat(directorMessages, 300);
                    directorMessages.push({ role: "assistant", content: reply });
                } catch (e) {
                    directorMessages.push({ role: "assistant",
                        content: "(The director seems to have stepped into the shadows... try again.)" });
                }
                renderDirectorChat();
                if (sendBtn) sendBtn.disabled = false;
                if (input) { input.disabled = false;
                    input.focus(); }
            }

            async function finalizeScript() {
                const finalPrompt =
                    "The player wants to finalize the script. Based on our entire conversation, output ONLY a valid JSON object representing the completed horror movie. Include fields: title, genre, tagline, synopsis (2-3 sentences of pure terror), quality (1-5), audienceAppeal (low/medium/high), and a 'budget' field (integer dollar amount, between 200 and 800). Do not include any other text.";
                directorMessages.push({ role: "user", content: finalPrompt });
                renderDirectorChat();
                const sendBtn = document.getElementById('directorSendBtn');
                const finalizeBtn = document.getElementById('finalizeScriptBtn');
                if (sendBtn) sendBtn.disabled = true;
                if (finalizeBtn) finalizeBtn.disabled = true;
                try {
                    const reply = await mistralChat(directorMessages, 500);
                    const jsonMatch = reply.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error('No JSON found');
                    const movieData = JSON.parse(jsonMatch[0]);
                    if (!movieData.title || !movieData.quality || !movieData.budget) throw new Error(
                        'Incomplete movie data');
                    if (gameState.cash < movieData.budget) {
                        showModal(
                            `<h2>💸 Not Enough Cash</h2><p>The director needs $${movieData.budget}, but you only have $${gameState.cash}.</p><button class="modal-btn" onclick="closeModal()">OK</button>`
                            );
                        return;
                    }
                    gameState.cash -= movieData.budget;
                    const newMovie = { ...movieData, id: 'm_' + Date.now(), posterUrl: null, sequelOf: null,
                        seriesName: null, seriesOrder: 1, totalScreenings: 0, lastScreenedDay: null,
                        peakAttendance: 0, isHot: false };
                    addMovieToLibrary(newMovie);
                    saveState();
                    refreshAll();
                    closeModal();
                    setFooter('🔪 Director delivered: ' + newMovie.title);
                    generateImage(`Horror movie poster for "${newMovie.title}", ${newMovie.genre}`).then(url => {
                        const m = gameState.movieLibrary.find(m => m.id === newMovie.id);
                        if (m && url) { m.posterUrl = url;
                            saveState();
                            refreshAll(); }
                    });
                } catch (e) {
                    directorMessages.push({ role: "assistant",
                        content: "Hmm, the darkness consumed my thoughts. Let's try finalizing again. (Error: " + e
                        .message + ")" });
                    renderDirectorChat();
                } finally {
                    if (sendBtn) sendBtn.disabled = false;
                    if (finalizeBtn) finalizeBtn.disabled = false;
                }
            }

                document.getElementById('genMovieBtn').onclick = async () => {

            <p style="font-style:italic; color:#d4c5b2;">"${esc(movie.tagline || '')}"</p>

            function playAudioTrailer(movie) {
                speechSynthesis.cancel();
                if (movie.trailerScript && movie.trailerImages && movie.trailerImages.length >= movie.trailerScript
                    .length) {
                    startAudioTrailerPlayback(movie);
                    return;
                }
                const modalContent = document.getElementById('genericModalContent');
                modalContent.innerHTML = `
            <div class="please-stand-by" style="text-align:center; padding:20px;">
                <div style="font-family:'VT323'; font-size:24px; color:#c41e3a; letter-spacing:4px;">SIGNAL INTERRUPTED</div>

                document.getElementById('genericModal').style.display = 'flex';

                function loadImagesRecursive(script, index, collected, callback) {
                    if (index >= script.length) { callback(collected); return; }
                    document.getElementById('trailerStatusText').textContent =
                        `Developing scene ${index + 1} of ${script.length}…`;

                        if (loadBar) loadBar.style.width = Math.round((collected.length / script.length) *
                            100) + '%';
                        loadImagesRecursive(script, index + 1, collected, callback);
                    }, 20);
                }

                (async () => {
                    let script;
                    try {
                        script = await generateTrailerScript(movie);
                        movie.trailerScript = script;
                    } catch (e) {
                        const sentences = movie.synopsis.split(/[.!?]+/).filter(s => s.trim().length > 0);
                        script = [];
                        for (let i = 0; i < 3; i++) {
                            script.push({

                                    "Coming soon to Nightfalls Cinema...",
                                imagePrompt: `horror scene from ${movie.title}, 80s VHS style, dark`
