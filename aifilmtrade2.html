            async function generateTrailerScript(movie) {
                const prompt =
                    `Create a short 3-scene terrifying audio trailer for the 80s horror movie "${movie.title}". Genre: ${movie.genre}. Tagline: "${movie.tagline}". Synopsis: ${movie.synopsis}. Return a JSON array of 3 objects, each with "narration" (an ominous sentence to be spoken) and "imagePrompt" (a horror visual description for an image). JSON only.`;
                const resp = await mistralChat([{ role: 'user', content: prompt }], 500);
                return JSON.parse(resp.replace(/```json|```/g, '').trim());
            }

            function startAudioTrailerPlayback(movie) {
                const scenes = movie.trailerScript;
                const images = movie.trailerImages;
                let currentScene = 0;
                let projectorNodes = null;
                let isPaused = false;
                let projectorAudioCtx = null;

                const modalContent = document.getElementById('genericModalContent');
                modalContent.innerHTML = `
            <div class="trailer-theater trailer-projector-flicker" style="position:relative;">
                <div class="trailer-curtain-top"></div>
                <div class="trailer-curtain-bottom"></div>
                <div class="trailer-screen-vignette"></div>
                <div class="trailer-film-grain"></div>
                <div id="trailerImgContainer" style="position:relative; z-index:1;">
                    <img id="trailerImg" class="trailer-scene-img" src="${images[0]}" alt="" style="width:100%; max-height:50vh; object-fit:contain; display:block;">
                </div>
                <div style="position:relative; z-index:4; padding:12px; background:linear-gradient(180deg, transparent, rgba(0,0,0,0.85));">
                    <p id="trailerSub" style="color:#e8c5b0; font-size:17px; min-height:2.5em; margin:0 0 8px; transition: opacity 0.3s, transform 0.3s;"></p>
                    <div class="trailer-scene-dots" id="trailerDots">
                        ${scenes.map((_, i) => `<span class="trailer-scene-dot ${i===0?'active':''}"></span>`).join('')}
                    </div>
                    <small style="color:#7a6a6a;">Scene <span id="trailerNum">1</span>/${scenes.length}</small>
                </div>
                <div style="text-align:center; padding:8px; position:relative; z-index:4; display:flex;gap:6px;flex-wrap:wrap;justify-content:center;">
                    <button class="btn" id="trailerPause">⏯️ Pause</button>
                    <button class="btn" id="trailerSkip">⏭ Skip</button>
                    <button class="modal-btn" id="trailerClose">✕ Close</button>
                </div>
            </div>`;
                document.getElementById('genericModal').style.display = 'flex';

                function startProjectorHum() {
                    projectorAudioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    const osc = projectorAudioCtx.createOscillator();
                    const gain = projectorAudioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.value = 55;
                    const lfo = projectorAudioCtx.createOscillator();
                    const lfoGain = projectorAudioCtx.createGain();
                    lfo.frequency.value = 8;
                    lfoGain.gain.value = 3;
                    lfo.connect(lfoGain);
                    lfoGain.connect(osc.frequency);
                    gain.gain.value = 0.02;
                    osc.connect(gain);
                    gain.connect(projectorAudioCtx.destination);
                    osc.start();
                    lfo.start();
                    return { osc, lfo, gain };
                }

                function stopProjectorHum(nodes) {
                    if (nodes) { nodes.osc.stop();
                        nodes.lfo.stop(); }
                    if (projectorAudioCtx) { projectorAudioCtx.close();
                        projectorAudioCtx = null; }
                }

                projectorNodes = startProjectorHum();

                function getVoice() {
                    const voices = speechSynthesis.getVoices();
                    return voices.find(v => v.name.includes('Google UK English Male') || v.name.includes('Daniel') || v
                        .lang.startsWith('en')) || voices[0];
                }

                function showEndCard(movie) {
                    const mc = document.getElementById('genericModalContent');
                    mc.innerHTML = `
                <div class="trailer-end-card" style="text-align:center;">
                    <div style="font-size:40px;">🔪</div>
                    <h2 style="font-family:var(--font-display); color:#e8c5b0;">${esc(movie.title)}</h2>
                    <p style="color:#c41e3a;font-size:17px;">"${esc(movie.tagline || '')}"</p>
                    <div class="star-rating" style="font-size:24px;">${'💀'.repeat(movie.quality)}${'🦴'.repeat(5 - movie.quality)}</div>
                    <p style="color:#d4c5b2; margin-top:12px;font-size:16px;">NOW SCREAMING AT NIGHTFALLS CINEMA</p>
                    <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
                        <button class="btn accent" id="selectFromTrailer">🔪 Add to Tonight</button>
                        <button class="modal-btn" onclick="closeModal()">Close</button>
                    </div>
                </div>`;
                    document.getElementById('selectFromTrailer').onclick = () => {
                        selectForTonight(movie.id);
                        closeModal();
                        switchTab('overview');
                    };
                }

                function playScene(index) {
                    if (index >= scenes.length) {
                        stopProjectorHum(projectorNodes);
                        showEndCard(movie);
                        return;
                    }
                    const img = document.getElementById('trailerImg');
                    if (img && index > 0) img.classList.add('fading-out');
                    setTimeout(() => {
                        if (img) {
                            img.src = images[index] || '';
                            img.classList.remove('fading-out');
                        }
                        const sub = document.getElementById('trailerSub');
                        if (sub) {
                            sub.style.opacity = '0';
                            sub.style.transform = 'translateY(8px)';
                            setTimeout(() => {
                                sub.textContent = scenes[index].narration;
                                sub.style.opacity = '1';
                                sub.style.transform = 'translateY(0)';
                            }, 150);
                        }
                        document.querySelectorAll('.trailer-scene-dot').forEach((dot, i) => {
                            dot.classList.remove('active', 'done');
                            if (i < index) dot.classList.add('done');
                            if (i === index) dot.classList.add('active');
                        });
                        document.getElementById('trailerNum').textContent = index + 1;

                        if (!isPaused) {
                            const utterance = new SpeechSynthesisUtterance(scenes[index].narration);
                            utterance.voice = getVoice();
                            utterance.rate = 0.85;
                            utterance.pitch = 1.0;
                            utterance.onend = () => {
                                currentScene++;
                                if (currentScene < scenes.length) setTimeout(() => playScene(currentScene),
                                    500);
                                else {
                                    stopProjectorHum(projectorNodes);
                                    showEndCard(movie);
                                }
                            };
                            speechSynthesis.speak(utterance);
                        }
                    }, 400);
                }

                playScene(0);

                document.getElementById('trailerPause').onclick = () => {
                    isPaused = !isPaused;
                    document.getElementById('trailerPause').textContent = isPaused ? '▶️ Play' : '⏯️ Pause';
                    if (isPaused) speechSynthesis.pause();
                    else speechSynthesis.resume();
                };
                document.getElementById('trailerSkip').onclick = () => {
                    speechSynthesis.cancel();
                    stopProjectorHum(projectorNodes);
                    showEndCard(movie);
                };
                document.getElementById('trailerClose').onclick = () => {
                    speechSynthesis.cancel();
                    stopProjectorHum(projectorNodes);
                    closeModal();
                };

                const origClose = closeModal;
                closeModal = function() {
                    speechSynthesis.cancel();
                    stopProjectorHum(projectorNodes);
                    origClose();
                };
            }

            function renderFranchises() {
                const panel = document.getElementById('franchisesPanel');
                const data = getSeriesData();
                const names = Object.keys(data).sort((a, b) => calcFranchiseValue(data[b]) - calcFranchiseValue(data[a]));
                if (!names.length) { panel.innerHTML =
                        '<div class="empty-state">No horror franchises yet. Build a legacy of terror.</div>'; return; }
                let html =
                    '<p style="color:#e8c5b0;text-align:center;font-family:var(--font-display);font-size:20px;">📼 FRANCHISE PORTFOLIO</p>';
                names.forEach(name => {
                    const s = data[name];
                    const val = calcFranchiseValue(s);
                    html +=
                        `<div style="background:#0e0e16;border:1px solid #1a1520;border-radius:4px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;"><div style="flex:1;min-width:0;"><div style="color:#e8c5b0;font-family:var(--font-display);font-size:16px;">${esc(name)}</div><div style="font-size:12px;color:#7a6a6a;">${s.movies.length} films · Avg 💀${s.avgQuality} · Peak ${s.peakAttendance} cars</div></div><div style="text-align:right;flex-shrink:0;"><div style="color:#e8c5b0;font-size:20px;">$${val}</div><button class="btn danger sell-btn" data-name="${esc(name)}" style="min-height:38px;font-size:14px;">💰 SELL</button></div></div>`;
                });
                panel.innerHTML = html;
                panel.querySelectorAll('.sell-btn').forEach(b => b.addEventListener('click', () => {
                    const name = b.dataset.name;
                    const val = calcFranchiseValue(data[name]);
                    showModal(
                        `<h2>💸 Sell "${esc(name)}"?</h2><p style="font-size:18px;">You'll gain $${val}.</p><button class="modal-btn" id="confirmSell">CONFIRM</button><button class="modal-btn" onclick="closeModal()">CANCEL</button>`
                        );
                    document.getElementById('confirmSell').onclick = () => { sellFranchise(name);
                        closeModal(); };
                }));
            }

            function renderUpgrades() {
                const panel = document.getElementById('upgradesPanel');
                let html =
                    '<p style="color:#e8c5b0;text-align:center;font-family:var(--font-display);font-size:20px;">🔧 LOT UPGRADES</p>';
                upgradeDefs.forEach(def => {
                    const lvl = gameState.upgrades[def.id];
                    const cost = lvl < def.costs.length - 1 ? def.costs[lvl + 1] : null;
                    html +=
                        `<div class="upgrade-item"><div class="upgrade-info"><div class="upgrade-name">${def.name}</div><div class="upgrade-desc">${def.levels[lvl]}</div><div class="upgrade-level">Level ${lvl+1}/${def.levels.length}</div></div><button class="btn ${cost?'accent':''}" data-upg="${def.id}" ${!cost||gameState.cash<cost?'disabled':''}>${cost?'💲'+cost:'MAXED'}</button></div>`;
                });
                panel.innerHTML = html;
                panel.querySelectorAll('[data-upg]').forEach(b => b.addEventListener('click', () => {
                    const id = b.dataset.upg;
                    const def = upgradeDefs.find(u => u.id === id);
                    const cost = def.costs[gameState.upgrades[id] + 1];
                    if (gameState.cash >= cost) { gameState.cash -= cost;
                        gameState.upgrades[id]++;
                        saveState();
                        refreshAll();
                        flashFooter('🔧 Upgraded ' + def.name); } else showModal(
                        '<h2>💸 Not Enough Cash</h2><button class="modal-btn" onclick="closeModal()">OK</button>');
                }));
            }

            function renderHistory() {
                const panel = document.getElementById('historyPanel');
                if (!gameState.history.length) { panel.innerHTML =
                        '<div class="empty-state">No history yet. The horror awaits...</div>'; return; }
                panel.innerHTML = gameState.history.slice(0, 15).map(h => `
            <div style="background:#0e0e16;border:1px solid #1a1520;border-radius:4px;padding:12px;margin-bottom:8px;">
                <strong style="color:#e8c5b0;font-size:16px;">Night ${h.day}</strong> 🚗${h.cars} 💰$${h.revenue} 💀${h.repChange>=0?'+':''}${h.repChange}
                <div style="font-size:12px;color:#7a6a6a;">${h.movies.map(m=>esc(m.title)+' ('+m.quality+'💀)').join(' + ')}</div>
                ${h.event?`<div style="font-size:11px;color:#c41e3a;">⚠️ ${esc(h.event.title)}</div>`:''}
                ${h.bonusLog?h.bonusLog.map(b=>`<div style="font-size:11px;color:#e8a090;">${b}</div>`).join(''):''}
                ${h.reactions?h.reactions.slice(0,2).map(r=>`<div style="font-size:11px;color:#9a8a80;">"${esc(r)}"</div>`).join(''):''}
            </div>`).join('');
            }

            function updateStats() {
                document.getElementById('statCash').textContent = '$' + gameState.cash;
                document.getElementById('statRep').textContent = gameState.reputation;
                document.getElementById('statDay').textContent = gameState.day;
                document.getElementById('statCars').textContent = gameState.lastNightCars || 0;
                const hasTwo = gameState.tonightDoubleFeature.length === 2;
                const titleEl = document.getElementById('marqueeTitle');
                titleEl.innerHTML = hasTwo ? gameState.tonightDoubleFeature.map(m => m.title).join(' · ') +
                    '<span class="blinking-cursor"></span>' :
                    'NIGHTFALLS CINEMA<span class="blinking-cursor"></span>';
                document.getElementById('marqueeFeatures').textContent = hasTwo ? 'MIDNIGHT DOUBLE FEATURE' :
                    'NOW SCREAMING SOON';
            }

            function refreshAll() { updateStats();
                const tab = document.querySelector('.tab-btn.active')?.dataset.tab || 'overview';
                switchTab(tab); }

            function switchTab(tab) {
                document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                const tabBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
                if (tabBtn) tabBtn.classList.add('active');
                const panel = document.getElementById(tab + 'Panel');
                if (panel) panel.classList.add('active');
                if (tab === 'overview') renderOverview();
                else if (tab === 'movies') renderMovies();
                else if (tab === 'franchises') renderFranchises();
                else if (tab === 'upgrades') renderUpgrades();
                else if (tab === 'history') renderHistory();
            }

            loadState();
            refreshAll();
            setFooter(apiKey ? '🩸 NIGHTFALLS CINEMA · 1985' : '⚠️ Set API key');
            document.querySelectorAll('.tab-btn').forEach(t => t.addEventListener('click', () => switchTab(t.dataset
            .tab)));
            document.getElementById('resetApiBtn').onclick = () => {
                const key = prompt('Enter your Mistral API key:');
                if (key && key.length > 10) { apiKey = key;
                    localStorage.setItem('nightfalls_api_key', key);
                    setFooter('✅ API Key saved!'); }
            };
            if (!apiKey) setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
        })();
    </script>
</body>
</html>
