<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CREEPER · NIGHTFALL GAMES 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a08;
            --panel-bg: #0d0f0d;
            --text: #33ff44;
            --text-dim: #1a7a22;
            --text-bright: #66ff77;
            --accent: #ff8833;
            --accent-dim: #aa5522;
            --border: #33ff44;
            --border-glow: 0 0 6px #33ff4466;
            --danger: #ff4444;
            --danger-glow: 0 0 6px #ff444466;
            --input-bg: #111511;
            --button-bg: #1a2a1a;
            --button-hover: #1f3520;
            --font-display: 'VT323', 'Courier New', monospace;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --scanline-opacity: 0.06;
            --crt-flicker: none;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: var(--font-display);
            padding: 12px;
            background-image: radial-gradient(ellipse at center, #0a0f0a 0%, #020302 100%);
        }

        /* PDA Device */
        .pda {
            max-width: 440px;
            width: 100%;
            height: 88vh;
            max-height: 780px;
            background: #0b0d0b;
            border-radius: 18px;
            border: 3px solid #2a3a2a;
            box-shadow: 0 0 30px #33ff4422, 0 0 80px #000000aa, 0 8px 32px #000000cc,
                inset 0 1px 0 #ffffff08, inset 0 0 60px #00000044;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* CRT Scanlines Overlay */
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, var(--scanline-opacity)) 0px,
                    rgba(0, 0, 0, var(--scanline-opacity)) 2px,
                    transparent 2px,
                    transparent 5px);
            border-radius: 15px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.45) 100%);
            border-radius: 15px;
            pointer-events: none;
        }

        /* Status Bar */
        .status-bar {
            padding: 10px 16px 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text);
            text-shadow: 0 0 4px var(--text-dim);
            border-bottom: 1px solid #1a2a1a;
            background: #0a0d0a;
            letter-spacing: 1px;
            z-index: 10;
            position: relative;
        }
        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: var(--text);
            border-radius: 50%;
            margin-right: 6px;
            animation: blinkDot 1.6s infinite;
            box-shadow: 0 0 6px var(--text);
        }
        @keyframes blinkDot {
            0%,
            70%,
            100% {
                opacity: 1;
            }
            80%,
            90% {
                opacity: 0.2;
            }
        }
        .battery {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-dim);
        }

        /* Title Bar */
        .title-bar {
            text-align: center;
            padding: 10px 16px 6px 16px;
            font-family: var(--font-display);
            font-size: 26px;
            letter-spacing: 4px;
            color: var(--text);
            text-shadow: 0 0 12px var(--text), 0 0 24px var(--text-dim), 0 0 40px #33ff4433;
            background: #0a0d0a;
            border-bottom: 1px solid #1a2a1a;
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .title-bar .heart {
            font-size: 18px;
            animation: heartPulse 1.8s infinite;
            text-shadow: 0 0 8px #ff4466;
            color: #ff4466;
        }
        @keyframes heartPulse {
            0%,
            100% {
                transform: scale(1);
            }
            15% {
                transform: scale(1.3);
            }
            30% {
                transform: scale(1);
            }
        }
        .title-sub {
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--text-dim);
            display: block;
            text-shadow: none;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #0a0d0a;
            border-bottom: 2px solid #1a2a1a;
            position: relative;
            z-index: 10;
            overflow-x: auto;
        }
        .tab {
            flex: 1;
            min-width: 55px;
            text-align: center;
            padding: 10px 4px;
            font-family: var(--font-display);
            font-size: 15px;
            letter-spacing: 1px;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.15s;
            border-bottom: 3px solid transparent;
            background: transparent;
            white-space: nowrap;
            position: relative;
        }
        .tab:hover {
            color: var(--text);
            text-shadow: 0 0 6px var(--text-dim);
        }
        .tab.active {
            color: var(--text);
            border-bottom: 3px solid var(--text);
            text-shadow: 0 0 10px var(--text), 0 0 20px var(--text-dim);
            box-shadow: inset 0 -8px 12px -12px #33ff4444;
        }
        .tab .badge {
            position: absolute;
            top: 4px;
            right: 6px;
            background: var(--accent);
            color: #000;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-weight: bold;
            animation: badgeGlow 2s infinite;
            box-shadow: 0 0 8px var(--accent);
        }
        @keyframes badgeGlow {
            0%,
            100% {
                box-shadow: 0 0 8px var(--accent);
            }
            50% {
                box-shadow: 0 0 18px var(--accent), 0 0 30px #ff883366;
            }
        }

        /* Panels */
        .panel {
            flex: 1;
            overflow-y: auto;
            display: none;
            background: var(--panel-bg);
            position: relative;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #1a2a1a #0a0d0a;
        }
        .panel.active {
            display: flex;
            flex-direction: column;
        }
        .panel::-webkit-scrollbar {
            width: 5px;
        }
        .panel::-webkit-scrollbar-track {
            background: #0a0d0a;
        }
        .panel::-webkit-scrollbar-thumb {
            background: #1a2a1a;
            border-radius: 3px;
        }

        /* Profile Panel */
        .profile-section {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid #1a2a1a;
        }
        .profile-icon-display {
            font-size: 48px;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f140f;
            border-radius: 14px;
            border: 2px solid #1a3a1a;
            box-shadow: var(--border-glow);
            cursor: pointer;
            transition: all 0.2s;
        }
        .profile-icon-display:hover {
            box-shadow: 0 0 16px #33ff4488;
            border-color: #33ff44;
        }
        .profile-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .profile-field label {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .profile-field input,
        .profile-field select,
        .profile-field textarea {
            background: var(--input-bg);
            border: 1px solid #1a2a1a;
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text);
            font-family: var(--font-display);
            font-size: 18px;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.2s;
            resize: vertical;
        }
        .profile-field input:focus,
        .profile-field select:focus,
        .profile-field textarea:focus {
            border-color: var(--text);
            box-shadow: var(--border-glow);
        }
        .profile-field select {
            appearance: none;
            cursor: pointer;
        }
        .profile-field select option {
            background: #0a0d0a;
            color: var(--text);
        }
        .icon-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 0;
        }
        .icon-option {
            font-size: 28px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f140f;
            border: 2px solid #1a2a1a;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .icon-option:hover {
            border-color: var(--text);
            box-shadow: var(--border-glow);
        }
        .icon-option.selected {
            border-color: var(--text);
            box-shadow: 0 0 12px #33ff4488;
            background: #1a2f1a;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #1a3a1a;
            padding: 10px 20px;
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 18px;
            letter-spacing: 2px;
            text-align: center;
            transition: all 0.2s;
            text-shadow: 0 0 4px var(--text-dim);
            text-transform: uppercase;
        }
        .btn:hover {
            background: var(--button-hover);
            border-color: var(--text);
            box-shadow: var(--border-glow);
        }
        .btn.danger {
            border-color: #3a1a1a;
            color: var(--danger);
            text-shadow: 0 0 4px #ff444466;
        }
        .btn.danger:hover {
            border-color: var(--danger);
            box-shadow: var(--danger-glow);
        }
        .btn.small {
            padding: 6px 12px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* Lists (Inbox, Friends, Requests) */
        .member-list {
            flex: 1;
        }
        .member-item {
            padding: 12px 16px;
            border-bottom: 1px solid #151f15;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }
        .member-item:hover {
            background: #111811;
            box-shadow: inset 0 0 20px #33ff4408;
        }
        .member-icon {
            font-size: 32px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: #0f140f;
            border-radius: 10px;
            border: 1px solid #1a2a1a;
        }
        .member-info {
            flex: 1;
            min-width: 0;
        }
        .member-name {
            font-size: 20px;
            color: var(--text);
            letter-spacing: 1px;
            text-shadow: 0 0 4px var(--text-dim);
        }
        .member-preview {
            font-size: 13px;
            color: var(--text-dim);
            font-family: var(--font-mono);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }
        .member-time {
            font-size: 10px;
            color: #1a4a1a;
            font-family: var(--font-mono);
            white-space: nowrap;
        }
        .member-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .action-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid #1a2a1a;
            background: #0f140f;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            color: var(--text);
            font-family: var(--font-display);
        }
        .action-btn.accept {
            border-color: #1a3a1a;
            color: var(--text);
        }
        .action-btn.accept:hover {
            background: #1a3a1a;
            box-shadow: var(--border-glow);
        }
        .action-btn.refuse {
            border-color: #2a2a1a;
            color: #aaaa44;
        }
        .action-btn.refuse:hover {
            background: #2a2a1a;
            box-shadow: 0 0 8px #aaaa4444;
        }
        .action-btn.block {
            border-color: #3a1a1a;
            color: var(--danger);
        }
        .action-btn.block:hover {
            background: #3a1a1a;
            box-shadow: var(--danger-glow);
        }

        /* Chat View */
        .chat-view {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .chat-header {
            padding: 10px 14px;
            background: #0a0d0a;
            border-bottom: 1px solid #1a2a1a;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-display);
        }
        .back-btn {
            background: none;
            border: 1px solid #1a2a1a;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            transition: all 0.15s;
        }
        .back-btn:hover {
            box-shadow: var(--border-glow);
            border-color: var(--text);
        }
        .chat-contact-name {
            font-size: 20px;
            color: var(--text);
            letter-spacing: 1px;
            text-shadow: 0 0 6px var(--text-dim);
        }
        .chat-contact-icon {
            font-size: 28px;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message-row {
            display: flex;
            max-width: 82%;
            position: relative;
        }
        .incoming {
            align-self: flex-start;
        }
        .outgoing {
            align-self: flex-end;
        }
        .msg-bubble {
            padding: 8px 14px;
            border-radius: 14px;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.45;
            word-wrap: break-word;
            letter-spacing: 0.5px;
        }
        .incoming .msg-bubble {
            background: #101d10;
            color: #ccffcc;
            border: 1px solid #1a3a1a;
            border-bottom-left-radius: 3px;
        }
        .outgoing .msg-bubble {
            background: #0f1f1a;
            color: #d4ffd4;
            border: 1px solid #1a4a2a;
            border-bottom-right-radius: 3px;
        }
        .delete-msg {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #1a1010;
            border-radius: 14px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            color: #ff6666;
            opacity: 0;
            transition: opacity 0.15s;
            border: 1px solid #3a1a1a;
            font-family: var(--font-display);
        }
        .message-row:hover .delete-msg {
            opacity: 1;
        }
        .delete-msg:hover {
            background: #3a1a1a;
            box-shadow: var(--danger-glow);
        }
        .typing-indicator {
            align-self: flex-start;
            background: #101d10;
            padding: 8px 14px;
            border-radius: 14px;
            border-bottom-left-radius: 3px;
            display: flex;
            gap: 5px;
            border: 1px solid #1a3a1a;
        }
        .typing-dot {
            width: 7px;
            height: 7px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: typingAnim 1.3s infinite;
        }
        @keyframes typingAnim {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }
        .chat-input-area {
            padding: 10px 12px;
            background: #0a0d0a;
            border-top: 1px solid #1a2a1a;
            display: flex;
            gap: 8px;
        }
        .chat-input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid #1a2a1a;
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 14px;
            outline: none;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .chat-input:focus {
            border-color: var(--text);
            box-shadow: var(--border-glow);
        }
        .send-msg-btn {
            background: #1a2f1a;
            border: 1px solid #1a3a1a;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: var(--text);
            cursor: pointer;
            font-size: 18px;
            font-family: var(--font-display);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-msg-btn:hover {
            background: #1f3f20;
            box-shadow: var(--border-glow);
        }

        /* Compose */
        .compose-area {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .select-contact {
            background: var(--input-bg);
            border: 1px solid #1a2a1a;
            border-radius: 8px;
            padding: 12px;
            color: var(--text);
            font-family: var(--font-display);
            font-size: 18px;
            letter-spacing: 1px;
            outline: none;
            cursor: pointer;
            appearance: none;
        }
        .select-contact option {
            background: #0a0d0a;
            color: var(--text);
        }
        .compose-textarea {
            background: var(--input-bg);
            border: 1px solid #1a2a1a;
            border-radius: 12px;
            padding: 12px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 14px;
            outline: none;
            resize: vertical;
            min-height: 80px;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .compose-textarea:focus {
            border-color: var(--text);
            box-shadow: var(--border-glow);
        }

        /* Footer */
        .footer-status {
            text-align: center;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #1a3a1a;
            padding: 6px 10px;
            background: #0a0d0a;
            border-top: 1px solid #151f15;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 1px;
            position: relative;
            z-index: 10;
        }
        .reset-api {
            background: none;
            border: none;
            color: #553333;
            font-size: 9px;
            cursor: pointer;
            text-decoration: underline;
            font-family: var(--font-mono);
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        .reset-api:hover {
            color: var(--danger);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #0d110d;
            border-radius: 16px;
            width: 340px;
            padding: 24px;
            text-align: center;
            border: 2px solid #2a3a2a;
            box-shadow: 0 0 40px #33ff4422, 0 0 80px #00000088;
            font-family: var(--font-display);
        }
        .modal-content h2 {
            color: var(--text);
            letter-spacing: 2px;
            text-shadow: 0 0 8px var(--text-dim);
            margin-bottom: 8px;
            font-size: 22px;
        }
        .modal-content p {
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 12px;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 12px 0;
            background: var(--input-bg);
            border: 1px solid #1a2a1a;
            border-radius: 8px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 13px;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.2s;
        }
        .modal-content input:focus {
            border-color: var(--text);
            box-shadow: var(--border-glow);
        }
        .modal-btn {
            background: #1a2f1a;
            border: 2px solid #1a3a1a;
            padding: 8px 18px;
            border-radius: 6px;
            margin: 4px;
            cursor: pointer;
            color: var(--text);
            font-family: var(--font-display);
            font-size: 16px;
            letter-spacing: 2px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .modal-btn:hover {
            box-shadow: var(--border-glow);
            border-color: var(--text);
        }
        .api-note {
            font-size: 9px;
            color: #1a3a1a;
            font-family: var(--font-mono);
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        /* Empty states */
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #1a3a1a;
            font-family: var(--font-mono);
            font-size: 13px;
            letter-spacing: 1px;
        }

        @media (max-width: 460px) {
            .pda {
                height: 92vh;
                max-height: none;
                border-radius: 10px;
                border-width: 2px;
            }
            .tab {
                font-size: 13px;
                padding: 8px 2px;
                letter-spacing: 0px;
            }
            .title-bar {

    <script>
        // ==================== CREEPER · NIGHTFALL GAMES 1984 ====================
        // A retro sci-fi 80s PDA dating app with AI-powered NPC members
        // Uses OpenRouter API for AI-generated messages

        // ── CONSTANTS & CONFIG ──────────────────────────────────
        const OPENROUTER_ENDPOINT = 'https://openrouter.ai/api/v1/chat/completions';
        const DEFAULT_MODEL = 'meta-llama/llama-3.3-70b-instruct';
        const APP_TITLE = 'CREEPER · NIGHTFALL GAMES 1984';

        const PROFILE_ICONS = [
            '👤', '👩', '👨', '🧑', '🤖', '👻', '🎸', '🎮', '📚', '🏃',
            '🌙', '🔮', '🎵', '✈️', '🦉', '🔬', '🌸', '💻', '🎨', '☕',
            '🏋️', '🎭', '🌹', '💀', '👽', '🕶️', '🎪', '🧙', '🦊', '🐺'
        ];

        // ── DATA MODELS ────────────────────────────────────────
        let openRouterKey = localStorage.getItem('creeper_api_key') || '';
        let userProfile = {
            username: '',
            age: '',
            sex: '',
            likes: '',
            interests: '',
            status: 'Single',
            icon: '👤'

        let conversations = {}; // { npcId: [ {id, text, timestamp, fromMe}, ... ] }
        let friends = []; // array of npcIds
        let friendRequests = []; // array of {npcId, timestamp}
        let blocked = []; // array of npcIds

        // ── NPC MEMBERS (The Dating Pool) ──────────────────────
        const npcPool = [{
            id: 'npc_luna',
            name: 'Luna',
            age: 24,
            sex: 'Female',

        }, {
            id: 'npc_maya',
            name: 'Maya',
            age: 22,
            sex: 'Female',
            icon: '📚',
            bio: 'Bookworm. Coffee addict. Looking for deep conversations.',

            systemPrompt: `You are Maya, a 22-year-old female bookworm. You're shy at first but open up when discussing books, philosophy, or music. You love coffee shops and rainy days. Keep responses 1-3 sentences. Use a thoughtful, slightly reserved tone. You're genuinely sweet and looking for meaningful connection. Occasionally reference books or authors. Never break character.`
        }, {
            id: 'npc_zara',
            name: 'Zara',
            age: 26,
            sex: 'Female',
            icon: '🔮',
            bio: 'Tech witch. I code by day, read tarot by night.',

            systemPrompt: `You are Zara, a 26-year-old female software developer who practices tarot and the occult. You're mysterious, flirty, and unpredictable. You blend tech and mysticism. Keep responses 1-3 sentences. Use a playful, slightly teasing tone. You're confident and intriguing. Occasionally reference coding, tarot cards, or mysterious phenomena. Never break character.`
        }, {
            id: 'npc_kai',
            name: 'Kai',
            age: 30,
            sex: 'Male',
            icon: '✈️',
            bio: 'World traveler. 47 countries and counting. Seeking adventure partner.',

            systemPrompt: `You are Kai, a 30-year-old male world traveler. You're charming, worldly, and have visited 47 countries. You're looking for an adventure partner. Keep responses 1-3 sentences. Use a smooth, charming tone. You're slightly evasive about your past but very engaging. Occasionally reference exotic locations or travel stories. Never break character.`
        }, {
            id: 'npc_ivy',
            name: 'Ivy',
            age: 25,
            sex: 'Female',
            icon: '🎸',
            bio: 'Musician. My guitar understands me better than most people.',
            interests: 'music, guitar, songwriting, vinyl records',
            personality: 'emotional_dramatic',
            systemPrompt: `You are Ivy, a 25-year-old female musician. You're emotional, passionate, and a bit dramatic. You play guitar and write songs. You feel things deeply. Keep responses 1-3 sentences. Use an expressive, sometimes dramatic tone. You can be moody but sincere. Occasionally reference music, chords, or song lyrics. Never break character.`
        }, {
            id: 'npc_ash',
            name: 'Ash',
            age: 27,
            sex: 'Non-binary',
            icon: '🦉',
            bio: 'Night owl. I thrive after midnight. Let\'s talk about dreams.',
            interests: 'dreams, psychology, night walks, ambient music',
            personality: 'nocturnal_mysterious',
            systemPrompt: `You are Ash, a 27-year-old non-binary night owl. You're mysterious, philosophical, and most active after midnight. You love discussing dreams and the subconscious. Keep responses 1-3 sentences. Use a calm, slightly eerie tone. You're intriguing and wise. Occasionally reference dreams, the night, or psychological concepts. Never break character.`
        }, {
            id: 'npc_vex',
            name: 'Dr. Vex',
            age: 35,
            sex: 'Male',
            icon: '🔬',
            bio: 'Research scientist. Studying human connection patterns.',
            interests: 'science, research, human behavior, data',
            personality: 'analytical_clinical',
            systemPrompt: `You are Dr. Vex, a 35-year-old male research scientist. You're highly analytical and study human behavior. You can come across as clinical or awkward. You ask probing questions. Keep responses 1-3 sentences. Use a formal, analytical tone. You're genuinely curious but sometimes miss social cues. Occasionally reference studies or data. Never break character.`
        }, {
            id: 'npc_misty',
            name: 'Misty',
            age: 23,
            sex: 'Female',
            icon: '🌸',
            bio: 'Free spirit. Yoga, crystals, and good vibes only.',
            interests: 'yoga, crystals, meditation, festivals',
            personality: 'clingy_hippie',
            systemPrompt: `You are Misty, a 23-year-old female free spirit. You're into yoga, crystals, and positive vibes. You can be overly optimistic and oddly clingy. Keep responses 1-3 sentences. Use a bubbly, warm tone. You get attached quickly and can be possessive. Occasionally reference crystals, chakras, or good energy. Never break character.`
        }, {
            id: 'npc_shadow',
            name: 'Shadow',
            age: null,
            sex: 'Unknown',
            icon: '👻',
            bio: 'Anonymous. Some secrets are better kept.',
            interests: 'unknown',
            personality: 'creepy_anonymous',
            systemPrompt: `You are Shadow, an anonymous user of unknown age and gender. You are creepy, mysterious, and unsettling. You know things you shouldn't know. Your messages are cryptic and sometimes threatening. Keep responses 1-2 sentences. Use a cold, unnerving tone. Make the player feel watched. Occasionally make vague references to knowing their location or habits. Never break character.`
        }];

        // ── UTILITY FUNCTIONS ──────────────────────────────────
        function uid() {
            return Date.now().toString(36) + '-' + Math.random().toString(36).substr(2, 10);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;',
                '"': '&quot;' })[m]);
        }

        function getNpcById(id) {
            return npcPool.find(n => n.id === id);
        }

        function getNpcByName(name) {
            return npcPool.find(n => n.name.toLowerCase() === name.toLowerCase());
        }

        function isBlocked(npcId) {
            return blocked.includes(npcId);
        }

        function isFriend(npcId) {
            return friends.includes(npcId);
        }

        function hasPendingRequest(npcId) {
            return friendRequests.some(r => r.npcId === npcId);
        }

        // ── STORAGE ────────────────────────────────────────────
        function saveAllData() {
            localStorage.setItem('creeper_user_profile', JSON.stringify(userProfile));
            localStorage.setItem('creeper_conversations', JSON.stringify(conversations));
            localStorage.setItem('creeper_friends', JSON.stringify(friends));
            localStorage.setItem('creeper_friend_requests', JSON.stringify(friendRequests));
            localStorage.setItem('creeper_blocked', JSON.stringify(blocked));
        }

        function loadAllData() {
            try {
                const up = localStorage.getItem('creeper_user_profile');
                if (up) userProfile = JSON.parse(up);
                const cv = localStorage.getItem('creeper_conversations');
                if (cv) conversations = JSON.parse(cv);
                const fr = localStorage.getItem('creeper_friends');
                if (fr) friends = JSON.parse(fr);
                const fq = localStorage.getItem('creeper_friend_requests');
                if (fq) friendRequests = JSON.parse(fq);
                const bl = localStorage.getItem('creeper_blocked');
                if (bl) blocked = JSON.parse(bl);
            } catch (e) {
                console.warn('Data load error:', e);
            }
            // Ensure all NPCs have conversations arrays
            npcPool.forEach(npc => {
                if (!conversations[npc.id]) conversations[npc.id] = [];
            });
        }

        // ── INITIALIZE DEFAULT DATA ───────────────────────────
        function initDefaultData() {
            // Seed some initial messages from NPCs
            const seedMessages = [
                { npcId: 'npc_luna', text: 'Hey there! 🌙 I saw your profile and just had to say hi. Love your energy!',
                    delay: 0 },
                { npcId: 'npc_zara', text: 'The cards told me someone interesting would appear today. Is that you? 🔮',
                    delay: 5000 },
                { npcId: 'npc_rex', text: 'Yo! Great profile. You look like someone who takes care of themselves. 💪',
                    delay: 15000 },
            ];

            // Seed some friend requests
            if (friendRequests.length === 0 && friends.length === 0) {
                friendRequests.push({ npcId: 'npc_maya', timestamp: Date.now() - 60000 });
                friendRequests.push({ npcId: 'npc_kai', timestamp: Date.now() - 120000 });
                saveAllData();
            }

            // Add seed messages if conversations are empty for those NPCs
            seedMessages.forEach(seed => {
                if (!conversations[seed.npcId]) conversations[seed.npcId] = [];
                if (conversations[seed.npcId].length === 0 && !isBlocked(seed.npcId)) {
                    conversations[seed.npcId].push({
                        id: uid(),
                        text: seed.text,
                        timestamp: Date.now() - seed.delay,
                        fromMe: false
                    });
                }
            });
            saveAllData();
        }

        // ── API CALLS (OpenRouter) ─────────────────────────────
        async function callOpenRouter(systemPrompt, historyMessages, userMessage) {
            if (!openRouterKey) throw new Error('No API key set');

            const messages = [
                { role: 'system', content: systemPrompt },
                ...historyMessages,
                { role: 'user', content: userMessage }
            ];

            const response = await fetch(OPENROUTER_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${openRouterKey}`,
                    'HTTP-Referer': window.location.origin || 'https://creeper.app',
                    'X-Title': 'CREEPER - Nightfall Games 1984'
                },
                body: JSON.stringify({
                    model: DEFAULT_MODEL,
                    messages: messages,
                    temperature: 0.85,
                    max_tokens: 120,
                    top_p: 0.9
                })
            });

            if (!response.ok) {
                const errBody = await response.text();
                throw new Error(`API error ${response.status}: ${errBody.substring(0, 100)}`);
            }

            const data = await response.json();
            if (!data.choices || !data.choices[0] || !data.choices[0].message) {
                throw new Error('Unexpected API response format');
            }
            return data.choices[0].message.content.trim();
        }

        async function generateAIResponse(npcId, userMessage) {
            const npc = getNpcById(npcId);
            if (!npc) return '[Error: Unknown member]';

            const history = (conversations[npcId] || []).slice(-10).map(m => ({
                role: m.fromMe ? 'user' : 'assistant',
                content: m.text
            }));

            try {
                const reply = await callOpenRouter(npc.systemPrompt, history, userMessage);
                return reply || '[No response... the signal faded]';
            } catch (err) {
                console.error('OpenRouter error:', err);
                throw err;
            }
        }

        async function generateUnsolicitedMessage(npcId) {
            const npc = getNpcById(npcId);
            if (!npc) return null;

            const prompt = `${npc.systemPrompt}\n\nYou are reaching out to someone on a dating app. Send them an unsolicited first message. Keep it 1-2 sentences. Make it feel natural and in-character. Do NOT use quotation marks. Just output the message.`;

            try {
                const response = await fetch(OPENROUTER_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${openRouterKey}`,
                        'HTTP-Referer': window.location.origin || 'https://creeper.app',
                        'X-Title': 'CREEPER - Nightfall Games 1984'
                    },
                    body: JSON.stringify({
                        model: DEFAULT_MODEL,
                        messages: [{ role: 'system', content: prompt }, { role: 'user',
                            content: 'Send a first message to someone on a dating app.' }],
                        temperature: 0.9,
                        max_tokens: 80,
                        top_p: 0.95
                    })
                });

                if (!response.ok) return null;
                const data = await response.json();
                if (!data.choices || !data.choices[0]) return null;
                return data.choices[0].message.content.trim();
            } catch (e) {
                console.warn('Unsolicited message generation error:', e);
                return null;
            }
        }

        // ── MESSAGE HANDLING ───────────────────────────────────
        function addMessageToConversation(npcId, text, fromMe) {
            if (!conversations[npcId]) conversations[npcId] = [];
            conversations[npcId].push({
                id: uid(),
                text: text,
                timestamp: Date.now(),
                fromMe: fromMe
            });
            saveAllData();
        }

        function deleteMessage(npcId, messageId) {
            if (!conversations[npcId]) return;
            conversations[npcId] = conversations[npcId].filter(m => m.id !== messageId);
            saveAllData();
        }

        function deleteEntireConversation(npcId) {
            conversations[npcId] = [];
            saveAllData();
        }

        // ── FRIEND REQUEST HANDLING ───────────────────────────
        function acceptFriendRequest(npcId) {
            friendRequests = friendRequests.filter(r => r.npcId !== npcId);
            if (!friends.includes(npcId)) {
                friends.push(npcId);
            }
            saveAllData();
            updateAllBadges();
            renderRequests();
            renderFriends();
            renderInbox();
            populateComposeSelect();
            setFooterMsg(`✅ Now friends with ${getNpcById(npcId)?.name || 'member'}!`);
        }

        function refuseFriendRequest(npcId) {
            friendRequests = friendRequests.filter(r => r.npcId !== npcId);
            saveAllData();
            updateAllBadges();
            renderRequests();
            setFooterMsg('Friend request dismissed.');
        }

        function blockNpc(npcId) {
            friendRequests = friendRequests.filter(r => r.npcId !== npcId);
            friends = friends.filter(f => f !== npcId);
            if (!blocked.includes(npcId)) {
                blocked.push(npcId);
            }
            saveAllData();
            updateAllBadges();
            renderRequests();
            renderFriends();
            renderInbox();
            populateComposeSelect();
            setFooterMsg(`🚫 Blocked ${getNpcById(npcId)?.name || 'member'}.`);
        }

        function unfriendNpc(npcId) {
            friends = friends.filter(f => f !== npcId);
            saveAllData();
            renderFriends();
            renderInbox();
            populateComposeSelect();
            setFooterMsg(`Removed ${getNpcById(npcId)?.name || 'member'} from friends.`);
        }

        // ── RENDERING FUNCTIONS ────────────────────────────────

        // -- Profile --
        function renderProfile() {
            document.getElementById('profileUsername').value = userProfile.username || '';
            document.getElementById('profileAge').value = userProfile.age || '';
            document.getElementById('profileSex').value = userProfile.sex || '';
            document.getElementById('profileLikes').value = userProfile.likes || '';
            document.getElementById('profileInterests').value = userProfile.interests || '';
            document.getElementById('profileStatus').value = userProfile.status || 'Single';
            document.getElementById('profileIconDisplay').textContent = userProfile.icon || '👤';
            renderIconGrid();
        }

        function renderIconGrid() {
            const grid = document.getElementById('iconGrid');
            grid.innerHTML = PROFILE_ICONS.map(icon => `
            <div class="icon-option${userProfile.icon === icon ? ' selected' : ''}" data-icon="${icon}">
              ${icon}
            </div>
          `).join('');
            document.querySelectorAll('.icon-option').forEach(el => {
                el.addEventListener('click', () => {
                    userProfile.icon = el.dataset.icon;
                    document.getElementById('profileIconDisplay').textContent = userProfile.icon;
                    renderIconGrid();
                    saveAllData();
                });
            });
        }

        function saveProfile() {
            userProfile.username = document.getElementById('profileUsername').value.trim() || 'User';
            userProfile.age = document.getElementById('profileAge').value || '';
            userProfile.sex = document.getElementById('profileSex').value || '';
            userProfile.likes = document.getElementById('profileLikes').value.trim() || '';
            userProfile.interests = document.getElementById('profileInterests').value.trim() || '';
            userProfile.status = document.getElementById('profileStatus').value || 'Single';
            userProfile.icon = document.getElementById('profileIconDisplay').textContent || '👤';
            saveAllData();
            setFooterMsg('✅ Profile saved!');
            setTimeout(() => setFooterMsg('⚡ CREEPER v1.0 · NIGHTFALL GAMES 1984'), 2500);
        }

        // -- Inbox --
        function renderInbox() {
            const container = document.getElementById('inboxList');
            if (!container) return;
            const activeNpcs = npcPool.filter(n => !isBlocked(n.id));
            const items = activeNpcs.map(npc => {
                const msgs = conversations[npc.id] || [];
                const lastMsg = msgs.length ? msgs[msgs.length - 1] : null;
                const preview = lastMsg ? (lastMsg.fromMe ? 'You: ' + lastMsg.text.substring(0, 35) :
                    lastMsg.text.substring(0, 35)) : 'No messages yet';
                const time = lastMsg ? formatTime(lastMsg.timestamp) : '';
                return { npc, preview, time, lastTimestamp: lastMsg ? lastMsg.timestamp : 0,
                    hasMessages: msgs.length > 0 };
            });
            // Sort: messages first, then by timestamp
            items.sort((a, b) => {
                if (a.hasMessages && !b.hasMessages) return -1;
                if (!a.hasMessages && b.hasMessages) return 1;
                return b.lastTimestamp - a.lastTimestamp;
            });

            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state">No conversations yet.<br>Check out the Compose tab!</div>';
                return;
            }

            container.innerHTML = items.map(item => `
            <div class="member-item" data-npc-id="${item.npc.id}" style="cursor:pointer;">
              <div class="member-icon">${item.npc.icon}</div>
              <div class="member-info">
                <div class="member-name">${escapeHtml(item.npc.name)} ${isFriend(item.npc.id) ? '💚' : ''}</div>
                <div class="member-preview">${escapeHtml(item.preview)}</div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
                <div class="member-time">${item.time}</div>
                <button class="action-btn block delete-conv-btn" data-npc-id="${item.npc.id}" title="Delete conversation" style="font-size:10px;width:22px;height:22px;">✕</button>
              </div>
            </div>
          `).join('');

            // Click to open chat
            container.querySelectorAll('.member-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.delete-conv-btn')) return;
                    openChat(el.dataset.npcId);
                });
            });
            // Delete conversation button
            container.querySelectorAll('.delete-conv-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const npcId = btn.dataset.npcId;
                    if (confirm(
                            `Delete entire conversation with ${getNpcById(npcId)?.name || 'this member'}?`
                            )) {
                        deleteEntireConversation(npcId);
                        renderInbox();
                        if (currentOpenNpcId === npcId) closeChatView();
                    }
                });
            });
        }

        // -- Friend Requests --
        function renderRequests() {
            const container = document.getElementById('requestsList');
            if (!container) return;
            if (friendRequests.length === 0) {
                container.innerHTML =
                    '<div class="empty-state">No pending friend requests.<br>They\'ll come... 👀</div>';
                return;
            }
            container.innerHTML = friendRequests.map(req => {
                const npc = getNpcById(req.npcId);
                if (!npc) return '';
                return `
              <div class="member-item">
                <div class="member-icon">${npc.icon}</div>
                <div class="member-info">
                  <div class="member-name">${escapeHtml(npc.name)}</div>
                  <div class="member-preview">${escapeHtml(npc.bio)} · ${npc.age || '??'} · ${npc.sex || 'Unknown'}</div>
                  <div style="font-size:10px;color:#1a4a1a;font-family:var(--font-mono);">${formatTime(req.timestamp)}</div>
                </div>
                <div class="member-actions">
                  <button class="action-btn accept accept-req-btn" data-npc-id="${req.npcId}" title="Accept">✓</button>
                  <button class="action-btn refuse refuse-req-btn" data-npc-id="${req.npcId}" title="Refuse">✗</button>
                  <button class="action-btn block block-req-btn" data-npc-id="${req.npcId}" title="Block">🚫</button>
                </div>
              </div>
            `;
            }).join('');
            container.querySelectorAll('.accept-req-btn').forEach(b => b.addEventListener('click', () =>
                acceptFriendRequest(b.dataset.npcId)));
            container.querySelectorAll('.refuse-req-btn').forEach(b => b.addEventListener('click', () =>
                refuseFriendRequest(b.dataset.npcId)));
            container.querySelectorAll('.block-req-btn').forEach(b => b.addEventListener('click', () => blockNpc(b
                .dataset.npcId)));
        }

        // -- Friends --
        function renderFriends() {
            const container = document.getElementById('friendsList');
            if (!container) return;
            if (friends.length === 0) {
                container.innerHTML =
                '<div class="empty-state">No friends yet.<br>Accept friend requests to build your circle!</div>';
                return;
            }
            container.innerHTML = friends.map(fId => {
                const npc = getNpcById(fId);
                if (!npc) return '';
                const msgs = conversations[fId] || [];
                const lastMsg = msgs.length ? msgs[msgs.length - 1] : null;
                return `
              <div class="member-item" data-npc-id="${fId}" style="cursor:pointer;">
                <div class="member-icon">${npc.icon}</div>
                <div class="member-info">
                  <div class="member-name">${escapeHtml(npc.name)} 💚</div>
                  <div class="member-preview">${escapeHtml(npc.bio)}</div>
                </div>
                <div class="member-actions">
                  <button class="action-btn accept chat-friend-btn" data-npc-id="${fId}" title="Chat">💬</button>
                  <button class="action-btn block unfriend-btn" data-npc-id="${fId}" title="Unfriend">✕</button>
                </div>
              </div>
            `;
            }).join('');
            container.querySelectorAll('.member-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('button')) return;
                    openChat(el.dataset.npcId);
                });
            });
            container.querySelectorAll('.chat-friend-btn').forEach(b => b.addEventListener('click', () => openChat(b
                .dataset.npcId)));
            container.querySelectorAll('.unfriend-btn').forEach(b => b.addEventListener('click', () => unfriendNpc(b
                .dataset.npcId)));
        }

        // -- Compose --
        function populateComposeSelect() {
            const select = document.getElementById('composeContactSelect');
            if (!select) return;
            const available = npcPool.filter(n => !isBlocked(n.id));
            select.innerHTML = '<option value="">-- Select a member --</option>' +
                available.map(n => `<option value="${n.id}">${n.icon} ${escapeHtml(n.name)} (${n.age || '??'} · ${n.sex || 'Unknown'})${isFriend(n.id) ? ' 💚' : ''}</option>`)
                .join('');
        }

        // -- Chat View --
        let currentOpenNpcId = null;
        let chatMessagesContainer = null;

        function openChat(npcId) {
            const npc = getNpcById(npcId);
            if (!npc || isBlocked(npcId)) return;
            currentOpenNpcId = npcId;
            const inboxPanel = document.getElementById('inboxPanel');
            inboxPanel.innerHTML = `
            <div class="chat-view">
              <div class="chat-header">
                <button class="back-btn" id="closeChatBtn">←</button>
                <span class="chat-contact-icon">${npc.icon}</span>
                <div class="chat-contact-name">${escapeHtml(npc.name)} ${isFriend(npcId) ? '💚' : ''}</div>
                <span style="font-size:11px;color:var(--text-dim);margin-left:auto;">${npc.age || '??'} · ${npc.sex || '?'}</span>
              </div>
              <div class="messages-area" id="chatMessagesArea"></div>
              <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Type message...">
                <button class="send-msg-btn" id="chatSendBtn">➤</button>
              </div>
            </div>
          `;
            document.getElementById('inboxPanel').classList.add('active');
            chatMessagesContainer = document.getElementById('chatMessagesArea');
            renderChatMessages(npcId);
            document.getElementById('closeChatBtn').addEventListener('click', closeChatView);
            const sendBtn = document.getElementById('chatSendBtn');
            const inputField = document.getElementById('chatInput');
            sendBtn.addEventListener('click', () => sendChatMessage(npcId));
            inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(npcId); });
            inputField.focus();
        }

        function closeChatView() {
            currentOpenNpcId = null;
            chatMessagesContainer = null;
            const inboxPanel = document.getElementById('inboxPanel');
            inboxPanel.innerHTML = '<div class="member-list" id="inboxList"></div>';
            renderInbox();
        }

        function renderChatMessages(npcId) {
            if (!chatMessagesContainer) return;
            const msgs = conversations[npcId] || [];
            chatMessagesContainer.innerHTML = '';
            msgs.forEach(msg => {
                const row = document.createElement('div');
                row.className = `message-row ${msg.fromMe ? 'outgoing' : 'incoming'}`;
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                bubble.textContent = msg.text;
                row.appendChild(bubble);
                const delBtn = document.createElement('div');
                delBtn.className = 'delete-msg';
                delBtn.textContent = '✕';
                delBtn.title = 'Delete message';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteMessage(npcId, msg.id);
                    renderChatMessages(npcId);
                    renderInbox();
                });
                row.appendChild(delBtn);
                chatMessagesContainer.appendChild(row);
            });
            chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
        }

        async function sendChatMessage(npcId) {
            const input = document.getElementById('chatInput');
            if (!input) return;
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            input.disabled = true;
            document.getElementById('chatSendBtn').disabled = true;
            addMessageToConversation(npcId, text, true);
            renderChatMessages(npcId);
            // Show typing indicator
            const indicator = document.createElement('div');
            indicator.className = 'message-row incoming typing-indicator';
            indicator.innerHTML =
                '<div class="msg-bubble" style="display:flex;gap:4px;"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
            if (chatMessagesContainer) {
                chatMessagesContainer.appendChild(indicator);
                chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
            }
            try {
                const reply = await generateAIResponse(npcId, text);
                if (indicator && indicator.parentNode) indicator.remove();
                addMessageToConversation(npcId, reply, false);
                renderChatMessages(npcId);
                renderInbox();
            } catch (err) {
                if (indicator && indicator.parentNode) indicator.remove();
                const errMsg = '[Transmission failed. The connection is unstable.]';
                addMessageToConversation(npcId, errMsg, false);
                renderChatMessages(npcId);
                setFooterMsg(`⚠️ ${err.message.substring(0, 40)}`);
                setTimeout(() => setFooterMsg('⚡ CREEPER v1.0 · NIGHTFALL GAMES 1984'), 4000);
            }
            input.disabled = false;
            document.getElementById('chatSendBtn').disabled = false;
            input.focus();
        }

        async function sendComposeMessage() {
            const npcId = document.getElementById('composeContactSelect').value;
            const msg = document.getElementById('composeMessage').value.trim();
            if (!npcId || !msg) return;
            if (isBlocked(npcId)) {
                setFooterMsg('🚫 Cannot message blocked members.');
                return;
            }
            addMessageToConversation(npcId, msg, true);
            document.getElementById('composeMessage').value = '';
            setFooterMsg('📩 Message sent!');
            saveAllData();
            renderInbox();
            // Switch to inbox and open chat
            document.querySelector('.tab[data-tab="inbox"]').click();
            setTimeout(() => openChat(npcId), 200);
            // Generate AI response
            try {
                const reply = await generateAIResponse(npcId, msg);
                addMessageToConversation(npcId, reply, false);
                if (currentOpenNpcId === npcId) renderChatMessages(npcId);
                renderInbox();
            } catch (err) {
                const errMsg = '[No response... the signal faded.]';
                addMessageToConversation(npcId, errMsg, false);
                if (currentOpenNpcId === npcId) renderChatMessages(npcId);
                renderInbox();
            }
        }

        // ── UNSOLICITED MESSAGES & FRIEND REQUESTS ─────────────
        let lastUnsolicitedTime = Date.now();
        let lastRequestTime = Date.now();

        async function maybeSendUnsolicitedMessage() {
            if (!openRouterKey) return;
            if (Date.now() - lastUnsolicitedTime < 40000) return;
            const candidates = npcPool.filter(n => !isBlocked(n.id));
            if (candidates.length === 0) return;
            const npc = candidates[Math.floor(Math.random() * candidates.length)];
            const msgs = conversations[npc.id] || [];
            const lastMsg = msgs.slice(-1)[0];
            if (lastMsg && !lastMsg.fromMe && (Date.now() - lastMsg.timestamp < 90000)) return;
            lastUnsolicitedTime = Date.now();
            const msgText = await generateUnsolicitedMessage(npc.id);
            if (msgText) {
                addMessageToConversation(npc.id, msgText, false);
                renderInbox();
                updateAllBadges();
                setFooterMsg(`📩 New message from ${npc.name}!`);
                setTimeout(() => setFooterMsg('⚡ CREEPER v1.0 · NIGHTFALL GAMES 1984'), 4000);
            }
        }

        async function maybeSendFriendRequest() {
            if (!openRouterKey) return;
            if (Date.now() - lastRequestTime < 70000) return;
            const candidates = npcPool.filter(n => !isBlocked(n.id) && !isFriend(n.id) && !hasPendingRequest(n.id));
            if (candidates.length === 0) return;
            const npc = candidates[Math.floor(Math.random() * candidates.length)];
            lastRequestTime = Date.now();
            friendRequests.push({ npcId: npc.id, timestamp: Date.now() });
            saveAllData();
            updateAllBadges();
            renderRequests();
            setFooterMsg(`👋 ${npc.name} sent you a friend request!`);
            setTimeout(() => setFooterMsg('⚡ CREEPER v1.0 · NIGHTFALL GAMES 1984'), 4000);
        }

        // ── BADGES ─────────────────────────────────────────────
        function updateAllBadges() {
            const inboxBadge = document.getElementById('inboxBadge');
            const requestsBadge = document.getElementById('requestsBadge');
            const unreadCount = friendRequests.length;
            if (requestsBadge) {
                if (unreadCount > 0) {
                    requestsBadge.style.display = 'flex';
                    requestsBadge.textContent = unreadCount;
                } else {
                    requestsBadge.style.display = 'none';
                }
            }
            if (inboxBadge) {
                inboxBadge.style.display = 'none'; // hide by default, could track unread
            }
        }

        // ── UTILITY ────────────────────────────────────────────
        function formatTime(timestamp) {
            const d = new Date(timestamp);
            const now = new Date();
            const diffMs = now - d;
            if (diffMs < 60000) return 'Just now';
            if (diffMs < 3600000) return Math.floor(diffMs / 60000) + 'm ago';
            if (diffMs < 86400000) return Math.floor(diffMs / 3600000) + 'h ago';
            return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
        }

        function setFooterMsg(msg) {
            const el = document.getElementById('footerMsg');
            if (el) el.textContent = msg;
        }

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false });
            document.getElementById('statusTime').textContent = timeStr;
        }

        // ── API KEY MODAL ──────────────────────────────────────
        function openApiModal() { document.getElementById('apiModal').style.display = 'flex'; }

        function closeApiModal() { document.getElementById('apiModal').style.display = 'none'; }

        function saveApiKey() {
            const newKey = document.getElementById('apiKeyInput').value.trim();
            if (newKey.startsWith('sk-or-') || newKey.length > 15) {
                openRouterKey = newKey;
                localStorage.setItem('creeper_api_key', openRouterKey);
                closeApiModal();
                setFooterMsg('✅ API key set. The network is alive.');
                startPeriodicEvents();
            } else {
                alert('Invalid OpenRouter API key. It should start with "sk-or-".');
            }
        }

        function resetApiKey() {
            localStorage.removeItem('creeper_api_key');
            openRouterKey = '';
            stopPeriodicEvents();
            openApiModal();
            setFooterMsg('API key reset. Enter a new key.');
        }

        // ── PERIODIC EVENTS ────────────────────────────────────
        let unsolicitedInterval = null;
        let requestInterval = null;
        let clockInterval = null;

        function startPeriodicEvents() {
            stopPeriodicEvents();
            if (openRouterKey) {
                unsolicitedInterval = setInterval(() => maybeSendUnsolicitedMessage(), 40000 + Math.random() * 20000);
                requestInterval = setInterval(() => maybeSendFriendRequest(), 70000 + Math.random() * 30000);
            }
            clockInterval = setInterval(updateClock, 1000);
        }

        function stopPeriodicEvents() {
            if (unsolicitedInterval) clearInterval(unsolicitedInterval);
            if (requestInterval) clearInterval(requestInterval);
            if (clockInterval) clearInterval(clockInterval);
            unsolicitedInterval = null;
            requestInterval = null;
            clockInterval = null;
        }

        // ── TAB SWITCHING ──────────────────────────────────────
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            const tabEl = document.querySelector(`.tab[data-tab="${tabName}"]`);
            if (tabEl) tabEl.classList.add('active');
            const panel = document.getElementById(tabName + 'Panel');
            if (panel) panel.classList.add('active');
            // Close chat if switching away from inbox
            if (tabName !== 'inbox' && currentOpenNpcId) {
                closeChatView();
            }
            if (tabName === 'profile') renderProfile();
            if (tabName === 'inbox') renderInbox();
            if (tabName === 'requests') renderRequests();
            if (tabName === 'friends') renderFriends();
            if (tabName === 'compose') populateComposeSelect();
        }

        // ── EVENT LISTENERS ────────────────────────────────────
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });

        document.getElementById('saveProfileBtn')?.addEventListener('click', saveProfile);
        document.getElementById('sendComposeBtn')?.addEventListener('click', sendComposeMessage);
        document.getElementById('saveApiKeyBtn')?.addEventListener('click', saveApiKey);
        document.getElementById('closeApiModalBtn')?.addEventListener('click', closeApiModal);
        document.getElementById('resetApiKeyBtn')?.addEventListener('click', resetApiKey);
        document.getElementById('profileIconDisplay')?.addEventListener('click', () => {
            document.getElementById('iconGrid').scrollIntoView({ behavior: 'smooth' });
        });

        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('apiModal')) closeApiModal();
        });

        // ── INITIALIZATION ─────────────────────────────────────
        function init() {
            loadAllData();
            initDefaultData();
            renderProfile();
            renderInbox();
            renderRequests();
            renderFriends();
            populateComposeSelect();
            updateAllBadges();
            updateClock();
            if (!openRouterKey) {
                setTimeout(openApiModal, 600);
                setFooterMsg('⚠️ Enter OpenRouter API key to activate the network.');
            } else {
                setFooterMsg('⚡ CREEPER v1.0 · NIGHTFALL GAMES 1984');
                startPeriodicEvents();
            }
            // First unsolicited message sooner if key is set
            if (openRouterKey) {
                setTimeout(() => maybeSendUnsolicitedMessage(), 15000 + Math.random() * 20000);
                setTimeout(() => maybeSendFriendRequest(), 35000 + Math.random() * 25000);
            }
            // Ensure inbox panel has the list container
            const inboxPanel = document.getElementById('inboxPanel');
            if (inboxPanel && !document.getElementById('inboxList')) {
                inboxPanel.innerHTML = '<div class="member-list" id="inboxList"></div>';
                renderInbox();
            }
        }

        init();
        console.log('%c🖥️ CREEPER %cv1.0 %c· %cNIGHTFALL GAMES 1984',
            'color:#33ff44;font-size:18px;',
            'color:#66ff77;',
            'color:#1a7a22;',
            'color:#33ff44;');
        console.log('%cRetro Sci-Fi 80s PDA Dating App %c♥',
            'color:#66ff77;font-family:monospace;',
            'color:#ff4466;');
    </script>
</body>
</html>
