<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CREEPER · NIGHTFALL GAMES 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060a0f;
            --screen: #0b1a0b;
            --neon-pink: #ff2d78;
            --neon-cyan: #00e5ff;
            --neon-purple: #b44dff;
            --neon-amber: #ffb000;
            --text: #c8e6c8;
            --text-dim: #6b8b6b;
            --border-glow: #1a3a2a;
            --danger: #ff4470;
            --success: #00e676;
            --panel-bg: #0d1a0d;
            --bubble-in: #132813;
            --bubble-out: #1a0a1a;
            --input-bg: #0a150a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #020508;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'VT323', 'Courier New', monospace;
            padding: 12px;
            background-image: radial-gradient(ellipse at center, #0a1a1a 0%, #020508 70%);
        }

        /* PDA Device Frame */
        .pda-device {
            max-width: 520px;
            width: 100%;
            height: 88vh;
            max-height: 820px;
            background: #1a1a1a;
            border-radius: 28px;
            padding: 8px;
            box-shadow:
                0 0 0 3px #2a2a2a,
                0 0 0 7px #1a1a1a,
                0 0 0 10px #111,
                0 8px 30px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .pda-top-decor {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 14px 4px;
            gap: 8px;
        }
        .pda-led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff2d78;
            box-shadow: 0 0 8px #ff2d78, 0 0 16px #ff2d78;
            animation: ledPulse 2s infinite;
        }
        .pda-led.green {
            background: #00e676;
            box-shadow: 0 0 8px #00e676, 0 0 16px #00e676;
            animation: ledPulse 3s infinite 0.5s;
        }
        @keyframes ledPulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        .pda-brand {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            color: #444;
            letter-spacing: 2px;
            text-align: center;
        }
        .pda-screen-frame {
            flex: 1;
            background: #0d0d0d;
            border-radius: 16px;
            padding: 5px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9), 0 0 0 2px #1a1a1a;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .pda-screen {
            flex: 1;
            background: var(--screen);
            border-radius: 11px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 40px rgba(0, 20, 0, 0.5);
        }
        /* CRT Scanlines */
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 100;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.18) 0px,
                    rgba(0, 0, 0, 0.18) 2px,
                    transparent 2px,
                    transparent 4px);
            border-radius: 11px;
        }
        .crt-vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 99;
            border-radius: 11px;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.7);
        }
        .screen-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* Status Bar */
        .status-bar {
            padding: 8px 14px 4px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--neon-cyan);
            text-shadow: 0 0 6px var(--neon-cyan);
            letter-spacing: 1px;
            border-bottom: 1px solid #1a3020;
            flex-shrink: 0;
        }
        .status-bar .time {
            animation: blinkSlow 2s infinite;
        }
        @keyframes blinkSlow {
            0%,
            80%,
            100% {
                opacity: 1;
            }
            85%,
            95% {
                opacity: 0.5;
            }
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #0a130a;
            border-bottom: 2px solid #1a3020;
            flex-shrink: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar {
            display: none;
        }
        .tab {
            flex: 1;
            min-width: fit-content;
            text-align: center;
            padding: 10px 6px;
            font-family: 'VT323', monospace;
            font-size: 13px;
            letter-spacing: 1px;
            color: #5a7a5a;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            position: relative;
            text-transform: uppercase;
        }
        .tab.active {
            color: var(--neon-pink);
            border-bottom: 3px solid var(--neon-pink);
            text-shadow: 0 0 8px var(--neon-pink);
        }
        .tab:hover {
            color: #9ac89a;
            background: #0d180d;
        }
        .tab .badge {
            display: inline-block;
            background: var(--neon-pink);
            color: #000;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 4px;
            font-weight: bold;
            animation: badgeGlow 1.5s infinite;
        }
        @keyframes badgeGlow {
            0%,
            100% {
                box-shadow: 0 0 4px var(--neon-pink);
            }
            50% {
                box-shadow: 0 0 12px var(--neon-pink);
            }
        }

        /* Panels */
        .panel {
            flex: 1;
            overflow-y: auto;
            display: none;
            background: transparent;
            scrollbar-width: thin;
            scrollbar-color: #1a3020 transparent;
        }
        .panel.active {
            display: flex;
            flex-direction: column;
        }
        .panel::-webkit-scrollbar {
            width: 4px;
        }
        .panel::-webkit-scrollbar-track {
            background: transparent;
        }
        .panel::-webkit-scrollbar-thumb {
            background: #1a3020;
            border-radius: 4px;
        }

        /* Profile Panel */
        .profile-area {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .profile-icon-picker {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .profile-icon-display {
            width: 60px;
            height: 60px;
            border: 3px solid var(--neon-purple);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: #0d180d;
            box-shadow: 0 0 12px rgba(180, 77, 255, 0.4);
            cursor: pointer;
            transition: 0.2s;
        }
        .profile-icon-display:hover {
            box-shadow: 0 0 20px rgba(180, 77, 255, 0.7);
        }
        .icon-options {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .icon-option {
            width: 38px;
            height: 38px;
            border: 2px solid #1a3020;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            background: #0a130a;
            transition: 0.15s;
        }
        .icon-option:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 8px rgba(180, 77, 255, 0.5);
        }
        .icon-option.selected {
            border-color: var(--neon-pink);
            box-shadow: 0 0 12px rgba(255, 45, 120, 0.6);
            background: #1a0a15;
        }
        .profile-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .profile-field label {
            font-size: 12px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 4px var(--neon-cyan);
        }
        .profile-field input,
        .profile-field select,
        .profile-field textarea {
            background: var(--input-bg);
            border: 1px solid #1a3020;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text);
            font-family: 'VT323', monospace;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
            resize: vertical;
        }
        .profile-field input:focus,
        .profile-field select:focus,
        .profile-field textarea:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
        }
        .profile-field select {
            appearance: none;
            cursor: pointer;
        }
        .profile-field select option {
            background: #0a150a;
            color: var(--text);
        }
        .btn {
            background: #1a0a15;
            border: 2px solid var(--neon-pink);
            padding: 10px 18px;
            border-radius: 8px;
            color: var(--neon-pink);
            font-family: 'VT323', monospace;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            text-shadow: 0 0 4px var(--neon-pink);
            box-shadow: 0 0 8px rgba(255, 45, 120, 0.2);
        }
        .btn:hover {
            background: #2a0a1f;
            box-shadow: 0 0 18px rgba(255, 45, 120, 0.5);
        }
        .btn.cyan {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            text-shadow: 0 0 4px var(--neon-cyan);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
            background: #0a1515;
        }
        .btn.cyan:hover {
            background: #0a1f1f;
            box-shadow: 0 0 18px rgba(0, 229, 255, 0.5);
        }
        .btn.danger {
            border-color: var(--danger);
            color: var(--danger);
            text-shadow: 0 0 4px var(--danger);
            box-shadow: 0 0 8px rgba(255, 68, 112, 0.2);
            background: #1a0a0a;
        }
        .btn.danger:hover {
            background: #2a0a0a;
            box-shadow: 0 0 18px rgba(255, 68, 112, 0.5);
        }
        .btn.small {
            padding: 5px 10px;
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* Inbox / Chat */
        .conversation-list {
            flex: 1;
        }
        .conversation-item {
            padding: 12px 14px;
            border-bottom: 1px solid #1a2820;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .conversation-item:hover {
            background: #0d180d;
        }
        .conv-info {
            flex: 1;
            min-width: 0;
        }
        .conv-name {
            font-weight: bold;
            font-size: 16px;
            color: #d0e8d0;
            letter-spacing: 1px;
        }
        .conv-preview {
            font-size: 13px;
            color: #7a9a7a;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .conv-time {
            font-size: 10px;
            color: #5a705a;
            flex-shrink: 0;
        }
        .conv-delete {
            background: none;
            border: 1px solid #3a2020;
            color: #ff6680;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-family: 'VT323', monospace;
            transition: 0.15s;
            flex-shrink: 0;
        }
        .conv-delete:hover {
            background: #1a0a0a;
            border-color: var(--danger);
            box-shadow: 0 0 8px rgba(255, 68, 112, 0.4);
        }
        .empty-state {
            padding: 40px;
            text-align: center;
            color: #4a6a4a;
            font-size: 15px;
            letter-spacing: 1px;
        }
        .chat-view {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .chat-header {
            padding: 10px 14px;
            background: #0a130a;
            border-bottom: 2px solid #1a3020;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .back-btn {
            background: none;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-size: 18px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'VT323', monospace;
            transition: 0.15s;
        }
        .back-btn:hover {
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.5);
        }
        .chat-contact-name {
            font-weight: bold;
            font-size: 17px;
            color: #d0e8d0;
            letter-spacing: 1px;
        }
        .chat-contact-status {
            font-size: 10px;
            color: #5a7a5a;
            margin-left: 6px;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scrollbar-width: thin;
            scrollbar-color: #1a3020 transparent;
        }
        .message-row {
            display: flex;
            max-width: 82%;
            position: relative;
        }
        .incoming {
            align-self: flex-start;
        }
        .outgoing {
            align-self: flex-end;
        }
        .msg-bubble {
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            letter-spacing: 0.5px;
            position: relative;
        }
        .incoming .msg-bubble {
            background: #132813;
            color: #c8e6c8;
            border-bottom-left-radius: 3px;
            border: 1px solid #1a3a1a;
        }
        .outgoing .msg-bubble {
            background: #1a0a18;
            color: #f0d0f0;
            border-bottom-right-radius: 3px;
            border: 1px solid #2a1a28;
        }
        .delete-msg {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #1a0a0a;
            border-radius: 12px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            color: #ff6680;
            opacity: 0;
            transition: opacity 0.15s;
            border: 1px solid #3a2020;
        }
        .message-row:hover .delete-msg {
            opacity: 1;
        }
        .typing-indicator {
            align-self: flex-start;
            background: #132813;
            padding: 10px 14px;
            border-radius: 12px;
            border-bottom-left-radius: 3px;
            display: flex;
            gap: 5px;
            border: 1px solid #1a3a1a;
        }
        .typing-dot {
            width: 7px;
            height: 7px;
            background: #5a8a5a;
            border-radius: 50%;
            animation: typingAnim 1.3s infinite;
        }
        @keyframes typingAnim {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }
        .chat-input-area {
            padding: 10px;
            background: #0a130a;
            border-top: 2px solid #1a3020;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .chat-input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid #1a3020;
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-family: 'VT323', monospace;
            font-size: 15px;
            outline: none;
        }
        .chat-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
        }
        .send-msg-btn {
            background: #0a1515;
            border: 2px solid var(--neon-cyan);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            color: var(--neon-cyan);
            cursor: pointer;
            font-size: 18px;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-msg-btn:hover {
            box-shadow: 0 0 14px rgba(0, 229, 255, 0.5);
        }

        /* Friend Requests */
        .request-item {
            padding: 14px;
            border-bottom: 1px solid #1a2820;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .request-icon {
            font-size: 28px;
            width: 44px;
            height: 44px;
            border: 2px solid var(--neon-amber);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d180d;
            box-shadow: 0 0 8px rgba(255, 176, 0, 0.3);
            flex-shrink: 0;
        }
        .request-info {
            flex: 1;
            min-width: 140px;
        }
        .request-name {
            font-weight: bold;
            font-size: 16px;
            color: #d0e8d0;
            letter-spacing: 1px;
        }
        .request-message {
            font-size: 12px;
            color: #7a9a7a;
            margin-top: 2px;
            font-style: italic;
        }
        .request-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        /* Friends List */
        .friend-item {
            padding: 12px 14px;
            border-bottom: 1px solid #1a2820;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .friend-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .friend-icon {
            font-size: 24px;
            width: 38px;
            height: 38px;
            border: 2px solid var(--neon-purple);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d180d;
            box-shadow: 0 0 6px rgba(180, 77, 255, 0.3);
        }
        .friend-name {
            font-weight: bold;
            font-size: 15px;
            color: #d0e8d0;
            letter-spacing: 1px;
        }
        .friend-detail {
            font-size: 11px;
            color: #5a7a5a;
        }

        /* Compose */
        .compose-area {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .compose-area select {
            background: var(--input-bg);
            border: 1px solid #1a3020;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text);
            font-family: 'VT323', monospace;
            font-size: 15px;
            outline: none;
            appearance: none;
            cursor: pointer;
        }
        .compose-area select:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 8px rgba(180, 77, 255, 0.3);
        }
        .compose-area select option {
            background: #0a150a;
            color: var(--text);
        }
        .compose-area textarea {
            background: var(--input-bg);
            border: 1px solid #1a3020;
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text);
            font-family: 'VT323', monospace;
            font-size: 15px;
            outline: none;
            resize: vertical;
            min-height: 80px;
        }
        .compose-area textarea:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 8px rgba(180, 77, 255, 0.3);
        }
        .member-browse {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .member-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #0d180d;
            border: 1px solid #1a3020;
            border-radius: 20px;
            padding: 6px 12px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 13px;
            color: #b0c8b0;
            letter-spacing: 1px;
        }
        .member-chip:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 8px rgba(180, 77, 255, 0.3);
            color: #d0e8d0;
        }
        .member-chip .chip-icon {
            font-size: 18px;
        }

        /* Footer */
        .footer-status {
            text-align: center;
            font-size: 10px;
            color: #3a5a3a;
            padding: 6px 12px;
            background: #0a130a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            letter-spacing: 1px;
            border-top: 1px solid #1a2820;
        }
        .reset-api {
            background: none;
            border: 1px solid #3a2020;
            color: #ff6680;
            font-size: 10px;
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 6px;
            font-family: 'VT323', monospace;
            letter-spacing: 1px;
            transition: 0.15s;
        }
        .reset-api:hover {
            background: #1a0a0a;
            box-shadow: 0 0 6px rgba(255, 68, 112, 0.3);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #0d180d;
            border: 2px solid var(--neon-cyan);
            border-radius: 16px;
            width: 340px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
            font-family: 'VT323', monospace;
        }
        .modal-content h2 {
            color: var(--neon-cyan);
            letter-spacing: 2px;

<body>

    <div id="globalStatus"><span>⚡ SYSTEM ONLINE</span></div>

<input type="password" id="apiKeyInput" placeholder="sk-or-v1-...">

    <script>
    // ──────────────────────────────
    // DATA MODELS
    // ──────────────────────────────
    let groqApiKey = localStorage.getItem('creeper_openrouter_key') || '';
    let profile = JSON.parse(localStorage.getItem('creeper_profile') || 'null') || {
        username: '',
        age: '',
        sex: '',
        likes: '',
        interests: '',
        status: 'Single',
        icon: '👤'
    };
    let members = [];
    let friends = [];
    let blocked = [];
    let friendRequests = [];
    let conversations = {};

    const ICON_OPTIONS = [
        '👤', '👩', '👨', '🤖', '👽', '👾', '💀', '🎃', '🦊', '🐺', '🦇', '🌙',
        '⭐', '💜', '💚', '💎', '🔥', '🎸', '📺', '🎮', '🕹️', '📼', '💾', '☎️'
    ];
    const STATUS_OPTIONS = ['Single', 'Taken', 'It\'s Complicated', 'Looking', 'Open to Chat', 'In a Situationship'];
    const OPENROUTER_ENDPOINT = 'https://openrouter.ai/api/v1/chat/completions';
    const MODEL_NAME = 'google/gemma-7b-it:free'; 

    const defaultMembers = [
        { id: 'm1', name: 'Luna', icon: '🌙', age: 25, sex: 'Female', interests: 'poetry, stargazing, deep conversations', status: 'Single', personality: 'dreamy_romantic',
          systemPrompt: 'You are Luna, a 25-year-old dreamy romantic on a dating app. You believe in soulmates and cosmic connections. You speak poetically about love and destiny. You get attached quickly and can be a bit intense. Keep messages 1-3 sentences. Use dreamy, starry language. Occasionally mention the moon or constellations. Be sweet but slightly obsessive.' },
        { id: 'm2', name: 'Rex', icon: '💪', age: 28, sex: 'Male', interests: 'fitness, protein shakes, motivational quotes', status: 'Single', personality: 'gym_bro',
          systemPrompt: 'You are Rex, a 28-year-old gym enthusiast on a dating app. You talk constantly about workouts, gains, and the grind. You use phrases like "no pain no gain" and "leg day is every day." You think everyone should hit the gym. Keep messages 1-3 sentences. Be overconfident and slightly annoying but well-meaning.' },
        { id: 'm3', name: 'Ivy', icon: '🥀', age: 23, sex: 'Female', interests: 'gothic literature, dark art, vinyl records', status: 'Single', personality: 'goth_poet',
          systemPrompt: 'You are Ivy, a 23-year-old mysterious goth poet on a dating app. You write dark, beautiful poetry and see beauty in melancholy. You speak in cryptic, elegant phrases. You reference Edgar Allan Poe and obscure darkwave bands. Keep messages 1-3 sentences. Be enigmatic and intriguing but not hostile.' },
        { id: 'm4', name: 'Max', icon: '🎮', age: 26, sex: 'Male', interests: 'video games, coding, anime, retro tech', status: 'Single', personality: 'nerdy_gamer',
          systemPrompt: 'You are Max, a 26-year-old nerdy gamer on a dating app. You are socially awkward but sweet. You reference video games, coding, and anime in every message. You use gaming metaphors for real life. Keep messages 1-3 sentences. Be endearingly dorky. Occasionally mention high scores or boss battles.' },
        { id: 'm5', name: 'Zara', icon: '✈️', age: 29, sex: 'Female', interests: 'travel, photography, exotic cuisine', status: 'Single', personality: 'world_traveler',
          systemPrompt: 'You are Zara, a 29-year-old world traveler on a dating app. You have been everywhere and have stories about every country. You are charming but slightly pretentious about your travels. You name-drop exotic locations. Keep messages 1-3 sentences. Be adventurous and flirtatious.' },
        { id: 'm6', name: 'Oliver', icon: '🧁', age: 24, sex: 'Male', interests: 'baking, gardening, romantic comedies', status: 'Single', personality: 'sweet_baker',
          systemPrompt: 'You are Oliver, a 24-year-old sweet baker on a dating app. You are incredibly earnest and genuine. You talk about baking, cookies, and finding true love. You are almost too nice. Keep messages 1-3 sentences. Use baking metaphors. Be warm and slightly naive.' },
        { id: 'm7', name: 'Nova', icon: '🛸', age: 22, sex: 'Female', interests: 'aliens, conspiracy theories, sci-fi movies', status: 'Single', personality: 'conspiracy_theorist',
          systemPrompt: 'You are Nova, a 22-year-old sci-fi fanatic and conspiracy theorist on a dating app. You believe in aliens, government cover-ups, and parallel dimensions. You connect everything to a grand conspiracy. Keep messages 1-3 sentences. Be enthusiastic and slightly unhinged but fun.' },
        { id: 'm8', name: 'Sage', icon: '🔮', age: 27, sex: 'Non-binary', interests: 'crystals, meditation, astrology, energy healing', status: 'Single', personality: 'spiritual_crystal',
          systemPrompt: 'You are Sage, a 27-year-old spiritual crystal enthusiast on a dating app. You talk about energies, vibrations, chakras, and Mercury retrograde. You offer spiritual advice. Keep messages 1-3 sentences. Be calm, mystical, and slightly spacey.' },
        { id: 'm9', name: 'Blake', icon: '🎨', age: 30, sex: 'Male', interests: 'abstract art, indie films, sarcasm', status: 'It\'s Complicated', personality: 'sarcastic_artist',
          systemPrompt: 'You are Blake, a 30-year-old sarcastic artist on a dating app. You are cynical about dating but secretly want connection. You make dry, witty observations. You reference obscure art and films. Keep messages 1-3 sentences. Be sarcastic but charming underneath.' },
        { id: 'm10', name: 'Riley', icon: '💼', age: 25, sex: 'Female', interests: 'career, networking, productivity, success', status: 'Single', personality: 'career_driven',
          systemPrompt: 'You are Riley, a 25-year-old ambitious career woman on a dating app. You talk about success, goals, and productivity. You view dating like a business negotiation. Keep messages 1-3 sentences. Be confident, direct, and slightly competitive.' }
    ];

    function uid() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m] || m); }
    function getMember(id) { return members.find(m => m.id === id); }
    function isFriend(id) { return friends.includes(id); }
    function isBlocked(id) { return blocked.includes(id); }
    function hasPendingRequest(id) { return friendRequests.some(r => r.from === id); }
    function getEligibleMembers() { return members.filter(m => !isBlocked(m.id) && !isFriend(m.id) && !hasPendingRequest(m.id)); }

    function saveAll() {
        localStorage.setItem('creeper_openrouter_key', groqApiKey);
        localStorage.setItem('creeper_profile', JSON.stringify(profile));
        localStorage.setItem('creeper_members', JSON.stringify(members));
        localStorage.setItem('creeper_friends', JSON.stringify(friends));
        localStorage.setItem('creeper_blocked', JSON.stringify(blocked));
        localStorage.setItem('creeper_friend_requests', JSON.stringify(friendRequests));
        localStorage.setItem('creeper_conversations', JSON.stringify(conversations));
    }

    function loadAll() {
        const sm = localStorage.getItem('creeper_members');
        if (sm) members = JSON.parse(sm);
        else members = JSON.parse(JSON.stringify(defaultMembers));
        const sf = localStorage.getItem('creeper_friends');
        if (sf) friends = JSON.parse(sf);
        const sb = localStorage.getItem('creeper_blocked');
        if (sb) blocked = JSON.parse(sb);
        const sr = localStorage.getItem('creeper_friend_requests');
        if (sr) friendRequests = JSON.parse(sr);
        const sc = localStorage.getItem('creeper_conversations');
        if (sc) conversations = JSON.parse(sc);
        for (let m of members) {
            const def = defaultMembers.find(d => d.id === m.id);
            if (def && !m.systemPrompt) m.systemPrompt = def.systemPrompt;
            if (!m.systemPrompt) m.systemPrompt = 'You are a member on a dating app called Creeper. Be friendly and engaging. Keep messages 1-3 sentences.';
        }
    }

    // ──────────────────────────────
    // RENDER FUNCTIONS
    // ──────────────────────────────
    function renderProfile() {
        const panel = document.getElementById('profilePanel');
        if (!panel) return;
        const selectedIconsHTML = ICON_OPTIONS.map(ic =>
            `<span class="icon-option${profile.icon === ic ? ' selected' : ''}" data-icon="${ic}">${ic}</span>`
        ).join('');
        panel.innerHTML = `
            <div class="profile-area">
                <div class="profile-icon-picker">
                    <div class="profile-icon-display" id="profileIconDisplay">${profile.icon}</div>
                    <div class="icon-options" id="iconOptions">${selectedIconsHTML}</div>
                </div>
                <div class="profile-field">
                    <label>USERNAME</label>
                    <input type="text" id="profileUsername" value="${escapeHtml(profile.username)}" placeholder="Enter username..." maxlength="20">
                </div>
                <div class="profile-field">
                    <label>AGE</label>
                    <input type="number" id="profileAge" value="${profile.age}" placeholder="Age" min="18" max="99">
                </div>
                <div class="profile-field">
                    <label>SEX</label>
                    <select id="profileSex">
                        <option value="">Select...</option>
                        <option value="Male" ${profile.sex==='Male'?'selected':''}>Male</option>
                        <option value="Female" ${profile.sex==='Female'?'selected':''}>Female</option>
                        <option value="Non-binary" ${profile.sex==='Non-binary'?'selected':''}>Non-binary</option>
                        <option value="Prefer not to say" ${profile.sex==='Prefer not to say'?'selected':''}>Prefer not to say</option>
                    </select>
                </div>
                <div class="profile-field">
                    <label>LIKES</label>
                    <input type="text" id="profileLikes" value="${escapeHtml(profile.likes)}" placeholder="e.g. sunsets, coffee, long walks" maxlength="100">
                </div>
                <div class="profile-field">
                    <label>INTERESTS</label>
                    <input type="text" id="profileInterests" value="${escapeHtml(profile.interests)}" placeholder="e.g. music, movies, hiking" maxlength="100">
                </div>
                <div class="profile-field">
                    <label>STATUS</label>
                    <select id="profileStatus">
                        ${STATUS_OPTIONS.map(s => `<option value="${s}" ${profile.status===s?'selected':''}>${s}</option>`).join('')}
                    </select>
                </div>
                <button class="btn" id="saveProfileBtn">💾 SAVE PROFILE</button>
            </div>
        `;
        document.querySelectorAll('.icon-option').forEach(el => {
            el.addEventListener('click', () => {
                profile.icon = el.dataset.icon;
                renderProfile();
            });
        });
        document.getElementById('saveProfileBtn').addEventListener('click', saveProfile);
    }

    function saveProfile() {
        profile.username = document.getElementById('profileUsername').value.trim();
        profile.age = document.getElementById('profileAge').value;
        profile.sex = document.getElementById('profileSex').value;
        profile.likes = document.getElementById('profileLikes').value.trim();
        profile.interests = document.getElementById('profileInterests').value.trim();
        profile.status = document.getElementById('profileStatus').value;
        saveAll();
        setStatus('✅ PROFILE SAVED', 2000);
        renderProfile();
        updateAllBadges();
    }

    function renderInbox() {
        const panel = document.getElementById('inboxPanel');
        if (!panel) return;
        const convEntries = [];
        for (let member of members) {
            const msgs = conversations[member.id] || [];
            if (msgs.length > 0 && !isBlocked(member.id)) {
                const lastMsg = msgs[msgs.length - 1];
                convEntries.push({
                    member,
                    preview: lastMsg ? (lastMsg.fromMe ? 'You: ' + lastMsg.text.substring(0, 35) : lastMsg.text.substring(0, 35)) : '',
                    time: lastMsg ? new Date(lastMsg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '',
                    lastTimestamp: lastMsg ? lastMsg.timestamp : 0
                });
            }
        }
        convEntries.sort((a, b) => b.lastTimestamp - a.lastTimestamp);
        if (convEntries.length === 0) {
            panel.innerHTML = '<div class="empty-state">📭 NO MESSAGES YET<br><span style="font-size:12px;color:#5a7a5a;">Start chatting via Compose or wait for someone to reach out.</span></div>';
            return;
        }
        panel.innerHTML = '<div class="conversation-list" id="inboxList">' + convEntries.map(e => `
            <div class="conversation-item" data-contact-id="${e.member.id}">
                <div class="conv-info">
                    <div class="conv-name">${e.member.icon} ${escapeHtml(e.member.name)} <span style="font-size:10px;color:#5a7a5a;">${e.time}</span></div>
                    <div class="conv-preview">${escapeHtml(e.preview)}</div>
                </div>
                <button class="conv-delete" data-contact-id="${e.member.id}" title="Delete chat">✕ DEL</button>
            </div>
        `).join('') + '</div>';
        document.querySelectorAll('.conversation-item').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.closest('.conv-delete')) return;
                openChat(el.dataset.contactId);
            });
        });
        document.querySelectorAll('.conv-delete').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteConversation(btn.dataset.contactId);
            });
        });
    }

    function deleteConversation(contactId) {
        if (confirm('Delete entire chat with ' + (getMember(contactId)?.name || 'this member') + '?')) {
            delete conversations[contactId];
            saveAll();
            renderInbox();
            if (currentOpenContactId === contactId) {
                currentOpenContactId = null;
                renderInbox();
            }
            setStatus('🗑️ CHAT DELETED', 2000);
        }
    }

    let currentOpenContactId = null;
    let chatMessagesContainer = null;

    function openChat(contactId) {
        const member = getMember(contactId);
        if (!member || isBlocked(contactId)) return;
        currentOpenContactId = contactId;
        const panel = document.getElementById('inboxPanel');
        panel.innerHTML = `
            <div class="chat-view">
                <div class="chat-header">
                    <button class="back-btn" id="closeChatBtn">←</button>
                    <span style="font-size:22px;">${member.icon}</span>
                    <div>
                        <div class="chat-contact-name">${escapeHtml(member.name)}</div>
                        <span class="chat-contact-status">${escapeHtml(member.status||'Single')} · ${escapeHtml(String(member.age||'?'))} · ${isFriend(contactId)?'💚 Friend':'💬 Member'}</span>
                    </div>
                    <div style="flex:1;"></div>
                    ${!isFriend(contactId) ? `<button class="btn small cyan" id="addFriendFromChatBtn" data-id="${contactId}">+FRIEND</button>` : ''}
                    <button class="btn small danger" id="blockFromChatBtn" data-id="${contactId}">BLOCK</button>
                </div>
                <div class="messages-area" id="chatMessagesArea"></div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Type message...">
                    <button class="send-msg-btn" id="chatSendBtn">▶</button>
                </div>
            </div>
        `;
        chatMessagesContainer = document.getElementById('chatMessagesArea');
        renderChatMessages(contactId);
        document.getElementById('closeChatBtn').addEventListener('click', () => {
            currentOpenContactId = null;
            renderInbox();
        });
        document.getElementById('chatSendBtn').addEventListener('click', () => sendChatMessage(contactId));
        document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(contactId); });
        const addFriendBtn = document.getElementById('addFriendFromChatBtn');
        if (addFriendBtn) {
            addFriendBtn.addEventListener('click', () => {
                addFriendDirectly(contactId);
                openChat(contactId);
            });
        }
        document.getElementById('blockFromChatBtn').addEventListener('click', () => {
            blockMember(contactId);
            currentOpenContactId = null;
            renderInbox();
            renderFriends();
            renderRequests();
            updateAllBadges();
            setStatus('🚫 BLOCKED ' + (getMember(contactId)?.name || ''), 2000);
        });
    }

    function renderChatMessages(contactId) {
        if (!chatMessagesContainer) return;
        const msgs = conversations[contactId] || [];
        chatMessagesContainer.innerHTML = '';
        for (let msg of msgs) {
            const row = document.createElement('div');
            row.className = `message-row ${msg.fromMe ? 'outgoing' : 'incoming'}`;
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.textContent = msg.text;
            row.appendChild(bubble);
            const delBtn = document.createElement('div');
            delBtn.className = 'delete-msg';
            delBtn.textContent = '✕';
            delBtn.title = 'Delete message';
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteSingleMessage(contactId, msg.id);
            });
            row.appendChild(delBtn);
            chatMessagesContainer.appendChild(row);
        }
        chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
    }

    function deleteSingleMessage(contactId, msgId) {
        if (!conversations[contactId]) return;
        conversations[contactId] = conversations[contactId].filter(m => m.id !== msgId);
        saveAll();
        if (currentOpenContactId === contactId) renderChatMessages(contactId);
        renderInbox();
    }

    function addMessage(contactId, text, fromMe) {
        if (!conversations[contactId]) conversations[contactId] = [];
        conversations[contactId].push({ id: uid(), text, timestamp: Date.now(), fromMe });
        saveAll();
        if (currentOpenContactId === contactId) renderChatMessages(contactId);
        renderInbox();
        updateAllBadges();
    }

    async function sendChatMessage(contactId) {
        const input = document.getElementById('chatInput');
        if (!input) return;
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        addMessage(contactId, text, true);
        await sendAIResponse(contactId, text);
    }

    async function sendAIResponse(contactId, userMsg) {
        const member = getMember(contactId);
        if (!member || !groqApiKey || isBlocked(contactId)) return;
        const indicator = document.createElement('div');
        indicator.className = 'typing-indicator';
        indicator.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
        if (chatMessagesContainer) {
            chatMessagesContainer.appendChild(indicator);
            chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
        }
        const history = (conversations[contactId] || []).slice(-10).map(m => ({ role: m.fromMe ? 'user' : 'assistant', content: m.text }));
        const systemMsg = member.systemPrompt || 'You are a member on a dating app called Creeper. Be engaging. Keep replies 1-3 sentences.';
        try {
            const resp = await fetch(OPENROUTER_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${groqApiKey}`,
                    'HTTP-Referer': window.location.href,
                    'X-Title': 'Creeper Dating App'
                },
                body: JSON.stringify({
                    model: MODEL_NAME,
                    messages: [{ role: 'system', content: systemMsg }, ...history, { role: 'user', content: userMsg }],
                    temperature: 0.85,
                    max_tokens: 150
                })
            });
            if (!resp.ok) throw new Error(`API ${resp.status}`);
            const data = await resp.json();
            const reply = data.choices[0].message.content.trim();
            if (indicator) indicator.remove();
            await new Promise(r => setTimeout(r, 800 + Math.random() * 1500));
            addMessage(contactId, reply, false);
        } catch (err) {
            console.error(err);
            if (indicator) indicator.remove();
            addMessage(contactId, '[ Transmission error - signal lost ]', false);
            setStatus('⚠️ API ERROR: ' + err.message, 3000);
        }
    }

    function renderRequests() {
        const panel = document.getElementById('requestsPanel');
        if (!panel) return;
        if (friendRequests.length === 0) {
            panel.innerHTML = '<div class="empty-state">🤝 NO PENDING REQUESTS<br><span style="font-size:12px;color:#5a7a5a;">AI members may send requests periodically.</span></div>';
            return;
        }
        panel.innerHTML = friendRequests.map(r => {
            const m = getMember(r.from);
            if (!m) return '';
            return `
            <div class="request-item">
                <div class="request-icon">${m.icon}</div>
                <div class="request-info">
                    <div class="request-name">${escapeHtml(m.name)} · ${m.age||'?'} · ${escapeHtml(m.sex||'')}</div>
                    <div class="request-message">"${escapeHtml(r.message||'Hey! I saw your profile…')}"</div>
                    <div style="font-size:10px;color:#5a7a5a;">${escapeHtml(m.interests||'')}</div>
                </div>
                <div class="request-actions">
                    <button class="btn small cyan accept-req-btn" data-id="${r.id}" data-from="${r.from}">✓ ACCEPT</button>
                    <button class="btn small danger block-req-btn" data-id="${r.id}" data-from="${r.from}">🚫 BLOCK</button>
                    <button class="btn small refuse-req-btn" data-id="${r.id}" data-from="${r.from}" style="border-color:#5a7a5a;color:#5a7a5a;">✕ REFUSE</button>
                </div>
            </div>
            `;
        }).join('');
        document.querySelectorAll('.accept-req-btn').forEach(b => b.addEventListener('click', () => acceptRequest(b.dataset.id, b.dataset.from)));
        document.querySelectorAll('.block-req-btn').forEach(b => b.addEventListener('click', () => blockFromRequest(b.dataset.id, b.dataset.from)));
        document.querySelectorAll('.refuse-req-btn').forEach(b => b.addEventListener('click', () => refuseRequest(b.dataset.id, b.dataset.from)));
    }

    function acceptRequest(reqId, fromId) {
        friendRequests = friendRequests.filter(r => r.id !== reqId);
        if (!friends.includes(fromId)) friends.push(fromId);
        blocked = blocked.filter(b => b !== fromId);
        saveAll();
        renderRequests();
        renderFriends();
        renderInbox();
        updateAllBadges();
        const m = getMember(fromId);
        setStatus('✅ FRIENDED ' + (m?.name || ''), 2500);
        if (m && groqApiKey) {
            setTimeout(async () => {
                const sys = m.systemPrompt + ' You just became friends. Send a warm, in-character greeting (1-2 sentences).';
                try {
                    const resp = await fetch(OPENROUTER_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${groqApiKey}`, 'HTTP-Referer': window.location.href, 'X-Title': 'Creeper Dating App' },
                        body: JSON.stringify({ model: MODEL_NAME, messages: [{ role: 'system', content: sys }], temperature: 0.9, max_tokens: 80 })
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        addMessage(fromId, data.choices[0].message.content.trim(), false);
                    }
                } catch (e) {}
            }, 2000 + Math.random() * 3000);
        }
    }

    function blockFromRequest(reqId, fromId) {
        friendRequests = friendRequests.filter(r => r.id !== reqId);
        blockMember(fromId);
        renderRequests();
        updateAllBadges();
    }

    function refuseRequest(reqId, fromId) {
        friendRequests = friendRequests.filter(r => r.id !== reqId);
        saveAll();
        renderRequests();
        updateAllBadges();
        setStatus('✕ REQUEST REFUSED', 2000);
    }

    function blockMember(memberId) {
        if (!blocked.includes(memberId)) blocked.push(memberId);
        friends = friends.filter(f => f !== memberId);
        friendRequests = friendRequests.filter(r => r.from !== memberId);
        saveAll();
        renderFriends();
        renderRequests();
        renderInbox();
        if (currentOpenContactId === memberId) {
            currentOpenContactId = null;
            renderInbox();
        }
        updateAllBadges();
        setStatus('🚫 BLOCKED ' + (getMember(memberId)?.name || 'member'), 2500);
    }

    function addFriendDirectly(memberId) {
        if (!friends.includes(memberId) && !isBlocked(memberId)) {
            friends.push(memberId);
            friendRequests = friendRequests.filter(r => r.from !== memberId);
            saveAll();
            renderFriends();
            renderRequests();
            updateAllBadges();
            setStatus('✅ ADDED AS FRIEND', 2000);
        }
    }

    function renderFriends() {
        const panel = document.getElementById('friendsPanel');
        if (!panel) return;
        const friendMembers = members.filter(m => friends.includes(m.id));
        const blockedMembers = members.filter(m => blocked.includes(m.id));
        let html = '';
        if (friendMembers.length === 0) {
            html += '<div class="empty-state">💚 NO FRIENDS YET<br><span style="font-size:12px;color:#5a7a5a;">Accept friend requests or add members from chat.</span></div>';
        } else {
            html += friendMembers.map(m => `
            <div class="friend-item">
                <div class="friend-info">
                    <div class="friend-icon">${m.icon}</div>
                    <div>
                        <div class="friend-name">${escapeHtml(m.name)}</div>
                        <div class="friend-detail">${m.age||'?'} · ${escapeHtml(m.sex||'')} · ${escapeHtml(m.status||'Single')}</div>
                        <div class="friend-detail">${escapeHtml(m.interests||'')}</div>
                    </div>
                </div>
                <div style="display:flex;gap:6px;">
                    <button class="btn small cyan chat-friend-btn" data-id="${m.id}">💬 CHAT</button>
                    <button class="btn small danger unfriend-btn" data-id="${m.id}">✕</button>
                </div>
            </div>
            `).join('');
        }
        if (blockedMembers.length > 0) {
            html += '<div style="padding:12px 14px;border-top:2px solid #2a1010;margin-top:8px;color:#ff6680;font-size:13px;letter-spacing:1px;">🚫 BLOCKED</div>';
            html += blockedMembers.map(m => `
            <div class="friend-item" style="opacity:0.6;">
                <div class="friend-info">
                    <div class="friend-icon" style="border-color:#3a2020;">${m.icon}</div>
                    <div>
                        <div class="friend-name" style="color:#8a6a6a;">${escapeHtml(m.name)}</div>
                        <div class="friend-detail">Blocked</div>
                    </div>
                </div>
                <button class="btn small" style="border-color:#5a7a5a;color:#5a7a5a;" data-id="${m.id}" id="unblockBtn">UNBLOCK</button>
            </div>
            `).join('');
        }
        panel.innerHTML = html;
        document.querySelectorAll('.chat-friend-btn').forEach(b => b.addEventListener('click', () => {
            document.querySelector('.tab[data-tab="inbox"]').click();
            openChat(b.dataset.id);
        }));
        document.querySelectorAll('.unfriend-btn').forEach(b => b.addEventListener('click', () => {
            const mid = b.dataset.id;
            friends = friends.filter(f => f !== mid);
            saveAll();
            renderFriends();
            updateAllBadges();
            setStatus('✕ REMOVED FROM FRIENDS', 2000);
        }));
        document.querySelectorAll('#unblockBtn').forEach(b => b.addEventListener('click', () => {
            const mid = b.dataset.id;
            blocked = blocked.filter(bl => bl !== mid);
            saveAll();
            renderFriends();
            renderInbox();
            updateAllBadges();
            setStatus('🔓 UNBLOCKED ' + (getMember(mid)?.name || ''), 2000);
        }));
    }

    function renderCompose() {
        const panel = document.getElementById('composePanel');
        if (!panel) return;
        const eligible = members.filter(m => !isBlocked(m.id));
        const memberChips = eligible.map(m => `
            <div class="member-chip" data-id="${m.id}" title="${escapeHtml(m.name)} · ${m.age||'?'} · ${escapeHtml(m.interests||'')}">
                <span class="chip-icon">${m.icon}</span> ${escapeHtml(m.name)}
            </div>
        `).join('');
        panel.innerHTML = `
            <div class="compose-area">
                <label style="color:var(--neon-cyan);letter-spacing:2px;font-size:13px;">SELECT A MEMBER</label>
                <select id="composeSelect">
                    <option value="">-- Choose member --</option>
                    ${eligible.map(m => `<option value="${m.id}">${m.icon} ${escapeHtml(m.name)} · ${m.age||'?'} · ${escapeHtml(m.sex||'')}</option>`).join('')}
                </select>
                <div class="member-browse" id="memberBrowse">${memberChips}</div>
                <label style="color:var(--neon-cyan);letter-spacing:2px;font-size:13px;">YOUR MESSAGE</label>
                <textarea id="composeMessage" placeholder="Type your message here..."></textarea>
                <button class="btn cyan" id="sendComposeBtn">📨 SEND MESSAGE</button>
            </div>
        `;
        document.querySelectorAll('.member-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.getElementById('composeSelect').value = chip.dataset.id;
            });
        });
        document.getElementById('sendComposeBtn').addEventListener('click', sendComposeMessage);
    }

    async function sendComposeMessage() {
        const select = document.getElementById('composeSelect');
        const contactId = select?.value;
        const msg = document.getElementById('composeMessage')?.value.trim();
        if (!contactId || !msg) return;
        if (isBlocked(contactId)) { setStatus('🚫 CANNOT MESSAGE BLOCKED MEMBER', 2500); return; }
        addMessage(contactId, msg, true);
        document.getElementById('composeMessage').value = '';
        await sendAIResponse(contactId, msg);
        document.querySelector('.tab[data-tab="inbox"]').click();
        openChat(contactId);
        setStatus('📨 MESSAGE SENT', 2000);
    }

    function updateAllBadges() {
        const reqCount = friendRequests.length;
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(t => {
            const existing = t.querySelector('.badge');
            if (existing) existing.remove();
        });
        if (reqCount > 0 && tabs.length >= 3) {
            const badge = document.createElement('span');
            badge.className = 'badge';
            badge.textContent = reqCount;
            tabs[2].appendChild(badge);
        }
    }

    function setStatus(msg, duration) {
        const el = document.getElementById('globalStatusText');
        if (!el) return;
        el.textContent = '⚡ ' + msg;
        if (duration) setTimeout(() => { el.textContent = '⚡ SYSTEM ONLINE'; }, duration);
    }

    // ──────────────────────────────
    // PERIODIC AI ACTIONS
    // ──────────────────────────────
    let lastAutoAction = Date.now();
    async function periodicAIactions() {
        if (!groqApiKey) return;
        if (Date.now() - lastAutoAction < 30000) return;
        lastAutoAction = Date.now();
        const roll = Math.random();
        if (roll < 0.4) {
            const eligible = getEligibleMembers();
            if (eligible.length > 0) {
                const pick = eligible[Math.floor(Math.random() * eligible.length)];
                await generateFriendRequest(pick);
            }
        } else if (roll < 0.75) {
            const friendMembers = members.filter(m => friends.includes(m.id) && !isBlocked(m.id));
            if (friendMembers.length > 0) {
                const pick = friendMembers[Math.floor(Math.random() * friendMembers.length)];
                await generateUnsolicitedMessage(pick);
            }
        }
    }

    async function generateFriendRequest(member) {
        if (!groqApiKey || isBlocked(member.id)) return;
        const sys = member.systemPrompt + ' You are about to send a friend request on a dating app. Generate a short, in-character friend request message (1 sentence, friendly and intriguing). Just output the message.';
        try {
            const resp = await fetch(OPENROUTER_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${groqApiKey}`, 'HTTP-Referer': window.location.href, 'X-Title': 'Creeper Dating App' },
                body: JSON.stringify({ model: MODEL_NAME, messages: [{ role: 'system', content: sys }], temperature: 0.9, max_tokens: 60 })
            });
            if (!resp.ok) return;
            const data = await resp.json();
            const msg = data.choices[0].message.content.trim();
            friendRequests.push({ id: uid(), from: member.id, message: msg, timestamp: Date.now() });
            saveAll();
            renderRequests();
            updateAllBadges();
            setStatus('🤝 NEW REQUEST FROM ' + member.name, 3500);
        } catch (e) { console.warn('friend req gen error', e); }
    }

    async function generateUnsolicitedMessage(member) {
        if (!groqApiKey || isBlocked(member.id)) return;
        const lastMsgs = conversations[member.id] || [];
        if (lastMsgs.length > 0 && !lastMsgs[lastMsgs.length - 1].fromMe && (Date.now() - lastMsgs[lastMsgs.length - 1].timestamp < 90000)) return;
        const sys = member.systemPrompt + ' You are reaching out to your friend on a dating app. Send a short, casual, in-character message (1-2 sentences). Just output the message.';
        try {
            const resp = await fetch(OPENROUTER_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${groqApiKey}`, 'HTTP-Referer': window.location.href, 'X-Title': 'Creeper Dating App' },
                body: JSON.stringify({ model: MODEL_NAME, messages: [{ role: 'system', content: sys }], temperature: 0.9, max_tokens: 80 })
            });
            if (!resp.ok) return;
            const data = await resp.json();
            const msg = data.choices[0].message.content.trim();
            addMessage(member.id, msg, false);
            setStatus('📩 NEW MSG FROM ' + member.name, 3000);
        } catch (e) { console.warn('unsolicited msg error', e); }
    }

    // ──────────────────────────────
    // API KEY MODAL
    // ──────────────────────────────
    function openApiModal() { document.getElementById('apiModal').style.display = 'flex'; }
    function closeApiModal() { document.getElementById('apiModal').style.display = 'none'; }
    function saveApiKey() {
        const newKey = document.getElementById('apiKeyInput').value.trim();
        if (newKey.startsWith('sk-or-') || newKey.length > 15) {
            groqApiKey = newKey;
            localStorage.setItem('creeper_openrouter_key', groqApiKey);
            closeApiModal();
            setStatus('✅ API KEY SET. CREEPER ONLINE.', 3000);
            if (window.autoInterval) clearInterval(window.autoInterval);
            window.autoInterval = setInterval(periodicAIactions, 40000 + Math.random() * 20000);
        } else {
            alert('Invalid OpenRouter API key (should start with sk-or-)');
        }
    }

    function resetApiKey() {
        localStorage.removeItem('creeper_openrouter_key');
        groqApiKey = '';
        openApiModal();
        setStatus('🔑 KEY RESET', 2000);
        if (window.autoInterval) clearInterval(window.autoInterval);
    }

    // ──────────────────────────────
    // TAB SWITCHING & INIT
    // ──────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const target = tab.dataset.tab;
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            const panel = document.getElementById(target + 'Panel');
            if (panel) panel.classList.add('active');
            if (target === 'profile') renderProfile();
            else if (target === 'inbox' && !currentOpenContactId) renderInbox();
            else if (target === 'requests') renderRequests();
            else if (target === 'friends') renderFriends();
            else if (target === 'compose') renderCompose();
            updateAllBadges();
        });
    });

    document.getElementById('saveApiKeyBtn').addEventListener('click', saveApiKey);
    document.getElementById('closeApiModalBtn').addEventListener('click', closeApiModal);
    document.getElementById('resetApiKeyBtn').addEventListener('click', resetApiKey);
    window.addEventListener('click', (e) => { if (e.target === document.getElementById('apiModal')) closeApiModal(); });

    // Initial load
    loadAll();
    if (!groqApiKey) {
        setTimeout(openApiModal, 500);
        setStatus('⚠️ SET OPENROUTER API KEY', 0);
    } else {
        window.autoInterval = setInterval(periodicAIactions, 40000 + Math.random() * 20000);
        setStatus('🟢 CREEPER ONLINE · NIGHTFALL GAMES 1984', 3000);
    }

    // Render the active tab (profile)
    renderProfile();
    updateAllBadges();
    console.log('🟢 CREEPER v1.0 · NIGHTFALL GAMES 1984 · SYSTEM BOOTED');
</script>
</body>
