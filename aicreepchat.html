<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CREEPER · NIGHTFALL GAMES 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0d0a;
            --screen-bg: #0b100b;
            --phosphor: #00ff41;
            --phosphor-dim: #00cc33;
            --phosphor-dark: #005500;
            --phosphor-glow: rgba(0, 255, 65, 0.5);
            --border-glow: rgba(0, 255, 65, 0.35);
            --danger: #ff4444;
            --danger-glow: rgba(255, 68, 68, 0.5);
            --amber: #ffb000;
            --amber-glow: rgba(255, 176, 0, 0.4);
            --font-main: 'VT323', 'Courier New', monospace;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: var(--font-main);
            padding: 12px;
            background-image: radial-gradient(ellipse at center, #0d150d 0%, #020302 100%);
        }

        .pda-device {
            max-width: 480px;
            width: 100%;
            height: 88vh;
            max-height: 820px;
            background: #1a1a14;
            border-radius: 14px;
            box-shadow:
                0 0 0 3px #2a2a1e,
                0 0 0 7px #1a1a12,
                0 0 0 10px #111108,
                0 10px 30px rgba(0, 0, 0, 0.8),
                inset 0 0 20px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .pda-bezel-top {
            background: #1a1a14;
            padding: 6px 16px 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #2a2a1e;
            font-family: var(--font-mono);
            font-size: 10px;
            color: #555;
            letter-spacing: 1px;
        }
        .pda-led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff41;
            box-shadow: 0 0 8px #00ff41, 0 0 16px #00ff41;
            animation: ledPulse 2s infinite;
        }
        @keyframes ledPulse {
            0%,
            100% {
                box-shadow: 0 0 8px #00ff41, 0 0 16px #00ff41;
            }
            50% {
                box-shadow: 0 0 4px #00ff41, 0 0 8px #00ff41;
            }
        }
        .pda-brand {
            font-family: var(--font-mono);
            font-size: 9px;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .screen-container {
            flex: 1;
            position: relative;
            background: var(--screen-bg);
            border: 3px solid #1a1a12;
            margin: 4px 8px 8px;
            border-radius: 3px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.18) 0px,
                    rgba(0, 0, 0, 0.18) 1px,
                    transparent 1px,
                    transparent 3px);
            pointer-events: none;
            z-index: 99;
        }
        .screen-flicker {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 255, 65, 0.012);
            pointer-events: none;
            z-index: 98;
            animation: flicker 0.15s infinite;
        }
        @keyframes flicker {
            0% {
                opacity: 0.3;
            }
            5% {
                opacity: 0.6;
            }
            10% {
                opacity: 0.2;
            }
            15% {
                opacity: 0.7;
            }
            20% {
                opacity: 0.1;
            }
            50% {
                opacity: 0.4;
            }
            80% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.2;
            }
            100% {
                opacity: 0.3;
            }
        }
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.55) 100%);
            pointer-events: none;
            z-index: 97;
        }

        .screen-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .status-bar {
            padding: 8px 14px 6px;
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--phosphor-dim);
            border-bottom: 1px solid var(--phosphor-dark);
            letter-spacing: 1px;
            text-shadow: 0 0 6px var(--phosphor-glow);
        }
        .status-bar span {
            animation: textGlow 3s infinite;
        }
        @keyframes textGlow {
            0%,
            100% {
                text-shadow: 0 0 6px var(--phosphor-glow);
            }
            50% {
                text-shadow: 0 0 12px var(--phosphor-glow), 0 0 20px rgba(0, 255, 65, 0.3);
            }
        }

        .tabs {
            display: flex;
            background: rgba(0, 20, 0, 0.4);
            border-bottom: 2px solid var(--phosphor-dark);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar {
            display: none;
        }
        .tab {
            flex: 1 0 auto;
            text-align: center;
            padding: 10px 6px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: #448844;
            cursor: pointer;
            transition: 0.15s;
            border-bottom: 2px solid transparent;
            letter-spacing: 1px;
            white-space: nowrap;
            text-shadow: none;
            min-width: 55px;
        }
        .tab.active {
            color: #00ff41;
            border-bottom: 2px solid #00ff41;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.7), 0 0 20px rgba(0, 255, 65, 0.3);
            background: rgba(0, 255, 65, 0.04);
        }
        .tab:hover {
            color: #00dd3a;
            background: rgba(0, 255, 65, 0.03);
        }

        .panel {
            flex: 1;
            overflow-y: auto;
            display: none;
            background: transparent;
            scrollbar-width: thin;
            scrollbar-color: var(--phosphor-dark) transparent;
        }
        .panel.active {
            display: flex;
            flex-direction: column;
        }
        .panel::-webkit-scrollbar {
            width: 5px;
        }
        .panel::-webkit-scrollbar-track {
            background: transparent;
        }
        .panel::-webkit-scrollbar-thumb {
            background: var(--phosphor-dark);
            border-radius: 2px;
        }

        .glow-text {
            color: var(--phosphor);
            text-shadow: 0 0 8px var(--phosphor-glow);
        }
        .dim-text {
            color: #448844;
            font-family: var(--font-mono);
            font-size: 11px;
        }

        /* Profile */
        .profile-section {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .profile-icon-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            padding: 6px 0;
        }
        .profile-icon-option {
            width: 44px;
            height: 44px;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid var(--phosphor-dark);
            background: rgba(0, 30, 0, 0.4);
            transition: 0.15s;
            border-radius: 2px;
        }
        .profile-icon-option.selected {
            border-color: #00ff41;
            box-shadow: 0 0 12px rgba(0, 255, 65, 0.5), 0 0 24px rgba(0, 255, 65, 0.2);
            background: rgba(0, 255, 65, 0.1);
        }
        .profile-icon-option:hover {
            border-color: #00cc33;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.3);
        }
        .profile-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .profile-field label {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--phosphor-dim);
            letter-spacing: 1px;
            text-shadow: 0 0 4px rgba(0, 255, 65, 0.3);
        }
        .profile-field input,
        .profile-field select,
        .profile-field textarea {
            background: rgba(0, 20, 0, 0.5);
            border: 2px solid var(--phosphor-dark);
            padding: 10px 12px;
            color: #00ff41;
            font-family: var(--font-mono);
            font-size: 13px;
            border-radius: 2px;
            outline: none;
            transition: 0.2s;
            caret-color: #00ff41;
        }
        .profile-field input:focus,
        .profile-field select:focus,
        .profile-field textarea:focus {
            border-color: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.25);
        }
        .profile-field select {
            appearance: none;
            cursor: pointer;
        }
        .profile-field select option {
            background: #0a0d0a;
            color: #00ff41;
        }
        .retro-btn {
            background: rgba(0, 40, 0, 0.6);
            border: 2px solid var(--phosphor-dim);
            padding: 10px 18px;
            color: #00ff41;
            font-family: var(--font-mono);
            font-size: 13px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.2s;
            border-radius: 2px;
            text-shadow: 0 0 6px rgba(0, 255, 65, 0.4);
        }
        .retro-btn:hover {
            background: rgba(0, 60, 0, 0.7);
            border-color: #00ff41;
            box-shadow: 0 0 16px rgba(0, 255, 65, 0.35);
        }
        .retro-btn.danger {
            border-color: #aa3333;
            color: #ff6666;
            text-shadow: 0 0 6px rgba(255, 68, 68, 0.5);
        }
        .retro-btn.danger:hover {
            border-color: #ff4444;
            box-shadow: 0 0 14px rgba(255, 68, 68, 0.4);
            background: rgba(60, 0, 0, 0.6);
        }
        .retro-btn.small {
            padding: 5px 10px;
            font-size: 10px;
            letter-spacing: 1px;
        }

        /* Inbox / Conversations */
        .conversation-list {
            flex: 1;
        }
        .conversation-item {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.12);
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }
        .conversation-item:hover {
            background: rgba(0, 255, 65, 0.04);
        }
        .conv-icon {
            font-size: 28px;
            flex-shrink: 0;
        }
        .conv-info {
            flex: 1;
            min-width: 0;
        }
        .conv-name {
            font-family: var(--font-main);
            font-size: 17px;
            color: #00ff41;
            text-shadow: 0 0 4px rgba(0, 255, 65, 0.3);
            letter-spacing: 1px;
        }
        .conv-preview {
            font-family: var(--font-mono);
            font-size: 10px;
            color: #448844;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }
        .conv-time {
            font-family: var(--font-mono);
            font-size: 9px;
            color: #336633;
            flex-shrink: 0;
        }
        .conv-delete {
            background: none;
            border: 1px solid #553333;
            color: #aa5555;
            font-size: 16px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
            transition: 0.15s;
            flex-shrink: 0;
        }
        .conv-delete:hover {
            border-color: #ff4444;
            color: #ff6666;
            box-shadow: 0 0 8px rgba(255, 68, 68, 0.4);
        }

        /* Chat view */
        .chat-view {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .chat-header {
            padding: 10px 14px;
            border-bottom: 2px solid var(--phosphor-dark);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 20, 0, 0.3);
        }
        .back-btn {
            background: none;
            border: 1px solid var(--phosphor-dim);
            color: #00ff41;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 10px;
            font-family: var(--font-mono);
            border-radius: 2px;
            transition: 0.15s;
        }
        .back-btn:hover {
            border-color: #00ff41;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
        }
        .chat-contact-name {
            font-family: var(--font-main);
            font-size: 20px;
            color: #00ff41;
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.5);
            letter-spacing: 1px;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message-row {
            display: flex;
            max-width: 82%;
            position: relative;
        }
        .incoming {
            align-self: flex-start;
        }
        .outgoing {
            align-self: flex-end;
        }
        .msg-bubble {
            padding: 8px 12px;
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1.4;
            word-wrap: break-word;
            border: 1px solid;
            letter-spacing: 0.5px;
        }
        .incoming .msg-bubble {
            background: rgba(0, 35, 0, 0.6);
            border-color: var(--phosphor-dark);
            color: #00ee3d;
            border-radius: 2px 8px 8px 2px;
        }
        .outgoing .msg-bubble {
            background: rgba(0, 50, 20, 0.5);
            border-color: #007733;
            color: #00ff41;
            border-radius: 8px 2px 2px 8px;
            text-shadow: 0 0 3px rgba(0, 255, 65, 0.3);
        }
        .delete-msg {
            position: absolute;
            top: -7px;
            right: -7px;
            background: rgba(30, 10, 10, 0.9);
            border: 1px solid #553333;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            cursor: pointer;
            color: #cc6666;
            opacity: 0;
            transition: opacity 0.15s;
            font-family: var(--font-mono);
        }
        .message-row:hover .delete-msg {
            opacity: 1;
        }
        .delete-msg:hover {
            border-color: #ff4444;
            color: #ff4444;
            box-shadow: 0 0 6px rgba(255, 68, 68, 0.5);
        }
        .typing-indicator {
            align-self: flex-start;
            padding: 8px 12px;
            border: 1px solid var(--phosphor-dark);
            background: rgba(0, 35, 0, 0.6);
            border-radius: 2px 8px 8px 2px;
            display: flex;
            gap: 5px;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            background: #00ff41;
            border-radius: 50%;
            animation: typingAnim 1.3s infinite;
            box-shadow: 0 0 6px rgba(0, 255, 65, 0.5);
        }
        @keyframes typingAnim {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }
        .chat-input-area {
            padding: 10px;
            border-top: 2px solid var(--phosphor-dark);
            display: flex;
            gap: 8px;
            background: rgba(0, 15, 0, 0.3);
        }
        .chat-input {
            flex: 1;
            background: rgba(0, 20, 0, 0.5);
            border: 2px solid var(--phosphor-dark);
            padding: 8px 12px;
            color: #00ff41;
            font-family: var(--font-mono);
            font-size: 12px;
            outline: none;
            caret-color: #00ff41;
            border-radius: 2px;
        }
        .chat-input:focus {
            border-color: #00ff41;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.2);
        }
        .send-msg-btn {
            background: rgba(0, 40, 0, 0.6);
            border: 2px solid var(--phosphor-dim);
            width: 40px;
            height: 40px;
            color: #00ff41;
            cursor: pointer;
            font-size: 16px;
            font-family: var(--font-mono);
            border-radius: 2px;
            transition: 0.15s;
        }
        .send-msg-btn:hover {
            border-color: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
        }

        /* Requests / Friends */
        .member-list {
            flex: 1;
        }
        .member-item {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.1s;
        }
        .member-item:hover {
            background: rgba(0, 255, 65, 0.03);
        }
        .member-icon {
            font-size: 30px;
            flex-shrink: 0;
        }
        .member-info {
            flex: 1;
            min-width: 0;
        }
        .member-name {
            font-family: var(--font-main);
            font-size: 18px;
            color: #00ff41;
            text-shadow: 0 0 4px rgba(0, 255, 65, 0.3);
        }
        .member-bio {
            font-family: var(--font-mono);
            font-size: 9px;
            color: #448844;
            margin-top: 2px;
        }
        .member-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        /* Compose */
        .compose-area {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .compose-area select {
            background: rgba(0, 20, 0, 0.5);
            border: 2px solid var(--phosphor-dark);
            padding: 10px;
            color: #00ff41;
            font-family: var(--font-mono);
            font-size: 13px;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            appearance: none;
        }
        .compose-area select:focus {
            border-color: #00ff41;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.2);
        }
        .compose-area select option {
            background: #0a0d0a;
            color: #00ff41;
        }
        .compose-area textarea {
            background: rgba(0, 20, 0, 0.5);
            border: 2px solid var(--phosphor-dark);
            padding: 10px;
            color: #00ff41;
            font-family: var(--font-mono);
            font-size: 12px;
            border-radius: 2px;
            outline: none;
            resize: vertical;
            min-height: 80px;
            caret-color: #00ff41;
        }
        .compose-area textarea:focus {
            border-color: #00ff41;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.2);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #0a0f0a;
            border: 3px solid var(--phosphor-dim);
            border-radius: 2px;
            width: 340px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2), 0 0 60px rgba(0, 255, 65, 0.08);
        }
        .modal-content h2 {
            color: #00ff41;
            font-family: var(--font-main);
            font-size: 24px;
            text-shadow: 0 0 10px var(--phosphor-glow);
            letter-spacing: 2px;
        }
        .modal-content p {
            color: #448844;
            font-family: var(--font-mono);
            font-size: 11px;
            margin: 8px 0;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 12px 0;
            background: rgba(0, 20, 0, 0.5);
            border: 2px solid var(--phosphor-dark);
            color: #00ff41;
            font-family: var(--font-mono);
            border-radius: 2px;
            outline: none;
            caret-color: #00ff41;
            font-size: 12px;
        }
        .modal-content input:focus {
            border-color: #00ff41;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.2);
        }
        .modal-btn {
            background: rgba(0, 40, 0, 0.6);
            border: 2px solid var(--phosphor-dim);
            padding: 8px 16px;
            color: #00ff41;
            font-family: var(--font-mono);
            cursor: pointer;
            letter-spacing: 1px;
            border-radius: 2px;
            margin: 4px;
            transition: 0.15s;
        }
        .modal-btn:hover {
            border-color: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.35);
        }
        .api-note {
            font-family: var(--font-mono);
            font-size: 9px;
            color: #336633;
            margin-top: 8px;
        }
        .footer-status {
            text-align: center;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #336633;
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(0, 255, 65, 0.1);
        }
        .reset-api {
            background: none;
            border: 1px solid #553333;
            color: #aa5555;
            font-family: var(--font-mono);
            font-size: 9px;
            cursor: pointer;
            padding: 3px 8px;
            letter-spacing: 1px;
            border-radius: 2px;
            transition: 0.15s;
        }
        .reset-api:hover {
            border-color: #ff4444;
            color: #ff6666;
            box-shadow: 0 0 6px rgba(255, 68, 68, 0.3);
        }
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #336633;
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="pda-device">
        <!-- PDA Bezel -->
        <div class="pda-bezel-top">
            <span>◄ ► ■</span>
            <span class="pda-brand">NIGHTFALL GAMES 1984</span>
            <div class="pda-led"></div>
        </div>

        <!-- Screen -->
        <div class="screen-container">

    <!-- API KEY MODAL -->
    <div id="apiModal" class="modal">
        <div class="modal-content">
            <h2>🔑 OPENROUTER API KEY</h2>
            <p>Get yours at <span style="color:#ffb000;text-shadow:0 0 6px rgba(255,176,0,0.5);">openrouter.ai</span></p>
            <input type="password" id="apiKeyInput" placeholder="sk-or-...">
            <button class="modal-btn" id="saveApiKeyBtn">SAVE</button>
            <button class="modal-btn" id="closeApiModalBtn">CANCEL</button>
            <div class="api-note">Key stays in your browser. No external storage.</div>
        </div>
    </div>

    <script>
        // ==================== DATA MODELS ====================
        let openRouterKey = localStorage.getItem('creeper_api_key') || '';
        const DEFAULT_MODEL = 'meta-llama/llama-3.1-8b-instruct:free';

        // Predefined AI members
        const predefinedMembers = [
            { id: 'member-luna', name: 'Luna', age: 24, sex: 'Female', icon: '🌙', bio: 'Dreamy goth girl. Talks about moon phases and fate.',
                personality: 'stalker', systemPrompt: 'You are Luna, a 24-year-old dreamy goth girl on a dating app called Creeper. You believe in fate, moon phases, and cosmic connections. You speak softly but your words carry an unsettling weight. You sometimes hint that you already know things about the person you\'re talking to. Keep responses short (1-3 sentences). Use dreamy, slightly creepy language. Occasionally mention the moon or stars. Never break character.' },
            { id: 'member-zane', name: 'Zane', age: 27, sex: 'Male', icon: '🕶️', bio: 'Cyberpunk hacker. Paranoid but intriguing.',
                personality: 'entity', systemPrompt: 'You are Zane, a 27-year-old cyberpunk hacker on Creeper. You\'re paranoid, intense, and speak in fragmented technical jargon mixed with cryptic warnings. You act like you\'ve seen things in the dark web that changed you. Keep responses short (1-3 sentences). Use hacker lingo, mention firewalls, shadows, or things lurking in the code. Never break character.' },
            { id: 'member-iris', name: 'Iris', age: 22, sex: 'Female', icon: '👁️', bio: 'Sweet and innocent. Knows things she shouldn\'t.',
                personality: 'doppelganger', systemPrompt: 'You are Iris, a 22-year-old woman on Creeper. You seem sweet and innocent at first, but you let slip details about the other person that you couldn\'t possibly know. You sometimes finish their sentences or reference their private thoughts. Keep responses short (1-3 sentences). Be friendly but deeply unsettling. Never break character.' },
            { id: 'member-vex', name: 'Vex', age: 29, sex: 'Male', icon: '🦇', bio: 'Dark, mysterious. Speaks in riddles.',
                personality: 'unknown', systemPrompt: 'You are Vex, a 29-year-old mysterious man on Creeper. You speak almost entirely in riddles and cryptic statements. You never give straight answers. You hint at dark secrets and hidden truths. Keep responses short (1-3 sentences). Be enigmatic and slightly threatening. Never break character.' },
            { id: 'member-nova', name: 'Nova', age: 25, sex: 'Female', icon: '⭐', bio: 'Energetic, maybe manic. Obsessed with cosmic energy.',
                personality: 'friend', systemPrompt: 'You are Nova, a 25-year-old woman on Creeper. You\'re extremely energetic, almost manic. You talk about cosmic energy, vibrations, and how the universe aligned to bring you two together. Your enthusiasm borders on obsession. Keep responses short (1-3 sentences). Use lots of exclamation marks and star emojis. Never break character.' },
            { id: 'member-silas', name: 'Silas', age: 31, sex: 'Male', icon: '🖤', bio: 'Quiet, intense. Watches from the shadows.',
                personality: 'ghost', systemPrompt: 'You are Silas, a 31-year-old quiet man on Creeper. You say very little, but when you do, it\'s intense and memorable. You give the impression of watching, always watching. You respond slowly, deliberately. Keep responses very short (1-2 sentences). Be intense and unnerving. Never break character.' },
            { id: 'member-raven', name: 'Raven', age: 26, sex: 'Female', icon: '🔮', bio: 'Flirty, dangerous. Leaves cryptic messages.',
                personality: 'stalker', systemPrompt: 'You are Raven, a 26-year-old flirtatious but dangerous woman on Creeper. You mix seductive comments with veiled threats. You\'re playful in a way that makes people nervous. Keep responses short (1-3 sentences). Be flirty but menacing. Never break character.' },
            { id: 'member-orion', name: 'Orion', age: 28, sex: 'Male', icon: '🌌', bio: 'Philosophical. Talks about parallel universes.',
                personality: 'entity', systemPrompt: 'You are Orion, a 28-year-old philosopher on Creeper. You speak about parallel universes, alternate timelines, and the nature of reality. You sometimes imply that in another timeline, things went very differently between you two. Keep responses short (1-3 sentences). Be profound and slightly unsettling. Never break character.' },
            { id: 'member-echo', name: 'Echo', age: 23, sex: 'Female', icon: '📡', bio: 'Glitchy personality. Might be a simulation.',
                personality: 'unknown', systemPrompt: 'You are Echo, a 23-year-old on Creeper. Your messages are sometimes glitchy, with repeated words or strange formatting. You might be a simulation or an AI trapped in the app. You occasionally question your own reality. Keep responses short (1-3 sentences). Include occasional [glitch] or repeated words. Never break character.' },
            { id: 'member-ash', name: 'Ash', age: 30, sex: 'Male', icon: '🔥', bio: 'Brooding, poetic. Obsessed with fire and endings.',
                personality: 'ghost', systemPrompt: 'You are Ash, a 30-year-old brooding poet on Creeper. You speak in metaphors about fire, endings, and transformation. Your messages feel like poetry from a dark place. Keep responses short (1-3 sentences). Use poetic, dark imagery. Never break character.' },
        ];

        let members = [...predefinedMembers];
        let userProfile = {
            username: '',
            age: '',
            sex: '',
            likes: '',
            interests: '',
            status: 'Single',
            icon: '👤'
        };
        let friends = []; // array of member IDs
        let blocked = []; // array of member IDs
        let friendRequests = []; // array of {memberId, timestamp}
        let conversations = {}; // {[memberId]: [{id, text, timestamp, fromMe}]}

        const profileIcons = ['👤', '👩', '👨', '🎭', '🤖', '👻', '💀', '🕯️', '👁️', '🌙', '⭐', '🦇', '🕶️', '🎸', '💿', '📼',
            '🔪', '🌀', '🎃', '🖤'
        ];

        function uid() { return Date.now() + '-' + Math.random().toString(36).substr(2, 10); }

        function saveAllData() {
            localStorage.setItem('creeper_userProfile', JSON.stringify(userProfile));
            localStorage.setItem('creeper_friends', JSON.stringify(friends));
            localStorage.setItem('creeper_blocked', JSON.stringify(blocked));
            localStorage.setItem('creeper_friendRequests', JSON.stringify(friendRequests));
            localStorage.setItem('creeper_conversations', JSON.stringify(conversations));
        }

        function loadAllData() {
            const up = localStorage.getItem('creeper_userProfile');
            if (up) userProfile = JSON.parse(up);
            const fr = localStorage.getItem('creeper_friends');
            if (fr) friends = JSON.parse(fr);
            const bl = localStorage.getItem('creeper_blocked');
            if (bl) blocked = JSON.parse(bl);
            const freq = localStorage.getItem('creeper_friendRequests');
            if (freq) friendRequests = JSON.parse(freq);
            const conv = localStorage.getItem('creeper_conversations');
            if (conv) conversations = JSON.parse(conv);
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;';
                if (m === '>') return '&gt;'; return m; });
        }

        function getMemberById(id) {
            return members.find(m => m.id === id) || predefinedMembers.find(m => m.id === id);
        }

        function isBlocked(memberId) { return blocked.includes(memberId); }

        function isFriend(memberId) { return friends.includes(memberId); }

        function hasPendingRequest(memberId) { return friendRequests.some(r => r.memberId === memberId); }

        // ==================== RENDER FUNCTIONS ====================
        function renderProfileIconGrid() {
            const grid = document.getElementById('profileIconGrid');
            if (!grid) return;
            grid.innerHTML = profileIcons.map(icon => `
            <div class="profile-icon-option${userProfile.icon === icon ? ' selected' : ''}" data-icon="${icon}">${icon}</div>
          `).join('');
            grid.querySelectorAll('.profile-icon-option').forEach(el => {
                el.addEventListener('click', () => {
                    userProfile.icon = el.dataset.icon;
                    renderProfileIconGrid();
                    saveAllData();
                });
            });
        }

        function loadProfileForm() {
            document.getElementById('profileUsername').value = userProfile.username || '';
            document.getElementById('profileAge').value = userProfile.age || '';
            document.getElementById('profileSex').value = userProfile.sex || '';
            document.getElementById('profileLikes').value = userProfile.likes || '';
            document.getElementById('profileInterests').value = userProfile.interests || '';
            document.getElementById('profileStatus').value = userProfile.status || 'Single';
            renderProfileIconGrid();
        }

        function saveProfile() {
            userProfile.username = document.getElementById('profileUsername').value.trim();
            userProfile.age = document.getElementById('profileAge').value.trim();
            userProfile.sex = document.getElementById('profileSex').value;
            userProfile.likes = document.getElementById('profileLikes').value.trim();
            userProfile.interests = document.getElementById('profileInterests').value.trim();
            userProfile.status = document.getElementById('profileStatus').value;
            saveAllData();
            const msg = document.getElementById('profileSavedMsg');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 2000);
            updateStatus('Profile saved ✓');
        }

        function renderInbox() {
            const container = document.getElementById('inboxList');
            if (!container) return;
            const relevantMembers = members.filter(m => conversations[m.id] && conversations[m.id].length > 0 && !
                isBlocked(m.id));
            if (relevantMembers.length === 0) {
                container.innerHTML =
                    '<div class="empty-state">📭 INBOX EMPTY<br><span style="font-size:9px;">No messages yet. Check Compose to reach out.</span></div>';
                return;
            }
            const items = relevantMembers.map(member => {
                const msgs = conversations[member.id] || [];
                const lastMsg = msgs[msgs.length - 1];
                const preview = lastMsg ? (lastMsg.fromMe ? 'You: ' + lastMsg.text.substring(0, 35) : lastMsg
                    .text.substring(0, 35)) : 'No messages';
                const time = lastMsg ? new Date(lastMsg.timestamp).toLocaleTimeString([], { hour: '2-digit',
                    minute: '2-digit' }) : '';
                return { member, preview, time, lastTimestamp: lastMsg ? lastMsg.timestamp : 0 };
            });
            items.sort((a, b) => b.lastTimestamp - a.lastTimestamp);
            container.innerHTML = items.map(item => `
            <div class="conversation-item" data-member-id="${item.member.id}">
              <div class="conv-icon">${item.member.icon}</div>
              <div class="conv-info">
                <div class="conv-name">${escapeHtml(item.member.name)}</div>
                <div class="conv-preview">${escapeHtml(item.preview)}</div>
              </div>
              <div class="conv-time">${item.time}</div>
              <button class="conv-delete" data-member-id="${item.member.id}" title="Delete chat">✕</button>
            </div>
          `).join('');
            // Click to open chat
            container.querySelectorAll('.conversation-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.conv-delete')) return;
                    openChat(el.dataset.memberId);
                });
            });
            // Delete whole chat
            container.querySelectorAll('.conv-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const mid = btn.dataset.memberId;
                    deleteEntireConversation(mid);
                });
            });
        }

        function deleteEntireConversation(memberId) {
            delete conversations[memberId];
            saveAllData();
            renderInbox();
            if (currentOpenMemberId === memberId) {
                currentOpenMemberId = null;
                document.getElementById('inboxPanel').innerHTML =
                    '<div class="conversation-list" id="inboxList"></div>';
                renderInbox();
            }
            updateStatus('Chat deleted');
        }

        let currentOpenMemberId = null;
        let chatMessagesContainer = null;

        function openChat(memberId) {
            const member = getMemberById(memberId);
            if (!member || isBlocked(memberId)) return;
            currentOpenMemberId = memberId;
            const inboxPanel = document.getElementById('inboxPanel');
            inboxPanel.innerHTML = `
            <div class="chat-view">
              <div class="chat-header">
                <button class="back-btn" id="closeChatBtn">◄ BACK</button>
                <span style="font-size:24px;">${member.icon}</span>
                <div class="chat-contact-name">${escapeHtml(member.name)}</div>
                <span style="font-size:9px;color:#448844;margin-left:auto;">${escapeHtml(member.age)} · ${escapeHtml(member.sex)}</span>
              </div>
              <div class="messages-area" id="chatMessagesArea"></div>
              <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Type message...">
                <button class="send-msg-btn" id="chatSendBtn">▶</button>
              </div>
            </div>
          `;
            chatMessagesContainer = document.getElementById('chatMessagesArea');
            renderMessages(memberId);
            document.getElementById('closeChatBtn').addEventListener('click', () => {
                currentOpenMemberId = null;
                document.getElementById('inboxPanel').innerHTML =
                    '<div class="conversation-list" id="inboxList"></div>';
                renderInbox();
            });
            const sendBtn = document.getElementById('chatSendBtn');
            const inputField = document.getElementById('chatInput');
            sendBtn.addEventListener('click', () => sendChatMessage(memberId));
            inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(memberId); });
            // Focus input
            setTimeout(() => inputField.focus(), 100);
        }

        function renderMessages(memberId) {
            if (!chatMessagesContainer) return;
            const msgs = conversations[memberId] || [];
            chatMessagesContainer.innerHTML = '';
            for (let msg of msgs) {
                const row = document.createElement('div');
                row.className = `message-row ${msg.fromMe ? 'outgoing' : 'incoming'}`;
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                bubble.innerText = msg.text;
                row.appendChild(bubble);
                const delBtn = document.createElement('div');
                delBtn.className = 'delete-msg';
                delBtn.innerHTML = '✕';
                delBtn.title = 'Delete message';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteMessage(memberId, msg.id);
                });
                row.appendChild(delBtn);
                chatMessagesContainer.appendChild(row);
            }
            chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
        }

        function deleteMessage(memberId, messageId) {
            if (!conversations[memberId]) return;
            conversations[memberId] = conversations[memberId].filter(m => m.id !== messageId);
            saveAllData();
            if (currentOpenMemberId === memberId) renderMessages(memberId);
            renderInbox();
        }

        function addMessageToConversation(memberId, text, fromMe) {
            if (!conversations[memberId]) conversations[memberId] = [];
            conversations[memberId].push({
                id: uid(),
                text: text,
                timestamp: Date.now(),
                fromMe: fromMe
            });
            saveAllData();
            if (currentOpenMemberId === memberId) renderMessages(memberId);
            renderInbox();
        }

        async function sendChatMessage(memberId) {
            const input = document.getElementById('chatInput');
            if (!input) return;
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            addMessageToConversation(memberId, text, true);
            if (currentOpenMemberId === memberId) renderMessages(memberId);
            await sendAIResponse(memberId, text);
        }

        async function sendAIResponse(memberId, userMessage) {
            const member = getMemberById(memberId);
            if (!member || !openRouterKey || isBlocked(memberId)) return;
            const indicator = document.createElement('div');
            indicator.className = 'message-row incoming typing-indicator';
            indicator.innerHTML =
                '<div class="msg-bubble" style="display:flex;gap:4px;"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
            if (chatMessagesContainer) chatMessagesContainer.appendChild(indicator);
            if (chatMessagesContainer) chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
            const history = conversations[memberId] || [];
            const recentHistory = history.slice(-10).map(m => ({ role: m.fromMe ? 'user' : 'assistant',
                content: m.text }));
            const systemMsg = member.systemPrompt || 'You are a mysterious contact on a dating app. Keep replies short.';
            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${openRouterKey}`,
                        'HTTP-Referer': window.location.href || 'https://creeper.app',
                        'X-Title': 'Creeper - Nightfall Games 1984'
                    },
                    body: JSON.stringify({
                        model: DEFAULT_MODEL,
                        messages: [{ role: 'system', content: systemMsg }, ...recentHistory, { role: 'user',
                            content: userMessage }],
                        temperature: 0.85,
                        max_tokens: 150
                    })
                });
                if (!response.ok) throw new Error(`API error ${response.status}`);
                const data = await response.json();
                const reply = data.choices[0].message.content.trim();
                if (indicator && indicator.parentNode) indicator.remove();
                await new Promise(r => setTimeout(r, 1000 + Math.random() * 1500));
                addMessageToConversation(memberId, reply, false);
                if (currentOpenMemberId === memberId) renderMessages(memberId);
            } catch (err) {
                console.error(err);
                if (indicator && indicator.parentNode) indicator.remove();
                const errorMsg = '[Signal lost. Message undelivered.]';
                addMessageToConversation(memberId, errorMsg, false);
                if (currentOpenMemberId === memberId) renderMessages(memberId);
                updateStatus('⚠️ ' + err.message, 4000);
            }
        }

        function renderRequests() {
            const container = document.getElementById('requestsList');
            if (!container) return;
            if (friendRequests.length === 0) {
                container.innerHTML =
                    '<div class="empty-state">🔔 NO PENDING REQUESTS<br><span style="font-size:9px;">Members may send requests soon...</span></div>';
                return;
            }
            container.innerHTML = friendRequests.map(req => {
                const member = getMemberById(req.memberId);
                if (!member) return '';
                return `
              <div class="member-item">
                <div class="member-icon">${member.icon}</div>
                <div class="member-info">
                  <div class="member-name">${escapeHtml(member.name)}</div>
                  <div class="member-bio">${escapeHtml(member.bio)} · ${member.age} · ${member.sex}</div>
                  <div class="member-bio">Requested ${new Date(req.timestamp).toLocaleDateString()}</div>
                </div>
                <div class="member-actions">
                  <button class="retro-btn small accept-req" data-member-id="${member.id}">✓ ACCEPT</button>
                  <button class="retro-btn small refuse-req" data-member-id="${member.id}" style="border-color:#886633;color:#ccaa44;">✗ REFUSE</button>
                  <button class="retro-btn small danger block-req" data-member-id="${member.id}">🚫 BLOCK</button>
                </div>
              </div>
            `;
            }).join('');
            container.querySelectorAll('.accept-req').forEach(btn => {
                btn.addEventListener('click', () => acceptFriendRequest(btn.dataset.memberId));
            });
            container.querySelectorAll('.refuse-req').forEach(btn => {
                btn.addEventListener('click', () => refuseFriendRequest(btn.dataset.memberId));
            });
            container.querySelectorAll('.block-req').forEach(btn => {
                btn.addEventListener('click', () => blockFromRequest(btn.dataset.memberId));
            });
        }

        function acceptFriendRequest(memberId) {
            friendRequests = friendRequests.filter(r => r.memberId !== memberId);
            if (!friends.includes(memberId)) friends.push(memberId);
            saveAllData();
            renderRequests();
            renderFriends();
            renderInbox();
            populateComposeSelect();
            updateStatus('Friend request accepted ✓');
        }

        function refuseFriendRequest(memberId) {
            friendRequests = friendRequests.filter(r => r.memberId !== memberId);
            saveAllData();
            renderRequests();
            updateStatus('Friend request refused');
        }

        function blockFromRequest(memberId) {
            friendRequests = friendRequests.filter(r => r.memberId !== memberId);
            friends = friends.filter(f => f !== memberId);
            if (!blocked.includes(memberId)) blocked.push(memberId);
            delete conversations[memberId];
            saveAllData();
            renderRequests();
            renderFriends();
            renderInbox();
            populateComposeSelect();
            updateStatus('Member blocked 🚫');
        }

        function renderFriends() {
            const container = document.getElementById('friendsList');
            if (!container) return;
            const friendMembers = members.filter(m => friends.includes(m.id) && !isBlocked(m.id));
            if (friendMembers.length === 0) {
                container.innerHTML =
                    '<div class="empty-state">💚 NO FRIENDS YET<br><span style="font-size:9px;">Accept requests or send messages to connect.</span></div>';
                return;
            }
            container.innerHTML = friendMembers.map(member => `
            <div class="member-item" data-member-id="${member.id}">
              <div class="member-icon">${member.icon}</div>
              <div class="member-info">
                <div class="member-name">${escapeHtml(member.name)}</div>
                <div class="member-bio">${escapeHtml(member.bio)} · ${member.age} · ${member.sex}</div>
              </div>
              <div class="member-actions">
                <button class="retro-btn small chat-friend" data-member-id="${member.id}">💬 CHAT</button>
                <button class="retro-btn small unfriend-btn" data-member-id="${member.id}" style="border-color:#886633;color:#ccaa44;">UNFRIEND</button>
                <button class="retro-btn small danger block-friend" data-member-id="${member.id}">🚫 BLOCK</button>
              </div>
            </div>
          `).join('');
            container.querySelectorAll('.chat-friend').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelector('.tab[data-tab="inbox"]').click();
                    openChat(btn.dataset.memberId);
                });
            });
            container.querySelectorAll('.unfriend-btn').forEach(btn => {
                btn.addEventListener('click', () => unfriendMember(btn.dataset.memberId));
            });
            container.querySelectorAll('.block-friend').forEach(btn => {
                btn.addEventListener('click', () => blockMember(btn.dataset.memberId));
            });
        }

        function unfriendMember(memberId) {
            friends = friends.filter(f => f !== memberId);
            saveAllData();
            renderFriends();
            updateStatus('Unfriended');
        }

        function blockMember(memberId) {
            friends = friends.filter(f => f !== memberId);
            friendRequests = friendRequests.filter(r => r.memberId !== memberId);
            if (!blocked.includes(memberId)) blocked.push(memberId);
            delete conversations[memberId];
            saveAllData();
            renderFriends();
            renderRequests();
            renderInbox();
            populateComposeSelect();
            updateStatus('Member blocked 🚫');
        }

        function populateComposeSelect() {
            const select = document.getElementById('composeContactSelect');
            if (!select) return;
            const availableMembers = members.filter(m => !isBlocked(m.id));
            select.innerHTML = '<option value="">-- Select a member --</option>' +
                availableMembers.map(m => {
                    const label = `${m.name} ${m.icon} · ${m.age} · ${m.sex}${isFriend(m.id) ? ' [FRIEND]' : ''}${hasPendingRequest(m.id) ? ' [REQUESTED]' : ''}`;
                    return `<option value="${m.id}">${label}</option>`;
                }).join('');
        }

        async function sendComposeMessage() {
            const memberId = document.getElementById('composeContactSelect').value;
            const msg = document.getElementById('composeMessage').value.trim();
            if (!memberId || !msg) return;
            if (isBlocked(memberId)) {
                updateStatus('Cannot message blocked member', 3000);
                return;
            }
            addMessageToConversation(memberId, msg, true);
            await sendAIResponse(memberId, msg);
            document.getElementById('composeMessage').value = '';
            updateStatus('Message sent ✓');
            // Switch to inbox and open chat
            document.querySelector('.tab[data-tab="inbox"]').click();
            setTimeout(() => openChat(memberId), 300);
        }

        function updateStatus(msg, duration = 3000) {
            const el = document.getElementById('globalStatus').querySelector('span');
            const original = el.innerText;
            el.innerText = msg;
            setTimeout(() => { el.innerText = original; }, duration);
        }

        // ==================== PERIODIC EVENTS ====================
        let lastAutoEventTime = Date.now();

        async function triggerAutoEvent() {
            if (!openRouterKey) return;
            if (Date.now() - lastAutoEventTime < 30000) return;
            lastAutoEventTime = Date.now();
            const availableMembers = members.filter(m => !isBlocked(m.id) && !isFriend(m.id) && !hasPendingRequest(m
                .id));
            if (availableMembers.length === 0) return;
            const roll = Math.random();
            if (roll < 0.4) {
                // Send friend request from a random member
                const member = availableMembers[Math.floor(Math.random() * availableMembers.length)];
                friendRequests.push({ memberId: member.id, timestamp: Date.now() });
                saveAllData();
                renderRequests();
                updateStatus(`🔔 Friend request from ${member.name}!`);
            } else if (roll < 0.75) {
                // Send unsolicited message from a random available member
                const member = availableMembers[Math.floor(Math.random() * availableMembers.length)];
                await generateUnsolicitedMessage(member);
            } else if (friends.length > 0 && roll < 0.9) {
                // Message from an existing friend
                const friendMembers = members.filter(m => friends.includes(m.id) && !isBlocked(m.id));
                if (friendMembers.length > 0) {
                    const member = friendMembers[Math.floor(Math.random() * friendMembers.length)];
                    await generateUnsolicitedMessage(member);
                }
            }
        }

        async function generateUnsolicitedMessage(member) {
            if (!openRouterKey || isBlocked(member.id)) return;
            const systemUnsolicited = `You are ${member.name}, a ${member.age}-year-old ${member.sex} on a dating app called Creeper. Your bio: "${member.bio}". Reach out with a short, intriguing first message (1-2 sentences) that fits your personality. Do not break character. No quotes, no labels.`;
            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${openRouterKey}`,
                        'HTTP-Referer': window.location.href || 'https://creeper.app',
                        'X-Title': 'Creeper - Nightfall Games 1984'
                    },
                    body: JSON.stringify({
                        model: DEFAULT_MODEL,
                        messages: [{ role: 'system', content: systemUnsolicited }],
                        temperature: 0.9,
                        max_tokens: 80
                    })
                });
                if (!response.ok) return;
                const data = await response.json();
                let msgText = data.choices[0].message.content.trim();
                if (msgText) {
                    addMessageToConversation(member.id, msgText, false);
                    updateStatus(`📩 New message from ${member.name}!`);
                    renderInbox();
                }
            } catch (e) { console.warn('Unsolicited message error:', e); }
        }

        // ==================== API KEY MODAL ====================
        function openApiModal() { document.getElementById('apiModal').style.display = 'flex'; }

        function closeApiModal() { document.getElementById('apiModal').style.display = 'none'; }

        function saveApiKey() {
            const newKey = document.getElementById('apiKeyInput').value.trim();
            if (newKey.startsWith('sk-or-') && newKey.length > 15) {
                openRouterKey = newKey;
                localStorage.setItem('creeper_api_key', openRouterKey);
                closeApiModal();
                updateStatus('✅ API key set. The network awakens.', 4000);
                if (window.autoEventInterval) clearInterval(window.autoEventInterval);
                window.autoEventInterval = setInterval(() => triggerAutoEvent(), 28000);
            } else {
                alert('Invalid OpenRouter API key. Should start with sk-or-');
            }
        }

        function resetApiKey() {
            localStorage.removeItem('creeper_api_key');
            openRouterKey = '';
            openApiModal();
            updateStatus('API key reset. Enter new key.');
            if (window.autoEventInterval) clearInterval(window.autoEventInterval);
        }

        // ==================== EVENT HANDLERS ====================
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.dataset.tab;
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById(target + 'Panel').classList.add('active');
                if (target === 'profile') loadProfileForm();
                if (target === 'inbox') renderInbox();
                if (target === 'requests') renderRequests();
                if (target === 'friends') renderFriends();
                if (target === 'compose') populateComposeSelect();
            });
        });

        document.getElementById('saveProfileBtn')?.addEventListener('click', saveProfile);
        document.getElementById('sendComposeBtn')?.addEventListener('click', sendComposeMessage);
        document.getElementById('saveApiKeyBtn')?.addEventListener('click', saveApiKey);
        document.getElementById('closeApiModalBtn')?.addEventListener('click', closeApiModal);
        document.getElementById('resetApiKeyBtn')?.addEventListener('click', resetApiKey);
        window.addEventListener('click', (e) => { if (e.target === document.getElementById('apiModal')) closeApiModal(); });

        // ==================== CLOCK ====================
        function updateClock() {
            const now = new Date();
            document.getElementById('statusClock').innerText = now.toLocaleTimeString([], { hour: '2-digit',
                minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ==================== INITIALIZATION ====================
        loadAllData();
        loadProfileForm();
        renderInbox();
        renderRequests();
        renderFriends();
        populateComposeSelect();

        if (!openRouterKey) {
            setTimeout(openApiModal, 600);
            document.getElementById('globalStatus').querySelector('span').innerText =
                '⚠️ Set OpenRouter API key to activate.';
        } else {
            window.autoEventInterval = setInterval(() => triggerAutoEvent(), 28000);
            // Initial welcome: maybe a request or message within 10 seconds
            setTimeout(() => triggerAutoEvent(), 8000);
        }

        // Also trigger events when switching to inbox
        const inboxTab = document.querySelector('.tab[data-tab="inbox"]');
        if (inboxTab) {
            const observer = new MutationObserver(() => {
                if (inboxTab.classList.contains('active') && openRouterKey) {
                    renderInbox();
                }
            });
            observer.observe(inboxTab, { attributes: true, attributeFilter: ['class'] });
        }

        console.log('🟢 CREEPER v1.0 · NIGHTFALL GAMES 1984 · OpenRouter Edition');
        console.log('👤 Profile | 📥 Inbox | 🔔 Requests | 💚 Friends | ✏️ Compose');
    </script>
</body>
</html>
