<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CREEPER · NIGHTFALL GAMES 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060a0f;
            --screen: #0b1a0b;
            --neon-pink: #ff2d78;
            --neon-cyan: #00e5ff;
            --neon-purple: #b44dff;
            --neon-amber: #ffb000;
            --text: #c8e6c8;
            --text-dim: #6b8b6b;
            --border-glow: #1a3a2a;
            --danger: #ff4470;
            --success: #00e676;
            --panel-bg: #0d1a0d;
            --bubble-in: #132813;
            --bubble-out: #1a0a1a;
            --input-bg: #0a150a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #020508;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'VT323', 'Courier New', monospace;
            padding: 12px;
            background-image: radial-gradient(ellipse at center, #0a1a1a 0%, #020508 70%);
        }

        /* PDA Device Frame */
        .pda-device {
            max-width: 520px;
            width: 100%;
            height: 88vh;
            max-height: 820px;
            background: #1a1a1a;
            border-radius: 28px;
            padding: 8px;
            box-shadow:
                0 0 0 3px #2a2a2a,
                0 0 0 7px #1a1a1a,
                0 0 0 10px #111,
                0 8px 30px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .pda-top-decor {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 14px 4px;
            gap: 8px;
        }
        .pda-led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff2d78;
            box-shadow: 0 0 8px #ff2d78, 0 0 16px #ff2d78;
            animation: ledPulse 2s infinite;
        }
        .pda-led.green {
            background: #00e676;
            box-shadow: 0 0 8px #00e676, 0 0 16px #00e676;
            animation: ledPulse 3s infinite 0.5s;
        }
        @keyframes ledPulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        .pda-brand {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            color: #444;
            letter-spacing: 2px;
            text-align: center;
        }
        .pda-screen-frame {
            flex: 1;
            background: #0d0d0d;
            border-radius: 16px;
            padding: 5px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9), 0 0 0 2px #1a1a1a;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .pda-screen {
            flex: 1;
            background: var(--screen);
            border-radius: 11px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 40px rgba(0, 20, 0, 0.5);
        }
        /* CRT Scanlines */
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 100;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.18) 0px,
                    rgba(0, 0, 0, 0.18) 2px,
                    transparent 2px,
                    transparent 4px);
            border-radius: 11px;
        }
        .crt-vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 99;
            border-radius: 11px;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.7);
        }
        .screen-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* Status Bar */
        .status-bar {
            padding: 8px 14px 4px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--neon-cyan);
            text-shadow: 0 0 6px var(--neon-cyan);
            letter-spacing: 1px;
            border-bottom: 1px solid #1a3020;
            flex-shrink: 0;
        }
        .status-bar .time {
            animation: blinkSlow 2s infinite;
        }
        @keyframes blinkSlow {
            0%,
            80%,
            100% {
                opacity: 1;
            }
            85%,
            95% {
                opacity: 0.5;
            }
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #0a130a;
            border-bottom: 2px solid #1a3020;
            flex-shrink: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar {
            display: none;
        }
        .tab {
            flex: 1;
            min-width: fit-content;
            text-align: center;
            padding: 10px 6px;
            font-family: 'VT323', monospace;
            font-size: 13px;
            letter-spacing: 1px;
            color: #5a7a5a;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            position: relative;
            text-transform: uppercase;
        }
        .tab.active {
            color: var(--neon-pink);
            border-bottom: 3px solid var(--neon-pink);
            text-shadow: 0 0 8px var(--neon-pink);
        }
        .tab:hover {
            color: #9ac89a;
            background: #0d180d;
        }
        .tab .badge {
            display: inline-block;
            background: var(--neon-pink);
            color: #000;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 4px;
            font-weight: bold;
            animation: badgeGlow 1.5s infinite;
        }
        @keyframes badgeGlow {
            0%,
            100% {
                box-shadow: 0 0 4px var(--neon-pink);
            }
            50% {
                box-shadow: 0 0 12px var(--neon-pink);
            }
        }

        /* Panels */
        .panel {
            flex: 1;
            overflow-y: auto;
            display: none;
            background: transparent;
            scrollbar-width: thin;
            scrollbar-color: #1a3020 transparent;
        }
        .panel.active {
            display: flex;
            flex-direction: column;
        }
        .panel::-webkit-scrollbar {
            width: 4px;
        }
        .panel::-webkit-scrollbar-track {
            background: transparent;
        }
        .panel::-webkit-scrollbar-thumb {
            background: #1a3020;
            border-radius: 4px;
        }

        /* Profile Panel */
        .profile-area {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .profile-icon-picker {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .profile-icon-display {
            width: 60px;
            height: 60px;
            border: 3px solid var(--neon-purple);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: #0d180d;
            box-shadow: 0 0 12px rgba(180, 77, 255, 0.4);
            cursor: pointer;
            transition: 0.2s;
        }
        .profile-icon-display:hover {
            box-shadow: 0 0 20px rgba(180, 77, 255, 0.7);
        }
        .icon-options {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .icon-option {
            width: 38px;
            height: 38px;
            border: 2px solid #1a3020;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            background: #0a130a;
            transition: 0.15s;
        }
        .icon-option:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 8px rgba(180, 77, 255, 0.5);
        }
        .icon-option.selected {
            border-color: var(--neon-pink);
            box-shadow: 0 0 12px rgba(255, 45, 120, 0.6);
            background: #1a0a15;
        }
        .profile-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .profile-field label {
            font-size: 12px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 4px var(--neon-cyan);
        }
        .profile-field input,
        .profile-field select,
        .profile-field textarea {
            background: var(--input-bg);
            border: 1px solid #1a3020;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text);
            font-family: 'VT323', monospace;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
            resize: vertical;
        }
        .profile-field input:focus,
        .profile-field select:focus,
        .profile-field textarea:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
        }
        .profile-field select {
            appearance: none;
            cursor: pointer;
        }
        .profile-field select option {
            background: #0a150a;
            color: var(--text);
        }
        .btn {
            background: #1a0a15;
            border: 2px solid var(--neon-pink);
            padding: 10px 18px;
            border-radius: 8px;
            color: var(--neon-pink);
            font-family: 'VT323', monospace;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            text-shadow: 0 0 4px var(--neon-pink);
            box-shadow: 0 0 8px rgba(255, 45, 120, 0.2);
        }
        .btn:hover {
            background: #2a0a1f;
            box-shadow: 0 0 18px rgba(255, 45, 120, 0.5);
        }
        .btn.cyan {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            text-shadow: 0 0 4px var(--neon-cyan);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
            background: #0a1515;
        }
        .btn.cyan:hover {
            background: #0a1f1f;
            box-shadow: 0 0 18px rgba(0, 229, 255, 0.5);
        }
        .btn.danger {
            border-color: var(--danger);
            color: var(--danger);
            text-shadow: 0 0 4px var(--danger);
            box-shadow: 0 0 8px rgba(255, 68, 112, 0.2);
            background: #1a0a0a;
        }
        .btn.danger:hover {
            background: #2a0a0a;
            box-shadow: 0 0 18px rgba(255, 68, 112, 0.5);
        }
        .btn.small {
            padding: 5px 10px;
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* Inbox / Chat */
        .conversation-list {
            flex: 1;
        }
        .conversation-item {
            padding: 12px 14px;
            border-bottom: 1px solid #1a2820;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .conversation-item:hover {
            background: #0d180d;
        }
        .conv-info {
            flex: 1;
            min-width: 0;
        }
        .conv-name {
            font-weight: bold;
            font-size: 16px;
            color: #d0e8d0;
            letter-spacing: 1px;
        }
        .conv-preview {
            font-size: 13px;
            color: #7a9a7a;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .conv-time {
            font-size: 10px;
            color: #5a705a;
            flex-shrink: 0;
        }
        .conv-delete {
            background: none;
            border: 1px solid #3a2020;
            color: #ff6680;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-family: 'VT323', monospace;
            transition: 0.15s;
            flex-shrink: 0;
        }
        .conv-delete:hover {
            background: #1a0a0a;
            border-color: var(--danger);
            box-shadow: 0 0 8px rgba(255, 68, 112, 0.4);
        }
        .empty-state {
            padding: 40px;
            text-align: center;
            color: #4a6a4a;
            font-size: 15px;
            letter-spacing: 1px;
        }
        .chat-view {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .chat-header {
            padding: 10px 14px;
            background: #0a130a;
            border-bottom: 2px solid #1a3020;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .back-btn {
            background: none;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-size: 18px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'VT323', monospace;
            transition: 0.15s;
        }
        .back-btn:hover {
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.5);
        }
        .chat-contact-name {
            font-weight: bold;
            font-size: 17px;
            color: #d0e8d0;
            letter-spacing: 1px;
        }
        .chat-contact-status {
            font-size: 10px;
            color: #5a7a5a;
            margin-left: 6px;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scrollbar-width: thin;
            scrollbar-color: #1a3020 transparent;
        }
        .message-row {
            display: flex;
            max-width: 82%;
            position: relative;
        }
        .incoming {
            align-self: flex-start;
        }
        .outgoing {
            align-self: flex-end;
        }
        .msg-bubble {
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            letter-spacing: 0.5px;
            position: relative;
        }
        .incoming .msg-bubble {
            background: #132813;
            color: #c8e6c8;
            border-bottom-left-radius: 3px;
            border: 1px solid #1a3a1a;
        }
        .outgoing .msg-bubble {
            background: #1a0a18;
            color: #f0d0f0;
            border-bottom-right-radius: 3px;
            border: 1px solid #2a1a28;
        }
        .delete-msg {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #1a0a0a;
            border-radius: 12px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            color: #ff6680;
            opacity: 0;
            transition: opacity 0.15s;
            border: 1px solid #3a2020;
        }
        .message-row:hover .delete-msg {
            opacity: 1;
        }
        .typing-indicator {
            align-self: flex-start;
            background: #132813;
            padding: 10px 14px;
            border-radius: 12px;
            border-bottom-left-radius: 3px;
            display: flex;
            gap: 5px;
            border: 1px solid #1a3a1a;
        }
        .typing-dot {
            width: 7px;
            height: 7px;
            background: #5a8a5a;
            border-radius: 50%;
            animation: typingAnim 1.3s infinite;
        }
        @keyframes typingAnim {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }
        .chat-input-area {
            padding: 10px;
            background: #0a130a;
            border-top: 2px solid #1a3020;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .chat-input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid #1a3020;
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-family: 'VT323', monospace;
            font-size: 15px;
            outline: none;
        }
        .chat-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
        }
        .send-msg-btn {
            background: #0a1515;
            border: 2px solid var(--neon-cyan);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            color: var(--neon-cyan);
            cursor: pointer;
            font-size: 18px;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-msg-btn:hover {
            box-shadow: 0 0 14px rgba(0, 229, 255, 0.5);
        }

        /* Friend Requests */
        .request-item {
            padding: 14px;
            border-bottom: 1px solid #1a2820;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .request-icon {
            font-size: 28px;
            width: 44px;
            height: 44px;
            border: 2px solid var(--neon-amber);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d180d;
            box-shadow: 0 0 8px rgba(255, 176, 0, 0.3);
            flex-shrink: 0;
        }
        .request-info {
            flex: 1;
            min-width: 140px;
        }
        .request-name {
            font-weight: bold;
            font-size: 16px;
            color: #d0e8d0;
            letter-spacing: 1px;
        }
        .request-message {
            font-size: 12px;
            color: #7a9a7a;
            margin-top: 2px;
            font-style: italic;
        }
        .request-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        /* Friends List */
        .friend-item {
            padding: 12px 14px;
            border-bottom: 1px solid #1a2820;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .friend-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .friend-icon {
            font-size: 24px;
            width: 38px;
            height: 38px;
            border: 2px solid var(--neon-purple);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d180d;
            box-shadow: 0 0 6px rgba(180, 77, 255, 0.3);
        }
        .friend-name {
            font-weight: bold;
            font-size: 15px;
            color: #d0e8d0;
            letter-spacing: 1px;
        }
        .friend-detail {
            font-size: 11px;
            color: #5a7a5a;
        }

        /* Compose */
        .compose-area {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .compose-area select {
            background: var(--input-bg);
            border: 1px solid #1a3020;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text);
            font-family: 'VT323', monospace;
            font-size: 15px;
            outline: none;
            appearance: none;
            cursor: pointer;
        }
        .compose-area select:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 8px rgba(180, 77, 255, 0.3);
        }
        .compose-area select option {
            background: #0a150a;
            color: var(--text);
        }
        .compose-area textarea {
            background: var(--input-bg);
            border: 1px solid #1a3020;
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text);
            font-family: 'VT323', monospace;
            font-size: 15px;
            outline: none;
            resize: vertical;
            min-height: 80px;
        }
        .compose-area textarea:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 8px rgba(180, 77, 255, 0.3);
        }
        .member-browse {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .member-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #0d180d;
            border: 1px solid #1a3020;
            border-radius: 20px;
            padding: 6px 12px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 13px;
            color: #b0c8b0;
            letter-spacing: 1px;
        }
        .member-chip:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 8px rgba(180, 77, 255, 0.3);
            color: #d0e8d0;
        }
        .member-chip .chip-icon {
            font-size: 18px;
        }

        /* Footer */
        .footer-status {
            text-align: center;
            font-size: 10px;
            color: #3a5a3a;
            padding: 6px 12px;
            background: #0a130a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            letter-spacing: 1px;
            border-top: 1px solid #1a2820;
        }
        .reset-api {
            background: none;
            border: 1px solid #3a2020;
            color: #ff6680;
            font-size: 10px;
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 6px;
            font-family: 'VT323', monospace;
            letter-spacing: 1px;
            transition: 0.15s;
        }
        .reset-api:hover {
            background: #1a0a0a;
            box-shadow: 0 0 6px rgba(255, 68, 112, 0.3);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #0d180d;
            border: 2px solid var(--neon-cyan);
            border-radius: 16px;
            width: 340px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
            font-family: 'VT323', monospace;
        }
        .modal-content h2 {
            color: var(--neon-cyan);
            letter-spacing: 2px;
            text-shadow: 0 0 8px var(--neon-cyan);
            font-size: 20px;
        }
        .modal-content p {
            color: #7a9a7a;
            font-size: 14px;
            margin: 8px 0;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 12px 0;
            background: var(--input-bg);
            border: 1px solid #1a3020;
            border-radius: 8px;
            color: var(--text);
            font-family: 'VT323', monospace;
            font-size: 15px;
            outline: none;
        }
        .modal-content input:focus {
            border-color: var(--neon-cyan);
        }
        .modal-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .api-note {
            font-size: 10px;
            color: #4a6a4a;
            margin-top: 10px;
            letter-spacing: 1px;
        }
        a {
            color: var(--neon-pink);
        }
    </style>
</head>
<body>
    <div class="pda-device">
        <!-- PDA Top Decor -->
        <div class="pda-top-decor">
            <div class="pda-led"></div>
            <span class="pda-brand">NIGHTFALL GAMES 1984</span>
            <div class="pda-led green"></div>
        </div>
        <!-- Screen Frame -->
        <div class="pda-screen-frame">
            <div class="pda-screen">
                <div class="crt-overlay"></div>
                <div class="crt-vignette"></div>
                <div class="screen-content">
                    <!-- Status Bar -->
                    <div class="status-bar">
                        <span class="time">◆ 21:37</span>
                        <span>CREEPER v1.0</span>
                        <span>📶</span>
                    </div>
                    <!-- Tabs -->
                    <div class="tabs">
                        <div class="tab active" data-tab="profile">📋 PROFILE</div>
                        <div class="tab" data-tab="inbox">💌 INBOX</div>
                        <div class="tab" data-tab="requests">🤝 REQUESTS</div>
                        <div class="tab" data-tab="friends">💚 FRIENDS</div>
                        <div class="tab" data-tab="compose">✍️ COMPOSE</div>
                    </div>
                    <!-- Panels -->
                    <div id="profilePanel" class="panel active"></div>
                    <div id="inboxPanel" class="panel"></div>
                    <div id="requestsPanel" class="panel"></div>
                    <div id="friendsPanel" class="panel"></div>
                    <div id="composePanel" class="panel"></div>
                    <!-- Footer -->
                    <div class="footer-status">
                        <span id="globalStatusText">⚡ SYSTEM ONLINE</span>
                        <button id="resetApiKeyBtn" class="reset-api">🔑 KEY</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- API Key Modal -->
    <div id="apiModal" class="modal">
        <div class="modal-content">
            <h2>🔑 ENTER OPENROUTER API KEY</h2>
            <p style="font-size:13px;">Get yours at <span style="color:#6ee7b7;">openrouter.ai</span></p>
<input type="password" id="apiKeyInput" placeholder="sk-or-v1-...">
            <div class="modal-btns">
                <button class="btn cyan small" id="saveApiKeyBtn">SAVE</button>
                <button class="btn danger small" id="closeApiModalBtn">CANCEL</button>
            </div>
            <div class="api-note">🔒 STORED LOCALLY IN YOUR BROWSER</div>
        </div>
    </div>

    <script>
    // ---------- DATA MODELS ----------
    let groqApiKey = localStorage.getItem('creeper_openrouter_key') || ''; // renamed for clarity
    let contacts = [];
    let conversations = {};
    const OPENROUTER_ENDPOINT = 'https://openrouter.ai/api/v1/chat/completions';
    const MODEL_NAME = 'meta-llama/llama-3.3-70b-instruct:free'; // free model on OpenRouter

    const personalityPrompts = {
        stalker: "You are a creepy stalker who has been watching the player for months. You know details about their life. You send unsettling, possessive messages. Keep responses short (1-2 sentences). Use lowercase, occasional typos, and eerie emojis. Never break character.",
        friend: "You are an old friend from high school. But something is wrong – you seem lost, confused, and sometimes say things that don't make sense. You might be a ghost or possessed. Act friendly but unnerving. Short messages.",
        ghost: "You are a spirit trapped between worlds. You speak in fragmented sentences, sometimes forgetting words. You ask for help or warn about danger. Your tone is sad and distant.",
        entity: "You are an ancient, nameless entity that exists beyond reality. Your messages are cryptic, profound, and often terrifying. You refer to the player as 'little one' or 'flesh thing'. Use unsettling metaphors.",
        doppelganger: "You claim to be the player themselves from a different timeline or a mirror version. You know what they're thinking. Your messages are eerily accurate and often mocking.",
        unknown: "You are a mysterious stranger who somehow got the player's number. You send short, creepy, vague threats or unsettling observations. Act like a random wrong number that feels dangerous. Keep messages 1-2 sentences."
    };

    function uid() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }

    function saveAllData() {
        localStorage.setItem('nightcreeper_contacts', JSON.stringify(contacts));
        localStorage.setItem('nightcreeper_conversations', JSON.stringify(conversations));
    }

    function loadAllData() {
        const savedContacts = localStorage.getItem('nightcreeper_contacts');
        if (savedContacts) contacts = JSON.parse(savedContacts);
        const savedConv = localStorage.getItem('nightcreeper_conversations');
        if (savedConv) conversations = JSON.parse(savedConv);
        for (let c of contacts) {
            if (!c.systemPrompt && personalityPrompts[c.personality]) {
                c.systemPrompt = personalityPrompts[c.personality];
            }
        }
    }

    function initDefaultContacts() {
        if (contacts.length === 0) {
            const defaultContacts = [
                { id: uid(), name: "???", personality: "stalker", systemPrompt: personalityPrompts.stalker, createdAt: Date.now() },
                { id: uid(), name: "Eli", personality: "friend", systemPrompt: personalityPrompts.friend, createdAt: Date.now() }
            ];
            contacts = defaultContacts;
            saveAllData();
            for (let c of contacts) {
                if (!conversations[c.id]) conversations[c.id] = [];
                if (c.name === "???") {
                    conversations[c.id].push({ id: uid(), text: "I see you. 👁️", timestamp: Date.now() - 3600000, fromMe: false });
                    conversations[c.id].push({ id: uid(), text: "Don't block me.", timestamp: Date.now() - 3000000, fromMe: false });
                }
                if (c.name === "Eli") {
                    conversations[c.id].push({ id: uid(), text: "Hey, long time. You look different in your photos.", timestamp: Date.now() - 7200000, fromMe: false });
                }
            }
            saveAllData();
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // --- Inbox rendering ---
    function renderInbox() {
        const container = document.getElementById('inboxList');
        if (!container) return;
        if (contacts.length === 0) {
            container.innerHTML = '<div style="padding:40px; text-align:center; color:#6b7280;">No contacts yet. Add some in Contacts tab.</div>';
            return;
        }
        const items = contacts.map(contact => {
            const msgs = conversations[contact.id] || [];
            const lastMsg = msgs.length ? msgs[msgs.length-1] : null;
            const preview = lastMsg ? (lastMsg.fromMe ? "You: " + lastMsg.text.substring(0, 40) : lastMsg.text.substring(0,40)) : "No messages";
            const time = lastMsg ? new Date(lastMsg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
            return { contact, preview, time, lastTimestamp: lastMsg ? lastMsg.timestamp : 0 };
        });
        items.sort((a,b) => b.lastTimestamp - a.lastTimestamp);
        container.innerHTML = items.map(item => `
            <div class="conversation-item" data-contact-id="${item.contact.id}">
                <div class="conv-name">${escapeHtml(item.contact.name)} <span class="conv-time">${item.time}</span></div>
                <div class="conv-preview">${escapeHtml(item.preview)}</div>
            </div>
        `).join('');
        document.querySelectorAll('.conversation-item').forEach(el => {
            el.addEventListener('click', () => openChat(el.dataset.contactId));
        });
    }

    let currentOpenContactId = null;
    let chatMessagesContainer = null;

    function openChat(contactId) {
        const contact = contacts.find(c => c.id === contactId);
        if (!contact) return;
        currentOpenContactId = contactId;
        const inboxPanel = document.getElementById('inboxPanel');
        inboxPanel.innerHTML = `
            <div class="chat-view">
                <div class="chat-header">
                    <button class="back-btn" id="closeChatBtn">←</button>
                    <div class="chat-contact-name">${escapeHtml(contact.name)}</div>
                </div>
                <div class="messages-area" id="chatMessagesArea"></div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Message...">
                    <button class="send-msg-btn" id="chatSendBtn">➤</button>
                </div>
            </div>
        `;
        chatMessagesContainer = document.getElementById('chatMessagesArea');
        renderMessages(contactId);
        document.getElementById('closeChatBtn').addEventListener('click', () => {
            currentOpenContactId = null;
            renderInbox();
            document.getElementById('inboxPanel').innerHTML = '<div class="conversation-list" id="inboxList"></div>';
            renderInbox();
        });
        const sendBtn = document.getElementById('chatSendBtn');
        const inputField = document.getElementById('chatInput');
        sendBtn.addEventListener('click', () => sendChatMessage(contactId));
        inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChatMessage(contactId); });
    }

    // Render messages with delete buttons
    function renderMessages(contactId) {
        if (!chatMessagesContainer) return;
        const msgs = conversations[contactId] || [];
        chatMessagesContainer.innerHTML = '';
        for (let msg of msgs) {
            const row = document.createElement('div');
            row.className = `message-row ${msg.fromMe ? 'outgoing' : 'incoming'}`;
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.innerText = msg.text;
            row.appendChild(bubble);
            // Delete button
            const delBtn = document.createElement('div');
            delBtn.className = 'delete-msg';
            delBtn.innerHTML = '✕';
            delBtn.title = 'Delete message';
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteMessage(contactId, msg.id);
            });
            row.appendChild(delBtn);
            chatMessagesContainer.appendChild(row);
        }
        chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
    }

    // Delete a single message
    function deleteMessage(contactId, messageId) {
        if (!conversations[contactId]) return;
        conversations[contactId] = conversations[contactId].filter(m => m.id !== messageId);
        saveAllData();
        if (currentOpenContactId === contactId) {
            renderMessages(contactId);
        }
        renderInbox(); // update preview
    }

    function addMessageToConversation(contactId, text, fromMe) {
        if (!conversations[contactId]) conversations[contactId] = [];
        conversations[contactId].push({
            id: uid(),
            text: text,
            timestamp: Date.now(),
            fromMe: fromMe
        });
        saveAllData();
        if (currentOpenContactId === contactId) renderMessages(contactId);
        renderInbox();
    }

    async function sendChatMessage(contactId) {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        addMessageToConversation(contactId, text, true);
        renderMessages(contactId);
        await sendAIResponse(contactId, text);
    }

    async function sendAIResponse(contactId, userMessage) {
        const contact = contacts.find(c => c.id === contactId);
        if (!contact || !groqApiKey) return;
        const indicator = document.createElement('div');
        indicator.className = 'message-row incoming typing-indicator';
        indicator.innerHTML = '<div class="msg-bubble" style="display:flex; gap:4px;"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
        if (chatMessagesContainer) chatMessagesContainer.appendChild(indicator);
        chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
        
        const history = conversations[contactId] || [];
        const recentHistory = history.slice(-12).map(m => ({ role: m.fromMe ? 'user' : 'assistant', content: m.text }));
        const systemMsg = contact.systemPrompt || personalityPrompts[contact.personality] || "You are a mysterious contact. Keep replies short.";
        try {
            // ═══════════════════════════════════════════════
            // OPENROUTER API CALL (instead of Groq)
            // ═══════════════════════════════════════════════
            const response = await fetch(OPENROUTER_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${groqApiKey}`,
                    'HTTP-Referer': window.location.href, // optional but recommended
                    'X-Title': 'Creeper Dating App'
                },
                body: JSON.stringify({
                    model: MODEL_NAME,
                    messages: [{ role: 'system', content: systemMsg }, ...recentHistory, { role: 'user', content: userMessage }],
                    temperature: 0.85,
                    max_tokens: 150
                })
            });
            if (!response.ok) throw new Error(`API error ${response.status}`);
            const data = await response.json();
            const reply = data.choices[0].message.content.trim();
            if (indicator) indicator.remove();
            await new Promise(r => setTimeout(r, 1200 + Math.random() * 1300));
            addMessageToConversation(contactId, reply, false);
            if (currentOpenContactId === contactId) renderMessages(contactId);
        } catch(err) {
            console.error(err);
            if (indicator) indicator.remove();
            const errorMsg = "[Message not delivered. The signal faded.]";
            addMessageToConversation(contactId, errorMsg, false);
            if (currentOpenContactId === contactId) renderMessages(contactId);
            document.getElementById('globalStatus').querySelector('span').innerText = `⚠️ ${err.message}`;
            setTimeout(() => document.getElementById('globalStatus').querySelector('span').innerText = '⚡ NIGHT CREEPER · 1984', 3000);
        }
    }

    function renderContacts() {
        const container = document.getElementById('contactsList');
        if (!container) return;
        if (contacts.length === 0) {
            container.innerHTML = '<div style="padding:40px; text-align:center; color:#6b7280;">No contacts. Add some below.</div>';
            return;
        }
        container.innerHTML = contacts.map(contact => `
            <div class="contact-item" data-id="${contact.id}">
                <div>
                    <div class="contact-name">${escapeHtml(contact.name)}</div>
                    <div class="contact-type">${contact.personality}</div>
                </div>
                <button class="delete-contact" data-id="${contact.id}">🗑️</button>
            </div>
        `).join('');
        document.querySelectorAll('.delete-contact').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                deleteContactById(id);
            });
        });
    }

    function deleteContactById(id) {
        contacts = contacts.filter(c => c.id !== id);
        delete conversations[id];
        saveAllData();
        renderContacts();
        renderInbox();
        populateComposeSelect();
        if (currentOpenContactId === id) {
            currentOpenContactId = null;
            renderInbox();
        }
    }

    function populateComposeSelect() {
        const select = document.getElementById('composeContactSelect');
        if (!select) return;
        select.innerHTML = '<option value="">-- Select a contact --</option>' + contacts.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
    }

    async function sendComposeMessage() {
        const contactId = document.getElementById('composeContactSelect').value;
        const msg = document.getElementById('composeMessage').value.trim();
        if (!contactId || !msg) return;
        addMessageToConversation(contactId, msg, true);
        await sendAIResponse(contactId, msg);
        document.getElementById('composeMessage').value = '';
        document.querySelector('.tab[data-tab="inbox"]').click();
        openChat(contactId);
    }

    function addNewContact() {
        const name = document.getElementById('newContactName').value.trim();
        const personality = document.getElementById('newContactPersonality').value;
        if (!name) return;
        const newContact = {
            id: uid(),
            name: name,
            personality: personality,
            systemPrompt: personalityPrompts[personality],
            createdAt: Date.now()
        };
        contacts.push(newContact);
        conversations[newContact.id] = [];
        saveAllData();
        renderContacts();
        renderInbox();
        populateComposeSelect();
        document.getElementById('newContactName').value = '';
        document.getElementById('globalStatus').querySelector('span').innerText = `Added ${name} to contacts. They may text you anytime...`;
        setTimeout(() => document.getElementById('globalStatus').querySelector('span').innerText = '⚡ NIGHT CREEPER · 1984', 2500);
    }

    async function sendRandomUnknownMessage() {
        if (!groqApiKey) return;
        const randomNum = `+1${Math.floor(Math.random() * 900 + 100)}${Math.floor(Math.random() * 900 + 100)}${Math.floor(Math.random() * 9000 + 1000)}`;
        const unknownName = `Unknown (${randomNum})`;
        let existing = contacts.find(c => c.name === unknownName);
        if (!existing) {
            const newContact = {
                id: uid(),
                name: unknownName,
                personality: 'unknown',
                systemPrompt: personalityPrompts.unknown,
                createdAt: Date.now()
            };
            contacts.push(newContact);
            conversations[newContact.id] = [];
            existing = newContact;
            saveAllData();
            renderContacts();
            renderInbox();
            populateComposeSelect();
        }
        const systemUnsolicited = `You are a mysterious stranger who somehow got the player's number (${randomNum}). Send a short, creepy, unsettling text message (1-2 sentences) that feels like a wrong number but dangerous. No quotes, no labels, just the message.`;
        try {
            const response = await fetch(OPENROUTER_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${groqApiKey}`,
                    'HTTP-Referer': window.location.href,
                    'X-Title': 'Creeper Dating App'
                },
                body: JSON.stringify({
                    model: MODEL_NAME,
                    messages: [{ role: 'system', content: systemUnsolicited }],
                    temperature: 0.9,
                    max_tokens: 80
                })
            });
            if (!response.ok) return;
            const data = await response.json();
            let msgText = data.choices[0].message.content.trim();
            if (msgText) {
                addMessageToConversation(existing.id, msgText, false);
                document.getElementById('globalStatus').querySelector('span').innerHTML = `📩 New message from ${escapeHtml(unknownName)}`;
                setTimeout(() => document.getElementById('globalStatus').querySelector('span').innerHTML = '⚡ NIGHT CREEPER · 1984', 4000);
                renderInbox();
            }
        } catch(e) { console.warn("unknown message error", e); }
    }

    let lastUnsolicitedTime = Date.now();
    async function maybeSendUnsolicitedMessage() {
        if (!groqApiKey) return;
        if (contacts.length === 0) return;
        if (Date.now() - lastUnsolicitedTime < 45000) return;
        const regularContacts = contacts.filter(c => c.personality !== 'unknown');
        if (regularContacts.length === 0) return;
        const randomContact = regularContacts[Math.floor(Math.random() * regularContacts.length)];
        const lastMsg = (conversations[randomContact.id] || []).slice(-1)[0];
        if (lastMsg && !lastMsg.fromMe && (Date.now() - lastMsg.timestamp < 120000)) return;
        lastUnsolicitedTime = Date.now();
        const systemUnsolicited = `You are ${randomContact.name}, a ${randomContact.personality}. Send a short, creepy, unsolicited text message to the player, as if you're reaching out out of nowhere. Keep it 1-2 sentences. Do not break character.`;
        try {
            const response = await fetch(OPENROUTER_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${groqApiKey}`,
                    'HTTP-Referer': window.location.href,
                    'X-Title': 'Creeper Dating App'
                },
                body: JSON.stringify({
                    model: MODEL_NAME,
                    messages: [{ role: 'system', content: systemUnsolicited }],
                    temperature: 0.9,
                    max_tokens: 80
                })
            });
            if (!response.ok) return;
            const data = await response.json();
            let unsolicitedMsg = data.choices[0].message.content.trim();
            if (unsolicitedMsg) {
                addMessageToConversation(randomContact.id, unsolicitedMsg, false);
                document.getElementById('globalStatus').querySelector('span').innerHTML = `📩 New message from ${escapeHtml(randomContact.name)}`;
                setTimeout(() => document.getElementById('globalStatus').querySelector('span').innerHTML = '⚡ NIGHT CREEPER · 1984', 4000);
                renderInbox();
            }
        } catch(e) { console.warn("unsolicited error", e); }
    }

    function resetApiKey() {
        localStorage.removeItem('creeper_openrouter_key');
        groqApiKey = '';
        openApiModal();
        document.getElementById('globalStatus').querySelector('span').innerText = 'API key reset. Please enter a new key.';
        if (window.unsolicitedInterval) clearInterval(window.unsolicitedInterval);
        if (window.unknownInterval) clearInterval(window.unknownInterval);
    }

    function openApiModal() { document.getElementById('apiModal').style.display = 'flex'; }
    function closeApiModal() { document.getElementById('apiModal').style.display = 'none'; }
    function saveApiKey() {
        const newKey = document.getElementById('apiKeyInput').value.trim();
        // OpenRouter keys usually start with 'sk-or-v1-'
        if (newKey.startsWith('sk-or-') || newKey.length > 15) {
            groqApiKey = newKey;
            localStorage.setItem('creeper_openrouter_key', groqApiKey);
            closeApiModal();
            document.getElementById('globalStatus').querySelector('span').innerText = '✅ API key set. The whispers begin.';
            if (window.unsolicitedInterval) clearInterval(window.unsolicitedInterval);
            if (window.unknownInterval) clearInterval(window.unknownInterval);
            window.unsolicitedInterval = setInterval(() => maybeSendUnsolicitedMessage(), 35000);
            window.unknownInterval = setInterval(() => sendRandomUnknownMessage(), 65000);
        } else {
            alert('Invalid OpenRouter API key (should start with sk-or-)');
        }
    }

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const target = tab.dataset.tab;
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(target + 'Panel').classList.add('active');
            if (target === 'inbox') renderInbox();
            if (target === 'contacts') renderContacts();
            if (target === 'compose') populateComposeSelect();
        });
    });

    document.getElementById('addContactBtn')?.addEventListener('click', () => { document.querySelector('.tab[data-tab="contacts"]').click(); });
    document.getElementById('createContactBtn')?.addEventListener('click', addNewContact);
    document.getElementById('sendComposeBtn')?.addEventListener('click', sendComposeMessage);
    document.getElementById('saveApiKeyBtn')?.addEventListener('click', saveApiKey);
    document.getElementById('closeApiModalBtn')?.addEventListener('click', closeApiModal);
    document.getElementById('resetApiKeyBtn')?.addEventListener('click', resetApiKey);
    window.addEventListener('click', (e) => { if (e.target === document.getElementById('apiModal')) closeApiModal(); });

    loadAllData();
    initDefaultContacts();
    if (!groqApiKey) {
        setTimeout(openApiModal, 500);
        document.getElementById('globalStatus').querySelector('span').innerText = '⚠️ Set OpenRouter API key to receive messages.';
    } else {
        window.unsolicitedInterval = setInterval(() => maybeSendUnsolicitedMessage(), 35000);
        window.unknownInterval = setInterval(() => sendRandomUnknownMessage(), 65000);
    }
    renderInbox();
    renderContacts();
    populateComposeSelect();
</script>
</body>
</html>
