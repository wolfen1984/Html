<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --panel-bg: #0a0a0a;
      --text: #cccccc;
      --text-dim: #777777;
      --text-bright: #ffffff;
      --accent: #cccccc;
      --accent-dim: #555555;
      --border: #555555;
      --border-glow: 0 0 6px #88888844;
      --danger: #ff5555;
      --danger-glow: 0 0 6px #ff555566;
      --input-bg: #0f0f0f;
      --button-bg: #1a1a1a;
      --button-hover: #2a2a2a;
      --font-display: 'VT323', 'Courier New', monospace;
      --font-mono: 'Share Tech Mono', 'Courier New', monospace;
      --scanline-opacity: 0.08;
    }
    .terminal[data-theme="noir"] {
      --text: #cccccc;
      --text-dim: #777777;
      --text-bright: #ffffff;
      --accent: #ffffff;
      --accent-dim: #888888;
      --border: #555555;
      --border-glow: 0 0 6px #88888844;
      --danger: #ff5555;
      --input-bg: #0f0f0f;
      --button-bg: #1a1a1a;
      --button-hover: #2a2a2a;
    }
    .terminal[data-theme="green"] {
      --text: #33ff44;
      --text-dim: #1a7a22;
      --text-bright: #66ff77;
      --accent: #ff8833;
      --accent-dim: #aa5522;
      --border: #33ff44;
      --border-glow: 0 0 6px #33ff4466;
      --danger: #ff4444;
      --input-bg: #111511;
      --button-bg: #1a2a1a;
      --button-hover: #1f3520;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #020202;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: var(--font-display);
      padding: 12px;
      background-image: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
      color: var(--text);
    }
    .terminal {
      max-width: 460px;
      width: 100%;
      height: 90vh;
      max-height: 820px;
      background: #0a0a0a;
      border-radius: 16px;
      border: 2px solid #333333;
      box-shadow: 0 0 20px #88888822, 0 0 60px #000000aa, 0 4px 20px #000000cc, inset 0 1px 0 #ffffff05, inset 0 0 60px #00000044;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .crt-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 900;
      background: repeating-linear-gradient(0deg, rgba(255, 255, 255, var(--scanline-opacity)) 0px, rgba(255, 255, 255, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
      border-radius: 15px;
    }
    .crt-overlay::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.55) 100%);
      border-radius: 15px;
      pointer-events: none;
    }
    .status-bar {
      padding: 8px 14px 6px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text);
      text-shadow: 0 0 3px var(--text-dim);
      border-bottom: 1px solid #222;
      background: #060606;
      letter-spacing: 1px;
      z-index: 10;
      position: relative;
    }
    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--text);
      border-radius: 50%;
      margin-right: 5px;
      animation: blinkDot 1.8s infinite;
      box-shadow: 0 0 5px var(--text);
    }
    @keyframes blinkDot {
      0%,
      70%,
      100% {
        opacity: 1;
      }
      80%,
      90% {
        opacity: 0.15;
      }
    }
    .title-bar {
      text-align: center;
      padding: 10px 14px 6px 14px;
      font-family: var(--font-display);
      font-size: 24px;
      letter-spacing: 3px;
      color: var(--text-bright);
      text-shadow: 0 0 10px var(--text), 0 0 20px var(--text-dim);
      background: #060606;
      border-bottom: 1px solid #222;
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .tabs {
      display: flex;
      background: #060606;
      border-bottom: 2px solid #222;
      position: relative;
      z-index: 10;
      overflow-x: auto;
    }
    .tab {
      flex: 1;
      min-width: 50px;
      text-align: center;
      padding: 10px 2px;
      font-family: var(--font-display);
      font-size: 13px;
      letter-spacing: 1px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      border-bottom: 2px solid transparent;
      background: transparent;
      white-space: nowrap;
      position: relative;
    }
    .tab:hover {
      color: var(--text);
      text-shadow: 0 0 5px var(--text-dim);
    }
    .tab.active {
      color: var(--text-bright);
      border-bottom: 2px solid var(--text);
      text-shadow: 0 0 8px var(--text), 0 0 16px var(--text-dim);
      box-shadow: inset 0 -6px 10px -10px #ffffff22;
    }
.notes-status {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  text-align: right;
  margin-top: 4px;
}
    .panel {
      flex: 1;
      overflow-y: auto;
      display: none;
      background: var(--panel-bg);
      position: relative;
      z-index: 5;
      scrollbar-width: thin;
      scrollbar-color: #333 #0a0a0a;
      color: var(--text);
    }
    .panel.active {
      display: flex;
      flex-direction: column;
    }
    .profile-section,
    .compose-area {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn {
      background: var(--button-bg);
      border: 2px solid #333;
      padding: 8px 16px;
      border-radius: 5px;
      color: var(--text);
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 16px;
      letter-spacing: 1px;
      text-align: center;
      transition: all 0.2s;
      text-shadow: 0 0 4px var(--text-dim);
      text-transform: uppercase;
    }
    .btn:hover {
      background: var(--button-hover);
      border-color: var(--text);
      box-shadow: var(--border-glow);
    }
    .btn.accent {
      border-color: var(--text);
      color: var(--text-bright);
      background: #1a1a1a;
    }
    .btn.danger {
      border-color: #553333;
      color: var(--danger);
    }
    .btn.danger:hover {
      background: #2a1515;
      border-color: var(--danger);
    }
    .member-list {
      flex: 1;
    }
    .member-item {
      padding: 10px 14px;
      border-bottom: 1px solid #1a1a1a;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }
    .member-item:hover {
      background: #111111;
      box-shadow: inset 0 0 20px #ffffff08;
    }
    .member-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: #0a0a0a;
      border-radius: 8px;
      border: 1px solid #333;
      overflow: hidden;
      font-size: 28px;
      color: var(--text);
    }
    .member-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .member-info {
      flex: 1;
      min-width: 0;
    }
    .member-name {
      font-size: 18px;
      color: var(--text-bright);
      letter-spacing: 1px;
      text-shadow: 0 0 3px var(--text-dim);
    }
    .member-preview {
      font-size: 12px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .member-time {
      font-size: 10px;
      color: #444;
      font-family: var(--font-mono);
      white-space: nowrap;
    }
    .action-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid #333;
      background: #0a0a0a;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      color: var(--text);
      font-family: var(--font-display);
    }
    .action-btn.accept {
      border-color: #444;
      color: var(--text);
    }
    .action-btn.accept:hover {
      background: #222;
      box-shadow: var(--border-glow);
    }
    .action-btn.block {
      border-color: #553333;
      color: var(--danger);
    }
    .action-btn.profile {
      border-color: #335555;
      color: #88ccff;
    }
    .chat-view {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .chat-header {
      padding: 8px 12px;
      background: #060606;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
    }
    .chat-contact-name {
      color: var(--text-bright);
      font-size: 16px;
      letter-spacing: 1px;
      flex: 1;
    }
    .back-btn {
      background: none;
      border: 1px solid #333;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .message-row {
      display: flex;
      max-width: 82%;
      position: relative;
    }
    .incoming {
      align-self: flex-start;
    }
    .outgoing {
      align-self: flex-end;
    }
    .msg-bubble {
      padding: 6px 12px;
      border-radius: 12px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.4;
      word-wrap: break-word;
      background: #111;
      color: #ddd;
      border: 1px solid #2a2a2a;
    }
    .incoming .msg-bubble {
      border-bottom-left-radius: 2px;
    }
    .outgoing .msg-bubble {
      border-bottom-right-radius: 2px;
      background: #1a1f1a;
      color: #d4ffd4;
      border-color: #2a4a2a;
    }
    .typing-indicator {
      align-self: flex-start;
      background: #111;
      padding: 6px 12px;
      border-radius: 12px;
      border-bottom-left-radius: 2px;
      display: flex;
      gap: 4px;
      border: 1px solid #2a2a2a;
    }
    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: typingAnim 1.3s infinite;
    }
    @keyframes typingAnim {
      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.3;
      }
      30% {
        transform: translateY(-4px);
        opacity: 1;
      }
    }
    .chat-input-area {
      padding: 8px 10px;
      background: #060606;
      border-top: 1px solid #222;
      display: flex;
      gap: 6px;
    }
    .chat-input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid #333;
      border-radius: 16px;
      padding: 8px 14px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
    }
    .send-msg-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gallery-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px;
      justify-content: center;
    }
    .gallery-item {
      width: 90px;
      height: 90px;
      border-radius: 8px;
      border: 2px solid #333;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      background: #0a0a0a;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .empty-state {
      padding: 30px 20px;
      text-align: center;
      color: #555;
      font-family: var(--font-mono);
      font-size: 13px;
    }
    .footer-status {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 8px;
      color: #444;
      padding: 5px 8px;
      background: #060606;
      border-top: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.92);
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: #0d0d0d;
      border-radius: 14px;
      width: 340px;
      padding: 20px;
      text-align: center;
      border: 1px solid #444;
      box-shadow: 0 0 30px #ffffff22;
      font-family: var(--font-display);
      color: var(--text);
    }
    .modal-content h2 {
      color: var(--text-bright);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .modal-content input,
    .modal-content select,
    .modal-content textarea {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      background: var(--input-bg);
      border: 1px solid #333;
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      outline: none;
    }
    .modal-btn {
      background: #1a1a1a;
      border: 1px solid #444;
      padding: 6px 14px;
      border-radius: 4px;
      margin: 4px;
      cursor: pointer;
      color: var(--text);
      font-family: var(--font-display);
      font-size: 15px;
    }
    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #333;
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 5px;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

    async function mistralChat(messages, maxTok = 200) {
      if (!apiKey) throw new Error('No API key');
      const res = await fetch(MISTRAL_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify({ model: MODEL, messages, temperature: 0.9, max_tokens: maxTok })
      });
      if (!res.ok) throw new Error('API ' + res.status);
      const data = await res.json();
      return data.choices[0].message.content.trim();
    }

    function generateImage(prompt) {
      return new Promise(resolve => {
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage, gritty, period-accurate')}?width=256&height=256&seed=${Date.now()}`;
        const img = new Image();
        let done = false;
        const finish = (val) => { if (!done) { done = true; clearTimeout(timer); resolve(val); } };
        img.onload = () => finish(url);
        img.onerror = () => finish(fallbackCanvas(prompt.substring(0, 2)));
        img.src = url;
        const timer = setTimeout(() => finish(fallbackCanvas(prompt.substring(0, 2))), 8000);
      });
    }

    function fallbackCanvas(txt) {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, 128, 128);
      ctx.fillStyle = '#cccccc';
      ctx.font = 'bold 40px Courier';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(txt.substring(0, 2), 64, 64);
      return canvas.toDataURL();
    }

    // ---- Fast, balanced-bracket JSON extraction ----
    function safeParseJSON(text, isArray = false) {
  let cleaned = text.replace(/```json|```/gi, '').trim();
  const openBrace = isArray ? '[' : '{';
  const closeBrace = isArray ? ']' : '}';
  const startIdx = cleaned.indexOf(openBrace);
  if (startIdx === -1) return null;

  let depth = 0;
  let inString = false;
  let escape = false;
  for (let i = startIdx; i < cleaned.length; i++) {
    const ch = cleaned[i];
    if (escape) { escape = false; continue; }
    if (ch === '\\' && inString) { escape = true; continue; }
    if (ch === '"' && !escape) { inString = !inString; continue; }
    if (inString) continue;
    if (ch === openBrace || ch === '[') depth++;
    else if (ch === closeBrace || ch === ']') depth--;
    if (depth === 0) {
      try { return JSON.parse(cleaned.substring(startIdx, i + 1)); }
      catch { return null; }
    }
  }
  return null;
}

      caseData.id = uid();
      caseData.startedAt = Date.now();

        s.portraitUrl = null;

      setFooter('📂 New case: ' + caseData.title);
      startTipTimer();
    }

    function accuseSuspect(suspectId) {
      if (!currentCase) return;
      const sol = currentCase.solution;
      const correct = (suspectId === sol.suspectId);
      const suspect = currentCase.suspects.find(s => s.id === suspectId);
      const html = `
        <h2>${correct ? '✅ CASE SOLVED' : '❌ WRONG ACCUSATION'}</h2>
        <p style="margin:10px 0;color:var(--text-bright);">${correct ? `You got it! ${suspect.name} is the culprit.` : `${suspect ? suspect.name : 'Unknown'} is not the culprit.`}</p>
        <p><strong>Motive:</strong> ${sol.motive}</p>
        <p><strong>Explanation:</strong> ${sol.explanation}</p>
        ${correct ? `<p style="color:#88ff88;">Case closed. Reputation increased.</p>` : `<p style="color:#ff8888;">Case failed. Try again or start a new one.</p>`}
        <button class="modal-btn" id="closeCaseModalBtn">${correct ? 'Continue' : 'Back'}</button>
      `;
      modal(html);
      document.getElementById('closeCaseModalBtn').addEventListener('click', () => {
        window._closeModal();
        if (correct) {
          solvedCases.push({ ...currentCase, solvedAt: Date.now() });
          detectiveProfile.rank = Math.min(detectiveProfile.rank + 1, 10);
          currentCase = null;
          stopTipTimer();
          saveState();
          refreshAll();
          setFooter('🏆 Case closed. Rank: ' + getRankName());
        }
      });
    }

      if (!chatAreaRef) return;
      const msgs = suspectInterrogations[suspectId] || [];
      chatAreaRef.innerHTML = msgs.map(m => `

    async function sendInterrogationMsg(suspectId) {
      const input = document.getElementById('interrogationInput');
      if (!input) return;
      const text = input.value.trim();
      if (!text) return;
      if (!suspectInterrogations[suspectId]) suspectInterrogations[suspectId] = [];
      suspectInterrogations[suspectId].push({ from: 'user', text, time: Date.now() });
      renderInterrogationMessages(suspectId);
      input.value = '';
      input.disabled = true;
      document.getElementById('interrogationSendBtn').disabled = true;
      const ind = document.createElement('div');
      ind.className = 'message-row incoming typing-indicator';
      ind.innerHTML = '<div class="msg-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
      chatAreaRef.appendChild(ind);
      chatAreaRef.scrollTop = chatAreaRef.scrollHeight;
      try {
        const suspect = currentCase.suspects.find(s => s.id === suspectId);
        const systemContent = suspect.systemPrompt + ` The player just said: "${text}". Respond in character, under 100 words.`;
        const history = suspectInterrogations[suspectId].slice(-6).map(m => ({ role: m.from === 'user' ? 'user' : 'assistant', content: m.text }));
        const reply = await mistralChat([{ role: 'system', content: systemContent }, ...history]);
        suspectInterrogations[suspectId].push({ from: 'suspect', text: reply, time: Date.now() });
      } catch (e) {
        suspectInterrogations[suspectId].push({ from: 'suspect', text: "(Looks away silently.)", time: Date.now() });
      }
      if (ind.parentNode) ind.remove();
      renderInterrogationMessages(suspectId);
      saveState();
      input.disabled = false;
      document.getElementById('interrogationSendBtn').disabled = false;
      input.focus();
    }

    // ---- Database search with safeParseJSON ----
    async function runDatabaseQuery() {
      const input = document.getElementById('dbQueryInput');
      const resultsDiv = document.getElementById('dbResults');
      if (!input || !resultsDiv || !currentCase) return;
      const query = input.value.trim();
      if (!query) return;

      resultsDiv.innerHTML = '<span style="color:var(--text-dim);">🔎 Searching archives...</span>';

      try {
        const systemPrompt = `You are a police database from ${currentCase.era}.
        Case: "${currentCase.title}". Victim: ${currentCase.victim.name}.
        Suspects: ${currentCase.suspects.map(s => s.name).join(', ')}.
        Location: ${currentCase.location}.
        Clues already known: ${evidenceCollected.map(id => {
          const c = currentCase.clues.find(c => c.id === id);
          return c ? c.name : '';
        }).filter(Boolean).join(', ') || 'none'}.

        A detective has queried the database with: "${query}".

        Return exactly TWO relevant database records in JSON array format. Each record must have:
        - type: a short category (e.g., POLICE REPORT, FBI FILE, WITNESS STATEMENT, MEDICAL EXAMINER, PHONE LOG)
        - content: the actual record text (2-3 sentences), fitting the era and case.
        - clueId (optional): if this record reveals a new clue, set this to the ID of a clue from the following list: ${currentCase.clues.filter(c => !evidenceCollected.includes(c.id)).map(c => `"${c.id}" (${c.name})`).join(', ') || 'no remaining clues'}.

        Output ONLY the JSON array. No markdown, no code blocks, no explanations.`;

        const response = await mistralChat([{ role: 'system', content: systemPrompt }], 300);
        const records = safeParseJSON(response, true); // true means array expected

        resultsDiv.innerHTML = records.map(r =>
          `<div style="border-bottom:1px solid #222;padding:4px 0;"><strong>${esc(r.type)}:</strong> ${esc(r.content)}</div>`
        ).join('');

        records.forEach(r => {
          if (r.clueId && currentCase.clues.some(c => c.id === r.clueId) && !evidenceCollected.includes(r.clueId)) {
            evidenceCollected.push(r.clueId);
            const clue = currentCase.clues.find(c => c.id === r.clueId);
            if (clue && !clue.imageUrl) {
              generateImage(clue.imagePrompt).then(url => { clue.imageUrl = url; saveState(); renderEvidence(); });
            }
            saveState();
            setTimeout(() => renderEvidence(), 100);
          }
        });
      } catch (err) {
        console.error(err);
        resultsDiv.innerHTML = '<span style="color:#ff5555;">⚠️ Database error. Check API connection or try a different query.</span>';
      }
      input.value = '';
    }

    function renderDatabase() {
      const area = document.getElementById('dbArea');
      if (!area || !currentCase) {
        area.innerHTML = '<div class="empty-state">No active case. Database offline.</div>';
        return;
      }
      area.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:10px;">
          <p style="color:var(--text-dim);">🔎 Enter query (natural language works best):</p>
          <div style="display:flex;gap:6px;">
            <input type="text" id="dbQueryInput" placeholder="e.g. last sighting of Hitler" style="flex:1;background:var(--input-bg);border:1px solid #333;padding:8px;color:var(--text);font-family:var(--font-mono);">
            <button class="btn" id="runQueryBtn">RUN</button>
          </div>
          <div id="dbResults" style="background:#0a0a0a;border:1px solid #222;padding:10px;min-height:60px;font-family:var(--font-mono);font-size:13px;color:var(--text-dim);"></div>
          <p style="color:#555;font-size:11px;">Type any keyword or phrase related to the case.</p>
        </div>`;
      document.getElementById('runQueryBtn').addEventListener('click', runDatabaseQuery);
      document.getElementById('dbQueryInput').addEventListener('keypress', e => { if (e.key === 'Enter') runDatabaseQuery(); });
    }

    // ---- AI-powered tip line ----
    async function generateTip() {
      if (!currentCase || !apiKey) return;
      const systemPrompt = `You are an anonymous informant in ${currentCase.era}.
      Case: "${currentCase.title}". Victim: ${currentCase.victim.name}.
      Suspects: ${currentCase.suspects.map(s => s.name).join(', ')}.
      The detective has uncovered these clues: ${evidenceCollected.map(id => currentCase.clues.find(c => c.id === id)?.name).filter(Boolean).join(', ') || 'none'}.
      Give ONE cryptic tip, 1-2 sentences, that hints toward a suspect or a clue. Do not reveal the solution directly.`;
      try {
        const tipText = await mistralChat([{ role: 'system', content: systemPrompt }], 80);
        tipsReceived.push({ text: tipText, time: Date.now() });
      } catch (e) {
        // silently skip if API fails
      }
      saveState();
      renderTips();
    }

    function startTipTimer() {
      stopTipTimer();
      if (!currentCase) return;
      tipTimer = setTimeout(async () => {
        await generateTip();
        if (currentCase) startTipTimer();
      }, 90000);
    }

    function stopTipTimer() {
      if (tipTimer) {
        clearTimeout(tipTimer);
        tipTimer = null;
      }
    }

   function renderTips() {
  const list = document.getElementById('tipsList');
  if (!list || !currentCase) {
    list.innerHTML = '<div class="empty-state">No active case.</div>';
    return;
  }

  list.innerHTML = tipsReceived.length
    ? tipsReceived.map((t, index) => `
      <div class="member-item" data-index="${index}">
        <div class="member-icon">📞</div>
        <div class="member-info">
          <div class="member-name">Anonymous Tip</div>
          <div class="member-preview">${esc(t.text)}</div>
          <div class="member-time">${new Date(t.time).toLocaleTimeString()}</div>
        </div>
      </div>
    `).join('')
    : '<div class="empty-state">Tip line silent. Waiting for informants...</div>';

  // Add click listeners to each tip
  list.querySelectorAll('.member-item').forEach((item) => {
    item.addEventListener('click', () => {
      const index = parseInt(item.dataset.index);
      const tip = tipsReceived[index];
      if (tip) {
        modal(`
          <h2>📞 Anonymous Tip</h2>
          <p style="color:var(--text-bright); margin: 14px 0; white-space: pre-wrap;">${esc(tip.text)}</p>
          <p style="color:var(--text-dim); font-size: 12px;">Received ${new Date(tip.time).toLocaleString()}</p>
          <button class="modal-btn" onclick="window._closeModal()">Close</button>
        `);
      }
    });
  });
}

    function renderNotes() {
  const textarea = document.getElementById('notesTextarea');
  if (!textarea) return;
  textarea.value = caseNotes;

  // Create a status message if it doesn't exist
  let statusEl = document.getElementById('notesStatus');
  if (!statusEl) {
    statusEl = document.createElement('div');
    statusEl.id = 'notesStatus';
    statusEl.className = 'notes-status';
    textarea.parentNode.appendChild(statusEl);
  }
  statusEl.textContent = '✔ All changes saved';

  // Clear button (in case it's missing)
  if (!document.getElementById('clearNotesBtn')) {
    const clearBtn = document.createElement('button');
    clearBtn.id = 'clearNotesBtn';
    clearBtn.className = 'btn danger';
    clearBtn.textContent = '🗑 CLEAR NOTES';
    clearBtn.style.marginTop = '8px';
    clearBtn.addEventListener('click', async () => {
      if (await confirmDialog('Delete all notes?')) {
        caseNotes = '';
        document.getElementById('notesTextarea').value = '';
        saveState();
        document.getElementById('notesStatus').textContent = '✔ Notes cleared';
      }
    });
    textarea.parentNode.appendChild(clearBtn);
  }
}

// Add this new function to set up auto‑save listeners
function initNotesAutoSave() {
  const textarea = document.getElementById('notesTextarea');
  if (!textarea) return;

  // Remove any old listener to avoid duplicates
  const newTextarea = textarea.cloneNode(true);
  textarea.parentNode.replaceChild(newTextarea, textarea);

  let saveTimeout;
  newTextarea.addEventListener('input', () => {
    caseNotes = newTextarea.value;
    const statusEl = document.getElementById('notesStatus');
    if (statusEl) statusEl.textContent = '🖊 Unsaved changes...';

    // Debounce: save to localStorage after 1 second of inactivity
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      saveState();
      if (statusEl) statusEl.textContent = '✔ All changes saved';
    }, 1000);
  });
}

    function setFooter(msg) {
      document.getElementById('footerMsg').textContent = msg;
    }

    function switchTab(tab) {
  if (activeChatSuspectId) closeInterrogation();

  // Deactivate all tabs and panels
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

  // Activate the selected tab
  const tabEl = document.querySelector(`.tab[data-tab="${tab}"]`);
  if (tabEl) tabEl.classList.add('active');

  // Show the corresponding panel
  const panel = document.getElementById(tab + 'Panel');
  if (panel) panel.classList.add('active');

  // Render content based on the tab
  if (tab === 'suspects') renderSuspects();
  else if (tab === 'evidence') renderEvidence();
  else if (tab === 'database') renderDatabase();
  else if (tab === 'tips') renderTips();
  else if (tab === 'notes') {
    renderNotes();
    initNotesAutoSave();   // ← NEW: set up the live auto‑save behaviour
  } else if (tab === 'cases') renderCases();

  // If leaving the notes tab, save whatever was typed so far
  if (tab !== 'notes') {
    caseNotes = document.getElementById('notesTextarea')?.value || '';
    saveState();
  }
}

// NEW helper – place this somewhere after switchTab
function initNotesAutoSave() {
  const textarea = document.getElementById('notesTextarea');
  if (!textarea) return;

  // Remove old listeners by replacing the element (clean way)
  const newTextarea = textarea.cloneNode(true);
  textarea.parentNode.replaceChild(newTextarea, textarea);

  let saveTimeout;
  newTextarea.addEventListener('input', () => {
    caseNotes = newTextarea.value;

    // Show unsaved state (the element #notesStatus is created inside renderNotes)
    const statusEl = document.getElementById('notesStatus');
    if (statusEl) statusEl.textContent = '🖊 Unsaved changes...';

    // Save after 1 second of no typing
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      saveState();
      if (statusEl) statusEl.textContent = '✔ All changes saved';
    }, 1000);
  });
}

    // ---- AI-only case generation with robust parsing ----
    async function startNewAICase() {
  if (currentCase && !(await confirmDialog('Abandon current case?'))) return;
  if (!apiKey) {
    alertModal('API key required for AI case generation. Please add your Mistral API key.');
    return;
  }

  setFooter('🔍 Generating case with AI...');
  let caseData = null;
  let attempts = 0;
  const maxAttempts = 2;

  while (!caseData && attempts < maxAttempts) {
    attempts++;
    try {
      const prompt = `You are a noir detective story generator set in 1984.
Generate a complete detective case as a SINGLE JSON object. Do NOT include any text before or after the JSON.
The JSON must have exactly these keys:
{
  "title": "string (catchy noir title)",
  "era": "1984",
  "victim": { "name": "string", "age": number, "occupation": "string", "cause": "string (cause of death)" },
  "location": "string (crime scene)",
  "suspects": [
    { "id": "s1", "name": "string", "age": number, "relation": "string", "secret": "string", "personality": "string", "portraitPrompt": "string (visual description)" }
  ],
  "clues": [
    { "id": "c1", "name": "string", "desc": "string", "imagePrompt": "string (visual description)" }
  ],
  "solution": { "suspectId": "s1", "motive": "string", "keyClueId": "c1", "explanation": "string" }
}
Return ONLY the JSON object. No markdown, no explanations.`;

      const response = await mistralChat([{ role: 'user', content: prompt }], 2400);
      console.log('AI raw response:', response); // helps debugging in console
      caseData = safeParseJSON(response, false);

      if (caseData) {
        // Quick validation – must have title, suspects, clues, solution
        if (!caseData.title || !Array.isArray(caseData.suspects) || !Array.isArray(caseData.clues) || !caseData.solution) {
          console.warn('Parsed JSON missing required fields, retrying...', caseData);
          caseData = null; // force retry
        }
      }
    } catch (e) {
      console.error('AI case generation error:', e);
      caseData = null;
    }

    if (!caseData && attempts < maxAttempts) {
      setFooter('🔁 Retrying AI generation...');
    }
  }

  if (!caseData) {
    alertModal('AI generation failed after ' + maxAttempts + ' attempts. Check the console for raw response. Try again later.');
    setFooter('⚡ Ready');
    return;
  }

  // Rest of the function remains the same
  caseData.id = uid();
  caseData.startedAt = Date.now();
  caseData.suspects.forEach(s => {
    s.portraitUrl = null;
    s.systemPrompt = `You are ${s.name}, a suspect in "${caseData.title}" (${caseData.era}). Personality: ${s.personality}. Secret: ${s.secret}. Respond in character, short sentences.`;
  });
  currentCase = caseData;
  suspectInterrogations = {};
  evidenceCollected = [];
  tipsReceived = [];
  caseNotes = '';
  document.getElementById('notesTextarea').value = '';
  caseData.suspects.forEach(async (s) => {
    if (!s.portraitUrl) s.portraitUrl = await generateImage(s.portraitPrompt);
    saveState();
    if (currentCase && currentCase.id === caseData.id) renderSuspects();
  });
  saveState();
  refreshAll();
  setFooter('📂 New AI case: ' + caseData.title);
  startTipTimer();
}

    function init() {
      loadState();
      applyTheme(currentTheme);
      if (!apiKey) {
        setTimeout(() => { document.getElementById('apiModal').style.display = 'flex'; }, 500);
      }
      refreshAll();
      if (currentCase) {
        startTipTimer();
      }
      document.getElementById('statusTime').textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
      setInterval(() => {
        document.getElementById('statusTime').textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
      }, 30000);

      document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
      document.getElementById('resetApiKeyBtn').addEventListener('click', () => {
        localStorage.removeItem('mistral_api_key');
        apiKey = '';
        document.getElementById('apiModal').style.display = 'flex';
      });
      document.getElementById('saveApiKeyBtn').addEventListener('click', () => {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (key.length > 10) {
          apiKey = key;
          localStorage.setItem('mistral_api_key', key);
          document.getElementById('apiModal').style.display = 'none';
          setFooter('🔑 API key saved.');
        } else alert('Invalid key');
      });
      document.getElementById('closeApiModalBtn').addEventListener('click', () => {
        document.getElementById('apiModal').style.display = 'none';
      });
      window.addEventListener('click', e => {
        if (e.target === document.getElementById('apiModal')) document.getElementById('apiModal').style.display = 'none';
      });
      document.getElementById('importFileInput').addEventListener('change', (e) => {
        if (e.target.files.length) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const state = JSON.parse(ev.target.result);
              localStorage.setItem('detective_state', JSON.stringify(state));
              loadState();
              applyTheme(currentTheme);
              refreshAll();
              setFooter('📥 State imported.');
            } catch (ex) { alertModal('Invalid backup file.'); }
          };
          reader.readAsText(e.target.files[0]);
          e.target.value = '';
        }
      });
    }
    init();
  </script>
