<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover" />
    <title>THE HAUNTING HOUR · 1984 · AI SCORE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&family=Special+Elite&family=Orbitron:wght@400;700;900&family=Audiowide&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #020503;
            --screen-bg: #050a06;
            --panel-bg: #060d08;
            --text: #b8c4ba;
            --text-dim: #4a6e52;
            --text-bright: #c8e6d0;
            --accent: #00ff41;
            --accent-dim: #003d0a;
            --border: #00cc33;
            --border-glow: 0 0 18px #00ff4155, 0 0 38px #003d0a33;
            --danger: #00ff41;
            --danger-glow: 0 0 14px #00ff4155;
            --amber: #b8c496;
            --amber-dim: #3d4a1a;
            --gold: #b8c496;
            --gold-dim: #2a3d10;
            --green: #4a7a3a;
            --neon-pulse: 0 0 8px #00ff4188, 0 0 22px #00ff4133;
            --input-bg: #0a100c;
            --button-bg: #0c1410;
            --button-hover: #101c16;
            --button-active: #0c1810;
            --bevel-light: #1c2822;
            --bevel-dark: #020603;
            --font-display: 'Creepster', 'Nosifer', 'Orbitron', cursive;
            --font-title: 'Nosifer', 'Creepster', 'Audiowide', cursive;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Rajdhani', 'Courier New', monospace;

            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 30px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { font-size:var(--text-size-base); -webkit-text-size-adjust:100%; }
        body {
            background:#000; display:flex; justify-content:center; align-items:center;
            min-height:100vh; min-height:100dvh; font-family:var(--font-body);
            padding:0; background-image:radial-gradient(ellipse at center,#0a140c 0%,#000 100%);

        }

            width:100%; max-width:540px; height:100vh; height:100dvh; max-height:920px;
            background:#0c1410; border-radius:10px; padding:10px;
            box-shadow:inset 0 0 0 3px #1c2822,0 0 0 4px #080d0a,0 0 0 8px #040805,0 8px 48px #000000dd,0 0 60px #003d0a33;
            display:flex; flex-direction:column; position:relative; border:1px solid #00ff41;
        }
        @media (max-width:540px) { .monitor-bezel { border-radius:0; padding:4px; max-height:100vh; box-shadow:none; background:#060d08; border:none; } }
        .power-led {
            position:absolute; bottom:18px; right:22px; width:8px; height:8px;
            background:#00ff41; border-radius:50%;
            box-shadow:0 0 10px #00ff4199,0 0 22px #00ff4144;
            animation:powerGlow 2.4s ease-in-out infinite; z-index:20;
        }
        @keyframes powerGlow { 0%,100%{box-shadow:0 0 10px #00ff4199,0 0 22px #00ff4144;} 50%{box-shadow:0 0 16px #00ff41cc,0 0 34px #00ff4166;} }
        .brand-label { position:absolute; bottom:15px; left:20px; font-family:var(--font-mono); font-size:9px; color:#1a3a22; letter-spacing:2.5px; z-index:20; text-transform:uppercase; }
        .game-shell {
            flex:1; width:100%; background:var(--screen-bg); border-radius:3px;
            border:3px solid #00ff41; box-shadow:var(--border-glow),inset 0 0 90px rgba(0,0,0,0.55);
            display:flex; flex-direction:column; overflow:hidden; position:relative;
        }
        @media (max-width:540px) { .game-shell { border-radius:0; border-width:2px; } }
        .screen-curve { position:absolute; inset:0; pointer-events:none; z-index:899; border-radius:1px; box-shadow:inset 0 0 70px rgba(0,0,0,0.75),inset 0 0 12px rgba(0,0,0,0.5); }
        .crt-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:900;
            background:repeating-linear-gradient(0deg,rgba(0,0,0,var(--scanline-opacity)) 0px,rgba(0,0,0,var(--scanline-opacity)) 2px,transparent 2px,transparent 5px);

        }
        .crt-overlay::after { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(ellipse at center,transparent 38%,rgba(0,0,0,0.7) 100%); border-radius:1px; }
        .screen-flicker { animation:crtFlicker 9s ease-in-out infinite; }
        @keyframes crtFlicker { 0%,99.3%,100%{opacity:1} 99.4%{opacity:0.55} 99.5%{opacity:0.85} 99.6%{opacity:0.4} 99.7%{opacity:1} }
        .marquee {
            position:relative; z-index:10; background:#020503; border-bottom:3px solid #00cc33;
            padding:10px 16px; text-align:center; font-family:var(--font-display); letter-spacing:2px;
            box-shadow:0 2px 20px #000000aa,inset 0 1px 0 #0a1a0c; flex-shrink:0;
        }
        .marquee-inner {
            border:2px solid #00ff41; border-radius:2px; padding:10px 14px; background:#020503;
            position:relative; box-shadow:inset 0 0 28px #00ff4111;
        }
        .marquee-inner::before { content:''; position:absolute; top:-2px; left:16px; right:16px; height:2px; background:#00ff41; box-shadow:0 0 14px #00ff4188; }
        .marquee-inner::after { content:''; position:absolute; bottom:-2px; left:16px; right:16px; height:1px; background:#b8c49644; box-shadow:0 0 10px #b8c49633; }
        .marquee-title { font-size:var(--text-size-title); color:#00ff41; text-shadow:0 0 18px #00ff4188,0 2px 4px #000,0 0 44px #00cc3355; letter-spacing:3px; font-family:var(--font-title); line-height:1.2; }
        .marquee-sub { font-family:var(--font-mono); font-size:11px; color:#6e8a6a; letter-spacing:5px; margin-top:3px; }
        @media (max-width:400px) { .marquee-title { font-size:20px; letter-spacing:1px; } }
        .game-area {
            flex:1; overflow-y:auto; overflow-x:hidden; z-index:5;
            scrollbar-width:thin; scrollbar-color:#1a3a20 #050a06;

        .game-area::-webkit-scrollbar { width:5px; }
        .game-area::-webkit-scrollbar-track { background:#050a06; }
        .game-area::-webkit-scrollbar-thumb { background:#1a3a20; border-radius:3px; }
        .panel { display:flex; flex-direction:column; padding:10px; gap:10px; flex:1; }
        .btn {
            background:var(--button-bg); border:2px solid #1c2822; border-top-color:#28342c; border-left-color:#243028;
            border-right-color:#141c18; border-bottom-color:#0c1410; padding:12px 18px; border-radius:3px;

        .btn.accent:active { border-top-color:#0f2e18; border-left-color:#0f2e18; border-bottom-color:#1a6a2e; border-right-color:#165a28; box-shadow:0 0px 0 #00000044,0 0 18px #00ff4144; }

        .btn-small { padding:4px 10px; font-size:12px; min-height:28px; }

        .speech-bubble {

            display:flex; flex-direction:column; gap:8px; box-shadow:inset 0 0 20px #00000055,0 0 12px #00ff4115;
        }
        .speech-bubble::before { content:''; position:absolute; left:-12px; top:20px; border-width:8px 12px 8px 0; border-style:solid; border-color:transparent #00ff4188 transparent transparent; }
        .segment-image { width:100%; border-radius:3px; max-height:200px; object-fit:cover; background:#050a07; border:1px solid #1a3a20; display:none; }
        .segment-image.loading { display:block; height:120px; background:#0c1410; display:flex; align-items:center; justify-content:center; color:#4a6e52; font-size:14px; animation:pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
        .segment-image.visible { display:block; }
        .segment-text { flex:1; line-height:1.4; }
        .story-poster-container {
            position:relative; display:block; width:100%; max-height:240px; overflow:hidden;
            border-radius:3px; border:2px solid #00cc33;
            box-shadow:0 0 22px #00ff4144,inset 0 0 30px rgba(0,0,0,0.5);
            flex-shrink:0; background:#050a07;
        }
        .story-poster-container .segment-image { display:block; width:100%; max-height:240px; object-fit:cover; border:none; border-radius:1px; }
        .story-poster-container::after { content:''; position:absolute; inset:0; pointer-events:none; background:radial-gradient(ellipse at center,transparent 40%,rgba(2,5,3,0.85) 100%); z-index:2; }
        .poster-overlay-theater { position:absolute; top:8px; left:0; right:0; text-align:center; z-index:5; pointer-events:none; font-family:var(--font-title); font-size:13px; letter-spacing:3px; color:#00ff41; text-shadow:0 0 12px #00ff41cc,0 0 34px #00ff4188,0 2px 4px #000,0 0 60px #003d0a; text-transform:uppercase; line-height:1.2; background:linear-gradient(to bottom,rgba(2,5,3,0.9) 0%,rgba(2,5,3,0.7) 40%,transparent 100%); padding:6px 12px 10px; }
        .poster-overlay-title { position:absolute; bottom:10px; left:8px; right:8px; text-align:center; z-index:5; pointer-events:none; font-family:var(--font-display); font-size:14px; letter-spacing:1.5px; color:#d4e8c4; text-shadow:0 0 10px #b8c49688,0 0 24px #3d4a1a44,0 2px 4px #000; background:linear-gradient(to top,rgba(2,5,3,0.9) 0%,rgba(2,5,3,0.6) 50%,transparent 100%); padding:10px 8px 6px; line-height:1.3; }
        .story-poster-container.no-image { display:none; }
        .story-poster-container.loading { height:140px; display:flex; align-items:center; justify-content:center; color:#4a6e52; font-size:14px; animation:pulse 1.5s ease-in-out infinite; }
        .story-poster-container.loading .segment-image,.story-poster-container.loading .poster-overlay-theater,.story-poster-container.loading .poster-overlay-title { display:none; }
        @media (max-width:480px) {
            .story-poster-container { max-height:180px; }
            .poster-overlay-theater { font-size:10px; letter-spacing:2px; top:4px; padding:4px 8px 8px; }
            .poster-overlay-title { font-size:11px; bottom:6px; padding:8px 6px 4px; }
        }
        .tv-guide { margin-top:15px; border-top:2px solid #00ff41; padding-top:10px; }
        .tv-guide h3 { font-family:var(--font-display); color:#c8e0cc; letter-spacing:2px; margin-bottom:8px; font-size:16px; text-shadow:0 0 10px #00ff4144; }
        .guide-entry { display:flex; justify-content:space-between; align-items:center; background:#080d0a; border:1px solid #00ff41; padding:10px; margin-bottom:6px; border-radius:3px; gap:8px; flex-wrap:wrap; }
        .guide-time { font-family:var(--font-mono); font-size:14px; color:#00ff41; min-width:50px; }
        .guide-info { flex:1; min-width:100px; }
        .guide-title { font-size:16px; color:#c8e0cc; }
        .guide-desc { font-size:14px; color:#4a6e52; }
        .guide-btn { padding:6px 12px; font-size:14px; min-height:32px; flex-shrink:0; }
        .guide-actions { display:flex; gap:4px; align-items:center; }
        .modal { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.94); align-items:center; justify-content:center; padding:12px; }
        .modal-content { background:#080d0a; border-radius:5px; width:100%; max-width:420px; padding:20px; text-align:center; border:3px solid #00ff41; box-shadow:var(--border-glow),0 0 80px #000000dd; color:#b8c4ba; max-height:85vh; overflow-y:auto; font-size:var(--text-size-base); }
        .modal-btn { background:#0c1410; border:2px solid #00ff4166; padding:10px 18px; border-radius:3px; margin:5px; cursor:pointer; color:#b8c4ba; font-family:var(--font-body); font-size:var(--text-size-base); letter-spacing:1px; min-height:var(--btn-min-height); }
        .modal-btn:active { border-color:#00ff41; box-shadow:0 0 16px #00ff4144; }
        .loading-text { color:#b8c496; font-style:italic; }
        .blink { animation:blink 1s infinite; }
        @keyframes blink { 50%{opacity:0} }
        .footer-strip { display:flex; justify-content:space-between; align-items:center; padding:6px 12px; background:#020503; border-top:1px solid #00ff4144; z-index:10; font-family:var(--font-mono); font-size:11px; color:#1a3a22; flex-shrink:0; }
        .footer-strip span { color:#2a4a30; letter-spacing:0.5px; }
        .footer-strip button { background:none; border:1px solid #101c14; color:#2a4a30; font-size:10px; cursor:pointer; padding:4px 8px; border-radius:2px; font-family:var(--font-mono); }
        .footer-strip button:hover { border-color:#1a3a22; color:#4a6e52; }
        .typewriter-cursor { display:inline-block; width:2px; height:1.2em; background:#c8e0cc; margin-left:2px; animation:blink 0.8s step-end infinite; vertical-align:text-bottom; }
        .back-btn { margin-top:8px; align-self:flex-end; }
        @media (max-width:480px) {
            .tv-stage-row { flex-direction:column; align-items:center; }
            .speech-bubble::before { display:none; }
            .host-portrait { width:80px; height:80px; border-radius:3px; }
            .guide-entry { flex-direction:column; align-items:stretch; }
            .guide-time { text-align:left; }
            .segment-image { max-height:150px; }
        }
        .score-indicator {
            font-family:var(--font-mono); font-size:10px; color:#8899aa; letter-spacing:1px;
            padding:3px 8px; border:1px solid #1a3a22; border-radius:2px; display:inline-block;
            background:#080d0a; margin-top:4px;
        }
        .score-indicator .active { color:#00ff41; }
        .score-indicator .dim { color:#3a5a4a; }
        .progress-bar { width:100%; height:2px; background:#1a2a1a; border-radius:2px; margin-top:6px; overflow:hidden; }
        .progress-bar .fill { height:100%; background:#00ff41; border-radius:2px; transition:width 0.3s; box-shadow:0 0 10px #00ff4144; }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">THE HAUNTING HOUR · CRT-84 · AI SCORE</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE HAUNTING<br>HOUR</div>
                    <div class="marquee-sub">⏤ 1984 · AI SCORE ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channel3Panel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">📻 THE HAUNTING HOUR · AI COMPOSED</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
    (function() {
        const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
        const MODEL = 'mistral-small-latest';
        let apiKey = localStorage.getItem('haunting_hour_key') || '';

        const DEFAULT_STATE = { ch3Episodes: [], hauntingPerformance: null, imageCooldownUntil: 0 };
        let gameState = { ...DEFAULT_STATE };

        const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;', "'":'&#39;', '"':'&quot;' })[m]);

        const HOST_BIO = `
            <h2>📻 Lorna Marsh</h2>
            <p style="text-align:left;">
                <strong>Show:</strong> <em>The Haunting Hour</em><br>
                <strong>Bio:</strong> A former late-night radio DJ from a small Pacific Northwest town, Lorna vanished for seven years—only to return with a voice that seems to drift in from somewhere else entirely. Broadcasting from a fog-shrouded roadside trailer, she spins tales of ordinary people who made one small, terrible mistake. Her hypnotic cadence and the faint hum of her transmitter have led some listeners to wonder: is she still alive, or merely still <em>broadcasting</em>?
            </p>
        `;

        // ─── AUDIO ENGINE ──────────────────────────────────────────────
        let audioCtx = null;
        let ambientSource = null, ambientGain = null, ambientTimeout = null;
        let keepAliveNode = null;
        let reverbNode = null, masterGain = null, dryGain = null, wetGain = null;
        let sectionAmbientActive = null, stringAmbientActive = null;
        let crossfadeTimeout = null, tapeWarbleNode = null, masterCompressor = null;

        let patternPlayerActive = null, patternPlayerTimeout = null;
        let patternStep = 0, patternBPM = 50;
        let currentSectionPatterns = [];
        let currentVariationIdx = 0, barsInVariation = 0;
        let fillActive = false;
        let sectionThemeScore = null;
        let sectionThemeName = 'intro';

        function expandPattern(arr) {
            if (!Array.isArray(arr)) { arr = [0,0,0,0,0,0,0,0]; }
            arr = arr.map(x => typeof x === 'number' ? x : 0);
            return arr.flatMap(x => [x, x]);
        }

        function createKeepAlive(ctx) {
            if (keepAliveNode) return;
            const osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = 30;
            const gain = ctx.createGain();
            gain.gain.value = 0.0005;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(0);
            keepAliveNode = { source: osc, gain };
        }

        function ensureAudioNodes(ctx) {
            if (!masterGain) {
                masterGain = ctx.createGain();
                masterGain.gain.value = 0.22;
                masterCompressor = ctx.createDynamicsCompressor();
                masterCompressor.threshold.value = -26;
                masterCompressor.knee.value = 28;
                masterCompressor.ratio.value = 10;
                masterCompressor.attack.value = 0.004;
                masterCompressor.release.value = 0.3;
                masterGain.connect(masterCompressor);
                masterCompressor.connect(ctx.destination);
            }
            if (!dryGain) {
                dryGain = ctx.createGain();
                dryGain.gain.value = 0.85;
                dryGain.connect(masterGain);
            }
            if (!wetGain) {
                wetGain = ctx.createGain();
                wetGain.gain.value = 0.55;
                if (reverbNode) wetGain.connect(reverbNode);
                else wetGain.connect(masterGain);
            }
            if (!reverbNode) {
                initReverb(ctx);
                if (reverbNode) wetGain.connect(reverbNode);
            }
            if (tapeWarbleNode) tapeWarbleNode.connect(masterGain.gain);
        }

        async function getAudioContext() {
            try {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    initTapeWarble(audioCtx);
                    ensureAudioNodes(audioCtx);
                }
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                ensureAudioNodes(audioCtx);
                return audioCtx;
            } catch(err) { console.error('Audio context error:', err); throw err; }
        }

        function initReverb(ctx) {
            if (reverbNode) return;
            try {
                const sampleRate = ctx.sampleRate;
                const length = sampleRate * 4.2;
                const impulse = ctx.createBuffer(2, length, sampleRate);
                const left = impulse.getChannelData(0);
                const right = impulse.getChannelData(1);
                for (let i=0; i<length; i++) {
                    const decay = Math.exp(-i/(sampleRate*0.9));
                    const lateDecay = Math.exp(-i/(sampleRate*2.5))*0.3;
                    left[i] = (Math.random()*2-1)*(decay+lateDecay);
                    right[i] = (Math.random()*2-1)*(decay+lateDecay);
                }
                reverbNode = ctx.createConvolver();
                reverbNode.buffer = impulse;
                reverbNode.normalize = true;
                if (masterGain) reverbNode.connect(masterGain);
            } catch(err) {
                console.warn('Reverb init error:', err);
                reverbNode = ctx.createGain();
                reverbNode.gain.value = 0.5;
                if (masterGain) reverbNode.connect(masterGain);
            }
        }

        function initTapeWarble(ctx) {
            if (tapeWarbleNode) return;
            try {
                tapeWarbleNode = ctx.createGain();
                tapeWarbleNode.gain.value = 0;
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.15;
                const lfoGain = ctx.createGain();

        // ─── STRING / INSTRUMENT SYNTHESIS ────────────────────────────
        function createStringPad(ctx, rootFreq, duration, intensity=0.5, voiceCount=8) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity*0.16, now+2.5);
                gainNode.gain.setValueAtTime(intensity*0.16, now+duration-3);
                gainNode.gain.exponentialRampToValueAtTime(0.0005, now+duration+1.5);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500 + intensity*400;
                filter.Q.value = 1.8;
                const filterLfo = ctx.createOscillator();
                filterLfo.type = 'sine';
                filterLfo.frequency.value = 0.04;
                const filterLfoGain = ctx.createGain();
                filterLfoGain.gain.value = 80;
                filterLfo.connect(filterLfoGain);
                filterLfoGain.connect(filter.frequency);
                const allOscs = [];
                const harmonics = [1,1.002,1.997,2.003,0.998,1.005,2.001,0.996];
                for (let i=0; i<voiceCount; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i<4 ? 'sawtooth' : 'triangle';
                    const harmMult = harmonics[i] || (1+(Math.random()-0.5)*0.012);
                    osc.frequency.value = rootFreq * harmMult;
                    const vibrato = ctx.createOscillator();
                    vibrato.type = 'sine';
                    vibrato.frequency.value = 4.5 + Math.random()*3.5;
                    const vibratoGain = ctx.createGain();
                    vibratoGain.gain.value = 1.5 + Math.random()*4;
                    vibrato.connect(vibratoGain);
                    vibratoGain.connect(osc.frequency);
                    allOscs.push(osc, vibrato);
                    osc.connect(filter);
                }
                filter.connect(gainNode);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.35;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.7;
                gainNode.connect(drySend);
                gainNode.connect(wetSend);
                drySend.connect(dryGain || ctx.destination);
                wetSend.connect(wetGain || ctx.destination);
                allOscs.forEach(o => { o.start(now); o.stop(now+duration+2); });
                filterLfo.start(now);
                filterLfo.stop(now+duration+2);
            } catch(err) { console.warn('String pad error:', err); }
        }

        function createCelloDrone(ctx, frequency, duration, intensity=0.5) {
            try {
                const now = ctx.currentTime;

                gainNode.gain.linearRampToValueAtTime(intensity*0.2, now+2);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 250;
                filter.Q.value = 3.5;

                for (let i=0; i<3; i++) {
                    const osc = ctx.createOscillator();

                    const detune = (i-1)*6;
                    osc.frequency.value = frequency * Math.pow(2, detune/1200);

                    vibrato.type = 'sine';

                filter.connect(gainNode);

                gainNode.connect(wetSend);

            } catch(err) { console.warn('Cello drone error:', err); }

        function createStringSwell(ctx, targetFreq, duration, intensity=0.6) {
            try {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0.001, now);

                    osc.frequency.exponentialRampToValueAtTime(targetFreq*Math.pow(2, interval/12), now+duration);
                    oscs.push(osc);
                    osc.connect(filter);

                filter.connect(gainNode);

        function createIndustrialTexture(ctx, duration, intensity=0.4) {

                const data = buffer.getChannelData(0);
                for (let i=0; i<bufferSize; i++) {
                    const t = i/ctx.sampleRate;
                    data[i] = (Math.random()*2-1) * Math.sin(t*120 + Math.sin(t*3)*40) * Math.exp(-t/8);
                }
                const source = ctx.createBufferSource();
                source.buffer = buffer;
                source.loop = true;
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 200;

                gainNode.connect(wetSend);

        // ─── AI PATTERN PLAYER ─────────────────────────────────────────
        function startEvolvingPatternPlayer(themeName, rootFreq=40, scoreData=null) {
            stopPatternPlayer();
            if (!scoreData || !scoreData[themeName]) {
                console.warn('No AI score data for theme:', themeName);
                return;
            }
            const theme = scoreData[themeName];
            const bpm = theme.bpm || 60;
            const bass = expandPattern(theme.bass);
            const kick = expandPattern(theme.kick);
            const snare = expandPattern(theme.snare);
            const hat   = expandPattern(theme.hat);

            currentSectionPatterns = [{
                name: 'AI',
                bars: 8,
                bass: bass,
                kick: kick,
                snare: snare,
                hat: hat
            }];
            currentVariationIdx = 0;
            barsInVariation = 0;
            patternStep = 0;
            patternBPM = bpm;
            fillActive = false;
            patternPlayerActive = { active: true, theme: themeName };

            const stepDuration = 60 / bpm / 4;

            function getCurrentPattern() { return currentSectionPatterns[0]; }

            function playStep() {
                if (!patternPlayerActive || !patternPlayerActive.active) return;
                const ctx = audioCtx;
                if (!ctx) { patternPlayerTimeout = setTimeout(playStep, 100); return; }
                const step = patternStep % 16;
                const current = getCurrentPattern();
                const isFillStep = fillActive;

                let bassSemitone = 0;
                if (isFillStep) { bassSemitone = (step % 4 === 0) ? 0 : (step % 8 === 4 ? 7 : 0); }
                else { bassSemitone = current.bass[step] || 0; }
                if (bassSemitone !== 0 || (isFillStep && step % 4 === 0)) {
                    const dur = isFillStep ? 0.25 : 1.8;
                    const inten = isFillStep ? 0.3 : 0.5 + (bassSemitone / 30);
                    createBassNote(ctx, bassSemitone, inten, dur, rootFreq);
                }
                let kickVal = isFillStep ? (step % 4 === 0 ? 1 : 0) : (current.kick[step] || 0);
                if (kickVal === 1) createKick(ctx, isFillStep ? 0.7 : 0.6);
                let snareVal = isFillStep ? (step % 8 === 4 ? 1 : 0) : (current.snare[step] || 0);
                if (snareVal === 1) createSnare(ctx, isFillStep ? 0.7 : 0.5);
                let hatVal = isFillStep ? (step % 2 === 0 ? 1 : 0) : (current.hat[step] || 0);
                if (hatVal === 1 && Math.random() < 0.7) createHat(ctx, isFillStep ? 0.4 : 0.2);

                patternStep++;
                if (patternStep % 16 === 0) { barsInVariation++; if (barsInVariation >= current.bars) barsInVariation = 0; }
                patternPlayerTimeout = setTimeout(playStep, stepDuration * 1000);
            }
            patternPlayerTimeout = setTimeout(playStep, 50);
        }

        function stopPatternPlayer() {
            if (patternPlayerTimeout) { clearTimeout(patternPlayerTimeout); patternPlayerTimeout = null; }
            if (patternPlayerActive) { patternPlayerActive.active = false; patternPlayerActive = null; }
            patternStep = 0; currentSectionPatterns = []; currentVariationIdx = 0; barsInVariation = 0; fillActive = false;
        }

        // ─── MASTER playSound ──────────────────────────────────────────
        async function playSound(type, intensity=0.7) {
            try {
                const ctx = await getAudioContext();
                if (!ctx) return;
                const now = ctx.currentTime;
                switch(type) {
                    case 'pad': createLynchPad(ctx, 55+Math.random()*25, 18+Math.random()*18, intensity); break;
                    case 'sting': createLynchSting(ctx, intensity); break;
                    case 'pulse': case 'heartbeat':
                        createKick(ctx, 0.7*intensity);
                        setTimeout(() => createKick(ctx, 0.7*intensity), 200);
                        break;
                    case 'thunder': {
                        const bufferSize = ctx.sampleRate * 0.8;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i=0; i<bufferSize; i++) {
                            data[i] = (Math.random()*2-1) * Math.exp(-i/(ctx.sampleRate*0.5));
                        }
                        const source = ctx.createBufferSource();
                        source.buffer = buffer;
                        const gain = ctx.createGain();
                        gain.gain.setValueAtTime(intensity*0.5, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now+1.2);
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = 100;
                        filter.Q.value = 0.5;
                        source.connect(filter);
                        filter.connect(gain);
                        gain.connect(ctx.destination);
                        source.start(now);
                        source.stop(now+1.2);
                        break;
                    }
                    case 'bell': {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 60 + Math.random()*25;
                        const gain = ctx.createGain();
                        gain.gain.setValueAtTime(0, now);
                        gain.gain.linearRampToValueAtTime(intensity*0.35, now+0.15);
                        gain.gain.exponentialRampToValueAtTime(0.001, now+4);
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = 350;
                        osc.connect(filter);
                        filter.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now+4);
                        break;
                    }
                    case 'climax': createLynchClimax(ctx, intensity); break;
                    case 'industrial_hum': createIndustrialTexture(ctx, 12+Math.random()*10, intensity); break;
                    case 'string_pad': createStringPad(ctx, 55+Math.random()*30, 14+Math.random()*16, intensity); break;
                    case 'cello_drone': createCelloDrone(ctx, 40+Math.random()*25, 12+Math.random()*14, intensity); break;
                    case 'string_swell': createStringSwell(ctx, 50+Math.random()*40, 6+Math.random()*8, intensity); break;
                    case 'violin_texture': createViolinHarmonics(ctx, 80+Math.random()*60, 10+Math.random()*12, intensity); break;
                    case 'pizzicato':
                        createPizzicato(ctx, 60+Math.random()*50, intensity);
                        setTimeout(() => createPizzicato(ctx, 55+Math.random()*45, intensity*0.7), 180+Math.random()*250);
                        break;
                    case 'string_cluster': {
                        const clusterFreqs = [];
                        const root = 45 + Math.random()*35;
                        for (let i=0; i<5; i++) clusterFreqs.push(root*(1+(Math.random()-0.5)*0.25));
                        createStringCluster(ctx, clusterFreqs, 8+Math.random()*10, intensity);
                        break;
                    }
                    case 'bass': {
                        const semitone = Math.floor(Math.random()*12);
                        createBassNote(ctx, semitone, intensity, 1.5+Math.random()*1.5, 40);
                        break;
                    }
                    case 'kick': createKick(ctx, intensity); break;
                    case 'snare': createSnare(ctx, intensity); break;
                    case 'hat': createHat(ctx, intensity*0.5); break;
                    default: console.warn('Unknown sound type:', type);
                }
            } catch(err) { console.warn('playSound error:', err); }
        }

        // ─── AMBIENT ──────────────────────────────────────────────────
        async function playAmbient(type, durationSeconds, intensity=0.5) {
            try {
                stopAmbient();
                const ctx = await getAudioContext();
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(intensity*0.22, now);
                gainNode.connect(ctx.destination);
                ambientGain = gainNode;
                let source = null;
                if (type === 'ambient_drone' || type === 'wind_howl' || type === 'industrial_drone') {
                    const bufferSize = ctx.sampleRate * 1.5;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i=0; i<bufferSize; i++) data[i] = (Math.random()*2-1)*0.4;
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    noise.loop = true;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = type === 'industrial_drone' ? 120 : type === 'ambient_drone' ? 160 : 500;
                    filter.Q.value = 0.4;
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = type === 'industrial_drone' ? 50 : type === 'ambient_drone' ? 70 : 100;
                    const gainOsc = ctx.createGain();
                    gainOsc.gain.value = 0.15*intensity;
                    osc.connect(gainOsc);
                    gainOsc.connect(filter);
                    noise.connect(filter);
                    filter.connect(gainNode);
                    osc.start(now);
                    noise.start(now);
                    source = { osc, noise };
                    ambientSource = source;
                } else {
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = 80;
                    osc.connect(gainNode);
                    osc.start(now);
                    source = { osc };
                    ambientSource = source;
                }
                if (ambientTimeout) clearTimeout(ambientTimeout);
                ambientTimeout = setTimeout(() => { stopAmbient(); }, durationSeconds*1000);
            } catch(err) { console.warn('playAmbient error:', err); }
        }

        function stopAmbient() {
            if (ambientGain) {
                const now = audioCtx ? audioCtx.currentTime : 0;
                ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                ambientGain.gain.exponentialRampToValueAtTime(0.001, now+0.5);
                setTimeout(() => {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                    if (ambientGain) { ambientGain.disconnect(); ambientGain = null; }
                }, 500);
            } else {
                if (ambientSource) {
                    if (ambientSource.osc) ambientSource.osc.stop();
                    if (ambientSource.noise) ambientSource.noise.stop();
                    ambientSource = null;
                }
            }
            if (ambientTimeout) { clearTimeout(ambientTimeout); ambientTimeout = null; }
        }

        // ─── AMBIENT THEMES (AI‑DERIVED, no hardcoded fallback) ──────
        function startStringLayer(theme, rootFreq, intensity) {
            if (!audioCtx) return;
            stopStringAmbient();
            const ctx = audioCtx;
            const now = ctx.currentTime;
            const stringType = theme.stringLayer || 'soft_pad';
            const freq = rootFreq || 50;
            const inten = intensity || 0.2;
            const duration = 999;
            const allNodes = [];

            const gainNode = ctx.createGain();
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(inten*0.2, now+2);

            if (stringType === 'cello') {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 280;
                filter.Q.value = 3;
                for (let i=0; i<3; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = freq * (1 + (i-1)*0.006);
                    const vib = ctx.createOscillator();
                    vib.type = 'sine';
                    vib.frequency.value = 2 + i;
                    const vibG = ctx.createGain();
                    vibG.gain.value = 2.5;
                    vib.connect(vibG);
                    vibG.connect(osc.frequency);
                    allNodes.push(osc, vib);
                    osc.connect(filter);
                }
                filter.connect(gainNode);
            } else if (stringType === 'cluster') {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                filter.Q.value = 1.5;
                const clusterFreqs = [freq*0.98, freq, freq*1.015, freq*1.03, freq*1.05];
                clusterFreqs.forEach(f => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = f;
                    const mlfo = ctx.createOscillator();
                    mlfo.type = 'sine';
                    mlfo.frequency.value = 0.25 + Math.random()*0.5;
                    const mg = ctx.createGain();
                    mg.gain.value = 1.5;
                    mlfo.connect(mg);
                    mg.connect(osc.frequency);
                    allNodes.push(osc, mlfo);
                    osc.connect(filter);
                });
                filter.connect(gainNode);
            } else if (stringType === 'swell') {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 350;
                filter.Q.value = 2;
                const intervals = [0,4,7,12,19];
                intervals.forEach(interval => {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = freq * Math.pow(2, interval/12);
                    allNodes.push(osc);
                    osc.connect(filter);
                });
                filter.connect(gainNode);
            } else {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 550;
                filter.Q.value = 2;
                for (let i=0; i<6; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = i<3 ? 'triangle' : 'sawtooth';
                    osc.frequency.value = freq * (1 + (i-2.5)*0.007);
                    const vib = ctx.createOscillator();
                    vib.type = 'sine';
                    vib.frequency.value = 3.5 + i*0.8;
                    const vibG = ctx.createGain();
                    vibG.gain.value = 2 + i*0.5;
                    vib.connect(vibG);
                    vibG.connect(osc.frequency);
                    allNodes.push(osc, vib);
                    osc.connect(filter);
                }
                filter.connect(gainNode);
            }

            const wetSend = ctx.createGain();
            wetSend.gain.value = 0.6;
            gainNode.connect(wetSend);
            wetSend.connect(wetGain || ctx.destination);
            gainNode.connect(dryGain || ctx.destination);

            allNodes.forEach(n => n.start(now));
            stringAmbientActive = {
                nodes: allNodes, gainNode, wetSend,
                stop: () => {
                    gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime+1);
                    allNodes.forEach(n => { try { n.stop(ctx.currentTime+1.2); } catch(e) {} });
                }
            };
        }

        function stopStringAmbient() {
            if (stringAmbientActive) { stringAmbientActive.stop(); stringAmbientActive = null; }
        }

        // ─── THEME AMBIENT (AI‑derived parameters) ────────────────────
        function startHauntingAmbient(themeName, scoreData) {
            if (!audioCtx) return;
            stopSectionAmbient();
            const ctx = audioCtx;
            const now = ctx.currentTime;

            // Derive ambient parameters from AI score data or use sensible defaults
            let rootFreq = 45, detuneSpread = 10, filterBase = 150, lfoRate = 0.06, noiseMix = 0.2, intensity = 0.3;
            let stringLayer = 'soft_pad', stringFreq = 50, stringIntensity = 0.18;

            if (scoreData && scoreData[themeName]) {
                const theme = scoreData[themeName];
                const bpm = theme.bpm || 60;
                // Map BPM and patterns to ambient character
                const bassPattern = theme.bass || [0,7,5,3,0,7,5,3];
                const avgBass = bassPattern.reduce((a,b) => a + Math.abs(b), 0) / bassPattern.length;
                rootFreq = 40 + Math.min(30, avgBass * 1.5);
                detuneSpread = 6 + Math.min(20, avgBass * 1.2);
                filterBase = 120 + Math.min(180, avgBass * 6);
                lfoRate = 0.04 + (bpm / 200);
                noiseMix = 0.05 + (bpm / 300);
                intensity = 0.15 + (bpm / 180);
                if (bpm > 55) { stringLayer = 'swell'; stringFreq = rootFreq * 0.9; stringIntensity = 0.25 + (bpm/180); }
                else if (bpm > 48) { stringLayer = 'cello'; stringFreq = rootFreq * 0.8; stringIntensity = 0.2 + (bpm/200); }
                else { stringLayer = 'soft_pad'; stringFreq = rootFreq * 0.95; stringIntensity = 0.15 + (bpm/200); }
                if (bpm > 65) { stringLayer = 'cluster'; stringFreq = rootFreq * 0.85; stringIntensity = 0.3 + (bpm/180); }
            } else {
                // Only if absolutely no score data — but we should never get here
                // since we require AI-generated scores. This is a safety net that will
                // still use derived values from the theme name.
                const themeMap = {
                    intro: { root:45, spread:10, filter:150, rate:0.06, noise:0.15, inten:0.25, layer:'soft_pad', sfreq:50, sinten:0.18 },
                    setup: { root:48, spread:12, filter:130, rate:0.08, noise:0.25, inten:0.30, layer:'cello', sfreq:44, sinten:0.22 },
                    scheme: { root:44, spread:16, filter:110, rate:0.10, noise:0.35, inten:0.40, layer:'swell', sfreq:48, sinten:0.30 },
                    execution: { root:42, spread:18, filter:90, rate:0.12, noise:0.45, inten:0.50, layer:'cluster', sfreq:42, sinten:0.38 },
                    twist: { root:40, spread:8, filter:140, rate:0.05, noise:0.10, inten:0.20, layer:'soft_pad', sfreq:46, sinten:0.12 },
                    closing: { root:38, spread:6, filter:160, rate:0.04, noise:0.08, inten:0.15, layer:'soft_pad', sfreq:42, sinten:0.10 }
                };
                const fallback = themeMap[themeName] || themeMap.intro;
                rootFreq = fallback.root; detuneSpread = fallback.spread; filterBase = fallback.filter;
                lfoRate = fallback.rate; noiseMix = fallback.noise; intensity = fallback.inten;
                stringLayer = fallback.layer; stringFreq = fallback.sfreq; stringIntensity = fallback.sinten;
            }

            // Build ambient drone
            const gainNode = ctx.createGain();
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(intensity*0.2, now+1.5);
            const oscs = [];
            for (let i=0; i<3; i++) {
                const osc = ctx.createOscillator();
                osc.type = i===0 ? 'sawtooth' : i===1 ? 'triangle' : 'sawtooth';
                const detune = (i-1)*detuneSpread;
                osc.frequency.value = rootFreq * Math.pow(2, detune/1200);
                oscs.push(osc);
            }
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = filterBase;
            filter.Q.value = 2.5;
            const lfo = ctx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = lfoRate;
            const lfoGain = ctx.createGain();
            lfoGain.gain.value = 80;
            lfo.connect(lfoGain);
            lfoGain.connect(filter.frequency);
            oscs.forEach(o => o.connect(filter));
            filter.connect(gainNode);
            const wetSend = ctx.createGain();
            wetSend.gain.value = 0.55;
            gainNode.connect(wetSend);
            wetSend.connect(wetGain || ctx.destination);
            gainNode.connect(dryGain || ctx.destination);
            oscs.forEach(o => o.start(now));
            lfo.start(now);
            if (noiseMix > 0.02) {
                const bufferSize = ctx.sampleRate * 2;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i=0; i<bufferSize; i++) data[i] = (Math.random()*2-1)*noiseMix;
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                noise.loop = true;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'lowpass';
                noiseFilter.frequency.value = filterBase*0.7;
                noiseFilter.Q.value = 0.3;
                const noiseGain = ctx.createGain();
                noiseGain.gain.value = noiseMix*0.3;
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(gainNode);
                noise.start(now);
                oscs.push(noise);
            }
            sectionAmbientActive = {
                stop: () => {
                    gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime+0.6);
                    oscs.forEach(s => { try { s.stop(ctx.currentTime+0.8); } catch(e) {} });
                    try { lfo.stop(ctx.currentTime+0.8); } catch(e) {}
                    sectionAmbientActive = null;
                }
            };
            // Start string layer with derived parameters
            const stringTheme = { stringLayer };
            startStringLayer(stringTheme, stringFreq, stringIntensity);
            // Start pattern player with AI score
            startEvolvingPatternPlayer(themeName, 40, scoreData);
        }

        function transitionSectionTheme(themeName, scoreData) {
            if (scoreData) sectionThemeScore = scoreData;

        }

        async function mistralChat(msgs, maxTok=500, timeoutMs=28000) {
            if (!apiKey) throw new Error('API key missing');
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const res = await fetch(MISTRAL_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
                    body: JSON.stringify({ model:MODEL, messages:msgs, temperature:0.9, max_tokens:maxTok }),
                    signal: controller.signal
                });
                if (!res.ok) { const errText = await res.text(); throw new Error(`API error ${res.status}: ${errText}`); }
                const data = await res.json();
                return data.choices[0].message.content.trim();
            } catch(e) {
                if (e.name === 'AbortError') throw new Error('Request timed out. Please try again.');
                throw e;
            } finally { clearTimeout(timeout); }
        }

        async function generateImage(prompt) {
            const now = Date.now();
            if (now < gameState.imageCooldownUntil) {
                await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
            }
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s horror VHS, foggy roadside, dark moody cinematic, grainy film')}?width=512&height=640&seed=${Date.now()}`;
            return new Promise((resolve, reject) => {
                const img = new Image();
                let resolved = false;
                const timeout = setTimeout(() => { if (!resolved) { resolved = true; reject(new Error('Image load timeout')); } }, 15000);
                img.onload = () => { if (!resolved) { resolved = true; clearTimeout(timeout); resolve(url); } };
                img.onerror = () => { if (!resolved) { resolved = true; clearTimeout(timeout); reject(new Error('Image load error')); } };
                img.src = url;
            });
        }

        async function generateImageWithRetry(prompt, retries=2) {
            let lastError = null;
            for (let i=0; i<retries; i++) {
                try { return await generateImage(prompt); } catch(e) { lastError = e; await new Promise(r => setTimeout(r, 20)); }
            }
            throw lastError || new Error('Image generation failed');
        }

        function typewriterEffect(element, text, speed, onChar=null) {
            return new Promise((resolve) => {
                let i=0;
                element.textContent = '';
                const timer = setInterval(() => {
                    if (i < text.length) {
                        element.textContent += text.charAt(i);
                        if (onChar) onChar(i);
                        i++;
                    } else {
                        clearInterval(timer);
                        resolve();
                    }
                }, speed);
            });
        }

        function speakTextFemale(text) {
            if (!text) return;
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = speechSynthesis.getVoices();
            const femaleNames = ['Google UK English Female', 'Google US English Female', 'Samantha', 'Microsoft Zira', 'Fiona', 'Karen', 'Moira', 'Veena', 'Susan', 'Catherine'];
            let voice = null;
            for (const name of femaleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
            if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('female')) || voices[0];
            if (voice) utterance.voice = voice;
            utterance.rate = 0.58;
            utterance.pitch = 1.08;
            speechSynthesis.speak(utterance);
        }

        function speakAndTypeSynced(element, text, voiceConfig, cueChecker=null) {
            return new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const femaleNames = ['Google UK English Female', 'Google US English Female', 'Samantha', 'Microsoft Zira', 'Fiona', 'Karen', 'Moira', 'Veena', 'Susan', 'Catherine'];
                let voice = null;
                for (const name of femaleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('female')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = voiceConfig.rate || 0.58;
                utterance.pitch = voiceConfig.pitch || 1.08;
                let currentChar = 0;
                element.textContent = '';
                utterance.onboundary = (event) => {
                    const nextChar = event.charIndex + event.charLength;
                    if (nextChar > currentChar) {
                        currentChar = nextChar;
                        element.textContent = text.substring(0, currentChar);
                        if (cueChecker) cueChecker(currentChar);
                    }
                };
                utterance.onend = () => {
                    element.textContent = text;
                    if (cueChecker) cueChecker(text.length);
                    resolve();
                };
                utterance.onerror = (e) => {
                    console.warn('TTS error:', e);
                    element.textContent = text;
                    resolve();
                };
                speechSynthesis.speak(utterance);
            });
        }

        // ─── STORY & SCORE GENERATION ─────────────────────────────────
        async function generateNewHauntingStory() {
            const system = `You are Lorna Marsh, the enigmatic, soft-spoken host of The Haunting Hour. You broadcast from a fog-shrouded roadside trailer, narrating tales of ordinary people undone by one small, fateful mistake. Your voice is hypnotic, your stories unflinching, grounded in human frailty and the darkness of mundane choices.`;
            const mistakes = [
                'Picking up a hitchhiker', 'Running out of gas', 'Taking the shortcut',
                'Answering a payphone', 'Helping someone', 'Breaking into a cabin',
                'Stopping at a motel', 'Trusting the wrong person', 'Following headlights',
                'Accepting a ride', 'Leaving the door unlocked', 'Ignoring a warning sign',
                'Walking home alone', 'Flagging down a stranger', 'Taking the back road'
            ];
            const chosenMistake = mistakes[Math.floor(Math.random() * mistakes.length)];
            const prompt = `Write a 900 to 1100 word short horror story set in the 1980s for tonight's broadcast. The story must begin with one ordinary mistake: "${chosenMistake}". Set it in a remote place—a small town, a lonely highway, a back road at night, a desolate rest stop. Use tight third-person prose. No sound cues, no radio script, just pure narrative. Strict rules: no supernatural elements like ghosts, curses, magic, or dreams. The horror must be purely human—paranoia, bad decisions, cruel strangers, the terror of isolation. Follow this structure: a quiet, mundane setup where the mistake is made, then a slow-building scheme or pursuit grounded in reality, then a brutal unflinching execution, and finally an ironic twist where the protagonist's fate is sealed by their own ordinary choice. The twist must be realistic and earned. No dream cop-outs or easy escapes. Frame the story with Lorna's dreamy, hypnotic intro addressing the mistake, and close with her chilling, whisper-soft punchline. Return ONLY a valid JSON object with these fields: title (string), story (full narration string, use backslash n for line breaks), closing_remark (the chilling sign-off phrase). Output raw JSON only, no markdown.`;
            const resp = await mistralChat([{ role:'system', content:system }, { role:'user', content:prompt }], 4500, 45000);
            let jsonStr = resp.replace(/```json|```/g,'').replace(/`/g,'').trim();
            const story = JSON.parse(jsonStr);
            story.story = story.story.replace(/\\n/g, '\n');
            if (!story.title || !story.story || !story.closing_remark) throw new Error('Invalid story structure');
            let imageUrl = null;
            try {
                const imagePrompt = `Horror movie poster for a story titled "${story.title}", 1980s VHS style, foggy highway at night, dark and moody, cinematic, grainy, neon green accents`;
                imageUrl = await generateImageWithRetry(imagePrompt, 2);
            } catch(e) { console.warn('Could not generate story poster:', e); }
            gameState.hauntingPerformance = {
                title: story.title,
                story: story.story,
                closing_remark: story.closing_remark,
                imageUrl: imageUrl || '',
                rawStoryText: story.story,
                soundCues: null
            };
            saveState();
        }

        async function generateSoundCueSheet(storyText) {
            const length = storyText.length;
            const system = `You are a sound designer for a horror radio drama in the style of David Lynch and Angelo Badalamenti.
        Given a short story, return a JSON object with THREE keys:
        - "sections": an array of 5-7 sections that divide the story into emotional acts.
          Each section must have: "theme" (one of: intro, setup, scheme, execution, twist, closing), "start_char" (inclusive) and "end_char" (exclusive). The sections must cover the entire story from 0 to ${length}.
        - "cues": an array of sound events using these types: "sting", "heartbeat", "thunder", "bell", "climax", "industrial_hum", "pad", "string_pad", "cello_drone", "string_swell", "violin_texture", "pizzicato", "string_cluster", "bass", "kick", "snare".
          Include at least 40 cues, spread evenly.
        - "score": an object with keys matching the same theme names used in "sections".
          Each key must contain:
            "bpm" (integer between 40-80),
            "bass" (array of 8 integers 0-24, semitone intervals from root),
            "kick" (array of 8 integers 0/1),
            "snare" (array of 8 integers 0/1),
            "hat" (array of 8 integers 0/1).
          Make the music dreamy, atmospheric, and tense. intro should be sparse and slow, execution driving but still hazy, twist dissonant and unsettling.
        Return ONLY raw JSON.`;
            const userPrompt = `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and score patterns in the style of Angelo Badalamenti (Twin Peaks).`;
            const resp = await mistralChat([{ role:'system', content:system }, { role:'user', content:userPrompt }], 4000, 35000);
            const cleaned = resp.replace(/```json|```/g,'').trim();
            let data;
            try { data = JSON.parse(cleaned); } catch(parseErr) {
                const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                if (match) { const candidate = match[0].replace(/,\s*([}\]])/g,'$1'); try { data = JSON.parse(candidate); } catch(e2) { throw new Error('Failed to parse AI soundtrack JSON.'); } }
                else throw new Error('No JSON found in AI response.');
            }
            if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object')
                throw new Error('Missing sections, cues, or score in AI response');
            const sortedSections = data.sections.sort((a,b) => a.start_char - b.start_char);
            if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length-1].end_char < length) {
                sortedSections[0].start_char = 0;
                sortedSections[sortedSections.length-1].end_char = length;
            }
            const cues = data.cues.map(c => ({ type: c.type, position: Math.min(c.position, length-1), intensity: c.intensity || 0.7 }));
            const requiredThemes = ['intro','setup','scheme','execution','twist','closing'];
            const score = {};
            function normalizeArray(arr, maxVal=24) {
                if (!Array.isArray(arr)) throw new Error('Expected array');
                let clean = arr.map(v => { const n=Number(v); return isNaN(n)?0:Math.min(maxVal,Math.max(0,Math.round(n))); });
                if (clean.length<8) { while(clean.length<8) clean.push(0); }
                else if (clean.length>8) clean = clean.slice(0,8);
                return clean;
            }
            for (const theme of requiredThemes) {
                if (!data.score[theme]) throw new Error(`AI did not provide a score for theme "${theme}". Cannot continue.`);
                const s = data.score[theme];
                if (typeof s.bpm !== 'number' || s.bpm<30 || s.bpm>120) throw new Error(`Invalid bpm for theme "${theme}": ${s.bpm}`);
                const bass = normalizeArray(s.bass, 24);
                const kick = normalizeArray(s.kick, 1);
                const snare = normalizeArray(s.snare, 1);
                const hat   = normalizeArray(s.hat, 1);
                score[theme] = { bpm:s.bpm, bass, kick, snare, hat };
            }
            return { sections: sortedSections, cues, score };
        }

        async function generateAndPerform() {
            await generateNewHauntingStory();
            if (!gameState.hauntingPerformance) throw new Error('Failed to generate story');
            const soundtrack = await generateSoundCueSheet(gameState.hauntingPerformance.rawStoryText);
            gameState.hauntingPerformance.soundCues = soundtrack;
            saveState();
            await startHauntingPerformance();
        }

        // ─── PERFORMANCE PLAYER ────────────────────────────────────────
        async function startHauntingPerformance() {
            speechSynthesis.cancel();
            if (window.ch3Timeout) clearTimeout(window.ch3Timeout);
            const storyData = gameState.hauntingPerformance;
            if (!storyData || !storyData.story) { await generateNewHauntingStory(); return startHauntingPerformance(); }

            await getAudioContext();

            let sectionList = null, cueList = null, scoreData = null;
            if (storyData.soundCues) {
                if (Array.isArray(storyData.soundCues)) {
                    cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                    sectionList = storyData.soundCues.sections;
                    cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                    scoreData = storyData.soundCues.score;
                }
            }
            const bubble = document.getElementById('ch3SpeechBubble');
            const dialogue = document.getElementById('ch3Dialogue');
            const imageEl = document.getElementById('ch3SegmentImage');
            if (!bubble || !dialogue) return;
            const guideList = document.getElementById('ch3GuideList');
            if (guideList) guideList.style.display = 'none';
            bubble.style.borderColor = '#00ff41';
            bubble.style.boxShadow = '0 0 34px #00ff4188';
            dialogue.innerHTML = '';
            const oldBack = document.getElementById('ch3BackBtn');
            if (oldBack) oldBack.remove();
            const oldAdd = document.getElementById('ch3AddEpisodeBtn');
            if (oldAdd) oldAdd.remove();
            const posterContainer = document.getElementById('ch3PosterContainer');
            const posterTitle = document.getElementById('ch3PosterTitle');
            if (posterContainer && imageEl && storyData.imageUrl) {
                imageEl.src = storyData.imageUrl;
                imageEl.classList.add('visible');
                imageEl.style.display = 'block';
                posterContainer.classList.remove('no-image', 'loading');
                posterContainer.classList.add('visible');
                if (posterTitle) posterTitle.textContent = storyData.title || '';
            } else if (posterContainer) posterContainer.classList.add('no-image');

            // Intro
            const intro = `"Good evening, traveler… You've tuned in to The Haunting Hour. I'm Lorna Marsh. Somewhere out on the dark highway, a simple choice is about to change everything. Tonight's story… '${storyData.title}'."`;
            dialogue.textContent = '';
            speakTextFemale(intro);
            await typewriterEffect(dialogue, intro, 55);
            await new Promise(r => setTimeout(r, 1500));

            // Score indicator update loop
            let indicatorInterval = setInterval(() => {
                if (patternPlayerActive) {
                    const theme = patternPlayerActive.theme || 'intro';
                    const varIdx = currentVariationIdx;
                    const varName = currentSectionPatterns[varIdx] ? currentSectionPatterns[varIdx].name : 'A';
                    const bar = barsInVariation + 1;
                    updateScoreIndicator(theme, varName, bar);
                } else {
                    updateScoreIndicator('...', '—', 0);
                }
            }, 1000);

            // Start section music
            if (sectionList && sectionList.length > 0 && scoreData) {
                transitionSectionTheme(sectionList[0].theme, scoreData);
            } else if (scoreData) {
                transitionSectionTheme('intro', scoreData);
            }

            const storyText = storyData.rawStoryText || storyData.story;
            if (!storyText) {
                console.warn('No story text');
                await showClosingAndFinish(storyData, dialogue, indicatorInterval);
                return;
            }

            // Build cue checker
            let cueChecker = null;
            if (cueList && cueList.length > 0) {
                const sortedCues = [...cueList].sort((a,b) => a.position - b.position);
                let cueIdx = 0;
                const triggered = new Set();
                let lastLog = 0;
                const sortedSections = sectionList ? [...sectionList].sort((a,b) => a.start_char - b.start_char) : [];
                let sectionIdx = 0;
                let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                cueChecker = function check(idx) {
                    if (idx - lastLog > 500) { lastLog = idx; }
                    while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                        const sec = sortedSections[sectionIdx];
                        if (sec.theme !== currentTheme) {
                            currentTheme = sec.theme;
                            transitionSectionTheme(currentTheme, scoreData);
                        }
                        sectionIdx++;
                    }
                    while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                        const cue = sortedCues[cueIdx];
                        if (!triggered.has(cueIdx)) {
                            triggered.add(cueIdx);
                            playSound(cue.type, cue.intensity);
                        }
                        cueIdx++;
                    }
                };
            }

            // Type and speak in parallel
            dialogue.textContent = '';
            const typingPromise = typewriterEffect(dialogue, storyText, 30, cueChecker);
            const speechPromise = new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(storyText);
                const voices = speechSynthesis.getVoices();
                const femaleNames = ['Google UK English Female', 'Google US English Female', 'Samantha', 'Microsoft Zira', 'Fiona', 'Karen', 'Moira', 'Veena', 'Susan', 'Catherine'];
                let voice = null;
                for (const name of femaleNames) { voice = voices.find(v => v.name.includes(name)); if (voice) break; }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('female')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.58;
                utterance.pitch = 1.08;
                utterance.onend = () => resolve();
                utterance.onerror = () => resolve();
                speechSynthesis.speak(utterance);
            });
            await Promise.all([typingPromise, speechPromise]);

            await showClosingAndFinish(storyData, dialogue, indicatorInterval);
        }

        async function showClosingAndFinish(storyData, dialogue, indicatorInterval) {
            const closing = `"${storyData.closing_remark}"`;
            const closingLine = document.createElement('p');
            closingLine.style.marginTop = '16px';
            closingLine.style.fontStyle = 'italic';
            closingLine.style.color = '#c8e0cc';
            dialogue.appendChild(closingLine);
            speakTextFemale(closing);
            await typewriterEffect(closingLine, closing, 50);
            await new Promise(r => setTimeout(r, 1000));

            const curtainText = document.createElement('p');
            curtainText.textContent = '— Signal fades —';
            stopSectionAmbient();
            stopPatternPlayer();
            clearInterval(indicatorInterval);
            const indicator = document.getElementById('scoreIndicator');
            if (indicator) indicator.style.display = 'none';
            curtainText.style.color = '#4a6e52';
            curtainText.style.fontSize = '14px';
            dialogue.appendChild(curtainText);
            stopAmbient();

            const btnRow = document.createElement('div');
            btnRow.style.marginTop = '12px';
            btnRow.style.display = 'flex';
            btnRow.style.gap = '8px';
            btnRow.style.justifyContent = 'flex-end';
            const leaveBtn = document.createElement('button');
            leaveBtn.className = 'btn back-btn';
            leaveBtn.textContent = '← Tune Out';
            leaveBtn.addEventListener('click', () => { leaveTheater(); });
            btnRow.appendChild(leaveBtn);
            const addBtn = document.createElement('button');
            addBtn.className = 'btn accent';
            addBtn.id = 'ch3AddEpisodeBtn';
            addBtn.textContent = '➕ Save Broadcast';
            addBtn.addEventListener('click', () => { addCurrentEpisode(); addBtn.disabled = true; addBtn.textContent = '✓ Saved'; });
            btnRow.appendChild(addBtn);
            dialogue.appendChild(btnRow);
        }

        function addCurrentEpisode() {
            const perf = gameState.hauntingPerformance;
            if (!perf) return;
            gameState.ch3Episodes.push({ ...perf, rawStoryText: perf.rawStoryText, soundCues: perf.soundCues });
            saveState();
            setTimeout(() => leaveTheater(), 600);
        }

        function leaveTheater() {
            stopAmbient();
            stopSectionAmbient();
            stopPatternPlayer();
            const indicator = document.getElementById('scoreIndicator');
            if (indicator) indicator.style.display = 'none';
            renderChannel3();
        }

        // ─── INIT ──────────────────────────────────────────────────────
        function init() {
            loadState();
            renderChannel3();
            document.getElementById('resetApiBtn').addEventListener('click', () => {
                const key = prompt('Enter your Mistral API key:');
                if (key && key.length > 10) { apiKey = key; localStorage.setItem('haunting_hour_key', key); }
            });
            document.getElementById('genericModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
            document.querySelector('.game-area').addEventListener('click', (e) => {
                const portrait = e.target.closest('.host-portrait');
                if (portrait && HOST_BIO) showModal(HOST_BIO);
            });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
            if (!apiKey) setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
            document.addEventListener('click', () => { getAudioContext().catch(()=>{}); }, { once: true });
        }
        init();
    })();
    </script>
