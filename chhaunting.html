<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>THE HAUNTING HOUR · 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020503;
            --screen-bg: #050a06;
            --panel-bg: #060d08;
            --text: #b8c4ba;
            --text-dim: #4a6e52;
            --text-bright: #c8e6d0;
            --accent: #00ff41;
            --accent-dim: #003d0a;
            --border: #00cc33;
            --border-glow: 0 0 18px #00ff4155, 0 0 38px #003d0a33;
            --danger: #00ff41;
            --danger-glow: 0 0 14px #00ff4155;
            --amber: #b8c496;
            --amber-dim: #3d4a1a;
            --gold: #b8c496;
            --gold-dim: #2a3d10;
            --green: #4a7a3a;
            --neon-pulse: 0 0 8px #00ff4188, 0 0 22px #00ff4133;
            --input-bg: #0a100c;
            --button-bg: #0c1410;
            --button-hover: #101c16;
            --button-active: #0c1810;
            --bevel-light: #1c2822;
            --bevel-dark: #020603;
            --font-display: 'Creepster', 'Nosifer', cursive;
            --font-title: 'Nosifer', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Special Elite', 'Courier New', monospace;
            --font-body: 'VT323', 'Special Elite', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 30px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0a140c 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }
        .monitor-bezel {
            width: 100%;
            max-width: 540px;
            height: 100vh;
            height: 100dvh;
            max-height: 920px;
            background: #0c1410;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #1c2822, 0 0 0 4px #080d0a, 0 0 0 8px #040805, 0 8px 48px #000000dd, 0 0 60px #003d0a33;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #00ff41;
        }
        @media (max-width: 540px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                box-shadow: none;
                background: #060d08;
                border: none;
            }
        }
        .power-led {
            position: absolute;
            bottom: 18px;
            right: 22px;
            width: 8px;
            height: 8px;
            background: #00ff41;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff4199, 0 0 22px #00ff4144;
            animation: powerGlow 2.4s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%,
            100% {
                box-shadow: 0 0 10px #00ff4199, 0 0 22px #00ff4144;
            }
            50% {
                box-shadow: 0 0 16px #00ff41cc, 0 0 34px #00ff4166;
            }
        }
        .brand-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #1a3a22;
            letter-spacing: 2.5px;
            z-index: 20;
            text-transform: uppercase;
        }
        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 3px;
            border: 3px solid #00ff41;
            box-shadow: var(--border-glow), inset 0 0 90px rgba(0, 0, 0, 0.55);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 540px) {
            .game-shell {
                border-radius: 0;
                border-width: 2px;
            }
        }
        .screen-curve {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 899;
            border-radius: 1px;
            box-shadow: inset 0 0 70px rgba(0, 0, 0, 0.75), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, var(--scanline-opacity)) 0px, rgba(0, 0, 0, var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 1px;
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.7) 100%);
            border-radius: 1px;
        }
        .screen-flicker {
            animation: crtFlicker 9s ease-in-out infinite;
        }
        @keyframes crtFlicker {
            0%,
            99.3%,
            100% {
                opacity: 1;
            }
            99.4% {
                opacity: 0.55;
            }
            99.5% {
                opacity: 0.85;
            }
            99.6% {
                opacity: 0.4;
            }
            99.7% {
                opacity: 1;
            }
        }
        .marquee {
            position: relative;
            z-index: 10;
            background: #020503;
            border-bottom: 3px solid #00cc33;
            padding: 10px 16px;
            text-align: center;
            font-family: var(--font-display);
            letter-spacing: 2px;
            box-shadow: 0 2px 20px #000000aa, inset 0 1px 0 #0a1a0c;
            flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #00ff41;
            border-radius: 2px;
            padding: 10px 14px;
            background: #020503;
            position: relative;
            box-shadow: inset 0 0 28px #00ff4111;
        }
        .marquee-inner::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: #00ff41;
            box-shadow: 0 0 14px #00ff4188;
        }
        .marquee-inner::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #b8c49644;
            box-shadow: 0 0 10px #b8c49633;
        }
        .marquee-title {
            font-size: var(--text-size-title);
            color: #00ff41;
            text-shadow: 0 0 18px #00ff4188, 0 2px 4px #000, 0 0 44px #00cc3355;
            letter-spacing: 3px;
            font-family: var(--font-title);
            line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #6e8a6a;
            letter-spacing: 5px;
            margin-top: 3px;
        }
        @media (max-width: 400px) {
            .marquee-title {
                font-size: 20px;
                letter-spacing: 1px;
            }
        }
        .game-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #1a3a20 #050a06;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
        }
        .game-area::-webkit-scrollbar {
            width: 5px;
        }
        .game-area::-webkit-scrollbar-track {
            background: #050a06;
        }
        .game-area::-webkit-scrollbar-thumb {
            background: #1a3a20;
            border-radius: 3px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            flex: 1;
        }
        .btn {
            background: var(--button-bg);
            border: 2px solid #1c2822;
            border-top-color: #28342c;
            border-left-color: #243028;
            border-right-color: #141c18;
            border-bottom-color: #0c1410;
            padding: 12px 18px;
            border-radius: 3px;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.1s;
            min-height: var(--btn-min-height);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 2px 0 #00000044;
            white-space: nowrap;
        }
        .btn:active {
            border-top-color: #141c18;
            border-left-color: #141c18;
            border-bottom-color: #28342c;
            border-right-color: #243028;
            box-shadow: 0 0px 0 #00000044;
            transform: translateY(1px);
            background: #0c1410;
        }
        .btn.accent {
            background: #08140c;
            border-color: #1a4a22;
            border-top-color: #1a6a2e;
            border-left-color: #165a28;
            border-right-color: #0f2e18;
            border-bottom-color: #081a0c;
            color: #b8d4a8;
            box-shadow: 0 2px 0 #00000044, 0 0 12px #00ff4122;
        }
        .btn.accent:active {
            border-top-color: #0f2e18;
            border-left-color: #0f2e18;
            border-bottom-color: #1a6a2e;
            border-right-color: #165a28;
            box-shadow: 0 0px 0 #00000044, 0 0 18px #00ff4144;
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            min-height: 28px;
        }
        .theater-mask {
            position: relative;
            background: #060d08;
            border: 2px solid #00cc3366;
            box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.8);
        }
        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #050a07;
            border: 2px solid #00ff41;
            padding: 15px;
            border-radius: 3px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            border: 3px solid #00ff41;
            box-shadow: 0 0 26px #00ff4166, 0 0 0 2px #0a1a0c;
            object-fit: cover;
            flex-shrink: 0;
            background: #050a07;
        }
        .speech-bubble {
            flex: 1;
            background: #0c1410;
            border: 2px solid #00ff41;
            border-radius: 6px;
            padding: 12px;
            position: relative;
            color: #c8e0cc;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #00ff4188 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 3px;
            max-height: 200px;
            object-fit: cover;
            background: #050a07;
            border: 1px solid #1a3a20;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #0c1410;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a6e52;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
            line-height: 1.4;
        }
        .story-poster-container {
            position: relative;
            display: block;
            width: 100%;
            max-height: 240px;
            overflow: hidden;
            border-radius: 3px;
            border: 2px solid #00cc33;
            box-shadow: 0 0 22px #00ff4144, inset 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            background: #050a07;
        }
        .story-poster-container .segment-image {
            display: block;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border: none;
            border-radius: 1px;
        }
        .story-poster-container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(2, 5, 3, 0.85) 100%);
            z-index: 2;
        }
        .poster-overlay-theater {
            position: absolute;
            top: 8px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-title);
            font-size: 14px;
            letter-spacing: 3px;
            color: #00ff41;
            text-shadow: 0 0 12px #00ff41cc, 0 0 34px #00ff4188, 0 2px 4px #000000, 0 0 60px #003d0a;
            text-transform: uppercase;
            line-height: 1.2;
            background: linear-gradient(to bottom,
                    rgba(2, 5, 3, 0.9) 0%,
                    rgba(2, 5, 3, 0.7) 40%,
                    transparent 100%);
            padding: 6px 12px 10px;
        }
        .poster-overlay-title {
            position: absolute;
            bottom: 10px;
            left: 8px;
            right: 8px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 16px;
            letter-spacing: 1.5px;
            color: #d4e8c4;
            text-shadow: 0 0 10px #b8c49688, 0 0 24px #3d4a1a44, 0 2px 4px #000000;
            background: linear-gradient(to top,
                    rgba(2, 5, 3, 0.9) 0%,
                    rgba(2, 5, 3, 0.6) 50%,
                    transparent 100%);
            padding: 10px 8px 6px;
            line-height: 1.3;
        }
        .story-poster-container.no-image {
            display: none;
        }
        .story-poster-container.loading {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a6e52;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .story-poster-container.loading .segment-image,
        .story-poster-container.loading .poster-overlay-theater,
        .story-poster-container.loading .poster-overlay-title {
            display: none;
        }
        @media (max-width: 480px) {
            .story-poster-container {
                max-height: 180px;
            }
            .poster-overlay-theater {
                font-size: 11px;
                letter-spacing: 2px;
                top: 4px;
                padding: 4px 8px 8px;
            }
            .poster-overlay-title {
                font-size: 13px;
                bottom: 6px;
                padding: 8px 6px 4px;
            }
        }
        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #00ff41;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #c8e0cc;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
            text-shadow: 0 0 12px #00ff4144;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #080d0a;
            border: 1px solid #00ff41;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #00ff41;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #c8e0cc;
        }
        .guide-desc {
            font-size: 15px;
            color: #4a6e52;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }
        .guide-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #080d0a;
            border-radius: 5px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #00ff41;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #b8c4ba;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #0c1410;
            border: 2px solid #00ff4166;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #b8c4ba;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #00ff41;
            box-shadow: 0 0 16px #00ff4144;
        }
        .loading-text {
            color: #b8c496;
            font-style: italic;
        }
        .blink {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #020503;
            border-top: 1px solid #00ff4144;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #1a3a22;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #2a4a30;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #101c14;
            color: #2a4a30;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #1a3a22;
            color: #4a6e52;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #c8e0cc;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
        @media (max-width: 480px) {
            .tv-stage-row {
                flex-direction: column;
                align-items: center;
            }
            .speech-bubble::before {
                display: none;
            }
            .host-portrait {
                width: 80px;
                height: 80px;
                border-radius: 3px;
            }
            .guide-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .guide-time {
                text-align: left;
            }
            .segment-image {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor-bezel">
        <div class="brand-label">THE HAUNTING HOUR · CRT-84</div>
        <div class="power-led"></div>
        <div class="game-shell screen-flicker">
            <div class="screen-curve"></div>
            <div class="crt-overlay"></div>
            <div class="marquee">
                <div class="marquee-inner">
                    <div class="marquee-title">THE HAUNTING<br>HOUR</div>
                    <div class="marquee-sub">⏤ 1984 ⏤</div>
                </div>
            </div>
            <div class="game-area">
                <div id="channel3Panel" class="panel" style="display:flex;"></div>
            </div>
            <div class="footer-strip">
                <span id="footerMsg">📻 THE HAUNTING HOUR · ON AIR</span>
                <button id="resetApiBtn">🔑 API KEY</button>
            </div>
        </div>
    </div>
    <div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

    <script>
        (function() {
            const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
            const MODEL = 'mistral-small-latest';
            let apiKey = localStorage.getItem('haunting_hour_key') || '';

            const DEFAULT_STATE = {
                ch3Episodes: [],
                hauntingPerformance: null,
                imageCooldownUntil: 0,
            };
            let gameState = { ...DEFAULT_STATE };

            const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;',
                "'": '&#39;', '"': '&quot;' })[m]);

            const HOST_BIO = `
        <h2>📻 Lorna Marsh</h2>
        <p style="text-align:left;">
            <strong>Show:</strong> <em>The Haunting Hour</em><br>
            <strong>Bio:</strong> A former late-night radio DJ from a small Pacific Northwest town, Lorna vanished for seven years—only to return with a voice that seems to drift in from somewhere else entirely. Broadcasting from a fog-shrouded roadside trailer, she spins tales of ordinary people who made one small, terrible mistake. Her hypnotic cadence and the faint hum of her transmitter have led some listeners to wonder: is she still alive, or merely still <em>broadcasting</em>?
        </p>
    `;

            // ── SOUND ENGINE (Web Audio API) ──
            let audioCtx = null;
            let ambientSource = null;
            let ambientGain = null;
            let ambientTimeout = null;
            let keepAliveNode = null;
            let reverbNode = null;
            let masterGain = null;
            let dryGain = null;
            let wetGain = null;
            let sectionAmbientActive = null;
            let crossfadeTimeout = null;

            function createKeepAlive(ctx) {
                if (keepAliveNode) return;
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 30;
                const gain = ctx.createGain();
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(0);
                keepAliveNode = { source: osc, gain };
            }

            async function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    createKeepAlive(audioCtx);
                    initReverb(audioCtx);
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.22;
                    reverbNode.connect(masterGain);
                    masterGain.connect(audioCtx.destination);
                    const compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.value = -24;
                    compressor.knee.value = 30;
                    compressor.ratio.value = 12;
                    compressor.attack.value = 0.003;
                    compressor.release.value = 0.25;
                    masterGain.connect(compressor);
                    compressor.connect(audioCtx.destination);
                    dryGain = audioCtx.createGain();
                    dryGain.gain.value = 1.0;
                    wetGain = audioCtx.createGain();
                    wetGain.gain.value = 0.35;
                    dryGain.connect(masterGain);
                    wetGain.connect(reverbNode);
                    reverbNode.connect(masterGain);
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                return audioCtx;
            }

            function initReverb(ctx) {
                if (!reverbNode) {
                    const sampleRate = ctx.sampleRate;
                    const length = sampleRate * 3;
                    const impulse = ctx.createBuffer(2, length, sampleRate);
                    const left = impulse.getChannelData(0);
                    const right = impulse.getChannelData(1);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.exp(-i / (sampleRate * 0.55));
                        left[i] = (Math.random() * 2 - 1) * decay;
                        right[i] = (Math.random() * 2 - 1) * decay;
                    }
                    reverbNode = ctx.createConvolver();
                    reverbNode.buffer = impulse;
                    reverbNode.normalize = true;
                }
                return reverbNode;
            }

            function createSynthPad(ctx, frequency, duration, intensity = 0.6) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.16, now + 0.8);
                gainNode.gain.setValueAtTime(intensity * 0.16, now + duration - 1.5);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.5);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = frequency * 1.005;
                const osc3 = ctx.createOscillator();
                osc3.type = 'triangle';
                osc3.frequency.value = frequency * 0.995;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 2.5;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.12 + Math.random() * 0.15;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 250 + Math.random() * 250;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.8);
                osc2.stop(now + duration + 0.8);
                osc3.stop(now + duration + 0.8);
                lfo.stop(now + duration + 0.8);
            }

            function createSting(ctx, intensity = 0.5) {
                const now = ctx.currentTime;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.18, now + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 2.0);

                const osc = ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.35);
                osc.frequency.exponentialRampToValueAtTime(80, now + 1.6);

                const osc2 = ctx.createOscillator();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(240, now);
                osc2.frequency.exponentialRampToValueAtTime(800, now + 0.35);
                osc2.frequency.exponentialRampToValueAtTime(160, now + 1.6);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 700;
                filter.Q.value = 1.5;

                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc.start(now);
                osc2.start(now);
                osc.stop(now + 2.0);
                osc2.stop(now + 2.0);
            }

            function createClimax(ctx, intensity = 0.8) {
                const now = ctx.currentTime;
                const duration = 10 + Math.random() * 8;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(intensity * 0.45, now + 3);
                gainNode.gain.setValueAtTime(intensity * 0.55, now + duration - 1.5);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(90, now);
                osc1.frequency.exponentialRampToValueAtTime(180, now + duration * 0.5);
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(180, now);
                osc2.frequency.exponentialRampToValueAtTime(360, now + duration * 0.5);
                const osc3 = ctx.createOscillator();
                osc3.type = 'triangle';
                osc3.frequency.setValueAtTime(90, now);
                osc3.frequency.exponentialRampToValueAtTime(270, now + duration * 0.7);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(250, now);
                filter.frequency.exponentialRampToValueAtTime(1000, now + duration);
                filter.Q.value = 2.5;

                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.1;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 180;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);

                osc1.connect(filter);
                osc2.connect(filter);
                osc3.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(reverbNode || ctx.destination);

                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                lfo.start(now);
                osc1.stop(now + duration + 0.8);
                osc2.stop(now + duration + 0.8);
                osc3.stop(now + duration + 0.8);
                lfo.stop(now + duration + 0.8);
            }

            async function playSound(type, intensity = 0.7) {
                try {
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    switch (type) {
                        case 'pad':
                            const freq = 90 + Math.random() * 35;
                            createSynthPad(ctx, freq, 22 + Math.random() * 22, gainValue);
                            break;
                        case 'sting':
                            createSting(ctx, gainValue);
                            break;
                        case 'heartbeat':
                            playThump(ctx, now, 0.7 * gainValue);
                            setTimeout(() => playThump(ctx, now + 0.18, 0.7 * gainValue), 180);
                            break;
                        case 'thunder': {
                            const bufferSize = ctx.sampleRate * 0.6;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.35));
                            }
                            const source = ctx.createBufferSource();
                            source.buffer = buffer;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(gainValue * 0.55, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 130;
                            filter.Q.value = 0.5;
                            source.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            source.start(now);
                            source.stop(now + 1.0);
                            break;
                        }
                        case 'bell': {
                            const osc = ctx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.value = 65 + Math.random() * 25;
                            const gain = ctx.createGain();
                            gain.gain.setValueAtTime(0, now);
                            gain.gain.linearRampToValueAtTime(gainValue * 0.35, now + 0.15);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 4);
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 400;
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(now);
                            osc.stop(now + 4);
                            break;
                        }
                        case 'climax':
                            createClimax(ctx, gainValue);
                            break;
                        default:
                            console.warn(`Unknown sound type: ${type}`);
                    }
                } catch (err) {
                    console.error(`Error in playSound("${type}"):`, err);
                }
            }

            function playThump(ctx, time, intensity) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(55, time);
                osc.frequency.exponentialRampToValueAtTime(28, time + 0.12);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(intensity * 0.7, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(time);
                osc.stop(time + 0.12);
            }

            async function playAmbient(type, durationSeconds, intensity = 0.5) {
                try {
                    stopAmbient();
                    const ctx = await getAudioContext();
                    const now = ctx.currentTime;
                    const gainValue = Math.min(1, intensity);
                    const gainNode = ctx.createGain();
                    gainNode.gain.setValueAtTime(gainValue * 0.28, now);
                    gainNode.connect(ctx.destination);
                    ambientGain = gainNode;
                    let source = null;
                    if (type === 'ambient_drone' || type === 'wind_howl') {
                        const bufferSize = ctx.sampleRate * 1.5;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * 0.45;
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        noise.loop = true;
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = type === 'ambient_drone' ? 160 : 500;
                        filter.Q.value = 0.6;
                        const osc = ctx.createOscillator();
                        osc.type = 'triangle';
                        osc.frequency.value = type === 'ambient_drone' ? 65 : 100;
                        const gainOsc = ctx.createGain();
                        gainOsc.gain.value = 0.18 * gainValue;
                        osc.connect(gainOsc);
                        gainOsc.connect(filter);
                        noise.connect(filter);
                        filter.connect(gainNode);
                        osc.start(now);
                        noise.start(now);
                        source = { osc, noise };
                        ambientSource = source;
                    } else {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 80;
                        osc.connect(gainNode);
                        osc.start(now);
                        source = { osc };
                        ambientSource = source;
                    }
                    if (ambientTimeout) clearTimeout(ambientTimeout);
                    ambientTimeout = setTimeout(() => {
                        stopAmbient();
                    }, durationSeconds * 1000);
                } catch (err) {
                    console.error(`Error in playAmbient("${type}"):`, err);
                }
            }

            function stopAmbient() {
                if (ambientGain) {
                    const now = audioCtx ? audioCtx.currentTime : 0;
                    ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    setTimeout(() => {
                        if (ambientSource) {
                            if (ambientSource.osc) ambientSource.osc.stop();
                            if (ambientSource.noise) ambientSource.noise.stop();
                            ambientSource = null;
                        }
                        if (ambientGain) {
                            ambientGain.disconnect();
                            ambientGain = null;
                        }
                    }, 400);
                } else {
                    if (ambientSource) {
                        if (ambientSource.osc) ambientSource.osc.stop();
                        if (ambientSource.noise) ambientSource.noise.stop();
                        ambientSource = null;
                    }
                }
                if (ambientTimeout) {
                    clearTimeout(ambientTimeout);
                    ambientTimeout = null;
                }
            }

            async function mistralChat(msgs, maxTok = 500, timeoutMs = 25000) {
                if (!apiKey) throw new Error('API key missing');
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(MISTRAL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                        body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9,
                            max_tokens: maxTok }),
                        signal: controller.signal
                    });
                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error(`API error ${res.status}: ${errText}`);
                    }
                    const data = await res.json();
                    return data.choices[0].message.content.trim();
                } catch (e) {
                    if (e.name === 'AbortError') {
                        throw new Error('Request timed out. Please try again.');
                    }
                    throw e;
                } finally {
                    clearTimeout(timeout);
                }
            }

            async function generateImage(prompt) {
                const now = Date.now();
                if (now < gameState.imageCooldownUntil) {
                    await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
                }
                const url =
                    `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s horror VHS, foggy roadside, dark moody cinematic, grainy film')}?width=512&height=640&seed=${Date.now()}`;
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    let resolved = false;
                    const timeout = setTimeout(() => { if (!resolved) { resolved = true;
                            reject(new Error('Image load timeout')); } }, 15000);
                    img.onload = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            resolve(url); } };
                    img.onerror = () => { if (!resolved) { resolved = true;
                            clearTimeout(timeout);
                            reject(new Error('Image load error')); } };
                    img.src = url;
                });
            }

            async function generateImageWithRetry(prompt, retries = 2) {
                let lastError = null;
                for (let i = 0; i < retries; i++) {
                    try { return await generateImage(prompt); } catch (e) { lastError = e;
                        await new Promise(r => setTimeout(r, 20)); }
                }
                throw lastError || new Error('Image generation failed');
            }

            function typewriterEffect(element, text, speed, onChar = null) {
                return new Promise((resolve) => {
                    let i = 0;
                    element.textContent = '';
                    const timer = setInterval(() => {
                        if (i < text.length) {
                            element.textContent += text.charAt(i);
                            if (onChar) onChar(i);
                            i++;
                        } else {
                            clearInterval(timer);
                            resolve();
                        }
                    }, speed);
                });
            }

            function speakTextFemale(text) {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const femaleNames = ['Google UK English Female', 'Google US English Female', 'Samantha', 'Microsoft Zira',
                    'Fiona', 'Karen', 'Moira', 'Veena', 'Susan', 'Catherine'
                ];
                let voice = null;
                for (const name of femaleNames) {
                    voice = voices.find(v => v.name.includes(name));
                    if (voice) break;
                }
                if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('female')) || voices[0];
                if (voice) utterance.voice = voice;
                utterance.rate = 0.58;
                utterance.pitch = 1.08;
                speechSynthesis.speak(utterance);
            }

            function speakAndTypeSynced(element, text, voiceConfig, cueChecker = null) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = speechSynthesis.getVoices();
                    const femaleNames = ['Google UK English Female', 'Google US English Female', 'Samantha',
                        'Microsoft Zira', 'Fiona', 'Karen', 'Moira', 'Veena', 'Susan', 'Catherine'
                    ];
                    let voice = null;
                    for (const name of femaleNames) {
                        voice = voices.find(v => v.name.includes(name));
                        if (voice) break;
                    }
                    if (!voice) voice = voices.find(v => v.name.toLowerCase().includes('female')) || voices[0];
                    if (voice) utterance.voice = voice;
                    utterance.rate = voiceConfig.rate || 0.58;
                    utterance.pitch = voiceConfig.pitch || 1.08;
                    let currentChar = 0;
                    element.textContent = '';
                    utterance.onboundary = (event) => {
                        const nextChar = event.charIndex + event.charLength;
                        if (nextChar > currentChar) {
                            currentChar = nextChar;
                            element.textContent = text.substring(0, currentChar);
                            if (cueChecker) cueChecker(currentChar);
                        }
                    };
                    utterance.onend = () => {
                        element.textContent = text;
                        if (cueChecker) cueChecker(text.length);
                        resolve();
                    };
                    utterance.onerror = (e) => {
                        console.warn('TTS error:', e);
                        element.textContent = text;
                        resolve();
                    };
                    speechSynthesis.speak(utterance);
                });
            }

            async function generateNewHauntingStory() {
                const system =
                    `You are Lorna Marsh, the enigmatic, soft-spoken host of The Haunting Hour. You broadcast from a fog-shrouded roadside trailer, narrating tales of ordinary people undone by one small, fateful mistake. Your voice is hypnotic, your stories unflinching, grounded in human frailty and the darkness of mundane choices.`;
                const mistakes = [
                    'Picking up a hitchhiker', 'Running out of gas', 'Taking the shortcut',
                    'Answering a payphone', 'Helping someone', 'Breaking into a cabin',
                    'Stopping at a motel', 'Trusting the wrong person', 'Following headlights',
                    'Accepting a ride', 'Leaving the door unlocked', 'Ignoring a warning sign',
                    'Walking home alone', 'Flagging down a stranger', 'Taking the back road'
                ];
                const chosenMistake = mistakes[Math.floor(Math.random() * mistakes.length)];
                const prompt =
                    `Write a 900 to 1100 word short horror story set in the 1980s for tonight's broadcast. The story must begin with one ordinary mistake: "${chosenMistake}". Set it in a remote place—a small town, a lonely highway, a back road at night, a desolate rest stop. Use tight third-person prose. No sound cues, no radio script, just pure narrative. Strict rules: no supernatural elements like ghosts, curses, magic, or dreams. The horror must be purely human—paranoia, bad decisions, cruel strangers, the terror of isolation. Follow this structure: a quiet, mundane setup where the mistake is made, then a slow-building scheme or pursuit grounded in reality, then a brutal unflinching execution, and finally an ironic twist where the protagonist's fate is sealed by their own ordinary choice. The twist must be realistic and earned. No dream cop-outs or easy escapes. Frame the story with Lorna's dreamy, hypnotic intro addressing the mistake, and close with her chilling, whisper-soft punchline. Return ONLY a valid JSON object with these fields: title (string), story (full narration string, use backslash n for line breaks), closing_remark (the chilling sign-off phrase). Output raw JSON only, no markdown.`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: prompt }
                ], 4500, 45000);
                let jsonStr = resp.replace(/```json|```/g, '').replace(/`/g, '').trim();
                const story = JSON.parse(jsonStr);
                story.story = story.story.replace(/\\n/g, '\n');
                if (!story.title || !story.story || !story.closing_remark) {
                    throw new Error('Invalid story structure');
                }
                let imageUrl = null;
                try {
                    const imagePrompt =
                        `Horror movie poster for a story titled "${story.title}", 1980s VHS style, foggy highway at night, dark and moody, cinematic, grainy, neon green accents`;
                    imageUrl = await generateImageWithRetry(imagePrompt, 2);
                } catch (e) {
                    console.warn('Could not generate story poster:', e);
                }
                gameState.hauntingPerformance = {
                    title: story.title,
                    story: story.story,
                    closing_remark: story.closing_remark,
                    imageUrl: imageUrl || '',
                    rawStoryText: story.story,
                    soundCues: null
                };
                saveState();
            }

            async function generateSoundCueSheet(storyText) {
                const length = storyText.length;
                const system = `You are a sound designer for a horror radio drama in the style of David Lynch and Angelo Badalamenti.
Given a short story, return a JSON object with THREE keys:
- "sections": an array of 5-6 sections that divide the story into emotional acts.
  Each section must have: "theme" (one of: intro, setup, scheme, execution, twist, closing), "start_char" (inclusive) and "end_char" (exclusive). The sections must cover the entire story from 0 to ${length}.
- "cues": an array of sound events using only these types: "sting", "heartbeat", "thunder", "bell", "climax".
  No "pad" type. Each cue must have "position" (character index), "type", optional "intensity" (0-1).
  Include at least 35 cues, spread evenly.
- "score": an object with keys matching the same theme names used in "sections".
  Each key must contain:
    "bpm" (integer between 40-90, slower and dreamier than typical),
    "bass" (array of 8 semitone intervals from a root of 0, use minor and suspended intervals for a Lynchian feel),
    "arp" (array of 8 semitone intervals for a dreamy arpeggio),
    "kick" (array of 8 numbers, 1 = hit, 0 = rest, keep sparse),
    "snare" (same as kick, very sparse).
  Make the music dreamy, atmospheric, and tense. intro should be sparse and slow with a walking bass feel, execution driving but still hazy, twist dissonant and unsettling.

Return ONLY raw JSON.`;
                const userPrompt =
                    `Story text (${length} characters):\n${storyText}\n\nGenerate sections, cues, and score patterns in the style of Angelo Badalamenti (Twin Peaks).`;
                const resp = await mistralChat([
                    { role: 'system', content: system },
                    { role: 'user', content: userPrompt }
                ], 4000, 35000);
                const cleaned = resp.replace(/```json|```/g, '').trim();
                let data;
                try {
                    data = JSON.parse(cleaned);
                } catch (parseErr) {
                    console.warn('AI JSON was malformed, trying to repair…', parseErr);
                    const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                    if (match) {
                        const candidate = match[0].replace(/,\s*([}\]])/g, '$1');
                        try {
                            data = JSON.parse(candidate);
                        } catch (e2) {
                            throw new Error('Failed to parse AI soundtrack JSON even after repair.');
                        }
                    } else {
                        throw new Error('No JSON found in AI response.');
                    }
                }
                if (!Array.isArray(data.sections) || !Array.isArray(data.cues) || typeof data.score !== 'object') {
                    throw new Error('Missing sections, cues, or score in AI response');
                }
                const sortedSections = data.sections.sort((a, b) => a.start_char - b.start_char);
                if (sortedSections[0].start_char !== 0 || sortedSections[sortedSections.length - 1].end_char < length) {
                    sortedSections[0].start_char = 0;
                    sortedSections[sortedSections.length - 1].end_char = length;
                }
                const cues = data.cues.map(c => ({
                    type: c.type,
                    position: Math.min(c.position, length - 1),
                    intensity: c.intensity || 0.7
                }));
                const requiredThemes = ['intro', 'setup', 'scheme', 'execution', 'twist', 'closing'];
                const score = {};
                for (const theme of requiredThemes) {
                    if (data.score[theme]) {
                        score[theme] = {
                            bpm: data.score[theme].bpm || 60,
                            bass: data.score[theme].bass || [0, 7, 5, 3, 0, 7, 5, 3],
                            arp: data.score[theme].arp || [12, 15, 19, 15, 12, 15, 19, 15],
                            kick: data.score[theme].kick || [1, 0, 0, 0, 1, 0, 0, 0],
                            snare: data.score[theme].snare || [0, 0, 0, 1, 0, 0, 0, 1]
                        };
                    } else {
                        score[theme] = {
                            bpm: 60,
                            bass: [0, 7, 5, 3, 0, 7, 5, 3],
                            arp: [12, 15, 19, 15, 12, 15, 19, 15],
                            kick: [1, 0, 0, 0, 1, 0, 0, 0],
                            snare: [0, 0, 0, 1, 0, 0, 0, 1]
                        };
                    }
                }
                return { sections: sortedSections, cues, score };
            }

            async function generateAndPerform() {

            function createNote(ctx, frequency, startTime, duration, gainValue, type = 'triangle') {
                const now = startTime;
                const osc1 = ctx.createOscillator();
                osc1.type = type;
                osc1.frequency.value = frequency;
                const osc2 = ctx.createOscillator();
                osc2.type = type;
                osc2.frequency.value = frequency * 1.006;
                const sub = ctx.createOscillator();
                sub.type = 'sine';
                sub.frequency.value = frequency / 2;
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 350;
                filter.Q.value = 2;
                const filterEnv = ctx.createGain();
                filterEnv.gain.setValueAtTime(600, now);
                filterEnv.gain.exponentialRampToValueAtTime(180, now + 0.15);
                filterEnv.gain.exponentialRampToValueAtTime(60, now + duration * 0.8);
                filterEnv.connect(filter.frequency);
                const mainGain = ctx.createGain();
                mainGain.gain.setValueAtTime(0, now);
                mainGain.gain.linearRampToValueAtTime(gainValue * 0.25, now + 0.03);
                mainGain.gain.setValueAtTime(gainValue * 0.25, now + duration * 0.6);
                mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.15);
                osc1.connect(filter);
                osc2.connect(filter);
                sub.connect(filter);
                filter.connect(mainGain);
                const drySend = ctx.createGain();
                drySend.gain.value = 0.7;
                const wetSend = ctx.createGain();
                wetSend.gain.value = 0.5;
                mainGain.connect(drySend);
                mainGain.connect(wetSend);
                drySend.connect(dryGain);
                wetSend.connect(wetGain);
                osc1.start(now);
                osc2.start(now);
                sub.start(now);
                osc1.stop(now + duration + 0.3);
                osc2.stop(now + duration + 0.3);
                sub.stop(now + duration + 0.3);
            }

            function createKick(ctx, time) {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(130, time);
                osc.frequency.exponentialRampToValueAtTime(28, time + 0.1);
                const gainBody = ctx.createGain();
                gainBody.gain.setValueAtTime(0.6, time);
                gainBody.gain.exponentialRampToValueAtTime(0.001, time + 0.22);
                osc.connect(gainBody);
                gainBody.connect(dryGain);
                osc.start(time);
                osc.stop(time + 0.22);
            }

            function createSnare(ctx, time) {
                const body = ctx.createOscillator();
                body.type = 'triangle';
                body.frequency.setValueAtTime(180, time);
                body.frequency.exponentialRampToValueAtTime(70, time + 0.1);
                const bodyGain = ctx.createGain();
                bodyGain.gain.setValueAtTime(0.5, time);
                bodyGain.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
                body.connect(bodyGain);
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.18, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.04));
                }
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 1000;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.55, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.14);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                bodyGain.connect(dryGain);
                noiseGain.connect(dryGain);
                body.start(time);
                noise.start(time);
                body.stop(time + 0.12);
                noise.stop(time + 0.18);
            }

            const SCORE_PATTERNS = {
                intro: {
                    bpm: 42,
                    bass: [0, 7, 5, 3, 0, 7, 5, 3],
                    arp: [12, 15, 19, 15, 12, 15, 19, 15],
                    kick: [1, 0, 0, 0, 1, 0, 0, 0],
                    snare: [0, 0, 0, 1, 0, 0, 0, 1]
                },
                setup: {
                    bpm: 48,
                    bass: [0, 3, 5, 7, 8, 7, 5, 3],
                    arp: [12, 15, 19, 22, 24, 22, 19, 15],
                    kick: [1, 0, 0, 0, 1, 0, 0, 0],
                    snare: [0, 0, 0, 1, 0, 0, 0, 1]
                },
                scheme: {
                    bpm: 55,
                    bass: [0, 7, 3, 5, 0, 7, 3, 5],

                },
                execution: {

                    snare: [0, 1, 0, 1, 0, 1, 0, 1]
                },
                twist: {

                    snare: [0, 0, 1, 0, 0, 0, 1, 0]
                },
                closing: {

                    bass: [0, 7, 5, 0, 7, 5, 0, 7],
                    arp: [12, 15, 12, 19, 12, 15, 12, 19],

            function startSectionScore(themeName) {
                if (!audioCtx) return;
                stopSectionAmbient();
                const perf = gameState.hauntingPerformance;
                let customScore = null;
                if (perf && perf.soundCues && perf.soundCues.score) {
                    customScore = perf.soundCues.score;
                }
                const fallbackTheme = SCORE_PATTERNS[themeName] || SCORE_PATTERNS.intro;
                const theme = (customScore && customScore[themeName]) ? customScore[themeName] : fallbackTheme;
                const rootFreq = 55;
                const beatDuration = 60 / theme.bpm;
                const patternLength = theme.bass.length;
                const ctx = audioCtx;
                let step = 0;
                let nextStepTime = ctx.currentTime;
                let timeoutId = null;
                const padGain = ctx.createGain();
                padGain.gain.value = 0.08;
                const padOsc1 = ctx.createOscillator();
                padOsc1.type = 'triangle';
                padOsc1.frequency.value = rootFreq;
                const padOsc2 = ctx.createOscillator();
                padOsc2.type = 'triangle';
                padOsc2.frequency.value = rootFreq * 1.503;
                const padOsc3 = ctx.createOscillator();
                padOsc3.type = 'sine';
                padOsc3.frequency.value = rootFreq / 2;
                const padFilter = ctx.createBiquadFilter();
                padFilter.type = 'lowpass';
                padFilter.frequency.value = 280;
                padFilter.Q.value = 1.2;
                padOsc1.connect(padFilter);
                padOsc2.connect(padFilter);
                padOsc3.connect(padFilter);
                padFilter.connect(padGain);
                const padDry = ctx.createGain();
                padDry.gain.value = 0.5;
                const padWet = ctx.createGain();
                padWet.gain.value = 0.4;
                padGain.connect(padDry);
                padGain.connect(padWet);
                padDry.connect(dryGain);
                padWet.connect(wetGain);
                padOsc1.start();
                padOsc2.start();
                padOsc3.start();
                const stopSources = [padOsc1, padOsc2, padOsc3];

                function scheduleStep() {
                    if (!sectionAmbientActive) return;
                    const now = nextStepTime;
                    const bassSemitone = theme.bass[step % patternLength];
                    const bassFreq = rootFreq * Math.pow(2, bassSemitone / 12);
                    createNote(ctx, bassFreq, now, beatDuration * 0.9, 0.7, 'triangle');
                    const arpSemitone = theme.arp[step % patternLength];
                    const arpFreq = rootFreq * Math.pow(2, arpSemitone / 12);
                    createNote(ctx, arpFreq, now, beatDuration * 0.5, 0.5, 'sine');
                    if (theme.kick[step % patternLength]) createKick(ctx, now);
                    if (theme.snare[step % patternLength]) createSnare(ctx, now);
                    step++;
                    nextStepTime += beatDuration;
                    timeoutId = setTimeout(scheduleStep, (nextStepTime - ctx.currentTime) * 1000);
                }
                nextStepTime = ctx.currentTime + 0.05;
                timeoutId = setTimeout(scheduleStep, 50);
                sectionAmbientActive = {
                    stop: () => {
                        clearTimeout(timeoutId);
                        padGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
                        stopSources.forEach(s => { try { s.stop(ctx.currentTime + 0.4); } catch (e) {} });
                        sectionAmbientActive = null;
                    }
                };
            }
            const transitionSectionTheme = startSectionScore;

            function stopSectionAmbient() {
                if (sectionAmbientActive) {
                    sectionAmbientActive.stop();
                    sectionAmbientActive = null;
                }
                clearTimeout(crossfadeTimeout);
            }

            async function startHauntingPerformance() {
                speechSynthesis.cancel();
                if (window.ch3Timeout) clearTimeout(window.ch3Timeout);
                const storyData = gameState.hauntingPerformance;
                if (!storyData || !storyData.story) {
                    await generateNewHauntingStory();
                    return startHauntingPerformance();
                }
                let sectionList = null;
                let cueList = null;
                if (storyData.soundCues) {
                    if (Array.isArray(storyData.soundCues)) {
                        cueList = storyData.soundCues.filter(c => c.type && c.position !== undefined);
                    } else if (storyData.soundCues.sections && storyData.soundCues.cues) {
                        sectionList = storyData.soundCues.sections;
                        cueList = storyData.soundCues.cues.filter(c => c.type && c.position !== undefined);
                    }
                }
                const bubble = document.getElementById('ch3SpeechBubble');
                const dialogue = document.getElementById('ch3Dialogue');
                const imageEl = document.getElementById('ch3SegmentImage');
                if (!bubble || !dialogue) return;
                const guideList = document.getElementById('ch3GuideList');
                if (guideList) guideList.style.display = 'none';
                bubble.style.borderColor = '#00ff41';
                bubble.style.boxShadow = '0 0 34px #00ff4188';
                dialogue.innerHTML = '';
                const oldBack = document.getElementById('ch3BackBtn');
                if (oldBack) oldBack.remove();
                const oldAdd = document.getElementById('ch3AddEpisodeBtn');
                if (oldAdd) oldAdd.remove();
                const posterContainer = document.getElementById('ch3PosterContainer');
                const posterTitle = document.getElementById('ch3PosterTitle');
                if (posterContainer && imageEl && storyData.imageUrl) {
                    imageEl.src = storyData.imageUrl;
                    imageEl.classList.add('visible');
                    imageEl.style.display = 'block';
                    posterContainer.classList.remove('no-image', 'loading');
                    posterContainer.classList.add('visible');
                    if (posterTitle) {
                        posterTitle.textContent = storyData.title || '';
                    }
                } else if (posterContainer) {
                    posterContainer.classList.add('no-image');
                }
                const intro =
                    `"Good evening, traveler… You've tuned in to The Haunting Hour. I'm Lorna Marsh. Somewhere out on the dark highway, a simple choice is about to change everything. Tonight's story… '${storyData.title}'."`;
                dialogue.textContent = '';
                speakTextFemale(intro);
                await typewriterEffect(dialogue, intro, 55);
                await new Promise(r => setTimeout(r, 1500));
                if (sectionList && sectionList.length > 0) {
                    transitionSectionTheme(sectionList[0].theme);
                }
                const storyText = storyData.rawStoryText || storyData.story;
                let cueChecker = null;
                if (cueList && cueList.length > 0) {
                    const sortedCues = [...cueList].sort((a, b) => a.position - b.position);
                    let cueIdx = 0;
                    const triggered = new Set();
                    let lastLog = 0;
                    const sortedSections = sectionList ? [...sectionList].sort((a, b) => a.start_char - b.start_char) :
                        [];
                    let sectionIdx = 0;
                    let currentTheme = sortedSections.length > 0 ? sortedSections[0].theme : null;
                    cueChecker = function check(idx) {
                        if (idx - lastLog > 500) {
                            lastLog = idx;
                        }
                        while (sectionIdx < sortedSections.length && sortedSections[sectionIdx].start_char <= idx) {
                            const sec = sortedSections[sectionIdx];
                            if (sec.theme !== currentTheme) {
                                currentTheme = sec.theme;
                                transitionSectionTheme(currentTheme);
                            }
                            sectionIdx++;
                        }
                        while (cueIdx < sortedCues.length && sortedCues[cueIdx].position <= idx) {
                            const cue = sortedCues[cueIdx];
                            if (!triggered.has(cueIdx)) {
                                triggered.add(cueIdx);
                                playSound(cue.type, cue.intensity);
                            }
                            cueIdx++;
                        }
                    };
                }
                dialogue.textContent = '';
                if (cueChecker) {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.58, pitch: 1.08 }, (idx) => cueChecker(
                    idx));
                } else {
                    await speakAndTypeSynced(dialogue, storyText, { rate: 0.58, pitch: 1.08 });
                }
                await new Promise(r => setTimeout(r, 1200));
                const closing = `"${storyData.closing_remark}"`;
                const closingLine = document.createElement('p');
                closingLine.style.marginTop = '16px';
                closingLine.style.fontStyle = 'italic';
                closingLine.style.color = '#c8e0cc';
                dialogue.appendChild(closingLine);
                speakTextFemale(closing);
                await typewriterEffect(closingLine, closing, 50);
                await new Promise(r => setTimeout(r, 1000));
                const curtainText = document.createElement('p');
                curtainText.textContent = '— Signal fades —';
                stopSectionAmbient();
                curtainText.style.color = '#4a6e52';
                curtainText.style.fontSize = '14px';
                dialogue.appendChild(curtainText);
                stopAmbient();
                const btnRow = document.createElement('div');
                btnRow.style.marginTop = '12px';
                btnRow.style.display = 'flex';
                btnRow.style.gap = '8px';
                btnRow.style.justifyContent = 'flex-end';
                const leaveBtn = document.createElement('button');
                leaveBtn.className = 'btn back-btn';
                leaveBtn.textContent = '← Tune Out';
                leaveBtn.addEventListener('click', () => { leaveTheater(); });
                btnRow.appendChild(leaveBtn);
                const addBtn = document.createElement('button');
                addBtn.className = 'btn accent';
                addBtn.id = 'ch3AddEpisodeBtn';
                addBtn.textContent = '➕ Save Broadcast';
                addBtn.addEventListener('click', () => {
                    addCurrentEpisode();
                    addBtn.disabled = true;
                    addBtn.textContent = '✓ Saved';
                });
                btnRow.appendChild(addBtn);
                dialogue.appendChild(btnRow);
            }

                });
                if (!apiKey) {
                    setTimeout(() => document.getElementById('resetApiBtn').click(), 800);
                }
            }
            init();
        })();
    </script>
</body>
</html>
