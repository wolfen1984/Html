<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>NIGHTFALLS AM · 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Creepster&family=Nosifer&display=swap" rel="stylesheet">
    <style>
        /* ... (styles unchanged, same as before) ... */
        :root {
            --bg: #08080c;
            --screen-bg: #0c0c10;
            --panel-bg: #0e0e16;
            --text: #c8c8c8;
            --text-dim: #7a7a7a;
            --text-bright: #f0ece4;
            --accent: #ff2a4a;
            --accent-dim: #99111f;
            --border: #ff2a4a;
            --border-glow: 0 0 12px #ff003c66, 0 0 28px #ff003c22;
            --danger: #e82233;
            --danger-glow: 0 0 10px #e8223344;
            --amber: #ffaa22;
            --amber-dim: #885500;
            --green: #33cc55;
            --input-bg: #16161e;
            --button-bg: #1a1a20;
            --button-hover: #24202c;
            --button-active: #2a1018;
            --bevel-light: #2a2a35;
            --bevel-dark: #060608;
            --font-display: 'Creepster', 'Nosifer', cursive;
            --font-title: 'Nosifer', 'Creepster', cursive;
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --font-body: 'VT323', 'Courier New', monospace;
            --scanline-opacity: 0.05;
            --text-size-base: 18px;
            --text-size-sm: 14px;
            --text-size-xs: 12px;
            --text-size-lg: 22px;
            --text-size-xl: 28px;
            --text-size-title: 32px;
            --btn-min-height: 46px;
            --touch-target: 44px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
                   }

        html {
            font-size: var(--text-size-base);
            -webkit-text-size-adjust: 100%;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font-body);
            padding: 0;
            background-image: radial-gradient(ellipse at center, #0d0d18 0%, #000000 100%);
            overflow-x: hidden;
            margin: 0;
            color: var(--text);
        }

        .monitor-bezel {
            width: 100%;
            max-width: 520px;
            height: 100vh;
            height: 100dvh;
            max-height: 900px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 10px;
            box-shadow: inset 0 0 0 3px #2a2a2a, 0 0 0 4px #111111, 0 0 0 8px #0a0a0a, 0 8px 40px #000000cc;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (max-width: 520px) {
            .monitor-bezel {
                border-radius: 0;
                padding: 4px;
                max-height: 100vh;
                max-height: 100dvh;
                box-shadow: none;
                background: #0a0a0a;
            }
        }

        .power-led {
            position: absolute;
            bottom: 16px;
            right: 20px;
            width: 8px;
            height: 8px;
            background: #33ff44;
            border-radius: 50%;
            box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433;
            animation: powerGlow 2s ease-in-out infinite;
            z-index: 20;
        }
        @keyframes powerGlow {
            0%, 100% { box-shadow: 0 0 8px #33ff4488, 0 0 16px #33ff4433; }
            50% { box-shadow: 0 0 14px #33ff44aa, 0 0 24px #33ff4455; }
        }

        .brand-label {
            position: absolute;
            bottom: 14px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 9px;
            color: #333;
            letter-spacing: 2px;
            z-index: 20;
            text-transform: uppercase;
        }

        .game-shell {
            flex: 1;
            width: 100%;
            background: var(--screen-bg);
            border-radius: 4px;
            border: 3px solid #ff2a4a;
            box-shadow: var(--border-glow), inset 0 0 80px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 520px) { .game-shell { border-radius: 0; border-width: 2px; } }

        .screen-curve {
            position: absolute; inset: 0; pointer-events: none; z-index: 899;
            border-radius: 2px; box-shadow: inset 0 0 60px rgba(0,0,0,0.7), inset 0 0 10px rgba(0,0,0,0.5);
        }

        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 900;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,var(--scanline-opacity)) 0px, rgba(0,0,0,var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
            border-radius: 2px;
        }
        .crt-overlay::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%); border-radius: 2px;
        }

        .screen-flicker { animation: crtFlicker 8s ease-in-out infinite; }
        @keyframes crtFlicker { 0%,99.4%,100%{opacity:1;} 99.5%{opacity:0.6;} 99.6%{opacity:0.9;} 99.7%{opacity:0.5;} 99.8%{opacity:1;} }

        .marquee {
            position: relative; z-index: 10; background: #0c0406; border-bottom: 3px solid #ff2a4a;
            padding: 10px 16px; text-align: center; font-family: var(--font-display); letter-spacing: 2px;
            box-shadow: 0 2px 16px #00000088, inset 0 1px 0 #2a0c0c; flex-shrink: 0;
        }
        .marquee-inner {
            border: 2px solid #ff2a4a; border-radius: 3px; padding: 10px 14px; background: #080206;
            position: relative; box-shadow: inset 0 0 20px #ff003c11;
        }
        .marquee-inner::before {
            content: ''; position: absolute; top: -2px; left: 20px; right: 20px; height: 2px;
            background: #ff2a4a; box-shadow: 0 0 10px #c41e3a66;
        }
        .marquee-title {
            font-size: var(--text-size-title); color: #e8c5b0; text-shadow: 0 0 14px #c41e3a88, 0 2px 4px #000;
            letter-spacing: 3px; font-family: var(--font-title); line-height: 1.2;
        }
        .marquee-sub {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #7a6a6a;
            letter-spacing: 4px;
            margin-top: 2px;
        }
        @media (max-width: 400px) { .marquee-title { font-size: 22px; letter-spacing: 1px; } }

        .tabs-row {
            display: flex; background: #08080e; border-bottom: 2px solid #ff2a4a; z-index: 10;
            flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; gap: 0;
        }
        .tabs-row::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 1 0 auto; min-width: 60px; text-align: center; padding: 8px 4px;
            font-family: var(--font-body); font-size: 13px; color: #b08080; cursor: pointer;
            border-bottom: 4px solid transparent; background: transparent; white-space: nowrap;
            letter-spacing: 1px; transition: all 0.15s; min-height: var(--btn-min-height);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 2px; line-height: 1.2;
        }
        .tab-btn.active { color: #f0ddd0; border-bottom-color: #ff2a4a; text-shadow: 0 0 10px #c41e3a88; background: #0c0610; box-shadow: inset 0 -4px 12px #ff003c18; }
        .tab-btn:hover { color: #d4b8a8; background: #0a0810; }
        .tab-emoji { font-size: 16px; line-height: 1; }
        .tab-label { font-size: 11px; line-height: 1.2; }

        .game-area {
            flex: 1; overflow-y: auto; overflow-x: hidden; z-index: 5; scrollbar-width: thin;
            scrollbar-color: #2a0f15 #08080e; display: flex; flex-direction: column; padding: 4px 0;
        }
        .game-area::-webkit-scrollbar { width: 5px; } .game-area::-webkit-scrollbar-track { background: #08080e; } .game-area::-webkit-scrollbar-thumb { background: #2a0f15; border-radius: 3px; }

        .panel { display: none; flex-direction: column; padding: 10px; gap: 10px; flex: 1; }
        .panel.active { display: flex; }

        .btn {
            background: var(--button-bg); border: 2px solid #2a2a35; border-top-color: #3a3a48; border-left-color: #353540;
            border-right-color: #1a1a25; border-bottom-color: #111118; padding: 12px 18px; border-radius: 3px;
            color: var(--text); cursor: pointer; font-family: var(--font-body); font-size: var(--text-size-base);
            letter-spacing: 1px; text-transform: uppercase; transition: all 0.1s; min-height: var(--btn-min-height);
            display: inline-flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 2px 0 #00000044; white-space: nowrap;
        }
        .btn:active { border-top-color: #1a1a25; border-left-color: #1a1a25; border-bottom-color: #3a3a48; border-right-color: #353540; box-shadow: 0 0px 0 #00000044; transform: translateY(1px); background: #14141c; }
        .btn.accent { background: #180a10; border-color: #5c1525; border-top-color: #7a2035; border-left-color: #6a1a2a; border-right-color: #3a0f18; border-bottom-color: #200810; color: #e8a090; box-shadow: 0 2px 0 #00000044, 0 0 8px #c41e3a22; }
        .btn.accent:active { border-top-color: #3a0f18; border-left-color: #3a0f18; border-bottom-color: #7a2035; border-right-color: #6a1a2a; box-shadow: 0 0px 0 #00000044, 0 0 14px #c41e3a44; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

        .tv-stage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0a0a14;
            border: 2px solid #2a0f15;
            padding: 15px;
            border-radius: 4px;
        }
        .tv-stage-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }
        .host-portrait {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ff2a4a;
            box-shadow: 0 0 20px #c41e3a66;
            object-fit: cover;
            flex-shrink: 0;
        }
        .speech-bubble {
            flex: 1;
            background: #12121c;
            border: 2px solid #ff2a4a88;
            border-radius: 8px;
            padding: 12px;
            position: relative;
            color: #e8c5b0;
            font-size: 17px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            border-width: 8px 12px 8px 0;
            border-style: solid;
            border-color: transparent #ff2a4a88 transparent transparent;
        }
        .segment-image {
            width: 100%;
            border-radius: 4px;
            max-height: 200px;
            object-fit: cover;
            background: #0a0a12;
            border: 1px solid #2a0f15;
            display: none;
        }
        .segment-image.loading {
            display: block;
            height: 120px;
            background: #16161e;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a6a6a;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        .segment-image.visible {
            display: block;
        }
        .segment-text {
            flex: 1;
        }

        .tv-guide {
            margin-top: 15px;
            border-top: 2px solid #ff2a4a44;
            padding-top: 10px;
        }
        .tv-guide h3 {
            font-family: var(--font-display);
            color: #e8c5b0;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-size: 18px;
        }
        .guide-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0e0e16;
            border: 1px solid #1a1520;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 3px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .guide-time {
            font-family: var(--font-mono);
            font-size: 14px;
            color: #c41e3a;
            min-width: 50px;
        }
        .guide-info {
            flex: 1;
            min-width: 100px;
        }
        .guide-title {
            font-size: 16px;
            color: #e8c5b0;
        }
        .guide-desc {
            font-size: 15px;
            color: #7a6a6a;
        }
        .guide-btn {
            padding: 6px 12px;
            font-size: 14px;
            min-height: 32px;
            flex-shrink: 0;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.94);
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0e0e16;
            border-radius: 6px;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            text-align: center;
            border: 3px solid #ff2a4a;
            box-shadow: var(--border-glow), 0 0 80px #000000dd;
            color: #d4c5b2;
            max-height: 85vh;
            overflow-y: auto;
            font-size: var(--text-size-base);
        }
        .modal-btn {
            background: #1a1a20;
            border: 2px solid #ff2a4a66;
            padding: 10px 18px;
            border-radius: 3px;
            margin: 5px;
            cursor: pointer;
            color: #d4c5b2;
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            letter-spacing: 1px;
            min-height: var(--btn-min-height);
        }
        .modal-btn:active {
            border-color: #ff003c;
            box-shadow: 0 0 12px #c41e3a44;
        }

        .loading-text { color: var(--amber); font-style: italic; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .footer-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #08080e;
            border-top: 1px solid #ff2a4a66;
            z-index: 10;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #444;
            flex-shrink: 0;
        }
        .footer-strip span {
            color: #555;
            letter-spacing: 0.5px;
        }
        .footer-strip button {
            background: none;
            border: 1px solid #222;
            color: #555;
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2px;
            font-family: var(--font-mono);
        }
        .footer-strip button:hover {
            border-color: #444;
            color: #888;
        }

        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #e8c5b0;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }

        @media (max-width: 480px) {
            .tv-stage-row { flex-direction: column; align-items: center; }
            .speech-bubble::before { display: none; }
            .host-portrait { width: 80px; height: 80px; }
            .guide-entry { flex-direction: column; align-items: stretch; }
            .guide-time { text-align: left; }
            .segment-image { max-height: 150px; }
        }

        .chat-log {
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 10px;
            border: 1px solid #1a1520;
            border-radius: 4px;
            padding: 10px;
            background: #0a0a12;
            font-size: var(--text-size-base);
            line-height: 1.5;
        }
        .chat-msg { margin: 8px 0; font-size: 16px; line-height: 1.4; }
        .chat-msg.user { color: #e8a090; }
        .chat-msg.assistant { color: #d4c5b2; }
        .chat-input-row {
            display: flex;
            gap: 8px;
        }
        .chat-input-row input {
            flex: 1;
            background: var(--input-bg);
            border: 2px solid #2a2a35;
            border-radius: 3px;
            padding: 10px 12px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: var(--text-size-base);
            min-height: var(--btn-min-height);
            -webkit-user-select: text;
            user-select: text;
        }
        .back-btn {
            margin-top: 8px;
            align-self: flex-end;
        }
    </style>
</head>
<body>
<div class="monitor-bezel">
    <div class="brand-label">NIGHTFALLS AM · CRT-84</div>
    <div class="power-led"></div>
    <div class="game-shell screen-flicker">
        <div class="screen-curve"></div>
        <div class="crt-overlay"></div>
        <div class="marquee">
            <div class="marquee-inner">
                <div class="marquee-title">NIGHTFALLS AM</div>
                <div class="marquee-sub">⏤ 1984 ⏤</div>
            </div>
        </div>
        <div class="tabs-row">
            <div class="tab-btn active" data-tab="channel1"><span class="tab-emoji">📺</span><span class="tab-label">CH 1</span></div>
        </div>
        <div class="game-area">
            <div id="channel1Panel" class="panel active"></div>
        </div>
        <div class="footer-strip">
            <span id="footerMsg">📡 NIGHTFALLS AM · TUNE IN TO CHANNEL 1</span>
            <button id="resetApiBtn">🔑 API KEY</button>
        </div>
    </div>
</div>
<div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

<script>
(function() {
    const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
    const MODEL = 'mistral-small-latest';
    let apiKey = localStorage.getItem('nightfalls_am_key') || '';

    const DEFAULT_STATE = {
        ch1Episodes: [],
        geheimeWaffenTopic: null,
        imageCooldownUntil: 0,
    };
    let gameState = { ...DEFAULT_STATE };

    const esc = str => String(str ?? '').replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[m]);

    function saveState() {
        try { localStorage.setItem('nightfalls_am_state', JSON.stringify(gameState)); } catch(e) {}
    }
    function loadState() {
        try {
            const saved = localStorage.getItem('nightfalls_am_state');
            if (saved) gameState = { ...DEFAULT_STATE, ...JSON.parse(saved) };
        } catch(e) {}
    }

    async function mistralChat(msgs, maxTok = 500) {
        if (!apiKey) throw new Error('API key missing');
        const res = await fetch(MISTRAL_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
            body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9, max_tokens: maxTok })
        });
        if (!res.ok) throw new Error('API error ' + res.status + ': ' + (await res.text()));
        const data = await res.json();
        return data.choices[0].message.content.trim();
    }

    // ──── Image generation with timeout ────
    async function generateImage(prompt) {
        const now = Date.now();
        if (now < gameState.imageCooldownUntil) {
            await new Promise(r => setTimeout(r, gameState.imageCooldownUntil - now + 500));
        }
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', vintage 80s documentary VHS, dark archive style')}?width=512&height=640&seed=${Date.now()}`;
        return new Promise((resolve, reject) => {
            const img = new Image();
            let resolved = false;
            const timeout = setTimeout(() => {
                if (!resolved) {
                    resolved = true;
                    reject(new Error('Image load timeout'));
                }
            }, 15000);
            img.onload = () => {
                if (!resolved) {
                    resolved = true;
                    clearTimeout(timeout);
                    resolve(url);
                }
            };
            img.onerror = () => {
                if (!resolved) {
                    resolved = true;
                    clearTimeout(timeout);
                    reject(new Error('Image load error'));
                }
            };
            img.src = url;
        });
    }

    async function generateImageWithRetry(prompt, retries = 2) {
        let lastError = null;
        for (let i = 0; i < retries; i++) {
            try {
                const url = await generateImage(prompt);
                return url;
            } catch (e) {
                lastError = e;
                await new Promise(r => setTimeout(r, 20));
            }
        }
        throw lastError || new Error('Image generation failed');
    }

    // ──── CHANNEL 1: THE HIDDEN REICH ────
    function generateCh1Episodes() {
        return [
            { id: 'ch1_dossier', time: '11:00 PM', title: 'Tonight’s Dossier', desc: 'Oberst Schreiber unveils a classified secret.', type: 'dossier' },
            { id: 'ch1_footage', time: '11:30 PM', title: 'Archival Footage', desc: 'Rare film and documents are presented.', type: 'footage' },
            { id: 'ch1_expert', time: '12:00 AM', title: 'Expert Testimony', desc: 'A witness gives harrowing evidence.', type: 'expert' },
            { id: 'ch1_blueprint', time: '12:30 AM', title: 'The Blueprint', desc: 'Diagrams and technical details are analysed.', type: 'blueprint' },
            { id: 'ch1_questions', time: '1:00 AM', title: 'Viewer Questions', desc: 'You may ask Oberst Schreiber anything.', type: 'questions' },
            { id: 'ch1_closing', time: '1:30 AM', title: 'Closing the Dossier', desc: 'A final warning about the cover‑up.', type: 'closing' }
        ];
    }

    function renderChannel1() {
    const panel = document.getElementById('channel1Panel');
    if (!panel) return;
    if (!gameState.ch1Episodes || !gameState.ch1Episodes.length) {
        gameState.ch1Episodes = generateCh1Episodes();
        saveState();
    }

    const hostPortrait = 'oberst.jpg';

    // ── Build the host's opening line ──
    const topicObj = gameState.geheimeWaffenTopic;
    let hostDialogue = '"Good evening. I am Oberst Klaus Schreiber. For decades, the truth has been hidden. Tonight, we open the files that they want you to forget. The secret weapons of the Reich are real. Stay vigilant."';
    if (topicObj && topicObj.topic) {
        hostDialogue = `"Good evening. Tonight's dossier: <strong>${esc(topicObj.topic)}</strong>. ${esc(topicObj.summary)} We open the files they want you to forget. Stay vigilant."`;
    }

    panel.innerHTML = `
        <div class="tv-stage">
            <div class="tv-stage-row">
                <img class="host-portrait" src="${hostPortrait}" alt="Oberst Klaus Schreiber" style="object-fit:cover;">
                <div class="speech-bubble" id="ch1SpeechBubble">
                    <img id="ch1SegmentImage" class="segment-image" alt="Segment visual">
                    <div class="segment-text" id="ch1Dialogue">${hostDialogue}</div>
                </div>
            </div>
        </div>
        <div class="tv-guide">
            <h3>🛸 THE HIDDEN REICH · TONIGHT’S SECRET</h3>
            <div id="ch1GuideList"></div>
        </div>
    `;

    const guideList = document.getElementById('ch1GuideList');
    gameState.ch1Episodes.forEach(ep => {
        const entry = document.createElement('div');
        entry.className = 'guide-entry';
        entry.innerHTML = `
            <span class="guide-time">${ep.time}</span>
            <div class="guide-info">
                <div class="guide-title">${ep.title}</div>
                <div class="guide-desc">${ep.desc}</div>
            </div>
            <button class="btn guide-btn" data-episode-id="${ep.id}">Uncover</button>
        `;
        guideList.appendChild(entry);
    });

    document.querySelectorAll('#ch1GuideList .guide-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const epId = btn.dataset.episodeId;
            const episode = gameState.ch1Episodes.find(e => e.id === epId);
            if (episode) await startCh1Episode(episode);
        });
    });

    const newDossierBtn = document.createElement('button');
    newDossierBtn.className = 'btn accent';
    newDossierBtn.id = 'ch1NewDossierBtn';
    newDossierBtn.style.marginTop = '12px';
    newDossierBtn.style.width = '100%';
    newDossierBtn.textContent = '🛸 New Dossier';
    guideList.appendChild(newDossierBtn);

    document.getElementById('ch1NewDossierBtn').addEventListener('click', async () => {
        const btn = document.getElementById('ch1NewDossierBtn');
        btn.disabled = true;
        btn.textContent = '📂 Declassifying…';
        try {
            await generateNewCh1Episodes();  // topic is set inside
        } catch (e) {
            showModal(`<h2>🛸 Error</h2><p>${esc(e.message)}</p><button class="modal-btn" onclick="closeModal()">Close</button>`);
        }
        renderChannel1();
    });
}

    // Helper: typewriter effect
    function typewriterEffect(element, text, speed) {
        return new Promise((resolve) => {
            let i = 0;
            element.textContent = '';
            const timer = setInterval(() => {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    resolve();
                }
            }, speed);
        });
    }

    // Restore guide
    function restoreGuide() {
        const guideList = document.getElementById('ch1GuideList');
        if (guideList) guideList.style.display = '';
        const bubble = document.getElementById('ch1SpeechBubble');
        if (bubble) {
            bubble.style.borderColor = '#ff2a4a88';
            bubble.style.boxShadow = 'none';
        }
        const imageEl = document.getElementById('ch1SegmentImage');
        if (imageEl) {
            imageEl.classList.remove('visible', 'loading');
            imageEl.style.display = 'none';
        }
        const backBtn = document.getElementById('ch1BackBtn');
        if (backBtn) backBtn.remove();
        const respDiv = document.getElementById('ch1QuestionResponse');
        if (respDiv) respDiv.innerHTML = '';
        const input = document.getElementById('ch1QuestionInput');
        if (input) input.remove();
        const submitBtn = document.getElementById('ch1QuestionSubmit');
        if (submitBtn) submitBtn.remove();
        const dialogue = document.getElementById('ch1Dialogue');
        if (dialogue && !dialogue.querySelector('input')) {
            dialogue.textContent = '"Good evening. I am Oberst Klaus Schreiber. For decades, the truth has been hidden. Tonight, we open the files that they want you to forget. The secret weapons of the Reich are real. Stay vigilant."';
        }
    }

    // ──── Topic generation via Mistral (no fallback) ────
    async function generateNewTopic() {
        const prompt = `Pick a real, well‑known Nazi conspiracy theory from this list: Nazi UFOs (Haunebu), Die Glocke, Nazi Antarctic base (Base 211), V‑3 cannon, sun gun, Nazi moon base, or Nazi secret saucer program. Do NOT pick Hitler's escape. Return a JSON object: { "topic": "name of the secret weapon/conspiracy", "summary": "a 2‑sentence, dead‑serious description as if it were proven fact" }. JSON only. Respond in English.`;
        try {
            const resp = await mistralChat([{ role: 'user', content: prompt }], 300);
            const data = JSON.parse(resp.replace(/```json|```/g, '').trim());
            if (!data.topic || !data.summary) throw new Error('Invalid response from Mistral');
            return data;
        } catch (e) {
            throw new Error(`Failed to generate topic: ${e.message}`);
        }
    }

    // Ensure topic exists (generates if null)
    async function ensureTopicExists() {
        if (gameState.geheimeWaffenTopic) return gameState.geheimeWaffenTopic;
        // Generate a fresh topic from Mistral
        const topic = await generateNewTopic();
        gameState.geheimeWaffenTopic = topic;
        saveState();
        return topic;
    }

    async function startCh1Episode(episode) {
        speechSynthesis.cancel();
        if (window.ch1Timeout) clearTimeout(window.ch1Timeout);

        const bubble = document.getElementById('ch1SpeechBubble');
        const dialogue = document.getElementById('ch1Dialogue');
        const imageEl = document.getElementById('ch1SegmentImage');
        if (!bubble || !dialogue || !imageEl) return;

        const guideList = document.getElementById('ch1GuideList');
        if (guideList) guideList.style.display = 'none';
        bubble.style.borderColor = '#ff2a4a';
        bubble.style.boxShadow = '0 0 20px #c41e3a66';

        dialogue.innerHTML = '';
        const oldBack = document.getElementById('ch1BackBtn');
        if (oldBack) oldBack.remove();

        imageEl.classList.remove('visible', 'loading');
        imageEl.style.display = 'none';

        // 1. Ensure topic exists (generates if null, throws if fails)
        let topicObj;
        try {
            topicObj = await ensureTopicExists();
        } catch (e) {
            dialogue.textContent = `⚠️ ${e.message}`;
            const backBtn = document.createElement('button');
            backBtn.id = 'ch1BackBtn';
            backBtn.className = 'btn back-btn';
            backBtn.textContent = '← Back to Guide';
            backBtn.style.marginTop = '10px';
            backBtn.addEventListener('click', () => restoreGuide());
            dialogue.appendChild(backBtn);
            return;
        }

        const topic = topicObj.topic;

        // 2. Generate image (may fail, we handle gracefully)
        let imgUrl = null;
        let imagePrompt = '';
        switch (episode.type) {
            case 'dossier':
                imagePrompt = `A secret Nazi dossier file, classified documents, black and white photograph, 1980s documentary style, ${topic}`;
                break;
            case 'footage':
                imagePrompt = `Grainy archival film footage of ${topic}, Nazi era, black and white, documentary style`;
                break;
            case 'expert':
                imagePrompt = `A serious expert witness testifying about ${topic}, 1980s documentary interview style`;
                break;
            case 'blueprint':
                imagePrompt = `Technical blueprint diagram of ${topic}, Nazi engineering, vintage paper, 1940s style`;
                break;
            case 'questions':
                imagePrompt = `A viewer asking a question about ${topic}, 1980s TV studio, documentary style`;
                break;
            case 'closing':
                imagePrompt = `Ominous closing scene about ${topic}, dark archive, 1980s documentary`;
                break;
            default:
                imagePrompt = `Documentary scene about ${topic}, 1980s VHS style`;
        }

        imageEl.classList.add('loading');
        imageEl.style.display = 'block';
        imageEl.src = '';
        imageEl.alt = 'Loading visual…';

        try {
            imgUrl = await generateImageWithRetry(imagePrompt, 2);
        } catch (e) {
            // image failed – just hide it
        }

        if (imgUrl) {
            imageEl.src = imgUrl;
            imageEl.classList.remove('loading');
            imageEl.classList.add('visible');
            imageEl.style.display = 'block';
        } else {
            imageEl.classList.remove('loading');
            imageEl.style.display = 'none';
        }

        // 3. Run segment logic
        try {
            let segmentDone = false;
            switch (episode.type) {
                case 'dossier':
                    await playDossierOpening(dialogue, topicObj);
                    segmentDone = true;
                    break;
                case 'footage':
                    await playArchivalFootage(dialogue, topicObj);
                    segmentDone = true;
                    break;
                case 'expert':
                    await playExpertTestimony(dialogue, topicObj);
                    segmentDone = true;
                    break;
                case 'blueprint':
                    await playBlueprintAnalysis(dialogue, topicObj);
                    segmentDone = true;
                    break;
                case 'questions':
                    await playViewerQuestionsCH1(dialogue, topicObj);
                    return; // interactive
                case 'closing':
                    await playDossierClosing(dialogue, topicObj);
                    segmentDone = true;
                    break;
                default:
                    dialogue.textContent = "Unknown segment type.";
                    segmentDone = true;
            }

            if (segmentDone) {
                const backBtn = document.createElement('button');
                backBtn.id = 'ch1BackBtn';
                backBtn.className = 'btn back-btn';
                backBtn.textContent = '← Back to Guide';
                backBtn.style.marginTop = '10px';
                backBtn.addEventListener('click', () => restoreGuide());
                dialogue.appendChild(backBtn);
            }
        } catch (e) {
            dialogue.textContent = `Error: ${e.message}`;
            const backBtn = document.createElement('button');
            backBtn.id = 'ch1BackBtn';
            backBtn.className = 'btn back-btn';
            backBtn.textContent = '← Back to Guide';
            backBtn.style.marginTop = '10px';
            backBtn.addEventListener('click', () => restoreGuide());
            dialogue.appendChild(backBtn);
        }
    }

    // ──── Segment implementations (receive topicObj) ────

    async function playDossierOpening(dialogue, topicObj) {
        const opening = `Tonight's dossier: ${topicObj.topic}. ${topicObj.summary} I will show you evidence that cannot be ignored.`;
        speakTextMale(opening);
        await typewriterEffect(dialogue, opening, 25);
    }

    async function playArchivalFootage(dialogue, topicObj) {
        const topic = topicObj.topic;
        const prompt = `You are Oberst Klaus Schreiber. You are presenting a piece of "archival footage" (imaginary) that proves the Nazi secret: ${topic}. Describe the footage in vivid, convincing detail (3-4 sentences), as if you are narrating over a grainy film reel. It should sound like genuine evidence. Do not break character.`;
        const resp = await mistralChat([{ role: 'system', content: 'You are Oberst Klaus Schreiber, a true believer.' }, { role: 'user', content: prompt }], 300);
        const narration = resp.trim();
        speakTextMale(narration);
        await typewriterEffect(dialogue, narration, 25);
    }

    async function playExpertTestimony(dialogue, topicObj) {
        const topic = topicObj.topic;
        const prompt = `You are a credible-sounding "expert" (a former scientist, engineer, or soldier) testifying about the secret Nazi project: ${topic}. Give a short, serious, first-hand account (2-3 sentences) of what you saw or worked on. Use specific details and a tone of grave sincerity. Do not break character.`;
        const resp = await mistralChat([{ role: 'system', content: 'You are an eyewitness to a secret Nazi project.' }, { role: 'user', content: prompt }], 300);
        const testimony = resp.trim();
        const fullText = `Expert: "${testimony}"`;
        speakTextMale(fullText);
        await typewriterEffect(dialogue, fullText, 25);
    }

    async function playBlueprintAnalysis(dialogue, topicObj) {
        const topic = topicObj.topic;
        const prompt = `You are Oberst Klaus Schreiber. You are analyzing a detailed technical diagram of the Nazi secret weapon: ${topic}. Describe the blueprint as if you're pointing to its features (3-4 sentences). Include made-up but plausible technical details (e.g., "Here you see the mercury vortex gyroscope"). Maintain a grave, serious tone.`;
        const resp = await mistralChat([{ role: 'system', content: 'You are Oberst Schreiber.' }, { role: 'user', content: prompt }], 300);
        const analysis = resp.trim();
        speakTextMale(analysis);
        await typewriterEffect(dialogue, analysis, 25);
    }

    async function playViewerQuestionsCH1(dialogue, topicObj) {
        const topic = topicObj.topic;
        dialogue.innerHTML = `
            <p>"I will now take your questions about ${topic}. What do you wish to know?"</p>
            <div style="display:flex; gap:6px; margin-top:8px; flex-wrap:wrap;">
                <input type="text" id="ch1QuestionInput" placeholder="Ask about the conspiracy…" style="flex:1; min-width:140px; background:#16161e; border:2px solid #2a2a35; color:#c8c8c8; font-family:'VT323', monospace; padding:8px;">
                <button class="btn" id="ch1QuestionSubmit">Ask</button>
            </div>
            <div id="ch1QuestionResponse" style="margin-top:8px; color:#e8c5b0;"></div>
            <button class="btn back-btn" id="ch1QuestionBack" style="margin-top:8px; align-self:flex-end;">← Back to Guide</button>
        `;

        document.getElementById('ch1QuestionBack').addEventListener('click', () => restoreGuide());

        document.getElementById('ch1QuestionSubmit').addEventListener('click', async () => {
            const input = document.getElementById('ch1QuestionInput');
            const question = input.value.trim();
            if (!question) return;
            input.disabled = true;
            document.getElementById('ch1QuestionSubmit').disabled = true;
            const respDiv = document.getElementById('ch1QuestionResponse');
            respDiv.textContent = 'Oberst Schreiber considers…';

            const prompt = `You are Oberst Klaus Schreiber, a former Luftwaffe colonel dedicated to revealing the truth about ${topic}. A viewer asks: "${question}". Respond with a short, intensely serious, conspiratorial answer (2-3 sentences) that confirms the conspiracy and adds a new, plausible-sounding detail. Do not break character.`;
            try {
                const answer = await mistralChat([{ role: 'system', content: 'You are Oberst Schreiber.' }, { role: 'user', content: prompt }], 250);
                const fullAnswer = `"${answer.trim()}"`;
                respDiv.innerHTML = `<p><em>${esc(fullAnswer)}</em></p>`;
                speakTextMale(answer.trim());
            } catch (e) {
                respDiv.textContent = 'Error: ' + e.message;
            }
        });
    }

    async function playDossierClosing(dialogue, topicObj) {
    const topic = topicObj.topic;
    const prompt = `You are Oberst Klaus Schreiber. Give a final, ominous warning about the cover-up of ${topic}. 2-3 sentences. End with "The truth cannot stay buried forever. Stay watchful."`;
    const text = await mistralChat([{ role: 'system', content: 'You are Oberst Schreiber.' }, { role: 'user', content: prompt }], 200);
    speakTextMale(text.trim());
    await typewriterEffect(dialogue, text.trim(), 25);
    // ❌ REMOVED: gameState.geheimeWaffenTopic = null;
    // The topic will only be replaced when you click "New Dossier" again.
    saveState();
}

    // ──── Generate a fresh lineup (throws on failure) ────
    async function generateNewCh1Episodes() {
    const prompt = `You are the producer of "The Hidden Reich", a serious conspiracy‑theory documentary series hosted by Oberst Klaus Schreiber. Generate a new 6‑segment lineup for an episode covering a specific secret Nazi weapon or conspiracy. Return a JSON object with two keys:
- "topic": an object with keys "name" (the conspiracy name, e.g. "Die Glocke") and "summary" (a 2‑sentence grave, serious description as if proven fact).
- "episodes": an array of exactly 6 objects with keys: id, time (one of "11:00 PM", "11:30 PM", "12:00 AM", "12:30 AM", "1:00 AM", "1:30 AM"), title, desc, type (must be exactly one of: dossier, footage, expert, blueprint, questions, closing). Keep the tone grave and urgent. All text in English. JSON only.`;
    
    const resp = await mistralChat([{ role: 'system', content: 'You are a documentary producer.' }, { role: 'user', content: prompt }], 800);
    const data = JSON.parse(resp.replace(/```json|```/g, '').trim());
    
    if (!data.topic || !data.topic.name || !data.topic.summary) {
        throw new Error('Missing topic in response');
    }
    if (!Array.isArray(data.episodes) || data.episodes.length !== 6) {
        throw new Error('Invalid episodes format');
    }
    const types = data.episodes.map(e => e.type).sort().join(',');
    if (types !== 'blueprint,closing,dossier,expert,footage,questions') {
        throw new Error('Invalid segment types');
    }
    
    gameState.ch1Episodes = data.episodes;
    gameState.geheimeWaffenTopic = {
        topic: data.topic.name,
        summary: data.topic.summary
    };
    saveState();
}

    // ──── Speech helper ────
    function speakTextMale(text) {
        if (!text) return;
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = speechSynthesis.getVoices();
        const maleNames = [
            'Google UK English Male',
            'Google US English Male',
            'Daniel',
            'Microsoft David',
            'Fred',
            'Alex',
            'Thomas',
            'James'
        ];
        let voice = null;
        for (const name of maleNames) {
            voice = voices.find(v => v.name.includes(name));
            if (voice) break;
        }
        if (!voice) {
            voice = voices.find(v => v.name.toLowerCase().includes('male')) || voices[0];
        }
        if (voice) utterance.voice = voice;
        utterance.rate = 0.9;
        utterance.pitch = 0.95;
        speechSynthesis.speak(utterance);
    }

    // ──── Modal helpers ────
    function showModal(html) {
        document.getElementById('genericModalContent').innerHTML = html;
        document.getElementById('genericModal').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('genericModal').style.display = 'none';
        speechSynthesis.cancel();
    }
    window.closeModal = closeModal;

    function refreshAll() {
        const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab || 'channel1';
        switchTab(activeTab);
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        const tabBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
        if (tabBtn) tabBtn.classList.add('active');
        const panel = document.getElementById(tab + 'Panel');
        if (panel) panel.classList.add('active');
        if (tab === 'channel1') renderChannel1();
    }

    // ──── API Key handling ────
    document.getElementById('resetApiBtn').addEventListener('click', () => {
        const key = prompt('Enter your Mistral API key:');
        if (key && key.length > 10) {
            apiKey = key;
            localStorage.setItem('nightfalls_am_key', key);
        }
    });

    // ──── Init ────
    loadState();

    if (!gameState.ch1Episodes || !gameState.ch1Episodes.length) {
        gameState.ch1Episodes = generateCh1Episodes();
        saveState();
    }

    refreshAll();

    document.querySelectorAll('.tab-btn').forEach(t => {
        t.addEventListener('click', () => switchTab(t.dataset.tab));
    });

    document.getElementById('genericModal').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
    });

    if (!apiKey) {
        setTimeout(() => document.getElementById('resetApiBtn').click(), 600);
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
    });

})();
</script>
