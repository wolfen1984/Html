<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Text Adventure - Button-Driven CRPG</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap">
    <style>
        :root {
            --bg: #0a0a0a;
            --panel-bg: #111118;
            --border: #1a3a1a;
            --text: #c8e6c8;
            --green: #0f0;
            --green-glow: #00ff00;
            --cyan: #0ff;
            --magenta: #f0f;
            --yellow: #ff0;
            --red: #f44;
            --gold: #ffd700;
            --orange: #ff8c00;
            --purple: #9370db;
            --blue: #4488ff;
            --white: #e8e8e8;
            --dark-green: #0a0;
            --panel-header: #0d1a0d;
            --btn-bg: #0d1a0d;
            --btn-hover: #0f0;
            --btn-text: #0f0;
            --danger-zone: #1a0a0a;
            --card-bg: #14141c;
            --input-bg: #0a0a10;
            --modal-overlay: rgba(0, 0, 0, 0.85);
            --shadow: 0 0 20px rgba(0, 255, 0, 0.1);
            --glow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'VT323', monospace;
            background: #050510;
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            background-image: radial-gradient(ellipse at center, #0a1a0a 0%, #050510 70%);
        }
        #game-wrapper {
            width: 100%;
            max-width: 1300px;
            height: 98vh;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* HEADER */
        #game-header {
            background: var(--panel-bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: var(--shadow);
        }
        #game-header h1 {
            font-family: 'Press Start 2P', monospace;
            font-size: 1.1rem;
            color: var(--green);
            text-shadow: 0 0 10px var(--green-glow);
            letter-spacing: 2px;
        }
        #header-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 1.1rem;
        }
        .header-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #0a0a14;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #1a3a1a;
        }
        .header-stat .stat-icon {
            font-size: 1.3rem;
        }
        .header-stat .stat-label {
            color: #6a8a6a;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .header-stat .stat-value {
            color: var(--green);
            font-weight: bold;
            font-size: 1.2rem;
        }
        .stat-gold {
            color: var(--gold) !important;
        }
        .stat-danger {
            color: var(--red) !important;
        }

        /* MAIN CONTENT */
        #main-content {
            display: flex;
            gap: 8px;
            flex: 1;
            min-height: 0;
        }

        /* GAME LOG */
        #game-log-container {
            flex: 3;
            background: var(--panel-bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            min-width: 0;
        }
        #game-log-header {
            background: var(--panel-header);
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7rem;
            color: var(--green);
            letter-spacing: 1px;
            border-radius: 6px 6px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #game-log {
            flex: 1;
            overflow-y: auto;
            padding: 14px 18px;
            font-size: 1.15rem;
            line-height: 1.5;
            scroll-behavior: smooth;
        }
        #game-log p {
            margin-bottom: 8px;
            animation: fadeIn 0.25s ease-in;
        }
        #game-log .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        #game-log .log-highlight {
            background: rgba(0, 255, 0, 0.05);
            padding: 8px 12px;
            border-radius: 4px;
            border-left: 3px solid var(--green);
            margin: 6px 0;
        }
        #game-log strong {
            color: #fff;
        }
        #game-log em {
            color: var(--yellow);
        }
        #game-log .location {
            color: var(--yellow);
            font-weight: bold;
        }
        #game-log .npc {
            color: var(--cyan);
        }
        #game-log .item {
            color: #f90;
        }
        #game-log .enemy {
            color: var(--red);
            font-weight: bold;
        }
        #game-log .quest {
            color: var(--yellow);
        }
        #game-log .error {
            color: #ff6b6b;
        }
        #game-log .success {
            color: #5f5;
        }
        #game-log .gold {
            color: var(--gold);
        }
        #game-log .health {
            color: #f66;
        }
        #game-log .mana {
            color: #66f;
        }
        #game-log .treasure {
            color: #ffd700;
            text-shadow: 0 0 6px #ffd700;
        }
        #game-log .lore {
            color: #87ceeb;
            font-style: italic;
        }
        #game-log .shrine {
            color: #ff69b4;
        }
        #game-log .artifact {
            color: #f0f;
            text-shadow: 0 0 6px #f0f;
        }
        #game-log .set-item {
            color: #0f0;
        }
        #game-log .legendary {
            color: #ff4500;
            text-shadow: 0 0 6px #ff4500;
        }
        #game-log .level-up {
            color: #0ff;
            animation: blink 0.4s infinite;
        }
        #game-log .exploration-hint {
            color: #ffa500;
            font-style: italic;
        }
        #game-log .party-ability {
            color: #9370db;
            font-weight: bold;
        }
        #game-log .skill-check {
            color: #87ceeb;
            font-weight: bold;
        }
        #game-log .skill-success {
            color: #90ee90;
            font-weight: bold;
        }
        #game-log .skill-fail {
            color: #ff6b6b;
            font-weight: bold;
        }
        #game-log .damage-slashing {
            color: #c0c0c0;
        }
        #game-log .damage-piercing {
            color: #cd853f;
        }
        #game-log .damage-blunt {
            color: #a0522d;
        }
        #game-log .damage-elemental {
            color: #f44;
        }
        #game-log .specialization {
            color: #ffa500;
        }
        #game-log .xp {
            color: #90ee90;
        }
        #game-log .blink-text {
            animation: blink 0.8s infinite;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        /* SIDE PANEL */
        #side-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 320px;
            max-width: 420px;
        }
        #party-panel {
            flex: 3;
            background: var(--panel-bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        #party-panel-header {
            background: var(--panel-header);
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-family: 'Press Start 2P', monospace;
            font-size: 0.65rem;
            color: var(--green);
            letter-spacing: 1px;
            text-align: center;
        }
        #party-display {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .party-member-card {
            background: var(--card-bg);
            border: 1px solid #1a2a1a;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        .party-member-card:hover {
            border-color: var(--green);
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.1);
        }
        .pmc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .pmc-name {
            color: var(--cyan);
            font-weight: bold;
            font-size: 1.1rem;
        }
        .pmc-class {
            color: var(--magenta);
            font-size: 0.85rem;
        }
        .pmc-level {
            background: #1a2a1a;
            color: var(--green);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .pmc-bar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 3px 0;
            font-size: 0.85rem;
        }
        .pmc-bar-label {
            width: 28px;
            text-align: right;
            font-weight: bold;
        }
        .pmc-bar-label.hp {
            color: #f66;
        }
        .pmc-bar-label.mp {
            color: #66f;
        }
        .pmc-bar-label.xp {
            color: #90ee90;
        }
        .pmc-bar-outer {
            flex: 1;
            height: 10px;
            background: #1a1a1a;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }
        .pmc-bar-inner {
            height: 100%;
            border-radius: 5px;
            transition: width 0.3s;
        }
        .pmc-bar-inner.hp {
            background: linear-gradient(90deg, #c0392b, #e74c3c);
        }
        .pmc-bar-inner.mp {
            background: linear-gradient(90deg, #2471a3, #3498db);
        }
        .pmc-bar-inner.xp {
            background: linear-gradient(90deg, #27ae60, #2ecc71);
        }
        .pmc-bar-text {
            font-size: 0.75rem;
            color: #aaa;
            min-width: 55px;
            text-align: left;
        }
        .pmc-skills {
            font-size: 0.75rem;
            color: #8a8;
            margin-top: 4px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .pmc-skill-tag {
            background: #0d1a0d;
            border: 1px solid #1a3a1a;
            padding: 2px 7px;
            border-radius: 10px;
            font-size: 0.7rem;
            color: #6a8a6a;
        }

        /* TRAVEL PANEL */
        #travel-panel {
            flex: 2;
            background: var(--panel-bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        #travel-panel-header {
            background: var(--panel-header);
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-family: 'Press Start 2P', monospace;
            font-size: 0.65rem;
            color: var(--yellow);
            letter-spacing: 1px;
            text-align: center;
        }
        #travel-buttons {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .travel-btn {
            background: var(--btn-bg);
            border: 1px solid #1a3a1a;
            color: #8c8;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .travel-btn:hover {
            background: #0d2a0d;
            border-color: var(--green);
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
            transform: translateX(3px);
        }
        .travel-btn:active {
            transform: scale(0.97);
        }
        .travel-btn .tb-icon {
            font-size: 1.3rem;
            width: 24px;
            text-align: center;
        }
        .travel-btn .tb-name {
            font-weight: bold;
            font-size: 1.05rem;
        }
        .travel-btn .tb-type {
            font-size: 0.7rem;
            color: #6a6a6a;
            margin-left: auto;
        }
        .travel-btn.secret {
            border-color: #ff0;
            background: #1a1a00;
            animation: glowPulse 2s infinite;
        }
        .travel-btn.secret:hover {
            background: #2a2a00;
            border-color: #ff0;
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.4);
        }
        @keyframes glowPulse {
            0%,
            100% {
                box-shadow: 0 0 5px rgba(255, 255, 0, 0.2);
            }
            50% {
                box-shadow: 0 0 15px rgba(255, 255, 0, 0.5);
            }
        }
        .travel-btn.current {
            border-color: #0f0;
            background: #0d1f0d;
            color: #0f0;
            cursor: default;
            pointer-events: none;
        }

        /* BOTTOM ACTION BAR */
        #action-bar {
            background: var(--panel-bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            box-shadow: var(--shadow);
            min-height: 50px;
        }
        #action-bar .action-section {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
        }
        #action-bar .action-divider {
            width: 2px;
            height: 28px;
            background: #1a3a1a;
            margin: 0 6px;
            border-radius: 1px;
        }
        .action-btn {
            background: var(--btn-bg);
            border: 1px solid #1a3a1a;
            color: #8c8;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            white-space: nowrap;
            font-weight: bold;
            letter-spacing: 0.5px;
            position: relative;
        }
        .action-btn:hover {
            background: #0d2a0d;
            border-color: var(--green);
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
            transform: translateY(-2px);
        }
        .action-btn:active {
            transform: scale(0.95);
            transition: transform 0.05s;
        }
        .action-btn.primary {
            border-color: #0f0;
            color: #0f0;
            background: #0d1f0d;
            font-size: 1.1rem;
        }
        .action-btn.primary:hover {
            background: #0f0;
            color: #000;
        }
        .action-btn.danger {
            border-color: #c0392b;
            color: #e74c3c;
            background: #1a0a0a;
        }
        .action-btn.danger:hover {
            background: #c0392b;
            color: #fff;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.3);
        }
        .action-btn.shop-btn {
            border-color: #f90;
            color: #f90;
            background: #1a1000;
        }
        .action-btn.shop-btn:hover {
            background: #f90;
            color: #000;
        }
        .action-btn.combat-btn {
            border-color: #e74c3c;
            color: #f66;
            background: #1a0808;
            animation: combatPulse 1.5s infinite;
        }
        .action-btn.combat-btn:hover {
            background: #c0392b;
            color: #fff;
        }
        @keyframes combatPulse {
            0%,
            100% {
                border-color: #e74c3c;
            }
            50% {
                border-color: #ff0000;
            }
        }
        .action-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease-in;
        }
        .modal {
            background: var(--panel-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            max-width: 650px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.2);
            position: relative;
        }
        .modal h3 {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.8rem;
            color: var(--green);
            text-align: center;
            margin-bottom: 14px;
            letter-spacing: 1px;
        }
        .modal-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: 1px solid #333;
            color: #aaa;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 4px;
            font-family: 'VT323', monospace;
            transition: all 0.2s;
        }
        .modal-close:hover {
            background: #c0392b;
            color: #fff;
            border-color: #c0392b;
        }
        .modal-btn {
            display: block;
            width: 100%;
            background: var(--btn-bg);
            border: 1px solid #1a3a1a;
            color: #8c8;
            font-family: 'VT323', monospace;
            font-size: 1.05rem;
            padding: 10px 16px;
            cursor: pointer;
            border-radius: 6px;
            margin: 6px 0;
            transition: all 0.2s;
            text-align: left;
        }
        .modal-btn:hover {
            background: #0d2a0d;
            border-color: var(--green);
            color: #fff;
        }
        .modal-btn.selected {
            background: #0d1f0d;
            border-color: #0f0;
            color: #0f0;
        }
        .modal-btn.shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-btn.shop-item .si-price {
            color: var(--gold);
            font-weight: bold;
        }
        .modal-btn.shop-item .si-rarity {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .rarity-common {
            color: #aaa;
        }
        .rarity-rare {
            color: #0f0;
        }
        .rarity-epic {
            color: #f0f;
        }
        .rarity-legendary {
            color: #ff4500;
            text-shadow: 0 0 4px #ff4500;
        }
        .rarity-set {
            color: #0f0;
            font-weight: bold;
        }

        /* COMBAT OVERLAY */
        #combat-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(180, 0, 0, 0.15);
            z-index: 90;
            pointer-events: none;
            display: none;
            animation: combatFlash 2s infinite;
        }
        #combat-overlay.active {
            display: block;
        }
        @keyframes combatFlash {
            0%,
            100% {
                background: rgba(180, 0, 0, 0.08);
            }
            50% {
                background: rgba(180, 0, 0, 0.2);
            }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #1a3a1a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2a5a2a;
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            #main-content {
                flex-direction: column;
            }
            #side-panel {
                flex-direction: row;
                max-width: none;
                min-width: auto;
                max-height: 200px;
            }
            #party-panel,
            #travel-panel {
                flex: 1;
            }
            #game-log-container {
                flex: 2;
            }
            #game-header h1 {
                font-size: 0.8rem;
            }
            #header-stats {
                font-size: 0.85rem;
                gap: 8px;
            }
            .action-btn {
                font-size: 0.85rem;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <!-- HEADER -->
        <div id="game-header">
            <h1>⚔️ RETRO CRPG</h1>
            <div id="header-stats">
                <div class="header-stat"><span class="stat-icon">📍</span><span class="stat-label">Location</span><span class="stat-value" id="h-location">-</span></div>
                <div class="header-stat"><span class="stat-icon">💰</span><span class="stat-label">Gold</span><span class="stat-value stat-gold" id="h-gold">0</span></div>
                <div class="header-stat"><span class="stat-icon">🌙</span><span class="stat-label">Day</span><span class="stat-value" id="h-day">1</span></div>
                <div class="header-stat"><span class="stat-icon">📋</span><span class="stat-label">Quest</span><span class="stat-value" id="h-quest">None</span></div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div id="main-content">
            <!-- GAME LOG -->
            <div id="game-log-container">
                <div id="game-log-header">
                    <span>📜 ADVENTURE LOG</span>
                    <span style="font-size:0.6rem;color:#666;" id="log-counter">Entries: 0</span>
                </div>
                <div id="game-log"></div>
            </div>

            <!-- SIDE PANEL -->
            <div id="side-panel">
                <!-- PARTY -->
                <div id="party-panel">
                    <div id="party-panel-header">👥 PARTY MEMBERS</div>
                    <div id="party-display"><p style="color:#555;text-align:center;padding:20px;">No party assembled yet.</p></div>
                </div>
                <!-- TRAVEL -->
                <div id="travel-panel">
                    <div id="travel-panel-header">🗺️ TRAVEL DESTINATIONS</div>

        // ==================== LOGGING ====================
        function addLog(text, cssClass = '') {
            const p = document.createElement('p');
            p.className = 'log-entry ' + cssClass;
            p.innerHTML = text;
            gameLog.appendChild(p);
            gameLog.scrollTop = gameLog.scrollHeight;
            gameState.logEntryCount++;
            logCounter.textContent = 'Entries: ' + gameState.logEntryCount;
        }

        function addLogHighlight(text) {
            addLog(text, 'log-highlight');
        }

        // ==================== UI UPDATES ====================
        function updatePartyDisplay() {
            if (gameState.party.length === 0) {
                partyDisplay.innerHTML =
                    '<p style="color:#555;text-align:center;padding:20px;">No party assembled yet.</p>';
                return;
            }
            let html = '';
            gameState.party.forEach(char => {
                const hpPct = Math.max(0, Math.floor((char.hp / char.maxHp) * 100));
                const mpPct = char.maxMp > 0 ? Math.max(0, Math.floor((char.mp / char.maxMp) * 100)) : 0;
                const xpPct = Math.floor((char.xp / char.xpToNext) * 100);
                const skillsTags = char.explorationSkills.map(s =>
                    `<span class="pmc-skill-tag">${s}: ${char.skillLevels[s] || 0}</span>`
                ).join('');
                html += `
                <div class="party-member-card">
                    <div class="pmc-header">
                        <span class="pmc-name">${char.name}</span>
                        <span class="pmc-class">${char.class}${char.specialization ? ' (' + char.specialization + ')' : ''}</span>
                        <span class="pmc-level">Lv ${char.level}</span>
                    </div>
                    <div class="pmc-bar-row">
                        <span class="pmc-bar-label hp">❤️</span>
                        <div class="pmc-bar-outer"><div class="pmc-bar-inner hp" style="width:${hpPct}%"></div></div>
                        <span class="pmc-bar-text">${char.hp}/${char.maxHp}</span>
                    </div>
                    ${char.maxMp > 0 ? `
                    <div class="pmc-bar-row">
                        <span class="pmc-bar-label mp">💎</span>
                        <div class="pmc-bar-outer"><div class="pmc-bar-inner mp" style="width:${mpPct}%"></div></div>
                        <span class="pmc-bar-text">${char.mp}/${char.maxMp}</span>
                    </div>` : ''}
                    <div class="pmc-bar-row">
                        <span class="pmc-bar-label xp">⭐</span>
                        <div class="pmc-bar-outer"><div class="pmc-bar-inner xp" style="width:${xpPct}%"></div></div>
                        <span class="pmc-bar-text">${char.xp}/${char.xpToNext} XP</span>
                    </div>
                    <div style="font-size:0.8rem;color:#aaa;">⚔️ Atk: ${char.attack} | 🛡️ Def: ${char.defense} | 🗡️ ${char.weapon} (${char.damageType})</div>
                    <div class="pmc-skills">${skillsTags}</div>
                </div>`;
            });
            partyDisplay.innerHTML = html;
        }

        function updateTravelButtons() {
            travelButtons.innerHTML = '';
            if (gameState.gamePhase !== 'playing') {
                travelButtons.innerHTML =
                    '<p style="color:#555;text-align:center;padding:15px;">Start the game to see destinations.</p>';
                return;
            }
            const currentLoc = gameState.locations[gameState.location];
            const typeIcons = { safe: '🏰', village: '🏘️', wilderness: '🌲', special: '🏛️' };
            if (currentLoc && currentLoc.connections) {
                currentLoc.connections.forEach(connKey => {
                    const dest = gameState.locations[connKey];
                    if (!dest) return;
                    const btn = document.createElement('button');
                    btn.className = 'travel-btn';
                    btn.innerHTML =
                        `<span class="tb-icon">${typeIcons[dest.type] || '📍'}</span><span class="tb-name">${dest.name}</span><span class="tb-type">${dest.type}</span>`;
                    btn.addEventListener('click', () => travelToLocation(connKey));
                    travelButtons.appendChild(btn);
                });
                if (gameState.foundLoreBooks.includes('Moons of Legend') && currentLoc.connections.includes(
                        'moonhills')) {
                    const secretBtn = document.createElement('button');
                    secretBtn.className = 'travel-btn secret';
                    secretBtn.innerHTML =
                        '<span class="tb-icon">🌙</span><span class="tb-name">Moon Temple</span><span class="tb-type">SECRET</span>';
                    secretBtn.addEventListener('click', () => travelToLocation('moontemple'));
                    travelButtons.appendChild(secretBtn);
                }
            }
            if (travelButtons.children.length === 0) {
                travelButtons.innerHTML =
                    '<p style="color:#555;text-align:center;padding:15px;">No travel options from here.</p>';
            }
        }

        function updateActionBar() {
            actionButtons.innerHTML = '';
            const addBtn = (label, action, cls = '') => {
                const btn = document.createElement('button');
                btn.className = 'action-btn ' + cls;
                btn.textContent = label;
                btn.addEventListener('click', () => handleAction(action));
                actionButtons.appendChild(btn);
            };
            const addDivider = () => {
                const div = document.createElement('span');
                div.className = 'action-divider';
                actionButtons.appendChild(div);
            };

            if (gameState.gamePhase === 'start') {
                addBtn('▶ START GAME', 'start', 'primary');
                addBtn('❓ HELP', 'help');
                return;
            }
            if (gameState.gamePhase === 'partyCreation') {
                addBtn('👥 CREATE PARTY', 'create_party', 'primary');
                addBtn('✅ DONE (Begin Adventure)', 'done_party', 'primary');
                addBtn('📋 LIST CLASSES', 'list_classes');
                addBtn('❓ HELP', 'help');
                return;
            }
            if (gameState.inCombat) {
                addBtn('⚔️ ATTACK', 'attack', 'combat-btn primary');
                addBtn('🛡️ DEFEND', 'defensive', 'combat-btn');
                addBtn('💪 POWER ATK', 'power', 'combat-btn');
                addBtn('🎯 FOCUS', 'focus', 'combat-btn');
                addBtn('🏃 FLEE', 'flee', 'danger');
                addBtn('📋 TACTICS', 'tactics');
                return;
            }
            if (gameState.shopContext) {
                addBtn('🛒 BUY ITEM', 'buy_prompt', 'shop-btn primary');

                addBtn('🚪 EXIT SHOP', 'exit_shop', 'danger');

            }
            // Normal exploration
            addBtn('👁️ LOOK', 'look', 'primary');
            addBtn('🔍 EXPLORE', 'explore');

            if (loc && loc.shops && loc.shops.length > 0) {
                addDivider();
                loc.shops.forEach(s => {
                    const icons = { weapons: '⚔️', items: '🧪', magic: '✨', inn: '🏨' };

                addDivider();
                loc.npcs.forEach(n => {
                    const npcNames = { elder: 'Village Elder', merchant: 'Merchant', guard: 'Guard',
                        witch: 'Witch', hunter: 'Hunter', hermit: 'Hermit', wizard: 'Archmage',
                        dwarfking: 'Dwarf King', smith: 'Blacksmith', miner: 'Miner' };
                    addBtn(`💬 ${npcNames[n] || n}`, 'talk_' + n);
                });

            if (loc && loc.hasShrine && !gameState.visitedShrines.includes(loc.shrineName)) {
                addBtn('🙏 SHRINE', 'shrine', 'primary');
            }
            if (loc && loc.hasLore && !gameState.foundLoreBooks.includes(loc.loreBook)) {
                addBtn('📖 LORE', 'lore');

            if (loc && loc.hasPuzzle && !gameState.completedPuzzles.includes(loc.puzzleName)) {

            addBtn('🗺️ MAP', 'map');

            addBtn('❓ HELP', 'help');

        function updateAllUI() {
            updateHeaderStats();
            updatePartyDisplay();
            updateTravelButtons();
            updateActionBar();
            if (gameState.inCombat) {
                combatOverlay.classList.add('active');
            } else {
                combatOverlay.classList.remove('active');
            }

        // ==================== MODALS ====================
        function showModal(title, content, onClose = null) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
            <div class="modal">
                <button class="modal-close">✕</button>
                <h3>${title}</h3>
                <div class="modal-content">${content}</div>
            </div>`;
            modalContainer.appendChild(overlay);
            const closeBtn = overlay.querySelector('.modal-close');
            const close = () => {
                overlay.remove();
                if (onClose) onClose();
            };
            closeBtn.addEventListener('click', close);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
            return { overlay, close };
        }

        function showClassSelectionModal() {
            let html = '<p style="text-align:center;color:#aaa;margin-bottom:12px;">Click a class card to add them to your party. <strong style="color:#0f0;">' +
                gameState.party.length + '/' + gameState.maxPartySize + '</strong> members selected.</p>';
            gameState.classes.forEach(cls => {
                html += `
                <button class="modal-btn" onclick="addPartyMember('${cls.id}');this.classList.add('selected');setTimeout(()=>document.querySelector('.modal-close')?.click(),400);" 
                    ${gameState.party.length >= gameState.maxPartySize ? 'disabled' : ''}>
                    <strong>${cls.name}</strong> — HP:${cls.baseHp} MP:${cls.baseMp} Atk:${cls.baseAttack} Def:${cls.baseDefense}
                    <br><small style="color:#8a8;">Skills: ${cls.explorationSkills.join(', ')} | Specs at Lv5: ${cls.specializations.join(', ')}</small>
                </button>`;
            });
            html +=
                `<p style="text-align:center;margin-top:14px;"><button class="action-btn primary" onclick="handleAction('done_party');document.querySelector('.modal-close')?.click();" ${gameState.party.length === 0 ? 'disabled' : ''}>✅ DONE — Begin Adventure!</button></p>`;
            showModal('👥 CREATE YOUR PARTY', html);
        }

        function showSkillCheckModal() {
            const loc = gameState.locations[gameState.location];
            if (!loc || !loc.skillChallenges || loc.skillChallenges.length === 0) {
                addLog('<span class="error">No skill challenges here.</span>');
                return;
            }
            let html = '<p style="color:#aaa;text-align:center;">Click a challenge to attempt it with your best party member.</p>';
            loc.skillChallenges.forEach(challenge => {
                const challengeKey = gameState.location + '_' + challenge.type;
                const isCompleted = gameState.foundChallenges.includes(challengeKey);
                if (isCompleted) {
                    html +=
                        `<button class="modal-btn" disabled style="opacity:0.5;">✅ ${challenge.description} (Completed)</button>`;
                } else {
                    const skilledMembers = gameState.party.filter(char =>
                        char.explorationSkills.includes(challenge.type) && (char.skillLevels[challenge.type] ||
                            0) >= challenge.difficulty
                    );
                    const bestMember = skilledMembers.length > 0 ? skilledMembers.reduce((b, c) =>
                        (c.skillLevels[challenge.type] || 0) > (b.skillLevels[challenge.type] || 0) ? c : b
                    ) : null;
                    if (bestMember) {
                        html +=
                            `<button class="modal-btn" onclick="attemptSkillCheck('${challenge.type}');document.querySelector('.modal-close')?.click();">🔧 ${challenge.description} — Difficulty: ${challenge.difficulty}/5 — Use <strong>${bestMember.name}</strong> (skill: ${bestMember.skillLevels[challenge.type]})</button>`;
                    } else {
                        html +=
                            `<button class="modal-btn" disabled style="opacity:0.4;">🔒 ${challenge.description} — Difficulty: ${challenge.difficulty}/5 — No skilled member available</button>`;
                    }
                }
            });
            showModal('🔧 SKILL CHALLENGES — ' + loc.name, html);
        }

        // ==================== GAME ACTIONS ====================
        function handleAction(action) {
            if (action === 'start') {
                if (gameState.gamePhase === 'playing') return;
                addLogHighlight("You enter the <span class='location'>Adventurers Guild</span>.");
                addLog("<em>'Welcome, adventurer! Assemble your party to begin.'</em>");
                addLog("Click <strong>CREATE PARTY</strong> to choose your companions.");
                gameState.gamePhase = 'partyCreation';
                updateAllUI();
            } else if (action === 'create_party' || action === 'list_classes') {
                showClassSelectionModal();
            } else if (action === 'done_party') {
                if (gameState.party.length === 0) {
                    addLog("<span class='error'>You need at least one party member!</span>");
                    showClassSelectionModal();
                } else {
                    startGame();
                }
            } else if (action === 'help') {
                showHelpModal();
            } else if (action === 'look') {
                lookAround();
            } else if (action === 'explore') {
                exploreLocation();
            } else if (action === 'check_skills') {
                showSkillCheckModal();
            } else if (action === 'shrine') {
                visitShrine();
            } else if (action === 'lore') {
                readLore();
            } else if (action === 'puzzle') {
                solvePuzzlePrompt();
            } else if (action === 'status') {
                showStatus();
            } else if (action === 'party_abilities') {
                showPartyAbilitiesModal();
            } else if (action === 'quest') {
                showQuestsModal();
            } else if (action === 'map') {
                showMap();
            } else if (action === 'gold') {
                addLog(`You have <span class='gold'>${gameState.gold} gold</span>.`);
            } else if (action === 'attack') {
                if (gameState.inCombat) resolveCombatRound('standard');
                else randomEncounter();
            } else if (action === 'defensive') {
                if (gameState.inCombat) { addLog(
                        "<span class='success'>Defensive stance! +2 defense, -1 attack.</span>");
                    resolveCombatRound('defensive'); } else addLog(
                    "<span class='error'>Not in combat!</span>");
            } else if (action === 'power') {
                if (gameState.inCombat) { addLog("<span class='success'>Power attack! +3 attack, -2 defense.</span>");
                    resolveCombatRound('power'); } else addLog("<span class='error'>Not in combat!</span>");
            } else if (action === 'focus') {
                if (gameState.inCombat) { addLog(
                        "<span class='success'>Spellcasters focus! Next spell costs 0 MP.</span>");
                    resolveCombatRound('focus'); } else addLog("<span class='error'>Not in combat!</span>");
            } else if (action === 'flee') {
                if (gameState.inCombat) attemptFlee();
                else addLog("<span class='error'>Not in combat!</span>");
            } else if (action === 'tactics') {
                showCombatTactics();
            } else if (action === 'exit_shop') {
                gameState.shopContext = null;
                addLog("You leave the shop.");
                updateAllUI();
            } else if (action === 'buy_prompt') {
                if (gameState.shopContext) showShopModal(gameState.shopContext);
            } else if (action === 'list_shop') {
                if (gameState.shopContext) showShopModal(gameState.shopContext);
            } else if (action.startsWith('shop_')) {
                const shopType = action.replace('shop_', '');
                const loc = gameState.locations[gameState.location];
                if (loc && loc.shops && loc.shops.includes(shopType)) {
                    showShopModal(shopType);
                } else {
                    addLog("<span class='error'>No such shop here.</span>");
                }
            } else if (action.startsWith('talk_')) {
                const npc = action.replace('talk_', '');
                talkToNPC(npc);
            } else {
                addLog("<span class='error'>Unknown action: " + action + "</span>");
            }
            updateAllUI();
        }

        // ==================== CORE GAME FUNCTIONS ====================
        function startGame() {
            gameState.gamePhase = 'playing';
            gameState.location = 'start';
            calculatePartyAbilities();
            addLogHighlight("<span class='success'>⚔️ Your adventure begins!</span>");
            addLog("The Guildmaster nods. <em>'Head to Rivertown first. Click it in the Travel Panel.'</em>");
            addLog("You are at the <span class='location'>Adventurers Guild</span>.");
            lookAround();
            updateAllUI();
        }

        function calculatePartyAbilities() {
            gameState.activePartyAbilities = [];
            const partyClasses = gameState.party.map(c => c.class);
            gameState.party.forEach(char => {
                const ability = gameState.partyExplorationAbilities[char.baseClass];
                if (ability && !gameState.activePartyAbilities.some(a => a.name === ability.name)) {
                    gameState.activePartyAbilities.push(ability);
                }
            });
            Object.entries(gameState.partyExplorationAbilities).forEach(([key, ability]) => {
                if (ability.requires) {
                    const hasAll = ability.requires.every(req =>
                        partyClasses.some(pc => pc.toLowerCase().includes(req.toLowerCase()))
                    );
                    if (hasAll && !gameState.activePartyAbilities.some(a => a.name === ability.name)) {
                        gameState.activePartyAbilities.push(ability);
                    }
                }
            });
            if (gameState.activePartyAbilities.length > 0) {
                const names = gameState.activePartyAbilities.map(a => a.name).join(', ');
                addLogHighlight('<span class="party-ability">🌟 Party Abilities: ' + names + '</span>');
            }
        }

        function addPartyMember(className) {
            if (gameState.party.length >= gameState.maxPartySize) {
                addLog("<span class='error'>Party is full!</span>");
                return;
            }
            const classData = gameState.classes.find(c => c.id === className || c.name.toLowerCase() === className);
            if (!classData) { addLog("<span class='error'>Unknown class.</span>"); return; }
            const charId = gameState.party.length + 1;
            const character = {
                id: charId,
                name: classData.name + ' ' + charId,
                class: classData.name,
                baseClass: classData.id,
                level: 1,
                xp: 0,
                xpToNext: classData.xpToNext,
                hp: classData.baseHp,
                maxHp: classData.baseHp,
                mp: classData.baseMp,
                maxMp: classData.baseMp,
                attack: classData.baseAttack,
                defense: classData.baseDefense,
                skills: [...classData.skills],
                explorationSkills: [...classData.explorationSkills],
                skillLevels: {},
                weapon: 'None',
                armor: 'None',
                damageType: 'slashing',
                specialization: null,
                setItems: []
            };
            character.explorationSkills.forEach(s => { character.skillLevels[s] = 1; });
            if (classData.id === 'rogue' || classData.id === 'thief') { character.skillLevels['lockpick'] = 3;
                character.skillLevels['stealth'] = 3; }
            if (classData.id === 'wizard' || classData.id === 'sorcerer' || classData.id === 'necromancer') { character
                    .skillLevels['arcane'] = 3; }
            if (classData.id === 'warrior') { character.skillLevels['strength'] = 3;
                character.skillLevels['intimidate'] = 2; }
            if (classData.id === 'priest') { character.skillLevels['religion'] = 3;
                character.skillLevels['persuade'] = 2; }
            gameState.party.push(character);
            addLog("<span class='success'>✅ Added " + character.name + " to your party. (" + gameState.party.length +
                "/" + gameState.maxPartySize + ")</span>");
            updateAllUI();
        }

        function travelToLocation(locKey) {
            if (!locKey || gameState.inCombat) return;
            const dest = gameState.locations[locKey];
            if (!dest) return;
            const currentLoc = gameState.locations[gameState.location];
            addLog(`🚶 Traveling from <span class='location'>${currentLoc.name}</span> to <span class='location'>${dest.name}</span>...`);
            gameState.location = locKey;
            gameState.shopContext = null;
            if (dest.type === 'wilderness') {
                const encounterChance = dest.danger ? dest.danger * 0.2 : 0.3;
                if (Math.random() < encounterChance) {
                    addLog("<span class='enemy'>⚡ Enemies ambush you!</span>");
                    randomEncounter();
                } else {
                    addLog("The journey passes without incident.");
                }
                gameState.day++;
            } else {
                addLog("You arrive safely.");
            }
            if (!gameState.inCombat) {
                addLog("You are now at <span class='location'>" + dest.name + "</span>.");
                lookAround();
            }
            updateAllUI();
        }

        function lookAround() {
            const loc = gameState.locations[gameState.location];
            addLog("<strong>📍 " + loc.name + "</strong> — " + loc.description);
            if (loc.connections) addLog("<strong>Paths lead to:</strong> " + loc.connections.map(c => gameState.locations[
                c].name).join(', '));
            if (loc.shops) addLog("<strong>Facilities:</strong> " + loc.shops.join(', '));
            if (loc.npcs) {
                const npcNames = { elder: 'Village Elder', merchant: 'Merchant', guard: 'Guard', witch: 'Witch',
                    hunter: 'Hunter', hermit: 'Hermit', wizard: 'Archmage', dwarfking: 'Dwarf King',
                    smith: 'Blacksmith', miner: 'Miner' };
                addLog("<strong>People here:</strong> " + loc.npcs.map(n => npcNames[n] || n).join(', '));
            }
            if (loc.hasTreasure && !gameState.foundTreasures.includes(gameState.location))
                addLog("<span class='treasure'>✨ Something glints nearby... Click EXPLORE to search.</span>");
            if (loc.hasShrine && !gameState.visitedShrines.includes(loc.shrineName))
                addLog("<span class='shrine'>🙏 A " + loc.shrineName + " stands here. Click SHRINE.</span>");
            if (loc.hasLore && !gameState.foundLoreBooks.includes(loc.loreBook))
                addLog("<span class='lore'>📖 A book titled \"" + loc.loreBook + "\" is here. Click LORE.</span>");
            if (loc.hasPuzzle && !gameState.completedPuzzles.includes(loc.puzzleName))
                addLog("<span class='quest'>🧩 " + loc.puzzleName + " awaits. Click PUZZLE.</span>");
            if (loc.skillChallenges && loc.skillChallenges.some(c => !gameState.foundChallenges.includes(gameState
                    .location + '_' + c.type)))
                addLog("<span class='exploration-hint'>🔧 Skill opportunities here. Click CHECK SKILLS.</span>");
            if (loc.type === 'wilderness') addLog(
                "<span class='error'>⚠️ This is a dangerous area! Enemies may appear.</span>");
            updateAllUI();
        }

        function exploreLocation() {
            const loc = gameState.locations[gameState.location];
            if (gameState.foundTreasures.includes(gameState.location)) { addLog(
                    "<span class='error'>Already searched here.</span>"); return; }
            if (!loc.hasTreasure) { addLog("You search but find nothing valuable.");
                gameState.foundTreasures.push(gameState.location); return; }
            const found = Math.random() < loc.treasureChance;
            if (found) {
                addLog("<span class='treasure'>🎉 Hidden treasure found!</span>");
                switch (loc.treasureType) {
                    case 'common':
                        const cg = Math.floor(Math.random() * 30) + 10;
                        gameState.gold += cg;
                        addLog("Found <span class='gold'>" + cg + " gold</span>!");
                        break;
                    case 'rare':
                        const rg = Math.floor(Math.random() * 50) + 25;
                        gameState.gold += rg;
                        addLog("Found <span class='gold'>" + rg +
                            " gold</span> and a <span class='item'>Healing Potion</span>!");
                        break;
                    case 'artifact':
                        addLog("<span class='artifact'>🏺 Ancient artifact: Crystal Skull!</span>");
                        break;
                    case 'set_item':
                        addLog("<span class='set-item'>💎 Set item found!</span>");
                        break;
                    case 'legendary':
                        const lg = Math.floor(Math.random() * 200) + 100;
                        gameState.gold += lg;
                        addLog("<span class='legendary'>🐉 LEGENDARY: Dragon Hoard! +" + lg + " gold!</span>");
                        break;
                    case 'hidden':
                        const hg = Math.floor(Math.random() * 40) + 20;
                        gameState.gold += hg;
                        addLog("Found hidden cache: <span class='gold'>" + hg + " gold</span>!");
                        break;
                }
                gameState.party.forEach(c => { c.xp += 25;
                    checkLevelUp(c); });
            } else { addLog("Thorough search reveals nothing."); }
            gameState.foundTreasures.push(gameState.location);
            updateAllUI();
        }

        function visitShrine() {
            const loc = gameState.locations[gameState.location];
            if (!loc.hasShrine) { addLog("<span class='error'>No shrine here.</span>"); return; }
            if (gameState.visitedShrines.includes(loc.shrineName)) { addLog(
                    "The shrine's power is spent."); return; }
            addLog("<span class='shrine'>🙏 You approach the " + loc.shrineName + "...</span>");
            addLog("<strong>Blessing:</strong> " + loc.shrineEffect);
            if (loc.shrineEffect.includes('+1 permanent Attack')) {
                gameState.party.forEach(c => c.attack += 1);
                addLog("<span class='success'>All party members +1 Attack!</span>");
            } else if (loc.shrineEffect.includes('+2 permanent Defense')) {
                gameState.party.forEach(c => c.defense += 2);
                addLog("<span class='success'>All party members +2 Defense!</span>");
            } else if (loc.shrineEffect.includes('Moon Blessing')) {
                gameState.combatBonusActive = true;
                addLog("<span class='success'>🌙 Moon Blessing: +10% crit chance!</span>");
            }
            gameState.visitedShrines.push(loc.shrineName);
            updateAllUI();
        }

        function readLore() {
            const loc = gameState.locations[gameState.location];
            if (!loc.hasLore) { addLog("<span class='error'>No lore here.</span>"); return; }
            if (gameState.foundLoreBooks.includes(loc.loreBook)) { addLog("Already read."); return; }
            addLog("<span class='lore'>📖 Reading \"" + loc.loreBook + "\"...</span>");
            addLog(loc.loreEffect);
            if (loc.loreEffect.includes('gain 50 XP')) {
                gameState.party.forEach(c => { c.xp += 50;
                    checkLevelUp(c); });
                addLog("<span class='xp'>All party +50 XP!</span>");
            } else if (loc.loreEffect.includes('+5 MP')) {
                gameState.party.forEach(c => {
                    if (['wizard', 'sorcerer'].includes(c.baseClass)) { c.maxMp += 5;
                        c.mp += 5;
                        addLog("<span class='success'>" + c.name + " +5 MP!</span>"); }
                });
            } else if (loc.loreEffect.includes('secret location')) {
                addLog("<span class='success'>🌙 Moon Temple revealed on your map!</span>");
            }
            gameState.foundLoreBooks.push(loc.loreBook);
            updateAllUI();
        }

        function solvePuzzlePrompt() {
            const loc = gameState.locations[gameState.location];
            if (!loc.hasPuzzle) { addLog("<span class='error'>No puzzle here.</span>"); return; }
            if (gameState.completedPuzzles.includes(loc.puzzleName)) { addLog("Already solved."); return; }
            const answer = prompt('🧩 ' + loc.puzzleName + '\nPattern: Sun, Moon, Star, Sun... What comes after Moon?\n(Type your answer:)');
            if (answer && answer.toLowerCase().trim() === 'star') {
                addLog("<span class='success'>✅ Puzzle solved! The " + loc.puzzleName + " opens!</span>");
                addLog("<span class='artifact'>🏺 You find the " + loc.puzzleReward + "!</span>");
                gameState.party.forEach(c => { c.xp += 100;
                    checkLevelUp(c); });
                gameState.gold += 200;
                addLog("<span class='gold'>+200 gold!</span>");
                gameState.completedPuzzles.push(loc.puzzleName);
            } else if (answer) {
                addLog("<span class='error'>Nothing happens. Hint: Sun→Moon→Star→Sun→?</span>");
            }
            updateAllUI();
        }

        function attemptSkillCheck(skillType) {
            const loc = gameState.locations[gameState.location];
            if (!loc || !loc.skillChallenges) return;
            const challenge = loc.skillChallenges.find(c => c.type === skillType);
            if (!challenge) { addLog("<span class='error'>No such challenge.</span>"); return; }
            const challengeKey = gameState.location + '_' + challenge.type;
            if (gameState.foundChallenges.includes(challengeKey)) { addLog("Already completed."); return; }
            const skilled = gameState.party.filter(c => c.explorationSkills.includes(skillType));
            if (skilled.length === 0) { addLog("<span class='skill-fail'>No party member has " + skillType +
                    " skill!</span>"); return; }
            const best = skilled.reduce((b, c) => (c.skillLevels[skillType] || 0) > (b.skillLevels[skillType] || 0) ? c :
                b);
            const skillLvl = best.skillLevels[skillType] || 0;
            const diff = challenge.difficulty;
            addLog("<span class='skill-check'>🔧 " + best.name + " attempts " + skillType + " challenge...</span>");
            let chance = 0.5 + (skillLvl - diff) * 0.2;
            chance = Math.max(0.1, Math.min(0.9, chance));
            if (Math.random() < chance) {
                addLog("<span class='skill-success'>✅ SUCCESS! " + best.name + " masters it!</span>");
                applySkillReward(challenge.reward, best);
                gameState.foundChallenges.push(challengeKey);
                best.xp += 25 * diff;
                checkLevelUp(best);
            } else {
                addLog("<span class='skill-fail'>❌ FAILED!</span>");
                best.xp += 5;
                checkLevelUp(best);
                if (Math.random() < 0.3 && loc.type === 'wilderness') { addLog(
                        "The commotion attracts enemies!");
                    randomEncounter(); }
            }
            updateAllUI();
        }

        function applySkillReward(rewardType, member) {
            const rewards = {
                'starter_gold': () => { const g = Math.floor(Math.random() * 30) + 20;
                    gameState.gold += g;
                    addLog("Found <span class='gold'>" + g + " gold</span>!"); },
                'magic_scroll': () => addLog("Found a <span class='item'>Scroll of Magic Missile</span>!"),
                'shop_discount': () => addLog("20% discount on next purchase!"),
                'shortcut_access': () => addLog("Shortcut cleared!"),
                'hunting_reward': () => addLog("Hunted some meat!"),
                'avoid_encounter': () => addLog("Safe path found."),
                'lore_insight': () => { member.xp += 50;
                    addLog(member.name + " +50 XP!");
                    checkLevelUp(member); },
                'map_reveal': () => addLog("Hidden paths spotted!"),
                'safe_passage': () => addLog("Sneaked past safely."),
                'healing_mushrooms': () => { gameState.party.forEach(c => c.hp = Math.min(c.maxHp, c.hp + 10));
                    addLog("+10 HP to all!"); },
                'quest_info': () => addLog("Valuable quest info learned!"),
                'ancient_secret': () => { gameState.party.forEach(c => { c.xp += 30;
                        checkLevelUp(c); });
                    addLog("All +30 XP!"); },
                'library_access': () => { gameState.party.forEach(c => { if (c.explorationSkills.includes(
                            'arcane')) c.skillLevels['arcane'] = (c.skillLevels['arcane'] || 0) + 1; });
                    addLog("Arcane skills improved!"); },
                'rare_potion': () => addLog("Found <span class='item'>Rare Potion</span>!"),
                'ambush_warning': () => addLog("Ambush sites spotted!"),
                'caravan_supplies': () => { const g = Math.floor(Math.random() * 40) + 20;
                    gameState.gold += g;
                    addLog("Found supplies: <span class='gold'>" + g + " gold</span>!"); },
                'mountain_vista': () => addLog("Breathtaking view!"),
                'warm_shelter': () => addLog("Safe shelter found!"),
                'weapon_upgrade': () => { const w = gameState.party.find(c => c.class === 'Warrior'); if (w) { w
                            .attack += 1;
                        addLog(w.name + " +1 Attack!"); } },
                'dwarven_ale': () => addLog("Dwarven ale boosts morale!"),
                'divine_blessing': () => { gameState.party.forEach(c => { c.attack += 1;
                        c.defense += 1;
                        c.maxHp += 5;
                        c.hp += 5; });
                    addLog("Divine blessing! All stats boosted!"); },
                'temple_treasure': () => { const g = Math.floor(Math.random() * 100) + 50;
                    gameState.gold += g;
                    addLog("Temple treasure: <span class='gold'>" + g + " gold</span>!"); }
            };
            if (rewards[rewardType]) rewards[rewardType]();
        }

        function checkLevelUp(character) {
            while (character.xp >= character.xpToNext) {
                character.xp -= character.xpToNext;
                character.level++;
                character.xpToNext = Math.floor(character.xpToNext * 1.5);
                character.maxHp += Math.floor(character.maxHp * 0.1) + 2;
                character.hp = character.maxHp;
                if (character.maxMp > 0) { character.maxMp += Math.floor(character.maxMp * 0.1) + 1;
                    character.mp = character.maxMp; }
                character.attack += 1;
                character.defense += 1;
                if (Math.random() < 0.3) {
                    const skill = character.explorationSkills[Math.floor(Math.random() * character.explorationSkills
                        .length)];
                    character.skillLevels[skill] = (character.skillLevels[skill] || 0) + 1;
                    addLog("<span class='skill-success'>" + character.name + "'s " + skill + " improved!</span>");
                }
                addLog("<span class='level-up'>🎉 " + character.name + " reached LEVEL " + character.level +
                    "!</span>");
                const classData = gameState.classes.find(c => c.id === character.baseClass);
                if (character.level >= classData.specializationLevel && !character.specialization) {
                    addLog("<span class='specialization'>🌟 " + character.name +
                        " can specialize! Options: " + classData.specializations.join(' or ') + "</span>");
                }
            }
            updateAllUI();
        }

        function randomEncounter() {
            const loc = gameState.locations[gameState.location];
            if (loc.type !== 'wilderness') { addLog("<span class='error'>No enemies here.</span>"); return; }
            const enemies = [{ name: 'Goblin', type: 'goblin', hp: 15, attack: 4, defense: 2 }, { name: 'Wolf',
                type: 'wolf', hp: 12, attack: 5, defense: 1 }, { name: 'Bandit', type: 'bandit', hp: 20, attack: 6,
                defense: 3 }, { name: 'Skeleton', type: 'skeleton', hp: 18, attack: 5, defense: 4 }, { name: 'Zombie',
                type: 'zombie', hp: 25, attack: 4, defense: 5 }, { name: 'Ghost', type: 'ghost', hp: 15, attack: 7,
                defense: 2 }, { name: 'Troll', type: 'troll', hp: 40, attack: 10, defense: 6 }, { name: 'Yeti',
                type: 'yeti', hp: 35, attack: 9, defense: 5 }];
            const enemy = enemies[Math.floor(Math.random() * enemies.length)];
            gameState.currentEnemy = { ...enemy, maxHp: enemy.hp };
            gameState.inCombat = true;
            gameState.combatTurns = 0;
            addLog("<span class='enemy'>⚔️ A wild " + enemy.name + " appears! (HP: " + enemy.hp + ")</span>");
            if (gameState.enemyWeaknesses[enemy.type]) {
                addLog("<span class='damage-" + gameState.enemyWeaknesses[enemy.type].weakVs + "'>Weak to " + gameState
                    .enemyWeaknesses[enemy.type].weakVs + " attacks!</span>");
            }
            addLog("Use the <strong>ATTACK</strong> button or other combat actions!");
            updateAllUI();
        }

        function resolveCombatRound(tactic) {
            if (!gameState.inCombat || !gameState.currentEnemy) return;
            let partyAtk = gameState.party.reduce((sum, char) => {
                let a = char.attack;
                if (tactic === 'defensive') a -= 1;
                if (tactic === 'power') a += 3;
                const weakness = gameState.enemyWeaknesses[gameState.currentEnemy.type];
                if (weakness && char.damageType === weakness.weakVs) {
                    addLog("<span class='damage-" + char.damageType + "'>" + char.name + "'s " + char.damageType +
                        " weapon is super effective!</span>");
                    a *= weakness.extraDamage;
                }
                return sum + a;
            }, 0);
            if (gameState.combatBonusActive && Math.random() < 0.1) { partyAtk *= 1.5;
                addLog("<span class='shrine'>🌙 Moon Blessing CRIT!</span>"); }
            let partyDef = gameState.party.reduce((sum, char) => {
                let d = char.defense;
                if (tactic === 'defensive') d += 2;
                if (tactic === 'power') d -= 2;
                return sum + d;
            }, 0);
            const enemyPower = gameState.currentEnemy.attack * (1 + gameState.combatTurns * 0.1);
            if (partyAtk > enemyPower) {
                gameState.currentEnemy.hp -= Math.floor(partyAtk - enemyPower);
                if (gameState.currentEnemy.hp <= 0) {
                    const goldGained = Math.floor(Math.random() * 20 * gameState.currentEnemy.maxHp / 10) + 5;
                    const xpGained = Math.floor(gameState.currentEnemy.maxHp * 2);
                    gameState.gold += goldGained;
                    addLog("<span class='success'>🏆 Victory! " + gameState.currentEnemy.name + " defeated!</span>");
                    addLog("+<span class='gold'>" + goldGained + " gold</span>, +<span class='xp'>" + xpGained +
                        " XP</span>");
                    gameState.party.forEach(c => { c.xp += xpGained;
                        checkLevelUp(c); });
                    if (gameState.currentQuest && gameState.currentQuest.required === 'defeat ' + gameState
                        .currentEnemy.type) completeQuest();
                    gameState.inCombat = false;
                    gameState.currentEnemy = null;
                } else {
                    addLog(gameState.currentEnemy.name + " is wounded! (HP: " + gameState.currentEnemy.hp +
                        ") Keep fighting!");
                }
            } else {
                const dmg = Math.max(1, Math.floor(enemyPower / Math.max(1, partyDef)));
                gameState.party.forEach(c => c.hp = Math.max(1, c.hp - dmg));
                addLog("<span class='error'>💥 " + gameState.currentEnemy.name + " strikes! -" + dmg +
                    " HP to each member.</span>");
                addLog("Keep fighting or try FLEE!");
            }
            gameState.combatTurns++;
            updateAllUI();
        }

        function attemptFlee() {
            if (Math.random() < 0.5) {
                addLog("<span class='success'>🏃 Escaped!</span>");
                gameState.inCombat = false;
                gameState.currentEnemy = null;
            } else {
                addLog("<span class='error'>Failed to flee! Enemy attacks!</span>");
                gameState.combatTurns++;
                resolveCombatRound('flee');
            }
            updateAllUI();
        }

        function showCombatTactics() {
            if (!gameState.inCombat) { addLog("<span class='error'>Not in combat!</span>"); return; }
            addLog("<strong>⚔️ Combat Tactics:</strong>");
            addLog("🛡️ DEFEND: +2 def, -1 atk | 💪 POWER: +3 atk, -2 def | 🎯 FOCUS: Free spell | 🏃 FLEE: 50% escape");
            addLog("Enemy: <span class='enemy'>" + gameState.currentEnemy.name + " (HP: " + gameState.currentEnemy.hp +
                ")</span>");
        }

        function completeQuest() {
            if (!gameState.currentQuest) return;
            const q = gameState.currentQuest;
            gameState.gold += q.reward;
            addLogHighlight("<span class='success'>✅ QUEST COMPLETE: " + q.name + "!</span>");
            addLog("Reward: <span class='gold'>" + q.reward + " gold</span> + <span class='xp'>" + q.xpReward +
                " XP</span>");
            gameState.party.forEach(c => { c.xp += q.xpReward;
                checkLevelUp(c); });
            const questObj = gameState.quests.find(qq => qq.id === q.id);
            if (questObj) questObj.status = 'completed';
            gameState.currentQuest = null;
            gameState.questCompleted = true;
            updateAllUI();
        }

        function acceptQuest(questId) {
            if (gameState.currentQuest) { addLog("<span class='error'>Complete your current quest first!</span>"); return; }
            const quest = gameState.quests.find(q => q.id === questId);
            if (!quest || quest.status !== 'available') { addLog("<span class='error'>Quest unavailable.</span>"); return; }
            gameState.currentQuest = quest;
            quest.status = 'active';
            addLog("<span class='success'>📋 Accepted: " + quest.name + "!</span>");
            addLog(quest.description + " — Go to <span class='location'>" + gameState.locations[quest.location].name +
                "</span>.");
            updateAllUI();
        }

        function talkToNPC(npcKey) {
            const loc = gameState.locations[gameState.location];
            if (!loc || !loc.npcs || !loc.npcs.includes(npcKey)) { addLog(
                    "<span class='error'>That person isn't here.</span>"); return; }
            const dialogues = {
                elder: ["<em>'Welcome! Goblins plague the forest. Clear them for a reward.'</em>"],
                merchant: ["<em>'Finest goods in the land! Visit my shop.'</em>"],
                guard: ["<em>'Stay safe out there.'</em>"],
                witch: ["<em>'The swamp hides secrets... and an ancient tome I seek.'</em>"],
                hunter: ["<em>'Strange creatures lurk deeper in the marsh.'</em>"],
                hermit: ["<em>'Leave me be, outsider!'</em>"],
                wizard: ["<em>'Ah, adventurers! Retrieve the Tome of Ages from Darkmarsh for me.'</em>"],
                dwarfking: ["<em>'A miner is missing in the mountains. Find him!'</em>"],
                smith: ["<em>'I forge the finest weapons!'</em>"],
                miner: ["<em>'Deep caves hold valuable ore... too dangerous for me.'</em>"]
            };
            const npcNames = { elder: 'Village Elder', merchant: 'Merchant', guard: 'Guard', witch: 'Swamp Witch',
                hunter: 'Marsh Hunter', hermit: 'Hermit', wizard: 'Archmage', dwarfking: 'Dwarf King',
                smith: 'Blacksmith', miner: 'Miner' };
            addLog("💬 <span class='npc'>" + (npcNames[npcKey] || npcKey) + ":</span>");
            if (dialogues[npcKey]) dialogues[npcKey].forEach(l => addLog(l));
            if (npcKey === 'elder' && !gameState.currentQuest) addLog(
                "<span class='quest'>Quest: GOBLIN MENACE — Click QUESTS to accept.</span>");
            if (npcKey === 'wizard' && !gameState.currentQuest) addLog(
                "<span class='quest'>Quest: WIZARD'S REQUEST — Click QUESTS to accept.</span>");
            if (npcKey === 'dwarfking' && !gameState.currentQuest) addLog(
                "<span class='quest'>Quest: MISSING MINER — Click QUESTS to accept.</span>");
        }

        function showStatus() {
            addLog("<strong>📊 Party Status:</strong>");
            gameState.party.forEach(c => addLog(c.name + " — ❤️ " + c.hp + "/" + c.maxHp + " | 💎 " + c.mp + "/" + c
                .maxMp + " | ⚔️ " + c.attack + " | 🛡️ " + c.defense));
            addLog("💰 Gold: <span class='gold'>" + gameState.gold + "</span> | 🌙 Day: " + gameState.day);
            if (gameState.currentQuest) addLog("📋 Quest: " + gameState.currentQuest.name);
        }

        function showMap() {
            addLog("<strong>🗺️ World Map:</strong>");
            addLog("[Guild] → Rivertown → Deepwood → Moon Hills → Darkmarsh → Shadowfen");
            addLog("Moon Hills → Stone Tower | Rivertown → Trader's Path → Frostpeak → Dwarven Fort");
            if (gameState.foundLoreBooks.includes('Moons of Legend')) addLog(
                "<span class='secret'>🌙 Moon Hills → [SECRET] Moon Temple</span>");
            addLog("📍 You are at: <span class='location'>" + gameState.locations[gameState.location].name + "</span>");
        }

        function buyItemDirect(itemName, category) {
            if (!gameState.shopContext) { addLog("<span class='error'>Not in a shop!</span>"); return; }
            let item = null;
            if (gameState.items[category]) item = gameState.items[category].find(i => i.name.toLowerCase() === itemName
                .toLowerCase());
            if (!item && category === 'weapons' && itemName === 'Mystic Wand') item = { name: 'Mystic Wand', cost: 100,
                attack: 3, mp: 10, damageType: 'elemental', rarity: 'epic' };
            if (!item && category === 'armor' && itemName === 'Robe') item = { name: 'Robe', cost: 25, defense: 1, mp: 3,
                rarity: 'common' };
            if (!item && category === 'potions' && itemName === 'Mana Potion') item = { name: 'Mana Potion', cost: 20,
                effect: 'mana', value: 10, rarity: 'common' };
            if (!item && category === 'scrolls' && itemName === 'Scroll of Fireball') item = { name: 'Scroll of Fireball',
                cost: 50, effect: 'spell', value: 'fireball', rarity: 'rare' };
            if (!item) { addLog("<span class='error'>Item not found.</span>"); return; }
            if (gameState.gold < item.cost) { addLog("<span class='error'>Not enough gold! Need " + item.cost +
                    "g.</span>"); return; }
            gameState.gold -= item.cost;
            if (category === 'potions' || category === 'scrolls' || category === 'poisons') {
                addLog("<span class='success'>🛒 Bought " + item.name + " for " + item.cost + "g.</span>");
            } else {
                const char = gameState.party[0];
                if (char) {
                    if (category === 'weapons' || (item.attack && !item.defense)) {
                        char.weapon = item.name;
                        char.attack += (item.attack || 0);
                        if (item.mp) char.maxMp += item.mp;
                        if (item.damageType) char.damageType = item.damageType;
                        if (item.set) char.setItems.push(item.name);
                    } else {
                        char.armor = item.name;
                        char.defense += (item.defense || 0);
                        if (item.mp) char.maxMp += item.mp;
                        if (item.set) char.setItems.push(item.name);
                    }
                    addLog("<span class='success'>🛒 " + char.name + " equipped " + item.name + "! (" + item.cost +
                        "g)</span>");
                }
            }
            updateAllUI();
        }

        // ==================== INIT ====================
        function initGame() {
            addLogHighlight("🎮 <strong>RETRO CRPG — BUTTON-DRIVEN EDITION</strong>");
            addLog("Inspired by classic 80s CRPGs: Ultima, Wizardry, Might & Magic, Baldur's Gate.");
            addLog("Click <strong>START GAME</strong> to begin your adventure!");
            addLog("All actions are performed using the buttons below and panels on the right.");
            updateAllUI();
        }

        window.onload = initGame;
    </script>
</body>
</html>
