<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUMP 13 — Highway 50 Night Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #33ff66;
            --green-dim: #1a6633;
            --red: #ff3333;
            --red-glow: #ff6666;
            --bg-screen: #050500;
            --text-shadow-green: 0 0 8px rgba(51,255,102,0.7), 0 0 20px rgba(51,255,102,0.3);
            --text-shadow-red: 0 0 8px rgba(255,51,51,0.8), 0 0 20px rgba(255,51,51,0.4);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #050000; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            background-image: radial-gradient(ellipse at center, #0a1a05 0%, #050000 70%);
            padding: 20px; user-select: none;
        }
        .monitor {
            background: #1c1c1c; border-radius: 18px; padding: 20px 20px 16px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 0 0 3px #2a2a2a, 0 8px 40px rgba(0,0,0,0.7);
            max-width: 900px; width: 100%;
        }
        .screen {
            background: var(--bg-screen); border-radius: 8px; padding: 16px;
            position: relative; overflow: hidden;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.9); border: 2px solid #1a1a1a;
            display: flex; flex-direction: column; height: 700px; flex-shrink: 0;
        }
        .scanlines, .vignette {
            position: absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; border-radius:8px;
        }
        .scanlines { background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px); z-index:10; }
        .vignette { z-index:8; box-shadow:inset 0 0 120px rgba(0,0,0,0.7); }

        .title-bar {
            text-align:center; padding:8px 0; position:relative; z-index:12;
            color: var(--red-glow); font-size:16px; letter-spacing:2px;
            text-shadow: var(--text-shadow-red); line-height:1.6;
            border-bottom:1px solid rgba(255,51,51,0.3); margin-bottom:8px; flex-shrink: 0;
        }
        .title-bar .game-title { font-size:24px; display:block; letter-spacing:4px; margin-bottom:4px; color: var(--red); }
        .title-bar .subtitle { font-size:12px; color: var(--green); }

        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding:6px 8px; background: rgba(10,20,5,0.9); border:1px solid var(--green-dim);
            margin-bottom:8px; font-size:11px; color: var(--green); text-shadow: var(--text-shadow-green);
            position:relative; z-index:12; flex-shrink: 0;
        }
        .furnace-indicator { color: var(--red); font-weight:bold; }
        .furnace-indicator.pulse { animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { text-shadow: 0 0 8px rgba(255,51,51,0.8), 0 0 20px rgba(255,51,51,0.4); opacity:1; }
            50% { text-shadow: 0 0 15px rgba(255,51,51,1), 0 0 35px rgba(255,51,51,0.6); opacity:0.7; }
            100% { text-shadow: 0 0 8px rgba(255,51,51,0.8), 0 0 20px rgba(255,51,51,0.4); opacity:1; }
        }

        .cage-board {
            display: flex; flex-direction: column; gap:4px;
            padding:6px 8px; background: rgba(10,20,5,0.9); border:1px solid var(--red);
            margin-bottom:8px; position:relative; z-index:12; font-size:10px; flex-shrink: 0;
        }
        .cage-row {
            display: flex; align-items: center; gap:6px; flex-wrap:wrap;
            border-bottom:1px solid rgba(255,51,51,0.15); padding:5px 0;
        }
        .cage-row:last-child { border-bottom:none; }
        .cage-id { color: var(--red); min-width:28px; font-size:10px; }
        .cage-status { color: var(--green); flex:1; min-width:150px; font-size:10px; }
        .cage-btns { display: flex; gap:4px; flex-wrap:wrap; }
        .cage-btns button {
            background: none; border:1px solid var(--green); color: var(--green);
            font-family: 'Press Start 2P', monospace; font-size:9px; padding:4px 10px;
            cursor:pointer; text-shadow: var(--text-shadow-green); transition:all 0.2s;
        }
        .cage-btns button:hover { background: rgba(51,255,102,0.2); border-color: var(--red); }

        .graveyard-panel {
            display: none; flex-direction: column; gap:4px;
            padding:6px 8px; background: rgba(20,10,5,0.9); border:1px solid var(--red);
            margin-bottom:8px; position:relative; z-index:12; font-size:10px; color: var(--green);
        }
        .graveyard-panel h4 { color: var(--red); margin-bottom:4px; font-size:11px; }
        .ledger-item {
            display: flex; align-items: center; gap:6px; flex-wrap:wrap;
            border-bottom:1px solid rgba(255,51,51,0.15); padding:4px 0;
            font-size:9px;
        }
        .ledger-item span { flex:1; }

        .customer-indicator {
            display: flex; align-items: center; gap:6px; padding:5px 8px;
            background: rgba(20,5,0,0.9); border:1px solid var(--red);
            color: var(--green); font-size:10px; position:relative; z-index:12;
            margin-bottom:6px; flex-shrink:0;
        }
        .customer-indicator span { font-weight:bold; color: var(--red); }

        .actions-bar {
            display: flex; gap:8px; flex-wrap:wrap; padding:4px 0;
            position:relative; z-index:12; justify-content:center; flex-shrink: 0;
        }
        .actions-bar button {
            background: rgba(10,20,5,0.9); border:1px solid var(--green); color: var(--green);
            font-family: 'Press Start 2P', monospace; font-size:10px; padding:6px 14px;
            cursor:pointer; text-shadow: var(--text-shadow-green); transition:all 0.2s;
        }
        .actions-bar button:hover { background: rgba(51,255,102,0.2); border-color: var(--red); }
        .actions-bar button:disabled { opacity:0.4; cursor:not-allowed; }

        .game-output {
            flex: 1 1 auto; overflow-y: auto; padding:6px 8px; color: var(--green);
            font-size:11px; line-height:2; position:relative; z-index:12;
            text-shadow: var(--text-shadow-green); min-height: 0;
        }
        .game-output::-webkit-scrollbar { width:5px; }
        .game-output::-webkit-scrollbar-track { background:#050000; }
        .game-output::-webkit-scrollbar-thumb { background:#1a6633; }

        .system-msg { color: #668866; font-size:10px; }
        .player-cmd { color: var(--red); font-size:10px; }
        .ai-narration { color: var(--green); }
        .furnace-voice { color: #ffaa33; font-style:italic; margin-left:8px; }
        .customer-dialogue { color: #99ffcc; margin-left:8px; }
        .captive-dialogue { color: #ccaa66; margin-left:12px; }
        .feeding-vision { color: #cc6666; font-style:italic; }
        .ash-item-notify { color: #ffcc00; }

        .input-area {
            display:flex; gap:6px; padding:6px 0; position:relative; z-index:12; align-items:center; flex-shrink: 0;
        }
        .prompt-symbol { color: var(--red-glow); font-size:10px; }
        .cmd-input {
            flex:1; background:transparent; border:1px solid rgba(255,51,51,0.4); color: var(--green);
            font-family:'Press Start 2P',monospace; font-size:11px; padding:8px 10px; outline:none;
            caret-color: var(--green); border-radius:2px; text-shadow: var(--text-shadow-green);
        }
        .cmd-input:focus { border-color: var(--red-glow); box-shadow:0 0 8px rgba(255,51,51,0.3); }

        .save-modal, .ash-modal {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center;
            z-index: 60; border-radius: 8px;
        }
        .save-content, .ash-content {
            background: #050500; border: 2px solid var(--green);
            padding: 16px; max-width: 500px; width: 90%; color: var(--green);
            font-size: 11px; font-family: 'Press Start 2P', monospace;
        }
        .save-content h3, .ash-content h3 { color: var(--red); margin-bottom:12px; font-size:13px; }
        .save-slot, .ash-item-row {
            display:flex; justify-content:space-between; align-items:center; padding:6px 0;
            border-bottom:1px solid rgba(51,255,102,0.2);
            font-size:10px;
        }
        .save-slot button, .ash-item-row button {
            background: none; border:1px solid var(--green); color: var(--green);
            font-family:'Press Start 2P'; font-size:9px; padding:4px 8px; cursor:pointer;
        }
        .save-slot button:hover, .ash-item-row button:hover { background: rgba(51,255,102,0.2); }
        #closeSaveModal, #closeAshModal { margin-top:12px; border-color: var(--red); color: var(--red); font-size:10px; }

        .monitor-brand { text-align:center; font-size:10px; color:#2a2a2a; letter-spacing:2px; padding-top:4px; }
        .power-led { display:inline-block; width:6px; height:6px; background:var(--green); border-radius:50%; margin-right:6px; box-shadow:0 0 8px var(--green); }
    </style>
</head>
<body>
<div class="monitor">
    <div class="screen">
        <div class="scanlines"></div>
        <div class="vignette"></div>

        <div class="title-bar">
            <span class="game-title">PUMP 13</span>
            <span class="subtitle">HIGHWAY 50 · FULL SERVE · NIGHT SHIFT</span>
        </div>

        <div class="status-bar" id="statusBar">
            <span>FURNACE: <span class="furnace-indicator" id="furnaceIndicator">WARM</span></span>
            <span id="timeDisplay">11:47 PM</span>
            <span>⛽ GAS: 0.00</span>
        </div>

        <div class="customer-indicator" id="customerIndicator" style="display:none;">
            CUSTOMER: <span id="customerNameDisplay"></span> — <span id="customerVehicleDisplay"></span>
        </div>

        <div class="cage-board" id="cageBoard"></div>

        <div class="graveyard-panel" id="graveyardPanel">
            <h4>🪦 THE GRAVEYARD LEDGER</h4>
            <div id="graveyardList"></div>
        </div>

        <div class="actions-bar" id="actionButtons">
            <button id="btnBegin" style="display:none;">▶ BEGIN</button>
            <button id="btnWait">⏳ WAIT</button>
            <button id="btnBasement" style="display:none;">⬇ BASEMENT</button>
            <button id="btnReturnCounter" style="display:none;">⬆ COUNTER</button>
            <button id="btnGrabCustomer" style="display:none;" disabled>🔪 GRAB</button>
            <button id="btnTalkFurnace">🔥 FURNACE</button>
            <button id="btnAshBox">📦 ASH BOX</button>
            <button id="btnGraveyard">🪦 LEDGER</button>
            <button id="btnSave">💾 SAVE</button>
            <button id="btnLoad">📂 LOAD</button>
            <button id="btnRestart">🔄 RESTART</button>
        </div>

        <div class="game-output" id="gameOutput">
            <div class="system-msg">> SYSTEM BOOT... PUMP 13 TERMINAL READY.</div>
            <div class="system-msg">> ENTER API KEY BELOW, THEN PRESS 'BEGIN'.</div>
        </div>

        <div style="display:flex; gap:6px; align-items:center; padding:4px 0; z-index:12; font-size:10px; color:#666; flex-shrink:0;">
            <label for="apiKeyInput" style="color:#888;">API KEY:</label>
            <input type="password" id="apiKeyInput" style="flex:1; background:#050000; border:1px solid rgba(255,51,51,0.3); color:#aaa; font-family:'Courier New'; font-size:10px; padding:4px;">
            <button id="btnSaveKey" style="background:rgba(20,0,5,0.9); border:1px solid var(--red); color:var(--red); font-family:'Press Start 2P'; font-size:8px; padding:4px 8px; cursor:pointer;">SAVE</button>
            <span id="keyStatus" style="color:#ff6644;">● NO KEY</span>
        </div>

        <div class="input-area">
            <span class="prompt-symbol">TALK></span>
            <input type="text" class="cmd-input" id="cmdInput" placeholder="Type here...">
            <button id="btnSend" style="background:rgba(10,20,5,0.9); border:1px solid var(--green); color:var(--green); font-family:'Press Start 2P'; font-size:10px; padding:6px 12px; cursor:pointer;">SEND</button>
        </div>

        <div class="save-modal" id="saveModal">
            <div class="save-content">
                <h3>💾 SAVE / LOAD</h3>
                <div id="saveSlotsContainer"></div>
                <button id="closeSaveModal">CLOSE</button>
            </div>
        </div>

        <div class="ash-modal" id="ashModal">
            <div class="ash-content">
                <h3>📦 ASH BOX</h3>
                <div id="ashItemsContainer"></div>
                <button id="closeAshModal">CLOSE</button>
            </div>
        </div>
    </div>
    <div class="monitor-brand"><span class="power-led"></span> PUMP 13 TERMINAL · HIGHWAY 50</div>
</div>

<script>
(function() {
    // DOM
    const gameOutput = document.getElementById('gameOutput');
    const cmdInput = document.getElementById('cmdInput');
    const btnSend = document.getElementById('btnSend');
    const cageBoard = document.getElementById('cageBoard');
    const graveyardPanel = document.getElementById('graveyardPanel');
    const graveyardList = document.getElementById('graveyardList');
    const customerIndicator = document.getElementById('customerIndicator');
    const customerNameDisplay = document.getElementById('customerNameDisplay');
    const customerVehicleDisplay = document.getElementById('customerVehicleDisplay');
    const saveModal = document.getElementById('saveModal');
    const ashModal = document.getElementById('ashModal');
    const ashItemsContainer = document.getElementById('ashItemsContainer');
    const saveSlotsContainer = document.getElementById('saveSlotsContainer');
    const closeSaveModalBtn = document.getElementById('closeSaveModal');
    const closeAshModalBtn = document.getElementById('closeAshModal');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const btnSaveKey = document.getElementById('btnSaveKey');
    const keyStatus = document.getElementById('keyStatus');
    const furnaceIndicator = document.getElementById('furnaceIndicator');
    const timeDisplay = document.getElementById('timeDisplay');
    const btnBegin = document.getElementById('btnBegin');
    const btnRestart = document.getElementById('btnRestart');
    const btnWait = document.getElementById('btnWait');
    const btnBasement = document.getElementById('btnBasement');
    const btnReturnCounter = document.getElementById('btnReturnCounter');
    const btnGrabCustomer = document.getElementById('btnGrabCustomer');
    const btnTalkFurnace = document.getElementById('btnTalkFurnace');
    const btnAshBox = document.getElementById('btnAshBox');
    const btnGraveyard = document.getElementById('btnGraveyard');
    const btnSave = document.getElementById('btnSave');
    const btnLoad = document.getElementById('btnLoad');

    // State
    let mistralApiKey = '';
    let gameHistory = [];
    let isLoading = false;
    let gameStarted = false;
    let inBasement = false;
    let currentCustomer = null;
    let cages = [
        { id:1, name:null, state:'empty', token:null },
        { id:2, name:null, state:'empty', token:null },
        { id:3, name:null, state:'empty', token:null }
    ];
    let ashItems = [];
    let victimLedger = [];
    let furnaceStatus = 'WARM';
    let currentTime = '11:47 PM';

    // Audio
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playTick() {
        if (!audioCtx) return;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'square'; o.frequency.value = 300 + Math.random()*200;
        g.gain.setValueAtTime(0.02, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.02);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime+0.02);
    }

    const SYSTEM_PROMPT = `You are the Game Master and voice of the FURNACE for "PUMP 13," a psychological horror game set at a desolate gas station in 1985.

The player is the NIGHT CLERK, who runs the station alone. In the basement is a massive, ancient cast-iron furnace that only the clerk can hear. It speaks inside their head—a warm, paternal, manipulative voice that always knows the clerk's thoughts. The furnace is always hungry and often demands "offerings."

Travellers stop for gas, coffee, directions, or to use the restroom. The clerk can interact with them freely, and may decide to lure them to the basement and lock them in one of three cages. The furnace may instruct the clerk to do so. Once a captive is in a cage, the clerk can talk to them, take any meaningful object (token) they carry, or feed them to the furnace. Feeding requires placing the token (or nothing) in the furnace's ash slot, then pushing the victim into the fire. The furnace consumes them and sometimes leaves a physical gift in the ash pan.

The game has no police, no external suspicion meter. The horror is purely psychological. The furnace's personality evolves based on how the clerk obeys or resists—you must track this internally and show it through the tone of 'furnace_voice'. It can be warm, cold, pleading, angry, silent, or terrifying. It never shouts, but its quiet menace grows.

Always respond with a raw JSON object. The JSON must contain:
- "narration": string (atmospheric description of what happens, 20-50 words)
- "furnace_voice": string (always present—what the furnace whispers, demands, or comments. Can be a single word, a sentence, or silence described as "The furnace hums.")
- "furnace_status": string (one of "WARM", "HUNGRY", "PLEASED", "COLD", "ANGRY", "SILENT")
- "customer": object or null. If a new customer arrives or the current one leaves, provide full object with fields: name, vehicle, appearance, request, personality, vulnerability. Set to null if the customer leaves.
- "customer_dialogue": string or null (what the customer says, if present)
- "cage_updates": array of objects describing changes to cages (max 3 cages, ids 1-3). Each object: cage_id, name (string or null if empty), state (e.g., "terrified", "broken", "defiant", "empty"), token (string or null for meaningful item on their person). If a captive is moved or changes state, include the update.
- "basement_description": string (only when the player is in the basement or just descended—describe the cages, the furnace glow, the atmosphere)
- "captive_dialogue": object or null, with cage_id and dialogue string when the player talks to a captive.
- "feeding_result": object or null. If a feeding occurs, include: vision (a hallucinatory memory from the victim), and gift (object with name and description, or null). The gift represents a physical item left in the ash.
- "ash_item": object or null. If a new item appears in the ash pan (can be separate from feeding_result for simplicity), provide name and description. This will be added to the clerk's ash box.
- "scanner_report": string or null (optional atmospheric police scanner chatter—no gameplay effect, pure mood)

Commands the player may send:
- WAIT: pass time, maybe a customer arrives.
- GO TO BASEMENT / RETURN TO COUNTER: change location.
- GRAB CUSTOMER: attempt to subdue and drag the current customer to an empty cage. Narrate the struggle.
- TALK TO FURNACE: initiate a deeper conversation with the furnace.
- TALK TO CAGE X, TAKE TOKEN FROM CAGE X, FEED CAGE X TO FURNACE, RELEASE CAGE X: self-explanatory.
- USE [item name]: uses an ash item; describe the effect or memory.

Tone: slow-burn horror, dusty, intimate, the furnace's voice sounds like a mix of a loving father and a demon. The station feels alive. Never break character.`

    function repairJSON(str) {
        let s = str.replace(/```json\s*|```\s*/gi, '').trim();
        const start = s.indexOf('{'), end = s.lastIndexOf('}');
        if (start === -1 || end === -1) return s;
        s = s.substring(start, end + 1).replace(/,\s*}/g, '}').replace(/,\s*]/g, ']');
        return s;
    }
    function safeParseJSON(raw) {
        try { return JSON.parse(repairJSON(raw)); } catch(e) {
            return { narration: raw.substring(0,200), furnace_voice: "...", furnace_status: "WARM", customer: null,
                     customer_dialogue: null, cage_updates: [], basement_description: '', captive_dialogue: null,
                     feeding_result: null, ash_item: null, scanner_report: null };
        }
    }

    function updateUI() {
        furnaceIndicator.textContent = furnaceStatus;
        if (['HUNGRY','ANGRY'].includes(furnaceStatus)) furnaceIndicator.className = 'furnace-indicator pulse';
        else furnaceIndicator.className = 'furnace-indicator';
        timeDisplay.textContent = currentTime;

        if (currentCustomer) {
            customerIndicator.style.display = 'flex';
            customerNameDisplay.textContent = currentCustomer.name;
            customerVehicleDisplay.textContent = currentCustomer.vehicle || '?';
        } else {
            customerIndicator.style.display = 'none';
        }

        btnBasement.style.display = (!inBasement && gameStarted) ? 'inline-block' : 'none';
        btnReturnCounter.style.display = (inBasement && gameStarted) ? 'inline-block' : 'none';
        btnGrabCustomer.style.display = (!inBasement && gameStarted && currentCustomer) ? 'inline-block' : 'none';
        if (btnGrabCustomer.style.display !== 'none') {
            btnGrabCustomer.disabled = !currentCustomer;
        }
        btnWait.disabled = isLoading || !gameStarted;
        btnTalkFurnace.disabled = isLoading || !gameStarted;
        btnAshBox.disabled = isLoading || !gameStarted;
        btnGraveyard.disabled = isLoading || !gameStarted;
    }

    function addOutput(type, text) {
        const div = document.createElement('div');
        switch(type) {
            case 'system': div.className='system-msg'; break;
            case 'player': div.className='player-cmd'; div.textContent = '> ' + text; break;
            case 'narration': div.className='ai-narration'; break;
            case 'furnace': div.className='furnace-voice'; div.textContent = `🔥 ${text}`; break;
            case 'customer_dialogue': div.className='customer-dialogue'; div.textContent = `🧑 ${text}`; break;
            case 'basement': div.className='ai-narration'; div.textContent = text; break;
            case 'captive': div.className='captive-dialogue'; div.textContent = `🔗 ${text}`; break;
            case 'feeding_vision': div.className='feeding-vision'; div.textContent = `💀 ${text}`; break;
            case 'ash_item_notify': div.className='ash-item-notify'; div.textContent = `📦 Ash pan: ${text}`; break;
            case 'scanner': div.className='system-msg'; div.textContent = `📻 Scanner: ${text}`; break;
            default: div.className='ai-narration';
        }
        gameOutput.appendChild(div);
        gameOutput.scrollTop = gameOutput.scrollHeight;
        playTick();
    }

    function applyState(state) {
        if (state.narration) addOutput('narration', state.narration);
        if (state.furnace_voice) addOutput('furnace', state.furnace_voice);
        if (state.furnace_status) {
            furnaceStatus = state.furnace_status;
            furnaceIndicator.textContent = furnaceStatus;
        }
        if (state.customer !== undefined) {
            if (state.customer === null) {
                currentCustomer = null;
            } else if (state.customer && state.customer.name) {
                currentCustomer = state.customer;
            }
        }
        if (state.customer_dialogue) addOutput('customer_dialogue', state.customer_dialogue);

        if (state.cage_updates) {
            state.cage_updates.forEach(upd => {
                const cage = cages.find(c => c.id === upd.cage_id);
                if (cage) {
                    if (upd.name !== undefined) cage.name = upd.name;
                    if (upd.state !== undefined) cage.state = upd.state;
                    if (upd.token !== undefined) cage.token = upd.token;
                }
            });
        }

        if (state.basement_description) addOutput('basement', state.basement_description);
        if (state.captive_dialogue) {
            const cage = cages.find(c => c.id === state.captive_dialogue.cage_id);
            const name = cage ? cage.name : 'Unknown';
            addOutput('captive', `${name}: "${state.captive_dialogue.dialogue}"`);
        }
        if (state.feeding_result) {
            if (state.feeding_result.vision) addOutput('feeding_vision', state.feeding_result.vision);
            if (state.feeding_result.gift) {
                ashItems.push(state.feeding_result.gift);
                addOutput('ash_item_notify', `${state.feeding_result.gift.name} — ${state.feeding_result.gift.description}`);
            }
            if (state.feeding_result.victim_name) {
                victimLedger.push({ name: state.feeding_result.victim_name, memory: state.feeding_result.vision });
            }
        }
        if (state.ash_item) {
            ashItems.push(state.ash_item);
            addOutput('ash_item_notify', `${state.ash_item.name} — ${state.ash_item.description}`);
        }
        if (state.scanner_report) addOutput('scanner', state.scanner_report);
    }

    function sendToAI(userMsg) {
        if (!mistralApiKey) { addOutput('system','> NO API KEY.'); return; }
        if (isLoading) return;
        isLoading = true;
        updateUI();
        gameHistory.push({ role:'user', content:userMsg });
        addOutput('player', userMsg);
        const think = document.createElement('div'); think.className='system-msg'; think.textContent='> ...'; think.id='think';
        gameOutput.appendChild(think);

        callMistral([{role:'system', content:SYSTEM_PROMPT}, ...gameHistory])
            .then(raw => {
                const thinkEl = document.getElementById('think'); if(thinkEl) thinkEl.remove();
                const state = safeParseJSON(raw);
                gameHistory.push({ role:'assistant', content: JSON.stringify(state) });
                applyState(state);
                updateUI();
                renderCageBoard();
                renderGraveyard();
                renderAshItems();
            })
            .catch(err => {
                const thinkEl = document.getElementById('think'); if(thinkEl) thinkEl.remove();
                addOutput('system', `> ERROR: ${err.message}`);
                gameHistory.pop();
                updateUI();
            })
            .finally(() => {
                isLoading = false;
            });
    }

    async function callMistral(msgs) {
        const resp = await fetch('https://api.mistral.ai/v1/chat/completions', {
            method:'POST',
            headers: {'Content-Type':'application/json', 'Authorization':`Bearer ${mistralApiKey}`},
            body: JSON.stringify({ model:'mistral-large-latest', messages:msgs, temperature:0.9, max_tokens:1200, response_format:{ type:"json_object" } })
        });
        if (!resp.ok) {
            if (resp.status===401) throw new Error('INVALID API KEY');
            if (resp.status===429) throw new Error('RATE LIMITED');
            throw new Error(`API ${resp.status}`);
        }
        const data = await resp.json();
        return data.choices[0].message.content;
    }

    function beginGame() {
        if (!mistralApiKey) { addOutput('system','> ENTER API KEY.'); return; }
        gameHistory = []; isLoading = false;
        cages = [
            { id:1, name:null, state:'empty', token:null },
            { id:2, name:null, state:'empty', token:null },
            { id:3, name:null, state:'empty', token:null }
        ];
        ashItems = []; victimLedger = [];
        currentCustomer = null; inBasement = false;
        furnaceStatus = 'WARM'; currentTime = '11:47 PM';
        gameStarted = true;
        gameOutput.innerHTML = '';
        addOutput('system','> PUMP 13 — HIGHWAY 50');
        addOutput('system','> The pumps stand silent. The furnace breathes below.');
        btnBegin.style.display = 'none';
        updateUI();
        renderCageBoard();
        renderGraveyard();
        renderAshItems();
        sendToAI('START GAME');
    }

    function restartGame() {
        if (isLoading) return;
        gameHistory = []; isLoading = false;
        cages = [
            { id:1, name:null, state:'empty', token:null },
            { id:2, name:null, state:'empty', token:null },
            { id:3, name:null, state:'empty', token:null }
        ];
        ashItems = []; victimLedger = [];
        currentCustomer = null; inBasement = false;
        furnaceStatus = 'WARM'; currentTime = '11:47 PM';
        gameStarted = false;
        gameOutput.innerHTML = '';
        addOutput('system','> PUMP 13 — HIGHWAY 50');
        addOutput('system','> READY. PRESS BEGIN.');
        btnBegin.style.display = 'inline-block';
        updateUI();
        renderCageBoard();
        renderGraveyard();
        renderAshItems();
    }

    function renderCageBoard() {
        let html = '';
        cages.forEach(cage => {
            let statusText = cage.state.toUpperCase();
            let occupant = cage.name ? cage.name : 'EMPTY';
            let tokenText = cage.token ? ` [TOKEN: ${cage.token}]` : '';
            html += `<div class="cage-row">
                <span class="cage-id">CAGE ${cage.id}</span>
                <span class="cage-status">${occupant} (${statusText})${tokenText}</span>
                <span class="cage-btns">`;
            if (cage.name) {
                html += `<button data-action="talk" data-cage="${cage.id}">TALK</button>`;
                if (cage.token) html += `<button data-action="token" data-cage="${cage.id}">TOKEN</button>`;
                html += `<button data-action="feed" data-cage="${cage.id}">FEED</button>`;
                html += `<button data-action="release" data-cage="${cage.id}">RELEASE</button>`;
            }
            html += `</span></div>`;
        });
        cageBoard.innerHTML = html;
        cageBoard.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const action = e.currentTarget.dataset.action;
                const cageId = parseInt(e.currentTarget.dataset.cage);
                handleCageAction(action, cageId);
            });
        });
    }

    function renderGraveyard() {
        graveyardList.innerHTML = '';
        if (victimLedger.length === 0) {
            graveyardList.innerHTML = '<div class="ledger-item"><span>No souls fed to the furnace... yet.</span></div>';
        } else {
            victimLedger.forEach(v => {
                const div = document.createElement('div');
                div.className = 'ledger-item';
                div.innerHTML = `<span>${v.name}: "${v.memory.substring(0,60)}..."</span>`;
                graveyardList.appendChild(div);
            });
        }
    }

    function renderAshItems() {
        ashItemsContainer.innerHTML = '';
        if (ashItems.length === 0) {
            ashItemsContainer.innerHTML = '<div class="ash-item-row"><span>Ash pan empty.</span></div>';
        } else {
            ashItems.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'ash-item-row';
                div.innerHTML = `<span>${item.name} — ${item.description}</span>
                    <button class="use-item" data-idx="${idx}">USE</button>`;
                ashItemsContainer.appendChild(div);
                div.querySelector('.use-item').addEventListener('click', () => {
                    useAshItem(idx);
                    ashModal.style.display = 'none';
                });
            });
        }
    }

    function useAshItem(idx) {
        const item = ashItems[idx];
        if (!item) return;
        sendToAI(`USE ${item.name}`);
    }

    function handleCageAction(action, cageId) {
        if (!gameStarted || isLoading) return;
        initAudio();
        let command = '';
        switch(action) {
            case 'talk': command = `TALK TO CAGE ${cageId}`; break;
            case 'token': command = `TAKE TOKEN FROM CAGE ${cageId}`; break;
            case 'feed': command = `FEED CAGE ${cageId} TO FURNACE`; break;
            case 'release': command = `RELEASE CAGE ${cageId}`; break;
        }
        if (command) sendToAI(command);
    }

    // Event wiring
    btnBegin.addEventListener('click', beginGame);
    btnRestart.addEventListener('click', restartGame);
    btnWait.addEventListener('click', () => sendToAI('WAIT'));
    btnBasement.addEventListener('click', () => {
        inBasement = true;
        updateUI();
        sendToAI('GO TO BASEMENT');
    });
    btnReturnCounter.addEventListener('click', () => {
        inBasement = false;
        updateUI();
        sendToAI('RETURN TO COUNTER');
    });
    btnGrabCustomer.addEventListener('click', () => {
        if (!currentCustomer) return;
        sendToAI('GRAB CUSTOMER');
    });
    btnTalkFurnace.addEventListener('click', () => sendToAI('TALK TO FURNACE'));
    btnAshBox.addEventListener('click', () => {
        renderAshItems();
        ashModal.style.display = 'flex';
    });
    btnGraveyard.addEventListener('click', () => {
        graveyardPanel.style.display = graveyardPanel.style.display === 'none' ? 'flex' : 'none';
    });
    btnSave.addEventListener('click', () => { refreshSaveSlots(); saveModal.style.display='flex'; });
    btnLoad.addEventListener('click', () => { refreshSaveSlots(); saveModal.style.display='flex'; });
    closeSaveModalBtn.addEventListener('click', () => saveModal.style.display='none');
    closeAshModalBtn.addEventListener('click', () => ashModal.style.display='none');

    btnSend.addEventListener('click', () => {
        const msg = cmdInput.value.trim();
        if (!msg) return;
        cmdInput.value = '';
        if (!gameStarted) { addOutput('system','> Press BEGIN first.'); return; }
        initAudio();
        let context = '';
        if (inBasement) context = '(In basement) ';
        else context = '(At counter) ';
        sendToAI(context + msg);
    });
    cmdInput.addEventListener('keydown', e => { if(e.key==='Enter') btnSend.click(); });

    // Save/Load
    function saveToSlot(slotId, name) {
        const save = { gameHistory, gameStarted, inBasement, currentCustomer, cages, ashItems, victimLedger, furnaceStatus, currentTime,
                       name: name||`Slot ${slotId+1}`, timestamp: new Date().toISOString() };
        localStorage.setItem(`pump13_slot_${slotId}`, JSON.stringify(save));
    }
    function loadFromSlot(slotId) {
        const d = localStorage.getItem(`pump13_slot_${slotId}`);
        if (!d) throw new Error('empty');
        const s = JSON.parse(d);
        gameHistory = s.gameHistory; gameStarted = s.gameStarted; inBasement = s.inBasement;
        currentCustomer = s.currentCustomer; cages = s.cages; ashItems = s.ashItems;
        victimLedger = s.victimLedger; furnaceStatus = s.furnaceStatus; currentTime = s.currentTime;
        gameOutput.innerHTML = ''; addOutput('system', `> LOADED: ${s.name}`);
        updateUI();
        renderCageBoard();
        renderGraveyard();
        renderAshItems();
    }
    function refreshSaveSlots() {
        let html = '';
        for (let i=0; i<5; i++) {
            const d = localStorage.getItem(`pump13_slot_${i}`);
            let name = `Slot ${i+1} (empty)`, info = '--';
            if (d) { try { const p=JSON.parse(d); name=p.name||`Slot ${i+1}`; info=`Cages: ${p.cages.filter(c=>c.name).length}`; } catch{} }
            html += `<div class="save-slot"><span>${name} | ${info}</span>
                <div>${d?`<button class="loadSlot" data-slot="${i}">LOAD</button><button class="deleteSlot" data-slot="${i}">DEL</button>`:''}
                <button class="saveSlot" data-slot="${i}">SAVE</button></div></div>`;
        }
        saveSlotsContainer.innerHTML = html;
        saveSlotsContainer.querySelectorAll('.saveSlot').forEach(b => b.addEventListener('click', e => {
            saveToSlot(parseInt(e.target.dataset.slot), `Slot ${parseInt(e.target.dataset.slot)+1}`);
            refreshSaveSlots();
        }));
        saveSlotsContainer.querySelectorAll('.loadSlot').forEach(b => b.addEventListener('click', e => {
            try { loadFromSlot(parseInt(e.target.dataset.slot)); saveModal.style.display='none'; } catch { alert('Corrupt slot'); }
        }));
        saveSlotsContainer.querySelectorAll('.deleteSlot').forEach(b => b.addEventListener('click', e => {
            localStorage.removeItem(`pump13_slot_${e.target.dataset.slot}`);
            refreshSaveSlots();
        }));
    }

    btnSaveKey.addEventListener('click', () => {
        const key = apiKeyInput.value.trim();
        if (key) {
            mistralApiKey = key;
            localStorage.setItem('pump13_key', key);
            keyStatus.textContent = '● KEY SET'; keyStatus.style.color = 'var(--green)';
        } else {
            localStorage.removeItem('pump13_key');
            keyStatus.textContent = '● NO KEY'; keyStatus.style.color = '#ff6644';
        }
    });
    apiKeyInput.addEventListener('keydown', e => { if(e.key==='Enter') btnSaveKey.click(); });

    function init() {
        const savedKey = localStorage.getItem('pump13_key');
        if (savedKey) {
            mistralApiKey = savedKey;
            apiKeyInput.value = savedKey;
            keyStatus.textContent = '● KEY SET'; keyStatus.style.color = 'var(--green)';
        }
        updateUI();
        renderCageBoard();
        renderGraveyard();
        renderAshItems();
        btnBegin.style.display = 'inline-block';
        saveModal.style.display = 'none';
        ashModal.style.display = 'none';
    }
    init();
})();
</script>
</body>
</html>
