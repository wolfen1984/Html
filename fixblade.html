<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLADE RUNNER 2049 - COMPLETE RETRO POINT & CLICK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            font-family: 'VT323', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-container {
            width: 100%;
            max-width: 360px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #000;
            border: 8px solid #1a2a2a;
            box-shadow: 0 0 20px #00aaff88;
            position: relative;
        }
        /* CRT scanlines + vignette */
        .crt::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,0,0.08) 0px, rgba(0,255,0,0.08) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 20;
        }
        #title-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border: 8px solid #00ffff88;
        }
        #title-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        #start-button {
            font-family: 'VT323', monospace;
            font-size: 28px;
            padding: 12px 48px;
            background: #000;
            color: #0ff;
            border: 4px solid #0ff;
            box-shadow: 0 0 15px #0ff;
            cursor: pointer;
            z-index: 10;
            transition: 0.05s linear;
        }
        #start-button:active { background: #0ff; color: #000; transform: scale(0.98); }
        #header {
            height: 44px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            letter-spacing: 4px;
            color: #0ff;
            border-bottom: 3px solid #0ff;
            flex-shrink: 0;
            position: relative;
        }
        #room-name {
            position: absolute;
            right: 12px;
            font-size: 16px;
            color: #0f9;
            background: #000000aa;
            padding: 2px 6px;
        }
        #canvas {
            width: 320px;
            height: 240px;
            background: #000;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            display: block;
            margin: 0 auto;
            border-bottom: 3px solid #0f9;
            flex-shrink: 0;
            cursor: none;
        }
        #ui-panel {
            flex: 1;
            background: #0a0a0a;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        #verbs {
            display: flex;
            gap: 6px;
            background: #111;
            padding: 6px;
            border: 3px solid #0ff;
            box-shadow: inset 0 0 8px #0ff33, 0 2px 0 #0a0a0a;
        }
        .verb-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: #222;
            border: 2px solid #0f9;
            padding: 6px 0;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 2px 2px 0 #000;
        }
        .verb-btn.active {
            background: #0f9;
            border-color: #fff;
            box-shadow: inset 0 0 6px #0ff, 0 0 0;
            transform: translate(1px, 1px);
        }
        .verb-icon {
            width: 24px;
            height: 24px;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        .verb-label {
            font-size: 18px;
            color: #0ff;
            font-weight: bold;
        }
        .verb-btn.active .verb-label { color: #000; }
        #inventory {
            display: flex;
            gap: 6px;
            background: #111;
            padding: 6px;
            border: 3px solid #0ff;
            overflow-x: auto;
        }
        .inv-slot {
            flex: 1;
            min-width: 56px;
            background: #1a1a1a;
            border: 2px solid #0ff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.05s;
            height: 56px;
        }
        .inv-slot.selected {
            background: #0f9;
            border-color: #fff;
            box-shadow: 0 0 8px #0f9;
        }
        .inv-canvas {
            width: 48px;
            height: 48px;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        #message {
            background: #000;
            border: 3px solid #0f9;
            padding: 8px;
            font-size: 20px;
            line-height: 1.2;
            color: #0f9;
            min-height: 80px;
            font-family: 'VT323', monospace;
            box-shadow: inset 0 0 8px #0f933;
            overflow-y: auto;
        }
        #modal, #pda-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        #modal-content {
            background: #111;
            border: 6px solid #0ff;
            padding: 16px;
            max-width: 300px;
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .portrait-canvas {
            width: 64px;
            height: 64px;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            border: 2px solid #0f9;
        }
        .dialog-text {
            color: #0f9;
            font-size: 20px;
            flex: 1;
        }
        #modal-button {
            margin-top: 16px;
            font-size: 24px;
            padding: 6px 32px;
            background: #000;
            color: #0ff;
            border: 3px solid #0ff;
            cursor: pointer;
        }
        #pda-content { background: #0a0a1a; border: 6px solid #0ff; padding: 12px; max-width: 300px; color: #0f9; }
        .pda-tab { display: inline-block; margin: 4px; padding: 4px 12px; background: #111; border: 2px solid #0f9; cursor: pointer; }
        .pda-tab.active { background: #0f9; color: #000; }
        #win-screen {
            position: absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            text-align: center;
        }
        .cursor-pixel {
            position: fixed;
            width: 16px;
            height: 16px;
            pointer-events: none;
            z-index: 9999;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
<div id="game-container" class="crt">
    <div id="title-screen">
        <canvas id="title-canvas" width="320" height="240"></canvas>
        <div id="start-button">START GAME</div>
    </div>
    <div id="header">BLADE RUNNER<div id="room-name">ALLEY</div></div>
    <canvas id="canvas" width="320" height="240"></canvas>
    <div id="ui-panel">
        <div id="verbs"></div>
        <div id="inventory"></div>
        <div id="message">> SYSTEM READY. LOCATE AND RETIRE 5 REPLICANTS.</div>
    </div>
    <div id="modal"><div id="modal-content"></div><button id="modal-button">OK</button></div>
    <div id="pda-modal"><div id="pda-content"><div class="pda-header">PDA v3.0</div><div id="pda-tabs"></div><div id="pda-body"></div><button id="pda-close">CLOSE</button></div></div>
    <div id="win-screen"><div style="font-size:48px;">ALL REPLICANTS RETIRED</div><div style="font-size:24px;">CITY SECURE. MISSION COMPLETE.</div><div style="margin-top:20px; border:4px solid #0ff; padding:12px; cursor:pointer;" onclick="location.reload()">PLAY AGAIN</div></div>
</div>
<div class="cursor-pixel" id="pixel-cursor"></div>

<script>
    // =============================== EGA PALETTE ===============================
    const PAL = {
        black: "#000000", white: "#ffffff", cyan: "#00ffff", magenta: "#ff00ff",
        amber: "#ffaa00", darkblue: "#000080", green: "#00ff9d", grey: "#555555",
        darkgrey: "#222222", lightblue: "#88aaff", red: "#ff3366", brown: "#884400"
    };
    
    // Dithered rectangle (checkerboard pattern)
    function drawDitheredRect(ctx, x, y, w, h, color1, color2, intensity=0.5) {
        ctx.fillStyle = color1;
        ctx.fillRect(x, y, w, h);
        if (intensity <= 0) return;
        ctx.fillStyle = color2;
        for (let i = 0; i < w; i += 2) {
            for (let j = 0; j < h; j += 2) {
                if ((i + j) % 4 < 2) ctx.fillRect(x + i, y + j, 1, 1);
            }
        }
    }
    
    // =============================== GLOBALS ===============================
    let canvas, ctx;
    let currentRoom = 'street';
    let player = { x: 60, y: 200, target: null, facing: 'right', walkAnim: 0 };
    let flyingSpinners = [];
    let gameWon = false, dialogOpen = false, pdaOpen = false;
    let currentVerb = 'WALK';
    let selectedItem = null;
    let replicantsRetired = 0;
    const TOTAL_REPLICANTS = 5;
    let hoveredObject = null;
    let customCursor = document.getElementById('pixel-cursor');
    
    // Animated particles
    let rainDrops = [], steamParticles = [];
    function initParticles() {
        rainDrops = [];
        steamParticles = [];
        for (let i = 0; i < 50; i++) rainDrops.push({ x: Math.random() * 320, y: Math.random() * 240, speed: 2 + Math.random() * 4 });
        for (let i = 0; i < 20; i++) steamParticles.push({ x: Math.random() * 320, y: 160 + Math.random() * 60, vy: -0.5 - Math.random() * 1.5 });
    }
    
    // Typewriter system
    let msgQueue = [], isTyping = false, currentMsg = "", typedPos = 0, msgDiv;
    function typewriterSetMessage(text) {
        if (isTyping) msgQueue.push(text);
        else { currentMsg = text; typedPos = 0; isTyping = true; msgDiv.innerHTML = ""; }
    }
    function updateTypewriter() {
        if (!isTyping) return;
        if (typedPos < currentMsg.length) {
            msgDiv.innerHTML += currentMsg[typedPos];
            typedPos++;
        } else {
            isTyping = false;
            if (msgQueue.length) typewriterSetMessage(msgQueue.shift());
        }
    }
    
    // PDA data (full)
    let pdaData = {
        info: () => `OFFICER: RICK DECKARD\nBADGE: B-263-54\nRETIRED: ${replicantsRetired}/${TOTAL_REPLICANTS}\nWEAPONS: BLASTER / EMP`,
        bank: 24750,
        contacts: [{ name: "BRYANT", number: "POL-01" }, { name: "GAFF", number: "POL-02" }, { name: "RACHAEL", number: "TYR-77" }],
        messages: [
            { from: "BRYANT", text: "DECKARD. 5 REPLICANTS. ARCHIVES CODE: TYR-2049", time: "21:14" },
            { from: "GAFF", text: "HIDDEN PANEL IN BRADBURY LOBBY. USE CODE TYR-2049.", time: "22:03" },
            { from: "ANALYSIS", text: "ARCHIVES HOLD MEMORY MAKER. GET ARCHIVE KEY FOR EMP.", time: "23:47" }
        ]
    };
    
    let inventory = [{ name: 'PDA', short: 'PDA' }];
    let replicantDB = [
        { name: "ALLEY STALKER", location: "Alley", retired: false, notes: "Has keycard" },
        { name: "POLICE INFILTRATOR", location: "Police HQ", retired: false, notes: "Disguised" },
        { name: "UNDERGROUND ENGINEER", location: "Underground", retired: false, notes: "Tech" },
        { name: "ROOFTOP LEADER", location: "Rooftop", retired: false, notes: "Final" },
        { name: "MEMORY MAKER", location: "Archives", retired: false, notes: "Holds Archive Key" }
    ];
    function updateReplicantDB() {
        const map = { street_replicant: 'ALLEY STALKER', police_replicant: 'POLICE INFILTRATOR', hideout_replicant: 'UNDERGROUND ENGINEER', finalreplicant: 'ROOFTOP LEADER', archive_replicant: 'MEMORY MAKER' };
        for (let rn in rooms) {
            for (let obj of rooms[rn].interactables) {
                if (obj.isReplicant && map[obj.id]) {
                    let entry = replicantDB.find(r => r.name === map[obj.id]);
                    if (entry) entry.retired = obj.retired;
                }
            }
        }
    }
    
    // =============================== ROOMS (FULL) ===============================
    const rooms = {
        street: {
            name: 'ALLEY', entryDesc: 'Rain-soaked alley. Neon flickers.',
            playerEntry: { x: 60, y: 200 },
            drawBackground: function(ctx) {
                ctx.fillStyle = PAL.black; ctx.fillRect(0, 0, 320, 240);
                ctx.fillStyle = PAL.darkblue; ctx.fillRect(0, 20, 320, 140);
                drawDitheredRect(ctx, 10, 30, 45, 110, PAL.grey, PAL.black, 0.4);
                drawDitheredRect(ctx, 65, 20, 38, 120, PAL.grey, PAL.black, 0.5);
                drawDitheredRect(ctx, 115, 30, 42, 110, PAL.grey, PAL.black, 0.3);
                ctx.fillStyle = PAL.cyan; ctx.fillRect(12, 128, 28, 12);
                ctx.fillStyle = PAL.amber; ctx.fillRect(268, 118, 32, 10);
                if (Math.floor(Date.now() / 400) % 2) ctx.fillStyle = PAL.magenta; else ctx.fillStyle = PAL.cyan;
                ctx.fillRect(150, 45, 8, 8);
                for (let r of rainDrops) { ctx.fillStyle = PAL.lightblue; ctx.fillRect(r.x, r.y, 1, 3); r.y += r.speed; if (r.y > 240) r.y = 0; }
                drawSpinners(ctx);
            },
            interactables: [
                { id: 'news', name: 'NEWSPAPER', x: 38, y: 182, w: 34, h: 22, lookText: 'HEADLINE: "FIVE REPLICANTS INFILTRATE LAPD".', takeable: true, taken: false },
                { id: 'street_replicant', name: 'REPLICANT', x: 178, y: 148, w: 38, h: 52, lookText: 'SUSPICIOUS FIGURE. EYES GLOW.', talkText: 'REPLICANT: "I CAN HELP YOU... TAKE THIS KEYCARD."', isNpc: true, isReplicant: true, retired: false, hasGivenKey: false, portrait: "replicant" },
                { id: 'street_door', name: 'DOOR', x: 258, y: 118, w: 36, h: 58, lookText: 'HEAVY METAL DOOR TO BRADBURY.', targetRoom: 'bradbury', locked: true, requiresItem: 'KEYCARD' },
                { id: 'vendor', name: 'VENDOR', x: 22, y: 138, w: 32, h: 48, lookText: 'SHADY TECH VENDOR.', talkText: 'VENDOR: "I SELL MEMORIES."', isNpc: true, portrait: "vendor" }
            ]
        },
        bradbury: {
            name: 'BRADBURY', entryDesc: 'Art deco lobby. Hidden panel near elevator.',
            playerEntry: { x: 280, y: 190 },
            drawBackground: function(ctx) {
                ctx.fillStyle = PAL.darkblue; ctx.fillRect(0, 0, 320, 240);
                drawDitheredRect(ctx, 20, 40, 280, 100, PAL.grey, PAL.black, 0.3);
                ctx.fillStyle = PAL.amber; ctx.fillRect(130, 68, 60, 92);
                ctx.fillStyle = PAL.cyan; ctx.fillRect(185, 105, 12, 12);
                for (let s of steamParticles) { ctx.fillStyle = PAL.white; ctx.fillRect(s.x, s.y, 2, 2); s.y += s.vy; if (s.y < 120) s.y = 200; }
                drawSpinners(ctx);
            },
            interactables: [
                { id: 'elevator', name: 'ELEVATOR', x: 132, y: 68, w: 56, h: 92, lookText: 'BRASS ELEVATOR TO ROOFTOP.', targetRoom: 'rooftop', locked: false },
                { id: 'police_door', name: 'POLICE DOOR', x: 18, y: 68, w: 36, h: 92, lookText: 'POLICE HQ ACCESS.', targetRoom: 'police', locked: false },
                { id: 'chess_player', name: 'CHESS PLAYER', x: 40, y: 138, w: 32, h: 60, lookText: 'OLD MAN PLAYING CHESS.', talkText: 'CHESS PLAYER: "Take my BLASTER. You will need it."', isNpc: true, hasGivenBlaster: false, portrait: "chess" },
                { id: 'fire_exit', name: 'FIRE EXIT', x: 260, y: 88, w: 42, h: 68, lookText: 'EMERGENCY EXIT TO UNDERGROUND.', targetRoom: 'hideout', locked: false },
                { id: 'hidden_panel', name: 'HIDDEN PANEL', x: 180, y: 100, w: 20, h: 30, lookText: 'KEYPAD. NEEDS CODE.', locked: true, requiresCode: 'TYR-2049', targetRoom: 'archives' }
            ]
        },
        rooftop: {
            name: 'ROOFTOP', entryDesc: 'High above the city. Rain lashes.',
            playerEntry: { x: 40, y: 190 },
            drawBackground: function(ctx) {
                ctx.fillStyle = PAL.black; ctx.fillRect(0, 0, 320, 240);
                for (let i = 0; i < 12; i++) ctx.fillStyle = PAL.amber, ctx.fillRect(10 + i * 25, 40, 6, 100);
                for (let r of rainDrops) { ctx.fillStyle = PAL.cyan; ctx.fillRect(r.x, r.y, 1, 2); r.y += r.speed * 1.5; if (r.y > 240) r.y = 0; }
                drawSpinners(ctx);
            },
            interactables: [
                { id: 'finalreplicant', name: 'REPLICANT LEADER', x: 148, y: 112, w: 38, h: 52, lookText: 'THE LAST REPLICANT. DEFIANT.', talkText: 'REPLICANT: "All those moments... lost in time. RETIRE ME IF YOU CAN."', isNpc: true, isReplicant: true, retired: false, portrait: "leader" },
                { id: 'roof_elevator', name: 'ELEVATOR', x: 132, y: 68, w: 56, h: 92, lookText: 'ELEVATOR BACK DOWN.', targetRoom: 'bradbury', locked: false }
            ]
        },
        police: {
            name: 'POLICE HQ', entryDesc: 'Fluorescent lights. Voight-Kampff in corner.',
            playerEntry: { x: 40, y: 190 },
            drawBackground: function(ctx) {
                ctx.fillStyle = PAL.darkgrey; ctx.fillRect(0, 0, 320, 240);
                ctx.fillStyle = PAL.lightblue; ctx.fillRect(40, 30, 240, 8);
                ctx.fillStyle = PAL.cyan; ctx.fillRect(260, 150, 40, 30);
                if (window.archiveKeyObtained) { ctx.fillStyle = PAL.amber; ctx.fillRect(70, 140, 30, 30); }
                drawSpinners(ctx);
            },
            interactables: [
                { id: 'bryant', name: 'BRYANT', x: 210, y: 110, w: 38, h: 52, lookText: 'IRATE CAPTAIN.', talkText: 'BRYANT: "Use Voight-Kampff to scan remaining replicants."', isNpc: true, portrait: "bryant" },
                { id: 'police_replicant', name: 'INFILTRATOR', x: 130, y: 130, w: 36, h: 48, lookText: 'LAPD OFFICER BUT EYES WRONG.', talkText: 'INFILTRATOR: "I am not what I seem."', isNpc: true, isReplicant: true, retired: false, portrait: "infiltrator" },
                { id: 'exit_to_bradbury', name: 'EXIT', x: 18, y: 68, w: 36, h: 92, lookText: 'DOOR BACK TO BRADBURY.', targetRoom: 'bradbury', locked: false },
                { id: 'vk_machine', name: 'VOIGHT-KAMPFF', x: 260, y: 150, w: 40, h: 30, lookText: 'EMPATHY TEST MACHINE. SCANS FOR REMAINING REPLICANTS.', scanFunction: true, takeable: false },
                { id: 'weapon_case', name: 'WEAPON CASE', x: 70, y: 140, w: 30, h: 30, lookText: 'HEAVY CASE. LOCKED.', requiresItem: 'ARCHIVE_KEY', givesEMP: true, empGiven: false }
            ]
        },
        hideout: {
            name: 'UNDERGROUND', entryDesc: 'Damp tunnels. Illegal tech everywhere.',
            playerEntry: { x: 150, y: 190 },
            drawBackground: function(ctx) {
                ctx.fillStyle = PAL.black; ctx.fillRect(0, 0, 320, 240);
                drawDitheredRect(ctx, 10, 130, 300, 80, PAL.darkgrey, PAL.black, 0.6);
                ctx.fillStyle = PAL.red; ctx.fillRect(40, 70, 12, 12);
                drawSpinners(ctx);
            },
            interactables: [
                { id: 'hideout_replicant', name: 'REPLICANT ENGINEER', x: 110, y: 110, w: 38, h: 52, lookText: 'TWEAKING SYNTHETIC SKIN.', talkText: 'ENGINEER: "You found me. But I will not go easy."', isNpc: true, isReplicant: true, retired: false, portrait: "engineer" },
                { id: 'exit_street', name: 'EXIT', x: 260, y: 130, w: 40, h: 50, lookText: 'TUNNEL BACK TO ALLEY.', targetRoom: 'street', locked: false }
            ]
        },
        archives: {
            name: 'ARCHIVES', entryDesc: 'Cold storage of memories. A lone replicant stands.',
            playerEntry: { x: 150, y: 190 },
            drawBackground: function(ctx) {
                ctx.fillStyle = PAL.darkblue; ctx.fillRect(0, 0, 320, 240);
                for (let i = 0; i < 12; i++) ctx.fillStyle = PAL.cyan, ctx.fillRect(20 + i * 25, 80, 8, 50);
                drawSpinners(ctx);
            },
            interactables: [
                { id: 'archive_replicant', name: 'MEMORY MAKER', x: 148, y: 112, w: 38, h: 52, lookText: 'REPLICANT HOLDING A GLOWING KEY.', talkText: 'MEMORY MAKER: "Take the Archive Key... but forget your past."', isNpc: true, isReplicant: true, retired: false, hasArchiveKey: false, portrait: "archivist" },
                { id: 'archive_exit', name: 'EXIT', x: 260, y: 130, w: 40, h: 50, lookText: 'LEAVE ARCHIVES.', targetRoom: 'bradbury', locked: false }
            ]
        }
    };
    
    function getTargetRoom(obj) { return obj.targetRoom; }
    function drawSpinners(ctx) {
        for (let s of flyingSpinners) {
            ctx.fillStyle = PAL.cyan; ctx.fillRect(s.x, s.y, 32, 8);
            ctx.fillStyle = PAL.magenta; ctx.fillRect(s.x + 8, s.y - 4, 14, 6);
            // exhaust trail
            ctx.fillStyle = PAL.amber; ctx.fillRect(s.x - 4, s.y + 2, 4, 4);
        }
    }
    function updateSpinners() {
        for (let i = flyingSpinners.length - 1; i >= 0; i--) {
            flyingSpinners[i].x += flyingSpinners[i].speed;
            if (flyingSpinners[i].x > 380) flyingSpinners.splice(i, 1);
        }
        if (Math.random() < 0.03 && flyingSpinners.length < 3 && (currentRoom === 'street' || currentRoom === 'rooftop' || currentRoom === 'archives'))
            flyingSpinners.push({ x: -40, y: 30 + Math.random() * 60, speed: 2.5 + Math.random() * 2 });
    }
    
    // Inventory pixel sprites
    function drawItemIcon(ctx, itemName) {
        ctx.clearRect(0, 0, 48, 48);
        ctx.fillStyle = PAL.black; ctx.fillRect(0, 0, 48, 48);
        if (itemName === 'PDA') { ctx.fillStyle = PAL.cyan; ctx.fillRect(10, 10, 28, 28); ctx.fillStyle = PAL.white; ctx.fillRect(15, 15, 18, 18); for (let i = 0; i < 3; i++) ctx.fillRect(20 + i * 6, 28, 2, 6); }
        else if (itemName === 'KEYCARD') { ctx.fillStyle = PAL.amber; ctx.fillRect(8, 20, 32, 8); ctx.fillStyle = PAL.white; for (let i = 0; i < 4; i++) ctx.fillRect(12 + i * 8, 22, 2, 4); }
        else if (itemName === 'BLASTER') { ctx.fillStyle = PAL.grey; ctx.fillRect(12, 18, 24, 12); ctx.fillStyle = PAL.red; ctx.fillRect(32, 20, 8, 6); ctx.fillStyle = PAL.white; ctx.fillRect(16, 16, 6, 4); }
        else if (itemName === 'ARCHIVE_KEY') { ctx.fillStyle = PAL.amber; ctx.fillRect(14, 20, 20, 8); ctx.fillStyle = PAL.cyan; ctx.fillRect(20, 16, 8, 4); }
        else if (itemName === 'EMP') { ctx.fillStyle = PAL.green; ctx.fillRect(12, 16, 24, 16); for (let i = 0; i < 3; i++) ctx.fillStyle = PAL.cyan, ctx.fillRect(18 + i * 6, 20, 4, 8); }
        else { ctx.fillStyle = PAL.white; ctx.fillText("?", 20, 28); }
    }
    
    function updateInventoryUI() {
        let container = document.getElementById('inventory');
        container.innerHTML = '';
        for (let i = 0; i < inventory.length; i++) {
            let slot = document.createElement('div');
            slot.className = 'inv-slot';
            if (selectedItem === inventory[i]) slot.classList.add('selected');
            let canvasIcon = document.createElement('canvas');
            canvasIcon.width = 48; canvasIcon.height = 48;
            canvasIcon.classList.add('inv-canvas');
            drawItemIcon(canvasIcon.getContext('2d'), inventory[i].name);
            slot.appendChild(canvasIcon);
            slot.onclick = (() => { selectedItem = inventory[i]; currentVerb = 'USE'; updateVerbUI(); typewriterSetMessage(`USING: ${selectedItem.name}.`); updateInventoryUI(); })();
            container.appendChild(slot);
        }
    }
    
    // Verb coin bar
    const verbs = ['WALK', 'LOOK', 'TALK', 'TAKE', 'USE'];
    function buildVerbBar() {
        let container = document.getElementById('verbs');
        container.innerHTML = '';
        verbs.forEach(v => {
            let btn = document.createElement('div');
            btn.className = 'verb-btn' + (currentVerb === v ? ' active' : '');
            let iconCanvas = document.createElement('canvas');
            iconCanvas.width = 24; iconCanvas.height = 24;
            iconCanvas.classList.add('verb-icon');
            let icCtx = iconCanvas.getContext('2d');
            icCtx.fillStyle = PAL.black; icCtx.fillRect(0, 0, 24, 24);
            if (v === 'WALK') { icCtx.fillStyle = PAL.cyan; icCtx.fillRect(8, 12, 8, 8); icCtx.fillRect(12, 8, 4, 4); }
            else if (v === 'LOOK') { icCtx.fillStyle = PAL.green; icCtx.fillRect(6, 8, 12, 12); icCtx.fillStyle = PAL.white; icCtx.fillRect(10, 10, 4, 4); }
            else if (v === 'TALK') { icCtx.fillStyle = PAL.magenta; icCtx.fillRect(8, 10, 8, 8); for (let i = 0; i < 3; i++) icCtx.fillRect(4 + i * 4, 6, 2, 4); }
            else if (v === 'TAKE') { icCtx.fillStyle = PAL.amber; icCtx.fillRect(6, 12, 12, 6); icCtx.fillStyle = PAL.white; icCtx.fillRect(10, 8, 4, 6); }
            else if (v === 'USE') { icCtx.fillStyle = PAL.red; icCtx.fillRect(8, 8, 8, 12); icCtx.fillStyle = PAL.white; icCtx.fillRect(12, 6, 4, 4); }
            let label = document.createElement('span');
            label.className = 'verb-label';
            label.innerText = v;
            btn.appendChild(iconCanvas);
            btn.appendChild(label);
            btn.onclick = () => { setVerb(v); };
            container.appendChild(btn);
        });
    }
    function setVerb(v) { currentVerb = v; if (v !== 'USE') selectedItem = null; updateVerbUI(); updateInventoryUI(); }
    function updateVerbUI() { document.querySelectorAll('.verb-btn').forEach((btn, idx) => { if (verbs[idx] === currentVerb) btn.classList.add('active'); else btn.classList.remove('active'); }); }
    
    // Character portraits
    function drawPortrait(ctx, type) {
        ctx.fillStyle = PAL.black; ctx.fillRect(0, 0, 64, 64);
        ctx.fillStyle = PAL.darkgrey; ctx.fillRect(8, 16, 48, 40);
        if (type === 'replicant') { ctx.fillStyle = PAL.red; ctx.fillRect(20, 24, 24, 8); ctx.fillStyle = PAL.cyan; ctx.fillRect(28, 32, 8, 8); }
        else if (type === 'bryant') { ctx.fillStyle = PAL.amber; ctx.fillRect(20, 20, 24, 12); ctx.fillStyle = PAL.white; ctx.fillRect(28, 28, 8, 4); }
        else if (type === 'chess') { ctx.fillStyle = PAL.grey; ctx.fillRect(16, 28, 32, 12); ctx.fillStyle = PAL.white; ctx.fillRect(24, 20, 16, 8); }
        else if (type === 'leader') { ctx.fillStyle = PAL.magenta; ctx.fillRect(20, 24, 24, 8); ctx.fillStyle = PAL.cyan; ctx.fillRect(28, 36, 8, 8); }
        else if (type === 'infiltrator') { ctx.fillStyle = PAL.lightblue; ctx.fillRect(16, 24, 32, 10); ctx.fillStyle = PAL.red; ctx.fillRect(28, 36, 8, 8); }
        else { ctx.fillStyle = PAL.green; ctx.fillRect(24, 28, 16, 16); ctx.fillStyle = PAL.white; ctx.fillRect(28, 32, 8, 8); }
    }
    function showDialogWithPortrait(text, portraitType) {
        let modalDiv = document.getElementById('modal-content');
        modalDiv.innerHTML = '';
        let portraitCanvas = document.createElement('canvas');
        portraitCanvas.width = 64; portraitCanvas.height = 64;
        portraitCanvas.classList.add('portrait-canvas');
        drawPortrait(portraitCanvas.getContext('2d'), portraitType);
        let textDiv = document.createElement('div');
        textDiv.className = 'dialog-text';
        textDiv.innerText = text;
        modalDiv.appendChild(portraitCanvas);
        modalDiv.appendChild(textDiv);
        document.getElementById('modal').style.display = 'flex';
        dialogOpen = true;
    }
    
    // Hotspot outline
    function drawHotspotOutline(obj) {
        if (!obj) return;
        ctx.save();
        ctx.strokeStyle = PAL.white;
        ctx.setLineDash([3, 5]);
        ctx.lineWidth = 1.5;
        ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        ctx.restore();
    }
    
    // Custom cursor
    function updateCustomCursor(e) {
        let rect = canvas.getBoundingClientRect();
        let mouseX = e.clientX - rect.left;
        let mouseY = e.clientY - rect.top;
        let scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
        let canvasX = mouseX * scaleX, canvasY = mouseY * scaleY;
        let hit = getHitObject(canvasX, canvasY);
        let shape = "default";
        if (currentVerb === 'WALK') shape = "arrow";
        else if (currentVerb === 'LOOK') shape = "magnify";
        else if (currentVerb === 'TALK') shape = "talk";
        else if (currentVerb === 'TAKE') shape = "hand";
        else if (currentVerb === 'USE') shape = "cross";
        if (hit && (hit.targetRoom || hit.isNpc || hit.takeable)) shape = "interact";
        customCursor.style.display = 'block';
        customCursor.style.left = (e.clientX - 8) + 'px';
        customCursor.style.top = (e.clientY - 8) + 'px';
        let curCtx = customCursor.getContext('2d');
        curCtx.clearRect(0, 0, 16, 16);
        curCtx.fillStyle = PAL.white;
        if (shape === 'arrow') { curCtx.fillRect(4, 4, 2, 8); curCtx.fillRect(6, 6, 2, 6); }
        else if (shape === 'magnify') { curCtx.fillRect(6, 6, 8, 8); curCtx.fillRect(4, 4, 2, 2); }
        else if (shape === 'talk') { curCtx.fillRect(4, 4, 8, 6); curCtx.fillRect(6, 10, 4, 4); }
        else if (shape === 'hand') { curCtx.fillRect(4, 6, 8, 8); curCtx.fillRect(8, 4, 4, 4); }
        else { curCtx.fillRect(6, 4, 4, 8); curCtx.fillRect(4, 6, 8, 4); }
        hoveredObject = hit;
    }
    
    function getHitObject(x, y) {
        for (let obj of rooms[currentRoom].interactables)
            if (!obj.taken && !obj.retired && x > obj.x && x < obj.x + obj.w && y > obj.y && y < obj.y + obj.h) return obj;
        return null;
    }
    
    // Core game logic
    function switchRoom(newRoom) {
        if (!rooms[newRoom]) return;
        currentRoom = newRoom;
        player.x = rooms[currentRoom].playerEntry.x;
        player.y = rooms[currentRoom].playerEntry.y;
        player.target = null;
        document.getElementById('room-name').innerText = rooms[currentRoom].name;
        typewriterSetMessage(rooms[currentRoom].entryDesc);
    }
    
    function retireReplicant(obj) {
        if (obj.isReplicant && !obj.retired) {
            obj.retired = true;
            replicantsRetired++;
            updateReplicantDB();
            typewriterSetMessage(`REPLICANT RETIRED. ${replicantsRetired}/${TOTAL_REPLICANTS} ELIMINATED.`);
            if (replicantsRetired === TOTAL_REPLICANTS) {
                gameWon = true;
                setTimeout(() => document.getElementById('win-screen').style.display = 'flex', 500);
            }
            updateInventoryUI();
        }
    }
    
    function performVerb(verb, obj) {
        if (!obj) return;
        if (verb === 'LOOK') typewriterSetMessage(obj.lookText);
        else if (verb === 'TALK' && obj.isNpc) {
            let portrait = obj.portrait || "replicant";
            showDialogWithPortrait(obj.talkText, portrait);
            if (obj.id === 'street_replicant' && !obj.hasGivenKey && !obj.retired) {
                inventory.push({ name: 'KEYCARD' });
                obj.hasGivenKey = true;
                updateInventoryUI();
                typewriterSetMessage('REPLICANT GIVES YOU A KEYCARD.');
            }
            if (obj.id === 'chess_player' && !obj.hasGivenBlaster) {
                inventory.push({ name: 'BLASTER' });
                obj.hasGivenBlaster = true;
                updateInventoryUI();
                typewriterSetMessage('CHESS PLAYER GIVES YOU A BLASTER.');
            }
        }
        else if (verb === 'TAKE' && obj.takeable && !obj.taken) {
            obj.taken = true;
            inventory.push({ name: obj.name });
            updateInventoryUI();
            typewriterSetMessage(`TOOK ${obj.name}.`);
        }
        else if (verb === 'USE') {
            if (!selectedItem) { typewriterSetMessage("SELECT ITEM FIRST."); return; }
            if (selectedItem.name === 'PDA') { openPDA(); selectedItem = null; setVerb('WALK'); return; }
            if ((selectedItem.name === 'BLASTER' || selectedItem.name === 'EMP') && obj.isReplicant && !obj.retired) {
                retireReplicant(obj);
                selectedItem = null;
                setVerb('WALK');
                return;
            }
            if (obj.id === 'street_door' && selectedItem.name === 'KEYCARD') {
                typewriterSetMessage('KEYCARD ACCEPTED.');
                obj.locked = false;
                switchRoom('bradbury');
                selectedItem = null;
                setVerb('WALK');
                return;
            }
            if (obj.id === 'hidden_panel' && selectedItem.name === 'PDA') {
                let hasCode = pdaData.messages.some(m => m.text.includes('TYR-2049'));
                if (hasCode) {
                    obj.locked = false;
                    switchRoom('archives');
                    typewriterSetMessage('CODE ACCEPTED. ENTERING ARCHIVES.');
                } else typewriterSetMessage('NO CODE FOUND IN PDA MESSAGES.');
                selectedItem = null;
                setVerb('WALK');
                return;
            }
            if (obj.id === 'weapon_case' && selectedItem.name === 'ARCHIVE_KEY' && !obj.empGiven) {
                obj.empGiven = true;
                inventory.push({ name: 'EMP' });
                updateInventoryUI();
                typewriterSetMessage('EMP WEAPON ACQUIRED. CAN RETIRE ANY REPLICANT.');
                selectedItem = null;
                setVerb('WALK');
                return;
            }
            if (obj.id === 'archive_replicant' && selectedItem.name === 'BLASTER' && !obj.retired) {
                retireReplicant(obj);
                if (!obj.hasArchiveKey) {
                    inventory.push({ name: 'ARCHIVE_KEY' });
                    obj.hasArchiveKey = true;
                    window.archiveKeyObtained = true;
                    updateInventoryUI();
                    typewriterSetMessage('YOU OBTAIN THE ARCHIVE KEY. TAKE IT TO POLICE HQ WEAPON CASE.');
                }
                selectedItem = null;
                setVerb('WALK');
                return;
            }
            if (obj.id === 'vk_machine') {
                let alive = replicantDB.filter(r => !r.retired).length;
                typewriterSetMessage(`VOIGHT-KAMPFF SCAN: ${alive} REPLICANTS REMAINING.`);
                selectedItem = null;
                setVerb('WALK');
                return;
            }
            typewriterSetMessage(`NOTHING HAPPENS WITH ${selectedItem.name}.`);
            selectedItem = null;
            setVerb('WALK');
        }
        else typewriterSetMessage("CAN'T DO THAT.");
    }
    
    function handleCanvasClick(e) {
        if (dialogOpen || pdaOpen || gameWon) return;
        let rect = canvas.getBoundingClientRect();
        let scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
        let x = (e.clientX - rect.left) * scaleX;
        let y = (e.clientY - rect.top) * scaleY;
        let hit = getHitObject(x, y);
        if (currentVerb === 'WALK') {
            if (hit && hit.targetRoom) {
                let tr = getTargetRoom(hit);
                if (hit.locked && hit.requiresItem && inventory.some(i => i.name === hit.requiresItem)) hit.locked = false;
                if (!hit.locked && tr) switchRoom(tr);
                else typewriterSetMessage("LOCKED.");
                return;
            }
            let tx = x, ty = y;
            if (hit) { tx = hit.x + hit.w / 2; ty = hit.y + hit.h - 8; }
            player.target = { x: Math.max(12, Math.min(308, tx)), y: Math.max(158, Math.min(228, ty)) };
        } else {
            if (hit) performVerb(currentVerb, hit);
            else typewriterSetMessage("NOTHING THERE.");
        }
    }
    
    function drawPlayer() {
        let px = player.x, py = player.y;
        let bob = player.target ? Math.sin(player.walkAnim += 0.25) * 2 : 0;
        ctx.fillStyle = PAL.darkgrey;
        ctx.fillRect(px - 8, py - 26 + bob, 16, 24);
        ctx.fillStyle = PAL.white;
        ctx.beginPath();
        ctx.arc(px, py - 30 + bob, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = PAL.black;
        ctx.fillRect(px - 4, py - 33 + bob, 3, 3);
        ctx.fillRect(px + 1, py - 33 + bob, 3, 3);
        ctx.fillStyle = PAL.grey;
        ctx.fillRect(px - 6, py - 18 + bob, 12, 8);
    }
    
    function drawObject(ctx, obj) {
        if (obj.isNpc) {
            ctx.fillStyle = PAL.grey;
            ctx.fillRect(obj.x + 6, obj.y + 12, 26, 38);
            ctx.fillStyle = PAL.white;
            ctx.beginPath();
            ctx.arc(obj.x + 19, obj.y + 12, 8, 0, Math.PI * 2);
            ctx.fill();
            if (obj.isReplicant && !obj.retired) {
                ctx.fillStyle = PAL.red;
                ctx.fillRect(obj.x + 26, obj.y + 4, 6, 6);
            }
        } else {
            ctx.fillStyle = PAL.amber;
            ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
        }
    }
    
    function updateMovement() {
        if (!player.target) return;
        let dx = player.target.x - player.x;
        let dy = player.target.y - player.y;
        let dist = Math.hypot(dx, dy);
        if (dist > 3) {
            player.x += dx / dist * 3.5;
            player.y += dy / dist * 3.5;
        } else player.target = null;
    }
    
    // PDA functions
    function openPDA() {
        pdaOpen = true;
        document.getElementById('pda-modal').style.display = 'flex';
        renderPDATabs();
        showPDATab('info');
    }
    function closePDA() {
        pdaOpen = false;
        document.getElementById('pda-modal').style.display = 'none';
    }
    function renderPDATabs() {
        document.getElementById('pda-tabs').innerHTML = `
            <div class="pda-tab" onclick="showPDATab('info')">INFO</div>
            <div class="pda-tab" onclick="showPDATab('contacts')">CONTACTS</div>
            <div class="pda-tab" onclick="showPDATab('bank')">BANK</div>
            <div class="pda-tab" onclick="showPDATab('messages')">MESSAGES</div>
            <div class="pda-tab" onclick="showPDATab('database')">REP DATABASE</div>
        `;
    }
    window.showPDATab = function(tab) {
        let body = document.getElementById('pda-body');
        if (tab === 'info') body.innerHTML = `<pre style="font-size:18px;">${pdaData.info()}</pre>`;
        else if (tab === 'contacts') body.innerHTML = `<div>CONTACTS:</div><br>${pdaData.contacts.map(c => `• ${c.name} (${c.number})`).join('<br>')}`;
        else if (tab === 'bank') body.innerHTML = `<div style="font-size:28px;text-align:center;">BALANCE<br><span style="color:#ffff00;">$${pdaData.bank}</span></div>`;
        else if (tab === 'messages') body.innerHTML = `<div>INBOX:</div><br>${pdaData.messages.map(m => `<div style="border:2px solid #0f9;padding:4px;margin-bottom:8px;">FROM: ${m.from}<br>${m.text}</div>`).join('')}`;
        else if (tab === 'database') {
            let html = '<div>REPLICANT DATABASE</div><br>';
            replicantDB.forEach(r => { html += `• ${r.name} [${r.location}] - ${r.retired ? 'RETIRED' : 'ACTIVE'}<br>`; });
            body.innerHTML = html;
        }
    };
    
    // Animated title screen
    function animateTitle() {
        let tCanvas = document.getElementById('title-canvas');
        if (!tCanvas) return;
        let tCtx = tCanvas.getContext('2d');
        tCtx.fillStyle = PAL.black;
        tCtx.fillRect(0, 0, 320, 240);
        for (let i = 0; i < 20; i++) {
            tCtx.fillStyle = PAL.cyan;
            tCtx.fillRect(10 + i * 15, 180, 8, 40);
        }
        tCtx.fillStyle = PAL.magenta;
        tCtx.font = 'bold 28px VT323';
        tCtx.fillText("BLADE", 70, 80);
        tCtx.fillStyle = PAL.cyan;
        tCtx.fillText("RUNNER", 130, 120);
        let spinnerX = (Date.now() / 20) % 360;
        tCtx.fillStyle = PAL.amber;
        tCtx.fillRect(spinnerX, 160, 32, 8);
        requestAnimationFrame(animateTitle);
    }
    
    // Main game loop
    let animFrame;
    function gameLoop() {
        if (gameWon && document.getElementById('win-screen').style.display !== 'flex') return;
        ctx.clearRect(0, 0, 320, 240);
        rooms[currentRoom].drawBackground(ctx);
        for (let obj of rooms[currentRoom].interactables) {
            if (!obj.taken && !obj.retired) drawObject(ctx, obj);
        }
        if (hoveredObject && !hoveredObject.taken && !hoveredObject.retired) drawHotspotOutline(hoveredObject);
        updateMovement();
        drawPlayer();
        updateSpinners();
        updateTypewriter();
        animFrame = requestAnimationFrame(gameLoop);
    }
    
    // Initialization
    function init() {
        canvas = document.getElementById('canvas');
        ctx = canvas.getContext('2d');
        msgDiv = document.getElementById('message');
        buildVerbBar();
        updateInventoryUI();
        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('mousemove', updateCustomCursor);
        document.getElementById('modal-button').onclick = () => {
            document.getElementById('modal').style.display = 'none';
            dialogOpen = false;
        };
        document.getElementById('pda-close').onclick = closePDA;
        document.getElementById('start-button').onclick = () => {
            // Reset game state
            document.getElementById('title-screen').style.display = 'none';
            initParticles();
            // Reset globals
            gameWon = false;
            replicantsRetired = 0;
            inventory = [{ name: 'PDA', short: 'PDA' }];
            selectedItem = null;
            currentRoom = 'street';
            player = { x: 60, y: 200, target: null, facing: 'right', walkAnim: 0 };
            flyingSpinners = [];
            window.archiveKeyObtained = false;
            // Reset all interactables
            for (let rn in rooms) {
                for (let obj of rooms[rn].interactables) {
                    if (obj.taken !== undefined) obj.taken = false;
                    if (obj.retired !== undefined) obj.retired = false;
                    if (obj.hasGivenKey !== undefined) obj.hasGivenKey = false;
                    if (obj.hasGivenBlaster !== undefined) obj.hasGivenBlaster = false;
                    if (obj.hasArchiveKey !== undefined) obj.hasArchiveKey = false;
                    if (obj.empGiven !== undefined) obj.empGiven = false;
                    if (obj.locked !== undefined && obj.requiresItem) obj.locked = true;
                }
            }
            replicantDB.forEach(r => r.retired = false);
            updateInventoryUI();
            setVerb('WALK');
            typewriterSetMessage("2049 • LOCATE AND RETIRE 5 REPLICANTS. TALK TO GAIN KEYCARD AND BLASTER.");
            if (animFrame) cancelAnimationFrame(animFrame);
            gameLoop();
        };
        animateTitle();
    }
    
    window.onload = init;
</script>
</body>
</html>
