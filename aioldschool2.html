<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD SCHOOL 86 — Ridgewood 1985</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --phosphor: #b380ff;
            --phosphor-dim: #5a2e8a;
            --phosphor-glow: #d4aaff;
            --phosphor-bright: #e0c0ff;
            --text-shadow: 0 0 8px rgba(179, 128, 255, 0.55), 0 0 18px rgba(179, 128, 255, 0.25);
            --text-shadow-bright: 0 0 12px rgba(179, 128, 255, 0.85), 0 0 28px rgba(179, 128, 255, 0.45);
            --hover-bg: rgba(179, 128, 255, 0.14);
            --card-bg: rgba(20, 10, 40, 0.65);
            --accent-warm: #ffb044;
            --accent-warm-glow: #ffcc80;
            --danger: #ff5555;
            --danger-glow: rgba(255, 85, 85, 0.5);
            --success: #5f5;
            --success-glow: rgba(85, 255, 85, 0.4);
            --dim-text: #7a6a9a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            background-image: radial-gradient(ellipse at center, #1a0f20 0%, #050505 70%),
                repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 2px, transparent 2px, transparent 4px);
            padding: 16px;
            user-select: none;
        }
        .monitor {
            background: #1c1c1c;
            border-radius: 18px;
            padding: 26px 22px 20px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8), 0 0 0 3px #2a2a2a, 0 0 0 7px #1a1a1a, 0 0 0 10px #111, 0 8px 40px rgba(0, 0, 0, 0.7), 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 980px;
            width: 100%;
        }
        .screen {
            background: #0b0b0b;
            border-radius: 8px;
            padding: 16px 14px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.9);
            border: 2px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            min-height: 620px;
            max-height: 92vh;
        }
        .scanlines,
        .screen-flicker,
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            border-radius: 8px;
            z-index: 1;
        }
        .scanlines {
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0, 0, 0, 0.07) 3px, rgba(0, 0, 0, 0.07) 4px);
            z-index: 10;
        }
        .screen-flicker {
            z-index: 9;
            animation: flicker 0.15s infinite;
            opacity: 0.025;
            background: #fff;
        }
        .vignette {
            z-index: 8;
            box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.65);
        }
        @keyframes flicker {
            0% {
                opacity: 0.02;
            }
            5% {
                opacity: 0.04;
            }
            10% {
                opacity: 0.01;
            }
            15% {
                opacity: 0.05;
            }
            20% {
                opacity: 0.02;
            }
            50% {
                opacity: 0.03;
            }
            70% {
                opacity: 0.01;
            }
            80% {
                opacity: 0.04;
            }
            90% {
                opacity: 0.02;
            }
            100% {
                opacity: 0.03;
            }
        }
        .title-bar {
            text-align: center;
            padding: 6px 0 4px;
            color: var(--phosphor-glow);
            font-size: 13px;
            letter-spacing: 2px;
            text-shadow: var(--text-shadow-bright);
            position: relative;
            z-index: 12;
            line-height: 1.7;
            border-bottom: 1px solid rgba(179, 128, 255, 0.2);
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title-bar .game-title {
            font-size: 17px;
            letter-spacing: 3px;
        }
        .title-bar .version-tag {
            font-size: 8px;
            color: var(--dim-text);
            letter-spacing: 1px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            background: rgba(15, 5, 25, 0.7);
            border: 1px solid rgba(179, 128, 255, 0.15);
            border-radius: 3px;
            font-size: 8px;
            gap: 8px;
            flex-wrap: wrap;
            position: relative;
            z-index: 12;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .status-item {
            white-space: nowrap;
            color: var(--phosphor);
            text-shadow: var(--text-shadow);
        }
        .status-label {
            color: var(--dim-text);
            font-size: 7px;
        }
        .status-val {
            color: var(--phosphor-glow);
            font-weight: bold;
            text-shadow: var(--text-shadow-bright);
        }
        .energy-dots {
            color: var(--accent-warm);
            letter-spacing: 1px;
            text-shadow: 0 0 6px rgba(255, 176, 68, 0.5);
        }
        .main-area {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
            z-index: 12;
            min-height: 0;
        }
        .left-panel {
            width: 150px;
            min-width: 150px;
            border-right: 1px solid rgba(179, 128, 255, 0.2);
            display: flex;
            flex-direction: column;
            background: rgba(10, 5, 20, 0.5);
            overflow-y: auto;
        }
        .app-btn {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(179, 128, 255, 0.12);
            color: var(--phosphor);
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 8px 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.5px;
            text-shadow: var(--text-shadow);
        }
        .app-btn:hover {
            background: var(--hover-bg);
            color: var(--phosphor-glow);
        }
        .app-btn.active {
            background: rgba(40, 15, 70, 0.7);
            color: var(--phosphor-glow);
            font-weight: bold;
            border-left: 3px solid var(--phosphor-glow);
            box-shadow: inset 0 0 10px rgba(179, 128, 255, 0.2);
            text-shadow: var(--text-shadow-bright);
        }
        .app-btn .icon {
            font-size: 11px;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent;
            min-width: 0;
            overflow: hidden;
        }
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 8px;
            border-bottom: 1px solid rgba(179, 128, 255, 0.2);
            background: rgba(15, 5, 25, 0.5);
            font-size: 9px;
            font-weight: bold;
            color: var(--phosphor-glow);
            text-shadow: var(--text-shadow-bright);
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            font-size: 9px;
            line-height: 2;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--phosphor);
            text-shadow: var(--text-shadow);
            letter-spacing: 0.4px;
            scroll-behavior: smooth;
        }
        .content-body a {
            color: var(--phosphor-glow);
            cursor: pointer;
            text-decoration: underline;
            text-shadow: var(--text-shadow-bright);
        }
        .content-body em {
            color: var(--dim-text);
            font-style: italic;
        }
        .bottom-bar {
            display: flex;
            gap: 5px;
            padding: 5px 8px;
            border-top: 1px solid rgba(179, 128, 255, 0.2);
            background: rgba(15, 5, 25, 0.5);
            flex-wrap: wrap;
            align-items: center;
            flex-shrink: 0;
        }
        .action-btn {
            background: #1a0a2e;
            border: 1px solid rgba(179, 128, 255, 0.4);
            color: var(--phosphor);
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            padding: 6px 10px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            letter-spacing: 0.5px;
            text-shadow: var(--text-shadow);
            border-radius: 2px;
        }
        .action-btn:hover {
            background: #2a1550;
            border-color: var(--phosphor-glow);
            color: var(--phosphor-glow);
            box-shadow: 0 0 10px rgba(179, 128, 255, 0.3);
        }
        .action-btn.primary {
            border-color: var(--phosphor-glow);
            color: var(--phosphor-glow);
            text-shadow: var(--text-shadow-bright);
            box-shadow: 0 0 8px rgba(179, 128, 255, 0.3);
        }
        .action-btn.primary:hover {
            box-shadow: 0 0 18px rgba(179, 128, 255, 0.55);
        }
        .action-btn.danger {
            border-color: var(--danger);
            color: var(--danger);
            text-shadow: 0 0 6px var(--danger-glow);
        }
        .action-btn.danger:hover {
            box-shadow: 0 0 14px var(--danger-glow);
        }
        .action-btn.back-btn {
            border-color: var(--accent-warm);
            color: var(--accent-warm);
            text-shadow: 0 0 6px rgba(255, 176, 68, 0.4);
        }
        .action-btn.back-btn:hover {
            box-shadow: 0 0 10px rgba(255, 176, 68, 0.4);
        }
        input,
        textarea,
        select {
            background: #0a0a0a;
            border: 1px solid rgba(179, 128, 255, 0.35);
            color: var(--phosphor);
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 6px 8px;
            resize: vertical;
            letter-spacing: 0.5px;
            text-shadow: var(--text-shadow);
            border-radius: 2px;
            caret-color: var(--phosphor-glow);
        }
        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--phosphor-glow);
            outline: none;
            box-shadow: 0 0 10px rgba(179, 128, 255, 0.25), inset 0 0 8px rgba(179, 128, 255, 0.04);
        }
        textarea {
            width: 100%;
            min-height: 45px;
        }
        select option {
            background: #0a0a0a;
            color: var(--phosphor);
        }
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 7px;
            border-bottom: 1px dotted rgba(179, 128, 255, 0.15);
            cursor: pointer;
            font-size: 8px;
            gap: 6px;
            transition: all 0.1s;
            letter-spacing: 0.4px;
        }
        .list-item:hover {
            background: var(--hover-bg);
            color: var(--phosphor-glow);
        }
        .list-item.selected {
            background: rgba(40, 15, 70, 0.7);
            color: #fff;
            text-shadow: var(--text-shadow-bright);
        }
        .badge {
            color: var(--accent-warm);
            font-weight: bold;
            font-size: 9px;
            text-shadow: 0 0 8px rgba(255, 176, 68, 0.6);
            animation: badgePulse 1.5s infinite;
        }
        @keyframes badgePulse {
            50% {
                opacity: 0.5;
            }
        }
        .loading {
            color: var(--accent-warm);
            animation: blink 1s infinite;
            text-shadow: 0 0 8px rgba(255, 176, 68, 0.5);
        }
        @keyframes blink {
            50% {
                opacity: 0.35;
            }
        }
        .error-msg {
            color: var(--danger);
            text-shadow: 0 0 6px var(--danger-glow);
        }
        .success-msg {
            color: var(--success);
            text-shadow: 0 0 6px var(--success-glow);
        }
        .login-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.93);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            z-index: 100;
            padding: 20px;
            border-radius: 8px;
        }
        .login-overlay h1 {
            font-size: 22px;
            color: var(--phosphor-glow);
            text-shadow: var(--text-shadow-bright), 0 0 30px rgba(179, 128, 255, 0.5);
            margin: 0;
            letter-spacing: 3px;
        }
        .login-overlay .subtitle {
            font-size: 10px;
            color: var(--dim-text);
            letter-spacing: 2px;
            text-shadow: var(--text-shadow);
        }
        .login-overlay input {
            width: 260px;
            text-align: center;
            font-size: 9px;
            padding: 8px 12px;
        }
        .login-overlay button {
            background: #1a0a2e;
            border: 2px solid var(--phosphor-glow);
            color: var(--phosphor-glow);
            font-weight: bold;
            padding: 10px 24px;
            font-size: 10px;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            letter-spacing: 1px;
            text-shadow: var(--text-shadow-bright);
            border-radius: 3px;
            transition: all 0.2s;
            box-shadow: 0 0 12px rgba(179, 128, 255, 0.3);
        }
        .login-overlay button:hover {
            background: #2a1550;
            border-color: var(--phosphor-bright);
            box-shadow: 0 0 22px rgba(179, 128, 255, 0.55);
        }
        .key-row {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 7px;
            color: var(--dim-text);
            flex-wrap: wrap;
            justify-content: center;
        }
        .key-row input {
            width: 180px;
            font-size: 7px;
            padding: 5px 7px;
            text-align: left;
        }
        .key-row button {
            font-size: 7px;
            padding: 5px 8px;
            border-width: 1px;
        }
        .key-dot {
            font-size: 14px;
        }
        .key-dot.set {
            color: var(--success);
            text-shadow: 0 0 6px var(--success-glow);
        }
        .key-dot.unset {
            color: var(--danger);
            text-shadow: 0 0 6px var(--danger-glow);
        }
        .hidden {
            display: none !important;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a1550;
            border-radius: 2px;
        }
        .npc-card {
            border: 1px solid rgba(179, 128, 255, 0.25);
            padding: 7px;
            margin: 3px 0;
            background: var(--card-bg);
            border-radius: 2px;
            font-size: 8px;
            line-height: 1.8;
            letter-spacing: 0.4px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .npc-card:hover {
            border-color: var(--phosphor-glow);
            box-shadow: 0 0 8px rgba(179, 128, 255, 0.2);
        }
        .npc-card .name {
            color: var(--phosphor-glow);
            font-weight: bold;
            text-shadow: var(--text-shadow-bright);
        }
        .map-location {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            border-bottom: 1px dotted rgba(179, 128, 255, 0.15);
            cursor: pointer;
            font-size: 8px;
            letter-spacing: 0.4px;
            transition: all 0.15s;
            border-radius: 2px;
        }
        .map-location:hover {
            background: var(--hover-bg);
            color: var(--phosphor-glow);
        }
        .map-location .loc-name {
            color: var(--phosphor-glow);
            font-weight: bold;
            text-shadow: var(--text-shadow);
        }
        .map-location .loc-npcs {
            font-size: 7px;
            color: var(--dim-text);
        }
        .monitor-brand {
            text-align: center;
            font-size: 9px;
            color: #2a2a2a;
            letter-spacing: 3px;
            padding-top: 5px;
            position: relative;
            z-index: 12;
        }
        .power-led {
            display: inline-block;
            width: 5px;
            height: 5px;
            background: #b380ff;
            border-radius: 50%;
            margin-right: 5px;
            box-shadow: 0 0 8px #b380ff;
            animation: led-pulse 2s infinite;
            vertical-align: middle;
        }
        @keyframes led-pulse {
            0%,
            100% {
                box-shadow: 0 0 8px #b380ff;
            }
            50% {
                box-shadow: 0 0 14px #b380ff;
            }
        }
        @media (max-width: 800px) {
            .monitor {
                padding: 14px 10px 10px;
            }
            .screen {
                padding: 10px 6px;
                min-height: 500px;
            }
            .left-panel {
                width: 110px;
                min-width: 110px;
            }
            .app-btn {
                font-size: 6px;
                padding: 6px 5px;
                gap: 3px;
            }
            .app-btn .icon {
                font-size: 9px;
                width: 16px;
            }
            .content-body {
                font-size: 7px;
                line-height: 1.7;
            }
            .action-btn {
                font-size: 6px;
                padding: 4px 7px;
            }
            .title-bar .game-title {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="monitor">
        <div class="screen" id="screen">
            <div class="scanlines"></div>
            <div class="screen-flicker"></div>
            <div class="vignette"></div>

            <div class="title-bar">
                <span class="game-title">💾 OLD SCHOOL 86</span>
                <span class="version-tag">RIDGEWOOD v1.7</span>
            </div>

            <div class="status-bar" id="statusBar">
                <span class="status-item"><span class="status-label">📅</span> <span class="status-val"
                        id="sbDay">Monday, Oct 2 1985</span></span>
                <span class="status-item"><span class="status-label">🕐</span> <span class="status-val" id="sbTime">8:00
                        AM</span></span>
                <span class="status-item"><span class="status-label">📍</span> <span class="status-val"
                        id="sbLocation">Your House</span></span>
                <span class="status-item"><span class="status-label">⚡</span> <span class="energy-dots"
                        id="sbEnergy">★★★★★</span></span>
                <span class="status-item"><span class="status-label">⭐</span> <span class="status-val"
                        id="sbRep">5.0</span></span>
            </div>

            <div class="main-area">
                <div class="left-panel" id="leftPanel">
                    <button class="app-btn active" data-app="map"><span class="icon">🗺️</span>Map</button>
                    <button class="app-btn" data-app="bbs"><span class="icon">📟</span>BBS</button>
                    <button class="app-btn" data-app="journal"><span class="icon">📝</span>Journal</button>
                    <button class="app-btn" data-app="tapes"><span class="icon">📼</span>Tapes</button>
                    <button class="app-btn" data-app="floppies"><span class="icon">💾</span>Floppies</button>
                    <button class="app-btn" data-app="phone"><span class="icon">📞</span>Phone</button>
                    <button class="app-btn" data-app="yearbook"><span class="icon">👥</span>Yearbook</button>
                    <button class="app-btn" data-app="calendar"><span class="icon">📅</span>Calendar</button>
                </div>
                <div class="right-panel">
                    <div class="content-header" id="contentHeader">🗺️ Map — Ridgewood</div>
                    <div class="content-body" id="contentBody">Loading...</div>
                    <div class="bottom-bar" id="bottomBar"></div>
                </div>
            </div>

            <div class="login-overlay" id="loginOverlay">
                <form id="loginForm"
                style="display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;">
                <h1>OLD SCHOOL 86</h1>
                <div class="subtitle">RIDGEWOOD · 1985-86</div>
                <p style="color:#b380ff;font-size:9px;letter-spacing:1px;text-shadow:var(--text-shadow);">Enter your
                    name to start your story</p>
                <input type="text" id="loginNameInput" placeholder="Your first name" maxlength="20"
                autocomplete="off">
                <input type="password" id="loginPassInput" placeholder="Password (new players: choose one)"
                autocomplete="new-password">
                <div class="key-row">
                    <span>🔑 Mistral API Key:</span>
                    <input type="password" id="loginKeyInput" placeholder="Paste your key" autocomplete="off">
                    <button type="button" id="loginSaveKeyBtn" style="font-size:7px;padding:5px 8px;">Save
                    Key</button>
                    <span id="loginKeyDot" class="key-dot unset">●</span>
                </div>
                <button type="button" id="loginBtn">▶ START GAME</button>
                <div id="loginError"
                style="color:#ff5555;font-size:8px;text-shadow:0 0 6px rgba(255,85,85,0.5);"></div>
            </form>
        </div>
    </div>
    <div class="monitor-brand">
        <span class="power-led"></span> PROWLER DATA-TERMINAL 87
    </div>
</div>

<script>
    (function() {
        // ──────────────────────────────────────
        // DOM REFERENCES
        // ──────────────────────────────────────
        const contentHeader = document.getElementById('contentHeader');
        const contentBody = document.getElementById('contentBody');
        const bottomBar = document.getElementById('bottomBar');
        const loginOverlay = document.getElementById('loginOverlay');
        const loginError = document.getElementById('loginError');
        const appBtns = document.querySelectorAll('.app-btn');
        const sbDay = document.getElementById('sbDay');
        const sbTime = document.getElementById('sbTime');
        const sbLocation = document.getElementById('sbLocation');
        const sbEnergy = document.getElementById('sbEnergy');
        const sbRep = document.getElementById('sbRep');
        const loginKeyInput = document.getElementById('loginKeyInput');
        const loginKeyDot = document.getElementById('loginKeyDot');

        // ──────────────────────────────────────
        // CONSTANTS
        // ──────────────────────────────────────
        const STORAGE_KEY = 'oldschool86_save_v4';
        const LOCATIONS = ['Your House', 'Ridgewood High School', 'The Arcade', 'The Mall', 'Downtown', 'The Park',
            'Ridgewood Lake', "Bob's Video", 'The Record Store'
        ];
        const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const MONTHS = ['Sep', 'Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];

        // ──────────────────────────────────────
        // GLOBAL STATE
        // ──────────────────────────────────────
        let mistralKey = localStorage.getItem('oldschool86_key') || '';
        let currentApp = 'map';
        let selectedBoard = null;
        let selectedConv = null;
        let selectedPostId = null;
        let typingTimeout = null;
        let audioCtx = null;

        let G = {

            clock: { dayIdx: 1, monthIdx: 1, dayOfMonth: 2, year: 1985, hour: 8, minute: 0 },
            students: [],
            townies: [],
            teachers: [],
            conversations: [],
            boards: { general: [], personals: [], classifieds: [], confessions: [], events: [] },

        // ──────────────────────────────────────
        // AUDIO HELPERS
        // ──────────────────────────────────────
        function initAudio() {
            if (!audioCtx) {
                try { audioCtx = new(window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTickSound() {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.value = 500 + Math.random() * 500;
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.025);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.025);
            } catch (e) { /* ignore audio errors */ }
        }

        function clearTyping() {
            if (typingTimeout) { clearTimeout(typingTimeout);
                typingTimeout = null; }
        }

        async function typeToBody(text) {
            clearTyping();
            contentBody.innerHTML = '';
            const span = document.createElement('span');
            contentBody.appendChild(span);
            return new Promise((resolve) => {
                let i = 0;

                function typeChar() {
                    if (i < text.length) {
                        span.textContent += text.charAt(i);
                        playTickSound();
                        i++;
                        contentBody.scrollTop = contentBody.scrollHeight;
                        typingTimeout = setTimeout(typeChar, 22 + Math.random() * 12);
                    } else {
                        resolve();
                    }
                }
                typeChar();
            });
        }

        // ──────────────────────────────────────
        // TIME & STATE HELPERS
        // ──────────────────────────────────────
        function getClockStr() {
            const c = G.clock;
            const h = c.hour;
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            const m = c.minute.toString().padStart(2, '0');
            return `${DAYS[c.dayIdx]}, ${MONTHS[c.monthIdx]} ${c.dayOfMonth} ${c.year} | ${h12}:${m} ${ampm}`;
        }

        function getTimeStr() {
            const c = G.clock;
            const h = c.hour;
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            const m = c.minute.toString().padStart(2, '0');
            return `${h12}:${m} ${ampm}`;
        }

        function advanceTime(mins) {
            G.clock.minute += mins;
            while (G.clock.minute >= 60) { G.clock.minute -= 60;
                G.clock.hour++; }
            while (G.clock.hour >= 24) {
                G.clock.hour -= 24;
                G.clock.dayIdx++;
                G.clock.dayOfMonth++;
                if (G.clock.dayIdx >= 7) G.clock.dayIdx = 0;
                if (G.clock.dayOfMonth > 30) { G.clock.dayOfMonth = 1;
                    G.clock.monthIdx++; }
                if (G.clock.monthIdx >= MONTHS.length) { G.clock.monthIdx = 0;
                    G.clock.year++; }
            }
            if (G.player) G.player.energy = Math.max(0, G.player.energy - Math.floor(mins / 30));
            updateStatusBar();
        }

        function updateStatusBar() {
            if (!G.player) return;
            sbDay.textContent =
                `${DAYS[G.clock.dayIdx]}, ${MONTHS[G.clock.monthIdx]} ${G.clock.dayOfMonth} ${G.clock.year}`;
            sbTime.textContent = getTimeStr();
            sbLocation.textContent = G.player.location || 'Unknown';
            const e = Math.min(Math.max(Math.floor(G.player.energy || 0), 0), 10);
            const stars = ['☆☆☆☆☆', '★☆☆☆☆', '★★☆☆☆', '★★★☆☆', '★★★★☆', '★★★★★', '★★★★★', '★★★★★', '★★★★★', '★★★★★',
                '★★★★★'
            ];
            sbEnergy.textContent = stars[e];
            sbEnergy.style.color = e <= 2 ? '#ff5555' : e <= 4 ? '#ffb044' : '#ffcc80';
            sbEnergy.style.textShadow = e <= 2 ? '0 0 8px rgba(255,85,85,0.6)' : e <= 4 ?
                '0 0 8px rgba(255,176,68,0.5)' : '0 0 8px rgba(255,204,128,0.5)';
            sbRep.textContent = ((G.player.reputation && G.player.reputation.overall) || 5).toFixed(1);
        }

                    if (!G.boards) G.boards = { general: [], personals: [], classifieds: [], confessions: [],
                        events: [] };
                    if (!G.notes) G.notes = [];
                    if (!G.events) G.events = [];
                    if (!G.lore) G.lore = [];
                    if (!G.feuds) G.feuds = [];
                    if (!G.townies) G.townies = [];
                    if (!G.teachers) G.teachers = [];
                    if (!G.students) G.students = [];
                    if (!G.conversations) G.conversations = [];
                    if (!G.clock) G.clock = { dayIdx: 1, monthIdx: 1, dayOfMonth: 2, year: 1985, hour: 8, minute: 0 };
                    if (!G.sessions) G.sessions = 0;
                    return true;
                } catch (e) {
                    console.warn('Load corrupted:', e);
                    return false;
                }
            }
            return false;

                metalheads: 5, punks: 5, goths: 5, newWavers: 5, artKids: 5, loners: 5, populars: 5 };
            if (!G.player.inventory) G.player.inventory = [];

        // ──────────────────────────────────────
        // ROBUST JSON PARSER
        // ──────────────────────────────────────
        function safeParseJSON(raw) {
            if (typeof raw !== 'string') return null;
            let str = raw.replace(/```json|```/g, '').trim();
            str = str.replace(/,(\s*[}\]])/g, '$1');
            let start = str.indexOf('{');
            let end = str.lastIndexOf('}');
            if (start === -1 || end === -1) return null;
            str = str.substring(start, end + 1);
            try { return JSON.parse(str); } catch (e) {}
            let fixed = str.replace(/(?<!\\)\n/g, '\\n').replace(/(?<!\\)\r/g, '').replace(/(?<!\\)\t/g, '\\t');
            try { return JSON.parse(fixed); } catch (e2) {}
            let singleQuoteFix = fixed.replace(/'/g, '"');
            try { return JSON.parse(singleQuoteFix); } catch (e3) {}
            let appended = str + '}';
            try { return JSON.parse(appended); } catch (e4) {}
            return null;
        }

        // ──────────────────────────────────────
        // RELIABLE API CALL (with timeout)
        // ──────────────────────────────────────
        const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
        const MODEL = 'mistral-small-latest';

        async function mistralChat(msgs, maxTok = 500, timeoutMs = 30000) {
            if (!mistralKey) throw new Error('API key missing');
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const res = await fetch(MISTRAL_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + mistralKey },
                    body: JSON.stringify({ model: MODEL, messages: msgs, temperature: 0.9, max_tokens: maxTok }),
                    signal: controller.signal
                });
                if (!res.ok) {
                    const errText = await res.text();
                    if (res.status === 401) throw new Error('Invalid API key.');
                    if (res.status === 429) throw new Error('Rate limited. Try again shortly.');
                    throw new Error(`API error ${res.status}: ${errText}`);
                }
                const data = await res.json();
                return data.choices[0].message.content.trim();
            } catch (e) {
                if (e.name === 'AbortError') throw new Error('Request timed out. Please try again.');
                throw e;
            } finally { clearTimeout(timeout); }
        }

        async function callAI(systemPrompt, userMessage, opts = {}) {
            return await mistralChat(
                [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMessage }],
                opts.maxTokens || 500,
                30000
            );
        }

        // ──────────────────────────────────────
        // NPC HELPERS
        // ──────────────────────────────────────
        function getNPCsAtLocation(loc) {
            return [...G.students, ...G.townies, ...G.teachers].filter(n =>
                n.location === loc && n.handle !== (G.player && G.player.handle || '')
            );
        }

        function getNPCByHandle(h) {
            return [...G.students, ...G.townies, ...G.teachers].find(n =>
                n.handle.toLowerCase() === h.toLowerCase()
            );
        }

        function getConvWith(h) {
            let c = G.conversations.find(c => c.with.toLowerCase() === h.toLowerCase());
            if (!c) { c = { with: h, messages: [] };
                G.conversations.push(c); }
            return c;
        }

        function convHasUnread(c) {
            return c.messages.some(m => m.from !== (G.player && G.player.handle) && !m.read);
        }

        function getRecentNotesForNPC(npcHandle) {
            return G.notes.filter(n =>
                n.from === (G.player && G.player.handle) && n.to === npcHandle
            ).slice(-3);
        }

        // BBS STATE MANAGEMENT (FIXED)

        function clearBBSState() {
            selectedBoard = null;
            selectedConv = null;
            selectedPostId = null;
        }

        function refreshBBS() {
            renderCurrentApp();

        // RENDER CURRENT APP
        // ──────────────────────────────────────
        function renderCurrentApp() {
            renderApp(currentApp);
            updateBottomBar(currentApp);
            const headers = {
                map: '🗺️ Map — Ridgewood',
                bbs: '📟 HEARTLINE BBS — Node 1',
                journal: '📝 Journal & Notes',
                tapes: '📼 Mixtape Collection',
                floppies: '💾 Floppy Disk Library',
                phone: '📞 Phone Book',
                yearbook: '👥 Yearbook',
                calendar: '📅 Calendar & Events'
            };

            appBtns.forEach(b => b.classList.remove('active'));
            const btn = document.querySelector(`.app-btn[data-app="${currentApp}"]`);
            if (btn) btn.classList.add('active');
        }

        // ──────────────────────────────────────
        // APP SWITCHING (FIXED)
        // ──────────────────────────────────────
        function switchApp(app) {
            if (app === currentApp) {
                // Re-selecting the same app: reset BBS state if on BBS, then re-render
                if (app === 'bbs') {
                    clearBBSState();
                }
                clearTyping();
                renderCurrentApp();
                return;
            }
            // Switching to a different app: clear BBS state if leaving BBS
            if (currentApp === 'bbs') {
                clearBBSState();
            }
            currentApp = app;
            clearTyping();
            renderCurrentApp();
        }

        function renderApp(app) {
            if (!G.player) { contentBody.innerHTML = '<em>Not logged in.</em>'; return; }
            switch (app) {
                case 'map':
                    renderMap();
                    break;
                case 'bbs':
                    renderBBS();
                    break;
                case 'journal':
                    renderJournal();
                    break;
                case 'tapes':
                    renderTapes();
                    break;
                case 'floppies':
                    renderFloppies();
                    break;
                case 'phone':
                    renderPhone();
                    break;
                case 'yearbook':
                    renderYearbook();
                    break;
                case 'calendar':
                    renderCalendar();
                    break;
            }
        }

        function updateBottomBar(app) {
            bottomBar.innerHTML = '';
            const add = (txt, id, cls, fn) => {
                const b = document.createElement('button');
                b.className = 'action-btn' + (cls ? ' ' + cls : '');
                b.textContent = txt;
                b.id = id;
                b.addEventListener('click', fn);
                bottomBar.appendChild(b);
            };
            if (app === 'map') {
                add('🚶 Travel', 'btnTravel', 'primary', showTravelDialog);
                add('👀 Look', 'btnLook', '', doLookAround);
                add('💬 Talk', 'btnTalk', '', showTalkDialog);
                add('🎬 Action', 'btnAction', 'primary', showFreeActionDialog);
                add('⏭ Skip', 'btnSkip', 'danger', doSkipClass);
                add('😴 Sleep', 'btnSleep', '', doSleep);
            } else if (app === 'bbs') {
                add('🔄 Refresh', 'btnRefresh', 'primary', fetchBatchContent);
                add('✉ New Post', 'btnNewPost', '', showComposePost);
                if (selectedBoard || selectedConv || selectedPostId) {
                    add('← Back', 'btnBBSBack', 'back-btn', () => {
                        clearBBSState();
                        refreshBBS();
                    });
                }
            } else if (app === 'journal') {
                add('✍️ New Entry', 'btnNewEntry', '', showJournalCompose);
                add('📝 Pass Note', 'btnPassNote', '', showPassNoteDialog);
            } else if (app === 'tapes') {
                add('🎵 Create', 'btnCreateTape', 'primary', createMixtape);
            } else if (app === 'floppies') {
                add('ℹ️ Info', 'btnInfo', '', () => {
                    contentBody.innerHTML =
                        '<em>Floppy disks can be found by trading with NPCs or during events. Use <b>Free Action</b> on the Map to trade items.</em>';
                });
            } else if (app === 'phone') {
                add('📞 Call', 'btnCall', 'primary', showCallDialog);

                add('🔍 Search', 'btnSearch', '', showYearbookSearch);
            }

        // ──────────────────────────────────────
        // MAP
        // ──────────────────────────────────────
        function renderMap() {
            let html =
                `<div style="font-size:10px;margin-bottom:8px;color:var(--phosphor-glow);text-shadow:var(--text-shadow-bright);">📍 <strong>Current:</strong> ${G.player.location}</div>`;
            html += '<div style="display:grid;gap:1px;">';
            LOCATIONS.forEach(loc => {
                const npcs = getNPCsAtLocation(loc);
                const isHere = G.player.location === loc;
                // No escaping needed: loc is in double-quoted HTML attribute, single quotes are safe
                html +=
                    `<div class="map-location" data-loc="${loc.replace(/"/g, '&quot;')}" style="${isHere?'border:1px solid var(--phosphor-glow);background:rgba(40,15,70,0.6);box-shadow:0 0 8px rgba(179,128,255,0.25);':''}"><span class="loc-name">${isHere?'▶ ':''}${loc}</span><span class="loc-npcs">${npcs.length?npcs.map(n=>n.handle).join(', '):'empty'}</span></div>`;
            });
            html +=
                '<div style="margin-top:8px;font-size:7px;color:var(--dim-text);">Click a location then press <b>Travel</b>.</div>';
            contentBody.innerHTML = html;
            document.querySelectorAll('.map-location').forEach(el => {
                el.addEventListener('click', function() {
                    const loc = this.dataset.loc;
                    if (loc && loc !== G.player.location) doTravel(loc);
                });
            });
        }

        async function doTravel(destination) {
            if (!destination || destination === G.player.location) return;
            contentBody.innerHTML = '<span class="loading">Travelling…</span>';
            initAudio();
            advanceTime(5 + Math.floor(Math.random() * 15));
            G.player.location = destination;
            save();
            updateStatusBar();
            await describeArrival(destination);
            renderMap();
        }

        async function describeArrival(loc) {
            if (!mistralKey) {
                contentBody.innerHTML =
                    `<em>You arrive at ${loc}. ${getNPCsAtLocation(loc).length} people here.</em>`;
                return;
            }
            const npcsHere = getNPCsAtLocation(loc);
            const sys =
                `You are the narrator for OLD SCHOOL 86. Describe arrival at ${loc}. NPCs present: ${npcsHere.map(n=>n.handle+' ('+n.personality+')').join(', ')||'no one'}. Time: ${getTimeStr()}. 3-5 sentences, 80s atmosphere. Only output description.`;
            try {
                const desc = await callAI(sys, 'Arrival at ' + loc, { maxTokens: 400, temperature: 0.8 });
                const text = desc || `You arrive at ${loc}.`;
                await typeToBody(text);
            } catch (e) { contentBody.innerHTML = `You arrive at ${loc}. (${e.message})`; }
        }

        async function doLookAround() {
            contentBody.innerHTML = '<span class="loading">Looking…</span>';
            initAudio();
            advanceTime(5);
            const loc = G.player.location;
            const npcsHere = getNPCsAtLocation(loc);
            if (!mistralKey) {
                contentBody.innerHTML =
                    `<em>You look around ${loc}. ${npcsHere.length?npcsHere.map(n=>n.handle).join(', '):'No one else here.'}</em>`;
                return;
            }
            const sys =
                `You are the narrator. Describe the scene at ${loc}. NPCs: ${npcsHere.map(n=>n.handle+' - '+n.personality+' (friendship:'+(n.friendshipLevel||0)+'/10)').join('; ')||'no one'}. 2-4 sentences. Only output description.`;
            try {
                const desc = await callAI(sys, 'Look around ' + loc, { maxTokens: 500, temperature: 0.8 });
                const text = desc || `You look around ${loc}.`;
                await typeToBody(text);
            } catch (e) { contentBody.innerHTML = `You look around ${loc}. (${e.message})`; }
        }

        async function doFreeAction() {
            const input = document.getElementById('freeActionInput');
            if (!input || !input.value.trim()) return;
            const action = input.value.trim();
            const resDiv = document.getElementById('freeActionResult');
            if (resDiv) resDiv.innerHTML = '<span class="loading">Processing…</span>';
            initAudio();
            advanceTime(10 + Math.floor(Math.random() * 20));
            if (!mistralKey) {
                if (resDiv) resDiv.innerHTML = '<em>You ' + action +
                    '. (No AI key — action recorded.)</em>';
                save();
                return;
            }
            const loc = G.player.location;
            const npcsHere = getNPCsAtLocation(loc);
            const sys =
                `You are the game engine for OLD SCHOOL 86. Process the player's free action. Return JSON: {"narrative":"...", "repChanges":{"overall":0,...}, "friendshipChanges":{"HANDLE":+1}, "newItems":[], "newNotes":[], "energyChange":-1, "triggeredEvent":null}. 80s realistic.`;
            try {
                const raw = await callAI(sys, JSON.stringify({
                    player: G.player.handle,
                    location: loc,
                    time: getTimeStr(),
                    energy: G.player.energy,
                    npcs: npcsHere.map(n => ({ handle: n.handle, personality: n.personality,
                        friendship: n.friendshipLevel || 0 })),
                    reputation: G.player.reputation,
                    action
                }), { maxTokens: 1000, temperature: 0.85 });
                const parsed = safeParseJSON(raw);
                if (parsed) {
                    if (parsed.narrative && resDiv) {
                        resDiv.innerHTML =
                            '<div style="margin-top:8px;padding:8px;border:1px solid rgba(179,128,255,0.3);background:rgba(20,10,40,0.5);">';
                        const narrSpan = document.createElement('span');
                        resDiv.firstChild.appendChild(narrSpan);
                        let i = 0;
                        const txt = parsed.narrative;
                        clearTyping();
                        await new Promise(resolve => {
                            function tc() {
                                if (i < txt.length) { narrSpan.textContent += txt.charAt(i);
                                    playTickSound();
                                    i++;
                                    contentBody.scrollTop = contentBody.scrollHeight;
                                    typingTimeout = setTimeout(tc, 22 + Math.random() * 12); } else { resolve
                                    (); }
                            }
                            tc();
                        });
                    }
                    if (parsed.repChanges)
                        for (let k in parsed.repChanges)
                            if (G.player.reputation[k] !== undefined) G.player.reputation[k] = Math.max(0, Math.min(
                                10, (G.player.reputation[k] || 5) + (parsed.repChanges[k] || 0)));
                    if (parsed.friendshipChanges)
                        for (let h in parsed.friendshipChanges) { const npc = getNPCByHandle(h); if (npc) npc
                                .friendshipLevel = (npc.friendshipLevel || 0) + parsed.friendshipChanges[h]; }
                    if (parsed.newItems) parsed.newItems.forEach(it => G.player.inventory.push(it));
                    if (parsed.newNotes) parsed.newNotes.forEach(n => G.notes.push({ ...n, timestamp: getClockStr() }));
                    if (parsed.energyChange) G.player.energy = Math.max(0, Math.min(10, G.player.energy + parsed
                        .energyChange));
                    if (parsed.triggeredEvent) G.events.push({ description: parsed.triggeredEvent, timestamp: getClockStr(
                    ) });
                }
            } catch (e) { if (resDiv) resDiv.innerHTML = '<span class="error-msg">Error: ' + e.message + '</span>'; }
            save();
            updateStatusBar();
        }

        async function doSkipClass() {
            if (G.player.location !== 'Ridgewood High School') { contentBody.innerHTML =
                '<em>Not at school.</em>'; return; }
            contentBody.innerHTML = '<span class="loading">Walking out…</span>';
            initAudio();
            advanceTime(5);
            G.player.attendance.skipped++;
            G.player.reputation.overall = Math.max(0, (G.player.reputation.overall || 5) - 0.3);
            if (G.player.reputation.burnouts) G.player.reputation.burnouts = Math.min(10, (G.player.reputation
                .burnouts || 5) + 0.5);
            save();
            updateStatusBar();
            if (mistralKey) {
                try {
                    const desc = await callAI('Narrator: player skipped class. 2-3 sentences.', 'skip', { maxTokens: 300 });
                    await typeToBody(desc || 'You walk out.');
                } catch (e) { contentBody.innerHTML = 'You walk out.'; }
            } else { contentBody.innerHTML = 'You walk out.'; }
        }

        async function doSleep() {
            contentBody.innerHTML = '<span class="loading">Going to sleep…</span>';
            initAudio();
            G.player.location = 'Your House';
            G.clock.hour = 7;
            G.clock.minute = 0;
            G.clock.dayIdx++;
            G.clock.dayOfMonth++;
            if (G.clock.dayIdx >= 7) G.clock.dayIdx = 0;
            if (G.clock.dayOfMonth > 30) { G.clock.dayOfMonth = 1;
                G.clock.monthIdx++; if (G.clock.monthIdx >= MONTHS.length) { G.clock.monthIdx = 0;
                    G.clock.year++; } }
            G.player.energy = 10;
            save();
            updateStatusBar();
            if (mistralKey) {
                try {
                    const desc = await callAI('Narrator: new day in Ridgewood. 2-4 sentences.', 'new day', {

                } catch (e) { contentBody.innerHTML = 'A new day.'; }
            } else { contentBody.innerHTML = 'A new day.'; }

            clearBBSState();

        async function randomWorldUpdate() {
            if (!mistralKey || !G.worldGenerated) return;
            try {
                const raw = await callAI(
                    'World updater for OLD SCHOOL 86. Generate 1-3 overnight events (rumours, fights, parties). Return JSON: {"events":[{"description":"..."}],"newBBSPosts":[],"newNotes":[]}',
                    'update', { maxTokens: 800, temperature: 0.9 });
                const parsed = safeParseJSON(raw);
                if (parsed) {
                    if (parsed.events) parsed.events.forEach(e => G.events.push({ ...e, timestamp: getClockStr() }));

                        if (!G.boards[p.board]) G.boards[p.board] = [];
                        G.boards[p.board].push({ id: Date.now() + Math.random(), author: p.author, subject: p
                                .subject, body: p.body, timestamp: getClockStr(), replies: [] });
                    });
                    if (parsed.newNotes) parsed.newNotes.forEach(n => G.notes.push({ ...n, timestamp: getClockStr() }));

            } catch (e) { /* silent */ }
            save();

                    `<div style="margin-bottom:4px;"><button class="action-btn back-btn" onclick="window._showMail()">← Back to Mail</button></div>`;
                html += `<strong>Conversation with ${conv.with}</strong><br>`;
                conv.messages.forEach(m => {
                    const cls = m.from === G.player.handle ? 'me' : 'other';
                    html +=
                        `<div style="margin:3px 0;padding:4px;border-bottom:1px dotted rgba(179,128,255,0.15);"><span style="color:${cls==='me'?'var(--phosphor-glow)':'var(--accent-warm)'};">${m.from}:</span> ${m.body} <span style="font-size:6px;color:var(--dim-text);">${m.timestamp||''}</span></div>`;

        async function sendBBSReply() {
            const input = document.getElementById('bbsReplyInput');
            if (!input || !input.value.trim() || !selectedConv) return;
            initAudio();
            const conv = getConvWith(selectedConv);
            conv.messages.push({ from: G.player.handle, body: input.value.trim(), timestamp: getClockStr(), read: true });
            input.value = '';
            save();
            // Re-render immediately so player sees their message
            refreshBBS();
            // Then generate NPC reply
            await generateNPCReply(conv);
            refreshBBS();
        }

        async function sendPostReply() {
            const input = document.getElementById('postReplyInput');
            if (!input || !input.value.trim() || !selectedBoard || !selectedPostId) return;
            initAudio();
            const post = G.boards[selectedBoard]?.find(p => p.id === selectedPostId);
            if (!post) return;
            if (!post.replies) post.replies = [];
            post.replies.push({ author: G.player.handle, body: input.value.trim(), timestamp: getClockStr() });
            input.value = '';
            save();
            refreshBBS();
            await generateBoardNPCReply(post);
            refreshBBS();
        }

        async function generateNPCReply(conv) {
            if (!mistralKey) return;
            const npc = getNPCByHandle(conv.with);
            if (!npc) return;
            const hist = conv.messages.slice(-6).map(m => m.from + ': ' + m.body).join('\n');
            const recentNotes = getRecentNotesForNPC(conv.with);
            let notesContext = '';
            if (recentNotes.length > 0) { notesContext = 'The player recently passed you these notes:\n' + recentNotes.map(
                    n => `- "${n.body}"`).join('\n') + '\n'; }
            const sys =
                `You are ${npc.handle}. Personality: ${npc.personality||'teen'}. Traits: ${(npc.traits||[]).join(', ')}. ${notesContext}Reply in character, 2-4 sentences. You can reference the notes if asked. Only output the reply body.`;
            try {
                const r = await callAI(sys, 'Conversation:\n' + hist, { maxTokens: 350 });
                if (r && r.trim()) conv.messages.push({ from: conv.with, body: r.trim(), timestamp: getClockStr(),
                    read: false });
            } catch (e) { /* silent */ }
            save();
        }

        async function generateBoardNPCReply(post) {
            if (!mistralKey) return;
            const npcs = [...G.students, ...G.townies].filter(n => n.handle !== G.player.handle);
            if (!npcs.length) return;
            const responder = npcs[Math.floor(Math.random() * npcs.length)];
            const sys =
                `You are ${responder.handle}. Reply to BBS post. 1-3 sentences. Only body.`;
            try {
                const r = await callAI(sys, 'Post: ' + post.subject + '\n' + post.body, { maxTokens: 250 });
                if (r && r.trim()) post.replies.push({ author: responder.handle, body: r.trim(), timestamp: getClockStr() });
            } catch (e) { /* silent */ }
            save();
        }

        async function fetchBatchContent() {
            contentBody.innerHTML = '<span class="loading">Dialling for new activity…</span>';
            initAudio();
            if (!mistralKey) { contentBody.innerHTML = '<em>No API key.</em>'; return; }
            const ctx = {
                playerHandle: G.player.handle,
                npcs: [...G.students, ...G.townies].map(n => ({ handle: n.handle, personality: n.personality,
                    traits: n.traits || [] })),
                lore: G.lore.slice(-5),
                feuds: G.feuds
            };
            const sys =
                `You are BBS activity generator for OLD SCHOOL 86. Generate 2-4 new board posts and 1-2 private messages to player. JSON: {"newPosts":[{"board":"...","author":"...","subject":"...","body":"..."}],"newMail":[{"from":"...","body":"..."}]}`;
            try {
                const raw = await callAI(sys, JSON.stringify(ctx), { maxTokens: 2000, temperature: 0.9 });
                const parsed = safeParseJSON(raw);
                if (parsed) {
                    if (parsed.newPosts) parsed.newPosts.forEach(p => {
                        if (!G.boards[p.board]) G.boards[p.board] = [];
                        G.boards[p.board].push({ id: Date.now() + Math.random(), author: p.author, subject: p
                                .subject, body: p.body, timestamp: getClockStr(), replies: [] });
                    });
                    if (parsed.newMail) parsed.newMail.forEach(m => {
                        getConvWith(m.from).messages.push({ from: m.from, body: m.body, timestamp: getClockStr(),
                            read: false });
                    });
                }
            } catch (e) { contentBody.innerHTML = '<span class="error-msg">Fetch failed: ' + e.message + '</span>'; return; }
            save();
            refreshBBS();
        }

                else resDiv.innerHTML = results.map(n => {
                    const escaped = n.handle.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    return `<div class="list-item" onclick="window._showNPCProfile('${escaped}')">${n.handle} (${n.archetype||'?'})</div>`;
                }).join('');
            });
        }

        function renderCalendar() {
            let html = '<strong>📅 Upcoming Events</strong><br><br>';
            if (!G.events.length) html += '<em>No events yet.</em>';
            else G.events.forEach(e => {
                html +=
                    `<div class="npc-card"><strong>📅 ${e.timestamp||'?'}</strong><br>${e.description||JSON.stringify(e)}</div>`;
            });
            html +=
                `<br><strong>Attendance:</strong> Attended: ${G.player.attendance?.attended||0} | Skipped: ${G.player.attendance?.skipped||0}`;
            contentBody.innerHTML = html;
        }

        // ──────────────────────────────────────
        // WORLD GENERATION
        // ──────────────────────────────────────
        async function generateInitialWorld() {
            contentBody.innerHTML = '<span class="loading">Generating Ridgewood… (may take a few seconds)</span>';
            initAudio();
            if (!mistralKey) {
                contentBody.innerHTML =
                    '<span class="error-msg">🔑 Mistral API key required.</span>';
                return;
            }
            const sys =
                `You are the world creator for OLD SCHOOL 86, a 1985 high school simulation. Generate a small but complete JSON object with:
- "students": 10-12 students, each with: handle, password, archetype (Jock, Geek, Burnout, Prep, Metalhead, Punk, Goth, NewWaver, ArtKid, Loner, Popular), personality (short), location (random from: ${LOCATIONS.join(', ')}).
- "townies": 2-3 townies.
- "teachers": 2-3 teachers.
- "newPosts": 2-4 BBS posts (board: general, personals, classifieds, confessions; with author, subject, body).
- "lore": 2 short town rumors.
- "feuds": 1-2 character conflicts.
Return ONLY valid JSON.`;
            try {
                const raw = await callAI(sys, 'Generate the world of Ridgewood, 1985.', { maxTokens: 2500,
                    temperature: 0.95 });
                const parsed = safeParseJSON(raw);
                if (!parsed) throw new Error('AI returned unparseable JSON. Try again.');
                if (parsed.students) G.students = parsed.students.map(s => ({ ...s, location: s.location || LOCATIONS[Math
                        .floor(Math.random() * LOCATIONS.length)] }));
                if (parsed.townies) G.townies = parsed.townies.map(t => ({ ...t, location: t.location || 'Downtown' }));
                if (parsed.teachers) G.teachers = parsed.teachers.map(t => ({ ...t, location: t.location ||
                        'Ridgewood High School' }));
                if (parsed.newPosts) parsed.newPosts.forEach(p => {
                    if (!G.boards[p.board]) G.boards[p.board] = [];
                    G.boards[p.board].push({ id: Date.now() + Math.random(), author: p.author, subject: p.subject,
                        body: p.body, timestamp: getClockStr(), replies: [] });
                });
                if (parsed.lore) G.lore = parsed.lore;
                if (parsed.feuds) G.feuds = parsed.feuds;
                G.worldGenerated = true;
                save();
                contentBody.innerHTML = '<span class="success-msg">✅ Ridgewood is alive! ' + G.students.length +
                    ' students, ' + G.townies.length + ' townies, ' + G.teachers.length + ' teachers.</span>';
                setTimeout(() => switchApp('map'), 1500);
            } catch (e) {
                console.error('World gen failed:', e);
                contentBody.innerHTML = `<span class="error-msg">❌ Generation failed: ${e.message}</span><br>
                <button class="action-btn primary" id="retryWorldBtn">🔄 Retry AI</button>`;
                document.getElementById('retryWorldBtn').addEventListener('click', generateInitialWorld);
            }
        }

        // ──────────────────────────────────────
        // LOGIN
        // ──────────────────────────────────────
        async function doLogin() {
            const name = document.getElementById('loginNameInput').value.trim();
            const pass = document.getElementById('loginPassInput').value.trim();
            if (!name || !pass) { loginError.textContent = 'Enter name and password.'; return; }
            if (!mistralKey) { loginError.textContent = 'Set Mistral API key.'; return; }
            initAudio();
            const existing = [...G.students, ...G.townies, ...G.teachers].find(s => s.handle.toLowerCase() === name
                .toLowerCase());
            if (existing) {
                if (existing.password !== pass) { loginError.textContent = 'Wrong password.'; return; }
                G.player = { handle: existing.handle, password: pass, location: 'Your House', energy: 10, reputation: { overall: 5,
                        jocks: 5, geeks: 5, burnouts: 5, preps: 5, metalheads: 5, punks: 5, goths: 5, newWavers: 5,
                        artKids: 5, loners: 5, populars: 5 }, inventory: [], attendance: { attended: 0, skipped: 0 },
                    flags: {} };
            } else {
                G.player = { handle: name, password: pass, location: 'Your House', energy: 10, reputation: { overall: 5,
                        jocks: 5, geeks: 5, burnouts: 5, preps: 5, metalheads: 5, punks: 5, goths: 5, newWavers: 5,
                        artKids: 5, loners: 5, populars: 5 }, inventory: [], attendance: { attended: 0, skipped: 0 },
                    flags: {} };
            }
            G.sessions++;
            save();
            loginOverlay.classList.add('hidden');
            updateStatusBar();
            if (!G.worldGenerated) { await generateInitialWorld(); } else { switchApp('map'); }
        }

        // ──────────────────────────────────────
        // EXPOSE FUNCTIONS TO WINDOW
        // ──────────────────────────────────────
        window._doTravel = doTravel;
        window._switchApp = switchApp;
        window._startConversation = startConversation;
        window._showNPCProfile = showNPCProfile;
        window._callNPC = callNPC;
        window._refreshBBS = refreshBBS;
        window._selBoard = function(b) { selectedBoard = b;
            selectedConv = null;
            selectedPostId = null;
            refreshBBS(); };
        window._selConv = function(h) { selectedConv = h;
            selectedBoard = null;
            selectedPostId = null;
            refreshBBS(); };
        window._viewPost = function(b, id) { selectedBoard = b;
            selectedPostId = id;
            selectedConv = null;
            refreshBBS(); };
        window._backToBoard = function(b) { selectedBoard = b;
            selectedPostId = null;
            selectedConv = null;
            refreshBBS(); };
        window._showMail = function() { selectedBoard = null;
            selectedConv = null;
            selectedPostId = null;
            refreshBBS(); };
        window.generateInitialWorld = generateInitialWorld;

        // ──────────────────────────────────────
        // EVENT BINDINGS
        // ──────────────────────────────────────
        appBtns.forEach(b => b.addEventListener('click', () => switchApp(b.dataset.app)));
        document.getElementById('loginBtn').addEventListener('click', doLogin);
        document.getElementById('loginPassInput').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin
            (); });
        document.getElementById('loginNameInput').addEventListener('keypress', e => { if (e.key === 'Enter') document
                .getElementById('loginPassInput').focus(); });
        document.getElementById('loginSaveKeyBtn').addEventListener('click', () => saveApiKey(document.getElementById(
            'loginKeyInput').value.trim()));

        // ──────────────────────────────────────
        // KEYBOARD SHORTCUTS
        // ──────────────────────────────────────
        document.addEventListener('keydown', e => {
            if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement
                    .tagName === 'TEXTAREA' || document.activeElement.tagName === 'SELECT')) return;
            if (loginOverlay && !loginOverlay.classList.contains('hidden')) return;
            const key = e.key.toLowerCase();
            const shortcuts = { '1': 'map', '2': 'bbs', '3': 'journal', '4': 'tapes', '5': 'floppies', '6': 'phone',
                '7': 'yearbook', '8': 'calendar' };
            if (shortcuts[key] && G.player) { e.preventDefault();
                initAudio();
                switchApp(shortcuts[key]); }
        });

        // ──────────────────────────────────────
        // INITIALIZATION
        // ──────────────────────────────────────
        updateKeyDot();
        const hasSave = load();
        if (hasSave && G.player) {
            loginOverlay.classList.add('hidden');
            ensurePlayer();
            updateStatusBar();
            clearBBSState();
            switchApp('map');
            if (!G.worldGenerated && mistralKey) generateInitialWorld();
        } else {
            loginOverlay.classList.remove('hidden');
            G.player = null;
            if (!hasSave) {
                G = {
                    player: null,
                    clock: { dayIdx: 1, monthIdx: 1, dayOfMonth: 2, year: 1985, hour: 8, minute: 0 },
                    students: [],
                    townies: [],
                    teachers: [],
                    conversations: [],
                    boards: { general: [], personals: [], classifieds: [], confessions: [], events: [] },
                    notes: [],
                    events: [],
                    lore: [],
                    feuds: [],
                    worldGenerated: false,
                    sessions: 0
                };
            }
        }
    })();
</script>
</body>
</html>
