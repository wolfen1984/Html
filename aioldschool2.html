<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLD SCHOOL 86 — Ridgewood</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #111;
            --border: #3a3a3a;
            --text: #c0c0c0;
            --accent: #f0a030;
            --accent2: #30a0f0;
            --green: #3a3;
            --red: #a33;
            --highlight: #1a1a1a;
            --dim: #666;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Courier New', 'Lucida Console', monospace; color: var(--text); }
        .desktop { width: 100%; max-width: 960px; height: 92vh; background: var(--bg); border: 3px solid var(--border); display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(240,160,48,0.08); overflow: hidden; position: relative; }
        .title-bar { background: #1a1a1a; color: var(--accent); font-weight: bold; text-align: center; padding: 5px 10px; font-size: 17px; letter-spacing: 2px; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .title-bar span { font-size: 12px; color: var(--dim); letter-spacing: 1px; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 3px 10px; background: #0d0d0d; border-bottom: 1px solid #222; font-size: 13px; gap: 12px; flex-wrap: wrap; }
        .status-item { white-space: nowrap; }
        .status-label { color: var(--dim); font-size: 11px; }
        .status-val { color: var(--accent); font-weight: bold; }
        .energy-dots { color: #f0c030; letter-spacing: 1px; }
        .main-area { flex: 1; display: flex; overflow: hidden; }
        .left-panel { width: 170px; min-width: 170px; border-right: 2px solid #222; display: flex; flex-direction: column; background: #0d0d0d; }
        .app-btn { background: transparent; border: none; border-bottom: 1px solid #1a1a1a; color: var(--text); font-family: 'Courier New', monospace; font-size: 13px; padding: 9px 12px; cursor: pointer; text-align: left; transition: all 0.1s; display: flex; align-items: center; gap: 8px; }
        .app-btn:hover { background: #1a1a1a; color: #fff; }
        .app-btn.active { background: #1a1a1a; color: var(--accent); font-weight: bold; border-left: 3px solid var(--accent); }
        .app-btn .icon { font-size: 16px; width: 22px; text-align: center; }
        .right-panel { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; min-width: 0; }
        .content-header { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; border-bottom: 1px solid #222; background: #0d0d0d; font-size: 14px; font-weight: bold; color: var(--accent); }
        .content-body { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
        .content-body a { color: var(--accent2); cursor: pointer; text-decoration: underline; }
        .bottom-bar { display: flex; gap: 6px; padding: 6px 10px; border-top: 2px solid #222; background: #0d0d0d; flex-wrap: wrap; align-items: center; }
        .action-btn { background: #1a1a1a; border: 1px solid #333; color: var(--text); font-family: 'Courier New', monospace; font-size: 13px; padding: 5px 11px; cursor: pointer; transition: all 0.1s; white-space: nowrap; }
        .action-btn:hover { background: #2a2a2a; border-color: var(--accent); color: #fff; }
        .action-btn.primary { border-color: var(--accent); color: var(--accent); }
        .action-btn.danger { border-color: var(--red); color: var(--red); }
        input, textarea, select { background: #0a0a0a; border: 1px solid #333; color: var(--text); font-family: 'Courier New', monospace; font-size: 13px; padding: 6px 8px; resize: vertical; }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); outline: none; }
        textarea { width: 100%; min-height: 50px; }
        .list-item { display: flex; align-items: center; justify-content: space-between; padding: 5px 8px; border-bottom: 1px dotted #1a1a1a; cursor: pointer; font-size: 13px; gap: 8px; }
        .list-item:hover { background: #111; }
        .list-item.selected { background: #1a1a1a; color: #fff; }
        .badge { color: #f0c030; font-weight: bold; font-size: 11px; }
        .loading { color: #f0c030; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }
        .error-msg { color: #f44; }
        .success-msg { color: #4a4; }
        .login-overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.94); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; z-index: 100; padding: 20px; }
        .login-overlay h1 { font-size: 30px; color: var(--accent); text-shadow: 0 0 15px rgba(240,160,48,0.4); margin: 0; letter-spacing: 3px; }
        .login-overlay .subtitle { font-size: 14px; color: var(--dim); letter-spacing: 2px; }
        .login-overlay input { width: 260px; text-align: center; font-size: 15px; padding: 8px 14px; }
        .login-overlay button { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 10px 28px; font-size: 15px; cursor: pointer; font-family: 'Courier New', monospace; letter-spacing: 1px; }
        .login-overlay button:hover { background: #f5b840; }
        .key-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--dim); }
        .key-row input { width: 200px; font-size: 11px; padding: 4px 8px; }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .npc-card { border: 1px solid #222; padding: 8px; margin: 4px 0; background: #0d0d0d; }
        .npc-card .name { color: var(--accent); font-weight: bold; }
        .map-location { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-bottom: 1px dotted #1a1a1a; cursor: pointer; }
        .map-location:hover { background: #111; }
        .map-location .loc-name { color: var(--accent2); font-weight: bold; }
        .map-location .loc-npcs { font-size: 11px; color: var(--dim); }
    </style>
</head>
<body>
<div class="desktop" id="desktop">
    <div class="title-bar"><span>💾 OLD SCHOOL 86</span><span>RIDGEWOOD v1.2</span></div>
    <div class="status-bar" id="statusBar">
        <span class="status-item"><span class="status-label">📅</span> <span class="status-val" id="sbDay">Monday, Oct 2 1985</span></span>
        <span class="status-item"><span class="status-label">🕐</span> <span class="status-val" id="sbTime">8:00 AM</span></span>
        <span class="status-item"><span class="status-label">📍</span> <span class="status-val" id="sbLocation">Your House</span></span>
        <span class="status-item"><span class="status-label">⚡</span> <span class="energy-dots" id="sbEnergy">★★★★★</span></span>
        <span class="status-item"><span class="status-label">⭐</span> <span class="status-val" id="sbRep">5.0</span></span>
    </div>
    <div class="main-area">
        <div class="left-panel" id="leftPanel">
            <button class="app-btn active" data-app="map"><span class="icon">🗺️</span> Map</button>
            <button class="app-btn" data-app="bbs"><span class="icon">📟</span> BBS</button>
            <button class="app-btn" data-app="journal"><span class="icon">📝</span> Journal</button>
            <button class="app-btn" data-app="tapes"><span class="icon">📼</span> Tapes</button>
            <button class="app-btn" data-app="floppies"><span class="icon">💾</span> Floppies</button>
            <button class="app-btn" data-app="phone"><span class="icon">📞</span> Phone</button>
            <button class="app-btn" data-app="yearbook"><span class="icon">👥</span> Yearbook</button>
            <button class="app-btn" data-app="calendar"><span class="icon">📅</span> Calendar</button>
        </div>
        <div class="right-panel">
            <div class="content-header" id="contentHeader">🗺️ Map — Ridgewood</div>
            <div class="content-body" id="contentBody">Loading...</div>
            <div class="bottom-bar" id="bottomBar"></div>
        </div>
    </div>
    <div class="login-overlay" id="loginOverlay">
        <h1>OLD SCHOOL 86</h1>
        <div class="subtitle">RIDGEWOOD · 1985-86</div>
        <p style="color:#c0c0c0;font-size:14px;">Enter your name to start your story</p>
        <input type="text" id="loginNameInput" placeholder="Your first name" maxlength="20">
        <input type="password" id="loginPassInput" placeholder="Password (new players: choose one)">
        <div class="key-row">
            <span>🔑 Mistral API Key:</span>
            <input type="password" id="loginKeyInput" placeholder="Paste your key">
            <button id="loginSaveKeyBtn" style="font-size:11px;padding:4px 8px;">Save Key</button>
            <span id="loginKeyDot" style="color:#f44;">●</span>
        </div>
        <button id="loginBtn">▶ START GAME</button>
        <div id="loginError" style="color:#f44;font-size:13px;"></div>
    </div>
</div>
<script>
(function() {
    const contentHeader = document.getElementById('contentHeader');
    const contentBody = document.getElementById('contentBody');
    const bottomBar = document.getElementById('bottomBar');
    const loginOverlay = document.getElementById('loginOverlay');
    const loginError = document.getElementById('loginError');
    const appBtns = document.querySelectorAll('.app-btn');
    const sbDay = document.getElementById('sbDay');
    const sbTime = document.getElementById('sbTime');
    const sbLocation = document.getElementById('sbLocation');
    const sbEnergy = document.getElementById('sbEnergy');
    const sbRep = document.getElementById('sbRep');
    const loginKeyInput = document.getElementById('loginKeyInput');
    const loginKeyDot = document.getElementById('loginKeyDot');

    const STORAGE_KEY = 'oldschool86_save';
    const LOCATIONS = ['Your House','Ridgewood High School','The Arcade','The Mall','Downtown','The Park','Ridgewood Lake',"Bob's Video",'The Record Store'];
    const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    const MONTHS = ['Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun'];

    let mistralKey = localStorage.getItem('oldschool86_key') || '';
    let currentApp = 'map';
    let selectedBoard = null;
    let selectedConv = null;
    let selectedPostId = null;

    let G = {
        player: null,
        clock: { dayIdx:1, monthIdx:1, dayOfMonth:2, year:1985, hour:8, minute:0 },
        students: [], townies: [], teachers: [],
        locations: {}, conversations: [],
        boards: { general:[], personals:[], classifieds:[], confessions:[], events:[] },
        notes: [], events: [], lore: [], feuds: [],
        worldGenerated: false, sessions: 0
    };

    function getClockStr() { const c=G.clock; const h=c.hour; const ampm=h>=12?'PM':'AM'; const h12=h%12||12; const m=c.minute.toString().padStart(2,'0'); return `${DAYS[c.dayIdx]}, ${MONTHS[c.monthIdx]} ${c.dayOfMonth} ${c.year} | ${h12}:${m} ${ampm}`; }
    function getTimeStr() { const c=G.clock; const h=c.hour; const ampm=h>=12?'PM':'AM'; const h12=h%12||12; const m=c.minute.toString().padStart(2,'0'); return `${h12}:${m} ${ampm}`; }

    function advanceTime(mins) {
        G.clock.minute += mins;
        while(G.clock.minute>=60){ G.clock.minute-=60; G.clock.hour++; }
        while(G.clock.hour>=24){ G.clock.hour-=24; G.clock.dayIdx++; G.clock.dayOfMonth++; if(G.clock.dayIdx>=7) G.clock.dayIdx=0; if(G.clock.dayOfMonth>30){ G.clock.dayOfMonth=1; G.clock.monthIdx++; } if(G.clock.monthIdx>=MONTHS.length){ G.clock.monthIdx=0; G.clock.year++; } }
        if(G.player) G.player.energy = Math.max(0, G.player.energy - Math.floor(mins/30));
        updateStatusBar();
    }

    function updateStatusBar() {
        if(!G.player) return;
        sbDay.textContent = `${DAYS[G.clock.dayIdx]}, ${MONTHS[G.clock.monthIdx]} ${G.clock.dayOfMonth} ${G.clock.year}`;
        sbTime.textContent = getTimeStr();
        sbLocation.textContent = G.player.location || 'Unknown';
        const e = G.player.energy;
        const stars = ['☆☆☆☆☆','★☆☆☆☆','★★☆☆☆','★★★☆☆','★★★★☆','★★★★★','★★★★★','★★★★★','★★★★★','★★★★★','★★★★★'];
        sbEnergy.textContent = stars[Math.min(e,10)];
        sbEnergy.style.color = e<=2?'#f44':e<=4?'#f0a030':'#f0c030';
        sbRep.textContent = (G.player.reputation?.overall||5).toFixed(1);
    }

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(G)); }
    function load() { const s=localStorage.getItem(STORAGE_KEY); if(s){ try{ G=JSON.parse(s); if(!G.boards) G.boards={general:[],personals:[],classifieds:[],confessions:[],events:[]}; if(!G.notes) G.notes=[]; if(!G.events) G.events=[]; if(!G.lore) G.lore=[]; if(!G.feuds) G.feuds=[]; if(!G.townies) G.townies=[]; if(!G.teachers) G.teachers=[]; return true; }catch(e){ return false; } } return false; }

    function ensurePlayer() {
        if(!G.player) return;
        if(!G.player.location) G.player.location='Your House';
        if(!G.player.energy && G.player.energy!==0) G.player.energy=10;
        if(!G.player.reputation) G.player.reputation={overall:5,jocks:5,geeks:5,burnouts:5,preps:5,metalheads:5,punks:5,goths:5,newWavers:5,artKids:5,loners:5,populars:5};
        if(!G.player.inventory) G.player.inventory=[];
        if(!G.player.attendance) G.player.attendance={attended:0,skipped:0};
        if(!G.player.flags) G.player.flags={};
    }

    function updateKeyDot() { loginKeyDot.style.color = mistralKey?'#4a4':'#f44'; loginKeyDot.textContent = mistralKey?'● Key set':'● No key'; if(loginKeyInput) loginKeyInput.value = mistralKey; }
    function saveApiKey(k) { mistralKey = k||''; localStorage.setItem('oldschool86_key', mistralKey); updateKeyDot(); }

    function safeParseJSON(raw) {
        if(typeof raw!=='string') return null;
        let c = raw.replace(/```json|```/g,'').trim();
        const s=c.indexOf('{'), e=c.lastIndexOf('}');
        if(s===-1||e===-1) return null;
        c = c.substring(s,e+1);
        try{ return JSON.parse(c); }catch(ex){ try{ return JSON.parse(c.replace(/\n/g,' ')); }catch(e2){ return null; } }
    }

    async function callAI(systemPrompt, userMessage, opts={}) {
        if(!mistralKey) throw new Error('No API key set.');
        const resp = await fetch('https://api.mistral.ai/v1/chat/completions',{
            method:'POST',
            headers:{'Content-Type':'application/json','Authorization':`Bearer ${mistralKey}`},
            body:JSON.stringify({
                model:'mistral-large-latest',
                messages:[{role:'system',content:systemPrompt},{role:'user',content:userMessage}],
                temperature: opts.temperature||0.9,
                max_tokens: opts.maxTokens||3000,
                response_format: opts.jsonResponse?{type:"json_object"}:undefined
            })
        });
        if(!resp.ok){ if(resp.status===401) throw new Error('Invalid API key.'); if(resp.status===429) throw new Error('Rate limited.'); throw new Error(`API error ${resp.status}`); }
        const data = await resp.json();
        return data.choices[0].message.content;
    }

    function getNPCsAtLocation(loc) { return [...G.students,...G.townies,...G.teachers].filter(n=>n.location===loc && n.handle!==(G.player?.handle||'')); }
    function getNPCByHandle(h) { return [...G.students,...G.townies,...G.teachers].find(n=>n.handle.toLowerCase()===h.toLowerCase()); }
    function getConvWith(h) { let c=G.conversations.find(c=>c.with.toLowerCase()===h.toLowerCase()); if(!c){ c={with:h,messages:[]}; G.conversations.push(c); } return c; }
    function convHasUnread(c) { return c.messages.some(m=>m.from!==G.player?.handle && !m.read); }

    // ─── GET NOTES FOR AN NPC (from player) ───
    function getRecentNotesForNPC(npcHandle) {
        return G.notes.filter(n => n.from === G.player?.handle && n.to === npcHandle).slice(-3);
    }

    // ─── APP SWITCHING (preserves selections) ───
    function switchApp(app) {
        if (app === currentApp) {
            renderApp(app);
            updateBottomBar(app);
            return;
        }
        currentApp = app;
        selectedBoard = null;
        selectedConv = null;
        selectedPostId = null;
        appBtns.forEach(b=>b.classList.remove('active'));
        const btn = document.querySelector(`.app-btn[data-app="${app}"]`);
        if(btn) btn.classList.add('active');
        const headers = { map:'🗺️ Map — Ridgewood', bbs:'📟 HEARTLINE BBS — Node 1', journal:'📝 Journal & Notes', tapes:'📼 Mixtape Collection', floppies:'💾 Floppy Disk Library', phone:'📞 Phone Book', yearbook:'👥 Yearbook', calendar:'📅 Calendar & Events' };
        contentHeader.textContent = headers[app]||app;
        contentBody.innerHTML = '';
        renderApp(app);
        updateBottomBar(app);
    }

    function renderApp(app) {
        if(!G.player){ contentBody.innerHTML='<em>Not logged in.</em>'; return; }
        switch(app){
            case 'map': renderMap(); break;
            case 'bbs': renderBBS(); break;
            case 'journal': renderJournal(); break;
            case 'tapes': renderTapes(); break;
            case 'floppies': renderFloppies(); break;
            case 'phone': renderPhone(); break;
            case 'yearbook': renderYearbook(); break;
            case 'calendar': renderCalendar(); break;
        }
    }

    function updateBottomBar(app) {
        bottomBar.innerHTML = '';
        const add = (txt,id,cls,fn)=>{ const b=document.createElement('button'); b.className='action-btn'+(cls?' '+cls:''); b.textContent=txt; b.id=id; b.addEventListener('click',fn); bottomBar.appendChild(b); };
        if(app==='map'){
            add('🚶 Travel','btnTravel','primary',showTravelDialog);
            add('👀 Look Around','btnLook','',doLookAround);
            add('💬 Talk','btnTalk','',showTalkDialog);
            add('🎬 Free Action','btnAction','primary',showFreeActionDialog);
            add('⏭ Skip Class','btnSkip','danger',doSkipClass);
            add('😴 Sleep','btnSleep','',doSleep);
        } else if(app==='bbs'){
            add('🔄 Check New Posts','btnRefresh','primary',fetchBatchContent);
            add('✉ New Post','btnNewPost','',showComposePost);
        } else if(app==='journal'){
            add('✍️ New Entry','btnNewEntry','',showJournalCompose);
            add('📝 Pass Note','btnPassNote','',showPassNoteDialog);
        } else if(app==='tapes'){
            add('🎵 Create Mixtape','btnCreateTape','primary',createMixtape);
        } else if(app==='floppies'){
            add('ℹ️ Info','btnInfo','',()=>{ contentBody.innerHTML = '<em>Floppy disks can be found by trading with NPCs or during events. Use <b>Free Action</b> on the Map to trade items.</em>'; });
        } else if(app==='phone'){
            add('📞 Call Someone','btnCall','primary',showCallDialog);
        } else if(app==='yearbook'){
            add('🔍 Search','btnSearch','',showYearbookSearch);
        }
    }

    // ─── MAP ───
    function renderMap() {
        let html = `<div style="font-size:15px;margin-bottom:10px;">📍 <strong>Current:</strong> ${G.player.location}</div>`;
        html += '<div style="display:grid;gap:2px;">';
        LOCATIONS.forEach(loc=>{
            const npcs = getNPCsAtLocation(loc);
            const isHere = G.player.location===loc;
            html += `<div class="map-location" data-loc="${loc}" style="${isHere?'border:1px solid #f0a030;background:#1a1a1a;':''}"><span class="loc-name">${isHere?'▶ ':''}${loc}</span><span class="loc-npcs">${npcs.length?npcs.map(n=>n.handle).join(', '):'empty'}</span></div>`;
        });
        html += '</div><div style="margin-top:10px;font-size:13px;color:#888;">Click a location then press <b>Travel</b>.</div>';
        contentBody.innerHTML = html;
        document.querySelectorAll('.map-location').forEach(el=>{
            el.addEventListener('click',function(){
                const loc = this.dataset.loc;
                if(loc && loc!==G.player.location) doTravel(loc);
            });
        });
    }

    async function doTravel(destination) {
        if(!destination || destination===G.player.location) return;
        contentBody.innerHTML = '<span class="loading">Travelling…</span>';
        advanceTime(5+Math.floor(Math.random()*15));
        G.player.location = destination;
        save(); updateStatusBar();
        await describeArrival(destination);
        renderMap();
    }

    async function describeArrival(loc) {
        if(!mistralKey){ contentBody.innerHTML=`<em>You arrive at ${loc}. ${getNPCsAtLocation(loc).length} people here.</em>`; return; }
        const npcsHere = getNPCsAtLocation(loc);
        const sys = `You are the narrator for OLD SCHOOL 86. Describe arrival at ${loc}. NPCs present: ${npcsHere.map(n=>n.handle+' ('+n.personality+')').join(', ')||'no one'}. Time: ${getTimeStr()}. 3-5 sentences, 80s atmosphere. Only output description.`;
        try{
            const desc = await callAI(sys, 'Arrival at '+loc, {maxTokens:400,temperature:0.8});
            contentBody.innerHTML = desc || `You arrive at ${loc}.`;
        }catch(e){ contentBody.innerHTML = `You arrive at ${loc}. (${e.message})`; }
    }

    async function doLookAround() {
        contentBody.innerHTML = '<span class="loading">Looking…</span>';
        advanceTime(5);
        const loc = G.player.location;
        const npcsHere = getNPCsAtLocation(loc);
        if(!mistralKey){ contentBody.innerHTML=`<em>You look around ${loc}. ${npcsHere.length?npcsHere.map(n=>n.handle).join(', '):'No one else here.'}</em>`; return; }
        const sys = `You are the narrator. Describe the scene at ${loc}. NPCs: ${npcsHere.map(n=>n.handle+' - '+n.personality+' (friendship:'+(n.friendshipLevel||0)+'/10)').join('; ')||'no one'}. 2-4 sentences. Only output description.`;
        try{
            const desc = await callAI(sys, 'Look around '+loc, {maxTokens:500,temperature:0.8});
            contentBody.innerHTML = desc || `You look around ${loc}.`;
        }catch(e){ contentBody.innerHTML = `You look around ${loc}. (${e.message})`; }
    }

    function showTravelDialog() {
        const locs = LOCATIONS.filter(l=>l!==G.player.location);
        let html = '<div><strong>Travel where?</strong>';
        locs.forEach(l=>{ html += `<button class="action-btn" style="display:block;width:100%;text-align:left;margin:2px 0;" onclick="window._doTravel('${l}')">🚶 ${l}</button>`; });
        html += '<button class="action-btn" onclick="switchApp(\'map\')">Cancel</button></div>';
        contentBody.innerHTML = html;
        window._doTravel = (loc)=>{ doTravel(loc); };
    }

    function showTalkDialog() {
        const npcs = getNPCsAtLocation(G.player.location);
        if(!npcs.length){ contentBody.innerHTML='<em>No one here to talk to.</em>'; return; }
        let html = '<div><strong>Talk to:</strong>';
        npcs.forEach(n=>{ html += `<button class="action-btn" style="display:block;width:100%;text-align:left;margin:2px 0;" onclick="startConversation('${n.handle}')">💬 ${n.handle} (${n.personality||'?'})</button>`; });
        html += '<button class="action-btn" onclick="switchApp(\'map\')">Cancel</button></div>';
        contentBody.innerHTML = html;
    }

    function showFreeActionDialog() {
        contentBody.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:8px;">

    async function doFreeAction() {
        const input = document.getElementById('freeActionInput');
        if(!input||!input.value.trim()) return;
        const action = input.value.trim();
        const resDiv = document.getElementById('freeActionResult');
        if(resDiv) resDiv.innerHTML = '<span class="loading">Processing…</span>';
        advanceTime(10+Math.floor(Math.random()*20));
        if(!mistralKey){ if(resDiv) resDiv.innerHTML='<em>You '+action+'. (No AI key — action recorded.)</em>'; save(); return; }
        const loc = G.player.location;
        const npcsHere = getNPCsAtLocation(loc);
        const sys = `You are the game engine for OLD SCHOOL 86. Process the player's free action. Return JSON: {"narrative":"...", "repChanges":{"overall":0,...}, "friendshipChanges":{"HANDLE":+1}, "newItems":[], "newNotes":[], "energyChange":-1, "triggeredEvent":null}. 80s realistic.`;
        try{
            const raw = await callAI(sys, JSON.stringify({player:G.player.handle, location:loc, time:getTimeStr(), energy:G.player.energy, npcs:npcsHere.map(n=>({handle:n.handle,personality:n.personality,friendship:n.friendshipLevel||0})), reputation:G.player.reputation, action}), {maxTokens:1000,jsonResponse:true,temperature:0.85});
            const parsed = safeParseJSON(raw);
            if(parsed){
                if(parsed.narrative && resDiv) resDiv.innerHTML = '<div style="margin-top:8px;padding:8px;border:1px solid #333;">'+parsed.narrative+'</div>';
                if(parsed.repChanges) for(let k in parsed.repChanges) if(G.player.reputation[k]!==undefined) G.player.reputation[k]=Math.max(0,Math.min(10,(G.player.reputation[k]||5)+(parsed.repChanges[k]||0)));
                if(parsed.friendshipChanges) for(let h in parsed.friendshipChanges){ const npc=getNPCByHandle(h); if(npc) npc.friendshipLevel=(npc.friendshipLevel||0)+parsed.friendshipChanges[h]; }
                if(parsed.newItems) parsed.newItems.forEach(it=>G.player.inventory.push(it));
                if(parsed.newNotes) parsed.newNotes.forEach(n=>G.notes.push({...n,timestamp:getClockStr()}));
                if(parsed.energyChange) G.player.energy=Math.max(0,Math.min(10,G.player.energy+parsed.energyChange));
                if(parsed.triggeredEvent) G.events.push({description:parsed.triggeredEvent,timestamp:getClockStr()});
            }
        }catch(e){ if(resDiv) resDiv.innerHTML='<span class="error-msg">Error: '+e.message+'</span>'; }
        save(); updateStatusBar();
    }

    async function sendPostReply() {
        const input=document.getElementById('postReplyInput');

        const post=G.boards[selectedBoard]?.find(p=>p.id===selectedPostId);

    // ─── GENERATE NPC REPLY (WITH NOTE MEMORY) ───
    async function generateNPCReply(conv) {
        if(!mistralKey) return;
        const npc=getNPCByHandle(conv.with); if(!npc) return;
        const hist=conv.messages.slice(-6).map(m=>m.from+': '+m.body).join('\n');
        const recentNotes = getRecentNotesForNPC(conv.with);
        let notesContext = '';
        if (recentNotes.length > 0) {
            notesContext = 'The player recently passed you these notes:\n' + recentNotes.map(n => `- "${n.body}"`).join('\n') + '\n';
        }
        const sys = `You are ${npc.handle}. Personality: ${npc.personality||'teen'}. Traits: ${(npc.traits||[]).join(', ')}. ${notesContext}Reply in character, 2-4 sentences. You can reference the notes if asked. Only output the reply body.`;
        try{ const r=await callAI(sys,'Conversation:\n'+hist,{maxTokens:350}); if(r&&r.trim()) conv.messages.push({from:conv.with,body:r.trim(),timestamp:getClockStr(),read:false}); }catch(e){}
        save();
    }

    async function generateBoardNPCReply(post) {
        if(!mistralKey) return;
        const npcs=[...G.students,...G.townies].filter(n=>n.handle!==G.player.handle);
        if(!npcs.length) return;
        const responder=npcs[Math.floor(Math.random()*npcs.length)];
        const sys=`You are ${responder.handle}. Reply to BBS post. 1-3 sentences. Only body.`;
        try{ const r=await callAI(sys,'Post: '+post.subject+'\n'+post.body,{maxTokens:250}); if(r&&r.trim()) post.replies.push({author:responder.handle,body:r.trim(),timestamp:getClockStr()}); }catch(e){}
        save();
    }

    async function fetchBatchContent() {
        contentBody.innerHTML='<span class="loading">Dialling for new activity…</span>';
        if(!mistralKey){ contentBody.innerHTML='<em>No API key.</em>'; return; }
        const ctx={playerHandle:G.player.handle,npcs:[...G.students,...G.townies].map(n=>({handle:n.handle,personality:n.personality,traits:n.traits||[]})),lore:G.lore.slice(-5),feuds:G.feuds};
        const sys=`You are BBS activity generator for OLD SCHOOL 86. Generate 2-4 new board posts and 1-2 private messages to player. JSON: {"newPosts":[{"board":"...","author":"...","subject":"...","body":"..."}],"newMail":[{"from":"...","body":"..."}]}`;
        try{
            const raw=await callAI(sys,JSON.stringify(ctx),{maxTokens:2000,jsonResponse:true,temperature:0.9});
            const parsed=safeParseJSON(raw);
            if(parsed){
                if(parsed.newPosts) parsed.newPosts.forEach(p=>{ if(!G.boards[p.board]) G.boards[p.board]=[]; G.boards[p.board].push({id:Date.now()+Math.random(),author:p.author,subject:p.subject,body:p.body,timestamp:getClockStr(),replies:[]}); });
                if(parsed.newMail) parsed.newMail.forEach(m=>{ getConvWith(m.from).messages.push({from:m.from,body:m.body,timestamp:getClockStr(),read:false}); });
            }
        }catch(e){ contentBody.innerHTML='<span class="error-msg">Fetch failed: '+e.message+'</span>'; return; }
        save();
        switchApp('bbs');
    }

            <strong>Search Yearbook</strong>
            <input type="text" id="ybSearch" placeholder="Name or archetype...">
            <button class="action-btn primary" id="ybSearchBtn">🔍 Search</button>
            <div id="ybResults"></div>
        </div>`;
        document.getElementById('ybSearchBtn').addEventListener('click',()=>{
            const q=document.getElementById('ybSearch').value.trim().toLowerCase();
            const all=[...G.students,...G.townies,...G.teachers];
            const results=all.filter(n=>n.handle.toLowerCase().includes(q)||(n.archetype||'').toLowerCase().includes(q));
            const resDiv=document.getElementById('ybResults');
            if(!results.length) resDiv.innerHTML='<em>No matches.</em>';
            else resDiv.innerHTML=results.map(n=>`<div class="list-item" onclick="showNPCProfile('${n.handle}')">${n.handle} (${n.archetype||'?'})</div>`).join('');
        });
    }

    // ─── CALENDAR ───
    function renderCalendar() {
        let html='<strong>📅 Upcoming Events</strong><br><br>';
        if(!G.events.length) html+='<em>No events yet.</em>';
        else G.events.forEach(e=>{ html+=`<div class="npc-card"><strong>📅 ${e.timestamp||'?'}</strong><br>${e.description||JSON.stringify(e)}</div>`; });
        html+=`<br><strong>Attendance:</strong> Attended: ${G.player.attendance?.attended||0} | Skipped: ${G.player.attendance?.skipped||0}`;
        contentBody.innerHTML=html;
    }

    // ─── WORLD GENERATION ───
    async function generateInitialWorld() {
        contentBody.innerHTML='<span class="loading">Generating Ridgewood…</span>';
        if(!mistralKey){ contentBody.innerHTML='<span class="error-msg">🔑 Mistral API key required.</span>'; return; }
        const sys=`You are the world creator for OLD SCHOOL 86, 1985 Ridgewood. Generate students, townies, teachers, BBS posts, lore. Return JSON with: students (15-20, each: handle,password,archetype,personality,traits,socialStanding,crush,feud,secret,inventory,friendshipLevel,location,relationshipStatus), townies (3-5), teachers (3-4), newPosts (5-8), newMail (2-3), lore (3-5), feuds (2-3), events (1-2). All strings single line.`;
        try{
            const raw=await callAI(sys,'Generate world',{maxTokens:5000,jsonResponse:true,temperature:0.95});
            const parsed=safeParseJSON(raw);
            if(!parsed) throw new Error('Invalid JSON');
            if(parsed.students) G.students=parsed.students.map(s=>({...s,location:s.location||LOCATIONS[Math.floor(Math.random()*LOCATIONS.length)]}));
            if(parsed.townies) G.townies=parsed.townies.map(t=>({...t,location:t.location||'Downtown'}));
            if(parsed.teachers) G.teachers=parsed.teachers.map(t=>({...t,location:t.location||'Ridgewood High School'}));
            if(parsed.newPosts) parsed.newPosts.forEach(p=>{ if(!G.boards[p.board]) G.boards[p.board]=[]; G.boards[p.board].push({id:Date.now()+Math.random(),author:p.author,subject:p.subject,body:p.body,timestamp:getClockStr(),replies:[]}); });
            if(parsed.newMail) parsed.newMail.forEach(m=>{ getConvWith(m.from).messages.push({from:m.from,body:m.body,timestamp:getClockStr(),read:false}); });
            if(parsed.lore) G.lore=parsed.lore;
            if(parsed.feuds) G.feuds=parsed.feuds;
            if(parsed.events) parsed.events.forEach(e=>G.events.push({...e,timestamp:getClockStr()}));
            G.worldGenerated=true; save();
            contentBody.innerHTML='<span class="success-msg">✅ Ridgewood is alive! '+G.students.length+' students, '+G.townies.length+' townies, '+G.teachers.length+' teachers.</span>';
            setTimeout(()=>switchApp('map'),1500);
        }catch(e){ contentBody.innerHTML='<span class="error-msg">❌ Generation failed: '+e.message+'</span><br><button class="action-btn" onclick="generateInitialWorld()">Retry</button>'; }
    }

    // ─── LOGIN ───
    async function doLogin() {
        const name=document.getElementById('loginNameInput').value.trim();
        const pass=document.getElementById('loginPassInput').value.trim();
        if(!name||!pass){ loginError.textContent='Enter name and password.'; return; }
        if(!mistralKey){ loginError.textContent='Set Mistral API key.'; return; }
        const existing=[...G.students,...G.townies,...G.teachers].find(s=>s.handle.toLowerCase()===name.toLowerCase());
        if(existing){
            if(existing.password!==pass){ loginError.textContent='Wrong password.'; return; }
            G.player={handle:existing.handle,password:pass,location:'Your House',energy:10,reputation:{overall:5,jocks:5,geeks:5,burnouts:5,preps:5,metalheads:5,punks:5,goths:5,newWavers:5,artKids:5,loners:5,populars:5},inventory:[],attendance:{attended:0,skipped:0},flags:{}};
        }else{
            G.player={handle:name,password:pass,location:'Your House',energy:10,reputation:{overall:5,jocks:5,geeks:5,burnouts:5,preps:5,metalheads:5,punks:5,goths:5,newWavers:5,artKids:5,loners:5,populars:5},inventory:[],attendance:{attended:0,skipped:0},flags:{}};
        }
        G.sessions++; save();
        loginOverlay.classList.add('hidden');
        updateStatusBar();
        if(!G.worldGenerated){ await generateInitialWorld(); } else { switchApp('map'); }
    }

    // ─── EVENT BINDINGS ───
    appBtns.forEach(b=>b.addEventListener('click',()=>switchApp(b.dataset.app)));
    document.getElementById('loginBtn').addEventListener('click',doLogin);
    document.getElementById('loginPassInput').addEventListener('keypress',e=>{ if(e.key==='Enter') doLogin(); });
    document.getElementById('loginSaveKeyBtn').addEventListener('click',()=>saveApiKey(document.getElementById('loginKeyInput').value.trim()));

    updateKeyDot();
    const hasSave=load();
    if(hasSave && G.player){
        loginOverlay.classList.add('hidden');
        ensurePlayer();
        updateStatusBar();
        switchApp('map');
        if(!G.worldGenerated && mistralKey) generateInitialWorld();
    }else{
        loginOverlay.classList.remove('hidden');
        G.player=null;
    }
})();
</script>
</body>
</html>
