<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CREEPER · NIGHTFALL GAMES 1984</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a08;
      --panel-bg: #0d0f0d;
      --text: #33ff44;
      --text-dim: #1a7a22;
      --text-bright: #66ff77;
      --accent: #ff8833;
      --accent-dim: #aa5522;
      --border: #33ff44;
      --border-glow: 0 0 6px #33ff4466;
      --danger: #ff4444;
      --danger-glow: 0 0 6px #ff444466;
      --input-bg: #111511;
      --button-bg: #1a2a1a;
      --button-hover: #1f3520;
      --font-display: 'VT323', 'Courier New', monospace;
      --font-mono: 'Share Tech Mono', 'Courier New', monospace;
      --scanline-opacity: 0.06;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050505;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: var(--font-display);
      padding: 12px;
      background-image: radial-gradient(ellipse at center, #0a0f0a 0%, #020302 100%);
    }
    .pda {
      max-width: 440px;
      width: 100%;
      height: 88vh;
      max-height: 780px;
      background: #0b0d0b;
      border-radius: 18px;
      border: 3px solid #2a3a2a;
      box-shadow: 0 0 30px #33ff4422, 0 0 80px #000000aa, 0 8px 32px #000000cc, inset 0 1px 0 #ffffff08, inset 0 0 60px #00000044;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .crt-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 900;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,var(--scanline-opacity)) 0px, rgba(0,0,0,var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
      border-radius: 15px;
    }
    .crt-overlay::after {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
      border-radius: 15px; pointer-events: none;
    }
    .status-bar {
      padding: 10px 16px 8px 16px; display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font-mono); font-size: 11px; color: var(--text);
      text-shadow: 0 0 4px var(--text-dim); border-bottom: 1px solid #1a2a1a;
      background: #0a0d0a; letter-spacing: 1px; z-index: 10; position: relative;
    }
    .status-dot {
      display: inline-block; width: 7px; height: 7px; background: var(--text);
      border-radius: 50%; margin-right: 6px; animation: blinkDot 1.6s infinite;
      box-shadow: 0 0 6px var(--text);
    }
    @keyframes blinkDot { 0%, 70%, 100% { opacity: 1; } 80%, 90% { opacity: 0.2; } }
    .title-bar {
      text-align: center; padding: 10px 16px 6px 16px; font-family: var(--font-display);
      font-size: 26px; letter-spacing: 4px; color: var(--text);
      text-shadow: 0 0 12px var(--text), 0 0 24px var(--text-dim), 0 0 40px #33ff4433;
      background: #0a0d0a; border-bottom: 1px solid #1a2a1a; position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .title-bar .heart {
      font-size: 18px; animation: heartPulse 1.8s infinite;
      text-shadow: 0 0 8px #ff4466; color: #ff4466;
    }
    @keyframes heartPulse { 0%, 100% { transform: scale(1); } 15% { transform: scale(1.3); } 30% { transform: scale(1); } }
    .tabs {
      display: flex; background: #0a0d0a; border-bottom: 2px solid #1a2a1a;
      position: relative; z-index: 10; overflow-x: auto;
    }
    .tab {
      flex: 1; min-width: 55px; text-align: center; padding: 10px 4px;
      font-family: var(--font-display); font-size: 15px; letter-spacing: 1px;
      color: var(--text-dim); cursor: pointer; transition: all 0.15s;
      border-bottom: 3px solid transparent; background: transparent; white-space: nowrap; position: relative;
    }
    .tab:hover { color: var(--text); text-shadow: 0 0 6px var(--text-dim); }
    .tab.active {
      color: var(--text); border-bottom: 3px solid var(--text);
      text-shadow: 0 0 10px var(--text), 0 0 20px var(--text-dim);
      box-shadow: inset 0 -8px 12px -12px #33ff4444;
    }
    .tab .badge {
      position: absolute; top: 4px; right: 6px; background: var(--accent); color: #000;
      font-size: 10px; width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-weight: bold; animation: badgeGlow 2s infinite;
      box-shadow: 0 0 8px var(--accent);
    }
    @keyframes badgeGlow { 0%, 100% { box-shadow: 0 0 8px var(--accent); } 50% { box-shadow: 0 0 18px var(--accent), 0 0 30px #ff883366; } }
    .panel {
      flex: 1; overflow-y: auto; display: none; background: var(--panel-bg);
      position: relative; z-index: 5; scrollbar-width: thin; scrollbar-color: #1a2a1a #0a0d0a;
    }
    .panel.active { display: flex; flex-direction: column; }
    .profile-section { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .profile-header { display: flex; align-items: center; gap: 14px; padding-bottom: 14px; border-bottom: 1px solid #1a2a1a; }
    .profile-icon-display {
      font-size: 48px; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center;
      background: #0f140f; border-radius: 14px; border: 2px solid #1a3a1a;
      box-shadow: var(--border-glow); cursor: pointer; transition: all 0.2s;
    }
    .profile-field { display: flex; flex-direction: column; gap: 4px; }
    .profile-field label { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
    .profile-field input, .profile-field select, .profile-field textarea {
      background: var(--input-bg); border: 1px solid #1a2a1a; border-radius: 6px;
      padding: 10px 12px; color: var(--text); font-family: var(--font-display);
      font-size: 18px; letter-spacing: 1px; outline: none; transition: all 0.2s; resize: vertical;
    }
    .profile-field input:focus, .profile-field select:focus, .profile-field textarea:focus {
      border-color: var(--text); box-shadow: var(--border-glow);
    }
    .icon-grid { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 0; }
    .icon-option {
      font-size: 28px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
      background: #0f140f; border: 2px solid #1a2a1a; border-radius: 8px; cursor: pointer; transition: all 0.15s;
    }
    .icon-option.selected { border-color: var(--text); box-shadow: 0 0 12px #33ff4488; background: #1a2f1a; }
    .btn {
      background: var(--button-bg); border: 2px solid #1a3a1a; padding: 10px 20px; border-radius: 6px;
      color: var(--text); cursor: pointer; font-family: var(--font-display); font-size: 18px;
      letter-spacing: 2px; text-align: center; transition: all 0.2s; text-shadow: 0 0 4px var(--text-dim); text-transform: uppercase;
    }
    .btn:hover { background: var(--button-hover); border-color: var(--text); box-shadow: var(--border-glow); }
    .btn.danger { border-color: #3a1a1a; color: var(--danger); }
    .member-list { flex: 1; }
    .member-item {
      padding: 12px 16px; border-bottom: 1px solid #151f15; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 12px; position: relative;
    }
    .member-item:hover { background: #111811; box-shadow: inset 0 0 20px #33ff4408; }
    .member-icon {
      font-size: 32px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; background: #0f140f; border-radius: 10px; border: 1px solid #1a2a1a;
    }
    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 20px; color: var(--text); letter-spacing: 1px; text-shadow: 0 0 4px var(--text-dim); }
    .member-preview { font-size: 13px; color: var(--text-dim); font-family: var(--font-mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .member-time { font-size: 10px; color: #1a4a1a; font-family: var(--font-mono); white-space: nowrap; }
    .member-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .action-btn {
      width: 30px; height: 30px; border-radius: 50%; border: 1px solid #1a2a1a;
      background: #0f140f; cursor: pointer; font-size: 14px; display: flex;
      align-items: center; justify-content: center; transition: all 0.15s; color: var(--text); font-family: var(--font-display);
    }
    .action-btn.accept { border-color: #1a3a1a; color: var(--text); }
    .action-btn.accept:hover { background: #1a3a1a; box-shadow: var(--border-glow); }
    .action-btn.refuse { border-color: #2a2a1a; color: #aaaa44; }
    .action-btn.block { border-color: #3a1a1a; color: var(--danger); }
    .action-btn.profile { border-color: #1a2a2a; color: #44ccff; }
    .action-btn.profile:hover { background: #1a2a2a; box-shadow: 0 0 8px #44ccff66; }
    .chat-view { display: flex; flex-direction: column; height: 100%; }
    .chat-header { padding: 10px 14px; background: #0a0d0a; border-bottom: 1px solid #1a2a1a; display: flex; align-items: center; gap: 10px; font-family: var(--font-display); }
    .chat-contact-name {
      color: var(--text);
      font-size: 18px;
      letter-spacing: 1px;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .back-btn { background: none; border: 1px solid #1a2a1a; color: var(--text); font-size: 20px; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .messages-area { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .message-row { display: flex; max-width: 82%; position: relative; }
    .incoming { align-self: flex-start; } .outgoing { align-self: flex-end; }
    .msg-bubble { padding: 8px 14px; border-radius: 14px; font-family: var(--font-mono); font-size: 13px; line-height: 1.45; word-wrap: break-word; letter-spacing: 0.5px; }
    .incoming .msg-bubble { background: #101d10; color: #ccffcc; border: 1px solid #1a3a1a; border-bottom-left-radius: 3px; }
    .outgoing .msg-bubble { background: #0f1f1a; color: #d4ffd4; border: 1px solid #1a4a2a; border-bottom-right-radius: 3px; }
    .delete-msg { position: absolute; top: -6px; right: -6px; background: #1a1010; border-radius: 14px; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; color: #ff6666; opacity: 0; transition: opacity 0.15s; border: 1px solid #3a1a1a; }
    .message-row:hover .delete-msg { opacity: 1; }
    .img-bubble {
      padding: 4px; background: transparent; border: none;
      cursor: pointer; transition: transform 0.15s;
    }
    .img-bubble:hover { transform: scale(1.03); }
    .img-bubble img {
      max-width: 180px; max-height: 180px; border-radius: 10px;
      border: 2px solid #1a3a1a; box-shadow: 0 0 10px #33ff4433;
      display: block;
    }
    .typing-indicator { align-self: flex-start; background: #101d10; padding: 8px 14px; border-radius: 14px; border-bottom-left-radius: 3px; display: flex; gap: 5px; border: 1px solid #1a3a1a; }
    .typing-dot { width: 7px; height: 7px; background: var(--text-dim); border-radius: 50%; animation: typingAnim 1.3s infinite; }
    @keyframes typingAnim { 0%, 60%, 100% { transform: translateY(0); opacity: 0.3; } 30% { transform: translateY(-5px); opacity: 1; } }
    .chat-input-area { padding: 10px 12px; background: #0a0d0a; border-top: 1px solid #1a2a1a; display: flex; gap: 8px; }
    .chat-input { flex: 1; background: var(--input-bg); border: 1px solid #1a2a1a; border-radius: 20px; padding: 10px 16px; color: var(--text); font-family: var(--font-mono); font-size: 14px; outline: none; }
    .send-msg-btn { background: #1a2f1a; border: 1px solid #1a3a1a; width: 40px; height: 40px; border-radius: 50%; color: var(--text); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    .compose-area { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .select-contact { background: var(--input-bg); border: 1px solid #1a2a1a; border-radius: 8px; padding: 12px; color: var(--text); font-family: var(--font-display); font-size: 18px; outline: none; }
    .compose-textarea { background: var(--input-bg); border: 1px solid #1a2a1a; border-radius: 12px; padding: 12px; color: var(--text); font-family: var(--font-mono); font-size: 14px; outline: none; resize: vertical; min-height: 80px; }
    .footer-status { text-align: center; font-family: var(--font-mono); font-size: 9px; color: #1a3a1a; padding: 6px 10px; background: #0a0d0a; border-top: 1px solid #151f15; display: flex; justify-content: space-between; align-items: center; }
    .reset-api { background: none; border: none; color: #553333; font-size: 9px; cursor: pointer; text-decoration: underline; }
    .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; }
    .modal-content { background: #0d110d; border-radius: 16px; width: 340px; padding: 24px; text-align: center; border: 2px solid #2a3a2a; box-shadow: 0 0 40px #33ff4422; font-family: var(--font-display); }
    .modal-content h2 { color: var(--text); letter-spacing: 2px; margin-bottom: 8px; }
    .modal-content input { width: 100%; padding: 10px; margin: 12px 0; background: var(--input-bg); border: 1px solid #1a2a1a; border-radius: 8px; color: var(--text); font-family: var(--font-mono); outline: none; }
    .modal-btn { background: #1a2f1a; border: 2px solid #1a3a1a; padding: 8px 18px; border-radius: 6px; margin: 4px; cursor: pointer; color: var(--text); font-family: var(--font-display); font-size: 16px; }
    .empty-state { padding: 40px 20px; text-align: center; color: #1a3a1a; font-family: var(--font-mono); font-size: 13px; }
    .image-modal-content { max-width: 380px; width: 90%; }
    .image-modal-content img { max-width: 100%; max-height: 70vh; border-radius: 12px; border: 2px solid #1a3a1a; box-shadow: 0 0 20px #33ff4433; }
    .npc-profile-modal { max-width: 360px; width: 90%; }
    .npc-profile-modal .npc-icon { font-size: 64px; margin-bottom: 10px; }
    .npc-profile-modal .npc-field { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1a2a1a; }
    .npc-profile-modal .npc-field span:first-child { color: var(--text-dim); font-family: var(--font-mono); font-size: 12px; letter-spacing: 1px; }
    .npc-profile-modal .npc-field span:last-child { color: var(--text); font-size: 18px; letter-spacing: 1px; }
    .npc-profile-modal .modal-body { text-align: left; padding: 0 10px; }
  </style>
</head>
<body>
<div class="pda">
  <div class="crt-overlay"></div>
  <div class="status-bar">
    <span><span class="status-dot"></span>ONLINE</span>
    <span id="statusTime">12:00</span>
    <span class="battery">█▇▇▇ 78%</span>
  </div>
  <div class="title-bar">
    <span>💀</span> CREEPER <span class="heart">♥</span>
    <span style="display:block;font-size:9px;letter-spacing:3px;color:#1a5a1a;">NIGHTFALL GAMES 1984</span>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="profile">👤 PROFILE</div>
    <div class="tab" data-tab="inbox">📥 INBOX</div>
    <div class="tab" data-tab="requests">👋 REQUESTS<span class="badge" id="requestsBadge" style="display:none;">0</span></div>
    <div class="tab" data-tab="friends">💚 FRIENDS</div>
    <div class="tab" data-tab="compose">✏️ COMPOSE</div>
  </div>

  <div id="profilePanel" class="panel active">
    <div class="profile-section">
      <div class="profile-header">
        <div class="profile-icon-display" id="profileIconDisplay">👤</div>
        <div style="flex:1;"><div class="profile-field"><label>Username</label><input type="text" id="profileUsername" placeholder="Enter username..." maxlength="20"></div></div>
      </div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim);letter-spacing:2px;">Select Icon</div>
      <div class="icon-grid" id="iconGrid"></div>
      <div class="profile-field"><label>Age</label><input type="number" id="profileAge" placeholder="Age" min="18" max="120"></div>
      <div class="profile-field"><label>Sex</label><select id="profileSex"><option value="">-- Select --</option><option value="Male">Male</option><option value="Female">Female</option><option value="Non-binary">Non-binary</option><option value="Other">Other</option></select></div>
      <div class="profile-field"><label>Likes</label><input type="text" id="profileLikes" placeholder="e.g. long walks, synthwave..." maxlength="100"></div>
      <div class="profile-field"><label>Interests</label><textarea id="profileInterests" rows="2" placeholder="Your interests..." maxlength="200"></textarea></div>
      <div class="profile-field"><label>Status</label><select id="profileStatus"><option value="Single">Single</option><option value="Looking">Looking</option><option value="It's complicated">It's complicated</option></select></div>
      <button class="btn" id="saveProfileBtn">💾 Save Profile</button>
    </div>
  </div>

  <div id="inboxPanel" class="panel"><div class="member-list" id="inboxList"></div></div>
  <div id="requestsPanel" class="panel"><div class="member-list" id="requestsList"></div></div>
  <div id="friendsPanel" class="panel"><div class="member-list" id="friendsList"></div></div>
  <div id="composePanel" class="panel">
    <div class="compose-area">
      <select id="composeContactSelect" class="select-contact"><option value="">-- Select a member --</option></select>
      <textarea id="composeMessage" class="compose-textarea" placeholder="Type your message..."></textarea>
      <button class="btn" id="sendComposeBtn">📩 Send Message</button>
    </div>
  </div>
  <div class="footer-status">
    <span id="footerMsg">⚡ CREEPER v1.0 · NIGHTFALL GAMES 1984</span>
    <button id="resetApiKeyBtn" class="reset-api">🔑 RESET API KEY</button>
  </div>
</div>

<!-- API Key Modal (Mistral) -->
<div id="apiModal" class="modal">
  <div class="modal-content">
    <h2>🔑 Mistral AI API Key</h2>
    <p>Get yours at <span style="color:#ff8833;">console.mistral.ai</span></p>
    <input type="password" id="apiKeyInput" placeholder="Enter your Mistral API key...">
    <button class="modal-btn" id="saveApiKeyBtn">Save</button>
    <button class="modal-btn" id="closeApiModalBtn">Cancel</button>
    <div class="api-note">Key stored locally. Uses Mistral AI API.</div>
  </div>
</div>

<!-- Generic Modal -->
<div id="genericModal" class="modal">
  <div class="modal-content" id="genericModalContent"></div>
</div>

  // ── UTILS ────────────────────────────────────
  function uid() { return Date.now().toString(36) + '-' + Math.random().toString(36).substr(2, 10); }
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[m]); }
  function getNpcById(id) { return npcPool.find(n => n.id === id); }
  function isBlocked(id) { return blocked.includes(id); }
  function isFriend(id) { return friends.includes(id); }
  function hasPendingRequest(id) { return friendRequests.some(r => r.npcId === id); }
  function formatTime(ts) { const d=new Date(ts), now=new Date(), diff=now-d; if(diff<60000) return 'Just now'; if(diff<3600000) return Math.floor(diff/60000)+'m ago'; if(diff<86400000) return Math.floor(diff/3600000)+'h ago'; return d.toLocaleDateString([],{month:'short',day:'numeric'}); }

  function saveAllData() {
    localStorage.setItem('creeper_user_profile', JSON.stringify(userProfile));
    localStorage.setItem('creeper_conversations', JSON.stringify(conversations));
    localStorage.setItem('creeper_friends', JSON.stringify(friends));
    localStorage.setItem('creeper_friend_requests', JSON.stringify(friendRequests));
    localStorage.setItem('creeper_blocked', JSON.stringify(blocked));
    localStorage.setItem('creeper_npc_portraits', JSON.stringify(npcPortraitUrls));
  }

    try { 
      const up=localStorage.getItem('creeper_user_profile'); if(up) userProfile=JSON.parse(up);
      const cv=localStorage.getItem('creeper_conversations'); if(cv) conversations=JSON.parse(cv);
      const fr=localStorage.getItem('creeper_friends'); if(fr) friends=JSON.parse(fr);
      const fq=localStorage.getItem('creeper_friend_requests'); if(fq) friendRequests=JSON.parse(fq);
      const bl=localStorage.getItem('creeper_blocked'); if(bl) blocked=JSON.parse(bl);
      const pt=localStorage.getItem('creeper_npc_portraits'); if(pt) npcPortraitUrls=JSON.parse(pt);
    } catch(e) { console.warn(e); }
    npcPool.forEach(n => { if(!conversations[n.id]) conversations[n.id] = []; });
  }

  // ── CUSTOM MODAL SYSTEM ──────────────────────
  function showCustomModal(contentHtml, onClose = null) {
    const modal = document.getElementById('genericModal');
    const content = document.getElementById('genericModalContent');
    content.innerHTML = contentHtml;
    modal.style.display = 'flex';
    window._closeGenericModal = function() {
      modal.style.display = 'none';
      if (onClose) onClose();
    };
    modal.onclick = function(e) {
      if (e.target === modal) window._closeGenericModal();
    };
    return modal;
  }

      document.getElementById('alertOkBtn').addEventListener('click', () => {

  // ── IMAGE GENERATION (Self‑contained Canvas) ─
  async function generateNpcPortrait(npcId) {
    if (npcPortraitUrls[npcId]) {
      console.log('📸 Using cached portrait for', npcId);
      return npcPortraitUrls[npcId];
    }
    const npc = getNpcById(npcId);
    if (!npc) return null;
    
    console.log('🎨 Generating canvas portrait for', npc.name);
    
    // Try external Pollinations first (fast, optional)
    const prompt = encodeURIComponent(
      `Portrait photo of a ${npc.sex} ${npc.age}-year-old named ${npc.name}, ${npc.personality}, ${npc.bio}. Vintage 1980s dating app photo, grainy, low resolution, slightly creepy, dark CRT screen glow.`
    );
    const pollinationsUrl = `https://image.pollinations.ai/prompt/${prompt}?width=512&height=512&seed=${npcId.replace(/\D/g, '')}`;
    
    const externalLoaded = await tryLoadImage(pollinationsUrl);
    if (externalLoaded) {
      console.log('✅ Pollinations image loaded');
      npcPortraitUrls[npcId] = pollinationsUrl;
      saveAllData();
      return pollinationsUrl;
    }
    
    // Fallback: generate a canvas avatar
    console.warn('⚠️ External image blocked or failed, using canvas avatar');
    const dataUrl = createAvatarCanvas(npc);
    npcPortraitUrls[npcId] = dataUrl;
    saveAllData();
    return dataUrl;
  }

  function tryLoadImage(url) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => resolve(true);
      img.onerror = () => resolve(false);
      img.src = url;
      setTimeout(() => resolve(false), 25000);
    });
  }

  function createAvatarCanvas(npc) {
    const size = 512;
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#0a0d0a';
    ctx.fillRect(0, 0, size, size);

    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    for (let y = 0; y < size; y += 4) {
      ctx.fillRect(0, y, size, 2);
    }

    ctx.strokeStyle = '#33ff44';
    ctx.lineWidth = 8;
    ctx.strokeRect(4, 4, size - 8, size - 8);

    ctx.font = '180px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#33ff44';
    ctx.shadowColor = '#33ff44';
    ctx.shadowBlur = 20;
    ctx.fillText(npc.icon, size / 2, size / 2 - 40);

    ctx.font = 'bold 60px "Courier New", monospace';
    ctx.shadowBlur = 10;
    const initials = npc.name.split(' ').map(w => w[0]).join('').toUpperCase().substring(0, 2);
    ctx.fillText(initials, size / 2, size / 2 + 100);

    const gradient = ctx.createRadialGradient(size/2, size/2, size*0.2, size/2, size/2, size*0.7);
    gradient.addColorStop(0, 'rgba(51,255,68,0)');
    gradient.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, size, size);

    return canvas.toDataURL('image/png');
  }

  // ── MESSAGES ─────────────────────────────────
  function addMessage(npcId, text, fromMe, extra = {}) {
    if (!conversations[npcId]) conversations[npcId] = [];
    const msg = {
      id: uid(),
      text: text || '',
      timestamp: Date.now(),
      fromMe,
      ...extra
    };
    conversations[npcId].push(msg);
    saveAllData();
  }

  function deleteMessage(npcId, msgId) {
    if (!conversations[npcId]) return;
    conversations[npcId] = conversations[npcId].filter(m => m.id !== msgId);
    saveAllData();
  }

  async function deleteConversation(npcId) {
    const confirmed = await showConfirm('Delete entire conversation?');
    if (confirmed) {
      conversations[npcId] = [];
      saveAllData();
      renderInbox();
    }
  }

  // ── MISTRAL AI INTEGRATION ─────────────────
  async function callMistralAI(systemPrompt, history, userMsg) {
    if (!mistralApiKey) throw new Error('No API key');
    const messages = [{ role: 'system', content: systemPrompt }, ...history, { role: 'user', content: userMsg }];
    const res = await fetch(MISTRAL_CHAT_ENDPOINT, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${mistralApiKey}`
      },
      body: JSON.stringify({ model: DEFAULT_MODEL, messages, temperature: 0.85, max_tokens: 90, top_p: 0.9 })
    });
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    return data.choices[0].message.content.trim();
  }

  async function generateAIResponse(npcId, userMsg) {
    const npc = getNpcById(npcId);
    if (!npc) return '[Error]';
    const history = (conversations[npcId] || []).slice(-10).map(m => ({
      role: m.fromMe ? 'user' : 'assistant',
      content: m.text || ''
    }));
    return await callMistralAI(npc.systemPrompt, history, userMsg);
  }

  // ── PERIODIC EVENTS ─────────────────────────
  let unsolicitedInterval, requestInterval, clockInterval;
  let lastUnsolicited = Date.now(), lastRequest = Date.now();

  async function maybeSendUnsolicited() {
    if (!mistralApiKey || Date.now() - lastUnsolicited < 45000) return;
    const candidates = npcPool.filter(n => !isBlocked(n.id));
    if (!candidates.length) return;
    const npc = candidates[Math.floor(Math.random() * candidates.length)];
    const msgs = conversations[npc.id] || [];
    if (msgs.slice(-1)[0] && !msgs.slice(-1)[0].fromMe && (Date.now() - msgs.slice(-1)[0].timestamp < 90000)) return;
    lastUnsolicited = Date.now();
    const prompt = `${npc.systemPrompt} You are reaching out on a dating app. Send a first message. 1-2 sentences max. No quotes.`;
    try {
      const res = await fetch(MISTRAL_CHAT_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${mistralApiKey}` },
        body: JSON.stringify({ model:DEFAULT_MODEL, messages:[{role:'system',content:prompt},{role:'user',content:'Start a conversation.'}], temperature:0.9, max_tokens:60 })
      });
      if (!res.ok) return;
      const data = await res.json();
      const txt = data.choices[0].message.content.trim();
      if (txt) {
        addMessage(npc.id, txt, false);
        renderInbox(); updateBadges();
        setFooter(`📩 New message from ${npc.name}`);
        setTimeout(() => setFooter('⚡ CREEPER v1.0'), 4000);
      }
    } catch(e) {}
  }

  async function maybeSendRequest() {
    if (!mistralApiKey || Date.now() - lastRequest < 75000) return;
    const candidates = npcPool.filter(n => !isBlocked(n.id) && !isFriend(n.id) && !hasPendingRequest(n.id));
    if (!candidates.length) return;
    const npc = candidates[Math.floor(Math.random() * candidates.length)];
    lastRequest = Date.now();
    friendRequests.push({ npcId: npc.id, timestamp: Date.now() });
    saveAllData(); updateBadges(); renderRequests();
    setFooter(`👋 ${npc.name} sent a friend request!`);
    setTimeout(() => setFooter('⚡ CREEPER v1.0'), 4000);
  }

  function renderInbox() {
    const container = document.getElementById('inboxList');
    if (!container) return;
    const active = npcPool.filter(n => !isBlocked(n.id));
    const items = active.map(n => {
      const m = conversations[n.id] || [];
      const last = m.slice(-1)[0];
      const preview = last ? (last.fromMe ? 'You: ' + (last.text || '[image]').substring(0,35) : (last.text || '[image]').substring(0,35)) : 'No messages';
      return { n, preview, time: last ? formatTime(last.timestamp) : '', ts: last ? last.timestamp : 0, has: m.length > 0 };
    }).sort((a,b) => (b.has - a.has) || b.ts - a.ts);
    container.innerHTML = items.map(i => `
      <div class="member-item" data-npc-id="${i.n.id}">
        <div class="member-icon">${i.n.icon}</div>
        <div class="member-info">
          <div class="member-name">${escapeHtml(i.n.name)} ${isFriend(i.n.id)?'💚':''}</div>
          <div class="member-preview">${escapeHtml(i.preview)}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;">
          <span class="member-time">${i.time}</span>
          <button class="action-btn block delete-conv-btn" data-npc-id="${i.n.id}" title="Delete chat">✕</button>
        </div>
      </div>`).join('');
    container.querySelectorAll('.member-item').forEach(el => el.addEventListener('click', e => {
      if (e.target.closest('.delete-conv-btn')) return;
      openChat(el.dataset.npcId);
    }));
    container.querySelectorAll('.delete-conv-btn').forEach(b => b.addEventListener('click', e => {
      e.stopPropagation();
      deleteConversation(b.dataset.npcId);
    }));
  }

      btn.id = 'viewPhotoBtn';
      btn.className = 'action-btn profile';
      btn.title = 'View photo';
      btn.textContent = '🖼️';
      btn.addEventListener('click', () => viewImage(npcPortraitUrls[npcId]));
      header.appendChild(btn);
    }
  }

  function openChat(npcId) {
    const npc = getNpcById(npcId);
    if (!npc || isBlocked(npcId)) return;
    currentOpenNpcId = npcId;
    document.getElementById('inboxPanel').innerHTML = `
      <div class="chat-view">
        <div class="chat-header">
          <button class="back-btn" id="closeChatBtn">←</button>
          <span class="chat-contact-icon">${npc.icon}</span>
          <div class="chat-contact-name">${escapeHtml(npc.name)} ${isFriend(npcId) ? '💚' : ''}</div>
        </div>
        <div class="messages-area" id="chatMessagesArea"></div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="chatInput" placeholder="Type message...">
          <button class="send-msg-btn" id="chatSendBtn">➤</button>
          <button class="action-btn profile" id="requestPhotoBtn" title="Request photo">📷</button>
        </div>
      </div>`;
    document.getElementById('inboxPanel').classList.add('active');
    chatContainer = document.getElementById('chatMessagesArea');
    renderChatMessages(npcId);
    document.getElementById('closeChatBtn').addEventListener('click', closeChat);
    document.getElementById('chatSendBtn').addEventListener('click', () => sendChatMsg(npcId));
    document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendChatMsg(npcId); });
    document.getElementById('chatInput').focus();
    document.getElementById('requestPhotoBtn').addEventListener('click', async () => {
      const btn = document.getElementById('requestPhotoBtn');
      btn.disabled = true;
      const url = await generateNpcPortrait(npcId);
      if (url) {
        addMessage(npcId, '', false, { imageUrl: url });
        renderChatMessages(npcId);
        renderInbox();
        updateChatHeaderPhotoButton(npcId);
      }
      btn.disabled = false;
    });
    updateChatHeaderPhotoButton(npcId);
  }

  function closeChat() {
    currentOpenNpcId = null;
    chatContainer = null;
    document.getElementById('inboxPanel').innerHTML = '<div class="member-list" id="inboxList"></div>';
    renderInbox();
  }

  function renderChatMessages(npcId) {
    if (!chatContainer) return;
    const msgs = conversations[npcId] || [];
    chatContainer.innerHTML = msgs.map(m => {
      if (m.imageUrl) {
        return `<div class="message-row ${m.fromMe ? 'outgoing' : 'incoming'}">
          <div class="msg-bubble img-bubble" data-image-url="${m.imageUrl.replace(/"/g, '&quot;')}">
            <img src="${m.imageUrl}" alt="Sent image">
          </div>
          <div class="delete-msg" data-msg-id="${m.id}">✕</div>
        </div>`;
      }
      return `<div class="message-row ${m.fromMe ? 'outgoing' : 'incoming'}">
        <div class="msg-bubble">${escapeHtml(m.text)}</div>
        <div class="delete-msg" data-msg-id="${m.id}">✕</div>
      </div>`;
    }).join('');
    chatContainer.querySelectorAll('.img-bubble').forEach(el => {
      el.addEventListener('click', () => {
        const imgUrl = el.dataset.imageUrl;
        if (imgUrl) viewImage(imgUrl);
      });
    });
    chatContainer.querySelectorAll('.delete-msg').forEach(b => b.addEventListener('click', () => {
      deleteMessage(npcId, b.dataset.msgId);
      renderChatMessages(npcId);
      renderInbox();
    }));
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  async function sendChatMsg(npcId) {
    const input = document.getElementById('chatInput');
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;
    input.value = ''; input.disabled = true;
    document.getElementById('chatSendBtn').disabled = true;
    addMessage(npcId, text, true);
    renderChatMessages(npcId);
    const ind = document.createElement('div');
    ind.className = 'message-row incoming typing-indicator';
    ind.innerHTML = '<div class="msg-bubble" style="display:flex;gap:4px;"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
    chatContainer.appendChild(ind);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    try {
      const reply = await generateAIResponse(npcId, text);
      if (ind.parentNode) ind.remove();
      addMessage(npcId, reply, false);
      renderChatMessages(npcId);
      renderInbox();
      if (!npcPortraitUrls[npcId]) {
        const url = await generateNpcPortrait(npcId);
        if (url) {
          addMessage(npcId, '', false, { imageUrl: url });
          renderChatMessages(npcId);
          renderInbox();
          updateChatHeaderPhotoButton(npcId);
        }
      }
    } catch (e) {
      if (ind.parentNode) ind.remove();
      addMessage(npcId, '[Transmission failed]', false);
      renderChatMessages(npcId);
    }
    input.disabled = false;
    document.getElementById('chatSendBtn').disabled = false;
    input.focus();
  }

  // ── COMPOSE ──────────────────────────────────
  async function sendComposeMsg() {
    const npcId = document.getElementById('composeContactSelect').value;
    const msg = document.getElementById('composeMessage').value.trim();
    if (!npcId || !msg || isBlocked(npcId)) return;
    addMessage(npcId, msg, true);
    document.getElementById('composeMessage').value = '';
    setFooter('📩 Sent!'); saveAllData(); renderInbox();
    document.querySelector('.tab[data-tab="inbox"]').click();
    setTimeout(() => openChat(npcId), 200);
    try {
      const reply = await generateAIResponse(npcId, msg);
      addMessage(npcId, reply, false);
      if (currentOpenNpcId === npcId) renderChatMessages(npcId);
      renderInbox();
    } catch (e) {}
  }

  // ── FRIEND MANAGEMENT ───────────────────────
  function acceptRequest(npcId) {
    friendRequests = friendRequests.filter(r => r.npcId !== npcId);
    if (!friends.includes(npcId)) friends.push(npcId);
    saveAllData(); updateBadges(); renderRequests(); renderFriends(); renderInbox(); populateCompose();
    setFooter(`✅ Now friends with ${getNpcById(npcId)?.name}!`);
  }
  function refuseRequest(npcId) {
    friendRequests = friendRequests.filter(r => r.npcId !== npcId);
    saveAllData(); updateBadges(); renderRequests(); setFooter('Request dismissed.');
  }
  function blockNpc(npcId) {
    friendRequests = friendRequests.filter(r => r.npcId !== npcId);
    friends = friends.filter(f => f !== npcId);
    if (!blocked.includes(npcId)) blocked.push(npcId);
    saveAllData(); updateBadges(); renderRequests(); renderFriends(); renderInbox(); populateCompose();
    setFooter(`🚫 Blocked ${getNpcById(npcId)?.name}.`);
  }
  function unfriend(npcId) {
    friends = friends.filter(f => f !== npcId);
    saveAllData(); renderFriends(); renderInbox(); populateCompose();
    setFooter(`Removed ${getNpcById(npcId)?.name} from friends.`);
  }

  // ── UI HELPERS ──────────────────────────────
  function setFooter(msg) { const el = document.getElementById('footerMsg'); if (el) el.textContent = msg; }
  function updateBadges() {
    const badge = document.getElementById('requestsBadge');
    if (badge) {
      if (friendRequests.length) { badge.style.display = 'flex'; badge.textContent = friendRequests.length; }
      else badge.style.display = 'none';
    }
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    const tabEl = document.querySelector(`.tab[data-tab="${tab}"]`); if (tabEl) tabEl.classList.add('active');
    const panel = document.getElementById(tab + 'Panel'); if (panel) panel.classList.add('active');
    if (tab !== 'inbox' && currentOpenNpcId) closeChat();
    if (tab === 'profile') renderProfile();
    if (tab === 'inbox') renderInbox();
    if (tab === 'requests') renderRequests();
    if (tab === 'friends') renderFriends();
    if (tab === 'compose') populateCompose();
  }

  // ── API KEY MODALS ──────────────────────────
  function openApiModal() { document.getElementById('apiModal').style.display = 'flex'; }
  function closeApiModal() { document.getElementById('apiModal').style.display = 'none'; }
  async function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (key.length > 10) {
      mistralApiKey = key;
      localStorage.setItem('mistral_api_key', key);
      closeApiModal();
      setFooter('✅ Key set. The network is alive.');
      startEvents();
    } else {
      await showAlert('Invalid Mistral API key (too short).');
    }
  }
  function resetApiKey() {
    localStorage.removeItem('mistral_api_key');
    mistralApiKey = '';
    stopEvents();
    openApiModal();
    setFooter('Key reset.');
  }

  function startEvents() {
    stopEvents();
    if (mistralApiKey) {
      unsolicitedInterval = setInterval(maybeSendUnsolicited, 45000);
      requestInterval = setInterval(maybeSendRequest, 75000);
    }
    clockInterval = setInterval(() => {
      document.getElementById('statusTime').textContent = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
    }, 1000);
  }
  function stopEvents() {
    if (unsolicitedInterval) clearInterval(unsolicitedInterval);
    if (requestInterval) clearInterval(requestInterval);
    if (clockInterval) clearInterval(clockInterval);
  }

  // ── INIT ────────────────────────────────────
  loadAllData(); initDefaultData();
  renderProfile(); renderInbox(); renderRequests(); renderFriends(); populateCompose(); updateBadges();
  if (!mistralApiKey) {
    setTimeout(openApiModal, 600);
    setFooter('⚠️ Enter Mistral AI API key.');
  } else {
    setFooter('⚡ CREEPER v1.0 · NIGHTFALL GAMES 1984');
    startEvents();
  }
  document.getElementById('statusTime').textContent = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', hour12:false });

  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
  document.getElementById('saveProfileBtn').addEventListener('click', () => { saveAllData(); setFooter('✅ Profile saved!'); });
  document.getElementById('sendComposeBtn').addEventListener('click', sendComposeMsg);
  document.getElementById('saveApiKeyBtn').addEventListener('click', saveApiKey);
  document.getElementById('closeApiModalBtn').addEventListener('click', closeApiModal);
  document.getElementById('resetApiKeyBtn').addEventListener('click', resetApiKey);
  window.addEventListener('click', e => { if (e.target === document.getElementById('apiModal')) closeApiModal(); });
</script>
</body>
</html>
