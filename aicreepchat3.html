<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CREEPER · NIGHTFALL GAMES 1984</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a08; --panel-bg: #0d0f0d; --text: #33ff44; --text-dim: #1a7a22;
      --text-bright: #66ff77; --accent: #ff8833; --accent-dim: #aa5522;
      --border: #33ff44; --border-glow: 0 0 6px #33ff4466;
      --danger: #ff4444; --danger-glow: 0 0 6px #ff444466;
      --input-bg: #111511; --button-bg: #1a2a1a; --button-hover: #1f3520;
      --font-display: 'VT323', 'Courier New', monospace;
      --font-mono: 'Share Tech Mono', 'Courier New', monospace;
      --scanline-opacity: 0.06;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050505; display: flex; justify-content: center; align-items: center;
      min-height: 100vh; font-family: var(--font-display); padding: 12px;
      background-image: radial-gradient(ellipse at center, #0a0f0a 0%, #020302 100%);
    }
    .pda {
      max-width: 440px; width: 100%; height: 88vh; max-height: 780px;
      background: #0b0d0b; border-radius: 18px; border: 3px solid #2a3a2a;
      box-shadow: 0 0 30px #33ff4422, 0 0 80px #000000aa, 0 8px 32px #000000cc, inset 0 1px 0 #ffffff08, inset 0 0 60px #00000044;
      display: flex; flex-direction: column; overflow: hidden; position: relative;
    }
    .crt-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 900;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,var(--scanline-opacity)) 0px, rgba(0,0,0,var(--scanline-opacity)) 2px, transparent 2px, transparent 5px);
      border-radius: 15px;
    }
    .crt-overlay::after {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
      border-radius: 15px; pointer-events: none;
    }
    .status-bar {
      padding: 10px 16px 8px 16px; display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font-mono); font-size: 11px; color: var(--text);
      text-shadow: 0 0 4px var(--text-dim); border-bottom: 1px solid #1a2a1a;
      background: #0a0d0a; letter-spacing: 1px; z-index: 10; position: relative;
    }
    .status-dot {
      display: inline-block; width: 7px; height: 7px; background: var(--text);
      border-radius: 50%; margin-right: 6px; animation: blinkDot 1.6s infinite;
      box-shadow: 0 0 6px var(--text);
    }
    @keyframes blinkDot { 0%, 70%, 100% { opacity: 1; } 80%, 90% { opacity: 0.2; } }
    .title-bar {
      text-align: center; padding: 10px 16px 6px 16px; font-family: var(--font-display);
      font-size: 26px; letter-spacing: 4px; color: var(--text);
      text-shadow: 0 0 12px var(--text), 0 0 24px var(--text-dim), 0 0 40px #33ff4433;
      background: #0a0d0a; border-bottom: 1px solid #1a2a1a; position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .title-bar .heart {
      font-size: 18px; animation: heartPulse 1.8s infinite;
      text-shadow: 0 0 8px #ff4466; color: #ff4466;
    }
    @keyframes heartPulse { 0%, 100% { transform: scale(1); } 15% { transform: scale(1.3); } 30% { transform: scale(1); } }
    .tabs {
      display: flex; background: #0a0d0a; border-bottom: 2px solid #1a2a1a;
      position: relative; z-index: 10; overflow-x: auto;
    }
    .tab {
      flex: 1; min-width: 45px; text-align: center; padding: 10px 2px;
      font-family: var(--font-display); font-size: 14px; letter-spacing: 1px;
      color: var(--text-dim); cursor: pointer; transition: all 0.15s;
      border-bottom: 3px solid transparent; background: transparent; white-space: nowrap; position: relative;
    }
    .tab:hover { color: var(--text); text-shadow: 0 0 6px var(--text-dim); }
    .tab.active {
      color: var(--text); border-bottom: 3px solid var(--text);
      text-shadow: 0 0 10px var(--text), 0 0 20px var(--text-dim);
      box-shadow: inset 0 -8px 12px -12px #33ff4444;
    }
    .panel {
      flex: 1; overflow-y: auto; display: none; background: var(--panel-bg);
      position: relative; z-index: 5; scrollbar-width: thin; scrollbar-color: #1a2a1a #0a0d0a;
    }
    .panel.active { display: flex; flex-direction: column; }
    .profile-section { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .profile-header { display: flex; align-items: center; gap: 14px; padding-bottom: 14px; border-bottom: 1px solid #1a2a1a; }
    .profile-icon-display {
      width: 90px; height: 90px; display: flex; align-items: center; justify-content: center;
      background: #0f140f; border-radius: 14px; border: 2px solid #1a3a1a;
      box-shadow: var(--border-glow); cursor: pointer; transition: all 0.2s;
      overflow: hidden; background-size: cover; background-position: center;
      font-size: 48px; color: var(--text);
    }
    .profile-icon-display img { width: 100%; height: 100%; object-fit: cover; }
    .profile-field { display: flex; flex-direction: column; gap: 4px; }
    .profile-field label { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
    .profile-field input, .profile-field select, .profile-field textarea {
      background: var(--input-bg); border: 1px solid #1a2a1a; border-radius: 6px;
      padding: 10px 12px; color: var(--text); font-family: var(--font-display);
      font-size: 18px; letter-spacing: 1px; outline: none; transition: all 0.2s; resize: vertical;
    }
    .profile-field input:focus, .profile-field select:focus, .profile-field textarea:focus {
      border-color: var(--text); box-shadow: var(--border-glow);
    }
    .btn {
      background: var(--button-bg); border: 2px solid #1a3a1a; padding: 10px 20px; border-radius: 6px;
      color: var(--text); cursor: pointer; font-family: var(--font-display); font-size: 18px;
      letter-spacing: 2px; text-align: center; transition: all 0.2s; text-shadow: 0 0 4px var(--text-dim); text-transform: uppercase;
    }
    .btn:hover { background: var(--button-hover); border-color: var(--text); box-shadow: var(--border-glow); }
    .btn.danger { border-color: #3a1a1a; color: var(--danger); }
    .member-list { flex: 1; }
    .member-item {
      padding: 12px 16px; border-bottom: 1px solid #151f15; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 12px; position: relative;
    }
    .member-item:hover { background: #111811; box-shadow: inset 0 0 20px #33ff4408; }
    .member-icon {
      width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; background: #0f140f; border-radius: 10px; border: 1px solid #1a2a1a;
      overflow: hidden; font-size: 32px; color: var(--text);
    }
    .member-icon img { width: 100%; height: 100%; object-fit: cover; }
    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 20px; color: var(--text); letter-spacing: 1px; text-shadow: 0 0 4px var(--text-dim); }
    .member-preview { font-size: 13px; color: var(--text-dim); font-family: var(--font-mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .member-time { font-size: 10px; color: #1a4a1a; font-family: var(--font-mono); white-space: nowrap; }
    .member-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .action-btn {
      width: 30px; height: 30px; border-radius: 50%; border: 1px solid #1a2a1a;
      background: #0f140f; cursor: pointer; font-size: 14px; display: flex;
      align-items: center; justify-content: center; transition: all 0.15s; color: var(--text); font-family: var(--font-display);
    }
    .action-btn.accept { border-color: #1a3a1a; color: var(--text); }
    .action-btn.accept:hover { background: #1a3a1a; box-shadow: var(--border-glow); }
    .action-btn.refuse { border-color: #2a2a1a; color: #aaaa44; }
    .action-btn.block { border-color: #3a1a1a; color: var(--danger); }
    .action-btn.profile { border-color: #1a2a2a; color: #44ccff; }
    .chat-view { display: flex; flex-direction: column; height: 100%; }
    .chat-header { padding: 10px 14px; background: #0a0d0a; border-bottom: 1px solid #1a2a1a; display: flex; align-items: center; gap: 10px; font-family: var(--font-display); }
    .chat-contact-name { color: var(--text); font-size: 18px; letter-spacing: 1px; flex: 1; }
    .back-btn { background: none; border: 1px solid #1a2a1a; color: var(--text); font-size: 20px; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .messages-area { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .message-row { display: flex; max-width: 82%; position: relative; }
    .incoming { align-self: flex-start; } .outgoing { align-self: flex-end; }
    .msg-bubble { padding: 8px 14px; border-radius: 14px; font-family: var(--font-mono); font-size: 13px; line-height: 1.45; word-wrap: break-word; }
    .incoming .msg-bubble { background: #101d10; color: #ccffcc; border: 1px solid #1a3a1a; border-bottom-left-radius: 3px; }
    .outgoing .msg-bubble { background: #0f1f1a; color: #d4ffd4; border: 1px solid #1a4a2a; border-bottom-right-radius: 3px; }
    .delete-msg { position: absolute; top: -6px; right: -6px; background: #1a1010; border-radius: 14px; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; color: #ff6666; opacity: 0; transition: opacity 0.15s; border: 1px solid #3a1a1a; }
    .message-row:hover .delete-msg { opacity: 1; }
    .img-bubble { padding: 4px; background: transparent; border: none; cursor: pointer; }
    .img-bubble img { max-width: 180px; max-height: 180px; border-radius: 10px; border: 2px solid #1a3a1a; box-shadow: 0 0 10px #33ff4433; }
    .typing-indicator { align-self: flex-start; background: #101d10; padding: 8px 14px; border-radius: 14px; border-bottom-left-radius: 3px; display: flex; gap: 5px; border: 1px solid #1a3a1a; }
    .typing-dot { width: 7px; height: 7px; background: var(--text-dim); border-radius: 50%; animation: typingAnim 1.3s infinite; }
    @keyframes typingAnim { 0%, 60%, 100% { transform: translateY(0); opacity: 0.3; } 30% { transform: translateY(-5px); opacity: 1; } }
    .chat-input-area { padding: 10px 12px; background: #0a0d0a; border-top: 1px solid #1a2a1a; display: flex; gap: 8px; }
    .chat-input { flex: 1; background: var(--input-bg); border: 1px solid #1a2a1a; border-radius: 20px; padding: 10px 16px; color: var(--text); font-family: var(--font-mono); font-size: 14px; outline: none; }
    .send-msg-btn { background: #1a2f1a; border: 1px solid #1a3a1a; width: 40px; height: 40px; border-radius: 50%; color: var(--text); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    .compose-area { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .select-contact { background: var(--input-bg); border: 1px solid #1a2a1a; border-radius: 8px; padding: 12px; color: var(--text); font-family: var(--font-display); font-size: 18px; outline: none; }
    .compose-textarea { background: var(--input-bg); border: 1px solid #1a2a1a; border-radius: 12px; padding: 12px; color: var(--text); font-family: var(--font-mono); font-size: 14px; outline: none; resize: vertical; min-height: 80px; }
    .footer-status { text-align: center; font-family: var(--font-mono); font-size: 9px; color: #1a3a1a; padding: 6px 10px; background: #0a0d0a; border-top: 1px solid #151f15; display: flex; justify-content: space-between; align-items: center; }
    .reset-api { background: none; border: none; color: #553333; font-size: 9px; cursor: pointer; text-decoration: underline; }
    .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; }
    .modal-content { background: #0d110d; border-radius: 16px; width: 340px; padding: 24px; text-align: center; border: 2px solid #2a3a2a; box-shadow: 0 0 40px #33ff4422; font-family: var(--font-display); }
    .modal-content h2 { color: var(--text); letter-spacing: 2px; margin-bottom: 8px; }
    .modal-content input { width: 100%; padding: 10px; margin: 12px 0; background: var(--input-bg); border: 1px solid #1a2a1a; border-radius: 8px; color: var(--text); font-family: var(--font-mono); outline: none; }
    .modal-btn { background: #1a2f1a; border: 2px solid #1a3a1a; padding: 8px 18px; border-radius: 6px; margin: 4px; cursor: pointer; color: var(--text); font-family: var(--font-display); font-size: 16px; }
    .empty-state { padding: 40px 20px; text-align: center; color: #1a3a1a; font-family: var(--font-mono); font-size: 13px; }
    .image-modal-content { max-width: 380px; width: 90%; }
    .image-modal-content img { max-width: 100%; max-height: 70vh; border-radius: 12px; border: 2px solid #1a3a1a; box-shadow: 0 0 20px #33ff4433; }
    .search-card {
      background: #0f140f; border: 1px solid #1a2a1a; border-radius: 10px; padding: 12px;
      margin-top: 10px; display: flex; align-items: center; gap: 12px; transition: all 0.15s;
    }
    .search-card:hover { background: #111811; box-shadow: inset 0 0 15px #33ff4408; }
    .search-card-thumb { width: 50px; height: 50px; border-radius: 8px; background: #0a0d0a; border: 1px solid #1a3a1a; overflow: hidden; flex-shrink: 0; }
    .search-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .search-card-info { flex: 1; }
    .search-card-info h3 { color: var(--text); font-size: 20px; letter-spacing: 1px; }
    .search-card-info p { color: var(--text-dim); font-size: 13px; }
    .search-card-actions { display: flex; gap: 6px; }
    .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #1a3a1a; border-top-color: var(--text); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="pda">
  <div class="crt-overlay"></div>
  <div class="status-bar"><span><span class="status-dot"></span>ONLINE</span><span id="statusTime">12:00</span><span class="battery">█▇▇▇ 78%</span></div>
  <div class="title-bar"><span>💀</span> CREEPER <span class="heart">♥</span><span style="display:block;font-size:9px;letter-spacing:3px;color:#1a5a1a;">NIGHTFALL GAMES 1984</span></div>
  <div class="tabs">
    <div class="tab active" data-tab="profile">👤 PROFILE</div>
    <div class="tab" data-tab="inbox">📥 INBOX</div>
    <div class="tab" data-tab="requests">👋 REQUESTS</div>
    <div class="tab" data-tab="friends">💚 FRIENDS</div>
    <div class="tab" data-tab="search">🔍 SEARCH</div>
    <div class="tab" data-tab="compose">✏️ COMPOSE</div>
  </div>

  <div id="profilePanel" class="panel active"></div>
  <div id="inboxPanel" class="panel"><div class="member-list" id="inboxList"></div></div>
  <div id="requestsPanel" class="panel"><div class="member-list" id="requestsList"></div></div>
  <div id="friendsPanel" class="panel"><div class="member-list" id="friendsList"></div></div>
  <div id="searchPanel" class="panel"><div style="padding:16px;display:flex;flex-direction:column;gap:12px;"></div></div>
  <div id="composePanel" class="panel"><div class="compose-area"></div></div>
  <div class="footer-status"><span id="footerMsg">⚡ CREEPER v2.0 · NIGHTFALL GAMES 1984</span><button id="resetApiKeyBtn" class="reset-api">🔑 RESET API KEY</button></div>
</div>

<div id="apiModal" class="modal"><div class="modal-content"><h2>🔑 Mistral AI API Key</h2><p>Get yours at <span style="color:#ff8833;">console.mistral.ai</span></p><input type="password" id="apiKeyInput" placeholder="Enter your Mistral API key..."><button class="modal-btn" id="saveApiKeyBtn">Save</button><button class="modal-btn" id="closeApiModalBtn">Cancel</button></div></div>
<div id="genericModal" class="modal"><div class="modal-content" id="genericModalContent"></div></div>

<script>
  const MISTRAL_ENDPOINT = 'https://api.mistral.ai/v1/chat/completions';
  const MODEL = 'mistral-small-latest';

  let apiKey = localStorage.getItem('mistral_api_key') || '';
  let userProfile = { username:'', age:'', sex:'', likes:'', interests:'', status:'Single', profilePicUrl:'', profilePicPrompt:'' };
  let conversations = {};
  let friends = [];
  let requests = [];
  let blocked = [];
  let npcs = [];

  const uid = () => Date.now().toString(36)+'-'+Math.random().toString(36).substr(2,10);
  const esc = str => str ? str.replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[m]) : '';
  const getNpc = id => npcs.find(n => n.id === id);
  const blockedCheck = id => blocked.includes(id);
  const isFriend = id => friends.includes(id);
  const timeAgo = ts => { const d=new Date(ts),n=new Date(),s=(n-d)/1000; return s<60?'Now':s<3600?Math.floor(s/60)+'m':s<86400?Math.floor(s/3600)+'h':d.toLocaleDateString([],{month:'short',day:'numeric'}); };

  function save() {
    try {
      localStorage.setItem('creeper_profile', JSON.stringify(userProfile));
      localStorage.setItem('creeper_convs', JSON.stringify(conversations));
      localStorage.setItem('creeper_friends', JSON.stringify(friends));
      localStorage.setItem('creeper_requests', JSON.stringify(requests));
      localStorage.setItem('creeper_blocked', JSON.stringify(blocked));
      localStorage.setItem('creeper_npcs', JSON.stringify(npcs));
    } catch(e) {}
  }

  function load() {
    try {
      userProfile = {...userProfile, ...JSON.parse(localStorage.getItem('creeper_profile')||'{}')};
      conversations = JSON.parse(localStorage.getItem('creeper_convs')||'{}');
      friends = JSON.parse(localStorage.getItem('creeper_friends')||'[]');
      requests = JSON.parse(localStorage.getItem('creeper_requests')||'[]');
      blocked = JSON.parse(localStorage.getItem('creeper_blocked')||'[]');
      npcs = JSON.parse(localStorage.getItem('creeper_npcs')||'[]');
    } catch(e){}
    npcs.forEach(n => { if(!conversations[n.id]) conversations[n.id] = []; });
  }

  function modal(html, onclose) {
    const m = document.getElementById('genericModal');
    document.getElementById('genericModalContent').innerHTML = html;
    m.style.display = 'flex';
    window._closeModal = () => { m.style.display = 'none'; if(onclose) onclose(); };
    m.onclick = e => { if(e.target===m) window._closeModal(); };
  }
  const alertModal = msg => new Promise(r => { modal(`<h2>⚠️ Notice</h2><p style="margin:16px 0;color:var(--text);">${esc(msg)}</p><button class="modal-btn" id="alertOkBtn">OK</button>`, r); document.getElementById('alertOkBtn').onclick = () => window._closeModal(); });
  const viewImage = url => modal(`<div style="max-width:380px;width:90%;"><img src="${url}" style="max-width:100%;max-height:70vh;border-radius:12px;border:2px solid #1a3a1a;"><button class="modal-btn" style="margin-top:16px;" onclick="window._closeModal()">Close</button></div>`);

  function tryLoadImage(url) {
    return new Promise(resolve => {
      const img = new Image();
      let done = false;
      const finish = (val) => { if(!done) { done = true; clearTimeout(timer); resolve(val); } };
      img.onload = () => finish(true);
      img.onerror = () => finish(false);
      img.src = url;
      const timer = setTimeout(() => finish(false), 20000);
      setTimeout(() => {}, 0);
    });
  }

  function fallbackCanvas(txt) {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0a0d0a'; ctx.fillRect(0,0,128,128);
    ctx.fillStyle = '#33ff44'; ctx.font = 'bold 48px Courier'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(txt.substring(0,2), 64, 64);
    return canvas.toDataURL();
  }

  async function generateImage(prompt) {
    const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt+', vintage 80s dating app dark CRT')}?width=512&height=512&seed=${Date.now()}`;
    if (await tryLoadImage(url)) return url;
    return fallbackCanvas(prompt.substring(0,2));
  }

  async function mistralChat(messages, maxTok=90) {
    if (!apiKey) throw new Error('No key');
    const res = await fetch(MISTRAL_ENDPOINT, {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body: JSON.stringify({ model:MODEL, messages, temperature:0.85, max_tokens:maxTok })
    });
    if (!res.ok) throw new Error('API '+res.status);
    const data = await res.json();
    return data.choices[0].message.content.trim();
  }

  function addMsg(npcId, text, fromMe, extra={}) {
    if (!conversations[npcId]) conversations[npcId] = [];
    conversations[npcId].push({ id:uid(), text, timestamp:Date.now(), fromMe, ...extra });
    save();
  }

  async function sendToNpc(npcId, userMsg) {
    const npc = getNpc(npcId);
    if (!npc) return;
    const history = conversations[npcId].slice(-10).map(m => ({ role: m.fromMe?'user':'assistant', content: m.text }));
    const reply = await mistralChat([{role:'system',content:npc.systemPrompt},...history,{role:'user',content:userMsg}]);
    addMsg(npcId, reply, false);
  }

  function renderProfile() {
    const panel = document.getElementById('profilePanel');
    panel.innerHTML = `
      <div class="profile-section">
        <div class="profile-header">
          <div class="profile-icon-display" id="profileIconDisplay">${userProfile.profilePicUrl?`<img src="${userProfile.profilePicUrl}">`:'👤'}</div>
          <div style="flex:1"><div class="profile-field"><label>Username</label><input type="text" id="profileUsername" maxlength="20" value="${esc(userProfile.username)}"></div></div>
        </div>
        <div class="profile-field"><label>Profile Picture</label><div style="display:flex;gap:8px;"><input type="text" id="profilePicPrompt" placeholder="Describe your photo..." value="${esc(userProfile.profilePicPrompt||'')}"><button class="btn" id="genPicBtn">🎨 Generate</button></div></div>
        <div class="profile-field"><label>Age</label><input type="number" id="profileAge" value="${userProfile.age||''}" min="18"></div>
        <div class="profile-field"><label>Sex</label><select id="profileSex"><option value="">--</option><option value="Male" ${userProfile.sex==='Male'?'selected':''}>Male</option><option value="Female" ${userProfile.sex==='Female'?'selected':''}>Female</option><option value="Non-binary" ${userProfile.sex==='Non-binary'?'selected':''}>Non-binary</option><option value="Other" ${userProfile.sex==='Other'?'selected':''}>Other</option></select></div>
        <div class="profile-field"><label>Likes</label><input type="text" id="profileLikes" value="${esc(userProfile.likes||'')}"></div>
        <div class="profile-field"><label>Interests</label><textarea id="profileInterests" rows="2">${esc(userProfile.interests||'')}</textarea></div>
        <div class="profile-field"><label>Status</label><select id="profileStatus"><option value="Single" ${userProfile.status==='Single'?'selected':''}>Single</option><option value="Looking" ${userProfile.status==='Looking'?'selected':''}>Looking</option><option value="It's complicated" ${userProfile.status==='It\'s complicated'?'selected':''}>It's complicated</option></select></div>
        <button class="btn" id="saveProfileBtn">💾 Save Profile</button>
      </div>`;
    document.getElementById('genPicBtn').addEventListener('click', async () => {
      const prompt = document.getElementById('profilePicPrompt').value.trim();
      if (!prompt) return alertModal('Enter a description.');
      const btn = document.getElementById('genPicBtn'); const orig = btn.textContent;
      btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span>';
      try {
        const url = await generateImage(prompt);
        userProfile.profilePicUrl = url; userProfile.profilePicPrompt = prompt; save(); renderProfile();
      } catch(e) { alertModal('Failed.'); }
      finally { btn.disabled = false; btn.textContent = orig; }
    });
    document.getElementById('saveProfileBtn').addEventListener('click', () => {
      userProfile.username = document.getElementById('profileUsername').value.trim();
      userProfile.age = document.getElementById('profileAge').value;
      userProfile.sex = document.getElementById('profileSex').value;
      userProfile.likes = document.getElementById('profileLikes').value.trim();
      userProfile.interests = document.getElementById('profileInterests').value.trim();
      userProfile.status = document.getElementById('profileStatus').value;
      save(); setFooter('✅ Profile saved');
    });
    document.getElementById('profileIconDisplay').addEventListener('click', () => userProfile.profilePicUrl && viewImage(userProfile.profilePicUrl));
  }

  function renderInbox() {
    const container = document.getElementById('inboxList');
    const active = npcs.filter(n => !blockedCheck(n.id));
    const items = active.map(n => {
      const msgs = conversations[n.id]||[];
      const last = msgs.slice(-1)[0];
      const prev = last ? (last.fromMe?'You: '+(last.text||'[img]').slice(0,35):(last.text||'[img]').slice(0,35)) : 'No messages';
      return { n, prev, time: last ? timeAgo(last.timestamp) : '', ts: last?.timestamp||0, has: msgs.length>0 };
    }).sort((a,b) => (b.has - a.has) || b.ts - a.ts);
    container.innerHTML = items.length ? items.map(i => `
      <div class="member-item" data-id="${i.n.id}">
        <div class="member-icon">${i.n.portraitUrl?`<img src="${i.n.portraitUrl}">`:'?'}</div>
        <div class="member-info"><div class="member-name">${esc(i.n.name)} ${isFriend(i.n.id)?'💚':''}</div><div class="member-preview">${esc(i.prev)}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;"><span class="member-time">${i.time}</span><button class="action-btn block del-conv-btn" data-id="${i.n.id}">✕</button></div>
      </div>`).join('') : '<div class="empty-state">Inbox empty. Use Search to find someone!</div>';
    container.querySelectorAll('.member-item').forEach(el => el.addEventListener('click', e => { if(!e.target.closest('button')) openChat(el.dataset.id); }));
    container.querySelectorAll('.del-conv-btn').forEach(b => b.addEventListener('click', async e => { e.stopPropagation(); if(await showConfirm('Delete conversation?')) { conversations[b.dataset.id] = []; save(); renderInbox(); } }));
  }

  function renderRequests() {
    const c = document.getElementById('requestsList');
    c.innerHTML = requests.length ? requests.map(r => {
      const n = getNpc(r.npcId); if(!n) return '';
      return `<div class="member-item"><div class="member-icon">${n.portraitUrl?`<img src="${n.portraitUrl}">`:'?'}</div><div class="member-info"><div class="member-name">${esc(n.name)}</div><div class="member-preview">${esc(n.bio||'')}</div></div><div class="member-actions"><button class="action-btn accept accept-btn" data-id="${r.npcId}">✓</button><button class="action-btn refuse refuse-btn" data-id="${r.npcId}">✗</button><button class="action-btn block block-btn" data-id="${r.npcId}">🚫</button></div></div>`;
    }).join('') : '<div class="empty-state">No pending requests.</div>';
    c.querySelectorAll('.accept-btn').forEach(b => b.addEventListener('click', () => acceptReq(b.dataset.id)));
    c.querySelectorAll('.refuse-btn').forEach(b => b.addEventListener('click', () => refuseReq(b.dataset.id)));
    c.querySelectorAll('.block-btn').forEach(b => b.addEventListener('click', () => blockNpc(b.dataset.id)));
  }

  function renderFriends() {
    const c = document.getElementById('friendsList');
    const list = npcs.filter(n => friends.includes(n.id) && !blockedCheck(n.id));
    c.innerHTML = list.length ? list.map(n => `
      <div class="member-item" data-id="${n.id}"><div class="member-icon">${n.portraitUrl?`<img src="${n.portraitUrl}">`:'?'}</div><div class="member-info"><div class="member-name">${esc(n.name)} 💚</div><div class="member-preview">${esc(n.bio||'')}</div></div><div class="member-actions"><button class="action-btn accept chat-friend-btn" data-id="${n.id}">💬</button><button class="action-btn block unfriend-btn" data-id="${n.id}">✕</button></div></div>`).join('') : '<div class="empty-state">No friends yet.</div>';
    c.querySelectorAll('.member-item').forEach(el => el.addEventListener('click', e => { if(!e.target.closest('button')) openChat(el.dataset.id); }));
    c.querySelectorAll('.chat-friend-btn').forEach(b => b.addEventListener('click', () => openChat(b.dataset.id)));
    c.querySelectorAll('.unfriend-btn').forEach(b => b.addEventListener('click', () => unfriend(b.dataset.id)));
  }

  function renderSearch() {
    const panel = document.getElementById('searchPanel');
    panel.innerHTML = `
      <div style="padding:16px;display:flex;flex-direction:column;gap:12px;">
        <div class="profile-field"><label>Age</label><div style="display:flex;gap:8px;"><input type="number" id="sAgeMin" placeholder="Min" min="18" style="flex:1"><input type="number" id="sAgeMax" placeholder="Max" min="18" style="flex:1"></div></div>
        <div class="profile-field"><label>Sex</label><select id="sSex"><option value="">Any</option><option>Male</option><option>Female</option><option>Non-binary</option></select></div>
        <div class="profile-field"><label>Interests</label><input type="text" id="sInterests" placeholder="e.g. music, hiking"></div>
        <div class="profile-field"><label>Personality</label><input type="text" id="sPersonality" placeholder="e.g. romantic, funny"></div>
        <button class="btn" id="searchBtn">🔍 Search</button>
        <div id="searchResults"></div>
      </div>`;
    document.getElementById('searchBtn').addEventListener('click', performSearch);
  }

  function renderCompose() {
    const panel = document.getElementById('composePanel');
    const avail = npcs.filter(n => !blockedCheck(n.id));
    panel.innerHTML = `
      <div class="compose-area">
        <select id="composeSelect" class="select-contact"><option value="">-- Select a member --</option>${avail.map(n => `<option value="${n.id}">${esc(n.name)} (${n.age||'??'} ${n.sex||''})${isFriend(n.id)?' 💚':''}</option>`).join('')}</select>
        <textarea id="composeMsg" class="compose-textarea" placeholder="Type your message..."></textarea>
        <button class="btn" id="sendComposeBtn">📩 Send Message</button>
      </div>`;
    document.getElementById('sendComposeBtn').addEventListener('click', sendComposeMsg);
  }

  let currentChat = null, chatArea = null;

  function openChat(npcId) {
    const npc = getNpc(npcId); if (!npc || blockedCheck(npcId)) return;
    currentChat = npcId;
    document.getElementById('inboxPanel').innerHTML = `
      <div class="chat-view">
        <div class="chat-header">
          <button class="back-btn" id="closeChatBtn">←</button>
          <div class="member-icon" style="width:36px;height:36px;cursor:pointer;">
            ${npc.portraitUrl ? `<img src="${npc.portraitUrl}" alt="${esc(npc.name)}">` : '?'}
          </div>
          <div class="chat-contact-name">${esc(npc.name)} ${isFriend(npcId) ? '💚' : ''}</div>
        </div>
        <div class="messages-area" id="chatMessagesArea"></div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="chatInput" placeholder="Message...">
          <button class="send-msg-btn" id="chatSendBtn">➤</button>
        </div>
      </div>`;
    document.getElementById('inboxPanel').classList.add('active');
    chatArea = document.getElementById('chatMessagesArea');
    renderChatMessages(npcId);

    const headerIcon = document.querySelector('.chat-header .member-icon');
    if (headerIcon && npc.portraitUrl) {
      headerIcon.addEventListener('click', () => viewImage(npc.portraitUrl));
    }

    document.getElementById('closeChatBtn').addEventListener('click', closeChat);
    document.getElementById('chatSendBtn').addEventListener('click', () => sendChatMsg(npcId));
    document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendChatMsg(npcId); });
    document.getElementById('chatInput').focus();
  }

  function closeChat() { currentChat = null; chatArea = null; document.getElementById('inboxPanel').innerHTML = '<div class="member-list" id="inboxList"></div>'; renderInbox(); }

  function renderChatMessages(npcId) {
    if (!chatArea) return;
    const msgs = conversations[npcId]||[];
    chatArea.innerHTML = msgs.map(m => m.imageUrl ? `<div class="message-row ${m.fromMe?'outgoing':'incoming'}"><div class="msg-bubble img-bubble" data-url="${m.imageUrl}"><img src="${m.imageUrl}"></div><div class="delete-msg" data-id="${m.id}">✕</div></div>` : `<div class="message-row ${m.fromMe?'outgoing':'incoming'}"><div class="msg-bubble">${esc(m.text)}</div><div class="delete-msg" data-id="${m.id}">✕</div></div>`).join('');
    chatArea.querySelectorAll('.img-bubble').forEach(el => el.addEventListener('click', () => viewImage(el.dataset.url)));
    chatArea.querySelectorAll('.delete-msg').forEach(b => b.addEventListener('click', () => { deleteMsg(npcId, b.dataset.id); renderChatMessages(npcId); renderInbox(); }));
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  async function sendChatMsg(npcId) {
    const input = document.getElementById('chatInput'); if(!input) return;
    const text = input.value.trim(); if(!text) return;
    input.value = ''; input.disabled = true; document.getElementById('chatSendBtn').disabled = true;
    addMsg(npcId, text, true); renderChatMessages(npcId);
    const ind = document.createElement('div'); ind.className = 'message-row incoming typing-indicator'; ind.innerHTML = '<div class="msg-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
    chatArea.appendChild(ind); chatArea.scrollTop = chatArea.scrollHeight;
    try {
      await sendToNpc(npcId, text);
      if (ind.parentNode) ind.remove(); renderChatMessages(npcId); renderInbox();
    } catch(e) {
      if (ind.parentNode) ind.remove();
      // Do nothing – error completely hidden
    }
    input.disabled = false; document.getElementById('chatSendBtn').disabled = false; input.focus();
  }

  function deleteMsg(npcId, msgId) { conversations[npcId] = conversations[npcId].filter(m => m.id!==msgId); save(); }

  async function sendComposeMsg() {
    const npcId = document.getElementById('composeSelect').value;
    const msg = document.getElementById('composeMsg').value.trim();
    if (!npcId || !msg || blockedCheck(npcId)) return;
    addMsg(npcId, msg, true); document.getElementById('composeMsg').value = '';
    save(); renderInbox();
    switchTab('inbox'); setTimeout(() => openChat(npcId), 200);
    try { await sendToNpc(npcId, msg); if(currentChat===npcId) renderChatMessages(npcId); renderInbox(); } catch(e) {}
  }

  function acceptReq(id) { requests = requests.filter(r => r.npcId!==id); if(!friends.includes(id)) friends.push(id); save(); renderRequests(); renderFriends(); renderInbox(); }
  function refuseReq(id) { requests = requests.filter(r => r.npcId!==id); save(); renderRequests(); }
  function blockNpc(id) { requests = requests.filter(r => r.npcId!==id); friends = friends.filter(f => f!==id); if(!blocked.includes(id)) blocked.push(id); save(); renderRequests(); renderFriends(); renderInbox(); }
  function unfriend(id) { friends = friends.filter(f => f!==id); save(); renderFriends(); renderInbox(); }

  function showConfirm(msg) { return new Promise(resolve => { modal(`<h2>❓ Confirm</h2><p style="margin:16px 0;color:var(--text);">${esc(msg)}</p><button class="modal-btn" id="yesBtn">Yes</button><button class="modal-btn" id="noBtn">No</button>`); document.getElementById('yesBtn').onclick = () => { window._closeModal(); resolve(true); }; document.getElementById('noBtn').onclick = () => { window._closeModal(); resolve(false); }; }); }

  function setFooter(msg) { document.getElementById('footerMsg').textContent = msg; }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
    const panel = document.getElementById(tab+'Panel'); if(panel) panel.classList.add('active');
    if(tab!=='inbox' && currentChat) closeChat();
    if(tab==='profile') renderProfile();
    else if(tab==='inbox') renderInbox();
    else if(tab==='requests') renderRequests();
    else if(tab==='friends') renderFriends();
    else if(tab==='search') renderSearch();
    else if(tab==='compose') renderCompose();
  }

  async function performSearch() {
    const min = document.getElementById('sAgeMin').value || '18';
    const max = document.getElementById('sAgeMax').value || '99';
    const sex = document.getElementById('sSex').value;
    const interests = document.getElementById('sInterests').value.trim();
    const personality = document.getElementById('sPersonality').value.trim();
    const btn = document.getElementById('searchBtn'); const orig = btn.textContent;
    btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span> Searching...';
    const resultsDiv = document.getElementById('searchResults');
    resultsDiv.innerHTML = '';
    try {
      const prompt = `Generate 1 dating app profile as a JSON object with fields: name, age, sex, bio, interests, personality, systemPrompt (a short instruction for AI roleplay). Age ${min}-${max}, ${sex?'sex '+sex:'any sex'}, ${interests?'interests: '+interests:''}, ${personality?'personality: '+personality:''}. Output only the JSON object.`;
      const response = await mistralChat([{role:'user',content:prompt}], 400);
      const json = response.replace(/```json|```/g, '').trim();
      const profile = JSON.parse(json);

      await new Promise(r => setTimeout(r, 10));
      resultsDiv.innerHTML = '<p style="color:var(--text-dim);">Generating profile picture...</p>';
      const portraitUrl = await generateImage(`Portrait of ${profile.name}, ${profile.age}yo ${profile.sex}, ${profile.personality}. Vintage 80s dating app photo.`);

      const npc = { id: uid(), ...profile, portraitUrl };
      const card = document.createElement('div'); card.className = 'search-card';
      card.innerHTML = `<div class="search-card-thumb"><img src="${npc.portraitUrl}"></div><div class="search-card-info"><h3>${esc(npc.name)}, ${npc.age}</h3><p>${esc(npc.bio||'')}</p></div><div class="search-card-actions"><button class="action-btn accept add-btn" title="Add & Chat">✓</button></div>`;
      card.querySelector('.add-btn').addEventListener('click', () => {
        npcs.push(npc); conversations[npc.id] = []; friends.push(npc.id); save();
        renderInbox(); renderFriends(); renderCompose(); switchTab('inbox'); openChat(npc.id);
      });
      resultsDiv.innerHTML = '';
      resultsDiv.appendChild(card);
    } catch(e) {
      console.error(e);
      resultsDiv.innerHTML = '<p style="color:var(--danger);">Search failed. Check console.</p>';
    } finally { btn.disabled = false; btn.textContent = orig; }
  }

  // ── INIT ──
  load();
  renderProfile(); renderInbox(); renderRequests(); renderFriends(); renderSearch(); renderCompose();
  setFooter(apiKey ? '⚡ CREEPER v2.0' : '⚠️ Enter API key');
  document.getElementById('statusTime').textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',hour12:false});
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

  function openApiModal() { document.getElementById('apiModal').style.display='flex'; }
  function closeApiModal() { document.getElementById('apiModal').style.display='none'; }
  document.getElementById('saveApiKeyBtn').addEventListener('click', async () => {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (key.length>10) { apiKey = key; localStorage.setItem('mistral_api_key', key); closeApiModal(); setFooter('✅ Key set'); }
    else await alertModal('Invalid key');
  });
  document.getElementById('closeApiModalBtn').addEventListener('click', closeApiModal);
  document.getElementById('resetApiKeyBtn').addEventListener('click', () => { localStorage.removeItem('mistral_api_key'); apiKey=''; openApiModal(); setFooter('Key reset'); });
  if (!apiKey) setTimeout(openApiModal, 600);
  window.addEventListener('click', e => { if(e.target===document.getElementById('apiModal')) closeApiModal(); });
</script>
</body>
</html>
