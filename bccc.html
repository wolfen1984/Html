<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BLOOD CIRCUIT • Nightfall Games 1984</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;      /* small padding on mobile, but image stays centered */
            overflow: auto;
        }

        /* ----- PERFECT RESPONSIVE CONTAINER (no aspect-ratio issues) ----- */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 640px;           /* original width, but scales down */
            /* Padding-bottom = (height / width) * 100% → 520/640 = 0.8125 = 81.25% */
            padding-bottom: 81.25%;     /* creates exact 640:520 aspect ratio */
            height: 0;                  /* height is derived from padding */
            background-image: url('bcbk.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            /* remove any possible border or outline */
            border: none;
            outline: none;
            box-shadow: none;
            overflow: hidden;
            margin: 0 auto;
        }

        /* All absolute positioned elements now sit inside the responsive container */
        #gameplay-window {
            position: absolute;
            top: 28.8462%;      /* 150 / 520 */
            left: 25.78125%;    /* 165 / 640 */
            width: 46.875%;     /* 300 / 640 */
            height: 46.1538%;   /* 240 / 520 */
            background: #001100;
            color: #00ccff;
            font-family: 'VT323', monospace;
            font-size: 18px;
            line-height: 1.35;
            padding: 18px 22px;
            overflow-y: auto;
            border: 3px solid #003366;
            box-shadow: 
                inset 0 0 30px rgba(0, 200, 255, 0.6),
                0 0 15px rgba(0, 200, 255, 0.4);
            text-shadow: 0 0 8px #00ccff;
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: break-word;
        }

        /* scrollbar styling (unchanged) */
        #gameplay-window::-webkit-scrollbar {
            width: 10px;
        }
        #gameplay-window::-webkit-scrollbar-track {
            background: #001122;
            border-radius: 0px;
        }
        #gameplay-window::-webkit-scrollbar-thumb {
            background: #44ccff;
            box-shadow: 0 0 8px #44ccff;
        }
        #gameplay-window::-webkit-scrollbar-thumb:hover {
            background: #88ddff;
        }

        /* Retro CRT scanline effect */
        #gameplay-window::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0, 255, 0, 0.08) 3px,
                rgba(0, 255, 0, 0.08) 6px
            );
            pointer-events: none;
            z-index: 2;
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        /* OVERLAY BUTTONS — positions in % (converted from original pixels) */
        .ui-button {
            position: absolute;
            background: transparent;
            border: none;
            color: #ff0000;
            font-family: 'VT323', monospace;
            font-size: 19px;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 0 12px #ff0000;
            cursor: pointer;
            transition: all 0.1s ease;
            letter-spacing: 2px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }

        .ui-button:hover {
            color: #ff4444;
            text-shadow: 0 0 20px #ff0000;
            transform: scale(1.05);
        }

        /* Exact button positions (relative to container) */
        #btn-view-map  { top: 79.2308%; left: 28.90625%; width: 23.125%; height: 8.84615%; }
        #btn-bio-link  { top: 79.2308%; left: 46.875%;   width: 23.125%; height: 8.84615%; }
        #btn-data-chip { top: 84.91538%; left: 28.90625%; width: 23.125%; height: 8.84615%; }
        #btn-action    { top: 84.61538%; left: 46.875%;   width: 23.125%; height: 8.84615%; }

        /* Text wrapping inside gameplay window (original) */
        #gameplay-window pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            max-width: 100%;
            font-size: 14px;
        }

        #gameplay-window {
            text-align: left;
        }

        /* small screens: slightly reduce font size inside window for better fit */
        @media (max-width: 500px) {
            #gameplay-window {
                font-size: 15px;
                padding: 12px 16px;
            }
            .ui-button {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- GAMEPLAY TEXT WINDOW (over the black screen in your PNG) -->
    <div id="gameplay-window">
        <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">BLOOD CIRCUIT v1.0 [1984]</div>SYSTEM STATUS: ONLINE<br>UNIT-9 CELL_INTERFACE_ACTIVE<br>ENHANCEMENT_PROTOCOL_LOCKED<br>AWAITING MISSION OBJECTIVE...<br><br>The final transmission from Sector 9 is still being deciphered.<br><br><span style="color:#ff8800;">Caution: Cyber-link integrity is at 89%.</span><br><br><span style="color:#00ccff;">► Click any button below to interact...</span>
    </div>

    <!-- FOUR BUTTONS OVERLAID ON YOUR PNG'S BUTTONS -->
    <button id="btn-view-map"  class="ui-button">VIEW MAP</button>
    <button id="btn-bio-link"  class="ui-button">BIO-LINK</button>
    <button id="btn-data-chip" class="ui-button">DATA CHIP</button>
    <button id="btn-action"    class="ui-button">ACTION</button>
</div>

<script>
    // ********** ORIGINAL GAMEPLAY CODE – COMPLETELY UNCHANGED **********
    const windowEl = document.getElementById('gameplay-window');
    let decipherProgress = 34;
    let cyberIntegrity = 89;
    let storyStage = 0;

    const storyMessages = [
        "Neural jack engaged. The grid pulses beneath your skin...",
        "Sector 9 transmission fragment received: \"They built the circuit with our blood...\"",
        "WARNING: Corporate ICE detected. Countermeasures online.",
        "You feel the Blood Circuit trying to pull you in..."
    ];

    function updateWindow(html) {
        windowEl.innerHTML = html;
        windowEl.scrollTop = 0;
    }

    // VIEW MAP
    document.getElementById('btn-view-map').addEventListener('click', () => {
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">SECTOR GRID MAP</div><pre style="font-size:17px; line-height:1.2; color:#00ffcc;">
╔════════════════════════════════════╗
║  SECTOR 1  │  CORPORATE HUB      ║ ONLINE
║  SECTOR 2  │  NEON UNDERCITY     ║ ONLINE
║  SECTOR 3  │  BLACK MARKET       ║ OFFLINE
║  SECTOR 7  │  RUINED DATACORE    ║ COMPROMISED
║  SECTOR 9  │  FORBIDDEN ZONE     ║ SIGNAL LEAKING
╚════════════════════════════════════╝
            </pre>
            <p style="color:#ff8800; margin-top:8px;">Transmission source traced to Sector 9.</p>
        `);
    });

    // BIO-LINK
    document.getElementById('btn-bio-link').addEventListener('click', () => {
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">BIO-LINK STATUS [UNIT-9]</div><pre style="font-size:17px; line-height:1.3; color:#00ff00;">
NEURAL SYNC: 97% ✓
ADRENALINE BOOST: ACTIVE
MEMORY IMPLANT: 12.4TB USED
CYBERWARE: Neural Jack v2.1 + Data Blade
            </pre>
            <p style="color:#ff8800;">Cyber-link integrity: ${cyberIntegrity}%</p>
        `);
    });

    // DATA CHIP
    document.getElementById('btn-data-chip').addEventListener('click', () => {
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">DATA CHIP CONTENTS</div><pre style="font-size:16px; color:#00ccff;">
1. FRAGMENT_001.txt → "The circuit was never meant to be escaped..."
2. COORDS_SECTOR9.enc → [DECRYPTED 67%]
3. LOG_1984_09-17 → Nightfall Games internal memo
            </pre>
        `);
    });

    // ACTION — advances the story
    document.getElementById('btn-action').addEventListener('click', () => {
        decipherProgress = Math.min(100, decipherProgress + Math.floor(Math.random() * 18) + 8);
        cyberIntegrity = Math.max(65, cyberIntegrity - (Math.random() * 4 + 1));
        storyStage = Math.min(storyStage + 1, storyMessages.length - 1);

        let html = `
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">ACTION EXECUTED</div><p style="color:#ffff00;">SIGNAL BOOSTED → Sector 9</p>
            <p>Decipher progress: <span style="color:#00ff00;">${decipherProgress}%</span></p>
            <p>Cyber-link integrity: <span style="color:#ff8800;">${Math.floor(cyberIntegrity)}%</span></p>
            <p style="margin-top:12px;">${storyMessages[storyStage]}</p>
        `;

        if (decipherProgress >= 100) {
            html += `<p style="color:#ffff00; font-size:22px; text-align:center; margin-top:20px;">
                    TRANSMISSION FULLY DECODED!<br>
                    THE BLOOD CIRCUIT IS YOURS.
                </p>
            `;
            setTimeout(() => alert("🎉 NIGHTFALL PROTOCOL COMPLETE 🎉\n\nYou have successfully hacked the grid."), 600);
        }

        updateWindow(html);
    });

    // Clicking the gameplay window returns to default status
    windowEl.addEventListener('click', () => {
        updateWindow(`
            <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:22px; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">
                BLOOD CIRCUIT v1.0 [1984]
            </div>
            SYSTEM STATUS: ONLINE<br>
            UNIT-9 CELL_INTERFACE_ACTIVE<br>
            ENHANCEMENT_PROTOCOL_LOCKED<br>
            AWAITING MISSION OBJECTIVE...<br><br>
            The final transmission from Sector 9 is still being deciphered.<br><br>
            <span style="color:#ff8800;">Caution: Cyber-link integrity is at ${Math.floor(cyberIntegrity)}%.</span><br><br>
            <span style="color:#00ccff;">► Click any button below...</span>
        `);
    });
</script>
</body>
</html>
