<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- improved viewport: ensures proper scaling on mobile, disables unwanted zoom interference but preserves accessibility -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BLOOD CIRCUIT • Nightfall Games 1984</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* removes android tap grey flash */
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'VT323', monospace;
            padding: 16px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* ---------- RESPONSIVE GAME CONTAINER ---------- */
        /* instead of fixed pixel dimensions, we use proportional aspect-ratio scaling
           all child absolute positions are percentage-based → perfect alignment on ANY screen */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 640px;          /* original PNG reference width */
            aspect-ratio: 640 / 520;   /* keeps exact ratio of the background image */
            background-image: url('Gemini_Generated_Image_k1knd9k1knd9k1kn.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            /* subtle pixelated edge preservation */
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            box-shadow: 0 0 0 2px rgba(0, 255, 255, 0.2);
            margin: 0 auto;
        }

        /* MAIN GAMEPLAY DIALOGUE BOX — now uses fluid percentages derived from original pixel positions
           Original values (on 640x520 canvas): top:150px left:165px width:300px height:240px
           → percentages relative to container dimensions */
        #gameplay-window {
            position: absolute;
            top: 28.8462%;      /* 150 / 520 */
            left: 25.78125%;    /* 165 / 640 */
            width: 46.875%;     /* 300 / 640 */
            height: 46.1538%;   /* 240 / 520 */
            background: #001100;
            color: #00ccff;
            font-family: 'VT323', monospace;
            font-size: clamp(12px, 3.8vw, 18px);  /* scales on mobile, but stays readable */
            line-height: 1.35;
            padding: 12px 16px;
            overflow-y: auto;
            border: 2px solid #003366;
            box-shadow: inset 0 0 30px rgba(0, 200, 255, 0.6), 0 0 15px rgba(0, 200, 255, 0.4);
            text-shadow: 0 0 8px #00ccff;
            white-space: pre-wrap;
            word-break: break-word;
            scrollbar-width: thin;    /* for Firefox */
            transition: all 0.1s ease;
        }

        /* custom scrollbar (works on android webkit) */
        #gameplay-window::-webkit-scrollbar {
            width: 8px;
        }
        #gameplay-window::-webkit-scrollbar-track {
            background: #001122;
            border-radius: 0px;
        }
        #gameplay-window::-webkit-scrollbar-thumb {
            background: #44ccff;
            box-shadow: 0 0 6px #44ccff;
            border-radius: 2px;
        }
        #gameplay-window::-webkit-scrollbar-thumb:hover {
            background: #88ddff;
        }

        /* CRT scanline overlay (relative to window) */
        #gameplay-window::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0, 255, 0, 0.08) 3px,
                rgba(0, 255, 0, 0.08) 6px
            );
            pointer-events: none;
            z-index: 2;
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        /* ensure any pre or block content wraps inside gameplay window */
        #gameplay-window pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.9em;
            margin: 0;
        }

        /* OVERLAY BUTTONS — positions converted to % to match PNG exactly on any scale */
        .ui-button {
            position: absolute;
            background: transparent;
            border: none;
            color: #ff0000;
            font-family: 'VT323', monospace;
            font-size: clamp(14px, 4vw, 20px);
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 0 12px #ff0000;
            cursor: pointer;
            transition: all 0.1s ease;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 15;
            padding: 0;
            margin: 0;
            backdrop-filter: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* interactive feedback for touch/desktop */
        .ui-button:active {
            transform: scale(0.96);
            color: #ff8888;
            text-shadow: 0 0 18px #ff4444;
        }

        .ui-button:hover {
            color: #ff4444;
            text-shadow: 0 0 20px #ff0000;
            transform: scale(1.02);
        }

        /* BUTTON POSITIONS (exact match to the retro UI layout) 
           All derived from original px measurements: 
           - view-map: top 412px (79.2308%), left 185px (28.90625%), width 148px (23.125%), height 46px (8.84615%)
           - bio-link: top 412px, left 300px (46.875%), same width/height
           - data-chip: top 440px (84.61538%), left 185px (28.90625%)
           - action: top 440px, left 300px (46.875%)
        */
        #btn-view-map {
            top: 79.2308%;
            left: 28.90625%;
            width: 23.125%;
            height: 8.84615%;
        }
        #btn-bio-link {
            top: 79.2308%;
            left: 46.875%;
            width: 23.125%;
            height: 8.84615%;
        }
        #btn-data-chip {
            top: 84.61538%;
            left: 28.90625%;
            width: 23.125%;
            height: 8.84615%;
        }
        #btn-action {
            top: 84.61538%;
            left: 46.875%;
            width: 23.125%;
            height: 8.84615%;
        }

        /* Extra small devices (compact phones): adjust font & padding inside window for better readability */
        @media (max-width: 500px) {
            #gameplay-window {
                padding: 8px 12px;
                font-size: clamp(11px, 3.5vw, 16px);
                line-height: 1.3;
            }
            .ui-button {
                font-size: clamp(12px, 3.8vw, 18px);
                letter-spacing: 1px;
            }
        }

        /* very narrow screens: keep layout integrity */
        @media (max-width: 380px) {
            #gameplay-window {
                padding: 6px 10px;
                font-size: 11px;
            }
            .ui-button {
                font-size: 11px;
                letter-spacing: 0.5px;
            }
        }

        /* make sure the container never clips buttons on small landscape */
        @media (max-height: 480px) and (orientation: landscape) {
            body {
                padding: 8px;
            }
            #gameplay-window {
                overflow-y: auto;
            }
        }

        /* maintain crisp text without extra margin inside window */
        #gameplay-window div, #gameplay-window p, #gameplay-window span {
            max-width: 100%;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- gameplay text window: dynamically updated by JS -->
    <div id="gameplay-window">
        <div style="color:#ff0000; text-align:center; margin-bottom:10px; font-size:1.3em; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:5px;">BLOOD CIRCUIT v1.0 [1984]</div>
        SYSTEM STATUS: ONLINE<br>
        UNIT-9 CELL_INTERFACE_ACTIVE<br>
        ENHANCEMENT_PROTOCOL_LOCKED<br>
        AWAITING MISSION OBJECTIVE...<br><br>
        The final transmission from Sector 9 is still being deciphered.<br><br>
        <span style="color:#ff8800;">Caution: Cyber-link integrity is at 89%.</span><br><br>
        <span style="color:#00ccff;">► Click any button below to interact...</span>
    </div>

    <!-- four interactive buttons overlaying the PNG artwork -->
    <button id="btn-view-map" class="ui-button">VIEW MAP</button>
    <button id="btn-bio-link" class="ui-button">BIO-LINK</button>
    <button id="btn-data-chip" class="ui-button">DATA CHIP</button>
    <button id="btn-action" class="ui-button">ACTION</button>
</div>

<script>
    (function() {
        // --- GAME STATE (preserves all original mechanics & atmosphere) ---
        const windowEl = document.getElementById('gameplay-window');
        let decipherProgress = 34;
        let cyberIntegrity = 89;
        let storyStage = 0;

        const storyMessages = [
            "Neural jack engaged. The grid pulses beneath your skin...",
            "Sector 9 transmission fragment received: \"They built the circuit with our blood...\"",
            "WARNING: Corporate ICE detected. Countermeasures online.",
            "You feel the Blood Circuit trying to pull you in..."
        ];

        // helper: updates the dialogue area with HTML, scrolls to top for readability
        function updateWindow(html) {
            windowEl.innerHTML = html;
            windowEl.scrollTop = 0;
        }

        // --- VIEW MAP: shows sector grid overlay ---
        document.getElementById('btn-view-map').addEventListener('click', (e) => {
            e.preventDefault();
            updateWindow(`
                <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:1.3em; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">SECTOR GRID MAP</div>
                <pre style="font-size:0.9em; line-height:1.25; color:#00ffcc; margin:0 0 8px 0;">
╔════════════════════════════════════╗
║  SECTOR 1  │  CORPORATE HUB      ║ ONLINE
║  SECTOR 2  │  NEON UNDERCITY     ║ ONLINE
║  SECTOR 3  │  BLACK MARKET       ║ OFFLINE
║  SECTOR 7  │  RUINED DATACORE    ║ COMPROMISED
║  SECTOR 9  │  FORBIDDEN ZONE     ║ SIGNAL LEAKING
╚════════════════════════════════════╝
                </pre>
                <p style="color:#ff8800; margin-top:6px;">Transmission source traced to Sector 9.</p>
                <span style="color:#00ccff;">▸ Tap any button to continue exploration</span>
            `);
        });

        // --- BIO-LINK: shows neural status and integrity ---
        document.getElementById('btn-bio-link').addEventListener('click', (e) => {
            e.preventDefault();
            updateWindow(`
                <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:1.3em; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">BIO-LINK STATUS [UNIT-9]</div>
                <pre style="font-size:0.9em; line-height:1.3; color:#00ff00; margin:0;">
NEURAL SYNC: 97% ✓
ADRENALINE BOOST: ACTIVE
MEMORY IMPLANT: 12.4TB USED
CYBERWARE: Neural Jack v2.1 + Data Blade
                </pre>
                <p style="color:#ff8800; margin-top:10px;">Cyber-link integrity: ${Math.floor(cyberIntegrity)}%</p>
                <span style="color:#00ccff;">▸ Bio-feed stable. Awaiting command.</span>
            `);
        });

        // --- DATA CHIP: shows encrypted fragments ---
        document.getElementById('btn-data-chip').addEventListener('click', (e) => {
            e.preventDefault();
            updateWindow(`
                <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:1.3em; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">DATA CHIP CONTENTS</div>
                <pre style="font-size:0.85em; color:#00ccff; margin:0 0 8px 0;">
1. FRAGMENT_001.txt → "The circuit was never meant to be escaped..."
2. COORDS_SECTOR9.enc → [DECRYPTED 67%]
3. LOG_1984_09-17 → Nightfall Games internal memo
                </pre>
                <p style="color:#88ff88;">Decryption key progress: ${decipherProgress}%</p>
                <span style="color:#00ccff;">▸ Additional data requires higher clearance.</span>
            `);
        });

        // --- ACTION: advances the main storyline, updates integrity and decipher progress ---
        document.getElementById('btn-action').addEventListener('click', (e) => {
            e.preventDefault();
            // simulate signal boosting and story evolution
            decipherProgress = Math.min(100, decipherProgress + Math.floor(Math.random() * 18) + 8);
            cyberIntegrity = Math.max(65, cyberIntegrity - (Math.random() * 4 + 1));
            storyStage = Math.min(storyStage + 1, storyMessages.length - 1);

            let html = `
                <div style="color:#ff0000; text-align:center; margin-bottom:12px; font-size:1.3em; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:6px;">ACTION EXECUTED</div>
                <p style="color:#ffff00;">🔺 SIGNAL BOOSTED → Sector 9 uplink active</p>
                <p>📡 Decipher progress: <span style="color:#00ff00; font-weight:bold;">${decipherProgress}%</span></p>
                <p>⚡ Cyber-link integrity: <span style="color:#ff8800;">${Math.floor(cyberIntegrity)}%</span></p>
                <p style="margin-top:12px; border-left: 3px solid #ff0000; padding-left: 8px;">📟 ${storyMessages[storyStage]}</p>
            `;

            // win condition: transmission fully decoded
            if (decipherProgress >= 100) {
                html += `<p style="color:#ffff00; font-size:1.3em; text-align:center; margin-top:20px; text-shadow:0 0 5px #ffaa00;">
                        ═══════════════════════════════<br>
                        🧬 TRANSMISSION FULLY DECODED! 🧬<br>
                        THE BLOOD CIRCUIT IS YOURS.<br>
                        ═══════════════════════════════
                    </p>`;
                // small celebration alert (non-intrusive)
                setTimeout(() => {
                    if (decipherProgress >= 100) {
                        alert("🎉 NIGHTFALL PROTOCOL COMPLETE 🎉\n\nYou have successfully hacked the grid.\nThe Blood Circuit awakens.");
                    }
                }, 200);
            } else if (cyberIntegrity <= 70 && decipherProgress < 90) {
                html += `<p style="color:#ff6666; margin-top:12px;">⚠️ WARNING: Neural interface strain. Boost signal or risk system decay.</p>`;
            }

            updateWindow(html);
        });

        // --- returning to default status: click/tap on the gameplay window itself (classic retro idle) ---
        windowEl.addEventListener('click', (e) => {
            // Prevent conflict if the click originated from a button (bubbling) but the button also triggers.
            // We ensure that only direct clicks on the window or its background restore the neutral screen.
            // Also, if the click target is inside a button? but buttons are separate elements and stopPropagation not needed.
            // This gives smooth UX: tapping the text area resets to default, but doesn't override last action.
            // Use a short delay for natural feel.
            if (e.target === windowEl || windowEl.contains(e.target) && !e.target.closest('.ui-button')) {
                updateWindow(`
                    <div style="color:#ff0000; text-align:center; margin-bottom:10px; font-size:1.3em; text-shadow:0 0 10px #ff0000; border-bottom:2px solid #00ff00; padding-bottom:5px;">
                        BLOOD CIRCUIT v1.0 [1984]
                    </div>
                    SYSTEM STATUS: ONLINE<br>
                    UNIT-9 CELL_INTERFACE_ACTIVE<br>
                    ENHANCEMENT_PROTOCOL_LOCKED<br>
                    AWAITING MISSION OBJECTIVE...<br><br>
                    The final transmission from Sector 9 is still being deciphered.<br><br>
                    <span style="color:#ff8800;">Caution: Cyber-link integrity is at ${Math.floor(cyberIntegrity)}%.</span><br><br>
                    <span style="color:#00ccff;">► Click any button below to interface...</span>
                `);
            }
        });

        // small initialization to sync with current integrity and avoid showing hardcoded 89 if changed
        // but initial content is already accurate. but after some actions, reset also shows correct integrity.
        // Also ensure that after any reset the integrity and decipher remain true to state.
        // Override the reset message to display dynamic integrity whenever reset is triggered.
        const originalReset = windowEl.click;
        // redefining reset logic consistency: we just made a click handler that uses dynamic integrity values.
        // additionally, we can keep state consistency.
    })();
</script>
</body>
</html>
